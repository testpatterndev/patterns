schema: testpattern/v1
name: Synthetic Fixture
slug: synthetic-existing-object-term
version: 1.0.0
type: regex
engine: universal
description: Synthetic fixture exercising set_term_case_sensitive on a pre-existing object-form term.
pattern: \bXY\d{4}\b
confidence: medium
confidence_justification: Synthetic fixture, not a real pattern.
jurisdictions:
  - global
data_categories:
  - pii
test_cases:
  should_match:
    - value: XY1234
      description: synthetic match
  should_not_match:
    - value: AB1234
      description: synthetic non-match
exports:
  - yaml
scope: narrow
purview:
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_synthetic
      matches:
        - ref: Evidence_synthetic
  regexes:
    - id: Pattern_synthetic
      pattern: \bXY\d{4}\b
  keywords:
    - id: Evidence_synthetic
      groups:
        - match_style: word
          terms:
            - text: XY
              already_object: true
              case_sensitive: true
            - plain bare term
created: '2026-01-01'
updated: '2026-01-01'
author: testpattern-community
