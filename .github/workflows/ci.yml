name: Validate patterns

on:
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/**'
  push:
    branches-ignore: [main]   # main is gated inside compile-and-publish.yml before publishing
    paths:
      - 'data/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Compile (validates required fields + keyword-list references)
        run: npm run compile

      - name: CI gate (double-escape / |top500 / validator-ref / test-case execution)
        run: npm run check
