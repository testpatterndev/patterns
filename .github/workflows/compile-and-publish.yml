name: Compile patterns and publish to KV

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/compile.js'

jobs:
  compile-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Validate patterns (gate before publish)
        run: npm run check

      - name: Verify pattern test cases
        run: node scripts/verify-pattern-testcases.mjs --all

      - name: Catalog quality gate (gate before publish)
        run: npm run check:quality

      - name: Compile patterns
        run: npm run compile

      - name: Verify KV payload under 25 MiB
        run: |
          node -e "
          const fs = require('fs');
          const size = fs.statSync('patterns.json').size;
          const limit = 25 * 1024 * 1024;
          console.log('patterns.json bytes:', size, 'limit:', limit, 'headroom:', limit - size);
          if (size >= limit) {
            console.error('KV payload exceeds 25 MiB — cannot publish');
            process.exit(1);
          }
          "

      - name: Publish compiled patterns to KV
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv:key put --namespace-id=${{ secrets.PATTERNS_KV_NAMESPACE_ID }} "compiled-patterns" --path=patterns.json
