name: Compile patterns and publish to KV

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/compile.js'

jobs:
  compile-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Compile patterns
        run: npm run compile

      - name: Publish compiled patterns to KV
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv:key put --namespace-id=${{ secrets.PATTERNS_KV_NAMESPACE_ID }} "compiled-patterns" --path=patterns.json
