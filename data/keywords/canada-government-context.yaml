schema: testpattern/v1
name: Canada Government Context Keywords
slug: canada-government-context
type: keyword_dictionary
description: >-
  Terms indicating Government of Canada central-government, Treasury Board security-policy, and
  national-security-agency context. Used as shared corroborative evidence for the Canadian
  protective-marking pattern's collision-prone bare classified-word tiers (CONFIDENTIAL, SECRET,
  TOP SECRET), which are shared vocabulary with other nations and require Canada context. Short,
  highly-ambiguous acronyms (GC, TBS) are deliberately excluded to keep the gate meaningful.
jurisdictions:
  - ca
data_categories:
  - government
keywords:
  - Government of Canada
  - Gouvernement du Canada
  - Treasury Board
  - Treasury Board of Canada Secretariat
  - Policy on Government Security
  - Directive on Security Management
  - security categorization
  - Public Services and Procurement Canada
  - Shared Services Canada
  - Privy Council Office
  - Royal Canadian Mounted Police
  - text: RCMP
    case_sensitive: true
  - Communications Security Establishment
  - text: CSE
    case_sensitive: true
  - text: PSPC
    case_sensitive: true
  - text: CANADIAN EYES ONLY
    case_sensitive: true
created: '2026-07-07'
updated: '2026-07-07'
