schema: testpattern/v1
name: HR Industry Keywords
slug: industry-hr
type: keyword_dictionary
description: Comprehensive HR industry keywords for employment and workforce sensitive data detection. Consolidates employment records, compensation, disciplinary, performance, and leave/welfare keywords.
jurisdictions:
  - global
data_categories:
  - industry
  - hr
  - pii
keywords:
  # Core employment
  - employee
  - payroll
  - benefits
  - termination
  - hire date
  - salary
  - compensation
  - 401k
  - text: W-2
    case_sensitive: true
  - text: I-9
    case_sensitive: true
  - superannuation
  # Employment records & screening
  - police check
  - working with children check
  - WWCC
  - Blue Card
  - criminal history
  - background check
  - employment screening
  - right to work
  - employee ID
  - payroll number
  - superannuation member number
  - staff number
  # Compensation
  - wage
  - remuneration
  - base pay
  - bonus
  - commission
  - package
  - total remuneration
  - pay grade
  - pay scale
  - income
  - earnings
  - stipend
  # Performance
  - performance review
  - performance rating
  - text: KPI
    case_sensitive: true
  - key performance indicator
  - probation
  - probationary
  - performance improvement plan
  - text: PIP
    case_sensitive: true
  - performance management
  - appraisal
  - annual review
  # Disciplinary
  - disciplinary
  - warning
  - written warning
  - final warning
  - misconduct
  - suspension
  - termination for cause
  - investigation
  - grievance
  - complaint
  - code of conduct violation
  - workplace investigation
  # Leave & welfare
  - sick leave
  - personal leave
  - mental health leave
  - workers compensation
  - WorkCover
  - injury claim
  - return to work
  - rehabilitation
  - workplace injury
  - incident report
  - text: OHS
    case_sensitive: true
  - text: WHS
    case_sensitive: true
  - work health safety
created: '2026-02-08'
updated: '2026-07-04'
