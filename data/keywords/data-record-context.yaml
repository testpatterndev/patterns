schema: testpattern/v1
name: Data Record Context Keywords
slug: data-record-context
type: keyword_dictionary
description: >-
  Structural phrases that prove a document holds structured data records rather than general prose.
  Used as genuinely independent AND evidence for concept-pattern gating. Bare universal tokens
  (field, value, row, record, table…) were removed (2026-06-13) because they appear in essentially
  every spreadsheet, form and email and defeated the purpose of corroboration.
jurisdictions:
  - global
data_categories:
  - structural
keywords:
  - data record
  - database record
  - record set
  - data extract
  - data export
  - database table
  - spreadsheet
  - data registry
  - registry entry
  - master data
  - bulk export
  - data dump
created: '2026-03-13'
updated: '2026-06-13'
