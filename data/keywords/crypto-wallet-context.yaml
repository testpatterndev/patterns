schema: testpattern/v1
name: Cryptocurrency Wallet Context Keywords
slug: crypto-wallet-context
type: keyword_dictionary
description: >-
  Cryptocurrency / blockchain wallet domain-context terms — general wallet vocabulary plus per-coin
  names and case-sensitive tickers. Shared corroborative domain evidence used to gate the
  high-collision public wallet-address detectors (Solana, XRP, Litecoin, Tron, Cardano, Dogecoin,
  Monero). base58/bech32 wallet formats collide badly with random tokens, hashes and prose, so every
  tier of those SITs is AND-gated by these domain terms rather than exported as a bare high tier.
jurisdictions:
  - global
data_categories:
  - financial
keywords:
  - cryptocurrency
  - crypto
  - crypto wallet
  - wallet
  - wallet address
  - blockchain
  - digital currency
  - Solana
  - text: SOL
    case_sensitive: true
  - Ripple
  - text: XRP
    case_sensitive: true
  - Litecoin
  - text: LTC
    case_sensitive: true
  - Tron
  - text: TRX
    case_sensitive: true
  - Cardano
  - text: ADA
    case_sensitive: true
  - Dogecoin
  - text: DOGE
    case_sensitive: true
  - Monero
  - text: XMR
    case_sensitive: true
created: '2026-07-07'
updated: '2026-07-07'
author: testpattern-community
