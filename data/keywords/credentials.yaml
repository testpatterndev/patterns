schema: testpattern/v1
name: Credentials and Secrets Keywords
slug: credentials
type: keyword_dictionary
description: Corroborative evidence keywords for detecting credentials, secrets, API keys, tokens, passwords, and connection strings.
jurisdictions:
  - global
data_categories:
  - credentials
  - security
keywords:
  - api key
  - api_key
  - apikey
  - access key
  - access token
  - auth token
  - authorization
  - bearer
  - conn str
  - connection string
  - connectionstring
  - cookie
  - credential
  - database
  - host
  - text: JWT
    case_sensitive: true
  - oauth
  - passphrase
  - passwd
  - password
  - private key
  - pwd
  - refresh token
  - secret
  - secret key
  - server
  - session
  - token
  - username
