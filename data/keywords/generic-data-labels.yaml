schema: testpattern/v1
name: Generic Data Labels Keywords
slug: generic-data-labels
type: keyword_dictionary
description: >-
  Identifier-label phrases that prove a document contains a labelled identifier field (not merely the
  word "number" or "ID"). Used as genuinely independent AND evidence for identifier-adjacent patterns.
  Bare universal tokens were removed (2026-06-13) because they matched essentially every document and
  defeated the purpose of corroboration.
jurisdictions:
  - global
data_categories:
  - structural
keywords:
  - file number
  - reference number
  - case number
  - record number
  - account number
  - serial number
  - identification number
  - registration number
  - customer number
  - member number
  - reference code
  - ID number
created: '2026-03-13'
updated: '2026-06-13'
author: testpattern-community
