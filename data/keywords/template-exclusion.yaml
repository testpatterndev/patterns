schema: testpattern/v1
name: Noise and Template Exclusion
slug: template-exclusion
type: keyword_dictionary
description: >-
  Noise exclusion and template/test-data suppression keywords for AND NOT gates.
  Multi-word and explicit fixture phrases preferred over bare tokens so legitimate
  content is not suppressed (e.g. pathology "sample", product "example", proprietary
  "training data", operational "documentation"). Includes Spanish fixture phrases
  for MX and other LATAM template prose. Used as shared exclusion evidence in
  pattern match trees.
jurisdictions:
  - global
data_categories:
  - exclusion
keywords:
  # Explicit template / fixture framing (English)
  - template
  - placeholder
  - dummy
  - mock
  - tutorial
  - demo
  - boilerplate
  - training exercise
  - test data
  - sample data
  - sample file
  - sample only
  - sample template
  - as a sample
  - training sample
  - lab sample data
  - for example
  - example only
  - example data
  - worked example
  - example.com
  - training example
  - training lab
  - documentation only
  - documentation example
  - docs template
  - training documentation
  - sample training data
  - fictional
  - redacted example
  - lorem ipsum
  # Common fixture lead-ins (colon forms used in training corpora; not bare "sample"/"example")
  - 'sample:'
  - 'example:'
  - '(sample)'
  - '(example)'
  # Spanish / LATAM fixture framing (MX passport and training materials)
  - ejemplo
  - por ejemplo
  - solo ejemplo
  - datos de ejemplo
  - muestra de prueba
  - plantilla
  - datos de prueba
  - documentación de ejemplo
  - ficticio
  - ficticia
  - relleno
  - de prueba
  - valor de ejemplo
created: '2026-03-16'
updated: '2026-07-18'
author: testpattern-community
license: MIT
changelog:
  - version: '2.0.0'
    date: '2026-07-18'
    description: >-
      Redesign for quality bar: remove bare collision terms (sample, example, training data,
      documentation) that vetoed legitimate pathology/specimen/malware samples, product examples,
      proprietary training-data inventories, and operational documentation. Prefer multi-word fixture
      phrases; add Spanish LATAM fixture terms for mx-passport and related training prose.
