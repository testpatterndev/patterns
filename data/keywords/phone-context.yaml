schema: testpattern/v1
name: Phone Context Keywords
slug: phone-context
type: keyword_dictionary
description: >-
  Core, jurisdiction-neutral phone-number vocabulary (phone/mobile/cell/call/text/WhatsApp etc.) shared
  as broad corroborative evidence across the phone-number identifier family (global E.164, NANP, UK, India,
  and EU national formats). Complements the narrower, already-existing phone-international dictionary
  (fax/toll-free/IDD/STD/extension-style ancillary terms) rather than duplicating it — this list carries
  the common labels ("Phone:", "Mobile:", "call me at") that actually precede a number in real documents.
  Jurisdiction-neutral means multilingual, not English-only: the list includes the core native-language
  generic labels for the non-English jurisdictions the family serves (French "Portable:"/"Téléphone:",
  Spanish "Móvil:"/"Teléfono:", Italian "Cellulare:"/"Telefono:", Dutch "Mobiel:"/"Telefoon:"), since
  bare native generics are deliberately excluded from the country-specific 85-tier dicts and this shared
  75-tier list is the only place they can live.
jurisdictions:
  - global
data_categories:
  - pii
keywords:
  - phone
  - mobile
  - cell
  - telephone
  - tel
  - call
  - dial
  - text
  - text me
  - text message
  - text: SMS
    case_sensitive: true
  - WhatsApp
  - voicemail
  - contact number
  - phone number
  - mobile number
  - landline
  - portable
  - téléphone
  - móvil
  - teléfono
  - cellulare
  - telefono
  - mobiel
  - telefoon
