schema: testpattern/v1
name: Global LOINC Code
slug: global-loinc
version: 1.0.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects LOINC laboratory observation codes in nnnnn-n form.
operation: >-
  Structural LOINC; require LOINC keywords. Keyword lists: healthcare-codes, healthcare-clinical.
pattern: '\b\d{1,5}-\d{1}\b'
confidence: medium
confidence_justification: >-
  Medium confidence; LOINC keywords required.
jurisdictions:
  - global
  - us
regulations:
  - HIPAA
  - CLIA
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - text: LOINC
      case_sensitive: true
    - LOINC code
  proximity: 300
  keyword_lists:
    - healthcare-codes
    - healthcare-clinical
test_cases:
  should_match:
    - value: '2345-7'
      description: LOINC
    - value: '4548-4'
      description: HbA1c style
    - value: '718-7'
      description: Short
  should_not_match:
    - value: '2345-70'
      description: 2-digit check
    - value: '23457'
      description: No hyphen
    - value: '2345-'
      description: Missing digit
false_positives:
  - description: >-
      Other catalog codes.
    mitigation: >-
      Require LOINC keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_global_loinc
      matches:
        - ref: Keyword_global_loinc_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_global_loinc
      matches:
        - ref: Keyword_global_loinc_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_global_loinc
  regexes:
    - id: Regex_global_loinc
      pattern: '\b\d{1,5}-\d{1}\b'
  keywords:
    - id: Keyword_global_loinc_specific
      groups:
        - match_style: word
          terms:
            - text: LOINC
              case_sensitive: true
            - LOINC code
            - Logical Observation Identifiers
      strength: specific
    - id: Keyword_global_loinc_broad
      groups:
        - match_style: word
          terms:
            - lab code
            - FHIR Observation
      strength: specific
risk_rating: 5
risk_description: >-
  LOINC codes identify lab observations; sensitivity rises when linked to a patient.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI Specified"
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.1
    date: '2026-07-09'
    description: 'Quality-gate fix: short acronyms converted to case-sensitive terms (catalog convention).'
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Phase-2 coverage backlog — mature Purview-safe identifier with pack metadata'
author: testpattern-community
license: MIT
