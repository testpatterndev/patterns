schema: testpattern/v1
name: Security Audit Report
slug: global-security-audit-report
version: 1.4.0
type: regex
pattern_class: concept
description: Detects security audit reports including SOC 2, ISO 27001, and IRAP findings.
operation: >-
  A SOC 2, ISO 27001, SSAE 18, security-audit, or security-control report title is discovery-only at
  65. Security-control objectives, activities, trust-service criteria, Annex A, or applicability
  evidence raises it to 75. The 85 tier additionally requires a classified audit finding, exception,
  non-compliance, deviation, or required action. Enforcing tiers reject templates and examples.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - security
  - audit
test_cases:
  should_match:
    - value: 'Security audit report'
      description: Low-tier probe - report title without control evidence
    - value: 'Security audit report: control objective, control activity, and trust services criteria reviewed.'
      description: Medium-tier probe - security-control evidence without a classified finding
    - value: 'Security audit report: control objective and Annex A review found a high risk finding, audit exception, and required action.'
      description: High-tier probe - security-control evidence plus classified findings
  should_not_match:
    - value: Security guard audit of premises
      description: Physical-security sibling
    - value: Home security system review
      description: Consumer-security sibling
    - value: 'The public assurance page links to a security audit report.'
      description: Public link mentions only the report title
    - value: 'Template example: security audit report with control objective, Annex A, high risk finding, audit exception, and required action.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Physical security or home security references.
    mitigation: Require IT security framework terms like SOC 2, ISO 27001, or IRAP.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The keyword list identifies a security audit report by combining SOC 2, ISO 27001, IRAP, control-assessment, and audit-finding language; physical-security or home-security reviews are excluded. A genuine report can expose failed controls, exceptions, and remediation priorities that help an attacker select weak points or undermine assurance activity. The usual unit is a bounded assurance report whose findings may be process or compliance oriented rather than directly exploitable. Risk 8 and SENSITIVE InfoTech fit that serious organisational exposure; PROTECTED requires attack-ready weaknesses, critical-system scope, or significant operational damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_security_audit_framework
      matches:
        - ref: Keyword_security_controls
        - ref: Keyword_audit_finding_classification
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_security_audit_framework
      matches:
        - ref: Keyword_security_controls
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_security_audit_framework
  regexes:
    - id: Regex_security_audit_framework
      pattern: >-
        (?i)\b(?:soc\s+2\s+(?:type\s+)?[i]{1,2}|iso[\s/]?(?:iec\s+)?27001\s+(?:audit|assessment|certification)|ssae\s+18|security\s+(?:audit|control)\s+(?:report|assessment))\b
  keywords:
    - id: Keyword_security_controls
      groups:
        - match_style: word
          terms:
            - security control
            - control objective
            - control activity
            - trust services criteria
            - common criteria
            - Annex A
            - Statement of Applicability
            - text: SOA
              case_sensitive: true
            - text: NV1
              case_sensitive: true
            - text: NV2
              case_sensitive: true
            - text: PV
              case_sensitive: true
            - Baseline clearance
            - Negative Vetting
            - Positive Vetting
            - AGSVA
            - security clearance
            - DISP
            - DSPF
            - DSGL
      strength: domain
    - id: Keyword_audit_finding_classification
      groups:
        - match_style: word
          terms:
            - critical finding
            - high risk finding
            - medium risk finding
            - low risk finding
            - priority one
            - priority two
            - priority three
            - required action
            - audit observation
            - audit exception
            - non-compliance
            - deviation
      strength: specific
    - id: Keyword_audit_general
      groups:
        - match_style: word
          terms:
            - internal audit
            - audit report
            - audit findings
            - audit opinion
            - audit scope
            - audit objective
            - audit conclusion
            - audit recommendation
            - IIA standards
            - IPPF
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.0
    date: '2026-07-19'
    description: 'Profile quality: align the regex-backed detector type; add report-title discovery, security-control medium, and classified-finding high tiers; add public/template adversarial probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 595 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
