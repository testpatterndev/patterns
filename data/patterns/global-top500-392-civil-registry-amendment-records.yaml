schema: testpattern/v1
name: Civil registry amendment records
slug: global-top500-392-civil-registry-amendment-records
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies individual civil-status and vital-record amendments, including corrections to birth,
  death, marriage, and legal-name entries. Civil-registry topics are retained for discovery at 65;
  populated amendment fields raise confidence to 75, while a formal registry reference and personal
  status fields raise confidence to 85.
operation: >-
  Regex_civil_registry_topic recognises jurisdiction-neutral English civil-register, vital-record,
  birth, death, marriage, and legal-name topics. The topic alone is discovery-only at 65. A populated
  original, corrected, amendment, or registrar field is required at 75. The 85 tier additionally
  requires a formal registration, certificate, application, case, or entry reference and a personal
  civil-status field. Enforcing tiers reject templates and corporate, vehicle, electoral, domain,
  trademark, vessel, and professional-register collisions.
pattern: >-
  (?is)\b(?:civil\s+registry\s+amendment\s+records?|civil\s+(?:registry|register|registration|status)|vital\s+records?|birth\s+registration|death\s+registration|marriage\s+certificate|legal\s+name\s+change|(?:birth|death|marriage)\s+(?:certificate|registration)\s+(?:amendment|correction))\b
confidence: medium
confidence_justification: >-
  Medium confidence is appropriate because civil-registration and certificate phrases also occur in
  public guidance and adjacent registries. Enforcement requires populated amendment structure, and
  high confidence adds a formal record reference plus personal civil-status evidence.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - original entry
    - corrected entry
    - amendment reason
    - registrar approval
    - registration number
    - date of birth
    - former name
    - date of marriage
  proximity: 240
test_cases:
  should_match:
    - value: The civil registry amendment records are held by the registrar.
      description: Low-tier probe - civil-registry topic without populated amendment content
    - value: 'Civil registry amendment record. Original entry: Jon Smyth. Corrected entry: John Smith. Amendment reason: clerical error.'
      description: Medium-tier probe - populated before-and-after fields without a formal reference or personal status field
    - value: 'Vital records correction. Previous date: 02/03/1980. Corrected date: 03/03/1980. Registrar approval: approved.'
      description: Medium-tier probe - populated correction workflow without formal record reference
    - value: 'Birth registration correction. Registration number: B-2026-00481. Full name: John Smith. Date of birth: 03/03/1980. Original entry: Jon Smyth. Corrected entry: John Smith. Registrar approval: approved.'
      description: High-tier probe - populated amendment, formal registry reference, and personal civil-status fields
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: 'Companies registry legal name change. Registration number: CO-8841. Former name: Alpha Pty Ltd. New legal name: Beta Pty Ltd.'
      description: Corporate-register collision must not enforce as an individual civil-status amendment
    - value: 'Vehicle registration correction. Registration number: VIN-8841. Previous value: ABC123. Corrected value: XYZ789.'
      description: Motor-vehicle register collision must not enforce
    - value: 'Electoral register correction. Entry reference: ER-4481. Former name: Jane Doe. New legal name: Jane Roe.'
      description: Electoral-register collision must not enforce
    - value: 'Public guidance for civil registration explains Registration number: B-2026-00481, Original entry: Jon Smyth, Corrected entry: John Smith, and Date of birth: 03/03/1980.'
      description: Public guidance containing realistic fields must not enforce
    - value: 'Training example: Birth registration correction. Registration number: B-2026-00481. Date of birth: 03/03/1980. Original entry: Jon Smyth. Corrected entry: John Smith.'
      description: Structurally complete training content must not enforce
false_positives:
  - description: Public registry guidance and training material can show realistic before-and-after values, registration references, and personal fields.
    mitigation: Keep civil-registry topics discovery-only, require populated fields for enforcement, and reject explicit guidance, template, and training framing.
  - description: Corporate, vehicle, electoral, domain, trademark, vessel, and professional registries also process amendments, corrections, names, certificates, and entry references.
    mitigation: Apply adjacent-register collision exclusions to enforcing tiers and require civil-status or vital-record topic evidence.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_civil_registry_topic
      matches:
        - ref: Pattern_civil_registry_amendment_field
        - ref: Pattern_civil_registry_formal_reference
        - ref: Evidence_civil_registry_personal_status
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_civil_registry_collision
    - confidence_level: 75
      id_match: Regex_civil_registry_topic
      matches:
        - ref: Pattern_civil_registry_amendment_field
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_civil_registry_collision
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_civil_registry_topic
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_civil_registry_collision
  regexes:
    - id: Regex_civil_registry_topic
      pattern: >-
        (?is)\b(?:civil\s+registry\s+amendment\s+records?|civil\s+(?:registry|register|registration|status)|vital\s+records?|birth\s+registration|death\s+registration|marriage\s+certificate|legal\s+name\s+change|(?:birth|death|marriage)\s+(?:certificate|registration)\s+(?:amendment|correction))\b
    - id: Pattern_civil_registry_amendment_field
      pattern: >-
        (?im)\b(?:(?:original|previous|incorrect|corrected|amended|new)\s+(?:entry|value|name|date|place|sex)|(?:amendment|correction)\s+(?:reason|status|date)|registrar\s+(?:decision|approval))\s*[:#-]\s*[^\r\n]{2,120}
    - id: Pattern_civil_registry_formal_reference
      pattern: >-
        (?i)\b(?:registration|certificate|application|case|entry)\s+(?:no\.?|number|reference|ref\.?|id)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{2,30}\b
  keywords:
    - id: Evidence_civil_registry_personal_status
      groups:
        - match_style: word
          terms:
            - full name
            - date of birth
            - place of birth
            - former name
            - new legal name
            - sex at birth
            - parent name
            - date of death
            - place of death
            - date of marriage
            - spouse name
      strength: specific
    - id: Evidence_civil_registry_collision
      groups:
        - match_style: word
          terms:
            - company registry
            - companies registry
            - corporate registry
            - business register
            - vehicle registration
            - motor vehicle
            - electoral register
            - domain registry
            - trademark registry
            - ship registry
            - vessel registry
            - professional register
            - public guidance
            - guidance document
      strength: noise
risk_description: >-
  The detector finds civil-registry amendment material through birth registration, death registration, marriage certificate, and related record language. A routine hit may disclose that a status record is being corrected, but exploitation usually needs the person's identifiers, the before-and-after values, or supporting certificates to enable impersonation or unwanted disclosure. For a single ordinary administrative record, harm is bounded and often remediable through registry controls. Risk 5 and OFFICIAL are appropriate; SENSITIVE would require sealed identity changes, full supporting evidence, or a linked register exposing multiple people.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
