schema: testpattern/v1
name: Immigration interview transcripts
slug: global-top500-389-immigration-interview-transcripts
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to immigration interview transcripts in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: industry-education. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:immigration\s+interview\s+transcripts|immigration\s+hearing|visa\s+interview|immigration\s+officer|border\s+interview|immigration\s+proceedings|applicant\s+statement|immigration\s+tribunal|interview\s+notes|visa\s+application|immigration\s+case|entry\s+interview)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - immigration interview transcripts
  proximity: 240
  keyword_lists:
    - industry-education
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: immigration interview transcripts
      description: Primary topic phrase match
    - value: immigration hearing
      description: Case-insensitive topic phrase match
    - value: visa interview
      description: Alternative topic phrase match
    - value: immigration officer
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: immigration case
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to immigration interview transcripts appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_immigration_interview
      matches:
        - ref: Pattern_global_top500_389_immigration_interview_transcripts_label_context
        - ref: Keyword_global_top500_389_immigration_interview_transcripts_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_immigration_interview
      matches:
        - ref: Keyword_immigration_interview
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_immigration_interview
      pattern: >-
        (?is)\b(?:immigration\s+interview\s+transcripts|immigration\s+hearing|visa\s+interview|immigration\s+officer|border\s+interview|immigration\s+proceedings|applicant\s+statement|immigration\s+tribunal|interview\s+notes|visa\s+application|immigration\s+case|entry\s+interview)\b
    - id: Pattern_global_top500_389_immigration_interview_transcripts_label_context
      pattern: (?i)\b(?:immigration\s+interview\s+transcripts)\b
  keywords:
    - id: Keyword_immigration_interview
      groups:
        - match_style: word
          terms:
            - immigration interview transcripts
            - immigration hearing
            - visa interview
            - immigration officer
            - border interview
            - immigration proceedings
            - applicant statement
            - immigration tribunal
            - interview notes
            - visa application
            - immigration case
            - entry interview
      strength: specific
    - id: Keyword_global_top500_389_immigration_interview_transcripts_domain_context
      groups:
        - match_style: word
          terms:
            - immigration interview transcripts
            - immigration
            - interview
            - transcripts
      strength: domain
risk_description: >-
  The detector recognises immigration or visa interview material, including hearing and officer terminology supported by nearby case context. A transcript can expose identity, family relationships, travel history, credibility assessments, and statements bearing directly on lawful status, creating privacy harm or prejudicing an application if leaked. Consequences are serious for the applicant but normally confined to a case and subject to review rather than automatically irreversible. Risk 8 and SENSITIVE are justified; PROTECTED would require protected witnesses, active security intelligence, or bulk compromise of high-risk applicants.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-14'
changelog:
  - version: 1.2.2
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1935 without changing detector or package metadata.'
  - version: 1.2.1
    date: '2026-07-12'
    description: 'Baseline burn-down: mark the no-evidence 65 tier discovery_only — it is a broad inventory tier by shape (id_match only, no required evidence), so bare topic fragments correctly surface in discovery rather than counting as classification; aligns with corpus convention and clears the should_not_match failure + check:quality discoveryMissing informational. No compiled detection change (discovery_only is harness/quality metadata).'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
