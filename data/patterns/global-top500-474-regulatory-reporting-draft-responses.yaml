schema: testpattern/v1
name: Regulatory reporting draft responses
slug: global-top500-474-regulatory-reporting-draft-responses
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies pre-submission draft responses, reports, and submissions prepared for a regulator or
  supervisory authority. Topic phrases are retained for discovery; enforcement requires reporting-period,
  event, proposed-disclosure, affected-record, data-quality, control, corrective-action, legal-review, or
  outstanding-evidence content, and high confidence also requires approval, submission, clearance,
  comment, deadline, or regulator-reference workflow evidence.
operation: >-
  Regex_regulatory_reporting_draft recognises draft regulatory responses, submissions, and reports
  addressed to regulators or reporting obligations. The topic alone is discovery-only at 65. Substantive
  reporting content raises it to 75; explicit pre-submission workflow or regulator-reference evidence
  reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:regulatory\s+reporting\s+draft\s+(?:response|submission|report)|draft\s+(?:response|submission|report)\s+(?:to|for)\s+(?:the\s+)?(?:regulator|regulatory\s+authority|supervisory\s+authority)|draft\s+response\s+to\s+(?:a\s+)?(?:regulatory|statutory)\s+(?:request|notice|reporting\s+obligation))\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive reporting content rather than draft or regulator vocabulary
  alone. High confidence adds explicit pre-submission workflow or regulator-reference evidence.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government
corroborative_evidence:
  keywords:
    - regulatory reporting draft responses
    - regulatory
    - reporting
    - draft
    - responses
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: regulatory reporting draft response
      description: Low-tier probe - draft regulatory-response topic without substantive content
    - value: 'Regulatory reporting draft response: reporting period, reportable event, proposed disclosure, affected records, data quality issue, control weakness, corrective action, legal review, and evidence outstanding'
      description: Medium-tier probe - substantive draft response without workflow evidence
    - value: 'Regulatory reporting draft response to the regulator: reporting period, reportable event, proposed disclosure, affected records, control weakness, and legal review; status not approved, regulator reference: RRN-2026-77, response due 30 August 2026'
      description: High-tier probe - substantive draft with approval, reference, and deadline evidence
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: 'The regulator publishes annual regulatory reporting guidance.'
      description: Public reporting guidance without a draft response
    - value: 'Draft response to the customer complaint'
      description: Non-regulatory draft response
    - value: 'Training example: regulatory reporting draft response with proposed disclosure, status not approved, and regulator reference RRN-2026-77'
      description: Explicit training content must not enforce
false_positives:
  - description: Public reporting guidance, published statutory reports, and ordinary customer-response drafts can contain reporting, compliance, response, and deadline language.
    mitigation: Require an explicitly draft regulator-facing response, submission, or report before considering substantive reporting evidence.
  - description: Training drafts can contain realistic proposed disclosures, approval states, regulator references, deadlines, and legal-review notes.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_regulatory_reporting_draft
      matches:
        - ref: Evidence_regulatory_reporting_content
        - ref: Evidence_regulatory_reporting_workflow
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_regulatory_reporting_draft
      matches:
        - ref: Evidence_regulatory_reporting_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_regulatory_reporting_draft
  regexes:
    - id: Regex_regulatory_reporting_draft
      pattern: >-
        (?is)\b(?:regulatory\s+reporting\s+draft\s+(?:response|submission|report)|draft\s+(?:response|submission|report)\s+(?:to|for)\s+(?:the\s+)?(?:regulator|regulatory\s+authority|supervisory\s+authority)|draft\s+response\s+to\s+(?:a\s+)?(?:regulatory|statutory)\s+(?:request|notice|reporting\s+obligation))\b
    - id: Evidence_regulatory_reporting_workflow
      pattern: >-
        (?i)\b(?:not\s+(?:approved|submitted)|pending\s+(?:legal\s+)?clearance|clearance\s+required|comments?\s+due|response\s+due|regulator\s+(?:reference|ref\.?)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,})\b
  keywords:
    - id: Evidence_regulatory_reporting_content
      groups:
        - match_style: word
          terms:
            - reporting period
            - reportable event
            - response to question
            - proposed disclosure
            - affected records
            - data quality issue
            - control weakness
            - corrective action
            - legal review
            - evidence outstanding
            - regulatory obligation
            - statutory report
      strength: domain
risk_description: >-
  The concept pattern flags regulatory reporting, draft responses, inquiries, supervisory authorities, compliance reports, obligations, enforcement, submissions, mandatory disclosure, correspondence, and statutory reports rather than proving draft status. A genuine response can expose preliminary admissions, investigation facts, affected people, control failures, and the organization's proposed legal position before approval, enabling regulatory prejudice or inconsistent disclosure. The normal unit is one regulator interaction and the organization and individuals discussed, while published obligations, guidance, and response templates can match the same terms. Risk 8 and SENSITIVE reflect serious contained legal and privacy harm; PROTECTED would require a nationally consequential enforcement matter, protected operation, or likely significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
