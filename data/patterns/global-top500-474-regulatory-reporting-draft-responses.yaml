schema: testpattern/v1
name: Regulatory reporting draft responses
slug: global-top500-474-regulatory-reporting-draft-responses
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to regulatory reporting draft responses in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:regulatory\s+reporting|draft\s+response|regulatory\s+inquiry|supervisory\s+authority|compliance\s+report|reporting\s+obligation|enforcement\s+action|regulatory\s+submission|privacy\s+compliance|mandatory\s+disclosure|regulator\s+correspondence|statutory\s+report)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - regulatory reporting draft responses
    - regulatory
    - reporting
    - draft
    - responses
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: regulatory reporting
      description: Primary topic phrase match
    - value: draft response
      description: Case-insensitive topic phrase match
    - value: regulatory inquiry
      description: Alternative topic phrase match
    - value: supervisory authority
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to regulatory reporting draft responses appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_regulatory_reporting
      matches:
        - ref: Pattern_global_top500_474_regulatory_reporting_draft_responses_label_context
        - ref: Keyword_global_top500_474_regulatory_reporting_draft_responses_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_474_regulatory_reporting_draft_responses_noise_exclusion
    - confidence_level: 75
      id_match: Regex_regulatory_reporting
      matches:
        - ref: Keyword_regulatory_reporting
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_474_regulatory_reporting_draft_responses_noise_exclusion
    - confidence_level: 65
      id_match: Regex_regulatory_reporting
      matches:
        - ref: Keyword_regulatory_reporting
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_474_regulatory_reporting_draft_responses_noise_exclusion
  regexes:
    - id: Regex_regulatory_reporting
      pattern: (?is)\b(?:regulatory\s+reporting|draft\s+response|regulatory\s+inquiry|supervisory\s+authority|compliance\s+report|reporting\s+obligation|enforcement\s+action|regulatory\s+submission|privacy\s+compliance|mandatory\s+disclosure|regulator\s+correspondence|statutory\s+report)\b
    - id: Pattern_global_top500_474_regulatory_reporting_draft_responses_label_context
      pattern: (?i)\\b(?:regulatory\\s+reporting\\s+draft\\s+responses|regulatory|reporting|draft|responses|top500)\\b
  keywords:
    - id: Keyword_regulatory_reporting
      groups:
        - match_style: word
          terms:
            - regulatory reporting
            - draft response
            - regulatory inquiry
            - supervisory authority
            - compliance report
            - reporting obligation
            - enforcement action
            - regulatory submission
            - privacy compliance
            - mandatory disclosure
            - regulator correspondence
            - statutory report
    - id: Keyword_global_top500_474_regulatory_reporting_draft_responses_domain_context
      groups:
        - match_style: word
          terms:
            - regulatory reporting draft responses
            - regulatory
            - reporting
            - draft
            - responses
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_474_regulatory_reporting_draft_responses_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
