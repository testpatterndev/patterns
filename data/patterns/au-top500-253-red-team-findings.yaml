changelog:
- version: 1.4.1
  date: '2026-07-18'
  description: 'Adversarial accuracy pass: correct data_categories from [''credentials'', ''security''] to [''security''] so package routing and
    workbook category claims match the detector content (description may already have been fixed in wave1).'
- version: 1.4.0
  date: '2026-07-16'
  description: 'Tier rebalance (TP-00379): red-team/penetration-test topic vocabulary no longer enforces (a schedule spreadsheet could previously
    reach 85 because "spreadsheet" satisfied the shared data-record-context gate) - the topic branch is demoted to 65 discovery_only and the data-record-context
    import removed. Enforcement now anchors on Pattern_red_team_finding_record (RT/FINDING record id within 260 characters of exploited/attack
    path/affected asset/evidence/ impact/severity/remediation content): 75 with template exclusion, 85 with additional red-team topic evidence.
    Added finding-record positive and schedule/training-sample cases.'
- version: 1.3.1
  date: '2026-07-14'
  description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 854 without changing detector or package
    metadata.'
- version: 1.3.0
  date: '2026-07-09'
  description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers
    with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot
    review'
- version: 1.2.0
  date: '2026-03-14'
  description: Standardise to 3-tier 65/75/85 gating with progressive evidence
- version: 1.1.0
  date: '2026-03-06'
