schema: testpattern/v1
name: Red team findings
slug: au-top500-253-red-team-findings
version: 1.4.3
type: regex
pattern_class: concept
engine: boost_regex
description: 'Identifies substantive red-team findings rather than engagement administration: populated finding records (RT/FINDING identifiers
  with exploited paths, affected assets, evidence, impact, severity or remediation) enforce, while red-team/penetration-test topic vocabulary
  remains discovery-only.'
operation: 'Pattern type: regex (boost_regex engine). Topic phrases (red team, penetration test, security assessment) feed a 65 discovery-only
  tier; enforcement requires Pattern_red_team_finding_record - an RT/FINDING record identifier within 260 characters of finding content (exploited,
  attack path, affected asset, evidence, impact, severity, remediation) - at 75, with red-team topic evidence within 300 characters raising it
  to 85. The shared template exclusion vetoes sample/training/demo text at enforcement tiers.'
pattern: (?is)\b(?:red\s+team|red\s+team\s+findings|adversary\s+simulation|attack\s+simulation|penetration\s+test|offensive\s+security|exploitation\s+report|security\s+assessment|red\s+team\s+engagement|attack\s+scenario)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
- au
regulations:
- Criminal Code Act 1995 (Cth)
- SOCI Act 2018 (Cth)
frameworks:
- CIS Controls
- ISO 27001
data_categories:
- security
corroborative_evidence:
  keywords:
  - red team findings
  - red
  - team
  - findings
  - software
  - engineering
  - architecture
  proximity: 300
  keyword_lists:
  - data-record-context
test_cases:
  should_match:
  - value: red team
    description: Primary topic phrase match
  - value: red team findings
    description: Case-insensitive topic phrase match
  - value: adversary simulation
    description: Alternative topic phrase match
  - value: attack simulation
    description: Additional topic phrase match (discovery only)
  - value: 'RT-42 Severity High; attack path: phishing to token replay; affected asset: admin portal; evidence: session capture; remediation:
      bind tokens.'
    description: Populated red-team finding record reaches the enforcing tiers
  - value: Spreadsheet schedule for next month's red team engagement.
    description: Engagement scheduling matches the topic branch only (discovery, not enforcement)
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: source code config
    description: Generic word pair from old broad template should not match
  - value: Pen-test training sample RT-01 with demo exploit.
    description: Training/sample/demo marks simulated output and the truncated record lacks finding content
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions
    without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from
    technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: &id001
      type: any
      ids:
      - Pattern_red_team_findings
      - Pattern_red_team_finding_record
    min_count: 2
    matches:
    - ref: Evidence_red_team_findings
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: *id001
    matches:
    - ref: Evidence_red_team_findings
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: *id001
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Pattern_red_team_findings
    pattern: (?is)\b(?:red\s+team|red\s+team\s+findings|adversary\s+simulation|attack\s+simulation|penetration\s+test|offensive\s+security|exploitation\s+report|security\s+assessment|red\s+team\s+engagement|attack\s+scenario)\b
  - id: Pattern_red_team_finding_record
    pattern: (?is)\b(?:RT|FINDING)[-_ ]?\d{2,8}\b[\s\S]{0,260}\b(?:exploited|attack path|affected asset|evidence|impact|severity|remediation)\b
  keywords:
  - id: Evidence_red_team_findings
    groups:
    - match_style: word
      terms:
      - red team
      - red team findings
      - adversary simulation
      - attack simulation
      - penetration test
      - offensive security
      - exploitation report
      - security assessment
      - red team engagement
      - attack scenario
      - RT-42 Severity High
      - Spreadsheet schedule for
risk_description: The detector recognizes red-team, adversary-simulation, and attack-simulation findings, indicating an offensive-security artifact
  rather than a generic team reference. Disclosure can reveal successful intrusion paths, persistence methods, detection blind spots, identity
  escalation, and defensive response weaknesses that a real adversary could reuse. The assessed organization and users of the tested systems face
  serious operational risk, but the normal findings set is bounded to one exercise and exploitation still depends on current conditions and separate
  access. Risk 8 and SENSITIVE fit substantive red-team findings, while an unremediated chain into critical services or enterprise-wide privileged
  control would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: RESTRICTED
  ca_gov: Protected B
