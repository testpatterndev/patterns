schema: testpattern/v1
name: Red team findings
slug: au-top500-253-red-team-findings
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies red team findings patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:red\s+team|red\s+team\s+findings|adversary\s+simulation|attack\s+simulation|penetration\s+test|offensive\s+security|exploitation\s+report|security\s+assessment|red\s+team\s+engagement|attack\s+scenario)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "Criminal Code Act 1995 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- CIS Controls
- ISO 27001
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - red team findings
    - red
    - team
    - findings
    - software
    - engineering
    - architecture
  proximity: 300
  keyword_lists:

    - data-record-context
test_cases:
  should_match:
    - value: red team
      description: Primary topic phrase match
    - value: red team findings
      description: Case-insensitive topic phrase match
    - value: adversary simulation
      description: Alternative topic phrase match
    - value: attack simulation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_red_team_findings
      matches:
        - ref: Evidence_red_team_findings
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_red_team_findings
      matches:
        - ref: Evidence_red_team_findings
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_red_team_findings
      matches:
        - ref: Evidence_red_team_findings
  regexes:
    - id: Pattern_red_team_findings
      pattern: (?is)\b(?:red\s+team|red\s+team\s+findings|adversary\s+simulation|attack\s+simulation|penetration\s+test|offensive\s+security|exploitation\s+report|security\s+assessment|red\s+team\s+engagement|attack\s+scenario)\b
  keywords:
    - id: Evidence_red_team_findings
      groups:
        - match_style: word
          terms:
            - red team
            - red team findings
            - adversary simulation
            - attack simulation
            - penetration test
            - offensive security
            - exploitation report
            - security assessment
            - red team engagement
            - attack scenario
    - id: Evidence_data_record_context
      groups:
        - match_style: word
          terms:
            - field
            - column
            - row
            - entry
            - record
            - value
            - form
            - register
            - database
            - extract
            - export
            - spreadsheet
            - table
            - schedule
            - appendix
            - attachment
            - registry
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines/chapter-11-app-11-security-of-personal-information
