schema: testpattern/v1
name: Insider threat investigation files
slug: au-top500-300-insider-threat-investigation-files
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies insider threat investigation files patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:insider\s+threat|employee\s+investigation|unauthorized\s+access|data\s+exfiltration|behavioral\s+analysis|user\s+activity\s+monitoring|privilege\s+abuse|HR\s+investigation|disciplinary\s+action|termination\s+review|security\s+clearance)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - insider threat investigation files
    - insider
    - threat
    - investigation
    - files
    - security
    - operations
    - data
  proximity: 300
test_cases:
  should_match:
    - value: insider threat
      description: Primary topic phrase match
    - value: employee investigation
      description: Case-insensitive topic phrase match
    - value: unauthorized access
      description: Alternative topic phrase match
    - value: data exfiltration
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: insider threat case
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  This classifier targets a composite insider-threat file through employee-investigation, unauthorized-access, exfiltration, user-monitoring, privilege-abuse, HR-investigation, disciplinary-action, and clearance language. Disclosure can reveal allegations, monitored behavior, identities, evidence, and planned actions, tipping off a subject or causing retaliation, reputational damage, and employment or legal harm. The affected scale is one investigation but can include the employee, witnesses, managers, and the organization. Risk 8 and SENSITIVE capture serious contained personal and operational harm, while a national-security case or protected operation would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_insider_threat
      matches:
        - ref: Evidence_insider_threat
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_insider_threat
      matches:
        - ref: Evidence_insider_threat
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_insider_threat
      matches:
        - ref: Evidence_insider_threat
  regexes:
    - id: Pattern_insider_threat
      pattern: >-
        (?is)\b(?:insider\s+threat|employee\s+investigation|unauthorized\s+access|data\s+exfiltration|behavioral\s+analysis|user\s+activity\s+monitoring|privilege\s+abuse|HR\s+investigation|disciplinary\s+action|termination\s+review|security\s+clearance)\b
    - id: Pattern_au_top500_300_insider_threat_investigation_files_label_context
      pattern: (?i)\b(?:insider\s+threat\s+investigation\s+files)\b
  keywords:
    - id: Evidence_insider_threat
      groups:
        - match_style: word
          terms:
            - insider threat
            - employee investigation
            - unauthorized access
            - data exfiltration
            - behavioral analysis
            - user activity monitoring
            - privilege abuse
            - whistleblower
            - HR investigation
            - disciplinary action
            - termination review
            - security clearance
    - id: Keyword_au_top500_300_insider_threat_investigation_files_domain_context
      groups:
        - match_style: word
          terms:
            - insider threat investigation files
            - insider
            - threat
            - investigation
            - files
created: '2026-02-08'
updated: '2026-07-14'
changelog:
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 892 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-12'
    description: 'Baseline burn-down A2: tier@75''s Evidence_insider_threat ref is self-corroborating — its term list is the same phrase set as the id_match regex''s own alternation, so should_not_match: "insider threat case" satisfied both the primary match and the tier''s evidence with the single phrase "insider threat". Added min_count: 2 + unique_results: true to tier@75 (mirroring tier@85) so one incidental phrase occurrence no longer meets the evidence bar. Also marked the bare tier@65 discovery_only (same no-evidence shape) so it surfaces in discovery inventory rather than gating should_not_match.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
