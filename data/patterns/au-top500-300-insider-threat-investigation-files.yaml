schema: testpattern/v1
name: Insider threat investigation files
slug: au-top500-300-insider-threat-investigation-files
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies insider threat investigation files patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:insider\s+threat|employee\s+investigation|unauthorized\s+access|data\s+exfiltration|behavioral\s+analysis|user\s+activity\s+monitoring|privilege\s+abuse|HR\s+investigation|disciplinary\s+action|termination\s+review|security\s+clearance)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - insider threat investigation files
    - insider
    - threat
    - investigation
    - files
    - security
    - operations
    - data
  proximity: 300
test_cases:
  should_match:
    - value: insider threat
      description: Primary topic phrase match
    - value: employee investigation
      description: Case-insensitive topic phrase match
    - value: unauthorized access
      description: Alternative topic phrase match
    - value: data exfiltration
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: insider threat case
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_insider_threat
      matches:
        - ref: Evidence_insider_threat
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_300_insider_threat_investigation_files_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_insider_threat
      matches:
        - ref: Evidence_insider_threat
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_300_insider_threat_investigation_files_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_insider_threat
      matches:
        - ref: Evidence_insider_threat
  regexes:
    - id: Pattern_insider_threat
      pattern: (?is)\b(?:insider\s+threat|employee\s+investigation|unauthorized\s+access|data\s+exfiltration|behavioral\s+analysis|user\s+activity\s+monitoring|privilege\s+abuse|HR\s+investigation|disciplinary\s+action|termination\s+review|security\s+clearance)\b
    - id: Pattern_au_top500_300_insider_threat_investigation_files_label_context
      pattern: (?i)\\b(?:insider\\s+threat\\s+investigation\\s+files|insider|threat|investigation|files|top500)\\b
  keywords:
    - id: Evidence_insider_threat
      groups:
        - match_style: word
          terms:
            - insider threat
            - employee investigation
            - unauthorized access
            - data exfiltration
            - behavioral analysis
            - user activity monitoring
            - privilege abuse
            - whistleblower
            - HR investigation
            - disciplinary action
            - termination review
            - security clearance
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_300_insider_threat_investigation_files_domain_context
      groups:
        - match_style: word
          terms:
            - insider threat investigation files
            - insider
            - threat
            - investigation
            - files
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_300_insider_threat_investigation_files_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
