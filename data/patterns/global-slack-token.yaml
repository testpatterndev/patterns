schema: testpattern/v1
name: Slack Token
slug: global-slack-token
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Slack Token patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use
  this version as a starting point for customisation.
operation: >-
  Detects current Slack token forms: bot (xoxb-, two numeric segments + 24-34 char suffix),
  user/legacy-user (xoxp-/xoxe-, three numeric segments + 28-34 char suffix) and legacy
  workspace/refresh tokens (xoxa-/xoxr-). Corroborative evidence: keywords within 300 characters.
pattern: (?<![A-Za-z0-9])(?:xoxb-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,34}|xox[pe]-[0-9]{10,13}-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{28,34}|xox[ar]-(?:[0-9]-)?[0-9a-zA-Z]{8,48})(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 'https://hooks.slack.com/services/T_example/B_example/exampleexamplewebhooktkn'
      description: Slack incoming webhook URL (Snaffler KeepSlackTokensInCode form)
    - value: xoxb-1234567890-1234567890123-ABCDEFGHIJKLMNOPQRSTUVWXYZ012345
      description: Modern Slack bot token (xoxb-, 33-char suffix)
    - value: xoxp-1234567890-1234567890-1234567890123-ABCDEFGHIJKLMNOPQRSTUVWXYZ0123
      description: Slack user token (xoxp-, three numeric segments)
    - value: xoxe-1234567890123-1234567890-1234567890-ABCDEFGHIJKLMNOPQRSTUVWXYZ01
      description: Slack legacy user/refresh token (xoxe-)
    - value: 'SLACK_BOT_TOKEN=xoxb-1234567890-1234567890-ABCDEFGHIJKLMNOPabcdefgh'
      description: Labelled bot token with minimum 24-char suffix
  should_not_match:
    - value: xoxc-1234567890-1234567890-ABCDEFGHIJKLMNOPabcdefgh
      description: Invalid token type prefix (xoxc not a real Slack token type)
    - value: xoxb-123456789-1234567890-ABCDEFGHIJKLMNOPabcdefgh
      description: First numeric segment too short (9 digits instead of 10-13)
    - value: xoxb-1234567890-1234567890-ABCDEFGHIJKLMNOPabcdef
      description: Bot suffix too short (23 characters instead of 24+)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_slack_token
      matches:
        - ref: Pattern_global_slack_token_label_context
        - ref: Keyword_global_slack_token_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_slack_token
      matches:
        - ref: Keyword_slack_token
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_slack_webhook
      matches:
        - ref: Keyword_slack_webhook_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_slack_token
      pattern: (?<![A-Za-z0-9])(?:xoxb-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,34}|xox[pe]-[0-9]{10,13}-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{28,34}|xox[ar]-(?:[0-9]-)?[0-9a-zA-Z]{8,48})(?![A-Za-z0-9])
    - id: Regex_snaffler_slack_webhook
      pattern: https://hooks\.slack\.com/services/T[A-Za-z0-9_]{8,}/B[A-Za-z0-9_]{8,}/[A-Za-z0-9_]{24}
    - id: Pattern_global_slack_token_label_context
      pattern: (?i)\b(?:slack\s+token|slack|token)\b
  keywords:
    - id: Keyword_slack_token
      groups:
        - match_style: word
          terms:
            - slack
            - xoxb
            - xoxp
            - bot token
            - api token
            - api key
            - webhook
            - workspace
            - oauth token
            - bearer token
            - SLACK_TOKEN
            - SLACK_BOT_TOKEN
    - id: Keyword_global_slack_token_domain_context
      groups:
        - match_style: word
          terms:
            - slack token
            - slack
            - token
    - id: Keyword_slack_webhook_context
      groups:
        - match_style: string
          terms:
            - hooks.slack.com
            - webhook
risk_rating: 10
risk_description: >-
  Exposure of this credential could grant unauthorized access to cloud infrastructure, databases, or services. Compromised credentials are a leading cause of data breaches and can result in full
  system takeover.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-slack-access-token
    title: Slack access token entity definition - Microsoft Learn
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Canonicalized the strongest tier from a non-canonical confidence_level 90 to 85 (only 65/75/85 are valid Purview confidence tiers; 90 was drift, not a deliberate design choice like the AU PSPF marking hierarchy)'
  - version: 1.1.0
    date: '2026-06-26'
    note: added incoming-webhook URL form (Snaffler KeepSlackTokensInCode)
