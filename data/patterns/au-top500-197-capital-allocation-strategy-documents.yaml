schema: testpattern/v1
name: Capital allocation strategy documents
slug: au-top500-197-capital-allocation-strategy-documents
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to capital allocation strategy documents in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:capital\s+allocation|capital\s+strategy|capital\s+deployment|capital\s+expenditure|CAPEX\s+plan|dividend\s+policy|share\s+buyback|capital\s+return|investment\s+framework|balance\s+sheet\s+optimization|debt\s+capacity|funding\s+strategy)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - capital allocation strategy documents
    - capital
    - allocation
    - strategy
    - documents
    - mergers
    - acquisitions
  proximity: 300
test_cases:
  should_match:
    - value: capital allocation
      description: Primary topic phrase match
    - value: capital strategy
      description: Case-insensitive topic phrase match
    - value: capital deployment
      description: Alternative topic phrase match
    - value: capital expenditure
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to capital allocation strategy documents appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_capital_allocation
      matches:
        - ref: Evidence_capital_allocation
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_capital_allocation
      matches:
        - ref: Evidence_capital_allocation
    - confidence_level: 65
      id_match: Pattern_capital_allocation
      matches:
        - ref: Evidence_capital_allocation
  regexes:
    - id: Pattern_capital_allocation
      pattern: (?is)\b(?:capital\s+allocation|capital\s+strategy|capital\s+deployment|capital\s+expenditure|CAPEX\s+plan|dividend\s+policy|share\s+buyback|capital\s+return|investment\s+framework|balance\s+sheet\s+optimization|debt\s+capacity|funding\s+strategy)\b
  keywords:
    - id: Evidence_capital_allocation
      groups:
        - match_style: word
          terms:
            - capital allocation
            - capital strategy
            - capital deployment
            - capital expenditure
            - CAPEX plan
            - dividend policy
            - share buyback
            - capital return
            - investment framework
            - balance sheet optimization
            - debt capacity
            - funding strategy
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
