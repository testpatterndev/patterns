schema: testpattern/v1
name: Credential Combolist / Stealer-Log Line
slug: global-credential-combolist
version: 1.2.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects credential combolist / infostealer-log lines: email:password pairs and
  host-or-url:user:pass triples, the format in which stolen credentials are
  aggregated and traded after info-stealer infections. These dumps fuel credential
  stuffing and account-takeover attacks.
operation: >-
  Two forms. (1) email:password - an email address, a colon, then a 4+ character
  password with no whitespace or further colon. (2) url/host:user:pass - an http(s)
  URL or a dotted hostname, no optional groups (Purview rejects quantified groups); host:user:pass without path/port groups —
  [A-Za-z0-9._~%-] length (not unbounded \S*/.*), then colon, username, colon,
  password. Purview forbids groups containing multi-match constructs such as
  (.*, .+, .{0,n}, .{1,n}) or equivalent (?:/\S*); this pattern avoids those.
  Corroborative evidence: keywords within 300 characters.
# Purview-safe: no group-of-star / group-of-dot-star (ClassificationRulePackageValidationException).
pattern: '[A-Za-z0-9._%+-]{1,64}@[A-Za-z0-9.-]{1,253}\.[A-Za-z]{2,24}:[^\s:]{4,128}|https://[A-Za-z0-9.-]{4,253}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|http://[A-Za-z0-9.-]{4,253}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|[A-Za-z0-9.-]{4,253}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}'
confidence: medium
confidence_justification: >-
  Medium confidence: the email:password and host:user:pass structures are distinctive
  for credential dumps, but a colon-delimited token can also appear in URLs, config
  files and timestamps, so corroborating context is needed for high assurance.
jurisdictions:
  - global
regulations:
  - GDPR
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - combolist
    - combo list
    - stealer log
    - infostealer
    - credential dump
    - leaked passwords
    - logins
    - account takeover
  proximity: 300
test_cases:
  should_match:
    - value: 'john.doe@example.com:Hunter2Pass'
      description: email:password combolist line with fake credentials
    - value: 'admin@mail.test:P@ssw0rd!'
      description: email:password with symbols in the fake password
    - value: 'https://portal.example.org/login:jdoe:S3cretValue'
      description: url:user:pass stealer-log triple with fake credentials
  should_not_match:
    - value: 'john.doe@example.com'
      description: Email address alone, no colon-delimited password
    - value: 'note to self: rotate the leaked passwords tomorrow'
      description: Prose containing a label and a keyword but no credential pair
    - value: 'time is 12:30 and the meeting is set'
      description: Colon-delimited time/text, not a credential pair
false_positives:
  - description: 'URLs with embedded ports (host:port) or key/value config lines that resemble a credential pair.'
    mitigation: Require corroborative combolist/stealer keywords and prefer lines that appear in bulk (many similar lines) before alerting.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  Combolists and stealer logs aggregate working credentials at scale and are the raw
  material for credential-stuffing and account-takeover campaigns. Possession of such
  a file indicates an active breach or staged exfiltration.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-09'
changelog:
  - version: 1.2.1
    date: '2026-07-09'
    description: >-
      Purview upload fix: remove (?:/\S*)? path group (groups of multi-match like
      .*/.+ are rejected with ClassificationRulePackageValidationException). Replace
      with bounded path segments (?:/[A-Za-z0-9._~%-]{1,64}){0,5}; tighten email and
      host bounds. Keeps email:pass and host[:port][/path]:user:pass combolist forms.
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-04'
    description: Rewrite Purview-banned regex construct (nested/unbounded quantifier) as bounded equivalent
author: testpattern-community
