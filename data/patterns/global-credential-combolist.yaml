schema: testpattern/v1
name: Credential Combolist / Stealer-Log Line
slug: global-credential-combolist
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects credential combolist / infostealer-log lines: email:password pairs and
  host-or-url:user:pass triples, the format in which stolen credentials are
  aggregated and traded after info-stealer infections. These dumps fuel credential
  stuffing and account-takeover attacks. A lone email/password candidate is
  discovery-only; service-bound triples and multi-row dump structure support
  enforcement.
operation: >-
  Pattern_combolist_line recognizes a bounded email:password candidate or a
  host/URL:user:password record. The 65 tier inventories one line. The 75 tier
  requires either a service-bound host/URL triple or explicit combolist/stealer-log
  context around an email pair. The 85 tier requires a dump-column header and at
  least two distinct records, proving list structure rather than a coincidental
  colon-delimited value. Enforcing tiers reject template and placeholder framing.
# Purview-safe: no group-of-star / group-of-dot-star (ClassificationRulePackageValidationException).
pattern: '[A-Za-z0-9._%+-]{1,64}@[A-Za-z0-9.-]{1,253}\.[A-Za-z]{2,24}:[^\s:]{4,128}|https://[A-Za-z0-9.-]{4,253}/[A-Za-z0-9._~%/?=&-]{1,160}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|http://[A-Za-z0-9.-]{4,253}/[A-Za-z0-9._~%/?=&-]{1,160}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|https://[A-Za-z0-9.-]{4,253}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|http://[A-Za-z0-9.-]{4,253}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|[A-Za-z0-9-]{1,63}\.[A-Za-z0-9.-]{2,189}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}'
confidence: medium
confidence_justification: >-
  Medium confidence: the email:password and host:user:pass structures are distinctive
  for credential dumps, but a colon-delimited token can also appear in URLs, config
  files and timestamps, so corroborating context is needed for high assurance.
jurisdictions:
  - global
regulations:
  - GDPR
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - combolist
    - combo list
    - stealer log
    - infostealer
    - credential dump
    - leaked passwords
    - logins
    - account takeover
  proximity: 300
test_cases:
  should_match:
    - value: 'john.doe@example.com:Hunter2Pass'
      description: Low-tier probe - one email/password candidate without dump context
    - value: 'https://portal.example.org/login:jdoe:S3cretValue'
      description: Medium-tier probe - one service-bound URL/user/password record
    - value: |-
        URL:LOGIN:PASSWORD
        https://portal.example.org/login:jdoe:S3cretValue
        mail.example.net:analyst:N7v!q2Lm9
      description: High-tier probe - dump header plus two distinct credential records
    - value: 'credential dump entry admin@mail.test:P@ssw0rd!'
      description: Medium-tier email/password candidate with explicit dump context
  should_not_match:
    - value: 'john.doe@example.com'
      description: Email address alone, no colon-delimited password
    - value: 'note to self: rotate the leaked passwords tomorrow'
      description: Prose containing a label and a keyword but no credential pair
    - value: 'time is 12:30 and the meeting is set'
      description: Colon-delimited time/text, not a credential pair
    - value: 'https://portal.example.org/login:username:password'
      description: Placeholder service triple must not enforce
    - value: 'Documentation example: https://portal.example.org/login:jdoe:S3cretValue'
      description: Documentation quoting a structurally valid row must not enforce
    - value: 'https://jdoe:S3cretValue@portal.example.org/login'
      description: Sibling HTTP userinfo URL is not the stealer-log URL:user:password layout
false_positives:
  - description: 'URLs with embedded ports (host:port) or key/value config lines that resemble a credential pair.'
    mitigation: Require corroborative combolist/stealer keywords and prefer lines that appear in bulk (many similar lines) before alerting.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_combolist_line
      min_count: 2
      unique_results: true
      matches:
        - ref: Evidence_service_credential_triple
        - ref: Evidence_dump_header
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_placeholder_credential
    - confidence_level: 75
      id_match: Pattern_combolist_line
      matches:
        - ref: Evidence_service_credential_triple
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_placeholder_credential
    - confidence_level: 75
      id_match: Pattern_combolist_line
      matches:
        - ref: Evidence_dump_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_placeholder_credential
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_combolist_line
  regexes:
    - id: Pattern_combolist_line
      pattern: '[A-Za-z0-9._%+-]{1,64}@[A-Za-z0-9.-]{1,253}\.[A-Za-z]{2,24}:[^\s:]{4,128}|https://[A-Za-z0-9.-]{4,253}/[A-Za-z0-9._~%/?=&-]{1,160}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|http://[A-Za-z0-9.-]{4,253}/[A-Za-z0-9._~%/?=&-]{1,160}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|https://[A-Za-z0-9.-]{4,253}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|http://[A-Za-z0-9.-]{4,253}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|[A-Za-z0-9-]{1,63}\.[A-Za-z0-9.-]{2,189}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}'
    - id: Evidence_service_credential_triple
      pattern: 'https://[A-Za-z0-9.-]{4,253}/[A-Za-z0-9._~%/?=&-]{1,160}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|http://[A-Za-z0-9.-]{4,253}/[A-Za-z0-9._~%/?=&-]{1,160}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|https://[A-Za-z0-9.-]{4,253}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|http://[A-Za-z0-9.-]{4,253}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}|[A-Za-z0-9-]{1,63}\.[A-Za-z0-9.-]{2,189}:[A-Za-z0-9._@%-]{2,64}:[^\s:]{4,128}'
    - id: Evidence_dump_header
      pattern: '(?i)\b(?:url|host|website)\s*[:;,|]\s*(?:login|user|username|email)\s*[:;,|]\s*(?:pass|password)\b'
  keywords:
    - id: Evidence_dump_context
      groups:
        - match_style: word
          terms:
            - combolist
            - combo list
            - stealer log
            - infostealer
            - credential dump
            - leaked credentials
    - id: Evidence_placeholder_credential
      groups:
        - match_style: string
          terms:
            - ':username:password'
            - ':user:pass'
            - CHANGEME
            - REDACTED
            - your-password-here
risk_description: >-
  This pattern detects an email-and-password pair or a host, username, and password triple in the formats used by combolists and infostealer logs. A genuine line can be used immediately for credential stuffing, account takeover, or access to the named service, and repeated lines indicate a broader stolen-credential dump. The normal detector unit is one line with serious direct harm to the account holder, while large-scale compromise depends on volume and credential validity outside the match. Risk 8 and SENSITIVE InfoTech fit one likely usable stolen-credential line; PROTECTED requires confirmed active credentials at material scale, privileged accounts, or significant organisation-wide compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-19'
changelog:
  - version: 1.3.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: add discovery-only single-line candidates, balanced service/dump-context enforcement, and high-confidence multi-row dump structure; add exact-tier and malformed, placeholder, documentation, and sibling-format probes.'
  - version: 1.2.3
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1531 without changing detector or package metadata.'
  - version: 1.2.1
    date: '2026-07-09'
    description: >-
      Purview upload fix: remove (?:/\S*)? path group (groups of multi-match like
      .*/.+ are rejected with ClassificationRulePackageValidationException). Replace
      with bounded path segments (?:/[A-Za-z0-9._~%-]{1,64}){0,5}; tighten email and
      host bounds. Keeps email:pass and host[:port][/path]:user:pass combolist forms.
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-04'
    description: Rewrite Purview-banned regex construct (nested/unbounded quantifier) as bounded equivalent
