schema: testpattern/v1
name: Board Paper
slug: au-board-paper
version: 1.3.0
type: keyword_list
pattern_class: concept
description: Detects board papers, board memoranda, and governance documents prepared for board of directors consideration.
operation: >-
  Keyword-based detection matching board paper, board memorandum, board resolution, and committee report patterns.
  Corroborative evidence: 13 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- DISP
- ISO 27001
- NIST CSF
data_categories:
  - government
  - governance
test_cases:
  should_match:
    - value: 'Board paper: for board consideration and approval'
      description: Test match 1
    - value: Board memorandum to audit committee regarding risk governance
      description: Test match 2
    - value: Board meeting pack with board resolution and decision items
      description: Test match 3
  should_not_match:
    - value: White board used in the meeting room
      description: Non-match 1
    - value: Board game night at the community centre
      description: Non-match 2
false_positives:
  - description: Generic use of board in non-governance contexts.
    mitigation: Require governance-specific keywords like board paper, memorandum, or committee.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: Board paper exposure reveals governance deliberations and strategic decisions.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_board_paper
      matches:
        - ref: Keyword_board
        - ref: Keyword_confidential
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_board_resolution
      matches:
        - ref: Keyword_directors
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_board_paper
      pattern: (?i)\b(?:board\s+(?:paper|memorandum|pack)|for\s+board\s+(?:consideration|approval))\b
    - id: Regex_board_resolution
      pattern: (?i)\b(?:board\s+(?:resolution|decision)|(?:audit|risk|remuneration)\s+committee\s+report)\b
  keywords:
    - id: Keyword_board
      groups:
        - match_style: word
          terms:
            - board
            - board of directors
            - board meeting
            - board paper
            - board memorandum
            - for board consideration
            - board approval
      strength: specific
    - id: Keyword_confidential
      groups:
        - match_style: word
          terms:
            - confidential
            - restricted
            - internal only
            - not for distribution
            - limited distribution
            - EMBARGOED
            - DRAFT - NOT FOR CIRCULATION
            - FOR AUTHORIZED RECIPIENTS ONLY
            - FOR AUTHORISED RECIPIENTS ONLY
            - DO NOT DISTRIBUTE
            - DO NOT FORWARD
      strength: specific
    - id: Keyword_directors
      groups:
        - match_style: word
          terms:
            - directors
            - board resolution
            - audit committee
            - risk committee
            - remuneration committee
            - governance
      strength: specific
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - board paper
  - board memorandum
  - board pack
  - board meeting
  - board of directors
  - for board consideration
  - board approval
  - board resolution
  - board decision
  - audit committee
  - risk committee
  - remuneration committee
  - governance
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
