schema: testpattern/v1
name: Sanctions Compliance Legal Assessment
slug: sanctions-compliance-legal-assessment
version: 1.5.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects internal legal assessments evaluating compliance with sanctions regimes (DFAT, OFAC, EU). Disclosure reveals identified compliance gaps, risk exposures, and remediation strategies before implementation, exposing the organisation to criminal prosecution under the Autonomous Sanctions Act 2011.
operation: 'Primary detection: keyword proximity matching sanctions terms (''sanctions'', ''sanctioned'', ''DFAT'', ''OFAC'', ''sanctions list'') within 200 characters of legal assessment terms (''legal assessment'', ''compliance assessment'', ''legal opinion'', ''risk assessment'', ''privilege'', ''PROTECTED''). Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:sanctions?|DFAT|OFAC|sanctioned\s+(?:entity|person|list))\b
confidence: low
confidence_justification: 'Medium confidence: Sanctions + legal/compliance assessment + privilege markers targets internal compliance vulnerability analysis. The combination eliminates public sanctions lists and news reporting about sanctions regimes.'
jurisdictions:
  - global
regulations:
- "Autonomous Sanctions Act 2011 (Cth)"
frameworks:
- QGISCF
data_categories:
  - legal
corroborative_evidence:
  keywords:
    - legal assessment
    - compliance assessment
    - legal opinion
    - risk assessment
    - privilege
    - PROTECTED
    - compliance gap
    - remediation
    - designated person
    - consolidated list
    - screening
    - exposure
  proximity: 300
  keyword_lists:

    - corporate-legal
test_cases:
  should_match:
    - value: 'Sanctions compliance working note.'
      description: Exact 65 discovery probe - sanctions topic without legal assessment or a concrete finding
    - value: 'Sanctions compliance legal assessment for DFAT screening controls.'
      description: Exact 75 probe - internal legal-assessment context without a populated exposure finding or marking
    - value: 'PRIVILEGED DFAT sanctions legal assessment: screening gaps permit Vendor X payment, creating breach exposure and requiring remediation.'
      description: Exact 85 probe - legal assessment, concrete finding, and privilege marking
    - value: |-
        PROTECTED — LEGAL PROFESSIONAL PRIVILEGE
        Sanctions Compliance Legal Assessment

        Prepared for: Chief Financial Officer
        Subject: DFAT Consolidated List Screening Gaps

        This privileged legal assessment identifies three compliance gaps in the current sanctions screening process. Payments to Entity X may constitute a breach of the Autonomous Sanctions Act 2011.
      description: Sanctions compliance assessment identifying screening gaps
    - value: This confidential legal opinion addresses the organisation's exposure under OFAC secondary sanctions. The risk assessment identifies 12 counterparties requiring enhanced due diligence. Compliance gaps in the current screening process require immediate remediation.
      description: Legal opinion on OFAC sanctions exposure
    - value: |-
        CONFIDENTIAL — PRIVILEGED
        Sanctions Risk Assessment

        The legal assessment of our sanctions compliance framework identifies material deficiencies in screening of sanctioned entities on the DFAT consolidated list. Remediation strategy attached.
      description: Sanctions risk assessment with remediation strategy
    - value: 'PRIVILEGED DFAT legal assessment: Autonomous Sanctions compliance gap permits Vendor X payment; exposure high; remediation of control SC-4 recommended before any further payment.'
      description: Internal regime assessment with identified gap, exposure, and remediation (reaches the 75 policy tier)
  should_not_match:
    - value: The Australian Government has imposed sanctions on several entities under the Autonomous Sanctions Act 2011. The DFAT consolidated list of sanctioned persons is publicly available on the DFAT website.
      description: Public information about Australian sanctions regime
    - value: This article discusses the development of international sanctions regimes including OFAC, EU, and Australian sanctions frameworks. The academic analysis examines enforcement trends.
      description: Academic article on sanctions law
    - value: A media report noted that the company was fined for breaching OFAC sanctions. The published enforcement action details are available on the OFAC website.
      description: News about published sanctions enforcement action
    - value: OFAC published an updated sanctions list and public guidance.
      description: Public list activity without internal assessment evidence (discovery inventory only)
    - value: The sports league imposed sanctions for a rules breach.
      description: Non-regulatory disciplinary sanctions outside scope (no corroborative legal-assessment evidence)
false_positives:
  - description: Public sanctions lists and DFAT consolidated list
    mitigation: Negative match on 'publicly available', 'DFAT website', 'consolidated list published'. Require legal/compliance assessment context
  - description: Academic analysis of sanctions regimes
    mitigation: Require co-occurrence with internal assessment language and privilege/PROTECTED markers
  - description: Published enforcement actions for sanctions breaches
    mitigation: Negative match on 'fined', 'enforcement action', 'published', 'OFAC website'
  - description: Sanctions policy frameworks and procedures (non-assessment)
    mitigation: Require compliance gap/vulnerability language within proximity window
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence_level: 85
      id_match: primary
      matches:
        - ref: Evidence_sanctions_legal_assessment
        - ref: Evidence_sanctions_finding
        - ref: Evidence_sanctions_marking
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - exclusion
      description: Sanctions matter with legal-assessment context, a concrete exposure/control finding, and a privilege or confidentiality marking
    - tier: medium
      confidence_level: 75
      id_match: primary
      matches:
        - ref: Evidence_sanctions_legal_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - exclusion
      description: Sanctions/regime phrase plus independent legal-assessment context, gated by public-source exclusions
    - tier: low
      confidence_level: 65
      id_match: primary
      discovery_only: true
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - exclusion
      description: Sanctions/regime terminology for discovery inventory only
  regexes:
    - pattern: (?i)\b(?:DFAT|OFAC)\b
      description: Sanctions authority abbreviation
    - pattern: (?i)\bsanctions?\s+(?:compliance|assessment|screening)\b
      description: Sanctions compliance phrase
  keywords:
    - id: primary
      groups:
        - match_style: word
          terms:
            - sanctions
            - DFAT
            - OFAC
            - sanctions list
            - sanctioned entity
            - sanctions compliance
      strength: domain
    - id: Evidence_sanctions_legal_assessment
      groups:
        - match_style: word
          terms:
            - legal assessment
            - compliance assessment
            - legal opinion
            - risk assessment
            - internal counsel advice
            - legal review
      strength: domain
    - id: Evidence_sanctions_finding
      groups:
        - match_style: word
          terms:
            - compliance gap
            - compliance gaps
            - screening gap
            - screening gaps
            - material deficiency
            - material deficiencies
            - breach exposure
            - control failure
            - remediation required
            - counterparties requiring
            - permits Vendor
      strength: domain
    - id: Evidence_sanctions_marking
      groups:
        - match_style: word
          terms:
            - privilege
            - privileged
            - legal professional privilege
            - PROTECTED
            - CONFIDENTIAL
            - prepared for counsel
      strength: domain
    - id: exclusion
      groups:
        - match_style: word
          terms:
            - publicly available
            - DFAT website
            - OFAC website
            - academic
            - fined
            - enforcement action published
      strength: domain
  filters:
    - type: exclude_keyword
      values:
        - public sanctions list
        - published enforcement
        - DFAT website
      description: Exclude public sanctions information
risk_rating: 7
risk_description: >-
  This concept detector finds an internal legal or compliance assessment of sanctions exposure, screening gaps, affected counterparties, and remediation under regimes such as DFAT or OFAC. Premature disclosure can alert counterparties, reveal control weaknesses, and weaken the organisation's position before remediation or regulator engagement. Public sanctions lists, published enforcement actions, policy frameworks, and academic analysis are excluded, but the remaining low-confidence topic match still needs corroboration. Risk 7 supports SENSITIVE Legal; PROTECTED would require an active major evasion operation, protected intelligence, or systemic control compromise with significant consequences.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-02-20'
updated: '2026-07-19'
changelog:
  - version: 1.5.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: split legal-assessment, concrete exposure/finding, and privilege/marking evidence into canonical keyword references; add distinct 65 discovery, 75 legal-context, and 85 populated privileged-assessment tiers with exact probes while preserving public-list, academic, enforcement, and sports negatives.'
  - version: 1.4.0
    date: '2026-07-17'
    description: 'TP-01579 approved reduced scope: add a policy-capable 75 tier wiring the existing primary keyword group to the existing corroborative group, NOT-gated by the existing exclusion group; the existing public-sanctions exclude_keyword filter continues to apply (all references pre-existing; no new detection structure). The 65 tier remains discovery-only. Deferred per QA/independent review: the proposed 85 tier, pending a split of legal-assessment, concrete-exposure/finding, remediation, and privilege/marking evidence into separate references. Added an internal gap/remediation positive plus public-list and sports-sanctions negatives.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1469 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-12'
    description: 'Baseline burn-down B: the sole pattern_tier had id_match: '''' (empty string) — idMatchIds() treats an empty id_match string as [], so scripts/verify-pattern-testcases.mjs tierEvaluable() filtered the tier out entirely (0 evaluable tiers), which routed should_not_match evaluation through the hard-fail no-tiers-to-gate-it path instead of the discovery_only warn path the tier was designed for. Wired id_match to the existing purview.keywords group id primary (already registered under the group: primary key), making the tier evaluable again; the tier remains discovery_only so a top-level hit on the academic-article negative now surfaces only as a discovery-inventory warning, not a should_not_match failure. Verified: 0 FAILs, all 3 should_not_match negatives clear; all 3 should_match positives still pass via top-level pattern.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) — no tier referenced it and the legacy tier shape carries no evidence lists to wire it into (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
