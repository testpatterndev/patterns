schema: testpattern/v1
name: Records of processing activities
slug: au-top500-462-records-of-processing-activities
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to records of processing activities in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:records\s+of\s+processing\s+activities|processing\s+activities|data\s+processing|lawful\s+basis|purpose\s+limitation|data\s+controller|data\s+processor|personal\s+information|APP\s+entity)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - records of processing activities
    - records
    - processing
    - activities
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: records of processing activities
      description: Primary topic phrase match
    - value: processing activities
      description: Case-insensitive topic phrase match
    - value: data processing
      description: Alternative topic phrase match
    - value: lawful basis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to records of processing activities appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_processing_activities
      matches:
        - ref: Evidence_processing_activities
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_processing_activities
      matches:
        - ref: Evidence_processing_activities
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_processing_activities
      matches:
        - ref: Evidence_processing_activities
  regexes:
    - id: Pattern_processing_activities
      pattern: >-
        (?is)\b(?:records\s+of\s+processing\s+activities|processing\s+activities|data\s+processing|lawful\s+basis|purpose\s+limitation|data\s+controller|data\s+processor|personal\s+information|APP\s+entity)\b
  keywords:
    - id: Evidence_processing_activities
      groups:
        - match_style: word
          terms:
            - records of processing activities
            - processing activities
            - ROPA
            - data processing
            - lawful basis
            - purpose limitation
            - data controller
            - data processor
            - personal information
            - privacy
            - compliance
            - APP entity
risk_description: >-
  The detector recognises records of processing activities, data processing, lawful basis, controller and processor relationships, purposes, recipient categories, and related privacy-governance language. A populated ROPA can reveal how an organisation collects, shares, retains, and transfers categories of personal data, helping an attacker, complainant, or competitor identify valuable processes or governance gaps. The normal register describes categories rather than individual records, and Article 30 guidance or blank templates can readily match. Risk 5 OFFICIAL captures the bounded exposure; SENSITIVE is not met without detailed live systems, vulnerable populations, named recipients, or actionable transfer and control weaknesses.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
