schema: testpattern/v1
name: Birth certificate number
slug: au-top500-027-birth-certificate-number
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to birth certificate number in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:birth\s+certificate|birth\s+registration|certificate\s+number|registration\s+number|births\s+deaths\s+marriages|birth\s+record|certificate\s+of\s+birth|registered\s+birth|vital\s+record)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - birth certificate number
    - birth
    - certificate
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:

    - credentials
test_cases:
  should_match:
    - value: birth certificate
      description: Primary topic phrase match
    - value: birth registration
      description: Case-insensitive topic phrase match
    - value: certificate number
      description: Alternative topic phrase match
    - value: registration number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to birth certificate number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_birth_certificate
      matches:
        - ref: Evidence_birth_certificate
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_027_birth_certificate_number_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_birth_certificate
      matches:
        - ref: Evidence_birth_certificate
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_027_birth_certificate_number_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_birth_certificate
      matches:
        - ref: Evidence_birth_certificate
  regexes:
    - id: Pattern_birth_certificate
      pattern: (?is)\b(?:birth\s+certificate|birth\s+registration|certificate\s+number|registration\s+number|births\s+deaths\s+marriages|birth\s+record|certificate\s+of\s+birth|registered\s+birth|vital\s+record)\b
    - id: Pattern_au_top500_027_birth_certificate_number_label_context
      pattern: (?i)\\b(?:birth\\s+certificate\\s+number|birth|certificate|top500)\\b
  keywords:
    - id: Evidence_birth_certificate
      groups:
        - match_style: word
          terms:
            - birth certificate
            - birth registration
            - certificate number
            - registration number
            - BDM
            - births deaths marriages
            - birth record
            - certificate of birth
            - registered birth
            - vital record
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_027_birth_certificate_number_domain_context
      groups:
        - match_style: word
          terms:
            - birth certificate number
            - birth
            - certificate
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_027_birth_certificate_number_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
