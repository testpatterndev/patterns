schema: testpattern/v1
name: Pricing strategy models
slug: au-top500-192-pricing-strategy-models
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to pricing strategy models in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:pricing\s+strategy|pricing\s+model|price\s+optimization|margin\s+analysis|price\s+elasticity|competitive\s+pricing|discount\s+structure|pricing\s+tier|cost[\s-]+plus\s+pricing|value[\s-]+based\s+pricing|price\s+sensitivity|rate\s+card)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - pricing strategy models
    - pricing
    - strategy
    - models
    - mergers
    - acquisitions
  proximity: 300
test_cases:
  should_match:
    - value: pricing strategy
      description: Primary topic phrase match
    - value: pricing model
      description: Case-insensitive topic phrase match
    - value: price optimization
      description: Alternative topic phrase match
    - value: margin analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to pricing strategy models appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pricing_strategy
      matches:
        - ref: Evidence_pricing_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_pricing_strategy
      matches:
        - ref: Evidence_pricing_strategy
    - confidence_level: 65
      id_match: Pattern_pricing_strategy
      matches:
        - ref: Evidence_pricing_strategy
  regexes:
    - id: Pattern_pricing_strategy
      pattern: (?is)\b(?:pricing\s+strategy|pricing\s+model|price\s+optimization|margin\s+analysis|price\s+elasticity|competitive\s+pricing|discount\s+structure|pricing\s+tier|cost[\s-]+plus\s+pricing|value[\s-]+based\s+pricing|price\s+sensitivity|rate\s+card)\b
  keywords:
    - id: Evidence_pricing_strategy
      groups:
        - match_style: word
          terms:
            - pricing strategy
            - pricing model
            - price optimization
            - margin analysis
            - price elasticity
            - competitive pricing
            - discount structure
            - pricing tier
            - cost-plus pricing
            - value-based pricing
            - price sensitivity
            - rate card
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.accc.gov.au/business/competition-and-exemptions/cartels
  - https://www.accc.gov.au/business/competition-and-exemptions
