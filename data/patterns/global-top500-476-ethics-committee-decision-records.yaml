schema: testpattern/v1
name: Ethics committee decision records
slug: global-top500-476-ethics-committee-decision-records
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to ethics committee decision records in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:ethics\s+committee|decision\s+record|ethics\s+review|research\s+ethics|committee\s+deliberation|ethical\s+approval|committee\s+vote|ethics\s+board|informed\s+consent|privacy\s+compliance|committee\s+minutes|ethical\s+assessment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - ethics committee decision records
    - ethics
    - committee
    - decision
    - records
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: ethics committee
      description: Primary topic phrase match
    - value: decision record
      description: Case-insensitive topic phrase match
    - value: ethics review
      description: Alternative topic phrase match
    - value: research ethics
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to ethics committee decision records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_ethics_committee
      matches:
        - ref: Pattern_global_top500_476_ethics_committee_decision_records_label_context
        - ref: Keyword_global_top500_476_ethics_committee_decision_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ethics_committee
      matches:
        - ref: Keyword_ethics_committee
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_ethics_committee
      matches:
        - ref: Keyword_ethics_committee
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ethics_committee
      pattern: >-
        (?is)\b(?:ethics\s+committee|decision\s+record|ethics\s+review|research\s+ethics|committee\s+deliberation|ethical\s+approval|committee\s+vote|ethics\s+board|informed\s+consent|privacy\s+compliance|committee\s+minutes|ethical\s+assessment)\b
    - id: Pattern_global_top500_476_ethics_committee_decision_records_label_context
      pattern: (?i)\\b(?:ethics\\s+committee\\s+decision\\s+records|ethics|committee|decision|top500)\\b
  keywords:
    - id: Keyword_ethics_committee
      groups:
        - match_style: word
          terms:
            - ethics committee
            - decision record
            - ethics review
            - research ethics
            - committee deliberation
            - ethical approval
            - committee vote
            - ethics board
            - informed consent
            - privacy compliance
            - committee minutes
            - ethical assessment
    - id: Keyword_global_top500_476_ethics_committee_decision_records_domain_context
      groups:
        - match_style: word
          terms:
            - ethics committee decision records
            - ethics
            - committee
            - decision
