schema: testpattern/v1
name: South Africa Passport Number
slug: za-passport-number
version: 1.0.0
type: regex
engine: boost_regex
case_sensitive: true
description: >-
  Detects South African passport numbers issued by the Department of Home Affairs under the South African
  Passports and Travel Documents Act 4 of 1994. Passport numbers are nine characters: one uppercase prefix
  letter identifying the passport type — A (normal/tourist), M (maxi), E (official), D (diplomatic),
  T (travel document) — followed by eight digits (SARS documents current issuance as starting A0, M0, E0).
operation: >-
  Regex pattern (boost_regex engine, case-sensitive). Pattern_za_passport matches one of the documented
  type-prefix letters (A, D, E, M, T) followed by exactly eight digits. Three confidence tiers: High (85)
  requires passport evidence (min 2 unique terms) with template exclusion; Medium (75) requires passport
  evidence with template exclusion; Low (65) requires passport evidence. Evidence uses one keyword group
  (English and Afrikaans passport terms plus the issuing authority) within 300-character proximity. No
  checksum is published for the passport number, so structure plus keyword evidence is the strongest gate;
  AllDigitsSameFilter suppresses repeated-digit placeholders in the numeric block.
pattern: \b[ADEMT]\d{8}\b
confidence: medium
confidence_justification: >-
  Medium confidence: a documented prefix letter plus exactly eight digits is structurally distinctive, but
  invoice, order and serial codes can share the letter-plus-digits shape, so corroborating passport keywords
  are required on every tier. recommended_confidence is the evidence-gated 75 workhorse tier per registry
  convention.
jurisdictions:
  - za
regulations:
  - POPIA
  - South African Passports and Travel Documents Act 4 of 1994
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - passport number
    - travel document
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: 'Passport A04564891 (South African passport, Department of Home Affairs)'
      description: Normal tourist passport number (A prefix) with label context
    - value: 'paspoortnommer M04567890'
      description: Maxi passport number (M prefix) with Afrikaans label
    - value: 'D98765432'
      description: Diplomatic passport number (D prefix)
    - value: 'Official travel on E01230456 was approved'
      description: Official passport number (E prefix)
  should_not_match:
    - value: 'B01234567'
      description: B is not a documented South African passport type prefix
    - value: 'A0123456'
      description: Only seven digits after the prefix — too short
    - value: 'A012345678'
      description: Nine digits after the prefix — too long
    - value: 'a01234567'
      description: Lowercase prefix — passport numbers are printed uppercase (pattern is case-sensitive)
    - value: '8501015800084'
      description: Thirteen-digit South African ID number, not a passport number
false_positives:
  - description: Product codes, invoice or serial references of the form single-letter-plus-eight-digits beginning with A, D, E, M or T.
    mitigation: Every tier requires passport keywords within the 300-character proximity window; high and medium tiers additionally apply the template-exclusion NOT-group.
  - description: Sample passport numbers in Home Affairs application guidance and templates.
    mitigation: The high and medium tiers apply the template-exclusion NOT-group to suppress sample and documentation content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  Passport numbers are high-value identity documents used for international travel and identity verification.
  Compromise enables identity fraud, unauthorized border crossings, and creation of fraudulent documents.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_za_passport
      matches:
        - ref: Evidence_za_passport
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_za_passport
      matches:
        - ref: Evidence_za_passport
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_za_passport
      matches:
        - ref: Evidence_za_passport
  regexes:
    - id: Pattern_za_passport
      pattern: \b[ADEMT]\d{8}\b
  keywords:
    - id: Evidence_za_passport
      groups:
        - match_style: word
          terms:
            - passport
            - passport number
            - passport no
            - South African passport
            - SA passport
            - paspoort
            - paspoortnommer
            - Department of Home Affairs
            - Home Affairs
            - travel document
            - maxi passport
            - diplomatic passport
      strength: specific
  filters:
    - id: Filter_za_passport_same_digits
      type: AllDigitsSameFilter
references:
  - url: https://www.oecd.org/content/dam/oecd/en/topics/policy-issue-focus/aeoi/south-africa-tin.pdf
    title: OECD AEOI portal — South Africa TIN information (SARS-authored; Appendix II documents passport types and A0/M0/E0 number prefixes)
  - url: https://www.southafrica-usa.net/homeaffairs/faqs.htm
    title: South African Home Affairs (US mission) passport FAQ — prefix letters A, M, D, T and eight digits
created: '2026-07-08'
updated: '2026-07-08'
changelog:
  - version: 1.0.0
    date: '2026-07-08'
    description: Initial release
