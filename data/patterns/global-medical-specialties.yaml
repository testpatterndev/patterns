schema: testpattern/v1
name: Medical Specialties
slug: global-medical-specialties
version: 1.3.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Medical Specialties patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that identifies health and medical terminology in documents.
  Keyword matching is used to flag content containing medical language.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  health and medical terminology to identify protected health information.
keywords:
  - cardiology
  - dermatology
  - endocrinology
  - gastroenterology
  - hematology
  - neurology
  - oncology
  - ophthalmology
  - orthopedics
  - pediatrics
  - psychiatry
  - radiology
  - urology
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on medical terms requires additional context for
  accurate detection. Medical terminology may appear in educational, research, or general
  health content without constituting protected health information.
jurisdictions:
  - global
regulations:
- GDPR
- HIPAA
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - phi
  - health
test_cases:
  should_match:
    - value: "patient diagnosed with cardiology"
      description: Contains medical keyword 'cardiology'
    - value: "treatment plan includes dermatology"
      description: Contains medical keyword 'dermatology'
    - value: "clinical notes reference endocrinology"
      description: Contains medical keyword 'endocrinology'
  should_not_match:
    - value: "quarterly revenue report for fiscal year 2024"
      description: Financial text with no medical terminology
    - value: "the project deadline has been moved to next Friday"
      description: Business scheduling text with no health terms
false_positives:
  - description: Educational or research materials discussing medical topics without containing actual patient data
    mitigation: >-
      Layer with PII detection to confirm medical terms appear alongside patient identifiers.
  - description: News articles or general health information websites mentioning medical conditions
    mitigation: >-
      Use document classification to distinguish clinical records from public health content.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_medical_specialties
      matches:
        - ref: Keyword_medical_specialties_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_medical_specialties
  keywords:
    - id: Keyword_medical_specialties
      groups:
        - match_style: word
          terms:
            - cardiology
            - dermatology
            - endocrinology
            - gastroenterology
            - hematology
            - neurology
            - oncology
            - ophthalmology
            - orthopedics
            - pediatrics
            - psychiatry
            - radiology
            - urology
      strength: domain
    - id: Keyword_medical_specialties_context
      groups:
        - match_style: word
          terms:
            - patient
            - referral
            - specialist
            - consultation
            - department
            - clinic
            - hospital
            - physician
            - medical record
            - appointment
            - treatment
            - diagnosis
      strength: domain
risk_rating: 3
risk_description: >-
  This low-confidence keyword list identifies specialty names such as cardiology, dermatology, and endocrinology rather than a referral, diagnosis, appointment, or patient record. A specialty term may help locate nearby clinical content, but by itself it says nothing about who received care or what condition was treated. The normal match is public professional vocabulary used in provider directories, education, research, news, and service descriptions. Risk 3 and OFFICIAL reflect negligible standalone confidentiality harm, while a specialty linked to an identifiable referral or sensitive clinic attendance would raise the surrounding record to SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-medical-specialities
    title: "Medical Specialties entity definition - Microsoft Learn"
