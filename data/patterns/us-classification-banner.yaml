schema: testpattern/v1
name: U.S. National Security Classification Banner
slug: us-classification-banner
version: 1.1.0
type: regex
engine: universal
description: >-
  Detects U.S. national-security classification banner and portion markings (per Executive Order 13526 and the
  Intelligence Community marking system): a classification level — TOP SECRET, SECRET, CONFIDENTIAL — followed by one or
  more "//"-separated control or dissemination markings (SI, TK, HCS, SCI, SAP, NOFORN, ORCON, REL TO ...), or a
  parenthetical portion mark such as (S//NF) or (TS//SI). The bare words "secret" and "confidential" are far too common
  to match alone, so a match requires the "//" control structure or a parenthetical portion mark.
operation: >-
  Two regexes. The first matches a full banner: a classification level token immediately followed by "//" and a control
  marking. The second matches a parenthetical portion mark like (S//NF) or (TS//SI//NF). Corroborative classification
  keywords within 300 characters reinforce the context.
pattern: \b(?:TOP\s+SECRET|SECRET|CONFIDENTIAL)//(?:SI|TK|HCS|SCI|SAP|NOFORN|NF|ORCON|OC|REL\s+TO[\sA-Z,]+|FGI|RD|FRD)(?:/(?:SI|TK|HCS|SCI|SAP|NOFORN|NF|ORCON|OC|FGI|RD|FRD))*\b
confidence: high
confidence_justification: >-
  High confidence: the "//" control structure and the parenthetical portion-mark syntax are unique to U.S. classification
  banners. Requiring the structure prevents the common English words "secret" and "confidential" from triggering matches.
jurisdictions:
  - us
regulations:
  - "Executive Order 13526"
  - "NIST SP 800-53"
  - FISMA
frameworks:
  - NIST CSF
  - ISO 27001
  - SOC 2
data_categories:
  - government
  - security-classification
corroborative_evidence:
  keywords:
    - classification
    - classified
    - top secret
    - secret
    - confidential
    - NOFORN
    - ORCON
    - REL TO
    - SCI
    - sensitive compartmented information
    - declassify on
    - derived from
    - portion marking
  proximity: 300
test_cases:
  should_match:
    - value: TOP SECRET//SI//NOFORN
      description: Top Secret banner with SI compartment and NOFORN control
    - value: 'Header: SECRET//REL TO USA, FVEY'
      description: Secret banner with releasability control
    - value: (TS//SI//NF)
      description: Parenthetical Top Secret portion mark
  should_not_match:
    - value: This information is secret and must stay confidential
      description: Bare words "secret" and "confidential" in prose, no banner structure
    - value: CONFIDENTIAL business plan attached
      description: '"CONFIDENTIAL" alone with no "//" control marking'
    - value: CUI//SP-PRVCY//NOFORN
      description: CUI banner, not a national-security classification level
false_positives:
  - description: >-
      Templates, training decks, or marking guides that quote example banners (TOP SECRET//SI) for instructional
      purposes rather than marking real classified content.
    mitigation: >-
      Require corroborative classification keywords (declassify on, derived from, portion marking) and exclude known
      training-material file paths.
  - description: Fiction, news reporting, or historical documents reproducing classification banners.
    mitigation: Layer with document-source metadata to distinguish operational documents from published/quoted content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 10
risk_description: >-
  National-security classification banners mark information whose unauthorised disclosure could cause damage to U.S.
  national security. Mishandling classified markings can constitute a federal offence and a reportable security
  incident.
sensitivity_labels:
  pspf: "SECRET"
  qgiscf: "PROTECTED"
  qgiscf_dlm: "PROTECTED Government"
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Secret"
references:
  - url: https://www.dni.gov/files/documents/FOIA/Authorized%20Classification%20and%20Control%20Markings%20Register%20V1.2.pdf
    title: "Authorized Classification and Control Markings Register - ODNI"
  - url: https://www.dodig.mil/Portals/48/Documents/Policy/520001_vol2.pdf?ver=2017-04-25-160926-223
    title: "DoD Manual 5200.01 Vol 2 - Marking of Classified Information"
created: '2026-06-13'
updated: '2026-07-06'
changelog:
  - version: 1.1.0
    date: '2026-07-06'
    description: 'Purview export: add pattern_tiers mapping the regexes to confidence tiers (95 banner / 85 portion-mark) with shared noise-exclusion keywords; the block previously produced an empty RulePackage (no Entity nodes, export 422)'
author: testpattern-community
license: MIT
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 95
      id_match: Regex_classification_banner
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_classification_portion_mark
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_classification_banner
      pattern: \b(?:TOP\s+SECRET|SECRET|CONFIDENTIAL)//(?:SI|TK|HCS|SCI|SAP|NOFORN|NF|ORCON|OC|REL\s+TO[\sA-Z,]+|FGI|RD|FRD)(?:/(?:SI|TK|HCS|SCI|SAP|NOFORN|NF|ORCON|OC|FGI|RD|FRD))*\b
    - id: Regex_classification_portion_mark
      pattern: \((?:TS|S|C|U)//(?:SI|TK|HCS|SCI|SAP|NF|NOFORN|OC|ORCON|FGI|RD|FRD)(?://?(?:SI|TK|HCS|SCI|SAP|NF|NOFORN|OC|ORCON|FGI|RD|FRD))*\)
