author: testpattern-community
license: MIT
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 95
    id_match: Regex_classification_banner
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 85
    id_match: Regex_classification_portion_mark
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_classification_banner
    pattern: \b(?:TOP SECRET|SECRET|CONFIDENTIAL|TS|S|C)//(?:SI|TK|HCS|SCI|SAP|NOFORN|NF|ORCON|OC|FGI|RD|FRD)(?://(?:SI|TK|HCS|SCI|SAP|NOFORN|NF|ORCON|OC|FGI|RD|FRD)){0,4}\b|\b(?:TOP SECRET|SECRET|CONFIDENTIAL|TS|S|C)//REL TO [A-Z]{2,5}(?:,[ ]?[A-Z]{2,5}){0,5}\b
  - id: Regex_classification_portion_mark
    pattern: \((?:TS|S|C|U)//(?:SI|TK|HCS|SCI|SAP|NF|NOFORN|OC|ORCON|FGI|RD|FRD)(?://(?:SI|TK|HCS|SCI|SAP|NF|NOFORN|OC|ORCON|FGI|RD|FRD)){0,4}\)
