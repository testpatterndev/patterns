schema: testpattern/v1
name: U.S. National Security Classification Banner
slug: us-classification-banner
version: 1.3.2
type: regex
pattern_class: marking
engine: universal
description: >-
  Detects U.S. national-security classification banner and portion markings (per Executive Order 13526 and the
  Intelligence Community marking system): a classification level — TOP SECRET, SECRET, CONFIDENTIAL — followed by one or
  more "//"-separated control or dissemination markings (SI, TK, HCS, SCI, SAP, NOFORN, ORCON, REL TO ...), or a
  parenthetical portion mark such as (S//NF) or (TS//SI). The bare words "secret" and "confidential" are far too common
  to match alone, so a match requires the "//" control structure or a parenthetical portion mark.
operation: >-
  Two Purview-safe regexes (no groups containing multi-match .*/.+/.{n} or REL TO[class]+). Banner: level//control
  with up to four additional //control segments as fixed-token alts, plus a separate REL TO [A-Z]{2,5} branch.
  Portion mark: (level//control…) with the same bounded //control repeats. Keywords within 300 characters.
# Purview rejects groups of multi-match (e.g. REL\s+TO[\sA-Z,]+ and quantified (?:/{1,2}(...))* forms).
pattern: \b(?:TOP SECRET|SECRET|CONFIDENTIAL|TS|S|C)//(?:SI|TK|HCS|SCI|SAP|NOFORN|NF|ORCON|OC|FGI|RD|FRD)(?://(?:SI|TK|HCS|SCI|SAP|NOFORN|NF|ORCON|OC|FGI|RD|FRD)){0,4}\b|\b(?:TOP SECRET|SECRET|CONFIDENTIAL|TS|S|C)//REL TO [A-Z]{2,5}(?:,[ ]?[A-Z]{2,5}){0,5}\b
confidence: high
confidence_justification: >-
  High confidence: the "//" control structure and the parenthetical portion-mark syntax are unique to U.S. classification
  banners. Requiring the structure prevents the common English words "secret" and "confidential" from triggering matches.
jurisdictions:
- us
regulations:
- "Executive Order 13526"
- "NIST SP 800-53"
- FISMA
frameworks:
- NIST CSF
- ISO 27001
- SOC 2
data_categories:
- government
- security-classification
corroborative_evidence:
  keywords:
  - classification
  - classified
  - top secret
  - secret
  - confidential
  - NOFORN
  - ORCON
  - REL TO
  - SCI
  - sensitive compartmented information
  - declassify on
  - derived from
  - portion marking
  proximity: 300
test_cases:
  should_match:
  - value: TOP SECRET//SI//NOFORN
  - value: 'Header: SECRET//REL TO USA, FVEY'
  - value: (TS//SI//NF)
  - value: S//REL TO USA,FVEY
  - value: C//NOFORN
  should_not_match:
  - value: This information is secret and must stay confidential
  - value: CONFIDENTIAL business plan attached
  - value: CUI//SP-PRVCY//NOFORN
false_positives:
- description: >-
    Templates, training decks, or marking guides that quote example banners (TOP SECRET//SI) for instructional
    purposes rather than marking real classified content.
  mitigation: >-
    Require corroborative classification keywords (declassify on, derived from, portion marking) and exclude known
    training-material file paths.
- description: Fiction, news reporting, or historical documents reproducing classification banners.
  mitigation: Layer with document-source metadata to distinguish operational documents from published/quoted content.
exports:
- purview_xml
- yaml
- regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  The high-confidence regex detects structured United States national-security banners and portion marks such as TOP SECRET//SI//NOFORN, SECRET//REL TO, and bounded parenthetical control markings, identifying a marking signal rather than reading the underlying content. On a genuine operational document, the mark can denote intelligence sources, compartmented capabilities, foreign-release restrictions, or defence operations whose unauthorised transfer could cause significant national-security damage. Training decks, marking guides, news, fiction, and historical reproductions may quote the same syntax, so document source remains important despite the distinctive structure. Risk 9, PROTECTED, and Marking Protected treatment are justified for an authentic classified marking; PROTECTED is already the highest accepted QGISCF tier.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: Marking Protected
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Secret"
references:
- url: https://www.dni.gov/files/documents/FOIA/Authorized%20Classification%20and%20Control%20Markings%20Register%20V1.2.pdf
  title: "Authorized Classification and Control Markings Register - ODNI"
- url: https://www.dodig.mil/Portals/48/Documents/Policy/520001_vol2.pdf?ver=2017-04-25-160926-223
  title: "DoD Manual 5200.01 Vol 2 - Marking of Classified Information"
