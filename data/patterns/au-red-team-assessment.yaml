schema: testpattern/v1
name: Red Team Assessment
slug: au-red-team-assessment
version: 1.3.0
type: keyword_list
description: Detects red team assessment reports revealing proven attack paths and security blind spots.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "Criminal Code Act 1995 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - security
test_cases:
  should_match:
    - value: 'Red team assessment: attack path via initial access and lateral movement'
      description: Test match 1
    - value: Adversary simulation using MITRE ATT&CK kill chain and privilege escalation
      description: Test match 2
    - value: Red team report with purple team and blue team coordination findings
      description: Test match 3
  should_not_match:
    - value: Red team won the competition
      description: Non-match 1
    - value: Team-building exercise
      description: Non-match 2
false_positives:
  - description: Sports or team references.
    mitigation: Require security-specific terms like adversary simulation, MITRE ATT&CK, or attack path.
exports:
  - yaml
scope: narrow
risk_rating: 10
risk_description: Red team report exposure reveals proven attack paths and security blind spots.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: "PROTECTED InfoTech"
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_red_team
      matches:
        - ref: Keyword_attack_techniques
        - ref: Keyword_pentest_tools
    - confidence_level: 85
      id_match: Regex_red_team
      matches:
        - ref: Keyword_attack_techniques
    - confidence_level: 85
      id_match: Regex_red_team
      matches:
        - ref: Keyword_security_assessment
  regexes:
    - id: Regex_red_team
      pattern: >-
        (?i)\b(?:red\s+team\s+(?:assessment|report|exercise|engagement)|purple\s+team\s+(?:assessment|exercise)|adversary\s+simulation|attack\s+simulation\s+report)\b
  keywords:
    - id: Keyword_attack_techniques
      groups:
        - match_style: word
          terms:
            - attack vector
            - attack path
            - lateral movement
            - initial access
            - persistence
            - exfiltration
            - command and control
            - text: C2
              case_sensitive: true
            - MITRE ATT&CK
            - kill chain
      strength: specific
    - id: Keyword_pentest_tools
      groups:
        - match_style: word
          terms:
            - Nmap
            - Metasploit
            - Burp Suite
            - Nessus
            - Qualys
            - sqlmap
            - Wireshark
            - Cobalt Strike
            - Mimikatz
            - hashcat
      strength: domain
    - id: Keyword_security_assessment
      groups:
        - match_style: word
          terms:
            - security assessment
            - security audit
            - security review
            - security testing
            - security evaluation
            - executive summary
            - findings summary
            - risk summary
            - CVSS
            - text: CWE
              case_sensitive: true
            - vulnerability scan
            - Nessus
            - Qualys
            - Nmap
            - attack surface
      strength: specific
created: '2026-02-09'
updated: '2026-07-04'
changelog:
  - version: 1.3.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 3 duplicate 85-confidence tier(s) into the strictest canonical tier.; Aligned recommended_confidence to 85.
author: testpattern-community
license: MIT
keywords:
  - red team engagement
  - red team exercise
  - red team assessment
  - adversary simulation
  - attack simulation
  - purple team
  - blue team
  - attack path
  - kill chain
  - MITRE ATT&CK
  - lateral movement
  - privilege escalation
  - initial access
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 3 duplicate 85-confidence tier(s) into the strictest canonical tier.'
      - 'Aligned recommended_confidence to 85.'
