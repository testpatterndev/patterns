schema: testpattern/v1
name: Red Team Assessment
slug: au-red-team-assessment
version: 1.6.0
type: regex
pattern_class: concept
description: Detects red team assessment reports revealing proven attack paths and security blind spots.
operation: >-
  A red-team, purple-team, adversary-simulation, or attack-simulation title is discovery-only at 65.
  Attack-path, initial-access, persistence, lateral-movement, exfiltration, or ATT&CK evidence raises it
  to 75. The 85 tier additionally requires assessment findings, risk summary, security evaluation, or
  vulnerability results. Enforcing tiers reject templates and examples.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "Criminal Code Act 1995 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - security
test_cases:
  should_match:
    - value: 'Red team assessment'
      description: Low-tier probe - assessment title without technique or finding content
    - value: 'Red team assessment: attack path through initial access and lateral movement.'
      description: Medium-tier probe - adversary techniques without assessment findings
    - value: 'Red team report: attack path through lateral movement; findings summary and risk summary identify a security control gap.'
      description: High-tier probe - adversary technique plus assessed findings
  should_not_match:
    - value: Red team won the competition
      description: Sports-team sibling
    - value: Team-building exercise
      description: Workplace team exercise
    - value: 'The public conference agenda lists a red team assessment session.'
      description: Public programme mentions only the assessment title
    - value: 'Template example: red team assessment with an attack path, lateral movement, findings summary, and risk summary.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Sports or team references.
    mitigation: Require security-specific terms like adversary simulation, MITRE ATT&CK, or attack path.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The keyword-list detector combines red-team or adversary-simulation terminology with attack-path, MITRE ATT&CK, privilege-escalation, and team-coordination evidence; ordinary sports or team references are explicit non-matches. Disclosure of a genuine assessment could let a hostile party replay demonstrated initial-access and lateral-movement paths against the assessed organisation. The normal unit is one report with attack findings, not proof of enterprise-wide administrative control or critical-service failure. Risk 8 and SENSITIVE InfoTech reflect serious reusable reconnaissance; PROTECTED requires a demonstrated route to broad privileged compromise, critical-service disruption, or comparable significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_red_team
      matches:
        - ref: Keyword_attack_techniques
        - ref: Keyword_security_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_red_team
      matches:
        - ref: Keyword_attack_techniques
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_red_team
  regexes:
    - id: Regex_red_team
      pattern: >-
        (?i)\b(?:red\s+team\s+(?:assessment|report|exercise|engagement)|purple\s+team\s+(?:assessment|exercise)|adversary\s+simulation|attack\s+simulation\s+report)\b
  keywords:
    - id: Keyword_attack_techniques
      groups:
        - match_style: word
          terms:
            - attack vector
            - attack path
            - lateral movement
            - initial access
            - persistence
            - exfiltration
            - command and control
            - text: C2
              case_sensitive: true
            - MITRE ATT&CK
            - kill chain
      strength: specific
    - id: Keyword_pentest_tools
      groups:
        - match_style: word
          terms:
            - Nmap
            - Metasploit
            - Burp Suite
            - Nessus
            - Qualys
            - sqlmap
            - Wireshark
            - Cobalt Strike
            - Mimikatz
            - hashcat
      strength: domain
    - id: Keyword_security_assessment
      groups:
        - match_style: word
          terms:
            - security assessment
            - security audit
            - security review
            - security testing
            - security evaluation
            - executive summary
            - findings summary
            - risk summary
            - CVSS
            - text: CWE
              case_sensitive: true
            - vulnerability scan
            - Nessus
            - Qualys
            - Nmap
            - attack surface
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.6.0
    date: '2026-07-19'
    description: 'Profile quality: align the regex-backed detector type; replace duplicate high paths with title discovery, attack-technique medium, and findings-corroborated high tiers; add public/template adversarial probes.'
  - version: 1.5.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 591 without changing detector or package metadata.'
  - version: 1.5.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.3.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
