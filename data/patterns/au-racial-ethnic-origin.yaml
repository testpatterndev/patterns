schema: testpattern/v1
name: Racial or Ethnic Origin (Australia)
slug: au-racial-ethnic-origin
version: 1.2.0
type: keyword_list
pattern_class: concept
engine: universal
description: >-
  Detects references to racial or ethnic origin disclosure in Australian documents:
  racial/ethnic origin fields, ethnicity demographic fields, and racial/ethnic identity
  statements. Race is a protected attribute under the Racial Discrimination Act 1975 (Cth) —
  discrimination on this basis is unlawful, making its disclosure sensitive regardless of
  format. Topic-grade detector, low confidence by design.
operation: >-
  Phrase regex matching indicative racial/ethnic-origin disclosure terminology (racial origin,
  ethnic origin, race and ethnicity, ethnic background, ethnicity demographic field, racial
  identity, ethnic identity, race/ethnicity data field). Detects the presence of racial/ethnic
  subject matter in a disclosure/record context; not a structured-token detector. Pair with
  corroborative keywords to raise precision. Purview keeps the topic phrase at 65 discovery,
  requires an Australian workforce/intake record context at 75, and requires a populated
  attribution statement as well at 85.
pattern: '(?i)\b(?:racial\s+origin|ethnic\s+origin|race\s+and\s+ethnicity|ethnic\s+background|ethnicity\s+demographic\s+field|racial\s+identity|ethnic\s+identity|race\/ethnicity\s+data\s+field)\b'
confidence: low
confidence_justification: >-
  Low by design. Racial or ethnic origin has no fixed format, so it is detected purely by
  topic vocabulary. The bare word "origin" appears constantly in unrelated contexts (country
  of origin on customs/shipping forms, "original" documents); the regex is scoped to full
  disclosure phrases only, and hits should be paired with corroborative keywords (race,
  ethnicity, ancestry) to raise precision.
jurisdictions:
  - au
regulations:
  - Racial Discrimination Act 1975 (Cth)
  - Privacy Act 1988 (Cth)
  - NDB Scheme (Cth)
frameworks:
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - race
    - ethnicity
    - ethnic
    - ancestry
    - heritage
    - diversity survey
  proximity: 300
test_cases:
  should_match:
    - value: 'Racial origin disclosure topic pending review.'
      description: Exact 65 discovery probe - protected-attribute topic without a person-record context
    - value: 'Employee diversity survey includes an ethnic origin field.'
      description: Exact 75 probe - Australian workforce-record context without a populated response
    - value: 'Employee diversity survey response: ethnic origin recorded as Torres Strait Islander for the employee.'
      description: Exact 85 probe - person-record context plus a populated attribution statement
    - value: 'The diversity survey asks employees to record ethnic origin voluntarily.'
      description: Ethnic origin phrase present
    - value: 'Profile field captures racial identity alongside other equity data.'
      description: Racial identity phrase present
    - value: 'The intake form lists ethnic background under demographic information.'
      description: Ethnic background phrase present
  should_not_match:
    - value: 'Country of origin: Australia, per the customs declaration.'
      description: Near-miss ("origin" alone, "country of origin"), no racial/ethnic origin disclosure
    - value: 'The original document was notarized by a public official.'
      description: Unrelated root-word near-miss ("original" vs "origin")
    - value: 'The restaurant offers a variety of ethnic cuisines.'
      description: Topical mention ("ethnic" alone), no personal disclosure phrase
    - value: 'Public aggregate report on population ancestry statistics by region.'
      description: Public aggregate material is not a person-linked racial/ethnic disclosure
    - value: 'Sample template: employee diversity response, ancestry category recorded as Example Category.'
      description: Adjacent template language is not a populated protected-attribute record
    - value: 'Nationality recorded as Australian in the employee file.'
      description: Sibling nationality attribute does not satisfy the racial/ethnic-origin primary
false_positives:
  - description: >-
      The bare word "origin" appears in unrelated contexts (country of origin on
      customs/shipping documents, "original" documents) that have nothing to do with racial
      or ethnic origin.
    mitigation: >-
      The regex targets full disclosure phrases ("racial origin", "ethnic origin", "racial
      identity") rather than the bare word "origin"; require corroborative keywords (race,
      ethnicity, ancestry, heritage) for confidence.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: broad
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_racial_ethnic_origin_topic
      matches:
        - ref: Evidence_au_racial_record_context
        - ref: Evidence_au_racial_attribution
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_au_racial_public_context
    - confidence_level: 75
      id_match: Pattern_racial_ethnic_origin_topic
      matches:
        - ref: Evidence_au_racial_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_au_racial_public_context
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_racial_ethnic_origin_topic
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_au_racial_public_context
  regexes:
    - id: Pattern_racial_ethnic_origin_topic
      pattern: '(?i)\b(?:racial\s+origin|ethnic\s+origin|race\s+and\s+ethnicity|ethnic\s+background|ethnicity\s+demographic\s+field|racial\s+identity|ethnic\s+identity|race\/ethnicity\s+data\s+field)\b'
  keywords:
    - id: Evidence_au_racial_record_context
      groups:
        - match_style: word
          terms:
            - employee diversity survey
            - workforce profile
            - client intake
            - demographic record
            - respondent record
            - employee record
      strength: domain
    - id: Evidence_au_racial_attribution
      groups:
        - match_style: word
          terms:
            - recorded as
            - self-described
            - selected category
            - declared
            - 'response:'
            - employee response
            - client response
      strength: specific
    - id: Evidence_au_racial_public_context
      groups:
        - match_style: word
          terms:
            - public aggregate
            - aggregate statistics
            - policy guidance
            - census methodology
            - academic study
            - blank questionnaire
      strength: exclusion
risk_rating: 7
risk_description: >-
  Race is a protected attribute under the Racial Discrimination Act 1975 (Cth); disclosure can
  lead to discrimination, profiling, and targeted harassment.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI Basic
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-07-12'
updated: '2026-07-19'
changelog:
  - version: 1.2.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: retain topic phrases as 65 discovery, require an Australian workforce/intake record at 75 and a populated racial/ethnic attribution at 85; add exact-tier and sibling/public/template probes.'
  - version: 1.1.0
    date: '2026-07-17'
    description: >-
      Reduced-scope deployment wiring (TP-00113): add the missing purview block as a single 65
      discovery_only tier using the authored phrase regex verbatim — previously the classifier
      could not compile into a custom SIT at all. The first-pass candidate was deliberately
      narrowed: its topic regex added bare "ethnicity" (broadening past the authored
      full-phrase vocabulary the confidence justification restricts to) and its 75/85
      attributed-field tiers would recreate the deprecated attribute-value behaviour pending
      EDM/ML, with undefined evidence and exclusions — both rejected per QA. No enforcement.
  - version: 1.0.0
    date: '2026-07-12'
    description: 'New pattern: replaces the deprecated au/global-top500-017-ethnicity-or-race attribute-value patterns (needs-EDM/ML) with an honest topic-classifier concept, modeled on global-political-opinion but reframed on AU anti-discrimination law (Racial Discrimination Act 1975) rather than GDPR. Fills the D-wave coverage gap logged in c3-deprecation-report.md.'
author: testpattern-community
license: MIT
keywords:
  - racial origin
  - ethnic origin
  - race and ethnicity
  - ethnic background
  - ethnicity demographic field
  - racial identity
  - ethnic identity
  - race/ethnicity data field
references:
  - url: https://humanrights.gov.au/our-work/race-discrimination
    title: Race Discrimination — Australian Human Rights Commission
