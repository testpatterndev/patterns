schema: testpattern/v1
name: Class Action Defence Strategy
slug: class-action-defence-strategy
version: 1.4.2
type: keyword_proximity
pattern_class: concept
engine: universal
description: 'Detects defence strategy documents for class action proceedings against the State or State entities. These documents reveal the State''s vulnerability assessment and defence approach for claims potentially affecting thousands of claimants. Note: trainable classifier recommended for production using class action document structural features.'
operation: 'Primary detection: keyword proximity matching class action terms (''class action'', ''representative proceeding'', ''group proceeding'') within 200 characters of strategy/privilege terms (''defence strategy'', ''legal strategy'', ''privilege'', ''PROTECTED'', ''settlement authority'', ''exposure''). Trainable classifier fallback: document structure detection for class definition analysis, common questions assessment, opt-out/opt-in strategy, damages modelling. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:class\s+action|representative\s+proceeding|group\s+proceeding)\b
confidence: medium
confidence_justification: 'Medium confidence: Class action + defence strategy + privilege markers is specific to privileged litigation work product. The additional requirement for government entity context or privilege indicators eliminates news articles and plaintiff-side materials.'
jurisdictions:
  - global
regulations:
- "Civil Proceedings Act 2011 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
corroborative_evidence:
  keywords:
    - defence strategy
    - legal strategy
    - privilege
    - PROTECTED
    - settlement authority
    - exposure
    - class definition
    - common questions
    - opt-out
    - damages model
    - claimant
    - respondent
  proximity: 300
  keyword_lists:

    - corporate-legal
test_cases:
  should_match:
    - value: |-
        PROTECTED — LEGAL PROFESSIONAL PRIVILEGE
        Class Action Defence Strategy

        Matter: Johnson & Ors v State of Queensland
        Court: Federal Court — QUD 123/2025
        Class size (estimated): 4,200 claimants

        Defence Strategy:
        1. Class definition challenge — the proposed class is overbroad
        2. Common questions assessment — causation not common across class
      description: Class action defence strategy with class definition analysis
    - value: This privileged legal strategy for the representative proceeding assesses the State's exposure at $180M-$340M depending on class size. The defence strategy recommends challenging the opt-out mechanism and class definition before addressing merits.
      description: Privileged representative proceeding strategy with exposure estimate
    - value: |-
        CONFIDENTIAL — PRIVILEGED
        Group Proceeding Defence
        State of Queensland v [Class Action — Institutional Abuse Claims]

        Damages modelling: Best case $45M, worst case $280M
        Settlement authority required: $120M (recommended ceiling)
      description: Group proceeding defence with damages modelling
  should_not_match:
    - value: A class action has been filed against the State Government in the Federal Court. The representative proceeding alleges systemic failures in public hospital care affecting thousands of patients.
      description: News article about class action filing
    - value: This chapter examines class action procedure in Australia, including the requirements for representative proceedings under Part IVA of the Federal Court of Australia Act 1976.
      description: Academic textbook on class action procedure
    - value: The class action was settled for $85 million. The published settlement approval judgment outlines the distribution methodology for class members.
      description: Published class action settlement approval
false_positives:
  - description: News articles about class action filings and settlements
    mitigation: Negative match on 'filed', 'announced', 'settled for', 'media release'. Require privilege/PROTECTED markers
  - description: Academic materials on class action procedure
    mitigation: Require co-occurrence with government entity names and privilege markers
  - description: Published settlement approval judgments
    mitigation: Negative match on court citation formats and 'settlement approval judgment'
  - description: Plaintiff-side class action materials
    mitigation: Require government respondent/defendant context ('State of Queensland', department names)
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_class_action_defence_strategy_class_action_terminology
      matches:
        - ref: Evidence_class_action_defence_strategy_primary
        - ref: Evidence_class_action_defence_strategy_corroborative
        - ref: Evidence_class_action_defence_strategy_structural_headings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_class_action_defence_strategy_exclusion
        - ref: Pattern_class_action_defence_strategy_class_definition_analysis_term
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_class_action_defence_strategy_class_action_terminology
      matches:
        - ref: Evidence_class_action_defence_strategy_primary
        - ref: Evidence_class_action_defence_strategy_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_class_action_defence_strategy_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_class_action_defence_strategy_class_action_terminology
  regexes:
    - id: Pattern_class_action_defence_strategy_class_action_terminology
      pattern: (?i)\b(?:class\s+action|representative\s+proceeding|group\s+proceeding)\b
    - id: Pattern_class_action_defence_strategy_class_definition_analysis_term
      pattern: (?i)\bclass\s+definition\b
  keywords:
    - id: Evidence_class_action_defence_strategy_primary
      groups:
        - match_style: word
          terms:
            - class action
            - representative proceeding
            - group proceeding
      strength: specific
    - id: Evidence_class_action_defence_strategy_corroborative
      groups:
        - match_style: word
          terms:
            - defence strategy
            - legal strategy
            - privilege
            - PROTECTED
            - settlement authority
            - exposure
            - class definition
            - common questions
            - opt-out
            - damages model
            - respondent
      strength: specific
    - id: Evidence_class_action_defence_strategy_structural_headings
      groups:
        - match_style: word
          terms:
            - Class Definition
            - Common Questions
            - Opt-Out Strategy
            - Damages Model
            - Exposure Assessment
      strength: structural
    - id: Evidence_class_action_defence_strategy_exclusion
      groups:
        - match_style: word
          terms:
            - filed
            - announced
            - settled for
            - media release
            - textbook
            - settlement approval judgment

      strength: noise
risk_rating: 9
risk_description: >-
  This pattern identifies privileged defence strategy for class, representative, or group proceedings when exposure, settlement authority, or legal-strategy indicators appear nearby. A genuine file can disclose class-definition challenges, common-question analysis, causation weaknesses, damages models, settlement ceilings, and tactical sequencing, giving claimants a direct litigation advantage and affecting many potential claims. A class action inherently aggregates claimants and material exposure. Strategy leakage can affect evidence, settlement leverage and liabilities across the class and defendant. The normal true-positive unit belongs at risk 9, PROTECTED Legal, while broad or contextual false positives remain a separate detection issue.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Legal
