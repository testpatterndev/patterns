schema: testpattern/v1
name: Data classification matrices
slug: global-top500-463-data-classification-matrices
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies matrices that map data or information categories to classification levels and handling
  controls. Topic phrases are retained for discovery; enforcement requires multiple matrix-column or
  control headings, and high confidence also requires a populated category-to-classification mapping.
operation: >-
  Regex_data_classification_matrix recognises data, information, and sensitivity classification
  matrices. The topic alone is discovery-only at 65. Three distinct matrix schema or handling fields
  raise it to 75; a populated row mapping an information category to a classification value reaches
  85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:data\s+classification\s+matri(?:x|ces)|information\s+classification\s+matri(?:x|ces)|data\s+sensitivity\s+matri(?:x|ces)|sensitivity\s+classification\s+matri(?:x|ces)|classification\s+and\s+handling\s+matri(?:x|ces))\b
confidence: medium
confidence_justification: >-
  Medium confidence requires several matrix-schema or handling fields rather than generic
  classification language. High confidence adds a populated category-to-level relationship.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - data category
    - classification level
    - handling requirement
    - access restriction
    - encryption required
  proximity: 500
  keyword_lists:
    - classification-australia-government
    - classification-corporate
test_cases:
  should_match:
    - value: Data classification matrix
      description: Low-tier probe - matrix topic without schema or populated mappings
    - value: 'Data classification matrix: Data category | Classification level | Handling requirement | Access restriction'
      description: Medium-tier probe - substantive matrix schema without a populated mapping row
    - value: 'Data classification matrix: Data category | Classification level | Handling requirement | Access restriction; Data category: Customer records | Classification level: Confidential'
      description: High-tier probe - matrix schema with a populated category-to-level mapping
  should_not_match:
    - value: 'Enterprise data inventory: information asset, data owner, data steward, system of record, and data lineage'
      description: Data inventory content belongs to the adjacent inventory SIT
    - value: 'Data retention and deletion schedule: information type | retention period | disposal method | legal hold'
      description: Retention schedules are not classification matrices
    - value: 'Role-based access control matrix: role | system | permission | approval status'
      description: Entitlement matrices do not map data categories to sensitivity levels
    - value: The machine-learning report shows a confusion matrix for data classification accuracy.
      description: Statistical model evaluation must not collide with governance matrices
    - value: 'Training example: Data classification matrix; Data category | Classification level | Handling requirement; Data category: Customer records | Classification level: Confidential'
      description: Explicit training content must not enforce even with a realistic populated row
false_positives:
  - description: Classification policies, glossaries, and DLP product documentation discuss levels, labels, handling, encryption, and access without containing a matrix.
    mitigation: Require an explicit data, information, or sensitivity classification matrix plus several independent matrix fields.
  - description: Data inventories, retention schedules, role-access matrices, and machine-learning confusion matrices use overlapping data, classification, matrix, owner, and control terms.
    mitigation: Exclude those generic anchors from the primary and reserve high confidence for a populated information-category to classification-level relationship.
  - description: Training and policy templates can include realistic matrix columns and populated demonstration rows.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 500
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_data_classification_matrix
      matches:
        - ref: Evidence_classification_matrix_schema
          min_count: 3
          unique_results: true
        - ref: Evidence_classification_matrix_populated_mapping
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_data_classification_matrix
      matches:
        - ref: Evidence_classification_matrix_schema
          min_count: 3
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_data_classification_matrix
  regexes:
    - id: Regex_data_classification_matrix
      pattern: >-
        (?is)\b(?:data\s+classification\s+matri(?:x|ces)|information\s+classification\s+matri(?:x|ces)|data\s+sensitivity\s+matri(?:x|ces)|sensitivity\s+classification\s+matri(?:x|ces)|classification\s+and\s+handling\s+matri(?:x|ces))\b
    - id: Evidence_classification_matrix_populated_mapping
      pattern: >-
        (?i)\b(?:(?:data\s+category|information\s+type)\s*[:=]\s*[A-Z0-9][A-Za-z0-9 /&_'().-]{2,60}\s*(?:\||;|,)\s*(?:classification|sensitivity)\s*(?:level|label)?\s*[:=]\s*(?:public|official(?:\s*[: -]\s*sensitive)?|internal(?:\s+only)?|private|confidential|highly\s+confidential|sensitive|restricted|controlled|CUI|protected|secret|top\s+secret|level\s*[1-5])|(?:(?:[A-Z][A-Za-z0-9 /&_'().-]{2,40}\s+(?:data|records?|information))|source\s+code)\s*(?:\||->|=>)\s*(?:public|official(?:\s*[: -]\s*sensitive)?|internal(?:\s+only)?|private|confidential|highly\s+confidential|sensitive|restricted|controlled|CUI|protected|secret|top\s+secret|level\s*[1-5]))\b
  keywords:
    - id: Evidence_classification_matrix_schema
      groups:
        - match_style: word
          terms:
            - data category
            - information type
            - classification level
            - sensitivity level
            - sensitivity label
            - handling requirements
            - handling requirement
            - access restriction
            - storage requirement
            - transmission requirement
            - sharing restriction
            - encryption required
            - retention requirement
            - disposal requirement
            - control requirement
            - approved recipients
      strength: domain
risk_description: >-
  The detector targets explicit data classification matrices with schema or handling fields, while
  high confidence confirms a populated category-to-level mapping. A matrix can reveal internal
  taxonomy, handling thresholds, and control expectations, helping an insider or attacker tailor
  evasion or social-engineering language. The ordinary impact is limited because many matrices are
  generic governance artefacts and do not identify particular repositories, exceptions, or
  weaknesses. Risk 5 and OFFICIAL fit that bounded exposure; SENSITIVE would require mappings to live
  sensitive assets, non-public exceptions, or detailed controls that create an actionable bypass
  opportunity.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
