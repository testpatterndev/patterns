schema: testpattern/v1
name: Generic Database Credentials in URL
slug: global-generic-db-credentials-url
version: 1.4.0
type: regex
pattern_class: identifier
engine: universal
description: Detects Generic Database Credentials in URL patterns. Matches user:password@host in any protocol URL
operation: 'Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: '(?i)[a-z][a-z0-9+.-]*://[^/:@\s]+:[^/@\s]+@[^/:\s]+'
confidence: low
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: amqp://user:password@broker.example.com
      description: AMQP connection with credentials
    - value: ldap://admin:secret@ldap.internal.com
      description: LDAP connection with credentials
    - value: ftp://deploy:p@ssw0rd@ftp.example.com/uploads
      description: FTP with embedded credentials
  should_not_match:
    - value: https://example.com/path
      description: URL without credentials (no user:pass@ section)
    - value: mysql://localhost/mydb
      description: Database URL without credentials
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Regex_generic_db_credentials_url
      matches:
        - ref: Pattern_global_generic_db_credentials_url_label_context
        - ref: Keyword_global_generic_db_credentials_url_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_generic_db_credentials_url
      matches:
        - ref: Keyword_generic_db_credentials_url
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_generic_db_credentials_url
      pattern: '(?i)[a-z][a-z0-9+.-]*://[^/:@\s]+:[^/@\s]+@[^/:\s]+'
    - id: Pattern_global_generic_db_credentials_url_label_context
      pattern: (?i)\b(?:generic\s+database\s+credentials\s+in\s+url|generic|database|credentials|url)\b
  keywords:
    - id: Keyword_generic_db_credentials_url
      groups:
        - match_style: word
          terms:
            - connection string
            - database url
            - database uri
            - db connection
            - connection url
            - jdbc
            - dsn
            - data source
            - mongodb
            - postgres
            - mysql
            - redis
      strength: generic
    - id: Keyword_global_generic_db_credentials_url_domain_context
      groups:
        - match_style: word
          terms:
            - generic database credentials in url
            - generic
            - credentials
            - url
      strength: generic
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.3.0
    date: '2026-07-04'
    description: Fix slug field to match filename and existing catalog references (collections/connection-string-detection.yaml, classification-results.json both use the -url form; internal slug field was missing it)
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.
