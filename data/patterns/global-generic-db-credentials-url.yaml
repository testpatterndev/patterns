schema: testpattern/v1
name: Generic Database Credentials in URL
slug: global-generic-db-credentials-url
version: 1.5.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects database connection URLs with embedded user:password@host credentials, restricted to database
  schemes (mongodb/mongodb+srv, postgres/postgresql, mysql, redis/rediss, mssql/sqlserver, oracle,
  jdbc). Placeholder passwords and localhost/example hosts are rejected; non-database credential URLs
  (AMQP, LDAP, FTP) belong to a separate service-URL credential classifier.
operation: >-
  Database-scheme URL with non-placeholder userinfo enforces at 75 with the template exclusion; adding
  database/connection-string context evidence reaches 85. Scheme identity is intrinsic database
  evidence; placeholder passwords (password/changeme/placeholder/example/dummy) and
  localhost/example.com hosts are rejected in the primary regex.
pattern: '(?i)\b(?:mongodb(?:\+srv)?|postgres(?:ql)?|mysql|rediss?|mssql|sqlserver|oracle|jdbc:[a-z][a-z0-9]{0,23})://[^/:@\s]{1,64}:(?!(?:password|passw0rd|changeme|placeholder|example|dummy)@)[^/@\s]{1,128}@(?!(?:localhost|127\.0\.0\.1|example\.(?:com|net|org))\b)[^/:\s]{1,255}'
confidence: low
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: postgresql://reporter:S3cret9@db.prod.internal:5432/finance
      description: Database scheme with embedded credentials, host, port and database name
    - value: mongodb+srv://svc-report:Xy9pQ4tW@cluster0.mongo.internal/admin
      description: MongoDB SRV connection string with embedded credentials
    - value: jdbc:mysql://app_user:Q8gT2wZv@db01.corp.local:3306/orders
      description: JDBC database URL with embedded credentials
  should_not_match:
    - value: https://example.com/path
      description: URL without credentials (no user:pass@ section)
    - value: mysql://localhost/mydb
      description: Database URL without credentials
    - value: amqp://user:password@broker.internal
      description: Non-database scheme belongs to a separate service-URL credential classifier
    - value: mysql://db.prod.internal/finance
      description: Database URL without an embedded credential
    - value: 'Tutorial: mysql://demo:password@example.com/sample'
      description: Placeholder password and example host are rejected in the primary; tutorial/sample context is excluded
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The regex finds a protocol URL with embedded username, password, and host, and its own tests cover AMQP, LDAP, and FTP as well as database-like services. A valid string can be used to contact the named endpoint and exercise the account's permissions, potentially exposing records, messaging, directories, or transferred files. The ordinary scale is one service identity and reachable host, while examples, localhost values, revoked passwords, and network inaccessibility reduce actual consequence. Risk 8 SENSITIVE is retained for a complete active credential URL; PROTECTED needs evidence of administrator rights, critical infrastructure, or significant protected holdings.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_generic_db_credentials_url
      matches:
        - ref: Keyword_generic_db_credentials_url
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_generic_db_credentials_url
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_generic_db_credentials_url
      pattern: '(?i)\b(?:mongodb(?:\+srv)?|postgres(?:ql)?|mysql|rediss?|mssql|sqlserver|oracle|jdbc:[a-z][a-z0-9]{0,23})://[^/:@\s]{1,64}:(?!(?:password|passw0rd|changeme|placeholder|example|dummy)@)[^/@\s]{1,128}@(?!(?:localhost|127\.0\.0\.1|example\.(?:com|net|org))\b)[^/:\s]{1,255}'
  keywords:
    - id: Keyword_generic_db_credentials_url
      groups:
        - match_style: word
          terms:
            - connection string
            - database url
            - database uri
            - db connection
            - connection url
            - jdbc
            - dsn
            - data source
            - mongodb
            - postgres
            - mysql
            - redis
      strength: generic
created: '2026-02-08'
updated: '2026-07-16'
changelog:
  - version: 1.5.0
    date: '2026-07-16'
    description: >-
      Scope replacement (TP-00834): primary narrowed from any scheme://user:pass@host to database
      schemes only (mongodb/mongodb+srv, postgres/postgresql, mysql, redis/rediss, mssql/sqlserver,
      oracle, jdbc) with non-placeholder userinfo; placeholder passwords and
      localhost/127.0.0.1/example.* hosts rejected via bounded lookaheads. Scheme identity is intrinsic
      database evidence, so the previously dead 65-only wordlist tiers are replaced by an enforcing 75
      (scheme+userinfo with template exclusion) and 85 (plus database-context keywords); the
      self-referential label/domain-context wordlists were removed. AMQP/LDAP/FTP positives replaced
      with database-scheme positives (a separate embedded service-URL credential SIT is out of this
      record's scope).
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1233 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.3.0
    date: '2026-07-04'
    description: Fix slug field to match filename and existing catalog references (collections/connection-string-detection.yaml, classification-results.json both use the -url form; internal slug field was missing it)
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.
