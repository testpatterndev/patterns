schema: testpattern/v1
name: Russian Taxpayer Identification Number
slug: ru-tax-id
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Russian Taxpayer Identification Number patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type. Due to the numeric format, corroborative evidence keywords
  are essential for reliable detection.
operation: >-
  Corroborative evidence: 5 keywords within 300 characters.
  Keyword lists: tax-id, ru-financial.
pattern: '\b\d{10}(\d{2})?\b'
confidence: medium
confidence_justification: >-
  Medium confidence: ten or twelve digit numbers appear in many contexts. Russian INN keywords like 'ИНН' or 'налогоплательщика' are essential for accurate detection.
jurisdictions:
  - ru
regulations:
  - "Federal Law 152-FZ (Russia)"
data_categories:
  - pii
  - financial
  - government-id
corroborative_evidence:
  keywords:
    - ИНН
    - идентификационный номер налогоплательщика
    - tax identification
    - TIN
    - налоговый
  proximity: 300
  keyword_lists:

    - tax-id

    - ru-financial
test_cases:
  should_match:
    - value: '1234567890'
      description: Ten-digit Russian INN for individuals
    - value: '123456789012'
      description: Twelve-digit Russian INN for legal entities
    - value: '9876543210'
      description: Russian taxpayer identification number
  should_not_match:
    - value: '123456789'
      description: Nine digits, too short for Russian INN
    - value: '12345678901'
      description: Eleven digits, invalid Russian INN length
false_positives:
  - description: Generic numeric sequences in non-tax contexts such as reference numbers or account identifiers
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to distinguish
      tax identifiers from general numeric data.
  - description: Numbers from other identification schemes with similar digit patterns
    mitigation: >-
      Layer with jurisdiction-specific detection to prioritise matches in tax-related documents
      and cross-reference with other identifier types.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ru_tax_id
      matches:
        - ref: Keyword_ru_tax_id_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ru_tax_id
      matches:
        - ref: Keyword_ru_tax_id_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ru_tax_id
  regexes:
    - id: Regex_ru_tax_id
      pattern: '\b\d{10}(\d{2})?\b'
  keywords:
    - id: Keyword_ru_tax_id_specific
      groups:
        - match_style: word
          terms:
            - ИНН
            - идентификационный номер налогоплательщика
            - text: TIN
              case_sensitive: true
            - tax identification number
            - индивидуальный номер налогоплательщика
            - номер ИНН
            - taxpayer identification
      strength: specific
    - id: Keyword_ru_tax_id_broad
      groups:
        - match_style: word
          terms:
            - налоговый
            - налоговая инспекция
            - федеральная налоговая служба
            - ФНС
            - налоговая декларация
            - tax return
            - tax identification
            - налогоплательщик
      strength: specific
  filters:
    - id: Filter_ru_tax_id_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  This detector recognizes a Russian INN as either a ten-digit organization number or a twelve-digit individual number when ИНН or taxpayer terminology is nearby. A valid match can link a person or entity to tax and commercial records and may be reused in false paperwork, registry correlation, or a targeted authority impersonation. The identifier alone reveals no return, liability, bank account, filing credential, or permission to act, and both lengths overlap generic numeric references. Risk 5 and OFFICIAL capture that bounded mixed-holder risk; private assessments, payment instructions, or authenticated tax-account material would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
