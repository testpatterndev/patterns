schema: testpattern/v1
name: India Phone Number
slug: in-phone-number
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects Indian mobile telephone numbers per the Department of Telecommunications' National Numbering
  Plan 2003 (as amended): 10-digit mobile numbers with a constrained leading digit (6-9, expanded from
  7-9 to include 6 when DoT authorized 6-series allocation in 2017), in both the bare domestic form and
  the +91 international form (leading 0 dropped). Landline/STD (Subscriber Trunk Dialling) numbers are
  intentionally out of scope: STD codes vary 2-8 digits with no verified structural rule constraining
  their leading digit, so a regex loose enough to cover them (just "10 digits after a leading 0") would
  be barely tighter than matching any 11-digit sequence — far too high a digit-collision risk to ship
  without a genuinely verified constraint. See false_positives.
operation: >-
  Validation: none (Indian mobile numbers have no checksum). Reference: Department of Telecommunications,
  National Numbering Plan 2003, https://www.dot.gov.in/national-numbering-plan-list; the 2017 6-series
  mobile allocation to Reliance Jio. Corroborative evidence: keywords within 300 characters. Keyword
  lists: phone-context. The +91 international form carries a distinctive literal prefix and is treated as
  a stronger signal than the bare domestic form: it alone is given an ungated discovery tier, while the
  domestic form's lowest tier requires generic phone-context evidence — see confidence_justification.
pattern: '(?<!\d)(?:\+91[\s.-]?[6-9]\d{4}[\s.-]?\d{5}|[6-9]\d{4}[\s.-]?\d{5})(?!\d)'
confidence: medium
confidence_justification: >-
  Medium confidence: the mobile leading-digit constraint (6-9) narrows the format, but a bare 10-digit
  mobile-shaped sequence is still a high digit-collision format (any 10-digit number starting 6-9 is
  common), so the domestic form is never offered as an ungated discovery tier — its lowest tier requires
  phone-context evidence. The +91 international form's literal country-code prefix is distinctive enough
  (rare outside telecom contexts) to justify an ungated 65 discovery tier on that sub-regex alone,
  mirroring how global-iban and global-email-address use a structurally-distinctive prefix to justify a
  bare discovery tier despite the absence of a checksum. Unlike NANP (555-01XX) and the UK (Ofcom drama
  numbers), no DoT/TRAI-published fictional/test number range exists for India — this was confirmed by
  web research and is documented rather than invented; test_cases below use an illustrative,
  clearly-non-official descending-digit placeholder instead.
jurisdictions:
  - in
regulations:
  - DPDPA
  - "IT Act 2000 (India)"
  - TCCCPR
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - pii
  - contact-information
corroborative_evidence:
  keywords:
    - phone
    - mobile
    - call
    - text
    - contact number
    - Indian mobile number
    - WhatsApp number
    - call me at
  proximity: 300
  keyword_lists:
    - phone-context
test_cases:
  should_match:
    - value: 'Call me at 98765 43210'
      description: Domestic mobile, leading digit 9, illustrative descending-digit placeholder, common 5+5 spaced grouping
    - value: 'WhatsApp number: 9123456789'
      description: Domestic mobile, leading digit 9, bare digits with no separator
    - value: 'Contact: +91 9876543210'
      description: International +91 mobile form, leading 0 dropped, contiguous digits
    - value: 'Mobile: 6123456789'
      description: Domestic mobile, leading digit 6 — the range DoT opened in 2017 for Jio 6-series allocation
  should_not_match:
    - value: '5234567890'
      description: Leading digit 5 is not in the valid 6-9 mobile range
    - value: '987654321'
      description: Only 9 digits — one short of the required 10
    - value: '1800 123 4567'
      description: Toll-free 1800 number — does not match the mobile leading-digit range
    - value: '+91 5876543210'
      description: International form but leading digit 5 (after the country code) is not in the valid 6-9 mobile range
false_positives:
  - description: >-
      A bare 10-digit mobile-shaped sequence (leading digit 6-9) is a high digit-collision format — it can
      coincidentally match invoice numbers, order numbers, or other structured identifiers of the same
      length and leading-digit distribution.
    mitigation: >-
      The domestic form's lowest tier requires phone-context evidence within 300 characters rather than
      firing as an ungated discovery match; the +91 international form is the only sub-regex offered at
      an ungated 65 tier, since the literal country-code prefix is far less ambiguous.
  - description: >-
      No official DoT/TRAI fictional or test number range exists for India (confirmed by web research,
      unlike NANP's 555-01XX or Ofcom's drama numbers), so an illustrative descending-digit test value was
      used instead of an authoritative reserved range.
    mitigation: >-
      Test values use clearly non-representative digit patterns; deployers should substitute their own
      tenant's synthetic test data for live validation rather than relying on a non-existent official
      reserved range.
  - description: >-
      Landline/STD numbers are out of scope for this initial release because India's STD codes vary 2-8
      digits with no verified leading-digit constraint, so this pattern will not detect landline numbers
      at all (a false negative, not a false positive, but noted here for completeness).
    mitigation: >-
      A future revision could add STD/landline coverage if a genuinely verifiable structural constraint
      (beyond "10 digits after a leading 0") is confirmed from a primary DoT/TRAI source.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: phone-context
      as: Evidence_phone_context
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_in_phone_mobile
      matches:
        - ref: Keyword_in_phone_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_in_phone_mobile
      matches:
        - ref: Evidence_phone_context
    - confidence_level: 85
      id_match: Regex_in_phone_intl
      matches:
        - ref: Keyword_in_phone_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_in_phone_intl
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_in_phone_mobile
      pattern: '(?<!\d)[6-9]\d{4}[\s.-]?\d{5}(?!\d)'
    - id: Regex_in_phone_intl
      pattern: '(?<!\d)\+91[\s.-]?[6-9]\d{4}[\s.-]?\d{5}(?!\d)'
  keywords:
    - id: Keyword_in_phone_specific
      groups:
        - match_style: word
          terms:
            - Indian mobile number
            - India phone number
            - call me at
            - WhatsApp number
            - mobile number
            - text: SMS
              case_sensitive: true
      strength: specific
risk_rating: 5
risk_description: >-
  Phone number exposure enables targeted vishing (voice phishing), smishing (SMS phishing), and social
  engineering, and can be combined with other PII for identity correlation. Lower direct financial risk than
  a payment or government-ID identifier on its own.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
references:
  - url: https://www.dot.gov.in/national-numbering-plan-list
    title: "Department of Telecommunications: National Numbering Plan - 2003"
  - url: https://trai.gov.in/tcccpr
    title: "TRAI: Telecom Commercial Communications Customer Preference Regulations (TCCCPR), 2018"
created: '2026-07-06'
updated: '2026-07-06'
changelog:
  - version: 1.0.0
    date: '2026-07-06'
    description: Initial release. Scoped to mobile numbers only; landline/STD out of scope pending verified STD leading-digit structure.
