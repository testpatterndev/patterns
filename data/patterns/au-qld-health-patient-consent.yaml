schema: testpattern/v1
name: QLD Health Patient Consent
slug: au-qld-health-patient-consent
version: 1.3.2
type: keyword_list
pattern_class: concept
description: Detects QLD Health patient consent forms including advance directives and enduring power of attorney documents.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
  - legal
  - government
test_cases:
  should_match:
    - value: Informed consent notice
      description: Exact 65 discovery probe with a consent phrase and no clinical detail
    - value: Informed consent for surgical procedure
      description: Exact 75 probe with clinical consent context
    - value: Queensland Health informed consent for surgical procedure
      description: Exact 85 probe with clinical detail and QLD Health provenance
    - value: 'Patient consent form: informed consent for surgical procedure'
      description: Patient surgical consent form
    - value: Advance health directive and enduring power of attorney (EPOA) registered
      description: Test match 2
    - value: QLD Health treatment consent with substitute decision maker details
      description: Test match 3
  should_not_match:
    - value: Cookie consent banner on website
      description: Non-match 1
    - value: Consent to receive marketing emails
      description: Non-match 2
    - value: Patient election form training session agenda
      description: Training reference must remain discovery-only
false_positives:
  - description: Digital consent in non-health contexts.
    mitigation: Require clinical consent terms like patient, surgical, or advance directive.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The classifier identifies treatment and surgical consent, advance health directives, enduring powers of attorney, substitute decision makers, and Queensland Health consent forms. A genuine document reveals the patient's contemplated procedure, capacity or decision-making arrangements, chosen representative, and legal authorization, allowing coercion, treatment interference, or exposure of sensitive health choices. One consent form has bounded scope but combines clinical and legal facts whose misuse can have serious personal consequences. Risk 8 and SENSITIVE are proportionate; PROTECTED would require a vulnerable-person register, privileged legal strategy, or compromise causing significant and irreversible care harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_health_consent
      matches:
        - ref: Evidence_clinical_consent_context
        - ref: Evidence_qld_health_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_health_consent
      matches:
        - ref: Evidence_clinical_consent_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_health_consent
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_qld_health
      pattern: (?i)\b(?:queensland\s+health|hospital\s+and\s+health\s+service|hhs)\b
    - id: Pattern_health_consent
      pattern: (?i)\b(?:(?:patient|treatment|surgical)\s+(?:consent|election)(?:\s+form)?|informed\s+consent|advance\s+health\s+directive|epoa(?:\s+health)?)\b
  keywords:
    - id: Evidence_patient_consent
      groups:
        - match_style: word
          terms:
            - patient consent
            - informed consent
            - patient election
            - consent form
            - advance health directive
            - text: AHD
              case_sensitive: true
            - enduring power of attorney
            - EPOA
            - health care wishes
      strength: specific
    - id: Evidence_qld_health_forms
      groups:
        - match_style: word
          terms:
            - Queensland Health
            - QLD Health
            - Hospital and Health Service
            - text: HHS
              case_sensitive: true
            - health.qld.gov.au
            - QH-IMP
            - Pathology Queensland
            - Clinical Excellence Queensland
      strength: specific
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
    - id: Evidence_clinical_consent_context
      groups:
        - match_style: word
          terms:
            - surgical procedure
            - treatment
            - anaesthetic
            - substitute decision maker
            - decision-making capacity
            - risks and benefits
            - witness signature
            - enduring power of attorney
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.3.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: keep consent phrases at 65 discovery, require independent clinical/legal details at 75 and QLD Health provenance at 85, broaden genuine treatment-consent coverage, and add exact-tier plus training probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 580 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - patient consent
  - informed consent
  - consent form
  - advance health directive
  - advance care plan
  - enduring power of attorney
  - EPOA
  - treatment consent
  - surgical consent
  - anaesthetic consent
  - substitute decision maker
  - guardianship
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
