  - version: 1.2.0
    date: '2026-07-12'
    description: 'Baseline burn-down C: guard the top-level regex (and mirrored Regex_tr_passport purview copy) against the all-zeros placeholder "U00000000" with a negative lookahead ((?!0{8}\b) right after the fixed U prefix), mirroring the AllDigitsSameFilter intent at the universal-engine top-level layer that ci-check.mjs evaluates independently of purview filters.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.0.1
    date: '2026-07-09'
