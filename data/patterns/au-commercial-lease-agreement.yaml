schema: testpattern/v1
name: Commercial Lease Agreement
slug: au-commercial-lease-agreement
version: 1.3.1
type: keyword_list
pattern_class: concept
description: Detects commercial lease agreements containing premises details, rental terms, and tenant obligations.
operation: >-
  Keyword-based detection matching commercial lease, lessor, lessee, rental terms, and premises patterns. Corroborative
  evidence: 14 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - legal
  - financial
test_cases:
  should_match:
    - value: Commercial lease agreement between lessor and lessee for premises
      description: Test match 1
    - value: Lease term 5 years with rent review and option to renew
      description: Test match 2
    - value: Tenant obligations include outgoings, make good, and bond provisions
      description: Test match 3
  should_not_match:
    - value: Lease a new car today
      description: Non-match 1
    - value: A new lease on life
      description: Non-match 2
false_positives:
  - description: Vehicle leasing or metaphorical lease references.
    mitigation: Require commercial property keywords like premises, lessor, or outgoings.
exports:
  - yaml
scope: narrow
risk_rating: 6
risk_description: >-
  This concept classifier identifies commercial leases through lessor, lessee, premises, rent review, outgoings, bond, renewal, and make-good obligations. Disclosure can reveal occupancy, business location, costs, bargaining terms, and contractual pressure points that support competitor targeting or negotiation interference. The landlord, tenant, and affected business face limited-to-moderate commercial and legal harm within one premises, and the agreement does not itself enable financial access. Risk 6 and SENSITIVE Legal are appropriate, while a strategically critical site, embedded personal guarantees, or a large confidential property portfolio would be needed to approach PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_commercial_lease
      matches:
        - ref: Keyword_commercial_terms
        - ref: Keyword_lease_structure
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_commercial_lease
      matches:
        - ref: Keyword_legal_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_commercial_lease
      pattern: >-
        (?i)\b(?:commercial\s+(?:lease|tenancy)\s+agreement|(?:retail|office|industrial)\s+lease|business\s+lease\s+agreement)\b
  keywords:
    - id: Keyword_commercial_terms
      groups:
        - match_style: word
          terms:
            - commercial lease
            - retail lease
            - office lease
            - industrial lease
            - demised premises
            - permitted use
            - rent review
            - option to renew
      strength: specific
    - id: Keyword_lease_structure
      groups:
        - match_style: word
          terms:
            - outgoings
            - text: CAM
              case_sensitive: true
            - common area maintenance
            - gross lease
            - net lease
            - triple net
            - escalation
            - CPI adjustment
            - fitout
            - make good
      strength: specific
    - id: Keyword_legal_general
      groups:
        - match_style: word
          terms:
            - agreement
            - contract
            - deed
            - executed
            - witnessed
            - signature
            - cooling off
            - default
            - termination
            - entire agreement
      strength: domain
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 530 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - commercial lease
  - lease agreement
  - lessor
  - lessee
  - tenant
  - landlord
  - premises
  - rental
  - rent review
  - lease term
  - outgoings
  - make good
  - bond
  - option to renew
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
