schema: testpattern/v1
name: Product recall decision files
slug: au-top500-228-product-recall-decision-files
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to product recall decision files in Australian contexts. Higher confidence identifies internal files used to decide or authorise a recall (decision,
  recommendation, risk-benefit, affected-lot, approval, or unresolved-action evidence); public recall notices and generic recall vocabulary remain discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:product\s+recall\s+decision|recall\s+notice|product\s+recall|safety\s+recall|mandatory\s+recall|voluntary\s+recall|consumer\s+safety|hazard\s+notification|recall\s+action|product\s+withdrawal)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - intellectual-property
  - business
corroborative_evidence:
  keywords:
    - product recall decision files
    - product
    - recall
    - decision
    - files
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: product recall decision
      description: Primary topic phrase match
    - value: recall notice
      description: Case-insensitive topic phrase match
    - value: product recall
      description: Alternative topic phrase match
    - value: safety recall
      description: Additional topic phrase match
    - value: 'Recall Committee Decision: recommend voluntary recall of lots L31-L44; risk-benefit score 8/10; approval pending COO sign-off.'
      description: Internal committee recommendation with lot scope and risk-benefit rationale (enforces at 75/85)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: Public recall notice asks consumers to return Model A.
      description: Public notice announces an outcome without decision material — discovery only, must not enforce
    - value: The historian recalled a product demonstration from 1998.
      description: Recall as a verb of memory must not match
    - value: 'Training scenario: sample recall committee decision for fictional lot L00.'
      description: Training/sample/fictional markers identify a scenario — suppressed from enforcement
    - value: product recall decision
      description: Title alone shows no populated decision file — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to product recall decision files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_product_recall_decision
      matches:
        - ref: Evidence_recall_decision
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_product_recall_decision
      matches:
        - ref: Evidence_recall_decision
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_product_recall_decision
      matches:
        - ref: Evidence_product_recall_decision
  regexes:
    - id: Pattern_product_recall_decision
      pattern: >-
        (?is)\b(?:product\s+recall\s+decision|recall\s+notice|product\s+recall|safety\s+recall|mandatory\s+recall|voluntary\s+recall|consumer\s+safety|hazard\s+notification|recall\s+action|product\s+withdrawal)\b
    - id: Pattern_au_top500_228_product_recall_decision_files_label_context
      pattern: (?i)\b(?:product\s+recall\s+decision\s+files)\b
  keywords:
    - id: Evidence_product_recall_decision
      groups:
        - match_style: word
          terms:
            - product recall decision
            - recall notice
            - product recall
            - safety recall
            - mandatory recall
            - voluntary recall
            - consumer safety
            - hazard notification
            - recall action
            - product withdrawal
    - id: Evidence_recall_decision
      groups:
        - match_style: word
          terms:
            - decision required
            - recommendation
            - recall committee
            - approve recall
            - do not recall
            - risk-benefit
            - affected lots
            - decision owner
            - regulator notification pending
            - unresolved action
            - executive sign-off
    - id: Keyword_au_top500_228_product_recall_decision_files_domain_context
      groups:
        - match_style: word
          terms:
            - product recall decision files
            - product
            - recall
            - decision
            - files
risk_description: >-
  This pattern finds product-recall decisions, recall notices, safety recalls, and related decision-file language with seven corroborators, representing the record behind a release, containment, or recall choice. Before announcement, the file can reveal known hazards, affected products or batches, incident evidence, regulator strategy, commercial exposure, and management deliberation. Premature disclosure or concealment can seriously affect consumers, the manufacturer, distributors, and a bounded safety response, while published recall notices can still trigger the detector. Risk 8 and SENSITIVE InfoTech are justified; PROTECTED requires mass-casualty potential, critical-service disruption, a strategic protected product, or credible significant damage beyond the ordinary recall.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
