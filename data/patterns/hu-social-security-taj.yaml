schema: testpattern/v1
name: TAJ szám
slug: hu-social-security-taj
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects TAJ szám patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this
  version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-hungary-social-security-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{3}\s?\d{3}\s?\d{3}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - eu
  - hu
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - TAJ
    - társadalombiztosítási
    - social security
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 123 456 789
      description: TAJ number with spaces
    - value: '987654321'
      description: TAJ number without spaces
    - value: 456 789 012
      description: Another spaced TAJ number
  should_not_match:
    - value: '12345678'
      description: Too few digits (8)
    - value: '1234567890'
      description: Too many digits (10)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Nine-digit sequences with optional spaces match phone numbers, postal codes, and other numeric references.
    mitigation: Require corroborative evidence keywords such as "TAJ" or "társadalombiztosítási" within the proximity window.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_hu_taj
      matches:
        - ref: Pattern_hu_social_security_taj_label_context
        - ref: Keyword_hu_social_security_taj_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_hu_taj
      matches:
        - ref: Keyword_hu_taj
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_hu_taj
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_hu_taj
      pattern: \b\d{3}\s?\d{3}\s?\d{3}\b
    - id: Pattern_hu_social_security_taj_label_context
      pattern: (?i)\b(?:taj\s+szám|taj|social|security)\b
  keywords:
    - id: Keyword_hu_taj
      groups:
        - match_style: word
          terms:
            - text: TAJ
              case_sensitive: true
            - TAJ szám
            - társadalombiztosítási azonosító jel
            - társadalombiztosítási
            - social security
            - social security number
            - társadalombiztosítás
            - egészségbiztosítás
            - biztosítási szám
            - TB szám
            - text: OEP
              case_sensitive: true
      strength: specific
    - id: Keyword_hu_social_security_taj_domain_context
      groups:
        - match_style: word
          terms:
            - taj szám
            - taj
            - social
            - security
      strength: domain
  filters:
    - id: Filter_hu_taj_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The Hungarian TAJ pattern recognizes a nine-digit social-security number, optionally grouped with spaces, in TAJ or social-insurance context. A genuine match links one person to benefits and healthcare administration and can help an impostor target service enquiries or construct a more credible identity profile. The number supplies no diagnosis, entitlement, contribution history, password, or service authority, and similar nine-digit references can occur elsewhere. Risk 5 and OFFICIAL fit that limited standalone exposure; a populated healthcare, benefits, payroll, or identity record would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-hungary-social-security-number
    title: Hungarian Social Security Number (TAJ) entity definition - Microsoft Learn
