schema: testpattern/v1
name: Patent draft claims
slug: au-top500-205-patent-draft-claims
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to patent draft claims in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:patent\s+draft|draft\s+claims|patent\s+claims|patent\s+application|provisional\s+patent|patent\s+specification|prior\s+art|patent\s+filing|invention\s+disclosure|claims\s+language|patent\s+prosecution|IP\s+Australia)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - patent draft claims
    - patent
    - draft
    - claims
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: patent draft
      description: Primary topic phrase match
    - value: draft claims
      description: Case-insensitive topic phrase match
    - value: patent claims
      description: Alternative topic phrase match
    - value: patent application
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to patent draft claims appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_patent_draft_claims
      matches:
        - ref: Evidence_patent_draft_claims
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_patent_draft_claims
      matches:
        - ref: Evidence_patent_draft_claims
    - confidence_level: 65
      id_match: Pattern_patent_draft_claims
      matches:
        - ref: Evidence_patent_draft_claims
  regexes:
    - id: Pattern_patent_draft_claims
      pattern: (?is)\b(?:patent\s+draft|draft\s+claims|patent\s+claims|patent\s+application|provisional\s+patent|patent\s+specification|prior\s+art|patent\s+filing|invention\s+disclosure|claims\s+language|patent\s+prosecution|IP\s+Australia)\b
  keywords:
    - id: Evidence_patent_draft_claims
      groups:
        - match_style: word
          terms:
            - patent draft
            - draft claims
            - patent claims
            - patent application
            - provisional patent
            - patent specification
            - prior art
            - patent filing
            - invention disclosure
            - claims language
            - patent prosecution
            - IP Australia
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.ipaustralia.gov.au/patents/what-are-patents
  - https://www.ipaustralia.gov.au/patents/how-to-apply-for-a-standard-patent/what-to-consider-before-applying-for-a-patent
