schema: testpattern/v1
name: Detention custody records
slug: au-top500-414-detention-custody-records
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to detention custody records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:detention\s+custody\s+records|detention\s+record|custody\s+record|inmate\s+file|prisoner\s+record|correctional\s+facility|remand\s+custody|immigration\s+detention|custody\s+management|detainee\s+record|incarceration\s+record|custodial\s+register)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - detention custody records
    - detention
    - custody
    - records
    - law
    - enforcement
    - justice
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: detention custody records
      description: Primary topic phrase match
    - value: detention record
      description: Case-insensitive topic phrase match
    - value: custody record
      description: Alternative topic phrase match
    - value: inmate file
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to detention custody records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_detention_custody_records
      matches:
        - ref: Evidence_detention_custody_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_414_detention_custody_records_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_detention_custody_records
      matches:
        - ref: Evidence_detention_custody_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_414_detention_custody_records_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_detention_custody_records
      matches:
        - ref: Evidence_detention_custody_records
  regexes:
    - id: Pattern_detention_custody_records
      pattern: (?is)\b(?:detention\s+custody\s+records|detention\s+record|custody\s+record|inmate\s+file|prisoner\s+record|correctional\s+facility|remand\s+custody|immigration\s+detention|custody\s+management|detainee\s+record|incarceration\s+record|custodial\s+register)\b
    - id: Pattern_au_top500_414_detention_custody_records_label_context
      pattern: (?i)\\b(?:detention\\s+custody\\s+records|detention|custody|top500)\\b
  keywords:
    - id: Evidence_detention_custody_records
      groups:
        - match_style: word
          terms:
            - detention custody records
            - detention record
            - custody record
            - inmate file
            - prisoner record
            - correctional facility
            - remand custody
            - immigration detention
            - custody management
            - detainee record
            - incarceration record
            - custodial register
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_414_detention_custody_records_domain_context
      groups:
        - match_style: word
          terms:
            - detention custody records
            - detention
            - custody
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_414_detention_custody_records_noise_exclusion
      groups:
