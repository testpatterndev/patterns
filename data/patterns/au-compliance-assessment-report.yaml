schema: testpattern/v1
name: Compliance Assessment Report
slug: au-compliance-assessment-report
version: 1.3.1
type: keyword_list
pattern_class: concept
description: Detects compliance assessment reports identifying regulatory gaps and non-compliance findings.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- DISP
- ISO 27001
- NIST CSF
data_categories:
  - governance
  - legal
test_cases:
  should_match:
    - value: 'Compliance assessment report: regulatory gap and non-compliance finding'
      description: Test match 1
    - value: Compliance audit with compliance obligation and regulatory risk review
      description: Test match 2
    - value: 'Compliance framework monitoring: compliance status and compliance finding'
      description: Test match 3
  should_not_match:
    - value: Compliance with traffic rules
      description: Non-match 1
    - value: In compliance with building codes
      description: Non-match 2
false_positives:
  - description: Generic compliance in everyday contexts.
    mitigation: Require assessment or report keywords alongside compliance.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The keyword detector targets a compliance assessment or audit report containing obligations, gaps, findings, status, and regulatory-risk analysis rather than an everyday statement of compliance. A true report can disclose breached duties, control failures, evidence weaknesses, and remediation priorities that help a regulated party conceal deficiencies or prejudice enforcement and legal strategy. The affected unit is normally one organisation and assessment, producing serious but bounded legal, operational, and reputational harm. Risk 8 SENSITIVE Legal is appropriate; PROTECTED is not met without a protected investigation, critical-system weakness, or credible significant damage beyond the assessed matter.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_compliance_assessment
      matches:
        - ref: Keyword_regulatory_frameworks
        - ref: Keyword_compliance_status
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_compliance_assessment
      matches:
        - ref: Keyword_compliance_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_compliance_assessment
      pattern: >-
        (?i)\b(?:compliance\s+(?:assessment|audit|review)\s+report|regulatory\s+compliance\s+(?:assessment|report)|gap\s+analysis\s+report|compliance\s+(?:gap|maturity)\s+assessment)\b
  keywords:
    - id: Keyword_regulatory_frameworks
      groups:
        - match_style: word
          terms:
            - GDPR
            - HIPAA
            - PCI DSS
            - text: SOX
              case_sensitive: true
            - APRA
            - ASIC
            - Privacy Act
            - SOCI Act
            - AML/CTF
            - CPS 220
            - CPS 230
            - CIRMP
            - Essential Eight
            - AESCSF
            - text: ISM
              case_sensitive: true
            - Information Security Manual
      strength: domain
    - id: Keyword_compliance_status
      groups:
        - match_style: word
          terms:
            - compliant
            - non-compliant
            - partial compliance
            - in remediation
            - compliance gap
            - compliance finding
            - compliance exception
            - policy violation
      strength: specific
    - id: Keyword_compliance_general
      groups:
        - match_style: word
          terms:
            - compliance
            - regulatory
            - governance
            - policy
            - standard
            - framework
            - assessment
            - audit
      strength: domain
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 532 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - compliance assessment
  - compliance report
  - compliance audit
  - regulatory compliance
  - non-compliance
  - compliance finding
  - regulatory gap
  - compliance obligation
  - compliance framework
  - compliance monitoring
  - regulatory risk
  - compliance status
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
