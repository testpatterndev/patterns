schema: testpattern/v1
name: Password hash databases
slug: au-top500-262-password-hash-databases
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies password hash databases patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: credentials.'
pattern: \bpassword\s+hash\s+databases\b
confidence: low
confidence_justification: 'Low confidence marker: phrase-based artifact detection to bootstrap line-by-line coverage. Requires corroborative evidence and later hardening to high-confidence structural patterns.'
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - password hash databases
    - password
    - hash
    - databases
    - credentials
    - keys
    - secrets
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: 'Password hash databases'
      description: Topic phrase present
    - value: 'password hash databases'
      description: Topic phrase, lowercase
    - value: 'this record references the password hash databases held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_password_hash_databases
      matches:
        - ref: Evidence_password_hash_databases
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_password_hash_databases
      matches:
        - ref: Evidence_password_hash_databases
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_password_hash_databases
      matches:
        - ref: Evidence_password_hash_databases
  regexes:
    - id: Pattern_password_hash_databases
      pattern: \bpassword\s+hash\s+databases\b
  keywords:
    - id: Evidence_password_hash_databases
      groups:
        - match_style: word
          terms:
            - password hash databases
            - password hash
            - hash database
            - bcrypt
            - sha256
            - credential store
            - ntlm hash
            - shadow file
            - salt value
            - hash dump
            - password table
risk_description: >-
  This low-confidence concept detector finds the phrase password hash databases in credential context, indicating a database topic or record rather than validating hashes or a bulk export. If the referenced artifact is an actual hash database, an attacker can perform offline cracking, identify weak passwords, and reuse recovered credentials against affected services. The account population and system owner may face serious multi-user compromise, but the detector does not establish database size, hash strength, salts, account mappings, or possession of the underlying rows. Risk 8 and SENSITIVE InfoTech fit a confirmed bounded hash holding with offline-cracking value; PROTECTED requires a large weakly hashed store, privileged-account coverage, or critical-service scale.
sensitivity_labels:
