schema: testpattern/v1
name: Employee withholding elections
slug: au-top500-082-employee-withholding-elections
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to employee withholding elections in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: industry-hr.
pattern: >-
  (?is)\b(?:employee\s+withholding\s+elections|tax\s+declaration|PAYG\s+withholding|TFN\s+declaration|salary\s+sacrifice|pre[\s-]+tax\s+deduction|voluntary\s+withholding|withholding\s+variation|tax\s+offset|employee\s+election|payroll\s+deduction)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - employee withholding elections
    - employee
    - withholding
    - elections
    - payroll
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: employee withholding elections
      description: Primary topic phrase match
    - value: tax declaration
      description: Case-insensitive topic phrase match
    - value: PAYG withholding
      description: Alternative topic phrase match
    - value: TFN declaration
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_employee_withholding_elections
      matches:
        - ref: Evidence_employee_withholding_elections
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_employee_withholding_elections
      matches:
        - ref: Evidence_employee_withholding_elections
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_employee_withholding_elections
      matches:
        - ref: Evidence_employee_withholding_elections
  regexes:
    - id: Pattern_employee_withholding_elections
      pattern: >-
        (?is)\b(?:employee\s+withholding\s+elections|tax\s+declaration|PAYG\s+withholding|TFN\s+declaration|salary\s+sacrifice|pre[\s-]+tax\s+deduction|voluntary\s+withholding|withholding\s+variation|tax\s+offset|employee\s+election|payroll\s+deduction)\b
  keywords:
    - id: Evidence_employee_withholding_elections
      groups:
        - match_style: word
          terms:
            - employee withholding elections
            - withholding
            - tax declaration
            - PAYG withholding
            - TFN declaration
            - salary sacrifice
            - pre-tax deduction
            - voluntary withholding
            - withholding variation
            - tax offset
            - employee election
            - payroll deduction
risk_description: >-
  The regex identifies withholding-election topics such as PAYG or TFN declarations, salary sacrifice, tax offsets, voluntary withholding, and payroll deductions. These phrases may describe an employee's choices, but the match does not require a name, elected amount, TFN, or completed form. Misuse against an employee generally needs those missing values and payroll access, while HR guidance and blank declarations can trigger the same terms. Risk 4 OFFICIAL reflects low standalone harm; SENSITIVE would require a populated personal election or linked tax identifier.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
