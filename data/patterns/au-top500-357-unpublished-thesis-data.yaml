schema: testpattern/v1
name: Unpublished thesis data
slug: au-top500-357-unpublished-thesis-data
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to unpublished thesis data in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:unpublished\s+thesis\s+data|research\s+data|draft\s+manuscript|intellectual\s+property|HDR\s+candidate)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - unpublished thesis data
    - unpublished
    - thesis
    - data
    - education
    - research
    - administration
  proximity: 300
test_cases:
  should_match:
    - value: unpublished thesis data
      description: Primary topic phrase match
    - value: research data
      description: Case-insensitive topic phrase match
    - value: draft manuscript
      description: Alternative topic phrase match
    - value: intellectual property
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to unpublished thesis data appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_unpublished_thesis_data
      matches:
        - ref: Evidence_unpublished_thesis_data
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_357_unpublished_thesis_data_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_unpublished_thesis_data
      matches:
        - ref: Evidence_unpublished_thesis_data
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_357_unpublished_thesis_data_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_unpublished_thesis_data
      matches:
        - ref: Evidence_unpublished_thesis_data
  regexes:
    - id: Pattern_unpublished_thesis_data
      pattern: (?is)\b(?:unpublished\s+thesis\s+data|research\s+data|draft\s+manuscript|intellectual\s+property|HDR\s+candidate)\b
    - id: Pattern_au_top500_357_unpublished_thesis_data_label_context
      pattern: (?i)\\b(?:unpublished\\s+thesis\\s+data|unpublished|thesis|top500)\\b
  keywords:
    - id: Evidence_unpublished_thesis_data
      groups:
        - match_style: word
          terms:
            - unpublished thesis data
            - unpublished
            - thesis
            - dissertation
            - research data
            - draft manuscript
            - candidature
            - supervisor
            - intellectual property
            - embargo
            - pre-publication
            - HDR candidate
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_357_unpublished_thesis_data_domain_context
      groups:
        - match_style: word
          terms:
            - unpublished thesis data
            - unpublished
            - thesis
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_357_unpublished_thesis_data_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
