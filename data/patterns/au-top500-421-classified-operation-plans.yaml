schema: testpattern/v1
name: Classified operation plans
slug: au-top500-421-classified-operation-plans
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to classified operation plans in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:classified\s+operation\s+plans|classified\s+document|operational\s+security|secret\s+clearance|top\s+secret|defence\s+operations|military\s+planning|operation\s+order|tactical\s+plan|national\s+security|security\s+classification|restricted\s+document)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - privacy-act-1988
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - classified operation plans
    - classified
    - operation
    - plans
    - defense
    - intelligence
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: classified operation plans
      description: Primary topic phrase match
    - value: classified document
      description: Case-insensitive topic phrase match
    - value: operational security
      description: Alternative topic phrase match
    - value: secret clearance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to classified operation plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_classified_operation_plans
      matches:
        - ref: Evidence_classified_operation_plans
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_classified_operation_plans
      matches:
        - ref: Evidence_classified_operation_plans
    - confidence_level: 65
      id_match: Pattern_classified_operation_plans
      matches:
        - ref: Evidence_classified_operation_plans
  regexes:
    - id: Pattern_classified_operation_plans
      pattern: (?is)\b(?:classified\s+operation\s+plans|classified\s+document|operational\s+security|secret\s+clearance|top\s+secret|defence\s+operations|military\s+planning|operation\s+order|tactical\s+plan|national\s+security|security\s+classification|restricted\s+document)\b
  keywords:
    - id: Evidence_classified_operation_plans
      groups:
        - match_style: word
          terms:
            - classified operation plans
            - classified document
            - operational security
            - secret clearance
            - top secret
            - defence operations
            - military planning
            - operation order
            - tactical plan
            - national security
            - security classification
            - restricted document
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.protectivesecurity.gov.au/
  - https://www.legislation.gov.au/C2004A00280/latest/text
  - https://www.legislation.gov.au/C2004A03712/latest/text
