schema: testpattern/v1
name: Vehicle Identification Number
slug: global-vin
version: 1.2.1
type: regex
pattern_class: identifier
engine: universal
description: Detects Vehicle Identification Number patterns. Excludes I, O, Q characters
operation: >-
  Checksum: Check digit at position 9 (weights: 8,7,6,5,4,3,2,10,0,9,8,7,6,5,4,3,2) (NOT enforced in this regex-only pattern; structural detection only). Excludes I, O, Q characters. Reference: https://en.wikipedia.org/wiki/Vehicle_identification_number Corroborative
  evidence: 4 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[A-HJ-NPR-Z0-9]{17}\b
confidence: high
confidence_justification: >-
  High confidence: structural VIN format (17 chars, excludes I/O/Q) supported by corroborative keyword evidence. The position-9 check digit is documented but NOT enforced in this regex-only pattern. Added context gating and exclusion rules
  improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - device-id
corroborative_evidence:
  keywords:
    - device
    - identifier
    - serial number
    - hardware
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 1HGBH41JXMN109186
      description: Honda Civic VIN (excludes I, O, Q)
    - value: WVWZZZ3CZWE123456
      description: Volkswagen Golf VIN
    - value: 5YJSA1E26MF123456
      description: Tesla Model S VIN
  should_not_match:
    - value: 1HGBH41JXMN10918
      description: Only 16 characters instead of 17
    - value: 1HGBH41JXMN1091861
      description: 18 characters instead of 17
    - value: 1HGBH4IJXMN109186
      description: Contains letter I (excluded from VIN)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Technical identifiers appearing in public documentation, network configuration guides, or example configurations without representing actual infrastructure.
    mitigation: Cross-reference with known documentation patterns and reserved address ranges. Require proximity to infrastructure-specific context.
  - description: Placeholder and example values commonly used in technical tutorials and vendor documentation.
    mitigation: Maintain exclusion lists for well-known example values (RFC 5737 documentation addresses, example MAC addresses).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_rating: 5
risk_description: >-
  This detector finds one structurally valid 17-character vehicle identification number while excluding the letters I, O, and Q; it does not enforce the check digit. A recipient could combine the VIN with registration, insurance, or ownership data to support cloning, fraud, or targeted vehicle research. The ordinary match relates to one vehicle and often appears in legitimate sales or service material, so direct harm needs additional personal or transaction context. Risk 5 and OFFICIAL fit the atomic identifier; owner-linked fleets, claims files, or bulk vehicle registers would warrant higher handling.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_vin
      matches:
        - ref: Pattern_global_vin_label_context
        - ref: Keyword_global_vin_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_vin
      matches:
        - ref: Keyword_vehicle
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_vin
      pattern: \b[A-HJ-NPR-Z0-9]{17}\b
    - id: Pattern_global_vin_label_context
      pattern: (?i)\b(?:vehicle\s+identification\s+number|vehicle|vin)\b
  keywords:
    - id: Keyword_vehicle
      groups:
        - match_style: word
          terms:
            - text: VIN
              case_sensitive: true
            - vehicle identification
            - vehicle identification number
            - chassis
            - chassis number
            - vehicle
            - registration
            - motor vehicle
            - car
            - truck
      strength: domain
    - id: Keyword_global_vin_domain_context
      groups:
        - match_style: word
          terms:
            - vehicle identification number
            - vehicle
            - vin
      strength: domain
  filters:
    - id: Guard_vin_same_digits
      type: AllDigitsSameFilter
created: '2026-02-08'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1274 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.2
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — primary regex accepted all-zeros/same-digit VIN values (e.g. 11111111111111111); mirrors au-medicare-card-identifier protection.
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
