schema: testpattern/v1
name: Pre-Release Earnings Guidance with Financials
slug: pre-release-earnings-guidance-with-financials
version: 1.3.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects draft earnings guidance, profit warnings, or financial results before market disclosure. For QLD Government, this applies to GOCs subject to continuous disclosure obligations.
operation: 'Keyword proximity: earnings/financial results terms within 300 characters of pre-release/embargoed indicators and specific financial metrics (NPAT, EBITDA, dividend, per share). Also detects GOC names near financial result indicators.'
pattern: null
confidence: medium
confidence_justification: 'Medium confidence: the combination of earnings/profit terms with pre-release markers and specific financial metrics is highly distinctive. Published financial results and analyst reports are excluded.'
jurisdictions:
  - global
regulations:
- "Corporations Act 2001 (Cth)"
- "Criminal Code 1899 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - earnings
    - profit
    - revenue
    - financial results
    - guidance
    - draft
    - pre-release
    - embargoed
    - not for release
    - pre-announcement
    - per share
    - dividend
    - EBITDA
    - NPAT
    - underlying profit
    - Energy Queensland
    - Stanwell
    - CS Energy
    - Sunwater
    - Queensland Rail
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: 'PROTECTED — EMBARGOED UNTIL ASX ANNOUNCEMENT. Draft Earnings Guidance FY26. NPAT forecast: $245M (down 12% on prior year). EBITDA: $890M. Dividend recommendation: 45 cents per share (reduced from 60 cents). Underlying profit impacted by coal price decline.'
      description: Pre-release earnings guidance with financial metrics
    - value: 'Pre-release — Not for distribution. Energy Queensland Financial Results H1 FY26. Revenue: $4.2B. NPAT: $310M. Profit warning: Full-year NPAT expected to be 15-20% below guidance. Board to consider dividend revision. PROTECTED — insider information.'
      description: GOC pre-release financial results with profit warning
    - value: 'CONFIDENTIAL DRAFT — embargoed. FY26 profit guidance ahead of ASX release: underlying NPAT of $412M, up 8% on prior year. Not for distribution until market open.'
      description: Embargoed draft profit guidance with dollar metric before disclosure
  should_not_match:
    - value: 'ASX Announcement: Company X reports FY25 results, with net profit after tax of 245 million dollars and revenue of 1.8 billion dollars, fully franked dividend declared. Released to market.'
      description: Published ASX announcement — public information
    - value: 'Analyst report: We expect Energy Queensland to report net profit after tax of approximately 300 million dollars based on current market conditions. Our estimate is below consensus.'
      description: Analyst forecast based on public information
false_positives:
  - description: Published financial results and ASX announcements
    mitigation: Exclude documents containing 'ASX announcement', 'published', 'released to market' without pre-release/embargo markers
  - description: Analyst reports and market commentary with estimated earnings
    mitigation: Exclude documents containing 'analyst report', 'we expect', 'estimate', 'consensus' indicating external analysis
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pre_release_earnings_guidance_with_financials_dollar_amounts_for_financial_figures
      matches:
        - ref: Evidence_pre_release_earnings_guidance_with_financials_primary
        - ref: Evidence_pre_release_earnings_guidance_with_financials_pre_release
        - ref: Evidence_pre_release_earnings_guidance_with_financials_metrics
        - ref: Evidence_pre_release_earnings_guidance_with_financials_goc_names
        - ref: Pattern_pre_release_earnings_guidance_with_financials_dividend_per_share
        - ref: Pattern_pre_release_earnings_guidance_with_financials_percentage_changes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_pre_release_earnings_guidance_with_financials_exclusion
    - confidence_level: 75
      id_match: Pattern_pre_release_earnings_guidance_with_financials_dollar_amounts_for_financial_figures
      matches:
        - ref: Evidence_pre_release_earnings_guidance_with_financials_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_pre_release_earnings_guidance_with_financials_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_pre_release_earnings_guidance_with_financials_dollar_amounts_for_financial_figures
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_pre_release_earnings_guidance_with_financials_exclusion
  regexes:
    - id: Pattern_pre_release_earnings_guidance_with_financials_dollar_amounts_for_financial_figures
      pattern: \$[\d,.]+\s*[MBKmb]?
    - id: Pattern_pre_release_earnings_guidance_with_financials_dividend_per_share
      pattern: \b\d{1,3}\.\d{1,2}\s*cents\s+per\s+share\b|\b\d{1,3}\s*cents\s+per\s+share\b
    - id: Pattern_pre_release_earnings_guidance_with_financials_percentage_changes
      pattern: \b\d{1,2}\.\d{1,2}%|\b\d{1,2}%
  keywords:
    - id: Evidence_pre_release_earnings_guidance_with_financials_primary
      groups:
        - match_style: word
          terms:
            - earnings
            - profit
            - revenue
            - financial results
            - guidance
            - profit warning
      strength: domain
    - id: Evidence_pre_release_earnings_guidance_with_financials_pre_release
      groups:
        - match_style: word
          terms:
            - draft
            - pre-release
            - embargoed
            - not for release
            - pre-announcement
            - insider information
      strength: specific
    - id: Evidence_pre_release_earnings_guidance_with_financials_metrics
      groups:
        - match_style: word
          terms:
            - per share
            - dividend
            - EBITDA
            - NPAT
            - underlying profit
            - net profit after tax
            - text: EPS
              case_sensitive: true
      strength: domain
    - id: Evidence_pre_release_earnings_guidance_with_financials_goc_names
      groups:
        - match_style: word
          terms:
            - Energy Queensland
            - Stanwell
            - CS Energy
            - Sunwater
            - Queensland Rail
            - text: QIC
              case_sensitive: true
            - text: QTC
              case_sensitive: true
      strength: domain
    - id: Filter_pre_release_earnings_guidance_with_financials_exclusion
      groups:
        - match_style: word
          terms:
            - fully franked
            - published
            - released to market
            - analyst report
            - we expect
            - consensus
            - estimate by

      strength: noise
risk_rating: 10
risk_description: Draft earnings guidance or financial results before market disclosure; for GOCs this constitutes insider trading offence material.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Financial
references: []
created: '2026-02-20'
updated: '2026-07-09'
changelog:
  - 'Purview-safe regex rewrite (groups of multi-match removed)'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
