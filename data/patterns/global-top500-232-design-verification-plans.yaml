schema: testpattern/v1
name: Design verification plans
slug: global-top500-232-design-verification-plans
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to design verification plans in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:design\s+verification\s+plans|design\s+verification|verification\s+plan|product\s+quality|safety\s+verification|validation\s+protocol|design\s+review|test\s+protocol|verification\s+report|design\s+qualification)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - intellectual-property
corroborative_evidence:
  keywords:
    - design verification plans
    - design
    - verification
    - plans
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: design verification plans
      description: Primary topic phrase match
    - value: design verification
      description: Case-insensitive topic phrase match
    - value: verification plan
      description: Alternative topic phrase match
    - value: product quality
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to design verification plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_design_verification_plans
      matches:
        - ref: Pattern_global_top500_232_design_verification_plans_label_context
        - ref: Keyword_global_top500_232_design_verification_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_design_verification_plans
      matches:
        - ref: Keyword_design_verification_plans
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_design_verification_plans
      pattern: >-
        (?is)\b(?:design\s+verification\s+plans|design\s+verification|verification\s+plan|product\s+quality|safety\s+verification|validation\s+protocol|design\s+review|test\s+protocol|verification\s+report|design\s+qualification)\b
    - id: Pattern_global_top500_232_design_verification_plans_label_context
      pattern: (?i)\b(?:design\s+verification\s+plans)\b
  keywords:
    - id: Keyword_design_verification_plans
      groups:
        - match_style: word
          terms:
            - design verification plans
            - design verification
            - verification plan
            - product quality
            - safety verification
            - validation protocol
            - design review
            - test protocol
            - verification report
            - design qualification
      strength: specific
    - id: Keyword_global_top500_232_design_verification_plans_domain_context
      groups:
        - match_style: word
          terms:
            - design verification plans
            - design
            - verification
            - plans
      strength: domain
risk_description: >-
  The detector flags design-verification, verification-plan, and product-quality terminology with contextual keywords rather than confirming a complete test plan. A true match can reveal that a design is being tested and may expose planned assurance activity, which has some competitive value, but it does not necessarily disclose test cases, acceptance thresholds, schedules, or unreleased architecture. Practical misuse needs those details and a link to a specific product, keeping standalone harm bounded. Risk 5 and OFFICIAL fit the normal signal; a complete pre-release verification plan exposing weaknesses or regulatory evidence would warrant SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
