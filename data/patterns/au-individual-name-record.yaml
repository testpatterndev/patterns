schema: testpattern/v1
name: Australian Individual Name Record
slug: au-individual-name-record
version: 2.6.0
type: keyword_proximity
pattern_class: concept
engine: boost_regex
description: >-
  Identifies Australian personal names using capitalised name structure with controlled evidence
  from the consolidated Australian forename and surname dictionaries. Supports the multicultural
  name coverage represented in Australian birth, immigration, and administrative sources.
operation: >-
  Capitalised two-to-four component name structure is the primary signal. The consolidated Australian
  dictionaries are supporting evidence only: 65 requires either dictionary and is discovery-only, 75
  adds an explicit person-to-name relation plus both dictionary classes, and 85 additionally requires
  a name-field label. Strong business-suffix and formatted-address collisions veto enforcement.
case_sensitive: true
confidence: medium
confidence_justification: >-
  Medium confidence: enforcement requires capitalised name structure, Australian dictionary evidence,
  and personal-record context. Broad dictionary-only recognition remains discovery-only because names
  and name-like words can occur in organisations, headings, and ordinary prose.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - personal-name
test_cases:
  should_match:
    - value: Aaliyah Abbasi attended the briefing.
      description: Exact 65 discovery probe - structured name with both consolidated dictionary hits but no personal-record context
    - value: Applicant identified as Aaliyah Abbasi during identity intake.
      description: Exact 75 probe - structured name with a person-to-name relation and both dictionary classes but no field label
    - value: 'Customer name: Aaliyah Abbasi'
      description: Exact 85 probe - structured name with record context plus consolidated forename and surname evidence
    - value: 'Customer name: Sarah Williams'
      description: Common Western female name with surname
    - value: 'Patient: Nguyen Van Minh'
      description: Vietnamese-Australian name pattern
    - value: Employee details for Raj Kumar Singh
      description: Indian-Australian name with context
  should_not_match:
    - value: Please review the attached quarterly sales figures before Friday.
      description: Generic business text with no name pattern
    - value: Southern Cross Engineering submitted a tender for the contract.
      description: Organisation name may surface in discovery but lacks personal-record context and must not reach enforcement
    - value: 'Applicant organisation: Southern Cross Engineering Pty Ltd'
      description: Business-suffix collision in the Australian name dictionaries must not reach enforcement
    - value: 'Delivery location: Victoria Park Road, QLD 4000'
      description: Formatted-address vocabulary present in both name dictionaries must not reach enforcement
    - value: 'Client name: Quarterly Revenue'
      description: Name-field wording and capitalised structure without Australian name-dictionary evidence
    - value: 'Sample: Customer name: Aaliyah Abbasi'
      description: High-like template fixture must be rejected by the shared exclusion dictionary
false_positives:
  - description: Common surnames such as Brown, Young, or Green appear frequently as everyday words.
    mitigation: Use corroborative evidence keywords to filter. Require PII context.
exports:
  - purview_xml
  - yaml
scope: wide
risk_rating: 5
risk_description: >-
  The Australian Individual Name Record combines name-related dictionary terms with capitalised word structure, so it can identify an actual person's name rather than only a blank label. A matched name can support identity correlation, unwanted contact, or a more credible pretext when joined to an organisation, role, account, or case. Names are nevertheless routinely disclosed and the low-confidence construction can also match headings or ordinary title-cased text. Risk 5 and OFFICIAL recognise the potentially populated identity value without assuming the surrounding document is a sensitive personal dossier.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: au-forenames-australian
      as: Evidence_au_forename_registry
      match_style: word
    - dict: au-surnames-australian
      as: Evidence_au_surname_registry
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_individual_name
      matches:
        - ref: Pattern_individual_name_relation
        - ref: Evidence_name_record_context
        - ref: Evidence_au_forename_registry
        - ref: Evidence_au_surname_registry
        - ref: Pattern_individual_name_field
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_non_person_name_collision
    - confidence_level: 75
      id_match: Pattern_individual_name
      matches:
        - ref: Pattern_individual_name_relation
        - ref: Evidence_name_record_context
        - ref: Evidence_au_forename_registry
        - ref: Evidence_au_surname_registry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_non_person_name_collision
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_individual_name
      matches:
        - type: any
          min_matches: 1
          refs:
            - Evidence_au_forename_registry
            - Evidence_au_surname_registry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Pattern_individual_name
      pattern: \b(?:[A-Z][a-z]{1,20}\s+[A-Z][a-z]{1,20}\s+[A-Z][a-z]{1,20}\s+[A-Z][a-z]{1,20}|[A-Z][a-z]{1,20}\s+[A-Z][a-z]{1,20}\s+[A-Z][a-z]{1,20}|[A-Z][a-z]{1,20}\s+[A-Z][a-z]{1,20})\b
    - id: Pattern_individual_name_relation
      pattern: (?i)\b(?:(?:full\s+name|legal\s+name|first\s+name|last\s+name|surname|given\s+name|middle\s+name|(?:applicant|customer|client|patient|employee|member|holder|contact)\s+name|applicant|customer|client|patient|employee|member|holder|contact)\s*(?::|-|is)\s*(?:[a-z]{2,20}\s+[a-z]{2,20}\s+[a-z]{2,20}\s+[a-z]{2,20}|[a-z]{2,20}\s+[a-z]{2,20}\s+[a-z]{2,20}|[a-z]{2,20}\s+[a-z]{2,20})|(?:applicant|customer|client|patient|employee|member|holder|contact)\s+(?:identified\s+as|recorded\s+as|named|details\s+for)\s+(?:[a-z]{2,20}\s+[a-z]{2,20}\s+[a-z]{2,20}\s+[a-z]{2,20}|[a-z]{2,20}\s+[a-z]{2,20}\s+[a-z]{2,20}|[a-z]{2,20}\s+[a-z]{2,20}))\b
    - id: Pattern_individual_name_field
      pattern: (?i)\b(?:full\s+name|legal\s+name|first\s+name|last\s+name|surname|given\s+name|middle\s+name|(?:applicant|customer|client|patient|employee|member|holder|contact)\s+name|applicant|customer|client|patient|employee|member|holder|contact)\s*(?::|-|is)\s*
    - id: Pattern_non_person_name_collision
      pattern: (?i)\b(?:(?:engineering|consulting|holdings|services|pty\s+ltd|ltd|limited|company|corporation|council|university)|(?:street|road|avenue|highway|parade|drive|lane|terrace|crescent)\s*,?\s*(?:NSW|QLD|VIC|TAS|SA|WA|NT|ACT|\d{4}))\b
  keywords:
    - id: Evidence_name_record_context
      groups:
        - match_style: word
          terms:
            - name
            - full name
            - first name
            - last name
            - surname
            - given name
            - middle name
            - applicant
            - customer
            - client
            - patient
            - employee
            - member
            - holder
            - owner
            - contact
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 2.6.0
    date: '2026-07-19'
    description: 'Australian personal-name baseline: make capitalised name structure the primary signal with explicit component alternatives accepted by Purview; wire the consolidated 10,961-forename and 23,065-surname sources through keyword-dictionary references; distinguish dictionary-backed discovery, person-related medium, and explicit-field high tiers; veto strong business/address collisions; remove bare keyword fallback; add exact-tier and adversarial probes.'
  - version: 2.5.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 550 without changing detector or package metadata.'
  - version: 2.5.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 2.4.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 2.3.0
    date: '2026-07-04'
    description: Replace collision-prone should_not_match test values with true negatives (FP reduction)
  - version: 2.2.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 2.1.0
    date: '2026-07-04'
    description: Bound inner quantifier in repeated name-component group to remove Purview-flagged nested-quantifier shape
