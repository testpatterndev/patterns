schema: testpattern/v1
name: Cloudflare API Token
slug: global-cloudflare-api-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Cloudflare API tokens - 40-character tokens that authenticate to the Cloudflare API.
  Because the raw token has no distinctive prefix, this pattern gates on nearby Cloudflare context to keep false positives low.
operation: >-
  Matches a 40-character base62/underscore/hyphen token. The bare format is generic, so a fixed-length Cloudflare
  context label (cloudflare / cf_api_token / CLOUDFLARE_API_TOKEN) must appear immediately before the value. Corroborative evidence: keywords within 300 characters.
pattern: (?i)(?:cloudflare|cf[_-]?api[_-]?token|cf[_-]?token)(?:[_-]?api[_-]?token)?["'\s:=]{1,5}(?<![A-Za-z0-9_-])[A-Za-z0-9_-]{40}(?![A-Za-z0-9_-])
confidence: medium
confidence_justification: >-
  Medium confidence: the 40-character token body is generic, so detection requires an adjacent Cloudflare context label. This cuts false positives at the cost of missing unlabelled tokens.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - cloudflare
    - cf_api_token
    - CLOUDFLARE_API_TOKEN
    - api.cloudflare.com
    - bearer
    - api token
  proximity: 300
test_cases:
  should_match:
    - value: 'cf_api_token = zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIhHgG'
      description: Exact 65 probe - structurally valid labelled token without independent account context
    - value: 'Cloudflare zone credential cloudflare: aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789abcd'
      description: Exact 75 probe - token plus a Cloudflare resource context
    - value: 'Cloudflare account API endpoint api.cloudflare.com/client/v4; CLOUDFLARE_API_TOKEN=v1A2b3C4d5E6f7G8h9I0jK1lM2nO3pQ4rS5tU6v7'
      description: Exact 85 probe - account context, canonical assignment, and Cloudflare API endpoint
  should_not_match:
    - value: 'cloudflare: shorttoken123'
      description: Token too short even with Cloudflare context
    - value: aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789abcd
      description: 40-char string with no Cloudflare context (too generic)
    - value: 'github_token=aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789abcd'
      description: Sibling provider assignment with the same generic value length
    - value: 'Documentation example: Cloudflare account api.cloudflare.com/client/v4 CLOUDFLARE_API_TOKEN=v1A2b3C4d5E6f7G8h9I0jK1lM2nO3pQ4rS5tU6v7'
      description: Instructional example containing a syntactically valid token is excluded
    - value: rotate the cloudflare api token in the dashboard
      description: Prose mention without a token value
false_positives:
  - description: 40-char hashes or IDs appearing near the word cloudflare in documentation.
    mitigation: Require the context label adjacency (already enforced) plus corroborative keywords; exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_rating: 8
risk_description: >-
  This detector finds a 40-character Cloudflare API token only when an adjacent Cloudflare or CF token label supplies context, because the raw value has no distinctive prefix. A usable token can change DNS, firewall, Worker, or zone settings according to its configured permissions, enabling interception or service disruption. The impact is serious for the zones granted to one token, but token scope is configurable and the match does not prove full-account control. Risk 8 and SENSITIVE InfoTech fit the normal unit; PROTECTED requires demonstrated broad or critical-service authority.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_cloudflare_api_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_cloudflare_api_token
      matches:
        - ref: Keyword_cloudflare_resource_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_cloudflare_api_token
      matches:
        - ref: Keyword_cloudflare_resource_context
        - ref: Pattern_cloudflare_api_endpoint
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_cloudflare_api_token
      pattern: (?i)(?:cloudflare|cf[_-]?api[_-]?token|cf[_-]?token)(?:[_-]?api[_-]?token)?["'\s:=]{1,5}(?<![A-Za-z0-9_-])[A-Za-z0-9_-]{40}(?![A-Za-z0-9_-])
    - id: Pattern_cloudflare_api_endpoint
      pattern: (?i)api\.cloudflare\.com/client/v4
  keywords:
    - id: Keyword_cloudflare_resource_context
      groups:
        - match_style: string
          terms:
            - Cloudflare account
            - Cloudflare zone
            - Cloudflare Worker
            - Cloudflare DNS
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
changelog:
