    date: '2026-07-19'
    description: 'Add an individual 65 discovery / 75 resource-context / 85 API-endpoint Purview contract with exact-tier and adversarial token probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1530 without changing detector or package metadata.'
  - version: 1.1.0
