schema: testpattern/v1
name: Marketing suppression lists
slug: au-top500-372-marketing-suppression-lists
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to marketing suppression lists in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:marketing\s+suppression\s+lists|suppression\s+list|do\s+not\s+contact|Do\s+Not\s+Call\s+Register|marketing\s+exclusion|consent\s+withdrawal|email\s+suppression|Spam\s+Act|direct\s+marketing)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - marketing suppression lists
    - marketing
    - suppression
    - lists
    - customer
    - commercial
    - data
  proximity: 300
  keyword_lists:
    - data-record-context
test_cases:
  should_match:
    - value: marketing suppression lists
      description: Primary topic phrase match
    - value: suppression list
      description: Case-insensitive topic phrase match
    - value: do not contact
      description: Alternative topic phrase match
    - value: Do Not Call Register
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to marketing suppression lists appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_marketing_suppression
      matches:
        - ref: Evidence_marketing_suppression
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_marketing_suppression
      matches:
        - ref: Evidence_marketing_suppression
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_marketing_suppression
      matches:
        - ref: Evidence_marketing_suppression
  regexes:
    - id: Pattern_marketing_suppression
      pattern: >-
        (?is)\b(?:marketing\s+suppression\s+lists|suppression\s+list|do\s+not\s+contact|Do\s+Not\s+Call\s+Register|marketing\s+exclusion|consent\s+withdrawal|email\s+suppression|Spam\s+Act|direct\s+marketing)\b
  keywords:
    - id: Evidence_marketing_suppression
      groups:
        - match_style: word
          terms:
            - marketing suppression lists
            - suppression list
            - do not contact
            - opt-out
            - unsubscribe
            - Do Not Call Register
            - marketing exclusion
            - consent withdrawal
            - email suppression
            - blacklist
            - Spam Act
            - direct marketing
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
