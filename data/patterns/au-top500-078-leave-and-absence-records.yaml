schema: testpattern/v1
name: Leave and absence records
slug: au-top500-078-leave-and-absence-records
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to leave and absence records in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:leave\s+record|absence\s+record|annual\s+leave|sick\s+leave|personal\s+leave|leave\s+balance|leave\s+application|leave\s+entitlement|absence\s+management|leave\s+request|parental\s+leave|long\s+service\s+leave)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - leave and absence records
    - leave
    - absence
    - records
    - employment
    - workforce
  proximity: 300
  keyword_lists:
    - industry-hr
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: leave record
      description: Primary topic phrase match
    - value: absence record
      description: Case-insensitive topic phrase match
    - value: annual leave
      description: Alternative topic phrase match
    - value: sick leave
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to leave and absence records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_leave_absence
      matches:
        - ref: Evidence_leave_absence
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_leave_absence
      matches:
        - ref: Evidence_leave_absence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_leave_absence
      matches:
        - ref: Evidence_leave_absence
  regexes:
    - id: Pattern_leave_absence
      pattern: >-
        (?is)\b(?:leave\s+record|absence\s+record|annual\s+leave|sick\s+leave|personal\s+leave|leave\s+balance|leave\s+application|leave\s+entitlement|absence\s+management|leave\s+request|parental\s+leave|long\s+service\s+leave)\b
    - id: Pattern_au_top500_078_leave_and_absence_records_label_context
      pattern: (?i)\b(?:leave\s+and\s+absence\s+records)\b
  keywords:
    - id: Evidence_leave_absence
      groups:
        - match_style: word
          terms:
            - leave record
            - absence record
            - annual leave
            - sick leave
            - personal leave
            - leave balance
            - leave application
            - leave entitlement
            - absence management
            - leave request
            - parental leave
            - long service leave
    - id: Keyword_au_top500_078_leave_and_absence_records_domain_context
      groups:
        - match_style: word
          terms:
            - leave and absence records
            - leave
            - absence
risk_description: >-
  This detector identifies leave record, absence record, and annual leave language when several human-resources terms occur nearby. A normal true positive is an employee-specific absence record that can reveal illness, caring duties, religious observance, or patterns of availability, with consequences for privacy and workplace treatment. Policy documents, blank leave forms, and training examples remain plausible collisions because the medium-confidence pattern detects concepts rather than a completed record. Risk 8 SENSITIVE fits a consequential personnel record, while PROTECTED would require a large identified workforce history, acute medical or safety details, or disclosure capable of significant organisational or personal damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
