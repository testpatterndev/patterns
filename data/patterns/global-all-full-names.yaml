schema: testpattern/v1
name: All Full Names
slug: global-all-full-names
version: 1.4.0
type: keyword_list
pattern_class: concept
description: >-
  Catalogue reference for the Microsoft Purview built-in All Full Names named-entity SIT.
  This YAML-only record supplies supplementary name-field vocabulary for registry search
  and testing; it does not reproduce Microsoft's opaque name-recognition resources.
operation: >-
  In Microsoft Purview, enable the built-in All Full Names SIT to use Microsoft's name
  recognition. The TestPattern representation below is supplementary keyword logic only:
  65 discovers a name-field term, 75 adds person-record context, and 85 requires two
  additional distinct name-field terms. It exports YAML, not custom Purview XML.
keywords:
  - first name
  - last name
  - full name
  - given name
  - surname
  - family name
  - middle name
  - maiden name
  - name
  - forename
  - patronymic
  - matronymic
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on name-related terms requires additional context.
  Name keywords appear frequently in forms, directories, and general documents without
  constituting sensitive personal information.
jurisdictions:
  - global
regulations:
- "CCPA/CPRA"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - pii
test_cases:
  should_match:
    - value: "given name"
      description: Exact 65 supplementary discovery probe - one name-field term without person-record context
    - value: "applicant full name on identity record"
      description: Exact 75 supplementary probe - name-field term with person-record context but no additional fields
    - value: "identity record for applicant: full name, given name, surname"
      description: Exact 85 supplementary probe - person-record context with two additional distinct name fields
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Financial text with no name-related keywords
    - value: "the server configuration has been updated successfully"
      description: Technical text with no personal name terminology
false_positives:
  - description: Form labels, headers, or templates that reference name fields without containing actual names
    mitigation: >-
      Layer with named entity recognition to confirm keyword matches co-occur with actual
      personal name values rather than field labels.
  - description: Software documentation referencing name-related variables or database columns
    mitigation: >-
      Use document classification to distinguish personnel records from technical documentation.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Keyword_full_names
      matches:
        - ref: Keyword_full_names_context
        - ref: Keyword_additional_name_fields
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Keyword_full_names
      matches:
        - ref: Keyword_full_names_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_full_names
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  keywords:
    - id: Keyword_full_names
      groups:
        - match_style: word
          terms:
            - first name
            - last name
            - full name
            - given name
            - surname
            - family name
            - middle name
            - maiden name
            - forename
            - patronymic
            - matronymic
      strength: specific
    - id: Keyword_full_names_context
      groups:
        - match_style: word
          terms:
            - applicant
            - employee
            - patient
            - customer
            - beneficiary
            - contact name
            - legal name
            - name on file
            - date of birth
            - identification
            - personnel
            - next of kin
      strength: domain
    - id: Keyword_additional_name_fields
      groups:
        - match_style: word
          terms:
            - first name
            - last name
            - given name
            - surname
            - family name
            - middle name
            - maiden name
            - forename
            - patronymic
            - matronymic
      strength: specific
risk_rating: 3
risk_description: >-
  This low-confidence supplementary keyword list recognises name-field language such as surname, given name, and full name; it is not the machine-learning name recogniser and does not guarantee that a person's name is present. Where an actual full name is captured, it identifies an individual and can aid correlation or targeted contact, but names are often public and rarely cause material harm alone. Forms, database documentation, and empty templates are normal false positives, so the affected scale cannot be inferred from one match. Risk 3 OFFICIAL reflects low standalone impact; SENSITIVE would require names linked to protected attributes, a sensitive case, a high-risk cohort, or a consequential bulk roster.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-all-full-names
    title: "All Full Names entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-19'
