schema: testpattern/v1
name: Source Code Database Credentials
slug: snaffler-source-db-credentials
version: 1.0.1
type: regex
engine: boost_regex
description: >-
  Detects database connection credentials embedded in source code across Java (JDBC),
  PHP, Perl, Ruby, and Python. Matches database driver connect() calls containing
  credentials inline. Mirrors Snaffler rules KeepJavaDbConnStrings, KeepPhpDbConnStrings,
  KeepPerlDbConnStrings, KeepRubyDbConnStrings, KeepPyDbConnStrings.
operation: >-
  Matches database driver connect calls in Java, PHP, Perl, Ruby, and Python source
  files. Bare connect calls are common in configuration code; the 65-tier fires on the
  connect form alone (low confidence), while 75/85 tiers require password-proximity
  evidence within 300 characters.
pattern: \.getConnection\("jdbc:[A-Za-z0-9:+.\-]{2,30}
confidence: medium
confidence_justification: >-
  Medium confidence: database connect-string patterns are specific but bare connect
  calls without evidence of inline credentials generate false positives in config
  scaffolding and unit test mocks. Tiered gating with evidence requirements at 75/85
  significantly improves precision.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - password
    - passwd
    - pwd
    - user
    - host
    - dbname
    - database
  proximity: 300
test_cases:
  should_match:
    - value: 'Connection conn = DriverManager.getConnection("jdbc:mysql://localhost:3306/mydb", "admin", "Secr3t!");'
      description: Java JDBC MySQL connection string with inline credentials
    - value: 'conn = DriverManager.getConnection("jdbc:postgresql://db.corp.com/prod?user=svc&password=Hunter2")'
      description: Java JDBC PostgreSQL URL with embedded user and password
    - value: 'ds.getConnection("jdbc:sqlserver://sqlhost:1433;databaseName=HR;user=sa;password=P@ssw0rd")'
      description: Java JDBC SQL Server with inline credentials
    - value: 'mysql_connect("db.corp.internal", "root", $password)'
      description: PHP mysql_connect with password variable
    - value: 'pg_connect("host=dbhost user=admin dbname=prod", $password)'
      description: PHP pg_connect with password variable argument
    - value: "my $dbh = DBI->connect('dbi:mysql:mydb', 'user', 'P@ss123');"
      description: Perl DBI connect with inline password
    - value: "db = DBI.connect('dbi:Pg:dbname=prod', 'svcuser', 'TopSecr3t')"
      description: Ruby DBI connect with inline password
    - value: "conn = mysql.connector.connect(host='db.corp.com', user='app', password='Passw0rd!')"
      description: Python mysql.connector with inline credentials
    - value: "conn = psycopg2.connect(host='pghost', dbname='app', user='dba', password='dbSecret')"
      description: Python psycopg2 connect with inline password
  should_not_match:
    - value: 'Connection conn = DriverManager.getConnection(config.getDatabaseUrl(), config.getUser(), config.getPassword());'
      description: JDBC call using config object variables only, no inline jdbc URL literal
    - value: 'mysql_connect()'
      description: Parameterless PHP connect call with no credential arguments
    - value: "# see the config module for database credentials and connection settings"
      description: Prose comment referencing database credentials without any connect() call
false_positives:
  - description: Unit tests and configuration scaffolding that call connect() with placeholder values (localhost, testdb, example.com).
    mitigation: Check for placeholder hostnames and example passwords; require evidence at 75+ tier.
  - description: ORM configuration files that reference connect() method names in comments or docstrings.
    mitigation: Require proximity to actual credential terms (password, pwd) rather than firing on connect call alone.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Regex_snaffler_jdbc_connect
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_php_db_connect
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_perl_dbi_connect
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_ruby_dbi_connect
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_python_db_connect
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_jdbc_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_php_db_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_perl_dbi_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_ruby_dbi_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_python_db_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_jdbc_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - ref: Keyword_snaffler_source_db_password_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_php_db_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - ref: Keyword_snaffler_source_db_password_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_perl_dbi_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - ref: Keyword_snaffler_source_db_password_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_ruby_dbi_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - ref: Keyword_snaffler_source_db_password_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_python_db_connect
      matches:
        - ref: Keyword_snaffler_source_db_evidence
        - ref: Keyword_snaffler_source_db_password_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_jdbc_connect
      pattern: \.getConnection\("jdbc:[A-Za-z0-9:+.\-]{2,30}
    - id: Regex_snaffler_php_db_connect
      pattern: (?:mysql_connect|mysql_pconnect|pg_connect|pg_pconnect)\s*\([\s\S]{0,200}\$
    - id: Regex_snaffler_perl_dbi_connect
      pattern: DBI\->connect\(
    - id: Regex_snaffler_ruby_dbi_connect
      pattern: DBI\.connect\(
    - id: Regex_snaffler_python_db_connect
      pattern: (?:mysql\.connector|psycopg2)\.connect\(
  keywords:
    - id: Keyword_snaffler_source_db_evidence
      groups:
        - match_style: word
          terms:
            - database
            - dbname
            - db_name
            - host
            - user
            - username
            - jdbc
            - dbi
    - id: Keyword_snaffler_source_db_password_evidence
      groups:
        - match_style: word
          terms:
            - password
            - passwd
            - pwd
            - db_password
            - db_pass
created: '2026-06-26'
updated: '2026-07-09'
changelog:
  - version: 1.0.1
    date: '2026-07-09'
    description: Replace example.com hostname in the mysql_connect should_match value with corp.internal — the shared template-exclusion NOT-group ("example") on every tier vetoed this positive so it could never fire (tier-harness triage class T4)
