schema: testpattern/v1
name: Ethnicity or race
slug: global-top500-017-ethnicity-or-race
version: 1.3.1
type: regex
pattern_class: concept
status: deprecated
deprecation_reason: 'needs-EDM/ML — attribute values (a person’s nationality, orientation, beliefs, or ethnicity) have no text format, and the phrase evidence was too generic for reliable topic detection; dedicated Art-9 reference patterns modeled on global-political-opinion are the replacement path'
engine: boost_regex
description: >-
  Identifies documents containing references to ethnicity or race in international contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: pii-personal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:racial\s+background|ethnic\s+origin|ethnic\s+group|cultural\s+background|racial\s+classification|diversity\s+data|equality\s+monitoring|protected\s+characteristic)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - ethnicity or race
    - ethnicity
    - race
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - pii-personal
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: racial background
      description: Primary topic phrase match
    - value: ethnic origin
      description: Case-insensitive topic phrase match
    - value: ethnic group
      description: Alternative topic phrase match
    - value: cultural background
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to ethnicity or race appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_ethnicity_race
      matches:
        - ref: Pattern_global_top500_017_ethnicity_or_race_label_context
        - ref: Keyword_global_top500_017_ethnicity_or_race_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_ethnicity_race
      matches:
        - ref: Keyword_ethnicity_race
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ethnicity_race
      pattern: (?is)\b(?:racial\s+background|ethnic\s+origin|ethnic\s+group|cultural\s+background|racial\s+classification|diversity\s+data|equality\s+monitoring|protected\s+characteristic)\b
    - id: Pattern_global_top500_017_ethnicity_or_race_label_context
      pattern: (?i)\b(?:ethnicity\s+or\s+race)\b
  keywords:
    - id: Keyword_ethnicity_race
      groups:
        - match_style: word
          terms:
            - ethnicity
            - race
            - racial background
            - ethnic origin
            - ethnic group
            - cultural background
            - racial classification
            - ancestry
            - heritage
            - diversity data
            - equality monitoring
            - protected characteristic
      strength: specific
    - id: Keyword_global_top500_017_ethnicity_or_race_domain_context
      groups:
        - match_style: word
          terms:
            - ethnicity or race
            - ethnicity
            - race
      strength: domain
risk_description: >-
  The deprecated low-confidence concept detector finds racial-background, ethnic-origin or group, cultural-background, diversity-data, equality-monitoring, and protected-characteristic phrases with six personal context terms. If linked to a person, disclosure can enable discrimination, profiling, harassment, or exclusion based on race or ethnicity. The regex also matches policy and monitoring material without an attributable value, so operational precision is low even though genuine records carry serious harm. Risk 8 and SENSITIVE are justified, while PROTECTED is not met without a threatened protected group, bulk register, severe safety consequence, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
