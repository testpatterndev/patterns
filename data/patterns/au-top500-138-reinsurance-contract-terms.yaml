schema: testpattern/v1
name: Reinsurance contract terms
slug: au-top500-138-reinsurance-contract-terms
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to reinsurance contract terms in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:reinsurance\s+contract|reinsurance\s+treaty|ceding\s+company|treaty\s+terms|excess\s+of\s+loss|proportional\s+treaty|insurance\s+premium)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - reinsurance contract terms
    - reinsurance
    - contract
    - terms
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: reinsurance contract
      description: Primary topic phrase match
    - value: reinsurance treaty
      description: Case-insensitive topic phrase match
    - value: ceding company
      description: Alternative topic phrase match
    - value: treaty terms
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_reinsurance_contract
      matches:
        - ref: Evidence_reinsurance_contract
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_reinsurance_contract
      matches:
        - ref: Evidence_reinsurance_contract
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_reinsurance_contract
      matches:
        - ref: Evidence_reinsurance_contract
  regexes:
    - id: Pattern_reinsurance_contract
      pattern: (?is)\b(?:reinsurance\s+contract|reinsurance\s+treaty|ceding\s+company|treaty\s+terms|excess\s+of\s+loss|proportional\s+treaty|insurance\s+premium)\b
  keywords:
    - id: Evidence_reinsurance_contract
      groups:
        - match_style: word
          terms:
            - reinsurance contract
            - reinsurance treaty
            - ceding company
            - retrocession
            - treaty terms
            - excess of loss
            - proportional treaty
            - reinsurer
            - APRA
            - insurance premium
risk_description: >-
  This concept pattern identifies reinsurance treaties and contract terms between a ceding insurer and reinsurer. Premature disclosure could expose pricing, retention, limits, exclusions, or capacity and weaken a party's negotiating position. The ordinary contract reference is business-confidential but does not reveal customer payment credentials or provide authority over claims, and harm depends on current deal context. Risk 4 and OFFICIAL are proportionate; a live catastrophe placement, disputed claim strategy, or complete portfolio treaty could require stronger handling.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
