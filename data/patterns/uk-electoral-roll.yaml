schema: testpattern/v1
name: Electoral Roll Number
slug: uk-electoral-roll
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Electoral Roll Number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-uk-electoral-roll-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b[A-Z]{2,3}\d{1,4}\b
confidence: low
confidence_justification: >-
  Low confidence: pattern is broad and will match many non-identity sequences. Corroborative keywords are essential to achieve acceptable false positive rates.
jurisdictions:
  - uk
regulations:
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - electoral roll
    - electoral register
    - polling district
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: "AB1234"
      description: Electoral roll with 2 letters and 4 digits
    - value: "XYZ12"
      description: Electoral roll with 3 letters and 2 digits
    - value: "CD1"
      description: Electoral roll with 2 letters and 1 digit
  should_not_match:
    - value: "A1234"
      description: Only one letter
    - value: "ABCD1234"
      description: Four letters (too many)
false_positives:
  - description: >-
      Short alphanumeric sequences (2-3 letters + 1-4 digits) are extremely common across many contexts including postcodes, product codes, and abbreviations.
    mitigation: >-
      This pattern has a very high false positive rate. Always require corroborative evidence keywords such as "electoral roll" or "electoral register" within the proximity window.
  - description: >-
      In multiple languages, similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_uk_electoral_roll
      matches:
        - ref: Keyword_uk_electoral_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_uk_electoral_roll
      matches:
        - ref: Keyword_uk_electoral_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_uk_electoral_roll
  regexes:
    - id: Regex_uk_electoral_roll
      pattern: \b[A-Z]{2,3}\d{1,4}\b
  keywords:
    - id: Keyword_uk_electoral_specific
      groups:
        - match_style: word
          terms:
            - electoral roll
            - electoral register
            - electoral number
            - polling district
            - voter registration
            - elector number
            - electoral registration
            - register of electors
      strength: specific
    - id: Keyword_uk_electoral_broad
      groups:
        - match_style: word
          terms:
            - elector
            - polling station
            - constituency
            - ward
            - ballot
            - registered voter
            - voting register
            - local authority
      strength: domain
risk_rating: 5
risk_description: >-
  The UK electoral-roll detector finds a short reference made of two or three letters and one to four digits near electoral terminology, not an electoral register entry or voter list. It may reveal an administrative routing reference or help correlate a voter only when a name, address, and roll context are also present. The normal hit affects no identifiable person by itself, and postcodes, product codes, and abbreviations frequently share the structure. Risk 5 and OFFICIAL retain a bounded contextual assessment; an actual voter record with address and participation details would be more sensitive.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-uk-electoral-roll-number
    title: "U.K. Electoral Roll Number entity definition - Microsoft Learn"
