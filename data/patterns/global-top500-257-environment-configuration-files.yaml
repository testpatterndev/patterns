schema: testpattern/v1
name: Environment configuration files
slug: global-top500-257-environment-configuration-files
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies environment configuration files patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:environment\s+configuration|config\s+file|environment\s+variable|\.env\s+file|connection\s+string|application\s+settings|secrets\s+management|configuration\s+management|deployment\s+config|environment\s+secret)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - environment configuration files
    - environment
    - configuration
    - files
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: 'Environment configuration'
      description: Topic phrase present
    - value: 'environment configuration'
      description: Topic phrase, lowercase
    - value: 'this file holds environment configuration values'
      description: Phrase in surrounding text
  should_not_match:
    - value: 'unrelated generic text'
      description: No relevant phrase
    - value: 'random prose without anchors'
      description: No anchors
    - value: 'template example placeholder'
      description: Template/sample text
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_environment_config_files
      matches:
        - ref: Pattern_global_top500_257_environment_configuration_files_label_context
        - ref: Keyword_global_top500_257_environment_configuration_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_environment_config_files
      matches:
        - ref: Keyword_environment_config_files
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_environment_config_files
      pattern: >-
        (?is)\b(?:environment\s+configuration|config\s+file|environment\s+variable|\.env\s+file|connection\s+string|application\s+settings|secrets\s+management|configuration\s+management|deployment\s+config|environment\s+secret)\b
    - id: Pattern_global_top500_257_environment_configuration_files_label_context
      pattern: (?i)\b(?:environment\s+configuration\s+files)\b
  keywords:
    - id: Keyword_environment_config_files
      groups:
        - match_style: word
          terms:
            - environment configuration
            - config file
            - environment variable
            - .env file
            - connection string
            - application settings
            - secrets management
            - configuration management
            - deployment config
            - environment secret
      strength: specific
    - id: Keyword_global_top500_257_environment_configuration_files_domain_context
      groups:
        - match_style: word
          terms:
            - environment configuration files
            - environment
            - configuration
            - files
      strength: domain
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-04'
changelog:
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
