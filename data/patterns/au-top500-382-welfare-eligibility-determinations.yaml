schema: testpattern/v1
name: Welfare eligibility determinations
slug: au-top500-382-welfare-eligibility-determinations
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to welfare eligibility determinations in Australian contexts. This information type is classified as personally identifiable information under the Privacy
  Act 1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:welfare\s+eligibility\s+determinations|Services\s+Australia|income\s+support|means\s+test|social\s+security)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - welfare eligibility determinations
    - welfare
    - eligibility
    - determinations
    - government
    - citizen
    - services
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: welfare eligibility determinations
      description: Primary topic phrase match
    - value: services australia
      description: Case-insensitive topic phrase match
    - value: income support
      description: Alternative topic phrase match
    - value: means test
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to welfare eligibility determinations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_welfare_eligibility
      matches:
        - ref: Evidence_welfare_eligibility
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_welfare_eligibility
      matches:
        - ref: Evidence_welfare_eligibility
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_welfare_eligibility
      matches:
        - ref: Evidence_welfare_eligibility
  regexes:
    - id: Pattern_welfare_eligibility
      pattern: (?is)\b(?:welfare\s+eligibility\s+determinations|Services\s+Australia|income\s+support|means\s+test|social\s+security)\b
    - id: Pattern_au_top500_382_welfare_eligibility_determinations_label_context
      pattern: (?i)\b(?:welfare\s+eligibility\s+determinations)\b
  keywords:
    - id: Evidence_welfare_eligibility
      groups:
        - match_style: word
          terms:
            - welfare eligibility determinations
            - welfare
            - eligibility
            - determination
            - Centrelink
            - Services Australia
            - income support
            - means test
            - benefit
            - social security
            - entitlement
    - id: Keyword_au_top500_382_welfare_eligibility_determinations_domain_context
      groups:
        - match_style: word
          terms:
            - welfare eligibility determinations
            - welfare
            - eligibility
            - determinations
risk_description: >-
  The concept regex identifies welfare eligibility determinations, means tests, income-support assessments, and Services Australia decision material rather than a claimant number alone. A completed determination can combine household income, assets, dependants, disability or hardship indicators, supporting evidence, and the agency's outcome, enabling stigma, fraud targeting, or unfair treatment of the applicant and family. The normal unit is one consequential benefits case with serious but contained financial and privacy harm, while policy and training language can be false positives. Risk 8 SENSITIVE Personal-Privacy is justified; PROTECTED is not met without protected addresses, acute safety threats, large-scale beneficiary exposure, or significant compromise of benefit administration.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
