    title: Administration overview - Docs by LangChain (confirms lsv2_pt_/lsv2_sk_ prefixes)
  - url: https://docs.github.com/en/code-security/secret-scanning/introduction/supported-secret-scanning-patterns
    title: Supported secret scanning patterns - GitHub Docs
  - url: https://github.com/anthropics/claude-code/issues/57131
    title: 'GitHub issue disclosing real leaked LangSmith key structure: lsv2_pt_<32-hex>_<10-hex>'
