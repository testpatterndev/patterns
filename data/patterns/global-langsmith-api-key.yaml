schema: testpattern/v1
name: LangSmith API Key
slug: global-langsmith-api-key
version: 1.2.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects LangSmith API keys (personal access tokens and service keys), which use a distinctive
  lsv2_pt_ or lsv2_sk_ prefix followed by a hyphenated hex body. A leaked key grants unauthorized
  access to LangSmith trace data -- which can include full LLM prompts and completions -- and
  billed access to the LangSmith/LangChain platform.
operation: >-
  A broad lsv2_pt_/lsv2_sk_ candidate is retained at 65 for discovery. The 75 tier requires the
  documented 32-hex, underscore, 10-hex structure and rejects explicit template context. The 85 tier
  additionally requires a LangSmith/LangChain label or endpoint nearby. LangChain documents both
  prefixes; the segment lengths are corroborated by a real leaked-credential redaction.
pattern: (?<![A-Za-z0-9_])lsv2_(?:pt|sk)_[0-9a-fA-F]{32}_[0-9a-fA-F]{10}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: the lsv2_pt_/lsv2_sk_ prefixes are documented by LangChain, LangSmith keys are
  GitHub secret-scanning partner entries, and the 32-hex-underscore-10-hex structure is independently
  observed. The exact format enforces at medium confidence; an explicit LangSmith/LangChain label is
  required for the maximum-rejection high tier.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - langsmith
    - langchain
    - smith.langchain.com
    - LANGSMITH_API_KEY
    - api key
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: lsv2_pt_0123456789abcdef01234567
      description: Low-tier probe - plausible prefixed candidate with an incomplete body
    - value: lsv2_pt_0123456789abcdef0123456789abcdef_0123456789
      description: Medium-tier probe - exact LangSmith token structure without nearby vendor context
    - value: 'LANGSMITH_API_KEY=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'
      description: High-tier probe - exact service key with an unambiguous LangSmith label
    - value: Using langsmith with key lsv2_pt_ABCDEF0123456789ABCDEF0123456789_ABCDEF0123
      description: LangSmith brand mention followed by a mixed-case hex token value
  should_not_match:
    - value: ls__0123456789abcdef0123456789abcdef_0123456789
      description: Legacy ls__ prefix, rejected by v2 tracing and not a current lsv2_ key
    - value: lsv2_pt_0123456789abcdef012345678abcd_0123456789
      description: First hex segment too short (29 chars, not 32)
    - value: dont forget to rotate the langsmith api key
      description: Prose mention without a token value
    - value: 'Documentation example: LANGSMITH_API_KEY=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'
      description: Exact but explicitly documented example must not enforce
false_positives:
  - description: Documentation or examples showing placeholder lsv2_pt_/lsv2_sk_ strings.
    mitigation: Suppress explicit template/example framing; treat an exact bare token as medium and require an unambiguous LangSmith/LangChain label for high confidence.
  - description: Legacy ls__-prefixed LangChain API keys (pre-v2, superseded October 2024) are a different, older format not matched by this pattern.
    mitigation: Documented as a known scope limitation; legacy ls__ keys are out of scope for this pattern.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The high-confidence regex identifies LangSmith personal or service credentials through the lsv2_pt_ or lsv2_sk_ prefix and fixed hex segments. A live key can expose trace records containing prompts, completions, metadata, and application context, and can authorize billed platform operations within its assigned workspace. The affected scale is one user, service, or LangSmith workspace, with role, project scope, retention, and revocation containing harm. Risk 8 and SENSITIVE reflect serious contained AI-observability exposure, while a service key spanning protected prompts or many production environments would raise the impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_langsmith_api_key
      matches:
        - ref: Keyword_langsmith_api_key
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_langsmith_api_key
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_langsmith_candidate
  regexes:
    - id: Regex_langsmith_candidate
      pattern: (?<![A-Za-z0-9_])lsv2_(?:pt|sk)_[0-9A-Za-z_]{20,50}(?![A-Za-z0-9_-])
    - id: Regex_langsmith_api_key
      pattern: (?<![A-Za-z0-9_])lsv2_(?:pt|sk)_[0-9a-fA-F]{32}_[0-9a-fA-F]{10}(?![A-Za-z0-9_-])
  keywords:
    - id: Keyword_langsmith_api_key
      groups:
        - match_style: word
          terms:
            - langsmith
            - langchain
            - smith.langchain.com
            - LANGSMITH_API_KEY
            - langsmith api
      strength: specific
