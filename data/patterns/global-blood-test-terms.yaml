schema: testpattern/v1
name: Blood Test Terms
slug: global-blood-test-terms
version: 1.3.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Blood Test Terms patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that identifies health and medical terminology in documents.
  Keyword matching is used to flag content containing medical language.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  health and medical terminology to identify protected health information.
keywords:
  - hemoglobin
  - hematocrit
  - platelet count
  - white blood cell
  - red blood cell
  - blood glucose
  - cholesterol
  - triglycerides
  - creatinine
  - blood urea nitrogen
  - liver function
  - thyroid panel
  - complete blood count
  - CBC
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on medical terms requires additional context for
  accurate detection. Medical terminology may appear in educational, research, or general
  health content without constituting protected health information.
jurisdictions:
  - global
regulations:
- GDPR
- HIPAA
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - phi
  - health
test_cases:
  should_match:
    - value: "patient diagnosed with hemoglobin"
      description: Contains medical keyword 'hemoglobin'
    - value: "treatment plan includes hematocrit"
      description: Contains medical keyword 'hematocrit'
    - value: "clinical notes reference platelet count"
      description: Contains medical keyword 'platelet count'
  should_not_match:
    - value: "quarterly revenue report for fiscal year 2024"
      description: Financial text with no medical terminology
    - value: "the project deadline has been moved to next Friday"
      description: Business scheduling text with no health terms
false_positives:
  - description: Educational or research materials discussing medical topics without containing actual patient data
    mitigation: >-
      Layer with PII detection to confirm medical terms appear alongside patient identifiers.
  - description: News articles or general health information websites mentioning medical conditions
    mitigation: >-
      Use document classification to distinguish clinical records from public health content.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_blood_test
      matches:
        - ref: Keyword_blood_test_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_blood_test
  keywords:
    - id: Keyword_blood_test
      groups:
        - match_style: word
          terms:
            - hemoglobin
            - hematocrit
            - platelet count
            - white blood cell
            - red blood cell
            - blood glucose
            - cholesterol
            - triglycerides
            - creatinine
            - blood urea nitrogen
            - liver function
            - thyroid panel
            - complete blood count
            - text: CBC
              case_sensitive: true
      strength: domain
    - id: Keyword_blood_test_context
      groups:
        - match_style: word
          terms:
            - lab results
            - test results
            - blood work
            - specimen
            - laboratory
            - reference range
            - normal range
            - patient
            - medical record
            - pathology report
            - physician order
            - clinical laboratory
      strength: specific
risk_rating: 5
risk_description: >-
  The detector identifies blood-test vocabulary such as hemoglobin, hematocrit, or platelet count, not the measured value, reference interval, patient, or laboratory report. Those terms are routine in educational material, test catalogs, clinical guidance, and equipment documentation as well as in real care records. A standalone match consequently discloses no individual's result and cannot support a clinical inference with confidence. Risk 5 and OFFICIAL are appropriate; SENSITIVE would require a result or interpretation tied to an identifiable patient or encounter.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-blood-test-terms
    title: "Blood Test Terms entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
