schema: testpattern/v1
name: Suspicious activity reports
slug: au-top500-133-suspicious-activity-reports
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to suspicious activity reports in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:suspicious\s+activity\s+report|suspicious\s+matter\s+report|unusual\s+transaction|threshold\s+transaction|financial\s+intelligence|compliance\s+reporting|suspicious\s+behaviour|transaction\s+alert)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - suspicious activity reports
    - suspicious
    - activity
    - reports
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: suspicious activity report
      description: Primary topic phrase match
    - value: suspicious matter report
      description: Case-insensitive topic phrase match
    - value: unusual transaction
      description: Alternative topic phrase match
    - value: threshold transaction
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_suspicious_activity
      matches:
        - ref: Evidence_suspicious_activity
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_suspicious_activity
      matches:
        - ref: Evidence_suspicious_activity
    - confidence_level: 65
      id_match: Pattern_suspicious_activity
      matches:
        - ref: Evidence_suspicious_activity
  regexes:
    - id: Pattern_suspicious_activity
      pattern: (?is)\b(?:suspicious\s+activity\s+report|suspicious\s+matter\s+report|unusual\s+transaction|threshold\s+transaction|financial\s+intelligence|compliance\s+reporting|suspicious\s+behaviour|transaction\s+alert)\b
  keywords:
    - id: Evidence_suspicious_activity
      groups:
        - match_style: word
          terms:
            - suspicious activity report
            - suspicious matter report
            - SMR
            - AUSTRAC
            - unusual transaction
            - threshold transaction
            - financial intelligence
            - compliance reporting
            - suspicious behaviour
            - transaction alert
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.austrac.gov.au/business/core-guidance/reporting/suspicious-matter-reports-smrs
  - https://www.austrac.gov.au/business/core-guidance/customer-identification-and-verification
