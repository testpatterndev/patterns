schema: testpattern/v1
name: Government media war-room plans
slug: au-top500-495-government-media-war-room-plans
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to government media war-room plans in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:media\s+war\s+room|war\s+room\s+plan|government\s+media|crisis\s+communications|media\s+monitoring|rapid\s+response|media\s+management|press\s+gallery|media\s+adviser|media\s+operations|public\s+relations|damage\s+control)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - privacy-act-1988
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - government media war-room plans
    - government
    - media
    - war
    - room
    - plans
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: media war room
      description: Primary topic phrase match
    - value: war room plan
      description: Case-insensitive topic phrase match
    - value: government media
      description: Alternative topic phrase match
    - value: crisis communications
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to government media war-room plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
