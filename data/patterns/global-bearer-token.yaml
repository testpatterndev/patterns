schema: testpattern/v1
name: Bearer
slug: global-bearer-token
version: 1.4.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects JWT-shaped values presented with the Bearer authentication scheme. A
  bare scheme/value pair is discovery-only; an Authorization header enforces at
  medium confidence and a complete HTTP request or response context reaches high.
operation: >-
  Regex_bearer_token recognizes Bearer plus three Base64url-style segments. The
  65 tier inventories the bare credential shape. The 75 tier requires an HTTP
  Authorization header, while the 85 tier additionally requires request/response
  framing such as a request line, Host header, or HTTP status line. Enforcing tiers
  reject explicit templates and placeholder token values.
pattern: \b[Bb]earer\s+[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxIn0.reCjcZ0-m3Q
      description: Low-tier probe - bare Bearer credential without transport framing
    - value: 'Authorization: bearer eyJhbGciOiJub25lIn0.eyJ0ZXN0IjoiMSJ9.abc'
      description: Medium-tier probe - JWT-shaped value in an Authorization header
    - value: |-
        GET /admin HTTP/1.1
        Host: api.example.org
        Authorization: Bearer eyJ0eXAiOiJKV1QifQ.eyJpZCI6MSwiYWRtaW4iOnRydWV9.sig
      description: High-tier probe - Authorization header inside a complete HTTP request
  should_not_match:
    - value: Bearer single-segment-token
      description: Only one segment instead of three dot-separated
    - value: Token eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxIn0.sig
      description: Wrong keyword (Token instead of Bearer)
    - value: Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxIn0
      description: Only two dot-separated segments instead of three
    - value: 'Authorization: Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxIn0.REDACTED'
      description: Placeholder token in an otherwise valid Authorization header
    - value: 'Documentation example: Authorization: Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxIn0.abc'
      description: Documentation quoting a valid header must not enforce
    - value: 'Authorization: Basic dXNlcjpwYXNz'
      description: Sibling HTTP Basic authorization scheme
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_bearer_token
      matches:
        - ref: Evidence_authorization_header
        - ref: Evidence_http_message
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_placeholder_token
    - confidence_level: 75
      id_match: Regex_bearer_token
      matches:
        - ref: Evidence_authorization_header
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_placeholder_token
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_bearer_token
  regexes:
    - id: Regex_bearer_token
      pattern: \b[Bb]earer\s+[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b
    - id: Evidence_authorization_header
      pattern: '(?i)\bAuthorization\s*:\s*Bearer\s+'
    - id: Evidence_http_message
      pattern: '(?i)\b(?:GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS)\s+/[^\r\n]{0,160}\s+HTTP/[12]\.[01]\b|\bHTTP/[12]\.[01]\s+\d{3}\b|\bHost\s*:\s*[A-Za-z0-9.-]+'
  keywords:
    - id: Evidence_placeholder_token
      groups:
        - match_style: string
          terms:
            - REDACTED
            - PLACEHOLDER
            - your-token-here
            - example-token
risk_description: >-
  This pattern matches the literal Bearer scheme followed by a three-segment JWT-shaped token, making the hit a presented authentication credential rather than merely a token identifier. A recipient may replay an active token against its issuing service and exercise the subject's current scopes until expiry or revocation. The normal impact is limited to one user, application identity, or session and the resources authorized to it, while samples, expired tokens, and tokens rejected by the target cause no access. Risk 8 SENSITIVE reflects potentially serious session or API compromise; PROTECTED would require confirmed high privilege, broad scope, or critical-service authority.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
