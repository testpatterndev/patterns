schema: testpattern/v1
name: Warranty claim analytics
slug: au-top500-236-warranty-claim-analytics
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to warranty claim analytics in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:warranty\s+claim|claim\s+analytics|warranty\s+data|return\s+rate|defect\s+rate|claim\s+frequency|warranty\s+cost|product\s+warranty|consumer\s+guarantee|claim\s+trend)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - warranty claim analytics
    - warranty
    - claim
    - analytics
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: warranty claim
      description: Primary topic phrase match
    - value: claim analytics
      description: Case-insensitive topic phrase match
    - value: warranty data
      description: Alternative topic phrase match
    - value: return rate
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to warranty claim analytics appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_warranty_claim_analytics
      matches:
        - ref: Evidence_warranty_claim_analytics
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_236_warranty_claim_analytics_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_warranty_claim_analytics
      matches:
        - ref: Evidence_warranty_claim_analytics
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_236_warranty_claim_analytics_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_warranty_claim_analytics
      matches:
        - ref: Evidence_warranty_claim_analytics
  regexes:
    - id: Pattern_warranty_claim_analytics
      pattern: (?is)\b(?:warranty\s+claim|claim\s+analytics|warranty\s+data|return\s+rate|defect\s+rate|claim\s+frequency|warranty\s+cost|product\s+warranty|consumer\s+guarantee|claim\s+trend)\b
    - id: Pattern_au_top500_236_warranty_claim_analytics_label_context
      pattern: (?i)\\b(?:warranty\\s+claim\\s+analytics|warranty|claim|analytics|top500)\\b
  keywords:
    - id: Evidence_warranty_claim_analytics
      groups:
        - match_style: word
          terms:
            - warranty claim
            - claim analytics
            - warranty data
            - return rate
            - defect rate
            - claim frequency
            - warranty cost
            - product warranty
            - consumer guarantee
            - claim trend
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_236_warranty_claim_analytics_domain_context
      groups:
        - match_style: word
          terms:
            - warranty claim analytics
            - warranty
            - claim
            - analytics
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_236_warranty_claim_analytics_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
