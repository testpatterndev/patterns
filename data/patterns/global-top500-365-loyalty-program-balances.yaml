schema: testpattern/v1
name: Loyalty program balances
slug: global-top500-365-loyalty-program-balances
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to loyalty program balances in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:loyalty\s+program|points\s+balance|reward\s+points|member\s+tier|loyalty\s+card|frequent\s+flyer|membership\s+rewards|loyalty\s+account|points\s+redemption|reward\s+status|loyalty\s+tier|member\s+benefits)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - loyalty program balances
    - loyalty
    - program
    - balances
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: loyalty program
      description: Primary topic phrase match
    - value: points balance
      description: Case-insensitive topic phrase match
    - value: reward points
      description: Alternative topic phrase match
    - value: member tier
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to loyalty program balances appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_loyalty_program
      matches:
        - ref: Pattern_global_top500_365_loyalty_program_balances_label_context
        - ref: Keyword_global_top500_365_loyalty_program_balances_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_loyalty_program
      matches:
        - ref: Keyword_loyalty_program
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_loyalty_program
      matches:
        - ref: Keyword_loyalty_program
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_loyalty_program
      pattern: >-
        (?is)\b(?:loyalty\s+program|points\s+balance|reward\s+points|member\s+tier|loyalty\s+card|frequent\s+flyer|membership\s+rewards|loyalty\s+account|points\s+redemption|reward\s+status|loyalty\s+tier|member\s+benefits)\b
    - id: Pattern_global_top500_365_loyalty_program_balances_label_context
      pattern: (?i)\\b(?:loyalty\\s+program\\s+balances|loyalty|program|balances|top500)\\b
  keywords:
    - id: Keyword_loyalty_program
      groups:
        - match_style: word
          terms:
            - loyalty program
            - points balance
            - reward points
            - member tier
            - loyalty card
            - frequent flyer
            - membership rewards
            - loyalty account
            - points redemption
            - reward status
            - loyalty tier
            - member benefits
    - id: Keyword_global_top500_365_loyalty_program_balances_domain_context
      groups:
        - match_style: word
          terms:
            - loyalty program balances
            - loyalty
            - program
            - balances
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
