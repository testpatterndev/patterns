schema: testpattern/v1
name: SIEM event data
slug: global-top500-281-siem-event-data
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies siem event data patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:elastic\s+security|security\s+event|log\s+correlation|alert\s+rule|event\s+log|security\s+operations|incident\s+detection)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - siem event data
    - siem
    - event
    - data
    - security
    - operations
    - threat
  proximity: 300
test_cases:
  should_match:
    - value: elastic security
      description: Primary topic phrase match
    - value: security event
      description: Case-insensitive topic phrase match
    - value: log correlation
      description: Alternative topic phrase match
    - value: alert rule
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: siem elastic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_siem_event_data
      matches:
        - ref: Pattern_global_top500_281_siem_event_data_label_context
        - ref: Keyword_global_top500_281_siem_event_data_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_siem_event_data
      matches:
        - ref: Keyword_siem_event_data
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_siem_event_data
      pattern: (?is)\b(?:elastic\s+security|security\s+event|log\s+correlation|alert\s+rule|event\s+log|security\s+operations|incident\s+detection)\b
    - id: Pattern_global_top500_281_siem_event_data_label_context
      pattern: (?i)\b(?:siem\s+event\s+data)\b
  keywords:
    - id: Keyword_siem_event_data
      groups:
        - match_style: word
          terms:
            - siem
            - splunk
            - sentinel
            - qradar
            - elastic security
            - security event
            - log correlation
            - alert rule
            - event log
            - security operations
            - soc
            - incident detection
      strength: domain
    - id: Keyword_global_top500_281_siem_event_data_domain_context
      groups:
        - match_style: word
          terms:
            - siem event data
            - siem
            - event
      strength: domain
risk_description: >-
  The pattern recognises Elastic Security, security event, log correlation, or alert rule language, indicating SIEM data or configuration context rather than extracting a complete event record. Genuine SIEM data can expose detections, monitored assets, user and host activity, investigation status, and visibility gaps that help an attacker evade monitoring or target affected systems. Product documentation and generic security-operations discussion can match, while one event or rule normally has bounded time and system scope. Risk 8 SENSITIVE reflects serious contained operational-security harm from substantive internal SIEM records; PROTECTED would require a broad critical monitoring corpus or significant damage established by the surrounding content.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
