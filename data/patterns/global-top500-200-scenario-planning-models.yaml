schema: testpattern/v1
name: Scenario planning models
slug: global-top500-200-scenario-planning-models
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to scenario planning models in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:scenario\s+planning|scenario\s+analysis|sensitivity\s+analysis|stress\s+test|base\s+case|downside\s+case|upside\s+case|Monte\s+Carlo|risk\s+scenario|contingency\s+plan|what[\s-]+if\s+analysis)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - scenario planning models
    - scenario
    - planning
    - models
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: scenario planning
      description: Primary topic phrase match
    - value: scenario analysis
      description: Case-insensitive topic phrase match
    - value: sensitivity analysis
      description: Alternative topic phrase match
    - value: stress test
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to scenario planning models appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_scenario_planning
      matches:
        - ref: Pattern_global_top500_200_scenario_planning_models_label_context
        - ref: Keyword_global_top500_200_scenario_planning_models_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_scenario_planning
      matches:
        - ref: Keyword_scenario_planning
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_scenario_planning
      pattern: >-
        (?is)\b(?:scenario\s+planning|scenario\s+analysis|sensitivity\s+analysis|stress\s+test|base\s+case|downside\s+case|upside\s+case|Monte\s+Carlo|risk\s+scenario|contingency\s+plan|what[\s-]+if\s+analysis)\b
    - id: Pattern_global_top500_200_scenario_planning_models_label_context
      pattern: (?i)\b(?:scenario\s+planning\s+models)\b
  keywords:
    - id: Keyword_scenario_planning
      groups:
        - match_style: word
          terms:
            - scenario planning
            - scenario analysis
            - sensitivity analysis
            - stress test
            - base case
            - downside case
            - upside case
            - Monte Carlo
            - risk scenario
            - contingency plan
            - what-if analysis
      strength: specific
    - id: Keyword_global_top500_200_scenario_planning_models_domain_context
      groups:
        - match_style: word
          terms:
            - scenario planning models
            - scenario
            - planning
            - models
      strength: domain
risk_description: >-
  This regex identifies scenario planning, sensitivity analysis, stress tests, base or downside cases, Monte Carlo analysis, and contingency plans in strategic context. A genuine model can reveal management assumptions, financial resilience, operational dependencies, and thresholds that competitors or counterparties could exploit during disruption or negotiation. The normal analysis is serious but bounded to the modeled business decision and does not itself provide system control or guarantee the adverse event will occur. Risk 8 and SENSITIVE are appropriate; PROTECTED would require critical-service contingency detail, nationally significant financial stress, or a model whose loss causes major operational damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
