schema: testpattern/v1
name: Child Safety Investigation File
slug: child-safety-investigation-file
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects child safety investigation case files containing child identifiers, harm notifications, investigation outcomes, child protection orders, and out-of-home care placements under the Child Protection Act 1999 (Qld). These files contain highly sensitive information about vulnerable children including substantiated abuse details — unauthorised disclosure endangers child safety and compromises ongoing investigations.
operation: 'Keyword proximity: primary keywords (child safety investigation, harm notification, substantiated harm, child protection order, out-of-home care, safety plan) within 300 characters of corroborative keywords (PROTECTED, Privacy, Child Protection Act 1999, child, subject child, Department of Child Safety). Negative keyword exclusion for published annual reports, policy documents, and training materials.'
pattern: (?i)\b(child\s+safety\s+investigation|harm\s+notification|substantiated\s+(?:harm|abuse|neglect)|child\s+protection\s+order|out-of-home\s+care\s+(?:placement|arrangement)|safety\s+(?:plan|assessment)\s+(?:for|regarding)\s+(?:child|minor))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of child safety investigation terminology with child identifiers and case-specific details. General child protection policy discussions and published statistics do not trigger detection.'
jurisdictions:
  - au
regulations:
  - qgiscf
  - child-protection-act-1999-qld
  - information-privacy-act-2009
  - human-rights-act-2019-qld
data_categories:
  - health
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Privacy
    - child safety investigation
    - harm notification
    - substantiated harm
    - child protection order
    - out-of-home care
    - safety plan
    - Child Protection Act 1999
    - subject child
    - Department of Child Safety
    - Child Safety Officer
    - Child Safety Service Centre
    - foster carer
    - kinship carer
    - recognised entity
    - care agreement
    - intervention with parental agreement
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - law-enforcement
    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED Privacy. Child Safety Investigation Report — Child Protection Act 1999 (Qld) Chapter 2. Subject child: Jayden Thomas CLARKE, DOB 17/04/2019, Case ID: CS-2026-15823. Harm notification received 28/02/2026 from mandatory reporter (school guidance officer). Allegation: physical harm and neglect. Investigation commenced 01/03/2026 by Child Safety Officer Karen Reynolds, Child Safety Service Centre Ipswich. Home visit conducted. Safety assessment outcome: child assessed as unsafe. Safety plan implemented — child placed in kinship care with maternal grandmother pending further investigation.'
      description: Child safety investigation report with harm notification and placement details
    - value: 'Department of Child Safety, Seniors and Disability Services. Child Protection Order Application — Magistrates Court Brisbane. In the matter of subject child Emily Rose NGUYEN, DOB 03/09/2015. The Department seeks a child protection order (long-term guardianship) under s.61 Child Protection Act 1999. Harm substantiated: emotional abuse and neglect over a period of 18 months. Previous intervention with parental agreement was unsuccessful. The child has been in out-of-home care placement with approved foster carers since 15/11/2025. Recognised entity consultation completed.'
      description: Child protection order application with substantiated harm details
    - value: 'Confidential — Child Safety Service Centre Gold Coast. Case Review: CS-2026-08471. Ongoing safety plan review for three siblings currently in out-of-home care. Eldest child reports improved wellbeing since placement. Kinship carer assessment for paternal uncle is in progress. Department of Child Safety recommendation: maintain current care arrangement. Contact schedule: supervised fortnightly contact with biological parents at Child Safety Service Centre. Next case review: 15/04/2026. Child Safety Officer: Michael Tran.'
      description: Ongoing case review with out-of-home care and contact schedule details
  should_not_match:
    - value: The Department of Child Safety published its Annual Report for 2024-25 showing 25,000 harm notifications were received across Queensland. The report presents de-identified aggregate data on investigation outcomes, child protection orders, and out-of-home care statistics by region.
      description: Published annual report with aggregate child safety statistics
    - value: The Australian Institute of Family Studies released a research paper examining the effectiveness of family support programs in reducing substantiated harm. The study used linked administrative data that was fully de-identified.
      description: Published academic research on child protection using de-identified data
    - value: The Child Safety Practice Manual is a publicly available resource for Child Safety Officers outlining the procedures for conducting investigations, assessing harm, and applying for child protection orders. The manual uses fictional case examples.
      description: Publicly available practice manual with fictional case examples
false_positives:
  - description: Published annual reports and statistics on child safety services
    mitigation: 'Negative keyword exclusion: ''annual report'', ''published'', ''aggregate data'', ''de-identified'', ''statistics''. Require proximity to actual child identifiers or case reference numbers.'
  - description: Practice manuals and training materials with fictional case scenarios
    mitigation: 'Negative keyword exclusion: ''practice manual'', ''training'', ''fictional'', ''case example'', ''scenario'', ''learning exercise'''
  - description: Academic research on child protection outcomes using de-identified data
    mitigation: 'Negative keyword exclusion: ''research paper'', ''study'', ''de-identified'', ''cohort'', ''participants'', ''journal'''
  - description: News media reporting on child safety system performance in general terms
    mitigation: 'Negative keyword exclusion: ''media release'', ''news article'', ''reported'', ''media statement'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: Child safety investigation terminology with child identifiers (name, DOB, case ID) and substantiated harm or placement details
    - tier: medium
      confidence: 75
      description: 2+ child safety keywords with classification markers within 300 characters
    - tier: low
      confidence: 65
      description: 1 child safety keyword with 2+ corroborative terms within 300 characters
  regexes:
    - name: child_safety_terms
      pattern: (?i)\b(child\s+safety\s+investigation|harm\s+notification|substantiated\s+(?:harm|abuse|neglect)|child\s+protection\s+order|out-of-home\s+care|safety\s+(?:plan|assessment)|intervention\s+with\s+parental\s+agreement)\b
    - name: cs_case_reference
      pattern: \bCS-\d{4}-\d{4,5}\b
  keywords:
    - name: primary_keywords
      words:
        - child safety investigation
        - harm notification
        - substantiated harm
        - child protection order
        - out-of-home care
        - safety plan
        - safety assessment
        - care agreement
        - kinship care
        - intervention with parental agreement
    - name: classification_markers
      words:
        - PROTECTED
        - Privacy
        - CONFIDENTIAL
        - SENSITIVE
    - name: corroborative_terms
      words:
        - subject child
        - Child Protection Act 1999
        - Department of Child Safety
        - Child Safety Officer
        - Child Safety Service Centre
        - foster carer
        - kinship carer
        - recognised entity
        - mandatory reporter
        - Magistrates Court
        - supervised contact
        - biological parents
    - name: negative_keywords
      words:
        - annual report
        - published
        - aggregate data
        - de-identified
        - statistics
        - practice manual
        - training
        - fictional
        - case example
        - scenario
        - learning exercise
        - research paper
        - study
        - journal
        - media release
        - news article
  filters:
    - type: exclude
      description: Exclude published reports, practice manuals, training materials, research, and media reporting
      keywords:
        - annual report
        - published
        - aggregate data
        - de-identified
        - practice manual
        - training
        - fictional
        - case example
        - research paper
        - media release
        - news article
risk_rating: 10
risk_description: Disclosure reveals child abuse details, victim identities, investigation outcomes, and care placement information for vulnerable children. Endangers child safety, compromises investigations, and breaches strict legislative protections under the Child Protection Act 1999.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: "PROTECTED Legal"
references: []
created: '2026-03-06'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
