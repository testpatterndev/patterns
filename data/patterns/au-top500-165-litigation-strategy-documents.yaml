schema: testpattern/v1
name: Litigation strategy documents
slug: au-top500-165-litigation-strategy-documents
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to litigation strategy documents in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:litigation\s+strategy\s+documents|litigation\s+strategy|case\s+strategy|legal\s+proceedings|court\s+action|cause\s+of\s+action|discovery\s+plan|evidence\s+assessment|settlement\s+position|damages\s+estimate|litigation\s+risk|trial\s+preparation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - litigation strategy documents
    - litigation
    - strategy
    - documents
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: litigation strategy documents
      description: Primary topic phrase match
    - value: litigation strategy
      description: Case-insensitive topic phrase match
    - value: case strategy
      description: Alternative topic phrase match
    - value: legal proceedings
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to litigation strategy documents appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_litigation_strategy
      matches:
        - ref: Evidence_litigation_strategy
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_litigation_strategy
      matches:
        - ref: Evidence_litigation_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_litigation_strategy
      matches:
        - ref: Evidence_litigation_strategy
  regexes:
    - id: Pattern_litigation_strategy
      pattern: (?is)\b(?:litigation\s+strategy\s+documents|litigation\s+strategy|case\s+strategy|legal\s+proceedings|court\s+action|cause\s+of\s+action|discovery\s+plan|evidence\s+assessment|settlement\s+position|damages\s+estimate|litigation\s+risk|trial\s+preparation)\b
  keywords:
    - id: Evidence_litigation_strategy
      groups:
        - match_style: word
          terms:
            - litigation strategy documents
            - litigation strategy
            - case strategy
            - legal proceedings
            - court action
            - cause of action
            - discovery plan
            - evidence assessment
            - settlement position
            - damages estimate
            - litigation risk
            - trial preparation
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.ato.gov.au/about-ato/commitments-and-reporting/in-detail/information-gathering/legal-professional-privilege
  - https://www.legislation.gov.au/C2004A00818/latest/text
