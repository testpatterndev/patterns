schema: testpattern/v1
name: QLD Health Medical Record
slug: au-qld-health-medical-record
version: 1.3.2
type: keyword_list
pattern_class: concept
description: Detects QLD Health medical record references including MRN/URN identifiers and clinical documentation.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
  - government
test_cases:
  should_match:
    - value: Medical record archive index
      description: Exact 65 discovery probe with a record phrase and no clinical contents
    - value: Medical record with discharge summary
      description: Exact 75 probe with clinical-record context
    - value: Queensland Health medical record with discharge summary
      description: Exact 85 probe with clinical-record and QLD Health context
    - value: 'Medical record number (MRN): 12345678 clinical documentation'
      description: Medical record number with clinical documentation
    - value: QLD Health patient record with URN and discharge summary
      description: Test match 2
    - value: Health record patient chart and medical history review
      description: Test match 3
  should_not_match:
    - value: Record the meeting minutes
      description: Non-match 1
    - value: World record broken
      description: Non-match 2
    - value: Unit record archive software release notes
      description: Product documentation phrase must remain discovery-only
false_positives:
  - description: Generic record references in non-medical contexts.
    mitigation: Require medical record identifiers like MRN, URN, or clinical documentation.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This keyword detector recognizes Queensland Health medical records through patient-chart language, MRN or URN references, clinical documentation, discharge summaries, and medical history. A genuine match is a composite patient record that can expose identity, diagnoses, investigations, treatment, and care chronology, enabling discrimination, coercion, fraud, or unsafe alteration and misrouting. The normal record concerns one patient rather than a hospital database, so the consequence is serious but contained below broad institutional compromise. Risk 8 and SENSITIVE are justified; PROTECTED would require a large record repository, privileged clinical-system access, or significant patient-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_medical_record
          - Pattern_patient_record
      matches:
        - ref: Evidence_clinical_record_context
        - ref: Evidence_qld_health_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_medical_record
          - Pattern_patient_record
      matches:
        - ref: Evidence_clinical_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_medical_record
          - Pattern_patient_record
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_medical_record
      pattern: (?i)\b(?:medical\s+record|patient\s+(?:file|record)|unit\s+record|clinical\s+record|health\s+record)\b
    - id: Pattern_patient_record
      pattern: (?i)\b(?:mrn|urn|medical\s+record\s+number|unit\s+record\s+number)\b
  keywords:
    - id: Evidence_mrn_urn
      groups:
        - match_style: word
          terms:
            - text: MRN
              case_sensitive: true
            - text: URN
              case_sensitive: true
            - text: UR
              case_sensitive: true
            - medical record number
            - unit record number
            - unit record
            - patient ID
            - hospital ID
      strength: specific
    - id: Evidence_hhs
      groups:
        - match_style: word
          terms:
            - Metro North
            - Metro South
            - Gold Coast Health
            - Sunshine Coast
            - Cairns and Hinterland
            - Townsville
            - Central Queensland
            - Wide Bay
            - Darling Downs
            - Children's Health Queensland
      strength: specific
    - id: Evidence_qld_health_forms
      groups:
        - match_style: word
          terms:
            - Queensland Health
            - Hospital and Health Service
            - text: HHS
              case_sensitive: true
            - health.qld.gov.au
            - QH-IMP
            - Pathology Queensland
            - Clinical Excellence Queensland
      strength: specific
    - id: Evidence_clinical_record_context
      groups:
        - match_style: word
          terms:
            - clinical documentation
            - discharge summary
            - medical history
            - treatment notes
            - diagnosis
            - medications
            - patient chart
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.3.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: make medical-record phrases 65 discovery, require independent clinical-record contents at 75 and QLD Health provenance at 85, expand the primary to health-record wording, and add exact-tier plus software probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 579 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - medical record
  - MRN
  - URN
  - unit record number
  - patient record
  - clinical record
  - health record
  - patient chart
  - medical history
  - discharge summary
  - clinical documentation
  - patient file
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
