schema: testpattern/v1
name: SCADA network diagrams
slug: global-top500-441-scada-network-diagrams
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive SCADA, ICS, and OT network diagrams and topologies. Topic phrases are retained
  for discovery; enforcement requires control-zone, DMZ, trust-boundary, remote-site, communications,
  Purdue-level, field-network, or data-flow relationships, and high confidence also requires populated
  VLAN, address, HMI, RTU, PLC, DCS, or site detail.
operation: >-
  Regex_scada_network_diagrams recognises SCADA/ICS/OT network-diagram and topology topics. The topic
  alone is discovery-only at 65. Control-zone, trust-boundary, communications, remote-site,
  Purdue-level, field-network, or data-flow relationships raise it to 75; populated network or control
  asset details reach 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:SCADA\s+network\s+(?:diagram|topology)|ICS\s+network\s+(?:diagram|topology)|industrial\s+control\s+network\s+diagram|OT\s+network\s+(?:diagram|topology)|control\s+system\s+network\s+diagram)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires control-network relationships rather than a generic diagram. High
  confidence adds a populated network or control-asset value.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - scada network diagrams
    - scada
    - network
    - diagrams
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
test_cases:
  should_match:
    - value: SCADA network diagram
      description: Low-tier probe - diagram topic without control-network relationships
    - value: 'SCADA network diagram: control zone, DMZ trust boundary, remote-site communications path, Purdue level 3, and process data flow'
      description: Medium-tier probe - substantive control-network relationships without populated live values
    - value: 'SCADA network diagram for production site North Plant: control zone VLAN 120, HMI node HMI-02 at 10.24.8.10, RTU node RTU-07 at 10.24.8.15'
      description: High-tier probe - topology relationships with populated VLAN, node, site, and address detail
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: scada network diagram
      description: Bare topic phrase surfaces only in discovery
    - value: 'The vendor guide presents a generic SCADA network architecture.'
      description: Product overview without a control-network diagram or relationships
    - value: 'Training example: SCADA network diagram with VLAN 120, HMI-02 at 10.24.8.10, and RTU-07'
      description: Explicit training content must not enforce
false_positives:
  - description: Vendor reference architectures, standards, and OT courses discuss SCADA networks, Purdue levels, DMZs, and remote sites without exposing a live topology.
    mitigation: Keep diagram topics discovery-only and require control-zone, trust-boundary, communications, remote-site, field-network, or data-flow relationships for enforcement.
  - description: Training diagrams can contain realistic VLANs, addresses, site names, and HMI/RTU/PLC identifiers.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_scada_network_diagrams
      matches:
        - ref: Evidence_scada_network_relationship
        - ref: Evidence_scada_live_network_detail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_scada_network_diagrams
      matches:
        - ref: Evidence_scada_network_relationship
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_scada_network_diagrams
  regexes:
    - id: Regex_scada_network_diagrams
      pattern: >-
        (?is)\b(?:SCADA\s+network\s+(?:diagram|topology)|ICS\s+network\s+(?:diagram|topology)|industrial\s+control\s+network\s+diagram|OT\s+network\s+(?:diagram|topology)|control\s+system\s+network\s+diagram)\b
    - id: Evidence_scada_live_network_detail
      pattern: >-
        (?i)\b(?:VLAN\s+\d{1,4}|(?:HMI|RTU|PLC|DCS)\s+(?:node|ID|station)\s+[A-Z0-9][A-Z0-9._-]{2,}|(?:\d{1,3}\.){3}\d{1,3}(?:/\d{1,2})?)\b
  keywords:
    - id: Evidence_scada_network_relationship
      groups:
        - match_style: word
          terms:
            - control zone
            - firewall zone
            - text: DMZ
              case_sensitive: true
            - trust boundary
            - remote site
            - communications path
            - Purdue level
            - field network
            - process data flow
            - control centre
            - control center
      strength: domain
risk_description: >-
  The detector identifies network diagrams, supervisory-control material, remote terminal units, and human-machine interfaces with seven critical-infrastructure signals. A genuine diagram can reveal control zones, communications paths, device roles, trust boundaries, and remote connections, helping an attacker plan lateral movement or disruption. The normal bounded diagram creates serious operational risk, but exploitation still requires access, current addressing, vulnerabilities, or credentials and may concern only a non-critical subsystem. For the global catalogue analogue, the confirmed substantive record is the consequence unit. A real topology exposes HMI/RTU/PLC relationships, trust zones, remote links, protocols and management paths. It materially lowers attack cost against an operational control environment and can support significant outage or safety damage. Risk 9 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require asset relationships, addresses/VLANs/protocols and site/system identifiers; training diagrams and standards stay audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
