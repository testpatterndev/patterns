schema: testpattern/v1
name: SCADA network diagrams
slug: global-top500-441-scada-network-diagrams
version: 1.2.3
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to scada network diagrams in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: pii-personal, industry-critical-infrastructure. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:network\s+diagram|supervisory\s+control|remote\s+terminal\s+unit|human\s+machine\s+interface|control\s+network|OT\s+network|industrial\s+control|network\s+topology|process\s+network)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - scada network diagrams
    - scada
    - network
    - diagrams
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - pii-personal
    - industry-critical-infrastructure
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: network diagram
      description: Primary topic phrase match
    - value: supervisory control
      description: Case-insensitive topic phrase match
    - value: remote terminal unit
      description: Alternative topic phrase match
    - value: human machine interface
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: scada network diagram
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to scada network diagrams appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_scada_network_diagrams
      matches:
        - ref: Pattern_global_top500_441_scada_network_diagrams_label_context
        - ref: Keyword_global_top500_441_scada_network_diagrams_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_scada_network_diagrams
      matches:
        - ref: Keyword_scada_network_diagrams
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_scada_network_diagrams
      pattern: >-
        (?is)\b(?:network\s+diagram|supervisory\s+control|remote\s+terminal\s+unit|human\s+machine\s+interface|control\s+network|OT\s+network|industrial\s+control|network\s+topology|process\s+network)\b
    - id: Pattern_global_top500_441_scada_network_diagrams_label_context
      pattern: (?i)\b(?:scada\s+network\s+diagrams)\b
  keywords:
    - id: Keyword_scada_network_diagrams
      groups:
        - match_style: word
          terms:
            - SCADA
            - network diagram
            - supervisory control
            - remote terminal unit
            - text: RTU
              case_sensitive: true
            - text: HMI
              case_sensitive: true
            - human machine interface
            - control network
            - OT network
            - industrial control
            - network topology
            - process network
      strength: specific
    - id: Keyword_global_top500_441_scada_network_diagrams_domain_context
      groups:
        - match_style: word
          terms:
            - scada network diagrams
            - scada
            - network
            - diagrams
      strength: domain
risk_description: >-
  The detector identifies network diagrams, supervisory-control material, remote terminal units, and human-machine interfaces with seven critical-infrastructure signals. A genuine diagram can reveal control zones, communications paths, device roles, trust boundaries, and remote connections, helping an attacker plan lateral movement or disruption. The normal bounded diagram creates serious operational risk, but exploitation still requires access, current addressing, vulnerabilities, or credentials and may concern only a non-critical subsystem. For the global catalogue analogue, the confirmed substantive record is the consequence unit. A real topology exposes HMI/RTU/PLC relationships, trust zones, remote links, protocols and management paths. It materially lowers attack cost against an operational control environment and can support significant outage or safety damage. Risk 9 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require asset relationships, addresses/VLANs/protocols and site/system identifiers; training diagrams and standards stay audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
