            - network diagram
            - supervisory control
            - remote terminal unit
            - RTU
            - HMI
            - human machine interface
            - control network
            - OT network
            - industrial control
            - network topology
            - process network
    - id: Keyword_global_top500_441_scada_network_diagrams_domain_context
      groups:
