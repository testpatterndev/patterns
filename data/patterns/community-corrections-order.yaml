schema: testpattern/v1
name: Community Corrections Order
slug: community-corrections-order
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects community-based corrections orders including probation orders, parole conditions, and community service orders issued under the Corrective Services Act 2006 (Qld). These documents contain offender details, supervision conditions, approved addresses, and compliance assessments by Queensland Corrective Services.
operation: 'Keyword proximity: primary keywords (community corrections order, probation order, parole conditions, community service, supervision order, Queensland Corrective Services) within 300 characters of offender details and legislative references. Negative keyword exclusion for published recidivism statistics and policy discussions.'
pattern: (?i)\b(community\s+corrections?\s+order|probation\s+order|parole\s+(?:conditions?|order|board)|community\s+service\s+order|supervision\s+order|intensive\s+correction\s+order|Queensland\s+Corrective\s+Services)\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of corrections-specific order terminology with offender management details and Corrective Services Act references. The combination of order types with individual supervision conditions is unique to genuine corrections documents.'
jurisdictions:
  - au
regulations:
- "Corrective Services Act 2006 (Qld)"
- "Penalties and Sentences Act 1992 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - SENSITIVE
    - Legal
    - community corrections
    - probation order
    - parole conditions
    - community service
    - supervision order
    - Queensland Corrective Services
    - offender
    - compliance
    - approved address
    - reporting officer
    - parole board
    - Corrective Services Act
  proximity: 300
  keyword_lists:

    - law-enforcement

    - government-services
test_cases:
  should_match:
    - value: 'SENSITIVE Legal. Community Corrections Order — Corrective Services Act 2006 (Qld) s.91. Offender: [Name], DOB: 22/07/1991. Order Reference: CCO-2026-BNE-04523. Probation order: 18 months. Conditions: (1) Report to Brisbane Community Corrections office fortnightly. (2) Reside at approved address: [Address], Inala. (3) Participate in substance misuse program as directed. (4) Not leave Queensland without written permission. Supervising officer: Ms K. Nguyen, Queensland Corrective Services.'
      description: Community corrections order with probation conditions and approved address
    - value: 'Queensland Corrective Services — Parole Conditions. Offender [Name] released on parole effective 1 March 2026 pursuant to Corrective Services Act 2006 s.200. Parole Board decision reference: PB-2025-1847. Conditions: (1) Supervision order for 24 months. (2) Report to Gold Coast Community Corrections weekly for first 3 months, then fortnightly. (3) Intensive correction order conditions apply — GPS monitoring required. (4) No contact with co-offenders. Compliance breach will result in return to custody.'
      description: Parole conditions with GPS monitoring and compliance requirements
    - value: 'Community Service Order — Penalties and Sentences Act 1992 s.103. [Name] sentenced to 200 hours community service. Community Corrections assessment: offender suitable for placement at Ipswich City Council parks maintenance. Reporting schedule: Saturdays 7:00am at Ipswich Community Corrections. Hours completed: 48/200. Supervising officer assessment: satisfactory compliance to date. Next review: 15 April 2026.'
      description: Community service order with placement details and compliance assessment
  should_not_match:
    - value: Queensland Corrective Services published its annual report noting that 12,847 offenders were managed on community-based orders during 2024-25. The recidivism rate for community corrections was 38.2% over two years.
      description: Published QCS annual report with recidivism statistics
    - value: The Sentencing Advisory Council released a policy paper discussing the effectiveness of community corrections orders compared with short-term imprisonment, recommending expanded use of intensive correction orders.
      description: Policy discussion on community corrections effectiveness
    - value: A corrections studies textbook chapter examines the principles of community-based sentencing and the role of Queensland Corrective Services in supervising probation and parole orders.
      description: Academic textbook on corrections and sentencing
false_positives:
  - description: Published QCS annual reports with aggregate corrections statistics
    mitigation: 'Negative keyword exclusion: ''annual report'', ''published'', ''recidivism rate'', ''reporting period'''
  - description: Sentencing advisory and law reform policy papers
    mitigation: 'Negative keyword exclusion: ''policy paper'', ''advisory council'', ''recommending'', ''effectiveness'''
  - description: Academic materials on corrections and sentencing principles
    mitigation: 'Negative keyword exclusion: ''textbook'', ''academic'', ''chapter'', ''examines'', ''university'''
  - description: Job advertisements for Queensland Corrective Services positions
    mitigation: 'Negative keyword exclusion: ''vacancy'', ''position available'', ''apply online'', ''selection criteria'''
exports:
  - purview_xml
  - yaml
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_community_corrections_order_corrections_order_terms
      matches:
        - ref: Evidence_community_corrections_order_primary_keywords
        - ref: Evidence_community_corrections_order_classification_markers
        - ref: Evidence_community_corrections_order_corroborative_terms
        - ref: Pattern_community_corrections_order_corrective_services_act
        - ref: Pattern_community_corrections_order_corrections_reference
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_community_corrections_order_exclusion
    - confidence_level: 75
      id_match: Pattern_community_corrections_order_corrections_order_terms
      matches:
        - ref: Evidence_community_corrections_order_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_community_corrections_order_exclusion
    - confidence_level: 65
      id_match: Pattern_community_corrections_order_corrections_order_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_community_corrections_order_exclusion
  regexes:
    - id: Pattern_community_corrections_order_corrections_order_terms
      pattern: (?i)\b(community\s+corrections?\s+order|probation\s+order|parole\s+(?:conditions?|order|board)|community\s+service\s+order|supervision\s+order|intensive\s+correction\s+order)\b
    - id: Pattern_community_corrections_order_corrective_services_act
      pattern: (?i)\bCorrective\s+Services\s+Act\s+2006\b
    - id: Pattern_community_corrections_order_corrections_reference
      pattern: \b(?:CCO|PB)-\d{4}-[A-Z]{2,4}-?\d{3,5}\b
  keywords:
    - id: Evidence_community_corrections_order_primary_keywords
      groups:
        - match_style: word
          terms:
            - community corrections order
            - probation order
            - parole conditions
            - parole order
            - community service order
            - supervision order
            - intensive correction order
            - Queensland Corrective Services
            - community corrections
            - parole board decision
    - id: Evidence_community_corrections_order_classification_markers
      groups:
        - match_style: word
          terms:
            - SENSITIVE
            - Legal
            - OFFICIAL
            - Corrective Services Act 2006
            - Penalties and Sentences Act 1992
            - Queensland Corrective Services
    - id: Evidence_community_corrections_order_corroborative_terms
      groups:
        - match_style: word
          terms:
            - offender
            - approved address
            - supervising officer
            - compliance
            - compliance breach
            - return to custody
            - GPS monitoring
            - substance misuse program
            - reporting schedule
            - hours completed
            - fortnightly
            - no contact
    - id: Filter_community_corrections_order_exclusion
      groups:
        - match_style: word
          terms:
            - published
            - annual report
            - recidivism rate
            - reporting period
            - policy paper
            - advisory council
            - recommending
            - effectiveness
            - textbook
            - academic
            - chapter
            - examines
            - university
            - vacancy
            - position available
            - apply online

risk_rating: 7
risk_description: Community corrections orders contain offender personal details, approved addresses, supervision conditions, and compliance assessments. Disclosure could compromise offender rehabilitation, reveal addresses of offenders to victims, or undermine community safety management. Inappropriate release could compromise proceedings, endanger individuals, or undermine enforcement activities.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-03-06'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
license: MIT
