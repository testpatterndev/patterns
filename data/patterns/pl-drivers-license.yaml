schema: testpattern/v1
name: Poland Driver's License Number
slug: pl-drivers-license
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Poland driver's license number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT
  directly, or use this version as a starting point for customisation.
operation: >-
  Matches Polish driver's license formats: 5 uppercase letters followed by 5 digits, or date-based format with slashes. Corroborative evidence: 5 keywords within 300 characters. Keyword lists:
  pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[A-Z]{5}\d{5}\b|\b\d{5}/\d{2}/\d{4}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - pl
  - eu
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - driver
    - licence
    - license
    - driving
    - DL
    - prawo jazdy
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: ABCDE12345
      description: Standard Polish driver's license with 5 letters and 5 digits
    - value: XYZAB98765
      description: Another valid letter-digit format
    - value: 12345/06/2024
      description: Date-based Polish driver's license format
  should_not_match:
    - value: ABCD12345
      description: Only 4 letters instead of required 5
    - value: ABCDE1234
      description: Only 4 digits instead of required 5
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic alphanumeric sequences matching the driver's license format appearing in unrelated contexts.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm driver's license context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_pl_drivers_license
      matches:
        - ref: Pattern_pl_drivers_license_label_context
        - ref: Keyword_pl_drivers_license_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_pl_drivers_license
      matches:
        - ref: Keyword_pl_drivers_license
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pl_drivers_license
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_pl_drivers_license
      pattern: \b[A-Z]{5}\d{5}\b|\b\d{5}/\d{2}/\d{4}\b
    - id: Pattern_pl_drivers_license_label_context
      pattern: (?i)\b(?:poland\s+driver's\s+license\s+number|poland|driver|license|drivers)\b
  keywords:
    - id: Keyword_pl_drivers_license
      groups:
        - match_style: word
          terms:
            - prawo jazdy
            - driver's license
            - driver's licence
            - driving licence
            - driving license
            - numer prawa jazdy
            - text: DL
              case_sensitive: true
            - kierowca
            - dokument prawa jazdy
            - wydział komunikacji
            - kategoria prawa jazdy
      strength: specific
    - id: Keyword_pl_drivers_license_domain_context
      groups:
        - match_style: word
          terms:
            - poland driver's license number
            - poland
            - driver
            - license
            - drivers
      strength: domain
risk_rating: 5
risk_description: >-
  The Polish licence detector accepts either five uppercase letters followed by five digits or a five-digit, two-digit, four-digit slash-separated form, with driving context and template exclusions. A genuine number can link a driver to entitlement, insurance, vehicle, or infringement records and aid impersonation when combined with identity details. The alternative formats also resemble product codes and date-based administrative references, and the hit contains no holder, class, status, issuing authority, or validity period. Risk 5 OFFICIAL reflects bounded licensing correlation harm; SENSITIVE would require a verified licence document or linked driver history.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-poland-drivers-license-number
    title: Poland driver's license number entity definition - Microsoft Learn
