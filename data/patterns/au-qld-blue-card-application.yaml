schema: testpattern/v1
name: QLD Blue Card Application
slug: au-qld-blue-card-application
version: 1.4.0
type: keyword_list
pattern_class: concept
description: Detects QLD Blue Card working with children check applications and screening documents.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government
  - children
test_cases:
  should_match:
    - value: 'Blue Card application information session.'
      description: Exact 65 discovery probe - application topic without a populated applicant record
    - value: 'Blue Card application - applicant name, date of birth, application number, and employer recorded.'
      description: Exact 75 probe - populated application fields without authority evidence
    - value: 'Blue Card application - Blue Card Services; applicant name, date of birth, application number, and suitability outcome recorded.'
      description: Exact 85 probe - populated application plus Queensland issuing-authority evidence
    - value: Blue Card application for child-related work with police check
      description: Test match 1
    - value: 'Working with children check: Blue Card Services suitability notice'
      description: Test match 2
    - value: Volunteer Blue Card number and child safety screening results
      description: Test match 3
  should_not_match:
    - value: Blue credit card offer
      description: Non-match 1
    - value: Card game at the club
      description: Non-match 2
    - value: 'Sample template for child-work screening fields: applicant name, birth date, reference number, suitability outcome.'
      description: Adjacent template language is not a populated Blue Card record
    - value: 'The public website explains the child-work screening process.'
      description: Public guidance has no Blue Card primary or populated applicant fields
    - value: 'Blue debit card application with rewards points.'
      description: Sibling payment-card language does not satisfy the child-screening primary
false_positives:
  - description: Blue card references in non-child-safety contexts.
    mitigation: Require Blue Card Services or working with children keywords.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The concept detector identifies Queensland Blue Card applications and working-with-children screening documents through Blue Card Services, police-check, suitability, and child-related work language. A completed application can combine identity, contact details, employment or volunteering context, criminal-history screening, and a suitability decision, exposing the applicant to stigma, fraud, and loss of opportunity. The normal unit is one safeguarding application rather than a whole child-protection database, and non-child-related blue-card references are excluded by context. Risk 8 SENSITIVE Personal-Privacy reflects serious contained harm; PROTECTED is not met without an active child-safety threat, protected investigation, bulk screening register, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_blue_card
      matches:
        - ref: Evidence_blue_card_application_fields
        - ref: Evidence_blue_card_authority
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_blue_card
      matches:
        - ref: Evidence_blue_card_application_fields
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_blue_card
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
  regexes:
    - id: Pattern_blue_card
      pattern: (?i)\b(?:blue\s+card\s+(?:application|renewal)|working\s+with\s+children\s+(?:check|application)|positive\s+notice)\b
    - id: Pattern_wwc
      pattern: (?i)\b(?:wwc|working\s+with\s+children|child[\s-]?related\s+(?:employment|work))\b
  keywords:
    - id: Evidence_blue_card
      groups:
        - match_style: word
          terms:
            - Blue Card
            - Positive Notice
            - Blue Card application
            - Blue Card renewal
            - child-related work
            - regulated business
            - exemption card
      strength: specific
    - id: Evidence_wwc_screening
      groups:
        - match_style: word
          terms:
            - Working with Children
            - WWC Check
            - criminal history check
            - screening
            - eligibility assessment
            - restricted person
            - child protection
      strength: specific
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
    - id: Evidence_blue_card_application_fields
      groups:
        - match_style: word
          terms:
            - applicant name
            - date of birth
            - application number
            - employer
            - volunteer organisation
            - issued date
            - suitability outcome
            - screening result
      strength: domain
    - id: Evidence_blue_card_authority
      groups:
        - match_style: word
          terms:
            - Blue Card Services
            - Department of Justice and Attorney-General
            - Working with Children (Risk Management and Screening) Act
            - Queensland Government
            - positive notice
            - negative notice
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
changelog:
