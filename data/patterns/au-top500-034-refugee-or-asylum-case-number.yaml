schema: testpattern/v1
name: Refugee or asylum case number
slug: au-top500-034-refugee-or-asylum-case-number
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to refugee or asylum case number in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:refugee\s+or\s+asylum\s+case\s+numbers?|refugee\s+case\s+numbers?|asylum\s+case\s+numbers?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - refugee or asylum case number
    - refugee
    - asylum
    - case
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - government-services
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Refugee or asylum case number'
      description: Topic phrase present
    - value: 'refugee or asylum case number'
      description: Topic phrase, lowercase
    - value: 'this record references the refugee or asylum case number held on file'
      description: Topic phrase within surrounding text
    - value: Refugee case number recorded by UNHCR.
      description: Natural separate phrase form authored in the source evidence
    - value: Asylum case number is held by the Department of Home Affairs.
      description: Natural separate phrase form authored in the source evidence
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: Civil court case number 88441.
      description: Case number without refugee/asylum context must not classify
    - value: Public report discusses asylum policy.
      description: Asylum topic without case-number language is insufficient
    - value: 'Template: asylum case number ______.'
      description: Blank template field must not reach the excluded 75/85 tiers (discovery inventory only)
false_positives:
  - description: Common words and phrases related to refugee or asylum case number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_refugee_asylum
      matches:
        - ref: Evidence_refugee_asylum
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_refugee_asylum
      matches:
        - ref: Evidence_refugee_asylum
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_refugee_asylum
      matches:
        - ref: Evidence_refugee_asylum
      discovery_only: true
      description: Unexcluded phrase tier — discovery-only because the template exclusion protects only the 75/85 tiers
  regexes:
    - id: Pattern_refugee_asylum
      pattern: (?i)\b(?:refugee\s+or\s+asylum\s+case\s+numbers?|refugee\s+case\s+numbers?|asylum\s+case\s+numbers?)\b
    - id: Pattern_au_top500_034_refugee_or_asylum_case_number_label_context
      pattern: (?i)\b(?:refugee\s+or\s+asylum\s+case\s+number)\b
  keywords:
    - id: Evidence_refugee_asylum
      groups:
        - match_style: word
          terms:
            - refugee case number
            - asylum case number
            - asylum seeker
            - protection visa
            - refugee status
            - humanitarian visa
            - Department of Home Affairs
            - UNHCR
            - refugee determination
            - safe haven enterprise visa
            - temporary protection visa
            - onshore protection
    - id: Keyword_au_top500_034_refugee_or_asylum_case_number_domain_context
      groups:
        - match_style: word
          terms:
            - refugee or asylum case number
            - refugee
            - asylum
            - case
risk_description: >-
  This concept regex matches refugee or asylum case-number wording, including a statement that such a number is held on file, rather than parsing a case-number format. It does not require a claimant, issued value, country of origin, protection claim, vulnerability, or outcome, so policy, workflow, and template text can trigger without exposing a person. A populated case identifier linked to an applicant could reveal migration status and support targeted harm, but that sensitive record is additional context rather than the detected unit. Risk 4 OFFICIAL fits the phrase cue; SENSITIVE is not met without an attributable number, claimant, or substantive asylum case information.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
