  - version: 1.4.0
    date: '2026-07-17'
    description: 'TP-00163 approved reduced scope: add only the two separate natural phrase alternatives refugee case number and asylum case number (both already authored as evidence terms) to the primary regex (top-level and Pattern_refugee_asylum), fixing the recall gap where the primary demanded the unnatural combined phrase; per QA consistency requirement, the unexcluded 65 phrase tier is marked discovery-only since template exclusion protects only 75/85. Deferred per QA/independent review: protection visa case, UNHCR case, and humanitarian case anchors (broaden beyond the titled number concept; need corpus evidence) and any bounded-identifier grammar (no case-number format supplied). Added the two natural-phrase positives plus civil-court, asylum-policy, and blank-template negatives.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 638 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
