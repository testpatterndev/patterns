schema: testpattern/v1
name: Off-cycle payroll approvals
slug: global-top500-098-off-cycle-payroll-approvals
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to off-cycle payroll approvals in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:off[\s-]+cycle\s+payroll\s+approvals|off[\s-]+cycle\s+payroll|ad\s+hoc\s+payment|special\s+payroll\s+run|emergency\s+payment|supplemental\s+pay|interim\s+payment|bonus\s+payment|correction\s+run|manual\s+payment|off[\s-]+cycle\s+approval)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - off-cycle payroll approvals
    - 'off'
    - cycle
    - payroll
    - approvals
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: off-cycle payroll approvals
      description: Primary topic phrase match
    - value: off-cycle payroll
      description: Case-insensitive topic phrase match
    - value: ad hoc payment
      description: Alternative topic phrase match
    - value: special payroll run
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_off_cycle_payroll
      matches:
        - ref: Pattern_global_top500_098_off_cycle_payroll_approvals_label_context
        - ref: Keyword_global_top500_098_off_cycle_payroll_approvals_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_098_off_cycle_payroll_approvals_noise_exclusion
    - confidence_level: 75
      id_match: Regex_off_cycle_payroll
      matches:
        - ref: Keyword_off_cycle_payroll
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_098_off_cycle_payroll_approvals_noise_exclusion
    - confidence_level: 65
      id_match: Regex_off_cycle_payroll
      matches:
        - ref: Keyword_off_cycle_payroll
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_098_off_cycle_payroll_approvals_noise_exclusion
  regexes:
    - id: Regex_off_cycle_payroll
      pattern: (?is)\b(?:off[\s-]+cycle\s+payroll\s+approvals|off[\s-]+cycle\s+payroll|ad\s+hoc\s+payment|special\s+payroll\s+run|emergency\s+payment|supplemental\s+pay|interim\s+payment|bonus\s+payment|correction\s+run|manual\s+payment|off[\s-]+cycle\s+approval)\b
    - id: Pattern_global_top500_098_off_cycle_payroll_approvals_label_context
      pattern: (?i)\\b(?:off\-cycle\\s+payroll\\s+approvals|off|cycle|payroll|approvals|top500)\\b
  keywords:
    - id: Keyword_off_cycle_payroll
      groups:
        - match_style: word
          terms:
            - off-cycle payroll approvals
            - off-cycle payroll
            - ad hoc payment
            - special payroll run
            - emergency payment
            - supplemental pay
            - interim payment
            - bonus payment
            - correction run
            - manual payment
            - off-cycle approval
    - id: Keyword_global_top500_098_off_cycle_payroll_approvals_domain_context
      groups:
        - match_style: word
          terms:
            - off-cycle payroll approvals
            - 'off'
            - cycle
            - payroll
            - approvals
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_098_off_cycle_payroll_approvals_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
