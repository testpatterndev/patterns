schema: testpattern/v1
name: Kubernetes Config Credential
slug: global-kubernetes-config-credential
version: 1.1.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects embedded credentials inside a Kubernetes kubeconfig file - base64 client certificate /
  key data blocks and inline bearer tokens. A leaked kubeconfig grants cluster access at the scope of the embedded identity.
operation: >-
  Matches the kubeconfig credential keys client-certificate-data:, client-key-data: or token: when followed by a
  long base64/JWT value. Confidence is medium because the trigger keys can appear in unrelated YAML; corroborative kubeconfig/kubernetes keywords reduce false positives. Keywords within 300 characters.
pattern: (?i)(?<![A-Za-z0-9-])(?:client-certificate-data|client-key-data)\s*:\s*[A-Za-z0-9+/]{40,}={0,2}
confidence: medium
confidence_justification: >-
  Medium confidence: the kubeconfig credential keys are distinctive, but base64 blocks and token fields appear in other contexts, so corroborative kubeconfig/kubernetes evidence is recommended.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - kubeconfig
    - kubernetes
    - apiVersion
    - clusters
    - current-context
    - kubectl
    - certificate-authority-data
  proximity: 300
test_cases:
  should_match:
    - value: 'client-certificate-data: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSUJ2ekNDQVdXZ0F3SUJBZ0lVCg=='
      description: kubeconfig client certificate data (base64 PEM block)
    - value: 'client-key-data: LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQpNSUlFb3dJQkFBS0NBUUVB'
      description: kubeconfig client key data (base64 private key block)
    - value: "users:\n- name: admin\n  user:\n    client-certificate-data: QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVowMTIzNDU2Nzg5YWJjZGVm"
      description: client-certificate-data inside a users block
  should_not_match:
    - value: 'certificate-authority-data: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t'
      description: CA data field is not a private credential (public cert)
    - value: 'client-certificate-data: short'
      description: Value too short to be a base64 credential block
    - value: configure client-certificate-data in your kubeconfig before connecting
      description: Prose mention without an embedded value
false_positives:
  - description: Public certificate-authority-data or other long base64 blobs near the trigger keys.
    mitigation: Require corroborative kubeconfig/kubernetes keywords and exclude the public certificate-authority-data field.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This medium-confidence detector identifies long client certificate or private-key data embedded under Kubernetes kubeconfig credential fields. A valid credential can authenticate to a cluster with the embedded identity's rights, allowing secret reads, workload changes, or lateral movement where role bindings permit. The normal match creates serious cluster harm but does not establish administrator rights, cluster criticality, or access beyond one identity. Risk 8 and SENSITIVE InfoTech fit directly usable cluster identity material with unknown roles; PROTECTED requires cluster-admin authority, protected workloads, or significant service impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
