schema: testpattern/v1
name: Kubernetes Config Credential
slug: global-kubernetes-config-credential
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects embedded credentials inside a Kubernetes kubeconfig file - base64 client certificate /
  key data blocks and inline bearer tokens. A leaked kubeconfig grants cluster access at the scope of the embedded identity.
operation: >-
  Matches the kubeconfig credential keys client-certificate-data:, client-key-data: or token: when followed by a
  long base64/JWT value. Confidence is medium because the trigger keys can appear in unrelated YAML; corroborative kubeconfig/kubernetes keywords reduce false positives. Keywords within 300 characters.
pattern: (?i)(?<![A-Za-z0-9-])(?:client-certificate-data|client-key-data)\s*:\s*[A-Za-z0-9+/]{40,}={0,2}
confidence: medium
confidence_justification: >-
  Medium confidence: the kubeconfig credential keys are distinctive, but base64 blocks and token fields appear in other contexts, so corroborative kubeconfig/kubernetes evidence is recommended.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - kubeconfig
    - kubernetes
    - apiVersion
    - clusters
    - current-context
    - kubectl
    - certificate-authority-data
  proximity: 300
test_cases:
  should_match:
    - value: 'client-key-data: LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQpNSUlFb3dJQkFBS0NBUUVB'
      description: Exact 65 probe - one credential field without kubeconfig document structure
    - value: "users:\n- name: deployer\n  user:\n    token: eyJhbGciOiJSUzI1NiJ9.eyJzdWIiOiJkZXBsb3llciJ9.ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
      description: Exact 75 probe - bearer token inside a kubeconfig users block
    - value: "apiVersion: v1\nusers:\n- name: admin\n  user:\n    client-certificate-data: QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVowMTIzNDU2Nzg5YWJjZGVm\n    client-key-data: RkVEQ0JBOTg3NjU0MzIxMGRlZmVkY2JhOTg3NjU0MzIxMGFiY2RlZg=="
      description: Exact 85 probe - paired client certificate and private key in a kubeconfig identity
  should_not_match:
    - value: 'certificate-authority-data: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t'
      description: CA data field is not a private credential (public cert)
    - value: 'client-certificate-data: short'
      description: Value too short to be a base64 credential block
    - value: "kind: Secret\ndata:\n  tls.key: QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVowMTIzNDU2Nzg5YWJjZGVm"
      description: Kubernetes Secret key data is a sibling structure, not a kubeconfig credential field
    - value: 'client-key-data: ABCD*EFGHIJKLMNOPQRSTUVWXYZ0123456789abcdefgh'
      description: Malformed base64 credential value contains a forbidden character
    - value: 'Documentation example: users: client-key-data: QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVowMTIzNDU2Nzg5YWJjZGVm'
      description: Documentation example with valid-shaped credential data is excluded
    - value: configure client-certificate-data in your kubeconfig before connecting
      description: Prose mention without an embedded value
false_positives:
  - description: Public certificate-authority-data or other long base64 blobs near the trigger keys.
    mitigation: Require corroborative kubeconfig/kubernetes keywords and exclude the public certificate-authority-data field.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This medium-confidence detector identifies long client certificate or private-key data embedded under Kubernetes kubeconfig credential fields. A valid credential can authenticate to a cluster with the embedded identity's rights, allowing secret reads, workload changes, or lateral movement where role bindings permit. The normal match creates serious cluster harm but does not establish administrator rights, cluster criticality, or access beyond one identity. Risk 8 and SENSITIVE InfoTech fit directly usable cluster identity material with unknown roles; PROTECTED requires cluster-admin authority, protected workloads, or significant service impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_kubeconfig_client_credential
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_kubeconfig_bearer_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_kubeconfig_client_credential
      matches:
        - ref: Keyword_kubeconfig_document_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_kubeconfig_bearer_token
      matches:
        - ref: Keyword_kubeconfig_document_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_kubeconfig_client_credential
      matches:
        - ref: Keyword_kubeconfig_document_context
        - ref: Pattern_kubeconfig_certificate_key_pair
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_kubeconfig_bearer_token
      matches:
        - ref: Keyword_kubeconfig_document_context
        - ref: Pattern_kubeconfig_cluster_binding
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_kubeconfig_client_credential
      pattern: (?i)(?<![A-Za-z0-9-])(?:client-certificate-data|client-key-data)\s*:\s*[A-Za-z0-9+/]{40,}={0,2}
    - id: Regex_kubeconfig_bearer_token
      pattern: (?i)(?<![A-Za-z0-9-])token\s*:\s*(?:eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}|[A-Za-z0-9_-]{40,})
    - id: Pattern_kubeconfig_certificate_key_pair
      pattern: (?i)(?:client-certificate-data[\s\S]{0,2000}client-key-data|client-key-data[\s\S]{0,2000}client-certificate-data)
    - id: Pattern_kubeconfig_cluster_binding
      pattern: (?i)\bserver\s*:\s*https://
  keywords:
    - id: Keyword_kubeconfig_document_context
      groups:
        - match_style: string
          terms:
            - 'apiVersion: v1'
            - 'current-context:'
            - 'users:'
            - 'clusters:'
      strength: structural
