schema: testpattern/v1
name: Bank routing numbers
slug: au-top500-102-bank-routing-numbers
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to bank routing numbers in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: financial-deposit-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:bank\s+routing\s+numbers)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/ ]{4,24}\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - bank routing numbers
    - bank
    - routing
    - numbers
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: Bank routing numbers
      description: Exact phrase marker match
    - value: bank routing numbers
      description: Case-insensitive phrase match
    - value: Bank routing numbers
      description: Normalized whitespace phrase
    - value: structured record with identifier and contextual anchors
      description: Structural anchor sample
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_bank_routing_numbers
      matches:
        - ref: Evidence_bank_routing_numbers
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_bank_routing_numbers
      matches:
        - ref: Evidence_bank_routing_numbers
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_bank_routing_numbers
      matches:
        - ref: Evidence_bank_routing_numbers
  regexes:
    - id: Pattern_bank_routing_numbers
      pattern: (?is)\b(?:bank\s+routing\s+numbers)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/ ]{4,24}\b
    - id: Pattern_au_top500_102_bank_routing_numbers_label_context
      pattern: (?i)\\b(?:bank\\s+routing\\s+numbers|bank|routing|top500)\\b
  keywords:
    - id: Evidence_bank_routing_numbers
      groups:
        - match_style: word
          terms:
            - bank routing number
            - BSB number
            - routing number
            - bank state branch
            - BSB code
            - sort code
            - bank identifier
            - clearing code
            - financial institution code
            - branch number
            - ABA routing
            - SWIFT code
    - id: Keyword_au_top500_102_bank_routing_numbers_domain_context
      groups:
        - match_style: word
          terms:
            - bank routing numbers
            - bank
            - routing
    - id: Evidence_generic_data_labels
      groups:
        - match_style: word
          terms:
            - ID
            - identifier
            - number
            - reference
            - code
            - index
            - serial
            - account
            - file number
            - case number
            - record number
            - ref
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
