schema: testpattern/v1
name: Nigeria NIN
slug: ng-nin
version: 1.0.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Nigeria National Identification Numbers (NIN) — 11 digits from NIMC.
operation: >-
  Structural 11-digit NIN with NIN/NIMC keywords. Keyword lists: pii-civic-credentials.
pattern: '\b\d{11}\b'
confidence: medium
confidence_justification: >-
  Medium confidence; NIN keywords required.
jurisdictions:
  - ng
regulations:
  - "NDPR (Nigeria)"
  - "NIMC Act"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - text: NIN
      case_sensitive: true
    - National Identification Number
    - NIMC
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '12345678901'
      description: NIN
    - value: '98765432109'
      description: Alt
    - value: '11223344556'
      description: Third
  should_not_match:
    - value: '1234567890'
      description: 10
    - value: '123456789012'
      description: 12
    - value: '1234567890A'
      description: Letter
false_positives:
  - description: >-
      Other 11-digit IDs.
    mitigation: >-
      Require NIN keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ng_nin
      matches:
        - ref: Keyword_ng_nin_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ng_nin
      matches:
        - ref: Keyword_ng_nin_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ng_nin
  regexes:
    - id: Regex_ng_nin
      pattern: '\b\d{11}\b'
  keywords:
    - id: Keyword_ng_nin_specific
      groups:
        - match_style: word
          terms:
            - text: NIN
              case_sensitive: true
            - National Identification Number
            - NIMC NIN
      strength: specific
    - id: Keyword_ng_nin_broad
      groups:
        - match_style: word
          terms:
            - NIMC
            - national identity Nigeria
      strength: specific
risk_rating: 9
risk_description: >-
  NIN is Nigeria primary national identity number.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.1
    date: '2026-07-09'
    description: 'Quality-gate fix: short acronyms converted to case-sensitive terms (catalog convention).'
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Phase-2 coverage backlog — mature Purview-safe identifier with pack metadata'
author: testpattern-community
license: MIT
