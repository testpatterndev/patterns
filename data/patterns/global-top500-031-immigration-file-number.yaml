schema: testpattern/v1
name: Immigration file number
slug: global-top500-031-immigration-file-number
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to immigration file number in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:immigration\s+file\s+numbers?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - immigration file number
  proximity: 240
  keyword_lists:
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Immigration file number'
      description: Topic phrase present
    - value: 'immigration file number'
      description: Topic phrase, lowercase
    - value: 'this record references the immigration file number held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Common words and phrases related to immigration file number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_immigration_file_number
      matches:
        - ref: Keyword_immigration_file_number
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_immigration_file_number
      matches:
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_immigration_file_number
      pattern: (?i)\b(?:immigration\s+file\s+numbers?)\b
    - id: Pattern_global_top500_031_immigration_file_number_label_context
      pattern: (?i)\b(?:immigration\s+file\s+number)\b
  keywords:
    - id: Keyword_immigration_file_number
      groups:
        - match_style: word
          terms:
            - immigration file number
            - immigration file
            - file number
            - immigration record
            - case file
            - immigration reference
            - immigrant file
            - immigration dossier
            - border control
            - immigration status
            - visa application
            - entry permit
      strength: specific
    - id: Keyword_global_top500_031_immigration_file_number_domain_context
      groups:
        - match_style: word
          terms:
            - immigration file number
            - immigration
            - file
      strength: domain
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
