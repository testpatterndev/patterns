schema: testpattern/v1
name: Centrelink Customer Reference Number
slug: au-centrelink-crn
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: Detects Centrelink Customer Reference Number (CRN) patterns consisting of 9 digits followed by a letter.
operation: >-
  Regex pattern using universal engine. The top-level regex \b\d{9}[A-Za-z]\b matches 9 digits followed by a single letter. The Purview engine uses two regexes: Pattern_crn_labeled (labeled format
  with CRN/Centrelink prefix + digits + letter) and Pattern_au_crn (bare 9-digit + letter format). Three confidence tiers: High (85) requires Services Australia keywords + welfare context keywords
  with template exclusion logic; Medium (75) requires Services Australia keywords; Low (65) requires only the regex match. Evidence uses 2 keyword groups (4 Services Australia terms, 10 welfare
  context terms) within 300-character proximity. Keyword lists: au-government-services-australia.
pattern: \b\d{9}[A-Za-z]\b
confidence: low
confidence_justification: >-
  Low confidence: the 9-digit-plus-letter pattern is generic and may match unrelated alphanumeric sequences. Corroborative evidence keywords such as Centrelink, CRN, or Services Australia are
  essential for reliable detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - Centrelink
    - CRN
    - Customer Reference Number
  proximity: 300
  keyword_lists:
    - au-government-services-australia
test_cases:
  should_match:
    - value: 123456789A
      description: 9 digits followed by a letter
    - value: 987654321Z
      description: Alternate digit sequence with letter suffix
    - value: 111222333B
      description: Grouped digit pattern with letter
  should_not_match:
    - value: 12345678A
      description: Only 8 digits instead of 9 before letter
    - value: 1234567890A
      description: 10 digits instead of 9 before letter
    - value: '123456789'
      description: Missing trailing letter
false_positives:
  - description: Common words and phrases related to centrelink customer reference number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 4
risk_description: >-
  The identifier pattern matches nine digits followed by a letter, with Centrelink, Services Australia, or welfare context increasing confidence but a low tier allowing the bare shape. A valid CRN can connect a person to benefits administration and may assist targeted impersonation when combined with a name, date of birth, or account information. The atomic number alone does not reveal entitlement, payment, household circumstances, or online access and the broad structure can collide with unrelated references. Risk 4 OFFICIAL reflects low standalone harm; SENSITIVE is not met without person linkage, substantive welfare details, authentication data, or a compiled claimant record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_crn_labeled
      matches:
        - ref: Evidence_welfare_context
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_au_crn
      matches:
        - ref: Evidence_services_australia
        - ref: Evidence_welfare_context
    - confidence_level: 65
      id_match: Pattern_au_crn
      matches:
        - ref: Evidence_services_australia
  regexes:
    - id: Pattern_au_crn
      pattern: \b\d{9}[A-Za-z]\b
    - id: Pattern_crn_labeled
      pattern: (?i)\b(?:CRN|Customer\s+Reference\s+Number|Centrelink\s+(?:reference|number|ID))\s*[:#-]?\s*\d{9}[A-Za-z]\b
  keywords:
    - id: Evidence_services_australia
      groups:
        - match_style: word
          terms:
            - Centrelink
            - text: CRN
              case_sensitive: true
            - Customer Reference Number
            - Services Australia
      strength: domain
    - id: Evidence_welfare_context
      groups:
        - match_style: word
          terms:
            - Centrelink
            - Services Australia
            - welfare
            - benefits
            - payment
            - pension
            - allowance
            - JobSeeker
            - Youth Allowance
            - Disability Support Pension
      strength: domain
