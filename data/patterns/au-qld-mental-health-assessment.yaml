    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: separate assessment-topic discovery at 65 from patient/clinical enforcement at 75 and statutory Mental Health Act context at 85, with exact-tier and software-documentation probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 585 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Mapped non-canonical confidence 90 to 85.
author: testpattern-community
license: MIT
keywords:
  - mental health assessment
  - psychiatric assessment
  - mental health act
  - involuntary treatment
  - treatment authority
  - mental health review
  - forensic order
  - mental health tribunal
  - examination authority
  - clinical assessment
  - risk assessment mental health
