schema: testpattern/v1
name: QLD Mental Health Assessment
slug: au-qld-mental-health-assessment
version: 1.3.2
type: keyword_list
pattern_class: concept
description: Detects QLD mental health assessment documents including psychiatric evaluations and involuntary treatment orders.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
  - government
test_cases:
  should_match:
    - value: Mental health assessment scheduled
      description: Exact 65 discovery probe with an assessment phrase and no case context
    - value: Mental health assessment for a patient risk formulation
      description: Exact 75 probe with clinical assessment context
    - value: Mental health assessment for a patient under a treatment authority
      description: Exact 85 probe with clinical and Mental Health Act context
    - value: 'Mental health assessment: involuntary treatment authority under Mental Health Act'
      description: Assessment under involuntary treatment authority
    - value: Psychiatric assessment for mental health tribunal forensic order review
      description: Test match 2
    - value: QLD mental health review with examination authority and treatment plan
      description: Test match 3
  should_not_match:
    - value: Mental health awareness campaign
      description: Non-match 1
    - value: Check your mental health at the door
      description: Non-match 2
    - value: Mental health evaluation software module release notes
      description: Evaluation phrase in product documentation must remain discovery-only
false_positives:
  - description: Mental health awareness content in non-clinical contexts.
    mitigation: Require clinical assessment terms like involuntary treatment or mental health tribunal.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The detector recognizes Queensland psychiatric assessments, tribunal or forensic-order reviews, involuntary treatment authorities, examination authorities, and associated treatment plans. A genuine assessment can expose symptoms, risk judgments, capacity, compulsory-care status, forensic history, and clinician reasoning, enabling stigma, discrimination, coercion, or interference with liberty and treatment. The normal unit is one assessment rather than a statewide mental-health register, so the harm is serious and deeply personal but remains contained. Risk 8 and SENSITIVE are retained; PROTECTED would require a bulk forensic holding, imminent life-safety operations, or compromise causing significant irreversible harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_mental_health
          - Pattern_psychiatric
      matches:
        - ref: Evidence_clinical_assessment_context
        - ref: Evidence_mha_2016
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_mental_health
          - Pattern_psychiatric
      matches:
        - ref: Evidence_clinical_assessment_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_mental_health
          - Pattern_psychiatric
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_mental_health
      pattern: (?i)\b(?:mental\s+health\s+(?:assessment|act|evaluation)|psychiatric\s+(?:assessment|evaluation)|mha\s+2016)\b
    - id: Pattern_psychiatric
      pattern: (?i)\b(?:chief\s+psychiatrist|involuntary\s+(?:treatment|admission)|mental\s+illness\s+(?:assessment|treatment))\b
  keywords:
    - id: Evidence_mental_health
      groups:
        - match_style: word
          terms:
            - mental health assessment
            - psychiatric assessment
            - psychiatric evaluation
            - mental illness
            - risk assessment
            - involuntary treatment
            - capacity assessment
            - VRAM
      strength: specific
    - id: Evidence_mha_2016
      groups:
        - match_style: word
          terms:
            - Mental Health Act 2016
            - MHA 2016
            - Chief Psychiatrist
            - treatment authority
            - forensic order
            - mental health tribunal
      strength: specific
    - id: Evidence_qld_health_forms
      groups:
        - match_style: word
          terms:
            - Queensland Health
            - Hospital and Health Service
            - text: HHS
              case_sensitive: true
            - health.qld.gov.au
            - QH-IMP
            - Pathology Queensland
            - Clinical Excellence Queensland
      strength: specific
    - id: Evidence_clinical_assessment_context
      groups:
        - match_style: word
          terms:
            - patient
            - risk formulation
            - treatment plan
            - capacity assessment
            - diagnosis
            - medication
            - involuntary treatment
            - clinician
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
