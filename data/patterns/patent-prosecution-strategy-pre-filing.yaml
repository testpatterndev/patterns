schema: testpattern/v1
name: Patent Prosecution Strategy Pre-Filing
slug: patent-prosecution-strategy-pre-filing
version: 1.1.1
type: keyword_proximity
engine: universal
description: 'Detects legal strategy for patent prosecution before filing, including prior art assessments, claim drafting strategy, and freedom-to-operate opinions. Disclosure destroys patent novelty or reveals prosecution strategy to competitors. Note: trainable classifier recommended for production deployment.'
operation: 'Primary detection: keyword proximity matching patent terms (''patent'', ''patent prosecution'', ''patent application'', ''patent strategy'') within 200 characters of pre-filing indicators (''pre-filing'', ''draft claims'', ''prior art'', ''freedom to operate'', ''FTO'', ''novelty'', ''privilege'', ''PROTECTED'', ''CONFIDENTIAL''). Exclusion: published patents by negative match on ''granted'', ''published'', ''PCT publication''. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:patent\s+(?:prosecution|application|strategy)|patent)\b
confidence: low
confidence_justification: 'Medium confidence: Patent + pre-filing/draft claims + privilege indicators targets unpublished patent strategy. Exclusion of granted/published patents eliminates the vast majority of public patent documents.'
jurisdictions:
  - global
regulations:
- "Patents Act 1990 (Cth)"
frameworks:
- QGISCF
data_categories:
  - legal
corroborative_evidence:
  keywords:
    - pre-filing
    - draft claims
    - prior art
    - freedom to operate
    - FTO
    - novelty
    - privilege
    - PROTECTED
    - CONFIDENTIAL
    - claim drafting
    - patentability
    - inventive step
    - provisional application
  proximity: 300
  keyword_lists:

    - corporate-legal
test_cases:
  should_match:
    - value: |-
        CONFIDENTIAL — LEGAL PROFESSIONAL PRIVILEGE
        Patent Prosecution Strategy — Pre-Filing

        Invention: Novel water purification membrane (UQ Research Collaboration)
        Prior Art Assessment: Three potentially invalidating references identified

        Draft claims strategy: Narrow independent claim 1 to avoid Smith et al. (2023) prior art.
      description: Pre-filing patent prosecution strategy with prior art assessment
    - value: This privileged patent strategy addresses the freedom to operate analysis for the new diagnostic device. The FTO opinion identifies two blocking patents requiring design-around strategy before patent application filing.
      description: Freedom-to-operate opinion with blocking patent analysis
    - value: |-
        PROTECTED
        Pre-Filing Patent Assessment
        Client: Queensland Health Innovation Unit
        Subject: Novel rapid diagnostic test — COVID variant detection

        Patentability assessment: Novelty confirmed subject to prior art search. Draft claims attached for review before provisional application lodgement.
      description: Pre-filing patent assessment with novelty analysis
  should_not_match:
    - value: Australian Patent No. 2024123456 was granted on 15 March 2025. The published patent specification describes a water purification membrane with improved flux characteristics.
      description: Published granted patent
    - value: PCT Publication WO/2025/012345 discloses a method for rapid diagnostic testing. The published international application is available through WIPO PatentScope.
      description: Published PCT patent application
    - value: This textbook chapter provides an overview of patent prosecution strategy in Australia. Students should understand the requirements for novelty, inventive step, and utility under the Patents Act 1990.
      description: Academic textbook on patent law
false_positives:
  - description: Published granted patents and patent specifications
    mitigation: Negative match on 'granted', 'Patent No.', 'published specification'
  - description: Published PCT or international patent applications
    mitigation: Negative match on 'PCT Publication', 'WO/', 'published application', 'PatentScope'
  - description: Academic materials on patent prosecution
    mitigation: Require co-occurrence with specific invention details and privilege/PROTECTED markers
  - description: Patent office examination reports (public documents)
    mitigation: Negative match on 'examination report', 'office action', 'examiner's report'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  pattern_tiers:
    - tier: high
      confidence_level: 65
      id_match: ''
      discovery_only: true
      description: Patent + pre-filing + prior art assessment + PROTECTED/privilege
  regexes:
    - pattern: (?i)\bpatent\s+(?:prosecution|application|strategy)\b
      description: Patent prosecution terminology
    - pattern: (?i)\b(?:pre-filing|draft\s+claims|freedom\s+to\s+operate|FTO)\b
      description: Pre-filing patent indicators
    - pattern: (?i)\bprior\s+art\b
      description: Prior art reference
  keywords:
    - group: primary
      values:
        - patent prosecution
        - patent application
        - patent strategy
        - patent
      strength: domain
    - group: corroborative
      values:
        - pre-filing
        - draft claims
        - prior art
        - freedom to operate
        - FTO
        - novelty
        - privilege
        - PROTECTED
        - CONFIDENTIAL
        - patentability
        - inventive step
        - provisional application
      strength: domain
    - group: exclusion
      values:
        - granted
        - Patent No.
        - published specification
        - PCT Publication
        - WO/
        - PatentScope
        - textbook
        - examination report
      strength: domain
  filters:
    - type: exclude_pattern
      pattern: (?i)\b(?:Patent\s+No\.?|AU\s*)\d{4,}
      description: Exclude granted patent number references
    - type: exclude_pattern
      pattern: (?i)WO/\d{4}/\d+
      description: Exclude PCT publication numbers
risk_rating: 7
risk_description: Legal strategy for patent prosecution before filing, including prior art assessments, claim drafting strategy, and freedom-to-operate opinions. Disclosure destroys patent novelty or reveals prosecution strategy to competitors. While subject to professional privilege or regulatory requirements, disclosure represents BIL:2 harm rather than the significant institutional damage threshold required for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Legal"
references: []
