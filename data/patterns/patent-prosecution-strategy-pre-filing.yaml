schema: testpattern/v1
name: Patent Prosecution Strategy Pre-Filing
slug: patent-prosecution-strategy-pre-filing
version: 1.5.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: 'Detects legal strategy for patent prosecution before filing, including prior art assessments, claim drafting strategy, and freedom-to-operate opinions. Disclosure destroys patent novelty or reveals prosecution strategy to competitors. Note: trainable classifier recommended for production deployment.'
operation: 'Primary detection: keyword proximity matching patent terms (''patent'', ''patent prosecution'', ''patent application'', ''patent strategy'') within 200 characters of pre-filing indicators (''pre-filing'', ''draft claims'', ''prior art'', ''freedom to operate'', ''FTO'', ''novelty'', ''privilege'', ''PROTECTED'', ''CONFIDENTIAL''). Exclusion: published patents by negative match on ''granted'', ''published'', ''PCT publication''. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:patent\s+(?:prosecution|application|strategy)|patent)\b
confidence: low
confidence_justification: 'Medium confidence: Patent + pre-filing/draft claims + privilege indicators targets unpublished patent strategy. Exclusion of granted/published patents eliminates the vast majority of public patent documents.'
jurisdictions:
  - global
regulations:
- "Patents Act 1990 (Cth)"
frameworks:
- QGISCF
data_categories:
  - legal
corroborative_evidence:
  keywords:
    - pre-filing
    - draft claims
    - prior art
    - freedom to operate
    - FTO
    - novelty
    - privilege
    - PROTECTED
    - CONFIDENTIAL
    - claim drafting
    - patentability
    - inventive step
    - provisional application
  proximity: 300
  keyword_lists:

    - corporate-legal
test_cases:
  should_match:
    - value: 'Patent strategy discussion agenda.'
      description: Exact 65 discovery probe - patent-strategy topic without pre-filing state or analysis
    - value: 'Patent application strategy for a pre-filing meeting before lodgement.'
      description: Exact 75 probe - confirmed pre-filing state without claim analysis or privilege marking
    - value: 'PRIVILEGED Patent Pre-Filing Strategy: draft claim 1 avoids Jones prior art; novelty confirmed before provisional application.'
      description: Exact 85 probe - pre-filing state, substantive claim analysis, and privilege marking
    - value: |-
        CONFIDENTIAL — LEGAL PROFESSIONAL PRIVILEGE
        Patent Prosecution Strategy — Pre-Filing

        Invention: Novel water purification membrane (UQ Research Collaboration)
        Prior Art Assessment: Three potentially invalidating references identified

        Draft claims strategy: Narrow independent claim 1 to avoid Smith et al. (2023) prior art.
      description: Pre-filing patent prosecution strategy with prior art assessment
    - value: This privileged patent strategy addresses the freedom to operate analysis for the new diagnostic device. The FTO opinion identifies two blocking patents requiring design-around strategy before patent application filing.
      description: Freedom-to-operate opinion with blocking patent analysis
    - value: |-
        PROTECTED
        Pre-Filing Patent Assessment
        Client: Queensland Health Innovation Unit
        Subject: Novel rapid diagnostic test — COVID variant detection

        Patentability assessment: Novelty confirmed subject to prior art search. Draft claims attached for review before provisional application lodgement.
      description: Pre-filing patent assessment with novelty analysis
    - value: 'PRIVILEGED Patent Pre-Filing Strategy: draft claim 1 avoids Jones prior art; novelty confirmed; provisional application due 30 July.'
      description: Pre-filing strategy with privilege, claim drafting, prior art, novelty, and filing date (reaches the 75 policy tier)
  should_not_match:
    - value: Australian Patent No. 2024123456 was granted on 15 March 2025. The published patent specification describes a water purification membrane with improved flux characteristics.
      description: Published granted patent
    - value: PCT Publication WO/2025/012345 discloses a method for rapid diagnostic testing. The published international application is available through WIPO PatentScope.
      description: Published PCT patent application
    - value: This textbook chapter provides an overview of patent prosecution strategy in Australia. Students should understand the requirements for novelty, inventive step, and utility under the Patents Act 1990.
      description: Academic textbook on patent law
    - value: The product team patented a new packaging colour last year.
      description: Past-tense patenting mention without prosecution or pre-filing strategy
    - value: 'Textbook exercise: draft claims after reviewing sample prior art.'
      description: Instructional material without a patent primary anchor
false_positives:
  - description: Published granted patents and patent specifications
    mitigation: Negative match on 'granted', 'Patent No.', 'published specification'
  - description: Published PCT or international patent applications
    mitigation: Negative match on 'PCT Publication', 'WO/', 'published application', 'PatentScope'
  - description: Academic materials on patent prosecution
    mitigation: Require co-occurrence with specific invention details and privilege/PROTECTED markers
  - description: Patent office examination reports (public documents)
    mitigation: Negative match on 'examination report', 'office action', 'examiner's report'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence_level: 85
      id_match: primary
      matches:
        - ref: Evidence_patent_prefiling_state
        - ref: Evidence_patent_strategy_analysis
        - ref: Evidence_patent_privilege_marking
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - exclusion
      description: Pre-filing patent matter with substantive claim/prior-art analysis and a privilege or confidentiality marking
    - tier: medium
      confidence_level: 75
      id_match: primary
      matches:
        - ref: Evidence_patent_prefiling_state
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - exclusion
      description: Patent strategy or application phrase with independent pre-filing-state evidence, gated by public-patent exclusions
    - tier: low
      confidence_level: 65
      id_match: primary
      discovery_only: true
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - exclusion
      description: Patent strategy/application terminology for discovery inventory only
  regexes:
    - pattern: (?i)\bpatent\s+(?:prosecution|application|strategy)\b
      description: Patent prosecution terminology
    - pattern: (?i)\b(?:pre-filing|draft\s+claims|freedom\s+to\s+operate|FTO)\b
      description: Pre-filing patent indicators
    - pattern: (?i)\bprior\s+art\b
      description: Prior art reference
  keywords:
    - id: primary
      groups:
        - match_style: word
          terms:
            - patent prosecution
            - patent application
            - patent strategy
            - patent
      strength: domain
    - id: Evidence_patent_prefiling_state
      groups:
        - match_style: word
          terms:
            - pre-filing
            - before filing
            - before lodgement
            - filing deadline
            - provisional application
            - unpublished invention
      strength: domain
    - id: Evidence_patent_strategy_analysis
      groups:
        - match_style: word
          terms:
            - draft claims
            - prior art
            - freedom to operate
            - text: FTO
              case_sensitive: true
            - novelty
            - patentability
            - inventive step
            - design-around
            - blocking patent
      strength: domain
    - id: Evidence_patent_privilege_marking
      groups:
        - match_style: word
          terms:
            - privilege
            - privileged
            - legal professional privilege
            - PROTECTED
            - CONFIDENTIAL
            - confidential legal advice
      strength: domain
    - id: exclusion
      groups:
        - match_style: word
          terms:
            - granted
            - Patent No.
            - published specification
            - PCT Publication
            - text: WO/
              case_sensitive: true
            - PatentScope
            - textbook
            - examination report
      strength: domain
  filters:
    - type: exclude_pattern
      pattern: (?i)\b(?:Patent\s+No\.?|AU\s*)\d{4,}
      description: Exclude granted patent number references
    - type: exclude_pattern
      pattern: (?i)WO/\d{4}/\d+
      description: Exclude PCT publication numbers
risk_rating: 7
risk_description: >-
  The detector targets pre-filing patent legal strategy, including draft claims, novelty and prior-art analysis, freedom-to-operate conclusions, and prosecution choices. Disclosure before filing can destroy novelty, expose blocking patents or design-around plans, and let a competitor anticipate or undermine the applicant's claims. Published patents, granted specifications, public PCT applications, examination reports, and academic guidance are excluded, although the remaining concept classifier is low confidence. Risk 7 warrants SENSITIVE Legal; PROTECTED would require a uniquely valuable invention portfolio or disclosure causing significant, irreversible strategic damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-02-20'
updated: '2026-07-19'
changelog:
  - version: 1.5.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: complete the deferred evidence split into canonical pre-filing-state, substantive-strategy, and privilege/marking references; make FTO and WO/ case-sensitive; add distinct 65/75/85 tiers and exact probes while retaining granted, PCT, public, and textbook exclusions.'
  - version: 1.4.0
    date: '2026-07-17'
    description: 'TP-01537 approved reduced scope: add a policy-capable 75 tier wiring the existing primary keyword group to the existing corroborative group, NOT-gated by the existing exclusion group; the existing granted-patent-number and PCT-publication exclude_pattern filters continue to apply (all references pre-existing; no new detection structure). The 65 tier remains discovery-only. Deferred per QA/independent review: the proposed 85 tier, pending a split of the flat corroborative group into separate pre-filing-state, strategy-analysis, and privilege/marking references. The trainable-classifier recommendation for prose-heavy cases stands. Added a privileged pre-filing positive and patented-mention/textbook negatives.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1470 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-12'
    description: 'Baseline burn-down B: the sole pattern_tier had id_match: '''' (empty string) — idMatchIds() treats an empty id_match string as [], so scripts/verify-pattern-testcases.mjs tierEvaluable() filtered the tier out entirely (0 evaluable tiers), which routed should_not_match evaluation through the hard-fail no-tiers-to-gate-it path instead of the discovery_only warn path the tier was designed for. Wired id_match to the existing purview.keywords group id primary (already registered under the group: primary key), making the tier evaluable again; the tier remains discovery_only so top-level hits on published-patent and textbook prose now surface only as discovery-inventory warnings, not should_not_match failures. Verified: 0 FAILs, all 3 should_not_match negatives (granted patent, published PCT application, academic textbook) clear; all 3 should_match positives still pass via top-level pattern.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) — no tier referenced it and the legacy tier shape carries no evidence lists to wire it into (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
