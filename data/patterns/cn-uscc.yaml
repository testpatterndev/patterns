schema: testpattern/v1
name: China Unified Social Credit Code
slug: cn-uscc
version: 1.0.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Mainland China Unified Social Credit Codes (统一社会信用代码) assigned to legal persons and
  other organisations. The code is 18 characters using a restricted alphabet (digits and selected letters excluding
  I, O, Z, S, V), with an embedded administrative division code in positions 3-8.
operation: >-
  Structural 18-character USCC with restricted alphabet and digit run in positions 3-8. Mod-31 check
  character is not enforced in the regex. Corroborative evidence: USCC / 统一社会信用代码 keywords within 300
  characters. Keyword lists: business-identifier.
pattern: '\b[0-9A-HJ-NPQRTUWXY]{2}\d{6}[0-9A-HJ-NPQRTUWXY]{10}\b'
confidence: high
confidence_justification: >-
  High confidence when Chinese or English registry keywords are present. Length plus
  restricted alphabet and fixed digit block make accidental matches uncommon.
jurisdictions:
  - cn
regulations:
  - "PIPL (China)"
  - "Cybersecurity Law (China)"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - business-identifier
  - government-id
corroborative_evidence:
  keywords:
    - 统一社会信用代码
    - USCC
    - social credit code
    - 统一代码
  proximity: 300
  keyword_lists:
    - business-identifier
test_cases:
  should_match:
    - value: '91110000MA01234567'
      description: Illustrative 18-char USCC shape
    - value: '91310000MA1K3XXXXX'
      description: Alternate illustrative USCC
    - value: '92110000MA0XXXXX1A'
      description: Third illustrative form
  should_not_match:
    - value: '91110000MA0123456'
      description: Only 17 characters
    - value: '91110000MA0123456I'
      description: Contains forbidden letter I
    - value: '91A10000MA01234567'
      description: Non-digit in administrative division block
false_positives:
  - description: >-
      Other long alphanumeric registry codes using similar alphabets.
    mitigation: >-
      Require 统一社会信用代码 / USCC / business licence keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_cn_uscc
      matches:
        - ref: Keyword_cn_uscc_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_cn_uscc
      matches:
        - ref: Keyword_cn_uscc_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_cn_uscc
  regexes:
    - id: Regex_cn_uscc
      pattern: '\b[0-9A-HJ-NPQRTUWXY]{2}\d{6}[0-9A-HJ-NPQRTUWXY]{10}\b'
  keywords:
    - id: Keyword_cn_uscc_specific
      groups:
        - match_style: word
          terms:
            - 统一社会信用代码
            - 统一代码
            - USCC
            - social credit code
            - Unified Social Credit Code
            - 营业执照号
            - 组织机构代码
      strength: specific
    - id: Keyword_cn_uscc_broad
      groups:
        - match_style: word
          terms:
            - 营业执照
            - 市场监管
            - 企业信用
            - 工商注册
            - legal person code
            - business licence
      strength: specific
risk_rating: 6
risk_description: >-
  USCC uniquely identifies Chinese legal entities and links tax, licensing and credit records used in KYC and supply-chain diligence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Government"
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
references:
  - url: https://www.cods.org.cn/
    title: National standards organisation - coding references
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Initial mature identifier SIT — Phase-1 coverage backlog (Purview-safe regex, full label/risk metadata for pack workbooks)'
author: testpattern-community
