schema: testpattern/v1
name: Visa grant number
slug: global-top500-032-visa-grant-number
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to visa grant number in international contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: pii-civic-credentials. Adds label-context matching and exclusion logic for sample/template/test placeholders. Uses additional domain-context evidence and explicit exclusion logic for
  template/sample/test text.
pattern: >-
  \bvisa\s+grant\s+(?:number|no\.?|#)[\s:#-]{0,20}\d{13}\b
confidence: medium
confidence_justification: >-
  category-aware structural regex with anchor and context constraints replaces phrase-only detection. Context label evidence plus explicit template/example exclusion improves precision for high-risk
  identifiers. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - visa grant number
  proximity: 240
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 'Visa grant number: 1234567890123'
      description: Labelled 13-digit VGN
    - value: 'Visa grant no. 9876543210987'
      description: Abbreviated label
    - value: 'Visa grant number 1111222233334'
      description: Label and value
  should_not_match:
    - value: '1718254800000'
      description: Bare 13-digit (ms timestamp), no label
    - value: 'reference 1234567890123'
      description: 13 digits without a visa-grant label
    - value: 'template example placeholder'
      description: Template/sample text
false_positives:
  - description: Common words and phrases related to visa grant number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 95
      id_match: Regex_visa_grant_number
      matches:
        - ref: Pattern_global_top500_032_visa_grant_number_label_context
        - ref: Keyword_global_top500_032_visa_grant_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 90
      id_match: Regex_visa_grant_number
      matches:
        - ref: Pattern_global_top500_032_visa_grant_number_label_context
        - ref: Keyword_visa_grant_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_visa_grant_number
      matches:
        - ref: Keyword_visa_grant_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_visa_grant_number
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_visa_grant_number
      pattern: >-
        \bvisa\s+grant\s+(?:number|no\.?|#)[\s:#-]{0,20}\d{13}\b
    - id: Pattern_global_top500_032_visa_grant_number_label_context
      pattern: (?i)\b(?:grant)\b
  keywords:
    - id: Keyword_visa_grant_number
      groups:
        - match_style: word
          terms:
            - visa grant number
            - visa grant
            - grant number
            - visa number
            - visa reference
            - visa approval
            - travel visa
            - visa subclass
            - visa holder
            - entry visa
            - visa status
            - immigration visa
    - id: Keyword_global_top500_032_visa_grant_number_domain_context
      groups:
        - match_style: word
          terms:
            - visa grant number
            - visa
            - grant
risk_rating: 8
risk_description: Visa grant number exposure enables immigration fraud and visa status manipulation
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references: []
