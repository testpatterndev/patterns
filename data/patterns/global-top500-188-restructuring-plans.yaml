schema: testpattern/v1
name: Restructuring plans
slug: global-top500-188-restructuring-plans
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to restructuring plans in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:restructuring\s+plan|organizational\s+restructuring|workforce\s+reduction|cost\s+reduction|turnaround\s+plan|voluntary\s+administration|creditor\s+arrangement|debt\s+restructuring|operational\s+restructuring|business\s+transformation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - restructuring plans
    - restructuring
    - plans
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: restructuring plan
      description: Primary topic phrase match
    - value: organizational restructuring
      description: Case-insensitive topic phrase match
    - value: workforce reduction
      description: Alternative topic phrase match
    - value: cost reduction
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to restructuring plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_restructuring_plans
      matches:
        - ref: Pattern_global_top500_188_restructuring_plans_label_context
        - ref: Keyword_global_top500_188_restructuring_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_restructuring_plans
      matches:
        - ref: Keyword_restructuring_plans
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_restructuring_plans
      matches:
        - ref: Keyword_restructuring_plans
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_restructuring_plans
      pattern: >-
        (?is)\b(?:restructuring\s+plan|organizational\s+restructuring|workforce\s+reduction|cost\s+reduction|turnaround\s+plan|voluntary\s+administration|creditor\s+arrangement|debt\s+restructuring|operational\s+restructuring|business\s+transformation)\b
    - id: Pattern_global_top500_188_restructuring_plans_label_context
      pattern: (?i)\\b(?:restructuring\\s+plans|restructuring|plans|top500)\\b
  keywords:
    - id: Keyword_restructuring_plans
      groups:
        - match_style: word
          terms:
            - restructuring plan
            - organizational restructuring
            - workforce reduction
            - cost reduction
            - turnaround plan
            - insolvency
            - voluntary administration
            - creditor arrangement
            - debt restructuring
            - operational restructuring
            - business transformation
    - id: Keyword_global_top500_188_restructuring_plans_domain_context
      groups:
        - match_style: word
          terms:
            - restructuring plans
            - restructuring
            - plans
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
