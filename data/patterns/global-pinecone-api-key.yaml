schema: testpattern/v1
name: Pinecone API Key
slug: global-pinecone-api-key
version: 1.1.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Pinecone API keys in both current live formats: pcsk_ (the dominant format issued by
  the Pinecone console, CLI, and SDK key-creation flows) and pckey_ (the Enterprise-plan Admin
  API variant, format pckey_<public-label>_<unique-key>). A leaked key grants unauthorized
  access to a Pinecone vector database, including any embeddings or vectorised source data it
  stores.
operation: >-
  Two prefixed token formats. pcsk_ (dominant, console/CLI/SDK-issued): pcsk_<label>_<secret>
  with a 5-6 character alphanumeric label and a 63-character alphanumeric secret, per
  TruffleHog's production detector, consistent with Pinecone's own doc placeholders
  (pcsk_abc123). pckey_ (Enterprise Admin API): pckey_<public-label>_<unique-key> per Pinecone's
  Admin API reference; segment lengths not formally published, so a generous bounded body range
  is used for that branch. Corroborative evidence: keywords within 300 characters.
pattern: (?<![A-Za-z0-9_])(?:pcsk_[A-Za-z0-9]{5,6}_[A-Za-z0-9]{63}|pckey_[A-Za-z0-9_-]{10,100})(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: both prefixes are multiply attested. pcsk_ is the dominant live format --
  shown in Pinecone's own CLI reference and AGENTS-JAVASCRIPT doc examples, called out in
  Pinecone's official skills repo contributor guide as the real key shape that security linters
  flag, and pinned to an exact body structure (5-6 alnum label + 63 alnum secret) by
  TruffleHog's production detector. pckey_ is explicitly documented on Pinecone's Admin API
  reference (Enterprise-plan key-creation endpoint). Pinecone is also a confirmed GitHub
  secret-scanning partner (pinecone_api_key). Older, pre-pcsk_ Pinecone keys (bare UUIDs) are
  not covered -- documented as a scope limitation rather than invented as an additional format.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - pinecone
    - pinecone.io
    - PINECONE_API_KEY
    - vector database
    - api key
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: pcsk_abc123_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789A
      description: Pinecone API key, dominant pcsk_ format (6-char label + 63-char secret)
    - value: 'PINECONE_API_KEY=pcsk_key001_zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIhHgGfFeEdDcCbBaA0123456789z'
      description: Labelled pcsk_ key in an env assignment
    - value: pckey_devkey_ABCDEFGHIJKLMNOPQRSTUVWXYZabcd
      description: Pinecone Enterprise Admin API key, pckey_ prefix + label + unique-key body
    - value: Using pinecone with key pckey_ci01234567890123456789012345
      description: Pinecone brand mention followed by a pckey_ token value
  should_not_match:
    - value: pcsk_abc123_ABCDEFGHIJKLMNOPQRSTUVWXYZabcd
      description: pcsk_ key with secret segment far too short (30 chars, not 63)
    - value: pckey_ab
      description: pckey_ body far too short (2 chars, below the 10-char floor)
    - value: remember to rotate the pinecone api key before deploying
      description: Prose mention without a token value
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Documentation or examples showing placeholder pcsk_/pckey_ strings.
    mitigation: Require corroborative Pinecone keywords and check for placeholder markers (example, xxxx).
  - description: The common English noun "pinecone" (the plant structure) appearing in unrelated text near an unrelated token or hash.
    mitigation: The brand-name keyword term is case-sensitive (Pinecone, capitalised) and additional unambiguous terms (pinecone.io, PINECONE_API_KEY) disambiguate from the generic noun.
  - description: Legacy pre-pcsk_ Pinecone keys (bare UUIDs) are a different, unverifiable format not matched by this pattern.
    mitigation: Documented as a known scope limitation; only the current pcsk_ and pckey_ formats are matched.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  A leaked Pinecone API key enables unauthorized access to a Pinecone vector database index,
  including any embeddings, metadata, or vectorised source data it stores, plus unauthorized,
  billed API usage.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_pinecone_api_key
      matches:
        - ref: Keyword_pinecone_api_key
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_pinecone_api_key
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_pinecone_api_key
      pattern: (?<![A-Za-z0-9_])(?:pcsk_[A-Za-z0-9]{5,6}_[A-Za-z0-9]{63}|pckey_[A-Za-z0-9_-]{10,100})(?![A-Za-z0-9_-])
  keywords:
    - id: Keyword_pinecone_api_key
      groups:
        - match_style: word
          terms:
            - text: Pinecone
              case_sensitive: true
            - pinecone.io
            - PINECONE_API_KEY
            - pinecone api
            - vector database
            - api key
      strength: specific
