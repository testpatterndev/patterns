schema: testpattern/v1
name: Peru DNI
slug: pe-dni
version: 1.0.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Peru Documento Nacional de Identidad (DNI) numbers — 8 digits.
operation: >-
  Structural 8-digit DNI with DNI keywords. Keyword lists: pii-civic-credentials.
pattern: '\b\d{8}\b'
confidence: medium
confidence_justification: >-
  Medium confidence; DNI keywords required.
jurisdictions:
  - pe
regulations:
  - "Ley de Protección de Datos Personales (Peru)"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - DNI
    - Documento Nacional de Identidad
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '12345678'
      description: DNI
    - value: '87654321'
      description: Alt
    - value: '11223344'
      description: Third
  should_not_match:
    - value: '1234567'
      description: 7
    - value: '123456789'
      description: 9
    - value: '1234567A'
      description: Letter
false_positives:
  - description: >-
      Other 8-digit codes.
    mitigation: >-
      Require DNI keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_pe_dni
      matches:
        - ref: Keyword_pe_dni_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_pe_dni
      matches:
        - ref: Keyword_pe_dni_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pe_dni
  regexes:
    - id: Regex_pe_dni
      pattern: '\b\d{8}\b'
  keywords:
    - id: Keyword_pe_dni_specific
      groups:
        - match_style: word
          terms:
            - DNI
            - Documento Nacional de Identidad
            - número de DNI
      strength: specific
    - id: Keyword_pe_dni_broad
      groups:
        - match_style: word
          terms:
            - RENIEC
            - cédula Peru
      strength: specific
risk_rating: 9
risk_description: >-
  Peru DNI uniquely identifies citizens.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Phase-2 coverage backlog — mature Purview-safe identifier with pack metadata'
author: testpattern-community
license: MIT
