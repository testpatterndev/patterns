schema: testpattern/v1
name: Genetic Test Results with Patient Identifiers
slug: genetic-test-results-with-patient-id
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects documents containing genetic or genomic test results linked to identifiable patients, including pathogenic variant findings, hereditary risk assessments, and pharmacogenomic reports. Genetic data reveals predisposition to diseases, carrier status, and family lineage — disclosure enables genetic discrimination in insurance, employment, and relationships.
operation: 'Keyword proximity: primary keywords (genetic test, genomic analysis, pathogenic variant, hereditary risk, pharmacogenomic, BRCA, carrier status) within 300 characters of patient identifiers (MRN, DOB, Medicare number). Negative keyword exclusion for anonymised research data and published studies.'
pattern: (?i)\b(genetic\s+test\s+result|genomic\s+(?:analysis|report|sequencing)|pathogenic\s+variant|hereditary\s+(?:risk|predisposition)|pharmacogenomic\s+report|carrier\s+status\s+(?:report|result)|whole\s+genome\s+sequencing|BRCA[12]\s+(?:positive|negative|variant))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of genetic testing terminology with patient-identifying information. Generic genomic research language without patient identifiers does not trigger detection.'
jurisdictions:
  - au
regulations:
  - qgiscf
  - privacy-act-1988
  - health-records-act-2001-vic
  - anti-discrimination-act-1991-qld
data_categories:
  - health
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Privacy
    - genetic test
    - genomic sequencing
    - pathogenic variant
    - variant of uncertain significance
    - hereditary
    - BRCA1
    - BRCA2
    - carrier status
    - pharmacogenomic
    - whole genome
    - exome sequencing
    - MRN
    - patient
    - date of birth
    - Medicare
    - referring clinician
    - genetic counsellor
    - predictive testing
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED Privacy. Genetic Test Result Report. Patient: Jennifer Anne WILLIAMS, DOB 14/03/1985, MRN 4872156. Test: BRCA1/BRCA2 panel sequencing. Result: Pathogenic variant identified in BRCA2 gene (c.5946delT). Carrier status confirmed. Hereditary risk assessment: significantly elevated lifetime risk of breast and ovarian cancer. Genetic counsellor referral: Dr Sarah Chen.'
      description: Genetic test result with pathogenic variant and patient identifiers
    - value: 'Pharmacogenomic Report — Queensland Health Genomics Unit. Patient Medicare No: 2456 78901 2. Genomic analysis of CYP2D6 and CYP2C19 metabolism genes. Result: CYP2D6 poor metaboliser phenotype. Clinical recommendation: avoid codeine, adjust tamoxifen dosing. Referring clinician: Dr Michael Park.'
      description: Pharmacogenomic report with Medicare number and clinical recommendations
    - value: 'Whole genome sequencing report. Patient: Robert James THOMPSON, DOB 22/07/1978. Hereditary predisposition screening. Pathogenic variant detected in MLH1 gene associated with Lynch syndrome. Carrier status for 3 additional variants of uncertain significance. Predictive testing recommended for first-degree relatives.'
      description: Whole genome sequencing with hereditary predisposition findings
  should_not_match:
    - value: The Queensland Genomics Health Alliance published its annual report highlighting that 15,000 genomic tests were performed across the state. The report used anonymised aggregate data and contained no individual patient information.
      description: Published annual report with aggregate genomic testing statistics
    - value: A Nature Genetics research paper examined BRCA1 pathogenic variants across a cohort of 5,000 anonymised participants. The study found carrier status prevalence of 1 in 400 in the general population.
      description: Published academic research with anonymised genomic data
    - value: The genetic counselling training module explains the process of predictive testing for hereditary cancer syndromes. Case studies use fictional patient scenarios to illustrate counselling techniques.
      description: Training module with fictional patient scenarios
false_positives:
  - description: Published genomic research using anonymised cohort data
    mitigation: 'Negative keyword exclusion: ''anonymised'', ''cohort'', ''research'', ''study'', ''published'', ''journal'', ''participants'''
  - description: Genetic counselling training materials with fictional scenarios
    mitigation: 'Negative keyword exclusion: ''training module'', ''fictional'', ''case study'', ''example'', ''scenario'''
  - description: Consumer genetic testing marketing materials
    mitigation: 'Negative keyword exclusion: ''order your kit'', ''ancestry'', ''23andMe'', ''marketing'', ''promotional'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: Genetic test terminology with patient identifiers (MRN, DOB, Medicare) and pathogenic variant results
    - tier: medium
      confidence: 75
      description: 2+ genetic testing keywords with clinical context within 300 characters
    - tier: low
      confidence: 65
      description: 1 genetic testing keyword with 2+ corroborative terms within 300 characters
  regexes:
    - name: genetic_test_terms
      pattern: (?i)\b(genetic\s+test|genomic\s+(?:analysis|report|sequencing)|pathogenic\s+variant|hereditary\s+(?:risk|predisposition)|pharmacogenomic|carrier\s+status|whole\s+genome|BRCA[12])\b
    - name: mrn_reference
      pattern: \bMRN\s*[:\s]\s*\d{5,10}\b
  keywords:
    - name: primary_keywords
      words:
        - genetic test
        - genomic analysis
        - genomic sequencing
        - pathogenic variant
        - hereditary risk
        - pharmacogenomic
        - carrier status
        - whole genome sequencing
        - BRCA1
        - BRCA2
        - exome sequencing
    - name: classification_markers
      words:
        - PROTECTED
        - Privacy
        - CONFIDENTIAL
        - SENSITIVE
    - name: corroborative_terms
      words:
        - patient
        - MRN
        - date of birth
        - Medicare
        - referring clinician
        - genetic counsellor
        - predictive testing
        - variant of uncertain significance
        - clinical recommendation
        - hereditary predisposition
    - name: negative_keywords
      words:
        - anonymised
        - cohort
        - research paper
        - published
        - journal
        - participants
        - training module
        - fictional
        - case study
        - marketing
        - ancestry
        - promotional
  filters:
    - type: exclude
      description: Exclude anonymised research, training materials, and consumer marketing
      keywords:
        - anonymised
        - cohort study
        - research paper
        - published
        - training module
        - fictional
        - marketing
        - promotional
risk_rating: 8
risk_description: Disclosure reveals genetic predispositions, carrier status, and hereditary disease risk linked to identifiable individuals. Enables genetic discrimination in insurance, employment, and personal relationships. Affects extended family members who share genetic traits.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: PROTECTED Privacy
references: []
created: '2026-03-06'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
