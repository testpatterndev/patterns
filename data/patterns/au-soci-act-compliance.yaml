schema: testpattern/v1
name: SOCI Act Compliance Document
slug: au-soci-act-compliance
version: 1.5.0
type: keyword_list
pattern_class: concept
description: Detects Security of Critical Infrastructure (SOCI) Act compliance documents and resilience assessments.
operation: >-
  Keyword-based detection matching SOCI Act, critical infrastructure resilience, AESCSF, and Essential Eight patterns.
  Corroborative evidence: 12 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "Criminal Code 1899 (Qld)"
- "SOCI Act 2018 (Cth)"
frameworks:
- QGISCF
data_categories:
  - security
  - government
  - infrastructure
test_cases:
  should_match:
    - value: SOCI Act compliance assessment and resilience review per ACSC guidelines
      description: Test match 1
    - value: Security of Critical Infrastructure Act risk assessment with Essential Eight maturity
      description: Test match 2
    - value: AESCSF compliance report for Australian Energy Sector Cyber Security framework
      description: Test match 3
  should_not_match:
    - value: Social media compliance report
      description: Non-match 1
    - value: The society meeting was productive
      description: Non-match 2
false_positives:
  - description: Abbreviation SOCI confused with social in non-infrastructure contexts.
    mitigation: Require specific SOCI Act or critical infrastructure terminology.
exports:
  - yaml
scope: narrow
risk_rating: 9
risk_description: SOCI compliance exposure reveals critical infrastructure security posture and gaps.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: "PROTECTED Government"
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_soci_act
      matches:
        - ref: Keyword_soci
        - ref: Keyword_critical_infrastructure
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_aescsf
      matches:
        - ref: Keyword_energy_sector
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_essential_eight
      matches:
        - ref: Keyword_acsc
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_soci_act
      pattern: (?i)\b(?:soci\s+act|security\s+of\s+critical\s+infrastructure|critical\s+infrastructure\s+(?:act|resilience))\b
    - id: Regex_aescsf
      pattern: (?i)\b(?:aescsf|australian\s+energy\s+sector\s+cyber\s+security)\b
    - id: Regex_essential_eight
      pattern: (?i)\b(?:essential\s+eight|acsc\s+(?:guidelines|essential))\b
  keywords:
    - id: Keyword_soci
      groups:
        - match_style: word
          terms:
            - SOCI obligations
            - reportable under SOCI
            - SOCI Act
            - Security of Critical Infrastructure
            - resilience assessment
            - critical infrastructure resilience
      strength: specific
    - id: Keyword_critical_infrastructure
      groups:
        - match_style: word
          terms:
            - critical infrastructure
            - essential service
            - power generation
            - water treatment
            - electricity network
            - gas pipeline
            - telecommunications
      strength: specific
    - id: Keyword_energy_sector
      groups:
        - match_style: word
          terms:
            - energy sector
            - electricity
            - power station
            - transmission network
            - distribution network
            - AEMO
            - text: NEM
              case_sensitive: true
      strength: domain
    - id: Keyword_acsc
      groups:
        - match_style: word
          terms:
            - ACSC
            - Australian Cyber Security Centre
            - Essential Eight
            - cyber security
            - text: ISM
              case_sensitive: true
            - Information Security Manual
      strength: specific
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.5.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.3.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - SOCI obligations
  - reportable under SOCI
  - SOCI Act
  - Security of Critical Infrastructure
  - resilience assessment
  - critical infrastructure resilience
  - AESCSF
  - Australian Energy Sector Cyber Security
  - Essential Eight
  - ACSC
  - Australian Cyber Security Centre
  - cyber security
  - ISM
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
