schema: testpattern/v1
name: SOCI Act Compliance Document
slug: au-soci-act-compliance
version: 1.6.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive Security of Critical Infrastructure Act, CIRMP, and AESCSF compliance
  assessments. Topic phrases are retained for discovery; enforcement requires obligation status,
  compliance findings, maturity ratings, control gaps, risk-management-program content, or remediation
  actions, and high confidence additionally requires a critical-asset/responsible-entity context and an
  adverse finding.
operation: >-
  Regex_soci_compliance recognises SOCI Act, Security of Critical Infrastructure, CIRMP, and AESCSF
  assessment/report topics. The topic alone is discovery-only at 65. Substantive obligation, finding,
  maturity, program, or remediation content raises it to 75; a critical-asset or responsible-entity
  context plus a non-compliance, material weakness, overdue remediation, critical finding, or high
  residual-risk result reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:SOCI\s+Act\s+(?:compliance\s+)?(?:assessment|report|review)|Security\s+of\s+Critical\s+Infrastructure\s+(?:compliance\s+assessment|risk\s+management\s+program|resilience\s+assessment)|CIRMP\s+(?:assessment|review|report)|AESCSF\s+(?:assessment|compliance\s+report))\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive compliance results rather than a public legislative or
  framework reference. High confidence adds asset/entity scope and an adverse result.
jurisdictions:
  - au
regulations:
- "Criminal Code 1899 (Qld)"
- "SOCI Act 2018 (Cth)"
frameworks:
- QGISCF
data_categories:
  - security
  - government
  - infrastructure
test_cases:
  should_match:
    - value: SOCI Act compliance assessment
      description: Low-tier probe - compliance topic without assessment results
    - value: 'SOCI Act compliance assessment: obligation status, maturity rating, risk management program, compliance findings, and remediation actions'
      description: Medium-tier probe - substantive results without adverse critical-asset context
    - value: 'SOCI Act compliance assessment for responsible entity NorthGrid and critical asset CA-104: compliance finding is non-compliant, material control gap, residual risk high, remediation overdue'
      description: High-tier probe - asset/entity context with adverse compliance results
  should_not_match:
    - value: Social media compliance report
      description: Non-match 1
    - value: The society meeting was productive
      description: Unrelated social usage
    - value: 'The public website summarises the SOCI Act and its obligations.'
      description: Public legislative overview without an assessment record
    - value: 'Training example: SOCI Act compliance assessment for critical asset CA-104 with non-compliance and overdue remediation'
      description: Explicit training content must not enforce
false_positives:
  - description: Public legislation, regulatory guidance, conference material, and framework documentation discuss SOCI, CIRMP, AESCSF, obligations, maturity, and resilience without containing an entity's compliance results.
    mitigation: Keep topic-only matches discovery-only and require obligation status, findings, maturity ratings, program content, control gaps, or remediation actions for enforcement.
  - description: Training assessments can contain realistic asset IDs, responsible entities, control gaps, maturity ratings, and non-compliance outcomes.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - yaml
scope: narrow
risk_rating: 9
risk_description: >-
  The detector targets substantive SOCI Act, AESCSF, resilience, and Essential Eight assessment material for critical assets. Disclosure may reveal control gaps, resilience weaknesses, or compliance findings that an attacker could use to target an essential service. The normal unit is a security or compliance document rather than a passing public reference, so significant organisational or infrastructure damage is credible. Risk 9 PROTECTED is justified; risk 10 would require a complete operational blueprint, life-safety dependency, or evidence of catastrophic service impact.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_soci_compliance
      matches:
        - ref: Evidence_soci_assessment_result
        - ref: Evidence_soci_asset_entity
        - ref: Evidence_soci_adverse_finding
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_soci_compliance
      matches:
        - ref: Evidence_soci_assessment_result
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_soci_compliance
  regexes:
    - id: Regex_soci_compliance
      pattern: >-
        (?is)\b(?:SOCI\s+Act\s+(?:compliance\s+)?(?:assessment|report|review)|Security\s+of\s+Critical\s+Infrastructure\s+(?:compliance\s+assessment|risk\s+management\s+program|resilience\s+assessment)|CIRMP\s+(?:assessment|review|report)|AESCSF\s+(?:assessment|compliance\s+report))\b
  keywords:
    - id: Evidence_soci_assessment_result
      groups:
        - match_style: word
          terms:
            - obligation status
            - compliance finding
            - maturity rating
            - control gap
            - risk management program
            - remediation action
            - resilience finding
            - control assessment
      strength: domain
    - id: Evidence_soci_asset_entity
      groups:
        - match_style: word
          terms:
            - critical asset
            - asset ID
            - responsible entity
            - text: CIRMP
              case_sensitive: true
            - operational technology
            - power station
            - water treatment plant
            - transmission substation
            - pipeline facility
            - telecommunications network
      strength: domain
    - id: Evidence_soci_adverse_finding
      groups:
        - match_style: word
          terms:
            - non-compliant
            - material weakness
            - remediation overdue
            - critical finding
            - residual risk high
            - significant deficiency
            - reportable incident
      strength: specific
created: '2026-02-09'
updated: '2026-07-04'
changelog:
