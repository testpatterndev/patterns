schema: testpattern/v1
name: HIV status data
slug: global-top500-332-hiv-status-data
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies hiv status data references in healthcare and patient records. Protected health information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:HIV\s+status|HIV\s+positive|HIV\s+negative|HIV\s+test|viral\s+load|CD4\s+count|HIV\s+diagnosis)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
data_categories:
- healthcare
- phi
corroborative_evidence:
  keywords:
  - hiv status data
  - hiv
  - status
  - data
  - health
  - biomedical
  - information
  proximity: 300
  keyword_lists:
  - healthcare-clinical
  - data-record-context
  - generic-data-labels
test_cases:
  should_match:
  - value: HIV status
    description: Primary topic phrase match
  - value: hiv positive
    description: Case-insensitive topic phrase match
  - value: HIV negative
    description: Alternative topic phrase match
  - value: HIV test
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: patient biometric
    description: Generic word pair from old broad template should not match
false_positives:
- description: Medical terminology in health education materials, research publications, clinical guidelines, or public health
    documents without patient-specific data.
  mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers
    such as medical record numbers or dates of birth.
- description: General wellness and fitness content using medical vocabulary without constituting protected health information.
  mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical
    records from general health content.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: The pattern detects HIV-status, HIV-positive, or HIV-negative expressions with seven healthcare corroborators
  and template exclusions, representing a specific serostatus fact rather than broad infectious-disease discussion. If linked
  to a person, disclosure can cause severe stigma, discrimination, relationship harm, unwanted revelation of sexual-health
  information, or avoidance of care. One status result has serious direct impact for the patient even without a full chart,
  while education, guidelines, and public-health material remain possible benign contexts. Risk 8 and SENSITIVE are appropriate;
  PROTECTED requires a concrete violence or safety threat, bulk registry exposure, protected person, or other significant
  damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_hiv_status_data
    matches:
    - ref: Pattern_global_top500_332_hiv_status_data_label_context
    - ref: Keyword_global_top500_332_hiv_status_data_domain_context
    - ref: Keyword_hiv_status_data
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_hiv_status_data
    matches:
    - ref: Pattern_global_top500_332_hiv_status_data_label_context
    - ref: Keyword_global_top500_332_hiv_status_data_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_hiv_status_data
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_hiv_status_data
    pattern: (?is)\b(?:HIV\s+status|HIV\s+positive|HIV\s+negative|HIV\s+test|viral\s+load|CD4\s+count|HIV\s+diagnosis)\b
  - id: Pattern_global_top500_332_hiv_status_data_label_context
    pattern: (?i)\b(?:hiv\s+status\s+data)\b
  keywords:
  - id: Keyword_hiv_status_data
    groups:
    - match_style: word
      terms:
      - HIV status
      - HIV positive
      - HIV negative
      - HIV test
      - viral load
      - health
      - biomedical
      - CD4 count
      - antiretroviral
      - serostatus
      - immunodeficiency
      - HIV diagnosis
    strength: domain
  - id: Keyword_global_top500_332_hiv_status_data_domain_context
    groups:
    - match_style: word
      terms:
      - hiv status data
      - hiv
      - status
    strength: domain
