schema: testpattern/v1
name: Alumni donor records
slug: au-top500-354-alumni-donor-records
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to alumni donor records in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:alumni\s+donor\s+records|gift\s+agreement|donor\s+register|contribution\s+history)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - alumni donor records
    - alumni
    - donor
    - records
    - education
    - research
    - administration
  proximity: 300
test_cases:
  should_match:
    - value: alumni donor records
      description: Primary topic phrase match
    - value: gift agreement
      description: Case-insensitive topic phrase match
    - value: donor register
      description: Alternative topic phrase match
    - value: contribution history
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to alumni donor records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 90
      id_match: Pattern_alumni_donor_records
      matches:
        - ref: Pattern_au_top500_354_alumni_donor_records_label_context
        - ref: Keyword_au_top500_354_alumni_donor_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_354_alumni_donor_records_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_alumni_donor_records
      matches:
        - ref: Evidence_alumni_donor_records
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_354_alumni_donor_records_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_alumni_donor_records
      matches:
        - ref: Evidence_alumni_donor_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_354_alumni_donor_records_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_alumni_donor_records
      matches:
        - ref: Evidence_alumni_donor_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_354_alumni_donor_records_noise_exclusion
  regexes:
    - id: Pattern_alumni_donor_records
      pattern: (?is)\b(?:alumni\s+donor\s+records|gift\s+agreement|donor\s+register|contribution\s+history)\b
    - id: Pattern_au_top500_354_alumni_donor_records_label_context
      pattern: (?i)\\b(?:alumni\\s+donor\\s+records|alumni|donor|top500)\\b
  keywords:
    - id: Evidence_alumni_donor_records
      groups:
        - match_style: word
          terms:
            - alumni donor records
            - alumni
            - donor
            - donation
            - philanthropy
            - bequest
            - endowment
            - gift agreement
            - fundraising
            - benefactor
            - donor register
            - contribution history
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_354_alumni_donor_records_domain_context
      groups:
