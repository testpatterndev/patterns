schema: testpattern/v1
name: Biometric Data Reference
slug: global-biometric-data-reference
version: 1.3.1
type: keyword_list
pattern_class: concept
description: Detects references to biometric data including fingerprints, facial recognition, iris scans, and voiceprints in Australian documents.
operation: >-
  Keyword-only pattern using Purview regex engine. The Purview regex Pattern_biometric_phrase matches phrases such as biometric data, biometric template, fingerprint scan, facial recognition, iris
  scan, retina scan, voiceprint, palm print, and liveness detection. Three confidence tiers: High (85) requires biometric context + data operations keywords with template exclusion logic; Medium (75)
  requires biometric context keywords; Low (65) requires only the regex match. Evidence uses 2 keyword groups (5 biometric context terms, 9 data operations terms) within 300-character proximity.
  Template/sample exclusion prevents false positives from training materials.
confidence: medium
confidence_justification: >-
  Medium confidence: keyword-based detection relies on phrase-matching regex within the Purview engine. Corroborative evidence keywords are needed for reliable identification since biometric-related
  terms can appear in non-sensitive contexts.
jurisdictions:
  - global
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - biometric
  - sensitive-data
test_cases:
  should_match:
    - value: 'Biometric data collection: fingerprint scan required'
      description: Matches 'biometric data' and 'fingerprint scan' via Pattern_biometric_phrase
    - value: Facial recognition template stored in secure vault
      description: Matches 'facial recognition' via Pattern_biometric_phrase
    - value: The biometric identifier was verified using iris scan
      description: Matches 'biometric identifier' and 'iris scan' via Pattern_biometric_phrase
  should_not_match:
    - value: The biological sample was analysed
      description: No biometric phrase matched by the Purview regex
    - value: Face-to-face meeting scheduled
      description: No biometric phrase present
false_positives:
  - description: Generic references to biological or facial in non-biometric contexts.
    mitigation: Require specific biometric technology keywords to co-occur.
exports:
  - yaml
scope: narrow
risk_rating: 5
risk_description: >-
  The canonical Australian Biometric Data Reference is a keyword-list signal for biometric data, templates, fingerprints, facial recognition, voiceprints, and similar terms. One match may identify material worth investigating, yet it does not contain a face image, fingerprint pattern, voice sample, or machine-readable biometric template. Policy statements and technology descriptions can trigger it without referring to any enrolled individual. Risk 5 and OFFICIAL recognise the sensitivity cue while confining SENSITIVE treatment to actual person-linked biometric material.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  regexes:
    - id: Pattern_biometric_phrase
      pattern: >-
        (?i)\b(?:biometric\s+(?:data|template|identifier|scan|record)|fingerprint\s+(?:scan|data|template)|facial\s+recognition|iris\s+scan|retina\s+scan|voiceprint|palm\s+print|liveness\s+detection)\b
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_biometric_phrase
      matches:
        - ref: Evidence_biometric_context
        - ref: Evidence_data_operations
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_biometric_phrase
      matches:
        - ref: Evidence_biometric_context
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_biometric_phrase
  keywords:
    - id: Evidence_biometric_context
      groups:
        - match_style: word
          terms:
            - biometric
            - biometrics
            - physiological
            - identity verification
            - authentication
      strength: domain
    - id: Evidence_data_operations
      groups:
        - match_style: word
          terms:
            - data
            - collection
            - storage
            - processing
            - database
            - record
            - template
            - scan
            - capture
      strength: domain
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 519 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: case/evidence metadata update
author: testpattern-community
license: MIT
