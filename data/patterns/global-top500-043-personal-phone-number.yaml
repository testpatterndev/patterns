schema: testpattern/v1
name: Personal phone number
slug: global-top500-043-personal-phone-number
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to personal phone number in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: au-telecom-terms, phone-international. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:personal\s+phone\s+number|mobile\s+number|cell\s+phone|telephone\s+number|phone\s+number|contact\s+number|home\s+phone|personal\s+mobile|private\s+number|direct\s+line|personal\s+contact|callback\s+number)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - personal phone number
    - personal
    - phone
    - number
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - au-telecom-terms
    - phone-international
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: personal phone number
      description: Primary topic phrase match
    - value: mobile number
      description: Case-insensitive topic phrase match
    - value: cell phone
      description: Alternative topic phrase match
    - value: telephone number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to personal phone number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_personal_phone_number
      matches:
        - ref: Pattern_global_top500_043_personal_phone_number_label_context
        - ref: Keyword_global_top500_043_personal_phone_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_personal_phone_number
      matches:
        - ref: Keyword_personal_phone_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_personal_phone_number
      pattern: >-
        (?is)\b(?:personal\s+phone\s+number|mobile\s+number|cell\s+phone|telephone\s+number|phone\s+number|contact\s+number|home\s+phone|personal\s+mobile|private\s+number|direct\s+line|personal\s+contact|callback\s+number)\b
    - id: Pattern_global_top500_043_personal_phone_number_label_context
      pattern: (?i)\b(?:personal\s+phone\s+number)\b
  keywords:
    - id: Keyword_personal_phone_number
      groups:
        - match_style: word
          terms:
            - personal phone number
            - mobile number
            - cell phone
            - telephone number
            - phone number
            - contact number
            - home phone
            - personal mobile
            - private number
            - direct line
            - personal contact
            - callback number
      strength: specific
    - id: Keyword_global_top500_043_personal_phone_number_domain_context
      groups:
        - match_style: word
          terms:
            - personal phone number
            - personal
            - phone
      strength: domain
risk_description: >-
  The global Personal phone number concept regex detects wording such as personal phone number, cell phone, direct line, or call-back number. It does not parse digits or establish a subscriber, but the broad contact-field cue can occur beside populated personal contact records and requires contextual interpretation across varied jurisdictions. A real person-linked number could enable unwanted calls, phishing, or social engineering, whereas forms and schema text contain the phrase without that harm. Risk 5 and OFFICIAL reflect a broad contact-field signal with limited standalone harm; SENSITIVE requires a usable number linked to an identifiable or vulnerable person plus material targeting, safety, or communications context.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
