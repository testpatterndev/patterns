schema: testpattern/v1
name: Third-party risk assessments
slug: global-top500-148-third-party-risk-assessments
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to third-party risk assessments in international contexts.
  This covers supplier-risk assessments and findings, which may contain embedded contacts; it is not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:third[\s-]+party\s+risk|risk\s+assessment|vendor\s+risk|supplier\s+risk\s+rating|third[\s-]+party\s+due\s+diligence|risk\s+score|inherent\s+risk|residual\s+risk|risk\s+mitigation|vendor\s+assessment|cybersecurity\s+risk|compliance\s+assessment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - third-party risk assessments
    - third
    - party
    - risk
    - assessments
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: third-party risk
      description: Primary topic phrase match
    - value: risk assessment
      description: Case-insensitive topic phrase match
    - value: vendor risk
      description: Alternative topic phrase match
    - value: supplier risk rating
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to third-party risk assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_third_party_risk_assessments
      matches:
        - ref: Pattern_global_top500_148_third_party_risk_assessments_label_context
        - ref: Keyword_global_top500_148_third_party_risk_assessments_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_third_party_risk_assessments
      matches:
        - ref: Keyword_third_party_risk_assessments
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_third_party_risk_assessments
      pattern: >-
        (?is)\b(?:third[\s-]+party\s+risk|risk\s+assessment|vendor\s+risk|supplier\s+risk\s+rating|third[\s-]+party\s+due\s+diligence|risk\s+score|inherent\s+risk|residual\s+risk|risk\s+mitigation|vendor\s+assessment|cybersecurity\s+risk|compliance\s+assessment)\b
    - id: Pattern_global_top500_148_third_party_risk_assessments_label_context
      pattern: (?i)\b(?:third\-party\s+risk\s+assessments)\b
  keywords:
    - id: Keyword_third_party_risk_assessments
      groups:
        - match_style: word
          terms:
            - third-party risk
            - risk assessment
            - vendor risk
            - supplier risk rating
            - third-party due diligence
            - risk score
            - inherent risk
            - residual risk
            - risk mitigation
            - vendor assessment
            - cybersecurity risk
            - compliance assessment
      strength: specific
    - id: Keyword_global_top500_148_third_party_risk_assessments_domain_context
      groups:
        - match_style: word
          terms:
            - third-party risk assessments
            - third
            - party
            - risk
            - assessments
      strength: domain
risk_description: >-
  The concept detector looks for third-party-risk, vendor-risk, supplier-risk-rating, and risk-assessment language intended to identify an assessment of an external organisation. A substantive report can expose control weaknesses, concentration dependencies, service criticality, unresolved findings, and risk acceptance, enabling exploitation, commercial pressure, or disruption affecting both organisations. Generic risk frameworks can match, but the normal unit is an evaluated supplier report rather than a public policy statement. Risk 8 SENSITIVE reflects serious contained operational and commercial harm; PROTECTED would require critical-infrastructure dependencies, exploitable protected systems, systemic service failure, intelligence-sensitive suppliers, or significant whole-of-government damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
