schema: testpattern/v1
name: Third-party risk assessments
slug: global-top500-148-third-party-risk-assessments
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to third-party risk assessments in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:third[\s-]+party\s+risk|risk\s+assessment|vendor\s+risk|supplier\s+risk\s+rating|third[\s-]+party\s+due\s+diligence|risk\s+score|inherent\s+risk|residual\s+risk|risk\s+mitigation|vendor\s+assessment|cybersecurity\s+risk|compliance\s+assessment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - third-party risk assessments
    - third
    - party
    - risk
    - assessments
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: third-party risk
      description: Primary topic phrase match
    - value: risk assessment
      description: Case-insensitive topic phrase match
    - value: vendor risk
      description: Alternative topic phrase match
    - value: supplier risk rating
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to third-party risk assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_third_party_risk_assessments
      matches:
        - ref: Pattern_global_top500_148_third_party_risk_assessments_label_context
        - ref: Keyword_global_top500_148_third_party_risk_assessments_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_148_third_party_risk_assessments_noise_exclusion
    - confidence_level: 75
      id_match: Regex_third_party_risk_assessments
      matches:
        - ref: Keyword_third_party_risk_assessments
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_148_third_party_risk_assessments_noise_exclusion
    - confidence_level: 65
      id_match: Regex_third_party_risk_assessments
      matches:
        - ref: Keyword_third_party_risk_assessments
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_148_third_party_risk_assessments_noise_exclusion
  regexes:
    - id: Regex_third_party_risk_assessments
      pattern: (?is)\b(?:third[\s-]+party\s+risk|risk\s+assessment|vendor\s+risk|supplier\s+risk\s+rating|third[\s-]+party\s+due\s+diligence|risk\s+score|inherent\s+risk|residual\s+risk|risk\s+mitigation|vendor\s+assessment|cybersecurity\s+risk|compliance\s+assessment)\b
    - id: Pattern_global_top500_148_third_party_risk_assessments_label_context
      pattern: (?i)\\b(?:third\-party\\s+risk\\s+assessments|third|party|risk|assessments|top500)\\b
  keywords:
    - id: Keyword_third_party_risk_assessments
      groups:
        - match_style: word
          terms:
            - third-party risk
            - risk assessment
            - vendor risk
            - supplier risk rating
            - third-party due diligence
            - risk score
            - inherent risk
            - residual risk
            - risk mitigation
            - vendor assessment
            - cybersecurity risk
            - compliance assessment
    - id: Keyword_global_top500_148_third_party_risk_assessments_domain_context
      groups:
        - match_style: word
          terms:
            - third-party risk assessments
            - third
            - party
            - risk
            - assessments
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_148_third_party_risk_assessments_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
