schema: testpattern/v1
name: U.S. Driver's License Number
slug: us-drivers-license
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects U.S. driver's license number patterns. This pattern is based on a Microsoft Purview built-in sensitive
  information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as
  a starting point for customisation.
operation: >-
  Matches U.S. driver's license formats which vary by state: letter followed by 7-12 digits, or 7-9 digits alone.
  Corroborative evidence: 5 keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b[A-Z]\d{7,12}\b|\b\d{7,9}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but the wide variation across US states means corroborative
  keywords are strongly recommended to reduce false positive rates.
jurisdictions:
  - us
regulations:
- "CCPA/CPRA"
- "State Breach Laws (US)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - driver
    - licence
    - license
    - driving
    - DL
    - DMV
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: A1234567
      description: Letter prefix with 7 digits (e.g., Florida format)
    - value: '123456789'
      description: 9-digit numeric format (e.g., California format)
    - value: B123456789012
      description: Letter prefix with 12 digits (e.g., Illinois format)
  should_not_match:
    - value: '123456'
      description: Too few digits (6 instead of minimum 7)
    - value: AB1234567
      description: Two leading letters instead of one
false_positives:
  - description: >-
      Generic numeric sequences matching the driver's license format appearing in unrelated contexts. The broad format
      variation across US states increases the false positive rate.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm driver's license context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_us_drivers_license
      matches:
        - ref: Keyword_us_drivers_license_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_us_drivers_license
      matches:
        - ref: Keyword_us_drivers_license_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_us_drivers_license
  regexes:
    - id: Regex_us_drivers_license
      pattern: \b[A-Z]\d{7,12}\b|\b\d{7,9}\b
  keywords:
    - id: Keyword_us_drivers_license_specific
      groups:
        - match_style: word
          terms:
            - driver's license
            - drivers license
            - driver license
            - license number
            - licence number
            - DL number
            - DL#
            - driver's licence
      strength: specific
    - id: Keyword_us_drivers_license_broad
      groups:
        - match_style: word
          terms:
            - text: DMV
              case_sensitive: true
            - driver
            - driving
            - text: DL
              case_sensitive: true
            - state ID
            - identification card
            - motor vehicle
            - state identification
      strength: domain
  filters:
    - id: Guard_us_drivers_license_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The generic US licence SIT covers several state-style forms, including one-letter prefixes and seven-to-twelve-digit or all-numeric values, rather than a licence image or motor-vehicle record. A valid number can strengthen rental, insurance, or account-recovery impersonation when combined with the driver's name, state, address, and date of birth. One match normally affects one driver, while the broad interstate variation also collides with order, account, and other numeric identifiers. Risk 5 and OFFICIAL recognise the bounded identity aid; SENSITIVE would require the card, authentication material, or a linked personal and driving dossier.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-us-drivers-license-number
    title: "U.S. driver's license number entity definition - Microsoft Learn"
