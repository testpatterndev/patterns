schema: testpattern/v1
name: Mailing address
slug: au-top500-042-mailing-address
version: 2.0.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects populated Australian mailing addresses, including street delivery addresses, PO/GPO boxes,
  locked bags, and private bags. Enforcing tiers require mailing/correspondence context and Australian
  geography; the strict tier also requires a labelled recipient.
operation: >-
  The primary is either Pattern_au_mailing_street_address or Pattern_au_mailing_postal_delivery.
  The 65 tier is discovery-only. The 75 tier requires mailing context plus at least one state,
  major-locality, or postcode signal. The 85 tier requires mailing context, a labelled recipient,
  an Australian state or territory, and a postcode. Template and example content is excluded from
  the enforcing tiers.
pattern: >-
  (?i)(?:\b\d{1,5}[A-Z]?(?:\s*[-/]\s*\d{1,5}[A-Z]?)?\s+[A-Z][A-Z'-]{1,30}(?:\s+[A-Z][A-Z'-]{0,30}){0,5}\s+(?:Street|St|Road|Rd|Avenue|Ave|Drive|Dr|Place|Pl|Court|Ct|Crescent|Cres|Close|Cl|Lane|La|Way|Parade|Pde|Boulevard|Blvd|Terrace|Tce|Circuit|Cct|Highway|Hwy|Grove|Gv|Square|Sq|Esplanade|Esp|Rise|View|Gardens|Loop|Trail|Track|Pass|Heights)\b|\b(?:(?:GPO|PO)\s+Box|Locked\s+Bag|Private\s+Bag)\s+\d{1,6}\b)
confidence: medium
confidence_justification: >-
  Medium confidence: a populated street or postal-delivery structure plus mailing and Australian
  geographic context is substantially more reliable than a mailing-address label. The high tier
  additionally proves recipient attribution and complete state/postcode geography.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - contact-information
  - location
corroborative_evidence:
  keywords:
    - mailing address
    - postal address
    - correspondence address
    - delivery address
    - PO Box
    - GPO Box
    - locked bag
    - private bag
    - recipient
    - postcode
  proximity: 300
  keyword_lists:
    - au-road-classification-extended
    - au-major-cities
    - au-states-full
    - au-states-abbreviations
    - au-unit-types
test_cases:
  should_match:
    - value: PO Box 77
      description: Exact 65 probe - populated postal-delivery structure without geographic context
    - value: 'Mailing address: 18 Church Street, Parramatta NSW 2150'
      description: Exact 75 probe - populated mailing address with geography but no labelled recipient
    - value: 'Recipient: Full Name; mailing address: 18 Church Street, Parramatta NSW 2150'
      description: Exact 75 probe - blank-form recipient placeholder must not elevate the address to 85
    - value: 'Recipient: Priya Shah; correspondence address: GPO Box 144, Brisbane QLD 4001'
      description: Exact 85 probe - populated postal address with recipient, state, and postcode
    - value: 'Deliver to Private Bag 12, Hobart TAS 7001'
      description: Australian private-bag delivery address
    - value: 'Postal address: Locked Bag 5000, Sydney NSW 2001'
      description: Australian locked-bag address
  should_not_match:
    - value: 'Mailing address:'
      description: Blank label must not be treated as a populated address
    - value: Please send the report to the mailing list before Friday.
      description: Mailing prose without an address value
    - value: The conference is at 200 George Street, Sydney NSW 2000.
      description: Physical venue address without mailing or delivery context must not enforce
    - value: 'Documentation example: Recipient: Priya Shah; postal address: PO Box 144, Brisbane QLD 4001'
      description: Complete but explicitly documented example is excluded from enforcing tiers
    - value: The post office box design was approved by the facilities team.
      description: Postal terminology without a numbered delivery structure
false_positives:
  - description: Physical venues and street locations can appear near general mail or delivery prose.
    mitigation: Require explicit mailing, correspondence, postal, or delivery-address context for enforcing tiers.
  - description: Completed sample postal addresses in forms and guidance can look genuine.
    mitigation: Apply the shared template-exclusion NOT-group to the 75 and 85 tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_au_mailing_street_address
          - Pattern_au_mailing_postal_delivery
      matches:
        - ref: Evidence_au_mailing_context
        - ref: Pattern_au_mailing_labelled_recipient
        - ref: Evidence_au_mailing_state_territory
        - ref: Evidence_au_mailing_major_locality
        - ref: Pattern_au_mailing_postcode
        - ref: Pattern_au_mailing_address_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_au_mailing_street_address
          - Pattern_au_mailing_postal_delivery
      matches:
        - ref: Evidence_au_mailing_context
        - type: any
          min_matches: 1
          refs:
            - Evidence_au_mailing_state_territory
            - Evidence_au_mailing_major_locality
            - Pattern_au_mailing_postcode
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_au_mailing_street_address
          - Pattern_au_mailing_postal_delivery
  regexes:
    - id: Pattern_au_mailing_street_address
      pattern: >-
        (?i)\b\d{1,5}[A-Z]?(?:\s*[-/]\s*\d{1,5}[A-Z]?)?\s+[A-Z][A-Z'-]{1,30}(?:\s+[A-Z][A-Z'-]{0,30}){0,5}\s+(?:Street|St|Road|Rd|Avenue|Ave|Drive|Dr|Place|Pl|Court|Ct|Crescent|Cres|Close|Cl|Lane|La|Way|Parade|Pde|Boulevard|Blvd|Terrace|Tce|Circuit|Cct|Highway|Hwy|Grove|Gv|Square|Sq|Esplanade|Esp|Rise|View|Gardens|Loop|Trail|Track|Pass|Heights)\b
    - id: Pattern_au_mailing_postal_delivery
      pattern: (?i)\b(?:(?:GPO|PO)\s+Box|Locked\s+Bag|Private\s+Bag)\s+\d{1,6}\b
    - id: Pattern_au_mailing_postcode
      pattern: \b(?:0[289]\d{2}|[1-9]\d{3})\b
    - id: Pattern_au_mailing_address_label
      pattern: >-
        (?i)\b(?:mailing|postal|correspondence|delivery|forwarding)\s+address\s*[:#-]
    - id: Pattern_au_mailing_labelled_recipient
      pattern: >-
        (?i)\b(?:recipient|addressee|attention|attn|care\s+of|c/o|customer|name)\s*(?:is\s*)?[:#-]\s*(?!(?:full|given|first|last|customer|recipient|addressee)\s+name\b)(?!firstname\s+lastname\b)(?!(?:john|jane)\s+doe\b)[A-Z][A-Za-z'-]{1,30}(?:\s+[A-Z][A-Za-z'-]{1,30}){1,3}\b
  keywords:
    - id: Evidence_au_mailing_context
      groups:
        - match_style: word
          terms:
            - mailing address
            - postal address
            - correspondence address
            - delivery address
            - forwarding address
            - send to
            - deliver to
            - dispatch to
            - PO Box
            - GPO Box
            - locked bag
            - private bag
            - care of
      strength: specific
    - id: Evidence_au_mailing_state_territory
      groups:
        - match_style: word
          terms:
            - text: NSW
              case_sensitive: true
            - text: VIC
              case_sensitive: true
            - text: QLD
              case_sensitive: true
            - text: SA
              case_sensitive: true
            - text: WA
              case_sensitive: true
            - text: TAS
              case_sensitive: true
            - text: NT
              case_sensitive: true
            - text: ACT
              case_sensitive: true
            - New South Wales
            - Victoria
            - Queensland
            - South Australia
            - Western Australia
            - Tasmania
            - Northern Territory
            - Australian Capital Territory
      strength: domain
    - id: Evidence_au_mailing_major_locality
      groups:
        - match_style: word
          terms:
            - Sydney
            - Melbourne
            - Brisbane
            - Perth
            - Adelaide
            - Hobart
            - Darwin
            - Canberra
            - Gold Coast
            - Newcastle
            - Wollongong
            - Geelong
            - Townsville
            - Cairns
            - Toowoomba
            - Ballarat
            - Bendigo
            - Albury
            - Wodonga
            - Launceston
            - Mackay
            - Rockhampton
            - Redcliffe
            - Parramatta
      strength: domain
risk_rating: 3
risk_description: >-
  This detector now requires a populated street, post-office-box, or bag address for every match.
  Enforcing tiers add mailing and geographic evidence, and the high tier links the destination to a
  labelled recipient. A single correspondence location can aid unwanted contact or correlation but
  does not by itself expose communications, account access, or a protected residence. Risk 3 and
  OFFICIAL remain appropriate.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 2.0.1
    date: '2026-07-19'
    description: 'Make the 85 tier demonstrably cumulative by requiring an explicit mailing-address field label and major-locality evidence in addition to recipient, state, and postcode corroboration.'
  - version: 2.0.0
    date: '2026-07-19'
    description: >-
      Replace label-only concept matching with populated Australian street, PO/GPO-box, locked-bag,
      and private-bag detection. Add exact 65/75/85 probes, recipient/state/postcode high-confidence
      logic, template exclusions, and adversarial blank-label, venue, and documented-example cases.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 645 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
