schema: testpattern/v1
name: Spain Passport Number
slug: es-passport-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Spain passport number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT
  directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-spain-passport-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[A-Z]{3}\d{6}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - es
  - eu
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - travel document
    - passport number
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: PAB123456
      description: Three-letter prefix with 6 digits
    - value: XYZ987654
      description: Three-letter prefix with 6 digits
    - value: ABC234567
      description: Three-letter prefix with 6 digits
  should_not_match:
    - value: AB123456
      description: Only two-letter prefix is too short
    - value: '123456789'
      description: All digits with no letter prefix
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic alphanumeric sequences matching passport format in unrelated contexts.
    mitigation: Require corroborative evidence keywords within the proximity window.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_es_passport_number
      matches:
        - ref: Pattern_es_passport_number_label_context
        - ref: Keyword_es_passport_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_es_passport_number
      matches:
        - ref: Keyword_es_passport_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_es_passport_number
      matches:
        - ref: Keyword_es_passport_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_es_passport_number
      pattern: \b[A-Z]{3}\d{6}\b
    - id: Pattern_es_passport_number_label_context
      pattern: (?i)\b(?:spain\s+passport\s+number|spain|passport)\b
  keywords:
    - id: Keyword_es_passport_specific
      groups:
        - match_style: word
          terms:
            - número de pasaporte
            - pasaporte
            - passport number
            - Spanish passport
            - pasaporte español
            - passport no
            - passport no.
            - documento de viaje
            - travel document number
      strength: specific
    - id: Keyword_es_passport_general
      groups:
        - match_style: word
          terms:
            - passport
            - travel document
            - documento de viaje
            - identificación
            - immigration
            - border control
            - policía nacional
            - extranjería
            - consulate
      strength: specific
    - id: Keyword_es_passport_number_domain_context
      groups:
        - match_style: word
          terms:
            - spain passport number
            - spain
            - passport
      strength: domain
risk_rating: 5
risk_description: >-
  The Spanish passport rule finds three uppercase letters followed by six digits when passport and travel-credential terms are nearby. A genuine value can support passenger-record linkage, fabricated identity checks, or targeted fraud concerning Spanish consular services and renewal. It does not reveal the traveller's name, nationality evidence, date of birth, expiry, image, signature, or machine-readable zone, and similarly shaped references may occur elsewhere. Risk 5 and OFFICIAL reflect the bounded code-level exposure; a passport copy, immigration case, or linked itinerary would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-spain-passport-number
    title: Spain passport number entity definition - Microsoft Learn
