schema: testpattern/v1
name: Coronial Inquest Draft Submission
slug: coronial-inquest-draft-submission
version: 1.4.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects draft government submissions to coronial inquests before filing. These submissions address deaths in government settings (custody, hospitals, child safety) and reveal the State's candid position on systemic failures before formal filing.
operation: 'Primary detection: keyword proximity matching coronial terms (''coronial inquest'', ''Coroner'', ''coronial inquiry'') within 200 characters of draft/submission terms (''draft submission'', ''proposed submission'', ''draft response'', ''submission for approval'', ''privilege''). Document marker detection: ''Coroner'' with ''DRAFT'', ''PROTECTED'', or ''NOT FOR PUBLICATION'' in header/footer. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:coronial\s+inquest|coronial\s+inquiry|Coroner(?:'s)?\s+(?:Court|inquest))\b
confidence: medium
confidence_justification: 'Medium confidence: Coronial inquest + draft submission + PROTECTED/privilege markers is a narrow combination. The requirement for draft status and government context eliminates published coronial findings.'
jurisdictions:
  - au
regulations:
- "Coroners Act 2003 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - draft submission
    - proposed submission
    - draft response
    - submission for approval
    - privilege
    - DRAFT
    - PROTECTED
    - NOT FOR PUBLICATION
    - death in custody
    - systemic failure
    - recommendations
    - State Coroner
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        DRAFT — NOT FOR PUBLICATION
        PROTECTED

        Draft Submission to the Coroner
        Inquest into the death of [name redacted]
        Death in custody — Brisbane Correctional Centre

        The State of Queensland proposes the following submission regarding systemic failures in prisoner health monitoring.
      description: Draft coronial submission regarding death in custody
    - value: This privileged draft response to the coronial inquest has been prepared for the Director-General's approval. The proposed submission addresses the State's position on causation and recommends acceptance of certain systemic failings.
      description: Privileged draft response to coronial inquest for DG approval
    - value: |-
        CONFIDENTIAL — LEGAL PROFESSIONAL PRIVILEGE
        Coronial Inquiry — Draft State Submission
        Inquest: Death of patient at Townsville University Hospital
        Status: Draft for approval by Chief Health Officer
        Version: 2.1 — Internal review only
      description: Draft coronial inquiry submission for internal review
  should_not_match:
    - value: The Coroner delivered findings on 12 September 2024. The published findings and recommendations are available on the Coroners Court of Queensland website.
      description: Published coronial findings
    - value: The Coroners Act 2003 (Qld) establishes the jurisdiction and procedures for coronial inquests in Queensland. This overview is intended as a guide for legal practitioners.
      description: Legal guide about coronial procedures
    - value: A media report about the coronial inquest revealed that evidence was given about the circumstances of the death. The hearing was open to the public.
      description: News article about public coronial hearing
false_positives:
  - description: Published coronial findings and recommendations
    mitigation: Negative match on 'findings delivered', 'published findings', 'available on website'
  - description: Legal guides and educational materials on coronial processes
    mitigation: Require co-occurrence with draft/submission terms and government entity context
  - description: News articles about open coronial hearings
    mitigation: Negative match on 'media report', 'open to the public', 'hearing'. Require DRAFT or PROTECTED markers
  - description: Filed/served coronial submissions that are no longer draft
    mitigation: Require DRAFT or 'for approval' status indicators
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_coronial_inquest_draft_submission_coronial_proceeding_terminology
      matches:
        - ref: Evidence_coronial_inquest_draft_submission_primary
        - ref: Evidence_coronial_inquest_draft_submission_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_coronial_inquest_draft_submission_exclusion
        - ref: Pattern_coronial_inquest_draft_submission_government_setting_death_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_coronial_inquest_draft_submission_exclusion
    - confidence_level: 75
      id_match: Pattern_coronial_inquest_draft_submission_coronial_proceeding_terminology
      matches:
        - ref: Evidence_coronial_inquest_draft_submission_primary
        - ref: Evidence_coronial_inquest_draft_submission_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_coronial_inquest_draft_submission_exclusion
            - Evidence_coronial_inquest_draft_submission_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_coronial_inquest_draft_submission_coronial_proceeding_terminology
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_coronial_inquest_draft_submission_exclusion
  regexes:
    - id: Pattern_coronial_inquest_draft_submission_coronial_proceeding_terminology
      pattern: (?i)\b(?:coronial\s+inquest|coronial\s+inquiry)\b
    - id: Pattern_coronial_inquest_draft_submission_government_setting_death_context
      pattern: (?i)\b(?:death\s+in\s+custody|death\s+in\s+care)\b
  keywords:
    - id: Evidence_coronial_inquest_draft_submission_primary
      groups:
        - match_style: word
          terms:
            - coronial inquest
            - Coroner
            - coronial inquiry
            - Coroner's Court
      strength: specific
    - id: Evidence_coronial_inquest_draft_submission_corroborative
      groups:
        - match_style: word
          terms:
            - draft submission
            - proposed submission
            - draft response
            - submission for approval
            - privilege
            - DRAFT
            - PROTECTED
            - NOT FOR PUBLICATION
            - death in custody
            - systemic failure
      strength: specific
    - id: Evidence_coronial_inquest_draft_submission_exclusion
      groups:
        - match_style: word
          terms:
            - findings delivered
            - published findings
            - available on website
            - media report
            - open to the public
            - tabled
      strength: noise
    - id: Filter_coronial_inquest_draft_submission_exclusion
      groups:
        - match_style: word
          terms:
            - published findings
            - Coroners Court website
            - public hearing transcript

      strength: noise
risk_rating: 8
risk_description: >-
  This pattern finds draft government submissions to coronial inquests when coronial terms occur near draft, approval, privilege, confidentiality, or not-for-publication indicators. A real draft can disclose sensitive death circumstances, unresolved causation positions, proposed admissions, systemic-failure analysis, and agency responses before filing, distressing families and prejudicing the inquest. The affected unit is one pre-filing submission, not published findings or general guidance about coronial procedure. Risk 8 supports SENSITIVE Legal; PROTECTED would require protected witnesses, credible life-safety risk, Cabinet involvement, or severe system-wide consequences beyond the inquest.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
