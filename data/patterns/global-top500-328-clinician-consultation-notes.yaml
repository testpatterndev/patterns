schema: testpattern/v1
name: Clinician consultation notes
slug: global-top500-328-clinician-consultation-notes
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies clinician consultation notes references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:consultation\s+notes|clinician\s+notes|clinical\s+notes|progress\s+notes|SOAP\s+notes|attending\s+physician|chief\s+complaint|assessment\s+and\s+plan|patient\s+encounter)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - clinician consultation notes
    - clinician
    - consultation
    - notes
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
test_cases:
  should_match:
    - value: consultation notes
      description: Primary topic phrase match
    - value: clinician notes
      description: Case-insensitive topic phrase match
    - value: clinical notes
      description: Alternative topic phrase match
    - value: progress notes
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_clinician_consultation_notes
      matches:
        - ref: Pattern_global_top500_328_clinician_consultation_notes_label_context
        - ref: Keyword_global_top500_328_clinician_consultation_notes_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_328_clinician_consultation_notes_noise_exclusion
    - confidence_level: 75
      id_match: Regex_clinician_consultation_notes
      matches:
        - ref: Keyword_clinician_consultation_notes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_328_clinician_consultation_notes_noise_exclusion
    - confidence_level: 65
      id_match: Regex_clinician_consultation_notes
      matches:
        - ref: Keyword_clinician_consultation_notes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_328_clinician_consultation_notes_noise_exclusion
  regexes:
    - id: Regex_clinician_consultation_notes
      pattern: (?is)\b(?:consultation\s+notes|clinician\s+notes|clinical\s+notes|progress\s+notes|SOAP\s+notes|attending\s+physician|chief\s+complaint|assessment\s+and\s+plan|patient\s+encounter)\b
    - id: Pattern_global_top500_328_clinician_consultation_notes_label_context
      pattern: (?i)\\b(?:clinician\\s+consultation\\s+notes|clinician|consultation|notes|top500)\\b
  keywords:
    - id: Keyword_clinician_consultation_notes
      groups:
        - match_style: word
          terms:
            - consultation notes
            - clinician notes
            - clinical notes
            - progress notes
            - SOAP notes
            - health
            - biomedical
            - attending physician
            - chief complaint
            - assessment and plan
            - patient encounter
            - referral
    - id: Keyword_global_top500_328_clinician_consultation_notes_domain_context
      groups:
        - match_style: word
          terms:
            - clinician consultation notes
            - clinician
            - consultation
            - notes
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_328_clinician_consultation_notes_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.legislation.gov.au/C2012A00063/latest/text
  - https://www.legislation.gov.au/C2004A03712/latest/text
