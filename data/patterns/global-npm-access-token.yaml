schema: testpattern/v1
name: npm Access Token
slug: global-npm-access-token
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects npm access tokens (npm_ prefix). These tokens authenticate to the npm registry and can
  publish, unpublish or grant access to packages; a leak enables supply-chain attacks via malicious publishes.
operation: 'Prefixed token format npm_ followed by 36 base62 characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_])npm_[A-Za-z0-9]{36}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the distinctive npm_ prefix with a fixed 36-character body makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - npm
    - npm token
    - registry
    - .npmrc
    - authToken
    - package
  proximity: 300
test_cases:
  should_match:
    - value: npm_ABCDEFGHIJ1234567890abcdefghij123456
      description: npm access token, npm_ prefix + 36 chars
    - value: '//registry.npmjs.org/:_authToken=npm_zZyYxXwWvVuU0123456789abcdefghij0123'
      description: npm token in .npmrc authToken form
    - value: npm_aB3dE6gH9jK2mN5pQ8sTuVwXyZ0123456789
      description: Mixed-case npm access token
  should_not_match:
    - value: npm_tooShort1234
      description: Too short to be an npm access token
    - value: ghp_ABCDEFGHIJ1234567890abcdefghij12345678
      description: GitHub token prefix, not npm
    - value: install the package and set your npm token in CI
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder npm_ strings.
    mitigation: Require corroborative npm/registry keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  A leaked npm access token enables publishing malicious package versions, poisoning the software supply chain for every downstream consumer.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-06-13'
author: testpattern-community
license: MIT
references:
  - url: https://docs.npmjs.com/about-access-tokens
    title: About npm access tokens
