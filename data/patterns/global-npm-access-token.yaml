schema: testpattern/v1
name: npm Access Token
slug: global-npm-access-token
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects bounded npm access-token values (npm_ prefix, fixed 36-character body) and credential-bearing
  .npmrc authToken assignments; documentation and placeholder examples remain excluded. These tokens
  authenticate to the npm registry and can publish, unpublish or grant access to packages; a leak
  enables supply-chain attacks via malicious publishes.
operation: 'Prefixed token format npm_ followed by 36 base62 characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_])npm_[A-Za-z0-9]{36}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the distinctive npm_ prefix with a fixed 36-character body makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - npm
    - npm token
    - registry
    - .npmrc
    - authToken
    - package
  proximity: 300
test_cases:
  should_match:
    - value: npm_ABCDEFGHIJ1234567890abcdefghij123456
      description: Exact 65 probe - fixed npm token structure without independent registry context
    - value: 'npm package publish credential npm_aB3dE6gH9jK2mN5pQ8sTuVwXyZ0123456789'
      description: Exact 75 probe - token with npm package-publish context
    - value: 'npm registry publish //registry.npmjs.org/:_authToken=npm_Qw3rTy9zXcV8bNm2LkJ4hGf6DsA1pOiU7yTr'
      description: Exact 85 probe - npm registry context plus canonical npmrc assignment
    - value: '.npmrc credential //registry.npmjs.org/:_authToken=legacyRegistryTokenValue123456'
      description: Legacy npmrc authToken structure remains context-gated
  should_not_match:
    - value: npm_tooShort1234
      description: Too short to be an npm access token
    - value: ghp_ABCDEFGHIJ1234567890abcdefghij12345678
      description: GitHub token prefix, not npm
    - value: 'PYPI_TOKEN=npm_ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
      description: Sibling package-registry label does not corroborate an npm token
    - value: install the package and set your npm token in CI
      description: Prose mention without a token value
    - value: 'NPM_TOKEN=npm_aB3dE6gH9jK2mN5pQ8sTuVwXyZ012345678'
      description: 35-character body is one short of the fixed token length
    - value: xnpm_ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789z
      description: Alphanumeric characters touch both boundaries, so the lookarounds reject the embedded substring
    - value: 'Documentation example: npm registry NPM_TOKEN=npm_ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
      description: Shared template-exclusion terms veto quoted instructional token material at the tier level
false_positives:
  - description: Documentation or examples showing placeholder npm_ strings.
    mitigation: Require corroborative npm/registry keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This detector recognises an npm registry access token with the npm prefix and fixed 36-character body. A live token can publish, unpublish, or change package access according to its scopes, allowing malicious releases or private-package theft. The normal credential creates serious harm for the packages it controls but does not prove ownership of widely consumed packages or compromise of every downstream user. Risk 8 and SENSITIVE InfoTech reflect direct package authority within token scopes; PROTECTED requires control of critical broadly consumed packages or significant downstream compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_npm_access_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_npmrc_authtoken
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_npm_access_token
      matches:
        - ref: Keyword_npm_registry_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_npmrc_authtoken
      matches:
        - ref: Keyword_npm_registry_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_npm_access_token
      matches:
        - ref: Keyword_npm_registry_context
        - ref: Pattern_npm_token_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_npmrc_authtoken
      matches:
        - ref: Keyword_npm_registry_context
        - ref: Pattern_npm_token_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_npm_access_token
      pattern: (?<![A-Za-z0-9_])npm_[A-Za-z0-9]{36}(?![A-Za-z0-9])
    - id: Regex_snaffler_npmrc_authtoken
      pattern: //[^\s]{1,255}/:_authToken=[A-Za-z0-9+/=_.-]{16,}
    - id: Pattern_npm_token_assignment
      pattern: (?i)(?:\bNPM_TOKEN\s*=|registry\.npmjs\.org/:_authToken=)
  keywords:
    - id: Keyword_npm_registry_context
      groups:
        - match_style: string
          terms:
            - registry.npmjs.org
            - .npmrc
            - npm package publish
            - npm registry publish
            - npm access credential
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
changelog:
  - version: 1.3.1
    date: '2026-07-19'
    description: 'Replace enforcing bare-token tiers with an individual 65 discovery / 75 npm-publish / 85 npmrc-or-env-assignment contract and exact-tier, sibling-registry, malformed, and documentation probes.'
  - version: 1.3.0
    date: '2026-07-16'
    description: >-
      Wiring fix (TP-00885): add Regex_npm_access_token (identical to the authored top-level bounded
      pattern, fixed-width lookarounds only) as a 75 enforcement primary with the shared
      template-exclusion NOT-group, so bare npm_ token values are detected by the structured Purview
      tiers and not only by the .npmrc authToken assignment branch (retained unchanged). No positive
      keyword gate on the value branch — the bounded token is self-sufficient and the npm prefix must
      not self-corroborate. Added CI/bare-token positives and 35-char, embedded-boundary, and
      quoted-training negatives.
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1551 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: Replace the .npmrc should_match token body (example-npm-token-placeholder-xyz0) with a realistic npm_ token — the shared template-exclusion NOT-group ("example"/"placeholder") on the tier vetoed this positive so it could never fire (tier-harness triage class T4)
  - version: 1.1.0
    date: '2026-06-26'
    note: added .npmrc _authToken= line form (Snaffler KeepShellRcFilesByName)
author: testpattern-community
license: MIT
references:
  - url: https://docs.npmjs.com/about-access-tokens
    title: About npm access tokens
