schema: testpattern/v1
name: Sensitive network topology diagrams
slug: au-top500-285-sensitive-network-topology-diagrams
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies sensitive network topology diagrams patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword
  lists: pii-personal.
pattern: (?is)\b(?:sensitive\s+network\s+topology|network\s+diagram|network\s+architecture|ip\s+addressing|network\s+segmentation|infrastructure\s+diagram|data\s+center\s+layout)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - sensitive network topology diagrams
    - sensitive
    - network
    - topology
    - diagrams
    - security
    - operations
    - threat
    - data
  proximity: 300
  keyword_lists:
    - pii-personal
test_cases:
  should_match:
    - value: sensitive network topology
      description: Primary topic phrase match
    - value: network diagram
      description: Case-insensitive topic phrase match
    - value: network architecture
      description: Alternative topic phrase match
    - value: ip addressing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: network diagram dmz
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  This classifier targets a composite network diagram through phrases such as network architecture, IP addressing, segmentation, infrastructure diagram, and data-center layout. Disclosure can map trust zones, gateways, addressing schemes, and concentration points that an adversary could use to plan lateral movement or disrupt resilient paths. The affected party is the organization whose service estate is depicted, although credentials, access, and an exploitable weakness are still required. Risk 8 and SENSITIVE capture serious contained reconnaissance value; a diagram of a protected operation or critical service with exploitable control detail would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_network_topology
      matches:
        - ref: Evidence_network_topology
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_network_topology
      matches:
        - ref: Evidence_network_topology
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_network_topology
      matches:
        - ref: Evidence_network_topology
  regexes:
    - id: Pattern_network_topology
      pattern: (?is)\b(?:sensitive\s+network\s+topology|network\s+diagram|network\s+architecture|ip\s+addressing|network\s+segmentation|infrastructure\s+diagram|data\s+center\s+layout)\b
  keywords:
    - id: Evidence_network_topology
      groups:
        - match_style: word
          terms:
            - sensitive network topology
            - network diagram
            - topology
            - subnet
            - vlan
            - dmz
            - network architecture
            - ip addressing
            - network segmentation
            - infrastructure diagram
            - data center layout
created: '2026-02-08'
updated: '2026-07-14'
changelog:
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 877 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-12'
    description: 'Baseline burn-down A2: tier@85''s Evidence_network_topology group is drawn from the pattern''s own topic vocabulary (network jargon like "dmz"/"subnet"/"vlan" alongside the id_match phrases themselves, not independent sensitivity evidence), so should_not_match: "network diagram dmz" satisfied the existing min_count: 2 / unique_results gate by stuffing two on-topic synonyms ("network diagram" + "dmz"). Added a genuinely independent AND-evidence requirement (Evidence_data_record_context, imported via shared_keywords) to tier@85 and tier@75 so a bare topic-synonym fragment can no longer satisfy either tier alone. Also marked the bare tier@65 discovery_only (no-evidence shape) so it surfaces in discovery inventory rather than gating should_not_match.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
