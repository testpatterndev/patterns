schema: testpattern/v1
name: Sensitive network topology diagrams
slug: au-top500-285-sensitive-network-topology-diagrams
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies sensitive network topology diagrams patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword lists: pii-contact.'
pattern: (?is)\b(?:sensitive\s+network\s+topology|network\s+diagram|network\s+architecture|ip\s+addressing|network\s+segmentation|infrastructure\s+diagram|data\s+center\s+layout)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - sensitive network topology diagrams
    - sensitive
    - network
    - topology
    - diagrams
    - security
    - operations
    - threat
    - data
  proximity: 300
  keyword_lists:
    - pii-contact
test_cases:
  should_match:
    - value: sensitive network topology
      description: Primary topic phrase match
    - value: network diagram
      description: Case-insensitive topic phrase match
    - value: network architecture
      description: Alternative topic phrase match
    - value: ip addressing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: network diagram dmz
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_network_topology
      matches:
        - ref: Evidence_network_topology
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_network_topology
      matches:
        - ref: Evidence_network_topology
    - confidence_level: 65
      id_match: Pattern_network_topology
      matches:
        - ref: Evidence_network_topology
  regexes:
    - id: Pattern_network_topology
      pattern: (?is)\b(?:sensitive\s+network\s+topology|network\s+diagram|network\s+architecture|ip\s+addressing|network\s+segmentation|infrastructure\s+diagram|data\s+center\s+layout)\b
  keywords:
    - id: Evidence_network_topology
      groups:
        - match_style: word
          terms:
            - sensitive network topology
            - network diagram
            - topology
            - subnet
            - vlan
            - dmz
            - network architecture
            - ip addressing
            - network segmentation
            - infrastructure diagram
            - data center layout
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
