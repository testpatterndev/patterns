schema: testpattern/v1
name: Fingerprints
slug: au-top500-009-fingerprints
version: 1.4.1
type: regex
pattern_class: concept
status: deprecated
deprecation_reason: 'needs-EDM/ML — biometric content (images, scans, audio) is not detectable by text regex; the phrase list only detected discussion of biometrics, a role covered by au-biometric-data-reference'
engine: boost_regex
description: >-
  Identifies documents containing references to fingerprints in Australian contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 4 keywords within 300 characters. Keyword
  lists: biometric-fingerprint. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:fingerprint\s+scan|fingerprint\s+template|fingerprint\s+record|latent\s+print|palm\s+print|biometric\s+scan)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - fingerprints
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - biometric-fingerprint
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: fingerprint scan
      description: Primary topic phrase match
    - value: fingerprint template
      description: Case-insensitive topic phrase match
    - value: fingerprint record
      description: Alternative topic phrase match
    - value: latent print
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to fingerprints appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_fingerprints
      matches:
        - ref: Evidence_fingerprints
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_fingerprints
      matches:
        - ref: Evidence_fingerprints
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_fingerprints
      matches:
        - ref: Evidence_fingerprints
  regexes:
    - id: Pattern_fingerprints
      pattern: (?is)\b(?:fingerprint\s+scan|fingerprint\s+template|fingerprint\s+record|latent\s+print|palm\s+print|biometric\s+scan)\b
    - id: Pattern_au_top500_009_fingerprints_label_context
      pattern: (?i)\b(?:fingerprints)\b
  keywords:
    - id: Evidence_fingerprints
      groups:
        - match_style: word
          terms:
            - fingerprint
            - fingerprints
            - fingerprint scan
            - fingerprint template
            - fingerprint record
            - thumbprint
            - latent print
            - palm print
            - biometric scan
            - livescan
    - id: Keyword_au_top500_009_fingerprints_domain_context
      groups:
        - match_style: word
          terms:
            - fingerprints
risk_description: >-
  The Fingerprints pattern is a deprecated, low-confidence text detector for expressions such as fingerprint scan, fingerprint template, or fingerprint record. These phrases can flag documents that discuss biometric operations, but they do not contain ridge detail, an image, a template, or a confirmed comparison for any person. Policy, forensic procedure, and product material can use the same language without exposing biometric data. Risk 4 and OFFICIAL retain modest concern for the operational reference while placing an actual immutable fingerprint artefact at a higher contextual level.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
