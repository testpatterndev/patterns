schema: testpattern/v1
name: Interview evaluation notes
slug: global-top500-074-interview-evaluation-notes
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to interview evaluation notes in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:interview\s+evaluation|candidate\s+assessment|interview\s+notes|interview\s+score|hiring\s+recommendation|panel\s+feedback|interview\s+feedback|candidate\s+rating|selection\s+criteria|interview\s+outcome|hiring\s+decision)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - interview evaluation notes
    - interview
    - evaluation
    - notes
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: interview evaluation
      description: Primary topic phrase match
    - value: candidate assessment
      description: Case-insensitive topic phrase match
    - value: interview notes
      description: Alternative topic phrase match
    - value: interview score
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to interview evaluation notes appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_interview_evaluation
      matches:
        - ref: Pattern_global_top500_074_interview_evaluation_notes_label_context
        - ref: Keyword_global_top500_074_interview_evaluation_notes_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_interview_evaluation
      matches:
        - ref: Keyword_interview_evaluation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_interview_evaluation
      pattern: >-
        (?is)\b(?:interview\s+evaluation|candidate\s+assessment|interview\s+notes|interview\s+score|hiring\s+recommendation|panel\s+feedback|interview\s+feedback|candidate\s+rating|selection\s+criteria|interview\s+outcome|hiring\s+decision)\b
    - id: Pattern_global_top500_074_interview_evaluation_notes_label_context
      pattern: (?i)\b(?:interview\s+evaluation\s+notes)\b
  keywords:
    - id: Keyword_interview_evaluation
      groups:
        - match_style: word
          terms:
            - interview evaluation
            - candidate assessment
            - interview notes
            - interview score
            - hiring recommendation
            - panel feedback
            - interview feedback
            - candidate rating
            - selection criteria
            - interview outcome
            - hiring decision
      strength: specific
    - id: Keyword_global_top500_074_interview_evaluation_notes_domain_context
      groups:
        - match_style: word
          terms:
            - interview evaluation notes
            - interview
            - evaluation
            - notes
      strength: domain
risk_description: >-
  This concept detector looks for interview-evaluation, candidate-assessment, interview-notes, and interview-score language indicative of a hiring decision record. A genuine evaluation can expose scores, perceived shortcomings, protected-attribute inferences, and selection reasoning, harming the candidate's reputation, employment prospects, or discrimination claim. Interview guidance and blank scoring sheets can match, but the normal substantive unit is confidential commentary about an identifiable applicant. Risk 8 SENSITIVE reflects serious contained personal and employment harm; PROTECTED would require protected-source material, a security-vetting investigation, a nationally sensitive appointment, bulk applicant dossiers, or comparable significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
