schema: testpattern/v1
name: Pathology reports
slug: au-top500-327-pathology-reports
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies pathology reports references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: au-healthcare-records.
pattern: (?is)\b(?:pathology\s+report|tissue\s+sample|laboratory\s+report)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - pathology reports
    - pathology
    - reports
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - au-healthcare-records
test_cases:
  should_match:
    - value: pathology report
      description: Primary topic phrase match
    - value: tissue sample
      description: Case-insensitive topic phrase match
    - value: laboratory report
      description: Alternative topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pathology_reports
      matches:
        - ref: Evidence_pathology_reports
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_pathology_reports
      matches:
        - ref: Evidence_pathology_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_pathology_reports
      matches:
        - ref: Evidence_pathology_reports
  regexes:
    - id: Pattern_pathology_reports
      pattern: (?is)\b(?:pathology\s+report|tissue\s+sample|laboratory\s+report)\b
  keywords:
    - id: Evidence_pathology_reports
      groups:
        - match_style: word
          terms:
            - pathology report
            - pathology
            - histopathology
            - biopsy
            - cytology
            - specimen
            - tissue sample
            - health
            - biomedical
            - pathologist
            - microscopy
            - laboratory report
risk_description: >-
  This regex detects pathology and laboratory reports, tissue samples, biopsies, and associated healthcare-record context. A genuine report can reveal malignancy, infection, genetic or reproductive findings, specimen provenance, clinician interpretation, and diagnostic uncertainty, enabling stigma, discrimination, coercion, or unsafe alteration of care. The normal unit is one specimen or report rather than a laboratory archive, so harm is serious but contained to the patient and episode. Risk 8 and SENSITIVE are justified; PROTECTED would require bulk pathology holdings, critical diagnostic manipulation, or compromise causing significant patient-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
