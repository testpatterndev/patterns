schema: testpattern/v1
name: Iris or retina scans
slug: global-top500-010-iris-or-retina-scans
version: 1.3.2
type: regex
pattern_class: concept
status: deprecated
deprecation_reason: 'needs-EDM/ML — biometric content (images, scans, audio) is not detectable by text regex; the phrase list only detected discussion of biometrics, a role covered by au-biometric-data-reference'
engine: boost_regex
description: >-
  Identifies documents containing references to iris or retina scans in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: biometric-voice-iris. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:iris\s+scan|retina\s+scan|iris\s+recognition|retinal\s+scan|eye\s+scan|ocular\s+biometric|iris\s+template|iris\s+pattern|retinal\s+pattern|biometric\s+enrollment|iris\s+capture)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - iris or retina scans
    - iris
    - retina
    - scans
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - biometric-voice-iris
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: iris scan
      description: Primary topic phrase match
    - value: retina scan
      description: Case-insensitive topic phrase match
    - value: iris recognition
      description: Alternative topic phrase match
    - value: retinal scan
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to iris or retina scans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_iris_retina_scans
      matches:
        - ref: Pattern_global_top500_010_iris_or_retina_scans_label_context
        - ref: Keyword_global_top500_010_iris_or_retina_scans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_iris_retina_scans
      matches:
        - ref: Keyword_iris_retina_scans
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_iris_retina_scans
      pattern: (?is)\b(?:iris\s+scan|retina\s+scan|iris\s+recognition|retinal\s+scan|eye\s+scan|ocular\s+biometric|iris\s+template|iris\s+pattern|retinal\s+pattern|biometric\s+enrollment|iris\s+capture)\b
    - id: Pattern_global_top500_010_iris_or_retina_scans_label_context
      pattern: (?i)\b(?:iris\s+or\s+retina\s+scans)\b
  keywords:
    - id: Keyword_iris_retina_scans
      groups:
        - match_style: word
          terms:
            - iris scan
            - retina scan
            - iris recognition
            - retinal scan
            - eye scan
            - ocular biometric
            - iris template
            - iris pattern
            - retinal pattern
            - biometric enrollment
            - iris capture
      strength: specific
    - id: Keyword_global_top500_010_iris_or_retina_scans_domain_context
      groups:
        - match_style: word
          terms:
            - iris or retina scans
            - iris
            - retina
            - scans
      strength: domain
risk_description: >-
  The deprecated low-confidence detector finds iris or retinal scan, eye-scan, ocular-biometric, template, pattern, enrolment, or capture terminology with seven biometric context terms. A genuine iris or retina template can support durable identity matching or biometric authentication abuse and cannot be reset like a password. These high-entropy biometric records are durable identity and access artifacts. Compromise can enable long-lived impersonation or tracking with no practical reissue. These consequences place a confirmed Iris or retina scans record at risk 9 and PROTECTED Personal-Privacy without assuming that every low-confidence phrase hit contains the record.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
