schema: testpattern/v1
name: Australia Medicare Card Identifier
slug: au-medicare-card-identifier
version: 2.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Identifies Australian Medicare card numbers (10-11 digits, first digit 2-6). Filters same-digit
  sequences. Requires corroborative health-scheme keywords for reliable detection.
operation: >-
  Structural detection of a 10-11 digit Medicare card number (first digit 2-6) with AllDigitsSameFilter
  and health-scheme corroborative keywords. Note: Func_australian_medical_account_number is a Purview
  detection function, not a usable validator, so the checksum is not enforced in the exported SIT.
  Corroborative evidence: 3 tiers with health-scheme-specific and broad health keywords within 300 characters.
pattern: '\b[2-6]\d{3}[\s-]?\d{5}[\s-]?\d(?:[\s-]?\d)?\b'
confidence: medium
confidence_justification: >-
  Medium confidence: eight-digit numbers are common. Validator function and health-scheme keywords
  significantly improve accuracy. AllDigitsSameFilter removes trivial matches.
jurisdictions:
  - au
regulations:
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - phi
  - health
  - government-id
corroborative_evidence:
  keywords:
    - health scheme
    - health fund
    - provider number
    - patient ID
    - medical account
    - Medibank
    - bulk billing
    - health cover
  proximity: 300
  keyword_lists:

    - au-health-scheme-terms
test_cases:
  should_match:
    - value: '2123456701'
      description: Ten-digit Medicare card number (first digit 2-6)
    - value: '3456 78901 2'
      description: Ten-digit Medicare card with display spacing
    - value: '41234567890'
      description: Eleven-digit Medicare card with IRN
  should_not_match:
    - value: '1234567890'
      description: First digit 1, not a valid Medicare prefix (2-6)
    - value: '234567'
      description: Too short for a Medicare card number
    - value: '234567890123'
      description: Twelve digits, too long
false_positives:
  - description: Generic eight-digit reference numbers in non-health contexts.
    mitigation: Require health-scheme keywords in proximity. AllDigitsSameFilter removes trivial matches.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  Health and medical identifiers are among the most sensitive personal data under privacy law.
  Unauthorized disclosure risks discrimination, personal harm, and regulatory penalties.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_medicare_card
      matches:
        - ref: Evidence_health_scheme_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_medicare_card
      matches:
        - ref: Evidence_health_scheme_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_medicare_card
  regexes:
    - id: Pattern_medicare_card
      pattern: '\b[2-6]\d{3}[\s-]?\d{5}[\s-]?\d(?:[\s-]?\d)?\b'
  keywords:
    - id: Evidence_health_scheme_specific
      groups:
        - match_style: word
          terms:
            - medicare
            - medicare card
            - medicare number
            - medical account
            - medical account number
            - provider number
            - patient ID
            - patient account
            - health fund number
            - health fund account
            - Services Australia
            - text: IRN
              case_sensitive: true
            - Individual Reference Number
      strength: specific
    - id: Evidence_health_scheme_broad
      groups:
        - match_style: word
          terms:
            - health insurance
            - health fund
            - medical insurance
            - hospital fund
            - health care card
            - private health
            - Medibank
            - health cover
            - bulk billing
            - text: PBS
              case_sensitive: true
            - pharmaceutical benefits
      strength: specific
  filters:
    - id: Guard_medicare_same_digits
      type: AllDigitsSameFilter
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-australia-medical-account-number
    title: "Australia Medical Account Number entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 2.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 2.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 2.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
