schema: testpattern/v1
name: Service dependency maps
slug: global-top500-320-service-dependency-maps
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies service dependency maps patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:service\s+dependency|dependency\s+map|dependency\s+mapping|service\s+topology|infrastructure\s+map|service\s+catalog|upstream\s+dependency|downstream\s+dependency|architecture\s+diagram)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - service dependency maps
    - service
    - dependency
    - maps
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: service dependency
      description: Primary topic phrase match
    - value: dependency map
      description: Case-insensitive topic phrase match
    - value: dependency mapping
      description: Alternative topic phrase match
    - value: service topology
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_service_dependency_maps
      matches:
        - ref: Pattern_global_top500_320_service_dependency_maps_label_context
        - ref: Keyword_global_top500_320_service_dependency_maps_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_service_dependency_maps
      matches:
        - ref: Keyword_service_dependency_maps
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_service_dependency_maps
      matches:
        - ref: Keyword_service_dependency_maps
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_service_dependency_maps
      pattern: >-
        (?is)\b(?:service\s+dependency|dependency\s+map|dependency\s+mapping|service\s+topology|infrastructure\s+map|service\s+catalog|upstream\s+dependency|downstream\s+dependency|architecture\s+diagram)\b
    - id: Pattern_global_top500_320_service_dependency_maps_label_context
      pattern: (?i)\\b(?:service\\s+dependency\\s+maps|service|dependency|maps|top500)\\b
  keywords:
    - id: Keyword_service_dependency_maps
      groups:
        - match_style: word
          terms:
            - service dependency
            - dependency map
            - dependency mapping
            - service topology
            - infrastructure map
            - service catalog
            - upstream dependency
            - downstream dependency
            - operations
            - resilience
            - architecture diagram
            - CMDB
    - id: Keyword_global_top500_320_service_dependency_maps_domain_context
      groups:
        - match_style: word
          terms:
            - service dependency maps
            - service
            - dependency
            - maps
            - top500
            - field
            - identifier
            - reference
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
