schema: testpattern/v1
name: ICD-10 Pcs
slug: global-icd-10-pcs
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: Detects ICD-10 Pcs patterns.
operation: 'Corroborative evidence: 19 keywords within 300 characters. Keyword lists: healthcare-codes. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: \b[0-9A-HJ-NP-Z]{7}\b
confidence: low
confidence_justification: >-
  Low confidence: generic pattern format that may match unrelated data. Corroborative evidence keywords are essential for reliable detection. Added context gating and exclusion rules improve precision
  and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - HIPAA
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - healthcare
corroborative_evidence:
  keywords:
    - MRN
    - medical record number
    - patient ID
    - NPI
    - DEA
    - medicare
    - medicaid
    - insurance ID
    - member ID
    - beneficiary
    - ICD-10
    - ICD-9
    - CPT
    - NDC
    - SNOMED
    - HCPCS
    - diagnosis code
    - procedure code
    - drug code
  proximity: 300
  keyword_lists:
    - healthcare-codes
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '0016070'
      description: Bypass coronary artery procedure code
    - value: 5A1D70Z
      description: Mechanical ventilation procedure code
    - value: GZ63ZZZ
      description: Individual psychotherapy procedure code
  should_not_match:
    - value: 903
      description: Only 6 characters instead of 7
    - value: 57792
      description: 8 characters instead of 7
    - value: OO16070
      description: Contains letter O (excluded from valid set)
    - value: do not treat this as a real code value
      description: Plain prose with no 7-character ICD-10-PCS code token present
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_description: >-
  This low-confidence regex recognizes seven-character ICD-10-PCS procedure codes with nearby healthcare-code evidence and excludes malformed or placeholder-like values. A valid code denotes a standardized procedure concept, but it may appear in coding references, training, software rules, reimbursement material, research, or templates without describing a real patient. By itself the code identifies neither the recipient nor the date, outcome, or clinical circumstances of a procedure. Risk 5 and OFFICIAL apply; SENSITIVE would require a patient-linked encounter, procedure history, claim, or treatment record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_icd_10_pcs
      matches:
        - ref: Pattern_global_icd_10_pcs_label_context
        - ref: Keyword_global_icd_10_pcs_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_icd_10_pcs
      matches:
        - ref: Keyword_icd_10_pcs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_icd_10_pcs
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_icd_10_pcs
      pattern: \b[0-9A-HJ-NP-Z]{7}\b
    - id: Pattern_global_icd_10_pcs_label_context
      pattern: (?i)\b(?:icd\-10\s+pcs|icd|pcs)\b
  keywords:
    - id: Keyword_icd_10_pcs
      groups:
        - match_style: word
          terms:
            - ICD-10
            - ICD-10-PCS
            - procedure code
            - procedure classification
            - medical procedure
            - surgical code
            - text: MRN
              case_sensitive: true
            - medical record number
            - patient ID
            - text: CPT
              case_sensitive: true
            - SNOMED
            - HCPCS
            - operative report
      strength: specific
    - id: Keyword_global_icd_10_pcs_domain_context
      groups:
        - match_style: word
          terms:
            - icd-10 pcs
            - icd
            - pcs
      strength: domain
  filters:
    - id: Guard_icd_10_pcs_same_digits
      type: AllDigitsSameFilter
created: '2026-02-08'
updated: '2026-07-14'
changelog:
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1242 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.2
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — primary regex accepted all-zeros/same-digit procedure code values (e.g. 0000000); reviewed against ICD-10-PCS Section 0 axis tables (approach axis excludes digits 1/2/5/6/9, ruling out most uniform-digit combinations) before guarding since this is a code pattern, not a pure identifier; mirrors au-medicare-card-identifier protection.
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
