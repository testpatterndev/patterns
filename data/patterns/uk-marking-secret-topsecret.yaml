schema: testpattern/v1
name: UK Marking - SECRET / TOP SECRET
slug: uk-marking-secret-topsecret
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Detects the UK Government Security Classifications Policy (GSCP) SECRET and TOP SECRET
  national-security classifications: the verified UK Prefix form (UK SECRET / UK TOP SECRET, applied
  to assets shared with foreign governments or international organisations), the classification
  followed by a verified National Caveat handling instruction (SECRET/TOP SECRET - UK EYES ONLY, -
  UK/US EYES ONLY, - FIVE EYES ONLY, per the GSCP's "CLASSIFICATION - HANDLING INSTRUCTION"
  additional-marking format — National Caveats apply only to SECRET and TOP SECRET, never OFFICIAL),
  the distinctive TOP SECRET banner-words phrase, and a UK-government-context-gated bare SECRET
  banner. Intended to surface content that should not reside on this platform. Regex logic verified
  directly against the current Government Security Classifications Policy (gov.uk, version 2.0,
  August 2024); matched case-sensitively.
operation: >-
  Tier 85 matches the UK Prefix form (UK SECRET / UK TOP SECRET). A second tier 85 matches the
  classification followed directly by a National Caveat handling instruction (UK EYES ONLY, UK/US
  EYES ONLY, FIVE EYES ONLY). A third tier 85 matches the TOP SECRET banner-words phrase, tolerant of
  a hyphen or PDF-line-wrap-inserted whitespace between TOP and SECRET. Tier 75 matches the bare
  SECRET banner, gated by UK central-government/GSCP corroborative context and a NOT-exclusion for
  common non-government SECRET collocations (TRADE SECRET(S), CLIENT SECRET, API SECRET, SECRET
  MANAGER, SECRET SANTA).
pattern: '\bUK[\s-]+(?:TOP[\s-]+)?SECRET\b|\b(?:TOP[\s-]+)?SECRET\b[\s-]+-[\s-]+(?:UK(?:/US)?|FIVE)[\s-]+EYES[\s-]+ONLY\b|\bTOP[\s-]+SECRET\b'
confidence: high
confidence_justification: >-
  High confidence on the UK Prefix form and the National Caveat form: both are verified directly
  against the current GSCP primary source, structurally distinctive, case-sensitive tokens with low
  natural-English collision risk. The TOP SECRET banner-words phrase is likewise high confidence
  (case-sensitive two-word phrase). Bare SECRET alone (75) is a common English word used constantly
  outside government context (TRADE SECRET, CLIENT SECRET, API SECRET, SECRET MANAGER, SECRET SANTA,
  etc), so it is the widest tier and is gated by UK central-government/GSCP corroborative evidence
  plus a dedicated NOT-exclusion for the most common non-government collocations.
jurisdictions:
  - uk
regulations:
  - "Official Secrets Act 1989"
frameworks:
  - GSCP
data_categories:
  - government
  - security-classification
case_sensitive: true
corroborative_evidence:
  keywords:
    - HM Government
    - Cabinet Office
    - GSCP
    - national security
  proximity: 300
test_cases:
  should_match:
    - value: "This cable is marked UK SECRET and should not be released without prior agreement from the UK Government."
      description: Verified UK Prefix form — applied to assets shared with foreign governments/international organisations per the GSCP
    - value: "Document classified SECRET - UK EYES ONLY, distribution restricted to accredited UK nationals."
      description: Verified National Caveat form — classification followed by the UK EYES ONLY handling instruction, hyphen-separated per GSCP additional-marking format
    - value: "The dossier is marked TOP SECRET and held in the secure registry."
      description: TOP SECRET banner-words phrase
    - value: "Cover sheet reads TOP\nSECRET for distribution to cleared staff only."
      description: PDF line-wrap between TOP and SECRET (the banner-words tier tolerates a wrap-inserted newline)
    - value: "This SECRET briefing must be handled under Cabinet Office and HMG security requirements."
      description: Gated bare-SECRET form — UK central-government/GSCP corroborative evidence (Cabinet Office, HMG) present within 300 characters
  should_not_match:
    - value: "the secret ingredient is a pinch of salt"
      description: lowercase English word (case-sensitive exclusion)
    - value: "this is top secret information, allegedly"
      description: lowercase phrase (case-sensitive exclusion)
    - value: "THE COMPANY'S TRADE SECRET RECIPE IS LOCKED IN A VAULT"
      description: ALL-CAPS non-government collocation — excluded from the top-level pattern (no TOP/UK-prefix/caveat present) and from the gated bare tier by the TRADE SECRET NOT-group
    - value: "OFFICE SECRET SANTA GIFT EXCHANGE SIGN-UP SHEET IS ON THE NOTICE BOARD"
      description: ALL-CAPS non-government collocation — excluded from the top-level pattern and from the gated bare tier by the SECRET SANTA NOT-group
false_positives:
  - description: ALL-CAPS prose (legal boilerplate, headers, or documents rendered entirely in capitals) defeats the case-sensitivity signal the bare TOP SECRET banner-words tier relies on — any all-caps rendering of the phrase (e.g. a film or product title) can fire with no protective-marking intent.
    mitigation: Treat banner-tier-only (85) hits as lower confidence when the surrounding text is itself all-caps; the UK Prefix and National Caveat tiers (both 85, structurally verified) remain the more reliable signal.
  - description: >-
      SECRET is an extremely common English word in everyday non-government usage (TRADE SECRET(S),
      CLIENT SECRET, API SECRET, SECRET MANAGER, SECRET SANTA), all more common in general text than
      the GSCP classification marking.
    mitigation: >-
      The bare tier (75) requires UK central-government/GSCP corroborative evidence and excludes this
      collocation set via a dedicated NOT-group (SECRET SANTA is added to this SIT's exclusion group
      as a hardening beyond the equivalent nz-marking-secret-topsecret exclusion set, which documents
      SECRET SANTA only as a residual risk rather than excluding it). SECRET KEY is deliberately NOT
      excluded, as it is plausible inside genuinely classified COMSEC prose. The UK Prefix, National
      Caveat, and TOP SECRET banner-words tiers (all 85) are unaffected — they are structurally
      distinctive and do not require the gate.
  - description: >-
      This SIT's vocabulary overlaps with the Australian PSPF and New Zealand PSR marking families:
      au-marking-secret-topsecret and au-marking-protected ship their own bare SECRET/TOP SECRET
      tiers ungated apart from noise/collocation NOT-groups (no AU-context requirement), and
      nz-marking-secret-topsecret ships an equivalent gated bare-SECRET tier and its own TOP SECRET
      banner-words tier. A genuine UK SECRET or TOP SECRET document will therefore typically co-fire
      the AU SITs (shared bare-word vocabulary, no jurisdiction gate on their side) and may co-fire
      the NZ SIT if NZ/PSR corroborative context also happens to be present.
    mitigation: Deploy policies should expect this cross-jurisdiction co-fire and treat the SITs as corroborating, not conflicting, signals; do not add a UK-exclusion to the AU/NZ SITs, as that would break their own intended (broader or independently-gated) coverage.
  - description: >-
      us-classification-banner uses the Five-Eyes "//" control/dissemination-marking separator
      (e.g. SECRET//REL TO USA, FVEY), which is structurally distinct from the UK GSCP's own
      hyphen-separated additional-marking format (CLASSIFICATION - HANDLING INSTRUCTION - CODEWORD -
      NATIONAL CAVEAT). A UK document using only the native GSCP hyphen format will not co-fire
      us-classification-banner; a UK document that separately also carries an interoperable Five-Eyes
      "//"-marked control token would co-fire both, which is expected and correct.
    mitigation: No mitigation needed — the two SITs detect genuinely different (if occasionally co-occurring) marking syntaxes.
  - description: >-
      Two verified GSCP forms are not implemented as machine-matchable regex: (1) Codewords are
      single arbitrary CAPITALISED words, centrally allocated per-asset — the GSCP's own worked
      example literally uses the placeholder text "CODEWORD", which is illustrative, not real
      recurring vocabulary, so no fixed regex can enumerate genuine codewords; (2) the fully-layered
      "PREFIX CLASSIFICATION - HANDLING INSTRUCTION - CODEWORD - NATIONAL CAVEAT" form (e.g. the
      GSCP's own "UK SECRET - CODEWORD - UK EYES ONLY" example) is not matched when a handling
      instruction or codeword segment sits between the classification and the National Caveat — the
      caveat-tier regex requires the caveat to follow the classification directly.
    mitigation: No mitigation implemented — documented as a known coverage gap rather than guessing at unverified intervening-segment syntax. The direct-adjacency UK Prefix, National Caveat, and TOP SECRET banner-words tiers remain the reliable, verified signals.
exports:
  - purview_xml
  - yaml
scope: narrow
risk_rating: 10
risk_description: >-
  SECRET and TOP SECRET are the two highest tiers of the UK's three-tier GSCP classification scheme.
  Per the current GSCP, a SECRET compromise "could threaten life ... seriously damage the UK's
  security and/or international relations," and TOP SECRET covers information that "directly
  support[s] or inform[s] the national security of the UK or its allies AND require[s] an extremely
  high assurance of protection from all threats."
sensitivity_labels:
  gscp: "SECRET / TOP SECRET"
  pspf: "SECRET / TOP SECRET"
  psr: "SECRET / TOP SECRET"
  us_gov: "SECRET / TOP SECRET"
  ca_gov: "Secret / Top Secret"
references:
  - url: https://www.gov.uk/government/publications/government-security-classifications/government-security-classifications-policy-html
    title: "Government Security Classifications Policy (GSCP), version 2.0 - GOV.UK"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: uk-government-context
      as: Keyword_uk_gov_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_uk_secret_prefix
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_uk_secret_caveat
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_uk_secret_banner
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_uk_secret_bare
      matches:
        - ref: Keyword_uk_gov_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_secret_collocation_exclusion
  regexes:
    - id: Regex_uk_secret_prefix
      pattern: '\bUK[\s-]+(?:TOP[\s-]+)?SECRET\b'
    - id: Regex_uk_secret_caveat
      pattern: '\b(?:TOP[\s-]+)?SECRET\b[\s-]+-[\s-]+(?:UK(?:/US)?|FIVE)[\s-]+EYES[\s-]+ONLY\b'
    - id: Regex_uk_secret_banner
      pattern: '\bTOP[\s-]+SECRET\b'
    - id: Regex_uk_secret_bare
      pattern: '\bSECRET\b'
  keywords:
    - id: Keyword_secret_collocation_exclusion
      groups:
        - match_style: word
          terms:
            - text: TRADE SECRET
              case_sensitive: true
            - text: TRADE SECRETS
              case_sensitive: true
            - text: CLIENT SECRET
              case_sensitive: true
            - text: API SECRET
              case_sensitive: true
            - text: SECRET MANAGER
              case_sensitive: true
            - text: SECRET SANTA
              case_sensitive: true
created: '2026-07-07'
updated: '2026-07-07'
changelog:
  - version: 1.0.0
    date: '2026-07-07'
    description: Initial release — verified UK Prefix, National Caveat, TOP SECRET banner-words, and UK-government-context-gated bare-SECRET tiers per direct verification against the current Government Security Classifications Policy (gov.uk). Completes the two-SIT UK GSCP protective-marking set (no PROTECTED-equivalent tier exists in the current three-tier UK scheme).
