schema: testpattern/v1
name: Scholarship evaluation files
slug: global-top500-348-scholarship-evaluation-files
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to scholarship evaluation files in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: corporate-ip. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:scholarship\s+evaluation|scholarship\s+review|merit\s+assessment|award\s+criteria|selection\s+committee|applicant\s+ranking|scholarship\s+recipient|academic\s+achievement|financial\s+need|evaluation\s+rubric|scholarship\s+panel|award\s+decision)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - scholarship evaluation files
    - scholarship
    - evaluation
    - files
    - education
    - research
    - administration
  proximity: 300
  keyword_lists:
    - corporate-ip
test_cases:
  should_match:
    - value: scholarship evaluation
      description: Primary topic phrase match
    - value: scholarship review
      description: Case-insensitive topic phrase match
    - value: merit assessment
      description: Alternative topic phrase match
    - value: award criteria
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to scholarship evaluation files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_scholarship_evaluation
      matches:
        - ref: Pattern_global_top500_348_scholarship_evaluation_files_label_context
        - ref: Keyword_global_top500_348_scholarship_evaluation_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_scholarship_evaluation
      matches:
        - ref: Keyword_scholarship_evaluation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_scholarship_evaluation
      matches:
        - ref: Keyword_scholarship_evaluation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_scholarship_evaluation
      pattern: >-
        (?is)\b(?:scholarship\s+evaluation|scholarship\s+review|merit\s+assessment|award\s+criteria|selection\s+committee|applicant\s+ranking|scholarship\s+recipient|academic\s+achievement|financial\s+need|evaluation\s+rubric|scholarship\s+panel|award\s+decision)\b
    - id: Pattern_global_top500_348_scholarship_evaluation_files_label_context
      pattern: (?i)\\b(?:scholarship\\s+evaluation\\s+files|scholarship|evaluation|files|top500)\\b
  keywords:
    - id: Keyword_scholarship_evaluation
      groups:
        - match_style: word
          terms:
            - scholarship evaluation
            - scholarship review
            - merit assessment
            - award criteria
            - selection committee
            - applicant ranking
            - scholarship recipient
            - academic achievement
            - financial need
            - evaluation rubric
            - scholarship panel
            - award decision
    - id: Keyword_global_top500_348_scholarship_evaluation_files_domain_context
      groups:
        - match_style: word
          terms:
            - scholarship evaluation files
            - scholarship
            - evaluation
            - files
            - top500
            - field
            - identifier
            - reference
