schema: testpattern/v1
name: Antitrust legal analyses
slug: au-top500-169-antitrust-legal-analyses
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to antitrust legal analyses in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:antitrust\s+legal\s+analyses|competition\s+law|cartel\s+conduct|price\s+fixing|market\s+allocation|bid\s+rigging|merger\s+clearance|competition\s+analysis)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - antitrust legal analyses
    - antitrust
    - legal
    - analyses
    - corporate
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: antitrust legal analyses
      description: Primary topic phrase match
    - value: competition law
      description: Case-insensitive topic phrase match
    - value: cartel conduct
      description: Alternative topic phrase match
    - value: price fixing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to antitrust legal analyses appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_antitrust_legal
      matches:
        - ref: Evidence_antitrust_legal
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_antitrust_legal
      matches:
        - ref: Evidence_antitrust_legal
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_antitrust_legal
      matches:
        - ref: Evidence_antitrust_legal
  regexes:
    - id: Pattern_antitrust_legal
      pattern: (?is)\b(?:antitrust\s+legal\s+analyses|competition\s+law|cartel\s+conduct|price\s+fixing|market\s+allocation|bid\s+rigging|merger\s+clearance|competition\s+analysis)\b
  keywords:
    - id: Evidence_antitrust_legal
      groups:
        - match_style: word
          terms:
            - antitrust legal analyses
            - antitrust
            - competition law
            - cartel conduct
            - price fixing
            - market allocation
            - bid rigging
            - monopoly
            - merger clearance
            - ACCC
            - competition analysis
            - anti-competitive
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
license: MIT
references:
  - https://www.accc.gov.au/business/competition-and-exemptions/competition-and-exemptions
  - https://www.accc.gov.au/business/competition-and-exemptions/cartels
