schema: testpattern/v1
name: Cardholder names linked to accounts
slug: au-top500-108-cardholder-names-linked-to-accounts
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to cardholder names linked to accounts in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:cardholder\s+name|card\s+holder|name\s+on\s+card|account\s+holder|PCI\s+DSS|cardholder\s+data|payment\s+card|primary\s+account\s+number|card\s+account|linked\s+account|card\s+member)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
  - pci-dss
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - cardholder names linked to accounts
    - cardholder
    - names
    - linked
    - accounts
    - financial
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: cardholder name
      description: Primary topic phrase match
    - value: card holder
      description: Case-insensitive topic phrase match
    - value: name on card
      description: Alternative topic phrase match
    - value: account holder
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_cardholder_names
      matches:
        - ref: Evidence_cardholder_names
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_cardholder_names
      matches:
        - ref: Evidence_cardholder_names
    - confidence_level: 65
      id_match: Pattern_cardholder_names
      matches:
        - ref: Evidence_cardholder_names
  regexes:
    - id: Pattern_cardholder_names
      pattern: (?is)\b(?:cardholder\s+name|card\s+holder|name\s+on\s+card|account\s+holder|PCI\s+DSS|cardholder\s+data|payment\s+card|primary\s+account\s+number|card\s+account|linked\s+account|card\s+member)\b
  keywords:
    - id: Evidence_cardholder_names
      groups:
        - match_style: word
          terms:
            - cardholder name
            - card holder
            - name on card
            - account holder
            - PCI DSS
            - cardholder data
            - payment card
            - primary account number
            - card account
            - linked account
            - card member
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
