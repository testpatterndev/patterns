schema: testpattern/v1
name: Regulatory examination responses
slug: au-top500-168-regulatory-examination-responses
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to regulatory examination responses in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:regulatory\s+examination\s+responses|regulatory\s+examination|regulator\s+response|APRA\s+examination|ASIC\s+review|prudential\s+review|compliance\s+examination|regulatory\s+inquiry|supervisory\s+review|remediation\s+plan|regulatory\s+finding|examination\s+report)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - regulatory examination responses
    - regulatory
    - examination
    - responses
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: regulatory examination responses
      description: Primary topic phrase match
    - value: regulatory examination
      description: Case-insensitive topic phrase match
    - value: regulator response
      description: Alternative topic phrase match
    - value: APRA examination
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to regulatory examination responses appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_regulatory_examination
      matches:
        - ref: Evidence_regulatory_examination
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_regulatory_examination
      matches:
        - ref: Evidence_regulatory_examination
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_regulatory_examination
      matches:
        - ref: Evidence_regulatory_examination
  regexes:
    - id: Pattern_regulatory_examination
      pattern: >-
        (?is)\b(?:regulatory\s+examination\s+responses|regulatory\s+examination|regulator\s+response|APRA\s+examination|ASIC\s+review|prudential\s+review|compliance\s+examination|regulatory\s+inquiry|supervisory\s+review|remediation\s+plan|regulatory\s+finding|examination\s+report)\b
  keywords:
    - id: Evidence_regulatory_examination
      groups:
        - match_style: word
          terms:
            - regulatory examination responses
            - regulatory examination
            - regulator response
            - APRA examination
            - ASIC review
            - prudential review
            - compliance examination
            - regulatory inquiry
            - supervisory review
            - remediation plan
            - regulatory finding
            - examination report
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
license: MIT
