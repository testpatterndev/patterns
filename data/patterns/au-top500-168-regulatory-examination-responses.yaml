schema: testpattern/v1
name: Regulatory examination responses
slug: au-top500-168-regulatory-examination-responses
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies Australian regulator-facing responses and submissions addressing examinations,
  supervisory or prudential reviews, inquiries, and findings, including matters involving APRA,
  ASIC, AUSTRAC, ACCC, OAIC, and Queensland regulators. Topic phrases are discovery-only; enforcement
  requires Australian authority context and substantive management-response evidence, while high
  confidence also requires a structured regulator matter reference.
operation: >-
  Regex_au_regulatory_examination_response recognises examination, review, inquiry, and finding
  responses. The topic alone is discovery-only at 65. Australian regulator context plus at least two
  distinct response, finding, root-cause, remediation, ownership, due-date, dispute, control-gap, or
  evidence signals reaches 75; a structured Australian authority reference raises it to 85. Enforcing
  tiers reject templates, published or instructional material, and exam or test records.
pattern: >-
  (?is)\b(?:(?:regulatory|supervisory|prudential|compliance)\s+(?:examination|review|inquiry)\s+(?:response|submission)|(?:APRA|ASIC|AUSTRAC|ACCC|OAIC|Australian\s+(?:regulator|regulatory\s+authority)|Queensland\s+(?:regulator|regulatory\s+authority))\s+(?:examination|review|inquiry)\s+(?:response|submission)|response\s+to\s+(?:the\s+)?(?:regulator(?:'s)?|APRA|ASIC|AUSTRAC|ACCC|OAIC|Australian\s+(?:regulator|regulatory\s+authority)|Queensland\s+(?:regulator|regulatory\s+authority))\s+(?:examination|review|finding|inquiry)|matter\s+requiring\s+attention\s+response)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires Australian regulator context and multiple substantive response signals
  rather than examination vocabulary alone. High confidence adds a structured authority matter
  reference.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - QGISCF
data_categories:
  - government
  - legal
corroborative_evidence:
  keywords:
    - APRA prudential review response
    - ASIC regulatory examination response
    - AUSTRAC inquiry response
    - Queensland regulator review response
    - management response to finding
    - root cause analysis
    - remediation action
    - evidence attached
  proximity: 300
test_cases:
  should_match:
    - value: Regulatory examination response
      description: Low-tier probe - response topic without Australian authority or substantive evidence
    - value: 'APRA prudential review response: management response to finding, root cause analysis, remediation action, action owner, target completion date, and evidence attached'
      description: Medium-tier probe - Australian prudential response evidence without a formal matter reference
    - value: 'Queensland regulator review response: response to finding, root cause analysis, control gap, remediation commitment, action owner, and target completion date'
      description: Medium-tier probe - Queensland regulatory response evidence without a formal matter reference
    - value: 'ASIC regulatory examination response, ASIC matter reference: ASIC-EX-2026-041: management response to finding, root cause analysis, control gap, remediation commitment, corrective action owner, and evidence attached'
      description: High-tier probe - substantive Australian response with a structured ASIC matter reference
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: 'ASIC compliance guidance on preparing a regulatory examination response covers management response to finding, root cause analysis, remediation action, and evidence requirements.'
      description: Generic compliance guidance is not an operational examination response
    - value: 'APRA published report on the regulatory examination response program summarises management responses, root causes, and remediation actions.'
      description: Published regulator material is not a confidential entity response
    - value: 'APRA compliance examination response for a staff certification test: candidate answer, score, management response, corrective action, and evidence attached.'
      description: Staff exam or test answers are outside the regulatory-response SIT
    - value: 'Template: ASIC regulatory examination response, ASIC matter reference: ASIC-EX-2026-041, management response to finding, root cause analysis, remediation action, and evidence attached.'
      description: Explicit response templates must not enforce
    - value: 'Queensland Government internal audit management response: root cause analysis, control gap, remediation action, action owner, and evidence attached.'
      description: Adjacent internal-audit response without a regulator examination topic
    - value: 'Draft response to a customer complaint: root cause analysis, corrective action, action owner, and target completion date.'
      description: Adjacent customer-response record is outside the regulatory-examination SIT
false_positives:
  - description: Australian regulatory guidance and published examination material can discuss findings, root causes, remediation, owners, and evidence without containing an entity's response.
    mitigation: Keep the response topic discovery-only and reject explicit guidance, instructional, public, and published framing from enforcing tiers.
  - description: Staff examinations, certification tests, and training responses can reproduce realistic regulatory-response language and references.
    mitigation: Reject exam, test, candidate-answer, template, demo, sample-data, and training-example framing from enforcing tiers.
  - description: Internal audit, customer complaint, RTI, and other adjacent response records can contain management actions, owners, deadlines, and evidence.
    mitigation: Require an examination, supervisory review, prudential review, inquiry, or regulator-finding response as the primary topic.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_au_regulatory_examination_response
      matches:
        - ref: Evidence_au_regulator_context
        - ref: Evidence_au_regulatory_examination_content
          min_count: 2
          unique_results: true
        - ref: Regex_au_regulatory_examination_reference
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Regex_au_regulatory_non_record
    - confidence_level: 75
      id_match: Regex_au_regulatory_examination_response
      matches:
        - ref: Evidence_au_regulator_context
        - ref: Evidence_au_regulatory_examination_content
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Regex_au_regulatory_non_record
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_au_regulatory_examination_response
  regexes:
    - id: Regex_au_regulatory_examination_response
      pattern: >-
        (?is)\b(?:(?:regulatory|supervisory|prudential|compliance)\s+(?:examination|review|inquiry)\s+(?:response|submission)|(?:APRA|ASIC|AUSTRAC|ACCC|OAIC|Australian\s+(?:regulator|regulatory\s+authority)|Queensland\s+(?:regulator|regulatory\s+authority))\s+(?:examination|review|inquiry)\s+(?:response|submission)|response\s+to\s+(?:the\s+)?(?:regulator(?:'s)?|APRA|ASIC|AUSTRAC|ACCC|OAIC|Australian\s+(?:regulator|regulatory\s+authority)|Queensland\s+(?:regulator|regulatory\s+authority))\s+(?:examination|review|finding|inquiry)|matter\s+requiring\s+attention\s+response)\b
    - id: Regex_au_regulatory_examination_reference
      pattern: >-
        (?i)\b(?:APRA|ASIC|AUSTRAC|ACCC|OAIC|Australian\s+(?:regulator|regulatory\s+authority)|Queensland\s+(?:regulator|regulatory\s+authority))\s+(?:examination|review|inquiry|finding|matter|notice)\s*(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z]{2,10}[-/][A-Z0-9/-]{3,30}\b
    - id: Regex_au_regulatory_non_record
      pattern: >-
        (?i)\b(?:(?:public|published)\s+(?:(?:regulatory|prudential|supervisory)\s+)?(?:guide|guidance|report|review|summary|statement|standard)|(?:generic|public|regulatory|compliance)\s+guidance|how\s+to\s+(?:prepare|write|complete|submit|respond)|(?:practice|certification|student|candidate|staff)\s+(?:exam(?:ination)?|test)|(?:exam(?:ination)?|test)\s+(?:question|answer|paper|score|result)|answer\s+key|candidate\s+(?:answer|response))\b
  keywords:
    - id: Evidence_au_regulator_context
      groups:
        - match_style: word
          terms:
            - text: APRA
              case_sensitive: true
            - Australian Prudential Regulation Authority
            - text: ASIC
              case_sensitive: true
            - Australian Securities and Investments Commission
            - text: AUSTRAC
              case_sensitive: true
            - Australian Transaction Reports and Analysis Centre
            - text: ACCC
              case_sensitive: true
            - Australian Competition and Consumer Commission
            - text: OAIC
              case_sensitive: true
            - Office of the Australian Information Commissioner
            - Australian regulator
            - Australian regulatory authority
            - Queensland regulator
            - Queensland regulatory authority
            - Commonwealth regulator
      strength: domain
    - id: Evidence_au_regulatory_examination_content
      groups:
        - match_style: word
          terms:
            - management response
            - response to finding
            - finding disputed
            - issue disputed
            - root cause analysis
            - control gap
            - remediation commitment
            - remediation action
            - corrective action owner
            - action owner
            - target completion date
            - response due date
            - evidence attached
            - supporting evidence
      strength: domain
risk_description: >-
  The detector finds Australian regulator-facing examination, supervisory-review, inquiry, and
  finding responses supported by named authority context and substantive management-response
  evidence. A genuine response can reveal control deficiencies, disputed findings, root causes,
  remediation commitments, accountable owners, deadlines, and internal evidence, enabling concealment
  or prejudice before the regulatory matter concludes. Harm is serious for the regulated entity and
  government oversight process but normally confined to one matter. Risk 8 supports SENSITIVE
  Government; PROTECTED would require compromise of a major supervisory operation, protected sources,
  or significant financial-system or government damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
