schema: testpattern/v1
name: Dam safety and integrity reports
slug: au-top500-460-dam-safety-and-integrity-reports
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive dam-safety, integrity, surveillance, failure, inundation, and consequence
  reports. Topic phrases are retained for discovery; enforcement requires condition or monitoring
  findings, and high confidence also requires a severe weakness, overdue remediation, emergency action,
  failure mode, or downstream consequence.
operation: >-
  Pattern_dam_safety recognises dam-safety report topics. The topic alone is discovery-only at 65.
  Spillway, embankment, seepage, instrumentation, inspection, defect, or remedial-work findings raise it
  to 75; those findings plus severe failure, instability, overtopping, emergency, or downstream-impact
  evidence reach 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:dam\s+safety\s+and\s+integrity\s+reports?|dam\s+safety\s+report|dam\s+integrity\s+report|dam\s+surveillance\s+report|dam\s+failure\s+analysis|dam\s+inundation\s+map|dam\s+consequence\s+category)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires an engineering condition or monitoring finding rather than a public dam
  reference. High confidence adds a severe weakness or consequence, distinguishing actionable reports
  from standards and routine summaries.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - location
  - security
corroborative_evidence:
  keywords:
    - dam safety and integrity reports
    - dam
    - safety
    - integrity
    - reports
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: dam safety and integrity report
      description: Low-tier probe - report topic without engineering findings
    - value: 'Dam surveillance report: piezometer readings show increased seepage at the eastern embankment; remedial works are scheduled'
      description: Medium-tier probe - engineering condition findings without severe failure evidence
    - value: 'Dam integrity report: excessive seepage and a longitudinal crack indicate embankment instability; emergency action is required for downstream population at risk'
      description: High-tier probe - condition findings with severe weakness and downstream consequence
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: dam safety report
      description: Bare report title surfaces only in discovery
    - value: 'The public ANCOLD standard describes dam safety management principles.'
      description: Public standard without asset-specific engineering findings
    - value: 'Training example: dam integrity report with excessive seepage, instability, and emergency action'
      description: Explicit training content must not enforce
false_positives:
  - description: Public standards, annual summaries, and emergency-planning guidance discuss dam safety, surveillance, seepage, and failure consequences without revealing a live engineering weakness.
    mitigation: Keep report titles discovery-only and require a condition, instrumentation, defect, or remediation finding for enforcement.
  - description: Exercises and training scenarios can include severe seepage, cracks, instability, emergency actions, and downstream consequences.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_dam_safety
      matches:
        - ref: Evidence_dam_condition_finding
        - ref: Evidence_dam_severe_consequence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_dam_safety
      matches:
        - ref: Evidence_dam_condition_finding
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_dam_safety
  regexes:
    - id: Pattern_dam_safety
      pattern: >-
        (?is)\b(?:dam\s+safety\s+and\s+integrity\s+reports?|dam\s+safety\s+report|dam\s+integrity\s+report|dam\s+surveillance\s+report|dam\s+failure\s+analysis|dam\s+inundation\s+map|dam\s+consequence\s+category)\b
  keywords:
    - id: Evidence_dam_condition_finding
      groups:
        - match_style: word
          terms:
            - spillway
            - embankment
            - seepage
            - piezometer
            - deformation
            - inspection finding
            - defect
            - monitoring instrument
            - remedial works
      strength: domain
    - id: Evidence_dam_severe_consequence
      groups:
        - match_style: word
          terms:
            - excessive seepage
            - instability
            - crack
            - overtopping
            - failure mode
            - remediation overdue
            - emergency action
            - population at risk
            - downstream consequence
      strength: specific
risk_description: >-
  The detector recognises dam-safety, integrity, consequence-category, inspection, and deficiency language, intending to identify an engineering condition report rather than a public reference to a dam. An authentic report may reveal structural weaknesses, monitoring gaps, remediation delays, or failure consequences that enable targeted interference or undermine public confidence in one asset. The medium-confidence concept regex can also find published safety standards and summary reporting, so sensitivity depends on actual findings and asset detail. Risk 8 and SENSITIVE InfoTech fit serious engineering and continuity harm; PROTECTED would require actionable severe vulnerabilities whose compromise could credibly cause significant downstream, environmental, or life-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-07-04'
changelog:
  - version: 1.5.0
    date: '2026-07-04'
    description: 'CI profile hardening: require engineering condition or monitoring findings at 75 and severe weakness, emergency, failure, or downstream-consequence evidence at 85; reject public standards and training scenarios.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1046 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-12'
    description: 'Baseline burn-down A2: tier@75''s Evidence_dam_safety ref is self-corroborating — its term list is the same phrase set as the id_match regex''s own alternation, so should_not_match: "dam safety report" satisfied both the primary match and the tier''s evidence with the single phrase "dam safety". Added min_count: 2 + unique_results: true to tier@75 (mirroring tier@85) so one incidental phrase occurrence no longer meets the evidence bar. Also marked the bare tier@65 discovery_only (same no-evidence shape) so it surfaces in discovery inventory rather than gating should_not_match.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
