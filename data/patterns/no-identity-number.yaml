schema: testpattern/v1
name: Fødselsnummer
slug: no-identity-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Fødselsnummer patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-norway-identification-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b\d{11}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates.
jurisdictions:
  - eu
  - "no"
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - fødselsnummer
    - identity number
    - personnummer
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: "01017512345"
      description: Norwegian ID (born 1975-01-01)
    - value: "12058856789"
      description: Norwegian ID (born 1988-05-12)
    - value: "03039245678"
      description: Norwegian ID (born 1992-03-03)
  should_not_match:
    - value: "1234567890"
      description: Too few digits (10)
    - value: "123456789012"
      description: Too many digits (12)
false_positives:
  - description: >-
      Eleven-digit numeric sequences may match phone numbers or other administrative identifiers.
    mitigation: >-
      Require corroborative evidence keywords such as "fødselsnummer" or "personnummer" within the proximity window.
  - description: >-
      In multiple languages, similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_no_identity_number
      matches:
        - ref: Keyword_no_identity_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_no_identity_number
      matches:
        - ref: Keyword_no_identity_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_no_identity_number
  regexes:
    - id: Regex_no_identity_number
      pattern: \b\d{11}\b
  keywords:
    - id: Keyword_no_identity_specific
      groups:
        - match_style: word
          terms:
            - fødselsnummer
            - personnummer
            - fødsels- og personnummer
            - text: FNR
              case_sensitive: true
            - D-nummer
            - norsk identitetsnummer
            - nasjonalt identitetsnummer
            - national identity number
            - Norwegian ID
      strength: specific
    - id: Keyword_no_identity_broad
      groups:
        - match_style: word
          terms:
            - identity number
            - identification number
            - personal number
            - ID number
            - national number
            - citizen number
            - folkeregister
            - skatteetaten
      strength: specific
  filters:
    - id: Filter_no_identity_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  A Norwegian fødselsnummer match is an eleven-digit personal identity number found near civic terminology, not the person's registry or financial profile. Combined with a name and date-of-birth context, it could strengthen identity impersonation, but the number alone does not authorise a service. The normal impact is limited to one person, and phone or other administrative numbers can share the same length. Risk 5 and OFFICIAL preserve bounded atomic harm; a verified number joined to financial, welfare, or authentication records would be more sensitive.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-norway-identification-number
    title: "Norway Identity Number entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
