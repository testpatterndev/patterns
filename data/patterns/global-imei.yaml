schema: testpattern/v1
name: IMEI
slug: global-imei
version: 1.4.0
type: regex
pattern_class: identifier
engine: universal
description: Detects IMEI patterns.
operation: >-
  A 15-digit candidate with Luhn validation is discovery-only at 65. An explicit IMEI, international
  mobile equipment identity, equipment-identity, or TAC label raises it to 75. The 85 tier additionally
  requires a subscriber account, handset inventory, device assignment, carrier record, warranty record,
  blacklist status, or mobile-service association. Enforcing tiers reject public documentation,
  manufacturer guides, templates, and examples.
pattern: \b\d{15}\b
confidence: medium
confidence_justification: 'Medium confidence: validated with Luhn algorithm and supported by corroborative keyword evidence.'
jurisdictions:
  - global
regulations:
  - GDPR
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
  - device-id
corroborative_evidence:
  keywords:
    - device
    - identifier
    - serial number
    - hardware
  proximity: 300
  keyword_lists:

    - phone-international
test_cases:
  should_match:
    - value: '353456789012348'
      description: Exact 65 probe - Luhn-valid IMEI candidate without a label
    - value: 'IMEI: 490154203237518'
      description: Exact 75 probe - Luhn-valid labelled IMEI without a device record
    - value: 'Handset inventory device assignment - IMEI: 860000000000009; subscriber account and blacklist status recorded.'
      description: Exact 85 probe - Luhn-valid IMEI plus handset and subscriber record
  should_not_match:
    - value: 35345678901234
      description: Only 14 digits instead of 15
    - value: 3534567890123456
      description: 16 digits instead of 15
    - value: 35345678901234A
      description: Contains a letter instead of all digits
    - value: '353456789012345'
      description: Adversarial 15-digit candidate with an invalid Luhn check digit
    - value: 'Public manufacturer guide - IMEI: 353456789012348'
      description: Public guide contains a complete labelled candidate
    - value: 'Template example: handset inventory device assignment IMEI 490154203237518 with subscriber account and blacklist status.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: >-
      Technical identifiers appearing in public documentation, network configuration guides, or example configurations
      without representing actual infrastructure.
    mitigation: >-
      Cross-reference with known documentation patterns and reserved address ranges. Require proximity to
      infrastructure-specific context.
  - description: Placeholder and example values commonly used in technical tutorials and vendor documentation.
    mitigation: Maintain exclusion lists for well-known example values (RFC 5737 documentation addresses, example MAC addresses).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_description: >-
  This detector recognises one 15-digit IMEI and applies Luhn validation, so the match is a handset identifier rather than a device dossier. With carrier, warranty, or subscriber data, the identifier could support device tracking, fraudulent blacklist activity, or correlation to an owner. The ordinary unit affects one handset and needs external ownership or network records before material harm follows. Risk 5 and OFFICIAL fit that bounded exposure; person-linked device inventories or bulk equipment registers would raise the context.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_imei
      matches:
        - ref: Keyword_imei
        - ref: Keyword_imei_device_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_public_imei_context
    - confidence_level: 75
      id_match: Regex_imei
      matches:
        - ref: Keyword_imei
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_public_imei_context
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_imei
  regexes:
    - id: Regex_imei
      pattern: \b\d{15}\b
      validators:
        - ref: Func_credit_card
  filters:
    - id: Filter_imei_same_digits
      type: AllDigitsSameFilter
  keywords:
    - id: Keyword_imei
      groups:
        - match_style: word
          terms:
            - IMEI
            - international mobile equipment identity
            - IMEI number
            - equipment identity
            - text: TAC
              case_sensitive: true
            - type allocation code
      strength: specific
    - id: Keyword_imei_device_record
      groups:
        - match_style: word
          terms:
            - subscriber account
            - handset inventory
            - device assignment
            - carrier record
            - warranty record
            - blacklist status
            - mobile service association
      strength: domain
    - id: Keyword_public_imei_context
      groups:
        - match_style: word
          terms:
            - public manufacturer guide
            - public documentation
            - device manual
            - documentation example
      strength: exclusion
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 1.4.0
    date: '2026-07-19'
    description: 'Profile quality: add validated-candidate discovery, explicit-IMEI-label medium, and handset/subscriber-record high tiers; use independently verified Luhn-valid exact-tier probes and retain an invalid-checksum negative; reject public guides/templates.'
  - version: 1.3.2
    date: '2026-07-18'
    description: >-
      Quality bar: confidence high->medium for digit/identifier shapes where structural FP risk makes 'high' dishonest without checksum/strong label evidence.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1244 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary; remove dead shared_keywords import(s) generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
license: MIT
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.'

risk_rating: 5
