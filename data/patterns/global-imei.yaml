schema: testpattern/v1
name: IMEI
slug: global-imei
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: Detects IMEI patterns.
operation: >-
  Validation: Luhn algorithm. Reference: https://en.wikipedia.org/wiki/International_Mobile_Equipment_Identity
  Corroborative evidence: 4 keywords within 300 characters. Keyword lists: phone-international.
pattern: \b\d{15}\b
confidence: high
confidence_justification: 'High confidence: validated with Luhn algorithm and supported by corroborative keyword evidence.'
jurisdictions:
  - global
regulations:
  - GDPR
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
  - device-id
corroborative_evidence:
  keywords:
    - device
    - identifier
    - serial number
    - hardware
  proximity: 300
  keyword_lists:

    - phone-international
test_cases:
  should_match:
    - value: '353456789012345'
      description: Standard 15-digit IMEI
    - value: '490154203237518'
      description: Samsung IMEI format
    - value: '860000000000000'
      description: Chinese manufacturer IMEI prefix
  should_not_match:
    - value: 35345678901234
      description: Only 14 digits instead of 15
    - value: 3534567890123456
      description: 16 digits instead of 15
    - value: 35345678901234A
      description: Contains a letter instead of all digits
false_positives:
  - description: >-
      Technical identifiers appearing in public documentation, network configuration guides, or example configurations
      without representing actual infrastructure.
    mitigation: >-
      Cross-reference with known documentation patterns and reserved address ranges. Require proximity to
      infrastructure-specific context.
  - description: Placeholder and example values commonly used in technical tutorials and vendor documentation.
    mitigation: Maintain exclusion lists for well-known example values (RFC 5737 documentation addresses, example MAC addresses).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
sensitivity_labels:
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_imei
      matches:
        - ref: Keyword_imei
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_imei
  regexes:
    - id: Regex_imei
      pattern: \b\d{15}\b
      validators:
        - ref: Func_credit_card
  filters:
    - id: Filter_imei_same_digits
      type: AllDigitsSameFilter
  keywords:
    - id: Keyword_imei
      groups:
        - match_style: word
          terms:
            - IMEI
            - international mobile equipment identity
            - device identifier
            - mobile device
            - handset
            - serial number
            - phone number
            - IMEI number
            - equipment identity
            - text: TAC
              case_sensitive: true
            - type allocation code
            - mobile equipment
      strength: specific
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary; remove dead shared_keywords import(s) generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
license: MIT
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.'
