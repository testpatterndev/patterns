  - version: 1.1.1
    date: '2026-07-09'
    description: Add a genuine basis-points id_match hit (48 basis points) to the second should_match value — the old value only contained dollar/tenor/fiscal-year evidence regex hits, so no tier could ever anchor on it (tier-harness triage class T5)
  - version: 1.1.0
    date: '2026-07-04'
