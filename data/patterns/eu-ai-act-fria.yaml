schema: testpattern/v1
name: EU AI Act Fundamental Rights Impact Assessment (FRIA)
slug: eu-ai-act-fria
version: 1.2.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: >-
  Detects deployer-side fundamental rights impact assessments (FRIA) under Article 27 of the EU AI Act
  (Regulation (EU) 2024/1689). A FRIA is performed before deploying certain high-risk AI systems by public
  bodies, private providers of public services, and deployers of credit-scoring and life/health-insurance
  pricing systems (Annex III points 5(b) and (c)). Completed FRIAs contain candid assessments of risks of
  harm to specific categories of natural persons and are sensitive before notification and remediation.
operation: >-
  Concept (topic) classifier, not an identifier detector. Primary detection: keyword proximity on the
  defined term 'fundamental rights impact assessment' corroborated within 300 characters by Article 27's
  required-content vocabulary (categories of natural persons, specific risks of harm, human oversight
  measures, internal governance, complaint mechanisms, market surveillance authority) and AI Act citations.
  The 85 tier additionally requires structural support from either the case-insensitive FRIA acronym regex
  or an Article 27 / Regulation (EU) 2024/1689 citation, so documents that use the full defined term plus
  such a citation reach the recommended confidence without the acronym (the FRIA keyword evidence term is
  case-sensitive; full-title documents lacking any citation stop at the 75 tier).
  Noise exclusion for news, marketing, academic, legal-alert, and template/sample contexts.
pattern: (?i)\bfundamental\s+rights\s+impact\s+assessment\b
confidence: medium
confidence_justification: >-
  Medium confidence: honest topic matcher. 'Fundamental rights impact assessment' is the regulation's
  defined term and strongly indicates the document class, but the phrase also circulates in academic and
  policy literature (including pre-AI Act methodologies such as the Dutch FRAIA) and in consultancy
  marketing; corroborative Article 27 content vocabulary and noise exclusions reduce but cannot eliminate
  that collision. No identifier-grade precision is promised.
jurisdictions:
  - eu
regulations:
- "Regulation (EU) 2024/1689 (AI Act)"
frameworks:
- ISO/IEC 42001
- ISO 27001
data_categories:
  - legal
  - pii
  - emerging
corroborative_evidence:
  keywords:
    - Article 27
    - deployer
    - high-risk AI system
    - intended purpose
    - categories of natural persons
    - risks of harm
    - human oversight measures
    - instructions for use
    - market surveillance authority
    - internal governance
    - complaint mechanisms
    - bodies governed by public law
    - Annex III
    - Regulation (EU) 2024/1689
  proximity: 300
test_cases:
  should_match:
    - value: |-
        FUNDAMENTAL RIGHTS IMPACT ASSESSMENT — Article 27, Regulation (EU) 2024/1689
        Deployer: Municipality of Aalsberg (body governed by public law)
        High-risk AI system: social-benefits eligibility scoring (Annex III point 5(a))
        Categories of natural persons and groups likely to be affected: benefit applicants, including
        single-parent households and persons with disabilities.
        Specific risks of harm: discriminatory refusal of essential public assistance benefits.
      description: Completed FRIA for a public-sector benefits scoring system
    - value: >-
        FRIA v0.3 (draft, internal only) — fundamental rights impact assessment under Article 27.
        Description of the deployer's processes in which the high-risk AI system will be used in line
        with its intended purpose; period of time and frequency of use;
        implementation of human oversight measures according to the instructions for use; and measures to
        be taken in the case of the materialisation of those risks, including the arrangements for internal
        governance and complaint mechanisms. Notification to the market surveillance authority is pending.
      description: Draft FRIA tracking Article 27(1)(a)-(f) required content
    - value: >-
        Attached is the completed fundamental rights impact assessment for the creditworthiness scoring
        model (Annex III point 5(b)). The assessment identifies specific risks of harm to the categories of
        natural persons affected — thin-file applicants and recent migrants — and records the deployer's
        mitigation and internal governance arrangements. Please treat as strictly confidential until the
        market surveillance authority has been notified.
      description: FRIA for a credit-scoring deployment circulated before notification
  should_not_match:
    - value: >-
        At a press briefing, MEPs hailed the new fundamental rights impact assessment requirement as a
        victory for civil society, while business groups warned of red tape. The obligation applies to
        public bodies deploying high-risk systems from 2026, the parliament's press release noted.
      description: News coverage of the FRIA obligation (filter-dependent negative)
    - value: >-
        Is your organisation FRIA-ready? Our consultants deliver end-to-end AI Act readiness, from gap
        analysis to assessment templates. Book a demo of our FRIA workflow tool or join our webinar,
        'Fundamental rights compliance made simple'.
      description: Consultancy marketing for FRIA services
    - value: >-
        Abstract — This peer-reviewed article compares the fundamental rights impact assessment under
        Article 27 AI Act with the GDPR's data protection impact assessment, drawing on the Dutch FRAIA
        methodology. We argue the two instruments overlap substantially in scope.
      description: Academic paper comparing FRIA and DPIA (filter-dependent negative)
    - value: >-
        Client alert: Article 27 requires deployers that are bodies governed by public law to perform 'an
        assessment of the impact on fundamental rights that the use of such system may produce' and to
        notify the market surveillance authority of the results. Contact our regulatory practice.
      description: Law-firm client alert paraphrasing Article 27 text
false_positives:
  - description: GDPR data protection impact assessments (DPIAs) — Article 27(4) expressly links the FRIA to the GDPR Article 35 DPIA, and combined FRIA/DPIA documents exist
    mitigation: Accepted collision within the same risk family; corroborative evidence favours Article 27 vocabulary (categories of natural persons, market surveillance authority) over GDPR-only vocabulary
  - description: Academic, civil-society, and policy literature on fundamental rights impact assessments, including pre-AI Act methodologies (e.g. the Dutch FRAIA)
    mitigation: Noise exclusion on 'peer-reviewed', 'paper abstract', 'conference abstract', 'training course'; literature lacks deployer-specific content such as named systems and notification status
  - description: Compliance-consultancy marketing and FRIA template/tooling promotions
    mitigation: Noise exclusion on 'book a demo', 'webinar', 'free trial'; marketing rarely carries Article 27 required-content vocabulary in proximity
  - description: News and analysis about the Article 27 obligation
    mitigation: Noise exclusion on press terms; 85 tier requires corroborative Article 27 content vocabulary
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_eu_ai_act_fria_defined_term
      matches:
        - ref: Evidence_eu_ai_act_fria_primary
        - ref: Evidence_eu_ai_act_fria_corroborative
        - type: any
          min_matches: 1
          refs:
            - Pattern_eu_ai_act_fria_acronym
            - Pattern_eu_ai_act_fria_citation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_ai_act_fria_exclusion
    - confidence_level: 75
      id_match: Pattern_eu_ai_act_fria_defined_term
      matches:
        - ref: Evidence_eu_ai_act_fria_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_ai_act_fria_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_eu_ai_act_fria_defined_term
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_ai_act_fria_exclusion
  regexes:
    - id: Pattern_eu_ai_act_fria_defined_term
      pattern: (?i)\bfundamental\s+rights\s+impact\s+assessment\b
    - id: Pattern_eu_ai_act_fria_acronym
      pattern: (?i)\bFRIA\b
    - id: Pattern_eu_ai_act_fria_citation
      pattern: (?i)\b(?:Regulation\s+\(EU\)\s+2024/1689|Article\s+27)\b
  keywords:
    - id: Evidence_eu_ai_act_fria_primary
      groups:
        - match_style: word
          terms:
            - fundamental rights impact assessment
            - text: FRIA
              case_sensitive: true
      strength: specific
    - id: Evidence_eu_ai_act_fria_corroborative
      groups:
        - match_style: word
          terms:
            - deployer
            - high-risk AI system
            - intended purpose
            - categories of natural persons
            - risks of harm
            - human oversight measures
            - instructions for use
            - market surveillance authority
            - internal governance
            - complaint mechanisms
            - bodies governed by public law
            - Annex III
      strength: domain
    - id: Filter_eu_ai_act_fria_exclusion
      groups:
        - match_style: word
          terms:
            - press release
            - press briefing
            - media release
            - blog post
            - webinar
            - book a demo
            - free trial
            - client alert
            - legal update
            - newsletter
            - peer-reviewed
            - paper abstract
            - conference abstract
            - abstract submitted
            - training course
            - online course
            - course syllabus
            - training material
            - thought leadership
      strength: noise
risk_rating: 7
risk_description: >-
  A completed FRIA records the deployer's own assessment of specific risks of harm to identified categories
  of natural persons — often vulnerable groups — before mitigations and notification to the market
  surveillance authority. Premature disclosure exposes affected-group analysis, creates litigation and
  discrimination-claim exposure, and reveals the deployer's regulatory posture; drafts may also embed
  personal data from the underlying process.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI Basic"
  uk_gov: "OFFICIAL-SENSITIVE"
references:
  - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32024R1689
  - https://artificialintelligenceact.eu/article/27/
created: '2026-07-08'
updated: '2026-07-09'
changelog:
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-08'
    description: 'Codex D4 review: wired the declared shared template-exclusion dictionary (Keyword_noise_exclusion) into the NOT group of every tier — it was declared but never referenced, so the template/sample noise gate was dead. 85 tier structural leg relaxed from FRIA-acronym-only to acronym OR Article 27 / Regulation (EU) 2024/1689 citation, so full-defined-term documents carrying a citation can reach the recommended confidence (mirrors the citation-regex structural leg of the sibling AI Act patterns); Annex III deliberately excluded from the citation regex because it is also a corroborative evidence term and would double-count; the full-title regex itself was not used as the alternative because it duplicates the tier id_match and would make the leg vacuous'
  - version: 1.0.0
    date: '2026-07-08'
    description: Initial release
