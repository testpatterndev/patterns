schema: testpattern/v1
name: Business licensing applications
slug: global-top500-395-business-licensing-applications
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies business and trade licence application records, including renewal and variation
  applications. Topic phrases are retained for discovery; enforcement requires at least two populated
  applicant, enterprise, premises, activity, or licence fields, and high confidence also requires a
  formal application, licence, or permit reference.
operation: >-
  Regex_business_licensing_application recognises business or trade licence and business-permit
  applications. The topic alone is discovery-only at 65. Two distinct populated application fields
  raise it to 75; a formal application, licence, or permit identifier reaches 85. Enforcing tiers
  reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:business\s+licensing\s+applications?|(?:business|trade)\s+licen[cs]e\s+(?:applications?|renewal\s+applications?|variation\s+applications?)|applications?\s+for\s+(?:a\s+)?(?:business|trade)\s+licen[cs]e|business\s+permit\s+applications?)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires two populated application fields rather than licensing terminology
  alone. High confidence adds a formal reference tied to the application, licence, or permit.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - legal business name
    - premises address
    - business activity
    - licence category
    - application number
  proximity: 240
test_cases:
  should_match:
    - value: Business licence application
      description: Low-tier probe - licensing-application topic without populated fields
    - value: 'Business licence application; Legal business name: River Street Cafe; Premises address: 10 Queen Street; Business activity: food service'
      description: Medium-tier probe - multiple populated application fields without a formal reference
    - value: 'Business licence application; Application ID: BL-2026-1048; Legal business name: River Street Cafe; Premises address: 10 Queen Street; Licence category: food premises'
      description: High-tier probe - populated application with a formal licensing reference
  should_not_match:
    - value: 'Building and operating permit application: site plan, zoning approval, occupancy certificate, and construction inspection'
      description: Building-permit application belongs to the adjacent permit SIT
    - value: 'Export licence application for controlled goods; exporter name and destination country'
      description: Export-control licensing is not routine business licensing
    - value: 'Professional licence application: applicant name, profession, qualifications, and registration board'
      description: Individual professional licensing must not collide
    - value: The software license application tracks the license holder, entitlement, and renewal date.
      description: Software entitlement workflow is not a government business-licence application
    - value: 'Training example: Business licence application; Application ID: BL-2026-1048; Legal business name: River Street Cafe; Premises address: 10 Queen Street'
      description: Explicit training content must not enforce even with realistic fields and an identifier
false_positives:
  - description: Licensing authority guidance and blank application forms can contain the title and all expected field labels without containing a submitted application.
    mitigation: Keep title-only material at discovery and require multiple labels with populated values; reserve 85 for a formal application or licence reference.
  - description: Building, export, professional, and software licensing workflows share applicant, approval, holder, and renewal language.
    mitigation: Restrict the primary to business or trade licence and business-permit applications rather than generic licence, permit, registration, or approval phrases.
  - description: Training fixtures can contain realistic business names, premises, categories, and application numbers.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_business_licensing_application
      matches:
        - ref: Evidence_business_licensing_populated_field
          min_count: 2
          unique_results: true
        - ref: Evidence_business_licensing_formal_reference
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_business_licensing_application
      matches:
        - ref: Evidence_business_licensing_populated_field
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_business_licensing_application
  regexes:
    - id: Regex_business_licensing_application
      pattern: >-
        (?is)\b(?:business\s+licensing\s+applications?|(?:business|trade)\s+licen[cs]e\s+(?:applications?|renewal\s+applications?|variation\s+applications?)|applications?\s+for\s+(?:a\s+)?(?:business|trade)\s+licen[cs]e|business\s+permit\s+applications?)\b
    - id: Evidence_business_licensing_populated_field
      pattern: >-
        (?i)\b(?:legal\s+business\s+name|trading\s+name|trade\s+name|business\s+address|premises\s+address|entity\s+type|business\s+structure|business\s+activity|activity\s+description|applicant\s+name|responsible\s+person|licen[cs]e\s+(?:category|type)|proposed\s+commencement\s+date)\s*[:=]\s*[A-Z0-9][A-Za-z0-9&.,'()/# -]{1,80}
    - id: Evidence_business_licensing_formal_reference
      pattern: >-
        (?i)\b(?:(?:business\s+licen[cs]e\s+)?(?:application|licen[cs]e|permit)\s*(?:number|no\.?|reference|ref\.?|ID)\s*[:#=-]\s*[A-Z0-9][A-Z0-9/-]{3,})\b
risk_description: >-
  The detector targets business and trade licensing applications with populated enterprise,
  premises, activity, applicant, or licence fields rather than generic registration, approval, or
  renewal language. A normal application describes an enterprise, premises, responsible officer, and
  eligibility information used in routine regulation, much of which may later be public. Disclosure
  can inconvenience an applicant or reveal limited contact and commercial details, but significant
  misuse usually needs financial records, identity evidence, or confidential plans. Risk 5 and
  OFFICIAL are justified; SENSITIVE would require complete personal vetting material, substantial
  trade secrets, or a non-public enforcement issue.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
