schema: testpattern/v1
name: Public housing assistance files
slug: global-top500-384-public-housing-assistance-files
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies individual public or social housing assistance applications, files, cases, and allocation
  decisions. Topic phrases are retained for discovery; enforcement requires household, income,
  accommodation, housing-need, bedroom-entitlement, waitlist, priority, subsidy, allocation, or support
  fields, and high confidence also requires a formal housing reference or recorded decision.
operation: >-
  Regex_housing_assistance recognises public/social housing, rental assistance, and housing-voucher
  applications and decisions. The topic alone is discovery-only at 65. Substantive housing-assessment
  fields raise it to 75; a formal register/application reference or decision reaches 85. Enforcing
  tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:public\s+housing\s+assistance\s+(?:application|file|case)|social\s+housing\s+(?:application|file|case)|rental\s+assistance\s+application|housing\s+voucher\s+application|public\s+housing\s+allocation\s+decision)s?\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive household and housing-assessment fields. High confidence adds
  a formal register/application reference or recorded decision.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - public housing assistance files
  proximity: 240
  keyword_lists:
    - industry-education
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: public housing assistance file
      description: Low-tier probe - housing-assistance file topic without assessment fields
    - value: 'Public housing assistance application: applicant household, household income, current accommodation, housing need, bedroom entitlement, waitlist category, priority status, rental subsidy, allocation outcome, and support needs'
      description: Medium-tier probe - substantive application without formal reference or decision
    - value: 'Public housing assistance application, housing register number: HOU-2026-104: applicant household, household income, current accommodation, housing need, waitlist category, priority status, allocation outcome, support needs, and decision approved'
      description: High-tier probe - substantive application with register reference and decision
  should_not_match:
    - value: The housing authority publishes its social housing allocation policy.
      description: Public policy discussion without an individual application
    - value: The bank received a housing application for a mortgage.
      description: Private mortgage application outside public housing assistance
    - value: 'Training example: public housing assistance application HOU-2026-104 with household income, priority status, allocation outcome, and decision approved'
      description: Explicit training content must not enforce
false_positives:
  - description: Housing policy, property-management files, and mortgage applications discuss income, accommodation, priority, allocation, and support without containing a public-housing case.
    mitigation: Require a public/social housing, rental-assistance, or housing-voucher application or allocation decision before considering assessment fields.
  - description: Training housing files can contain realistic household details, register references, priority categories, offers, and decisions.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_housing_assistance
      matches:
        - ref: Evidence_housing_assessment
        - ref: Evidence_housing_formal_decision
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_housing_assistance
      matches:
        - ref: Evidence_housing_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_housing_assistance
  regexes:
    - id: Regex_housing_assistance
      pattern: >-
        (?is)\b(?:public\s+housing\s+assistance\s+(?:application|file|case)|social\s+housing\s+(?:application|file|case)|rental\s+assistance\s+application|housing\s+voucher\s+application|public\s+housing\s+allocation\s+decision)s?\b
    - id: Evidence_housing_formal_decision
      pattern: >-
        (?i)\b(?:(?:application|case|housing\s+register|property\s+offer)\s+(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|decision\s*[:=-]?\s*(?:approved|eligible|declined|denied|waitlisted|allocated))\b
  keywords:
    - id: Evidence_housing_assessment
      groups:
        - match_style: word
          terms:
            - applicant household
            - household income
            - current accommodation
            - housing need
            - bedroom entitlement
            - waitlist category
            - priority status
            - rental subsidy
            - allocation outcome
            - support needs
      strength: domain
risk_description: >-
  The classifier finds housing applications, rental-assistance records, housing vouchers, and public-housing files with government-service context. A genuine file may contain household members, income, disability or safety needs, current address, arrears, and reasons for housing insecurity, enabling fraud, stigma, or unwanted location disclosure. The ordinary case creates serious harm for one vulnerable household but does not automatically reveal a protected refuge or an entire tenant register. Risk 8 supports SENSITIVE Personal-Privacy; PROTECTED would require confidential safe accommodation, an active threat, or broad compromise of high-risk applicants.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
