schema: testpattern/v1
name: Supplier due diligence reports
slug: global-top500-149-supplier-due-diligence-reports
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to supplier due diligence reports in international contexts.
  This is third-party compliance intelligence that may contain embedded personal data; it is not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: corporate-m-and-a. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:due\s+diligence\s+report|supplier\s+due\s+diligence|vendor\s+screening|background\s+check|supplier\s+qualification|compliance\s+verification|financial\s+stability|reputational\s+risk|sanctions\s+check|beneficial\s+ownership|modern\s+slavery\s+assessment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - supplier due diligence reports
    - supplier
    - due
    - diligence
    - reports
    - procurement
    - management
  proximity: 300
  keyword_lists:
    - corporate-m-and-a
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: due diligence report
      description: Primary topic phrase match
    - value: supplier due diligence
      description: Case-insensitive topic phrase match
    - value: vendor screening
      description: Alternative topic phrase match
    - value: background check
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to supplier due diligence reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_supplier_due_diligence
      matches:
        - ref: Pattern_global_top500_149_supplier_due_diligence_reports_label_context
        - ref: Keyword_global_top500_149_supplier_due_diligence_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_supplier_due_diligence
      matches:
        - ref: Keyword_supplier_due_diligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_supplier_due_diligence
      pattern: >-
        (?is)\b(?:due\s+diligence\s+report|supplier\s+due\s+diligence|vendor\s+screening|background\s+check|supplier\s+qualification|compliance\s+verification|financial\s+stability|reputational\s+risk|sanctions\s+check|beneficial\s+ownership|modern\s+slavery\s+assessment)\b
    - id: Pattern_global_top500_149_supplier_due_diligence_reports_label_context
      pattern: (?i)\b(?:supplier\s+due\s+diligence\s+reports)\b
  keywords:
    - id: Keyword_supplier_due_diligence
      groups:
        - match_style: word
          terms:
            - due diligence report
            - supplier due diligence
            - vendor screening
            - background check
            - supplier qualification
            - compliance verification
            - financial stability
            - reputational risk
            - sanctions check
            - beneficial ownership
            - anti-bribery
            - modern slavery assessment
      strength: specific
    - id: Keyword_global_top500_149_supplier_due_diligence_reports_domain_context
      groups:
        - match_style: word
          terms:
            - supplier due diligence reports
            - supplier
            - due
            - diligence
            - reports
      strength: domain
risk_description: >-
  This concept detector recognises supplier-due-diligence, vendor-screening, background-check, and due-diligence-report language intended to identify a completed supplier review. A substantive report can reveal ownership, sanctions, adverse media, financial concerns, beneficial owners, and unresolved integrity findings, causing reputational or legal harm and enabling manipulation of procurement decisions. General screening procedures can match, but the normal true-positive unit is an evaluative dossier about a particular supplier rather than a checklist alone. Risk 8 SENSITIVE reflects serious contained commercial and legal harm; PROTECTED would require active law-enforcement intelligence, protected sources, critical national suppliers, systemic corruption, or a compromise causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
