schema: testpattern/v1
name: 外僑居留證 / 台灣地區居留證
slug: tw-resident-certificate
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects 外僑居留證 / 台灣地區居留證 patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or
  use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-taiwan-resident-certificate-number Corroborative evidence: 4 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[A-Z][A-D]\d{8}\b
confidence: high
confidence_justification: >-
  High confidence: pattern has strong structural constraints (specific format, prefix, or character class restrictions) that significantly reduce false positive rates. Added context gating and
  exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - tw
regulations:
  - PDPA (Taiwan)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - ARC
    - TARC
    - resident certificate
    - 居留證
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: AA12345678
      description: ARC with region A, type A
    - value: BC98765432
      description: ARC with region B, type C
    - value: FD45678901
      description: ARC with region F, type D
  should_not_match:
    - value: AE12345678
      description: Invalid second letter (E)
    - value: A123456789
      description: Digit in second position instead of A-D
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Two letters followed by eight digits may match some reference codes, but the A-D constraint on the second letter reduces false positives.
    mitigation: The structured format with limited second-letter range provides good validation. Keyword context further improves accuracy.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_tw_resident_certificate
      matches:
        - ref: Pattern_tw_resident_certificate_label_context
        - ref: Keyword_tw_resident_certificate_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_tw_resident_certificate
      matches:
        - ref: Keyword_tw_resident_certificate
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_tw_resident_certificate
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_tw_resident_certificate
      pattern: \b[A-Z][A-D]\d{8}\b
    - id: Pattern_tw_resident_certificate_label_context
      pattern: (?i)\b(?:外僑居留證\s+/\s+台灣地區居留證|resident|certificate)\b
  keywords:
    - id: Keyword_tw_resident_certificate
      groups:
        - match_style: word
          terms:
            - text: ARC
              case_sensitive: true
            - TARC
            - resident certificate
            - 居留證
            - 外僑居留證
            - 台灣地區居留證
            - 居留證號碼
            - alien resident certificate
            - residence permit
            - 外國人居留證
            - resident permit number
      strength: specific
    - id: Keyword_tw_resident_certificate_domain_context
      groups:
        - match_style: word
          terms:
            - 外僑居留證 / 台灣地區居留證
            - resident
            - certificate
      strength: domain
risk_rating: 5
risk_description: >-
  A Taiwan resident-certificate match is two letters followed by eight digits, with the second letter constrained to A-D and supported by residency terminology, not an immigration file. It can help an attacker impersonate a foreign or regional resident when paired with a name and biographical details, but the number alone does not grant status or access. The normal exposure concerns one resident, and the constrained letters reduce collisions with ordinary reference codes. Risk 5 and OFFICIAL reflect bounded atomic harm; a certificate image or linked immigration, employment, or financial record would be more sensitive.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-taiwan-resident-certificate-number
    title: Taiwan Resident Certificate (ARC/TARC) entity definition - Microsoft Learn
