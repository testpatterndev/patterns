updated: '2026-07-18'
changelog:
  - version: 1.4.1
    date: '2026-07-18'
    description: >-
      Adversarial accuracy pass: correct data_categories from ['pii'] to ['intellectual-property'] so package routing and workbook category claims match the detector content (description may already have been fixed in wave1).
  - version: 1.4.0
    date: '2026-07-16'
    description: 'SIT alignment wave1 (TP-00350): enforcement (75/85) now anchors on executed test-result rows tied to a candidate/RC/unreleased build (Pattern_prerelease_test_rows; line anchor from the approved candidate replaced with \b + bounded gap because ^/$ anchors are Purview-banned in this catalog — quoted-training negative remains suppressed by the template exclusion); QA/testing topic tier demoted to 65 discovery_only; adversarial test cases added.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 825 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
