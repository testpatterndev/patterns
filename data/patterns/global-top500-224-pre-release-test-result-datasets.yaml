schema: testpattern/v1
name: Pre-release test result datasets
slug: global-top500-224-pre-release-test-result-datasets
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to pre-release test result datasets in Australian contexts. Higher confidence identifies datasets of executed tests for not-yet-released builds (result
  rows with pass/fail outcomes tied to a candidate, RC, or unreleased build identifier); general QA and testing vocabulary remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword
  lists: au-healthcare-records. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:pre[\s-]+release\s+test\s+results|test\s+dataset|test\s+results|quality\s+assurance|regression\s+testing|validation\s+results|pre[\s-]+release\s+testing|test\s+report|acceptance\s+testing|performance\s+testing)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - intellectual-property
corroborative_evidence:
  keywords:
    - pre-release test result datasets
    - pre
    - release
    - test
    - result
    - datasets
    - product
    - quality
    - safety
  proximity: 300
  keyword_lists:
    - au-healthcare-records
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: pre-release test results
      description: Primary topic phrase match
    - value: test dataset
      description: Case-insensitive topic phrase match
    - value: test results
      description: Alternative topic phrase match
    - value: quality assurance
      description: Additional topic phrase match
    - value: "TC-881 | FAIL | build RC-2027.04 | latency 842 ms | expected <500 ms\nTC-882 | PASS | build RC-2027.04"
      description: Executed test-result rows tied to a release-candidate build (enforces at 75/85)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: Regression testing guide for released version 4.0.
      description: Testing discussion without candidate-build result rows — discovery only, must not enforce
    - value: The school test results were mailed to parents.
      description: Educational results, not product testing — must not enforce
    - value: 'QA training sample: TC-001 | PASS | build RC-DEMO.'
      description: Training/sample and demo markers identify synthetic data — suppressed from enforcement
    - value: test results
      description: Heading alone supplies no dataset or lifecycle evidence — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to pre-release test result datasets appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_prerelease_test_rows
      matches:
        - ref: Evidence_pre_release_test_results
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_prerelease_test_rows
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_pre_release_test_results
      matches:
        - ref: Evidence_pre_release_test_results
  regexes:
    - id: Pattern_pre_release_test_results
      pattern: >-
        (?is)\b(?:pre[\s-]+release\s+test\s+results|test\s+dataset|test\s+results|quality\s+assurance|regression\s+testing|validation\s+results|pre[\s-]+release\s+testing|test\s+report|acceptance\s+testing|performance\s+testing)\b
    - id: Pattern_au_top500_224_pre_release_test_result_datasets_label_context
      pattern: (?i)\b(?:pre\-release\s+test\s+result\s+datasets)\b
    - id: Pattern_prerelease_test_rows
      pattern: >-
        (?is)\b(?:TEST|TC)[-_ ]?\d{2,8}\s*[,|:]\s*(?:PASS|FAIL|BLOCKED)[\s\S]{0,160}\b(?:build|candidate|RC|pre-release|unreleased)\b
  keywords:
    - id: Evidence_pre_release_test_results
      groups:
        - match_style: word
          terms:
            - pre-release test results
            - test dataset
            - test results
            - quality assurance
            - regression testing
            - validation results
            - pre-release testing
            - test report
            - acceptance testing
            - performance testing
    - id: Keyword_au_top500_224_pre_release_test_result_datasets_domain_context
      groups:
        - match_style: word
          terms:
            - pre-release test result datasets
            - pre
            - release
            - test
            - result
            - datasets
risk_description: >-
  The regex identifies pre-release test-result or test-dataset references with quality and test context, representing an unreleased body of performance evidence rather than public AI or technology terminology. A genuine dataset can reveal product capabilities, defects, acceptance thresholds, experimental outcomes, and launch readiness to a competitor or counterparty. The normal unit affects one development or assurance program and may contain no personal data, while broad phrases such as test results and quality assurance also occur in templates and training. Risk 7 and SENSITIVE InfoTech reflect credible proprietary harm; risk 8 or PROTECTED requires decisive strategic results, large linked datasets, safety-critical failure evidence, or significant market or operational damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
