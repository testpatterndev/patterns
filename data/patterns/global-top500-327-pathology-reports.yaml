schema: testpattern/v1
name: Pathology reports
slug: global-top500-327-pathology-reports
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies pathology reports references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: au-healthcare-records. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:pathology\s+report|biopsy\s+report|tissue\s+sample|microscopic\s+examination|gross\s+description|surgical\s+pathology)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - pathology reports
    - pathology
    - reports
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - au-healthcare-records
test_cases:
  should_match:
    - value: pathology report
      description: Primary topic phrase match
    - value: biopsy report
      description: Case-insensitive topic phrase match
    - value: tissue sample
      description: Alternative topic phrase match
    - value: microscopic examination
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_pathology_reports
      matches:
        - ref: Pattern_global_top500_327_pathology_reports_label_context
        - ref: Keyword_global_top500_327_pathology_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_pathology_reports
      matches:
        - ref: Keyword_pathology_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_pathology_reports
      matches:
        - ref: Keyword_pathology_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_pathology_reports
      pattern: (?is)\b(?:pathology\s+report|biopsy\s+report|tissue\s+sample|microscopic\s+examination|gross\s+description|surgical\s+pathology)\b
    - id: Pattern_global_top500_327_pathology_reports_label_context
      pattern: (?i)\\b(?:pathology\\s+reports|pathology|reports|top500)\\b
  keywords:
    - id: Keyword_pathology_reports
      groups:
        - match_style: word
          terms:
            - pathology report
            - histopathology
            - biopsy report
            - cytology
            - tissue sample
            - health
            - biomedical
            - pathologist
            - specimen
            - microscopic examination
            - gross description
            - surgical pathology
    - id: Keyword_global_top500_327_pathology_reports_domain_context
      groups:
        - match_style: word
          terms:
            - pathology reports
            - pathology
            - reports
            - top500
            - field
            - identifier
            - reference
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.legislation.gov.au/C2012A00063/latest/text
  - https://www.safetyandquality.gov.au/standards/nsqhs-standards
