schema: testpattern/v1
name: CI/CD pipeline configurations
slug: global-top500-245-ci-cd-pipeline-configurations
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies ci/cd pipeline configurations patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:CI\/CD\s+pipeline|pipeline\s+configuration|build\s+pipeline|deployment\s+pipeline|continuous\s+integration|continuous\s+delivery|build\s+configuration|pipeline\s+definition|pipeline\s+secret|build\s+artifact)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - ci/cd pipeline configurations
    - pipeline
    - configurations
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: CI/CD pipeline
      description: Primary topic phrase match
    - value: pipeline configuration
      description: Case-insensitive topic phrase match
    - value: build pipeline
      description: Alternative topic phrase match
    - value: deployment pipeline
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_ci_cd_pipeline_configs
      matches:
        - ref: Pattern_global_top500_245_ci_cd_pipeline_configurations_label_context
        - ref: Keyword_global_top500_245_ci_cd_pipeline_configurations_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_ci_cd_pipeline_configs
      matches:
        - ref: Keyword_ci_cd_pipeline_configs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ci_cd_pipeline_configs
      pattern: >-
        (?is)\b(?:CI\/CD\s+pipeline|pipeline\s+configuration|build\s+pipeline|deployment\s+pipeline|continuous\s+integration|continuous\s+delivery|build\s+configuration|pipeline\s+definition|pipeline\s+secret|build\s+artifact)\b
    - id: Pattern_global_top500_245_ci_cd_pipeline_configurations_label_context
      pattern: (?i)\b(?:ci/cd\s+pipeline\s+configurations)\b
  keywords:
    - id: Keyword_ci_cd_pipeline_configs
      groups:
        - match_style: word
          terms:
            - CI/CD pipeline
            - pipeline configuration
            - build pipeline
            - deployment pipeline
            - continuous integration
            - continuous delivery
            - build configuration
            - pipeline definition
            - pipeline secret
            - build artifact
      strength: specific
    - id: Keyword_global_top500_245_ci_cd_pipeline_configurations_domain_context
      groups:
        - match_style: word
          terms:
            - ci/cd pipeline configurations
            - pipeline
            - configurations
      strength: domain
risk_description: >-
  The pattern recognises CI/CD pipeline, pipeline config, build pipeline, or deployment pipeline language, identifying a likely automation record without extracting configuration values. A genuine pipeline configuration can disclose build stages, deployment targets, approval gates, runner identities, and secret references that support software-supply-chain or environment attacks. General DevOps guidance and product documentation can match, and a normal true positive is bounded to one workflow unless the surrounding file shows wider reach. Risk 7 SENSITIVE reflects moderate operational and security harm from a substantive configuration; PROTECTED would require control of a critical release chain or another basis for significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
