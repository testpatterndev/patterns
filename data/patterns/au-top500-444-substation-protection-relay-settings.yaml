schema: testpattern/v1
name: Substation protection relay settings
slug: au-top500-444-substation-protection-relay-settings
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to substation protection relay settings in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:protection\s+relay|relay\s+setting|distance\s+relay|pickup\s+setting|trip\s+setting|critical\s+infrastructure|power\s+grid|electrical\s+protection|fault\s+current|impedance\s+relay)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - substation protection relay settings
    - substation
    - protection
    - relay
    - settings
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: protection relay
      description: Primary topic phrase match
    - value: relay setting
      description: Case-insensitive topic phrase match
    - value: distance relay
      description: Alternative topic phrase match
    - value: pickup setting
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: protection relay substation
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to substation protection relay settings appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_substation_protection_relay
      matches:
        - ref: Evidence_substation_protection_relay
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_substation_protection_relay
      matches:
        - ref: Evidence_substation_protection_relay
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_substation_protection_relay
      matches:
        - ref: Evidence_substation_protection_relay
  regexes:
    - id: Pattern_substation_protection_relay
      pattern: (?is)\b(?:protection\s+relay|relay\s+setting|distance\s+relay|pickup\s+setting|trip\s+setting|critical\s+infrastructure|power\s+grid|electrical\s+protection|fault\s+current|impedance\s+relay)\b
  keywords:
    - id: Evidence_substation_protection_relay
      groups:
        - match_style: word
          terms:
            - protection relay
            - substation
            - relay setting
            - distance relay
            - overcurrent
            - pickup setting
            - trip setting
            - critical infrastructure
            - power grid
            - electrical protection
            - fault current
            - impedance relay
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
