schema: testpattern/v1
name: Kartu Tanda Penduduk (KTP)
slug: id-identity-card-ktp
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Kartu Tanda Penduduk (KTP) patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT
  directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-indonesia-identity-card-number Corroborative evidence: 4 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{16}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - id
regulations:
  - PDP Law (Indonesia)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - KTP
    - kartu tanda penduduk
    - NIK
    - identity card
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '3201011234567890'
      description: KTP from West Java province
    - value: '3175011234567890'
      description: KTP from DKI Jakarta
    - value: '5101011234567890'
      description: KTP from Bali province
  should_not_match:
    - value: '320101123456789'
      description: Too few digits (15)
    - value: '32010112345678901'
      description: Too many digits (17)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Sixteen-digit numeric sequences may match credit card numbers, long account numbers, or barcodes.
    mitigation: Require corroborative evidence keywords such as "KTP", "NIK", or "kartu tanda penduduk" within the proximity window.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_id_identity_card_ktp
      matches:
        - ref: Pattern_id_identity_card_ktp_label_context
        - ref: Keyword_id_identity_card_ktp_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_id_identity_card_ktp
      matches:
        - ref: Keyword_id_identity_card_ktp
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_id_identity_card_ktp
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_id_identity_card_ktp
      pattern: \b\d{16}\b
    - id: Pattern_id_identity_card_ktp_label_context
      pattern: (?i)\b(?:kartu\s+tanda\s+penduduk\s+\(ktp\)|kartu|tanda|penduduk|ktp|identity|card)\b
  keywords:
    - id: Keyword_id_identity_card_ktp
      groups:
        - match_style: word
          terms:
            - text: KTP
              case_sensitive: true
            - Kartu Tanda Penduduk
            - kartu tanda penduduk
            - text: NIK
              case_sensitive: true
            - Nomor Induk Kependudukan
            - nomor induk kependudukan
            - identity card
            - kartu identitas
            - nomor KTP
            - penduduk
            - kependudukan
            - kartu penduduk
      strength: specific
    - id: Keyword_id_identity_card_ktp_domain_context
      groups:
        - match_style: word
          terms:
            - kartu tanda penduduk (ktp)
            - kartu
            - tanda
            - penduduk
            - ktp
            - identity
            - card
      strength: domain
  filters:
    - id: Filter_id_ktp_same
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The Indonesian KTP detector finds a 16-digit national identity-number candidate with civic context and template exclusions. A genuine NIK encodes regional and birth-related components and can link a resident across government and commercial services, enabling targeted impersonation when combined with a name or contact information. The raw length also overlaps with payment-card numbers, long accounts, and barcodes, and the detector does not establish checksum validity, ownership, or document status. Risk 5 OFFICIAL reflects bounded encoded-information and correlation harm; SENSITIVE would require verified attribution or a complete identity or service record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-indonesia-identity-card-number
    title: Indonesia Identity Card (KTP) Number entity definition - Microsoft Learn
