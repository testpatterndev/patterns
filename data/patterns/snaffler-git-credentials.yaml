schema: testpattern/v1
name: Git Credentials in URL
slug: snaffler-git-credentials
version: 1.1.2
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects embedded credentials (username:password) in Git repository URLs. Mirrors
  Snaffler rule KeepGitCredsByName.
operation: >-
  Matches HTTP/HTTPS URLs containing user:password@ format before the hostname.
  Credentials embedded in Git clone URLs or .git-credentials files are high-value
  secrets that grant repository access.
risk_description: >-
  Git Credentials in URL detects a username and password or token embedded before the host in an HTTP or HTTPS repository URL. A genuine match can grant immediate repository access, expose proprietary source and history, or allow malicious commits and downstream supply-chain compromise. The affected scope depends on token privileges and repository protections, so serious harm is likely but not automatically enterprise-wide. Risk 8 and SENSITIVE InfoTech fit; PROTECTED would require organization-admin credentials, critical signing or deployment authority, or compromise capable of significant systemic damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: https?://[^\s:/@]{1,64}:[^\s:/@]{1,128}@[A-Za-z0-9.-]{1,255}
confidence: high
confidence_justification: >-
  High confidence: the user:password@ URL structure is highly specific. The constraint
  on allowed characters in username and password fields (no whitespace, colon, slash,
  or @) tightly bounds the match. Corroborative evidence further reduces false positives.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - github.com
    - gitlab
    - dev.azure.com
    - bitbucket
    - git-credentials
  proximity: 300
test_cases:
  should_match:
    - value: "https://alice:S3cretValue@code.internal"
      description: Exact 65 probe - generic credential-bearing URL retained for discovery only
    - value: "https://deploy:hunter2@gitlab.internal"
      description: Exact 75 probe - embedded credentials on a recognised source-control host
    - value: "git clone https://oauth2:glpat-aB3dE6gH9jK2mN5pQ8sT@gitlab.com/group/repo.git"
      description: Exact 85 probe - source-control host plus repository path and Git operation
  should_not_match:
    - value: "https://github.com/org/repo.git"
      description: No credentials embedded
    - value: "https://example.com/page?ref=main"
      description: Query string, not credentials
    - value: "git clone https://deploy:********@github.com/org/repo.git"
      description: Masked secret in a credential URL must not enforce
    - value: "Documentation example: git clone https://user:password@github.com/org/repo.git"
      description: Instructional placeholder URL is excluded
    - value: "https://user@github.com/org/repo.git"
      description: Malformed credential URL is missing the password separator
false_positives:
  - description: Service accounts or CI/CD pipeline logs that mask credentials with asterisks but retain URL structure.
    mitigation: Check for placeholder patterns like asterisks or literal "password" in the credential field.
  - description: Documentation examples showing URL format with placeholder credentials.
    mitigation: Require proximity to git-specific hosting domains to reduce documentation false positives.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_git_credentials
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_snaffler_git_masked_secret
    - confidence_level: 75
      id_match: Regex_snaffler_git_credentials
      matches:
        - ref: Keyword_snaffler_git_credentials_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_snaffler_git_masked_secret
    - confidence_level: 85
      id_match: Regex_snaffler_git_credentials
      matches:
        - ref: Keyword_snaffler_git_credentials_evidence
        - ref: Pattern_snaffler_git_repository_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_snaffler_git_masked_secret
  regexes:
    - id: Regex_snaffler_git_credentials
      pattern: https?://[^\s:/@]{1,64}:[^\s:/@]{1,128}@[A-Za-z0-9.-]{1,255}
    - id: Pattern_snaffler_git_repository_context
      pattern: (?i)(?:\bgit\s+clone\b|/[^/\s]+/[^/\s]+\.git\b|git-credentials)
    - id: Pattern_snaffler_git_masked_secret
      pattern: (?i)https?://[^\s:/@]{1,64}:(?:\*{3,}|x{4,}|password|<[^>]+>)@
  keywords:
    - id: Keyword_snaffler_git_credentials_evidence
      groups:
        - match_style: string
          terms:
            - github.com
            - gitlab.
            - dev.azure.com
            - bitbucket.
            - git-credentials
      strength: specific
