schema: testpattern/v1
name: National identity number
slug: global-top500-022-national-identity-number
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to national identity number in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:national\s+identity\s+number|national\s+ID|identity\s+card|ID\s+number|identity\s+document|government\s+ID|personal\s+identification\s+number|national\s+registration|citizen\s+ID|identification\s+number|identity\s+verification)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - national identity number
  proximity: 240
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: national identity number
      description: Primary topic phrase match
    - value: national id
      description: Case-insensitive topic phrase match
    - value: identity card
      description: Alternative topic phrase match
    - value: ID number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to national identity number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 90
      id_match: Regex_national_identity_number
      matches:
        - ref: Pattern_global_top500_022_national_identity_number_label_context
        - ref: Keyword_global_top500_022_national_identity_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_national_identity_number
      matches:
        - ref: Keyword_national_identity_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_national_identity_number
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_national_identity_number
      pattern: >-
        (?is)\b(?:national\s+identity\s+number|national\s+ID|identity\s+card|ID\s+number|identity\s+document|government\s+ID|personal\s+identification\s+number|national\s+registration|citizen\s+ID|identification\s+number|identity\s+verification)\b
    - id: Pattern_global_top500_022_national_identity_number_label_context
      pattern: (?i)\\b(?:national\\s+identity\\s+number|national|identity|top500)\\b
  keywords:
    - id: Keyword_national_identity_number
      groups:
        - match_style: word
          terms:
            - national identity number
            - national ID
            - identity card
            - ID number
            - identity document
            - government ID
            - personal identification number
            - national registration
            - citizen ID
            - identification number
            - identity verification
    - id: Keyword_global_top500_022_national_identity_number_domain_context
      groups:
        - match_style: word
          terms:
            - national identity number
            - national
            - identity
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
