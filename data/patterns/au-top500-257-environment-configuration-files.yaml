schema: testpattern/v1
name: Environment configuration files
slug: au-top500-257-environment-configuration-files
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies actual environment configuration files in security and access control contexts:
  enforcement requires consecutive environment-variable assignment lines (APP_ENV, NODE_ENV,
  DATABASE_URL, API_BASE_URL and similar) while configuration-topic vocabulary alone remains
  discovery-only. Sensitive values or internal endpoints are a severity signal, not the
  definition of the file.
operation: >-
  Pattern type: regex (boost_regex engine). Topic phrases (config file, environment variable,
  application settings) feed a 65 discovery-only tier; enforcement requires
  Pattern_environment_assignments — two consecutive KEY=value lines drawn from a fixed
  environment-variable whitelist — at 75, with configuration-topic evidence within 300
  characters raising it to 85. The shared template exclusion vetoes sample/tutorial text at
  enforcement tiers.
pattern: >-
  (?is)\b(?:environment\s+configuration|config\s+file|environment\s+variable|connection\s+string|application\s+settings|environment\s+secrets|configuration\s+management|deployment\s+config|environment\s+settings)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - environment configuration files
    - environment
    - configuration
    - files
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: 'Environment configuration'
      description: Topic phrase present
    - value: 'environment configuration'
      description: Topic phrase, lowercase
    - value: 'this file holds environment configuration values'
      description: Phrase in surrounding text
    - value: "APP_ENV=production\nAPI_BASE_URL=https://api.internal.corp\nLOG_LEVEL=warn\nFEATURE_LEDGER_V2=true"
      description: Consecutive populated environment assignments reach the enforcing tiers
    - value: 'Policy says every environment variable belongs in the settings guide.'
      description: Configuration-topic prose matches the discovery branch only (no assignment lines, no enforcement)
  should_not_match:
    - value: 'unrelated generic text'
      description: No relevant phrase
    - value: 'random prose without anchors'
      description: No anchors
    - value: 'template example placeholder'
      description: Template/sample text
    - value: 'The conference environment affected the speaker''s settings.'
      description: Ordinary prose use of environment/settings has no topic phrase or assignment line
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_environment_assignments
      matches:
        - ref: Evidence_environment_config_files
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_environment_assignments
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_environment_config_files
      matches:
        - ref: Evidence_environment_config_files
  regexes:
    - id: Pattern_environment_config_files
      pattern: >-
        (?is)\b(?:environment\s+configuration|config\s+file|environment\s+variable|connection\s+string|application\s+settings|environment\s+secrets|configuration\s+management|deployment\s+config|environment\s+settings)\b
    - id: Pattern_environment_assignments
      pattern: >-
        (?i)\b(?:APP_ENV|NODE_ENV|ASPNETCORE_ENVIRONMENT|DATABASE_URL|API_BASE_URL|SERVICE_HOST|LOG_LEVEL|FEATURE_[A-Z0-9_]{1,40})[ \t]{0,8}=[ \t]{0,8}[^\s#][^\r\n]{0,200}\r?\n[ \t]{0,8}(?:APP_ENV|NODE_ENV|ASPNETCORE_ENVIRONMENT|DATABASE_URL|API_BASE_URL|SERVICE_HOST|LOG_LEVEL|FEATURE_[A-Z0-9_]{1,40})[ \t]{0,8}=[ \t]{0,8}[^\s#][^\r\n]{0,200}
  keywords:
    - id: Evidence_environment_config_files
      groups:
        - match_style: word
          terms:
            - environment configuration
            - config file
            - environment variable
            - connection string
            - application settings
            - environment secrets
            - dotenv
            - configuration management
            - deployment config
            - environment settings
risk_description: >-
  This concept detector finds environment-configuration language and file context, so it signals a configuration artifact or topic rather than proving that secrets are present. A disclosed file can reveal service endpoints, environment names, feature settings, database references, internal hosts, and secret-variable names that support targeted attack or operational sabotage. The application owner and users of the configured environment may face serious reconnaissance and availability harm, but actual modification or access normally requires separate credentials and the file may contain only non-secret settings. Risk 8 and SENSITIVE fit a substantive production configuration, while embedded live secrets or control of a critical multi-system environment would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: >-
      Reduced-scope tier rebalance (TP-00383): configuration-topic vocabulary no longer enforces
      (a configuration-management policy sentence previously reached 85 via the same-span phrase
      list) — the topic branch is demoted to 65 discovery_only. Enforcement now anchors on
      Pattern_environment_assignments (two consecutive KEY=value lines from a fixed
      environment-variable whitelist): 75 with template exclusion, 85 with additional
      configuration-topic evidence. The whitelist regex is restructured from the approved
      candidate to satisfy repo CI (no multiline anchors or nested quantifiers) while keeping
      the 2+ consecutive-line semantics. Added assignment-block positive, policy-prose
      discovery case, and generic-prose negative.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 858 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
