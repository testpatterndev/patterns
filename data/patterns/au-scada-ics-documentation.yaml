  - SCADA
  - supervisory control
  - data acquisition
  - PLC
  - programmable logic controller
  - DCS
  - distributed control
  - HMI
  - human machine interface
  - RTU
  - remote terminal unit
  - ICS
  - industrial control
  - Modbus
