schema: testpattern/v1
name: SCADA/ICS System Documentation
slug: au-scada-ics-documentation
version: 1.3.0
type: keyword_list
pattern_class: concept
description: >-
  Detects SCADA and industrial control system documentation including PLC programming, HMI configurations, and OT
  protocols.
operation: >-
  Keyword-based detection matching SCADA, PLC, HMI, DCS, and industrial control protocol references. Corroborative
  evidence: 17 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "Criminal Code Act 1995 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
data_categories:
  - infrastructure
  - technology
test_cases:
  should_match:
    - value: 'SCADA system documentation: PLC programming for Modbus RTU'
      description: Test match 1
    - value: ICS configuration manual with HMI and DCS setup for DNP3 protocol
      description: Test match 2
    - value: 'Industrial control system architecture: RTU and OPC UA integration'
      description: Test match 3
  should_not_match:
    - value: Remote control for the television
      description: Non-match 1
    - value: System documentation for the website
      description: Non-match 2
false_positives:
  - description: Generic control system or protocol references in IT contexts.
    mitigation: Require SCADA/ICS-specific terms like PLC, HMI, or Modbus.
exports:
  - yaml
scope: narrow
risk_rating: 10
risk_description: SCADA/ICS documentation exposure enables attacks on industrial control systems.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: "PROTECTED InfoTech"
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_scada_ics
      matches:
        - ref: Keyword_scada
        - ref: Keyword_control_system
    - confidence_level: 85
      id_match: Regex_scada_ics
      matches:
        - ref: Keyword_ot_protocols
    - confidence_level: 75
      id_match: Regex_plc_hmi
      matches:
        - ref: Keyword_industrial
  regexes:
    - id: Regex_scada_ics
      pattern: (?i)\b(?:scada|supervisory\s+control|industrial\s+control\s+system|ics)\b
    - id: Regex_plc_hmi
      pattern: (?i)\b(?:plc|programmable\s+logic\s+controller|hmi|human\s+machine\s+interface|dcs|distributed\s+control)\b
  keywords:
    - id: Keyword_scada
      groups:
        - match_style: word
          terms:
            - SCADA
            - supervisory control
            - data acquisition
            - SCADA network
            - SCADA system
            - control centre
            - control center
      strength: specific
    - id: Keyword_control_system
      groups:
        - match_style: word
          terms:
            - text: PLC
              case_sensitive: true
            - programmable logic controller
            - text: DCS
              case_sensitive: true
            - distributed control
            - text: HMI
              case_sensitive: true
            - human machine interface
            - text: RTU
              case_sensitive: true
            - remote terminal unit
            - text: ICS
              case_sensitive: true
            - industrial control
      strength: domain
    - id: Keyword_ot_protocols
      groups:
        - match_style: word
          terms:
            - Modbus
            - Profibus
            - Profinet
            - text: OPC
              case_sensitive: true
            - OPC UA
            - DNP3
            - IEC 60870
            - EtherNet/IP
            - HART
            - 4-20mA
            - IEC 61850
            - IEC 60870-5-104
            - BACnet
            - OPC-UA
            - OPC Classic
            - Modbus TCP
            - Modbus RTU
      strength: domain
    - id: Keyword_industrial
      groups:
        - match_style: word
          terms:
            - industrial
            - manufacturing
            - automation
            - process control
            - field device
            - sensor network
            - actuator
      strength: domain
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.2.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
