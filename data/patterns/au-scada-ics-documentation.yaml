schema: testpattern/v1
name: SCADA/ICS System Documentation
slug: au-scada-ics-documentation
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive SCADA and industrial-control-system documentation. Topic phrases are retained
  for discovery; enforcement requires point, tag, I/O, alarm, HMI, RTU, protocol-map, polling, or
  control-logic configuration content, and high confidence also requires a populated asset, node,
  address, register, outstation, or site detail.
operation: >-
  Regex_scada_ics_documentation recognises SCADA/ICS system, configuration, network, and architecture
  documentation topics. The topic alone is discovery-only at 65. Concrete point/tag/I/O/alarm/HMI/RTU
  or protocol configuration content raises it to 75; populated asset, address, register, outstation, or
  node details reach 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:SCADA\s+(?:system|configuration|network|architecture)\s+documentation|ICS\s+(?:system|configuration|network|architecture)\s+documentation|industrial\s+control\s+system\s+(?:documentation|configuration\s+manual)|SCADA/ICS\s+(?:documentation|architecture))\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive control-system configuration content. High confidence adds a
  deployable asset, node, address, protocol register, outstation, or site value.
jurisdictions:
  - au
regulations:
- "Criminal Code Act 1995 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
data_categories:
  - infrastructure
  - technology
test_cases:
  should_match:
    - value: SCADA system documentation
      description: Low-tier probe - document topic without configuration content
    - value: 'SCADA configuration documentation: tag database, I/O mapping, alarm configuration, HMI screen, and Modbus register map'
      description: Medium-tier probe - substantive configuration content without populated live values
    - value: 'SCADA system documentation for production RTU node RTU-07 at 10.24.8.15: protocol register map contains Modbus register 40017, and the tag database maps PUMP_RUN to HMI node HMI-02'
      description: High-tier probe - configuration content with populated asset, address, register, tag, and node details
  should_not_match:
    - value: Remote control for the television
      description: Non-match 1
    - value: System documentation for the website
      description: Generic IT documentation outside industrial control
    - value: 'The vendor guide introduces SCADA system architecture.'
      description: Product overview without a configuration record
    - value: 'Training example: SCADA system documentation for RTU-07 at 10.24.8.15, Modbus register 40017'
      description: Explicit training content must not enforce
false_positives:
  - description: Vendor manuals, standards, and engineering courses discuss SCADA, PLCs, HMIs, RTUs, and OT protocols without exposing a live system configuration.
    mitigation: Keep document topics discovery-only and require point, tag, I/O, alarm, HMI, RTU, polling, protocol-map, or control-logic content for enforcement.
  - description: Training labs can include realistic asset IDs, IP addresses, register numbers, tags, and node names.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - yaml
scope: narrow
risk_rating: 10
risk_description: >-
  This TestPattern identifies SCADA and industrial-control documentation through control-system names, PLC or HMI terms, and OT protocol evidence. An attacker could apply the documented architecture or configuration to manipulate field devices, evade safeguards, or disrupt physical processes. The composite record may affect the operator, essential-service customers, assets, and public safety rather than a single technical identifier. Risk 10 and PROTECTED InfoTech are justified, and no higher QGISCF tier exists.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_scada_ics_documentation
      matches:
        - ref: Evidence_scada_configuration_content
        - ref: Evidence_scada_live_detail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Regex_scada_ics_documentation
      matches:
        - ref: Evidence_scada_configuration_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_scada_ics_documentation
  regexes:
    - id: Regex_scada_ics_documentation
      pattern: >-
        (?is)\b(?:SCADA\s+(?:system|configuration|network|architecture)\s+documentation|ICS\s+(?:system|configuration|network|architecture)\s+documentation|industrial\s+control\s+system\s+(?:documentation|configuration\s+manual)|SCADA/ICS\s+(?:documentation|architecture))\b
    - id: Evidence_scada_live_detail
      pattern: >-
        (?i)\b(?:(?:PLC|RTU|HMI|DCS)\s*(?:ID|node|station)?\s*[:#-]\s*[A-Z0-9][A-Z0-9._-]{2,}|(?:Modbus\s+register|DNP3\s+outstation)\s*[:#]?\s*\d+|(?:\d{1,3}\.){3}\d{1,3})\b
  keywords:
    - id: Evidence_scada_configuration_content
      groups:
        - match_style: word
          terms:
            - point list
            - tag database
            - I/O mapping
            - alarm configuration
            - HMI screen
            - RTU mapping
            - polling configuration
            - protocol register map
            - control logic
            - interlock
            - historian mapping
      strength: domain
created: '2026-02-09'
updated: '2026-07-04'
changelog:
  - version: 1.4.0
    date: '2026-07-04'
    description: 'CI profile hardening: convert the broad keyword-list detector to a regex-backed concept; require point, tag, I/O, alarm, HMI, RTU, protocol-map, polling, or logic configuration at 75 and populated asset, address, register, outstation, or node detail at 85.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 594 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.2.0
