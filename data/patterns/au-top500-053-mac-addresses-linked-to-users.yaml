schema: testpattern/v1
name: MAC addresses linked to users
slug: au-top500-053-mac-addresses-linked-to-users
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to mac addresses linked to users in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: pii-personal, phone-international. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:MAC\s+addresses\s+linked\s+to\s+users|MAC\s+address|hardware\s+address|physical\s+address|network\s+interface|WiFi\s+address|Bluetooth\s+address|device\s+fingerprint|network\s+identifier|ethernet\s+address|wireless\s+adapter)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - mac addresses linked to users
    - mac
    - addresses
    - linked
    - users
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - pii-personal
    - phone-international
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: MAC addresses linked to users
      description: Primary topic phrase match
    - value: mac address
      description: Case-insensitive topic phrase match
    - value: hardware address
      description: Alternative topic phrase match
    - value: physical address
      description: Additional topic phrase match
    - value: 'Access log: MAC address assigned to employee Priya Rao.'
      description: Device-address concept with explicit user-linkage relation (reaches the enforcing tiers)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
    - value: Router physical address configuration guide.
      description: Hardware documentation without any user-linkage relation must not reach the enforcing tiers
    - value: Security training shows how a MAC address can be linked to users.
      description: Explanatory prose — linked to users is not an authored relational linkage phrase, so enforcement must not fire
false_positives:
  - description: Common words and phrases related to mac addresses linked to users appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_mac_address
      matches:
        - ref: Evidence_mac_address
          min_count: 2
          unique_results: true
        - ref: Evidence_mac_user_linkage
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_mac_address
      matches:
        - ref: Evidence_mac_address
        - ref: Evidence_mac_user_linkage
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_mac_address
      matches:
        - ref: Evidence_mac_address
      discovery_only: true
  regexes:
    - id: Pattern_mac_address
      pattern: >-
        (?is)\b(?:MAC\s+addresses\s+linked\s+to\s+users|MAC\s+address|hardware\s+address|physical\s+address|network\s+interface|WiFi\s+address|Bluetooth\s+address|device\s+fingerprint|network\s+identifier|ethernet\s+address|wireless\s+adapter)\b
    - id: Pattern_au_top500_053_mac_addresses_linked_to_users_label_context
      pattern: (?i)\b(?:mac\s+addresses\s+linked\s+to\s+users)\b
  keywords:
    - id: Evidence_mac_address
      groups:
        - match_style: word
          terms:
            - MAC addresses linked to users
            - MAC address
            - hardware address
            - physical address
            - network interface
            - WiFi address
            - Bluetooth address
            - text: OUI
              case_sensitive: true
            - device fingerprint
            - network identifier
            - ethernet address
            - wireless adapter
      strength: specific
    - id: Evidence_mac_user_linkage
      groups:
        - match_style: word
          terms:
            - assigned to
            - device owner
            - associated user
            - authenticated user
            - access log
      strength: domain
    - id: Keyword_au_top500_053_mac_addresses_linked_to_users_domain_context
      groups:
        - match_style: word
          terms:
            - mac addresses linked to users
            - mac
            - addresses
            - linked
            - users
      strength: domain
risk_description: >-
  This concept detector identifies references to MAC addresses and device-network identifiers in a user-linkage context rather than validating a specific hexadecimal address. A genuine association can let an observer correlate a person with a device, Wi-Fi presence, or access activity across systems. The likely impact is limited to the linked users and devices, but it can be direct when combined with authentication or location logs. Risk 7 and SENSITIVE InfoTech are defensible for that association; PROTECTED is not warranted without large-scale tracking, privileged access, or severe consequences.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
