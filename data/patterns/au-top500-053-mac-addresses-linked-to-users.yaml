    date: '2026-07-17'
    description: 'TP-00181 approved reduced scope: add Evidence_mac_user_linkage restricted to relational phrases only (assigned to, device owner, associated user, authenticated user, access log — QA refinement: bare person nouns user/employee/account/login deliberately excluded) and require it on the 75/85 enforcing tiers, which retain the existing template-exclusion NOT-gate; demote the address-topic-only 65 tier to discovery_only. Not implemented (undefined references): 48-bit hexadecimal MAC structure (out of scope for this concept class) and a manuals/configuration-guide exclusion dictionary. Added an access-log linkage positive plus router-guide and security-training negatives.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 656 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
