schema: testpattern/v1
name: MAC addresses linked to users
slug: au-top500-053-mac-addresses-linked-to-users
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to mac addresses linked to users in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: pii-personal, phone-international. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:MAC\s+addresses\s+linked\s+to\s+users|MAC\s+address|hardware\s+address|physical\s+address|network\s+interface|WiFi\s+address|Bluetooth\s+address|device\s+fingerprint|network\s+identifier|ethernet\s+address|wireless\s+adapter)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - mac addresses linked to users
    - mac
    - addresses
    - linked
    - users
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - pii-personal
    - phone-international
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: MAC addresses linked to users
      description: Primary topic phrase match
    - value: mac address
      description: Case-insensitive topic phrase match
    - value: hardware address
      description: Alternative topic phrase match
    - value: physical address
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to mac addresses linked to users appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_mac_address
      matches:
        - ref: Evidence_mac_address
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_mac_address
      matches:
        - ref: Evidence_mac_address
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_mac_address
      matches:
        - ref: Evidence_mac_address
  regexes:
    - id: Pattern_mac_address
      pattern: >-
        (?is)\b(?:MAC\s+addresses\s+linked\s+to\s+users|MAC\s+address|hardware\s+address|physical\s+address|network\s+interface|WiFi\s+address|Bluetooth\s+address|device\s+fingerprint|network\s+identifier|ethernet\s+address|wireless\s+adapter)\b
    - id: Pattern_au_top500_053_mac_addresses_linked_to_users_label_context
      pattern: (?i)\\b(?:mac\\s+addresses\\s+linked\\s+to\\s+users|mac|addresses|linked|users|top500)\\b
  keywords:
    - id: Evidence_mac_address
      groups:
        - match_style: word
          terms:
            - MAC addresses linked to users
            - MAC address
            - hardware address
            - physical address
            - network interface
            - WiFi address
            - Bluetooth address
            - OUI
            - device fingerprint
            - network identifier
            - ethernet address
            - wireless adapter
    - id: Keyword_au_top500_053_mac_addresses_linked_to_users_domain_context
      groups:
        - match_style: word
          terms:
            - mac addresses linked to users
            - mac
            - addresses
            - linked
            - users
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
