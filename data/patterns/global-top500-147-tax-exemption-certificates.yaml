schema: testpattern/v1
name: Tax exemption certificates
slug: global-top500-147-tax-exemption-certificates
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to tax exemption certificates in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: credentials-api-keys, credentials-passwords. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:tax\s+exemption|exemption\s+certificate|tax\s+exempt|sales\s+tax\s+exemption|GST\s+exemption|VAT\s+exemption|withholding\s+tax|tax\s+clearance|certificate\s+of\s+exemption|resale\s+certificate|charitable\s+exemption|W[\s-]+9\s+form)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - tax exemption certificates
    - tax
    - exemption
    - certificates
    - procurement
    - supplier
    - management
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: tax exemption
      description: Primary topic phrase match
    - value: exemption certificate
      description: Case-insensitive topic phrase match
    - value: tax exempt
      description: Alternative topic phrase match
    - value: sales tax exemption
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to tax exemption certificates appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_tax_exemption_certificates
      matches:
        - ref: Pattern_global_top500_147_tax_exemption_certificates_label_context
        - ref: Keyword_global_top500_147_tax_exemption_certificates_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_147_tax_exemption_certificates_noise_exclusion
    - confidence_level: 75
      id_match: Regex_tax_exemption_certificates
      matches:
        - ref: Keyword_tax_exemption_certificates
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_147_tax_exemption_certificates_noise_exclusion
    - confidence_level: 65
      id_match: Regex_tax_exemption_certificates
      matches:
        - ref: Keyword_tax_exemption_certificates
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_147_tax_exemption_certificates_noise_exclusion
  regexes:
    - id: Regex_tax_exemption_certificates
      pattern: (?is)\b(?:tax\s+exemption|exemption\s+certificate|tax\s+exempt|sales\s+tax\s+exemption|GST\s+exemption|VAT\s+exemption|withholding\s+tax|tax\s+clearance|certificate\s+of\s+exemption|resale\s+certificate|charitable\s+exemption|W[\s-]+9\s+form)\b
    - id: Pattern_global_top500_147_tax_exemption_certificates_label_context
      pattern: (?i)\\b(?:tax\\s+exemption\\s+certificates|tax|exemption|certificates|top500)\\b
  keywords:
    - id: Keyword_tax_exemption_certificates
      groups:
        - match_style: word
          terms:
            - tax exemption
            - exemption certificate
            - tax exempt
            - sales tax exemption
            - GST exemption
            - VAT exemption
            - withholding tax
            - tax clearance
            - certificate of exemption
            - resale certificate
            - charitable exemption
            - W-9 form
    - id: Keyword_global_top500_147_tax_exemption_certificates_domain_context
      groups:
        - match_style: word
          terms:
            - tax exemption certificates
            - tax
            - exemption
            - certificates
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_147_tax_exemption_certificates_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
