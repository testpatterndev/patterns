schema: testpattern/v1
name: Technical Design Document
slug: global-technical-design-document
version: 1.3.1
type: keyword_list
pattern_class: concept
description: Detects technical design documents, system architecture specifications, and API documentation.
operation: >-
  Keyword-based detection matching system architecture, technical specification, API documentation, and design document
  patterns. Corroborative evidence: 12 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - global
regulations:
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
  - intellectual-property
  - technology
test_cases:
  should_match:
    - value: System architecture document with API specification and schema design
      description: Test match 1
    - value: 'Technical design review: solution architecture diagram version 2.1'
      description: Test match 2
    - value: Technical specification for interface design and architecture review
      description: Test match 3
  should_not_match:
    - value: Gothic architecture of the cathedral
      description: Non-match 1
    - value: Interior design magazine
      description: Non-match 2
false_positives:
  - description: References to architecture in building or design contexts.
    mitigation: Require technology-specific keywords like API, schema, or system architecture.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This TestPattern finds technical design records through architecture, specification, API, interface, and schema evidence. Disclosure could expose component relationships, trust boundaries, and proprietary implementation choices that aid intrusion or competitive misuse. The normal document affects the owning organisation and a defined system, producing serious but contained security or commercial harm. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED requires critical-service design or another significant-damage context not established by the generic document type.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_architecture
      matches:
        - ref: Keyword_architecture
        - ref: Keyword_technical
    - confidence_level: 75
      id_match: Regex_specification
      matches:
        - ref: Keyword_design
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_api_spec
      matches:
        - ref: Keyword_technical
  regexes:
    - id: Regex_architecture
      pattern: (?i)\b(?:(?:system|technical|solution)\s+architecture|architecture\s+(?:diagram|overview|review))\b
    - id: Regex_specification
      pattern: (?i)\b(?:(?:technical|functional|design)\s+specification|specification\s+document)\b
    - id: Regex_api_spec
      pattern: (?i)\b(?:api\s+(?:specification|documentation)|interface\s+(?:design|specification))\b
  keywords:
    - id: Keyword_architecture
      groups:
        - match_style: word
          terms:
            - target architecture
            - architecture standard
            - system architecture
            - solution architecture
            - architecture diagram
            - architecture review
            - component diagram
      strength: specific
    - id: Keyword_technical
      groups:
        - match_style: word
          terms:
            - technical
            - technical specification
            - technical design
            - technical documentation
            - text: API
              case_sensitive: true
            - interface
            - schema
      strength: domain
    - id: Keyword_design
      groups:
        - match_style: word
          terms:
            - design
            - design document
            - design specification
            - functional specification
            - design review
      strength: specific
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 606 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
author: testpattern-community
license: MIT
keywords:
  - target architecture
  - architecture standard
  - system architecture
  - solution architecture
  - architecture diagram
  - architecture review
  - technical specification
  - technical design
  - technical documentation
  - API
  - interface
  - schema
  - design document
