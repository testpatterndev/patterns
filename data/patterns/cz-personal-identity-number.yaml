  - version: 1.2.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — primary regex accepted all-zeros/same-digit birth number values (e.g. 000000/0000); mirrors au-medicare-card-identifier protection.
  - version: 1.2.0
