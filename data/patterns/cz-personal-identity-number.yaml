schema: testpattern/v1
name: Rodné číslo
slug: cz-personal-identity-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Rodné číslo patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use
  this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-czech-personal-identity-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{6}/?\d{3,4}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - eu
  - cz
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - rodné číslo
    - birth number
    - personal identity
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 750101/1234
      description: Czech birth number with slash (10 digits)
    - value: 880512/234
      description: Czech birth number with slash (9 digits)
    - value: '9203031234'
      description: Czech birth number without slash
  should_not_match:
    - value: 12345/12
      description: Too few digits after slash
    - value: 12345/12345
      description: Too many digits after slash
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Numeric sequences with optional slash separators may match date-based reference numbers or administrative codes.
    mitigation: Require corroborative evidence keywords such as "rodné číslo" or "birth number" within the proximity window.
  - description: In Australian tenants, Australian mobile telephone numbers can satisfy this ten-digit structure and create cross-SIT numeric identifier overmatch.
    mitigation: Use the AU mobile number NONE-of regex gate where phone numbers are not valid positive evidence.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
regional_tuning:
  - jurisdiction: au
    signal: au-mobile-number-overmatch-numeric-id-20260525
    action: exclude-regex
    id: Regex_au_mobile_number_exclusion
    pattern: (?:^|[^0-9])(?:04[0-9]{8}|(?:\+?61[\s.-]?4(?:[\s.-]?[0-9]){8}))(?:$|[^0-9])
    defaultDecision: modify
    risk: regional-phone-number-overmatch
    reason: Aggregate analysis found Australian mobile-shaped literals overmatching this numeric identifier family in AU tenant data.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_cz_personal_identity
      matches:
        - ref: Pattern_cz_personal_identity_number_label_context
        - ref: Keyword_cz_personal_identity_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_cz_personal_identity
      matches:
        - ref: Keyword_cz_personal_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_cz_personal_identity
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_cz_personal_identity
      pattern: \b\d{6}/?\d{3,4}\b
    - id: Pattern_cz_personal_identity_number_label_context
      pattern: (?i)\b(?:rodné\s+číslo|rodn|slo|personal|identity)\b
  keywords:
    - id: Keyword_cz_personal_identity
      groups:
        - match_style: word
          terms:
            - rodné číslo
            - birth number
            - personal identity number
            - osobní identifikační číslo
            - national identification number
            - číslo pojištěnce
            - identification number
            - Czech identification
            - RČ
      strength: specific
    - id: Keyword_cz_personal_identity_number_domain_context
      groups:
        - match_style: word
          terms:
            - rodné číslo
            - rodn
            - slo
            - personal
            - identity
      strength: domain
  filters:
    - id: Guard_cz_personal_identity_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The regex recognises a Czech birth-number candidate as six digits followed by three or four digits, optionally separated by a slash, with identity context and template exclusions. A genuine rodné číslo encodes birth-related information and persistently links a person across administrative records, enabling targeted impersonation or record matching when combined with a name. The format can collide with dates, reference numbers, and Australian mobile numbers, and the detector does not establish the holder or validate a complete government record. Risk 5 OFFICIAL reflects bounded correlation and encoded-attribute harm; SENSITIVE would require verified attribution or linked personal, health, tax, or service data.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-czech-personal-identity-number
    title: Czech Personal Identity Number entity definition - Microsoft Learn
