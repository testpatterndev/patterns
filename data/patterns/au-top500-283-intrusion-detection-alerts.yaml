schema: testpattern/v1
name: Intrusion detection alerts
slug: au-top500-283-intrusion-detection-alerts
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies intrusion detection alerts patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: industry-education. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:intrusion\s+detection\s+alerts|intrusion\s+detection|ids\s+alert|ips\s+alert|signature\s+match|network\s+intrusion|anomaly\s+detection|security\s+monitoring|packet\s+inspection)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - intrusion detection alerts
    - intrusion
    - detection
    - alerts
    - security
    - operations
    - threat
    - data
  proximity: 300
  keyword_lists:
    - industry-education
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: intrusion detection alerts
      description: Primary topic phrase match
    - value: intrusion detection
      description: Case-insensitive topic phrase match
    - value: ids alert
      description: Alternative topic phrase match
    - value: ips alert
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: ids intrusion detection
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The concept regex finds intrusion-detection, IDS or IPS alert, signature-match, network-intrusion, anomaly-detection, and packet-inspection language rather than a credential. A genuine alert can disclose source and destination details, triggered signatures, timestamps, and the fact that an activity is under observation, enabling evasion or tipping off an intruder. Harm normally concerns one incident or network segment and still requires the adversary to act on the disclosed information. Risk 8 and SENSITIVE capture serious but contained defensive exposure, while a complete protected-operation alert stream would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_intrusion_detection
      matches:
        - ref: Evidence_intrusion_detection
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_intrusion_detection
      matches:
        - ref: Evidence_intrusion_detection
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_intrusion_detection
      matches:
        - ref: Evidence_intrusion_detection
  regexes:
    - id: Pattern_intrusion_detection
      pattern: (?is)\b(?:intrusion\s+detection\s+alerts|intrusion\s+detection|ids\s+alert|ips\s+alert|signature\s+match|network\s+intrusion|anomaly\s+detection|security\s+monitoring|packet\s+inspection)\b
    - id: Pattern_au_top500_283_intrusion_detection_alerts_label_context
      pattern: (?i)\b(?:intrusion\s+detection\s+alerts)\b
  keywords:
    - id: Evidence_intrusion_detection
      groups:
        - match_style: word
          terms:
            - intrusion detection alerts
            - intrusion detection
            - ids alert
            - ips alert
            - snort
            - suricata
            - signature match
            - network intrusion
            - anomaly detection
            - security monitoring
            - packet inspection
    - id: Keyword_au_top500_283_intrusion_detection_alerts_domain_context
      groups:
        - match_style: word
          terms:
            - intrusion detection alerts
            - intrusion
            - detection
            - alerts
created: '2026-02-08'
updated: '2026-07-14'
changelog:
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 875 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-12'
    description: 'Baseline burn-down A2: tier@75''s Evidence_intrusion_detection ref is self-corroborating — its term list is the same phrase set as the id_match regex''s own alternation, so should_not_match: "ids intrusion detection" satisfied both the primary match and the tier''s evidence with the single phrase "intrusion detection". Added min_count: 2 + unique_results: true to tier@75 (mirroring tier@85) so one incidental phrase occurrence no longer meets the evidence bar. Also marked the bare tier@65 discovery_only (same no-evidence shape) so it surfaces in discovery inventory rather than gating should_not_match.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
