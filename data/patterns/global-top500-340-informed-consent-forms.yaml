schema: testpattern/v1
name: Informed consent forms
slug: global-top500-340-informed-consent-forms
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies informed consent forms references in healthcare and patient records. Protected health information
  under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:informed\s+consent|consent\s+form|patient\s+consent|voluntary\s+participation|consent\s+to\s+treat|risks\s+and\s+benefits|right\s+to\s+withdraw|patient\s+signature|research\s+consent|surgical\s+consent)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
data_categories:
- healthcare
- phi
corroborative_evidence:
  keywords:
  - informed consent forms
  - informed
  - consent
  - forms
  - health
  - biomedical
  - information
  proximity: 300
  keyword_lists:
  - healthcare-clinical
  - data-record-context
  - generic-data-labels
test_cases:
  should_match:
  - value: informed consent
    description: Primary topic phrase match
  - value: consent form
    description: Case-insensitive topic phrase match
  - value: patient consent
    description: Alternative topic phrase match
  - value: voluntary participation
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: patient biometric
    description: Generic word pair from old broad template should not match
false_positives:
- description: Medical terminology in health education materials, research publications, clinical guidelines, or public health
    documents without patient-specific data.
  mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers
    such as medical record numbers or dates of birth.
- description: General wellness and fitness content using medical vocabulary without constituting protected health information.
  mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical
    records from general health content.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: The detector matches informed-consent, consent-form, or patient-consent phrases with seven healthcare corroborators
  and template exclusions, targeting documentation of a person's agreement to a procedure, treatment, or study. A completed
  form can reveal identity, proposed intervention, diagnosis context, disclosed risks, alternatives, capacity, signatures,
  and surrogate decision-makers. Disclosure may expose private care choices or enable document misuse, but blank forms, policy
  guidance, and educational material can also trigger the medium-confidence pattern. Risk 7 and SENSITIVE fit the normal completed
  form; risk 8 or PROTECTED requires particularly sensitive treatment, incapacity or coercion evidence, bulk forms, or safety-critical
  consequences.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_informed_consent_forms
    matches:
    - ref: Pattern_global_top500_340_informed_consent_forms_label_context
    - ref: Keyword_global_top500_340_informed_consent_forms_domain_context
    - ref: Keyword_informed_consent_forms
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_informed_consent_forms
    matches:
    - ref: Pattern_global_top500_340_informed_consent_forms_label_context
    - ref: Keyword_global_top500_340_informed_consent_forms_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_informed_consent_forms
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_informed_consent_forms
    pattern: (?is)\b(?:informed\s+consent|consent\s+form|patient\s+consent|voluntary\s+participation|consent\s+to\s+treat|risks\s+and\s+benefits|right\s+to\s+withdraw|patient\s+signature|research\s+consent|surgical\s+consent)\b
  - id: Pattern_global_top500_340_informed_consent_forms_label_context
    pattern: (?i)\b(?:informed\s+consent\s+forms)\b
  keywords:
  - id: Keyword_informed_consent_forms
    groups:
    - match_style: word
      terms:
      - informed consent
      - consent form
      - patient consent
      - voluntary participation
      - consent to treat
      - health
      - biomedical
      - risks and benefits
      - right to withdraw
      - patient signature
      - research consent
      - surgical consent
    strength: specific
  - id: Keyword_global_top500_340_informed_consent_forms_domain_context
    groups:
    - match_style: word
      terms:
      - informed consent forms
      - informed
      - consent
      - forms
    strength: domain
