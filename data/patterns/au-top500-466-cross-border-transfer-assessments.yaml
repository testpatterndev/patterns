schema: testpattern/v1
name: Cross-border transfer assessments
slug: au-top500-466-cross-border-transfer-assessments
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to cross-border transfer assessments in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:cross[\s-]+border\s+transfer\s+assessments|cross[\s-]+border\s+transfer|overseas\s+disclosure|APP\s+8|data\s+transfer|recipient\s+country|adequacy\s+assessment|binding\s+corporate\s+rules|personal\s+information)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - cross-border transfer assessments
    - cross
    - border
    - transfer
    - assessments
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: cross-border transfer assessments
      description: Primary topic phrase match
    - value: cross-border transfer
      description: Case-insensitive topic phrase match
    - value: overseas disclosure
      description: Alternative topic phrase match
    - value: APP 8
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to cross-border transfer assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_cross_border
      matches:
        - ref: Evidence_cross_border
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_cross_border
      matches:
        - ref: Evidence_cross_border
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_cross_border
      matches:
        - ref: Evidence_cross_border
  regexes:
    - id: Pattern_cross_border
      pattern: (?is)\b(?:cross[\s-]+border\s+transfer\s+assessments|cross[\s-]+border\s+transfer|overseas\s+disclosure|APP\s+8|data\s+transfer|recipient\s+country|adequacy\s+assessment|binding\s+corporate\s+rules|personal\s+information)\b
  keywords:
    - id: Evidence_cross_border
      groups:
        - match_style: word
          terms:
            - cross-border transfer assessments
            - cross-border transfer
            - overseas disclosure
            - APP 8
            - data transfer
            - recipient country
            - adequacy assessment
            - binding corporate rules
            - personal information
            - privacy
            - compliance
            - offshore
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines
  - https://www.oaic.gov.au/privacy/privacy-guidance-for-organisations-and-government-agencies/privacy-impact-assessments
