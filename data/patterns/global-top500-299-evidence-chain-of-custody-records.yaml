schema: testpattern/v1
name: Evidence chain-of-custody records
slug: global-top500-299-evidence-chain-of-custody-records
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies evidence chain-of-custody records patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 9 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:chain\s+of\s+custody|evidence\s+log|custodian|tamper\s+evident)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - evidence chain-of-custody records
    - evidence
    - chain
    - custody
    - records
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: 'Chain of custody'
      description: Topic phrase present
    - value: 'chain of custody'
      description: Topic phrase, lowercase
    - value: 'this record references the chain of custody held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_chain_of_custody
      matches:
        - ref: Pattern_global_top500_299_evidence_chain_of_custody_records_label_context
        - ref: Keyword_global_top500_299_evidence_chain_of_custody_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_chain_of_custody
      matches:
        - ref: Keyword_chain_of_custody
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_chain_of_custody
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_chain_of_custody
      pattern: (?i)\b(?:chain\s+of\s+custody|evidence\s+log|custodian|tamper\s+evident)\b
    - id: Pattern_global_top500_299_evidence_chain_of_custody_records_label_context
      pattern: (?i)\b(?:evidence\s+chain\-of\-custody\s+records)\b
  keywords:
    - id: Keyword_chain_of_custody
      groups:
        - match_style: word
          terms:
            - chain of custody
            - evidence log
            - custodian
            - tamper evident
            - evidence handling
            - forensic evidence
            - evidence bag
            - exhibit number
            - evidence transfer
            - digital evidence
            - integrity verification
            - hash value
      strength: specific
    - id: Keyword_global_top500_299_evidence_chain_of_custody_records_domain_context
      groups:
        - match_style: word
          terms:
            - evidence chain-of-custody records
            - evidence
            - chain
            - custody
      strength: domain
risk_description: >-
  The regex finds chain-of-custody, evidence-log, custodian, or tamper-evident language associated with an evidentiary tracking record. A genuine record can reveal case identifiers, evidence descriptions, storage locations, handlers, transfer times, and investigative status, enabling interference, witness pressure, or challenges to evidentiary integrity. The affected parties are investigators, custodians, case subjects, and the proceeding tied to one evidence set, while policy and form templates can match without live case data. Risk 8 SENSITIVE reflects serious contained legal and investigative harm; PROTECTED would require a highly consequential protected operation or significant irreversible damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
