schema: testpattern/v1
name: Provider identifier records
slug: global-top500-337-provider-identifier-records
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies provider identifier records references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:provider\s+identifier\s+records?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - provider identifier records
    - provider
    - identifier
    - records
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Provider identifier records'
      description: Topic phrase present
    - value: 'provider identifier records'
      description: Topic phrase, lowercase
    - value: 'this record references the provider identifier records held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_provider_identifier_records
      matches:
        - ref: Keyword_provider_identifier_records
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_provider_identifier_records
      matches:
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_provider_identifier_records
      pattern: (?i)\b(?:provider\s+identifier\s+records?)\b
    - id: Pattern_global_top500_337_provider_identifier_records_label_context
      pattern: (?i)\b(?:provider\s+identifier\s+records)\b
  keywords:
    - id: Keyword_provider_identifier_records
      groups:
        - match_style: word
          terms:
            - provider identifier
            - provider number
            - text: NPI
              case_sensitive: true
            - practitioner ID
            - health provider
            - biomedical
            - prescriber number
            - registration number
            - medical license
            - provider registry
            - AHPRA
            - Medicare provider
      strength: specific
    - id: Keyword_global_top500_337_provider_identifier_records_domain_context
      groups:
        - match_style: word
          terms:
            - provider identifier records
            - provider
      strength: domain
created: '2026-02-08'
updated: '2026-07-04'
changelog:
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
  - version: 1.1.0
    date: '2026-03-14'
    description: Wire generic-data-labels evidence keywords at 75/85 tiers
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
license: MIT
