schema: testpattern/v1
name: Model risk assessment reports
slug: au-top500-478-model-risk-assessment-reports
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to model risk assessment reports in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:model\s+risk|risk\s+assessment|model\s+validation|model\s+governance|risk\s+report|model\s+audit|risk\s+rating|model\s+performance|stress\s+testing|CPS\s+220|prudential\s+standard)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - model risk assessment reports
    - model
    - risk
    - assessment
    - reports
    - privacy
    - compliance
  proximity: 300
test_cases:
  should_match:
    - value: model risk
      description: Primary topic phrase match
    - value: risk assessment
      description: Case-insensitive topic phrase match
    - value: model validation
      description: Alternative topic phrase match
    - value: model governance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to model risk assessment reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_model_risk_assessment_reports
      matches:
        - ref: Evidence_model_risk_assessment_reports
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_model_risk_assessment_reports
      matches:
        - ref: Evidence_model_risk_assessment_reports
    - confidence_level: 65
      id_match: Pattern_model_risk_assessment_reports
      matches:
        - ref: Evidence_model_risk_assessment_reports
  regexes:
    - id: Pattern_model_risk_assessment_reports
      pattern: (?is)\b(?:model\s+risk|risk\s+assessment|model\s+validation|model\s+governance|risk\s+report|model\s+audit|risk\s+rating|model\s+performance|stress\s+testing|CPS\s+220|prudential\s+standard)\b
  keywords:
    - id: Evidence_model_risk_assessment_reports
      groups:
        - match_style: word
          terms:
            - model risk
            - risk assessment
            - model validation
            - model governance
            - risk report
            - model audit
            - risk rating
            - model performance
            - backtesting
            - stress testing
            - CPS 220
            - prudential standard
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://handbook.apra.gov.au/standard/cps-220
  - https://handbook.apra.gov.au/standard/cps-234
