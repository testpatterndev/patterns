schema: testpattern/v1
name: Netherlands Driver's License Number
slug: nl-drivers-license
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Netherlands driver's license number patterns. This pattern is based on a Microsoft Purview built-in sensitive
  information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as
  a starting point for customisation.
operation: >-
  Matches a 10-digit number at word boundaries. Corroborative evidence: 5 keywords within 300 characters. Keyword lists:
  pii-civic-credentials.
pattern: \b\d{10}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - nl
  - eu
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - driver
    - licence
    - license
    - driving
    - DL
    - rijbewijs
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: '1234567890'
      description: Standard 10-digit Dutch driver's license number
    - value: '9876543210'
      description: Another valid 10-digit format
    - value: '0012345678'
      description: 10-digit number with leading zeros
  should_not_match:
    - value: '123456789'
      description: Too few digits (9 instead of 10)
    - value: '12345678901'
      description: Too many digits (11 instead of 10)
false_positives:
  - description: >-
      Generic numeric sequences matching the driver's license format appearing in unrelated contexts.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm driver's license context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_nl_drivers_license
      matches:
        - ref: Keyword_nl_drivers_license_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_nl_drivers_license
      matches:
        - ref: Keyword_nl_drivers_license_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_nl_drivers_license
  regexes:
    - id: Regex_nl_drivers_license
      pattern: \b\d{10}\b
  keywords:
    - id: Keyword_nl_drivers_license_specific
      groups:
        - match_style: word
          terms:
            - rijbewijs
            - rijbewijsnummer
            - driver's license
            - driving licence
            - driving license
            - permis de conduire
            - Führerschein
            - DL number
            - rijbewijs nummer
      strength: specific
    - id: Keyword_nl_drivers_license_broad
      groups:
        - match_style: word
          terms:
            - driver
            - licence
            - license
            - driving
            - text: DL
              case_sensitive: true
            - permit
            - identification
            - identity document
            - text: CBR
              case_sensitive: true
      strength: domain
  filters:
    - id: Filter_nl_drivers_license_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The Dutch driving-licence detector matches any ten-digit value and relies on five licence-related terms to infer context. A verified number can connect a driver to entitlement, insurance, vehicle, or enforcement records and aid impersonation when combined with a name and birth information. Phone, account, customer, and administrative numbers frequently share the length, and the match contains no holder, class, status, issue date, or expiry. Risk 5 OFFICIAL reflects bounded value after confirmation; SENSITIVE would require a linked driver record or licence image.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-netherlands-drivers-license-number
    title: "Netherlands driver's license number entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
