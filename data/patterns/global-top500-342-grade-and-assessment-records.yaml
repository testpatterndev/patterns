schema: testpattern/v1
name: Grade and assessment records
slug: global-top500-342-grade-and-assessment-records
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to grade and assessment records in international contexts. This information
  type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:grade\s+record|assessment\s+record|examination\s+results|student\s+grades|academic\s+performance|grade\s+point\s+average|mark\s+sheet|final\s+grades|assessment\s+report)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
- AML/CTF Act (Cth)
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
- TIA Act 1979 (Cth)
data_categories:
- pii
corroborative_evidence:
  keywords:
  - grade and assessment records
  - grade
  - assessment
  - records
  - education
  - research
  - administration
  proximity: 300
test_cases:
  should_match:
  - value: grade record
    description: Primary topic phrase match
  - value: assessment record
    description: Case-insensitive topic phrase match
  - value: examination results
    description: Alternative topic phrase match
  - value: student grades
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: student grant
    description: Generic word pair from old broad template should not match
false_positives:
- description: Common words and phrases related to grade and assessment records appearing in policy documents, training materials,
    HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: The detector recognizes grade records, assessment records, examination results, or student grades within
  education context, representing an individual's evaluated performance rather than a public course reference. Disclosure
  can embarrass a student, distort academic or employment decisions, invite targeted coercion, or expose disputed outcomes
  before appeal is complete. A normal record concerns one learner or a bounded class and does not by itself enable identity
  takeover, but the educational consequences can be serious and difficult to reverse. Risk 8 and SENSITIVE are justified;
  PROTECTED would require a large institutional grade repository, widespread tampering capability, or severe safety or life-impacting
  consequences.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_grade_and_assessment_records
    matches:
    - ref: Pattern_global_top500_342_grade_and_assessment_records_label_context
    - ref: Keyword_global_top500_342_grade_and_assessment_records_domain_context
    - ref: Keyword_grade_and_assessment_records
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_grade_and_assessment_records
    matches:
    - ref: Pattern_global_top500_342_grade_and_assessment_records_label_context
    - ref: Keyword_global_top500_342_grade_and_assessment_records_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_grade_and_assessment_records
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_grade_and_assessment_records
    pattern: (?is)\b(?:grade\s+record|assessment\s+record|examination\s+results|student\s+grades|academic\s+performance|grade\s+point\s+average|mark\s+sheet|final\s+grades|assessment\s+report)\b
  - id: Pattern_global_top500_342_grade_and_assessment_records_label_context
    pattern: (?i)\b(?:grade\s+and\s+assessment\s+records)\b
  keywords:
  - id: Keyword_grade_and_assessment_records
    groups:
    - match_style: word
      terms:
      - grade record
      - assessment record
      - examination results
      - student grades
      - academic performance
      - education
      - administration
      - grade point average
      - transcript
      - mark sheet
      - final grades
      - assessment report
    strength: specific
  - id: Keyword_global_top500_342_grade_and_assessment_records_domain_context
    groups:
    - match_style: word
      terms:
      - grade and assessment records
      - grade
      - assessment
    strength: domain
