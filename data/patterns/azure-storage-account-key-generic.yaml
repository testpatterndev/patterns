    date: '2026-07-04'
    description: 'Consolidated to canonical 65/75 tier ladder: replaced the two keyword-gated 65 tiers with one 75 evidence tier (any-of the rich Keyword_azure_storage_key_generic or the domain-context keyword, both preserved as alternative evidence paths) plus a single value-only 65 tier (id_match + noise-exclusion only) — challenging-layout fix (ph<50 cohort) without leaving duplicate same-level 65 tiers'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.
