schema: testpattern/v1
name: Session cookies
slug: au-top500-269-session-cookies
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies session cookies patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:session\s+cookies|session\s+token|session\s+id|secure\s+cookie|authentication\s+cookie)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - session cookies
    - session
    - cookies
    - credentials
    - keys
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: session cookies
      description: Primary topic phrase match
    - value: session token
      description: Case-insensitive topic phrase match
    - value: session id
      description: Alternative topic phrase match
    - value: secure cookie
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: jwt httponly
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 95
      id_match: Pattern_session_cookies
      matches:
        - ref: Evidence_session_cookies
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 85
      id_match: Pattern_session_cookies
      matches:
        - ref: Evidence_session_cookies
    - confidence_level: 75
      id_match: Pattern_session_cookies
  regexes:
    - id: Pattern_session_cookies
      pattern: (?is)\b(?:session\s+cookies|session\s+token|session\s+id|secure\s+cookie|authentication\s+cookie)\b
  keywords:
    - id: Evidence_session_cookies
      groups:
        - match_style: word
          terms:
            - session cookies
            - session
            - cookies
            - set-cookie
            - httponly
            - samesite
            - session token
            - session id
            - jwt
            - secure cookie
            - authentication cookie
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
