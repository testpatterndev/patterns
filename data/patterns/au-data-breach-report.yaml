schema: testpattern/v1
name: Data Breach Report
slug: au-data-breach-report
version: 1.5.0
type: keyword_list
pattern_class: concept
description: Detects data breach reports including breach details, affected individuals, and OAIC notifications.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - security
  - privacy
  - legal
test_cases:
  should_match:
    - value: 'Data breach report received for triage.'
      description: Exact 65 discovery probe - report phrase without response, notification, or affected-person evidence
    - value: 'Data breach assessment: forensic analysis completed after containment.'
      description: Exact 75 probe - incident-response evidence without notification and affected-person evidence
    - value: 'Notifiable data breach report: OAIC notification issued to affected individuals.'
      description: Exact 85 probe - regulatory notification and affected-person evidence
    - value: 'Notifiable data breach report: OAIC notification for affected individuals'
      description: Test match 1
    - value: 'Data breach assessment: eligible data breach with serious harm evaluation'
      description: Test match 2
    - value: Breach notification and breach remediation plan per NDB scheme
      description: Test match 3
  should_not_match:
    - value: Breach of contract claim
      description: Non-match 1
    - value: The dam breach caused flooding
      description: Non-match 2
    - value: 'Sample template for notifying the privacy regulator after personal information exposure.'
      description: Adjacent template language is not a populated breach record
    - value: 'The public catalogue lists an incident-notification document.'
      description: Public catalogue metadata has no data-breach primary
    - value: 'Security incident report: forensic analysis and containment completed.'
      description: Sibling cyber-report language does not satisfy the data-breach primary
false_positives:
  - description: Non-data breach uses of breach.
    mitigation: Require data-specific breach terms like NDB, OAIC, or affected individuals.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The medium-confidence TestPattern keyword detector recognises data-breach reports through notifiable breach, OAIC notification, affected individuals, serious-harm assessment, and remediation terms. A populated report can expose compromised data types, victims, attack paths, control gaps, and response decisions, enabling further abuse or prejudicing notification and investigation. Generic uses of breach can collide, but the twelve-term incident context targets a composite response record. Risk 8 SENSITIVE Personal-Privacy fits serious contained incident harm; PROTECTED requires broad privileged compromise, critical-service impact, mass severe harm, or credible significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_data_breach
      matches:
        - ref: Keyword_breach_notification
        - ref: Keyword_affected_individuals
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_data_breach
      matches:
        - ref: Keyword_incident_response
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_data_breach
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_data_breach
      pattern: >-
        (?i)\b(?:data\s+breach\s+(?:report|notification|assessment)|privacy\s+(?:breach|incident)\s+(?:report|assessment)|notifiable\s+data\s+breach|ndb\s+(?:assessment|notification))\b
  keywords:
    - id: Keyword_breach_notification
      groups:
        - match_style: word
          terms:
            - breach notification
            - notifiable data breach
            - text: NDB
              case_sensitive: true
            - mandatory reporting
            - notification timeline
            - regulatory notification
            - OAIC notification
      strength: specific
    - id: Keyword_affected_individuals
      groups:
        - match_style: word
          terms:
            - affected individuals
            - data subjects
            - impacted users
            - notification letter
            - credit monitoring
            - identity protection
            - breach scope
      strength: specific
    - id: Keyword_incident_response
      groups:
        - match_style: word
          terms:
            - incident response
            - incident handling
            - containment
            - eradication
            - recovery
            - lessons learned
            - forensic analysis
            - forensic investigation
            - timeline
            - indicators of compromise
            - text: IOC
              case_sensitive: true
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.5.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: replace duplicate high tiers with a discovery-only 65 report tier, a 75 incident-response tier, and an 85 notification-plus-affected-individuals tier; add exact-tier and sibling/public/template probes.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 535 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 3 duplicate 85-confidence tier(s) into the strictest canonical tier.; Aligned recommended_confidence to 85.
author: testpattern-community
license: MIT
keywords:
  - data breach
  - breach notification
  - notifiable data breach
  - NDB
  - OAIC
  - breach report
  - affected individuals
  - breach assessment
  - eligible data breach
  - serious harm
  - breach remediation
  - breach response
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 3 duplicate 85-confidence tier(s) into the strictest canonical tier.'
      - 'Aligned recommended_confidence to 85.'
