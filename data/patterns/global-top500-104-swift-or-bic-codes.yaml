schema: testpattern/v1
name: SWIFT or BIC codes
slug: global-top500-104-swift-or-bic-codes
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to swift or bic codes in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: financial-deposit-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:swift\s+or\s+bic\s+codes|SWIFT\s+code|BIC\s+code|bank\s+identifier\s+code|correspondent\s+bank|intermediary\s+bank|wire\s+transfer|international\s+payment|clearing\s+system|SWIFT\s+network)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - swift or bic codes
    - swift
    - bic
    - codes
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: swift or bic codes
      description: Primary topic phrase match
    - value: swift code
      description: Case-insensitive topic phrase match
    - value: BIC code
      description: Alternative topic phrase match
    - value: bank identifier code
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_swift_bic
      matches:
        - ref: Pattern_global_top500_104_swift_or_bic_codes_label_context
        - ref: Keyword_global_top500_104_swift_or_bic_codes_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_swift_bic
      matches:
        - ref: Keyword_swift_bic
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_swift_bic
      pattern: >-
        (?is)\b(?:swift\s+or\s+bic\s+codes|SWIFT\s+code|BIC\s+code|bank\s+identifier\s+code|correspondent\s+bank|intermediary\s+bank|wire\s+transfer|international\s+payment|clearing\s+system|SWIFT\s+network)\b
    - id: Pattern_global_top500_104_swift_or_bic_codes_label_context
      pattern: (?i)\b(?:swift\s+or\s+bic\s+codes)\b
  keywords:
    - id: Keyword_swift_bic
      groups:
        - match_style: word
          terms:
            - swift or bic codes
            - SWIFT code
            - BIC code
            - bank identifier code
            - SWIFT/BIC
            - correspondent bank
            - intermediary bank
            - wire transfer
            - international payment
            - clearing system
            - SWIFT network
      strength: specific
    - id: Keyword_global_top500_104_swift_or_bic_codes_domain_context
      groups:
        - match_style: word
          terms:
            - swift or bic codes
            - swift
            - bic
            - codes
      strength: domain
risk_description: >-
  This medium-confidence concept regex detects references to SWIFT or BIC codes in financial text rather than validating an actual eight- or eleven-character institution code. SWIFT and BIC values identify banks or branches for routing and are routinely published on bank websites, invoices, remittance instructions, and public directories; an isolated value is neither customer identity nor account authority. Harm becomes plausible only when the reference is combined with altered beneficiary instructions, an account number, payer details, or transaction context. Risk 4 and OFFICIAL fit public routing information, while SENSITIVE requires an attributable payment record or an operationally exploitable transfer instruction.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
