schema: testpattern/v1
name: FTP Server and Client Credential Files
slug: snaffler-ftp-credentials
version: 1.1.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects passwords stored in FTP server and client configuration files, including
  FileZilla server/client recentservers.xml base64-encoded passwords, proftpd-style
  shadow passwd lines with hashed credentials, and sftp-config.json plaintext
  password fields. Mirrors Snaffler rules KeepFtpServerConfigByName and
  KeepFtpClientConfigConfigByName.
operation: >-
  Three distinct credential forms are matched: FileZilla XML Pass elements with
  base64 encoding, proftpd-format passwd entries with supported hash algorithms
  ($1 MD5, $apr1 APR-MD5, $2a/$2b/$2y bcrypt, $6 SHA-512), and the generic
  JSON password field found in sftp-config.json and similar SFTP client configs.
  The JSON password form is generic and gated to 75+ with strong SFTP/FTP
  evidence to avoid false positives from other JSON configs.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
pattern: '<Pass\s+encoding="base64">[A-Za-z0-9+/=]{8,}</Pass>'
confidence: high
confidence_justification: >-
  High confidence: the FileZilla base64 Pass element and proftpd passwd line
  format are highly specific to FTP credential files. The JSON password field
  form is less specific and is gated with strong contextual evidence at 75+.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
data_categories:
  - credentials
  - security
  - network
corroborative_evidence:
  keywords:
    - FileZilla
    - proftpd
    - recentservers
    - sftp-config
    - FtpUser
    - Host
    - FTP
    - SFTP
  proximity: 300
test_cases:
  should_match:
    - value: '<Pass encoding="base64">UGFzc3dvcmQxMjM=</Pass>'
      description: FileZilla recentservers.xml base64-encoded password element
    - value: 'ftpuser:$6$saltsalt$hashedpassword1234567890abcdef:1001:1001::/home/ftpuser:/sbin/nologin'
      description: proftpd shadow passwd line with SHA-512 ($6$) hash
    - value: 'adminuser:$apr1$xyz12345$abcdefghij0123456789ab:0:0::/root:/bin/bash'
      description: proftpd passwd line with APR-MD5 ($apr1$) hash
    - value: '"password": "S3cr3tFTPp@ss"'
      description: JSON password field in sftp-config.json plaintext password
  should_not_match:
    - value: '<Pass encoding="base64">abc</Pass>'
      description: Base64 value too short (fewer than 8 chars)
    - value: 'root:x:0:0:root:/root:/bin/bash'
      description: Standard /etc/passwd shadow placeholder (x), no hash algorithm marker
    - value: '"password": ""'
      description: Empty JSON password field
false_positives:
  - description: Other XML formats that happen to use a Pass element with base64
      encoding for non-credential data such as certificates or binary blobs.
    mitigation: Require proximity to FileZilla-specific elements (Host, Port,
      Protocol, User) or FTP/SFTP keyword context.
  - description: Any JSON configuration file containing a "password" key, such as
      database configs, API configs, or test fixtures.
    mitigation: Gate the JSON password form strictly at 75+ with SFTP/FTP-specific
      evidence (sftp-config, FtpUser, Host, FileZilla, proftpd).
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Regex_snaffler_filezilla_pass
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_proftpd_passwd
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_filezilla_pass
      matches:
        - ref: Keyword_snaffler_ftp_server_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_proftpd_passwd
      matches:
        - ref: Keyword_snaffler_ftp_server_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_sftp_config_password
      matches:
        - ref: Keyword_snaffler_sftp_client_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_filezilla_pass
      matches:
        - ref: Keyword_snaffler_ftp_server_context
        - ref: Keyword_snaffler_ftp_client_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_proftpd_passwd
      matches:
        - ref: Keyword_snaffler_ftp_server_context
        - ref: Keyword_snaffler_ftp_client_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_filezilla_pass
      pattern: '<Pass\s+encoding="base64">[A-Za-z0-9+/=]{8,}</Pass>'
    - id: Regex_snaffler_proftpd_passwd
      pattern: '[A-Za-z0-9_.-]{1,32}:\$(?:1|apr1|2[aby]|6)\$[^\s:]{6,}:\d+:\d+'
    - id: Regex_snaffler_sftp_config_password
      pattern: '"password"\s*:\s*"[^"]{1,200}"'
  keywords:
    - id: Keyword_snaffler_ftp_server_context
      groups:
        - match_style: word
          terms:
            - FileZilla
            - proftpd
            - recentservers
            - FtpUser
            - FTP
            - SFTP
    - id: Keyword_snaffler_ftp_client_context
      groups:
        - match_style: word
          terms:
            - Host
            - Port
            - Protocol
            - User
            - LogonType
    - id: Keyword_snaffler_sftp_client_context
      groups:
        - match_style: word
          terms:
            - sftp-config
            - sftp_config
            - FtpUser
            - FileZilla
            - proftpd
            - SFTP
