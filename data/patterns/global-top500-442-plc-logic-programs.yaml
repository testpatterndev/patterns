schema: testpattern/v1
name: PLC logic programs
slug: global-top500-442-plc-logic-programs
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to plc logic programs in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: industry-critical-infrastructure. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:programmable\s+logic\s+controller|ladder\s+logic|structured\s+text|function\s+block|rung\s+diagram|IEC\s+61131|control\s+program|industrial\s+automation|I\/O\s+module|scan\s+cycle)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - plc logic programs
    - plc
    - logic
    - programs
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: programmable logic controller
      description: Primary topic phrase match
    - value: ladder logic
      description: Case-insensitive topic phrase match
    - value: structured text
      description: Alternative topic phrase match
    - value: function block
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: plc function block
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to plc logic programs appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_plc_logic_programs
      matches:
        - ref: Pattern_global_top500_442_plc_logic_programs_label_context
        - ref: Keyword_global_top500_442_plc_logic_programs_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_plc_logic_programs
      matches:
        - ref: Keyword_plc_logic_programs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_plc_logic_programs
      pattern: (?is)\b(?:programmable\s+logic\s+controller|ladder\s+logic|structured\s+text|function\s+block|rung\s+diagram|IEC\s+61131|control\s+program|industrial\s+automation|I\/O\s+module|scan\s+cycle)\b
    - id: Pattern_global_top500_442_plc_logic_programs_label_context
      pattern: (?i)\b(?:plc\s+logic\s+programs)\b
  keywords:
    - id: Keyword_plc_logic_programs
      groups:
        - match_style: word
          terms:
            - text: PLC
              case_sensitive: true
            - programmable logic controller
            - ladder logic
            - structured text
            - function block
            - rung diagram
            - IEC 61131
            - control program
            - industrial automation
            - I/O module
            - scan cycle
            - Allen-Bradley
      strength: specific
    - id: Keyword_global_top500_442_plc_logic_programs_domain_context
      groups:
        - match_style: word
          terms:
            - plc logic programs
            - plc
            - logic
            - programs
      strength: domain
risk_description: >-
  This regex recognises programmable logic controllers, ladder logic, structured text, and function-block programs with seven operational-technology signals. A genuine program exposes control sequences, interlocks, timers, and fail-state behaviour, allowing an attacker or unauthorised insider to identify manipulation points or sabotage production. The normal program presents serious operational and possible safety harm, but direct impact still requires controller access, compatible deployment, and knowledge of the physical process. Risk 8 remains SENSITIVE InfoTech; PROTECTED would require deployable logic for a critical service, bypass of safety controls, or likely significant physical and public harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
