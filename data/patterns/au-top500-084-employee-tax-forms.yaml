schema: testpattern/v1
name: Employee tax forms
slug: au-top500-084-employee-tax-forms
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to employee tax forms in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-hr.
pattern: >-
  (?is)\b(?:employee\s+tax\s+forms|TFN\s+declaration|PAYG\s+payment\s+summary|income\s+statement|tax\s+file\s+number\s+declaration|withholding\s+declaration|tax\s+return|group\s+certificate|annual\s+earnings|employment\s+income|tax\s+assessment)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - employee tax forms
    - employee
    - tax
    - forms
    - payroll
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: employee tax forms
      description: Primary topic phrase match
    - value: tfn declaration
      description: Case-insensitive topic phrase match
    - value: PAYG payment summary
      description: Alternative topic phrase match
    - value: income statement
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_employee_tax_forms
      matches:
        - ref: Evidence_employee_tax_forms
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_employee_tax_forms
      matches:
        - ref: Evidence_employee_tax_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_employee_tax_forms
      matches:
        - ref: Evidence_employee_tax_forms
  regexes:
    - id: Pattern_employee_tax_forms
      pattern: >-
        (?is)\b(?:employee\s+tax\s+forms|TFN\s+declaration|PAYG\s+payment\s+summary|income\s+statement|tax\s+file\s+number\s+declaration|withholding\s+declaration|tax\s+return|group\s+certificate|annual\s+earnings|employment\s+income|tax\s+assessment)\b
  keywords:
    - id: Evidence_employee_tax_forms
      groups:
        - match_style: word
          terms:
            - employee tax forms
            - TFN declaration
            - PAYG payment summary
            - income statement
            - tax file number declaration
            - withholding declaration
            - tax return
            - group certificate
            - annual earnings
            - employment income
            - tax assessment
            - text: ATO
              case_sensitive: true
      strength: specific
risk_description: >-
  The regex recognises employee tax-form concepts including TFN and withholding declarations, PAYG summaries, income statements, group certificates, and tax assessments. Those document types can contain highly personal values, but the normal match does not require a populated field, employee name, TFN, earnings amount, or complete form. A worker faces privacy or fraud harm only when such contents accompany the topic, and blank forms, payroll instructions, and compliance material remain plausible matches. Risk 4 OFFICIAL reflects the broad standalone signal; SENSITIVE would apply after confirming a completed employee tax record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
