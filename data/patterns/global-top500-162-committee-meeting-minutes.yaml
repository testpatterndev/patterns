schema: testpattern/v1
name: Committee meeting minutes
slug: global-top500-162-committee-meeting-minutes
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to committee meeting minutes in international contexts.
  These are corporate committee governance records; they are not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:committee\s+meeting\s+minutes|audit\s+committee|risk\s+committee|remuneration\s+committee|nominations\s+committee|committee\s+resolution|committee\s+agenda|committee\s+charter|terms\s+of\s+reference|committee\s+members|governance\s+committee)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - committee meeting minutes
    - committee
    - meeting
    - minutes
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: committee meeting minutes
      description: Primary topic phrase match
    - value: audit committee
      description: Case-insensitive topic phrase match
    - value: risk committee
      description: Alternative topic phrase match
    - value: remuneration committee
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to committee meeting minutes appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_committee_meeting_minutes
      matches:
        - ref: Pattern_global_top500_162_committee_meeting_minutes_label_context
        - ref: Keyword_global_top500_162_committee_meeting_minutes_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_committee_meeting_minutes
      matches:
        - ref: Keyword_committee_meeting_minutes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_committee_meeting_minutes
      pattern: >-
        (?is)\b(?:committee\s+meeting\s+minutes|audit\s+committee|risk\s+committee|remuneration\s+committee|nominations\s+committee|committee\s+resolution|committee\s+agenda|committee\s+charter|terms\s+of\s+reference|committee\s+members|governance\s+committee)\b
    - id: Pattern_global_top500_162_committee_meeting_minutes_label_context
      pattern: (?i)\b(?:committee\s+meeting\s+minutes)\b
  keywords:
    - id: Keyword_committee_meeting_minutes
      groups:
        - match_style: word
          terms:
            - committee meeting minutes
            - audit committee
            - risk committee
            - remuneration committee
            - nominations committee
            - committee resolution
            - committee agenda
            - committee charter
            - subcommittee
            - terms of reference
            - committee members
            - governance committee
      strength: specific
    - id: Keyword_global_top500_162_committee_meeting_minutes_domain_context
      groups:
        - match_style: word
          terms:
            - committee meeting minutes
            - committee
            - meeting
            - minutes
      strength: domain
risk_description: >-
  This regex flags committee minutes, agendas, resolutions, charters, terms of reference, and named audit, risk, remuneration, or nomination committees rather than verifying completed minutes. A real record may expose control findings, risk decisions, executive pay discussions, candidate assessments, dissent, and assigned actions that could prejudice governance or harm named participants. The normal unit is one committee meeting within one organization, and published charters, committee descriptions, and blank agendas can generate benign hits. Risk 8 and SENSITIVE reflect serious but bounded governance and privacy harm; PROTECTED would require a protected inquiry, critical operation, or similarly significant consequence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
