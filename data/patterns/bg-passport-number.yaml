schema: testpattern/v1
name: Bulgaria Passport Number
slug: bg-passport-number
version: 1.2.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Bulgaria passport number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT
  directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-bulgaria-passport-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Adds
  label-context matching and exclusion logic for sample/template/test placeholders.
pattern: \b\d{9}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Context label evidence plus explicit template/example exclusion
  improves precision for high-risk identifiers.
jurisdictions:
  - bg
  - eu
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - travel document
    - passport number
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '123456789'
      description: Nine-digit passport number
    - value: '987654321'
      description: Nine-digit passport number
    - value: '456789012'
      description: Nine-digit passport number
  should_not_match:
    - value: '12345678'
      description: Only 8 digits is too short
    - value: '1234567890'
      description: Ten digits is too long
    - value: sample template placeholder number 12345678
      description: >-
        Template/sample context negative — the embedded number is 8 digits, one short of the required 9,
        so the universal-engine top-level regex correctly does not match it (template gating is a
        Purview-tier NOT-group concern, not expressible in a bare regex)
false_positives:
  - description: Generic alphanumeric sequences matching passport format in unrelated contexts.
    mitigation: Require corroborative evidence keywords within the proximity window.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_bg_passport
      matches:
        - ref: Pattern_bg_passport_number_label_context
        - ref: Keyword_bg_passport_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_bg_passport
      matches:
        - ref: Keyword_bg_passport_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_bg_passport
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_bg_passport
      pattern: \b\d{9}\b
    - id: Pattern_bg_passport_number_label_context
      pattern: (?i)\b(?:bulgaria|passport|travel\s+document|passport\s+number|document\s+number)\b
  keywords:
    - id: Keyword_bg_passport_specific
      groups:
        - match_style: word
          terms:
            - паспорт
            - номер на паспорт
            - паспортен номер
            - задграничен паспорт
            - пътен документ
            - МВР
            - Република България
            - Bulgarian passport
            - passport number
      strength: specific
    - id: Keyword_bg_passport_general
      groups:
        - match_style: word
          terms:
            - passport
            - travel document
            - passport no
            - passport
            - document number
            - identity document
            - travel ID
      strength: specific
  filters:
    - id: Filter_bg_passport_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  This Bulgarian passport rule recognizes a nine-digit value in passport-labelled context and excludes obvious sample numbers. A true match can assist travel-record linkage, document-replacement phishing, or a fabricated identity narrative aimed at the traveller. The digits do not disclose the holder's name, citizenship evidence, expiry, image, signature, or border-system status, and ordinary numeric references can be indistinguishable. Risk 5 and OFFICIAL reflect that limited atomic exposure; a passport scan, consular case, or named itinerary would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-bulgaria-passport-number
    title: Bulgaria passport number entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.2
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1137 without changing detector or package metadata.'
  - version: 1.2.1
    date: '2026-07-12'
    description: 'Baseline burn-down: template-context negative used a structurally valid number, so the universal-engine top-level regex correctly matched it (template gating is a Purview-tier concern via the template-exclusion NOT-group, not expressible in a bare regex); embedded number made structurally invalid (8 digits, one short of the required 9) to preserve the template-prose intent without asserting the impossible.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
source: microsoft
