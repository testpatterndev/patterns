schema: testpattern/v1
name: EU NIS2 Cybersecurity Risk-Management Measures
slug: eu-nis2-cybersecurity-risk-measures
version: 1.2.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects NIS2 Article 21 cybersecurity risk-management measures documentation from essential and important entities — gap assessments, board approval papers, and the policies implementing the Article 21(2)(a)-(j) measures (incident handling, business continuity, supply chain security, cyber hygiene, cryptography, access control, multi-factor authentication). These documents catalogue an entity's security posture and unremediated gaps.
operation: 'Keyword proximity: primary topic phrase (cybersecurity risk-management measures — the Article 21 term of art) within 300 characters of Article 21 vocabulary (all-hazards approach, Directive (EU) 2022/2555, essential entity, incident handling, supply chain security, cyber hygiene, multi-factor authentication). Negative keyword exclusion for news, consultancy, and training material. Concept classifier: matches the topic, not identifier-grade evidence.'
pattern: (?i)\bcybersecurity\s+risk[\s-]management\s+measures\b
confidence: medium
confidence_justification: 'Medium confidence: honest topic matcher. ''Cybersecurity risk-management measures'' is the NIS2 Article 21 term of art and the only primary; ''all-hazards approach'' is also a ubiquitous FEMA/civil-protection term of art, so it corroborates but never fires alone. The 85 tier additionally requires the directive''s measure vocabulary (essential/important entity, incident handling, supply chain security, cyber hygiene). The individual Article 21(2) measure names are generic security vocabulary, so they corroborate but never trigger alone; consultancy and academic material is suppressed only by noise exclusions.'
jurisdictions:
  - eu
regulations:
- "Directive (EU) 2022/2555 (NIS2)"
frameworks:
- ISO 27001
data_categories:
  - security
  - governance
corroborative_evidence:
  keywords:
    - all-hazards approach
    - Directive (EU) 2022/2555
    - NIS2
    - NIS 2
    - essential entity
    - essential entities
    - important entity
    - important entities
    - incident handling
    - supply chain security
    - cyber hygiene
    - business continuity
    - backup management
    - disaster recovery
    - crisis management
    - vulnerability handling
    - multi-factor authentication
    - access control
    - cryptography
    - network and information systems
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
    - corporate-governance
test_cases:
  should_match:
    - value: |-
        NIS2 Article 21 gap assessment — cybersecurity risk-management measures.
        Entity classification: important entity (waste management sector).
        Findings: incident handling procedures partially compliant; supply chain security
        assessments not performed for 12 of 30 direct suppliers; multi-factor authentication
        not enforced for remote administrative access to network and information systems.
        Remediation deadline: Q4 2026. Distribution restricted to the security committee.
      description: Gap assessment cataloguing unremediated Article 21 deficiencies
    - value: 'Board paper 14/2026: approval of updated cybersecurity risk-management measures under Directive (EU) 2022/2555. The measures follow an all-hazards approach covering business continuity, backup management and disaster recovery, crisis management, and basic cyber hygiene practices with cybersecurity training for all staff. The board is asked to approve the residual risk acceptances listed in Annex 2.'
      description: Board approval paper for the Article 21 measures with risk acceptances
    - value: 'Policy on cryptography and encryption — adopted as part of the entity''s cybersecurity risk-management measures (NIS2 Article 21(2)(h)). Access control policies and asset management procedures are set out in sections 4 to 6; vulnerability handling and disclosure in section 7; use of multi-factor authentication and secured emergency communication systems in section 8.'
      description: Implementing policy mapped to the Article 21(2) measure list
  should_not_match:
    - value: 'Client newsletter: NIS2''s cybersecurity risk-management measures explained — what essential and important entities need to do before the national transposition deadline. Book a readiness workshop with our advisory team.'
      description: Law-firm client newsletter about Article 21 obligations
    - value: 'Recorded webinar now available: implementing the cybersecurity risk-management measures of NIS2 Article 21 with our GRC platform, from the all-hazards approach to incident handling. Includes a demo tenant and sample policy pack.'
      description: Vendor webinar with sample policy pack (filter-dependent negative)
    - value: An academic survey of the cybersecurity risk-management measures and all-hazards approach in EU regulation, comparing NIS2 Article 21 with sectoral requirements; the article analyses published national transposition measures.
      description: Academic article on Article 21 in EU regulation
false_positives:
  - description: Consultancy marketing, law-firm alerts, and academic analysis of Article 21 obligations
    mitigation: 'Negative keyword exclusion: ''newsletter'', ''webinar'', ''explainer'', ''press release'', ''blog post'', ''academic''. Advisory content reuses the directive''s vocabulary; residual matches are expected for a topic classifier.'
  - description: Generic ISO 27001 / security-policy documents that mention incident handling or access control without NIS2 scope
    mitigation: The primary requires the full NIS2 term of art 'cybersecurity risk-management measures'; individual measure names and 'all-hazards approach' are corroborative only
  - description: Emergency-management and civil-protection material (FEMA, disaster planning) using 'all-hazards approach'
    mitigation: '''All-hazards approach'' is corroborative-only and never fires alone at any tier; a match requires the ''cybersecurity risk-management measures'' primary, which does not occur in civil-protection prose'
  - description: Policy templates and GRC-vendor boilerplate implementing the measure list
    mitigation: Shared template-exclusion dictionary (template, boilerplate, sample, placeholder) as NOT evidence on every tier
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_eu_nis2_cybersecurity_risk_measures_topic_terms
      matches:
        - ref: Evidence_eu_nis2_cybersecurity_risk_measures_primary
        - ref: Evidence_eu_nis2_cybersecurity_risk_measures_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_nis2_cybersecurity_risk_measures_exclusion
    - confidence_level: 75
      id_match: Pattern_eu_nis2_cybersecurity_risk_measures_topic_terms
      matches:
        - ref: Evidence_eu_nis2_cybersecurity_risk_measures_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_nis2_cybersecurity_risk_measures_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_eu_nis2_cybersecurity_risk_measures_topic_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_nis2_cybersecurity_risk_measures_exclusion
  regexes:
    - id: Pattern_eu_nis2_cybersecurity_risk_measures_topic_terms
      pattern: (?i)\bcybersecurity\s+risk[\s-]management\s+measures\b
  keywords:
    - id: Evidence_eu_nis2_cybersecurity_risk_measures_primary
      groups:
        - match_style: word
          terms:
            - cybersecurity risk-management measures
            - cybersecurity risk management measures
      strength: specific
    - id: Evidence_eu_nis2_cybersecurity_risk_measures_corroborative
      groups:
        - match_style: word
          terms:
            - all-hazards approach
            - all hazards approach
            - Directive (EU) 2022/2555
            - text: NIS2
              case_sensitive: true
            - text: NIS 2
              case_sensitive: true
            - essential entity
            - essential entities
            - important entity
            - important entities
            - incident handling
            - supply chain security
            - cyber hygiene
            - backup management
            - disaster recovery
            - crisis management
            - vulnerability handling
            - multi-factor authentication
            - network and information systems
      strength: domain
    - id: Filter_eu_nis2_cybersecurity_risk_measures_exclusion
      groups:
        - match_style: word
          terms:
            - press release
            - media statement
            - consultation paper
            - explainer
            - webinar
            - newsletter
            - blog post
            - academic
            - training course
      strength: noise
risk_rating: 4
risk_description: >-
  The NIS2 Article 21 concept regex covers incident handling, supply-chain security, continuity, cryptography, access control, multifactor authentication, and related board or gap-assessment language, while excluding obvious public samples. Directives, guidance, and templates have little standalone sensitivity, but an organisation-specific assessment can catalogue unremediated weaknesses and accepted residual risks that support attack planning. The normal topic match does not identify an entity, live control gap, or reachable system and therefore creates limited harm. Risk 4 and OFFICIAL suit the public or unattributed branch; SENSITIVE requires a current internal assessment that names exploitable deficiencies, affected services, or unresolved control failures.
sensitivity_labels:
