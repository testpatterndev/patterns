schema: testpattern/v1
name: Loan covenant compliance records
slug: au-top500-137-loan-covenant-compliance-records
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to loan covenant compliance records in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:loan\s+covenant|covenant\s+compliance|debt\s+covenant|financial\s+covenant|covenant\s+breach|loan\s+agreement|credit\s+facility|debt\s+service\s+coverage|leverage\s+ratio|borrower\s+obligation)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - loan covenant compliance records
    - loan
    - covenant
    - compliance
    - records
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: loan covenant
      description: Primary topic phrase match
    - value: covenant compliance
      description: Case-insensitive topic phrase match
    - value: debt covenant
      description: Alternative topic phrase match
    - value: financial covenant
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_loan_covenant
      matches:
        - ref: Evidence_loan_covenant
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_loan_covenant
      matches:
        - ref: Evidence_loan_covenant
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_loan_covenant
      matches:
        - ref: Evidence_loan_covenant
  regexes:
    - id: Pattern_loan_covenant
      pattern: >-
        (?is)\b(?:loan\s+covenant|covenant\s+compliance|debt\s+covenant|financial\s+covenant|covenant\s+breach|loan\s+agreement|credit\s+facility|debt\s+service\s+coverage|leverage\s+ratio|borrower\s+obligation)\b
  keywords:
    - id: Evidence_loan_covenant
      groups:
        - match_style: word
          terms:
            - loan covenant
            - covenant compliance
            - debt covenant
            - financial covenant
            - covenant breach
            - loan agreement
            - credit facility
            - debt service coverage
            - leverage ratio
            - borrower obligation
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
