schema: testpattern/v1
name: Australian Mortgage Document
slug: au-mortgage-document
version: 1.4.1
type: keyword_list
pattern_class: concept
description: Detects mortgage documents containing property security details, LVR ratios, and borrower financial information.
operation: >-
  Keyword-based detection matching mortgage, mortgagor, mortgagee, LVR, and property security patterns. Corroborative
  evidence: 14 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
  - legal
  - pii
test_cases:
  should_match:
    - value: 'Mortgage deed: mortgagor grants first mortgage over property security'
      description: Test match 1
    - value: Loan to value ratio (LVR) of 80% on title deed registered mortgage
      description: Test match 2
    - value: Discharge of mortgage application for mortgagee consent
      description: Test match 3
  should_not_match:
    - value: Mortgage rates comparison website
      description: Non-match 1
    - value: He mortgaged his future for the project
      description: Non-match 2
false_positives:
  - description: Mortgage rate comparisons or metaphorical use.
    mitigation: Require legal mortgage terms like mortgagor, mortgagee, or mortgage deed.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This classifier identifies mortgage deeds and related records through mortgagor, mortgagee, property security, title, LVR, discharge, and consent terms. Disclosure can reveal a borrower's address, secured property, debt position, equity, lender relationship, and settlement details that support fraud, coercion, or targeted impersonation. The borrower, household, lender, and property stakeholders may face serious financial, legal, and privacy harm within one mortgage, while title changes and fund movements still require formal verification. Risk 8 and SENSITIVE Legal fit that composite security record, while a bulk mortgage portfolio or privileged land and lending-system access would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_mortgage
      matches:
        - ref: Keyword_property_security
        - ref: Keyword_mortgage_terms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_mortgage
      matches:
        - ref: Keyword_legal_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_mortgage
      pattern: >-
        (?i)\b(?:mortgage\s+(?:deed|agreement|contract)|home\s+loan\s+(?:agreement|contract)|secured\s+loan\s+(?:agreement|deed)|residential\s+mortgage)\b
  keywords:
    - id: Keyword_property_security
      groups:
        - match_style: word
          terms:
            - security interest
            - charged property
            - registered mortgage
            - land title
            - certificate of title
            - lot and plan
            - title number
            - property address
      strength: specific
    - id: Keyword_mortgage_terms
      groups:
        - match_style: word
          terms:
            - loan to value
            - text: LTV
              case_sensitive: true
            - text: LMI
              case_sensitive: true
            - break fee
            - early exit
            - fixed rate
            - variable rate
            - offset account
            - redraw
            - mortgagor
            - mortgagee
      strength: domain
    - id: Keyword_legal_general
      groups:
        - match_style: word
          terms:
            - agreement
            - contract
            - deed
            - executed
            - witnessed
            - signature
            - cooling off
            - default
            - termination
            - entire agreement
      strength: domain
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 559 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - mortgage application
  - mortgage broker
  - mortgage repayment
  - mortgagor
  - mortgagee
  - mortgage deed
  - property security
  - loan to value
  - LVR
  - LTV
  - first mortgage
  - second mortgage
  - discharge of mortgage
  - mortgage registration
  - title deed
  - encumbrance
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
