schema: testpattern/v1
name: Customer account credentials
slug: au-top500-362-customer-account-credentials
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to customer account credentials in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: credentials.'
pattern: (?is)\b(?:customer\s+account\s+credentials|access\s+token|API\s+key|secret\s+key|password\s+hash|security\s+question)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - customer account credentials
    - customer
    - account
    - credentials
    - commercial
    - data
  proximity: 300
  keyword_lists:

    - credentials
test_cases:
  should_match:
    - value: customer account credentials
      description: Primary topic phrase match
    - value: access token
      description: Case-insensitive topic phrase match
    - value: API key
      description: Alternative topic phrase match
    - value: secret key
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to customer account credentials appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_customer_account_credentials
      matches:
        - ref: Evidence_customer_account_credentials
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_customer_account_credentials
      matches:
        - ref: Evidence_customer_account_credentials
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_customer_account_credentials
      matches:
        - ref: Evidence_customer_account_credentials
  regexes:
    - id: Pattern_customer_account_credentials
      pattern: (?is)\b(?:customer\s+account\s+credentials|access\s+token|API\s+key|secret\s+key|password\s+hash|security\s+question)\b
  keywords:
    - id: Evidence_customer_account_credentials
      groups:
        - match_style: word
          terms:
            - customer account credentials
            - credentials
            - password
            - authentication
            - login
            - username
            - access token
            - API key
            - secret key
            - two-factor
            - password hash
            - security question
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
