schema: testpattern/v1
name: Strategic roadmap documents
slug: global-top500-189-strategic-roadmap-documents
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to strategic roadmap documents in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:strategic\s+roadmap|strategic\s+plan|corporate\s+strategy|long[\s-]+range\s+plan|five[\s-]+year\s+plan|growth\s+strategy|strategic\s+initiative|board\s+strategy|strategic\s+priority|competitive\s+positioning|market\s+expansion)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - strategic roadmap documents
    - strategic
    - roadmap
    - documents
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: strategic roadmap
      description: Primary topic phrase match
    - value: strategic plan
      description: Case-insensitive topic phrase match
    - value: corporate strategy
      description: Alternative topic phrase match
    - value: long-range plan
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to strategic roadmap documents appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_strategic_roadmap
      matches:
        - ref: Pattern_global_top500_189_strategic_roadmap_documents_label_context
        - ref: Keyword_global_top500_189_strategic_roadmap_documents_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_strategic_roadmap
      matches:
        - ref: Keyword_strategic_roadmap
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_strategic_roadmap
      pattern: >-
        (?is)\b(?:strategic\s+roadmap|strategic\s+plan|corporate\s+strategy|long[\s-]+range\s+plan|five[\s-]+year\s+plan|growth\s+strategy|strategic\s+initiative|board\s+strategy|strategic\s+priority|competitive\s+positioning|market\s+expansion)\b
    - id: Pattern_global_top500_189_strategic_roadmap_documents_label_context
      pattern: (?i)\b(?:strategic\s+roadmap\s+documents)\b
  keywords:
    - id: Keyword_strategic_roadmap
      groups:
        - match_style: word
          terms:
            - strategic roadmap
            - strategic plan
            - corporate strategy
            - long-range plan
            - five-year plan
            - growth strategy
            - strategic initiative
            - board strategy
            - strategic priority
            - competitive positioning
            - market expansion
      strength: specific
    - id: Keyword_global_top500_189_strategic_roadmap_documents_domain_context
      groups:
        - match_style: word
          terms:
            - strategic roadmap documents
            - strategic
            - roadmap
            - documents
      strength: domain
risk_description: >-
  The regex flags strategic roadmaps, strategic plans, corporate strategy, long-range plans, growth initiatives, and market-expansion language with business context, not a complete roadmap. A match can signal organizational direction and provide limited competitive reconnaissance, but meaningful misuse needs named markets, investments, milestones, budgets, dependencies, and timing. The ordinary phrase or section heading therefore has bounded commercial value and may occur in governance templates or general planning discussion. Risk 5 and OFFICIAL fit that signal; a detailed board-approved roadmap containing unannounced investments, acquisitions, exits, or competitive commitments would justify SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
