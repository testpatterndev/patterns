    title: 'TruffleHog production Auth0 OAuth detector (label-gated client secret [a-zA-Z0-9_-]{64,})'
  - url: https://github.com/mongodb/kingfisher/blob/main/crates/kingfisher-rules/data/rules/auth0.yml
    title: 'Kingfisher production Auth0 rules (label-gated client secret [a-z0-9_-]{64,} case-insensitive)'
  - url: https://www.gitguardian.com/remediation/auth0-key
    title: Remediating Auth0 Key leaks - GitGuardian (detector exists; format not published)
