schema: testpattern/v1
name: Scheduled maintenance plans
slug: au-top500-318-scheduled-maintenance-plans
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies scheduled maintenance plans patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:scheduled\s+maintenance|maintenance\s+window|planned\s+outage|maintenance\s+plan|patching\s+schedule|downtime\s+notification|service\s+interruption|maintenance\s+calendar|system\s+update|firmware\s+update|maintenance\s+notification|change\s+window)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - scheduled maintenance plans
    - scheduled
    - maintenance
    - plans
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: scheduled maintenance
      description: Primary topic phrase match
    - value: maintenance window
      description: Case-insensitive topic phrase match
    - value: planned outage
      description: Alternative topic phrase match
    - value: maintenance plan
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_scheduled_maintenance
      matches:
        - ref: Evidence_scheduled_maintenance
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_scheduled_maintenance
      matches:
        - ref: Evidence_scheduled_maintenance
    - confidence_level: 65
      id_match: Pattern_scheduled_maintenance
      matches:
        - ref: Evidence_scheduled_maintenance
  regexes:
    - id: Pattern_scheduled_maintenance
      pattern: (?is)\b(?:scheduled\s+maintenance|maintenance\s+window|planned\s+outage|maintenance\s+plan|patching\s+schedule|downtime\s+notification|service\s+interruption|maintenance\s+calendar|system\s+update|firmware\s+update|maintenance\s+notification|change\s+window)\b
  keywords:
    - id: Evidence_scheduled_maintenance
      groups:
        - match_style: word
          terms:
            - scheduled maintenance
            - maintenance window
            - planned outage
            - maintenance plan
            - patching schedule
            - downtime notification
            - service interruption
            - maintenance calendar
            - system update
            - firmware update
            - maintenance notification
            - change window
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
