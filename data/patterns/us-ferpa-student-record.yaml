      does not match lower-case "gpa" in prose (catalog quality gate: shortAcronyms).
  - version: 1.2.0
    date: '2026-07-17'
    description: >-
      Reduced-scope deployment wiring (TP-01670): add Purview pattern tiers for the existing
      labelled student/SIS/enrollment regex (mapped unchanged, preserving the authored
      six-to-twelve-character boundaries) — the labelled primary enforces at 75, and
      Keyword_us_ferpa_record education-record evidence (transcript, GPA, grade, registrar,
      course, semester, degree, academic/education record) raises it to 85. Per QA, template/
      training markers and conflicting employee/customer/member ID labels are implemented as
      Keyword_us_ferpa_noise keyword NOT evidence (not a filter term list). No 65 discovery
      tier: that is reserved for a future broader/unlabelled format. Added registrar-transcript
      positive.
  - version: 1.1.1
