schema: testpattern/v1
name: U.S. FERPA Student Education Record ID
slug: us-ferpa-student-record
version: 1.2.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects student identifiers that appear in education records protected under the Family Educational Rights and Privacy
  Act (FERPA). Student ID formats are institution-specific, so this pattern anchors on an explicit student/enrolment/SIS
  context label immediately preceding a 6-12 character alphanumeric ID, and relies on education-record keywords
  (transcript, GPA, enrollment, registrar) for corroboration.
operation: >-
  Matches a "student id"/"student number"/"SIS id"/"enrollment id" context label followed by a 6-12 character
  alphanumeric ID. The label is part of the primary regex; corroborative FERPA education-record keywords within 300
  characters confirm the academic context. Purview tiers: the labelled primary alone carries student-identifier
  semantics and enforces at 75; education-record evidence (transcript, GPA, grade, registrar, course, semester,
  degree, academic/education record) raises it to 85. Template/training markers and conflicting employee/customer/
  member ID labels are modelled as keyword NOT evidence on both tiers.
pattern: \b(?:student\s+(?:id|number)|SIS\s+id|enrollment\s+id)[\s:#]{0,8}[A-Z0-9]{6,12}\b
confidence: high
confidence_justification: >-
  High confidence: the ID must be immediately preceded by an explicit student/enrolment label, so generic alphanumeric
  strings will not match. Corroborative education-record keywords distinguish protected records from unrelated ID labels.
jurisdictions:
  - us
regulations:
  - FERPA
  - "State Breach Laws (US)"
  - "CCPA/CPRA"
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - pii
  - education
corroborative_evidence:
  keywords:
    - transcript
    - GPA
    - grade point average
    - enrollment
    - registrar
    - academic record
    - course
    - semester
    - degree
    - student
    - university
    - college
    - school district
    - education record
  proximity: 300
test_cases:
  should_match:
    - value: 'Student ID: A1234567'
      description: Labelled student ID with alphanumeric body
    - value: SIS id 90817263
      description: SIS id label with 8-digit body
    - value: 'Enrollment ID: STU00412'
      description: Enrollment ID label with mixed alphanumeric body
    - value: 'Registrar transcript: Student ID A1234567, GPA 3.8, Fall 2026 grades attached.'
      description: Labelled ID corroborated by registrar, transcript, GPA, and grades reaches the 85 tier
  should_not_match:
    - value: 'Employee ID: A1234567'
      description: '"Employee" label is not a student/enrolment context'
    - value: 'Student number: AB12'
      description: Body too short (4 chars, below the 6-char minimum)
    - value: The student council will meet to discuss enrollment trends
      description: Prose about students and enrollment with no ID value
false_positives:
  - description: >-
      Generic ticket, ticketing, or membership numbers labelled "student" in non-academic contexts (e.g. a museum
      student-discount ticket).
    mitigation: >-
      Require corroborative education-record keywords (transcript, GPA, registrar, academic record) within the proximity
      window to confirm a FERPA education-record context.
  - description: Course-catalogue or syllabus templates using placeholder student IDs.
    mitigation: Check for placeholder markers (example, xxxx, 000000) and require co-occurring grade or enrolment data.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_us_ferpa_student_id
      matches:
        - ref: Keyword_us_ferpa_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_us_ferpa_noise
    - confidence_level: 75
      id_match: Regex_us_ferpa_student_id
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_us_ferpa_noise
  regexes:
    - id: Regex_us_ferpa_student_id
      pattern: \b(?:student\s+(?:id|number)|SIS\s+id|enrollment\s+id)[\s:#]{0,8}[A-Z0-9]{6,12}\b
  keywords:
    - id: Keyword_us_ferpa_record
      groups:
        - match_style: word
          terms:
            - transcript
            - text: GPA
              case_sensitive: true
            - grade point average
            - grade
            - registrar
            - course
            - semester
            - degree
            - academic record
            - education record
      strength: specific
    - id: Keyword_us_ferpa_noise
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - training
            - placeholder
            - fictional
            - employee ID
            - customer ID
            - member ID
      strength: noise
risk_rating: 7
risk_description: >-
  This high-confidence identifier detector requires a student ID, student number, SIS ID, or enrollment ID label followed by a six-to-twelve-character value, plus nearby FERPA education-record context. A genuine match persistently links a learner to institutional records and can support impersonation, record lookup, or correlation across disclosed education material. The identifier is not itself an authentication secret, and course templates or non-academic student discount numbers remain documented false positives. Risk 7 SENSITIVE fits a contextualised student-record identifier, while PROTECTED requires linked high-impact records, access credentials, bulk identifiers, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://www.ecfr.gov/current/title-34/subtitle-A/part-99
    title: "34 CFR Part 99 - Family Educational Rights and Privacy Act (FERPA) - eCFR"
  - url: https://studentprivacy.ed.gov/ferpa
    title: "FERPA - U.S. Department of Education Student Privacy Policy Office"
