schema: testpattern/v1
name: Ethics hotline case records
slug: global-top500-170-ethics-hotline-case-records
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to ethics hotline case records in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:ethics\s+hotline\s+case\s+records|ethics\s+hotline|anonymous\s+report|code\s+of\s+conduct\s+violation|ethics\s+complaint|case\s+intake|incident\s+report|speak\s+up|misconduct\s+allegation|ethics\s+investigation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - ethics hotline case records
    - ethics
    - hotline
    - case
    - records
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: ethics hotline case records
      description: Primary topic phrase match
    - value: ethics hotline
      description: Case-insensitive topic phrase match
    - value: anonymous report
      description: Alternative topic phrase match
    - value: code of conduct violation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to ethics hotline case records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_ethics_hotline_case_records
      matches:
        - ref: Pattern_global_top500_170_ethics_hotline_case_records_label_context
        - ref: Keyword_global_top500_170_ethics_hotline_case_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_170_ethics_hotline_case_records_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ethics_hotline_case_records
      matches:
        - ref: Keyword_ethics_hotline_case_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_170_ethics_hotline_case_records_noise_exclusion
    - confidence_level: 65
      id_match: Regex_ethics_hotline_case_records
      matches:
        - ref: Keyword_ethics_hotline_case_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_170_ethics_hotline_case_records_noise_exclusion
  regexes:
    - id: Regex_ethics_hotline_case_records
      pattern: (?is)\b(?:ethics\s+hotline\s+case\s+records|ethics\s+hotline|anonymous\s+report|code\s+of\s+conduct\s+violation|ethics\s+complaint|case\s+intake|incident\s+report|speak\s+up|misconduct\s+allegation|ethics\s+investigation)\b
    - id: Pattern_global_top500_170_ethics_hotline_case_records_label_context
      pattern: (?i)\\b(?:ethics\\s+hotline\\s+case\\s+records|ethics|hotline|case|top500)\\b
  keywords:
    - id: Keyword_ethics_hotline_case_records
      groups:
        - match_style: word
          terms:
            - ethics hotline case records
            - ethics hotline
            - whistleblower
            - anonymous report
            - code of conduct violation
            - ethics complaint
            - case intake
            - incident report
            - retaliation
            - speak up
            - misconduct allegation
            - ethics investigation
    - id: Keyword_global_top500_170_ethics_hotline_case_records_domain_context
      groups:
        - match_style: word
          terms:
            - ethics hotline case records
            - ethics
            - hotline
            - case
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_170_ethics_hotline_case_records_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
