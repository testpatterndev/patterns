schema: testpattern/v1
name: Immunization records
slug: au-top500-333-immunization-records
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies immunization records references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: au-healthcare-records.'
pattern: (?is)\b(?:immunization\s+record|vaccination\s+record|vaccination\s+schedule|immunization\s+register|vaccine\s+dose|immunization\s+history)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - immunization records
    - immunization
    - records
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - au-healthcare-records
test_cases:
  should_match:
    - value: immunization record
      description: Primary topic phrase match
    - value: vaccination record
      description: Case-insensitive topic phrase match
    - value: vaccination schedule
      description: Alternative topic phrase match
    - value: immunization register
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_immunization_records
      matches:
        - ref: Evidence_immunization_records
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_immunization_records
      matches:
        - ref: Evidence_immunization_records
    - confidence_level: 65
      id_match: Pattern_immunization_records
      matches:
        - ref: Evidence_immunization_records
  regexes:
    - id: Pattern_immunization_records
      pattern: (?is)\b(?:immunization\s+record|vaccination\s+record|vaccination\s+schedule|immunization\s+register|vaccine\s+dose|immunization\s+history)\b
  keywords:
    - id: Evidence_immunization_records
      groups:
        - match_style: word
          terms:
            - immunization record
            - vaccination record
            - immunisation
            - vaccine
            - booster
            - immunization
            - health
            - biomedical
            - vaccination schedule
            - immunization register
            - vaccine dose
            - immunization history
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
