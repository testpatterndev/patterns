schema: testpattern/v1
name: Plagiarism investigation files
slug: global-top500-352-plagiarism-investigation-files
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to plagiarism investigation files in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:plagiarism\s+investigation|academic\s+misconduct|academic\s+integrity|similarity\s+report|originality\s+check|disciplinary\s+hearing|academic\s+dishonesty|plagiarism\s+finding|misconduct\s+panel|integrity\s+violation|plagiarism\s+detection)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - plagiarism investigation files
    - plagiarism
    - investigation
    - files
    - education
    - research
    - administration
  proximity: 300
test_cases:
  should_match:
    - value: plagiarism investigation
      description: Primary topic phrase match
    - value: academic misconduct
      description: Case-insensitive topic phrase match
    - value: academic integrity
      description: Alternative topic phrase match
    - value: similarity report
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to plagiarism investigation files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_plagiarism_investigation
      matches:
        - ref: Pattern_global_top500_352_plagiarism_investigation_files_label_context
        - ref: Keyword_global_top500_352_plagiarism_investigation_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_plagiarism_investigation
      matches:
        - ref: Keyword_plagiarism_investigation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_plagiarism_investigation
      matches:
        - ref: Keyword_plagiarism_investigation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_plagiarism_investigation
      pattern: >-
        (?is)\b(?:plagiarism\s+investigation|academic\s+misconduct|academic\s+integrity|similarity\s+report|originality\s+check|disciplinary\s+hearing|academic\s+dishonesty|plagiarism\s+finding|misconduct\s+panel|integrity\s+violation|plagiarism\s+detection)\b
    - id: Pattern_global_top500_352_plagiarism_investigation_files_label_context
      pattern: (?i)\\b(?:plagiarism\\s+investigation\\s+files|plagiarism|investigation|files|top500)\\b
  keywords:
    - id: Keyword_plagiarism_investigation
      groups:
        - match_style: word
          terms:
            - plagiarism investigation
            - academic misconduct
            - academic integrity
            - similarity report
            - Turnitin
            - originality check
            - disciplinary hearing
            - academic dishonesty
            - plagiarism finding
            - misconduct panel
            - integrity violation
            - plagiarism detection
    - id: Keyword_global_top500_352_plagiarism_investigation_files_domain_context
      groups:
        - match_style: word
          terms:
            - plagiarism investigation files
            - plagiarism
            - investigation
            - files
            - top500
            - field
            - identifier
            - reference
