schema: testpattern/v1
name: Police Body Worn Camera Metadata
slug: police-body-worn-camera-metadata
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects metadata records from police body-worn camera (BWC) systems including activation timestamps, officer identification, incident cross-references, and footage catalogue entries. This pattern targets the metadata and logs, NOT the footage itself. BWC metadata reveals which officers attended which incidents, activation patterns, and evidence chain-of-custody details.
operation: 'Keyword proximity: primary keywords (body worn camera, BWC, activation log, footage reference, officer ID, incident link) within 300 characters of metadata fields such as timestamps, officer identifiers, and incident reference numbers. Negative keyword exclusion for BWC policy documents and procurement tenders.'
pattern: (?i)\b(body\s+worn\s+camera\s+(?:metadata|log|record|activation)|BWC\s+(?:activation|footage|reference|log|record)|(?:activation|deactivation)\s+(?:timestamp|log|record)|footage\s+(?:reference|catalogue|index)|officer\s+(?:ID|identification)\s+(?:badge|number))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of BWC-specific metadata terminology with officer identification and incident reference numbers. Policy documents and tenders discuss BWC in general terms without activation logs or specific officer-incident linkages.'
jurisdictions:
  - au
regulations:
  - qgiscf
  - ppra-2000-qld
  - police-service-administration-act-1990-qld
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - SENSITIVE
    - Law-Enforcement
    - body worn camera
    - BWC
    - activation log
    - footage reference
    - officer ID
    - incident link
    - QPS
    - digital evidence
    - evidence management
    - chain of custody
    - activation timestamp
    - deactivation
  proximity: 300
  keyword_lists:
    - law-enforcement
    - government-services
test_cases:
  should_match:
    - value: 'SENSITIVE Law-Enforcement. QPS Body Worn Camera Activation Log. Officer: Const. S. Morales, Badge 23841, Fortitude Valley Patrol Group. BWC Unit ID: BWC-FV-0284. Activation timestamp: 2026-02-14T22:14:33+10:00. Deactivation timestamp: 2026-02-14T23:47:12+10:00. Duration: 01:32:39. Incident link: OCC-0458723. Footage reference: BWC-FV-0284-20260214-221433.mp4. Category: Use of Force. Chain of custody: uploaded to DEMS at 2026-02-15T01:12:08+10:00.'
      description: BWC activation log with officer details, timestamps, and incident cross-reference
    - value: 'Body Worn Camera Metadata Report — Weekly Summary. Period: 10-16 February 2026. South Brisbane District. Total activations: 847. Activations by category: General Duties 412, Traffic 198, DFV Attendance 127, Use of Force 48, Watch House 62. Officer ID 14892 (Sgt Thompson): 23 activations, 14.2 hours total footage. Footage reference index attached. All records uploaded to Digital Evidence Management System within 24 hours.'
      description: BWC weekly metadata summary with officer activation counts and categories
    - value: 'QPS Digital Evidence — BWC Record. Footage catalogue entry for Operation FALCON evidence bundle. BWC activation record: Officer ID 22104 (Const. Chen), activation timestamp 2026-01-28T19:23:41+10:00, location GPS coordinates -27.4698, 153.0251 (West End). Incident link: QP-2026-0034521. Evidence category: Drug search — PPRA s.30. Chain of custody log: downloaded by Det. Sgt K. O''Brien, CIB South Brisbane, 29 January 2026.'
      description: BWC evidence catalogue entry with GPS coordinates and operation cross-reference
  should_not_match:
    - value: 'QPS Policy: Body Worn Camera Guidelines (Version 3.1, July 2025). This policy outlines the requirements for activation, use, and management of body worn cameras by QPS officers. Officers must activate their BWC when attending any incident involving potential use of force.'
      description: Published QPS BWC policy document
    - value: The Queensland Government issued a tender for 5,000 body worn camera units and associated digital evidence management infrastructure. The tender requires BWC units with minimum 12-hour battery life and GPS capability.
      description: BWC procurement tender document
    - value: A policing journal article examined the impact of body worn cameras on use-of-force complaints, finding a 32% reduction in complaints after BWC deployment across three Queensland police districts.
      description: Academic journal article on BWC effectiveness study
false_positives:
  - description: Published QPS BWC policy and operational guidelines
    mitigation: 'Negative keyword exclusion: ''policy'', ''guidelines'', ''version'', ''outlines requirements'', ''must activate'''
  - description: Government procurement tenders for BWC equipment
    mitigation: 'Negative keyword exclusion: ''tender'', ''procurement'', ''contract'', ''specification'', ''battery life'''
  - description: Academic research on BWC effectiveness and policing outcomes
    mitigation: 'Negative keyword exclusion: ''journal'', ''article'', ''examined'', ''study'', ''finding'', ''reduction'''
  - description: Media reporting on BWC deployment announcements
    mitigation: 'Negative keyword exclusion: ''media release'', ''announced'', ''rollout'', ''deployment plan'''
exports:
  - purview_xml
  - yaml
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: BWC metadata terms with 2+ primary keywords plus officer ID and incident cross-reference
    - tier: medium
      confidence: 75
      description: 2+ primary keywords with activation timestamp and footage reference
    - tier: low
      confidence: 65
      description: 1 primary keyword with BWC reference regex and corroborative terms
  regexes:
    - name: bwc_metadata_terms
      pattern: (?i)\b(body\s+worn\s+camera\s+(?:metadata|log|record|activation)|BWC\s+(?:activation|footage|reference|log|record))\b
    - name: bwc_unit_reference
      pattern: \bBWC-[A-Z]{2,4}-\d{3,5}\b
    - name: activation_timestamp
      pattern: (?i)\b(?:activation|deactivation)\s+timestamp\b
  keywords:
    - name: primary_keywords
      words:
        - body worn camera metadata
        - body worn camera log
        - body worn camera activation
        - BWC activation log
        - BWC footage reference
        - BWC record
        - activation timestamp
        - deactivation timestamp
        - footage catalogue
        - footage reference index
    - name: classification_markers
      words:
        - SENSITIVE
        - Law-Enforcement
        - OFFICIAL
        - QPS
        - Queensland Police Service
        - digital evidence
    - name: corroborative_terms
      words:
        - officer ID
        - badge number
        - incident link
        - chain of custody
        - evidence management
        - DEMS
        - uploaded
        - GPS coordinates
        - use of force
        - evidence category
        - activation record
        - footage duration
    - name: negative_keywords
      words:
        - policy
        - guidelines
        - outlines requirements
        - must activate
        - tender
        - procurement
        - contract
        - specification
        - battery life
        - journal
        - article
        - examined
        - study
        - finding
        - reduction
        - media release
        - announced
        - rollout
  filters:
    - type: exclude
      description: Exclude policy documents, procurement tenders, academic research, and media reporting
      keywords:
        - policy
        - guidelines
        - tender
        - procurement
        - specification
        - journal
        - article
        - study
        - media release
        - announced
        - rollout
risk_rating: 7
risk_description: BWC metadata reveals which officers attended specific incidents, activation patterns, evidence chain-of-custody, and GPS locations. Disclosure could compromise ongoing investigations, reveal surveillance patterns, or undermine evidence integrity, but does not contain the footage itself. Inappropriate release could compromise proceedings, endanger individuals, or undermine enforcement activities.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
