schema: testpattern/v1
name: Regulatory Prosecution Brief
slug: regulatory-prosecution-brief
version: 1.4.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects prosecution briefs prepared by Queensland regulatory bodies (Workplace Health and Safety, Environmental Protection Authority, Office of Fair Trading) for enforcement action. Disclosure compromises prosecution integrity and alerts enforcement targets.
operation: 'Primary detection: keyword proximity matching prosecution terms (''prosecution brief'', ''brief of evidence'', ''enforcement brief'', ''prosecution recommendation'') within 200 characters of regulatory body names or indicators (''WHS'', ''Work Health and Safety'', ''Environmental Protection'', ''Fair Trading'', ''regulatory'', ''PROTECTED''). Regex detection: prosecution reference numbers. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:prosecution\s+brief|brief\s+of\s+evidence|enforcement\s+brief|prosecution\s+recommendation)\b
confidence: medium
confidence_justification: 'Medium confidence: Prosecution brief terminology combined with specific Queensland regulatory body names creates a narrow detection window. The combination of legal prosecution language with regulatory context eliminates academic and general legal references.'
jurisdictions:
  - au
regulations:
- "Criminal Code 1899 (Qld)"
- "Environmental Protection Act 1994 (Qld)"
- "WHS Act 2011 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - WHS
    - Environmental Protection
    - Fair Trading
    - regulator
    - PROTECTED
    - privilege
    - enforcement action
    - penalty
    - charges
    - defendant
    - offence
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        PROTECTED — NOT FOR DISCLOSURE
        Prosecution Brief
        Regulator: Office of Industrial Relations — Work Health and Safety
        Ref: WHS-PROS-2025-0234

        Recommendation: Prosecute under s.32 Work Health and Safety Act 2011 for Category 1 offence. Brief of evidence attached.
      description: WHS prosecution brief with reference number
    - value: This enforcement brief recommends prosecution of the operator under the Environmental Protection Act 1994. The prosecution recommendation is based on evidence of unlawful discharge of contaminants at the Gladstone facility. PROTECTED — privilege.
      description: Environmental prosecution brief with recommendation
    - value: |-
        CONFIDENTIAL — LEGAL PROFESSIONAL PRIVILEGE
        Prosecution Recommendation
        Regulatory body: Department of Justice — Office of Fair Trading
        Subject: Misleading conduct — property developer
        Evidence summary: 47 consumer complaints, 12 witness statements
      description: Fair Trading prosecution recommendation
  should_not_match:
    - value: The prosecution was reported in the Courier-Mail on 15 June 2024. The company was fined $1.2 million for workplace safety breaches following the prosecution brought by Workplace Health and Safety Queensland.
      description: News article about completed prosecution
    - value: This chapter examines the regulatory prosecution process under Australian work health and safety legislation. Students should understand the elements required for a successful prosecution brief.
      description: Academic textbook on regulatory prosecution
    - value: The annual report of the Office of Fair Trading noted 42 prosecutions were commenced during the reporting period. The published statistics show an increase in enforcement activity.
      description: Published regulatory annual report with prosecution statistics
false_positives:
  - description: News articles about completed regulatory prosecutions
    mitigation: Negative match on 'fined', 'convicted', 'sentenced', 'media release'. Focus on pre-prosecution briefs not outcomes
  - description: Academic materials on regulatory prosecution processes
    mitigation: Require co-occurrence with specific regulatory body names and privilege/PROTECTED markers
  - description: Published annual reports with prosecution statistics
    mitigation: Negative match on 'annual report', 'statistics', 'published', 'tabled'
  - description: Defence-side prosecution response materials
    mitigation: Require government regulator entity context
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_regulatory_prosecution_brief_prosecution_brief_terminology
      matches:
        - ref: Evidence_regulatory_prosecution_brief_primary
        - ref: Evidence_regulatory_prosecution_brief_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_regulatory_prosecution_brief_exclusion
        - ref: Pattern_regulatory_prosecution_brief_whs_prosecution_reference_number
        - ref: Pattern_regulatory_prosecution_brief_enforcement_reference_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_regulatory_prosecution_brief_exclusion
    - confidence_level: 75
      id_match: Pattern_regulatory_prosecution_brief_prosecution_brief_terminology
      matches:
        - ref: Evidence_regulatory_prosecution_brief_primary
        - ref: Evidence_regulatory_prosecution_brief_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_regulatory_prosecution_brief_exclusion
            - Evidence_regulatory_prosecution_brief_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_regulatory_prosecution_brief_prosecution_brief_terminology
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_regulatory_prosecution_brief_exclusion
  regexes:
    - id: Pattern_regulatory_prosecution_brief_prosecution_brief_terminology
      pattern: (?i)\b(?:prosecution\s+brief|brief\s+of\s+evidence|enforcement\s+brief)\b
    - id: Pattern_regulatory_prosecution_brief_whs_prosecution_reference_number
      pattern: (?i)\bWHS-PROS-\d{4}-\d{4}\b
    - id: Pattern_regulatory_prosecution_brief_enforcement_reference_number
      pattern: (?i)\bENF-\d{4}-\d{4,6}\b
  keywords:
    - id: Evidence_regulatory_prosecution_brief_primary
      groups:
        - match_style: word
          terms:
            - prosecution brief
            - brief of evidence
            - enforcement brief
            - prosecution recommendation
      strength: specific
    - id: Evidence_regulatory_prosecution_brief_corroborative
      groups:
        - match_style: word
          terms:
            - text: WHS
              case_sensitive: true
            - Environmental Protection
            - Fair Trading
            - PROTECTED
            - privilege
            - enforcement action
            - charges
            - offence
            - defendant
      strength: domain
    - id: Evidence_regulatory_prosecution_brief_exclusion
      groups:
        - match_style: word
          terms:
            - fined
            - convicted
            - sentenced
            - media release
            - annual report
            - statistics
            - published
            - textbook
      strength: noise
    - id: Filter_regulatory_prosecution_brief_exclusion
      groups:
        - match_style: word
          terms:
            - court outcome
            - penalty imposed
            - conviction recorded

      strength: noise
risk_rating: 8
risk_description: >-
  The keyword-proximity detector identifies regulatory prosecution briefs, briefs of evidence, enforcement recommendations, and prosecution references tied to Queensland regulators rather than public reporting of completed cases. A true brief can reveal witnesses, exhibits, alleged offences, investigative gaps, enforcement timing, and the regulator's recommendation, allowing a target to destroy evidence, coordinate accounts, or frustrate proceedings. The ordinary unit is a bounded active enforcement brief with serious legal and operational impact. Risk 8 supports SENSITIVE Legal; PROTECTED would require credible life-safety consequences, critical-service exposure, protected operations, or system-scale compromise beyond one prosecution.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
