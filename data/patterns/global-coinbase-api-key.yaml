schema: testpattern/v1
name: Coinbase API Key
slug: global-coinbase-api-key
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects Coinbase Developer Platform (CDP) API key names, which use the distinctive
  resource-path form organizations/{org-uuid}/apiKeys/{key-uuid}. This key name is paired
  with an EC/ECDSA (or Ed25519) signing secret and is used to mint ES256 JWTs for the
  Coinbase API. A leaked CDP key can grant programmatic access to accounts, trading and
  funds. The associated EC PRIVATE KEY PEM secret is detected separately by global-ec-private.
operation: >-
  Literal path organizations/ + a 36-char UUID (8-4-4-4-12 hex) + /apiKeys/ + a second UUID.
  The full two-UUID Coinbase resource path is highly distinctive, so the value alone is
  strong evidence. Corroborative evidence: keywords within 300 characters. Keyword lists:
  credentials.
pattern: (?<![A-Za-z0-9])organizations/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/apiKeys/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the literal organizations/.../apiKeys/... path carrying two UUIDs is a
  Coinbase-specific structure that does not collide with ordinary identifiers, so the value
  is reliable on its own; corroborative Coinbase/credential keywords further raise precision.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - coinbase
    - cdp
    - coinbase developer platform
    - api key
    - api_key
    - key_name
    - private key
    - ec private key
    - jwt
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: 'organizations/00000000-0000-0000-0000-000000000000/apiKeys/11111111-1111-1111-1111-111111111111'
      description: CDP key name with zero-entropy placeholder UUIDs (org + apiKey)
    - value: 'key_name = organizations/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee/apiKeys/12345678-1234-5678-1234-567812345678'
      description: Labelled CDP key name in an assignment, repeated-letter and sequential filler UUIDs
    - value: '"organizations/abcdef01-2345-6789-abcd-ef0123456789/apiKeys/00112233-4455-6677-8899-aabbccddeeff"'
      description: Quoted CDP key name with sequential-hex filler UUIDs
  should_not_match:
    - value: 'organizations/00000000-0000-0000-0000-000000000000/keys/11111111-1111-1111-1111-111111111111'
      description: Wrong path segment (keys instead of apiKeys)
    - value: 'organizations/0000-0000-0000-0000-000000000000/apiKeys/11111111-1111-1111-1111-111111111111'
      description: Malformed org UUID (4 hex in first group instead of 8)
    - value: create a coinbase cdp api key under your organizations settings
      description: Prose mention with the word organizations but no key-name value
false_positives:
  - description: The literal word organizations followed by unrelated UUIDs (e.g. an unrelated resource path) could in principle resemble the structure.
    mitigation: The pattern requires the exact organizations/.../apiKeys/... two-UUID path; require corroborative Coinbase/credential keywords for the highest-precision alerting.
  - description: Documentation or examples showing placeholder organizations/.../apiKeys/... strings.
    mitigation: Check for placeholder markers (example, 0000, xxxx) and require Coinbase context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  A leaked Coinbase Developer Platform API key (with its signing secret) enables JWT-signed,
  authenticated access to Coinbase APIs, potentially exposing account data, trades and funds.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
