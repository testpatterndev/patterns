schema: testpattern/v1
name: Treasury cash position reports
slug: global-top500-118-treasury-cash-position-reports
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to treasury cash position reports in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:cash\s+position|cash\s+balance|daily\s+position|bank\s+balance|cash\s+management|funding\s+position|cash\s+forecast|short[\s-]+term\s+investment|money\s+market|working\s+capital)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - treasury cash position reports
    - treasury
    - cash
    - position
    - reports
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: cash position
      description: Primary topic phrase match
    - value: cash balance
      description: Case-insensitive topic phrase match
    - value: daily position
      description: Alternative topic phrase match
    - value: bank balance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_treasury_cash
      matches:
        - ref: Pattern_global_top500_118_treasury_cash_position_reports_label_context
        - ref: Keyword_global_top500_118_treasury_cash_position_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_treasury_cash
      matches:
        - ref: Keyword_treasury_cash
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_treasury_cash
      matches:
        - ref: Keyword_treasury_cash
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_treasury_cash
      pattern: (?is)\b(?:cash\s+position|cash\s+balance|daily\s+position|bank\s+balance|cash\s+management|funding\s+position|cash\s+forecast|short[\s-]+term\s+investment|money\s+market|working\s+capital)\b
    - id: Pattern_global_top500_118_treasury_cash_position_reports_label_context
      pattern: (?i)\\b(?:treasury\\s+cash\\s+position\\s+reports|treasury|cash|position|reports|top500)\\b
  keywords:
    - id: Keyword_treasury_cash
      groups:
        - match_style: word
          terms:
            - treasury
            - cash position
            - liquidity
            - cash balance
            - daily position
            - bank balance
            - cash management
            - funding position
            - cash forecast
            - short-term investment
            - money market
            - working capital
    - id: Keyword_global_top500_118_treasury_cash_position_reports_domain_context
      groups:
        - match_style: word
          terms:
            - treasury cash position reports
            - treasury
            - cash
            - position
            - reports
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
