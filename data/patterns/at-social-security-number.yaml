schema: testpattern/v1
name: Sozialversicherungsnummer
slug: at-social-security-number
version: 1.2.1
type: regex
engine: universal
description: >-
  Detects Sozialversicherungsnummer patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT
  directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-austria-social-security-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Adds
  label-context matching and exclusion logic for sample/template/test placeholders. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{10}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Context label evidence plus explicit template/example exclusion
  improves precision for high-risk identifiers. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - eu
  - at
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - sozialversicherungsnummer
    - social security
    - SSN
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '1234567890'
      description: Ten-digit Austrian SSN
    - value: '9876543210'
      description: Another ten-digit SSN
    - value: '4567891234'
      description: Valid format SSN
  should_not_match:
    - value: '123456789'
      description: Too few digits (9)
    - value: '12345678901'
      description: Too many digits (11)
    - value: sample template placeholder number 123456789
      description: Template/sample context should be excluded even when numeric-like values appear
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Ten-digit numeric sequences appear in phone numbers, account numbers, and other non-identity contexts.
    mitigation: Require corroborative evidence keywords in German or English within the proximity window.
  - description: In Australian tenants, Australian mobile telephone numbers can satisfy this ten-digit structure and create cross-SIT numeric identifier overmatch.
    mitigation: Use the AU mobile number NONE-of regex gate where phone numbers are not valid positive evidence.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
regional_tuning:
  - jurisdiction: au
    signal: au-mobile-number-overmatch-numeric-id-20260525
    action: exclude-regex
    id: Regex_au_mobile_number_exclusion
    pattern: (?:^|[^0-9])(?:04[0-9]{8}|(?:\+?61[\s.-]?4(?:[\s.-]?[0-9]){8}))(?:$|[^0-9])
    defaultDecision: modify
    risk: regional-phone-number-overmatch
    reason: Aggregate analysis found Australian mobile-shaped literals overmatching this numeric identifier family in AU tenant data.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_at_ssn
      matches:
        - ref: Pattern_at_social_security_number_label_context
        - ref: Keyword_at_social_security_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_at_ssn
      matches:
        - ref: Keyword_at_ssn
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_at_ssn
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_at_ssn
      pattern: \b\d{10}\b
    - id: Pattern_at_social_security_number_label_context
      pattern: (?i)\b(?:sozialversicherungsnummer|social|security|health\s+number|insurance\s+number|patient\s+identifier|social\s+welfare)\b
  keywords:
    - id: Keyword_at_ssn
      groups:
        - match_style: word
          terms:
            - Sozialversicherungsnummer
            - sozialversicherungsnr
            - social security number
            - social security
            - text: SSN
              case_sensitive: true
            - Versicherungsnummer
            - SV-Nummer
            - Sozialversicherung
            - Sozialversicherungs Nr
            - Sozialversicherungs Nummer
            - insurance number
            - social insurance
      strength: domain
    - id: Keyword_at_social_security_number_domain_context
      groups:
        - match_style: word
          terms:
            - sozialversicherungsnummer
            - social
            - security
      strength: domain
  filters:
    - id: Filter_at_ssn_same_digits
      type: AllDigitsSameFilter
risk_rating: 9
risk_description: >-
  This identifier uniquely links to an individual and is a primary target for identity theft and fraud. Exposure can lead to unauthorized financial activity, impersonation, and significant personal
  harm.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-austria-social-security-number
    title: Austria Social Security Number entity definition - Microsoft Learn
