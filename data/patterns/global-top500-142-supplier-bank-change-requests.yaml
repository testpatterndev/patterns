schema: testpattern/v1
name: Supplier bank change requests
slug: global-top500-142-supplier-bank-change-requests
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to supplier bank change requests in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:bank\s+change\s+request|bank\s+detail\s+update|supplier\s+bank\s+change|remittance\s+change|payment\s+detail\s+change|bank\s+account\s+update|new\s+banking\s+details|wire\s+transfer\s+update|vendor\s+bank\s+modification|payment\s+redirection|beneficiary\s+change|account\s+verification)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - supplier bank change requests
    - supplier
    - bank
    - change
    - requests
    - procurement
    - management
  proximity: 300
test_cases:
  should_match:
    - value: bank change request
      description: Primary topic phrase match
    - value: bank detail update
      description: Case-insensitive topic phrase match
    - value: supplier bank change
      description: Alternative topic phrase match
    - value: remittance change
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to supplier bank change requests appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_supplier_bank_change
      matches:
        - ref: Pattern_global_top500_142_supplier_bank_change_requests_label_context
        - ref: Keyword_global_top500_142_supplier_bank_change_requests_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_supplier_bank_change
      matches:
        - ref: Keyword_supplier_bank_change
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_supplier_bank_change
      pattern: >-
        (?is)\b(?:bank\s+change\s+request|bank\s+detail\s+update|supplier\s+bank\s+change|remittance\s+change|payment\s+detail\s+change|bank\s+account\s+update|new\s+banking\s+details|wire\s+transfer\s+update|vendor\s+bank\s+modification|payment\s+redirection|beneficiary\s+change|account\s+verification)\b
    - id: Pattern_global_top500_142_supplier_bank_change_requests_label_context
      pattern: (?i)\b(?:supplier\s+bank\s+change\s+requests)\b
  keywords:
    - id: Keyword_supplier_bank_change
      groups:
        - match_style: word
          terms:
            - bank change request
            - bank detail update
            - supplier bank change
            - remittance change
            - payment detail change
            - bank account update
            - new banking details
            - wire transfer update
            - vendor bank modification
            - payment redirection
            - beneficiary change
            - account verification
      strength: specific
    - id: Keyword_global_top500_142_supplier_bank_change_requests_domain_context
      groups:
        - match_style: word
          terms:
            - supplier bank change requests
            - supplier
            - bank
            - change
            - requests
      strength: domain
risk_description: >-
  The detector finds supplier or vendor bank-change, remittance-update, beneficiary-change, payment-redirection, new-bank-detail, and account-verification language with financial context. A genuine request is a recognised business-email-compromise path: an attacker can substitute destination details or impersonate a supplier before the next payment. The normal exposure affects one supplier relationship or payment stream but can cause serious contained financial loss and control failure even without a complete vendor master file. Risk 8 and SENSITIVE are justified, while PROTECTED is not met because the match does not establish broad treasury compromise, privileged payment authority, or significant systemic damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
