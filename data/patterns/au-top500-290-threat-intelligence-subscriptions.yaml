schema: testpattern/v1
name: Threat intelligence subscriptions
slug: au-top500-290-threat-intelligence-subscriptions
version: 1.5.1
type: regex
pattern_class: concept
engine: boost_regex
description: 'Identifies threat-intelligence, STIX, TAXII, MISP, and intel-feed topic language in security contexts. Discovery-only
  in Purview: provider relationships and common feed use are low-harm OFFICIAL per the risk assessment, so topic and subscription-metadata
  language does not enforce; feed tokens, covert-source identities, or private collection priorities would warrant a separately
  designed enforcing detector.'
operation: 'Pattern type: regex (boost_regex engine). Topic phrase regex with corroborative keywords within 300 characters.
  All Purview tiers are discovery_only: the 75/85 branches corroborated the primary with the same-span phrase list, letting
  a standards sentence (STIX/TAXII exchange guidance) enforce at 85; enforcement is withheld because the risk assessment rates
  provider relationships and common feed use low-harm OFFICIAL.'
pattern: (?i)\b(?:threat\s+intelligence|stix|taxii|misp|intel\s+feed)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
- au
regulations:
- NDB Scheme (Cth)
- SOCI Act 2018 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - threat intelligence subscriptions
  - threat
  - intelligence
  - subscriptions
  - security
  - operations
  - data
  proximity: 300
test_cases:
  should_match:
  - value: Threat intelligence
    description: Topic phrase present
  - value: threat intelligence
    description: Topic phrase, lowercase
  - value: this record references the threat intelligence held on file
    description: Topic phrase within surrounding text
  - value: MISP supports threat intelligence sharing
    description: Platform-capability statement matches the topic vocabulary (discovery inventory only — no tier enforces)
  should_not_match:
  - value: unrelated generic text
    description: No relevant phrase context
  - value: The market intelligence subscription covers commodity prices
    description: Subscription wording without cyber-threat vocabulary must not match
  - value: placeholder value 12345
    description: Random text should not match phrase marker
  - value: generic policy prose without anchors
    description: Should reject generic mentions without structural anchor terms
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: The pattern identifies threat-intelligence, STIX, TAXII, MISP, and intel-feed terminology; it does not detect
  a subscription credential, access token, or confidential source list. Revealing that an organization uses a common feed
  may expose a vendor relationship or modest defensive preference, but it does not provide access to the feed or defeat a
  control. The likely harm to the subscribing organization is low and requires correlation with private sources, collection
  priorities, or credentials. Risk 4 and OFFICIAL fit the normal match, while a record containing feed tokens, covert-source
  identities, or tailored collection gaps would warrant higher treatment.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_threat_intelligence
    matches:
    - ref: Evidence_threat_intelligence
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
    min_count: 2
  - confidence_level: 75
    id_match: Pattern_threat_intelligence
    matches:
    - ref: Evidence_threat_intelligence
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Pattern_threat_intelligence
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  regexes:
  - id: Pattern_threat_intelligence
    pattern: (?i)\b(?:threat\s+intelligence|stix|taxii|misp|intel\s+feed)\b
  keywords:
  - id: Evidence_threat_intelligence
    groups:
    - match_style: word
      terms:
      - threat intelligence subscriptions
      - threat intelligence
      - stix
      - taxii
      - misp
      - intel feed
      - threat feed
      - cyber threat
      - adversary tracking
      - threat landscape
      - intelligence platform
    strength: specific
created: '2026-02-08'
updated: '2026-07-17'
changelog:
- version: 1.5.0
  date: '2026-07-17'
  description: 'Reduced-scope fix (TP-00407): demote the 75/85 tiers to discovery_only — same-span evidence let "Use STIX
    over TAXII to exchange threat intelligence with partners" enforce at 85. The first-pass subscription-metadata anchor (provider/tenant/endpoint/renewal
    fields) was deliberately NOT adopted: the risk assessment rates provider relationships and common feed use low-harm OFFICIAL,
    so enforcement is reserved for a future detector keyed on feed tokens, covert sources, or private collection priorities
    (QA correction). Added platform-capability discovery case and market-intelligence negative.'
