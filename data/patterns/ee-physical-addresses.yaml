schema: testpattern/v1
name: Estonia Physical Addresses
slug: ee-physical-addresses
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Estonia Physical Addresses patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that uses machine learning and function-based detection for physical
  address identification. This keyword list provides address-related terms for supplementary matching.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  country-specific address terminology to identify physical address data.
keywords:
  - tänav
  - tee
  - maantee
  - puiestee
  - väljak
  - plats
  - Tallinn
  - Tartu
  - Narva
  - postiindeks
  - põik
  - allee
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on address terms requires additional context and
  corroborative evidence for accurate physical address detection. Address keywords alone
  produce high false positive rates without structural validation.
jurisdictions:
  - ee
  - eu
regulations:
  - GDPR
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 tänav name, unit 4"
      description: Contains address keyword 'tänav'
    - value: "located at 45 tee example"
      description: Contains address keyword 'tee'
    - value: "deliver to 78 maantee test"
      description: Contains address keyword 'maantee'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_ee_address_primary
      matches:
        - ref: Keyword_ee_address_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_ee_address_primary
  keywords:
    - id: Keyword_ee_address_primary
      groups:
        - match_style: word
          terms:
            - tänav
            - tee
            - maantee
            - puiestee
            - väljak
            - plats
            - põik
            - allee
            - postiindeks
      strength: domain
    - id: Keyword_ee_address_context
      groups:
        - match_style: word
          terms:
            - Tallinn
            - Tartu
            - Narva
            - Pärnu
            - Viljandi
            - aadress
            - linn
            - maakond
            - vald
            - sihtnumber
            - address
            - city
            - postal code
      strength: domain
risk_rating: 3
risk_description: >-
  The Estonian pattern uses low-confidence tänav, tee, and maantee terms to identify address-like text rather than a verified postal location. A substantive home address may help target correspondence or correlate an identified person, but those road words also describe highways, businesses, public buildings, and routes. Navigation material therefore produces predictable matches without private resident information. Risk 3 OFFICIAL reflects limited contextual harm; SENSITIVE would require a confidential residence, protected or vulnerable occupant, current safety threat, movement history, or an attributed address register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-estonia-physical-addresses
    title: "Estonia Physical Addresses entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1180 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
