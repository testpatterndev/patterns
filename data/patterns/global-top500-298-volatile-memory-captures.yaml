schema: testpattern/v1
name: Volatile memory captures
slug: global-top500-298-volatile-memory-captures
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies volatile memory captures patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:memory\s+dump|volatile\s+memory|ram\s+capture|hiberfil)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - volatile memory captures
    - volatile
    - memory
    - captures
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: 'Memory dump'
      description: Topic phrase present
    - value: 'memory dump'
      description: Topic phrase, lowercase
    - value: 'this record references the memory dump held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_volatile_memory
      matches:
        - ref: Pattern_global_top500_298_volatile_memory_captures_label_context
        - ref: Keyword_global_top500_298_volatile_memory_captures_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_volatile_memory
      matches:
        - ref: Keyword_volatile_memory
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_volatile_memory
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_volatile_memory
      pattern: (?i)\b(?:memory\s+dump|volatile\s+memory|ram\s+capture|hiberfil)\b
    - id: Pattern_global_top500_298_volatile_memory_captures_label_context
      pattern: (?i)\b(?:volatile\s+memory\s+captures)\b
  keywords:
    - id: Keyword_volatile_memory
      groups:
        - match_style: word
          terms:
            - memory dump
            - volatile memory
            - RAM capture
            - hiberfil
            - crash dump
            - memory forensics
            - Volatility
            - process injection
            - memory acquisition
            - pagefile
            - swap file
            - live response
      strength: specific
    - id: Keyword_global_top500_298_volatile_memory_captures_domain_context
      groups:
        - match_style: word
          terms:
            - volatile memory captures
            - volatile
            - memory
            - captures
      strength: domain
risk_description: >-
  This concept pattern identifies memory dump, volatile memory, RAM capture, or hiberfil terminology, signalling a memory-capture artefact or discussion rather than parsing volatile data. A real capture may contain running process data, session tokens, encryption keys, credentials, messages, and evidence of malicious activity that can be replayed or exposed. The ordinary scope is one host and its active users and services, with documentation and diagnostic guidance creating benign matches. Risk 8 SENSITIVE reflects serious contained credential, personal, and forensic harm; PROTECTED would require a critical host or confirmed protected material with significant impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
