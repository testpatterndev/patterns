schema: testpattern/v1
name: Model risk assessment reports
slug: global-top500-478-model-risk-assessment-reports
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to model risk assessment reports in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:model\s+risk\s+assessment\s+reports|model\s+risk|risk\s+assessment|model\s+validation|model\s+governance|model\s+inventory|stress\s+testing|model\s+performance|sensitivity\s+analysis|residual\s+risk)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - model risk assessment reports
    - model
    - risk
    - assessment
    - reports
    - privacy
    - compliance
  proximity: 300
test_cases:
  should_match:
    - value: model risk assessment reports
      description: Primary topic phrase match
    - value: model risk
      description: Case-insensitive topic phrase match
    - value: risk assessment
      description: Alternative topic phrase match
    - value: model validation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to model risk assessment reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_model_risk_assessment
      matches:
        - ref: Pattern_global_top500_478_model_risk_assessment_reports_label_context
        - ref: Keyword_global_top500_478_model_risk_assessment_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_model_risk_assessment
      matches:
        - ref: Keyword_model_risk_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_model_risk_assessment
      pattern: >-
        (?is)\b(?:model\s+risk\s+assessment\s+reports|model\s+risk|risk\s+assessment|model\s+validation|model\s+governance|model\s+inventory|stress\s+testing|model\s+performance|sensitivity\s+analysis|residual\s+risk)\b
    - id: Pattern_global_top500_478_model_risk_assessment_reports_label_context
      pattern: (?i)\b(?:model\s+risk\s+assessment\s+reports)\b
  keywords:
    - id: Keyword_model_risk_assessment
      groups:
        - match_style: word
          terms:
            - model risk assessment reports
            - model risk
            - risk assessment
            - model validation
            - model governance
            - model inventory
            - backtesting
            - stress testing
            - model performance
            - privacy
            - compliance
            - sensitivity analysis
            - residual risk
      strength: specific
    - id: Keyword_global_top500_478_model_risk_assessment_reports_domain_context
      groups:
        - match_style: word
          terms:
            - model risk assessment reports
            - model
            - risk
            - assessment
            - reports
      strength: domain
risk_description: >-
  The concept regex recognises model validation, inventories, governance, stress testing, performance, sensitivity analysis, and residual-risk language; it does not require a completed assessment report or the model itself. A genuine report can expose known weaknesses, calibration limits, validation findings, and compensating controls, helping an insider manipulate decisions or target conditions where the model performs poorly. Harm is serious but usually confined to one model and business process, while generic risk-management and analytics material can match the same terms. Risk 8 and SENSITIVE are appropriate; PROTECTED would require an exploitable weakness in a systemic financial, safety, or critical-service model with a credible prospect of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
