schema: testpattern/v1
name: Password reset tokens
slug: global-top500-263-password-reset-tokens
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Detects password reset tokens and recovery URLs in documents, emails, and logs. Reset tokens are high-risk credentials — a leaked token enables account takeover without knowing the current password.
  No Microsoft built-in SIT exists for this pattern.
operation: >-
  Pattern type: regex (boost_regex engine). Matches password reset URLs containing long random token parameters, and standalone hex/base64 tokens near reset-context keywords. Corroborative evidence: 3
  tiers with reset-specific keywords (high), general credential keywords (medium), and broad match (low) within 300 characters.
pattern: >-
  (?:(?:reset|recover|forgot|confirm)[\s\-_]*(?:password|account|identity|email)[\s\S]{0,80}(?:token|code|key|link)[\s=:]\s*[A-Za-z0-9\-_]{20,}|(?:token|code|key)[\s=:]\s*[A-Fa-f0-9]{32,}|[?&](?:token|reset_token|recovery_token|confirmation_token)=[A-Za-z0-9\-_\.]{20,})
confidence: medium
confidence_justification: >-
  Medium confidence: long random strings are common in URLs and logs. Reset-context keywords are essential to distinguish password recovery tokens from session IDs, API tokens, and other opaque
  identifiers.
jurisdictions:
  - global
regulations:
  - GDPR
  - CCPA
  - HIPAA
  - PCI-DSS
frameworks:
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - password reset
    - reset token
    - recovery token
    - forgot password
    - reset link
    - recovery link
    - confirmation token
    - reset your password
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: 'Reset your password using this link: https://example.com/reset?token=a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4'
      description: Reset URL with token query parameter
    - value: 'reset password token: 4f8a2b1c9d3e7f0a4b8c2d1e9f3a7b0c'
      description: Reset token as hex string with label
    - value: forgot password recovery code=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.abc123
      description: JWT-style recovery token
    - value: '?recovery_token=Xk9mN2pL4qR7sT0uV3wY6zA1bC8dE5fG'
      description: Recovery token in URL parameter
  should_not_match:
    - value: session_id=abc123def456
      description: Session ID too short (under 20 chars)
    - value: 'API response code: 200 OK'
      description: No token pattern present
    - value: Your password has been changed successfully
      description: Password context but no token value
false_positives:
  - description: Session tokens and API tokens in application logs that are not password reset tokens.
    mitigation: Require reset-specific keywords (reset, recover, forgot) in proximity. Generic token strings without reset context fire at low confidence only.
  - description: OAuth authorization codes and CSRF tokens that share similar format.
    mitigation: Reset-specific corroborative evidence distinguishes password recovery flows from general authentication tokens.
  - description: Automated email templates containing password reset URL patterns without actual token values.
    mitigation: Template exclusion filter rejects matches near sample/placeholder/example keywords.
exports:
  - purview_xml
  - gcp_dlp
  - macie
  - zscaler
  - paloalto
  - netskope
  - yaml
  - regex_copy
scope: wide
risk_rating: 9
risk_description: >-
  Password reset tokens enable direct account takeover. A leaked token allows an attacker to set a new password without any prior knowledge of the account credentials. Often single-use but time-valid
  for hours or days.
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_reset_token
      matches:
        - ref: Evidence_reset_specific
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_reset_token
      matches:
        - ref: Evidence_reset_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_reset_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_reset_token
      pattern: >-
        (?:(?:reset|recover|forgot|confirm)[\s\-_]*(?:password|account|identity|email)[\s\S]{0,80}(?:token|code|key|link)[\s=:]\s*[A-Za-z0-9\-_]{20,}|(?:token|code|key)[\s=:]\s*[A-Fa-f0-9]{32,}|[?&](?:token|reset_token|recovery_token|confirmation_token)=[A-Za-z0-9\-_\.]{20,})
  keywords:
    - id: Evidence_reset_specific
      groups:
        - match_style: word
          terms:
            - password reset
            - reset password
            - reset token
            - recovery token
            - forgot password
            - reset link
            - recovery link
            - recovery code
            - confirmation token
            - reset your password
            - reset code
            - verification link
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-03-15'
updated: '2026-03-15'
changelog:
  - version: 1.0.0
    date: '2026-03-15'
    description: Initial release — password reset token detector with 3-tier progressive gating
author: testpattern-community
license: MIT
references:
  - https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/04-Authentication_Testing/09-Testing_for_Weak_Password_Change_or_Reset_Functionalities
  - https://cheatsheetseries.owasp.org/cheatsheets/Forgot_Password_Cheat_Sheet.html
