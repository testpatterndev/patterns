schema: testpattern/v1
name: Legal full name
slug: global-top500-001-legal-full-name
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to legal full name in international contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: pii-personal, salutations-standard. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:legal\s+full\s+name|legal\s+name|full\s+name|given\s+name|family\s+name|first\s+name|last\s+name|middle\s+name|personal\s+details|identity\s+document|name\s+change)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - legal full name
    - legal
    - full
    - name
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - pii-personal
    - salutations-standard
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: legal full name
      description: Primary topic phrase match
    - value: legal name
      description: Case-insensitive topic phrase match
    - value: full name
      description: Alternative topic phrase match
    - value: given name
      description: Additional topic phrase match
    - value: 'Identity verification form. Legal full name of the applicant, including given name and family name, exactly as shown on the identity document.'
      description: High-tier probe — legal full name label with two distinct corroborating name-field terms
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to legal full name appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_legal_full_name
      matches:
        - ref: Pattern_global_top500_001_legal_full_name_label_context
        - ref: Keyword_global_top500_001_legal_full_name_domain_context
        - ref: Keyword_legal_full_name
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_legal_full_name
      matches:
        - ref: Pattern_global_top500_001_legal_full_name_label_context
        - ref: Keyword_global_top500_001_legal_full_name_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_legal_full_name
      matches:
        - ref: Keyword_legal_full_name
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_legal_full_name
      pattern: (?is)\b(?:legal\s+full\s+name|legal\s+name|full\s+name|given\s+name|family\s+name|first\s+name|last\s+name|middle\s+name|personal\s+details|identity\s+document|name\s+change)\b
    - id: Pattern_global_top500_001_legal_full_name_label_context
      pattern: (?i)\b(?:legal\s+full\s+name)\b
  keywords:
    - id: Keyword_legal_full_name
      groups:
        - match_style: word
          terms:
            - legal full name
            - legal name
            - full name
            - given name
            - surname
            - family name
            - first name
            - last name
            - middle name
            - personal details
            - identity document
            - name change
      strength: specific
    - id: Keyword_global_top500_001_legal_full_name_domain_context
      groups:
        - match_style: word
          terms:
            - legal full name
            - legal
            - full
            - name
      strength: domain
risk_description: >-
  This concept detector matches field-label phrases such as legal full name or legal name with surrounding personal-data terms, not the actual name value of an identified person. A hit can show that a form or document requests a legal name, but the phrase itself cannot enable impersonation or disclose a legal matter. The normal match identifies no affected person, and policy, training, HR templates, and administrative instructions are expected false positives. Risk 3 and OFFICIAL reflect low contextual sensitivity; a populated name linked to a legal case, identity profile, or protected record would require a separate higher assessment.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
