schema: testpattern/v1
name: Data room due diligence documents
slug: au-top500-183-data-room-due-diligence-documents
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to data room due diligence documents in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword lists: corporate-m-and-a.'
pattern: (?is)\b(?:data\s+room|due\s+diligence|virtual\s+data\s+room|deal\s+room|diligence\s+documents|document\s+repository|transaction\s+documents|mergers\s+and\s+acquisitions|confidential\s+information|disclosure\s+schedule|buyer\s+diligence|seller\s+disclosure)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - data room due diligence documents
    - data
    - room
    - due
    - diligence
    - documents
    - mergers
    - acquisitions
    - strategy
  proximity: 300
  keyword_lists:
    - corporate-m-and-a
test_cases:
  should_match:
    - value: data room
      description: Primary topic phrase match
    - value: due diligence
      description: Case-insensitive topic phrase match
    - value: virtual data room
      description: Alternative topic phrase match
    - value: deal room
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to data room due diligence documents appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_data_room_due_diligence
      matches:
        - ref: Evidence_data_room_due_diligence
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_data_room_due_diligence
      matches:
        - ref: Evidence_data_room_due_diligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_data_room_due_diligence
      matches:
        - ref: Evidence_data_room_due_diligence
  regexes:
    - id: Pattern_data_room_due_diligence
      pattern: (?is)\b(?:data\s+room|due\s+diligence|virtual\s+data\s+room|deal\s+room|diligence\s+documents|document\s+repository|transaction\s+documents|mergers\s+and\s+acquisitions|confidential\s+information|disclosure\s+schedule|buyer\s+diligence|seller\s+disclosure)\b
  keywords:
    - id: Evidence_data_room_due_diligence
      groups:
        - match_style: word
          terms:
            - data room
            - due diligence
            - virtual data room
            - VDR
            - deal room
            - diligence documents
            - document repository
            - transaction documents
            - mergers and acquisitions
            - confidential information
            - disclosure schedule
            - buyer diligence
            - seller disclosure
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
