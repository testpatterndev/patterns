schema: testpattern/v1
name: Litigation strategy documents
slug: global-top500-165-litigation-strategy-documents
version: 1.2.5
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  DEPRECATED — merged into major-litigation-strategy-document. Identifies documents containing references to litigation
  strategy documents in international contexts. These are confidential matter-specific litigation strategy records; the
  category is not personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match
  domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:litigation\s+strategy\s+documents|litigation\s+strategy|case\s+assessment|legal\s+strategy|trial\s+preparation|discovery\s+plan|settlement\s+strategy|damages\s+analysis|expert\s+witness|litigation\s+hold|cause\s+of\s+action|risk\s+of\s+adverse\s+judgment)\b
confidence: medium
confidence_justification: >-
  category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context
  gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - legal
corroborative_evidence:
  keywords:
    - litigation strategy documents
    - litigation
    - strategy
    - documents
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: litigation strategy documents
      description: Primary topic phrase match
    - value: litigation strategy
      description: Case-insensitive topic phrase match
    - value: case assessment
      description: Alternative topic phrase match
    - value: legal strategy
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: >-
      Common words and phrases related to litigation strategy documents appearing in policy documents, training
      materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than
      general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative
      contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
  - description: >-
      High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
      significantly higher than specific identifier patterns.
    mitigation: >-
      Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
      validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_litigation_strategy
      matches:
        - ref: Pattern_global_top500_165_litigation_strategy_documents_label_context
        - ref: Keyword_global_top500_165_litigation_strategy_documents_domain_context
        - ref: Keyword_litigation_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_litigation_strategy
      matches:
        - ref: Pattern_global_top500_165_litigation_strategy_documents_label_context
        - ref: Keyword_global_top500_165_litigation_strategy_documents_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_litigation_strategy
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_litigation_strategy
      pattern: >-
        (?is)\b(?:litigation\s+strategy\s+documents|litigation\s+strategy|case\s+assessment|legal\s+strategy|trial\s+preparation|discovery\s+plan|settlement\s+strategy|damages\s+analysis|expert\s+witness|litigation\s+hold|cause\s+of\s+action|risk\s+of\s+adverse\s+judgment)\b
    - id: Pattern_global_top500_165_litigation_strategy_documents_label_context
      pattern: (?i)\b(?:litigation\s+strategy\s+documents)\b
  keywords:
    - id: Keyword_litigation_strategy
      groups:
        - match_style: word
          terms:
            - litigation strategy documents
            - litigation strategy
            - case assessment
            - legal strategy
            - trial preparation
            - discovery plan
            - settlement strategy
            - damages analysis
            - expert witness
            - litigation hold
            - cause of action
            - risk of adverse judgment
      strength: specific
    - id: Keyword_global_top500_165_litigation_strategy_documents_domain_context
      groups:
        - match_style: word
          terms:
            - litigation strategy documents
            - litigation
            - strategy
            - documents
      strength: domain
risk_description: >-
  The concept detector flags litigation strategy, case assessment, trial preparation, discovery plans, settlement
  strategy, damages analysis, experts, and adverse-judgment risk rather than verifying a live proceeding. A genuine
  strategy document can expose legal theories, evidentiary weaknesses, witness plans, settlement limits, and anticipated
  damages, giving an opponent a direct tactical advantage. The usual exposure is one case and its parties, counsel, and
  witnesses, while legal education, precedents, and planning templates can produce benign topic matches. Risk 8 and
  SENSITIVE Legal capture serious but matter-contained prejudice; PROTECTED would require an exceptional protected
  proceeding or disclosure causing significant damage beyond the case.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
