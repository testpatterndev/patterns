schema: testpattern/v1
name: All Physical Addresses
slug: global-all-physical-addresses
version: 1.2.2
type: keyword_list
pattern_class: concept
description: >-
  Catalogue reference for the Microsoft Purview built-in All Physical Addresses bundled named-entity
  SIT, which contains country and region physical-address SITs including Australia physical addresses.
  This YAML-only record supplies supplementary address vocabulary for registry search and testing; it
  does not reproduce Microsoft's opaque named-entity resources and is not a custom XML clone.
operation: >-
  In Microsoft Purview, enable the built-in All Physical Addresses SIT to use Microsoft's
  country-specific settlement/region dictionaries, street suffixes, postcode patterns, and address
  formats. The TestPattern representation below is supplementary keyword logic only and exports YAML.
keywords:
  - street
  - road
  - avenue
  - boulevard
  - drive
  - lane
  - place
  - court
  - highway
  - address
  - postal code
  - zip code
  - PO box
  - apartment
  - suite
confidence: low
confidence_justification: >-
  Low confidence for this supplementary TestPattern record: broad address words require structural
  and geographic context. The Microsoft built-in uses additional named-entity resources that are
  unavailable to a custom XML rule and should be enabled directly when bundled address detection is needed.
jurisdictions:
  - global
regulations:
- "CCPA/CPRA"
- GDPR
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 street name, unit 4"
      description: Contains address keyword 'street'
    - value: "located at 45 road example"
      description: Contains address keyword 'road'
    - value: "deliver to 78 avenue test"
      description: Contains address keyword 'avenue'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_physical_addresses
      matches:
        - ref: Keyword_physical_addresses_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_physical_addresses
  keywords:
    - id: Keyword_physical_addresses
      groups:
        - match_style: word
          terms:
            - street
            - road
            - avenue
            - boulevard
            - drive
            - lane
            - place
            - court
            - highway
            - address
            - postal code
            - zip code
            - PO box
            - apartment
            - suite
      strength: domain
    - id: Keyword_physical_addresses_context
      groups:
        - match_style: word
          terms:
            - residential address
            - mailing address
            - delivery address
            - home address
            - business address
            - shipping address
            - billing address
            - city
            - state
            - postcode
            - country
            - unit number
      strength: specific
risk_rating: 3
risk_description: >-
  This YAML-only catalogue reference is a low-confidence supplementary keyword representation, not the
  Microsoft bundled named-entity detector. Ordinary hits frequently describe businesses, landmarks,
  delivery instructions, or navigation text, and even a valid location causes little harm unless it is
  attributed to a person or sensitive activity. Risk 3 and OFFICIAL are appropriate; SENSITIVE would
  require an identified vulnerable person, protected residence, movement history, or address register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-all-physical-addresses
    title: "All Physical Addresses entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.2.2
    date: '2026-07-19'
    description: 'Correct the record to describe Microsoft All Physical Addresses as a bundled named-entity SIT and clarify that the YAML-only supplementary keyword representation is not a custom XML clone.'
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1212 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
