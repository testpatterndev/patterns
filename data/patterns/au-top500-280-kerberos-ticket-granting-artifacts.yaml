schema: testpattern/v1
name: Kerberos ticket-granting artifacts
slug: au-top500-280-kerberos-ticket-granting-artifacts
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies kerberos ticket-granting artifacts patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses pattern matching to identify relevant content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?i)\b(?:krbtgt|kerberos|tgt|ticket-granting|kdc)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - kerberos ticket-granting artifacts
    - kerberos
    - ticket
    - granting
    - artifacts
    - credentials
    - keys
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: 'Krbtgt'
      description: Topic phrase present
    - value: 'krbtgt'
      description: Topic phrase, lowercase
    - value: 'this record references the krbtgt held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The pattern matches Kerberos topic terms including krbtgt, TGT, ticket-granting, KDC, and Kerberos; it does not identify or validate a ticket blob. A captured, unexpired ticket-granting artifact could be replayed to impersonate its principal and request access to services within the ticket's domain. The normal affected scale is one identity or a bounded domain context, and validity, service reachability, and cryptographic integrity still matter. Risk 8 and SENSITIVE recognize serious authentication abuse, while a krbtgt key or capability to mint domain-wide tickets would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_kerberos_artifacts
      matches:
        - ref: Evidence_kerberos_artifacts
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_kerberos_artifacts
      matches:
        - ref: Evidence_kerberos_artifacts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_kerberos_artifacts
      matches:
        - ref: Evidence_kerberos_artifacts
  regexes:
    - id: Pattern_kerberos_artifacts
      pattern: (?i)\b(?:krbtgt|kerberos|tgt|ticket-granting|kdc)\b
  keywords:
    - id: Evidence_kerberos_artifacts
      groups:
        - match_style: word
          terms:
            - kerberos
            - ticket-granting
            - krbtgt
            - kdc
            - active directory
            - service ticket
            - golden ticket
            - silver ticket
            - keytab
            - spn
            - delegation
