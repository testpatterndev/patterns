schema: testpattern/v1
name: Norway Passport Number
slug: no-passport-number
version: 1.1.0
type: regex
pattern_class: identifier
engine: boost_regex
case_sensitive: true
description: >-
  Detects Norwegian passport numbers issued by the police (politiet). The 2020 series uses a nine-character
  document number: ordinary (C) and emergency (K) passports are one prefix letter plus two characters that may
  be letters or digits plus six digits (specimen CCC002251); diplomatic (FG), service (FH), special (FJ),
  travel-document (FK) and foreigner (FL) passports are a two-letter prefix plus one letter-or-digit plus six
  digits. Pre-2020 series passports (in circulation until October 2030) carry an eight-digit document number.
operation: >-
  Regex patterns (boost_regex engine, case-sensitive). Pattern_no_passport_2020 matches the prefix-anchored
  nine-character 2020-series forms ([CK] plus 2 alphanumerics plus 6 digits, or F[GHJKL] plus 1 alphanumeric
  plus 6 digits). Pattern_no_passport_legacy matches the eight-digit pre-2020 form and is only exported with
  stronger evidence requirements because a bare 8-digit run is ambiguous (dates, order numbers). Tiers: High
  (85) 2020-series with passport evidence (min 2 unique) and template exclusion; Medium (75) 2020-series with
  evidence and exclusion, or legacy with min-2 evidence and exclusion; Low (65) 2020-series with evidence.
  No public checksum exists for the printed number (the MRZ check digit is not part of the printed field), so
  detection relies on structure plus keyword evidence; AllDigitsSameFilter guards the all-numeric legacy form.
pattern: \b(?:[CK][A-Z0-9]{2}\d{6}|F[GHJKL][A-Z0-9]\d{6}|\d{8})\b
confidence: medium
confidence_justification: >-
  Medium confidence: the 2020-series prefix-anchored nine-character shape is structurally distinctive, but the
  legacy eight-digit form is a plain digit run, so corroborating passport keywords are required on every tier
  and the legacy form is additionally held to a min-2-unique-terms evidence bar. recommended_confidence is the
  evidence-gated 75 workhorse tier per registry convention.
jurisdictions:
  - 'no'
regulations:
  - GDPR
  - Passport Act (Norway, passloven)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - passport number
    - passnummer
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: 'Passport number CCC002251 was checked against the register by politiet'
      description: 2020-series ordinary passport number (national control-guide specimen) with label context
    - value: 'passnummer C1A123456 (norsk pass)'
      description: 2020-series ordinary passport with digit in the second position
    - value: 'FG1234567'
      description: 2020-series diplomatic passport number (FG prefix)
    - value: 'Emergency travel: pass K2B654321 utstedt i dag'
      description: 2020-series emergency passport number (K prefix)
    - value: 'passport no. 28454393 (issued 2015, pre-2020 series)'
      description: Legacy eight-digit passport number
  should_not_match:
    - value: 'CCC00225'
      description: Eight characters in the 2020-series form — one digit short
    - value: 'ABC123456'
      description: Nine characters but the prefix letter A is not an issued Norwegian passport series
    - value: 'ccc002251'
      description: Lowercase — passport numbers are printed uppercase (pattern is case-sensitive)
    - value: 'FM1234567'
      description: FM is not an issued two-letter prefix (only FG, FH, FJ, FK, FL)
    - value: '284543931'
      description: Nine digits — too long for the legacy eight-digit form and not a valid 2020-series shape
false_positives:
  - description: Eight-digit runs such as dates written as DDMMYYYY, invoice or order numbers can match the legacy form.
    mitigation: The legacy regex is only exported in a 75 tier requiring two unique passport-evidence terms plus the template-exclusion NOT-group; AllDigitsSameFilter suppresses repeated-digit placeholders.
  - description: Nine-character product or serial codes beginning with C, K or F could match the 2020-series form.
    mitigation: Every tier requires passport keywords within the 300-character proximity window; the prefix letters and trailing six-digit block keep the collision surface small.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  Passport numbers are high-value identity documents used for international travel and identity verification.
  Compromise enables identity fraud, unauthorized border crossings, and creation of fraudulent documents.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_no_passport_2020
      matches:
        - ref: Evidence_no_passport
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_no_passport_2020
      matches:
        - ref: Evidence_no_passport
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_no_passport_legacy
      matches:
        - ref: Evidence_no_passport
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_no_passport_2020
      matches:
        - ref: Evidence_no_passport
  regexes:
    - id: Pattern_no_passport_2020
      pattern: \b(?:[CK][A-Z0-9]{2}\d{6}|F[GHJKL][A-Z0-9]\d{6})\b
    - id: Pattern_no_passport_legacy
      pattern: \b\d{8}\b
  keywords:
    - id: Evidence_no_passport
      groups:
        - match_style: word
          terms:
            - passport
            - passport number
            - passport no
            - Norwegian passport
            - norsk pass
            - passnummer
            - pass nr
            - reisedokument
            - travel document
            - politiet
            - passmyndighet
            - nødpass
      strength: specific
  filters:
    - id: Filter_no_passport_same_digits
      type: AllDigitsSameFilter
references:
  - url: https://www.politiet.no/globalassets/tjenester-admin/pass-og-id-kort/control-guide-norwegian-passports-oct-19-2020.pdf
    title: Norwegian Police — Control Guide for Norwegian Passports (2020 series prefixes C/K/FG/FH/FJ/FK/FL and specimen document number CCC002251)
  - url: https://www.nidsenter.no/aktuelt/nyhetsarkiv/2020/5/lar-om-maskinlesbar-tekst/
    title: Nasjonalt ID-senter — machine-readable zone article with pre-2020 specimen showing the eight-character document number
