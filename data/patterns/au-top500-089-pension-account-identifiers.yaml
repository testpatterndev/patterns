schema: testpattern/v1
name: Pension account identifiers
slug: au-top500-089-pension-account-identifiers
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to pension account identifiers in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: financial-deposit-terms, industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:pension\s+account\s+identifiers?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - pension account identifiers
    - pension
    - account
    - identifiers
    - payroll
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
    - industry-hr
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Pension account identifiers'
      description: Topic phrase present
    - value: 'pension account identifiers'
      description: Topic phrase, lowercase
    - value: 'this record references the pension account identifiers held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pension_account_identifiers
      matches:
        - ref: Evidence_pension_account_identifiers
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_pension_account_identifiers
      matches:
        - ref: Evidence_pension_account_identifiers
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_pension_account_identifiers
      matches:
        - ref: Evidence_pension_account_identifiers
  regexes:
    - id: Pattern_pension_account_identifiers
      pattern: (?i)\b(?:pension\s+account\s+identifiers?)\b
    - id: Pattern_au_top500_089_pension_account_identifiers_label_context
      pattern: (?i)\b(?:pension\s+account\s+identifiers)\b
  keywords:
    - id: Evidence_pension_account_identifiers
      groups:
        - match_style: word
          terms:
            - pension account
            - pension identifier
            - pension number
            - account pension
            - allocated pension
            - retirement income stream
            - pension member number
            - superannuation pension
            - pension fund
            - pension balance
            - pension drawdown
            - centrelink pension
    - id: Keyword_au_top500_089_pension_account_identifiers_domain_context
      groups:
        - match_style: word
          terms:
            - pension account identifiers
            - pension
            - identifiers
risk_description: >-
  The regex matches the phrase pension account identifier or identifiers, supplemented by finance, HR, record-structure, and template-exclusion evidence. It does not recognise the syntax of an account number or require an actual identifier value. The phrase can locate a record that deserves inspection, but fraud against a pension member still needs the missing account value, identity context, and access path. Risk 4 OFFICIAL is appropriate for this label-only unit; SENSITIVE would require a usable member account identifier or populated pension record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
