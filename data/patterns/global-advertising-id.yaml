schema: testpattern/v1
name: Mobile Advertising ID (IDFA / GAID / AAID)
slug: global-advertising-id
version: 1.2.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects mobile advertising identifiers - Apple's IDFA and Google's Advertising ID (GAID, also called AAID) - when
  they appear labelled with an advertising-ID keyword. These IDs are UUIDs in the canonical 8-4-4-4-12 hexadecimal
  form. Although resettable, advertising IDs are persistent cross-app device identifiers treated as personal data
  under GDPR and CCPA/CPRA, and their disclosure enables cross-context tracking and re-identification.
operation: >-
  A labelled IDFA, GAID, AAID, advertising-ID, or ad-ID UUID candidate is discovery-only at 65.
  Explicit iOS, Android, Apple-IDFA, Google-Advertising-ID, or mobile-ad-SDK context raises it to 75.
  The 85 tier additionally requires an attribution, consent, campaign-event, device-profile, install,
  or audience-segment record. Enforcing tiers reject public documentation, templates, and examples.
pattern: (?:idfa|gaid|aaid|advertising[\s_-]*id|ad[\s_-]*id)[\s:#=_-]{0,8}[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}(?![0-9a-f-])
confidence: medium
confidence_justification: >-
  Medium confidence: the UUID body is generic (any v4 UUID matches the hex layout), so detection relies on an explicit
  advertising-ID label adjacent to the value. The label requirement keeps false positives low, but unlabelled IDFA or
  GAID values are intentionally not matched.
jurisdictions:
  - global
regulations:
  - GDPR
  - "CCPA/CPRA"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - device-id
corroborative_evidence:
  keywords:
    - advertising id
    - advertising identifier
    - IDFA
    - GAID
    - AAID
    - device id
    - ad tracking
    - mobile identifier
  proximity: 300
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_advertising_id
      matches:
        - ref: Keyword_mobile_ad_platform
        - ref: Keyword_advertising_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_public_ad_context
    - confidence_level: 75
      id_match: Regex_advertising_id
      matches:
        - ref: Keyword_mobile_ad_platform
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_public_ad_context
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_advertising_id
  regexes:
    - id: Regex_advertising_id
      pattern: (?:idfa|gaid|aaid|advertising[\s_-]*id|ad[\s_-]*id)[\s:#=_-]{0,8}[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}(?![0-9a-f-])
  keywords:
    - id: Keyword_mobile_ad_platform
      groups:
        - match_style: word
          terms:
            - iOS device
            - Android device
            - Apple IDFA
            - Google Advertising ID
            - mobile advertising SDK
            - ad tracking SDK
      strength: domain
    - id: Keyword_advertising_record
      groups:
        - match_style: word
          terms:
            - mobile attribution record
            - install attribution
            - ad campaign event
            - consent record
            - device profile
            - audience segment
            - conversion event
      strength: specific
    - id: Keyword_public_ad_context
      groups:
        - match_style: word
          terms:
            - public documentation
            - developer tutorial
            - sample payload
            - documentation example
      strength: exclusion
  filters:
    - id: Guard_advertising_id_same_digits
      type: AllDigitsSameFilter
test_cases:
  should_match:
    - value: 'ad id: 6d92078a-8246-4ba4-ae5b-76104861e7dc'
      description: Low-tier probe - labelled candidate without platform context
    - value: 'iOS device IDFA: 97987bca-ae59-4c7d-94ba-ee4f19ab8c21'
      description: Medium-tier probe - labelled identifier plus mobile-platform context
    - value: 'Mobile attribution record for iOS device - IDFA: 12345678-90ab-cdef-1234-567890abcdef; install attribution captured.'
      description: High-tier probe - platform context plus attribution record
  should_not_match:
    - value: 6d92078a-8246-4ba4-ae5b-76104861e7dc
      description: Bare UUID with no advertising-ID label
    - value: 'session id: 6d92078a-8246-4ba4-ae5b'
      description: Truncated/non-UUID value behind an unrelated label
    - value: reset your advertising identifier in the device privacy settings
      description: Prose mention of an advertising identifier with no value
    - value: 'Public documentation sample payload for an iOS device IDFA: 6d92078a-8246-4ba4-ae5b-76104861e7dc with install attribution.'
      description: Public sample contains otherwise high-tier evidence
    - value: 'Template example: mobile attribution record for iOS device IDFA 97987bca-ae59-4c7d-94ba-ee4f19ab8c21.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Other UUIDs (session tokens, request IDs, correlation IDs) that happen to sit next to the word 'ad' or 'id'.
    mitigation: The pattern requires a specific advertising-ID label; tighten the label list further if generic 'ad id' collides in your corpus.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_description: >-
  The detector finds a canonical UUID only when labelled as an IDFA, GAID, AAID, advertising ID, or equivalent mobile advertising identifier. A real value can support cross-app device correlation and re-identification when an advertising platform or data broker also holds behavioural records. By itself it is resettable, does not name the user, and contains no location, browsing history, or device-access secret, while unrelated UUIDs remain a documented collision risk. Risk 5 OFFICIAL reflects bounded tracking potential; SENSITIVE would require a person-level identity link, behavioural profile, precise location history, or a substantial cross-context dataset.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
