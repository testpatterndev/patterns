schema: testpattern/v1
name: Deceased-person records with cultural sensitivity
slug: au-top500-020-deceased-person-records-with-cultural-sensitivity
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to deceased-person records with cultural sensitivity in Australian contexts. This information type is classified as personally identifiable information
  under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword
  lists: pii-personal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:deceased\s+person|deceased\s+estate|death\s+record|cultural\s+sensitivity|Aboriginal\s+deceased|Torres\s+Strait\s+Islander|sorry\s+business|death\s+notification|next\s+of\s+kin)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - deceased-person records with cultural sensitivity
    - deceased
    - person
    - records
    - cultural
    - sensitivity
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - pii-personal
test_cases:
  should_match:
    - value: deceased person
      description: Primary topic phrase match
    - value: deceased estate
      description: Case-insensitive topic phrase match
    - value: death record
      description: Alternative topic phrase match
    - value: cultural sensitivity
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: >-
      Common words and phrases related to deceased-person records with cultural sensitivity appearing in policy documents, training materials, HR templates, or compliance guidelines without actual
      personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_deceased_records
      matches:
        - ref: Evidence_deceased_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_deceased_records
      matches:
        - ref: Evidence_deceased_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_deceased_records
      matches:
        - ref: Evidence_deceased_records
  regexes:
    - id: Pattern_deceased_records
      pattern: (?is)\b(?:deceased\s+person|deceased\s+estate|death\s+record|cultural\s+sensitivity|Aboriginal\s+deceased|Torres\s+Strait\s+Islander|sorry\s+business|death\s+notification|next\s+of\s+kin)\b
    - id: Pattern_au_top500_020_deceased_person_records_with_cultural_sensitivity_label_context
      pattern: (?i)\\b(?:deceased\-person\\s+records\\s+with\\s+cultural\\s+sensitivity|deceased|person|cultural|sensitivity|top500)\\b
  keywords:
    - id: Evidence_deceased_records
      groups:
        - match_style: word
          terms:
            - deceased person
            - deceased estate
            - death record
            - cultural sensitivity
            - Aboriginal deceased
            - Torres Strait Islander
            - sorry business
            - death notification
            - next of kin
            - bereavement
    - id: Keyword_au_top500_020_deceased_person_records_with_cultural_sensitivity_domain_context
      groups:
        - match_style: word
          terms:
            - deceased-person records with cultural sensitivity
            - deceased
            - person
            - cultural
            - sensitivity
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
