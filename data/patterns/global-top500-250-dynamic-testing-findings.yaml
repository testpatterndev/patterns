schema: testpattern/v1
name: Dynamic testing findings
slug: global-top500-250-dynamic-testing-findings
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies dynamic testing findings patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:dynamic\s+testing|DAST\s+findings|runtime\s+analysis|penetration\s+test|security\s+testing|dynamic\s+scan|application\s+testing|runtime\s+vulnerability|fuzz\s+testing|web\s+application\s+scan)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - dynamic testing findings
    - dynamic
    - testing
    - findings
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: dynamic testing
      description: Primary topic phrase match
    - value: dast findings
      description: Case-insensitive topic phrase match
    - value: runtime analysis
      description: Alternative topic phrase match
    - value: penetration test
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_dynamic_testing_findings
      matches:
        - ref: Pattern_global_top500_250_dynamic_testing_findings_label_context
        - ref: Keyword_global_top500_250_dynamic_testing_findings_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_dynamic_testing_findings
      matches:
        - ref: Keyword_dynamic_testing_findings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_dynamic_testing_findings
      pattern: >-
        (?is)\b(?:dynamic\s+testing|DAST\s+findings|runtime\s+analysis|penetration\s+test|security\s+testing|dynamic\s+scan|application\s+testing|runtime\s+vulnerability|fuzz\s+testing|web\s+application\s+scan)\b
    - id: Pattern_global_top500_250_dynamic_testing_findings_label_context
      pattern: (?i)\b(?:dynamic\s+testing\s+findings)\b
  keywords:
    - id: Keyword_dynamic_testing_findings
      groups:
        - match_style: word
          terms:
            - dynamic testing
            - DAST findings
            - runtime analysis
            - penetration test
            - security testing
            - dynamic scan
            - application testing
            - runtime vulnerability
            - fuzz testing
            - web application scan
      strength: specific
    - id: Keyword_global_top500_250_dynamic_testing_findings_domain_context
      groups:
        - match_style: word
          terms:
            - dynamic testing findings
            - dynamic
            - testing
            - findings
      strength: domain
risk_description: >-
  The detector matches dynamic testing, DAST, runtime analysis, or penetration test language, identifying a testing record or topic rather than proving a live vulnerability. A substantive finding can reveal reachable attack paths, vulnerable endpoints, reproduction conditions, and incomplete remediation that an adversary could reuse. General testing plans, vendor descriptions, and closed findings can match, and the normal unit is one application or result set. Risk 7 SENSITIVE reflects credible moderate harm from current dynamic-test findings; PROTECTED would require a critical exploit path or significant operational consequence demonstrated beyond the phrase match.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
