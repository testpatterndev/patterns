schema: testpattern/v1
name: Call center audio recordings
slug: au-top500-366-call-center-audio-recordings
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to call center audio recordings in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:call\s+center\s+audio\s+recordings|call\s+center|audio\s+recording|call\s+recording|voice\s+recording|call\s+transcript|call\s+monitoring|quality\s+assurance|call\s+log|agent\s+interaction)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - call center audio recordings
    - call
    - center
    - audio
    - recordings
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: call center audio recordings
      description: Primary topic phrase match
    - value: call center
      description: Case-insensitive topic phrase match
    - value: audio recording
      description: Alternative topic phrase match
    - value: call recording
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to call center audio recordings appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_call_center_audio
      matches:
        - ref: Evidence_call_center_audio
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_call_center_audio
      matches:
        - ref: Evidence_call_center_audio
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_call_center_audio
      matches:
        - ref: Evidence_call_center_audio
  regexes:
    - id: Pattern_call_center_audio
      pattern: >-
        (?is)\b(?:call\s+center\s+audio\s+recordings|call\s+center|audio\s+recording|call\s+recording|voice\s+recording|call\s+transcript|call\s+monitoring|quality\s+assurance|call\s+log|agent\s+interaction)\b
  keywords:
    - id: Evidence_call_center_audio
      groups:
        - match_style: word
          terms:
            - call center audio recordings
            - call center
            - audio recording
            - call recording
            - voice recording
            - call transcript
            - text: IVR
              case_sensitive: true
            - telephony
            - call monitoring
            - quality assurance
            - call log
            - agent interaction
      strength: specific
risk_description: >-
  The concept detector recognises call-centre audio, recorded calls, agent interactions, and recording language, with the normal true positive being an audio file or recording record rather than a notice that calls may be recorded. A genuine recording can contain a customer's voice, identity checks, contact details, account information, complaints, health or financial circumstances, and an agent's internal statements, enabling impersonation, fraud, embarrassment, or legal prejudice. The medium-confidence regex can also match scripts, consent notices, and recording policies without audio content. Risk 8 and SENSITIVE Personal-Privacy reflect serious direct and evidentiary harm; PROTECTED would require highly sensitive protected persons, usable credentials, or a corpus whose disclosure could cause significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
