schema: testpattern/v1
name: Bankruptcy case records
slug: au-top500-127-bankruptcy-case-records
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to bankruptcy case records in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:bankruptcy\s+case|bankrupt\s+estate|official\s+trustee|debt\s+agreement|personal\s+insolvency|sequestration\s+order|National\s+Personal\s+Insolvency\s+Index|creditor\s+petition|discharge\s+from\s+bankruptcy)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - bankruptcy case records
    - bankruptcy
    - case
    - records
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: bankruptcy case
      description: Primary topic phrase match
    - value: bankrupt estate
      description: Case-insensitive topic phrase match
    - value: official trustee
      description: Alternative topic phrase match
    - value: debt agreement
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_bankruptcy_records
      matches:
        - ref: Evidence_bankruptcy_records
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_bankruptcy_records
      matches:
        - ref: Evidence_bankruptcy_records
    - confidence_level: 65
      id_match: Pattern_bankruptcy_records
      matches:
        - ref: Evidence_bankruptcy_records
  regexes:
    - id: Pattern_bankruptcy_records
      pattern: (?is)\b(?:bankruptcy\s+case|bankrupt\s+estate|official\s+trustee|debt\s+agreement|personal\s+insolvency|sequestration\s+order|National\s+Personal\s+Insolvency\s+Index|creditor\s+petition|discharge\s+from\s+bankruptcy)\b
  keywords:
    - id: Evidence_bankruptcy_records
      groups:
        - match_style: word
          terms:
            - bankruptcy
            - insolvency
            - bankruptcy case
            - AFSA
            - bankrupt estate
            - official trustee
            - debt agreement
            - personal insolvency
            - sequestration order
            - National Personal Insolvency Index
            - creditor petition
            - discharge from bankruptcy
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
