  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_allied_intelligence_exchange
      matches:
        - ref: Pattern_global_top500_437_allied_intelligence_exchange_records_label_context
        - ref: Keyword_global_top500_437_allied_intelligence_exchange_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_437_allied_intelligence_exchange_records_noise_exclusion
    - confidence_level: 75
      id_match: Regex_allied_intelligence_exchange
      matches:
        - ref: Keyword_allied_intelligence_exchange
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_437_allied_intelligence_exchange_records_noise_exclusion
    - confidence_level: 65
      id_match: Regex_allied_intelligence_exchange
      matches:
        - ref: Keyword_allied_intelligence_exchange
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_437_allied_intelligence_exchange_records_noise_exclusion
  regexes:
    - id: Regex_allied_intelligence_exchange
      pattern: (?is)\b(?:allied\s+intelligence|intelligence\s+sharing|Five\s+Eyes|intelligence\s+exchange|bilateral\s+agreement|liaison\s+report|coalition\s+intelligence|partner\s+nation|foreign\s+disclosure|releasable\s+to)\b
    - id: Pattern_global_top500_437_allied_intelligence_exchange_records_label_context
      pattern: (?i)\\b(?:allied\\s+intelligence\\s+exchange\\s+records|allied|intelligence|exchange|top500)\\b
  keywords:
