schema: testpattern/v1
name: Cross-border transfer assessments
slug: global-top500-466-cross-border-transfer-assessments
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to cross-border transfer assessments in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:cross[\s-]+border\s+transfer|transfer\s+impact\s+assessment|adequacy\s+decision|binding\s+corporate\s+rules|standard\s+contractual\s+clauses|third\s+country\s+transfer|data\s+export|transfer\s+mechanism|supplementary\s+measures|privacy\s+compliance|overseas\s+disclosure|international\s+transfer)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - cross-border transfer assessments
    - cross
    - border
    - transfer
    - assessments
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: cross-border transfer
      description: Primary topic phrase match
    - value: transfer impact assessment
      description: Case-insensitive topic phrase match
    - value: adequacy decision
      description: Alternative topic phrase match
    - value: binding corporate rules
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to cross-border transfer assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_cross_border_transfer
      matches:
        - ref: Pattern_global_top500_466_cross_border_transfer_assessments_label_context
        - ref: Keyword_global_top500_466_cross_border_transfer_assessments_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_cross_border_transfer
      matches:
        - ref: Keyword_cross_border_transfer
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_cross_border_transfer
      pattern: >-
        (?is)\b(?:cross[\s-]+border\s+transfer|transfer\s+impact\s+assessment|adequacy\s+decision|binding\s+corporate\s+rules|standard\s+contractual\s+clauses|third\s+country\s+transfer|data\s+export|transfer\s+mechanism|supplementary\s+measures|privacy\s+compliance|overseas\s+disclosure|international\s+transfer)\b
    - id: Pattern_global_top500_466_cross_border_transfer_assessments_label_context
      pattern: (?i)\b(?:cross\-border\s+transfer\s+assessments)\b
  keywords:
    - id: Keyword_cross_border_transfer
      groups:
        - match_style: word
          terms:
            - cross-border transfer
            - transfer impact assessment
            - adequacy decision
            - binding corporate rules
            - standard contractual clauses
            - third country transfer
            - data export
            - transfer mechanism
            - supplementary measures
            - privacy compliance
            - overseas disclosure
            - international transfer
      strength: specific
    - id: Keyword_global_top500_466_cross_border_transfer_assessments_domain_context
      groups:
        - match_style: word
          terms:
            - cross-border transfer assessments
            - cross
            - border
            - transfer
            - assessments
      strength: domain
risk_description: >-
  This concept classifier recognises transfer impact assessments, third-country transfers, adequacy decisions, contractual clauses, overseas disclosure, and supplementary measures; it does not prove that a completed vendor or jurisdiction assessment is present. A real assessment can reveal data destinations, processors, legal concerns, contractual weaknesses, and compensating controls that facilitate supplier targeting or regulatory and commercial leverage. The likely harm is serious but normally limited to a transfer arrangement, organisation, and affected data population, while public legal guidance uses much of the same vocabulary. Risk 8 and SENSITIVE fit that contained exposure; PROTECTED would require high-consequence transfers, exploitable access details, or national-security data whose compromise could cause significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
