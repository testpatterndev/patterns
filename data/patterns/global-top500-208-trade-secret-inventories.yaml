schema: testpattern/v1
name: Trade secret inventories
slug: global-top500-208-trade-secret-inventories
version: 1.5.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies inventories and registers of trade-secret assets — register, inventory-entry, and asset-record structures as well as the topic label — in security and access control contexts. Detects
  potential exposure of sensitive security information in Australian systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters. Keyword lists:
  classification-australia-government, corporate-ip.
pattern: (?i)\b(?:trade\s+secret|secret\s+asset)\s+(?:inventory|inventories|register|catalog(?:ue)?|asset\s+record|entry)\b
confidence: low
confidence_justification: 'Low confidence marker: phrase-based artifact detection to bootstrap line-by-line coverage. Requires corroborative evidence and later hardening to high-confidence structural patterns.'
jurisdictions:
  - global
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - intellectual-property
  - business
corroborative_evidence:
  keywords:
    - trade secret inventories
    - trade
    - secret
    - inventories
    - intellectual
    - property
    - secrets
  proximity: 300
  keyword_lists:
    - classification-australia-government
    - corporate-ip
test_cases:
  should_match:
    - value: 'Trade secret inventories'
      description: Topic phrase present
    - value: 'trade secret inventories'
      description: Topic phrase, lowercase
    - value: 'this record references the trade secret inventories held on file'
      description: Topic phrase within surrounding text
    - value: "TRADE SECRET REGISTER\nAsset ID TS-88\nOwner: Process Engineering\nRepository: Vault-3\nReview date: 2027-01-15"
      description: Case-insensitive register anchor with populated inventory fields (enforces at 75/85)
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: Our policy requires teams to maintain a trade secret register.
      description: Policy mandating a register has no populated fields — discovery only, must not enforce
    - value: The museum inventory lists nineteenth-century trade tools.
      description: Inventory and trade outside intellectual-property meaning must not match
    - value: 'Sample trade secret register template - Owner: placeholder'
      description: Sample/template/placeholder terms mark an unpopulated form — suppressed from enforcement
    - value: Trade secret inventories
      description: Title alone is a topic signal only — discovery only, must not enforce
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_trade_secret_register
      matches:
        - ref: Evidence_trade_secret_inventory_fields
          min_count: 3
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_trade_secret_register
      matches:
        - ref: Evidence_trade_secret_inventory_fields
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_trade_secret_inventories
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_trade_secret_register
  regexes:
    - id: Pattern_trade_secret_inventories
      pattern: (?i)\btrade\s+secret\s+inventories\b
    - id: Pattern_trade_secret_register
      pattern: (?is)\b(?:trade\s+secret|secret\s+asset)\s+(?:inventory|inventories|register|catalog(?:ue)?|asset\s+record|entry)\b
  keywords:
    - id: Evidence_trade_secret_inventories
      groups:
        - match_style: word
          terms:
            - trade secret inventories
            - trade secret
            - intellectual property
            - confidential
            - proprietary
            - invention disclosure
            - patent pending
            - non-disclosure
            - competitive advantage
            - secret register
      strength: specific
    - id: Evidence_trade_secret_inventory_fields
      groups:
        - match_style: word
          terms:
            - asset id
            - owner
            - custodian
            - repository
            - business value
            - access restriction
            - review date
            - last reviewed
      strength: specific
risk_description: >-
  This concept rule finds the phrase trade secret inventories in security or corporate-IP context, indicating an inventory topic or record rather than the trade secrets themselves. A disclosed inventory can tell a competitor or intruder which formulas, methods, projects, custodians, or repositories deserve targeting even when the protected content is stored elsewhere. The organization and owners of the listed intellectual property face focused espionage and commercial harm, but misuse still requires substantive inventory details and access to the underlying assets. Risk 8 and SENSITIVE are defensible for a real inventory record, while an enterprise-wide catalogue of critical proprietary assets with locations and access paths would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
