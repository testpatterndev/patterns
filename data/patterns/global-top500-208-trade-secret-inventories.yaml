schema: testpattern/v1
name: Trade secret inventories
slug: global-top500-208-trade-secret-inventories
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies trade secret inventories patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters. Keyword lists:
  classification-australia-government, corporate-ip. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \btrade\s+secret\s+inventories\b
confidence: low
confidence_justification: >-
  Low confidence marker: phrase-based artifact detection to bootstrap line-by-line coverage. Requires corroborative evidence and later hardening to high-confidence structural patterns. Added context
  gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - trade secret inventories
    - trade
    - secret
    - inventories
    - intellectual
    - property
    - secrets
  proximity: 300
  keyword_lists:
    - classification-australia-government
    - corporate-ip
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 'Trade secret inventories'
      description: Topic phrase present
    - value: 'trade secret inventories'
      description: Topic phrase, lowercase
    - value: 'this record references the trade secret inventories held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_trade_secret_inventories
      matches:
        - ref: Pattern_global_top500_208_trade_secret_inventories_label_context
        - ref: Keyword_global_top500_208_trade_secret_inventories_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_trade_secret_inventories
      matches:
        - ref: Keyword_trade_secret_inventories
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_trade_secret_inventories
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_trade_secret_inventories
      pattern: \btrade\s+secret\s+inventories\b
    - id: Pattern_global_top500_208_trade_secret_inventories_label_context
      pattern: (?i)\b(?:trade\s+secret\s+inventories)\b
  keywords:
    - id: Keyword_trade_secret_inventories
      groups:
        - match_style: word
          terms:
            - trade secret inventories
            - intellectual property
            - trade secrets
            - confidential
            - proprietary
            - inventories
            - patent
            - classified
            - non-disclosure
            - secret registry
      strength: domain
    - id: Keyword_global_top500_208_trade_secret_inventories_domain_context
      groups:
        - match_style: word
          terms:
            - trade secret inventories
            - trade
            - secret
            - inventories
      strength: domain
risk_description: >-
  The pattern recognises the concept phrase trade secret inventories in nearby corporate or intellectual-property context; it does not verify that an inventory or any trade secret value is actually present. A genuine inventory can reveal which formulas, methods, designs, or commercial knowledge the organisation considers most valuable and can guide targeted theft or insider misuse. A single phrase-level match may instead be policy guidance, training material, or security documentation, and the impact depends heavily on whether the surrounding record lists actionable assets. Risk 8 and SENSITIVE InfoTech fit a genuine internal inventory that exposes valuable intellectual-property targets; PROTECTED requires detailed strategically consequential holdings whose disclosure could cause significant competitive damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
