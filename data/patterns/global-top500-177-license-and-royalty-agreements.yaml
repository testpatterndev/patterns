      matches:
        - ref: Pattern_global_top500_177_license_and_royalty_agreements_label_context
        - ref: Keyword_global_top500_177_license_and_royalty_agreements_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_license_royalty_agreements
      matches:
        - ref: Keyword_license_royalty_agreements
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_license_royalty_agreements
      matches:
        - ref: Keyword_license_royalty_agreements
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
