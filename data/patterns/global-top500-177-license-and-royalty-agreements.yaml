schema: testpattern/v1
name: License and royalty agreements
slug: global-top500-177-license-and-royalty-agreements
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to license and royalty agreements in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: au-vehicle-permit-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:license\s+and\s+royalty\s+agreements|license\s+agreement|royalty\s+agreement|intellectual\s+property|licensing\s+terms|royalty\s+rate|licensed\s+technology|patent\s+license|copyright\s+license|royalty\s+payment|licensing\s+fee)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - license and royalty agreements
    - license
    - royalty
    - agreements
    - corporate
    - legal
    - governance
  proximity: 300
  keyword_lists:
    - au-vehicle-permit-terms
test_cases:
  should_match:
    - value: license and royalty agreements
      description: Primary topic phrase match
    - value: license agreement
      description: Case-insensitive topic phrase match
    - value: royalty agreement
      description: Alternative topic phrase match
    - value: intellectual property
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: license report
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to license and royalty agreements appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
