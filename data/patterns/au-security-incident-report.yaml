schema: testpattern/v1
name: Security Incident Report
slug: au-security-incident-report
version: 1.3.1
type: keyword_list
pattern_class: concept
description: Detects security incident reports containing forensic findings, root causes, and response gaps.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - security
test_cases:
  should_match:
    - value: 'Security incident report: forensic analysis and root cause analysis findings'
      description: Test match 1
    - value: 'Indicators of compromise (IOC) identified: malware analysis and threat actor attribution'
      description: Test match 2
    - value: 'Breach investigation: attack vector, compromise assessment, and incident forensics'
      description: Test match 3
  should_not_match:
    - value: Security guard incident report
      description: Non-match 1
    - value: Minor traffic incident
      description: Non-match 2
false_positives:
  - description: Physical security or traffic incidents.
    mitigation: Require cyber-specific terms like IOC, forensic analysis, or malware analysis.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The keyword list distinguishes cyber incident reports using forensic analysis, root cause, indicators of compromise, attack-vector, and containment evidence, while traffic or guard incidents are explicit non-matches. Disclosure can reveal successful techniques, investigative visibility, threat attribution, and unfinished remediation to the same actor or a copycat. The normal report concerns one incident and affected environment and does not necessarily establish critical-service impact or broad privileged access. Risk 8 and SENSITIVE InfoTech reflect serious contained response exposure; PROTECTED requires severe critical-operations consequences, life-safety effects, or comparably significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_security_incident
      matches:
        - ref: Keyword_incident_response
        - ref: Keyword_root_cause
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_security_incident
      matches:
        - ref: Keyword_security_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_security_incident
      pattern: >-
        (?i)\b(?:security\s+incident\s+(?:report|analysis)|cyber\s*(?:security)?\s+incident|incident\s+(?:investigation|forensic)\s+report|post[\s-]?incident\s+(?:review|analysis))\b
  keywords:
    - id: Keyword_incident_response
      groups:
        - match_style: word
          terms:
            - incident response
            - incident handling
            - containment
            - eradication
            - recovery
            - lessons learned
            - forensic analysis
            - forensic investigation
            - timeline
            - indicators of compromise
            - text: IOC
              case_sensitive: true
      strength: domain
    - id: Keyword_root_cause
      groups:
        - match_style: word
          terms:
            - root cause
            - root cause analysis
            - text: RCA
              case_sensitive: true
            - contributing factor
            - causal factor
            - 5 whys
            - fishbone diagram
            - post-mortem
      strength: specific
    - id: Keyword_security_assessment
      groups:
        - match_style: word
          terms:
            - security assessment
            - security audit
            - security review
            - security testing
            - security evaluation
            - executive summary
            - findings summary
            - risk summary
            - CVSS
            - text: CWE
              case_sensitive: true
            - vulnerability scan
            - Nessus
            - Qualys
            - Nmap
            - attack surface
      strength: specific
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 597 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - security incident
  - security incident report
  - forensic analysis
  - root cause analysis
  - indicators of compromise
  - IOC
  - malware analysis
  - breach investigation
  - incident forensics
  - threat actor
  - attack vector
  - compromise assessment
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
