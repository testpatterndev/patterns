schema: testpattern/v1
name: Docker Hub Personal Access Token
slug: global-docker-hub-personal-access-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Docker Hub personal access tokens (dckr_pat_ prefix). These tokens authenticate to
  Docker Hub and can pull/push images; a leak enables image tampering and supply-chain compromise.
operation: 'Prefixed token format dckr_pat_ followed by a base64url-style body. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_-])dckr_pat_[A-Za-z0-9_-]{20,40}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: the distinctive dckr_pat_ prefix makes false positives extremely unlikely; the body length is bounded to a plausible range.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - docker
    - docker hub
    - dockerhub
    - registry
    - docker login
    - access token
  proximity: 300
test_cases:
  should_match:
    - value: dckr_pat_ABCDEFGHIJ1234567890abcdefgh
      description: Exact 65 probe - Docker PAT structure without independent registry context
    - value: 'docker login -u user -p dckr_pat_zZyYxXwWvVuU0123456789-_abcdef'
      description: Exact 75 probe - token in a Docker login command
    - value: 'Docker Hub registry secret DOCKERHUB_TOKEN=dckr_pat_aB3dE6gH9jK2mN5pQ8sTuVwXyZ012345'
      description: Exact 85 probe - Docker Hub context plus canonical PAT assignment
  should_not_match:
    - value: dckr_pat_short
      description: Too short to be a Docker Hub PAT
    - value: ghp_ABCDEFGHIJ1234567890abcdefgh
      description: GitHub token prefix, not Docker Hub
    - value: 'GITLAB_TOKEN=dckr_pat_ABCDEFGHIJ1234567890abcdefgh'
      description: Sibling registry provider label does not corroborate a Docker Hub PAT
    - value: 'Documentation example: Docker Hub registry DOCKERHUB_TOKEN=dckr_pat_ABCDEFGHIJ1234567890abcdefgh'
      description: Documentation example containing a valid-shaped PAT is excluded
    - value: store your docker hub personal access token in CI secrets
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder dckr_pat_ strings.
    mitigation: Require corroborative Docker keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This detector recognises a Docker Hub personal access token by its dckr_pat prefix and base64url-style body. A usable token can pull private images or push tampered images to repositories permitted for the issuing account, creating source and software-supply-chain exposure. The normal unit is one scoped token with serious impact on affected repositories, not proof that every consumer or registry is compromised. Risk 8 and SENSITIVE InfoTech are defensible; PROTECTED requires demonstrated broad production or critical supply-chain damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_docker_hub_pat
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_docker_hub_pat
      matches:
        - ref: Keyword_docker_hub_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_docker_hub_pat
      matches:
        - ref: Keyword_docker_hub_context
        - ref: Pattern_docker_hub_token_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_docker_hub_pat
      pattern: (?<![A-Za-z0-9_-])dckr_pat_[A-Za-z0-9_-]{20,40}(?![A-Za-z0-9_-])
    - id: Pattern_docker_hub_token_assignment
      pattern: (?i)\b(?:DOCKERHUB_TOKEN|DOCKER_HUB_TOKEN|DOCKER_PAT)\s*[=:]
  keywords:
    - id: Keyword_docker_hub_context
      groups:
        - match_style: string
          terms:
            - Docker Hub registry
            - docker login
            - hub.docker.com
            - Docker image push
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
