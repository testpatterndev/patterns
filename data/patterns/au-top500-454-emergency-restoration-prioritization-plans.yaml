schema: testpattern/v1
name: Emergency restoration prioritization plans
slug: au-top500-454-emergency-restoration-prioritization-plans
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to emergency restoration prioritization plans in Australian contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:emergency\s+restoration\s+prioriti[sz]ation\s+plan|restoration\s+priorit(?:y|i[sz]ation)\s+(?:tier|order|list|queue)|priorit(?:y|ised|ized)\s+restoration\s+(?:schedule|order)|critical\s+(?:site|load)\s+restoration\s+priority)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
- global
regulations:
- AML/CTF Act (Cth)
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- ISO 27001
- ISO 27701
data_categories:
- pii
corroborative_evidence:
  keywords:
  - restoration prioritization plan
  - restoration prioritisation plan
  - priority tier
  - prioritisation tier
  - critical site
  - RTO
  - RPO
  - restoration queue
  - customer id
  - site id
  - asset id
  - feeder
  - circuit
  - exchange
  - hospital
  - emergency service
  - classified
  - restricted
  proximity: 300
test_cases:
  should_match:
  - value: 'Emergency Restoration Prioritization Plan - Priority Tier 1: Hospital feeder circuit 4521, site ID SIT-8891, RTO 2 hours, restricted distribution.'
  - value: 'Critical site restoration priority order: exchange EX-102, asset ID AS-77123, customer ID CU-556213 restored first under load shedding order.'
  - value: 'Restoration Prioritisation Tier 2 issued for the substation network: feeder ID FD-2291, asset ID AS-90210, restricted distribution.'
  should_not_match:
  - value: Our IT helpdesk's average service restoration time is 4 hours.
  - value: The power company published its service restoration SLA for residential customers.
  - value: placeholder value 12345
  - value: generic policy prose without anchors
false_positives:
- description: >-
    Common words and phrases related to emergency restoration prioritization plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal
    data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
- description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_emergency_restoration
    matches:
    - ref: Evidence_emergency_restoration
      min_count: 2
      unique_results: true
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 75
    id_match: Pattern_emergency_restoration
    matches:
    - ref: Evidence_emergency_restoration
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Pattern_emergency_restoration
  regexes:
  - id: Pattern_emergency_restoration
    pattern: (?is)\b(?:emergency\s+restoration\s+prioriti[sz]ation\s+plan|restoration\s+priorit(?:y|i[sz]ation)\s+(?:tier|order|list|queue)|priorit(?:y|ised|ized)\s+restoration\s+(?:schedule|order)|critical\s+(?:site|load)\s+restoration\s+priority)\b
  keywords:
  - id: Evidence_emergency_restoration
    groups:
    - match_style: word
      terms:
      - restoration prioritization plan
      - restoration prioritisation plan
      - priority tier
      - prioritisation tier
      - critical site
      - text: RTO
        case_sensitive: true
      - text: RPO
        case_sensitive: true
      - restoration queue
      - customer id
      - site id
      - asset id
      - feeder
      - circuit
      - exchange
      - hospital
      - emergency service
      - classified
      - restricted
    strength: specific
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
