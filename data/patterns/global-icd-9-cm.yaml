schema: testpattern/v1
name: International Classification of Diseases (ICD-9-CM)
slug: global-icd-9-cm
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects International Classification of Diseases (ICD-9-CM) patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Due to the generic numeric format,
  corroborative evidence keywords are essential for reliable detection.
operation: 'Corroborative evidence: 5 keywords within 300 characters. Keyword lists: diagnosis-codes. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: \b\d{3}\.?\d{0,2}\b
confidence: low
confidence_justification: >-
  Low confidence: three-digit numbers with optional decimal are extremely common in non-medical contexts. Corroborative evidence such as 'ICD-9' or 'diagnosis code' is essential for accurate
  detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - HIPAA
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
corroborative_evidence:
  keywords:
    - ICD-9
    - diagnosis code
    - diagnostic code
    - ICD code
    - medical classification
  proximity: 300
  keyword_lists:
    - diagnosis-codes
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '250.00'
      description: ICD-9 code for diabetes mellitus type II
    - value: '401.9'
      description: ICD-9 code for unspecified essential hypertension
    - value: '486'
      description: ICD-9 code for pneumonia
  should_not_match:
    - value: ABC.12
      description: Contains letters, not a valid ICD-9 code
    - value: AB.12
      description: Contains letters, not a valid ICD-9 format
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic numeric sequences matching the digit pattern in non-health contexts
    mitigation: Require corroborative evidence keywords within the proximity window to distinguish health identifiers from general numeric data.
  - description: Reference numbers or account identifiers from other domains with similar digit counts
    mitigation: Layer with document classification to prioritise matches in health and medical documents.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_icd_9_cm
      matches:
        - ref: Pattern_global_icd_9_cm_label_context
        - ref: Keyword_global_icd_9_cm_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_icd_9_cm
      matches:
        - ref: Keyword_icd_9_cm
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_icd_9_cm
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_icd_9_cm
      pattern: \b\d{3}\.?\d{0,2}\b
    - id: Pattern_global_icd_9_cm_label_context
      pattern: (?i)\b(?:international\s+classification\s+of\s+diseases\s+\(icd\-9\-cm\)|classification|diseases|icd)\b
  keywords:
    - id: Keyword_icd_9_cm
      groups:
        - match_style: word
          terms:
            - ICD-9
            - ICD-9-CM
            - diagnosis code
            - diagnostic code
            - ICD code
            - medical classification
            - text: MRN
              case_sensitive: true
            - medical record number
            - patient ID
            - clinical diagnosis
            - discharge diagnosis
            - admitting diagnosis
      strength: specific
    - id: Keyword_global_icd_9_cm_domain_context
      groups:
        - match_style: word
          terms:
            - international classification of diseases (icd-9-cm)
            - classification
            - diseases
            - icd
      strength: domain
risk_rating: 5
risk_description: >-
  The low-confidence regex finds three-digit ICD-9-CM shapes with optional decimals and nearby diagnosis-code vocabulary; it identifies a clinical classification code, not a patient chart or confirmed diagnosis linkage. A code can reveal a condition only when its meaning is looked up and the surrounding document ties it to an identifiable person. The normal match is one short numeric code that also collides with ordinary references, so practical harm requires patient identity, encounter, or billing context. Risk 5 and OFFICIAL reflect that bounded standalone signal, while a person-linked diagnosis list or complete coded claim would meet SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-international-classification-of-diseases-icd-9-cm
    title: International Classification of Diseases (ICD-9-CM) entity definition - Microsoft Learn
