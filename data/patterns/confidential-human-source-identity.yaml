schema: testpattern/v1
name: Confidential Human Source Identity
slug: confidential-human-source-identity
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects documents containing the identities of police informants (confidential human sources) embedded within criminal organisations. Informant identity is the single most sensitive category of law enforcement information globally. Disclosure has historically resulted in murders and creates immediate lethal risk.
operation: 'Keyword proximity: primary keywords (confidential human source, registered informant, source handler, source controller, CHIS, informant registration) within 300 characters of personal identifiers and handler references. Document markers for QPS source registration systems and source reference numbers. Negative keyword exclusion for policy and media contexts.'
pattern: (?i)\b(confidential\s+human\s+source|registered\s+informant|source\s+handler|source\s+controller|informant\s+registration|CHIS|human\s+source\s+(?:report|file|record)|informant\s+debriefing|source\s+report)\b
confidence: high
confidence_justification: 'High confidence: confidential human source management terminology is highly specialised and rarely appears outside genuine law enforcement source handling records. The co-occurrence of CHIS terminology with handler references and source registration numbers is distinctive.'
jurisdictions:
  - global
regulations:
- "PPRA 2000 (Qld)"
- "Police Service Admin Act 1990 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - COVERT
    - RESTRICTED
    - source reference number
    - handler
    - controller
    - source registration
    - debriefing
    - intelligence report
    - source reliability
    - QPS
    - Queensland Police
    - informant management
    - source payment
    - reward payment
  proximity: 300
  keyword_lists:

    - law-enforcement
test_cases:
  should_match:
    - value: 'PROTECTED — COVERT. Confidential Human Source Report. Source Reference: CHS-2024-0893. Handler: Detective Senior Constable M. NGUYEN, Organised Crime Squad. Source reliability rating: B2. Source report: Registered informant advises that the target syndicate will receive a shipment at the Fisherman Islands facility.'
      description: QPS confidential human source report with source reference number and handler details
    - value: RESTRICTED. Informant Registration Application. Source controller recommendation for registration as a confidential human source. Subject has provided actionable intelligence on three occasions. CHIS risk assessment completed — source is assessed as high-risk due to proximity to violent offenders. Informant debriefing schedule proposed.
      description: Informant registration application with risk assessment
    - value: 'Human source management review. Annual review of registered informant CHS-2023-0421. Source handler reports continued access to target organisation. Source payment schedule: quarterly payments authorised under informant management policy. Identity protection measures reviewed and confirmed adequate.'
      description: Annual review of registered informant with payment and identity protection references
  should_not_match:
    - value: The Queensland Police Service published its Policy on Management of Confidential Human Sources, outlining the framework for registering and managing informants. The policy is available on the QPS intranet.
      description: Published QPS policy document about informant management framework
    - value: The Fitzgerald Inquiry examined the use of police informants in Queensland and recommended reforms to informant management. The inquiry findings were published in 1989.
      description: Historical reference to published inquiry findings about informant management
    - value: A criminology textbook chapter discussing the ethics of confidential human source management in policing. The chapter examines cases where informant identities were compromised.
      description: Academic textbook discussing informant management ethics
false_positives:
  - description: Policy documents describing informant management frameworks
    mitigation: 'Negative keyword exclusion: ''policy'', ''framework'', ''guidelines'', ''standard operating procedure''. Require proximity to actual source reference numbers or personal identifiers.'
  - description: Historical inquiry reports discussing informant management reforms
    mitigation: 'Negative keyword exclusion: ''inquiry'', ''royal commission'', ''published'', ''recommended'', ''findings'', ''Fitzgerald'''
  - description: Academic and legal materials discussing informant law and ethics
    mitigation: 'Negative keyword exclusion: ''academic'', ''textbook'', ''university'', ''journal'', ''ethics'', ''published'''
  - description: Media reports about informant-related issues
    mitigation: 'Negative keyword exclusion: ''media release'', ''news article'', ''reported'', ''court heard'', ''trial'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_confidential_human_source_identity_chis_terms
      matches:
        - ref: Evidence_confidential_human_source_identity_primary_keywords
        - ref: Evidence_confidential_human_source_identity_classification_markers
        - ref: Evidence_confidential_human_source_identity_corroborative_terms
        - ref: Pattern_confidential_human_source_identity_source_reference_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_confidential_human_source_identity_exclusion
    - confidence_level: 75
      id_match: Pattern_confidential_human_source_identity_chis_terms
      matches:
        - ref: Evidence_confidential_human_source_identity_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_confidential_human_source_identity_exclusion
    - confidence_level: 65
      id_match: Pattern_confidential_human_source_identity_chis_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_confidential_human_source_identity_exclusion
  regexes:
    - id: Pattern_confidential_human_source_identity_chis_terms
      pattern: (?i)\b(confidential\s+human\s+source|registered\s+informant|source\s+handler|source\s+controller|informant\s+registration|CHIS|human\s+source|informant\s+debriefing|source\s+report)\b
    - id: Pattern_confidential_human_source_identity_source_reference_number
      pattern: \bCHS-\d{4}-\d{3,5}\b
  keywords:
    - id: Evidence_confidential_human_source_identity_primary_keywords
      groups:
        - match_style: word
          terms:
            - confidential human source
            - registered informant
            - source handler
            - source controller
            - informant registration
            - CHIS
            - human source report
            - informant debriefing
            - source report
            - source reference
    - id: Evidence_confidential_human_source_identity_classification_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - Law-Enforcement
            - COVERT
            - RESTRICTED
            - SENSITIVE
    - id: Evidence_confidential_human_source_identity_corroborative_terms
      groups:
        - match_style: word
          terms:
            - handler
            - controller
            - source registration
            - source reliability
            - source payment
            - reward payment
            - informant management
            - identity protection
            - debriefing schedule
            - intelligence report
            - QPS
            - Queensland Police
    - id: Filter_confidential_human_source_identity_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - annual report
            - policy framework
            - guidelines
            - training exercise
            - fictional
            - movie
            - television
            - news article
            - textbook
            - academic
            - university
            - inquiry findings
            - Fitzgerald

risk_rating: 10
risk_description: "Identities of police informants within criminal organisations; disclosure creates immediate lethal risk as demonstrated by historical informant murders."
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Law-Enforcement
references: []
created: '2026-02-20'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
license: MIT
