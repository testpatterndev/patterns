schema: testpattern/v1
name: Port facility security manifests
slug: global-top500-452-port-facility-security-manifests
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to port facility security manifests in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:port\s+facility|security\s+manifest|maritime\s+security|ISPS\s+code|vessel\s+security|port\s+security\s+plan|cargo\s+manifest|berth\s+allocation|facility\s+security\s+officer|maritime\s+transport|port\s+access\s+control)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - port facility security manifests
    - port
    - facility
    - security
    - manifests
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: port facility
      description: Primary topic phrase match
    - value: security manifest
      description: Case-insensitive topic phrase match
    - value: maritime security
      description: Alternative topic phrase match
    - value: ISPS code
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: maritime route
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to port facility security manifests appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_port_facility_security
      matches:
        - ref: Pattern_global_top500_452_port_facility_security_manifests_label_context
        - ref: Keyword_global_top500_452_port_facility_security_manifests_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_452_port_facility_security_manifests_noise_exclusion
    - confidence_level: 75
      id_match: Regex_port_facility_security
      matches:
        - ref: Keyword_port_facility_security
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_452_port_facility_security_manifests_noise_exclusion
    - confidence_level: 65
      id_match: Regex_port_facility_security
      matches:
        - ref: Keyword_port_facility_security
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_452_port_facility_security_manifests_noise_exclusion
  regexes:
    - id: Regex_port_facility_security
      pattern: (?is)\b(?:port\s+facility|security\s+manifest|maritime\s+security|ISPS\s+code|vessel\s+security|port\s+security\s+plan|cargo\s+manifest|berth\s+allocation|facility\s+security\s+officer|maritime\s+transport|port\s+access\s+control)\b
    - id: Pattern_global_top500_452_port_facility_security_manifests_label_context
      pattern: (?i)\\b(?:port\\s+facility\\s+security\\s+manifests|port|facility|security|manifests|top500)\\b
  keywords:
    - id: Keyword_port_facility_security
      groups:
        - match_style: word
          terms:
            - port facility
            - security manifest
            - maritime security
            - ISPS code
            - vessel security
            - port security plan
            - cargo manifest
            - berth allocation
            - ship-to-shore
            - facility security officer
            - maritime transport
            - port access control
    - id: Keyword_global_top500_452_port_facility_security_manifests_domain_context
      groups:
        - match_style: word
          terms:
            - port facility security manifests
            - port
            - facility
            - security
            - manifests
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_452_port_facility_security_manifests_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
