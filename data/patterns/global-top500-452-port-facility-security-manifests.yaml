schema: testpattern/v1
name: Port facility security manifests
slug: global-top500-452-port-facility-security-manifests
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive port-facility security and access manifests. Topic phrases are retained for
  discovery; enforcement requires vessel, port-call, berth, cargo, crew, visitor, escort, access-zone,
  gate, or security-level manifest content, and high confidence also requires a populated IMO, port-call,
  manifest, berth, zone, or ISPS security-level identifier.
operation: >-
  Regex_port_facility_security recognises port security/access manifest topics. The topic alone is
  discovery-only at 65. Vessel, port-call, berth, cargo, crew, visitor, escort, access-zone, gate, or
  security-level content raises it to 75; populated operational identifiers reach 85. Enforcing tiers
  reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:port\s+facility\s+security\s+manifest|port\s+security\s+manifest|maritime\s+security\s+manifest|port\s+facility\s+access\s+manifest|port\s+security\s+access\s+manifest)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires populated manifest fields rather than maritime-security discussion. High
  confidence adds a formal vessel, port-call, berth, zone, manifest, or ISPS identifier.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - port facility security manifests
    - port
    - facility
    - security
    - manifests
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: port facility security manifest
      description: Low-tier probe - manifest topic without record fields
    - value: 'Port facility security manifest lists vessel name, berth allocation, cargo description, crew access zone, visitor list, and escort requirement'
      description: Medium-tier probe - substantive manifest fields without formal identifiers
    - value: 'Port facility security manifest MF-204: vessel name Southern Star, IMO 9876543, port call ID: PC-771, berth ID: B-04, access zone ID: Z-3, ISPS security level 2'
      description: High-tier probe - manifest fields with vessel, port-call, berth, zone, and ISPS identifiers
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: maritime route
      description: Generic word pair from old broad template should not match
    - value: 'The public ISPS guide explains port facility security responsibilities.'
      description: Public maritime-security guidance without a manifest
    - value: 'Training example: port facility security manifest MF-204, IMO 9876543, berth B-04, ISPS security level 2'
      description: Explicit training content must not enforce
false_positives:
  - description: ISPS guidance, port-security plans, cargo documents, and maritime training discuss vessels, berths, access, and security levels without containing a facility security manifest.
    mitigation: Keep manifest topics discovery-only and require vessel, port-call, berth, cargo, crew, visitor, escort, access-zone, gate, or security-level fields for enforcement.
  - description: Exercises can include realistic IMO numbers, manifest IDs, port calls, berths, zones, and security levels.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_port_facility_security
      matches:
        - ref: Evidence_port_manifest_field
        - ref: Evidence_port_manifest_identifier
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_port_facility_security
      matches:
        - ref: Evidence_port_manifest_field
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_port_facility_security
  regexes:
    - id: Regex_port_facility_security
      pattern: >-
        (?is)\b(?:port\s+facility\s+security\s+manifest|port\s+security\s+manifest|maritime\s+security\s+manifest|port\s+facility\s+access\s+manifest|port\s+security\s+access\s+manifest)\b
    - id: Evidence_port_manifest_identifier
      pattern: >-
        (?i)\b(?:IMO\s*(?:number|no\.?)?\s*[:#]?\s*\d{7}|(?:port\s+call|manifest|berth|access\s+zone)\s*(?:ID|number|no\.?)?\s*[:#-]\s*[A-Z0-9][A-Z0-9._/-]{2,}|ISPS\s+security\s+level\s+[1-3])\b
  keywords:
    - id: Evidence_port_manifest_field
      groups:
        - match_style: word
          terms:
            - vessel name
            - port call
            - berth allocation
            - cargo description
            - crew list
            - visitor list
            - access zone
            - escort requirement
            - security level
            - gate access
            - arrival time
            - departure time
      strength: domain
risk_description: >-
  This regex flags port facilities, security manifests, maritime security, ISPS codes, vessel security, port plans, cargo manifests, berth allocation, security officers, transport, and access control rather than validating a manifest schema. A real security manifest can expose vessels, cargo, berths, access arrangements, responsible officers, and security measures, enabling theft, smuggling, unauthorized entry, or targeted disruption. The normal unit is one port call or facility and its operators, crews, and cargo owners, while maritime rules, training, and public port guidance can trigger the same vocabulary. Risk 8 and SENSITIVE reflect serious contained physical-security harm; PROTECTED would require critical cargo, protected operations, or actionable plans whose loss could cause significant infrastructure or life-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
