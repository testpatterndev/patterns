schema: testpattern/v1
name: Cardholder names linked to accounts
slug: global-top500-108-cardholder-names-linked-to-accounts
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to cardholder names linked to accounts in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:cardholder\s+name|card\s+holder|name\s+on\s+card|account\s+holder|PCI\s+DSS|cardholder\s+data|payment\s+card|primary\s+account\s+number|card\s+account|linked\s+account|card\s+member)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
  - GDPR
  - PCI-DSS
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - cardholder names linked to accounts
    - cardholder
    - names
    - linked
    - accounts
    - financial
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: cardholder name
      description: Primary topic phrase match
    - value: card holder
      description: Case-insensitive topic phrase match
    - value: name on card
      description: Alternative topic phrase match
    - value: account holder
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_cardholder_names
      matches:
        - ref: Evidence_cardholder_names
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_cardholder_names
      matches:
        - ref: Evidence_cardholder_names
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_cardholder_names
      matches:
        - ref: Evidence_cardholder_names
  regexes:
    - id: Pattern_cardholder_names
      pattern: >-
        (?is)\b(?:cardholder\s+name|card\s+holder|name\s+on\s+card|account\s+holder|PCI\s+DSS|cardholder\s+data|payment\s+card|primary\s+account\s+number|card\s+account|linked\s+account|card\s+member)\b
  keywords:
    - id: Evidence_cardholder_names
      groups:
        - match_style: word
          terms:
            - cardholder name
            - card holder
            - name on card
            - account holder
            - PCI DSS
            - cardholder data
            - payment card
            - primary account number
            - card account
            - linked account
            - card member
risk_description: >-
  The regex recognises cardholder-name, card-holder, name-on-card, and account-holder phrases with financial context rather than extracting a person's name or linking it to an account value. A confirmed name-plus-account record can support targeted fraud or impersonation, but the normal hit supplies neither element in usable form. Impact to a cardholder is therefore low unless person and payment identifiers co-occur, while forms and customer-service guidance can contain these labels routinely. Risk 4 OFFICIAL reflects the topic marker; SENSITIVE would require a named cardholder linked to an actual account or transaction.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
