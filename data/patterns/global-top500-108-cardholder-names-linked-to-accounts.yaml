schema: testpattern/v1
name: Cardholder names linked to accounts
slug: global-top500-108-cardholder-names-linked-to-accounts
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to cardholder names linked to accounts in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:cardholder\s+name|card\s+holder|name\s+on\s+card|account\s+holder|primary\s+cardholder|authorized\s+user|card\s+member|account\s+name|payment\s+card|credit\s+card|debit\s+card|card\s+number)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - cardholder names linked to accounts
    - cardholder
    - names
    - linked
    - accounts
    - financial
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: cardholder name
      description: Primary topic phrase match
    - value: card holder
      description: Case-insensitive topic phrase match
    - value: name on card
      description: Alternative topic phrase match
    - value: account holder
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_cardholder_names
      matches:
        - ref: Pattern_global_top500_108_cardholder_names_linked_to_accounts_label_context
        - ref: Keyword_global_top500_108_cardholder_names_linked_to_accounts_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_cardholder_names
      matches:
        - ref: Keyword_cardholder_names
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_cardholder_names
      pattern: >-
        (?is)\b(?:cardholder\s+name|card\s+holder|name\s+on\s+card|account\s+holder|primary\s+cardholder|authorized\s+user|card\s+member|account\s+name|payment\s+card|credit\s+card|debit\s+card|card\s+number)\b
    - id: Pattern_global_top500_108_cardholder_names_linked_to_accounts_label_context
      pattern: (?i)\b(?:cardholder\s+names\s+linked\s+to\s+accounts)\b
  keywords:
    - id: Keyword_cardholder_names
      groups:
        - match_style: word
          terms:
            - cardholder name
            - card holder
            - name on card
            - account holder
            - primary cardholder
            - authorized user
            - card member
            - account name
            - payment card
            - credit card
            - debit card
            - card number
      strength: specific
    - id: Keyword_global_top500_108_cardholder_names_linked_to_accounts_domain_context
      groups:
        - match_style: word
          terms:
            - cardholder names linked to accounts
            - cardholder
            - names
            - linked
            - accounts
      strength: domain
risk_description: >-
  The concept regex finds cardholder-name, name-on-card, account-holder, authorised-user, and related card-account labels with financial context, but it does not require an actual person's name or account number. Disclosure can reveal the structure of a card record and becomes useful for impersonation when a separate identity or PAN appears nearby. The normal match alone has low impact because the affected person and account cannot be resolved from the label. Risk 4 and OFFICIAL are appropriate, while a populated cardholder record pairing a name with a PAN or account would meet SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
