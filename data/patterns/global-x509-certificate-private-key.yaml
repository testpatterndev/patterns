schema: testpattern/v1
name: X.509 Certificate Private Key
slug: global-x509-certificate-private-key
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects X.509 certificate private key PEM headers. This is a broad pattern covering RSA, EC, PKCS#8, and OpenSSH private key formats. This pattern is based on a Microsoft Purview built-in sensitive
  information type. For more specific detection, see global-rsa-private, global-ec-private, global-pkcs8-private, and global-openssh-private.
operation: >-
  Matches PEM-encoded private key headers including RSA PRIVATE KEY, EC PRIVATE KEY, PRIVATE KEY (PKCS#8), OPENSSH PRIVATE KEY, and DSA PRIVATE KEY formats. Any private key in plaintext represents a
  critical security exposure. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for
  template/sample/test text.
pattern: '-----BEGIN\s+(RSA\s+|EC\s+|OPENSSH\s+|DSA\s+|ENCRYPTED\s+)?PRIVATE\s+KEY-----'
confidence: high
confidence_justification: >-
  High confidence: PEM private key headers are highly distinctive markers with minimal false positive risk. The BEGIN PRIVATE KEY format is a well-defined standard. Added context gating and exclusion
  rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private key
    - certificate
    - X.509
    - PEM
    - key file
    - SSL
    - TLS
    - encryption
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '-----BEGIN RSA PRIVATE KEY-----'
      description: RSA private key header
    - value: '-----BEGIN PRIVATE KEY-----'
      description: PKCS#8 private key header
    - value: '-----BEGIN EC PRIVATE KEY-----'
      description: EC private key header
  should_not_match:
    - value: '-----BEGIN PUBLIC KEY-----'
      description: Public key header, not private
    - value: '-----BEGIN CERTIFICATE-----'
      description: Certificate, not private key
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Documentation and tutorials showing private key format examples without actual key material.
    mitigation: Check if the content following the header contains actual Base64-encoded key data.
  - description: Encrypted private keys (BEGIN ENCRYPTED PRIVATE KEY) that require a passphrase.
    mitigation: Still flag encrypted keys as they reveal the presence of key material and may be decryptable.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_x509_private_key
      matches:
        - ref: Pattern_global_x509_certificate_private_key_label_context
        - ref: Keyword_global_x509_certificate_private_key_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_x509_private_key
      matches:
        - ref: Keyword_x509_private_key
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_x509_private_key
      pattern: '-----BEGIN\s+(RSA\s+|EC\s+|OPENSSH\s+|DSA\s+|ENCRYPTED\s+)?PRIVATE\s+KEY-----'
    - id: Pattern_global_x509_certificate_private_key_label_context
      pattern: (?i)\b(?:x\.509\s+certificate\s+private\s+key|certificate|private|key|x509)\b
  keywords:
    - id: Keyword_x509_private_key
      groups:
        - match_style: word
          terms:
            - private key
            - certificate
            - X.509
            - text: PEM
              case_sensitive: true
            - key file
            - text: SSL
              case_sensitive: true
            - text: TLS
              case_sensitive: true
            - text: RSA
              case_sensitive: true
            - PKCS
            - encryption key
            - ssh key
            - id_rsa
      strength: domain
    - id: Keyword_global_x509_certificate_private_key_domain_context
      groups:
        - match_style: word
          terms:
            - x.509 certificate private key
            - certificate
            - private
            - key
            - x509
      strength: domain
risk_rating: 8
risk_description: >-
  This broad pattern recognizes PEM headers for RSA, EC, PKCS#8, OpenSSH, DSA, and encrypted private-key containers, so the match is a private-key marker rather than a validated X.509 key body. If usable material follows, disclosure can enable signing, decryption, host or user impersonation, or certificate misuse according to that key's trust role. The normal affected scale is one key and its relying identity or service, while header-only examples, encrypted containers, missing passphrases, and revoked certificates limit direct harm. Risk 8 SENSITIVE reflects serious potential from a confirmed key exposure; PROTECTED requires evidence that the usable key anchors broad trust, critical services, or otherwise significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-x-509-certificate-private-key
    title: X.509 certificate private key entity definition - Microsoft Learn
