schema: testpattern/v1
name: QLD Marine Registration
slug: au-qld-marine-registration
version: 1.3.0
type: keyword_list
pattern_class: concept
description: Detects QLD marine vessel registration documents and operator licence details.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - IPA 2009 (Qld)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - DISP
  - ISO 27001
  - NIST CSF
data_categories:
  - government
  - transport
test_cases:
  should_match:
    - value: 'QLD marine registration: vessel registration with Maritime Safety Queensland'
      description: Test match 1
    - value: Boat licence and recreational vessel registration number
      description: Test match 2
    - value: MSQ commercial vessel survey and hull identification registration
      description: Test match 3
  should_not_match:
    - value: Marine biology research paper
      description: Non-match 1
    - value: The marine layer cleared by noon
      description: Non-match 2
false_positives:
  - description: Generic marine references in non-registration contexts.
    mitigation: Require vessel registration or MSQ specific terms.
exports:
  - yaml
scope: narrow
risk_rating: 5
risk_description: Marine registration exposure reveals vessel ownership and operator licence details.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_marine_registration
      matches:
        - ref: Evidence_marine_vessel
        - ref: Evidence_tmr_forms
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_boat_licence
      matches:
        - ref: Evidence_qld_government
  regexes:
    - id: Pattern_marine_registration
      pattern: (?i)\b(?:(?:boat|vessel|ship)\s+registration|f3525|marine\s+(?:licen[cs]e|registration)|regulated\s+ship)\b
    - id: Pattern_boat_licence
      pattern: (?i)\b(?:skipper\s+ticket|coxswain|recreational\s+(?:shipping|vessel)|marine\s+safety)\b
  keywords:
    - id: Evidence_marine_vessel
      groups:
        - match_style: word
          terms:
            - boat registration
            - vessel registration
            - marine licence
            - skipper ticket
            - coxswain
            - regulated ship
            - recreational vessel
            - maritime safety
      strength: specific
    - id: Evidence_tmr_forms
      groups:
        - match_style: word
          terms:
            - Transport and Main Roads
            - text: TMR
              case_sensitive: true
            - Department of Transport
            - F3000
            - F3520
            - F3525
            - Customer Reference Number
            - text: CRN
              case_sensitive: true
      strength: domain
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - marine registration
  - vessel registration
  - boat registration
  - boat licence
  - marine licence
  - Maritime Safety Queensland
  - MSQ
  - recreational vessel
  - commercial vessel
  - vessel survey
  - registration number
  - hull identification
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
