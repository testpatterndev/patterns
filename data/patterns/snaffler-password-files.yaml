schema: testpattern/v1
name: Password File Credential List
slug: snaffler-password-files
version: 1.1.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects credential list files — documents containing multiple username/password
  pairs in a structured, enumerated format (passwords.txt, secrets.*, BitlockerLAPSPasswords.csv,
  etc.). Distinguishes a credential roster from prose mentioning "password". Mirrors
  Snaffler rule KeepPasswordFilesByName.
operation: >-
  Primary id_match: a username field followed within 60 characters by a password field
  and a non-whitespace value of 4+ characters — the structural signature of a credential
  pair in a list. Tier 75 fires on a single occurrence with domain evidence; tier 85
  requires min_count 2 and unique results to confirm a multi-entry list (reducing
  single-line config false positives). Evidence: account, login, credentials, server, host.
pattern: '(?i)(?:username|user|login|account)\s*[:=][\s\S]{0,60}(?:password|passwd|pwd)\s*[:=]\s*[^\s]{4,}'
confidence: medium
confidence_justification: >-
  Medium confidence: the paired username+password structure is highly indicative of a
  credential list file, but the regex is intentionally broad to survive line-wrapped
  PDF extraction and varied formats. min_count gating at tier 85 anchors precision to
  multi-pair files. Inherent list heuristic; gate on evidence to suppress false positives
  in config files that legitimately set one username and one password.
jurisdictions:
  - global
regulations:
  - GDPR
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - account
    - login
    - credentials
    - server
    - host
    - username
    - password
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: "Server: db01\nUsername: admin\nPassword: P@ssw0rd\n\nServer: db02\nUsername: sa\nPassword: Secret2!"
      description: Multi-entry credential list — server/username/password blocks
    - value: "user=deploy login=svc-deploy password=xK9#mPqR7!"
      description: Single-line credential pair with equals signs
    - value: "account: ops_user\npassword: hunter2\naccount: dev_user\npassword: abc123xyz"
      description: YAML-style credential list with account/password fields
    - value: "login: nathanc\npasswd: S3cr3tP@ss99\nlogin: guest\npasswd: Welcome1!"
      description: login/passwd variant with multiple pairs
  should_not_match:
    - value: "Please reset your password by clicking the link below. Contact your admin if you need help."
      description: Prose about passwords with no credential pair structure
    - value: "Error: invalid username or password supplied"
      description: Generic auth error message with no credential assignment
    - value: "The system requires a minimum password length of 12 characters."
      description: Password policy documentation without actual credentials
false_positives:
  - description: >-
      Configuration files (httpd.conf, wp-config.php) that set a single
      username and password for a service. These are valid credentials but
      not a credential list — distinguish by requiring min_count >= 2.
    mitigation: Use tier 85 with min_count 2 and unique_results to require at
      least two distinct credential pairs before escalating confidence.
  - description: >-
      Security training materials, CTF challenge write-ups, and documentation
      that show example credential pairs as illustrations.
    mitigation: Gate on noise-exclusion keyword list (template-exclusion) and
      require domain-context evidence (server, host, account, credentials).
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Regex_snaffler_cred_pair
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_cred_pair
      matches:
        - ref: Keyword_snaffler_cred_list_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_cred_pair
      min_count: 2
      unique_results: true
      matches:
        - ref: Keyword_snaffler_cred_list_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_cred_pair
      pattern: '(?i)(?:username|user|login|account)\s*[:=][\s\S]{0,60}(?:password|passwd|pwd)\s*[:=]\s*[^\s]{4,}'
  keywords:
    - id: Keyword_snaffler_cred_list_context
      groups:
        - match_style: word
          terms:
            - account
            - login
            - credentials
            - server
            - host
            - username
            - password
risk_rating: 9
risk_description: >-
  A credential list file exposes multiple sets of authentication secrets simultaneously,
  enabling broad lateral movement and privilege escalation across any system listed.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-26'
updated: '2026-07-09'
changelog:
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.0.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
