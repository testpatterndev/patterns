schema: testpattern/v1
name: Penetration testing reports
slug: au-top500-252-penetration-testing-reports
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive penetration-testing reports, findings, and offensive-security assessments.
  The title phrase alone is retained for discovery; enforcement requires report-content evidence such
  as methodology, scoped testing, vulnerabilities, exploit detail, or CVSS severity.
operation: >-
  Pattern_pentest_report recognises penetration-test, pen-test, offensive-security-assessment, and
  external-security-test report phrases. The phrase alone is discovery-only at 65. Pentest methodology,
  vulnerability, or severity content raises it to 75; both a vulnerability finding and CVSS/severity
  evidence are required at 85. Enforcing tiers reject explicit templates and training examples.
pattern: (?i)\b(?:penetration\s+test(?:ing)?\s+(?:report|findings?|assessment)|pen\s*test\s+(?:report|results)|offensive\s+security\s+(?:assessment|report)|external\s+(?:penetration|security)\s+test)\b
confidence: medium
confidence_justification: >-
  Medium confidence: a report title is not enough to prove that the document contains exploitable
  findings. Methodology, finding, or severity content is required for enforcement, and the high tier
  requires independent evidence of both a vulnerability and its assessed severity.
jurisdictions:
  - au
regulations:
  - Criminal Code Act 1995 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
data_categories:
  - security
corroborative_evidence:
  keywords:
    - penetration testing reports
    - penetration
    - testing
    - reports
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: 'Penetration testing report'
      description: Low-tier probe - report title without substantive content
    - value: 'Penetration testing report - scope of work, rules of engagement, and testing methodology'
      description: Medium-tier probe - report title with engagement methodology
    - value: 'Penetration testing report: SQL injection vulnerability, proof of concept, CVSS score 9.8, critical severity'
      description: High-tier probe - vulnerability finding with independent severity evidence
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic prose without structural artifact anchors
      description: Should not match plain mentions
    - value: 'Security policy requires an annual penetration test but does not contain a report or findings.'
      description: Control requirement, not a penetration-testing report
    - value: 'Training example: penetration testing report with SQL injection vulnerability and CVSS score 9.8'
      description: Explicit training content must not enforce
false_positives:
  - description: Policies, procurement scopes, and audit schedules may mention a penetration-testing report without containing any assessment results.
    mitigation: Keep the title-only tier discovery-only and require methodology, vulnerability, or severity content before enforcement.
  - description: Security courses and sample reports can contain realistic vulnerabilities, exploit language, and CVSS scores.
    mitigation: Exclude explicit template, tutorial, demo, and training-example framing from the medium and high tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 8
risk_description: >-
  This classifier targets penetration-testing reports and can combine report structure with CVSS severity, methodology, vulnerability, or security-assessment evidence. A leaked report may provide affected hosts, exploitable findings, reproduction steps, screenshots, credentials observed during testing, and remediation gaps that form an attacker roadmap. The assessed organization, system owners, and service users face serious targeted risk, but the normal report is bounded to an engagement and findings may already be remediated or require separate access. Risk 8 and SENSITIVE fit a current scoped report, while critical-service coverage, working exploit chains, or broad privileged findings would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pentest_report
      matches:
        - ref: Evidence_cvss_severity
        - ref: Evidence_vulnerability_finding
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_pentest_report
      matches:
        - ref: Evidence_pentest_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_pentest_report
  regexes:
    - id: Pattern_pentest_report
      pattern: (?i)\b(?:penetration\s+test(?:ing)?\s+(?:report|findings?|assessment)|pen\s*test\s+(?:report|results)|offensive\s+security\s+(?:assessment|report)|external\s+(?:penetration|security)\s+test)\b
  keywords:
    - id: Evidence_pentest_content
      groups:
        - match_style: word
          terms:
            - CVSS score
            - critical severity
            - high severity
            - severity rating
            - rules of engagement
            - scope of work
            - assessment methodology
            - testing methodology
            - vulnerability
            - exploitable
            - proof of concept
            - remote code execution
            - privilege escalation
            - authentication bypass
            - SQL injection
      strength: domain
    - id: Evidence_cvss_severity
      groups:
        - match_style: word
          terms:
            - CVSS score
            - CVSS v3
            - base score
            - critical severity
            - high severity
            - medium severity
            - low severity
            - severity rating
            - risk rating
      strength: specific
    - id: Evidence_pentest_methodology
      groups:
        - match_style: word
          terms:
            - PTES
            - OSSTMM
            - OWASP
            - rules of engagement
            - scope of work
            - assessment methodology
            - testing methodology
            - in scope
            - out of scope
      strength: specific
    - id: Evidence_vulnerability_finding
      groups:
        - match_style: word
          terms:
            - vulnerability
            - vulnerable
            - exploit
            - exploitable
            - proof of concept
            - text: POC
              case_sensitive: true
            - remote code execution
            - privilege escalation
            - authentication bypass
            - SQL injection
            - cross-site scripting
            - text: XSS
              case_sensitive: true
      strength: domain
