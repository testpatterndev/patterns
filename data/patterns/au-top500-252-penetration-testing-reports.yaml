schema: testpattern/v1
name: Penetration testing reports
slug: au-top500-252-penetration-testing-reports
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies penetration testing reports patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: >-
  Pattern type: regex (boost_regex engine). Three-tier purview detection: high confidence (95) matches pentest report pattern with CVSS severity evidence and template exclusion; medium confidence (85)
  matches with CVSS severity plus pentest methodology evidence; low confidence (75) matches with vulnerability finding or security assessment evidence. Corroborative evidence: 7 keywords within 300
  characters.
pattern: (?i)\b(?:penetration\s+test(?:ing)?\s+(?:report|findings?|assessment)|pen\s*test\s+(?:report|results)|offensive\s+security\s+(?:assessment|report)|external\s+(?:penetration|security)\s+test)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - Criminal Code Act 1995 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - penetration testing reports
    - penetration
    - testing
    - reports
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: 'Penetration testing report'
      description: Topic phrase present
    - value: 'penetration testing report'
      description: Topic phrase, lowercase
    - value: 'this record references the penetration testing report held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic prose without structural artifact anchors
      description: Should not match plain mentions
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 10
risk_description: Pentest report exposure provides an attacker roadmap with CVSS scores and exploit details
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pentest_report
      matches:
        - ref: Evidence_cvss_severity
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_pentest_report
      matches:
        - ref: Evidence_cvss_severity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_pentest_report
      matches:
        - ref: Evidence_cvss_severity
  regexes:
    - id: Pattern_pentest_report
      pattern: (?i)\b(?:penetration\s+test(?:ing)?\s+(?:report|findings?|assessment)|pen\s*test\s+(?:report|results)|offensive\s+security\s+(?:assessment|report)|external\s+(?:penetration|security)\s+test)\b
  keywords:
    - id: Evidence_cvss_severity
      groups:
        - match_style: word
          terms:
            - CVSS score
            - CVSS v3
            - base score
            - critical severity
            - high severity
            - medium severity
            - low severity
            - severity rating
            - risk rating
      strength: specific
    - id: Evidence_pentest_methodology
      groups:
        - match_style: word
          terms:
            - PTES
            - OSSTMM
            - OWASP
            - rules of engagement
            - scope of work
            - assessment methodology
            - testing methodology
            - in scope
            - out of scope
      strength: specific
    - id: Evidence_vulnerability_finding
      groups:
        - match_style: word
          terms:
            - vulnerability
            - vulnerable
            - exploit
            - exploitable
            - proof of concept
            - text: POC
              case_sensitive: true
            - remote code execution
            - privilege escalation
            - authentication bypass
            - SQL injection
            - cross-site scripting
            - text: XSS
              case_sensitive: true
      strength: domain
    - id: Evidence_security_assessment
      groups:
        - match_style: word
          terms:
            - security assessment
            - security audit
            - security review
            - security testing
            - security evaluation
            - executive summary
            - findings summary
            - risk summary
            - CVSS
            - text: CWE
              case_sensitive: true
            - vulnerability scan
            - Nessus
            - Qualys
            - Nmap
            - attack surface
      strength: specific
created: '2026-02-08'
updated: '2026-07-09'
