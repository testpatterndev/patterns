schema: testpattern/v1
name: EU DORA Register of Information
slug: eu-dora-register-of-information
version: 1.2.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects extracts and working copies of the DORA Article 28(3) register of information on contractual arrangements with ICT third-party service providers, including the ESAs' Implementing Regulation (EU) 2024/2956 template content (contractual arrangement reference numbers, provider LEIs, ICT service supply chain, critical or important function flags). The register maps a financial entity's entire ICT outsourcing estate and its concentration risk; disclosure exposes supplier dependencies and attack surface.
operation: 'Keyword proximity: primary topic phrases (register of information, contractual arrangement reference number, ICT third-party service provider) within 300 characters of DORA register vocabulary (Regulation (EU) 2022/2554, critical or important function, ICT service supply chain, LEI, type of ICT services). Structural corroboration: the 85 tier requires an Implementing Regulation (EU) 2024/2956 template code (B_01.01-B_07.01, B_99.01) in addition to — not instead of — the register vocabulary; extracts carrying vocabulary but no template code stop at the 75 tier. Negative keyword exclusion for press releases, consultancy explainers, and template/training material. Concept classifier: matches the topic, not identifier-grade evidence.'
pattern: (?i)\b(?:register\s+of\s+information|contractual\s+arrangement\s+reference\s+numbers?|ICT\s+third[\s-]party\s+service\s+providers?)\b
confidence: medium
confidence_justification: 'Medium confidence: honest topic matcher, not an identifier detector. The Article 28(3) phrase ''register of information'' and the ITS field name ''contractual arrangement reference number'' are regulation-specific terms of art, and the 85 tier additionally requires both DORA register vocabulary (Regulation (EU) 2022/2554, critical or important function, LEI, ICT service supply chain) and a B_xx.yy template code; vocabulary-only extracts (e.g. submission memos) reach the 75 tier. Compliance-consultancy and news content about DORA uses the same vocabulary and is suppressed only by noise exclusions.'
jurisdictions:
  - eu
regulations:
- "Regulation (EU) 2022/2554 (DORA)"
- "Implementing Regulation (EU) 2024/2956"
frameworks:
- ISO 27001
data_categories:
  - financial
  - governance
  - security
corroborative_evidence:
  keywords:
    - register of information
    - contractual arrangement reference number
    - contractual arrangement reference numbers
    - ICT third-party service provider
    - ICT third-party service providers
    - Regulation (EU) 2022/2554
    - DORA
    - critical or important function
    - ICT intra-group service provider
    - ICT service supply chain
    - type of ICT services
    - LEI
    - competent authority
    - contractual arrangement
    - subcontractor
    - substitutability
    - exit strategy
  proximity: 300
  keyword_lists:
    - corporate-governance
test_cases:
  should_match:
    - value: |-
        Register of Information — entity level, reporting reference date 31/03/2026.
        B_02.01 Contractual arrangements — general information.
        Contractual arrangement reference number: CAR-2026-00187.
        ICT third-party service provider: CloudCore Services GmbH, LEI 529900T8BM49AURSDO55.
        Type of ICT services: S02 — cloud computing resources.
        Supporting a critical or important function: Yes (F-07 retail payment processing).
      description: Register extract with ITS 2024/2956 template code and field values
    - value: Attached for submission to the competent authority under Article 28(3) of Regulation (EU) 2022/2554 (DORA) is our register of information covering all contractual arrangements on the use of ICT services provided by ICT third-party service providers, distinguishing arrangements that support a critical or important function. New entries this quarter run from contractual arrangement reference number CAR-2026-0201 to CAR-2026-0219.
      description: Annual register submission memo to the competent authority
    - value: 'B_05.02 ICT service supply chain: rank 1 — direct ICT third-party service provider NordicHost ApS (LEI 549300HHFXW9BQOKF824); rank 2 — subcontractor DataVault OU providing storage of data. Substitutability assessment: difficult to substitute. Exit strategy agreed for the contractual arrangement; reintegration considered not feasible.'
      description: Supply chain template rows with rank and substitutability fields
  should_not_match:
    - value: The ESAs issued a press release reminding financial entities that the first register of information submissions under DORA are due in April, and that reporting via the competent authorities will use the harmonised formats.
      description: Regulator press release about register submission deadlines
    - value: 'Join our DORA readiness webinar: what belongs in the register of information, how to assign a contractual arrangement reference number, and how supervisors will use your submission. Register now — places are limited.'
      description: Consultancy webinar marketing about the register
    - value: This tutorial for new compliance staff explains what an ICT third-party service provider is under DORA and walks through a sample register of information built from placeholder vendor names.
      description: Internal training tutorial with sample register content
false_positives:
  - description: Compliance-consultancy marketing, webinars, and law-firm client alerts discussing the register of information
    mitigation: 'Negative keyword exclusion: ''press release'', ''webinar'', ''explainer'', ''newsletter'', ''blog post'', ''consultation paper''. Concept-class collision is inherent: consultancy content uses the regulation''s own vocabulary and can only be suppressed, not eliminated.'
  - description: The regulation or ITS text itself quoted in policy memos, procedures, or legal analysis
    mitigation: Higher tiers require co-occurring register field values (template codes, reference numbers, LEI) rather than bare Article 28(3) phrasing; residual matches on quoted text are expected for a topic classifier
  - description: Training material and sample registers with placeholder data
    mitigation: Shared template-exclusion dictionary (template, sample, placeholder, tutorial, training data) as NOT evidence on every tier
  - description: Procurement and vendor-management documents that mention ICT third-party service providers without being the register
    mitigation: 85 tier requires register-specific vocabulary (contractual arrangement reference number, template codes, substitutability) in proximity
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_eu_dora_register_of_information_topic_terms
      matches:
        - ref: Evidence_eu_dora_register_of_information_primary
        - ref: Evidence_eu_dora_register_of_information_corroborative
        - ref: Pattern_eu_dora_register_of_information_template_codes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_dora_register_of_information_exclusion
    - confidence_level: 75
      id_match: Pattern_eu_dora_register_of_information_topic_terms
      matches:
        - ref: Evidence_eu_dora_register_of_information_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_dora_register_of_information_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_eu_dora_register_of_information_topic_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_dora_register_of_information_exclusion
  regexes:
    - id: Pattern_eu_dora_register_of_information_topic_terms
      pattern: (?i)\b(?:register\s+of\s+information|contractual\s+arrangement\s+reference\s+numbers?|ICT\s+third[\s-]party\s+service\s+providers?)\b
    - id: Pattern_eu_dora_register_of_information_template_codes
      pattern: \bB_(?:0[1-7]|99)\.0[1-3]\b
  keywords:
    - id: Evidence_eu_dora_register_of_information_primary
      groups:
        - match_style: word
          terms:
            - register of information
            - contractual arrangement reference number
            - contractual arrangement reference numbers
            - ICT third-party service provider
            - ICT third-party service providers
      strength: specific
    - id: Evidence_eu_dora_register_of_information_corroborative
      groups:
        - match_style: word
          terms:
            - Regulation (EU) 2022/2554
            - text: DORA
              case_sensitive: true
            - critical or important function
            - ICT intra-group service provider
            - ICT service supply chain
            - type of ICT services
            - text: LEI
              case_sensitive: true
            - contractual arrangement
            - substitutability
            - exit strategy
            - competent authority
      strength: domain
    - id: Filter_eu_dora_register_of_information_exclusion
      groups:
        - match_style: word
          terms:
            - press release
            - media statement
            - consultation paper
            - explainer
            - webinar
            - newsletter
            - blog post
            - academic
            - training course
      strength: noise
risk_rating: 6
risk_description: >-
  EU DORA Register of Information detects the structured outsourcing register of ICT contractual arrangements, provider identifiers, service supply chains, critical-function flags, substitutability, and exit planning. Disclosure can map supplier dependencies and concentration risk, helping an attacker target weak providers or disrupting procurement and supervisory activity. A normal register extract creates moderate operational and commercial harm, with impact scaling by breadth and detail. Risk 6 and SENSITIVE Financial are appropriate; PROTECTED would require a sector-critical dependency map or exploitable architecture whose release could cause significant systemic damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://www.springlex.eu/packages/dora/dora-regulation/article-28/
    title: "DORA Article 28(3) — register of information on contractual arrangements with ICT third-party service providers"
  - url: https://eur-lex.europa.eu/eli/reg_impl/2024/2956/oj/eng
    title: "Commission Implementing Regulation (EU) 2024/2956 — standard templates for the register of information"
  - url: https://www.springlex.eu/en/packages/dora/its-roi-regulation/annex-1/
    title: "ITS 2024/2956 Annex I — register of information template codes (B_01.01 to B_99.01) and field instructions"
