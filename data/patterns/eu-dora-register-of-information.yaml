  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-08'
    description: 'Codex D4 review: prose-only fix — operation and confidence_justification claimed the 85 tier accepts DORA register vocabulary OR a B_xx.yy template code, but the tier logic (reviewed and approved twice) requires BOTH. AND is reachable on realistic extracts (two of the three should_match cases carry template codes and reach 85; the vocabulary-only submission memo correctly stops at 75), so the prose was corrected to describe the AND semantics; no detection logic changed'
  - version: 1.1.0
    date: '2026-07-08'
    description: 'Plural pass: primary regex and keyword evidence accept plural renderings (contractual arrangement reference numbers, ICT third-party service providers — Article 28(3) itself uses the plural); ''register of information'' kept singular (plural rendering is characteristic of regulator/consultancy commentary, an enumerated FP class)'
  - version: 1.0.0
