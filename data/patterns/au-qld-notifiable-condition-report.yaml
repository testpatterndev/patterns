schema: testpattern/v1
name: QLD Notifiable Condition Report
slug: au-qld-notifiable-condition-report
version: 1.4.0
type: keyword_list
pattern_class: concept
description: Detects QLD notifiable condition reports for public health surveillance and disease notifications.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
  - government
test_cases:
  should_match:
    - value: 'Notifiable condition report: communicable disease notification to public health unit'
      description: Test match 1
    - value: QLD Health notification with contact tracing and surveillance data
      description: Test match 2
    - value: Public health notification for outbreak notification and case notification
      description: Test match 3
  should_not_match:
    - value: Notification of scheduled maintenance
      description: Non-match 1
    - value: Disease prevention tips
      description: Non-match 2
false_positives:
  - description: Generic notification or disease in non-surveillance contexts.
    mitigation: Require notifiable condition or public health notification specific terms.
exports:
  - yaml
scope: narrow
risk_rating: 9
risk_description: Notifiable condition exposure reveals public health surveillance data and disease notifications.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_notifiable_condition
      matches:
        - ref: Evidence_notifiable_disease
        - ref: Evidence_public_health_act
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_disease_report
      matches:
        - ref: Evidence_qld_health_forms
  regexes:
    - id: Pattern_notifiable_condition
      pattern: (?i)\b(?:notifiable\s+(?:condition|disease)\s+(?:report|notification)|communicable\s+disease\s+report|public\s+health\s+notification)\b
    - id: Pattern_disease_report
      pattern: (?i)\b(?:disease\s+(?:surveillance|notification)|reportable\s+(?:condition|disease))\b
  keywords:
    - id: Evidence_notifiable_disease
      groups:
        - match_style: word
          terms:
            - notifiable condition
            - notifiable disease
            - communicable disease
            - reportable disease
            - disease notification
            - public health notification
            - NOCS
      strength: specific
    - id: Evidence_public_health_act
      groups:
        - match_style: word
          terms:
            - Public Health Act 2005
            - Section 70
            - Section 71
            - Public Health Regulation
            - Schedule 1
            - public health unit
      strength: specific
    - id: Evidence_qld_health_forms
      groups:
        - match_style: word
          terms:
            - Queensland Health
            - Hospital and Health Service
            - text: HHS
              case_sensitive: true
            - health.qld.gov.au
            - QH-IMP
            - Pathology Queensland
            - Clinical Excellence Queensland
      strength: specific
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Mapped non-canonical confidence 90 to 85.
author: testpattern-community
license: MIT
keywords:
  - notifiable condition
  - notifiable disease
  - mandatory notification
  - notification obligation
  - public health notification
  - communicable disease
  - disease notification
  - QLD Health notification
  - surveillance
  - case notification
  - contact tracing
  - outbreak notification
  - public health unit
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Mapped non-canonical confidence 90 to 85.'
      - 'Mapped non-canonical confidence 80 to 75.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
      - 'Aligned recommended_confidence to 85.'
