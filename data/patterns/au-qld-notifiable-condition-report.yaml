schema: testpattern/v1
name: QLD Notifiable Condition Report
slug: au-qld-notifiable-condition-report
version: 1.4.2
type: keyword_list
pattern_class: concept
description: Detects QLD notifiable condition reports for public health surveillance and disease notifications.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
  - government
test_cases:
  should_match:
    - value: Notifiable condition report issued
      description: Exact 65 discovery probe with a report phrase and no case detail
    - value: Notifiable condition report with contact tracing
      description: Exact 75 probe with public-health case response context
    - value: Notifiable condition report under Public Health Act 2005 with contact tracing
      description: Exact 85 probe with case response and statutory context
    - value: 'Notifiable condition report: communicable disease notification with contact tracing to public health unit'
      description: Communicable disease notification to a public health unit
    - value: QLD Health notifiable condition notification with contact tracing and surveillance data
      description: QLD Health case notification with surveillance details
    - value: Public health notification for outbreak notification and case notification
      description: Test match 3
  should_not_match:
    - value: Notification of scheduled maintenance
      description: Non-match 1
    - value: Disease prevention tips
      description: Non-match 2
    - value: Reportable disease dashboard redesign
      description: Product dashboard phrase must remain discovery-only
false_positives:
  - description: Generic notification or disease in non-surveillance contexts.
    mitigation: Require notifiable condition or public health notification specific terms.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This keyword classifier detects Queensland public-health notifications containing a notifiable condition, communicable-disease case, contact tracing, surveillance, outbreak, or case-notification language. A genuine report can identify an infected person, diagnosis, exposure contacts, locations, and public-health action, enabling stigma, retaliation, evasion of controls, or harm to an active investigation. The ordinary case is bounded to one notification or cluster rather than the full surveillance system, but its disclosure still creates serious individual and operational consequences. Risk 8 and SENSITIVE are justified; PROTECTED would require a major outbreak operation, protected source intelligence, or disclosure causing significant population-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_notifiable_condition
          - Pattern_disease_report
      matches:
        - ref: Evidence_case_response_context
        - ref: Evidence_public_health_act
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_notifiable_condition
          - Pattern_disease_report
      matches:
        - ref: Evidence_case_response_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_notifiable_condition
          - Pattern_disease_report
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_notifiable_condition
      pattern: (?i)\b(?:notifiable\s+(?:condition|disease)\s+(?:report|notification)|communicable\s+disease\s+report|public\s+health\s+notification)\b
    - id: Pattern_disease_report
      pattern: (?i)\b(?:disease\s+(?:surveillance|notification)|reportable\s+(?:condition|disease))\b
  keywords:
    - id: Evidence_notifiable_disease
      groups:
        - match_style: word
          terms:
            - notifiable condition
            - notifiable disease
            - communicable disease
            - reportable disease
            - disease notification
            - public health notification
            - NOCS
      strength: specific
    - id: Evidence_public_health_act
      groups:
        - match_style: word
          terms:
            - Public Health Act 2005
            - Section 70
            - Section 71
            - Public Health Regulation
            - Schedule 1
            - public health unit
      strength: specific
    - id: Evidence_qld_health_forms
      groups:
        - match_style: word
          terms:
            - Queensland Health
            - Hospital and Health Service
            - text: HHS
              case_sensitive: true
            - health.qld.gov.au
            - QH-IMP
            - Pathology Queensland
            - Clinical Excellence Queensland
      strength: specific
    - id: Evidence_case_response_context
      groups:
        - match_style: word
          terms:
            - contact tracing
            - case investigation
            - laboratory confirmation
            - outbreak
            - patient
            - specimen
            - surveillance data
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: keep report phrases at 65 discovery, require independent case-response evidence at 75 and Public Health Act context at 85, with exact-tier and notification-software probes.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 586 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Mapped non-canonical confidence 90 to 85.
author: testpattern-community
license: MIT
keywords:
  - notifiable condition
  - notifiable disease
  - mandatory notification
  - notification obligation
  - public health notification
  - communicable disease
  - disease notification
  - QLD Health notification
  - surveillance
  - case notification
  - contact tracing
  - outbreak notification
  - public health unit
