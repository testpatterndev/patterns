schema: testpattern/v1
name: Customer chat transcripts
slug: global-top500-367-customer-chat-transcripts
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to customer chat transcripts in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: industry-education. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:chat\s+transcript|customer\s+chat|live\s+chat|chat\s+log|chat\s+session|support\s+ticket|chatbot\s+conversation|messaging\s+history|customer\s+interaction|chat\s+record|online\s+support|customer\s+message)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - customer chat transcripts
    - customer
    - chat
    - transcripts
    - commercial
    - data
  proximity: 300
  keyword_lists:
    - industry-education
test_cases:
  should_match:
    - value: chat transcript
      description: Primary topic phrase match
    - value: customer chat
      description: Case-insensitive topic phrase match
    - value: live chat
      description: Alternative topic phrase match
    - value: chat log
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to customer chat transcripts appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_chat_transcripts
      matches:
        - ref: Pattern_global_top500_367_customer_chat_transcripts_label_context
        - ref: Keyword_global_top500_367_customer_chat_transcripts_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_367_customer_chat_transcripts_noise_exclusion
    - confidence_level: 75
      id_match: Regex_chat_transcripts
      matches:
        - ref: Keyword_chat_transcripts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_367_customer_chat_transcripts_noise_exclusion
    - confidence_level: 65
      id_match: Regex_chat_transcripts
      matches:
        - ref: Keyword_chat_transcripts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_367_customer_chat_transcripts_noise_exclusion
  regexes:
    - id: Regex_chat_transcripts
      pattern: (?is)\b(?:chat\s+transcript|customer\s+chat|live\s+chat|chat\s+log|chat\s+session|support\s+ticket|chatbot\s+conversation|messaging\s+history|customer\s+interaction|chat\s+record|online\s+support|customer\s+message)\b
    - id: Pattern_global_top500_367_customer_chat_transcripts_label_context
      pattern: (?i)\\b(?:customer\\s+chat\\s+transcripts|customer|chat|transcripts|top500)\\b
  keywords:
    - id: Keyword_chat_transcripts
      groups:
        - match_style: word
          terms:
            - chat transcript
            - customer chat
            - live chat
            - chat log
            - chat session
            - support ticket
            - chatbot conversation
            - messaging history
            - customer interaction
            - chat record
            - online support
            - customer message
    - id: Keyword_global_top500_367_customer_chat_transcripts_domain_context
      groups:
        - match_style: word
          terms:
            - customer chat transcripts
            - customer
            - chat
            - transcripts
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_367_customer_chat_transcripts_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
