schema: testpattern/v1
name: Standard contractual clause addenda
slug: au-top500-467-standard-contractual-clause-addenda
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to standard contractual clause addenda in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:standard\s+contractual\s+clause\s+addenda|contractual\s+clause|data\s+processing\s+agreement|data\s+exporter|data\s+importer)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - standard contractual clause addenda
    - standard
    - contractual
    - clause
    - addenda
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: standard contractual clause addenda
      description: Primary topic phrase match
    - value: contractual clause
      description: Case-insensitive topic phrase match
    - value: data processing agreement
      description: Alternative topic phrase match
    - value: data exporter
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to standard contractual clause addenda appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_scc_addenda
      matches:
        - ref: Evidence_scc_addenda
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_scc_addenda
      matches:
        - ref: Evidence_scc_addenda
    - confidence_level: 65
      id_match: Pattern_scc_addenda
      matches:
        - ref: Evidence_scc_addenda
  regexes:
    - id: Pattern_scc_addenda
      pattern: (?is)\b(?:standard\s+contractual\s+clause\s+addenda|contractual\s+clause|data\s+processing\s+agreement|data\s+exporter|data\s+importer)\b
  keywords:
    - id: Evidence_scc_addenda
      groups:
        - match_style: word
          terms:
            - standard contractual clause addenda
            - contractual clause
            - SCC
            - data processing agreement
            - DPA
            - cross-border
            - data exporter
            - data importer
            - sub-processor
            - privacy
            - compliance
            - addendum
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
