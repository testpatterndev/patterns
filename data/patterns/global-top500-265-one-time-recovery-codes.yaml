schema: testpattern/v1
name: One-time recovery codes
slug: global-top500-265-one-time-recovery-codes
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies one-time recovery codes patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:recovery\s+code|one[\s-]+time\s+code|backup\s+code|emergency\s+code|recovery\s+token|account\s+recovery|mfa\s+recovery|bypass\s+code|scratch\s+code|reset\s+code)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - Criminal Code Act 1995 (Cth)
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - one-time recovery codes
    - one
    - time
    - recovery
    - codes
    - credentials
    - keys
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: recovery code
      description: Primary topic phrase match
    - value: one-time code
      description: Case-insensitive topic phrase match
    - value: backup code
      description: Alternative topic phrase match
    - value: emergency code
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: secret mfa
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_one_time_recovery_codes
      matches:
        - ref: Pattern_global_top500_265_one_time_recovery_codes_label_context
        - ref: Keyword_global_top500_265_one_time_recovery_codes_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_one_time_recovery_codes
      matches:
        - ref: Keyword_one_time_recovery_codes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_one_time_recovery_codes
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_one_time_recovery_codes
      pattern: (?is)\b(?:recovery\s+code|one[\s-]+time\s+code|backup\s+code|emergency\s+code|recovery\s+token|account\s+recovery|mfa\s+recovery|bypass\s+code|scratch\s+code|reset\s+code)\b
    - id: Pattern_global_top500_265_one_time_recovery_codes_label_context
      pattern: (?i)\b(?:one\-time\s+recovery\s+codes)\b
  keywords:
    - id: Keyword_one_time_recovery_codes
      groups:
        - match_style: word
          terms:
            - recovery code
            - one-time code
            - backup code
            - emergency code
            - otp
            - single-use
            - recovery token
            - account recovery
            - mfa recovery
            - bypass code
            - scratch code
            - reset code
      strength: specific
    - id: Keyword_global_top500_265_one_time_recovery_codes_domain_context
      groups:
        - match_style: word
          terms:
            - one-time recovery codes
            - one
            - time
            - recovery
            - codes
      strength: domain
risk_description: >-
  The pattern matches recovery code, one-time code, backup code, or emergency code language in authentication context, indicating a recovery-code topic but not validating a code value. A genuine record of unused recovery codes can bypass a missing second factor and permit account access when paired with the required identity and primary authentication conditions. Help articles, enrolment instructions, and already consumed codes can match, and one code is normally single use and account-bound. Risk 8 SENSITIVE reflects serious contained account harm from a valid recovery record; PROTECTED would require privileged, bulk, or high-consequence scope not established by these phrases.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
