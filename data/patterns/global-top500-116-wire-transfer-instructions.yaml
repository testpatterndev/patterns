schema: testpattern/v1
name: Wire transfer instructions
slug: global-top500-116-wire-transfer-instructions
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to wire transfer instructions in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:wire\s+transfer|SWIFT\s+code|beneficiary\s+bank|routing\s+number|correspondent\s+bank|intermediary\s+bank|bank\s+account|transfer\s+instructions|wire\s+payment|funds\s+transfer|ABA\s+number)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - wire transfer instructions
    - wire
    - transfer
    - instructions
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: wire transfer
      description: Primary topic phrase match
    - value: swift code
      description: Case-insensitive topic phrase match
    - value: beneficiary bank
      description: Alternative topic phrase match
    - value: routing number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_wire_transfer
      matches:
        - ref: Pattern_global_top500_116_wire_transfer_instructions_label_context
        - ref: Keyword_global_top500_116_wire_transfer_instructions_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_116_wire_transfer_instructions_noise_exclusion
    - confidence_level: 75
      id_match: Regex_wire_transfer
      matches:
        - ref: Keyword_wire_transfer
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_116_wire_transfer_instructions_noise_exclusion
    - confidence_level: 65
      id_match: Regex_wire_transfer
      matches:
        - ref: Keyword_wire_transfer
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_116_wire_transfer_instructions_noise_exclusion
  regexes:
    - id: Regex_wire_transfer
      pattern: (?is)\b(?:wire\s+transfer|SWIFT\s+code|beneficiary\s+bank|routing\s+number|correspondent\s+bank|intermediary\s+bank|bank\s+account|transfer\s+instructions|wire\s+payment|funds\s+transfer|ABA\s+number)\b
    - id: Pattern_global_top500_116_wire_transfer_instructions_label_context
      pattern: (?i)\\b(?:wire\\s+transfer\\s+instructions|wire|transfer|instructions|top500)\\b
  keywords:
    - id: Keyword_wire_transfer
      groups:
        - match_style: word
          terms:
            - wire transfer
            - SWIFT code
            - beneficiary bank
            - routing number
            - IBAN
            - correspondent bank
            - intermediary bank
            - bank account
            - transfer instructions
            - wire payment
            - funds transfer
            - ABA number
    - id: Keyword_global_top500_116_wire_transfer_instructions_domain_context
      groups:
        - match_style: word
          terms:
            - wire transfer instructions
            - wire
            - transfer
            - instructions
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_116_wire_transfer_instructions_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
