schema: testpattern/v1
name: Port facility security manifests
slug: au-top500-452-port-facility-security-manifests
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to port facility security manifests in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:port\s+facility\s+security\s+manifests?|port\s+facility\s+security\s+plan(?=[^.]{0,80}\b(?:IMO\s*\d{7}|classified|restricted|confidential|(?:reference|ref|no\.?)\s*[:#]?\s*[A-Z0-9-]*\d[A-Z0-9-]*)\b)|ISPS\s+code\s+(?:compliance|certificate|audit)\s+(?:record|no\.?|number|ref(?:erence)?)|MARSEC\s+level\s*[1-3]|IMO\s*(?:no\.?|number)?\s*\d{7}|vessel\s+manifest\s+(?:no\.?|number)?\s*[A-Z]{0,4}-?\d{3,8}|security\s+restricted\s+area)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
- global
regulations:
- AML/CTF Act (Cth)
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- ISO 27001
- ISO 27701
data_categories:
- pii
corroborative_evidence:
  keywords:
  - port facility security manifest
  - port facility security plan
  - ISPS code compliance
  - MARSEC level
  - IMO number
  - vessel manifest number
  - security restricted area
  - cargo manifest number
  - classified
  - restricted
  - confidential
  proximity: 300
test_cases:
  should_match:
  - value: 'Port Facility Security Manifest ref PFSM-2026-0451: vessel MV Southern Star, IMO 9876543, MARSEC Level 2, Security Restricted Area access list attached, crew manifest confidential.'
  - value: ISPS Code compliance record - Port Facility Security Plan for Port of Brisbane, IMO 1234567, classified restricted.
  - value: Vessel manifest number VM-2026-3487 lists all containers aboard MV Pacific Trader arriving at the security restricted area berth.
  should_not_match:
  - value: The harbour master approved the berth allocation schedule for tomorrow's cargo manifest.
  - value: Maritime route planning guide covers general navigation and port authority operations.
  - value: Our compliance training module discusses port facility security concepts and maritime security awareness generally.
  - value: The vessel manifest tracking software helps shippers coordinate cargo logistics across multiple ports.
  - value: The seminar reviewed how every port facility security plan must be updated annually according to national guidelines.
  - value: placeholder value 12345
false_positives:
- description: Common words and phrases related to port facility security manifests appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
- description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_port_security
    matches:
    - ref: Evidence_port_security
      min_count: 2
      unique_results: true
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 75
    id_match: Pattern_port_security
    matches:
    - ref: Evidence_port_security
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    id_match: Pattern_port_security
    matches:
    - ref: Evidence_port_security
  regexes:
  - id: Pattern_port_security
    pattern: >-
      (?is)\b(?:port\s+facility\s+security\s+manifests?|port\s+facility\s+security\s+plan(?=[^.]{0,80}\b(?:IMO\s*\d{7}|classified|restricted|confidential|(?:reference|ref|no\.?)\s*[:#]?\s*[A-Z0-9-]*\d[A-Z0-9-]*)\b)|ISPS\s+code\s+(?:compliance|certificate|audit)\s+(?:record|no\.?|number|ref(?:erence)?)|MARSEC\s+level\s*[1-3]|IMO\s*(?:no\.?|number)?\s*\d{7}|vessel\s+manifest\s+(?:no\.?|number)?\s*[A-Z]{0,4}-?\d{3,8}|security\s+restricted\s+area)\b
  keywords:
  - id: Evidence_port_security
    groups:
    - match_style: word
      terms:
      - port facility security manifest
      - port facility security plan
      - ISPS code compliance
      - MARSEC level
      - IMO number
      - vessel manifest number
      - security restricted area
      - cargo manifest number
      - classified
      - restricted
      - confidential
