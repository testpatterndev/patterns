schema: testpattern/v1
name: Port facility security manifests
slug: au-top500-452-port-facility-security-manifests
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to port facility security manifests in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:port\s+facility\s+security\s+manifests|port\s+facility|security\s+manifest|maritime\s+security|ISPS\s+code|vessel\s+manifest|cargo\s+manifest|berth\s+allocation|harbour\s+master|port\s+authority|restricted\s+zone|critical\s+infrastructure)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - port facility security manifests
    - port
    - facility
    - security
    - manifests
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: port facility security manifests
      description: Primary topic phrase match
    - value: port facility
      description: Case-insensitive topic phrase match
    - value: security manifest
      description: Alternative topic phrase match
    - value: maritime security
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: maritime route
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to port facility security manifests appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_port_security
      matches:
        - ref: Evidence_port_security
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_port_security
      matches:
        - ref: Evidence_port_security
    - confidence_level: 65
      id_match: Pattern_port_security
      matches:
        - ref: Evidence_port_security
  regexes:
    - id: Pattern_port_security
      pattern: (?is)\b(?:port\s+facility\s+security\s+manifests|port\s+facility|security\s+manifest|maritime\s+security|ISPS\s+code|vessel\s+manifest|cargo\s+manifest|berth\s+allocation|harbour\s+master|port\s+authority|restricted\s+zone|critical\s+infrastructure)\b
  keywords:
    - id: Evidence_port_security
      groups:
        - match_style: word
          terms:
            - port facility security manifests
            - port facility
            - security manifest
            - maritime security
            - ISPS code
            - vessel manifest
            - cargo manifest
            - berth allocation
            - harbour master
            - port authority
            - restricted zone
            - critical infrastructure
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
