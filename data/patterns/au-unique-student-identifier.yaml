schema: testpattern/v1
name: Unique Student Identifier
slug: au-unique-student-identifier
version: 1.6.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Unique Student Identifier (USI) patterns. A 10-character alphanumeric code (uppercase
  letters and digits) mandatory since January 2023 for higher education in Australia. The
  Purview design inventories the broad bare shape at 65, enforces a labelled value in education
  context at 75, and reserves 85 for labelled values with authoritative USI/VET record context.
operation: >-
  Regex pattern using universal engine. The top-level regex \b[A-Z0-9]{10}\b matches exactly 10
  uppercase alphanumeric characters. The Purview engine uses two regexes: Pattern_usi_labeled
  (labeled format with USI/Unique Student Identifier/student identifier prefix + 10
  alphanumeric chars) and Pattern_au_usi (bare 10-char format). The 65 tier is discovery-only;
  75 requires the embedded USI label plus education context; 85 additionally requires USI
  Registry, Student Identifiers Act, RTO, AVETMISS, or equivalent authoritative record context.
  Template/sample text and repeated/sentinel digit values are excluded.
pattern: \b[A-Z0-9]{10}\b
confidence: low
confidence_justification: >-
  Low confidence: a 10-character uppercase alphanumeric pattern is extremely broad and will match tracking numbers, serial codes, product IDs, and many other identifiers. Corroborative evidence
  keywords such as USI, student identifier, or TAFE are essential for reliable detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - USI
    - unique student identifier
    - student identifier
  proximity: 500
  keyword_lists:
    - au-identity-usi
    - industry-education
test_cases:
  should_match:
    - value: ABC1234567
      description: Exact 65 discovery probe - bare 10-character shape without a USI label
    - value: 2K48TF3GHP
      description: Bare standard-format candidate remains discovery-only without a USI label
    - value: A1B2C3D4E5
      description: Bare alternating-format candidate remains discovery-only without a USI label
    - value: 'Student USI: 2K48TF3GHP; TAFE enrolment for Certificate IV.'
      description: Exact 75 probe - labelled value with education context but no registry/legislative record evidence
    - value: 'USI Registry AVETMISS record for RTO 30123 - Student USI: 2K48TF3GHP; TAFE enrolment confirmed.'
      description: Exact 85 probe - labelled value with education and authoritative registry/VET evidence
  should_not_match:
    - value: ABC12345
      description: Only 8 characters instead of 10
    - value: ABC12345678
      description: 11 characters instead of 10
    - value: ABC-123456
      description: Hyphen breaks the 10-character contiguous alphanumeric run
    - value: '0412 345 678'
      description: Australian mobile phone number (spaced) is not a 10-char contiguous USI; AU packages also gate phone-shaped literals via the regional exclusion
    - value: '0000-000000'
      description: Placeholder sentinel value (separated) is not a 10-char contiguous USI and is also excluded by the sentinel filter
    - value: The TAFE campus opened a new short course hub.
      description: Education context alone contains no labelled or bare 10-character identifier
    - value: 'Sample template: USI Registry AVETMISS record for RTO 30123 - Student USI: 2K48TF3GHP.'
      description: Template text contains high-tier evidence but is vetoed by the shared exclusion
    - value: 'Public guidance at usi.gov.au explains how students create a USI.'
      description: Public guidance has no 10-character value
    - value: 'Product serial ABC1234567 appears on the public catalogue.'
      description: Sibling serial shape remains discovery-only because it has no embedded USI label
false_positives:
  - description: Common words and phrases related to unique student identifier appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
  - description: Australian mobile and fixed-line telephone numbers can satisfy the broad 10-character alphanumeric USI anchor.
    mitigation: Use the AU regional phone-number NONE-of gate for Australian packages and keep USI/education context mandatory for deployed policies.
regional_tuning:
  - jurisdiction: au
    signal: au-mobile-number-overmatch-numeric-id-20260525
    action: exclude-regex
    id: Regex_au_mobile_number_exclusion
    pattern: (?:^|[^0-9])(?:04[0-9]{8}|(?:\+?61[\s.-]?4(?:[\s.-]?[0-9]){8}))(?:$|[^0-9])
    defaultDecision: modify
    risk: regional-phone-number-overmatch
    reason: Aggregate Australian tenant analysis found AU mobile-shaped literals overmatching broad 10-character identifier patterns.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 6
risk_description: >-
  This identifier detector matches a ten-character uppercase alphanumeric value and raises confidence when USI labels and education terms appear within the configured window. A genuine Unique Student Identifier persistently links one learner across Australian training providers, so disclosure can support record correlation, targeted impersonation, or unauthorised education enquiries. The broad bare format can collide with product codes and telephone-shaped strings, and the pattern's overall confidence is low, limiting certainty from an isolated token. Risk 6 and SENSITIVE Government fit a contextualised persistent learner identifier; PROTECTED requires linked identity evidence, bulk learner records, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 500
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_usi_labeled
      matches:
        - ref: Evidence_education_context
        - ref: Evidence_usi_authority_context
      excludes:
        - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_usi_labeled
      matches:
        - ref: Evidence_education_context
      excludes:
        - ref: Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_au_usi
      excludes:
        - ref: Evidence_template_exclusion
  regexes:
    - id: Pattern_au_usi
      pattern: \b[A-Z0-9]{10}\b
    - id: Pattern_usi_labeled
      pattern: (?i)\b(?:USI|Unique\s+Student\s+Identifier|student\s+(?:identifier|ID))\s*[:#-]?\s*[A-Z0-9]{10}\b
  keywords:
    - id: Evidence_usi_terms
      groups:
        - match_style: word
          terms:
            - text: USI
              case_sensitive: true
            - unique student identifier
            - student identifier
            - text: VET
              case_sensitive: true
            - vocational education
            - TAFE
            - training
      strength: noise
    - id: Evidence_education_context
      groups:
        - match_style: word
          terms:
            - student
            - university
            - college
            - TAFE
            - enrolment
            - enrollment
            - education
            - training
            - course
            - qualification
            - text: RTO
              case_sensitive: true
            - registered training organisation
            - AVETMISS
      strength: noise
    - id: Evidence_usi_authority_context
      groups:
        - match_style: word
          terms:
            - USI Registry
            - usi.gov.au
            - Student Identifiers Act
            - AVETMISS
            - registered training organisation
            - RTO number
            - Commonwealth Student Identifiers Registrar
      strength: domain
  filters:
    - id: Guard_usi_same_digits
      type: AllDigitsSameFilter
    - id: Guard_usi_exclude_test
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms:
        - "0000000000"
        - "1111111111"
        - "1234567890"
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 1.6.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: make the broad 10-character shape a 65 discovery tier, require a labelled USI plus education context at 75, and require authoritative registry/VET context at 85; add exact-tier and sibling/public/template probes while preserving value guards.'
  - version: 1.5.2
    date: '2026-07-17'
    description: >-
      Metadata-only reduced-scope fix (TP-00614): the operation prose described three 85/75/65
      tiers but the record contains one 65 discovery_only tier — rewrite operation/description
      to state the export is inventory/discovery only, note that Guard_usi_same_digits and
      Guard_usi_exclude_test are defined but unreferenced and must be wired into any future
      enforcing tier, annotate the bare authored positives as regex-unit tests (they need
      surrounding USI/education evidence to reach the discovery tier), and add a labelled
      education-context positive plus an education-prose negative. Detector unchanged; no
      enforcement added — enforcing a broad 10-character format awaits tenant evidence.
  - version: 1.5.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1089 without changing detector or package metadata.'
  - version: 1.5.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.4.0
    date: '2026-07-04'
    description: Widen patterns_proximity 300->500 so keyword evidence still gates at the challenging-layout distance (ph<50 cohort)
  - version: 1.3.0
    date: '2026-07-04'
    description: Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
