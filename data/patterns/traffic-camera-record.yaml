schema: testpattern/v1
name: Traffic Camera Record
slug: traffic-camera-record
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects traffic camera and speed camera infringement records containing driver identification details, vehicle registration, and photographic evidence references. These records link specific individuals to traffic offences via camera evidence under the Transport Operations (Road Use Management) Act 1995 (Qld).
operation: 'Keyword proximity: primary keywords (traffic camera, speed camera, red light camera, infringement notice, registered operator, vehicle registration, penalty infringement) within 300 characters of infringement reference numbers and driver identification. Negative keyword exclusion for road safety campaigns and published camera location lists.'
pattern: (?i)\b(traffic\s+camera\s+(?:record|image|evidence)|speed\s+camera\s+(?:detection|infringement)|red\s+light\s+camera\s+(?:detection|infringement)|infringement\s+notice|registered\s+operator|penalty\s+infringement\s+notice)\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of camera infringement terminology with specific driver identification details and infringement reference numbers. Published camera location lists and road safety campaigns do not contain individual driver data.'
jurisdictions:
  - au
regulations:
- "SPER Act 1999 (Qld)"
- "TORUM Act 1995 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - SENSITIVE
    - Legal
    - traffic camera
    - speed camera
    - red light camera
    - infringement notice
    - registered operator
    - vehicle registration
    - penalty infringement
    - TMR
    - Department of Transport
    - SPER
    - camera evidence
    - demerit points
  proximity: 300
  keyword_lists:

    - law-enforcement

    - government-services
test_cases:
  should_match:
    - value: 'SENSITIVE Legal. Traffic Camera Infringement Record. Infringement Notice Number: TIN-2026-BNE-084291. Camera Site: Pacific Motorway southbound, Eight Mile Plains (Site ID: SC-4127). Detection: Speed camera — 118 km/h in 100 km/h zone. Date/Time: 14 February 2026, 08:42:17. Vehicle: White Toyota Hilux, registration 123ABC (QLD). Registered Operator: [Name], [Address], Upper Mount Gravatt QLD 4122. Penalty: $287 fine, 1 demerit point. Image reference: CAM-4127-20260214-084217.jpg.'
      description: Speed camera infringement with registered operator details and camera evidence
    - value: 'Department of Transport and Main Roads — Penalty Infringement Notice. Reference: PIN-2026-0057823. Red light camera detection at intersection of Ipswich Road and Annerley Road, Woolloongabba. Camera Site ID: RLC-2089. Vehicle: registration 456DEF (QLD), silver Mazda 3. Registered operator: [Name], [Address], Coorparoo QLD 4151. Offence: Fail to stop at red traffic light — Transport Operations (Road Use Management) Act 1995 s.79. Demerit points: 3. Fine: $575. Statutory declaration option available.'
      description: Red light camera infringement with driver identification and statutory reference
    - value: 'SPER Enforcement — Outstanding Traffic Camera Infringement. Original Notice: TIN-2025-TSV-041872. Registered operator [Name] of [Address], Aitkenvale QLD 4814. Speed camera detection: 134 km/h in 110 km/h zone, Bruce Highway northbound at Bowen (Site ID: SC-7341). Original fine: $287 plus 1 demerit point. SPER enforcement order issued: additional $113.15 enforcement fee. Total amount due: $400.15. Payment required within 28 days or enforcement warrant may issue.'
      description: SPER enforcement of outstanding camera infringement with escalated penalties
  should_not_match:
    - value: The Queensland Government published its updated list of fixed speed camera and red light camera locations across the state. The 2026 list includes 142 fixed camera sites and 87 mobile camera deployment zones.
      description: Published camera location list from government
    - value: 'Road Safety Week 2026: The Department of Transport and Main Roads reminded drivers that speed cameras save lives. Last year, camera-detected offences decreased by 8.2% across Queensland, with 1.2 million infringement notices issued.'
      description: Road safety campaign with aggregate infringement statistics
    - value: A motoring magazine reviewed the latest speed camera detection technology, noting that Queensland has deployed point-to-point cameras on sections of the Bruce Highway.
      description: Motoring magazine article about camera technology
false_positives:
  - description: Published speed camera and red light camera location lists
    mitigation: 'Negative keyword exclusion: ''camera locations'', ''location list'', ''site list'', ''published list'''
  - description: Road safety campaigns with aggregate infringement statistics
    mitigation: 'Negative keyword exclusion: ''road safety'', ''campaign'', ''save lives'', ''decreased by'''
  - description: Motoring magazine articles about camera technology
    mitigation: 'Negative keyword exclusion: ''magazine'', ''review'', ''technology'', ''deployed'''
  - description: TMR annual reports with traffic enforcement statistics
    mitigation: 'Negative keyword exclusion: ''annual report'', ''statistics'', ''published'', ''reporting period'''
exports:
  - purview_xml
  - yaml
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_traffic_camera_record_infringement_notice_ref
      matches:
        - ref: Evidence_traffic_camera_record_primary_keywords
        - ref: Evidence_traffic_camera_record_classification_markers
        - ref: Evidence_traffic_camera_record_corroborative_terms
        - ref: Pattern_traffic_camera_record_penalty_infringement_ref
        - ref: Pattern_traffic_camera_record_camera_site_id
        - ref: Pattern_traffic_camera_record_camera_infringement_terms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_traffic_camera_record_exclusion
    - confidence_level: 75
      id_match: Pattern_traffic_camera_record_infringement_notice_ref
      matches:
        - ref: Evidence_traffic_camera_record_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_traffic_camera_record_exclusion
    - confidence_level: 65
      id_match: Pattern_traffic_camera_record_infringement_notice_ref
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_traffic_camera_record_exclusion
  regexes:
    - id: Pattern_traffic_camera_record_infringement_notice_ref
      pattern: \bTIN-\d{4}-[A-Z]{2,4}-\d{4,6}\b
    - id: Pattern_traffic_camera_record_penalty_infringement_ref
      pattern: \bPIN-\d{4}-\d{5,7}\b
    - id: Pattern_traffic_camera_record_camera_site_id
      pattern: \b(?:SC|RLC)-\d{3,5}\b
    - id: Pattern_traffic_camera_record_camera_infringement_terms
      pattern: (?i)\b(traffic\s+camera\s+(?:record|image|infringement)|speed\s+camera\s+(?:detection|infringement)|red\s+light\s+camera\s+(?:detection|infringement)|penalty\s+infringement\s+notice)\b
  keywords:
    - id: Evidence_traffic_camera_record_primary_keywords
      groups:
        - match_style: word
          terms:
            - traffic camera record
            - traffic camera infringement
            - speed camera detection
            - speed camera infringement
            - red light camera detection
            - red light camera infringement
            - infringement notice
            - penalty infringement notice
            - registered operator
            - camera evidence
    - id: Evidence_traffic_camera_record_classification_markers
      groups:
        - match_style: word
          terms:
            - SENSITIVE
            - Legal
            - OFFICIAL
            - Department of Transport
            - TMR
            - SPER
    - id: Evidence_traffic_camera_record_corroborative_terms
      groups:
        - match_style: word
          terms:
            - vehicle registration
            - demerit points
            - camera site
            - image reference
            - statutory declaration
            - enforcement order
            - enforcement fee
            - enforcement warrant
            - registered operator
            - km/h
            - fine
            - penalty
    - id: Filter_traffic_camera_record_exclusion
      groups:
        - match_style: word
          terms:
            - camera locations
            - location list
            - site list
            - published list
            - road safety
            - campaign
            - save lives
            - decreased by
            - magazine
            - review
            - technology
            - deployed
            - annual report
            - statistics
            - published

risk_rating: 7
risk_description: Traffic camera records link specific individuals to traffic offences via photographic evidence. They contain registered operator names, addresses, vehicle details, and offence locations. Disclosure reveals personal infringement history but does not pose life-safety risks. Inappropriate release could compromise proceedings, endanger individuals, or undermine enforcement activities.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-03-06'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
