schema: testpattern/v1
name: France Health Insurance Number
slug: fr-health-insurance
version: 1.2.1
type: regex
engine: universal
description: >-
  Detects France Health Insurance Number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Due to the generic numeric format, corroborative evidence keywords
  are essential for reliable detection.
operation: 'Corroborative evidence: 5 keywords within 300 characters. Keyword lists: fr-health. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: \b[12]\s?\d{2}\s?\d{2}\s?\d{2}\s?\d{3}\s?\d{3}\s?\d{2}\b
confidence: high
confidence_justification: >-
  High confidence: the French health insurance number has a distinctive format starting with 1 or 2 followed by 13 digits with a specific structure encoding gender, birth year, month, and department.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - fr
  - eu
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
  - pii
corroborative_evidence:
  keywords:
    - sécurité sociale
    - numéro de sécu
    - carte vitale
    - assurance maladie
    - NIR
  proximity: 300
  keyword_lists:
    - fr-health
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 1 85 05 78 006 084 36
      description: Standard spaced French social security number format
    - value: 2 93 11 75 123 456 78
      description: Female social security number with spaces
    - value: '185057800608436'
      description: Continuous digits without spaces
  should_not_match:
    - value: 3 85 05 78 006 084 36
      description: Starts with 3, invalid gender digit
    - value: 1 85 05 78 006 08
      description: Too few digits for social security number
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic numeric sequences matching the digit pattern in non-health contexts
    mitigation: Require corroborative evidence keywords within the proximity window to distinguish health identifiers from general numeric data.
  - description: Reference numbers or account identifiers from other domains with similar digit counts
    mitigation: Layer with document classification to prioritise matches in health and medical documents.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_fr_health_insurance
      matches:
        - ref: Pattern_fr_health_insurance_label_context
        - ref: Keyword_fr_health_insurance_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_fr_health_insurance
      matches:
        - ref: Keyword_fr_health_insurance
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_fr_health_insurance
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_fr_health_insurance
      pattern: \b[12]\s?\d{2}\s?\d{2}\s?\d{2}\s?\d{3}\s?\d{3}\s?\d{2}\b
    - id: Pattern_fr_health_insurance_label_context
      pattern: (?i)\b(?:france\s+health\s+insurance\s+number|france|health|insurance)\b
  keywords:
    - id: Keyword_fr_health_insurance
      groups:
        - match_style: word
          terms:
            - sécurité sociale
            - numéro de sécu
            - carte vitale
            - assurance maladie
            - text: NIR
              case_sensitive: true
            - numéro de sécurité sociale
            - numéro SS
            - immatriculation
            - CPAM
            - caisse primaire
            - régime général
            - affilié
      strength: specific
    - id: Keyword_fr_health_insurance_domain_context
      groups:
        - match_style: word
          terms:
            - france health insurance number
            - france
            - health
            - insurance
      strength: domain
risk_rating: 8
risk_description: >-
  Health and medical information is among the most sensitive personal data under privacy laws globally. Unauthorized disclosure can result in discrimination, personal harm, and regulatory penalties
  under health privacy frameworks.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-france-health-insurance-number
    title: France Health Insurance Number entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
