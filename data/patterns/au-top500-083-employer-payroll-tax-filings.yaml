schema: testpattern/v1
name: Employer payroll tax filings
slug: au-top500-083-employer-payroll-tax-filings
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to employer payroll tax filings in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: industry-hr.'
pattern: (?is)\b(?:employer\s+payroll\s+tax\s+filings|payroll\s+tax|tax\s+filing|PAYG\s+summary|single\s+touch\s+payroll|business\s+activity\s+statement|tax\s+return|ATO\s+lodgement|employer\s+obligations|payroll\s+tax\s+rate)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - employer payroll tax filings
    - employer
    - payroll
    - tax
    - filings
    - operations
  proximity: 300
  keyword_lists:

    - industry-hr

    - data-record-context
test_cases:
  should_match:
    - value: employer payroll tax filings
      description: Primary topic phrase match
    - value: payroll tax
      description: Case-insensitive topic phrase match
    - value: tax filing
      description: Alternative topic phrase match
    - value: PAYG summary
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_employer_payroll_tax_filings
      matches:
        - ref: Evidence_employer_payroll_tax_filings
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_employer_payroll_tax_filings
      matches:
        - ref: Evidence_employer_payroll_tax_filings
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_employer_payroll_tax_filings
      matches:
        - ref: Evidence_employer_payroll_tax_filings
  regexes:
    - id: Pattern_employer_payroll_tax_filings
      pattern: (?is)\b(?:employer\s+payroll\s+tax\s+filings|payroll\s+tax|tax\s+filing|PAYG\s+summary|single\s+touch\s+payroll|business\s+activity\s+statement|tax\s+return|ATO\s+lodgement|employer\s+obligations|payroll\s+tax\s+rate)\b
  keywords:
    - id: Evidence_employer_payroll_tax_filings
      groups:
        - match_style: word
          terms:
            - employer payroll tax filings
            - payroll tax
            - tax filing
            - PAYG summary
            - single touch payroll
            - STP
            - business activity statement
            - BAS
            - tax return
            - ATO lodgement
            - employer obligations
            - payroll tax rate
    - id: Evidence_data_record_context
      groups:
        - match_style: word
          terms:
            - field
            - column
            - row
            - entry
            - record
            - value
            - form
            - register
            - database
            - extract
            - export
            - spreadsheet
            - table
            - schedule
            - appendix
            - attachment
            - registry
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
