schema: testpattern/v1
name: Cohere API Key
slug: global-cohere-api-key
version: 1.1.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Cohere API keys. Cohere issues an opaque 40-character alphanumeric token with no
  distinctive vendor prefix, so this pattern requires an adjacent Cohere label (cohere /
  CO_API_KEY / COHERE_API_KEY) to structurally qualify a match.
operation: >-
  A Cohere label (cohere / CO_API_KEY / COHERE_API_KEY) followed within a short gap by a
  40-character alphanumeric value. Corroborative evidence: keywords within 300 characters.
pattern: (?i)(?:cohere|co_api_key|cohere_api_key)[\s\S]{0,40}?[=:][\s"']{0,4}(?<![a-z0-9_-])[a-z0-9]{40}(?![a-z0-9_-])
confidence: medium
confidence_justification: >-
  Medium confidence: Cohere's own documentation does not publish the token's visible format;
  GitGuardian's detector spec and the community-maintained gitleaks ruleset both confirm the key
  is an unprefixed, opaque 40-character alphanumeric string. Without an adjacent Cohere label the
  value is indistinguishable from any other 40-character alphanumeric string (a hash, an ID, or
  unrelated token), so this pattern requires the label and offers no unlabelled/value-only tier.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - cohere
    - cohere.ai
    - CO_API_KEY
    - COHERE_API_KEY
    - command r
    - rerank
    - api key
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 'CO_API_KEY=ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ABCD'
      description: Cohere key in the canonical CO_API_KEY env var (label + 40-char body)
    - value: 'cohere_api_key: zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIhHgG'
      description: Cohere key labelled with the cohere_api_key alias
    - value: 'COHERE_API_KEY=ZYXWVUTSRQPONMLKJIHGFEDCBAzyxwvutsrq9876'
      description: Cohere key in the COHERE_API_KEY env var alias with = separator (zero-entropy 40-char body)
  should_not_match:
    - value: 'Random 40-char token: ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij0123 with no vendor context'
      description: Bare 40-char alphanumeric value with no Cohere label anywhere (could be any hash or ID)
    - value: 'cohere api key too short: ABCDEFGHIJ0123456789'
      description: Cohere label present but value far too short (20 chars, not 40)
    - value: please rotate the cohere api key before shipping
      description: Prose mention without a token value
    - value: Using cohere with key ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij0123
      description: Free-standing 40-char alphanumeric in prose after a "cohere" label but no assignment separator (boundary regression case from review)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: A 40-character hash, GUID, or unrelated token that happens to appear near the word "cohere" in documentation.
    mitigation: Require the assignment-style label adjacency (already enforced by the regex) plus corroborative keywords; exclude placeholder markers.
  - description: Documentation or examples showing placeholder CO_API_KEY values.
    mitigation: Check for placeholder markers (example, xxxx, 0000) and documentation file types to reduce false positives.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  A leaked Cohere API key enables unauthorized, billed access to Cohere's language, embedding,
  and rerank models and can expose any prompts, documents, or data routed through the API.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_cohere_api_key
      matches:
        - ref: Keyword_cohere_api_key
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_cohere_api_key
      pattern: (?i)(?:cohere|co_api_key|cohere_api_key)[\s\S]{0,40}?[=:][\s"']{0,4}(?<![a-z0-9_-])[a-z0-9]{40}(?![a-z0-9_-])
  keywords:
    - id: Keyword_cohere_api_key
      groups:
        - match_style: word
          terms:
            - cohere
            - cohere.ai
            - CO_API_KEY
            - COHERE_API_KEY
            - command r
            - rerank
            - embed-english
            - api key
      strength: specific
