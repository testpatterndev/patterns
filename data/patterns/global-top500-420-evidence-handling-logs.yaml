schema: testpattern/v1
name: Evidence handling logs
slug: global-top500-420-evidence-handling-logs
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to evidence handling logs in international contexts. This information
  type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 1 keywords within 240 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:evidence\s+handling|chain\s+of\s+custody|evidence\s+log|evidence\s+room|evidence\s+tag|evidence\s+locker|property\s+room|evidence\s+custodian|evidence\s+intake|evidence\s+storage|evidence\s+disposition|forensic\s+evidence)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
- AML/CTF Act (Cth)
- IPA 2009 (Qld)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
data_categories:
- pii
corroborative_evidence:
  keywords:
  - evidence handling logs
  proximity: 240
test_cases:
  should_match:
  - value: evidence handling
    description: Primary topic phrase match
  - value: chain of custody
    description: Case-insensitive topic phrase match
  - value: evidence log
    description: Alternative topic phrase match
  - value: evidence room
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: mugshot victim
    description: Generic word pair from old broad template should not match
false_positives:
- description: Common words and phrases related to evidence handling logs appearing in policy documents, training materials,
    HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_evidence_handling
    matches:
    - ref: Pattern_global_top500_420_evidence_handling_logs_label_context
    - ref: Keyword_global_top500_420_evidence_handling_logs_domain_context
    - ref: Keyword_evidence_handling
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_evidence_handling
    matches:
    - ref: Pattern_global_top500_420_evidence_handling_logs_label_context
    - ref: Keyword_global_top500_420_evidence_handling_logs_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_evidence_handling
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_evidence_handling
    pattern: (?is)\b(?:evidence\s+handling|chain\s+of\s+custody|evidence\s+log|evidence\s+room|evidence\s+tag|evidence\s+locker|property\s+room|evidence\s+custodian|evidence\s+intake|evidence\s+storage|evidence\s+disposition|forensic\s+evidence)\b
  - id: Pattern_global_top500_420_evidence_handling_logs_label_context
    pattern: (?i)\b(?:evidence\s+handling\s+logs)\b
  keywords:
  - id: Keyword_evidence_handling
    groups:
    - match_style: word
      terms:
      - evidence handling
      - chain of custody
      - evidence log
      - evidence room
      - evidence tag
      - evidence locker
      - property room
      - evidence custodian
      - evidence intake
      - evidence storage
      - evidence disposition
      - forensic evidence
    strength: specific
  - id: Keyword_global_top500_420_evidence_handling_logs_domain_context
    groups:
    - match_style: word
      terms:
      - evidence handling logs
      - evidence
      - handling
      - logs
    strength: domain
risk_description: The detector identifies chain-of-custody records, evidence logs, evidence-room references, and evidence-handling
  material. A genuine log links exhibits to handlers, storage locations, transfers, and timestamps, so disclosure or alteration
  could expose evidence locations, facilitate tampering, or undermine admissibility in a specific proceeding. The likely harm
  is serious for the investigation and parties but generally limited to the logged exhibits and remediable through corroborating
  controls and audit trails. Risk 8 remains SENSITIVE Law-Enforcement; PROTECTED would require high-consequence covert evidence,
  facility-security compromise, or systemic corruption of custody records.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Law-Enforcement
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
