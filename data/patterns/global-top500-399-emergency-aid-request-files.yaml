schema: testpattern/v1
name: Emergency aid request files
slug: global-top500-399-emergency-aid-request-files
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies individual emergency-aid, disaster-assistance, disaster-relief, and humanitarian-assistance
  requests and applications. Topic phrases are retained for discovery; enforcement requires applicant,
  address, event, need, household, displacement, damage, requested-assistance, evidence, or contact
  fields, and high confidence also requires a formal case/application reference or recorded decision.
operation: >-
  Regex_emergency_aid recognises individual emergency and disaster aid requests. The topic alone is
  discovery-only at 65. Substantive applicant and impact fields raise it to 75; a formal case/application
  reference or decision reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:emergency\s+(?:aid|assistance)\s+(?:request|application|case)|disaster\s+(?:assistance\s+application|relief\s+request)|humanitarian\s+assistance\s+request)s?\b
confidence: medium
confidence_justification: Medium confidence requires substantive applicant and impact fields. High confidence adds a formal reference or recorded decision.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - emergency aid request files
  proximity: 240
test_cases:
  should_match:
    - value: emergency aid request
      description: Low-tier probe - aid-request topic without applicant fields
    - value: 'Emergency aid request: applicant name, affected address, disaster event, immediate need, household members, displacement status, damage assessment, assistance requested, supporting evidence, and contact details'
      description: Medium-tier probe - substantive request without formal reference or decision
    - value: 'Emergency aid request, application reference: AID-2026-104: applicant name, affected address, disaster event, immediate need, household members, displacement status, damage assessment, assistance requested, supporting evidence, and decision approved'
      description: High-tier probe - substantive request with formal reference and decision
  should_not_match:
    - value: The public appeal raises funds for disaster relief.
      description: General relief campaign without an individual request
    - value: The emergency plan lists shelter locations and contact details.
      description: Emergency planning document outside an aid application
    - value: 'Training example: emergency aid request AID-2026-104 with affected address, damage assessment, assistance requested, and decision approved'
      description: Explicit training content must not enforce
false_positives:
  - description: Relief appeals, disaster plans, and public guidance discuss affected addresses, needs, damage, assistance, and contacts without containing an individual request.
    mitigation: Require an emergency, disaster, or humanitarian aid request or application before considering applicant and impact fields.
  - description: Training requests can contain realistic references, addresses, impact assessments, evidence, and decisions.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_emergency_aid
      matches:
        - ref: Evidence_emergency_aid_request
        - ref: Evidence_emergency_aid_formal_decision
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_emergency_aid
      matches:
        - ref: Evidence_emergency_aid_request
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_emergency_aid
  regexes:
    - id: Regex_emergency_aid
      pattern: >-
        (?is)\b(?:emergency\s+(?:aid|assistance)\s+(?:request|application|case)|disaster\s+(?:assistance\s+application|relief\s+request)|humanitarian\s+assistance\s+request)s?\b
    - id: Evidence_emergency_aid_formal_decision
      pattern: >-
        (?i)\b(?:(?:application|case|request)\s+(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|decision\s*[:=-]?\s*(?:approved|declined|denied|pending|urgent))\b
  keywords:
    - id: Evidence_emergency_aid_request
      groups:
        - match_style: word
          terms:
            - applicant name
            - affected address
            - disaster event
            - immediate need
            - household members
            - displacement status
            - damage assessment
            - assistance requested
            - supporting evidence
            - contact details
      strength: domain
risk_description: >-
  This pattern identifies disaster-relief, humanitarian-assistance, emergency-aid, and aid-request files with nearby service context. A real request can disclose displacement, home damage, medical or financial hardship, location, dependants, and contact details, creating opportunities for fraud, exploitation, or unwanted exposure during a crisis. The harm is material for a vulnerable applicant but normally bounded to one household or assistance case. Risk 8 and SENSITIVE Personal-Privacy are appropriate; PROTECTED would require protected shelter locations, an active life-safety threat, or a compromised register covering many disaster victims.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
