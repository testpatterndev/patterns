schema: testpattern/v1
name: Immigration file number
slug: au-top500-031-immigration-file-number
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to immigration file number in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:immigration\s+file\s+numbers?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - immigration file number
    - immigration
    - file
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - government-services
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Immigration file number'
      description: Topic phrase present
    - value: 'immigration file number'
      description: Topic phrase, lowercase
    - value: 'this record references the immigration file number held on file'
      description: Topic phrase within surrounding text
    - value: Migration file reference held by Home Affairs.
      description: Source-authored synonym phrase surfaces via the discovery-only synonym branch
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: Immigration policy file was archived.
      description: Policy file is not a case/file reference — adjacent-word requirement keeps it excluded
    - value: Visa conditions changed this year.
      description: Immigration topic alone is insufficient
false_positives:
  - description: Common words and phrases related to immigration file number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_immigration_file
      matches:
        - ref: Evidence_immigration_file
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_immigration_file
      matches:
        - ref: Evidence_immigration_file
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_immigration_file
      matches:
        - ref: Evidence_immigration_file
    - confidence_level: 65
      id_match: Pattern_immigration_file_synonyms
      discovery_only: true
      description: Bounded case/reference synonym phrases (immigration/migration file, immigration reference, IMMI reference) — discovery inventory only; any adjacent code is not validated
  regexes:
    - id: Pattern_immigration_file
      pattern: (?i)\b(?:immigration\s+file\s+numbers?)\b
    - id: Pattern_immigration_file_synonyms
      pattern: (?i)\b(?:immigration\s+file|migration\s+file|immigration\s+reference|IMMI\s+reference)\b
    - id: Pattern_au_top500_031_immigration_file_number_label_context
      pattern: (?i)\b(?:immigration\s+file\s+number)\b
  keywords:
    - id: Evidence_immigration_file
      groups:
        - match_style: word
          terms:
            - immigration file number
            - immigration file
            - file number
            - immigration reference
            - Department of Home Affairs
            - visa application
            - migration agent
            - immigration status
            - border control
            - visa holder
            - migration file
            - IMMI
    - id: Keyword_au_top500_031_immigration_file_number_domain_context
      groups:
        - match_style: word
          terms:
            - immigration file number
            - immigration
            - file
risk_description: >-
  The Immigration file number concept pattern matches the literal field phrase and related immigration-file wording rather than validating a government-issued case number. It can flag documents associated with migration administration, where nearby status, identity, or case material may be consequential, but the phrase alone identifies no applicant and opens no record. Forms, checklists, and process documentation are ordinary benign sources of the same text. Risk 5 and OFFICIAL retain a useful administrative-context signal while reserving SENSITIVE for a populated person-linked immigration file.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
