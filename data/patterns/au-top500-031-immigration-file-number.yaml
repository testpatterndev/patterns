updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: 'TP-00160 approved reduced scope: add Pattern_immigration_file_synonyms — bounded case/reference phrase synonyms already authored in the evidence dictionary (immigration file, migration file, immigration reference, IMMI reference) — wired to a new discovery-only 65 tier; no value syntax is added and any adjacent code is not validated. The exact-phrase primary and its 75/85 tiers with template exclusion are unchanged. Per QA, adjacency is required so immigration policy file stays excluded (immigration and file are not matched as independent loose tokens). Labelled-value/identifier detection deliberately rejected (no authoritative case-number format). Added the migration-file synonym positive plus policy-file and visa-topic negatives.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 635 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
