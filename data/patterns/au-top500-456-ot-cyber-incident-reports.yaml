schema: testpattern/v1
name: OT cyber incident reports
slug: au-top500-456-ot-cyber-incident-reports
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to ot cyber incident reports in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: industry-critical-infrastructure. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:ot\s+cyber\s+incident\s+reports|OT\s+cyber\s+incident|ICS\s+incident|industrial\s+cyber|incident\s+report|threat\s+actor|indicators\s+of\s+compromise|critical\s+infrastructure|incident\s+response)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - ot cyber incident reports
    - cyber
    - incident
    - reports
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:

    - industry-critical-infrastructure
test_cases:
  should_match:
    - value: ot cyber incident reports
      description: Primary topic phrase match
    - value: ot cyber incident
      description: Case-insensitive topic phrase match
    - value: ICS incident
      description: Alternative topic phrase match
    - value: industrial cyber
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: ot cyber incident report
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to ot cyber incident reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_ot_cyber_incident
      matches:
        - ref: Evidence_ot_cyber_incident
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_456_ot_cyber_incident_reports_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_ot_cyber_incident
      matches:
        - ref: Evidence_ot_cyber_incident
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_456_ot_cyber_incident_reports_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_ot_cyber_incident
      matches:
        - ref: Evidence_ot_cyber_incident
  regexes:
    - id: Pattern_ot_cyber_incident
      pattern: (?is)\b(?:ot\s+cyber\s+incident\s+reports|OT\s+cyber\s+incident|ICS\s+incident|industrial\s+cyber|incident\s+report|threat\s+actor|indicators\s+of\s+compromise|critical\s+infrastructure|incident\s+response)\b
    - id: Pattern_au_top500_456_ot_cyber_incident_reports_label_context
      pattern: (?i)\\b(?:ot\\s+cyber\\s+incident\\s+reports|cyber|incident|reports|top500)\\b
  keywords:
    - id: Evidence_ot_cyber_incident
      groups:
        - match_style: word
          terms:
            - ot cyber incident reports
            - OT cyber incident
            - ICS incident
            - industrial cyber
            - SCADA
            - incident report
            - containment
            - remediation
            - threat actor
            - indicators of compromise
            - critical infrastructure
            - incident response
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_456_ot_cyber_incident_reports_domain_context
      groups:
        - match_style: word
          terms:
            - ot cyber incident reports
            - cyber
            - incident
            - reports
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_456_ot_cyber_incident_reports_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
