schema: testpattern/v1
name: Data subject access request files
slug: au-top500-471-data-subject-access-request-files
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to data subject access request files in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters.'
pattern: (?is)\b(?:data\s+subject\s+access\s+request\s+files|access\s+request|subject\s+access|APP\s+12|personal\s+information\s+request|identity\s+verification|response\s+deadline|data\s+subject)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - data subject access request files
    - data
    - subject
    - access
    - request
    - files
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: data subject access request files
      description: Primary topic phrase match
    - value: access request
      description: Case-insensitive topic phrase match
    - value: subject access
      description: Alternative topic phrase match
    - value: APP 12
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to data subject access request files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_dsar
      matches:
        - ref: Evidence_dsar
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_dsar
      matches:
        - ref: Evidence_dsar
    - confidence_level: 65
      id_match: Pattern_dsar
      matches:
        - ref: Evidence_dsar
  regexes:
    - id: Pattern_dsar
      pattern: (?is)\b(?:data\s+subject\s+access\s+request\s+files|access\s+request|subject\s+access|APP\s+12|personal\s+information\s+request|identity\s+verification|response\s+deadline|data\s+subject)\b
  keywords:
    - id: Evidence_dsar
      groups:
        - match_style: word
          terms:
            - data subject access request files
            - access request
            - DSAR
            - subject access
            - APP 12
            - personal information request
            - disclosure
            - identity verification
            - response deadline
            - privacy
            - compliance
            - data subject
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
