schema: testpattern/v1
name: Research participant consent files
slug: au-top500-355-research-participant-consent-files
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to research participant consent files in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:research\s+participant\s+consent\s+files|research\s+participant|consent\s+form|informed\s+consent|participant\s+information\s+sheet|ethics\s+approval|voluntary\s+participation|withdrawal\s+of\s+consent|research\s+ethics|human\s+subjects|clinical\s+trial\s+consent)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - research participant consent files
    - research
    - participant
    - consent
    - files
    - education
    - administration
  proximity: 300
  keyword_lists:
    - data-record-context
test_cases:
  should_match:
    - value: research participant consent files
      description: Primary topic phrase match
    - value: research participant
      description: Case-insensitive topic phrase match
    - value: consent form
      description: Alternative topic phrase match
    - value: informed consent
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to research participant consent files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_research_participant_consent
      matches:
        - ref: Evidence_research_participant_consent
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_research_participant_consent
      matches:
        - ref: Evidence_research_participant_consent
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_research_participant_consent
      matches:
        - ref: Evidence_research_participant_consent
  regexes:
    - id: Pattern_research_participant_consent
      pattern: >-
        (?is)\b(?:research\s+participant\s+consent\s+files|research\s+participant|consent\s+form|informed\s+consent|participant\s+information\s+sheet|ethics\s+approval|voluntary\s+participation|withdrawal\s+of\s+consent|research\s+ethics|human\s+subjects|clinical\s+trial\s+consent)\b
    - id: Pattern_au_top500_355_research_participant_consent_files_label_context
      pattern: (?i)\\b(?:research\\s+participant\\s+consent\\s+files|research|participant|consent|files|top500)\\b
  keywords:
    - id: Evidence_research_participant_consent
      groups:
        - match_style: word
          terms:
            - research participant consent files
            - research participant
            - consent form
            - informed consent
            - participant information sheet
            - ethics approval
            - voluntary participation
            - withdrawal of consent
            - NHMRC
            - research ethics
            - human subjects
            - clinical trial consent
    - id: Keyword_au_top500_355_research_participant_consent_files_domain_context
      groups:
        - match_style: word
          terms:
            - research participant consent files
            - research
            - participant
            - consent
            - files
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
