schema: testpattern/v1
name: Critical spare parts inventories
slug: au-top500-455-critical-spare-parts-inventories
version: 1.4.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to critical spare parts inventories in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?i)\b(?:critical\s+spare\s+parts|spares?\s+inventory|lead\s+time)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - infrastructure
  - security
corroborative_evidence:
  keywords:
    - critical spare parts inventories
    - critical
    - spare
    - parts
    - inventories
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: 'Critical spare parts'
      description: Topic phrase present
    - value: 'critical spare parts'
      description: Topic phrase, lowercase
    - value: 'this record references the critical spare parts held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Common words and phrases related to critical spare parts inventories appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_spare_parts
      matches:
        - ref: Evidence_spare_parts
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_spare_parts
      matches:
        - ref: Evidence_spare_parts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_spare_parts
  regexes:
    - id: Pattern_spare_parts
      pattern: (?i)\b(?:critical\s+spare\s+parts|spares?\s+inventory|lead\s+time)\b
  keywords:
    - id: Evidence_spare_parts
      groups:
        - match_style: word
          terms:
            - critical spare parts inventories
            - spare parts
            - spares inventory
            - lead time
            - reorder point
            - safety stock
            - bill of materials
            - replacement component
            - supply chain
            - procurement
            - critical infrastructure
      strength: specific
risk_description: >-
  The regex seeks critical-spare, replacement-component, stock-level, and infrastructure asset language, with the intended true positive being an inventory record rather than a general maintenance statement. A detailed inventory can reveal shortages, single points of failure, procurement lead times, or storage locations that support theft, supply-chain pressure, or targeted disruption of one operator. The medium-confidence topic pattern may also match maintenance policy and procurement discussion without quantities or locations. Risk 8 and SENSITIVE InfoTech recognise serious resilience exposure; PROTECTED would require a comprehensive multi-site inventory whose compromise credibly enables significant or cascading critical-service damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
