schema: testpattern/v1
name: Australian Passport Number
slug: au-travel-document-id
version: 2.2.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Identifies Australian passport numbers using a broad letter-prefix pattern covering single-letter and
  two-letter series. Requires corroborative evidence from travel-credential and issuing-nation keywords.
operation: >-
  Word-boundary regex matching 1-2 uppercase letters followed by exactly 7 digits. Covers all current
  and historical Australian passport series. Corroborative evidence: 3 tiers with travel-credential and
  issuing-nation keywords within 300 characters.
pattern: \b[A-Z]{1,2}\d{7}\b
confidence: low
confidence_justification: >-
  Low confidence standalone: the letter+digits pattern matches many non-passport identifiers. Travel-credential
  keywords are essential for reliable detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - travel credentials
    - travel document reference
    - border document
    - DFAT
    - Australian Passport Office
    - passport
    - passport number
  proximity: 300
  keyword_lists:

    - au-travel-credentials

    - pii-civic-credentials
test_cases:
  should_match:
    - value: PA1234567
      description: Two-letter prefix with 7 digits
    - value: N1234567
      description: Single-letter prefix with 7 digits
    - value: R1234567
      description: Modern R-series ePassport format
    - value: AB1234567
      description: Two-letter Australian passport format
  should_not_match:
    - value: '1234567'
      description: No letter prefix
    - value: ABC1234567
      description: Three-letter prefix is invalid
    - value: PA123456
      description: Only 6 digits after the letter prefix, one short of the required 7
false_positives:
  - description: Serial numbers and part codes using letter+digit format.
    mitigation: Require travel-credential keywords in proximity.
  - description: Policy documents discussing passport formats without real data.
    mitigation: Layer with additional structural signals and form-field context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 5
risk_description: >-
  The low-confidence pattern finds one or two letters followed by seven digits near Australian travel-document context. A genuine passport number can help correlate identity records or support social engineering, but the match includes no name, nationality, birth date, expiry, image, or document security features. The normal unit is one serial-like identifier and meaningful misuse needs substantial identity or document data. Risk 5 OFFICIAL reflects bounded exposure; SENSITIVE requires a composite passport record or verified identity bundle.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_travel_doc_code
      matches:
        - ref: Evidence_travel_credentials
        - ref: Evidence_issuing_nation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_travel_doc_code
      matches:
        - ref: Evidence_travel_credentials
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_travel_doc_code
      matches:
        - ref: Evidence_civic_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Pattern_travel_doc_code
      pattern: \b[A-Z]{1,2}\d{7}\b
  keywords:
    - id: Evidence_travel_credentials
      groups:
        - match_style: word
          terms:
            - travel credentials
            - travel document reference
            - border document
            - DFAT
            - Australian Passport Office
            - travel document
            - international travel
            - passport
            - passport number
            - passport no
    - id: Evidence_issuing_nation
      groups:
        - match_style: word
          terms:
            - Australia
            - Australian
            - Commonwealth of Australia
            - Department of Foreign Affairs
    - id: Evidence_civic_identity
      groups:
        - match_style: word
          terms:
            - identity document
            - proof of identity
            - identity verification
            - government issued
            - official document
