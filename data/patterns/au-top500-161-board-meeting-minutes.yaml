schema: testpattern/v1
name: Board meeting minutes
slug: au-top500-161-board-meeting-minutes
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to board meeting minutes in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:board\s+meeting\s+minutes|board\s+of\s+directors|board\s+resolution|corporate\s+governance|directors\s+meeting|board\s+papers|motion\s+carried|voting\s+record|in\s+camera)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - board meeting minutes
    - board
    - meeting
    - minutes
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: board meeting minutes
      description: Primary topic phrase match
    - value: board of directors
      description: Case-insensitive topic phrase match
    - value: board resolution
      description: Alternative topic phrase match
    - value: corporate governance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to board meeting minutes appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_board_meeting_minutes
      matches:
        - ref: Evidence_board_meeting_minutes
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_board_meeting_minutes
      matches:
        - ref: Evidence_board_meeting_minutes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_board_meeting_minutes
      matches:
        - ref: Evidence_board_meeting_minutes
  regexes:
    - id: Pattern_board_meeting_minutes
      pattern: (?is)\b(?:board\s+meeting\s+minutes|board\s+of\s+directors|board\s+resolution|corporate\s+governance|directors\s+meeting|board\s+papers|motion\s+carried|voting\s+record|in\s+camera)\b
  keywords:
    - id: Evidence_board_meeting_minutes
      groups:
        - match_style: word
          terms:
            - board meeting minutes
            - board of directors
            - board resolution
            - quorum
            - agenda
            - chairperson
            - corporate governance
            - directors meeting
            - board papers
            - motion carried
            - voting record
            - in camera
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
