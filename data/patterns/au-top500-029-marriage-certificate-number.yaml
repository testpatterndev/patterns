schema: testpattern/v1
name: Marriage certificate number
slug: au-top500-029-marriage-certificate-number
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to marriage certificate number in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:marriage\s+certificate|marriage\s+registration|certificate\s+of\s+marriage|births\s+deaths\s+marriages|marriage\s+record|wedding\s+certificate|matrimonial\s+record|registered\s+marriage|civil\s+marriage)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - marriage certificate number
    - marriage
    - certificate
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: marriage certificate
      description: Primary topic phrase match
    - value: marriage registration
      description: Case-insensitive topic phrase match
    - value: certificate of marriage
      description: Alternative topic phrase match
    - value: births deaths marriages
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to marriage certificate number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_marriage_certificate
      matches:
        - ref: Evidence_marriage_certificate
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_marriage_certificate
      matches:
        - ref: Evidence_marriage_certificate
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_marriage_certificate
      matches:
        - ref: Evidence_marriage_certificate
  regexes:
    - id: Pattern_marriage_certificate
      pattern: >-
        (?is)\b(?:marriage\s+certificate|marriage\s+registration|certificate\s+of\s+marriage|births\s+deaths\s+marriages|marriage\s+record|wedding\s+certificate|matrimonial\s+record|registered\s+marriage|civil\s+marriage)\b
    - id: Pattern_au_top500_029_marriage_certificate_number_label_context
      pattern: (?i)\\b(?:marriage\\s+certificate\\s+number|marriage|certificate|top500)\\b
  keywords:
    - id: Evidence_marriage_certificate
      groups:
        - match_style: word
          terms:
            - marriage certificate
            - marriage registration
            - certificate of marriage
            - BDM
            - births deaths marriages
            - marriage record
            - wedding certificate
            - matrimonial record
            - registered marriage
            - civil marriage
    - id: Keyword_au_top500_029_marriage_certificate_number_domain_context
      groups:
        - match_style: word
          terms:
            - marriage certificate number
            - marriage
            - certificate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
