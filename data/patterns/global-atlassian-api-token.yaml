schema: testpattern/v1
name: Atlassian API Token
slug: global-atlassian-api-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Atlassian API tokens (ATATT3 prefix), used for Jira, Confluence and other Atlassian Cloud REST APIs.
  A leaked token grants the associated user's access to projects, issues, wiki content and attachments.
operation: 'Prefixed token format ATATT3 followed by a long base64url body (186 chars). Corroborative evidence: keywords within
  300 characters.'
pattern: (?<![A-Za-z0-9])ATATT3[A-Za-z0-9_=-]{186}(?![A-Za-z0-9])
confidence: high
confidence_justification: 'High confidence: the distinctive ATATT3 prefix combined with a fixed 186-character base64url body
  makes false positives extremely unlikely.'
jurisdictions:
- global
regulations:
- Criminal Code Act 1995 (Cth)
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - atlassian
  - jira
  - confluence
  - api token
  - api_token
  - ATLASSIAN_API_TOKEN
  - basic auth
  proximity: 300
test_cases:
  should_match:
  - value: ATATT3ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789
    description: Atlassian API token, ATATT3 prefix + 186 chars
  - value: ATLASSIAN_API_TOKEN=ATATT3ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789
    description: Labelled Atlassian token in an env assignment
  - value: ATATT3ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456_-=
    description: Mixed-case Atlassian token with - _ = in body
  should_not_match:
  - value: ATATT3ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij
    description: Body far too short to be a valid Atlassian token
  - value: ATATT2ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789
    description: Wrong prefix marker (ATATT2 not ATATT3)
  - value: rotate the atlassian jira api token in confluence settings
    description: Prose mention without a token value
false_positives:
- description: Documentation or examples showing placeholder ATATT3 strings.
  mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
- purview_xml
- yaml
- regex_copy
scope: narrow
risk_rating: 8
risk_description: This detector matches the long ATATT3-prefixed Atlassian Cloud API token rather than a generic password
  reference. A usable token can act with the issuing user's Jira and Confluence permissions to read issues, pages, attachments,
  and project metadata. The likely impact is serious for that user's accessible projects and represented people, but the token
  does not inherently grant tenant administration or every workspace. Risk 8 and SENSITIVE InfoTech reflect direct delegated
  access to one user's Atlassian content; PROTECTED requires confirmed tenant administration, protected holdings, or comparably
  significant organisation-wide damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-14'
changelog:
- version: 1.1.1
  date: '2026-07-14'
  description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1525 without changing
    detector or package metadata.'
- version: 1.1.0
  date: '2026-07-09'
  description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are
    scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived
    by scripts/derive-pattern-class.mjs + spot review'
author: testpattern-community
license: MIT
references:
- url: https://support.atlassian.com/atlassian-account/docs/manage-api-tokens-for-your-atlassian-account/
  title: Manage API tokens for your Atlassian account
purview:
  regexes:
  - id: Regex_primary
    pattern: (?<![A-Za-z0-9])ATATT3[A-Za-z0-9_=-]{186}(?![A-Za-z0-9])
  keywords:
  - id: Keyword_domain_context
    strength: specific
    groups:
    - match_style: word
      terms:
      - Atlassian API Token
      - Atlassian
      - Token
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_primary
    matches:
    - ref: Keyword_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
    min_count: 2
  - confidence_level: 75
    id_match: Regex_primary
    matches:
    - ref: Keyword_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_primary
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  recommended_confidence: 85
  patterns_proximity: 300
