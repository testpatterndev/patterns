schema: testpattern/v1
name: Trade Secret/Proprietary Notice
slug: global-trade-secret-notice
version: 1.6.0
type: regex
pattern_class: concept
description: Detects trade secret designations, proprietary information notices, and commercial-in-confidence markings.
operation: >-
  Trade-secret, proprietary-information, licensed-material, and commercial-in-confidence notices are
  discovery-only at 65. Restricted-distribution, do-not-copy, or authorised-recipient language raises
  the notice to 75. The 85 tier additionally requires ownership, confidentiality-obligation,
  unauthorised-disclosure, return/destroy, or need-to-know language. Enforcing tiers reject public
  commentary, templates, boilerplate examples, and samples.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - intellectual-property
  - confidential
test_cases:
  should_match:
    - value: 'TRADE SECRET'
      description: Low-tier probe - designation without handling or ownership language
    - value: 'COMMERCIAL-IN-CONFIDENCE: restricted distribution; do not copy.'
      description: Medium-tier probe - notice plus restricted-use language
    - value: 'CONFIDENTIAL AND PROPRIETARY: restricted distribution; property of Acme; unauthorised disclosure prohibited; return or destroy.'
      description: High-tier probe - restricted use plus ownership and confidentiality obligations
  should_not_match:
    - value: Proprietary blend of spices
      description: Product-description sibling
    - value: The secret ingredient is love
      description: Incidental prose
    - value: 'The public encyclopedia explains what a trade secret is.'
      description: Public commentary contains only the designation
    - value: 'Template example: CONFIDENTIAL AND PROPRIETARY, restricted distribution, property of Acme, return or destroy.'
      description: Boilerplate template contains otherwise high-tier evidence
false_positives:
  - description: Generic use of proprietary or secret in non-business contexts.
    mitigation: Require legal/business marking keywords like do not distribute or Commercial-in-Confidence.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This keyword classifier detects explicit trade-secret, proprietary-and-confidential, commercial-in-confidence, restricted-distribution, and do-not-disclose markings; it identifies a claimed handling designation rather than verifying the underlying invention or source code. Unauthorized release of a genuinely marked document can expose commercial methods, designs, negotiations, or research and weaken legal protection or competitive advantage for the owner. The normal match has serious but bounded commercial significance, while templates, boilerplate notices, and generic uses of proprietary can overstate the sensitivity of the content. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED requires genuinely strategic IP whose compromise would cause significant national, market, or system-scale damage, not the notice alone.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Regex_trade_secret
          - Regex_proprietary
          - Regex_commercial_confidence
      matches:
        - ref: Keyword_restricted
        - ref: Keyword_ownership_obligation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Regex_trade_secret
          - Regex_proprietary
          - Regex_commercial_confidence
      matches:
        - ref: Keyword_restricted
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Regex_trade_secret
          - Regex_proprietary
          - Regex_commercial_confidence
  regexes:
    - id: Regex_trade_secret
      pattern: (?i)\b(?:trade\s+secret|proprietary\s+and\s+confidential|confidential\s+and\s+proprietary)\b
    - id: Regex_proprietary
      pattern: (?i)\b(?:proprietary\s+(?:information|technology|algorithm)|licensed\s+(?:materials|intellectual\s+property))\b
    - id: Regex_commercial_confidence
      pattern: (?i)\b(?:commercial[\s\-]?in[\s\-]?confidence|commercially\s+(?:confidential|sensitive))\b
  keywords:
    - id: Keyword_proprietary
      groups:
        - match_style: word
          terms:
            - proprietary and confidential
            - strictly proprietary
            - proprietary rights
            - proprietary information
            - proprietary technology
            - trade secret
            - confidential and proprietary
            - do not disclose
      strength: specific
    - id: Keyword_confidential
      groups:
        - match_style: word
          terms:
            - confidential
            - restricted
            - internal only
            - not for distribution
            - limited distribution
            - EMBARGOED
            - DRAFT - NOT FOR CIRCULATION
            - FOR AUTHORIZED RECIPIENTS ONLY
            - FOR AUTHORISED RECIPIENTS ONLY
            - DO NOT DISTRIBUTE
            - DO NOT FORWARD
      strength: specific
    - id: Keyword_restricted
      groups:
        - match_style: word
          terms:
            - restricted
            - restricted distribution
            - do not copy
            - do not distribute
            - licensed materials
            - FOR AUTHORIZED RECIPIENTS ONLY
            - FOR AUTHORISED RECIPIENTS ONLY
      strength: specific
    - id: Keyword_ownership_obligation
      groups:
        - match_style: word
          terms:
            - property of
            - proprietary rights
            - confidentiality obligation
            - unauthorised disclosure
            - unauthorized disclosure
            - return or destroy
            - need to know
            - recipient shall
      strength: specific
