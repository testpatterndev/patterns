schema: testpattern/v1
name: Data protection impact assessments
slug: global-top500-465-data-protection-impact-assessments
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to data protection impact assessments in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:data\s+protection\s+impact\s+assessment|privacy\s+impact\s+assessment|risk\s+assessment|processing\s+risk|high\s+risk\s+processing|necessity\s+assessment|data\s+protection\s+officer|supervisory\s+authority|privacy\s+compliance|mitigating\s+measures)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - data protection impact assessments
    - data
    - protection
    - impact
    - assessments
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: data protection impact assessment
      description: Primary topic phrase match
    - value: privacy impact assessment
      description: Case-insensitive topic phrase match
    - value: risk assessment
      description: Alternative topic phrase match
    - value: processing risk
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to data protection impact assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_dpia
      matches:
        - ref: Pattern_global_top500_465_data_protection_impact_assessments_label_context
        - ref: Keyword_global_top500_465_data_protection_impact_assessments_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_dpia
      matches:
        - ref: Keyword_dpia
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_dpia
      matches:
        - ref: Keyword_dpia
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_dpia
      pattern: >-
        (?is)\b(?:data\s+protection\s+impact\s+assessment|privacy\s+impact\s+assessment|risk\s+assessment|processing\s+risk|high\s+risk\s+processing|necessity\s+assessment|data\s+protection\s+officer|supervisory\s+authority|privacy\s+compliance|mitigating\s+measures)\b
    - id: Pattern_global_top500_465_data_protection_impact_assessments_label_context
      pattern: (?i)\\b(?:data\\s+protection\\s+impact\\s+assessments|protection|impact|assessments|top500)\\b
  keywords:
    - id: Keyword_dpia
      groups:
        - match_style: word
          terms:
            - data protection impact assessment
            - DPIA
            - privacy impact assessment
            - risk assessment
            - processing risk
            - high risk processing
            - necessity assessment
            - proportionality
            - data protection officer
            - supervisory authority
            - privacy compliance
            - mitigating measures
    - id: Keyword_global_top500_465_data_protection_impact_assessments_domain_context
      groups:
        - match_style: word
          terms:
            - data protection impact assessments
            - protection
            - impact
            - assessments
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/privacy-guidance-for-organisations-and-government-agencies/privacy-impact-assessments
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines
