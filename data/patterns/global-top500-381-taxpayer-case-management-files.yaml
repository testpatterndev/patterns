schema: testpattern/v1
name: Taxpayer case management files
slug: global-top500-381-taxpayer-case-management-files
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to taxpayer case management files in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:taxpayer\s+case\s+management\s+files|taxpayer\s+file|tax\s+assessment|tax\s+audit|tax\s+return|revenue\s+case|tax\s+compliance|taxpayer\s+identification|tax\s+obligation|case\s+management|tax\s+investigation|assessment\s+notice)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - taxpayer case management files
  proximity: 240
test_cases:
  should_match:
    - value: taxpayer case management files
      description: Primary topic phrase match
    - value: taxpayer file
      description: Case-insensitive topic phrase match
    - value: tax assessment
      description: Alternative topic phrase match
    - value: tax audit
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to taxpayer case management files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_taxpayer_case
      matches:
        - ref: Pattern_global_top500_381_taxpayer_case_management_files_label_context
        - ref: Keyword_global_top500_381_taxpayer_case_management_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_381_taxpayer_case_management_files_noise_exclusion
    - confidence_level: 75
      id_match: Regex_taxpayer_case
      matches:
        - ref: Keyword_taxpayer_case
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_381_taxpayer_case_management_files_noise_exclusion
    - confidence_level: 65
      id_match: Regex_taxpayer_case
      matches:
        - ref: Keyword_taxpayer_case
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_381_taxpayer_case_management_files_noise_exclusion
  regexes:
    - id: Regex_taxpayer_case
      pattern: (?is)\b(?:taxpayer\s+case\s+management\s+files|taxpayer\s+file|tax\s+assessment|tax\s+audit|tax\s+return|revenue\s+case|tax\s+compliance|taxpayer\s+identification|tax\s+obligation|case\s+management|tax\s+investigation|assessment\s+notice)\b
    - id: Pattern_global_top500_381_taxpayer_case_management_files_label_context
      pattern: (?i)\\b(?:taxpayer\\s+case\\s+management\\s+files|taxpayer|case|management|files|top500)\\b
  keywords:
    - id: Keyword_taxpayer_case
      groups:
        - match_style: word
          terms:
            - taxpayer case management files
            - taxpayer file
            - tax assessment
            - tax audit
            - tax return
            - revenue case
            - tax compliance
            - taxpayer identification
            - tax obligation
            - case management
            - tax investigation
            - assessment notice
    - id: Keyword_global_top500_381_taxpayer_case_management_files_domain_context
      groups:
        - match_style: word
          terms:
            - taxpayer case management files
            - taxpayer
            - case
            - management
            - files
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_381_taxpayer_case_management_files_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
