schema: testpattern/v1
name: National Police Check Reference
slug: au-police-check-reference
version: 1.2.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Nationally Coordinated Criminal History Check (National Police Check) certificate and
  application reference numbers issued through the ACIC National Police Checking Service. Matches a police
  check phrase near a reference / certificate / receipt value that identifies a specific check.
operation: >-
  Regex pattern (boost_regex engine). Pattern_au_police_check_reference matches a national police check /
  criminal history check phrase followed within 60 characters by a reference / certificate / application /
  receipt label and an alphanumeric reference value. The labelled shape is discovery-only at 65. Issuing
  authority or check-record context raises it to 75, and both are required at 85. Enforcing tiers reject
  explicit template and onboarding-example content.
pattern: (?i)\b(?:nationally\s+coordinated\s+criminal\s+history\s+check|national\s+police\s+(?:check|certificate|clearance)|criminal\s+history\s+check|police\s+check)\b[\s\S]{0,60}?\b(?:reference|ref|certificate|application|receipt)\s*(?:no|number|id|#)?\s*[:#-]?\s*[A-Z]{0,5}[-/]?\d{3,14}(?:[-/][A-Z0-9]{2,12}){0,4}\b
confidence: medium
confidence_justification: >-
  Medium confidence: the ACIC National Police Checking Service does not publish a fixed reference-number
  format, so detection anchors on a police-check phrase plus a labelled reference value and requires
  corroborating criminal-history / ACIC keywords for precision.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - Nationally Coordinated Criminal History Check
    - National Police Check
    - National Police Certificate
    - ACIC
    - NPC
    - criminal history
    - police clearance
    - disclosable court outcome
    - accredited body
    - National Police Checking Service
    - criminal record
    - background check
    - spent convictions
    - Victoria Police
  proximity: 300
test_cases:
  should_match:
    - value: Nationally Coordinated Criminal History Check reference number NPC-2025-4837291 attached
      description: Medium-tier probe - check reference with record context but no issuing authority
    - value: 'National Police Certificate reference: 20259988771 issued by Victoria Police for the role'
      description: High-tier probe - certificate reference with authority and record context
    - value: Please quote police check receipt no ACIC5578420 when following up on the application
      description: Medium-tier probe - receipt reference with follow-up context
    - value: Criminal history check certificate CHC-2025-000318 confirms no disclosable court outcomes
      description: Medium-tier probe - certificate reference with outcome context
    - value: Police check reference NPC-4837291
      description: Low-tier probe - labelled reference without independent authority or record context
  should_not_match:
    - value: The applicant provided a valid national police check last month for the position
      description: Police check phrase with no reference value nearby
    - value: Please complete the criminal history declaration form and sign it before submitting
      description: Criminal history declaration, not a criminal history check reference
    - value: Police officers attended the scene at 3pm to take statements from witnesses
      description: Generic police prose with no check reference
    - value: 'Onboarding example: National Police Certificate reference 20259988771 issued by Victoria Police'
      description: Structurally complete but explicitly framed example
false_positives:
  - description: A police-check phrase near an unrelated reference number could match without being a certificate reference.
    mitigation: Require corroborating ACIC / criminal-history keywords within the proximity window.
  - description: Sample certificate references in HR or onboarding templates may match the labelled form.
    mitigation: The high and medium tiers apply the template-exclusion NOT-group to suppress sample and template content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 5
risk_description: >-
  The detector finds a National Police Check or criminal-history-check phrase followed within 60 characters by a labelled certificate, application, receipt, or reference value. The number can support check-related impersonation or reveal that screening occurred, but it does not disclose criminal-history outcomes, the applicant's identity, or the certificate contents. The normal unit is an atomic administrative reference with bounded harm that needs a person and substantive screening result for material privacy impact. Risk 5 and OFFICIAL are appropriate, while a completed police certificate or criminal-history record would warrant SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_au_police_check_reference
      matches:
        - ref: Evidence_police_check_authority
        - ref: Evidence_check_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_au_police_check_reference
      matches:
        - ref: Evidence_authority_or_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_au_police_check_reference
  regexes:
    - id: Pattern_au_police_check_reference
      pattern: (?i)\b(?:nationally\s+coordinated\s+criminal\s+history\s+check|national\s+police\s+(?:check|certificate|clearance)|criminal\s+history\s+check|police\s+check)\b[\s\S]{0,60}?\b(?:reference|ref|certificate|application|receipt)\s*(?:no|number|id|#)?\s*[:#-]?\s*[A-Z]{0,5}[-/]?\d{3,14}(?:[-/][A-Z0-9]{2,12}){0,4}\b
  keywords:
    - id: Evidence_authority_or_record_context
      groups:
        - match_style: word
          terms:
            - text: ACIC
              case_sensitive: true
            - accredited body
            - National Police Checking Service
            - Victoria Police
            - attached
            - issued by
            - applicant
            - application follow-up
            - following up
            - for the role
            - disclosable court outcome
            - spent convictions
            - screening result
      strength: domain
    - id: Evidence_police_check_authority
      groups:
        - match_style: word
          terms:
            - text: ACIC
              case_sensitive: true
            - accredited body
            - National Police Checking Service
            - Victoria Police
      strength: specific
    - id: Evidence_check_record_context
      groups:
        - match_style: word
          terms:
            - attached
            - issued by
            - applicant
            - application follow-up
            - following up
            - for the role
            - disclosable court outcome
            - spent convictions
            - screening result
      strength: domain
