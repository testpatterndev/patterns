schema: testpattern/v1
name: System architecture diagrams
slug: global-top500-243-system-architecture-diagrams
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies system architecture diagrams patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:system\s+architecture|architecture\s+diagram|network\s+topology|infrastructure\s+diagram|system\s+design|component\s+diagram|data\s+flow\s+diagram|deployment\s+architecture|service\s+map|technical\s+architecture)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - system architecture diagrams
    - system
    - architecture
    - diagrams
    - software
    - engineering
  proximity: 300
test_cases:
  should_match:
    - value: system architecture
      description: Primary topic phrase match
    - value: architecture diagram
      description: Case-insensitive topic phrase match
    - value: network topology
      description: Alternative topic phrase match
    - value: infrastructure diagram
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_system_architecture_diagrams
      matches:
        - ref: Pattern_global_top500_243_system_architecture_diagrams_label_context
        - ref: Keyword_global_top500_243_system_architecture_diagrams_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_system_architecture_diagrams
      matches:
        - ref: Keyword_system_architecture_diagrams
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_system_architecture_diagrams
      pattern: >-
        (?is)\b(?:system\s+architecture|architecture\s+diagram|network\s+topology|infrastructure\s+diagram|system\s+design|component\s+diagram|data\s+flow\s+diagram|deployment\s+architecture|service\s+map|technical\s+architecture)\b
    - id: Pattern_global_top500_243_system_architecture_diagrams_label_context
      pattern: (?i)\b(?:system\s+architecture\s+diagrams)\b
  keywords:
    - id: Keyword_system_architecture_diagrams
      groups:
        - match_style: word
          terms:
            - system architecture
            - architecture diagram
            - network topology
            - infrastructure diagram
            - system design
            - component diagram
            - data flow diagram
            - deployment architecture
            - service map
            - technical architecture
      strength: specific
    - id: Keyword_global_top500_243_system_architecture_diagrams_domain_context
      groups:
        - match_style: word
          terms:
            - system architecture diagrams
            - system
            - architecture
            - diagrams
      strength: domain
risk_description: >-
  The regex identifies system architecture, architecture diagram, network topology, or infrastructure diagram language, signalling a likely design artefact but not parsing the diagram itself. A genuine architecture diagram can reveal trust boundaries, service relationships, network paths, control points, and single points of failure that materially improve adversary planning. Generic design discussions and document indexes can match without exposing an actionable topology, and one diagram may cover only a limited component. Risk 7 SENSITIVE reflects moderate direct security harm from a substantive internal diagram; PROTECTED would require a comprehensive critical-environment design or similarly significant consequence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
