schema: testpattern/v1
name: Individual Healthcare Identifier
slug: au-individual-healthcare-identifier
version: 1.4.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Individual Healthcare Identifier (IHI) patterns. The IHI is a 16-digit number starting with the prefix 800360; the official format carries a Luhn check digit (not enforced here).
operation: >-
  Regex pattern using universal engine. The top-level regex \b800360\d{10}\b matches 16-digit numbers starting with the fixed prefix 800360. Checksum: Luhn (NOT enforced in this regex-only pattern;
  structural detection only). The Purview engine uses
  Pattern_au_ihi (same regex). Three confidence tiers: High (85) requires IHI-specific terms + clinical/health system context keywords with template exclusion logic; Medium (75) requires IHI-specific
  terms; Low (65) requires clinical context keywords with non-health exclusion logic. Evidence uses 3 keyword groups (3 IHI terms, 8 clinical context terms, 7 health system terms) within 500-character
  proximity. Keyword lists: au-healthcare-identifiers, healthcare-identifiers.
pattern: \b800360\d{10}\b
confidence: medium
confidence_justification: >-
  Medium confidence: the 800360 prefix provides strong structural specificity for a 16-digit identifier. Corroborative keywords are recommended to distinguish from other long numeric sequences but the
  prefix already significantly reduces false positives.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - IHI
    - Individual Healthcare Identifier
    - healthcare identifier
  proximity: 500
  keyword_lists:
    - au-healthcare-identifiers
    - healthcare-identifiers
test_cases:
  should_match:
    - value: '8003600000000001'
      description: Exact 65 discovery probe with standard 800360 prefix and no context
    - value: '8003601234567890'
      description: IHI with typical digit sequence
    - value: '8003609999999999'
      description: IHI upper range
    - value: 'Patient identifier 8003601234567890 in the clinical record'
      description: Exact 75 probe with clinical context but no explicit IHI label
    - value: 'Patient IHI 8003601234567890 in the clinical record'
      description: Exact 85 probe with explicit IHI terminology and clinical context
  should_not_match:
    - value: '8003610000000001'
      description: Wrong prefix (800361 instead of 800360)
    - value: '800360000000001'
      description: Too few trailing digits (9 instead of 10)
    - value: '80036000000000020'
      description: Too many trailing digits (11 instead of 10)
    - value: 'Invoice tracking number 8003601234567890'
      description: Valid-shaped non-health number must remain discovery-only
false_positives:
  - description: Long numeric sequences in unrelated contexts (tracking numbers, serial codes) matching the Individual Healthcare Identifier format
    mitigation: Use corroborative keywords and, where available, checksum validation to filter false matches.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 5
risk_description: >-
  The canonical Individual Healthcare Identifier pattern detects a 16-digit 800360 value with IHI, clinical, and health-system evidence. Disclosure can support patient matching across services or a targeted healthcare pretext when the individual's name and other identity attributes are already known. The structural regex does not enforce Luhn checksum and returns no diagnosis, encounter, medication, result, or authentication secret. Risk 5 and OFFICIAL reflect bounded routing-identifier harm, while a person-linked medical record or access context would meet the SENSITIVE threshold.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 500
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_au_ihi
      matches:
        - ref: Evidence_ihi_terms
        - type: any
          min_matches: 1
          children:
            - ref: Evidence_clinical_context
            - ref: Evidence_health_system
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_au_ihi
      matches:
        - type: any
          min_matches: 1
          children:
            - ref: Evidence_clinical_context
            - ref: Evidence_health_system
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_au_ihi
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_au_ihi
      pattern: \b800360\d{10}\b
  keywords:
    - id: Evidence_ihi_terms
      groups:
        - match_style: word
          terms:
            - text: IHI
              case_sensitive: true
            - Individual Healthcare Identifier
            - healthcare identifier
      strength: specific
    - id: Evidence_clinical_context
      groups:
        - match_style: word
          terms:
            - patient
            - clinical
            - health record
            - My Health Record
            - medical
            - healthcare
            - health service
            - practitioner
      strength: domain
    - id: Evidence_health_system
      groups:
        - match_style: word
          terms:
            - Medicare
            - text: PBS
              case_sensitive: true
            - health insurance
            - hospital
            - text: GP
              case_sensitive: true
            - general practitioner
            - specialist
      strength: domain
    - id: Evidence_non_health_exclusion
      groups:
        - match_style: word
          terms:
            - invoice
            - order
            - tracking
            - shipment
            - serial
      strength: noise
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 1.4.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: make the bare 800360 structure discovery-only at 65, require independent clinical or health-system context at 75, add the explicit IHI label at 85, and add exact-tier plus non-health numeric probes.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 549 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: Widen patterns_proximity 300->500 so keyword evidence still gates at the challenging-layout distance (ph<50 cohort)
  - version: 1.2.0
    date: '2026-07-04'
    description: case/evidence metadata update
