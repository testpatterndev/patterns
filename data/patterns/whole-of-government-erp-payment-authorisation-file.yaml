schema: testpattern/v1
name: Whole-of-Government ERP Payment Authorisation File
slug: whole-of-government-erp-payment-authorisation-file
version: 1.0.0
type: regex
engine: universal
description: Detects bulk payment authorisation files extracted from government ERP systems (SAP, Oracle, TechnologyOne) containing payee bank accounts, payment amounts, and authorisation codes for batch processing.
operation: 'Regex for ABA/BECS file format: Type 0 header record pattern or structured fixed-width payment records with BSB and transaction codes. Keyword proximity: payment file / ABA file / BECS / batch payment / EFT file terms within 300 characters of authorisation/approval context. Boosted by ERP system names (SAP, Oracle, TechnologyOne).'
pattern: ^0\s*.{17}\d{3}-\d{3}
confidence: high
confidence_justification: 'High confidence: ABA/BECS file format patterns combined with ERP system context and payment authorisation markers are highly specific to government payment files. The structured fixed-width format is distinctive.'
jurisdictions:
  - au
regulations:
- "Financial Accountability Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - payment file
    - ABA file
    - BECS
    - direct entry
    - batch payment
    - EFT file
    - authorised
    - approved
    - certified
    - released for payment
    - SAP
    - Oracle
    - TechnologyOne
    - ERP
    - payment run
    - remittance
  proximity: 300
  keyword_lists:
    - corporate-finance
    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED — ERP Payment Authorisation File. Source: SAP Payment Run PR-2026-0451. Batch payment file (ABA format) authorised for processing. Contains 1,247 payment records totalling $34,567,890.45. BSB/Account details for all payees included. Dual authorisation: Approved by J. Smith and B. Williams. Released for BECS direct entry.'
      description: SAP payment authorisation file with batch details
    - value: |-
        0                 064-000Department of Health      0123456Payment File       280226
        1064-000 12345678 530000003450000Employee Payment    J Smith            064-000 98765432
        1084-004 87654321 530000004520000Employee Payment    M Jones            084-004 11223344
      description: Raw ABA file format with header and payment records
  should_not_match:
    - value: 'Payment request form. Please approve payment of $12,450 to Supplier ABC Pty Ltd. Purchase order: PO-2026-001234. Single payment — not a batch file.'
      description: Individual payment request — not a bulk authorisation file
    - value: ABA file format specification. The Type 0 record contains the header with BSB, account name, and file description. Used for training purposes.
      description: ABA file format documentation — training material
false_positives:
  - description: Individual payment requests and purchase order approvals
    mitigation: Require bulk indicators (batch, multiple records, payment run) rather than single payment context
  - description: ABA/BECS file format specifications and training documentation
    mitigation: Exclude documents containing 'specification', 'format guide', 'training', 'example file' without real payment data
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_whole_of_government_erp_payment_authorisation_file_aba_type_0_header_record
      matches:
        - ref: Evidence_whole_of_government_erp_payment_authorisation_file_primary
        - ref: Evidence_whole_of_government_erp_payment_authorisation_file_authorisation
        - ref: Evidence_whole_of_government_erp_payment_authorisation_file_erp_systems
        - ref: Evidence_whole_of_government_erp_payment_authorisation_file_markers
        - ref: Pattern_whole_of_government_erp_payment_authorisation_file_aba_type_1_detail_record_with_bsb_and_ac
        - ref: Pattern_whole_of_government_erp_payment_authorisation_file_bsb_format
        - ref: Pattern_whole_of_government_erp_payment_authorisation_file_payment_run_reference_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_whole_of_government_erp_payment_authorisation_file_exclusion
    - confidence_level: 75
      id_match: Pattern_whole_of_government_erp_payment_authorisation_file_aba_type_0_header_record
      matches:
        - ref: Evidence_whole_of_government_erp_payment_authorisation_file_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_whole_of_government_erp_payment_authorisation_file_exclusion
    - confidence_level: 65
      id_match: Pattern_whole_of_government_erp_payment_authorisation_file_aba_type_0_header_record
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_whole_of_government_erp_payment_authorisation_file_exclusion
  regexes:
    - id: Pattern_whole_of_government_erp_payment_authorisation_file_aba_type_0_header_record
      pattern: ^0\s*.{17}\d{3}-\d{3}
    - id: Pattern_whole_of_government_erp_payment_authorisation_file_aba_type_1_detail_record_with_bsb_and_ac
      pattern: ^1\d{3}-\d{3}\s*\d{6,10}
    - id: Pattern_whole_of_government_erp_payment_authorisation_file_bsb_format
      pattern: \b\d{3}-?\d{3}\b
    - id: Pattern_whole_of_government_erp_payment_authorisation_file_payment_run_reference_number
      pattern: PR-\d{4}-\d{4,6}
  keywords:
    - id: Evidence_whole_of_government_erp_payment_authorisation_file_primary
      groups:
        - match_style: word
          terms:
            - payment file
            - ABA file
            - BECS
            - direct entry
            - batch payment
            - EFT file
            - payment run
    - id: Evidence_whole_of_government_erp_payment_authorisation_file_authorisation
      groups:
        - match_style: word
          terms:
            - authorised
            - approved
            - certified
            - released for payment
            - dual authorisation
            - payment authorisation
    - id: Evidence_whole_of_government_erp_payment_authorisation_file_erp_systems
      groups:
        - match_style: word
          terms:
            - SAP
            - Oracle
            - TechnologyOne
            - ERP
            - payment module
    - id: Evidence_whole_of_government_erp_payment_authorisation_file_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - confidential
            - restricted
            - not for distribution
    - id: Filter_whole_of_government_erp_payment_authorisation_file_exclusion
      groups:
        - match_style: word
          terms:
            - specification
            - format guide
            - training
            - example file
            - template
            - how to
            - payment request form
            - single payment

risk_rating: 8
risk_description: Bulk payment authorisation files from government ERP systems containing payee bank accounts, amounts, and authorisation codes; interception enables payment redirection. Legislative review (Mar 2026) established BIL:2 — Financial Accountability Act 2009 (Qld) contains no secrecy provisions or criminal penalties. No specific statutory mandate for PROTECTED classification of this document type. Operational sensitivity managed through access controls and existing financial accountability frameworks.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Financial"
references: []
created: '2026-02-20'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
license: MIT
