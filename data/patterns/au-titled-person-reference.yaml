schema: testpattern/v1
name: Titled Person Reference
slug: au-titled-person-reference
version: 2.5.0
type: keyword_dictionary
pattern_class: concept
description: >-
  Identifies personal names preceded by salutations (Mr, Mrs, Ms, Dr, Prof, etc.) in Australian
  documents. Uses structural regex for honorific + capitalised name components with corroborative
  evidence from family-name and forename census dictionaries.
operation: >-
  Regex matching salutation prefix followed by 1-3 capitalised name components. Corroborative evidence
  from family-name and forename dictionaries within 300 characters. 3 tiers: salutation + family name
  (high), salutation + forename (medium), salutation only (low).
confidence: medium
confidence_justification: >-
  Medium confidence: salutation prefix provides strong signal but names following salutations may be
  partial or ambiguous in some document formats.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - personal-name
test_cases:
  should_match:
    - value: Dear Dr Sarah Thompson
      description: Doctor with full name
    - value: 'Attention: Prof. James Wilson'
      description: Professor with period abbreviation
    - value: The Hon. Justice Michael Kirby
      description: Honourable title with two name components
  should_not_match:
    - value: The weather forecast predicts rain across the region this weekend.
      description: Generic non-name text with no salutation present
    - value: The mrs clause in the contract
      description: Lowercase mrs does not match salutation pattern (Mr/Mrs dropped from the flat keyword list; a title alone is not evidence)
false_positives:
  - description: Salutations preceding non-name words in informal text or brand references.
    mitigation: Require capitalised words following the salutation and corroborative family-name dictionary.
exports:
  - yaml
scope: wide
risk_rating: 6
risk_description: Full name with salutation enables targeted social engineering and impersonation.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_titled_person
      matches:
        - ref: Evidence_salutation
        - ref: Evidence_family_name_census
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_titled_person
      matches:
        - ref: Evidence_salutation
        - ref: Evidence_forename_registry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_titled_person
      matches:
        - ref: Evidence_salutation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Pattern_titled_person
      pattern: \b(?:Mr|Mrs|Miss|Ms|Dr|Prof|Rev|Hon|Sir|Dame|Lord|Lady)\.?\s+[A-Z][a-z]+(?:\s+[A-Z][a-z]{1,20}){1,2}\b
  keywords:
    - id: Evidence_salutation
      groups:
        - match_style: word
          terms:
