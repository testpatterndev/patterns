schema: testpattern/v1
name: Titled Person Reference
slug: au-titled-person-reference
version: 2.6.1
type: keyword_proximity
pattern_class: concept
engine: boost_regex
description: >-
  Identifies personal names preceded by salutations (Mr, Mrs, Ms, Dr, Prof, etc.) in Australian
  documents. Uses structural regex for honorific + capitalised name components with corroborative
  evidence from the consolidated Australian forename and surname dictionaries.
operation: >-
  Honorific plus two-to-three capitalised name components is the primary signal. The 65 tier retains
  title structure for discovery, 75 requires either consolidated Australian name dictionary, and 85
  requires both forename and surname evidence. Template exclusion applies to every tier, and strong
  business-suffix or formatted-address collisions cannot enforce.
case_sensitive: true
confidence: medium
confidence_justification: >-
  Medium confidence: salutation prefix provides strong signal but names following salutations may be
  partial or ambiguous in some document formats.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - personal-name
test_cases:
  should_match:
    - value: Dr Zorvane Qartz
      description: Exact 65 discovery probe - titled capitalised structure without Australian dictionary evidence
    - value: Dr Aaliyah Zorvane
      description: Exact 75 probe - titled structure with one consolidated Australian dictionary hit
    - value: 'Contact name: Dr Aaliyah Abbasi; personnel record'
      description: Exact 85 probe - titled structure with both dictionaries, a populated field label, and person-record context
    - value: Dear Dr Sarah Thompson
      description: Doctor with full name
    - value: 'Attention: Prof. James Wilson'
      description: Professor with period abbreviation
    - value: The Hon. Justice Michael Kirby
      description: Honourable title with two name components
  should_not_match:
    - value: The weather forecast predicts rain across the region this weekend.
      description: Generic non-name text with no salutation present
    - value: The mrs clause in the contract
      description: Lowercase clause wording does not satisfy the case-sensitive titled-name structure
    - value: Dr Brown Engineering Pty Ltd lodged the tender.
      description: Titled business-name collision present in both Australian dictionaries must not reach enforcement
    - value: 'Dr Victoria Road, QLD 4000'
      description: Titled formatted-address collision present in both Australian dictionaries must not reach enforcement
    - value: 'Sample: Dear Dr Aaliyah Abbasi'
      description: High-like titled-name fixture must be rejected by the shared exclusion dictionary
false_positives:
  - description: Salutations preceding non-name words in informal text or brand references.
    mitigation: Require capitalised words following the salutation and corroborative family-name dictionary.
exports:
  - purview_xml
  - yaml
scope: wide
risk_rating: 5
risk_description: >-
  A Titled Person Reference match combines an honorific such as Dr, Professor, or Justice with one to three capitalised name components and name-dictionary evidence. It can expose an identifiable person's name and role cue, which may aid correlation, unwanted contact, or a tailored professional pretext. Names and titles are often public, and the match contains no account, case, contact route, or credential. Risk 5 and OFFICIAL recognise a likely populated identity reference while reserving SENSITIVE for a name linked to substantive private or operational information.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: au-forenames-australian
      as: Evidence_au_forename_registry
      match_style: word
    - dict: au-surnames-australian
      as: Evidence_au_surname_registry
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_titled_person
      matches:
        - ref: Evidence_salutation
        - ref: Evidence_au_forename_registry
        - ref: Evidence_au_surname_registry
        - ref: Pattern_titled_person_record_label
        - ref: Evidence_titled_person_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_non_person_name_collision
    - confidence_level: 75
      id_match: Pattern_titled_person
      matches:
        - ref: Evidence_salutation
        - type: any
          min_matches: 1
          refs:
            - Evidence_au_forename_registry
            - Evidence_au_surname_registry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_non_person_name_collision
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_titled_person
      matches:
        - ref: Evidence_salutation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Pattern_titled_person
      pattern: \b(?:Mr|Mrs|Miss|Ms|Dr|Prof|Rev|Hon|Sir|Dame|Lord|Lady)\.?\s+(?:[A-Z][a-z]{1,20}\s+[A-Z][a-z]{1,20}\s+[A-Z][a-z]{1,20}|[A-Z][a-z]{1,20}\s+[A-Z][a-z]{1,20})\b
    - id: Pattern_titled_person_record_label
      pattern: >-
        (?i)\b(?:contact|customer|client|patient|employee|member|applicant|holder)\s+(?:name|record)\s*[:#-]?\s*(?:Mr|Mrs|Miss|Ms|Dr|Prof|Rev|Hon|Sir|Dame|Lord|Lady)\b
    - id: Pattern_non_person_name_collision
      pattern: (?i)\b(?:(?:engineering|consulting|holdings|services|pty\s+ltd|ltd|limited|company|corporation|council|university)|(?:street|road|avenue|highway|parade|drive|lane|terrace|crescent)\s*,?\s*(?:NSW|QLD|VIC|TAS|SA|WA|NT|ACT|\d{4}))\b
  keywords:
    - id: Evidence_salutation
      groups:
        - match_style: word
          terms:
            - Mr
            - Mr.
            - Mrs
            - Mrs.
            - Miss
            - Ms
            - Ms.
            - Dr
            - Dr.
            - Prof
            - Prof.
            - Professor
            - Rev
            - Rev.
            - Reverend
            - Hon
            - Hon.
            - Honourable
            - Sir
            - Dame
            - Lord
            - Lady
            - Mx
            - Mx.
      strength: domain
    - id: Evidence_titled_person_record_context
      groups:
        - match_style: word
          terms:
            - personnel record
            - identity record
            - contact record
            - customer record
            - client record
            - patient record
            - employee record
            - member record
            - applicant record
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 2.6.1
    date: '2026-07-19'
    description: 'Make the 85 tier demonstrably cumulative by requiring a populated titled-person field label and person-record context in addition to both Australian name dictionaries.'
  - version: 2.6.0
    date: '2026-07-19'
    description: 'Australian personal-name baseline: make titled capitalised structure the primary signal with explicit component alternatives accepted by Purview; wire consolidated forename/surname sources through keyword-dictionary references; distinguish title-only discovery, single-dictionary medium, and dual-dictionary high tiers; veto strong business/address collisions; remove bare title keyword fallback; add exact-tier and adversarial probes.'
  - version: 2.5.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 607 without changing detector or package metadata.'
  - version: 2.5.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 2.4.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 2.3.0
    date: '2026-07-04'
    description: Drop bare Mr/Mrs (title alone is not evidence); replace collision-prone should_not_match test value
  - version: 2.2.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 2.1.0
    date: '2026-07-04'
    description: Bound inner quantifier in repeated name-component group to remove Purview-flagged nested-quantifier shape
