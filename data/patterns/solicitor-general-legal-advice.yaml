schema: testpattern/v1
name: Solicitor-General Legal Advice
slug: solicitor-general-legal-advice
version: 1.4.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects privileged legal advice from the Solicitor-General on constitutional and high-stakes matters. The Solicitor-General provides independent legal advice on constitutional validity, High Court matters, and state sovereignty issues. Disclosure could compromise the State's position in constitutional litigation.
operation: 'Primary detection: keyword proximity matching ''Solicitor-General'' or ''Solicitor General'' within 200 characters of privilege indicators (''opinion'', ''advice'', ''constitutional'', ''privileged''). Document marker detection: ''PROTECTED'' + ''Legal-Privilege'' + ''Solicitor-General'' in header/footer. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\bSolicitor[- ]General\b
confidence: medium
confidence_justification: 'Medium confidence: Solicitor-General is a specific constitutional office. Combined with privilege and constitutional keywords, detection is precise. Document marker patterns add further confidence.'
jurisdictions:
  - au
regulations:
- "Evidence Act 1977 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - privileged
    - LPP
    - PROTECTED
    - constitutional validity
    - state sovereignty
    - legal professional privilege
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        PROTECTED — Legal-Privilege
        Solicitor-General's Opinion

        Re: Constitutional validity of the Resources Royalty Amendment Bill 2025

        I have been asked to advise on the constitutional validity of the proposed amendments to the Mineral Resources Act 1989.
      description: Solicitor-General opinion on constitutional validity with PROTECTED marking
    - value: The Solicitor-General has provided privileged advice confirming that the proposed legislation may be vulnerable to challenge under s.92 of the Commonwealth Constitution. This advice is subject to legal professional privilege and must not be disclosed.
      description: Reference to Solicitor-General privileged advice on constitutional matter
    - value: |-
        CONFIDENTIAL — LEGAL PROFESSIONAL PRIVILEGE
        Advice of the Solicitor General of Queensland
        To: The Attorney-General
        Subject: High Court special leave application — State of Queensland v Commonwealth
      description: Solicitor-General advice for High Court matter
  should_not_match:
    - value: The Solicitor-General of Australia appeared before the High Court in the matter of Commonwealth v Tasmania. The published transcript is available from the High Court registry.
      description: Published High Court proceeding mentioning Solicitor-General
    - value: The role of the Solicitor-General in the Australian legal system is to provide independent legal advice to the Attorney-General. This textbook chapter examines the historical development of the office.
      description: Academic textbook discussing the Solicitor-General role
    - value: The former Solicitor-General delivered a public lecture at the University of Queensland Law School on the topic of constitutional interpretation in federation.
      description: Public lecture by former Solicitor-General
false_positives:
  - description: Published High Court proceedings mentioning Solicitor-General as advocate
    mitigation: Negative match on 'published transcript', 'judgment of the court', citation formats [YYYY] HCA
  - description: Academic or educational discussion of the Solicitor-General role
    mitigation: Require co-occurrence with privilege indicators or PROTECTED/CONFIDENTIAL markers
  - description: News articles about Solicitor-General appointments or public appearances
    mitigation: Negative match on 'media release', 'appointed', 'public lecture', 'announced'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_solicitor_general_legal_advice_solicitor_general_title_match
      matches:
        - ref: Evidence_solicitor_general_legal_advice_primary
        - ref: Evidence_solicitor_general_legal_advice_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_solicitor_general_legal_advice_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_solicitor_general_legal_advice_solicitor_general_title_match
      matches:
        - ref: Evidence_solicitor_general_legal_advice_primary
        - ref: Evidence_solicitor_general_legal_advice_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_solicitor_general_legal_advice_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_solicitor_general_legal_advice_solicitor_general_title_match
  regexes:
    - id: Pattern_solicitor_general_legal_advice_solicitor_general_title_match
      pattern: (?i)\bSolicitor[- ]General\b
  keywords:
    - id: Evidence_solicitor_general_legal_advice_primary
      groups:
        - match_style: word
          terms:
            - Solicitor-General
            - Solicitor General
      strength: specific
    - id: Evidence_solicitor_general_legal_advice_corroborative
      groups:
        - match_style: word
          terms:
            - privileged
            - text: LPP
              case_sensitive: true
            - PROTECTED
            - constitutional validity
            - state sovereignty
            - legal professional privilege
      strength: domain
    - id: Evidence_solicitor_general_legal_advice_exclusion
      groups:
        - match_style: word
          terms:
            - published transcript
            - judgment of the court
            - tabled
            - media release
            - public lecture
            - annual report

      strength: noise
risk_rating: 8
risk_description: >-
  The pattern identifies privileged advice from the Solicitor-General when constitutional, opinion, advice, or privilege signals occur close to the office title, rather than public reporting of an appearance in court. A genuine match may reveal weaknesses in legislation, High Court strategy, sovereignty positions, and advice to the Attorney-General, giving litigants or political actors a material advantage. The normal unit is a single high-stakes opinion whose disclosure seriously prejudices the State but does not automatically compromise government as a whole. Risk 8 supports SENSITIVE Legal; PROTECTED would require broad constitutional damage, Cabinet consequences, or systemic compromise beyond one matter.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
