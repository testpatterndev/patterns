schema: testpattern/v1
name: Sexual orientation
slug: global-top500-015-sexual-orientation
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to sexual orientation in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: pii-personal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:sexual\s+orientation|sexual\s+preference|gender\s+preference|personal\s+relationship|intimate\s+partner|domestic\s+partnership|personal\s+demographics|diversity\s+data|equality\s+monitoring|protected\s+characteristic)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - sexual orientation
    - sexual
    - orientation
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - pii-personal
test_cases:
  should_match:
    - value: sexual orientation
      description: Primary topic phrase match
    - value: sexual preference
      description: Case-insensitive topic phrase match
    - value: gender preference
      description: Alternative topic phrase match
    - value: personal relationship
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to sexual orientation appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_sexual_orientation
      matches:
        - ref: Pattern_global_top500_015_sexual_orientation_label_context
        - ref: Keyword_global_top500_015_sexual_orientation_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_sexual_orientation
      matches:
        - ref: Keyword_sexual_orientation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_sexual_orientation
      matches:
        - ref: Keyword_sexual_orientation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_sexual_orientation
      pattern: >-
        (?is)\b(?:sexual\s+orientation|sexual\s+preference|gender\s+preference|personal\s+relationship|intimate\s+partner|domestic\s+partnership|personal\s+demographics|diversity\s+data|equality\s+monitoring|protected\s+characteristic)\b
    - id: Pattern_global_top500_015_sexual_orientation_label_context
      pattern: (?i)\\b(?:sexual\\s+orientation|sexual|orientation|top500)\\b
  keywords:
    - id: Keyword_sexual_orientation
      groups:
        - match_style: word
          terms:
            - sexual orientation
            - sexual preference
            - gender preference
            - personal relationship
            - intimate partner
            - domestic partnership
            - personal demographics
            - diversity data
            - equality monitoring
            - protected characteristic
    - id: Keyword_global_top500_015_sexual_orientation_domain_context
      groups:
        - match_style: word
          terms:
            - sexual orientation
            - sexual
            - orientation
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
