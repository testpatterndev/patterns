  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 517 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.1.0
    date: '2026-07-04'
