schema: testpattern/v1
name: AHPRA Registration Number
slug: au-ahpra-registration
version: 1.4.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Australian Health Practitioner Regulation Agency (AHPRA) registration numbers used to identify registered health practitioners across 16 professions.
operation: 'Matches a 3-letter profession prefix (e.g., MED, NMW, PSY, DEN) followed by 10 digits. Corroborative evidence: 13 keywords within 300 characters.'
pattern: \b(?:ATS|CHI|CMR|DEN|MED|MRP|NMW|OCC|OPT|OST|PAR|PHA|PHY|POD|PSY)\d{10}\b
confidence: high
confidence_justification: 'High confidence: the structured prefix-digit format is highly specific to AHPRA registrations and unlikely to appear in other contexts.'
jurisdictions:
  - au
regulations:
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - government-id
  - health
corroborative_evidence:
  keywords:
    - AHPRA
    - AHPRA registration
    - AHPRA number
    - AHPRA registration number
    - registration number
    - practitioner registration
    - practitioner number
    - registration no
    - reg no
    - reg number
    - AHPRA reg
    - registered health practitioner
    - health practitioner registration
  proximity: 300
  keyword_lists:

    - government-services
test_cases:
  should_match:
    - value: MED0001234567
      description: Exact 65 discovery probe with a valid AHPRA-shaped token and no corroborating context
    - value: 'AHPRA registration: MED0001234567'
      description: Exact 75 probe with an explicit AHPRA label
    - value: Practitioner number NMW0009876543
      description: Practitioner-number form of an AHPRA registration
    - value: 'Doctor AHPRA registration MED0001234567'
      description: Exact 85 probe with an explicit AHPRA label and independent provider role
    - value: PSY0005551234 registered with AHPRA
      description: Psychology registration in sentence
  should_not_match:
    - value: Reference code ABC1234567890
      description: Similar format but wrong prefix
    - value: Serial number MED-001-234-567
      description: Hyphenated number that does not match pattern
    - value: Inventory code MED0001234567 was assigned to the imaging device
      description: Valid-shaped token in non-practitioner inventory context must remain discovery-only
false_positives:
  - description: Internal reference codes using similar profession-prefix formats.
    mitigation: The 3-letter prefix is restricted to known AHPRA profession codes, limiting false matches.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_rating: 4
risk_description: >-
  The canonical AHPRA Registration Number regex identifies a health practitioner through a recognised profession prefix followed by 10 digits. The identifier can support professional verification and may assist impersonation or false billing when combined with the practitioner's name, employer, signatures, and other credentials. It is not patient information, a disciplinary record, or a secret that independently grants system access, and professional registration is routinely checked. Risk 4 and OFFICIAL reflect limited standalone harm, while a credential bundle, protected employment file, or fraudulent transaction would reach the SENSITIVE threshold.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ahpra_registration
      matches:
        - ref: Keyword_ahpra
        - ref: Keyword_healthcare_provider
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ahpra_registration
      matches:
        - ref: Keyword_ahpra
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ahpra_registration
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ahpra_registration
      pattern: \b(?:ATS|CHI|CMR|DEN|MED|MRP|NMW|OCC|OPT|OST|PAR|PHA|PHY|POD|PSY)\d{10}\b
  keywords:
    - id: Keyword_ahpra
      groups:
        - match_style: word
          terms:
            - AHPRA
            - AHPRA registration
            - AHPRA number
            - AHPRA registration number
            - registration number
            - practitioner registration
            - practitioner number
            - registration no
            - reg no
            - reg number
            - AHPRA reg
            - registered health practitioner
            - health practitioner registration
      strength: specific
    - id: Keyword_healthcare_provider
      groups:
        - match_style: word
          terms:
            - doctor
            - physician
            - nurse
            - dentist
            - pharmacist
            - physiotherapist
            - psychologist
            - optometrist
            - podiatrist
            - midwife
            - paramedic
            - chiropractor
            - osteopath
            - occupational therapist
            - medical practitioner
            - health professional
            - healthcare professional
            - treating practitioner
            - text: GP
              case_sensitive: true
            - specialist
            - surgeon
            - anaesthetist
            - radiologist
            - pathologist
      strength: domain
    - id: Keyword_medical
      groups:
        - match_style: word
          terms:
            - medical
            - clinical
            - healthcare
            - health care
            - hospital
            - clinic
            - practice
            - surgery
            - medical centre
            - health service
            - provider
            - practitioner
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
