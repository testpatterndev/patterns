schema: testpattern/v1
name: Business continuity plans
slug: au-top500-304-business-continuity-plans
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive business-continuity, continuity-of-operations, and BCP documents. The title
  phrase alone is retained for discovery; enforcement requires plan content such as a business impact
  analysis, recovery strategy, alternate site, vital records, crisis team, or notification tree.
operation: >-
  Pattern_business_continuity recognises business-continuity plans/programs, BCP documents/procedures,
  and continuity-of-operations plans. The title phrase alone is discovery-only at 65. A concrete
  continuity or recovery component raises it to 75; both continuity components and crisis/activation
  evidence are required at 85. Enforcing tiers reject explicit templates and training examples.
pattern: (?i)\b(?:business\s+continuity\s+(?:plan|management|program)|bcp\s+(?:document|plan|procedures?)|continuity\s+of\s+(?:operations?|business)\s+plan)\b
confidence: medium
confidence_justification: >-
  Medium confidence: organizations routinely mention a BCP in policies, contracts, and audit requests
  without including the plan. Concrete recovery content is required for enforcement, and the high tier
  additionally requires crisis-management or activation detail.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - security
corroborative_evidence:
  keywords:
    - business continuity plans
    - business
    - continuity
    - plans
    - operations
    - resilience
  proximity: 300
  keyword_lists:
    - industry-education
test_cases:
  should_match:
    - value: 'Business continuity plan'
      description: Low-tier probe - title phrase without substantive plan content
    - value: 'Business continuity plan - business impact analysis, recovery strategy, alternate site, and vital records'
      description: Medium-tier probe - concrete recovery components without crisis-activation detail
    - value: 'Business continuity plan - critical business function, alternate site, crisis team, emergency contact, and notification tree'
      description: High-tier probe - recovery components plus crisis/activation detail
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic prose without structural artifact anchors
      description: Should not match plain mentions
    - value: 'The supplier must maintain a business continuity plan and provide annual assurance.'
      description: Contractual requirement, not the plan itself
    - value: 'Training example: business continuity plan with recovery strategy, alternate site, crisis team, and call tree'
      description: Explicit training content must not enforce
false_positives:
  - description: Policies, supplier clauses, audit requests, and risk registers may require or reference a business-continuity plan without containing operational recovery detail.
    mitigation: Keep the title-only tier discovery-only and require a concrete BCP component before enforcement.
  - description: Training exercises and template plans can contain realistic recovery, alternate-site, crisis-team, and call-tree content.
    mitigation: Exclude explicit template, tutorial, demo, and training-example framing from the medium and high tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 8
risk_description: >-
  The pattern targets a composite business-continuity plan using structural BCP, continuity-management, and continuity-of-operations phrases with supporting component evidence. A real plan can expose critical-process priorities, alternative sites, recovery dependencies, key contacts, and supplier arrangements that an adversary or competitor could target or impersonate. The affected scale may span the enterprise, but the plan normally provides no direct access and an attacker still needs a disruption or social-engineering path. Risk 8 and SENSITIVE reflect serious contained organizational harm, while a plan governing a protected operation or critical service with privileged procedures would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_business_continuity
      matches:
        - ref: Evidence_bcp_components
        - ref: Evidence_crisis_management
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_business_continuity
      matches:
        - ref: Evidence_bcp_components
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_business_continuity
  regexes:
    - id: Pattern_business_continuity
      pattern: (?i)\b(?:business\s+continuity\s+(?:plan|management|program)|bcp\s+(?:document|plan|procedures?)|continuity\s+of\s+(?:operations?|business)\s+plan)\b
  keywords:
    - id: Evidence_bcp_components
      groups:
        - match_style: word
          terms:
            - critical business function
            - business impact analysis
            - text: BIA
              case_sensitive: true
            - recovery strategy
            - recovery procedure
            - alternate site
            - work area recovery
            - vital records
      strength: specific
    - id: Evidence_crisis_management
      groups:
        - match_style: word
          terms:
            - crisis management
            - crisis team
            - emergency response
            - emergency contact
            - escalation
            - notification tree
            - call tree
            - war room
            - command centre
      strength: specific
