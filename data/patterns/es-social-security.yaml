schema: testpattern/v1
name: "Número de la Seguridad Social"
slug: es-social-security
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Número de la Seguridad Social patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-spain-social-security-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b\d{12}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates.
jurisdictions:
  - eu
  - es
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - seguridad social
    - NSS
    - social security
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: "123456789012"
      description: Twelve-digit Spanish SSN
    - value: "987654321098"
      description: Another twelve-digit SSN
    - value: "456789012345"
      description: Valid format SSN
  should_not_match:
    - value: "12345678901"
      description: Too few digits (11)
    - value: "1234567890123"
      description: Too many digits (13)
false_positives:
  - description: >-
      Twelve-digit numeric sequences may match account numbers, transaction IDs, or other administrative references.
    mitigation: >-
      Require corroborative evidence keywords such as "seguridad social" or "NSS" within the proximity window.
  - description: >-
      In multiple languages, similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_es_social_security
      matches:
        - ref: Keyword_es_social_security_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_es_social_security
      matches:
        - ref: Keyword_es_social_security_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_es_social_security
  regexes:
    - id: Regex_es_social_security
      pattern: \b\d{12}\b
  keywords:
    - id: Keyword_es_social_security_specific
      groups:
        - match_style: word
          terms:
            - seguridad social
            - "número de seguridad social"
            - "número de la seguridad social"
            - text: NSS
              case_sensitive: true
            - social security number
            - "afiliación"
            - "número de afiliación"
            - TGSS
            - "tesorería general de la seguridad social"
      strength: specific
    - id: Keyword_es_social_security_general
      groups:
        - match_style: word
          terms:
            - social security
            - "seguridad social"
            - "número de cotización"
            - "cotización"
            - "prestación social"
            - worker ID
            - employee number
            - "número de trabajador"
      strength: specific
  filters:
    - id: Filter_es_social_security_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  This regex recognizes a twelve-digit Spanish social-security number when NSS or Seguridad Social terminology is nearby. The identifier can connect a person to employment, contribution, pension, or benefits administration and may strengthen a targeted enquiry or impersonation attempt. A normal match concerns one holder and does not disclose contribution history, entitlement, health information, or an authentication factor; ordinary twelve-digit references can also collide. Risk 5 and OFFICIAL fit the bounded standalone exposure, while a payroll, pension, benefits, or case record containing the number would support SENSITIVE handling.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-spain-social-security-number
    title: "Spain Social Security Number (SSN) entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
