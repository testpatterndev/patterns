schema: testpattern/v1
name: Synergy realization plans
slug: au-top500-185-synergy-realization-plans
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to synergy realization plans in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:synergy\s+realization|synergy\s+plan|cost\s+synergies|revenue\s+synergies|synergy\s+target|integration\s+savings|run[\s-]+rate\s+savings|merger\s+synergies|synergy\s+capture|post[\s-]+merger\s+value|operational\s+efficiency|headcount\s+reduction)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - synergy realization plans
    - synergy
    - realization
    - plans
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: synergy realization
      description: Primary topic phrase match
    - value: synergy plan
      description: Case-insensitive topic phrase match
    - value: cost synergies
      description: Alternative topic phrase match
    - value: revenue synergies
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to synergy realization plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_synergy_realization
      matches:
        - ref: Evidence_synergy_realization
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_synergy_realization
      matches:
        - ref: Evidence_synergy_realization
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_synergy_realization
      matches:
        - ref: Evidence_synergy_realization
  regexes:
    - id: Pattern_synergy_realization
      pattern: >-
        (?is)\b(?:synergy\s+realization|synergy\s+plan|cost\s+synergies|revenue\s+synergies|synergy\s+target|integration\s+savings|run[\s-]+rate\s+savings|merger\s+synergies|synergy\s+capture|post[\s-]+merger\s+value|operational\s+efficiency|headcount\s+reduction)\b
  keywords:
    - id: Evidence_synergy_realization
      groups:
        - match_style: word
          terms:
            - synergy realization
            - synergy plan
            - cost synergies
            - revenue synergies
            - synergy target
            - integration savings
            - run-rate savings
            - merger synergies
            - synergy capture
            - post-merger value
            - operational efficiency
            - headcount reduction
            - confidential
risk_description: >-
  The concept regex recognises synergy plans, cost or revenue synergies, integration benefits, and realization targets, with the intended unit being a transaction execution plan rather than a public claim that a merger creates savings. A real plan can expose headcount reductions, site closures, supplier changes, system consolidation, revenue assumptions, and timing, enabling employee flight, supplier pressure, competitor action, or premature market inference. The medium-confidence detector may also match investor presentations or generic integration guidance without non-public detail. Risk 8 and SENSITIVE Financial fit serious contained transaction harm; PROTECTED would require critical operational dependencies or a strategic transaction whose compromise could cause significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
