schema: testpattern/v1
name: Fraud propensity scores
slug: global-top500-370-fraud-propensity-scores
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to fraud propensity scores in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:fraud\s+propensity|fraud\s+score|fraud\s+risk|fraud\s+detection|suspicious\s+activity|fraud\s+model|risk\s+assessment|fraud\s+indicator|anomaly\s+detection|fraud\s+prevention|transaction\s+monitoring|fraud\s+alert)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - fraud propensity scores
    - fraud
    - propensity
    - scores
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: fraud propensity
      description: Primary topic phrase match
    - value: fraud score
      description: Case-insensitive topic phrase match
    - value: fraud risk
      description: Alternative topic phrase match
    - value: fraud detection
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to fraud propensity scores appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_fraud_propensity
      matches:
        - ref: Pattern_global_top500_370_fraud_propensity_scores_label_context
        - ref: Keyword_global_top500_370_fraud_propensity_scores_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_370_fraud_propensity_scores_noise_exclusion
    - confidence_level: 75
      id_match: Regex_fraud_propensity
      matches:
        - ref: Keyword_fraud_propensity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_370_fraud_propensity_scores_noise_exclusion
    - confidence_level: 65
      id_match: Regex_fraud_propensity
      matches:
        - ref: Keyword_fraud_propensity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_370_fraud_propensity_scores_noise_exclusion
  regexes:
    - id: Regex_fraud_propensity
      pattern: (?is)\b(?:fraud\s+propensity|fraud\s+score|fraud\s+risk|fraud\s+detection|suspicious\s+activity|fraud\s+model|risk\s+assessment|fraud\s+indicator|anomaly\s+detection|fraud\s+prevention|transaction\s+monitoring|fraud\s+alert)\b
    - id: Pattern_global_top500_370_fraud_propensity_scores_label_context
      pattern: (?i)\\b(?:fraud\\s+propensity\\s+scores|fraud|propensity|scores|top500)\\b
  keywords:
    - id: Keyword_fraud_propensity
      groups:
        - match_style: word
          terms:
            - fraud propensity
            - fraud score
            - fraud risk
            - fraud detection
            - suspicious activity
            - fraud model
            - risk assessment
            - fraud indicator
            - anomaly detection
            - fraud prevention
            - transaction monitoring
            - fraud alert
    - id: Keyword_global_top500_370_fraud_propensity_scores_domain_context
      groups:
        - match_style: word
          terms:
            - fraud propensity scores
            - fraud
            - propensity
            - scores
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_370_fraud_propensity_scores_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
