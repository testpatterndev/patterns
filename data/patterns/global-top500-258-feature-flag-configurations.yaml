schema: testpattern/v1
name: Feature flag configurations
slug: global-top500-258-feature-flag-configurations
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies feature flag configurations patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:feature\s+flag|feature\s+toggle|launch\s+darkly|environment\s+variable|canary\s+release|dark\s+launch|kill\s+switch|flag\s+management|remote\s+config)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - feature flag configurations
    - feature
    - flag
    - configurations
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: feature flag
      description: Primary topic phrase match
    - value: feature toggle
      description: Case-insensitive topic phrase match
    - value: launch darkly
      description: Alternative topic phrase match
    - value: environment variable
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_feature_flag_configurations
      matches:
        - ref: Pattern_global_top500_258_feature_flag_configurations_label_context
        - ref: Keyword_global_top500_258_feature_flag_configurations_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_258_feature_flag_configurations_noise_exclusion
    - confidence_level: 75
      id_match: Regex_feature_flag_configurations
      matches:
        - ref: Keyword_feature_flag_configurations
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_258_feature_flag_configurations_noise_exclusion
    - confidence_level: 65
      id_match: Regex_feature_flag_configurations
      matches:
        - ref: Keyword_feature_flag_configurations
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_258_feature_flag_configurations_noise_exclusion
  regexes:
    - id: Regex_feature_flag_configurations
      pattern: (?is)\b(?:feature\s+flag|feature\s+toggle|launch\s+darkly|environment\s+variable|canary\s+release|dark\s+launch|kill\s+switch|flag\s+management|remote\s+config)\b
    - id: Pattern_global_top500_258_feature_flag_configurations_label_context
      pattern: (?i)\\b(?:feature\\s+flag\\s+configurations|feature|flag|configurations|top500)\\b
  keywords:
    - id: Keyword_feature_flag_configurations
      groups:
        - match_style: word
          terms:
            - feature flag
            - feature toggle
            - configuration
            - launch darkly
            - split.io
            - environment variable
            - rollout
            - canary release
            - dark launch
            - kill switch
            - flag management
            - remote config
    - id: Keyword_global_top500_258_feature_flag_configurations_domain_context
      groups:
        - match_style: word
          terms:
            - feature flag configurations
            - feature
            - flag
            - configurations
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_258_feature_flag_configurations_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
