schema: testpattern/v1
name: 香港身份證
slug: hk-identity-card
version: 1.3.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects 香港身份證 patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this
  version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-hong-kong-identity-card-number Corroborative evidence: 4 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[A-Z]{1,2}\d{6}\s?\(?[0-9A]\)?(?![A-Za-z0-9])
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has strong structural constraints (specific format, prefix, or character class restrictions) that significantly reduce false positive rates. Added context gating and
  exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - hk
regulations:
  - PDPO (Hong Kong)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - HKID
    - 身份證
    - identity card
    - hong kong ID
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: A123456(7)
      description: HKID with single prefix letter
    - value: AB987654(A)
      description: HKID with two prefix letters
    - value: C456789(0)
      description: Another HKID format
  should_not_match:
    - value: A12345(7)
      description: Too few digits (5 instead of 6)
    - value: ABC123456(7)
      description: Three prefix letters (too many)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: The distinctive format with parenthesized check digit is relatively specific but may appear in formatted reference numbers.
    mitigation: The structured format with parenthesized check digit provides strong validation. Keyword context further improves accuracy.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_hk_identity_card
      matches:
        - ref: Pattern_hk_identity_card_label_context
        - ref: Keyword_hk_identity_card_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_hk_identity_card
      matches:
        - ref: Keyword_hk_identity_card
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_hk_identity_card
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_hk_identity_card
      pattern: \b[A-Z]{1,2}\d{6}\s?\(?[0-9A]\)?(?![A-Za-z0-9])
    - id: Pattern_hk_identity_card_label_context
      pattern: (?i)\b(?:香港身份證|identity|card)\b
  keywords:
    - id: Keyword_hk_identity_card
      groups:
        - match_style: word
          terms:
            - 香港身份證
            - 身份證
            - 身份證號碼
            - HKID
            - hong kong identity card
            - identity card
            - hong kong ID
            - HKID card
            - ID card number
            - 身份証
            - 香港居民身份證
      strength: specific
    - id: Keyword_hk_identity_card_domain_context
      groups:
        - match_style: word
          terms:
            - 香港身份證
            - identity
            - card
      strength: domain
risk_rating: 5
risk_description: >-
  The Hong Kong identity-card regex recognises one or two letters, six digits, and a final numeric or A check character with optional parentheses and civic context. A genuine HKID can persistently link one resident across employment, banking, tax, and public services and may enable targeted impersonation when combined with a name and birth details. The distinctive form gives high confidence but the pattern does not establish ownership, document validity, a photograph, or access to any service. Risk 5 OFFICIAL reflects bounded identity-correlation harm; SENSITIVE would require a complete card record or linkage to substantive personal or financial information.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-hong-kong-identity-card-number
    title: Hong Kong Identity Card (HKID) Number entity definition - Microsoft Learn
