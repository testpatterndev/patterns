schema: testpattern/v1
name: Design process rules
slug: au-top500-219-design-process-rules
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to design process rules in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:design\s+process\s+rules|design\s+rules|design\s+guidelines|design\s+methodology|proprietary\s+design|design\s+specification|engineering\s+standard|intellectual\s+property|trade\s+secret|design\s+constraint)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - design process rules
    - design
    - process
    - rules
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: design process rules
      description: Primary topic phrase match
    - value: design rules
      description: Case-insensitive topic phrase match
    - value: design guidelines
      description: Alternative topic phrase match
    - value: design methodology
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to design process rules appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_design_process_rules
      matches:
        - ref: Evidence_design_process_rules
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_design_process_rules
      matches:
        - ref: Evidence_design_process_rules
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_design_process_rules
      matches:
        - ref: Evidence_design_process_rules
  regexes:
    - id: Pattern_design_process_rules
      pattern: (?is)\b(?:design\s+process\s+rules|design\s+rules|design\s+guidelines|design\s+methodology|proprietary\s+design|design\s+specification|engineering\s+standard|intellectual\s+property|trade\s+secret|design\s+constraint)\b
  keywords:
    - id: Evidence_design_process_rules
      groups:
        - match_style: word
          terms:
            - design process rules
            - design rules
            - design guidelines
            - design methodology
            - proprietary design
            - design specification
            - engineering standard
            - intellectual property
            - trade secret
            - design constraint
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
references:
  - https://www.safeworkaustralia.gov.au/doc/model-code-practice-managing-risks-plant-workplace
  - https://www.productsafety.gov.au/product-safety-laws
