schema: testpattern/v1
name: QLD School Incident Report
slug: au-qld-school-incident-report
version: 1.2.0
type: keyword_list
description: Detects QLD school incident reports containing student behavioural and disciplinary details.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - children
  - education
  - government
test_cases:
  should_match:
    - value: 'School incident report: student behaviour and disciplinary suspension'
      description: Test match 1
    - value: OneSchool behavioural incident record with student welfare assessment
      description: Test match 2
    - value: QLD school discipline exclusion report and duty of care documentation
      description: Test match 3
  should_not_match:
    - value: Traffic incident report
      description: Non-match 1
    - value: The school reopened after holidays
      description: Non-match 2
false_positives:
  - description: Generic incident reports in non-school contexts.
    mitigation: Require school-specific terms like OneSchool, student behaviour, or school discipline.
exports:
  - yaml
scope: narrow
risk_rating: 7
risk_description: School incident exposure reveals student behavioural and disciplinary details.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_school_incident
      matches:
        - ref: Evidence_incident_behaviour
        - ref: Evidence_qld_education_forms
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_school_incident
      matches:
        - ref: Evidence_incident_behaviour
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_education_incident
      matches:
        - ref: Evidence_qld_government
  regexes:
    - id: Pattern_school_incident
      pattern: (?i)\b(?:(?:school|student)\s+incident\s+(?:report|notification)|behaviour\s+(?:management|support)\s+plan)\b
    - id: Pattern_education_incident
      pattern: (?i)\b(?:student\s+code\s+of\s+conduct|disciplinary\s+(?:action|consequence)|behaviour\s+incident)\b
  keywords:
    - id: Evidence_incident_behaviour
      groups:
        - match_style: word
          terms:
            - incident report
            - behaviour management
            - behaviour support
            - student code of conduct
            - disciplinary
            - suspension
            - exclusion
            - risk assessment
      strength: specific
    - id: Evidence_qld_education_forms
      groups:
        - match_style: word
          terms:
            - Department of Education
            - Education Queensland
            - State School
            - SEF-1
            - ppr.qed.qld.gov.au
            - education.qld.gov.au
            - eq.edu.au
      strength: specific
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
created: '2026-02-09'
updated: '2026-07-04'
changelog:
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Mapped non-canonical confidence 80 to 75.
author: testpattern-community
license: MIT
keywords:
  - school incident
  - incident report
  - student behaviour
  - student behavior
  - disciplinary
  - suspension
  - exclusion
  - OneSchool
  - school discipline
  - behavioural incident
  - student welfare
  - duty of care
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 90 to 85.'
      - 'Mapped non-canonical confidence 80 to 75.'
      - 'Mapped non-canonical confidence 70 to 65.'
      - 'Aligned recommended_confidence to 75.'
