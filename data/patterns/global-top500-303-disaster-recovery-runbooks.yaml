schema: testpattern/v1
name: Disaster recovery runbooks
slug: global-top500-303-disaster-recovery-runbooks
version: 1.3.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies disaster recovery runbooks patterns in security and access control contexts. Detects potential exposure
  of sensitive security information in international systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative
  evidence: 6 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test
  text.'
pattern: (?i)\b(?:disaster\s+recovery|dr\s+runbook|rto|rpo|recovery\s+time\s+objective)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - disaster recovery runbooks
  - disaster
  - recovery
  - runbooks
  - operations
  - resilience
  proximity: 300
test_cases:
  should_match:
  - value: Disaster recovery
    description: Topic phrase present
  - value: disaster recovery
    description: Topic phrase, lowercase
  - value: this record references the disaster recovery held on file
    description: Topic phrase within surrounding text
  should_not_match:
  - value: unrelated generic text
    description: No relevant phrase context
  - value: placeholder value 12345
    description: Random text should not match phrase marker
  - value: generic policy prose without anchors
    description: Should reject generic mentions without structural anchor terms
  - value: template example placeholder record identifier
    description: Template/sample context should be excluded even when anchor words are present
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_disaster_recovery
    matches:
    - ref: Keyword_disaster_recovery
    - ref: Pattern_global_top500_303_disaster_recovery_runbooks_label_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_disaster_recovery
    matches:
    - ref: Keyword_disaster_recovery
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_disaster_recovery
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_disaster_recovery
    pattern: (?i)\b(?:disaster\s+recovery|dr\s+runbook|rto|rpo|recovery\s+time\s+objective)\b
  - id: Pattern_global_top500_303_disaster_recovery_runbooks_label_context
    pattern: (?i)\b(?:disaster\s+recovery\s+runbooks)\b
  keywords:
  - id: Keyword_disaster_recovery
    groups:
    - match_style: word
      terms:
      - disaster recovery
      - DR runbook
      - recovery time objective
      - recovery point objective
      - business continuity
      - failover procedure
      - runbook
      - recovery plan
      - backup restoration
      - service restoration
      - incident commander
      - communication plan
    strength: specific
  - id: Keyword_global_top500_303_disaster_recovery_runbooks_domain_context
    groups:
    - match_style: word
      terms:
      - disaster recovery runbooks
      - disaster
      - recovery
      - runbooks
    strength: domain
risk_description: This concept detector finds disaster-recovery, DR-runbook, RTO, RPO, or recovery-time-objective terminology
  associated with recovery procedures. A genuine runbook can reveal restoration order, alternate resources, responsible teams,
  technical steps, and recovery dependencies that an attacker could disrupt during an outage. The normal scale is one service
  or recovery domain and its operators, while policy summaries, training, and public continuity guidance can produce topic
  matches. Risk 7 SENSITIVE reflects credible moderate operational harm; PROTECTED would require a critical-service runbook
  or evidence that disclosure would cause significant failure.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
