schema: testpattern/v1
name: Guarantor identity and financial data
slug: au-top500-136-guarantor-identity-and-financial-data
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to guarantor identity and financial data in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:guarantor\s+identity\s+and\s+financial\s+datas?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - guarantor identity and financial data
    - guarantor
    - identity
    - financial
    - data
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Guarantor identity and financial data'
      description: Topic phrase present
    - value: 'guarantor identity and financial data'
      description: Topic phrase, lowercase
    - value: 'this record references the guarantor identity and financial data held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_guarantor_data
      matches:
        - ref: Evidence_guarantor_data
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_guarantor_data
      matches:
        - ref: Evidence_guarantor_data
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_guarantor_data
      matches:
        - ref: Evidence_guarantor_data
  regexes:
    - id: Pattern_guarantor_data
      pattern: (?i)\b(?:guarantor\s+identity\s+and\s+financial\s+datas?)\b
    - id: Pattern_au_top500_136_guarantor_identity_and_financial_data_label_context
      pattern: (?i)\b(?:guarantor\s+identity\s+and\s+financial\s+data)\b
  keywords:
    - id: Evidence_guarantor_data
      groups:
        - match_style: word
          terms:
            - guarantor
            - guarantor identity
            - financial guarantee
            - loan guarantor
            - personal guarantee
            - guarantor details
            - credit assessment
            - lending
            - collateral
            - surety
    - id: Keyword_au_top500_136_guarantor_identity_and_financial_data_domain_context
      groups:
        - match_style: word
          terms:
            - guarantor identity and financial data
            - guarantor
            - identity
            - financial
risk_description: >-
  The concept regex looks for guarantor, guarantee, income, assets, liabilities, net worth, and financial-statement language with context gates and sample exclusions, so it can match a narrative reference without a full dossier. When a record actually links a guarantor's identity to financial position and a loan guarantee, disclosure can enable impersonation, coercion, or misuse in the associated lending relationship. The broad phrase branch has limited standalone impact, whereas a populated file creates direct financial and privacy harm for one guarantor. Risk 4 and OFFICIAL fit the topic or reference-level match; SENSITIVE requires confirmed person-linked income, asset, liability, contact, and guarantee details forming the composite record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
