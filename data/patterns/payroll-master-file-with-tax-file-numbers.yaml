schema: testpattern/v1
name: Payroll Master File with Tax File Numbers
slug: payroll-master-file-with-tax-file-numbers
version: 1.2.1
type: regex
engine: universal
description: Detects bulk payroll data files containing employee names, Tax File Numbers (TFNs), bank account details, and salary information. Disclosure enables mass identity theft, fraudulent tax returns, and targeted social engineering.
operation: Regex for canonical nine-digit TFN format within 300 characters of payroll keywords (payroll, TFN, tax file, salary). The TFN regex uses the Australian mod-11 validator and sentinel/test filters, combined with BSB format regex or bank account terms. High confidence when multiple validated TFNs appear in the same document indicating a bulk file.
pattern: \b\d{3}[\s\-]?\d{3}[\s\-]?\d{3}\b
confidence: high
confidence_justification: 'High confidence: checksum-valid TFN-format numbers co-occurring with payroll context keywords and BSB patterns in a document strongly indicates a payroll master file. The TFN validator plus sentinel/test filters reduce generic digit-run, phone-number, and placeholder false positives.'
jurisdictions:
  - au
regulations:
- "Criminal Code 1899 (Qld)"
- "Privacy Act 1988 (Cth)"
- "Tax Admin Act 1953 (Cth)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - payroll
    - TFN
    - tax file number
    - salary
    - remuneration
    - bank account
    - direct deposit
    - master file
    - payroll extract
    - STP
    - Single Touch Payroll
    - BSB
    - gross pay
    - net pay
    - PAYG
  proximity: 300
  keyword_lists:

    - corporate-finance

    - government-services
test_cases:
  should_match:
    - value: 'Payroll Master File Extract - Department of Health. Employee: Smith, John. TFN: 485 564 502. BSB: 064-000. Account: 12345678. Gross Salary: $95,420. PAYG: $24,108. Employee: Jones, Mary. TFN: 590 821 738. BSB: 084-004. Account: 87654321. Gross Salary: $102,350.'
      description: Bulk payroll file with multiple TFNs, BSBs, and salary data
    - value: 'PROTECTED — STP Payroll Data Export. Single Touch Payroll extract for pay period ending 15 Feb 2026. Contains 2,847 employee records with tax file numbers and bank account details for direct deposit processing. Example record TFN: 123 456 782.'
      description: STP bulk payroll export file description
    - value: 'Payroll master file export — Department of Education. Employee records: Lee, Anna. TFN: 459 599 230. BSB: 034-002. Account: 55667788. Gross pay: $88,640. PAYG: $21,300. Employee: Tran, Minh. TFN: 876 543 210. BSB: 062-001. Account: 33445566. Gross pay: $97,210.'
      description: Bulk payroll master file with multiple checksum-valid TFNs, BSBs and salaries
  should_not_match:
    - value: Please provide your Tax File Number on the employment form. Your TFN is used for PAYG tax withholding purposes. Contact HR for assistance.
      description: General HR form requesting a single TFN — not bulk data
    - value: The payroll department processes many thousands of payments each fortnight. Total annual salary expenditure is reported in aggregate only, with no individual employee records.
      description: Aggregate payroll statistics without individual records
    - value: 'Payroll contact list. Mobile: 0412 345 678. Salary query contact only.'
      description: Australian mobile phone number in payroll context must not satisfy the TFN anchor
    - value: 'Payroll template. TFN: 00 000 000. BSB: 00-000. Account placeholder only.'
      description: Mis-formatted placeholder identifiers (short groups) are structurally rejected; full all-zero sentinels like 000 000 000 are additionally dropped by AllDigitsSameFilter/TextMatchFilter in the SIT
false_positives:
  - description: HR onboarding forms requesting a single employee's TFN
    mitigation: Require multiple TFN-pattern matches (3+) in the same document to indicate bulk data rather than a single record
  - description: Aggregate payroll reports with summary statistics but no individual records
    mitigation: Require co-occurrence of TFN-format numbers with payroll context rather than summary dollar amounts alone
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_payroll_master_file_with_tax_file_numbers_tax_file_number_format_8_9_digits
      matches:
        - ref: Evidence_payroll_master_file_with_tax_file_numbers_primary
        - ref: Evidence_payroll_master_file_with_tax_file_numbers_banking
        - ref: Evidence_payroll_master_file_with_tax_file_numbers_bulk_indicators
        - ref: Evidence_payroll_master_file_with_tax_file_numbers_payroll_detail
        - ref: Pattern_payroll_master_file_with_tax_file_numbers_bsb_format_e_g_064_000_or_064000
        - ref: Pattern_payroll_master_file_with_tax_file_numbers_dollar_amounts_for_salary_figures
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_payroll_master_file_with_tax_file_numbers_exclusion
    - confidence_level: 75
      id_match: Pattern_payroll_master_file_with_tax_file_numbers_tax_file_number_format_8_9_digits
      matches:
        - ref: Evidence_payroll_master_file_with_tax_file_numbers_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_payroll_master_file_with_tax_file_numbers_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_payroll_master_file_with_tax_file_numbers_tax_file_number_format_8_9_digits
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_payroll_master_file_with_tax_file_numbers_exclusion
  regexes:
    - id: Pattern_payroll_master_file_with_tax_file_numbers_tax_file_number_format_8_9_digits
      pattern: \b\d{3}[\s\-]?\d{3}[\s\-]?\d{3}\b
      validators:
        - ref: Validator_australian_tfn
    - id: Pattern_payroll_master_file_with_tax_file_numbers_bsb_format_e_g_064_000_or_064000
      pattern: \b\d{3}-?\d{3}\b
    - id: Pattern_payroll_master_file_with_tax_file_numbers_dollar_amounts_for_salary_figures
      pattern: \$[\d,.]+
  keywords:
    - id: Evidence_payroll_master_file_with_tax_file_numbers_primary
      groups:
        - match_style: word
          terms:
            - payroll
            - text: TFN
              case_sensitive: true
            - tax file number
            - tax file
            - salary
            - remuneration
      strength: domain
    - id: Evidence_payroll_master_file_with_tax_file_numbers_banking
      groups:
        - match_style: word
          terms:
            - text: BSB
              case_sensitive: true
            - bank account
            - direct deposit
            - account number
            - text: EFT
              case_sensitive: true
      strength: specific
    - id: Evidence_payroll_master_file_with_tax_file_numbers_bulk_indicators
      groups:
        - match_style: word
          terms:
            - master file
            - payroll extract
            - text: STP
              case_sensitive: true
            - Single Touch Payroll
            - data export
            - bulk
            - employee records
      strength: specific
    - id: Evidence_payroll_master_file_with_tax_file_numbers_payroll_detail
      groups:
        - match_style: word
          terms:
            - gross pay
            - net pay
            - PAYG
            - superannuation
            - leave balance
            - pay period
      strength: specific
    - id: Filter_payroll_master_file_with_tax_file_numbers_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - example
            - form
            - please provide your
            - how to
            - training
      strength: noise
  validators:
    - id: Validator_australian_tfn
      type: Checksum
      params:
        - name: Weights
          value: 1, 4, 3, 7, 5, 8, 6, 9, 10
        - name: Modulo
          value: '11'
        - name: Result
          value: '0'
  filters:
    - id: Guard_payroll_tfn_same_digits
      type: AllDigitsSameFilter
    - id: Guard_payroll_tfn_exclude_test
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms:
        - "000000000"
        - "000 000 000"
        - "000-000-000"
        - "123456789"
        - "123 456 789"
        - "123-456-789"
        - "987654321"
        - "987 654 321"
        - "987-654-321"

risk_rating: 10
risk_description: Bulk payroll data containing employee names, TFNs, bank accounts, and salary information; disclosure enables mass identity theft and fraudulent tax returns.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Financial
references: []
