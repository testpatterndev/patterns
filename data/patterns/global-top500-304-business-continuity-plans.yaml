schema: testpattern/v1
name: Business continuity plans
slug: global-top500-304-business-continuity-plans
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies business continuity plans patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-education. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:business\s+continuity|continuity\s+plan|crisis\s+management|business\s+impact\s+analysis|critical\s+functions|alternate\s+site|recovery\s+strategy|essential\s+services|maximum\s+tolerable\s+downtime|succession\s+planning|emergency\s+operations)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - business continuity plans
    - business
    - continuity
    - plans
    - operations
    - resilience
  proximity: 300
  keyword_lists:
    - industry-education
test_cases:
  should_match:
    - value: business continuity
      description: Primary topic phrase match
    - value: continuity plan
      description: Case-insensitive topic phrase match
    - value: crisis management
      description: Alternative topic phrase match
    - value: business impact analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_business_continuity
      matches:
        - ref: Pattern_global_top500_304_business_continuity_plans_label_context
        - ref: Keyword_global_top500_304_business_continuity_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_business_continuity
      matches:
        - ref: Keyword_business_continuity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_business_continuity
      matches:
        - ref: Keyword_business_continuity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_business_continuity
      pattern: >-
        (?is)\b(?:business\s+continuity|continuity\s+plan|crisis\s+management|business\s+impact\s+analysis|critical\s+functions|alternate\s+site|recovery\s+strategy|essential\s+services|maximum\s+tolerable\s+downtime|succession\s+planning|emergency\s+operations)\b
    - id: Pattern_global_top500_304_business_continuity_plans_label_context
      pattern: (?i)\\b(?:business\\s+continuity\\s+plans|business|continuity|plans|top500)\\b
  keywords:
    - id: Keyword_business_continuity
      groups:
        - match_style: word
          terms:
            - business continuity
            - continuity plan
            - BCP
            - crisis management
            - business impact analysis
            - critical functions
            - alternate site
            - recovery strategy
            - essential services
            - maximum tolerable downtime
            - succession planning
            - emergency operations
    - id: Keyword_global_top500_304_business_continuity_plans_domain_context
      groups:
        - match_style: word
          terms:
            - business continuity plans
            - business
            - continuity
            - plans
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
