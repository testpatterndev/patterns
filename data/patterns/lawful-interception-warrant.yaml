schema: testpattern/v1
name: Lawful Interception Warrant
slug: lawful-interception-warrant
version: 1.3.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects documents containing telecommunications interception warrants and stored communications warrants issued under the Telecommunications (Interception and Access) Act 1979 (Cth). Disclosure of the existence of an interception warrant is a criminal offence under s.63 of the TIA Act and alerts targets to switch to unmonitored channels.
operation: 'Regex for TIA Act warrant reference numbers combined with keyword proximity: primary keywords (telecommunications interception, TI warrant, TIA Act, interception warrant, stored communications warrant, B-party warrant) within 300 characters of target identifiers (phone numbers, IMEI, email). Document markers referencing s.6 secrecy provisions.'
pattern: (?i)\b(telecommunications\s+interception|TI\s+warrant|TIA\s+Act|interception\s+warrant|stored\s+communications\s+warrant|preservation\s+notice|B-party\s+warrant|lawful\s+interception)\b
confidence: medium
confidence_justification: 'Medium confidence: the combination of TIA Act-specific terminology with warrant reference numbers and target identifiers is highly distinctive. These terms rarely appear together outside genuine interception warrant documents. The s.63 secrecy provisions referenced in these documents are unique identifiers.'
jurisdictions:
  - au
regulations:
- "PPRA 2000 (Qld)"
- "TIA Act 1979 (Cth)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - TIA Act
    - section 63
    - s.63
    - secrecy provision
    - interception agency
    - issuing authority
    - eligible judge
    - nominated AAT member
    - telephone intercept
    - stored communications
    - preservation notice
    - target service
    - IMEI
    - interception product
  proximity: 300
  keyword_lists:

    - law-enforcement

    - government-services
    - en-government-classification
test_cases:
  should_match:
    - value: 'PROTECTED Law-Enforcement. Telecommunications Interception Warrant — TIA/2025/QPS/00342. Issued by eligible Judge under TIA Act s.46. Target service: mobile number 0412 XXX 789, IMEI 35467209XXXXXX. Interception warrant period: 90 days commencing 15 February 2025. Subject: Operation FALCON.'
      description: TIA Act interception warrant with warrant reference number and target service details
    - value: 'Stored communications warrant application. Reference: SCW-2025-0156. Pursuant to Telecommunications (Interception and Access) Act 1979 (Cth) Part 3-3. Stored communications held by carrier Telstra for target email account. Secrecy obligations under s.63 apply to all recipients of this document.'
      description: Stored communications warrant application with legislative references
    - value: B-party warrant application. The subject of the interception warrant TIA/2025/QPS/00298 has been communicating with an unidentified B-party using prepaid SIM. Application for B-party warrant to identify the associate. TIA Act secrecy provisions noted — disclosure of this warrant is a criminal offence.
      description: B-party warrant application referencing existing interception warrant
  should_not_match:
    - value: The Parliamentary Joint Committee on Intelligence and Security tabled its annual review of the Telecommunications (Interception and Access) Act 1979. The report noted that 3,247 interception warrants were issued nationally during the reporting period.
      description: Parliamentary committee report with aggregate warrant statistics
    - value: A telecommunications law textbook chapter explaining the legal framework for interception warrants under the TIA Act. The chapter discusses the requirements for issuing an interception warrant and the secrecy provisions in s.63.
      description: Legal textbook explaining TIA Act framework
    - value: ABC News reported that federal police obtained telecommunications interception warrants as part of a drug trafficking investigation. Three men were arrested following the 18-month investigation.
      description: News article about a concluded investigation mentioning warrants
false_positives:
  - description: Parliamentary reports and reviews discussing TIA Act warrant statistics in aggregate
    mitigation: 'Negative keyword exclusion: ''parliamentary'', ''annual review'', ''reporting period'', ''tabled'', ''committee''. Require proximity to specific target identifiers.'
  - description: Legal textbooks and academic materials explaining interception law
    mitigation: 'Negative keyword exclusion: ''textbook'', ''academic'', ''university'', ''chapter'', ''legal framework'', ''explains'''
  - description: News articles reporting on completed investigations that involved warrants
    mitigation: 'Negative keyword exclusion: ''media release'', ''news'', ''reported'', ''arrested'', ''convicted'', ''sentenced'', ''court heard'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_lawful_interception_warrant_tia_warrant_reference
      matches:
        - ref: Evidence_lawful_interception_warrant_primary_keywords
        - ref: Evidence_lawful_interception_warrant_classification_markers
        - ref: Evidence_lawful_interception_warrant_corroborative_terms
        - ref: Pattern_lawful_interception_warrant_scw_reference
        - ref: Pattern_lawful_interception_warrant_interception_terms
        - ref: Pattern_lawful_interception_warrant_imei_pattern
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_lawful_interception_warrant_exclusion
    - confidence_level: 75
      id_match: Pattern_lawful_interception_warrant_tia_warrant_reference
      matches:
        - ref: Evidence_lawful_interception_warrant_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_lawful_interception_warrant_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_lawful_interception_warrant_tia_warrant_reference
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_lawful_interception_warrant_exclusion
  regexes:
    - id: Pattern_lawful_interception_warrant_tia_warrant_reference
      pattern: \bTIA[/\-]\d{4}[/\-][A-Z]{2,5}[/\-]\d{3,6}\b
    - id: Pattern_lawful_interception_warrant_scw_reference
      pattern: \bSCW-\d{4}-\d{3,5}\b
    - id: Pattern_lawful_interception_warrant_interception_terms
      pattern: (?i)\b(telecommunications\s+interception|TI\s+warrant|TIA\s+Act|interception\s+warrant|stored\s+communications\s+warrant|preservation\s+notice|B-party\s+warrant)\b
    - id: Pattern_lawful_interception_warrant_imei_pattern
      pattern: \bIMEI\s*:?\s*\d{14,15}\b
  keywords:
    - id: Evidence_lawful_interception_warrant_primary_keywords
      groups:
        - match_style: word
          terms:
            - telecommunications interception
            - TI warrant
            - TIA Act
            - interception warrant
            - stored communications warrant
            - preservation notice
            - B-party warrant
            - lawful interception
            - interception product
            - target service
      strength: specific
    - id: Evidence_lawful_interception_warrant_classification_markers
      groups:
        - match_style: word
          terms:
            - SECRECY PROVISION
            - s.63
      strength: specific
    - id: Evidence_lawful_interception_warrant_corroborative_terms
      groups:
        - match_style: word
          terms:
            - eligible judge
            - AAT member
            - issuing authority
            - interception agency
            - secrecy provision
            - section 63
            - IMEI
            - target service
            - mobile number
            - carrier
            - interception product
            - warrant period
      strength: specific
    - id: Filter_lawful_interception_warrant_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - annual report
            - annual review
            - parliamentary
            - committee
            - textbook
            - academic
            - university
            - news article
            - reported
            - arrested
            - convicted
            - sentenced
            - tabled

      strength: noise
risk_rating: 10
risk_description: "Telecommunications interception warrants revealing monitored targets; disclosure is a criminal offence under TIA Act and alerts targets to surveillance."
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Law-Enforcement
references: []
