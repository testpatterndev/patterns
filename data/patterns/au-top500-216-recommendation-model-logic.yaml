schema: testpattern/v1
name: Recommendation model logic
slug: au-top500-216-recommendation-model-logic
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to recommendation model logic in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:recommendation\s+model\s+logic|recommendation\s+engine|recommendation\s+algorithm|collaborative\s+filtering|content[\s-]+based\s+filtering|model\s+weights|feature\s+engineering|proprietary\s+model|trade\s+secret|scoring\s+algorithm)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - recommendation model logic
    - recommendation
    - model
    - logic
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: recommendation model logic
      description: Primary topic phrase match
    - value: recommendation engine
      description: Case-insensitive topic phrase match
    - value: recommendation algorithm
      description: Alternative topic phrase match
    - value: collaborative filtering
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to recommendation model logic appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_recommendation_model_logic
      matches:
        - ref: Evidence_recommendation_model_logic
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_recommendation_model_logic
      matches:
        - ref: Evidence_recommendation_model_logic
    - confidence_level: 65
      id_match: Pattern_recommendation_model_logic
      matches:
        - ref: Evidence_recommendation_model_logic
  regexes:
    - id: Pattern_recommendation_model_logic
      pattern: (?is)\b(?:recommendation\s+model\s+logic|recommendation\s+engine|recommendation\s+algorithm|collaborative\s+filtering|content[\s-]+based\s+filtering|model\s+weights|feature\s+engineering|proprietary\s+model|trade\s+secret|scoring\s+algorithm)\b
  keywords:
    - id: Evidence_recommendation_model_logic
      groups:
        - match_style: word
          terms:
            - recommendation model logic
            - recommendation engine
            - recommendation algorithm
            - collaborative filtering
            - content-based filtering
            - model weights
            - feature engineering
            - proprietary model
            - trade secret
            - scoring algorithm
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.accc.gov.au/business/competition-and-exemptions
  - https://www.accc.gov.au/business/competition-and-exemptions/misuse-of-market-power
