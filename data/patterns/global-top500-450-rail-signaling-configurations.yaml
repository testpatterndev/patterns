schema: testpattern/v1
name: Rail signaling configurations
slug: global-top500-450-rail-signaling-configurations
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to rail signaling configurations in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:rail\s+signaling|signal\s+configuration|block\s+section|train\s+control|track\s+circuit|points\s+machine|route\s+setting|aspect\s+sequence|positive\s+train\s+control|wayside\s+signal)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - rail signaling configurations
    - rail
    - signaling
    - configurations
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: rail signaling
      description: Primary topic phrase match
    - value: signal configuration
      description: Case-insensitive topic phrase match
    - value: block section
      description: Alternative topic phrase match
    - value: train control
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: rail signal configuration
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to rail signaling configurations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_rail_signaling_config
      matches:
        - ref: Pattern_global_top500_450_rail_signaling_configurations_label_context
        - ref: Keyword_global_top500_450_rail_signaling_configurations_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_450_rail_signaling_configurations_noise_exclusion
    - confidence_level: 75
      id_match: Regex_rail_signaling_config
      matches:
        - ref: Keyword_rail_signaling_config
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_450_rail_signaling_configurations_noise_exclusion
    - confidence_level: 65
      id_match: Regex_rail_signaling_config
      matches:
        - ref: Keyword_rail_signaling_config
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_450_rail_signaling_configurations_noise_exclusion
  regexes:
    - id: Regex_rail_signaling_config
      pattern: (?is)\b(?:rail\s+signaling|signal\s+configuration|block\s+section|train\s+control|track\s+circuit|points\s+machine|route\s+setting|aspect\s+sequence|positive\s+train\s+control|wayside\s+signal)\b
    - id: Pattern_global_top500_450_rail_signaling_configurations_label_context
      pattern: (?i)\\b(?:rail\\s+signaling\\s+configurations|rail|signaling|configurations|top500)\\b
  keywords:
    - id: Keyword_rail_signaling_config
      groups:
        - match_style: word
          terms:
            - rail signaling
            - interlocking
            - signal configuration
            - block section
            - train control
            - track circuit
            - points machine
            - route setting
            - aspect sequence
            - ETCS
            - positive train control
            - wayside signal
    - id: Keyword_global_top500_450_rail_signaling_configurations_domain_context
      groups:
        - match_style: word
          terms:
            - rail signaling configurations
            - rail
            - signaling
            - configurations
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_450_rail_signaling_configurations_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
