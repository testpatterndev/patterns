schema: testpattern/v1
name: Rail signaling configurations
slug: global-top500-450-rail-signaling-configurations
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive rail-signalling and train-control configuration records. Topic phrases are
  retained for discovery; enforcement requires interlocking, route-table, block, track-circuit, aspect,
  point-machine, or route-locking configuration content, and high confidence also requires a deployed
  control area, route, signal, track-circuit, station, or software reference.
operation: >-
  Regex_rail_signaling_config recognises rail-signalling, interlocking, route-setting, block, track
  circuit, point-machine, ETCS, and train-control configuration topics. The topic alone is
  discovery-only at 65. Configuration-table or logic content raises it to 75; that content plus
  deployed route, signal, track, station, control-area, or version detail reaches 85. Enforcing tiers
  reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:rail\s+signal(?:l)?ing\s+configuration|rail\s+signal\s+configuration|interlocking\s+configuration|route\s+setting\s+table|block\s+section\s+configuration|track\s+circuit\s+configuration|points\s+machine\s+configuration|aspect\s+sequence\s+table|ETCS\s+configuration|positive\s+train\s+control\s+configuration)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires signalling configuration content rather than a rail-control topic alone.
  High confidence adds deployed route, signal, track, station, control-area, or software detail.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - rail signaling configurations
    - rail
    - signaling
    - configurations
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: rail signaling configuration
      description: Low-tier probe - signalling topic without configuration content
    - value: 'Rail signaling configuration: interlocking table defines route locking, aspect sequence, block section, and point machine states'
      description: Medium-tier probe - substantive configuration content without deployed identifiers
    - value: 'Production rail signaling configuration for Central control area: route table entry R-17, signal ID S204, track circuit ID TC-12, overlap distance 180 m'
      description: High-tier probe - configuration content with deployed route, signal, track, and distance detail
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: rail signal configuration
      description: Bare topic phrase surfaces only in discovery
    - value: 'The public signalling standard explains interlocking principles.'
      description: Public standard without deployed configuration content
    - value: 'Training example: production rail signaling configuration route R-17, signal ID S204, track circuit ID TC-12'
      description: Explicit training content must not enforce
false_positives:
  - description: Rail standards, procurement documents, and signalling courses discuss interlocking, blocks, track circuits, point machines, routes, and aspects without exposing a deployed configuration.
    mitigation: Keep topic-only matches discovery-only and require configuration-table or route-logic content for enforcement.
  - description: Training simulations can contain realistic route, signal, track-circuit, station, and software identifiers.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_rail_signaling_config
      matches:
        - ref: Evidence_rail_configuration_content
        - ref: Evidence_rail_deployed_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_rail_signaling_config
      matches:
        - ref: Evidence_rail_configuration_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_rail_signaling_config
  regexes:
    - id: Regex_rail_signaling_config
      pattern: >-
        (?is)\b(?:rail\s+signal(?:l)?ing\s+configuration|rail\s+signal\s+configuration|interlocking\s+configuration|route\s+setting\s+table|block\s+section\s+configuration|track\s+circuit\s+configuration|points\s+machine\s+configuration|aspect\s+sequence\s+table|ETCS\s+configuration|positive\s+train\s+control\s+configuration)\b
  keywords:
    - id: Evidence_rail_configuration_content
      groups:
        - match_style: word
          terms:
            - interlocking table
            - route table
            - route locking
            - block section
            - aspect sequence
            - track circuit assignment
            - axle counter section
            - point machine
            - overlap distance
      strength: domain
    - id: Evidence_rail_deployed_context
      groups:
        - match_style: word
          terms:
            - production
            - deployed
            - control area
            - station ID
            - line ID
            - route ID
            - signal ID
            - track circuit ID
            - points ID
            - software version
            - overlap distance
      strength: specific
risk_description: >-
  The concept pattern recognizes rail signaling, signal configurations, block sections, train control, track circuits, point machines, route setting, aspect sequences, positive train control, and wayside signals rather than parsing a deployed configuration. A genuine configuration can expose route logic, control boundaries, and field equipment relationships that assist targeted disruption, unsafe routing attempts, or evasion of railway safeguards. The normal affected unit is one line, control area, or signaling installation and its passengers and operators, while standards, training diagrams, and product documentation remain plausible matches. For the global catalogue analogue, the confirmed substantive record is the consequence unit. Live interlocking, route, block, track-circuit and axle-counter configuration can support unsafe interference or major transport disruption. Significant continuity and life-safety damage is inherent. Risk 10 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require network/site identity and actual route/interlocking/configuration tables; standards and procurement material audit only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
