schema: testpattern/v1
name: Mission briefing packages
slug: au-top500-423-mission-briefing-packages
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to mission briefing packages in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:mission\s+briefing\s+packages|mission\s+briefing|operational\s+briefing|intelligence\s+briefing|situation\s+report|mission\s+planning|pre[\s-]+deployment\s+briefing|command\s+briefing|threat\s+assessment|defence\s+intelligence|mission\s+objectives|rules\s+of\s+engagement)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - mission briefing packages
    - mission
    - briefing
    - packages
    - defense
    - intelligence
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: mission briefing packages
      description: Primary topic phrase match
    - value: mission briefing
      description: Case-insensitive topic phrase match
    - value: operational briefing
      description: Alternative topic phrase match
    - value: intelligence briefing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to mission briefing packages appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_mission_briefing_packages
      matches:
        - ref: Evidence_mission_briefing_packages
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_mission_briefing_packages
      matches:
        - ref: Evidence_mission_briefing_packages
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_mission_briefing_packages
      matches:
        - ref: Evidence_mission_briefing_packages
  regexes:
    - id: Pattern_mission_briefing_packages
      pattern: (?is)\b(?:mission\s+briefing\s+packages|mission\s+briefing|operational\s+briefing|intelligence\s+briefing|situation\s+report|mission\s+planning|pre[\s-]+deployment\s+briefing|command\s+briefing|threat\s+assessment|defence\s+intelligence|mission\s+objectives|rules\s+of\s+engagement)\b
  keywords:
    - id: Evidence_mission_briefing_packages
      groups:
        - match_style: word
          terms:
            - mission briefing packages
            - mission briefing
            - operational briefing
            - intelligence briefing
            - situation report
            - mission planning
            - pre-deployment briefing
            - command briefing
            - threat assessment
            - defence intelligence
            - mission objectives
            - rules of engagement
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.protectivesecurity.gov.au/
  - https://www.defence.gov.au/business-industry/export/controls
