schema: testpattern/v1
name: Loan covenant compliance records
slug: global-top500-137-loan-covenant-compliance-records
version: 1.1.1
type: regex
engine: boost_regex
description: Detects references to loan covenant compliance records in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:loan\s+covenant|covenant\s+compliance|debt\s+service\s+coverage|financial\s+covenant|covenant\s+breach|covenant\s+waiver|leverage\s+ratio|interest\s+coverage\s+ratio|loan\s+agreement|borrower\s+compliance|covenant\s+testing)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - loan covenant compliance records
    - loan
    - covenant
    - compliance
    - records
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: loan covenant
      description: Primary topic phrase match
    - value: covenant compliance
      description: Case-insensitive topic phrase match
    - value: debt service coverage
      description: Alternative topic phrase match
    - value: financial covenant
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_loan_covenant_compliance
      matches:
        - ref: Pattern_global_top500_137_loan_covenant_compliance_records_label_context
        - ref: Keyword_global_top500_137_loan_covenant_compliance_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_loan_covenant_compliance
      matches:
        - ref: Keyword_loan_covenant_compliance
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_loan_covenant_compliance
      pattern: >-
        (?is)\b(?:loan\s+covenant|covenant\s+compliance|debt\s+service\s+coverage|financial\s+covenant|covenant\s+breach|covenant\s+waiver|leverage\s+ratio|interest\s+coverage\s+ratio|loan\s+agreement|borrower\s+compliance|covenant\s+testing)\b
    - id: Pattern_global_top500_137_loan_covenant_compliance_records_label_context
      pattern: (?i)\b(?:loan\s+covenant\s+compliance\s+records)\b
  keywords:
    - id: Keyword_loan_covenant_compliance
      groups:
        - match_style: word
          terms:
            - loan covenant
            - covenant compliance
            - debt service coverage
            - financial covenant
            - covenant breach
            - covenant waiver
            - leverage ratio
            - interest coverage ratio
            - loan agreement
            - borrower compliance
            - covenant testing
            - debt-to-equity
      strength: specific
    - id: Keyword_global_top500_137_loan_covenant_compliance_records_domain_context
      groups:
        - match_style: word
          terms:
            - loan covenant compliance records
            - loan
            - covenant
            - compliance
      strength: domain
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
