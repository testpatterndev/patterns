schema: testpattern/v1
name: Vendor Risk Assessment
slug: global-vendor-risk-assessment
version: 1.4.0
type: regex
pattern_class: concept
description: Detects vendor risk assessments revealing third-party security posture and supply chain vulnerabilities.
operation: >-
  A vendor, supplier, third-party, TPRM, or SIG assessment title is discovery-only at 65. Assessed
  inherent/residual risk, likelihood, impact, or risk ratings raise it to 75. The 85 tier additionally
  requires due-diligence evidence such as questionnaire responses, subprocessor review, data-handling
  controls, or service criticality. Enforcing tiers reject templates and examples.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - global
regulations:
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- DISP
- ISO 27001
- NIST CSF
data_categories:
  - security
  - governance
test_cases:
  should_match:
    - value: 'Vendor risk assessment'
      description: Low-tier probe - assessment title without assessed results
    - value: 'Vendor risk assessment: inherent risk high and residual risk medium.'
      description: Medium-tier probe - assessed risk result without due-diligence evidence
    - value: 'Third-party risk assessment: inherent risk high; security questionnaire response and data handling controls reviewed.'
      description: High-tier probe - assessed risk plus due-diligence evidence
  should_not_match:
    - value: Vendor booth at the market
      description: Commercial vendor sibling without risk-assessment context
    - value: Best vendor award ceremony
      description: Public award prose
    - value: 'The public procurement page links to a vendor risk assessment.'
      description: Public link mentions only the document title
    - value: 'Template example: vendor risk assessment with inherent risk high, security questionnaire response, and data handling controls.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Generic vendor references in non-risk contexts.
    mitigation: Require risk assessment keywords alongside vendor.
exports:
  - yaml
scope: narrow
risk_rating: 4
risk_description: >-
  The keyword-list detector identifies third-party risk reviews, vendor due-diligence material, security questionnaires, and outsourcing assessments, so the intended unit is a routine supplier assessment rather than a password or live system configuration. Disclosure may reveal a vendor's control gaps, risk score, remediation commitments, or commercial concerns, but a normal assessment usually requires named assets, technical detail, and attack capability before it enables direct compromise. Templates, procurement guidance, and generic supply-chain discussions are common medium-confidence matches. Risk 4 and OFFICIAL therefore fit low, reversible standalone harm; SENSITIVE is not met without exploitable non-public weaknesses, detailed architecture, credentials, or material concentration risk.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_vendor_risk
      matches:
        - ref: Keyword_vendor_assessment
        - ref: Keyword_risk_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_vendor_risk
      matches:
        - ref: Keyword_risk_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_vendor_risk
  regexes:
    - id: Regex_vendor_risk
      pattern: >-
        (?i)\b(?:(?:third[\s-]?party|vendor|supplier)\s+risk\s+assessment|vendor\s+due\s+diligence|tprm\s+(?:assessment|questionnaire)|shared\s+assessments?\s+sig)\b
  keywords:
    - id: Keyword_vendor_assessment
      groups:
        - match_style: word
          terms:
            - security questionnaire response
            - due diligence evidence
            - subprocessor review
            - data handling controls
            - contract owner
            - service criticality
            - fourth-party dependency
            - assessor comments
      strength: specific
    - id: Keyword_risk_assessment
      groups:
        - match_style: word
          terms:
            - likelihood
            - impact
            - inherent risk
            - residual risk
            - risk score
            - risk rating
            - risk appetite
            - risk tolerance
      strength: specific
    - id: Keyword_compliance_general
      groups:
        - match_style: word
          terms:
            - compliance
            - regulatory
            - governance
            - policy
            - standard
            - framework
            - assessment
            - audit
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.0
    date: '2026-07-19'
    description: 'Profile quality: align the regex-backed detector type; add title discovery, assessed-risk medium, and due-diligence-evidence high tiers; add public/template adversarial probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1090 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.; Aligned recommended_confidence to 75.
