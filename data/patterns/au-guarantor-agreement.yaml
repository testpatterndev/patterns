author: testpattern-community
license: MIT
keywords:
  - guarantor
  - guarantee obligations
  - extend a guarantee
  - guarantee provisions
  - personal guarantee
  - guarantor agreement
  - indemnity
  - joint and several
  - guarantee and indemnity
  - guarantor liability
  - continuing guarantee
  - unlimited guarantee
  - guarantee limit
  - deed of guarantee
