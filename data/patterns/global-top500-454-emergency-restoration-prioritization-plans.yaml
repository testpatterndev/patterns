schema: testpattern/v1
name: Emergency restoration prioritization plans
slug: global-top500-454-emergency-restoration-prioritization-plans
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive emergency and critical-service restoration prioritisation plans. Topic phrases
  are retained for discovery; enforcement requires ranked assets/services, restoration sequence,
  dependencies, alternate supply, crew assignment, affected sites, service areas, or estimated
  restoration content, and high confidence also requires a populated priority, asset/site identifier,
  time, capacity, or customer-impact value.
operation: >-
  Regex_emergency_restoration recognises emergency, service, outage, and critical-service restoration
  priority-plan topics. The topic alone is discovery-only at 65. Ranked service/asset, sequence,
  dependency, supply, crew, site, service-area, or estimate content raises it to 75; populated
  priorities, identifiers, timing, capacity, or customer values reach 85. Enforcing tiers reject
  explicit templates and training examples.
pattern: >-
  (?is)\b(?:emergency\s+restoration\s+prioriti[sz]ation\s+plan|emergency\s+service\s+restoration\s+plan|critical\s+service\s+restoration\s+priority\s+plan|outage\s+restoration\s+prioriti[sz]ation\s+plan)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires actual prioritisation and dependency content. High confidence adds
  populated operational priorities, identifiers, timing, capacity, or customer-impact values.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - emergency restoration prioritization plans
    - emergency
    - restoration
    - prioritization
    - plans
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: emergency restoration prioritization plan
      description: Low-tier probe - plan topic without restoration priorities
    - value: 'Emergency restoration prioritization plan ranks essential services, restoration sequence, dependencies, alternate supply, crew assignment, affected sites, and service areas'
      description: Medium-tier probe - substantive prioritisation without populated operational values
    - value: 'Emergency restoration prioritization plan: priority 1 asset ID: SUB-04, feeder ID: F12, estimated restoration time 3 hours, alternate supply 25 MW, 18000 customers affected'
      description: High-tier probe - prioritisation with asset, feeder, time, capacity, and customer values
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: 'The public disaster guide discusses general service restoration principles.'
      description: Public guidance without a prioritisation plan
    - value: 'Training example: emergency restoration prioritization plan priority 1 asset SUB-04, restoration time 3 hours'
      description: Explicit training content must not enforce
false_positives:
  - description: Public resilience guidance and exercises discuss emergency restoration, dependencies, essential services, and priorities without exposing a live restoration order.
    mitigation: Keep plan topics discovery-only and require ranked services/assets, restoration sequence, dependencies, alternate supply, crew, site, service-area, or estimate content for enforcement.
  - description: Exercises can include realistic priorities, asset and feeder IDs, restoration times, capacities, and customer counts.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_emergency_restoration
      matches:
        - ref: Evidence_restoration_priority_content
        - ref: Evidence_restoration_live_value
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_emergency_restoration
      matches:
        - ref: Evidence_restoration_priority_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_emergency_restoration
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_emergency_restoration
      pattern: >-
        (?is)\b(?:emergency\s+restoration\s+prioriti[sz]ation\s+plan|emergency\s+service\s+restoration\s+plan|critical\s+service\s+restoration\s+priority\s+plan|outage\s+restoration\s+prioriti[sz]ation\s+plan)\b
    - id: Evidence_restoration_live_value
      pattern: >-
        (?i)\b(?:priority\s*[1-9]\d*|(?:asset|site|substation|feeder|plant|service)\s*(?:ID|code)?\s*[:#-]\s*[A-Z0-9][A-Z0-9._-]{2,}|\d+(?:\.\d+)?\s*(?:minutes?|hours?|MW|customers?))\b
  keywords:
    - id: Evidence_restoration_priority_content
      groups:
        - match_style: word
          terms:
            - ranked asset
            - ranked service
            - essential service
            - restoration sequence
            - dependency
            - alternate supply
            - crew assignment
            - affected site
            - service area
            - estimated restoration time
            - recovery time objective
      strength: domain
risk_description: >-
  This wide concept pattern recognises emergency restoration, restoration priority, and service restoration language rather than verifying that a complete command plan or outage schedule has been found. A real prioritisation plan can disclose which services, dependencies, sites, and customer groups will be restored first, allowing an adversary to time disruption or prolong harm at lower-priority points. The normal impact is serious for the affected utility or service area but still bounded, while public resilience guidance and exercises can trigger the same terminology. Risk 8 and SENSITIVE are appropriate; PROTECTED would require current multi-service restoration sequencing whose loss could produce significant regional damage, sustained critical-service failure, or life-safety effects.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
