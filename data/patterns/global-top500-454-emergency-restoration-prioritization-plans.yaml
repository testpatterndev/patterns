schema: testpattern/v1
name: Emergency restoration prioritization plans
slug: global-top500-454-emergency-restoration-prioritization-plans
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to emergency restoration prioritization plans in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:emergency\s+restoration|restoration\s+priority|service\s+restoration)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - emergency restoration prioritization plans
    - emergency
    - restoration
    - prioritization
    - plans
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: 'Emergency restoration'
      description: Topic phrase present
    - value: 'emergency restoration'
      description: Topic phrase, lowercase
    - value: 'this record references the emergency restoration held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: >-
      Common words and phrases related to emergency restoration prioritization plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal
      data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_emergency_restoration
      matches:
        - ref: Pattern_global_top500_454_emergency_restoration_prioritization_plans_label_context
        - ref: Keyword_global_top500_454_emergency_restoration_prioritization_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_emergency_restoration
      matches:
        - ref: Keyword_emergency_restoration
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_emergency_restoration
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_emergency_restoration
      pattern: (?i)\b(?:emergency\s+restoration|restoration\s+priority|service\s+restoration)\b
    - id: Pattern_global_top500_454_emergency_restoration_prioritization_plans_label_context
      pattern: (?i)\b(?:emergency\s+restoration\s+prioritization\s+plans)\b
  keywords:
    - id: Keyword_emergency_restoration
      groups:
        - match_style: word
          terms:
            - emergency restoration
            - restoration priority
            - service restoration
            - disaster recovery
            - business continuity
            - recovery time objective
            - critical infrastructure
            - prioritization plan
            - outage management
            - incident response
            - restoration sequence
            - essential services
      strength: specific
    - id: Keyword_global_top500_454_emergency_restoration_prioritization_plans_domain_context
      groups:
        - match_style: word
          terms:
            - emergency restoration prioritization plans
            - emergency
            - restoration
            - prioritization
            - plans
      strength: domain
risk_description: >-
  This wide concept pattern recognises emergency restoration, restoration priority, and service restoration language rather than verifying that a complete command plan or outage schedule has been found. A real prioritisation plan can disclose which services, dependencies, sites, and customer groups will be restored first, allowing an adversary to time disruption or prolong harm at lower-priority points. The normal impact is serious for the affected utility or service area but still bounded, while public resilience guidance and exercises can trigger the same terminology. Risk 8 and SENSITIVE are appropriate; PROTECTED would require current multi-service restoration sequencing whose loss could produce significant regional damage, sustained critical-service failure, or life-safety effects.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
