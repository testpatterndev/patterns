schema: testpattern/v1
name: Payment card primary account numbers
slug: au-top500-105-payment-card-primary-account-numbers
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to payment card primary account numbers in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. PAN candidates are checksum-validated by the built-in
  Func_credit_card Luhn validator on every match path. Corroborative evidence: 9 keywords within 300 characters. Keyword lists: financial-payment-card-terms, financial-cvv. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b(?:4\d{15}|4\d{12}|5[1-5]\d{14}|3[47]\d{13}|6(?:011|5\d{2})\d{12}|2[2-7]\d{14})\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payment card primary account numbers
    - payment
    - card
    - primary
    - account
    - numbers
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - financial-payment-card-terms
    - financial-cvv
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: '4111111111111111'
      description: Visa PAN
    - value: '5500005555555559'
      description: Mastercard PAN
    - value: '340000000000009'
      description: Amex PAN
  should_not_match:
    - value: '1234567890123456'
      description: Not a valid card BIN
    - value: '4111'
      description: Too short
    - value: 'template example placeholder'
      description: Template/sample text
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_payment_card_pan
      matches:
        - ref: Evidence_payment_card_pan
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_payment_card_pan
      matches:
        - ref: Evidence_payment_card_pan
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_payment_card_pan
      matches:
        - ref: Evidence_payment_card_pan
  regexes:
    - id: Pattern_payment_card_pan
      pattern: \b(?:4\d{15}|4\d{12}|5[1-5]\d{14}|3[47]\d{13}|6(?:011|5\d{2})\d{12}|2[2-7]\d{14})\b
      validators:
        - ref: Func_credit_card
    - id: Pattern_au_top500_105_payment_card_primary_account_numbers_label_context
      pattern: (?i)\b(?:payment\s+card\s+primary\s+account\s+numbers)\b
  keywords:
    - id: Evidence_payment_card_pan
      groups:
        - match_style: word
          terms:
            - payment card
            - primary account number
            - text: PAN
              case_sensitive: true
            - credit card number
            - debit card number
            - card number
            - cardholder
            - Visa
            - Mastercard
            - AMEX
            - card details
            - PCI DSS
      strength: domain
    - id: Keyword_au_top500_105_payment_card_primary_account_numbers_domain_context
      groups:
        - match_style: word
          terms:
            - payment card primary account numbers
            - payment
            - card
            - primary
      strength: domain
risk_description: >-
  The regex identifies 13- to 16-digit primary account number candidates for major card ranges, supported by payment-card and CVV context and template exclusions. A valid PAN can be combined with cardholder, expiry, or verification data for card-not-present fraud, account testing, or targeted social engineering. The normal match concerns one cardholder and one account, while test numbers, documentation, and digit strings that pass only the range syntax remain possible because the rule does not state a Luhn check. Risk 7 SENSITIVE Financial reflects credible direct payment harm; PROTECTED would require a large cardholder dataset, active acquiring access, or significant systemic compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.5.0
    date: '2026-07-17'
    description: 'Reduced-scope alignment fix (TP-00232): attach the established built-in Func_credit_card Luhn validator to Pattern_payment_card_pan, which is the id_match of every tier, so structurally plausible but checksum-invalid values (e.g. 4111111111111112) no longer classify at any confidence. Reuses the same validator as global-payment-card-pan rather than inventing custom Validator_luhn_pan semantics. Separator normalisation out of scope (regex accepts contiguous digits only); public test-PAN exclusion left as a separate policy decision.'
  - version: 1.4.2
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 707 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
