schema: testpattern/v1
name: Payment card primary account numbers
slug: au-top500-105-payment-card-primary-account-numbers
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to payment card primary account numbers in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword
  lists: financial-payment-card-terms, financial-cvv. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:payment\s+card\s+primary\s+account\s+numbers)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/ ]{4,24}\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payment card primary account numbers
    - payment
    - card
    - primary
    - account
    - numbers
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - financial-payment-card-terms
    - financial-cvv
    - generic-data-labels
test_cases:
  should_match:
    - value: Payment card primary account numbers
      description: Exact phrase marker match
    - value: payment card primary account numbers
      description: Case-insensitive phrase match
    - value: Payment card primary account numbers
      description: Normalized whitespace phrase
    - value: structured record with identifier and contextual anchors
      description: Structural anchor sample
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_payment_card_pan
      matches:
        - ref: Evidence_payment_card_pan
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_payment_card_pan
      matches:
        - ref: Evidence_payment_card_pan
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_payment_card_pan
      matches:
        - ref: Evidence_payment_card_pan
  regexes:
    - id: Pattern_payment_card_pan
      pattern: (?is)\b(?:payment\s+card\s+primary\s+account\s+numbers)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/ ]{4,24}\b
    - id: Pattern_au_top500_105_payment_card_primary_account_numbers_label_context
      pattern: (?i)\\b(?:payment\\s+card\\s+primary\\s+account\\s+numbers|payment|card|primary|account|top500)\\b
  keywords:
    - id: Evidence_payment_card_pan
      groups:
        - match_style: word
          terms:
            - payment card
            - primary account number
            - PAN
            - credit card number
            - debit card number
            - card number
            - cardholder
            - Visa
            - Mastercard
            - AMEX
            - card details
            - PCI DSS
    - id: Keyword_au_top500_105_payment_card_primary_account_numbers_domain_context
      groups:
        - match_style: word
          terms:
            - payment card primary account numbers
            - payment
            - card
            - primary
            - account
            - top500
            - field
            - identifier
            - reference
    - id: Evidence_generic_data_labels
      groups:
        - match_style: word
          terms:
            - ID
            - identifier
            - number
            - reference
            - code
            - index
            - serial
            - account
            - file number
            - case number
            - record number
            - ref
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
