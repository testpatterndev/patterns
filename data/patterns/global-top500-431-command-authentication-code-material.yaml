schema: testpattern/v1
name: Command authentication code material
slug: global-top500-431-command-authentication-code-material
version: 1.4.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to command authentication code material in Australian contexts. This information type is classified as personally identifiable information under the
  Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?i)\b(?:command\s+auth(?:entication)?\s+code|launch\s+code|auth\s+material)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - command authentication code material
    - command
    - authentication
    - code
    - material
    - defense
    - intelligence
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: 'Command authentication code'
      description: Topic phrase present
    - value: 'command authentication code'
      description: Topic phrase, lowercase
    - value: 'this record references the command authentication code held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Common words and phrases related to command authentication code material appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_command_auth_code_material
      matches:
        - ref: Evidence_command_auth_code_material
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_command_auth_code_material
      matches:
        - ref: Evidence_command_auth_code_material
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_command_auth_code_material
  regexes:
    - id: Pattern_command_auth_code_material
      pattern: (?i)\b(?:command\s+auth(?:entication)?\s+code|launch\s+code|auth\s+material)\b
  keywords:
    - id: Evidence_command_auth_code_material
      groups:
        - match_style: word
          terms:
            - command authentication
            - authentication code
            - launch code
            - auth material
            - command authority
            - authorization code
            - sealed authenticator
            - nuclear command
            - defense authentication
            - classified code
            - national security
            - COMSEC
      strength: specific
risk_description: >-
  The regex matches the phrase command authentication code with flexible whitespace and seven nearby terms, but it does not validate the structure or value of an actual code. Genuine live command-authentication material could enable false orders, disrupt command integrity, or endanger personnel, whereas doctrine, inventories, and training references can trigger the same concept detector. The normal match therefore signals serious security interest without proving possession of a usable credential. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. Usable command-authentication material can permit false orders, disrupt command integrity and endanger forces. Significant damage is inherent when the match is actual active material. Risk 10 and PROTECTED Government therefore apply to the confirmed record itself. The current concept regex does not validate a code. Require structured value/reference, validity/currentness and command-system context; topic-only hits audit. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
  us_gov: Top Secret
  uk_gov: TOP SECRET
  nz_gov: TOP SECRET
  ca_gov: Top Secret
