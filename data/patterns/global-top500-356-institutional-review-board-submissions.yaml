schema: testpattern/v1
name: Institutional review board submissions
slug: global-top500-356-institutional-review-board-submissions
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: 'Identifies material submitted to, or decided by, a human-research review body rather than the body or compliance
  topic itself: submission artifacts (IRB submission, protocol amendment, adverse event report) enforce with a submission
  field, committee/governance anchors need two independent submission fields, and committee descriptions alone remain discovery-only.'
operation: 'Pattern type: regex (boost_regex engine). The full research-governance topic vocabulary feeds a 65 discovery-only
  tier (Regex_irb_submissions_Topic). Enforcement: the strong submission branch (Regex_irb_submissions — IRB submission, protocol
  amendment, adverse event report) plus one Keyword_irb_submissions_IndependentContext submission field reaches 75; the tested
  contextual branch (Regex_irb_submissions_ContextualBranch — ethics committee) needs two unique submission fields for 65.
  The "institutional review board submissions" label branch is retained at 75. The shared noise exclusion vetoes template/training
  text at enforcement tiers.'
pattern: (?is)\b(?:institutional\s+review\s+board|IRB\s+submission|ethics\s+committee|human\s+subjects\s+research|research\s+protocol|ethics\s+approval|IRB\s+approval|ethical\s+review|research\s+compliance|protocol\s+amendment|adverse\s+event\s+report|human\s+ethics)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- pii
corroborative_evidence:
  keywords:
  - institutional review board submissions
  - institutional
  - review
  - board
  - submissions
  - education
  - research
  - administration
  proximity: 300
test_cases:
  should_match:
  - value: institutional review board
    description: Primary topic phrase match
  - value: irb submission
    description: Case-insensitive topic phrase match
  - value: ethics committee
    description: Alternative topic phrase match (same-span — discovery inventory only; enforcement now needs separate submission-field
      evidence)
  - value: human subjects research
    description: Additional topic phrase match (discovery only)
  - value: 'IRB submission IRB-2026-041 for protocol HSR-882; amendment 2 received 14 July and determination: approved with
      conditions.'
    description: Submission artifact anchor with identifier, amendment, and determination fields reaches the enforcing tiers
  - value: The ethics committee agenda lists elections, meeting dates, and member training with no protocol, application,
      amendment, or decision.
    description: Committee administration matches the topic vocabulary only (discovery — no submission fields)
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: student grant
    description: Generic word pair from old broad template should not match
  - value: The museum acquisitions committee reviewed three landscape paintings.
    description: An unrelated committee topic satisfies no research-review anchor
false_positives:
- description: Common words and phrases related to institutional review board submissions appearing in policy documents, training
    materials, HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_irb_submissions
    matches:
    - ref: Keyword_irb_submissions_IndependentContext
    - ref: Pattern_global_top500_356_institutional_review_board_submissions_label_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_irb_submissions
    matches:
    - ref: Keyword_irb_submissions_IndependentContext
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_irb_submissions
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_irb_submissions
    pattern: (?is)\b(?:IRB\s+submission|protocol\s+amendment|adverse\s+event\s+report)\b
  - id: Regex_irb_submissions_ContextualBranch
    pattern: (?is)\b(?:ethics\s+committee)\b
  - id: Regex_irb_submissions_Topic
    pattern: (?is)\b(?:institutional\s+review\s+board|IRB\s+submission|ethics\s+committee|human\s+subjects\s+research|research\s+protocol|ethics\s+approval|IRB\s+approval|ethical\s+review|research\s+compliance|protocol\s+amendment|adverse\s+event\s+report|human\s+ethics)\b
  - id: Pattern_global_top500_356_institutional_review_board_submissions_label_context
    pattern: (?i)\b(?:institutional\s+review\s+board\s+submissions)\b
  keywords:
  - id: Keyword_irb_submissions_IndependentContext
    groups:
    - match_style: word
      terms:
      - IRB number
      - protocol number
      - principal investigator
      - submission type
      - review date
      - determination
      - approval expiry
      - amendment number
      - committee docket
    strength: specific
  - id: Keyword_global_top500_356_institutional_review_board_submissions_domain_context
    groups:
    - match_style: word
      terms:
      - institutional review board submissions
      - institutional
      - review
      - board
      - submissions
    strength: domain
risk_description: This pattern identifies institutional-review-board, IRB-submission, ethics-committee, or human-subjects-research
  material with contextual corroboration, representing research-governance content rather than an isolated identifier. A genuine
  submission may combine unpublished methods, investigator judgments, participant recruitment, risk controls, consent design,
  and vulnerable-population details, so disclosure can undermine both research integrity and participant protection. The ordinary
  submission remains bounded to one study and the detector does not necessarily expose participant-level data, but commercial,
  ethical, and privacy harm can still be serious. Risk 8 and SENSITIVE are justified; PROTECTED would require identifiable
  high-risk participant datasets, dangerous controlled research, or major institution-wide compromise.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
