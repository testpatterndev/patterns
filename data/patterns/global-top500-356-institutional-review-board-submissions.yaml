changelog:
- version: 1.3.0
  date: '2026-07-17'
  description: 'Reduced-scope harden (TP-01264): the old 65 tier corroborated the full topic primary with the same-span Keyword_irb_submissions
    list, so "ethics committee" alone enforced at 65. Keyword_irb_submissions is replaced by Keyword_irb_submissions_IndependentContext
    (IRB number, protocol number, principal investigator, submission type, review date, determination, approval expiry, amendment
    number, committee docket). Regex_irb_submissions is modified to the retained strong submission branch (IRB submission,
    protocol amendment, adverse event report) enforcing at 75 with one submission field; Regex_irb_submissions_ContextualBranch
    (ethics committee) enforces at 65 only with two unique submission fields; the full topic vocabulary moves to Regex_irb_submissions_Topic
    as a 65 discovery_only inventory tier (SIT semantic scope preserved — not redefined as populated submissions only, per
    QA). Added submission positive, committee-administration discovery case, and museum-committee negative.'
- version: 1.2.1
  date: '2026-07-14'
