schema: testpattern/v1
name: PPSR Security Agreement
slug: au-ppsr-security-agreement
version: 1.3.2
type: keyword_list
pattern_class: concept
description: Detects Personal Property Securities Register (PPSR) security agreements and related collateral documentation.
operation: >-
  Keyword-based detection matching PPSR, security interest, collateral, and Personal Property Securities Act terms.
  Corroborative evidence: 14 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - legal
  - financial
test_cases:
  should_match:
    - value: PPSR notice received
      description: Exact 65 discovery probe with a PPSR phrase and no security details
    - value: 'PPSR security agreement: secured party and grantor'
      description: Exact 75 probe with parties to the security interest
    - value: 'PPSR security agreement: secured party, collateral and financing statement'
      description: Exact 85 probe with security context and registration/perfection evidence
    - value: 'PPSR security interest registration: financing statement for collateral'
      description: PPSR financing statement identifying collateral
    - value: 'Personal Property Securities Act: secured party and grantor agreement'
      description: Test match 2
    - value: PMSI registration on PPSR with perfected security interest and priority
      description: Test match 3
  should_not_match:
    - value: Personal property insurance policy
      description: Non-match 1
    - value: Security guard at the property entrance
      description: Non-match 2
    - value: General security agreement workshop agenda
      description: Educational instrument wording must remain discovery-only
false_positives:
  - description: Generic property or security references in non-PPSR contexts.
    mitigation: Require PPSR-specific terms like PPSA, financing statement, or security interest.
exports:
  - yaml
scope: narrow
risk_rating: 7
risk_description: >-
  The pattern identifies PPSR security agreements containing a grantor, secured party, collateral, financing statement, priority, PMSI, and perfection terms. Disclosure can expose financed assets, creditor priority, obligations, and weaknesses that support commercial pressure, fraud, or interference with refinancing and asset transactions. The grantor, secured party, guarantors, and counterparties may face moderate legal and financial harm within the secured arrangement, although some registration facts are publicly searchable and enforcement requires legal authority. Risk 7 and SENSITIVE Legal fit the complete agreement, while a broad confidential collateral portfolio or privileged registry control would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ppsr_security
      matches:
        - ref: Keyword_security_agreement_context
        - ref: Keyword_priority_perfection_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ppsr_security
      matches:
        - ref: Keyword_security_agreement_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ppsr_security
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ppsr_security
      pattern: >-
        (?i)\b(?:security\s+agreement|ppsr|personal\s+property\s+securities|registered\s+security\s+interest|general\s+security\s+agreement)\b
  keywords:
    - id: Keyword_ppsr
      groups:
        - match_style: word
          terms:
            - PPSR
            - Personal Property Securities Register
            - PPSA
            - security interest
            - secured party
            - grantor
            - collateral
            - perfection
            - attachment
            - registration
      strength: domain
    - id: Keyword_collateral
      groups:
        - match_style: word
          terms:
            - all assets
            - plant and equipment
            - stock in trade
            - inventory
            - motor vehicles
            - intellectual property
            - receivables
            - proceeds
            - after-acquired property
      strength: specific
    - id: Keyword_legal_general
      groups:
        - match_style: word
          terms:
            - agreement
            - contract
            - deed
            - executed
            - witnessed
            - signature
            - cooling off
            - default
            - termination
            - entire agreement
      strength: domain
    - id: Keyword_security_agreement_context
      groups:
        - match_style: word
          terms:
            - security interest
            - secured party
            - grantor
            - collateral
            - all assets
            - plant and equipment
            - inventory
            - receivables
            - proceeds
      strength: specific
    - id: Keyword_priority_perfection_context
      groups:
        - match_style: word
          terms:
            - financing statement
            - registration number
            - perfected security interest
            - perfection
            - priority
            - purchase money security interest
            - text: PMSI
              case_sensitive: true
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
