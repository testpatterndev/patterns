schema: testpattern/v1
name: Genomic testing results
slug: global-top500-334-genomic-testing-results
version: 1.1.1
type: regex
engine: boost_regex
description: Identifies genomic testing results references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:genomic\s+testing|genetic\s+testing|genome\s+sequencing|DNA\s+analysis|genetic\s+variant|hereditary\s+risk|gene\s+mutation|whole\s+genome|genetic\s+counseling)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - genomic testing results
    - genomic
    - testing
    - results
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: genomic testing
      description: Primary topic phrase match
    - value: genetic testing
      description: Case-insensitive topic phrase match
    - value: genome sequencing
      description: Alternative topic phrase match
    - value: DNA analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_genomic_testing_results
      matches:
        - ref: Pattern_global_top500_334_genomic_testing_results_label_context
        - ref: Keyword_global_top500_334_genomic_testing_results_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_genomic_testing_results
      matches:
        - ref: Keyword_genomic_testing_results
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_genomic_testing_results
      pattern: (?is)\b(?:genomic\s+testing|genetic\s+testing|genome\s+sequencing|DNA\s+analysis|genetic\s+variant|hereditary\s+risk|gene\s+mutation|whole\s+genome|genetic\s+counseling)\b
    - id: Pattern_global_top500_334_genomic_testing_results_label_context
      pattern: (?i)\b(?:genomic\s+testing\s+results)\b
  keywords:
    - id: Keyword_genomic_testing_results
      groups:
        - match_style: word
          terms:
            - genomic testing
            - genetic testing
            - genome sequencing
            - DNA analysis
            - genetic variant
            - health
            - biomedical
            - pharmacogenomics
            - hereditary risk
            - gene mutation
            - whole genome
            - genetic counseling
      strength: specific
    - id: Keyword_global_top500_334_genomic_testing_results_domain_context
      groups:
        - match_style: word
          terms:
            - genomic testing results
            - genomic
            - testing
            - results
      strength: domain
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
