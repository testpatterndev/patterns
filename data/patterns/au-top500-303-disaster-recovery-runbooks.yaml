schema: testpattern/v1
name: Disaster recovery runbooks
slug: au-top500-303-disaster-recovery-runbooks
version: 1.5.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  DEPRECATED — merged into au-disaster-recovery-plan. Identifies actionable disaster-recovery runbooks, distinguishing
  recovery objectives and policy from procedures: enforcement requires DR context plus ordered recovery steps (failover,
  restore, start/stop, verify, owner, dependency), while RTO/RPO objectives and BCP policy language remain
  discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). DR topic phrases (disaster recovery, DR runbook, RTO, RPO) feed a 65
  discovery-only tier and remain the primary anchor for enforcement, which additionally requires
  Evidence_dr_runbook_step — a numbered step within 160 characters of a
  failover/restore/start/stop/verify/validate/owner/dependency term — once at 75 and at least twice at 85. The shared
  template exclusion vetoes training/demo text at enforcement tiers.
pattern: (?i)\b(?:disaster\s+recovery|dr\s+runbook|rto|rpo|recovery\s+time\s+objective)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - disaster recovery runbooks
    - disaster
    - recovery
    - runbooks
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: Disaster recovery
      description: Topic phrase present
    - value: disaster recovery
      description: Topic phrase, lowercase
    - value: this record references the disaster recovery held on file
      description: Topic phrase within surrounding text
    - value: >-
        DR runbook Step 1 stop payments-api. Step 2 failover database to dr-db02. Step 3 verify transaction health
        check. Owner=Platform Ops
      description: Ordered recovery steps with failover target and validation reach the enforcing tiers
    - value: Disaster recovery target RTO=4h RPO=1h
      description: Objectives alone match the topic branch only (discovery, no ordered procedure)
    - value: Economic disaster recovery may take four years
      description: Societal usage keeps a discovery-level topic hit only (relabeled from the first-pass no-match expectation)
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: Training exercise Step 1 failover demo service
      description: A marked training exercise with a demo service has no DR topic phrase and is template-excluded
false_positives:
  - description: >-
      Authentication-related terminology in software documentation, security training materials, or system architecture
      descriptions without actual credentials.
    mitigation: >-
      Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
      security terminology.
  - description: >-
      Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
      documentation.
    mitigation: >-
      Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false
      positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  This detector identifies a composite disaster-recovery runbook through disaster-recovery, DR-runbook, RTO, RPO, and
  recovery-time-objective language. A populated runbook can disclose recovery sequences, dependencies, secondary sites,
  operational contacts, and decision points that support targeted disruption or convincing social engineering during an
  outage. The affected scale is the services and users covered by the plan, while an adversary still needs access or an
  independent disruption capability. Risk 8 and SENSITIVE capture serious contained resilience harm, while a
  critical-service plan containing broad privileged recovery access would raise the classification.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_disaster_recovery
      matches:
        - ref: Evidence_dr_runbook_step
          min_count: 2
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_disaster_recovery
      matches:
        - ref: Evidence_dr_runbook_step
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_disaster_recovery
  regexes:
    - id: Pattern_disaster_recovery
      pattern: (?i)\b(?:disaster\s+recovery|dr\s+runbook|rto|rpo|recovery\s+time\s+objective)\b
    - id: Evidence_dr_runbook_step
      pattern: (?is)(?:step\s+\d+|\d+[.)])[\s\S]{0,160}?\b(?:failover|restore|start|stop|verify|validate|owner|dependency)\b
  keywords:
    - id: Evidence_disaster_recovery
      groups:
        - match_style: word
          terms:
            - disaster recovery
            - DR runbook
            - recovery time objective
            - recovery point objective
            - text: RTO
              case_sensitive: true
            - text: RPO
              case_sensitive: true
            - business continuity
            - failover procedure
            - DR test
            - site recovery
            - runbook
            - service restoration
      strength: specific
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.5.1
    date: '2026-07-19'
    description: >-
      Deprecated: merged into au-disaster-recovery-plan. Detection retained in source for audit only; excluded from
      compiled catalog and package selection.
  - version: 1.5.0
    date: '2026-07-17'
    description: >-
      Reduced-scope harden (TP-00419): objectives/policy vocabulary no longer enforces (a business-continuity RTO/RPO
      policy sentence previously reached 85 via same-span evidence). Enforcement keeps the DR topic primary but now
      requires Evidence_dr_runbook_step (numbered step within 160 characters of failover/restore/start/
      stop/verify/validate/owner/dependency, lazy-quantified so multiple steps count separately): one step at 75, two or
      more at 85, both template-excluded. Topic branch stays 65 discovery_only; per the independent correction the
      societal "economic disaster recovery" case is expected as a discovery hit, not no_match. Added runbook positive,
      RTO/RPO discovery case, and training-exercise negative.
  - version: 1.4.1
    date: '2026-07-14'
    description: >-
      v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 894 without changing
      detector or package metadata.
  - version: 1.4.0
    date: '2026-07-09'
    description: >-
      C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored
      as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged);
      derived by scripts/derive-pattern-class.mjs + spot review
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
