schema: testpattern/v1
name: QLD Bond Loan Application
slug: au-qld-bond-loan-application
version: 1.3.2
type: keyword_list
pattern_class: concept
description: Detects QLD Bond Loan applications for rental assistance and financial hardship support.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - pii
  - financial
  - government
test_cases:
  should_match:
    - value: Bond loan application received
      description: Exact 65 discovery probe with an application phrase and no applicant details
    - value: Bond loan application due to financial hardship
      description: Exact 75 probe with applicant-need context
    - value: Department of Housing bond loan application due to financial hardship
      description: Exact 85 probe with applicant need and QLD housing provenance
    - value: Bond loan application for rental bond assistance due to financial hardship
      description: Bond assistance application arising from hardship
    - value: QLD RTA bond loan with rental grant and tenancy support
      description: Test match 2
    - value: Bond assistance application for rental arrears and housing assistance
      description: Test match 3
  should_not_match:
    - value: Government bond investment
      description: Non-match 1
    - value: James Bond movie release
      description: Non-match 2
    - value: Rental assistance application software demo
      description: Product-demo wording must remain discovery-only
false_positives:
  - description: Government bonds or entertainment references.
    mitigation: Require rental or tenancy keywords alongside bond loan.
exports:
  - yaml
scope: narrow
risk_rating: 7
risk_description: >-
  This classifier identifies a Queensland bond-loan or rental-assistance application containing hardship, tenancy-support, rental-arrears, bond, and assistance context. Disclosure can reveal a household's financial distress, housing insecurity, rental obligations, and government-support request, enabling stigma, predatory targeting, or convincing social engineering. The applicant and household may face moderate personal, financial, and government-record harm within one application, while the record does not itself provide access to funds or a service system. Risk 7 and SENSITIVE Government remain justified by the populated application unit, while a bulk housing-assistance register or severe protected-operation impact would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_bond_loan
          - Pattern_rental_assistance
      matches:
        - ref: Evidence_applicant_need_context
        - ref: Evidence_qld_housing
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_bond_loan
          - Pattern_rental_assistance
      matches:
        - ref: Evidence_applicant_need_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_bond_loan
          - Pattern_rental_assistance
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_bond_loan
      pattern: (?i)\b(?:bond\s+loan(?:\s+(?:application|agreement))?|bond\s+assistance\s+application|rental\s+(?:assistance|grant)\s+application)\b
    - id: Pattern_rental_assistance
      pattern: (?i)\b(?:tenant\s+support|rental\s+subsidy|housing\s+assistance\s+(?:program|scheme))\b
  keywords:
    - id: Evidence_bond_assistance
      groups:
        - match_style: word
          terms:
            - bond loan
            - bond assistance
            - rental grant
            - rental assistance
            - tenant support
            - rental subsidy
            - housing assistance program
      strength: specific
    - id: Evidence_qld_housing
      groups:
        - match_style: word
          terms:
            - Department of Housing
            - Queensland Housing
            - Local Government
            - Planning and Public Works
            - Housing Act 2003
            - housing.qld.gov.au
      strength: specific
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
    - id: Evidence_applicant_need_context
      groups:
        - match_style: word
          terms:
            - financial hardship
            - rental arrears
            - tenancy support
            - household income
            - applicant
            - lease
            - property address
            - rental bond assistance
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.3.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: keep bond/rental-assistance application phrases at 65 discovery, require applicant hardship or tenancy details at 75 and QLD housing provenance at 85, with exact-tier and software-demo probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 574 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - bond loan
  - bond loan application
  - rental bond
  - bond assistance
  - RTA bond
  - rental grant
  - housing assistance
  - rental subsidy
  - bond refund
  - financial hardship
  - rental arrears
  - tenancy support
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
