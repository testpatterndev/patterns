schema: testpattern/v1
name: Mailing address
slug: global-top500-042-mailing-address
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to mailing address in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: pii-personal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:mailing\s+address|postal\s+address|correspondence\s+address|delivery\s+address|mail\s+to|send\s+to|shipping\s+address|PO\s+Box|post\s+office\s+box|forwarding\s+address|mail\s+recipient)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - mailing address
    - mailing
    - address
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - pii-personal
test_cases:
  should_match:
    - value: mailing address
      description: Primary topic phrase match
    - value: postal address
      description: Case-insensitive topic phrase match
    - value: correspondence address
      description: Alternative topic phrase match
    - value: delivery address
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to mailing address appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_mailing_address
      matches:
        - ref: Pattern_global_top500_042_mailing_address_label_context
        - ref: Keyword_global_top500_042_mailing_address_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_042_mailing_address_noise_exclusion
    - confidence_level: 75
      id_match: Regex_mailing_address
      matches:
        - ref: Keyword_mailing_address
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_042_mailing_address_noise_exclusion
    - confidence_level: 65
      id_match: Regex_mailing_address
      matches:
        - ref: Keyword_mailing_address
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_042_mailing_address_noise_exclusion
  regexes:
    - id: Regex_mailing_address
      pattern: (?is)\b(?:mailing\s+address|postal\s+address|correspondence\s+address|delivery\s+address|mail\s+to|send\s+to|shipping\s+address|PO\s+Box|post\s+office\s+box|forwarding\s+address|mail\s+recipient)\b
    - id: Pattern_global_top500_042_mailing_address_label_context
      pattern: (?i)\\b(?:mailing\\s+address|mailing|address|top500)\\b
  keywords:
    - id: Keyword_mailing_address
      groups:
        - match_style: word
          terms:
            - mailing address
            - postal address
            - correspondence address
            - delivery address
            - mail to
            - send to
            - shipping address
            - PO Box
            - post office box
            - forwarding address
            - mail recipient
            - postcode
    - id: Keyword_global_top500_042_mailing_address_domain_context
      groups:
        - match_style: word
          terms:
            - mailing address
            - mailing
            - address
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_042_mailing_address_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
