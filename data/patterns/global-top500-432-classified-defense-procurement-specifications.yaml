schema: testpattern/v1
name: Classified defense procurement specifications
slug: global-top500-432-classified-defense-procurement-specifications
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to classified defense procurement specifications in international contexts. This information type is classified as personally identifiable information
  under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: au-government-defence-markers. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:defense\s+procurement|classified\s+specification|military\s+specification|defense\s+contract|weapons\s+acquisition|defense\s+tender|procurement\s+sensitive|controlled\s+unclassified|technical\s+data\s+package|defense\s+materiel|acquisition\s+program|ITAR\s+controlled)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - classified defense procurement specifications
  proximity: 240
  keyword_lists:
    - au-government-defence-markers
test_cases:
  should_match:
    - value: defense procurement
      description: Primary topic phrase match
    - value: classified specification
      description: Case-insensitive topic phrase match
    - value: military specification
      description: Alternative topic phrase match
    - value: defense contract
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: >-
      Common words and phrases related to classified defense procurement specifications appearing in policy documents, training materials, HR templates, or compliance guidelines without actual
      personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_classified_defense_procurement
      matches:
        - ref: Pattern_global_top500_432_classified_defense_procurement_specifications_label_context
        - ref: Keyword_global_top500_432_classified_defense_procurement_specifications_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_classified_defense_procurement
      matches:
        - ref: Keyword_classified_defense_procurement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_classified_defense_procurement
      matches:
        - ref: Keyword_classified_defense_procurement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_classified_defense_procurement
      pattern: >-
        (?is)\b(?:defense\s+procurement|classified\s+specification|military\s+specification|defense\s+contract|weapons\s+acquisition|defense\s+tender|procurement\s+sensitive|controlled\s+unclassified|technical\s+data\s+package|defense\s+materiel|acquisition\s+program|ITAR\s+controlled)\b
    - id: Pattern_global_top500_432_classified_defense_procurement_specifications_label_context
      pattern: (?i)\\b(?:classified\\s+defense\\s+procurement\\s+specifications|classified|defense|procurement|specifications|top500)\\b
  keywords:
    - id: Keyword_classified_defense_procurement
      groups:
        - match_style: word
          terms:
            - defense procurement
            - classified specification
            - military specification
            - defense contract
            - weapons acquisition
            - defense tender
            - procurement sensitive
            - controlled unclassified
            - technical data package
            - defense materiel
            - acquisition program
            - ITAR controlled
    - id: Keyword_global_top500_432_classified_defense_procurement_specifications_domain_context
      groups:
        - match_style: word
          terms:
            - classified defense procurement specifications
            - classified
            - defense
            - procurement
            - specifications
            - top500
            - field
            - identifier
            - reference
