schema: testpattern/v1
name: Unemployment benefit records
slug: global-top500-383-unemployment-benefit-records
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies individual unemployment-benefit, unemployment-insurance, JobSeeker, and re-employment
  assistance claims and determinations. Topic phrases are retained for discovery; enforcement requires
  claimant, employer, separation, earnings, job-search, obligation, benefit-period, payment-rate, or
  sanction fields, and high confidence also requires a formal claim reference or recorded decision.
operation: >-
  Regex_unemployment_benefit recognises unemployment and JobSeeker claims and determinations. The
  topic alone is discovery-only at 65. Substantive claimant and entitlement fields raise it to 75; a
  formal claim reference or decision status reaches 85. Enforcing tiers reject explicit templates and
  training examples.
pattern: >-
  (?is)\b(?:unemployment\s+(?:benefit|insurance|compensation)\s+(?:claim|record|determination)|JobSeeker\s+(?:allowance\s+)?(?:claim|record|determination)|re-?employment\s+assistance\s+(?:claim|record|determination))s?\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive claimant and entitlement fields. High confidence adds a
  formal claim reference or recorded decision.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - unemployment benefit records
  proximity: 240
  keyword_lists:
    - industry-hr
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: unemployment benefit record
      description: Low-tier probe - unemployment-benefit record topic without claimant fields
    - value: 'Unemployment benefit record: claimant name, last employer, separation reason, employment end date, earnings period, job search activity, mutual obligation, benefit period, payment rate, and sanction decision'
      description: Medium-tier probe - substantive claim record without formal reference or outcome
    - value: 'Unemployment benefit claim, claim reference: UBC-2026-104: claimant name, last employer, separation reason, earnings period, job search activity, mutual obligation, benefit period, payment rate, and decision approved'
      description: High-tier probe - substantive claim with formal reference and decision
  should_not_match:
    - value: The report discusses national unemployment insurance policy.
      description: Public policy discussion without an individual claim record
    - value: The HR file records an employee separation reason and end date.
      description: Employment record outside an unemployment-benefit claim
    - value: 'Training example: unemployment benefit claim UBC-2026-104 with last employer, job search activity, payment rate, and decision approved'
      description: Explicit training content must not enforce
false_positives:
  - description: Labour-market policy and ordinary HR separation records discuss unemployment, employers, earnings, and end dates without containing a benefit claim.
    mitigation: Require an unemployment-benefit, unemployment-insurance, JobSeeker, or re-employment assistance claim or determination before considering claimant fields.
  - description: Training claims can contain realistic employers, obligations, payment rates, references, and decisions.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_unemployment_benefit
      matches:
        - ref: Evidence_unemployment_claim
        - ref: Evidence_unemployment_formal_decision
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_unemployment_benefit
      matches:
        - ref: Evidence_unemployment_claim
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_unemployment_benefit
  regexes:
    - id: Regex_unemployment_benefit
      pattern: >-
        (?is)\b(?:unemployment\s+(?:benefit|insurance|compensation)\s+(?:claim|record|determination)|JobSeeker\s+(?:allowance\s+)?(?:claim|record|determination)|re-?employment\s+assistance\s+(?:claim|record|determination))s?\b
    - id: Evidence_unemployment_formal_decision
      pattern: >-
        (?i)\b(?:(?:claim|benefit|customer)\s+(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|decision\s*[:=-]?\s*(?:approved|eligible|rejected|declined|suspended|cancelled))\b
  keywords:
    - id: Evidence_unemployment_claim
      groups:
        - match_style: word
          terms:
            - claimant name
            - last employer
            - separation reason
            - employment end date
            - earnings period
            - job search activity
            - mutual obligation
            - benefit period
            - payment rate
            - sanction decision
      strength: domain
risk_description: >-
  This regex identifies unemployment claims, unemployment insurance, jobseeker allowances, and related benefit records with employment context. A completed record can expose job loss, earnings, employer history, job-search compliance, sanctions, and payment details, enabling stigma, fraud, or coercive targeting of a financially vulnerable person. The normal unit concerns one claimant and creates serious but contained privacy and financial consequences. Risk 8 supports SENSITIVE Personal-Privacy; PROTECTED would require a large benefits register, protected claimants, or compromise enabling severe systemic payment fraud.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
