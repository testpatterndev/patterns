schema: testpattern/v1
name: Whistleblower identity records
slug: global-top500-065-whistleblower-identity-records
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to whistleblower identity records in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:protected\s+disclosure|anonymous\s+report|confidential\s+informant|whistleblower\s+protection|disclosure\s+report|reporting\s+person|ethics\s+hotline|whistleblower\s+identity|complainant\s+identity)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - whistleblower identity records
    - whistleblower
    - identity
    - records
    - employment
    - workforce
  proximity: 300
test_cases:
  should_match:
    - value: protected disclosure
      description: Primary topic phrase match
    - value: anonymous report
      description: Case-insensitive topic phrase match
    - value: confidential informant
      description: Alternative topic phrase match
    - value: whistleblower protection
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to whistleblower identity records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_whistleblower_identity
      matches:
        - ref: Pattern_global_top500_065_whistleblower_identity_records_label_context
        - ref: Keyword_global_top500_065_whistleblower_identity_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_whistleblower_identity
      matches:
        - ref: Keyword_whistleblower_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_whistleblower_identity
      matches:
        - ref: Keyword_whistleblower_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_whistleblower_identity
      pattern: >-
        (?is)\b(?:protected\s+disclosure|anonymous\s+report|confidential\s+informant|whistleblower\s+protection|disclosure\s+report|reporting\s+person|ethics\s+hotline|whistleblower\s+identity|complainant\s+identity)\b
    - id: Pattern_global_top500_065_whistleblower_identity_records_label_context
      pattern: (?i)\\b(?:whistleblower\\s+identity\\s+records|whistleblower|identity|top500)\\b
  keywords:
    - id: Keyword_whistleblower_identity
      groups:
        - match_style: word
          terms:
            - whistleblower
            - protected disclosure
            - anonymous report
            - confidential informant
            - whistleblower protection
            - disclosure report
            - reporting person
            - tipoff
            - ethics hotline
            - whistleblower identity
            - complainant identity
    - id: Keyword_global_top500_065_whistleblower_identity_records_domain_context
      groups:
        - match_style: word
          terms:
            - whistleblower identity records
            - whistleblower
            - identity
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Protected C
