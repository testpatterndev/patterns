schema: testpattern/v1
name: Genetic data
slug: au-top500-019-genetic-data
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to genetic data in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: emerging-neurodata, biometric-biometric-types. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:genetic\s+data|genetic\s+information|genetic\s+test|genetic\s+profile|genetic\s+sample|genetic\s+marker)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - genetic data
    - genetic
    - data
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:

    - emerging-neurodata

    - biometric-biometric-types
test_cases:
  should_match:
    - value: genetic data
      description: Primary topic phrase match
    - value: genetic information
      description: Case-insensitive topic phrase match
    - value: genetic test
      description: Alternative topic phrase match
    - value: genetic profile
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to genetic data appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_genetic_data
      matches:
        - ref: Evidence_genetic_data
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_019_genetic_data_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_genetic_data
      matches:
        - ref: Evidence_genetic_data
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_019_genetic_data_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_genetic_data
      matches:
        - ref: Evidence_genetic_data
  regexes:
    - id: Pattern_genetic_data
      pattern: (?is)\b(?:genetic\s+data|genetic\s+information|genetic\s+test|genetic\s+profile|genetic\s+sample|genetic\s+marker)\b
    - id: Pattern_au_top500_019_genetic_data_label_context
      pattern: (?i)\\b(?:genetic\\s+data|genetic|top500)\\b
  keywords:
    - id: Evidence_genetic_data
      groups:
        - match_style: word
          terms:
            - genetic data
            - genetic information
            - DNA
            - genome
            - genomic
            - genetic test
            - genetic profile
            - hereditary
            - genetic sample
            - genetic marker
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_019_genetic_data_domain_context
      groups:
        - match_style: word
          terms:
            - genetic data
            - genetic
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_019_genetic_data_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
