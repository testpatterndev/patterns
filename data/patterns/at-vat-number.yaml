schema: testpattern/v1
name: Austria Value Added Tax (VAT) Number
slug: at-vat-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Austria Value Added Tax (VAT) Number patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type. VAT numbers have country-specific prefixes that aid detection accuracy.
operation: >-
  Corroborative evidence: 5 keywords within 300 characters.
  Keyword lists: vat-numbers, at-financial.
pattern: '\bATU\d{8}\b'
confidence: high
confidence_justification: >-
  High confidence: the ATU prefix followed by exactly 8 digits is a distinctive format unique to Austrian VAT numbers.
jurisdictions:
  - at
  - eu
regulations:
- GDPR
data_categories:
  - financial
  - business-identifier
corroborative_evidence:
  keywords:
    - VAT
    - Umsatzsteuer
    - ATU
    - value added tax
    - Mehrwertsteuer
  proximity: 300
  keyword_lists:

    - vat-numbers

    - at-financial
test_cases:
  should_match:
    - value: 'ATU12345678'
      description: Standard Austrian VAT number with ATU prefix
    - value: 'ATU98765432'
      description: Austrian VAT number format
    - value: 'ATU11223344'
      description: Austrian VAT identifier
  should_not_match:
    - value: 'ATU1234567'
      description: Only 7 digits after ATU prefix, too short
    - value: 'DEU12345678'
      description: German prefix, not Austrian VAT format
false_positives:
  - description: Other identifier schemes that coincidentally share a similar prefix and digit structure
    mitigation: >-
      Validate the complete format including prefix and digit count. Layer with document context
      to confirm financial or tax-related content.
  - description: Test or example VAT numbers used in documentation or training materials
    mitigation: >-
      Maintain an allow-list of known test/example numbers. Use document classification to
      distinguish production data from training content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_at_vat
      matches:
        - ref: Keyword_at_vat_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_at_vat
      matches:
        - ref: Keyword_at_vat_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_at_vat
  regexes:
    - id: Regex_at_vat
      pattern: '\bATU\d{8}\b'
  keywords:
    - id: Keyword_at_vat_specific
      groups:
        - match_style: word
          terms:
            - Umsatzsteuer-Identifikationsnummer
            - Umsatzsteuer
            - UID-Nummer
            - UID Nr
            - ATU Nummer
            - Mehrwertsteuer
            - Mehrwertsteuernummer
            - MWST
            - Umsatzsteuernummer
            - Finanzamt
      strength: domain
    - id: Keyword_at_vat_general
      groups:
        - match_style: word
          terms:
            - text: VAT
              case_sensitive: true
            - value added tax
            - VAT number
            - VAT registration
            - tax registration
            - VAT ID
            - Steuer
            - Steuernummer
      strength: specific
risk_rating: 5
risk_description: >-
  The canonical Austrian VAT pattern returns an ATU-prefixed eight-digit registration number used by businesses on invoices and tax documents. A copied value may make a fraudulent supplier identity look credible, but it is publicly checkable and carries no payment or account authority. The normal disclosure concerns one company and becomes consequential only with convincing contact, banking, or transaction information. Risk 5 and OFFICIAL reflect that bounded commercial exposure; confidential filings or payment records would warrant stronger handling.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-austria-value-added-tax
    title: "Austria Value Added Tax (VAT) Number entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
