schema: testpattern/v1
name: PII data-flow maps
slug: au-top500-260-pii-data-flow-maps
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies maps or inventories that trace personal-data movement between systems — populated source-to-destination flow edges naming personal-data categories. PII-processing topic language
  (privacy notices, data-processing prose) without flow/lineage structure is discovery-only. This is privacy architecture / data-lineage content, not credential material.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:pii\s+data[\s-]+flow\s+maps|data\s+flow|pii\s+mapping|personal\s+information|data\s+lineage|data\s+inventory|privacy\s+impact|data\s+processing|data\s+subject|information\s+flow|data\s+architecture)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - privacy
  - sensitive-data
corroborative_evidence:
  keywords:
    - pii data-flow maps
    - pii
    - data
    - flow
    - maps
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: pii data-flow maps
      description: Primary topic phrase match
    - value: data flow
      description: Case-insensitive topic phrase match
    - value: pii mapping
      description: Alternative topic phrase match
    - value: personal information
      description: Additional topic phrase match
    - value: 'Source: Web signup -> Destination: CRM via API; data: name, email address, customer ID; store: AU-East SQL; retention: 7 years.'
      description: Populated source-to-destination flow edge naming PII categories, transfer method, store, and retention (enforcement branch)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: 'Privacy policy: we process personal information fairly.'
      description: Processing-principles prose without a mapped flow must not enforce (discovery-only)
    - value: The river data flow model predicts water levels.
      description: Hydrology data-flow prose is not a PII flow map and must not enforce
    - value: 'Privacy workshop sample map: Source A -> CRM, example email.'
      description: Workshop/sample/example instructional content must not enforce
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pii_flow_edge
      matches:
        - ref: Pattern_pii_flow_edge
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_pii_flow_edge
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_pii_data_flow_maps
      matches:
        - ref: Evidence_pii_data_flow_maps
  regexes:
    - id: Pattern_pii_data_flow_maps
      pattern: >-
        (?is)\b(?:pii\s+data[\s-]+flow\s+maps|data\s+flow|pii\s+mapping|personal\s+information|data\s+lineage|data\s+inventory|privacy\s+impact|data\s+processing|data\s+subject|information\s+flow|data\s+architecture)\b
    - id: Pattern_pii_flow_edge
      pattern: >-
        (?is)\b(?:source|from)\s*[:=]\s*[^;|\r\n]{2,80}[\s\S]{0,120}\b(?:destination|to|system|store)\s*[:=]\s*[^;|\r\n]{2,80}[\s\S]{0,160}\b(?:email address|name|phone|customer id|health data|personal information|PII)\b
  keywords:
    - id: Evidence_pii_data_flow_maps
      groups:
        - match_style: word
          terms:
            - pii data-flow maps
            - data flow
            - pii mapping
            - personal information
            - data lineage
            - data inventory
            - privacy impact
            - data processing
            - data subject
            - information flow
            - data architecture
risk_description: >-
  The detector identifies PII mapping, personal-information, and data-flow artifacts, indicating a system map or topic rather than an individual personal record. A disclosed map can reveal where personal data enters, moves, is stored, crosses trust boundaries, reaches processors, and may lack controls, giving an attacker a prioritized target list. The organization, data subjects, and service providers represented in the map face serious privacy and security risk, but exploitation still requires access to the mapped systems and the match may not contain actual PII. Risk 8 and SENSITIVE fit a substantive internal data-flow map, while an enterprise-wide map with sensitive cohorts, weak controls, and precise access paths would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
