    date: '2026-07-18'
    description: >-
      Adversarial accuracy pass: correct data_categories from ['credentials', 'security'] to ['privacy', 'sensitive-data'] so package routing and workbook category claims match the detector content (description may already have been fixed in wave1).
  - version: 1.4.0
    date: '2026-07-16'
    description: >-
      Tier rebalance: enforcement now anchors on new Pattern_pii_flow_edge — a populated source/from-to-destination/system/store flow edge that names a personal-data category — at 75 (one edge,
      noise-gated) and 85 (two unique edges, noise-gated); the PII/privacy topic branch is demoted to discovery-only 65 so privacy-notice and data-processing prose can no longer enforce.
      Description now identifies maps or inventories that trace personal-data movement between systems.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 861 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
