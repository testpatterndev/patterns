schema: testpattern/v1
name: Supplier due diligence reports
slug: au-top500-149-supplier-due-diligence-reports
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to supplier due diligence reports in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: corporate-m-and-a. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:supplier\s+due\s+diligence|due\s+diligence\s+report|vendor\s+assessment|supplier\s+evaluation|background\s+check|financial\s+viability|compliance\s+verification|modern\s+slavery|supply\s+chain\s+risk|procurement\s+review)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - supplier due diligence reports
    - supplier
    - due
    - diligence
    - reports
    - procurement
    - management
  proximity: 300
  keyword_lists:
    - corporate-m-and-a
test_cases:
  should_match:
    - value: supplier due diligence
      description: Primary topic phrase match
    - value: due diligence report
      description: Case-insensitive topic phrase match
    - value: vendor assessment
      description: Alternative topic phrase match
    - value: supplier evaluation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to supplier due diligence reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_supplier_due_diligence
      matches:
        - ref: Evidence_supplier_due_diligence
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_supplier_due_diligence
      matches:
        - ref: Evidence_supplier_due_diligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_supplier_due_diligence
      matches:
        - ref: Evidence_supplier_due_diligence
  regexes:
    - id: Pattern_supplier_due_diligence
      pattern: >-
        (?is)\b(?:supplier\s+due\s+diligence|due\s+diligence\s+report|vendor\s+assessment|supplier\s+evaluation|background\s+check|financial\s+viability|compliance\s+verification|modern\s+slavery|supply\s+chain\s+risk|procurement\s+review)\b
    - id: Pattern_au_top500_149_supplier_due_diligence_reports_label_context
      pattern: (?i)\\b(?:supplier\\s+due\\s+diligence\\s+reports|supplier|due|diligence|reports|top500)\\b
  keywords:
    - id: Evidence_supplier_due_diligence
      groups:
        - match_style: word
          terms:
            - supplier due diligence
            - due diligence report
            - vendor assessment
            - supplier evaluation
            - background check
            - financial viability
            - compliance verification
            - modern slavery
            - supply chain risk
            - procurement review
    - id: Keyword_au_top500_149_supplier_due_diligence_reports_domain_context
      groups:
        - match_style: word
          terms:
            - supplier due diligence reports
            - supplier
            - due
            - diligence
            - reports
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
