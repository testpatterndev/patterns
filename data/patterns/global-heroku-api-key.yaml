schema: testpattern/v1
name: Heroku API Key
slug: global-heroku-api-key
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Heroku platform API keys in the prefixed HRKU- form. These keys authenticate to the
  Heroku Platform API and can deploy apps, read config vars and manage add-ons; a leak enables full account compromise.
operation: >-
  Prefixed token format HRKU- followed by ~60 base64url-style characters (newer Heroku key format). Corroborative
  evidence: keywords within 300 characters. The legacy bare-UUID form is intentionally excluded because it requires Heroku context to detect reliably.
pattern: (?<![A-Za-z0-9_-])HRKU-[A-Za-z0-9_-]{55,63}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: the distinctive HRKU- prefix with a long high-entropy body makes false positives extremely unlikely. The legacy UUID form is excluded to preserve high confidence.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - heroku
    - heroku api key
    - HEROKU_API_KEY
    - api.heroku.com
    - platform api
    - bearer
  proximity: 300
test_cases:
  should_match:
    - value: HRKU-AAaBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789-_AAaBcDeFgHiJkLmNoP
      description: Exact 65 probe - HRKU structure without provider corroboration
    - value: 'Heroku Platform app credential HRKU-zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIhHgGfFeEdDcCbBaA0123456'
      description: Exact 75 probe - key plus Heroku application context
    - value: 'Heroku Platform API credential HEROKU_API_KEY=HRKU-AA0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRST'
      description: Exact 85 probe - platform context plus canonical API-key assignment
  should_not_match:
    - value: HRKU-tooShort
      description: Too short to be a Heroku API key
    - value: 01234567-89ab-cdef-0123-456789abcdef
      description: Legacy bare-UUID form (no HRKU- prefix) - excluded by design
    - value: 'NETLIFY_AUTH_TOKEN=HRKU-AA0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRST'
      description: Sibling platform label does not corroborate a Heroku key
    - value: 'Documentation example: Heroku Platform API HEROKU_API_KEY=HRKU-AA0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRST'
      description: Documentation example with a valid-shaped key is excluded
    - value: set your heroku api key in the netrc file
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder HRKU- strings.
    mitigation: Require corroborative Heroku keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This high-confidence pattern identifies the newer HRKU-prefixed Heroku Platform API key and intentionally excludes ambiguous legacy UUIDs. A live key can deploy code, read application configuration variables, manage add-ons, and affect billing for apps available to the account. The normal credential creates serious cloud-platform harm but does not prove control of every app, organisation, or critical service. Risk 8 and SENSITIVE InfoTech are justified; PROTECTED requires demonstrated broad high-impact access.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_heroku_api_key
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_heroku_api_key
      matches:
        - ref: Keyword_heroku_platform_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_heroku_api_key
      matches:
        - ref: Keyword_heroku_platform_context
        - ref: Pattern_heroku_key_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_heroku_api_key
      pattern: (?<![A-Za-z0-9_-])HRKU-[A-Za-z0-9_-]{55,63}(?![A-Za-z0-9_-])
    - id: Pattern_heroku_key_assignment
      pattern: (?i)\b(?:HEROKU_API_KEY|HEROKU_TOKEN)\s*[=:]
  keywords:
    - id: Keyword_heroku_platform_context
      groups:
        - match_style: string
          terms:
            - Heroku Platform
            - Heroku app
            - Heroku deploy
            - api.heroku.com
      strength: specific
