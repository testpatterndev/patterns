schema: testpattern/v1
name: Heroku API Key
slug: global-heroku-api-key
version: 1.1.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Heroku platform API keys in the prefixed HRKU- form. These keys authenticate to the
  Heroku Platform API and can deploy apps, read config vars and manage add-ons; a leak enables full account compromise.
operation: >-
  Prefixed token format HRKU- followed by ~60 base64url-style characters (newer Heroku key format). Corroborative
  evidence: keywords within 300 characters. The legacy bare-UUID form is intentionally excluded because it requires Heroku context to detect reliably.
pattern: (?<![A-Za-z0-9_-])HRKU-[A-Za-z0-9_-]{55,63}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: the distinctive HRKU- prefix with a long high-entropy body makes false positives extremely unlikely. The legacy UUID form is excluded to preserve high confidence.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - heroku
    - heroku api key
    - HEROKU_API_KEY
    - api.heroku.com
    - platform api
    - bearer
  proximity: 300
test_cases:
  should_match:
    - value: HRKU-AAaBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789-_AAaBcDeFgHiJkLmNoP
      description: Heroku API key, HRKU- prefix + long body
    - value: 'HEROKU_API_KEY=HRKU-AA0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRST'
      description: Labelled Heroku API key in env var
    - value: HRKU-zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIhHgGfFeEdDcCbBaA0123456
      description: Mixed-case Heroku API key
  should_not_match:
    - value: HRKU-tooShort
      description: Too short to be a Heroku API key
    - value: 01234567-89ab-cdef-0123-456789abcdef
      description: Legacy bare-UUID form (no HRKU- prefix) - excluded by design
    - value: set your heroku api key in the netrc file
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder HRKU- strings.
    mitigation: Require corroborative Heroku keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  A leaked Heroku API key allows deploying arbitrary code, reading every app's config vars (often containing other secrets) and managing billing.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-09'
