schema: testpattern/v1
name: NuGet API Key
slug: global-nuget-api-key
version: 1.1.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects NuGet.org API keys (oy2 prefix), used to push packages to the NuGet gallery.
  A leaked key lets an attacker publish or unlist packages under the owner's account.
operation: 'Prefixed token format oy2 followed by 43 lowercase-base32 characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9])oy2[a-z0-9]{43}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the oy2 prefix with a fixed 43-character lowercase base32 body is
  specific to NuGet.org API keys.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - nuget
    - nuget.org
    - api key
    - apikey
    - dotnet nuget push
    - NUGET_API_KEY
    - package source
  proximity: 300
test_cases:
  should_match:
    - value: oy2abcdefghijklmnopqrstuvwxyz0123456789abcdefg
      description: NuGet API key, oy2 prefix + 43 base32 chars
    - value: 'NUGET_API_KEY=oy2mnbvcxzlkjhgfdsapoiuytrewq0123456789abcdefg'
      description: Labelled NuGet key in an env assignment
    - value: oy2zyxwvutsrqponmlkjihgfedcba0987654321zyxwvut
      description: Another NuGet key body
  should_not_match:
    - value: oy2abcdefghijklmnopqrstuvwxyz
      description: Too short to be a valid NuGet key
    - value: oy3abcdefghijklmnopqrstuvwxyz0123456789abcdefg
      description: Wrong prefix (oy3 instead of oy2)
    - value: run dotnet nuget push with your nuget.org api key
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder oy2 strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This high-confidence detector finds a NuGet.org API key with the oy2 prefix and fixed lowercase token body. A valid key can publish package versions or unlist legitimate packages within its configured scopes, creating package tampering and consumer exposure. The normal match seriously affects the packages authorised to one key but does not establish control of critical or broadly consumed packages. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED requires demonstrated significant supply-chain damage or exceptional package reach.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
