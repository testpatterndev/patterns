schema: testpattern/v1
name: NuGet API Key
slug: global-nuget-api-key
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects NuGet.org API keys (oy2 prefix), used to push packages to the NuGet gallery.
  A leaked key lets an attacker publish or unlist packages under the owner's account.
operation: 'Prefixed token format oy2 followed by 43 lowercase-base32 characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9])oy2[a-z0-9]{43}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the oy2 prefix with a fixed 43-character lowercase base32 body is
  specific to NuGet.org API keys.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - nuget
    - nuget.org
    - api key
    - apikey
    - dotnet nuget push
    - NUGET_API_KEY
    - package source
  proximity: 300
test_cases:
  should_match:
    - value: oy2abcdefghijklmnopqrstuvwxyz0123456789abcdefg
      description: Exact 65 probe - fixed key structure without independent NuGet context
    - value: 'NuGet package push credential oy2zyxwvutsrqponmlkjihgfedcba0987654321zyxwvut'
      description: Exact 75 probe - key with NuGet package-publish context
    - value: 'NuGet.org package publish secret NUGET_API_KEY=oy2mnbvcxzlkjhgfdsapoiuytrewq0123456789abcdefg'
      description: Exact 85 probe - NuGet.org context plus canonical API-key assignment
  should_not_match:
    - value: oy2abcdefghijklmnopqrstuvwxyz
      description: Too short to be a valid NuGet key
    - value: oy3abcdefghijklmnopqrstuvwxyz0123456789abcdefg
      description: Wrong prefix (oy3 instead of oy2)
    - value: 'NPM_TOKEN=oy2abcdefghijklmnopqrstuvwxyz0123456789abcdefg'
      description: Sibling package-registry label does not corroborate a NuGet key
    - value: 'Documentation example: NuGet.org package NUGET_API_KEY=oy2abcdefghijklmnopqrstuvwxyz0123456789abcdefg'
      description: Documentation example containing a valid-shaped key is excluded
    - value: run dotnet nuget push with your nuget.org api key
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder oy2 strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This high-confidence detector finds a NuGet.org API key with the oy2 prefix and fixed lowercase token body. A valid key can publish package versions or unlist legitimate packages within its configured scopes, creating package tampering and consumer exposure. The normal match seriously affects the packages authorised to one key but does not establish control of critical or broadly consumed packages. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED requires demonstrated significant supply-chain damage or exceptional package reach.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_nuget_api_key
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_nuget_api_key
      matches:
        - ref: Keyword_nuget_publish_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_nuget_api_key
      matches:
        - ref: Keyword_nuget_publish_context
        - ref: Pattern_nuget_key_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_nuget_api_key
      pattern: (?<![A-Za-z0-9])oy2[a-z0-9]{43}(?![A-Za-z0-9])
    - id: Pattern_nuget_key_assignment
      pattern: (?i)\b(?:NUGET_API_KEY|NUGET_AUTH_TOKEN)\s*[=:]
  keywords:
    - id: Keyword_nuget_publish_context
      groups:
        - match_style: string
          terms:
            - NuGet.org package
            - NuGet package push
            - dotnet nuget push
            - NuGet gallery publish
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
changelog:
  - version: 1.1.2
    date: '2026-07-19'
    description: 'Add an individual 65 discovery / 75 NuGet-publish / 85 canonical-assignment Purview contract with exact-tier, sibling-registry, malformed, and documentation probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1552 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
author: testpattern-community
license: MIT
