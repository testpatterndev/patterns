schema: testpattern/v1
name: Force readiness assessments
slug: global-top500-434-force-readiness-assessments
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to force readiness assessments in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:force\s+readiness|combat\s+readiness|operational\s+readiness|mission\s+capable|unit\s+readiness|readiness\s+assessment|deployment\s+status|force\s+posture|troop\s+strength|materiel\s+readiness|training\s+readiness|force\s+generation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - force readiness assessments
  proximity: 240
test_cases:
  should_match:
    - value: force readiness
      description: Primary topic phrase match
    - value: combat readiness
      description: Case-insensitive topic phrase match
    - value: operational readiness
      description: Alternative topic phrase match
    - value: mission capable
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to force readiness assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_force_readiness_assessments
      matches:
        - ref: Pattern_global_top500_434_force_readiness_assessments_label_context
        - ref: Keyword_global_top500_434_force_readiness_assessments_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_force_readiness_assessments
      matches:
        - ref: Keyword_force_readiness_assessments
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_force_readiness_assessments
      matches:
        - ref: Keyword_force_readiness_assessments
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_force_readiness_assessments
      pattern: >-
        (?is)\b(?:force\s+readiness|combat\s+readiness|operational\s+readiness|mission\s+capable|unit\s+readiness|readiness\s+assessment|deployment\s+status|force\s+posture|troop\s+strength|materiel\s+readiness|training\s+readiness|force\s+generation)\b
    - id: Pattern_global_top500_434_force_readiness_assessments_label_context
      pattern: (?i)\\b(?:force\\s+readiness\\s+assessments|force|readiness|assessments|top500)\\b
  keywords:
    - id: Keyword_force_readiness_assessments
      groups:
        - match_style: word
          terms:
            - force readiness
            - combat readiness
            - operational readiness
            - mission capable
            - unit readiness
            - readiness assessment
            - deployment status
            - force posture
            - troop strength
            - materiel readiness
            - training readiness
            - force generation
    - id: Keyword_global_top500_434_force_readiness_assessments_domain_context
      groups:
        - match_style: word
          terms:
            - force readiness assessments
            - force
            - readiness
            - assessments
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
