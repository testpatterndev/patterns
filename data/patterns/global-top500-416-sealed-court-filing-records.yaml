schema: testpattern/v1
name: Sealed court filing records
slug: global-top500-416-sealed-court-filing-records
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to sealed court filing records in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:sealed\s+record|sealed\s+filing|court\s+seal|sealed\s+indictment|sealed\s+order|under\s+seal|sealed\s+docket|confidential\s+filing|sealed\s+proceeding|restricted\s+access|sealed\s+court\s+order|expunged\s+record)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - sealed court filing records
  proximity: 240
test_cases:
  should_match:
    - value: sealed record
      description: Primary topic phrase match
    - value: sealed filing
      description: Case-insensitive topic phrase match
    - value: court seal
      description: Alternative topic phrase match
    - value: sealed indictment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to sealed court filing records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_sealed_court
      matches:
        - ref: Pattern_global_top500_416_sealed_court_filing_records_label_context
        - ref: Keyword_global_top500_416_sealed_court_filing_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_sealed_court
      matches:
        - ref: Keyword_sealed_court
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_sealed_court
      matches:
        - ref: Keyword_sealed_court
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_sealed_court
      pattern: >-
        (?is)\b(?:sealed\s+record|sealed\s+filing|court\s+seal|sealed\s+indictment|sealed\s+order|under\s+seal|sealed\s+docket|confidential\s+filing|sealed\s+proceeding|restricted\s+access|sealed\s+court\s+order|expunged\s+record)\b
    - id: Pattern_global_top500_416_sealed_court_filing_records_label_context
      pattern: (?i)\\b(?:sealed\\s+court\\s+filing\\s+records|sealed|court|filing|top500)\\b
  keywords:
    - id: Keyword_sealed_court
      groups:
        - match_style: word
          terms:
            - sealed record
            - sealed filing
            - court seal
            - sealed indictment
            - sealed order
            - under seal
            - sealed docket
            - confidential filing
            - sealed proceeding
            - restricted access
            - sealed court order
            - expunged record
    - id: Keyword_global_top500_416_sealed_court_filing_records_domain_context
      groups:
        - match_style: word
          terms:
            - sealed court filing records
            - sealed
            - court
            - filing
            - top500
            - field
            - identifier
            - reference
