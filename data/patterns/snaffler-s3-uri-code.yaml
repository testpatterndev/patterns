schema: testpattern/v1
name: S3 URI in Source Code with AWS Credential Context
slug: snaffler-s3-uri-code
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Detects S3 and S3A URI references in source code or configuration files when
  accompanied by AWS credential context. S3 URIs alone are high-FP enumeration
  signals; this pattern only fires at 75+ confidence when AWS credential evidence
  (access key, secret, AKIA prefix, bucket context) is present within 300 characters.
  Mirrors Snaffler rule KeepS3UriPrefixInCode.
operation: >-
  Matches s3:// and s3a:// URI prefixes followed by bucket or path identifiers.
  Enumeration-quality detection on its own; gated to 75/85 tiers requiring AWS
  credential proximity evidence. No 65-tier (pattern-only) is emitted because
  standalone S3 URIs in documentation generate high false positive rates.
pattern: 's3a?://[A-Za-z0-9\-+/]{2,40}'
confidence: low
confidence_justification: >-
  Low confidence alone: s3:// URIs appear in logging config, documentation, and
  infrastructure code without any credential exposure. Detection is only meaningful
  when combined with AWS credential evidence (AKIA key IDs, aws_secret_access_key
  assignments, or bucket policy context) within 300 characters.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
data_categories:
  - credentials
  - security
  - cloud
corroborative_evidence:
  keywords:
    - aws_access_key_id
    - aws_secret_access_key
    - AKIA
    - bucket
    - AWS_SECRET
  proximity: 300
test_cases:
  should_match:
    - value: 'aws_access_key_id=AKIAIOSFODNN7EXAMPLE bucket=s3://my-prod-bucket/data'
      description: S3 URI alongside an AWS access key ID - genuine credential context
    - value: 'aws_secret_access_key=wJalrXUtnFEMI/K7MDENG s3://logs-bucket/2026'
      description: S3 URI adjacent to an AWS secret access key assignment
    - value: "AKIAexampleKeyId1234 s3a://hdfs-bucket/warehouse/db.parquet"
      description: S3A URI used with a Hadoop S3A connector alongside an AKIA key prefix
  should_not_match:
    - value: 'bucket_name=my-prod-logs storage_class=STANDARD region=us-east-1'
      description: AWS bucket configuration without any S3 URI scheme present
    - value: 'aws_access_key_id=AKIAIOSFODNN7EXAMPLE region=us-east-1 endpoint=https://s4.example.com/bucket'
      description: AWS credential context but URL uses https not s3 scheme so regex does not match
false_positives:
  - description: >-
      High FP rate alone; gated on AWS credential proximity. Any file containing S3 URIs
      without credential terms (logging config, Spark jobs reading public datasets,
      infrastructure docs) generates false positives if the gating is bypassed.
    mitigation: Enforce 75-tier minimum (evidence required); never fire on pattern alone.
  - description: CI/CD pipeline logs that print s3:// URIs alongside masked credential variables like AWS_SECRET_ACCESS_KEY=***.
    mitigation: Masked values (asterisks, REDACTED) should not satisfy the evidence keyword requirement; ensure keyword terms match literal AKIA or secret text.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_snaffler_s3_uri
      matches:
        - ref: Keyword_snaffler_s3_aws_cred_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_s3_uri
      matches:
        - ref: Keyword_snaffler_s3_aws_cred_evidence
        - ref: Keyword_snaffler_s3_akia_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_s3_uri
      pattern: 's3a?://[A-Za-z0-9\-+/]{2,40}'
  keywords:
    - id: Keyword_snaffler_s3_aws_cred_evidence
      groups:
        - match_style: word
          terms:
            - aws_access_key_id
            - aws_secret_access_key
            - AWS_SECRET
            - AWS_ACCESS_KEY
            - bucket
            - AKIA
    - id: Keyword_snaffler_s3_akia_context
      groups:
        - match_style: string
          terms:
            - AKIA
            - aws_secret_access_key
            - aws_access_key_id
created: '2026-06-26'
updated: '2026-06-26'
author: testpattern-community
license: MIT
