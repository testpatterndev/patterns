schema: testpattern/v1
name: Academic transcripts
slug: global-top500-343-academic-transcripts
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to academic transcripts in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-education. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:academic\s+transcript|official\s+transcript|student\s+transcript|academic\s+record|credit\s+hours|grade\s+point\s+average|degree\s+awarded|course\s+history|cumulative\s+GPA)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - academic transcripts
    - academic
    - transcripts
    - education
    - research
    - administration
  proximity: 300
  keyword_lists:
    - industry-education
test_cases:
  should_match:
    - value: academic transcript
      description: Primary topic phrase match
    - value: official transcript
      description: Case-insensitive topic phrase match
    - value: student transcript
      description: Alternative topic phrase match
    - value: academic record
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to academic transcripts appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_academic_transcripts
      matches:
        - ref: Pattern_global_top500_343_academic_transcripts_label_context
        - ref: Keyword_global_top500_343_academic_transcripts_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_academic_transcripts
      matches:
        - ref: Keyword_academic_transcripts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_academic_transcripts
      matches:
        - ref: Keyword_academic_transcripts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_academic_transcripts
      pattern: (?is)\b(?:academic\s+transcript|official\s+transcript|student\s+transcript|academic\s+record|credit\s+hours|grade\s+point\s+average|degree\s+awarded|course\s+history|cumulative\s+GPA)\b
    - id: Pattern_global_top500_343_academic_transcripts_label_context
      pattern: (?i)\\b(?:academic\\s+transcripts|academic|transcripts|top500)\\b
  keywords:
    - id: Keyword_academic_transcripts
      groups:
        - match_style: word
          terms:
            - academic transcript
            - official transcript
            - student transcript
            - academic record
            - credit hours
            - education
            - administration
            - grade point average
            - degree awarded
            - course history
            - cumulative GPA
            - registrar
    - id: Keyword_global_top500_343_academic_transcripts_domain_context
      groups:
        - match_style: word
          terms:
            - academic transcripts
            - academic
            - transcripts
            - top500
            - field
            - identifier
            - reference
