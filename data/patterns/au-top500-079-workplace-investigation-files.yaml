schema: testpattern/v1
name: Workplace investigation files
slug: au-top500-079-workplace-investigation-files
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to workplace investigation files in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:workplace\s+investigation|investigation\s+report|investigation\s+findings|workplace\s+inquiry|investigation\s+outcome|formal\s+investigation|investigation\s+file|terms\s+of\s+reference|investigation\s+summary|witness\s+statement)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - workplace investigation files
    - workplace
    - investigation
    - files
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: workplace investigation
      description: Primary topic phrase match
    - value: investigation report
      description: Case-insensitive topic phrase match
    - value: investigation findings
      description: Alternative topic phrase match
    - value: workplace inquiry
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to workplace investigation files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_workplace_investigation
      matches:
        - ref: Evidence_workplace_investigation
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_079_workplace_investigation_files_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_workplace_investigation
      matches:
        - ref: Evidence_workplace_investigation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_079_workplace_investigation_files_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_workplace_investigation
      matches:
        - ref: Evidence_workplace_investigation
  regexes:
    - id: Pattern_workplace_investigation
      pattern: (?is)\b(?:workplace\s+investigation|investigation\s+report|investigation\s+findings|workplace\s+inquiry|investigation\s+outcome|formal\s+investigation|investigation\s+file|terms\s+of\s+reference|investigation\s+summary|witness\s+statement)\b
    - id: Pattern_au_top500_079_workplace_investigation_files_label_context
      pattern: (?i)\\b(?:workplace\\s+investigation\\s+files|workplace|investigation|files|top500)\\b
  keywords:
    - id: Evidence_workplace_investigation
      groups:
        - match_style: word
          terms:
            - workplace investigation
            - investigation report
            - investigation findings
            - workplace inquiry
            - investigation outcome
            - formal investigation
            - allegation
            - investigation file
            - investigator
            - terms of reference
            - investigation summary
            - witness statement
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_079_workplace_investigation_files_domain_context
      groups:
        - match_style: word
          terms:
            - workplace investigation files
            - workplace
            - investigation
            - files
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_079_workplace_investigation_files_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
