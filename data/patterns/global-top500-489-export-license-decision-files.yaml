schema: testpattern/v1
name: Export license decision files
slug: global-top500-489-export-license-decision-files
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to export license decision files in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: au-vehicle-permit-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:export\s+license\s+decision\s+files|export\s+license|export\s+control|dual[\s-]+use\s+goods|end[\s-]+user\s+certificate|export\s+permit|technology\s+transfer|controlled\s+items|munitions\s+list|commerce\s+control\s+list|licensing\s+decision|strategic\s+goods)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - export license decision files
  proximity: 240
  keyword_lists:
    - au-vehicle-permit-terms
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: export license decision files
      description: Primary topic phrase match
    - value: export license
      description: Case-insensitive topic phrase match
    - value: export control
      description: Alternative topic phrase match
    - value: dual-use goods
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: immigration case
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to export license decision files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_export_license
      matches:
        - ref: Pattern_global_top500_489_export_license_decision_files_label_context
        - ref: Keyword_global_top500_489_export_license_decision_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_export_license
      matches:
        - ref: Keyword_export_license
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_export_license
      pattern: >-
        (?is)\b(?:export\s+license\s+decision\s+files|export\s+license|export\s+control|dual[\s-]+use\s+goods|end[\s-]+user\s+certificate|export\s+permit|technology\s+transfer|controlled\s+items|munitions\s+list|commerce\s+control\s+list|licensing\s+decision|strategic\s+goods)\b
    - id: Pattern_global_top500_489_export_license_decision_files_label_context
      pattern: (?i)\b(?:export\s+license\s+decision\s+files)\b
  keywords:
    - id: Keyword_export_license
      groups:
        - match_style: word
          terms:
            - export license decision files
            - export license
            - export control
            - dual-use goods
            - end-user certificate
            - export permit
            - technology transfer
            - controlled items
            - munitions list
            - commerce control list
            - licensing decision
            - strategic goods
      strength: specific
    - id: Keyword_global_top500_489_export_license_decision_files_domain_context
      groups:
        - match_style: word
          terms:
            - export license decision files
            - license
            - decision
            - files
      strength: domain
risk_description: >-
  The concept SIT recognises export licences, controlled and dual-use goods, end-user certificates, technology transfer, munitions lists, and licensing decisions; it does not require an adjudicated file. A genuine decision record can disclose applicants, capabilities, destinations, end users, intelligence concerns, and approval reasoning, enabling evasion, commercial exploitation, or proliferation-related targeting. The harm is serious but usually contained to one licence, exporter, and transaction, while public export-control guidance and product compliance material can match the phrases. Risk 8 and SENSITIVE fit that exposure; PROTECTED would require highly sensitive weapons or strategic technology detail whose compromise creates a credible prospect of significant national-security damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
