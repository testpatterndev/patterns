schema: testpattern/v1
name: Payment card primary account numbers
slug: global-top500-105-payment-card-primary-account-numbers
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to payment card primary account numbers in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword
  lists: financial-payment-card-terms, financial-cvv. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b(?:4\d{12}(?:\d{3})?|5[1-5]\d{14}|3[47]\d{13}|6(?:011|5\d{2})\d{12}|2[2-7]\d{14})\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payment card primary account numbers
    - payment
    - card
    - primary
    - account
    - numbers
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - financial-payment-card-terms
    - financial-cvv
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: '4111111111111111'
      description: Visa PAN
    - value: '5500005555555559'
      description: Mastercard PAN
    - value: '340000000000009'
      description: Amex PAN
  should_not_match:
    - value: '1234567890123456'
      description: Not a valid card BIN
    - value: '4111'
      description: Too short
    - value: 'template example placeholder'
      description: Template/sample text
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_payment_card_pan
      matches:
        - ref: Keyword_payment_card_pan
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_payment_card_pan
      matches:
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_payment_card_pan
      pattern: \b(?:4\d{12}(?:\d{3})?|5[1-5]\d{14}|3[47]\d{13}|6(?:011|5\d{2})\d{12}|2[2-7]\d{14})\b
    - id: Pattern_global_top500_105_payment_card_primary_account_numbers_label_context
      pattern: (?i)\b(?:payment\s+card\s+primary\s+account\s+numbers)\b
  keywords:
    - id: Keyword_payment_card_pan
      groups:
        - match_style: word
          terms:
            - payment card primary account numbers
            - primary account number
            - text: PAN
              case_sensitive: true
            - card number
            - credit card
            - debit card
            - cardholder
            - card issuer
            - payment card
            - card network
            - PCI DSS
      strength: specific
    - id: Keyword_global_top500_105_payment_card_primary_account_numbers_domain_context
      groups:
        - match_style: word
          terms:
            - payment card primary account numbers
            - payment
            - card
            - primary
      strength: domain
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
