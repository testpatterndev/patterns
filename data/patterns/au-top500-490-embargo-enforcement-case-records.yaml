schema: testpattern/v1
name: Embargo enforcement case records
slug: au-top500-490-embargo-enforcement-case-records
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to embargo enforcement case records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: corporate-confidentiality. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:embargo\s+enforcement|enforcement\s+case|trade\s+embargo|sanctions\s+violation|prohibited\s+export|enforcement\s+action|customs\s+seizure|embargo\s+breach|trade\s+restriction|consolidated\s+list|designated\s+entity)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - embargo enforcement case records
    - embargo
    - enforcement
    - case
    - records
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:

    - corporate-confidentiality
test_cases:
  should_match:
    - value: embargo enforcement
      description: Primary topic phrase match
    - value: enforcement case
      description: Case-insensitive topic phrase match
    - value: trade embargo
      description: Alternative topic phrase match
    - value: sanctions violation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to embargo enforcement case records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_embargo_enforcement_case_records
      matches:
        - ref: Evidence_embargo_enforcement_case_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_490_embargo_enforcement_case_records_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_embargo_enforcement_case_records
      matches:
        - ref: Evidence_embargo_enforcement_case_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_490_embargo_enforcement_case_records_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_embargo_enforcement_case_records
      matches:
        - ref: Evidence_embargo_enforcement_case_records
  regexes:
    - id: Pattern_embargo_enforcement_case_records
      pattern: (?is)\b(?:embargo\s+enforcement|enforcement\s+case|trade\s+embargo|sanctions\s+violation|prohibited\s+export|enforcement\s+action|customs\s+seizure|embargo\s+breach|trade\s+restriction|consolidated\s+list|designated\s+entity)\b
    - id: Pattern_au_top500_490_embargo_enforcement_case_records_label_context
      pattern: (?i)\\b(?:embargo\\s+enforcement\\s+case\\s+records|embargo|enforcement|case|top500)\\b
  keywords:
    - id: Evidence_embargo_enforcement_case_records
      groups:
        - match_style: word
          terms:
            - embargo enforcement
            - enforcement case
            - trade embargo
            - sanctions violation
            - DFAT
            - prohibited export
            - enforcement action
            - customs seizure
            - embargo breach
            - trade restriction
            - consolidated list
            - designated entity
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_490_embargo_enforcement_case_records_domain_context
      groups:
        - match_style: word
          terms:
            - embargo enforcement case records
            - embargo
            - enforcement
            - case
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_490_embargo_enforcement_case_records_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
