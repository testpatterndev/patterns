schema: testpattern/v1
name: Cryptographic implementation details
slug: global-top500-213-cryptographic-implementation-details
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to cryptographic implementation details in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:cryptographic\s+implementation\s+details|encryption\s+algorithm|cryptographic\s+key|intellectual\s+property|trade\s+secrets|proprietary\s+encryption|cipher\s+implementation|key\s+management|cryptographic\s+protocol|secret\s+key)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - cryptographic implementation details
    - cryptographic
    - implementation
    - details
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: cryptographic implementation details
      description: Primary topic phrase match
    - value: encryption algorithm
      description: Case-insensitive topic phrase match
    - value: cryptographic key
      description: Alternative topic phrase match
    - value: intellectual property
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to cryptographic implementation details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_cryptographic_implementation
      matches:
        - ref: Pattern_global_top500_213_cryptographic_implementation_details_label_context
        - ref: Keyword_global_top500_213_cryptographic_implementation_details_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_213_cryptographic_implementation_details_noise_exclusion
    - confidence_level: 75
      id_match: Regex_cryptographic_implementation
      matches:
        - ref: Keyword_cryptographic_implementation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_213_cryptographic_implementation_details_noise_exclusion
    - confidence_level: 65
      id_match: Regex_cryptographic_implementation
      matches:
        - ref: Keyword_cryptographic_implementation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_213_cryptographic_implementation_details_noise_exclusion
  regexes:
    - id: Regex_cryptographic_implementation
      pattern: (?is)\b(?:cryptographic\s+implementation\s+details|encryption\s+algorithm|cryptographic\s+key|intellectual\s+property|trade\s+secrets|proprietary\s+encryption|cipher\s+implementation|key\s+management|cryptographic\s+protocol|secret\s+key)\b
    - id: Pattern_global_top500_213_cryptographic_implementation_details_label_context
      pattern: (?i)\\b(?:cryptographic\\s+implementation\\s+details|cryptographic|implementation|top500)\\b
  keywords:
    - id: Keyword_cryptographic_implementation
      groups:
        - match_style: word
          terms:
            - cryptographic implementation details
            - encryption algorithm
            - cryptographic key
            - intellectual property
            - trade secrets
            - proprietary encryption
            - cipher implementation
            - key management
            - cryptographic protocol
            - secret key
    - id: Keyword_global_top500_213_cryptographic_implementation_details_domain_context
      groups:
        - match_style: word
          terms:
            - cryptographic implementation details
            - cryptographic
            - implementation
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_213_cryptographic_implementation_details_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
