schema: testpattern/v1
name: Activist defense plans
slug: au-top500-199-activist-defense-plans
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to activist defense plans in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: au-government-defence-markers.'
pattern: (?is)\b(?:activist\s+defense|defense\s+plan|shareholder\s+activism|activist\s+investor|proxy\s+fight|proxy\s+contest|hostile\s+takeover|poison\s+pill|board\s+defense|shareholder\s+engagement|takeover\s+defense|corporate\s+governance)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - activist defense plans
    - activist
    - defense
    - plans
    - mergers
    - acquisitions
    - strategy
  proximity: 300
  keyword_lists:
    - au-government-defence-markers
test_cases:
  should_match:
    - value: activist defense
      description: Primary topic phrase match
    - value: defense plan
      description: Case-insensitive topic phrase match
    - value: shareholder activism
      description: Alternative topic phrase match
    - value: activist investor
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to activist defense plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_activist_defense
      matches:
        - ref: Evidence_activist_defense
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_activist_defense
      matches:
        - ref: Evidence_activist_defense
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_activist_defense
      matches:
        - ref: Evidence_activist_defense
  regexes:
    - id: Pattern_activist_defense
      pattern: (?is)\b(?:activist\s+defense|defense\s+plan|shareholder\s+activism|activist\s+investor|proxy\s+fight|proxy\s+contest|hostile\s+takeover|poison\s+pill|board\s+defense|shareholder\s+engagement|takeover\s+defense|corporate\s+governance)\b
  keywords:
    - id: Evidence_activist_defense
      groups:
        - match_style: word
          terms:
            - activist defense
            - defense plan
            - shareholder activism
            - activist investor
            - proxy fight
            - proxy contest
            - hostile takeover
            - poison pill
            - board defense
            - shareholder engagement
            - takeover defense
            - corporate governance
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
