schema: testpattern/v1
name: Supplier performance scorecards
slug: au-top500-160-supplier-performance-scorecards
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to supplier performance scorecards in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:supplier\s+performance\s+scorecards|supplier\s+performance|vendor\s+rating|key\s+performance\s+indicator|service\s+level\s+agreement|delivery\s+performance|quality\s+metrics|contract\s+compliance|supplier\s+management)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - supplier performance scorecards
    - supplier
    - performance
    - scorecards
    - procurement
    - management
  proximity: 300
test_cases:
  should_match:
    - value: supplier performance scorecards
      description: Primary topic phrase match
    - value: supplier performance
      description: Case-insensitive topic phrase match
    - value: vendor rating
      description: Alternative topic phrase match
    - value: key performance indicator
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to supplier performance scorecards appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_supplier_performance
      matches:
        - ref: Evidence_supplier_performance
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_supplier_performance
      matches:
        - ref: Evidence_supplier_performance
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_supplier_performance
      matches:
        - ref: Evidence_supplier_performance
  regexes:
    - id: Pattern_supplier_performance
      pattern: >-
        (?is)\b(?:supplier\s+performance\s+scorecards|supplier\s+performance|vendor\s+rating|key\s+performance\s+indicator|service\s+level\s+agreement|delivery\s+performance|quality\s+metrics|contract\s+compliance|supplier\s+management)\b
    - id: Pattern_au_top500_160_supplier_performance_scorecards_label_context
      pattern: (?i)\\b(?:supplier\\s+performance\\s+scorecards|supplier|performance|scorecards|top500)\\b
  keywords:
    - id: Evidence_supplier_performance
      groups:
        - match_style: word
          terms:
            - supplier performance scorecards
            - supplier performance
            - scorecard
            - vendor rating
            - key performance indicator
            - service level agreement
            - delivery performance
            - quality metrics
            - contract compliance
            - procurement
            - supplier management
    - id: Keyword_au_top500_160_supplier_performance_scorecards_domain_context
      groups:
        - match_style: word
          terms:
            - supplier performance scorecards
            - supplier
            - performance
            - scorecards
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
