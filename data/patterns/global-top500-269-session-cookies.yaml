schema: testpattern/v1
name: Session cookies
slug: global-top500-269-session-cookies
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies session cookies patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:session\s+cookie|session\s+id|secure\s+cookie|authentication\s+cookie|session\s+token|cookie\s+header|session\s+hijack|cookie\s+theft)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - session cookies
    - session
    - cookies
    - credentials
    - keys
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: session cookie
      description: Primary topic phrase match
    - value: session id
      description: Case-insensitive topic phrase match
    - value: secure cookie
      description: Alternative topic phrase match
    - value: authentication cookie
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: jwt httponly
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_session_cookies
      matches:
        - ref: Pattern_global_top500_269_session_cookies_label_context
        - ref: Keyword_global_top500_269_session_cookies_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_session_cookies
      matches:
        - ref: Keyword_session_cookies
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_session_cookies
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_session_cookies
      pattern: (?is)\b(?:session\s+cookie|session\s+id|secure\s+cookie|authentication\s+cookie|session\s+token|cookie\s+header|session\s+hijack|cookie\s+theft)\b
    - id: Pattern_global_top500_269_session_cookies_label_context
      pattern: (?i)\b(?:session\s+cookies)\b
  keywords:
    - id: Keyword_session_cookies
      groups:
        - match_style: word
          terms:
            - session cookie
            - set-cookie
            - session id
            - text: jwt
              case_sensitive: true
            - httponly
            - secure cookie
            - samesite
            - authentication cookie
            - session token
            - cookie header
            - session hijack
            - cookie theft
      strength: specific
    - id: Keyword_global_top500_269_session_cookies_domain_context
      groups:
        - match_style: word
          terms:
            - session cookies
            - session
            - cookies
      strength: domain
risk_description: >-
  The pattern recognises session cookie, session token, authentication cookie, or login session language, identifying a session-security topic rather than a concrete cookie name and value. A genuine record containing a live session artefact can permit replay and account impersonation until expiry or revocation. Browser documentation, application design notes, and troubleshooting material can match, and the detector does not establish token presence, target account, or current validity. Risk 8 SENSITIVE preserves serious contained harm for a true live-session record; PROTECTED would require privileged or broadly consequential access proven by additional evidence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
