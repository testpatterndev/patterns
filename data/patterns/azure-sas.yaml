schema: testpattern/v1
name: Azure SAS
slug: azure-sas
version: 1.5.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Azure Shared Access Signature (SAS) token patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the
  built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Matches Azure SAS tokens containing sv (service version), sig (signature), and other SAS query parameters. SAS tokens provide delegated access to Azure resources. Corroborative evidence: 8 keywords
  within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)[?&]sv=\d{4}-\d{2}-\d{2}(?:&[a-z]+=[^&]{0,256}){0,20}&sig=[A-Za-z0-9%+/=]{20,}
confidence: high
confidence_justification: >-
  High confidence: the sv= date parameter combined with sig= signature parameter is a unique structural pattern for Azure SAS tokens. Added context gating and exclusion rules improve precision and
  reduce incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - SAS
    - shared access signature
    - sv=
    - sig=
    - Azure
    - blob
    - storage
    - container
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '?sv=2021-06-08&ss=b&srt=sco&sp=rwdlacitfx&se=2025-01-01T00:00:00Z&st=2024-01-01T00:00:00Z&spr=https&sig=AAAAAAAAAAAAAAAAAAA%3D'
      description: Azure Storage SAS token
    - value: '?sv=2020-08-04&sr=c&sp=rl&sig=0000000000000000000000000000%2B%2F00%3D'
      description: Container SAS with read/list permissions
    - value: '&sv=2022-11-02&se=2025-12-31&sr=b&sp=r&sig=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdef%3D'
      description: Blob SAS with read permission
  should_not_match:
    - value: '?sv=2021-06-08&ss=b'
      description: Partial SAS parameters without sig
    - value: '?version=2021-06-08&type=blob'
      description: Non-SAS query parameters
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Azure Storage documentation with example SAS tokens.
    mitigation: Check for common placeholder values and documentation context.
  - description: Expired SAS tokens that no longer grant access.
    mitigation: Check se= (expiry) parameter to determine if the token is still valid, but flag regardless.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_azure_sas
      matches:
        - ref: Pattern_azure_sas_label_context
        - ref: Keyword_azure_sas_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_azure_sas
      matches:
        - ref: Keyword_azure_sas
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_azure_sas
      pattern: (?i)[?&]sv=\d{4}-\d{2}-\d{2}(?:&[a-z]+=[^&]{0,256}){0,20}&sig=[A-Za-z0-9%+/=]{20,}
    - id: Pattern_azure_sas_label_context
      pattern: (?i)\b(?:azure\s+sas|azure|sas)\b
  keywords:
    - id: Keyword_azure_sas
      groups:
        - match_style: word
          terms:
            - text: SAS
              case_sensitive: true
            - shared access signature
            - Azure
            - blob
            - storage
            - container
            - SAS token
            - service version
            - signature
            - delegated access
            - storage account
      strength: domain
    - id: Keyword_azure_sas_domain_context
      groups:
        - match_style: word
          terms:
            - azure sas
            - azure
            - sas
      strength: domain
risk_rating: 8
risk_description: >-
  The general SAS pattern detects a signed Azure delegation token without fixing its resource breadth or effective permissions. Exposure can allow an outsider to read or operate on the signed target, but the positive examples include read-only access to a single blob. The likely scale therefore ranges from one object upward and cannot be assumed to be destructive or account-wide. Risk 8 SENSITIVE captures serious bearer-token leakage; PROTECTED requires significant resource scope or high-impact permissions confirmed by other evidence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-azure-sas
    title: Azure SAS entity definition - Microsoft Learn
