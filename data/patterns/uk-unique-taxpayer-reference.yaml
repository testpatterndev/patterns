schema: testpattern/v1
name: Unique Taxpayer Reference
slug: uk-unique-taxpayer-reference
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Unique Taxpayer Reference patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Checksum: Mod 11 (NOT enforced in this regex-only pattern; structural detection only). Reference: https://design.tax.service.gov.uk/hmrc-design-patterns/unique-taxpayer-reference/
  Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials, financial-transaction.
pattern: \b\d{10}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - uk
regulations:
  - UK GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials

    - financial-transaction
test_cases:
  should_match:
    - value: '1234567890'
      description: Standard 10-digit UTR
    - value: '9876543210'
      description: Alternate UTR
    - value: '0123456789'
      description: Zero-leading UTR
  should_not_match:
    - value: 123456789
      description: Only 9 digits instead of 10
    - value: 12345678901
      description: 11 digits instead of 10
    - value: 123456789A
      description: Contains a letter instead of all digits
false_positives:
  - description: >-
      Long numeric sequences in unrelated contexts (tracking numbers, serial codes) matching the Unique Taxpayer
      Reference format
    mitigation: Use corroborative keywords and, where available, checksum validation to filter false matches.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_uk_utr
      matches:
        - ref: Keyword_uk_utr_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_uk_utr
      matches:
        - ref: Keyword_uk_utr_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_uk_utr
  regexes:
    - id: Regex_uk_utr
      pattern: \b\d{10}\b
  keywords:
    - id: Keyword_uk_utr_specific
      groups:
        - match_style: word
          terms:
            - unique taxpayer reference
            - text: UTR
              case_sensitive: true
            - taxpayer reference
            - tax reference number
            - self assessment
            - SA reference
            - HMRC reference
            - unique taxpayer
      strength: specific
    - id: Keyword_uk_utr_broad
      groups:
        - match_style: word
          terms:
            - HMRC
            - tax return
            - tax office
            - inland revenue
            - corporation tax
            - income tax
            - self-employment
            - partnership tax
      strength: specific
  filters:
    - id: Filter_uk_utr_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  A UK Unique Taxpayer Reference match is a ten-digit taxpayer identifier found with HMRC or financial terminology, but the documented Mod-11 checksum is not enforced by this regex pattern. It can support a tax-themed impersonation when combined with the taxpayer's name, yet it does not expose a return or authenticate an HMRC account. The normal exposure affects one person or business, and unrelated tracking or serial numbers can share the ten-digit shape. Risk 5 and OFFICIAL reflect bounded mixed-use harm; a validated UTR linked to filings, income, or credentials would be more sensitive.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-uk-unique-taxpayer-reference-number
    title: "U.K. Unique Taxpayer Reference Number entity definition - Microsoft Learn"
