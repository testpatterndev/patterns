schema: testpattern/v1
name: Volatile memory captures
slug: au-top500-298-volatile-memory-captures
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies volatile memory captures patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:memory\s+dump|volatile\s+memory|ram\s+capture|hiberfil)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - Criminal Code Act 1995 (Cth)
  - Evidence Act 1977 (Qld)
frameworks:
  - ISO 27001
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - volatile memory captures
    - volatile
    - memory
    - captures
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: Volatile memory captures
      description: Exact phrase marker match
    - value: volatile memory captures
      description: Case-insensitive phrase match
    - value: Volatile memory captures
      description: Normalized whitespace phrase
    - value: structured sample with matching anchors
      description: Structural anchor sample
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_volatile_memory
      matches:
        - ref: Evidence_volatile_memory
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_volatile_memory
      matches:
        - ref: Evidence_volatile_memory
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_volatile_memory
  regexes:
    - id: Pattern_volatile_memory
      pattern: (?is)\b(?:memory\s+dump|volatile\s+memory|ram\s+capture|hiberfil)\b
  keywords:
    - id: Evidence_volatile_memory
      groups:
        - match_style: word
          terms:
            - memory dump
            - volatile memory
            - RAM capture
            - hiberfil
            - memory forensics
            - Volatility
            - process listing
            - memory acquisition
            - pagefile
            - crash dump
            - live response
            - memory analysis
