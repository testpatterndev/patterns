schema: testpattern/v1
name: CURP
slug: mx-curp
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects CURP patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this
  version as a starting point for customisation.
operation: >-
  Reference: https://www.gob.mx/curp/ Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion
  logic for template/sample/test text.
pattern: \b[A-Z]{4}\d{6}[HMX][A-Z]{2}[A-Z]{3}[A-Z0-9]\d\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - mx
regulations:
  - LFPDPPP (MX)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: GARS920101HDFRRN09
      description: Male CURP (H=Hombre)
    - value: GARS920101MDFRRN08
      description: Female CURP (M=Mujer)
    - value: AAAA000101HDFAAA01
      description: Generic CURP format
  should_not_match:
    - value: GARS920101ADFRRN09
      description: Invalid gender character (A instead of H/M/X)
    - value: GAR920101HDFRRN09
      description: Only 3 initial letters instead of 4
    - value: GARS920101HDFRRN0
      description: Missing final digit (only 17 characters)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Common words and phrases related to curp appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Spanish (Mexico), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_mx_curp
      matches:
        - ref: Pattern_mx_curp_label_context
        - ref: Keyword_mx_curp_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_mx_curp
      matches:
        - ref: Keyword_mx_curp
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_mx_curp
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_mx_curp
      pattern: \b[A-Z]{4}\d{6}[HMX][A-Z]{2}[A-Z]{3}[A-Z0-9]\d\b
    - id: Pattern_mx_curp_label_context
      pattern: (?i)\b(?:curp)\b
  keywords:
    - id: Keyword_mx_curp
      groups:
        - match_style: word
          terms:
            - CURP
            - Clave Única de Registro de Población
            - clave única
            - registro de población
            - clave de registro
            - identificación personal
            - cédula de identidad
            - documento de identidad
            - número de CURP
            - clave CURP
      strength: specific
    - id: Keyword_mx_curp_domain_context
      groups:
        - match_style: word
          terms:
            - curp
      strength: domain
risk_rating: 5
risk_description: >-
  A Mexican CURP match is an eighteen-character population-registration code whose letters and digits encode personal identity attributes, but it is not a civil-registry file. A scammer could use the code with a name and other details to strengthen impersonation or fraudulent onboarding, while the value alone does not authenticate a service. The normal impact concerns one individual, and policy or HR material can mention CURP without containing a real person's code. Risk 5 and OFFICIAL reflect bounded standalone exposure; linkage to a complete identity, employment, or government record would raise the classification.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-mexico-unique-population-registry-code
    title: Mexico Unique Population Registry Code (CURP) entity definition - Microsoft Learn
