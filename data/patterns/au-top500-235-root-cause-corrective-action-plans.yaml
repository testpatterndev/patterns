schema: testpattern/v1
name: Root-cause corrective action plans
slug: au-top500-235-root-cause-corrective-action-plans
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to root-cause corrective action plans in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword lists: industry-critical-infrastructure, infrastructure-industrial-protocols. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:root\s+cause|corrective\s+action|preventive\s+action|root\s+cause\s+analysis|containment\s+action|effectiveness\s+check|quality\s+improvement|deviation\s+investigation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - root-cause corrective action plans
    - root
    - cause
    - corrective
    - action
    - plans
    - product
    - quality
    - safety
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
test_cases:
  should_match:
    - value: root cause
      description: Primary topic phrase match
    - value: corrective action
      description: Case-insensitive topic phrase match
    - value: preventive action
      description: Alternative topic phrase match
    - value: root cause analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to root-cause corrective action plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 90
      id_match: Pattern_root_cause_corrective_action
      matches:
        - ref: Pattern_au_top500_235_root_cause_corrective_action_plans_label_context
        - ref: Keyword_au_top500_235_root_cause_corrective_action_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_235_root_cause_corrective_action_plans_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_root_cause_corrective_action
      matches:
        - ref: Evidence_root_cause_corrective_action
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_235_root_cause_corrective_action_plans_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_root_cause_corrective_action
      matches:
        - ref: Evidence_root_cause_corrective_action
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_235_root_cause_corrective_action_plans_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_root_cause_corrective_action
      matches:
        - ref: Evidence_root_cause_corrective_action
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_235_root_cause_corrective_action_plans_noise_exclusion
  regexes:
    - id: Pattern_root_cause_corrective_action
      pattern: (?is)\b(?:root\s+cause|corrective\s+action|preventive\s+action|root\s+cause\s+analysis|containment\s+action|effectiveness\s+check|quality\s+improvement|deviation\s+investigation)\b
    - id: Pattern_au_top500_235_root_cause_corrective_action_plans_label_context
      pattern: (?i)\\b(?:root\-cause\\s+corrective\\s+action\\s+plans|root|cause|corrective|action|plans|top500)\\b
  keywords:
    - id: Evidence_root_cause_corrective_action
      groups:
        - match_style: word
          terms:
            - root cause
            - corrective action
            - CAPA
            - nonconformance
            - preventive action
            - root cause analysis
            - containment action
            - effectiveness check
            - quality improvement
            - deviation investigation
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_235_root_cause_corrective_action_plans_domain_context
      groups:
        - match_style: word
          terms:
            - root-cause corrective action plans
            - root
            - cause
            - corrective
            - action
            - plans
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_235_root_cause_corrective_action_plans_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
