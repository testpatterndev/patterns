schema: testpattern/v1
name: Customer profile master data
slug: au-top500-361-customer-profile-master-data
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to customer profile master data in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:customer\s+profile\s+master\s+data|customer\s+profile|master\s+data|customer\s+record|contact\s+details|customer\s+database|account\s+holder|customer\s+ID|demographic\s+data|customer\s+information|personal\s+details)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - customer profile master data
    - customer
    - profile
    - master
    - data
    - commercial
  proximity: 300
test_cases:
  should_match:
    - value: customer profile master data
      description: Primary topic phrase match
    - value: customer profile
      description: Case-insensitive topic phrase match
    - value: master data
      description: Alternative topic phrase match
    - value: customer record
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to customer profile master data appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_customer_profile_master
      matches:
        - ref: Evidence_customer_profile_master
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_customer_profile_master
      matches:
        - ref: Evidence_customer_profile_master
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_customer_profile_master
      matches:
        - ref: Evidence_customer_profile_master
  regexes:
    - id: Pattern_customer_profile_master
      pattern: >-
        (?is)\b(?:customer\s+profile\s+master\s+data|customer\s+profile|master\s+data|customer\s+record|contact\s+details|customer\s+database|account\s+holder|customer\s+ID|demographic\s+data|customer\s+information|personal\s+details)\b
  keywords:
    - id: Evidence_customer_profile_master
      groups:
        - match_style: word
          terms:
            - customer profile master data
            - customer profile
            - master data
            - CRM
            - customer record
            - contact details
            - customer database
            - account holder
            - customer ID
            - demographic data
            - customer information
            - personal details
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
