schema: testpattern/v1
name: QLD Housing Application
slug: au-qld-housing-application
version: 1.3.2
type: keyword_list
pattern_class: concept
description: Detects QLD social housing applications and housing assistance eligibility documents.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - pii
  - financial
  - government
test_cases:
  should_match:
    - value: Social housing application received
      description: Exact 65 discovery probe with an application phrase and no household details
    - value: Social housing application with household income
      description: Exact 75 probe with applicant-household context
    - value: Department of Housing social housing application with household income
      description: Exact 85 probe with household detail and QLD housing provenance
    - value: 'Social housing application: housing register and housing needs assessment'
      description: Social housing application with needs assessment
    - value: QLD Department of Housing housing application with rental assistance, housing eligibility, and household income
      description: QLD housing application with eligibility and household detail
    - value: Public housing wait list and community housing supported accommodation
      description: Test match 3
  should_not_match:
    - value: Housing market report
      description: Non-match 1
    - value: New housing development announced
      description: Non-match 2
    - value: Priority assessment software demo
      description: Product-demo wording must remain discovery-only
false_positives:
  - description: Generic housing market references.
    mitigation: Require social housing or housing assistance specific terms.
exports:
  - yaml
scope: narrow
risk_rating: 4
risk_description: >-
  The pattern identifies Queensland social-housing and housing-assistance applications through eligibility, needs-assessment, public-housing, wait-list, and support language. A completed record can expose financial hardship, household composition, disability or support needs, past tenancies, and housing insecurity that may enable stigma, fraud, or coercive targeting. The applicant and household bear the harm, while a blank form or programme description has low consequence and the keyword match does not distinguish completion state. Risk 4 OFFICIAL reflects the low-content match; SENSITIVE requires an identifiable application containing income, hardship, property, eligibility, disability, household, or support details.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_housing_application
          - Pattern_housing_register
      matches:
        - ref: Evidence_applicant_household_context
        - ref: Evidence_qld_housing
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_housing_application
          - Pattern_housing_register
      matches:
        - ref: Evidence_applicant_household_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_housing_application
          - Pattern_housing_register
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_housing_application
      pattern: (?i)\b(?:(?:public|social)\s+housing\s+(?:application|assessment)|housing\s+(?:register|assistance)\s+application)\b
    - id: Pattern_housing_register
      pattern: (?i)\b(?:housing\s+register|housing\s+wait\s+list|(?:public|social)\s+housing\s+wait\s+list|priority\s+(?:housing|assessment)|eligible\s+for\s+(?:social|public)\s+housing)\b
  keywords:
    - id: Evidence_social_housing
      groups:
        - match_style: word
          terms:
            - public housing
            - social housing
            - housing application
            - housing register
            - priority housing
            - housing assessment
            - housing assistance
            - eligible for housing
      strength: specific
    - id: Evidence_qld_housing
      groups:
        - match_style: word
          terms:
            - Department of Housing
            - Queensland Housing
            - Local Government
            - Planning and Public Works
            - Housing Act 2003
            - housing.qld.gov.au
      strength: specific
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
    - id: Evidence_applicant_household_context
      groups:
        - match_style: word
          terms:
            - applicant
            - household income
            - dependants
            - homelessness
            - disability
            - current tenancy
            - housing needs assessment
            - supported accommodation
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.3.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: keep housing application/register phrases at 65 discovery, require applicant or household details at 75 and QLD housing provenance at 85, broaden wait-list coverage, and add exact-tier plus software-demo probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 583 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - housing application
  - social housing
  - public housing
  - housing register
  - housing assistance
  - housing eligibility
  - Department of Housing
  - rental assistance
  - housing wait list
  - community housing
  - supported accommodation
  - housing needs assessment
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
