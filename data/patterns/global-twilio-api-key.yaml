schema: testpattern/v1
name: Twilio API Key
slug: global-twilio-api-key
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects Twilio API key SIDs (SK prefix followed by 32 hex characters). Paired with
  its secret, a leaked Twilio API key allows sending SMS/voice and accessing account
  data and call logs.
operation: 'Token format SK followed by 32 hex characters. Corroborative evidence: keywords within 300 characters; a Twilio secret often appears nearby.'
pattern: (?<![A-Za-z0-9])SK[a-f0-9]{32}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence when corroborated: the SK prefix plus 32 hex chars matches the Twilio
  API key SID structure; Twilio context keywords distinguish it from other SK-prefixed ids.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - twilio
    - twilio.com
    - api key
    - account sid
    - TWILIO_API_KEY
    - auth token
    - messaging
  proximity: 300
test_cases:
  should_match:
    - value: SKabcdef0123456789abcdef0123456789
      description: Twilio API key SID, SK prefix + 32 hex
    - value: 'TWILIO_API_KEY=SK0123456789abcdef0123456789abcdef'
      description: Labelled Twilio API key in an env assignment
    - value: SKfedcba9876543210fedcba9876543210
      description: Another Twilio API key body
  should_not_match:
    - value: SKabcdef0123456789
      description: Too short to be a valid Twilio API key (16 hex not 32)
    - value: ACabcdef0123456789abcdef0123456789
      description: Twilio Account SID prefix (AC), not an API key (SK)
    - value: store the twilio api key alongside the account sid securely
      description: Prose mention without a token value
false_positives:
  - description: Other SK-prefixed 32-hex identifiers in unrelated systems.
    mitigation: Require corroborative Twilio keywords within proximity before alerting.
  - description: Documentation or examples showing placeholder SK strings.
    mitigation: Check for placeholder markers (example, xxxx) and require Twilio context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 8
risk_description: >-
  A leaked Twilio API key enables sending SMS and voice calls (smishing/vishing) and
  reading call logs and message bodies that may contain PII and one-time passcodes.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-06-13'
author: testpattern-community
license: MIT
references:
  - url: https://www.twilio.com/docs/iam/api-keys
    title: API keys and access tokens - Twilio
