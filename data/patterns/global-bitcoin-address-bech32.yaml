schema: testpattern/v1
name: Bitcoin Address (Bech32)
slug: global-bitcoin-address-bech32
version: 1.4.1
type: regex
pattern_class: identifier
engine: universal
description: Detects Bech32-shaped Bitcoin address candidates (bc1 prefix, lowercase charset, and length shape only). The BIP-173 checksum is NOT validated, so matches are candidates, not verified addresses.
operation: >-
  Candidate-shape prefilter: bc1 prefix with lowercase Bech32-style body and length bounds only — no BIP-173 checksum validation is performed (Purview custom SITs provide no Bech32 checksum function).
  Corroborative evidence: 3 keywords within 300 characters. Keyword lists: financial-transaction. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \bbc1[a-z0-9]{25,39}\b
case_sensitive: true
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - PCI-DSS
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:
    - financial-transaction
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4
      description: Exact 65 discovery probe with a bare Bech32-shaped candidate
    - value: bc1qar0srrr7xfkvy5l643lydnw9re59gtzzwf5mdq
      description: Standard Bech32 address
    - value: bc1q0000000000000000000000000000000000
      description: Bech32-shaped synthetic candidate (shape only — checksum is not validated, so this discovers but proves nothing)
    - value: Bitcoin payment address bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4
      description: Exact 75 probe with explicit Bitcoin address context
    - value: Bitcoin withdrawal address bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4
      description: Exact 85 probe with chain-specific and transfer-destination context
  should_not_match:
    - value: bc2qw508d6qejxtdg4y5r3zarvary0c5xw7k
      description: Wrong prefix (bc2 instead of bc1)
    - value: bc1qw508d6qejxtdg4y5r3zarv
      description: Too short (only 22 characters after bc1)
    - value: tb1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4
      description: Testnet prefix (tb1 instead of bc1)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: Bitcoin address bc1qW508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4
      description: Mixed case is invalid Bech32 — the lowercase-only shape regex rejects it
    - value: 'Documentation example: bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4'
      description: Documentation/example exclusion suppresses even the discovery-only candidate
    - value: Database key bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4
      description: Valid-shaped non-wallet key must remain discovery-only
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_bitcoin_address_bech32
      matches:
        - ref: Keyword_bitcoin_context
        - ref: Keyword_transfer_destination_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_bitcoin_address_bech32
      matches:
        - ref: Keyword_bitcoin_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_bitcoin_address_bech32
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_bitcoin_address_bech32
      pattern: \bbc1[a-z0-9]{25,39}\b
    - id: Pattern_global_bitcoin_address_bech32_label_context
      pattern: (?i)\b(?:bitcoin\s+address\s+\(bech32\)|bitcoin|address|bech32)\b
  keywords:
    - id: Keyword_crypto_context
      groups:
        - match_style: word
          terms:
            - bitcoin
            - text: BTC
              case_sensitive: true
            - wallet
            - cryptocurrency
            - crypto
            - blockchain
            - address
            - transaction
            - payment
            - digital currency
      strength: domain
    - id: Keyword_global_bitcoin_address_bech32_domain_context
      groups:
        - match_style: word
          terms:
            - bitcoin address (bech32)
            - bitcoin
            - address
            - bech32
      strength: domain
    - id: Keyword_bitcoin_context
      groups:
        - match_style: word
          terms:
            - bitcoin
            - bitcoin address
            - bitcoin wallet
            - text: BTC
              case_sensitive: true
            - bech32 address
      strength: domain
    - id: Keyword_transfer_destination_context
      groups:
        - match_style: word
          terms:
            - withdrawal address
            - deposit address
            - destination wallet
            - recipient address
            - pay to
            - transfer to
      strength: specific
risk_description: >-
  The detector recognises a Bech32-shaped Bitcoin address candidate (prefix, charset, and length only — no BIP-173 checksum validation) with nearby financial-transaction context, so it finds a likely public blockchain destination identifier rather than a private key or wallet credential. Disclosure can link a pseudonymous address to a person or organisation and make public transaction history easier to trace, profile, or target for fraud. The address alone cannot authorise a transfer and often appears legitimately in invoices, published reports, or payment instructions. Risk 5 OFFICIAL reflects bounded linkage and targeting harm that needs external context; SENSITIVE would require a confidential identity mapping, sensitive transaction record, or other directly harmful association.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 1.4.1
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: retain checksum-unverified Bech32 shapes at 65 discovery, allow context-gated 75 enforcement for explicit Bitcoin addresses and 85 only with additional transfer-destination evidence, with exact-tier and database-key probes.'
  - version: 1.4.0
    date: '2026-07-17'
    description: 'SIT alignment wave1 (TP-00806, reduced scope): the SIT is demoted to a candidate-shape prefilter — both 85 enforcing tiers removed (shape+context cannot prove a checksum; Purview offers no Bech32 checksum function), leaving the 65 discovery_only tier; recommended_confidence 85→65; shape regex tightened to lowercase-only (mixed case is invalid Bech32) with pattern-level case_sensitive: true; description/operation/risk text reworded to Bech32-shaped candidate and the BIP-173 validation claim removed; adversarial tests added. Invalid-checksum negatives were NOT added (a shape-only regex cannot deliver them); the display name field was left unchanged.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1219 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
license: MIT
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 90 to 85.'
      - 'Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'

risk_rating: 5
