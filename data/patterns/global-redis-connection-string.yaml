schema: testpattern/v1
name: Redis
slug: global-redis-connection-string
version: 1.3.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Redis patterns.
operation: 'Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: redis://[^:]*:[^@]+@[^:]+:\d+
confidence: low
confidence_justification: >-
  Low confidence: generic pattern format that may match unrelated data. Corroborative evidence keywords are essential for reliable detection. Added context gating and exclusion rules improve precision
  and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: redis://:password@redis.internal:6379
      description: Exact 65 probe - complete credential URI without independent config labeling
    - value: 'REDIS_URL=redis://:S3cretValue@cache.internal:6380'
      description: Exact 75 probe - credential URI in a Redis-specific config field
    - value: 'AWS ElastiCache production REDIS_URL=redis://:S3cretValue@cluster.cache.amazonaws.com:6379/0'
      description: Exact 85 probe - provider config label plus managed-cache topology
  should_not_match:
    - value: redis://redis.example.com:6379
      description: Missing password (no :pass@ section)
    - value: redis://:password@redis.example.com
      description: Missing port number
    - value: rediss://:password@redis.example.com:6379
      description: Wrong scheme (rediss instead of redis)
    - value: 'MEMCACHED_URL=redis://:password@cache.internal:6379'
      description: Sibling cache config label does not corroborate a Redis URI
    - value: 'redis://:@cache.internal:6379'
      description: Malformed connection has an empty password
    - value: 'Documentation example: AWS ElastiCache REDIS_URL=redis://:changeme@cluster.cache.amazonaws.com:6379/0'
      description: Documentation placeholder with managed-cache topology is excluded
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_redis_connection
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_redis_connection
      matches:
        - ref: Pattern_redis_config_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_redis_connection
      matches:
        - ref: Pattern_redis_config_label
        - ref: Pattern_redis_managed_topology
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_redis_connection
      pattern: redis://[^:]*:[^@]+@[^:]+:\d+
    - id: Pattern_redis_config_label
      pattern: (?i)\b(?:REDIS_URL|REDIS_CONNECTION_STRING)\s*[=:]
    - id: Pattern_redis_managed_topology
      pattern: (?i)(?:\.cache\.amazonaws\.com|\.redis\.cache\.windows\.net|\.upstash\.io)
risk_description: >-
  This detector captures a redis URI with password, host, and port, reflecting Redis deployments where password-only authentication may be sufficient. A person with network reach can use a live value to read or modify cached data, sessions, queues, or configuration permitted by that Redis account. The usual impact is one cache or datastore instance and its dependent applications, while inaccessible internal hosts, test services, examples, and rotated passwords reduce harm. Risk 8 SENSITIVE is retained for serious application and data compromise; PROTECTED requires evidence of critical shared infrastructure or significant protected content.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-19'
