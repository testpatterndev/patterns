schema: testpattern/v1
name: Recommendation model logic
slug: global-top500-216-recommendation-model-logic
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to recommendation model logic in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:recommendation\s+model\s+logic|recommendation\s+algorithm|recommendation\s+engine|intellectual\s+property|trade\s+secrets|collaborative\s+filtering|content[\s-]+based\s+filtering|model\s+weights|ranking\s+algorithm|personalization\s+logic)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - recommendation model logic
    - recommendation
    - model
    - logic
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: recommendation model logic
      description: Primary topic phrase match
    - value: recommendation algorithm
      description: Case-insensitive topic phrase match
    - value: recommendation engine
      description: Alternative topic phrase match
    - value: intellectual property
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to recommendation model logic appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_recommendation_model_logic
      matches:
        - ref: Pattern_global_top500_216_recommendation_model_logic_label_context
        - ref: Keyword_global_top500_216_recommendation_model_logic_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_recommendation_model_logic
      matches:
        - ref: Keyword_recommendation_model_logic
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_recommendation_model_logic
      matches:
        - ref: Keyword_recommendation_model_logic
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_recommendation_model_logic
      pattern: >-
        (?is)\b(?:recommendation\s+model\s+logic|recommendation\s+algorithm|recommendation\s+engine|intellectual\s+property|trade\s+secrets|collaborative\s+filtering|content[\s-]+based\s+filtering|model\s+weights|ranking\s+algorithm|personalization\s+logic)\b
    - id: Pattern_global_top500_216_recommendation_model_logic_label_context
      pattern: (?i)\\b(?:recommendation\\s+model\\s+logic|recommendation|model|logic|top500)\\b
  keywords:
    - id: Keyword_recommendation_model_logic
      groups:
        - match_style: word
          terms:
            - recommendation model logic
            - recommendation algorithm
            - recommendation engine
            - intellectual property
            - trade secrets
            - collaborative filtering
            - content-based filtering
            - model weights
            - ranking algorithm
            - personalization logic
    - id: Keyword_global_top500_216_recommendation_model_logic_domain_context
      groups:
        - match_style: word
          terms:
            - recommendation model logic
            - recommendation
            - model
            - logic
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.accc.gov.au/business/competition-and-exemptions
  - https://www.accc.gov.au/business/competition-and-exemptions/misuse-of-market-power
