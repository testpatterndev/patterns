schema: testpattern/v1
name: UMID
slug: ph-unified-multipurpose-id
version: 1.2.1
type: regex
engine: universal
description: >-
  Detects UMID patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this
  version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-philippines-unified-multi-purpose-identification-number Corroborative evidence: 4 keywords within 300 characters. Keyword lists:
  pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{4}-\d{7}-\d\b
confidence: high
confidence_justification: >-
  High confidence: pattern has strong structural constraints (specific format, prefix, or character class restrictions) that significantly reduce false positive rates. Added context gating and
  exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - ph
regulations:
  - Data Privacy Act of 2012 (Philippines)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - UMID
    - unified multi-purpose
    - SSS
    - GSIS
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 1234-5678901-2
      description: UMID number
    - value: 9876-5432109-8
      description: Another UMID number
    - value: 4567-8901234-5
      description: Valid UMID format
  should_not_match:
    - value: 1234-567890-2
      description: Too few digits in middle group
    - value: 1234-5678901-23
      description: Too many digits in last group
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: The dash-separated format (XXXX-XXXXXXX-X) is relatively specific.
    mitigation: The structured format provides good validation. Keyword context further improves accuracy.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ph_umid
      matches:
        - ref: Pattern_ph_unified_multipurpose_id_label_context
        - ref: Keyword_ph_unified_multipurpose_id_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_ph_umid
      matches:
        - ref: Keyword_ph_umid
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ph_umid
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ph_umid
      pattern: \b\d{4}-\d{7}-\d\b
    - id: Pattern_ph_unified_multipurpose_id_label_context
      pattern: (?i)\b(?:umid|unified|multipurpose)\b
  keywords:
    - id: Keyword_ph_umid
      groups:
        - match_style: word
          terms:
            - UMID
            - unified multi-purpose ID
            - unified multi-purpose identification
            - text: SSS
              case_sensitive: true
            - GSIS
            - Social Security System
            - Government Service Insurance System
            - text: CRN
              case_sensitive: true
            - common reference number
            - Philippine ID
            - multi-purpose ID card
      strength: specific
    - id: Keyword_ph_unified_multipurpose_id_domain_context
      groups:
        - match_style: word
          terms:
            - umid
            - unified
            - multipurpose
      strength: domain
risk_rating: 5
risk_description: >-
  This sensitive information type identifies data that could be misused if exposed to unauthorized parties. Proper classification and protection are required to prevent data breaches and comply with
  applicable regulations.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-philippines-unified-multi-purpose-identification-number
    title: Philippines Unified Multi-Purpose ID Number entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
source: microsoft
license: MIT
