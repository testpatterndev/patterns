schema: testpattern/v1
name: Threat intelligence subscriptions
slug: global-top500-290-threat-intelligence-subscriptions
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies threat intelligence subscriptions patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:threat\s+intelligence|stix|taxii|misp|intel\s+feed)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - threat intelligence subscriptions
    - threat
    - intelligence
    - subscriptions
    - security
    - operations
    - data
  proximity: 300
test_cases:
  should_match:
    - value: 'Threat intelligence'
      description: Topic phrase present
    - value: 'threat intelligence'
      description: Topic phrase, lowercase
    - value: 'this record references the threat intelligence held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_threat_intelligence_subscriptions
      matches:
        - ref: Pattern_global_top500_290_threat_intelligence_subscriptions_label_context
        - ref: Keyword_global_top500_290_threat_intelligence_subscriptions_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_threat_intelligence_subscriptions
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_threat_intelligence_subscriptions
      pattern: (?i)\b(?:threat\s+intelligence|stix|taxii|misp|intel\s+feed)\b
    - id: Pattern_global_top500_290_threat_intelligence_subscriptions_label_context
      pattern: (?i)\b(?:threat\s+intelligence\s+subscriptions)\b
  keywords:
    - id: Keyword_threat_intelligence_subscriptions
      groups:
        - match_style: word
          terms:
            - threat intelligence
            - stix
            - taxii
            - misp
            - intel feed
            - threat feed
            - cyber threat
            - indicator sharing
            - threat platform
            - intelligence subscription
            - threat report
            - adversary tracking
      strength: specific
    - id: Keyword_global_top500_290_threat_intelligence_subscriptions_domain_context
      groups:
        - match_style: word
          terms:
            - threat intelligence subscriptions
            - threat
            - intelligence
            - subscriptions
      strength: domain
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-04'
changelog:
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 80 to 75.'
      - 'Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.'
