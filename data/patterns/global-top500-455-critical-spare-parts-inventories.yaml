schema: testpattern/v1
name: Critical spare parts inventories
slug: global-top500-455-critical-spare-parts-inventories
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive critical and maintenance spare-parts inventories. Topic phrases are retained
  for discovery; enforcement requires part-number, stock-on-hand, reorder, lead-time, storage,
  compatible-asset, supplier, or minimum-stock fields, and high confidence also requires a populated
  part, quantity, reorder, warehouse, bin, or location value.
operation: >-
  Regex_critical_spare_parts recognises critical-spares, maintenance-spares, and replacement-parts
  inventory topics. The topic alone is discovery-only at 65. Actual inventory fields raise it to 75;
  populated part, stock, reorder, warehouse, bin, or location values reach 85. Enforcing tiers reject
  explicit templates and training examples.
pattern: >-
  (?is)\b(?:critical\s+spare\s+parts\s+inventory|critical\s+spares\s+inventory|maintenance\s+spares\s+inventory|critical\s+replacement\s+parts\s+inventory)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires real inventory fields rather than procurement discussion. High confidence
  adds populated part, stock, reorder, or storage values.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - business
  - security
corroborative_evidence:
  keywords:
    - critical spare parts inventories
    - critical
    - spare
    - parts
    - inventories
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: critical spare parts inventory
      description: Low-tier probe - inventory topic without record fields
    - value: 'Critical spare parts inventory includes part number, stock on hand, reorder point, lead time, storage location, compatible asset, supplier, and minimum stock level'
      description: Medium-tier probe - substantive inventory fields without populated values
    - value: 'Critical spare parts inventory: part number PN-8804, stock on hand = 2, reorder point = 3, warehouse ID: WH-02, bin ID: B-17, compatible asset PUMP-04'
      description: High-tier probe - inventory fields with populated part, stock, reorder, warehouse, bin, and asset values
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: 'The procurement policy discusses replacement-part lead times.'
      description: Procurement guidance without a critical spares inventory
    - value: 'Training example: critical spare parts inventory part number PN-8804, stock on hand 2, warehouse WH-02'
      description: Explicit training content must not enforce
false_positives:
  - description: Procurement policies and maintenance guidance discuss spares, lead times, safety stock, and suppliers without exposing current inventory.
    mitigation: Keep inventory topics discovery-only and require part-number, stock, reorder, lead-time, storage, compatible-asset, supplier, or minimum-stock fields for enforcement.
  - description: Training inventory sheets can contain realistic part numbers, stock levels, reorder points, warehouses, bins, and asset mappings.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_critical_spare_parts
      matches:
        - ref: Evidence_spares_inventory_field
        - ref: Evidence_spares_populated_value
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_critical_spare_parts
      matches:
        - ref: Evidence_spares_inventory_field
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_critical_spare_parts
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_critical_spare_parts
      pattern: >-
        (?is)\b(?:critical\s+spare\s+parts\s+inventory|critical\s+spares\s+inventory|maintenance\s+spares\s+inventory|critical\s+replacement\s+parts\s+inventory)\b
    - id: Evidence_spares_populated_value
      pattern: >-
        (?i)\b(?:part\s*(?:number|no\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9._/-]{2,}|(?:stock\s+on\s+hand|quantity|reorder\s+point|minimum\s+stock)\s*[:=]\s*\d+|(?:warehouse|store|bin|location)\s*(?:ID|code)?\s*[:#-]\s*[A-Z0-9][A-Z0-9._/-]{2,})\b
  keywords:
    - id: Evidence_spares_inventory_field
      groups:
        - match_style: word
          terms:
            - part number
            - stock on hand
            - reorder point
            - lead time
            - minimum stock level
            - storage location
            - compatible asset
            - supplier
            - manufacturer
            - warehouse
            - bin location
      strength: domain
risk_description: >-
  The detector searches for critical spare-parts, spares-inventory, and lead-time language with supporting context; it does not establish that quantities, storage sites, or asset mappings are actually listed. A genuine inventory can expose shortages, long-lead components, and equipment dependencies that enable targeted theft, supply manipulation, or disruption timed around unavailable replacements. Consequence is normally concentrated on one operator or facility, and procurement policies or maintenance discussions can produce the same concept hit. Risk 8 and SENSITIVE reflect the serious operational leverage of a real inventory; PROTECTED would require cross-sector single points of failure or current stock intelligence whose compromise could cause significant and widespread service damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
