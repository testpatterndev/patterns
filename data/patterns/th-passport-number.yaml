schema: testpattern/v1
name: Thailand Passport Number
slug: th-passport-number
version: 1.2.0
type: regex
pattern_class: identifier
engine: boost_regex
case_sensitive: true
description: >-
  Detects Thai passport numbers issued by the Department of Consular Affairs, Ministry of Foreign Affairs
  of Thailand. Documented formats are one letter followed by six digits (older series, e.g. A123456), two
  letters followed by six digits (e.g. AA123456), or two letters followed by seven digits (current e-passport
  series, e.g. AA1234567, nine characters total matching the MRZ document-number field). Note: the legacy
  A123456 / AA123456 forms are documented by a single source (Thai Wikipedia); the current AA1234567 form is
  corroborated independently via the MRZ document-number field.
operation: >-
  Regex pattern (boost_regex engine). Regex_th_passport_number matches the three documented forms — 1 letter
  + 6 digits, 2 letters + 6 digits, or 2 letters + 7 digits — at word boundaries. The letter prefix is
  case-fixed (uppercase, matching the printed document and MRZ document-number field), so the pattern is
  case-sensitive. Three confidence tiers: High (85)
  requires passport evidence (min 2 unique terms) with template exclusion; Medium (75) requires passport
  evidence with template exclusion; Low (65) requires passport evidence. Evidence uses one keyword group
  (English and Thai passport terms) within 300-character proximity. No public checksum is documented for
  the printed number, so detection is structural plus keyword evidence.
pattern: \b(?:[A-Z]\d{6}|[A-Z]{2}\d{6,7})\b
confidence: medium
confidence_justification: >-
  Medium confidence: short letter-prefixed alphanumeric runs (1-2 letters + 6-7 digits) are common in
  order codes, bookings and other reference numbers, so corroborating passport keywords are required on
  every tier. No tier fires on the bare value alone (D1 identifier convention).
jurisdictions:
  - th
regulations:
  - PDPA (TH)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - Thai passport
    - passport number
    - travel document
    - หนังสือเดินทาง
    - เลขที่หนังสือเดินทาง
  proximity: 300
test_cases:
  should_match:
    - value: Thai passport number AA1234567 was recorded on the arrival card
      description: Current e-passport series, two letters and seven digits
    - value: 'Passport No.: A123456 (old series) was replaced upon renewal'
      description: Older series, one letter and six digits
    - value: หนังสือเดินทางเลขที่ AB123456 ออกโดยกระทรวงการต่างประเทศ
      description: Two letters and six digits with Thai label
  should_not_match:
    - value: Order code ABC123456 shipped from the warehouse yesterday
      description: Three letter prefix is not a documented series
    - value: Ticket A12345 was closed by the support team
      description: Only five digits after the letter is too short
    - value: Booking AA12345678 confirmed for the tour group
      description: Eight digits after two letters is too long
    - value: aa1234567
      description: Lowercase letters — passport numbers are printed uppercase (pattern is case-sensitive)
    - value: a123456
      description: Lowercase single-letter form — passport numbers are printed uppercase (pattern is case-sensitive)
false_positives:
  - description: One or two letters followed by 6-7 digits is a common shape for order numbers, bookings, and product references.
    mitigation: Every tier requires corroborating passport keywords within the proximity window; there is no bare value-only tier.
  - description: Hong Kong identity card numbers written without the bracketed check digit (e.g. A123456) structurally overlap the 1-letter form.
    mitigation: Passport-specific keyword evidence (Thai-language and passport terms) separates travel-document context from HKID context, which hk-identity-card covers with its own keywords.
  - description: Sample passport numbers in visa application guides or templates may match the labelled form.
    mitigation: The high and medium tiers apply the template-exclusion NOT-group to suppress sample and documentation content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  Passport numbers are high-value identity documents used for international travel and identity verification. Compromise enables identity fraud, unauthorized border crossings, and creation of
  fraudulent documents.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_th_passport_number
      matches:
        - ref: Evidence_th_passport_number
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Regex_th_passport_number
      matches:
        - ref: Evidence_th_passport_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Regex_th_passport_number
      matches:
        - ref: Evidence_th_passport_number
  regexes:
    - id: Regex_th_passport_number
      pattern: \b(?:[A-Z]\d{6}|[A-Z]{2}\d{6,7})\b
  keywords:
    - id: Evidence_th_passport_number
      groups:
        - match_style: word
          terms:
            - Thai passport
            - Thailand passport
            - passport number
            - passport no
            - travel document
            - e-passport
            - หนังสือเดินทาง
            - เลขที่หนังสือเดินทาง
            - หนังสือเดินทางอิเล็กทรอนิกส์
            - กระทรวงการต่างประเทศ
            - กรมการกงสุล
      strength: specific
created: '2026-07-08'
updated: '2026-07-09'
changelog:
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-08'
    description: >-
      Harmonized with letter-prefixed identifier convention (j1/j3/j4 waves): engine universal → boost_regex,
      added case_sensitive: true (the [A-Z] letter prefix is printed uppercase on the document and in the MRZ).
      Detection change: lowercase forms such as aa1234567 previously matched under the repo-default
      case-insensitive testing and are now rejected; lowercase should_not_match cases added to document this.
  - version: 1.0.0
    date: '2026-07-08'
    description: Initial release
