schema: testpattern/v1
name: SLA breach analysis reports
slug: global-top500-314-sla-breach-analysis-reports
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies sla breach analysis reports patterns in security and access control contexts. Detects potential exposure
  of sensitive security information in international systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:SLA\s+breach|service\s+level\s+agreement|SLA\s+violation|uptime\s+target|performance\s+metric|penalty\s+clause|service\s+credit|response\s+time|resolution\s+time|availability\s+target|breach\s+analysis|SLA\s+report)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - sla breach analysis reports
  - sla
  - breach
  - analysis
  - reports
  - operations
  - resilience
  proximity: 300
test_cases:
  should_match:
  - value: SLA breach
    description: Primary topic phrase match
  - value: service level agreement
    description: Case-insensitive topic phrase match
  - value: SLA violation
    description: Alternative topic phrase match
  - value: uptime target
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: backup outage
    description: Generic word pair from old broad template should not match
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: This classifier flags SLA breaches, service-level agreements, violations, uptime and availability targets,
  response and resolution times, penalty clauses, service credits, and breach-analysis terminology. A genuine report can expose
  contractual failures, customer impact, performance weakness, penalty exposure, and remediation decisions that harm negotiations,
  reputation, or supplier relationships. The affected scale is the relevant customer-service relationship and operational
  teams, while standard contract language and generic performance reports can match without an actual breach. Risk 8 SENSITIVE
  reflects serious contained commercial and operational harm; PROTECTED would require critical-service failure or significant
  broader damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_sla_breach
    matches:
    - ref: Pattern_global_top500_314_sla_breach_analysis_reports_label_context
    - ref: Keyword_global_top500_314_sla_breach_analysis_reports_domain_context
    - ref: Keyword_sla_breach
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_sla_breach
    matches:
    - ref: Pattern_global_top500_314_sla_breach_analysis_reports_label_context
    - ref: Keyword_global_top500_314_sla_breach_analysis_reports_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_sla_breach
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_sla_breach
    pattern: (?is)\b(?:SLA\s+breach|service\s+level\s+agreement|SLA\s+violation|uptime\s+target|performance\s+metric|penalty\s+clause|service\s+credit|response\s+time|resolution\s+time|availability\s+target|breach\s+analysis|SLA\s+report)\b
  - id: Pattern_global_top500_314_sla_breach_analysis_reports_label_context
    pattern: (?i)\b(?:sla\s+breach\s+analysis\s+reports)\b
  keywords:
  - id: Keyword_sla_breach
    groups:
    - match_style: word
      terms:
      - SLA breach
      - service level agreement
      - SLA violation
      - uptime target
      - performance metric
      - penalty clause
      - service credit
      - response time
      - resolution time
      - availability target
      - breach analysis
      - SLA report
    strength: specific
  - id: Keyword_global_top500_314_sla_breach_analysis_reports_domain_context
    groups:
    - match_style: word
      terms:
      - sla breach analysis reports
      - sla
      - breach
      - analysis
      - reports
    strength: domain
