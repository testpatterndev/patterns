schema: testpattern/v1
name: Immunization records
slug: global-top500-333-immunization-records
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies immunization records references in healthcare and patient records. Protected health information under
  applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: au-healthcare-records. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:immunization\s+record|vaccination\s+record|vaccine\s+history|immunization\s+schedule|booster\s+dose|vaccination\s+certificate|immunization\s+register|vaccine\s+administration|lot\s+number|vaccination\s+date)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- healthcare
- phi
corroborative_evidence:
  keywords:
  - immunization records
  - immunization
  - records
  - health
  - biomedical
  - information
  proximity: 300
  keyword_lists:
  - au-healthcare-records
  - data-record-context
  - generic-data-labels
test_cases:
  should_match:
  - value: immunization record
    description: Primary topic phrase match
  - value: vaccination record
    description: Case-insensitive topic phrase match
  - value: vaccine history
    description: Alternative topic phrase match
  - value: immunization schedule
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: patient biometric
    description: Generic word pair from old broad template should not match
false_positives:
- description: Medical terminology in health education materials, research publications, clinical guidelines, or public health
    documents without patient-specific data.
  mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers
    such as medical record numbers or dates of birth.
- description: General wellness and fitness content using medical vocabulary without constituting protected health information.
  mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical
    records from general health content.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: This medium-confidence regex finds immunization-record, vaccination-record, or vaccine-history phrases with
  healthcare-record corroboration, targeting a person's administered-vaccine history rather than general vaccine discussion.
  A true record can reveal dates, products, eligibility categories, exemptions, or access decisions and could support limited
  profiling or document fraud against the patient. Most routine histories are narrow preventive-care records with less diagnostic
  depth than pathology, consultation, or treatment notes, and benign public-health or education matches remain possible. Risk
  6 and SENSITIVE reflect credible privacy harm; risk 8 or PROTECTED requires sensitive exemption reasons, adverse-event detail,
  a linked clinical dossier, bulk registry exposure, or safety-critical outbreak operations.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_immunization_records
    matches:
    - ref: Pattern_global_top500_333_immunization_records_label_context
    - ref: Keyword_global_top500_333_immunization_records_domain_context
    - ref: Keyword_immunization_records
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_immunization_records
    matches:
    - ref: Pattern_global_top500_333_immunization_records_label_context
    - ref: Keyword_global_top500_333_immunization_records_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_immunization_records
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_immunization_records
    pattern: (?is)\b(?:immunization\s+record|vaccination\s+record|vaccine\s+history|immunization\s+schedule|booster\s+dose|vaccination\s+certificate|immunization\s+register|vaccine\s+administration|lot\s+number|vaccination\s+date)\b
  - id: Pattern_global_top500_333_immunization_records_label_context
    pattern: (?i)\b(?:immunization\s+records)\b
  keywords:
  - id: Keyword_immunization_records
    groups:
    - match_style: word
      terms:
      - immunization record
      - vaccination record
      - vaccine history
      - immunization schedule
      - booster dose
      - health
      - biomedical
      - vaccination certificate
      - immunization register
      - vaccine administration
      - lot number
      - vaccination date
    strength: specific
  - id: Keyword_global_top500_333_immunization_records_domain_context
    groups:
    - match_style: word
      terms:
      - immunization records
      - immunization
    strength: domain
