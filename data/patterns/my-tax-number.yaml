schema: testpattern/v1
name: Malaysia Tax Identification Number (TIN)
slug: my-tax-number
version: 1.2.1
type: regex
pattern_class: identifier
engine: boost_regex
case_sensitive: true
description: >-
  Detects Malaysian individual Tax Identification Numbers (TIN / Nombor Pengenalan Cukai) issued by the
  Inland Revenue Board of Malaysia (LHDN / HASiL). Since 2 January 2023 individual TINs use the prefix IG
  followed by 9-11 digits (11-13 characters total); the legacy individual prefixes SG (employment income)
  and OG (business income) with the same digit range remain in circulation in older records. Entity TINs
  (C, D, F, PT, TA and similar prefixes) are deliberately out of scope: single-letter prefixes over a
  digit run are too collision-prone and entity TINs are not personal data.
operation: >-
  Regex pattern (boost_regex engine). Regex_my_tax_number matches the IG / OG / SG prefix (optionally
  separated by a single space) followed by 9-11 digits at word boundaries. The prefix is case-fixed
  (uppercase IG / OG / SG as issued by LHDN), so the pattern is case-sensitive. Three confidence tiers: High (85) requires tax
  evidence (min 2 unique terms) with template exclusion; Medium (75) requires tax evidence with template
  exclusion; Low (65) requires tax evidence. Evidence uses one keyword group (English and Malay tax terms)
  within 300-character proximity. LHDN publishes no checksum for the digit portion, so detection is
  structural plus keyword evidence.
pattern: \b(?:IG|OG|SG)\s?\d{9,11}\b
confidence: medium
confidence_justification: >-
  Medium confidence: the two-letter prefix over a 9-11 digit run is distinctive but not unique (e.g. SG
  also prefixes Singapore-related reference codes), so corroborating LHDN / tax keywords are required on
  every tier. No tier fires on the bare value alone (D1 identifier convention).
jurisdictions:
  - my
regulations:
  - Income Tax Act 1967 (Malaysia)
  - PDPA (Malaysia)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
  - financial
corroborative_evidence:
  keywords:
    - tax identification number
    - TIN
    - LHDN
    - nombor pengenalan cukai
    - income tax number
  proximity: 300
test_cases:
  should_match:
    - value: TIN IG115002000 was quoted on the e-Invois submission to HASiL
      description: Current IG prefix with 9 digits
    - value: Nombor pengenalan cukai SG10234567090 telah didaftarkan dengan LHDN
      description: Legacy SG prefix with 11 digits
    - value: The taxpayer's income tax number OG 4040080091 appears on the Form B filing
      description: Legacy OG prefix, space-separated, with 10 digits
  should_not_match:
    - value: Reference IG12345678 was logged in the CRM by the agent
      description: Only 8 digits after the prefix is too short
    - value: Company TIN C20880050010 belongs to the corporate entity register
      description: Entity C prefix is deliberately out of scope
    - value: Code SG123456789012 exceeds the individual tax number length
      description: Twelve digits after the prefix is too long
    - value: ig115002000
      description: Lowercase prefix — LHDN issues TINs with uppercase prefixes (pattern is case-sensitive)
    - value: sg10234567090
      description: Lowercase legacy prefix — TIN prefixes are uppercase (pattern is case-sensitive)
false_positives:
  - description: SG- and OG-prefixed codes appear in non-tax contexts (Singapore-related references, order codes, part numbers).
    mitigation: Every tier requires corroborating LHDN / tax keywords within the proximity window; there is no bare value-only tier.
  - description: Sample TINs in LHDN guidance, e-Invois documentation, or tax-agent templates may match the labelled form.
    mitigation: The high and medium tiers apply the template-exclusion NOT-group to suppress sample and documentation content.
  - description: No checksum is published for the digit portion, so structurally valid but nonexistent TINs cannot be excluded by regex.
    mitigation: Rely on prefix structure, length bounds, and keyword evidence; the digit run is variable length so a repeated-digit filter is not applicable.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 5
risk_description: >-
  The detector finds Malaysian individual TINs using current IG or legacy OG and SG prefixes followed by nine to eleven digits, with LHDN or tax context and no checksum validation. Disclosure can support taxpayer impersonation, targeted tax scams, or correlation of a person across filings, but the identifier alone does not expose income, assessment, refund, or account access. The normal unit is one personal tax number with bounded harm that requires additional identity and tax-record information for material misuse. Risk 5 and OFFICIAL are appropriate, while a populated return, assessment, or identity bundle containing the TIN would warrant SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_my_tax_number
      matches:
        - ref: Evidence_my_tax_number
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Regex_my_tax_number
      matches:
        - ref: Evidence_my_tax_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Regex_my_tax_number
      matches:
        - ref: Evidence_my_tax_number
  regexes:
    - id: Regex_my_tax_number
      pattern: \b(?:IG|OG|SG)\s?\d{9,11}\b
  keywords:
    - id: Evidence_my_tax_number
      groups:
        - match_style: word
          terms:
            - tax identification number
            - text: TIN
              case_sensitive: true
            - text: LHDN
              case_sensitive: true
            - Lembaga Hasil Dalam Negeri
            - HASiL
            - nombor pengenalan cukai
            - income tax number
            - nombor cukai pendapatan
            - Inland Revenue Board
            - e-Invois
            - MyTax
      strength: specific
created: '2026-07-08'
updated: '2026-07-14'
