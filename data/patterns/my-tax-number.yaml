  - version: 1.1.0
    date: '2026-07-08'
    description: >-
      Harmonized with letter-prefixed identifier convention (j1/j3/j4 waves): engine universal → boost_regex,
      added case_sensitive: true (IG / OG / SG prefixes are issued uppercase by LHDN). Detection change:
      lowercase forms such as ig115002000 previously matched under the repo-default case-insensitive testing
      and are now rejected; lowercase should_not_match cases added to document this.
