schema: testpattern/v1
name: Ad bidding model parameters
slug: au-top500-217-ad-bidding-model-parameters
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies private bidding-model parameters rather than online-advertising vocabulary generally:
  named parameter assignments (bid floors, pacing multipliers, objective weights, budget caps) enforce,
  while auction and programmatic-advertising topic terms remain discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Topic phrases (bidding algorithm, programmatic advertising,
  cost per click) feed a 65 discovery-only tier; enforcement requires Pattern_bidding_parameters - a
  named bidding parameter (bid_floor, pacing_multiplier, ctr_weight, target_cpa, ...) bound to a
  numeric value - at 75, with bidding-topic evidence within 300 characters raising it to 85. The shared
  template exclusion vetoes sample/training text at enforcement tiers.
pattern: >-
  (?is)\b(?:ad\s+bidding\s+model\s+parameters|bidding\s+algorithm|bid\s+strategy|auction\s+model|real[\s-]+time\s+bidding|programmatic\s+advertising|bid\s+optimization|proprietary\s+model|trade\s+secret|cost\s+per\s+click)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - ad bidding model parameters
    - bidding
    - model
    - parameters
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: ad bidding model parameters
      description: Primary topic phrase match
    - value: bidding algorithm
      description: Case-insensitive topic phrase match
    - value: bid strategy
      description: Alternative topic phrase match
    - value: auction model
      description: Additional topic phrase match (discovery only)
    - value: 'campaign AU-7: bid_floor=1.35; ctr_weight=0.28; conversion_weight=0.72; pacing_multiplier=0.91'
      description: Named bidding parameters with numeric values reach the enforcing tiers
    - value: 'The help page defines real-time bidding and cost per click.'
      description: Public definition text matches the topic branch only (discovery, not enforcement)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
    - value: 'The auction sold a painting after five bids.'
      description: Art-auction sense carries no ad-bidding topic phrase or parameter assignment
    - value: 'Training lab sample: bid_floor=1.00 and target_cpa=20.'
      description: Template/sample exclusion suppresses synthetic parameter values at enforcement tiers
false_positives:
  - description: Common words and phrases related to ad bidding model parameters appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_bidding_parameters
      matches:
        - ref: Evidence_ad_bidding_model_parameters
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_bidding_parameters
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_ad_bidding_model_parameters
      matches:
        - ref: Evidence_ad_bidding_model_parameters
  regexes:
    - id: Pattern_ad_bidding_model_parameters
      pattern: >-
        (?is)\b(?:ad\s+bidding\s+model\s+parameters|bidding\s+algorithm|bid\s+strategy|auction\s+model|real[\s-]+time\s+bidding|programmatic\s+advertising|bid\s+optimization|proprietary\s+model|trade\s+secret|cost\s+per\s+click)\b
    - id: Pattern_bidding_parameters
      pattern: >-
        (?is)\b(?:bid_floor|base_bid|pacing_multiplier|conversion_weight|ctr_weight|budget_cap|reserve_price|target_cpa)\b\s*(?:=|:)?\s*[-+]?[0-9]+(?:\.[0-9]+)?
  keywords:
    - id: Evidence_ad_bidding_model_parameters
      groups:
        - match_style: word
          terms:
            - ad bidding model parameters
            - bidding algorithm
            - bid strategy
            - auction model
            - real-time bidding
            - programmatic advertising
            - bid optimization
            - proprietary model
            - trade secret
            - cost per click
risk_description: >-
  This detector matches ad-bidding model parameters, bidding algorithms, bid strategy, auction model, real-time bidding, programmatic advertising, bid optimisation, proprietary model, trade secret, or cost-per-click terminology. Actual parameters can reveal value estimates, pacing, budget allocation, audience choices, and auction tactics, enabling competitors or publishers to predict and game bids. Public advertising guidance and generic auction discussion can also match, but the normal confidential record is bounded to one campaign system or model. Risk 8 supports SENSITIVE InfoTech; PROTECTED would require platform-wide manipulation, regulated critical decisions, or systemic compromise causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-07-16'
changelog:
  - version: 1.4.0
    date: '2026-07-16'
    description: >-
      Tier rebalance (TP-00343): topic vocabulary (programmatic advertising, cost per click, bid
      strategy) no longer enforces - the topic branch is demoted to 65 discovery_only. Enforcement now
      anchors on Pattern_bidding_parameters (named bidding variables bid_floor/base_bid/
      pacing_multiplier/conversion_weight/ctr_weight/budget_cap/reserve_price/target_cpa bound to
      numeric values): 75 with template exclusion, 85 with additional bidding-topic evidence.
      Description now targets private bidding-model parameters. Added parameter-set positive and
      art-auction/training-lab negatives.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 818 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
