schema: testpattern/v1
name: Treasury cash position reports
slug: au-top500-118-treasury-cash-position-reports
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to treasury cash position reports in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:cash\s+position|liquidity\s+report|cash\s+management|daily\s+cash\s+balance|overnight\s+position|bank\s+balance|funding\s+requirement|cash\s+forecast|cash\s+at\s+bank|treasury\s+operations)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - treasury cash position reports
    - treasury
    - cash
    - position
    - reports
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: cash position
      description: Primary topic phrase match
    - value: liquidity report
      description: Case-insensitive topic phrase match
    - value: cash management
      description: Alternative topic phrase match
    - value: daily cash balance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_treasury_cash_position
      matches:
        - ref: Evidence_treasury_cash_position
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_treasury_cash_position
      matches:
        - ref: Evidence_treasury_cash_position
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_treasury_cash_position
      matches:
        - ref: Evidence_treasury_cash_position
  regexes:
    - id: Pattern_treasury_cash_position
      pattern: (?is)\b(?:cash\s+position|liquidity\s+report|cash\s+management|daily\s+cash\s+balance|overnight\s+position|bank\s+balance|funding\s+requirement|cash\s+forecast|cash\s+at\s+bank|treasury\s+operations)\b
  keywords:
    - id: Evidence_treasury_cash_position
      groups:
        - match_style: word
          terms:
            - treasury
            - cash position
            - liquidity report
            - cash management
            - daily cash balance
            - overnight position
            - bank balance
            - funding requirement
            - cash forecast
            - AOFM
            - cash at bank
            - treasury operations
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
