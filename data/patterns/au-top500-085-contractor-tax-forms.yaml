schema: testpattern/v1
name: Contractor tax forms
slug: au-top500-085-contractor-tax-forms
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to contractor tax forms in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:contractor\s+tax\s+forms|Australian\s+Business\s+Number|voluntary\s+agreement|contractor\s+payment|PAYG\s+withholding|tax\s+invoice|independent\s+contractor|labour\s+hire|personal\s+services\s+income|contractor\s+declaration)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - contractor tax forms
    - contractor
    - tax
    - forms
    - payroll
    - operations
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: contractor tax forms
      description: Primary topic phrase match
    - value: australian business number
      description: Case-insensitive topic phrase match
    - value: voluntary agreement
      description: Alternative topic phrase match
    - value: contractor payment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_contractor_tax_forms
      matches:
        - ref: Evidence_contractor_tax_forms
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_contractor_tax_forms
      matches:
        - ref: Evidence_contractor_tax_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_contractor_tax_forms
      matches:
        - ref: Evidence_contractor_tax_forms
  regexes:
    - id: Pattern_contractor_tax_forms
      pattern: >-
        (?is)\b(?:contractor\s+tax\s+forms|Australian\s+Business\s+Number|voluntary\s+agreement|contractor\s+payment|PAYG\s+withholding|tax\s+invoice|independent\s+contractor|labour\s+hire|personal\s+services\s+income|contractor\s+declaration)\b
  keywords:
    - id: Evidence_contractor_tax_forms
      groups:
        - match_style: word
          terms:
            - contractor tax forms
            - ABN
            - Australian Business Number
            - voluntary agreement
            - contractor payment
            - PAYG withholding
            - tax invoice
            - independent contractor
            - subcontractor
            - labour hire
            - personal services income
            - contractor declaration
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
