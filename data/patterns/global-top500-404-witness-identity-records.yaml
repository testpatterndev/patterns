schema: testpattern/v1
name: Witness identity records
slug: global-top500-404-witness-identity-records
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to witness identity records in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:witness\s+identity|witness\s+protection|witness\s+statement|witness\s+name|witness\s+address|protected\s+witness|witness\s+relocation|witness\s+testimony|witness\s+interview|witness\s+deposition)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - witness identity records
  proximity: 240
test_cases:
  should_match:
    - value: witness identity
      description: Primary topic phrase match
    - value: witness protection
      description: Case-insensitive topic phrase match
    - value: witness statement
      description: Alternative topic phrase match
    - value: witness name
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to witness identity records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_witness_identity
      matches:
        - ref: Pattern_global_top500_404_witness_identity_records_label_context
        - ref: Keyword_global_top500_404_witness_identity_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_witness_identity
      matches:
        - ref: Keyword_witness_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_witness_identity
      matches:
        - ref: Keyword_witness_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_witness_identity
      pattern: >-
        (?is)\b(?:witness\s+identity|witness\s+protection|witness\s+statement|witness\s+name|witness\s+address|protected\s+witness|witness\s+relocation|witness\s+testimony|witness\s+interview|witness\s+deposition)\b
    - id: Pattern_global_top500_404_witness_identity_records_label_context
      pattern: (?i)\\b(?:witness\\s+identity\\s+records|witness|identity|top500)\\b
  keywords:
    - id: Keyword_witness_identity
      groups:
        - match_style: word
          terms:
            - witness identity
            - witness protection
            - witness statement
            - eyewitness
            - witness name
            - witness address
            - protected witness
            - witness relocation
            - deponent
            - witness testimony
            - witness interview
            - witness deposition
    - id: Keyword_global_top500_404_witness_identity_records_domain_context
      groups:
        - match_style: word
          terms:
            - witness identity records
            - witness
            - identity
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references: []
