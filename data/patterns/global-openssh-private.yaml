schema: testpattern/v1
name: OpenSSH Private Key Header
slug: global-openssh-private
version: 1.4.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects OpenSSH private-key armor. The fixed BEGIN line alone is discovery-only;
  the encoded openssh-key-v1 container magic supports medium confidence and
  normally wrapped near-header body lines support high confidence.
operation: >-
  Regex_openssh_private matches the BEGIN marker. At 75, an adjacent Base64 line
  must begin with b3BlbnNzaC1rZXktdjE, the encoded openssh-key-v1 NUL-terminated
  format magic. At 85, three consecutive 70-character OpenSSH armor lines must
  occur near the header. The 65 header-only tier is discovery-only; enforcing
  tiers reject explicit template and sample framing and never depend on a distant
  END marker.
pattern: '-----BEGIN OPENSSH PRIVATE KEY-----'
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private key
    - secret key
    - key file
    - PEM
    - certificate
    - RSA
    - cryptographic
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '-----BEGIN OPENSSH PRIVATE KEY-----'
      description: Low-tier probe - OpenSSH armor header without key body
    - value: |-
        -----BEGIN OPENSSH PRIVATE KEY-----
        b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAABlwAAAAdzc2gtcn
        QQ==
      description: Medium-tier probe - encoded openssh-key-v1 magic and body without closing armor
    - value: |-
        -----BEGIN OPENSSH PRIVATE KEY-----
        b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAABlwAAAAdzc2gtcn
        NhAAAAAwEAAQAAAYEAlswKGsdRkrNxMYSRY8MWnZLpaCagzxY7laz2e9py8KzeRWkHbqMV
        5BP2NLG7qC6NqBXXdWPTIQt4bBRL6qPFQXSjpl7cZ2Ac7528HQUSFd4C9g9um+trhTM3c/
        4+Kx6oP4keqYyKBXlRe3kyBUhqaGDMuvxFjOISPT0WTWwfGQzBM8V2kDhKdJXg0EqpzprW
        jFQ72Tz7y1mbmB0KenoPy4YYWJnte9Gc2DkpZJ4Qkzcs0Qf+SSOcbPLFQHXJJ6H1CVkwpS
        CH/xoQsMzJNyJuL9RT2+b77scMKkmjGe7Izgs9tB0+Er9jyURqIwPK6lmpN+W65KnfwFkg
        -----END OPENSSH PRIVATE KEY-----
      description: High-tier probe - realistically long OpenSSH body with footer beyond proximity
  should_not_match:
    - value: '-----BEGIN PUBLIC KEY-----'
      description: Public key, not private
    - value: '-----BEGIN CERTIFICATE-----'
      description: Certificate, not private key
    - value: |-
        -----BEGIN OPENSSH PRIVATE KEY-----
        QQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQ
        AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
        BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
      description: Adversarial wrapped Base64 lacks the encoded openssh-key-v1 magic
    - value: |-
        -----BEGIN OPENSSH PRIVATE KEY-----
        PLACEHOLDER
        -----END OPENSSH PRIVATE KEY-----
      description: Placeholder body must not enforce
    - value: |-
        Documentation example:
        -----BEGIN OPENSSH PRIVATE KEY-----
        b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAABlwAAAAdzc2gtcn
        NhAAAAAwEAAQAAAYEAlswKGsdRkrNxMYSRY8MWnZLpaCagzxY7laz2e9py8KzeRWkHbqMV
        5BP2NLG7qC6NqBXXdWPTIQt4bBRL6qPFQXSjpl7cZ2Ac7528HQUSFd4C9g9um+trhTM3c/
        -----END OPENSSH PRIVATE KEY-----
      description: Documentation quoting realistic wrapped OpenSSH data must not enforce
    - value: '-----BEGIN PRIVATE KEY-----'
      description: Sibling PKCS#8 private-key armor is not OpenSSH format
false_positives:
  - description: PEM-encoded certificates or public keys that use similar header formats
    mitigation: The pattern specifically matches the private key header text, but verify the full PEM block contains actual key material.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_description: >-
  This SIT matches the exact OpenSSH private-key header, a format marker that ordinarily introduces key bytes but is not itself sufficient to authenticate. If usable private material follows, disclosure can enable SSH impersonation to hosts that trust the associated public key, subject to any key passphrase and server authorization. The usual impact is one key identity and its authorized hosts or accounts, while header-only examples, encrypted keys, and revoked authorizations limit harm. Risk 8 SENSITIVE reflects the strong signal of serious credential exposure; PROTECTED requires a confirmed usable key with broad administrative or critical-host reach.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_openssh_private
      matches:
        - ref: Evidence_openssh_v1_magic
        - ref: Evidence_openssh_multiline_body
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_openssh_private
      matches:
        - ref: Evidence_openssh_v1_magic
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_openssh_private
  regexes:
    - id: Regex_openssh_private
      pattern: '-----BEGIN OPENSSH PRIVATE KEY-----'
    - id: Evidence_openssh_v1_magic
      pattern: '(?:\r?\n)b3BlbnNzaC1rZXktdjE[A-Za-z0-9+/]{45,61}={0,2}(?:\r?\n)'
    - id: Evidence_openssh_multiline_body
      pattern: '(?:\r?\n)(?:[A-Za-z0-9+/]{70}\r?\n){3}'
