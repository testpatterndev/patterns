schema: testpattern/v1
name: Employee withholding elections
slug: global-top500-082-employee-withholding-elections
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to employee withholding elections in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:employee\s+withholding\s+elections|withholding\s+election|tax\s+withholding|filing\s+status|federal\s+withholding|state\s+withholding|payroll\s+deduction|employee\s+declaration)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - employee withholding elections
    - employee
    - withholding
    - elections
    - payroll
    - tax
    - operations
  proximity: 300
  keyword_lists:

    - industry-hr
test_cases:
  should_match:
    - value: employee withholding elections
      description: Primary topic phrase match
    - value: withholding election
      description: Case-insensitive topic phrase match
    - value: tax withholding
      description: Alternative topic phrase match
    - value: filing status
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_withholding_elections
      matches:
        - ref: Pattern_global_top500_082_employee_withholding_elections_label_context
        - ref: Keyword_global_top500_082_employee_withholding_elections_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_082_employee_withholding_elections_noise_exclusion
    - confidence_level: 75
      id_match: Regex_withholding_elections
      matches:
        - ref: Keyword_withholding_elections
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_082_employee_withholding_elections_noise_exclusion
    - confidence_level: 65
      id_match: Regex_withholding_elections
      matches:
        - ref: Keyword_withholding_elections
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_082_employee_withholding_elections_noise_exclusion
  regexes:
    - id: Regex_withholding_elections
      pattern: (?is)\b(?:employee\s+withholding\s+elections|withholding\s+election|tax\s+withholding|filing\s+status|federal\s+withholding|state\s+withholding|payroll\s+deduction|employee\s+declaration)\b
    - id: Pattern_global_top500_082_employee_withholding_elections_label_context
      pattern: (?i)\\b(?:employee\\s+withholding\\s+elections|employee|withholding|elections|top500)\\b
  keywords:
    - id: Keyword_withholding_elections
      groups:
        - match_style: word
          terms:
            - employee withholding elections
            - withholding election
            - W-4
            - tax withholding
            - allowances
            - filing status
            - exemptions
            - federal withholding
            - state withholding
            - payroll deduction
            - employee declaration
    - id: Keyword_global_top500_082_employee_withholding_elections_domain_context
      groups:
        - match_style: word
          terms:
            - employee withholding elections
            - employee
            - withholding
            - elections
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_082_employee_withholding_elections_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
