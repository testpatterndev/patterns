schema: testpattern/v1
name: SQL Account Creation with Password
slug: snaffler-sql-account-creation
version: 1.2.2
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects SQL statements that create database user accounts or logins with
  embedded passwords, covering SQL Server CREATE LOGIN, MySQL CREATE USER IDENTIFIED BY,
  and PostgreSQL CREATE USER WITH PASSWORD. Mirrors Snaffler rule KeepSqlAccountCreation.
operation: >-
  Matches CREATE USER or CREATE LOGIN statements that include a password clause
  (IDENTIFIED BY or WITH PASSWORD). Uses [\s\S]{0,200} to span potential line
  breaks between the CREATE clause and the password keyword. PDF-safe.
risk_description: >-
  The high-confidence regex finds SQL CREATE USER or CREATE LOGIN statements followed within 200 characters by IDENTIFIED BY or WITH PASSWORD, so the matched statement is explicitly credential-bearing. Disclosure can expose a database account password from a deployment or migration script, enabling direct authentication attempts and access to data allowed by that account. The normal unit is one database credential with serious but contained impact; its privilege, validity, and reuse are not established by the detector. Risk 8 and SENSITIVE are justified, while PROTECTED is not met without evidence of administrative privilege, production-wide reuse, or a broad high-impact database compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: CREATE\s+(?:USER|LOGIN)\s+[\s\S]{0,200}(?:IDENTIFIED\s+BY|WITH\s+PASSWORD)
confidence: high
confidence_justification: >-
  High confidence: the combination of SQL account-creation keywords and an explicit
  password clause is highly specific to credential-bearing SQL scripts. DDL without
  password clauses (CREATE TABLE, CREATE INDEX) does not match.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - GRANT
    - ALTER LOGIN
    - sp_addlogin
    - sysadmin
  proximity: 300
test_cases:
  should_match:
    - value: "CREATE USER audit_reader WITH PASSWORD"
      description: Exact 65 probe - account/password clause candidate without a populated value
    - value: "CREATE USER 'app'@'%' IDENTIFIED BY 'p4ssWord9';"
      description: Exact 75 probe - populated MySQL account password statement
    - value: "CREATE LOGIN svc_app WITH PASSWORD = 'S3rv1ce!2024'; ALTER SERVER ROLE sysadmin ADD MEMBER svc_app;"
      description: Exact 85 probe - populated login plus independent privileged-role grant
    - value: "CREATE USER etl_user WITH PASSWORD 'Etl$ecret2024';"
      description: Populated PostgreSQL account statement at the balanced tier
  should_not_match:
    - value: "CREATE TABLE Users (id INT, name VARCHAR(50));"
      description: DDL table creation, no password clause
    - value: "CREATE INDEX idx_login ON users(login);"
      description: Index DDL, not account creation
    - value: "ALTER USER app IDENTIFIED BY 'N3wPassword';"
      description: Sibling account-alter statement is outside this creation detector
    - value: "CREATE USER app WITH PASSWORD = '';"
      description: Empty password value remains discovery-only and cannot enforce
    - value: "Documentation example: CREATE LOGIN demo WITH PASSWORD = 'S3rv1ce!2024'; ALTER SERVER ROLE sysadmin ADD MEMBER demo;"
      description: Documentation example with a full privileged statement is excluded
false_positives:
  - description: SQL migration scripts or database setup documentation that include CREATE USER statements with placeholder or masked passwords for illustrative purposes.
    mitigation: Require proximity to operational SQL keywords (GRANT, ALTER LOGIN, sp_addlogin) that indicate production-grade credential scripts rather than documentation.
  - description: ORM or framework generated SQL in test fixtures that creates test accounts with known weak passwords.
    mitigation: Template exclusion keywords at 65-tier catch common test/example/placeholder markers.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_sql_account_creation
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_sql_populated_password
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_sql_populated_password
      matches:
        - ref: Keyword_snaffler_sql_account_creation_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_sql_account_creation
      pattern: CREATE\s+(?:USER|LOGIN)\s+[\s\S]{0,200}(?:IDENTIFIED\s+BY|WITH\s+PASSWORD)
    - id: Regex_snaffler_sql_populated_password
      pattern: (?i)CREATE\s+(?:USER|LOGIN)\s+[\s\S]{1,160}?(?:IDENTIFIED\s+BY|WITH\s+PASSWORD)\s*(?:=\s*)?['"][^'"\r\n]{8,128}['"]
  keywords:
    - id: Keyword_snaffler_sql_account_creation_evidence
      groups:
        - match_style: string
          terms:
            - GRANT
            - ALTER LOGIN
            - ALTER SERVER ROLE
            - SUPERUSER
            - sysadmin
            - WITH ADMIN OPTION
      strength: specific
created: '2026-06-26'
updated: '2026-07-19'
