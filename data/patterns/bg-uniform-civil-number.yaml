schema: testpattern/v1
name: Единен граждански номер (ЕГН)
slug: bg-uniform-civil-number
version: 1.2.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Единен граждански номер (ЕГН) patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT
  directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-bulgaria-uniform-civil-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Adds
  label-context matching and exclusion logic for sample/template/test placeholders.
pattern: \b\d{10}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Context label evidence plus explicit template/example exclusion
  improves precision for high-risk identifiers.
jurisdictions:
  - eu
  - bg
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - EGN
    - uniform civil number
    - граждански номер
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '7501011234'
      description: Bulgarian UCN (born 1975-01-01)
    - value: '8812125678'
      description: Bulgarian UCN (born 1988-12-12)
    - value: '9203034567'
      description: Bulgarian UCN (born 1992-03-03)
  should_not_match:
    - value: '123456789'
      description: Too few digits (9)
    - value: '12345678901'
      description: Too many digits (11)
    - value: sample template placeholder number 123456789
      description: Template/sample context should be excluded even when numeric-like values appear
false_positives:
  - description: Ten-digit numeric sequences appear in phone numbers, account numbers, and other non-identity contexts.
    mitigation: Require corroborative evidence keywords such as "EGN" or "граждански номер" within the proximity window. Validate embedded date (first 6 digits) for additional confidence.
  - description: In Australian tenants, Australian mobile telephone numbers can satisfy this ten-digit structure and create cross-SIT numeric identifier overmatch.
    mitigation: Use the AU mobile number NONE-of regex gate where phone numbers are not valid positive evidence.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
regional_tuning:
  - jurisdiction: au
    signal: au-mobile-number-overmatch-numeric-id-20260525
    action: exclude-regex
    id: Regex_au_mobile_number_exclusion
    pattern: (?:^|[^0-9])(?:04[0-9]{8}|(?:\+?61[\s.-]?4(?:[\s.-]?[0-9]){8}))(?:$|[^0-9])
    defaultDecision: modify
    risk: regional-phone-number-overmatch
    reason: Aggregate analysis found Australian mobile-shaped literals overmatching this numeric identifier family in AU tenant data.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_bg_ucn
      matches:
        - ref: Pattern_bg_uniform_civil_number_label_context
        - ref: Keyword_bg_ucn_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_bg_ucn
      matches:
        - ref: Keyword_bg_ucn_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_bg_ucn
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_bg_ucn
      pattern: \b\d{10}\b
    - id: Pattern_bg_uniform_civil_number_label_context
      pattern: (?i)\b(?:uniform|civil)\b
  keywords:
    - id: Keyword_bg_ucn_specific
      groups:
        - match_style: word
          terms:
            - ЕГН
            - единен граждански номер
            - граждански номер
            - лична карта
            - личен номер
            - ЕСГРАОН
            - Bulgarian civil number
            - uniform civil number
            - text: UCN
              case_sensitive: true
      strength: specific
    - id: Keyword_bg_ucn_general
      groups:
        - match_style: word
          terms:
            - identification number
            - national ID
            - personal number
            - identity number
            - citizen number
            - personal identification
            - civil registration
      strength: specific
  filters:
    - id: Filter_bg_ucn_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  This reference detector finds Bulgaria's ten-digit uniform civil number, which incorporates birth and registration information. The EGN can expose limited biographical attributes and link a person across government, health, tax, and employment records. One number may aid impersonation but does not provide an identity document, full civil record, credential, or service access, and Australian mobile numbers can share the unformatted structure. Risk 5 and OFFICIAL fit the atomic value; pairing EGN with document imagery or a detailed citizen record would warrant SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-bulgaria-uniform-civil-number
    title: Bulgaria Uniform Civil Number entity definition - Microsoft Learn
