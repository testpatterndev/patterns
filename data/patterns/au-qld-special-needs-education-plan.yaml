schema: testpattern/v1
name: QLD Special Needs Education Plan
slug: au-qld-special-needs-education-plan
version: 1.5.0
type: keyword_list
pattern_class: concept
description: Detects QLD special needs education plans containing children's disability and learning support details.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - pii
  - children
  - health
  - education
  - government
test_cases:
  should_match:
    - value: 'Individual education plan review meeting.'
      description: Exact 65 discovery probe - plan phrase without populated student-plan fields
    - value: 'Individual education plan - student name, year level, learning goals, and review date recorded.'
      description: Exact 75 probe - populated plan fields without Queensland education-authority evidence
    - value: 'Education Queensland individual education plan - student name, year level, learning goals, responsible teacher, and review date recorded.'
      description: Exact 85 probe - populated plan plus Queensland education-authority evidence
    - value: Individual education plan (IEP) with verified disability and learning support
      description: Test match 1
    - value: 'QLD Education Adjustment Program: special needs reasonable adjustment'
      description: Test match 2
    - value: Special education support plan for student with learning difficulty
      description: Test match 3
  should_not_match:
    - value: Special needs of the business
      description: Non-match 1
    - value: Education reform announcement
      description: Non-match 2
    - value: 'Sample template for a learner support record: learner name, year, goals, review date.'
      description: Adjacent template language is not a populated special-needs plan
    - value: 'The public policy discusses classroom adjustment planning requirements.'
      description: Public policy has no special-needs-plan primary or populated student fields
    - value: 'Individual business continuity plan for special operational needs.'
      description: Sibling planning language does not satisfy the education-plan primary
false_positives:
  - description: Generic special needs or education references.
    mitigation: Require IEP, EAP, or verified disability specific terms.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The classifier identifies Queensland individual education or adjustment plans containing a child's verified disability, learning difficulty, reasonable adjustments, support needs, and education program. A genuine plan can expose functional limitations, diagnoses or inferred conditions, classroom accommodations, family circumstances, and school decisions, enabling bullying, discrimination, coercion, or unfair limitation of future opportunities. The normal unit concerns one student and support plan, producing serious but contained harm without assuming a statewide disability register. Risk 8 and SENSITIVE are justified; PROTECTED would require bulk vulnerable-child records, severe safeguarding exposure, or compromise causing significant irreversible harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_special_needs_plan
      matches:
        - ref: Evidence_student_plan_fields
        - ref: Evidence_qld_education_forms
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_special_needs_plan
      matches:
        - ref: Evidence_student_plan_fields
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_special_needs_plan
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
  regexes:
    - id: Pattern_special_needs_plan
      pattern: (?i)\b(?:personalised\s+learning\s+plan|individual\s+(?:curriculum|education|support)\s+plan|plp|icp|issp)\b
    - id: Pattern_education_support
      pattern: (?i)\b(?:disability\s+support|special\s+needs|reasonable\s+adjustment|inclusive\s+education)\b
  keywords:
    - id: Evidence_special_needs
      groups:
        - match_style: word
          terms:
            - Personalised Learning Plan
            - text: PLP
              case_sensitive: true
            - Individual Curriculum Plan
            - text: ICP
              case_sensitive: true
            - Individual Support Plan
            - ISSP
            - disability support
            - reasonable adjustment
            - inclusive education
            - special needs education plan
            - student special needs assessment
      strength: specific
    - id: Evidence_qld_education_forms
      groups:
        - match_style: word
          terms:
            - Department of Education
            - Education Queensland
            - State School
            - SEF-1
            - ppr.qed.qld.gov.au
            - education.qld.gov.au
            - eq.edu.au
      strength: specific
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
    - id: Evidence_student_plan_fields
      groups:
        - match_style: word
          terms:
            - student name
            - year level
            - learning goals
            - adjustment category
            - responsible teacher
            - review date
            - parent consultation
            - support hours
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.5.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: add a 65 discovery plan tier, require populated student-plan fields at 75 and Queensland education-authority evidence at 85, plus exact-tier and sibling/public/template probes.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 588 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - special needs education plan
  - student special needs assessment
  - individual education plan
  - IEP
  - learning support
  - disability support
  - Education Adjustment Program
  - EAP
  - verified disability
  - learning difficulty
  - special education
  - support plan
  - reasonable adjustment
remediation:
  catalog_quality_2026_06_02:
