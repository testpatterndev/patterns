schema: testpattern/v1
name: Claim settlement negotiation notes
slug: au-top500-140-claim-settlement-negotiation-notes
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to claim settlement negotiation notes in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:claim\s+settlement|settlement\s+negotiation|claim\s+notes|insurance\s+claim|loss\s+adjuster|claims\s+handler|settlement\s+offer|claim\s+reserve)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - claim settlement negotiation notes
    - claim
    - settlement
    - negotiation
    - notes
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: claim settlement
      description: Primary topic phrase match
    - value: settlement negotiation
      description: Case-insensitive topic phrase match
    - value: claim notes
      description: Alternative topic phrase match
    - value: insurance claim
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_claim_settlement
      matches:
        - ref: Evidence_claim_settlement
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_claim_settlement
      matches:
        - ref: Evidence_claim_settlement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_claim_settlement
      matches:
        - ref: Evidence_claim_settlement
  regexes:
    - id: Pattern_claim_settlement
      pattern: (?is)\b(?:claim\s+settlement|settlement\s+negotiation|claim\s+notes|insurance\s+claim|loss\s+adjuster|claims\s+handler|settlement\s+offer|claim\s+reserve)\b
  keywords:
    - id: Evidence_claim_settlement
      groups:
        - match_style: word
          terms:
            - claim settlement
            - settlement negotiation
            - claim notes
            - insurance claim
            - loss adjuster
            - claims handler
            - settlement offer
            - claim reserve
            - indemnity
            - claimant
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://handbook.apra.gov.au/standard/gps-230
  - https://www.oaic.gov.au/privacy/your-privacy-rights/your-personal-information/what-is-personal-information
