schema: testpattern/v1
name: Forensic disk images
slug: au-top500-297-forensic-disk-images
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies forensic disk images in security contexts, distinguishing artifact references from
  holdings: an actual named .E01 image file is medium-confidence artifact evidence at 75,
  acquisition metadata (evidence ID, source device, image size, verification hash) raises
  confidence to 85, and bare E01/disk-image discussion remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Topic phrases (E01, dd image, forensic image, disk
  image) feed a 65 discovery-only tier; enforcement requires Pattern_forensic_image_file — a
  concrete filename ending in .E01 — at 75, with Evidence_forensic_image_metadata (evidence
  id, source device, acquired, image size, sha256, or verification hash fields) raising it to
  85. The shared template exclusion vetoes lab/demo text at enforcement tiers.
pattern: (?i)\b(?:E01|\.E01\b|dd\s+image|forensic\s+image|disk\s+image)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - Criminal Code Act 1995 (Cth)
  - Evidence Act 1977 (Qld)
frameworks:
  - ISO 27001
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - forensic disk images
    - forensic
    - disk
    - images
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: 'E01'
      description: Topic phrase present
    - value: 'E01'
      description: Topic phrase, lowercase
    - value: 'this record references the E01 held on file'
      description: Topic phrase within surrounding text
    - value: 'case-4187-drive01.E01 evidence ID=QPS-4187 source device=NVMe0 image size=512GB sha256=4f2a1d0c7b9e6a3f4f2a1d0c7b9e6a3f4f2a1d0c7b9e6a3f4f2a1d0c7b9e6a3f'
      description: Concrete .E01 filename with acquisition metadata reaches the 85 enforcing tier
    - value: 'Select E01 as the output format in EnCase'
      description: Tool instruction matches the topic branch only (discovery — no named image file)
    - value: 'The disk image in the user manual illustrates partitioning'
      description: Generic disk-image discussion keeps a discovery-level topic hit only (no enforcement)
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The detector identifies a composite forensic image through E01, dd image, forensic image, and disk image terms rather than inspecting the captured contents. A genuine image can reproduce an entire device, including deleted files, credentials, personal information, business records, and evidence that could be exploited or used to prejudice a proceeding. The affected scale centres on one device but may extend to its owner, correspondents, employer, clients, and accounts represented in the image. Risk 8 and SENSITIVE InfoTech fit the serious exposure expected from a single-device image whose contents are unknown; PROTECTED requires confirmed broad privileged credentials, protected evidence, or cross-party data capable of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_forensic_image_file
      matches:
        - ref: Evidence_forensic_image_metadata
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_forensic_image_file
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_forensic_disk
  regexes:
    - id: Pattern_forensic_disk
      pattern: (?i)\b(?:E01|\.E01\b|dd\s+image|forensic\s+image|disk\s+image)\b
    - id: Pattern_forensic_image_file
      pattern: (?i)\b[a-z0-9_-]{1,120}\.e01\b
    - id: Evidence_forensic_image_metadata
      pattern: >-
        (?is)\b(?:evidence\s+id|source\s+device|acquired|image\s+size|sha256|verification\s+hash)\s*[:=]\s*\S+
  keywords:
    - id: Evidence_forensic_disk
      groups:
        - match_style: word
          terms:
            - forensic disk image
            - forensic image
            - disk image
            - dd image
            - text: E01
              case_sensitive: true
            - evidence file
            - chain of custody
            - hash verification
            - write blocker
            - EnCase
            - FTK Imager
            - acquisition
      strength: specific
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.5.0
    date: '2026-07-17'
    description: >-
      Reduced-scope tier rebalance (TP-00414): topic vocabulary no longer enforces (an FTK
      Imager procedure instruction previously reached 85 via same-span evidence). Enforcement
      now anchors on Pattern_forensic_image_file (a concrete filename ending in .E01, derived
      from the existing ".E01" alternative): 75 with template exclusion, 85 when
      Evidence_forensic_image_metadata (evidence id / source device / acquired / image size /
      sha256 / verification hash field) is also present. Bare E01/disk-image discussion stays
      65 discovery_only; per QA correction the generic disk-image manual sentence is expected
      as a discovery-level hit, not no_match. Added filename+metadata positive and tool-
      instruction/manual discovery cases.
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 889 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
