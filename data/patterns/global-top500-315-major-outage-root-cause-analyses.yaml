schema: testpattern/v1
name: Major outage root-cause analyses
slug: global-top500-315-major-outage-root-cause-analyses
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies major outage root-cause analyses patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: industry-critical-infrastructure. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:major\s+outage|root\s+cause\s+analysis|post[\s-]+incident\s+review|service\s+disruption|contributing\s+factor|corrective\s+action|preventive\s+measure|incident\s+summary|lessons\s+learned)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - major outage root-cause analyses
    - major
    - outage
    - root
    - cause
    - analyses
    - operations
    - resilience
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: major outage
      description: Primary topic phrase match
    - value: root cause analysis
      description: Case-insensitive topic phrase match
    - value: post-incident review
      description: Alternative topic phrase match
    - value: service disruption
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The regex identifies major-outage, root-cause, post-incident, service-disruption, contributing-factor, corrective-action, preventive-measure, incident-summary, and lessons-learned terminology associated with an outage analysis. A genuine report can reveal architecture weaknesses, failed controls, customer impact, response gaps, and incomplete corrective work that supports repeat disruption or commercial criticism. The normal scope is one major service incident and its users, operators, and customers, while generic post-incident methods and templates can produce topic matches. Risk 8 SENSITIVE reflects serious contained operational and reputational harm; PROTECTED would require critical-service or significant broad consequences.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_outage_rca
      matches:
        - ref: Pattern_global_top500_315_major_outage_root_cause_analyses_label_context
        - ref: Keyword_global_top500_315_major_outage_root_cause_analyses_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_outage_rca
      matches:
        - ref: Keyword_outage_rca
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_outage_rca
      pattern: >-
        (?is)\b(?:major\s+outage|root\s+cause\s+analysis|post[\s-]+incident\s+review|service\s+disruption|contributing\s+factor|corrective\s+action|preventive\s+measure|incident\s+summary|lessons\s+learned)\b
    - id: Pattern_global_top500_315_major_outage_root_cause_analyses_label_context
      pattern: (?i)\b(?:major\s+outage\s+root\-cause\s+analyses)\b
  keywords:
    - id: Keyword_outage_rca
      groups:
        - match_style: word
          terms:
            - major outage
            - root cause analysis
            - text: RCA
              case_sensitive: true
            - postmortem
            - post-incident review
            - service disruption
            - downtime
            - contributing factor
            - corrective action
            - preventive measure
            - incident summary
            - lessons learned
      strength: specific
    - id: Keyword_global_top500_315_major_outage_root_cause_analyses_domain_context
      groups:
        - match_style: word
          terms:
            - major outage root-cause analyses
            - major
            - outage
            - root
            - cause
            - analyses
      strength: domain
