  - version: 1.4.0
    date: '2026-07-16'
    description: 'sit-alignment-validation-2026-07-16 wave1 (TP-00687): enforcing tiers now accept an any-of primary — decimal-percent, basis-point, or per-cent regex, or the board recommendation/deliberation keyword group (previously all tiers keyed solely on the decimal-percent regex, making the 50 bps / 4.35 per cent authored positive unreachable). Every enforcing path now requires the RBA/Reserve Bank institutions group plus pre-decision evidence (decision or embargo/markers group — 75 previously required neither); 85 additionally requires the actions group and protected markers, and no longer conjunctively requires all numeric formats. Discovery 65 keys on the numeric formats. Media-release/economists-expect/published exclusions retained. Adversarial test cases added.'
  - version: 1.3.2
    date: '2026-07-15'
    description: 'v25 authoritative risk alignment from Compl8DLPDeploy workbook row 1453; detector and package metadata unchanged.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1453 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
