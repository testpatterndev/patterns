schema: testpattern/v1
name: Central Bank Monetary Policy Pre-Decision
slug: central-bank-monetary-policy-pre-decision
version: 1.2.0
type: keyword_proximity
engine: universal
description: Detects draft monetary policy decisions, interest rate recommendations, or central bank board deliberation papers before public announcement. Covers RBA board papers and Treasury analysis of expected RBA decisions.
operation: 'Keyword proximity: monetary policy/interest rate terms within 300 characters of decision/recommendation terms and rate change indicators (basis points, tighten, ease, hold). Requires embargo or pre-decision markers.'
pattern: \b\d{1,2}\.\d{1,2}\s*%|\b\d{1,3}\s*(?:basis\s*points|bps)\b
confidence: medium
confidence_justification: 'Medium confidence: the co-occurrence of central bank/monetary policy terms with pre-decision markers and specific rate change indicators is uniquely identifiable. Published RBA statements and media commentary are excluded.'
jurisdictions:
  - global
regulations:
- "Reserve Bank Act 1959 (Cth)"
frameworks:
- QGISCF
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - monetary policy
    - interest rate
    - cash rate
    - RBA
    - Reserve Bank
    - central bank
    - decision
    - recommendation
    - board paper
    - deliberation
    - pre-announcement
    - embargoed
    - basis points
    - tighten
    - ease
    - hold
    - rate change
    - PROTECTED
    - pre-decision
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: 'PROTECTED — EMBARGOED. Treasury Analysis: Expected RBA Cash Rate Decision — March 2026 Board Meeting. Assessment: RBA board likely to ease by 25 basis points to 3.85%. Supporting factors: CPI at 2.4%, below target band midpoint. Employment softening. Pre-decision analysis — not for distribution.'
      description: Treasury pre-decision analysis of expected RBA rate change
    - value: 'CONFIDENTIAL — PRE-DECISION. Reserve Bank Board Paper. Recommendation: Reduce the cash rate target by 25 basis points to 3.85%. Deliberation: The Board notes that inflation has returned to the target band. Economic growth remains below trend. Hold option considered but rejected.'
      description: Central bank board paper with rate recommendation
    - value: 'PROTECTED — EMBARGOED. Monetary policy pre-decision briefing for the Reserve Bank board. Staff recommendation: tighten by 50 bps, moving the official cash rate target to 4.35 per cent. Deliberation notes restricted pending the board decision. Not for distribution.'
      description: Pre-decision monetary policy briefing with bps and per-cent rate indicators
  should_not_match:
    - value: 'RBA Media Release: At its meeting today, the Reserve Bank Board decided to leave the cash rate target unchanged. The decision was published immediately after the meeting.'
      description: Published RBA decision — public announcement
    - value: Market economists expect the RBA to cut rates at its next meeting. CBA, Westpac, and NAB have all forecast a rate reduction in their public research notes.
      description: Market economist predictions based on public information
false_positives:
  - description: Published RBA decisions and media releases
    mitigation: Exclude documents containing 'media release', 'at its meeting today', 'decided to' indicating published decisions
  - description: Market economist predictions and bank research notes
    mitigation: Exclude documents containing 'economists expect', 'forecast', 'prediction', 'market pricing' indicating external analysis
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_central_bank_monetary_policy_pre_decision_interest_rate_percentages
      matches:
        - ref: Evidence_central_bank_monetary_policy_pre_decision_primary
        - ref: Evidence_central_bank_monetary_policy_pre_decision_institutions
        - ref: Evidence_central_bank_monetary_policy_pre_decision_decision
        - ref: Evidence_central_bank_monetary_policy_pre_decision_actions
        - ref: Evidence_central_bank_monetary_policy_pre_decision_markers
        - ref: Pattern_central_bank_monetary_policy_pre_decision_basis_points_for_rate_changes
        - ref: Pattern_central_bank_monetary_policy_pre_decision_per_cent_rate_format
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_central_bank_monetary_policy_pre_decision_exclusion
    - confidence_level: 75
      id_match: Pattern_central_bank_monetary_policy_pre_decision_interest_rate_percentages
      matches:
        - ref: Evidence_central_bank_monetary_policy_pre_decision_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_central_bank_monetary_policy_pre_decision_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_central_bank_monetary_policy_pre_decision_interest_rate_percentages
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_central_bank_monetary_policy_pre_decision_exclusion
  regexes:
    - id: Pattern_central_bank_monetary_policy_pre_decision_interest_rate_percentages
      pattern: \b\d{1,2}\.\d{1,2}\s*%
    - id: Pattern_central_bank_monetary_policy_pre_decision_basis_points_for_rate_changes
      pattern: \b\d{1,3}\s*(?:basis\s*points|bps)\b
    - id: Pattern_central_bank_monetary_policy_pre_decision_per_cent_rate_format
      pattern: \b\d{1,2}\.\d{2}\s*per\s*cent\b
  keywords:
    - id: Evidence_central_bank_monetary_policy_pre_decision_primary
      groups:
        - match_style: word
          terms:
            - monetary policy
            - interest rate
            - cash rate
            - cash rate target
            - official rate
      strength: specific
    - id: Evidence_central_bank_monetary_policy_pre_decision_institutions
      groups:
        - match_style: word
          terms:
            - text: RBA
              case_sensitive: true
            - Reserve Bank
            - Reserve Bank of Australia
            - central bank
            - board
      strength: specific
    - id: Evidence_central_bank_monetary_policy_pre_decision_decision
      groups:
        - match_style: word
          terms:
            - decision
            - recommendation
            - board paper
            - deliberation
            - pre-announcement
            - pre-decision
      strength: domain
    - id: Evidence_central_bank_monetary_policy_pre_decision_actions
      groups:
        - match_style: word
          terms:
            - tighten
            - tightening
            - ease
            - easing
            - hold
            - rate change
            - rate cut
            - rate hike
            - reduce
            - increase
      strength: domain
    - id: Evidence_central_bank_monetary_policy_pre_decision_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - embargoed
            - confidential
            - pre-decision
            - not for distribution
      strength: domain
    - id: Filter_central_bank_monetary_policy_pre_decision_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - at its meeting today
            - decided to
            - economists expect
            - forecast by
            - market pricing
            - published

      strength: noise
risk_rating: 8
risk_description: Draft monetary policy decisions and interest rate recommendations before announcement; advance knowledge is the most valuable insider information in financial markets. While sensitive, disclosure represents BIL:2 harm — reputational or moderate financial impact rather than catastrophic institutional damage. Does not meet PROTECTED threshold in a Queensland Government operational context.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Financial"
references: []
