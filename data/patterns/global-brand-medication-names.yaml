schema: testpattern/v1
name: Brand Medication Names
slug: global-brand-medication-names
version: 1.3.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Brand Medication Names patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that identifies health and medical terminology in documents.
  Keyword matching is used to flag content containing medical language.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  health and medical terminology to identify protected health information.
keywords:
  - Lipitor
  - Humira
  - Eliquis
  - Keytruda
  - Ozempic
  - Jardiance
  - Xarelto
  - Opdivo
  - Dupixent
  - Stelara
  - Entresto
  - Trulicity
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on medical terms requires additional context for
  accurate detection. Medical terminology may appear in educational, research, or general
  health content without constituting protected health information.
jurisdictions:
  - global
regulations:
- GDPR
- HIPAA
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - phi
  - health
test_cases:
  should_match:
    - value: "patient diagnosed with Lipitor"
      description: Contains medical keyword 'Lipitor'
    - value: "treatment plan includes Humira"
      description: Contains medical keyword 'Humira'
    - value: "clinical notes reference Eliquis"
      description: Contains medical keyword 'Eliquis'
  should_not_match:
    - value: "quarterly revenue report for fiscal year 2024"
      description: Financial text with no medical terminology
    - value: "the project deadline has been moved to next Friday"
      description: Business scheduling text with no health terms
false_positives:
  - description: Educational or research materials discussing medical topics without containing actual patient data
    mitigation: >-
      Layer with PII detection to confirm medical terms appear alongside patient identifiers.
  - description: News articles or general health information websites mentioning medical conditions
    mitigation: >-
      Use document classification to distinguish clinical records from public health content.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_brand_medication
      matches:
        - ref: Keyword_brand_medication_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_brand_medication
  keywords:
    - id: Keyword_brand_medication
      groups:
        - match_style: word
          terms:
            - Lipitor
            - Humira
            - Eliquis
            - Keytruda
            - Ozempic
            - Jardiance
            - Xarelto
            - Opdivo
            - Dupixent
            - Stelara
            - Entresto
            - Trulicity
      strength: domain
    - id: Keyword_brand_medication_context
      groups:
        - match_style: word
          terms:
            - prescription
            - prescribed
            - medication
            - dosage
            - patient
            - pharmacy
            - dispensed
            - refill
            - drug
            - treatment
            - milligrams
            - medical record
      strength: domain
risk_rating: 5
risk_description: >-
  This low-confidence concept detector finds brand medication names such as Lipitor, Humira, or Eliquis, without requiring a patient, prescription, dose, indication, or administration event. Brand names appear in formularies, marketing, procurement, training, safety notices, and public product information, so the ordinary match is not necessarily personal health data. Even a genuine drug reference does not establish who uses it or why, and many medicines have multiple indications. Risk 5 and OFFICIAL fit the standalone match; SENSITIVE would require a named patient and prescription, medication history, or treatment context.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-brand-medication-names
    title: "Brand Medication Names entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
