schema: testpattern/v1
name: Plagiarism investigation files
slug: au-top500-352-plagiarism-investigation-files
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to plagiarism investigation files in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:plagiarism\s+investigation\s+files|academic\s+misconduct|academic\s+integrity|similarity\s+report|disciplinary\s+hearing|contract\s+cheating|misconduct\s+panel|integrity\s+breach)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - plagiarism investigation files
    - plagiarism
    - investigation
    - files
    - education
    - research
    - administration
  proximity: 300
test_cases:
  should_match:
    - value: plagiarism investigation files
      description: Primary topic phrase match
    - value: academic misconduct
      description: Case-insensitive topic phrase match
    - value: academic integrity
      description: Alternative topic phrase match
    - value: similarity report
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to plagiarism investigation files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_plagiarism_investigation
      matches:
        - ref: Evidence_plagiarism_investigation
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_plagiarism_investigation
      matches:
        - ref: Evidence_plagiarism_investigation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_plagiarism_investigation
      matches:
        - ref: Evidence_plagiarism_investigation
  regexes:
    - id: Pattern_plagiarism_investigation
      pattern: (?is)\b(?:plagiarism\s+investigation\s+files|academic\s+misconduct|academic\s+integrity|similarity\s+report|disciplinary\s+hearing|contract\s+cheating|misconduct\s+panel|integrity\s+breach)\b
    - id: Pattern_au_top500_352_plagiarism_investigation_files_label_context
      pattern: (?i)\\b(?:plagiarism\\s+investigation\\s+files|plagiarism|investigation|files|top500)\\b
  keywords:
    - id: Evidence_plagiarism_investigation
      groups:
        - match_style: word
          terms:
            - plagiarism investigation files
            - plagiarism
            - investigation
            - academic misconduct
            - academic integrity
            - Turnitin
            - similarity report
            - disciplinary hearing
            - collusion
            - contract cheating
            - misconduct panel
            - integrity breach
    - id: Keyword_au_top500_352_plagiarism_investigation_files_domain_context
      groups:
        - match_style: word
          terms:
            - plagiarism investigation files
            - plagiarism
            - investigation
            - files
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
