schema: testpattern/v1
name: Religious or Philosophical Beliefs
slug: global-religious-beliefs
version: 1.2.0
type: keyword_list
pattern_class: concept
engine: universal
description: >-
  Detects religious or philosophical belief information in person-linked membership, patient,
  workforce, census, pastoral-care, and accommodation records. The detector recognises explicit
  belief, affiliation, observance, denomination, and structured religion-field terminology,
  then raises confidence only for person records and populated belief or accommodation
  statements. Religious or philosophical beliefs are protected under GDPR Article 9 and
  Australian anti-discrimination and privacy law. Topic-grade detector, low confidence by
  design.
operation: >-
  The primary regex matches explicit religious/philosophical-belief phrases and structured
  religion, faith, or denomination labels. The 65 tier is discovery-only. The 75 tier requires
  a person-record context, and the 85 tier additionally requires a populated belief,
  denomination, observance, conversion, or accommodation statement. Public policy, aggregate,
  museum, academic, comparative-religion, and blank-form contexts are excluded from every tier.
pattern: '(?i)\b(?:religious\s+(?:or\s+philosophical\s+)?beliefs?|philosophical\s+beliefs?|religious\s+affiliations?|faith\s+affiliations?|belief\s+systems?|faith\s+traditions?|religious\s+(?:observance|preference|denominations?|conversion\s+record)|place\s+of\s+worship|(?:religion|faith|denomination)\s*(?::|(?:field|code|response)))\b'
confidence: low
confidence_justification: >-
  Low by design. Religious or philosophical belief is a GDPR Article 9 special category with
  no fixed format, so it is detected purely by topic vocabulary. Generic words like "believe"
  or "religion" appear constantly in non-sensitive prose (corporate values statements,
  educational content); the regex is scoped to full disclosure phrases only, and hits should
  be paired with corroborative keywords (faith, congregation, worship) to raise precision.
jurisdictions:
  - global
  - au
  - eu
regulations:
  - GDPR
  - Privacy Act 1988 (Cth)
  - Fair Work Act 2009 (Cth)
frameworks:
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - faith
    - congregation
    - worship
    - clergy
    - denomination
    - doctrine
    - spiritual
    - religion
  proximity: 300
test_cases:
  should_match:
    - value: 'Religious affiliation disclosure topic pending review.'
      description: Exact 65 discovery probe - belief topic without a data-subject record
    - value: 'Employee file includes a religious affiliation field.'
      description: Exact 75 probe - person-record context without a populated belief response
    - value: 'Patient record: religious affiliation recorded as Hindu; denomination: Shaivism.'
      description: Exact 85 probe - person record plus populated faith attribution
    - value: 'The intake form records religious affiliation under section 4.'
      description: Religious affiliation phrase present
    - value: 'Profile notes his faith tradition and place of worship.'
      description: Faith tradition / place of worship terms present
    - value: 'HR file documents a religious conversion record from the chaplaincy referral.'
      description: Religious conversion record term present
    - value: 'The census field asks respondents to state their religious beliefs voluntarily.'
      description: Religious beliefs phrase present
    - value: 'Admission record captures religion: Sikh.'
      description: Structured religion label in a person record
  should_not_match:
    - value: 'We believe in transparent pricing for all customers.'
      description: Generic corporate "believe", not a belief-system disclosure
    - value: 'The museum exhibit covered world religions through history.'
      description: Topical/educational mention, no personal disclosure phrase
    - value: 'Religious studies 101 is a required elective this semester.'
      description: Academic course listing, no disclosure phrase
    - value: 'Public policy document reports aggregate congregation demographics.'
      description: Public aggregate material is not a person-linked belief disclosure
    - value: 'Sample template: patient record with stated faith Example Faith.'
      description: Adjacent template language is not a populated belief record
    - value: 'Patient record lists a vegetarian dietary preference.'
      description: Sibling preference record does not satisfy the religious-belief primary
false_positives:
  - description: >-
      Generic corporate or educational use of "believe"/"religion"/"religious" (values
      statements, history/comparative-religion content) has nothing to do with a personal
      belief-disclosure record.
    mitigation: >-
      The regex targets full disclosure phrases and structured belief labels rather than the
      bare words "believe" or "religion"; enforcement requires a person-record context, and the
      high tier also requires a populated attribution or accommodation signal.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: broad
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_global_religious_belief
      matches:
        - ref: Evidence_belief_record_context
        - ref: Evidence_belief_attribution
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_belief_public_context
    - confidence_level: 75
      id_match: Pattern_global_religious_belief
      matches:
        - ref: Evidence_belief_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_belief_public_context
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_global_religious_belief
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_belief_public_context
  regexes:
    - id: Pattern_global_religious_belief
      pattern: '(?i)\b(?:religious\s+(?:or\s+philosophical\s+)?beliefs?|philosophical\s+beliefs?|religious\s+affiliations?|faith\s+affiliations?|belief\s+systems?|faith\s+traditions?|religious\s+(?:observance|preference|denominations?|conversion\s+record)|place\s+of\s+worship|(?:religion|faith|denomination)\s*(?::|(?:field|code|response)))\b'
  keywords:
    - id: Evidence_belief_record_context
      groups:
        - match_style: word
          terms:
            - membership form
            - patient record
            - patient intake
            - admission record
            - employee file
            - personnel record
            - HR adjustment request
            - profile field
            - census response
            - pastoral care file
            - accommodation request
      strength: domain
    - id: Evidence_belief_attribution
      groups:
        - match_style: word
          terms:
            - stated faith
            - recorded as
            - faith recorded as
            - 'religion:'
            - 'faith:'
            - 'denomination:'
            - declared belief
            - 'place of worship:'
            - observance requirement
            - observance requested
            - religious accommodation approved
            - converted to
      strength: specific
    - id: Evidence_belief_public_context
      groups:
        - match_style: word
          terms:
            - public policy document
            - public policy guidance
            - public dataset
            - aggregate statistics
            - museum catalogue
            - academic course
            - comparative religion
            - blank form
            - blank questionnaire
      strength: exclusion
risk_rating: 7
risk_description: >-
  A true positive attributes a religious or philosophical belief, affiliation, observance, or
  accommodation need to a person. Disclosure can enable discrimination, coercion, exclusion,
  harassment, or safety harm where minority status carries legal or social risk. The normal
  single-person record does not by itself establish the scale or severe consequence required
  for PROTECTED. Risk 7 and SENSITIVE Personal-Privacy are appropriate.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI Basic
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-07-12'
updated: '2026-07-19'
changelog:
  - version: 1.2.0
    date: '2026-07-19'
    description: 'Consolidate the retired Australian alias into the global detector: add Australian legal and workforce/accommodation evidence, recognise structured religion and denomination fields, retain 65 discovery, and require person-record plus populated belief evidence at 75/85.'
  - version: 1.1.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: add a 65 belief-topic discovery tier, a 75 person-record tier, and an 85 populated faith/observance attribution tier, with exact-tier and sibling/public/template probes.'
  - version: 1.0.0
    date: '2026-07-12'
    description: 'New pattern: replaces the deprecated au/global-top500-016-religious-or-philosophical-beliefs attribute-value patterns (needs-EDM/ML) with an honest topic-classifier concept, modeled on global-political-opinion. Deliberately avoids the deprecated pattern''s generic corroborative terms (personal, identity, demographics), which were the documented cause of its imprecision. Fills the D-wave coverage gap logged in c3-deprecation-report.md.'
author: testpattern-community
license: MIT
keywords:
  - religious beliefs
  - religious or philosophical beliefs
  - religious affiliation
  - faith affiliation
  - philosophical beliefs
  - belief system
  - faith tradition
  - religious observance
  - religious preference
  - place of worship
  - religious denomination
  - religious conversion record
  - 'religion:'
  - 'faith:'
  - 'denomination:'
references:
  - url: https://gdpr-info.eu/art-9-gdpr/
    title: GDPR Article 9 — processing of special categories of personal data (religious or philosophical beliefs)
  - url: https://www.fairwork.gov.au/tools-and-resources/fact-sheets/rights-and-obligations/protection-from-discrimination-at-work
    title: Protection from discrimination at work — Fair Work Ombudsman
