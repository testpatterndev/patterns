schema: testpattern/v1
name: Perplexity API Key
slug: global-perplexity-api-key
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects Perplexity API keys, which use a distinctive pplx- prefix followed by a 48-character
  alphanumeric body. A leaked key grants unauthorized, billed access to Perplexity's search and
  chat completion API and any prompts or data routed through it.
operation: >-
  Prefixed token format pplx- followed by exactly 48 alphanumeric characters. Corroborative
  evidence: keywords within 300 characters.
pattern: (?<![A-Za-z0-9_-])pplx-[a-zA-Z0-9]{48}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: the pplx- prefix is confirmed by Perplexity's own API key management
  documentation, and the fixed 48-character alphanumeric body (confirmed by the
  community-maintained gitleaks ruleset) makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - perplexity
    - perplexity.ai
    - PERPLEXITY_API_KEY
    - pplx-api
    - api key
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: pplx-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuv
      description: Perplexity API key, pplx- prefix + 48-char alphanumeric body
    - value: 'PERPLEXITY_API_KEY=pplx-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuv'
      description: Labelled Perplexity key in an env assignment
    - value: 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
      description: Mixed-case Perplexity key body (48 chars)
  should_not_match:
    - value: plx-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuv
      description: Wrong prefix (plx- instead of pplx-)
    - value: pplx-ABCDEFGHIJKLMNO
      description: Body too short (15 instead of 48 characters)
    - value: rotate the perplexity api key before deployment
      description: Prose mention without a token value
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Documentation or examples showing placeholder pplx- strings.
    mitigation: Require corroborative Perplexity keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  A leaked Perplexity API key enables unauthorized, billed access to Perplexity's search and chat
  completion API and can expose any prompts, documents, or data routed through it.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_perplexity_api_key
      matches:
        - ref: Keyword_perplexity_api_key
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_perplexity_api_key
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_perplexity_api_key
      pattern: (?<![A-Za-z0-9_-])pplx-[a-zA-Z0-9]{48}(?![A-Za-z0-9_-])
  keywords:
    - id: Keyword_perplexity_api_key
      groups:
        - match_style: word
          terms:
            - perplexity
            - perplexity.ai
            - PERPLEXITY_API_KEY
            - pplx-api
            - api key
            - perplexity api
      strength: specific
created: '2026-07-06'
updated: '2026-07-06'
changelog:
  - version: 1.0.0
    date: '2026-07-06'
    description: Initial release.
author: testpattern-community
license: MIT
references:
  - url: https://docs.perplexity.ai/docs/admin/api-key-management
    title: API Key Management - Perplexity Documentation
  - url: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
    title: 'gitleaks.toml: perplexity-api-key rule'
  - url: https://docs.github.com/en/code-security/secret-scanning/introduction/supported-secret-scanning-patterns
    title: Supported secret scanning patterns - GitHub Docs
