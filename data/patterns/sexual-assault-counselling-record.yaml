schema: testpattern/v1
name: Sexual Assault Counselling Record
slug: sexual-assault-counselling-record
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects sexual assault counselling session records containing victim identifiers, forensic medical examination details, and trauma counselling notes. These records are subject to absolute privilege in Queensland and carry the highest privacy protections — disclosure can re-traumatise survivors, compromise criminal proceedings, and endanger safety.
operation: 'Keyword proximity: primary keywords (sexual assault counselling, victim support, trauma counselling, forensic medical examination, SARAS) within 300 characters of corroborative keywords (PROTECTED, Privacy, survivor, counsellor, incident date). Negative keyword exclusion for awareness campaigns, training, published statistics, and policy documents.'
pattern: (?i)\b(sexual\s+assault\s+counselling|forensic\s+medical\s+examination|trauma\s+counselling\s+(?:session|record|notes)|victim[\s/]survivor\s+support|SARAS\s+(?:referral|service|case)|sexual\s+violence\s+counselling)\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of sexual assault service terminology with victim/survivor identifiers. Generic awareness or policy content about sexual assault services does not trigger detection.'
jurisdictions:
  - au
regulations:
- "Criminal Code 1899 (Qld)"
- "Evidence Act 1977 (Qld)"
- "IPA 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - health
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Privacy
    - sexual assault counselling
    - SARAS
    - forensic medical examination
    - trauma counselling
    - victim
    - survivor
    - counsellor
    - incident date
    - police report number
    - crisis support
    - safety plan
    - court proceeding
    - confidential communication
    - Queensland Health
    - sexual assault service
    - referral
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - law-enforcement
test_cases:
  should_match:
    - value: 'PROTECTED Privacy. Sexual Assault Counselling Record — Queensland Health SARAS Service. Client: Rebecca Louise MARTIN, DOB 23/05/1994. Case Reference: SARAS-2026-04518. Session 4 of trauma counselling conducted 01/03/2026 by accredited counsellor Sarah Thompson. Client reports continued hypervigilance and sleep disturbance following the sexual assault of 12/01/2026. Forensic medical examination was completed at Royal Brisbane Women''s Hospital on 13/01/2026. Safety plan reviewed and updated. QPS report number: QP-2026-187423.'
      description: Sexual assault counselling session record with client identifiers and SARAS case reference
    - value: 'Queensland Sexual Assault Response and Support — Confidential Communication. Victim/survivor support referral for client Ms Jennifer WONG. Referral from QPS Sexual Crimes Investigation Unit following reported sexual assault. Forensic medical examination completed — forensic kit retained under chain of custody. Initial trauma counselling session scheduled 08/03/2026. Court proceeding anticipated. Counsellor: Dr Amanda Patel, SARAS Cairns.'
      description: SARAS referral document with forensic examination and court proceeding details
    - value: 'Confidential — Sexual Assault Service. Trauma counselling notes for ongoing client. Client presented in acute distress following contact from offender''s legal representative. Crisis support provided. Safety plan activated — emergency accommodation arranged through DV Connect. Counsellor assessment: client requires increased session frequency. Incident date: 14/11/2025. Police report number: QP-2025-342891. Next session: 10/03/2026.'
      description: Trauma counselling notes with crisis intervention and safety planning details
  should_not_match:
    - value: The Queensland Government funds Sexual Assault Response and Support (SARAS) services across the state. SARAS provides free and confidential counselling for anyone who has experienced sexual assault. Services are available 24 hours a day.
      description: Public information about SARAS services with no client details
    - value: Queensland Health released its annual Sexual Assault Services Statistical Report showing 4,200 new referrals in 2025. The report presents de-identified aggregate data on service utilisation, wait times, and client demographics by region.
      description: Published statistical report with aggregate de-identified data
    - value: The university sexual assault prevention training module explains consent, bystander intervention, and support services available to students. Case studies in the training are entirely fictional.
      description: University training module on sexual assault prevention with fictional scenarios
false_positives:
  - description: Public awareness campaigns about sexual assault support services
    mitigation: 'Negative keyword exclusion: ''awareness campaign'', ''support line'', ''public information'', ''community education'', ''help is available''. Require proximity to actual client identifiers or case numbers.'
  - description: Published annual reports and statistics on sexual assault service utilisation
    mitigation: 'Negative keyword exclusion: ''annual report'', ''statistical report'', ''de-identified'', ''aggregate data'', ''service utilisation''. Require co-occurrence with client-specific terms.'
  - description: Training materials for sexual assault counsellors using fictional scenarios
    mitigation: 'Negative keyword exclusion: ''training module'', ''fictional'', ''case study'', ''role play'', ''learning exercise'', ''scenario'''
  - description: News reporting on sexual assault policy and legislative reform
    mitigation: 'Negative keyword exclusion: ''media release'', ''news article'', ''legislative reform'', ''parliamentary inquiry'', ''policy submission'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_sexual_assault_counselling_record_sexual_assault_service_terms
      matches:
        - ref: Evidence_sexual_assault_counselling_record_primary_keywords
        - ref: Evidence_sexual_assault_counselling_record_classification_markers
        - ref: Evidence_sexual_assault_counselling_record_corroborative_terms
        - ref: Pattern_sexual_assault_counselling_record_saras_case_reference
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_sexual_assault_counselling_record_exclusion
    - confidence_level: 75
      id_match: Pattern_sexual_assault_counselling_record_sexual_assault_service_terms
      matches:
        - ref: Evidence_sexual_assault_counselling_record_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_sexual_assault_counselling_record_exclusion
    - confidence_level: 65
      id_match: Pattern_sexual_assault_counselling_record_sexual_assault_service_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_sexual_assault_counselling_record_exclusion
  regexes:
    - id: Pattern_sexual_assault_counselling_record_sexual_assault_service_terms
      pattern: (?i)\b(sexual\s+assault\s+counselling|forensic\s+medical\s+examination|trauma\s+counselling|victim[\s/]survivor\s+support|SARAS|sexual\s+violence\s+counselling|confidential\s+communication)\b
    - id: Pattern_sexual_assault_counselling_record_saras_case_reference
      pattern: \bSARAS-\d{4}-\d{4,5}\b
  keywords:
    - id: Evidence_sexual_assault_counselling_record_primary_keywords
      groups:
        - match_style: word
          terms:
            - sexual assault counselling
            - forensic medical examination
            - trauma counselling
            - victim/survivor support
            - SARAS
            - sexual violence counselling
            - crisis support
            - safety plan
            - confidential communication
            - sexual assault service
    - id: Evidence_sexual_assault_counselling_record_classification_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - Privacy
            - CONFIDENTIAL
            - SENSITIVE
    - id: Evidence_sexual_assault_counselling_record_corroborative_terms
      groups:
        - match_style: word
          terms:
            - counsellor
            - incident date
            - police report number
            - QPS
            - court proceeding
            - forensic kit
            - chain of custody
            - DV Connect
            - referral
            - Queensland Health
            - accredited counsellor
            - session
    - id: Filter_sexual_assault_counselling_record_exclusion
      groups:
        - match_style: word
          terms:
            - awareness campaign
            - support line
            - public information
            - community education
            - annual report
            - statistical report
            - de-identified
            - aggregate data
            - training module
            - fictional
            - case study
            - role play
            - media release
            - news article
            - legislative reform

risk_rating: 10
risk_description: Disclosure reveals sexual assault victim identities, forensic examination details, and trauma counselling records. Re-traumatises survivors, compromises criminal proceedings, and may endanger safety. Subject to absolute privilege under Queensland law. Unauthorised disclosure could cause significant harm to vulnerable individuals, compromise criminal proceedings, or breach statutory obligations under Queensland legislation. Requires PROTECTED handling.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: "PROTECTED Legal"
references: []
created: '2026-03-06'
updated: '2026-03-06'
author: qld-gov-dlp
