schema: testpattern/v1
name: Nuclear safeguards information
slug: global-top500-439-nuclear-safeguards-information
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to nuclear safeguards information in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:nuclear\s+safeguards|fissile\s+material|enrichment\s+facility|nuclear\s+material|safeguards\s+agreement|nuclear\s+security|radioactive\s+source|nuclear\s+facility|uranium\s+enrichment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - nuclear safeguards information
  proximity: 240
test_cases:
  should_match:
    - value: nuclear safeguards
      description: Primary topic phrase match
    - value: fissile material
      description: Case-insensitive topic phrase match
    - value: enrichment facility
      description: Alternative topic phrase match
    - value: nuclear material
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to nuclear safeguards information appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_nuclear_safeguards
      matches:
        - ref: Pattern_global_top500_439_nuclear_safeguards_information_label_context
        - ref: Keyword_global_top500_439_nuclear_safeguards_information_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_nuclear_safeguards
      matches:
        - ref: Keyword_nuclear_safeguards
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_nuclear_safeguards
      matches:
        - ref: Keyword_nuclear_safeguards
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_nuclear_safeguards
      pattern: >-
        (?is)\b(?:nuclear\s+safeguards|fissile\s+material|enrichment\s+facility|nuclear\s+material|safeguards\s+agreement|nuclear\s+security|radioactive\s+source|nuclear\s+facility|uranium\s+enrichment)\b
    - id: Pattern_global_top500_439_nuclear_safeguards_information_label_context
      pattern: (?i)\\b(?:nuclear\\s+safeguards\\s+information|nuclear|safeguards|top500)\\b
  keywords:
    - id: Keyword_nuclear_safeguards
      groups:
        - match_style: word
          terms:
            - nuclear safeguards
            - IAEA
            - fissile material
            - enrichment facility
            - nuclear material
            - safeguards agreement
            - nuclear security
            - radioactive source
            - nuclear facility
            - nonproliferation
            - uranium enrichment
            - plutonium
    - id: Keyword_global_top500_439_nuclear_safeguards_information_domain_context
      groups:
        - match_style: word
          terms:
            - nuclear safeguards information
            - nuclear
            - safeguards
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: Top Secret
  uk_gov: TOP SECRET
  nz_gov: TOP SECRET
  ca_gov: Top Secret
