schema: testpattern/v1
name: Manufacturing deviation records
slug: global-top500-238-manufacturing-deviation-records
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to manufacturing deviation records in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:manufacturing\s+deviation|deviation\s+record|process\s+deviation|production\s+variance|nonconformance\s+report|batch\s+record|lot\s+deviation|manufacturing\s+exception|out\s+of\s+specification|deviation\s+approval)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - intellectual-property
  - business
corroborative_evidence:
  keywords:
    - manufacturing deviation records
    - manufacturing
    - deviation
    - records
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: manufacturing deviation
      description: Primary topic phrase match
    - value: deviation record
      description: Case-insensitive topic phrase match
    - value: process deviation
      description: Alternative topic phrase match
    - value: production variance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to manufacturing deviation records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_manufacturing_deviation
      matches:
        - ref: Pattern_global_top500_238_manufacturing_deviation_records_label_context
        - ref: Keyword_global_top500_238_manufacturing_deviation_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_manufacturing_deviation
      matches:
        - ref: Keyword_manufacturing_deviation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_manufacturing_deviation
      pattern: >-
        (?is)\b(?:manufacturing\s+deviation|deviation\s+record|process\s+deviation|production\s+variance|nonconformance\s+report|batch\s+record|lot\s+deviation|manufacturing\s+exception|out\s+of\s+specification|deviation\s+approval)\b
    - id: Pattern_global_top500_238_manufacturing_deviation_records_label_context
      pattern: (?i)\b(?:manufacturing\s+deviation\s+records)\b
  keywords:
    - id: Keyword_manufacturing_deviation
      groups:
        - match_style: word
          terms:
            - manufacturing deviation
            - deviation record
            - process deviation
            - production variance
            - nonconformance report
            - batch record
            - lot deviation
            - manufacturing exception
            - out of specification
            - deviation approval
      strength: specific
    - id: Keyword_global_top500_238_manufacturing_deviation_records_domain_context
      groups:
        - match_style: word
          terms:
            - manufacturing deviation records
            - manufacturing
            - deviation
      strength: domain
risk_description: >-
  This contextual pattern recognizes manufacturing-deviation, deviation-record, process-deviation, or production-variance language associated with product quality. A genuine deviation record can disclose nonconforming processes, affected lots, approvals, and unresolved controls, enabling supplier pressure, regulatory challenge, counterfeiting intelligence, or targeted exploitation of weak product runs. Although one record is usually bounded to a batch or process, disclosure can create serious legal, commercial, and customer harm where the deviation affects quality claims. Risk 8 and SENSITIVE fit that consequence; PROTECTED would require widespread unsafe output, critical-service dependence, or major irreversible public harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
