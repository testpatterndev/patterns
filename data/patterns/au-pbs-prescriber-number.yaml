schema: testpattern/v1
name: PBS Prescriber Number
slug: au-pbs-prescriber-number
version: 1.4.0
type: regex
pattern_class: identifier
engine: universal
description: Detects PBS Prescriber Number patterns. A 7-digit number whose check digit uses weights [0,5,8,4,2,1], mod 11 (checksum NOT enforced in this regex-only pattern; structural detection only).
operation: >-
  Regex pattern using universal engine. The top-level regex \b\d{7}\b matches any 7-digit number. Checksum: weights [0,5,8,4,2,1], mod 11 (NOT enforced in this regex-only pattern; structural detection only). The Purview engine uses two regexes:
  Pattern_pbs_labeled (labeled format with prescriber/PBS prefix + 7 digits) and Pattern_pbs_prescriber (bare 7-digit format). Three confidence tiers: High (85) requires PBS label +
  healthcare/pharmacy keywords with template exclusion logic; Medium (75) requires PBS label keywords; Low (65) requires PBS label keywords only (minimum context). Evidence uses 2 keyword groups (6
  PBS label terms, 11 healthcare/pharmacy terms) within 300-character proximity. Keyword lists: au-healthcare-identifiers, au-healthcare-medications. Adds label-context matching and exclusion logic
  for sample/template/test placeholders.
pattern: \b\d{7}\b
confidence: low
confidence_justification: >-
  Low confidence: a bare 7-digit number is extremely common and will match phone numbers, postcodes, reference codes, and many other numeric sequences. Corroborative evidence keywords such as PBS,
  prescriber, or pharmaceutical are essential for reliable detection. Context label evidence plus explicit template/example exclusion improves precision for high-risk identifiers.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - prescriber
    - PBS
    - Pharmaceutical Benefits
  proximity: 300
  keyword_lists:
    - au-healthcare-identifiers
    - au-healthcare-medications
test_cases:
  should_match:
    - value: '1234567'
      description: Standard 7-digit prescriber number
    - value: '0000001'
      description: Low-range prescriber number
    - value: '9876543'
      description: High-range prescriber number
  should_not_match:
    - value: '123456'
      description: Only 6 digits instead of 7
    - value: '12345678'
      description: 8 digits instead of 7
    - value: 123456A
      description: Contains a letter instead of all digits
    - value: sample template placeholder number 123456789
      description: Template/sample context should be excluded even when numeric-like values appear
false_positives:
  - description: Common words and phrases related to pbs prescriber number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 8
risk_description: PBS prescriber exposure enables pharmaceutical fraud and prescription manipulation
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pbs_labeled
      matches:
        - ref: Evidence_healthcare_pharmacy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
      exclusion:
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_pbs_prescriber
      matches:
        - ref: Evidence_pbs_label
        - ref: Evidence_healthcare_pharmacy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
    - confidence_level: 65
      id_match: Pattern_pbs_prescriber
      matches:
        - ref: Evidence_pbs_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
  regexes:
    - id: Pattern_pbs_prescriber
      pattern: \b\d{7}\b
    - id: Pattern_pbs_labeled
      pattern: (?i)\b(?:prescriber|PBS|provider\s+no|prescriber\s+(?:number|no|ID))\s*[:#-]?\s*\d{7}\b
  keywords:
    - id: Evidence_pbs_label
      groups:
        - match_style: word
          terms:
            - prescriber
            - text: PBS
              case_sensitive: true
            - provider no
            - prescriber number
            - prescriber ID
            - Pharmaceutical Benefits Scheme
      strength: generic
    - id: Evidence_healthcare_pharmacy
      groups:
        - match_style: word
          terms:
            - text: PBS
              case_sensitive: true
            - Pharmaceutical Benefits
            - prescriber
            - prescription
            - pharmacy
            - dispensing
            - medication
            - drug
            - pharmaceutical
            - Schedule 8
            - controlled substance
      strength: domain
  filters:
    - id: Guard_pbs_prescriber_same_digits
      type: AllDigitsSameFilter
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — primary regex accepted all-zeros/same-digit prescriber values (e.g. 0000000); mirrors au-medicare-card-identifier protection.
  - version: 1.3.0
    date: '2026-07-04'
    description: 'Prune orphaned Pattern_au_pbs_prescriber_number_label_context regex: its only referencing tier was already removed by the bulk collapse and the reference was malformed (empty refs: list) even before that; confirmed dead weight, not restored'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.
