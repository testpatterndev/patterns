schema: testpattern/v1
name: Post-merger integration plans
slug: global-top500-186-post-merger-integration-plans
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to post-merger integration plans in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: corporate-m-and-a. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:post[\s-]+merger\s+integration|PMI\s+plan|integration\s+workstream|day\s+one\s+readiness|transition\s+plan|integration\s+milestone|cultural\s+integration|systems\s+migration|organizational\s+design|integration\s+office|change\s+management)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - post-merger integration plans
    - post
    - merger
    - integration
    - plans
    - mergers
    - acquisitions
    - strategy
  proximity: 300
  keyword_lists:
    - corporate-m-and-a
test_cases:
  should_match:
    - value: post-merger integration
      description: Primary topic phrase match
    - value: pmi plan
      description: Case-insensitive topic phrase match
    - value: integration workstream
      description: Alternative topic phrase match
    - value: day one readiness
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to post-merger integration plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_post_merger_integration
      matches:
        - ref: Pattern_global_top500_186_post_merger_integration_plans_label_context
        - ref: Keyword_global_top500_186_post_merger_integration_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_186_post_merger_integration_plans_noise_exclusion
    - confidence_level: 75
      id_match: Regex_post_merger_integration
      matches:
        - ref: Keyword_post_merger_integration
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_186_post_merger_integration_plans_noise_exclusion
    - confidence_level: 65
      id_match: Regex_post_merger_integration
      matches:
        - ref: Keyword_post_merger_integration
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_186_post_merger_integration_plans_noise_exclusion
  regexes:
    - id: Regex_post_merger_integration
      pattern: (?is)\b(?:post[\s-]+merger\s+integration|PMI\s+plan|integration\s+workstream|day\s+one\s+readiness|transition\s+plan|integration\s+milestone|cultural\s+integration|systems\s+migration|organizational\s+design|integration\s+office|change\s+management)\b
    - id: Pattern_global_top500_186_post_merger_integration_plans_label_context
      pattern: (?i)\\b(?:post\-merger\\s+integration\\s+plans|post|merger|integration|plans|top500)\\b
  keywords:
    - id: Keyword_post_merger_integration
      groups:
        - match_style: word
          terms:
            - post-merger integration
            - PMI plan
            - integration workstream
            - day one readiness
            - transition plan
            - integration milestone
            - cultural integration
            - systems migration
            - organizational design
            - integration office
            - change management
    - id: Keyword_global_top500_186_post_merger_integration_plans_domain_context
      groups:
        - match_style: word
          terms:
            - post-merger integration plans
            - post
            - merger
            - integration
            - plans
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_186_post_merger_integration_plans_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
