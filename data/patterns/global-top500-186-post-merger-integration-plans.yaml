schema: testpattern/v1
name: Post-merger integration plans
slug: global-top500-186-post-merger-integration-plans
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to post-merger integration plans in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: corporate-m-and-a.
pattern: >-
  (?is)\b(?:post[\s-]+merger\s+integration|integration\s+plan|PMI\s+plan|day\s+one\s+readiness|integration\s+workstream|integration\s+timeline|cultural\s+integration|merger\s+integration)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - Privacy Act 1988 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - NIST CSF
  - PCI-DSS
data_categories:
  - business
corroborative_evidence:
  keywords:
    - post-merger integration plans
    - post
    - merger
    - integration
    - plans
    - mergers
    - acquisitions
    - strategy
  proximity: 300
  keyword_lists:
    - corporate-m-and-a
test_cases:
  should_match:
    - value: post-merger integration
      description: Primary topic phrase match
    - value: integration plan
      description: Case-insensitive topic phrase match
    - value: PMI plan
      description: Alternative topic phrase match
    - value: day one readiness
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
    - value: Systems integration transition plan for ERP upgrade
      description: Technology change without M&A context must not match (generic alternatives removed from anchor)
    - value: New employee onboarding integration
      description: Unrelated integration meaning must not match
false_positives:
  - description: Common words and phrases related to post-merger integration plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: corporate-m-and-a
      as: Evidence_m_and_a_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_post_merger_integration
      matches:
        - ref: Evidence_post_merger_integration
          min_count: 2
          unique_results: true
        - ref: Evidence_m_and_a_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_post_merger_integration
      matches:
        - ref: Evidence_post_merger_integration
        - ref: Evidence_m_and_a_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_post_merger_integration
      matches:
        - ref: Evidence_post_merger_integration
  regexes:
    - id: Pattern_post_merger_integration
      pattern: >-
        (?is)\b(?:post[\s-]+merger\s+integration|integration\s+plan|PMI\s+plan|day\s+one\s+readiness|integration\s+workstream|integration\s+timeline|cultural\s+integration|merger\s+integration)\b
  keywords:
    - id: Evidence_post_merger_integration
      groups:
        - match_style: word
          terms:
            - post-merger integration
            - integration plan
            - PMI plan
            - day one readiness
            - integration workstream
            - integration timeline
            - cultural integration
            - systems integration
            - organizational restructure
            - change management
            - transition planning
            - merger integration
            - confidential
risk_description: >-
  The regex looks for post-merger integration, PMI plans, day-one readiness, workstreams, and integration language, with the normal match often being a general planning record rather than the confidential transaction package itself. Disclosure may reveal sequencing, owners, or organisational intentions, but low-level plans generally need a live unannounced deal, named systems, workforce actions, and operational dependencies before they create material harm. Templates, consulting guidance, and retrospective integration documents are common medium-confidence matches. Risk 4 and OFFICIAL fit routine or generic administration; SENSITIVE is not met without current deal secrecy, detailed system cutovers, named workforce impacts, or consequential operational vulnerabilities.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
