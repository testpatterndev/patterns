updated: '2026-07-17'
changelog:
- version: 1.4.0
  date: '2026-07-17'
  description: 'Reduced-scope harden (TP-00430): SLA contract/definition vocabulary no longer enforces (an unbreached service-level-agreement
    sentence previously reached 85 via same-span evidence). Enforcement now anchors on Evidence_sla_breach_measure (target/committed
    value, then actual/achieved value within 160 characters, then breach/missed/below/ exceeded/service-credit wording within
    120 characters): 75 with template exclusion, 85 with two additional unique SLA-domain evidence terms. The topic branch
    is demoted to 65 discovery_only; per the independent correction the fire-drill "response time" case is expected as a discovery
    hit, not no_match. Added breach-analysis positive and commitment-only/fire-drill discovery cases.'
- version: 1.3.1
  date: '2026-07-14'
  description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 905 without changing
    detector or package metadata.'
- version: 1.3.0
  date: '2026-07-09'
  description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are
    scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived
    by scripts/derive-pattern-class.mjs + spot review'
- version: 1.2.0
  date: '2026-03-14'
  description: Standardise to 3-tier 65/75/85 gating with progressive evidence
- version: 1.1.0
  date: '2026-03-06'
