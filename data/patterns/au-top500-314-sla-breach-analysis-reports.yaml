schema: testpattern/v1
name: SLA breach analysis reports
slug: au-top500-314-sla-breach-analysis-reports
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies sla breach analysis reports patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:SLA\s+breach|service\s+level\s+agreement|SLA\s+violation|uptime\s+target|response\s+time|resolution\s+time|penalty\s+clause|service\s+credit|SLA\s+report|availability\s+target|performance\s+metric|breach\s+analysis)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - sla breach analysis reports
    - sla
    - breach
    - analysis
    - reports
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: SLA breach
      description: Primary topic phrase match
    - value: service level agreement
      description: Case-insensitive topic phrase match
    - value: SLA violation
      description: Alternative topic phrase match
    - value: uptime target
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_sla_breach
      matches:
        - ref: Evidence_sla_breach
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_sla_breach
      matches:
        - ref: Evidence_sla_breach
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_sla_breach
      matches:
        - ref: Evidence_sla_breach
  regexes:
    - id: Pattern_sla_breach
      pattern: (?is)\b(?:SLA\s+breach|service\s+level\s+agreement|SLA\s+violation|uptime\s+target|response\s+time|resolution\s+time|penalty\s+clause|service\s+credit|SLA\s+report|availability\s+target|performance\s+metric|breach\s+analysis)\b
  keywords:
    - id: Evidence_sla_breach
      groups:
        - match_style: word
          terms:
            - SLA breach
            - service level agreement
            - SLA violation
            - uptime target
            - response time
            - resolution time
            - penalty clause
            - service credit
            - SLA report
            - availability target
            - performance metric
            - breach analysis
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
