schema: testpattern/v1
name: SLA breach analysis reports
slug: au-top500-314-sla-breach-analysis-reports
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: 'Identifies analytical reports of missed service commitments: enforcement requires a target-versus-actual comparison
  ending in breach/missed/below/exceeded/service-credit language, while SLA contract clauses, definitions, and performance-metric
  vocabulary remain discovery-only.'
operation: 'Pattern type: regex (boost_regex engine). SLA topic phrases (SLA breach, service level agreement, uptime target,
  response time) feed a 65 discovery-only tier; enforcement requires Evidence_sla_breach_measure — a target/committed value
  within 160 characters of an actual/achieved value followed within 120 characters by breach/missed/below/exceeded/ service-credit
  wording — at 75, with additional SLA-domain evidence raising it to 85. The shared template exclusion vetoes sample text
  at enforcement tiers.'
pattern: (?is)\b(?:SLA\s+breach|service\s+level\s+agreement|SLA\s+violation|uptime\s+target|response\s+time|resolution\s+time|penalty\s+clause|service\s+credit|SLA\s+report|availability\s+target|performance\s+metric|breach\s+analysis)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
- au
regulations:
- NDB Scheme (Cth)
- SOCI Act 2018 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - sla breach analysis reports
  - sla
  - breach
  - analysis
  - reports
  - operations
  - resilience
  proximity: 300
test_cases:
  should_match:
  - value: SLA breach
    description: Primary topic phrase match
  - value: service level agreement
    description: Case-insensitive topic phrase match
  - value: SLA violation
    description: Alternative topic phrase match
  - value: uptime target
    description: Additional topic phrase match
  - value: SLA breach period=July target=99.95% actual=98.72% service credit=$4200 root cause=carrier outage remediation=dual
      link
    description: Target-versus-actual failure with credit, cause, and remediation reaches the enforcing tiers
  - value: SLA availability target=99.95%
    description: A commitment without a measured outcome matches the topic branch only (discovery)
  - value: Response time in the fire drill was 30 seconds
    description: Generic "response time" keeps a discovery-level topic hit only (relabeled from the first-pass no-match expectation)
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: backup outage
    description: Generic word pair from old broad template should not match
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_sla_breach
    matches:
    - ref: Evidence_sla_breach
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
    min_count: 2
  - confidence_level: 75
    id_match: Pattern_sla_breach
    matches:
    - ref: Evidence_sla_breach
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Pattern_sla_breach
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  regexes:
  - id: Pattern_sla_breach
    pattern: (?is)\b(?:SLA\s+breach|service\s+level\s+agreement|SLA\s+violation|uptime\s+target|response\s+time|resolution\s+time|penalty\s+clause|service\s+credit|SLA\s+report|availability\s+target|performance\s+metric|breach\s+analysis)\b
  - id: Evidence_sla_breach_measure
    pattern: (?is)\b(?:target|committed)\s*[:=]\s*\S+[\s\S]{0,160}\b(?:actual|achieved)\s*[:=]\s*\S+[\s\S]{0,120}\b(?:breach|missed|below|exceeded|service\s+credit)\b
  keywords:
  - id: Evidence_sla_breach
    groups:
    - match_style: word
      terms:
      - SLA breach
      - service level agreement
      - SLA violation
      - uptime target
      - response time
      - resolution time
      - penalty clause
      - service credit
      - SLA report
      - availability target
      - performance metric
      - breach analysis
risk_description: The classifier identifies a composite SLA breach analysis through service-level, violation, uptime-target,
  response-time, resolution-time, penalty, service-credit, availability, performance-metric, and breach-analysis language.
  A genuine report can expose service weaknesses, outage causes, contractual exposure, vendor performance, and negotiation
  positions that a counterparty, competitor, or attacker could exploit. The affected scale is normally one service relationship
  and its provider and customer, with direct technical harm requiring additional access or attack capability. Risk 8 and SENSITIVE
  reflect serious contained commercial and operational harm, while a report exposing exploitable failure modes in a critical
  service would raise the classification.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
