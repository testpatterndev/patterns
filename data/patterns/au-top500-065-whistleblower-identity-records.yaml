schema: testpattern/v1
name: Whistleblower identity records
slug: au-top500-065-whistleblower-identity-records
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to whistleblower identity records in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:whistleblower\s+identity|protected\s+disclosure|public\s+interest\s+disclosure|whistleblower\s+protection|discloser\s+identity|confidential\s+disclosure|qualifying\s+disclosure|whistleblower\s+report|PID\s+Act|eligible\s+whistleblower|reportable\s+conduct)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - whistleblower identity records
    - whistleblower
    - identity
    - records
    - employment
    - workforce
  proximity: 300
test_cases:
  should_match:
    - value: whistleblower identity
      description: Primary topic phrase match
    - value: protected disclosure
      description: Case-insensitive topic phrase match
    - value: public interest disclosure
      description: Alternative topic phrase match
    - value: whistleblower protection
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to whistleblower identity records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_whistleblower_identity
      matches:
        - ref: Evidence_whistleblower_identity
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_065_whistleblower_identity_records_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_whistleblower_identity
      matches:
        - ref: Evidence_whistleblower_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_065_whistleblower_identity_records_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_whistleblower_identity
      matches:
        - ref: Evidence_whistleblower_identity
  regexes:
    - id: Pattern_whistleblower_identity
      pattern: (?is)\b(?:whistleblower\s+identity|protected\s+disclosure|public\s+interest\s+disclosure|whistleblower\s+protection|discloser\s+identity|confidential\s+disclosure|qualifying\s+disclosure|whistleblower\s+report|PID\s+Act|eligible\s+whistleblower|reportable\s+conduct)\b
    - id: Pattern_au_top500_065_whistleblower_identity_records_label_context
      pattern: (?i)\\b(?:whistleblower\\s+identity\\s+records|whistleblower|identity|top500)\\b
  keywords:
    - id: Evidence_whistleblower_identity
      groups:
        - match_style: word
          terms:
            - whistleblower
            - whistleblower identity
            - protected disclosure
            - public interest disclosure
            - whistleblower protection
            - discloser identity
            - confidential disclosure
            - qualifying disclosure
            - whistleblower report
            - PID Act
            - eligible whistleblower
            - reportable conduct
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_065_whistleblower_identity_records_domain_context
      groups:
        - match_style: word
          terms:
            - whistleblower identity records
            - whistleblower
            - identity
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_065_whistleblower_identity_records_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
