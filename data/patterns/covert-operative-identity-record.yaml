schema: testpattern/v1
name: Covert Operative Identity Record
slug: covert-operative-identity-record
version: 1.2.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects documents containing the true identities of undercover law enforcement officers deployed within criminal organisations. These records link assumed identities (legends) to real identities and are among the most life-critical records in law enforcement. Disclosure directly endangers the lives of deployed operatives and destroys years of infiltration work.
operation: 'Keyword proximity: primary keywords (covert operative, undercover officer, assumed identity, legend identity, cover identity) within 300 characters of corroborative keywords (PROTECTED, Law-Enforcement, QPS, operative deployment, personnel number). Document marker detection for QPS classification headers. Negative keyword exclusion for media, fiction, and training contexts.'
pattern: (?i)\b(covert\s+operative|undercover\s+officer|assumed\s+identity|legend\s+identity|cover\s+identity|operative\s+deployment|undercover\s+deployment)\b
confidence: medium
confidence_justification: 'Medium confidence: requires co-occurrence of multiple law enforcement identity management terms within proximity of classification markers and personnel identifiers. Single keyword matches are insufficient; the pattern requires document-level context indicating an actual operational record rather than a policy discussion or news article.'
jurisdictions:
  - au
regulations:
- "PPRA 2000 (Qld)"
- "Police Service Admin Act 1990 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - COVERT
    - RESTRICTED
    - QPS
    - Queensland Police
    - operative deployment
    - personnel number
    - assumed name
    - cover story
    - legend documentation
    - identity management
    - handler
    - controller
    - deployment briefing
    - true identity
    - real name
    - birth name
    - service number
  proximity: 300
  keyword_lists:

    - law-enforcement

    - government-services
    - en-government-classification
test_cases:
  should_match:
    - value: 'PROTECTED Law-Enforcement. QPS Covert Operations Unit. Covert Operative Identity Record. Operative callsign SPARROW. True identity: Constable James Robert THORNTON, Reg No. 14823. Assumed identity: Michael David CROSS. Legend identity documentation issued 14 March 2024 under PPRA Part 6.'
      description: QPS covert operative record linking true identity to assumed identity with classification markings
    - value: 'RESTRICTED — COVERT. Undercover officer deployment briefing. Officer is deployed under cover identity within the target OMCG chapter. Operative deployment commenced 22 January 2025. Handler: Detective Sergeant K. WILLIAMS. Legend identity documents include Queensland drivers licence and Medicare card in assumed name.'
      description: Undercover deployment briefing with handler details and legend documentation references
    - value: This document contains the assumed identity particulars for operatives assigned to Operation CATHEDRAL. Cover identity maintenance schedule and renewal dates for legend documentation. True identity cross-reference held separately under PROTECTED classification.
      description: Operational document referencing assumed identity management for a named operation
  should_not_match:
    - value: The television series Underbelly depicted undercover officers infiltrating criminal gangs in Melbourne during the 1990s. The show dramatised the risks faced by covert operatives in organised crime investigations.
      description: Television show description discussing undercover officers in fictional context
    - value: 'Annual Report 2024-25: Queensland Police Service. The Covert Operations Unit conducted 47 undercover deployments during the reporting period. No operative identities were compromised. Training exercises included 12 simulated cover identity scenarios.'
      description: Published QPS annual report with aggregate statistics, no actual identities
    - value: Professor Smith's criminology paper examines the psychological impact on undercover officers who maintain assumed identities for extended periods. The study analysed published accounts from retired operatives across five jurisdictions.
      description: Academic criminology paper discussing undercover work using published sources
false_positives:
  - description: Crime fiction novels and television scripts depicting undercover police work
    mitigation: 'Negative keyword exclusion: ''novel'', ''fiction'', ''screenplay'', ''television'', ''movie'', ''episode'', ''character'', ''actor'', ''portrayed'''
  - description: News articles reporting on undercover operations after they have concluded
    mitigation: 'Negative keyword exclusion: ''media release'', ''news article'', ''reported'', ''published'', ''convicted'', ''sentenced'', ''trial concluded'''
  - description: Police training materials and policy documents discussing undercover methodology in general terms
    mitigation: 'Negative keyword exclusion: ''training exercise'', ''training scenario'', ''policy document'', ''standard operating procedure'', ''template'', ''annual report'''
  - description: Academic criminology papers studying undercover policing
    mitigation: 'Negative keyword exclusion: ''academic'', ''university'', ''journal'', ''study'', ''research'', ''professor'', ''published accounts'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_covert_operative_identity_record_covert_operative_terms
      matches:
        - ref: Evidence_covert_operative_identity_record_primary_keywords
        - ref: Evidence_covert_operative_identity_record_classification_markers
        - ref: Evidence_covert_operative_identity_record_corroborative_terms
        - ref: Pattern_covert_operative_identity_record_qps_personnel_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_covert_operative_identity_record_exclusion
    - confidence_level: 75
      id_match: Pattern_covert_operative_identity_record_covert_operative_terms
      matches:
        - ref: Evidence_covert_operative_identity_record_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_covert_operative_identity_record_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_covert_operative_identity_record_covert_operative_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_covert_operative_identity_record_exclusion
  regexes:
    - id: Pattern_covert_operative_identity_record_covert_operative_terms
      pattern: (?i)\b(covert\s+operative|undercover\s+officer|assumed\s+identity|legend\s+identity|cover\s+identity|operative\s+deployment|undercover\s+deployment)\b
    - id: Pattern_covert_operative_identity_record_qps_personnel_number
      pattern: \b(Reg\.?\s*No\.?|Registration\s+Number|Service\s+Number)\s*:?\s*\d{4,6}\b
  keywords:
    - id: Evidence_covert_operative_identity_record_primary_keywords
      groups:
        - match_style: word
          terms:
            - covert operative
            - undercover officer
            - assumed identity
            - legend identity
            - cover identity
            - operative deployment
            - undercover deployment
            - cover story
            - legend documentation
            - identity management
            - assumed name
            - true identity
      strength: specific
    - id: Evidence_covert_operative_identity_record_classification_markers
      groups:
        - match_style: word
          terms:
            - COVERT
      strength: domain
    - id: Evidence_covert_operative_identity_record_corroborative_terms
      groups:
        - match_style: word
          terms:
            - text: QPS
              case_sensitive: true
            - Queensland Police
            - handler
            - controller
            - deployment briefing
            - personnel number
            - service number
            - registration number
            - PPRA
            - Police Powers
      strength: specific
    - id: Filter_covert_operative_identity_record_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - annual report
            - template
            - training exercise
            - fictional
            - movie
            - television
            - news article
            - novel
            - screenplay
            - academic
            - university
            - journal
            - convicted
            - sentenced
            - published finding
            - academic paper

      strength: noise
risk_rating: 10
risk_description: >-
  The detector identifies records linking an undercover officer's true identity to an assumed or legend identity, deployment, handler, or covert-operation details. Disclosure can let a criminal organisation identify the operative, retaliate against the officer or family, dismantle an infiltration, and expose associated personnel and methods. The normal true positive is an identity-linking operational record, not a general policy or fictional discussion, because media, training, and entertainment contexts are excluded. Risk 10 and PROTECTED Law-Enforcement are required for immediate life-safety and operational consequences; PROTECTED is already the highest accepted classification tier.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Law-Enforcement
references: []
