schema: testpattern/v1
name: Lab Test Terms
slug: global-lab-test-terms
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Lab Test Terms patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that identifies health and medical terminology in documents.
  Keyword matching is used to flag content containing medical language.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  health and medical terminology to identify protected health information.
keywords:
  - urinalysis
  - biopsy
  - culture
  - sensitivity test
  - blood gas
  - electrolyte panel
  - lipid panel
  - metabolic panel
  - coagulation
  - immunoassay
  - cytology
  - histology
  - serology
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on medical terms requires additional context for
  accurate detection. Medical terminology may appear in educational, research, or general
  health content without constituting protected health information.
jurisdictions:
  - global
regulations:
- GDPR
- HIPAA
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - phi
  - health
test_cases:
  should_match:
    - value: "patient diagnosed with urinalysis"
      description: Contains medical keyword 'urinalysis'
    - value: "treatment plan includes biopsy"
      description: Contains medical keyword 'biopsy'
    - value: "clinical notes reference culture"
      description: Contains medical keyword 'culture'
  should_not_match:
    - value: "quarterly revenue report for fiscal year 2024"
      description: Financial text with no medical terminology
    - value: "the project deadline has been moved to next Friday"
      description: Business scheduling text with no health terms
false_positives:
  - description: Educational or research materials discussing medical topics without containing actual patient data
    mitigation: >-
      Layer with PII detection to confirm medical terms appear alongside patient identifiers.
  - description: News articles or general health information websites mentioning medical conditions
    mitigation: >-
      Use document classification to distinguish clinical records from public health content.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_lab_test
      matches:
        - ref: Keyword_lab_test_context
  keywords:
    - id: Keyword_lab_test
      groups:
        - match_style: word
          terms:
            - urinalysis
            - biopsy
            - culture
            - sensitivity test
            - blood gas
            - electrolyte panel
            - lipid panel
            - metabolic panel
            - coagulation
            - immunoassay
            - cytology
            - histology
            - serology
      strength: domain
    - id: Keyword_lab_test_context
      groups:
        - match_style: word
          terms:
            - lab results
            - test results
            - laboratory
            - specimen
            - sample
            - reference range
            - normal range
            - patient
            - medical record
            - pathology
            - physician order
            - diagnostic
      strength: noise
risk_rating: 4
risk_description: >-
  This low-confidence keyword list flags laboratory-test vocabulary such as urinalysis, biopsy, and culture in patient-style language; it does not require a measured value, interpretation, specimen identifier, or named patient. The terms can indicate that nearby content concerns testing, but the words alone cannot reveal whether a result was positive, abnormal, or connected to anyone. The normal match is a medical topic signal with substantial educational, research, guideline, and public-health use. Risk 4 and OFFICIAL reflect low correlation value, while a result tied to a person, specimen, or clinical decision would reach SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-lab-test-terms
    title: "Lab Test Terms entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1249 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it). Reclassified UNSAFE-REMOVE on review: the only tier positively requires Keyword_lab_test_context, whose terms include the dictionary term ''sample'' (a strength: noise group referenced as positive tier evidence — see the miswired-NOT-gate follow-up)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.; Collapsed 2 duplicate 65-confidence tier(s) into the strictest canonical tier.
