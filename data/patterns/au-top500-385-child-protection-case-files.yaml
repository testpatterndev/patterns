schema: testpattern/v1
name: Child protection case files
slug: au-top500-385-child-protection-case-files
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to child protection case files in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:child\s+protection\s+case\s+files|child\s+protection|child\s+safety|mandatory\s+reporting|risk\s+of\s+harm|care\s+order|family\s+services|out[\s-]+of[\s-]+home\s+care|parental\s+responsibility)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - privacy-act-1988
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - child protection case files
    - child
    - protection
    - case
    - files
    - government
    - citizen
    - services
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: child protection case files
      description: Primary topic phrase match
    - value: child protection
      description: Case-insensitive topic phrase match
    - value: child safety
      description: Alternative topic phrase match
    - value: mandatory reporting
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to child protection case files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 90
      id_match: Pattern_child_protection_case
      matches:
        - ref: Pattern_au_top500_385_child_protection_case_files_label_context
        - ref: Keyword_au_top500_385_child_protection_case_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_385_child_protection_case_files_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_child_protection_case
      matches:
        - ref: Evidence_child_protection_case
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_385_child_protection_case_files_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_child_protection_case
      matches:
        - ref: Evidence_child_protection_case
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_385_child_protection_case_files_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_child_protection_case
      matches:
        - ref: Evidence_child_protection_case
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_385_child_protection_case_files_noise_exclusion
  regexes:
    - id: Pattern_child_protection_case
      pattern: (?is)\b(?:child\s+protection\s+case\s+files|child\s+protection|child\s+safety|mandatory\s+reporting|risk\s+of\s+harm|care\s+order|family\s+services|out[\s-]+of[\s-]+home\s+care|parental\s+responsibility)\b
    - id: Pattern_au_top500_385_child_protection_case_files_label_context
      pattern: (?i)\\b(?:child\\s+protection\\s+case\\s+files|child|protection|case|files|top500)\\b
  keywords:
    - id: Evidence_child_protection_case
      groups:
        - match_style: word
          terms:
            - child protection case files
            - child protection
            - child safety
            - mandatory reporting
            - risk of harm
            - care order
            - caseworker
            - family services
            - welfare
            - out-of-home care
            - parental responsibility
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_385_child_protection_case_files_domain_context
      groups:
