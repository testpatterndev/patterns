schema: testpattern/v1
name: EC Private Key Header
slug: global-ec-private
version: 1.4.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects SEC1 elliptic-curve private-key armor. The BEGIN marker is
  discovery-only, a SEC1-like Base64 body supports medium confidence, and a
  complete container with curve or signing context reaches high confidence.
operation: >-
  Regex_ec_private matches the EC PRIVATE KEY header. The 75 tier requires a
  SEC1-style body whose DER armor begins with an MH...CAQEE sequence. The 85 tier
  additionally requires the matching footer and EC-specific curve/signing context
  such as ECDSA, prime256v1, secp256r1, or EC PARAMETERS. Header-only candidates
  remain discovery-only at 65.
pattern: '-----BEGIN EC PRIVATE KEY-----'
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private key
    - secret key
    - key file
    - PEM
    - certificate
    - RSA
    - cryptographic
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '-----BEGIN EC PRIVATE KEY-----'
      description: Low-tier probe - EC armor header without SEC1 body
    - value: |-
        -----BEGIN EC PRIVATE KEY-----
        MHcCAQEEIF6Yx7K2mN9pQ4sT8vW3yZ6aB1cD5eF7gH8jK2mN
      description: Medium-tier probe - SEC1-like EC body without closing armor
    - value: |-
        ECDSA signing key curve secp256r1
        -----BEGIN EC PRIVATE KEY-----
        MHcCAQEEIF6Yx7K2mN9pQ4sT8vW3yZ6aB1cD5eF7gH8jK2mN
        -----END EC PRIVATE KEY-----
      description: High-tier probe - complete SEC1 container with curve context
  should_not_match:
    - value: '-----BEGIN PUBLIC KEY-----'
      description: Public key, not private
    - value: '-----BEGIN CERTIFICATE-----'
      description: Certificate, not private key
    - value: |-
        -----BEGIN EC PRIVATE KEY-----
        MIIE-not-sec1
      description: Malformed body lacks a SEC1 EC private-key prefix
    - value: |-
        -----BEGIN EC PRIVATE KEY-----
        PLACEHOLDER
        -----END EC PRIVATE KEY-----
      description: Placeholder body must not enforce
    - value: |-
        Documentation example: ECDSA signing key curve secp256r1
        -----BEGIN EC PRIVATE KEY-----
        MHcCAQEEIF6Yx7K2mN9pQ4sT8vW3yZ6aB1cD5eF7gH8jK2mN
        -----END EC PRIVATE KEY-----
      description: Documentation quoting a complete EC key must not enforce
    - value: '-----BEGIN RSA PRIVATE KEY-----'
      description: Sibling PKCS#1 RSA private-key armor is not SEC1 EC
false_positives:
  - description: PEM-encoded certificates or public keys that use similar header formats
    mitigation: The pattern specifically matches the private key header text, but verify the full PEM block contains actual key material.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_description: >-
  The detector identifies the exact PEM header for an elliptic-curve private key, which is a marker that normally precedes key material rather than the cryptographic body itself. In a genuine key file, disclosure of the following private bytes can enable signing, impersonation, or decryption for the certificate or system bound to that key. The affected scale is one key pair and its relying service or identity, while header-only documentation, examples, and encrypted key bodies need separate validation. Risk 8 SENSITIVE is appropriate for the strong indication of a private key exposure; PROTECTED requires proof that the adjacent key is usable and controls critical, broad, or protected operations.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ec_private
      matches:
        - ref: Evidence_ec_sec1_body
        - ref: Evidence_ec_footer
        - ref: Evidence_ec_curve_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ec_private
      matches:
        - ref: Evidence_ec_sec1_body
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ec_private
  regexes:
    - id: Regex_ec_private
      pattern: '-----BEGIN EC PRIVATE KEY-----'
    - id: Evidence_ec_sec1_body
      pattern: '(?:\r?\n)MH[A-Za-z0-9+/]{0,12}CAQEE[A-Za-z0-9+/=]{20,256}'
    - id: Evidence_ec_footer
      pattern: '-----END EC PRIVATE KEY-----'
    - id: Evidence_ec_curve_context
      pattern: '(?i)\b(?:ECDSA|prime256v1|secp256r1|secp384r1|secp521r1|EC\s+PARAMETERS|elliptic\s+curve)\b'
created: '2026-02-08'
updated: '2026-07-19'
