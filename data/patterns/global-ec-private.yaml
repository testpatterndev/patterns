schema: testpattern/v1
name: EC Private Key Header
slug: global-ec-private
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: Detects EC private key PEM headers in source code, configuration files, and documents. Private keys should never appear in plaintext.
operation: >-
  Reference: https://www.rfc-editor.org/rfc/rfc7468 Corroborative evidence: 7 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion
  logic for template/sample/test text.
pattern: '-----BEGIN EC PRIVATE KEY-----'
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private key
    - secret key
    - key file
    - PEM
    - certificate
    - RSA
    - cryptographic
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '-----BEGIN EC PRIVATE KEY-----'
      description: EC private key PEM header
    - value: |-
        -----BEGIN EC PRIVATE KEY-----
        MIIE...
      description: EC key with data following header
    - value: |-
        -----BEGIN EC PRIVATE KEY-----
        Proc-Type:
      description: Encrypted EC private key header
  should_not_match:
    - value: '-----BEGIN PUBLIC KEY-----'
      description: Public key, not private
    - value: '-----BEGIN CERTIFICATE-----'
      description: Certificate, not private key
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: PEM-encoded certificates or public keys that use similar header formats
    mitigation: The pattern specifically matches the private key header text, but verify the full PEM block contains actual key material.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ec_private
      matches:
        - ref: Pattern_global_ec_private_label_context
        - ref: Keyword_global_ec_private_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_ec_private
      matches:
        - ref: Keyword_ec_private
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ec_private
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ec_private
      pattern: '-----BEGIN EC PRIVATE KEY-----'
    - id: Pattern_global_ec_private_label_context
      pattern: (?i)\b(?:ec\s+private\s+key\s+header|private|key|header)\b
  keywords:
    - id: Keyword_ec_private
      groups:
        - match_style: word
          terms:
            - private key
            - secret key
            - key file
            - text: PEM
              case_sensitive: true
            - certificate
            - elliptic curve
            - ECDSA
            - EC key
            - cryptographic
            - key pair
            - signing key
      strength: specific
    - id: Keyword_global_ec_private_domain_context
      groups:
        - match_style: word
          terms:
            - ec private key header
            - private
            - key
            - header
      strength: domain
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
