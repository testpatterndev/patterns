schema: testpattern/v1
name: Firefox Encrypted Login Entry
slug: snaffler-firefox-logins
version: 1.2.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Firefox logins.json encrypted password entries in the JSON format used
  by Firefox's NSS (Network Security Services) credential store. Mirrors Snaffler
  rule KeepFFRegexRed.
operation: >-
  The 65 tier inventories one encryptedPassword field. The 75 tier requires a
  paired encryptedUsername field from the same JSON fragment. The 85 tier also
  requires origin metadata (hostname/formSubmitURL/httpRealm) and entry metadata
  (guid/timeCreated/timeLastUsed), demonstrating a Firefox logins.json object.
  Enforcing tiers reject template and placeholder ciphertext.
risk_description: >-
  Firefox Encrypted Login Entry detects an encryptedPassword field in the JSON structure used by Firefox logins storage. The ciphertext is not immediately usable as a password, but an attacker who also obtains the associated Firefox profile keys can decrypt it or attempt offline recovery, exposing the user's saved accounts. Impact is serious yet normally limited to credentials in the affected profile and depends on companion key material. Risk 8 and SENSITIVE InfoTech are justified; PROTECTED would require decrypted privileged credentials, fleet-scale profile compromise, or access producing significant organizational damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: '"encryptedPassword"\s*:\s*"[A-Za-z0-9+/=]{16,}"'
confidence: high
confidence_justification: >-
  High confidence: the encryptedPassword JSON key combined with the base64 value
  constraint is highly specific to Firefox logins.json. The field name is not
  used in other common credential formats.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - encryptedUsername
    - formSubmitURL
    - guid
    - timeCreated
  proximity: 300
test_cases:
  should_match:
    - value: '"encryptedPassword":"AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="'
      description: Low-tier probe - encrypted password field without paired login data
    - value: '{"encryptedUsername":"MDIEEPgAAA==","encryptedPassword":"MFoECNQ3Mk7Yo7yEECabcdefghijklmnop"}'
      description: Medium-tier probe - paired NSS-encrypted username and password
    - value: '{"hostname":"https://portal.example.org","formSubmitURL":"https://portal.example.org/login","encryptedUsername":"MDIEEPgAAA==","encryptedPassword":"MFoECNQ3Mk7Yo7yEECabcdefghijklmnop","guid":"{7b2e}","timeCreated":1710000000000}'
      description: High-tier probe - complete Firefox login entry with origin and metadata
    - value: '{"encryptedUsername":"MDoEEPgAAAAAAAAAAAA=","encryptedPassword":"MDoEEPgAAAAAAAAAAAAAAAAAAAEwFDAN"}'
      description: Medium-tier probe - paired NSS ciphertext fields
  should_not_match:
    - value: '"encryptedPassword":""'
      description: Empty value, under 16 chars
    - value: '"password":"hunter2"'
      description: Plaintext field name, not encryptedPassword
    - value: '"encryptedPassword":"not base64 ciphertext!"'
      description: Malformed ciphertext contains non-Base64 characters
    - value: '{"hostname":"https://portal.example.org","encryptedUsername":"PLACEHOLDER","encryptedPassword":"REDACTED_REDACTED","guid":"{abc}","timeCreated":1}'
      description: Placeholder Firefox entry must not enforce
    - value: 'Documentation example: {"hostname":"https://portal.example.org","encryptedUsername":"MDIEEPgAAA==","encryptedPassword":"MFoECNQ3Mk7Yo7yEECabcdefghijklmnop","guid":"{abc}","timeCreated":1}'
      description: Documentation quoting a complete login entry must not enforce
    - value: '{"origin_url":"https://portal.example.org","username_value":"admin","password_value":"encrypted"}'
      description: Sibling Chromium login-data field names are not Firefox logins.json
false_positives:
  - description: Security research or malware analysis reports that quote Firefox logins.json content as examples without actual stolen credentials.
    mitigation: Require proximity to additional logins.json fields (encryptedUsername, formSubmitURL, guid) to confirm file context.
  - description: Backup or archive files containing encrypted Firefox profiles that are legitimately owned by the user.
    mitigation: Scope detection to unexpected locations such as email attachments, cloud storage, or code repositories rather than standard browser profile paths.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_snaffler_firefox_logins
      matches:
        - ref: Evidence_firefox_encrypted_username
        - ref: Evidence_firefox_origin
        - ref: Evidence_firefox_entry_metadata
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_firefox_placeholder
    - confidence_level: 75
      id_match: Regex_snaffler_firefox_logins
      matches:
        - ref: Evidence_firefox_encrypted_username
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_firefox_placeholder
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_firefox_logins
  regexes:
    - id: Regex_snaffler_firefox_logins
      pattern: '"encryptedPassword"\s*:\s*"[A-Za-z0-9+/=]{16,}"'
    - id: Evidence_firefox_encrypted_username
      pattern: '"encryptedUsername"\s*:\s*"[A-Za-z0-9+/=]{8,}"'
    - id: Evidence_firefox_origin
      pattern: '"(?:hostname|formSubmitURL|httpRealm)"\s*:\s*"[^"\r\n]{4,}"'
    - id: Evidence_firefox_entry_metadata
      pattern: '"(?:guid|timeCreated|timeLastUsed|timePasswordChanged)"\s*:'
  keywords:
    - id: Evidence_firefox_placeholder
      groups:
        - match_style: string
          terms:
            - PLACEHOLDER
            - REDACTED
            - CHANGEME
            - AAAAAAAAAAAAAAAA
created: '2026-06-26'
updated: '2026-07-19'
changelog:
  - version: 1.2.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: separate encryptedPassword discovery, paired NSS credentials, and full Firefox origin/entry metadata; add exact-tier and malformed, placeholder, documentation, and Chromium-sibling negatives.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2048 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.0.1
    date: '2026-06-26'
    note: >-
      Broadened encryptedPassword regex to allow optional whitespace around JSON
      colon. Snaffler fidelity fix.
