schema: testpattern/v1
name: Critical Infrastructure Design
slug: au-critical-infrastructure-design
version: 1.3.0
type: keyword_list
description: >-
  Detects critical infrastructure design documents including network topology, VLAN configurations, and industrial
  control system architectures.
operation: >-
  Keyword-based detection matching network topology, VLAN configuration, critical infrastructure, and essential service
  patterns. Corroborative evidence: 13 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "Criminal Code Act 1995 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
data_categories:
  - infrastructure
  - security
test_cases:
  should_match:
    - value: Critical infrastructure network topology diagram with VLAN configuration
      description: Test match 1
    - value: Power generation essential service network architecture and data flow
      description: Test match 2
    - value: Water treatment SCADA network diagram with DMZ segmentation
      description: Test match 3
  should_not_match:
    - value: Infrastructure spending on roads
      description: Non-match 1
    - value: The network connection was slow
      description: Non-match 2
false_positives:
  - description: Generic infrastructure or network references in non-critical contexts.
    mitigation: Require OT/ICS or essential service keywords alongside network terms.
exports:
  - yaml
scope: narrow
risk_rating: 10
risk_description: OT network topology exposure enables targeted attacks on industrial networks.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: "PROTECTED InfoTech"
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_network_topology
      matches:
        - ref: Keyword_critical_infrastructure
        - ref: Keyword_network_design
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_vlan_config
      matches:
        - ref: Keyword_network_design
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ip_range_internal
      matches:
        - ref: Keyword_network_architecture
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_network_topology
      pattern: (?i)\b(?:network\s+(?:topology|architecture|diagram)|data\s+flow\s+diagram)\b
    - id: Regex_vlan_config
      pattern: (?i)\b(?:vlan\s+(?:id|configuration|tag)|network\s+segment(?:ation)?|dmz|air[\s\-]?gap)\b
    - id: Regex_ip_range_internal
      pattern: (?i)\b(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3})\b
  keywords:
    - id: Keyword_critical_infrastructure
      groups:
        - match_style: word
          terms:
            - critical infrastructure
            - essential service
            - power generation
            - water treatment
            - electricity network
            - gas pipeline
            - telecommunications
      strength: specific
    - id: Keyword_network_design
      groups:
        - match_style: word
          terms:
            - network topology
            - network architecture
            - network diagram
            - data flow
            - system diagram
            - infrastructure diagram
      strength: specific
    - id: Keyword_network_architecture
      groups:
        - match_style: word
          terms:
            - VLAN
            - network segment
            - text: DMZ
              case_sensitive: true
            - air gap
            - firewall rule
            - access control list
            - network boundary
      strength: specific
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - critical infrastructure
  - essential service
  - power generation
  - water treatment
  - electricity network
  - gas pipeline
  - telecommunications
  - network topology
  - network architecture
  - network diagram
  - data flow
  - VLAN
  - DMZ
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
