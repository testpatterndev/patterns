schema: testpattern/v1
name: Critical Infrastructure Design
slug: au-critical-infrastructure-design
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive critical-infrastructure and essential-service network or control-system
  designs. Topic phrases are retained for discovery; enforcement requires segmentation, data-flow,
  trust-boundary, VLAN, DMZ, firewall, or OT-zone design content, and high confidence also requires a
  populated address, VLAN, port, device, or rule detail.
operation: >-
  Regex_ci_design_topic recognises critical-infrastructure, essential-service, and OT/SCADA/ICS design
  topics. The topic alone is discovery-only at 65. Concrete segmentation, data-flow, trust-boundary,
  VLAN, DMZ, firewall, or zone/conduit content raises it to 75; populated network or device details reach
  85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:critical\s+infrastructure\s+(?:network\s+)?(?:design|architecture|topology|diagram)|essential\s+service\s+(?:network|system)\s+(?:design|architecture|diagram)|(?:SCADA|ICS|OT)\s+(?:network|system)\s+(?:design|architecture|diagram))\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive design content in critical-infrastructure, essential-service,
  or OT scope. High confidence adds deployable network or device values.
jurisdictions:
  - au
regulations:
- "Criminal Code Act 1995 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
data_categories:
  - infrastructure
  - security
test_cases:
  should_match:
    - value: Critical infrastructure network design
      description: Low-tier probe - critical-infrastructure design topic without design content
    - value: 'Critical infrastructure network architecture: VLAN segmentation, DMZ trust boundary, data flow, and zone and conduit model'
      description: Medium-tier probe - substantive design without populated live values
    - value: 'Critical infrastructure network design for a water treatment plant: network segment VLAN 120, firewall rule source IP 10.4.0.0/16 to destination IP 10.8.2.10, TCP port 502'
      description: High-tier probe - essential-service design with populated VLAN, rule, address, and port details
  should_not_match:
    - value: Infrastructure spending on roads
      description: Non-match 1
    - value: The network connection was slow
      description: Generic connectivity statement
    - value: 'The public guide explains critical infrastructure resilience principles.'
      description: Public policy guidance without a system design
    - value: 'Training example: critical infrastructure network design with VLAN 120 and source IP 10.4.0.0/16'
      description: Explicit training content must not enforce
false_positives:
  - description: Public resilience guidance and vendor reference architectures discuss critical infrastructure, essential services, and network segmentation without exposing a real design.
    mitigation: Require a critical/essential/OT design topic plus substantive segmentation, data-flow, trust-boundary, or firewall content.
  - description: Training labs can contain realistic addresses, VLANs, ports, and firewall-rule examples.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - yaml
scope: narrow
risk_rating: 10
risk_description: >-
  This TestPattern concept identifies critical-infrastructure design records by combining essential-service terms with topology, VLAN, segmentation, or internal-network evidence. A malicious recipient could turn the resulting blueprint into a plan for boundary bypass, targeted access, or disruption of an essential service. The likely impact can extend from the asset operator to large service populations and public safety because the matched unit is a composite design. Risk 10 and PROTECTED InfoTech are appropriate, and there is no higher QGISCF tier.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ci_design_topic
      matches:
        - ref: Evidence_ci_design_content
        - ref: Evidence_ci_live_detail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ci_design_topic
      matches:
        - ref: Evidence_ci_design_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ci_design_topic
  regexes:
    - id: Regex_ci_design_topic
      pattern: >-
        (?is)\b(?:critical\s+infrastructure\s+(?:network\s+)?(?:design|architecture|topology|diagram)|essential\s+service\s+(?:network|system)\s+(?:design|architecture|diagram)|(?:SCADA|ICS|OT)\s+(?:network|system)\s+(?:design|architecture|diagram))\b
    - id: Evidence_ci_live_detail
      pattern: >-
        (?i)\b(?:VLAN\s+\d{1,4}|(?:source|destination)\s+IP\s*[:=]?\s*(?:\d{1,3}\.){3}\d{1,3}(?:/\d{1,2})?|(?:TCP|UDP)\s+port\s+\d{1,5}|(?:firewall|router|switch|PLC|RTU|HMI)\s+(?:hostname|device|node|ID)\s*[:=]\s*[A-Za-z0-9._-]+)\b
  keywords:
    - id: Evidence_ci_design_content
      groups:
        - match_style: word
          terms:
            - VLAN
            - network segment
            - network segmentation
            - text: DMZ
              case_sensitive: true
            - trust boundary
            - data flow
            - firewall rule
            - access control list
            - network boundary
            - zone and conduit
            - air gap
            - remote site
      strength: domain
