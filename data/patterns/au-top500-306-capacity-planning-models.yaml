schema: testpattern/v1
name: Capacity planning models
slug: au-top500-306-capacity-planning-models
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies capacity planning models patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:capacity\s+planning|resource\s+forecasting|growth\s+model|utilization\s+threshold|peak\s+load|infrastructure\s+capacity|performance\s+baseline|demand\s+forecast|headroom\s+analysis|compute\s+capacity|storage\s+capacity)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - capacity planning models
    - capacity
    - planning
    - models
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: capacity planning
      description: Primary topic phrase match
    - value: resource forecasting
      description: Case-insensitive topic phrase match
    - value: growth model
      description: Alternative topic phrase match
    - value: utilization threshold
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The detector identifies a capacity-planning model through resource-forecasting, growth-model, utilization-threshold, peak-load, demand-forecast, headroom, compute-capacity, and storage-capacity language. A populated model can reveal bottlenecks, demand cycles, expansion assumptions, and business priorities that a competitor could exploit or an attacker could use to time resource-exhaustion activity. The affected scale is the modeled service or business area, and meaningful misuse still needs market context or an independent attack path. Risk 8 and SENSITIVE reflect serious contained commercial and operational exposure, while a model for a critical service with a directly actionable failure threshold would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_capacity_planning
      matches:
        - ref: Evidence_capacity_planning
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_capacity_planning
      matches:
        - ref: Evidence_capacity_planning
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_capacity_planning
      matches:
        - ref: Evidence_capacity_planning
  regexes:
    - id: Pattern_capacity_planning
      pattern: >-
        (?is)\b(?:capacity\s+planning|resource\s+forecasting|growth\s+model|utilization\s+threshold|peak\s+load|infrastructure\s+capacity|performance\s+baseline|demand\s+forecast|headroom\s+analysis|compute\s+capacity|storage\s+capacity)\b
  keywords:
    - id: Evidence_capacity_planning
      groups:
        - match_style: word
          terms:
            - capacity planning
            - resource forecasting
            - growth model
            - utilization threshold
            - peak load
            - scalability
            - infrastructure capacity
            - performance baseline
            - demand forecast
            - headroom analysis
            - compute capacity
            - storage capacity
