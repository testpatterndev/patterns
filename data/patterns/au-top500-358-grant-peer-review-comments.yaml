schema: testpattern/v1
name: Grant peer review comments
slug: au-top500-358-grant-peer-review-comments
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies Australian grant peer-review comments and assessment records containing substantive
  assessor observations, scores, or funding outcomes. Grant-review and application phrases are
  retained for discovery at 65; Australian funding context plus populated assessment fields raise
  confidence to 75, while a formal record reference and explicit funding outcome raise it to 85.
operation: >-
  Regex_au_grant_peer_review_topic recognises grant-review, assessor-comment, panel, decision, and
  grant-application topics. The topic alone is discovery-only at 65. Australian funder or scheme
  context plus a populated score, rank, strength, weakness, assessor-comment, moderation, or conflict
  field is required at 75. The 85 tier additionally requires a formal proposal, application,
  assessor, reviewer, or panel reference and a funding outcome. Enforcing tiers reject templates,
  guidance, adjacent review domains, lending and investment decisions, and foreign grant schemes.
pattern: >-
  (?is)\b(?:grant\s+peer\s+review|peer\s+review\s+comments?|assessor\s+(?:comments?|feedback|report)|reviewer\s+(?:comments?|feedback)|grant\s+review\s+panel|funding\s+(?:decision|recommendation)|grant\s+application)\b
confidence: medium
confidence_justification: >-
  Medium confidence is appropriate because grant-review language is not unique to a live Australian
  assessment. Enforcement requires both Australian grant context and populated assessment structure;
  high confidence adds a formal record reference and an explicit funding outcome.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - Australian Research Council
    - NHMRC
    - MRFF
    - criterion score
    - assessor comments
    - strengths
    - weaknesses
    - funding recommendation
  proximity: 300
test_cases:
  should_match:
    - value: The Australian Research Council noted that grant peer review comments are pending.
      description: Low-tier probe - Australian grant-review topic without populated assessment content
    - value: 'Australian Research Council grant application review. Criterion 1 score: 4/5. Weaknesses: limited methodology.'
      description: Medium-tier probe - Australian context and populated assessment without a formal reference or funding outcome
    - value: 'NHMRC grant application. Application ID: APP-884; Overall score: 5/7; Strengths: strong design; funding recommendation: not recommended for funding.'
      description: High-tier probe - Australian context, populated assessment, formal reference, and explicit funding outcome
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: 'Journal peer review comments. Reviewer comments: revise the literature review. Overall score: 3/5.'
      description: Journal-review collision must not enforce as grant assessment content
    - value: 'Pull request code review: reviewer feedback. Weaknesses: missing null checks. Overall score: 4/5.'
      description: Software-review collision must not enforce
    - value: 'Investment committee funding decision. Criterion score: 8/10. Funding recommendation: proceed with the venture capital round.'
      description: Commercial investment decision must not enforce as a grant decision
    - value: 'Loan application funding decision. Application ID: LN-884. Overall score: 720. Decision status: approved.'
      description: Lending decision must not enforce as grant peer review
    - value: 'NIH grant application. Application ID: R01-884; Overall score: 24; Weaknesses: limited cohort; funding recommendation: do not fund.'
      description: United States grant assessment must not enforce as Australian grant review
    - value: 'UKRI grant application. Proposal reference: UK-884; Overall score: 76; Strengths: strong impact; funding recommendation: recommended for funding.'
      description: United Kingdom grant assessment must not enforce as Australian grant review
    - value: 'Public guidance from the Australian Research Council explains grant peer review comments, Criterion 1 score: 4/5, Application ID: APP-884, and funding recommendation: do not fund.'
      description: Australian guidance containing realistic assessment vocabulary must not enforce
    - value: 'Training example: NHMRC grant application; Application ID: APP-884; Overall score: 5/7; funding recommendation: do not fund.'
      description: Structurally complete Australian training content must not enforce
false_positives:
  - description: Australian grant-program guidance, application instructions, and training examples can reproduce assessment labels and sample scores without containing a live review.
    mitigation: Keep topic phrases discovery-only, require populated assessment fields for enforcement, and reject explicit guidance, template, and training framing.
  - description: Journal peer review, source-code review, employee appraisal, lending, and investment decisions use reviewer, score, weakness, recommendation, and funding language.
    mitigation: Apply adjacent-domain exclusions to enforcing tiers and require independent Australian grant context together with assessment structure.
  - description: Overseas funders use almost identical grant-application, scoring, panel, and funding-outcome records.
    mitigation: Require an Australian funder, scheme, or government-grant signal and reject explicit foreign funding-body context from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_au_grant_peer_review_topic
      matches:
        - ref: Evidence_au_grant_context
        - ref: Pattern_au_grant_peer_review_assessment_field
        - ref: Pattern_au_grant_peer_review_formal_reference
        - ref: Evidence_au_grant_funding_outcome
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_au_grant_adjacent_collision
            - Evidence_foreign_grant_context
    - confidence_level: 75
      id_match: Regex_au_grant_peer_review_topic
      matches:
        - ref: Evidence_au_grant_context
        - ref: Pattern_au_grant_peer_review_assessment_field
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_au_grant_adjacent_collision
            - Evidence_foreign_grant_context
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_au_grant_peer_review_topic
  regexes:
    - id: Regex_au_grant_peer_review_topic
      pattern: >-
        (?is)\b(?:grant\s+peer\s+review|peer\s+review\s+comments?|assessor\s+(?:comments?|feedback|report)|reviewer\s+(?:comments?|feedback)|grant\s+review\s+panel|funding\s+(?:decision|recommendation)|grant\s+application)\b
    - id: Pattern_au_grant_peer_review_assessment_field
      pattern: >-
        (?im)\b(?:(?:criterion|assessment\s+criterion)(?:\s+\d+)?\s+score|overall\s+score|panel\s+rank(?:ing)?)\s*[:#-]\s*(?:\d+(?:\.\d+)?(?:\s*/\s*\d+)?|[A-E]|excellent|good|fair|poor)\b|\b(?:strengths?|weaknesses?|assessor\s+comments?|reviewer\s+comments?|moderation\s+notes?|conflict\s+declaration|relative\s+to\s+opportunity)\s*[:#-]\s*[^\r\n]{3,120}
    - id: Pattern_au_grant_peer_review_formal_reference
      pattern: >-
        (?i)\b(?:proposal|application|assessor|reviewer|review|panel)\s*(?:id|no\.?|number|ref(?:erence)?)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{1,24}\b
  keywords:
    - id: Evidence_au_grant_context
      groups:
        - match_style: word
          terms:
            - text: ARC
              case_sensitive: true
            - Australian Research Council
            - NHMRC
            - National Health and Medical Research Council
            - MRFF
            - Medical Research Future Fund
            - GrantConnect
            - Australian Government
            - Commonwealth of Australia
            - Business Grants Hub
            - Community Grants Hub
            - Queensland Government
            - Advance Queensland
      strength: specific
    - id: Evidence_au_grant_funding_outcome
      groups:
        - match_style: word
          terms:
            - funding recommendation
            - recommended for funding
            - not recommended for funding
            - do not fund
            - fund with conditions
            - fundable
            - not fundable
            - above the funding line
            - below the funding line
            - panel recommendation
            - final ranking
            - reserve list
      strength: specific
    - id: Evidence_au_grant_adjacent_collision
      groups:
        - match_style: word
          terms:
            - journal peer review
            - manuscript review
            - code review
            - pull request
            - performance review
            - employee appraisal
            - loan application
            - credit decision
            - investment committee
            - venture capital
            - public guidance
            - guidance document
      strength: noise
    - id: Evidence_foreign_grant_context
      groups:
        - match_style: word
          terms:
            - text: NIH
              case_sensitive: true
            - National Institutes of Health
            - text: NSF
              case_sensitive: true
            - National Science Foundation
            - text: UKRI
              case_sensitive: true
            - UK Research and Innovation
            - Horizon Europe
            - European Research Council
            - Health Research Council of New Zealand
      strength: noise
risk_description: >-
  This detector recognises Australian grant-review topics at discovery and requires Australian funder
  or scheme context plus populated assessment fields for enforcement; high confidence also confirms
  a formal record reference and funding outcome. A normal true positive contains candid evaluation of
  an applicant's proposal, track record, feasibility, weaknesses, and funding recommendation, where
  disclosure can prejudice selection and damage professional relationships. Guidance, journal review,
  and foreign grant records are explicitly rejected from enforcement. Risk 8 SENSITIVE fits one
  confidential review, while PROTECTED requires a major funding round compromise, protected-source
  exposure, or significant institutional damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
