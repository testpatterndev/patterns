schema: testpattern/v1
name: Pension entitlement records
slug: global-top500-388-pension-entitlement-records
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies individual pension entitlement records, benefit calculations, eligibility decisions, and
  payment determinations. Topic phrases are retained for discovery; enforcement requires member,
  service, retirement-date, salary, contribution, accrued-benefit, beneficiary, payment-frequency,
  gross-pension, or commutation fields, and high confidence also requires a formal member/claim
  reference or recorded entitlement decision.
operation: >-
  Regex_pension_entitlement recognises pension entitlement records, calculations, and decisions. The
  topic alone is discovery-only at 65. Substantive member and benefit-calculation fields raise it to 75;
  a formal member/claim reference or decision reaches 85. Enforcing tiers reject explicit templates
  and training examples.
pattern: >-
  (?is)\b(?:pension\s+entitlement\s+(?:record|determination)|pension\s+benefit\s+calculation|retirement\s+benefit\s+entitlement|pension\s+eligibility\s+decision|pension\s+payment\s+determination)s?\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive member and benefit-calculation fields. High confidence adds a
  formal member/claim reference or recorded entitlement decision.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - pension entitlement records
  proximity: 240
  keyword_lists:
    - financial-deposit-terms
    - industry-hr
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: pension entitlement record
      description: Low-tier probe - pension-entitlement topic without member fields
    - value: 'Pension entitlement record: member name, service period, retirement date, pensionable salary, contribution history, accrued benefit, beneficiary details, payment frequency, gross pension, and commutation amount'
      description: Medium-tier probe - substantive entitlement record without formal reference or decision
    - value: 'Pension entitlement record, member number: PEN-2026-104: member name, service period, retirement date, pensionable salary, contribution history, accrued benefit, beneficiary details, payment frequency, gross pension, commutation amount, and decision approved'
      description: High-tier probe - substantive entitlement with member reference and decision
  should_not_match:
    - value: The pension fund publishes its annual investment report.
      description: Fund-level public reporting without an individual entitlement
    - value: The retirement seminar explains benefit calculations.
      description: General guidance without a member record
    - value: 'Training example: pension entitlement record PEN-2026-104 with pensionable salary, accrued benefit, gross pension, and decision approved'
      description: Explicit training content must not enforce
false_positives:
  - description: Fund reports, retirement guidance, and general payroll material discuss service, salary, contributions, beneficiaries, and benefits without containing an entitlement record.
    mitigation: Require a pension entitlement, benefit calculation, eligibility decision, or payment determination before considering member fields.
  - description: Training entitlement records can contain realistic member references, salary bases, calculations, beneficiaries, and decisions.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_pension_entitlement
      matches:
        - ref: Evidence_pension_entitlement
        - ref: Evidence_pension_formal_decision
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_pension_entitlement
      matches:
        - ref: Evidence_pension_entitlement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pension_entitlement
  regexes:
    - id: Regex_pension_entitlement
      pattern: >-
        (?is)\b(?:pension\s+entitlement\s+(?:record|determination)|pension\s+benefit\s+calculation|retirement\s+benefit\s+entitlement|pension\s+eligibility\s+decision|pension\s+payment\s+determination)s?\b
    - id: Evidence_pension_formal_decision
      pattern: >-
        (?i)\b(?:(?:member|claim|pension)\s+(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|decision\s*[:=-]?\s*(?:approved|eligible|declined|denied|deferred))\b
  keywords:
    - id: Evidence_pension_entitlement
      groups:
        - match_style: word
          terms:
            - member name
            - service period
            - retirement date
            - pensionable salary
            - contribution history
            - accrued benefit
            - beneficiary details
            - payment frequency
            - gross pension
            - commutation amount
      strength: domain
risk_description: >-
  This regex recognises pension benefits, retirement benefits, entitlement records, and pension calculations with financial and employment context. A real record can reveal age, service history, salary basis, beneficiary details, contribution history, and expected payments, enabling targeted fraud or disputes over entitlement. The normal file causes serious privacy and financial harm for the member and dependants but is bounded to an account and lacks an active payment credential. Risk 8 and SENSITIVE Personal-Privacy are justified; PROTECTED would require bulk fund records, exploitable payment controls, or compromise causing significant systemic losses.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
