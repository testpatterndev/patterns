schema: testpattern/v1
name: Allied intelligence exchange records
slug: au-top500-437-allied-intelligence-exchange-records
version: 1.3.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to allied intelligence exchange records in Australian contexts. This information type is classified as personally identifiable information under the
  Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:allied\s+intelligence|intelligence\s+exchange|Five\s+Eyes|intelligence\s+sharing|allied\s+partner|coalition\s+intelligence|bilateral\s+exchange|defense\s+cooperation|national\s+security|classified\s+exchange)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - allied intelligence exchange records
    - allied
    - intelligence
    - exchange
    - records
    - defense
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: allied intelligence
      description: Primary topic phrase match
    - value: intelligence exchange
      description: Case-insensitive topic phrase match
    - value: Five Eyes
      description: Alternative topic phrase match
    - value: intelligence sharing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to allied intelligence exchange records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_allied_intelligence_exchange
      matches:
        - ref: Evidence_allied_intelligence_exchange
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_allied_intelligence_exchange
      matches:
        - ref: Evidence_allied_intelligence_exchange
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_allied_intelligence_exchange
      matches:
        - ref: Evidence_allied_intelligence_exchange
  regexes:
    - id: Pattern_allied_intelligence_exchange
      pattern: >-
        (?is)\b(?:allied\s+intelligence|intelligence\s+exchange|Five\s+Eyes|intelligence\s+sharing|allied\s+partner|coalition\s+intelligence|bilateral\s+exchange|defense\s+cooperation|national\s+security|classified\s+exchange)\b
  keywords:
    - id: Evidence_allied_intelligence_exchange
      groups:
        - match_style: word
          terms:
            - allied intelligence
            - intelligence exchange
            - Five Eyes
            - FVEY
            - intelligence sharing
            - allied partner
            - coalition intelligence
            - bilateral exchange
            - defense cooperation
            - national security
            - classified exchange
            - UKUSA
risk_description: >-
  The regex identifies allied intelligence, intelligence exchange, Five Eyes, and intelligence sharing language with six corroborating terms. A genuine exchange record may reveal partner-origin information, caveats, assessments, sources, collection, or dissemination decisions, risking partner trust and adversary advantage if exposed. Public alliance discussion, policy, and training can also match because the concept detector does not require actual partner intelligence or handling caveats. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. Genuine partner intelligence may reveal originator information, caveats, sources, collection and dissemination decisions. Loss can expose capabilities and cause significant alliance and national-security damage. Risk 10 and PROTECTED Government therefore apply to the confirmed record itself. Require partner/originator markings, caveats, intelligence content or dissemination fields; public alliance discussion remains audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Secret
