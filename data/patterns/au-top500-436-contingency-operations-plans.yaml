schema: testpattern/v1
name: Contingency operations plans
slug: au-top500-436-contingency-operations-plans
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to contingency operations plans in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:contingency\s+plan|contingency\s+operations|operations\s+plan|emergency\s+operations|defense\s+planning|operational\s+contingency|military\s+operations|national\s+security|classified\s+plan|crisis\s+response)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - contingency operations plans
    - contingency
    - operations
    - plans
    - defense
    - intelligence
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: contingency plan
      description: Primary topic phrase match
    - value: contingency operations
      description: Case-insensitive topic phrase match
    - value: operations plan
      description: Alternative topic phrase match
    - value: emergency operations
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to contingency operations plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_contingency_operations_plans
      matches:
        - ref: Evidence_contingency_operations_plans
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_contingency_operations_plans
      matches:
        - ref: Evidence_contingency_operations_plans
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_contingency_operations_plans
      matches:
        - ref: Evidence_contingency_operations_plans
  regexes:
    - id: Pattern_contingency_operations_plans
      pattern: >-
        (?is)\b(?:contingency\s+plan|contingency\s+operations|operations\s+plan|emergency\s+operations|defense\s+planning|operational\s+contingency|military\s+operations|national\s+security|classified\s+plan|crisis\s+response)\b
  keywords:
    - id: Evidence_contingency_operations_plans
      groups:
        - match_style: word
          terms:
            - contingency plan
            - contingency operations
            - operations plan
            - OPLAN
            - CONPLAN
            - emergency operations
            - defense planning
            - operational contingency
            - military operations
            - national security
            - classified plan
            - crisis response
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
