schema: testpattern/v1
name: Kenya National ID
slug: ke-national-id
version: 1.0.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Kenya national identity card numbers (typically 7-8 digits).
operation: >-
  Structural 7-8 digit ID with Kenyan ID keywords. Keyword lists: pii-civic-credentials.
pattern: '\b\d{7,8}\b'
confidence: medium
confidence_justification: >-
  Medium confidence; keywords required.
jurisdictions:
  - ke
regulations:
  - "Data Protection Act 2019 (Kenya)"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - national ID
    - Kenyan ID
    - Huduma Namba
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '12345678'
      description: 8-digit
    - value: '1234567'
      description: 7-digit
    - value: '87654321'
      description: Alt
  should_not_match:
    - value: '123456'
      description: 6
    - value: '123456789'
      description: 9
    - value: '1234567A'
      description: Letter
false_positives:
  - description: >-
      Phone fragments.
    mitigation: >-
      Require national ID keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ke_national_id
      matches:
        - ref: Keyword_ke_national_id_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ke_national_id
      matches:
        - ref: Keyword_ke_national_id_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ke_national_id
  regexes:
    - id: Regex_ke_national_id
      pattern: '\b\d{7,8}\b'
  keywords:
    - id: Keyword_ke_national_id_specific
      groups:
        - match_style: word
          terms:
            - Kenya national ID
            - Huduma Namba
            - national ID number
      strength: specific
    - id: Keyword_ke_national_id_broad
      groups:
        - match_style: word
          terms:
            - Huduma
            - Kenyan identity card
      strength: specific
risk_rating: 8
risk_description: >-
  Kenya national ID numbers identify citizens.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Phase-2 coverage backlog — mature Purview-safe identifier with pack metadata'
author: testpattern-community
license: MIT
