schema: testpattern/v1
name: Sandbox detonation reports
slug: au-top500-292-sandbox-detonation-reports
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies sandbox detonation reports patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:sandbox\s+detonation\s+reports|sandbox\s+detonation|behavioral\s+analysis|dynamic\s+analysis|malware\s+sandbox|cuckoo\s+sandbox|joe\s+sandbox|execution\s+trace|process\s+behavior|network\s+callback)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - sandbox detonation reports
    - sandbox
    - detonation
    - reports
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: sandbox detonation reports
      description: Primary topic phrase match
    - value: sandbox detonation
      description: Case-insensitive topic phrase match
    - value: behavioral analysis
      description: Alternative topic phrase match
    - value: dynamic analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: detonation ioc
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_sandbox_detonation
      matches:
        - ref: Evidence_sandbox_detonation
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_sandbox_detonation
      matches:
        - ref: Evidence_sandbox_detonation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_sandbox_detonation
      matches:
        - ref: Evidence_sandbox_detonation
  regexes:
    - id: Pattern_sandbox_detonation
      pattern: (?is)\b(?:sandbox\s+detonation\s+reports|sandbox\s+detonation|behavioral\s+analysis|dynamic\s+analysis|malware\s+sandbox|cuckoo\s+sandbox|joe\s+sandbox|execution\s+trace|process\s+behavior|network\s+callback)\b
  keywords:
    - id: Evidence_sandbox_detonation
      groups:
        - match_style: word
          terms:
            - sandbox detonation reports
            - sandbox detonation
            - behavioral analysis
            - dynamic analysis
            - malware sandbox
            - cuckoo sandbox
            - joe sandbox
            - any.run
            - execution trace
            - process behavior
            - network callback
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
