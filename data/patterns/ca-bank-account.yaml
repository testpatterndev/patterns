schema: testpattern/v1
name: Canada Bank Account Number
slug: ca-bank-account
version: 1.3.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Canada Bank Account Number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Financial account numbers require corroborative evidence for reliable
  detection due to their generic numeric format.
operation: >-
  Corroborative evidence: 5 keywords within 300 characters. Keyword lists: banking, ca-financial. Adds label-context matching and exclusion logic for sample/template/test placeholders. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{7,12}\b
confidence: low
confidence_justification: >-
  Low confidence: seven to twelve digit numbers are extremely common in non-financial contexts. Bank account keywords are essential for distinguishing financial identifiers from general numbers.
  Context label evidence plus explicit template/example exclusion improves precision for high-risk identifiers. Added context gating and exclusion rules improve precision and reduce incidental
  matches.
jurisdictions:
  - ca
regulations:
  - Law 25 (QC)
  - PIPEDA
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - pii
  - financial
corroborative_evidence:
  keywords:
    - bank account
    - account number
    - chequing
    - savings
    - banking
  proximity: 300
  keyword_lists:
    - banking
    - ca-financial
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '1234567'
      description: Seven-digit Canadian bank account number
    - value: '123456789012'
      description: Twelve-digit Canadian bank account number
    - value: '987654321'
      description: Nine-digit Canadian bank account
  should_not_match:
    - value: '123456'
      description: Six digits, too short for Canadian bank account
    - value: '1234567890123'
      description: Thirteen digits, exceeds Canadian bank account format
    - value: sample template placeholder number 1234567890123
      description: >-
        Template/sample context negative — the embedded number is 13 digits, one past the maximum of 12,
        so the universal-engine top-level regex correctly does not match it (template gating is a
        Purview-tier NOT-group concern, not expressible in a bare regex)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic numeric sequences such as reference numbers, invoice numbers, or identifiers from other domains
    mitigation: Require corroborative evidence keywords within the proximity window to distinguish financial account numbers from general numeric data.
  - description: Phone numbers, postal codes, or other structured numbers with similar digit counts
    mitigation: Layer with other detection patterns to deprioritise matches that overlap with phone number or postal code formats.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ca_bank_account
      matches:
        - ref: Pattern_ca_bank_account_label_context
        - ref: Keyword_ca_bank_account_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_ca_bank_account
      matches:
        - ref: Keyword_ca_bank_account_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ca_bank_account
      matches:
        - ref: Keyword_ca_bank_account_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ca_bank_account
      pattern: \b\d{7,12}\b
    - id: Pattern_ca_bank_account_label_context
      pattern: (?i)\b(?:canada|bank|account|bank\s+account|account\s+number|account\s+no|routing)\b
  keywords:
    - id: Keyword_ca_bank_account_specific
      groups:
        - match_style: word
          terms:
            - bank account
            - account number
            - numéro de compte
            - numero de compte
            - compte bancaire
            - chequing account
            - savings account
            - compte d'épargne
            - compte chèques
            - transit number
            - numéro de transit
      strength: specific
    - id: Keyword_ca_bank_account_general
      groups:
        - match_style: word
          terms:
            - chequing
            - savings
            - banking
            - deposit
            - withdrawal
            - financial institution
            - institution financière
            - bank
            - banque
      strength: domain
    - id: Keyword_ca_bank_account_domain_context
      groups:
        - match_style: word
          terms:
            - canada bank account number
            - canada
            - bank
      strength: domain
  filters:
    - id: Guard_ca_bank_account_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  This identifier detector finds a seven-to-twelve-digit Canadian bank account number when nearby banking context is present. The number can help a fraudster construct convincing payment messages or attempt an unauthorised debit, but it is an account coordinate and does not by itself authenticate the holder or authorise a transfer. One match affects an account holder and creates bounded financial and privacy exposure that still depends on routing data, a mandate, impersonation, or another control failure. Risk 5 and OFFICIAL better represent that normal unit; a completed debit mandate, online-banking credential, or payment instruction would warrant SENSITIVE handling.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-canada-bank-account-number
    title: Canada Bank Account Number entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.3.2
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1144 without changing detector or package metadata.'
  - version: 1.3.1
    date: '2026-07-12'
    description: 'Baseline burn-down: template-context negative used a structurally valid number, so the universal-engine top-level regex correctly matched it (template gating is a Purview-tier concern via the template-exclusion NOT-group, not expressible in a bare regex); embedded number made structurally invalid (13 digits, one past the 7-12 digit range) to preserve the template-prose intent without asserting the impossible.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.2
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — primary regex accepted all-zeros/same-digit bank account values (e.g. 0000000); mirrors au-medicare-card-identifier protection.
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Mapped non-canonical confidence 90 to 85.
