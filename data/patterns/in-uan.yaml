schema: testpattern/v1
name: India EPFO Universal Account Number
slug: in-uan
version: 1.0.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Employees Provident Fund Organisation (EPFO) Universal Account Numbers (UAN). UAN is a
  12-digit number assigned to employees to link multiple PF member IDs across employers. Leading digit is non-zero.
operation: >-
  Structural 12-digit UAN with leading 1-9. No public checksum. Corroborative evidence: UAN/EPFO/PF
  keywords within 300 characters. Keyword lists: industry-hr, pii-civic-credentials.
pattern: '\b[1-9]\d{11}\b'
confidence: medium
confidence_justification: >-
  Medium confidence: twelve-digit numbers appear in many systems; EPFO/UAN/PF keywords
  are required for reliable classification.
jurisdictions:
  - in
regulations:
  - DPDPA
  - "IT Act 2000 (India)"
  - "EPF and MP Act 1952"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
  - financial
corroborative_evidence:
  keywords:
    - UAN
    - universal account number
    - EPFO
    - PF number
  proximity: 300
  keyword_lists:
    - industry-hr
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '100123456789'
      description: Typical 12-digit UAN
    - value: '987654321012'
      description: High-range UAN
    - value: '112233445566'
      description: Another valid-length UAN
  should_not_match:
    - value: '012345678901'
      description: Leading zero not allowed
    - value: '10012345678'
      description: Only 11 digits
    - value: '1001234567890'
      description: 13 digits
false_positives:
  - description: >-
      Aadhaar is also 12 digits; bare digit matches can overlap.
    mitigation: >-
      Require UAN/EPFO/provident fund keywords; use Aadhaar SIT with Verhoeff for Aadhaar context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_in_uan
      matches:
        - ref: Keyword_in_uan_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_in_uan
      matches:
        - ref: Keyword_in_uan_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_in_uan
  regexes:
    - id: Regex_in_uan
      pattern: '\b[1-9]\d{11}\b'
  keywords:
    - id: Keyword_in_uan_specific
      groups:
        - match_style: word
          terms:
            - UAN
            - universal account number
            - EPFO UAN
            - UAN number
            - provident fund UAN
            - PF UAN
      strength: specific
    - id: Keyword_in_uan_broad
      groups:
        - match_style: word
          terms:
            - EPFO
            - provident fund
            - employee PF
            - PF account
            - member ID
            - passbook
      strength: specific
risk_rating: 8
risk_description: >-
  UAN links employment and provident-fund history for an individual; exposure supports identity fraud and targeted employment social engineering.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
references:
  - url: https://unifiedportal-mem.epfindia.gov.in/memberinterface/
    title: EPFO member portal
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Initial mature identifier SIT — Phase-1 coverage backlog (Purview-safe regex, full label/risk metadata for pack workbooks)'
author: testpattern-community
