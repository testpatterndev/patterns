schema: testpattern/v1
name: EU Passport Number
slug: eu-passport-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects EU passport number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly,
  or use this version as a starting point for customisation. This is a broad, multi-country SIT that aggregates passport number detection across EU member states.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-eu-passport-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. This SIT covers all
  EU member state passport formats collectively. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[A-Z]{1,2}\d{6,7}\b|\b\d{8,9}\b
confidence: medium
confidence_justification: >-
  Medium confidence: broad multi-country pattern that relies on corroborative keywords to reduce false positive rates across diverse passport formats. Added context gating and exclusion rules improve
  precision and reduce incidental matches.
jurisdictions:
  - eu
regulations:
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - travel document
    - passport number
    - eu passport
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: AB1234567
      description: Generic EU passport format with letter prefix and digits
    - value: XY987654
      description: Generic EU passport format with letter prefix and digits
    - value: '123456789'
      description: Numeric-only format used by some EU member states
  should_not_match:
    - value: ABCDEFGHIJ
      description: All letters with no digits
    - value: '12345'
      description: Too short to be any EU passport number
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic alphanumeric sequences matching passport format in unrelated contexts.
    mitigation: Require corroborative evidence keywords within the proximity window.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_eu_passport_primary
      matches:
        - ref: Pattern_eu_passport_number_label_context
        - ref: Keyword_eu_passport_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Keyword_eu_passport_primary
      matches:
        - ref: Keyword_eu_passport_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_eu_passport_primary
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  keywords:
    - id: Keyword_eu_passport_primary
      groups:
        - match_style: word
          terms:
            - passport
            - travel document
            - passport number
            - eu passport
            - passeport
            - Reisepass
            - passaporto
            - pasaporte
            - paspoort
            - pass
            - reisedokument
            - passaporte
      strength: domain
    - id: Keyword_eu_passport_context
      groups:
        - match_style: word
          terms:
            - passport no
            - passport ID
            - numéro de passeport
            - Reisepassnummer
            - numero di passaporto
            - número de pasaporte
            - paspoortnummer
            - passnummer
            - travel ID
            - document number
            - identity document
            - border control
      strength: specific
    - id: Keyword_eu_passport_number_domain_context
      groups:
        - match_style: word
          terms:
            - eu passport number
            - passport
      strength: domain
  regexes:
    - id: Pattern_eu_passport_number_label_context
      pattern: \b[A-Z]{1,2}\d{6,7}\b|\b\d{8,9}\b
risk_rating: 5
risk_description: >-
  The detector recognises several common EU passport-number shapes: one or two uppercase letters followed by six or seven digits, or an eight- or nine-digit numeric value, with passport context and template exclusions. A genuine number can help correlate a traveller to border, booking, or identity records and support impersonation when combined with a name, nationality, and date of birth. The rule spans all member states, does not validate an issuing-country checksum, and can collide with unrelated reference codes, so the atomic match is neither a passport copy nor proof of identity. Risk 5 OFFICIAL reflects bounded travel-identity harm; SENSITIVE would require reliable holder attribution, document details, or a populated travel record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-eu-passport-number
    title: EU passport number entity definition - Microsoft Learn
