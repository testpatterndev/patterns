schema: testpattern/v1
name: Political Opinion & Affiliation
slug: global-political-opinion
version: 1.2.0
type: keyword_list
pattern_class: concept
engine: universal
description: >-
  Detects references to political opinions and party affiliation: party membership, voter
  registration by party, political donations and campaign contributions. GDPR Article 9 lists
  political opinions as a special category of personal data with no fixed format — it is detectable
  only by topic vocabulary. Topic-grade detector, low confidence by design.
operation: >-
  Phrase regex matching indicative political-opinion terminology (party membership, registered
  Democrat/Republican, campaign contribution, political donation). Detects the presence of
  political-opinion subject matter; not a structured-token detector. Pair with corroborative keywords
  to raise precision.
pattern: '(?i)\b(?:political\s+affiliations?|political\s+opinions?|party\s+membership|party\s+affiliations?|voted\s+for|registered\s+(?:Democrat|Republican|Green|Libertarian|to\s+vote\s+as)|political\s+donations?|campaign\s+contributions?|political\s+party\s+member|partisan\s+affiliations?|voter\s+registration\s+party)\b'
confidence: low
confidence_justification: >-
  Low by design. Political opinion is a GDPR Article 9 special category with no fixed format, so it is
  detected purely by topic vocabulary. Phrases like "voted for" appear constantly in non-political
  prose (awards, elections of officers, polls); pair with corroborative keywords (politics, election,
  candidate, donor) within the proximity window and treat single hits as low confidence.
jurisdictions:
  - global
  - eu
regulations:
  - GDPR
frameworks:
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - politics
    - election
    - candidate
    - ballot
    - donor
    - constituent
    - voter
    - electorate
  proximity: 300
test_cases:
  should_match:
    - value: 'CRM note records the donor as a registered Democrat in the swing district.'
      description: Registered Democrat term present
    - value: 'The file lists each campaign contribution made during the election cycle.'
      description: Campaign contribution term present
    - value: 'Profile field captures party membership and political affiliation.'
      description: Party membership / political affiliation terms present
    - value: 'A political donation of record was flagged for the constituent.'
      description: Political donation term present
  should_not_match:
    - value: 'The quarterly sales report shows revenue grew across all regions.'
      description: Unrelated business prose, no political terms
    - value: 'The committee registered the new vendor in the procurement system.'
      description: Near-miss prose ("registered" but not a party), no political opinion
    - value: 'The team selected the winning design after a quick internal poll.'
      description: Unrelated prose, "poll" without political affiliation vocabulary
false_positives:
  - description: >-
      Phrases like "voted for" or "registered" appear in non-political contexts (board elections,
      award votes, vendor registration), producing matches with no political-opinion content.
    mitigation: >-
      Require corroborative keywords (election, candidate, donor, constituent, ballot) within the
      proximity window; treat isolated "voted for"/"registered" hits as low confidence.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: broad
risk_rating: 7
risk_description: >-
  Political opinions are a GDPR Article 9 special category; disclosure can lead to discrimination,
  retaliation, profiling and chilling effects on political participation.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI Basic
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-09'
changelog:
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-04'
    description: 'PDF-safety: literal inter-word spaces in phrase regex replaced with \s+ so line-wrapped text still matches'
author: testpattern-community
license: MIT
keywords:
  - political affiliation
  - political opinion
  - party membership
  - party affiliation
  - voted for
  - registered Democrat
  - registered Republican
  - political donation
  - campaign contribution
  - political party member
  - partisan affiliation
  - voter registration party
references:
  - url: https://gdpr-info.eu/art-9-gdpr/
    title: GDPR Article 9 — processing of special categories of personal data (political opinions)
