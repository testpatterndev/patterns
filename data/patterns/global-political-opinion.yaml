    date: '2026-07-19'
    description: 'Targeted blocker remediation: add a 65 political-topic discovery tier, a 75 voter/donor/constituent-record tier, and an 85 populated affiliation/donation-detail tier, with exact-tier and sibling/public/template probes.'
  - version: 1.2.1
    date: '2026-07-14'
