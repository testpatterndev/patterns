schema: testpattern/v1
name: Underwriting decision rationales
slug: global-top500-130-underwriting-decision-rationales
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to underwriting decision rationales in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:underwriting\s+decision|risk\s+assessment|approval\s+rationale|decline\s+reason|risk\s+appetite|underwriting\s+criteria|risk\s+classification|conditional\s+approval|risk\s+rating|loss\s+ratio)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - underwriting decision rationales
    - underwriting
    - decision
    - rationales
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: underwriting decision
      description: Primary topic phrase match
    - value: risk assessment
      description: Case-insensitive topic phrase match
    - value: approval rationale
      description: Alternative topic phrase match
    - value: decline reason
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_underwriting_decision
      matches:
        - ref: Pattern_global_top500_130_underwriting_decision_rationales_label_context
        - ref: Keyword_global_top500_130_underwriting_decision_rationales_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_underwriting_decision
      matches:
        - ref: Keyword_underwriting_decision
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_underwriting_decision
      pattern: >-
        (?is)\b(?:underwriting\s+decision|risk\s+assessment|approval\s+rationale|decline\s+reason|risk\s+appetite|underwriting\s+criteria|risk\s+classification|conditional\s+approval|risk\s+rating|loss\s+ratio)\b
    - id: Pattern_global_top500_130_underwriting_decision_rationales_label_context
      pattern: (?i)\b(?:underwriting\s+decision\s+rationales)\b
  keywords:
    - id: Keyword_underwriting_decision
      groups:
        - match_style: word
          terms:
            - underwriting decision
            - risk assessment
            - approval rationale
            - decline reason
            - risk appetite
            - underwriting criteria
            - risk classification
            - conditional approval
            - underwriter
            - risk rating
            - actuarial
            - loss ratio
      strength: specific
    - id: Keyword_global_top500_130_underwriting_decision_rationales_domain_context
      groups:
        - match_style: word
          terms:
            - underwriting decision rationales
            - underwriting
            - decision
            - rationales
      strength: domain
risk_description: >-
  This medium-confidence regex covers underwriting decision, risk assessment, approval rationale, decline reason, underwriting criteria, risk rating, and loss ratio with seven finance or record corroborators, so it can identify methodology discussion without an applicant or decision. A populated record linking an applicant to an outcome, reason, condition, or price can reveal personal or financial weaknesses and show how that application was evaluated. The direct impact falls on the applicant and the underwriting organisation, while manipulation of future applications depends on sufficiently specific decision logic rather than a generic risk term. Risk 7 and SENSITIVE Financial are retained for an attributable rationale; PROTECTED requires a decision corpus, proprietary model disclosure, or strategic exposure causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
