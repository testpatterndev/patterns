schema: testpattern/v1
name: Australian Taxation Identifier
slug: au-taxation-identifier
version: 2.6.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Identifies Australian Tax File Numbers (TFNs) — unique nine-digit identifiers issued by the
  Australian Taxation Office. Uses an inline mod-11 Checksum validator with AllDigitsSameFilter
  and TextMatchFilter to exclude known test values.
operation: >-
  Validator-backed detection using an inline Checksum validator (Weights 1,4,3,7,5,8,6,9,0 / Mod 11 /
  CheckDigit 9 — the TFN mod-11 rule; Func_australian_tax_file_number is documented as a validator but
  Func_* refs are rejected at custom rulepack upload, see docs/checksum-validator-semantics.md) with dual filters. Corroborative
  evidence: 3 tiers with tax-registration-specific, broad taxation, and standalone keywords within
  300 characters.
pattern: \b(?!0{3}[\s\-]?0{3}[\s\-]?0{3}\b)(?!1{3}[\s\-]?1{3}[\s\-]?1{3}\b)\d{3}[\s\-]?\d{3}[\s\-]?\d{3}\b
confidence: high
confidence_justification: >-
  High confidence: the Func_australian_tax_file_number checksum validator combined with AllDigitsSameFilter
  and TextMatchFilter for known test values provides strong precision. The bare 9-digit regex is broad,
  but the integrated validator reduces false positives to near-zero.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - pii
  - financial
  - government-id
corroborative_evidence:
  keywords:
    - tax file number
    - TFN
    - tax file no
    - australian tax
    - taxfile
    - ATO
  proximity: 300
  keyword_lists:

    - au-tax-registration-terms

    - pii-civic-credentials
test_cases:
  should_match:
    - value: 255 446 951
      description: Standard spaced format, passes mod-11 checksum
    - value: 194-353-277
      description: Hyphen-separated format, passes mod-11 checksum
    - value: '637543757'
      description: Continuous digits, passes mod-11 checksum
  should_not_match:
    - value: 12 345 678
      description: Only 8 digits in 2-3-3 grouping
    - value: '1234567890'
      description: 10 digits, too long
    - value: '000000000'
      description: Excluded by TextMatchFilter
    - value: '111111111'
      description: Excluded by AllDigitsSameFilter
    - value: 000 000 000
      description: Separator-form all-zeros placeholder — blocked by the separator-aware top-level guard
    - value: 111-111-111
      description: Separator-form all-ones placeholder — blocked by the separator-aware top-level guard
    - value: 255 446 952
      description: fails mod-11 checksum (single-digit perturbation of valid value 255 446 951)
    - value: '194353278'
      description: fails mod-11 checksum (single-digit perturbation of valid value 194 353 277)
false_positives:
  - description: Generic nine-digit reference codes, invoice numbers, or account identifiers.
    mitigation: Require tax-specific keywords in proximity. Filters exclude trivial and test values.
  - description: Phone numbers formatted as nine consecutive digits.
    mitigation: Layer with phone detection to deprioritise overlapping matches.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 5
risk_description: >-
  The rule validates one Australian taxation identifier in tax-related context rather than a taxpayer account or return. A genuine number can assist identity correlation or attempted fraud, but it carries no income, filing history, authentication factor, or payment authority. The normal unit concerns one taxpayer and practical abuse requires identity and account data from elsewhere. Risk 5 OFFICIAL reflects bounded identifier exposure; SENSITIVE requires a linked tax record or usable access context.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_taxation_id
      matches:
        - ref: Evidence_tax_registration_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_taxation_id
      matches:
        - ref: Evidence_tax_registration_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_taxation_id
  regexes:
    - id: Pattern_taxation_id
      pattern: \b(?!0{3}[\s\-]?0{3}[\s\-]?0{3}\b)(?!1{3}[\s\-]?1{3}[\s\-]?1{3}\b)\d{3}[\s\-]?\d{3}[\s\-]?\d{3}\b
      validators:
        - ref: Validator_australian_tfn
  keywords:
    - id: Evidence_tax_registration_specific
      groups:
        - match_style: word
          terms:
            - tax file number
            - text: TFN
              case_sensitive: true
            - tax file no
            - tax file no.
            - T.F.N.
            - taxfile
            - tax file
            - tax number
      strength: specific
    - id: Evidence_tax_registration_broad
      groups:
        - match_style: word
          terms:
            - australian tax
            - Australian Taxation Office
            - text: ATO
              case_sensitive: true
            - superannuation
            - tax return
            - tax declaration
            - income tax
            - tax agent
            - myGov
            - myTax
            - PAYG
            - claimed
            - threshold
            - resident
            - exemption
            - withholding
            - declaration
            - tax free threshold
      strength: domain
  validators:
    - id: Validator_australian_tfn
      type: Checksum
      params:
        - name: Weights
          value: 1, 4, 3, 7, 5, 8, 6, 9, 0
        - name: Modulo
          value: '11'
        - name: CheckDigit
          value: '9'
  filters:
    - id: Guard_taxation_same_digits
      type: AllDigitsSameFilter
    - id: Guard_taxation_exclude_test
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms:
        - "000000000"
        - "000 000 000"
        - "123456789"
        - "123 456 789"
        - "987654321"
        - "987 654 321"
created: '2026-02-08'
updated: '2026-07-20'
changelog:
  - version: 2.6.0
    date: '2026-07-20'
    description: 'Checksum-encoding fix: rewrite Validator_australian_tfn to the docs-compliant Purview encoding (Weights 1,4,3,7,5,8,6,9,0 / Modulo 11 / CheckDigit 9 — sum of first 8 weighted digits mod 11 must equal digit 9; the old Weights ...,10 / Result 0 form exported CheckDigit=0 which Purview rejects, and the deploy-side rewrite to CheckDigit=9 with weight 10 at the check position only accepted TFNs ending in 0 — see docs/checksum-validator-semantics.md). Corpus-mined broad-evidence terms added (claimed, threshold, resident, exemption, withholding, declaration, tax free threshold; measured p90 distance <=45 chars from checksum-valid TFNs across two production tenants). Test cases upgraded to checksum-valid should_match values (the old 123 456 789-family values were checksum-invalid AND on the TextMatchFilter exclusion guard) plus invalid-twin should_not_match regression values.'
  - version: 2.5.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 605 without changing detector or package metadata.'
  - version: 2.5.0
    date: '2026-07-13'
    description: 'Burn-down final-review follow-up: widen the 2.4.0 guards to separator-aware form ((?!0{3}[\s\-]?0{3}[\s\-]?0{3}\b) / same for 1s, both regex copies) — the contiguous-only guards left "000 000 000"/"111-111-111" matching because the base regex admits [\s\-] separators; the separator-aware lookaheads subsume the contiguous forms. Two separator-form should_not_match values added as regression guards.'
  - version: 2.4.0
    date: '2026-07-12'
    description: 'Baseline burn-down C: guard the top-level regex (and mirrored Pattern_taxation_id purview copy) against the all-zeros and all-ones placeholders "000000000"/"111111111" with negative lookaheads ((?!0{9}\b)(?!1{9}\b)), mirroring the AllDigitsSameFilter/TextMatchFilter intent at the universal-engine top-level layer that ci-check.mjs evaluates independently of purview filters.'
  - version: 2.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 2.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 2.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
