schema: testpattern/v1
name: South Africa Tax Reference Number
slug: za-tax-number
version: 1.1.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects South African income tax reference numbers (TIN) allocated by the South African Revenue Service
  (SARS) under section 24 of the Tax Administration Act, 2011. The number is ten digits, may only start with
  0, 1, 2, 3 or 9, and its tenth digit is a check digit computed with a modulus-10 (Luhn-style) algorithm
  documented by SARS.
operation: >-
  Regex pattern (boost_regex engine). Pattern_za_tax matches ten digits whose first digit is 0, 1, 2, 3 or 9.
  The SARS modulus-10 check digit (double alternate digits, digit-sum results over 9, check = 10 minus total
  mod 10) is NOT enforced in this regex-only pattern; structural detection only. Three confidence tiers: High
  (85) requires tax-reference evidence (min 2 unique terms) with template exclusion; Medium (75) requires
  tax-reference evidence with template exclusion; Low (65) requires tax-reference evidence. AllDigitsSameFilter
  is load-bearing: an all-zeros value (0000000000) passes the SARS modulus-10 algorithm and starts with a
  permitted digit, so repeated-digit placeholders must be filtered.
pattern: \b[01239]\d{9}\b
confidence: medium
confidence_justification: >-
  Medium confidence: ten digits with a five-value leading-digit constraint is a weak structural signal on its
  own (South African phone numbers are also ten digits starting with 0), so corroborating SARS / tax-reference
  keywords are required on every tier and the checksum is documented for downstream validators.
  recommended_confidence is the evidence-gated 75 workhorse tier per registry convention.
jurisdictions:
  - za
regulations:
  - POPIA
  - Tax Administration Act 2011 (South Africa)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - financial
corroborative_evidence:
  keywords:
    - tax reference number
    - income tax
    - SARS
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: 'Tax Reference Number = 0001339050 per the SARS assessment (IT34)'
      description: SARS-documented example value with label context
    - value: 'income tax reference 0123456789 registered with SARS eFiling'
      description: OECD/SARS structure example starting with 0
    - value: '9123456789'
      description: Ten digits starting with 9 (entity range)
    - value: 'belastingverwysingsnommer: 2001234567'
      description: Afrikaans tax-reference label with number starting 2
  should_not_match:
    - value: '4123456789'
      description: Tax reference numbers may only start with 0, 1, 2, 3 or 9
    - value: '512345678'
      description: Nine digits and an invalid leading digit
    - value: '01234567890'
      description: Eleven digits — too long, not matched inside a longer digit run
    - value: '0000000000'
      description: Repeated-digit placeholder — passes the SARS modulus-10 check but is suppressed by AllDigitsSameFilter
false_positives:
  - description: South African telephone numbers are ten digits beginning with 0 and collide heavily with the bare numeric shape.
    mitigation: Every tier requires SARS / tax-reference keywords within the 300-character proximity window; phone-adjacent text rarely carries those terms. The SARS modulus-10 check digit cannot be expressed in regex and is documented in operation for downstream validators.
  - description: Bank account, invoice and customer numbers of ten digits starting with a permitted digit.
    mitigation: Keyword gating on every tier plus the template-exclusion NOT-group on the high and medium tiers; AllDigitsSameFilter removes repeated-digit test values.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 7
risk_description: >-
  Tax identification numbers link directly to an individual's financial records with government authorities.
  Exposure can facilitate tax fraud, unauthorized access to tax accounts, and financial identity theft.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_za_tax
      matches:
        - ref: Evidence_za_tax
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_za_tax
      matches:
        - ref: Evidence_za_tax
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_za_tax
      matches:
        - ref: Evidence_za_tax
  regexes:
    - id: Pattern_za_tax
      pattern: \b[01239]\d{9}\b
  keywords:
    - id: Evidence_za_tax
      groups:
        - match_style: word
          terms:
            - tax reference number
            - income tax reference
            - income tax reference number
            - taxpayer reference number
            - tax reference
            - tax number
            - income tax number
            - SARS
            - South African Revenue Service
            - eFiling
            - belastingverwysingsnommer
            - text: TIN
              case_sensitive: true
      strength: specific
  filters:
    - id: Filter_za_tax_same_digits
      type: AllDigitsSameFilter
references:
  - url: https://www.oecd.org/content/dam/oecd/en/topics/policy-issue-focus/aeoi/south-africa-tin.pdf
    title: OECD AEOI portal — South Africa TIN information (SARS-authored; 10-digit structure, leading digits 0/1/2/3/9, Appendix I modulus-10 validation)
  - url: https://www.sars.gov.za/
    title: South African Revenue Service (issuing authority)
created: '2026-07-08'
updated: '2026-07-09'
