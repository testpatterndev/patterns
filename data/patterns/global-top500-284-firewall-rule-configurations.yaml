schema: testpattern/v1
name: Firewall rule configurations
slug: global-top500-284-firewall-rule-configurations
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies firewall rule configurations patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:firewall\s+rule|security\s+group|access\s+control\s+list|network\s+policy|port\s+rule|ip\s+whitelist|deny\s+rule|allow\s+rule|packet\s+filter)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - firewall rule configurations
    - firewall
    - rule
    - configurations
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: firewall rule
      description: Primary topic phrase match
    - value: security group
      description: Case-insensitive topic phrase match
    - value: access control list
      description: Alternative topic phrase match
    - value: network policy
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: firewall deny
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_firewall_rule_configurations
      matches:
        - ref: Pattern_global_top500_284_firewall_rule_configurations_label_context
        - ref: Keyword_global_top500_284_firewall_rule_configurations_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_284_firewall_rule_configurations_noise_exclusion
    - confidence_level: 75
      id_match: Regex_firewall_rule_configurations
      matches:
        - ref: Keyword_firewall_rule_configurations
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_284_firewall_rule_configurations_noise_exclusion
    - confidence_level: 65
      id_match: Regex_firewall_rule_configurations
      matches:
        - ref: Keyword_firewall_rule_configurations
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_284_firewall_rule_configurations_noise_exclusion
  regexes:
    - id: Regex_firewall_rule_configurations
      pattern: (?is)\b(?:firewall\s+rule|security\s+group|access\s+control\s+list|network\s+policy|port\s+rule|ip\s+whitelist|deny\s+rule|allow\s+rule|packet\s+filter)\b
    - id: Pattern_global_top500_284_firewall_rule_configurations_label_context
      pattern: (?i)\\b(?:firewall\\s+rule\\s+configurations|firewall|rule|configurations|top500)\\b
  keywords:
    - id: Keyword_firewall_rule_configurations
      groups:
        - match_style: word
          terms:
            - firewall rule
            - security group
            - access control list
            - acl
            - network policy
            - ingress
            - egress
            - port rule
            - ip whitelist
            - deny rule
            - allow rule
            - packet filter
    - id: Keyword_global_top500_284_firewall_rule_configurations_domain_context
      groups:
        - match_style: word
          terms:
            - firewall rule configurations
            - firewall
            - rule
            - configurations
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_284_firewall_rule_configurations_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
