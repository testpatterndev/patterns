schema: testpattern/v1
name: CI/CD pipeline configurations
slug: au-top500-245-ci-cd-pipeline-configurations
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies ci/cd pipeline configurations patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:CI\/CD\s+pipeline|pipeline\s+configuration|build\s+pipeline|deployment\s+pipeline|continuous\s+integration|continuous\s+delivery|pipeline\s+definition|build\s+configuration|pipeline\s+stages|pipeline\s+secrets)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - ci/cd pipeline configurations
    - pipeline
    - configurations
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: CI/CD pipeline
      description: Primary topic phrase match
    - value: pipeline configuration
      description: Case-insensitive topic phrase match
    - value: build pipeline
      description: Alternative topic phrase match
    - value: deployment pipeline
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_cicd_pipeline_configs
      matches:
        - ref: Evidence_cicd_pipeline_configs
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_cicd_pipeline_configs
      matches:
        - ref: Evidence_cicd_pipeline_configs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_cicd_pipeline_configs
      matches:
        - ref: Evidence_cicd_pipeline_configs
  regexes:
    - id: Pattern_cicd_pipeline_configs
      pattern: >-
        (?is)\b(?:CI\/CD\s+pipeline|pipeline\s+configuration|build\s+pipeline|deployment\s+pipeline|continuous\s+integration|continuous\s+delivery|pipeline\s+definition|build\s+configuration|pipeline\s+stages|pipeline\s+secrets)\b
  keywords:
    - id: Evidence_cicd_pipeline_configs
      groups:
        - match_style: word
          terms:
            - CI/CD pipeline
            - pipeline configuration
            - build pipeline
            - deployment pipeline
            - continuous integration
            - continuous delivery
            - pipeline definition
            - build configuration
            - pipeline stages
            - pipeline secrets
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
