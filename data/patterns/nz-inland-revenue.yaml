schema: testpattern/v1
name: New Zealand Inland Revenue number
slug: nz-inland-revenue
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects New Zealand Inland Revenue number patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type. Due to the numeric format, corroborative evidence keywords
  are essential for reliable detection.
operation: >-
  Corroborative evidence: 5 keywords within 300 characters.
  Keyword lists: tax-id, nz-financial.
pattern: '\b\d{8,9}\b'
confidence: medium
confidence_justification: >-
  Medium confidence: eight to nine digit numbers are very common. Keywords like 'IRD' or 'inland revenue' are essential for reliable New Zealand tax number detection.
jurisdictions:
  - nz
regulations:
- "Privacy Act 2020 (NZ)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - pii
  - financial
  - government-id
corroborative_evidence:
  keywords:
    - IRD
    - inland revenue
    - tax number
    - IR number
    - GST number
  proximity: 300
  keyword_lists:

    - tax-id

    - nz-financial
test_cases:
  should_match:
    - value: '12345678'
      description: Eight-digit NZ IRD number
    - value: '123456789'
      description: Nine-digit NZ IRD number
    - value: '98765432'
      description: NZ Inland Revenue format
  should_not_match:
    - value: '1234567'
      description: Seven digits, too short for NZ IRD number
    - value: '1234567890'
      description: Ten digits, exceeds NZ IRD number format
false_positives:
  - description: Generic numeric sequences in non-tax contexts such as reference numbers or account identifiers
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to distinguish
      tax identifiers from general numeric data.
  - description: Numbers from other identification schemes with similar digit patterns
    mitigation: >-
      Layer with jurisdiction-specific detection to prioritise matches in tax-related documents
      and cross-reference with other identifier types.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_nz_ird
      matches:
        - ref: Keyword_nz_ird
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_nz_ird
  regexes:
    - id: Regex_nz_ird
      pattern: '\b\d{8,9}\b'
  keywords:
    - id: Keyword_nz_ird
      groups:
        - match_style: word
          terms:
            - text: IRD
              case_sensitive: true
            - inland revenue
            - tax number
            - IR number
            - GST number
            - IRD number
            - tax file number
            - tax identification
            - Inland Revenue Department
            - taxpayer number
            - GST registration
            - tax return
      strength: specific
  filters:
    - id: Filter_nz_ird_same_digits
      type: AllDigitsSameFilter
risk_rating: 7
risk_description: >-
  Tax identification numbers link directly to an individual's financial records with government authorities. Exposure can facilitate tax fraud, unauthorized access to tax accounts, and financial identity theft.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Financial"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-new-zealand-inland-revenue-number
    title: "New Zealand Inland Revenue number entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
source: microsoft
license: MIT
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.'
