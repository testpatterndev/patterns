schema: testpattern/v1
name: Internal audit workpapers
slug: global-top500-172-internal-audit-workpapers
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to internal audit workpapers in international contexts. This content represents confidential assurance workpapers (engagement evidence, findings, testing,
  and management responses); it is not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:internal\s+audit\s+workpapers|internal\s+audit|audit\s+workpaper|audit\s+finding|audit\s+evidence|audit\s+trail|control\s+testing|audit\s+program|risk\s+assessment|audit\s+recommendation|management\s+response|audit\s+opinion)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - internal audit workpapers
    - internal
    - audit
    - workpapers
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: internal audit workpapers
      description: Primary topic phrase match
    - value: internal audit
      description: Case-insensitive topic phrase match
    - value: audit workpaper
      description: Alternative topic phrase match
    - value: audit finding
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to internal audit workpapers appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_internal_audit_workpapers
      matches:
        - ref: Pattern_global_top500_172_internal_audit_workpapers_label_context
        - ref: Keyword_global_top500_172_internal_audit_workpapers_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_internal_audit_workpapers
      matches:
        - ref: Keyword_internal_audit_workpapers
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_internal_audit_workpapers
      pattern: >-
        (?is)\b(?:internal\s+audit\s+workpapers|internal\s+audit|audit\s+workpaper|audit\s+finding|audit\s+evidence|audit\s+trail|control\s+testing|audit\s+program|risk\s+assessment|audit\s+recommendation|management\s+response|audit\s+opinion)\b
    - id: Pattern_global_top500_172_internal_audit_workpapers_label_context
      pattern: (?i)\b(?:internal\s+audit\s+workpapers)\b
  keywords:
    - id: Keyword_internal_audit_workpapers
      groups:
        - match_style: word
          terms:
            - internal audit workpapers
            - internal audit
            - audit workpaper
            - audit finding
            - audit evidence
            - audit trail
            - control testing
            - audit program
            - risk assessment
            - audit recommendation
            - management response
            - audit opinion
      strength: specific
    - id: Keyword_global_top500_172_internal_audit_workpapers_domain_context
      groups:
        - match_style: word
          terms:
            - internal audit workpapers
            - internal
            - audit
            - workpapers
      strength: domain
risk_description: >-
  This detector matches internal-audit workpapers, findings, evidence, trails, testing, programs, recommendations, management responses, and opinions rather than validating a completed audit file. Real workpapers can reveal sampled transactions, control failures, unresolved findings, staff explanations, and the auditor's testing approach, enabling concealment, fraud targeting, or interference with remediation. The ordinary scope is one audit engagement and the functions or people examined, while standards, methodologies, and blank workpaper templates can match the same vocabulary. Risk 8 and SENSITIVE reflect serious contained organizational and personal harm; PROTECTED would require critical-system weaknesses or significant damage to a protected operation.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
