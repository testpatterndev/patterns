schema: testpattern/v1
name: Special education plans
slug: global-top500-345-special-education-plans
version: 1.2.3
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  DEPRECATED — merged into au-qld-special-needs-education-plan. Identifies documents containing references to special
  education plans in international contexts. This information type is classified as personally identifiable information
  under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match
  domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: industry-education.
  Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:special\s+education|education\s+plan|individualized\s+education|learning\s+support|disability\s+accommodation|learning\s+disability|special\s+needs|adjustment\s+plan|inclusion\s+support)\b
confidence: medium
confidence_justification: >-
  category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context
  gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - special education plans
    - special
    - education
    - plans
    - research
    - administration
  proximity: 300
  keyword_lists:
    - industry-education
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: special education
      description: Primary topic phrase match
    - value: education plan
      description: Case-insensitive topic phrase match
    - value: individualized education
      description: Alternative topic phrase match
    - value: learning support
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: >-
      Common words and phrases related to special education plans appearing in policy documents, training materials, HR
      templates, or compliance guidelines without actual personal data.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than
      general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative
      contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
  - description: >-
      High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
      significantly higher than specific identifier patterns.
    mitigation: >-
      Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
      validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  This global detector recognises special education, education plan, and individualized education language with nearby
  education terms. A normal true positive is a personalised plan describing a student's disability, developmental needs,
  accommodations, goals, and support services, with substantial privacy and discrimination consequences. General
  inclusion policy, professional training, and blank planning forms can also match because the detector does not confirm
  attribution or populated clinical detail. Risk 8 SENSITIVE fits an individual plan, while PROTECTED requires immediate
  child-safety information, a bulk vulnerable-student register, or significant damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_special_education_plans
      matches:
        - ref: Pattern_global_top500_345_special_education_plans_label_context
        - ref: Keyword_global_top500_345_special_education_plans_domain_context
        - ref: Keyword_special_education_plans
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_special_education_plans
      matches:
        - ref: Pattern_global_top500_345_special_education_plans_label_context
        - ref: Keyword_global_top500_345_special_education_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_special_education_plans
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_special_education_plans
      pattern: >-
        (?is)\b(?:special\s+education|education\s+plan|individualized\s+education|learning\s+support|disability\s+accommodation|learning\s+disability|special\s+needs|adjustment\s+plan|inclusion\s+support)\b
    - id: Pattern_global_top500_345_special_education_plans_label_context
      pattern: (?i)\b(?:special\s+education\s+plans)\b
  keywords:
    - id: Keyword_special_education_plans
      groups:
        - match_style: word
          terms:
            - special education
            - education plan
            - text: IEP
              case_sensitive: true
            - individualized education
            - learning support
            - education
            - administration
            - disability accommodation
            - learning disability
            - special needs
            - adjustment plan
            - inclusion support
      strength: specific
    - id: Keyword_global_top500_345_special_education_plans_domain_context
      groups:
        - match_style: word
          terms:
            - special education plans
            - special
            - education
            - plans
      strength: domain
