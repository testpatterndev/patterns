schema: testpattern/v1
name: Ruby on Rails Secret Credentials
slug: snaffler-rails-secrets
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Detects secret credentials embedded in Ruby on Rails configuration files:
  secret_token/secret_key_base assignments (config/initializers/secret_token.rb,
  config/secrets.yml), database passwords (config/database.yml), and Chef knife
  client keys (knife.rb). These files are frequently committed to source control
  and expose application secrets and infrastructure access. Mirrors Snaffler rule
  KeepRubyByName.
operation: >-
  Three distinct credential forms are detected: (1) Rails secret token/key_base
  assignment — 30+ hex char value indicating a real generated secret; (2) database.yml
  password field with a non-whitespace value of 4+ characters (generic but gated to
  production context); (3) knife.rb client_key assignment with a credential-length
  value. Tier gating: secret_token/key_base fires at 65+ (structurally specific);
  database.yml password fires at 75+ (gated on adapter/production evidence);
  knife.rb client_key fires at 75+ (gated on Chef evidence).
pattern: 'secret_(?:token|key_base)\s*=\s*[''"][a-f0-9]{30,}'
confidence: medium
confidence_justification: >-
  Medium confidence: secret_token and secret_key_base are Rails-specific field names
  with highly constrained hex values, making false positives rare. The database.yml
  password form is intentionally generic and depends on evidence gating (adapter,
  production block) for precision. knife.rb client_key is specific to Chef tooling.
  Combined, the pattern family covers the majority of Rails-stack secrets found in
  source repositories.
jurisdictions:
  - global
regulations:
  - GDPR
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
  - application-secrets
corroborative_evidence:
  keywords:
    - production
    - adapter
    - secret_key_base
    - Rails.application
    - database.yml
    - secret_token
    - knife.rb
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: "Rails.application.config.secret_token = 'a3f1b2c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1'"
      description: Rails 3.x secret_token initializer with 64-char hex value
    - value: "secret_key_base = 'b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3'"
      description: Rails 4+ secret_key_base YAML assignment with 64-char hex value
    - value: "production:\n  adapter: postgresql\n  database: myapp_prod\n  password: Sup3rS3cr3tProd"
      description: database.yml production block with password field
    - value: "client_key = '/etc/chef/client.pem'\nclient_key = 'knife_client_secret_key_value'"
      description: knife.rb client_key assignment
    - value: "  secret_key_base: 'deadbeef1234567890abcdef1234567890abcdef1234567890abcdef12345678'"
      description: secrets.yml secret_key_base with spaces and colon syntax
    - value: '  password: "S3cr3tDbPass!"'
      description: database.yml password field with double-quoted value (common YAML style)
  should_not_match:
    - value: "# secret_key_base is configured in config/secrets.yml"
      description: Comment referencing secret_key_base with no assignment
    - value: "production:\n  adapter: postgresql\n  database: myapp_prod\n  # password:"
      description: database.yml production block with commented-out empty password
    - value: "Your secret_token should be kept private and never committed to source control."
      description: Documentation prose about secret_token with no credential assignment
false_positives:
  - description: >-
      Example Rails secret_token values in tutorials, READMEs, and
      documentation that use synthetic 64-char hex strings as illustrations.
    mitigation: Gate at tier 75 on production/adapter evidence to require
      database.yml context; secret_token/key_base form is self-constraining via
      hex character class.
  - description: >-
      database.yml password field in development or test environments which
      may use weak or placeholder passwords (password, secret, etc.).
    mitigation: The pattern captures these as well — treat as a hygiene finding
      even for non-production blocks. Increase tier requirement for high-risk
      escalation to 85+ with production evidence.
  - description: >-
      knife.rb client_key pointing to a file path rather than an inline secret.
    mitigation: Path values typically contain slashes — the pattern minimum of
      1 character captures paths too. Gate on Chef-context evidence.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Regex_snaffler_rails_secret_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_rails_secret_token
      matches:
        - ref: Keyword_snaffler_rails_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_rails_db_password
      matches:
        - ref: Keyword_snaffler_rails_db_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_knife_client_key
      matches:
        - ref: Keyword_snaffler_knife_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_rails_secret_token
      matches:
        - ref: Keyword_snaffler_rails_context
        - ref: Keyword_snaffler_rails_db_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_rails_secret_token
      pattern: 'secret_(?:token|key_base)\s*[=:]\s*[''"][a-f0-9]{30,}'
    - id: Regex_snaffler_rails_db_password
      pattern: 'password\s*:\s*(?:[^\s#''\"]{4,}|''[^'']{2,}''|\"[^\"]{2,}\")'
    - id: Regex_snaffler_knife_client_key
      pattern: 'client_key\s*[:=]\s*[''"][\s\S]{0,40}'
  keywords:
    - id: Keyword_snaffler_rails_context
      groups:
        - match_style: word
          terms:
            - Rails.application
            - secret_key_base
            - secret_token
            - config.secret
            - initializers
    - id: Keyword_snaffler_rails_db_context
      groups:
        - match_style: word
          terms:
            - production
            - adapter
            - database.yml
            - postgresql
            - mysql2
    - id: Keyword_snaffler_knife_context
      groups:
        - match_style: word
          terms:
            - knife.rb
            - chef_server_url
            - node_name
            - client_key
risk_rating: 9
risk_description: >-
  Exposure of Rails secret_key_base allows an attacker to forge signed session
  cookies and gain arbitrary code execution via Marshal deserialization. Database
  credentials enable direct exfiltration of the application database. Chef client
  keys grant administrative access to the infrastructure orchestration layer.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
