schema: testpattern/v1
name: Policy attestation records
slug: global-top500-477-policy-attestation-records
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to policy attestation records in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:policy\s+attestation|attestation\s+record|policy\s+acknowledgment|employee\s+attestation|compliance\s+attestation|annual\s+certification|policy\s+acceptance|training\s+completion|code\s+of\s+conduct|privacy\s+compliance|attestation\s+date|sign[\s-]+off\s+record)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - policy attestation records
    - policy
    - attestation
    - records
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: policy attestation
      description: Primary topic phrase match
    - value: attestation record
      description: Case-insensitive topic phrase match
    - value: policy acknowledgment
      description: Alternative topic phrase match
    - value: employee attestation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to policy attestation records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_policy_attestation
      matches:
        - ref: Pattern_global_top500_477_policy_attestation_records_label_context
        - ref: Keyword_global_top500_477_policy_attestation_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_policy_attestation
      matches:
        - ref: Keyword_policy_attestation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_policy_attestation
      pattern: >-
        (?is)\b(?:policy\s+attestation|attestation\s+record|policy\s+acknowledgment|employee\s+attestation|compliance\s+attestation|annual\s+certification|policy\s+acceptance|training\s+completion|code\s+of\s+conduct|privacy\s+compliance|attestation\s+date|sign[\s-]+off\s+record)\b
    - id: Pattern_global_top500_477_policy_attestation_records_label_context
      pattern: (?i)\b(?:policy\s+attestation\s+records)\b
  keywords:
    - id: Keyword_policy_attestation
      groups:
        - match_style: word
          terms:
            - policy attestation
            - attestation record
            - policy acknowledgment
            - employee attestation
            - compliance attestation
            - annual certification
            - policy acceptance
            - training completion
            - code of conduct
            - privacy compliance
            - attestation date
            - sign-off record
      strength: specific
    - id: Keyword_global_top500_477_policy_attestation_records_domain_context
      groups:
        - match_style: word
          terms:
            - policy attestation records
            - policy
            - attestation
      strength: domain
risk_description: >-
  The detector recognizes policy attestations, acknowledgments, employee sign-offs, compliance certifications, policy acceptance, training completion, conduct codes, attestation dates, and sign-off records rather than validating a signed entry. One genuine record normally shows that a person accepted a policy or completed training, which may support minor employment or compliance misuse but does not disclose the policy breach or broader personnel file. The affected unit is one worker and one obligation, and harmful use generally requires identity, disciplinary, or case context; policies and blank attestations are common matches. Risk 5 and OFFICIAL fit this bounded standalone exposure, while a bulk register tied to misconduct, sanctions, or sensitive employment decisions would reach SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
