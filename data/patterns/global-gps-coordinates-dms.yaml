schema: testpattern/v1
name: Geographic Coordinates (DMS / MGRS)
slug: global-gps-coordinates-dms
version: 1.2.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects geographic coordinates written in degrees-minutes-seconds (DMS) form with a hemisphere letter
  (e.g. 40 deg 26' 46" N) and in Military Grid Reference System (MGRS) form (e.g. 4QFJ 12345 67890). The registry
  already covers decimal-degree coordinates; this adds the DMS and MGRS notations commonly found in mapping exports,
  surveying records, defence/geospatial documents and EXIF-derived location data.
operation: >-
  Reference: https://en.wikipedia.org/wiki/Geographic_coordinate_conversion
  First alternative matches DMS with hemisphere-bounded ranges: N/S latitude 0-90 and E/W longitude 0-180 degrees,
  minutes and seconds 0-59 (seconds may carry a decimal), with the 90/180 endpoints requiring zero minutes and
  seconds; degree/minute/second marks and a trailing hemisphere letter are required. Second alternative matches
  MGRS: grid zone designator (1-2 digit zone + band letter) + 100km square (two letters) + an even run of
  easting/northing digits.
pattern: \b(?:90\s?[°º]\s?0{1,2}\s?['′]\s?0{1,2}(?:\.0+)?\s?["″]?\s?[NSns]\b|[0-8]?\d\s?[°º]\s?[0-5]?\d\s?['′]\s?[0-5]?\d(?:\.\d+)?\s?["″]?\s?[NSns]\b|180\s?[°º]\s?0{1,2}\s?['′]\s?0{1,2}(?:\.0+)?\s?["″]?\s?[EWew]\b|(?:1[0-7]\d|\d{1,2})\s?[°º]\s?[0-5]?\d\s?['′]\s?[0-5]?\d(?:\.\d+)?\s?["″]?\s?[EWew]\b)|(?<![A-Za-z0-9])\d{1,2}[C-HJ-NP-Xc-hj-np-x][A-HJ-NP-Za-hj-np-z][A-HJ-NP-Va-hj-np-v]\s?\d{2,5}\s?\d{2,5}(?![A-Za-z0-9])
confidence: medium
confidence_justification: >-
  Medium confidence: the DMS branch is well constrained by the degree/minute/second marks and a hemisphere letter, but
  the MGRS branch can collide with other letter-then-digit identifiers. Corroborative location keywords within 300
  characters improve precision for bulk scanning.
jurisdictions:
  - global
regulations:
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - location
  - pii
corroborative_evidence:
  keywords:
    - coordinates
    - latitude
    - longitude
    - GPS
    - location
    - geolocation
    - grid reference
    - MGRS
  proximity: 300
test_cases:
  should_match:
    - value: 40° 26' 46" N
      description: DMS latitude with degree/minute/second marks and N hemisphere
    - value: '151° 12′ 33.4″ E'
      description: DMS with prime/double-prime marks and decimal seconds, E hemisphere
    - value: 4QFJ 12345 67890
      description: MGRS reference, grid zone 4Q, square FJ, easting/northing
    - value: 180° 00' 00" E
      description: Exact longitude endpoint with zero minutes/seconds is valid
    - value: 90° 00' 00" N
      description: Exact latitude endpoint with zero minutes/seconds is valid
  should_not_match:
    - value: 40.4461, -79.9822
      description: Decimal-degree coordinates, covered by the decimal-degrees pattern not this one
    - value: 40 26 46
      description: Three numbers with no degree marks or hemisphere - not DMS
    - value: the survey crew recorded the grid reference in the field notebook
      description: Prose mention of a grid reference with no actual coordinate
    - value: 40° 60' 00" N
      description: Minutes cannot be 60
    - value: 999° 99' 99" N
      description: Out-of-range degrees/minutes/seconds must be rejected
    - value: 180° 00' 01" E
      description: Nonzero seconds beyond the longitude endpoint are invalid
    - value: 91° 10' 10" N
      description: Latitude above 90 degrees is invalid
    - value: Surveyors recorded weather conditions before beginning fieldwork.
      description: Ordinary survey notes contain neither a bounded DMS coordinate nor an MGRS grid reference
false_positives:
  - description: MGRS-like tokens (zone digits + two letters + digit runs) appearing in part numbers or codes.
    mitigation: Require corroborative location keywords (coordinates, latitude, grid reference, MGRS) within 300 characters.
  - description: Temperature or angle values written with a degree mark but no minutes/seconds or hemisphere.
    mitigation: The DMS branch requires minutes, seconds and a hemisphere letter, excluding bare degree values.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The regex detects a single geographic point expressed in degrees, minutes, and seconds with a hemisphere or as a Military Grid Reference System coordinate. Coordinates can locate anything from a public landmark and survey point to a residence, field asset, or photograph, and the match itself does not identify the subject, owner, or reason for being there. Standalone misuse is therefore limited, although harm rises when the point is linked to a vulnerable person, repeated movement, an endangered species, or restricted infrastructure. Risk 4 and OFFICIAL are appropriate; SENSITIVE would require that attribution, a non-public operational location, a movement trail, or an aggregated set revealing sensitive activity.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  pattern_tiers:
    - confidence_level: 65
      id_match: Pattern_gps_dms
      discovery_only: true
      description: Bounded DMS coordinate (discovery inventory only — no enforcement tiers authored yet)
    - confidence_level: 65
      id_match: Pattern_gps_mgrs
      discovery_only: true
      description: MGRS grid reference as authored (discovery inventory only — MGRS hardening deferred)
  regexes:
    - id: Pattern_gps_dms
      pattern: \b(?:90\s?[°º]\s?0{1,2}\s?['′]\s?0{1,2}(?:\.0+)?\s?["″]?\s?[NSns]\b|[0-8]?\d\s?[°º]\s?[0-5]?\d\s?['′]\s?[0-5]?\d(?:\.\d+)?\s?["″]?\s?[NSns]\b|180\s?[°º]\s?0{1,2}\s?['′]\s?0{1,2}(?:\.0+)?\s?["″]?\s?[EWew]\b|(?:1[0-7]\d|\d{1,2})\s?[°º]\s?[0-5]?\d\s?['′]\s?[0-5]?\d(?:\.\d+)?\s?["″]?\s?[EWew]\b)
      description: DMS coordinate with hemisphere-bounded degree ranges, 0-59 minutes/seconds, and zero-subdivision endpoints
    - id: Pattern_gps_mgrs
      pattern: (?<![A-Za-z0-9])\d{1,2}[C-HJ-NP-Xc-hj-np-x][A-HJ-NP-Za-hj-np-z][A-HJ-NP-Va-hj-np-v]\s?\d{2,5}\s?\d{2,5}(?![A-Za-z0-9])
      description: MGRS grid reference as originally authored (zone/precision hardening deferred pending test coverage)
created: '2026-06-13'
