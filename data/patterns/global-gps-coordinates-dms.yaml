changelog:
  - version: 1.2.0
    date: '2026-07-17'
    description: 'TP-00843 approved reduced scope: harden the DMS branch only — split into hemisphere-bounded latitude (0-90, N/S) and longitude (0-180, E/W) alternatives, constrain minutes/seconds to 0-59, and require zero minutes/seconds at the 90/180 endpoints; documented the bounds in the operation text. The MGRS branch is deliberately unchanged: per QA/independent review the proposed MGRS rewrite is not approval-ready (no valid equal-precision MGRS positive and no zone 00/60/61 boundary tests supplied). Added a minimal purview block with discovery-only 65 tiers derived from the authored regex (Pattern_gps_dms + Pattern_gps_mgrs) so pattern_tiers exist for export; no enforcement tiers authored. Added endpoint positives and out-of-range negatives (60 minutes, 999 degrees, endpoint-plus-one-second, 91 degrees latitude).'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1540 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
