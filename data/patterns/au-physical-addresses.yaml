schema: testpattern/v1
name: Australia Physical Addresses
slug: au-physical-addresses
version: 1.0.0
type: keyword_list
pattern_class: concept
description: >-
  Catalogue reference for the Microsoft Purview built-in Australia physical addresses named-entity SIT.
  Microsoft rates the built-in at medium confidence and includes it in All Physical Addresses. This
  YAML-only record supplies supplementary Australian address vocabulary for registry search and testing;
  it does not reproduce Microsoft's opaque named-entity engine and is not a custom XML clone.
operation: >-
  In Microsoft Purview, enable the built-in Australia physical addresses SIT to use Microsoft's
  country-specific address formats, settlement and region dictionaries, street suffixes, and postcode
  patterns. The TestPattern representation below is supplementary keyword logic only and exports YAML,
  so its own low confidence must not be confused with the built-in SIT's documented medium confidence.
keywords:
  - street
  - road
  - avenue
  - drive
  - crescent
  - parade
  - terrace
  - circuit
  - highway
  - rise
  - postcode
  - PO Box
  - GPO Box
  - locked bag
  - residential address
  - mailing address
confidence: low
confidence_justification: >-
  Low confidence for this supplementary TestPattern record: Australian address words alone do not prove
  a populated address. The Microsoft built-in uses additional named-entity resources that are unavailable
  to a custom XML rule and is separately documented by Microsoft at medium confidence.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - contact-information
  - location
test_cases:
  should_match:
    - value: 'Residential address: 18 Banksia Road, Brisbane QLD 4000'
      description: Supplementary record contains Australian road and residential-address vocabulary
    - value: 'Mailing address: GPO Box 144, Brisbane QLD 4001'
      description: Supplementary record contains Australian postal-delivery vocabulary
    - value: 'Unit 4, 12 Ocean Rise, Redcliffe QLD 4020'
      description: Supplementary record contains a postcode term in populated address context
  should_not_match:
    - value: quarterly financial report for fiscal year 2024
      description: Business text with no address vocabulary
    - value: the meeting is scheduled for next Tuesday morning
      description: Scheduling text with no address vocabulary
false_positives:
  - description: Road types, postcode labels, and address-field labels in forms or general prose can match without a populated address.
    mitigation: Use the Microsoft built-in SIT or a structural custom detector when value-level address detection is required.
  - description: Business premises, landmarks, and public venues are physical addresses but may not be personal information.
    mitigation: Add person, resident, account, or other attribution context when the policy objective is personal residential data.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_au_physical_address_primary
      matches:
        - ref: Keyword_au_physical_address_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_au_physical_address_primary
  keywords:
    - id: Keyword_au_physical_address_primary
      groups:
        - match_style: word
          terms:
            - Street
            - Road
            - Avenue
            - Drive
            - Crescent
            - Parade
            - Terrace
            - Circuit
            - Highway
            - Rise
            - PO Box
            - GPO Box
            - locked bag
      strength: domain
    - id: Keyword_au_physical_address_context
      groups:
        - match_style: word
          terms:
            - residential address
            - home address
            - mailing address
            - postal address
            - delivery address
            - postcode
            - suburb
            - state
            - territory
            - unit number
            - Australia
      strength: specific
risk_rating: 3
risk_description: >-
  This YAML-only catalogue reference is a low-confidence supplementary keyword representation, not the
  Microsoft named-entity detector. A matching address term may concern a form, venue, business, or public
  place and does not establish a person-location relationship. Risk 3 and OFFICIAL are appropriate;
  populated person-linked residential records require stronger contextual controls.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-australia-physical-addresses
    title: Australia physical addresses entity definition | Microsoft Learn
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-all-physical-addresses
    title: All Physical Addresses entity definition | Microsoft Learn
created: '2026-07-19'
updated: '2026-07-19'
author: testpattern-community
source: microsoft
