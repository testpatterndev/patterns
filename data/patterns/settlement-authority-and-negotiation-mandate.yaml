schema: testpattern/v1
name: Settlement Authority and Negotiation Mandate
slug: settlement-authority-and-negotiation-mandate
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects documents authorising settlement ranges, negotiation floors/ceilings, and approved concession parameters. Disclosure reveals the State's maximum position, destroying negotiation leverage and potentially costing tens of millions in lost bargaining position.
operation: 'Primary detection: keyword proximity matching settlement/negotiation authority terms within 200 characters of approval indicators (''approved'', ''authorised'') or currency amounts. Regex detection: dollar amounts ($X,XXX,XXX or $X.XM format) near settlement/authority keywords. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:settlement\s+(?:authority|mandate|range)|negotiation\s+(?:authority|mandate)|authority\s+to\s+settle)\b
confidence: high
confidence_justification: 'High confidence: Settlement authority terminology is highly specific to legal practice authorisation workflows. Combined with dollar amounts and approval language, detection precisely targets actual authorisation documents rather than general discussion.'
jurisdictions:
  - au
regulations:
- "Evidence Act 1977 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - approved
    - authorised
    - authority
    - delegate
    - ceiling
    - floor
    - range
    - maximum
    - minimum
    - concession
    - privileged
    - PROTECTED
    - without prejudice
    - LPP
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        PROTECTED — LEGAL PROFESSIONAL PRIVILEGE
        Settlement Authority

        Matter: Williams v State of Queensland
        Court: Supreme Court of Queensland

        The Director-General has authorised a settlement range of $2,500,000 to $4,200,000 inclusive of costs. The negotiation ceiling is $4,200,000.
      description: Settlement authority document with approved dollar range
    - value: I seek authority to settle the above matter within the range of $850,000 to $1.2M. The negotiation mandate should authorise the instructing solicitor to offer up to the ceiling without further reference.
      description: Request for settlement authority with dollar amounts
    - value: |-
        CONFIDENTIAL — WITHOUT PREJUDICE
        Negotiation Authority
        Approved by: Under Treasurer (Financial Delegate)
        Matter: Native title compensation — Cape York Region
        Approved settlement range: $15M - $22.5M over 10 years
      description: Negotiation authority for native title settlement
  should_not_match:
    - value: The parties reached a settlement of $3.2 million after mediation. The terms of settlement were recorded in consent orders filed with the court.
      description: Published settlement outcome in court records
    - value: The settlement authority process in Queensland Government requires approval from the appropriate financial delegate as outlined in the Financial Accountability Handbook.
      description: Public policy document describing settlement authority processes
    - value: The negotiation concluded with both parties agreeing to a compromise position. The mediator's report was published in the annual dispute resolution statistics.
      description: Published mediation outcome report
false_positives:
  - description: Published settlement outcomes in court records or consent orders
    mitigation: Negative match on 'consent orders', 'terms of settlement filed', 'court approved'. Focus on pre-settlement authority not post-settlement record
  - description: Policy documents describing settlement authority processes
    mitigation: Negative match on 'handbook', 'guidelines', 'policy', 'procedure'. Require specific dollar amounts or matter references
  - description: Media reports of settlements achieved
    mitigation: Negative match on 'media release', 'announced', 'reported', 'published'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_settlement_authority_and_negotiation_mandate_settlement_negotiation_authority_phrase
      matches:
        - ref: Evidence_settlement_authority_and_negotiation_mandate_primary
        - ref: Evidence_settlement_authority_and_negotiation_mandate_corroborative
        - ref: Evidence_settlement_authority_and_negotiation_mandate_exclusion
        - ref: Pattern_settlement_authority_and_negotiation_mandate_dollar_amount_format
        - ref: Pattern_settlement_authority_and_negotiation_mandate_authority_to_settle_phrase
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_settlement_authority_and_negotiation_mandate_exclusion
    - confidence_level: 75
      id_match: Pattern_settlement_authority_and_negotiation_mandate_settlement_negotiation_authority_phrase
      matches:
        - ref: Evidence_settlement_authority_and_negotiation_mandate_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_settlement_authority_and_negotiation_mandate_exclusion
    - confidence_level: 65
      id_match: Pattern_settlement_authority_and_negotiation_mandate_settlement_negotiation_authority_phrase
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_settlement_authority_and_negotiation_mandate_exclusion
  regexes:
    - id: Pattern_settlement_authority_and_negotiation_mandate_settlement_negotiation_authority_phrase
      pattern: (?i)\b(?:settlement|negotiation)\s+(?:authority|mandate|range)\b
    - id: Pattern_settlement_authority_and_negotiation_mandate_dollar_amount_format
      pattern: \$[\d,]+(?:\.\d{1,2})?(?:\s*[MmBb](?:illion)?)?
    - id: Pattern_settlement_authority_and_negotiation_mandate_authority_to_settle_phrase
      pattern: (?i)\bauthority\s+to\s+settle\b
  keywords:
    - id: Evidence_settlement_authority_and_negotiation_mandate_primary
      groups:
        - match_style: word
          terms:
            - settlement authority
            - settlement mandate
            - negotiation authority
            - negotiation mandate
            - settlement range
            - authority to settle
    - id: Evidence_settlement_authority_and_negotiation_mandate_corroborative
      groups:
        - match_style: word
          terms:
            - approved
            - authorised
            - delegate
            - ceiling
            - floor
            - maximum
            - range
            - privileged
            - PROTECTED
            - without prejudice
            - LPP
            - instructing solicitor
    - id: Evidence_settlement_authority_and_negotiation_mandate_exclusion
      groups:
        - match_style: word
          terms:
            - consent orders
            - terms of settlement filed
            - handbook
            - guidelines
            - media release
            - announced
            - published
    - id: Filter_settlement_authority_and_negotiation_mandate_exclusion
      groups:
        - match_style: word
          terms:
            - consent orders filed
            - court-approved settlement
            - published settlement

risk_rating: 8
risk_description: Documents authorising settlement ranges, negotiation floors/ceilings, and approved concession parameters. Disclosure reveals the State's maximum position, destroying negotiation leverage and potentially costing tens of millions. Legislative review (Mar 2026) established BIL:2 — Evidence Act 1977 (Qld) defines legal professional privilege as an evidentiary rule without criminal penalties for disclosure. RTI Act 2009 Sch3 s7 exempts from compelled disclosure but does not mandate PROTECTED classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Legal"
references: []
