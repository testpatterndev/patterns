schema: testpattern/v1
name: Distributed control system configurations
slug: au-top500-443-distributed-control-system-configurations
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to distributed control system configurations in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:distributed\s+control\s+system|control\s+configuration|controller\s+configuration|process\s+control|industrial\s+control|critical\s+infrastructure|control\s+loop|automation\s+system|Emerson\s+DeltaV)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - distributed control system configurations
    - distributed
    - control
    - system
    - configurations
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: distributed control system
      description: Primary topic phrase match
    - value: control configuration
      description: Case-insensitive topic phrase match
    - value: controller configuration
      description: Alternative topic phrase match
    - value: process control
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: distributed control system configuration
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to distributed control system configurations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_dcs_configurations
      matches:
        - ref: Evidence_dcs_configurations
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_dcs_configurations
      matches:
        - ref: Evidence_dcs_configurations
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_dcs_configurations
      matches:
        - ref: Evidence_dcs_configurations
  regexes:
    - id: Pattern_dcs_configurations
      pattern: (?is)\b(?:distributed\s+control\s+system|control\s+configuration|controller\s+configuration|process\s+control|industrial\s+control|critical\s+infrastructure|control\s+loop|automation\s+system|Emerson\s+DeltaV)\b
  keywords:
    - id: Evidence_dcs_configurations
      groups:
        - match_style: word
          terms:
            - distributed control system
            - DCS
            - control configuration
            - setpoint
            - controller configuration
            - process control
            - industrial control
            - critical infrastructure
            - control loop
            - automation system
            - Honeywell
            - Emerson DeltaV
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
