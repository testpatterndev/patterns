schema: testpattern/v1
name: Distributed control system configurations
slug: au-top500-443-distributed-control-system-configurations
version: 1.6.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive distributed-control-system configuration records. Topic phrases are retained
  for discovery; enforcement requires controller, module, I/O, tag, alarm, or control-loop configuration
  content, and high confidence also requires a deployable tag, value, node, rack, or site reference.
operation: >-
  Pattern_dcs_configurations recognises DCS, controller-configuration, DeltaV, and Experion topics. The
  topic alone is discovery-only at 65. Concrete controller/module/I/O/tag/alarm configuration raises it
  to 75; configuration content plus a tag/value or live node/site reference reaches 85. Enforcing tiers
  reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:distributed\s+control\s+system|DCS\s+configuration|controller\s+configuration|Emerson\s+DeltaV|Honeywell\s+Experion|Yokogawa\s+CENTUM)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires configuration objects rather than a product or architecture mention. High
  confidence adds a deployable tag/value, node, rack, controller, or site reference.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - security
corroborative_evidence:
  keywords:
    - distributed control system configurations
    - distributed
    - control
    - system
    - configurations
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: distributed control system configuration
      description: Low-tier probe - DCS topic without configuration objects
    - value: 'DeltaV DCS configuration: control module, I/O point list, tag database, and alarm limit settings'
      description: Medium-tier probe - substantive configuration objects without live node/value detail
    - value: 'Production DeltaV DCS configuration for controller node DCS-CTRL-07: tag database entry TIC-204 setpoint SP=365, rack 2 slot 4'
      description: High-tier probe - configuration content with live node, tag, value, and rack detail
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: distributed control system configuration
      description: Bare topic phrase surfaces only in discovery
    - value: 'Vendor guide for Honeywell Experion distributed control system architecture'
      description: Vendor architecture prose without configuration objects
    - value: 'Training example: DeltaV DCS configuration tag TIC-204 SP=365 rack 2 slot 4'
      description: Explicit training content must not enforce
false_positives:
  - description: Vendor manuals, architecture guides, and engineering courses discuss DCS products and controller concepts without exposing a live configuration.
    mitigation: Require controller, module, I/O, tag, alarm, or control-loop configuration content before enforcement.
  - description: Labs and training examples can include realistic tags, values, rack/slot locations, and node names.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_dcs_configurations
      matches:
        - ref: Evidence_dcs_configuration_content
        - ref: Evidence_dcs_live_detail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_dcs_configurations
      matches:
        - ref: Evidence_dcs_configuration_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_dcs_configurations
  regexes:
    - id: Pattern_dcs_configurations
      pattern: >-
        (?is)\b(?:distributed\s+control\s+system|DCS\s+configuration|controller\s+configuration|Emerson\s+DeltaV|Honeywell\s+Experion|Yokogawa\s+CENTUM)\b
  keywords:
    - id: Evidence_dcs_configuration_content
      groups:
        - match_style: word
          terms:
            - control module
            - controller module
            - I/O point
            - I/O point list
            - tag database
            - alarm limit
            - setpoint
            - control loop
            - interlock
            - sequence logic
      strength: domain
    - id: Evidence_dcs_live_detail
      groups:
        - match_style: word
          terms:
            - production
            - controller node
            - node ID
            - rack
            - slot
            - site
            - text: SP
              case_sensitive: true
            - text: PV
              case_sensitive: true
            - text: TIC
              case_sensitive: true
            - text: PIC
              case_sensitive: true
      strength: specific
risk_description: >-
  The detector finds distributed control system, control configuration, controller configuration, and process control language with eight nearby terms. A genuine configuration can expose controller roles, process parameters, network relationships, alarm handling, and dependencies, helping an attacker disrupt production or defeat safeguards. Public architecture guidance, vendor documentation, and training may also trigger the concept regex without a live plant configuration. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. A live DCS configuration exposes controller roles, parameters, alarms and dependencies. It can enable system-scale disruption or defeat safeguards, creating significant service or safety damage. Risk 9 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require actual controller/configuration sections, tags, alarm limits, topology or site identifiers; vendor guides remain excluded. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
