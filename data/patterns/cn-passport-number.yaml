schema: testpattern/v1
name: China Passport Number
slug: cn-passport-number
version: 1.1.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects People's Republic of China passport numbers. The current ordinary (e-)passport uses an 'E' prefix followed
  by one letter (excluding I and O) and 7 digits, or 'E' plus 8 digits. Older series use a 'G' prefix plus 8 digits,
  and earlier passports used 'P', 'D' (diplomatic) or 'S' (service) prefixes plus 8 digits. The short, loosely
  structured format means corroborative keyword proximity is strongly recommended.
operation: >-
  Reference: https://en.wikipedia.org/wiki/Chinese_passport
  Matches a passport prefix letter (E/G/D/S/P) followed by an optional second letter and 7-8 digits.
  Corroborative evidence: keywords within 300 characters.
pattern: (?<![A-Za-z0-9])[EGDSP][A-DF-HJ-NP-Za-df-hj-np-z]?[0-9]{7,8}(?![A-Za-z0-9])
confidence: medium
confidence_justification: >-
  Medium confidence: although the prefix letters are constrained, the body is only 7-8 digits, so the pattern can
  collide with reference codes and serial numbers that happen to start with one of these letters. Corroborative
  passport keywords within 300 characters are essential for reliable detection.
jurisdictions:
  - cn
regulations:
  - PIPL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - passport number
    - passport no
    - chinese passport
    - 护照
    - 护照号
    - travel document
    - PRC passport
  proximity: 300
test_cases:
  should_match:
    - value: EA1234567
      description: Current ordinary e-passport, E + letter + 7 digits
    - value: 'Passport No: G12345678'
      description: Older G-series passport, G + 8 digits, labelled
    - value: E98765432
      description: E-series passport with E + 8 digits
  should_not_match:
    - value: A12345678
      description: Leading 'A' is not a valid PRC passport prefix letter
    - value: EI1234567
      description: Second letter I is excluded from the e-passport alphabet
    - value: please attach a copy of your chinese passport before the visa appointment
      description: Prose mention of a passport without an actual number
false_positives:
  - description: Reference codes, invoice numbers or serial numbers that begin with E, G, D, S or P followed by 7-8 digits.
    mitigation: Require corroborative passport keywords within 300 characters and validate document context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_description: >-
  The China passport pattern identifies current E-series and older G, D, S, or P prefixed passport numbers with seven or eight trailing digits in passport context, not a document image or citizenship record. Disclosure may help populate a booking or visa pretext after the traveller's name, date of birth, and issue details have been sourced independently. One match affects one holder, while invoices and serial references beginning with the same limited prefix set can mimic the structure. Risk 5 and OFFICIAL reflect that bounded correlation value; SENSITIVE would require a passport copy, credentials, or a combined identity and travel file.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
