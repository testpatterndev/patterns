schema: testpattern/v1
name: Geofencing event histories
slug: global-top500-377-geofencing-event-histories
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to geofencing event histories in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:geofencing\s+event\s+histories|geofence\s+trigger|location\s+event|geofence\s+boundary|proximity\s+alert|location\s+tracking|geofence\s+entry|geofence\s+exit|location\s+history|spatial\s+event|geolocation\s+log|device\s+location)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - geofencing event histories
    - geofencing
    - event
    - histories
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: geofencing event histories
      description: Primary topic phrase match
    - value: geofence trigger
      description: Case-insensitive topic phrase match
    - value: location event
      description: Alternative topic phrase match
    - value: geofence boundary
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to geofencing event histories appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_geofencing_events
      matches:
        - ref: Pattern_global_top500_377_geofencing_event_histories_label_context
        - ref: Keyword_global_top500_377_geofencing_event_histories_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_geofencing_events
      matches:
        - ref: Keyword_geofencing_events
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_geofencing_events
      pattern: >-
        (?is)\b(?:geofencing\s+event\s+histories|geofence\s+trigger|location\s+event|geofence\s+boundary|proximity\s+alert|location\s+tracking|geofence\s+entry|geofence\s+exit|location\s+history|spatial\s+event|geolocation\s+log|device\s+location)\b
    - id: Pattern_global_top500_377_geofencing_event_histories_label_context
      pattern: (?i)\b(?:geofencing\s+event\s+histories)\b
  keywords:
    - id: Keyword_geofencing_events
      groups:
        - match_style: word
          terms:
            - geofencing event histories
            - geofence trigger
            - location event
            - geofence boundary
            - proximity alert
            - location tracking
            - geofence entry
            - geofence exit
            - location history
            - spatial event
            - geolocation log
            - device location
      strength: specific
    - id: Keyword_global_top500_377_geofencing_event_histories_domain_context
      groups:
        - match_style: word
          terms:
            - geofencing event histories
            - geofencing
            - event
            - histories
      strength: domain
risk_description: >-
  This detector identifies geofencing-event histories, geofence triggers, location events, or geofence-boundary language with customer context, representing a time-and-place trail when the match is genuine history. Disclosure can reveal visits, routines, workplaces, homes, or sensitive venues and enable stalking, coercion, burglary planning, discriminatory inference, or surveillance of the person associated with the events. A normal history is serious but bounded to the observed subject and period, while a generic boundary or product discussion may contain no tracked individual. Risk 8 and SENSITIVE are appropriate; PROTECTED would require persistent precise tracking of protected or vulnerable targets, a large population history, or significant operational damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
