schema: testpattern/v1
name: Substance use treatment records
slug: au-top500-330-substance-use-treatment-records
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies substance use treatment records references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:substance\s+use|substance\s+abuse|drug\s+treatment|alcohol\s+treatment|treatment\s+records|substance\s+dependence|recovery\s+program|opioid\s+treatment)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - substance use treatment records
    - substance
    - use
    - treatment
    - records
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:

    - healthcare-clinical
test_cases:
  should_match:
    - value: substance use
      description: Primary topic phrase match
    - value: substance abuse
      description: Case-insensitive topic phrase match
    - value: drug treatment
      description: Alternative topic phrase match
    - value: alcohol treatment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_substance_use_treatment_records
      matches:
        - ref: Evidence_substance_use_treatment_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_substance_use_treatment_records
      matches:
        - ref: Evidence_substance_use_treatment_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_substance_use_treatment_records
      matches:
        - ref: Evidence_substance_use_treatment_records
  regexes:
    - id: Pattern_substance_use_treatment_records
      pattern: (?is)\b(?:substance\s+use|substance\s+abuse|drug\s+treatment|alcohol\s+treatment|treatment\s+records|substance\s+dependence|recovery\s+program|opioid\s+treatment)\b
  keywords:
    - id: Evidence_substance_use_treatment_records
      groups:
        - match_style: word
          terms:
            - substance use
            - substance abuse
            - drug treatment
            - alcohol treatment
            - addiction
            - rehabilitation
            - detoxification
            - health
            - biomedical
            - treatment records
            - substance dependence
            - recovery program
            - opioid treatment
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
