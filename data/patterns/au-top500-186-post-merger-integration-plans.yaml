schema: testpattern/v1
name: Post-merger integration plans
slug: au-top500-186-post-merger-integration-plans
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to post-merger integration plans in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: corporate-m-and-a.'
pattern: (?is)\b(?:post[\s-]+merger\s+integration|integration\s+plan|PMI\s+plan|day\s+one\s+readiness|integration\s+workstream|integration\s+timeline|cultural\s+integration|systems\s+integration|organizational\s+restructure|change\s+management|transition\s+planning|merger\s+integration)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - post-merger integration plans
    - post
    - merger
    - integration
    - plans
    - mergers
    - acquisitions
    - strategy
  proximity: 300
  keyword_lists:
    - corporate-m-and-a
test_cases:
  should_match:
    - value: post-merger integration
      description: Primary topic phrase match
    - value: integration plan
      description: Case-insensitive topic phrase match
    - value: PMI plan
      description: Alternative topic phrase match
    - value: day one readiness
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to post-merger integration plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_post_merger_integration
      matches:
        - ref: Evidence_post_merger_integration
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_post_merger_integration
      matches:
        - ref: Evidence_post_merger_integration
    - confidence_level: 65
      id_match: Pattern_post_merger_integration
      matches:
        - ref: Evidence_post_merger_integration
  regexes:
    - id: Pattern_post_merger_integration
      pattern: (?is)\b(?:post[\s-]+merger\s+integration|integration\s+plan|PMI\s+plan|day\s+one\s+readiness|integration\s+workstream|integration\s+timeline|cultural\s+integration|systems\s+integration|organizational\s+restructure|change\s+management|transition\s+planning|merger\s+integration)\b
  keywords:
    - id: Evidence_post_merger_integration
      groups:
        - match_style: word
          terms:
            - post-merger integration
            - integration plan
            - PMI plan
            - day one readiness
            - integration workstream
            - integration timeline
            - cultural integration
            - systems integration
            - organizational restructure
            - change management
            - transition planning
            - merger integration
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.accc.gov.au/business/mergers
  - https://www.takeovers.gov.au/guidance-notes
