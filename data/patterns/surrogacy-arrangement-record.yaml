schema: testpattern/v1
name: Surrogacy Arrangement Record
slug: surrogacy-arrangement-record
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects surrogacy arrangement records including parentage orders, surrogacy agreements, birth mother medical records, and intended parent assessments under the Surrogacy Act 2010 (Qld). These records contain deeply personal information about reproductive choices, medical procedures, and legal parentage transfers — disclosure can cause severe emotional distress and breach court-sealed parentage orders.
operation: 'Keyword proximity: primary keywords (surrogacy arrangement, parentage order, birth mother, intended parents, gestational carrier, surrogacy agreement) within 300 characters of corroborative keywords (PROTECTED, Privacy, Surrogacy Act 2010, counselling certificate, medical practitioner). Negative keyword exclusion for published law reform, public policy discussions, and marketing materials.'
pattern: (?i)\b(surrogacy\s+(?:arrangement|agreement)|parentage\s+order|gestational\s+(?:carrier|surrogacy)|birth\s+mother\s+(?:consent|medical|identity)|intended\s+parent[s]?\s+(?:assessment|application)|surrogacy\s+(?:counselling|guidance)\s+(?:report|certificate))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of surrogacy-specific legal terminology with party identifiers and medical details. General discussion of surrogacy law or policy without personal details does not trigger detection.'
jurisdictions:
  - au
regulations:
  - qgiscf
  - surrogacy-act-2010-qld
  - information-privacy-act-2009
  - status-of-children-act-1978-qld
data_categories:
  - health
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Privacy
    - surrogacy arrangement
    - parentage order
    - birth mother
    - intended parents
    - gestational carrier
    - surrogacy agreement
    - Surrogacy Act 2010
    - counselling certificate
    - medical practitioner
    - independent legal advice
    - birth certificate
    - District Court
    - IVF
    - embryo transfer
    - surrogacy counsellor
    - consent
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED Privacy. Surrogacy Arrangement Record — Surrogacy Act 2010 (Qld) Part 3. Birth mother: Michelle Anne TAYLOR, DOB 14/06/1990. Intended parents: Daniel and Sophie HARTLEY. Surrogacy agreement executed 12/09/2025 with independent legal advice confirmed for all parties. Surrogacy counselling report (s.22) completed by registered psychologist Dr Emma Liu. Gestational surrogacy — embryo transfer conducted at Queensland Fertility Group on 03/11/2025. Medical practitioner confirmation: Dr James Park. Parentage order to be applied for within 28 days of birth.'
      description: Surrogacy arrangement record with party identifiers and legal compliance details
    - value: 'District Court of Queensland — Parentage Order Application. File No: SUR-2026-00189. Application under s.39 Surrogacy Act 2010 for transfer of parentage. Birth mother: Kelly Susan MORRISON. Child: male infant, DOB 22/02/2026, born at Mater Mothers Hospital Brisbane. Intended parents: Andrew and Yuki WATANABE. Surrogacy counselling certificates attached for all parties. Birth mother consent to parentage order confirmed. Medical records confirm gestational surrogacy with no genetic relationship between birth mother and child.'
      description: Parentage order application with birth details and medical confirmation
    - value: 'Confidential — Surrogacy Guidance Report. Prepared for: intended parents Marcus and Lauren BROWN. Surrogacy counsellor: Dr Patricia Feng, MAPS. This report is prepared under s.22 of the Surrogacy Act 2010 (Qld). Assessment confirms that both intended parents understand the legal, medical, and emotional implications of the surrogacy arrangement. The proposed birth mother, Angela SMITH, has undergone independent counselling. Independent legal advice certificates obtained from separate law firms. IVF treatment plan to commence following all statutory requirements being met.'
      description: Surrogacy counselling guidance report with intended parent and birth mother details
  should_not_match:
    - value: The Queensland Law Reform Commission published a report on the effectiveness of the Surrogacy Act 2010. The report recommends legislative amendments to improve access to altruistic surrogacy and strengthen protections for all parties.
      description: Published law reform report on surrogacy legislation
    - value: The Australian Government Department of Health published a fact sheet explaining the difference between altruistic and commercial surrogacy. The fact sheet outlines the legal frameworks across Australian states and territories.
      description: Government fact sheet on surrogacy law with no personal details
    - value: A Melbourne fertility clinic advertised its surrogacy support program on its website, highlighting success rates and patient testimonials. All testimonials were published with informed consent and used first names only.
      description: Fertility clinic marketing with consented testimonials
false_positives:
  - description: Published law reform reports and policy discussions about surrogacy legislation
    mitigation: 'Negative keyword exclusion: ''law reform'', ''legislative amendment'', ''policy discussion'', ''public submission'', ''parliamentary inquiry''. Require proximity to actual party identifiers or case references.'
  - description: Government fact sheets and public information about surrogacy legal frameworks
    mitigation: 'Negative keyword exclusion: ''fact sheet'', ''public information'', ''frequently asked questions'', ''eligibility criteria'''
  - description: Fertility clinic marketing and general surrogacy program information
    mitigation: 'Negative keyword exclusion: ''advertisement'', ''marketing'', ''success rates'', ''testimonial'', ''published with consent'''
  - description: Academic research on surrogacy outcomes using de-identified data
    mitigation: 'Negative keyword exclusion: ''research'', ''study'', ''de-identified'', ''anonymised'', ''participants'', ''journal'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: Surrogacy arrangement terminology with party identifiers (names, DOB, case number) and parentage order or medical details
    - tier: medium
      confidence: 75
      description: 2+ surrogacy-specific keywords with classification markers within 300 characters
    - tier: low
      confidence: 65
      description: 1 surrogacy keyword with 2+ corroborative terms within 300 characters
  regexes:
    - name: surrogacy_arrangement_terms
      pattern: (?i)\b(surrogacy\s+(?:arrangement|agreement)|parentage\s+order|gestational\s+(?:carrier|surrogacy)|birth\s+mother|intended\s+parents?|surrogacy\s+counselling|surrogacy\s+guidance)\b
    - name: surrogacy_case_reference
      pattern: \bSUR-\d{4}-\d{4,5}\b
  keywords:
    - name: primary_keywords
      words:
        - surrogacy arrangement
        - parentage order
        - birth mother
        - intended parents
        - gestational carrier
        - surrogacy agreement
        - gestational surrogacy
        - surrogacy counselling
        - surrogacy guidance report
        - birth mother consent
    - name: classification_markers
      words:
        - PROTECTED
        - Privacy
        - CONFIDENTIAL
        - SENSITIVE
    - name: corroborative_terms
      words:
        - Surrogacy Act 2010
        - counselling certificate
        - medical practitioner
        - independent legal advice
        - birth certificate
        - District Court
        - IVF
        - embryo transfer
        - Queensland Fertility Group
        - registered psychologist
        - consent
        - altruistic surrogacy
    - name: negative_keywords
      words:
        - law reform
        - legislative amendment
        - policy discussion
        - public submission
        - parliamentary inquiry
        - fact sheet
        - public information
        - frequently asked questions
        - advertisement
        - marketing
        - success rates
        - testimonial
        - published with consent
        - research
        - study
        - de-identified
        - anonymised
  filters:
    - type: exclude
      description: Exclude law reform papers, public information, marketing materials, and published research
      keywords:
        - law reform
        - legislative amendment
        - policy discussion
        - public submission
        - fact sheet
        - public information
        - advertisement
        - marketing
        - testimonial
        - published with consent
        - research
        - de-identified
        - anonymised
risk_rating: 8
risk_description: Disclosure reveals birth mother and intended parent identities, surrogacy medical records, and court parentage proceedings. Breaches court-sealed parentage orders and causes severe emotional distress to all parties including the child.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: PROTECTED Privacy
references: []
