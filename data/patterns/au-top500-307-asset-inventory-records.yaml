schema: testpattern/v1
name: Asset inventory records
slug: au-top500-307-asset-inventory-records
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies asset inventory records patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:asset\s+inventory|asset\s+register|hardware\s+inventory|software\s+inventory|asset\s+tag|serial\s+number|asset\s+lifecycle|IT\s+asset\s+management|asset\s+tracking|procurement\s+record|depreciation\s+schedule|asset\s+classification)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - asset inventory records
    - asset
    - inventory
    - records
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: asset inventory
      description: Primary topic phrase match
    - value: asset register
      description: Case-insensitive topic phrase match
    - value: hardware inventory
      description: Alternative topic phrase match
    - value: software inventory
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  This classifier finds asset-inventory, asset-register, hardware or software inventory, asset-tag, serial-number, lifecycle, tracking, and classification language and can identify a composite register. A populated record can reveal systems, versions, ownership, locations, and identifiers that support theft, targeted exploitation, or social engineering. The affected scale may cover the organization's managed estate, although an isolated asset tag has much lower value and an attacker still needs vulnerability or access information. Risk 8 and SENSITIVE are defensible for the register-level unit, while a single identifier is lower and a critical-estate register containing actionable exploit paths would raise the impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_asset_inventory
      matches:
        - ref: Evidence_asset_inventory
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_asset_inventory
      matches:
        - ref: Evidence_asset_inventory
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_asset_inventory
      matches:
        - ref: Evidence_asset_inventory
  regexes:
    - id: Pattern_asset_inventory
      pattern: >-
        (?is)\b(?:asset\s+inventory|asset\s+register|hardware\s+inventory|software\s+inventory|asset\s+tag|serial\s+number|asset\s+lifecycle|IT\s+asset\s+management|asset\s+tracking|procurement\s+record|depreciation\s+schedule|asset\s+classification)\b
  keywords:
    - id: Evidence_asset_inventory
      groups:
        - match_style: word
          terms:
            - asset inventory
            - asset register
            - hardware inventory
            - software inventory
            - asset tag
            - serial number
            - asset lifecycle
            - IT asset management
            - asset tracking
            - procurement record
            - depreciation schedule
            - asset classification
