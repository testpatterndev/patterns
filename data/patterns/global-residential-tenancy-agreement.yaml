schema: testpattern/v1
name: Residential Tenancy Agreement
slug: global-residential-tenancy-agreement
version: 1.4.2
type: keyword_proximity
pattern_class: concept
description: Detects residential tenancy agreements containing tenant PII, rental terms, and bond details.
operation: >-
  Keyword-based detection matching residential tenancy, tenant, bond, and rental terms. Corroborative evidence: 14
  keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - legal
  - pii
  - financial
test_cases:
  should_match:
    - value: Form 18A issued
      description: Exact 65 discovery probe with a tenancy-form marker and no populated details
    - value: 'Form 18A: tenant details'
      description: Exact 75 probe with a tenancy party detail
    - value: 'Form 18A: tenant details and weekly rent $450'
      description: Exact 85 probe with party and rent details
    - value: 'Residential tenancy agreement: tenant bond lodgement with RTA'
      description: Tenancy agreement with tenant and bond details
    - value: Tenancy agreement rental amount $450/week with condition report
      description: Test match 2
    - value: Residential Tenancies Authority breach notice and entry notice
      description: Test match 3
  should_not_match:
    - value: The tenant of the building is a restaurant
      description: Non-match 1
    - value: Tenancy of the land was disputed historically
      description: Non-match 2
    - value: Form 18A software demo
      description: Product-demo wording must remain discovery-only
false_positives:
  - description: Historical or metaphorical use of tenancy.
    mitigation: Require residential tenancy-specific terms like RTA, bond lodgement, or condition report.
exports:
  - yaml
scope: narrow
risk_rating: 7
risk_description: >-
  The pattern identifies residential tenancy agreements containing named parties, premises, rent, bond, condition reports, authority notices, entry rights, and breach terms. Disclosure can expose a person's home address, occupancy, financial obligations, property condition, and dispute history, enabling privacy intrusion, targeted scams, or pressure in a tenancy dispute. The tenant, household, landlord, and agent may face moderate legal, personal, and financial harm within one lease, while the agreement does not itself authorize entry or payment. Risk 7 and SENSITIVE Legal fit a populated agreement, while a bulk tenancy register, severe safety context, or privileged housing-system access would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_residential_tenancy
      matches:
        - ref: Keyword_tenancy_obligations
        - ref: Keyword_rent_financial_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_residential_tenancy
      matches:
        - ref: Keyword_tenancy_obligations
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_residential_tenancy
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_residential_tenancy
      pattern: >-
        (?i)\b(?:residential\s+tenancy\s+(?:agreement|act)|residential\s+tenancies\s+authority|tenancy\s+agreement|form\s+18a|standard\s+(?:tenancy|rental)\s+agreement|lease\s+agreement)\b
  keywords:
    - id: Keyword_tenancy_terms
      groups:
        - match_style: word
          terms:
            - tenant obligations
            - tenant details
            - landlord
            - lessor
            - lessee
            - residential tenancy
            - tenancy agreement
            - lease term
            - periodic tenancy
            - fixed term
            - notice to vacate
            - entry condition report
      strength: specific
    - id: Keyword_bond_rent
      groups:
        - match_style: word
          terms:
            - bond
            - security deposit
            - bond lodgement
            - weekly rent
            - fortnightly rent
            - monthly rent
            - rent in advance
            - text: RTA
              case_sensitive: true
            - Residential Tenancies Authority
      strength: specific
    - id: Keyword_legal_general
      groups:
        - match_style: word
          terms:
            - agreement
            - contract
            - deed
            - executed
            - witnessed
            - signature
            - cooling off
            - default
            - termination
            - entire agreement
      strength: domain
    - id: Keyword_tenancy_obligations
      groups:
        - match_style: word
          terms:
            - tenant details
            - tenant obligations
            - landlord
            - lessor
            - lessee
            - premises
            - condition report
            - entry condition report
            - breach notice
            - entry notice
      strength: specific
    - id: Keyword_rent_financial_context
      groups:
        - match_style: word
          terms:
            - bond
            - security deposit
            - bond lodgement
            - weekly rent
            - fortnightly rent
            - monthly rent
            - rental amount
            - rent in advance
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: align the evidence-gated detector to keyword_proximity, keep tenancy-form/instrument markers at 65 discovery, require populated party or obligation details at 75 and additional bond/rent details at 85, extend authority-notice coverage, and add exact-tier plus demo probes.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 592 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - residential tenancy
  - tenancy agreement
  - tenant obligations
  - tenant details
  - landlord
  - rental bond
  - bond lodgement
  - rent
  - rental amount
  - lease period
  - condition report
  - entry notice
  - breach notice
  - RTA
  - Residential Tenancies Authority
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
