schema: testpattern/v1
name: Loan application files
slug: global-top500-123-loan-application-files
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to loan application files in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:loan\s+application|credit\s+application|loan\s+file|loan\s+purpose|APS\s+220|lending\s+criteria|loan\s+assessment|credit\s+decision|loan\s+approval|financial\s+statement)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - loan application files
    - loan
    - application
    - files
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: loan application
      description: Primary topic phrase match
    - value: credit application
      description: Case-insensitive topic phrase match
    - value: loan file
      description: Alternative topic phrase match
    - value: loan purpose
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_loan_application
      matches:
        - ref: Evidence_loan_application
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_loan_application
      matches:
        - ref: Evidence_loan_application
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_loan_application
      matches:
        - ref: Evidence_loan_application
  regexes:
    - id: Pattern_loan_application
      pattern: (?is)\b(?:loan\s+application|credit\s+application|loan\s+file|loan\s+purpose|APS\s+220|lending\s+criteria|loan\s+assessment|credit\s+decision|loan\s+approval|financial\s+statement)\b
  keywords:
    - id: Evidence_loan_application
      groups:
        - match_style: word
          terms:
            - loan application
            - credit application
            - loan file
            - borrower
            - loan purpose
            - serviceability
            - APS 220
            - lending criteria
            - loan assessment
            - credit decision
            - loan approval
            - financial statement
risk_description: >-
  This document detector identifies loan or credit application files, including loan purpose and supporting assessment context. A leaked application can expose income, liabilities, requested finance, identity details, and the applicant's immediate financial plans to fraudsters or unauthorised decision-makers. The ordinary unit is one applicant's composite file, producing credible privacy, financial, and reputational harm without granting lender-system access. Risk 7 and SENSITIVE are justified; a bulk application repository or a file containing reusable credentials would raise the consequence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
