schema: testpattern/v1
name: Static analysis findings
slug: global-top500-249-static-analysis-findings
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies static analysis findings patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:static\s+analysis|SAST\s+findings|code\s+scan|security\s+finding|code\s+vulnerability|static\s+scan|source\s+code\s+analysis|code\s+quality|security\s+defect|code\s+review\s+finding)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - static analysis findings
    - static
    - analysis
    - findings
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: static analysis
      description: Primary topic phrase match
    - value: sast findings
      description: Case-insensitive topic phrase match
    - value: code scan
      description: Alternative topic phrase match
    - value: security finding
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_static_analysis_findings
      matches:
        - ref: Pattern_global_top500_249_static_analysis_findings_label_context
        - ref: Keyword_global_top500_249_static_analysis_findings_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_static_analysis_findings
      matches:
        - ref: Keyword_static_analysis_findings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_static_analysis_findings
      pattern: >-
        (?is)\b(?:static\s+analysis|SAST\s+findings|code\s+scan|security\s+finding|code\s+vulnerability|static\s+scan|source\s+code\s+analysis|code\s+quality|security\s+defect|code\s+review\s+finding)\b
    - id: Pattern_global_top500_249_static_analysis_findings_label_context
      pattern: (?i)\b(?:static\s+analysis\s+findings)\b
  keywords:
    - id: Keyword_static_analysis_findings
      groups:
        - match_style: word
          terms:
            - static analysis
            - SAST findings
            - code scan
            - security finding
            - code vulnerability
            - static scan
            - source code analysis
            - code quality
            - security defect
            - code review finding
      strength: specific
    - id: Keyword_global_top500_249_static_analysis_findings_domain_context
      groups:
        - match_style: word
          terms:
            - static analysis findings
            - static
            - analysis
            - findings
      strength: domain
risk_description: >-
  The pattern recognises static analysis, SAST, code scan, or security finding language, signalling a likely source-analysis record without confirming a particular defect. A genuine finding can disclose vulnerable files, data flows, weakness classes, and remediation status that materially reduces the work needed to exploit an application. Scanner marketing, process documentation, and resolved findings can match, and a normal record is bounded to one finding or scan scope. Risk 7 SENSITIVE reflects moderate security harm from a current actionable SAST result; PROTECTED would require a critical unremediated flaw or major system consequence shown by additional content.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
