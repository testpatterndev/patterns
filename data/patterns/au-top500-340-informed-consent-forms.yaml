schema: testpattern/v1
name: Informed consent forms
slug: au-top500-340-informed-consent-forms
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies informed consent forms references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:informed\s+consent|consent\s+form|patient\s+consent|surgical\s+consent|treatment\s+consent|voluntary\s+consent|consent\s+document|participant\s+consent|research\s+consent|consent\s+signature)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - informed consent forms
    - informed
    - consent
    - forms
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
test_cases:
  should_match:
    - value: informed consent
      description: Primary topic phrase match
    - value: consent form
      description: Case-insensitive topic phrase match
    - value: patient consent
      description: Alternative topic phrase match
    - value: surgical consent
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_informed_consent_forms
      matches:
        - ref: Evidence_informed_consent_forms
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_informed_consent_forms
      matches:
        - ref: Evidence_informed_consent_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_informed_consent_forms
      matches:
        - ref: Evidence_informed_consent_forms
  regexes:
    - id: Pattern_informed_consent_forms
      pattern: >-
        (?is)\b(?:informed\s+consent|consent\s+form|patient\s+consent|surgical\s+consent|treatment\s+consent|voluntary\s+consent|consent\s+document|participant\s+consent|research\s+consent|consent\s+signature)\b
  keywords:
    - id: Evidence_informed_consent_forms
      groups:
        - match_style: word
          terms:
            - informed consent
            - consent form
            - patient consent
            - surgical consent
            - treatment consent
            - health
            - biomedical
            - voluntary consent
            - consent document
            - participant consent
            - research consent
            - consent signature
risk_description: >-
  The regex recognizes informed, patient, surgical, treatment, participant and research consent, including consent documents and signatures in clinical context. A completed form can reveal the person's identity, contemplated procedure or study, disclosed risks, capacity, decision, representative, and signature, enabling coercion, forgery, treatment interference, or exposure of intimate choices. The normal unit is one signed authorization rather than a consent-management repository, so harm is serious but contained. Risk 8 and SENSITIVE are appropriate; PROTECTED would require bulk vulnerable-person consents, privileged legal control, or compromise causing significant irreversible care harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
