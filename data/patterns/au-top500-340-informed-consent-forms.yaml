schema: testpattern/v1
name: Informed consent forms
slug: au-top500-340-informed-consent-forms
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies informed consent forms references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:informed\s+consent|consent\s+form|patient\s+consent|surgical\s+consent|treatment\s+consent|voluntary\s+consent|consent\s+document|participant\s+consent|research\s+consent|consent\s+signature)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - informed consent forms
    - informed
    - consent
    - forms
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:

    - healthcare-clinical
test_cases:
  should_match:
    - value: informed consent
      description: Primary topic phrase match
    - value: consent form
      description: Case-insensitive topic phrase match
    - value: patient consent
      description: Alternative topic phrase match
    - value: surgical consent
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_informed_consent_forms
      matches:
        - ref: Evidence_informed_consent_forms
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_informed_consent_forms
      matches:
        - ref: Evidence_informed_consent_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_informed_consent_forms
      matches:
        - ref: Evidence_informed_consent_forms
  regexes:
    - id: Pattern_informed_consent_forms
      pattern: (?is)\b(?:informed\s+consent|consent\s+form|patient\s+consent|surgical\s+consent|treatment\s+consent|voluntary\s+consent|consent\s+document|participant\s+consent|research\s+consent|consent\s+signature)\b
  keywords:
    - id: Evidence_informed_consent_forms
      groups:
        - match_style: word
          terms:
            - informed consent
            - consent form
            - patient consent
            - surgical consent
            - treatment consent
            - health
            - biomedical
            - voluntary consent
            - consent document
            - participant consent
            - research consent
            - consent signature
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.safetyandquality.gov.au/our-work/partnering-consumers/informed-consent
  - https://www.safetyandquality.gov.au/standards/nsqhs-standards
  - https://www.legislation.gov.au/C2004A03712/latest/text
