schema: testpattern/v1
name: Dynamic testing findings
slug: au-top500-250-dynamic-testing-findings
version: 1.4.0
type: regex
engine: boost_regex
description: Identifies dynamic testing findings patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:DAST\s+(?:findings?|scan\s+results?|report|scan)|dynamic\s+application\s+security\s+test(?:ing)?|penetration\s+test(?:ing)?\s+(?:report|findings?|results?|scope|engagement)|fuzzing\s+(?:results?|findings?)|vulnerability\s+(?:findings?|assessment\s+results?|scan\s+results?)|(?:Burp\s+Suite|OWASP\s+ZAP|Metasploit|Nessus|Nikto|IBM\s+AppScan|Veracode|Acunetix|Qualys)\s+(?:scan|report|findings?|results?)|proof[-\s]of[-\s]concept\s+exploit|PoC\s+exploit)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - DAST findings
    - penetration testing
    - vulnerability
    - CVE
    - CWE
    - proof of concept
    - exploit
    - severity
    - Burp Suite
    - OWASP ZAP
    - Nessus
    - pentest
    - security assessment
    - scan results
  proximity: 300
test_cases:
  should_match:
    - value: DAST findings report for web application Q2 2024
      description: 3-judge panel revised test case
    - value: penetration testing report - scope of engagement
      description: 3-judge panel revised test case
    - value: Burp Suite scan findings showing SQL injection vulnerability
      description: 3-judge panel revised test case
    - value: dynamic application security testing completed by vendor
      description: 3-judge panel revised test case
    - value: fuzzing results identified 3 critical vulnerabilities
      description: 3-judge panel revised test case
    - value: proof-of-concept exploit developed for CVE-2024-1234
      description: 3-judge panel revised test case
  should_not_match:
    - value: application testing framework documentation
      description: 3-judge panel revised test case
    - value: unit test findings in CI pipeline report
      description: 3-judge panel revised test case
    - value: security testing best practices guide
      description: 3-judge panel revised test case
    - value: source code configuration management file
      description: 3-judge panel revised test case
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_dynamic_testing_findings
      matches:
        - ref: Evidence_dynamic_testing_findings
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_dynamic_testing_findings
      matches:
        - ref: Evidence_dynamic_testing_findings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_dynamic_testing_findings
      matches:
        - ref: Evidence_dynamic_testing_findings
  regexes:
    - id: Pattern_dynamic_testing_findings
      pattern: >-
        (?is)\b(?:DAST\s+(?:findings?|scan\s+results?|report|scan)|dynamic\s+application\s+security\s+test(?:ing)?|penetration\s+test(?:ing)?\s+(?:report|findings?|results?|scope|engagement)|fuzzing\s+(?:results?|findings?)|vulnerability\s+(?:findings?|assessment\s+results?|scan\s+results?)|(?:Burp\s+Suite|OWASP\s+ZAP|Metasploit|Nessus|Nikto|IBM\s+AppScan|Veracode|Acunetix|Qualys)\s+(?:scan|report|findings?|results?)|proof[-\s]of[-\s]concept\s+exploit|PoC\s+exploit)\b
  keywords:
    - id: Evidence_dynamic_testing_findings
      groups:
        - match_style: word
          terms:
            - DAST findings
            - penetration testing
            - vulnerability
            - text: CVE
              case_sensitive: true
            - text: CWE
              case_sensitive: true
            - proof of concept
            - exploit
            - severity
            - Burp Suite
            - OWASP ZAP
            - Nessus
            - pentest
            - security assessment
            - scan results
      strength: domain
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
