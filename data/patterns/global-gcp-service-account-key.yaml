schema: testpattern/v1
name: GCP Service Account JSON Key
slug: global-gcp-service-account-key
version: 1.4.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects GCP service-account JSON key files, distinguishing bare type=service_account record markers
  (discovery only) from complete keys whose object also carries an escaped PEM private_key and a
  .iam.gserviceaccount.com client_email (enforcing), with project_id/private_key_id as additional
  high-confidence evidence.
operation: >-
  Marker-only JSON object ("type":"service_account") is a 65 discovery tier; marker plus escaped-PEM
  private_key plus service-account client_email reaches 75; adding project_id/private_key_id evidence
  reaches 85. Same-object co-occurrence is approximated by the 300-character proximity window, and the
  shared template-exclusion NOT-group rejects documentation/placeholder text.
pattern: '"type"\s*:\s*"service_account"'
confidence: low
confidence_justification: >-
  Low confidence: generic pattern format that may match unrelated data. Corroborative evidence keywords are essential for reliable detection. Added context gating and exclusion rules improve precision
  and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '"type": "service_account"'
      description: GCP service account JSON key marker
    - value: '"type" : "service_account"'
      description: GCP key with extra spaces
    - value: '"type":"service_account"'
      description: GCP key without spaces (marker only - discovery tier)
    - value: '{"type":"service_account","project_id":"prod-1","private_key_id":"abc9","private_key":"-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBg...\n-----END PRIVATE KEY-----\n","client_email":"deploy@prod-1.iam.gserviceaccount.com"}'
      description: Complete JSON key with PEM private_key, service-account client_email and key identifiers reaches the enforcing tiers
    - value: '{"type":"service_account","project_id":"prod-1"}'
      description: Marker plus project_id without credential material stays discovery-only
  should_not_match:
    - value: '"type": "user_account"'
      description: Wrong account type value (user_account instead of service_account)
    - value: '"kind": "service_account"'
      description: Wrong key name (kind instead of type)
    - value: 'type: service_account'
      description: YAML format instead of JSON (no quotes)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: 'Documentation: {"type":"service_account","private_key":"<redacted>","client_email":"example@demo.iam.gserviceaccount.com"}'
      description: Redacted documentation example carries no PEM material and trips the template exclusion at every tier
    - value: 'The cloud team reviewed service-account naming conventions.'
      description: Administrative cloud prose contains no JSON service_account marker or key-file structure
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_rating: 5
risk_description: >-
  Despite its name, the current regex finds only the JSON property pair type equals service_account, which is a record-type marker and not the private_key, client_email, or token material needed to authenticate. The marker can point an analyst toward a possible service-account key file, but an attacker gains no access unless the surrounding document also contains usable credentials. The usual impact of the matched text alone is low for the document owner because examples, schemas, and sanitized JSON legitimately include this field. Risk 5 OFFICIAL recognizes the security context and need for correlation; a complete JSON key object with private key material would warrant a separate SENSITIVE assessment.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_gcp_service_account
      matches:
        - ref: Regex_gcp_private_key
        - ref: Regex_gcp_client_email
        - ref: Keyword_gcp_key_ids
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_gcp_service_account
      matches:
        - ref: Regex_gcp_private_key
        - ref: Regex_gcp_client_email
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_gcp_service_account
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_gcp_service_account
      pattern: '"type"\s*:\s*"service_account"'
    - id: Regex_gcp_private_key
      pattern: '"private_key"\s*:\s*"-----BEGIN (?:RSA )?PRIVATE KEY-----[\\nr\r\n]{1,8}[A-Za-z0-9+/=]{12,}'
    - id: Regex_gcp_client_email
      pattern: '"client_email"\s*:\s*"[A-Za-z0-9._%+-]{1,64}@[A-Za-z0-9.-]{1,128}\.iam\.gserviceaccount\.com"'
  keywords:
    - id: Keyword_gcp_key_ids
      groups:
        - match_style: word
          terms:
            - project_id
            - private_key_id
      strength: specific
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.4.1
    date: '2026-07-17'
    description: >-
      Purview upload fix: Regex_gcp_private_key used a plus-quantified group to consume the
      newline run between the PEM BEGIN header and the base64 body, and Purview rejects regex
      groups with multi-match quantifiers ("groups of multiple match conditions"), blocking
      tenant upload of packages containing this SIT. Replaced with a bounded character class
      (backslash, letters n and r, CR, LF, repeated 1-8 times) covering the same JSON-escaped
      and raw newline runs.
  - version: 1.4.0
    date: '2026-07-16'
    description: >-
      Tier restructure (TP-00831): the bare type=service_account marker no longer reaches 85 via weak
      gcp/service/json/key wordlists - it is now a 65 discovery_only tier. New enforcing branches
      require credential material in the same object: 75 = marker + Regex_gcp_private_key (escaped PEM
      BEGIN PRIVATE KEY header with non-trivial base64 body) + Regex_gcp_client_email
      (.iam.gserviceaccount.com address); 85 additionally requires Keyword_gcp_key_ids
      (project_id/private_key_id). Removed the now-unreferenced label-context/domain-context/Keyword_gcp
      wordlists (dead weight per noise-gate convention). Added complete-key positive and
      redacted-documentation/neutral-prose negatives.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1230 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
