schema: testpattern/v1
name: Police identity number
slug: au-top500-035-police-identity-number
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to police identity number in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:police\s+identity\s+number|police\s+ID|officer\s+identification|badge\s+number|police\s+registration|law\s+enforcement\s+ID|constable\s+number|AFP\s+number|sworn\s+officer|police\s+service\s+number|police\s+force|national\s+police\s+check)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - police identity number
    - police
    - identity
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: police identity number
      description: Primary topic phrase match
    - value: police id
      description: Case-insensitive topic phrase match
    - value: officer identification
      description: Alternative topic phrase match
    - value: badge number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to police identity number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_police_identity
      matches:
        - ref: Evidence_police_identity
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_police_identity
      matches:
        - ref: Evidence_police_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_police_identity
      matches:
        - ref: Evidence_police_identity
  regexes:
    - id: Pattern_police_identity
      pattern: >-
        (?is)\b(?:police\s+identity\s+number|police\s+ID|officer\s+identification|badge\s+number|police\s+registration|law\s+enforcement\s+ID|constable\s+number|AFP\s+number|sworn\s+officer|police\s+service\s+number|police\s+force|national\s+police\s+check)\b
    - id: Pattern_au_top500_035_police_identity_number_label_context
      pattern: (?i)\\b(?:police\\s+identity\\s+number|police|identity|top500)\\b
  keywords:
    - id: Evidence_police_identity
      groups:
        - match_style: word
          terms:
            - police identity number
            - police ID
            - officer identification
            - badge number
            - police registration
            - law enforcement ID
            - constable number
            - AFP number
            - sworn officer
            - police service number
            - police force
            - national police check
    - id: Keyword_au_top500_035_police_identity_number_domain_context
      groups:
        - match_style: word
          terms:
            - police identity number
            - police
            - identity
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
