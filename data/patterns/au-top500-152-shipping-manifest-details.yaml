schema: testpattern/v1
name: Shipping manifest details
slug: au-top500-152-shipping-manifest-details
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to shipping manifest details in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:shipping\s+manifest|cargo\s+manifest|container\s+manifest|vessel\s+manifest|freight\s+details|consignment\s+note|cargo\s+reporting|shipping\s+schedule|bill\s+of\s+lading|transport\s+document)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - shipping manifest details
    - shipping
    - manifest
    - details
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: shipping manifest
      description: Primary topic phrase match
    - value: cargo manifest
      description: Case-insensitive topic phrase match
    - value: container manifest
      description: Alternative topic phrase match
    - value: vessel manifest
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to shipping manifest details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_shipping_manifest
      matches:
        - ref: Evidence_shipping_manifest
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_shipping_manifest
      matches:
        - ref: Evidence_shipping_manifest
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_shipping_manifest
      matches:
        - ref: Evidence_shipping_manifest
  regexes:
    - id: Pattern_shipping_manifest
      pattern: >-
        (?is)\b(?:shipping\s+manifest|cargo\s+manifest|container\s+manifest|vessel\s+manifest|freight\s+details|consignment\s+note|cargo\s+reporting|shipping\s+schedule|bill\s+of\s+lading|transport\s+document)\b
    - id: Pattern_au_top500_152_shipping_manifest_details_label_context
      pattern: (?i)\\b(?:shipping\\s+manifest\\s+details|shipping|manifest|top500)\\b
  keywords:
    - id: Evidence_shipping_manifest
      groups:
        - match_style: word
          terms:
            - shipping manifest
            - cargo manifest
            - container manifest
            - vessel manifest
            - freight details
            - consignment note
            - cargo reporting
            - shipping schedule
            - bill of lading
            - transport document
    - id: Keyword_au_top500_152_shipping_manifest_details_domain_context
      groups:
        - match_style: word
          terms:
            - shipping manifest details
            - shipping
            - manifest
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
