schema: testpattern/v1
name: Osobni identifikacijski broj (OIB)
slug: hr-personal-id-oib
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Osobni identifikacijski broj (OIB) patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in
  SIT directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-croatia-personal-identification-number Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials.
  Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{11}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - eu
  - hr
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - OIB
    - osobni identifikacijski broj
    - personal identification
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '12345678901'
      description: Eleven-digit Croatian OIB
    - value: '98765432109'
      description: Another eleven-digit OIB
    - value: '45678901234'
      description: Valid format OIB
  should_not_match:
    - value: '1234567890'
      description: Too few digits (10)
    - value: '123456789012'
      description: Too many digits (12)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Eleven-digit numeric sequences may match phone numbers or other administrative identifiers.
    mitigation: Require corroborative evidence keywords such as "OIB" or "osobni identifikacijski broj" within the proximity window.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_hr_oib
      matches:
        - ref: Pattern_hr_personal_id_oib_label_context
        - ref: Keyword_hr_personal_id_oib_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_hr_oib
      matches:
        - ref: Keyword_hr_oib
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_hr_oib
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_hr_oib
      pattern: \b\d{11}\b
    - id: Pattern_hr_personal_id_oib_label_context
      pattern: (?i)\b(?:osobni\s+identifikacijski\s+broj\s+\(oib\)|osobni|identifikacijski|broj|oib|personal)\b
  keywords:
    - id: Keyword_hr_oib
      groups:
        - match_style: word
          terms:
            - text: OIB
              case_sensitive: true
            - osobni identifikacijski broj
            - osobni identifikacijski
            - identifikacijski broj
            - personal identification number
            - Croatian identification
            - matični broj građana
            - porezni broj
            - identifikacija
            - Republika Hrvatska
            - osobna iskaznica
      strength: specific
    - id: Keyword_hr_personal_id_oib_domain_context
      groups:
        - match_style: word
          terms:
            - osobni identifikacijski broj (oib)
            - osobni
            - identifikacijski
            - broj
            - oib
            - personal
      strength: domain
  filters:
    - id: Filter_hr_oib_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The OIB detector recognises an 11-digit Croatian personal or organisational identification candidate with civic context and template exclusions. A genuine OIB can link a person or entity across tax and administrative records and support impersonation or record matching when combined with names and account details. The regex does not validate a checksum, distinguish natural from legal persons, or provide access authority, and other 11-digit administrative values can collide. Risk 5 OFFICIAL reflects bounded dual-use correlation harm; SENSITIVE would require a verified personal OIB tied to private tax, financial, or service information.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-croatia-personal-identification-number
    title: Croatia Personal Identification (OIB) Number entity definition - Microsoft Learn
