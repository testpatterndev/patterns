schema: testpattern/v1
name: Personalization feature vectors
slug: au-top500-379-personalization-feature-vectors
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to personalization feature vectors in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:personalization\s+feature\s+vectors|user\s+profile|machine\s+learning|behavioral\s+data)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - personalization feature vectors
    - personalization
    - feature
    - vectors
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: personalization feature vectors
      description: Primary topic phrase match
    - value: user profile
      description: Case-insensitive topic phrase match
    - value: machine learning
      description: Alternative topic phrase match
    - value: behavioral data
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to personalization feature vectors appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_personalization_feature_vectors
      matches:
        - ref: Evidence_personalization_feature_vectors
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_personalization_feature_vectors
      matches:
        - ref: Evidence_personalization_feature_vectors
    - confidence_level: 65
      id_match: Pattern_personalization_feature_vectors
      matches:
        - ref: Evidence_personalization_feature_vectors
  regexes:
    - id: Pattern_personalization_feature_vectors
      pattern: (?is)\b(?:personalization\s+feature\s+vectors|user\s+profile|machine\s+learning|behavioral\s+data)\b
  keywords:
    - id: Evidence_personalization_feature_vectors
      groups:
        - match_style: word
          terms:
            - personalization feature vectors
            - personalization
            - feature
            - vectors
            - customer
            - commercial
            - recommendation
            - user profile
            - embedding
            - machine learning
            - behavioral data
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines
  - https://www.legislation.gov.au/C2004A03712/latest/text
