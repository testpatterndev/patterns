schema: testpattern/v1
name: Payment/Remittance Advice
slug: global-payment-remittance-advice
version: 1.4.1
type: keyword_list
pattern_class: concept
description: Detects payment advices, remittance notices, and electronic funds transfer confirmations.
operation: >-
  Keyword-based detection matching remittance advice, payment advice, and EFT reference patterns. Corroborative
  evidence: 12 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
test_cases:
  should_match:
    - value: 'Remittance advice: amount paid $5,432.10 via EFT'
      description: Test match 1
    - value: Payment advice for electronic funds transfer dated 15/01/2026
      description: Test match 2
    - value: 'Remittance notice: bank transfer confirmed, amount received $10,000'
      description: Test match 3
  should_not_match:
    - value: Please advise on the payment schedule
      description: Non-match 1
    - value: The transfer of ownership was complete
      description: Non-match 2
false_positives:
  - description: Generic payment or transfer language in non-remittance contexts.
    mitigation: Require remittance-specific keywords or EFT references.
exports:
  - yaml
scope: narrow
risk_rating: 4
risk_description: >-
  The detector identifies remittance or payment advice confirming an amount, date, EFT or transfer method, and payment reference, so the unit is a transaction notice rather than a credential. Disclosure may reveal a trading relationship and payment timing or help a fraudster imitate a confirmation, but diversion normally requires altered account details, payment-system access, or separate contact information. The payer and recipient face low, reversible commercial harm within one remittance, and the advice is intentionally exchanged to support reconciliation. Risk 4 and OFFICIAL are appropriate, while bank-account details, sensitive purchases, or a bulk payment file would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_remittance
      matches:
        - ref: Keyword_remittance
        - ref: Keyword_payment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_remittance
      matches:
        - ref: Keyword_remittance
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_eft_reference
      matches:
        - ref: Keyword_payment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_remittance
      pattern: (?i)\b(?:remittance\s+(?:advice|notice|slip)|payment\s+(?:advice|remittance))\b
    - id: Regex_eft_reference
      pattern: (?i)\b(?:eft\s+(?:reference|number)|electronic\s+funds\s+transfer)\b
  keywords:
    - id: Keyword_remittance
      groups:
        - match_style: word
          terms:
            - remittance advice
            - remittance notice
            - payment advice
            - payment remittance
            - remittance slip
      strength: specific
    - id: Keyword_payment
      groups:
        - match_style: word
          terms:
            - payment terms
            - payment confirmation
            - payment reference
            - amount paid
            - amount received
            - payment date
            - text: EFT
              case_sensitive: true
            - electronic funds transfer
            - bank transfer
      strength: specific
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 568 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
author: testpattern-community
license: MIT
keywords:
  - remittance advice
  - remittance notice
  - payment advice
  - payment remittance
  - remittance slip
  - payment terms
  - payment confirmation
  - payment reference
  - amount paid
  - amount received
  - payment date
  - EFT
  - electronic funds transfer
  - bank transfer
