schema: testpattern/v1
name: Cédula de Ciudadanía
slug: co-national-id
version: 1.2.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Cédula de Ciudadanía patterns. Detects this pattern using regex with corroborative keyword evidence.
operation: 'Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Adds label-context matching and exclusion logic for sample/template/test placeholders.'
pattern: \b\d{6,10}\b
confidence: low
confidence_justification: >-
  Low confidence: pattern is broad and will match many non-identity sequences. Corroborative keywords are essential to achieve acceptable false positive rates. Context label evidence plus explicit
  template/example exclusion improves precision for high-risk identifiers.
jurisdictions:
  - co
regulations:
  - PDPL (CO)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - cédula
    - ciudadanía
    - national ID
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '1234567890'
      description: Ten-digit Colombian ID
    - value: '12345678'
      description: Eight-digit Colombian ID
    - value: '123456'
      description: Six-digit Colombian ID
  should_not_match:
    - value: '12345'
      description: Too few digits (5)
    - value: '12345678901'
      description: Too many digits (11)
    - value: sample template placeholder number 12345678901
      description: >-
        Template/sample context negative — the embedded number is 11 digits, one past the maximum of 10,
        so the universal-engine top-level regex correctly does not match it (template gating is a
        Purview-tier NOT-group concern, not expressible in a bare regex)
false_positives:
  - description: Variable-length numeric sequences (6-10 digits) are extremely common and will match many non-identity numbers.
    mitigation: Require corroborative evidence keywords such as "cédula" or "ciudadanía" within the proximity window. This pattern has a high false positive rate without keyword context.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_co_national_id
      matches:
        - ref: Pattern_co_national_id_label_context
        - ref: Keyword_co_national_id_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_co_national_id
      matches:
        - ref: Keyword_co_national_id_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_co_national_id
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_co_national_id
      pattern: \b\d{6,10}\b
    - id: Pattern_co_national_id_label_context
      pattern: (?i)\b(?:dula|ciudadan|national|identity\s+number|national\s+id|personal\s+id|citizen\s+number)\b
  keywords:
    - id: Keyword_co_national_id_specific
      groups:
        - match_style: word
          terms:
            - cédula de ciudadanía
            - cedula de ciudadania
            - cédula
            - número de cédula
            - numero de cedula
            - tarjeta de identidad
            - documento de identificación
            - documento de identificacion
            - CC No
            - C.C.
      strength: specific
    - id: Keyword_co_national_id_broad
      groups:
        - match_style: word
          terms:
            - identificación
            - identificacion
            - national ID
            - identity card
            - identity number
            - documento de identidad
            - número de identificación
            - numero de identificacion
            - Registraduría
      strength: specific
  filters:
    - id: Filter_co_national_id_same_digits
      type: AllDigitsSameFilter
    - id: Filter_co_national_id_exclude_test
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms:
        - '000000'
        - '0000000'
        - '00000000'
        - '000000000'
        - '0000000000'
        - '123456'
        - '1234567890'
risk_rating: 5
risk_description: >-
  The low-confidence regex matches any six- to ten-digit Colombian citizenship-number candidate and depends heavily on civic labels and template exclusions. A genuine cédula number can support identity correlation or social engineering, but the value alone does not establish the holder, document validity, photograph, or entitlement to act. The numeric range overlaps extensively with account, telephone, case, and transaction numbers, so a normal hit requires careful attribution before harm can be inferred. Risk 5 OFFICIAL recognises the potential of a verified identifier; SENSITIVE would require a confirmed person linkage or a completed identity record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.2
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1156 without changing detector or package metadata.'
  - version: 1.2.1
    date: '2026-07-12'
    description: 'Baseline burn-down: template-context negative used a structurally valid number, so the universal-engine top-level regex correctly matched it (template gating is a Purview-tier concern via the template-exclusion NOT-group, not expressible in a bare regex); embedded number made structurally invalid (11 digits, one past the 6-10 digit range) to preserve the template-prose intent without asserting the impossible.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
