schema: testpattern/v1
name: Unreleased product architecture
slug: global-top500-220-unreleased-product-architecture
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to unreleased product architecture in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:unreleased\s+product\s+architecture|product\s+architecture|system\s+architecture|intellectual\s+property|trade\s+secrets|proprietary\s+architecture|product\s+roadmap|technical\s+design|confidential\s+product)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - unreleased product architecture
    - unreleased
    - product
    - architecture
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: unreleased product architecture
      description: Primary topic phrase match
    - value: product architecture
      description: Case-insensitive topic phrase match
    - value: system architecture
      description: Alternative topic phrase match
    - value: intellectual property
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to unreleased product architecture appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_unreleased_product_architecture
      matches:
        - ref: Pattern_global_top500_220_unreleased_product_architecture_label_context
        - ref: Keyword_global_top500_220_unreleased_product_architecture_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_unreleased_product_architecture
      matches:
        - ref: Keyword_unreleased_product_architecture
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_unreleased_product_architecture
      pattern: >-
        (?is)\b(?:unreleased\s+product\s+architecture|product\s+architecture|system\s+architecture|intellectual\s+property|trade\s+secrets|proprietary\s+architecture|product\s+roadmap|technical\s+design|confidential\s+product)\b
    - id: Pattern_global_top500_220_unreleased_product_architecture_label_context
      pattern: (?i)\b(?:unreleased\s+product\s+architecture)\b
  keywords:
    - id: Keyword_unreleased_product_architecture
      groups:
        - match_style: word
          terms:
            - unreleased product architecture
            - product architecture
            - system architecture
            - intellectual property
            - trade secrets
            - proprietary architecture
            - product roadmap
            - technical design
            - pre-release
            - confidential product
      strength: specific
    - id: Keyword_global_top500_220_unreleased_product_architecture_domain_context
      groups:
        - match_style: word
          terms:
            - unreleased product architecture
            - unreleased
            - product
            - architecture
      strength: domain
risk_description: >-
  This pattern identifies unreleased, proprietary, or confidential product and system architecture, technical designs, roadmaps, and related IP language. A genuine architecture description can expose trust boundaries, dependencies, interfaces, scaling choices, future capabilities, and attack surfaces, enabling competitor imitation or targeted exploitation before controls and communications are mature. The normal unit concerns one unreleased product design rather than privileged access to the implementation, so harm is serious but contained. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED would require exploitable critical-service architecture, privileged compromise, or disclosure causing significant operational damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
