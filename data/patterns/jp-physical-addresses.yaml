schema: testpattern/v1
name: Japan Physical Addresses
slug: jp-physical-addresses
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Japan Physical Addresses patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that uses machine learning and function-based detection for physical
  address identification. This keyword list provides address-related terms for supplementary matching.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  country-specific address terminology to identify physical address data.
keywords:
  - 都
  - 道
  - 府
  - 県
  - 市
  - 区
  - 町
  - 村
  - 丁目
  - 番地
  - 号
  - 〒
  - 番
  - 階
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on address terms requires additional context and
  corroborative evidence for accurate physical address detection. Address keywords alone
  produce high false positive rates without structural validation.
jurisdictions:
  - jp
regulations:
  - APPI
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 都 name, unit 4"
      description: Contains address keyword '都'
    - value: "located at 45 道 example"
      description: Contains address keyword '道'
    - value: "deliver to 78 府 test"
      description: Contains address keyword '府'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 500
  recommended_confidence: 65
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_jp_address_primary
      matches:
        - ref: Keyword_jp_address_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_jp_address_primary
  keywords:
    - id: Keyword_jp_address_primary
      groups:
        - match_style: string
          terms:
            - 都
            - 道
            - 府
            - 県
            - 市
            - 区
            - 町
            - 村
            - 丁目
            - 番地
            - 〒
      strength: domain
    - id: Keyword_jp_address_context
      groups:
        - match_style: word
          terms:
            - 住所
            - 所在地
            - 居住地
            - address
            - postal code
            - 郵便番号
            - 配送先
            - 届け先
            - 送付先
            - 自宅住所
      strength: domain
risk_rating: 3
risk_description: >-
  The Japanese address list uses prefecture and administrative-area markers with number-like text as supplementary evidence for function-based recognition. These markers can denote broad jurisdictions, public offices, transport routes, and regional references rather than a building or household, and the test cases do not prove a complete Japanese address hierarchy. A single location therefore has low impact unless a named occupant, detailed block and building, or sensitive destination is present. Risk 3 supports OFFICIAL; SENSITIVE would require an attributed private residence, vulnerable-person location, recurring travel pattern, or aggregated resident records.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-japan-physical-addresses
    title: "Japan Physical Addresses entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1320 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
