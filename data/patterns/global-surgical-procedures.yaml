schema: testpattern/v1
name: Surgical Procedures
slug: global-surgical-procedures
version: 1.3.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Surgical Procedures patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that identifies health and medical terminology in documents.
  Keyword matching is used to flag content containing medical language.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  health and medical terminology to identify protected health information.
keywords:
  - appendectomy
  - cholecystectomy
  - mastectomy
  - hysterectomy
  - arthroplasty
  - angioplasty
  - bypass surgery
  - laparoscopy
  - transplant
  - amputation
  - biopsy
  - catheterization
  - endoscopy
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on medical terms requires additional context for
  accurate detection. Medical terminology may appear in educational, research, or general
  health content without constituting protected health information.
jurisdictions:
  - global
regulations:
- GDPR
- HIPAA
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - phi
  - health
test_cases:
  should_match:
    - value: "patient diagnosed with appendectomy"
      description: Contains medical keyword 'appendectomy'
    - value: "treatment plan includes cholecystectomy"
      description: Contains medical keyword 'cholecystectomy'
    - value: "clinical notes reference mastectomy"
      description: Contains medical keyword 'mastectomy'
  should_not_match:
    - value: "quarterly revenue report for fiscal year 2024"
      description: Financial text with no medical terminology
    - value: "the project deadline has been moved to next Friday"
      description: Business scheduling text with no health terms
false_positives:
  - description: Educational or research materials discussing medical topics without containing actual patient data
    mitigation: >-
      Layer with PII detection to confirm medical terms appear alongside patient identifiers.
  - description: News articles or general health information websites mentioning medical conditions
    mitigation: >-
      Use document classification to distinguish clinical records from public health content.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_surgical_procedures
      matches:
        - ref: Keyword_medical_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_surgical_procedures
  keywords:
    - id: Keyword_surgical_procedures
      groups:
        - match_style: word
          terms:
            - appendectomy
            - cholecystectomy
            - mastectomy
            - hysterectomy
            - arthroplasty
            - angioplasty
            - bypass surgery
            - laparoscopy
            - transplant
            - amputation
            - biopsy
            - catheterization
            - endoscopy
      strength: domain
    - id: Keyword_medical_context
      groups:
        - match_style: word
          terms:
            - patient
            - diagnosis
            - treatment
            - clinical
            - medical record
            - hospital
            - surgical
            - procedure
            - operation
            - physician
            - health information
            - discharge summary
      strength: domain
risk_rating: 5
risk_description: >-
  The low-confidence keyword list flags procedure names such as appendectomy, cholecystectomy, and mastectomy in patient-style phrases; it does not require a named patient, procedure date, outcome, or operative report. A procedure term can disclose a health fact only when the surrounding content links it to a person, and some procedures may then permit diagnosis or body-history inferences. The normal hit is unlinked medical vocabulary widely used in education, research, guidelines, scheduling templates, and public information. Risk 5 and OFFICIAL reflect bounded correlation value, while an identifiable operative history, consent, or surgical report would be SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-surgical-procedures
    title: "Surgical Procedures entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
