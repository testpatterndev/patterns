schema: testpattern/v1
name: Private source code repositories
slug: au-top500-241-private-source-code-repositories
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies private source code repositories patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:private\s+repository|source\s+code|git\s+repository|code\s+repository|private\s+repo|internal\s+repository|proprietary\s+code|version\s+control|access\s+control)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private source code repositories
    - private
    - source
    - code
    - repositories
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: private repository
      description: Primary topic phrase match
    - value: source code
      description: Case-insensitive topic phrase match
    - value: git repository
      description: Alternative topic phrase match
    - value: code repository
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_private_source_code_repos
      matches:
        - ref: Evidence_private_source_code_repos
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_private_source_code_repos
      matches:
        - ref: Evidence_private_source_code_repos
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_private_source_code_repos
      matches:
        - ref: Evidence_private_source_code_repos
  regexes:
    - id: Pattern_private_source_code_repos
      pattern: (?is)\b(?:private\s+repository|source\s+code|git\s+repository|code\s+repository|private\s+repo|internal\s+repository|proprietary\s+code|version\s+control|access\s+control)\b
  keywords:
    - id: Evidence_private_source_code_repos
      groups:
        - match_style: word
          terms:
            - private repository
            - source code
            - git repository
            - code repository
            - private repo
            - internal repository
            - proprietary code
            - version control
            - codebase
            - access control
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines/chapter-11-app-11-security-of-personal-information
