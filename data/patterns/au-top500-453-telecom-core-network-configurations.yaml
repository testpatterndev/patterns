schema: testpattern/v1
name: Telecom core network configurations
slug: au-top500-453-telecom-core-network-configurations
version: 1.4.4
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to telecom core network configurations in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: industry-critical-infrastructure.
pattern: (?is)\b(?:telecom\s+core\s+network\s+configurations|core\s+network|routing\s+table|subscriber\s+profile|network\s+element|base\s+station|critical\s+infrastructure)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - infrastructure
  - security
corroborative_evidence:
  keywords:
    - telecom core network configurations
    - telecom
    - core
    - network
    - configurations
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
test_cases:
  should_match:
    - value: telecom core network configurations
      description: Primary topic phrase match
    - value: core network
      description: Case-insensitive topic phrase match
    - value: routing table
      description: Alternative topic phrase match
    - value: subscriber profile
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: telecom ims
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to telecom core network configurations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_telecom_core
      matches:
        - ref: Evidence_telecom_core
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_telecom_core
      matches:
        - ref: Evidence_telecom_core
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_telecom_core
      matches:
        - ref: Evidence_telecom_core
  regexes:
    - id: Pattern_telecom_core
      pattern: (?is)\b(?:telecom\s+core\s+network\s+configurations|core\s+network|routing\s+table|subscriber\s+profile|network\s+element|base\s+station|critical\s+infrastructure)\b
  keywords:
    - id: Evidence_telecom_core
      groups:
        - match_style: word
          terms:
            - telecom core network configurations
            - core network
            - text: EPC
              case_sensitive: true
            - text: 5GC
              case_sensitive: true
            - text: IMS
              case_sensitive: true
            - routing table
            - subscriber profile
            - network element
            - base station
            - backhaul
            - peering
            - critical infrastructure
      strength: domain
risk_description: >-
  The regex identifies core-network, routing-table, subscriber-profile, switching, and telecom configuration language, aiming at a technical configuration record rather than a vendor brochure. Authentic configuration material can expose topology, routing dependencies, trust relationships, or subscriber-service controls that aid intrusion, interception, or disruption against a carrier environment. Misuse still needs technical capability and usually separate credentials, while the medium-confidence topic detector can match architecture guidance or product documentation. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. Current routing, switching, trust and subscriber-control configuration can enable intrusion, interception or national communications disruption. Significant service and security damage is inherent. Risk 10 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require carrier/core identity plus live routing, switching, profile or trust configuration; architecture brochures remain excluded. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
