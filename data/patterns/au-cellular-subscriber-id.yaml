schema: testpattern/v1
name: Australian Mobile Number
slug: au-cellular-subscriber-id
version: 2.2.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Identifies Australian mobile telephone numbers in domestic (04XX) and international (+614XX) notation. Uses lookaround boundaries to prevent embedded numeric matches. Supports space-only separation
  between digit groups for high precision.
operation: >-
  Lookaround-bounded regex matching Australian cellular subscriber numbers. Domestic prefix 04 is
  followed by 8 digits, or international prefix +61 4 by 8 digits, with optional single-space
  separators. The bare format is discovery-only at 65, generic phone context enforces at 75, and a
  mobile-specific label plus independent contact-record context reaches 85.
pattern: (?<!\d)(?:04\s?\d{2}\s?\d{3}\s?\d{3}|\+61\s?4\d{2}\s?\d{3}\s?\d{3})(?!\d)
confidence: medium
confidence_justification: >-
  Medium confidence: the 04 prefix is Australian-mobile-specific but 10-digit numeric sequences occur in other contexts. Lookaround boundaries reduce false positives from embedded numbers.
  Corroborative keywords elevate confidence.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - contact-information
corroborative_evidence:
  keywords:
    - cellular
    - handset
    - subscriber
    - wireless number
    - SMS contact
    - text number
    - personal details
    - customer record
    - client file
    - account holder
  proximity: 300
  keyword_lists:
    - au-telecom-terms
test_cases:
  should_match:
    - value: '0412 345 678'
      description: Low-tier probe - domestic mobile structure without context
    - value: 'Phone: +61 412 345 678'
      description: Medium-tier probe - international mobile structure with generic phone context
    - value: 'Customer record - mobile number: 0498 765 432'
      description: High-tier probe - mobile-specific label in an independent customer-record context
    - value: 'SMS contact: 0400 000 111'
      description: Medium-tier mobile label without independent record context
  should_not_match:
    - value: '10412345678'
      description: Embedded in longer number — leading digit prevents match
    - value: '0512345678'
      description: Prefix 05 is not a valid Australian mobile prefix
    - value: 041 234 56
      description: Only 8 digits after prefix, too short
    - value: '+61 3 9876 5432'
      description: International landline prefix (+61 3) is not a mobile (+61 4) number
    - value: 'Documentation example: customer record mobile number 0412 345 678'
      description: Structurally complete but explicitly documented example must not enforce
false_positives:
  - description: 10-digit sequences starting with 04 in reference numbers or dates.
    mitigation: Lookaround boundaries prevent embedded matches. Corroborative keywords required.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 3
risk_description: >-
  The canonical Australian Mobile Number regex returns a single cellular telephone number in accepted national or international notation. Someone who acquires it may send spam, place unwanted calls, or combine it with public information to target the apparent user. Number portability and routine sharing mean the digits do not reliably identify a person, and the match carries no messages, location history, or service credential. Risk 3 and OFFICIAL therefore fit the ordinary contact datum, with richer subscriber or communications records assessed separately.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: phone-context
      as: Evidence_phone_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_cellular_combined
      matches:
        - ref: Evidence_mobile_specific
        - ref: Evidence_contact_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_cellular_combined
      matches:
        - ref: Evidence_phone_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_cellular_combined
  regexes:
    - id: Pattern_cellular_combined
      pattern: (?<!\d)(?:04\s?\d{2}\s?\d{3}\s?\d{3}|\+61\s?4\d{2}\s?\d{3}\s?\d{3})(?!\d)
  keywords:
    - id: Evidence_mobile_specific
      groups:
        - match_style: word
          terms:
            - cellular number
            - mobile number
            - mobile phone
            - handset number
            - wireless number
            - SMS contact
            - text number
    - id: Evidence_contact_record
      groups:
        - match_style: word
          terms:
            - contact details
            - customer record
            - client file
            - account holder
            - staff directory
            - emergency contact
            - subscriber details
created: '2026-02-09'
updated: '2026-07-18'
changelog:
  - version: 2.2.0
    date: '2026-07-18'
    description: 'Profile quality: replace generic record-word evidence with bare-format discovery, phone-context medium, and mobile-label-plus-contact-record high tiers; add template rejection and exact-tier tests.'
  - version: 2.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 526 without changing detector or package metadata.'
  - version: 2.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
