schema: testpattern/v1
name: Australian Mobile Number
slug: au-cellular-subscriber-id
version: 2.1.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Identifies Australian mobile telephone numbers in domestic (04XX) and international (+614XX) notation. Uses lookaround boundaries to prevent embedded numeric matches. Supports space-only separation
  between digit groups for high precision.
operation: >-
  Lookaround-bounded regex matching Australian cellular subscriber numbers. Domestic prefix 04 followed by 8 digits, or international prefix +61 4 followed by 8 digits, with optional single-space
  separators. Corroborative evidence: 3 tiers with telecom and personal-context keywords within 300 characters.
pattern: (?<!\d)(?:04\s?\d{2}\s?\d{3}\s?\d{3}|\+61\s?4\d{2}\s?\d{3}\s?\d{3})(?!\d)
confidence: medium
confidence_justification: >-
  Medium confidence: the 04 prefix is Australian-mobile-specific but 10-digit numeric sequences occur in other contexts. Lookaround boundaries reduce false positives from embedded numbers.
  Corroborative keywords elevate confidence.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - contact-information
corroborative_evidence:
  keywords:
    - cellular
    - handset
    - subscriber
    - wireless number
    - SMS contact
    - text number
    - personal details
    - customer record
    - client file
    - account holder
  proximity: 300
  keyword_lists:
    - au-telecom-terms
test_cases:
  should_match:
    - value: 'Cellular: 0412 345 678'
      description: Standard domestic format with spaces
    - value: 'Subscriber: +61 412 345 678'
      description: International format with spaces
    - value: 'Handset: 0498 765 432'
      description: Domestic with context keyword
    - value: 'SMS contact: 0400 000 111'
      description: Domestic with double-zero grouping
  should_not_match:
    - value: '10412345678'
      description: Embedded in longer number — leading digit prevents match
    - value: '0512345678'
      description: Prefix 05 is not a valid Australian mobile prefix
    - value: 041 234 56
      description: Only 8 digits after prefix, too short
    - value: '+61 3 9876 5432'
      description: International landline prefix (+61 3) is not a mobile (+61 4) number
false_positives:
  - description: 10-digit sequences starting with 04 in reference numbers or dates.
    mitigation: Lookaround boundaries prevent embedded matches. Corroborative keywords required.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 3
risk_description: >-
  The canonical Australian Mobile Number regex returns a single cellular telephone number in accepted national or international notation. Someone who acquires it may send spam, place unwanted calls, or combine it with public information to target the apparent user. Number portability and routine sharing mean the digits do not reliably identify a person, and the match carries no messages, location history, or service credential. Risk 3 and OFFICIAL therefore fit the ordinary contact datum, with richer subscriber or communications records assessed separately.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_cellular_combined
      matches:
        - ref: Evidence_telecom_primary
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_cellular_combined
      matches:
        - ref: Evidence_telecom_context
    - confidence_level: 65
      id_match: Pattern_cellular_combined
      matches:
        - ref: Evidence_personal_record
  regexes:
    - id: Pattern_cellular_combined
      pattern: (?<!\d)(?:04\s?\d{2}\s?\d{3}\s?\d{3}|\+61\s?4\d{2}\s?\d{3}\s?\d{3})(?!\d)
  keywords:
    - id: Evidence_telecom_primary
      groups:
        - match_style: word
          terms:
            - cellular
            - handset
            - subscriber
            - wireless number
            - SMS contact
            - text number
            - call back
            - dial
    - id: Evidence_telecom_context
      groups:
        - match_style: word
          terms:
            - personal details
            - customer record
            - client file
            - account holder
            - next of kin
            - emergency
            - notification
    - id: Evidence_personal_record
      groups:
        - match_style: word
          terms:
            - record
            - file
            - form
            - register
            - roster
            - directory
created: '2026-02-09'
updated: '2026-07-14'
