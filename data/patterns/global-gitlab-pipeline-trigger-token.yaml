schema: testpattern/v1
name: GitLab Pipeline Trigger Token
slug: global-gitlab-pipeline-trigger-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects GitLab pipeline trigger tokens (glptt- prefix). These tokens let external systems
  start CI/CD pipelines via the trigger API; a leak allows unauthorized pipeline execution.
operation: 'Prefixed token format glptt- followed by 40 lowercase hexadecimal characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_-])glptt-[0-9a-f]{40}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: the distinctive glptt- prefix with a fixed 40-character hex body makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - gitlab
    - pipeline trigger
    - trigger token
    - CI/CD
    - trigger pipeline
  proximity: 300
test_cases:
  should_match:
    - value: glptt-0123456789abcdef0123456789abcdef01234567
      description: Exact 65 probe - fixed hexadecimal token without independent GitLab context
    - value: 'GitLab pipeline trigger credential glptt-deadbeefdeadbeefdeadbeefdeadbeefdeadbeef'
      description: Exact 75 probe - token with GitLab pipeline-trigger context
    - value: 'GitLab CI pipeline secret GITLAB_TRIGGER_TOKEN=glptt-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'
      description: Exact 85 probe - CI pipeline context plus canonical trigger assignment
  should_not_match:
    - value: glptt-0123456789abcdef
      description: Too short to be a pipeline trigger token
    - value: glpat-ABCDEFGHIJ1234567890
      description: GitLab PAT prefix, not a pipeline trigger token
    - value: glrt-ABCDEFGHIJ1234567890
      description: GitLab runner token is a sibling family, not a trigger token
    - value: 'Documentation example: GitLab CI pipeline GITLAB_TRIGGER_TOKEN=glptt-0123456789abcdef0123456789abcdef01234567'
      description: Documentation example containing a valid-shaped trigger token is excluded
    - value: regenerate the gitlab pipeline trigger token in settings
      description: Prose mention without a token value
false_positives:
  - description: 40-char hex digests (e.g. SHA-1) accidentally prefixed with glptt- in documentation.
    mitigation: Require corroborative GitLab CI/CD keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This high-confidence pattern recognises a GitLab pipeline trigger token with the glptt prefix and 40-character hexadecimal body. A usable token can start authorised project pipelines, potentially consuming resources, reaching pipeline variables, or executing maliciously prepared jobs. The normal unit is limited to the associated project's trigger configuration and does not by itself grant source access or organisation-wide control. Risk 8 and SENSITIVE InfoTech fit the direct CI misuse; PROTECTED requires demonstrated broad production or critical-service consequences.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_gitlab_pipeline_trigger_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_gitlab_pipeline_trigger_token
      matches:
        - ref: Keyword_gitlab_pipeline_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_gitlab_pipeline_trigger_token
      matches:
        - ref: Keyword_gitlab_pipeline_context
        - ref: Pattern_gitlab_trigger_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_gitlab_pipeline_trigger_token
      pattern: (?<![A-Za-z0-9_-])glptt-[0-9a-f]{40}(?![A-Za-z0-9_-])
    - id: Pattern_gitlab_trigger_assignment
      pattern: (?i)\b(?:GITLAB_TRIGGER_TOKEN|CI_JOB_TRIGGER_TOKEN|TRIGGER_TOKEN)\s*[=:]
  keywords:
    - id: Keyword_gitlab_pipeline_context
      groups:
        - match_style: string
          terms:
            - GitLab pipeline trigger
            - GitLab CI pipeline
            - GitLab trigger API
            - GitLab project pipeline
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
