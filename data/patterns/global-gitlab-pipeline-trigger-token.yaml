    date: '2026-07-19'
    description: 'Add an individual 65 discovery / 75 GitLab-pipeline / 85 trigger-assignment Purview contract with exact-tier, sibling-token, malformed, and documentation probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1538 without changing detector or package metadata.'
