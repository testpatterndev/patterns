schema: testpattern/v1
name: GitLab Pipeline Trigger Token
slug: global-gitlab-pipeline-trigger-token
version: 1.1.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects GitLab pipeline trigger tokens (glptt- prefix). These tokens let external systems
  start CI/CD pipelines via the trigger API; a leak allows unauthorized pipeline execution.
operation: 'Prefixed token format glptt- followed by 40 lowercase hexadecimal characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_-])glptt-[0-9a-f]{40}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: the distinctive glptt- prefix with a fixed 40-character hex body makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - gitlab
    - pipeline trigger
    - trigger token
    - CI/CD
    - trigger pipeline
  proximity: 300
test_cases:
  should_match:
    - value: glptt-0123456789abcdef0123456789abcdef01234567
      description: GitLab pipeline trigger token, glptt- prefix + 40 hex
    - value: 'TRIGGER_TOKEN=glptt-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'
      description: Labelled pipeline trigger token in env var
    - value: glptt-deadbeefdeadbeefdeadbeefdeadbeefdeadbeef
      description: Pipeline trigger token with hex body
  should_not_match:
    - value: glptt-0123456789abcdef
      description: Too short to be a pipeline trigger token
    - value: glpat-ABCDEFGHIJ1234567890
      description: GitLab PAT prefix, not a pipeline trigger token
    - value: regenerate the gitlab pipeline trigger token in settings
      description: Prose mention without a token value
false_positives:
  - description: 40-char hex digests (e.g. SHA-1) accidentally prefixed with glptt- in documentation.
    mitigation: Require corroborative GitLab CI/CD keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  A leaked GitLab pipeline trigger token allows attackers to run CI/CD pipelines, potentially injecting code or exfiltrating pipeline secrets.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-09'
changelog:
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
author: testpattern-community
