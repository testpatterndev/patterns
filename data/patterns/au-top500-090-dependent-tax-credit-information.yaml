schema: testpattern/v1
name: Dependent tax credit information
slug: au-top500-090-dependent-tax-credit-information
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to dependent tax credit information in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:dependent\s+tax\s+credit|tax\s+offset|family\s+tax\s+benefit|dependant\s+rebate|child\s+dependent|spouse\s+rebate|invalid\s+relative\s+offset|zone\s+tax\s+offset|carer\s+allowance|tax\s+credit\s+claim)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - dependent tax credit information
    - dependent
    - tax
    - credit
    - information
    - payroll
    - operations
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: dependent tax credit
      description: Primary topic phrase match
    - value: tax offset
      description: Case-insensitive topic phrase match
    - value: family tax benefit
      description: Alternative topic phrase match
    - value: dependant rebate
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_dependent_tax_credit_information
      matches:
        - ref: Evidence_dependent_tax_credit_information
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_dependent_tax_credit_information
      matches:
        - ref: Evidence_dependent_tax_credit_information
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_dependent_tax_credit_information
      matches:
        - ref: Evidence_dependent_tax_credit_information
  regexes:
    - id: Pattern_dependent_tax_credit_information
      pattern: (?is)\b(?:dependent\s+tax\s+credit|tax\s+offset|family\s+tax\s+benefit|dependant\s+rebate|child\s+dependent|spouse\s+rebate|invalid\s+relative\s+offset|zone\s+tax\s+offset|carer\s+allowance|tax\s+credit\s+claim)\b
  keywords:
    - id: Evidence_dependent_tax_credit_information
      groups:
        - match_style: word
          terms:
            - dependent tax credit
            - tax offset
            - dependent
            - family tax benefit
            - FTB
            - dependant rebate
            - child dependent
            - spouse rebate
            - invalid relative offset
            - zone tax offset
            - carer allowance
            - tax credit claim
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
