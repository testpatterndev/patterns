schema: testpattern/v1
name: U.S. Driver's License Number (Multi-State)
slug: us-drivers-license-multistate
version: 1.0.0
type: regex
engine: universal
description: >-
  A multi-state helper for detecting U.S. driver's license numbers using the real structural formats of several
  high-population states, rather than the broad "letter + 7-12 digits" catch-all. Covers California, New York, Texas,
  Florida, New Jersey, and Illinois. This is a companion to the generic us-drivers-license pattern (which it does not
  replace); use it when you want tighter, state-aware matching for those jurisdictions.
operation: >-
  An alternation of state-specific formats: CA (1 letter + 7 digits), NY (1 letter + 18 digits, or 8-9 digits), TX
  (8 digits), FL (1 letter + 12 digits), NJ (1 letter + 14 digits), IL (1 letter + 11-12 digits). Purely numeric
  formats are ambiguous, so corroborative DMV/license keywords within 300 characters are strongly recommended.
pattern: \b[A-Z]\d{18}\b|\b[A-Z]\d{14}\b|\b[A-Z]\d{11,12}\b|\b[A-Z]\d{7}\b|\b\d{8,9}\b
confidence: medium
confidence_justification: >-
  Medium confidence: the letter-prefixed state formats are structurally distinctive, but the purely numeric NY/TX
  formats (8-9 digits) overlap with generic numbers, so corroborative DMV keywords are required for reliable detection.
jurisdictions:
  - us
regulations:
  - "State Breach Laws (US)"
  - "CCPA/CPRA"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - driver
    - driver's license
    - drivers license
    - driver license
    - driving licence
    - license number
    - DL
    - DL number
    - DMV
    - motor vehicle
    - state ID
    - identification card
    - class C
    - REAL ID
  proximity: 300
test_cases:
  should_match:
    - value: 'CA DL: D1234567'
      description: California format — 1 letter + 7 digits
    - value: 'FL license F123456789012'
      description: Florida format — 1 letter + 12 digits
    - value: NJ driver license N12345678901234
      description: New Jersey format — 1 letter + 14 digits
  should_not_match:
    - value: '123456'
      description: Six digits — too few for any covered numeric state format
    - value: AB1234567
      description: Two leading letters — no covered state uses a two-letter prefix
    - value: Please bring your driver's license to the DMV appointment
      description: Prose about a driver's license with no number value
false_positives:
  - description: >-
      Generic 8-9 digit numbers (order IDs, account numbers, ZIP+4 concatenations) that collide with the numeric
      NY/TX formats.
    mitigation: >-
      Require corroborative DMV/driver-license keywords within the proximity window; prefer the letter-prefixed state
      formats which are far more distinctive.
  - description: Letter-prefixed product codes or part numbers that coincide with a state license length.
    mitigation: Combine with state-name or DMV context keywords and exclude known catalogue/SKU document types.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 6
risk_description: >-
  Driver's license numbers are government-issued identity credentials used for age, identity, and address verification.
  Exposure enables identity fraud, synthetic-identity creation, and account takeover, and triggers state breach
  notification laws.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://ntsi.com/drivers-license-format/
    title: "State Driver's License Format - National Traffic Safety Institute"
  - url: https://success.skyhighsecurity.com/Skyhigh_Data_Loss_Prevention/Data_Identifiers/U.S._Driver's_License_Numbers
    title: "U.S. Driver's License Numbers (state formats) - Skyhigh Security"
