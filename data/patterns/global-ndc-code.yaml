schema: testpattern/v1
name: NDC
slug: global-ndc-code
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: Detects NDC patterns.
operation: >-
  Reference: https://www.fda.gov/media/173715/download Corroborative evidence: 19 keywords within 300 characters. Keyword lists: healthcare-codes, au-healthcare-medications. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b(\d{4}-\d{4}-\d{2}|\d{5}-\d{3}-\d{2}|\d{5}-\d{4}-\d{1})\b
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - HIPAA
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - healthcare
corroborative_evidence:
  keywords:
    - MRN
    - medical record number
    - patient ID
    - NPI
    - DEA
    - medicare
    - medicaid
    - insurance ID
    - member ID
    - beneficiary
    - ICD-10
    - ICD-9
    - CPT
    - NDC
    - SNOMED
    - HCPCS
    - diagnosis code
    - procedure code
    - drug code
  proximity: 300
  keyword_lists:
    - healthcare-codes
    - au-healthcare-medications
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 0002-3227-01
      description: NDC in 4-4-2 format
    - value: 12345-678-90
      description: NDC in 5-3-2 format
    - value: 12345-6789-0
      description: NDC in 5-4-1 format
  should_not_match:
    - value: 12345-678
      description: Only 2 groups instead of 3 (missing package segment)
    - value: 123-4567-01
      description: Wrong digit count in first group (3 instead of 4 or 5)
    - value: 12345-67890-1
      description: Too many digits in second group
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ndc_code
      matches:
        - ref: Pattern_global_ndc_code_label_context
        - ref: Keyword_global_ndc_code_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_ndc_code
      matches:
        - ref: Keyword_ndc
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ndc_code
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ndc_code
      pattern: \b(\d{4}-\d{4}-\d{2}|\d{5}-\d{3}-\d{2}|\d{5}-\d{4}-\d{1})\b
    - id: Pattern_global_ndc_code_label_context
      pattern: (?i)\b(?:ndc)\b
  keywords:
    - id: Keyword_ndc
      groups:
        - match_style: word
          terms:
            - text: NDC
              case_sensitive: true
            - national drug code
            - drug code
            - medication
            - prescription
            - pharmaceutical
            - dosage
            - drug product
            - labeler
            - package code
            - formulary
            - pharmacy
            - dispensing
      strength: domain
    - id: Keyword_global_ndc_code_domain_context
      groups:
        - match_style: word
          terms:
            - ndc
      strength: domain
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
