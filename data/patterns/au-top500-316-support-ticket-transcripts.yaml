schema: testpattern/v1
name: Support ticket transcripts
slug: au-top500-316-support-ticket-transcripts
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies support ticket conversation transcripts in security and access control contexts. Enforcement requires timestamped requester/agent message turns; ticket, help-desk, and service-desk
  references without conversational structure remain discovery inventory.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-education.
pattern: (?is)\b(?:support\s+ticket|ticket\s+transcript|help\s+desk|service\s+desk|case\s+number|ticket\s+ID|customer\s+complaint|resolution\s+notes|incident\s+ticket|support\s+request|ticket\s+history)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - support ticket transcripts
    - support
    - ticket
    - transcripts
    - operations
    - resilience
  proximity: 300
  keyword_lists:
    - industry-education
test_cases:
  should_match:
    - value: support ticket
      description: Primary topic phrase match
    - value: ticket transcript
      description: Case-insensitive topic phrase match
    - value: help desk
      description: Alternative topic phrase match
    - value: service desk
      description: Additional topic phrase match
    - value: "Ticket ID=HD-771\n09:14 Customer: VPN fails after MFA\n09:16 Agent: Reset the device registration\n09:22 Customer: Access restored"
      description: Ticket ID with three timestamped alternating requester/agent messages - the transcript shape that satisfies Evidence_ticket_transcript_turn for enforcement
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_support_ticket
      matches:
        - ref: Evidence_support_ticket
          min_count: 2
          unique_results: true
        - ref: Evidence_ticket_transcript_turn
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_support_ticket
      matches:
        - ref: Evidence_support_ticket
        - ref: Evidence_ticket_transcript_turn
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_support_ticket
      matches:
        - ref: Evidence_support_ticket
  regexes:
    - id: Pattern_support_ticket
      pattern: >-
        (?is)\b(?:support\s+ticket|ticket\s+transcript|help\s+desk|service\s+desk|case\s+number|ticket\s+ID|customer\s+complaint|resolution\s+notes|incident\s+ticket|support\s+request|ticket\s+history)\b
    - id: Evidence_ticket_transcript_turn
      pattern: >-
        (?i)(?:\[?\d{1,2}:\d{2}(?::\d{2})?\]?[ \t]{0,4})?\b(?:requester|customer|user|agent|support)\b[ \t]{0,4}[-:>][ \t]{0,4}\S[^\r\n]{0,160}
  keywords:
    - id: Evidence_support_ticket
      groups:
        - match_style: word
          terms:
            - support ticket
            - ticket transcript
            - help desk
            - service desk
            - case number
            - ticket ID
            - customer complaint
            - escalation
            - resolution notes
            - incident ticket
            - support request
            - ticket history
risk_description: >-
  The pattern recognises support-ticket, ticket-transcript, help-desk, and service-desk language, indicating a support record or transcript rather than proving that a password is present. A leaked transcript can support impersonation by revealing user identities, device details, error messages, troubleshooting steps, and internal escalation paths. Harm ordinarily centres on the user and service involved in one ticket, and an attacker still needs actionable account or system details from the surrounding content. Risk 8 SENSITIVE reflects the serious contained exposure possible in a genuine transcript; a bulk ticket corpus, privileged credentials, or broad security architecture would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: 'Reduced-scope alignment fix (TP-00432): add Evidence_ticket_transcript_turn (timestamped requester/customer/user/agent/support speaker-turn regex) and require at least two unique turns in the 75/85 enforcement tiers, so help-desk policy prose with ticket vocabulary can no longer enforce; the topic branch is retained as a discovery-only 65 tier. Turn regex written with [^\r\n]/bounded-gap idioms instead of the first-pass (?im)^...$ line anchors, which repo CI bans for purview patterns.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 907 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
