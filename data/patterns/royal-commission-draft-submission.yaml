schema: testpattern/v1
name: Royal Commission Draft Submission
slug: royal-commission-draft-submission
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects draft submissions to Royal Commissions before formal tabling. Pre-tabling drafts reveal the State's narrative strategy, admissions under consideration, and positions not yet finalised. Disclosure prejudices the State's participation in proceedings of national significance.
operation: 'Primary detection: keyword proximity matching ''Royal Commission'' within 200 characters of draft/submission terms (''draft submission'', ''draft response'', ''proposed submission'', ''submission for approval''). Document marker detection: ''DRAFT'' + ''Royal Commission'' + (''PROTECTED'' or ''CONFIDENTIAL'' or ''NOT FOR PUBLICATION''). Exclusion: negative match on ''tabled'', ''published'', ''public version''. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\bRoyal\s+Commission\b
confidence: high
confidence_justification: 'High confidence: Royal Commission + DRAFT/submission + PROTECTED markers is a narrow, precise combination. Exclusion of published/tabled versions effectively eliminates public document false positives.'
jurisdictions:
  - au
regulations:
- "Commissions of Inquiry Act 1950 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - draft submission
    - draft response
    - proposed submission
    - submission for approval
    - DRAFT
    - PROTECTED
    - CONFIDENTIAL
    - NOT FOR PUBLICATION
    - privileged
    - not for distribution
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        DRAFT — NOT FOR PUBLICATION
        PROTECTED

        Proposed Submission to the Royal Commission into Institutional Responses to Child Sexual Abuse

        Prepared by: Department of Child Safety
        Status: Draft for approval — Director-General review required
      description: Draft Royal Commission submission with PROTECTED marking
    - value: This draft response to the Royal Commission has been prepared for the Attorney-General's approval. The submission for approval contains proposed admissions regarding systemic failures in the foster care system that have not been finalised.
      description: Draft response to Royal Commission pending approval
    - value: |-
        CONFIDENTIAL — DRAFT
        Royal Commission into Veterans' Suicide
        Draft Submission — State of Queensland
        Version 3.2 — For internal review only

        This proposed submission addresses Terms of Reference 4(a) through 4(f).
      description: Draft Royal Commission submission marked for internal review
  should_not_match:
    - value: The Royal Commission into Institutional Responses published its final report in December 2017. The published findings are available on the Royal Commission's website.
      description: Published Royal Commission final report
    - value: The State of Queensland's submission to the Royal Commission was tabled on 15 March 2024. The public version of the submission can be accessed through the Commission's document library.
      description: Tabled/published Royal Commission submission
    - value: A news report about the Royal Commission hearing revealed that several witnesses gave evidence about institutional failures. The media coverage was extensive.
      description: News article about Royal Commission hearings
false_positives:
  - description: Published Royal Commission final reports and findings
    mitigation: Negative match on 'final report', 'published', 'findings available', 'website'
  - description: Tabled government submissions that are now public
    mitigation: Negative match on 'tabled', 'public version', 'publicly available'
  - description: News articles and media coverage of Royal Commission proceedings
    mitigation: Negative match on 'media release', 'news report', 'media coverage'. Require DRAFT or PROTECTED markers
  - description: Academic analysis of Royal Commission outcomes
    mitigation: Require co-occurrence with draft/submission terms and government entity names
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_royal_commission_draft_submission_royal_commission_phrase
      matches:
        - ref: Evidence_royal_commission_draft_submission_primary
        - ref: Evidence_royal_commission_draft_submission_corroborative
        - ref: Evidence_royal_commission_draft_submission_exclusion
        - ref: Pattern_royal_commission_draft_submission_draft_submission_response_phrase
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_royal_commission_draft_submission_exclusion
    - confidence_level: 75
      id_match: Pattern_royal_commission_draft_submission_royal_commission_phrase
      matches:
        - ref: Evidence_royal_commission_draft_submission_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_royal_commission_draft_submission_exclusion
    - confidence_level: 65
      id_match: Pattern_royal_commission_draft_submission_royal_commission_phrase
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_royal_commission_draft_submission_exclusion
  regexes:
    - id: Pattern_royal_commission_draft_submission_royal_commission_phrase
      pattern: (?i)\bRoyal\s+Commission\b
    - id: Pattern_royal_commission_draft_submission_draft_submission_response_phrase
      pattern: (?i)\bdraft\s+(?:submission|response)\b
  keywords:
    - id: Evidence_royal_commission_draft_submission_primary
      groups:
        - match_style: word
          terms:
            - Royal Commission
            - draft submission
            - proposed submission
            - submission for approval
    - id: Evidence_royal_commission_draft_submission_corroborative
      groups:
        - match_style: word
          terms:
            - DRAFT
            - PROTECTED
            - CONFIDENTIAL
            - NOT FOR PUBLICATION
            - draft response
            - not for distribution
            - internal review
            - for approval
    - id: Evidence_royal_commission_draft_submission_exclusion
      groups:
        - match_style: word
          terms:
            - tabled
            - published
            - public version
            - final report
            - media release
            - news report
            - findings available
            - website
    - id: Filter_royal_commission_draft_submission_exclusion
      groups:
        - match_style: word
          terms:
            - tabled in Parliament
            - published findings
            - public submission

risk_rating: 8
risk_description: Draft submissions to Royal Commissions before formal tabling. Disclosure prejudices the State's position, enables pre-emptive counter-narratives, and may breach Royal Commission confidentiality orders. Legislative review (Mar 2026) established BIL:2 — Evidence Act 1977 (Qld) defines legal professional privilege as an evidentiary rule without criminal penalties for disclosure. RTI Act 2009 Sch3 s7 exempts from compelled disclosure but does not mandate PROTECTED classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Legal"
references: []
created: '2026-02-20'
updated: '2026-03-06'
author: qld-gov-dlp
