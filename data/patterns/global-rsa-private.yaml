schema: testpattern/v1
name: RSA Private Key Header
slug: global-rsa-private
version: 1.4.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects PKCS#1 RSA private-key armor. A BEGIN line is discovery-only, the first
  DER-like Base64 line supports medium confidence, and several normally wrapped
  body lines near the header support high confidence.
operation: >-
  Regex_rsa_private matches the PKCS#1 BEGIN marker. The 75 tier requires a
  plausible first DER Base64 line beginning MII. The 85 tier additionally requires
  three consecutive 64-character armor lines, all within 300 characters of the
  header. It therefore classifies normal full keys without relying on a distant
  END marker. Header-only candidates remain discovery-only at 65.
pattern: '-----BEGIN RSA PRIVATE KEY-----'
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private key
    - secret key
    - key file
    - PEM
    - certificate
    - RSA
    - cryptographic
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '-----BEGIN RSA PRIVATE KEY-----'
      description: Low-tier probe - PKCS#1 header without a container body
    - value: |-
        -----BEGIN RSA PRIVATE KEY-----
        MIIEpAIBAAKCAQEAsUCYqdw/QHCmWnNK7RjYIZaE3QnXQAf5a6znOdg0MAk2X4t3
        QQ==
      description: Medium-tier probe - realistic first PKCS#1 DER armor line
    - value: |-
        -----BEGIN RSA PRIVATE KEY-----
        MIIEpAIBAAKCAQEAsUCYqdw/QHCmWnNK7RjYIZaE3QnXQAf5a6znOdg0MAk2X4t3
        JaRH3xVNipwkmjbVL5omeBWECLtSWJ3hHKfiF+wTFcOZikifLBYiTAAGBAdE9C+v
        rF63QS9D+9KSrdgmfqRdYmozlw9ySrTJn8kdxdz0a9A1b1c+3KDGRIQHXDW6q8Mm
        lB6vkByKUyCR9/KybDjpQXV6KOhKrWHV7R0OUh46iNF4h9udhMrr3o7CmF/iyGP1
        WbHmmHzZPBQ1Oa8SJnHIGwZCDBf8/7k6jz65SHEjJxO3PlQOCsxGUnNoAj7TA2z2
        xsXdl1wurK9QTX/dXzas4Hno+xMTZBbFH+b30QIDAQABAoIBABOnMGYhDAhWlTNR
        -----END RSA PRIVATE KEY-----
      description: High-tier probe - realistically long PKCS#1 body with footer beyond proximity
  should_not_match:
    - value: '-----BEGIN PUBLIC KEY-----'
      description: Public key, not private
    - value: '-----BEGIN CERTIFICATE-----'
      description: Certificate, not private key
    - value: |-
        -----BEGIN RSA PRIVATE KEY-----
        QQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQ
        AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
        BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
      description: Adversarial wrapped Base64 lacks a PKCS#1 DER prelude
    - value: |-
        -----BEGIN RSA PRIVATE KEY-----
        PLACEHOLDER
        -----END RSA PRIVATE KEY-----
      description: Placeholder container has no DER-like body
    - value: |-
        Documentation example:
        -----BEGIN RSA PRIVATE KEY-----
        MIIEpAIBAAKCAQEAsUCYqdw/QHCmWnNK7RjYIZaE3QnXQAf5a6znOdg0MAk2X4t3
        JaRH3xVNipwkmjbVL5omeBWECLtSWJ3hHKfiF+wTFcOZikifLBYiTAAGBAdE9C+v
        rF63QS9D+9KSrdgmfqRdYmozlw9ySrTJn8kdxdz0a9A1b1c+3KDGRIQHXDW6q8Mm
        -----END RSA PRIVATE KEY-----
      description: Documentation quoting realistic wrapped key data must not enforce
    - value: '-----BEGIN EC PRIVATE KEY-----'
      description: Sibling EC private-key armor is not PKCS#1 RSA
false_positives:
  - description: PEM-encoded certificates or public keys that use similar header formats
    mitigation: The pattern specifically matches the private key header text, but verify the full PEM block contains actual key material.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_rsa_private
      matches:
        - ref: Evidence_rsa_der_prelude
        - ref: Evidence_rsa_multiline_body
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_rsa_private
      matches:
        - ref: Evidence_rsa_der_prelude
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_rsa_private
  regexes:
    - id: Regex_rsa_private
      pattern: '-----BEGIN RSA PRIVATE KEY-----'
    - id: Evidence_rsa_der_prelude
      pattern: '(?:\r?\n)MII[A-Za-z0-9+/]{45,61}={0,2}(?:\r?\n)'
    - id: Evidence_rsa_multiline_body
      pattern: '(?:\r?\n)(?:[A-Za-z0-9+/]{64}\r?\n){3}'
risk_description: >-
  The pattern identifies the exact PEM header for an RSA private key, a strong format marker that does not by itself include or validate the following key bytes. If a usable RSA key follows, disclosure can enable signing, TLS or account impersonation, or decryption according to how the key is deployed. The normal affected scale is one key and its relying certificate, host, or application, while documentation, incomplete blocks, passphrase protection, and revocation constrain misuse. Risk 8 SENSITIVE reflects serious potential from confirmed adjacent key material; PROTECTED requires evidence of a broad trust anchor, critical service, or other significant operational consequence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
