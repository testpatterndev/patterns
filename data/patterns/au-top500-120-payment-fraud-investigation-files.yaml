schema: testpattern/v1
name: Payment fraud investigation files
slug: au-top500-120-payment-fraud-investigation-files
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to payment fraud investigation files in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:payment\s+fraud|fraud\s+investigation|suspicious\s+matter|fraud\s+case|fraudulent\s+transaction|investigation\s+file|chargeback\s+fraud|identity\s+fraud|fraud\s+report|suspicious\s+activity)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payment fraud investigation files
    - payment
    - fraud
    - investigation
    - files
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: payment fraud
      description: Primary topic phrase match
    - value: fraud investigation
      description: Case-insensitive topic phrase match
    - value: suspicious matter
      description: Alternative topic phrase match
    - value: fraud case
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_payment_fraud_investigation
      matches:
        - ref: Evidence_payment_fraud_investigation
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_payment_fraud_investigation
      matches:
        - ref: Evidence_payment_fraud_investigation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_payment_fraud_investigation
      matches:
        - ref: Evidence_payment_fraud_investigation
  regexes:
    - id: Pattern_payment_fraud_investigation
      pattern: (?is)\b(?:payment\s+fraud|fraud\s+investigation|suspicious\s+matter|fraud\s+case|fraudulent\s+transaction|investigation\s+file|chargeback\s+fraud|identity\s+fraud|fraud\s+report|suspicious\s+activity)\b
  keywords:
    - id: Evidence_payment_fraud_investigation
      groups:
        - match_style: word
          terms:
            - payment fraud
            - fraud investigation
            - suspicious matter
            - SMR
            - AUSTRAC
            - fraud case
            - fraudulent transaction
            - investigation file
            - chargeback fraud
            - identity fraud
            - fraud report
            - suspicious activity
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
references:
  - https://www.austrac.gov.au/business/core-guidance/reporting/suspicious-matter-reports-smrs
  - https://asic.gov.au/regulatory-resources/markets/report-suspicious-activity/
  - https://www.austrac.gov.au/business/core-guidance/reporting
