schema: testpattern/v1
name: Social benefits claimant number
slug: au-top500-040-social-benefits-claimant-number
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to social benefits claimant number in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:social\s+benefits\s+claimant\s+number|claimant\s+number|customer\s+reference\s+number|Services\s+Australia|welfare\s+payment|social\s+security|benefit\s+recipient|income\s+support|pension\s+number)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - social benefits claimant number
    - social
    - benefits
    - claimant
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: social benefits claimant number
      description: Primary topic phrase match
    - value: claimant number
      description: Case-insensitive topic phrase match
    - value: customer reference number
      description: Alternative topic phrase match
    - value: Services Australia
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to social benefits claimant number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_social_benefits
      matches:
        - ref: Evidence_social_benefits
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_social_benefits
      matches:
        - ref: Evidence_social_benefits
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_social_benefits
      matches:
        - ref: Evidence_social_benefits
  regexes:
    - id: Pattern_social_benefits
      pattern: >-
        (?is)\b(?:social\s+benefits\s+claimant\s+number|claimant\s+number|customer\s+reference\s+number|Services\s+Australia|welfare\s+payment|social\s+security|benefit\s+recipient|income\s+support|pension\s+number)\b
    - id: Pattern_au_top500_040_social_benefits_claimant_number_label_context
      pattern: (?i)\\b(?:social\\s+benefits\\s+claimant\\s+number|social|benefits|claimant|top500)\\b
  keywords:
    - id: Evidence_social_benefits
      groups:
        - match_style: word
          terms:
            - social benefits claimant number
            - claimant number
            - Centrelink
            - CRN
            - customer reference number
            - Services Australia
            - welfare payment
            - social security
            - benefit recipient
            - income support
            - pension number
            - JobSeeker
    - id: Keyword_au_top500_040_social_benefits_claimant_number_domain_context
      groups:
        - match_style: word
          terms:
            - social benefits claimant number
            - social
            - benefits
            - claimant
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
