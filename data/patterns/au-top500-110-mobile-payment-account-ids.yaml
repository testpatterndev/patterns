schema: testpattern/v1
name: Mobile payment account IDs
slug: au-top500-110-mobile-payment-account-ids
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to mobile payment account ids in financial and compliance
  documents. Commonly found in Australian regulatory filings, transaction records,
  and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors
  with proximity constraints to match domain-specific content. Corroborative evidence:
  8 keywords within 300 characters. Keyword lists: au-telecom-terms, phone-international.
  Uses additional domain-context evidence and explicit exclusion logic for template/sample/test
  text.'
pattern: (?is)\b(?:mobile\s+payment\s+account\s+ids)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/
  ]{4,24}\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained
  context replaces phrase-only detection. Added context gating and exclusion rules
  improve precision and reduce incidental matches.
jurisdictions:
- au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
- financial
corroborative_evidence:
  keywords:
  - mobile payment account ids
  - mobile
  - payment
  - account
  - ids
  - financial
  - accounts
  - payments
  proximity: 300
  keyword_lists:

    - au-telecom-terms

    - phone-international

    - generic-data-labels
test_cases:
  should_match:
  - value: Mobile payment account IDs
    description: Exact phrase marker match
  - value: mobile payment account ids
    description: Case-insensitive phrase match
  - value: Mobile payment account IDs
    description: Normalized whitespace phrase
  - value: structured record with identifier and contextual anchors
    description: Structural anchor sample
  should_not_match:
  - value: unrelated generic text
    description: No relevant phrase context
  - value: placeholder value 12345
    description: Random text should not match phrase marker
  - value: generic narrative without identifier/document anchors
    description: Should not match plain mention
  - value: template example placeholder record identifier
    description: Template/sample context should be excluded even when anchor words
      are present
false_positives:
- description: Financial terminology appearing in published reports, accounting textbooks,
    regulatory guidance, or template documents without actual transaction data.
  mitigation: Require corroborative evidence keywords within the proximity window.
    Cross-reference with structured financial identifiers to confirm actual sensitive
    data.
- description: In Australian English, standard business terminology overlapping with
    financial detection keywords in routine correspondence and documentation.
  mitigation: Increase confidence threshold when scanning business correspondence.
    Layer with transaction-specific patterns for higher precision.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_mobile_payment_ids
      matches:
        - ref: Evidence_mobile_payment_ids
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_110_mobile_payment_account_ids_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_mobile_payment_ids
      matches:
        - ref: Evidence_mobile_payment_ids
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_110_mobile_payment_account_ids_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_mobile_payment_ids
      matches:
        - ref: Evidence_mobile_payment_ids
  regexes:
    - id: Pattern_mobile_payment_ids
      pattern: (?is)\b(?:mobile\s+payment\s+account\s+ids)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/ ]{4,24}\b
    - id: Pattern_au_top500_110_mobile_payment_account_ids_label_context
      pattern: (?i)\\b(?:mobile\\s+payment\\s+account\\s+ids|mobile|payment|account|ids|top500)\\b
  keywords:
    - id: Evidence_mobile_payment_ids
      groups:
        - match_style: word
          terms:
            - mobile payment
            - payment account
            - digital wallet
            - Apple Pay
            - Google Pay
            - mobile wallet
            - NFC payment
            - contactless payment
            - device account number
            - token ID
            - payment token
            - mobile banking
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_110_mobile_payment_account_ids_domain_context
      groups:
        - match_style: word
          terms:
            - mobile payment account ids
            - mobile
            - payment
            - account
            - ids
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_110_mobile_payment_account_ids_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
    - id: Evidence_generic_data_labels
      groups:
        - match_style: word
          terms:
            - ID
            - identifier
            - number
            - reference
            - code
            - index
            - serial
            - account
            - file number
            - case number
            - record number
            - ref
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
