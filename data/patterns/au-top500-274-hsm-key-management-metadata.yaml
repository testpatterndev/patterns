schema: testpattern/v1
name: HSM key management metadata
slug: au-top500-274-hsm-key-management-metadata
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies hsm key management metadata patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:hsm\s+key\s+management|hardware\s+security\s+module|key\s+rotation|key\s+lifecycle|cryptographic\s+key|key\s+custodian|key\s+ceremony|key\s+escrow|master\s+key)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
- "Criminal Code Act 1995 (Cth)"
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - hsm key management metadata
    - hsm
    - key
    - management
    - metadata
    - credentials
    - keys
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: hsm key management
      description: Primary topic phrase match
    - value: hardware security module
      description: Case-insensitive topic phrase match
    - value: key rotation
      description: Alternative topic phrase match
    - value: key lifecycle
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: hsm key slot
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_hsm_key_management
      matches:
        - ref: Evidence_hsm_key_management
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_hsm_key_management
      matches:
        - ref: Evidence_hsm_key_management
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_hsm_key_management
      matches:
        - ref: Evidence_hsm_key_management
  regexes:
    - id: Pattern_hsm_key_management
      pattern: (?is)\b(?:hsm\s+key\s+management|hardware\s+security\s+module|key\s+rotation|key\s+lifecycle|cryptographic\s+key|key\s+custodian|key\s+ceremony|key\s+escrow|master\s+key)\b
  keywords:
    - id: Evidence_hsm_key_management
      groups:
        - match_style: word
          terms:
            - hsm key management
            - hardware security module
            - key rotation
            - pkcs#11
            - key lifecycle
            - cryptographic key
            - key custodian
            - key ceremony
            - key escrow
            - master key
            - kms
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references: []
