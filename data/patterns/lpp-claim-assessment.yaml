schema: testpattern/v1
name: LPP Claim Assessment
slug: lpp-claim-assessment
version: 1.3.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects internal assessments evaluating whether specific documents or communications attract legal professional privilege, including analysis of privilege vulnerabilities. These meta-privilege documents map where the State's privilege claims are strong and where they are vulnerable.
operation: 'Primary detection: keyword proximity matching privilege assessment terms (''privilege claim'', ''privilege assessment'', ''LPP assessment'', ''privilege log'', ''privilege review'', ''waiver risk'') within 200 characters of analysis indicators (''assessment'', ''analysis'', ''vulnerable'', ''maintain'', ''claim'', ''PROTECTED''). Must co-occur with government entity context. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:privilege\s+(?:claim|assessment|log|review)|LPP\s+assessment|waiver\s+risk)\b
confidence: low
confidence_justification: 'Medium confidence: Privilege assessment terminology is specific to legal practice privilege management. Combined with government entity context and privilege vulnerability analysis language, false positives are minimal.'
jurisdictions:
  - au
regulations:
- "Evidence Act 1977 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - assessment
    - analysis
    - vulnerable
    - maintain
    - claim
    - PROTECTED
    - waiver
    - privilege log
    - Crown Solicitor
    - State Solicitor
    - dominant purpose
    - Evidence Act
    - s.14
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        PROTECTED — LEGAL PROFESSIONAL PRIVILEGE
        LPP Claim Assessment

        Matter: State of Queensland — RTI Application No. 2025-0342

        This assessment evaluates the privilege claims over 247 documents identified in the privilege log. Documents 42-58 are assessed as vulnerable to challenge due to mixed-purpose communication.
      description: LPP claim assessment for RTI application with vulnerability analysis
    - value: |-
        Privilege Review — Confidential
        The following privilege assessment has been prepared to identify waiver risk across the discovery set. The Crown Solicitor has advised that certain email chains may not maintain privilege due to wide circulation.
      description: Privilege review identifying waiver risk
    - value: |-
        CONFIDENTIAL
        Internal Assessment: Legal Professional Privilege Claims
        Prepared for: Department of Health Legal Services

        Privilege Vulnerability Analysis:
        - Category A documents: Strong LPP claim (dominant purpose established)
        - Category B documents: Moderate waiver risk (circulated beyond legal team)
      description: Internal privilege vulnerability analysis with category ratings
  should_not_match:
    - value: This article discusses the doctrine of legal professional privilege in Australian law. The Evidence Act 1977 (Qld) section 14 sets out the statutory basis for privilege claims.
      description: Academic article on LPP doctrine
    - value: The court considered the privilege claim and upheld it in part. The published reasons discussed the dominant purpose test and its application to the documents in question.
      description: Published court decision on privilege claim
    - value: A guide to managing privilege logs in large-scale litigation. This template provides a framework for recording privilege claims across document collections.
      description: Template/guide for privilege log management
false_positives:
  - description: Academic articles on the doctrine of legal professional privilege
    mitigation: Require co-occurrence with specific matter references, government entity names, or privilege vulnerability analysis
  - description: Published court decisions on privilege claims
    mitigation: Negative match on court citation formats and 'published reasons'
  - description: Template privilege log frameworks
    mitigation: Negative match on 'template', 'guide', 'framework', 'sample'. Require specific document counts or matter references
  - description: RTI decision notices discussing privilege (public documents)
    mitigation: Negative match on 'decision notice', 'Information Commissioner', 'published decision'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  pattern_tiers:
    - tier: high
      confidence_level: 65
      id_match: primary
      discovery_only: true
      description: LPP assessment + vulnerability analysis + government entity + PROTECTED
  regexes:
    - pattern: (?i)\b(?:privilege\s+(?:claim|assessment|log|review)|LPP\s+assessment)\b
      description: Privilege assessment terminology
    - pattern: (?i)\bwaiver\s+risk\b
      description: Privilege waiver risk phrase
  keywords:
    - group: primary
      values:
        - privilege claim
        - privilege assessment
        - LPP assessment
        - privilege log
        - privilege review
        - waiver risk
      strength: domain
    - group: corroborative
      values:
        - assessment
        - analysis
        - vulnerable
        - maintain
        - PROTECTED
        - waiver
        - Crown Solicitor
        - State Solicitor
        - dominant purpose
        - Evidence Act
      strength: domain
    - group: exclusion
      values:
        - textbook
        - article discusses
        - published reasons
        - template
        - guide
        - framework
        - decision notice
        - Information Commissioner
      strength: domain
  filters:
    - type: exclude_pattern
      pattern: \[\d{4}\]\s+Q[SC]C?A?\s+\d+
      description: Exclude QLD court citation formats
risk_rating: 7
risk_description: Internal assessments evaluating whether specific documents or communications attract LPP, including analysis of privilege vulnerabilities. Disclosure reveals which documents the State considers most vulnerable to privilege challenges. While subject to professional privilege or regulatory requirements, disclosure represents BIL:2 harm rather than the significant institutional damage threshold required for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Legal"
references: []
created: '2026-02-20'
updated: '2026-07-12'
changelog:
  - version: 1.3.0
    date: '2026-07-12'
    description: 'Baseline burn-down B: the sole pattern_tier had id_match: '''' (empty string) — idMatchIds() treats an empty id_match string as [], so scripts/verify-pattern-testcases.mjs tierEvaluable() filtered the tier out entirely (0 evaluable tiers), which routed should_not_match evaluation through the hard-fail no-tiers-to-gate-it path instead of the discovery_only warn path the tier was designed for. Wired id_match to the existing purview.keywords group id primary (already registered under the group: primary key), making the tier evaluable again; the tier remains discovery_only so a top-level hit on published-court-decision prose (the privilege claim negative) now surfaces only as a discovery-inventory warning, not a should_not_match failure. Verified: 0 FAILs, all 3 should_not_match negatives clear; all 3 should_match positives still pass via top-level pattern.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) — no tier referenced it and the legacy tier shape carries no evidence lists to wire it into (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: qld-gov-dlp
source: qld-custom
license: MIT
