schema: testpattern/v1
name: Payroll exception reports
slug: au-top500-095-payroll-exception-reports
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to payroll exception reports in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: industry-hr.'
pattern: (?is)\b(?:payroll\s+exception\s+reports|exception\s+report|payroll\s+error|variance\s+report|payroll\s+audit|reconciliation\s+exception|pay\s+run\s+error|payroll\s+correction)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payroll exception reports
    - payroll
    - exception
    - reports
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: payroll exception reports
      description: Primary topic phrase match
    - value: exception report
      description: Case-insensitive topic phrase match
    - value: payroll error
      description: Alternative topic phrase match
    - value: variance report
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_payroll_exception_reports
      matches:
        - ref: Evidence_payroll_exception_reports
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_payroll_exception_reports
      matches:
        - ref: Evidence_payroll_exception_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_payroll_exception_reports
      matches:
        - ref: Evidence_payroll_exception_reports
  regexes:
    - id: Pattern_payroll_exception_reports
      pattern: (?is)\b(?:payroll\s+exception\s+reports|exception\s+report|payroll\s+error|variance\s+report|payroll\s+audit|reconciliation\s+exception|pay\s+run\s+error|payroll\s+correction)\b
  keywords:
    - id: Evidence_payroll_exception_reports
      groups:
        - match_style: word
          terms:
            - payroll exception reports
            - exception report
            - payroll error
            - variance report
            - discrepancy
            - overpayment
            - underpayment
            - payroll audit
            - anomaly
            - reconciliation exception
            - pay run error
            - payroll correction
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.ato.gov.au/businesses-and-organisations/hiring-and-paying-your-workers/single-touch-payroll/in-detail/single-touch-payroll-employer-reporting-guidelines/rules-of-reporting-through-stp
  - https://www.fairwork.gov.au/tools-and-resources/fact-sheets/rights-and-obligations/record-keeping-pay-slips
