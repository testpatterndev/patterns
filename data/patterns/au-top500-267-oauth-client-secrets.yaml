schema: testpattern/v1
name: OAuth client secrets
slug: au-top500-267-oauth-client-secrets
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies oauth client secrets patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: classification-australia-government, credentials.
pattern: (?is)\b(?:oauth\s+client\s+secrets|client\s+secret|client\s+id|authorization\s+code|access\s+token|refresh\s+token|bearer\s+token|grant\s+type|redirect\s+uri|openid\s+connect)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - oauth client secrets
    - oauth
    - client
    - secrets
    - credentials
    - keys
  proximity: 300
  keyword_lists:
    - classification-australia-government
    - credentials
test_cases:
  should_match:
    - value: oauth client secrets
      description: Primary topic phrase match
    - value: client secret
      description: Case-insensitive topic phrase match
    - value: client id
      description: Alternative topic phrase match
    - value: authorization code
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: secret mfa
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The detector matches OAuth credential topics including client secrets, authorization codes, access tokens, refresh tokens, and the less-sensitive client ID; it is not a value validator. A live secret or token can be replayed to impersonate an application or user and exercise the scopes granted to that credential. Harm normally falls on one application, tenant, and its users, with the authorization endpoint, scope, and token validity limiting exploitability. Risk 8 and SENSITIVE capture serious but contained service compromise; a tenant-wide privileged application secret with broad standing consent would raise the consequence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_oauth_client_secrets
      matches:
        - ref: Evidence_oauth_client_secrets
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_oauth_client_secrets
      matches:
        - ref: Evidence_oauth_client_secrets
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_oauth_client_secrets
      matches:
        - ref: Evidence_oauth_client_secrets
  regexes:
    - id: Pattern_oauth_client_secrets
      pattern: (?is)\b(?:oauth\s+client\s+secrets|client\s+secret|client\s+id|authorization\s+code|access\s+token|refresh\s+token|bearer\s+token|grant\s+type|redirect\s+uri|openid\s+connect)\b
  keywords:
    - id: Evidence_oauth_client_secrets
      groups:
        - match_style: word
          terms:
            - oauth client secrets
            - oauth
            - client secret
            - client id
            - authorization code
            - access token
            - refresh token
            - bearer token
            - grant type
            - redirect uri
            - openid connect
