schema: testpattern/v1
name: Export-controlled defense technology docs
slug: au-top500-438-export-controlled-defense-technology-docs
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to export-controlled defense technology docs in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: au-government-defence-markers.'
pattern: (?is)\b(?:export\s+controlled|defense\s+technology|export\s+control|controlled\s+technology|defense\s+export|munitions\s+list|dual\s+use|strategic\s+goods|defense\s+trade|national\s+security)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - export-controlled defense technology docs
    - export
    - controlled
    - defense
    - technology
    - docs
    - intelligence
  proximity: 300
  keyword_lists:

    - au-government-defence-markers
test_cases:
  should_match:
    - value: export controlled
      description: Primary topic phrase match
    - value: defense technology
      description: Case-insensitive topic phrase match
    - value: export control
      description: Alternative topic phrase match
    - value: controlled technology
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to export-controlled defense technology docs appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_export_controlled_defense_tech
      matches:
        - ref: Evidence_export_controlled_defense_tech
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_export_controlled_defense_tech
      matches:
        - ref: Evidence_export_controlled_defense_tech
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_export_controlled_defense_tech
      matches:
        - ref: Evidence_export_controlled_defense_tech
  regexes:
    - id: Pattern_export_controlled_defense_tech
      pattern: (?is)\b(?:export\s+controlled|defense\s+technology|export\s+control|controlled\s+technology|defense\s+export|munitions\s+list|dual\s+use|strategic\s+goods|defense\s+trade|national\s+security)\b
  keywords:
    - id: Evidence_export_controlled_defense_tech
      groups:
        - match_style: word
          terms:
            - export controlled
            - defense technology
            - ITAR
            - export control
            - controlled technology
            - defense export
            - munitions list
            - dual use
            - strategic goods
            - DSGL
            - defense trade
            - national security
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
