schema: testpattern/v1
name: Snowflake Token
slug: global-snowflake-token
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects Snowflake OAuth access and refresh tokens, which carry the recognizable
  ver:1-hint: / ver:2-hint: prefix used by Snowflake authentication. These tokens (and
  programmatic access tokens used in their place) grant query and data access to a
  Snowflake account.
operation: 'Structured Snowflake OAuth token format ver:N-hint:DIGITS optionally followed by -did: and an ET base64 body. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9])ver:[12]-hint:[0-9]{6,}(?:-did:[0-9]{1,6})?(?:-ET[A-Za-z0-9+/_-]{16,}={0,2})?
confidence: high
confidence_justification: >-
  High confidence: the literal ver:N-hint: structure is specific to Snowflake OAuth
  tokens and does not occur in ordinary text; corroborative Snowflake keywords further
  reduce false positives.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - snowflake
    - snowflakecomputing
    - programmatic access token
    - oauth
    - access token
    - refresh token
    - connection string
  proximity: 300
test_cases:
  should_match:
    - value: 'ver:1-hint:836412345'
      description: 'Snowflake OAuth access token, ver:1-hint: prefix'
    - value: 'token=ver:2-hint:8001830917-did:1014-ETMsDgAAAYclXmkuAxABCDEFGHpsGXxUdaJKZlySzA=='
      description: Snowflake OAuth refresh token in a connection string
    - value: 'ver:1-hint:8364123456789'
      description: Long hint segment access token
  should_not_match:
    - value: 'ver:3-hint:836412345'
      description: Wrong version (only 1 or 2 are valid Snowflake token versions)
    - value: 'ver:1-hint:1234'
      description: Hint segment too short to be a valid Snowflake token
    - value: see the snowflake oauth token documentation for the connection string format
      description: Prose mention without a token value
false_positives:
  - description: 'Documentation or examples showing placeholder ver:1-hint: strings.'
    mitigation: Require corroborative Snowflake keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  A leaked Snowflake token grants programmatic access to a Snowflake account, enabling
  bulk extraction of warehoused data and execution of arbitrary SQL.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-06-13'
author: testpattern-community
license: MIT
references:
  - url: https://docs.snowflake.com/en/user-guide/programmatic-access-tokens
    title: Using programmatic access tokens for authentication - Snowflake
  - url: https://docs.snowflake.com/en/developer-guide/snowflake-rest-api/authentication
    title: Authenticating Snowflake REST APIs
