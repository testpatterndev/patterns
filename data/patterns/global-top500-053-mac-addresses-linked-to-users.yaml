        - ref: Pattern_global_top500_053_mac_addresses_linked_to_users_label_context
        - ref: Keyword_global_top500_053_mac_addresses_linked_to_users_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_053_mac_addresses_linked_to_users_noise_exclusion
    - confidence_level: 75
      id_match: Regex_mac_addresses_linked_to_users
      matches:
        - ref: Keyword_mac_addresses_linked_to_users
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_053_mac_addresses_linked_to_users_noise_exclusion
    - confidence_level: 65
      id_match: Regex_mac_addresses_linked_to_users
      matches:
        - ref: Keyword_mac_addresses_linked_to_users
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_053_mac_addresses_linked_to_users_noise_exclusion
  regexes:
    - id: Regex_mac_addresses_linked_to_users
      pattern: (?is)\b(?:MAC\s+addresses\s+linked\s+to\s+users|MAC\s+address|hardware\s+address|physical\s+address|network\s+interface|device\s+MAC|wireless\s+MAC|ethernet\s+address|network\s+adapter|WiFi\s+MAC|Bluetooth\s+MAC|device\s+fingerprint)\b
    - id: Pattern_global_top500_053_mac_addresses_linked_to_users_label_context
      pattern: (?i)\\b(?:mac\\s+addresses\\s+linked\\s+to\\s+users|mac|addresses|linked|users|top500)\\b
  keywords:
