schema: testpattern/v1
name: MAC addresses linked to users
slug: global-top500-053-mac-addresses-linked-to-users
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to mac addresses linked to users in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: pii-personal, phone-international. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:MAC\s+addresses\s+linked\s+to\s+users|MAC\s+address|hardware\s+address|physical\s+address|network\s+interface|device\s+MAC|wireless\s+MAC|ethernet\s+address|network\s+adapter|WiFi\s+MAC|Bluetooth\s+MAC|device\s+fingerprint)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - mac addresses linked to users
    - mac
    - addresses
    - linked
    - users
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - pii-personal
    - phone-international
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: MAC addresses linked to users
      description: Primary topic phrase match
    - value: mac address
      description: Case-insensitive topic phrase match
    - value: hardware address
      description: Alternative topic phrase match
    - value: physical address
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to mac addresses linked to users appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_mac_addresses_linked_to_users
      matches:
        - ref: Pattern_global_top500_053_mac_addresses_linked_to_users_label_context
        - ref: Keyword_global_top500_053_mac_addresses_linked_to_users_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_mac_addresses_linked_to_users
      matches:
        - ref: Keyword_mac_addresses_linked_to_users
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_mac_addresses_linked_to_users
      pattern: >-
        (?is)\b(?:MAC\s+addresses\s+linked\s+to\s+users|MAC\s+address|hardware\s+address|physical\s+address|network\s+interface|device\s+MAC|wireless\s+MAC|ethernet\s+address|network\s+adapter|WiFi\s+MAC|Bluetooth\s+MAC|device\s+fingerprint)\b
    - id: Pattern_global_top500_053_mac_addresses_linked_to_users_label_context
      pattern: (?i)\b(?:mac\s+addresses\s+linked\s+to\s+users)\b
  keywords:
    - id: Keyword_mac_addresses_linked_to_users
      groups:
        - match_style: word
          terms:
            - MAC addresses linked to users
            - MAC address
            - hardware address
            - physical address
            - network interface
            - device MAC
            - wireless MAC
            - ethernet address
            - network adapter
            - WiFi MAC
            - Bluetooth MAC
            - device fingerprint
      strength: specific
    - id: Keyword_global_top500_053_mac_addresses_linked_to_users_domain_context
      groups:
        - match_style: word
          terms:
            - mac addresses linked to users
            - mac
            - addresses
            - linked
            - users
      strength: domain
risk_description: >-
  This concept detector seeks MAC-address or hardware-address language together with user or personal context, aiming at an attributed device relationship rather than every network address. A genuine user-to-MAC mapping can reveal presence on a local network, correlate activity to a person, and support device targeting or workplace monitoring. The link usually remains useful only inside networks where the address is observed, while technical documentation and the phrase physical address can generate false positives. Risk 6 SENSITIVE reflects credible direct attribution and tracking harm; PROTECTED would require secure-facility topology, privileged network telemetry, a protected user, bulk longitudinal monitoring, or critical-system compromise.
