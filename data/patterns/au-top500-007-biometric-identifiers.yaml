schema: testpattern/v1
name: Biometric identifiers
slug: au-top500-007-biometric-identifiers
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to biometric identifiers in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: biometric-biometric-types. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:biometric\s+identifiers?|biometric\s+(?:data|template|record|sample|enrolment|authentication))\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - biometric identifiers
    - biometric
    - identifiers
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - biometric-biometric-types
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: biometric identifiers
      description: Exact phrase match
    - value: biometric data
      description: Biometric data phrase match
    - value: biometric template
      description: Biometric template phrase match
    - value: biometric authentication
      description: Biometric authentication phrase match
  should_not_match:
    - value: unrelated generic text
      description: No biometric terminology present
    - value: identifier number 12345
      description: Generic identifier without biometric context
    - value: record reference A12345
      description: Generic anchor terms no longer match
false_positives:
  - description: Common words and phrases related to biometric identifiers appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_biometric_identifiers
      matches:
        - ref: Evidence_biometric_identifiers
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_biometric_identifiers
      matches:
        - ref: Evidence_biometric_identifiers
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_biometric_identifiers
      matches:
        - ref: Evidence_biometric_identifiers
  regexes:
    - id: Pattern_biometric_identifiers
      pattern: (?is)\b(?:biometric\s+identifiers?|biometric\s+(?:data|template|record|sample|enrolment|authentication))\b
    - id: Pattern_au_top500_007_biometric_identifiers_label_context
      pattern: (?i)\\b(?:biometric\\s+identifiers|biometric|identifiers|top500)\\b
  keywords:
    - id: Evidence_biometric_identifiers
      groups:
        - match_style: word
          terms:
            - biometric identifier
            - biometric data
            - biometric template
            - biometric record
            - biometric sample
            - biometric enrolment
            - fingerprint template
            - facial recognition
            - iris scan
            - voiceprint
            - biometric authentication
    - id: Keyword_au_top500_007_biometric_identifiers_domain_context
      groups:
        - match_style: word
          terms:
            - biometric identifiers
            - biometric
            - identifiers
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
