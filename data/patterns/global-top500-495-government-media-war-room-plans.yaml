schema: testpattern/v1
name: Government media war-room plans
slug: global-top500-495-government-media-war-room-plans
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies operational government media war-room plans used to coordinate monitoring, rapid
  response, approvals, rebuttals, and spokesperson activity. War-room plan topics are retained for
  discovery; enforcement requires independent government-office context and multiple operational
  workflow elements, and high confidence also requires populated assignments, times, or issue references.
operation: >-
  Regex_government_media_war_room recognises government, ministerial, cabinet, departmental, and
  generic media war-room plans. The topic alone is discovery-only at 65. Government-office context
  plus two distinct war-room workflow elements raises it to 75; two populated operational details
  reach 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:government\s+media\s+war[\s-]+room\s+plans?|(?:government|ministerial|cabinet|departmental)\s+(?:media|communications)\s+war[\s-]+room(?:\s+(?:plan|playbook|operating\s+protocol))?|media\s+war[\s-]+room\s+(?:plan|playbook|operating\s+protocol))\b
confidence: medium
confidence_justification: >-
  Medium confidence requires government-office context and multiple operational workflow elements
  rather than generic communications language. High confidence adds multiple populated live-plan details.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government
corroborative_evidence:
  keywords:
    - minister's office
    - media monitoring shift
    - issue escalation
    - holding statement
    - spokesperson assignment
  proximity: 240
test_cases:
  should_match:
    - value: Media war-room plan
      description: Low-tier probe - war-room plan topic without government or workflow evidence
    - value: 'Government media war-room plan for the minister''s office: media monitoring shift, issue escalation, holding statement, spokesperson assignment, and approval chain'
      description: Medium-tier probe - government war-room workflow without populated live-plan details
    - value: 'Government media war-room plan for the minister''s office: media monitoring shift; issue escalation; holding statement; spokesperson assignment; War-room lead: Priya Shah; Activation time: 06:30 AEST; Issue reference: MED-2026-44'
      description: High-tier probe - government workflow with named ownership, activation time, and issue reference
  should_not_match:
    - value: 'Strategic communications plan: audience segments, key messages, stakeholder engagement, media strategy, and publication calendar'
      description: Generic strategic communications belongs to the adjacent communications-plan SIT
    - value: 'National emergency response plan: emergency operations centre, incident commander, evacuation zones, public warnings, and recovery priorities'
      description: Emergency command planning is not a media war-room plan
    - value: 'Corporate media war-room plan for a product recall: media monitoring shift, issue escalation, holding statement, spokesperson assignment, and approval chain'
      description: Corporate crisis response lacks government-office context
    - value: 'Election campaign media war-room plan: rapid response roster, rebuttal line, media inquiry log, response owner, and daily media grid'
      description: Candidate campaign operations are not government communications
    - value: 'Training example: Government media war-room plan for the minister''s office; media monitoring shift; issue escalation; War-room lead: Priya Shah; Activation time: 06:30 AEST'
      description: Explicit training content must not enforce even with realistic live-plan details
false_positives:
  - description: Strategic communications plans, emergency plans, and public-affairs guidance use monitoring, messaging, approval, spokesperson, and briefing language without establishing a media war room.
    mitigation: Require an explicit media war-room plan before considering operational workflow evidence.
  - description: Corporate crisis teams and election campaigns can operate realistic media war rooms with rapid-response rosters, rebuttal lines, and inquiry logs.
    mitigation: Require independent government-office, ministerial, cabinet, departmental, or agency context at every enforcing tier.
  - description: Exercises and training scenarios can contain named leads, activation times, issue references, and realistic escalation procedures.
    mitigation: Reject explicit template, demo, tutorial, sample-data, training-exercise, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_government_media_war_room
      matches:
        - ref: Evidence_government_media_context
        - ref: Evidence_media_war_room_workflow
          min_count: 2
          unique_results: true
        - ref: Evidence_media_war_room_live_detail
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_government_media_war_room
      matches:
        - ref: Evidence_government_media_context
        - ref: Evidence_media_war_room_workflow
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_government_media_war_room
  regexes:
    - id: Regex_government_media_war_room
      pattern: >-
        (?is)\b(?:government\s+media\s+war[\s-]+room\s+plans?|(?:government|ministerial|cabinet|departmental)\s+(?:media|communications)\s+war[\s-]+room(?:\s+(?:plan|playbook|operating\s+protocol))?|media\s+war[\s-]+room\s+(?:plan|playbook|operating\s+protocol))\b
    - id: Evidence_media_war_room_live_detail
      pattern: >-
        (?i)\b(?:(?:war[\s-]+room|monitoring\s+shift|rapid\s+response)\s+(?:lead|owner|coordinator)\s*[:=-]\s*[A-Z][A-Za-z.'-]{1,30}(?:\s+[A-Z][A-Za-z.'-]{1,30}){1,3}|(?:activation|briefing|clearance|response)\s+(?:time|deadline)\s*[:=-]\s*(?:[01]?\d|2[0-3])[:.][0-5]\d(?:\s*(?:AM|PM|UTC|GMT|[A-Z]{2,4}))?|(?:issue|response)\s+(?:ID|reference|ref\.?)\s*[:#=-]\s*[A-Z0-9][A-Z0-9/-]{3,})\b
  keywords:
    - id: Evidence_government_media_context
      groups:
        - match_style: word
          terms:
            - minister's office
            - cabinet office
            - government department
            - department media team
            - government spokesperson
            - public information officer
            - agency communications branch
            - agency media unit
            - communications directorate
            - ministerial adviser
            - departmental secretary
      strength: domain
    - id: Evidence_media_war_room_workflow
      groups:
        - match_style: word
          terms:
            - media monitoring shift
            - rapid response roster
            - issue escalation
            - rebuttal line
            - holding statement
            - spokesperson assignment
            - approval chain
            - clearance deadline
            - press briefing cadence
            - media inquiry log
            - response owner
            - monitoring lead
            - morning media scan
            - daily media grid
      strength: domain
risk_description: >-
  The detector targets media war-room plans with government-office and operational workflow evidence
  rather than generic rapid-response, talking-point, or communications language. A genuine plan can
  reveal message timing, decision roles, anticipated criticism, research priorities, and response
  triggers, allowing an adversary to pre-empt communications or exploit uncertainty during a crisis.
  Consequence is serious but normally confined to one issue or event. Risk 8 and SENSITIVE fit that
  bounded strategic harm; PROTECTED would require a live national emergency or security operation
  where disclosure could cause significant service, public-safety, or state damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
