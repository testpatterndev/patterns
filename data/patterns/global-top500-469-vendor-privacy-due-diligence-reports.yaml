schema: testpattern/v1
name: Vendor privacy due diligence reports
slug: global-top500-469-vendor-privacy-due-diligence-reports
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to vendor privacy due diligence reports in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: corporate-m-and-a. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:vendor\s+privacy|due\s+diligence|third\s+party\s+assessment|vendor\s+risk|privacy\s+questionnaire|data\s+processing\s+agreement|security\s+assessment|privacy\s+compliance|supply\s+chain\s+risk|vendor\s+audit|privacy\s+maturity)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - vendor privacy due diligence reports
    - vendor
    - privacy
    - due
    - diligence
    - reports
    - compliance
    - risk
  proximity: 300
  keyword_lists:
    - corporate-m-and-a
test_cases:
  should_match:
    - value: vendor privacy
      description: Primary topic phrase match
    - value: due diligence
      description: Case-insensitive topic phrase match
    - value: third party assessment
      description: Alternative topic phrase match
    - value: vendor risk
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to vendor privacy due diligence reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_vendor_privacy_diligence
      matches:
        - ref: Pattern_global_top500_469_vendor_privacy_due_diligence_reports_label_context
        - ref: Keyword_global_top500_469_vendor_privacy_due_diligence_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_469_vendor_privacy_due_diligence_reports_noise_exclusion
    - confidence_level: 75
      id_match: Regex_vendor_privacy_diligence
      matches:
        - ref: Keyword_vendor_privacy_diligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_469_vendor_privacy_due_diligence_reports_noise_exclusion
    - confidence_level: 65
      id_match: Regex_vendor_privacy_diligence
      matches:
        - ref: Keyword_vendor_privacy_diligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_469_vendor_privacy_due_diligence_reports_noise_exclusion
  regexes:
    - id: Regex_vendor_privacy_diligence
      pattern: (?is)\b(?:vendor\s+privacy|due\s+diligence|third\s+party\s+assessment|vendor\s+risk|privacy\s+questionnaire|data\s+processing\s+agreement|security\s+assessment|privacy\s+compliance|supply\s+chain\s+risk|vendor\s+audit|privacy\s+maturity)\b
    - id: Pattern_global_top500_469_vendor_privacy_due_diligence_reports_label_context
      pattern: (?i)\\b(?:vendor\\s+privacy\\s+due\\s+diligence\\s+reports|vendor|privacy|due|diligence|reports|top500)\\b
  keywords:
    - id: Keyword_vendor_privacy_diligence
      groups:
        - match_style: word
          terms:
            - vendor privacy
            - due diligence
            - third party assessment
            - vendor risk
            - privacy questionnaire
            - sub-processor
            - data processing agreement
            - security assessment
            - privacy compliance
            - supply chain risk
            - vendor audit
            - privacy maturity
    - id: Keyword_global_top500_469_vendor_privacy_due_diligence_reports_domain_context
      groups:
        - match_style: word
          terms:
            - vendor privacy due diligence reports
            - vendor
            - privacy
            - due
            - diligence
            - reports
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_469_vendor_privacy_due_diligence_reports_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
