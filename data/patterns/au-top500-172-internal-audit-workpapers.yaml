schema: testpattern/v1
name: Internal audit workpapers
slug: au-top500-172-internal-audit-workpapers
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to internal audit workpapers in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:internal\s+audit\s+workpapers|internal\s+audit|audit\s+workpaper|audit\s+evidence|audit\s+finding|audit\s+program|testing\s+results|control\s+testing|audit\s+trail|risk\s+assessment|audit\s+opinion|audit\s+committee)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - internal audit workpapers
    - internal
    - audit
    - workpapers
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: internal audit workpapers
      description: Primary topic phrase match
    - value: internal audit
      description: Case-insensitive topic phrase match
    - value: audit workpaper
      description: Alternative topic phrase match
    - value: audit evidence
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to internal audit workpapers appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_internal_audit_workpapers
      matches:
        - ref: Evidence_internal_audit_workpapers
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_internal_audit_workpapers
      matches:
        - ref: Evidence_internal_audit_workpapers
    - confidence_level: 65
      id_match: Pattern_internal_audit_workpapers
      matches:
        - ref: Evidence_internal_audit_workpapers
  regexes:
    - id: Pattern_internal_audit_workpapers
      pattern: (?is)\b(?:internal\s+audit\s+workpapers|internal\s+audit|audit\s+workpaper|audit\s+evidence|audit\s+finding|audit\s+program|testing\s+results|control\s+testing|audit\s+trail|risk\s+assessment|audit\s+opinion|audit\s+committee)\b
  keywords:
    - id: Evidence_internal_audit_workpapers
      groups:
        - match_style: word
          terms:
            - internal audit workpapers
            - internal audit
            - audit workpaper
            - audit evidence
            - audit finding
            - audit program
            - testing results
            - control testing
            - audit trail
            - risk assessment
            - audit opinion
            - audit committee
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://handbook.apra.gov.au/standard/cps-220
  - https://www.ag.gov.au/integrity/publications/commonwealth-fraud-control-framework-2024
