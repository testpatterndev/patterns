schema: testpattern/v1
name: Legal full name
slug: au-top500-001-legal-full-name
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to legal full name in Australian contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  A broad name-field phrase is discovery-only at 65. The canonical legal-full-name label reaches 75,
  while 85 additionally requires two distinct non-overlapping name-field terms. Template/sample/test
  exclusions apply to every tier.
pattern: (?is)\b(?:legal\s+full\s+name|legal\s+name|full\s+name|given\s+name|family\s+name|first\s+name|last\s+name|personal\s+details)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - legal full name
    - legal
    - full
    - name
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - pii-personal
    - salutations-standard
    - au-forenames-australian
    - au-surnames-australian
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: legal full name
      description: Exact 75 probe - canonical label without two additional name-field terms
    - value: legal name
      description: Case-insensitive topic phrase match
    - value: full name
      description: Alternative topic phrase match
    - value: given name
      description: Exact 65 discovery probe - alternative name-field phrase without the canonical legal-full-name label
    - value: 'Australian identity verification record. Legal full name of the applicant, including given name and family name, exactly as shown on the identity document.'
      description: Exact 85 probe - canonical label with two additional non-overlapping name-field terms
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
    - value: 'Sample: Australian applicant legal full name, given name and family name'
      description: High-like template fixture must be rejected by the shared exclusion dictionary
false_positives:
  - description: Common words and phrases related to legal full name appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_legal_full_name
      matches:
        - ref: Pattern_au_top500_001_legal_full_name_label_context
        - ref: Evidence_additional_name_fields
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_legal_full_name
      matches:
        - ref: Pattern_au_top500_001_legal_full_name_label_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_legal_full_name
      matches:
        - ref: Evidence_legal_full_name
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_legal_full_name
      pattern: (?is)\b(?:legal\s+full\s+name|legal\s+name|full\s+name|given\s+name|family\s+name|first\s+name|last\s+name|personal\s+details)\b
    - id: Pattern_au_top500_001_legal_full_name_label_context
      pattern: (?i)\b(?:legal\s+full\s+name)\b
  keywords:
    - id: Evidence_legal_full_name
      groups:
        - match_style: word
          terms:
            - legal full name
            - legal name
            - full name
            - given name
            - family name
            - surname
            - first name
            - last name
            - personal details
            - identity
            - demographics
    - id: Evidence_additional_name_fields
      groups:
        - match_style: word
          terms:
            - given name
            - family name
            - surname
            - first name
            - last name
            - middle name
      strength: specific
risk_description: >-
  The Legal full name pattern detects labels such as legal name, full name, given name, or surname, rather than resolving the text entered into that field. A standalone match usually communicates that a form or record expects identity information and can appear in blank templates, policies, or HR instructions. A completed name combined with account, employment, or case data would add correlation and targeting risk, but that content is not guaranteed by this detector. Risk 3 and OFFICIAL follow the phrase-level unit and avoid treating a field heading as a populated personal record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 1.5.0
    date: '2026-07-19'
    description: 'Australian personal-name baseline: make 65/75/85 cumulative and exact by separating broad phrase discovery, the canonical legal-full-name label, and two non-overlapping additional name-field terms; retain template exclusion at every tier and add exact-tier/adversarial probes.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 608 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.3.0
    date: '2026-03-29'
    description: Switch to consolidated Australian Forenames (10,961) and Australian Surnames (23,065) dictionaries
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
