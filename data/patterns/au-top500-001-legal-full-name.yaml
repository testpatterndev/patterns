schema: testpattern/v1
name: Legal full name
slug: au-top500-001-legal-full-name
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to legal full name in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: pii-personal, salutations-standard, au-forenames-male-very-common, au-forenames-female-very-common, au-family-names-top-tier, au-family-names-diverse. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:legal\s+full\s+name|legal\s+name|full\s+name|given\s+name|family\s+name|first\s+name|last\s+name|personal\s+details)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - legal full name
    - legal
    - full
    - name
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - pii-personal
    - salutations-standard
    - au-forenames-male-very-common
    - au-forenames-female-very-common
    - au-family-names-top-tier
    - au-family-names-diverse
test_cases:
  should_match:
    - value: legal full name
      description: Primary topic phrase match
    - value: legal name
      description: Case-insensitive topic phrase match
    - value: full name
      description: Alternative topic phrase match
    - value: given name
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to legal full name appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_legal_full_name
      matches:
        - ref: Evidence_legal_full_name
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_001_legal_full_name_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_legal_full_name
      matches:
        - ref: Evidence_legal_full_name
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_001_legal_full_name_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_legal_full_name
      matches:
        - ref: Evidence_legal_full_name
  regexes:
    - id: Pattern_legal_full_name
      pattern: (?is)\b(?:legal\s+full\s+name|legal\s+name|full\s+name|given\s+name|family\s+name|first\s+name|last\s+name|personal\s+details)\b
    - id: Pattern_au_top500_001_legal_full_name_label_context
      pattern: (?i)\\b(?:legal\\s+full\\s+name|legal|full|name|top500)\\b
  keywords:
    - id: Evidence_legal_full_name
      groups:
        - match_style: word
          terms:
            - legal full name
            - legal name
            - full name
            - given name
            - family name
            - surname
            - first name
            - last name
            - personal details
            - identity
            - demographics
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_001_legal_full_name_domain_context
      groups:
        - match_style: word
          terms:
            - legal full name
            - legal
            - full
            - name
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_001_legal_full_name_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
