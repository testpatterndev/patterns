schema: testpattern/v1
name: Invoice and payment history
slug: global-top500-375-invoice-and-payment-history
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to invoice and payment history in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:invoice\s+and\s+payment\s+history|invoice\s+number|payment\s+record|billing\s+history|transaction\s+history|payment\s+ledger|accounts\s+receivable|payment\s+schedule|remittance\s+advice|invoice\s+date|payment\s+confirmation|outstanding\s+balance)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - invoice and payment history
    - invoice
    - payment
    - history
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: invoice and payment history
      description: Primary topic phrase match
    - value: invoice number
      description: Case-insensitive topic phrase match
    - value: payment record
      description: Alternative topic phrase match
    - value: billing history
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: invoice report
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to invoice and payment history appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_invoice_payment
      matches:
        - ref: Pattern_global_top500_375_invoice_and_payment_history_label_context
        - ref: Keyword_global_top500_375_invoice_and_payment_history_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_invoice_payment
      matches:
        - ref: Keyword_invoice_payment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_invoice_payment
      matches:
        - ref: Keyword_invoice_payment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_invoice_payment
      pattern: >-
        (?is)\b(?:invoice\s+and\s+payment\s+history|invoice\s+number|payment\s+record|billing\s+history|transaction\s+history|payment\s+ledger|accounts\s+receivable|payment\s+schedule|remittance\s+advice|invoice\s+date|payment\s+confirmation|outstanding\s+balance)\b
    - id: Pattern_global_top500_375_invoice_and_payment_history_label_context
      pattern: (?i)\\b(?:invoice\\s+and\\s+payment\\s+history|invoice|payment|history|top500)\\b
  keywords:
    - id: Keyword_invoice_payment
      groups:
        - match_style: word
          terms:
            - invoice and payment history
            - invoice number
            - payment record
            - billing history
            - transaction history
            - payment ledger
            - accounts receivable
            - payment schedule
            - remittance advice
            - invoice date
            - payment confirmation
            - outstanding balance
    - id: Keyword_global_top500_375_invoice_and_payment_history_domain_context
      groups:
        - match_style: word
          terms:
            - invoice and payment history
            - invoice
            - payment
            - history
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
