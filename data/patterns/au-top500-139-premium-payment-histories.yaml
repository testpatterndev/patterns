schema: testpattern/v1
name: Premium payment histories
slug: au-top500-139-premium-payment-histories
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to premium payment histories in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:premium\s+payment|payment\s+history|insurance\s+premium|premium\s+schedule|policy\s+renewal|premium\s+adjustment|overdue\s+premium|payment\s+record)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - premium payment histories
    - premium
    - payment
    - histories
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: premium payment
      description: Primary topic phrase match
    - value: payment history
      description: Case-insensitive topic phrase match
    - value: insurance premium
      description: Alternative topic phrase match
    - value: premium schedule
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_premium_payment
      matches:
        - ref: Evidence_premium_payment
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_premium_payment
      matches:
        - ref: Evidence_premium_payment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_premium_payment
      matches:
        - ref: Evidence_premium_payment
  regexes:
    - id: Pattern_premium_payment
      pattern: (?is)\b(?:premium\s+payment|payment\s+history|insurance\s+premium|premium\s+schedule|policy\s+renewal|premium\s+adjustment|overdue\s+premium|payment\s+record)\b
  keywords:
    - id: Evidence_premium_payment
      groups:
        - match_style: word
          terms:
            - premium payment
            - payment history
            - insurance premium
            - premium schedule
            - policy renewal
            - premium adjustment
            - policyholder
            - instalment
            - overdue premium
            - payment record
risk_description: >-
  This detector finds histories or schedules of insurance-premium payments and related account status. A disclosed history can reveal whether a policyholder pays regularly, is overdue, or maintains particular coverage, assisting targeted scams or adverse inference. The normal match does not guarantee bank coordinates, claim details, or a rich identity record, so misuse generally needs the policyholder and policy context. Risk 4 and OFFICIAL fit that limited unit; a detailed personal history tied to account data or threatened lapse could merit SENSITIVE handling.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
