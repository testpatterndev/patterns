schema: testpattern/v1
name: Pipeline pressure and flow setpoints
slug: au-top500-445-pipeline-pressure-and-flow-setpoints
version: 1.3.3
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to pipeline pressure and flow setpoints in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:pipeline\s+pressure|flow\s+setpoint|pipeline\s+setpoint|pressure\s+alarm|flow\s+rate|critical\s+infrastructure|pipeline\s+operations|operating\s+pressure|gas\s+pipeline|oil\s+pipeline|process\s+safety)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - infrastructure
  - security
corroborative_evidence:
  keywords:
    - pipeline pressure and flow setpoints
    - pipeline
    - pressure
    - flow
    - setpoints
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: pipeline pressure
      description: Primary topic phrase match
    - value: flow setpoint
      description: Case-insensitive topic phrase match
    - value: pipeline setpoint
      description: Alternative topic phrase match
    - value: pressure alarm
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: pipeline flow
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to pipeline pressure and flow setpoints appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pipeline_pressure_flow
      matches:
        - ref: Evidence_pipeline_pressure_flow
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_pipeline_pressure_flow
      matches:
        - ref: Evidence_pipeline_pressure_flow
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_pipeline_pressure_flow
      matches:
        - ref: Evidence_pipeline_pressure_flow
  regexes:
    - id: Pattern_pipeline_pressure_flow
      pattern: >-
        (?is)\b(?:pipeline\s+pressure|flow\s+setpoint|pipeline\s+setpoint|pressure\s+alarm|flow\s+rate|critical\s+infrastructure|pipeline\s+operations|operating\s+pressure|gas\s+pipeline|oil\s+pipeline|process\s+safety)\b
  keywords:
    - id: Evidence_pipeline_pressure_flow
      groups:
        - match_style: word
          terms:
            - pipeline pressure
            - flow setpoint
            - pipeline setpoint
            - pressure alarm
            - flow rate
            - critical infrastructure
            - pipeline operations
            - MAOP
            - operating pressure
            - gas pipeline
            - oil pipeline
            - process safety
risk_description: >-
  The regex looks for operational terms such as pipeline pressure, flow setpoint, pressure alarm, or operating pressure near pipeline context, so its intended true positive is a setpoint-bearing operations record rather than a bare number. Disclosure could help an adversary infer normal limits, alarm thresholds, and where to induce unsafe or disruptive conditions, affecting one pipeline segment or operator without additional control access. The medium-confidence topic rule can also find safety guidance and generic infrastructure discussion, which limits certainty about any single match. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. Live limits and alarm thresholds reveal how to induce unsafe or disruptive conditions in a pipeline. Additional access is needed, but the information creates a credible path to significant service, environmental or life-safety damage. Risk 9 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require site/segment identifiers plus actual values, limits, alarms or control tags; generic safety guidance remains audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
