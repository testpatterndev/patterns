schema: testpattern/v1
name: Direct Debit Request (DDR/BECS)
slug: global-direct-debit-request
version: 1.3.2
type: keyword_list
pattern_class: concept
description: >-
  Detects direct debit requests, BECS authorizations, and recurring payment arrangements under Australian banking
  standards.
operation: >-
  Regex and keyword-based detection matching direct debit request, DDR, BECS, and debit authority patterns.
  Corroborative evidence: 11 direct debit and 7 bank authority keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
  - banking
test_cases:
  should_match:
    - value: Direct debit request received
      description: Exact 65 discovery probe with a mandate phrase and no account or schedule details
    - value: 'Direct debit request: BSB 062000'
      description: Exact 75 probe with one banking-detail evidence family
    - value: 'Direct debit request: BSB 062000, first debit date 01/03/2026'
      description: Exact 85 probe with banking authority and payment schedule evidence
    - value: 'Direct Debit Request: I authorise debit my account'
      description: Direct debit authority wording
    - value: DDR/BECS form with BSB and account number details
      description: Test match 2
    - value: Recurring debit arrangement with first debit date 01/03/2026
      description: Test match 3
  should_not_match:
    - value: Credit card payment processed successfully
      description: Non-match 1
    - value: Please debit the inventory count
      description: Non-match 2
    - value: 'User ID: 123456 architecture workshop'
      description: BECS-shaped user identifier in technical prose without mandate or payment details
false_positives:
  - description: Use of debit in general accounting contexts.
    mitigation: Require DDR, BECS, or bank authority language alongside debit terms.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This classifier identifies a direct-debit request or BECS authority as a payment-arrangement record containing payer authorization, account details, debit timing, amount or recurrence, and service-provider information. Disclosure can support mandate forgery, payment diversion, account-targeted phishing, or impersonation during cancellation and amendment. The account holder, biller, and financial institution may face serious financial and privacy harm within the recurring arrangement, although banking controls and mandate verification limit direct execution. Risk 8 and SENSITIVE Financial fit that composite authority, while privileged access to bulk mandates or the BECS processing environment would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Regex_direct_debit
          - Regex_becs_reference
      matches:
        - ref: Keyword_bank_authority
        - ref: Keyword_payment_schedule
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Regex_direct_debit
          - Regex_becs_reference
      matches:
        - ref: Keyword_mandate_detail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Regex_direct_debit
          - Regex_becs_reference
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_direct_debit
      pattern: (?i)\b(?:direct\s+debit\s+(?:request|authority|arrangement)|recurring\s+debit\s+arrangement|ddr|debit\s+authority)\b
    - id: Regex_becs_reference
      pattern: (?i)\b(?:becs|bulk\s+electronic\s+clearing|user\s+id\s*[:\-]?\s*\d{6})\b
  keywords:
    - id: Keyword_direct_debit
      groups:
        - match_style: word
          terms:
            - direct debit
            - debit authority
            - text: DDR
              case_sensitive: true
            - automatic payment
            - standing order
            - recurring debit
            - BECS
            - bulk electronic clearing
            - first debit date
            - debit amount
            - payment frequency
      strength: specific
    - id: Keyword_bank_authority
      groups:
        - match_style: word
          terms:
            - I authorise
            - I authorize
            - bank authority
            - debit my account
            - account holder
            - text: BSB
              case_sensitive: true
            - account number
      strength: specific
    - id: Keyword_payment_schedule
      groups:
        - match_style: word
          terms:
            - first debit date
            - debit amount
            - payment frequency
            - recurring payment date
            - final debit date
            - payment schedule
      strength: specific
    - id: Keyword_mandate_detail
      groups:
        - match_style: word
          terms:
            - I authorise
            - I authorize
            - debit my account
            - account holder
            - text: BSB
              case_sensitive: true
            - account number
            - first debit date
            - debit amount
            - payment frequency
            - payment schedule
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
