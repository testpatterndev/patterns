schema: testpattern/v1
name: Letters of intent
slug: au-top500-182-letters-of-intent
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to letters of intent in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:letters\s+of\s+intent|letter\s+of\s+intent|non[\s-]+binding\s+offer|binding\s+offer|preliminary\s+agreement|heads\s+of\s+agreement|memorandum\s+of\s+understanding|intent\s+to\s+acquire|acquisition\s+proposal|merger\s+proposal|indicative\s+offer)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - letters of intent
    - letters
    - intent
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: letters of intent
      description: Primary topic phrase match
    - value: letter of intent
      description: Case-insensitive topic phrase match
    - value: non-binding offer
      description: Alternative topic phrase match
    - value: binding offer
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to letters of intent appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_letters_of_intent
      matches:
        - ref: Evidence_letters_of_intent
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_letters_of_intent
      matches:
        - ref: Evidence_letters_of_intent
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_letters_of_intent
      matches:
        - ref: Evidence_letters_of_intent
  regexes:
    - id: Pattern_letters_of_intent
      pattern: (?is)\b(?:letters\s+of\s+intent|letter\s+of\s+intent|non[\s-]+binding\s+offer|binding\s+offer|preliminary\s+agreement|heads\s+of\s+agreement|memorandum\s+of\s+understanding|intent\s+to\s+acquire|acquisition\s+proposal|merger\s+proposal|indicative\s+offer)\b
  keywords:
    - id: Evidence_letters_of_intent
      groups:
        - match_style: word
          terms:
            - letters of intent
            - letter of intent
            - LOI
            - non-binding offer
            - binding offer
            - preliminary agreement
            - heads of agreement
            - memorandum of understanding
            - intent to acquire
            - acquisition proposal
            - merger proposal
            - indicative offer
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
