schema: testpattern/v1
name: Bonus and incentive allocations
slug: au-top500-070-bonus-and-incentive-allocations
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to bonus and incentive allocations in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:bonus\s+allocation|incentive\s+payment|performance\s+bonus|bonus\s+pool|incentive\s+plan|bonus\s+payout|short[\s-]+term\s+incentive|long[\s-]+term\s+incentive|variable\s+pay|bonus\s+amount)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - bonus and incentive allocations
    - bonus
    - incentive
    - allocations
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: bonus allocation
      description: Primary topic phrase match
    - value: incentive payment
      description: Case-insensitive topic phrase match
    - value: performance bonus
      description: Alternative topic phrase match
    - value: bonus pool
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to bonus and incentive allocations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_bonus_incentive
      matches:
        - ref: Evidence_bonus_incentive
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_bonus_incentive
      matches:
        - ref: Evidence_bonus_incentive
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_bonus_incentive
      matches:
        - ref: Evidence_bonus_incentive
  regexes:
    - id: Pattern_bonus_incentive
      pattern: >-
        (?is)\b(?:bonus\s+allocation|incentive\s+payment|performance\s+bonus|bonus\s+pool|incentive\s+plan|bonus\s+payout|short[\s-]+term\s+incentive|long[\s-]+term\s+incentive|variable\s+pay|bonus\s+amount)\b
    - id: Pattern_au_top500_070_bonus_and_incentive_allocations_label_context
      pattern: (?i)\b(?:bonus\s+and\s+incentive\s+allocations)\b
  keywords:
    - id: Evidence_bonus_incentive
      groups:
        - match_style: word
          terms:
            - bonus allocation
            - incentive payment
            - performance bonus
            - bonus pool
            - incentive plan
            - bonus payout
            - short-term incentive
            - long-term incentive
            - text: STI
              case_sensitive: true
            - text: LTI
              case_sensitive: true
            - variable pay
            - bonus amount
      strength: specific
    - id: Keyword_au_top500_070_bonus_and_incentive_allocations_domain_context
      groups:
        - match_style: word
          terms:
            - bonus and incentive allocations
            - bonus
            - incentive
            - allocations
      strength: domain
risk_description: >-
  This detector identifies bonus allocation, incentive award, variable-pay allocation, and related remuneration decision language. A populated allocation record can expose individual award amounts, performance judgements, budget decisions, and comparative treatment, leading to financial targeting, resentment, manipulation, or unfair negotiating advantage. Scheme descriptions and calculation templates can match without revealing any recipient or approved amount. Risk 8 SENSITIVE reflects serious employee and business harm from actual allocations; PROTECTED would require an organisation-wide unreleased pool, market-sensitive executive decisions, or significant corporate damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
