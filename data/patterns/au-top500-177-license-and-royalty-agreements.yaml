schema: testpattern/v1
name: License and royalty agreements
slug: au-top500-177-license-and-royalty-agreements
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to license and royalty agreements in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: au-vehicle-permit-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:license\s+and\s+royalty\s+agreements|license\s+agreement|royalty\s+agreement|licensing\s+terms|royalty\s+rate|intellectual\s+property|licensing\s+fee|royalty\s+payment|license\s+grant|permitted\s+use|exclusive\s+license)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - license and royalty agreements
    - license
    - royalty
    - agreements
    - corporate
    - legal
    - governance
  proximity: 300
  keyword_lists:
    - au-vehicle-permit-terms
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: license and royalty agreements
      description: Primary topic phrase match
    - value: license agreement
      description: Case-insensitive topic phrase match
    - value: royalty agreement
      description: Alternative topic phrase match
    - value: licensing terms
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: license report
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to license and royalty agreements appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_license_royalty
      matches:
        - ref: Evidence_license_royalty
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_license_royalty
      matches:
        - ref: Evidence_license_royalty
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_license_royalty
      matches:
        - ref: Evidence_license_royalty
  regexes:
    - id: Pattern_license_royalty
      pattern: >-
        (?is)\b(?:license\s+and\s+royalty\s+agreements|license\s+agreement|royalty\s+agreement|licensing\s+terms|royalty\s+rate|intellectual\s+property|licensing\s+fee|royalty\s+payment|license\s+grant|permitted\s+use|exclusive\s+license)\b
    - id: Pattern_au_top500_177_license_and_royalty_agreements_label_context
      pattern: (?i)\\b(?:license\\s+and\\s+royalty\\s+agreements|license|royalty|agreements|top500)\\b
  keywords:
    - id: Evidence_license_royalty
      groups:
        - match_style: word
          terms:
            - license and royalty agreements
            - license agreement
            - royalty agreement
            - licensing terms
            - royalty rate
            - intellectual property
            - sublicense
            - licensing fee
            - royalty payment
            - license grant
            - permitted use
            - exclusive license
    - id: Keyword_au_top500_177_license_and_royalty_agreements_domain_context
      groups:
        - match_style: word
          terms:
            - license and royalty agreements
            - license
            - royalty
            - agreements
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
