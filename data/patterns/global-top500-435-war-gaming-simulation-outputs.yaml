schema: testpattern/v1
name: War-gaming simulation outputs
slug: global-top500-435-war-gaming-simulation-outputs
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to war-gaming simulation outputs in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:war\s+gaming|simulation\s+output|tabletop\s+exercise|scenario\s+analysis|combat\s+simulation|operational\s+scenario|campaign\s+analysis|wargame\s+results|strategic\s+simulation|threat\s+modeling)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - war-gaming simulation outputs
  proximity: 240
test_cases:
  should_match:
    - value: war gaming
      description: Primary topic phrase match
    - value: simulation output
      description: Case-insensitive topic phrase match
    - value: tabletop exercise
      description: Alternative topic phrase match
    - value: scenario analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to war-gaming simulation outputs appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_war_gaming_simulation
      matches:
        - ref: Pattern_global_top500_435_war_gaming_simulation_outputs_label_context
        - ref: Keyword_global_top500_435_war_gaming_simulation_outputs_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_war_gaming_simulation
      matches:
        - ref: Keyword_war_gaming_simulation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_war_gaming_simulation
      matches:
        - ref: Keyword_war_gaming_simulation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_war_gaming_simulation
      pattern: >-
        (?is)\b(?:war\s+gaming|simulation\s+output|tabletop\s+exercise|scenario\s+analysis|combat\s+simulation|operational\s+scenario|campaign\s+analysis|wargame\s+results|strategic\s+simulation|threat\s+modeling)\b
    - id: Pattern_global_top500_435_war_gaming_simulation_outputs_label_context
      pattern: (?i)\\b(?:war\-gaming\\s+simulation\\s+outputs|war|gaming|simulation|outputs|top500)\\b
  keywords:
    - id: Keyword_war_gaming_simulation
      groups:
        - match_style: word
          terms:
            - war gaming
            - war-gaming
            - simulation output
            - tabletop exercise
            - scenario analysis
            - combat simulation
            - force-on-force
            - operational scenario
            - campaign analysis
            - wargame results
            - strategic simulation
            - threat modeling
    - id: Keyword_global_top500_435_war_gaming_simulation_outputs_domain_context
      groups:
        - match_style: word
          terms:
            - war-gaming simulation outputs
            - war
            - gaming
            - simulation
            - outputs
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
