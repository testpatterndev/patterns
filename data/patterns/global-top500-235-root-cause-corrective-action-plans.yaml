schema: testpattern/v1
name: Root-cause corrective action plans
slug: global-top500-235-root-cause-corrective-action-plans
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to root-cause corrective action plans in Australian contexts. Higher confidence identifies populated plans linking an analysed root cause to assigned
  corrective work (owner, due date, containment, or effectiveness verification); standalone RCA/CAPA topic terms remain discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword
  lists: industry-critical-infrastructure. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:root\s+cause|corrective\s+action|preventive\s+action|root\s+cause\s+analysis|containment\s+action|effectiveness\s+check|quality\s+improvement|deviation\s+investigation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - intellectual-property
  - audit
corroborative_evidence:
  keywords:
    - root-cause corrective action plans
    - root
    - cause
    - corrective
    - action
    - plans
    - product
    - quality
    - safety
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: root cause
      description: Primary topic phrase match
    - value: corrective action
      description: Case-insensitive topic phrase match
    - value: preventive action
      description: Alternative topic phrase match
    - value: root cause analysis
      description: Additional topic phrase match
    - value: 'Root cause: seal jig drift. Corrective action: recalibrate and lock jig. Owner: A. Singh. Due date: 22 Aug. Effectiveness check: 3 lots.'
      description: Stated cause linked to assigned corrective work and verification (enforces at 75/85)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: 'Agenda: discuss root cause and possible corrective action.'
      description: Unpopulated, unassigned plan — discovery only, must not enforce
    - value: The editor corrected the root of a mathematical expression.
      description: Words outside quality RCA/CAPA meaning must not match
    - value: 'CAPA training template: Root cause: example; owner: placeholder.'
      description: Training/template/placeholder marks a teaching form — suppressed from enforcement
    - value: root cause analysis
      description: Analysis label alone is not a corrective-action plan — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to root-cause corrective action plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_root_cause_corrective_action
      matches:
        - ref: Evidence_rca_capa_plan
        - ref: Evidence_root_cause_corrective_action
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_root_cause_corrective_action
      matches:
        - ref: Evidence_rca_capa_plan
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_root_cause_corrective_action
      matches:
        - ref: Evidence_root_cause_corrective_action
  regexes:
    - id: Pattern_root_cause_corrective_action
      pattern: (?is)\b(?:root\s+cause|corrective\s+action|preventive\s+action|root\s+cause\s+analysis|containment\s+action|effectiveness\s+check|quality\s+improvement|deviation\s+investigation)\b
    - id: Pattern_au_top500_235_root_cause_corrective_action_plans_label_context
      pattern: (?i)\b(?:root\-cause\s+corrective\s+action\s+plans)\b
    - id: Evidence_rca_capa_plan
      pattern: >-
        (?is)\broot\s+cause\s*[:=-]\s*[^\r\n]{5,160}[\s\S]{0,240}\bcorrective\s+action\s*[:=-]\s*[^\r\n]{5,180}[\s\S]{0,180}\b(?:owner|due date|containment|effectiveness check)\b
  keywords:
    - id: Evidence_root_cause_corrective_action
      groups:
        - match_style: word
          terms:
            - root cause
            - corrective action
            - CAPA
            - nonconformance
            - preventive action
            - root cause analysis
            - containment action
            - effectiveness check
            - quality improvement
            - deviation investigation
    - id: Keyword_au_top500_235_root_cause_corrective_action_plans_domain_context
      groups:
        - match_style: word
          terms:
            - root-cause corrective action plans
            - root
            - cause
            - corrective
            - action
            - plans
risk_description: >-
  This regex finds root-cause analysis, corrective action, preventive action, and related remediation plans with nine engineering or infrastructure indicators, identifying a response to a known failure rather than generic problem-solving language. A true plan can reveal failure mechanisms, ineffective controls, responsible owners, unresolved actions, and recurrence risks that competitors or attackers could exploit. The likely harm is moderate and bounded to the affected process or product, while templates, training, and public quality methods can also match. Risk 7 and SENSITIVE InfoTech fit the remediation record; risk 8 or PROTECTED requires critical infrastructure, severe safety exposure, systemic concealment, or significant operational damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
