schema: testpattern/v1
name: Root-cause corrective action plans
slug: global-top500-235-root-cause-corrective-action-plans
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to root-cause corrective action plans in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword
  lists: industry-critical-infrastructure. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:root\s+cause|corrective\s+action|preventive\s+action|root\s+cause\s+analysis|containment\s+action|effectiveness\s+check|quality\s+improvement)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - root-cause corrective action plans
    - root
    - cause
    - corrective
    - action
    - plans
    - product
    - quality
    - safety
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: root cause
      description: Primary topic phrase match
    - value: corrective action
      description: Case-insensitive topic phrase match
    - value: preventive action
      description: Alternative topic phrase match
    - value: root cause analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to root-cause corrective action plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_root_cause_corrective_action
      matches:
        - ref: Pattern_global_top500_235_root_cause_corrective_action_plans_label_context
        - ref: Keyword_global_top500_235_root_cause_corrective_action_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_root_cause_corrective_action
      matches:
        - ref: Keyword_root_cause_corrective_action
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_root_cause_corrective_action
      pattern: (?is)\b(?:root\s+cause|corrective\s+action|preventive\s+action|root\s+cause\s+analysis|containment\s+action|effectiveness\s+check|quality\s+improvement)\b
    - id: Pattern_global_top500_235_root_cause_corrective_action_plans_label_context
      pattern: (?i)\b(?:root\-cause\s+corrective\s+action\s+plans)\b
  keywords:
    - id: Keyword_root_cause_corrective_action
      groups:
        - match_style: word
          terms:
            - root cause
            - corrective action
            - CAPA
            - preventive action
            - nonconformance
            - deviation
            - root cause analysis
            - containment action
            - effectiveness check
            - quality improvement
      strength: specific
    - id: Keyword_global_top500_235_root_cause_corrective_action_plans_domain_context
      groups:
        - match_style: word
          terms:
            - root-cause corrective action plans
            - root
            - cause
            - corrective
            - action
            - plans
      strength: domain
risk_description: >-
  This concept regex matches root cause, corrective or preventive action, containment, effectiveness checks, and quality-improvement language, but it does not require a completed root-cause plan or findings. A match can indicate remediation activity and offer limited operational reconnaissance, while exploitation needs the failed control, affected asset, causal chain, corrective owner, and residual weakness. The ordinary phrase is common in audits and quality systems, leaving bounded standalone harm even though the context list also contains industrial-control terms. Risk 5 and OFFICIAL are proportionate; a detailed plan exposing an unremediated critical-system cause, vulnerability, or safety failure would be SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
