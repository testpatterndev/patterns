schema: testpattern/v1
name: Payment Card Magnetic Stripe Track 2
slug: global-payment-card-track2
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects ISO/IEC 7813 magnetic-stripe Track 2 data for payment cards: a start
  sentinel ;, the primary account number, a field separator =, expiry (YYMM),
  service code and discretionary data, end sentinel ?. Also detects the common
  no-sentinel database form PAN=YYMM... Storing full track data after authorization
  is prohibited by PCI DSS 4.0 Requirement 3.3.1.
operation: >-
  Track 2 sentinel form: ; start sentinel, 13-19 digit PAN, separator =, 4-digit
  expiry (YYMM), 3-digit service code, optional discretionary digits, ? end sentinel.
  No-sentinel form: a 13-19 digit PAN, =, then 7 or more digits (expiry+service code
  +discretionary), bounded so a stray number=number pair does not match.
  Corroborative evidence: keywords within 300 characters.
pattern: ';\d{13,19}=\d{4}\d{3}\d*\?|(?<![0-9;])\d{13,19}=\d{7,40}(?![0-9])'
confidence: high
confidence_justification: >-
  High confidence: the sentinel form is unmistakable, and the no-sentinel form
  requires a 13-19 digit account number immediately followed by = and at least 7
  further digits (expiry, service code and discretionary), a structure that does not
  occur in ordinary text, making false positives unlikely.
jurisdictions:
  - global
regulations:
  - PCI-DSS
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - track 2
    - track data
    - magnetic stripe
    - magstripe
    - card present
    - sensitive authentication data
    - SAD
    - PAN
  proximity: 300
test_cases:
  should_match:
    - value: ';4111111111111111=250510100000000000?'
      description: Exact 75 probe with complete Track 2 sentinel framing
    - value: 'TRACK2=;5500005555555559=26129990000000?'
      description: Exact 85 probe with complete framing and explicit Track 2 context
    - value: 'pan=4012888888881881=2611101000000'
      description: Exact 65 discovery probe with the weaker no-sentinel database form
  should_not_match:
    - value: ';4111111111111111=2505?'
      description: Sentinel form missing service-code digits (only 4 after =)
    - value: 'order 12345=67890 ref'
      description: Short number=number pair, not a 13-19 digit PAN with 7+ trailing digits
    - value: Track 2 data and the PAN must be truncated before storage
      description: Prose mentioning track 2, no encoded track
    - value: 'Configuration key 4012888888881881=2611101000000'
      description: No-sentinel numeric configuration pair must remain discovery-only
false_positives:
  - description: Long numeric identifiers joined by = in exported config or log lines that coincidentally resemble PAN=digits.
    mitigation: Require corroborative keywords; validate the PAN portion with a Luhn check before alerting.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The recogniser finds ISO/IEC 7813 Track 2 data in sentinel form or the common bounded PAN=digits database form, including PAN, expiry, service code, and discretionary digits. A valid track can be encoded onto counterfeit media or used in payment fraud because it carries more reusable transaction data than a PAN alone. Long numeric configuration pairs can accidentally resemble the no-sentinel form, and test fixtures may deliberately contain complete samples, while one match normally represents one card. Risk 8 SENSITIVE reflects serious direct financial harm; PROTECTED would require aggregated tracks or a broader high-impact compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_track2_sentinel
      matches:
        - ref: Keyword_track2_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_track2_sentinel
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_track2_database
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_track2_sentinel
      pattern: ';\d{13,19}=\d{4}\d{3}\d*\?'
    - id: Regex_track2_database
      pattern: '(?<![0-9;])\d{13,19}=\d{7,40}(?![0-9])'
  keywords:
    - id: Keyword_track2_context
      groups:
        - match_style: word
          terms:
            - text: TRACK2
              case_sensitive: true
            - Track 2 data
            - magnetic stripe capture
            - magstripe dump
            - card reader export
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
changelog:
  - version: 1.1.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: keep the weaker no-sentinel PAN=digits form at 65 discovery, require full sentinel framing at 75, and require explicit track/capture context at 85, with exact-tier and configuration-pair probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1556 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
