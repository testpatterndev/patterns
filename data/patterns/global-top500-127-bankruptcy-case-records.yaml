schema: testpattern/v1
name: Bankruptcy case records
slug: global-top500-127-bankruptcy-case-records
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to bankruptcy case records in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:Chapter\s+7|Chapter\s+11|bankruptcy\s+petition|bankruptcy\s+court|proof\s+of\s+claim|debtor\s+estate)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - bankruptcy case records
    - bankruptcy
    - case
    - records
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: Chapter 7
      description: Primary topic phrase match
    - value: chapter 11
      description: Case-insensitive topic phrase match
    - value: bankruptcy petition
      description: Alternative topic phrase match
    - value: bankruptcy court
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_bankruptcy
      matches:
        - ref: Pattern_global_top500_127_bankruptcy_case_records_label_context
        - ref: Keyword_global_top500_127_bankruptcy_case_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_bankruptcy
      matches:
        - ref: Keyword_bankruptcy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_bankruptcy
      pattern: (?is)\b(?:Chapter\s+7|Chapter\s+11|bankruptcy\s+petition|bankruptcy\s+court|proof\s+of\s+claim|debtor\s+estate)\b
    - id: Pattern_global_top500_127_bankruptcy_case_records_label_context
      pattern: (?i)\b(?:bankruptcy\s+case\s+records)\b
  keywords:
    - id: Keyword_bankruptcy
      groups:
        - match_style: word
          terms:
            - bankruptcy
            - insolvency
            - Chapter 7
            - Chapter 11
            - liquidation
            - creditor
            - bankruptcy petition
            - trustee
            - bankruptcy court
            - discharge
            - proof of claim
            - debtor estate
      strength: domain
    - id: Keyword_global_top500_127_bankruptcy_case_records_domain_context
      groups:
        - match_style: word
          terms:
            - bankruptcy case records
            - bankruptcy
            - case
      strength: domain
risk_description: >-
  The detector finds Chapter 7 or Chapter 11, bankruptcy petition or court, proof of claim, and debtor-estate language with financial context. Even where parts of a proceeding are public, a collected case record can reveal debts, creditors, insolvency status, and claim activity that support stigma, coercion, or targeted financial exploitation. The normal exposure concerns one debtor or proceeding and can cause moderate privacy and financial harm, although the regex does not guarantee a complete case file. Risk 7 and SENSITIVE are defensible, while PROTECTED is not met without sealed material, a bulk insolvency holding, or significant damage beyond a bounded case.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
