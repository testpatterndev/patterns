schema: testpattern/v1
name: Firearm license number
slug: global-top500-037-firearm-license-number
version: 1.1.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to firearm license number in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: au-vehicle-permit-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:firearm\s+license\s+number)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/ ]{4,24}\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - firearm license number
  proximity: 240
  keyword_lists:
    - au-vehicle-permit-terms
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: structured record with identifier and contextual anchors
      description: Structural anchor sample
  should_not_match:
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Common words and phrases related to firearm license number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 90
      id_match: Regex_firearm_license_number
      matches:
        - ref: Pattern_global_top500_037_firearm_license_number_label_context
        - ref: Keyword_global_top500_037_firearm_license_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_firearm_license_number
      matches:
        - ref: Keyword_firearm_license_number
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_firearm_license_number
      matches:
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_firearm_license_number
      pattern: (?is)\b(?:firearm\s+license\s+number)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/ ]{4,24}\b
    - id: Pattern_global_top500_037_firearm_license_number_label_context
      pattern: (?i)\\b(?:firearm\\s+license\\s+number|firearm|license|top500)\\b
  keywords:
    - id: Keyword_firearm_license_number
      groups:
        - match_style: word
          terms:
            - firearm license number
            - firearm license
            - gun license
            - weapons license
            - firearms permit
            - shooter license
            - gun permit
            - firearms registration
            - weapon registration
            - firearms certificate
            - gun owner
            - firearms holder
    - id: Keyword_global_top500_037_firearm_license_number_domain_context
      groups:
        - match_style: word
          terms:
            - firearm license number
            - firearm
            - license
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
