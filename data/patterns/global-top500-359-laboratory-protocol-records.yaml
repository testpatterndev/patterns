schema: testpattern/v1
name: Laboratory protocol records
slug: global-top500-359-laboratory-protocol-records
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to laboratory protocol records in international contexts. This information
  type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:laboratory\s+protocol|lab\s+procedure|experimental\s+method|lab\s+notebook|standard\s+operating\s+procedure|reagent\s+preparation|sample\s+handling|lab\s+safety|experiment\s+log|research\s+protocol|lab\s+record|principal\s+investigator)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- pii
corroborative_evidence:
  keywords:
  - laboratory protocol records
  - laboratory
  - protocol
  - records
  - education
  - research
  - administration
  proximity: 300
test_cases:
  should_match:
  - value: laboratory protocol
    description: Primary topic phrase match
  - value: lab procedure
    description: Case-insensitive topic phrase match
  - value: experimental method
    description: Alternative topic phrase match
  - value: lab notebook
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: student grant
    description: Generic word pair from old broad template should not match
false_positives:
- description: Common words and phrases related to laboratory protocol records appearing in policy documents, training materials,
    HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_laboratory_protocol
    matches:
    - ref: Pattern_global_top500_359_laboratory_protocol_records_label_context
    - ref: Keyword_global_top500_359_laboratory_protocol_records_domain_context
    - ref: Keyword_laboratory_protocol
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_laboratory_protocol
    matches:
    - ref: Pattern_global_top500_359_laboratory_protocol_records_label_context
    - ref: Keyword_global_top500_359_laboratory_protocol_records_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_laboratory_protocol
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_laboratory_protocol
    pattern: (?is)\b(?:laboratory\s+protocol|lab\s+procedure|experimental\s+method|lab\s+notebook|standard\s+operating\s+procedure|reagent\s+preparation|sample\s+handling|lab\s+safety|experiment\s+log|research\s+protocol|lab\s+record|principal\s+investigator)\b
  - id: Pattern_global_top500_359_laboratory_protocol_records_label_context
    pattern: (?i)\b(?:laboratory\s+protocol\s+records)\b
  keywords:
  - id: Keyword_laboratory_protocol
    groups:
    - match_style: word
      terms:
      - laboratory protocol
      - lab procedure
      - experimental method
      - lab notebook
      - standard operating procedure
      - reagent preparation
      - sample handling
      - lab safety
      - experiment log
      - research protocol
      - lab record
      - principal investigator
    strength: specific
  - id: Keyword_global_top500_359_laboratory_protocol_records_domain_context
    groups:
    - match_style: word
      terms:
      - laboratory protocol records
      - laboratory
      - protocol
    strength: domain
risk_description: This concept regex flags laboratory-protocol, lab-procedure, experimental-method, or lab-notebook terminology
  with research context, but it does not require the protocol steps or experimental observations. A match can signal an area
  of active research and may aid competitive reconnaissance, while replication or hazardous misuse still needs materials,
  quantities, conditions, controls, and results. The normal phrase therefore has bounded standalone value and does not itself
  expose a trade secret or dangerous method. Risk 5 and OFFICIAL are appropriate; a complete unpublished proprietary protocol,
  controlled biological method, or actionable hazardous procedure would raise the content to SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
