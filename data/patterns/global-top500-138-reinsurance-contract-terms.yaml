schema: testpattern/v1
name: Reinsurance contract terms
slug: global-top500-138-reinsurance-contract-terms
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to reinsurance contract terms in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:reinsurance\s+contract|reinsurance\s+treaty|ceding\s+commission|excess\s+of\s+loss|quota\s+share|treaty\s+reinsurance|facultative\s+reinsurance|loss\s+ratio|reinsurance\s+premium|catastrophe\s+bond|aggregate\s+limit)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - reinsurance contract terms
    - reinsurance
    - contract
    - terms
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: reinsurance contract
      description: Primary topic phrase match
    - value: reinsurance treaty
      description: Case-insensitive topic phrase match
    - value: ceding commission
      description: Alternative topic phrase match
    - value: excess of loss
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_reinsurance_contract_terms
      matches:
        - ref: Pattern_global_top500_138_reinsurance_contract_terms_label_context
        - ref: Keyword_global_top500_138_reinsurance_contract_terms_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_reinsurance_contract_terms
      matches:
        - ref: Keyword_reinsurance_contract_terms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_reinsurance_contract_terms
      matches:
        - ref: Keyword_reinsurance_contract_terms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_reinsurance_contract_terms
      pattern: >-
        (?is)\b(?:reinsurance\s+contract|reinsurance\s+treaty|ceding\s+commission|excess\s+of\s+loss|quota\s+share|treaty\s+reinsurance|facultative\s+reinsurance|loss\s+ratio|reinsurance\s+premium|catastrophe\s+bond|aggregate\s+limit)\b
    - id: Pattern_global_top500_138_reinsurance_contract_terms_label_context
      pattern: (?i)\\b(?:reinsurance\\s+contract\\s+terms|reinsurance|contract|terms|top500)\\b
  keywords:
    - id: Keyword_reinsurance_contract_terms
      groups:
        - match_style: word
          terms:
            - reinsurance contract
            - reinsurance treaty
            - ceding commission
            - retrocession
            - excess of loss
            - quota share
            - treaty reinsurance
            - facultative reinsurance
            - loss ratio
            - reinsurance premium
            - catastrophe bond
            - aggregate limit
    - id: Keyword_global_top500_138_reinsurance_contract_terms_domain_context
      groups:
        - match_style: word
          terms:
            - reinsurance contract terms
            - reinsurance
            - contract
            - terms
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
