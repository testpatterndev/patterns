schema: testpattern/v1
name: EU AI Act GPAI Model Documentation
slug: eu-ai-act-gpai-model-documentation
version: 1.1.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: >-
  Detects general-purpose AI (GPAI) model provider documentation under Article 53 of the EU AI Act
  (Regulation (EU) 2024/1689): Annex XI technical documentation for the AI Office, Annex XII information
  packs for downstream providers, the Article 53(1)(d) public summary of training content, and Article 55
  systemic-risk evaluation material (adversarial testing / red-teaming reports). Pre-publication drafts
  reveal model internals, training-data provenance, compute and energy figures, and systemic-risk findings.
operation: >-
  Concept (topic) classifier, not an identifier detector. Primary detection: keyword proximity on the
  regulation's defined vocabulary ('general-purpose AI model', 'public summary of training content',
  'summary about the content used for training', 'technical documentation of the model') corroborated
  within 300 characters by Annex XI/XII item vocabulary (number of parameters, modality, computational
  resources, energy consumption, acceptable use policies, curation methodologies) and Article 53/55 terms
  (AI Office, downstream providers, systemic risk, adversarial testing). Noise exclusion for news,
  marketing, and academic contexts.
pattern: (?i)\b(?:general[-\s]purpose\s+AI\s+model|public\s+summary\s+of\s+training\s+content|summary\s+about\s+the\s+content\s+used\s+for\s+training|technical\s+documentation\s+of\s+the\s+(?:GPAI\s+)?model)\b
confidence: medium
confidence_justification: >-
  Medium confidence: honest topic matcher. 'General-purpose AI model' is the regulation's defined term and
  anchors the document class, but it also saturates news, marketing, and academic commentary on the AI Act;
  tiers therefore require Annex XI/XII item vocabulary and AI Office / systemic-risk corroboration, and the
  bare-primary tier is discovery-only. No identifier-grade precision is promised.
jurisdictions:
  - eu
regulations:
- "Regulation (EU) 2024/1689 (AI Act)"
frameworks:
- ISO/IEC 42001
- ISO 27001
data_categories:
  - legal
  - emerging
corroborative_evidence:
  keywords:
    - AI Office
    - downstream providers
    - acceptable use policies
    - training, testing and validation
    - number of parameters
    - modality
    - methods of distribution
    - computational resources
    - energy consumption
    - adversarial testing
    - red teaming
    - model evaluation
    - systemic risk
    - curation methodologies
    - provenance
    - Union law on copyright
    - reservation of rights
    - data sources
    - synthetic data
    - Annex XI
    - Annex XII
    - Article 53
    - Article 55
  proximity: 300
test_cases:
  should_match:
    - value: |-
        CONFIDENTIAL — Technical documentation of the general-purpose AI model 'Borealis-70B'
        Drawn up pursuant to Article 53(1)(a) and Annex XI, Regulation (EU) 2024/1689, for provision to the AI Office on request.
        1.1 Tasks the model is intended to perform; acceptable use policies applicable.
        1.2 Architecture and number of parameters: decoder-only transformer, 70.6B parameters.
        1.3 Modality and format of inputs and outputs: text in, text out.
        2.3 Computational resources used to train the model (FLOPs) and known energy consumption.
      description: Annex XI technical documentation for a GPAI model provider
    - value: >-
        DRAFT v0.4 — Public Summary of Training Content, prepared in accordance with Article 53(1)(d) and
        the AI Office template. Main data source categories: publicly available datasets, licensed
        datasets, and crawled and scraped online content collected up to March 2026, plus synthetic data
        generated in-house. Measures to identify and comply with a reservation of rights under Union law
        on copyright are described in Section 3.
      description: Draft public summary of training content per the AI Office template
    - value: >-
        Information pack for downstream providers integrating the general-purpose AI model into their AI
        systems (Annex XII): technical means required for integration, the modality and format of inputs
        and outputs, acceptable use policies, and the licence. Includes information on the data used for
        training, testing and validation, covering the type and provenance of data and curation
        methodologies.
      description: Annex XII transparency information for downstream providers
    - value: >-
        Internal — Article 55 evaluation report for the general-purpose AI model with systemic risk:
        results of model evaluation under standardised protocols, findings from external adversarial
        testing (red teaming) of the March checkpoint, and serious-incident tracking arrangements agreed
        with the AI Office. Not for release.
      description: Systemic-risk model evaluation and adversarial testing report
  should_not_match:
    - value: >-
        Brussels — Obligations for general-purpose AI models entered into application on 2 August 2025, the
        Commission said in a press release. Providers now face fines of up to 3% of global turnover, and
        the AI Office has begun assessing compliance. Industry lobbyists called the timeline unrealistic.
      description: News article about GPAI obligations (filter-dependent negative)
    - value: >-
        Struggling with GPAI compliance? Our platform auto-generates your Annex XI documentation and
        training-data summaries in minutes. Start your free trial today or book a demo with our compliance
        experts — trusted by leading model providers.
      description: Vendor marketing for GPAI compliance tooling
    - value: >-
        Abstract — This peer-reviewed paper examines transparency obligations for general-purpose AI models
        under the EU AI Act and argues that the training-content summary requirement is unlikely to enable
        effective copyright enforcement. We survey 14 model releases.
      description: Academic paper on GPAI transparency obligations (filter-dependent negative)
    - value: >-
        Client alert: under Article 53(1)(d) of the AI Act, providers must 'draw up and make publicly
        available a sufficiently detailed summary about the content used for training of the
        general-purpose AI model, according to a template provided by the AI Office'. Contact our team.
      description: Law-firm client alert quoting Article 53 text (filter-dependent negative)
false_positives:
  - description: News, policy analysis, and academic commentary about GPAI obligations — the defined term 'general-purpose AI model' saturates public discussion of the AI Act
    mitigation: Noise exclusion on press/academic terms; 85 tier requires Annex XI/XII item vocabulary (parameters, compute, energy, curation) that commentary rarely reproduces; bare-primary tier is discovery-only
  - description: Published training-content summaries — Article 53(1)(d) makes the final summary public, so a copy is not necessarily sensitive
    mitigation: Treat matches as drafts/copies requiring classification review; layer with document-state signals (draft, confidential, internal markings) outside this pattern
  - description: Compliance-consultancy marketing and GPAI training material
    mitigation: Noise exclusion on 'free trial', 'book a demo', 'webinar', 'client alert'; marketing rarely carries corroborating Annex XI technical vocabulary
  - description: Model cards and open-source README files that voluntarily use similar vocabulary (parameters, modality, training data)
    mitigation: Corroborative evidence weights regulation-specific citations (AI Office, Annex XI, Article 53) over generic ML-documentation vocabulary
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_eu_ai_act_gpai_model_documentation_gpai_terms
      matches:
        - ref: Evidence_eu_ai_act_gpai_model_documentation_primary
        - ref: Evidence_eu_ai_act_gpai_model_documentation_corroborative
        - ref: Pattern_eu_ai_act_gpai_model_documentation_citation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_eu_ai_act_gpai_model_documentation_exclusion
    - confidence_level: 75
      id_match: Pattern_eu_ai_act_gpai_model_documentation_gpai_terms
      matches:
        - ref: Evidence_eu_ai_act_gpai_model_documentation_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_eu_ai_act_gpai_model_documentation_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_eu_ai_act_gpai_model_documentation_gpai_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_eu_ai_act_gpai_model_documentation_exclusion
  regexes:
    - id: Pattern_eu_ai_act_gpai_model_documentation_gpai_terms
      pattern: (?i)\b(?:general[-\s]purpose\s+AI\s+model|public\s+summary\s+of\s+training\s+content|summary\s+about\s+the\s+content\s+used\s+for\s+training|technical\s+documentation\s+of\s+the\s+(?:GPAI\s+)?model)\b
    - id: Pattern_eu_ai_act_gpai_model_documentation_citation
      pattern: (?i)\b(?:Regulation\s+\(EU\)\s+2024/1689|Annex\s+XII?\b|Article\s+5[35])\b
  keywords:
    - id: Evidence_eu_ai_act_gpai_model_documentation_primary
      groups:
        - match_style: word
          terms:
            - general-purpose AI model
            - public summary of training content
            - content used for training
            - text: GPAI
              case_sensitive: true
      strength: specific
    - id: Evidence_eu_ai_act_gpai_model_documentation_corroborative
      groups:
        - match_style: word
          terms:
            - AI Office
            - downstream providers
            - acceptable use policies
            - number of parameters
            - modality
            - methods of distribution
            - computational resources
            - energy consumption
            - adversarial testing
            - red teaming
            - model evaluation
            - systemic risk
            - curation methodologies
            - Union law on copyright
            - reservation of rights
            - synthetic data
      strength: domain
    - id: Filter_eu_ai_act_gpai_model_documentation_exclusion
      groups:
        - match_style: word
          terms:
            - press release
            - media release
            - blog post
            - webinar
            - book a demo
            - free trial
            - client alert
            - legal update
            - newsletter
            - peer-reviewed
            - paper abstract
            - conference abstract
            - abstract submitted
            - training course
            - online course
            - course syllabus
            - training material
            - thought leadership
      strength: noise
risk_rating: 7
risk_description: >-
  Pre-publication GPAI documentation reveals model internals (architecture, parameter counts, training
  compute), training-data provenance with copyright exposure, and candid systemic-risk findings including
  red-teaming results. Disclosure is commercially prejudicial, creates litigation exposure on training-data
  sourcing, and hands adversaries a map of the model's evaluated weaknesses before mitigations land.
sensitivity_labels:
  us_gov: "CUI Basic"
  uk_gov: "OFFICIAL-SENSITIVE"
