schema: testpattern/v1
name: Incident postmortem reports
slug: global-top500-255-incident-postmortem-reports
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies incident postmortem reports patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:postmortem|post-incident|root\s+cause|timeline|corrective\s+actions?|lessons\s+learned)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - incident postmortem reports
    - incident
    - postmortem
    - reports
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: 'Postmortem'
      description: Topic phrase present
    - value: 'postmortem'
      description: Topic phrase, lowercase
    - value: 'this record references the postmortem held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_incident_postmortem
      matches:
        - ref: Pattern_global_top500_255_incident_postmortem_reports_label_context
        - ref: Keyword_global_top500_255_incident_postmortem_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_incident_postmortem
      matches:
        - ref: Keyword_incident_postmortem
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_incident_postmortem
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_incident_postmortem
      pattern: (?i)\b(?:postmortem|post-incident|root\s+cause|timeline|corrective\s+actions?|lessons\s+learned)\b
    - id: Pattern_global_top500_255_incident_postmortem_reports_label_context
      pattern: (?i)\b(?:incident\s+postmortem\s+reports)\b
  keywords:
    - id: Keyword_incident_postmortem
      groups:
        - match_style: word
          terms:
            - incident postmortem
            - post-incident review
            - root cause analysis
            - lessons learned
            - incident timeline
            - corrective action
            - service outage
            - incident response
            - blameless postmortem
            - recovery actions
      strength: specific
    - id: Keyword_global_top500_255_incident_postmortem_reports_domain_context
      groups:
        - match_style: word
          terms:
            - incident postmortem reports
            - incident
            - postmortem
            - reports
      strength: domain
risk_description: >-
  The pattern finds postmortem language with incident or operational context, indicating an after-action record or discussion rather than extracting root-cause detail. A genuine report can expose failure sequences, control gaps, affected components, recovery constraints, and incomplete corrective actions that facilitate repeat disruption. Process templates, retrospective guidance, and non-security project reviews can match, while one postmortem is bounded to the incident described. Risk 7 SENSITIVE reflects moderate operational harm from a substantive internal report; PROTECTED would require critical-service detail or significant damage demonstrated by the content.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
