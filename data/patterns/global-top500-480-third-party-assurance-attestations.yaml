schema: testpattern/v1
name: Third-party assurance attestations
slug: global-top500-480-third-party-assurance-attestations
version: 1.2.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to third-party assurance attestations in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:third[\s-]+party\s+assurance\s+attestations|assurance\s+report|SOC\s+2|SOC\s+1|ISAE\s+3402|independent\s+audit|third[\s-]+party\s+assessment|vendor\s+assurance|control\s+effectiveness)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - third-party assurance attestations
    - third
    - party
    - assurance
    - attestations
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: third-party assurance attestations
      description: Primary topic phrase match
    - value: assurance report
      description: Case-insensitive topic phrase match
    - value: SOC 2
      description: Alternative topic phrase match
    - value: SOC 1
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to third-party assurance attestations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_third_party_assurance
      matches:
        - ref: Pattern_global_top500_480_third_party_assurance_attestations_label_context
        - ref: Keyword_global_top500_480_third_party_assurance_attestations_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_third_party_assurance
      matches:
        - ref: Keyword_third_party_assurance
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_third_party_assurance
      pattern: >-
        (?is)\b(?:third[\s-]+party\s+assurance\s+attestations|assurance\s+report|SOC\s+2|SOC\s+1|ISAE\s+3402|independent\s+audit|third[\s-]+party\s+assessment|vendor\s+assurance|control\s+effectiveness)\b
    - id: Pattern_global_top500_480_third_party_assurance_attestations_label_context
      pattern: (?i)\b(?:third\-party\s+assurance\s+attestations)\b
  keywords:
    - id: Keyword_third_party_assurance
      groups:
        - match_style: word
          terms:
            - third-party assurance attestations
            - assurance report
            - attestation
            - SOC 2
            - SOC 1
            - ISAE 3402
            - independent audit
            - third-party assessment
            - vendor assurance
            - privacy
            - compliance
            - risk
            - control effectiveness
      strength: specific
    - id: Keyword_global_top500_480_third_party_assurance_attestations_domain_context
      groups:
        - match_style: word
          terms:
            - third-party assurance attestations
            - third
            - party
            - assurance
            - attestations
      strength: domain
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
