schema: testpattern/v1
name: Protective order application records
slug: au-top500-419-protective-order-application-records
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to protective order application records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:protective\s+order\s+application\s+records|apprehended\s+violence\s+order|AVO\s+application|restraining\s+order|intervention\s+order|domestic\s+violence\s+order|protection\s+order|family\s+violence\s+order|personal\s+safety\s+order|court\s+protection|respondent\s+details|applicant\s+details)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - protective order application records
    - protective
    - order
    - application
    - records
    - law
    - enforcement
    - justice
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
test_cases:
  should_match:
    - value: protective order application records
      description: Primary topic phrase match
    - value: apprehended violence order
      description: Case-insensitive topic phrase match
    - value: AVO application
      description: Alternative topic phrase match
    - value: restraining order
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to protective order application records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_protective_order_application_records
      matches:
        - ref: Evidence_protective_order_application_records
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_419_protective_order_application_records_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_protective_order_application_records
      matches:
        - ref: Evidence_protective_order_application_records
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_419_protective_order_application_records_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_protective_order_application_records
      matches:
        - ref: Evidence_protective_order_application_records
  regexes:
    - id: Pattern_protective_order_application_records
      pattern: (?is)\b(?:protective\s+order\s+application\s+records|apprehended\s+violence\s+order|AVO\s+application|restraining\s+order|intervention\s+order|domestic\s+violence\s+order|protection\s+order|family\s+violence\s+order|personal\s+safety\s+order|court\s+protection|respondent\s+details|applicant\s+details)\b
    - id: Pattern_au_top500_419_protective_order_application_records_label_context
      pattern: (?i)\\b(?:protective\\s+order\\s+application\\s+records|protective|order|application|top500)\\b
  keywords:
