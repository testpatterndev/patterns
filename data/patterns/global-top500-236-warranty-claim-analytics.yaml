schema: testpattern/v1
name: Warranty claim analytics
slug: global-top500-236-warranty-claim-analytics
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to warranty claim analytics in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:warranty\s+claim|claim\s+analytics|warranty\s+data|return\s+rate|defect\s+rate|warranty\s+cost|claim\s+frequency|product\s+return|warranty\s+period|failure\s+trend)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - business
corroborative_evidence:
  keywords:
    - warranty claim analytics
    - warranty
    - claim
    - analytics
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: warranty claim
      description: Primary topic phrase match
    - value: claim analytics
      description: Case-insensitive topic phrase match
    - value: warranty data
      description: Alternative topic phrase match
    - value: return rate
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to warranty claim analytics appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_warranty_claim_analytics
      matches:
        - ref: Pattern_global_top500_236_warranty_claim_analytics_label_context
        - ref: Keyword_global_top500_236_warranty_claim_analytics_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_warranty_claim_analytics
      matches:
        - ref: Keyword_warranty_claim_analytics
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_warranty_claim_analytics
      pattern: (?is)\b(?:warranty\s+claim|claim\s+analytics|warranty\s+data|return\s+rate|defect\s+rate|warranty\s+cost|claim\s+frequency|product\s+return|warranty\s+period|failure\s+trend)\b
    - id: Pattern_global_top500_236_warranty_claim_analytics_label_context
      pattern: (?i)\b(?:warranty\s+claim\s+analytics)\b
  keywords:
    - id: Keyword_warranty_claim_analytics
      groups:
        - match_style: word
          terms:
            - warranty claim
            - claim analytics
            - warranty data
            - return rate
            - defect rate
            - warranty cost
            - claim frequency
            - product return
            - warranty period
            - failure trend
      strength: specific
    - id: Keyword_global_top500_236_warranty_claim_analytics_domain_context
      groups:
        - match_style: word
          terms:
            - warranty claim analytics
            - warranty
            - claim
            - analytics
      strength: domain
risk_description: >-
  The detector recognizes individual warranty claims, warranty data, claim analytics, return or defect rates, costs, frequencies, product returns, and failure trends. A match may reveal a customer issue or a quality metric and help a competitor infer product reliability, but material commercial or privacy harm needs aggregated trends, identified claimants, affected models, costs, and time periods. Because the regex can fire on one claim or return-rate phrase, the normal unit does not establish the analytics dataset implied by the title. Risk 5 and OFFICIAL are justified; linked customer claims or a substantive trend report exposing systemic defects and financial exposure would be SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
