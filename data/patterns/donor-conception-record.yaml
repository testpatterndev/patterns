schema: testpattern/v1
name: Donor Conception Record
slug: donor-conception-record
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects donor conception records including donor identity information, recipient details, offspring matching, and assisted reproductive technology treatment records under the Status of Children Act 1978 (Qld). These records contain the most sensitive reproductive information — donor identities, recipient medical details, and biological parentage links. Unauthorised disclosure can permanently alter family relationships and breach legal confidentiality protections.
operation: 'Keyword proximity: primary keywords (donor conception, sperm donor, egg donor, donor identity, donor-conceived person, assisted reproductive technology) within 300 characters of corroborative keywords (PROTECTED, Privacy, Status of Children Act 1978, recipient, donor code, fertility clinic). Negative keyword exclusion for published research, IVF marketing, and public policy documents.'
pattern: (?i)\b(donor\s+conception\s+(?:record|register|file)|(?:sperm|egg|embryo)\s+donor\s+(?:identity|profile|details|code)|donor-conceived\s+(?:person|individual|offspring)|assisted\s+reproductive\s+technology\s+(?:record|register)|donor\s+(?:identity|information)\s+(?:release|disclosure|register))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of donor conception terminology with individual identifiers. General fertility treatment marketing, published research, and policy discussions do not trigger detection.'
jurisdictions:
  - au
regulations:
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
- "Status of Children Act 1978 (Qld)"
frameworks:
- QGISCF
data_categories:
  - health
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Privacy
    - donor conception
    - sperm donor
    - egg donor
    - donor identity
    - donor-conceived person
    - assisted reproductive technology
    - Status of Children Act 1978
    - recipient
    - donor code
    - fertility clinic
    - offspring
    - gamete
    - embryo donor
    - donor register
    - donor information
    - biological parent
    - treatment cycle
    - insemination
  proximity: 300
  keyword_lists:

    - healthcare-clinical

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED Privacy. Donor Conception Record — Queensland Fertility Clinic. Recipient: Catherine Mary BRADSHAW, DOB 19/07/1988, Patient ID: QFC-R-2025-04271. Sperm donor identity: Donor Code SD-4782. Assisted reproductive technology treatment cycle 3. Insemination date: 15/12/2025. Donor-conceived offspring: male infant, DOB 08/09/2026 (estimated). Donor profile: Caucasian, tertiary educated, no known hereditary conditions. This record is maintained in accordance with the Status of Children Act 1978 (Qld) and the donor identity disclosure provisions.'
      description: Donor conception record with recipient and donor code details
    - value: 'Queensland Assisted Reproductive Technology Register — Donor Identity Release Application. Application Reference: ART-2026-00156. Applicant: donor-conceived person, Emily Jane FOSTER, DOB 02/03/2000. Applicant seeks release of donor identity information under s.19C Status of Children Act 1978 (Qld). Donor Code: ED-2917 (egg donor). Donor identity: currently held under mandatory register. Counselling requirement: applicant must complete donor-linking counselling with an approved counsellor prior to release. Biological parent: donor information to be disclosed upon completion of counselling.'
      description: Donor identity release application from donor-conceived person
    - value: 'Confidential — Donor Conception File. IVF Australia Queensland — Donor Matching Report. Recipient couple: James and Lisa PARK. Egg donor selected: Donor Code ED-5104. Embryo donor option declined. Assisted reproductive technology consent forms signed 20/01/2026. Donor profile reviewed: blood type compatible, CMV negative, genetic screening completed. Treatment plan: fresh egg collection and fertilisation with recipient partner sperm. Gamete storage consent: surplus embryos to be cryopreserved. Donor conception register entry to be created upon confirmed pregnancy. Fertility specialist: Dr Rachel Wong.'
      description: Donor matching report with recipient couple and donor profile details
  should_not_match:
    - value: The Victorian Assisted Reproductive Treatment Authority published its annual report on donor conception in Australia showing that 2,500 donor conception births were recorded across all states. The report presents aggregate de-identified data on trends and outcomes.
      description: Published annual report with aggregate donor conception statistics
    - value: Queensland Fertility Group advertises its donor program on its website, explaining the process for egg and sperm donation. The page includes general eligibility criteria, success rates, and testimonials from donors who chose to share their stories.
      description: IVF clinic marketing material about donor programs
    - value: The National Health and Medical Research Council published guidelines on the ethical conduct of assisted reproductive technology research. The guidelines address donor consent, anonymity, and the rights of donor-conceived individuals.
      description: Published ethical guidelines for assisted reproductive technology research
false_positives:
  - description: Published statistics and annual reports on donor conception and ART outcomes
    mitigation: 'Negative keyword exclusion: ''annual report'', ''published'', ''aggregate data'', ''de-identified'', ''statistics'', ''trends''. Require proximity to actual individual identifiers or donor codes.'
  - description: IVF clinic marketing and donor program information
    mitigation: 'Negative keyword exclusion: ''advertisement'', ''marketing'', ''success rates'', ''eligibility criteria'', ''testimonial'', ''apply now'''
  - description: Published ethical guidelines and regulatory frameworks for ART
    mitigation: 'Negative keyword exclusion: ''guidelines'', ''ethical conduct'', ''NHMRC'', ''regulatory framework'', ''public consultation'''
  - description: Academic research on donor conception outcomes using de-identified data
    mitigation: 'Negative keyword exclusion: ''research'', ''study'', ''de-identified'', ''anonymised'', ''participants'', ''journal'', ''cohort'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_donor_conception_record_donor_conception_terms
      matches:
        - ref: Evidence_donor_conception_record_primary_keywords
        - ref: Evidence_donor_conception_record_classification_markers
        - ref: Evidence_donor_conception_record_corroborative_terms
        - ref: Pattern_donor_conception_record_donor_code_reference
        - ref: Pattern_donor_conception_record_art_register_reference
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_donor_conception_record_exclusion
    - confidence_level: 75
      id_match: Pattern_donor_conception_record_donor_conception_terms
      matches:
        - ref: Evidence_donor_conception_record_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_donor_conception_record_exclusion
    - confidence_level: 65
      id_match: Pattern_donor_conception_record_donor_conception_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_donor_conception_record_exclusion
  regexes:
    - id: Pattern_donor_conception_record_donor_conception_terms
      pattern: (?i)\b(donor\s+conception|(?:sperm|egg|embryo)\s+donor|donor-conceived\s+(?:person|individual|offspring)|assisted\s+reproductive\s+technology|donor\s+(?:identity|information)\s+(?:release|disclosure|register)|donor\s+matching)\b
    - id: Pattern_donor_conception_record_donor_code_reference
      pattern: \b(?:SD|ED)-\d{4,5}\b
    - id: Pattern_donor_conception_record_art_register_reference
      pattern: \bART-\d{4}-\d{4,5}\b
  keywords:
    - id: Evidence_donor_conception_record_primary_keywords
      groups:
        - match_style: word
          terms:
            - donor conception
            - sperm donor
            - egg donor
            - donor identity
            - donor-conceived person
            - assisted reproductive technology
            - donor register
            - donor matching
            - donor information release
            - embryo donor
    - id: Evidence_donor_conception_record_classification_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - Privacy
            - CONFIDENTIAL
            - SENSITIVE
    - id: Evidence_donor_conception_record_corroborative_terms
      groups:
        - match_style: word
          terms:
            - recipient
            - donor code
            - fertility clinic
            - offspring
            - gamete
            - biological parent
            - treatment cycle
            - insemination
            - Status of Children Act 1978
            - counselling
            - fertility specialist
            - cryopreserved
    - id: Filter_donor_conception_record_exclusion
      groups:
        - match_style: word
          terms:
            - annual report
            - published
            - aggregate data
            - de-identified
            - statistics
            - advertisement
            - marketing
            - success rates
            - eligibility criteria
            - testimonial
            - guidelines
            - ethical conduct
            - NHMRC
            - regulatory framework
            - research
            - study
            - anonymised
            - journal
            - cohort

risk_rating: 8
risk_description: Disclosure reveals donor identities, recipient details, biological parentage links, and reproductive treatment records. Permanently alters family relationships and breaches legislated confidentiality protections for all parties including donor-conceived offspring. While highly sensitive, this data must be transferable between authorised agencies for service delivery and statutory obligations. Disclosure could cause significant personal distress and privacy harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
references: []
