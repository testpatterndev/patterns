schema: testpattern/v1
name: Patent/IP Reference
slug: au-patent-ip-reference
version: 1.5.0
type: regex
pattern_class: concept
description: Detects references to patents, intellectual property registrations, and IP Australia filings.
operation: >-
  Patent, trade-mark, and design-registration references are discovery-only at 65. Patentability,
  claim-analysis, filing-strategy, prosecution, inventor-disclosure, specification, or application
  work-product raises a match to 75. The 85 tier additionally requires a formal filing or ownership
  field such as application number, filing date, priority date, applicant, owner, or examiner report.
  Enforcing tiers reject public-register, published-patent, guide, template, and example context.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - intellectual-property
test_cases:
  should_match:
    - value: 'Patent application'
      description: Low-tier probe - IP reference without work-product content
    - value: 'Patent application: claim analysis and filing strategy.'
      description: Medium-tier probe - substantive IP work product without a formal record field
    - value: 'Patent application: claim analysis and filing strategy; application number AU2026123456, filing date 19 July 2026.'
      description: High-tier probe - work product plus formal filing fields
  should_not_match:
    - value: Patent leather shoes on sale
      description: Product-description sibling
    - value: The patently obvious solution
      description: Lexical near-match
    - value: 'The public patent register lists patent application number AU2026123456 and its filing date.'
      description: Public register contains formal patent fields but no private work product
    - value: 'Template example: patent application claim analysis and filing strategy, application number AU2026123456, filing date 19 July 2026.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Use of patent as adjective in non-IP contexts.
    mitigation: Require IP-specific keywords like patent application, patent claim, or IP Australia.
exports:
  - yaml
scope: narrow
risk_rating: 5
risk_description: >-
  The keyword-list detector finds Australian patent, trademark, IP Australia, patent-claim, prior-art, registration, and intellectual-property portfolio references. Those references commonly occur in public filings, published rights, status reports, educational material, and routine administration without exposing an invention or confidential legal position. A genuine match can point toward sensitive work, but exploitation requires unpublished technical details, draft language, or private prosecution and portfolio analysis. Risk 5 supports OFFICIAL; SENSITIVE would require actual pre-filing claims, invention disclosure, privileged patentability advice, or confidential registration strategy.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Regex_patent_au
          - Regex_patent_general
          - Regex_trademark
      matches:
        - ref: Keyword_ip_work_product
        - ref: Keyword_formal_ip_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_public_ip_context
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Regex_patent_au
          - Regex_patent_general
          - Regex_trademark
      matches:
        - ref: Keyword_ip_work_product
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_public_ip_context
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Regex_patent_au
          - Regex_patent_general
          - Regex_trademark
  regexes:
    - id: Regex_patent_au
      pattern: (?i)\b(?:au\s*\d{6,9}|australian\s+patent|ip\s+australia)\b
    - id: Regex_patent_general
      pattern: (?i)\b(?:patent\s+(?:application|pending|no\.?|number)|prior\s+art|patent\s+claim)\b
    - id: Regex_trademark
      pattern: (?i)\b(?:trade\s*mark|trademark|design\s+registration)\b
  keywords:
    - id: Keyword_patent
      groups:
        - match_style: word
          terms:
            - patent portfolio
            - patent filing
            - patent rights
            - patent application
            - patent pending
            - patent number
            - prior art
            - patent claim
            - patentability
      strength: specific
    - id: Keyword_ip
      groups:
        - match_style: word
          terms:
            - intellectual property
            - text: IP
              case_sensitive: true
            - IP Australia
            - trade mark
            - trademark
            - design registration
            - copyright
      strength: domain
    - id: Keyword_ip_work_product
      groups:
        - match_style: word
          terms:
            - claim analysis
            - patentability assessment
            - filing strategy
            - prosecution strategy
            - inventor disclosure
            - draft specification
            - examination response
            - trade mark application
            - design application
      strength: domain
    - id: Keyword_formal_ip_record
      groups:
        - match_style: word
          terms:
            - application number
            - filing date
            - priority date
            - applicant
            - registered owner
            - examiner report
            - IP Australia reference
            - renewal date
      strength: specific
    - id: Keyword_public_ip_context
      groups:
        - match_style: word
          terms:
            - public patent register
            - published patent
            - public guide
            - patent search portal
            - granted patent publication
      strength: exclusion
created: '2026-02-09'
updated: '2026-07-19'
