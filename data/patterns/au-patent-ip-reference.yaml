schema: testpattern/v1
name: Patent/IP Reference
slug: au-patent-ip-reference
version: 1.3.0
type: keyword_list
description: Detects references to patents, intellectual property registrations, and IP Australia filings.
operation: >-
  Keyword-based detection matching patent application, IP Australia, trademark, and patent claim patterns. Corroborative
  evidence: 14 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - intellectual-property
test_cases:
  should_match:
    - value: 'Patent application filed with IP Australia: patent pending'
      description: Test match 1
    - value: Patent claim analysis for prior art review and patentability assessment
      description: Test match 2
    - value: Intellectual property portfolio including trademark and design registration
      description: Test match 3
  should_not_match:
    - value: Patent leather shoes on sale
      description: Non-match 1
    - value: The patently obvious solution
      description: Non-match 2
false_positives:
  - description: Use of patent as adjective in non-IP contexts.
    mitigation: Require IP-specific keywords like patent application, patent claim, or IP Australia.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: Patent exposure reveals unpublished intellectual property and competitive advantage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Legal"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Regex_patent_au
          - Regex_patent_general
      matches:
        - ref: Keyword_patent
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_trademark
      matches:
        - ref: Keyword_ip
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_patent_au
      pattern: (?i)\b(?:au\s*\d{6,9}|australian\s+patent|ip\s+australia)\b
    - id: Regex_patent_general
      pattern: (?i)\b(?:patent\s+(?:application|pending|no\.?|number)|prior\s+art|patent\s+claim)\b
    - id: Regex_trademark
      pattern: (?i)\b(?:trade\s*mark|trademark|design\s+registration)\b
  keywords:
    - id: Keyword_patent
      groups:
        - match_style: word
          terms:
            - patent portfolio
            - patent filing
            - patent rights
            - patent application
            - patent pending
            - patent number
            - prior art
            - patent claim
            - patentability
      strength: specific
    - id: Keyword_ip
      groups:
        - match_style: word
          terms:
            - intellectual property
            - text: IP
              case_sensitive: true
            - IP Australia
            - trade mark
            - trademark
            - design registration
            - copyright
      strength: domain
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - patent portfolio
  - patent filing
  - patent rights
  - patent application
  - patent pending
  - patent number
  - prior art
  - patent claim
  - patentability
  - intellectual property
  - IP
  - IP Australia
  - trade mark
  - trademark
  - design registration
  - copyright
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
