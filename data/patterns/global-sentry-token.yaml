schema: testpattern/v1
name: Sentry Token
slug: global-sentry-token
version: 1.1.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Sentry auth tokens: organization tokens (sntrys_), user auth tokens (sntryu_), the
  user-app and internal-integration prefixes from Sentry's own token-type source (sntrya_,
  sntryi_), and, when labelled with Sentry context in an assignment, the legacy unprefixed
  64-hex tokens issued before prefixing. A leaked token grants API access to error and
  performance data -- which routinely embeds further secrets, PII, and source context -- and to
  release/CI operations. Sentry DSNs are explicitly NOT matched: Sentry documents DSNs as safe
  to keep public.
operation: >-
  Two detection branches. Branch 1 (distinctive, value-only capable): sntrys_ organization tokens
  -- the full structure attested by both gitleaks and Kingfisher: payload beginning with
  base64-encoded '{"iat":' (sntrys_eyJpYXQiO), a bounded base64 run, an embedded base64-encoded
  "region_url" JSON marker (one of its three base64 rotations), a second bounded base64 run,
  optional padding, then an underscore-separated 43-character base64 secret
  (={0,2}_[A-Za-z0-9+/]{43}); sntryu_ user tokens (exactly 64 hex, pinned identically by
  gitleaks, TruffleHog, and Kingfisher); and sntrya_/sntryi_ (user-app and internal-integration
  prefixes confirmed by Sentry's own source code -- src/sentry/types/token.py -- with unpublished
  bodies, so a generous bounded range is used behind the vendor-confirmed distinctive prefixes,
  the same honest-bound treatment as other vendor-announced-but-unpinned formats in this corpus).
  Branch 2 (context-gated only): legacy pre-prefix tokens (bare 64 hex, per gitleaks'
  "old format" rule and TruffleHog's v1 detector), requiring a Sentry label plus an assignment
  separator before the value. Corroborative evidence: keywords within 300 characters.
pattern: (?<![A-Za-z0-9+/_-])(?:sntrys_eyJpYXQiO[A-Za-z0-9+/]{10,200}(?:LCJyZWdpb25fdXJs|InJlZ2lvbl91cmwi|cmVnaW9uX3VybCI6)[A-Za-z0-9+/]{10,200}={0,2}_[A-Za-z0-9+/]{43}|sntryu_[a-f0-9]{64}|sntry[ai]_[A-Za-z0-9+/=_-]{20,200})(?![A-Za-z0-9+/=_-])
confidence: high
confidence_justification: >-
  High confidence: the sntry?_ prefix family is confirmed by Sentry's own source code
  (AuthTokenType enum: sntryu_/sntrys_/sntrya_/sntryi_), and the two dominant formats are pinned
  by multiple independent production detectors -- sntryu_ + 64 hex identically in gitleaks,
  TruffleHog, and Kingfisher; the sntrys_ branch adopts the full gitleaks/Kingfisher-attested
  structure (eyJpYXQiO payload head, embedded base64 region_url marker in any of its three
  rotations, and the trailing ={0,2}_ + 43-character base64 secret; TruffleHog's flat
  sntrys_eyJ + 197-character body is consistent with this envelope). Sentry is a GitHub
  secret-scanning partner for both (push protection enabled). The
  sntrya_/sntryi_ bodies are not published by any source, so they carry an honest bounded range
  behind their distinctive prefixes rather than an invented exact length. The legacy unprefixed
  64-hex form is deliberately context-gated: it is indistinguishable from any SHA-256 hex digest,
  so it requires a labelled assignment and never fires value-only.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - sentry
    - sentry.io
    - SENTRY_AUTH_TOKEN
    - sentry-cli
    - auth token
    - api key
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: sntryu_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      description: Sentry user auth token (sntryu_ + 64 hex)
    - value: 'SENTRY_AUTH_TOKEN=sntrys_eyJpYXQiOABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789InJlZ2lvbl91cmwiabcdefghijklmnopqrstuvwxyz0123456789==_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopq'
      description: Sentry organization token (sntrys_eyJpYXQiO + base64 + region_url marker + base64 + padding + _ + 43-char secret) in the canonical env var
    - value: sntryi_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz
      description: Internal-integration prefix from Sentry's own token-type source (bounded body)
    - value: sentry auth token = 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      description: Legacy pre-prefix token (bare 64 hex) in a labelled Sentry assignment (context-gated branch)
    - value: 'SENTRY_AUTH_TOKEN: fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210'
      description: Legacy 64-hex token after the canonical env var with colon separator
    - value: sentry.auth.token="abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789"
      description: Legacy 64-hex token in a quoted dotted-key config assignment
  should_not_match:
    - value: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef with no vendor context
      description: Bare 64-hex value with no Sentry label anywhere (could be any SHA-256 digest)
    - value: sntryu_0123456789abcdef
      description: sntryu_ body far too short (16 hex chars, not 64)
    - value: https://0123456789abcdef0123456789abcdef@o123456.ingest.sentry.io/4501234567890123
      description: Sentry DSN (public by design per Sentry's own docs; its 32-hex public key must not fire the 64-hex legacy branch)
    - value: rotate the sentry auth token in organization settings
      description: Prose mention without a token value
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Sentry DSNs (https://<32-hex>@o<org>.ingest.sentry.io/<project>) look credential-like but are documented by Sentry as safe to keep public; they are deliberately not matched.
    mitigation: The legacy branch requires a 64-hex body in a labelled assignment, which a DSN's 32-hex public key cannot satisfy; DSN detection is documented as out of scope rather than flagged as a leak.
  - description: A 64-character hex digest (SHA-256) appearing in a labelled assignment near the word "sentry" in configuration or logs.
    mitigation: The legacy branch requires label adjacency plus an assignment separator (enforced by the regex) and corroborative keywords; it never fires value-only.
  - description: The sntrya_/sntryi_ body lengths are not published by Sentry or any scanner; a generous bounded range is used behind the vendor-confirmed prefixes. Hypothetical sntrys_ tokens whose payload lacks the leading '{"iat":' or the embedded region_url field would not match the organization-token branch (both gitleaks and Kingfisher assume the same structure).
    mitigation: Documented as an honest bound; the prefixes themselves come from Sentry's own source and are highly distinctive, and the structured org-token branch mirrors both production scanners exactly.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  A leaked Sentry token grants API access to the organization's error and performance events --
  which routinely contain stack traces, request payloads, PII, and embedded secrets -- plus
  release, source-map, and CI operations that enable supply-chain tampering.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_sentry_token
      matches:
        - ref: Keyword_sentry_token
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_sentry_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_sentry_legacy_token
      matches:
        - ref: Keyword_sentry_token
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_sentry_token
      pattern: (?<![A-Za-z0-9+/_-])(?:sntrys_eyJpYXQiO[A-Za-z0-9+/]{10,200}(?:LCJyZWdpb25fdXJs|InJlZ2lvbl91cmwi|cmVnaW9uX3VybCI6)[A-Za-z0-9+/]{10,200}={0,2}_[A-Za-z0-9+/]{43}|sntryu_[a-f0-9]{64}|sntry[ai]_[A-Za-z0-9+/=_-]{20,200})(?![A-Za-z0-9+/=_-])
    - id: Regex_sentry_legacy_token
      pattern: (?i)sentry[\s\S]{0,40}?[=:][\s"']{0,4}(?<![A-Za-z0-9_])[a-f0-9]{64}(?![A-Za-z0-9_])
  keywords:
    - id: Keyword_sentry_token
      groups:
        - match_style: word
          terms:
            - text: Sentry
              case_sensitive: true
            - sentry.io
            - SENTRY_AUTH_TOKEN
            - sentry-cli
            - sentry api
            - auth token
            - api key
      strength: specific
