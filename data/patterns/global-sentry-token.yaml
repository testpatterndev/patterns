references:
  - url: https://github.com/getsentry/sentry/blob/master/src/sentry/types/token.py
    title: "Sentry's own AuthTokenType source (sntryu_/sntrys_/sntrya_/sntryi_ prefixes; pre-prefix tokens have none)"
  - url: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
    title: 'gitleaks.toml sentry-org-token (sntrys_eyJpYXQiO structured), sentry-user-token (sntryu_[a-f0-9]{64}), sentry-access-token (legacy label-gated 64-hex)'
  - url: https://github.com/trufflesecurity/trufflehog/tree/main/pkg/detectors/sentryorgtoken
    title: 'TruffleHog production Sentry detectors (sentryorgtoken sntrys_eyJ + 197-char body; sentrytoken v2 sntryu_[a-f0-9]{64}; v1 legacy label-gated 64-hex)'
  - url: https://github.com/mongodb/kingfisher/blob/main/crates/kingfisher-rules/data/rules/sentry.yml
    title: 'Kingfisher production Sentry rules (org token sntrys_eyJpYXQiO structured; user token sntryu_ 64-hex; legacy label-gated)'
  - url: https://docs.github.com/en/code-security/secret-scanning/introduction/supported-secret-scanning-patterns
    title: Supported secret scanning patterns - GitHub Docs (Sentry Organization Token and Sentry Personal Token, partner + push protection)
  - url: https://docs.sentry.io/concepts/key-terms/dsn-explainer/
    title: 'DSN explainer - Sentry Docs ("DSNs are safe to keep public"; DSN detection is out of scope)'
