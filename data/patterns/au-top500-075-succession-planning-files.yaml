schema: testpattern/v1
name: Succession planning files
slug: au-top500-075-succession-planning-files
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to succession planning files in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:succession\s+plan|succession\s+planning|talent\s+pipeline|successor\s+candidate|key\s+person\s+risk|leadership\s+pipeline|readiness\s+assessment|high\s+potential|successor\s+identified|bench\s+strength|talent\s+review|development\s+pipeline)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - succession planning files
    - succession
    - planning
    - files
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: succession plan
      description: Primary topic phrase match
    - value: succession planning
      description: Case-insensitive topic phrase match
    - value: talent pipeline
      description: Alternative topic phrase match
    - value: successor candidate
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to succession planning files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_succession_planning
      matches:
        - ref: Evidence_succession_planning
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_succession_planning
      matches:
        - ref: Evidence_succession_planning
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_succession_planning
      matches:
        - ref: Evidence_succession_planning
  regexes:
    - id: Pattern_succession_planning
      pattern: >-
        (?is)\b(?:succession\s+plan|succession\s+planning|talent\s+pipeline|successor\s+candidate|key\s+person\s+risk|leadership\s+pipeline|readiness\s+assessment|high\s+potential|successor\s+identified|bench\s+strength|talent\s+review|development\s+pipeline)\b
    - id: Pattern_au_top500_075_succession_planning_files_label_context
      pattern: (?i)\\b(?:succession\\s+planning\\s+files|succession|planning|files|top500)\\b
  keywords:
    - id: Evidence_succession_planning
      groups:
        - match_style: word
          terms:
            - succession plan
            - succession planning
            - talent pipeline
            - successor candidate
            - key person risk
            - leadership pipeline
            - readiness assessment
            - high potential
            - successor identified
            - bench strength
            - talent review
            - development pipeline
    - id: Keyword_au_top500_075_succession_planning_files_domain_context
      groups:
        - match_style: word
          terms:
            - succession planning files
            - succession
            - planning
            - files
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
changelog:
