schema: testpattern/v1
name: Australian Driver's Licence Number
slug: au-motor-vehicle-permit
version: 2.6.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Discovery-only compatibility coverage for Australian driver's licence number candidates across all states and
  territories. The stable au-motor-vehicle-permit slug is retained for catalogue, collection, workbook, and package
  compatibility. State and territory enforcement belongs to the eight au-*-driver-licence-number SITs. Microsoft
  Purview tenants can instead select the free built-in Australia Driver's License Number entity
  (1cbbc8f5-9216-4392-9eb5-5ac2298d1356); this compatibility pattern is not a custom clone of that built-in.
operation: >-
  A broad six-to-ten digit or six-to-seven alphanumeric candidate is gated by driver-licence context, template
  exclusion, and an Australian mobile-number exclusion at a single discovery-only 65 tier. There are no enforceable
  national tiers. The regional SITs carry exact `au-*` jurisdiction values such as `au-qld`; package consumers must
  explicitly include the state or territory jurisdictions in the customer footprint rather than treating `au` as a
  wildcard for every regional detector.
pattern: \b(?:(?!0{6,10}\b)\d{6,10}|[A-Z]\d{5,6}|\d{4}[A-Z]{2})\b
confidence: low
confidence_justification: >-
  Low confidence: this national compatibility detector intentionally inventories broad candidates only. Use a
  state/territory SIT at confidence 75 or 85, or Microsoft's built-in entity, for policy enforcement.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - drivers licence
    - driver licence
    - drivers license
    - driver license
    - licence number
    - license number
    - driving licence
    - driver licence number
  proximity: 300
  keyword_lists:
    - au-vehicle-permit-terms
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '40829161'
      description: NSW-shaped compatibility candidate
    - value: '082946135'
      description: QLD/VIC-shaped compatibility candidate
    - value: A482915
      description: SA/TAS-shaped compatibility candidate
    - value: '4082915'
      description: WA/NT/TAS-shaped compatibility candidate
    - value: '4062981735'
      description: ACT/VIC-shaped compatibility candidate
  should_not_match:
    - value: 12345
      description: Too few characters
    - value: 12345678901
      description: Too many digits
    - value: AB12345
      description: Unsupported seven-character two-letter shape
    - value: '00000000'
      description: All-zero placeholder excluded by the regex and same-digit filter
    - value: '111111111'
      description: Repeated-digit sentinel excluded by the same-digit filter
    - value: Mobile 0412345678 for proof of identity contact.
      description: Australian mobile number is excluded from discovery
false_positives:
  - description: Account, invoice, order, telephone, and other numeric identifiers with six to ten digits.
    mitigation: Treat the stable national slug as discovery-only and enforce with the matching regional SIT.
  - description: Policy and public guidance discussing licence-number formats without a populated value.
    mitigation: Require a regional labelled-number primary and state authority evidence at higher confidence.
  - description: Australian mobile telephone numbers can satisfy a ten-digit candidate shape.
    mitigation: Exclude AU mobile-number shapes from the discovery tier.
regional_tuning:
  - jurisdiction: au
    signal: au-mobile-number-overmatch-numeric-id-20260525
    action: exclude-regex
    id: Regex_au_mobile_number_exclusion
    pattern: (?:^|[^0-9])(?:04[0-9]{8}|(?:\+?61[\s.-]?4(?:[\s.-]?[0-9]){8}))(?:$|[^0-9])
    defaultDecision: modify
    risk: regional-phone-number-overmatch
    reason: Aggregate analysis found Australian mobile-shaped literals overmatching this numeric identifier family in AU tenant data.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 5
risk_description: >-
  This discovery detector inventories possible Australian driver's licence numbers without assigning an issuing state.
  If tied to a holder, a genuine number can strengthen identity-verification fraud or correlate licensing
  correspondence. The candidate alone is not a licence image, driving history, or authenticator, and broad numeric
  shapes collide with routine business identifiers. Risk 5 and OFFICIAL describe a confirmed atomic licence number;
  discovery hits require regional corroboration before that assessment is applied.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_au_driver_licence_candidate
      matches:
        - ref: Evidence_driver_licence_context
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Guard_au_mobile_number
            - ref: Evidence_template_exclusion
  regexes:
    - id: Pattern_au_driver_licence_candidate
      pattern: \b(?:(?!0{6,10}\b)\d{6,10}|[A-Z]\d{5,6}|\d{4}[A-Z]{2})\b
    - id: Guard_au_mobile_number
      pattern: (?i)\b(?:\+?61[ -]?4|04)\d(?:[ -]?\d){7}\b
  keywords:
    - id: Evidence_driver_licence_context
      groups:
        - match_style: word
          terms:
            - drivers licence
            - driver licence
            - driver's licence
            - drivers license
            - driver license
            - driver's license
            - licence number
            - license number
            - driving licence
            - driving license
            - proof of identity
      strength: domain
  filters:
    - id: Guard_au_driver_licence_same_digits
      type: AllDigitsSameFilter
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 2.6.0
    date: '2026-07-19'
    description: >-
      Regional split: retain the stable slug as a single 65 discovery-only compatibility detector, move enforceable
      state logic to eight state/territory number SITs, identify Microsoft's free built-in by entity ID without cloning
      it, and assign exact state/territory jurisdiction values for explicit regional package selection.
  - version: 2.5.0
    date: '2026-07-18'
    description: >-
      Adversarial accuracy pass: rename display name to Australian Driver's Licence Number and rewrite description/
      risk_description/operation to match the actual state licence-format detectors. Keep slug au-motor-vehicle-permit
      as the stable catalog ID for package and workbook compatibility. Prefer driver-licence corroborative keywords;
      document SA/WA/ACT case-insensitive abbreviation FP residual. Detection regexes and tier wiring unchanged.
  - version: 2.4.0
    date: '2026-07-16'
    description: >-
      Wire the 16 already-declared state-format and jurisdiction regexes into the tiers: 8 state-paired 85 branches (state format + permit terms + matching jurisdiction + agency with template
      exclusion) and 8 state-paired 75 branches (state format + permit terms + matching jurisdiction); demote the generic fallback to discovery-only 65 and gate it with a new Guard_au_mobile_number
      NONE-of regex so Australian mobile numbers no longer reach any enforceable tier. Same-digit and numeric-sentinel filters retained.
  - version: 2.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 560 without changing detector or package metadata.'
  - version: 2.3.0
    date: '2026-07-12'
    description: 'Baseline burn-down C: guard the top-level regex (and mirrored Pattern_permit_nsw purview copy) against the all-zeros placeholder "00000000" with a negative lookahead ((?!0{8}\b)), mirroring the AllDigitsSameFilter intent at the universal-engine top-level layer that ci-check.mjs evaluates independently of purview filters.'
  - version: 2.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 2.1.1
    date: '2026-07-09'
    description: 'Replace sentinel should_match values (12345678/123456789/1234567/1234567890) that the pattern''s own Guard_permit_exclude_test TextMatchFilter excludes with realistic non-sentinel licence numbers — the old positives could never match in Purview (tier-harness triage class T3)'
  - version: 2.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
