schema: testpattern/v1
name: Australian Driver's Licence Number
slug: au-motor-vehicle-permit
version: 2.5.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Identifies Australian driver's licence numbers across all 8 states and territories using state-specific digit/letter
  formats (NSW 8-digit / 4+2 letter forms, QLD/VIC 8-10 digit, SA letter+digits, WA/NT/TAS 6-8 digit, ACT 10 digit, and
  related jurisdiction shapes). State context is supplied via jurisdiction and agency regexes rather than keyword-only
  lists. A generic fallback shape is discovery-only and is gated against AU mobile-number overmatch. The stable slug
  au-motor-vehicle-permit is retained for catalog compatibility; this detector is a driver's-licence identifier, not a
  separate vehicle-permit product.
operation: >-
  State-specific regexes for each jurisdiction's licence format combined with a consolidated licence/permit-term keyword
  list and jurisdiction agency keyword list. State context uses regex patterns for state names and abbreviations rather
  than keyword lists. Per-jurisdiction confidence tiers: state format + licence terms + matching jurisdiction + agency
  keywords with template exclusion (85), state format + licence terms + matching jurisdiction (75); the generic fallback
  shape is discovery-only (65) with broad licence terms and an AU mobile-number NONE-of gate.
pattern: \b(?:(?!0{8}\b)\d{8}|\d{4}[A-Z]{2})\b
confidence: low
confidence_justification: 'Low confidence: generic digit patterns match many non-licence identifiers. State-specific regex combined with licence-term and jurisdiction-agency keywords essential for reliable detection.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - drivers licence
    - driver licence
    - drivers license
    - driver license
    - DL
    - licence number
    - license number
    - driving licence
    - driver licence number
  proximity: 300
  keyword_lists:
    - au-vehicle-permit-terms
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '40829161'
      description: NSW format (8 digits)
    - value: '082946135'
      description: QLD/VIC format (9 digits)
    - value: A12345
      description: SA format (letter + 5 digits)
    - value: A123456
      description: TAS format (letter + 6 digits)
    - value: '4082915'
      description: WA/NT/TAS format (7 digits)
    - value: '4062981735'
      description: ACT format (10 digits)
  should_not_match:
    - value: 12345
      description: Too few digits (5 instead of minimum 6)
    - value: 12345678901
      description: Too many digits (11 instead of maximum 10)
    - value: AB12345
      description: Two leading letters not valid for any state
    - value: '00000000'
      description: Placeholder numeric value excluded by sentinel filter
    - value: '111111111'
      description: All-same digit sequence excluded by sentinel filter
    - value: Mobile 0412345678 for proof of identity contact.
      description: Australian mobile number must be suppressed by the AU mobile-number NONE-of gate and must not reach an enforceable tier
false_positives:
  - description: Generic numeric sequences matching licence digit counts.
    mitigation: Require licence-term keywords and state context for reliable detection.
  - description: Australian mobile telephone numbers can satisfy the generic 10-digit licence fallback and caused material overmatch.
    mitigation: Use the AU mobile number NONE-of regex gate on licence-number tiers where phone numbers are not valid positive evidence.
  - description: Policy documents discussing licence formats without actual data.
    mitigation: Layer with form-field or database-column context signals.
  - description: Case-insensitive state abbreviations (SA, WA, ACT) can match ordinary English words.
    mitigation: Enforce tiers require licence terms in addition to jurisdiction regexes; treat bare jurisdiction hits as insufficient.
regional_tuning:
  - jurisdiction: au
    signal: au-mobile-number-overmatch-numeric-id-20260525
    action: exclude-regex
    id: Regex_au_mobile_number_exclusion
    pattern: (?:^|[^0-9])(?:04[0-9]{8}|(?:\+?61[\s.-]?4(?:[\s.-]?[0-9]){8}))(?:$|[^0-9])
    defaultDecision: modify
    risk: regional-phone-number-overmatch
    reason: Aggregate analysis found Australian mobile-shaped literals overmatching this numeric identifier family in AU tenant data.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 5
risk_description: >-
  This detector recognises one Australian state or territory driver's licence number through jurisdiction-specific
  formats. If tied to the holder, the identifier can strengthen identity verification fraud or help correlate transport
  and licensing correspondence. The number alone is not a licence image, does not reveal driving history, and cannot
  authenticate a person without additional evidence; low-confidence formats may also collide with mobile or account
  numbers. Risk 5 and OFFICIAL represent the bounded credential-reference risk of the atomic identifier. The catalog
  slug remains au-motor-vehicle-permit for compatibility only.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_permit_nsw
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_nsw
        - ref: Evidence_permit_agency
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 85
      id_match: Pattern_permit_vic
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_vic
        - ref: Evidence_permit_agency
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 85
      id_match: Pattern_permit_qld
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_qld
        - ref: Evidence_permit_agency
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 85
      id_match: Pattern_permit_sa
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_sa
        - ref: Evidence_permit_agency
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 85
      id_match: Pattern_permit_wa
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_wa
        - ref: Evidence_permit_agency
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 85
      id_match: Pattern_permit_tas
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_tas
        - ref: Evidence_permit_agency
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 85
      id_match: Pattern_permit_nt
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_nt
        - ref: Evidence_permit_agency
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 85
      id_match: Pattern_permit_act
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_act
        - ref: Evidence_permit_agency
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_permit_nsw
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_nsw
    - confidence_level: 75
      id_match: Pattern_permit_vic
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_vic
    - confidence_level: 75
      id_match: Pattern_permit_qld
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_qld
    - confidence_level: 75
      id_match: Pattern_permit_sa
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_sa
    - confidence_level: 75
      id_match: Pattern_permit_wa
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_wa
    - confidence_level: 75
      id_match: Pattern_permit_tas
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_tas
    - confidence_level: 75
      id_match: Pattern_permit_nt
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_nt
    - confidence_level: 75
      id_match: Pattern_permit_act
      matches:
        - ref: Evidence_permit_terms
        - ref: Pattern_jurisdiction_act
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_permit_generic
      matches:
        - ref: Evidence_permit_broad
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Guard_au_mobile_number
  regexes:
    - id: Pattern_permit_nsw
      pattern: \b(?:(?!0{8}\b)\d{8}|\d{4}[A-Z]{2})\b
    - id: Pattern_permit_vic
      pattern: \b\d{8,10}\b
    - id: Pattern_permit_qld
      pattern: \b\d{8,9}\b
    - id: Pattern_permit_sa
      pattern: \b[A-Z]\d{5,6}\b
    - id: Pattern_permit_wa
      pattern: \b\d{7}\b
    - id: Pattern_permit_tas
      pattern: \b(?:\d{7}|[A-Z]\d{5,6})\b
    - id: Pattern_permit_nt
      pattern: \b\d{6,8}\b
    - id: Pattern_permit_act
      pattern: \b\d{8,10}\b
    - id: Pattern_permit_generic
      pattern: \b(?:\d{6,10}|[A-Z]\d{5,6}|\d{4}[A-Z]{2})\b
    - id: Pattern_jurisdiction_nsw
      pattern: (?i)\b(?:NSW|New\s+South\s+Wales|Service\s+NSW|Roads?\s+and\s+Maritime)\b
    - id: Pattern_jurisdiction_vic
      pattern: (?i)\b(?:VIC|Victoria|VicRoads)\b
    - id: Pattern_jurisdiction_qld
      pattern: (?i)\b(?:QLD|Queensland|TMR|Transport\s+and\s+Main\s+Roads)\b
    - id: Pattern_jurisdiction_sa
      pattern: (?i)\b(?:SA|South\s+Australia|Service\s+SA)\b
    - id: Pattern_jurisdiction_wa
      pattern: (?i)\b(?:WA|Western\s+Australia|Department\s+of\s+Transport)\b
    - id: Pattern_jurisdiction_tas
      pattern: (?i)\b(?:TAS|Tasmania|Service\s+Tasmania)\b
    - id: Pattern_jurisdiction_nt
      pattern: (?i)\b(?:NT|Northern\s+Territory|Motor\s+Vehicle\s+Registry|MVR)\b
    - id: Pattern_jurisdiction_act
      pattern: (?i)\b(?:ACT|Australian\s+Capital\s+Territory|Access\s+Canberra)\b
    - id: Guard_au_mobile_number
      pattern: (?i)\b(?:\+?61[ -]?4|04)\d(?:[ -]?\d){7}\b
  keywords:
    - id: Evidence_permit_terms
      groups:
        - match_style: word
          terms:
            - drivers licence
            - driver licence
            - drivers license
            - driver license
            - text: DL
              case_sensitive: true
            - licence number
            - license number
            - driving licence
            - driving license
            - motor vehicle permit
            - licence no
            - permit number
      strength: specific
    - id: Evidence_permit_agency
      groups:
        - match_style: word
          terms:
            - Service NSW
            - VicRoads
            - text: TMR
              case_sensitive: true
            - Transport and Main Roads
            - Service SA
            - Department of Transport
            - Service Tasmania
            - Motor Vehicle Registry
            - text: MVR
              case_sensitive: true
            - Access Canberra
            - Roads and Maritime
            - text: RMS
              case_sensitive: true
      strength: specific
    - id: Evidence_permit_broad
      groups:
        - match_style: word
          terms:
            - licence
            - license
            - permit
            - identification
            - identity document
            - proof of identity
      strength: domain
  filters:
    - id: Guard_permit_same_digits
      type: AllDigitsSameFilter
    - id: Guard_permit_exclude_test
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms:
        - "000000"
        - "0000000"
        - "00000000"
        - "000000000"
        - "0000000000"
        - "123456"
        - "1234567"
        - "12345678"
        - "123456789"
        - "1234567890"
created: '2026-02-08'
updated: '2026-07-18'
changelog:
  - version: 2.5.0
    date: '2026-07-18'
    description: >-
      Adversarial accuracy pass: rename display name to Australian Driver's Licence Number and rewrite description/
      risk_description/operation to match the actual state licence-format detectors. Keep slug au-motor-vehicle-permit
      as the stable catalog ID for package and workbook compatibility. Prefer driver-licence corroborative keywords;
      document SA/WA/ACT case-insensitive abbreviation FP residual. Detection regexes and tier wiring unchanged.
  - version: 2.4.0
    date: '2026-07-16'
    description: >-
      Wire the 16 already-declared state-format and jurisdiction regexes into the tiers: 8 state-paired 85 branches (state format + permit terms + matching jurisdiction + agency with template
      exclusion) and 8 state-paired 75 branches (state format + permit terms + matching jurisdiction); demote the generic fallback to discovery-only 65 and gate it with a new Guard_au_mobile_number
      NONE-of regex so Australian mobile numbers no longer reach any enforceable tier. Same-digit and numeric-sentinel filters retained.
  - version: 2.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 560 without changing detector or package metadata.'
  - version: 2.3.0
    date: '2026-07-12'
    description: 'Baseline burn-down C: guard the top-level regex (and mirrored Pattern_permit_nsw purview copy) against the all-zeros placeholder "00000000" with a negative lookahead ((?!0{8}\b)), mirroring the AllDigitsSameFilter intent at the universal-engine top-level layer that ci-check.mjs evaluates independently of purview filters.'
  - version: 2.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 2.1.1
    date: '2026-07-09'
    description: Replace sentinel should_match values (12345678/123456789/1234567/1234567890) that the pattern's own Guard_permit_exclude_test TextMatchFilter excludes with realistic non-sentinel licence numbers — the old positives could never match in Purview (tier-harness triage class T3)
  - version: 2.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
