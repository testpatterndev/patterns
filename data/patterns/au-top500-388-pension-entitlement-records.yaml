schema: testpattern/v1
name: Pension entitlement records
slug: au-top500-388-pension-entitlement-records
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to pension entitlement records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: financial-deposit-terms, industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:pension\s+entitlement\s+records|age\s+pension|Services\s+Australia|income\s+test|assets\s+test|concession\s+card)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - pension entitlement records
    - pension
    - entitlement
    - records
    - government
    - citizen
    - services
  proximity: 300
  keyword_lists:

    - financial-deposit-terms

    - industry-hr
test_cases:
  should_match:
    - value: pension entitlement records
      description: Primary topic phrase match
    - value: age pension
      description: Case-insensitive topic phrase match
    - value: Services Australia
      description: Alternative topic phrase match
    - value: income test
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to pension entitlement records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pension_entitlement
      matches:
        - ref: Evidence_pension_entitlement
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_388_pension_entitlement_records_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_pension_entitlement
      matches:
        - ref: Evidence_pension_entitlement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_388_pension_entitlement_records_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_pension_entitlement
      matches:
        - ref: Evidence_pension_entitlement
  regexes:
    - id: Pattern_pension_entitlement
      pattern: (?is)\b(?:pension\s+entitlement\s+records|age\s+pension|Services\s+Australia|income\s+test|assets\s+test|concession\s+card)\b
    - id: Pattern_au_top500_388_pension_entitlement_records_label_context
      pattern: (?i)\\b(?:pension\\s+entitlement\\s+records|pension|entitlement|top500)\\b
  keywords:
    - id: Evidence_pension_entitlement
      groups:
        - match_style: word
          terms:
            - pension entitlement records
            - pension
            - entitlement
            - age pension
            - Centrelink
            - Services Australia
            - superannuation
            - retirement
            - income test
            - assets test
            - concession card
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_388_pension_entitlement_records_domain_context
      groups:
        - match_style: word
          terms:
            - pension entitlement records
            - pension
            - entitlement
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_388_pension_entitlement_records_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
