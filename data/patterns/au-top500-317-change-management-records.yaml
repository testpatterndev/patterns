schema: testpattern/v1
name: Change management records
slug: au-top500-317-change-management-records
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies change management records patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:change\s+management|change\s+request|change\s+advisory\s+board|change\s+record|change\s+approval|rollback\s+plan|implementation\s+plan|change\s+window|change\s+freeze|impact\s+assessment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - change management records
    - change
    - management
    - records
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: change management
      description: Primary topic phrase match
    - value: change request
      description: Case-insensitive topic phrase match
    - value: change advisory board
      description: Alternative topic phrase match
    - value: change record
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_change_management
      matches:
        - ref: Evidence_change_management
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_change_management
      matches:
        - ref: Evidence_change_management
    - confidence_level: 65
      id_match: Pattern_change_management
      matches:
        - ref: Evidence_change_management
  regexes:
    - id: Pattern_change_management
      pattern: (?is)\b(?:change\s+management|change\s+request|change\s+advisory\s+board|change\s+record|change\s+approval|rollback\s+plan|implementation\s+plan|change\s+window|change\s+freeze|impact\s+assessment)\b
  keywords:
    - id: Evidence_change_management
      groups:
        - match_style: word
          terms:
            - change management
            - change request
            - change advisory board
            - CAB
            - RFC
            - change record
            - change approval
            - rollback plan
            - implementation plan
            - change window
            - change freeze
            - impact assessment
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
