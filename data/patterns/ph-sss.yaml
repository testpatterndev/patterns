schema: testpattern/v1
name: Philippines SSS Number
slug: ph-sss
version: 1.0.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Philippines Social Security System (SSS) numbers in the common dashed format
  ##-#######-# (10 digits total). Continuous digit forms are intentionally out of scope to reduce collision with
  other national identifiers.
operation: >-
  Structural dashed SSS format only. Corroborative evidence: SSS keywords within 300 characters.
  Keyword lists: pii-civic-credentials, industry-hr.
pattern: '\b\d{2}-\d{7}-\d{1}\b'
confidence: high
confidence_justification: >-
  High confidence for the dashed format with SSS keywords; dashed grouping is distinctive
  versus bare 10-digit sequences.
jurisdictions:
  - ph
regulations:
  - "Data Privacy Act 2012 (PH)"
  - "SSS Act"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
  - financial
corroborative_evidence:
  keywords:
    - SSS number
    - SSS no
    - social security number
    - SSS
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - industry-hr
test_cases:
  should_match:
    - value: '01-2345678-9'
      description: Standard dashed SSS
    - value: '33-1234567-0'
      description: Alternate SSS
    - value: '09-8765432-1'
      description: Third SSS example
  should_not_match:
    - value: '0123456789'
      description: Continuous digits without dashes
    - value: '01-234567-9'
      description: Only 6 digits in middle group
    - value: '01-2345678-99'
      description: Two-digit trailing group
false_positives:
  - description: >-
      Other dashed administrative codes with 2-7-1 grouping.
    mitigation: >-
      Require SSS / social security keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ph_sss
      matches:
        - ref: Keyword_ph_sss_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ph_sss
      matches:
        - ref: Keyword_ph_sss_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ph_sss
  regexes:
    - id: Regex_ph_sss
      pattern: '\b\d{2}-\d{7}-\d{1}\b'
  keywords:
    - id: Keyword_ph_sss_specific
      groups:
        - match_style: word
          terms:
            - SSS number
            - SSS no
            - SSS ID
            - social security number
            - SSS contribution
            - SSS number:
      strength: specific
    - id: Keyword_ph_sss_broad
      groups:
        - match_style: word
          terms:
            - text: SSS
              case_sensitive: true
            - social security system
            - Philippines SSS
            - monthly contribution
            - PRN SSS
      strength: specific
risk_rating: 5
risk_description: >-
  This high-confidence regex detects the dashed Philippine SSS number format with nearby social-security or HR context, identifying a membership reference rather than contribution history or an online-account credential. A genuine number can help correlate employment and benefits records or support impersonation attempts, but financial loss requires the member's identity, claim data, authentication, or service access. Other administrative codes can share the 2-7-1 grouping, and continuous digits are deliberately out of scope. Risk 5 and OFFICIAL fit the atomic identifier; SENSITIVE would require an attributed benefits file, contribution record, claim, credential, or bulk member register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
references:
  - url: https://www.sss.gov.ph/
    title: Social Security System - Philippines
created: '2026-07-09'
updated: '2026-07-14'
changelog:
  - version: 1.0.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2169 without changing detector or package metadata.'
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Initial mature identifier SIT — Phase-1 coverage backlog (Purview-safe regex, full label/risk metadata for pack workbooks)'
