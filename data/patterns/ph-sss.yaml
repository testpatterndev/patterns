schema: testpattern/v1
name: Philippines SSS Number
slug: ph-sss
version: 1.0.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Philippines Social Security System (SSS) numbers in the common dashed format
  ##-#######-# (10 digits total). Continuous digit forms are intentionally out of scope to reduce collision with
  other national identifiers.
operation: >-
  Structural dashed SSS format only. Corroborative evidence: SSS keywords within 300 characters.
  Keyword lists: pii-civic-credentials, industry-hr.
pattern: '\b\d{2}-\d{7}-\d{1}\b'
confidence: high
confidence_justification: >-
  High confidence for the dashed format with SSS keywords; dashed grouping is distinctive
  versus bare 10-digit sequences.
jurisdictions:
  - ph
regulations:
  - "Data Privacy Act 2012 (PH)"
  - "SSS Act"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
  - financial
corroborative_evidence:
  keywords:
    - SSS number
    - SSS no
    - social security number
    - SSS
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - industry-hr
test_cases:
  should_match:
    - value: '01-2345678-9'
      description: Standard dashed SSS
    - value: '33-1234567-0'
      description: Alternate SSS
    - value: '09-8765432-1'
      description: Third SSS example
  should_not_match:
    - value: '0123456789'
      description: Continuous digits without dashes
    - value: '01-234567-9'
      description: Only 6 digits in middle group
    - value: '01-2345678-99'
      description: Two-digit trailing group
false_positives:
  - description: >-
      Other dashed administrative codes with 2-7-1 grouping.
    mitigation: >-
      Require SSS / social security keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ph_sss
      matches:
        - ref: Keyword_ph_sss_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ph_sss
      matches:
        - ref: Keyword_ph_sss_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ph_sss
  regexes:
    - id: Regex_ph_sss
      pattern: '\b\d{2}-\d{7}-\d{1}\b'
  keywords:
    - id: Keyword_ph_sss_specific
      groups:
        - match_style: word
          terms:
            - SSS number
            - SSS no
            - SSS ID
            - social security number
            - SSS contribution
            - SSS number:
      strength: specific
    - id: Keyword_ph_sss_broad
      groups:
        - match_style: word
          terms:
            - text: SSS
              case_sensitive: true
            - social security system
            - Philippines SSS
            - monthly contribution
            - PRN SSS
      strength: specific
risk_rating: 8
risk_description: >-
  SSS numbers identify members for social insurance and benefits; exposure enables benefit fraud and identity misuse.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
references:
  - url: https://www.sss.gov.ph/
    title: Social Security System - Philippines
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Initial mature identifier SIT — Phase-1 coverage backlog (Purview-safe regex, full label/risk metadata for pack workbooks)'
author: testpattern-community
