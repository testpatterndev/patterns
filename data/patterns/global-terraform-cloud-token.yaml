schema: testpattern/v1
name: Terraform Cloud / Enterprise API Token
slug: global-terraform-cloud-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects HashiCorp Terraform Cloud / Terraform Enterprise API tokens (atlasv1 format). These
  tokens authenticate to the Terraform Cloud API and can read/write workspace state and variables; a leak can expose all infrastructure secrets.
operation: >-
  Token format is 14 lowercase alphanumeric characters, then the literal .atlasv1. marker, then a 60-70 character
  base64url-style body. Corroborative evidence: keywords within 300 characters.
pattern: (?<![A-Za-z0-9])[A-Za-z0-9]{14}\.atlasv1\.[A-Za-z0-9\-_=]{60,70}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the embedded .atlasv1. marker between two structured segments is highly distinctive and makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - terraform
    - terraform cloud
    - atlasv1
    - TF_TOKEN
    - app.terraform.io
    - credentials.tfrc.json
  proximity: 300
test_cases:
  should_match:
    - value: aBcDeFgHiJkLmN.atlasv1.0123456789abcdefABCDEF0123456789abcdefABCDEF0123456789abcdef0123
      description: Exact 65 probe - atlasv1 segmented token without independent workspace context
    - value: 'Terraform Cloud workspace credential ABCDEFGHIJKLMN.atlasv1.aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789-_=ABCDEFGHIJKLMNOPQRST012345'
      description: Exact 75 probe - token with Terraform Cloud workspace context
    - value: 'Terraform Cloud workspace secret TF_TOKEN_app_terraform_io=12345678901234.atlasv1.zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIhHgGfFeEdDcCbBaA0123456789'
      description: Exact 85 probe - workspace context plus canonical host-token assignment
  should_not_match:
    - value: aBcDeFgHiJkLmN.atlasv1.tooShort
      description: Body too short to be a Terraform Cloud token
    - value: aBcDeFgHiJkLmN.atlasv2.0123456789abcdefABCDEF0123456789abcdefABCDEF0123456789abcdef0123
      description: Wrong marker (atlasv2) - not a Terraform Cloud token
    - value: 'VAULT_TOKEN=aBcDeFgHiJkLmN.atlasv1.0123456789abcdefABCDEF0123456789abcdefABCDEF0123456789abcdef0123'
      description: Sibling HashiCorp product label does not corroborate a Terraform Cloud token
    - value: 'Documentation example: Terraform Cloud workspace TF_TOKEN_app_terraform_io=aBcDeFgHiJkLmN.atlasv1.0123456789abcdefABCDEF0123456789abcdefABCDEF0123456789abcdef0123'
      description: Documentation example containing a valid-shaped token is excluded
    - value: store your terraform cloud token in the credentials file
      description: Prose mention without a token value
false_positives:
  - description: Dotted strings that coincidentally contain .atlasv1. in unrelated data.
    mitigation: Require corroborative Terraform keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The detector identifies Terraform Cloud or Enterprise API tokens from the distinctive atlasv1 segmented format and expected surrounding length. A live token can expose permitted workspaces, state, variables, runs, and infrastructure operations, with consequences determined by whether it belongs to a user, team, or organisation and by the assigned permissions. The normal unit is a single revocable token, and fabricated atlasv1 examples or coincidental dotted strings are possible although the format is specific. Risk 8 SENSITIVE reflects serious infrastructure and secret exposure within the granted scope; PROTECTED would require confirmed critical-estate control or consequences amounting to significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_terraform_cloud_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_terraform_cloud_token
      matches:
        - ref: Keyword_terraform_workspace_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_terraform_cloud_token
      matches:
        - ref: Keyword_terraform_workspace_context
        - ref: Pattern_terraform_token_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_terraform_cloud_token
      pattern: (?<![A-Za-z0-9])[A-Za-z0-9]{14}\.atlasv1\.[A-Za-z0-9\-_=]{60,70}(?![A-Za-z0-9])
    - id: Pattern_terraform_token_assignment
      pattern: (?i)\b(?:TF_TOKEN_[A-Za-z0-9_]+|TFE_TOKEN|TERRAFORM_CLOUD_TOKEN)\s*[=:]
  keywords:
    - id: Keyword_terraform_workspace_context
      groups:
        - match_style: string
          terms:
            - Terraform Cloud workspace
            - Terraform Enterprise workspace
            - app.terraform.io
            - Terraform Cloud API
      strength: specific
