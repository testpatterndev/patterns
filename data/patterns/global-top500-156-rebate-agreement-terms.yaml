schema: testpattern/v1
name: Rebate agreement terms
slug: global-top500-156-rebate-agreement-terms
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to rebate agreement terms in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:rebate\s+agreement|volume\s+rebate|rebate\s+calculation|rebate\s+threshold|rebate\s+payout|retrospective\s+discount|incentive\s+rebate|rebate\s+accrual|rebate\s+claim|tiered\s+rebate|annual\s+rebate|rebate\s+settlement)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - rebate agreement terms
    - rebate
    - agreement
    - terms
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: rebate agreement
      description: Primary topic phrase match
    - value: volume rebate
      description: Case-insensitive topic phrase match
    - value: rebate calculation
      description: Alternative topic phrase match
    - value: rebate threshold
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to rebate agreement terms appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_rebate_agreement_terms
      matches:
        - ref: Pattern_global_top500_156_rebate_agreement_terms_label_context
        - ref: Keyword_global_top500_156_rebate_agreement_terms_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_rebate_agreement_terms
      matches:
        - ref: Keyword_rebate_agreement_terms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_rebate_agreement_terms
      pattern: >-
        (?is)\b(?:rebate\s+agreement|volume\s+rebate|rebate\s+calculation|rebate\s+threshold|rebate\s+payout|retrospective\s+discount|incentive\s+rebate|rebate\s+accrual|rebate\s+claim|tiered\s+rebate|annual\s+rebate|rebate\s+settlement)\b
    - id: Pattern_global_top500_156_rebate_agreement_terms_label_context
      pattern: (?i)\b(?:rebate\s+agreement\s+terms)\b
  keywords:
    - id: Keyword_rebate_agreement_terms
      groups:
        - match_style: word
          terms:
            - rebate agreement
            - volume rebate
            - rebate calculation
            - rebate threshold
            - rebate payout
            - retrospective discount
            - incentive rebate
            - rebate accrual
            - rebate claim
            - tiered rebate
            - annual rebate
            - rebate settlement
      strength: specific
    - id: Keyword_global_top500_156_rebate_agreement_terms_domain_context
      groups:
        - match_style: word
          terms:
            - rebate agreement terms
            - rebate
            - agreement
            - terms
      strength: domain
risk_description: >-
  The detector recognises rebate-agreement, volume-rebate, rebate-calculation, and rebate-threshold language intended to identify commercial pricing terms. A substantive agreement can reveal discount structures, sales volumes, thresholds, and supplier negotiations, creating bargaining disadvantage or targeted undercutting when competitor and transaction context are available. Generic pricing policies and agreement templates can match, and one routine rebate schedule does not expose credentials, payment access, or an entire pricing strategy. Risk 5 OFFICIAL reflects bounded commercial harm; SENSITIVE would require market-shaping rates, major confidential negotiations, strategic volume data, collusion evidence, or a portfolio-wide pricing repository.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
