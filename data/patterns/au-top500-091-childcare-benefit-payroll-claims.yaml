schema: testpattern/v1
name: Childcare benefit payroll claims
slug: au-top500-091-childcare-benefit-payroll-claims
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to childcare benefit payroll claims in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: industry-hr.
pattern: >-
  (?is)\b(?:childcare\s+benefit|child\s+care\s+subsidy|childcare\s+claim|payroll\s+benefit|dependent\s+care|childcare\s+allowance|employer\s+childcare|salary\s+packaging\s+childcare|Services\s+Australia|childcare\s+rebate|family\s+assistance)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - childcare benefit payroll claims
    - childcare
    - benefit
    - payroll
    - claims
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: childcare benefit
      description: Primary topic phrase match
    - value: child care subsidy
      description: Case-insensitive topic phrase match
    - value: childcare claim
      description: Alternative topic phrase match
    - value: payroll benefit
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_childcare_benefit_payroll_claims
      matches:
        - ref: Evidence_childcare_benefit_payroll_claims
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_childcare_benefit_payroll_claims
      matches:
        - ref: Evidence_childcare_benefit_payroll_claims
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_childcare_benefit_payroll_claims
      matches:
        - ref: Evidence_childcare_benefit_payroll_claims
  regexes:
    - id: Pattern_childcare_benefit_payroll_claims
      pattern: >-
        (?is)\b(?:childcare\s+benefit|child\s+care\s+subsidy|childcare\s+claim|payroll\s+benefit|dependent\s+care|childcare\s+allowance|employer\s+childcare|salary\s+packaging\s+childcare|Services\s+Australia|childcare\s+rebate|family\s+assistance)\b
  keywords:
    - id: Evidence_childcare_benefit_payroll_claims
      groups:
        - match_style: word
          terms:
            - childcare benefit
            - child care subsidy
            - text: CCS
              case_sensitive: true
            - childcare claim
            - payroll benefit
            - dependent care
            - childcare allowance
            - employer childcare
            - salary packaging childcare
            - Services Australia
            - childcare rebate
            - family assistance
      strength: specific
risk_description: >-
  The regex recognises childcare benefits, subsidies, payroll claims, dependent-care allowances, employer childcare, salary packaging, and family-assistance terms. A genuine completed claim can reveal an employee's family responsibilities, benefit eligibility, payroll arrangement, and potentially the existence of a child, creating targeted privacy and financial harm. The normal affected unit is one employee or household claim, although public Services Australia guidance and employer benefit material can match without personal data. Risk 7 SENSITIVE Financial is justified for a substantive claim; PROTECTED would require a large benefits register, severe child-safety implications, or significant systemic fraud exposure.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
