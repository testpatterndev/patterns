schema: testpattern/v1
name: Ad attribution datasets
slug: global-top500-378-ad-attribution-datasets
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to ad attribution datasets in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:ad\s+attribution\s+datasets|attribution\s+model|conversion\s+tracking|click\s+attribution|campaign\s+attribution|touchpoint\s+analysis|ad\s+impression|attribution\s+window|last[\s-]+click\s+attribution|multi[\s-]+touch\s+attribution|advertising\s+identifier|tracking\s+pixel)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - ad attribution datasets
    - attribution
    - datasets
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: ad attribution datasets
      description: Primary topic phrase match
    - value: attribution model
      description: Case-insensitive topic phrase match
    - value: conversion tracking
      description: Alternative topic phrase match
    - value: click attribution
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to ad attribution datasets appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_ad_attribution
      matches:
        - ref: Pattern_global_top500_378_ad_attribution_datasets_label_context
        - ref: Keyword_global_top500_378_ad_attribution_datasets_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ad_attribution
      matches:
        - ref: Keyword_ad_attribution
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_ad_attribution
      matches:
        - ref: Keyword_ad_attribution
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ad_attribution
      pattern: >-
        (?is)\b(?:ad\s+attribution\s+datasets|attribution\s+model|conversion\s+tracking|click\s+attribution|campaign\s+attribution|touchpoint\s+analysis|ad\s+impression|attribution\s+window|last[\s-]+click\s+attribution|multi[\s-]+touch\s+attribution|advertising\s+identifier|tracking\s+pixel)\b
    - id: Pattern_global_top500_378_ad_attribution_datasets_label_context
      pattern: (?i)\\b(?:ad\\s+attribution\\s+datasets|attribution|datasets|top500)\\b
  keywords:
    - id: Keyword_ad_attribution
      groups:
        - match_style: word
          terms:
            - ad attribution datasets
            - attribution model
            - conversion tracking
            - click attribution
            - campaign attribution
            - touchpoint analysis
            - ad impression
            - attribution window
            - last-click attribution
            - multi-touch attribution
            - advertising identifier
            - tracking pixel
    - id: Keyword_global_top500_378_ad_attribution_datasets_domain_context
      groups:
        - match_style: word
          terms:
            - ad attribution datasets
            - attribution
            - datasets
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines
  - https://www.legislation.gov.au/C2004A03712/latest/text
