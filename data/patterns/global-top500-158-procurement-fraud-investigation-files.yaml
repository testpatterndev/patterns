schema: testpattern/v1
name: Procurement fraud investigation files
slug: global-top500-158-procurement-fraud-investigation-files
version: 1.2.4
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to procurement fraud investigation files in international contexts.
  These are investigative and procurement-sensitive records that may contain personal allegations; the category is not blanket
  personally identifiable information.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:procurement\s+fraud\s+investigation\s+files|procurement\s+fraud|fraud\s+investigation|supplier\s+fraud|tender\s+irregularity|bid\s+rigging|forensic\s+audit|conflict\s+of\s+interest|due\s+diligence)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- business
- audit
corroborative_evidence:
  keywords:
  - procurement fraud investigation files
  - procurement
  - fraud
  - investigation
  - files
  - supplier
  - management
  proximity: 300
test_cases:
  should_match:
  - value: procurement fraud investigation files
    description: Primary topic phrase match
  - value: procurement fraud
    description: Case-insensitive topic phrase match
  - value: fraud investigation
    description: Alternative topic phrase match
  - value: supplier fraud
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: procurement inventory
    description: Generic word pair from old broad template should not match
false_positives:
- description: Common words and phrases related to procurement fraud investigation files appearing in policy documents, training
    materials, HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_procurement_fraud_investigation
    matches:
    - ref: Pattern_global_top500_158_procurement_fraud_investigation_files_label_context
    - ref: Keyword_global_top500_158_procurement_fraud_investigation_files_domain_context
    - ref: Keyword_procurement_fraud_investigation
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_procurement_fraud_investigation
    matches:
    - ref: Pattern_global_top500_158_procurement_fraud_investigation_files_label_context
    - ref: Keyword_global_top500_158_procurement_fraud_investigation_files_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_procurement_fraud_investigation
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_procurement_fraud_investigation
    pattern: (?is)\b(?:procurement\s+fraud\s+investigation\s+files|procurement\s+fraud|fraud\s+investigation|supplier\s+fraud|tender\s+irregularity|bid\s+rigging|forensic\s+audit|conflict\s+of\s+interest|due\s+diligence)\b
  - id: Pattern_global_top500_158_procurement_fraud_investigation_files_label_context
    pattern: (?i)\b(?:procurement\s+fraud\s+investigation\s+files)\b
  keywords:
  - id: Keyword_procurement_fraud_investigation
    groups:
    - match_style: word
      terms:
      - procurement fraud investigation files
      - procurement fraud
      - fraud investigation
      - supplier fraud
      - tender irregularity
      - bid rigging
      - kickback
      - collusion
      - forensic audit
      - whistleblower
      - conflict of interest
      - due diligence
    strength: specific
  - id: Keyword_global_top500_158_procurement_fraud_investigation_files_domain_context
    groups:
    - match_style: word
      terms:
      - procurement fraud investigation files
      - procurement
      - fraud
      - investigation
      - files
    strength: domain
risk_description: The concept detector recognises procurement-fraud, fraud-investigation, supplier-fraud, and investigation-file
  language intended to identify a composite procurement case. A substantive file can contain allegations, transaction analysis,
  suspect and witness identities, evidence, investigative methods, and planned actions, exposing people to retaliation and
  undermining recovery or disciplinary proceedings. Fraud-control policies can match, but the named unit is a case file rather
  than an isolated invoice or supplier identifier. Risk 8 SENSITIVE reflects serious contained legal and operational harm;
  PROTECTED would require active law-enforcement operations, protected witnesses, major systemic corruption, national-security
  procurement, or compromise causing significant damage.
sensitivity_labels:
