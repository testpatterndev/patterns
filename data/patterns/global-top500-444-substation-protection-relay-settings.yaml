schema: testpattern/v1
name: Substation protection relay settings
slug: global-top500-444-substation-protection-relay-settings
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive substation protection-relay settings and coordination records. Topic phrases
  are retained for discovery; enforcement requires a populated current, voltage, impedance, timing, or
  zone value, and high confidence also requires a substation, feeder, breaker, relay model, or device ID.
operation: >-
  Regex_substation_protection_relay recognises protection-relay, pickup/trip, coordination, distance,
  and IED-setting topics. The topic alone is discovery-only at 65. A populated electrical or timing
  value raises it to 75; a value plus a substation, feeder, breaker, relay model, or device ID reaches
  85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:substation\s+protection\s+relay\s+settings|protection\s+relay\s+settings|distance\s+relay\s+settings|pickup\s+setting|trip\s+setting|relay\s+coordination\s+settings|IED\s+settings)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires a populated electrical or timing setting rather than relay terminology
  alone. High confidence adds a live device, feeder, breaker, or substation reference.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - substation protection relay settings
    - substation
    - protection
    - relay
    - settings
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: substation protection relay settings
      description: Low-tier probe - topic without populated relay values
    - value: 'Protection relay settings: pickup 850 A, time delay 250 ms, and zone 1 reach 2.8 ohms'
      description: Medium-tier probe - populated relay values without a live device or site reference
    - value: 'Substation protection relay settings for feeder F12 at North Substation, relay SEL-411L: pickup 850 A and trip delay 250 ms'
      description: High-tier probe - populated settings with feeder, substation, and relay-model detail
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: protection relay substation
      description: Generic word pair from old broad template should not match
    - value: 'The power-engineering textbook explains distance-relay coordination.'
      description: Educational relay theory without populated settings
    - value: 'Training example: substation protection relay settings for feeder F12, SEL-411L pickup 850 A'
      description: Explicit training content must not enforce
false_positives:
  - description: Grid standards, relay manuals, and protection-engineering courses discuss pickup, trip, distance, impedance, and coordination concepts without exposing deployed settings.
    mitigation: Keep topic-only matches discovery-only and require a populated electrical or timing value for enforcement.
  - description: Worked examples can contain realistic feeder IDs, relay models, settings, and timing values.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_substation_protection_relay
      matches:
        - ref: Evidence_relay_setting_value
        - ref: Evidence_relay_live_asset
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_substation_protection_relay
      matches:
        - ref: Evidence_relay_setting_value
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_substation_protection_relay
  regexes:
    - id: Regex_substation_protection_relay
      pattern: >-
        (?is)\b(?:substation\s+protection\s+relay\s+settings|protection\s+relay\s+settings|distance\s+relay\s+settings|pickup\s+setting|trip\s+setting|relay\s+coordination\s+settings|IED\s+settings)\b
    - id: Evidence_relay_setting_value
      pattern: '(?i)\b\d+(?:\.\d+)?\s*(?:kA|A|kV|V|ohms?|cycles?|ms|s|percent)\b'
  keywords:
    - id: Evidence_relay_live_asset
      groups:
        - match_style: word
          terms:
            - substation
            - substation ID
            - feeder
            - feeder ID
            - relay model
            - relay ID
            - breaker ID
            - circuit breaker
            - line bay
            - busbar
            - text: SEL-411L
              case_sensitive: true
            - text: MiCOM
              case_sensitive: true
            - text: SIPROTEC
              case_sensitive: true
      strength: specific
risk_description: >-
  The classifier finds protection-relay, distance-relay, pickup-setting, and trip-setting records with eight nearby grid and operational terms. Actual settings reveal thresholds and timing used to isolate electrical faults, helping a knowledgeable attacker coordinate misoperation, nuisance trips, or reduced equipment protection. The normal settings file creates serious service and equipment risk, but exploitation requires the correct substation context, device access, and an ability to alter or exploit the relay. For the global catalogue analogue, the confirmed substantive record is the consequence unit. Actual trip thresholds, zones, timing and coordination settings can be used to cause outages, equipment damage or unsafe protection behaviour across an electricity network. Risk 10 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require numerical settings, relay models, substation/feeder identifiers and coordination tables; textbooks and manuals stay audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
