schema: testpattern/v1
name: Multi-factor authentication seeds
slug: au-top500-264-multi-factor-authentication-seeds
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies multi-factor authentication seeds patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses pattern matching to identify relevant content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?i)(?:otpauth://(?:totp|hotp)/\S*[?&]secret=[a-z2-7]{16,}|\b(?:secret|seed|totp|mfa)\b[\s:=]{1,4}[a-z2-7]{16,52}\b)
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - Criminal Code Act 1995 (Cth)
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - multi-factor authentication seeds
    - multi
    - factor
    - authentication
    - seeds
    - credentials
    - keys
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: 'otpauth://totp/Example:alice@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Example'
      description: TOTP provisioning URI with base32 secret
    - value: 'MFA secret: JBSWY3DPEHPK3PXPJBSWY3DP'
      description: Labelled base32 MFA secret
    - value: 'TOTP seed = NB2W45DFOIZADENBQGQ3TS'
      description: Labelled base32 TOTP seed
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_mfa_seeds
      matches:
        - ref: Evidence_mfa_seeds
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_mfa_seeds
      matches:
        - ref: Evidence_mfa_seeds
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_mfa_seeds
      matches:
        - ref: Evidence_mfa_seeds
  regexes:
    - id: Pattern_mfa_seeds
      pattern: (?i)(?:otpauth://(?:totp|hotp)/\S*[?&]secret=[a-z2-7]{16,}|\b(?:secret|seed|totp|mfa)\b[\s:=]{1,4}[a-z2-7]{16,52}\b)
  keywords:
    - id: Evidence_mfa_seeds
      groups:
        - match_style: word
          terms:
            - multi-factor authentication
            - authentication seeds
            - totp secret
            - hotp secret
            - mfa seed
            - authenticator
            - base32
            - otpauth
            - two-factor
            - backup codes
            - enrollment key
