schema: testpattern/v1
name: Financial Statement
slug: au-financial-statement
version: 1.4.2
type: keyword_proximity
pattern_class: concept
description: Detects financial statements including profit and loss, balance sheets, and income statements.
operation: >-
  Regex and keyword-based detection matching profit and loss, income statement, balance sheet, and financial position
  patterns. Corroborative evidence: 8 financial statement and 8 accounting keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - financial
  - business
test_cases:
  should_match:
    - value: Financial statements prepared
      description: Exact 65 discovery probe with a statement phrase and no figures
    - value: Financial statements show net profit of $1.2M
      description: Exact 75 probe with a financial metric
    - value: Audited financial statements show net profit of $1.2M
      description: Exact 85 probe with a financial metric and audit provenance
    - value: Profit and loss statement for FY2025 showing net profit of $1.2M
      description: Profit and loss statement with reporting-period metric
    - value: Balance sheet as at 30 June 2025 - total assets and liabilities
      description: Balance sheet with statement values
    - value: 'Annual report financial results: EBITDA increased by 15%'
      description: Test match 3
  should_not_match:
    - value: The company made a financial donation
      description: Non-match 1
    - value: Annual general meeting minutes
      description: Non-match 2
    - value: Financial statements software schema
      description: Product/schema phrase must remain discovery-only
false_positives:
  - description: Generic financial terms in non-statement contexts.
    mitigation: Require specific financial statement terms like profit and loss or balance sheet.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The detector identifies financial statements such as profit-and-loss reports, balance sheets, income statements, and statements of financial position containing revenue, costs, assets, liabilities, and profitability. Premature disclosure can reveal performance, liquidity, solvency, and business strategy to competitors, counterparties, investors, or fraudsters. The reporting entity, owners, employees, and creditors may face serious commercial and financial harm, but the normal statement concerns one entity and may later be publicly released. Risk 8 and SENSITIVE Financial fit a non-public statement, while market-wide consequences, systemic insolvency, or protected government operations would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_financial_statement
      matches:
        - ref: Keyword_profit_loss
        - ref: Keyword_asic_audit
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_financial_statement
      matches:
        - ref: Keyword_profit_loss
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_financial_statement
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_financial_statement
      pattern: (?i)\b(?:profit\s+and\s+loss(?:\s+statement)?|income\s+statement|balance\s+sheet|statement\s+of\s+financial\s+position|financial\s+statements?|annual\s+report\s+financial\s+results)\b
    - id: Regex_financial_year
      pattern: (?i)\b(?:fy\s*20\d{2}|financial\s+year\s+ended|year\s+ended\s+30\s+june)\b
  keywords:
    - id: Keyword_financial_statement
      groups:
        - match_style: word
          terms:
            - profit and loss
            - income statement
            - balance sheet
            - financial position
            - cash flow
            - financial report
            - annual report
            - financial results
      strength: specific
    - id: Keyword_asic_audit
      groups:
        - match_style: word
          terms:
            - ASIC
            - audit report
            - auditor's report
            - independent audit
            - audited financial statements
            - directors report
            - Australian Auditing Standards
      strength: specific
    - id: Keyword_profit_loss
      groups:
        - match_style: word
          terms:
            - revenue
            - gross profit
            - net profit
            - operating expenses
            - EBIT
            - EBITDA
            - cost of goods sold
            - depreciation
            - total assets
            - total liabilities
            - shareholders' equity
            - cash flows
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: align the evidence-gated detector to keyword_proximity, make statement headings 65 discovery, require financial values at 75 and audit provenance at 85, broaden genuine statement heading coverage, and add exact-tier plus software-schema probes.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 542 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - profit and loss
  - income statement
  - balance sheet
  - financial position
  - cash flow
  - financial report
  - annual report
  - financial results
  - revenue
  - gross profit
  - net profit
  - operating expenses
  - EBIT
  - EBITDA
  - cost of goods sold
  - depreciation
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
