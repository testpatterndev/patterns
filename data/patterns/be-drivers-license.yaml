schema: testpattern/v1
name: Belgium Driver's License Number
slug: be-drivers-license
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Belgium driver's license number patterns. This pattern is based on a Microsoft Purview built-in sensitive
  information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as
  a starting point for customisation.
operation: >-
  Matches a 10-digit number at word boundaries. Corroborative evidence: 5 keywords within 300 characters. Keyword lists:
  pii-civic-credentials.
pattern: \b[0-9]{10}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - be
  - eu
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - driver
    - licence
    - license
    - driving
    - DL
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: '1234567890'
      description: Standard 10-digit Belgian driver's license number
    - value: '9876543210'
      description: Another valid 10-digit format
    - value: '0012345678'
      description: 10-digit number with leading zeros
  should_not_match:
    - value: '123456789'
      description: Too few digits (9 instead of 10)
    - value: '12345678901'
      description: Too many digits (11 instead of 10)
false_positives:
  - description: >-
      Generic numeric sequences matching the driver's license format appearing in unrelated contexts.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm driver's license context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_be_drivers_license
      matches:
        - ref: Keyword_be_drivers_license_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_be_drivers_license
      matches:
        - ref: Keyword_be_drivers_license_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_be_drivers_license
  regexes:
    - id: Regex_be_drivers_license
      pattern: \b[0-9]{10}\b
  keywords:
    - id: Keyword_be_drivers_license_specific
      groups:
        - match_style: word
          terms:
            - rijbewijs
            - permis de conduire
            - Fuhrerschein
            - rijbewijsnummer
            - numéro de permis de conduire
            - driver's license number
            - drivers licence number
            - driving licence number
            - permis B
            - rijbewijs B
      strength: specific
    - id: Keyword_be_drivers_license_general
      groups:
        - match_style: word
          terms:
            - driver
            - licence
            - license
            - driving
            - text: DL
              case_sensitive: true
            - permis
            - rijbewijs
            - bestuurder
            - conducteur
      strength: domain
  filters:
    - id: Filter_be_drivers_license_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The Belgian licence detector matches a ten-digit number near driving-licence and civic-credential terminology. A true value may support vehicle-rental impersonation, false insurance enquiries, or linkage of one driver's records across administrative documents. The ten digits reveal no name, address, photograph, entitlement category, suspension status, or service credential, and generic account or reference numbers share the same shape. Risk 5 and OFFICIAL reflect that bounded single-identifier exposure; a licence image, infringement file, or named motor-registry record would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-belgium-drivers-license-number
    title: "Belgium driver's license number entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
