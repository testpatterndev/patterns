schema: testpattern/v1
name: Refinery process control setpoints
slug: au-top500-449-refinery-process-control-setpoints
version: 1.3.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to refinery process control setpoints in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:process\s+control|control\s+loop|refinery\s+operations|critical\s+infrastructure|process\s+controller|PID\s+controller|crude\s+processing|process\s+safety|alarm\s+setpoint)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - refinery process control setpoints
    - refinery
    - process
    - control
    - setpoints
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: process control
      description: Primary topic phrase match
    - value: control loop
      description: Case-insensitive topic phrase match
    - value: refinery operations
      description: Alternative topic phrase match
    - value: critical infrastructure
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: refinery setpoint
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to refinery process control setpoints appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_refinery_process_control
      matches:
        - ref: Evidence_refinery_process_control
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_refinery_process_control
      matches:
        - ref: Evidence_refinery_process_control
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_refinery_process_control
      matches:
        - ref: Evidence_refinery_process_control
  regexes:
    - id: Pattern_refinery_process_control
      pattern: (?is)\b(?:process\s+control|control\s+loop|refinery\s+operations|critical\s+infrastructure|process\s+controller|PID\s+controller|crude\s+processing|process\s+safety|alarm\s+setpoint)\b
  keywords:
    - id: Evidence_refinery_process_control
      groups:
        - match_style: word
          terms:
            - refinery
            - process control
            - setpoint
            - control loop
            - refinery operations
            - critical infrastructure
            - process controller
            - PID controller
            - distillation
            - crude processing
            - process safety
            - alarm setpoint
risk_description: >-
  The concept detector searches for refinery process-control, control-loop, operating-limit, and critical-infrastructure language, intending to identify setpoint-bearing control records rather than a generic refinery discussion. Accurate values can reveal safe operating envelopes and alarm behaviour, helping a knowledgeable attacker or insider select disruptive inputs against a particular process train. A match alone does not provide system access, and the medium-confidence regex can also find engineering standards or training documents. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. Current operating envelopes and alarm behaviour can guide catastrophic process interference, fire, explosion or major environmental release. Significant organisational and life-safety damage is inherent. Risk 10 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require refinery/unit identity plus actual limits, control loops, tags or alarm values; engineering standards remain excluded. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
