schema: testpattern/v1
name: Bail Condition Document
slug: bail-condition-document
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects bail condition documents including bail undertakings, surety arrangements, and conditions imposed on accused persons under the Bail Act 1980 (Qld). These documents contain personal details of accused persons, reporting obligations, curfew details, exclusion zones, and no-contact conditions.
operation: 'Keyword proximity: primary keywords (bail conditions, bail undertaking, surety, reporting conditions, curfew, exclusion zone, no-contact condition) within 300 characters of Bail Act references and accused person identifiers. Negative keyword exclusion for published bail statistics and law reform discussion.'
pattern: (?i)\b(bail\s+(?:conditions?|undertaking|order)|surety\s+(?:agreement|amount)|reporting\s+conditions?|curfew\s+(?:condition|hours)|exclusion\s+zone|no[\-\s]contact\s+(?:condition|order))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of bail-specific legal terminology with accused person details and Bail Act references. These terms in combination are distinctive to genuine bail documents and do not appear in published statistics or policy discussions.'
jurisdictions:
  - au
regulations:
  - qgiscf
  - bail-act-1980-qld
  - ppra-2000-qld
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - SENSITIVE
    - Legal
    - bail conditions
    - bail undertaking
    - surety
    - reporting conditions
    - curfew
    - exclusion zone
    - no-contact condition
    - Bail Act 1980
    - accused
    - watch house
    - recognisance
    - personal undertaking
  proximity: 300
  keyword_lists:
    - law-enforcement
    - government-services
test_cases:
  should_match:
    - value: 'SENSITIVE Legal. Bail Undertaking — Bail Act 1980 (Qld) s.11. Accused: [Name], DOB: 15/03/1988. Proceeding: MAG-2026-05123, Brisbane Magistrates Court. Bail Conditions: (1) Report to Fortitude Valley Police Station every Monday and Thursday by 4:00pm. (2) Curfew condition: remain at 14 Boundary Street, West End between 9:00pm and 6:00am. (3) No-contact condition: must not contact the complainant directly or indirectly. Surety: $5,000 deposited by [Name].'
      description: Bail undertaking with reporting conditions, curfew, and no-contact order
    - value: 'Queensland Magistrates Court — Bail Order. The accused [Name] is granted bail on the following conditions pursuant to the Bail Act 1980 s.11. Personal undertaking in the sum of $2,000. Reporting condition: attend Upper Mount Gravatt Police Station every Wednesday. Exclusion zone: must not enter within 200 metres of the premises at [Address], Capalaba. Surrender passport to the court registry. Next appearance: 4 April 2026.'
      description: Bail order with exclusion zone and passport surrender conditions
    - value: 'Bail Variation Application — s.17 Bail Act 1980. Current bail conditions for [Name], proceeding MAG-2026-03892. Application to vary curfew hours from 9pm-6am to 11pm-5am to accommodate shift work at registered employer. Prosecution does not oppose variation. Surety of $3,000 to remain in place. Reporting conditions unchanged — twice weekly at Ipswich Police Station.'
      description: Bail variation application seeking amendment to curfew conditions
  should_not_match:
    - value: The Queensland Sentencing Advisory Council published its annual bail statistics report showing that 78% of persons granted bail complied with all conditions during the reporting period.
      description: Published bail statistics from sentencing advisory body
    - value: The Queensland Law Reform Commission recommended amendments to the Bail Act 1980 to modernise reporting conditions and introduce electronic monitoring as an alternative to curfew conditions.
      description: Law reform discussion recommending Bail Act amendments
    - value: A criminal law textbook chapter on bail explains the principles in s.16 of the Bail Act 1980 (Qld) and the types of conditions that may be imposed, including curfew, reporting, and exclusion zone conditions.
      description: Legal textbook explaining bail law principles
false_positives:
  - description: Published bail statistics and annual reports from courts and advisory bodies
    mitigation: 'Negative keyword exclusion: ''annual report'', ''statistics'', ''published'', ''reporting period'', ''compliance rate'''
  - description: Law reform reports and parliamentary reviews of bail legislation
    mitigation: 'Negative keyword exclusion: ''law reform'', ''recommended amendments'', ''parliamentary'', ''inquiry'''
  - description: Criminal law textbooks explaining bail principles
    mitigation: 'Negative keyword exclusion: ''textbook'', ''academic'', ''chapter'', ''explains'', ''university'''
  - description: Blank bail form templates without accused person details
    mitigation: 'Require proximity to specific accused person details or proceeding numbers, not blank template fields.'
exports:
  - purview_xml
  - yaml
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: Bail condition terms with 2+ primary keywords plus accused details and Bail Act reference
    - tier: medium
      confidence: 75
      description: 2+ primary keywords with proceeding number or reporting condition details
    - tier: low
      confidence: 65
      description: 1 primary keyword with bail condition regex and corroborative terms
  regexes:
    - name: bail_condition_terms
      pattern: (?i)\b(bail\s+(?:conditions?|undertaking|order|variation)|surety\s+(?:agreement|amount)|reporting\s+conditions?|curfew\s+(?:condition|hours)|exclusion\s+zone|no[\-\s]contact\s+(?:condition|order))\b
    - name: bail_act_reference
      pattern: (?i)\bBail\s+Act\s+1980\b
    - name: bail_section_reference
      pattern: (?i)\bs\.\s?(?:11|16|17|29)\s+Bail\s+Act\b
  keywords:
    - name: primary_keywords
      words:
        - bail conditions
        - bail undertaking
        - bail order
        - bail variation
        - surety agreement
        - surety amount
        - reporting conditions
        - curfew condition
        - exclusion zone
        - no-contact condition
    - name: classification_markers
      words:
        - SENSITIVE
        - Legal
        - OFFICIAL
        - Bail Act 1980
        - Magistrates Court
        - personal undertaking
    - name: corroborative_terms
      words:
        - accused
        - recognisance
        - watch house
        - surrender passport
        - police station
        - next appearance
        - prosecution
        - personal undertaking
        - deposited
        - variation application
        - shift work
        - registered employer
    - name: negative_keywords
      words:
        - published
        - annual report
        - statistics
        - reporting period
        - compliance rate
        - law reform
        - recommended amendments
        - parliamentary
        - inquiry
        - textbook
        - academic
        - chapter
        - explains
        - university
  filters:
    - type: exclude
      description: Exclude published statistics, law reform reports, and academic materials
      keywords:
        - annual report
        - statistics
        - published
        - law reform
        - recommended amendments
        - parliamentary
        - textbook
        - academic
        - university
risk_rating: 7
risk_description: Bail documents contain accused person details, addresses, curfew times, exclusion zones, and no-contact conditions. Disclosure could enable contact with complainants in breach of conditions or reveal the identity of accused persons before trial. Inappropriate release could compromise proceedings, endanger individuals, or undermine enforcement activities.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-03-06'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
