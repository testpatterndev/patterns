schema: testpattern/v1
name: Mexico Passport Number
slug: mx-passport-number
version: 1.2.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Mexican passport numbers issued by the Secretaría de Relaciones Exteriores (SRE). Older passports use a
  single letter followed by 7-8 digits; newer books carry an 8-9 character alphanumeric serial. Mixed alphanumeric
  serials are broad candidates that also match order IDs, booking codes, and product serials — they are not treated
  as Mexican passport numbers without issuer or passport-document evidence. Because the format is short and loosely
  structured, corroborative keyword proximity is strongly recommended to reduce false positives.
operation: >-
  Reference: https://en.wikipedia.org/wiki/Mexican_passport
  Matches a single letter followed by 7-8 digits, or an 8-9 character alphanumeric serial containing at least one
  letter and one digit. Corroborative evidence: keywords within 300 characters. Purview tiers: both serial shapes are
  discovery-only at 65; enforcement at 75 requires Mexico/passport context, with the mixed modern serial requiring an
  explicit SRE or labelled passport cue (travel-document prose alone does not enforce it).
pattern: (?<![A-Za-z0-9])(?:[A-Za-z][0-9]{7,8}|(?=[A-Za-z0-9]*[A-Za-z])(?=[A-Za-z0-9]*[0-9])[A-Za-z0-9]{8,9})(?![A-Za-z0-9])
confidence: medium
confidence_justification: >-
  Medium confidence: the alphanumeric body is only 8-9 characters and lacks a fixed prefix, so the pattern can match
  unrelated reference codes and serial numbers. Corroborative passport keywords within 300 characters are essential
  for reliable detection.
jurisdictions:
  - mx
regulations:
  - "LFPDPPP"
  - "CCPA/CPRA"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - passport number
    - pasaporte
    - número de pasaporte
    - mexican passport
    - travel document
    - SRE
    - Relaciones Exteriores
  proximity: 300
test_cases:
  should_match:
    - value: G20693408
      description: Older Mexican passport, letter + 8 digits
    - value: 'Pasaporte: J0000001'
      description: Older format, letter + 7 digits, labelled in Spanish
    - value: 12AB3456C
      description: Newer 9-character alphanumeric passport serial
  should_not_match:
    - value: '123456789'
      description: All-digit string with no letter is not a Mexican passport serial
    - value: ABCDEFGHI
      description: All-letter string with no digit is not a Mexican passport serial
    - value: traiga su pasaporte mexicano vigente a la cita
      description: Prose mention of a Mexican passport without an actual number
    - value: SRE passport 123456789
      description: All-digit token fails the Mexican serial model even under an SRE/passport label
false_positives:
  - description: Alphanumeric reference codes, order IDs and serial numbers of 8-9 characters that mix letters and digits.
    mitigation: Require corroborative passport keywords (passport, pasaporte, SRE) within 300 characters.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_mx_passport_legacy
      matches:
        - ref: Keyword_mx_passport_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_mx_passport_modern
      matches:
        - ref: Keyword_mx_passport_labelled_cue
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_mx_passport_legacy
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_mx_passport_modern
  regexes:
    - id: Regex_mx_passport_legacy
      pattern: (?<![A-Za-z0-9])[A-Za-z][0-9]{7,8}(?![A-Za-z0-9])
    - id: Regex_mx_passport_modern
      pattern: (?<![A-Za-z0-9])(?=[A-Za-z0-9]{8,9}(?![A-Za-z0-9]))(?=[A-Za-z0-9]*[A-Za-z])(?=[A-Za-z0-9]*[0-9])[A-Za-z0-9]{8,9}(?![A-Za-z0-9])
  keywords:
    - id: Keyword_mx_passport_context
      groups:
        - match_style: word
          terms:
            - pasaporte
            - numero de pasaporte
            - número de pasaporte
            - Mexican passport
            - text: SRE
              case_sensitive: true
            - Secretaria de Relaciones Exteriores
            - Secretaría de Relaciones Exteriores
            - passport number
            - travel document
      strength: specific
    - id: Keyword_mx_passport_labelled_cue
      groups:
        - match_style: word
          terms:
            - pasaporte
            - numero de pasaporte
            - número de pasaporte
            - Mexican passport
            - text: SRE
              case_sensitive: true
            - Secretaria de Relaciones Exteriores
            - Secretaría de Relaciones Exteriores
            - passport number
      strength: specific
risk_description: >-
  The Mexican passport SIT covers older one-letter plus seven- or eight-digit numbers and newer mixed alphanumeric serials of eight or nine characters, with passport evidence; it is not a passport image or SRE record. Disclosure might aid a visa, airline, or identity-verification pretext after the traveller's biographical details are obtained elsewhere. One ordinary match concerns one holder, while the newer loosely structured branch overlaps order IDs, booking codes, and product serials. Risk 5 and OFFICIAL recognise the bounded identifier harm; SENSITIVE would require document contents, credentials, or a linked travel and identity profile.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
