schema: testpattern/v1
name: Plaintext passwords
slug: au-top500-261-plaintext-passwords
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies plaintext passwords patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: credentials.'
pattern: \bplaintext\s+passwords\b
confidence: low
confidence_justification: 'Low confidence marker: phrase-based artifact detection to bootstrap line-by-line coverage. Requires corroborative evidence and later hardening to high-confidence structural patterns.'
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - plaintext passwords
    - plaintext
    - passwords
    - credentials
    - keys
    - secrets
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: 'Plaintext passwords'
      description: Topic phrase present
    - value: 'plaintext passwords'
      description: Topic phrase, lowercase
    - value: 'this record references the plaintext passwords held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_plaintext_passwords
      matches:
        - ref: Evidence_plaintext_passwords
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_plaintext_passwords
      matches:
        - ref: Evidence_plaintext_passwords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_plaintext_passwords
      matches:
        - ref: Evidence_plaintext_passwords
  regexes:
    - id: Pattern_plaintext_passwords
      pattern: \bplaintext\s+passwords\b
  keywords:
    - id: Evidence_plaintext_passwords
      groups:
        - match_style: word
          terms:
            - plaintext passwords
            - plaintext
            - passwords
            - credentials
            - cleartext
            - unencrypted
            - password file
            - credential store
            - password list
            - exposed credentials
            - password dump
risk_description: >-
  This low-confidence concept rule finds the phrase plaintext passwords in credential context; it does not parse or validate an actual password value. If the surrounding record truly contains readable passwords, a recipient can attempt direct sign-in or credential reuse against the associated accounts and services. The affected users and system owners may face serious account compromise, but misuse requires the actual values, account identifiers, a target service, and credentials that remain valid. Risk 8 and SENSITIVE are defensible for a record containing one or more live plaintext passwords, while a privileged or bulk credential holding would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
