schema: testpattern/v1
name: Domain registrar credentials
slug: au-top500-313-domain-registrar-credentials
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies domain registrar credentials patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: credentials.'
pattern: (?is)\b(?:domain\s+registrar|registrar\s+credentials|domain\s+login|domain\s+transfer|EPP\s+code|auth\s+code|DNS\s+hosting|domain\s+management|registrar\s+account|domain\s+renewal|nameserver\s+credentials)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "Criminal Code Act 1995 (Cth)"
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - domain registrar credentials
    - domain
    - registrar
    - credentials
    - operations
    - resilience
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: domain registrar
      description: Primary topic phrase match
    - value: registrar credentials
      description: Case-insensitive topic phrase match
    - value: domain login
      description: Alternative topic phrase match
    - value: domain transfer
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_domain_registrar
      matches:
        - ref: Evidence_domain_registrar
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_domain_registrar
      matches:
        - ref: Evidence_domain_registrar
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_domain_registrar
      matches:
        - ref: Evidence_domain_registrar
  regexes:
    - id: Pattern_domain_registrar
      pattern: (?is)\b(?:domain\s+registrar|registrar\s+credentials|domain\s+login|domain\s+transfer|EPP\s+code|auth\s+code|DNS\s+hosting|domain\s+management|registrar\s+account|domain\s+renewal|nameserver\s+credentials)\b
  keywords:
    - id: Evidence_domain_registrar
      groups:
        - match_style: word
          terms:
            - domain registrar
            - registrar credentials
            - domain login
            - WHOIS
            - domain transfer
            - EPP code
            - auth code
            - DNS hosting
            - domain management
            - registrar account
            - domain renewal
            - nameserver credentials
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
