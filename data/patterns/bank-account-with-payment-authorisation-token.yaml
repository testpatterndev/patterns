schema: testpattern/v1
name: Bank Account with Payment Authorisation Token
slug: bank-account-with-payment-authorisation-token
version: 1.1.1
type: regex
engine: universal
description: Detects government bank account details (BSB + account number) combined with payment authorisation credentials, approval tokens, or signing authorities that together enable the initiation of payments.
operation: Regex for BSB format within 300 characters of account number pattern and authorisation/approval context keywords. High confidence when PROTECTED header present. Distinguished from routine BSB+account (SENS_Fin) by requiring authorisation/signing context.
pattern: \b\d{3}-?\d{3}\b
confidence: high
confidence_justification: 'High confidence: BSB + account number + payment authorisation credentials is a highly specific combination. The requirement for authorisation context (not just banking details) distinguishes this from routine SENS_Fin BSB detection.'
jurisdictions:
  - au
regulations:
- "Financial Accountability Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - authorisation
    - authorised
    - approval
    - approved
    - signing authority
    - payment token
    - EFT
    - batch payment
    - BECS
    - direct entry
    - ABA file
    - payment instruction
    - bank account
    - BSB
  proximity: 300
  keyword_lists:

    - corporate-finance

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED — Payment Authorisation File. BSB: 064-000, Account: 12345678. Payment token: AUTH-2026-00451. Authorised signatory: J. Smith (Delegate Level 3). Batch payment approved for $2,450,000 via BECS direct entry. Released for processing.'
      description: Payment authorisation with BSB, account, and approval token
    - value: 'EFT Payment Instruction — PROTECTED. Account BSB 084-004 Account No 98765432. Signing authority: Dual authorisation required. First approver: A. Jones (approved). Second approver: B. Williams (approved). Payment amount: $890,000. ABA file generated.'
      description: Dual-authorised payment with BSB and signing authority
    - value: 'PROTECTED — Batch payment authorisation. BSB: 032-001, Account: 45678901. Authorised signatory: K. Brown (Delegate Level 4). Payment token: AUTH-2026-00872. Released for processing via BECS direct entry.'
      description: Batch payment with BSB, account, and approval token
  should_not_match:
    - value: 'Please update your bank details for salary payments. BSB: ___ Account: ___. Submit to HR with a void cheque or bank statement.'
      description: Blank bank details form — no authorisation context
    - value: 'Supplier registration: Company ABC Pty Ltd. Please provide your bank details on the attached form for accounts payable setup. No banking numbers recorded yet.'
      description: Routine supplier onboarding prose with no BSB, account, or token values
false_positives:
  - description: Routine bank detail collection forms for HR or accounts payable
    mitigation: Require authorisation/approval context (not just BSB + account) to distinguish from SENS_Fin patterns
  - description: Published banking details for government payment receipt (e.g., fine payments)
    mitigation: Exclude documents containing 'pay your', 'payment to government', 'revenue account' indicating inbound payments
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_bank_account_with_payment_authorisation_token_bsb_format_e_g_064_000_or_064000
      matches:
        - ref: Evidence_bank_account_with_payment_authorisation_token_primary
        - ref: Evidence_bank_account_with_payment_authorisation_token_authorisation
        - ref: Evidence_bank_account_with_payment_authorisation_token_payment_methods
        - ref: Evidence_bank_account_with_payment_authorisation_token_markers
        - ref: Pattern_bank_account_with_payment_authorisation_token_bank_account_number_6_10_digits
        - ref: Pattern_bank_account_with_payment_authorisation_token_payment_authorisation_token_format
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_bank_account_with_payment_authorisation_token_exclusion
    - confidence_level: 75
      id_match: Pattern_bank_account_with_payment_authorisation_token_bsb_format_e_g_064_000_or_064000
      matches:
        - ref: Evidence_bank_account_with_payment_authorisation_token_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_bank_account_with_payment_authorisation_token_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_bank_account_with_payment_authorisation_token_bsb_format_e_g_064_000_or_064000
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_bank_account_with_payment_authorisation_token_exclusion
  regexes:
    - id: Pattern_bank_account_with_payment_authorisation_token_bsb_format_e_g_064_000_or_064000
      pattern: \b\d{3}-?\d{3}\b
    - id: Pattern_bank_account_with_payment_authorisation_token_bank_account_number_6_10_digits
      pattern: \b\d{6,10}\b
    - id: Pattern_bank_account_with_payment_authorisation_token_payment_authorisation_token_format
      pattern: AUTH-\d{4}-\d{4,6}
  keywords:
    - id: Evidence_bank_account_with_payment_authorisation_token_primary
      groups:
        - match_style: word
          terms:
            - text: BSB
              case_sensitive: true
            - bank account
            - account number
            - payment
      strength: domain
    - id: Evidence_bank_account_with_payment_authorisation_token_authorisation
      groups:
        - match_style: word
          terms:
            - authorisation
            - authorised
            - approval
            - approved
            - signing authority
            - payment token
            - signatory
            - delegate
      strength: domain
    - id: Evidence_bank_account_with_payment_authorisation_token_payment_methods
      groups:
        - match_style: word
          terms:
            - text: EFT
              case_sensitive: true
            - batch payment
            - BECS
            - direct entry
            - ABA file
            - payment instruction
            - released for processing
      strength: specific
    - id: Evidence_bank_account_with_payment_authorisation_token_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - confidential
            - restricted
            - dual authorisation
      strength: domain
    - id: Filter_bank_account_with_payment_authorisation_token_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - please provide
            - update your bank details
            - pay your
            - payment to government
            - supplier registration form

      strength: noise
  filters:
    - id: Guard_bank_account_with_payment_authorisation_token_same_digits
      type: AllDigitsSameFilter
risk_rating: 8
risk_description: Government bank account details combined with payment authorisation credentials that together enable initiation of payments; disclosure causes direct financial loss. Legislative review (Mar 2026) established BIL:2 — Financial Accountability Act 2009 (Qld) contains no secrecy provisions or criminal penalties. No specific statutory mandate for PROTECTED classification of this document type. Operational sensitivity managed through access controls and existing financial accountability frameworks.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Financial"
references: []
created: '2026-02-20'
updated: '2026-07-06'
changelog:
  - version: 1.1.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — primary regex accepted all-zeros/same-digit BSB values (e.g. 000-000); mirrors au-medicare-card-identifier protection.
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
author: qld-gov-dlp
source: qld-custom
