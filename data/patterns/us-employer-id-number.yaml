schema: testpattern/v1
name: Employer Identification Number
slug: us-employer-id-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: Detects Employer Identification Number patterns.
operation: >-
  Reference: https://www.irs.gov/businesses/small-businesses-self-employed/how-eins-are-assigned-and-valid-ein-prefixes
  Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials, financial-transaction.
pattern: \b(0[1-6]|1[0-6]|2[0-7]|3[0-9]|4[0-8]|5[0-9]|6[0-8]|7[1-7]|8[1-8]|9[0-5]|9[89])-?\d{7}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - us
regulations:
- "CCPA/CPRA"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials

    - financial-transaction
test_cases:
  should_match:
    - value: 12-3456789
      description: Standard EIN with hyphen
    - value: '123456789'
      description: EIN without hyphen
    - value: 01-0000001
      description: Low-range EIN
  should_not_match:
    - value: '00-1234567'
      description: Invalid prefix (00 not in valid EIN prefix range)
    - value: '07-1234567'
      description: Invalid prefix (07 not in valid EIN prefix range)
    - value: '12-123456'
      description: Only 6 digits after prefix instead of 7
false_positives:
  - description: >-
      Common words and phrases related to employer identification number appearing in policy documents, training
      materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than
      general discussion.
  - description: >-
      In American English, similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_us_ein
      matches:
        - ref: Keyword_us_ein_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_us_ein
      matches:
        - ref: Keyword_us_ein_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_us_ein
  regexes:
    - id: Regex_us_ein
      pattern: \b(0[1-6]|1[0-6]|2[0-7]|3[0-9]|4[0-8]|5[0-9]|6[0-8]|7[1-7]|8[1-8]|9[0-5]|9[89])-?\d{7}\b
  keywords:
    - id: Keyword_us_ein_specific
      groups:
        - match_style: word
          terms:
            - employer identification number
            - text: EIN
              case_sensitive: true
            - employer ID
            - federal tax ID
            - federal identification
            - tax identification number
            - text: TIN
              case_sensitive: true
            - employer number
      strength: specific
    - id: Keyword_us_ein_broad
      groups:
        - match_style: word
          terms:
            - text: IRS
              case_sensitive: true
            - text: W-9
              case_sensitive: true
            - text: W-2
              case_sensitive: true
            - tax
            - employer
            - business tax
            - corporate tax
            - 1099
      strength: domain
  filters:
    - id: Filter_us_ein_same_digits
      type: AllDigitsSameFilter
risk_description: >-
  A U.S. Employer Identification Number match is a nine-digit federal tax identifier for a business or other employer, commonly written as two digits followed by seven. It can be copied into fraudulent company or supplier paperwork, but the value is organisation-level tax metadata and does not provide control of the employer's IRS or bank accounts. The normal impact concerns one entity and meaningful fraud needs corporate, contact, payment, or authentication details. Risk 5 and OFFICIAL reflect bounded business risk; confidential payroll, tax filings, or transaction authority would raise the classification.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
