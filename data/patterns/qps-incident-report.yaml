schema: testpattern/v1
name: QPS Incident Report
slug: qps-incident-report
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects Queensland Police Service (QPS) incident reports containing operational details about reported offences, informant information, and occurrence records. These are non-covert operational documents that are sensitive due to informant and victim details but do not involve covert methodology or life-safety risks.
operation: 'Keyword proximity: primary keywords (incident report, QPS, occurrence number, reporting officer, informant, offence code, QPRIME) within 300 characters of QPS reference formats (QP-YYYY-NNNNNNN, OCC-NNNNNNN) and classification markers. Negative keyword exclusion for published statistics, annual reports, and media releases.'
pattern: (?i)\b(QPS\s+incident\s+report|occurrence\s+(?:number|report)|reporting\s+officer|offence\s+code|QPRIME\s+(?:entry|reference|record)|QP-\d{4}-\d{5,7}|OCC-\d{5,7})\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of QPS-specific incident reporting terminology with reference number formats that are unique to Queensland Police operational systems. These terms rarely appear together outside genuine incident reports.'
jurisdictions:
  - au
regulations:
- "PPRA 2000 (Qld)"
- "Police Service Admin Act 1990 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - SENSITIVE
    - Law-Enforcement
    - QPS
    - Queensland Police Service
    - incident report
    - occurrence number
    - reporting officer
    - QPRIME
    - offence code
    - informant
    - complainant
    - person of interest
    - attending officer
    - patrol group
  proximity: 300
  keyword_lists:
    - law-enforcement
    - government-services
test_cases:
  should_match:
    - value: 'SENSITIVE Law-Enforcement. QPS Incident Report. Occurrence Number: OCC-0458723. Reporting Officer: Sgt M. Thompson, Badge 14892, Fortitude Valley Patrol Group. Date of Occurrence: 14 February 2026. Offence Code: 0711 — Assault Occasioning Bodily Harm. Informant: Ms J. Williams attended Fortitude Valley station at 2245hrs. QPRIME entry created.'
      description: QPS incident report with occurrence number, reporting officer details, and QPRIME reference
    - value: 'Queensland Police Service — QPRIME Record. Reference: QP-2026-0034521. Incident Classification: Break and Enter — Dwelling. Location: 42 Boundary Street, West End QLD 4101. Attending Officers: Const. A. Chen (Badge 22104), Const. R. Patel (Badge 22356). Complainant provided statutory declaration. Forensic examination requested. Offence code 0521 recorded.'
      description: QPRIME record with QP reference number and forensic request
    - value: 'QPS Occurrence Report — OCC-0612984. Traffic incident involving pedestrian at intersection of George and Elizabeth Streets, Brisbane CBD. Reporting officer Senior Constable D. Murray, South Brisbane District. Informant transported to RBWH. Witness statements obtained from three bystanders. Person of interest identified via CCTV. QPRIME updated.'
      description: Traffic incident occurrence report with witness and person of interest details
  should_not_match:
    - value: The Queensland Police Service Annual Statistical Review 2024-25 reported 285,432 offences across the state, a 3.2% decrease from the previous year. Assault offences decreased by 4.1% statewide.
      description: Published QPS crime statistics annual report
    - value: 'QPS Media Release: Police have charged a 34-year-old man following an investigation into an alleged assault at Surfers Paradise on Saturday night. He will appear in Southport Magistrates Court on Monday.'
      description: QPS media release about a charged person
    - value: A crime fiction novel described how Detective Inspector Blake filed the occurrence report into the QPRIME system and assigned the case to the Fortitude Valley CIB.
      description: Crime fiction novel referencing police systems
false_positives:
  - description: Published QPS annual statistical reviews and crime reports
    mitigation: 'Negative keyword exclusion: ''annual report'', ''statistical review'', ''published''. Require proximity to specific occurrence numbers.'
  - description: QPS media releases about charged persons and completed investigations
    mitigation: 'Negative keyword exclusion: ''media release'', ''charged'', ''will appear in court'', ''sentenced'''
  - description: Crime fiction and television scripts referencing police terminology
    mitigation: 'Negative keyword exclusion: ''novel'', ''fiction'', ''screenplay'', ''episode'''
  - description: Police training manuals and academy materials
    mitigation: 'Negative keyword exclusion: ''training manual'', ''academy'', ''exercise'', ''scenario'''
exports:
  - purview_xml
  - yaml
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: QPS reference number regex match with 2+ primary keywords and classification markers
    - tier: medium
      confidence: 75
      description: 2+ primary keywords with occurrence number or QPRIME reference within 300 characters
    - tier: low
      confidence: 65
      description: 1 primary keyword with QPS reference number regex match
  regexes:
    - name: qps_reference_number
      pattern: \bQP-\d{4}-\d{5,7}\b
    - name: occurrence_number
      pattern: \bOCC-\d{5,7}\b
    - name: incident_report_terms
      pattern: (?i)\b(QPS\s+incident\s+report|occurrence\s+(?:number|report)|reporting\s+officer|offence\s+code|QPRIME\s+(?:entry|reference|record))\b
  keywords:
    - name: primary_keywords
      words:
        - incident report
        - occurrence number
        - occurrence report
        - reporting officer
        - attending officer
        - offence code
        - QPRIME entry
        - QPRIME reference
        - QPRIME record
        - QPS incident
    - name: classification_markers
      words:
        - SENSITIVE
        - Law-Enforcement
        - OFFICIAL
        - Queensland Police Service
        - QPS
    - name: corroborative_terms
      words:
        - informant
        - complainant
        - person of interest
        - witness statement
        - patrol group
        - badge number
        - forensic examination
        - statutory declaration
        - attending officers
        - district office
        - police station
        - CCTV
    - name: negative_keywords
      words:
        - media release
        - published
        - annual report
        - statistical review
        - charged
        - will appear in court
        - sentenced
        - convicted
        - novel
        - fiction
        - screenplay
        - training manual
        - academy
        - exercise
  filters:
    - type: exclude
      description: Exclude published statistics, media releases, fiction, and training materials
      keywords:
        - annual report
        - statistical review
        - media release
        - published
        - novel
        - fiction
        - training manual
        - academy
risk_rating: 7
risk_description: QPS incident reports contain informant details, complainant identities, witness information, and person of interest data. Disclosure could compromise ongoing investigations and expose victims, but these are operational (non-covert) documents without life-safety implications. Inappropriate release could compromise proceedings, endanger individuals, or undermine enforcement activities.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-03-06'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
