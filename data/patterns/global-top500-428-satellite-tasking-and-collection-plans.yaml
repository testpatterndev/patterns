  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_satellite_tasking_collection
      matches:
        - ref: Pattern_global_top500_428_satellite_tasking_and_collection_plans_label_context
        - ref: Keyword_global_top500_428_satellite_tasking_and_collection_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_428_satellite_tasking_and_collection_plans_noise_exclusion
    - confidence_level: 75
      id_match: Regex_satellite_tasking_collection
      matches:
        - ref: Keyword_satellite_tasking_collection
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_428_satellite_tasking_and_collection_plans_noise_exclusion
    - confidence_level: 65
      id_match: Regex_satellite_tasking_collection
      matches:
        - ref: Keyword_satellite_tasking_collection
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_428_satellite_tasking_and_collection_plans_noise_exclusion
  regexes:
    - id: Regex_satellite_tasking_collection
      pattern: (?is)\b(?:satellite\s+tasking|collection\s+plan|orbital\s+pass|reconnaissance\s+satellite|imagery\s+collection|overhead\s+collection|satellite\s+schedule|revisit\s+rate|collection\s+requirement|tasking\s+order|national\s+technical\s+means|space[\s-]+based\s+surveillance)\b
    - id: Pattern_global_top500_428_satellite_tasking_and_collection_plans_label_context
      pattern: (?i)\\b(?:satellite\\s+tasking\\s+and\\s+collection\\s+plans|satellite|tasking|collection|plans|top500)\\b
  keywords:
