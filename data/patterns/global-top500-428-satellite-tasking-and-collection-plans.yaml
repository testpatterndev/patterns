schema: testpattern/v1
name: Satellite tasking and collection plans
slug: global-top500-428-satellite-tasking-and-collection-plans
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to satellite tasking and collection plans in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:satellite\s+tasking|collection\s+plan|orbital\s+pass|reconnaissance\s+satellite|imagery\s+collection|overhead\s+collection|satellite\s+schedule|revisit\s+rate|collection\s+requirement|tasking\s+order|national\s+technical\s+means|space[\s-]+based\s+surveillance)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - satellite tasking and collection plans
  proximity: 240
test_cases:
  should_match:
    - value: satellite tasking
      description: Primary topic phrase match
    - value: collection plan
      description: Case-insensitive topic phrase match
    - value: orbital pass
      description: Alternative topic phrase match
    - value: reconnaissance satellite
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to satellite tasking and collection plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_satellite_tasking_collection
      matches:
        - ref: Pattern_global_top500_428_satellite_tasking_and_collection_plans_label_context
        - ref: Keyword_global_top500_428_satellite_tasking_and_collection_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_satellite_tasking_collection
      matches:
        - ref: Keyword_satellite_tasking_collection
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_satellite_tasking_collection
      pattern: >-
        (?is)\b(?:satellite\s+tasking|collection\s+plan|orbital\s+pass|reconnaissance\s+satellite|imagery\s+collection|overhead\s+collection|satellite\s+schedule|revisit\s+rate|collection\s+requirement|tasking\s+order|national\s+technical\s+means|space[\s-]+based\s+surveillance)\b
    - id: Pattern_global_top500_428_satellite_tasking_and_collection_plans_label_context
      pattern: (?i)\b(?:satellite\s+tasking\s+and\s+collection\s+plans)\b
  keywords:
    - id: Keyword_satellite_tasking_collection
      groups:
        - match_style: word
          terms:
            - satellite tasking
            - collection plan
            - orbital pass
            - reconnaissance satellite
            - imagery collection
            - overhead collection
            - satellite schedule
            - revisit rate
            - collection requirement
            - tasking order
            - national technical means
            - space-based surveillance
      strength: specific
    - id: Keyword_global_top500_428_satellite_tasking_and_collection_plans_domain_context
      groups:
        - match_style: word
          terms:
            - satellite tasking and collection plans
            - satellite
            - tasking
            - collection
            - plans
      strength: domain
risk_description: >-
  The regex identifies satellite tasking, collection plans, orbital-pass material, and reconnaissance-satellite records with nearby government context. A genuine plan can reveal target priorities, collection windows, sensor allocation, and coverage gaps, allowing an adversary to conceal activity or frustrate observation. The normal plan has serious operational value, but a contextual phrase match does not establish unique sensor capabilities, live strategic targets, or a complete schedule. For the global catalogue analogue, the confirmed substantive record is the consequence unit. Current tasking reveals targets, sensor use, collection windows, coverage gaps and partner dependencies. An adversary can conceal activity or interfere, causing significant strategic capability damage. Risk 9 and PROTECTED Government therefore apply to the confirmed record itself. Require current tasking windows, sensor/orbit/target fields or classified caveats; public mission schedules and research planning remain audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
