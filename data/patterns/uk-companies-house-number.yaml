schema: testpattern/v1
name: UK Companies House Company Number
slug: uk-companies-house-number
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Detects UK Companies House company registration numbers (CRNs). A company number is always 8
  characters: either 8 digits (England & Wales incorporations), a 2-letter jurisdiction/entity-type
  prefix followed by 6 digits (e.g. SC Scottish company, NI Northern Ireland company, OC/SO/NC LLPs,
  RC/SR/NR royal-charter bodies, FC overseas companies, OE overseas entities), or R + 7 digits
  (pre-partition Northern Ireland companies, registered as the R0 prefix). The prefix allow-list is
  taken from the Companies House Uniform Resource Identifiers (URI) Customer Guide plus the
  post-2011 additions CE/CS (charitable incorporated organisations), SG (Scottish qualifying
  partnerships), OE (Register of Overseas Entities, 2022), RS (registered societies, e.g. the live
  entry RS008375) and FE (further education / sixth form college corporations). Bare 8-digit runs
  collide heavily with invoice, order and account numbers, so the all-numeric form is only ever
  matched when directly attached to a company-number label; the more distinctive prefixed form
  additionally gets a keyword-gated tier without a directly-attached label. Two allow-list prefixes
  are excluded from that bare prefixed form because they collide with common document-number
  abbreviations — NO ("INVOICE NO123456") and SO (ERP sales-order numbers such as SO123456) — and
  are matched only via the label-attached regex.
operation: >-
  Validation: none — Companies House numbers are sequential allocations with no check digit, so no
  checksum validator exists. Reference: Companies House URI Customer Guide (List of Company Numbers
  and Prefixes). Detection is label-embedded regex (Regex_uk_companies_house_labelled) for all
  forms, plus a prefix-allow-list structural regex (Regex_uk_companies_house_prefixed) that is only
  exported behind Companies House keyword evidence. AllDigitsSameFilter guards the all-numeric form
  against sentinel values such as 11111111. Corroborative evidence: keywords within 300 characters.
pattern: '(?i)\b(?:company\s+(?:registration\s+|reg(?:istration)?\.?\s+)?(?:number|no\.?)|(?:companies\s+house|registered)\s+(?:company\s+)?(?:number|no\.?)|companies\s+house\s+registration|incorporation\s+number|CRN)\s{0,3}[:#.-]{0,3}\s{0,3}(?:(?:AC|CE|CS|EN|ES|FC|FE|GE|GN|GS|IC|IP|LP|NA|NC|NF|NI|NL|NO|NP|NR|NV|NZ|OC|OE|RC|RS|SA|SC|SE|SF|SG|SI|SL|SO|SP|SR|SZ|ZC)\d{6}|R\d{7}|\d{8})(?![A-Za-z0-9])'
confidence: medium
confidence_justification: >-
  Medium confidence: the 8-character structure is rigid and the prefix allow-list is verified
  against Companies House documentation, but there is no check digit, and the all-numeric form is
  indistinguishable from any other 8-digit reference without its label. Every exported tier is
  evidence-gated — the all-numeric form requires a directly-attached company-number label
  (label-embedded-in-regex counts as label gating per the D1 decision record), and the bare prefixed
  form additionally requires Companies House keywords in proximity. The bare prefixed form also
  drops the collision-prone NO and SO prefixes (document-number abbreviations that appear near
  generic keywords like "registered office" in UK letter footers); those two prefixes are covered
  only when label-attached. There is deliberately no bare unlabelled tier.
jurisdictions:
  - uk
regulations:
  - Companies Act 2006
  - UK GDPR
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - business-identifier
corroborative_evidence:
  keywords:
    - Companies House
    - company registration number
    - company number
    - CRN
    - certificate of incorporation
    - registered office
    - registered in England and Wales
  proximity: 300
  keyword_lists:
    - data-record-context
test_cases:
  should_match:
    - value: 'Company registration number: 04352950'
      description: Labelled all-numeric England & Wales company number
    - value: Company No. SC123456
      description: Labelled Scottish company number with SC prefix
    - value: 'CRN: OC334521'
      description: CRN-labelled England & Wales LLP number with OC prefix
    - value: 'Registered number 12345678'
      description: Registered-number label with 8-digit company number
    - value: 'Companies House number NI070546'
      description: Companies House label with Northern Ireland prefix
    - value: 'Incorporation number: R0123456'
      description: Pre-partition Northern Ireland company number (R0 prefix, R + 7 digits)
    - value: OE000123
      description: Bare Register of Overseas Entities number (prefixed structural regex, keyword-gated tier)
    - value: RS008375
      description: Bare registered-society number — live Companies House entry (Nurture Housing Association Limited), RS prefix
  should_not_match:
    - value: 'Invoice number: 12345678'
      description: 8-digit run attached to a non-company label — the all-numeric form is label-gated
    - value: 'Company number: 1234567'
      description: Only 7 digits, too short for a company number
    - value: 'Company number: 123456789'
      description: 9 digits — the trailing alphanumeric guard rejects longer digit runs
    - value: 'Company number: AB123456'
      description: AB is not a Companies House prefix — fails the verified prefix allow-list
    - value: INVOICE NO123456
      description: NO as the "number" abbreviation in an invoice header — NO is excluded from the bare prefixed regex and only matched label-attached
    - value: SALES ORDER SO123456
      description: SO as an ERP sales-order document prefix — SO is excluded from the bare prefixed regex and only matched label-attached
false_positives:
  - description: >-
      Unlabelled 8-digit sequences (invoices, order numbers, phone fragments) share the all-numeric
      company number shape exactly, and sentinel values such as 11111111 or 00000000 satisfy it too.
    mitigation: >-
      The all-numeric form is only matched when directly attached to a company-number label;
      AllDigitsSameFilter drops repeated-digit sentinels. There is no bare unlabelled tier.
  - description: >-
      Two-letter + 6-digit codes from other schemes (ticket references, product SKUs, non-UK
      registries) can coincide with the prefixed form, e.g. SC/NI also appear in unrelated codes.
    mitigation: >-
      The prefixed structural regex is restricted to the verified Companies House prefix allow-list
      and is only exported behind Companies House keyword evidence within the proximity window.
      In the exported SIT the prefix match is case-sensitive (prefixes are always upper case).
      NO and SO are additionally removed from the bare prefixed regex — NO is the ubiquitous
      "number" abbreviation (INVOICE NO123456, ACCOUNT NO123456) and SO is a common ERP sales-order
      document prefix, both of which co-occur with footer keywords such as "registered office" —
      so those two prefixes match only in the label-attached form.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_uk_companies_house_labelled
      matches:
        - ref: Keyword_uk_companies_house
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_uk_companies_house_labelled
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_uk_companies_house_prefixed
      matches:
        - ref: Keyword_uk_companies_house
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_uk_companies_house_labelled
      pattern: '(?i)\b(?:company\s+(?:registration\s+|reg(?:istration)?\.?\s+)?(?:number|no\.?)|(?:companies\s+house|registered)\s+(?:company\s+)?(?:number|no\.?)|companies\s+house\s+registration|incorporation\s+number|CRN)\s{0,3}[:#.-]{0,3}\s{0,3}(?:(?:AC|CE|CS|EN|ES|FC|FE|GE|GN|GS|IC|IP|LP|NA|NC|NF|NI|NL|NO|NP|NR|NV|NZ|OC|OE|RC|RS|SA|SC|SE|SF|SG|SI|SL|SO|SP|SR|SZ|ZC)\d{6}|R\d{7}|\d{8})(?![A-Za-z0-9])'
    - id: Regex_uk_companies_house_prefixed
      pattern: '(?<![A-Za-z0-9])(?:AC|CE|CS|EN|ES|FC|FE|GE|GN|GS|IC|IP|LP|NA|NC|NF|NI|NL|NP|NR|NV|NZ|OC|OE|RC|RS|SA|SC|SE|SF|SG|SI|SL|SP|SR|SZ|ZC)\d{6}(?![A-Za-z0-9])'
  keywords:
    - id: Keyword_uk_companies_house
      groups:
        - match_style: word
          terms:
            - Companies House
            - company registration number
            - company number
            - text: CRN
              case_sensitive: true
            - certificate of incorporation
            - incorporated under the Companies Act
            - registered in England and Wales
            - registered in Scotland
            - registered in Northern Ireland
            - registered office
            - company no
            - limited liability partnership
      strength: specific
  filters:
    - id: Filter_uk_companies_house_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  Company registration numbers are public identifiers, but their exposure alongside other business
  records enables corporate identity fraud, fraudulent filings, and linkage of related business
  documents in a data breach.
sensitivity_labels:
  pspf: "OFFICIAL"
  qgiscf: "OFFICIAL"
  qgiscf_dlm: "OFFICIAL"
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/809682/uniformResourceIdentifiersCustomerGuide.pdf
    title: "Uniform Resource Identifiers (URI) Customer Guide - Companies House (List of Company Numbers and Prefixes)"
  - url: https://www.gov.uk/guidance/register-an-overseas-entity
    title: "Register an overseas entity and its beneficial owners - GOV.UK (OE ID allocation)"
  - url: https://doorda.com/glossary/company-number-prefixes-defined/
    title: "Company Number Prefixes Defined (corroborates post-2011 CE/CS/SG prefixes)"
  - url: https://chguide.co.uk/general/company-number.html
    title: "Company numbers - CH Guide (lists RS registered societies and FE further education / sixth form college corporations as active prefixes)"
  - url: https://find-and-update.company-information.service.gov.uk/company/RS008375
    title: "Companies House register entry RS008375 - Nurture Housing Association Limited (live registered-society example)"
