schema: testpattern/v1
name: Date of Birth
slug: au-birth-date-indicator
version: 2.3.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects date-of-birth references across common date formats (numeric slash/dot/hyphen, written month, ISO) when
  birth-record labels or personal-record context are present. Covers Australian and global document styles; business
  dates (invoice, due, expiry) and template samples are suppressed.
operation: >-
  Multi-format date regex matching: DD/MM/YYYY, DD-MM-YYYY, DD.MM.YYYY, DD Month YYYY, and YYYY-MM-DD (ISO).
  Corroborative evidence: 3 tiers with birth-record labels plus personal-record context and exclusion logic (high),
  explicit birth-record labels (medium), and standalone date match (low) within 300 characters. Consolidated coverage
  (merge qg-7): also covers the former global-top500-003-date-of-birth detector scope.
pattern: >-
  \b(?:(?:0?[1-9]|[12][0-9]|3[01])[\/\-\.](?:0?[1-9]|1[012])[\/\-\.](?:19|20)\d{2}|(?:0?[1-9]|[12][0-9]|3[01])(?:st|nd|rd|th)?\s+(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+(?:19|20)\d{2}|(?:19|20)\d{2}[\-\/](?:0[1-9]|1[012])[\-\/](?:0[1-9]|[12]\d|3[01]))\b
confidence: medium
confidence_justification: >-
  Medium confidence: date formats are common in many contexts. Birth-record keywords are essential to distinguish DOB
  from invoice dates, event dates, and other temporal references.
jurisdictions:
  - au
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - DOB
    - date of birth
    - birth date
    - born
    - born on
    - birthday
    - d.o.b
    - d.o.b.
  proximity: 300
  keyword_lists:
    - birth-record-labels
    - birth-record-context
test_cases:
  should_match:
    - value: 15/03/1990
      description: Exact 65 discovery probe - structured date without personal or birth-record context
    - value: 'DOB: 15/03/1990'
      description: Exact 75 probe - explicit birth-date label without broader personal-record context
    - value: 'Personal details recorded on file - DOB: 15/03/1990'
      description: Exact 85 probe - explicit birth-date label plus personal-record context
    - value: 'DOB: 15/03/1990'
      description: Numeric slash format with DOB label
    - value: Born on 1st January 1985
      description: Written month format with ordinal
    - value: 'Date of birth: 25.12.2000'
      description: Dot-separated format
    - value: 'Birth date: 1990-03-15'
      description: ISO format
  should_not_match:
    - value: 'Invoice date: this quarter'
      description: Invoice date phrasing with no structured date value
    - value: 'Due date: end of month'
      description: Payment due date phrasing with no structured date value
    - value: unrelated generic text
      description: No date pattern present
    - value: 'Invoice date: 15/03/1990'
      description: Structured business date is suppressed by the business-date document filter
    - value: 'Sample template personal details: 15/03/1990'
      description: Template text would satisfy personal context but is vetoed by the shared exclusion
    - value: 'Passport expiry date: 15/03/2030'
      description: Sibling identity-document date is suppressed by the expiry-date filter
    - value: 'Published event date: 15/03/1990'
      description: Public event date has no personal or birth context and remains discovery-only
    - value: reference 12345
      description: Not a date (merged from companion SIT)
    - value: see page 42
      description: Not a date (merged from companion SIT)
    - value: not a date here
      description: Plain prose (merged from companion SIT)
false_positives:
  - description: Non-DOB dates such as invoice dates, event dates, and document timestamps.
    mitigation: Require birth-record keywords in proximity. Personal-information context provides lower tier.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 3
risk_description: >-
  A birth date alone is low-harm correlating PII and is shared by many people. Risk 3 OFFICIAL remains correct;
  elevation requires a fuller identity profile or linked sensitive domain.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_date_all
      matches:
        - ref: Evidence_birth_record
        - ref: Evidence_personal_information
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_date_all
      matches:
        - ref: Evidence_birth_record
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_date_all
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
  filters:
    - id: Guard_birth_date_exclude_business
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms:
        - invoice date
        - due date
        - payment date
        - expiry date
        - expiration date
        - start date
        - end date
        - effective date
        - settlement date
        - maturity date
        - closing date
        - issue date
        - filing date
        - report date
  regexes:
    - id: Pattern_date_all
      pattern: >-
        \b(?:(?:0?[1-9]|[12][0-9]|3[01])[\/\-\.](?:0?[1-9]|1[012])[\/\-\.](?:19|20)\d{2}|(?:0?[1-9]|[12][0-9]|3[01])(?:st|nd|rd|th)?\s+(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+(?:19|20)\d{2}|(?:19|20)\d{2}[\-\/](?:0[1-9]|1[012])[\-\/](?:0[1-9]|[12]\d|3[01]))\b
    - id: Pattern_date_slash
      pattern: \b(?:0?[1-9]|[12][0-9]|3[01])[\/\-](?:0?[1-9]|1[012])[\/\-](?:19|20)\d{2}\b
    - id: Pattern_date_dot
      pattern: \b(?:0?[1-9]|[12][0-9]|3[01])\.(?:0?[1-9]|1[012])\.(?:19|20)\d{2}\b
    - id: Pattern_date_written_month
      pattern: >-
        \b(?:0?[1-9]|[12][0-9]|3[01])(?:st|nd|rd|th)?\s+(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+(?:19|20)\d{2}\b
    - id: Pattern_date_iso
      pattern: \b(?:19|20)\d{2}[\-\/](?:0[1-9]|1[012])[\-\/](?:0[1-9]|[12]\d|3[01])\b
  keywords:
    - id: Evidence_birth_record
      groups:
        - match_style: word
          terms:
            - text: DOB
              case_sensitive: true
            - 'DOB:'
            - date of birth
            - 'date of birth:'
            - DateOfBirth
            - birth date
            - birthdate
            - born
            - born on
            - birthday
            - d.o.b
            - d.o.b.
      strength: domain
    - id: Evidence_personal_information
      groups:
        - match_style: word
          terms:
            - personal details
            - personal information
            - personal data
            - identification
            - identity
            - demographics
            - patient details
            - client details
            - customer details
            - member details
            - employee details
      strength: specific
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 2.3.1
    date: '2026-07-19'
    description: >-
      Merge global-top500-003-date-of-birth: expanded name/description/risk for combined coverage; absorbed unique test
      cases; companion SIT deprecated.
  - version: 2.3.0
    date: '2026-07-19'
    description: >-
      Targeted blocker remediation: add a bare-date 65 discovery tier, require an explicit birth-record label at 75 and
      both that label plus personal-record context at 85, apply template suppression across all tiers, and add
      exact-tier plus business/sibling/public/template probes.
  - version: 2.2.1
    date: '2026-07-14'
    description: >-
      v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 520 without changing
      detector or package metadata.
  - version: 2.2.0
    date: '2026-07-09'
    description: >-
      C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are
      scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged);
      derived by scripts/derive-pattern-class.mjs + spot review
  - version: 2.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
