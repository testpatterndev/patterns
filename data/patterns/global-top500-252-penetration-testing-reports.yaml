schema: testpattern/v1
name: Penetration testing reports
slug: global-top500-252-penetration-testing-reports
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies penetration testing reports patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:penetration\s+testing|pentest\s+report|vulnerability\s+finding|security\s+assessment|attack\s+vector|risk\s+rating|scope\s+of\s+engagement|executive\s+summary)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - penetration testing reports
    - penetration
    - testing
    - reports
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: penetration testing
      description: Primary topic phrase match
    - value: pentest report
      description: Case-insensitive topic phrase match
    - value: vulnerability finding
      description: Alternative topic phrase match
    - value: security assessment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_penetration_testing_reports
      matches:
        - ref: Pattern_global_top500_252_penetration_testing_reports_label_context
        - ref: Keyword_global_top500_252_penetration_testing_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_penetration_testing_reports
      matches:
        - ref: Keyword_penetration_testing_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_penetration_testing_reports
      matches:
        - ref: Keyword_penetration_testing_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_penetration_testing_reports
      pattern: (?is)\b(?:penetration\s+testing|pentest\s+report|vulnerability\s+finding|security\s+assessment|attack\s+vector|risk\s+rating|scope\s+of\s+engagement|executive\s+summary)\b
    - id: Pattern_global_top500_252_penetration_testing_reports_label_context
      pattern: (?i)\\b(?:penetration\\s+testing\\s+reports|penetration|testing|reports|top500)\\b
  keywords:
    - id: Keyword_penetration_testing_reports
      groups:
        - match_style: word
          terms:
            - penetration testing
            - pentest report
            - vulnerability finding
            - exploit
            - security assessment
            - attack vector
            - risk rating
            - remediation
            - scope of engagement
            - executive summary
    - id: Keyword_global_top500_252_penetration_testing_reports_domain_context
      groups:
        - match_style: word
          terms:
            - penetration testing reports
            - penetration
            - testing
            - reports
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines/chapter-11-app-11-security-of-personal-information
