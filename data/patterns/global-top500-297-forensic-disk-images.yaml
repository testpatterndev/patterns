schema: testpattern/v1
name: Forensic disk images
slug: global-top500-297-forensic-disk-images
version: 1.2.1
type: regex
engine: boost_regex
description: Identifies forensic disk images patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:E01|\.E01\b|dd\s+image|forensic\s+image|disk\s+image)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - forensic disk images
    - forensic
    - disk
    - images
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: 'E01'
      description: Topic phrase present
    - value: 'E01'
      description: Topic phrase, lowercase
    - value: 'this record references the E01 held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_forensic_disk
      matches:
        - ref: Pattern_global_top500_297_forensic_disk_images_label_context
        - ref: Keyword_global_top500_297_forensic_disk_images_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_forensic_disk
      matches:
        - ref: Keyword_forensic_disk
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_forensic_disk
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_forensic_disk
      pattern: (?i)\b(?:E01|\.E01\b|dd\s+image|forensic\s+image|disk\s+image)\b
    - id: Pattern_global_top500_297_forensic_disk_images_label_context
      pattern: (?i)\b(?:forensic\s+disk\s+images)\b
  keywords:
    - id: Keyword_forensic_disk
      groups:
        - match_style: word
          terms:
            - forensic disk image
            - forensic image
            - disk image
            - dd image
            - EnCase
            - evidence file
            - chain of custody
            - hash verification
            - write blocker
            - bit-for-bit copy
            - acquisition
            - digital forensics
      strength: specific
    - id: Keyword_global_top500_297_forensic_disk_images_domain_context
      groups:
        - match_style: word
          terms:
            - forensic disk images
            - forensic
            - disk
            - images
      strength: domain
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-09'
