schema: testpattern/v1
name: QLD Treasury Pre-Release Budget Allocation
slug: qld-treasury-pre-release-budget-allocation
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects unreleased Queensland state budget allocation figures, forward estimates, and expenditure projections. These are market-moving documents that enable insider trading on government-linked securities if disclosed prematurely.
operation: 'Keyword proximity: primary financial keywords (budget, forward estimates, appropriation) within 300 characters of Treasury context keywords (Queensland Treasury, QTC, CBRC) and dollar amounts or allocation terms. Requires pre-release markers (draft, pre-release, not for distribution, PROTECTED).'
pattern: \$[\d,.]+\s*[MBKmb]?
confidence: high
confidence_justification: 'High confidence: co-occurrence of Treasury-specific terms with pre-release markers and dollar amounts in a document context makes false positives unlikely. Published budget documents are excluded by negative keywords.'
jurisdictions:
  - au
regulations:
- "Corporations Act 2001 (Cth)"
- "Criminal Code 1899 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - budget
    - forward estimates
    - appropriation
    - Treasury
    - Queensland Treasury
    - QTC
    - CBRC
    - allocation
    - expenditure
    - capital program
    - pre-release
    - draft
    - not for distribution
    - PROTECTED
  proximity: 300
  keyword_lists:
    - corporate-finance
    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED - Queensland Treasury - CBRC Budget Submission Draft FY26-27. Total new appropriation request: $2,450M across capital program and recurrent expenditure. Forward estimates show growth of 3.2% over the forward estimates period. NOT FOR DISTRIBUTION.'
      description: Pre-release CBRC budget submission with dollar amounts and Treasury context
    - value: Draft budget allocation — Queensland Treasury Corporation. Capital program allocation $890M for transport infrastructure. This document is pre-release and must not be distributed outside authorised Treasury personnel.
      description: QTC draft budget with capital allocation figures
    - value: 'PROTECTED. Forward Estimates Update - QLD Treasury. Revised appropriation: Health $18.2B, Education $14.7B, Transport $6.3B. Draft — not for publication until Treasurer''s budget speech.'
      description: Forward estimates update with department allocations
  should_not_match:
    - value: 'Queensland Budget 2025-26 — Budget Paper No. 2: Capital Statement. Published by Queensland Treasury. Total capital program: $55.6 billion over four years.'
      description: Published budget paper — public document, not pre-release
    - value: The department's annual report shows expenditure of $1.2B against a budget allocation of $1.3B, representing an underspend of $100M.
      description: Annual report referencing past budget — routine operational document
    - value: 'Budget template for FY2026 submissions. Departments should use this template to prepare their forward estimates. Example: allocation $XXX,XXX.'
      description: Template document with placeholder values, not real budget data
false_positives:
  - description: Published budget papers and budget-related media releases that reference Treasury and dollar amounts
    mitigation: Exclude documents containing 'published', 'media release', 'budget paper no', 'annual report', 'publicly available' using negative keyword list
  - description: Budget submission templates with placeholder amounts
    mitigation: Exclude documents containing 'template', 'example', 'placeholder', '$XXX' patterns
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_qld_treasury_pre_release_budget_allocation_dollar_amounts_with_optional_magnitude_s
      matches:
        - ref: Evidence_qld_treasury_pre_release_budget_allocation_primary
        - ref: Evidence_qld_treasury_pre_release_budget_allocation_context
        - ref: Evidence_qld_treasury_pre_release_budget_allocation_markers
        - ref: Pattern_qld_treasury_pre_release_budget_allocation_fiscal_year_references
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_qld_treasury_pre_release_budget_allocation_exclusion
    - confidence_level: 75
      id_match: Pattern_qld_treasury_pre_release_budget_allocation_dollar_amounts_with_optional_magnitude_s
      matches:
        - ref: Evidence_qld_treasury_pre_release_budget_allocation_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_qld_treasury_pre_release_budget_allocation_exclusion
    - confidence_level: 65
      id_match: Pattern_qld_treasury_pre_release_budget_allocation_dollar_amounts_with_optional_magnitude_s
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_qld_treasury_pre_release_budget_allocation_exclusion
  regexes:
    - id: Pattern_qld_treasury_pre_release_budget_allocation_dollar_amounts_with_optional_magnitude_s
      pattern: \$[\d,.]+\s*[MBKmb]?
    - id: Pattern_qld_treasury_pre_release_budget_allocation_fiscal_year_references
      pattern: FY\d{2}(?:-\d{2})?|\d{4}-\d{2}
  keywords:
    - id: Evidence_qld_treasury_pre_release_budget_allocation_primary
      groups:
        - match_style: word
          terms:
            - budget
            - forward estimates
            - appropriation
            - allocation
            - expenditure
            - capital program
    - id: Evidence_qld_treasury_pre_release_budget_allocation_context
      groups:
        - match_style: word
          terms:
            - Treasury
            - Queensland Treasury
            - QTC
            - CBRC
            - Treasurer
    - id: Evidence_qld_treasury_pre_release_budget_allocation_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - draft
            - pre-release
            - not for distribution
            - not for publication
            - embargoed
    - id: Filter_qld_treasury_pre_release_budget_allocation_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - example
            - published
            - annual report
            - media release
            - budget paper no
            - publicly available

risk_rating: 10
risk_description: Unreleased state budget allocations and forward estimates; premature disclosure enables insider trading on government-linked securities and corrupts the allocation process.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Financial
references: []
created: '2026-02-20'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
license: MIT
