schema: testpattern/v1
name: Expense reimbursement claims
slug: global-top500-092-expense-reimbursement-claims
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to expense reimbursement claims in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:expense\s+reimbursement\s+claims|expense\s+reimbursement|travel\s+claim|expense\s+report|receipt\s+submission|mileage\s+claim|per\s+diem|business\s+expense|reimbursement\s+request|expense\s+approval)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - expense reimbursement claims
    - expense
    - reimbursement
    - claims
    - payroll
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: expense reimbursement claims
      description: Primary topic phrase match
    - value: expense reimbursement
      description: Case-insensitive topic phrase match
    - value: travel claim
      description: Alternative topic phrase match
    - value: expense report
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_expense_reimbursement
      matches:
        - ref: Pattern_global_top500_092_expense_reimbursement_claims_label_context
        - ref: Keyword_global_top500_092_expense_reimbursement_claims_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_092_expense_reimbursement_claims_noise_exclusion
    - confidence_level: 75
      id_match: Regex_expense_reimbursement
      matches:
        - ref: Keyword_expense_reimbursement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_092_expense_reimbursement_claims_noise_exclusion
    - confidence_level: 65
      id_match: Regex_expense_reimbursement
      matches:
        - ref: Keyword_expense_reimbursement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_092_expense_reimbursement_claims_noise_exclusion
  regexes:
    - id: Regex_expense_reimbursement
      pattern: (?is)\b(?:expense\s+reimbursement\s+claims|expense\s+reimbursement|travel\s+claim|expense\s+report|receipt\s+submission|mileage\s+claim|per\s+diem|business\s+expense|reimbursement\s+request|expense\s+approval)\b
    - id: Pattern_global_top500_092_expense_reimbursement_claims_label_context
      pattern: (?i)\\b(?:expense\\s+reimbursement\\s+claims|expense|reimbursement|claims|top500)\\b
  keywords:
    - id: Keyword_expense_reimbursement
      groups:
        - match_style: word
          terms:
            - expense reimbursement claims
            - expense reimbursement
            - travel claim
            - expense report
            - receipt submission
            - mileage claim
            - per diem
            - business expense
            - reimbursement request
            - out-of-pocket
            - expense approval
    - id: Keyword_global_top500_092_expense_reimbursement_claims_domain_context
      groups:
        - match_style: word
          terms:
            - expense reimbursement claims
            - expense
            - reimbursement
            - claims
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_092_expense_reimbursement_claims_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
