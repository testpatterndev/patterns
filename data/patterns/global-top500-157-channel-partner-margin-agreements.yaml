schema: testpattern/v1
name: Channel partner margin agreements
slug: global-top500-157-channel-partner-margin-agreements
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to channel partner margin agreements in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:channel\s+partner|margin\s+agreement|partner\s+margin|reseller\s+margin|dealer\s+discount|distribution\s+margin|partner\s+commission|channel\s+pricing|partner\s+program|wholesale\s+discount|margin\s+protection|channel\s+incentive)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - channel partner margin agreements
    - channel
    - partner
    - margin
    - agreements
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: channel partner
      description: Primary topic phrase match
    - value: margin agreement
      description: Case-insensitive topic phrase match
    - value: partner margin
      description: Alternative topic phrase match
    - value: reseller margin
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to channel partner margin agreements appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_channel_partner_margin
      matches:
        - ref: Pattern_global_top500_157_channel_partner_margin_agreements_label_context
        - ref: Keyword_global_top500_157_channel_partner_margin_agreements_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_channel_partner_margin
      matches:
        - ref: Keyword_channel_partner_margin
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_channel_partner_margin
      matches:
        - ref: Keyword_channel_partner_margin
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_channel_partner_margin
      pattern: >-
        (?is)\b(?:channel\s+partner|margin\s+agreement|partner\s+margin|reseller\s+margin|dealer\s+discount|distribution\s+margin|partner\s+commission|channel\s+pricing|partner\s+program|wholesale\s+discount|margin\s+protection|channel\s+incentive)\b
    - id: Pattern_global_top500_157_channel_partner_margin_agreements_label_context
      pattern: (?i)\\b(?:channel\\s+partner\\s+margin\\s+agreements|channel|partner|margin|agreements|top500)\\b
  keywords:
    - id: Keyword_channel_partner_margin
      groups:
        - match_style: word
          terms:
            - channel partner
            - margin agreement
            - partner margin
            - reseller margin
            - dealer discount
            - distribution margin
            - partner commission
            - channel pricing
            - partner program
            - wholesale discount
            - margin protection
            - channel incentive
    - id: Keyword_global_top500_157_channel_partner_margin_agreements_domain_context
      groups:
        - match_style: word
          terms:
            - channel partner margin agreements
            - channel
            - partner
            - margin
            - agreements
