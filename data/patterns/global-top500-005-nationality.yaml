schema: testpattern/v1
name: Nationality
slug: global-top500-005-nationality
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to nationality in international contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 4 keywords within 300 characters. Keyword
  lists: pii-personal, pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:national\s+origin|country\s+of\s+origin|immigration\s+status|visa\s+status|country\s+of\s+birth|ethnic\s+origin)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - nationality
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - pii-personal
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: national origin
      description: Primary topic phrase match
    - value: country of origin
      description: Case-insensitive topic phrase match
    - value: immigration status
      description: Alternative topic phrase match
    - value: visa status
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to nationality appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_nationality
      matches:
        - ref: Pattern_global_top500_005_nationality_label_context
        - ref: Keyword_global_top500_005_nationality_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_nationality
      matches:
        - ref: Keyword_nationality
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_nationality
      matches:
        - ref: Keyword_nationality
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_nationality
      pattern: (?is)\b(?:national\s+origin|country\s+of\s+origin|immigration\s+status|visa\s+status|country\s+of\s+birth|ethnic\s+origin)\b
    - id: Pattern_global_top500_005_nationality_label_context
      pattern: (?i)\\b(?:nationality|top500)\\b
  keywords:
    - id: Keyword_nationality
      groups:
        - match_style: word
          terms:
            - nationality
            - national origin
            - country of origin
            - citizen
            - passport
            - immigration status
            - residency
            - visa status
            - country of birth
            - ethnic origin
            - demographics
    - id: Keyword_global_top500_005_nationality_domain_context
      groups:
        - match_style: word
          terms:
            - nationality
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://eur-lex.europa.eu/eli/reg/2016/679/oj
  - https://www.oaic.gov.au/privacy/your-privacy-rights/your-personal-information/what-is-personal-information
