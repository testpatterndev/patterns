schema: testpattern/v1
name: DNI
slug: es-dni
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects DNI patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Validation: Mod 23. Reference: https://gist.github.com/afgomez/5691823 Corroborative evidence: 3 keywords within 300
  characters. Keyword lists: pii-civic-credentials.
pattern: \b\d{8}[A-Z]\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - eu
  - es
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: 12345678Z
      description: Standard Spanish DNI
    - value: 00000001R
      description: Low-range DNI
    - value: 99999999A
      description: Upper-range DNI
  should_not_match:
    - value: 1234567Z
      description: Only 7 digits instead of 8
    - value: 123456789Z
      description: 9 digits instead of 8
    - value: 12345678
      description: Missing trailing letter
false_positives:
  - description: >-
      Common words and phrases related to dni appearing in policy documents, training materials, HR templates, or
      compliance guidelines without actual personal data.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than
      general discussion.
  - description: >-
      In multiple EU languages, similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_es_dni
      matches:
        - ref: Keyword_es_dni_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_es_dni
      matches:
        - ref: Keyword_es_dni_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_es_dni
  regexes:
    - id: Regex_es_dni
      pattern: \b\d{8}[A-Z]\b
  keywords:
    - id: Keyword_es_dni_specific
      groups:
        - match_style: word
          terms:
            - documento nacional de identidad
            - text: DNI
              case_sensitive: true
            - "número de identificación"
            - documento de identidad
            - national identity document
            - identity card number
            - "número DNI"
            - text: NIF
              case_sensitive: true
            - "cédula de identidad"
      strength: specific
    - id: Keyword_es_dni_general
      groups:
        - match_style: word
          terms:
            - identifier
            - identification
            - identity document
            - personal ID
            - identity number
            - "identificación"
            - "número de documento"
            - "tarjeta de identidad"
      strength: specific
risk_rating: 8
risk_description: >-
  The Spanish DNI is the primary national identity document required for all citizens over 14. Compromise enables
  identity theft, unauthorized financial transactions, and impersonation.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-spain-dni
    title: "Spain DNI entity definition - Microsoft Learn"
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary; remove dead shared_keywords import(s) generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
author: testpattern-community
