schema: testpattern/v1
name: Pipeline pressure and flow setpoints
slug: global-top500-445-pipeline-pressure-and-flow-setpoints
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive pipeline pressure, flow, operating-limit, and control-setpoint records. Topic
  phrases are retained for discovery; enforcement requires a populated pressure or flow value, and high
  confidence also requires a pipeline segment, station, valve, control tag, or other live asset reference.
operation: >-
  Regex_pipeline_pressure_flow recognises pipeline pressure/flow setpoints, MAOP, and pipeline-control
  setpoint topics. The topic alone is discovery-only at 65. A populated pressure or flow value raises it
  to 75; a value plus a pipeline segment, compressor/metering/valve station, or control-tag reference
  reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:pipeline\s+pressure\s+(?:and\s+)?flow\s+setpoints?|pipeline\s+pressure\s+setpoint|pipeline\s+flow\s+setpoint|maximum\s+allowable\s+operating\s+pressure|pipeline\s+control\s+setpoint)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires a populated engineering value rather than a pipeline topic alone. High
  confidence adds a specific station, segment, valve, or control reference, reducing matches on safety
  standards and engineering lessons.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - pipeline pressure and flow setpoints
    - pipeline
    - pressure
    - flow
    - setpoints
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: pipeline pressure setpoint
      description: Low-tier probe - topic without a populated engineering value
    - value: 'Pipeline pressure setpoint: normal 6.8 MPa and high limit 7.2 MPa'
      description: Medium-tier probe - populated pressure values without a live asset reference
    - value: 'Pipeline pressure and flow setpoints for compressor station CS-04 and pipeline segment PL-17: PT-204 high trip 7.2 MPa, flow 620 m3/h'
      description: High-tier probe - populated values with station, segment, and control-tag detail
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: pipeline flow
      description: Generic word pair from old broad template should not match
    - value: 'The public pipeline safety guide explains maximum allowable operating pressure.'
      description: Public guidance without populated operating values
    - value: 'Training example: pipeline pressure setpoint for compressor station CS-04 is 7.2 MPa'
      description: Explicit training content must not enforce
false_positives:
  - description: Pipeline standards and engineering courses discuss MAOP, pressure relief, compressor stations, and flow limits without exposing current operating values.
    mitigation: Keep topic-only matches discovery-only and require a populated pressure or flow value for enforcement.
  - description: Worked examples can include realistic station names, segment IDs, control tags, and pressure values.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_pipeline_pressure_flow
      matches:
        - ref: Evidence_pipeline_engineering_value
        - ref: Evidence_pipeline_live_asset
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_pipeline_pressure_flow
      matches:
        - ref: Evidence_pipeline_engineering_value
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pipeline_pressure_flow
  regexes:
    - id: Regex_pipeline_pressure_flow
      pattern: >-
        (?is)\b(?:pipeline\s+pressure\s+(?:and\s+)?flow\s+setpoints?|pipeline\s+pressure\s+setpoint|pipeline\s+flow\s+setpoint|maximum\s+allowable\s+operating\s+pressure|pipeline\s+control\s+setpoint)\b
    - id: Evidence_pipeline_engineering_value
      pattern: '(?i)\b\d+(?:\.\d+)?\s*(?:kPa|MPa|bar|psi|m3/h|L/s|bbl/day|percent)\b'
  keywords:
    - id: Evidence_pipeline_live_asset
      groups:
        - match_style: word
          terms:
            - pipeline segment
            - compressor station
            - metering station
            - valve station
            - station ID
            - segment ID
            - line number
            - control tag
            - text: SCADA
              case_sensitive: true
      strength: specific
risk_description: >-
  This regex identifies pipeline pressure, flow setpoints, operating-pressure limits, and pipeline-operations records with eight contextual signals. A genuine setpoint file reveals normal and maximum operating boundaries, allowing a capable adversary to plan unsafe manipulation, service disruption, or concealment of abnormal conditions. The normal bounded record presents serious operational and potential environmental harm, but meaningful exploitation still needs system access, asset mapping, and control over the relevant equipment. For the global catalogue analogue, the confirmed substantive record is the consequence unit. Live limits and alarm thresholds reveal how to induce unsafe or disruptive conditions in a pipeline. Additional access is needed, but the information creates a credible path to significant service, environmental or life-safety damage. Risk 9 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require site/segment identifiers plus actual values, limits, alarms or control tags; generic safety guidance remains audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
