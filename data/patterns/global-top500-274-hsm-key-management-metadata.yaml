schema: testpattern/v1
name: HSM key management metadata
slug: global-top500-274-hsm-key-management-metadata
version: 1.3.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies hsm key management metadata patterns in security and access control contexts. Detects potential exposure
  of sensitive security information in international systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:hardware\s+security\s+module|key\s+management|key\s+rotation|key\s+lifecycle|master\s+key|wrapping\s+key|key\s+escrow|key\s+ceremony|cryptographic\s+key)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - hsm key management metadata
  - hsm
  - key
  - management
  - metadata
  - credentials
  - keys
  - secrets
  proximity: 300
test_cases:
  should_match:
  - value: hardware security module
    description: Primary topic phrase match
  - value: key management
    description: Case-insensitive topic phrase match
  - value: key rotation
    description: Alternative topic phrase match
  - value: key lifecycle
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: hsm key slot
    description: Generic word pair from old broad template should not match
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_hsm_key_management
    matches:
    - ref: Keyword_hsm_key_management
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
    min_count: 2
  - confidence_level: 75
    id_match: Regex_hsm_key_management
    matches:
    - ref: Keyword_global_top500_274_hsm_key_management_metadata_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_hsm_key_management
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_hsm_key_management
    pattern: (?is)\b(?:hardware\s+security\s+module|key\s+management|key\s+rotation|key\s+lifecycle|master\s+key|wrapping\s+key|key\s+escrow|key\s+ceremony|cryptographic\s+key)\b
  - id: Pattern_global_top500_274_hsm_key_management_metadata_label_context
    pattern: (?i)\b(?:hsm\s+key\s+management\s+metadata)\b
  keywords:
  - id: Keyword_hsm_key_management
    groups:
    - match_style: word
      terms:
      - hsm
      - hardware security module
      - key management
      - pkcs#11
      - kms
      - key rotation
      - key lifecycle
      - master key
      - wrapping key
      - key escrow
      - key ceremony
      - cryptographic key
    strength: specific
  - id: Keyword_global_top500_274_hsm_key_management_metadata_domain_context
    groups:
    - match_style: word
      terms:
      - hsm key management metadata
      - hsm
      - key
      - management
      - metadata
    strength: domain
risk_description: The detector matches hardware security module, HSM, key management, key rotation, or key lifecycle language,
  identifying cryptographic-governance context rather than secret key material. A genuine metadata record can reveal custody
  processes, rotation schedules, key identifiers, system dependencies, and control gaps that improve targeting of key-management
  operations. Standards documentation and general cryptography policy can match, and the pattern does not extract a private
  key, recovery share, or HSM authentication credential. Risk 8 SENSITIVE reflects serious operational-security harm from
  detailed internal metadata; PROTECTED is not supported for a phrase-level record that lacks the keys or significant-damage
  scope.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
