schema: testpattern/v1
name: Coronial Finding Published
slug: coronial-finding-published
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects published coronial findings and recommendations under the Coroners Act 2003 (Qld). Although coronial findings are public documents, they contain sensitive details about the circumstances and cause of death, manner of death, and identity of deceased persons. Government agencies handling these documents should classify them as SENSITIVE Legal due to the distressing nature of the content.
operation: 'Keyword proximity: primary keywords (coronial finding, coroner, inquest, cause of death, manner of death, recommendations) within 300 characters of Coroners Act references and death investigation details. Negative keyword exclusion for general health statistics and hospital annual reports.'
pattern: (?i)\b(coronial\s+(?:finding|inquest|investigation|report)|(?:cause|manner|circumstances)\s+of\s+death|coroner(?:'s|s)?\s+(?:finding|recommendation|report|court)|Coroners\s+Act\s+2003|inquest\s+(?:into|findings?|recommendations?))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of coronial investigation terminology with specific findings about cause of death, manner of death, and recommendations. General mortality statistics and health reports do not contain these detailed finding terms in combination.'
jurisdictions:
  - au
regulations:
  - qgiscf
  - coroners-act-2003-qld
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - SENSITIVE
    - Legal
    - coronial finding
    - coroner
    - inquest
    - cause of death
    - manner of death
    - autopsy
    - post-mortem
    - Coroners Court
    - Coroners Act 2003
    - State Coroner
    - Deputy State Coroner
    - recommendations
  proximity: 300
  keyword_lists:
    - law-enforcement
    - government-services
test_cases:
  should_match:
    - value: 'Coroners Court of Queensland — Findings of Inquest. Coroners Act 2003 (Qld) s.45. Inquest into the death of [Name]. Delivered by Deputy State Coroner J. Hutton on 12 February 2026. Findings: The deceased [Name], aged 34, died on 18 September 2025 at Princess Alexandra Hospital, Brisbane. Cause of death: multi-organ failure secondary to sepsis. Manner of death: natural causes complicated by delayed diagnosis. I make the following recommendations pursuant to s.46: (1) Queensland Health review triage protocols for presentations with fever and abdominal pain.'
      description: Coronial finding with cause of death, manner of death, and recommendations
    - value: 'Coronial Investigation Report — Non-Inquest Finding. Coroners Act 2003 s.45(2). Death of [Name], aged 78. Reported death investigated by Coroner M. Bentley, Cairns Coroners Court. Autopsy performed by forensic pathologist Dr R. Singh at Cairns Hospital mortuary on 4 October 2025. Post-mortem finding: acute myocardial infarction. Cause of death: ischaemic heart disease. Circumstances: the deceased was found unresponsive at home by a neighbour. No suspicious circumstances identified. No inquest required.'
      description: Non-inquest coronial finding with autopsy details and cause of death
    - value: 'Inquest into the deaths arising from the Ravensbourne bus incident. State Coroner T. Ryan. Coroners Court of Queensland. Findings delivered 28 January 2026 pursuant to Coroners Act 2003 s.45. Four persons deceased. Cause of death (all four): multiple blunt force trauma consistent with high-speed vehicle collision. Manner of death: accident. Circumstances of death: the bus departed the Toowoomba Range road at a curve travelling at approximately 95 km/h. Recommendations: (1) Department of Transport and Main Roads install crash barriers at the identified curve. (2) Mandatory fatigue management for bus operators on mountain routes.'
      description: Multi-death inquest finding with recommendations to government agencies
  should_not_match:
    - value: The Australian Bureau of Statistics published its annual Causes of Death report for 2024. The leading cause of death was ischaemic heart disease (17,331 deaths), followed by dementia (15,209 deaths). Queensland recorded 34,127 registered deaths.
      description: Published ABS causes of death statistics
    - value: The Royal Brisbane and Women's Hospital published its 2024-25 annual report noting a mortality rate of 1.2% for admitted patients, consistent with national benchmarks. The hospital recorded 847 deaths during the reporting period.
      description: Hospital annual report with aggregate mortality statistics
    - value: A forensic pathology textbook chapter explains the process of coronial investigation in Queensland, including the role of the State Coroner, the circumstances requiring investigation under the Coroners Act 2003, and the types of findings available.
      description: Forensic pathology textbook on coronial process
false_positives:
  - description: ABS published causes of death statistics and mortality data
    mitigation: 'Negative keyword exclusion: ''ABS'', ''Australian Bureau of Statistics'', ''leading cause'', ''registered deaths'', ''published'''
  - description: Hospital and health service annual reports with aggregate mortality data
    mitigation: 'Negative keyword exclusion: ''annual report'', ''mortality rate'', ''national benchmarks'', ''reporting period'''
  - description: Forensic pathology and coronial law textbooks
    mitigation: 'Negative keyword exclusion: ''textbook'', ''chapter'', ''explains'', ''academic'', ''university'''
  - description: Media articles reporting on coronial findings already publicly released
    mitigation: 'Require proximity to specific deceased person details, autopsy findings, or recommendation text rather than summary news reporting.'
exports:
  - purview_xml
  - yaml
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: Coronial finding terms with 2+ primary keywords plus cause of death and recommendations
    - tier: medium
      confidence: 75
      description: 2+ primary keywords with Coroners Act reference and manner of death detail
    - tier: low
      confidence: 65
      description: 1 primary keyword with coronial investigation terms and corroborative evidence
  regexes:
    - name: coronial_finding_terms
      pattern: (?i)\b(coronial\s+(?:finding|inquest|investigation|report)|inquest\s+(?:into|findings?|recommendations?))\b
    - name: cause_manner_death
      pattern: (?i)\b((?:cause|manner|circumstances)\s+of\s+death)\b
    - name: coroners_act_reference
      pattern: (?i)\bCoroners\s+Act\s+2003\b
  keywords:
    - name: primary_keywords
      words:
        - coronial finding
        - coronial inquest
        - coronial investigation
        - coronial report
        - coroner's finding
        - coroner's recommendation
        - inquest into the death
        - cause of death
        - manner of death
        - circumstances of death
    - name: classification_markers
      words:
        - SENSITIVE
        - Legal
        - OFFICIAL
        - Coroners Act 2003
        - Coroners Court
        - State Coroner
        - Deputy State Coroner
    - name: corroborative_terms
      words:
        - autopsy
        - post-mortem
        - forensic pathologist
        - deceased
        - blunt force trauma
        - natural causes
        - accident
        - suspicious circumstances
        - recommendations pursuant
        - inquest required
        - mortuary
        - toxicology
    - name: negative_keywords
      words:
        - ABS
        - Australian Bureau of Statistics
        - leading cause
        - registered deaths
        - published
        - annual report
        - mortality rate
        - national benchmarks
        - reporting period
        - textbook
        - chapter
        - explains
        - academic
        - university
  filters:
    - type: exclude
      description: Exclude published mortality statistics, hospital reports, and academic materials
      keywords:
        - Australian Bureau of Statistics
        - ABS
        - leading cause
        - registered deaths
        - annual report
        - mortality rate
        - national benchmarks
        - textbook
        - academic
        - university
risk_rating: 7
risk_description: Published coronial findings contain detailed descriptions of death circumstances, cause of death, autopsy results, and deceased person identity. Although public, these documents contain distressing content and personal details that warrant SENSITIVE handling within government agencies to prevent inappropriate casual distribution. Unauthorised disclosure could prejudice proceedings or compromise legal professional privilege.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-03-06'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
