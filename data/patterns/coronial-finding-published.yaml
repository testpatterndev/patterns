changelog:
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1505 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-13'
    description: 'Baseline burn-down follow-up: the sole pattern_tier had id_match: '''' (empty string) — idMatchIds() treats an empty id_match string as [], so scripts/verify-pattern-testcases.mjs tierEvaluable() filtered the tier out entirely (0 evaluable tiers), which routed should_not_match evaluation through the hard-fail no-tiers-to-gate-it path instead of the discovery_only warn path the tier was designed for. Wired id_match to the existing purview.keywords group id primary_keywords (already registered under the name: primary_keywords key), making the tier evaluable again; the tier remains discovery_only so a top-level hit on ABS-statistics/hospital-report/textbook prose would surface only as a discovery-inventory warning, not a should_not_match failure. Verified: 0 FAILs, all 3 should_not_match negatives (ABS causes-of-death statistics, hospital annual report, forensic pathology textbook) clear; all 3 should_match positives still pass via top-level pattern.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) — no tier referenced it and the legacy tier shape carries no evidence lists to wire it into (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
