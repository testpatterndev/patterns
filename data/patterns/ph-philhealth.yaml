schema: testpattern/v1
name: Philippines PhilHealth Number
slug: ph-philhealth
version: 1.0.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Philippines PhilHealth Identification Numbers (PIN) in the common dashed format
  ##-#########-# (12 digits). Used for national health insurance membership and claims.
operation: >-
  Structural dashed PhilHealth PIN format. Corroborative evidence: PhilHealth keywords within 300
  characters. Keyword lists: healthcare-identifiers, pii-civic-credentials.
pattern: '\b\d{2}-\d{9}-\d{1}\b'
confidence: high
confidence_justification: >-
  High confidence for dashed 2-9-1 format with PhilHealth keywords; structure is
  distinctive versus SSS (2-7-1).
jurisdictions:
  - ph
regulations:
  - "Data Privacy Act 2012 (PH)"
  - "Universal Health Care Act (PH)"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - phi
  - government-id
  - healthcare
corroborative_evidence:
  keywords:
    - PhilHealth
    - PhilHealth number
    - PIN
    - PhilHealth ID
  proximity: 300
  keyword_lists:
    - healthcare-identifiers
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '01-234567890-1'
      description: Standard PhilHealth PIN
    - value: '12-345678901-2'
      description: Alternate PIN
    - value: '08-901234567-0'
      description: Third PIN example
  should_not_match:
    - value: '01-2345678-1'
      description: SSS-like 2-7-1 grouping
    - value: '012345678901'
      description: Continuous 12 digits
    - value: '01-234567890-12'
      description: Two-digit trailing group
false_positives:
  - description: >-
      Other health-system chart numbers with similar dash grouping.
    mitigation: >-
      Require PhilHealth keywords in proximity.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ph_philhealth
      matches:
        - ref: Keyword_ph_philhealth_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ph_philhealth
      matches:
        - ref: Keyword_ph_philhealth_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ph_philhealth
  regexes:
    - id: Regex_ph_philhealth
      pattern: '\b\d{2}-\d{9}-\d{1}\b'
  keywords:
    - id: Keyword_ph_philhealth_specific
      groups:
        - match_style: word
          terms:
            - PhilHealth number
            - PhilHealth PIN
            - PhilHealth ID
            - PhilHealth Identification Number
            - PHIC number
            - PhilHealth Member PIN
      strength: specific
    - id: Keyword_ph_philhealth_broad
      groups:
        - match_style: word
          terms:
            - PhilHealth
            - PHIC
            - national health insurance
            - Member Data Record
            - MDR PhilHealth
      strength: specific
risk_rating: 5
risk_description: >-
  The detector identifies a dashed PhilHealth membership number used for national health-insurance administration, not a diagnosis, claim, treatment record, or clinical result. Disclosure may support member correlation, billing scams, or impersonation, but it does not reveal a health condition and requires identity, provider, claim, or credential data for material misuse. Similar chart or administrative numbers can share the grouping despite the strong PhilHealth context. Risk 5 and OFFICIAL fit the standalone membership identifier; SENSITIVE would require an attributed claim, eligibility decision, treatment record, authentication factor, or bulk insured-person register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI Specified"
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: "Protected B"
references:
  - url: https://www.philhealth.gov.ph/
    title: PhilHealth official site
created: '2026-07-09'
updated: '2026-07-14'
changelog:
  - version: 1.0.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2170 without changing detector or package metadata.'
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Initial mature identifier SIT — Phase-1 coverage backlog (Purview-safe regex, full label/risk metadata for pack workbooks)'
author: testpattern-community
