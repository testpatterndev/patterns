schema: testpattern/v1
name: Privileged account inventories
slug: au-top500-309-privileged-account-inventories
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies privileged account inventories patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:privileged\s+account|service\s+account|admin\s+account|root\s+access|domain\s+admin|elevated\s+privileges|privileged\s+access\s+management|break\s+glass\s+account|emergency\s+access|credential\s+vault|account\s+inventory)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "Criminal Code Act 1995 (Cth)"
frameworks:
- CIS Controls
- ISO 27001
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - privileged account inventories
    - privileged
    - account
    - inventories
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: privileged account
      description: Primary topic phrase match
    - value: service account
      description: Case-insensitive topic phrase match
    - value: admin account
      description: Alternative topic phrase match
    - value: root access
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_privileged_account
      matches:
        - ref: Evidence_privileged_account
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_privileged_account
      matches:
        - ref: Evidence_privileged_account
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_privileged_account
      matches:
        - ref: Evidence_privileged_account
  regexes:
    - id: Pattern_privileged_account
      pattern: (?is)\b(?:privileged\s+account|service\s+account|admin\s+account|root\s+access|domain\s+admin|elevated\s+privileges|privileged\s+access\s+management|break\s+glass\s+account|emergency\s+access|credential\s+vault|account\s+inventory)\b
  keywords:
    - id: Evidence_privileged_account
      groups:
        - match_style: word
          terms:
            - privileged account
            - service account
            - admin account
            - root access
            - domain admin
            - elevated privileges
            - PAM
            - privileged access management
            - break glass account
            - emergency access
            - credential vault
            - account inventory
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
