  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_land_registry
      matches:
        - ref: Pattern_global_top500_393_land_registry_ownership_files_label_context
        - ref: Keyword_global_top500_393_land_registry_ownership_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_land_registry
      matches:
        - ref: Keyword_land_registry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_land_registry
      matches:
        - ref: Keyword_land_registry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_land_registry
      pattern: >-
        (?is)\b(?:land\s+registry\s+ownership\s+files|title\s+deed|property\s+ownership|land\s+title|cadastral\s+record|property\s+transfer|land\s+registration|certificate\s+of\s+title|property\s+boundary|registered\s+proprietor|encumbrance\s+record)\b
    - id: Pattern_global_top500_393_land_registry_ownership_files_label_context
      pattern: (?i)\\b(?:land\\s+registry\\s+ownership\\s+files|land|registry|ownership|files|top500)\\b
  keywords:
    - id: Keyword_land_registry
      groups:
        - match_style: word
          terms:
