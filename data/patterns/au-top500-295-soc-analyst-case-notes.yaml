schema: testpattern/v1
name: SOC analyst case notes
slug: au-top500-295-soc-analyst-case-notes
version: 1.5.1
type: regex
pattern_class: concept
engine: boost_regex
description: 'Identifies security-operations investigation notes rather than analyst notes across every domain: enforcement
  requires SOC, SIEM, security-alert, or cyber-incident context near case structure (case/alert IDs, analyst actions, indicators,
  disposition, severity, escalation), while the SOC-case topic alone remains discovery-only. HR, medical, and customer-support
  case notes without a security-system anchor are out of scope.'
operation: 'Pattern type: regex (boost_regex engine). The SOC-case topic phrase feeds a 65 discovery-only tier; enforcement
  requires Evidence_soc_case_structure — a SOC/SIEM/security-alert/ cyber-incident anchor within 240 characters of a case
  ID, alert ID, analyst action, indicator, disposition, severity, or escalation field — at 75, with additional security-operations
  evidence raising it to 85. The shared template exclusion vetoes training/demo text at enforcement tiers.'
pattern: (?i)\b(?:soc\s+case)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
- au
regulations:
- NDB Scheme (Cth)
- SOCI Act 2018 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - soc analyst case notes
  - soc
  - analyst
  - case
  - notes
  - security
  - operations
  - threat
  - data
  proximity: 300
test_cases:
  should_match:
  - value: Soc case
    description: Topic phrase present
  - value: soc case
    description: Topic phrase, lowercase
  - value: this record references the soc case held on file
    description: Topic phrase within surrounding text
  - value: SOC case ID=INC-4187 SIEM alert=AL-92 analyst action=isolated host disposition=true positive severity=high
    description: SOC and SIEM anchors with case ID, action, disposition, and severity reach the enforcing tiers
  should_not_match:
  - value: unrelated generic text
    description: No relevant phrase context
  - value: placeholder value 12345
    description: Random text should not match phrase marker
  - value: generic policy prose without anchors
    description: Should reject generic mentions without structural anchor terms
  - value: Clinical triage analyst notes case ID 4187
    description: Healthcare case notes no longer satisfy the primary (generic analyst notes / case id / triage removed from
      the ID)
  - value: case ID
    description: Same-span generic identifier cannot establish the SOC domain (removed from the ID)
  - value: SOC operating model and analyst roster
    description: Governance prose has no SOC-case phrase and no case structure (no discovery hit either)
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: The regex identifies a composite SOC case record through SOC-case, analyst-notes, case-ID, and triage language
  rather than a credential. Genuine notes can contain alert evidence, analyst hypotheses, affected hosts and users, containment
  actions, and unresolved gaps that could tip off a subject or help an attacker evade response. Harm is serious for the people
  and systems in the bounded investigation, and may also prejudice internal decision-making. Risk 8 and SENSITIVE fit that
  contained case-file exposure, while a broad protected investigation or critical-service compromise would raise the classification.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_soc_case_notes
    matches:
    - ref: Evidence_soc_case_notes
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
    min_count: 2
  - confidence_level: 75
    id_match: Pattern_soc_case_notes
    matches:
    - ref: Evidence_soc_case_notes
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Pattern_soc_case_notes
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  regexes:
  - id: Pattern_soc_case_notes
    pattern: (?i)\b(?:soc\s+case)\b
  - id: Evidence_soc_case_structure
    pattern: (?is)\b(?:SOC|SIEM|security\s+alert|cyber\s+incident)[\s\S]{0,240}\b(?:case\s+id|alert\s+id|analyst\s+action|indicator|disposition|severity|escalation)\b
  keywords:
  - id: Evidence_soc_case_notes
    groups:
    - match_style: word
      terms:
      - SOC analyst
      - case notes
      - case id
      - triage
      - incident response
      - alert investigation
      - escalation
      - severity
      - indicators of compromise
      - threat intelligence
      - security operations center
      - SIEM alert
    strength: specific
created: '2026-02-08'
updated: '2026-07-17'
changelog:
- version: 1.5.0
  date: '2026-07-17'
  description: 'Reduced-scope harden (TP-00412): drop the generic "analyst notes", "case id", and "triage" alternatives from
    the primary (an HR benefits-triage note previously enforced via same-span evidence — cross-domain collision). Enforcement
    now anchors on Evidence_soc_case_structure (SOC/SIEM/security-alert/cyber-incident anchor within 240 characters of case-note
    structure): 75 with template exclusion, 85 with two additional unique security-operations evidence terms. Topic branch
    stays 65 discovery_only. Per QA correction, "SOC operating model" prose is expected no_match (not discovery) because no
    SOC-case phrase remains. The candidate''s dead "escalat" evidence alternative is spelled "escalation" so the branch is
    reachable. Added SOC-record positive and clinical/same-span /governance negatives.'
- version: 1.4.1
  date: '2026-07-14'
  description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 887 without changing
    detector or package metadata.'
- version: 1.4.0
  date: '2026-07-09'
  description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are
    scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived
    by scripts/derive-pattern-class.mjs + spot review'
- version: 1.3.0
  date: '2026-07-04'
  description: case/evidence metadata update
- version: 1.2.0
  date: '2026-03-14'
  description: Standardise to 3-tier 65/75/85 gating with progressive evidence
- version: 1.1.0
  date: '2026-03-06'
  description: Embed topic-specific phrase regex, wire domain keyword lists
- version: 1.0.0
  date: '2026-02-08'
  description: Initial release
