schema: testpattern/v1
name: Insurance claim records
slug: global-top500-129-insurance-claim-records
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to insurance claim records in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-insurance.
pattern: (?is)\b(?:insurance\s+claim|claim\s+number|claim\s+lodgement|loss\s+adjuster|claim\s+assessment|claim\s+settlement|incident\s+report|claim\s+status|claim\s+investigation)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - insurance claim records
    - insurance
    - claim
    - records
    - credit
    - lending
  proximity: 300
  keyword_lists:
    - industry-insurance
test_cases:
  should_match:
    - value: insurance claim
      description: Primary topic phrase match
    - value: claim number
      description: Case-insensitive topic phrase match
    - value: claim lodgement
      description: Alternative topic phrase match
    - value: loss adjuster
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_insurance_claim
      matches:
        - ref: Evidence_insurance_claim
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_insurance_claim
      matches:
        - ref: Evidence_insurance_claim
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_insurance_claim
      matches:
        - ref: Evidence_insurance_claim
  regexes:
    - id: Pattern_insurance_claim
      pattern: (?is)\b(?:insurance\s+claim|claim\s+number|claim\s+lodgement|loss\s+adjuster|claim\s+assessment|claim\s+settlement|incident\s+report|claim\s+status|claim\s+investigation)\b
  keywords:
    - id: Evidence_insurance_claim
      groups:
        - match_style: word
          terms:
            - insurance claim
            - claim number
            - claim lodgement
            - claimant
            - loss adjuster
            - claim assessment
            - AFCA
            - claim settlement
            - incident report
            - claim status
            - excess
            - claim investigation
risk_description: >-
  This detector identifies insurance claim records containing claim numbers, loss-adjuster activity, lodgement, and loss details. An unauthorised recipient could learn about an accident, loss, disputed liability, or claimed amount and exploit the claimant through fraud, pressure, or reputational exposure. The normal record affects a claimant and a single claim, often combining financial facts with sensitive circumstances, but it does not imply access to the insurer's systems. Risk 7 and SENSITIVE are warranted; medical evidence, bulk claim files, or privileged litigation strategy would increase the required protection.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
