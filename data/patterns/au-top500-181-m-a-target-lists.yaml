schema: testpattern/v1
name: M&A target lists
slug: au-top500-181-m-a-target-lists
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to m&a target lists in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:m&a\s+target\s+lists|acquisition\s+target|merger\s+target|target\s+company|deal\s+pipeline|due\s+diligence|valuation\s+analysis|strategic\s+acquisition|takeover\s+candidate|indicative\s+offer|enterprise\s+value|synergy\s+assessment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - m&a target lists
    - target
    - lists
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: m&a target lists
      description: Primary topic phrase match
    - value: acquisition target
      description: Case-insensitive topic phrase match
    - value: merger target
      description: Alternative topic phrase match
    - value: target company
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to m&a target lists appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_ma_target_lists
      matches:
        - ref: Evidence_ma_target_lists
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_ma_target_lists
      matches:
        - ref: Evidence_ma_target_lists
    - confidence_level: 65
      id_match: Pattern_ma_target_lists
      matches:
        - ref: Evidence_ma_target_lists
  regexes:
    - id: Pattern_ma_target_lists
      pattern: (?is)\b(?:m&a\s+target\s+lists|acquisition\s+target|merger\s+target|target\s+company|deal\s+pipeline|due\s+diligence|valuation\s+analysis|strategic\s+acquisition|takeover\s+candidate|indicative\s+offer|enterprise\s+value|synergy\s+assessment)\b
  keywords:
    - id: Evidence_ma_target_lists
      groups:
        - match_style: word
          terms:
            - m&a target lists
            - acquisition target
            - merger target
            - target company
            - deal pipeline
            - due diligence
            - valuation analysis
            - strategic acquisition
            - takeover candidate
            - indicative offer
            - enterprise value
            - synergy assessment
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
