schema: testpattern/v1
name: Real-time geolocation
slug: global-top500-047-real-time-geolocation
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to real-time geolocation in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: emerging-geolocation. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:real[\s-]+time\s+geolocation|GPS\s+coordinates|live\s+location|current\s+location|location\s+tracking|latitude\s+longitude|real[\s-]+time\s+tracking|geo\s+tracking|position\s+data|location\s+services|GPS\s+tracking)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - real-time geolocation
    - real
    - time
    - geolocation
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - emerging-geolocation
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: real-time geolocation
      description: Primary topic phrase match
    - value: gps coordinates
      description: Case-insensitive topic phrase match
    - value: live location
      description: Alternative topic phrase match
    - value: current location
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to real-time geolocation appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_real_time_geolocation
      matches:
        - ref: Pattern_global_top500_047_real_time_geolocation_label_context
        - ref: Keyword_global_top500_047_real_time_geolocation_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_real_time_geolocation
      matches:
        - ref: Keyword_real_time_geolocation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_real_time_geolocation
      pattern: >-
        (?is)\b(?:real[\s-]+time\s+geolocation|GPS\s+coordinates|live\s+location|current\s+location|location\s+tracking|latitude\s+longitude|real[\s-]+time\s+tracking|geo\s+tracking|position\s+data|location\s+services|GPS\s+tracking)\b
    - id: Pattern_global_top500_047_real_time_geolocation_label_context
      pattern: (?i)\b(?:real\-time\s+geolocation)\b
  keywords:
    - id: Keyword_real_time_geolocation
      groups:
        - match_style: word
          terms:
            - real-time geolocation
            - geolocation
            - GPS coordinates
            - live location
            - current location
            - location tracking
            - latitude longitude
            - real-time tracking
            - geo tracking
            - position data
            - location services
            - GPS tracking
      strength: specific
    - id: Keyword_global_top500_047_real_time_geolocation_domain_context
      groups:
        - match_style: word
          terms:
            - real-time geolocation
            - real
            - time
            - geolocation
      strength: domain
risk_description: >-
  This concept detector looks for live-location, current-location, GPS-coordinate, and real-time-geolocation language indicating a person's present position rather than historical travel alone. A substantive match can permit immediate stalking, interception, coercion, or identification of an unattended home, directly affecting the located person and nearby associates. General mapping guidance and location-service documentation can match, but a current person-linked position creates time-sensitive safety harm without needing a long data history. Risk 8 SENSITIVE reflects serious contained privacy and safety consequences; PROTECTED would require a protected person, active operation, critical-service movement, bulk live tracking, or an imminent life-safety event.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
