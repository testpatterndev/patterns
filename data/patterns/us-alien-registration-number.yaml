schema: testpattern/v1
name: U.S. Alien Registration Number (A-Number)
slug: us-alien-registration-number
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects USCIS Alien Registration Numbers (A-Numbers). An A-Number is the unique identifier the Department of Homeland
  Security assigns to a noncitizen: the letter "A" followed by 7-9 digits, written compactly (A012345678) or grouped
  (A-123-456-789). A-Numbers appear on Green Cards, EADs, immigration court records, and Form I-9 / E-Verify data held by
  virtually every U.S. employer.
operation: >-
  Two regexes. The first matches a grouped A-Number with optional separators (A-123-456-789, A 12 345 678). The second
  matches a compact "A" + 8-9 digit body. Corroborative immigration keywords within 300 characters reduce false
  positives from the broad numeric body.
pattern: \bA[-#\s]?\d{3}[-\s]?\d{3}[-\s]?\d{2,3}\b
confidence: high
confidence_justification: >-
  High confidence: the mandatory "A" prefix plus a fixed 8-9 digit body and the optional grouping structure make this
  distinctive. Corroborative USCIS/immigration keywords are recommended because an "A" followed by digits can appear in
  unrelated reference codes.
jurisdictions:
  - us
regulations:
  - "State Breach Laws (US)"
  - "CCPA/CPRA"
  - FTC Act s5
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - alien registration number
    - alien number
    - A-Number
    - A#
    - USCIS
    - USCIS number
    - green card
    - permanent resident
    - immigration
    - Form I-9
    - E-Verify
    - EAD
    - department of homeland security
  proximity: 300
test_cases:
  should_match:
    - value: 'Alien Registration Number: A012345678'
      description: Labelled compact 9-digit A-Number
    - value: A-123-456-789
      description: Grouped A-Number with hyphen separators
    - value: USCIS Number A98765432
      description: Compact 8-digit A-Number with USCIS label
  should_not_match:
    - value: A1234567
      description: Only 7 digits after A in compact form (below the 8-digit minimum)
    - value: AB12345678
      description: Two leading letters, not a single "A" prefix
    - value: Please review the alien registration policy before the meeting
      description: Prose mentioning alien registration with no number value
false_positives:
  - description: >-
      Internal reference codes, asset tags, or invoice numbers of the form "A" + 8-9 digits in logistics or accounting
      systems unrelated to immigration.
    mitigation: >-
      Require corroborative USCIS/immigration keywords (alien number, green card, Form I-9, USCIS) within the proximity
      window to confirm an immigration-records context.
  - description: Catalogue or part numbers in technical documentation that share the A+digits shape.
    mitigation: Combine with document-type detection (HR / immigration forms) and placeholder-marker exclusion.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 7
risk_description: >-
  An A-Number is a lifelong government identifier tying a person to their immigration history. Exposure enables identity
  theft, immigration-status-based discrimination, and targeting of vulnerable populations, and constitutes a reportable
  breach of sensitive personal data.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://www.uscis.gov/glossary-term/50684
    title: "A-Number / Alien Registration Number (A-Number or A#) - USCIS"
created: '2026-06-13'
updated: '2026-06-13'
author: testpattern-community
license: MIT
