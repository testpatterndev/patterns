schema: testpattern/v1
name: Loyalty program balances
slug: au-top500-365-loyalty-program-balances
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to loyalty program balances in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:loyalty\s+program\s+balances|loyalty\s+program|points\s+balance|membership\s+tier|frequent\s+flyer|loyalty\s+card|accrued\s+points|member\s+number|loyalty\s+account|reward\s+points)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - loyalty program balances
    - loyalty
    - program
    - balances
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: loyalty program balances
      description: Primary topic phrase match
    - value: loyalty program
      description: Case-insensitive topic phrase match
    - value: points balance
      description: Alternative topic phrase match
    - value: membership tier
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to loyalty program balances appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_loyalty_program_balances
      matches:
        - ref: Evidence_loyalty_program_balances
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_loyalty_program_balances
      matches:
        - ref: Evidence_loyalty_program_balances
    - confidence_level: 65
      id_match: Pattern_loyalty_program_balances
      matches:
        - ref: Evidence_loyalty_program_balances
  regexes:
    - id: Pattern_loyalty_program_balances
      pattern: (?is)\b(?:loyalty\s+program\s+balances|loyalty\s+program|points\s+balance|membership\s+tier|frequent\s+flyer|loyalty\s+card|accrued\s+points|member\s+number|loyalty\s+account|reward\s+points)\b
  keywords:
    - id: Evidence_loyalty_program_balances
      groups:
        - match_style: word
          terms:
            - loyalty program balances
            - loyalty program
            - points balance
            - rewards
            - membership tier
            - frequent flyer
            - loyalty card
            - redemption
            - accrued points
            - member number
            - loyalty account
            - reward points
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
