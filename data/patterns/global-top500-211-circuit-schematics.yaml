  - version: 1.4.0
    date: '2026-07-16'
    description: >-
      Tier rebalance: enforcement now anchors on new Pattern_circuit_artifact (reference designator + pin/net/node/footprint relation, or netlist/sheet-number/EDA-file token) — 75 requires the anchor
      plus two unique artifact tokens, 85 three, both noise-gated; the circuit-design topic branch is demoted to discovery-only 65 so design-discipline prose can no longer enforce. Description now
      states enforcement denotes schematic/layout content, not the discipline of circuit design.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 812 without changing detector or package metadata.'
  - version: 1.3.0
