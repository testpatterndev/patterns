schema: testpattern/v1
name: Circuit schematics
slug: global-top500-211-circuit-schematics
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing circuit schematic or layout content in Australian contexts. Enforcement denotes actual schematic or layout artifacts (reference designators with pin/net/node/footprint
  relations, netlists, sheet numbers, EDA design files) — circuit-design topic language alone, i.e. the discipline of circuit design, is discovery-only. This information type is classified as personally
  identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:circuit\s+schematics|circuit\s+design|schematic\s+diagram|PCB\s+layout|electronic\s+design|intellectual\s+property|proprietary\s+design|hardware\s+design|component\s+layout|board\s+schematic)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - intellectual-property
corroborative_evidence:
  keywords:
    - circuit schematics
    - circuit
    - schematics
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: circuit schematics
      description: Primary topic phrase match
    - value: circuit design
      description: Case-insensitive topic phrase match
    - value: schematic diagram
      description: Alternative topic phrase match
    - value: PCB layout
      description: Additional topic phrase match
    - value: 'Sheet 3: U14 pin 7 connects to net VREF; R22 10k; source board.kicad_sch rev B.'
      description: Reference designators with pin/net relations plus an EDA filename prove schematic content (artifact enforcement branch)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: 'Tutorial sample schematic: U1 pin 1 to NET_A.'
      description: Tutorial/sample teaching material must not enforce (single artifact token, noise-gated)
    - value: The seating layout places component teams near each other.
      description: Layout/component words in organisational prose are not schematic content
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to circuit schematics appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_circuit_artifact
      matches:
        - ref: Pattern_circuit_artifact
          min_count: 3
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_circuit_artifact
      matches:
        - ref: Pattern_circuit_artifact
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_circuit_schematics
      matches:
        - ref: Evidence_circuit_schematics
  regexes:
    - id: Pattern_circuit_schematics
      pattern: >-
        (?is)\b(?:circuit\s+schematics|circuit\s+design|schematic\s+diagram|PCB\s+layout|electronic\s+design|intellectual\s+property|proprietary\s+design|hardware\s+design|component\s+layout|board\s+schematic)\b
    - id: Pattern_circuit_artifact
      pattern: >-
        (?im)(?:\b(?:R|C|U|Q|D|J)\d+\b[^\r\n]{0,80}\b(?:pin|net|node|footprint)\b|\b(?:\.kicad_sch|\.sch|\.brd|\.pcb|netlist|sheet\s+\d+)\b)
  keywords:
    - id: Evidence_circuit_schematics
      groups:
        - match_style: word
          terms:
            - circuit schematics
            - circuit design
            - schematic diagram
            - PCB layout
            - electronic design
            - intellectual property
            - proprietary design
            - hardware design
            - component layout
            - board schematic
risk_description: >-
  The detector matches circuit schematic, circuit design, schematic diagram, PCB layout, electronic design, hardware design, component layout, or proprietary-design terminology. A substantive schematic can reveal topology, interfaces, component choices, test points, and attack surfaces, enabling copying, reverse engineering, or targeted hardware exploitation. Public reference designs and educational diagrams can also match, so the normal unit is one bounded engineering design rather than an entire product portfolio. Risk 8 supports SENSITIVE InfoTech; PROTECTED would require critical-system hardware, exploitable safety controls, or aggregated architecture whose compromise causes significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
