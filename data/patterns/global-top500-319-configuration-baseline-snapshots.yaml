schema: testpattern/v1
name: Configuration baseline snapshots
slug: global-top500-319-configuration-baseline-snapshots
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies configuration baseline snapshots patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:configuration\s+baseline|baseline\s+snapshot|system\s+configuration|configuration\s+management|golden\s+image|configuration\s+audit|endpoint\s+management|hardening\s+baseline|security\s+baseline)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - configuration baseline snapshots
    - configuration
    - baseline
    - snapshots
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: configuration baseline
      description: Primary topic phrase match
    - value: baseline snapshot
      description: Case-insensitive topic phrase match
    - value: system configuration
      description: Alternative topic phrase match
    - value: configuration management
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The regex flags configuration baselines or snapshots, system configuration, configuration management, golden images, audits, endpoint management, hardening baselines, and security baselines. A genuine snapshot can reveal exact settings, enabled controls, software posture, deviations, and hardening assumptions that help an attacker identify weaknesses or reproduce a trusted image. The normal affected scale is one platform, endpoint class, or managed environment and its operators, while generic baseline standards and vendor guides can match without organisation-specific values. Risk 8 SENSITIVE reflects serious contained control exposure; PROTECTED would require critical-system configurations or significant broad compromise potential.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_configuration_baseline_snapshots
      matches:
        - ref: Pattern_global_top500_319_configuration_baseline_snapshots_label_context
        - ref: Keyword_global_top500_319_configuration_baseline_snapshots_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_configuration_baseline_snapshots
      matches:
        - ref: Keyword_configuration_baseline_snapshots
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_configuration_baseline_snapshots
      pattern: >-
        (?is)\b(?:configuration\s+baseline|baseline\s+snapshot|system\s+configuration|configuration\s+management|golden\s+image|configuration\s+audit|endpoint\s+management|hardening\s+baseline|security\s+baseline)\b
    - id: Pattern_global_top500_319_configuration_baseline_snapshots_label_context
      pattern: (?i)\b(?:configuration\s+baseline\s+snapshots)\b
  keywords:
    - id: Keyword_configuration_baseline_snapshots
      groups:
        - match_style: word
          terms:
            - configuration baseline
            - baseline snapshot
            - system configuration
            - configuration management
            - CMDB
            - golden image
            - configuration audit
            - operations
            - resilience
            - endpoint management
            - hardening baseline
            - security baseline
      strength: specific
    - id: Keyword_global_top500_319_configuration_baseline_snapshots_domain_context
      groups:
        - match_style: word
          terms:
            - configuration baseline snapshots
            - configuration
            - baseline
            - snapshots
      strength: domain
