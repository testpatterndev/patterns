schema: testpattern/v1
name: API interface specifications
slug: global-top500-244-api-interface-specifications
version: 1.2.0
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies api interface specifications patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: biometric-facial. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:API\s+specification|interface\s+specification|API\s+documentation|endpoint\s+definition|API\s+schema|REST\s+API|API\s+contract|service\s+interface|API\s+reference)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api interface specifications
    - api
    - interface
    - specifications
    - software
    - engineering
    - architecture
  proximity: 300
  keyword_lists:
    - biometric-facial
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: API specification
      description: Primary topic phrase match
    - value: interface specification
      description: Case-insensitive topic phrase match
    - value: API documentation
      description: Alternative topic phrase match
    - value: endpoint definition
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: openapi post
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_api_interface_specifications
      matches:
        - ref: Pattern_global_top500_244_api_interface_specifications_label_context
        - ref: Keyword_global_top500_244_api_interface_specifications_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_api_interface_specifications
      matches:
        - ref: Keyword_api_interface_specifications
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_api_interface_specifications
      pattern: (?is)\b(?:API\s+specification|interface\s+specification|API\s+documentation|endpoint\s+definition|API\s+schema|REST\s+API|API\s+contract|service\s+interface|API\s+reference)\b
    - id: Pattern_global_top500_244_api_interface_specifications_label_context
      pattern: (?i)\b(?:api\s+interface\s+specifications)\b
  keywords:
    - id: Keyword_api_interface_specifications
      groups:
        - match_style: word
          terms:
            - API specification
            - interface specification
            - API documentation
            - endpoint definition
            - API schema
            - REST API
            - API contract
            - service interface
            - API reference
            - OpenAPI
      strength: specific
    - id: Keyword_global_top500_244_api_interface_specifications_domain_context
      groups:
        - match_style: word
          terms:
            - api interface specifications
            - text: api
              case_sensitive: true
            - interface
            - specifications
      strength: domain
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
