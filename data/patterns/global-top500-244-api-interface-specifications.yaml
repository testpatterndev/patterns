schema: testpattern/v1
name: API interface specifications
slug: global-top500-244-api-interface-specifications
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies api interface specifications patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: biometric-facial.
pattern: (?is)\b(?:api\s+specification|interface\s+specification|api\s+endpoint|REST\s+API|api\s+documentation|api\s+contract|api\s+schema|service\s+interface)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api interface specifications
    - api
    - interface
    - specifications
    - software
    - engineering
    - architecture
  proximity: 300
  keyword_lists:
    - biometric-facial
test_cases:
  should_match:
    - value: api specification
      description: Primary topic phrase match
    - value: interface specification
      description: Case-insensitive topic phrase match
    - value: api endpoint
      description: Alternative topic phrase match
    - value: REST API
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: openapi post
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_api_interface_specs
      matches:
        - ref: Evidence_api_interface_specs
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_api_interface_specs
      matches:
        - ref: Evidence_api_interface_specs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_api_interface_specs
      matches:
        - ref: Evidence_api_interface_specs
  regexes:
    - id: Pattern_api_interface_specs
      pattern: (?is)\b(?:api\s+specification|interface\s+specification|api\s+endpoint|REST\s+API|api\s+documentation|api\s+contract|api\s+schema|service\s+interface)\b
  keywords:
    - id: Evidence_api_interface_specs
      groups:
        - match_style: word
          terms:
            - api specification
            - interface specification
            - openapi
            - swagger
            - api endpoint
            - REST API
            - api documentation
            - api contract
            - api schema
            - service interface
risk_description: >-
  This concept detector recognizes API specification, interface specification, and endpoint language, so it marks an interface-design topic or artifact rather than a live credential. A disclosed specification can reveal endpoint inventory, parameters, object models, authentication assumptions, and undocumented operations that accelerate probing or abuse. The API owner and consumers may face targeted service or data risk, but an attacker generally still needs network reach, credentials, or an exploitable implementation flaw. Risk 8 and SENSITIVE are defensible for a complete internal specification, while privileged administrative endpoints, critical-service interfaces, or embedded secrets would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
