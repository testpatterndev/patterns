schema: testpattern/v1
name: Privacy complaint investigations
slug: au-top500-473-privacy-complaint-investigations
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to privacy complaint investigations in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:privacy\s+complaint\s+investigations|privacy\s+complaint|complaint\s+investigation|OAIC\s+complaint|remedial\s+action|interference\s+with\s+privacy|breach\s+finding)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - privacy complaint investigations
    - privacy
    - complaint
    - investigations
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: privacy complaint investigations
      description: Primary topic phrase match
    - value: privacy complaint
      description: Case-insensitive topic phrase match
    - value: complaint investigation
      description: Alternative topic phrase match
    - value: OAIC complaint
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to privacy complaint investigations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_privacy_complaint
      matches:
        - ref: Evidence_privacy_complaint
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_privacy_complaint
      matches:
        - ref: Evidence_privacy_complaint
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_privacy_complaint
      matches:
        - ref: Evidence_privacy_complaint
  regexes:
    - id: Pattern_privacy_complaint
      pattern: (?is)\b(?:privacy\s+complaint\s+investigations|privacy\s+complaint|complaint\s+investigation|OAIC\s+complaint|remedial\s+action|interference\s+with\s+privacy|breach\s+finding)\b
  keywords:
    - id: Evidence_privacy_complaint
      groups:
        - match_style: word
          terms:
            - privacy complaint investigations
            - privacy complaint
            - complaint investigation
            - complainant
            - OAIC complaint
            - determination
            - conciliation
            - remedial action
            - interference with privacy
            - privacy
            - compliance
            - breach finding
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/privacy-complaints
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines
