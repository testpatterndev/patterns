schema: testpattern/v1
name: Cabinet Submission
slug: au-cabinet-submission
version: 1.4.0
type: keyword_list
pattern_class: concept
description: Detects Cabinet submissions, memoranda, and decision documents at federal and state government levels.
operation: >-
  Keyword-based detection matching cabinet submission, cabinet memorandum, cabinet decision, and related terms.
  Corroborative evidence: 7 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "Criminal Code 1899 (Qld)"
- "IPA 2009 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - government
  - cabinet
test_cases:
  should_match:
    - value: 'Cabinet submission for consideration: policy reform proposal'
      description: Test match 1
    - value: Cabinet memorandum regarding National Cabinet decision outcomes
      description: Test match 2
    - value: 'For Cabinet approval: infrastructure funding allocation'
      description: Test match 3
  should_not_match:
    - value: Kitchen cabinet installation guide
      description: Non-match 1
    - value: The filing cabinet was full
      description: Non-match 2
false_positives:
  - description: Generic use of cabinet referring to furniture.
    mitigation: Require government-specific context like submission, memorandum, or decision.
exports:
  - yaml
scope: narrow
risk_rating: 10
risk_description: Cabinet document exposure reveals government policy deliberations and decisions.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_cabinet
      matches:
        - ref: Keyword_cabinet
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_cabinet
      matches:
        - ref: Keyword_government
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_cabinet
      pattern: (?i)\b(?:cabinet\s+(?:submission|memorandum|decision|approval)|for\s+cabinet\s+(?:consideration|approval))\b
  keywords:
    - id: Keyword_cabinet
      groups:
        - match_style: word
          terms:
            - Cabinet submission
            - Cabinet minute
            - Cabinet-in-Confidence
            - Cabinet memorandum
            - Cabinet decision
            - PM&C
            - Department of Prime Minister
            - for Cabinet
      strength: specific
    - id: Keyword_government
      groups:
        - match_style: word
          terms:
            - government
            - Australian Government
            - Commonwealth
            - department
            - agency
            - public sector
      strength: generic
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.
author: testpattern-community
license: MIT
keywords:
  - Cabinet submission
  - Cabinet minute
  - Cabinet-in-Confidence
  - Cabinet memorandum
  - Cabinet decision
  - for Cabinet consideration
  - for Cabinet approval
  - National Cabinet
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.'
      - 'Aligned recommended_confidence to 85.'
