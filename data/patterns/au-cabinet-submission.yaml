schema: testpattern/v1
name: Cabinet Submission
slug: au-cabinet-submission
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive Australian federal and state Cabinet submissions, memoranda, and approval
  papers. Topic phrases are retained for discovery; enforcement requires purpose, recommendation,
  financial, consultation, implementation, risk, regulatory, or decision-sought sections, and high
  confidence also requires a formal Cabinet marking, minute, decision, or submission identifier.
operation: >-
  Regex_cabinet recognises Cabinet submission, memorandum, decision, and approval topics. The topic
  alone is discovery-only at 65. Substantive submission sections raise it to 75; those sections plus a
  Cabinet-in-Confidence marking or formal submission/minute/decision identifier reach 85. Enforcing
  tiers reject explicit templates and training examples.
pattern: (?is)\b(?:cabinet\s+(?:submission|memorandum|decision|approval)|for\s+cabinet\s+(?:consideration|approval))\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive submission content rather than a title. High confidence adds
  formal Cabinet handling or record identifiers.
jurisdictions:
  - au
regulations:
- "Criminal Code 1899 (Qld)"
- "IPA 2009 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - government
  - cabinet
test_cases:
  should_match:
    - value: Cabinet submission
      description: Low-tier probe - Cabinet topic without submission content
    - value: 'Cabinet submission: purpose, recommendations, financial implications, consultation, implementation plan, risks, and decision sought'
      description: Medium-tier probe - substantive submission sections without formal marking or identifier
    - value: 'Cabinet-in-Confidence Cabinet submission number: CAB-2026-104: purpose, recommendations, financial implications, consultation, risks, implementation plan, and decision sought'
      description: High-tier probe - substantive submission with Cabinet marking and formal identifier
  should_not_match:
    - value: Kitchen cabinet installation guide
      description: Non-match 1
    - value: The filing cabinet was full
      description: Furniture usage
    - value: 'The public guide explains how agencies prepare a Cabinet submission.'
      description: Public process guidance without a submission record
    - value: 'Training example: Cabinet-in-Confidence Cabinet submission CAB-2026-104 with recommendations and decision sought'
      description: Explicit training content must not enforce
false_positives:
  - description: Public process guidance, historical commentary, and generic policy material discuss Cabinet submissions, recommendations, and decisions without containing a live submission.
    mitigation: Keep Cabinet topics discovery-only and require substantive purpose, recommendation, financial, consultation, implementation, risk, regulatory, or decision-sought content.
  - description: Training submissions can contain realistic Cabinet markings, numbers, sections, recommendations, and decisions sought.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - yaml
scope: narrow
risk_rating: 10
risk_description: >-
  The detector recognises Cabinet submissions, memoranda, decisions, and papers expressly prepared for Cabinet consideration or approval, not furniture-related language. A genuine submission can expose collective executive deliberation, unreleased policy, legal and fiscal advice, stakeholder effects, and announcement timing before an authorised decision is public. Premature disclosure can prejudice Cabinet confidentiality, negotiations, markets, and whole-of-government administration at a scale capable of significant damage. Risk 10 PROTECTED Government follows from the protected executive process and broad consequence; PROTECTED is already the highest accepted classification tier.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_cabinet
      matches:
        - ref: Evidence_cabinet_submission_content
        - ref: Evidence_cabinet_formal_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_cabinet
      matches:
        - ref: Evidence_cabinet_submission_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_cabinet
  regexes:
    - id: Regex_cabinet
      pattern: (?i)\b(?:cabinet\s+(?:submission|memorandum|decision|approval)|for\s+cabinet\s+(?:consideration|approval))\b
    - id: Evidence_cabinet_formal_record
      pattern: >-
        (?i)\b(?:Cabinet-in-Confidence|Cabinet\s+(?:submission|minute|decision)\s+(?:no\.?|number|ref(?:erence)?)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|CAB(?:INET)?[-/][A-Z0-9][A-Z0-9/-]{3,}|Cabinet\s+minute\s+(?:no\.?\s*)?\d+)\b
  keywords:
    - id: Evidence_cabinet_submission_content
      groups:
        - match_style: word
          terms:
            - purpose
            - recommendations
            - decision sought
            - financial implications
            - consultation
            - implementation plan
            - risk assessment
            - regulatory impact
            - human rights implications
            - stakeholder impacts
      strength: domain
created: '2026-02-09'
updated: '2026-07-04'
