schema: testpattern/v1
name: Netherlands Phone Number
slug: nl-phone-number
version: 1.1.0
type: regex
engine: universal
description: >-
  Detects Dutch national telephone numbers per the ACM-administered numbering plan: 10-digit numbers
  (leading trunk 0 included) covering geographic numbers (area code first significant digit 1-5 or 7, e.g.
  020 Amsterdam, 010 Rotterdam, 070 Den Haag) and mobile numbers (06 prefix), plus the +31 international
  form (leading 0 dropped), including the widespread "+31 (0)6 12345678" letterhead rendering (a
  common-but-nonstandard practice — ITU-T E.123 advises against the parenthesised trunk digit in
  international notation, but it is ubiquitous on Dutch letterheads, so it is matched for detection
  purposes). Numbers beginning 08 (0800 free-of-charge service numbers, 088 non-geographic business
  lines) and 09 (0900/0906/0909 premium-rate information numbers) are intentionally out of scope — these
  are organizational/service numbers rather than personal PII, mirroring how uk-phone-number and
  fr-phone-number scope out their own non-geographic service ranges. Note this also excludes the 085 and
  091 location-independent subscriber ranges (VoIP numbers ACM makes available to individuals as well as
  businesses): a personal 085/091 VoIP line is therefore a known false negative, accepted because the
  085/088/091 block is predominantly organizational in practice and cannot be split from it structurally.
operation: >-
  Validation: none (Dutch numbers have no checksum). Reference: ACM (Autoriteit Consument & Markt),
  Telefoonnummers, https://www.acm.nl/nl/telefoonnummers; ACM ConsuWijzer, De verdeling van telefoonnummers
  in Nederland, https://consument.acm.nl/telefoon-internet-en-televisie/telefoonnummers/verdeling-telefoonnummers-nederland
  (geographic area-code-to-region mapping; "een mobiel nummer begint altijd met 06"; 0800/0900/0906/0909/18
  service-number prefixes); ACM factsheet on 06 numbers (10-digit total),
  https://www.acm.nl/sites/default/files/old_publication/publicaties/16001_097-en-06-nummers-informatie-voor-telecomaanbieders-20160701.pdf.
  Corroborative evidence: keywords within 300 characters. Keyword lists: phone-context. Both the domestic
  and international (+31) sub-regexes are evidence-gated at every tier — no tier fires without positive
  corroborative evidence, per the phone-family convention — see confidence_justification.
pattern: '(?<!\d)(?:\+31[\s.-]?(?:\(0\)[\s.-]?)?[1-7][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|0[1-7][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d)(?!\d)'
confidence: medium
confidence_justification: >-
  Medium confidence: the leading-digit constraint (01-07 domestic, restricting to geographic area codes and
  the 06 mobile block) and the fixed 10-digit total length narrow the format, but Dutch numbers carry no
  checksum and a 10-digit sequence with those leading digits is still a high digit-collision format. Per the
  phone-family convention (every tier requires positive corroborative evidence; a +CC prefix alone is
  insufficient gating; there is no 65 rung), both the domestic and +31 international sub-regexes are
  evidence-gated at every tier: 75 requires generic phone-context evidence and 85 requires country-specific
  phone keywords with template/noise exclusion. The literal +31 prefix improves precision when present but
  is not by itself sufficient gating.
jurisdictions:
  - nl
regulations:
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - pii
  - contact-information
corroborative_evidence:
  keywords:
    - phone
    - mobile
    - call
    - text
    - contact number
    - Dutch phone number
    - telefoonnummer
    - call me at
  proximity: 300
  keyword_lists:
    - phone-context
test_cases:
  should_match:
    - value: 'Mobiel: 06 12345678'
      description: Domestic mobile, 06 prefix, illustrative synthetic value (no official ACM-reserved fictional range was found — verified absent during research), space-separated
    - value: 'Telefoonnummer: 020 1234567'
      description: Domestic geographic, Amsterdam area code (020), illustrative synthetic value
    - value: 'Bel: 070-1234567'
      description: Domestic geographic, Den Haag area code (070), hyphenated
    - value: 'International: +31 6 12345678'
      description: International +31 form of the mobile number, leading 0 dropped
    - value: 'Briefhoofd: +31 (0)6 12345678'
      description: Widespread "+CC (0)" letterhead rendering — nonstandard per E.123 but ubiquitous on Dutch letterheads
  should_not_match:
    - value: '0800 123456'
      description: Leading digit 8 is a free-of-charge service number (0800), out of scope for this personal-communications pattern
    - value: '085 1234567'
      description: 085 location-independent VoIP range — out of scope with the rest of the 08 block (documented known false negative for personal 085 lines)
    - value: '0900-1234567'
      description: Leading digit 9 is a premium-rate information number (0900), out of scope
    - value: '06 1234567'
      description: Only 7 digits after the 06 mobile prefix, one short of the required 8
    - value: '906123456789'
      description: Valid-shaped digit run embedded inside a longer reference number, rejected by digit boundaries
false_positives:
  - description: >-
      A 10-digit sequence with a 01-07 leading digit can still coincidentally match invoice numbers, order
      numbers, or other structured identifiers of the same length and leading-digit distribution.
    mitigation: >-
      Every tier — for both the domestic and +31 international sub-regexes — requires positive
      phone-context or country-specific evidence within 300 characters; no zero-evidence tier exists, so a
      bare digit run without corroborating context never fires at any confidence level.
  - description: >-
      No official ACM-reserved fictional or test number range was found for the Netherlands (confirmed by web
      research, unlike NANP's 555-01XX or Ofcom's drama numbers), so illustrative synthetic values were used
      instead of an authoritative reserved range.
    mitigation: >-
      Test values use clearly non-representative sequential digit patterns; deployers should substitute their
      own tenant's synthetic test data for live validation rather than relying on a non-existent official
      reserved range.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: phone-context
      as: Evidence_phone_context
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_nl_phone_domestic
      matches:
        - ref: Keyword_nl_phone_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_nl_phone_domestic
      matches:
        - ref: Evidence_phone_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_nl_phone_intl
      matches:
        - ref: Keyword_nl_phone_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_nl_phone_intl
      matches:
        - ref: Evidence_phone_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_nl_phone_domestic
      pattern: '(?<!\d)0[1-7][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d(?!\d)'
    - id: Regex_nl_phone_intl
      pattern: '(?<!\d)\+31[\s.-]?(?:\(0\)[\s.-]?)?[1-7][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d(?!\d)'
  keywords:
    - id: Keyword_nl_phone_specific
      groups:
        - match_style: word
          terms:
            - Dutch phone number
            - Dutch mobile number
            - telefoonnummer
            - mobiel nummer
            - mobiele nummer
      strength: specific
risk_rating: 5
risk_description: >-
  Phone number exposure enables targeted vishing (voice phishing), smishing (SMS phishing), and social
  engineering, and can be combined with other PII for identity correlation. Lower direct financial risk than
  a payment or government-ID identifier on its own.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
references:
  - url: https://www.acm.nl/nl/telefoonnummers
    title: "ACM: Telefoonnummers"
  - url: https://consument.acm.nl/telefoon-internet-en-televisie/telefoonnummers/verdeling-telefoonnummers-nederland
    title: "ACM ConsuWijzer: De verdeling van telefoonnummers in Nederland (area-code and service-number breakdown)"
  - url: https://www.acm.nl/sites/default/files/old_publication/publicaties/16001_097-en-06-nummers-informatie-voor-telecomaanbieders-20160701.pdf
    title: "ACM: Informatie over 097- en 06-nummers — factsheet voor telecomaanbieders (10-digit mobile numbers)"
  - url: https://www.rijksoverheid.nl/onderwerpen/telecommunicatie/vraag-en-antwoord/soorten-telefoonnummers
    title: "Rijksoverheid: Welke soorten telefoonnummers zijn er? — 085 (VoIP) and 091 (new services) location-independent ranges, available to individuals and businesses"
  - url: https://www.itu.int/rec/T-REC-E.123
    title: "ITU-T Recommendation E.123: Notation for national and international telephone numbers — the international \"(0)\" trunk-digit form is documented as common practice that E.123 advises against"
created: '2026-07-06'
updated: '2026-07-08'
changelog:
  - version: 1.1.0
    date: '2026-07-08'
    description: >-
      Rendering coverage: the "+31 (0)..." letterhead form (nonstandard per E.123 but ubiquitous on Dutch
      letterheads). Docs: corrected the 08/09 out-of-scope examples (0800 belongs to the 08 block, not
      09) and documented the excluded 085/091 location-independent VoIP ranges as a known false negative
      for personal lines. Hygiene: dropped the bare generic term "mobiel" and generic English phrases
      (call me at, text me at) from the country-specific 85-tier keyword dict, added "mobiele nummer";
      added the noise-exclusion NOT node to both 75 tiers per the identifier-family convention.
  - version: 1.0.0
    date: '2026-07-06'
    description: Initial release.
