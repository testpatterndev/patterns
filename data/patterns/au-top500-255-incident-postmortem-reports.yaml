schema: testpattern/v1
name: Incident postmortem reports
slug: au-top500-255-incident-postmortem-reports
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies incident postmortem reports patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?i)\b(?:postmortem|post-incident|root\s+cause|timeline|corrective\s+actions?|lessons\s+learned)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - incident postmortem reports
    - incident
    - postmortem
    - reports
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: 'Postmortem'
      description: Topic phrase present
    - value: 'postmortem'
      description: Topic phrase, lowercase
    - value: 'this record references the postmortem held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_incident_postmortem
      matches:
        - ref: Evidence_incident_postmortem
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_incident_postmortem
      matches:
        - ref: Evidence_incident_postmortem
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_incident_postmortem
  regexes:
    - id: Pattern_incident_postmortem
      pattern: (?i)\b(?:postmortem|post-incident|root\s+cause|timeline|corrective\s+actions?|lessons\s+learned)\b
  keywords:
    - id: Evidence_incident_postmortem
      groups:
        - match_style: word
          terms:
            - incident postmortem
            - post-incident review
            - lessons learned
            - corrective actions
            - incident timeline
            - root cause analysis
            - incident report
            - blameless postmortem
            - outage report
            - service disruption
      strength: specific
risk_description: >-
  The detector finds postmortem language in incident or operational context, identifying a retrospective topic or report rather than a current incident credential. A disclosed report can expose root causes, failure sequences, monitoring blind spots, recovery procedures, affected services, and residual weaknesses that support repeat attacks or public embarrassment. The service owner, responders, customers, and any named staff may face serious operational and reputational harm, but an attacker still needs a usable weakness and the report may describe controls already fixed. Risk 8 and SENSITIVE fit a substantive internal postmortem, while unresolved critical-service failures, sensitive victim detail, or reusable compromise paths would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
