schema: testpattern/v1
name: Customer segmentation outputs
slug: global-top500-371-customer-segmentation-outputs
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to customer segmentation outputs in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:customer\s+segmentation|segmentation\s+output|customer\s+segment|market\s+segment|customer\s+cluster|persona\s+profile|demographic\s+segment|behavioral\s+segment|target\s+audience|customer\s+cohort|segmentation\s+model|marketing\s+analytics)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - customer segmentation outputs
    - customer
    - segmentation
    - outputs
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: customer segmentation
      description: Primary topic phrase match
    - value: segmentation output
      description: Case-insensitive topic phrase match
    - value: customer segment
      description: Alternative topic phrase match
    - value: market segment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to customer segmentation outputs appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_customer_segmentation
      matches:
        - ref: Pattern_global_top500_371_customer_segmentation_outputs_label_context
        - ref: Keyword_global_top500_371_customer_segmentation_outputs_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_371_customer_segmentation_outputs_noise_exclusion
    - confidence_level: 75
      id_match: Regex_customer_segmentation
      matches:
        - ref: Keyword_customer_segmentation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_371_customer_segmentation_outputs_noise_exclusion
    - confidence_level: 65
      id_match: Regex_customer_segmentation
      matches:
        - ref: Keyword_customer_segmentation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_371_customer_segmentation_outputs_noise_exclusion
  regexes:
    - id: Regex_customer_segmentation
      pattern: (?is)\b(?:customer\s+segmentation|segmentation\s+output|customer\s+segment|market\s+segment|customer\s+cluster|persona\s+profile|demographic\s+segment|behavioral\s+segment|target\s+audience|customer\s+cohort|segmentation\s+model|marketing\s+analytics)\b
    - id: Pattern_global_top500_371_customer_segmentation_outputs_label_context
      pattern: (?i)\\b(?:customer\\s+segmentation\\s+outputs|customer|segmentation|outputs|top500)\\b
  keywords:
    - id: Keyword_customer_segmentation
      groups:
        - match_style: word
          terms:
            - customer segmentation
            - segmentation output
            - customer segment
            - market segment
            - customer cluster
            - persona profile
            - demographic segment
            - behavioral segment
            - target audience
            - customer cohort
            - segmentation model
            - marketing analytics
    - id: Keyword_global_top500_371_customer_segmentation_outputs_domain_context
      groups:
        - match_style: word
          terms:
            - customer segmentation outputs
            - customer
            - segmentation
            - outputs
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_371_customer_segmentation_outputs_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
