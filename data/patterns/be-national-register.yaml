schema: testpattern/v1
name: Rijksregisternummer
slug: be-national-register
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Rijksregisternummer patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly,
  or use this version as a starting point for customisation.
operation: >-
  Checksum: Mod 97 (NOT enforced in this regex-only pattern; structural detection only). Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for
  template/sample/test text.
pattern: \b\d{11}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - eu
  - be
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '85010100145'
      description: Standard Belgian national register number
    - value: '90123100234'
      description: Alternate register number
    - value: '00010100456'
      description: 2000-born register number
  should_not_match:
    - value: 1234567890
      description: Only 10 digits instead of 11
    - value: 123456789012
      description: 12 digits instead of 11
    - value: 1234567890A
      description: Contains a letter instead of all digits
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Long numeric sequences in unrelated contexts (tracking numbers, serial codes) matching the Rijksregisternummer format
    mitigation: Use corroborative keywords and, where available, checksum validation to filter false matches.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_be_national_register
      matches:
        - ref: Pattern_be_national_register_label_context
        - ref: Keyword_be_national_register_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_be_national_register
      matches:
        - ref: Keyword_be_national_register_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_be_national_register
      matches:
        - ref: Keyword_be_national_register_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_be_national_register
      pattern: \b\d{11}\b
    - id: Pattern_be_national_register_label_context
      pattern: (?i)\b(?:rijksregisternummer|national|register)\b
  keywords:
    - id: Keyword_be_national_register_specific
      groups:
        - match_style: word
          terms:
            - rijksregisternummer
            - numéro de registre national
            - numéro national
            - nationaal nummer
            - registre national
            - rijksregister
            - national register number
            - Belgian national number
            - numéro d'identification
            - identificationsnummer
            - insz
            - niss
      strength: domain
    - id: Keyword_be_national_register_general
      groups:
        - match_style: word
          terms:
            - identifier
            - number
            - text: ID
              case_sensitive: true
            - national number
            - register number
            - identity number
            - identiteit
            - identité
            - bevolkingsregister
      strength: domain
    - id: Keyword_be_national_register_domain_context
      groups:
        - match_style: word
          terms:
            - rijksregisternummer
            - national
      strength: domain
  filters:
    - id: Filter_be_national_register_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  This reference pattern detects Belgium's national-register number, an 11-digit identifier derived partly from birth information. The number can reveal limited biographical cues and link a person across civic, social-security, health, and employment records. A single value can support impersonation but is not a register dossier, identity-card image, credential, or authority to access services, and this regex does not enforce its stated checksum. Risk 5 and OFFICIAL are proportionate; a national-register extract or linked electronic identity credential would raise the impact.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-belgium-national-number
    title: Belgium national number entity definition - Microsoft Learn
