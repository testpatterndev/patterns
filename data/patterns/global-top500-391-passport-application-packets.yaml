schema: testpattern/v1
name: Passport application packets
slug: global-top500-391-passport-application-packets
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to passport application packets in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:passport\s+application\s+packets|passport\s+renewal|passport\s+number|travel\s+document|identity\s+verification|passport\s+office|citizenship\s+evidence|birth\s+certificate|passport\s+photograph|consular\s+services|passport\s+issuance|nationality\s+verification)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - passport application packets
  proximity: 240
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: passport application packets
      description: Primary topic phrase match
    - value: passport renewal
      description: Case-insensitive topic phrase match
    - value: passport number
      description: Alternative topic phrase match
    - value: travel document
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: immigration case
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to passport application packets appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_passport_application
      matches:
        - ref: Pattern_global_top500_391_passport_application_packets_label_context
        - ref: Keyword_global_top500_391_passport_application_packets_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_passport_application
      matches:
        - ref: Keyword_passport_application
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_passport_application
      matches:
        - ref: Keyword_passport_application
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_passport_application
      pattern: >-
        (?is)\b(?:passport\s+application\s+packets|passport\s+renewal|passport\s+number|travel\s+document|identity\s+verification|passport\s+office|citizenship\s+evidence|birth\s+certificate|passport\s+photograph|consular\s+services|passport\s+issuance|nationality\s+verification)\b
    - id: Pattern_global_top500_391_passport_application_packets_label_context
      pattern: (?i)\\b(?:passport\\s+application\\s+packets|passport|application|packets|top500)\\b
  keywords:
    - id: Keyword_passport_application
      groups:
        - match_style: word
          terms:
            - passport application packets
            - passport renewal
            - passport number
            - travel document
            - identity verification
            - passport office
            - citizenship evidence
            - birth certificate
            - passport photograph
            - consular services
            - passport issuance
            - nationality verification
    - id: Keyword_global_top500_391_passport_application_packets_domain_context
      groups:
        - match_style: word
          terms:
            - passport application packets
            - passport
            - application
            - packets
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
