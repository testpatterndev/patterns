schema: testpattern/v1
name: Ethics hotline case records
slug: au-top500-170-ethics-hotline-case-records
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to ethics hotline case records in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:ethics\s+hotline\s+case\s+records|ethics\s+hotline|whistleblower\s+hotline|anonymous\s+report|case\s+record|complaint\s+intake|ethics\s+violation|code\s+of\s+conduct|misconduct\s+report|confidential\s+disclosure|speak\s+up|integrity\s+line)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - ethics hotline case records
    - ethics
    - hotline
    - case
    - records
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: ethics hotline case records
      description: Primary topic phrase match
    - value: ethics hotline
      description: Case-insensitive topic phrase match
    - value: whistleblower hotline
      description: Alternative topic phrase match
    - value: anonymous report
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to ethics hotline case records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_ethics_hotline
      matches:
        - ref: Evidence_ethics_hotline
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_ethics_hotline
      matches:
        - ref: Evidence_ethics_hotline
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_ethics_hotline
      matches:
        - ref: Evidence_ethics_hotline
  regexes:
    - id: Pattern_ethics_hotline
      pattern: >-
        (?is)\b(?:ethics\s+hotline\s+case\s+records|ethics\s+hotline|whistleblower\s+hotline|anonymous\s+report|case\s+record|complaint\s+intake|ethics\s+violation|code\s+of\s+conduct|misconduct\s+report|confidential\s+disclosure|speak\s+up|integrity\s+line)\b
  keywords:
    - id: Evidence_ethics_hotline
      groups:
        - match_style: word
          terms:
            - ethics hotline case records
            - ethics hotline
            - whistleblower hotline
            - anonymous report
            - case record
            - complaint intake
            - ethics violation
            - code of conduct
            - misconduct report
            - confidential disclosure
            - speak up
            - integrity line
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
