schema: testpattern/v1
name: Corporate records under seal
slug: au-top500-180-corporate-records-under-seal
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to corporate records under seal in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:corporate\s+records\s+under\s+seal|under\s+seal|company\s+seal|common\s+seal|sealed\s+document|executed\s+under\s+seal)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - governance
  - legal
corroborative_evidence:
  keywords:
    - corporate records under seal
    - corporate
    - records
    - seal
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: corporate records under seal
      description: Primary topic phrase match
    - value: under seal
      description: Case-insensitive topic phrase match
    - value: company seal
      description: Alternative topic phrase match
    - value: common seal
      description: Additional topic phrase match
    - value: 'Deed executed under common seal of Harbor Ltd; seal affixed 14 Jul; directors A. Cole and B. Ng witnessed'
      description: Corporate deed with seal execution language (seal phrase anchor plus deed/common-seal corroboration enforces)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
    - value: Company constitution lodged with ASIC.
      description: Corporate governance document without seal execution language must not match
    - value: Registered office changed address
      description: Corporate administration without sealing must not match
    - value: Sample deed showing where the seal is affixed
      description: Instructional sample with no seal-bearing anchor phrase must not match
false_positives:
  - description: Common words and phrases related to corporate records under seal appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_corporate_records_seal
      matches:
        - ref: Evidence_corporate_records_seal
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_corporate_records_seal
      matches:
        - ref: Evidence_corporate_records_seal
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_corporate_records_seal
      matches:
        - ref: Evidence_corporate_records_seal
  regexes:
    - id: Pattern_corporate_records_seal
      pattern: >-
        (?is)\b(?:corporate\s+records\s+under\s+seal|under\s+seal|company\s+seal|common\s+seal|sealed\s+document|executed\s+under\s+seal)\b
  keywords:
    - id: Evidence_corporate_records_seal
      groups:
        - match_style: word
          terms:
            - corporate records under seal
            - under seal
            - company seal
            - common seal
            - sealed document
            - executed under seal
            - deed
            - corporate register
            - statutory record
            - company constitution
            - ASIC lodgement
            - registered office
risk_description: >-
  The pattern recognises references to corporate records under seal, a company seal, a common seal, or the phrase under seal; it is not a classifier for a complete sealed court file. Such language can identify formal execution or record status, but a third party needs the underlying instrument, parties, and transaction details to cause material harm. Corporate governance templates, execution blocks, policies, and public filings can all contain the same terms. Risk 4 and OFFICIAL are proportionate, while SENSITIVE would require a non-public sealed instrument, restricted filing, fraud-enabling seal specimen, or confidential transaction record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
