schema: testpattern/v1
name: PyPI API Token
slug: global-pypi-api-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects PyPI (Python Package Index) upload tokens. The fixed marker
  pypi-AgEIcHlwaS5vcmc is the base64 encoding of "pypi.org", making these tokens
  near-unmistakable. A leaked token lets an attacker publish malicious package releases.
operation: 'Prefixed macaroon token: pypi-AgEIcHlwaS5vcmc followed by a long base64url body. Corroborative evidence: keywords within 300 characters.'
pattern: pypi-AgEIcHlwaS5vcmc[A-Za-z0-9_-]{50,1000}
confidence: high
confidence_justification: >-
  High confidence: the static pypi-AgEIcHlwaS5vcmc marker decodes to "pypi.org" and does
  not occur outside genuine PyPI tokens, giving near-zero false positives.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - pypi
    - pypi.org
    - twine
    - upload token
    - api token
    - PYPI_TOKEN
    - __token__
  proximity: 300
test_cases:
  should_match:
    - value: pypi-AgEIcHlwaS5vcmcABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789
      description: Exact 65 probe - macaroon marker and body without independent publish context
    - value: 'twine upload credential pypi-AgEIcHlwaS5vcmcaB3dE6gH9jK2mN5pQ8sT1uV4wX7yZ0aB3dE6gH9jK2mN5pQ8sT1uV4wX7yZ0aB3dE'
      description: Exact 75 probe - token with Twine upload context
    - value: 'PyPI.org package publish secret PYPI_TOKEN=pypi-AgEIcHlwaS5vcmczZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIhHgGfFeEdDcCbBaA0123456789_-'
      description: Exact 85 probe - PyPI publish context plus canonical token assignment
  should_not_match:
    - value: pypi-AgEIcHlwaS5vcmcTOOSHORT
      description: Body too short to be a valid PyPI token
    - value: pypi-AgEIbm90cGtlcQABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789
      description: Wrong macaroon marker (does not decode to pypi.org)
    - value: 'NPM_TOKEN=pypi-AgEIcHlwaS5vcmcABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'
      description: Sibling package-registry label does not corroborate a PyPI token
    - value: 'Documentation example: PyPI.org package PYPI_TOKEN=pypi-AgEIcHlwaS5vcmcABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'
      description: Documentation example containing a valid-shaped token is excluded
    - value: set your pypi upload token with twine before publishing to pypi.org
      description: Prose mention without a token value
false_positives:
  - description: Documentation showing the literal pypi-AgEIcHlwaS5vcmc marker without a real body.
    mitigation: Require a sufficiently long base64 body and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This detector recognises a PyPI upload token through its near-unique pypi-AgEIcHlwaS5vcmc marker and long base64url body. A live token can publish malicious releases for packages within its configured scope, exposing installers to software-supply-chain compromise. The normal match seriously affects the authorised projects but does not prove ownership of critical or widely consumed packages. Risk 8 and SENSITIVE InfoTech reflect direct package-publication authority; PROTECTED requires verified control of critical packages or significant downstream supply-chain damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pypi_api_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_pypi_api_token
      matches:
        - ref: Keyword_pypi_publish_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_pypi_api_token
      matches:
        - ref: Keyword_pypi_publish_context
        - ref: Pattern_pypi_token_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_pypi_api_token
      pattern: pypi-AgEIcHlwaS5vcmc[A-Za-z0-9_-]{50,1000}
    - id: Pattern_pypi_token_assignment
      pattern: (?i)\b(?:PYPI_TOKEN|TWINE_PASSWORD)\s*[=:]
  keywords:
    - id: Keyword_pypi_publish_context
      groups:
        - match_style: string
          terms:
            - PyPI.org package
            - twine upload
            - Python package upload
            - PyPI release publish
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
changelog:
  - version: 1.1.2
    date: '2026-07-19'
    description: 'Add an individual 65 discovery / 75 PyPI-publish / 85 canonical-assignment Purview contract with exact-tier, sibling-registry, malformed, and documentation probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1560 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
