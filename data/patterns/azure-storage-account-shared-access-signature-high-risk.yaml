schema: testpattern/v1
name: Azure Storage Account Shared Access Signature for High Risk Resources
slug: azure-storage-account-shared-access-signature-high-risk
version: 1.3.1
type: regex
engine: universal
description: >-
  Detects Azure Storage Account Shared Access Signature (SAS) patterns for high-risk resources with write or delete permissions. This pattern is based on a Microsoft Purview built-in sensitive
  information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Matches Azure Storage SAS tokens in URLs targeting core.windows.net endpoints where the sp (permissions) parameter includes write (w), delete (d), or create (c) permissions. These represent higher
  risk than read-only SAS tokens. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for
  template/sample/test text.
pattern: (?i)https?://[^/]*\.(?:blob|queue|table|file)\.core\.windows\.net[^"' ]{0,200}[?&]sp=[rwdlac]*[wdc][rwdlac]*[^"' ]{0,200}[?&]sig=[A-Za-z0-9%+/=]+
confidence: high
confidence_justification: >-
  High confidence: core.windows.net storage domain combined with write/delete permissions and sig parameter uniquely identifies high-risk Azure Storage SAS tokens. Added context gating and exclusion
  rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - Azure Storage
    - SAS
    - shared access signature
    - write permission
    - delete permission
    - blob
    - storage account
    - core.windows.net
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: https://myaccount.blob.core.windows.net/container?sv=2021-06-08&sp=rwdl&sig=AAAA0000%3D
      description: Blob SAS with read/write/delete/list permissions
    - value: https://myaccount.blob.core.windows.net/container?sv=2020-08-04&sp=wc&sig=000000%3D
      description: Blob SAS with write/create permissions
    - value: https://myaccount.table.core.windows.net/table?sv=2022-11-02&sp=rwd&sig=ABCDEFghij%3D
      description: Table SAS with write and delete permissions
  should_not_match:
    - value: https://myaccount.blob.core.windows.net/container?sv=2021-06-08&sp=rl&sig=AAAA%3D
      description: Read-only SAS (not high risk)
    - value: https://myaccount.blob.core.windows.net/container
      description: Storage URL without SAS token
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Azure Storage documentation with example write-permission SAS URLs.
    mitigation: Check for common placeholder values and documentation context.
  - description: CI/CD pipeline artifacts containing build-time SAS tokens.
    mitigation: Check se= (expiry) parameter and verify the token scope.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_azure_storage_sas_high_risk
      matches:
        - ref: Pattern_azure_storage_account_shared_access_signature_high_risk_label_context
        - ref: Keyword_azure_storage_account_shared_access_signature_high_risk_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_azure_storage_sas_high_risk
      matches:
        - ref: Keyword_azure_storage_sas_high_risk
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_azure_storage_sas_high_risk
      pattern: (?i)https?://[^/]*\.(?:blob|queue|table|file)\.core\.windows\.net[^"' ]{0,200}[?&]sp=[rwdlac]*[wdc][rwdlac]*[^"' ]{0,200}[?&]sig=[A-Za-z0-9%+/=]+
    - id: Pattern_azure_storage_account_shared_access_signature_high_risk_label_context
      pattern: (?i)\b(?:azure\s+storage\s+account\s+shared\s+access\s+signature\s+for\s+high\s+risk\s+resources|azure|storage|account|shared|access|signature|high|risk|resources)\b
  keywords:
    - id: Keyword_azure_storage_sas_high_risk
      groups:
        - match_style: word
          terms:
            - Azure Storage
            - text: SAS
              case_sensitive: true
            - shared access signature
            - write permission
            - delete permission
            - blob
            - storage account
            - core.windows.net
            - container
            - high risk
            - elevated access
      strength: specific
    - id: Keyword_azure_storage_account_shared_access_signature_high_risk_domain_context
      groups:
        - match_style: word
          terms:
            - azure storage account shared access signature for high risk resources
            - azure
            - storage
            - shared
            - access
            - signature
            - high
            - risk
            - resources
      strength: domain
risk_rating: 10
risk_description: >-
  Exposure of this credential could grant unauthorized access to cloud infrastructure, databases, or services. Compromised credentials are a leading cause of data breaches and can result in full
  system takeover.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-azure-storage-account-shared-access-signature-high-risk-resources
    title: Azure Storage account shared access signature for high risk resources entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.3.0
    date: '2026-07-04'
    description: 'Recover NOT_DETECTED verdict: widen URL path/query wildcards to tolerate PDF line-wrap newlines only, excluding literal space, so they cannot bridge unrelated prose to a later sig= occurrence (id_match found zero matches on wrapped text pre-fix)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
