schema: testpattern/v1
name: U.S. Bank Account Number
slug: us-bank-account
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects U.S. Bank Account Number patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type. Financial account numbers require corroborative evidence for
  reliable detection due to their generic numeric format.
operation: >-
  Corroborative evidence: 6 keywords within 300 characters.
  Keyword lists: banking, us-financial.
pattern: '\b\d{8,17}\b'
confidence: low
confidence_justification: >-
  Low confidence: eight to seventeen digit numbers are extremely common in all contexts. Banking keywords such as 'account number' or 'checking' are essential for reliable US bank account detection.
jurisdictions:
  - us
regulations:
- "CCPA/CPRA"
- FTC Act s5
- GLBA
- HIPAA
- SOX
- "State Breach Laws (US)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - pii
  - financial
corroborative_evidence:
  keywords:
    - bank account
    - account number
    - checking
    - savings
    - routing
    - ACH
  proximity: 300
  keyword_lists:

    - banking

    - us-financial
test_cases:
  should_match:
    - value: '12345678'
      description: Eight-digit US bank account number
    - value: '12345678901234567'
      description: Seventeen-digit US bank account number
    - value: '9876543210'
      description: Ten-digit US bank account
  should_not_match:
    - value: '1234567'
      description: Seven digits, too short for US bank account
    - value: '123456789012345678'
      description: Eighteen digits, exceeds US bank account format
false_positives:
  - description: Generic numeric sequences such as reference numbers, invoice numbers, or identifiers from other domains
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to distinguish
      financial account numbers from general numeric data.
  - description: Phone numbers, postal codes, or other structured numbers with similar digit counts
    mitigation: >-
      Layer with other detection patterns to deprioritise matches that overlap with phone number
      or postal code formats.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_us_bank_account
      matches:
        - ref: Keyword_us_bank_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_us_bank_account
      matches:
        - ref: Keyword_us_bank_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_us_bank_account
  regexes:
    - id: Regex_us_bank_account
      pattern: '\b\d{8,17}\b'
  keywords:
    - id: Keyword_us_bank_specific
      groups:
        - match_style: word
          terms:
            - bank account
            - account number
            - account no
            - checking account
            - savings account
            - bank account number
            - deposit account
            - account#
      strength: specific
    - id: Keyword_us_bank_broad
      groups:
        - match_style: word
          terms:
            - checking
            - savings
            - routing
            - text: ACH
              case_sensitive: true
            - wire transfer
            - direct deposit
            - financial institution
            - FDIC
      strength: domain
  filters:
    - id: Filter_us_bank_same_digits
      type: AllDigitsSameFilter
risk_rating: 8
risk_description: >-
  The detector seeks a US bank-account-shaped numeric sequence with six banking terms, without a universal checksum that can independently validate the account. A real number can reveal a financial relationship and support unauthorised debit attempts, payment diversion, or tailored impersonation when combined with a holder name and routing number. Invoice references, phone-like values, postal codes, and other structured numbers can match, and the account number alone usually does not confer online-banking access. Risk 8 SENSITIVE reflects serious but account-bounded harm; PROTECTED would require bulk records, direct payment authority, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-us-bank-account-number
    title: "U.S. Bank Account Number entity definition - Microsoft Learn"
