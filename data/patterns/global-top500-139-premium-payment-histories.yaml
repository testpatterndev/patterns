schema: testpattern/v1
name: Premium payment histories
slug: global-top500-139-premium-payment-histories
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to premium payment histories in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:premium\s+payment|insurance\s+premium|payment\s+history|premium\s+schedule|premium\s+due|policy\s+renewal|premium\s+arrears|instalment\s+payment|premium\s+notice|lapsed\s+policy|premium\s+collection|policyholder\s+payment)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - premium payment histories
    - premium
    - payment
    - histories
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: premium payment
      description: Primary topic phrase match
    - value: insurance premium
      description: Case-insensitive topic phrase match
    - value: payment history
      description: Alternative topic phrase match
    - value: premium schedule
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_premium_payment_histories
      matches:
        - ref: Pattern_global_top500_139_premium_payment_histories_label_context
        - ref: Keyword_global_top500_139_premium_payment_histories_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_139_premium_payment_histories_noise_exclusion
    - confidence_level: 75
      id_match: Regex_premium_payment_histories
      matches:
        - ref: Keyword_premium_payment_histories
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_139_premium_payment_histories_noise_exclusion
    - confidence_level: 65
      id_match: Regex_premium_payment_histories
      matches:
        - ref: Keyword_premium_payment_histories
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_139_premium_payment_histories_noise_exclusion
  regexes:
    - id: Regex_premium_payment_histories
      pattern: (?is)\b(?:premium\s+payment|insurance\s+premium|payment\s+history|premium\s+schedule|premium\s+due|policy\s+renewal|premium\s+arrears|instalment\s+payment|premium\s+notice|lapsed\s+policy|premium\s+collection|policyholder\s+payment)\b
    - id: Pattern_global_top500_139_premium_payment_histories_label_context
      pattern: (?i)\\b(?:premium\\s+payment\\s+histories|premium|payment|histories|top500)\\b
  keywords:
    - id: Keyword_premium_payment_histories
      groups:
        - match_style: word
          terms:
            - premium payment
            - insurance premium
            - payment history
            - premium schedule
            - premium due
            - policy renewal
            - premium arrears
            - instalment payment
            - premium notice
            - lapsed policy
            - premium collection
            - policyholder payment
    - id: Keyword_global_top500_139_premium_payment_histories_domain_context
      groups:
        - match_style: word
          terms:
            - premium payment histories
            - premium
            - payment
            - histories
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_139_premium_payment_histories_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
