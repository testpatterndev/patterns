schema: testpattern/v1
name: Evidence handling logs
slug: au-top500-420-evidence-handling-logs
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to evidence handling logs in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:evidence\s+handling\s+logs|chain\s+of\s+custody|evidence\s+log|exhibit\s+register|evidence\s+storage|forensic\s+evidence|property\s+receipt|evidence\s+integrity|evidence\s+continuity|law\s+enforcement|evidence\s+room|tamper\s+seal)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - evidence handling logs
    - evidence
    - handling
    - logs
    - law
    - enforcement
    - justice
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: evidence handling logs
      description: Primary topic phrase match
    - value: chain of custody
      description: Case-insensitive topic phrase match
    - value: evidence log
      description: Alternative topic phrase match
    - value: exhibit register
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to evidence handling logs appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_evidence_handling_logs
      matches:
        - ref: Evidence_evidence_handling_logs
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_evidence_handling_logs
      matches:
        - ref: Evidence_evidence_handling_logs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_evidence_handling_logs
      matches:
        - ref: Evidence_evidence_handling_logs
  regexes:
    - id: Pattern_evidence_handling_logs
      pattern: >-
        (?is)\b(?:evidence\s+handling\s+logs|chain\s+of\s+custody|evidence\s+log|exhibit\s+register|evidence\s+storage|forensic\s+evidence|property\s+receipt|evidence\s+integrity|evidence\s+continuity|law\s+enforcement|evidence\s+room|tamper\s+seal)\b
    - id: Pattern_au_top500_420_evidence_handling_logs_label_context
      pattern: (?i)\\b(?:evidence\\s+handling\\s+logs|evidence|handling|logs|top500)\\b
  keywords:
    - id: Evidence_evidence_handling_logs
      groups:
        - match_style: word
          terms:
            - evidence handling logs
            - chain of custody
            - evidence log
            - exhibit register
            - evidence storage
            - forensic evidence
            - property receipt
            - evidence integrity
            - evidence continuity
            - law enforcement
            - evidence room
            - tamper seal
    - id: Keyword_au_top500_420_evidence_handling_logs_domain_context
      groups:
        - match_style: word
          terms:
            - evidence handling logs
            - evidence
            - handling
            - logs
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
