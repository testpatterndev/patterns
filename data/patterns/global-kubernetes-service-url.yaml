schema: testpattern/v1
name: Kubernetes Internal Service URL
slug: global-kubernetes-service-url
version: 1.4.0
type: regex
pattern_class: identifier
engine: universal
description: Detects Kubernetes Internal Service URL patterns.
operation: >-
  A complete svc.cluster.local HTTP(S) URL is discovery-only at 65. Explicit Kubernetes-service,
  ClusterIP, kubectl, namespace-manifest, or service-discovery context raises it to 75. The 85 tier
  additionally requires a production workload, deployment manifest, Helm values, ConfigMap, service
  account, network policy, or ingress-controller context. Enforcing tiers reject public documentation,
  tutorials, sample manifests, example configurations, and templates.
pattern: https?://[a-z0-9][a-z0-9.\-]{1,200}\.svc\.cluster\.local(?::\d+)?
confidence: medium
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: http://my-service.default.svc.cluster.local
      description: Low-tier probe - internal service URL without explicit Kubernetes context
    - value: 'Kubernetes service endpoint: http://redis-master.cache.svc.cluster.local:6379'
      description: Medium-tier probe - explicit Kubernetes-service label without deployment context
    - value: 'Production deployment manifest: Kubernetes service endpoint https://api-gateway.production.svc.cluster.local:8443 in Helm values and ConfigMap.'
      description: High-tier probe - service label plus live deployment context
  should_not_match:
    - value: https://my-service.default.svc.cluster.remote
      description: Wrong domain suffix (.remote instead of .local)
    - value: https://my-service.default.pod.cluster.local
      description: Wrong subdomain (pod instead of svc)
    - value: ftp://my-service.default.svc.cluster.local
      description: Wrong scheme (ftp instead of http/https)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: 'Public documentation: Kubernetes service endpoint http://my-service.default.svc.cluster.local'
      description: Public documentation contains a complete labelled service URL
    - value: 'Template example: production deployment manifest Kubernetes service endpoint https://api-gateway.production.svc.cluster.local:8443 in Helm values.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  This detector finds an HTTP or HTTPS hostname ending in svc.cluster.local, optionally with a port, which is an internal service locator rather than a password, token, or key. Disclosure can reveal a Kubernetes service name, namespace, and listening port that assists reconnaissance, but an attacker still needs network reachability and separate authorization to use the service. The normal exposure affects one cluster operator and a small piece of internal topology, with examples, manifests, and architecture documentation producing routine matches. Risk 4 OFFICIAL is appropriate for this bounded contextual value; credentials, sensitive routes, or a full exploitable cluster map would require separate assessment.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_kubernetes_service_url
      matches:
        - ref: Keyword_kubernetes_service_url
        - ref: Keyword_global_kubernetes_service_url_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_public_technical_context
    - confidence_level: 75
      id_match: Regex_kubernetes_service_url
      matches:
        - ref: Keyword_kubernetes_service_url
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_public_technical_context
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_kubernetes_service_url
  regexes:
    - id: Regex_kubernetes_service_url
      pattern: https?://[a-z0-9][a-z0-9.\-]{1,200}\.svc\.cluster\.local(?::\d+)?
    - id: Pattern_global_kubernetes_service_url_label_context
      pattern: (?i)\b(?:kubernetes\s+internal\s+service\s+url|kubernetes|internal|service|url)\b
  keywords:
    - id: Keyword_kubernetes_service_url
      groups:
        - match_style: word
          terms:
            - Kubernetes service
            - K8s service
            - ClusterIP
            - kubectl
            - namespace manifest
            - service endpoint
            - service discovery
      strength: domain
    - id: Keyword_global_kubernetes_service_url_domain_context
      groups:
        - match_style: word
          terms:
            - production workload
            - deployment manifest
            - Helm values
            - ConfigMap
            - service account
            - network policy
            - ingress controller
      strength: domain
    - id: Keyword_public_technical_context
      groups:
        - match_style: word
          terms:
            - public documentation
            - tutorial
            - sample manifest
            - example configuration
      strength: exclusion
created: '2026-02-08'
updated: '2026-07-19'
