schema: testpattern/v1
name: Domestic Violence Order Application
slug: domestic-violence-order-application
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects domestic violence order applications and conditions under the Domestic and Family Violence Protection Act 2012 (Qld). These documents contain details of aggrieved persons, respondent details, allegations of domestic violence, ouster conditions, and protection order terms. Disclosure could endanger the aggrieved person.
operation: 'Keyword proximity: primary keywords (domestic violence order, DVO, protection order, aggrieved, respondent, ouster condition, Domestic and Family Violence Protection Act) within 300 characters of DVO reference numbers (DVO-YYYY-NNNNN) and party details. Negative keyword exclusion for DFV awareness campaigns and published statistics.'
pattern: (?i)\b(domestic\s+violence\s+(?:order|application)|DVO(?:-\d{4}-\d{3,5})?|protection\s+order\s+(?:application|conditions?)|ouster\s+(?:condition|order)|aggrieved\s+(?:person|party)|Domestic\s+and\s+Family\s+Violence\s+Protection\s+Act)\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of DFV protection order terminology with specific party details and DVO reference numbers. The combination of aggrieved/respondent party details with protection order conditions is unique to genuine DVO documents.'
jurisdictions:
  - au
regulations:
  - qgiscf
  - domestic-and-family-violence-protection-act-2012-qld
  - ppra-2000-qld
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - SENSITIVE
    - Legal
    - domestic violence order
    - DVO
    - protection order
    - aggrieved
    - respondent
    - ouster condition
    - DFV
    - no-contact condition
    - safe contact
    - domestic violence
    - family violence
    - Magistrates Court
  proximity: 300
  keyword_lists:
    - law-enforcement
    - government-services
test_cases:
  should_match:
    - value: 'SENSITIVE Legal. Application for Domestic Violence Order — Domestic and Family Violence Protection Act 2012 s.37. DVO Reference: DVO-2026-04817. Aggrieved: [Name], DOB: 03/11/1994. Respondent: [Name], DOB: 18/06/1990. Relationship: former intimate partners. Grounds: The respondent has committed acts of domestic violence as defined by s.8 of the Act, including physical violence (s.8(1)(a)), threats (s.8(1)(b)), and coercive control (s.8(1)(d)). Application by QPS officer Sgt L. Farrow.'
      description: DVO application with aggrieved and respondent details and statutory grounds
    - value: 'Domestic Violence Order — Conditions. DVO-2026-03291, Brisbane Magistrates Court. The respondent [Name] must: (1) Be of good behaviour towards the aggrieved [Name] and any named person. (2) Ouster condition: vacate and not return to the premises at [Address], Annerley. (3) Not approach within 100 metres of the aggrieved. (4) No-contact condition: must not contact the aggrieved by any means. (5) Surrender all weapons to police. Duration: 2 years from date of order. Breach is a criminal offence under s.177.'
      description: DVO with ouster condition, no-contact order, and weapons surrender
    - value: 'Temporary Protection Order — DFV Protection Act 2012 s.44. DVO-2026-05102. Issued by Ipswich Magistrates Court on ex parte application by police. Aggrieved: [Name] and two children aged 4 and 7. Respondent: [Name]. Conditions include ouster from family home, supervised contact with children only at DFV safe contact centre, and mandatory attendance at behaviour change program. Return date: 28 March 2026 for contested hearing.'
      description: Temporary protection order with children named and supervised contact
  should_not_match:
    - value: White Ribbon Australia launched its annual campaign against domestic violence. The DFV awareness event was attended by 500 people at South Bank, Brisbane. Queensland recorded 28,000 DVO applications in 2024-25.
      description: DFV awareness campaign and published statistics
    - value: The Queensland Government published its Domestic and Family Violence Prevention Strategy 2025-2030, committing $520 million over five years to frontline services, DVO enforcement, and perpetrator programs.
      description: Published government DFV prevention strategy
    - value: A family law textbook chapter on protection orders explains the process for applying for a domestic violence order under the Domestic and Family Violence Protection Act 2012 (Qld) and describes the types of conditions available.
      description: Family law textbook explaining DVO application process
false_positives:
  - description: DFV awareness campaigns and community events
    mitigation: 'Negative keyword exclusion: ''awareness'', ''campaign'', ''White Ribbon'', ''prevention week'', ''community event'''
  - description: Published government DFV statistics and prevention strategies
    mitigation: 'Negative keyword exclusion: ''published'', ''strategy'', ''annual report'', ''statistics'', ''prevention'''
  - description: Family law textbooks explaining protection order processes
    mitigation: 'Negative keyword exclusion: ''textbook'', ''chapter'', ''explains'', ''academic'', ''university'''
  - description: News reporting on DFV trends without specific party details
    mitigation: 'Require proximity to specific party details or DVO reference numbers, not aggregate reporting.'
exports:
  - purview_xml
  - yaml
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: DVO reference number regex with 2+ primary keywords plus party details and Act reference
    - tier: medium
      confidence: 75
      description: 2+ primary keywords with protection order conditions or aggrieved/respondent details
    - tier: low
      confidence: 65
      description: 1 primary keyword with DVO reference number regex match
  regexes:
    - name: dvo_reference_number
      pattern: \bDVO-\d{4}-\d{3,5}\b
    - name: dvo_terms
      pattern: (?i)\b(domestic\s+violence\s+(?:order|application)|protection\s+order\s+(?:application|conditions?)|ouster\s+(?:condition|order)|temporary\s+protection\s+order)\b
    - name: dfv_act_reference
      pattern: (?i)\bDomestic\s+and\s+Family\s+Violence\s+Protection\s+Act\s+2012\b
  keywords:
    - name: primary_keywords
      words:
        - domestic violence order
        - DVO
        - protection order application
        - protection order conditions
        - ouster condition
        - ouster order
        - temporary protection order
        - aggrieved person
        - aggrieved party
        - no-contact condition
    - name: classification_markers
      words:
        - SENSITIVE
        - Legal
        - OFFICIAL
        - DFV Protection Act 2012
        - Magistrates Court
        - ex parte application
    - name: corroborative_terms
      words:
        - respondent
        - aggrieved
        - good behaviour
        - surrender weapons
        - safe contact centre
        - behaviour change program
        - supervised contact
        - breach
        - criminal offence
        - return date
        - contested hearing
        - coercive control
    - name: negative_keywords
      words:
        - awareness
        - campaign
        - White Ribbon
        - prevention week
        - community event
        - published
        - strategy
        - annual report
        - statistics
        - prevention
        - textbook
        - chapter
        - explains
        - academic
        - university
  filters:
    - type: exclude
      description: Exclude awareness campaigns, published strategies, statistics, and academic materials
      keywords:
        - awareness
        - campaign
        - White Ribbon
        - prevention week
        - published
        - strategy
        - annual report
        - statistics
        - textbook
        - academic
        - university
risk_rating: 7
risk_description: DVO applications and conditions contain aggrieved and respondent personal details, addresses, allegations of domestic violence, and protection conditions. Disclosure could reveal the location of aggrieved persons and endanger their safety, though these are lower risk than covert law enforcement records.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-03-06'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
