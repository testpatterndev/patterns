schema: testpattern/v1
name: Anti-money-laundering alerts
slug: au-top500-132-anti-money-laundering-alerts
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to anti-money-laundering alerts in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:AML\s+alert|suspicious\s+transaction|transaction\s+monitoring|money\s+laundering|financial\s+crime|compliance\s+alert|risk\s+assessment|customer\s+due\s+diligence)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - anti-money-laundering alerts
    - anti
    - money
    - laundering
    - alerts
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: AML alert
      description: Primary topic phrase match
    - value: suspicious transaction
      description: Case-insensitive topic phrase match
    - value: transaction monitoring
      description: Alternative topic phrase match
    - value: money laundering
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_aml_alerts
      matches:
        - ref: Evidence_aml_alerts
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_aml_alerts
      matches:
        - ref: Evidence_aml_alerts
    - confidence_level: 65
      id_match: Pattern_aml_alerts
      matches:
        - ref: Evidence_aml_alerts
  regexes:
    - id: Pattern_aml_alerts
      pattern: (?is)\b(?:AML\s+alert|suspicious\s+transaction|transaction\s+monitoring|money\s+laundering|financial\s+crime|compliance\s+alert|risk\s+assessment|customer\s+due\s+diligence)\b
  keywords:
    - id: Evidence_aml_alerts
      groups:
        - match_style: word
          terms:
            - anti-money-laundering
            - AML alert
            - suspicious transaction
            - AUSTRAC
            - transaction monitoring
            - money laundering
            - financial crime
            - compliance alert
            - risk assessment
            - customer due diligence
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.austrac.gov.au/business/core-guidance/customer-identification-and-verification
  - https://www.austrac.gov.au/business/core-guidance/reporting/suspicious-matter-reports-smrs
