schema: testpattern/v1
name: Tax exemption certificates
slug: au-top500-147-tax-exemption-certificates
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to tax exemption certificates in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: credentials.'
pattern: (?is)\b(?:tax\s+exemption|exemption\s+certificate|GST\s+exempt|ATO\s+exemption|charitable\s+status|deductible\s+gift\s+recipient|income\s+tax\s+exempt|fringe\s+benefits\s+tax)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - tax exemption certificates
    - tax
    - exemption
    - certificates
    - procurement
    - supplier
    - management
  proximity: 300
  keyword_lists:

    - credentials
test_cases:
  should_match:
    - value: tax exemption
      description: Primary topic phrase match
    - value: exemption certificate
      description: Case-insensitive topic phrase match
    - value: GST exempt
      description: Alternative topic phrase match
    - value: ATO exemption
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to tax exemption certificates appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_tax_exemption
      matches:
        - ref: Evidence_tax_exemption
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_tax_exemption
      matches:
        - ref: Evidence_tax_exemption
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_tax_exemption
      matches:
        - ref: Evidence_tax_exemption
  regexes:
    - id: Pattern_tax_exemption
      pattern: (?is)\b(?:tax\s+exemption|exemption\s+certificate|GST\s+exempt|ATO\s+exemption|charitable\s+status|deductible\s+gift\s+recipient|income\s+tax\s+exempt|fringe\s+benefits\s+tax)\b
  keywords:
    - id: Evidence_tax_exemption
      groups:
        - match_style: word
          terms:
            - tax exemption
            - exemption certificate
            - GST exempt
            - tax-free
            - ATO exemption
            - charitable status
            - deductible gift recipient
            - DGR
            - income tax exempt
            - fringe benefits tax
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
