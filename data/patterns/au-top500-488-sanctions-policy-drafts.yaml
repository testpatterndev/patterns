schema: testpattern/v1
name: Sanctions policy drafts
slug: au-top500-488-sanctions-policy-drafts
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to sanctions policy drafts in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:sanctions\s+policy|policy\s+draft|DFAT\s+sanctions|autonomous\s+sanctions|consolidated\s+list|sanctions\s+regime|designated\s+person|sanctions\s+enforcement|travel\s+ban|asset\s+freeze|sanctions\s+compliance|foreign\s+affairs)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - sanctions policy drafts
    - sanctions
    - policy
    - drafts
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:

    - government-services
test_cases:
  should_match:
    - value: sanctions policy
      description: Primary topic phrase match
    - value: policy draft
      description: Case-insensitive topic phrase match
    - value: DFAT sanctions
      description: Alternative topic phrase match
    - value: autonomous sanctions
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to sanctions policy drafts appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_sanctions_policy_drafts
      matches:
        - ref: Evidence_sanctions_policy_drafts
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_488_sanctions_policy_drafts_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_sanctions_policy_drafts
      matches:
        - ref: Evidence_sanctions_policy_drafts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_488_sanctions_policy_drafts_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_sanctions_policy_drafts
      matches:
        - ref: Evidence_sanctions_policy_drafts
  regexes:
    - id: Pattern_sanctions_policy_drafts
      pattern: (?is)\b(?:sanctions\s+policy|policy\s+draft|DFAT\s+sanctions|autonomous\s+sanctions|consolidated\s+list|sanctions\s+regime|designated\s+person|sanctions\s+enforcement|travel\s+ban|asset\s+freeze|sanctions\s+compliance|foreign\s+affairs)\b
    - id: Pattern_au_top500_488_sanctions_policy_drafts_label_context
      pattern: (?i)\\b(?:sanctions\\s+policy\\s+drafts|sanctions|policy|drafts|top500)\\b
  keywords:
    - id: Evidence_sanctions_policy_drafts
      groups:
        - match_style: word
          terms:
            - sanctions policy
            - policy draft
            - DFAT sanctions
            - autonomous sanctions
            - consolidated list
            - sanctions regime
            - designated person
            - sanctions enforcement
            - travel ban
            - asset freeze
            - sanctions compliance
            - foreign affairs
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_488_sanctions_policy_drafts_domain_context
      groups:
        - match_style: word
          terms:
            - sanctions policy drafts
            - sanctions
            - policy
            - drafts
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_488_sanctions_policy_drafts_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
