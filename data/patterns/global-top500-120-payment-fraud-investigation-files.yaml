schema: testpattern/v1
name: Payment fraud investigation files
slug: global-top500-120-payment-fraud-investigation-files
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to payment fraud investigation files in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:payment\s+fraud|fraud\s+investigation|suspicious\s+transaction|unauthorized\s+transaction|fraudulent\s+activity|dispute\s+case|fraud\s+alert|suspicious\s+activity\s+report|fraud\s+case|investigation\s+file)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payment fraud investigation files
    - payment
    - fraud
    - investigation
    - files
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: payment fraud
      description: Primary topic phrase match
    - value: fraud investigation
      description: Case-insensitive topic phrase match
    - value: suspicious transaction
      description: Alternative topic phrase match
    - value: unauthorized transaction
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_payment_fraud
      matches:
        - ref: Pattern_global_top500_120_payment_fraud_investigation_files_label_context
        - ref: Keyword_global_top500_120_payment_fraud_investigation_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_120_payment_fraud_investigation_files_noise_exclusion
    - confidence_level: 75
      id_match: Regex_payment_fraud
      matches:
        - ref: Keyword_payment_fraud
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_120_payment_fraud_investigation_files_noise_exclusion
    - confidence_level: 65
      id_match: Regex_payment_fraud
      matches:
        - ref: Keyword_payment_fraud
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_120_payment_fraud_investigation_files_noise_exclusion
  regexes:
    - id: Regex_payment_fraud
      pattern: (?is)\b(?:payment\s+fraud|fraud\s+investigation|suspicious\s+transaction|unauthorized\s+transaction|fraudulent\s+activity|dispute\s+case|fraud\s+alert|suspicious\s+activity\s+report|fraud\s+case|investigation\s+file)\b
    - id: Pattern_global_top500_120_payment_fraud_investigation_files_label_context
      pattern: (?i)\\b(?:payment\\s+fraud\\s+investigation\\s+files|payment|fraud|investigation|files|top500)\\b
  keywords:
    - id: Keyword_payment_fraud
      groups:
        - match_style: word
          terms:
            - payment fraud
            - fraud investigation
            - suspicious transaction
            - unauthorized transaction
            - fraudulent activity
            - chargeback
            - dispute case
            - fraud alert
            - suspicious activity report
            - SAR
            - fraud case
            - investigation file
    - id: Keyword_global_top500_120_payment_fraud_investigation_files_domain_context
      groups:
        - match_style: word
          terms:
            - payment fraud investigation files
            - payment
            - fraud
            - investigation
            - files
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_120_payment_fraud_investigation_files_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
