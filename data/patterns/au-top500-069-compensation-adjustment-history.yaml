schema: testpattern/v1
name: Compensation adjustment history
slug: au-top500-069-compensation-adjustment-history
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to compensation adjustment history in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:compensation\s+adjustment|salary\s+review|pay\s+increase|remuneration\s+review|wage\s+adjustment|salary\s+history|pay\s+rise|compensation\s+history|annual\s+increase|salary\s+band|pay\s+grade|compensation\s+package)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - compensation adjustment history
    - compensation
    - adjustment
    - history
    - employment
    - workforce
    - records
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: compensation adjustment
      description: Primary topic phrase match
    - value: salary review
      description: Case-insensitive topic phrase match
    - value: pay increase
      description: Alternative topic phrase match
    - value: remuneration review
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to compensation adjustment history appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 90
      id_match: Pattern_compensation_adjustment
      matches:
        - ref: Pattern_au_top500_069_compensation_adjustment_history_label_context
        - ref: Keyword_au_top500_069_compensation_adjustment_history_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_069_compensation_adjustment_history_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_compensation_adjustment
      matches:
        - ref: Evidence_compensation_adjustment
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_069_compensation_adjustment_history_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_compensation_adjustment
      matches:
        - ref: Evidence_compensation_adjustment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_069_compensation_adjustment_history_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_compensation_adjustment
      matches:
        - ref: Evidence_compensation_adjustment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_069_compensation_adjustment_history_noise_exclusion
  regexes:
    - id: Pattern_compensation_adjustment
      pattern: (?is)\b(?:compensation\s+adjustment|salary\s+review|pay\s+increase|remuneration\s+review|wage\s+adjustment|salary\s+history|pay\s+rise|compensation\s+history|annual\s+increase|salary\s+band|pay\s+grade|compensation\s+package)\b
    - id: Pattern_au_top500_069_compensation_adjustment_history_label_context
      pattern: (?i)\\b(?:compensation\\s+adjustment\\s+history|compensation|adjustment|history|top500)\\b
  keywords:
    - id: Evidence_compensation_adjustment
      groups:
        - match_style: word
          terms:
            - compensation adjustment
            - salary review
            - pay increase
            - remuneration review
            - wage adjustment
            - salary history
            - pay rise
            - compensation history
            - annual increase
            - salary band
            - pay grade
            - compensation package
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_069_compensation_adjustment_history_domain_context
      groups:
        - match_style: word
          terms:
            - compensation adjustment history
            - compensation
            - adjustment
            - history
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_069_compensation_adjustment_history_noise_exclusion
      groups:
