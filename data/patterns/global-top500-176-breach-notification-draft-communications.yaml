schema: testpattern/v1
name: Breach notification draft communications
slug: global-top500-176-breach-notification-draft-communications
version: 1.1.1
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to breach notification draft communications in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:breach\s+notification\s+draft\s+communications|breach\s+notification|data\s+breach|notifiable\s+data\s+breach|affected\s+individuals|notification\s+letter|breach\s+assessment|incident\s+response|privacy\s+commissioner|mandatory\s+reporting|eligible\s+data\s+breach|remediation\s+steps)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - breach notification draft communications
    - breach
    - notification
    - draft
    - communications
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: breach notification draft communications
      description: Primary topic phrase match
    - value: breach notification
      description: Case-insensitive topic phrase match
    - value: data breach
      description: Alternative topic phrase match
    - value: notifiable data breach
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: >-
      Common words and phrases related to breach notification draft communications appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal
      data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_breach_notification_drafts
      matches:
        - ref: Pattern_global_top500_176_breach_notification_draft_communications_label_context
        - ref: Keyword_global_top500_176_breach_notification_draft_communications_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_breach_notification_drafts
      matches:
        - ref: Keyword_breach_notification_drafts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_breach_notification_drafts
      pattern: >-
        (?is)\b(?:breach\s+notification\s+draft\s+communications|breach\s+notification|data\s+breach|notifiable\s+data\s+breach|affected\s+individuals|notification\s+letter|breach\s+assessment|incident\s+response|privacy\s+commissioner|mandatory\s+reporting|eligible\s+data\s+breach|remediation\s+steps)\b
    - id: Pattern_global_top500_176_breach_notification_draft_communications_label_context
      pattern: (?i)\b(?:breach\s+notification\s+draft\s+communications)\b
  keywords:
    - id: Keyword_breach_notification_drafts
      groups:
        - match_style: word
          terms:
            - breach notification draft communications
            - breach notification
            - data breach
            - notifiable data breach
            - affected individuals
            - notification letter
            - breach assessment
            - incident response
            - privacy commissioner
            - mandatory reporting
            - eligible data breach
            - remediation steps
      strength: specific
    - id: Keyword_global_top500_176_breach_notification_draft_communications_domain_context
      groups:
        - match_style: word
          terms:
            - breach notification draft communications
            - breach
            - notification
            - draft
            - communications
      strength: domain
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
