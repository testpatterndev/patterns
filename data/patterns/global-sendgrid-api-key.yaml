schema: testpattern/v1
name: SendGrid API Key
slug: global-sendgrid-api-key
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects SendGrid (Twilio SendGrid) API keys, formatted as SG. then a 22-character
  key id, a dot, and a 43-character secret. A leaked key allows sending email and
  reading account data through the SendGrid API.
operation: 'Structured token SG.<22-char id>.<43-char secret> in base64url charset. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9])SG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the SG. prefix with two fixed-length base64url segments separated by
  a dot is a distinctive SendGrid structure with very low false-positive risk.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - sendgrid
    - twilio sendgrid
    - api key
    - SENDGRID_API_KEY
    - mail send
    - bearer token
    - smtp
  proximity: 300
test_cases:
  should_match:
    - value: SG.ABCDEFGHIJKLMNOPQRSTUV.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopq
      description: SendGrid API key, SG. + 22 + . + 43
    - value: 'SENDGRID_API_KEY=SG.zZyYxXwWvVuUtTsSrR0_-1.zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLk0123456789_-'
      description: Labelled SendGrid key in an env assignment
    - value: SG.aB3dE6gH9jK2mN5pQ8sT1u.aB3dE6gH9jK2mN5pQ8sT1uV4wX7yZ0aB3dE6gH9jK2m
      description: Mixed-case SendGrid key
  should_not_match:
    - value: SG.ABCDEFGHIJKLMNOPQRSTUV.TOOSHORT
      description: Second segment too short to be a valid SendGrid secret
    - value: SK.ABCDEFGHIJKLMNOPQRSTUV.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopq
      description: Wrong prefix (SK. instead of SG.)
    - value: set the sendgrid api key in your mail send configuration
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder SG. strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  A leaked SendGrid key enables sending phishing or spam email from the owner's verified
  domains and reading suppression and account data, harming sender reputation.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-06-13'
author: testpattern-community
license: MIT
references:
  - url: https://www.twilio.com/docs/sendgrid/ui/account-and-settings/api-keys
    title: API keys - Twilio SendGrid
