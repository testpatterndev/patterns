schema: testpattern/v1
name: Manufacturing deviation records
slug: au-top500-238-manufacturing-deviation-records
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to manufacturing deviation records in Australian contexts. Higher confidence identifies records of actual manufacturing departures from requirement
  (deviation/OOS/NCR identifiers with affected batch or lot and expected-versus-actual, disposition, or approval detail); deviation and batch-record vocabulary alone remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:manufacturing\s+deviation|deviation\s+record|process\s+deviation|production\s+deviation|batch\s+record|lot\s+deviation|out\s+of\s+specification|manufacturing\s+defect|deviation\s+report)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - manufacturing deviation records
    - manufacturing
    - deviation
    - records
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: manufacturing deviation
      description: Primary topic phrase match
    - value: deviation record
      description: Case-insensitive topic phrase match
    - value: process deviation
      description: Alternative topic phrase match
    - value: production deviation
      description: Additional topic phrase match
    - value: 'DEV-884 Batch B21; required fill 500+/-5 mL; observed 486 mL; disposition: quarantine; approved by QA 16 Jul.'
      description: Deviation ID linking batch, specification, observation, disposition, and approval (enforces at 75/85)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: Batch record retention policy covers manufacturing defects.
      description: Governance prose, not an event record — discovery only, must not enforce
    - value: The theatre production deviated from its script.
      description: Production/deviation outside manufacturing must not match
    - value: Sample deviation form DEV-000; batch placeholder; observed example.
      description: Sample/placeholder/example identify an unpopulated form — suppressed from enforcement
    - value: manufacturing deviation
      description: Topic phrase cannot prove a populated event — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to manufacturing deviation records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_manufacturing_deviation_record
      matches:
        - ref: Evidence_manufacturing_deviation
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_manufacturing_deviation_record
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_manufacturing_deviation
      matches:
        - ref: Evidence_manufacturing_deviation
  regexes:
    - id: Pattern_manufacturing_deviation
      pattern: >-
        (?is)\b(?:manufacturing\s+deviation|deviation\s+record|process\s+deviation|production\s+deviation|batch\s+record|lot\s+deviation|out\s+of\s+specification|manufacturing\s+defect|deviation\s+report)\b
    - id: Pattern_au_top500_238_manufacturing_deviation_records_label_context
      pattern: (?i)\b(?:manufacturing\s+deviation\s+records)\b
    - id: Pattern_manufacturing_deviation_record
      pattern: >-
        (?is)\b(?:DEV|OOS|NCR)[-_ ]?\d{2,10}\b[\s\S]{0,240}\b(?:batch|lot)\b[\s\S]{0,240}\b(?:expected|required|specification|actual|observed|disposition|approved)\b
  keywords:
    - id: Evidence_manufacturing_deviation
      groups:
        - match_style: word
          terms:
            - manufacturing deviation
            - deviation record
            - process deviation
            - production deviation
            - nonconformance
            - batch record
            - lot deviation
            - out of specification
            - manufacturing defect
            - deviation report
    - id: Keyword_au_top500_238_manufacturing_deviation_records_domain_context
      groups:
        - match_style: word
          terms:
            - manufacturing deviation records
            - manufacturing
            - deviation
risk_description: >-
  This detector identifies manufacturing, process, production, and deviation-record language with seven corroborators, targeting an internal record of departure from an approved process or specification. A genuine record may disclose affected batches, equipment settings, material substitutions, investigation status, disposition, and temporary controls that competitors or counterfeiters could exploit. Harm is moderate and normally limited to a product, batch, or process, while quality procedures, training, and blank deviation forms can match. Risk 7 and SENSITIVE InfoTech fit the proprietary production record; risk 8 or PROTECTED requires severe safety impact, systemic production failure, strategic technology, or significant regulatory and market damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
