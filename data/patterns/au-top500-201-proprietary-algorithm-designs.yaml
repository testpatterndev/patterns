schema: testpattern/v1
name: Proprietary algorithm designs
slug: au-top500-201-proprietary-algorithm-designs
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to proprietary algorithm designs in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: corporate-ip-proprietary.'
pattern: (?is)\b(?:proprietary\s+algorithm|algorithm\s+design|proprietary\s+logic|trade\s+secret|confidential\s+algorithm|intellectual\s+property|source\s+code|machine\s+learning\s+model|neural\s+network|computational\s+method|proprietary\s+software|algorithm\s+specification)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - proprietary algorithm designs
    - proprietary
    - algorithm
    - designs
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
  keyword_lists:
    - corporate-ip-proprietary
test_cases:
  should_match:
    - value: proprietary algorithm
      description: Primary topic phrase match
    - value: algorithm design
      description: Case-insensitive topic phrase match
    - value: proprietary logic
      description: Alternative topic phrase match
    - value: trade secret
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to proprietary algorithm designs appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_proprietary_algorithm
      matches:
        - ref: Evidence_proprietary_algorithm
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_proprietary_algorithm
      matches:
        - ref: Evidence_proprietary_algorithm
    - confidence_level: 65
      id_match: Pattern_proprietary_algorithm
      matches:
        - ref: Evidence_proprietary_algorithm
  regexes:
    - id: Pattern_proprietary_algorithm
      pattern: (?is)\b(?:proprietary\s+algorithm|algorithm\s+design|proprietary\s+logic|trade\s+secret|confidential\s+algorithm|intellectual\s+property|source\s+code|machine\s+learning\s+model|neural\s+network|computational\s+method|proprietary\s+software|algorithm\s+specification)\b
  keywords:
    - id: Evidence_proprietary_algorithm
      groups:
        - match_style: word
          terms:
            - proprietary algorithm
            - algorithm design
            - proprietary logic
            - trade secret
            - confidential algorithm
            - intellectual property
            - source code
            - machine learning model
            - neural network
            - computational method
            - proprietary software
            - algorithm specification
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.ipaustralia.gov.au/tools-and-research/business-resources/non-disclosure-agreements
  - https://www.ipaustralia.gov.au/patents/how-to-apply-for-a-standard-patent/what-to-consider-before-applying-for-a-patent
