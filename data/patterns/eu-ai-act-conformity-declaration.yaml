schema: testpattern/v1
name: EU AI Act Declaration of Conformity (High-Risk AI System)
slug: eu-ai-act-conformity-declaration
version: 1.0.0
type: keyword_proximity
engine: universal
description: >-
  Detects EU declarations of conformity for high-risk AI systems under Article 47 and Annex V of the EU AI
  Act (Regulation (EU) 2024/1689). By drawing up the declaration the provider assumes responsibility for
  compliance; pre-signature drafts and the surrounding conformity-assessment correspondence reveal the
  provider's compliance posture, notified-body findings, and certificate details before market placement.
operation: >-
  Concept (topic) classifier, not an identifier detector. Primary detection: 'EU declaration of conformity'
  coupled within a bounded 400-character window to AI-specific context (AI system, artificial intelligence,
  or the Regulation (EU) 2024/1689 citation) so generic CE product declarations do not reach any tier.
  Corroborated within 300 characters by Annex V content vocabulary (sole responsibility, harmonised
  standards, notified body, conformity assessment procedure, authorised representative). Noise exclusion
  for news, marketing, academic, and legal-alert contexts.
pattern: (?i)\b(?:EU\s+declaration\s+of\s+conformity\b(?=[\s\S]{0,400}?\b(?:AI\s+system|artificial\s+intelligence|Regulation\s+\(EU\)\s+2024/1689)\b)|(?:AI\s+system|artificial\s+intelligence)\b[\s\S]{0,400}?\bEU\s+declaration\s+of\s+conformity\b)
confidence: medium
confidence_justification: >-
  Medium confidence: honest topic matcher. 'EU declaration of conformity' is New Legislative Framework
  boilerplate shared with every CE-marked product class, so the primary regex requires AI context inside a
  bounded window and corroboration leans on the Regulation (EU) 2024/1689 citation and Annex V vocabulary.
  Residual collisions (multi-product declarations mentioning AI incidentally, compliance commentary)
  keep this below identifier-grade precision.
jurisdictions:
  - eu
regulations:
- "Regulation (EU) 2024/1689 (AI Act)"
frameworks:
- ISO/IEC 42001
- ISO 27001
data_categories:
  - legal
  - emerging
corroborative_evidence:
  keywords:
    - sole responsibility
    - harmonised standards
    - notified body
    - conformity assessment procedure
    - authorised representative
    - high-risk AI system
    - Annex V
    - Article 47
    - Regulation (EU) 2024/1689
    - Regulation (EU) 2016/679
    - electronically signed
    - certificate
  proximity: 300
test_cases:
  should_match:
    - value: |-
        EU DECLARATION OF CONFORMITY (Annex V, Regulation (EU) 2024/1689)
        1. AI system: 'RoadSense Perception Module', type RS-PM-4, serial range 0001-0400.
        2. Provider: Continova Mobility GmbH, Ingolstadt, Germany.
        3. This declaration of conformity is issued under the sole responsibility of the provider.
        7. Conformity assessment procedure performed by notified body NB 2797; certificate AI-2026-0114.
      description: Annex V declaration of conformity for a high-risk AI system
    - value: >-
        The undersigned declares that the high-risk AI system identified above is in conformity with
        Regulation (EU) 2024/1689 and complies with Regulation (EU) 2016/679. References to the relevant
        harmonised standards used are listed in the schedule to this EU declaration of conformity, together
        with the identification of the notified body and the certificate issued.
      description: Declaration body text with GDPR statement and harmonised standards schedule
    - value: >-
        Draft for legal sign-off, not yet released: attached is the electronically signed EU declaration of
        conformity for the AI system 'TriageAssist' pursuant to Article 47. Once the notified body confirms
        the certificate scope, we must keep the declaration at the disposal of the national competent
        authorities for 10 years and lodge a copy with the technical documentation.
      description: Pre-release email circulating the signed declaration for an AI system
  should_not_match:
    - value: |-
        EU DECLARATION OF CONFORMITY
        Product: Submersible industrial pump, model X200-B
        Manufacturer: Hydrotek Pumps BV, Rotterdam
        This declaration is issued under the sole responsibility of the manufacturer.
        Object of the declaration is in conformity with Directive 2006/42/EC (Machinery) and Directive 2014/30/EU (EMC).
        Harmonised standards applied: EN 809:1998+A1, EN 61000-6-2.
      description: Generic CE machinery declaration with no AI context (primary coupling fails)
    - value: >-
        From August 2026, providers of high-risk systems must draw up declarations of conformity, affix CE
        marking, and register in the EU database, according to the Commission's implementation timeline.
        Analysts expect notified-body capacity to be the main bottleneck, a industry newsletter reported.
      description: News analysis of AI Act conformity obligations (plural phrasing, no declaration text)
    - value: >-
        Ship compliant AI products faster. Our platform drafts your EU declaration of conformity, tracks
        harmonised standards, and manages notified-body evidence for every AI system you place on the
        market. Book a demo today — free trial for compliance teams.
      description: Vendor marketing for conformity-declaration tooling (filter-dependent negative)
    - value: >-
        Abstract — This peer-reviewed article examines the EU declaration of conformity as a regulatory
        instrument for artificial intelligence, comparing Article 47 of the AI Act with the wider New
        Legislative Framework acquis. We argue that the declaration's assumption-of-responsibility function
        is weakened by reliance on provider self-assessment.
      description: Academic paper analysing the Article 47 declaration (filter-dependent negative)
    - value: >-
        Internal memo to product teams, reproduced in this month's compliance newsletter: Article 47(1)
        requires the provider to draw up 'a written machine readable, physical or electronically signed EU
        declaration of conformity for each high-risk AI system' and to keep it at the disposal of the
        national competent authorities for 10 years after market placement.
      description: Regulation text quoted verbatim in an internal memo (filter-dependent negative)
false_positives:
  - description: Generic CE / New Legislative Framework declarations of conformity (machinery, EMC, RED, medical devices) — the document class shares its title and most boilerplate ('sole responsibility', 'harmonised standards', 'notified body') with every CE-marked product
    mitigation: Primary regex requires AI-specific context (AI system / artificial intelligence / Regulation (EU) 2024/1689) within a bounded 400-character window of the declaration phrase, so purely non-AI declarations do not reach any tier; residual risk remains for multi-regulation declarations that mention AI incidentally
  - description: Signed declarations are provided to authorities and may accompany the product publicly, so a copy is not always sensitive
    mitigation: Treat matches as candidates for classification review; sensitivity concentrates in pre-signature drafts and attached conformity-assessment correspondence
  - description: Compliance-consultancy marketing and template libraries referencing the declaration for AI systems
    mitigation: Noise exclusion on 'book a demo', 'free trial', 'webinar', 'client alert'; template-exclusion shared dictionary suppresses boilerplate sample documents
  - description: News, legal analysis, academic commentary, and internal memos or newsletters quoting Article 47 obligations or the regulation's text verbatim
    mitigation: Noise exclusion on press/academic/newsletter terms; commentary typically uses plural or paraphrased forms rather than the declaration's own content vocabulary. A verbatim Article 47(1) quotation in a plain internal memo carrying no noise term will still satisfy the AI-coupled primary and reach the 75 tier — an accepted residual collision for a concept-class matcher, documented here because such memos discuss exactly this document class
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_eu_ai_act_conformity_declaration_ai_coupled
      matches:
        - ref: Evidence_eu_ai_act_conformity_declaration_primary
        - ref: Evidence_eu_ai_act_conformity_declaration_corroborative
        - ref: Pattern_eu_ai_act_conformity_declaration_citation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_eu_ai_act_conformity_declaration_exclusion
    - confidence_level: 75
      id_match: Pattern_eu_ai_act_conformity_declaration_ai_coupled
      matches:
        - ref: Evidence_eu_ai_act_conformity_declaration_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_eu_ai_act_conformity_declaration_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_eu_ai_act_conformity_declaration_ai_coupled
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_eu_ai_act_conformity_declaration_exclusion
  regexes:
    - id: Pattern_eu_ai_act_conformity_declaration_ai_coupled
      pattern: (?i)\b(?:EU\s+declaration\s+of\s+conformity\b(?=[\s\S]{0,400}?\b(?:AI\s+system|artificial\s+intelligence|Regulation\s+\(EU\)\s+2024/1689)\b)|(?:AI\s+system|artificial\s+intelligence)\b[\s\S]{0,400}?\bEU\s+declaration\s+of\s+conformity\b)
    - id: Pattern_eu_ai_act_conformity_declaration_citation
      pattern: (?i)\bRegulation\s+\(EU\)\s+2024/1689\b
  keywords:
    - id: Evidence_eu_ai_act_conformity_declaration_primary
      groups:
        - match_style: word
          terms:
            - EU declaration of conformity
            - declaration of conformity
      strength: specific
    - id: Evidence_eu_ai_act_conformity_declaration_corroborative
      groups:
        - match_style: word
          terms:
            - sole responsibility
            - harmonised standards
            - notified body
            - conformity assessment procedure
            - authorised representative
            - high-risk AI system
            - electronically signed
            - certificate
      strength: domain
    - id: Filter_eu_ai_act_conformity_declaration_exclusion
      groups:
        - match_style: word
          terms:
            - press release
            - media release
            - blog post
            - webinar
            - book a demo
            - free trial
            - client alert
            - legal update
            - newsletter
            - peer-reviewed
            - paper abstract
            - conference abstract
            - abstract submitted
            - training course
            - online course
            - course syllabus
            - training material
            - thought leadership
      strength: noise
risk_rating: 5
risk_description: >-
  The declaration itself is ultimately provided to authorities and can accompany the product, but drafts
  in circulation before signature — together with notified-body certificates, conformity-assessment
  findings, and the Article 47 assumption of responsibility — reveal the provider's compliance posture and
  time-to-market plans. Moderate harm on disclosure; highest sensitivity attaches to pre-release drafts and
  linked correspondence.
sensitivity_labels:
  us_gov: "CUI Basic"
  uk_gov: "OFFICIAL-SENSITIVE"
references:
  - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32024R1689
  - https://artificialintelligenceact.eu/article/47/
  - https://artificialintelligenceact.eu/annex/5/
