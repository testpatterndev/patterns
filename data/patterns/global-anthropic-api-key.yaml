schema: testpattern/v1
name: Anthropic API Key
slug: global-anthropic-api-key
version: 1.2.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Anthropic (Claude) API keys. Standard keys use the sk-ant-api03- prefix
  followed by a long base64url body ending in AA; admin keys use sk-ant-admin01-.
  A leaked key grants billed access to the Anthropic API and any connected data.
operation: >-
  The complete sk-ant-api03-/sk-ant-admin01- token shape is discovery-only at 65. An explicit
  Anthropic/Claude credential label raises it to 75, while 85 additionally requires production,
  deployment, environment-variable, secret-store, or live-service context. Enforcing tiers reject
  documentation, samples, placeholders, and templates.
pattern: (?<![A-Za-z0-9])sk-ant-(?:api03|admin01)-[A-Za-z0-9_-]{93}AA(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the distinctive sk-ant-api03-/sk-ant-admin01- prefix, fixed body
  length and trailing AA make false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - anthropic
    - claude
    - api key
    - api_key
    - ANTHROPIC_API_KEY
    - bearer token
    - x-api-key
  proximity: 300
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_anthropic_api_key
      matches:
        - ref: Evidence_anthropic_label
        - ref: Evidence_live_deployment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_documentation_context
    - confidence_level: 75
      id_match: Regex_anthropic_api_key
      matches:
        - ref: Evidence_anthropic_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_documentation_context
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_anthropic_api_key
  regexes:
    - id: Regex_anthropic_api_key
      pattern: (?<![A-Za-z0-9])sk-ant-(?:api03|admin01)-[A-Za-z0-9_-]{93}AA(?![A-Za-z0-9])
  keywords:
    - id: Evidence_anthropic_label
      groups:
        - match_style: word
          terms:
            - Anthropic API key
            - Claude API key
            - ANTHROPIC_API_KEY
            - x-api-key
            - Anthropic admin key
      strength: specific
    - id: Evidence_live_deployment
      groups:
        - match_style: word
          terms:
            - production deployment
            - production service
            - live service
            - environment variable
            - deployment secret
            - secret store
            - CI/CD secret
      strength: specific
    - id: Evidence_documentation_context
      groups:
        - match_style: word
          terms:
            - public documentation
            - documentation example
            - sample configuration
            - placeholder token
      strength: exclusion
test_cases:
  should_match:
    - value: sk-ant-api03-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdeAA
      description: Low-tier probe - complete token without provider or deployment context
    - value: 'Anthropic API key: sk-ant-admin01-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdeAA'
      description: Medium-tier probe - provider-labelled token without live deployment context
    - value: 'Production deployment secret ANTHROPIC_API_KEY=sk-ant-api03-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdeAA'
      description: High-tier probe - provider label plus live deployment context
  should_not_match:
    - value: sk-ant-api03-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij
      description: Too short to be a valid Anthropic key body
    - value: sk-ant-api02-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_ABCDEFGHIJKLMNOPQRSTUVWXYZ12AA
      description: Wrong version marker (api02 instead of api03/admin01)
    - value: please rotate the anthropic claude api key before release
      description: Prose mention without a token value
    - value: 'Public documentation example: production deployment ANTHROPIC_API_KEY=sk-ant-api03-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdeAA'
      description: Public example containing a structurally complete token
    - value: 'Template placeholder token: Anthropic API key sk-ant-admin01-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdeAA for a production service'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Documentation or examples showing placeholder sk-ant- strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This high-confidence detector recognises Anthropic API keys with the distinctive sk-ant-api03 or sk-ant-admin01 prefix and full-length token body. A live key can fund unauthorised model calls and expose prompts, uploaded documents, or connected application data available to the issuing account. The normal unit is one revocable key whose billing and data impact is bounded by its account role, not an assumed enterprise-wide compromise. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED requires demonstrated broad administrative scope, critical operations, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
