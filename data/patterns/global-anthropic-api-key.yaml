schema: testpattern/v1
name: Anthropic API Key
slug: global-anthropic-api-key
version: 1.1.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Anthropic (Claude) API keys. Standard keys use the sk-ant-api03- prefix
  followed by a long base64url body ending in AA; admin keys use sk-ant-admin01-.
  A leaked key grants billed access to the Anthropic API and any connected data.
operation: 'Prefixed token formats sk-ant-api03- and sk-ant-admin01- followed by a ~95 char base64url body. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9])sk-ant-(?:api03|admin01)-[A-Za-z0-9_-]{93}AA(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the distinctive sk-ant-api03-/sk-ant-admin01- prefix, fixed body
  length and trailing AA make false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - anthropic
    - claude
    - api key
    - api_key
    - ANTHROPIC_API_KEY
    - bearer token
    - x-api-key
  proximity: 300
test_cases:
  should_match:
    - value: sk-ant-api03-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdeAA
      description: Standard Anthropic API key, sk-ant-api03- prefix + 93 chars + AA
    - value: 'ANTHROPIC_API_KEY=sk-ant-api03-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdeAA'
      description: Labelled Anthropic key in an env assignment
    - value: sk-ant-admin01-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdeAA
      description: Anthropic admin API key, sk-ant-admin01- prefix
  should_not_match:
    - value: sk-ant-api03-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij
      description: Too short to be a valid Anthropic key body
    - value: sk-ant-api02-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_ABCDEFGHIJKLMNOPQRSTUVWXYZ12AA
      description: Wrong version marker (api02 instead of api03/admin01)
    - value: please rotate the anthropic claude api key before release
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder sk-ant- strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This high-confidence detector recognises Anthropic API keys with the distinctive sk-ant-api03 or sk-ant-admin01 prefix and full-length token body. A live key can fund unauthorised model calls and expose prompts, uploaded documents, or connected application data available to the issuing account. The normal unit is one revocable key whose billing and data impact is bounded by its account role, not an assumed enterprise-wide compromise. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED requires demonstrated broad administrative scope, critical operations, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
