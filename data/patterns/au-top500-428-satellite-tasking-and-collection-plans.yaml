schema: testpattern/v1
name: Satellite tasking and collection plans
slug: au-top500-428-satellite-tasking-and-collection-plans
version: 1.3.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to satellite tasking and collection plans in Australian contexts. This information type is classified as personally identifiable information under the
  Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:satellite\s+tasking|collection\s+plan|orbital\s+tasking|reconnaissance\s+satellite|imagery\s+collection|defense\s+satellite|intelligence\s+collection|tasking\s+order|satellite\s+schedule|national\s+security|overhead\s+collection)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - satellite tasking and collection plans
    - satellite
    - tasking
    - collection
    - plans
    - defense
    - intelligence
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: satellite tasking
      description: Primary topic phrase match
    - value: collection plan
      description: Case-insensitive topic phrase match
    - value: orbital tasking
      description: Alternative topic phrase match
    - value: reconnaissance satellite
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to satellite tasking and collection plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_satellite_tasking_collection_plans
      matches:
        - ref: Evidence_satellite_tasking_collection_plans
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_satellite_tasking_collection_plans
      matches:
        - ref: Evidence_satellite_tasking_collection_plans
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_satellite_tasking_collection_plans
      matches:
        - ref: Evidence_satellite_tasking_collection_plans
  regexes:
    - id: Pattern_satellite_tasking_collection_plans
      pattern: >-
        (?is)\b(?:satellite\s+tasking|collection\s+plan|orbital\s+tasking|reconnaissance\s+satellite|imagery\s+collection|defense\s+satellite|intelligence\s+collection|tasking\s+order|satellite\s+schedule|national\s+security|overhead\s+collection)\b
  keywords:
    - id: Evidence_satellite_tasking_collection_plans
      groups:
        - match_style: word
          terms:
            - satellite tasking
            - collection plan
            - orbital tasking
            - reconnaissance satellite
            - imagery collection
            - defense satellite
            - intelligence collection
            - tasking order
            - satellite schedule
            - national security
            - classified
            - overhead collection
risk_description: >-
  The concept detector recognises satellite tasking, collection plan, orbital tasking, and reconnaissance satellite language with seven corroborating terms. A genuine plan may expose collection priorities, time windows, sensor use, coverage gaps, targets, and partner dependencies, enabling concealment or interference. Public space schedules, research planning, and training can also match because the regex does not require a current classified target or sensor capability. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. Current tasking reveals targets, sensor use, collection windows, coverage gaps and partner dependencies. An adversary can conceal activity or interfere, causing significant strategic capability damage. Risk 9 and PROTECTED Government therefore apply to the confirmed record itself. Require current tasking windows, sensor/orbit/target fields or classified caveats; public mission schedules and research planning remain audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
