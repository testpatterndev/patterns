schema: testpattern/v1
name: Satellite tasking and collection plans
slug: au-top500-428-satellite-tasking-and-collection-plans
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to satellite tasking and collection plans in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:satellite\s+tasking|collection\s+plan|orbital\s+tasking|reconnaissance\s+satellite|imagery\s+collection|defense\s+satellite|intelligence\s+collection|tasking\s+order|satellite\s+schedule|national\s+security|overhead\s+collection)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - satellite tasking and collection plans
    - satellite
    - tasking
    - collection
    - plans
    - defense
    - intelligence
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: satellite tasking
      description: Primary topic phrase match
    - value: collection plan
      description: Case-insensitive topic phrase match
    - value: orbital tasking
      description: Alternative topic phrase match
    - value: reconnaissance satellite
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to satellite tasking and collection plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_satellite_tasking_collection_plans
      matches:
        - ref: Evidence_satellite_tasking_collection_plans
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_satellite_tasking_collection_plans
      matches:
        - ref: Evidence_satellite_tasking_collection_plans
    - confidence_level: 65
      id_match: Pattern_satellite_tasking_collection_plans
      matches:
        - ref: Evidence_satellite_tasking_collection_plans
  regexes:
    - id: Pattern_satellite_tasking_collection_plans
      pattern: (?is)\b(?:satellite\s+tasking|collection\s+plan|orbital\s+tasking|reconnaissance\s+satellite|imagery\s+collection|defense\s+satellite|intelligence\s+collection|tasking\s+order|satellite\s+schedule|national\s+security|overhead\s+collection)\b
  keywords:
    - id: Evidence_satellite_tasking_collection_plans
      groups:
        - match_style: word
          terms:
            - satellite tasking
            - collection plan
            - orbital tasking
            - reconnaissance satellite
            - imagery collection
            - defense satellite
            - intelligence collection
            - tasking order
            - satellite schedule
            - national security
            - classified
            - overhead collection
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Secret
