schema: testpattern/v1
name: Data room due diligence documents
slug: global-top500-183-data-room-due-diligence-documents
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to data room due diligence documents in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword lists: corporate-m-and-a. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:data\s+room|due\s+diligence|virtual\s+data\s+room|deal\s+room|document\s+index|disclosure\s+schedule|transaction\s+documents|mergers\s+and\s+acquisitions|buyer\s+diligence|seller\s+disclosure)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - data room due diligence documents
    - data
    - room
    - due
    - diligence
    - documents
    - mergers
    - acquisitions
    - strategy
  proximity: 300
  keyword_lists:
    - corporate-m-and-a
test_cases:
  should_match:
    - value: data room
      description: Primary topic phrase match
    - value: due diligence
      description: Case-insensitive topic phrase match
    - value: virtual data room
      description: Alternative topic phrase match
    - value: deal room
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to data room due diligence documents appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_data_room_due_diligence
      matches:
        - ref: Pattern_global_top500_183_data_room_due_diligence_documents_label_context
        - ref: Keyword_global_top500_183_data_room_due_diligence_documents_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_183_data_room_due_diligence_documents_noise_exclusion
    - confidence_level: 75
      id_match: Regex_data_room_due_diligence
      matches:
        - ref: Keyword_data_room_due_diligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_183_data_room_due_diligence_documents_noise_exclusion
    - confidence_level: 65
      id_match: Regex_data_room_due_diligence
      matches:
        - ref: Keyword_data_room_due_diligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_183_data_room_due_diligence_documents_noise_exclusion
  regexes:
    - id: Regex_data_room_due_diligence
      pattern: (?is)\b(?:data\s+room|due\s+diligence|virtual\s+data\s+room|deal\s+room|document\s+index|disclosure\s+schedule|transaction\s+documents|mergers\s+and\s+acquisitions|buyer\s+diligence|seller\s+disclosure)\b
    - id: Pattern_global_top500_183_data_room_due_diligence_documents_label_context
      pattern: (?i)\\b(?:data\\s+room\\s+due\\s+diligence\\s+documents|room|due|diligence|documents|top500)\\b
  keywords:
    - id: Keyword_data_room_due_diligence
      groups:
        - match_style: word
          terms:
            - data room
            - due diligence
            - virtual data room
            - confidential
            - deal room
            - document index
            - disclosure schedule
            - transaction documents
            - mergers and acquisitions
            - buyer diligence
            - seller disclosure
    - id: Keyword_global_top500_183_data_room_due_diligence_documents_domain_context
      groups:
        - match_style: word
          terms:
            - data room due diligence documents
