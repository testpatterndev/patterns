schema: testpattern/v1
name: Counter-Terrorism Assessment File
slug: counter-terrorism-assessment-file
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects documents containing terrorism threat assessments, persons of interest profiles, and counter-terrorism operational capabilities. Disclosure enables counter-surveillance by terrorist subjects and compromises national security monitoring. Includes JCTT (Joint Counter Terrorism Team) and QPS Security and Counter-Terrorism Group documents.
operation: 'Keyword proximity: primary keywords (counter-terrorism, CT assessment, terrorism threat assessment, national threat advisory, foreign fighter, radicalisation assessment, fixated threat) within 300 characters of subject identifiers and intelligence assessment language. Document markers from JCTT and QPS SCTG templates. Trainable classifier recommended for CT assessment document structure. Negative keyword exclusion for public threat advisories and media.'
pattern: (?i)\b(counter[\-\s]terrorism\s+(?:assessment|intelligence|briefing)|CT\s+assessment|terrorism\s+threat\s+assessment|national\s+threat\s+advisory|radicalisation\s+assessment|fixated\s+threat\s+(?:assessment|report)|foreign\s+fighter\s+(?:assessment|profile))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of counter-terrorism assessment terminology with subject identifiers and intelligence classification markers. The combination of CT-specific language with operational detail distinguishes genuine assessments from publicly available threat level announcements and media reporting.'
jurisdictions:
  - global
regulations:
- "Criminal Code Act 1995 (Cth)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - NATIONAL SECURITY
    - JCTT
    - Joint Counter Terrorism Team
    - SCTG
    - Security and Counter-Terrorism Group
    - ASIO
    - AFP
    - National Terrorism Threat Level
    - person of interest
    - radicalisation indicators
    - attack planning
    - threat to life
    - fixated person
  proximity: 300
  keyword_lists:

    - law-enforcement
    - en-government-classification
test_cases:
  should_match:
    - value: 'PROTECTED — NATIONAL SECURITY. Counter-Terrorism Assessment. JCTT Reference: CT-2025-QLD-0089. Subject: Ahmed Khalil FAROUK, DOB 14/07/1993. Radicalisation assessment: Subject has been consuming extremist material online and has expressed support for ISIL. National Terrorism Threat Level: PROBABLE. Recommendation: elevated monitoring and AFP referral.'
      description: JCTT counter-terrorism assessment with subject identification and radicalisation indicators
    - value: 'QPS Security and Counter-Terrorism Group intelligence briefing. Fixated threat assessment for subject who has issued threats against Queensland Parliament House. CT assessment indicates subject has conducted hostile reconnaissance. Foreign fighter database check: negative. ASIO referral recommended under s.4 of ASIO Act.'
      description: QPS SCTG fixated threat assessment with ASIO referral recommendation
    - value: Terrorism threat assessment update — Operation SENTINEL. Three persons of interest identified in South-East Queensland with links to foreign fighter networks. Counter-terrorism intelligence indicates planned travel to conflict zone. National threat advisory distributed to all JCTT partner agencies.
      description: Multi-subject terrorism threat assessment with foreign fighter network links
  should_not_match:
    - value: The Australian Government has set the National Terrorism Threat Level at PROBABLE, meaning a terrorist attack is likely. The public is advised to be vigilant and report suspicious behaviour to the National Security Hotline.
      description: Public terrorism threat level announcement
    - value: Researchers at the Australian National University published a study on radicalisation pathways among Australian foreign fighters who travelled to Syria. The study used publicly available court records and media reports.
      description: Academic research on radicalisation using public sources
    - value: The ABC Four Corners program investigated Australia's counter-terrorism framework, interviewing former ASIO officers about the challenges of monitoring persons of interest within the community.
      description: Television journalism about counter-terrorism with former officials
false_positives:
  - description: Public national terrorism threat level announcements and advisories
    mitigation: 'Negative keyword exclusion: ''public advisory'', ''public announcement'', ''media release'', ''public is advised''. Require proximity to specific subject identifiers.'
  - description: Academic research on terrorism and radicalisation
    mitigation: 'Negative keyword exclusion: ''academic'', ''university'', ''researcher'', ''study'', ''published'', ''journal'', ''court records'''
  - description: Media reporting and documentaries on counter-terrorism
    mitigation: 'Negative keyword exclusion: ''news'', ''media'', ''Four Corners'', ''documentary'', ''former officer'', ''interview'', ''television'''
  - description: Government policy documents on counter-terrorism strategy
    mitigation: 'Negative keyword exclusion: ''strategy document'', ''white paper'', ''policy framework'', ''national strategy'', ''public consultation'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: en-government-classification
      as: Evidence_classification_markers
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_counter_terrorism_assessment_file_ct_assessment_terms
      matches:
        - ref: Evidence_counter_terrorism_assessment_file_primary_keywords
        - ref: Evidence_counter_terrorism_assessment_file_classification_markers
        - ref: Evidence_counter_terrorism_assessment_file_corroborative_terms
        - ref: Pattern_counter_terrorism_assessment_file_jctt_reference
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_counter_terrorism_assessment_file_exclusion
    - confidence_level: 75
      id_match: Pattern_counter_terrorism_assessment_file_ct_assessment_terms
      matches:
        - ref: Evidence_counter_terrorism_assessment_file_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_counter_terrorism_assessment_file_exclusion
    - confidence_level: 65
      id_match: Pattern_counter_terrorism_assessment_file_ct_assessment_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_counter_terrorism_assessment_file_exclusion
  regexes:
    - id: Pattern_counter_terrorism_assessment_file_ct_assessment_terms
      pattern: (?i)\b(counter[\-\s]terrorism\s+assessment|CT\s+assessment|terrorism\s+threat\s+assessment|radicalisation\s+assessment|fixated\s+threat)\b
    - id: Pattern_counter_terrorism_assessment_file_jctt_reference
      pattern: \bCT-\d{4}-[A-Z]{2,5}-\d{3,5}\b
  keywords:
    - id: Evidence_counter_terrorism_assessment_file_primary_keywords
      groups:
        - match_style: word
          terms:
            - counter-terrorism assessment
            - CT assessment
            - terrorism threat assessment
            - national threat advisory
            - radicalisation assessment
            - fixated threat assessment
            - foreign fighter assessment
            - counter-terrorism intelligence
            - terrorism intelligence briefing
    - id: Evidence_counter_terrorism_assessment_file_classification_markers
      groups:
        - match_style: word
          terms:
            - NATIONAL SECURITY
    - id: Evidence_counter_terrorism_assessment_file_corroborative_terms
      groups:
        - match_style: word
          terms:
            - JCTT
            - Joint Counter Terrorism Team
            - SCTG
            - Security and Counter-Terrorism Group
            - ASIO
            - AFP
            - National Terrorism Threat Level
            - person of interest
            - radicalisation indicators
            - attack planning
            - hostile reconnaissance
            - foreign fighter
    - id: Filter_counter_terrorism_assessment_file_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - annual report
            - public advisory
            - academic
            - university
            - research
            - news article
            - television
            - documentary
            - public consultation
            - white paper
            - former officer
            - interview

risk_rating: 10
risk_description: "Terrorism threat assessments, persons of interest, and counter-terrorism capabilities; disclosure enables counter-surveillance and compromises national security."
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Law-Enforcement
references: []
created: '2026-02-20'
updated: '2026-03-06'
author: qld-gov-dlp
