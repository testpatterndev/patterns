schema: testpattern/v1
name: SWIFT or BIC codes
slug: au-top500-104-swift-or-bic-codes
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to swift or bic codes in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: financial-deposit-terms.
pattern: (?is)\b(?:SWIFT\s+code|BIC\s+code|bank\s+identifier\s+code|correspondent\s+bank|wire\s+transfer|international\s+payment|SWIFT\s+network|bank\s+code|routing\s+code)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - swift or bic codes
    - swift
    - bic
    - codes
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
test_cases:
  should_match:
    - value: SWIFT code
      description: Primary topic phrase match
    - value: bic code
      description: Case-insensitive topic phrase match
    - value: bank identifier code
      description: Alternative topic phrase match
    - value: correspondent bank
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_swift_or_bic_codes
      matches:
        - ref: Evidence_swift_or_bic_codes
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_swift_or_bic_codes
      matches:
        - ref: Evidence_swift_or_bic_codes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_swift_or_bic_codes
      matches:
        - ref: Evidence_swift_or_bic_codes
  regexes:
    - id: Pattern_swift_or_bic_codes
      pattern: (?is)\b(?:SWIFT\s+code|BIC\s+code|bank\s+identifier\s+code|correspondent\s+bank|wire\s+transfer|international\s+payment|SWIFT\s+network|bank\s+code|routing\s+code)\b
  keywords:
    - id: Evidence_swift_or_bic_codes
      groups:
        - match_style: word
          terms:
            - SWIFT code
            - BIC code
            - bank identifier code
            - SWIFT
            - text: BIC
              case_sensitive: true
            - correspondent bank
            - wire transfer
            - international payment
            - interbank
            - SWIFT network
            - bank code
            - routing code
      strength: specific
risk_description: >-
  The regex recognises SWIFT-code, BIC-code, bank-identifier-code, correspondent-bank, wire-transfer, international-payment, network, and routing-code terminology. It does not parse the eight- or eleven-character structure of a BIC and therefore may indicate only payment-rail discussion. Even a real BIC usually identifies a bank or branch rather than a personal account, and payment fraud needs beneficiary details plus authority. Risk 4 OFFICIAL reflects low standalone harm; SENSITIVE would require a complete non-public payment instruction or linked customer transaction.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
