schema: testpattern/v1
name: Personalausweis
slug: at-identity-card
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Personalausweis patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or
  use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-austria-identity-card Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{8}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - eu
  - at
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - personalausweis
    - identity card
    - Ausweis
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '12345678'
      description: Eight-digit Austrian ID card number
    - value: '98765432'
      description: Another Austrian ID card
    - value: '45678901'
      description: Valid format Austrian ID
  should_not_match:
    - value: '1234567'
      description: Too few digits (7)
    - value: '123456789'
      description: Too many digits (9)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Eight-digit numeric sequences are extremely common in dates, phone numbers, account numbers, and other non-identity contexts.
    mitigation: Require corroborative evidence keywords such as "personalausweis" or "identity card" within the proximity window.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_at_identity_card
      matches:
        - ref: Pattern_at_identity_card_label_context
        - ref: Keyword_at_identity_card_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_at_identity_card
      matches:
        - ref: Keyword_at_identity_card
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_at_identity_card
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_at_identity_card
      pattern: \b\d{8}\b
    - id: Pattern_at_identity_card_label_context
      pattern: (?i)\b(?:personalausweis|identity|card)\b
  keywords:
    - id: Keyword_at_identity_card
      groups:
        - match_style: word
          terms:
            - Personalausweis
            - Personalausweisnummer
            - Ausweis
            - Ausweisnummer
            - identity card
            - identity card number
            - ID card
            - Identitätskarte
            - Identitätsnachweis
            - Ausweisdokument
            - Lichtbildausweis
            - Identifikationsnummer
      strength: domain
    - id: Keyword_at_identity_card_domain_context
      groups:
        - match_style: word
          terms:
            - personalausweis
            - identity
            - card
      strength: domain
  filters:
    - id: Filter_at_identity_card_same_digits
      type: AllDigitsSameFilter
risk_rating: 7
risk_description: Government-issued identity card numbers are primary identification documents in many countries. Exposure enables identity fraud, unauthorized access to services, and creation of forged documents.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-austria-identity-card
    title: Austria Identity Card entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
