schema: testpattern/v1
name: AWS Access Key
slug: global-aws-access-key
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: Detects AWS Access Key patterns.
operation: >-
  Reference: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_identifiers.html Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}\b
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: AKIAIOSFODNN7EXAMPLE
      description: AWS access key with AKIA prefix
    - value: ASIAIOSFODNN7EXAMPLE
      description: AWS temporary access key (ASIA)
    - value: AGPAIOSFODNN7EXAMPLE
      description: AWS group key (AGPA)
  should_not_match:
    - value: XKIAIOSFODNN7EXAMPLE
      description: Invalid prefix (XKIA instead of AKIA/ASIA/etc.)
    - value: AKIA123456789012345
      description: Too few characters after prefix (15 instead of 16)
    - value: AKIAIOSFODNN7EXAMP!E
      description: Contains special character (!) not in allowed set
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_aws_access_key
      matches:
        - ref: Pattern_global_aws_access_key_label_context
        - ref: Keyword_global_aws_access_key_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_aws_access_key
      matches:
        - ref: Keyword_aws_access_key
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_aws_access_key
      pattern: \b(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}\b
    - id: Pattern_global_aws_access_key_label_context
      pattern: (?i)\b(?:aws\s+access\s+key|aws|access|key)\b
  keywords:
    - id: Keyword_aws_access_key
      groups:
        - match_style: word
          terms:
            - aws
            - access key
            - access_key
            - aws_access_key_id
            - AKIA
            - text: IAM
              case_sensitive: true
            - secret key
            - credentials
            - amazon web services
            - api key
      strength: specific
    - id: Keyword_global_aws_access_key_domain_context
      groups:
        - match_style: word
          terms:
            - aws access key
            - aws
            - access
            - key
      strength: domain
risk_description: >-
  This regex detects an AWS access key ID with a recognized prefix and fixed identifier length, not the paired secret access key required to sign requests. Disclosure can reveal that an AWS principal exists and can help correlate logs, repositories, or a separately leaked secret, but the identifier alone cannot authenticate. The immediate impact on the AWS account owner is therefore low and usually reversible, with material additional credential and account context needed for misuse. Risk 5 OFFICIAL recognizes the identifier's security relevance; a matched secret pair or session credential would justify a higher classification.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
