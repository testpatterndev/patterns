schema: testpattern/v1
name: DigitalOcean Personal Access Token
slug: global-digitalocean-personal-access-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects DigitalOcean personal access tokens (dop_v1_ prefix). These tokens authenticate to the
  DigitalOcean API and can manage droplets, databases, DNS and billing; a leak enables full account control.
operation: 'Prefixed token format dop_v1_ followed by 64 lowercase hexadecimal characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_])dop_v1_[a-f0-9]{64}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the distinctive dop_v1_ prefix with a fixed 64-character hex body makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - digitalocean
    - digital ocean
    - doctl
    - api.digitalocean.com
    - personal access token
    - droplet
  proximity: 300
test_cases:
  should_match:
    - value: dop_v1_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      description: Exact 65 probe - distinctive token structure without provider context
    - value: 'DigitalOcean droplet API credential dop_v1_abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789'
      description: Exact 75 probe - token corroborated by a DigitalOcean resource context
    - value: 'DigitalOcean API credential DIGITALOCEAN_TOKEN=dop_v1_deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef'
      description: Exact 85 probe - provider context plus canonical secret assignment
  should_not_match:
    - value: dop_v1_0123456789abcdef
      description: Too short to be a DigitalOcean PAT
    - value: doo_v1_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      description: OAuth token prefix (doo_v1_), not a personal access token
    - value: 'GITHUB_TOKEN=dop_v1_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      description: Sibling provider label does not corroborate a DigitalOcean token
    - value: 'Documentation example: DigitalOcean API DIGITALOCEAN_TOKEN=dop_v1_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
      description: Documentation example with a valid-shaped token is excluded
    - value: create a digitalocean personal access token in the API settings
      description: Prose mention without a token value
false_positives:
  - description: 64-char hex digests accidentally prefixed with dop_v1_ in documentation.
    mitigation: Require corroborative DigitalOcean keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This high-confidence pattern detects a DigitalOcean personal access token with the dop_v1 prefix and a 64-character hexadecimal body. A live token can manage droplets, databases, snapshots, DNS, and billing according to the issuing account's scopes. The normal match is one revocable token and can cause serious cloud harm, but the detector does not prove unrestricted control of every resource or a critical service. Risk 8 and SENSITIVE InfoTech reflect direct cloud API authority within unknown scopes; PROTECTED requires verified account-wide privilege over critical production services or similarly significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_digitalocean_pat
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_digitalocean_pat
      matches:
        - ref: Keyword_digitalocean_platform_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_digitalocean_pat
      matches:
        - ref: Keyword_digitalocean_platform_context
        - ref: Pattern_digitalocean_token_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_digitalocean_pat
      pattern: (?<![A-Za-z0-9_])dop_v1_[a-f0-9]{64}(?![A-Za-z0-9])
    - id: Pattern_digitalocean_token_assignment
      pattern: (?i)\b(?:DIGITALOCEAN_TOKEN|DIGITALOCEAN_ACCESS_TOKEN|DO_API_TOKEN)\s*[=:]
  keywords:
    - id: Keyword_digitalocean_platform_context
      groups:
        - match_style: string
          terms:
            - DigitalOcean API
            - DigitalOcean account
            - DigitalOcean droplet
            - DigitalOcean project
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
changelog:
