schema: testpattern/v1
name: Frequent traveler numbers
slug: global-top500-058-frequent-traveler-numbers
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to frequent traveler numbers in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:frequent\s+traveler|frequent\s+flyer|loyalty\s+number|mileage\s+number|membership\s+number|rewards\s+program|airline\s+loyalty|hotel\s+loyalty|traveler\s+profile|elite\s+status|miles\s+account)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - frequent traveler numbers
    - frequent
    - traveler
    - numbers
    - contact
    - location
    - data
  proximity: 300
test_cases:
  should_match:
    - value: frequent traveler
      description: Primary topic phrase match
    - value: frequent flyer
      description: Case-insensitive topic phrase match
    - value: loyalty number
      description: Alternative topic phrase match
    - value: mileage number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to frequent traveler numbers appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_frequent_traveler
      matches:
        - ref: Pattern_global_top500_058_frequent_traveler_numbers_label_context
        - ref: Keyword_global_top500_058_frequent_traveler_numbers_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_058_frequent_traveler_numbers_noise_exclusion
    - confidence_level: 75
      id_match: Regex_frequent_traveler
      matches:
        - ref: Keyword_frequent_traveler
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_058_frequent_traveler_numbers_noise_exclusion
    - confidence_level: 65
      id_match: Regex_frequent_traveler
      matches:
        - ref: Keyword_frequent_traveler
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_058_frequent_traveler_numbers_noise_exclusion
  regexes:
    - id: Regex_frequent_traveler
      pattern: (?is)\b(?:frequent\s+traveler|frequent\s+flyer|loyalty\s+number|mileage\s+number|membership\s+number|rewards\s+program|airline\s+loyalty|hotel\s+loyalty|traveler\s+profile|elite\s+status|miles\s+account)\b
    - id: Pattern_global_top500_058_frequent_traveler_numbers_label_context
      pattern: (?i)\\b(?:frequent\\s+traveler\\s+numbers|frequent|traveler|top500)\\b
  keywords:
    - id: Keyword_frequent_traveler
      groups:
        - match_style: word
          terms:
            - frequent traveler
            - frequent flyer
            - loyalty number
            - mileage number
            - membership number
            - rewards program
            - airline loyalty
            - hotel loyalty
            - traveler profile
            - elite status
            - miles account
    - id: Keyword_global_top500_058_frequent_traveler_numbers_domain_context
      groups:
        - match_style: word
          terms:
            - frequent traveler numbers
            - frequent
            - traveler
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_058_frequent_traveler_numbers_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
