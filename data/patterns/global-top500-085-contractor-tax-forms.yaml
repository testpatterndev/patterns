schema: testpattern/v1
name: Contractor tax forms
slug: global-top500-085-contractor-tax-forms
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to contractor tax forms in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:contractor\s+tax\s+forms|independent\s+contractor|subcontractor\s+payment|ABN\s+invoice|contractor\s+declaration|tax\s+invoice|withholding\s+variation|contractor\s+agreement|vendor\s+tax\s+form)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - contractor tax forms
    - contractor
    - tax
    - forms
    - payroll
    - operations
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: contractor tax forms
      description: Primary topic phrase match
    - value: independent contractor
      description: Case-insensitive topic phrase match
    - value: subcontractor payment
      description: Alternative topic phrase match
    - value: ABN invoice
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_contractor_tax_forms
      matches:
        - ref: Pattern_global_top500_085_contractor_tax_forms_label_context
        - ref: Keyword_global_top500_085_contractor_tax_forms_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_085_contractor_tax_forms_noise_exclusion
    - confidence_level: 75
      id_match: Regex_contractor_tax_forms
      matches:
        - ref: Keyword_contractor_tax_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_085_contractor_tax_forms_noise_exclusion
    - confidence_level: 65
      id_match: Regex_contractor_tax_forms
      matches:
        - ref: Keyword_contractor_tax_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_085_contractor_tax_forms_noise_exclusion
  regexes:
    - id: Regex_contractor_tax_forms
      pattern: (?is)\b(?:contractor\s+tax\s+forms|independent\s+contractor|subcontractor\s+payment|ABN\s+invoice|contractor\s+declaration|tax\s+invoice|withholding\s+variation|contractor\s+agreement|vendor\s+tax\s+form)\b
    - id: Pattern_global_top500_085_contractor_tax_forms_label_context
      pattern: (?i)\\b(?:contractor\\s+tax\\s+forms|contractor|tax|forms|top500)\\b
  keywords:
    - id: Keyword_contractor_tax_forms
      groups:
        - match_style: word
          terms:
            - contractor tax forms
            - 1099
            - independent contractor
            - subcontractor payment
            - ABN invoice
            - contractor declaration
            - tax invoice
            - withholding variation
            - contractor agreement
            - vendor tax form
            - W-9
    - id: Keyword_global_top500_085_contractor_tax_forms_domain_context
      groups:
        - match_style: word
          terms:
            - contractor tax forms
            - contractor
            - tax
            - forms
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_085_contractor_tax_forms_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
