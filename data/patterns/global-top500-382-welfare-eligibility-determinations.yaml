schema: testpattern/v1
name: Welfare eligibility determinations
slug: global-top500-382-welfare-eligibility-determinations
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies individual welfare, social-assistance, and income-support eligibility decisions. Topic
  phrases are retained for discovery; enforcement requires applicant, household, income, dependant,
  means-test, benefit-category, outcome, review-right, or effective-date fields, and high confidence
  also requires a formal case/application reference or recorded eligibility decision.
operation: >-
  Regex_welfare_eligibility recognises welfare, social-assistance, and income-support eligibility
  determinations. The topic alone is discovery-only at 65. Substantive assessment fields raise it to
  75; a formal case/application reference or decision status reaches 85. Enforcing tiers reject
  explicit templates and training examples.
pattern: >-
  (?is)\b(?:welfare\s+(?:benefit\s+)?eligibility\s+(?:determination|decision)|social\s+assistance\s+eligibility\s+(?:determination|decision)|income\s+support\s+eligibility\s+(?:determination|decision))s?\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive claimant assessment fields. High confidence adds a formal
  case/application reference or recorded decision status.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - welfare eligibility determinations
  proximity: 240
test_cases:
  should_match:
    - value: welfare eligibility determination
      description: Low-tier probe - welfare decision topic without assessment fields
    - value: 'Welfare eligibility determination: applicant household, household income, dependant children, means test result, benefit category, assessment outcome, review rights, and effective date'
      description: Medium-tier probe - substantive determination without formal reference or decision status
    - value: 'Welfare eligibility determination, application reference: WEL-2026-104: applicant household, household income, dependant children, means test result, benefit category, assessment outcome, decision approved, review rights, and effective date'
      description: High-tier probe - substantive determination with formal application reference and decision
  should_not_match:
    - value: The policy describes welfare benefits and means-test thresholds.
      description: Public policy discussion without an individual determination
    - value: The scholarship eligibility assessment reviews household income.
      description: Non-welfare eligibility context
    - value: 'Training example: welfare eligibility determination WEL-2026-104 with household income, assessment outcome, and decision approved'
      description: Explicit training content must not enforce
false_positives:
  - description: Welfare policy, published eligibility criteria, and unrelated scholarship or insurance assessments discuss income, dependants, means tests, and outcomes.
    mitigation: Require a welfare, social-assistance, or income-support eligibility determination before considering claimant assessment fields.
  - description: Training determinations can contain realistic applicant details, references, outcomes, and review rights.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_welfare_eligibility
      matches:
        - ref: Evidence_welfare_assessment
        - ref: Evidence_welfare_formal_decision
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_welfare_eligibility
      matches:
        - ref: Evidence_welfare_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_welfare_eligibility
  regexes:
    - id: Regex_welfare_eligibility
      pattern: >-
        (?is)\b(?:welfare\s+(?:benefit\s+)?eligibility\s+(?:determination|decision)|social\s+assistance\s+eligibility\s+(?:determination|decision)|income\s+support\s+eligibility\s+(?:determination|decision))s?\b
    - id: Evidence_welfare_formal_decision
      pattern: >-
        (?i)\b(?:(?:case|claim|application|customer)\s+(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|decision\s*[:=-]?\s*(?:approved|eligible|ineligible|declined|denied))\b
  keywords:
    - id: Evidence_welfare_assessment
      groups:
        - match_style: word
          terms:
            - applicant household
            - household income
            - dependant children
            - dependent children
            - means test result
            - eligibility criteria met
            - eligibility criteria not met
            - benefit category
            - assessment outcome
            - review rights
            - effective date
      strength: domain
risk_description: >-
  The detector recognises welfare-benefit determinations, eligibility assessments, and means-test records with government-service context. An actual determination can reveal household income, dependants, disability or hardship indicators, supporting documents, and the agency's decision, creating stigma, fraud targeting, or unfair treatment. The harm is serious for an applicant and household but generally contained to one benefits case and reversible through administrative review. Risk 8 warrants SENSITIVE Personal-Privacy; PROTECTED would require protected addresses, acute safety risks, or large-scale compromise of highly vulnerable recipients.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
