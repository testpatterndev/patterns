schema: testpattern/v1
name: Scenario planning models
slug: au-top500-200-scenario-planning-models
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to scenario planning models in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Three-tier purview detection: high confidence (85) matches M&A/strategy structural pattern with scenario planning evidence and template exclusion; medium confidence (75) matches with scenario planning evidence; low confidence (65) matches structural pattern alone. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:scenario\s+planning|scenario\s+model|scenario\s+analysis|base\s+case|downside\s+case|upside\s+case|stress\s+test|sensitivity\s+analysis|what[\s-]+if\s+analysis|contingency\s+planning|risk\s+scenario|Monte\s+Carlo)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - scenario planning models
    - scenario
    - planning
    - models
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: scenario planning
      description: Primary topic phrase match
    - value: scenario model
      description: Case-insensitive topic phrase match
    - value: scenario analysis
      description: Alternative topic phrase match
    - value: base case
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to scenario planning models appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_scenario_planning
      matches:
        - ref: Evidence_scenario_planning
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_scenario_planning
      matches:
        - ref: Evidence_scenario_planning
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_scenario_planning
      matches:
        - ref: Evidence_scenario_planning
  regexes:
    - id: Pattern_scenario_planning
      pattern: (?is)\b(?:scenario\s+planning|scenario\s+model|scenario\s+analysis|base\s+case|downside\s+case|upside\s+case|stress\s+test|sensitivity\s+analysis|what[\s-]+if\s+analysis|contingency\s+planning|risk\s+scenario|Monte\s+Carlo)\b
  keywords:
    - id: Evidence_scenario_planning
      groups:
        - match_style: word
          terms:
            - scenario planning
            - scenario model
            - scenario analysis
            - base case
            - downside case
            - upside case
            - stress test
            - sensitivity analysis
            - what-if analysis
            - contingency planning
            - risk scenario
            - Monte Carlo
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.asic.gov.au/regulatory-resources/find-a-document/regulatory-guides/rg-170-prospective-financial-information/
  - https://www.legislation.gov.au/C2004A00818/latest/text
