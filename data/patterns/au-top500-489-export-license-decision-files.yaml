schema: testpattern/v1
name: Export license decision files
slug: au-top500-489-export-license-decision-files
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to export license decision files in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: au-vehicle-permit-terms.
pattern: >-
  (?is)\b(?:export\s+license|export\s+permit|license\s+decision|defence\s+export|dual[\s-]+use\s+goods|export\s+control|strategic\s+goods|Defence\s+Trade\s+Controls|end[\s-]+user\s+certificate|export\s+application|controlled\s+technology)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - export license decision files
    - export
    - license
    - decision
    - files
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:
    - au-vehicle-permit-terms
test_cases:
  should_match:
    - value: export license
      description: Primary topic phrase match
    - value: export permit
      description: Case-insensitive topic phrase match
    - value: license decision
      description: Alternative topic phrase match
    - value: defence export
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: immigration case
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to export license decision files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_export_license_decision_files
      matches:
        - ref: Evidence_export_license_decision_files
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_export_license_decision_files
      matches:
        - ref: Evidence_export_license_decision_files
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_export_license_decision_files
      matches:
        - ref: Evidence_export_license_decision_files
  regexes:
    - id: Pattern_export_license_decision_files
      pattern: >-
        (?is)\b(?:export\s+license|export\s+permit|license\s+decision|defence\s+export|dual[\s-]+use\s+goods|export\s+control|strategic\s+goods|Defence\s+Trade\s+Controls|end[\s-]+user\s+certificate|export\s+application|controlled\s+technology)\b
  keywords:
    - id: Evidence_export_license_decision_files
      groups:
        - match_style: word
          terms:
            - export license
            - export permit
            - license decision
            - defence export
            - dual-use goods
            - export control
            - strategic goods
            - DSGL
            - Defence Trade Controls
            - end-user certificate
            - export application
            - controlled technology
risk_description: >-
  The detector matches Australian export-licence phrases such as export permit, licence decision, and defence export within a constrained context; its positive cases do not establish an actual decision file. A hit may locate policy, training, or correspondence about export controls, and disclosure could reveal a limited regulatory topic or business interest if the surrounding document is non-public. No applicant, controlled item, destination, decision outcome, personal identifier, or complete case record is required, so direct harm to an exporter or agency is normally low. Risk 4 and OFFICIAL fit the topic-level signal; a populated export-control decision containing parties, goods, reasons, or enforcement information would raise the record toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
