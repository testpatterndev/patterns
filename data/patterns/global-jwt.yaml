schema: testpattern/v1
name: JWT
slug: global-jwt
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects JSON Web Token candidates with three Base64url segments. A generic
  encoded-JSON candidate is discovery-only; a standard encoded algorithm header
  plus encoded JSON payload enforces at medium confidence, and HTTP or session
  transport binding raises the result to high confidence.
operation: >-
  Regex_jwt_candidate requires three non-empty Base64url segments beginning with
  encoded JSON. The 65 tier inventories that shape. The 75 tier additionally
  requires the standard encoded "alg" header prefix and an explicit JWT field
  label. The 85 tier requires an encoded JSON payload too and binds that fuller
  token structure to an Authorization, Cookie, or Set-Cookie transport field.
  Enforcing tiers reject template and placeholder text.
pattern: \beyJ[A-Za-z0-9_-]{5,}\.[A-Za-z0-9_-]{6,}\.[A-Za-z0-9_-]{3,}\b
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: eyJmb28iOiJiYXIifQ.eyJzdWIiOiIxMjMifQ.c2lnbmF0dXJl
      description: Low-tier probe - three encoded segments without a standard alg header
    - value: 'JWT: eyJhbGciOiJSUzI1NiJ9.eyJpc3MiOiJqb2UifQ.abc123-_def456'
      description: Medium-tier probe - labelled JWT with standard header and encoded payload
    - value: 'Authorization: Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.dozjgNryP4J3jVmNHl0w5N_XgL0n3I9PlFUP0THsR8U'
      description: High-tier probe - structurally plausible JWT bound to an Authorization header
  should_not_match:
    - value: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0
      description: Only 2 segments instead of 3
    - value: notJWT.eyJzdWIiOiIxMjM0NTY3ODkwIn0.signature
      description: First segment does not start with eyJ
    - value: eyJ.eyJ.sig
      description: Segments too short to be valid JWT
    - value: 'Authorization: Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxIn0.REDACTED'
      description: Placeholder signature in a transport-bound JWT
    - value: 'Documentation example: Authorization: Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxIn0.c2ln'
      description: Documentation quoting a structurally valid JWT must not enforce
    - value: 'session=YWJjZGVm.Z2hpamts.bW5vcHFy'
      description: Sibling three-segment cookie value does not begin with encoded JSON
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_description: >-
  The regex recognizes a three-segment Base64url token beginning with an encoded JSON object, so it finds a JWT-shaped value but does not require a Bearer header or validate its signature. If the token is active and accepted by its issuer's service, disclosure can permit session replay; even an unusable token may reveal claims about its subject, issuer, roles, or tenancy. The likely scale is one identity or application session and its granted resources, with expired, unsigned, test, identity-only, and example tokens reducing direct harm. Risk 8 SENSITIVE is retained for a validated access token because compromise can be serious, while PROTECTED requires proven broad privilege or critical-service scope.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_jwt_candidate
      matches:
        - ref: Evidence_jwt_standard_header
        - ref: Evidence_jwt_encoded_payload
        - ref: Evidence_jwt_transport
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_placeholder_jwt
    - confidence_level: 75
      id_match: Regex_jwt_candidate
      matches:
        - ref: Evidence_jwt_standard_header
        - ref: Evidence_jwt_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_placeholder_jwt
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_jwt_candidate
  regexes:
    - id: Regex_jwt_candidate
      pattern: \beyJ[A-Za-z0-9_-]{5,}\.[A-Za-z0-9_-]{6,}\.[A-Za-z0-9_-]{3,}\b
    - id: Evidence_jwt_standard_header
      pattern: \beyJhbGciOiJ[A-Za-z0-9_-]{2,24}
    - id: Evidence_jwt_encoded_payload
      pattern: \.eyJ[A-Za-z0-9_-]{6,}\.
    - id: Evidence_jwt_transport
      pattern: '(?i)\bAuthorization\s*:\s*Bearer\s+|(?:Cookie|Set-Cookie)\s*:\s*[A-Za-z0-9_.-]+\s*='
    - id: Evidence_jwt_label
      pattern: '(?i)\bJWT\s*[:=]\s*'
  keywords:
    - id: Evidence_placeholder_jwt
      groups:
        - match_style: string
          terms:
            - REDACTED
            - PLACEHOLDER
            - your-jwt-here
            - example-token
created: '2026-02-08'
updated: '2026-07-19'
