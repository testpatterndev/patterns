schema: testpattern/v1
name: Design validation reports
slug: au-top500-233-design-validation-reports
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to design validation reports in Australian contexts. Higher confidence denotes reports of performed design validation (executed tests with observed
  results, pass/fail outcomes, deviations, conclusions, or approval), not plans or protocols; validation/review/protocol vocabulary alone remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:design\s+validation|validation\s+report|design\s+review|product\s+validation|verification\s+testing|test\s+protocol|acceptance\s+criteria|design\s+output|qualification\s+report|conformance\s+assessment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - design validation reports
    - design
    - validation
    - reports
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: design validation
      description: Primary topic phrase match
    - value: validation report
      description: Case-insensitive topic phrase match
    - value: design review
      description: Alternative topic phrase match
    - value: product validation
      description: Additional topic phrase match
    - value: 'DV-330 executed 12 Jul; expected 50 N, observed 43 N; FAIL; deviation DEV-19; conclusion: redesign latch; approved by M. Chen.'
      description: Executed test with expected/observed values, outcome, deviation, conclusion, and approval (enforces at 75/85)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: Test protocol and acceptance criteria for the upcoming review.
      description: Planning material without results — discovery only, must not enforce
    - value: The theatre design received favourable reviews.
      description: Design/review in an arts meaning must not match
    - value: Training sample DV-001 observed 10, PASS.
      description: Training/sample indicates a fabricated report — suppressed from enforcement
    - value: validation report
      description: Report label alone does not prove execution — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to design validation reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_validation_result
      matches:
        - ref: Evidence_design_validation_reports
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_validation_result
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_design_validation_reports
      matches:
        - ref: Evidence_design_validation_reports
  regexes:
    - id: Pattern_design_validation_reports
      pattern: >-
        (?is)\b(?:design\s+validation|validation\s+report|design\s+review|product\s+validation|verification\s+testing|test\s+protocol|acceptance\s+criteria|design\s+output|qualification\s+report|conformance\s+assessment)\b
    - id: Pattern_au_top500_233_design_validation_reports_label_context
      pattern: (?i)\b(?:design\s+validation\s+reports)\b
    - id: Pattern_validation_result
      pattern: >-
        (?is)\b(?:VAL|TEST|DV)[-_ ]?\d{2,8}\b[\s\S]{0,220}\b(?:observed|actual|result|passed|failed|deviation|conclusion|approved by)\b
  keywords:
    - id: Evidence_design_validation_reports
      groups:
        - match_style: word
          terms:
            - design validation
            - validation report
            - design review
            - product validation
            - verification testing
            - test protocol
            - acceptance criteria
            - design output
            - qualification report
            - conformance assessment
    - id: Keyword_au_top500_233_design_validation_reports_domain_context
      groups:
        - match_style: word
          terms:
            - design validation reports
            - design
            - validation
            - reports
risk_description: >-
  This pattern detects design-validation, validation-report, design-review, and product-validation language with seven technical corroborators, representing evidence that a design meets user and operational needs. A true report can disclose prototypes, requirements, test results, limitations, unresolved findings, and product readiness that competitors or litigants could exploit. The harm is moderate for the owner and one product program, while public case studies, standards, and validation templates can produce benign matches. Risk 7 and SENSITIVE InfoTech are proportionate; risk 8 or PROTECTED requires strategic technology, severe safety findings, security exploitability, or significant market damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
