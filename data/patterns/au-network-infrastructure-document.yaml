schema: testpattern/v1
name: Network Infrastructure Document
slug: au-network-infrastructure-document
version: 1.2.1
type: keyword_list
pattern_class: concept
description: Detects network infrastructure documentation revealing topology, VLANs, firewall rules, and attack surface.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
  - technology
  - security
test_cases:
  should_match:
    - value: Network topology diagram with VLAN configuration and firewall rule details
      description: Test match 1
    - value: 'Network architecture document: DMZ, air gap, and access control list'
      description: Test match 2
    - value: Infrastructure diagram showing network boundary and network segmentation
      description: Test match 3
  should_not_match:
    - value: Social network analysis
      description: Non-match 1
    - value: Network of contacts in the industry
      description: Non-match 2
false_positives:
  - description: Social or business network references.
    mitigation: Require IT infrastructure terms like VLAN, DMZ, or firewall rule.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This pattern recognises network infrastructure documentation through architecture wording combined with topology, firewall, or system evidence. Disclosure could reveal trust boundaries, address ranges, segmentation, and control rules that support targeted access or lateral movement. The normal document presents serious risk to one organisation's environment but does not automatically describe essential services or protected operations. Risk 8 SENSITIVE IT reflects usable internal architecture; PROTECTED requires critical-infrastructure scope, protected operational dependencies, or comparable significant-damage consequences.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE IT
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_network_infrastructure
      matches:
        - ref: Keyword_network_topology
        - ref: Keyword_firewall_rules
    - confidence_level: 75
      id_match: Regex_network_infrastructure
      matches:
        - ref: Keyword_it_infrastructure
  regexes:
    - id: Regex_network_infrastructure
      pattern: >-
        (?i)\b(?:network\s+(?:architecture|topology|diagram|design)\s+(?:document|specification)?|infrastructure\s+(?:design|architecture|documentation)|(?:logical|physical)\s+network\s+(?:diagram|design))\b
  keywords:
    - id: Keyword_network_topology
      groups:
        - match_style: word
          terms:
            - network topology
            - network diagram
            - network architecture
            - VLAN
            - subnet
            - IP range
            - network segment
            - text: DMZ
              case_sensitive: true
            - perimeter
            - Purdue Model
            - IEC 62443
            - zone and conduit
            - air gap
      strength: specific
    - id: Keyword_firewall_rules
      groups:
        - match_style: word
          terms:
            - firewall rule
            - firewall policy
            - access control list
            - text: ACL
              case_sensitive: true
            - allow rule
            - deny rule
            - port
            - protocol
            - source IP
            - destination IP
      strength: specific
    - id: Keyword_it_infrastructure
      groups:
        - match_style: word
          terms:
            - server
            - database
            - application
            - service account
            - privileged access
            - backup schedule
            - retention
            - configuration
      strength: domain
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 563 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it); remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.; Aligned recommended_confidence to 75.
author: testpattern-community
license: MIT
keywords:
  - network topology
  - network architecture
  - network diagram
  - data flow
  - VLAN
  - network segment
  - DMZ
  - air gap
  - firewall rule
  - access control list
  - network boundary
  - infrastructure diagram
