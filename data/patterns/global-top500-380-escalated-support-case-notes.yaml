schema: testpattern/v1
name: Escalated support case notes
slug: global-top500-380-escalated-support-case-notes
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to escalated support case notes in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:escalated\s+support\s+case\s+notes|escalation\s+ticket|case\s+escalation|support\s+case|incident\s+report|complaint\s+resolution|case\s+notes|ticket\s+priority|customer\s+complaint|service\s+escalation|case\s+manager|resolution\s+notes)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - escalated support case notes
    - escalated
    - support
    - case
    - notes
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: escalated support case notes
      description: Primary topic phrase match
    - value: escalation ticket
      description: Case-insensitive topic phrase match
    - value: case escalation
      description: Alternative topic phrase match
    - value: support case
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to escalated support case notes appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_escalated_support
      matches:
        - ref: Pattern_global_top500_380_escalated_support_case_notes_label_context
        - ref: Keyword_global_top500_380_escalated_support_case_notes_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_escalated_support
      matches:
        - ref: Keyword_escalated_support
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_escalated_support
      pattern: >-
        (?is)\b(?:escalated\s+support\s+case\s+notes|escalation\s+ticket|case\s+escalation|support\s+case|incident\s+report|complaint\s+resolution|case\s+notes|ticket\s+priority|customer\s+complaint|service\s+escalation|case\s+manager|resolution\s+notes)\b
    - id: Pattern_global_top500_380_escalated_support_case_notes_label_context
      pattern: (?i)\b(?:escalated\s+support\s+case\s+notes)\b
  keywords:
    - id: Keyword_escalated_support
      groups:
        - match_style: word
          terms:
            - escalated support case notes
            - escalation ticket
            - case escalation
            - support case
            - incident report
            - complaint resolution
            - case notes
            - ticket priority
            - customer complaint
            - service escalation
            - case manager
            - resolution notes
      strength: specific
    - id: Keyword_global_top500_380_escalated_support_case_notes_domain_context
      groups:
        - match_style: word
          terms:
            - escalated support case notes
            - escalated
            - support
            - case
            - notes
      strength: domain
risk_description: >-
  This classifier finds escalated customer-support records using escalation ticket, case escalation, support case, and related contextual language. An actual case note commonly combines a customer's contact details, account history, complaint, troubleshooting evidence, and internal decisions, which could facilitate social engineering or embarrass the customer if disclosed. Harm is material for the affected customer and support organisation but ordinarily limited to the people and service involved in one case. Risk 8 supports SENSITIVE, while PROTECTED would require privileged access secrets, a systemic security incident, or a bulk repository of high-impact cases.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
