schema: testpattern/v1
name: Diseases
slug: global-diseases
version: 1.3.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Diseases patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that identifies health and medical terminology in documents.
  Keyword matching is used to flag content containing medical language.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  health and medical terminology to identify protected health information.
keywords:
  - diabetes
  - hypertension
  - cancer
  - asthma
  - arthritis
  - epilepsy
  - tuberculosis
  - hepatitis
  - pneumonia
  - influenza
  - malaria
  - HIV
  - Alzheimer
  - Parkinson
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on medical terms requires additional context for
  accurate detection. Medical terminology may appear in educational, research, or general
  health content without constituting protected health information.
jurisdictions:
  - global
regulations:
- GDPR
- HIPAA
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - phi
  - health
test_cases:
  should_match:
    - value: "patient diagnosed with diabetes"
      description: Contains medical keyword 'diabetes'
    - value: "treatment plan includes hypertension"
      description: Contains medical keyword 'hypertension'
    - value: "clinical notes reference cancer"
      description: Contains medical keyword 'cancer'
  should_not_match:
    - value: "quarterly revenue report for fiscal year 2024"
      description: Financial text with no medical terminology
    - value: "the project deadline has been moved to next Friday"
      description: Business scheduling text with no health terms
false_positives:
  - description: Educational or research materials discussing medical topics without containing actual patient data
    mitigation: >-
      Layer with PII detection to confirm medical terms appear alongside patient identifiers.
  - description: News articles or general health information websites mentioning medical conditions
    mitigation: >-
      Use document classification to distinguish clinical records from public health content.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_diseases
      matches:
        - ref: Keyword_diseases_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_diseases
  keywords:
    - id: Keyword_diseases
      groups:
        - match_style: word
          terms:
            - diabetes
            - hypertension
            - cancer
            - asthma
            - arthritis
            - epilepsy
            - tuberculosis
            - hepatitis
            - pneumonia
            - influenza
            - malaria
            - text: HIV
              case_sensitive: true
            - Alzheimer
            - Parkinson
      strength: domain
    - id: Keyword_diseases_context
      groups:
        - match_style: word
          terms:
            - patient
            - diagnosed
            - diagnosis
            - medical history
            - clinical record
            - treatment plan
            - health condition
            - medical report
            - physician
            - hospital
            - prognosis
            - symptoms
      strength: domain
risk_rating: 8
risk_description: >-
  The low-confidence disease dictionary identifies terms such as diabetes, hypertension, or cancer in diagnostic and clinical phrasing, so its strongest normal true positive can disclose a person's health condition when patient context is present. Such a disclosure may expose prognosis, care needs, insurance relevance, or stigma, although the same terms also occur in education, policy, research, and public health material. SENSITIVE remains justified for the intended person-linked diagnosis use, with contextual controls needed to manage broad vocabulary. Risk 8 is retained; PROTECTED would require a bulk disease register, especially severe or stigmatizing linked conditions, or operational detail capable of causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-diseases
    title: "Diseases entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1224 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
