schema: testpattern/v1
name: Disability status
slug: global-top500-018-disability-status
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to disability status in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: pii-personal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:disability\s+status|accessibility\s+needs|reasonable\s+adjustment|special\s+needs|functional\s+limitation|disability\s+pension|disability\s+support|assistive\s+technology|workplace\s+accommodation|protected\s+characteristic)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - disability status
    - disability
    - status
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - pii-personal
test_cases:
  should_match:
    - value: disability status
      description: Primary topic phrase match
    - value: accessibility needs
      description: Case-insensitive topic phrase match
    - value: reasonable adjustment
      description: Alternative topic phrase match
    - value: special needs
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to disability status appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_disability_status
      matches:
        - ref: Pattern_global_top500_018_disability_status_label_context
        - ref: Keyword_global_top500_018_disability_status_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_018_disability_status_noise_exclusion
    - confidence_level: 75
      id_match: Regex_disability_status
      matches:
        - ref: Keyword_disability_status
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_018_disability_status_noise_exclusion
    - confidence_level: 65
      id_match: Regex_disability_status
      matches:
        - ref: Keyword_disability_status
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_018_disability_status_noise_exclusion
  regexes:
    - id: Regex_disability_status
      pattern: (?is)\b(?:disability\s+status|accessibility\s+needs|reasonable\s+adjustment|special\s+needs|functional\s+limitation|disability\s+pension|disability\s+support|assistive\s+technology|workplace\s+accommodation|protected\s+characteristic)\b
    - id: Pattern_global_top500_018_disability_status_label_context
      pattern: (?i)\\b(?:disability\\s+status|disability|status|top500)\\b
  keywords:
    - id: Keyword_disability_status
      groups:
        - match_style: word
          terms:
            - disability status
            - disability
            - impairment
            - accessibility needs
            - reasonable adjustment
            - special needs
            - functional limitation
            - disability pension
            - disability support
            - assistive technology
            - workplace accommodation
            - protected characteristic
    - id: Keyword_global_top500_018_disability_status_domain_context
      groups:
        - match_style: word
          terms:
            - disability status
            - disability
            - status
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_018_disability_status_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
