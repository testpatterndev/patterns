schema: testpattern/v1
name: Embargo enforcement case records
slug: global-top500-490-embargo-enforcement-case-records
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to embargo enforcement case records in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: corporate-confidentiality. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:embargo\s+enforcement\s+case\s+records|embargo\s+enforcement|trade\s+embargo|sanctions\s+violation|enforcement\s+action|customs\s+seizure|prohibited\s+transaction|penalty\s+assessment|civil\s+forfeiture|compliance\s+investigation|blocked\s+property|embargo\s+breach)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - embargo enforcement case records
  proximity: 240
  keyword_lists:
    - corporate-confidentiality
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: embargo enforcement case records
      description: Primary topic phrase match
    - value: embargo enforcement
      description: Case-insensitive topic phrase match
    - value: trade embargo
      description: Alternative topic phrase match
    - value: sanctions violation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to embargo enforcement case records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_embargo_enforcement
      matches:
        - ref: Pattern_global_top500_490_embargo_enforcement_case_records_label_context
        - ref: Keyword_global_top500_490_embargo_enforcement_case_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_embargo_enforcement
      matches:
        - ref: Keyword_embargo_enforcement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_embargo_enforcement
      pattern: >-
        (?is)\b(?:embargo\s+enforcement\s+case\s+records|embargo\s+enforcement|trade\s+embargo|sanctions\s+violation|enforcement\s+action|customs\s+seizure|prohibited\s+transaction|penalty\s+assessment|civil\s+forfeiture|compliance\s+investigation|blocked\s+property|embargo\s+breach)\b
    - id: Pattern_global_top500_490_embargo_enforcement_case_records_label_context
      pattern: (?i)\b(?:embargo\s+enforcement\s+case\s+records)\b
  keywords:
    - id: Keyword_embargo_enforcement
      groups:
        - match_style: word
          terms:
            - embargo enforcement case records
            - embargo enforcement
            - trade embargo
            - sanctions violation
            - enforcement action
            - customs seizure
            - prohibited transaction
            - penalty assessment
            - civil forfeiture
            - compliance investigation
            - blocked property
            - embargo breach
      strength: specific
    - id: Keyword_global_top500_490_embargo_enforcement_case_records_domain_context
      groups:
        - match_style: word
          terms:
            - embargo enforcement case records
            - embargo
            - enforcement
            - case
      strength: domain
risk_description: >-
  This concept detector covers embargo enforcement, sanctions violations, seizures, prohibited transactions, penalty assessments, investigations, forfeiture, and blocked property; it does not prove that an active case record is present. A genuine file can reveal investigated parties, evidence, sources, enforcement methods, asset locations, and planned actions, allowing subjects to evade controls, intimidate witnesses, or dissipate property. Consequence is serious but normally bounded to one investigation and involved entities, while public sanctions guidance and reported enforcement actions use the same vocabulary. Risk 8 and SENSITIVE are justified; PROTECTED would require covert methods, intelligence sources, or a systemic sanctions operation whose compromise could cause significant national or international damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
