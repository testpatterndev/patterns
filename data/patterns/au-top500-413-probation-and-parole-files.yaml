schema: testpattern/v1
name: Probation and parole files
slug: au-top500-413-probation-and-parole-files
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to probation and parole files in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:probation\s+and\s+parole\s+files|probation\s+order|parole\s+conditions|community\s+corrections|supervised\s+release|parole\s+board|probation\s+officer|offender\s+management|parole\s+hearing|correctional\s+services|reporting\s+conditions|community\s+service\s+order)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - probation and parole files
    - probation
    - parole
    - files
    - law
    - enforcement
    - justice
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: probation and parole files
      description: Primary topic phrase match
    - value: probation order
      description: Case-insensitive topic phrase match
    - value: parole conditions
      description: Alternative topic phrase match
    - value: community corrections
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to probation and parole files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_probation_and_parole_files
      matches:
        - ref: Evidence_probation_and_parole_files
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_probation_and_parole_files
      matches:
        - ref: Evidence_probation_and_parole_files
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_probation_and_parole_files
      matches:
        - ref: Evidence_probation_and_parole_files
  regexes:
    - id: Pattern_probation_and_parole_files
      pattern: >-
        (?is)\b(?:probation\s+and\s+parole\s+files|probation\s+order|parole\s+conditions|community\s+corrections|supervised\s+release|parole\s+board|probation\s+officer|offender\s+management|parole\s+hearing|correctional\s+services|reporting\s+conditions|community\s+service\s+order)\b
    - id: Pattern_au_top500_413_probation_and_parole_files_label_context
      pattern: (?i)\\b(?:probation\\s+and\\s+parole\\s+files|probation|parole|files|top500)\\b
  keywords:
    - id: Evidence_probation_and_parole_files
      groups:
        - match_style: word
          terms:
            - probation and parole files
            - probation order
            - parole conditions
            - community corrections
            - supervised release
            - parole board
            - probation officer
            - offender management
            - parole hearing
            - correctional services
            - reporting conditions
            - community service order
    - id: Keyword_au_top500_413_probation_and_parole_files_domain_context
      groups:
        - match_style: word
          terms:
            - probation and parole files
            - probation
            - parole
            - files
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
