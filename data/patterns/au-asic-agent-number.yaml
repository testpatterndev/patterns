schema: testpattern/v1
name: ASIC Registered Agent Number
slug: au-asic-agent-number
version: 1.2.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects ASIC registered agent numbers used by agents who lodge company documents with the Australian
  Securities and Investments Commission. The number is a short (typically 3-6 digit) identifier issued to a
  registered agent and quoted on ASIC forms and lodgements.
operation: >-
  Regex pattern (boost_regex engine). Pattern_au_asic_agent_number matches a registered agent number / no /
  code / id label followed by a 3-6 digit value (allowing an optional "is"/"=" connector). The labelled
  value is discovery-only at 65. ASIC service or company-lodgement evidence raises it to 75, while both
  an ASIC service marker and independent lodgement-record context are required at 85. Enforcing tiers
  reject explicit template content.
pattern: (?i)\b(?:asic\s+)?registered\s+agent\s+(?:number|no|code|id)\b\.?\s*(?:is\s+|=\s*)?[:#-]?\s*\d{3,6}\b
confidence: medium
confidence_justification: >-
  Medium confidence: ASIC does not publish a fixed digit length for registered agent numbers (they are
  short numeric identifiers), so detection anchors on the "registered agent number" label plus a 3-6 digit
  value and requires corroborating ASIC lodgement keywords to separate agent numbers from other short numbers.
jurisdictions:
  - au
regulations:
  - Corporations Act 2001 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
corroborative_evidence:
  keywords:
    - registered agent
    - ASIC
    - agent number
    - EDGE lodgement
    - Form 362
    - annual review
    - corporate compliance
    - company officeholder
    - registered agent portal
    - ASIC Connect
    - lodging party
    - agent code
  proximity: 300
test_cases:
  should_match:
    - value: ASIC registered agent number 12345 lodged the annual review for the company
      description: High-tier probe - labelled value with ASIC and independent lodgement context
    - value: Registered agent no. 4821 submitted Form 362 on behalf of the officeholder
      description: Medium-tier probe - labelled value with lodgement-record context
    - value: Registered agent code 30052 authorised for electronic lodgement via ASIC Connect
      description: High-tier probe - labelled value with ASIC service and lodgement context
    - value: Our registered agent number is 08812
      description: Low-tier probe - labelled value without independent ASIC or lodgement context
  should_not_match:
    - value: Please contact our registered agent for assistance with the lodgement
      description: Registered agent phrase with no number label or value
    - value: The real estate agent number was not provided on the tenancy form
      description: Non-ASIC agent number, not a registered agent number
    - value: Agent 007 reported for duty at the embassy this morning
      description: Generic agent reference, not an ASIC registered agent number
    - value: 'Training example: ASIC registered agent number 12345 lodged Form 362'
      description: Structurally complete but explicitly framed training content
false_positives:
  - description: A "registered agent number" label near an unrelated short number could match without being an ASIC agent number.
    mitigation: Require corroborating ASIC lodgement keywords within the proximity window.
  - description: Sample agent numbers in ASIC form instructions or templates may match the labelled form.
    mitigation: The high and medium tiers apply the template-exclusion NOT-group to suppress sample and template content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 4
risk_description: >-
  The medium-confidence regex finds a labelled ASIC registered-agent number, code, or ID followed by a three- to six-digit value with lodgement context. The number identifies an agent authorised to lodge company documents and may help an impersonator make a corporate filing approach more credible, but it is quoted on ASIC forms and does not identify a private account or grant lodgement access. The normal unit is a professional or organisational identifier with low, reversible harm and requires separate credentials or client information for material misuse. Risk 4 and OFFICIAL are appropriate, while an agent number combined with ASIC Connect credentials or confidential lodgement records would warrant SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
  qgiscf_dlm: OFFICIAL
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_au_asic_agent_number
      matches:
        - ref: Evidence_asic_service
        - ref: Evidence_lodgement_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_au_asic_agent_number
      matches:
        - ref: Evidence_asic_or_lodgement_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_au_asic_agent_number
  regexes:
    - id: Pattern_au_asic_agent_number
      pattern: (?i)\b(?:asic\s+)?registered\s+agent\s+(?:number|no|code|id)\b\.?\s*(?:is\s+|=\s*)?[:#-]?\s*\d{3,6}\b
  keywords:
    - id: Evidence_asic_or_lodgement_context
      groups:
        - match_style: word
          terms:
            - text: ASIC
              case_sensitive: true
            - ASIC Connect
            - EDGE lodgement
            - registered agent portal
            - lodged
            - lodgement
            - electronic lodgement
            - Form 362
            - annual review
            - corporate filing
            - corporate compliance
            - company officeholder
            - lodging party
      strength: domain
    - id: Evidence_asic_service
      groups:
        - match_style: word
          terms:
            - text: ASIC
              case_sensitive: true
            - EDGE lodgement
            - registered agent portal
            - ASIC Connect
      strength: specific
    - id: Evidence_lodgement_record
      groups:
        - match_style: word
          terms:
            - lodged
            - lodgement
            - electronic lodgement
            - Form 362
            - annual review
            - corporate filing
            - corporate compliance
            - company officeholder
            - lodging party
      strength: specific
created: '2026-07-07'
