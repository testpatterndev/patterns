schema: testpattern/v1
name: ASIC Registered Agent Number
slug: au-asic-agent-number
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Detects ASIC registered agent numbers used by agents who lodge company documents with the Australian
  Securities and Investments Commission. The number is a short (typically 3-6 digit) identifier issued to a
  registered agent and quoted on ASIC forms and lodgements.
operation: >-
  Regex pattern (boost_regex engine). Pattern_au_asic_agent_number matches a registered agent number / no /
  code / id label followed by a 3-6 digit value (allowing an optional "is"/"=" connector). Three confidence
  tiers: High (85) requires ASIC agent evidence (min 2) with template exclusion; Medium (75) requires ASIC
  agent evidence with template exclusion; Low (65) requires ASIC agent evidence. Evidence uses one keyword
  group (12 ASIC lodgement terms) within 300-character proximity.
pattern: (?i)\b(?:asic\s+)?registered\s+agent\s+(?:number|no|code|id)\b\.?\s*(?:is\s+|=\s*)?[:#-]?\s*\d{3,6}\b
confidence: medium
confidence_justification: >-
  Medium confidence: ASIC does not publish a fixed digit length for registered agent numbers (they are
  short numeric identifiers), so detection anchors on the "registered agent number" label plus a 3-6 digit
  value and requires corroborating ASIC lodgement keywords to separate agent numbers from other short numbers.
jurisdictions:
  - au
regulations:
  - Corporations Act 2001 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
corroborative_evidence:
  keywords:
    - registered agent
    - ASIC
    - agent number
    - EDGE lodgement
    - Form 362
    - annual review
    - corporate compliance
    - company officeholder
    - registered agent portal
    - ASIC Connect
    - lodging party
    - agent code
  proximity: 300
test_cases:
  should_match:
    - value: ASIC registered agent number 12345 lodged the annual review for the company
      description: ASIC registered agent number with 5-digit value
    - value: Registered agent no. 4821 submitted Form 362 on behalf of the officeholder
      description: Registered agent no. with abbreviated label and value
    - value: Registered agent code 30052 authorised for electronic lodgement via ASIC Connect
      description: Registered agent code label with value
    - value: Our ASIC registered agent number is 08812 for all corporate filings this year
      description: Registered agent number with "is" connector before value
  should_not_match:
    - value: Please contact our registered agent for assistance with the lodgement
      description: Registered agent phrase with no number label or value
    - value: The real estate agent number was not provided on the tenancy form
      description: Non-ASIC agent number, not a registered agent number
    - value: Agent 007 reported for duty at the embassy this morning
      description: Generic agent reference, not an ASIC registered agent number
false_positives:
  - description: A "registered agent number" label near an unrelated short number could match without being an ASIC agent number.
    mitigation: Require corroborating ASIC lodgement keywords within the proximity window.
  - description: Sample agent numbers in ASIC form instructions or templates may match the labelled form.
    mitigation: The high and medium tiers apply the template-exclusion NOT-group to suppress sample and template content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 6
risk_description: Registered agent number exposure enables impersonation of an ASIC lodgement agent and unauthorised changes to company records.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_au_asic_agent_number
      matches:
        - ref: Evidence_au_asic_agent_number
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_au_asic_agent_number
      matches:
        - ref: Evidence_au_asic_agent_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_au_asic_agent_number
      matches:
        - ref: Evidence_au_asic_agent_number
  regexes:
    - id: Pattern_au_asic_agent_number
      pattern: (?i)\b(?:asic\s+)?registered\s+agent\s+(?:number|no|code|id)\b\.?\s*(?:is\s+|=\s*)?[:#-]?\s*\d{3,6}\b
  keywords:
    - id: Evidence_au_asic_agent_number
      groups:
        - match_style: word
          terms:
            - registered agent
            - text: ASIC
              case_sensitive: true
            - agent number
            - EDGE lodgement
            - Form 362
            - annual review
            - corporate compliance
            - company officeholder
            - registered agent portal
            - ASIC Connect
            - lodging party
            - agent code
      strength: specific
created: '2026-07-07'
updated: '2026-07-07'
author: testpattern-community
license: MIT
references:
  - url: https://asic.gov.au/online-services/registered-agents/
    title: Registered agent portal access | ASIC
  - url: https://www.asic.gov.au/for-business-and-companies/companies/registered-agents-for-companies/act-as-a-registered-agent-for-companies/
    title: Act as a registered agent for companies | ASIC
