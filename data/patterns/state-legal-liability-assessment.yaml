schema: testpattern/v1
name: State Legal Liability Assessment
slug: state-legal-liability-assessment
version: 1.3.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: 'Detects internal legal assessments quantifying the State''s liability exposure on specific matters (tort, contract, statutory). Disclosure reveals the State''s own estimate of its likely loss, undermining defence and settlement positions across multiple related matters. Note: trainable classifier recommended for production using liability document structural features.'
operation: 'Primary detection: keyword proximity matching liability assessment terms (''liability assessment'', ''liability exposure'', ''legal liability'', ''risk of liability'', ''quantum assessment'', ''damages assessment'') within 200 characters of government/privilege terms (''State'', ''Crown'', ''Queensland'', ''government'', ''privilege'', ''PROTECTED'', ''$''). Trainable classifier fallback: document structure detection for liability analysis sections, quantum estimates, probability assessments, recommended provisions. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:liability\s+(?:assessment|exposure)|legal\s+liability|risk\s+of\s+liability|quantum\s+assessment|damages\s+assessment)\b
confidence: medium
confidence_justification: 'Medium confidence: Liability/quantum/damages assessment + State/government context + privilege markers precisely targets internal government legal exposure documents. The combination eliminates general insurance and academic liability analysis.'
jurisdictions:
  - au
regulations:
- "Evidence Act 1977 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - State
    - Crown
    - Queensland
    - government
    - privilege
    - PROTECTED
    - quantum
    - damages
    - probability
    - provision
    - best case
    - worst case
    - expected loss
    - financial exposure
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        PROTECTED — LEGAL PROFESSIONAL PRIVILEGE
        State Legal Liability Assessment

        Matter: Claims arising from Caboolture Hospital — 2020-2024
        Prepared for: Under Treasurer (Financial Provisioning)

        Liability exposure:
        - Best case: $12M (successful defence on causation)
        - Expected: $48M (partial liability, capped damages)
        - Worst case: $180M (full liability, uncapped)
      description: State liability assessment with financial exposure scenarios
    - value: This privileged legal liability assessment quantifies the State of Queensland's exposure for the class of claims arising from contaminated land at Pinkenba. The quantum assessment recommends a provision of $65M based on probability-weighted analysis.
      description: Privileged liability assessment with quantum recommendation
    - value: |-
        CONFIDENTIAL — PRIVILEGED
        Damages Assessment
        Crown Law Queensland

        Matter: Institutional abuse claims — State liability

        Risk of liability: High (70% probability of adverse finding)
        Quantum assessment: $2,500-$350,000 per claimant (2,400 estimated claimants)
        Total exposure: $85M-$840M
      description: Damages assessment for institutional abuse claims
  should_not_match:
    - value: The court awarded damages of $4.2 million against the State of Queensland. The published judgment assessed quantum on the basis of past and future economic loss plus general damages.
      description: Published court judgment on damages quantum
    - value: This textbook chapter examines government liability in tort, including the principles of vicarious liability and non-delegable duties. Students should understand the State's liability framework.
      description: Academic textbook on government liability
    - value: The Auditor-General's report noted that government agencies had made provisions totalling $1.2 billion for legal claims. The published financial statements comply with AASB 137 Provisions.
      description: Published government financial provisions
false_positives:
  - description: Published court judgments assessing damages against the State
    mitigation: Negative match on court citation formats, 'published judgment', 'court awarded'
  - description: Academic analysis of government liability
    mitigation: Require co-occurrence with specific matter references, quantum estimates, and privilege/PROTECTED markers
  - description: Published government financial provisions under AASB 137
    mitigation: Negative match on 'Auditor-General', 'published financial statements', 'AASB 137', 'annual report'
  - description: Insurance industry liability assessments
    mitigation: Require government entity context ('State', 'Crown', 'Queensland Government')
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_state_legal_liability_assessment_liability_assessment_terminology
      matches:
        - ref: Evidence_state_legal_liability_assessment_primary
        - ref: Evidence_state_legal_liability_assessment_corroborative
        - ref: Evidence_state_legal_liability_assessment_structural_headings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_state_legal_liability_assessment_exclusion
        - ref: Pattern_state_legal_liability_assessment_dollar_amount_format
        - ref: Pattern_state_legal_liability_assessment_scenario_analysis_terms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_state_legal_liability_assessment_liability_assessment_terminology
      matches:
        - ref: Evidence_state_legal_liability_assessment_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_state_legal_liability_assessment_liability_assessment_terminology
  regexes:
    - id: Pattern_state_legal_liability_assessment_liability_assessment_terminology
      pattern: (?i)\b(?:liability\s+(?:assessment|exposure)|quantum\s+assessment|damages\s+assessment)\b
    - id: Pattern_state_legal_liability_assessment_dollar_amount_format
      pattern: \$[\d,]+(?:\.\d{1,2})?(?:\s*[MmBb](?:illion)?)?
    - id: Pattern_state_legal_liability_assessment_scenario_analysis_terms
      pattern: (?i)\b(?:best\s+case|worst\s+case|expected\s+loss)\b
  keywords:
    - id: Evidence_state_legal_liability_assessment_primary
      groups:
        - match_style: word
          terms:
            - liability assessment
            - liability exposure
            - legal liability
            - risk of liability
            - quantum assessment
            - damages assessment
      strength: specific
    - id: Evidence_state_legal_liability_assessment_corroborative
      groups:
        - match_style: word
          terms:
            - State
            - Crown
            - Queensland
            - government
            - privilege
            - PROTECTED
            - quantum
            - damages
            - probability
            - provision
            - best case
            - worst case
            - expected loss
            - financial exposure
      strength: domain
    - id: Evidence_state_legal_liability_assessment_structural_headings
      groups:
        - match_style: word
          terms:
            - Liability Assessment
            - Quantum Assessment
            - Probability of Adverse Finding
            - Recommended Provision
            - Exposure Summary
      strength: structural
    - id: Evidence_state_legal_liability_assessment_exclusion
      groups:
        - match_style: word
          terms:
            - published judgment
            - court awarded
            - textbook
            - Auditor-General
            - annual report
            - AASB 137
            - published financial statements

      strength: noise
risk_rating: 8
risk_description: Internal legal assessments quantifying the State's liability exposure on specific matters (tort, contract, statutory). Disclosure reveals the State's own estimate of its likely loss, undermining defence and settlement positions across multiple related matters. Legislative review (Mar 2026) established BIL:2 — Evidence Act 1977 (Qld) defines legal professional privilege as an evidentiary rule without criminal penalties for disclosure. RTI Act 2009 Sch3 s7 exempts from compelled disclosure but does not mandate PROTECTED classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Legal"
references: []
