schema: testpattern/v1
name: Vercel Access Token
slug: global-vercel-token
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects Vercel credentials: API access tokens (an unprefixed 24-character alphanumeric string,
  context-gated on a nearby Vercel label) and Vercel Blob read-write tokens (distinctive
  vercel_blob_rw_ prefix). A leaked API token grants control of the account's projects,
  deployments and environment variables; a leaked Blob token grants read/write access to the
  associated storage.
operation: >-
  Two detection branches. Branch 1 (context-gated only): Vercel API access tokens have no
  vendor prefix (GitGuardian "Prefixed: False"), so a Vercel label is required within 40
  characters before a 24-character alphanumeric value, mirroring TruffleHog's label-gated
  production detector. Branch 2 (distinctive, value-only capable): Vercel Blob read-write
  tokens in the vendor-documented vercel_blob_rw_<storeId>_<secret> structure; the segment
  lengths are not formally published, so generous bounded ranges are used behind the
  15-character literal prefix. Corroborative evidence: keywords within 300 characters.
pattern: (?i)vercel[\s\S]{0,40}?(?<![A-Za-z0-9])[A-Za-z0-9]{24}(?![A-Za-z0-9])
confidence: medium
confidence_justification: >-
  Medium confidence: Vercel API tokens are unprefixed opaque strings (GitGuardian "Prefixed:
  False"; Vercel's own docs show no format), so the primary branch is only distinguishable via
  the embedded label requirement and carries inherent collision risk with other 24-character
  identifiers. The 24-character alphanumeric body is attested by TruffleHog's production
  detector. The Blob-token branch is high-precision by contrast (15-character literal prefix,
  vendor-documented structure) but its exact segment lengths are not formally published.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - vercel
    - vercel.com
    - VERCEL_TOKEN
    - deployment
    - api key
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 'VERCEL_TOKEN=ABCDEFGHIJKLMNOPQRSTUVWX'
      description: Vercel API token in the canonical VERCEL_TOKEN env var (label + 24-char body)
    - value: 'vercel api token: zyxwvutsrqponmlkjihgfedc'
      description: Vercel label followed by a 24-char alphanumeric token within the proximity gap
    - value: 'BLOB_READ_WRITE_TOKEN=vercel_blob_rw_abc123_ABCDEFGHIJKLMNOPQRSTUVWXYZ'
      description: Vercel Blob read-write token (vercel_blob_rw_ + store id + secret)
    - value: vercel_blob_rw_store01_zyxwvutsrqponmlkjihgfedcba0123456789
      description: Bare Vercel Blob token (distinctive prefix, no label needed)
  should_not_match:
    - value: ABCDEFGHIJKLMNOPQRSTUVWX with no vendor context
      description: Bare 24-char alphanumeric value with no Vercel label anywhere (could be any ID or hash)
    - value: vercel_blob_rw_abc_Zz9
      description: Blob token secret segment far too short (3 chars, below the 10-char floor)
    - value: 'vercel deployment token too short: ABCDEFGHIJ0123456789'
      description: Vercel label present but value too short (20 chars, not 24)
    - value: rotate the vercel token in account settings
      description: Prose mention without a token value
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: A 24-character identifier (for example a MongoDB ObjectId is 24 hex characters) appearing near the word "vercel" in documentation or logs.
    mitigation: Require the label adjacency (already enforced by the regex) plus corroborative keywords; exclude placeholder markers. This branch is context-gated only and never fires value-only.
  - description: Documentation or examples showing placeholder VERCEL_TOKEN or vercel_blob_rw_ strings.
    mitigation: Check for placeholder markers (example, xxxx, 0000) and documentation file types to reduce false positives.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  A leaked Vercel API token grants control of the account's projects, deployments, domains and
  environment variables (which typically contain further secrets), enabling site takeover and
  supply-chain compromise; a leaked Blob token exposes stored content.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_vercel_api_token
      matches:
        - ref: Keyword_vercel_token
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_vercel_blob_token
      matches:
        - ref: Keyword_vercel_token
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_vercel_blob_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_vercel_api_token
      pattern: (?i)vercel[\s\S]{0,40}?(?<![A-Za-z0-9])[A-Za-z0-9]{24}(?![A-Za-z0-9])
    - id: Regex_vercel_blob_token
      pattern: (?<![A-Za-z0-9_])vercel_blob_rw_[A-Za-z0-9]{5,40}_[A-Za-z0-9]{10,60}(?![A-Za-z0-9_])
  keywords:
    - id: Keyword_vercel_token
      groups:
        - match_style: word
          terms:
            - vercel
            - vercel.com
            - VERCEL_TOKEN
            - vercel api
            - vercel_blob_rw
            - deployment token
            - access token
            - api key
      strength: specific
created: '2026-07-06'
updated: '2026-07-06'
changelog:
  - version: 1.0.0
    date: '2026-07-06'
    description: Initial release.
author: testpattern-community
license: MIT
references:
  - url: https://github.com/trufflesecurity/trufflehog/blob/main/pkg/detectors/vercel/vercel.go
    title: 'TruffleHog production Vercel detector (label-gated 24-char alphanumeric token)'
  - url: https://docs.gitguardian.com/secrets-detection/secrets-detection-engine/detectors/specifics/vercel_api_access_token
    title: 'Vercel API Access Token - GitGuardian detector documentation (Prefixed: False)'
  - url: https://docs.gitguardian.com/secrets-detection/secrets-detection-engine/detectors/specifics/vercel_blob_token
    title: 'Vercel Blob Token - GitGuardian detector documentation (Prefixed: True)'
  - url: https://vercel.com/docs/vercel-blob/using-blob-sdk
    title: 'Vercel Blob SDK docs (vercel_blob_rw_<storeId>_<secret> token structure)'
  - url: https://docs.github.com/en/code-security/secret-scanning/introduction/supported-secret-scanning-patterns
    title: Supported secret scanning patterns - GitHub Docs (five Vercel partner token types)
