schema: testpattern/v1
name: Vercel Access Token
slug: global-vercel-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Vercel credentials: the current prefixed token family introduced in February 2026
  (vcp_ personal access tokens, vci_ integration tokens, vca_ app access tokens, vcr_ app
  refresh tokens, vck_ API keys), Vercel Blob read-write tokens (vercel_blob_rw_), and, when
  labelled with Vercel context in an assignment, the legacy unprefixed 24-character token form.
  A leaked token grants control of the account's projects, deployments and environment
  variables; a leaked Blob token grants read/write access to the associated storage.
operation: >-
  Two detection branches. Branch 1 (distinctive, value-only capable): the vc?-prefix family
  announced by Vercel's changelog (2026-02-09) explicitly for secret-scanning detectability --
  Vercel's own Sign in with Vercel docs show literal vca_/vcr_ examples with a 56-character
  alphanumeric body, so a bounded 40-80 range is used behind the vendor-confirmed prefixes --
  plus Vercel Blob read-write tokens in the vendor-documented vercel_blob_rw_<storeId>_<secret>
  structure (segment lengths not formally published; generous bounded ranges behind the
  15-character literal prefix). Branch 2 (context-gated only): legacy unprefixed 24-character
  alphanumeric tokens (per TruffleHog's label-gated detector, which predates the prefixed
  family), requiring a Vercel label plus an assignment separator (= or :) before the value;
  legacy tokens issued before the format change may still be live. Corroborative evidence:
  keywords within 300 characters.
pattern: (?<![A-Za-z0-9_])(?:vc[aikpr]_[A-Za-z0-9]{40,80}|vercel_blob_rw_[A-Za-z0-9]{5,40}_[A-Za-z0-9]{10,60})(?![A-Za-z0-9_])
confidence: high
confidence_justification: >-
  High confidence: the vc?-prefix family is documented by Vercel's own changelog (all five
  prefixes named, introduced specifically so scanners can detect them), corroborated by literal
  vca_/vcr_ token examples in Vercel's own Sign in with Vercel docs (56-character alphanumeric
  bodies), and Vercel is a GitHub secret-scanning partner with six token types, five
  push-protection enabled. Exact per-prefix body lengths are not formally published, so an
  honest bounded 40-80 range is used. The legacy unprefixed form is deliberately context-gated:
  it is indistinguishable from other 24-character identifiers (GitGuardian lists it as
  non-prefixed), so it requires a labelled assignment and never fires value-only.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - vercel
    - vercel.com
    - VERCEL_TOKEN
    - deployment
    - api key
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: vca_zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA9876
      description: Exact 65 probe - current app token without independent deployment context
    - value: 'Vercel deployment credential vck_0123456789ABCDEFGHIJ0123456789abcdefghij'
      description: Exact 75 probe - API-key structure with deployment context
    - value: 'Vercel project deploy secret VERCEL_TOKEN=vcp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz01234567'
      description: Exact 85 probe - project context plus canonical token assignment
    - value: 'BLOB_READ_WRITE_TOKEN=vercel_blob_rw_abc123_ABCDEFGHIJKLMNOPQRSTUVWXYZ'
      description: Vercel Blob read-write token (vercel_blob_rw_ + store id + secret)
    - value: vercel_blob_rw_store01_zyxwvutsrqponmlkjihgfedcba0123456789
      description: Bare Vercel Blob token (distinctive prefix, no label needed)
    - value: 'VERCEL_TOKEN=ABCDEFGHIJKLMNOPQRSTUVWX'
      description: Legacy unprefixed Vercel token (24 chars) in a labelled assignment
    - value: 'vercel api token: zyxwvutsrqponmlkjihgfedc'
      description: Legacy context-gated token retained as a discovery candidate
  should_not_match:
    - value: vercel_deploy_id_ABCDEFGHIJKLMNOPQRSTUVWX_env_more
      description: 24-char run glued inside a longer identifier (boundary regression case from review)
    - value: vcx_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz01234567
      description: Invalid prefix letter (vcx_ is not a Vercel token family)
    - value: vcp_ABCDEFGHIJ0123456789
      description: vcp_ body too short (20 chars, below the 40-char floor)
    - value: ABCDEFGHIJKLMNOPQRSTUVWX with no vendor context
      description: Bare 24-char alphanumeric value with no Vercel label anywhere (could be any ID or hash)
    - value: vercel_blob_rw_abc_Zz9
      description: Blob token secret segment far too short (3 chars, below the 10-char floor)
    - value: 'Netlify deploy NETLIFY_AUTH_TOKEN=vcp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz01234567'
      description: Sibling deployment provider context does not corroborate a Vercel token
    - value: 'Documentation example: Vercel project VERCEL_TOKEN=vcp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz01234567'
      description: Documentation example containing a valid-shaped token is excluded
    - value: rotate the vercel token in account settings
      description: Prose mention without a token value
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: A 24-character identifier (for example a MongoDB ObjectId is 24 hex characters) appearing in a labelled assignment near the word "vercel" in configuration or logs.
    mitigation: The legacy branch requires label adjacency plus an assignment separator (already enforced by the regex) and corroborative keywords; it is context-gated only and never fires value-only.
  - description: Documentation or examples showing placeholder vcp_/VERCEL_TOKEN/vercel_blob_rw_ strings.
    mitigation: Check for placeholder markers (example, xxxx, 0000) and documentation file types to reduce false positives.
  - description: The per-prefix body lengths of the vc?-family are not individually published; a bounded 40-80 range around the vendor-documented 56-character examples is used, and the possible sixth partner type (support access tokens) has no published prefix and is not matched.
    mitigation: Documented as an honest bound; the prefixes themselves are vendor-announced and highly distinctive.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The high-confidence detector finds current Vercel personal, integration, app, refresh, API, and Blob read-write tokens plus a context-gated legacy unprefixed form. A live value can control projects and deployments, read or change environment variables, or access the associated Blob store within the token's permissions. The affected scale is one account, team, project portfolio, app, or storage instance, with token type, role, scope, and revocation limiting harm. Risk 8 and SENSITIVE reflect serious contained deployment-platform compromise, while an owner token spanning many critical public services and secret stores would raise the impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_vercel_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_vercel_api_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_vercel_token
      matches:
        - ref: Keyword_vercel_platform_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_vercel_api_token
      matches:
        - ref: Keyword_vercel_platform_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_vercel_token
      matches:
        - ref: Keyword_vercel_platform_context
        - ref: Pattern_vercel_token_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_vercel_api_token
      matches:
        - ref: Keyword_vercel_platform_context
        - ref: Pattern_vercel_token_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_vercel_token
      pattern: (?<![A-Za-z0-9_])(?:vc[aikpr]_[A-Za-z0-9]{40,80}|vercel_blob_rw_[A-Za-z0-9]{5,40}_[A-Za-z0-9]{10,60})(?![A-Za-z0-9_])
    - id: Regex_vercel_api_token
      pattern: (?i)vercel[\s\S]{0,40}?[=:][\s"']{0,4}(?<![A-Za-z0-9_])[A-Za-z0-9]{24}(?![A-Za-z0-9_])
    - id: Pattern_vercel_token_assignment
      pattern: (?i)\b(?:VERCEL_TOKEN|VERCEL_ACCESS_TOKEN|BLOB_READ_WRITE_TOKEN)\s*[=:]
  keywords:
    - id: Keyword_vercel_platform_context
      groups:
        - match_style: string
          terms:
            - Vercel project
            - Vercel deployment
            - Vercel team
            - Vercel Blob store
            - vercel.com dashboard
      strength: specific
created: '2026-07-06'
