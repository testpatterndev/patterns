schema: testpattern/v1
name: Supplier bank change requests
slug: au-top500-142-supplier-bank-change-requests
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to supplier bank change requests in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:supplier\s+bank\s+change|bank\s+detail\s+change|payment\s+redirect|account\s+update\s+request|BSB\s+change|bank\s+account\s+update|vendor\s+bank\s+modification|remittance\s+update|supplier\s+verification|fraud\s+prevention)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - supplier bank change requests
    - supplier
    - bank
    - change
    - requests
    - procurement
    - management
  proximity: 300
test_cases:
  should_match:
    - value: supplier bank change
      description: Primary topic phrase match
    - value: bank detail change
      description: Case-insensitive topic phrase match
    - value: payment redirect
      description: Alternative topic phrase match
    - value: account update request
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to supplier bank change requests appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_supplier_bank_change
      matches:
        - ref: Evidence_supplier_bank_change
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_supplier_bank_change
      matches:
        - ref: Evidence_supplier_bank_change
    - confidence_level: 65
      id_match: Pattern_supplier_bank_change
      matches:
        - ref: Evidence_supplier_bank_change
  regexes:
    - id: Pattern_supplier_bank_change
      pattern: (?is)\b(?:supplier\s+bank\s+change|bank\s+detail\s+change|payment\s+redirect|account\s+update\s+request|BSB\s+change|bank\s+account\s+update|vendor\s+bank\s+modification|remittance\s+update|supplier\s+verification|fraud\s+prevention)\b
  keywords:
    - id: Evidence_supplier_bank_change
      groups:
        - match_style: word
          terms:
            - supplier bank change
            - bank detail change
            - payment redirect
            - account update request
            - BSB change
            - bank account update
            - vendor bank modification
            - remittance update
            - supplier verification
            - fraud prevention
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
