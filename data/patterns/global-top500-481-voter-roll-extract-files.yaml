schema: testpattern/v1
name: Voter roll extract files
slug: global-top500-481-voter-roll-extract-files
version: 1.2.1
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to voter roll extract files in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:voter\s+roll\s+extract\s+files?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - voter roll extract files
  proximity: 240
  keyword_lists:
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Voter roll extract files'
      description: Topic phrase present
    - value: 'voter roll extract files'
      description: Topic phrase, lowercase
    - value: 'this record references the voter roll extract files held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Common words and phrases related to voter roll extract files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_voter_roll
      matches:
        - ref: Keyword_voter_roll
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_voter_roll
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_voter_roll
      pattern: (?i)\b(?:voter\s+roll\s+extract\s+files?)\b
    - id: Pattern_global_top500_481_voter_roll_extract_files_label_context
      pattern: (?i)\b(?:voter\s+roll\s+extract\s+files)\b
  keywords:
    - id: Keyword_voter_roll
      groups:
        - match_style: word
          terms:
            - voter roll extract files
            - voter roll
            - electoral roll
            - voter registration
            - registered voters
            - polling district
            - electorate
            - voter ID
            - precinct
            - electoral commission
            - enrollment extract
            - ballot eligibility
      strength: specific
    - id: Keyword_global_top500_481_voter_roll_extract_files_domain_context
      groups:
        - match_style: word
          terms:
            - voter roll extract files
            - voter
            - roll
            - files
      strength: domain
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
