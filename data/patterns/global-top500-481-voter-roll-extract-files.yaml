schema: testpattern/v1
name: Voter roll extract files
slug: global-top500-481-voter-roll-extract-files
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to voter roll extract files in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:voter\s+roll\s+extract\s+files?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - GDPR
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - voter roll extract files
    - voter
    - roll
    - extract
    - files
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:
    - government-services
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Voter roll extract files'
      description: Topic phrase present
    - value: 'voter roll extract files'
      description: Topic phrase, lowercase
    - value: 'this record references the voter roll extract files held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Common words and phrases related to voter roll extract files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_voter_roll_extract_files
      matches:
        - ref: Evidence_voter_roll_extract_files
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_voter_roll_extract_files
      matches:
        - ref: Evidence_voter_roll_extract_files
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_voter_roll_extract_files
      matches:
        - ref: Evidence_voter_roll_extract_files
  regexes:
    - id: Pattern_voter_roll_extract_files
      pattern: (?i)\b(?:voter\s+roll\s+extract\s+files?)\b
    - id: Pattern_au_top500_481_voter_roll_extract_files_label_context
      pattern: (?i)\b(?:voter\s+roll\s+extract\s+files)\b
  keywords:
    - id: Evidence_voter_roll_extract_files
      groups:
        - match_style: word
          terms:
            - voter roll
            - electoral roll
            - voter extract
            - enrolled voters
            - electoral commission
            - text: AEC
              case_sensitive: true
            - voter registration
            - elector details
            - polling place
            - enrolled electors
            - electoral district
            - voter file
      strength: specific
    - id: Keyword_au_top500_481_voter_roll_extract_files_domain_context
      groups:
        - match_style: word
          terms:
            - voter roll extract files
            - voter
            - roll
            - files
      strength: domain
risk_description: >-
  The concept detector targets a voter-roll extract file, meaning a compiled electoral dataset rather than one publicly encountered voter name. A true extract can combine names, enrolled addresses, elector identifiers, or status information at useful scale, enabling profiling, targeted harassment, identity correlation, or misuse against electors even where limited roll inspection is lawful. The medium-confidence phrase rule may also find procedural references to extracts, so actual file structure and person records matter. Risk 8 and SENSITIVE Personal-Privacy fit the serious aggregate privacy harm; PROTECTED would require protected addresses, a population-scale identifiable holding, or a credible safety or electoral-system consequence amounting to significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
