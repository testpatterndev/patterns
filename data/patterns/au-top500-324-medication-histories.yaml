schema: testpattern/v1
name: Medication histories
slug: au-top500-324-medication-histories
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies medication histories references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: au-healthcare-medications.
pattern: (?is)\b(?:medication\s+history|prescription\s+history|drug\s+history|dispensing\s+record|patient\s+medication)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - medication histories
    - medication
    - histories
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - au-healthcare-medications
test_cases:
  should_match:
    - value: medication history
      description: Primary topic phrase match
    - value: prescription history
      description: Case-insensitive topic phrase match
    - value: drug history
      description: Alternative topic phrase match
    - value: dispensing record
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_medication_histories
      matches:
        - ref: Evidence_medication_histories
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_medication_histories
      matches:
        - ref: Evidence_medication_histories
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_medication_histories
      matches:
        - ref: Evidence_medication_histories
  regexes:
    - id: Pattern_medication_histories
      pattern: (?is)\b(?:medication\s+history|prescription\s+history|drug\s+history|dispensing\s+record|patient\s+medication)\b
  keywords:
    - id: Evidence_medication_histories
      groups:
        - match_style: word
          terms:
            - medication history
            - prescription history
            - drug history
            - medication
            - pharmaceutical
            - dispensing record
            - health
            - biomedical
            - patient medication
            - dosage
            - prescriber
            - pharmacy
risk_description: >-
  This detector identifies medication, prescription, drug and dispensing histories or patient-medication records with pharmacy and healthcare context. A genuine history can reveal chronic and acute conditions, treatment response, reproductive or mental-health care, adherence, prescribers, and timing, enabling diagnosis inference, discrimination, coercion, or dangerous tampering. One person's history is a composite longitudinal record but not a pharmacy database, making the consequence serious and contained. Risk 8 and SENSITIVE are appropriate; PROTECTED would require a large dispensing repository, controlled-drug diversion capability, or compromise causing significant clinical harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
