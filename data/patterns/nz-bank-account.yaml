schema: testpattern/v1
name: New Zealand bank account number
slug: nz-bank-account
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects New Zealand bank account number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Financial account numbers require corroborative evidence for
  reliable detection due to their generic numeric format.
operation: 'Corroborative evidence: 7 keywords within 300 characters. Keyword lists: banking, nz-financial. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: \b\d{2}-?\d{4}-?\d{7}-?\d{2,3}\b
confidence: medium
confidence_justification: >-
  Medium confidence: the 2-4-7-2/3 structured format is moderately distinctive for New Zealand bank accounts. Bank name keywords improve detection accuracy. Added context gating and exclusion rules
  improve precision and reduce incidental matches.
jurisdictions:
  - nz
regulations:
  - Privacy Act 2020 (NZ)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - pii
  - financial
corroborative_evidence:
  keywords:
    - bank account
    - account number
    - ANZ
    - ASB
    - Westpac
    - BNZ
    - Kiwibank
  proximity: 300
  keyword_lists:
    - banking
    - nz-financial
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 12-3456-7890123-45
      description: NZ bank account with hyphens (2-4-7-2)
    - value: 12-3456-7890123-456
      description: NZ bank account with 3-digit suffix
    - value: '123456789012345'
      description: NZ bank account continuous digits (15 digits, 2-4-7-2 format)
  should_not_match:
    - value: 12-3456-789012-45
      description: Only 6 digits in account section, too short
    - value: 12-3456-7890123-4567
      description: 4-digit suffix, exceeds NZ format
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic numeric sequences such as reference numbers, invoice numbers, or identifiers from other domains
    mitigation: Require corroborative evidence keywords within the proximity window to distinguish financial account numbers from general numeric data.
  - description: Phone numbers, postal codes, or other structured numbers with similar digit counts
    mitigation: Layer with other detection patterns to deprioritise matches that overlap with phone number or postal code formats.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_nz_bank_account
      matches:
        - ref: Pattern_nz_bank_account_label_context
        - ref: Keyword_nz_bank_account_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_nz_bank_account
      matches:
        - ref: Keyword_nz_bank_account
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_nz_bank_account
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_nz_bank_account
      pattern: \b\d{2}-?\d{4}-?\d{7}-?\d{2,3}\b
    - id: Pattern_nz_bank_account_label_context
      pattern: (?i)\b(?:new\s+zealand\s+bank\s+account\s+number|new|zealand|bank|account)\b
  keywords:
    - id: Keyword_nz_bank_account
      groups:
        - match_style: word
          terms:
            - bank account
            - account number
            - text: ANZ
              case_sensitive: true
            - text: ASB
              case_sensitive: true
            - Westpac
            - text: BNZ
              case_sensitive: true
            - Kiwibank
            - bank account number
            - savings account
            - cheque account
            - direct debit
            - direct credit
            - bank deposit
      strength: specific
    - id: Keyword_nz_bank_account_domain_context
      groups:
        - match_style: word
          terms:
            - new zealand bank account number
            - new
            - zealand
            - bank
      strength: domain
  filters:
    - id: Filter_nz_bank_same_digits
      type: AllDigitsSameFilter
risk_rating: 8
risk_description: >-
  The detector recognises a New Zealand bank-account number shape with seven local banking keywords and filters common sample or test language. A live account identifier can reveal where a person or business banks and can support payment redirection, fraudulent mandate attempts, or tailored social engineering when paired with holder details. Similar-length reference, phone, and postal numbers can be mistaken for accounts, and the identifier alone does not permit funds transfer. Risk 8 SENSITIVE captures serious but bounded financial harm; PROTECTED would require a bulk account holding, payment authority, or consequences amounting to significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-new-zealand-bank-account-number
    title: New Zealand bank account number entity definition - Microsoft Learn
