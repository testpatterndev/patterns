schema: testpattern/v1
name: Major Litigation Strategy Document
slug: major-litigation-strategy-document
version: 1.4.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: 'Detects privileged litigation strategy documents for matters with significant financial exposure (>$10M) or systemic policy impact. These documents reveal the State''s assessment of its own weaknesses, settlement authority, and tactical approach. Note: trainable classifier recommended for production deployment using document structural features.'
operation: 'Primary detection: keyword proximity matching litigation strategy terms (''litigation strategy'', ''case strategy'', ''trial strategy'', ''defence strategy'') within 200 characters of privilege indicators (''privileged'', ''LPP'', ''confidential'', ''PROTECTED''). Trainable classifier fallback: structural headings detection for ''Strengths/Weaknesses'', ''Prospects of Success'', ''Risk Assessment'', ''Recommended Approach'' combined with privilege markings. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:litigation|case|trial|defence)\s+strategy\b
confidence: medium
confidence_justification: 'Medium confidence: Litigation strategy terminology combined with privilege markers is specific to active privileged legal work product. Trainable classifier component further reduces false positives by matching document structure typical of strategy documents.'
jurisdictions:
  - au
regulations:
- "Evidence Act 1977 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - privileged
    - LPP
    - confidential
    - PROTECTED
    - prospects of success
    - risk assessment
    - strengths
    - weaknesses
    - recommended approach
    - settlement
    - exposure
    - legal professional privilege
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        PROTECTED — LEGAL PROFESSIONAL PRIVILEGE
        Litigation Strategy — Privileged and Confidential

        Matter: State of Queensland v Consolidated Mining Ltd
        Exposure: $45M (estimated)

        1. Prospects of Success
        The State's prospects are assessed as moderate. Key weaknesses include...
      description: Privileged litigation strategy document with exposure estimate
    - value: 'This case strategy document is subject to LPP. The defence strategy for the representative proceeding requires immediate review. Risk assessment: the State''s position on causation is vulnerable and settlement authority should be obtained.'
      description: Case strategy with LPP marking and vulnerability assessment
    - value: |-
        CONFIDENTIAL — PRIVILEGED
        Trial Strategy Brief
        Prepared for: Director-General, Department of Health
        Re: Class of claims arising from Caboolture Hospital incident

        Recommended Approach: Defend liability, concede quantum on limited basis
      description: Trial strategy brief with recommended approach
  should_not_match:
    - value: This chapter examines litigation strategy as a concept in civil procedure. Students should consider the ethical obligations of practitioners when developing trial strategy.
      description: Academic textbook on litigation strategy
    - value: Our firm's litigation strategy brochure outlines how we approach complex commercial disputes. Contact us for a free consultation about your case strategy.
      description: Law firm marketing material
    - value: The published judgment discussed the plaintiff's litigation strategy in open court. The court noted the tactical decisions made during the trial.
      description: Published court judgment discussing strategy
false_positives:
  - description: Academic legal textbooks discussing litigation strategy concepts
    mitigation: Require co-occurrence with government entity names or QGISCF/PROTECTED markers
  - description: Law firm marketing materials referencing strategy services
    mitigation: Require privilege indicators (LPP, privileged, PROTECTED) within proximity window
  - description: Published court judgments discussing parties' strategies
    mitigation: Negative match on court citation formats and 'published judgment'
  - description: Template or precedent strategy documents without real content
    mitigation: Negative match on 'template', 'example', 'precedent', 'sample'. Require specific content (party names, dollar amounts)
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_major_litigation_strategy_document_litigation_strategy_phrase
      matches:
        - ref: Evidence_major_litigation_strategy_document_primary
        - ref: Evidence_major_litigation_strategy_document_corroborative
        - ref: Evidence_major_litigation_strategy_document_structural_headings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_major_litigation_strategy_document_exclusion
        - ref: Pattern_major_litigation_strategy_document_prospects_of_success_heading
        - ref: Pattern_major_litigation_strategy_document_financial_exposure_estimate
    - confidence_level: 75
      id_match: Pattern_major_litigation_strategy_document_litigation_strategy_phrase
      matches:
        - ref: Evidence_major_litigation_strategy_document_primary
        - ref: Evidence_major_litigation_strategy_document_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_major_litigation_strategy_document_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_major_litigation_strategy_document_litigation_strategy_phrase
  regexes:
    - id: Pattern_major_litigation_strategy_document_litigation_strategy_phrase
      pattern: (?i)\b(?:litigation|case|trial|defence)\s+strategy\b
    - id: Pattern_major_litigation_strategy_document_prospects_of_success_heading
      pattern: (?i)\bprospects\s+of\s+success\b
    - id: Pattern_major_litigation_strategy_document_financial_exposure_estimate
      pattern: (?i)\b(?:exposure|quantum)\s*[:.]?\s*\$[\d,.]+[MmBb]?\b
  keywords:
    - id: Evidence_major_litigation_strategy_document_primary
      groups:
        - match_style: word
          terms:
            - litigation strategy
            - case strategy
            - trial strategy
            - defence strategy
      strength: specific
    - id: Evidence_major_litigation_strategy_document_corroborative
      groups:
        - match_style: word
          terms:
            - privileged
            - text: LPP
              case_sensitive: true
            - PROTECTED
            - prospects of success
            - risk assessment
            - strengths and weaknesses
            - recommended approach
            - settlement authority
            - exposure
      strength: domain
    - id: Evidence_major_litigation_strategy_document_structural_headings
      groups:
        - match_style: word
          terms:
            - Prospects of Success
            - Risk Assessment
            - Strengths/Weaknesses
            - Recommended Approach
            - Settlement Range
      strength: structural
    - id: Evidence_major_litigation_strategy_document_exclusion
      groups:
        - match_style: word
          terms:
            - textbook
            - template
            - example
            - brochure
            - consultation
            - published judgment

      strength: noise
risk_rating: 8
risk_description: >-
  This keyword-proximity pattern identifies privileged litigation, trial, case, or defence strategy with confidentiality indicators and structural material such as strengths, weaknesses, prospects, and recommended approach. Disclosure can reveal the State's assessment of liability, evidentiary gaps, tactical sequencing, settlement posture, and decision thresholds, allowing an opponent to exploit weaknesses in a major matter. The ordinary true positive is a substantive strategy document with serious financial and legal impact, not a textbook reference to litigation strategy. Risk 8 supports SENSITIVE Legal; PROTECTED would require exceptional statewide precedent, critical policy failure, or broad privileged compromise producing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
