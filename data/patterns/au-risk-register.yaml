schema: testpattern/v1
name: Risk Register
slug: au-risk-register
version: 1.4.0
type: regex
pattern_class: concept
description: Detects risk registers containing assessed vulnerabilities, likelihood ratings, and risk treatment plans.
operation: >-
  A risk-register, risk-matrix, heat-map, management-report, or KRI-dashboard title is discovery-only
  at 65. Likelihood, impact, inherent/residual risk, score, rating, appetite, or tolerance evidence
  raises it to 75. The 85 tier additionally requires treatment, mitigation, acceptance, transfer,
  avoidance, or control-effectiveness evidence. Enforcing tiers reject templates and examples.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- DISP
- ISO 27001
- NIST CSF
data_categories:
  - governance
  - security
test_cases:
  should_match:
    - value: 'Enterprise risk register'
      description: Low-tier probe - register title without assessed values
    - value: 'Risk register: inherent risk high, residual risk medium, likelihood likely.'
      description: Medium-tier probe - assessed values without treatment evidence
    - value: 'Risk register: inherent risk high, residual risk medium; risk mitigation owner approved risk treatment and control effectiveness review.'
      description: High-tier probe - assessed values plus treatment evidence
  should_not_match:
    - value: Risk taking in sports
      description: Sports-risk sibling
    - value: At risk youth program
      description: Social-programme prose
    - value: 'The public governance page links to the enterprise risk register.'
      description: Public link mentions only the register title
    - value: 'Template example: risk register with inherent risk high, residual risk medium, risk treatment, and control effectiveness.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Generic risk in non-register contexts.
    mitigation: Require register-specific terms like risk register, risk matrix, or risk owner.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The concept pattern identifies risk registers and treatment records containing likelihood, consequence, inherent or residual ratings, owners, tolerances, and mitigation plans rather than generic discussion of risk. A substantive register can expose known vulnerabilities, control gaps, accepted residual risks, accountable teams, and remediation priorities that an attacker, competitor, or litigant could exploit. The affected scale may span several business functions, but an ordinary organisational register still produces serious contained harm rather than automatic critical-service compromise. Risk 8 SENSITIVE Government is appropriate; PROTECTED is not met without critical-infrastructure weaknesses, protected operations, or credible significant damage at strategic or system scale.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_risk_register
      matches:
        - ref: Keyword_risk_assessment
        - ref: Keyword_risk_treatment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_risk_register
      matches:
        - ref: Keyword_risk_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_risk_register
  regexes:
    - id: Regex_risk_register
      pattern: >-
        (?i)\b(?:risk\s+register|(?:enterprise\s+)?risk\s+(?:management\s+)?report|risk\s+(?:assessment\s+)?matrix|risk\s+heat\s*map|kri\s+(?:dashboard|report))\b
  keywords:
    - id: Keyword_risk_assessment
      groups:
        - match_style: word
          terms:
            - likelihood
            - impact
            - inherent risk
            - residual risk
            - risk score
            - risk rating
            - risk appetite
            - risk tolerance
      strength: specific
    - id: Keyword_risk_treatment
      groups:
        - match_style: word
          terms:
            - risk treatment
            - risk mitigation
            - risk transfer
            - risk acceptance
            - risk avoidance
            - control effectiveness
            - text: KRI
              case_sensitive: true
            - key risk indicator
      strength: specific
    - id: Keyword_compliance_general
      groups:
        - match_style: word
          terms:
            - compliance
            - regulatory
            - governance
            - policy
            - standard
            - framework
            - assessment
            - audit
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.0
    date: '2026-07-19'
    description: 'Profile quality: align the regex-backed detector type; add register-title discovery, assessed-risk medium, and treatment-corroborated high tiers; add public/template adversarial probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 593 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - risk register
  - risk assessment
  - risk rating
  - risk likelihood
  - risk consequence
  - risk treatment
  - risk appetite
  - risk tolerance
  - risk owner
  - residual risk
  - inherent risk
  - risk matrix
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
