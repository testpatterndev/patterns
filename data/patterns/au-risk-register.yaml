schema: testpattern/v1
name: Risk Register
slug: au-risk-register
version: 1.3.0
type: keyword_list
pattern_class: concept
description: Detects risk registers containing assessed vulnerabilities, likelihood ratings, and risk treatment plans.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- DISP
- ISO 27001
- NIST CSF
data_categories:
  - governance
  - security
test_cases:
  should_match:
    - value: 'Risk register: risk assessment with likelihood and consequence ratings'
      description: Test match 1
    - value: Risk treatment plan for residual risk within risk appetite and tolerance
      description: Test match 2
    - value: 'Risk owner review: inherent risk rating and risk matrix update'
      description: Test match 3
  should_not_match:
    - value: Risk taking in sports
      description: Non-match 1
    - value: At risk youth program
      description: Non-match 2
false_positives:
  - description: Generic risk in non-register contexts.
    mitigation: Require register-specific terms like risk register, risk matrix, or risk owner.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: Risk register exposure reveals assessed vulnerabilities, likelihood ratings, and treatment gaps.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Government"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_risk_register
      matches:
        - ref: Keyword_risk_assessment
        - ref: Keyword_risk_treatment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_risk_register
      matches:
        - ref: Keyword_compliance_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_risk_register
      pattern: >-
        (?i)\b(?:risk\s+register|(?:enterprise\s+)?risk\s+(?:management\s+)?report|risk\s+(?:assessment\s+)?matrix|risk\s+heat\s*map|kri\s+(?:dashboard|report))\b
  keywords:
    - id: Keyword_risk_assessment
      groups:
        - match_style: word
          terms:
            - risk assessment
            - risk analysis
            - risk identification
            - likelihood
            - impact
            - inherent risk
            - residual risk
            - risk score
            - risk rating
            - risk appetite
            - risk tolerance
      strength: specific
    - id: Keyword_risk_treatment
      groups:
        - match_style: word
          terms:
            - risk treatment
            - risk mitigation
            - risk transfer
            - risk acceptance
            - risk avoidance
            - control effectiveness
            - text: KRI
              case_sensitive: true
            - key risk indicator
      strength: specific
    - id: Keyword_compliance_general
      groups:
        - match_style: word
          terms:
            - compliance
            - regulatory
            - governance
            - policy
            - standard
            - framework
            - assessment
            - audit
      strength: domain
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - risk register
  - risk assessment
  - risk rating
  - risk likelihood
  - risk consequence
  - risk treatment
  - risk appetite
  - risk tolerance
  - risk owner
  - residual risk
  - inherent risk
  - risk matrix
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
