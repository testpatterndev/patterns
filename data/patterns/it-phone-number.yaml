schema: testpattern/v1
name: Italian Phone Number
slug: it-phone-number
version: 1.2.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Italian mobile telephone numbers per AGCOM's national numbering plan (Delibera n. 8/15/CIR,
  Allegato A): the mobile/personal-communications block, structurally defined as "3XYZ" plus six further
  digits (a 10-digit total for numbering assigned under the current plan), in both the domestic and +39
  international forms. The delibera permits already-assigned legacy 9-digit mobile numbering to persist, so
  any surviving legacy 9-digit mobile numbers are a known potential false negative of this 10-digit regex —
  kept at 10 digits deliberately, since evidence that live 9-digit stock persists today is inconclusive and
  loosening the length bound would raise digit collision for every match. Geographic (landline) numbers are
  intentionally out of scope: the AGCOM plan family bounds geographic numbers at a 10-11 digit total (11
  maximum), but within that bound the "0" block's second digit is structurally unconstrained and the
  minimum/per-prefix length variability across the legacy short-number stock is not verified from a primary
  source — a 0-prefixed regex spanning that length range with no second-digit constraint would be highly
  collision-prone — and Italian landline numbers are also the one well-known exception where the leading 0
  is retained even in the +39 international form, a further formatting axis to model. Mobile numbers carry
  no such leading-0 quirk (they never had a leading 0 to begin with).
operation: >-
  Validation: none (Italian mobile numbers have no checksum). Reference: AGCOM, Piano di numerazione,
  https://www.agcom.it/piano-di-numerazione; Delibera n. 8/15/CIR, Allegato A (customer numbering for mobile
  and personal-communications services: "3XYZ U1U2U3U4U5U6", a 10-digit total for current-plan assignments;
  legacy 9-digit assignments are permitted to persist — see description),
  https://www.agcom.it/sites/default/files/migration/attachment/Allegato%2020-2-2015.pdf. Corroborative
  evidence: keywords within 300 characters. Keyword lists: phone-context. Both the domestic and
  international (+39) sub-regexes are evidence-gated at every tier — no tier fires without positive
  corroborative evidence, per the phone-family convention — see confidence_justification.
pattern: '(?<!\d)(?:\+39[\s.-]?3[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|3[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d)(?!\d)'
confidence: medium
confidence_justification: >-
  Medium confidence: the leading-digit-3 constraint and the 10-digit length of current-plan assignments
  (drawn directly from AGCOM's Delibera 8/15/CIR customer-numbering structure; legacy 9-digit assignments
  the delibera permits to persist are an accepted false-negative trade-off) narrow the format, but Italian
  mobile numbers carry
  no checksum and a 10-digit sequence starting with 3 is still a high digit-collision format. Per the
  phone-family convention (every tier requires positive corroborative evidence; a +CC prefix alone is
  insufficient gating; there is no 65 rung), both the domestic and +39 international sub-regexes are
  evidence-gated at every tier: 75 requires generic phone-context evidence and 85 requires country-specific
  phone keywords with template/noise exclusion. The literal +39 prefix improves precision when present but
  is not by itself sufficient gating.
jurisdictions:
  - it
regulations:
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - pii
  - contact-information
corroborative_evidence:
  keywords:
    - phone
    - mobile
    - call
    - text
    - contact number
    - Italian phone number
    - numero di telefono
    - call me at
  proximity: 300
  keyword_lists:
    - phone-context
test_cases:
  should_match:
    - value: 'Cellulare: 345 678 9012'
      description: Domestic mobile, leading 3, illustrative ascending-digit placeholder (no official AGCOM-reserved fictional range exists — verified absent during research), space-separated
    - value: 'Numero: 3401234567'
      description: Domestic mobile, bare digits with no separator
    - value: 'Contatto: 347-890-1234'
      description: Domestic mobile, hyphenated grouping
    - value: 'International: +39 345 678 9012'
      description: International +39 form of the mobile number, leading 3 unchanged (mobile numbers have no leading 0 to drop)
  should_not_match:
    - value: '06 1234 5678'
      description: Leading digit 0 is Italy's geographic (landline) block — out of scope for this mobile-only pattern
    - value: '9123456789'
      description: Leading digit 9 is not the mobile/personal-communications leading digit 3
    - value: '345678901'
      description: Only 9 digits — one short of the required 10
    - value: '9345678901234'
      description: Valid-shaped digit run embedded inside a longer reference number, rejected by digit boundaries
false_positives:
  - description: >-
      A 10-digit sequence starting with 3 can still coincidentally match invoice numbers, order numbers, or
      other structured identifiers of the same length and leading digit.
    mitigation: >-
      Every tier — for both the domestic and +39 international sub-regexes — requires positive
      phone-context or country-specific evidence within 300 characters; no zero-evidence tier exists, so a
      bare digit run without corroborating context never fires at any confidence level.
  - description: >-
      No official AGCOM-reserved fictional or test number range exists for Italy (confirmed by web research,
      unlike NANP's 555-01XX or Ofcom's drama numbers), so illustrative synthetic values were used instead of
      an authoritative reserved range.
    mitigation: >-
      Test values use clearly non-representative sequential digit patterns; deployers should substitute their
      own tenant's synthetic test data for live validation rather than relying on a non-existent official
      reserved range.
  - description: >-
      Landline/geographic numbers are not detected at all (a false negative, not a false positive, but noted
      for completeness): the AGCOM plan family bounds geographic numbers at a 10-11 digit total (11 maximum),
      but within that bound the "0" block's second digit is structurally unconstrained, the minimum/per-prefix
      length variability across the legacy short-number stock is not verified from a primary source, and
      Italian landlines additionally keep the leading 0 in the +39 international form (unlike almost every
      other country) — so a landline regex at that length range would be highly collision-prone without a
      verified narrowing constraint.
    mitigation: >-
      A future revision could add landline coverage if a genuinely verifiable per-prefix length/structure
      constraint is confirmed from a primary AGCOM source, following the same verification bar applied here.
  - description: >-
      Legacy 9-digit mobile numbering already assigned before the current plan is permitted to persist under
      Delibera 8/15/CIR, and any surviving live 9-digit numbers will not be detected by this 10-digit regex
      (a false negative, noted for completeness).
    mitigation: >-
      Deliberate trade-off: evidence that live 9-digit stock persists today is inconclusive, and loosening
      the length bound to 9-10 digits would measurably raise digit collision for every match; revisit if a
      primary source confirms surviving 9-digit assignments.
  - description: >-
      The mobile sub-regex also fires inside the +39 international rendering when the number is written
      with separators (empirically verified: in "+39 345 678 9012" it matches the "345 678 9012" substring —
      Italian mobiles have no trunk 0, so the digits after "+39 " are exactly the domestic form; the
      contiguous "+393456789012" rendering is protected by the digit-boundary lookbehind).
    mitigation: >-
      Benign co-fire, left in place deliberately: both sub-regexes carry identical evidence gating and
      confidence levels, so the duplicate match cannot inflate confidence — it can only duplicate a finding
      at the same level, which reporting layers de-duplicate by offset. A structural fix would need
      variable-width negative lookbehind, which the universal engine target does not support.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: phone-context
      as: Evidence_phone_context
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_it_phone_mobile
      matches:
        - ref: Keyword_it_phone_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_it_phone_mobile
      matches:
        - ref: Evidence_phone_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_it_phone_intl
      matches:
        - ref: Keyword_it_phone_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_it_phone_intl
      matches:
        - ref: Evidence_phone_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_it_phone_mobile
      pattern: '(?<!\d)3[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d(?!\d)'
    - id: Regex_it_phone_intl
      pattern: '(?<!\d)\+39[\s.-]?3[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d(?!\d)'
  keywords:
    - id: Keyword_it_phone_specific
      groups:
        - match_style: word
          terms:
            - Italian phone number
            - Italian mobile number
            - numero di telefono
            - numero di cellulare
            - telefono cellulare
      strength: specific
risk_rating: 5
risk_description: >-
  The Italian identifier targets current ten-digit mobile numbers beginning 3 in domestic or +39 form with phone context; geographic landlines and possible legacy nine-digit mobiles remain outside scope. Disclosure can enable calls, messaging scams, harassment, and subscriber correlation when combined with a person's name, service, or account information. The normal unit is one contact route, not an account credential, and ten-digit invoices or orders beginning 3 can collide with the pattern. Risk 5 and OFFICIAL fit the limited standalone harm; SENSITIVE would require credentials, intimate communications, protected-service context, precise location, or identity data that makes targeted abuse materially more serious.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
references:
  - url: https://www.agcom.it/piano-di-numerazione
    title: "AGCOM: Piano di numerazione (national numbering plan — service classification by leading digit)"
  - url: https://www.agcom.it/sites/default/files/migration/attachment/Allegato%2020-2-2015.pdf
    title: "AGCOM: Allegato A alla Delibera n. 8/15/CIR (mobile customer numbering structure \"3XYZ U1..U6\", 10-digit total for current-plan assignments; pre-existing legacy 9-digit mobile assignments permitted to persist)"
created: '2026-07-06'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2139 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-08'
    description: >-
      Docs: reference title for Delibera 8/15/CIR now carries the legacy-9-digit qualifier the description
      and false_positives already document, so the citation no longer overstates the "10-digit total" as
      unconditional. Hygiene: dropped the bare generic term "cellulare" and generic English phrases
      (call me at, text me at) from the country-specific 85-tier keyword dict, added "telefono cellulare";
      added the noise-exclusion NOT node to both 75 tiers per the identifier-family convention. Documented
      the verified mobile-regex co-fire inside the spaced +39 rendering as a benign, same-confidence
      duplicate (no regex change).
  - version: 1.0.0
    date: '2026-07-06'
    description: Initial release. Scoped to mobile numbers only; geographic/landline numbers out of scope (bounded 10-11 digit total but collision-prone unconstrained structure at that length, unverified per-prefix minimums, and the +39 leading-zero retention quirk — see description).
