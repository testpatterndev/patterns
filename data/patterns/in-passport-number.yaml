schema: testpattern/v1
name: India Passport Number
slug: in-passport-number
version: 1.1.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Indian passport numbers issued by the Ministry of External Affairs. The standard format is a single letter
  (A-Z excluding Q, X and Z, which are not used as the leading character) followed by 7 digits, sometimes printed with
  a space between the letter and the digits (e.g. 'K1234567' or 'K 1234567'). Corroborative keyword proximity is
  strongly recommended because the body is only 7 digits.
operation: >-
  Reference: https://www.geeksforgeeks.org/dsa/how-to-validate-indian-passport-number-using-regular-expression/
  Matches a leading letter from [A-PR-WY], an optional single space, then 7 digits.
  Corroborative evidence: keywords within 300 characters.
pattern: (?<![A-Za-z0-9])[A-PR-WYa-pr-wy][ ]?[0-9]{7}(?![A-Za-z0-9])
confidence: medium
confidence_justification: >-
  Medium confidence: the single-letter prefix plus 7 digits is short and overlaps with many reference codes and serial
  numbers. Corroborative passport keywords within 300 characters are essential for reliable detection.
jurisdictions:
  - in
regulations:
  - "DPDP Act 2023"
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - passport number
    - passport no
    - indian passport
    - travel document
    - Ministry of External Affairs
    - file number
  proximity: 300
test_cases:
  should_match:
    - value: K1234567
      description: Standard Indian passport, letter + 7 digits
    - value: 'Passport No: M 7654321'
      description: Letter, single space, then 7 digits, labelled
    - value: B9988776
      description: Another valid letter prefix with 7 digits
  should_not_match:
    - value: Q1234567
      description: Leading 'Q' is excluded from valid Indian passport letters
    - value: K123456
      description: Only 6 digits, below the required 7
    - value: collect the indian passport from the regional passport office
      description: Prose mention of an Indian passport without an actual number
false_positives:
  - description: Reference codes and serial numbers consisting of a single letter followed by 7 digits.
    mitigation: Require corroborative passport keywords within 300 characters and validate document context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
