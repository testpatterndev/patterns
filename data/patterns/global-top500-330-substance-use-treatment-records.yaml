schema: testpattern/v1
name: Substance use treatment records
slug: global-top500-330-substance-use-treatment-records
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies substance use treatment records references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:substance\s+use|substance\s+abuse|addiction\s+treatment|opioid\s+treatment|drug\s+dependence|recovery\s+program|relapse\s+prevention)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - substance use treatment records
    - substance
    - use
    - treatment
    - records
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: substance use
      description: Primary topic phrase match
    - value: substance abuse
      description: Case-insensitive topic phrase match
    - value: addiction treatment
      description: Alternative topic phrase match
    - value: opioid treatment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_substance_use_treatment_records
      matches:
        - ref: Pattern_global_top500_330_substance_use_treatment_records_label_context
        - ref: Keyword_global_top500_330_substance_use_treatment_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_substance_use_treatment_records
      matches:
        - ref: Keyword_substance_use_treatment_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_substance_use_treatment_records
      matches:
        - ref: Keyword_substance_use_treatment_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_substance_use_treatment_records
      pattern: (?is)\b(?:substance\s+use|substance\s+abuse|addiction\s+treatment|opioid\s+treatment|drug\s+dependence|recovery\s+program|relapse\s+prevention)\b
    - id: Pattern_global_top500_330_substance_use_treatment_records_label_context
      pattern: (?i)\\b(?:substance\\s+use\\s+treatment\\s+records|substance|use|treatment|top500)\\b
  keywords:
    - id: Keyword_substance_use_treatment_records
      groups:
        - match_style: word
          terms:
            - substance use
            - substance abuse
            - addiction treatment
            - rehabilitation
            - detoxification
            - health
            - biomedical
            - opioid treatment
            - drug dependence
            - recovery program
            - counseling
            - relapse prevention
    - id: Keyword_global_top500_330_substance_use_treatment_records_domain_context
      groups:
        - match_style: word
          terms:
            - substance use treatment records
            - substance
            - use
            - treatment
