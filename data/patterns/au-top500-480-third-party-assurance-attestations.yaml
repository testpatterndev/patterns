schema: testpattern/v1
name: Third-party assurance attestations
slug: au-top500-480-third-party-assurance-attestations
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to third-party assurance attestations in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:third[\s-]+party\s+assurance|assurance\s+attestation|vendor\s+assessment|supplier\s+audit|third[\s-]+party\s+risk|SOC\s+2\s+report|external\s+audit|assurance\s+report|CPS\s+234|CPS\s+230|compliance\s+attestation|security\s+assurance)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - third-party assurance attestations
    - third
    - party
    - assurance
    - attestations
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: third-party assurance
      description: Primary topic phrase match
    - value: assurance attestation
      description: Case-insensitive topic phrase match
    - value: vendor assessment
      description: Alternative topic phrase match
    - value: supplier audit
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to third-party assurance attestations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_third_party_assurance_attestations
      matches:
        - ref: Evidence_third_party_assurance_attestations
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_third_party_assurance_attestations
      matches:
        - ref: Evidence_third_party_assurance_attestations
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_third_party_assurance_attestations
      matches:
        - ref: Evidence_third_party_assurance_attestations
  regexes:
    - id: Pattern_third_party_assurance_attestations
      pattern: >-
        (?is)\b(?:third[\s-]+party\s+assurance|assurance\s+attestation|vendor\s+assessment|supplier\s+audit|third[\s-]+party\s+risk|SOC\s+2\s+report|external\s+audit|assurance\s+report|CPS\s+234|CPS\s+230|compliance\s+attestation|security\s+assurance)\b
  keywords:
    - id: Evidence_third_party_assurance_attestations
      groups:
        - match_style: word
          terms:
            - third-party assurance
            - assurance attestation
            - vendor assessment
            - supplier audit
            - third-party risk
            - SOC 2 report
            - external audit
            - assurance report
            - CPS 234
            - CPS 230
            - compliance attestation
            - security assurance
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
