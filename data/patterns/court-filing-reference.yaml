schema: testpattern/v1
name: Court Filing Reference
slug: court-filing-reference
version: 1.4.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects court filing references from Queensland courts (Magistrates Court, District Court, Supreme Court) containing proceeding numbers, party names, and registry details. Unpublished filings contain personal details of parties, allegations, and evidence that are not yet in the public domain.
operation: 'Keyword proximity: primary keywords (court filing, proceeding number, registry, plaintiff, defendant, applicant, respondent, cause number) within 300 characters of Queensland court reference formats (MAG-NNNN-NN, DC-NNNN-NN, SC-NNNN-NN). Negative keyword exclusion for published judgments and court directories.'
pattern: (?i)\b(court\s+filing|proceeding\s+number|cause\s+number|registry\s+(?:number|reference)|(?:MAG|DC|SC)-\d{4}-\d{2,6}|(?:plaintiff|defendant|applicant|respondent)\s+(?:name|details))\b
confidence: low
confidence_justification: 'Medium confidence: requires co-occurrence of court filing terminology with Queensland court reference number formats. These formats and filing-specific terms rarely co-occur outside genuine court documents.'
jurisdictions:
  - au
regulations:
- "Criminal Code 1899 (Qld)"
- "UCPR 1999 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - SENSITIVE
    - Legal
    - court filing
    - proceeding number
    - registry
    - plaintiff
    - defendant
    - applicant
    - respondent
    - Magistrates Court
    - District Court
    - Supreme Court
    - initiating application
    - statement of claim
  proximity: 300
  keyword_lists:

    - law-enforcement

    - government-services
test_cases:
  should_match:
    - value: 'SENSITIVE Legal. Court Filing — Queensland Magistrates Court. Proceeding Number: MAG-2026-04281. Registry: Brisbane. Plaintiff: State of Queensland. Defendant: [Name]. Charge: Criminal Code s.339 — Assault of a Public Officer. First appearance: 18 March 2026. Bail application to be heard. Filed by Office of the Director of Public Prosecutions.'
      description: Magistrates Court criminal filing with proceeding number and party details
    - value: 'Supreme Court of Queensland — Initiating Application. Cause Number: SC-2025-1847. Registry: Townsville. Applicant: Director-General, Department of Child Safety. Respondent: [Name]. Application for child protection order under Child Protection Act 1999 s.59. Affidavit of caseworker attached. Matter listed for directions hearing 22 March 2026.'
      description: Supreme Court child protection filing with cause number
    - value: 'District Court of Queensland — Statement of Claim. Proceeding Number: DC-2026-0392. Registry: Cairns. Plaintiff: [Name]. Defendant: Queensland Health. Claim for damages arising from medical negligence at Cairns Hospital. Particulars of negligence: failure to diagnose appendicitis on presentation 14 August 2025. Damages claimed: $485,000.'
      description: District Court civil claim filing against Queensland Health
    - value: 'District Court of Queensland DC-2026-0392; Plaintiff M.L.; Defendant Queensland Health; statement of claim; damages $485,000.'
      description: Court identity, reference, parties, document type, and claim detail enforce
  should_not_match:
    - value: 'Published Judgment: Smith v State of Queensland [2025] QSC 184. The Supreme Court found the defendant liable for negligence. The full judgment is available on the Queensland Courts website.'
      description: Published Supreme Court judgment available on courts website
    - value: The Queensland Courts Directory lists the Brisbane Magistrates Court at 363 George Street, Brisbane QLD 4000. Registry hours are 8:30am to 4:30pm Monday to Friday.
      description: Public court directory information
    - value: The Queensland Law Society Journal published an article analysing recent District Court decisions on medical negligence claims, noting an increase in proceeding numbers filed in 2025.
      description: Legal journal article discussing court statistics
    - value: 'Published Judgment: Smith v State [2025] QSC 184.'
      description: Published judgment citation — excluded and no filing primary present
    - value: 'Law-school sample: MAG-2026-0001 plaintiff Example.'
      description: Academic/sample context is suppressed by the noise exclusion
    - value: Court filing proceeding number.
      description: Generic filing words without court identity or parties discover but must not enforce
    - value: The court registry published holiday opening hours and contact details.
      description: Public directory information with no proceeding reference or filing document
false_positives:
  - description: Published court judgments and decisions already in the public domain
    mitigation: 'Negative keyword exclusion: ''published judgment'', ''published decision'', ''available on'', ''QSC'', ''QCA'', ''QDC'' (judgment citation formats).'
  - description: Court directories, registry contact details, and public information
    mitigation: 'Negative keyword exclusion: ''directory'', ''registry hours'', ''contact details'', ''court location'''
  - description: Legal journal articles discussing court statistics and case law
    mitigation: 'Negative keyword exclusion: ''journal'', ''law society'', ''article'', ''analysing'', ''recent decisions'''
  - description: Court forms templates without party details
    mitigation: 'Require proximity to actual party names or specific proceeding numbers, not blank form fields.'
exports:
  - purview_xml
  - yaml
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_court_filing_reference_qld_court_reference_number
      matches:
        - ref: Evidence_qld_court_identity
        - ref: Evidence_qld_filing_detail
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_qld_public_court
    - confidence_level: 75
      id_match: Pattern_qld_court_filing
      matches:
        - ref: Evidence_qld_court_identity
        - ref: Evidence_qld_filing_detail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_qld_public_court
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_qld_court_filing
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_qld_public_court
  regexes:
    - id: Pattern_qld_court_filing
      pattern: (?i)\b(?:MAG-\d{4}-\d{2,6}|DC-\d{4}-\d{2,6}|SC-\d{4}-\d{2,6}|court\s+filing|proceeding\s+number|cause\s+number|initiating\s+application|originating\s+application|statement\s+of\s+claim)\b
    - id: Pattern_court_filing_reference_qld_court_reference_number
      pattern: \b(?:MAG|DC|SC)-\d{4}-\d{2,6}\b
  keywords:
    - id: Evidence_qld_court_identity
      groups:
        - match_style: word
          terms:
            - Magistrates Court
            - District Court
            - Supreme Court
            - Queensland Courts
            - registry
      strength: domain
    - id: Evidence_qld_filing_detail
      groups:
        - match_style: word
          terms:
            - plaintiff
            - defendant
            - applicant
            - respondent
            - affidavit
            - charge
            - claim
            - bail application
            - directions hearing
            - listed for hearing
      strength: domain
    - id: Filter_qld_public_court
      groups:
        - match_style: word
          terms:
            - published judgment
            - published decision
            - directory
            - registry hours
            - journal
            - law society
            - textbook
            - academic
      strength: noise
risk_rating: 7
risk_description: >-
  Despite its name, the detector targets an unpublished Queensland court filing with a proceeding number, registry, parties, claim or charge, and case-specific allegations rather than an isolated public reference number. Disclosure can expose child-protection, criminal, medical, family, or civil claims before adjudication, prejudice parties, and reveal addresses or evidence not yet in the public domain. Published judgments, court directories, legal commentary, and blank forms are excluded, so the normal unit is a substantive filing for one proceeding. Risk 7 supports SENSITIVE Legal; PROTECTED would require a suppression order, protected witness, sealed evidence, or court-restricted material with significant safety or justice consequences.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-03-06'
updated: '2026-07-16'
changelog:
  - version: 1.4.0
    date: '2026-07-16'
    description: 'sit-alignment-validation-2026-07-16 wave1 (TP-00711): normalize the legacy purview block (name:-keyed regexes, name:/words: keywords, exclude filter, single inert 65 discovery tier keyed to an unresolvable primary_keywords id) into referenced Purview ids and add enforcing tiers — the SIT was risk 7 SENSITIVE but could never enforce. New Pattern_qld_court_filing any-of primary (MAG/DC/SC-YYYY-NN references plus court filing, proceeding/cause number, initiating/originating application, statement of claim), Evidence_qld_court_identity and Evidence_qld_filing_detail keyword groups, and Filter_qld_public_court per the approved reference definitions. 75 requires the primary plus Queensland court/registry identity and one filing-detail signal; 85 keys on a MAG/DC/SC reference number and requires identity plus two distinct filing-detail signals (parties/claim/affidavit/hearing); 65 discovery retained. Template-exclusion noise dictionary attached and NOT-gated on all tiers. Adversarial test cases added; recommended_confidence raised to 85.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1506 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-13'
    description: 'Baseline burn-down follow-up: the sole pattern_tier had id_match: '''' (empty string) — idMatchIds() treats an empty id_match string as [], so scripts/verify-pattern-testcases.mjs tierEvaluable() filtered the tier out entirely (0 evaluable tiers), which routed should_not_match evaluation through the hard-fail no-tiers-to-gate-it path instead of the discovery_only warn path the tier was designed for. Wired id_match to the existing purview.keywords group id primary_keywords (already registered under the name: primary_keywords key), making the tier evaluable again; the tier remains discovery_only so a top-level hit on published-judgment/directory/journal prose would surface only as a discovery-inventory warning, not a should_not_match failure. Verified: 0 FAILs, all 3 should_not_match negatives (published judgment, court directory, legal journal article) clear; all 3 should_match positives still pass via top-level pattern.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) — no tier referenced it and the legacy tier shape carries no evidence lists to wire it into (no behavior change); remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
