schema: testpattern/v1
name: Competitive intelligence reports
slug: au-top500-191-competitive-intelligence-reports
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to competitive intelligence reports in Australian contexts. This information type is classified as personally identifiable information under the Privacy
  Act 1988.
operation: >-
  Pattern type: regex (boost_regex engine). Three-tier purview detection on the competitor-analysis anchor: high confidence (85) requires two unique competitive evidence terms with template exclusion;
  medium confidence (75) requires competitive evidence with template exclusion; low confidence (65) requires competitive evidence. Competitive positioning/landscape phrases surface at 65 discovery-only.
  The market-analysis and SWOT regexes are retained as unused inventory (referenced by no tier). Corroborative evidence: 7 keywords within 300 characters.
pattern: (?i)\b(?:competitor\s+(?:analysis|comparison)|competitive\s+(?:analysis|positioning|landscape))\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - competitive intelligence reports
    - competitive
    - intelligence
    - reports
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: 'Competitor analysis'
      description: Topic phrase present
    - value: 'competitor analysis'
      description: Topic phrase, lowercase
    - value: 'this record references the competitor analysis held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic prose without structural artifact anchors
      description: Should not match plain mentions
    - value: Our competitive landscape is changing.
      description: Generic positioning/landscape language is demoted — discovery only, must not enforce
    - value: Target market research survey results
      description: The unused market-analysis branch stays dead — must not match
    - value: SWOT training exercise using fictional competitors
      description: The unused SWOT branch stays dead and no anchor phrase is present — must not match
false_positives:
  - description: Common words and phrases related to competitive intelligence reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 4
risk_description: >-
  The concept detector recognises competitor analysis, market monitoring, benchmarking, and competitive-intelligence language, with the normal unit being an analysis assembled largely from public or commercially obtained sources. Disclosure may reveal what an organisation monitors or its interpretation of competitors, but a routine report usually causes low and reversible strategic embarrassment and contains no direct access or privileged target data. The medium-confidence regex can also match public research and generic strategy material. Risk 4 and OFFICIAL fit ordinary intelligence administration; SENSITIVE is not met without unlawfully obtained trade secrets, confidential source identities, or non-public target information that would cause serious commercial harm.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_competitor_analysis
      matches:
        - ref: Evidence_competitive
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_competitor_analysis
      matches:
        - ref: Evidence_competitive
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_competitor_analysis
      matches:
        - ref: Evidence_competitive
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_competitive_positioning_landscape
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_competitor_analysis
      pattern: (?i)\b(?:competitor\s+(?:analysis|comparison)|competitive\s+analysis)\b
    - id: Pattern_competitive_positioning_landscape
      pattern: (?i)\b(?:competitive\s+(?:positioning|landscape))\b
    - id: Pattern_market_analysis
      pattern: (?i)\b(?:market\s+(?:analysis|research|study)|(?:target|addressable)\s+market)\b
    - id: Pattern_swot
      pattern: (?i)\b(?:swot\s+analysis|strengths[\s,]+weaknesses[\s,]+opportunities[\s,]+threats)\b
  keywords:
    - id: Evidence_competitive
      groups:
        - match_style: word
          terms:
            - competitor analysis
            - competitive advantage
            - market analysis
            - benchmarking
            - Scheme of Arrangement
            - MNPI
            - Material Non-Public Information
            - Price Sensitive
            - Price Sensitive Information
            - Inside Information
      strength: specific
    - id: Evidence_confidential
      groups:
        - match_style: word
          terms:
            - confidential
            - restricted
            - internal only
            - not for distribution
            - limited distribution
            - EMBARGOED
            - DRAFT - NOT FOR CIRCULATION
            - FOR AUTHORIZED RECIPIENTS ONLY
            - FOR AUTHORISED RECIPIENTS ONLY
            - DO NOT DISTRIBUTE
            - DO NOT FORWARD
      strength: specific
    - id: Evidence_strategy
      groups:
        - match_style: word
          terms:
            - strategy
            - strategic
            - strategic plan
            - strategic initiative
            - roadmap
            - go-to-market
            - text: GTM
              case_sensitive: true
      strength: domain
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.5.0
    date: '2026-07-17'
    description: 'SIT alignment wave1 (TP-00317, reduced scope): hardened only the live Pattern_competitor_analysis branch — "competitive positioning" and "competitive landscape" demoted from the enforcing anchor to a new 65 discovery_only branch (Pattern_competitive_positioning_landscape with template-exclusion NOT gate); bare "competitor"/"competitive" dropped from Evidence_competitive so the anchor can no longer self-corroborate on a single word; stale operation text corrected to the actual 85/75/65 wiring (it described 95/market/SWOT tiers that never existed); dead market/SWOT regexes left inactive; adversarial tests added. Deliberately less than the first-pass candidate: NO named-competitor/comparison/source 75/85 enforcement (references undefined, deferred per QA); "competitor analysis" remains valid concept evidence per review.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 792 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
