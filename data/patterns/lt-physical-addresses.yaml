schema: testpattern/v1
name: Lithuania Physical Addresses
slug: lt-physical-addresses
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Lithuania Physical Addresses patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that uses machine learning and function-based detection for physical
  address identification. This keyword list provides address-related terms for supplementary matching.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  country-specific address terminology to identify physical address data.
keywords:
  - gatvė
  - prospektas
  - aikštė
  - kelias
  - alėja
  - skersgatvis
  - Vilnius
  - Kaunas
  - Klaipėda
  - pašto kodas
  - takas
  - tiltas
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on address terms requires additional context and
  corroborative evidence for accurate physical address detection. Address keywords alone
  produce high false positive rates without structural validation.
jurisdictions:
  - lt
  - eu
regulations:
  - GDPR
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 gatvė name, unit 4"
      description: Contains address keyword 'gatvė'
    - value: "located at 45 prospektas example"
      description: Contains address keyword 'prospektas'
    - value: "deliver to 78 aikštė test"
      description: Contains address keyword 'aikštė'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_lt_address_primary
      matches:
        - ref: Keyword_lt_address_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_lt_address_primary
  keywords:
    - id: Keyword_lt_address_primary
      groups:
        - match_style: word
          terms:
            - gatvė
            - prospektas
            - aikštė
            - kelias
            - alėja
            - skersgatvis
            - Vilnius
            - Kaunas
            - Klaipėda
            - pašto kodas
            - takas
            - tiltas
      strength: domain
    - id: Keyword_lt_address_context
      groups:
        - match_style: word
          terms:
            - adresas
            - gyvenamoji vieta
            - miestas
            - rajonas
            - Lietuva
            - Lithuania
            - Šiauliai
            - Panevėžys
            - Alytus
            - savivaldybė
            - seniūnija
      strength: domain
risk_rating: 3
risk_description: >-
  This Lithuanian list looks for street, avenue, and square words such as gatve, prospektas, and aikste near address-like numbers. The same terms label public spaces, roads, transport stops, institutions, and commercial premises, leaving a low-confidence match weakly connected to any individual. A valid Lithuanian contact location becomes harmful mainly when a resident, vulnerable service user, or sensitive event is also identified. Risk 3 and OFFICIAL fit; SENSITIVE would require a protected dwelling, safety-sensitive attribution, repeated location trail, or a substantial named-resident register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-lithuania-physical-addresses
    title: "Lithuania Physical Addresses entity definition - Microsoft Learn"
