schema: testpattern/v1
name: RubyGems API Key
slug: global-rubygems-api-key
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects RubyGems.org API keys (rubygems_ prefix), used to push gems. A leaked key
  lets an attacker publish or yank gems under the owner's account.
operation: 'Prefixed token format rubygems_ followed by 48 hex characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_])rubygems_[a-f0-9]{48}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the rubygems_ prefix with a fixed 48-character hexadecimal body is
  highly specific to RubyGems.org API keys.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - rubygems
    - rubygems.org
    - gem push
    - api key
    - RUBYGEMS_API_KEY
    - credentials
    - bundler
  proximity: 300
test_cases:
  should_match:
    - value: rubygems_abcdef0123456789abcdef0123456789abcdef0123456789
      description: Exact 65 probe - prefixed hexadecimal key without independent gem context
    - value: 'gem push credential rubygems_fedcba9876543210fedcba9876543210fedcba9876543210'
      description: Exact 75 probe - key with RubyGems publish context
    - value: 'RubyGems.org package publish secret RUBYGEMS_API_KEY=rubygems_0123456789abcdef0123456789abcdef0123456789abcdef'
      description: Exact 85 probe - RubyGems.org context plus canonical key assignment
  should_not_match:
    - value: rubygems_abcdef0123456789abcdef
      description: Too short to be a valid RubyGems key
    - value: rubygems_ghijkl0123456789abcdef0123456789abcdef0123456789
      description: Non-hex characters in body (g-l are not hex)
    - value: 'NPM_TOKEN=rubygems_abcdef0123456789abcdef0123456789abcdef0123456789'
      description: Sibling package-registry label does not corroborate a RubyGems key
    - value: 'Documentation example: RubyGems.org package RUBYGEMS_API_KEY=rubygems_abcdef0123456789abcdef0123456789abcdef0123456789'
      description: Documentation example containing a valid-shaped key is excluded
    - value: run gem push after setting your rubygems.org api key
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder rubygems_ strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The detector identifies a RubyGems API key by its rubygems_ prefix and fixed 48-character hexadecimal body, with nearby credential context used as corroboration. A live key can let an attacker publish malicious gem versions, yank legitimate releases, or inspect resources permitted by the key scope, creating direct account and software-supply-chain harm. The normal unit is one revocable repository credential, and documentation placeholders or deliberately masked examples can produce non-actionable matches. Risk 8 SENSITIVE reflects serious but bounded misuse of the affected RubyGems account; PROTECTED would require evidence of unusually broad package ownership, major downstream impact, or another path to significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_rubygems_api_key
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_rubygems_api_key
      matches:
        - ref: Keyword_rubygems_publish_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_rubygems_api_key
      matches:
        - ref: Keyword_rubygems_publish_context
        - ref: Pattern_rubygems_key_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_rubygems_api_key
      pattern: (?<![A-Za-z0-9_])rubygems_[a-f0-9]{48}(?![A-Za-z0-9])
    - id: Pattern_rubygems_key_assignment
      pattern: (?i)\b(?:RUBYGEMS_API_KEY|GEM_HOST_API_KEY)\s*[=:]
  keywords:
    - id: Keyword_rubygems_publish_context
      groups:
        - match_style: string
          terms:
            - RubyGems.org package
            - gem push
            - Ruby gem publish
            - RubyGems release
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
changelog:
