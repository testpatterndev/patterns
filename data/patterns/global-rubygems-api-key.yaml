schema: testpattern/v1
name: RubyGems API Key
slug: global-rubygems-api-key
version: 1.1.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects RubyGems.org API keys (rubygems_ prefix), used to push gems. A leaked key
  lets an attacker publish or yank gems under the owner's account.
operation: 'Prefixed token format rubygems_ followed by 48 hex characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_])rubygems_[a-f0-9]{48}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the rubygems_ prefix with a fixed 48-character hexadecimal body is
  highly specific to RubyGems.org API keys.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - rubygems
    - rubygems.org
    - gem push
    - api key
    - RUBYGEMS_API_KEY
    - credentials
    - bundler
  proximity: 300
test_cases:
  should_match:
    - value: rubygems_abcdef0123456789abcdef0123456789abcdef0123456789
      description: RubyGems API key, rubygems_ prefix + 48 hex chars
    - value: 'RUBYGEMS_API_KEY=rubygems_0123456789abcdef0123456789abcdef0123456789abcdef'
      description: Labelled RubyGems key in an env assignment
    - value: rubygems_fedcba9876543210fedcba9876543210fedcba9876543210
      description: Another RubyGems key body
  should_not_match:
    - value: rubygems_abcdef0123456789abcdef
      description: Too short to be a valid RubyGems key
    - value: rubygems_ghijkl0123456789abcdef0123456789abcdef0123456789
      description: Non-hex characters in body (g-l are not hex)
    - value: run gem push after setting your rubygems.org api key
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder rubygems_ strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The detector identifies a RubyGems API key by its rubygems_ prefix and fixed 48-character hexadecimal body, with nearby credential context used as corroboration. A live key can let an attacker publish malicious gem versions, yank legitimate releases, or inspect resources permitted by the key scope, creating direct account and software-supply-chain harm. The normal unit is one revocable repository credential, and documentation placeholders or deliberately masked examples can produce non-actionable matches. Risk 8 SENSITIVE reflects serious but bounded misuse of the affected RubyGems account; PROTECTED would require evidence of unusually broad package ownership, major downstream impact, or another path to significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
