schema: testpattern/v1
name: Know-your-customer profiles
slug: global-top500-131-know-your-customer-profiles
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to know-your-customer profiles in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 500 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:know\s+your\s+customer|customer\s+due\s+diligence|identity\s+verification|beneficial\s+owner|customer\s+risk\s+rating|enhanced\s+due\s+diligence|politically\s+exposed\s+person|source\s+of\s+funds)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - know-your-customer profiles
    - know
    - your
    - customer
    - profiles
    - credit
    - lending
    - insurance
  proximity: 500
  keyword_lists:
    - corporate-finance
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: know your customer
      description: Primary topic phrase match
    - value: customer due diligence
      description: Case-insensitive topic phrase match
    - value: identity verification
      description: Alternative topic phrase match
    - value: beneficial owner
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 500
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_kyc
      matches:
        - ref: Pattern_global_top500_131_know_your_customer_profiles_label_context
        - ref: Keyword_global_top500_131_know_your_customer_profiles_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_kyc
      matches:
        - ref: Keyword_kyc
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_kyc
      pattern: >-
        (?is)\b(?:know\s+your\s+customer|customer\s+due\s+diligence|identity\s+verification|beneficial\s+owner|customer\s+risk\s+rating|enhanced\s+due\s+diligence|politically\s+exposed\s+person|source\s+of\s+funds)\b
    - id: Pattern_global_top500_131_know_your_customer_profiles_label_context
      pattern: (?i)\b(?:know\-your\-customer\s+profiles)\b
  keywords:
    - id: Keyword_kyc
      groups:
        - match_style: word
          terms:
            - know your customer
            - text: KYC
              case_sensitive: true
            - customer due diligence
            - text: CDD
              case_sensitive: true
            - identity verification
            - beneficial owner
            - customer risk rating
            - enhanced due diligence
            - text: EDD
              case_sensitive: true
            - politically exposed person
            - text: PEP
              case_sensitive: true
            - source of funds
      strength: specific
    - id: Keyword_global_top500_131_know_your_customer_profiles_domain_context
      groups:
        - match_style: word
          terms:
            - know-your-customer profiles
            - know
            - your
            - customer
            - profiles
      strength: domain
risk_description: >-
  The medium-confidence concept regex recognises know your customer, customer due diligence, identity verification, beneficial owner, customer risk rating, enhanced due diligence, politically exposed person, and source of funds, using eight corroborators across a 500-character window. Those terms appear in procedures and regulatory guidance, but a populated profile links a customer to identity evidence, ownership, verification results, funds provenance, or a risk outcome. Disclosure of the linked profile can enable identity fraud, expose private financial relationships, or help that customer tailor information to evade onboarding controls; the normal scale is one customer unless records are aggregated. Risk 7 and SENSITIVE Financial are maintained for the corroborated profile, whereas PROTECTED requires a bulk KYC repository, protected-source intelligence, or significant institutional compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
