schema: testpattern/v1
name: Database connection strings with credentials
slug: global-top500-277-database-connection-strings-with-credentials
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies database connection strings with credentials patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:connection\s+string|database\s+credentials|sql\s+server|data\s+source|integrated\s+security|trusted\s+connection)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - database connection strings with credentials
    - database
    - connection
    - strings
    - credentials
    - keys
    - secrets
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: connection string
      description: Primary topic phrase match
    - value: database credentials
      description: Case-insensitive topic phrase match
    - value: sql server
      description: Alternative topic phrase match
    - value: data source
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: secret mfa
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_db_connection_strings
      matches:
        - ref: Pattern_global_top500_277_database_connection_strings_with_credentials_label_context
        - ref: Keyword_global_top500_277_database_connection_strings_with_credentials_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_db_connection_strings
      matches:
        - ref: Keyword_db_connection_strings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_db_connection_strings
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_db_connection_strings
      pattern: (?is)\b(?:connection\s+string|database\s+credentials|sql\s+server|data\s+source|integrated\s+security|trusted\s+connection)\b
    - id: Pattern_global_top500_277_database_connection_strings_with_credentials_label_context
      pattern: (?i)\b(?:database\s+connection\s+strings\s+with\s+credentials)\b
  keywords:
    - id: Keyword_db_connection_strings
      groups:
        - match_style: word
          terms:
            - connection string
            - database credentials
            - jdbc
            - odbc
            - sql server
            - mysql
            - postgresql
            - mongodb
            - data source
            - integrated security
            - trusted connection
            - server=
      strength: domain
    - id: Keyword_global_top500_277_database_connection_strings_with_credentials_domain_context
      groups:
        - match_style: word
          terms:
            - database connection strings with credentials
            - connection
            - strings
            - credentials
      strength: domain
risk_description: >-
  The detector matches connection string, database credentials, SQL Server, or data source language, indicating database-access configuration broadly rather than parsing a structured username and password pair. A genuine credential-bearing string can enable direct database access, data extraction, modification, or service disruption within the account permissions. Configuration guidance, integrated-authentication examples, and strings without secrets can match, while one connection normally targets a bounded database and may use a low-privilege identity. Risk 8 SENSITIVE reflects serious contained harm from a valid credential-bearing string; PROTECTED would require privileged access to a major or critical holding with significant consequences.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
