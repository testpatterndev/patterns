schema: testpattern/v1
name: IaC Secrets in Terraform and Azure CSCfg
slug: snaffler-iac-secrets
version: 1.1.2
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects secrets embedded in Infrastructure as Code files including Terraform/HCL
  variable assignments and Azure Cloud Service configuration (.cscfg) XML settings.
  Mirrors Snaffler rule KeepInfraAsCodeByExtension.
operation: >-
  A quoted HCL secret assignment is discovery-only at 65, reaches 75 inside a
  concrete Terraform/HCL block, and reaches 85 when that block is a provider
  configuration. An Azure cscfg secret setting reaches 75 inside
  <ServiceConfiguration> and 85 inside a bound <Role>. Documentation, templates,
  masked values, variable interpolation, and common placeholder values are excluded.
risk_description: >-
  IaC Secrets in Terraform and Azure CSCfg detects quoted values assigned to password, token, API-key, access-key, or secret-bearing configuration names. A true match can expose cloud, database, storage, or application access and may permit data theft, resource abuse, configuration change, or lateral movement. Consequence is serious but depends on whether the value is live and on its granted permissions, while tutorials and placeholders remain plausible matches. Risk 8 and SENSITIVE InfoTech fit; PROTECTED would require broad cloud administration, critical infrastructure control, or significant system-scale compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: (?i)(?:password|secret|access_key|api_key|token)\s*=\s*"[^"]{6,256}"
confidence: high
confidence_justification: >-
  High confidence: the combination of secret-bearing key names and non-empty quoted
  values in IaC contexts is highly specific to credential assignments. Non-secret
  HCL assignments (region, version, count) do not match because their key names
  are not in the keyword list.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - terraform
    - provider
    - variable
    - <ServiceConfiguration
    - <Role
  proximity: 300
test_cases:
  should_match:
    - value: 'db_password = "Sup3rS3cret!"'
      description: Exact 65 probe - secret-bearing assignment without independent IaC document context
    - value: "resource \"aws_db_instance\" \"orders\" {\n  identifier = \"orders-prod\"\n  password = \"N7v!m2P9x4R8s6T3\"\n}"
      description: Exact 75 probe - populated secret assignment inside a normal HCL resource block
    - value: "provider \"azurerm\" {\n  subscription_id = \"c8f12a4e-96b1-4eb0-b92a-f1025c913bd7\"\n  client_id       = \"0e33e4f8-e6db-4a75-93cc-265d9b68c211\"\n  client_secret   = \"Q7v!m2P9x4R8s6T3\"\n  tenant_id       = \"218a4f19-4e9c-4c58-8364-a72b11eca134\"\n  features {}\n}"
      description: Exact 85 probe - real provider block plus populated secret assignment
    - value: '<ServiceConfiguration><Setting name="StorageKey" value="abc123def456ghi789jkl012" /></ServiceConfiguration>'
      description: Exact 75 probe - Azure cscfg assignment with service-configuration structure
    - value: '<ServiceConfiguration><Role name="Web"><Setting name="ApiToken" value="abc123def456ghi789jkl012" /></Role></ServiceConfiguration>'
      description: Exact 85 probe - Azure cscfg assignment with an independent role binding
  should_not_match:
    - value: 'region = "ap-southeast-2"'
      description: Non-secret HCL assignment, key name not in keyword list
    - value: '<Setting name="MaxRetries" value="3" />'
      description: Non-secret cscfg setting with value under 6 chars
    - value: 'token_type = "Bearer"'
      description: Generic non-secret token metadata remains below enforcement tiers
    - value: 'api_key = "********"'
      description: Masked assignment is excluded from all tiers
    - value: "provider \"aws\" {\n  access_key = \"placeholder\"\n  region = \"ap-southeast-2\"\n}"
      description: Provider block with a common placeholder value is excluded
    - value: "provider \"aws\" {\n  secret = \"${var.aws_secret}\"\n  region = \"ap-southeast-2\"\n}"
      description: Provider block with variable interpolation rather than an embedded secret is excluded
    - value: "Documentation example:\nprovider \"aws\" {\n  api_key = \"n4Y8p2V7c6D3r9T5\"\n  region = \"ap-southeast-2\"\n}"
      description: Documentation example with otherwise high-tier provider structure is excluded
false_positives:
  - description: Terraform example or tutorial files showing variable assignment syntax with illustrative but non-sensitive values using the target key names.
    mitigation: Require proximity to IaC-specific keywords (terraform, provider, ServiceConfiguration) to confirm IaC file context. Template exclusion catches example/placeholder markers.
  - description: Application configuration files that use password or token as part of a larger non-credential key name such as password_policy or token_expiry.
    mitigation: The regex anchors on the full key name followed immediately by = and a quoted value, limiting spurious matches from compound key names.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_iac_secrets_hcl
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_snaffler_iac_placeholder_value
    - confidence_level: 75
      id_match: Regex_snaffler_iac_secrets_hcl
      matches:
        - ref: Pattern_snaffler_iac_hcl_structure
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_snaffler_iac_placeholder_value
    - confidence_level: 85
      id_match: Regex_snaffler_iac_secrets_hcl
      matches:
        - ref: Pattern_snaffler_iac_hcl_structure
        - ref: Pattern_snaffler_iac_provider_block
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_snaffler_iac_placeholder_value
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_iac_secrets_cscfg
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_snaffler_iac_placeholder_value
    - confidence_level: 75
      id_match: Regex_snaffler_iac_secrets_cscfg
      matches:
        - ref: Pattern_snaffler_iac_cscfg_structure
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_snaffler_iac_placeholder_value
    - confidence_level: 85
      id_match: Regex_snaffler_iac_secrets_cscfg
      matches:
        - ref: Pattern_snaffler_iac_cscfg_structure
        - ref: Pattern_snaffler_iac_role_binding
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Pattern_snaffler_iac_placeholder_value
  regexes:
    - id: Regex_snaffler_iac_secrets_hcl
      pattern: (?i)(?:password|secret|access_key|api_key|token)\s*=\s*"[^"]{6,256}"
    - id: Regex_snaffler_iac_secrets_cscfg
      pattern: (?i)<Setting\s+name="[^"]{0,64}(?:password|key|secret|token|credential|conn)[^"]{0,64}"\s+value="[^"]{6,256}"
    - id: Pattern_snaffler_iac_hcl_structure
      pattern: (?i)\b(?:terraform|provider|resource|data|module|variable|locals|output)\b[^\r\n{]{0,160}\{
    - id: Pattern_snaffler_iac_provider_block
      pattern: (?i)\bprovider\s+"[^"\r\n]{1,128}"\s*\{
    - id: Pattern_snaffler_iac_cscfg_structure
      pattern: (?i)<ServiceConfiguration\b
    - id: Pattern_snaffler_iac_role_binding
      pattern: (?i)<Role\b
    - id: Pattern_snaffler_iac_placeholder_value
      pattern: (?i)(?:password|secret|access_key|api_key|token)\s*=\s*"(?:\*{3,}|x{4,}|placeholder|changeme|redacted|example[A-Za-z0-9_-]*|\$\{[^"}]+\})"|<Setting[^>]+value="(?:\*{3,}|x{4,}|placeholder|changeme|redacted|example[A-Za-z0-9_-]*)"
created: '2026-06-26'
updated: '2026-07-19'
changelog:
  - version: 1.1.2
    date: '2026-07-19'
    description: 'Replace prose/file-extension evidence with concrete HCL and cscfg structure: secret assignments are discovery-only at 65, normal HCL or ServiceConfiguration documents reach 75, and provider or role bindings reach 85; add realistic exact-tier positives plus documentation, interpolation, masked, and placeholder negatives.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2052 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.0.1
    date: '2026-06-26'
    note: >-
      Broadened cscfg Setting name group to include token, credential, and conn
      alongside password, key, secret. Snaffler fidelity fix.
