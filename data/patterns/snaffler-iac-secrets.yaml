schema: testpattern/v1
name: IaC Secrets in Terraform and Azure CSCfg
slug: snaffler-iac-secrets
version: 1.1.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects secrets embedded in Infrastructure as Code files including Terraform/HCL
  variable assignments and Azure Cloud Service configuration (.cscfg) XML settings.
  Mirrors Snaffler rule KeepInfraAsCodeByExtension.
operation: >-
  Two regexes: (1) matches HCL/tfvars assignments where the key name contains
  password, secret, access_key, api_key, or token and the value is a quoted string
  of 6-256 chars; (2) matches Azure cscfg <Setting> elements where the name attribute
  contains a secret-bearing keyword and the value is 6-256 chars.
risk_description: >-
  IaC Secrets in Terraform and Azure CSCfg detects quoted values assigned to password, token, API-key, access-key, or secret-bearing configuration names. A true match can expose cloud, database, storage, or application access and may permit data theft, resource abuse, configuration change, or lateral movement. Consequence is serious but depends on whether the value is live and on its granted permissions, while tutorials and placeholders remain plausible matches. Risk 8 and SENSITIVE InfoTech fit; PROTECTED would require broad cloud administration, critical infrastructure control, or significant system-scale compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: (?i)(?:password|secret|access_key|api_key|token)\s*=\s*"[^"]{6,256}"
confidence: high
confidence_justification: >-
  High confidence: the combination of secret-bearing key names and non-empty quoted
  values in IaC contexts is highly specific to credential assignments. Non-secret
  HCL assignments (region, version, count) do not match because their key names
  are not in the keyword list.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - terraform
    - provider
    - variable
    - <ServiceConfiguration
    - <Role
  proximity: 300
test_cases:
  should_match:
    - value: 'db_password = "Sup3rS3cret!"'
      description: HCL tfvars password assignment
    - value: 'api_key = "exampleApiKeyPlaceholder123"'
      description: HCL API key assignment
    - value: '<Setting name="StorageKey" value="abc123def456ghi789jkl012" />'
      description: Azure cscfg secret setting
    - value: '<Setting name="ApiToken" value="abc123def456ghi789jkl012" />'
      description: Azure cscfg setting with token in name (Snaffler parity)
  should_not_match:
    - value: 'region = "ap-southeast-2"'
      description: Non-secret HCL assignment, key name not in keyword list
    - value: '<Setting name="MaxRetries" value="3" />'
      description: Non-secret cscfg setting with value under 6 chars
false_positives:
  - description: Terraform example or tutorial files showing variable assignment syntax with illustrative but non-sensitive values using the target key names.
    mitigation: Require proximity to IaC-specific keywords (terraform, provider, ServiceConfiguration) to confirm IaC file context. Template exclusion catches example/placeholder markers.
  - description: Application configuration files that use password or token as part of a larger non-credential key name such as password_policy or token_expiry.
    mitigation: The regex anchors on the full key name followed immediately by = and a quoted value, limiting spurious matches from compound key names.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Regex_snaffler_iac_secrets_hcl
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_iac_secrets_hcl
      matches:
        - ref: Keyword_snaffler_iac_secrets_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_iac_secrets_hcl
      matches:
        - ref: Keyword_snaffler_iac_secrets_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_iac_secrets_cscfg
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_iac_secrets_cscfg
      matches:
        - ref: Keyword_snaffler_iac_secrets_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_iac_secrets_cscfg
      matches:
        - ref: Keyword_snaffler_iac_secrets_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_iac_secrets_hcl
      pattern: (?i)(?:password|secret|access_key|api_key|token)\s*=\s*"[^"]{6,256}"
    - id: Regex_snaffler_iac_secrets_cscfg
      pattern: (?i)<Setting\s+name="[^"]{0,64}(?:password|key|secret|token|credential|conn)[^"]{0,64}"\s+value="[^"]{6,256}"
  keywords:
    - id: Keyword_snaffler_iac_secrets_evidence
      groups:
        - match_style: string
          terms:
            - terraform
            - provider
            - variable
            - <ServiceConfiguration
            - <Role
