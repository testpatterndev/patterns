schema: testpattern/v1
name: Algorithmic impact assessments
slug: au-top500-479-algorithmic-impact-assessments
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to algorithmic impact assessments in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:algorithmic\s+impact|impact\s+assessment|algorithmic\s+bias|automated\s+decision|AI\s+governance|algorithm\s+audit|fairness\s+assessment|transparency\s+report|privacy\s+impact|data\s+protection\s+impact|risk\s+assessment|compliance\s+review)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - algorithmic impact assessments
    - algorithmic
    - impact
    - assessments
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: algorithmic impact
      description: Primary topic phrase match
    - value: impact assessment
      description: Case-insensitive topic phrase match
    - value: algorithmic bias
      description: Alternative topic phrase match
    - value: automated decision
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to algorithmic impact assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_algorithmic_impact_assessments
      matches:
        - ref: Evidence_algorithmic_impact_assessments
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_algorithmic_impact_assessments
      matches:
        - ref: Evidence_algorithmic_impact_assessments
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_algorithmic_impact_assessments
      matches:
        - ref: Evidence_algorithmic_impact_assessments
  regexes:
    - id: Pattern_algorithmic_impact_assessments
      pattern: (?is)\b(?:algorithmic\s+impact|impact\s+assessment|algorithmic\s+bias|automated\s+decision|AI\s+governance|algorithm\s+audit|fairness\s+assessment|transparency\s+report|privacy\s+impact|data\s+protection\s+impact|risk\s+assessment|compliance\s+review)\b
  keywords:
    - id: Evidence_algorithmic_impact_assessments
      groups:
        - match_style: word
          terms:
            - algorithmic impact
            - impact assessment
            - algorithmic bias
            - automated decision
            - AI governance
            - algorithm audit
            - fairness assessment
            - transparency report
            - privacy impact
            - data protection impact
            - risk assessment
            - compliance review
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/privacy-guidance-for-organisations-and-government-agencies/privacy-impact-assessments
  - https://www.dta.gov.au/
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines
