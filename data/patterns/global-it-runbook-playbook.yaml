schema: testpattern/v1
name: IT Runbook/Playbook
slug: global-it-runbook-playbook
version: 1.5.0
type: regex
pattern_class: concept
description: Detects IT runbooks and operational playbooks containing procedures, credentials, and escalation paths.
operation: >-
  A runbook, playbook, SOP, or work-instruction title is discovery-only at 65. Procedure sections such
  as prerequisites, verification, troubleshooting, escalation, or rollback raise it to 75. The 85 tier
  additionally requires an IT infrastructure, privileged-access, backup, or configuration subject.
  Enforcing tiers reject explicit templates and examples.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - global
regulations:
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
  - technology
  - security
test_cases:
  should_match:
    - value: 'Operational runbook'
      description: Low-tier probe - title without substantive procedure content
    - value: 'Operational runbook: prerequisites, procedure steps, and verification steps.'
      description: Medium-tier probe - substantive procedure sections without an IT asset subject
    - value: 'IT runbook: database service account prerequisites, procedure steps, and rollback procedure.'
      description: High-tier probe - procedure sections plus infrastructure and privileged-access context
  should_not_match:
    - value: Sports playbook strategy
      description: Sports-domain sibling
    - value: Run the book club meeting
      description: Lexical near-match without a runbook title
    - value: 'The public catalogue lists an operational runbook available for download.'
      description: Public listing contains only a title and must remain discovery-only
    - value: 'Template example: IT runbook for a database service account with prerequisites, procedure steps, and rollback procedure.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Sports playbook or book club references.
    mitigation: Require IT-specific terms like SOP, escalation, or incident procedure.
exports:
  - yaml
scope: narrow
risk_rating: 4
risk_description: >-
  This pattern identifies IT runbooks and playbooks through procedure, troubleshooting, rollback, infrastructure, and escalation language. A matched document may disclose useful workflow detail, but the detector does not require live credentials, privileged commands, sensitive addresses, or an incident-specific target. Harm is usually limited to an operations team and depends on additional security content before the procedure becomes directly exploitable. Risk 4 OFFICIAL reflects general operational guidance; SENSITIVE requires embedded secrets, privileged system commands, exploitable configuration, or sensitive incident-response procedures.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_runbook_playbook
      matches:
        - ref: Keyword_runbook_sections
        - ref: Keyword_it_infrastructure
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_runbook_playbook
      matches:
        - ref: Keyword_runbook_sections
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_runbook_playbook
  regexes:
    - id: Regex_runbook_playbook
      pattern: >-
        (?i)\b(?:(?:operational\s+)?runbook|(?:incident\s+)?playbook|standard\s+operating\s+procedure|sop\s+(?:document|manual)|work\s+instruction)\b
  keywords:
    - id: Keyword_runbook_sections
      groups:
        - match_style: word
          terms:
            - prerequisites
            - procedure steps
            - troubleshooting
            - escalation procedure
            - rollback procedure
            - verification steps
            - expected output
            - contact information
      strength: specific
    - id: Keyword_it_infrastructure
      groups:
        - match_style: word
          terms:
            - server
            - database
            - application
            - service account
            - privileged access
            - backup schedule
            - retention
            - configuration
      strength: domain
    - id: Keyword_it_operations
      groups:
        - match_style: word
          terms:
            - IT operations
            - infrastructure
            - system administration
            - change management
            - incident management
            - problem management
            - ITIL
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.5.0
    date: '2026-07-19'
    description: 'Profile quality: align the regex-backed detector type; add title discovery, procedure-section medium, and infrastructure-corroborated high tiers; add public/template adversarial probes.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 552 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary; remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.; Aligned recommended_confidence to 75.
author: testpattern-community
license: MIT
keywords:
  - runbook
  - response playbook
  - playbook procedure
  - operational procedure
  - standard operating procedure
  - SOP
  - escalation path
  - escalation matrix
  - on-call
  - incident procedure
  - troubleshooting guide
  - runbook automation
  - operational playbook
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
      - 'Aligned recommended_confidence to 75.'
