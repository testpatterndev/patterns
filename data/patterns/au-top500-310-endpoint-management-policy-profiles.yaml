schema: testpattern/v1
name: Endpoint management policy profiles
slug: au-top500-310-endpoint-management-policy-profiles
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies endpoint management policy profiles patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:endpoint\s+management|policy\s+profile|mobile\s+device\s+management|device\s+compliance|configuration\s+profile|group\s+policy|endpoint\s+protection|device\s+enrollment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - endpoint management policy profiles
    - endpoint
    - management
    - policy
    - profiles
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: endpoint management
      description: Primary topic phrase match
    - value: policy profile
      description: Case-insensitive topic phrase match
    - value: mobile device management
      description: Alternative topic phrase match
    - value: device compliance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  This concept classifier finds endpoint-management, MDM, policy-profile, device-compliance, configuration-profile, group-policy, protection, and enrollment language rather than an access credential. A genuine profile can reveal enforced settings, exclusions, control baselines, and deployment scope, allowing an attacker to tune payloads or select unmanaged gaps. The affected scale is the device group receiving the profile, and exploitation still requires access to an endpoint or management channel. Risk 8 and SENSITIVE reflect serious contained control exposure, while a critical-fleet profile containing an immediately actionable bypass would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_endpoint_management
      matches:
        - ref: Evidence_endpoint_management
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_endpoint_management
      matches:
        - ref: Evidence_endpoint_management
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_endpoint_management
      matches:
        - ref: Evidence_endpoint_management
  regexes:
    - id: Pattern_endpoint_management
      pattern: (?is)\b(?:endpoint\s+management|policy\s+profile|mobile\s+device\s+management|device\s+compliance|configuration\s+profile|group\s+policy|endpoint\s+protection|device\s+enrollment)\b
  keywords:
    - id: Evidence_endpoint_management
      groups:
        - match_style: word
          terms:
            - endpoint management
            - policy profile
            - text: MDM
              case_sensitive: true
            - mobile device management
            - Intune
            - SCCM
            - device compliance
            - configuration profile
            - group policy
            - text: GPO
              case_sensitive: true
            - endpoint protection
            - device enrollment
      strength: specific
