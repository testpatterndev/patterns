schema: testpattern/v1
name: Grant Assessment Scoring Matrix
slug: grant-assessment-scoring-matrix
version: 1.3.2
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects internal scoring sheets, panellist rankings, weighted criteria assessments, and funding recommendations for competitive government grant programs before public announcement.
operation: 'Keyword proximity: assessment/scoring terms within 300 characters of grant/funding terms and score/rank indicators. Boosted by PROTECTED markers or probity context. Detects tabular scoring patterns with applicant names near numerical scores.'
pattern: \b\d{1,3}\.\d{1,2}\s*/\s*\d{1,3}\b|\b\d{1,3}\s*/\s*\d{1,3}\b
confidence: medium
confidence_justification: 'Medium confidence: the combination of grant assessment terminology with scoring patterns and probity markers is highly specific to pre-announcement evaluation documents.'
jurisdictions:
  - au
regulations:
- "Financial Accountability Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - assessment
    - scoring
    - evaluation
    - panel
    - grant
    - funding
    - program
    - score
    - rank
    - weighting
    - recommendation
    - shortlist
    - probity
    - merit-based
  proximity: 300
  keyword_lists:

    - corporate-finance

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED - Grant Assessment Scoring Matrix. Program: Regional Infrastructure Fund Round 3. Panel scoring: Applicant A - Criteria 1: 8/10, Criteria 2: 7/10. Weighted total: 82.5. Recommendation: Fund. Probity note: not for distribution outside assessment panel.'
      description: Grant scoring matrix with applicant scores and recommendations
    - value: 'Evaluation Panel Summary — Community Grants 2026. Assessment weighting: Financial viability 30%, Project merit 40%, Community benefit 30%. Top-ranked application scored 86.5/100. Shortlist recommendation: 12 of 47 applications recommended for funding. Total funding recommended: $4.2M. PROTECTED.'
      description: Grant evaluation summary with weighted criteria and shortlist
    - value: 'Assessment panel scoring: Applicant B - Criteria 1: 9/10, Criteria 2: 6/10. Weighted total 78. Recommendation: shortlist for funding. Probity: panel members only.'
      description: Panel scoring sheet with per-criteria scores and probity marker
  should_not_match:
    - value: Grant Program Guidelines 2026 — Applications are assessed against merit-based criteria including financial viability and project outcomes. Published by the Department.
      description: Published grant guidelines — public document describing process
    - value: 'Media Release: the Minister announced regional grants for several community organisations. Successful applicants include the Townsville Community Centre and Cairns Youth Services.'
      description: Post-announcement media release with grant outcomes, no scoring or dollar figures
false_positives:
  - description: Published grant guidelines describing assessment criteria
    mitigation: Exclude documents containing 'guidelines', 'how to apply', 'published', 'media release' without scoring data
  - description: Post-announcement grant outcome reports
    mitigation: Exclude documents containing 'announced', 'successful applicants', 'congratulations' indicating public release
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_grant_assessment_scoring_matrix_score_format_e_g_8_10_82_5_100
      matches:
        - ref: Evidence_grant_assessment_scoring_matrix_primary
        - ref: Evidence_grant_assessment_scoring_matrix_context
        - ref: Evidence_grant_assessment_scoring_matrix_indicators
        - ref: Evidence_grant_assessment_scoring_matrix_markers
        - ref: Pattern_grant_assessment_scoring_matrix_dollar_amounts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_grant_assessment_scoring_matrix_exclusion
    - confidence_level: 75
      id_match: Pattern_grant_assessment_scoring_matrix_score_format_e_g_8_10_82_5_100
      matches:
        - ref: Evidence_grant_assessment_scoring_matrix_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_grant_assessment_scoring_matrix_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_grant_assessment_scoring_matrix_score_format_e_g_8_10_82_5_100
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_grant_assessment_scoring_matrix_exclusion
  regexes:
    - id: Pattern_grant_assessment_scoring_matrix_score_format_e_g_8_10_82_5_100
      pattern: \b\d{1,3}\.\d{1,2}\s*/\s*\d{1,3}\b|\b\d{1,3}\s*/\s*\d{1,3}\b
    - id: Pattern_grant_assessment_scoring_matrix_dollar_amounts
      pattern: \$[\d,.]+\s*[MBKmb]?
  keywords:
    - id: Evidence_grant_assessment_scoring_matrix_primary
      groups:
        - match_style: word
          terms:
            - assessment
            - scoring
            - evaluation
            - panel
            - scoring matrix
            - assessment panel
      strength: domain
    - id: Evidence_grant_assessment_scoring_matrix_context
      groups:
        - match_style: word
          terms:
            - grant
            - funding
            - program
            - round
            - competitive
      strength: domain
    - id: Evidence_grant_assessment_scoring_matrix_indicators
      groups:
        - match_style: word
          terms:
            - score
            - rank
            - weighting
            - recommendation
            - shortlist
            - merit-based
            - probity
      strength: domain
    - id: Evidence_grant_assessment_scoring_matrix_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - not for distribution
            - confidential
            - panel members only
      strength: domain
    - id: Filter_grant_assessment_scoring_matrix_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - guidelines
            - how to apply
            - published
            - media release
            - announced
            - successful applicants

      strength: noise
risk_rating: 8
risk_description: >-
  The detector targets a pre-decision grant scoring matrix by locating assessment and funding terms near scores, ranks, applicant names, and probity or restricted context. Disclosure can reveal comparative applicant performance, panel judgements, and likely funding outcomes, enabling lobbying, collusion, challenge preparation, or unfair commercial advantage before announcement. The normal unit is a composite assessment sheet affecting a defined grant round rather than a single score, while published criteria and post-announcement outcomes are benign lookalikes. Risk 8 SENSITIVE reflects serious but programme-bounded fairness and financial harm; PROTECTED would require exceptional scale, protected deliberation, or significant government damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
references: []
