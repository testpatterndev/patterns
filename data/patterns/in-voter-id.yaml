schema: testpattern/v1
name: Electoral Photo Identity Card (EPIC)
slug: in-voter-id
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Electoral Photo Identity Card (EPIC) patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the
  built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-india-voter-id-card Corroborative evidence: 4 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[A-Z]{3}\d{7}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - in
regulations:
  - DPDPA
  - IT Act 2000 (India)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - voter ID
    - EPIC
    - electoral
    - election commission
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: ABC1234567
      description: Indian voter ID format
    - value: XYZ9876543
      description: Another voter ID format
    - value: MNO4567890
      description: Valid voter ID number
  should_not_match:
    - value: AB1234567
      description: Only two letters
    - value: ABCD123456
      description: Four letters instead of three
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Three uppercase letters followed by seven digits may match airline booking references, product codes, or tracking numbers.
    mitigation: Require corroborative evidence keywords such as "voter ID", "EPIC", or "election commission" within the proximity window.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_in_voter_id
      matches:
        - ref: Pattern_in_voter_id_label_context
        - ref: Keyword_in_voter_id_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_in_voter_id
      matches:
        - ref: Keyword_in_voter_id
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_in_voter_id
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_in_voter_id
      pattern: \b[A-Z]{3}\d{7}\b
    - id: Pattern_in_voter_id_label_context
      pattern: (?i)\b(?:electoral\s+photo\s+identity\s+card\s+\(epic\)|electoral|photo|identity|card|epic|voter)\b
  keywords:
    - id: Keyword_in_voter_id
      groups:
        - match_style: word
          terms:
            - voter ID
            - voter ID card
            - EPIC
            - EPIC number
            - electoral
            - election commission
            - Election Commission of India
            - मतदाता पहचान पत्र
            - निर्वाचन आयोग
            - voter registration
            - electoral roll
            - voter card
      strength: specific
    - id: Keyword_in_voter_id_domain_context
      groups:
        - match_style: word
          terms:
            - electoral photo identity card (epic)
            - electoral
            - photo
            - identity
            - card
            - epic
            - voter
      strength: domain
risk_rating: 5
risk_description: >-
  The EPIC detector recognises three uppercase letters followed by seven digits with Indian voter and civic context plus template exclusions. A genuine voter-card number can link an elector to an identity document and electoral record and may assist impersonation when paired with a name, address, or card image. Airline, product, tracking, and other reference codes can share the same alphanumeric form, and the match does not establish voter status details, ownership, or document validity. Risk 5 OFFICIAL reflects bounded identity-correlation harm; SENSITIVE would require a verified voter record, card copy, or linked residential information.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-india-voter-id-card
    title: India Voter Id Card entity definition - Microsoft Learn
