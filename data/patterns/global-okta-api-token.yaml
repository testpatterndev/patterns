schema: testpattern/v1
name: Okta API Token
slug: global-okta-api-token
version: 1.2.1
type: regex
pattern_class: identifier
engine: universal
description: Detects Okta API-token candidates, which begin with 00 and are followed by 40 base64url characters. Okta or SSWS
  context is required for enforcement because the 42-character shape can represent unrelated identifiers; the bare value shape
  surfaces only as discovery inventory. A leaked token grants Okta admin API access.
operation: 'Token format 00 followed by exactly 40 base64url characters ([A-Za-z0-9_-]). Structured tiers: 75 requires Okta/SSWS
  context within 300 characters; 65 exposes the bare value shape as discovery-only. Shared template-exclusion NOT-gate suppresses
  tutorial/documentation samples.'
pattern: (?<![A-Za-z0-9_-])00[A-Za-z0-9_-]{40}(?![A-Za-z0-9_-])
confidence: medium
confidence_justification: 'Medium confidence: the 00 prefix plus 40 base64url chars is not highly distinctive and can collide
  with other 42-char identifiers, so Okta corroborative keywords are required for reliable detection.'
jurisdictions:
- global
regulations:
- Criminal Code Act 1995 (Cth)
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - okta
  - okta.com
  - SSWS
  - api token
  - api_token
  - OKTA_API_TOKEN
  - authorization
  proximity: 300
test_cases:
  should_match:
  - value: 'Authorization: SSWS 00ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmn'
    description: Okta API token with SSWS scheme, 00 prefix + 40 chars
  - value: OKTA_API_TOKEN=001234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcd
    description: Labelled Okta token in an env assignment
  - value: 00zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIhH_-
    description: Okta token with - and _ in the body
  should_not_match:
  - value: 00aBcDeFgHiJkLmNoPqRsTuVwXyZ012345
    description: Too short to be a valid Okta token (under 40 body chars)
  - value: 11ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmn
    description: Wrong prefix (11 instead of 00)
  - value: configure the okta api token in your SSWS authorization header
    description: Prose mention without a token value
  - value: x00ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmn_
    description: Leading and trailing base64url characters make the candidate part of a longer identifier - both lookaround
      boundaries must prevent substring extraction
false_positives:
- description: Other 42-character identifiers that happen to start with 00 (e.g. some hashes or IDs).
  mitigation: Require corroborative Okta keywords (okta, SSWS) within proximity before alerting.
- description: Documentation or examples showing placeholder 00... strings.
  mitigation: Check for placeholder markers (example, xxxx) and require Okta context.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_okta_api_token
    matches:
    - ref: Keyword_okta_token_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
    min_count: 2
  - confidence_level: 75
    id_match: Regex_okta_api_token
    matches:
    - ref: Keyword_okta_token_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_okta_api_token
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_okta_api_token
    pattern: (?<![A-Za-z0-9_-])00[A-Za-z0-9_-]{40}(?![A-Za-z0-9_-])
  keywords:
  - id: Keyword_okta_token_context
    groups:
    - match_style: word
      terms:
      - Okta
      - okta.com
      - SSWS
      - OKTA_API_TOKEN
      - Okta API token
    strength: specific
risk_rating: 8
risk_description: This medium-confidence pattern detects a 42-character Okta API token beginning with 00, using nearby Okta
  or SSWS context to distinguish generic identifiers. A live token acts with the creating administrator's privileges and may
  manage users, applications, sessions, or multifactor settings. The normal match presents serious identity-platform harm,
  but the actual role may be constrained and the token shape does not prove organisation-wide super-administrator access.
  Risk 8 and SENSITIVE InfoTech fit administrative API capability with unknown delegated scope; PROTECTED requires confirmed
  super-administrator authority, broad identity takeover, or significant cross-application impact.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
