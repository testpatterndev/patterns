schema: testpattern/v1
name: Isikukood
slug: ee-personal-id
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Isikukood patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-estonia-personal-identification-code Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b[1-6]\d{2}[01]\d[0-3]\d\d{4}\b
confidence: high
confidence_justification: >-
  High confidence: pattern has strong structural constraints (specific format, prefix, or character class restrictions) that significantly reduce false positive rates.
jurisdictions:
  - eu
  - ee
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - isikukood
    - personal identification code
    - personal ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: "37501011234"
      description: Estonian ID (male, born 1975-01-01)
    - value: "48812125678"
      description: Estonian ID (female, born 1988-12-12)
    - value: "39203034567"
      description: Estonian ID (male, born 1992-03-03)
  should_not_match:
    - value: "77501011234"
      description: Invalid century/gender digit (7)
    - value: "3750101123"
      description: Only 10 digits instead of required 11
false_positives:
  - description: >-
      The embedded date validation and gender/century first digit provide strong structural constraints.
    mitigation: >-
      The structured format with date and gender encoding significantly reduces false positives. Keyword context provides additional confidence.
  - description: >-
      In multiple languages, similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ee_personal_id
      matches:
        - ref: Keyword_ee_personal_id
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ee_personal_id
  regexes:
    - id: Regex_ee_personal_id
      pattern: \b[1-6]\d{2}[01]\d[0-3]\d\d{4}\b
      validators:
        - ref: Validator_ee_personal_id_checksum
  keywords:
    - id: Keyword_ee_personal_id
      groups:
        - match_style: word
          terms:
            - isikukood
            - personal identification code
            - personal ID
            - identification number
            - identity code
            - Estonian ID
            - isiku identifitseerimise kood
            - persoonlik identifitseerimisnumber
            - ID-kaart
            - national ID
      strength: specific
  validators:
    - id: Validator_ee_personal_id_checksum
      type: Checksum
      params:
        weights: "1,2,3,4,5,6,7,8,9,1"
        mod: 11
        checkDigit: 0
  filters:
    - id: Filter_ee_personal_id_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The Estonian detector finds an 11-digit isikukood candidate whose first digit and embedded date fields constrain century, sex, and date of birth. A genuine code can reveal those attributes and persistently link one person across national services, making it useful for impersonation or record matching when combined with a name. The strong structure reduces random collisions but the match still does not supply credentials, a document image, or a service history. Risk 5 OFFICIAL reflects bounded encoded-information harm; SENSITIVE would require verified attribution or linkage to substantive government, health, or financial records.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-estonia-personal-identification-code
    title: "Estonia Personal Identification Code entity definition - Microsoft Learn"
