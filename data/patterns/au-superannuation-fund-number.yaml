schema: testpattern/v1
name: Australian Superannuation Fund Number
slug: au-superannuation-fund-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: Detects Australian Superannuation Fund Number (RSE) patterns. An R prefix followed by 7 digits, registered with APRA.
operation: >-
  Regex pattern using universal engine. The top-level regex \bR\d{7}\b matches an uppercase R followed by exactly 7 digits. The Purview engine uses two regexes: Pattern_super_labeled (labeled format
  with RSE/fund/APRA/superannuation prefix + R + digits) and Pattern_au_super_fund (bare R + 7 digits format). Three confidence tiers: High (85) requires superannuation terms + payroll/retirement
  keywords with template exclusion logic; Medium (75) requires superannuation terms; Low (65) requires superannuation terms only (minimum context). Evidence uses 2 keyword groups (9 superannuation
  terms, 9 payroll/retirement terms) within 300-character proximity. Keyword lists: financial-deposit-terms, industry-hr.
pattern: \bR\d{7}\b
confidence: low
confidence_justification: >-
  Low confidence: an R followed by 7 digits is a relatively short pattern that can match reference codes, part numbers, and other alphanumeric sequences. Corroborative evidence keywords such as
  superannuation, APRA, or RSE are essential for reliable detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - superannuation
    - super fund
    - APRA
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
    - industry-hr
test_cases:
  should_match:
    - value: R1234567
      description: Standard superannuation fund number
    - value: R0000001
      description: Low-range fund number
    - value: R9876543
      description: High-range fund number
  should_not_match:
    - value: S1234567
      description: Wrong prefix letter (S instead of R)
    - value: R123456
      description: Only 6 digits after R instead of 7
    - value: R12345678
      description: 8 digits after R instead of 7
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 4
risk_description: >-
  The regex finds an uppercase R followed by seven digits, with stronger tiers adding RSE, fund, APRA, payroll, or retirement context. That value identifies a regulated superannuation fund rather than an individual member, balance, login, or authority to transact. Misuse is therefore mainly misrouting, impersonation, or correlation against a fund, and the bare format can also collide with unrelated reference numbers. Risk 4 OFFICIAL reflects low and reversible harm from the atomic fund identifier; SENSITIVE would require linkage to a member account, contribution transaction, or authentication material.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_super_labeled
      matches:
        - ref: Evidence_superannuation
        - ref: Evidence_payroll_retirement
      exclusion:
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_au_super_fund
      matches:
        - ref: Evidence_superannuation
        - ref: Evidence_payroll_retirement
    - confidence_level: 65
      id_match: Pattern_au_super_fund
      matches:
        - ref: Evidence_superannuation
  regexes:
    - id: Pattern_au_super_fund
      pattern: \bR\d{7}\b
    - id: Pattern_super_labeled
      pattern: (?i)\b(?:RSE|fund\s+no|APRA|super(?:annuation)?\s+fund\s+(?:number|no|ID))\s*[:#-]?\s*R\d{7}\b
  keywords:
    - id: Evidence_superannuation
      groups:
        - match_style: word
          terms:
            - superannuation
            - super fund
            - APRA
            - text: RSE
              case_sensitive: true
            - registrable superannuation entity
            - retirement
            - pension fund
            - super member
            - fund number
      strength: domain
    - id: Evidence_payroll_retirement
      groups:
        - match_style: word
          terms:
            - payroll
            - salary sacrifice
            - employer contribution
            - text: SG
              case_sensitive: true
            - superannuation guarantee
            - retirement
            - pension
            - defined benefit
            - accumulation
      strength: domain
