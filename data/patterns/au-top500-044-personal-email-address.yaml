schema: testpattern/v1
name: Personal email address
slug: au-top500-044-personal-email-address
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to personal email address in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: pii-personal, correspondence-address-labels, correspondence-action-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:personal\s+email\s+address|personal\s+email|private\s+email|email\s+contact|email\s+address|correspondence\s+email|contact\s+email)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - personal email address
    - personal
    - email
    - address
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - pii-personal
    - correspondence-address-labels
    - correspondence-action-terms
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: personal email address
      description: Primary topic phrase match
    - value: personal email
      description: Case-insensitive topic phrase match
    - value: private email
      description: Alternative topic phrase match
    - value: email contact
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to personal email address appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_personal_email
      matches:
        - ref: Evidence_personal_email
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_personal_email
      matches:
        - ref: Evidence_personal_email
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_personal_email
      matches:
        - ref: Evidence_personal_email
  regexes:
    - id: Pattern_personal_email
      pattern: (?is)\b(?:personal\s+email\s+address|personal\s+email|private\s+email|email\s+contact|email\s+address|correspondence\s+email|contact\s+email)\b
    - id: Pattern_au_top500_044_personal_email_address_label_context
      pattern: (?i)\\b(?:personal\\s+email\\s+address|personal|email|address|top500)\\b
  keywords:
    - id: Evidence_personal_email
      groups:
        - match_style: word
          terms:
            - personal email address
            - personal email
            - private email
            - email contact
            - email address
            - inbox
            - gmail
            - outlook
            - hotmail
            - yahoo
            - correspondence email
            - contact email
    - id: Keyword_au_top500_044_personal_email_address_domain_context
      groups:
        - match_style: word
          terms:
            - personal email address
            - personal
            - email
            - address
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
changelog:
