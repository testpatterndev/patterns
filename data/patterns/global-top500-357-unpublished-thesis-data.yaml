schema: testpattern/v1
name: Unpublished thesis data
slug: global-top500-357-unpublished-thesis-data
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to unpublished thesis data in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:unpublished\s+thesis|thesis\s+data|dissertation\s+draft|research\s+findings|preliminary\s+results|thesis\s+manuscript|doctoral\s+research|masters\s+thesis|thesis\s+committee|thesis\s+supervisor|embargoed\s+research|unpublished\s+manuscript)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - unpublished thesis data
    - unpublished
    - thesis
    - data
    - education
    - research
    - administration
  proximity: 300
test_cases:
  should_match:
    - value: unpublished thesis
      description: Primary topic phrase match
    - value: thesis data
      description: Case-insensitive topic phrase match
    - value: dissertation draft
      description: Alternative topic phrase match
    - value: research findings
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to unpublished thesis data appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_unpublished_thesis
      matches:
        - ref: Pattern_global_top500_357_unpublished_thesis_data_label_context
        - ref: Keyword_global_top500_357_unpublished_thesis_data_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_unpublished_thesis
      matches:
        - ref: Keyword_unpublished_thesis
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_unpublished_thesis
      pattern: >-
        (?is)\b(?:unpublished\s+thesis|thesis\s+data|dissertation\s+draft|research\s+findings|preliminary\s+results|thesis\s+manuscript|doctoral\s+research|masters\s+thesis|thesis\s+committee|thesis\s+supervisor|embargoed\s+research|unpublished\s+manuscript)\b
    - id: Pattern_global_top500_357_unpublished_thesis_data_label_context
      pattern: (?i)\b(?:unpublished\s+thesis\s+data)\b
  keywords:
    - id: Keyword_unpublished_thesis
      groups:
        - match_style: word
          terms:
            - unpublished thesis
            - thesis data
            - dissertation draft
            - research findings
            - preliminary results
            - thesis manuscript
            - doctoral research
            - masters thesis
            - thesis committee
            - thesis supervisor
            - embargoed research
            - unpublished manuscript
      strength: specific
    - id: Keyword_global_top500_357_unpublished_thesis_data_domain_context
      groups:
        - match_style: word
          terms:
            - unpublished thesis data
            - unpublished
            - thesis
      strength: domain
risk_description: >-
  This regex identifies unpublished theses, dissertation drafts, thesis datasets, and research findings with seven contextual indicators. A genuine record can contain participant responses, novel results, supervisor comments, and pre-publication intellectual work, enabling premature appropriation, loss of publication priority, or exposure of research subjects. Consequences are serious for the candidate, participants, and institution but normally confined to one project and still depend on the data's novelty or identifiability. Risk 8 supports SENSITIVE Personal-Privacy; PROTECTED would require critical security research, severe participant danger, or a large uniquely valuable dataset whose compromise causes significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
