schema: testpattern/v1
name: Unpublished thesis data
slug: global-top500-357-unpublished-thesis-data
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: 'Identifies pre-publication thesis manuscripts or thesis datasets, not preliminary results from unrelated operational
  work: direct thesis/draft/embargo anchors enforce with one thesis field, broad findings/results language needs two independent
  thesis fields, and topic vocabulary alone remains discovery-only.'
operation: 'Pattern type: regex (boost_regex engine). The full thesis-topic vocabulary feeds a 65 discovery-only tier (Regex_unpublished_thesis_Topic).
  Enforcement: the strong branch (Regex_unpublished_thesis — unpublished thesis, thesis data, dissertation draft, thesis manuscript,
  masters thesis, embargoed research, unpublished manuscript) plus one Keyword_unpublished_thesis_IndependentContext field
  reaches 75; the tested contextual branch (Regex_unpublished_thesis_ContextualBranch — preliminary results) needs two unique
  thesis fields for 65. The "unpublished thesis data" label branch is retained at 75. The shared noise exclusion vetoes template/sample
  text at enforcement tiers.'
pattern: (?is)\b(?:unpublished\s+thesis|thesis\s+data|dissertation\s+draft|research\s+findings|preliminary\s+results|thesis\s+manuscript|doctoral\s+research|masters\s+thesis|thesis\s+committee|thesis\s+supervisor|embargoed\s+research|unpublished\s+manuscript)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
- AML/CTF Act (Cth)
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
- TIA Act 1979 (Cth)
data_categories:
- pii
corroborative_evidence:
  keywords:
  - unpublished thesis data
  - unpublished
  - thesis
  - data
  - education
  - research
  - administration
  proximity: 300
test_cases:
  should_match:
  - value: unpublished thesis
    description: Primary topic phrase match
  - value: thesis data
    description: Case-insensitive topic phrase match
  - value: dissertation draft
    description: Alternative topic phrase match
  - value: research findings
    description: Additional topic phrase match (same-span — discovery inventory only; enforcement now needs separate thesis-field
      evidence)
  - value: Doctoral candidate DC-118, dissertation draft chapter 4; thesis dataset v7 remains embargoed until 2027-02-01 under
      supervisor L. Wong.
    description: Dissertation-draft anchor with candidate, chapter, dataset, and supervisor fields reaches the enforcing tiers
  - value: A university press release summarizes preliminary results from a completed public opinion poll.
    description: University-adjacent results match the topic vocabulary only (discovery — no thesis fields)
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: student grant
    description: Generic word pair from old broad template should not match
  - value: The finance dashboard reports preliminary quarterly revenue for three regions.
    description: Operational financial results contain no thesis-topic phrase
false_positives:
- description: Common words and phrases related to unpublished thesis data appearing in policy documents, training materials,
    HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_unpublished_thesis
    matches:
    - ref: Keyword_unpublished_thesis_IndependentContext
    - ref: Pattern_global_top500_357_unpublished_thesis_data_label_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_unpublished_thesis
    matches:
    - ref: Keyword_unpublished_thesis_IndependentContext
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_unpublished_thesis
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_unpublished_thesis
    pattern: (?is)\b(?:unpublished\s+thesis|thesis\s+data|dissertation\s+draft|thesis\s+manuscript|masters\s+thesis|embargoed\s+research|unpublished\s+manuscript)\b
  - id: Regex_unpublished_thesis_ContextualBranch
    pattern: (?is)\b(?:preliminary\s+results)\b
  - id: Regex_unpublished_thesis_Topic
    pattern: (?is)\b(?:unpublished\s+thesis|thesis\s+data|dissertation\s+draft|research\s+findings|preliminary\s+results|thesis\s+manuscript|doctoral\s+research|masters\s+thesis|thesis\s+committee|thesis\s+supervisor|embargoed\s+research|unpublished\s+manuscript)\b
  - id: Pattern_global_top500_357_unpublished_thesis_data_label_context
    pattern: (?i)\b(?:unpublished\s+thesis\s+data)\b
  keywords:
  - id: Keyword_unpublished_thesis_IndependentContext
    groups:
    - match_style: word
      terms:
      - candidate ID
      - student ID
      - thesis title
      - supervisor
      - degree
      - chapter
      - dataset
      - embargo date
      - draft version
      - viva
      - repository hold
      - submission status
    strength: specific
  - id: Keyword_global_top500_357_unpublished_thesis_data_domain_context
    groups:
    - match_style: word
      terms:
      - unpublished thesis data
      - unpublished
      - thesis
    strength: domain
risk_description: This regex identifies unpublished theses, dissertation drafts, thesis datasets, and research findings with
  seven contextual indicators. A genuine record can contain participant responses, novel results, supervisor comments, and
  pre-publication intellectual work, enabling premature appropriation, loss of publication priority, or exposure of research
  subjects. Consequences are serious for the candidate, participants, and institution but normally confined to one project
  and still depend on the data's novelty or identifiability. Risk 8 supports SENSITIVE Personal-Privacy; PROTECTED would require
  critical security research, severe participant danger, or a large uniquely valuable dataset whose compromise causes significant
  damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
