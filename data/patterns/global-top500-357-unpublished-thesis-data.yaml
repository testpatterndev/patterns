changelog:
- version: 1.3.0
  date: '2026-07-17'
  description: 'Reduced-scope harden (TP-01265): the old 65 tier corroborated the full topic primary with the same-span Keyword_unpublished_thesis
    list, so "preliminary results" from a website survey enforced at 65. Keyword_unpublished_thesis is replaced by Keyword_unpublished_thesis_IndependentContext
    (candidate/student ID, thesis title, supervisor, degree, chapter, dataset, embargo date, draft version, viva, repository
    hold, submission status). Regex_unpublished_thesis is modified to the retained strong branch (unpublished thesis, thesis
    data, dissertation draft, thesis manuscript, masters thesis, embargoed research, unpublished manuscript) enforcing at
    75 with one thesis field; Regex_unpublished_thesis_ContextualBranch (preliminary results) enforces at 65 only with two
    unique thesis fields; the full topic vocabulary (including research findings and doctoral research) moves to Regex_unpublished_thesis_Topic
    as a 65 discovery_only inventory tier. Added embargoed-draft positive, press-release discovery case, and finance-dashboard
    negative.'
- version: 1.2.1
  date: '2026-07-14'
  description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1903 without changing
    detector or package metadata.'
- version: 1.2.0
  date: '2026-07-09'
  description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are
    scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived
    by scripts/derive-pattern-class.mjs + spot review'
- version: 1.1.1
  date: '2026-07-09'
  description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context,
    generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead
    weight to compiled purview.keywords (no behavior change)'
- version: 1.1.0
  date: '2026-07-04'
  description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical
    tier.
