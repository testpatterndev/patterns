schema: testpattern/v1
name: Commuting pattern data
slug: global-top500-060-commuting-pattern-data
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to commuting pattern data in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:commuting\s+pattern|commute\s+data|travel\s+route|transit\s+history|daily\s+commute|transport\s+log|trip\s+record|geolocation\s+data|location\s+tracking|movement\s+pattern|work\s+commute)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - commuting pattern data
    - commuting
    - pattern
    - data
    - contact
    - location
  proximity: 300
test_cases:
  should_match:
    - value: commuting pattern
      description: Primary topic phrase match
    - value: commute data
      description: Case-insensitive topic phrase match
    - value: travel route
      description: Alternative topic phrase match
    - value: transit history
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to commuting pattern data appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_commuting_pattern
      matches:
        - ref: Pattern_global_top500_060_commuting_pattern_data_label_context
        - ref: Keyword_global_top500_060_commuting_pattern_data_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_commuting_pattern
      matches:
        - ref: Keyword_commuting_pattern
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_commuting_pattern
      pattern: >-
        (?is)\b(?:commuting\s+pattern|commute\s+data|travel\s+route|transit\s+history|daily\s+commute|transport\s+log|trip\s+record|geolocation\s+data|location\s+tracking|movement\s+pattern|work\s+commute)\b
    - id: Pattern_global_top500_060_commuting_pattern_data_label_context
      pattern: (?i)\b(?:commuting\s+pattern\s+data)\b
  keywords:
    - id: Keyword_commuting_pattern
      groups:
        - match_style: word
          terms:
            - commuting pattern
            - commute data
            - travel route
            - transit history
            - daily commute
            - transport log
            - trip record
            - geolocation data
            - location tracking
            - movement pattern
            - work commute
      strength: specific
    - id: Keyword_global_top500_060_commuting_pattern_data_domain_context
      groups:
        - match_style: word
          terms:
            - commuting pattern data
            - commuting
            - pattern
      strength: domain
risk_description: >-
  The global concept detector seeks commute-data, travel-route, transit-history, and commuting-pattern language that describes recurring personal movement. A genuine record can expose predictable home-to-work routes, arrival times, and absence windows, enabling stalking, interception, or targeted crime against the commuter. General transport planning can match, but an identified recurring routine creates a direct safety risk beyond one address or journey. Risk 8 SENSITIVE reflects serious individual harm; PROTECTED would require protected-person or witness movements, critical-operation routing, bulk workforce patterns, or an active high-impact threat.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
