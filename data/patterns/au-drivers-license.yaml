schema: testpattern/v1
name: Australia Driver's License Number
slug: au-drivers-license
version: 1.0.0
type: keyword_list
pattern_class: concept
description: >-
  Catalogue reference for the Microsoft Purview built-in Australia Driver's License Number sensitive information
  type. Microsoft recommends medium confidence (75) for the built-in entity. This YAML-only record supports registry
  search and discovery without reproducing Microsoft's built-in regular expressions, keyword dictionaries, or XML.
operation: >-
  In Microsoft Purview, enable the built-in entity 1cbbc8f5-9216-4392-9eb5-5ac2298d1356 to use Microsoft's national
  format and supporting-evidence logic. This reference exports YAML only and must not be deployed as a custom XML
  clone. Use the eight au-*-driver-licence-number custom SITs when state or territory-specific policy is required.
keywords:
  - Australia Driver's License Number
  - Australia Drivers License Number
  - Australia Driver's Licence Number
  - Australia Drivers Licence Number
  - Australian Driver's License Number
  - Australian Drivers License Number
  - Australian Driver's Licence Number
  - Australian Drivers Licence Number
confidence: medium
confidence_justification: >-
  Medium confidence records Microsoft's recommended confidence of 75 for the built-in entity, where a licence-number
  candidate is corroborated by nearby driver-licence keywords and exclusion evidence. This YAML-only catalogue record
  does not claim to reproduce that proprietary detection logic.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
test_cases:
  should_match:
    - value: 'Australia Driver''s License Number built-in SIT'
      description: Microsoft built-in entity name using Microsoft spelling
    - value: 'Australian Driver''s Licence Number catalogue reference'
      description: Australian spelling variant used for registry discovery
  should_not_match:
    - value: 'QLD driver licence application form'
      description: The QLD form SIT remains a separate document classifier
    - value: 'Vehicle registration number: 40829161'
      description: Sibling transport identifier without the built-in entity name
    - value: 'Driver licence number: 40829161'
      description: Generic populated value belongs to the national compatibility or regional custom SITs
false_positives:
  - description: Documentation and policy inventories can mention the Microsoft built-in entity by name.
    mitigation: Treat this YAML-only record as catalogue discovery; enable the Microsoft entity for value detection.
  - description: Generic licence terminology does not identify the issuing Australian state or territory.
    mitigation: Select the matching regional custom SIT when jurisdiction-specific evidence is required.
exports:
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_au_drivers_license_builtin_name
      matches:
        - ref: Evidence_microsoft_builtin_context
  keywords:
    - id: Keyword_au_drivers_license_builtin_name
      groups:
        - match_style: word
          terms:
            - Australia Driver's License Number
            - Australia Drivers License Number
            - Australia Driver's Licence Number
            - Australia Drivers Licence Number
            - Australian Driver's License Number
            - Australian Drivers License Number
            - Australian Driver's Licence Number
            - Australian Drivers Licence Number
      strength: specific
    - id: Evidence_microsoft_builtin_context
      groups:
        - match_style: word
          terms:
            - Microsoft Purview
            - built-in SIT
            - built-in entity
            - catalogue reference
            - entity definition
      strength: domain
risk_rating: 5
risk_description: >-
  The referenced Microsoft entity detects an Australian driver's licence number, which can support identity
  correlation or licence-themed impersonation when tied to a holder. The atomic number is not a licence image,
  driving history, card security number, or authenticator. Risk 5 and OFFICIAL reflect that bounded identifier risk.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/exchange/policy-and-compliance/data-loss-prevention/sensitive-information-types
    title: Australia Driver's License Number definition - Microsoft Learn
  - url: https://learn.microsoft.com/en-us/purview/sit-sensitive-information-type-entity-definitions
    title: Sensitive information type entity definitions - Microsoft Learn
created: '2026-07-19'
updated: '2026-07-19'
