schema: testpattern/v1
name: Brazil Physical Addresses
slug: br-physical-addresses
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Brazil Physical Addresses patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that uses machine learning and function-based detection for physical
  address identification. This keyword list provides address-related terms for supplementary matching.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  country-specific address terminology to identify physical address data.
keywords:
  - rua
  - avenida
  - travessa
  - alameda
  - praça
  - rodovia
  - estrada
  - largo
  - beco
  - CEP
  - vila
  - jardim
  - bairro
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on address terms requires additional context and
  corroborative evidence for accurate physical address detection. Address keywords alone
  produce high false positive rates without structural validation.
jurisdictions:
  - br
regulations:
  - LGPD
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 rua name, unit 4"
      description: Contains address keyword 'rua'
    - value: "located at 45 avenida example"
      description: Contains address keyword 'avenida'
    - value: "deliver to 78 travessa test"
      description: Contains address keyword 'travessa'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_br_address_primary
      matches:
        - ref: Keyword_br_address_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_br_address_primary
  keywords:
    - id: Keyword_br_address_primary
      groups:
        - match_style: word
          terms:
            - rua
            - avenida
            - travessa
            - alameda
            - praça
            - rodovia
            - estrada
            - largo
            - beco
            - text: CEP
              case_sensitive: true
      strength: domain
    - id: Keyword_br_address_context
      groups:
        - match_style: word
          terms:
            - endereço
            - cidade
            - estado
            - bairro
            - vila
            - jardim
            - número
            - complemento
            - código postal
            - município
            - logradouro
      strength: domain
risk_rating: 3
risk_description: >-
  The Brazilian TestPattern detector uses low-confidence rua, avenida, and travessa terms and does not confirm a complete CEP-qualified postal address. A real residence can support delivery impersonation or unwanted contact when linked to a known person, but many matches identify businesses, tourist sites, and public facilities. Portuguese street terms in routes and organisation names create expected non-personal collisions. Risk 3 OFFICIAL reflects low contextual harm; SENSITIVE would require a protected home, vulnerable resident, credible threat, movement linkage, or a substantial attributed address dataset.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-brazil-physical-addresses
    title: "Brazil Physical Addresses entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1143 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
