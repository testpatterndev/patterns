schema: testpattern/v1
name: New Zealand Social Welfare Number
slug: nz-social-welfare-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects New Zealand Social Welfare Number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Due to the generic numeric format, corroborative evidence
  keywords are essential for reliable detection.
operation: >-
  Corroborative evidence: 5 keywords within 300 characters. Keyword lists: nz-government. Adds label-context matching and exclusion logic for sample/template/test placeholders. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{9}\b
confidence: medium
confidence_justification: >-
  Medium confidence: nine-digit numbers are common in many contexts. Keywords such as 'social welfare' or 'MSD' are required for reliable detection. Context label evidence plus explicit
  template/example exclusion improves precision for high-risk identifiers. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - nz
regulations:
  - Privacy Act 2020 (NZ)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - social welfare
    - MSD
    - beneficiary
    - welfare number
    - client number
  proximity: 300
  keyword_lists:
    - nz-government
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '123456789'
      description: Nine-digit social welfare number format
    - value: '987654321'
      description: Nine-digit MSD client number
    - value: '112233445'
      description: Nine-digit beneficiary identifier
  should_not_match:
    - value: '12345678'
      description: Eight digits, too short for welfare number
    - value: '1234567890'
      description: Ten digits, exceeds welfare number format
    - value: sample template placeholder number 12345678
      description: >-
        Template/sample context negative — the embedded number is 8 digits, one short of the required 9,
        so the universal-engine top-level regex correctly does not match it (template gating is a
        Purview-tier NOT-group concern, not expressible in a bare regex)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic numeric sequences matching the digit pattern in non-health contexts
    mitigation: Require corroborative evidence keywords within the proximity window to distinguish health identifiers from general numeric data.
  - description: Reference numbers or account identifiers from other domains with similar digit counts
    mitigation: Layer with document classification to prioritise matches in health and medical documents.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_nz_social_welfare
      matches:
        - ref: Pattern_nz_social_welfare_number_label_context
        - ref: Keyword_nz_social_welfare
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_nz_social_welfare
      matches:
        - ref: Keyword_nz_social_welfare_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_nz_social_welfare
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_nz_social_welfare
      pattern: \b\d{9}\b
    - id: Pattern_nz_social_welfare_number_label_context
      pattern: (?i)\b(?:new|zealand|social|welfare|health\s+number|insurance\s+number|patient\s+identifier|social\s+welfare)\b
  keywords:
    - id: Keyword_nz_social_welfare
      groups:
        - match_style: word
          terms:
            - social welfare
            - text: MSD
              case_sensitive: true
            - beneficiary
            - welfare number
            - client number
            - Ministry of Social Development
            - benefit number
            - welfare client
            - social security
            - Work and Income
            - WINZ
            - benefit recipient
      strength: specific
    - id: Keyword_nz_social_welfare_number_domain_context
      groups:
        - match_style: word
          terms:
            - new zealand social welfare number
            - new
            - zealand
            - social
            - welfare
      strength: domain
  filters:
    - id: Filter_nz_social_welfare_same_digits
      type: AllDigitsSameFilter
risk_rating: 8
risk_description: >-
  Health and medical information is among the most sensitive personal data under privacy laws globally. Unauthorized disclosure can result in discrimination, personal harm, and regulatory penalties
  under health privacy frameworks.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-new-zealand-social-welfare-number
    title: New Zealand Social Welfare Number entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-12'
changelog:
  - version: 1.3.1
    date: '2026-07-12'
    description: 'Baseline burn-down: template-context negative used a structurally valid number, so the universal-engine top-level regex correctly matched it (template gating is a Purview-tier concern via the template-exclusion NOT-group, not expressible in a bare regex); embedded number made structurally invalid (8 digits, one short of the required 9) to preserve the template-prose intent without asserting the impossible.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Mapped non-canonical confidence 90 to 85.
author: testpattern-community
