schema: testpattern/v1
name: Deletion request case files
slug: au-top500-472-deletion-request-case-files
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to deletion request case files in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:deletion\s+request\s+case\s+files|deletion\s+request|erasure\s+request|right\s+to\s+deletion|APP\s+13|correction\s+request|data\s+destruction|case\s+file|response\s+deadline|data\s+subject)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - deletion request case files
    - deletion
    - request
    - case
    - files
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: deletion request case files
      description: Primary topic phrase match
    - value: deletion request
      description: Case-insensitive topic phrase match
    - value: erasure request
      description: Alternative topic phrase match
    - value: right to deletion
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to deletion request case files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_deletion_request
      matches:
        - ref: Evidence_deletion_request
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_deletion_request
      matches:
        - ref: Evidence_deletion_request
    - confidence_level: 65
      id_match: Pattern_deletion_request
      matches:
        - ref: Evidence_deletion_request
  regexes:
    - id: Pattern_deletion_request
      pattern: (?is)\b(?:deletion\s+request\s+case\s+files|deletion\s+request|erasure\s+request|right\s+to\s+deletion|APP\s+13|correction\s+request|data\s+destruction|case\s+file|response\s+deadline|data\s+subject)\b
  keywords:
    - id: Evidence_deletion_request
      groups:
        - match_style: word
          terms:
            - deletion request case files
            - deletion request
            - erasure request
            - right to deletion
            - APP 13
            - correction request
            - data destruction
            - case file
            - response deadline
            - privacy
            - compliance
            - data subject
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
