  - version: 1.1.2
    date: '2026-07-13'
    description: 'Burn-down final-review follow-up: add a repeated-digit should_not_match value (AAA111111) exercising AllDigitsSameFilter — the 1.1.1 edit removed the only test case that exercised the filter, leaving it declared and prose-documented but untested.'
  - version: 1.1.1
    date: '2026-07-12'
    description: 'Baseline burn-down: template-context negative used a structurally valid number, so the universal-engine top-level regex correctly matched it (template gating is a Purview-tier concern via the template-exclusion NOT-group, not expressible in a bare regex); embedded digit run made structurally invalid (5 digits, one short of the required 6) to preserve the template-prose intent without asserting the impossible.'
  - version: 1.1.0
