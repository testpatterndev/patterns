schema: testpattern/v1
name: Key recovery material
slug: global-top500-275-key-recovery-material
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies key-recovery and escrow references, while reserving enforcement for
  records that contain a structured recovery value. A phrase alone is
  discovery-only; system identity and custody/escrow fields distinguish a
  high-confidence recovery-material record.
operation: >-
  Regex_key_recovery_phrase finds key recovery, recovery key, escrow key, or
  break-glass. The 65 phrase tier is discovery-only. The 75 tier requires a
  non-placeholder eight-group BitLocker-style recovery value. The 85 tier also
  requires a named recovery system and independent custody/escrow record context.
  Enforcing tiers reject explicit template material.
pattern: (?is)\b(?:key\s+recovery|recovery\s+key|escrow\s+key|break-glass)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - key recovery
    - recovery key
    - escrow key
    - break-glass
    - hsm
    - kms
  proximity: 240
test_cases:
  should_match:
    - value: Key recovery procedure is under review
      description: Low-tier probe - recovery phrase without a recovery value
    - value: 'BitLocker recovery key: 103482-275911-364820-451739-528604-617395-704286-893157'
      description: Medium-tier probe - structured recovery value without custody record
    - value: 'BitLocker recovery key: 103482-275911-364820-451739-528604-617395-704286-893157; device ID 4f9c2; escrowed to Entra ID; custodian: endpoint-ops'
      description: High-tier probe - structured value with system and custody metadata
    - value: 'Break-glass recovery key 219403-308214-497125-586036-674947-763858-852769-941670'
      description: Medium-tier probe - structured break-glass recovery value
  should_not_match:
    - value: General key performance indicators for project recovery timeline
      description: Unrelated use of key/recovery words
    - value: Generic policy prose without key escrow context
      description: No structural security anchors
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: 'Recovery key: 103482-275911-364820-451739-528604-617395-704286'
      description: Malformed recovery value has only seven groups
    - value: 'BitLocker recovery key: 000000-000000-000000-000000-000000-000000-000000-000000; escrowed to Entra ID'
      description: Repeated placeholder recovery value must not enforce
    - value: 'Documentation example: BitLocker recovery key 103482-275911-364820-451739-528604-617395-704286-893157; escrowed to Entra ID'
      description: Documentation quoting a complete recovery record must not enforce
    - value: 'API key rotation completed for the production application'
      description: Sibling secret-management activity is not key-recovery material
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_key_recovery_phrase
      matches:
        - ref: Evidence_recovery_value
        - ref: Evidence_recovery_system
        - ref: Evidence_recovery_custody
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_key_recovery_phrase
      matches:
        - ref: Evidence_recovery_value
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_key_recovery_phrase
  regexes:
    - id: Regex_key_recovery_phrase
      pattern: (?is)\b(?:key\s+recovery|recovery\s+key|escrow\s+key|break-glass)\b
    - id: Evidence_recovery_value
      pattern: '(?<!\d)(?!([0-9]{6})(?:-\1){7})(?:[0-9]{6}-){7}[0-9]{6}(?!\d)'
  keywords:
    - id: Evidence_recovery_system
      groups:
        - match_style: word
          terms:
            - BitLocker
            - FileVault
            - Entra ID
            - Active Directory
            - HSM cluster
            - key management service
      strength: specific
    - id: Evidence_recovery_custody
      groups:
        - match_style: word
          terms:
            - escrowed to
            - custodian
            - device ID
            - key ID
            - recovery record
            - stored in escrow
            - recovery owner
      strength: specific
risk_description: >-
  The pattern recognises break-glass, recovery key, key escrow, KMS, or emergency-recovery language, indicating key-recovery material or procedure without validating an actual key value. A genuine record can reveal escrow locations, recovery workflows, authorised roles, and dependencies that help an attacker target emergency access or cryptographic restoration. Continuity plans, vendor guidance, and policy discussions can match, and one record may contain process metadata rather than usable secret material. Risk 8 SENSITIVE reflects serious contained harm from substantive recovery information; PROTECTED would require actual master-key material, broad privileged access, or significant damage established by the content.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
