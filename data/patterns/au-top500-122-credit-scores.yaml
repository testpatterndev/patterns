schema: testpattern/v1
name: Credit scores
slug: au-top500-122-credit-scores
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to credit scores in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 5 keywords within 300 characters.'
pattern: (?is)\b(?:credit\s+score|credit\s+rating|credit\s+risk|credit\s+assessment|credit\s+reporting|risk\s+score)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - credit scores
    - credit
    - scores
    - lending
    - insurance
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: credit score
      description: Primary topic phrase match
    - value: credit rating
      description: Case-insensitive topic phrase match
    - value: credit risk
      description: Alternative topic phrase match
    - value: credit assessment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_credit_scores
      matches:
        - ref: Evidence_credit_scores
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_credit_scores
      matches:
        - ref: Evidence_credit_scores
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_credit_scores
      matches:
        - ref: Evidence_credit_scores
  regexes:
    - id: Pattern_credit_scores
      pattern: (?is)\b(?:credit\s+score|credit\s+rating|credit\s+risk|credit\s+assessment|credit\s+reporting|risk\s+score)\b
  keywords:
    - id: Evidence_credit_scores
      groups:
        - match_style: word
          terms:
            - credit score
            - credit rating
            - credit risk
            - credit assessment
            - Equifax
            - Experian
            - illion
            - creditworthiness
            - OAIC
            - credit reporting
            - risk score
            - scorecard
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/your-privacy-rights/credit-reporting/what-is-credit-reporting
  - https://www.oaic.gov.au/privacy/your-privacy-rights/credit-reporting/what-is-a-credit-report
