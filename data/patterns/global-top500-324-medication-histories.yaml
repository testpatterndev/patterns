schema: testpattern/v1
name: Medication histories
slug: global-top500-324-medication-histories
version: 1.3.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies medication histories references in healthcare and patient records. Protected health information under
  applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 6 keywords within 500 characters. Keyword lists: au-healthcare-medications. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:medication\s+history|prescription\s+history|drug\s+history|medication\s+list|dispensing\s+record|medication\s+reconciliation)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- healthcare
- phi
corroborative_evidence:
  keywords:
  - medication histories
  - medication
  - histories
  - health
  - biomedical
  - information
  proximity: 500
  keyword_lists:
  - au-healthcare-medications
  - data-record-context
  - generic-data-labels
test_cases:
  should_match:
  - value: medication history
    description: Primary topic phrase match
  - value: prescription history
    description: Case-insensitive topic phrase match
  - value: drug history
    description: Alternative topic phrase match
  - value: medication list
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: patient biometric
    description: Generic word pair from old broad template should not match
false_positives:
- description: Medical terminology in health education materials, research publications, clinical guidelines, or public health
    documents without patient-specific data.
  mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers
    such as medical record numbers or dates of birth.
- description: General wellness and fitness content using medical vocabulary without constituting protected health information.
  mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical
    records from general health content.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: The detector matches medication-history, prescription-history, or drug-history language with healthcare
  and medication corroboration over a wider proximity window, aiming at a longitudinal medication record rather than a single
  drug name. Disclosure can reveal chronic disease, psychiatric or reproductive treatment, adherence patterns, and prior therapies,
  allowing an employer, insurer, acquaintance, or fraudster to infer conditions about the patient. One history can span years
  and multiple prescribers, creating serious personal harm, although formularies, clinical guidelines, and educational material
  can also contain the phrases. Risk 8 and SENSITIVE fit the normal patient record; PROTECTED requires a high-consequence
  protected patient, bulk histories, or a safety-critical medication context.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 500
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_medication_histories
    matches:
    - ref: Pattern_global_top500_324_medication_histories_label_context
    - ref: Keyword_global_top500_324_medication_histories_domain_context
    - ref: Keyword_medication_histories
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_medication_histories
    matches:
    - ref: Pattern_global_top500_324_medication_histories_label_context
    - ref: Keyword_global_top500_324_medication_histories_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_medication_histories
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_medication_histories
    pattern: (?is)\b(?:medication\s+history|prescription\s+history|drug\s+history|medication\s+list|dispensing\s+record|medication\s+reconciliation)\b
  - id: Pattern_global_top500_324_medication_histories_label_context
    pattern: (?i)\b(?:medication\s+histories)\b
  keywords:
  - id: Keyword_medication_histories
    groups:
    - match_style: word
      terms:
      - medication history
      - prescription history
      - drug history
      - medication list
      - pharmaceutical
      - health
      - biomedical
      - dispensing record
      - dosage
      - prescriber
      - pharmacy
      - medication reconciliation
    strength: domain
  - id: Keyword_global_top500_324_medication_histories_domain_context
    groups:
    - match_style: word
      terms:
      - medication histories
      - medication
      - histories
    strength: domain
