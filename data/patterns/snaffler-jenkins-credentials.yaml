schema: testpattern/v1
name: Jenkins Encrypted Credentials
slug: snaffler-jenkins-credentials
version: 1.1.2
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Jenkins-encrypted credential values in the {base64...} format used by
  Jenkins credentials.xml and similar configuration files. Mirrors Snaffler rule
  KeepJenkinsByName.
operation: >-
  Matches the Jenkins encrypted secret format: <password>{base64-data}</password>
  where the base64 payload is at least 20 characters. Jenkins uses AES encryption
  with a base64-wrapped ciphertext surrounded by curly braces.
risk_description: >-
  Jenkins Encrypted Credentials detects the curly-braced base64 ciphertext format stored inside Jenkins password elements. The value normally needs Jenkins master-key material or access to the controller for decryption, but disclosure can contribute to offline recovery and exposes the presence of a deployable service credential. Impact is serious when companion keys are available, yet one encrypted value does not by itself grant access. Risk 8 and SENSITIVE InfoTech are justified; PROTECTED would require controller-wide key compromise, privileged deployment credentials, or significant supply-chain damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: <password>\{[A-Za-z0-9+/=]{20,}\}</password>
confidence: high
confidence_justification: >-
  High confidence: the combination of <password> XML tags and the {base64} encrypted
  format is highly specific to Jenkins credential storage. False positives are extremely
  unlikely given the structural constraints.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - com.cloudbees.plugins.credentials
    - <privateKey>
    - BapSshPublisher
    - <id>
  proximity: 300
test_cases:
  should_match:
    - value: "<password>{AQAAABAAAAAQ1q2w3e4r5t6y7u8i9o0p1a2b3c4d5e6f7g8h9i0j1k}</password>"
      description: Exact 65 probe - encrypted password element without independent Jenkins context
    - value: "<credentials><password>{AQAAABAAAAAQabcdefghijklmnopqrstuvwxyz0123456789ABCDEF==}</password></credentials>"
      description: Exact 75 probe - encrypted value inside a credentials container
    - value: "<com.cloudbees.plugins.credentials.impl.UsernamePasswordCredentialsImpl><id>deploy-prod</id><password>{AQAAABAAAAAQ/abc+def/ghi+jkl/mnopqrstuvwxyz0123456789==}</password></com.cloudbees.plugins.credentials.impl.UsernamePasswordCredentialsImpl>"
      description: Exact 85 probe - Jenkins credential class plus populated credential identity
  should_not_match:
    - value: "<password>changeme</password>"
      description: Plaintext password, not the {…} encrypted form
    - value: "<password>{short}</password>"
      description: Too short (under 20 chars in braces)
    - value: "<secret>{AQAAABAAAAAQabcdefghijklmnopqrstuvwxyz0123456789ABCDEF==}</secret>"
      description: Sibling XML secret element is not the Jenkins password structure
    - value: "<password>{AQAAABAAAAAQabc*defghijklmnopqrstuvwxyz0123456789}</password>"
      description: Malformed ciphertext contains a non-base64 character
    - value: "Documentation example: <credentials><id>demo</id><password>{AQAAABAAAAAQabcdefghijklmnopqrstuvwxyz0123456789ABCDEF==}</password></credentials>"
      description: Documentation example containing valid-shaped ciphertext is excluded
false_positives:
  - description: XML files that happen to use <password> tags with curly-brace-wrapped values in non-Jenkins contexts such as custom configuration schemas.
    mitigation: Require proximity to Jenkins-specific identifiers (com.cloudbees.plugins.credentials, privateKey, BapSshPublisher) to confirm Jenkins context.
  - description: Test or sample Jenkins configuration files with placeholder encrypted values.
    mitigation: Template exclusion keywords at 65-tier catch common placeholder/example markers.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_jenkins_credentials
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_jenkins_credentials
      matches:
        - ref: Keyword_snaffler_jenkins_credentials_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_jenkins_credentials
      matches:
        - ref: Keyword_snaffler_jenkins_credentials_evidence
        - ref: Pattern_snaffler_jenkins_credential_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_jenkins_credentials
      pattern: <password>\{[A-Za-z0-9+/=]{20,}\}</password>
    - id: Pattern_snaffler_jenkins_credential_identity
      pattern: (?i)<(?:id|username)>[^<]{2,128}</(?:id|username)>
  keywords:
    - id: Keyword_snaffler_jenkins_credentials_evidence
      groups:
        - match_style: string
          terms:
            - com.cloudbees.plugins.credentials
            - <credentials>
            - credentials.xml
            - Jenkins credential
      strength: specific
created: '2026-06-26'
updated: '2026-07-19'
