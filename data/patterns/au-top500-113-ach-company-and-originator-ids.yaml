schema: testpattern/v1
name: ACH company and originator IDs
slug: au-top500-113-ach-company-and-originator-ids
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to ach company and originator ids in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:originator\s+ID|company\s+ID|direct\s+entry|clearing\s+house|batch\s+header|originating\s+institution|payment\s+file|bulk\s+payment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - ach company and originator ids
    - ach
    - company
    - originator
    - ids
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: originator ID
      description: Primary topic phrase match
    - value: company id
      description: Case-insensitive topic phrase match
    - value: direct entry
      description: Alternative topic phrase match
    - value: clearing house
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_ach_originator_ids
      matches:
        - ref: Evidence_ach_originator_ids
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_ach_originator_ids
      matches:
        - ref: Evidence_ach_originator_ids
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_ach_originator_ids
      matches:
        - ref: Evidence_ach_originator_ids
  regexes:
    - id: Pattern_ach_originator_ids
      pattern: (?is)\b(?:originator\s+ID|company\s+ID|direct\s+entry|clearing\s+house|batch\s+header|originating\s+institution|payment\s+file|bulk\s+payment)\b
  keywords:
    - id: Evidence_ach_originator_ids
      groups:
        - match_style: word
          terms:
            - ACH
            - originator ID
            - company ID
            - direct entry
            - clearing house
            - BECS
            - batch header
            - originating institution
            - settlement
            - payment file
            - AusPayNet
            - bulk payment
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
