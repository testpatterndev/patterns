schema: testpattern/v1
name: Azure App Service Deployment Password
slug: azure-app-service-deployment-password
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Azure App Service deployment passwords in configuration files and publish profiles. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running
  Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Matches deployment credentials in Azure publish settings XML files, including userPWD and password attributes with Base64 or alphanumeric values. Corroborative evidence: 8 keywords within 300
  characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)(?:userPWD|publishPassword|password)\s*=\s*"?[A-Za-z0-9+/=]{20,}"?
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern matching deployment credential assignments with corroborative keyword support reduces false positive rates significantly. Added context gating and
  exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - publishsettings
    - deployment
    - App Service
    - Azure
    - userPWD
    - publishPassword
    - deploy
    - publish profile
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: userPWD="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
      description: Azure deployment password in publish profile
    - value: publishPassword="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnop"
      description: Publish password with mixed case
    - value: password="0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcd"
      description: Generic password attribute with long value
  should_not_match:
    - value: userPWD=""
      description: Empty password value
    - value: password="short"
      description: Too short to be a deployment password
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: XML configuration templates and documentation containing placeholder deployment credentials.
    mitigation: Check for common placeholder patterns and combine with Azure-specific context keywords.
  - description: Non-Azure password attributes in configuration files that happen to match the pattern.
    mitigation: Require proximity to Azure App Service specific keywords to reduce cross-platform false positives.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_azure_app_service_deployment_password
      matches:
        - ref: Pattern_azure_app_service_deployment_password_label_context
        - ref: Keyword_azure_app_service_deployment_password_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_azure_app_service_deployment_password
      matches:
        - ref: Keyword_azure_app_service_deployment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_azure_app_service_deployment_password
      pattern: (?i)(?:userPWD|publishPassword|password)\s*=\s*"?[A-Za-z0-9+/=]{20,}"?
    - id: Pattern_azure_app_service_deployment_password_label_context
      pattern: (?i)\b(?:azure\s+app\s+service\s+deployment\s+password|azure|app|service|deployment|password)\b
  keywords:
    - id: Keyword_azure_app_service_deployment
      groups:
        - match_style: word
          terms:
            - publishsettings
            - deployment
            - App Service
            - Azure
            - userPWD
            - publishPassword
            - deploy
            - publish profile
            - publish settings
            - web deploy
            - Azure Web App
            - deployment credentials
      strength: domain
    - id: Keyword_azure_app_service_deployment_password_domain_context
      groups:
        - match_style: word
          terms:
            - azure app service deployment password
            - azure
            - app
            - service
            - deployment
            - password
      strength: domain
risk_rating: 8
risk_description: >-
  The detector finds long deployment-password values in Azure publish-profile attributes such as userPWD, publishPassword, or password. With the associated App Service endpoint and username normally present in the same profile, an attacker can deploy or alter application content and potentially access data exposed to that app. The normal blast radius is one App Service and its deployment surface, although production identity permissions or shared downstream secrets can enlarge it. Risk 8 SENSITIVE captures serious contained application compromise; subscription-wide management access or a critical service with significant consequences would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-azure-app-service-deployment-password
    title: Azure App Service deployment password entity definition - Microsoft Learn
