schema: testpattern/v1
name: Telemetry schemas
slug: au-top500-259-telemetry-schemas
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies telemetry schemas patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?i)\b(?:telemetry\s+(?:schema|manifest|taxonomy|specification|pipeline[\s-]config)|event\s+(?:schema|taxonomy|catalog|specification)|metrics\s+(?:schema|definition|manifest)|instrumentation\s+(?:schema|specification)|observability\s+data\s+model)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - telemetry schema
    - telemetry manifest
    - event schema
    - metrics schema
    - instrumentation specification
    - observability data model
    - event taxonomy
    - event catalog
    - metric definition
    - instrumentation
    - event type
    - metric name
    - trace
    - span
    - telemetry pipeline
  proximity: 300
test_cases:
  should_match:
    - value: telemetry schema for user activity tracking
      description: 3-judge panel revised test case
    - value: event schema definition includes user_id and session_id fields
      description: 3-judge panel revised test case
    - value: metrics schema for application monitoring
      description: 3-judge panel revised test case
    - value: instrumentation specification for telemetry collection
      description: 3-judge panel revised test case
    - value: observability data model for distributed tracing
      description: 3-judge panel revised test case
    - value: telemetry pipeline-config for event ingestion
      description: 3-judge panel revised test case
  should_not_match:
    - value: software engineering practices for data collection pipelines
      description: 3-judge panel revised test case
    - value: data model for product catalog management
      description: 3-judge panel revised test case
    - value: event tracking implementation guide for developers
      description: 3-judge panel revised test case
    - value: metrics pipeline processing aggregated events
      description: 3-judge panel revised test case
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_telemetry_schemas
      matches:
        - ref: Evidence_telemetry_schemas
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_telemetry_schemas
      matches:
        - ref: Evidence_telemetry_schemas
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_telemetry_schemas
      matches:
        - ref: Evidence_telemetry_schemas
  regexes:
    - id: Pattern_telemetry_schemas
      pattern: (?i)\b(?:telemetry\s+(?:schema|manifest|taxonomy|specification|pipeline[\s-]config)|event\s+(?:schema|taxonomy|catalog|specification)|metrics\s+(?:schema|definition|manifest)|instrumentation\s+(?:schema|specification)|observability\s+data\s+model)\b
  keywords:
    - id: Evidence_telemetry_schemas
      groups:
        - match_style: word
          terms:
            - telemetry schema
            - telemetry manifest
            - event schema
            - metrics schema
            - instrumentation specification
            - observability data model
            - event taxonomy
            - event catalog
            - metric definition
            - instrumentation
            - event type
            - metric name
            - trace
            - span
            - telemetry pipeline
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
