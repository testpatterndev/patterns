schema: testpattern/v1
name: Internal control exception logs
slug: global-top500-174-internal-control-exception-logs
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to internal control exception logs in international contexts. This content represents internal-control exception registers (control failures, overrides,
  compensating controls, remediation entries); it is not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:internal\s+control\s+exception\s+logs|control\s+exception|exception\s+log|control\s+failure|override\s+authorization|segregation\s+of\s+duties|compensating\s+control|control\s+deviation|exception\s+report|root\s+cause\s+analysis|remediation\s+action|control\s+monitoring)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - internal control exception logs
    - internal
    - control
    - exception
    - logs
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: internal control exception logs
      description: Primary topic phrase match
    - value: control exception
      description: Case-insensitive topic phrase match
    - value: exception log
      description: Alternative topic phrase match
    - value: control failure
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to internal control exception logs appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_internal_control_exception_logs
      matches:
        - ref: Pattern_global_top500_174_internal_control_exception_logs_label_context
        - ref: Keyword_global_top500_174_internal_control_exception_logs_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_internal_control_exception_logs
      matches:
        - ref: Keyword_internal_control_exception_logs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_internal_control_exception_logs
      pattern: >-
        (?is)\b(?:internal\s+control\s+exception\s+logs|control\s+exception|exception\s+log|control\s+failure|override\s+authorization|segregation\s+of\s+duties|compensating\s+control|control\s+deviation|exception\s+report|root\s+cause\s+analysis|remediation\s+action|control\s+monitoring)\b
    - id: Pattern_global_top500_174_internal_control_exception_logs_label_context
      pattern: (?i)\b(?:internal\s+control\s+exception\s+logs)\b
  keywords:
    - id: Keyword_internal_control_exception_logs
      groups:
        - match_style: word
          terms:
            - internal control exception logs
            - control exception
            - exception log
            - control failure
            - override authorization
            - segregation of duties
            - compensating control
            - control deviation
            - exception report
            - root cause analysis
            - remediation action
            - control monitoring
      strength: specific
    - id: Keyword_global_top500_174_internal_control_exception_logs_domain_context
      groups:
        - match_style: word
          terms:
            - internal control exception logs
            - internal
            - control
            - exception
            - logs
      strength: domain
risk_description: >-
  The regex flags control exceptions, failures, overrides, segregation-of-duties issues, compensating controls, deviations, root causes, remediation actions, and monitoring rather than validating a structured exception log. A genuine log can identify which controls failed, who authorized deviations, where compensating measures are weak, and when remediation remains open, helping an insider or fraudster target known gaps. The normal exposure is a bounded set of business processes and accountable staff, while audit guidance, policy, and blank exception registers can match without live weaknesses. Risk 8 and SENSITIVE reflect serious contained control and privacy harm; PROTECTED would require broad exploitable failure across critical or protected operations.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
