schema: testpattern/v1
name: Deployment manifests
slug: au-top500-246-deployment-manifests
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies deployment-manifest and orchestration-configuration topic language in security and
  access control contexts. Discovery-only in Purview: topic vocabulary (including document
  headings such as "deployment manifest" or "helm chart") cannot distinguish an internal
  production manifest from public chart examples or guidance, so no tier enforces.
operation: >-
  Pattern type: regex (boost_regex engine). Topic phrase regex with corroborative keywords
  within 300 characters. All Purview tiers are discovery_only: the 75/85 branches corroborated
  the primary with the same-span phrase list, letting headings and Helm-chart guidance enforce;
  enforcement is withheld until an internal-context gate distinguishing private manifests from
  public workload examples is defined and reviewed.
pattern: >-
  (?is)\b(?:deployment\s+manifest|kubernetes\s+manifest|container\s+manifest|deployment\s+configuration|helm\s+chart|service\s+manifest|orchestration\s+config|pod\s+specification|deployment\s+descriptor|release\s+manifest)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - deployment manifests
    - deployment
    - manifests
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: deployment manifest
      description: Primary topic phrase match
    - value: kubernetes manifest
      description: Case-insensitive topic phrase match
    - value: container manifest
      description: Alternative topic phrase match
    - value: deployment configuration
      description: Additional topic phrase match
    - value: 'Guide to Helm chart and deployment configuration practices.'
      description: Guidance about manifests matches the topic vocabulary (discovery inventory only — no tier enforces)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: 'The event deployment plan assigns staff to gates.'
      description: Workforce-scheduling "deployment" has no manifest/orchestration phrase
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      discovery_only: true
      id_match: Pattern_deployment_manifests
      matches:
        - ref: Evidence_deployment_manifests
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      discovery_only: true
      id_match: Pattern_deployment_manifests
      matches:
        - ref: Evidence_deployment_manifests
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_deployment_manifests
      matches:
        - ref: Evidence_deployment_manifests
  regexes:
    - id: Pattern_deployment_manifests
      pattern: >-
        (?is)\b(?:deployment\s+manifest|kubernetes\s+manifest|container\s+manifest|deployment\s+configuration|helm\s+chart|service\s+manifest|orchestration\s+config|pod\s+specification|deployment\s+descriptor|release\s+manifest)\b
  keywords:
    - id: Evidence_deployment_manifests
      groups:
        - match_style: word
          terms:
            - deployment manifest
            - kubernetes manifest
            - container manifest
            - deployment configuration
            - helm chart
            - service manifest
            - orchestration config
            - pod specification
            - deployment descriptor
            - release manifest
risk_description: >-
  This classifier recognizes deployment, Kubernetes, container, and deployment-configuration manifest language, identifying an operational artifact rather than proof of a live secret. A disclosed manifest can reveal namespaces, images, service names, ports, resource settings, environment references, and dependencies that support targeted attack or disruption. The deployed service owner and users may face serious operational exposure, but an attacker still normally needs cluster access, an exploitable endpoint, or separately disclosed credentials. Risk 8 and SENSITIVE fit an internal production manifest, while embedded secrets or control of a critical multi-service deployment would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: >-
      Reduced-scope fix (TP-00372): demote all Purview tiers (85/75/65) to discovery_only — the
      75/85 branches corroborated the topic primary with the same-span phrase list, so a
      Helm-chart best-practices guide or a bare "deployment manifest" heading reached 85. The
      first-pass Kubernetes-manifest structure anchor was deliberately NOT adopted: it matches
      every public workload manifest, so full-confidence enforcement needs an internal-context
      gate (QA correction). Added guidance near-miss and workforce-deployment negative tests.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 847 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
