schema: testpattern/v1
name: Deployment manifests
slug: au-top500-246-deployment-manifests
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies deployment manifests patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:deployment\s+manifest|kubernetes\s+manifest|container\s+manifest|deployment\s+configuration|helm\s+chart|service\s+manifest|orchestration\s+config|pod\s+specification|deployment\s+descriptor|release\s+manifest)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - deployment manifests
    - deployment
    - manifests
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: deployment manifest
      description: Primary topic phrase match
    - value: kubernetes manifest
      description: Case-insensitive topic phrase match
    - value: container manifest
      description: Alternative topic phrase match
    - value: deployment configuration
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_deployment_manifests
      matches:
        - ref: Evidence_deployment_manifests
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_deployment_manifests
      matches:
        - ref: Evidence_deployment_manifests
    - confidence_level: 65
      id_match: Pattern_deployment_manifests
      matches:
        - ref: Evidence_deployment_manifests
  regexes:
    - id: Pattern_deployment_manifests
      pattern: (?is)\b(?:deployment\s+manifest|kubernetes\s+manifest|container\s+manifest|deployment\s+configuration|helm\s+chart|service\s+manifest|orchestration\s+config|pod\s+specification|deployment\s+descriptor|release\s+manifest)\b
  keywords:
    - id: Evidence_deployment_manifests
      groups:
        - match_style: word
          terms:
            - deployment manifest
            - kubernetes manifest
            - container manifest
            - deployment configuration
            - helm chart
            - service manifest
            - orchestration config
            - pod specification
            - deployment descriptor
            - release manifest
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines/chapter-11-app-11-security-of-personal-information
