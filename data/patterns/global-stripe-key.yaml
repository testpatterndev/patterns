schema: testpattern/v1
name: Stripe Key
slug: global-stripe-key
version: 1.3.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Stripe Key patterns.
operation: 'Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.'
pattern: \b(sk|pk)_(?:live|test)_[0-9a-zA-Z]{24,}\b
confidence: high
confidence_justification: 'High confidence: structurally constrained pattern with corroborative keyword support reduces false
  positive rates significantly. Added context gating and exclusion rules improve precision and reduce incidental matches.'
jurisdictions:
- global
regulations:
- Criminal Code Act 1995 (Cth)
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - api key
  - api_key
  - apikey
  - access key
  - secret key
  - private key
  - auth token
  - authorization
  proximity: 300
  keyword_lists:
  - credentials
  - data-record-context
  - generic-data-labels
test_cases:
  should_match:
  - value: sk_live_ABCDEFGHIJKLMNOPQRSTUVWXyz
    description: Stripe live secret key
  - value: pk_test_ABCDEFGHIJKLMNOPQRSTUVWXyz
    description: Stripe test publishable key
  - value: sk_test_1234567890abcdefghijklmn
    description: Stripe test secret key
  should_not_match:
  - value: sk_prod_ABCDEFGHIJKLMNOPQRSTUVWXyz
    description: Invalid mode (prod instead of live/test)
  - value: rk_test_ABCDEFGHIJKLMNOPQRSTUVWXyz
    description: Invalid key type prefix (rk instead of sk/pk)
  - value: sk_test_ABCDEFGHIJKLMNOPQRSTUVx
    description: Too few characters (23 instead of minimum 24)
  - value: template example placeholder record identifier
    description: Template/sample context should be excluded even when anchor words are present
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_stripe_key
    matches:
    - ref: Keyword_stripe
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
    min_count: 2
  - confidence_level: 75
    id_match: Regex_stripe_key
    matches:
    - ref: Keyword_global_stripe_key_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_stripe_key
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_stripe_key
    pattern: \b(sk|pk)_(?:live|test)_[0-9a-zA-Z]{24,}\b
  - id: Pattern_global_stripe_key_label_context
    pattern: (?i)\b(?:stripe\s+key|stripe|key)\b
  keywords:
  - id: Keyword_stripe
    groups:
    - match_style: word
      terms:
      - stripe
      - payment
      - sk_live
      - sk_test
      - pk_live
      - pk_test
      - api key
      - secret key
      - publishable key
      - STRIPE_SECRET_KEY
      - STRIPE_API_KEY
      - checkout
    strength: specific
  - id: Keyword_global_stripe_key_domain_context
    groups:
    - match_style: word
      terms:
      - stripe key
      - stripe
      - key
    strength: domain
risk_description: The regex matches Stripe keys across secret or publishable prefixes and live or test modes, so one detector
  spans sensitive server credentials, intentionally exposed client keys, and non-production values. A live secret key can
  authorize payment-platform API operations within its account permissions, while a publishable key is designed for client
  use and a test key affects only test-mode objects. The possible impact ranges from negligible for pk_test to serious financial
  and customer-operation harm for an unrestricted sk_live key, with the key type requiring inspection before action. Risk
  8 and SENSITIVE InfoTech fit the serious account-level misuse available through the live secret branch; PROTECTED requires
  confirmed high-privilege production authority or significant cross-account or payment-system damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
