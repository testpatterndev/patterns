schema: testpattern/v1
name: Exam answer scripts
slug: global-top500-349-exam-answer-scripts
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to exam answer scripts in international contexts. This information
  type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:exam\s+answer|answer\s+script|examination\s+paper|student\s+response|marking\s+scheme|grading\s+rubric|exam\s+booklet|test\s+paper|assessment\s+submission|exam\s+result|final\s+examination)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- pii
corroborative_evidence:
  keywords:
  - exam answer scripts
  - exam
  - answer
  - scripts
  - education
  - research
  - administration
  proximity: 300
test_cases:
  should_match:
  - value: exam answer
    description: Primary topic phrase match
  - value: answer script
    description: Case-insensitive topic phrase match
  - value: examination paper
    description: Alternative topic phrase match
  - value: student response
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: student grant
    description: Generic word pair from old broad template should not match
false_positives:
- description: Common words and phrases related to exam answer scripts appearing in policy documents, training materials,
    HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: This pattern recognizes exam answers, answer scripts, examination papers, or student responses in education
  context, indicating submitted assessment content rather than merely a student identifier. Premature or unauthorized disclosure
  can enable cheating, expose a student's reasoning and performance, compromise marking, or support plagiarism and academic
  misconduct against both learner and institution. One script has bounded scope, but the resulting grading, integrity, and
  disciplinary consequences can be serious and difficult to undo. Risk 8 and SENSITIVE are appropriate; PROTECTED would require
  a current high-stakes exam bank, institution-wide assessment compromise, or severe systemic consequences.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_exam_answer_scripts
    matches:
    - ref: Pattern_global_top500_349_exam_answer_scripts_label_context
    - ref: Keyword_global_top500_349_exam_answer_scripts_domain_context
    - ref: Keyword_exam_answer_scripts
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_exam_answer_scripts
    matches:
    - ref: Pattern_global_top500_349_exam_answer_scripts_label_context
    - ref: Keyword_global_top500_349_exam_answer_scripts_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_exam_answer_scripts
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_exam_answer_scripts
    pattern: (?is)\b(?:exam\s+answer|answer\s+script|examination\s+paper|student\s+response|marking\s+scheme|grading\s+rubric|exam\s+booklet|test\s+paper|assessment\s+submission|exam\s+result|final\s+examination)\b
  - id: Pattern_global_top500_349_exam_answer_scripts_label_context
    pattern: (?i)\b(?:exam\s+answer\s+scripts)\b
  keywords:
  - id: Keyword_exam_answer_scripts
    groups:
    - match_style: word
      terms:
      - exam answer
      - answer script
      - examination paper
      - student response
      - marking scheme
      - grading rubric
      - exam booklet
      - test paper
      - assessment submission
      - exam result
      - final examination
      - invigilator
    strength: specific
  - id: Keyword_global_top500_349_exam_answer_scripts_domain_context
    groups:
    - match_style: word
      terms:
      - exam answer scripts
      - exam
      - answer
      - scripts
    strength: domain
