schema: testpattern/v1
name: Telecom core network configurations
slug: global-top500-453-telecom-core-network-configurations
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive telecom core-network configuration records. Topic phrases are retained for
  discovery, while enforcement requires routing, subscriber, peering, node, or mobile-core
  configuration content; high confidence also requires evidence of a live network asset or identifier.
operation: >-
  Regex_telecom_core_network recognises carrier-core and mobile-core configuration topics. The topic
  alone is discovery-only at 65. Routing, subscriber, peering, or core-service configuration evidence
  raises it to 75; configuration content plus a PLMN, APN, node, peer, production, or live-network
  identifier reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:telecom\s+core\s+network|mobile\s+core\s+network|core\s+network\s+configuration|subscriber\s+routing|EPC\s+configuration|5G\s+core|IMS\s+platform|signaling\s+gateway|telecom\s+network\s+element|backbone\s+network|peering\s+configuration)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires configuration content rather than a carrier-architecture phrase alone.
  High confidence adds a live network, node, subscriber-domain, or production identifier, reducing
  matches on standards, vendor brochures, and public architecture material.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - telecom core network configurations
    - telecom
    - core
    - network
    - configurations
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - pii-personal
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: telecom core network configuration
      description: Low-tier probe - carrier-core topic without configuration content
    - value: '5G core configuration: subscriber routing, network slice policy, and Diameter peer settings'
      description: Medium-tier probe - substantive core configuration without a live asset identifier
    - value: 'Production 5G core configuration for PLMN 50501: AMF node amf-prd-02, APN enterprise, Diameter peer 10.44.2.8'
      description: High-tier probe - configuration content with production node and network identifiers
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: telecom ims
      description: Generic word pair from old broad template should not match
    - value: 'The 3GPP guide describes a generic 5G core architecture for university teaching.'
      description: Public architecture prose without configuration content
    - value: 'Training example: production 5G core configuration for PLMN 50501 with APN and Diameter peer'
      description: Explicit training content must not enforce
false_positives:
  - description: Telecom standards, vendor reference architectures, and university material discuss 5G core, EPC, IMS, and signaling components without exposing an operator configuration.
    mitigation: Keep topic-only matches discovery-only and require routing, subscriber, peering, or service-configuration content for enforcement.
  - description: Labs and worked examples can include realistic PLMN, APN, node, and peer values.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_telecom_core_network
      matches:
        - ref: Evidence_telecom_configuration
        - ref: Evidence_live_network_asset
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_telecom_core_network
      matches:
        - ref: Evidence_telecom_configuration
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_telecom_core_network
  regexes:
    - id: Regex_telecom_core_network
      pattern: >-
        (?is)\b(?:telecom\s+core\s+network|mobile\s+core\s+network|core\s+network\s+configuration|subscriber\s+routing|EPC\s+configuration|5G\s+core|IMS\s+platform|signaling\s+gateway|telecom\s+network\s+element|backbone\s+network|peering\s+configuration)\b
  keywords:
    - id: Evidence_telecom_configuration
      groups:
        - match_style: word
          terms:
            - subscriber routing
            - peering configuration
            - routing table
            - network slice policy
            - Diameter peer
            - GTP tunnel
            - subscriber profile
            - IMS routing
            - signaling route
            - trust relationship
      strength: domain
    - id: Evidence_live_network_asset
      groups:
        - match_style: word
          terms:
            - production
            - live network
            - text: PLMN
              case_sensitive: true
            - text: APN
              case_sensitive: true
            - text: MCC
              case_sensitive: true
            - text: MNC
              case_sensitive: true
            - AMF node
            - MME node
            - peer address
            - node ID
      strength: specific
risk_description: >-
  The concept detector recognizes telecom core networks, topology, subscriber routing, EPC, 5G core, IMS, signaling gateways, network elements, backbone networks, peering, and critical infrastructure rather than parsing an actual configuration file. A genuine record can expose trust relationships, routing paths, signaling components, and concentration points that support interception, outage planning, or targeted compromise. The ordinary scope is one carrier core or network segment and its subscribers and operators, while standards, architecture papers, and vendor documentation can match the same terms. For the global catalogue analogue, the confirmed substantive record is the consequence unit. Current routing, switching, trust and subscriber-control configuration can enable intrusion, interception or national communications disruption. Significant service and security damage is inherent. Risk 10 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require carrier/core identity plus live routing, switching, profile or trust configuration; architecture brochures remain excluded. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
