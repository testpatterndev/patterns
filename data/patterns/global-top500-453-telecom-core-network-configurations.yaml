schema: testpattern/v1
name: Telecom core network configurations
slug: global-top500-453-telecom-core-network-configurations
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to telecom core network configurations in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: pii-personal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:telecom\s+core\s+network|core\s+network\s+configuration|network\s+topology|subscriber\s+routing|EPC\s+configuration|5G\s+core|IMS\s+platform|signaling\s+gateway|network\s+element|critical\s+infrastructure|backbone\s+network|peering\s+configuration)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - telecom core network configurations
    - telecom
    - core
    - network
    - configurations
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - pii-personal
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: telecom core network
      description: Primary topic phrase match
    - value: core network configuration
      description: Case-insensitive topic phrase match
    - value: network topology
      description: Alternative topic phrase match
    - value: subscriber routing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: telecom ims
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to telecom core network configurations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_telecom_core_network
      matches:
        - ref: Pattern_global_top500_453_telecom_core_network_configurations_label_context
        - ref: Keyword_global_top500_453_telecom_core_network_configurations_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_telecom_core_network
      matches:
        - ref: Keyword_telecom_core_network
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_telecom_core_network
      matches:
        - ref: Keyword_telecom_core_network
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_telecom_core_network
      pattern: >-
        (?is)\b(?:telecom\s+core\s+network|core\s+network\s+configuration|network\s+topology|subscriber\s+routing|EPC\s+configuration|5G\s+core|IMS\s+platform|signaling\s+gateway|network\s+element|critical\s+infrastructure|backbone\s+network|peering\s+configuration)\b
    - id: Pattern_global_top500_453_telecom_core_network_configurations_label_context
      pattern: (?i)\\b(?:telecom\\s+core\\s+network\\s+configurations|telecom|core|network|configurations|top500)\\b
  keywords:
    - id: Keyword_telecom_core_network
      groups:
        - match_style: word
          terms:
            - telecom core network
            - core network configuration
            - network topology
            - subscriber routing
            - EPC configuration
            - 5G core
            - IMS platform
            - signaling gateway
            - network element
            - critical infrastructure
            - backbone network
            - peering configuration
    - id: Keyword_global_top500_453_telecom_core_network_configurations_domain_context
      groups:
        - match_style: word
          terms:
            - telecom core network configurations
            - telecom
            - core
            - network
            - configurations
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
