schema: testpattern/v1
name: Singapore Unique Entity Number
slug: sg-uen
version: 1.0.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Singapore Unique Entity Numbers (UEN) issued by ACRA and other agencies to businesses and
  other entities. Common forms are 8 or 9 digits plus a check letter (local companies) and the issued-year form
  TyyPQnnnnX / SyyPQnnnnX / RyyPQnnnnX used for other entities.
operation: >-
  Structural UEN formats only; check letter algorithm not enforced. Corroborative evidence: UEN/ACRA
  keywords within 300 characters. Keyword lists: business-identifier.
pattern: '\b(?:\d{8}[A-Z]|\d{9}[A-Z]|(?:T|S|R)\d{2}[A-Z]{2}\d{4}[A-Z])\b'
confidence: medium
confidence_justification: >-
  Medium confidence: digit+letter patterns can collide with other IDs; UEN/ACRA/entity
  keywords substantially improve precision.
jurisdictions:
  - sg
regulations:
  - "PDPA (SG)"
  - "ACRA Act"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - business-identifier
  - government-id
corroborative_evidence:
  keywords:
    - UEN
    - unique entity number
    - ACRA
    - entity number
  proximity: 300
  keyword_lists:
    - business-identifier
test_cases:
  should_match:
    - value: '200312345A'
      description: 9-digit local company UEN style
    - value: '12345678A'
      description: 8-digit older local company style
    - value: T13LL0001B
      description: Issued-year other-entity UEN
  should_not_match:
    - value: '1234567A'
      description: Only 7 digits before check letter
    - value: A13LL0001B
      description: Invalid year prefix letter A
    - value: T13L0001B
      description: Only one entity-type letter instead of two
false_positives:
  - description: >-
      Other agency file numbers with similar shapes.
    mitigation: >-
      Require UEN/ACRA/business registration keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_sg_uen
      matches:
        - ref: Keyword_sg_uen_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_sg_uen
      matches:
        - ref: Keyword_sg_uen_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_sg_uen
  regexes:
    - id: Regex_sg_uen
      pattern: '\b(?:\d{8}[A-Z]|\d{9}[A-Z]|(?:T|S|R)\d{2}[A-Z]{2}\d{4}[A-Z])\b'
  keywords:
    - id: Keyword_sg_uen_specific
      groups:
        - match_style: word
          terms:
            - UEN
            - unique entity number
            - UEN number
            - ACRA UEN
            - entity registration number
      strength: specific
    - id: Keyword_sg_uen_broad
      groups:
        - match_style: word
          terms:
            - ACRA
            - business registration
            - Singapore company
            - BizFile
            - entity number
            - registered entity
      strength: specific
risk_rating: 5
risk_description: >-
  UEN identifies legal entities and is often public, but in internal files it links financial, tax and ownership records.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: "IN CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://www.uen.gov.sg/ueninternet/faces/pages/admin/aboutUEN.jspx
    title: About UEN - Singapore
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Initial mature identifier SIT — Phase-1 coverage backlog (Purview-safe regex, full label/risk metadata for pack workbooks)'
