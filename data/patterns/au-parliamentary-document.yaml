schema: testpattern/v1
name: Parliamentary Document
slug: au-parliamentary-document
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive Australian question-time briefs, Senate Estimates briefs, parliamentary
  question responses, and parliamentary correspondence briefs. Topic phrases are retained for
  discovery; enforcement requires likely-question, response, talking-point, media-line, key-fact,
  supplementary-question, answer, portfolio, or hearing content, and high confidence also requires
  draft, embargo, clearance, question-number, or other pre-release handling evidence.
operation: >-
  Regex_parliamentary_brief recognises QTB, question-time, Senate Estimates, estimates-committee,
  parliamentary-question-response, and parliamentary-correspondence brief topics. The topic alone is
  discovery-only at 65. Substantive question/response content raises it to 75; pre-release handling or
  formal question/brief evidence reaches 85. Enforcing tiers reject explicit templates and training.
pattern: >-
  (?is)\b(?:QTB|question\s+time\s+brief|Senate\s+Estimates\s+brief|estimates\s+committee\s+brief|parliamentary\s+question\s+response|parliamentary\s+correspondence\s+brief)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive question/response material. High confidence adds pre-release
  handling or formal question/brief evidence.
jurisdictions:
  - au
regulations:
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- DISP
- ISO 27001
- NIST CSF
data_categories:
  - government
test_cases:
  should_match:
    - value: question time brief
      description: Low-tier probe - parliamentary brief topic without response content
    - value: 'Question time brief: likely question, suggested response, talking points, media lines, key facts, anticipated supplementary question, and portfolio issue'
      description: Medium-tier probe - substantive response content without pre-release handling
    - value: 'Question time brief QTB-204: likely question, proposed answer, talking points, media lines, key facts, not for release, and clearance required'
      description: High-tier probe - substantive response with formal brief and pre-release handling
  should_not_match:
    - value: The parliamentary cafe serves lunch daily
      description: Non-match 1
    - value: A tour of Parliament House
      description: Tourism context
    - value: 'The public guide explains the purpose of question time briefs.'
      description: Public process guidance without a live response brief
    - value: 'Training example: question time brief QTB-204 with likely question, proposed answer, and not for release'
      description: Explicit training content must not enforce
false_positives:
  - description: Public parliamentary guidance, published transcripts, and media commentary discuss questions, answers, talking points, and estimates without containing a pre-release response brief.
    mitigation: Keep parliamentary brief topics discovery-only and require likely-question, response, talking-point, media-line, key-fact, supplementary, answer, portfolio, or hearing content.
  - description: Training briefs can contain realistic question numbers, draft answers, media lines, embargoes, and clearance instructions.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This keyword classifier recognises parliamentary questions, question-time briefs, Senate Estimates material, talking points, suggested responses, and parliamentary correspondence rather than tourism or general Parliament references. Before tabling or delivery, a genuine document can expose anticipated scrutiny, draft answers, policy positions, operational facts, and communications strategy that enable political manipulation or prejudice an official response. The impact is serious but normally confined to one parliamentary issue, and many documents become public after use or release. Risk 8 SENSITIVE Government is defensible for the pre-release record; PROTECTED is not met without Cabinet material, national-security operations, life-safety effects, or credible significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_parliamentary_brief
      matches:
        - ref: Evidence_parliamentary_response_content
        - ref: Evidence_parliamentary_prerelease
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_parliamentary_brief
      matches:
        - ref: Evidence_parliamentary_response_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_parliamentary_brief
  regexes:
    - id: Regex_parliamentary_brief
      pattern: >-
        (?is)\b(?:QTB|question\s+time\s+brief|Senate\s+Estimates\s+brief|estimates\s+committee\s+brief|parliamentary\s+question\s+response|parliamentary\s+correspondence\s+brief)\b
  keywords:
    - id: Evidence_parliamentary_response_content
      groups:
        - match_style: word
          terms:
            - likely question
            - suggested response
            - proposed answer
            - talking points
            - media lines
            - key facts
            - anticipated supplementary
            - portfolio issue
            - committee hearing
      strength: domain
    - id: Evidence_parliamentary_prerelease
      groups:
        - match_style: word
          terms:
            - draft response
            - draft answer
            - not for release
            - embargoed
            - clearance required
            - approved lines
            - question number
            - brief number
            - text: QTB-
              case_sensitive: true
      strength: specific
created: '2026-02-09'
updated: '2026-07-04'
