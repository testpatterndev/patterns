schema: testpattern/v1
name: Constituent service case notes
slug: global-top500-400-constituent-service-case-notes
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies case notes and files maintained by elected representatives or electorate offices for
  constituent inquiries, complaints, and service requests. Topic phrases are retained for discovery;
  enforcement requires constituent, issue, agency, consent, action, referral, follow-up, ownership,
  outcome, or correspondence fields, and high confidence also requires a formal case reference or status.
operation: >-
  Regex_constituent_service recognises constituent-service case notes, files, inquiries, and complaints.
  The topic alone is discovery-only at 65. Substantive case-management fields raise it to 75; a formal
  case reference or status reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:constituent\s+service\s+(?:case\s+notes|case\s+file|request)|constituent\s+(?:inquiry|complaint)\s+case|electorate\s+office\s+case\s+notes)\b
confidence: medium
confidence_justification: Medium confidence requires substantive case-management fields. High confidence adds a formal case reference or status.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - constituent service case notes
  proximity: 240
test_cases:
  should_match:
    - value: constituent service case notes
      description: Low-tier probe - constituent-case topic without management fields
    - value: 'Constituent service case notes: constituent name, issue raised, agency contacted, consent to disclose, action taken, referral made, follow-up date, case owner, outcome sought, and correspondence summary'
      description: Medium-tier probe - substantive case notes without formal reference or status
    - value: 'Constituent service case notes, case reference: CSC-2026-104: constituent name, issue raised, agency contacted, consent to disclose, action taken, referral made, follow-up date, case owner, outcome sought, correspondence summary, and status escalated'
      description: High-tier probe - substantive case with reference and status
  should_not_match:
    - value: The customer-service system stores case notes and follow-up dates.
      description: Commercial support case outside constituent services
    - value: The public page explains how to contact the electorate office.
      description: Public office guidance without a constituent case
    - value: 'Training example: constituent service case notes CSC-2026-104 with agency contacted, action taken, and status escalated'
      description: Explicit training content must not enforce
false_positives:
  - description: Commercial service desks and public electorate-office guidance use case, contact, referral, follow-up, and outcome language without containing a constituent matter.
    mitigation: Require an explicit constituent-service or electorate-office case before considering case-management fields.
  - description: Training cases can contain realistic constituent details, agency contacts, references, actions, and statuses.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_constituent_service
      matches:
        - ref: Evidence_constituent_case
        - ref: Evidence_constituent_formal_status
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_constituent_service
      matches:
        - ref: Evidence_constituent_case
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_constituent_service
  regexes:
    - id: Regex_constituent_service
      pattern: >-
        (?is)\b(?:constituent\s+service\s+(?:case\s+notes|case\s+file|request)|constituent\s+(?:inquiry|complaint)\s+case|electorate\s+office\s+case\s+notes)\b
    - id: Evidence_constituent_formal_status
      pattern: >-
        (?i)\b(?:(?:case|matter)\s+(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|status\s*[:=-]?\s*(?:open|closed|pending|referred|escalated|resolved))\b
  keywords:
    - id: Evidence_constituent_case
      groups:
        - match_style: word
          terms:
            - constituent name
            - issue raised
            - agency contacted
            - consent to disclose
            - action taken
            - referral made
            - follow-up date
            - case owner
            - outcome sought
            - correspondence summary
      strength: domain
risk_description: >-
  The classifier finds constituent-service records through case-note, case-manager, service-request, and related government context. A normal case can combine a person's identity, complaint, hardship, agency interactions, and political-office correspondence, so disclosure may cause embarrassment, retaliation concerns, or interference with assistance. The impact is serious for the constituent but ordinarily confined to a bounded service matter and a small group of officials. Risk 8 supports SENSITIVE Personal-Privacy; PROTECTED would require an active safety issue, protected complainant, or systemic exposure of many constituents.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
