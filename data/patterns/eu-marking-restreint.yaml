schema: testpattern/v1
name: EU Marking - RESTREINT UE/EU RESTRICTED (EUCI ladder)
slug: eu-marking-restreint
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Detects European Union Classified Information (EUCI) protective markings as defined in Article 2(2)
  of Council Decision 2013/488/EU: the four bilingual French/English classification levels rendered
  together as a single marking — RESTREINT UE/EU RESTRICTED, CONFIDENTIEL UE/EU CONFIDENTIAL, SECRET
  UE/EU SECRET and TRÈS SECRET UE/EU TOP SECRET (the slash carries no surrounding spaces and TRÈS
  carries a grave accent, per the primary source). Named historically for RESTREINT but scopes the
  full EUCI ladder. The single-language French components (RESTREINT UE, CONFIDENTIEL UE, SECRET UE,
  TRÈS SECRET UE) are matched at a lower tier. Marking syntax verified directly against the Council
  Decision text; matched case-sensitively.
operation: >-
  Tier 85 matches the canonical dual French/English EUCI marking (e.g. RESTREINT UE/EU RESTRICTED)
  exactly as defined in Council Decision 2013/488/EU Article 2(2), tolerant of hyphen or
  PDF-line-wrap-inserted whitespace between the wrappable tokens. Tier 75 matches the single-language
  French components (RESTREINT UE / CONFIDENTIEL UE / SECRET UE / TRÈS SECRET UE) — these are the exact
  French halves of the verified dual markings, each carrying the distinctive "UE" (Union Européenne)
  marker. Both tiers carry only a template/noise NOT-exclusion — the case-sensitive structured marking
  token is the high-confidence evidence.
pattern: '\bRESTREINT[\s-]+UE/EU[\s-]+RESTRICTED\b|\bCONFIDENTIEL[\s-]+UE/EU[\s-]+CONFIDENTIAL\b|\bSECRET[\s-]+UE/EU[\s-]+SECRET\b|\b(?:TRÈS|TRES)[\s-]+SECRET[\s-]+UE/EU[\s-]+TOP[\s-]+SECRET\b'
confidence: high
confidence_justification: >-
  High confidence on the dual French/English forms: "RESTREINT UE/EU RESTRICTED" and its ladder are
  structurally unmistakable — the bilingual "<FR-LEVEL> UE/EU <EN-LEVEL>" construction with the
  no-space slash appears nowhere in natural language and is verified verbatim against Council Decision
  2013/488/EU. The single-language French components (75) carry the distinctive trailing "UE" EU marker
  and are the exact French halves of the verified markings, so they too have negligible natural-language
  collision. The English-only halves (EU RESTRICTED, EU CONFIDENTIAL, EU SECRET, EU TOP SECRET) are
  deliberately not matched as a standalone tier, to avoid the higher false-positive surface of an "EU "
  prefix on common English classification words — documented below.
jurisdictions:
  - eu
regulations:
  - "Council Decision 2013/488/EU"
frameworks:
  - EUCI
data_categories:
  - government
  - security-classification
case_sensitive: true
corroborative_evidence:
  keywords:
    - European Union
    - EUCI
    - Council of the European Union
    - Union Européenne
    - classified information
  proximity: 300
test_cases:
  should_match:
    - value: "This document is marked RESTREINT UE/EU RESTRICTED and must be stored in an Administrative Area."
      description: Canonical lowest EUCI level, dual French/English form, verified verbatim against Council Decision 2013/488/EU Article 2(2)
    - value: "Cover page: SECRET UE/EU SECRET — handling per the Council security rules."
      description: SECRET-level dual marking
    - value: "The annex is classified TRÈS SECRET UE/EU TOP SECRET (grave accent on TRÈS per the source)."
      description: Highest EUCI level, dual marking with the grave-accented TRÈS
    - value: "Header reads CONFIDENTIEL UE/EU\nCONFIDENTIAL for the working-party papers."
      description: PDF line-wrap between the French and English halves (the [\s-]+ separator tolerates a wrap-inserted newline)
    - value: "Le dossier porte la mention CONFIDENTIEL UE dans l'en-tête."
      description: Single-language French component (CONFIDENTIEL UE) — the French half of the verified dual marking
  should_not_match:
    - value: "the document is restreint ue/eu restricted according to the summary note"
      description: lowercase prose (case-sensitive exclusion — the marking regex only matches the ALL-CAPS bilingual token)
    - value: "THE EUROPEAN UNION (EU) RESTRICTED PUBLIC ACCESS TO THE ARCHIVE DURING THE REVIEW"
      description: ALL-CAPS prose with "EU RESTRICTED" but no "UE/EU" bilingual construction — fails at the regex level (the dual marking requires the contiguous UE/EU token)
    - value: "THIS IS A SECRET AND CONFIDENTIAL BUSINESS PLAN FOR OUR EU EXPANSION"
      description: ALL-CAPS prose containing SECRET, CONFIDENTIAL and EU but not the EUCI bilingual marking — fails at the regex level
false_positives:
  - description: ALL-CAPS prose (headings, legal boilerplate, or fully-capitalised documents) can defeat the case-sensitivity signal, but only if it reproduces the exact bilingual "<FR-LEVEL> UE/EU <EN-LEVEL>" (or the French "<FR-LEVEL> UE") construction — which is itself the marking, so residual collision is very low.
    mitigation: The dual-form tier (85) is structurally near-unique; treat single-language French-component hits (75) as lower confidence in all-caps context. Corroborative EU/EUCI keywords within 300 characters reinforce genuine marking context.
  - description: >-
      The single-language ENGLISH halves (EU RESTRICTED, EU CONFIDENTIAL, EU SECRET, EU TOP SECRET) are
      real components of the verified markings but are not shipped as a standalone tier: an "EU " prefix
      on common English classification words (especially EU RESTRICTED / EU SECRET) carries a materially
      higher false-positive surface than the French components, whose classification words (RESTREINT,
      CONFIDENTIEL) do not occur in ordinary English text.
    mitigation: Documented as a deliberate scoping decision rather than shipped. The English halves are still detected whenever they appear as part of the canonical dual marking (tier 85).
  - description: >-
      This SIT's SECRET / CONFIDENTIAL / TOP SECRET vocabulary overlaps with the US/UK/NZ/AU marking
      families, but the mandatory UE/EU bilingual construction (85) and the trailing UE marker (75) mean
      a genuine EUCI marking is structurally distinct from those nations' bare-word tiers; a document
      carrying both an EUCI marking and a national marking is expected to fire both SITs as corroborating
      signals.
    mitigation: No mitigation needed — the bilingual/UE structure makes the EUCI forms distinct from national bare-word markings.
exports:
  - purview_xml
  - yaml
scope: narrow
risk_rating: 10
risk_description: >-
  EUCI markings protect information whose unauthorised disclosure could prejudice the interests of the
  European Union or one or more Member States, ranging from RESTREINT UE/EU RESTRICTED (disadvantageous)
  up to TRÈS SECRET UE/EU TOP SECRET (exceptionally grave prejudice to the essential interests of the
  EU), per Council Decision 2013/488/EU.
sensitivity_labels:
  euci: "RESTREINT UE/EU RESTRICTED / CONFIDENTIEL UE/EU CONFIDENTIAL / SECRET UE/EU SECRET / TRÈS SECRET UE/EU TOP SECRET"
  us_gov: "CUI / CONFIDENTIAL / SECRET / TOP SECRET"
  uk_gov: "OFFICIAL-SENSITIVE / SECRET / TOP SECRET"
  pspf: "OFFICIAL: Sensitive / PROTECTED / SECRET / TOP SECRET"
  ca_gov: "Protected B / Confidential / Secret / Top Secret"
references:
  - url: https://eur-lex.europa.eu/eli/dec/2013/488/oj/eng
    title: "Council Decision 2013/488/EU of 23 September 2013 on the security rules for protecting EU classified information — EUR-Lex"
  - url: https://www.legislation.gov.uk/eudn/2013/488/body/data.xht?view=snippet&wrap=true
    title: "Council Decision 2013/488/EU, Article 2(2) — legislation.gov.uk (verbatim EUCI classification levels)"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_eu_euci_dual
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_eu_euci_french
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_eu_euci_dual
      pattern: '\bRESTREINT[\s-]+UE/EU[\s-]+RESTRICTED\b|\bCONFIDENTIEL[\s-]+UE/EU[\s-]+CONFIDENTIAL\b|\bSECRET[\s-]+UE/EU[\s-]+SECRET\b|\b(?:TRÈS|TRES)[\s-]+SECRET[\s-]+UE/EU[\s-]+TOP[\s-]+SECRET\b'
    - id: Regex_eu_euci_french
      pattern: '\bRESTREINT[\s-]+UE\b|\bCONFIDENTIEL[\s-]+UE\b|\bSECRET[\s-]+UE\b|\b(?:TRÈS|TRES)[\s-]+SECRET[\s-]+UE\b'
created: '2026-07-07'
updated: '2026-07-07'
changelog:
  - version: 1.0.0
    date: '2026-07-07'
    description: Initial release — verified dual French/English EUCI ladder (RESTREINT UE/EU RESTRICTED through TRÈS SECRET UE/EU TOP SECRET) at tier 85 and the single-language French components at tier 75, per direct verification against Council Decision 2013/488/EU Article 2(2). English-only halves documented as a deliberate skip.
