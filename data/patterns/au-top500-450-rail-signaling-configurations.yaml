schema: testpattern/v1
name: Rail signaling configurations
slug: au-top500-450-rail-signaling-configurations
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to rail signaling configurations in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Three-tier purview detection: high confidence (85) matches rail signaling/interlocking structural pattern with signaling evidence and template exclusion; medium confidence (75) matches with signaling evidence; low confidence (65) matches structural pattern alone. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:rail\s+signaling\s+configurations|track\s+circuit|axle\s+counter|block\s+section|route\s+setting|wayside\s+equipment|signal\s+aspect|critical\s+infrastructure)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - rail signaling configurations
    - rail
    - signaling
    - configurations
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: rail signaling configurations
      description: Primary topic phrase match
    - value: track circuit
      description: Case-insensitive topic phrase match
    - value: axle counter
      description: Alternative topic phrase match
    - value: block section
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: rail signal configuration
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to rail signaling configurations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_rail_signaling
      matches:
        - ref: Evidence_rail_signaling
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_rail_signaling
      matches:
        - ref: Evidence_rail_signaling
    - confidence_level: 65
      id_match: Pattern_rail_signaling
      matches:
        - ref: Evidence_rail_signaling
  regexes:
    - id: Pattern_rail_signaling
      pattern: (?is)\b(?:rail\s+signaling\s+configurations|track\s+circuit|axle\s+counter|block\s+section|route\s+setting|wayside\s+equipment|signal\s+aspect|critical\s+infrastructure)\b
  keywords:
    - id: Evidence_rail_signaling
      groups:
        - match_style: word
          terms:
            - rail signaling configurations
            - signaling
            - interlocking
            - track circuit
            - axle counter
            - block section
            - route setting
            - wayside equipment
            - ETCS
            - ATP
            - signal aspect
            - critical infrastructure
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.legislation.gov.au/C2018A00029/latest/text
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
