schema: testpattern/v1
name: DISP/Defence Industry Marker
slug: au-disp-defence-industry
version: 1.4.1
type: keyword_list
pattern_class: concept
description: Detects references to Defence Industry Security Program (DISP) membership and defence industry security markers in Australian documents.
operation: >-
  Keyword-only pattern using Purview regex engine. The Purview regex Pattern_disp_phrase matches phrases such as DISP membership, DISP accreditation, Defence Industry Security Program, defence
  contractor, ITAR controlled, controlled technology, and AGSVA clearance. Three confidence tiers: High (85) requires defence context + security program keywords with template exclusion logic; Medium
  (75) requires defence context keywords; Low (65) requires only the regex match. Evidence uses 2 keyword groups (7 defence context terms, 9 security program terms) within 300-character proximity.
  Template/sample exclusion prevents false positives from training materials.
confidence: medium
confidence_justification: >-
  Medium confidence: keyword-based detection relies on phrase-matching regex within the Purview engine. Corroborative evidence keywords are needed for reliable identification since defence-related
  terms can appear in non-DISP contexts.
jurisdictions:
  - au
regulations:
  - Criminal Code Act 1995 (Cth)
  - Defence Act 1903 (Cth)
  - Defence Trade Controls Act 2012 (Cth)
frameworks:
  - QGISCF
data_categories:
  - government
  - defence
  - sensitive-data
test_cases:
  should_match:
    - value: 'DISP membership level: Governance and Personnel Security'
      description: Matches 'DISP membership' via Pattern_disp_phrase
    - value: Defence Industry Security Program clearance required
      description: Matches 'Defence Industry Security Program' via Pattern_disp_phrase
    - value: The defence contractor holds DISP accreditation
      description: Matches 'defence contractor' and 'DISP accreditation' via Pattern_disp_phrase
  should_not_match:
    - value: The industry conference was well attended
      description: No DISP phrase matched by the Purview regex
    - value: Security guard dispatched to site
      description: No DISP phrase present
false_positives:
  - description: Generic use of defence or security in non-DISP contexts.
    mitigation: Require DISP-specific terms or defence industry program references.
exports:
  - yaml
scope: narrow
risk_rating: 7
risk_description: >-
  This keyword pattern finds DISP membership or accreditation, Defence Industry Security Program references, defence-contractor status, ITAR-controlled work, controlled technology, and AGSVA clearance language. Disclosure can identify an organisation or worker associated with controlled defence activity and improve adversary reconnaissance, supplier targeting, or social-engineering pretexts. The normal hit is a programme-status or security-context marker rather than protected technology, system access, or an operational plan, so further content is needed for high-impact compromise. Risk 7 SENSITIVE Government reflects credible targeting harm; PROTECTED is not met without protected technical data, exploitable access paths, defence operations, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  regexes:
    - id: Pattern_disp_phrase
      pattern: >-
        (?i)\b(?:DISP\s+(?:member(?:ship)?|accredit(?:ation|ed)|level|clearance)|Defence\s+Industry\s+Security\s+Program|defence\s+(?:contractor|supplier|procurement)|ITAR\s+(?:controlled|compliance)|controlled\s+technology|AGSVA\s+(?:clearance|vetting))\b
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_disp_phrase
      matches:
        - ref: Evidence_defence_context
        - ref: Evidence_security_program
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_disp_phrase
      matches:
        - ref: Evidence_defence_context
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_disp_phrase
  keywords:
    - id: Evidence_defence_context
      groups:
        - match_style: word
          terms:
            - defence
            - defense
            - military
            - strategic
            - national security
            - export
            - controlled
      strength: domain
    - id: Evidence_security_program
      groups:
        - match_style: word
          terms:
            - defence
            - defense
            - military
            - national security
            - classified
            - restricted
            - controlled
            - strategic
            - export control
      strength: domain
created: '2026-02-09'
updated: '2026-07-14'
