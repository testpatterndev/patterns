schema: testpattern/v1
name: EU DORA ICT Risk Management Framework
slug: eu-dora-ict-risk-framework
version: 1.1.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects DORA Article 6 ICT risk management framework documentation and the digital operational resilience strategy of financial entities — board-approved framework documents, risk tolerance statements, and internal audit reviews of the framework. These documents describe the entity's defensive architecture, control gaps, and risk appetite; disclosure hands attackers a map of weaknesses.
operation: 'Keyword proximity: primary topic phrases (ICT risk management framework, digital operational resilience strategy) within 300 characters of Article 6 vocabulary (risk tolerance level, information security objectives, key performance indicators, digital operational resilience testing, Regulation (EU) 2022/2554). Negative keyword exclusion for regulator publications, consultancy explainers, and training material. Concept classifier: matches the topic, not identifier-grade evidence.'
pattern: (?i)\b(?:ICT\s+risk\s+management\s+framework|digital\s+operational\s+resilience\s+strategy)\b
confidence: medium
confidence_justification: 'Medium confidence: honest topic matcher. ''ICT risk management framework'' and ''digital operational resilience strategy'' are DORA Article 6 defined phrases, and the 85 tier additionally requires Article 6 vocabulary (risk tolerance level, information security objectives, key performance indicators, digital operational resilience testing). The phrases also appear across the DORA advisory ecosystem — consultancy and academic material is suppressed only by noise exclusions.'
jurisdictions:
  - eu
regulations:
- "Regulation (EU) 2022/2554 (DORA)"
frameworks:
- ISO 27001
data_categories:
  - financial
  - security
  - governance
corroborative_evidence:
  keywords:
    - ICT risk management framework
    - digital operational resilience strategy
    - risk tolerance level
    - ICT risk
    - information security objectives
    - key performance indicators
    - digital operational resilience testing
    - ICT-related incident
    - communication strategy
    - Regulation (EU) 2022/2554
    - DORA
    - financial entity
  proximity: 300
  keyword_lists:
    - corporate-governance
test_cases:
  should_match:
    - value: |-
        ICT Risk Management Framework — version 3.2, approved by the Board 12/06/2026.
        Scope: this framework is maintained as a sound, comprehensive and well-documented ICT risk management framework in accordance with Article 6 of Regulation (EU) 2022/2554 (DORA).
        Section 4 sets the risk tolerance level for ICT risk in line with the group risk appetite.
        Annex A defines information security objectives and key performance indicators.
      description: Board-approved framework document with risk tolerance and KPIs
    - value: 'Digital operational resilience strategy 2026-2028. Objectives: reduce mean recovery time for ICT-related incidents to under 2 hours; complete the digital operational resilience testing programme across all critical or important functions; maintain the communication strategy for ICT-related incidents requiring disclosure to clients and counterparts.'
      description: Multi-year resilience strategy with testing and communication objectives
    - value: 'Internal audit review — ICT risk management framework. Findings: the risk tolerance level for ICT risk has not been reviewed since 2024; information security objectives lack measurable key performance indicators; the digital operational resilience strategy is not aligned with the current outsourcing register. Rating: partially effective. Remediation owners assigned.'
      description: Internal audit findings exposing framework control gaps
  should_not_match:
    - value: 'New on our blog post series: what is an ICT risk management framework under DORA, and where should firms start? Read the explainer and subscribe to the newsletter for part two.'
      description: Consultancy blog explainer about the framework requirement
    - value: The supervisor's press release announces guidance on proportionate application of the ICT risk management framework requirements for smaller financial entities, following the consultation paper published in March.
      description: Regulator press release about framework guidance
    - value: Week 9 of the fintech regulation course covers DORA; the tutorial asks students to sketch a digital operational resilience strategy for a fictional payment institution.
      description: Academic course tutorial with fictional strategy exercise
false_positives:
  - description: Consultancy marketing, law-firm alerts, and academic writing about DORA Article 6 requirements
    mitigation: 'Negative keyword exclusion: ''explainer'', ''blog post'', ''newsletter'', ''press release'', ''consultation paper'', ''academic'', ''training course''. Advisory content reuses the regulation''s phrases; residual matches are expected for a topic classifier.'
  - description: Policy templates and vendor GRC-tool boilerplate containing framework headings
    mitigation: Shared template-exclusion dictionary (template, boilerplate, sample, placeholder) as NOT evidence on every tier
  - description: Generic enterprise risk-management documents that mention ICT risk without being the DORA framework
    mitigation: Primary phrases require the full multi-word DORA terms of art, not 'ICT risk' alone; 85 tier requires Article 6 vocabulary in proximity
  - description: Quoted regulation text in compliance gap assessments against other frameworks (e.g. ISO 27001 mappings)
    mitigation: Accepted concept-class collision — such mappings genuinely describe the entity's framework posture and are usually similarly sensitive
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_eu_dora_ict_risk_framework_topic_terms
      matches:
        - ref: Evidence_eu_dora_ict_risk_framework_primary
        - ref: Evidence_eu_dora_ict_risk_framework_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_dora_ict_risk_framework_exclusion
    - confidence_level: 75
      id_match: Pattern_eu_dora_ict_risk_framework_topic_terms
      matches:
        - ref: Evidence_eu_dora_ict_risk_framework_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_dora_ict_risk_framework_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_eu_dora_ict_risk_framework_topic_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_dora_ict_risk_framework_exclusion
  regexes:
    - id: Pattern_eu_dora_ict_risk_framework_topic_terms
      pattern: (?i)\b(?:ICT\s+risk\s+management\s+framework|digital\s+operational\s+resilience\s+strategy)\b
  keywords:
    - id: Evidence_eu_dora_ict_risk_framework_primary
      groups:
        - match_style: word
          terms:
            - ICT risk management framework
            - digital operational resilience strategy
      strength: specific
    - id: Evidence_eu_dora_ict_risk_framework_corroborative
      groups:
        - match_style: word
          terms:
            - risk tolerance level
            - information security objectives
            - key performance indicators
            - digital operational resilience testing
            - ICT-related incident
            - communication strategy
            - Regulation (EU) 2022/2554
            - text: DORA
              case_sensitive: true
            - financial entity
            - risk appetite
      strength: domain
    - id: Filter_eu_dora_ict_risk_framework_exclusion
      groups:
        - match_style: word
          terms:
            - press release
            - media statement
            - consultation paper
            - explainer
            - webinar
            - newsletter
            - blog post
            - academic
            - training course
      strength: noise
risk_rating: 4
risk_description: >-
  The EU DORA concept detector recognises Article 6 ICT risk-framework material through risk tolerance, resilience strategy, security objectives, performance indicators, and internal-audit terms, with public-material exclusions. Published regulation, consultancy commentary, and templates can match, whereas an attributed internal framework may reveal control gaps and defensive priorities useful to an attacker. A topic-level hit lacks direct harm until current organisational ownership, residual risk, or implementation weakness is present. Risk 4 and OFFICIAL fit public or generic framework material; SENSITIVE requires a board-approved internal framework or gap assessment exposing current exploitable weaknesses.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
