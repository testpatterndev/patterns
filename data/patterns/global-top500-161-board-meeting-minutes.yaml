schema: testpattern/v1
name: Board meeting minutes
slug: global-top500-161-board-meeting-minutes
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to board meeting minutes in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:board\s+meeting\s+minutes|board\s+of\s+directors|board\s+resolution|corporate\s+governance|board\s+agenda|board\s+secretary|fiduciary\s+duty|annual\s+general\s+meeting|board\s+approval|directors\s+meeting)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - board meeting minutes
    - board
    - meeting
    - minutes
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: board meeting minutes
      description: Primary topic phrase match
    - value: board of directors
      description: Case-insensitive topic phrase match
    - value: board resolution
      description: Alternative topic phrase match
    - value: corporate governance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to board meeting minutes appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_board_meeting_minutes
      matches:
        - ref: Pattern_global_top500_161_board_meeting_minutes_label_context
        - ref: Keyword_global_top500_161_board_meeting_minutes_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_board_meeting_minutes
      matches:
        - ref: Keyword_board_meeting_minutes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_board_meeting_minutes
      pattern: >-
        (?is)\b(?:board\s+meeting\s+minutes|board\s+of\s+directors|board\s+resolution|corporate\s+governance|board\s+agenda|board\s+secretary|fiduciary\s+duty|annual\s+general\s+meeting|board\s+approval|directors\s+meeting)\b
    - id: Pattern_global_top500_161_board_meeting_minutes_label_context
      pattern: (?i)\b(?:board\s+meeting\s+minutes)\b
  keywords:
    - id: Keyword_board_meeting_minutes
      groups:
        - match_style: word
          terms:
            - board meeting minutes
            - board of directors
            - board resolution
            - quorum
            - corporate governance
            - board agenda
            - board secretary
            - fiduciary duty
            - shareholder
            - annual general meeting
            - board approval
            - directors meeting
      strength: specific
    - id: Keyword_global_top500_161_board_meeting_minutes_domain_context
      groups:
        - match_style: word
          terms:
            - board meeting minutes
            - board
            - meeting
            - minutes
      strength: domain
risk_description: >-
  The concept pattern recognizes board minutes, directors, resolutions, agendas, governance, approvals, and fiduciary-duty language; it cannot distinguish an executed minute book from governance guidance. Actual minutes can consolidate directors' deliberations, votes, unreleased financial matters, executive decisions, disputes, and planned transactions, giving competitors or litigants material insight. The affected unit is one organization and the people or matters discussed at a meeting, while public governance documents and agenda templates remain plausible matches. Risk 8 and SENSITIVE reflect serious contained corporate and personal consequences; PROTECTED would require Cabinet-equivalent deliberation, protected operations, or significant national or critical-service damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
