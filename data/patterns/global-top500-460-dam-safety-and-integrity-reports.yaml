schema: testpattern/v1
name: Dam safety and integrity reports
slug: global-top500-460-dam-safety-and-integrity-reports
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to dam safety and integrity reports in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:dam\s+safety|dam\s+integrity|structural\s+inspection|dam\s+failure|spillway\s+capacity|flood\s+risk|seismic\s+assessment|embankment\s+stability|inundation\s+map|critical\s+infrastructure|consequence\s+classification|surveillance\s+report)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - dam safety and integrity reports
    - dam
    - safety
    - integrity
    - reports
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: dam safety
      description: Primary topic phrase match
    - value: dam integrity
      description: Case-insensitive topic phrase match
    - value: structural inspection
      description: Alternative topic phrase match
    - value: dam failure
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: dam safety report
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to dam safety and integrity reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_dam_safety
      matches:
        - ref: Pattern_global_top500_460_dam_safety_and_integrity_reports_label_context
        - ref: Keyword_global_top500_460_dam_safety_and_integrity_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_dam_safety
      matches:
        - ref: Keyword_dam_safety
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_dam_safety
      pattern: >-
        (?is)\b(?:dam\s+safety|dam\s+integrity|structural\s+inspection|dam\s+failure|spillway\s+capacity|flood\s+risk|seismic\s+assessment|embankment\s+stability|inundation\s+map|critical\s+infrastructure|consequence\s+classification|surveillance\s+report)\b
    - id: Pattern_global_top500_460_dam_safety_and_integrity_reports_label_context
      pattern: (?i)\b(?:dam\s+safety\s+and\s+integrity\s+reports)\b
  keywords:
    - id: Keyword_dam_safety
      groups:
        - match_style: word
          terms:
            - dam safety
            - dam integrity
            - structural inspection
            - dam failure
            - spillway capacity
            - flood risk
            - seismic assessment
            - embankment stability
            - inundation map
            - critical infrastructure
            - consequence classification
            - surveillance report
      strength: specific
    - id: Keyword_global_top500_460_dam_safety_and_integrity_reports_domain_context
      groups:
        - match_style: word
          terms:
            - dam safety and integrity reports
            - dam
            - safety
            - integrity
            - reports
      strength: domain
risk_description: >-
  This concept SIT recognises dam safety, structural inspection, spillway capacity, embankment stability, inundation maps, and related integrity language; it does not prove that a current engineering report or defect register is present. A genuine report can disclose failure modes, degraded components, flood consequences, and inspection gaps that support sabotage, unsafe interference, or targeted disinformation. The normal exposure is serious for one dam operator and downstream community, while public safety standards and educational engineering material remain common matches. Risk 8 and SENSITIVE fit that contained consequence; PROTECTED would require a current exploitable weakness with a credible prospect of major flooding, widespread service loss, or significant life-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
