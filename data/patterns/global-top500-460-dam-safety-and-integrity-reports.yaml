schema: testpattern/v1
name: Dam safety and integrity reports
slug: global-top500-460-dam-safety-and-integrity-reports
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive dam-safety, integrity, surveillance, failure, inundation, and consequence
  reports. Topic phrases are retained for discovery; enforcement requires condition or monitoring
  findings, and high confidence also requires a severe weakness, overdue remediation, emergency action,
  failure mode, or downstream consequence.
operation: >-
  Regex_dam_safety recognises dam-safety report topics. The topic alone is discovery-only at 65.
  Spillway, embankment, seepage, instrumentation, inspection, defect, or remedial-work findings raise it
  to 75; those findings plus severe failure, instability, overtopping, emergency, or downstream-impact
  evidence reach 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:dam\s+safety\s+and\s+integrity\s+reports?|dam\s+safety\s+report|dam\s+integrity\s+report|dam\s+surveillance\s+report|dam\s+failure\s+analysis|dam\s+inundation\s+map|dam\s+consequence\s+category)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires an engineering condition or monitoring finding rather than a public dam
  reference. High confidence adds a severe weakness or consequence, distinguishing actionable reports
  from standards and routine summaries.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - location
  - security
corroborative_evidence:
  keywords:
    - dam safety and integrity reports
    - dam
    - safety
    - integrity
    - reports
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: dam safety and integrity report
      description: Low-tier probe - report topic without engineering findings
    - value: 'Dam surveillance report: piezometer readings show increased seepage at the eastern embankment; remedial works are scheduled'
      description: Medium-tier probe - engineering condition findings without severe failure evidence
    - value: 'Dam integrity report: excessive seepage and a longitudinal crack indicate embankment instability; emergency action is required for downstream population at risk'
      description: High-tier probe - condition findings with severe weakness and downstream consequence
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: dam safety report
      description: Bare report title surfaces only in discovery
    - value: 'The public ANCOLD standard describes dam safety management principles.'
      description: Public standard without asset-specific engineering findings
    - value: 'Training example: dam integrity report with excessive seepage, instability, and emergency action'
      description: Explicit training content must not enforce
false_positives:
  - description: Public standards, annual summaries, and emergency-planning guidance discuss dam safety, surveillance, seepage, and failure consequences without revealing a live engineering weakness.
    mitigation: Keep report titles discovery-only and require a condition, instrumentation, defect, or remediation finding for enforcement.
  - description: Exercises and training scenarios can include severe seepage, cracks, instability, emergency actions, and downstream consequences.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_dam_safety
      matches:
        - ref: Evidence_dam_condition_finding
        - ref: Evidence_dam_severe_consequence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_dam_safety
      matches:
        - ref: Evidence_dam_condition_finding
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_dam_safety
  regexes:
    - id: Regex_dam_safety
      pattern: >-
        (?is)\b(?:dam\s+safety\s+and\s+integrity\s+reports?|dam\s+safety\s+report|dam\s+integrity\s+report|dam\s+surveillance\s+report|dam\s+failure\s+analysis|dam\s+inundation\s+map|dam\s+consequence\s+category)\b
  keywords:
    - id: Evidence_dam_condition_finding
      groups:
        - match_style: word
          terms:
            - spillway
            - embankment
            - seepage
            - piezometer
            - deformation
            - inspection finding
            - defect
            - monitoring instrument
            - remedial works
      strength: domain
    - id: Evidence_dam_severe_consequence
      groups:
        - match_style: word
          terms:
            - excessive seepage
            - instability
            - crack
            - overtopping
            - failure mode
            - remediation overdue
            - emergency action
            - population at risk
            - downstream consequence
      strength: specific
risk_description: >-
  This concept SIT recognises dam safety, structural inspection, spillway capacity, embankment stability, inundation maps, and related integrity language; it does not prove that a current engineering report or defect register is present. A genuine report can disclose failure modes, degraded components, flood consequences, and inspection gaps that support sabotage, unsafe interference, or targeted disinformation. The normal exposure is serious for one dam operator and downstream community, while public safety standards and educational engineering material remain common matches. Risk 8 and SENSITIVE fit that contained consequence; PROTECTED would require a current exploitable weakness with a credible prospect of major flooding, widespread service loss, or significant life-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
