schema: testpattern/v1
name: Card verification values
slug: au-top500-106-card-verification-values
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Detects references to card verification values in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation. Phrase-level
  concept detection anchored on explicit card-verification vocabulary; it does not parse 3- or 4-digit CVV values.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:card\s+verification\s+value|card\s+security\s+code|card\s+validation)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - card verification values
    - card
    - verification
    - values
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: card verification value
      description: Primary topic phrase match
    - value: card security code
      description: Case-insensitive topic phrase match
    - value: card validation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
    - value: Email verification code expires in ten minutes.
      description: Generic verification-code wording demoted out of the primary - no card relation
    - value: PCI DSS cardholder policy update
      description: PCI and cardholder-data wording demoted out of the primary - corroborative evidence only
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_card_verification_values
      matches:
        - ref: Evidence_card_verification_values
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_card_verification_values
      matches:
        - ref: Evidence_card_verification_values
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_card_verification_values
      matches:
        - ref: Evidence_card_verification_values
  regexes:
    - id: Pattern_card_verification_values
      pattern: (?is)\b(?:card\s+verification\s+value|card\s+security\s+code|card\s+validation)\b
  keywords:
    - id: Evidence_card_verification_values
      groups:
        - match_style: word
          terms:
            - card verification value
            - text: CVV
              case_sensitive: true
            - text: CVC
              case_sensitive: true
            - text: CID
              case_sensitive: true
            - card security code
            - verification code
            - card validation
            - PCI DSS
            - cardholder data
            - payment card
            - card-not-present
            - three-digit code
      strength: specific
risk_description: >-
  The regex recognises card-verification-value, card-security-code, verification-code, and card-validation phrases with financial context rather than parsing a three- or four-digit CVV. A genuine document containing a CVV could enable card-not-present fraud when paired with a PAN, but the normal match supplies neither the code nor the card account. The affected cardholder therefore faces little direct harm from the phrase alone, and PCI guidance, forms, and payment documentation are expected benign sources. Risk 4 OFFICIAL reflects that topic-level correlation value; SENSITIVE would require an actual verification value linked to card data.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.5.0
    date: '2026-07-17'
    description: 'Reduced-scope alignment fix (TP-00233): narrow the primary IdMatch to explicit card-verification concepts (card verification value, card security code, card validation); generic verification-code, PCI DSS, cardholder-data, payment-card, and three-digit-code wording is demoted to corroborative evidence only, so OTP/email-verification prose can no longer satisfy enforceable tiers. Numeric 3/4-digit CVV parsing rejected for this concept SIT (a value detector would need its own retention-policy-reviewed identifier SIT). Bare CVV/CVC/CID acronyms deliberately kept out of the case-insensitive primary; they remain case-sensitive evidence.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 708 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
