schema: testpattern/v1
name: Trade Union Membership
slug: global-trade-union-membership
version: 1.2.0
type: keyword_list
pattern_class: concept
engine: universal
description: >-
  Detects references to trade union membership: union member status, union dues, shop stewards,
  collective bargaining unit membership and union local numbers. GDPR Article 9 lists trade union
  membership as a special category of personal data with no fixed format — detectable only by topic
  vocabulary. Topic-grade detector.
operation: >-
  Phrase regex matching indicative trade-union-membership terminology (union member, union dues, shop
  steward, collective bargaining unit member, union local). Detects the presence of union-membership
  subject matter; not a structured-token detector. Pair with corroborative keywords to raise precision.
pattern: '(?i)\b(?:trade\s+union\s+members?|union\s+members?(?:hip)?|union\s+dues|shop\s+stewards?|collective\s+bargaining\s+unit\s+members?|union\s+local\s+(?:number|no\.?|#)?\s*\d*|union\s+affiliations?|paid-up\s+union\s+members?|union\s+enrol?ment)\b'
confidence: low
confidence_justification: >-
  Low by design. Trade union membership is a GDPR Article 9 special category with no fixed format, so
  it is detected purely by topic vocabulary. Terms like "union" appear in many non-labour contexts
  (European Union, credit union, student union); the regex is scoped to union-membership phrases, and
  hits should be paired with corroborative keywords (labour, employer, dues, steward) to raise precision.
jurisdictions:
  - global
  - eu
regulations:
  - GDPR
frameworks:
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - union
    - labour
    - labor
    - employer
    - workplace
    - dues
    - steward
    - bargaining
  proximity: 300
test_cases:
  should_match:
    - value: 'HR record lists the employee as a paid-up union member since 2019.'
      description: Union member term present
    - value: 'Payroll deducts union dues each month for the bargaining unit.'
      description: Union dues term present
    - value: 'The shop steward filed the grievance on behalf of the worker.'
      description: Shop steward term present
    - value: 'Profile notes collective bargaining unit member status and union local 405.'
      description: Collective bargaining unit member / union local terms present
  should_not_match:
    - value: 'The quarterly sales report shows revenue grew across all regions.'
      description: Unrelated business prose, no union terms
    - value: 'The European Union announced new tariff schedules this week.'
      description: Near-miss ("Union" but not union membership), no labour vocabulary
    - value: 'She opened a savings account at the local credit union branch.'
      description: Credit union is a bank, not trade-union membership
false_positives:
  - description: >-
      The word "union" appears in unrelated terms (European Union, credit union, student union, union
      of sets) that have nothing to do with trade-union membership.
    mitigation: >-
      The regex targets union-membership phrases (union member, union dues, shop steward) rather than
      the bare word "union"; require corroborative keywords (dues, steward, bargaining, employer) for
      confidence.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: broad
risk_rating: 7
risk_description: >-
  Trade union membership is a GDPR Article 9 special category; disclosure can lead to anti-union
  retaliation, discrimination in hiring or promotion, and blacklisting.
sensitivity_labels:
  us_gov: CUI Basic
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-09'
changelog:
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-04'
    description: 'PDF-safety: literal inter-word spaces in phrase regex replaced with \s+ so line-wrapped text still matches'
author: testpattern-community
license: MIT
keywords:
  - trade union member
  - union membership
  - union member
  - union dues
  - shop steward
  - collective bargaining unit member
  - union local number
  - union affiliation
  - paid-up union member
references:
  - url: https://gdpr-info.eu/art-9-gdpr/
    title: GDPR Article 9 — processing of special categories of personal data (trade union membership)
