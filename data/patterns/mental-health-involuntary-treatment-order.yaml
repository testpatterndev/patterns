schema: testpattern/v1
name: Mental Health Involuntary Treatment Order
slug: mental-health-involuntary-treatment-order
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects involuntary treatment orders (ITOs) under the Mental Health Act 2016 (Qld) including treatment authority documents, Mental Health Review Tribunal decisions, forensic orders, and authorised doctor assessments. These records contain the most sensitive details about a person's psychiatric condition, involuntary detention, and compulsory treatment — disclosure causes severe harm to the individual's dignity, employment, and personal relationships.
operation: 'Keyword proximity: primary keywords (involuntary treatment order, ITO, mental health review tribunal, treatment authority, forensic order, authorised doctor) within 300 characters of corroborative keywords (PROTECTED, Privacy, Mental Health Act 2016, patient, clinical file number). Reference format detection for ITO-YYYY-NNNNN and MH-YYYY-NNNN case numbers. Negative keyword exclusion for mental health awareness campaigns, policy documents, and training materials.'
pattern: (?i)\b(involuntary\s+treatment\s+order|treatment\s+authority|mental\s+health\s+review\s+tribunal|forensic\s+order|authorised\s+doctor\s+(?:assessment|examination|recommendation)|ITO-\d{4}-\d{3,5}|MH-\d{4}-\d{3,4})\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of involuntary treatment terminology with patient identifiers and clinical references. Generic mental health policy language without patient details does not trigger detection.'
jurisdictions:
  - au
regulations:
- "Human Rights Act 2019 (Qld)"
- "IPA 2009 (Qld)"
- "Mental Health Act 2016 (Qld)"
frameworks:
- QGISCF
data_categories:
  - health
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Privacy
    - involuntary treatment order
    - ITO
    - treatment authority
    - Mental Health Act 2016
    - forensic order
    - authorised doctor
    - mental health review tribunal
    - patient
    - clinical file number
    - examination authority
    - community treatment order
    - inpatient treatment
    - electroconvulsive therapy
    - seclusion
    - restraint
    - treating psychiatrist
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED Privacy. Involuntary Treatment Order — Mental Health Act 2016 (Qld) Part 3. Patient: David James RICHARDSON, DOB 15/08/1992, Clinical File No. MH-2026-3471. An authorised doctor assessment was conducted on 04/03/2026 at the Park Centre for Mental Health. The patient meets criteria for an involuntary treatment order under s.12. Treatment authority issued for inpatient treatment including antipsychotic medication. Review by Mental Health Review Tribunal scheduled within 28 days.'
      description: Involuntary treatment order with patient identifiers and clinical file reference
    - value: 'Queensland Health — Mental Health Review Tribunal Decision. Case Reference: ITO-2026-08742. In the matter of the review of the forensic order for Karen Michelle SUNG. The Tribunal is satisfied that the patient continues to present a risk as described under s.117 of the Mental Health Act 2016. The forensic order is confirmed. The authorised doctor is directed to continue the current treatment authority. Next review date: 15/09/2026.'
      description: Mental Health Review Tribunal decision on a forensic order review
    - value: 'Memorandum — Authorised Doctor Recommendation. Re: Community Treatment Order for patient MRN 6729841. The examination authority was exercised at the Townsville University Hospital Emergency Department on 02/03/2026. The patient was assessed as requiring involuntary treatment under s.13 Mental Health Act 2016 (Qld). Clinical presentation: acute psychotic episode with paranoid ideation. Treating psychiatrist: Dr Anita Kapoor. Recommendation: community treatment order with fortnightly depot injection and weekly case manager review.'
      description: Authorised doctor recommendation for a community treatment order
  should_not_match:
    - value: Queensland Health launched a new mental health awareness campaign encouraging Queenslanders to seek early support. The campaign highlights the importance of mental health first aid training and reducing stigma in the community.
      description: Mental health awareness campaign material with no patient details
    - value: The Department of Health published a review of the Mental Health Act 2016 examining whether the legislative framework adequately protects the rights of consumers. The review used de-identified aggregate data from 2,500 tribunal hearings.
      description: Policy review document using aggregate de-identified data
    - value: In the documentary 'Breaking Point' (2025), the filmmaker explores the experiences of individuals who have been subject to involuntary treatment in psychiatric facilities across Australia. All participants consented and used pseudonyms.
      description: Documentary description about mental health with anonymised participants
false_positives:
  - description: Mental health awareness and anti-stigma campaign materials
    mitigation: 'Negative keyword exclusion: ''awareness campaign'', ''mental health first aid'', ''reducing stigma'', ''community education''. Require proximity to actual patient identifiers or case numbers.'
  - description: Published policy reviews and legislative reform documents discussing the Mental Health Act framework
    mitigation: 'Negative keyword exclusion: ''policy review'', ''legislative reform'', ''parliamentary inquiry'', ''de-identified'', ''aggregate data''. Require co-occurrence with operational terms like ''clinical file number'' or ''treatment authority''.'
  - description: Academic research on involuntary treatment outcomes using anonymised cohort data
    mitigation: 'Negative keyword exclusion: ''research'', ''study'', ''anonymised'', ''cohort'', ''participants'', ''journal'', ''published'''
  - description: Training materials for mental health clinicians using fictional case scenarios
    mitigation: 'Negative keyword exclusion: ''training module'', ''case scenario'', ''fictional'', ''example patient'', ''learning exercise'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: Involuntary treatment order terminology with patient identifiers (MRN, DOB, clinical file number) and ITO/MH case references
    - tier: medium
      confidence: 75
      description: 2+ involuntary treatment keywords with classification markers within 300 characters
    - tier: low
      confidence: 65
      description: 1 involuntary treatment keyword with 2+ corroborative terms within 300 characters
  regexes:
    - name: involuntary_treatment_terms
      pattern: (?i)\b(involuntary\s+treatment\s+order|treatment\s+authority|mental\s+health\s+review\s+tribunal|forensic\s+order|authorised\s+doctor|community\s+treatment\s+order|examination\s+authority)\b
    - name: ito_case_reference
      pattern: \bITO-\d{4}-\d{3,5}\b
    - name: mh_case_reference
      pattern: \bMH-\d{4}-\d{3,4}\b
  keywords:
    - name: primary_keywords
      words:
        - involuntary treatment order
        - treatment authority
        - mental health review tribunal
        - forensic order
        - authorised doctor
        - community treatment order
        - examination authority
        - inpatient treatment order
        - ITO
        - compulsory treatment
    - name: classification_markers
      words:
        - PROTECTED
        - Privacy
        - CONFIDENTIAL
        - SENSITIVE
    - name: corroborative_terms
      words:
        - patient
        - clinical file number
        - MRN
        - date of birth
        - Mental Health Act 2016
        - treating psychiatrist
        - electroconvulsive therapy
        - seclusion
        - restraint
        - antipsychotic medication
        - depot injection
        - case manager
    - name: negative_keywords
      words:
        - awareness campaign
        - mental health first aid
        - reducing stigma
        - community education
        - policy review
        - legislative reform
        - parliamentary inquiry
        - de-identified
        - aggregate data
        - training module
        - fictional
        - case scenario
        - published
        - research
        - anonymised
  filters:
    - type: exclude
      description: Exclude awareness campaigns, policy reviews, training materials, and published research
      keywords:
        - awareness campaign
        - mental health first aid
        - reducing stigma
        - policy review
        - legislative reform
        - de-identified
        - aggregate data
        - training module
        - fictional
        - case scenario
        - anonymised
        - research paper
risk_rating: 8
risk_description: Disclosure reveals involuntary psychiatric detention, compulsory treatment details, and forensic mental health orders linked to identifiable individuals. Causes severe harm to dignity, employment prospects, insurance access, and personal relationships. Subject to strict legislative protections under the Mental Health Act 2016. While highly sensitive, this data must be transferable between authorised agencies for service delivery and statutory obligations. Disclosure could cause significant personal distress and privacy harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
references: []
