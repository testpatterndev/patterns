schema: testpattern/v1
name: National identity number
slug: au-top500-022-national-identity-number
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to national identity number in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:national\s+identity\s+number|identity\s+document|national\s+ID|government\s+ID|identity\s+card|proof\s+of\s+identity|identification\s+number|citizen\s+number|identity\s+verification|personal\s+identification)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - national identity number
    - national
    - identity
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: national identity number
      description: Primary topic phrase match
    - value: identity document
      description: Case-insensitive topic phrase match
    - value: national ID
      description: Alternative topic phrase match
    - value: government ID
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to national identity number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 90
      id_match: Pattern_national_identity_number
      matches:
        - ref: Pattern_au_top500_022_national_identity_number_label_context
        - ref: Keyword_au_top500_022_national_identity_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_022_national_identity_number_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_national_identity_number
      matches:
        - ref: Evidence_national_identity_number
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_022_national_identity_number_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_national_identity_number
      matches:
        - ref: Evidence_national_identity_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_022_national_identity_number_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_national_identity_number
      matches:
        - ref: Evidence_national_identity_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_022_national_identity_number_noise_exclusion
  regexes:
    - id: Pattern_national_identity_number
      pattern: (?is)\b(?:national\s+identity\s+number|identity\s+document|national\s+ID|government\s+ID|identity\s+card|proof\s+of\s+identity|identification\s+number|citizen\s+number|identity\s+verification|personal\s+identification)\b
    - id: Pattern_au_top500_022_national_identity_number_label_context
      pattern: (?i)\\b(?:national\\s+identity\\s+number|national|identity|top500)\\b
  keywords:
    - id: Evidence_national_identity_number
      groups:
        - match_style: word
          terms:
            - national identity number
            - identity document
            - national ID
            - government ID
            - identity card
            - proof of identity
            - identification number
            - citizen number
            - identity verification
            - personal identification
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_022_national_identity_number_domain_context
      groups:
        - match_style: word
          terms:
            - national identity number
            - national
            - identity
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_022_national_identity_number_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
