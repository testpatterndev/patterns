schema: testpattern/v1
name: Secrets vault exports
slug: au-top500-276-secrets-vault-exports
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to secrets vault exports in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword lists: classification-australia-government.'
pattern: (?is)\b(?:secrets\s+vault\s+exports|vault\s+export|hashicorp\s+vault|azure\s+key\s+vault|aws\s+secrets\s+manager|secret\s+rotation|credential\s+vault|key\s+vault|secret\s+store|vault\s+backup|sealed\s+secrets)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - secrets vault exports
  proximity: 240
  keyword_lists:
    - classification-australia-government
    - data-record-context
test_cases:
  should_match:
    - value: secrets vault exports
      description: Primary topic phrase match
    - value: vault export
      description: Case-insensitive topic phrase match
    - value: hashicorp vault
      description: Alternative topic phrase match
    - value: azure key vault
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: secret mfa
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to secrets vault exports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_secrets_vault_exports
      matches:
        - ref: Evidence_secrets_vault_exports
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_secrets_vault_exports
      matches:
        - ref: Evidence_secrets_vault_exports
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_secrets_vault_exports
      matches:
        - ref: Evidence_secrets_vault_exports
  regexes:
    - id: Pattern_secrets_vault_exports
      pattern: (?is)\b(?:secrets\s+vault\s+exports|vault\s+export|hashicorp\s+vault|azure\s+key\s+vault|aws\s+secrets\s+manager|secret\s+rotation|credential\s+vault|key\s+vault|secret\s+store|vault\s+backup|sealed\s+secrets)\b
  keywords:
    - id: Evidence_secrets_vault_exports
      groups:
        - match_style: word
          terms:
            - secrets vault exports
            - vault export
            - hashicorp vault
            - azure key vault
            - aws secrets manager
            - secret rotation
            - credential vault
            - key vault
            - secret store
            - vault backup
            - sealed secrets
    - id: Evidence_data_record_context
      groups:
        - match_style: word
          terms:
            - field
            - column
            - row
            - entry
            - record
            - value
            - form
            - register
            - database
            - extract
            - export
            - spreadsheet
            - table
            - schedule
            - appendix
            - attachment
            - registry
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
