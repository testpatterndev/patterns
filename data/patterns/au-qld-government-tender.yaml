schema: testpattern/v1
name: QLD Government Tender Document
slug: au-qld-government-tender
version: 1.4.2
type: keyword_proximity
pattern_class: concept
description: Detects QLD Government tender documents including procurement evaluations, pricing schedules, and evaluation criteria.
operation: 'Keyword-based detection. Corroborative evidence: 14 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - government
  - financial
test_cases:
  should_match:
    - value: Tender invitation issued
      description: Exact 65 discovery probe with a procurement document phrase and no response details
    - value: 'Tender invitation: evaluation criteria attached'
      description: Exact 75 probe with tender-process evidence
    - value: 'Queensland Government tender invitation: evaluation criteria attached'
      description: Exact 85 probe with tender-process and QLD Government context
    - value: 'QLD Government request for tender: evaluation criteria and value for money'
      description: QLD Government request for tender with evaluation details
    - value: QTender procurement tender submission with selection criteria
      description: Test match 2
    - value: Tender evaluation report and standing offer arrangement details
      description: Test match 3
  should_not_match:
    - value: Tender loving care
      description: Non-match 1
    - value: Legal tender accepted
      description: Non-match 2
    - value: Tender invitation software demo
      description: Product-demo wording must remain discovery-only
false_positives:
  - description: Metaphorical or currency use of tender.
    mitigation: Require procurement or RFT keywords alongside tender.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The keyword pattern identifies Queensland tender packages and evaluation records containing selection criteria, procurement submissions, pricing schedules, value-for-money analysis, or standing-offer details. Premature disclosure can help a supplier optimize against confidential scoring, undercut rivals, coordinate bids, or challenge a process using information unavailable to competitors. The agency, evaluators, bidders, and public procurement outcome may suffer serious but procurement-bounded financial and integrity harm. Risk 8 and SENSITIVE Government fit that non-public package, while protected operational requirements or government-wide strategic damage would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_tender_document
          - Pattern_rfq_rft
      matches:
        - ref: Evidence_tender_process_context
        - ref: Evidence_qld_government
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_tender_document
          - Pattern_rfq_rft
      matches:
        - ref: Evidence_tender_process_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_tender_document
          - Pattern_rfq_rft
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_tender_document
      pattern: (?i)\b(?:request\s+for\s+(?:tender|quotation)|rft\/\d{4}\/\d{4,5}|tender\s+(?:invitation|document|evaluation\s+report))\b
    - id: Pattern_rfq_rft
      pattern: (?i)\b(?:rfq|rft|qtender|procurement\s+(?:id|reference)|queensland\s+government\s+procurement)\b
  keywords:
    - id: Evidence_procurement
      groups:
        - match_style: word
          terms:
            - request for tender
            - text: RFT
              case_sensitive: true
            - request for quotation
            - text: RFQ
              case_sensitive: true
            - tender response
            - tender evaluation
            - procurement
            - supplier registration
            - contract
            - purchase order
      strength: domain
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - QTender
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
    - id: Evidence_tender_process_context
      groups:
        - match_style: word
          terms:
            - evaluation criteria
            - selection criteria
            - tender submission
            - tender response
            - submission deadline
            - value for money
            - supplier
            - contract terms
            - standing offer arrangement
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: align the evidence-gated detector to keyword_proximity, keep tender/RFT document phrases at 65 discovery, require independent evaluation or submission evidence at 75 and QLD procurement provenance at 85, broaden QTender/evaluation-report coverage, and add exact-tier plus demo probes.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 577 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - tender document
  - request for tender
  - RFT
  - procurement
  - evaluation criteria
  - tender submission
  - tender response
  - value for money
  - QTender
  - QLD procurement
  - standing offer arrangement
  - tender evaluation
  - selection criteria
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
