schema: testpattern/v1
name: Payroll bank account details
slug: au-top500-081-payroll-bank-account-details
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to payroll bank account details in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters. Keyword lists:
  financial-deposit-terms, industry-hr.
pattern: \bpayroll\s+bank\s+account\s+details\b
confidence: low
confidence_justification: 'Low confidence marker: phrase-based artifact detection to bootstrap line-by-line coverage. Requires corroborative evidence and later hardening to high-confidence structural patterns.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payroll bank account details
    - payroll
    - bank
    - account
    - details
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
    - industry-hr
test_cases:
  should_match:
    - value: 'Payroll bank account details'
      description: Topic phrase present
    - value: 'payroll bank account details'
      description: Topic phrase, lowercase
    - value: 'this record references the payroll bank account details held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_payroll_bank_account_details
      matches:
        - ref: Evidence_payroll_bank_account_details
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_payroll_bank_account_details
      matches:
        - ref: Evidence_payroll_bank_account_details
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_payroll_bank_account_details
  regexes:
    - id: Pattern_payroll_bank_account_details
      pattern: \bpayroll\s+bank\s+account\s+details\b
  keywords:
    - id: Evidence_payroll_bank_account_details
      groups:
        - match_style: word
          terms:
            - payroll bank account details
            - bank account
            - payroll
            - direct deposit
            - text: BSB
              case_sensitive: true
            - account number
            - salary payments
            - wage deposit
            - electronic funds transfer
            - text: EFT
              case_sensitive: true
            - remuneration
            - pay run
      strength: specific
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
