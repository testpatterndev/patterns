schema: testpattern/v1
name: Mortgage underwriting packets
slug: au-top500-124-mortgage-underwriting-packets
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to mortgage underwriting packets in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:mortgage\s+underwriting|mortgage\s+application|property\s+valuation|APS\s+220|mortgage\s+assessment|home\s+loan|borrower\s+income|settlement\s+statement|mortgage\s+approval)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - mortgage underwriting packets
    - mortgage
    - underwriting
    - packets
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: mortgage underwriting
      description: Primary topic phrase match
    - value: mortgage application
      description: Case-insensitive topic phrase match
    - value: property valuation
      description: Alternative topic phrase match
    - value: APS 220
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_mortgage_underwriting
      matches:
        - ref: Evidence_mortgage_underwriting
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_mortgage_underwriting
      matches:
        - ref: Evidence_mortgage_underwriting
    - confidence_level: 65
      id_match: Pattern_mortgage_underwriting
      matches:
        - ref: Evidence_mortgage_underwriting
  regexes:
    - id: Pattern_mortgage_underwriting
      pattern: (?is)\b(?:mortgage\s+underwriting|mortgage\s+application|property\s+valuation|APS\s+220|mortgage\s+assessment|home\s+loan|borrower\s+income|settlement\s+statement|mortgage\s+approval)\b
  keywords:
    - id: Evidence_mortgage_underwriting
      groups:
        - match_style: word
          terms:
            - mortgage underwriting
            - mortgage application
            - property valuation
            - loan-to-value
            - LVR
            - APS 220
            - mortgage assessment
            - home loan
            - borrower income
            - debt-to-income
            - settlement statement
            - mortgage approval
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://handbook.apra.gov.au/standard/aps-220
  - https://www.apra.gov.au/credit-risk-management
