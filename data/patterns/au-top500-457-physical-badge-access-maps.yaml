schema: testpattern/v1
name: Physical badge access maps
slug: au-top500-457-physical-badge-access-maps
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to physical badge access maps in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:physical\s+badge\s+access\s+maps|badge\s+access|access\s+control|door\s+access|card\s+reader|security\s+zone|restricted\s+area|entry\s+point|facility\s+access|clearance\s+level|critical\s+infrastructure)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - physical badge access maps
    - physical
    - badge
    - access
    - maps
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: physical badge access maps
      description: Primary topic phrase match
    - value: badge access
      description: Case-insensitive topic phrase match
    - value: access control
      description: Alternative topic phrase match
    - value: door access
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: badge access zone
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to physical badge access maps appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_badge_access
      matches:
        - ref: Evidence_badge_access
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_badge_access
      matches:
        - ref: Evidence_badge_access
    - confidence_level: 65
      id_match: Pattern_badge_access
      matches:
        - ref: Evidence_badge_access
  regexes:
    - id: Pattern_badge_access
      pattern: (?is)\b(?:physical\s+badge\s+access\s+maps|badge\s+access|access\s+control|door\s+access|card\s+reader|security\s+zone|restricted\s+area|entry\s+point|facility\s+access|clearance\s+level|critical\s+infrastructure)\b
  keywords:
    - id: Evidence_badge_access
      groups:
        - match_style: word
          terms:
            - physical badge access maps
            - badge access
            - access control
            - door access
            - card reader
            - security zone
            - restricted area
            - perimeter
            - entry point
            - facility access
            - clearance level
            - critical infrastructure
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
