schema: testpattern/v1
name: Physical badge access maps
slug: au-top500-457-physical-badge-access-maps
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to physical badge access maps in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?i)\b(?:physical\s+badge\s+access\s+maps?|badge\s+access\s+(?:map|log|list|control\s+list)|card\s+reader\s+(?:log|access\s+log)|door\s+access\s+(?:log|control\s+list)|facility\s+access\s+map|security\s+zone\s+map)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
- global
regulations:
- AML/CTF Act (Cth)
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- ISO 27001
- ISO 27701
data_categories:
- pii
corroborative_evidence:
  keywords:
  - physical badge access maps
  - badge access
  - card reader
  - door access
  - security zone
  - floor plan
  - building
  - employee id
  - badge id
  - clearance level
  proximity: 300
test_cases:
  should_match:
  - value: physical badge access maps for building 3, level 2
  - value: badge access log for the east wing, badge ID 4821
  - value: card reader log shows entries at zone 4 door 12
  should_not_match:
  - value: our access control policy applies to all employees
  - value: badge access zone
  - value: unrelated generic text without domain phrases
  - value: placeholder value 12345
  - value: role-based access control for the API
false_positives:
- description: Common words and phrases related to physical badge access maps appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
- description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_badge_access
    matches:
    - ref: Evidence_badge_access
      min_count: 2
      unique_results: true
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 75
    id_match: Pattern_badge_access
    matches:
    - ref: Evidence_badge_access
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    id_match: Pattern_badge_access
    matches:
    - ref: Evidence_badge_access
  regexes:
  - id: Pattern_badge_access
    pattern: >-
      (?i)\b(?:physical\s+badge\s+access\s+maps?|badge\s+access\s+(?:map|log|list|control\s+list)|card\s+reader\s+(?:log|access\s+log)|door\s+access\s+(?:log|control\s+list)|facility\s+access\s+map|security\s+zone\s+map)\b
  keywords:
  - id: Evidence_badge_access
    groups:
    - match_style: word
      terms:
      - physical badge access maps
      - badge access
      - card reader
      - door access
      - security zone
      - floor plan
      - building
      - employee id
      - badge id
      - clearance level
risk_description: >-
  This concept detector finds physical badge access maps, door or card-reader logs, facility access lists, and security-zone layouts. Disclosure could show an intruder which credentials reach particular areas, where access controls are concentrated, or when named badge holders enter a facility. A genuine map or log can affect many staff and visitors at one site, creating serious privacy and physical-security harm without necessarily exposing a protected location. Risk 8 and SENSITIVE Personal-Privacy are justified; PROTECTED would require critical facilities, protected operations, or a credible life-safety consequence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
