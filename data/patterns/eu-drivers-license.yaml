schema: testpattern/v1
name: EU Driver's License Number
slug: eu-drivers-license
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects EU driver's license number patterns across all EU member states. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to
  enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Broad keyword-based detection for EU driver's license references. Matches alphanumeric sequences of 5-20 characters at word boundaries combined with driver's license keywords. Corroborative
  evidence: 5 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[A-Z0-9]{5,20}\b
confidence: medium
confidence_justification: >-
  Medium confidence: broad pattern covering multiple EU member state formats. Corroborative keywords are essential for reliable detection due to the wide range of formats matched. Added context gating
  and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - eu
regulations:
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - driver
    - licence
    - license
    - driving
    - DL
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: AB123456
      description: Common EU format with letter prefix and digits
    - value: A1B2C3D4E5
      description: Mixed alphanumeric EU driver's license format
    - value: XY98765432
      description: Longer alphanumeric format used by some EU states
  should_not_match:
    - value: ABCD
      description: Too few characters (4 instead of minimum 5)
    - value: A1B2C3D4E5F6G7H8I9J0K
      description: Too many characters (21 instead of maximum 20)
    - value: demo mock test data id flag
      description: >-
        Template/sample context negative — this pattern has no numeric structural component (broad 5-20
        char alnum shape), so unlike the numeric identifier patterns the fix is word-length rather than
        digit-count: every token is under the 5-character minimum (demo/mock/test/data are 4 chars, id/flag
        are 2-4), so the universal-engine top-level regex correctly does not match anywhere in the value,
        while the tokens are still drawn from the template-exclusion dictionary (demo, mock) to preserve
        the template/placeholder framing for the Purview-tier NOT-group this test case also exercises
false_positives:
  - description: Generic alphanumeric sequences matching the broad EU driver's license format appearing in unrelated contexts such as product codes, serial numbers, or reference identifiers.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm driver's license context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_eu_drivers_license
      matches:
        - ref: Pattern_eu_drivers_license_label_context
        - ref: Keyword_eu_drivers_license_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_eu_drivers_license
      matches:
        - ref: Keyword_eu_drivers_license
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_eu_drivers_license
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_eu_drivers_license
      pattern: \b[A-Z0-9]{5,20}\b
    - id: Pattern_eu_drivers_license_label_context
      pattern: (?i)\b(?:eu\s+driver's\s+license\s+number|driver|license|drivers)\b
  keywords:
    - id: Keyword_eu_drivers_license
      groups:
        - match_style: word
          terms:
            - driver
            - licence
            - license
            - driving
            - text: DL
              case_sensitive: true
            - driver's licence
            - driver's license
            - permis de conduire
            - Führerschein
            - Fahrerlaubnis
            - patente di guida
            - permiso de conducir
            - carnet de conducir
            - rijbewijs
            - körkort
      strength: domain
    - id: Keyword_eu_drivers_license_domain_context
      groups:
        - match_style: word
          terms:
            - eu driver's license number
            - driver
            - license
            - drivers
      strength: domain
  filters:
    - id: Guard_eu_drivers_license_same_digits
      type: AllDigitsSameFilter
risk_rating: 6
risk_description: >-
  Driver's license numbers serve as government-issued identity verification and are used across many services. Exposure can enable identity fraud, unauthorized account creation, and social engineering
  attacks.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-eu-drivers-license-number
    title: EU driver's license number entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-12'
changelog:
  - version: 1.3.1
    date: '2026-07-12'
    description: 'Baseline burn-down: template-context negative used prose words (template/example/placeholder/record/identifier) that are each individually 5-20 alnum chars, so the universal-engine top-level regex correctly matched them (template gating is a Purview-tier concern via the template-exclusion NOT-group, not expressible in a bare regex); this pattern has no numeric structural component, so unlike the sibling identifier patterns the fix is word-length rather than digit-count — replaced with short (<5 char) template-exclusion-dictionary tokens (demo, mock, test, data, id, flag) that stay outside the pattern''s 5-20 char range while preserving the template/placeholder framing.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.2
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — primary regex accepted all-zeros/same-digit driver's licence values (e.g. 00000); mirrors au-medicare-card-identifier protection.
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
