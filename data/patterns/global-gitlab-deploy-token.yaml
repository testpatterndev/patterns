schema: testpattern/v1
name: GitLab Deploy Token
slug: global-gitlab-deploy-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects GitLab deploy tokens (gldt- prefix). Deploy tokens grant read/write access to a
  project's repository, container registry and package registry; a leak enables artifact theft or tampering.
operation: 'Prefixed token format gldt- followed by 20 base62/underscore/hyphen characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_-])gldt-[A-Za-z0-9_-]{20}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: the distinctive gldt- prefix with a fixed 20-character body makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - gitlab
    - deploy token
    - container registry
    - package registry
    - CI/CD
  proximity: 300
test_cases:
  should_match:
    - value: gldt-ABCDEFGHIJ1234567890
      description: Exact 65 probe - deploy-token structure without independent GitLab context
    - value: 'GitLab container registry deploy credential gldt-aB3dE6gH9jK2mN5pQ8sT'
      description: Exact 75 probe - token with GitLab registry context
    - value: 'GitLab deploy secret GITLAB_DEPLOY_TOKEN=gldt-zZyYxXwWvVuU01234567'
      description: Exact 85 probe - deploy context plus canonical assignment
  should_not_match:
    - value: gldt-tooShort
      description: Too short to be a deploy token
    - value: glpat-ABCDEFGHIJ1234567890
      description: GitLab PAT prefix, not a deploy token
    - value: glrt-ABCDEFGHIJ1234567890
      description: GitLab runner token is a sibling family, not a deploy token
    - value: 'Documentation example: GitLab deploy GITLAB_DEPLOY_TOKEN=gldt-ABCDEFGHIJ1234567890'
      description: Documentation example containing a valid-shaped deploy token is excluded
    - value: create a gitlab deploy token for the registry
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder gldt- strings.
    mitigation: Require corroborative GitLab deploy/registry keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This high-confidence detector identifies a GitLab deploy token by its gldt prefix and fixed 20-character body. A valid token can pull private source or, when write scopes are granted, push packages and container images to a specific project or group. The normal unit is one deployment credential whose repository and registry permissions are bounded by configuration, producing serious but contained harm. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED requires proven broad production compromise or significant supply-chain damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_gitlab_deploy_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_gitlab_deploy_token
      matches:
        - ref: Keyword_gitlab_deploy_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_gitlab_deploy_token
      matches:
        - ref: Keyword_gitlab_deploy_context
        - ref: Pattern_gitlab_deploy_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_gitlab_deploy_token
      pattern: (?<![A-Za-z0-9_-])gldt-[A-Za-z0-9_-]{20}(?![A-Za-z0-9_-])
    - id: Pattern_gitlab_deploy_assignment
      pattern: (?i)\b(?:GITLAB_DEPLOY_TOKEN|CI_DEPLOY_PASSWORD|DEPLOY_TOKEN)\s*[=:]
  keywords:
    - id: Keyword_gitlab_deploy_context
      groups:
        - match_style: string
          terms:
            - GitLab deploy
            - GitLab container registry
            - GitLab package registry
            - GitLab repository deploy
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
changelog:
  - version: 1.1.2
    date: '2026-07-19'
    description: 'Add an individual 65 discovery / 75 GitLab-registry / 85 deploy-assignment Purview contract with exact-tier, sibling-token, malformed, and documentation probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1536 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
