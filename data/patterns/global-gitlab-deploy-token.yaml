schema: testpattern/v1
name: GitLab Deploy Token
slug: global-gitlab-deploy-token
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects GitLab deploy tokens (gldt- prefix). Deploy tokens grant read/write access to a
  project's repository, container registry and package registry; a leak enables artifact theft or tampering.
operation: 'Prefixed token format gldt- followed by 20 base62/underscore/hyphen characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_-])gldt-[A-Za-z0-9_-]{20}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: >-
  High confidence: the distinctive gldt- prefix with a fixed 20-character body makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - gitlab
    - deploy token
    - container registry
    - package registry
    - CI/CD
  proximity: 300
test_cases:
  should_match:
    - value: gldt-ABCDEFGHIJ1234567890
      description: GitLab deploy token, gldt- prefix + 20 chars
    - value: 'DEPLOY_TOKEN=gldt-zZyYxXwWvVuU01234567'
      description: Labelled deploy token in env var
    - value: gldt-aB3dE6gH9jK2mN5pQ8sT
      description: Mixed-case deploy token
  should_not_match:
    - value: gldt-tooShort
      description: Too short to be a deploy token
    - value: glpat-ABCDEFGHIJ1234567890
      description: GitLab PAT prefix, not a deploy token
    - value: create a gitlab deploy token for the registry
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder gldt- strings.
    mitigation: Require corroborative GitLab deploy/registry keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  A leaked GitLab deploy token allows pulling private source code and pushing malicious container images or packages to the registry.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-06-13'
author: testpattern-community
license: MIT
references:
  - url: https://docs.gitlab.com/ee/user/project/deploy_tokens/
    title: GitLab deploy tokens
  - url: https://docs.gitlab.com/ee/security/token_overview.html
    title: GitLab token overview
