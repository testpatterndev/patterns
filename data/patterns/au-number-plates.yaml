schema: testpattern/v1
name: Australian Number Plate
slug: au-number-plates
version: 1.5.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects five implemented Australian standard number-plate shapes for NSW, Victoria, Queensland,
  South Australia, and Western Australia. It does not validate issuance and excludes personalised
  plate formats; registration and transport-agency evidence controls enforcement.
operation: >-
  The universal and Purview implementations cover AA99AA, 9AA999, 999AA9, S999AAA, and 1AAA999, with
  optional spaces or hyphens where defined. A bare shape is discovery-only at 65, registration context
  enforces at 75, and independent transport-agency context raises it to 85. Serial/model and explicit
  template context are excluded from enforcing tiers.
pattern: \b(?:[A-Z]{2}[\s\-]?\d{2}[\s\-]?[A-Z]{2}|\d[A-Z]{2}[\s\-]?\d{3}|\d{3}[\s\-]?[A-Z]{2}[\s\-]?\d|S\d{3}[\s\-]?[A-Z]{3}|1[A-Z]{3}[\s\-]?\d{3})\b
confidence: low
confidence_justification: >-
  Low confidence: short alphanumeric plate formats can easily match product codes, abbreviations, and other non-vehicle identifiers. Corroborative evidence keywords such as registration, rego, or
  number plate are essential for reliable detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - location
  - pii
corroborative_evidence:
  keywords:
    - registration
    - rego
    - number plate
  proximity: 500
  keyword_lists:
    - pii-personal
test_cases:
  should_match:
    - value: AB12CD
      description: Low-tier probe - bare NSW-shaped candidate
    - value: 'Vehicle registration: 1AB234'
      description: Medium-tier probe - registration context without a transport agency
    - value: 'TMR vehicle registration plate: 123AB4'
      description: High-tier probe - Queensland shape with registration and agency context
  should_not_match:
    - value: ABC123
      description: Three letters followed by three digits (not a valid format)
    - value: A1B2C3
      description: Alternating letters and digits (not a valid format)
    - value: 1234AB
      description: Four digits followed by two letters (not a valid format)
    - value: 'Model code AB12CD for the replacement assembly'
      description: Plate-shaped product code with explicit model/code context
    - value: 'Training example: TMR vehicle registration plate 123AB4'
      description: Structurally complete but explicitly framed training content
false_positives:
  - description: Common words and phrases related to au number plates appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 4
risk_description: >-
  The low-confidence TestPattern regex detects several Australian state number-plate formats, with stronger tiers requiring registration, transport-agency, and vehicle context. A genuine plate identifies a publicly displayed vehicle and can support tracking only when combined with sightings, timestamps, owner attribution, or access to registration records. Serial codes, policy documents, and template values can match the broad structural patterns. Risk 4 OFFICIAL reflects low standalone harm; SENSITIVE requires a protected person, concealed movement history, active threat, or an aggregated identified tracking dataset.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 500
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_au_plate_nsw
          - Pattern_au_plate_vic
          - Pattern_au_plate_qld
          - Pattern_au_plate_sa
          - Pattern_au_plate_wa
      matches:
        - ref: Evidence_registration_context
        - ref: Evidence_transport_agency
      excludes:
        - ref: Evidence_template_exclusion
        - ref: Evidence_serial_code_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_au_plate_nsw
          - Pattern_au_plate_vic
          - Pattern_au_plate_qld
          - Pattern_au_plate_sa
          - Pattern_au_plate_wa
      matches:
        - ref: Evidence_registration_context
      excludes:
        - ref: Evidence_serial_code_exclusion
        - ref: Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_au_plate_nsw
          - Pattern_au_plate_vic
          - Pattern_au_plate_qld
          - Pattern_au_plate_sa
          - Pattern_au_plate_wa
  regexes:
    - id: Pattern_au_plate_nsw
      pattern: \b[A-Z]{2}[\s\-]?\d{2}[\s\-]?[A-Z]{2}\b
    - id: Pattern_au_plate_vic
      pattern: \b\d[A-Z]{2}[\s\-]?\d{3}\b
    - id: Pattern_au_plate_qld
      pattern: \b\d{3}[\s\-]?[A-Z]{2}[\s\-]?\d\b
    - id: Pattern_au_plate_sa
      pattern: \bS\d{3}[\s\-]?[A-Z]{3}\b
    - id: Pattern_au_plate_wa
      pattern: \b1[A-Z]{3}[\s\-]?\d{3}\b
  keywords:
    - id: Evidence_registration_context
      groups:
        - match_style: word
          terms:
            - registration
            - vehicle registration
            - rego
            - registration number
            - licence plate
            - license plate
            - number plate
            - plate number
            - registered vehicle
      strength: specific
    - id: Evidence_transport_agency
      groups:
        - match_style: word
          terms:
            - text: TMR
              case_sensitive: true
            - text: RMS
              case_sensitive: true
            - VicRoads
            - Service NSW
            - Service SA
            - Department of Transport
            - Service Tasmania
            - text: MVR
              case_sensitive: true
            - Access Canberra
            - DPTI
      strength: domain
    - id: Evidence_vehicle_terms
      groups:
        - match_style: word
          terms:
            - vehicle
            - car
            - truck
            - motor vehicle
            - text: VIN
              case_sensitive: true
            - chassis
            - automobile
            - motorcycle
            - trailer
      strength: domain
    - id: Evidence_serial_code_exclusion
      type: any
      min_matches: 0
      max_matches: 0
      groups:
        - match_style: word
          terms:
            - serial
            - code
            - model
            - part
            - text: SKU
              case_sensitive: true
      strength: noise
created: '2026-02-08'
updated: '2026-07-18'
