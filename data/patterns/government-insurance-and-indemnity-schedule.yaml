schema: testpattern/v1
name: Government Insurance and Indemnity Schedule
slug: government-insurance-and-indemnity-schedule
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects whole-of-government or agency-level insurance coverage schedules, self-insurance reserves, indemnity limits, and excess/deductible structures that reveal the State's financial exposure limits.
operation: 'Keyword proximity: insurance/indemnity terms within 300 characters of schedule/coverage/limit terms and dollar amounts or aggregate/occurrence indicators. Requires confidentiality markers.'
pattern: null
confidence: high
confidence_justification: 'High confidence: the co-occurrence of government insurance fund terminology with coverage limits, deductibles, and confidentiality markers is specific to restricted insurance schedules. Published insurance summaries are excluded.'
jurisdictions:
  - au
regulations:
- "Financial Accountability Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - insurance
    - indemnity
    - self-insurance
    - QGIF
    - Government Insurance Fund
    - schedule
    - coverage
    - limit
    - reserve
    - excess
    - deductible
    - retention
    - aggregate
    - per occurrence
    - policy period
    - PROTECTED
    - confidential
  proximity: 300
  keyword_lists:

    - corporate-finance

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED — Queensland Government Insurance Fund. Schedule of Coverage FY26-27. Professional indemnity: limit $50M per occurrence, $200M aggregate. Public liability: limit $100M per occurrence. Self-insurance retention: $5M. Deductible: $500K. Coverage gap identified for cyber liability above $20M.'
      description: QGIF coverage schedule with limits and identified gaps
    - value: 'Confidential — Government Indemnity Schedule. Self-insurance reserve: $340M. Coverage categories: Property ($2B aggregate), Workers compensation ($180M annual), Motor vehicle ($45M). Excess structure: $1M per claim for property, $250K for motor. Not for disclosure to third parties.'
      description: Government-wide indemnity schedule with reserve and excess details
  should_not_match:
    - value: The Queensland Government Insurance Fund provides insurance coverage to government agencies. For information about QGIF, visit the Queensland Treasury website.
      description: Public information about QGIF — no coverage details
    - value: Insurance claim lodgement form. Please describe the incident and estimated cost. Claims under $500 deductible are not covered.
      description: Routine insurance claim form — no schedule details
false_positives:
  - description: Public information about government insurance arrangements
    mitigation: Require specific coverage limits, deductibles, or reserve amounts rather than general references to QGIF
  - description: Routine insurance claim forms
    mitigation: Exclude documents containing 'claim form', 'lodge a claim', 'incident report' without schedule context
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_government_insurance_and_indemnity_schedule_dollar_amounts_for_coverage_limits_and_r
      matches:
        - ref: Evidence_government_insurance_and_indemnity_schedule_primary
        - ref: Evidence_government_insurance_and_indemnity_schedule_schedule_terms
        - ref: Evidence_government_insurance_and_indemnity_schedule_detail_terms
        - ref: Evidence_government_insurance_and_indemnity_schedule_markers
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_government_insurance_and_indemnity_schedule_exclusion
    - confidence_level: 75
      id_match: Pattern_government_insurance_and_indemnity_schedule_dollar_amounts_for_coverage_limits_and_r
      matches:
        - ref: Evidence_government_insurance_and_indemnity_schedule_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_government_insurance_and_indemnity_schedule_exclusion
    - confidence_level: 65
      id_match: Pattern_government_insurance_and_indemnity_schedule_dollar_amounts_for_coverage_limits_and_r
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_government_insurance_and_indemnity_schedule_exclusion
  regexes:
    - id: Pattern_government_insurance_and_indemnity_schedule_dollar_amounts_for_coverage_limits_and_r
      pattern: \$[\d,.]+\s*[MBKmb]?
  keywords:
    - id: Evidence_government_insurance_and_indemnity_schedule_primary
      groups:
        - match_style: word
          terms:
            - insurance
            - indemnity
            - self-insurance
            - QGIF
            - Government Insurance Fund
    - id: Evidence_government_insurance_and_indemnity_schedule_schedule_terms
      groups:
        - match_style: word
          terms:
            - schedule
            - coverage
            - limit
            - reserve
            - excess
            - deductible
            - retention
    - id: Evidence_government_insurance_and_indemnity_schedule_detail_terms
      groups:
        - match_style: word
          terms:
            - aggregate
            - per occurrence
            - policy period
            - coverage gap
            - professional indemnity
            - public liability
            - property
    - id: Evidence_government_insurance_and_indemnity_schedule_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - confidential
            - not for disclosure
            - restricted
    - id: Filter_government_insurance_and_indemnity_schedule_exclusion
      groups:
        - match_style: word
          terms:
            - claim form
            - lodge a claim
            - incident report
            - for information about
            - visit the website
            - template

risk_rating: 7
risk_description: Whole-of-government insurance coverage schedules, self-insurance reserves, and indemnity limits; disclosure reveals financial exposure for strategic litigation targeting. While sensitive, disclosure represents BIL:2 harm — reputational or moderate financial impact rather than catastrophic institutional damage. Does not meet PROTECTED threshold in a Queensland Government operational context.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Financial"
references: []
created: '2026-02-20'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
license: MIT
