changelog:
  - version: 1.4.0
    date: '2026-07-20'
    description: 'Differentiation fix: this SIT co-fired with four sibling finance-concept SITs at cross-tenant document-Jaccard 97.8-99.6% (ecq/qleave 2026-07 warehouse analysis) because all five tiers were satisfiable by the same shared substrate (generic dollar-amount anchor + corporate-finance/government-services list terms + PROTECTED/draft/confidential markers). The detail_terms group is now the distinctive signature gate (QGIF, Government Insurance Fund, indemnity, self-insurance, deductible, per occurrence, policy period, coverage gap, professional indemnity, public liability); generic aggregate/property moved to schedule_terms. The 85 tier requires >=2 unique distinctive terms (min_count 2, unique_results) and the 75 tier requires >=1 — shared substrate alone can no longer satisfy any tier >=75. New should_not_match: shared financial substrate without distinctive signature.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1449 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary; remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
