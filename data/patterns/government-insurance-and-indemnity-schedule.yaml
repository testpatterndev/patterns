schema: testpattern/v1
name: Government Insurance and Indemnity Schedule
slug: government-insurance-and-indemnity-schedule
version: 1.4.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects whole-of-government or agency-level insurance coverage schedules, self-insurance reserves, indemnity limits, and excess/deductible structures that reveal the State's financial exposure limits.
operation: 'Keyword proximity: insurance/indemnity terms within 300 characters of schedule/coverage/limit terms and dollar amounts or aggregate/occurrence indicators. Requires confidentiality markers.'
pattern: null
confidence: medium
confidence_justification: 'Medium confidence: the co-occurrence of government insurance fund terminology with coverage limits, deductibles, and confidentiality markers is specific to restricted insurance schedules. Published insurance summaries are excluded.'
jurisdictions:
  - au
regulations:
- "Financial Accountability Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - insurance
    - indemnity
    - self-insurance
    - QGIF
    - Government Insurance Fund
    - schedule
    - coverage
    - limit
    - reserve
    - excess
    - deductible
    - retention
    - aggregate
    - per occurrence
    - policy period
    - PROTECTED
    - confidential
  proximity: 300
  keyword_lists:

    - corporate-finance

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED — Queensland Government Insurance Fund. Schedule of Coverage FY26-27. Professional indemnity: limit $50M per occurrence, $200M aggregate. Public liability: limit $100M per occurrence. Self-insurance retention: $5M. Deductible: $500K. Coverage gap identified for cyber liability above $20M.'
      description: QGIF coverage schedule with limits and identified gaps
    - value: 'Confidential — Government Indemnity Schedule. Self-insurance reserve: $340M. Coverage categories: Property ($2B aggregate), Workers compensation ($180M annual), Motor vehicle ($45M). Excess structure: $1M per claim for property, $250K for motor. Not for disclosure to third parties.'
      description: Government-wide indemnity schedule with reserve and excess details
    - value: 'PROTECTED — Government Insurance Fund. Cyber liability schedule, policy period FY27. Limit $75M aggregate, deductible $2M per occurrence, self-insurance retention $10M. Restricted — not for disclosure.'
      description: QGIF cyber liability schedule with limits, deductible, and confidentiality markers
  should_not_match:
    - value: The Queensland Government Insurance Fund provides insurance coverage to government agencies. For information about QGIF, visit the Queensland Treasury website.
      description: Public information about QGIF — no coverage details
    - value: Insurance claim lodgement form. Please describe the incident and estimated cost. Small claims below the standard deductible are not covered.
      description: Routine insurance claim form — no schedule details or dollar coverage amounts
    - value: 'PROTECTED — Draft. Corporate insurance cost summary: total premiums of $1.2M for the financial year, with a reserve of $400K held against outstanding claims. Confidential — not for disclosure.'
      description: shared financial substrate without distinctive signature must not fire
false_positives:
  - description: Public information about government insurance arrangements
    mitigation: Require specific coverage limits, deductibles, or reserve amounts rather than general references to QGIF
  - description: Routine insurance claim forms
    mitigation: Exclude documents containing 'claim form', 'lodge a claim', 'incident report' without schedule context
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_government_insurance_and_indemnity_schedule_dollar_amounts_for_coverage_limits_and_r
      matches:
        - ref: Evidence_government_insurance_and_indemnity_schedule_primary
        - ref: Evidence_government_insurance_and_indemnity_schedule_schedule_terms
        - ref: Evidence_government_insurance_and_indemnity_schedule_detail_terms
          min_count: 2
          unique_results: true
        - ref: Evidence_government_insurance_and_indemnity_schedule_markers
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_government_insurance_and_indemnity_schedule_exclusion
    - confidence_level: 75
      id_match: Pattern_government_insurance_and_indemnity_schedule_dollar_amounts_for_coverage_limits_and_r
      matches:
        - ref: Evidence_government_insurance_and_indemnity_schedule_primary
        - ref: Evidence_government_insurance_and_indemnity_schedule_detail_terms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_government_insurance_and_indemnity_schedule_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_government_insurance_and_indemnity_schedule_dollar_amounts_for_coverage_limits_and_r
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_government_insurance_and_indemnity_schedule_exclusion
  regexes:
    - id: Pattern_government_insurance_and_indemnity_schedule_dollar_amounts_for_coverage_limits_and_r
      pattern: \$[\d,.]+\s*[MBKmb]?
  keywords:
    - id: Evidence_government_insurance_and_indemnity_schedule_primary
      groups:
        - match_style: word
          terms:
            - insurance
            - indemnity
            - self-insurance
            - QGIF
            - Government Insurance Fund
      strength: domain
    - id: Evidence_government_insurance_and_indemnity_schedule_schedule_terms
      groups:
        - match_style: word
          terms:
            - schedule
            - coverage
            - limit
            - reserve
            - excess
            - retention
            - aggregate
            - property
      strength: domain
    - id: Evidence_government_insurance_and_indemnity_schedule_detail_terms
      groups:
        - match_style: word
          terms:
            - QGIF
            - Government Insurance Fund
            - indemnity
            - self-insurance
            - deductible
            - per occurrence
            - policy period
            - coverage gap
            - professional indemnity
            - public liability
      strength: specific
    - id: Evidence_government_insurance_and_indemnity_schedule_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - confidential
            - not for disclosure
            - restricted
      strength: domain
    - id: Filter_government_insurance_and_indemnity_schedule_exclusion
      groups:
        - match_style: word
          terms:
            - claim form
            - lodge a claim
            - incident report
            - for information about
            - visit the website
            - template

      strength: noise
risk_rating: 7
risk_description: >-
  The detector finds a confidential agency or whole-of-government insurance schedule by combining coverage, indemnity, excess, deductible, limit, reserve, and monetary terms. Disclosure can reveal uninsured exposures, self-insurance thresholds, and financial limits that strengthen claims manipulation, negotiation pressure, or targeting of weakly covered assets. The normal unit is a composite coverage schedule, while public insurance summaries and routine claim forms can match portions of the vocabulary. Risk 7 SENSITIVE reflects credible moderate financial and operational harm; PROTECTED would require a comprehensive high-consequence exposure map capable of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
references: []
