schema: testpattern/v1
name: Settlement agreement drafts
slug: au-top500-166-settlement-agreement-drafts
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to settlement agreement drafts in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:settlement\s+agreement\s+drafts|settlement\s+agreement|deed\s+of\s+settlement|settlement\s+terms|without\s+prejudice|compromise\s+agreement|release\s+and\s+discharge|confidential\s+settlement|settlement\s+sum|mediation\s+outcome|dispute\s+resolution|consent\s+orders)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - settlement agreement drafts
    - settlement
    - agreement
    - drafts
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: settlement agreement drafts
      description: Primary topic phrase match
    - value: settlement agreement
      description: Case-insensitive topic phrase match
    - value: deed of settlement
      description: Alternative topic phrase match
    - value: settlement terms
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to settlement agreement drafts appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_settlement_agreement
      matches:
        - ref: Evidence_settlement_agreement
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_settlement_agreement
      matches:
        - ref: Evidence_settlement_agreement
    - confidence_level: 65
      id_match: Pattern_settlement_agreement
      matches:
        - ref: Evidence_settlement_agreement
  regexes:
    - id: Pattern_settlement_agreement
      pattern: (?is)\b(?:settlement\s+agreement\s+drafts|settlement\s+agreement|deed\s+of\s+settlement|settlement\s+terms|without\s+prejudice|compromise\s+agreement|release\s+and\s+discharge|confidential\s+settlement|settlement\s+sum|mediation\s+outcome|dispute\s+resolution|consent\s+orders)\b
  keywords:
    - id: Evidence_settlement_agreement
      groups:
        - match_style: word
          terms:
            - settlement agreement drafts
            - settlement agreement
            - deed of settlement
            - settlement terms
            - without prejudice
            - compromise agreement
            - release and discharge
            - confidential settlement
            - settlement sum
            - mediation outcome
            - dispute resolution
            - consent orders
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
