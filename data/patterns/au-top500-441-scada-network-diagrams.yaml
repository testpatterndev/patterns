schema: testpattern/v1
name: SCADA network diagrams
slug: au-top500-441-scada-network-diagrams
version: 1.4.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to scada network diagrams in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: pii-personal, industry-critical-infrastructure.
pattern: (?is)\b(?:scada\s+network\s+diagram|supervisory\s+control\s+and\s+data\s+acquisition|remote\s+terminal\s+unit|industrial\s+control\s+system|OT\s+network|ICS\s+network\s+topology)\b(?=[\s\S]{0,150}?\b(?:Modbus|DNP3|OPC[-\s]?UA|HMI|RTU|PLC|DCS|VLAN|Purdue\s+(?:Model|level)|firewall\s+zone|\d{1,3}(?:\.\d{1,3}){3}(?:/\d{1,2})?)\b)
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
- global
regulations:
- AML/CTF Act (Cth)
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- ISO 27001
- ISO 27701
data_categories:
- pii
corroborative_evidence:
  keywords:
  - scada
  - network diagram
  - critical infrastructure
  - Modbus
  - Modbus TCP
  - Modbus RTU
  - DNP3
  - OPC-UA
  - &id001
    text: HMI
    case_sensitive: true
  - &id002
    text: RTU
    case_sensitive: true
  - &id003
    text: PLC
    case_sensitive: true
  - &id004
    text: DCS
    case_sensitive: true
  - VLAN
  - Purdue Model
  - subnet
  - firewall zone
  - air gap
  - OT network
  - tag database
  - I/O map
  proximity: 300
  keyword_lists:
  - pii-personal
  - industry-critical-infrastructure
test_cases:
  should_match:
  - value: SCADA network diagram showing HMI, RTU-12, and PLC-04 connected via Modbus TCP on VLAN 30 (10.10.30.0/24)
  - value: Industrial control system topology diagram with DNP3 links between the DCS and remote terminal units
  should_not_match:
  - value: Corporate IT network diagram showing office switches, routers, and firewall for the finance department
  - value: A cybersecurity awareness training slide explains what a SCADA network diagram is, with no actual diagram attached
  - value: unrelated generic text without domain phrases
  - value: placeholder value 12345
false_positives:
- description: Common words and phrases related to scada network diagrams appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
- description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_scada_network_diagrams
    matches:
    - ref: Evidence_scada_network_diagrams
      min_count: 2
      unique_results: true
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 75
    id_match: Pattern_scada_network_diagrams
    matches:
    - ref: Evidence_scada_network_diagrams
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    id_match: Pattern_scada_network_diagrams
    matches:
    - ref: Evidence_scada_network_diagrams
  regexes:
  - id: Pattern_scada_network_diagrams
    pattern: (?is)\b(?:scada\s+network\s+diagram|supervisory\s+control\s+and\s+data\s+acquisition|remote\s+terminal\s+unit|industrial\s+control\s+system|OT\s+network|ICS\s+network\s+topology)\b(?=[\s\S]{0,150}?\b(?:Modbus|DNP3|OPC[-\s]?UA|HMI|RTU|PLC|DCS|VLAN|Purdue\s+(?:Model|level)|firewall\s+zone|\d{1,3}(?:\.\d{1,3}){3}(?:/\d{1,2})?)\b)
  keywords:
  - id: Evidence_scada_network_diagrams
    groups:
    - match_style: word
      terms:
      - scada
      - network diagram
      - critical infrastructure
      - Modbus
      - Modbus TCP
      - Modbus RTU
      - DNP3
      - OPC-UA
      - *id001
      - *id002
      - *id003
      - *id004
      - VLAN
      - Purdue Model
      - subnet
      - firewall zone
      - air gap
      - OT network
      - tag database
      - I/O map
    strength: specific
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
