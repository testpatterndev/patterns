schema: testpattern/v1
name: SCADA network diagrams
slug: au-top500-441-scada-network-diagrams
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to scada network diagrams in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: pii-personal, industry-critical-infrastructure.
pattern: (?is)\b(?:network\s+diagram|supervisory\s+control|data\s+acquisition|remote\s+terminal\s+unit|industrial\s+control|OT\s+network|critical\s+infrastructure|control\s+system|network\s+topology)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - scada network diagrams
    - scada
    - network
    - diagrams
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - pii-personal
    - industry-critical-infrastructure
test_cases:
  should_match:
    - value: network diagram
      description: Primary topic phrase match
    - value: supervisory control
      description: Case-insensitive topic phrase match
    - value: data acquisition
      description: Alternative topic phrase match
    - value: remote terminal unit
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: scada network diagram
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to scada network diagrams appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_scada_network_diagrams
      matches:
        - ref: Evidence_scada_network_diagrams
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_scada_network_diagrams
      matches:
        - ref: Evidence_scada_network_diagrams
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_scada_network_diagrams
      matches:
        - ref: Evidence_scada_network_diagrams
  regexes:
    - id: Pattern_scada_network_diagrams
      pattern: (?is)\b(?:network\s+diagram|supervisory\s+control|data\s+acquisition|remote\s+terminal\s+unit|industrial\s+control|OT\s+network|critical\s+infrastructure|control\s+system|network\s+topology)\b
  keywords:
    - id: Evidence_scada_network_diagrams
      groups:
        - match_style: word
          terms:
            - SCADA
            - network diagram
            - supervisory control
            - data acquisition
            - RTU
            - remote terminal unit
            - industrial control
            - OT network
            - critical infrastructure
            - control system
            - network topology
            - ICS
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
