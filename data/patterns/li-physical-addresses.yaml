schema: testpattern/v1
name: Liechtenstein Physical Addresses
slug: li-physical-addresses
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Liechtenstein Physical Addresses patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that uses machine learning and function-based detection for physical
  address identification. This keyword list provides address-related terms for supplementary matching.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  country-specific address terminology to identify physical address data.
keywords:
  - Strasse
  - Weg
  - Gasse
  - Platz
  - Vaduz
  - Schaan
  - Balzers
  - Triesen
  - Eschen
  - Postleitzahl
  - PLZ
  - Allee
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on address terms requires additional context and
  corroborative evidence for accurate physical address detection. Address keywords alone
  produce high false positive rates without structural validation.
jurisdictions:
  - li
  - eu
regulations:
  - GDPR
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 Strasse name, unit 4"
      description: Contains address keyword 'Strasse'
    - value: "located at 45 Weg example"
      description: Contains address keyword 'Weg'
    - value: "deliver to 78 Gasse test"
      description: Contains address keyword 'Gasse'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_li_address_primary
      matches:
        - ref: Keyword_li_address_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_li_address_primary
  keywords:
    - id: Keyword_li_address_primary
      groups:
        - match_style: word
          terms:
            - Strasse
            - Weg
            - Gasse
            - Platz
            - Vaduz
            - Schaan
            - Balzers
            - Triesen
            - Eschen
            - Postleitzahl
            - text: PLZ
              case_sensitive: true
            - Allee
      strength: domain
    - id: Keyword_li_address_context
      groups:
        - match_style: word
          terms:
            - Adresse
            - Anschrift
            - Wohnort
            - Gemeinde
            - Liechtenstein
            - Fürstentum
            - Mauren
            - Ruggell
            - Triesenberg
            - Schellenberg
            - Gamprin
      strength: domain
risk_rating: 3
risk_description: >-
  The Liechtenstein keyword detector uses German-language road forms such as Strasse, Weg, and Gasse around number-like text. Those words are shared across neighbouring jurisdictions and commonly occur in public routes, venue names, corporate addresses, and directions, so the country and private-residence attribution can both be uncertain. An isolated location has low confidentiality impact unless it is tied to a particular resident, protected asset, or sensitive visit. Risk 3 supports OFFICIAL; SENSITIVE would require an attributed confidential home, threatened person, non-public facility, or aggregated household dataset.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-liechtenstein-physical-addresses
    title: "Liechtenstein Physical Addresses entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
