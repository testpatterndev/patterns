schema: testpattern/v1
name: Card expiration dates
slug: global-top500-107-card-expiration-dates
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to card expiration dates in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:card\s+expiration|expiry\s+date|valid\s+thru|valid\s+through|expiration\s+date|card\s+validity|exp\s+date|credit\s+card|debit\s+card|payment\s+card)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - card expiration dates
    - card
    - expiration
    - dates
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: card expiration
      description: Primary topic phrase match
    - value: expiry date
      description: Case-insensitive topic phrase match
    - value: valid thru
      description: Alternative topic phrase match
    - value: valid through
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_card_expiration
      matches:
        - ref: Pattern_global_top500_107_card_expiration_dates_label_context
        - ref: Keyword_global_top500_107_card_expiration_dates_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_card_expiration
      matches:
        - ref: Keyword_card_expiration
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_card_expiration
      matches:
        - ref: Keyword_card_expiration
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_card_expiration
      pattern: (?is)\b(?:card\s+expiration|expiry\s+date|valid\s+thru|valid\s+through|expiration\s+date|card\s+validity|exp\s+date|credit\s+card|debit\s+card|payment\s+card)\b
    - id: Pattern_global_top500_107_card_expiration_dates_label_context
      pattern: (?i)\\b(?:card\\s+expiration\\s+dates|card|expiration|dates|top500)\\b
  keywords:
    - id: Keyword_card_expiration
      groups:
        - match_style: word
          terms:
            - card expiration
            - expiry date
            - valid thru
            - valid through
            - expiration date
            - card validity
            - exp date
            - mm/yy
            - credit card
            - debit card
            - payment card
            - cardholder
    - id: Keyword_global_top500_107_card_expiration_dates_domain_context
      groups:
        - match_style: word
          terms:
            - card expiration dates
            - card
            - expiration
            - dates
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://docs-prv.pcisecuritystandards.org/PCI%20DSS/Standard/PCI-DSS-v4_0_1.pdf
  - https://handbook.apra.gov.au/standard/cps-234
