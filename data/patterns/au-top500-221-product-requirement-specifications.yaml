schema: testpattern/v1
name: Product requirement specifications
slug: au-top500-221-product-requirement-specifications
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to product requirement specifications in Australian contexts. Higher confidence identifies populated product requirement specifications (requirement
  identifiers with shall/acceptance/priority/owner/release fields, or user-story structures); generic quality, compliance, and specification vocabulary remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:product\s+requirement\s+specifications|requirements\s+document|functional\s+requirements|technical\s+specifications|product\s+specification|design\s+requirements|acceptance\s+criteria|quality\s+standard|compliance\s+requirement|performance\s+specification)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - intellectual-property
corroborative_evidence:
  keywords:
    - product requirement specifications
    - product
    - requirement
    - specifications
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: product requirement specifications
      description: Primary topic phrase match
    - value: requirements document
      description: Case-insensitive topic phrase match
    - value: functional requirements
      description: Alternative topic phrase match
    - value: technical specifications
      description: Additional topic phrase match
    - value: 'REQ-241 Product: Atlas Mobile. The app shall cache 500 records. Owner: Priya. Priority: P1. Acceptance criteria: sync <2 s.'
      description: Populated product requirement record with ID, shall statement, owner, priority, and acceptance criteria (enforces at 75/85)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: The office-chair tender cites a quality standard and compliance requirement.
      description: Procurement compliance without a product requirement record — discovery only, must not enforce
    - value: The product of two numbers meets the mathematical requirement.
      description: Product and requirement in mathematical meaning must not match
    - value: 'Sample PRD template: REQ-001 placeholder acceptance criteria.'
      description: Sample/template/placeholder marks an empty form — suppressed from enforcement
    - value: requirements document
      description: Document label alone has no populated requirements — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to product requirement specifications appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_product_requirement_record
      matches:
        - ref: Evidence_product_requirement_specs
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_product_requirement_record
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_product_requirement_specs
      matches:
        - ref: Evidence_product_requirement_specs
  regexes:
    - id: Pattern_product_requirement_specs
      pattern: >-
        (?is)\b(?:product\s+requirement\s+specifications|requirements\s+document|functional\s+requirements|technical\s+specifications|product\s+specification|design\s+requirements|acceptance\s+criteria|quality\s+standard|compliance\s+requirement|performance\s+specification)\b
    - id: Pattern_au_top500_221_product_requirement_specifications_label_context
      pattern: (?i)\b(?:product\s+requirement\s+specifications)\b
    - id: Pattern_product_requirement_record
      pattern: >-
        (?is)(?:\b(?:PRD|REQ|FR|NFR)[-_ ]?\d{2,6}\b[\s\S]{0,160}\b(?:shall|acceptance criteria|priority|owner|target release)\b|\bas a\b[\s\S]{0,80}\bi want\b[\s\S]{0,80}\bso that\b)
  keywords:
    - id: Evidence_product_requirement_specs
      groups:
        - match_style: word
          terms:
            - product requirement specifications
            - requirements document
            - functional requirements
            - technical specifications
            - product specification
            - design requirements
            - acceptance criteria
            - quality standard
            - compliance requirement
            - performance specification
    - id: Keyword_au_top500_221_product_requirement_specifications_domain_context
      groups:
        - match_style: word
          terms:
            - product requirement specifications
            - product
            - requirement
            - specifications
risk_description: >-
  The detector matches product-requirement specification, requirements document, functional requirements, technical specification, product specification, design requirements, acceptance criteria, quality standards, compliance requirements, or performance specifications. These document terms span public tenders, standards, templates, contracts, training, and routine internal work, and the phrase does not establish an unreleased product or strategically important requirement set. Direct competitive harm requires detailed non-public behaviour, performance targets, priorities, dependencies, or security requirements beyond the match. Risk 5 and OFFICIAL are appropriate; SENSITIVE would require a substantive confidential specification for an unreleased or strategically material product.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
