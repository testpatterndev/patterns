schema: testpattern/v1
name: Forensic DNA profile records
slug: au-top500-412-forensic-dna-profile-records
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to forensic dna profile records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?i)\b(?:dna\s+profile|forensic\s+dna|str\s+loci|codis)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - forensic dna profile records
    - forensic
    - dna
    - profile
    - records
    - law
    - enforcement
    - justice
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: 'Dna profile'
      description: Topic phrase present
    - value: 'dna profile'
      description: Topic phrase, lowercase
    - value: 'this record references the dna profile held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Common words and phrases related to forensic dna profile records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_forensic_dna_profile_records
      matches:
        - ref: Evidence_forensic_dna_profile_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_forensic_dna_profile_records
      matches:
        - ref: Evidence_forensic_dna_profile_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_forensic_dna_profile_records
  regexes:
    - id: Pattern_forensic_dna_profile_records
      pattern: (?i)\b(?:dna\s+profile|forensic\s+dna|str\s+loci|codis)\b
  keywords:
    - id: Evidence_forensic_dna_profile_records
      groups:
        - match_style: word
          terms:
            - forensic dna profile records
            - dna profile
            - forensic dna
            - STR loci
            - CODIS
            - dna database
            - genetic profile
            - dna evidence
            - biological sample
            - law enforcement
            - forensic analysis
            - dna match
      strength: specific
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
