schema: testpattern/v1
name: AI MCP / Connector Risk
slug: ai-mcp-connector-risk
version: 0.5.0
type: regex
pattern_class: concept
description: >-
  Detects risky MCP / plugin / connector descriptors: tool manifests requesting over-broad or unexplained
  scopes, or encouraging autonomous action that bypasses user approval (OWASP LLM06 / Agentic Top 10).
  Phrase detection is corroborated by AI-context markers.
operation: >-
  Pattern_mcp_broad_scope inventories broad grants and approval-bypass clauses at 65. A connector or
  tool-manifest signal raises the match to 75, while 85 requires that context plus both a privileged
  scope grant and an explicit approval bypass. Enforcing tiers reject templates, demonstrations,
  security guidance, and explicitly approved configurations.
pattern: '(?i)(?:\b(?:scopes?|permissions?|access)\b[^.\n]{0,30}\b(?:\*|all|full|read[- ]?write\s+everything|admin)\b|\bwithout\s+(?:user\s+)?(?:approval|confirmation|consent)\b)'
confidence: low
confidence_justification: >-
  Low by design. Broad-scope and approval-bypass language is common and benign in developer prototypes,
  sandbox tools and public sample manifests (the named FP traps). The hybrid approach pairs this seed with
  manifest/scope analysis; the keyword phrase alone is necessary-not-sufficient.
jurisdictions: [global]
regulations: ['OWASP LLM Top 10 2025', 'NIST AI RMF GenAI Profile']
frameworks: [ISO 27001]
data_categories: [emerging, security]
ai_threat:
  ai_sit_id: AI-SIT-009
  threat_family: AgentAction
  detection_approach: hybrid
corroborative_evidence:
  keywords: [connector, plugin, manifest, tool]
  proximity: 300
  keyword_lists: [ai-context-markers]
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  regexes:
    - id: Pattern_mcp_broad_scope
      pattern: '(?i)(?:\b(?:scopes?|permissions?|access)\b[^.\n]{0,30}\b(?:\*|all|full|read[- ]?write\s+everything|admin)\b|\bwithout\s+(?:user\s+)?(?:approval|confirmation|consent)\b)'
    - id: Evidence_privileged_scope
      pattern: '(?i)\b(?:scopes?|permissions?|access)\b[^.\n]{0,30}\b(?:\*|all|full|read[- ]?write\s+everything|admin)\b'
    - id: Evidence_approval_bypass
      pattern: '(?i)\bwithout\s+(?:user\s+)?(?:approval|confirmation|consent|authorisation|authorization)\b'
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  keywords:
    - id: Evidence_connector_manifest
      groups:
        - match_style: word
          terms:
            - MCP server
            - MCP tool
            - connector manifest
            - plugin manifest
            - tool manifest
            - tool definition
            - connector configuration
      strength: domain
    - id: Evidence_benign_connector_context
      groups:
        - match_style: word
          terms:
            - security guidance
            - risk guidance
            - approved exception
            - user approved
            - approval required
            - requires approval
      strength: exclusion
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_mcp_broad_scope
      matches:
        - ref: Evidence_connector_manifest
        - ref: Evidence_privileged_scope
        - ref: Evidence_approval_bypass
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_benign_connector_context
    - confidence_level: 75
      id_match: Pattern_mcp_broad_scope
      matches:
        - ref: Evidence_connector_manifest
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_benign_connector_context
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_mcp_broad_scope
risk_rating: 7
risk_description: >-
  This low-confidence event rule finds MCP, plugin, or connector descriptions that request wildcard, full, admin, or read-write-everything permissions, or propose autonomous action without approval. A real over-scoped tool can let an AI agent read, alter, or transmit data and execute commands beyond the user's intended authority across connected services. Prototype manifests, sandbox tools, sample configurations, and security guidance may quote the same scope language, so a live manifest and granted permissions are needed to confirm exposure. Risk 7 reflects the connector-control threat; classification is N/A because the permission event is not the connected data's label.
sensitivity_labels:
  pspf: N/A
  qgiscf: N/A
  qgiscf_dlm: N/A
  us_gov: 'CUI Basic'
  uk_gov: 'OFFICIAL-SENSITIVE'
test_cases:
  should_match:
    - value: 'Permissions requested: full access.'
      description: Low-tier probe - broad grant without connector-manifest context
    - value: 'MCP tool manifest requests access: full admin for calendar operations.'
      description: Medium-tier probe - privileged grant in a connector manifest without approval bypass
    - value: 'Connector manifest requests access: read-write everything and executes without user approval.'
      description: High-tier probe - manifest context, privileged grant, and explicit approval bypass
  should_not_match:
    - value: 'The connector requests read-only access to the calendar.'
      description: Narrow, scoped permission (FP trap)
    - value: 'This plugin reads a single document only after the user clicks Approve.'
      description: Scoped, approval-gated sibling connector
    - value: 'Public security guidance: an MCP tool manifest must not request access: full admin without user approval.'
      description: Public risk guidance quotes the complete risky shape
    - value: 'Template example: connector manifest requests access: full admin without user approval.'
      description: Explicit template containing otherwise high-tier evidence
false_positives:
  - description: Developer prototypes, sandbox tools, and public sample manifests that legitimately request broad scopes or describe autonomous action for demonstration purposes.
    mitigation: Require AI-context corroborative markers within the proximity window and treat single phrase hits as low confidence; exclude known sample/template manifests.
  - description: Documentation and security guidance that quotes broad-scope or approval-bypass language when explaining the risk rather than configuring a real connector.
    mitigation: Layer with manifest/scope analysis and confirm the language appears in an actual tool definition, not prose about tool definitions.
created: '2026-06-08'
