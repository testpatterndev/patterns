schema: testpattern/v1
name: Reduction-in-force planning lists
slug: global-top500-076-reduction-in-force-planning-lists
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to reduction-in-force planning lists in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:reduction\s+in\s+force|redundancy\s+list|layoff\s+plan|workforce\s+reduction|severance\s+package|position\s+elimination|redundancy\s+selection|affected\s+employees)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - reduction-in-force planning lists
    - reduction
    - force
    - planning
    - lists
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: reduction in force
      description: Primary topic phrase match
    - value: redundancy list
      description: Case-insensitive topic phrase match
    - value: layoff plan
      description: Alternative topic phrase match
    - value: workforce reduction
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to reduction-in-force planning lists appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_reduction_in_force
      matches:
        - ref: Pattern_global_top500_076_reduction_in_force_planning_lists_label_context
        - ref: Keyword_global_top500_076_reduction_in_force_planning_lists_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_076_reduction_in_force_planning_lists_noise_exclusion
    - confidence_level: 75
      id_match: Regex_reduction_in_force
      matches:
        - ref: Keyword_reduction_in_force
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_076_reduction_in_force_planning_lists_noise_exclusion
    - confidence_level: 65
      id_match: Regex_reduction_in_force
      matches:
        - ref: Keyword_reduction_in_force
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_076_reduction_in_force_planning_lists_noise_exclusion
  regexes:
    - id: Regex_reduction_in_force
      pattern: (?is)\b(?:reduction\s+in\s+force|redundancy\s+list|layoff\s+plan|workforce\s+reduction|severance\s+package|position\s+elimination|redundancy\s+selection|affected\s+employees)\b
    - id: Pattern_global_top500_076_reduction_in_force_planning_lists_label_context
      pattern: (?i)\\b(?:reduction\-in\-force\\s+planning\\s+lists|reduction|force|planning|lists|top500)\\b
  keywords:
    - id: Keyword_reduction_in_force
      groups:
        - match_style: word
          terms:
            - reduction in force
            - redundancy list
            - layoff plan
            - workforce reduction
            - restructure
            - severance package
            - retrenchment
            - downsizing
            - position elimination
            - redundancy selection
            - affected employees
    - id: Keyword_global_top500_076_reduction_in_force_planning_lists_domain_context
      groups:
        - match_style: word
          terms:
            - reduction-in-force planning lists
            - reduction
            - force
            - planning
            - lists
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_076_reduction_in_force_planning_lists_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
