schema: testpattern/v1
name: Design process rules
slug: global-top500-219-design-process-rules
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to design process rules in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:design\s+process\s+rules|design\s+rules|design\s+methodology|intellectual\s+property|trade\s+secrets|proprietary\s+design|design\s+specification|design\s+guideline|engineering\s+process|design\s+standard)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - design process rules
    - design
    - process
    - rules
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: design process rules
      description: Primary topic phrase match
    - value: design rules
      description: Case-insensitive topic phrase match
    - value: design methodology
      description: Alternative topic phrase match
    - value: intellectual property
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to design process rules appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_design_process_rules
      matches:
        - ref: Pattern_global_top500_219_design_process_rules_label_context
        - ref: Keyword_global_top500_219_design_process_rules_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_219_design_process_rules_noise_exclusion
    - confidence_level: 75
      id_match: Regex_design_process_rules
      matches:
        - ref: Keyword_design_process_rules
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_219_design_process_rules_noise_exclusion
    - confidence_level: 65
      id_match: Regex_design_process_rules
      matches:
        - ref: Keyword_design_process_rules
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_219_design_process_rules_noise_exclusion
  regexes:
    - id: Regex_design_process_rules
      pattern: (?is)\b(?:design\s+process\s+rules|design\s+rules|design\s+methodology|intellectual\s+property|trade\s+secrets|proprietary\s+design|design\s+specification|design\s+guideline|engineering\s+process|design\s+standard)\b
    - id: Pattern_global_top500_219_design_process_rules_label_context
      pattern: (?i)\\b(?:design\\s+process\\s+rules|design|process|rules|top500)\\b
  keywords:
    - id: Keyword_design_process_rules
      groups:
        - match_style: word
          terms:
            - design process rules
            - design rules
            - design methodology
            - intellectual property
            - trade secrets
            - proprietary design
            - design specification
            - design guideline
            - engineering process
            - design standard
    - id: Keyword_global_top500_219_design_process_rules_domain_context
      groups:
        - match_style: word
          terms:
            - design process rules
            - design
            - process
            - rules
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_219_design_process_rules_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
