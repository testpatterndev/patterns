schema: testpattern/v1
name: Design process rules
slug: global-top500-219-design-process-rules
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies actionable design-process rules and constraints in Australian contexts: DR-numbered design rules carrying shall/must/prohibited/limit language. General design-guidance,
  engineering-standard, and intellectual-property topic references remain discovery-level context and do not enforce.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:design\s+process\s+rules|design\s+rules|design\s+guidelines|design\s+methodology|proprietary\s+design|design\s+specification|engineering\s+standard|intellectual\s+property|trade\s+secret|design\s+constraint)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - design process rules
    - design
    - process
    - rules
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: design process rules
      description: Primary topic phrase match
    - value: design rules
      description: Case-insensitive topic phrase match
    - value: design guidelines
      description: Alternative topic phrase match
    - value: design methodology
      description: Additional topic phrase match
    - value: 'DR-184: connector pitch must be >= 2.2 mm; copper and alloy X must not be combined unless coating Z is used.'
      description: Numbered rule with measurable and conditional design constraints (enforcing branch)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
    - value: The public engineering standard offers design guidelines for ramps.
      description: Public guidance topic must not reach the enforcing tiers
    - value: 'RULE-77: applicants must lodge form 12.'
      description: Non-design numbered rule must not enforce (DR prefix required)
    - value: 'Training sample RULE-001: width must be 10 mm.'
      description: Training/sample rule content must not enforce
    - value: The event design follows a standard process for invitations.
      description: Event-planning prose is outside scope
false_positives:
  - description: Common words and phrases related to design process rules appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_design_rule_structure
      matches:
        - ref: Evidence_design_process_rules
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
      description: DR-numbered constraint rule corroborated by design-topic vocabulary
    - confidence_level: 75
      id_match: Pattern_design_rule_structure
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
      description: DR-numbered constraint rule with modal/limit language
    - confidence_level: 65
      id_match: Pattern_design_process_rules
      matches:
        - ref: Evidence_design_process_rules
      discovery_only: true
      description: Design-guidance topic phrases — discovery inventory only
  regexes:
    - id: Pattern_design_process_rules
      pattern: >-
        (?is)\b(?:design\s+process\s+rules|design\s+rules|design\s+guidelines|design\s+methodology|proprietary\s+design|design\s+specification|engineering\s+standard|intellectual\s+property|trade\s+secret|design\s+constraint)\b
    - id: Pattern_design_rule_structure
      pattern: >-
        (?i)\bDR[-_ ]?\d{2,5}\b[^\r\n]{0,120}\b(?:shall|must\s+not|must|prohibited|maximum|minimum|unless)\b
      description: DR-prefixed numbered rule followed by modal/limit language on the same line; the first-pass RULE/REQ prefixes and the if/then branch were dropped per independent review because they match non-design rule sets and ordinary prose
  keywords:
    - id: Evidence_design_process_rules
      groups:
        - match_style: word
          terms:
            - design process rules
            - design rules
            - design guidelines
            - design methodology
            - proprietary design
            - design specification
            - engineering standard
            - intellectual property
            - trade secret
            - design constraint
risk_description: >-
  The regex matches design-process rules, design rules, guidelines, methodology, specifications, engineering standards, constraints, proprietary design, intellectual property, or trade-secret terminology. Many design guidelines, engineering standards, accessibility rules, and methodologies are public or routine and reveal no product-specific dimensions, logic, or constraints. A match may lead to valuable material, but copying or gaming requires precise non-public rules tied to a product, manufacturing process, or verification flow. Risk 5 supports OFFICIAL; SENSITIVE would require the actual proprietary rule set, confidential constraints, or detailed product-specific design methodology.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: 'TP-00345 approved reduced scope: add Pattern_design_rule_structure to the higher-confidence branches only, narrowed per the independent override — only the DR-prefixed numbered-rule branch (DR-nnn plus shall/must/must not/prohibited/maximum/minimum/unless within a 120-character same-line window) is implemented; the first-pass RULE/REQ prefixes matched any numbered rule set (court rules, HR policies) and the if/then branch matched ordinary prose, so both were dropped. 75 = DR rule with template NOT-gate; 85 additionally requires design-topic corroboration. The topic branch (Pattern_design_process_rules) is retained at 65 as discovery-only, so public standards/guidelines no longer enforce. Description now names actionable design rules rather than the PII boilerplate. Added DR-184 positive plus public-standard, non-design RULE-77, training-sample, and event-design negatives.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 820 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
