schema: testpattern/v1
name: Australian Marking - PROTECTED
slug: au-marking-protected
version: 1.2.0
type: regex
pattern_class: marking
engine: boost_regex
description: >-
  Detects the Australian Government PROTECTED protective marking (PSPF / QGISCF) in both email and
  document forms, sweeping up its IMM/caveat variants (Personal-Privacy, Legal-Privilege,
  Legislative-Secrecy, CABINET, NATIONAL-CABINET). SECRET and TOP SECRET roll up here so they
  receive at-least-PROTECTED handling. Regex logic ported from Microsoft's canonical PSPF SIT
  guidance; matched case-sensitively.
operation: >-
  Tier 95 requires the structured SEC=PROTECTED form. Tier 85 matches the PROTECTED banner. A third
  tier 85 matches SECRET (and the SECRET in TOP SECRET) to roll the higher classifications into the
  PROTECTED label.
pattern: '\bPROTECTED\b'
confidence: high
confidence_justification: >-
  High confidence: case-sensitive uppercase PROTECTED plus the structured SEC= form make this a
  reliable marking detector. The English word "protected" (lowercase) is excluded by case.
jurisdictions:
  - au
regulations:
  - "Criminal Code Act 1995 (Cth)"
frameworks:
  - PSPF
  - QGISCF
data_categories:
  - government
  - security-classification
case_sensitive: true
corroborative_evidence:
  keywords:
    - PSPF
    - protective marking
    - Australian Government
  proximity: 300
test_cases:
  should_match:
    - value: "Briefing [SEC=PROTECTED]"
      description: Email subject marking
    - value: "X-Protective-Marking: VER=2024.1, NS=gov.au, SEC=PROTECTED, CAVEAT=SH:CABINET"
      description: x-header with CABINET caveat (swept into PROTECTED)
    - value: "This file is classified PROTECTED"
      description: Document banner
    - value: "Annex marked SECRET by the agency"
      description: SECRET rolls up into the PROTECTED label
  should_not_match:
    - value: "wetlands are a protected area under the act"
      description: lowercase English word (case-sensitive exclusion)
    - value: "the configuration file is UNPROTECTED"
      description: UNPROTECTED must not match PROTECTED
    - value: "Memo [SEC=OFFICIAL]"
      description: OFFICIAL belongs to au-marking-official
    - value: "ROTATE THE API SECRET KEY QUARTERLY"
      description: SECRET-collocation excluded from the SECRET roll-up tier by the secret-collocation NOT group
false_positives:
  - description: Uppercase PROTECTED in non-marking contexts (e.g. "PROTECTED SPECIES").
    mitigation: Structured SEC= tier at 95; corroborative PSPF/government evidence raises banner confidence.
  - description: ALL-CAPS prose (legal boilerplate, headers, or documents rendered entirely in capitals) defeats the case-sensitivity signal the bare PROTECTED/SECRET banners rely on — any all-caps rendering of the word can fire with no protective-marking intent.
    mitigation: Treat banner/roll-up-tier-only hits as lower confidence when the surrounding text is itself all-caps; the structured SEC=PROTECTED tier (95) remains the reliable signal.
exports:
  - purview_xml
  - yaml
scope: narrow
risk_rating: 10
risk_description: PROTECTED marking indicates government-classified information requiring protective handling.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: "PROTECTED Government"
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 95
      id_match: Regex_au_protected_struct
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_au_protected_banner
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_au_protected_secret
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_secret_collocation_exclusion
  regexes:
    - id: Regex_au_protected_struct
      pattern: '\bSEC=PROTECTED\b'
    - id: Regex_au_protected_banner
      pattern: '\bPROTECTED\b'
    - id: Regex_au_protected_secret
      pattern: '\bSECRET\b'
  keywords:
    - id: Keyword_secret_collocation_exclusion
      groups:
        - match_style: word
          terms:
            - text: TRADE SECRET
              case_sensitive: true
            - text: TRADE SECRETS
              case_sensitive: true
            - text: CLIENT SECRET
              case_sensitive: true
            - text: API SECRET
              case_sensitive: true
            - text: SECRET MANAGER
              case_sensitive: true
created: '2026-06-29'
updated: '2026-07-09'
changelog:
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: marking — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-04'
    description: 'Harden SECRET roll-up tier: add TRADE SECRET(S)/CLIENT SECRET/API SECRET/SECRET MANAGER NOT-exclusion group (SECRET KEY deliberately omitted - plausible in genuinely classified COMSEC prose), document all-caps-prose false-positive limitation.'
