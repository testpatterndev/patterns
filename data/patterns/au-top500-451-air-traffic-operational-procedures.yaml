schema: testpattern/v1
name: Air traffic operational procedures
slug: au-top500-451-air-traffic-operational-procedures
version: 1.4.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to air traffic operational procedures in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:air\s+traffic\s+operational\s+procedures|air\s+traffic\s+control|flight\s+procedures|separation\s+minima|flight\s+level|approach\s+control|critical\s+infrastructure)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - infrastructure
  - security
corroborative_evidence:
  keywords:
    - air traffic operational procedures
    - air
    - traffic
    - operational
    - procedures
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: air traffic operational procedures
      description: Primary topic phrase match
    - value: air traffic control
      description: Case-insensitive topic phrase match
    - value: flight procedures
      description: Alternative topic phrase match
    - value: separation minima
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: air traffic procedure
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to air traffic operational procedures appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_air_traffic
      matches:
        - ref: Evidence_air_traffic
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_air_traffic
      matches:
        - ref: Evidence_air_traffic
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_air_traffic
      matches:
        - ref: Evidence_air_traffic
  regexes:
    - id: Pattern_air_traffic
      pattern: (?is)\b(?:air\s+traffic\s+operational\s+procedures|air\s+traffic\s+control|flight\s+procedures|separation\s+minima|flight\s+level|approach\s+control|critical\s+infrastructure)\b
  keywords:
    - id: Evidence_air_traffic
      groups:
        - match_style: word
          terms:
            - air traffic operational procedures
            - air traffic control
            - text: ATC
              case_sensitive: true
            - flight procedures
            - separation minima
            - clearance
            - airspace
            - runway
            - NOTAM
            - flight level
            - approach control
            - critical infrastructure
      strength: domain
risk_description: >-
  The classifier looks for air-traffic-control, flight-procedure, separation-minima, sector, and operational-procedure language, intending to find an operating procedure rather than general aviation commentary. A non-public procedure can reveal contingency methods, sector hand-offs, or local constraints that support evasion, disruption, or unsafe interference with a bounded airspace operation. Many standard procedures are published and the medium-confidence topic regex can also match training or regulatory material, so a hit does not prove restricted content. Risk 8 and SENSITIVE InfoTech are justified for authentic internal procedures; PROTECTED would require current protected operational detail whose loss could credibly cause significant national-service or life-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
