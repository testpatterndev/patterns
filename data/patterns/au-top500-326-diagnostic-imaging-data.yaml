schema: testpattern/v1
name: Diagnostic imaging data
slug: au-top500-326-diagnostic-imaging-data
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies diagnostic imaging data references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: au-healthcare-records.
pattern: (?is)\b(?:diagnostic\s+imaging|medical\s+imaging|CT\s+scan|imaging\s+data|imaging\s+report)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - diagnostic imaging data
    - diagnostic
    - imaging
    - data
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - au-healthcare-records
test_cases:
  should_match:
    - value: diagnostic imaging
      description: Primary topic phrase match
    - value: medical imaging
      description: Case-insensitive topic phrase match
    - value: CT scan
      description: Alternative topic phrase match
    - value: imaging data
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_diagnostic_imaging_data
      matches:
        - ref: Evidence_diagnostic_imaging_data
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_diagnostic_imaging_data
      matches:
        - ref: Evidence_diagnostic_imaging_data
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_diagnostic_imaging_data
      matches:
        - ref: Evidence_diagnostic_imaging_data
  regexes:
    - id: Pattern_diagnostic_imaging_data
      pattern: (?is)\b(?:diagnostic\s+imaging|medical\s+imaging|CT\s+scan|imaging\s+data|imaging\s+report)\b
  keywords:
    - id: Evidence_diagnostic_imaging_data
      groups:
        - match_style: word
          terms:
            - diagnostic imaging
            - radiology
            - medical imaging
            - x-ray
            - ultrasound
            - text: MRI
              case_sensitive: true
            - CT scan
            - imaging data
            - health
            - biomedical
            - DICOM
            - radiologist
            - imaging report
      strength: domain
risk_description: >-
  The detector recognizes diagnostic or medical imaging, CT scans, imaging reports, and imaging data with healthcare-record context. A genuine study can expose anatomy, injuries, tumors, pregnancy, disability, or other findings, while embedded identifiers and timestamps can link the images to a patient and care episode. The normal unit is one imaging study or report rather than a PACS archive, producing serious but contained privacy and clinical consequences. Risk 8 and SENSITIVE are appropriate; PROTECTED would require a bulk imaging repository, critical diagnostic-system access, or compromise causing significant treatment or safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
