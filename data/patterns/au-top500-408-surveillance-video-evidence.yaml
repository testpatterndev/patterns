schema: testpattern/v1
name: Surveillance video evidence
slug: au-top500-408-surveillance-video-evidence
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to surveillance video evidence in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:surveillance\s+video\s+evidence|surveillance\s+footage|CCTV\s+evidence|video\s+evidence|covert\s+surveillance|surveillance\s+recording|body\s+worn\s+camera|security\s+footage|video\s+exhibit|law\s+enforcement|evidentiary\s+recording|surveillance\s+log)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - surveillance video evidence
    - surveillance
    - video
    - evidence
    - law
    - enforcement
    - justice
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: surveillance video evidence
      description: Primary topic phrase match
    - value: surveillance footage
      description: Case-insensitive topic phrase match
    - value: CCTV evidence
      description: Alternative topic phrase match
    - value: video evidence
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to surveillance video evidence appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_surveillance_video_evidence
      matches:
        - ref: Evidence_surveillance_video_evidence
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_surveillance_video_evidence
      matches:
        - ref: Evidence_surveillance_video_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_surveillance_video_evidence
      matches:
        - ref: Evidence_surveillance_video_evidence
  regexes:
    - id: Pattern_surveillance_video_evidence
      pattern: >-
        (?is)\b(?:surveillance\s+video\s+evidence|surveillance\s+footage|CCTV\s+evidence|video\s+evidence|covert\s+surveillance|surveillance\s+recording|body\s+worn\s+camera|security\s+footage|video\s+exhibit|law\s+enforcement|evidentiary\s+recording|surveillance\s+log)\b
    - id: Pattern_au_top500_408_surveillance_video_evidence_label_context
      pattern: (?i)\\b(?:surveillance\\s+video\\s+evidence|surveillance|video|evidence|top500)\\b
  keywords:
    - id: Evidence_surveillance_video_evidence
      groups:
        - match_style: word
          terms:
            - surveillance video evidence
            - surveillance footage
            - CCTV evidence
            - video evidence
            - covert surveillance
            - surveillance recording
            - body worn camera
            - security footage
            - video exhibit
            - law enforcement
            - evidentiary recording
            - surveillance log
    - id: Keyword_au_top500_408_surveillance_video_evidence_domain_context
      groups:
        - match_style: word
          terms:
            - surveillance video evidence
            - surveillance
            - video
            - evidence
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
