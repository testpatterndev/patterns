schema: testpattern/v1
name: Student counseling records
slug: global-top500-346-student-counseling-records
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to student counseling records in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: industry-education. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:student\s+counseling|counseling\s+record|student\s+wellbeing|pastoral\s+care|mental\s+health|counselor\s+notes|psychological\s+support|student\s+welfare|guidance\s+counselor|referral\s+record)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - student counseling records
    - student
    - counseling
    - records
    - education
    - research
    - administration
  proximity: 300
  keyword_lists:
    - industry-education
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: student counseling
      description: Primary topic phrase match
    - value: counseling record
      description: Case-insensitive topic phrase match
    - value: student wellbeing
      description: Alternative topic phrase match
    - value: pastoral care
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to student counseling records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_student_counseling_records
      matches:
        - ref: Pattern_global_top500_346_student_counseling_records_label_context
        - ref: Keyword_global_top500_346_student_counseling_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_student_counseling_records
      matches:
        - ref: Keyword_student_counseling_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_student_counseling_records
      matches:
        - ref: Keyword_student_counseling_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_student_counseling_records
      pattern: >-
        (?is)\b(?:student\s+counseling|counseling\s+record|student\s+wellbeing|pastoral\s+care|mental\s+health|counselor\s+notes|psychological\s+support|student\s+welfare|guidance\s+counselor|referral\s+record)\b
    - id: Pattern_global_top500_346_student_counseling_records_label_context
      pattern: (?i)\\b(?:student\\s+counseling\\s+records|student|counseling|top500)\\b
  keywords:
    - id: Keyword_student_counseling_records
      groups:
        - match_style: word
          terms:
            - student counseling
            - counseling record
            - student wellbeing
            - pastoral care
            - mental health
            - education
            - administration
            - counselor notes
            - psychological support
            - student welfare
            - guidance counselor
            - referral record
    - id: Keyword_global_top500_346_student_counseling_records_domain_context
      groups:
        - match_style: word
          terms:
            - student counseling records
            - student
            - counseling
