schema: testpattern/v1
name: Cash flow forecast assumptions
slug: global-top500-119-cash-flow-forecast-assumptions
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to cash flow forecast assumptions in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:cash\s+flow\s+forecast|forecast\s+assumptions|projected\s+cash\s+flow|cash\s+flow\s+statement|AASB\s+107|operating\s+cash\s+flow|working\s+capital|liquidity\s+forecast|cash\s+projection|budget\s+assumption|prospective\s+financial|cash\s+flow\s+model)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
  - GDPR
  - PCI-DSS
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - cash flow forecast assumptions
    - cash
    - flow
    - forecast
    - assumptions
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
    - data-record-context
test_cases:
  should_match:
    - value: cash flow forecast
      description: Primary topic phrase match
    - value: forecast assumptions
      description: Case-insensitive topic phrase match
    - value: projected cash flow
      description: Alternative topic phrase match
    - value: cash flow statement
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_cash_flow_forecast
      matches:
        - ref: Evidence_cash_flow_forecast
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_cash_flow_forecast
      matches:
        - ref: Evidence_cash_flow_forecast
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_cash_flow_forecast
      matches:
        - ref: Evidence_cash_flow_forecast
  regexes:
    - id: Pattern_cash_flow_forecast
      pattern: >-
        (?is)\b(?:cash\s+flow\s+forecast|forecast\s+assumptions|projected\s+cash\s+flow|cash\s+flow\s+statement|AASB\s+107|operating\s+cash\s+flow|working\s+capital|liquidity\s+forecast|cash\s+projection|budget\s+assumption|prospective\s+financial|cash\s+flow\s+model)\b
  keywords:
    - id: Evidence_cash_flow_forecast
      groups:
        - match_style: word
          terms:
            - cash flow forecast
            - forecast assumptions
            - projected cash flow
            - cash flow statement
            - AASB 107
            - operating cash flow
            - working capital
            - liquidity forecast
            - cash projection
            - budget assumption
            - prospective financial
            - cash flow model
risk_description: >-
  This detector finds cash-flow forecasts and the assumptions used to produce projected receipts, expenses, and balances. Premature disclosure could reveal management expectations or let a counterparty exploit anticipated funding gaps in pricing and negotiation. A usual match is planning analysis rather than an account credential, and its utility falls quickly when assumptions are generic, stale, or already disclosed. Risk 4 and OFFICIAL are proportionate; board-approved forecasts tied to an undisclosed transaction or severe liquidity event would warrant escalation.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
