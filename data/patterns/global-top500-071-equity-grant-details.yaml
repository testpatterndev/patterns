schema: testpattern/v1
name: Equity grant details
slug: global-top500-071-equity-grant-details
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to equity grant details in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:equity\s+grant|stock\s+option|share\s+grant|vesting\s+schedule|restricted\s+stock|equity\s+award|option\s+grant|share\s+scheme|employee\s+shares|equity\s+compensation|stock\s+plan)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - equity grant details
    - equity
    - grant
    - details
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: equity grant
      description: Primary topic phrase match
    - value: stock option
      description: Case-insensitive topic phrase match
    - value: share grant
      description: Alternative topic phrase match
    - value: vesting schedule
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to equity grant details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_equity_grant
      matches:
        - ref: Pattern_global_top500_071_equity_grant_details_label_context
        - ref: Keyword_global_top500_071_equity_grant_details_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_equity_grant
      matches:
        - ref: Keyword_equity_grant
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_equity_grant
      matches:
        - ref: Keyword_equity_grant
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_equity_grant
      pattern: (?is)\b(?:equity\s+grant|stock\s+option|share\s+grant|vesting\s+schedule|restricted\s+stock|equity\s+award|option\s+grant|share\s+scheme|employee\s+shares|equity\s+compensation|stock\s+plan)\b
    - id: Pattern_global_top500_071_equity_grant_details_label_context
      pattern: (?i)\\b(?:equity\\s+grant\\s+details|equity|grant|top500)\\b
  keywords:
    - id: Keyword_equity_grant
      groups:
        - match_style: word
          terms:
            - equity grant
            - stock option
            - share grant
            - vesting schedule
            - restricted stock
            - equity award
            - option grant
            - share scheme
            - employee shares
            - equity compensation
            - stock plan
    - id: Keyword_global_top500_071_equity_grant_details_domain_context
      groups:
        - match_style: word
          terms:
            - equity grant details
            - equity
            - grant
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.ato.gov.au/businesses-and-organisations/corporate-tax-measures-and-assurance/employee-share-schemes/employers/employer-obligations
  - https://www.ato.gov.au/businesses-and-organisations/corporate-tax-measures-and-assurance/employee-share-schemes/in-detail/employer-reporting-requirements/reporting-requirements-for-employers
