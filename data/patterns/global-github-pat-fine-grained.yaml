schema: testpattern/v1
name: GitHub Fine-Grained PAT
slug: global-github-pat-fine-grained
version: 1.2.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects GitHub Fine-Grained PAT patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT
  directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://github.blog/2022-10-18-introducing-fine-grained-personal-access-tokens-for-github/ Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials,
  credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \bgithub_pat_[A-Za-z0-9]{22}_[A-Za-z0-9\s]{59,63}\b
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: github_pat_ABCDEFGHIJKLMNOPQRSTUV_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456
      description: Exact 65 probe - segmented PAT structure without independent GitHub context
    - value: 'GitHub fine-grained personal access credential github_pat_1234567890ABCDEFGHIJKL_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456'
      description: Exact 75 probe - PAT with fine-grained GitHub context
    - value: 'GitHub repository administration GH_FINE_GRAINED_PAT=github_pat_00000000000000000000AB_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0000000'
      description: Exact 85 probe - repository context plus canonical fine-grained PAT assignment
  should_not_match:
    - value: github_pat_ABCDEFGHIJKLMNOPQRSTU_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456
      description: Too few characters in first segment (21 instead of 22)
    - value: github_tok_ABCDEFGHIJKLMNOPQRSTUV_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456
      description: Wrong prefix (github_tok instead of github_pat)
    - value: ghp_ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789
      description: Classic GitHub PAT is a sibling token family, not fine-grained
    - value: 'Documentation example: GitHub repository administration GH_FINE_GRAINED_PAT=github_pat_ABCDEFGHIJKLMNOPQRSTUV_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456'
      description: Documentation example containing a valid-shaped PAT is excluded
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_rating: 8
risk_description: >-
  This detector recognizes the long github_pat token format used for fine-grained GitHub personal access tokens, making the match a bearer credential rather than a repository identifier. A live token can be replayed to read or change repositories and organisation resources explicitly granted to its owner and selected scope. The exposed party is the token holder and the repositories or organisations authorized to that one token, while expiry, revocation, fine-grained restrictions, and examples limit impact. Risk 8 SENSITIVE reflects serious contained source-code or workflow compromise; PROTECTED would require confirmed broad organisation administration, critical code-signing reach, or significant protected assets.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_github_fgpat
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_github_fgpat
      matches:
        - ref: Keyword_github_fine_grained_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_github_fgpat
      matches:
        - ref: Keyword_github_fine_grained_context
        - ref: Pattern_github_fine_grained_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_github_fgpat
      pattern: \bgithub_pat_[A-Za-z0-9]{22}_[A-Za-z0-9\s]{59,63}\b
    - id: Pattern_github_fine_grained_assignment
      pattern: (?i)\b(?:GH_FINE_GRAINED_PAT|GITHUB_FINE_GRAINED_PAT|GITHUB_PAT)\s*[=:]
  keywords:
    - id: Keyword_github_fine_grained_context
      groups:
        - match_style: string
          terms:
            - GitHub fine-grained personal access
            - GitHub repository administration
            - GitHub organisation access
            - GitHub fine-grained PAT
      strength: specific
created: '2026-02-08'
updated: '2026-07-19'
