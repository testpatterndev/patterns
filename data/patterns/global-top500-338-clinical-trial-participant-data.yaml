schema: testpattern/v1
name: Clinical trial participant data
slug: global-top500-338-clinical-trial-participant-data
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies clinical trial participant data references in healthcare and patient records. Protected health information
  under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: au-healthcare-records. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:clinical\s+trial|trial\s+participant|research\s+subject|study\s+enrollment|informed\s+consent|protocol\s+number|inclusion\s+criteria|case\s+report\s+form)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- healthcare
- phi
corroborative_evidence:
  keywords:
  - clinical trial participant data
  - clinical
  - trial
  - participant
  - data
  - health
  - biomedical
  - information
  proximity: 300
  keyword_lists:
  - au-healthcare-records
  - data-record-context
  - generic-data-labels
test_cases:
  should_match:
  - value: clinical trial
    description: Primary topic phrase match
  - value: trial participant
    description: Case-insensitive topic phrase match
  - value: research subject
    description: Alternative topic phrase match
  - value: study enrollment
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: patient biometric
    description: Generic word pair from old broad template should not match
false_positives:
- description: Medical terminology in health education materials, research publications, clinical guidelines, or public health
    documents without patient-specific data.
  mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers
    such as medical record numbers or dates of birth.
- description: General wellness and fitness content using medical vocabulary without constituting protected health information.
  mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical
    records from general health content.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: The detector finds clinical-trial, trial-participant, or research-subject phrases with eight healthcare-record
  corroborators and template exclusions, targeting data about enrolled people rather than a published trial summary. A true
  record can combine participant identity or code, eligibility condition, intervention arm, adverse outcomes, specimens, visits,
  and withdrawal or consent status. Disclosure could unblind a study, reveal experimental treatment and health status, harm
  the participant, and undermine trial integrity, although protocols and research publications remain possible false-positive
  contexts. Risk 8 and SENSITIVE fit one participant record; PROTECTED requires major trial compromise, bulk re-identifiable
  data, life-safety consequences, or significant institutional damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_clinical_trial_participant_data
    matches:
    - ref: Pattern_global_top500_338_clinical_trial_participant_data_label_context
    - ref: Keyword_global_top500_338_clinical_trial_participant_data_domain_context
    - ref: Keyword_clinical_trial_participant_data
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_clinical_trial_participant_data
    matches:
    - ref: Pattern_global_top500_338_clinical_trial_participant_data_label_context
    - ref: Keyword_global_top500_338_clinical_trial_participant_data_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_clinical_trial_participant_data
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_clinical_trial_participant_data
    pattern: (?is)\b(?:clinical\s+trial|trial\s+participant|research\s+subject|study\s+enrollment|informed\s+consent|protocol\s+number|inclusion\s+criteria|case\s+report\s+form)\b
  - id: Pattern_global_top500_338_clinical_trial_participant_data_label_context
    pattern: (?i)\b(?:clinical\s+trial\s+participant\s+data)\b
  keywords:
  - id: Keyword_clinical_trial_participant_data
    groups:
    - match_style: word
      terms:
      - clinical trial
      - trial participant
      - research subject
      - study enrollment
      - randomization
      - health
      - biomedical
      - informed consent
      - protocol number
      - investigator
      - inclusion criteria
      - case report form
    strength: specific
  - id: Keyword_global_top500_338_clinical_trial_participant_data_domain_context
    groups:
    - match_style: word
      terms:
      - clinical trial participant data
      - clinical
      - trial
      - participant
    strength: domain
