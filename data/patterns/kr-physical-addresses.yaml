schema: testpattern/v1
name: Korea Physical Addresses
slug: kr-physical-addresses
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Korea Physical Addresses patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that uses machine learning and function-based detection for physical
  address identification. This keyword list provides address-related terms for supplementary matching.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  country-specific address terminology to identify physical address data.
keywords:
  - 시
  - 도
  - 구
  - 군
  - 읍
  - 면
  - 동
  - 리
  - 로
  - 길
  - 번지
  - 호
  - 아파트
  - 층
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on address terms requires additional context and
  corroborative evidence for accurate physical address detection. Address keywords alone
  produce high false positive rates without structural validation.
jurisdictions:
  - kr
regulations:
  - "PIPA (South Korea)"
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 시 name, unit 4"
      description: Contains address keyword '시'
    - value: "located at 45 도 example"
      description: Contains address keyword '도'
    - value: "deliver to 78 구 test"
      description: Contains address keyword '구'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_kr_address_primary
      matches:
        - ref: Keyword_kr_address_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_kr_address_primary
  keywords:
    - id: Keyword_kr_address_primary
      groups:
        - match_style: word
          terms:
            - 시
            - 도
            - 구
            - 군
            - 읍
            - 면
            - 동
            - 리
            - 로
            - 길
            - 번지
            - 호
            - 아파트
            - 층
      strength: domain
    - id: Keyword_kr_address_context
      groups:
        - match_style: word
          terms:
            - 주소
            - 거주지
            - 우편번호
            - 배송지
            - 대한민국
            - 서울
            - 부산
            - 인천
            - 대구
            - 대전
            - 광주
      strength: domain
risk_rating: 3
risk_description: >-
  This Korean keyword list searches for city, province, and district markers near address-like numbers as supplementary location evidence. Such administrative tokens also appear in government names, regional statistics, news, transport information, and organisational addresses, so they do not establish a particular dwelling. A normal hit has low standalone harm and requires a detailed road or lot address plus identity linkage before it can support targeting. Risk 3 and OFFICIAL are appropriate; SENSITIVE would require a named private household, protected person, safety-sensitive venue, movement history, or bulk attributed addresses.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1326 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
