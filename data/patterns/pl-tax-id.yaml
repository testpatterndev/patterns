schema: testpattern/v1
name: Poland Tax Identification Number
slug: pl-tax-id
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Poland Tax Identification Number patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type. Due to the numeric format, corroborative evidence keywords
  are essential for reliable detection.
operation: >-
  Corroborative evidence: 5 keywords within 300 characters.
  Keyword lists: tax-id, pl-financial.
pattern: '\b\d{3}-?\d{3}-?\d{2}-?\d{2}\b'
confidence: medium
confidence_justification: >-
  Medium confidence: the 3-3-2-2 digit grouping pattern with optional hyphens is somewhat distinctive but can match other formatted numbers. Keywords like 'NIP' improve accuracy.
jurisdictions:
  - pl
  - eu
regulations:
  - GDPR
data_categories:
  - pii
  - financial
  - government-id
corroborative_evidence:
  keywords:
    - NIP
    - PESEL
    - numer identyfikacji podatkowej
    - tax identification
    - Urząd Skarbowy
  proximity: 300
  keyword_lists:

    - tax-id

    - pl-financial
test_cases:
  should_match:
    - value: '123-456-78-90'
      description: Polish NIP with hyphens
    - value: '1234567890'
      description: Polish NIP continuous digits
    - value: '987-654-32-10'
      description: Polish tax ID with separators
  should_not_match:
    - value: '123-456-78-9'
      description: Only 9 digits, too short for Polish NIP
    - value: '123-456-789-01'
      description: Wrong grouping for Polish NIP format
false_positives:
  - description: Generic numeric sequences in non-tax contexts such as reference numbers or account identifiers
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to distinguish
      tax identifiers from general numeric data.
  - description: Numbers from other identification schemes with similar digit patterns
    mitigation: >-
      Layer with jurisdiction-specific detection to prioritise matches in tax-related documents
      and cross-reference with other identifier types.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_pl_tax_id
      matches:
        - ref: Keyword_pl_tax_id
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pl_tax_id
  regexes:
    - id: Regex_pl_tax_id
      pattern: '\b\d{3}-?\d{3}-?\d{2}-?\d{2}\b'
      validators:
        - ref: Validator_pl_nip_checksum
  keywords:
    - id: Keyword_pl_tax_id
      groups:
        - match_style: word
          terms:
            - text: NIP
              case_sensitive: true
            - numer NIP
            - Numer Identyfikacji Podatkowej
            - numer identyfikacji podatkowej
            - tax identification number
            - tax ID
            - Urząd Skarbowy
            - identyfikacja podatkowa
            - numer podatkowy
            - podatnik
            - rozliczenie podatkowe
      strength: specific
  validators:
    - id: Validator_pl_nip_checksum
      type: Checksum
      params:
        weights: "6,5,7,2,3,4,5,6,7"
        mod: 11
        checkDigit: 0
  filters:
    - id: Filter_pl_tax_id_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The Polish detector matches a ten-digit NIP, optionally in its 3-3-2-2 grouping, when Polish tax terminology is nearby. NIP is chiefly used for businesses and taxable economic activity, so it is often present on invoices and public or shared registration material rather than representing a private personal dossier. Reuse may help fabricate supplier paperwork or link business records, but meaningful fraud requires entity details, bank instructions, and access to a filing or payment process. Risk 5 and OFFICIAL capture that bounded business risk; private tax filings, sensitive sole-trader records, or live payment changes would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-poland-tax-identification-number
    title: "Poland Tax Identification Number entity definition - Microsoft Learn"
