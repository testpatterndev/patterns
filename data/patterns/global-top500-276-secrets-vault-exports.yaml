schema: testpattern/v1
name: Secrets vault exports
slug: global-top500-276-secrets-vault-exports
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to secrets vault exports in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: classification-australia-government. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:secrets\s+vault|vault\s+export|hashicorp\s+vault|azure\s+key\s+vault|aws\s+secrets\s+manager|secret\s+engine|vault\s+token|sealed\s+secrets|secret\s+rotation|vault\s+backup|credential\s+store)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - secrets vault exports
  proximity: 240
  keyword_lists:
    - classification-australia-government
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: secrets vault
      description: Primary topic phrase match
    - value: vault export
      description: Case-insensitive topic phrase match
    - value: hashicorp vault
      description: Alternative topic phrase match
    - value: azure key vault
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: secret mfa
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to secrets vault exports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_secrets_vault_exports
      matches:
        - ref: Pattern_global_top500_276_secrets_vault_exports_label_context
        - ref: Keyword_global_top500_276_secrets_vault_exports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_secrets_vault_exports
      matches:
        - ref: Keyword_secrets_vault_exports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_secrets_vault_exports
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_secrets_vault_exports
      pattern: >-
        (?is)\b(?:secrets\s+vault|vault\s+export|hashicorp\s+vault|azure\s+key\s+vault|aws\s+secrets\s+manager|secret\s+engine|vault\s+token|sealed\s+secrets|secret\s+rotation|vault\s+backup|credential\s+store)\b
    - id: Pattern_global_top500_276_secrets_vault_exports_label_context
      pattern: (?i)\b(?:secrets\s+vault\s+exports)\b
  keywords:
    - id: Keyword_secrets_vault_exports
      groups:
        - match_style: word
          terms:
            - secrets vault
            - vault export
            - hashicorp vault
            - azure key vault
            - aws secrets manager
            - cyberark
            - secret engine
            - vault token
            - sealed secrets
            - secret rotation
            - vault backup
            - credential store
      strength: specific
    - id: Keyword_global_top500_276_secrets_vault_exports_domain_context
      groups:
        - match_style: word
          terms:
            - secrets vault exports
            - secrets
            - vault
            - exports
      strength: domain
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
