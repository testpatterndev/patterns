schema: testpattern/v1
name: Secrets vault exports
slug: global-top500-276-secrets-vault-exports
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies references to secrets-vault exports and backups. Product or operation
  phrases are discovery-only; structured export-record fields support medium
  confidence and a populated secret entry plus export-manifest metadata supports high.
operation: >-
  Regex_vault_export_phrase recognizes vault products and export/backup operations.
  The 65 tier inventories those references. The 75 tier requires structured path,
  mount, secret-name, version, or created-time fields. The 85 tier additionally
  requires a populated credential value and export-manifest metadata such as
  backup_id or exported_at. Enforcing tiers reject templates and placeholders.
pattern: >-
  (?is)\b(?:secrets\s+vault|vault\s+export|hashicorp\s+vault|azure\s+key\s+vault|aws\s+secrets\s+manager|secret\s+engine|vault\s+token|sealed\s+secrets|secret\s+rotation|vault\s+backup|credential\s+store)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - secrets vault exports
  proximity: 240
  keyword_lists:
    - classification-australia-government
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: Azure Key Vault
      description: Low-tier probe - vault product phrase without export record structure
    - value: 'vault export {"path":"secret/prod/payments","version":4,"created_time":"2026-07-19T01:00:00Z"}'
      description: Medium-tier probe - export phrase with structured record fields but no secret value
    - value: 'HashiCorp Vault export manifest backup_id=vlt-20260719 exported_at=2026-07-19T01:00:00Z {"path":"secret/prod/payments","client_secret":"x7K2mN9pQ4sT8vW3yZ6aB1cD"}'
      description: High-tier probe - manifest metadata and populated secret entry
    - value: 'AWS Secrets Manager backup {"secret_name":"payments/api","version":"AWSCURRENT"}'
      description: Medium-tier probe - provider-specific backup record structure
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: secret mfa
      description: Generic word pair from old broad template should not match
    - value: 'vault export {"path":}'
      description: Malformed export record with no field value
    - value: 'Vault export manifest backup_id=demo {"path":"secret/prod","client_secret":"PLACEHOLDER"}'
      description: Placeholder secret entry must not enforce
    - value: 'Documentation example: HashiCorp Vault export manifest backup_id=vlt-1 exported_at=2026-07-19 {"path":"secret/prod","token":"x7K2mN9pQ4sT8vW3yZ6"}'
      description: Documentation quoting a populated export must not enforce
    - value: 'Azure Key Vault certificate inventory lists public certificate names only'
      description: Sibling public-certificate inventory is not a secrets export record
false_positives:
  - description: Common words and phrases related to secrets vault exports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_vault_export_phrase
      matches:
        - ref: Evidence_vault_export_record
        - ref: Evidence_vault_secret_entry
        - ref: Evidence_vault_export_manifest
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_vault_export_placeholder
    - confidence_level: 75
      id_match: Regex_vault_export_phrase
      matches:
        - ref: Evidence_vault_export_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_vault_export_placeholder
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_vault_export_phrase
  regexes:
    - id: Regex_vault_export_phrase
      pattern: >-
        (?is)\b(?:secrets\s+vault|vault\s+export|hashicorp\s+vault|azure\s+key\s+vault|aws\s+secrets\s+manager|secret\s+engine|vault\s+token|sealed\s+secrets|secret\s+rotation|vault\s+backup|credential\s+store)\b
    - id: Evidence_vault_export_record
      pattern: '(?i)"?(?:path|mount|secret_name|secret_id|version|created_time)"?\s*[:=]\s*"?[A-Za-z0-9_./:-]{2,}'
    - id: Evidence_vault_secret_entry
      pattern: '(?i)"(?:password|api_key|token|private_key|client_secret)"\s*:\s*"[^"\r\n]{12,}"'
    - id: Evidence_vault_export_manifest
      pattern: '(?i)\b(?:export\s+manifest|backup_id|exported_at|snapshot_id|export_batch)\b'
  keywords:
    - id: Evidence_vault_export_placeholder
      groups:
        - match_style: string
          terms:
            - PLACEHOLDER
            - REDACTED
            - CHANGEME
            - example-secret
            - dummy-secret
risk_description: >-
  The medium-confidence detector matches phrases including secrets vault, vault export, HashiCorp Vault, and Azure Key Vault. A true semantic hit may refer to a product, procedure, or proposed export without containing a parsed export file or any credential value. Confirmed disclosure could expose many secrets, but the normal detected unit provides no secret count, validity, scope, or usable material. Risk 8 SENSITIVE preserves serious contextual concern; PROTECTED requires a verified populated vault export or evidence of broad privileged compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
