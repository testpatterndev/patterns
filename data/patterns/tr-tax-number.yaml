schema: testpattern/v1
name: Vergi Kimlik Numarası (Turkish Tax Identification Number)
slug: tr-tax-number
version: 1.1.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects the Turkish tax identification number (Vergi Kimlik Numarası, VKN) issued by the Turkish
  Revenue Administration (Gelir İdaresi Başkanlığı, GİB). The VKN is a 10-digit number structured as a
  3-digit alpha group code (001-999), a 6-digit sequence number and a single check digit. Since 1 July
  2006 Turkish citizens use their 11-digit T.C. Kimlik Numarası as their tax number (covered by the
  separate tr-national-id pattern); the 10-digit VKN remains the tax identifier for legal entities,
  ordinary partnerships, foreign legal entities and foreign nationals without a Foreign Identity Number.
operation: >-
  Checksum: the 10th digit is a check digit computed over the first nine digits (NOT enforced in this
  regex-only pattern; structural detection only). Regex_tr_tax_number matches ten digits whose leading
  3-digit alpha group code is 001-999 (000 is not issued), with word boundaries so an 11-digit T.C.
  Kimlik Numarası or longer digit run never partially matches. Every tier requires positive evidence —
  there is no bare value-only tier: High (85) requires tax label context plus VKN keywords with template
  exclusion; Medium (75) requires VKN keywords with template exclusion; Low (65) requires domain-context
  keywords. AllDigitsSameFilter suppresses repeated-digit placeholders such as 1111111111. Relationship
  to tr-national-id: the two patterns are structurally disjoint (10 digits vs 11 digits, both
  boundary-guarded), so no value matches both.
pattern: \b(?:00[1-9]|0[1-9][0-9]|[1-9][0-9]{2})[0-9]{7}\b
confidence: medium
confidence_justification: >-
  Medium confidence: 10-digit numeric strings are common (phone numbers, order numbers, other countries'
  identifiers such as Saudi national IDs), and the VKN check digit cannot be expressed in a regex, so
  corroborating tax keywords are required on every tier. The evidence-gated 75 tier is the recommended
  workhorse per identifier convention.
jurisdictions:
  - tr
regulations:
  - KVKK (Law No. 6698 on Protection of Personal Data) (Turkey)
  - Law No. 4358 on Expanding the Use of Tax Identification Numbers (Türkiye)
  - Tax Procedure Law No. 213 (Türkiye)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
  - financial
corroborative_evidence:
  keywords:
    - vergi kimlik
    - vergi numarası
    - VKN
    - tax identification number
    - tax ID
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '1234567890'
      description: Standard 10-digit VKN
    - value: 'Vergi Kimlik No: 0010005284'
      description: Turkish label with a VKN whose alpha group code is 001
    - value: '1230005284'
      description: Structure example from the OECD TIN portal (alpha group 123, sequence 000528, check digit 4)
    - value: VKN 9990001234 kayıtlıdır
      description: VKN abbreviation label with highest alpha group code 999
  should_not_match:
    - value: '0001234567'
      description: Leading alpha group code 000 is never issued
    - value: '123456789'
      description: Only nine digits — too short
    - value: '12345678901'
      description: Eleven digits — a T.C. Kimlik Numarası shape, covered by tr-national-id instead
    - value: IBAN TR330006100519786457841326
      description: Ten-digit sequence inside a longer digit run — boundary guard prevents partial match
    - value: '1111111111'
      description: Repeated-digit placeholder — suppressed by AllDigitsSameFilter
false_positives:
  - description: >-
      Ten-digit numeric sequences in unrelated contexts: Turkish mobile numbers written without the
      leading zero, order and invoice numbers, and other countries' 10-digit identifiers (e.g. Saudi
      national ID numbers).
    mitigation: >-
      Every tier requires corroborating tax keywords or label context within the proximity window; there
      is no bare value-only tier.
  - description: >-
      The VKN check digit (10th digit computed over the first nine) cannot be expressed in a regex, so
      structurally invalid 10-digit numbers can still match.
    mitigation: >-
      Rely on structure (alpha group 001-999, exact length, word boundaries), AllDigitsSameFilter and
      keyword evidence.
  - description: >-
      Sample tax numbers in accounting templates, e-invoice documentation and test data.
    mitigation: The high and medium tiers apply the template-exclusion NOT-group to suppress sample content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_tr_tax_number
      matches:
        - ref: Pattern_tr_tax_number_label_context
        - ref: Keyword_tr_tax_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_tr_tax_number
      matches:
        - ref: Keyword_tr_tax_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_tr_tax_number
      matches:
        - ref: Keyword_tr_tax_number_domain_context
  regexes:
    - id: Regex_tr_tax_number
      pattern: \b(?:00[1-9]|0[1-9][0-9]|[1-9][0-9]{2})[0-9]{7}\b
    - id: Pattern_tr_tax_number_label_context
      pattern: (?i)\b(?:vergi\s+kimlik|vergi\s+numaras[ıi]|vergi\s+no|tax\s+identification|tax\s+id|tax\s+number)\b
  keywords:
    - id: Keyword_tr_tax_number
      groups:
        - match_style: word
          terms:
            - vergi kimlik numarası
            - vergi kimlik no
            - vergi numarası
            - vergi no
            - text: VKN
              case_sensitive: true
            - tax identification number
            - tax ID
            - text: TIN
              case_sensitive: true
            - Turkish tax number
            - vergi dairesi
            - vergi levhası
            - Gelir İdaresi Başkanlığı
      strength: specific
    - id: Keyword_tr_tax_number_domain_context
      groups:
        - match_style: word
          terms:
            - vergi kimlik
            - vergi
            - tax
      strength: domain
  filters:
    - id: Filter_tr_tax_number_same_digits
      type: AllDigitsSameFilter
risk_rating: 7
risk_description: >-
  Tax identification numbers link directly to a person's or entity's financial records with government authorities. Exposure can facilitate tax fraud, unauthorized access to tax accounts, and financial
  identity theft.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://www.oecd.org/content/dam/oecd/en/topics/policy-issue-focus/aeoi/turkiye-tin.pdf
    title: Türkiye - Information on Tax Identification Numbers (OECD AEOI portal)
  - url: https://dijital.gib.gov.tr/foreigners/kimlikNoBasvuru
    title: Potential Tax Identification Number Application for Foreigners - Gelir İdaresi Başkanlığı (issuing authority)
  - url: https://lookuptax.com/docs/tax-identification-number/turkey-tax-id-guide
    title: Turkey TIN number guide - LookupTax
  - url: http://org-id.guide/list/TR-VKN
    title: Tax Identification Number (VKN), Türkiye (TR-VKN) - org-id.guide
