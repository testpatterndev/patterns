schema: testpattern/v1
name: Grant peer review comments
slug: global-top500-358-grant-peer-review-comments
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies grant peer-review comments and assessment records containing substantive reviewer
  observations, scores, or funding outcomes. Grant-review and application phrases are retained for
  discovery at 65; populated assessment fields raise confidence to 75, while formal proposal or
  reviewer references plus an explicit funding outcome raise confidence to 85.
operation: >-
  Regex_grant_peer_review_topic recognises grant-review, reviewer-feedback, panel, decision, and
  grant-application topics. The topic alone is discovery-only at 65. A populated score, rank,
  strength, weakness, reviewer-comment, moderation, or conflict field is required at 75. The 85 tier
  additionally requires a formal proposal, application, reviewer, review, or panel reference and a
  funding outcome. Enforcing tiers reject templates, guidance, journal/code review, performance
  review, lending, and investment collisions.
pattern: >-
  (?is)\b(?:grant\s+peer\s+review|peer\s+review\s+comments?|reviewer\s+feedback|funding\s+decision|review\s+panel|reviewer\s+score|funding\s+recommendation|grant\s+committee|grant\s+application)\b
confidence: medium
confidence_justification: >-
  Medium confidence is appropriate because grant-review language is not unique to a live assessment.
  Enforcement requires populated assessment structure, and high confidence adds both a formal record
  reference and an explicit funding outcome.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - criterion score
    - panel rank
    - strengths
    - weaknesses
    - reviewer comments
    - moderation note
    - conflict declaration
    - funding recommendation
    - panel decision
  proximity: 300
test_cases:
  should_match:
    - value: The grants office noted that grant peer review comments are pending.
      description: Low-tier probe - grant-review topic without populated assessment content
    - value: 'Grant peer review comments. Criterion 1 score: 3/5. Weakness: feasibility.'
      description: Medium-tier probe - populated assessment fields without a formal reference or funding outcome
    - value: 'Grant application review. Overall score: 82. Strengths: sound method. Weaknesses: limited sample.'
      description: Medium-tier probe - application topic with substantive reviewer output
    - value: 'Proposal ID: GR-884; Reviewer ID: R2; criterion 1 score: 3/5; weakness: feasibility; panel rank: 14; funding recommendation: do not fund.'
      description: High-tier probe - populated assessment, formal references, and explicit funding outcome
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: 'Journal peer review comments. Reviewer comments: revise the literature review. Overall score: 3/5.'
      description: Journal-review collision must not enforce as grant assessment content
    - value: 'Pull request code review: reviewer feedback. Weakness: missing null check. Overall score: 4/5.'
      description: Software-review collision must not enforce
    - value: 'Investment committee funding decision. Criterion score: 8/10. Recommendation: proceed with the venture capital round.'
      description: Commercial investment decision must not enforce as a grant decision
    - value: 'Loan application funding decision. Overall score: 720. Decision status: approved.'
      description: Lending decision must not enforce as grant peer review
    - value: 'Public guidance explains grant peer review comments, criterion score: 3/5, Proposal ID: GR-884, and funding recommendation: do not fund.'
      description: Guidance containing realistic assessment vocabulary must not enforce
    - value: 'Training example: Proposal ID: GR-884; grant peer review comments; criterion score: 3/5; funding recommendation: do not fund.'
      description: Structurally complete training content must not enforce
false_positives:
  - description: Grant-program guidance, application instructions, and training examples can reproduce review labels and sample scores without containing a live assessment.
    mitigation: Keep topic phrases discovery-only, require populated assessment fields for enforcement, and reject explicit guidance, template, and training framing.
  - description: Journal peer review, source-code review, employee appraisal, lending, and investment decisions use reviewer, score, weakness, recommendation, and funding language.
    mitigation: Apply domain-collision exclusions to enforcing tiers and require a grant-review topic together with assessment structure.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_grant_peer_review_topic
      matches:
        - ref: Pattern_grant_peer_review_assessment_field
        - ref: Pattern_grant_peer_review_formal_reference
        - ref: Evidence_grant_peer_review_funding_outcome
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_grant_peer_review_collision
    - confidence_level: 75
      id_match: Regex_grant_peer_review_topic
      matches:
        - ref: Pattern_grant_peer_review_assessment_field
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_grant_peer_review_collision
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_grant_peer_review_topic
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_grant_peer_review_collision
  regexes:
    - id: Regex_grant_peer_review_topic
      pattern: >-
        (?is)\b(?:grant\s+peer\s+review|peer\s+review\s+comments?|reviewer\s+feedback|funding\s+decision|review\s+panel|reviewer\s+score|funding\s+recommendation|grant\s+committee|grant\s+application)\b
    - id: Pattern_grant_peer_review_assessment_field
      pattern: >-
        (?im)\b(?:criterion(?:\s+\d+)?\s+score|overall\s+score|panel\s+rank)\s*[:#-]\s*(?:\d+(?:\.\d+)?(?:\s*/\s*\d+)?|[A-E]|excellent|good|fair|poor)\b|\b(?:strengths?|weaknesses?|reviewer\s+comments?|moderation\s+notes?|conflict\s+declaration)\s*[:#-]\s*[^\r\n]{3,120}
    - id: Pattern_grant_peer_review_formal_reference
      pattern: >-
        (?i)\b(?:proposal|application|reviewer|review|panel)\s*(?:id|no\.?|number|ref(?:erence)?)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{1,24}\b
  keywords:
    - id: Evidence_grant_peer_review_funding_outcome
      groups:
        - match_style: word
          terms:
            - funding recommendation
            - recommended for funding
            - not recommended for funding
            - do not fund
            - fund with conditions
            - panel decision
            - decision status
            - final ranking
            - reserve list
      strength: specific
    - id: Evidence_grant_peer_review_collision
      groups:
        - match_style: word
          terms:
            - journal peer review
            - manuscript review
            - code review
            - pull request
            - performance review
            - employee appraisal
            - loan application
            - credit decision
            - investment committee
            - venture capital
            - public guidance
            - guidance document
      strength: noise
risk_description: >-
  The detector recognizes grant-peer-review, reviewer-feedback, peer-review-comment, or grant-application language in an education and research setting. Authentic comments can reveal confidential criticism, reviewer reasoning, proposal weaknesses, unpublished ideas, and funding recommendations, enabling retaliation, lobbying, plagiarism, or interference with a competitive award. The normal record affects a bounded proposal and participants rather than an entire funding program, yet career, intellectual-property, and procedural harm can be serious. Risk 8 and SENSITIVE are proportionate; PROTECTED would require systemic compromise of a major grant process, protected research, or significant broad damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-07-18'
changelog:
  - version: 1.4.0
    date: '2026-07-18'
    description: 'Profile quality: replace self-corroborating topic tiers with exact 65 discovery, 75 populated-assessment, and 85 formal-reference-plus-outcome tiers; add grant-specific review, lending, investment, guidance, and training adversarial coverage.'
  - version: 1.3.0
    date: '2026-07-17'
    description: 'SIT alignment wave1 (TP-01266, reduced scope): Regex_grant_peer_review narrowed to review-output anchors (grant application, grant proposal, assessment criteria, research funding removed — they self-corroborated at 65); "grant application" re-wired as the approved contextual branch (Regex_grant_peer_review_ContextualBranch) enforcing at 65 only with Keyword_grant_peer_review_IndependentContext review-field evidence (10 terms materialized from the approved definition) and otherwise 65 discovery_only, both with the template-exclusion NOT gate; adversarial tests added. Deliberately less than the first-pass candidate: grant proposal / assessment criteria / research funding are deleted from the primary (their contextual gating had no written-out branch definition) and remain evidence-only; no 75/85 re-tiering.'
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1904 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
