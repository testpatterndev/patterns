schema: testpattern/v1
name: Terrorism Watchlist Entry
slug: terrorism-watchlist-entry
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects terrorism and national security watchlist entries including risk ratings, monitoring status, intelligence basis, and border alert configurations. Disclosure enables subjects to evade monitoring and compromises border security.
operation: 'Keyword proximity: primary keywords (watchlist, persons of interest register, national security flag, adverse security assessment, border alert, no-fly list, ASIO referral) within 300 characters of personal identifiers and risk terms. Regex for ASIO reference numbers. Negative keyword exclusion for public policy and media.'
pattern: (?i)\b(terrorism\s+watchlist|persons?\s+of\s+interest\s+register|national\s+security\s+flag|adverse\s+security\s+assessment|security\s+alert\s+(?:entry|notification)|border\s+alert\s+(?:entry|notification)|movement\s+alert\s+(?:list|entry)|no[\-\s]fly\s+list\s+(?:entry|nomination)|ASIO\s+(?:referral|assessment|security\s+assessment))\b
confidence: high
confidence_justification: 'High confidence: requires watchlist terminology with personal identifiers and risk classification. ASIO referral references with border alerts and risk ratings are distinctive to genuine records.'
jurisdictions:
  - global
regulations:
- "Criminal Code Act 1995 (Cth)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - NATIONAL SECURITY
    - RESTRICTED
    - ASIO
    - AFP
    - Australian Border Force
    - watchlist
    - national security flag
    - adverse assessment
    - border alert
    - movement alert
    - no-fly list
    - enhanced screening
    - active monitoring
    - high risk
    - elevated risk
  proximity: 300
  keyword_lists:

    - law-enforcement
test_cases:
  should_match:
    - value: 'PROTECTED — NATIONAL SECURITY. Terrorism Watchlist Entry. Subject: Omar Hassan IBRAHIM, DOB 03/11/1988, passport PA1234567. National security flag: ACTIVE. ASIO adverse security assessment 14/10/2024. Ref ASA-2024-7892. Risk: HIGH. Border alert: movement alert — notify AFP/ASIO on travel. Enhanced screening all airports.'
      description: Terrorism watchlist entry with ASIO assessment and border alerts
    - value: 'RESTRICTED. POI Register update. Subject added to watchlist per ASIO referral ASA-2025-0342. Adverse assessment: foreign terrorist organisation association. Active monitoring. No-fly list nomination to Home Affairs. Movement alert all border points.'
      description: POI register update with ASIO referral and no-fly nomination
    - value: 'Border alert notification. Subject: Fatima AL-RASHIDI. National security flag triggered at Brisbane International. Movement alert confirmed. ASIO assessment: elevated risk. Enhanced screening. AFP and ASIO notified. POI register entry active since March 2024.'
      description: Border alert triggered by watchlist at airport
  should_not_match:
    - value: Home Affairs published a factsheet explaining Australia's border alert system, including alert types and review processes.
      description: Published government factsheet
    - value: A civil liberties report criticised the lack of transparency in no-fly list processes, arguing individuals lack due process.
      description: Civil liberties report on watchlists
    - value: A news article reported an Australian citizen was denied boarding due to a security watchlist. The lawyer would challenge in court.
      description: Media report about watchlist challenge
false_positives:
  - description: Government factsheets about border systems
    mitigation: 'Negative keyword exclusion: ''factsheet'', ''published'', ''explains'', ''public information'''
  - description: Civil liberties reports on watchlist processes
    mitigation: 'Negative keyword exclusion: ''civil liberties'', ''human rights'', ''criticising'', ''due process'''
  - description: Media reporting about watchlist challenges
    mitigation: 'Negative keyword exclusion: ''news article'', ''reported'', ''allegedly'', ''lawyer stated'''
  - description: Parliamentary reviews of national security legislation
    mitigation: 'Negative keyword exclusion: ''parliamentary'', ''committee'', ''legislative review'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_terrorism_watchlist_entry_watchlist_terms
      matches:
        - ref: Evidence_terrorism_watchlist_entry_primary_keywords
        - ref: Evidence_terrorism_watchlist_entry_classification_markers
        - ref: Evidence_terrorism_watchlist_entry_corroborative_terms
        - ref: Pattern_terrorism_watchlist_entry_asio_reference
        - ref: Pattern_terrorism_watchlist_entry_passport_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_terrorism_watchlist_entry_exclusion
    - confidence_level: 75
      id_match: Pattern_terrorism_watchlist_entry_watchlist_terms
      matches:
        - ref: Evidence_terrorism_watchlist_entry_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_terrorism_watchlist_entry_exclusion
    - confidence_level: 65
      id_match: Pattern_terrorism_watchlist_entry_watchlist_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_terrorism_watchlist_entry_exclusion
  regexes:
    - id: Pattern_terrorism_watchlist_entry_watchlist_terms
      pattern: (?i)\b(terrorism\s+watchlist|persons?\s+of\s+interest\s+register|national\s+security\s+flag|adverse\s+security\s+assessment|border\s+alert|movement\s+alert|no[\-\s]fly\s+list|ASIO\s+referral)\b
    - id: Pattern_terrorism_watchlist_entry_asio_reference
      pattern: \bASA-\d{4}-\d{3,5}\b
    - id: Pattern_terrorism_watchlist_entry_passport_number
      pattern: \b(?:PA|P)[A-Z]?\d{7,8}\b
  keywords:
    - id: Evidence_terrorism_watchlist_entry_primary_keywords
      groups:
        - match_style: word
          terms:
            - terrorism watchlist
            - persons of interest register
            - national security flag
            - adverse security assessment
            - security alert
            - border alert
            - movement alert
            - no-fly list
            - ASIO referral
            - watchlist entry
    - id: Evidence_terrorism_watchlist_entry_classification_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - Law-Enforcement
            - NATIONAL SECURITY
            - RESTRICTED
            - AUSTEO
            - AGAO
    - id: Evidence_terrorism_watchlist_entry_corroborative_terms
      groups:
        - match_style: word
          terms:
            - ASIO
            - AFP
            - Australian Border Force
            - Department of Home Affairs
            - high risk
            - elevated risk
            - active monitoring
            - enhanced screening
            - international travel
            - no-fly nomination
    - id: Filter_terrorism_watchlist_entry_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - factsheet
            - public information
            - civil liberties
            - human rights
            - criticising
            - due process
            - news article
            - reported
            - allegedly
            - lawyer stated
            - parliamentary
            - committee

risk_rating: 10
risk_description: "Identities on terrorism watchlists with risk ratings and monitoring status; disclosure enables counter-surveillance and compromises border security."
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Law-Enforcement
references: []
created: '2026-02-20'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
