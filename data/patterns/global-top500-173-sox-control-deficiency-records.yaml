schema: testpattern/v1
name: SOX control deficiency records
slug: global-top500-173-sox-control-deficiency-records
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to sox control deficiency records in international contexts. This content represents financial-control deficiency records (affected controls, severity,
  remediation status); it is not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:sox\s+control\s+deficiency\s+records|control\s+deficiency|material\s+weakness|significant\s+deficiency|internal\s+control\s+over\s+financial\s+reporting|sox\s+compliance|section\s+404|management\s+assessment|remediation\s+plan|control\s+environment|financial\s+reporting\s+controls)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - sox control deficiency records
    - sox
    - control
    - deficiency
    - records
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: sox control deficiency records
      description: Primary topic phrase match
    - value: control deficiency
      description: Case-insensitive topic phrase match
    - value: material weakness
      description: Alternative topic phrase match
    - value: significant deficiency
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to sox control deficiency records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_sox_control_deficiency
      matches:
        - ref: Pattern_global_top500_173_sox_control_deficiency_records_label_context
        - ref: Keyword_global_top500_173_sox_control_deficiency_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_sox_control_deficiency
      matches:
        - ref: Keyword_sox_control_deficiency
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_sox_control_deficiency
      pattern: >-
        (?is)\b(?:sox\s+control\s+deficiency\s+records|control\s+deficiency|material\s+weakness|significant\s+deficiency|internal\s+control\s+over\s+financial\s+reporting|sox\s+compliance|section\s+404|management\s+assessment|remediation\s+plan|control\s+environment|financial\s+reporting\s+controls)\b
    - id: Pattern_global_top500_173_sox_control_deficiency_records_label_context
      pattern: (?i)\b(?:sox\s+control\s+deficiency\s+records)\b
  keywords:
    - id: Keyword_sox_control_deficiency
      groups:
        - match_style: word
          terms:
            - sox control deficiency records
            - sarbanes-oxley
            - control deficiency
            - material weakness
            - significant deficiency
            - internal control over financial reporting
            - sox compliance
            - section 404
            - management assessment
            - remediation plan
            - control environment
            - financial reporting controls
      strength: specific
    - id: Keyword_global_top500_173_sox_control_deficiency_records_domain_context
      groups:
        - match_style: word
          terms:
            - sox control deficiency records
            - sox
            - control
            - deficiency
      strength: domain
risk_description: >-
  This concept detector seeks SOX-control-deficiency, material-weakness, significant-deficiency, and control-deficiency language intended to identify a documented financial-control failure. A substantive record can reveal exploitable process gaps, affected accounts, management conclusions, and remediation delays, enabling fraud, audit prejudice, regulatory action, or market harm to the organisation. Public audit guidance can match, but the normal true-positive unit is an unresolved deficiency record rather than the term material weakness in isolation. Risk 8 SENSITIVE reflects serious contained financial and regulatory harm; PROTECTED would require a critical systemic weakness, market-wide consequences, protected financial infrastructure, active major fraud, or significant government damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
