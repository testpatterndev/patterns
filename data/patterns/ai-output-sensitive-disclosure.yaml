schema: testpattern/v1
name: AI Output Sensitive Disclosure
slug: ai-output-sensitive-disclosure
version: 0.1.0
type: keyword_list
description: >-
  Marks AI-generated output context (responses, generated files, chat exports) so existing PII/secret
  SITs can be re-scoped to it. Detection of the sensitive data itself is delegated to those SITs via
  the ai-threat-classifiers collection; this pattern supplies the AI-output context signal.
operation: >-
  One phrase regex (Pattern_ai_output_context) matching AI-output framings, corroborated by AI-context
  markers. Single low tier (65 phrase only). This is a context marker only: the regulated-data detection
  is delegated to existing PII/secret SITs in the ai-threat-classifiers collection. Approved reporting,
  internal analytics and synthetic datasets are the named FP traps.
pattern: '(?i)\b(?:AI (?:response|output)|generated (?:by (?:AI|copilot)|response|report)|copilot (?:said|generated)|model output)\b'
confidence: low
confidence_justification: >-
  Low by design. This pattern only asserts AI-output context, not the presence of sensitive data; the
  sensitive-data verdict is delegated to existing PII/secret SITs re-scoped via the collection. AI-output
  phrasing also appears around approved reporting, internal analytics and synthetic datasets (the named
  FP traps), so the context signal alone is necessary-not-sufficient.
jurisdictions: [global]
regulations: ['OWASP LLM Top 10 2025', 'NIST AI RMF GenAI Profile']
frameworks: [ISO 27001]
data_categories: [emerging, security]
ai_threat:
  ai_sit_id: AI-SIT-010
  threat_family: Traditional
  detection_approach: SIT
corroborative_evidence:
  keywords: [response, output, generated, export]
  proximity: 300
  keyword_lists: [ai-context-markers]
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  regexes:
    - id: Pattern_ai_output_context
      pattern: '(?i)\b(?:AI (?:response|output)|generated (?:by (?:AI|copilot)|response|report)|copilot (?:said|generated)|model output)\b'
  shared_keywords:
    - dict: ai-context-markers
      as: Evidence_ai_context
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Pattern_ai_output_context
risk_rating: 6
risk_description: >-
  Sensitive or regulated data surfaced in AI output can be disclosed to unauthorised recipients; this
  marker scopes existing SITs to AI-generated content.
sensitivity_labels:
  us_gov: 'CUI Basic'
  uk_gov: 'OFFICIAL-SENSITIVE'
test_cases:
  should_match:
    - value: 'The following is the AI response generated by Copilot for the customer query.'
      description: AI-output context marker (sensitive data detection delegated to PII SITs)
    - value: 'This summary is the model output from the assistant.'
      description: model output framing
    - value: 'See the report generated by AI below for the account details.'
      description: generated by AI framing
  should_not_match:
    - value: 'The quarterly board report was finalised yesterday.'
      description: Human-authored content, no AI-output context
    - value: 'Our analysts manually wrote the customer summary this morning.'
      description: Explicitly human-authored summary, no AI-output marker
    - value: 'The synthetic dataset was approved for internal analytics use.'
      description: Approved internal analytics / synthetic data (named FP trap)
false_positives:
  - description: Approved reporting, internal analytics dashboards, and synthetic test datasets often describe machine-generated content using AI-output phrasing without containing regulated data.
    mitigation: This pattern only asserts AI-output context; delegate the sensitive-data verdict to the existing PII/secret SITs re-scoped via the ai-threat-classifiers collection rather than treating the context marker as a finding on its own.
  - description: Documentation and marketing copy that discusses AI features (e.g. "the AI response feature") can trip the phrase regex without any actual AI-generated sensitive content.
    mitigation: Require co-occurrence with a regulated-data SIT match within the proximity window before raising a verdict; the single low tier is necessary-not-sufficient.
created: '2026-06-08'
updated: '2026-06-08'
author: testpattern-community
license: MIT
keywords:
  - AI response
  - AI output
  - generated by AI
  - generated by copilot
  - generated response
  - generated report
  - copilot said
  - copilot generated
  - model output
