schema: testpattern/v1
name: Household composition details
slug: global-top500-055-household-composition-details
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to household composition details in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:household\s+composition\s+details|household\s+composition|household\s+members|family\s+members|number\s+of\s+dependents|household\s+size|family\s+composition|living\s+arrangements|household\s+register|family\s+unit)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - household composition details
    - household
    - composition
    - details
    - contact
    - location
    - data
  proximity: 300
test_cases:
  should_match:
    - value: household composition details
      description: Primary topic phrase match
    - value: household composition
      description: Case-insensitive topic phrase match
    - value: household members
      description: Alternative topic phrase match
    - value: family members
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to household composition details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_household_composition_details
      matches:
        - ref: Pattern_global_top500_055_household_composition_details_label_context
        - ref: Keyword_global_top500_055_household_composition_details_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_household_composition_details
      matches:
        - ref: Keyword_household_composition_details
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_household_composition_details
      matches:
        - ref: Keyword_household_composition_details
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_household_composition_details
      pattern: >-
        (?is)\b(?:household\s+composition\s+details|household\s+composition|household\s+members|family\s+members|number\s+of\s+dependents|household\s+size|family\s+composition|living\s+arrangements|household\s+register|family\s+unit)\b
    - id: Pattern_global_top500_055_household_composition_details_label_context
      pattern: (?i)\\b(?:household\\s+composition\\s+details|household|composition|top500)\\b
  keywords:
    - id: Keyword_household_composition_details
      groups:
        - match_style: word
          terms:
            - household composition details
            - household composition
            - household members
            - family members
            - number of dependents
            - occupants
            - household size
            - family composition
            - living arrangements
            - cohabitants
            - household register
            - family unit
    - id: Keyword_global_top500_055_household_composition_details_domain_context
      groups:
        - match_style: word
          terms:
            - household composition details
            - household
            - composition
            - top500
            - field
            - identifier
            - reference
