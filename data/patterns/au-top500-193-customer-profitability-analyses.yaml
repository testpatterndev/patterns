schema: testpattern/v1
name: Customer profitability analyses
slug: au-top500-193-customer-profitability-analyses
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to customer profitability analyses in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:customer\s+profitability|profitability\s+analysis|customer\s+margin|customer\s+lifetime\s+value|revenue\s+per\s+customer|cost\s+to\s+serve|customer\s+segmentation|profit\s+contribution|account\s+profitability|churn\s+analysis|retention\s+analysis)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - customer profitability analyses
    - customer
    - profitability
    - analyses
    - mergers
    - acquisitions
    - strategy
  proximity: 300
  keyword_lists:

    - data-record-context
test_cases:
  should_match:
    - value: customer profitability
      description: Primary topic phrase match
    - value: profitability analysis
      description: Case-insensitive topic phrase match
    - value: customer margin
      description: Alternative topic phrase match
    - value: customer lifetime value
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to customer profitability analyses appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_customer_profitability
      matches:
        - ref: Evidence_customer_profitability
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_customer_profitability
      matches:
        - ref: Evidence_customer_profitability
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_customer_profitability
      matches:
        - ref: Evidence_customer_profitability
  regexes:
    - id: Pattern_customer_profitability
      pattern: (?is)\b(?:customer\s+profitability|profitability\s+analysis|customer\s+margin|customer\s+lifetime\s+value|revenue\s+per\s+customer|cost\s+to\s+serve|customer\s+segmentation|profit\s+contribution|account\s+profitability|churn\s+analysis|retention\s+analysis)\b
  keywords:
    - id: Evidence_customer_profitability
      groups:
        - match_style: word
          terms:
            - customer profitability
            - profitability analysis
            - customer margin
            - customer lifetime value
            - CLV
            - revenue per customer
            - cost to serve
            - customer segmentation
            - profit contribution
            - account profitability
            - churn analysis
            - retention analysis
            - confidential
    - id: Evidence_data_record_context
      groups:
        - match_style: word
          terms:
            - field
            - column
            - row
            - entry
            - record
            - value
            - form
            - register
            - database
            - extract
            - export
            - spreadsheet
            - table
            - schedule
            - appendix
            - attachment
            - registry
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
