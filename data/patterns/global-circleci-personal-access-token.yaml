schema: testpattern/v1
name: CircleCI Personal Access Token
slug: global-circleci-personal-access-token
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects CircleCI personal access tokens (CCIPAT_ prefix). These tokens authenticate to the
  CircleCI API and can read/modify pipelines, contexts and project settings; a leak enables CI/CD compromise.
operation: >-
  Prefixed token format CCIPAT_ followed by a ~22-character base58 segment, an underscore, and a 40-character hex
  string. Corroborative evidence: keywords within 300 characters.
pattern: (?<![A-Za-z0-9_])CCIPAT_[A-Za-z0-9]{20,24}_[0-9a-f]{40}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the distinctive CCIPAT_ prefix combined with the base58_hex two-segment structure makes false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act
  - Computer Misuse Act 1990
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - circleci
    - circle ci
    - personal access token
    - CIRCLE_TOKEN
    - api token
    - CI/CD
  proximity: 300
test_cases:
  should_match:
    - value: CCIPAT_ULUhR6rJLxYbyzyrP19iMZ_8fb1e3510325f7f09361de22b9420346c53ca2cb
      description: Exact 65 probe - segmented PAT without independent CircleCI context
    - value: 'CircleCI pipeline credential CCIPAT_zZyYxXwWvVuU0123456789_deadbeefdeadbeefdeadbeefdeadbeefdeadbeef'
      description: Exact 75 probe - PAT with CircleCI pipeline context
    - value: 'CircleCI API secret CIRCLE_TOKEN=CCIPAT_ABCDEFGHIJ1234567890ab_0123456789abcdef0123456789abcdef01234567'
      description: Exact 85 probe - API context plus canonical CircleCI token assignment
  should_not_match:
    - value: CCIPAT_short_0123456789abcdef
      description: Hex segment too short to be a CircleCI PAT
    - value: CCIPRJ_ULUhR6rJLxYbyzyrP19iMZ_8fb1e3510325f7f09361de22b9420346c53ca2cb
      description: Project token prefix (CCIPRJ_), not a personal access token
    - value: 'GITHUB_TOKEN=CCIPAT_ULUhR6rJLxYbyzyrP19iMZ_8fb1e3510325f7f09361de22b9420346c53ca2cb'
      description: Sibling CI provider label does not corroborate a CircleCI PAT
    - value: 'Documentation example: CircleCI API CIRCLE_TOKEN=CCIPAT_ULUhR6rJLxYbyzyrP19iMZ_8fb1e3510325f7f09361de22b9420346c53ca2cb'
      description: Documentation example containing a valid-shaped PAT is excluded
    - value: generate a circleci personal access token in user settings
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder CCIPAT_ strings.
    mitigation: Require corroborative CircleCI keywords and exclude placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This high-confidence pattern identifies a CircleCI personal access token with the CCIPAT prefix, account segment, and 40-character hexadecimal suffix. A live token can read or alter pipeline settings, contexts, and project automation, enabling secret theft or malicious build execution within its account permissions. The normal match is one revocable user token and creates serious CI/CD harm without proving control of every project or downstream environment. Risk 8 and SENSITIVE InfoTech are justified; PROTECTED needs verified broad deployment compromise or significant operational damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_circleci_personal_access_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_circleci_personal_access_token
      matches:
        - ref: Keyword_circleci_pat_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_circleci_personal_access_token
      matches:
        - ref: Keyword_circleci_pat_context
        - ref: Pattern_circleci_token_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_circleci_personal_access_token
      pattern: (?<![A-Za-z0-9_])CCIPAT_[A-Za-z0-9]{20,24}_[0-9a-f]{40}(?![A-Za-z0-9])
    - id: Pattern_circleci_token_assignment
      pattern: (?i)\b(?:CIRCLE_TOKEN|CIRCLECI_TOKEN)\s*[=:]
  keywords:
    - id: Keyword_circleci_pat_context
      groups:
        - match_style: string
          terms:
            - CircleCI API
            - CircleCI pipeline
            - CircleCI context
            - CircleCI project
      strength: specific
