schema: testpattern/v1
name: Sanctions screening matches
slug: au-top500-134-sanctions-screening-matches
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to sanctions screening matches in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:sanctions\s+screening|DFAT\s+consolidated\s+list|sanctions\s+match|designated\s+person|prohibited\s+entity|screening\s+result|sanctions\s+compliance|politically\s+exposed\s+person)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - sanctions screening matches
    - sanctions
    - screening
    - matches
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: sanctions screening
      description: Primary topic phrase match
    - value: dfat consolidated list
      description: Case-insensitive topic phrase match
    - value: sanctions match
      description: Alternative topic phrase match
    - value: designated person
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_sanctions_screening
      matches:
        - ref: Evidence_sanctions_screening
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_sanctions_screening
      matches:
        - ref: Evidence_sanctions_screening
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_sanctions_screening
      matches:
        - ref: Evidence_sanctions_screening
  regexes:
    - id: Pattern_sanctions_screening
      pattern: (?is)\b(?:sanctions\s+screening|DFAT\s+consolidated\s+list|sanctions\s+match|designated\s+person|prohibited\s+entity|screening\s+result|sanctions\s+compliance|politically\s+exposed\s+person)\b
  keywords:
    - id: Evidence_sanctions_screening
      groups:
        - match_style: word
          terms:
            - sanctions screening
            - DFAT consolidated list
            - sanctions match
            - designated person
            - prohibited entity
            - screening result
            - sanctions compliance
            - watchlist
            - embargo
            - politically exposed person
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
references:
  - https://www.dfat.gov.au/international-relations/security/sanctions/consolidated-list
  - https://www.dfat.gov.au/international-relations/security/sanctions/remittance-service-providers
