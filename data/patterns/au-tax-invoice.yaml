schema: testpattern/v1
name: Australian Tax Invoice
slug: au-tax-invoice
version: 1.3.0
type: keyword_list
pattern_class: concept
description: Detects Australian tax invoices containing GST, ABN, and payment details as required by ATO regulations.
operation: >-
  Regex and keyword-based detection matching tax invoice, GST invoice, or Australian tax invoice patterns. Corroborative
  evidence: 11 invoice keywords and 7 GST keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
  - business
test_cases:
  should_match:
    - value: 'TAX INVOICE - Invoice Number: INV-2024-001'
      description: Test match 1
    - value: Australian tax invoice including GST of $45.00
      description: Test match 2
    - value: Tax invoice from ABN 12 345 678 901 with payment terms net 30
      description: Test match 3
  should_not_match:
    - value: Please send us an estimate
      description: Non-match 1
    - value: The tax return was filed on time
      description: Non-match 2
false_positives:
  - description: Documents mentioning invoice in non-tax contexts.
    mitigation: Require GST or ABN keywords alongside invoice references.
exports:
  - yaml
scope: narrow
risk_rating: 6
risk_description: Tax invoice exposure reveals ABN, GST details, and commercial relationships.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_tax_invoice
      matches:
        - ref: Keyword_invoice
        - ref: Keyword_gst
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_invoice_number
      matches:
        - ref: Keyword_invoice
        - ref: Keyword_payment_terms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_tax_invoice
      pattern: (?i)\b(?:tax\s+invoice|australian\s+tax\s+invoice|gst\s+invoice)\b
    - id: Regex_invoice_number
      pattern: (?i)\b(?:invoice|inv)\s*[#:\-]?\s*(?:[A-Z]{0,3}\-?\d{4,10})\b
  keywords:
    - id: Keyword_invoice
      groups:
        - match_style: word
          terms:
            - invoice
            - invoicing
            - tax invoice
            - invoice number
            - invoice date
            - amount due
            - payment due
            - bill to
            - ship to
            - purchase order
            - po number
      strength: specific
    - id: Keyword_gst
      groups:
        - match_style: word
          terms:
            - text: GST
              case_sensitive: true
            - goods and services tax
            - GST included
            - GST exclusive
            - total GST
            - text: ABN
              case_sensitive: true
            - australian business number
      strength: specific
    - id: Keyword_payment_terms
      groups:
        - match_style: word
          terms:
            - payment terms
            - net 30
            - net 60
            - net 90
            - due on receipt
            - payment method
            - bank details
            - eft details
      strength: specific
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - tax invoice
  - GST invoice
  - Australian tax invoice
  - invoice number
  - invoice date
  - amount due
  - payment due
  - GST
  - goods and services tax
  - GST included
  - GST exclusive
  - total GST
  - ABN
  - payment terms
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
