schema: testpattern/v1
name: Ukraine Passport Number (International)
slug: ua-passport-number-international
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Ukraine international passport number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the
  built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-ukraine-passport-international Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[A-Z]{2}\d{6}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - ua
regulations:
  - Law on Protection of Personal Data (Ukraine)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - travel document
    - passport number
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: FE123456
      description: Two-letter prefix with 6 digits
    - value: AB987654
      description: Two-letter prefix with 6 digits
    - value: XY234567
      description: Two-letter prefix with 6 digits
  should_not_match:
    - value: '123456'
      description: Missing letter prefix
    - value: A1234567
      description: Single-letter prefix is invalid for this format
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic alphanumeric sequences matching passport format in unrelated contexts.
    mitigation: Require corroborative evidence keywords within the proximity window.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ua_passport_international
      matches:
        - ref: Pattern_ua_passport_number_international_label_context
        - ref: Keyword_ua_passport_number_international_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_ua_passport_international
      matches:
        - ref: Keyword_ua_passport_international
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ua_passport_international
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ua_passport_international
      pattern: \b[A-Z]{2}\d{6}\b
    - id: Pattern_ua_passport_number_international_label_context
      pattern: (?i)\b(?:ukraine\s+passport\s+number\s+\(international\)|ukraine|passport)\b
  keywords:
    - id: Keyword_ua_passport_international
      groups:
        - match_style: word
          terms:
            - passport
            - travel document
            - passport number
            - паспорт
            - номер паспорта
            - закордонний паспорт
            - міжнародний паспорт
            - паспорт для виїзду за кордон
            - passport no
            - Ukraine passport
            - travel document number
      strength: specific
    - id: Keyword_ua_passport_number_international_domain_context
      groups:
        - match_style: word
          terms:
            - ukraine passport number (international)
            - ukraine
            - passport
      strength: domain
risk_rating: 8
risk_description: >-
  Passport numbers are high-value identity documents used for international travel and identity verification. Compromise enables identity fraud, unauthorized border crossings, and creation of
  fraudulent documents.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-ukraine-passport-international
    title: Ukraine passport number (international) entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
