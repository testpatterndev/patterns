schema: testpattern/v1
name: Purple team exercise plans
slug: global-top500-294-purple-team-exercise-plans
version: 1.2.1
type: regex
engine: boost_regex
description: Identifies purple team exercise plans patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 9 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:purple\s+team|tabletop|adversary\s+emulation|exercise\s+plan)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - purple team exercise plans
    - purple
    - team
    - exercise
    - plans
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: 'Purple team'
      description: Topic phrase present
    - value: 'purple team'
      description: Topic phrase, lowercase
    - value: 'this record references the purple team held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_purple_team
      matches:
        - ref: Pattern_global_top500_294_purple_team_exercise_plans_label_context
        - ref: Keyword_global_top500_294_purple_team_exercise_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_purple_team
      matches:
        - ref: Keyword_purple_team
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_purple_team
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_purple_team
      pattern: (?i)\b(?:purple\s+team|tabletop|adversary\s+emulation|exercise\s+plan)\b
    - id: Pattern_global_top500_294_purple_team_exercise_plans_label_context
      pattern: (?i)\b(?:purple\s+team\s+exercise\s+plans)\b
  keywords:
    - id: Keyword_purple_team
      groups:
        - match_style: word
          terms:
            - purple team
            - tabletop exercise
            - adversary emulation
            - exercise plan
            - red team
            - blue team
            - attack scenario
            - threat simulation
            - MITRE ATT&CK
            - kill chain
            - detection gap
            - security exercise
      strength: specific
    - id: Keyword_global_top500_294_purple_team_exercise_plans_domain_context
      groups:
        - match_style: word
          terms:
            - purple team exercise plans
            - purple
            - team
            - exercise
            - plans
      strength: domain
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
