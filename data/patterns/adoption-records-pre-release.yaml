schema: testpattern/v1
name: Adoption Records Pre-Release
slug: adoption-records-pre-release
version: 1.3.2
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects pre-release adoption records including birth parent identities, adoptee matching assessments, placement recommendations, relinquishment consents, and contact vetoes under the Adoption Act 2009 (Qld). These records contain information that individuals have a legal right to control — premature or unauthorised disclosure can cause profound emotional harm and breach court-sealed orders.
operation: 'Keyword proximity: primary keywords (adoption order, birth parent, relinquishment, adoptee, placement recommendation, contact veto, contact statement) within 300 characters of corroborative keywords (PROTECTED, Privacy, Adoption Act 2009, birth certificate, Department of Child Safety). Negative keyword exclusion for published adoption statistics, policy frameworks, and academic research.'
pattern: (?i)\b(adoption\s+order|birth\s+parent\s+(?:identity|details|consent)|relinquishment\s+(?:consent|document)|adoptee\s+(?:matching|assessment|placement)|placement\s+recommendation|contact\s+(?:veto|statement)|pre-adoption\s+(?:report|assessment))\b
confidence: medium
confidence_justification: 'Medium confidence: requires co-occurrence of adoption-specific legal terminology with individual identifiers. General discussions of adoption law or policy without personal details do not trigger detection.'
jurisdictions:
  - au
regulations:
- "Adoption Act 2009 (Qld)"
- "Child Protection Act 1999 (Qld)"
- "IPA 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - health
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Privacy
    - adoption order
    - birth parent
    - relinquishment
    - adoptee
    - placement recommendation
    - contact veto
    - contact statement
    - Adoption Act 2009
    - birth certificate
    - birth mother
    - birth father
    - prospective adoptive parents
    - adoption suitability
    - Department of Child Safety
    - adoption consent
    - intercountry adoption
    - post-adoption contact
  proximity: 300
  keyword_lists:

    - healthcare-clinical

    - government-services
    - en-government-classification
test_cases:
  should_match:
    - value: 'PROTECTED Privacy. Pre-Adoption Assessment Report — Adoption Act 2009 (Qld) Part 7. Birth parent: Amanda Catherine BROOKS, DOB 09/11/1998. Relinquishment consent signed 14/02/2026 in the presence of a delegated officer. Birth father: identity not disclosed under s.192. Adoptee: female infant, DOB 28/01/2026. Placement recommendation: prospective adoptive parents Michael and Sarah CHEN assessed as suitable under s.79. Contact veto registered by birth mother. Department of Child Safety Case Officer: Jennifer Liu.'
      description: Pre-adoption assessment with birth parent identity and placement recommendation
    - value: 'Department of Child Safety, Seniors and Disability Services — Adoption Services Unit. Adoptee matching assessment for Child Reference ADO-2026-00341. Birth parent identity documents held under sealed court order. Birth certificate (original) to be reissued under Adoption Act 2009 s.214 upon finalisation of adoption order. Post-adoption contact statement lodged by birth mother. Prospective adoptive parents have completed adoption suitability assessment including psychological evaluation and home study.'
      description: Adoptee matching assessment with sealed birth parent records
    - value: 'Confidential — Intercountry Adoption File. Adoption order application under Adoption Act 2009 Part 9. Adoptee: male child, aged 3, Country of Origin: Thailand. Pre-adoption report prepared by delegated authority. Birth parent consent obtained through Central Authority Bangkok. Placement recommendation approved by Chief Executive. Prospective adoptive parents: Robert and Maria JENSEN, Adoption Suitability Certificate No. ASC-2025-01287. Contact veto: not applicable.'
      description: Intercountry adoption file with placement recommendation and consent details
  should_not_match:
    - value: The Queensland Government published its Annual Report on Adoption Services showing 127 adoption orders were finalised in 2025. The report presents aggregate statistics on domestic and intercountry adoptions by region and age group.
      description: Published annual report with aggregate adoption statistics
    - value: The Queensland Law Reform Commission released a discussion paper examining whether the Adoption Act 2009 adequately balances the rights of birth parents, adoptees, and adoptive families. Public submissions are invited.
      description: Published law reform discussion paper on adoption legislation
    - value: The adoption support group newsletter features personal stories from adoptees who have chosen to share their experiences of reunion with birth parents. All stories are published with the written consent of the individuals.
      description: Published personal adoption stories shared with consent
false_positives:
  - description: Published adoption statistics and annual reports from government agencies
    mitigation: 'Negative keyword exclusion: ''annual report'', ''published statistics'', ''aggregate data'', ''de-identified''. Require proximity to actual individual identifiers or case references.'
  - description: Law reform and policy discussion papers about adoption legislation
    mitigation: 'Negative keyword exclusion: ''discussion paper'', ''law reform'', ''policy framework'', ''public submission'', ''parliamentary inquiry'''
  - description: Published personal adoption stories shared with informed consent
    mitigation: 'Negative keyword exclusion: ''published with consent'', ''newsletter'', ''personal story'', ''chose to share'', ''public blog'''
  - description: Adoption agency marketing and general information brochures
    mitigation: 'Negative keyword exclusion: ''information brochure'', ''how to adopt'', ''eligibility criteria'', ''information session'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_adoption_records_pre_release_adoption_record_terms
      matches:
        - ref: Evidence_adoption_records_pre_release_primary_keywords
        - ref: Evidence_adoption_records_pre_release_classification_markers
        - ref: Evidence_adoption_records_pre_release_corroborative_terms
        - ref: Pattern_adoption_records_pre_release_adoption_case_reference
        - ref: Pattern_adoption_records_pre_release_adoption_suitability_cert
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_adoption_records_pre_release_exclusion
    - confidence_level: 75
      id_match: Pattern_adoption_records_pre_release_adoption_record_terms
      matches:
        - ref: Evidence_adoption_records_pre_release_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_adoption_records_pre_release_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_adoption_records_pre_release_adoption_record_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_adoption_records_pre_release_exclusion
  regexes:
    - id: Pattern_adoption_records_pre_release_adoption_record_terms
      pattern: (?i)\b(adoption\s+order|birth\s+parent|relinquishment\s+consent|adoptee\s+(?:matching|assessment)|placement\s+recommendation|contact\s+(?:veto|statement)|pre-adoption\s+(?:report|assessment)|adoption\s+suitability)\b
    - id: Pattern_adoption_records_pre_release_adoption_case_reference
      pattern: \bADO-\d{4}-\d{4,5}\b
    - id: Pattern_adoption_records_pre_release_adoption_suitability_cert
      pattern: \bASC-\d{4}-\d{4,5}\b
  keywords:
    - id: Evidence_adoption_records_pre_release_primary_keywords
      groups:
        - match_style: word
          terms:
            - adoption order
            - birth parent
            - relinquishment consent
            - adoptee matching
            - placement recommendation
            - contact veto
            - contact statement
            - pre-adoption assessment
            - adoption suitability
            - birth parent identity
      strength: specific
    - id: Evidence_adoption_records_pre_release_classification_markers
      groups:
        - match_style: word
          terms:
            - Privacy
      strength: domain
    - id: Evidence_adoption_records_pre_release_corroborative_terms
      groups:
        - match_style: word
          terms:
            - Adoption Act 2009
            - birth certificate
            - birth mother
            - birth father
            - prospective adoptive parents
            - Department of Child Safety
            - delegated officer
            - sealed court order
            - intercountry adoption
            - post-adoption contact
            - home study
            - psychological evaluation
      strength: specific
    - id: Filter_adoption_records_pre_release_exclusion
      groups:
        - match_style: word
          terms:
            - annual report
            - published statistics
            - aggregate data
            - de-identified
            - discussion paper
            - law reform
            - policy framework
            - public submission
            - parliamentary inquiry
            - newsletter
            - personal story
            - published with consent
            - information brochure
            - information session
            - how to adopt

      strength: noise
risk_rating: 9
risk_description: >-
  This proximity classifier identifies a pre-release adoption record by combining adoption concepts with case indicators such as birth certificates, privacy markings, or the Adoption Act; it is aimed at a composite record, not the word adoption alone. Premature disclosure could reveal birth-parent identity, relinquishment decisions, placement recommendations, or a contact veto to an adoptee, family member, or unauthorized third party. A pre-release file joins birth identity, adoptive identity, family history and contact restrictions. Unauthorised exposure can cause irreversible family disruption, unsafe contact or coercion. The normal true-positive unit belongs at risk 9, PROTECTED Personal-Privacy, while broad or contextual false positives remain a separate detection issue.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Personal-Privacy
