schema: testpattern/v1
name: Pension account identifiers
slug: global-top500-089-pension-account-identifiers
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to pension account identifiers in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: financial-deposit-terms, industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:pension\s+account\s+identifiers?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - pension account identifiers
    - pension
    - account
    - identifiers
    - payroll
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
    - industry-hr
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Pension account identifiers'
      description: Topic phrase present
    - value: 'pension account identifiers'
      description: Topic phrase, lowercase
    - value: 'this record references the pension account identifiers held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_pension_account_id
      matches:
        - ref: Keyword_pension_account_id
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pension_account_id
      matches:
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_pension_account_id
      pattern: (?i)\b(?:pension\s+account\s+identifiers?)\b
    - id: Pattern_global_top500_089_pension_account_identifiers_label_context
      pattern: (?i)\b(?:pension\s+account\s+identifiers)\b
  keywords:
    - id: Keyword_pension_account_id
      groups:
        - match_style: word
          terms:
            - pension account identifiers
            - pension account
            - pension number
            - pension fund
            - member number
            - pension scheme
            - retirement account
            - annuity number
            - pension reference
            - fund member ID
            - pension identifier
      strength: specific
    - id: Keyword_global_top500_089_pension_account_identifiers_domain_context
      groups:
        - match_style: word
          terms:
            - pension account identifiers
            - pension
            - identifiers
      strength: domain
risk_description: >-
  The detector uses structural and proximity cues around pension and financial-deposit terms to find references to pension account identifiers, but it does not validate a jurisdiction-specific account number. A genuine identifier can help link a person to a retirement provider and support impersonation or targeted fraud when combined with name, balance, and authentication information. Public pension guidance, forms, accounting material, and unrelated account references can match, and the atomic identifier alone does not reveal a balance or authorise withdrawal. Risk 4 OFFICIAL reflects low standalone confidentiality harm; SENSITIVE would require a linked member statement, private balance, or access credential.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
