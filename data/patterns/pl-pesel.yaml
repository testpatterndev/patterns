schema: testpattern/v1
name: PESEL
slug: pl-pesel
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects PESEL patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Validation: Weighted sum mod 10. Reference: https://en.wikipedia.org/wiki/PESEL Corroborative evidence: 3 keywords
  within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b\d{11}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - eu
  - pl
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: '85010112345'
      description: Standard PESEL number
    - value: '90123156789'
      description: Alternate PESEL
    - value: '00210198765'
      description: PESEL for 2000s-born person
  should_not_match:
    - value: 1234567890
      description: Only 10 digits instead of 11
    - value: 123456789012
      description: 12 digits instead of 11
    - value: 1234567890A
      description: Contains a letter instead of all digits
false_positives:
  - description: Long numeric sequences in unrelated contexts (tracking numbers, serial codes) matching the PESEL format
    mitigation: Use corroborative keywords and, where available, checksum validation to filter false matches.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_pl_pesel
      matches:
        - ref: Keyword_pl_pesel
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pl_pesel
  regexes:
    - id: Regex_pl_pesel
      pattern: \b\d{11}\b
      validators:
        - ref: Validator_pl_pesel_checksum
  keywords:
    - id: Keyword_pl_pesel
      groups:
        - match_style: word
          terms:
            - PESEL
            - numer PESEL
            - Powszechny Elektroniczny System Ewidencji Ludności
            - numer ewidencyjny
            - numer identyfikacyjny
            - dowód osobisty
            - identyfikacja osobowa
            - data urodzenia
            - numer krajowy
            - rejestr ludności
            - ewidencja ludności
      strength: specific
  validators:
    - id: Validator_pl_pesel_checksum
      type: Checksum
      params:
        weights: "1,3,7,9,1,3,7,9,1,3"
        mod: 10
        checkDigit: 0
  filters:
    - id: Filter_pl_pesel_same_digits
      type: AllDigitsSameFilter
risk_rating: 9
risk_description: >-
  PESEL is Poland's universal national identification number encoding date of birth and gender. Exposure enables identity
  fraud, unauthorized access to government and financial services, and creation of fraudulent documents.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-poland-national-id
    title: "Poland national ID (PESEL) entity definition - Microsoft Learn"
created: '2026-02-08'
updated: '2026-07-09'
