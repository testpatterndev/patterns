schema: testpattern/v1
name: Date of birth
slug: global-top500-003-date-of-birth
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  DEPRECATED — merged into au-birth-date-indicator. Detects date-of-birth references in documents across multiple date
  formats (numeric slash, dot, hyphen, written month, ISO). Requires birth-record keywords in proximity to distinguish
  DOB from invoice dates, event dates, and other temporal references. No Microsoft built-in SIT exists for unstructured
  DOB detection.
operation: >-
  Multi-format date regex matching: DD/MM/YYYY, MM/DD/YYYY, DD-MM-YYYY, DD.MM.YYYY, DD Month YYYY, and YYYY-MM-DD (ISO).
  Corroborative evidence: 3 tiers with birth-record keywords and exclusion logic (high), personal-information keywords
  (medium), and broad context (low) within 300 characters.
pattern: >-
  \b(?:(?:0?[1-9]|[12]\d|3[01])[\/.\-](?:0?[1-9]|1[0-2])|(?:0?[1-9]|1[0-2])[\/.\-](?:0?[1-9]|[12]\d|3[01]))[\/.\-](?:19|20)\d{2}\b|\b(?:19|20)\d{2}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12]\d|3[01])\b
confidence: medium
confidence_justification: >-
  Medium confidence: date formats appear in every business document. Birth-record keywords are essential to distinguish
  DOB from the thousands of other dates in any corpus.
jurisdictions:
  - global
regulations:
  - GDPR
  - CCPA
  - HIPAA
  - PIPEDA
frameworks:
  - ISO 27001
  - ISO 27701
  - NIST CSF
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - DOB
    - date of birth
    - birth date
    - born
    - born on
    - birthday
    - d.o.b
    - d.o.b.
  proximity: 300
  keyword_lists:
    - pii-personal
test_cases:
  should_match:
    - value: 'Date of birth: 03/15/1990'
      description: US month-first date
    - value: DOB 15/03/1985
      description: Day-first date
    - value: born 1990-03-15
      description: ISO date
  should_not_match:
    - value: reference 12345
      description: Not a date
    - value: see page 42
      description: Not a date
    - value: not a date here
      description: Plain prose
false_positives:
  - description: Non-DOB dates such as invoice dates, event dates, document timestamps, and meeting dates.
    mitigation: >-
      Require birth-record keywords (DOB, date of birth, born) in proximity. Without these keywords the pattern fires at
      low confidence only.
  - description: Historical dates in news articles or academic papers that happen to match the date format.
    mitigation: Corroborative evidence keywords distinguish personal records from historical references.
  - description: Dates in financial documents (settlement dates, maturity dates, filing dates).
    mitigation: Filter excludes common business date labels via TextMatchFilter on the matched context.
exports:
  - purview_xml
  - gcp_dlp
  - macie
  - zscaler
  - paloalto
  - netskope
  - yaml
  - regex_copy
scope: wide
risk_rating: 3
risk_description: >-
  The regex detects a date in several numeric or written formats when birth-record terms such as DOB, born, or date of
  birth are nearby. A genuine birth date can strengthen impersonation, identity matching, or security-question guessing
  when the person's name and an account are already known. It does not identify the person by itself, and invoices,
  event dates, historical references, or weak contextual matches can still create false positives. Risk 3 OFFICIAL
  reflects low correlated harm; SENSITIVE would require a broader identity profile, authentication data, a vulnerable
  person's record, or linked medical or government information.
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_date_all
      matches:
        - ref: Evidence_birth_record
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_date_all
      matches:
        - ref: Evidence_birth_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_date_all
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  filters:
    - id: Guard_dob_exclude_business_dates
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms:
        - invoice date
        - due date
        - payment date
        - expiry date
        - expiration date
        - start date
        - end date
        - effective date
        - settlement date
        - maturity date
        - closing date
        - issue date
        - filing date
        - report date
  regexes:
    - id: Pattern_date_all
      pattern: >-
        \b(?:(?:0?[1-9]|[12]\d|3[01])[\/.\-](?:0?[1-9]|1[0-2])|(?:0?[1-9]|1[0-2])[\/.\-](?:0?[1-9]|[12]\d|3[01]))[\/.\-](?:19|20)\d{2}\b|\b(?:19|20)\d{2}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12]\d|3[01])\b
  keywords:
    - id: Evidence_birth_record
      groups:
        - match_style: word
          terms:
            - text: DOB
              case_sensitive: true
            - date of birth
            - birth date
            - birthdate
            - born
            - born on
            - birthday
            - d.o.b
            - d.o.b.
            - DateOfBirth
      strength: domain
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
