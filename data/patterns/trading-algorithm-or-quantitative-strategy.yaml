schema: testpattern/v1
name: Trading Algorithm or Quantitative Strategy
slug: trading-algorithm-or-quantitative-strategy
version: 1.3.2
type: trainable_classifier
pattern_class: concept
engine: universal
description: Detects proprietary trading algorithms, quantitative investment strategies, or systematic risk models used by government investment vehicles such as QIC (Queensland Investment Corporation). Keyword-based fallback detection is provided for environments without ML classifier support.
operation: 'Trainable classifier (primary): train on documents containing algorithmic trading logic, quantitative strategy descriptions, backtesting results, and portfolio construction methodologies. Keyword-based fallback: alpha generation / signal / backtest / Sharpe ratio / factor model / systematic / execution algorithm / VWAP / TWAP terms within 300 characters of PROTECTED or proprietary markers.'
pattern: null
confidence: high
confidence_justification: 'High confidence: the combination of quantitative finance terminology (alpha, Sharpe ratio, backtest) with proprietary/trade secret markers is highly specific to restricted trading strategy documents. Academic papers discussing these concepts are excluded by requiring proprietary context.'
jurisdictions:
  - global
regulations:
- "Corporations Act 2001 (Cth)"
frameworks:
- QGISCF
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - alpha generation
    - signal
    - backtest
    - backtesting
    - Sharpe ratio
    - factor model
    - systematic
    - execution algorithm
    - VWAP
    - TWAP
    - quantitative strategy
    - trading algorithm
    - proprietary
    - trade secret
    - PROTECTED
    - QIC
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: 'PROPRIETARY — TRADE SECRET. QIC Systematic Alpha Strategy v3.2. Signal generation: momentum factor combined with mean-reversion on 5-day rolling window. Backtest results: Sharpe ratio 1.8, max drawdown 12%. Alpha generation: 280bps annualised over benchmark. Execution algorithm: VWAP with 15% participation rate. PROTECTED.'
      description: Proprietary trading strategy with backtesting and signal logic
    - value: 'PROTECTED — QIC Quantitative Investment v4.1. Factor model specification: Value (30%), Momentum (25%), Quality (25%), Low Vol (20%). Realised information ratio 1.6, alpha of 220 bps annualised over benchmark. Portfolio construction: long-short with gross exposure 150%. Rebalancing: weekly. Signal decay analysis and TWAP execution parameters attached. Proprietary — not for distribution.'
      description: Quantitative factor model with portfolio construction rules
    - value: 'PROPRIETARY — TRADE SECRET. QIC Momentum Sleeve v2.1. Backtest Sharpe ratio 2.3, max drawdown 9%. Alpha generation 145 bps annualised. Execution algorithm: TWAP with 10% participation. PROTECTED — not for distribution.'
      description: Proprietary momentum strategy with Sharpe ratio and bps alpha
  should_not_match:
    - value: 'Academic paper: An Analysis of Factor Model Performance. We examine Sharpe ratios across momentum and value factors using publicly available data from 1990-2025.'
      description: Academic paper discussing factor models — no proprietary content
    - value: 'Investopedia: What is VWAP? Volume Weighted Average Price is a trading benchmark used by traders. Sharpe ratio measures risk-adjusted returns.'
      description: Educational content explaining trading concepts
false_positives:
  - description: Academic research papers on quantitative finance and factor models
    mitigation: Require proprietary/trade secret markers and specific implementation details (not theoretical discussion)
  - description: Financial education materials explaining trading concepts
    mitigation: Exclude documents containing 'academic', 'paper', 'textbook', 'Investopedia', 'what is', 'how to'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_trading_algorithm_or_quantitative_strategy_basis_points_for_alpha_performance_figur
      matches:
        - ref: Evidence_trading_algorithm_or_quantitative_strategy_primary
        - ref: Evidence_trading_algorithm_or_quantitative_strategy_technical
        - ref: Evidence_trading_algorithm_or_quantitative_strategy_portfolio
        - ref: Evidence_trading_algorithm_or_quantitative_strategy_markers
        - ref: Pattern_trading_algorithm_or_quantitative_strategy_sharpe_ratio_and_other_decimal_metrics
        - ref: Pattern_trading_algorithm_or_quantitative_strategy_strategy_version_numbers_e_g_v3_2
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_trading_algorithm_or_quantitative_strategy_exclusion
    - confidence_level: 75
      id_match: Pattern_trading_algorithm_or_quantitative_strategy_basis_points_for_alpha_performance_figur
      matches:
        - ref: Evidence_trading_algorithm_or_quantitative_strategy_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_trading_algorithm_or_quantitative_strategy_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_trading_algorithm_or_quantitative_strategy_basis_points_for_alpha_performance_figur
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_trading_algorithm_or_quantitative_strategy_exclusion
  regexes:
    - id: Pattern_trading_algorithm_or_quantitative_strategy_basis_points_for_alpha_performance_figur
      pattern: \b\d{1,4}\s*bps\b
    - id: Pattern_trading_algorithm_or_quantitative_strategy_sharpe_ratio_and_other_decimal_metrics
      pattern: \b\d{1,2}\.\d{1,2}\b
    - id: Pattern_trading_algorithm_or_quantitative_strategy_strategy_version_numbers_e_g_v3_2
      pattern: v\d+\.\d+
  keywords:
    - id: Evidence_trading_algorithm_or_quantitative_strategy_primary
      groups:
        - match_style: word
          terms:
            - trading algorithm
            - quantitative strategy
            - systematic strategy
            - alpha generation
            - alpha strategy
      strength: specific
    - id: Evidence_trading_algorithm_or_quantitative_strategy_technical
      groups:
        - match_style: word
          terms:
            - signal
            - backtest
            - backtesting
            - Sharpe ratio
            - factor model
            - execution algorithm
            - VWAP
            - TWAP
            - momentum
            - mean-reversion
      strength: domain
    - id: Evidence_trading_algorithm_or_quantitative_strategy_portfolio
      groups:
        - match_style: word
          terms:
            - portfolio construction
            - rebalancing
            - gross exposure
            - long-short
            - participation rate
            - signal decay
      strength: specific
    - id: Evidence_trading_algorithm_or_quantitative_strategy_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - proprietary
            - trade secret
            - not for distribution
            - text: QIC
              case_sensitive: true
            - confidential
      strength: domain
    - id: Filter_trading_algorithm_or_quantitative_strategy_exclusion
      groups:
        - match_style: word
          terms:
            - academic paper
            - textbook
            - Investopedia
            - what is
            - how to
            - lecture notes
            - published research
            - example

      strength: noise
risk_rating: 9
risk_description: >-
  The primary trainable classifier targets proprietary trading algorithms, signal logic, backtests, portfolio construction, and execution methods, with a keyword fallback requiring quantitative and proprietary context. Disclosure can allow competitors to copy alpha sources, anticipate execution, front-run positions, or exploit model weaknesses, harming the investment vehicle and its clients. A usable strategy can be copied, front-run or adversarially traded, destroying proprietary value and creating material financial loss. The confirmed Trading Algorithm or Quantitative Strategy record therefore warrants risk 9 and PROTECTED Financial; detector uncertainty is handled through confidence controls rather than a lower consequence rating.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Financial
