            - emergency
            - aid
            - crisis payment
            - disaster relief
            - disaster assist
            - hardship
            - natural disaster
            - flood
            - bushfire
            - evacuation
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
