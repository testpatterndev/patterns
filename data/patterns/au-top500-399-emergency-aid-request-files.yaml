schema: testpattern/v1
name: Emergency aid request files
slug: au-top500-399-emergency-aid-request-files
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to emergency aid request files in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:emergency\s+aid\s+request\s+files|crisis\s+payment|disaster\s+relief|disaster\s+assist|natural\s+disaster)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - emergency aid request files
    - emergency
    - aid
    - request
    - files
    - government
    - citizen
    - services
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: emergency aid request files
      description: Primary topic phrase match
    - value: crisis payment
      description: Case-insensitive topic phrase match
    - value: disaster relief
      description: Alternative topic phrase match
    - value: disaster assist
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to emergency aid request files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 90
      id_match: Pattern_emergency_aid_request
      matches:
        - ref: Pattern_au_top500_399_emergency_aid_request_files_label_context
        - ref: Keyword_au_top500_399_emergency_aid_request_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_399_emergency_aid_request_files_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_emergency_aid_request
      matches:
        - ref: Evidence_emergency_aid_request
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_399_emergency_aid_request_files_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_emergency_aid_request
      matches:
        - ref: Evidence_emergency_aid_request
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_399_emergency_aid_request_files_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_emergency_aid_request
      matches:
        - ref: Evidence_emergency_aid_request
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_399_emergency_aid_request_files_noise_exclusion
  regexes:
    - id: Pattern_emergency_aid_request
      pattern: (?is)\b(?:emergency\s+aid\s+request\s+files|crisis\s+payment|disaster\s+relief|disaster\s+assist|natural\s+disaster)\b
    - id: Pattern_au_top500_399_emergency_aid_request_files_label_context
      pattern: (?i)\\b(?:emergency\\s+aid\\s+request\\s+files|emergency|aid|request|files|top500)\\b
  keywords:
    - id: Evidence_emergency_aid_request
      groups:
        - match_style: word
          terms:
