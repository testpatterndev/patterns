schema: testpattern/v1
name: Ukrainian Individual Tax Number (RNOKPP)
slug: ua-tax-number
version: 1.2.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects the Ukrainian individual tax number — the registration number of the taxpayer's account card
  (РНОКПП / RNOKPP, historically called RNTRC or ІПН), assigned by the State Tax Service of Ukraine to
  every individual taxpayer in the State Register of Individuals – Taxpayers. Per the OECD AEOI TIN
  description for Ukraine, the RNOKPP is a ten-digit numerical code (no letters, hyphens, or other
  symbols) with structure XXXXXNNNNK: a 5-digit birth-date registration sequence, a 4-digit account-card
  sequence, and a control digit.
operation: >-
  Regex pattern. Matches a contiguous 10-digit numerical code with digit-run boundaries. The mod-11
  weighted control-digit algorithm used for the final digit cannot be expressed in regex and is NOT
  enforced; detection is structural. Because bare 10-digit runs are highly ambiguous (phone numbers,
  account numbers), every confidence tier requires positive RNOKPP/tax evidence: High (85) requires an
  RNOKPP/tax label-context match plus specific keywords with template exclusion; Medium (75) requires
  specific RNOKPP keywords with template exclusion; Low (65) requires domain-context tax keywords with
  template exclusion. AllDigitsSameFilter suppresses all-zeros and other repeated-digit values.
pattern: \b(?!5{10}\b)\d{10}\b
confidence: medium
confidence_justification: >-
  Medium confidence: a 10-digit run has no distinctive internal structure that regex can enforce (the
  birth-date sequence and control digit are not range-restricted in public documentation), so
  corroborating RNOKPP/tax keywords are required on every tier and no bare value-only tier is exposed.
jurisdictions:
  - ua
regulations:
  - Tax Code of Ukraine
  - Law on Personal Data Protection (Ukraine)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
  - financial
corroborative_evidence:
  keywords:
    - РНОКПП
    - RNOKPP
    - ІПН
    - ідентифікаційний номер
    - taxpayer registration number
    - individual tax number
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 'РНОКПП: 3184710691 зазначено у картці платника податків'
      description: 10-digit RNOKPP with Ukrainian label
    - value: RNOKPP 2745618394 is printed on the back of the biometric passport card
      description: 10-digit RNOKPP with Latin transliteration label
    - value: Individual tax number 3059219845 was registered with the State Tax Service of Ukraine
      description: 10-digit RNOKPP with English label
  should_not_match:
    - value: ЄДРПОУ 32855961 є кодом юридичної особи
      description: 8-digit EDRPOU entity code — wrong length for the 10-digit individual number
    - value: 'TIN: 123-456-789 registered with the BIR in Manila'
      description: Neighbouring format — Philippine dash-grouped 9-digit TIN, no 10-digit run
    - value: Passport record 31847106912 has too many digits to be a taxpayer number
      description: 11-digit run — the 10-digit code must not match inside a longer digit run
    - value: '5555555555'
      description: Repeated-digit value — matches structurally but is suppressed by AllDigitsSameFilter
false_positives:
  - description: >-
      Ukrainian phone numbers written without separators (e.g. 0671234567) and many other 10-digit runs
      (US phone numbers, account numbers) match the structural regex.
    mitigation: >-
      Every tier requires RNOKPP/tax keyword or label evidence within the 300-character proximity window;
      no value-only tier is exposed.
  - description: >-
      The final control digit uses a weighted mod-11 algorithm that cannot be expressed in regex, so
      structurally valid but non-issued numbers will match.
    mitigation: >-
      Rely on structure, AllDigitsSameFilter (suppresses all-zeros/repeated-digit values) and mandatory
      keyword evidence.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 7
risk_description: >-
  The detector finds a contiguous 10-digit Ukrainian RNOKPP with mandatory tax or RNOKPP context and repeated-digit suppression, but it cannot enforce the weighted control digit. A genuine number uniquely identifies an individual taxpayer and embeds a birth-date registration sequence, supporting taxpayer impersonation, identity correlation, and targeted financial fraud. The normal unit concerns one person with credible moderate privacy and tax harm, although phone numbers and other 10-digit values can collide when context is weak. Risk 7 and SENSITIVE are justified, while PROTECTED is not met without authentication factors, a full tax account, bulk register, or significant state-system compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ua_tax_number
      matches:
        - ref: Pattern_ua_tax_number_label_context
        - ref: Keyword_ua_tax_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ua_tax_number
      matches:
        - ref: Keyword_ua_tax_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ua_tax_number
      matches:
        - ref: Keyword_ua_tax_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ua_tax_number
      pattern: \b(?!5{10}\b)\d{10}\b
    - id: Pattern_ua_tax_number_label_context
      pattern: (?i)\b(?:рнокпп|rnokpp|rntrc|іпн|ідентифікаційний\s+(?:номер|код)|податковий\s+номер|tax\s+(?:number|id)|taxpayer)\b
  keywords:
    - id: Keyword_ua_tax_number
      groups:
        - match_style: word
          terms:
            - РНОКПП
            - RNOKPP
            - RNTRC
            - реєстраційний номер облікової картки платника податків
            - ідентифікаційний номер
            - ідентифікаційний код
            - індивідуальний податковий номер
            - text: ІПН
              case_sensitive: true
            - податковий номер
            - taxpayer registration number
            - individual tax number
            - Ukrainian tax number
            - State Tax Service of Ukraine
            - Державна податкова служба
            - картка платника податків
      strength: specific
    - id: Keyword_ua_tax_number_domain_context
      groups:
        - match_style: word
          terms:
            - taxpayer
            - податковий
            - платник податків
            - tax number
            - державний реєстр
      strength: domain
  filters:
    - id: Filter_ua_tax_number_same_digits
      type: AllDigitsSameFilter
references:
  - url: https://www.oecd.org/content/dam/oecd/en/topics/policy-issue-focus/aeoi/ukraine-tin.pdf
    title: OECD AEOI — Ukraine Information on Tax Identification Numbers (RNOKPP structure XXXXXNNNNK, ten digits)
  - url: https://tax.gov.ua/en/individuals/obtaining-registration-number-of-the-taxpayers-account-card/what-is-the-taxpayers-account-card-number/
    title: State Tax Service of Ukraine — What is the taxpayer's account card number
  - url: https://zakon.rada.gov.ua/laws/show/z1306-17#Text
    title: Regulation for Registration of Individuals in the State Register of Individuals – Taxpayers (MinFin Order No. 822 of 29.09.2017)
