schema: testpattern/v1
name: Brazil PIX Key
slug: br-pix-key
version: 1.0.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Brazilian PIX keys in email, +55 mobile, or EVP UUID forms.
operation: >-
  Structural PIX key shapes; require PIX keywords. Keyword lists: financial-transaction, banking.
pattern: '(?:[A-Za-z0-9._%+-]{1,64}@[A-Za-z0-9.-]{2,64}\.[A-Za-z]{2,24}|\+55\d{10,11}|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})'
confidence: medium
confidence_justification: >-
  Medium confidence; PIX keywords mandatory.
jurisdictions:
  - br
regulations:
  - LGPD
  - "BCB PIX regulations"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - financial
  - pii
corroborative_evidence:
  keywords:
    - PIX
    - chave PIX
    - PIX key
  proximity: 300
  keyword_lists:
    - financial-transaction
    - banking
test_cases:
  should_match:
    - value: 'user@email.com'
      description: Email
    - value: '+5511987654321'
      description: Mobile
    - value: '123e4567-e89b-12d3-a456-426614174000'
      description: UUID
  should_not_match:
    - value: '5511987654321'
      description: No plus
    - value: 'user@'
      description: Bad email
    - value: '123e4567-e89b-12d3-a456'
      description: Short UUID
false_positives:
  - description: >-
      Ordinary emails.
    mitigation: >-
      Require chave PIX keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_br_pix_key
      matches:
        - ref: Keyword_br_pix_key_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_br_pix_key
      matches:
        - ref: Keyword_br_pix_key_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_br_pix_key
  regexes:
    - id: Regex_br_pix_key
      pattern: '(?:[A-Za-z0-9._%+-]{1,64}@[A-Za-z0-9.-]{2,64}\.[A-Za-z]{2,24}|\+55\d{10,11}|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})'
  keywords:
    - id: Keyword_br_pix_key_specific
      groups:
        - match_style: word
          terms:
            - chave PIX
            - PIX key
            - PIX aleatória
            - PIX email
      strength: specific
    - id: Keyword_br_pix_key_broad
      groups:
        - match_style: word
          terms:
            - PIX
            - pagamento instantâneo
            - Bacen PIX
      strength: specific
risk_rating: 8
risk_description: >-
  PIX keys route instant payments.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Financial"
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Phase-2 coverage backlog — mature Purview-safe identifier with pack metadata'
author: testpattern-community
