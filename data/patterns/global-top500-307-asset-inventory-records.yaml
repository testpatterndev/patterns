schema: testpattern/v1
name: Asset inventory records
slug: global-top500-307-asset-inventory-records
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies asset inventory records patterns in security and access control contexts. Detects potential exposure
  of sensitive security information in international systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 6 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:asset\s+inventory|asset\s+register|hardware\s+inventory|software\s+inventory|asset\s+tag|serial\s+number|asset\s+lifecycle|configuration\s+item|IT\s+asset\s+management|depreciation\s+schedule|procurement\s+record|asset\s+tracking)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - asset inventory records
  - asset
  - inventory
  - records
  - operations
  - resilience
  proximity: 300
test_cases:
  should_match:
  - value: asset inventory
    description: Primary topic phrase match
  - value: asset register
    description: Case-insensitive topic phrase match
  - value: hardware inventory
    description: Alternative topic phrase match
  - value: software inventory
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: backup outage
    description: Generic word pair from old broad template should not match
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_asset_inventory
    matches:
    - ref: Pattern_global_top500_307_asset_inventory_records_label_context
    - ref: Keyword_global_top500_307_asset_inventory_records_domain_context
    - ref: Keyword_asset_inventory
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_asset_inventory
    matches:
    - ref: Pattern_global_top500_307_asset_inventory_records_label_context
    - ref: Keyword_global_top500_307_asset_inventory_records_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_asset_inventory
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_asset_inventory
    pattern: (?is)\b(?:asset\s+inventory|asset\s+register|hardware\s+inventory|software\s+inventory|asset\s+tag|serial\s+number|asset\s+lifecycle|configuration\s+item|IT\s+asset\s+management|depreciation\s+schedule|procurement\s+record|asset\s+tracking)\b
  - id: Pattern_global_top500_307_asset_inventory_records_label_context
    pattern: (?i)\b(?:asset\s+inventory\s+records)\b
  keywords:
  - id: Keyword_asset_inventory
    groups:
    - match_style: word
      terms:
      - asset inventory
      - asset register
      - hardware inventory
      - software inventory
      - asset tag
      - serial number
      - asset lifecycle
      - configuration item
      - IT asset management
      - depreciation schedule
      - procurement record
      - asset tracking
    strength: specific
  - id: Keyword_global_top500_307_asset_inventory_records_domain_context
    groups:
    - match_style: word
      terms:
      - asset inventory records
      - asset
      - inventory
    strength: domain
risk_description: This concept classifier recognizes asset inventories, registers, tags, serial numbers, configuration items,
  lifecycle, procurement, tracking, and hardware or software inventory terminology. A complete inventory can enumerate systems,
  versions, owners, locations, and lifecycle status, enabling theft, social engineering, vulnerability targeting, or commercial
  inference. The normal scope is an organisational asset set and its custodians, while isolated serial-number mentions, procurement
  forms, and inventory templates can match without forming a full register. Risk 8 SENSITIVE reflects serious contained operational
  exposure; PROTECTED would require a critical or enterprise-wide inventory capable of significant damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
