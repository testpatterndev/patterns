schema: testpattern/v1
name: Patch exception records
slug: au-top500-287-patch-exception-records
version: 1.4.3
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies patch exception records patterns in security and access control contexts. Detects potential exposure of sensitive security
  information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content.
  Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:patch\s+exception\s+records|patch\s+exception|risk\s+acceptance|patch\s+deferral|compensating\s+control|vulnerability\s+exception|risk\s+register|exception\s+approval|change\s+management|patch\s+compliance)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
- au
regulations:
- NDB Scheme (Cth)
- SOCI Act 2018 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - patch exception records
  - patch
  - exception
  - records
  - security
  - operations
  - threat
  - data
  proximity: 300
test_cases:
  should_match:
  - value: patch exception records
    description: Primary topic phrase match
  - value: patch exception
    description: Case-insensitive topic phrase match
  - value: risk acceptance
    description: Alternative topic phrase match
  - value: patch deferral
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: unrelated generic text without domain phrases
    description: Safe non-domain negative
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions
    without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from
    technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: This classifier finds a patch-exception record through terms such as patch deferral, risk acceptance, compensating control,
  vulnerability exception, approval, and patch compliance. Disclosure can tell an attacker which assets remain unpatched, why remediation was
  deferred, and which controls or owners might be targeted instead. The normal impact concerns the systems covered by one exception or register
  entry, and an exploit plus access path is still required. Risk 8 and SENSITIVE reflect serious contained exposure, while a current critical-fleet
  exception register tied to active exploitation would raise the classification.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_patch_exception
    min_count: 2
    matches:
    - ref: Evidence_patch_exception
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Pattern_patch_exception
    matches:
    - ref: Evidence_patch_exception
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Pattern_patch_exception
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Pattern_patch_exception
    pattern: (?is)\b(?:patch\s+exception\s+records|patch\s+exception|risk\s+acceptance|patch\s+deferral|compensating\s+control|vulnerability\s+exception|risk\s+register|exception\s+approval|change\s+management|patch\s+compliance)\b
  keywords:
  - id: Evidence_patch_exception
    groups:
    - match_style: word
      terms:
      - patch exception records
      - patch exception
      - risk acceptance
      - patch deferral
      - compensating control
      - vulnerability exception
      - risk register
      - exception approval
      - change management
      - patch compliance
      - Patch exception records
created: '2026-02-08'
updated: '2026-07-14'
changelog:
- version: 1.4.1
  date: '2026-07-14'
  description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 879 without changing detector or package
    metadata.'
- version: 1.4.0
  date: '2026-07-12'
  description: 'Baseline burn-down A2: tier@75''s Evidence_patch_exception ref is self-corroborating — its term list is the same phrase set as
    the id_match regex''s own alternation, so should_not_match: "patch exception cve" satisfied both the primary match and the tier''s evidence
    with the single phrase "patch exception". Added min_count: 2 + unique_results: true to tier@75 (mirroring tier@85) so one incidental phrase
    occurrence no longer meets the evidence bar. Also marked the bare tier@65 discovery_only (same no-evidence shape) so it surfaces in discovery
    inventory rather than gating should_not_match.'
- version: 1.3.0
  date: '2026-07-09'
  description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers
    with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot
    review'
- version: 1.2.0
  date: '2026-03-14'
  description: Standardise to 3-tier 65/75/85 gating with progressive evidence
- version: 1.1.0
  date: '2026-03-06'
  description: Embed topic-specific phrase regex, wire domain keyword lists
- version: 1.0.0
  date: '2026-02-08'
  description: Initial release
