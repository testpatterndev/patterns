schema: testpattern/v1
name: Patch exception records
slug: au-top500-287-patch-exception-records
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies patch exception records patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:patch\s+exception\s+records|patch\s+exception|risk\s+acceptance|patch\s+deferral|compensating\s+control|vulnerability\s+exception|risk\s+register|exception\s+approval|change\s+management|patch\s+compliance)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - patch exception records
    - patch
    - exception
    - records
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: patch exception records
      description: Primary topic phrase match
    - value: patch exception
      description: Case-insensitive topic phrase match
    - value: risk acceptance
      description: Alternative topic phrase match
    - value: patch deferral
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patch exception cve
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_patch_exception
      matches:
        - ref: Evidence_patch_exception
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_patch_exception
      matches:
        - ref: Evidence_patch_exception
    - confidence_level: 65
      id_match: Pattern_patch_exception
      matches:
        - ref: Evidence_patch_exception
  regexes:
    - id: Pattern_patch_exception
      pattern: (?is)\b(?:patch\s+exception\s+records|patch\s+exception|risk\s+acceptance|patch\s+deferral|compensating\s+control|vulnerability\s+exception|risk\s+register|exception\s+approval|change\s+management|patch\s+compliance)\b
  keywords:
    - id: Evidence_patch_exception
      groups:
        - match_style: word
          terms:
            - patch exception records
            - patch exception
            - risk acceptance
            - waiver
            - patch deferral
            - compensating control
            - vulnerability exception
            - risk register
            - exception approval
            - change management
            - patch compliance
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
created: '2026-02-08'
updated: '2026-03-06'
