schema: testpattern/v1
name: Collateral valuation reports
slug: global-top500-125-collateral-valuation-reports
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to collateral valuation reports in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:market\s+value|assessed\s+value|property\s+valuation|asset\s+valuation|security\s+interest|pledged\s+asset|collateral\s+coverage|independent\s+valuation)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - collateral valuation reports
    - collateral
    - valuation
    - reports
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: market value
      description: Primary topic phrase match
    - value: assessed value
      description: Case-insensitive topic phrase match
    - value: property valuation
      description: Alternative topic phrase match
    - value: asset valuation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_collateral_valuation
      matches:
        - ref: Pattern_global_top500_125_collateral_valuation_reports_label_context
        - ref: Keyword_global_top500_125_collateral_valuation_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_collateral_valuation
      matches:
        - ref: Keyword_collateral_valuation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_collateral_valuation
      matches:
        - ref: Keyword_collateral_valuation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_collateral_valuation
      pattern: (?is)\b(?:market\s+value|assessed\s+value|property\s+valuation|asset\s+valuation|security\s+interest|pledged\s+asset|collateral\s+coverage|independent\s+valuation)\b
    - id: Pattern_global_top500_125_collateral_valuation_reports_label_context
      pattern: (?i)\\b(?:collateral\\s+valuation\\s+reports|collateral|valuation|reports|top500)\\b
  keywords:
    - id: Keyword_collateral_valuation
      groups:
        - match_style: word
          terms:
            - collateral
            - valuation
            - appraisal
            - market value
            - assessed value
            - property valuation
            - asset valuation
            - loan-to-value
            - security interest
            - pledged asset
            - collateral coverage
            - independent valuation
    - id: Keyword_global_top500_125_collateral_valuation_reports_domain_context
      groups:
        - match_style: word
          terms:
            - collateral valuation reports
            - collateral
            - valuation
            - reports
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://handbook.apra.gov.au/standard/aps-220
  - https://www.apra.gov.au/credit-risk-management
