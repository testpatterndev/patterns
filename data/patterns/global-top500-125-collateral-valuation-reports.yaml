schema: testpattern/v1
name: Collateral valuation reports
slug: global-top500-125-collateral-valuation-reports
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to collateral valuation reports in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:collateral\s+valuation|property\s+valuation|asset\s+valuation|security\s+assessment|valuation\s+report|APS\s+220|loan\s+security|market\s+value|appraised\s+value|collateral\s+coverage|certified\s+valuer|valuation\s+method)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - collateral valuation reports
    - collateral
    - valuation
    - reports
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: collateral valuation
      description: Primary topic phrase match
    - value: property valuation
      description: Case-insensitive topic phrase match
    - value: asset valuation
      description: Alternative topic phrase match
    - value: security assessment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_collateral_valuation
      matches:
        - ref: Evidence_collateral_valuation
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_collateral_valuation
      matches:
        - ref: Evidence_collateral_valuation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_collateral_valuation
      matches:
        - ref: Evidence_collateral_valuation
  regexes:
    - id: Pattern_collateral_valuation
      pattern: >-
        (?is)\b(?:collateral\s+valuation|property\s+valuation|asset\s+valuation|security\s+assessment|valuation\s+report|APS\s+220|loan\s+security|market\s+value|appraised\s+value|collateral\s+coverage|certified\s+valuer|valuation\s+method)\b
  keywords:
    - id: Evidence_collateral_valuation
      groups:
        - match_style: word
          terms:
            - collateral valuation
            - property valuation
            - asset valuation
            - security assessment
            - valuation report
            - APS 220
            - loan security
            - market value
            - appraised value
            - collateral coverage
            - certified valuer
            - valuation method
risk_description: >-
  This concept detector finds reports valuing property or other assets offered as collateral for lending. Disclosure could reveal a specific asset's assessed worth or weaknesses and give a borrower, bidder, or counterparty leverage in negotiation. The normal report does not contain payment authority and often requires borrower identity, current lending terms, or market context before it becomes materially harmful. Risk 4 and OFFICIAL therefore fit; a live enforcement valuation or a report embedded in a detailed distressed-loan file would warrant stronger protection.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
