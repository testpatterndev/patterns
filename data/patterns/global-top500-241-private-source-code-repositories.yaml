schema: testpattern/v1
name: Private source code repositories
slug: global-top500-241-private-source-code-repositories
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies private source code repositories patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:source\s+code|private\s+repository|code\s+repository|git\s+repository|version\s+control|proprietary\s+code|internal\s+repo|confidential\s+source|access\s+control|repository\s+access)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private source code repositories
    - private
    - source
    - code
    - repositories
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: source code
      description: Primary topic phrase match
    - value: private repository
      description: Case-insensitive topic phrase match
    - value: code repository
      description: Alternative topic phrase match
    - value: git repository
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_private_source_code_repos
      matches:
        - ref: Pattern_global_top500_241_private_source_code_repositories_label_context
        - ref: Keyword_global_top500_241_private_source_code_repositories_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_private_source_code_repos
      matches:
        - ref: Keyword_private_source_code_repos
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_private_source_code_repos
      matches:
        - ref: Keyword_private_source_code_repos
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_private_source_code_repos
      pattern: >-
        (?is)\b(?:source\s+code|private\s+repository|code\s+repository|git\s+repository|version\s+control|proprietary\s+code|internal\s+repo|confidential\s+source|access\s+control|repository\s+access)\b
    - id: Pattern_global_top500_241_private_source_code_repositories_label_context
      pattern: (?i)\\b(?:private\\s+source\\s+code\\s+repositories|private|source|repositories|top500)\\b
  keywords:
    - id: Keyword_private_source_code_repos
      groups:
        - match_style: word
          terms:
            - source code
            - private repository
            - code repository
            - git repository
            - version control
            - proprietary code
            - internal repo
            - confidential source
            - access control
            - repository access
    - id: Keyword_global_top500_241_private_source_code_repositories_domain_context
      groups:
        - match_style: word
          terms:
            - private source code repositories
            - private
            - source
            - repositories
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
