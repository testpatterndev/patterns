schema: testpattern/v1
name: Air traffic operational procedures
slug: global-top500-451-air-traffic-operational-procedures
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to air traffic operational procedures in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:air\s+traffic\s+control|operational\s+procedure|separation\s+minima|flight\s+clearance|approach\s+procedure|control\s+tower|airspace\s+management|radar\s+vectoring|flight\s+information\s+region|terminal\s+control)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - air traffic operational procedures
    - air
    - traffic
    - operational
    - procedures
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: air traffic control
      description: Primary topic phrase match
    - value: operational procedure
      description: Case-insensitive topic phrase match
    - value: separation minima
      description: Alternative topic phrase match
    - value: flight clearance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: air traffic procedure
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to air traffic operational procedures appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_air_traffic_procedures
      matches:
        - ref: Pattern_global_top500_451_air_traffic_operational_procedures_label_context
        - ref: Keyword_global_top500_451_air_traffic_operational_procedures_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_air_traffic_procedures
      matches:
        - ref: Keyword_air_traffic_procedures
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_air_traffic_procedures
      pattern: >-
        (?is)\b(?:air\s+traffic\s+control|operational\s+procedure|separation\s+minima|flight\s+clearance|approach\s+procedure|control\s+tower|airspace\s+management|radar\s+vectoring|flight\s+information\s+region|terminal\s+control)\b
    - id: Pattern_global_top500_451_air_traffic_operational_procedures_label_context
      pattern: (?i)\b(?:air\s+traffic\s+operational\s+procedures)\b
  keywords:
    - id: Keyword_air_traffic_procedures
      groups:
        - match_style: word
          terms:
            - air traffic control
            - text: ATC
              case_sensitive: true
            - operational procedure
            - separation minima
            - flight clearance
            - approach procedure
            - control tower
            - airspace management
            - radar vectoring
            - NOTAM
            - flight information region
            - terminal control
      strength: specific
    - id: Keyword_global_top500_451_air_traffic_operational_procedures_domain_context
      groups:
        - match_style: word
          terms:
            - air traffic operational procedures
            - air
            - traffic
            - operational
            - procedures
      strength: domain
risk_description: >-
  The concept classifier looks for aviation-control phrases such as separation minima, flight clearances, approach procedures, and radar vectoring with nearby domain context; it does not prove that live controller instructions or system configurations are present. A substantive operational procedure could reveal routing assumptions or control practices that help a knowledgeable actor plan disruption, evade safeguards, or exploit a local weakness. The likely impact is serious but normally confined to an airport, airspace sector, operator, or procedure, and benign training or policy discussion remains a material match source. Risk 8 and SENSITIVE fit that contained operational exposure; PROTECTED would require current exploitable control detail whose compromise could cause broad aviation disruption or major life-safety consequences.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
