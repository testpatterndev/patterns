schema: testpattern/v1
name: Air traffic operational procedures
slug: global-top500-451-air-traffic-operational-procedures
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive air-traffic operational procedures. Topic phrases are retained for discovery;
  enforcement requires local runway, sector, waypoint, handoff, clearance, or airspace-procedure detail,
  and high confidence also requires an operational value such as a runway, flight level, distance, or
  radio frequency.
operation: >-
  Regex_air_traffic_procedures recognises air-traffic procedure, separation, clearance, approach,
  vectoring, flight-information-region, and terminal-control topics. The topic alone is discovery-only
  at 65. Local procedure detail raises it to 75; local detail plus an operational runway, flight level,
  distance, or frequency reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:air\s+traffic\s+operational\s+procedure|air\s+traffic\s+control\s+procedure|separation\s+minima|flight\s+clearance|approach\s+procedure|radar\s+vectoring|flight\s+information\s+region|terminal\s+control\s+procedure)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires local procedure content rather than a generic aviation-control mention.
  High confidence adds an operational value, reducing matches on public standards and introductory
  training.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - air traffic operational procedures
    - air
    - traffic
    - operational
    - procedures
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: air traffic operational procedure
      description: Low-tier probe - topic without local procedure detail
    - value: 'Air traffic operational procedure for the Brisbane terminal sector and waypoint GOMOL handoff'
      description: Medium-tier probe - local sector and waypoint detail without an operational value
    - value: 'Separation minima for Brisbane terminal sector: 5 NM near runway 19L; controller frequency 118.700 MHz'
      description: High-tier probe - local procedure detail with distance, runway, and frequency values
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: air traffic procedure
      description: Generic word pair from old broad template should not match
    - value: 'The ICAO overview explains the purpose of air traffic control.'
      description: Public overview without a protected operational procedure
    - value: 'Training example: separation minima for sector Delta is 5 NM near runway 19L'
      description: Explicit training content must not enforce
false_positives:
  - description: Public aviation standards, airport information, and training material discuss separation, approaches, runways, and clearances without exposing a local operating procedure.
    mitigation: Keep topic-only matches discovery-only and require sector, waypoint, handoff, runway, or comparable local procedure detail for enforcement.
  - description: Controller training scenarios can include realistic sectors, runways, distances, flight levels, and frequencies.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_air_traffic_procedures
      matches:
        - ref: Evidence_air_traffic_local_detail
        - ref: Evidence_air_traffic_operational_value
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_air_traffic_procedures
      matches:
        - ref: Evidence_air_traffic_local_detail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_air_traffic_procedures
  regexes:
    - id: Regex_air_traffic_procedures
      pattern: >-
        (?is)\b(?:air\s+traffic\s+operational\s+procedure|air\s+traffic\s+control\s+procedure|separation\s+minima|flight\s+clearance|approach\s+procedure|radar\s+vectoring|flight\s+information\s+region|terminal\s+control\s+procedure)\b
    - id: Evidence_air_traffic_operational_value
      pattern: '(?i)\b(?:FL\d{2,3}|runway\s+\d{2}[LCR]?|\d+(?:\.\d+)?\s*NM|\d{3}\.\d{3}\s*MHz)\b'
  keywords:
    - id: Evidence_air_traffic_local_detail
      groups:
        - match_style: word
          terms:
            - runway
            - sector
            - waypoint
            - holding fix
            - approach fix
            - handoff point
            - controller frequency
            - airspace boundary
            - text: SID
              case_sensitive: true
            - text: STAR
              case_sensitive: true
      strength: domain
risk_description: >-
  The concept classifier looks for aviation-control phrases such as separation minima, flight clearances, approach procedures, and radar vectoring with nearby domain context; it does not prove that live controller instructions or system configurations are present. A substantive operational procedure could reveal routing assumptions or control practices that help a knowledgeable actor plan disruption, evade safeguards, or exploit a local weakness. The likely impact is serious but normally confined to an airport, airspace sector, operator, or procedure, and benign training or policy discussion remains a material match source. Risk 8 and SENSITIVE fit that contained operational exposure; PROTECTED would require current exploitable control detail whose compromise could cause broad aviation disruption or major life-safety consequences.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
