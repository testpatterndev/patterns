schema: testpattern/v1
name: Regulatory examination responses
slug: global-top500-168-regulatory-examination-responses
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive responses and submissions addressing regulatory, supervisory, prudential, or
  compliance examinations and findings. Topic phrases are retained for discovery; enforcement requires
  response, finding, root-cause, remediation, ownership, due-date, evidence, dispute, or control-gap
  content, and high confidence also requires a formal examination/finding reference or response due date.
operation: >-
  Regex_regulatory_examination_response recognises examination and review responses, submissions, and
  responses to regulator findings or inquiries. The topic alone is discovery-only at 65. Substantive
  management-response and remediation content raises it to 75; a formal examination/finding reference or
  response due date reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:(?:regulatory|supervisory|prudential|compliance)\s+(?:examination|review)\s+(?:response|submission)|response\s+to\s+(?:the\s+)?(?:regulator(?:'s)?|supervisory|prudential)\s+(?:examination|review|finding|inquiry)|matter\s+requiring\s+attention\s+response)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive response or remediation content rather than examination
  vocabulary alone. High confidence adds a formal matter reference or response deadline.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government
corroborative_evidence:
  keywords:
    - regulatory examination responses
    - regulatory
    - examination
    - responses
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: regulatory examination response
      description: Low-tier probe - examination-response topic without substantive content
    - value: 'Regulatory examination response: management response to finding, root cause, control gap, remediation commitment, corrective action owner, target completion date, and evidence attached'
      description: Medium-tier probe - substantive response content without a formal reference or deadline
    - value: 'Regulatory examination response, examination reference: APRA-EX-2026-041, response due 30 August 2026: management response, root cause, remediation commitment, corrective action owner, target completion date, and evidence attached'
      description: High-tier probe - substantive response with formal examination reference and deadline
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: 'The regulator published a guide to its supervisory review process.'
      description: Public examination guidance without an organisation response
    - value: 'The remediation plan addresses an internal project review.'
      description: Internal remediation outside a regulatory examination response
    - value: 'Training example: regulatory examination response APRA-EX-2026-041 with management response, root cause, and evidence attached'
      description: Explicit training content must not enforce
false_positives:
  - description: Regulatory guidance and examination procedures discuss reviews, findings, remediation, and evidence without containing a regulated entity's response.
    mitigation: Keep examination-response topics discovery-only and require management-response, finding, root-cause, remediation, ownership, due-date, evidence, dispute, or control-gap content.
  - description: Training responses can contain realistic examination references, findings, owners, deadlines, and attachments.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_regulatory_examination_response
      matches:
        - ref: Evidence_regulatory_examination_content
        - ref: Evidence_regulatory_examination_formal
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_regulatory_examination_response
      matches:
        - ref: Evidence_regulatory_examination_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_regulatory_examination_response
  regexes:
    - id: Regex_regulatory_examination_response
      pattern: >-
        (?is)\b(?:(?:regulatory|supervisory|prudential|compliance)\s+(?:examination|review)\s+(?:response|submission)|response\s+to\s+(?:the\s+)?(?:regulator(?:'s)?|supervisory|prudential)\s+(?:examination|review|finding|inquiry)|matter\s+requiring\s+attention\s+response)\b
    - id: Evidence_regulatory_examination_formal
      pattern: >-
        (?i)\b(?:(?:examination|review|finding|matter)\s*(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|response\s+due\s+(?:date\s*)?[:#-]?\s*(?:[0-3]?\d[/-][01]?\d[/-](?:20)?\d{2}|[0-3]?\d\s+[A-Za-z]{3,9}\s+20\d{2}))\b
  keywords:
    - id: Evidence_regulatory_examination_content
      groups:
        - match_style: word
          terms:
            - management response
            - response to finding
            - finding reference
            - remediation commitment
            - root cause
            - corrective action owner
            - target completion date
            - evidence attached
            - issue disputed
            - action plan
            - control gap
      strength: domain
risk_description: >-
  This concept pattern recognises regulatory-examination, examination-response, regulator-inquiry, and related response language intended to identify an organisation's submission to a regulator. A substantive response can disclose control gaps, incidents, legal positions, remediation commitments, and evidence before findings are final, enabling exploitation, enforcement prejudice, or reputational harm. Published standards and response templates can match, but the normal unit is an active examination record rather than generic compliance commentary. Risk 8 SENSITIVE reflects serious contained regulatory and operational harm; PROTECTED would require critical-service instability, systemic misconduct, privileged national-security matters, market-wide consequences, or another significant-damage exposure.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
