schema: testpattern/v1
name: Target package intelligence
slug: global-top500-424-target-package-intelligence
version: 1.1.1
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to target package intelligence in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:target\s+package|intelligence\s+package|targeting\s+data|target\s+folder|strike\s+package|mission\s+planning|target\s+coordinates|battle\s+damage\s+assessment|target\s+acquisition|collateral\s+damage|target\s+nomination)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - target package intelligence
  proximity: 240
test_cases:
  should_match:
    - value: target package
      description: Primary topic phrase match
    - value: intelligence package
      description: Case-insensitive topic phrase match
    - value: targeting data
      description: Alternative topic phrase match
    - value: target folder
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to target package intelligence appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_target_package_intelligence
      matches:
        - ref: Pattern_global_top500_424_target_package_intelligence_label_context
        - ref: Keyword_global_top500_424_target_package_intelligence_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_target_package_intelligence
      matches:
        - ref: Keyword_target_package_intelligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_target_package_intelligence
      pattern: >-
        (?is)\b(?:target\s+package|intelligence\s+package|targeting\s+data|target\s+folder|strike\s+package|mission\s+planning|target\s+coordinates|battle\s+damage\s+assessment|target\s+acquisition|collateral\s+damage|target\s+nomination)\b
    - id: Pattern_global_top500_424_target_package_intelligence_label_context
      pattern: (?i)\b(?:target\s+package\s+intelligence)\b
  keywords:
    - id: Keyword_target_package_intelligence
      groups:
        - match_style: word
          terms:
            - target package
            - intelligence package
            - targeting data
            - target folder
            - strike package
            - mission planning
            - target coordinates
            - battle damage assessment
            - target acquisition
            - weaponeering
            - collateral damage
            - target nomination
      strength: specific
    - id: Keyword_global_top500_424_target_package_intelligence_domain_context
      groups:
        - match_style: word
          terms:
            - target package intelligence
            - target
            - package
            - intelligence
      strength: domain
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Secret
