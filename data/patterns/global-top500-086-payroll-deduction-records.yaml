schema: testpattern/v1
name: Payroll deduction records
slug: global-top500-086-payroll-deduction-records
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to payroll deduction records in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:payroll\s+deduction\s+records|payroll\s+deduction|salary\s+sacrifice|pre[\s-]+tax\s+deduction|post[\s-]+tax\s+deduction|voluntary\s+deduction|insurance\s+premium|union\s+dues|superannuation\s+contribution|benefit\s+deduction|net\s+pay)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payroll deduction records
    - payroll
    - deduction
    - records
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: payroll deduction records
      description: Primary topic phrase match
    - value: payroll deduction
      description: Case-insensitive topic phrase match
    - value: salary sacrifice
      description: Alternative topic phrase match
    - value: pre-tax deduction
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_payroll_deduction
      matches:
        - ref: Pattern_global_top500_086_payroll_deduction_records_label_context
        - ref: Keyword_global_top500_086_payroll_deduction_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_payroll_deduction
      matches:
        - ref: Keyword_payroll_deduction
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_payroll_deduction
      matches:
        - ref: Keyword_payroll_deduction
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_payroll_deduction
      pattern: >-
        (?is)\b(?:payroll\s+deduction\s+records|payroll\s+deduction|salary\s+sacrifice|pre[\s-]+tax\s+deduction|post[\s-]+tax\s+deduction|voluntary\s+deduction|insurance\s+premium|union\s+dues|superannuation\s+contribution|benefit\s+deduction|net\s+pay)\b
    - id: Pattern_global_top500_086_payroll_deduction_records_label_context
      pattern: (?i)\\b(?:payroll\\s+deduction\\s+records|payroll|deduction|top500)\\b
  keywords:
    - id: Keyword_payroll_deduction
      groups:
        - match_style: word
          terms:
            - payroll deduction records
            - payroll deduction
            - salary sacrifice
            - pre-tax deduction
            - post-tax deduction
            - voluntary deduction
            - insurance premium
            - union dues
            - superannuation contribution
            - benefit deduction
            - net pay
    - id: Keyword_global_top500_086_payroll_deduction_records_domain_context
      groups:
        - match_style: word
          terms:
            - payroll deduction records
            - payroll
            - deduction
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
