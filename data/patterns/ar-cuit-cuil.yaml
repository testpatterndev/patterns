schema: testpattern/v1
name: Cuit Cuil
slug: ar-cuit-cuil
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Cuit Cuil patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: 'Validation: Mod 11. Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials.'
pattern: \b\d{2}-?\d{8}-?\d{1}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - ar
regulations:
- "PDPL (AR)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: 20-12345678-9
      description: Standard CUIT format
    - value: '20123456789'
      description: CUIT without separators
    - value: 27-12345678-4
      description: CUIL format (27 prefix)
  should_not_match:
    - value: '20-1234567-9'
      description: Only 7 digits in middle group instead of 8
    - value: 'AB-12345678-9'
      description: Letters instead of digits in prefix
    - value: '20-12345678-'
      description: Missing check digit at end
false_positives:
  - description: >-
      Common words and phrases related to cuit cuil appearing in policy documents, training materials, HR templates, or
      compliance guidelines without actual personal data.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than
      general discussion.
  - description: >-
      In Spanish (Argentina), similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ar_cuit_cuil
      matches:
        - ref: Keyword_ar_cuit_cuil
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ar_cuit_cuil
  regexes:
    - id: Regex_ar_cuit_cuil
      pattern: \b\d{2}-?\d{8}-?\d{1}\b
      validators:
        - ref: Validator_ar_cuit_cuil_checksum
  keywords:
    - id: Keyword_ar_cuit_cuil
      groups:
        - match_style: word
          terms:
            - CUIT
            - CUIL
            - clave unica
            - clave única
            - identificación tributaria
            - identificacion tributaria
            - tax identification
            - tax id
            - número de CUIT
            - numero de CUIT
            - número de CUIL
            - numero de CUIL
            - clave fiscal
      strength: specific
  validators:
    - id: Validator_ar_cuit_cuil_checksum
      type: Checksum
      params:
        weights: "5,4,3,2,7,6,5,4,3,2"
        mod: 11
        checkDigit: 0
  filters:
    - id: Filter_ar_cuit_cuil_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  This pattern finds Argentina's CUIT or CUIL number, which identifies either a taxpayer entity or a worker in tax and labour administration. A personal CUIL can link an individual across employment and social-security records, while a CUIT may simply identify a business in routine invoices and filings. The detector cannot always distinguish those uses, and the number does not itself expose tax history, payroll data, identity documents, or account authority. Risk 5 and OFFICIAL accommodate the mixed normal unit; a linked personal tax record or authenticated service account would be more sensitive.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-argentina-unique-tax-identification-key
    title: "Argentina Unique Tax Identification Key (CUIT/CUIL) entity definition - Microsoft Learn"
created: '2026-02-08'
updated: '2026-07-14'
