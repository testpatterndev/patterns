schema: testpattern/v1
name: Unreleased feature specifications
slug: global-top500-222-unreleased-feature-specifications
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to unreleased feature specifications in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:unreleased\s+feature\s+specifications|feature\s+specification|unreleased\s+feature|product\s+roadmap|quality\s+assurance|safety\s+requirements|feature\s+design|confidential\s+specification|product\s+backlog)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - unreleased feature specifications
    - unreleased
    - feature
    - specifications
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: unreleased feature specifications
      description: Primary topic phrase match
    - value: feature specification
      description: Case-insensitive topic phrase match
    - value: unreleased feature
      description: Alternative topic phrase match
    - value: product roadmap
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to unreleased feature specifications appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_unreleased_feature_specs
      matches:
        - ref: Pattern_global_top500_222_unreleased_feature_specifications_label_context
        - ref: Keyword_global_top500_222_unreleased_feature_specifications_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_222_unreleased_feature_specifications_noise_exclusion
    - confidence_level: 75
      id_match: Regex_unreleased_feature_specs
      matches:
        - ref: Keyword_unreleased_feature_specs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_222_unreleased_feature_specifications_noise_exclusion
    - confidence_level: 65
      id_match: Regex_unreleased_feature_specs
      matches:
        - ref: Keyword_unreleased_feature_specs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_222_unreleased_feature_specifications_noise_exclusion
  regexes:
    - id: Regex_unreleased_feature_specs
      pattern: (?is)\b(?:unreleased\s+feature\s+specifications|feature\s+specification|unreleased\s+feature|product\s+roadmap|quality\s+assurance|safety\s+requirements|feature\s+design|confidential\s+specification|product\s+backlog)\b
    - id: Pattern_global_top500_222_unreleased_feature_specifications_label_context
      pattern: (?i)\\b(?:unreleased\\s+feature\\s+specifications|unreleased|feature|specifications|top500)\\b
  keywords:
    - id: Keyword_unreleased_feature_specs
      groups:
        - match_style: word
          terms:
            - unreleased feature specifications
            - feature specification
            - unreleased feature
            - product roadmap
            - quality assurance
            - safety requirements
            - pre-release
            - feature design
            - confidential specification
            - product backlog
    - id: Keyword_global_top500_222_unreleased_feature_specifications_domain_context
      groups:
        - match_style: word
          terms:
            - unreleased feature specifications
            - unreleased
            - feature
            - specifications
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_222_unreleased_feature_specifications_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
