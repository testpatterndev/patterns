schema: testpattern/v1
name: New Relic API Key
slug: global-new-relic-api-key
version: 1.1.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects New Relic user API keys (NRAK- prefix followed by 27 characters). A leaked
  key grants access to the New Relic GraphQL (NerdGraph) API and account telemetry.
operation: 'Prefixed token format NRAK- followed by 27 lowercase-alphanumeric characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9])NRAK-[a-z0-9]{27}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the distinctive NRAK- prefix with a fixed 27-character body is highly
  specific to New Relic user API keys.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - new relic
    - newrelic
    - NerdGraph
    - api key
    - NEW_RELIC_API_KEY
    - user key
    - account id
  proximity: 300
test_cases:
  should_match:
    - value: NRAK-abcdefghijklmnopqrstuvwxy12
      description: New Relic user API key, NRAK- prefix + 27 chars
    - value: 'NEW_RELIC_API_KEY=NRAK-0123456789abcdefghijklmnopq'
      description: Labelled New Relic key in an env assignment
    - value: NRAK-9z8y7x6w5v4u3t2s1r0q9p8o7n6
      description: Another New Relic key body
  should_not_match:
    - value: NRAK-abcdefghij
      description: Too short to be a valid New Relic key
    - value: NRAA-abcdefghijklmnopqrstuvwxy12
      description: Wrong prefix (NRAA- instead of NRAK-)
    - value: paste your new relic user api key into the NerdGraph client
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder NRAK- strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  A leaked New Relic key exposes application telemetry and account configuration via
  NerdGraph, and can be used to alter alerting or exfiltrate monitoring data.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-09'
changelog:
  - version: 1.1.0
    date: '2026-07-09'
