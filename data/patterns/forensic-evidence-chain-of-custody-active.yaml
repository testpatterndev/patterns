schema: testpattern/v1
name: Forensic Evidence and Chain-of-Custody Records
slug: forensic-evidence-chain-of-custody-active
version: 1.2.2
type: keyword_proximity
pattern_class: concept
engine: universal
description: >-
  Detects forensic evidence and chain-of-custody records for active criminal or security investigations, including
  exhibit registers, DNA/fingerprint/ballistics results, custody handovers, and formal chain-of-custody documentation.
operation: >-
  Keyword proximity: primary keywords (chain of custody, exhibit register, forensic evidence, DNA profile match,
  fingerprint match, ballistics match) within 300 characters of case numbers and prosecution markers (committal,
  indictment, trial date). Regex for QPS exhibit reference number patterns. Negative keyword exclusion for concluded
  cases and training. Consolidated coverage (merge ci-2): also covers the former
  au-top500-299-evidence-chain-of-custody-records detector scope.
pattern: >-
  (?i)\b(chain\s+of\s+custody|exhibit\s+register|forensic\s+(?:evidence|certificate)|DNA\s+profile\s+match|fingerprint\s+(?:match|identification)|ballistics\s+(?:match|analysis|report)|toxicology\s+results?)\b
confidence: medium
confidence_justification: >-
  Medium confidence: requires co-occurrence of forensic evidence chain-of-custody terminology with active prosecution
  markers and exhibit reference numbers. The proximity requirement for active prosecution terms (committal, indictment,
  trial date) distinguishes active cases from historical or concluded matters.
jurisdictions:
  - au
regulations:
  - Evidence Act 1977 (Qld)
  - PPRA 2000 (Qld)
frameworks:
  - QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - exhibit
    - prosecution brief
    - committal
    - indictment
    - trial date
    - active prosecution
    - forensic certificate
    - Queensland Health Forensic
    - QHFSS
    - scene of crime
    - SOCO
    - evidence bag
    - evidence seal
    - laboratory analysis
  proximity: 300
  keyword_lists:
    - law-enforcement
    - government-services
test_cases:
  should_match:
    - value: >-
        PROTECTED Law-Enforcement. Forensic Evidence — Chain of Custody Register. Case: R v MARTINEZ, Indictment No.
        2025/1847. Exhibit QPS-EX-2025-00342: Blood sample collected from scene. DNA profile match to accused confirmed
        by QHFSS. Forensic certificate issued. Chain of custody: SOCO Constable L. PARK collected 14/01/2025, sealed
        evidence bag #EV-78234, transferred to QHFSS 15/01/2025.
      description: Active prosecution forensic evidence register with DNA match and chain-of-custody details
    - value: >-
        Prosecution brief — exhibit register update. Trial date: 15 September 2025. Exhibit QPS-EX-2025-00187: Firearm
        recovered from suspect vehicle. Ballistics match confirmed — projectile from victim matched to seized weapon.
        Chain of custody maintained by four officers. Forensic certificate and continuity statements attached.
      description: Prosecution brief exhibit register with ballistics match for upcoming trial
    - value: >-
        Forensic evidence summary for committal hearing. Re: Operation JASPER. Fingerprint match identified on drug
        packaging — latent print lifted from exhibit QPS-EX-2024-01294 matches accused. Toxicology results from seized
        substance: 78% purity methylamphetamine, 2.4 kg gross weight. Chain of custody documentation complete.
      description: Committal hearing forensic evidence summary with fingerprint and toxicology results
  should_not_match:
    - value: >-
        The Queensland Health Forensic and Scientific Services published its annual report noting that 12,500 DNA
        analyses were completed during the year. The laboratory maintained NATA accreditation for all forensic testing.
      description: Published QHFSS annual report with aggregate laboratory statistics
    - value: >-
        A forensic science training manual explains chain of custody procedures for police recruits. The manual uses
        fictional case studies to demonstrate proper evidence handling and documentation.
      description: Police training manual with fictional chain-of-custody examples
    - value: >-
        The judge in the concluded murder trial noted that the chain of custody for the DNA evidence was properly
        maintained throughout. The accused was convicted and sentenced to life imprisonment.
      description: News report about concluded trial where evidence was admitted
false_positives:
  - description: Forensic laboratory annual reports with aggregate testing statistics
    mitigation: >-
      Negative keyword exclusion: 'annual report', 'published', 'reporting period', 'NATA accreditation'. Require
      proximity to specific case numbers.
  - description: Police training materials about evidence handling procedures
    mitigation: >-
      Negative keyword exclusion: 'training manual', 'training exercise', 'fictional', 'case study', 'police recruit',
      'simulated'
  - description: Media reporting on concluded trials where evidence was publicly discussed
    mitigation: >-
      Negative keyword exclusion: 'convicted', 'sentenced', 'concluded', 'acquitted', 'verdict', 'judge noted', 'court
      heard'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_forensic_evidence_chain_of_custody_active_forensic_evidence_terms
      matches:
        - ref: Evidence_forensic_evidence_chain_of_custody_active_primary_keywords
        - ref: Evidence_forensic_evidence_chain_of_custody_active_active_prosecution_markers
        - ref: Evidence_forensic_evidence_chain_of_custody_active_corroborative_terms
        - ref: Pattern_forensic_evidence_chain_of_custody_active_qps_exhibit_reference
        - ref: Pattern_forensic_evidence_chain_of_custody_active_evidence_bag_number
        - ref: Pattern_forensic_evidence_chain_of_custody_active_indictment_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_forensic_evidence_chain_of_custody_active_exclusion
    - confidence_level: 75
      id_match: Pattern_forensic_evidence_chain_of_custody_active_forensic_evidence_terms
      matches:
        - ref: Evidence_forensic_evidence_chain_of_custody_active_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_forensic_evidence_chain_of_custody_active_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_forensic_evidence_chain_of_custody_active_forensic_evidence_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_forensic_evidence_chain_of_custody_active_exclusion
  regexes:
    - id: Pattern_forensic_evidence_chain_of_custody_active_forensic_evidence_terms
      pattern: >-
        (?i)\b(chain\s+of\s+custody|exhibit\s+register|forensic\s+evidence|DNA\s+profile\s+match|fingerprint\s+match|ballistics\s+match|toxicology\s+results|forensic\s+certificate)\b
    - id: Pattern_forensic_evidence_chain_of_custody_active_qps_exhibit_reference
      pattern: \bQPS-EX-\d{4}-\d{4,6}\b
    - id: Pattern_forensic_evidence_chain_of_custody_active_evidence_bag_number
      pattern: \bEV-\d{4,6}\b
    - id: Pattern_forensic_evidence_chain_of_custody_active_indictment_number
      pattern: \bIndictment\s+(?:No\.?|Number)\s*:?\s*\d{4}/\d{3,5}\b
  keywords:
    - id: Evidence_forensic_evidence_chain_of_custody_active_primary_keywords
      groups:
        - match_style: word
          terms:
            - chain of custody
            - exhibit register
            - forensic evidence
            - DNA profile match
            - fingerprint match
            - ballistics match
            - toxicology results
            - forensic certificate
            - evidence continuity
      strength: specific
    - id: Evidence_forensic_evidence_chain_of_custody_active_active_prosecution_markers
      groups:
        - match_style: word
          terms:
            - committal
            - indictment
            - trial date
            - prosecution brief
            - active prosecution
            - pending trial
            - listed for hearing
      strength: specific
    - id: Evidence_forensic_evidence_chain_of_custody_active_corroborative_terms
      groups:
        - match_style: word
          terms:
            - QHFSS
            - Queensland Health Forensic
            - scene of crime
            - SOCO
            - evidence bag
            - evidence seal
            - laboratory analysis
            - latent print
            - seized
            - exhibit
      strength: specific
    - id: Filter_forensic_evidence_chain_of_custody_active_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - annual report
            - training manual
            - training exercise
            - fictional
            - convicted
            - sentenced
            - concluded
            - acquitted
            - verdict
            - police recruit
            - simulated
      strength: noise
risk_rating: 8
risk_description: >-
  Active forensic and custody records can identify investigations, exhibits, and suspects. Risk 8 OFFICIAL:Sensitive
  remains appropriate for operational evidence packages.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
