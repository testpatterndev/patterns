schema: testpattern/v1
name: Taxpayer case management files
slug: au-top500-381-taxpayer-case-management-files
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to taxpayer case management files in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:taxpayer\s+case\s+management\s+files|case\s+management|tax\s+file\s+number|assessment\s+notice|tax\s+return)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - taxpayer case management files
    - taxpayer
    - case
    - management
    - files
    - government
    - citizen
    - services
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: taxpayer case management files
      description: Primary topic phrase match
    - value: case management
      description: Case-insensitive topic phrase match
    - value: tax file number
      description: Alternative topic phrase match
    - value: assessment notice
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to taxpayer case management files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_taxpayer_case_management
      matches:
        - ref: Evidence_taxpayer_case_management
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_taxpayer_case_management
      matches:
        - ref: Evidence_taxpayer_case_management
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_taxpayer_case_management
      matches:
        - ref: Evidence_taxpayer_case_management
  regexes:
    - id: Pattern_taxpayer_case_management
      pattern: (?is)\b(?:taxpayer\s+case\s+management\s+files|case\s+management|tax\s+file\s+number|assessment\s+notice|tax\s+return)\b
    - id: Pattern_au_top500_381_taxpayer_case_management_files_label_context
      pattern: (?i)\b(?:taxpayer\s+case\s+management\s+files)\b
  keywords:
    - id: Evidence_taxpayer_case_management
      groups:
        - match_style: word
          terms:
            - taxpayer case management files
            - taxpayer
            - case management
            - text: ATO
              case_sensitive: true
            - tax file number
            - assessment notice
            - audit
            - tax return
            - compliance
            - revenue
            - lodgement
      strength: domain
    - id: Keyword_au_top500_381_taxpayer_case_management_files_domain_context
      groups:
        - match_style: word
          terms:
            - taxpayer case management files
            - taxpayer
            - case
            - management
            - files
      strength: domain
risk_description: >-
  This detector identifies taxpayer case-management files containing assessments, notices, identifiers, correspondence, and case actions. A leaked file can expose a taxpayer's obligations, disputes, financial position, and dealings with the revenue authority, enabling fraud, coercion, or interference with the case. The normal unit is a composite file about one taxpayer and creates serious privacy and financial harm without compromising the whole tax system. Risk 8 and SENSITIVE are appropriate; bulk taxpayer holdings, authentication secrets, protected intelligence, or systemic revenue impact would be required for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
