schema: testpattern/v1
name: AI Secrets & Credentials in AI Context
slug: ai-secrets-in-ai-context
version: 0.5.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects secrets and credentials surfaced in AI/LLM context: private-key headers (RSA / EC / OpenSSH /
  generic) and connection-string passwords (password= / pwd=) pasted into prompts, chat exports, or
  AI-generated output. Reuses the intent of built-in credential SITs, re-scoped to the AI surface.
operation: >-
  Two regexes: a PEM private-key header and a connection-string password assignment (>=6 chars).
  Corroborated by AI-context markers. Two tiers (65 regex only, discovery-only; 75 + AI context is
  the enforceable tier, keeping the SIT scoped to the AI surface). A TextMatchFilter
  excludes documentation placeholders (AKIAEXAMPLE, xxxxxxxx, your-password-here, PLACEHOLDER) so
  sample configs and tutorials do not fire.
pattern: '-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----'
confidence: medium
confidence_justification: >-
  Medium and precision-oriented (library target >=0.92). Private-key headers are highly specific;
  connection-string passwords are broader, so placeholder exclusions and AI-context corroboration
  remove the named FP traps (placeholder keys, hashes, GUIDs, sample configs).
jurisdictions: [global]
regulations: ['OWASP LLM Top 10 2025', 'NIST AI RMF GenAI Profile']
frameworks: [ISO 27001]
data_categories: [emerging, security]
ai_threat:
  ai_sit_id: AI-SIT-005
  aic_alias: AIC-02
  threat_family: Traditional
  detection_approach: SIT
corroborative_evidence:
  keywords: [private key, password, credential, secret, connection string]
  proximity: 300
  keyword_lists: [ai-context-markers]
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  regexes:
    - id: Regex_private_key_header
      pattern: '-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----'
    - id: Regex_conn_string_pwd
      pattern: '(?i)(?:password|pwd)\s*=\s*[^;\s"'']{6,}'
  shared_keywords:
    - dict: ai-context-markers
      as: Evidence_ai_context
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_private_key_header
      matches:
        - ref: Evidence_ai_context
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_private_key_header
    - confidence_level: 75
      id_match: Regex_conn_string_pwd
      matches:
        - ref: Evidence_ai_context
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_conn_string_pwd
  filters:
    - id: Guard_secrets_exclude_placeholder
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms: ['AKIAEXAMPLE', 'xxxxxxxx', 'your-password-here', 'PLACEHOLDER']
risk_rating: 7
risk_description: >-
  The detector finds a private-key header or connection-string password assignment in prompt, chat, Copilot, or AI-output context; it identifies an exposed credential event rather than general AI terminology. A genuine match can give an unauthorized party database or cryptographic access and may compromise the credential owner's systems, data, and downstream users until rotation. The regex excludes common placeholders and uses a value-length floor, but tutorials, environment-variable references, and test configurations can still match. Risk 7 captures the actionable exposure, while classification remains N/A because the event requires credential containment and the surrounding payload retains its own label.
sensitivity_labels:
  pspf: N/A
  qgiscf: N/A
  qgiscf_dlm: N/A
  us_gov: 'CUI Specified'
  uk_gov: 'OFFICIAL-SENSITIVE'
test_cases:
  should_match:
    - value: 'In the Copilot prompt: password=Sup3rSecretPwd99; connect now'
      description: Connection-string password pasted into an AI prompt
    - value: '-----BEGIN RSA PRIVATE KEY-----'
      description: RSA private key header
    - value: '-----BEGIN OPENSSH PRIVATE KEY-----'
      description: OpenSSH private key header variant
    - value: 'Copilot chat export: password=ProdSecret77;'
      description: Credential structure on an AI surface (enforces at 75 via AI context)
  should_not_match:
    - value: 'Please reset your password by clicking the link.'
      description: >-
        No password=<value> assignment present. Documentation placeholders (your-password-here,
        PLACEHOLDER, xxxxxxxx) are excluded by the Guard_secrets_exclude_placeholder TextMatchFilter
        in Purview, not by the regex.
    - value: 'The pwd field on the login form must be at least eight characters.'
      description: Prose reference to a password field with no pwd=<value> assignment
    - value: 'PEM documentation shows -----BEGIN PRIVATE KEY-----'
      description: Secret syntax outside AI context — discovery only, must not enforce
false_positives:
  - description: Documentation, tutorials, and sample configuration files that contain placeholder secrets (your-password-here, PLACEHOLDER, xxxxxxxx) or connection-string templates.
    mitigation: The Guard_secrets_exclude_placeholder TextMatchFilter excludes known placeholder tokens; require AI-context corroboration to raise confidence above the regex-only tier.
  - description: Connection-string password assignments using non-secret values such as short test passwords or environment-variable references (password=$DB_PASS).
    mitigation: Enforce the >=6-character value floor in the regex and corroborate with AI-context markers; treat environment-variable references as lower risk.
created: '2026-06-08'
updated: '2026-07-16'
changelog:
  - version: 0.5.0
    date: '2026-07-16'
    description: 'SIT alignment wave1 (TP-00015, reduced scope): both bare 65 credential tiers demoted to discovery_only so deployed enforcement matches the declared AI-context scope (generic private-key/password detection is inventory-only); the two existing 75 AI-context tiers are unchanged and remain the enforceable tiers; adversarial tests added. Environment-variable-reference exclusion (e.g. ${DB_PASS}) deliberately NOT added — under-specified, gated separately per QA.'
  - version: 0.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1509 without changing detector or package metadata.'
  - version: 0.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 0.3.0
    date: '2026-07-04'
    description: 'Restore full pre-bulk tier structure: the bulk remediation tool (Task 5) is blind to purview.shared_keywords[] refs, so its tierWeakness() treated domain-specific shared-dict evidence (ai-context-markers/ai-injection-verbs/ai-agent-action-verbs/ai-jailbreak-personas) as absent and collapsed multiple distinct tiers into one low-confidence tier'
  - version: 0.2.0
    date: '2026-07-04'
    description: Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.; Collapsed 4 duplicate 65-confidence tier(s) into the strictest canonical tier.
