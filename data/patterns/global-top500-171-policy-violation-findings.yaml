schema: testpattern/v1
name: Policy violation findings
slug: global-top500-171-policy-violation-findings
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to policy violation findings in international contexts.
  These are compliance findings that may concern people or entities; they are not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:policy\s+violation\s+findings|policy\s+violation|non[\s-]+compliance\s+finding|disciplinary\s+action|corrective\s+action|compliance\s+breach|policy\s+infringement|remediation\s+required|written\s+warning|code\s+of\s+conduct\s+breach|policy\s+exception)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - policy violation findings
    - policy
    - violation
    - findings
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: policy violation findings
      description: Primary topic phrase match
    - value: policy violation
      description: Case-insensitive topic phrase match
    - value: non-compliance finding
      description: Alternative topic phrase match
    - value: disciplinary action
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to policy violation findings appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_policy_violation_findings
      matches:
        - ref: Pattern_global_top500_171_policy_violation_findings_label_context
        - ref: Keyword_global_top500_171_policy_violation_findings_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_policy_violation_findings
      matches:
        - ref: Keyword_policy_violation_findings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_policy_violation_findings
      pattern: >-
        (?is)\b(?:policy\s+violation\s+findings|policy\s+violation|non[\s-]+compliance\s+finding|disciplinary\s+action|corrective\s+action|compliance\s+breach|policy\s+infringement|remediation\s+required|written\s+warning|code\s+of\s+conduct\s+breach|policy\s+exception)\b
    - id: Pattern_global_top500_171_policy_violation_findings_label_context
      pattern: (?i)\b(?:policy\s+violation\s+findings)\b
  keywords:
    - id: Keyword_policy_violation_findings
      groups:
        - match_style: word
          terms:
            - policy violation findings
            - policy violation
            - non-compliance finding
            - disciplinary action
            - corrective action
            - compliance breach
            - policy infringement
            - remediation required
            - sanction
            - written warning
            - code of conduct breach
            - policy exception
      strength: specific
    - id: Keyword_global_top500_171_policy_violation_findings_domain_context
      groups:
        - match_style: word
          terms:
            - policy violation findings
            - policy
            - violation
            - findings
      strength: domain
risk_description: >-
  The detector recognises policy-violation, non-compliance-finding, disciplinary-action, and violation-findings language intended to identify a completed compliance or conduct finding. A substantive record can name responsible people, describe evidence and control failures, and support sanctions, exposing subjects to reputational, employment, or legal harm while revealing weaknesses others could exploit. Policy manuals and generic disciplinary procedures can match, but the normal unit records an adverse finding rather than a rule itself. Risk 8 SENSITIVE reflects serious contained personal and operational harm; PROTECTED would require protected investigations, critical-system weaknesses, national-security misconduct, systemic corruption, or compromise causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
