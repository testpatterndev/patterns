schema: testpattern/v1
name: Hazardous material storage maps
slug: au-top500-459-hazardous-material-storage-maps
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to hazardous material storage maps in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?i)\b(?:hazardous\s+material\s+storage\s+maps?|hazardous\s+material\s+storage\s+(?:map|log|location)|dangerous\s+goods\s+storage\s+(?:map|log|location)|chemical\s+storage\s+(?:map|location|log)|spill\s+containment\s+map)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
- global
regulations:
- AML/CTF Act (Cth)
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- ISO 27001
- ISO 27701
data_categories:
- pii
corroborative_evidence:
  keywords:
  - hazardous material storage maps
  - storage map
  - bin
  - tank
  - container
  - UN number
  - SDS ID
  - GHS signal word
  - quantity
  - chemical class
  proximity: 300
test_cases:
  should_match:
  - value: hazardous material storage maps for site 4, tank 12
  - value: dangerous goods storage log, bin 7, UN 1203
  - value: chemical storage map showing container locations
  should_not_match:
  - value: safety data sheet for acetone
  - value: dangerous goods declaration for freight shipment
  - value: routine safety data sheet binder in the break room
  - value: hazardous material storage
  - value: placeholder value 12345
false_positives:
- description: Common words and phrases related to hazardous material storage maps appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
- description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_hazmat_storage
    matches:
    - ref: Evidence_hazmat_storage
      min_count: 2
      unique_results: true
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 75
    id_match: Pattern_hazmat_storage
    matches:
    - ref: Evidence_hazmat_storage
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    id_match: Pattern_hazmat_storage
    matches:
    - ref: Evidence_hazmat_storage
  regexes:
  - id: Pattern_hazmat_storage
    pattern: (?i)\b(?:hazardous\s+material\s+storage\s+maps?|hazardous\s+material\s+storage\s+(?:map|log|location)|dangerous\s+goods\s+storage\s+(?:map|log|location)|chemical\s+storage\s+(?:map|location|log)|spill\s+containment\s+map)\b
  keywords:
  - id: Evidence_hazmat_storage
    groups:
    - match_style: word
      terms:
      - hazardous material storage maps
      - storage map
      - bin
      - tank
      - container
      - UN number
      - SDS ID
      - GHS signal word
      - quantity
      - chemical class
    strength: domain
