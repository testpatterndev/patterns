schema: testpattern/v1
name: SIN
slug: ca-social-insurance-number
version: 1.3.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects SIN patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Validation: Luhn algorithm. Reference: https://www.canada.ca/en/employment-social-development/services/sin.html
  Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b[1-79]\d{2}[- ]?\d{3}[- ]?\d{3}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - ca
regulations:
- "Law 25 (QC)"
- PIPEDA
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: 184-197-531
      description: Standard Canadian SIN format (Luhn-valid)
    - value: 230 123 457
      description: Space-separated SIN (Luhn-valid)
    - value: '260740741'
      description: Continuous SIN digits (Luhn-valid)
  should_not_match:
    - value: '012-345-678'
      description: Starts with 0 (not in valid range 1-7, 9)
    - value: '823-456-789'
      description: Starts with 8 (not in valid range 1-7, 9)
    - value: '123-456-78'
      description: Only 2 digits in last group instead of 3
false_positives:
  - description: >-
      Common words and phrases related to sin appearing in policy documents, training materials, HR templates, or
      compliance guidelines without actual personal data.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than
      general discussion.
  - description: >-
      In English and French (Canada), similar terminology used in formal or administrative contexts (education,
      professional documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ca_sin
      matches:
        - ref: Keyword_ca_sin_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ca_sin
      matches:
        - ref: Keyword_ca_sin_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ca_sin
  regexes:
    - id: Regex_ca_sin
      pattern: \b[1-79]\d{2}[- ]?\d{3}[- ]?\d{3}\b
      validators:
        - ref: Func_canadian_sin
  keywords:
    - id: Keyword_ca_sin_specific
      groups:
        - match_style: word
          terms:
            - social insurance number
            - text: SIN
              case_sensitive: true
            - numéro d'assurance sociale
            - text: NAS
              case_sensitive: true
            - social insurance no
            - social insurance no.
            - numero d'assurance sociale
            - canadian SIN
            - canada SIN
      strength: specific
    - id: Keyword_ca_sin_broad
      groups:
        - match_style: word
          terms:
            - social insurance
            - assurance sociale
            - insurance number
            - tax identification
            - employment insurance
            - Service Canada
            - Canada Revenue
            - text: CRA
              case_sensitive: true
      strength: specific
  filters:
    - id: Filter_ca_sin_same_digits
      type: AllDigitsSameFilter
    - id: Filter_ca_sin_exclude_test
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms:
        - "000000000"
        - "000 000 000"
        - "000-000-000"
risk_rating: 9
risk_description: >-
  This identifier uniquely links to an individual and is a primary target for identity theft and fraud. Exposure can
  lead to unauthorized financial activity, impersonation, and significant personal harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-canada-social-insurance-number
    title: "Canada social insurance number entity definition - Microsoft Learn"
created: '2026-02-08'
updated: '2026-07-09'
