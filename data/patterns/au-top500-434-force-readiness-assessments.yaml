schema: testpattern/v1
name: Force readiness assessments
slug: au-top500-434-force-readiness-assessments
version: 1.3.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to force readiness assessments in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:force\s+readiness|readiness\s+assessment|operational\s+readiness|combat\s+readiness|defense\s+readiness|force\s+posture|capability\s+assessment|deployment\s+readiness|military\s+readiness|national\s+security|classified\s+assessment|ADF\s+readiness)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - force readiness assessments
    - force
    - readiness
    - assessments
    - defense
    - intelligence
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: force readiness
      description: Primary topic phrase match
    - value: readiness assessment
      description: Case-insensitive topic phrase match
    - value: operational readiness
      description: Alternative topic phrase match
    - value: combat readiness
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to force readiness assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_force_readiness_assessments
      matches:
        - ref: Evidence_force_readiness_assessments
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_force_readiness_assessments
      matches:
        - ref: Evidence_force_readiness_assessments
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_force_readiness_assessments
      matches:
        - ref: Evidence_force_readiness_assessments
  regexes:
    - id: Pattern_force_readiness_assessments
      pattern: >-
        (?is)\b(?:force\s+readiness|readiness\s+assessment|operational\s+readiness|combat\s+readiness|defense\s+readiness|force\s+posture|capability\s+assessment|deployment\s+readiness|military\s+readiness|national\s+security|classified\s+assessment|ADF\s+readiness)\b
  keywords:
    - id: Evidence_force_readiness_assessments
      groups:
        - match_style: word
          terms:
            - force readiness
            - readiness assessment
            - operational readiness
            - combat readiness
            - defense readiness
            - force posture
            - capability assessment
            - deployment readiness
            - military readiness
            - national security
            - classified assessment
            - ADF readiness
risk_description: >-
  The detector identifies force readiness, readiness assessment, operational readiness, and combat readiness language with six nearby terms. A genuine assessment can reveal personnel, equipment, training, logistics, maintenance, and capability shortfalls, allowing an adversary to exploit weak periods or mislead decision-makers. Public readiness frameworks, exercises, and generic management reporting can also match because the concept regex does not require a current force or quantified deficiency. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. A populated readiness assessment identifies personnel, equipment, logistics and capability shortfalls. An adversary can exploit weak periods or mislead decisions, creating significant mission damage. Risk 9 and PROTECTED Government therefore apply to the confirmed record itself. Require named force/unit, current reporting period and quantified deficiency/readiness fields; public frameworks and exercises audit only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
