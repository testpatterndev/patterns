schema: testpattern/v1
name: Remote administration tool settings
slug: global-top500-311-remote-administration-tool-settings
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies remote administration tool settings patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:remote\s+administration|remote\s+access|RDP\s+configuration|VNC\s+settings|SSH\s+access|jump\s+server|bastion\s+host|remote\s+desktop|privileged\s+remote\s+access|session\s+recording)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - remote administration tool settings
    - remote
    - administration
    - tool
    - settings
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: remote administration
      description: Primary topic phrase match
    - value: remote access
      description: Case-insensitive topic phrase match
    - value: RDP configuration
      description: Alternative topic phrase match
    - value: VNC settings
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  This concept regex recognizes remote administration, remote access, RDP, VNC, SSH, jump-server, bastion-host, remote-desktop, privileged-remote-access, and session-recording terminology. A genuine settings record can reveal enabled protocols, management entry points, trusted intermediaries, and monitoring choices that support targeted access attempts or defence evasion. The normal scope is one remote-management environment and its administrators or users, while public setup guides and architecture documents can match the same terms. Risk 8 SENSITIVE reflects serious contained access-path exposure; PROTECTED would require usable credentials, critical administrative reach, or significant broad compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_remote_admin
      matches:
        - ref: Pattern_global_top500_311_remote_administration_tool_settings_label_context
        - ref: Keyword_global_top500_311_remote_administration_tool_settings_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_remote_admin
      matches:
        - ref: Keyword_remote_admin
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_remote_admin
      pattern: >-
        (?is)\b(?:remote\s+administration|remote\s+access|RDP\s+configuration|VNC\s+settings|SSH\s+access|jump\s+server|bastion\s+host|remote\s+desktop|privileged\s+remote\s+access|session\s+recording)\b
    - id: Pattern_global_top500_311_remote_administration_tool_settings_label_context
      pattern: (?i)\b(?:remote\s+administration\s+tool\s+settings)\b
  keywords:
    - id: Keyword_remote_admin
      groups:
        - match_style: word
          terms:
            - remote administration
            - remote access
            - RDP configuration
            - VNC settings
            - SSH access
            - jump server
            - bastion host
            - remote desktop
            - TeamViewer
            - AnyDesk
            - privileged remote access
            - session recording
      strength: specific
    - id: Keyword_global_top500_311_remote_administration_tool_settings_domain_context
      groups:
        - match_style: word
          terms:
            - remote administration tool settings
            - remote
            - administration
            - tool
            - settings
      strength: domain
