schema: testpattern/v1
name: Employer payroll tax filings
slug: global-top500-083-employer-payroll-tax-filings
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to employer payroll tax filings in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:employer\s+payroll\s+tax\s+filings|payroll\s+tax\s+filing|employer\s+tax\s+return|quarterly\s+filing|annual\s+filing|tax\s+remittance|payroll\s+tax\s+report|employer\s+contribution|tax\s+authority|PAYG\s+withholding|Form\s+941)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - employer payroll tax filings
    - employer
    - payroll
    - tax
    - filings
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: employer payroll tax filings
      description: Primary topic phrase match
    - value: payroll tax filing
      description: Case-insensitive topic phrase match
    - value: employer tax return
      description: Alternative topic phrase match
    - value: quarterly filing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_payroll_tax_filings
      matches:
        - ref: Pattern_global_top500_083_employer_payroll_tax_filings_label_context
        - ref: Keyword_global_top500_083_employer_payroll_tax_filings_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_payroll_tax_filings
      matches:
        - ref: Keyword_payroll_tax_filings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_payroll_tax_filings
      matches:
        - ref: Keyword_payroll_tax_filings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_payroll_tax_filings
      pattern: >-
        (?is)\b(?:employer\s+payroll\s+tax\s+filings|payroll\s+tax\s+filing|employer\s+tax\s+return|quarterly\s+filing|annual\s+filing|tax\s+remittance|payroll\s+tax\s+report|employer\s+contribution|tax\s+authority|PAYG\s+withholding|Form\s+941)\b
    - id: Pattern_global_top500_083_employer_payroll_tax_filings_label_context
      pattern: (?i)\\b(?:employer\\s+payroll\\s+tax\\s+filings|employer|payroll|tax|filings|top500)\\b
  keywords:
    - id: Keyword_payroll_tax_filings
      groups:
        - match_style: word
          terms:
            - employer payroll tax filings
            - payroll tax filing
            - employer tax return
            - quarterly filing
            - annual filing
            - tax remittance
            - payroll tax report
            - employer contribution
            - tax authority
            - PAYG withholding
            - Form 941
    - id: Keyword_global_top500_083_employer_payroll_tax_filings_domain_context
      groups:
        - match_style: word
          terms:
            - employer payroll tax filings
            - employer
            - payroll
            - tax
            - filings
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
