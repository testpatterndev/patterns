schema: testpattern/v1
name: Payment Card Magnetic Stripe Track 1
slug: global-payment-card-track1
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects ISO/IEC 7813 magnetic-stripe Track 1 (format code B) data for payment
  cards: a start sentinel %B, the primary account number, the cardholder name,
  expiry date, service code and discretionary data. Storing full track data after
  authorization is prohibited by PCI DSS 4.0 Requirement 3.3.1.
operation: >-
  Track 1 format-B structure: start sentinel %B, 13-19 digit PAN, field separator ^,
  cardholder name (NAME/SURNAME), field separator ^, 4-digit expiry (YYMM), 3-digit
  service code and discretionary data, end sentinel ?. The literal ^ characters are
  magnetic-stripe field separators, not regex anchors. Corroborative evidence:
  keywords within 300 characters.
pattern: '%B\d{13,19}\^[A-Za-z][^\^]{1,25}\^\d{4}\d{3}[A-Za-z0-9]{0,40}\?'
confidence: high
confidence_justification: >-
  High confidence: the full Track 1 framing (%B start sentinel, two ^ field
  separators, fixed expiry+service-code structure and ? end sentinel) wrapped around
  a 13-19 digit PAN is a highly distinctive structure that does not occur in ordinary
  prose, making false positives extremely unlikely.
jurisdictions:
  - global
regulations:
  - PCI-DSS
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - track 1
    - track data
    - magnetic stripe
    - magstripe
    - card present
    - sensitive authentication data
    - SAD
    - PAN
  proximity: 300
test_cases:
  should_match:
    - value: '%B4111111111111111^DOE/JOHN^'
      description: Exact 65 discovery probe with an incomplete but distinctive Track 1 prefix
    - value: '%B4111111111111111^DOE/JOHN^25051010000000000000000?'
      description: Exact 75 probe with complete Track 1 framing
    - value: 'TRACK1=%B5500005555555559^SMITH/JANE Q^26129990000?'
      description: Exact 85 probe with complete framing and explicit Track 1 context
    - value: '%B340000000000009^CARDHOLDER/TEST^271010100?'
      description: Track 1 with 15-digit fake Amex PAN
  should_not_match:
    - value: '%A4111111111111111^DOE/JOHN^2505101?'
      description: Format code A, not B (not a financial Track 1)
    - value: '4111111111111111 expiry 2505 cvv 123'
      description: Bare PAN and fields without the Track 1 sentinel framing
    - value: Track 1 magnetic stripe data must never be stored after authorization
      description: Prose describing track data, no actual encoded track
    - value: 'Parser fragment %B4111111111111111^DOE/JOHN^ without expiry fields'
      description: Incomplete parser fragment must remain discovery-only
false_positives:
  - description: Test or sample magnetic-stripe strings embedded in QA fixtures or payment-terminal documentation.
    mitigation: Require corroborative keywords and treat known test PANs (e.g. 4111 1111 1111 1111) as samples; confirm with surrounding transaction context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The detector finds ISO/IEC 7813 Track 1 format-B data containing the %B sentinel, PAN, cardholder name, expiry, service code, discretionary data, and end sentinel. A live track can support counterfeit-card production, card-present fraud, and identity linkage because it combines several payment elements in one reusable record. QA fixtures and terminal documentation can contain syntactically complete samples, while the normal true positive concerns one card rather than a merchant database. Risk 8 SENSITIVE reflects serious direct cardholder and payment harm; PROTECTED would require bulk track data, major payment-system compromise, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_track1_complete
      matches:
        - ref: Keyword_track1_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_track1_complete
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_track1_fragment
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_track1_complete
      pattern: '%B\d{13,19}\^[A-Za-z][^\^]{1,25}\^\d{4}\d{3}[A-Za-z0-9]{0,40}\?'
    - id: Regex_track1_fragment
      pattern: '%B\d{13,19}\^[A-Za-z][^\^]{1,25}\^'
  keywords:
    - id: Keyword_track1_context
      groups:
        - match_style: word
          terms:
            - text: TRACK1
              case_sensitive: true
            - Track 1 data
            - magnetic stripe capture
            - magstripe dump
            - card reader export
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
changelog:
  - version: 1.1.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: use an incomplete Track 1 prefix only for 65 discovery, require complete ISO/IEC 7813 framing at 75, and require explicit track/capture context at 85, with exact-tier and parser-fragment probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1555 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
