schema: testpattern/v1
name: NSW Property Title Reference (Lot/DP)
slug: au-property-title-reference
version: 1.6.0
type: regex
pattern_class: identifier
engine: universal
description: Detects Australian property title references including Lot/DP, Lot/SP, Title References, and Folio Identifiers. Requires property/title/lot/DP keyword context.
operation: >-
  The Purview implementation uses explicit Lot/DP-style, title/folio, numeric-plan, and generic
  digits/slash/digits regexes. All candidate shapes are discovery-only at 65. Explicit title or
  lot-plan structures with land-registry context enforce at 75; a labelled Lot/DP-style value with
  both land-registry and state context reaches 85. Enforcing tiers reject explicit templates, while
  generic digits/slash/digits values never enforce by themselves.
pattern: (?i)\b(?:Lot|LOT)\s+\d+(?:/|\s+on\s+)(?:DP|SP|PS|LP|CP)\s*\d{3,7}\b
confidence: low
confidence_justification: >-
  Low confidence: the generic digits/digits format matches many non-property references such as date fractions, version numbers, and ratios. Corroborative evidence keywords such as property, title,
  lot, or DP are essential for reliable detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - location
  - pii
corroborative_evidence:
  keywords:
    - property
    - title reference
    - lot
    - deposited plan
    - DP
    - strata plan
    - SP
    - real property
  proximity: 500
  keyword_lists:
    - pii-personal
    - au-major-cities
    - au-states-full
    - au-states-abbreviations
test_cases:
  should_match:
    - value: 1/12345
      description: Low-tier probe - generic lot/plan candidate without registry context
    - value: 23/1234567
      description: Lot 23 in larger DP
    - value: 100/99999
      description: High lot number in DP
    - value: 'NSW Land Registry title: 12/DP123456'
      description: Bare lot-on-plan form with land-registry context (wired Pattern_property_lot_plan 75 tier)
    - value: Lot 7/SP98765 on strata title, NSW
      description: High-tier probe - labelled lot/plan with registry and state context
  should_not_match:
    - value: 1/1234
      description: Only 4 digits after slash (below minimum of 5)
    - value: 1/12345678
      description: 8 digits after slash (above maximum of 7)
    - value: 1-12345
      description: Hyphen separator instead of forward slash
    - value: Invoice 12/DP123456 was cancelled.
      description: Lot-plan-shaped token in invoice context without land-registry evidence must not fire the 75 tier
    - value: The subdivision plan is under review.
      description: Property topic without an identifier
    - value: 'Documentation example: NSW land title Lot 7/SP98765'
      description: Structurally complete but explicitly documented example
false_positives:
  - description: Common words and phrases related to nsw property title reference (lot/dp) appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 4
risk_description: >-
  The identifier detector matches Australian lot and plan references such as Lot/DP, Lot/SP, title references, folio identifiers, or a bare digits-slash-digits form with property context. A confirmed value points to a parcel in a public land-title system and can assist correlation with ownership or address data, but it does not itself name an owner, disclose a transaction, or grant registry access. Low-confidence generic numeric forms and templates create additional collision risk. Risk 4 OFFICIAL reflects the public, correlation-dependent identifier; SENSITIVE is not met without an attributed owner, protected location, confidential conveyance, or compiled property dossier.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 500
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_property_lot_dp
      matches:
        - ref: Evidence_land_registry
        - ref: Evidence_state_geography
      exclusion:
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_property_title_ref
      matches:
        - ref: Evidence_land_registry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_property_lot_plan
      matches:
        - ref: Evidence_land_registry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_property_lot_dp
          - Pattern_property_title_ref
          - Pattern_property_lot_plan
          - Pattern_property_generic
  regexes:
    - id: Pattern_property_lot_dp
      pattern: (?i)\b(?:Lot|LOT)\s+\d+(?:/|\s+on\s+)(?:DP|SP|PS|LP|CP)\s*\d{3,7}\b
    - id: Pattern_property_title_ref
      pattern: (?i)\b(?:Title\s+Ref(?:erence)?|CT|Folio\s+Identifier|Volume\s+\d+\s+Folio)\s*[:#-]?\s*\d+/?\d*\b
    - id: Pattern_property_lot_plan
      pattern: \b\d{1,5}/(?:DP|SP|PS|LP|CP)\d{3,7}\b
    - id: Pattern_property_generic
      pattern: \b\d+/\d{5,7}\b
  keywords:
    - id: Evidence_land_registry
      groups:
        - match_style: word
          terms:
            - title
            - land registry
            - torrens
            - real property
            - registrar
            - land titles office
            - text: LTO
              case_sensitive: true
            - text: LPI
              case_sensitive: true
            - titles office
      strength: domain
    - id: Evidence_state_geography
      groups:
        - match_style: word
          terms:
            - text: NSW
              case_sensitive: true
            - text: VIC
              case_sensitive: true
            - text: QLD
              case_sensitive: true
            - text: SA
              case_sensitive: true
            - text: WA
              case_sensitive: true
            - text: TAS
              case_sensitive: true
            - text: NT
              case_sensitive: true
            - text: ACT
              case_sensitive: true
            - New South Wales
            - Victoria
            - Queensland
      strength: domain
    - id: Evidence_property_context
      groups:
        - match_style: word
          terms:
            - property
            - land
            - parcel
            - survey
            - subdivision
            - easement
            - covenant
            - strata
            - community title
            - building
      strength: domain
  filters:
    - id: Guard_property_same_digits
      type: AllDigitsSameFilter
created: '2026-02-08'
updated: '2026-07-18'
changelog:
  - version: 1.6.0
    date: '2026-07-18'
    description: 'Profile quality: keep generic lot/plan candidates discovery-only, enforce explicit title/plan structures with registry context, retain state-corroborated high, and add exact-tier/template tests.'
  - version: 1.5.0
    date: '2026-07-17'
    description: 'TP-00093 approved reduced scope: wire the previously declared-but-unwired Pattern_property_lot_plan regex into a 75 tier gated by the existing Evidence_land_registry group, without changing the bounded DP/SP/PS/LP/CP syntax; existing AllDigitsSameFilter guard retained. Deferred per QA/independent review: the proposed 85 matching-state tier — Evidence_state_geography is one pooled list and cannot pair a plan prefix with its jurisdiction. Added bare-lot-plan and Lot-labelled positives plus invoice and topic-only negatives.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 571 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — generic lot/plan regex accepted all-zeros/same-digit title reference values (e.g. 0/00000); mirrors au-medicare-card-identifier protection.
  - version: 1.3.0
    date: '2026-07-04'
    description: Widen patterns_proximity 300->500 so keyword evidence still gates at the challenging-layout distance (ph<50 cohort)
  - version: 1.2.0
    date: '2026-07-04'
    description: case/evidence metadata update
