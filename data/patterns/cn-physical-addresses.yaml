schema: testpattern/v1
name: China Physical Addresses
slug: cn-physical-addresses
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects China Physical Addresses patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that uses machine learning and function-based detection for physical
  address identification. This keyword list provides address-related terms for supplementary matching.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  country-specific address terminology to identify physical address data.
keywords:
  - 路
  - 街
  - 道
  - 巷
  - 弄
  - 号
  - 楼
  - 室
  - 省
  - 市
  - 区
  - 县
  - 镇
  - 村
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on address terms requires additional context and
  corroborative evidence for accurate physical address detection. Address keywords alone
  produce high false positive rates without structural validation.
jurisdictions:
  - cn
regulations:
  - PIPL
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 路 name, unit 4"
      description: Contains address keyword '路'
    - value: "located at 45 街 example"
      description: Contains address keyword '街'
    - value: "deliver to 78 道 test"
      description: Contains address keyword '道'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_cn_addresses
      matches:
        - ref: Keyword_cn_addresses_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_cn_addresses
  keywords:
    - id: Keyword_cn_addresses
      groups:
        - match_style: string
          terms:
            - 路
            - 街
            - 道
            - 巷
            - 弄
            - 号
            - 楼
            - 室
            - 省
            - 市
            - 区
            - 县
            - 镇
            - 村
      strength: domain
    - id: Keyword_cn_addresses_context
      groups:
        - match_style: string
          terms:
            - 地址
            - 住址
            - 居住地
            - 邮编
            - 邮政编码
            - 中国
            - 中华人民共和国
            - address
            - postal code
            - zip code
            - residence
            - domicile
      strength: domain
risk_rating: 3
risk_description: >-
  The China pattern uses low-confidence 路, 街, and 道 address terms rather than parsing the province, city, district, number, and building components of a full address. A true residence can support targeted delivery or unwanted contact when connected to a named person, but isolated road terms frequently occur in maps, venues, and public directions. The match therefore neither proves deliverability nor identifies an occupant. Risk 3 OFFICIAL reflects low contextual harm; SENSITIVE would require a protected home, vulnerable resident, active threat, location history, or a substantial attributed address register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1154 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
author: testpattern-community
