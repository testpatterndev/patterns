schema: testpattern/v1
name: OT Security Assessment
slug: au-ot-security-assessment
version: 1.6.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive operational-technology, SCADA, ICS, and industrial-control security
  assessments. Topic phrases are retained for discovery; enforcement requires findings, affected
  assets, evidence, remediation, attack paths, firmware, segmentation, credential, or remote-access
  weaknesses, and high confidence additionally requires a concrete technical indicator and severe
  exploit consequence.
operation: >-
  Regex_ot_security_assessment recognises OT/SCADA/ICS/control-system assessment and penetration-test
  topics. The topic alone is discovery-only at 65. Substantive findings or remediation content raises
  it to 75; findings plus a CVE, address, or control-asset identifier and severe exploit consequence
  reach 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:OT\s+security\s+assessment|SCADA\s+security\s+assessment|ICS\s+security\s+assessment|industrial\s+control\s+security\s+assessment|control\s+system\s+vulnerability\s+assessment|(?:OT|SCADA|ICS)\s+penetration\s+test)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires assessment findings rather than a title or methodology reference. High
  confidence adds a concrete affected asset or vulnerability and severe exploitable consequence.
jurisdictions:
  - au
regulations:
- "Criminal Code Act 1995 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
data_categories:
  - security
  - infrastructure
test_cases:
  should_match:
    - value: OT security assessment
      description: Low-tier probe - assessment topic without findings
    - value: 'OT security assessment finding: unsupported firmware and a segmentation gap were observed; remediation action is scheduled'
      description: Medium-tier probe - substantive findings without a concrete asset or severe exploit consequence
    - value: 'OT security assessment finding for production PLC asset PLC-07 at 10.24.8.15: CVE-2025-12345 enables unauthenticated remote code execution; critical severity and remediation required'
      description: High-tier probe - finding with live asset, vulnerability, address, and severe exploit consequence
  should_not_match:
    - value: Office security assessment for fire exits
      description: Non-match 1
    - value: IT security awareness training
      description: Generic IT awareness content outside OT assessment
    - value: 'The public guide explains how to scope an OT security assessment.'
      description: Public methodology guidance without findings
    - value: 'Training example: OT security assessment finding for PLC-07, CVE-2025-12345, critical remote code execution'
      description: Explicit training content must not enforce
false_positives:
  - description: Public methodologies, standards, and consulting material discuss OT assessments, vulnerabilities, CVEs, and remediation without containing an assessed organisation's findings.
    mitigation: Keep assessment topics discovery-only and require finding, affected-asset, evidence, remediation, attack-path, firmware, segmentation, credential, or remote-access content.
  - description: Training labs can include realistic asset IDs, addresses, CVEs, exploit paths, severities, and remediation actions.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - yaml
scope: narrow
risk_rating: 10
risk_description: >-
  This TestPattern identifies an OT security assessment by combining assessment, vulnerability, or CVE evidence with SCADA, ICS, or industrial-control context. A genuine report can expose exploitable weaknesses in systems that control physical processes and essential services. The affected scale can include the operator, service users, equipment, and public safety because the matched unit is an assessment of operational technology. Risk 10 and PROTECTED InfoTech are justified, with no higher QGISCF tier available.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ot_security_assessment
      matches:
        - ref: Evidence_ot_assessment_finding
        - ref: Evidence_ot_assessment_indicator
        - ref: Evidence_ot_severe_exploit
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ot_security_assessment
      matches:
        - ref: Evidence_ot_assessment_finding
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ot_security_assessment
  regexes:
    - id: Regex_ot_security_assessment
      pattern: >-
        (?is)\b(?:OT\s+security\s+assessment|SCADA\s+security\s+assessment|ICS\s+security\s+assessment|industrial\s+control\s+security\s+assessment|control\s+system\s+vulnerability\s+assessment|(?:OT|SCADA|ICS)\s+penetration\s+test)\b
    - id: Evidence_ot_assessment_indicator
      pattern: >-
        (?i)\b(?:CVE-\d{4}-\d{4,7}|(?:PLC|RTU|HMI|DCS)\s*(?:asset|node|ID)?\s*[:#-]\s*[A-Z0-9][A-Z0-9._-]{2,}|(?:\d{1,3}\.){3}\d{1,3})\b
  keywords:
    - id: Evidence_ot_assessment_finding
      groups:
        - match_style: word
          terms:
            - assessment finding
            - affected asset
            - evidence
            - remediation action
            - attack path
            - exploit path
            - segmentation gap
            - unsupported firmware
            - default credential
            - remote access
      strength: domain
    - id: Evidence_ot_severe_exploit
      groups:
        - match_style: word
          terms:
            - unauthenticated remote code execution
            - remote code execution
            - safety system bypass
            - critical severity
            - exploitable
            - production
            - physical process impact
            - service disruption
      strength: specific
created: '2026-02-09'
updated: '2026-07-04'
changelog:
  - version: 1.6.0
    date: '2026-07-04'
    description: 'CI profile hardening: convert the broad keyword-list detector to a regex-backed concept; require substantive assessment findings at 75 and concrete technical indicators plus severe exploit consequence at 85.'
  - version: 1.5.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 565 without changing detector or package metadata.'
  - version: 1.5.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.3.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
