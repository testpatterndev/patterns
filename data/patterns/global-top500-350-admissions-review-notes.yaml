schema: testpattern/v1
name: Admissions review notes
slug: global-top500-350-admissions-review-notes
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to admissions review notes in international contexts. This information
  type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:admissions\s+review|admission\s+decision|applicant\s+evaluation|enrollment\s+decision|acceptance\s+letter|rejection\s+letter|admissions\s+committee|selection\s+criteria|applicant\s+profile|interview\s+notes|offer\s+of\s+admission)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
- AML/CTF Act (Cth)
- HRIPA (Cth)
- IPA 2009 (Qld)
- My Health Records Act 2012 (Cth)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
- TIA Act 1979 (Cth)
data_categories:
- pii
corroborative_evidence:
  keywords:
  - admissions review notes
  - admissions
  - review
  - notes
  - education
  - research
  - administration
  proximity: 300
test_cases:
  should_match:
  - value: admissions review
    description: Primary topic phrase match
  - value: admission decision
    description: Case-insensitive topic phrase match
  - value: applicant evaluation
    description: Alternative topic phrase match
  - value: enrollment decision
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: student grant
    description: Generic word pair from old broad template should not match
false_positives:
- description: Common words and phrases related to admissions review notes appearing in policy documents, training materials,
    HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
risk_description: The detector finds admissions-review, admission-decision, applicant-evaluation, or enrolment-decision material
  within education context, representing evaluative case notes rather than a public admissions rule. Disclosure can expose
  subjective judgments, ranking factors, vulnerabilities, or disputed reasons and may bias reviewers, distress an applicant,
  or enable manipulation of an active selection process. The ordinary case affects one applicant or a limited cohort and causes
  serious privacy and opportunity harm without granting institutional access. Risk 8 and SENSITIVE are justified; PROTECTED
  would require a bulk applicant dossier, privileged decision-system compromise, or significant institution-wide damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_admissions_review
    matches:
    - ref: Pattern_global_top500_350_admissions_review_notes_label_context
    - ref: Keyword_global_top500_350_admissions_review_notes_domain_context
    - ref: Keyword_admissions_review
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_admissions_review
    matches:
    - ref: Pattern_global_top500_350_admissions_review_notes_label_context
    - ref: Keyword_global_top500_350_admissions_review_notes_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_admissions_review
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_admissions_review
    pattern: (?is)\b(?:admissions\s+review|admission\s+decision|applicant\s+evaluation|enrollment\s+decision|acceptance\s+letter|rejection\s+letter|admissions\s+committee|selection\s+criteria|applicant\s+profile|interview\s+notes|offer\s+of\s+admission)\b
  - id: Pattern_global_top500_350_admissions_review_notes_label_context
    pattern: (?i)\b(?:admissions\s+review\s+notes)\b
  keywords:
  - id: Keyword_admissions_review
    groups:
    - match_style: word
      terms:
      - admissions review
      - admission decision
      - applicant evaluation
      - enrollment decision
      - acceptance letter
      - rejection letter
      - admissions committee
      - selection criteria
      - applicant profile
      - interview notes
      - offer of admission
      - waitlist
    strength: specific
  - id: Keyword_global_top500_350_admissions_review_notes_domain_context
    groups:
    - match_style: word
      terms:
      - admissions review notes
      - admissions
      - review
      - notes
    strength: domain
