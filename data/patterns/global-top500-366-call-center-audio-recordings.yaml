schema: testpattern/v1
name: Call center audio recordings
slug: global-top500-366-call-center-audio-recordings
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to call center audio recordings in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:call\s+center\s+recording|audio\s+recording|call\s+transcript|voice\s+recording|call\s+monitoring|call\s+quality|recorded\s+call|customer\s+call|call\s+log|telephony\s+data|call\s+disposition|IVR\s+recording)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - call center audio recordings
    - call
    - center
    - audio
    - recordings
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: call center recording
      description: Primary topic phrase match
    - value: audio recording
      description: Case-insensitive topic phrase match
    - value: call transcript
      description: Alternative topic phrase match
    - value: voice recording
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to call center audio recordings appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_call_center_recordings
      matches:
        - ref: Pattern_global_top500_366_call_center_audio_recordings_label_context
        - ref: Keyword_global_top500_366_call_center_audio_recordings_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_366_call_center_audio_recordings_noise_exclusion
    - confidence_level: 75
      id_match: Regex_call_center_recordings
      matches:
        - ref: Keyword_call_center_recordings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_366_call_center_audio_recordings_noise_exclusion
    - confidence_level: 65
      id_match: Regex_call_center_recordings
      matches:
        - ref: Keyword_call_center_recordings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_366_call_center_audio_recordings_noise_exclusion
  regexes:
    - id: Regex_call_center_recordings
      pattern: (?is)\b(?:call\s+center\s+recording|audio\s+recording|call\s+transcript|voice\s+recording|call\s+monitoring|call\s+quality|recorded\s+call|customer\s+call|call\s+log|telephony\s+data|call\s+disposition|IVR\s+recording)\b
    - id: Pattern_global_top500_366_call_center_audio_recordings_label_context
      pattern: (?i)\\b(?:call\\s+center\\s+audio\\s+recordings|call|center|audio|recordings|top500)\\b
  keywords:
    - id: Keyword_call_center_recordings
      groups:
        - match_style: word
          terms:
            - call center recording
            - audio recording
            - call transcript
            - voice recording
            - call monitoring
            - call quality
            - recorded call
            - customer call
            - call log
            - telephony data
            - call disposition
            - IVR recording
    - id: Keyword_global_top500_366_call_center_audio_recordings_domain_context
      groups:
        - match_style: word
          terms:
            - call center audio recordings
            - call
            - center
            - audio
            - recordings
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_366_call_center_audio_recordings_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
