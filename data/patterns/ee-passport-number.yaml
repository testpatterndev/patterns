schema: testpattern/v1
name: Estonia Passport Number
slug: ee-passport-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Estonia passport number patterns. This pattern is based on a Microsoft Purview built-in sensitive information
  type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting
  point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-estonia-passport-number Corroborative evidence: 3
  keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b[A-Z]{2}\d{7}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - ee
  - eu
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - travel document
    - passport number
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: VR1234567
      description: Two-letter prefix with 7 digits
    - value: KD9876543
      description: Two-letter prefix with 7 digits
    - value: AB3456789
      description: Two-letter prefix with 7 digits
  should_not_match:
    - value: '1234567'
      description: Missing letter prefix
    - value: A12345678
      description: Single-letter prefix is invalid for this format
false_positives:
  - description: >-
      Generic alphanumeric sequences matching passport format in unrelated contexts.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ee_passport
      matches:
        - ref: Keyword_ee_passport_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ee_passport
      matches:
        - ref: Keyword_ee_passport_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ee_passport
  regexes:
    - id: Regex_ee_passport
      pattern: \b[A-Z]{2}\d{7}\b
  keywords:
    - id: Keyword_ee_passport_specific
      groups:
        - match_style: word
          terms:
            - pass
            - passi number
            - passi nr
            - reisidokument
            - Eesti pass
            - Politsei- ja Piirivalveamet
            - välispass
            - isikut tõendav dokument
            - Estonian passport
            - passport number
      strength: specific
    - id: Keyword_ee_passport_general
      groups:
        - match_style: word
          terms:
            - passport
            - travel document
            - passport no
            - passport #
            - document number
            - identity document
            - travel ID
      strength: specific
risk_rating: 5
risk_description: >-
  The Estonia passport detector recognizes two letters followed by seven digits when passport or civic-credential language is nearby. A genuine number can aid travel-record correlation, false proof-of-identity claims, or targeted messages about Estonian document replacement and consular support. The code alone lacks the holder's name, citizenship evidence, expiry, photograph, signature, and machine-readable data, while similar alphanumeric serials occur in other domains. Risk 5 and OFFICIAL fit the limited atomic harm; a passport scan, visa record, or named passenger file would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-estonia-passport-number
    title: "Estonia passport number entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
