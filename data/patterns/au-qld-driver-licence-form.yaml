schema: testpattern/v1
name: QLD Driver Licence Form
slug: au-qld-driver-licence-form
version: 1.4.0
type: keyword_list
pattern_class: concept
description: Detects QLD Transport and Main Roads driver licence application and renewal forms.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government
test_cases:
  should_match:
    - value: 'Driver licence application information session.'
      description: Exact 65 discovery probe - application phrase without populated applicant fields
    - value: 'Driver licence application - applicant name, residential address, and signature recorded.'
      description: Exact 75 probe - populated application fields without a TMR authority marker
    - value: 'TMR driver licence application - applicant name, Customer Reference Number, licence class, and signature recorded.'
      description: Exact 85 probe - populated application fields plus TMR authority evidence
    - value: 'TMR driver licence application: learner licence identity verification'
      description: Test match 1
    - value: Queensland driver licence renewal form with photo ID and licence class
      description: Test match 2
    - value: Transport and Main Roads provisional licence application
      description: Test match 3
  should_not_match:
    - value: Software licence agreement
      description: Non-match 1
    - value: Licence to thrill movie
      description: Non-match 2
    - value: 'Sample template for road-authority applicant fields: name, customer reference, class, signature.'
      description: Adjacent template language is not a populated driver-licence form
    - value: 'The public website explains how residents apply for permission to drive.'
      description: Public guidance has no form primary or populated applicant fields
    - value: 'Queensland software end-user agreement for a government workstation.'
      description: Sibling software-licensing language does not satisfy the driver-licence primary
false_positives:
  - description: Software or entertainment licence references.
    mitigation: Require TMR or Queensland driver keywords.
exports:
  - yaml
scope: narrow
risk_rating: 5
risk_description: >-
  The TestPattern concept detects Queensland driver-licence application and renewal material through clustered TMR, learner, provisional, photo-ID, identity-verification, and licence-class terms. An uncompleted template mainly exposes a public administrative process, whereas a filled form can assist identity fraud by revealing applicant answers and supporting-document choices. The classifier does not prove that personal fields are populated or that attachments are present, so the affected person and harm remain conditional on document state. Risk 5 and OFFICIAL fit that bounded form signal; completed applications with identity evidence, addresses, or photographs would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_tmr_licence
      matches:
        - ref: Evidence_tmr_forms
        - ref: Evidence_driver_application_fields
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_tmr_licence
      matches:
        - ref: Evidence_driver_application_fields
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_tmr_licence
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
  regexes:
    - id: Pattern_tmr_licence
      pattern: (?i)\b(?:driver\s+licen[cs]e\s+(?:application|renewal|replacement)|learner\s+(?:licen[cs]e|permit)|f3000)\b
    - id: Pattern_tmr_form
      pattern: (?i)\b(?:transport\s+and\s+main\s+roads|tmr|department\s+of\s+transport)\b
  keywords:
    - id: Evidence_driver_licence
      groups:
        - match_style: word
          terms:
            - driver licence
            - driver license
            - learner licence
            - provisional licence
            - text: P1
              case_sensitive: true
            - text: P2
              case_sensitive: true
            - open licence
            - licence class
            - demerit points
            - licence suspension
            - medical fitness
      strength: specific
    - id: Evidence_tmr_forms
      groups:
        - match_style: word
          terms:
            - Transport and Main Roads
            - text: TMR
              case_sensitive: true
            - Department of Transport
            - F3000
            - F3520
            - F3525
            - Customer Reference Number
            - text: CRN
              case_sensitive: true
      strength: domain
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
    - id: Evidence_driver_application_fields
      groups:
        - match_style: word
          terms:
            - applicant name
            - date of birth
            - residential address
            - Customer Reference Number
            - application number
            - licence class
            - photo identification
            - signature
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: add a 65 discovery application tier, make 75 require populated applicant fields and 85 additionally require TMR authority evidence, with exact-tier and sibling/public/template probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 576 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - driver licence
  - TMR
  - Transport and Main Roads
  - licence application
  - licence renewal
  - learner licence
  - provisional licence
  - open licence
