schema: testpattern/v1
name: Payroll deduction records
slug: au-top500-086-payroll-deduction-records
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to payroll deduction records in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: industry-hr.'
pattern: (?is)\b(?:payroll\s+deduction\s+records|salary\s+sacrifice|superannuation\s+contribution|union\s+fees|health\s+insurance|pre[\s-]+tax\s+deduction|post[\s-]+tax\s+deduction|HECS\s+repayment|child\s+support\s+deduction|payroll\s+withholding|net\s+pay)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payroll deduction records
    - payroll
    - deduction
    - records
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: payroll deduction records
      description: Primary topic phrase match
    - value: salary sacrifice
      description: Case-insensitive topic phrase match
    - value: superannuation contribution
      description: Alternative topic phrase match
    - value: union fees
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_payroll_deduction_records
      matches:
        - ref: Evidence_payroll_deduction_records
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_payroll_deduction_records
      matches:
        - ref: Evidence_payroll_deduction_records
    - confidence_level: 65
      id_match: Pattern_payroll_deduction_records
      matches:
        - ref: Evidence_payroll_deduction_records
  regexes:
    - id: Pattern_payroll_deduction_records
      pattern: (?is)\b(?:payroll\s+deduction\s+records|salary\s+sacrifice|superannuation\s+contribution|union\s+fees|health\s+insurance|pre[\s-]+tax\s+deduction|post[\s-]+tax\s+deduction|HECS\s+repayment|child\s+support\s+deduction|payroll\s+withholding|net\s+pay)\b
  keywords:
    - id: Evidence_payroll_deduction_records
      groups:
        - match_style: word
          terms:
            - payroll deduction records
            - deduction
            - salary sacrifice
            - superannuation contribution
            - union fees
            - health insurance
            - pre-tax deduction
            - post-tax deduction
            - HECS repayment
            - child support deduction
            - payroll withholding
            - net pay
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
