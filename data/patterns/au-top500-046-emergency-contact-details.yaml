schema: testpattern/v1
name: Emergency contact details
slug: au-top500-046-emergency-contact-details
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to emergency contact details in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:emergency\s+contact\s+details|emergency\s+contact|next\s+of\s+kin|ICE\s+contact|in\s+case\s+of\s+emergency|emergency\s+phone|emergency\s+name|emergency\s+relationship|contact\s+person|backup\s+contact|urgent\s+contact|nominated\s+contact)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - emergency contact details
    - emergency
    - contact
    - details
    - location
    - data
  proximity: 300
  keyword_lists:

    - data-record-context
test_cases:
  should_match:
    - value: emergency contact details
      description: Primary topic phrase match
    - value: emergency contact
      description: Case-insensitive topic phrase match
    - value: next of kin
      description: Alternative topic phrase match
    - value: ICE contact
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to emergency contact details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_emergency_contact
      matches:
        - ref: Evidence_emergency_contact
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_046_emergency_contact_details_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_emergency_contact
      matches:
        - ref: Evidence_emergency_contact
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_046_emergency_contact_details_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_emergency_contact
      matches:
        - ref: Evidence_emergency_contact
  regexes:
    - id: Pattern_emergency_contact
      pattern: (?is)\b(?:emergency\s+contact\s+details|emergency\s+contact|next\s+of\s+kin|ICE\s+contact|in\s+case\s+of\s+emergency|emergency\s+phone|emergency\s+name|emergency\s+relationship|contact\s+person|backup\s+contact|urgent\s+contact|nominated\s+contact)\b
    - id: Pattern_au_top500_046_emergency_contact_details_label_context
      pattern: (?i)\\b(?:emergency\\s+contact\\s+details|emergency|contact|top500)\\b
  keywords:
    - id: Evidence_emergency_contact
      groups:
        - match_style: word
          terms:
            - emergency contact details
            - emergency contact
            - next of kin
            - ICE contact
            - in case of emergency
            - emergency phone
            - emergency name
            - emergency relationship
            - contact person
            - backup contact
            - urgent contact
            - nominated contact
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_046_emergency_contact_details_domain_context
      groups:
        - match_style: word
          terms:
            - emergency contact details
            - emergency
            - contact
            - top500
            - field
            - identifier
            - reference
    - id: Evidence_data_record_context
      groups:
        - match_style: word
          terms:
            - field
            - column
            - row
            - entry
            - record
            - value
            - form
            - register
            - database
            - extract
            - export
            - spreadsheet
            - table
            - schedule
            - appendix
            - attachment
            - registry
    - id: Keyword_au_top500_046_emergency_contact_details_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
