schema: testpattern/v1
name: Mongodb
slug: global-mongodb-connection-string
version: 1.3.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Mongodb patterns.
operation: 'Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: mongodb(\+srv)?://[^:]+:[^@]+@[^/]+
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: mongodb://user:pass@localhost
      description: Exact 65 probe - complete credential URI without independent config labeling
    - value: 'MONGODB_URI=mongodb://app:S3cretValue@db.internal'
      description: Exact 75 probe - credential URI in a MongoDB-specific config field
    - value: 'MongoDB Atlas production MONGODB_URI=mongodb+srv://admin:S3cretValue@cluster.mongodb.net/prod?retryWrites=true'
      description: Exact 85 probe - provider config label plus Atlas/topology evidence
  should_not_match:
    - value: mongodb://localhost/mydb
      description: Missing credentials (no user:pass@ section)
    - value: mongo://user:pass@localhost
      description: Wrong scheme (mongo instead of mongodb)
    - value: mongodb://user@localhost
      description: Missing password in credentials
    - value: 'POSTGRES_URL=mongodb://user:pass@localhost'
      description: Sibling database config label does not corroborate a MongoDB URI
    - value: 'mongodb://:pass@localhost'
      description: Malformed MongoDB URI is missing the username
    - value: 'Documentation example: MongoDB Atlas MONGODB_URI=mongodb+srv://admin:changeme@cluster.mongodb.net/example?retryWrites=true'
      description: Documentation placeholder with Atlas topology is excluded
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_description: >-
  The detector matches a MongoDB or MongoDB SRV URI containing username, password, and host, so a true hit is a complete database connection credential. A recipient may connect to the named deployment and read, alter, or delete databases and collections allowed to that account. The expected impact is confined to one MongoDB identity and reachable cluster, though that cluster may hold many records; samples, localhost instances, and revoked credentials can be benign. Risk 8 SENSITIVE captures serious but contained database harm, while PROTECTED requires confirmed administrator access or significant protected holdings.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_mongodb_connection
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_mongodb_connection
      matches:
        - ref: Pattern_mongodb_config_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_mongodb_connection
      matches:
        - ref: Pattern_mongodb_config_label
        - ref: Pattern_mongodb_topology
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_mongodb_connection
      pattern: mongodb(\+srv)?://[^:]+:[^@]+@[^/]+
    - id: Pattern_mongodb_config_label
      pattern: (?i)\b(?:MONGODB_URI|MONGODB_URL|MONGO_URL)\s*[=:]
    - id: Pattern_mongodb_topology
      pattern: (?i)(?:mongodb\.net|[?&](?:replicaSet|authSource|tls|retryWrites)=)
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 1.3.2
    date: '2026-07-19'
    description: 'Replace duplicated high tiers with an individual 65 URI discovery / 75 MongoDB-config / 85 Atlas-or-topology contract and exact-tier, sibling-provider, malformed, and documentation probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1254 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
