schema: testpattern/v1
name: Treatment plan details
slug: au-top500-323-treatment-plan-details
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies treatment plan details references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:treatment\s+plan|care\s+plan|clinical\s+plan|patient\s+treatment|therapy\s+plan|medical\s+record|clinical\s+notes|discharge\s+plan|treatment\s+protocol|patient\s+care)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - treatment plan details
    - treatment
    - plan
    - details
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
test_cases:
  should_match:
    - value: treatment plan
      description: Primary topic phrase match
    - value: care plan
      description: Case-insensitive topic phrase match
    - value: clinical plan
      description: Alternative topic phrase match
    - value: patient treatment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_treatment_plan_details
      matches:
        - ref: Evidence_treatment_plan_details
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_treatment_plan_details
      matches:
        - ref: Evidence_treatment_plan_details
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_treatment_plan_details
      matches:
        - ref: Evidence_treatment_plan_details
  regexes:
    - id: Pattern_treatment_plan_details
      pattern: (?is)\b(?:treatment\s+plan|care\s+plan|clinical\s+plan|patient\s+treatment|therapy\s+plan|medical\s+record|clinical\s+notes|discharge\s+plan|treatment\s+protocol|patient\s+care)\b
  keywords:
    - id: Evidence_treatment_plan_details
      groups:
        - match_style: word
          terms:
            - treatment plan
            - care plan
            - clinical plan
            - patient treatment
            - therapy plan
            - health
            - biomedical
            - medical record
            - clinical notes
            - discharge plan
            - treatment protocol
            - patient care
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
