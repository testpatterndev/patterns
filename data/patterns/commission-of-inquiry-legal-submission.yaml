schema: testpattern/v1
name: Commission of Inquiry Legal Submission
slug: commission-of-inquiry-legal-submission
version: 1.4.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects draft legal submissions to Commissions of Inquiry established under the Commissions of Inquiry Act 1950 (Qld). Disclosure prejudices the State's participation and may breach statutory confidentiality.
operation: 'Primary detection: keyword proximity matching ''Commission of Inquiry'' or ''COI'' within 200 characters of draft/submission terms (''draft submission'', ''proposed submission'', ''legal submission'', ''submission for approval'', ''terms of reference response''). Document marker detection: ''Commission of Inquiry'' + ''DRAFT'' + (''PROTECTED'' or ''CONFIDENTIAL''). Exclusion: negative match on ''final report'', ''published'', ''tabled''. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:Commission\s+of\s+Inquiry|COI)\b
confidence: low
confidence_justification: 'Medium confidence: Commission of Inquiry + DRAFT/submission + PROTECTED markers is precise. Exclusion of published reports and tabled submissions eliminates public document false positives.'
jurisdictions:
  - au
regulations:
  - QGISCF
  - "Commissions of Inquiry Act 1950 (Qld)"
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - draft submission
    - proposed submission
    - legal submission
    - submission for approval
    - terms of reference
    - DRAFT
    - PROTECTED
    - CONFIDENTIAL
    - not for publication
    - internal review
    - privilege
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        DRAFT — PROTECTED
        Legal Submission to the Commission of Inquiry into Queensland Government Accountability

        Prepared by: Crown Law, Queensland
        Status: Draft for Director-General approval

        This proposed submission addresses Terms of Reference 3 and 7 regarding departmental governance frameworks.
      description: Draft COI legal submission with PROTECTED marking
    - value: The draft submission to the COI has been circulated for internal review only. The proposed submission for approval contains candid admissions regarding procurement failures that have not been approved for public disclosure.
      description: Internal COI draft submission with candid admissions
    - value: |-
        CONFIDENTIAL — NOT FOR PUBLICATION
        Commission of Inquiry — Queensland Floods Response
        Draft State Submission — Version 4.1

        Terms of Reference Response:
        The State of Queensland acknowledges systemic issues in emergency management coordination.
      description: Draft COI submission on floods response
    - value: 'CONFIDENTIAL Commission of Inquiry legal submission, draft v4; TOR 7 response; DG approval pending; not for publication.'
      description: Inquiry, draft legal artefact, approval status, and publication restriction enforce
  should_not_match:
    - value: The Coaldrake Commission of Inquiry published its final report in June 2022. The report recommended significant reforms to Queensland Government integrity frameworks.
      description: Published COI final report
    - value: The State's submission to the Commission of Inquiry was tabled on 20 November 2024. The public submission is available on the Commission's website.
      description: Tabled public COI submission
    - value: The Commissions of Inquiry Act 1950 (Qld) establishes the legal framework for conducting public inquiries. This guide explains the powers and procedures of Commissions of Inquiry.
      description: Legal guide about COI legislation
    - value: The Commission of Inquiry published its final report.
      description: Final published material is excluded
    - value: Training sample COI draft submission for approval.
      description: Training/sample context is suppressed by the noise exclusion
    - value: Commission of Inquiry legal submission.
      description: The bare label without restriction or internal status discovers but must not enforce
    - value: The parliamentary library catalogued past public inquiry reports.
      description: Library cataloguing with no Commission of Inquiry draft submission or restriction
false_positives:
  - description: Published COI final reports
    mitigation: Negative match on 'final report', 'published', 'findings', 'recommendations released'
  - description: Tabled public submissions
    mitigation: Negative match on 'tabled', 'public submission', 'publicly available', 'Commission website'
  - description: Academic or legal guides about COI legislation
    mitigation: Require co-occurrence with draft/submission terms and PROTECTED/CONFIDENTIAL markers
  - description: News reporting on COI proceedings
    mitigation: Negative match on 'media report', 'hearing', 'public evidence'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_coi_legal_submission
      matches:
        - ref: Evidence_coi_restriction
        - ref: Evidence_coi_draft_status
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_coi_public_material
    - confidence_level: 75
      id_match: Pattern_coi_legal_submission
      matches:
        - ref: Evidence_coi_draft_status
        - ref: Evidence_coi_restriction
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_coi_public_material
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_commission_of_inquiry_legal_submission_inquiry_phrase
          - Pattern_commission_of_inquiry_legal_submission_coi_abbreviation
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_coi_public_material
  regexes:
    - id: Pattern_commission_of_inquiry_legal_submission_inquiry_phrase
      pattern: (?i)\bCommission\s+of\s+Inquiry\b
    - id: Pattern_commission_of_inquiry_legal_submission_coi_abbreviation
      pattern: (?i)\bCOI\b
    - id: Pattern_coi_legal_submission
      pattern: (?i)\b(?:(?:Commission\s+of\s+Inquiry|COI)\b[\s\S]{0,300}?\b(?:(?:draft|proposed|legal)\s+submission|terms\s+of\s+reference\s+response)|(?:(?:draft|proposed|legal)\s+submission|terms\s+of\s+reference\s+response)\b[\s\S]{0,300}?\b(?:Commission\s+of\s+Inquiry|COI))\b
  keywords:
    - id: Evidence_coi_draft_status
      groups:
        - match_style: word
          terms:
            - draft submission
            - proposed submission
            - legal submission
            - submission for approval
            - terms of reference response
            - internal review
      strength: domain
    - id: Evidence_coi_restriction
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - CONFIDENTIAL
            - privilege
            - not for publication
            - internal approval
      strength: domain
    - id: Filter_coi_public_material
      groups:
        - match_style: word
          terms:
            - final report
            - published
            - tabled
            - public submission
            - Commission website
            - public hearing
      strength: noise
risk_rating: 8
risk_description: >-
  The detector identifies a draft legal submission to a Queensland Commission of Inquiry, combining inquiry context with draft, approval, confidential, or not-for-publication markers and substantive proposed positions. Premature disclosure can expose candid admissions, legal arguments, unresolved evidence, and the State's response strategy, allowing other participants to anticipate or exploit the submission before approval. Final reports, tabled submissions, public legal guides, and news reporting are excluded, so the normal match is one non-public draft rather than the complete inquiry record. Risk 8 supports SENSITIVE Legal; PROTECTED would require protected witnesses, Cabinet-level strategy, or compromise producing significant whole-of-inquiry or State damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-02-20'
updated: '2026-07-16'
changelog:
  - version: 1.4.0
    date: '2026-07-16'
    description: 'sit-alignment-validation-2026-07-16 wave1 (TP-00701): normalize the legacy purview block (raw id-less regexes, group:/values: keywords, exclude_keyword filters, single inert 65 discovery tier) into referenced Purview regex/keyword ids and add enforcing tiers — the SIT was risk 8 SENSITIVE but could never enforce. New Pattern_coi_legal_submission bounded-proximity primary (Commission of Inquiry/COI within 300 chars of draft/proposed/legal submission or terms-of-reference-response wording, both directions); Evidence_coi_draft_status and Evidence_coi_restriction keyword groups and Filter_coi_public_material per the approved reference definitions. 75 requires the bounded primary plus draft-status and one restriction marker; 85 additionally requires two distinct draft/approval/TOR signals; 65 discovery keys on the plain inquiry mention. Template-exclusion noise dictionary attached and NOT-gated on all tiers. Adversarial test cases added; recommended_confidence raised to 85.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1522 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-12'
    description: 'Baseline burn-down B: the sole pattern_tier had id_match: '''' (empty string) — idMatchIds() treats an empty id_match string as [], so scripts/verify-pattern-testcases.mjs tierEvaluable() filtered the tier out entirely (0 evaluable tiers), which routed should_not_match evaluation through the hard-fail no-tiers-to-gate-it path instead of the discovery_only warn path the tier was designed for. Wired id_match to the existing purview.keywords group id primary (already registered under the group: primary key), making the tier evaluable again; the tier remains discovery_only so a top-level hit on published/tabled COI prose now surfaces only as a discovery-inventory warning, not a should_not_match failure. Verified: 0 FAILs, both should_not_match negatives (published final report, tabled public submission) clear; all 3 should_match positives still pass via top-level pattern.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) — no tier referenced it and the legacy tier shape carries no evidence lists to wire it into (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
