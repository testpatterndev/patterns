schema: testpattern/v1
name: Vehicle registration details
slug: global-top500-050-vehicle-registration-details
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to vehicle registration details in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Three-tier purview detection: high confidence (85) matches vehicle/contact structural pattern with registration evidence and template exclusion; medium
  confidence (75) matches with registration evidence; low confidence (65) matches structural pattern alone. Corroborative evidence: 7 keywords within 300 characters. Keyword lists:
  pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:vehicle\s+registration\s+details|vehicle\s+registration|registration\s+number|number\s+plate|licence\s+plate|license\s+plate|vehicle\s+identification\s+number|registered\s+owner|motor\s+vehicle|transport\s+authority)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - vehicle registration details
    - vehicle
    - registration
    - details
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: vehicle registration details
      description: Primary topic phrase match
    - value: vehicle registration
      description: Case-insensitive topic phrase match
    - value: registration number
      description: Alternative topic phrase match
    - value: number plate
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to vehicle registration details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_vehicle_rego
      matches:
        - ref: Evidence_vehicle_rego
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_vehicle_rego
      matches:
        - ref: Evidence_vehicle_rego
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_vehicle_rego
      matches:
        - ref: Evidence_vehicle_rego
  regexes:
    - id: Pattern_vehicle_rego
      pattern: >-
        (?is)\b(?:vehicle\s+registration\s+details|vehicle\s+registration|registration\s+number|number\s+plate|licence\s+plate|license\s+plate|vehicle\s+identification\s+number|registered\s+owner|motor\s+vehicle|transport\s+authority)\b
    - id: Pattern_au_top500_050_vehicle_registration_details_label_context
      pattern: (?i)\b(?:vehicle\s+registration\s+details)\b
  keywords:
    - id: Evidence_vehicle_rego
      groups:
        - match_style: word
          terms:
            - vehicle registration details
            - vehicle registration
            - registration number
            - number plate
            - licence plate
            - text: VIN
              case_sensitive: true
            - vehicle identification number
            - rego
            - registered owner
            - motor vehicle
            - text: RMS
              case_sensitive: true
            - transport authority
      strength: specific
    - id: Keyword_au_top500_050_vehicle_registration_details_domain_context
      groups:
        - match_style: word
          terms:
            - vehicle registration details
            - vehicle
            - registration
      strength: domain
risk_description: >-
  The Vehicle registration details pattern recognises phrases such as vehicle registration, registration number, number plate, registered owner, or vehicle identification number. Its main regex does not require an actual plate, VIN, owner, or vehicle description, so forms and transport guidance can match without a record. Populated registration data could link a vehicle to a person or location and support tracking or fraud, but that linkage needs additional values. Risk 4 and OFFICIAL fit the broad registration cue, while a person-linked vehicle record or movement context would reach the SENSITIVE threshold.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
