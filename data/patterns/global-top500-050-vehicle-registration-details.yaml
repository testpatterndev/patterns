schema: testpattern/v1
name: Vehicle registration details
slug: global-top500-050-vehicle-registration-details
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to vehicle registration details in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:vehicle\s+registration\s+details|vehicle\s+registration|registration\s+number|license\s+plate|number\s+plate|vehicle\s+identification|registration\s+certificate|motor\s+vehicle|registered\s+owner|vehicle\s+record|plate\s+number)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - vehicle registration details
    - vehicle
    - registration
    - details
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: vehicle registration details
      description: Primary topic phrase match
    - value: vehicle registration
      description: Case-insensitive topic phrase match
    - value: registration number
      description: Alternative topic phrase match
    - value: license plate
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to vehicle registration details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_vehicle_registration_details
      matches:
        - ref: Pattern_global_top500_050_vehicle_registration_details_label_context
        - ref: Keyword_global_top500_050_vehicle_registration_details_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_vehicle_registration_details
      matches:
        - ref: Keyword_vehicle_registration_details
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_vehicle_registration_details
      pattern: >-
        (?is)\b(?:vehicle\s+registration\s+details|vehicle\s+registration|registration\s+number|license\s+plate|number\s+plate|vehicle\s+identification|registration\s+certificate|motor\s+vehicle|registered\s+owner|vehicle\s+record|plate\s+number)\b
    - id: Pattern_global_top500_050_vehicle_registration_details_label_context
      pattern: (?i)\b(?:vehicle\s+registration\s+details)\b
  keywords:
    - id: Keyword_vehicle_registration_details
      groups:
        - match_style: word
          terms:
            - vehicle registration details
            - vehicle registration
            - registration number
            - license plate
            - number plate
            - text: VIN
              case_sensitive: true
            - vehicle identification
            - registration certificate
            - motor vehicle
            - registered owner
            - vehicle record
            - plate number
      strength: specific
    - id: Keyword_global_top500_050_vehicle_registration_details_domain_context
      groups:
        - match_style: word
          terms:
            - vehicle registration details
            - vehicle
            - registration
      strength: domain
risk_description: >-
  This concept detector seeks vehicle-registration, registration-number, and licence-plate language with civic context rather than validating a jurisdiction-specific plate or complete registry record. A genuine registration reference can link a vehicle to observations, support plate cloning or convincing service fraud, and expose ownership when other registry or identity data is available. The value alone does not provide the owner's address, licence, vehicle access, or official registration history, and transport policy or forms can match. Risk 5 OFFICIAL reflects bounded vehicle-reference harm; SENSITIVE would require an identified owner dossier, location history, access credentials, enforcement data, or a substantial registry extract.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
