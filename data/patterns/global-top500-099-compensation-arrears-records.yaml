schema: testpattern/v1
name: Compensation arrears records
slug: global-top500-099-compensation-arrears-records
version: 1.2.0
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to compensation arrears records in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:compensation\s+arrears\s+records|compensation\s+arrears|back\s+pay|salary\s+arrears|retroactive\s+pay|wage\s+adjustment|arrears\s+payment|underpayment\s+correction|pay\s+correction|retrospective\s+adjustment|arrears\s+calculation)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - compensation arrears records
    - compensation
    - arrears
    - records
    - payroll
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: compensation arrears records
      description: Primary topic phrase match
    - value: compensation arrears
      description: Case-insensitive topic phrase match
    - value: back pay
      description: Alternative topic phrase match
    - value: salary arrears
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_compensation_arrears
      matches:
        - ref: Pattern_global_top500_099_compensation_arrears_records_label_context
        - ref: Keyword_global_top500_099_compensation_arrears_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_compensation_arrears
      matches:
        - ref: Keyword_compensation_arrears
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_compensation_arrears
      pattern: >-
        (?is)\b(?:compensation\s+arrears\s+records|compensation\s+arrears|back\s+pay|salary\s+arrears|retroactive\s+pay|wage\s+adjustment|arrears\s+payment|underpayment\s+correction|pay\s+correction|retrospective\s+adjustment|arrears\s+calculation)\b
    - id: Pattern_global_top500_099_compensation_arrears_records_label_context
      pattern: (?i)\b(?:compensation\s+arrears\s+records)\b
  keywords:
    - id: Keyword_compensation_arrears
      groups:
        - match_style: word
          terms:
            - compensation arrears records
            - compensation arrears
            - back pay
            - salary arrears
            - retroactive pay
            - wage adjustment
            - arrears payment
            - underpayment correction
            - pay correction
            - retrospective adjustment
            - arrears calculation
      strength: specific
    - id: Keyword_global_top500_099_compensation_arrears_records_domain_context
      groups:
        - match_style: word
          terms:
            - compensation arrears records
            - compensation
            - arrears
      strength: domain
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
