schema: testpattern/v1
name: Childcare benefit payroll claims
slug: global-top500-091-childcare-benefit-payroll-claims
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to childcare benefit payroll claims in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:childcare\s+benefit\s+payroll\s+claims|childcare\s+benefit|child\s+care\s+subsidy|dependent\s+care|childcare\s+voucher|employer\s+childcare|salary\s+packaging|benefit\s+claim|childcare\s+reimbursement|parental\s+benefit|family\s+benefit)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - childcare benefit payroll claims
    - childcare
    - benefit
    - payroll
    - claims
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: childcare benefit payroll claims
      description: Primary topic phrase match
    - value: childcare benefit
      description: Case-insensitive topic phrase match
    - value: child care subsidy
      description: Alternative topic phrase match
    - value: dependent care
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_childcare_benefit
      matches:
        - ref: Pattern_global_top500_091_childcare_benefit_payroll_claims_label_context
        - ref: Keyword_global_top500_091_childcare_benefit_payroll_claims_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_091_childcare_benefit_payroll_claims_noise_exclusion
    - confidence_level: 75
      id_match: Regex_childcare_benefit
      matches:
        - ref: Keyword_childcare_benefit
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_091_childcare_benefit_payroll_claims_noise_exclusion
    - confidence_level: 65
      id_match: Regex_childcare_benefit
      matches:
        - ref: Keyword_childcare_benefit
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_091_childcare_benefit_payroll_claims_noise_exclusion
  regexes:
    - id: Regex_childcare_benefit
      pattern: (?is)\b(?:childcare\s+benefit\s+payroll\s+claims|childcare\s+benefit|child\s+care\s+subsidy|dependent\s+care|childcare\s+voucher|employer\s+childcare|salary\s+packaging|benefit\s+claim|childcare\s+reimbursement|parental\s+benefit|family\s+benefit)\b
    - id: Pattern_global_top500_091_childcare_benefit_payroll_claims_label_context
      pattern: (?i)\\b(?:childcare\\s+benefit\\s+payroll\\s+claims|childcare|benefit|payroll|claims|top500)\\b
  keywords:
    - id: Keyword_childcare_benefit
      groups:
        - match_style: word
          terms:
            - childcare benefit payroll claims
            - childcare benefit
            - child care subsidy
            - dependent care
            - childcare voucher
            - employer childcare
            - salary packaging
            - benefit claim
            - childcare reimbursement
            - parental benefit
            - family benefit
    - id: Keyword_global_top500_091_childcare_benefit_payroll_claims_domain_context
      groups:
        - match_style: word
          terms:
            - childcare benefit payroll claims
            - childcare
            - benefit
            - payroll
            - claims
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_091_childcare_benefit_payroll_claims_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
