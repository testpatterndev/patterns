schema: testpattern/v1
name: Wage garnishment orders
slug: au-top500-087-wage-garnishment-orders
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to wage garnishment orders in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: industry-hr.'
pattern: (?is)\b(?:wage\s+garnishment\s+orders|garnishee\s+notice|court\s+order|child\s+support|centrelink\s+debt|tax\s+debt\s+recovery|attachment\s+of\s+earnings|compulsory\s+deduction|Services\s+Australia|Fair\s+Work|garnishee\s+order)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - wage garnishment orders
    - wage
    - garnishment
    - orders
    - payroll
    - tax
    - operations
  proximity: 300
  keyword_lists:

    - industry-hr

    - data-record-context
test_cases:
  should_match:
    - value: wage garnishment orders
      description: Primary topic phrase match
    - value: garnishee notice
      description: Case-insensitive topic phrase match
    - value: court order
      description: Alternative topic phrase match
    - value: child support
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_wage_garnishment_orders
      matches:
        - ref: Evidence_wage_garnishment_orders
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_wage_garnishment_orders
      matches:
        - ref: Evidence_wage_garnishment_orders
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_wage_garnishment_orders
      matches:
        - ref: Evidence_wage_garnishment_orders
  regexes:
    - id: Pattern_wage_garnishment_orders
      pattern: (?is)\b(?:wage\s+garnishment\s+orders|garnishee\s+notice|court\s+order|child\s+support|centrelink\s+debt|tax\s+debt\s+recovery|attachment\s+of\s+earnings|compulsory\s+deduction|Services\s+Australia|Fair\s+Work|garnishee\s+order)\b
  keywords:
    - id: Evidence_wage_garnishment_orders
      groups:
        - match_style: word
          terms:
            - wage garnishment orders
            - garnishment
            - garnishee notice
            - court order
            - child support
            - centrelink debt
            - tax debt recovery
            - attachment of earnings
            - compulsory deduction
            - Services Australia
            - Fair Work
            - garnishee order
    - id: Evidence_data_record_context
      groups:
        - match_style: word
          terms:
            - field
            - column
            - row
            - entry
            - record
            - value
            - form
            - register
            - database
            - extract
            - export
            - spreadsheet
            - table
            - schedule
            - appendix
            - attachment
            - registry
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
