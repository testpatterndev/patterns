schema: testpattern/v1
name: European Debit Card Number
slug: eu-debit-card-number
version: 1.3.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects European debit and credit card numbers for Visa, Mastercard, and American Express networks. The pattern
  matches 13- to 16-digit card numbers based on the leading digits assigned to each network by the ISO/IEC 7812
  standard. This is commonly used for PCI-DSS compliance scanning across EU-regulated financial data.
operation: >-
  Corroborative evidence: 6 keywords within 300 characters. Keyword lists: financial-payment-card-terms, financial-cvv,
  financial-expiry.
pattern: \b(?:4[0-9]{15}|4[0-9]{12}|5[1-5][0-9]{14}|3[47][0-9]{13})\b
confidence: high
confidence_justification: >-
  Card numbers have well-defined prefix ranges (4 for Visa, 51-55 for Mastercard, 34/37 for Amex) and fixed lengths,
  giving this pattern strong structural precision. Luhn validation as a post-match step further reduces false positives.
jurisdictions:
  - eu
regulations:
- GDPR
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
  - pii
corroborative_evidence:
  keywords:
    - card number
    - debit card
    - credit card
    - card no
    - CVV
    - expiry
  proximity: 300
  keyword_lists:

    - financial-payment-card-terms

    - financial-cvv

    - financial-expiry
test_cases:
  should_match:
    - value: '4111111111111111'
      description: Valid Visa test card number (16 digits)
    - value: '5500000000000004'
      description: Valid Mastercard test card number
    - value: '340000000000009'
      description: Valid American Express test card number (15 digits)
  should_not_match:
    - value: '1234567890123456'
      description: 16-digit number that does not match any known card prefix
    - value: '411111111111'
      description: Too few digits to be a valid Visa card number
    - value: '6011000000000004'
      description: Discover card prefix, not covered by this EU-focused pattern
false_positives:
  - description: Random 16-digit numbers that happen to start with a valid card prefix (e.g. serial numbers, tracking codes)
    mitigation: >-
      Apply Luhn checksum validation on matched values. Require corroborative evidence keywords such as 'card number' or
      'CVV' within proximity.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_eu_debit_card
      matches:
        - ref: Keyword_eu_debit_card
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_eu_debit_card
  regexes:
    - id: Regex_eu_debit_card
      pattern: \b(?:4[0-9]{15}|4[0-9]{12}|5[1-5][0-9]{14}|3[47][0-9]{13})\b
      validators:
        - ref: Func_credit_card
  keywords:
    - id: Keyword_eu_debit_card
      groups:
        - match_style: word
          terms:
            - card number
            - debit card
            - credit card
            - card no
            - text: CVV
              case_sensitive: true
            - expiry
            - carte bancaire
            - numéro de carte
            - Kartennummer
            - Bankkarte
            - numero di carta
            - número de tarjeta
            - tarjeta de débito
            - kaartnummer
      strength: specific
risk_rating: 8
risk_description: >-
  This high-confidence identifier detector finds structurally valid Visa, Mastercard, or American Express payment-card numbers in European financial context. A card number is a payment credential component that can support card-not-present fraud, account targeting, or convincing phishing, especially when expiry or security-code context is nearby. The normal match exposes one cardholder to serious but usually contained loss and replacement burden, although further authentication data may still be required. Risk 8 and SENSITIVE are justified; a complete card database, issuer compromise, or broad reusable authentication package would raise the impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
