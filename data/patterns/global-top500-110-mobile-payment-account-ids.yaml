schema: testpattern/v1
name: Mobile payment account IDs
slug: global-top500-110-mobile-payment-account-ids
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to mobile payment account ids in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: au-telecom-terms, phone-international. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:mobile\s+payment\s+account\s+ids?|device\s+account\s+number|payment\s+token|token\s+ID)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
  - GDPR
  - PCI-DSS
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - mobile payment account ids
    - mobile
    - payment
    - account
    - ids
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - au-telecom-terms
    - phone-international
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Mobile payment account ids'
      description: Topic phrase present
    - value: 'mobile payment account ids'
      description: Topic phrase, lowercase
    - value: 'this record references the mobile payment account ids held on file'
      description: Topic phrase within surrounding text
    - value: 'Wallet record - Device Account Number: 4761 23XX XXXX 9010'
      description: Wallet-ID label surfaces at 65 discovery_only — enforcement requires a separately reviewed labelled-value branch
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: Enable Apple Pay on your phone to make contactless payments.
      description: Wallet provider brands are corroborative evidence only — a product instruction with no account-ID label must not match
    - value: PayID lets customers address bank transfers with an email address.
      description: PayID is a payment addressing service, not a mobile-wallet account ID — must not match
    - value: 'Training example: "Device Account Number: 4761 23XX XXXX 9010"'
      description: Template/example exclusion suppresses even the discovery-only wallet-ID label
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_mobile_payment_ids
      matches:
        - ref: Evidence_mobile_payment_ids
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_mobile_payment_ids
      matches:
        - ref: Evidence_mobile_payment_ids
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_mobile_payment_ids
      matches:
        - ref: Evidence_mobile_payment_ids
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_mobile_wallet_id_labels
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_mobile_payment_ids
      pattern: (?i)\b(?:mobile\s+payment\s+account\s+ids?)\b
    - id: Pattern_mobile_wallet_id_labels
      pattern: (?i)\b(?:device\s+account\s+number|payment\s+token|token\s+ID)\b
    - id: Pattern_au_top500_110_mobile_payment_account_ids_label_context
      pattern: (?i)\b(?:mobile\s+payment\s+account\s+ids)\b
  keywords:
    - id: Evidence_mobile_payment_ids
      groups:
        - match_style: word
          terms:
            - mobile payment
            - payment account
            - digital wallet
            - Apple Pay
            - Google Pay
            - mobile wallet
            - NFC payment
            - contactless payment
            - device account number
            - token ID
            - payment token
            - mobile banking
    - id: Keyword_au_top500_110_mobile_payment_account_ids_domain_context
      groups:
        - match_style: word
          terms:
            - mobile payment account ids
            - mobile
            - payment
            - ids
risk_description: >-
  The regex matches the phrase mobile payment account ID or IDs and uses payment, identifier, record, telecom, and template-exclusion context to identify likely records. It does not validate a wallet-provider token or account syntax, but a genuine populated record can link a person or device to a payment wallet and support targeted takeover, transaction fraud, or account enumeration. The normal impact is contained to one mobile-payment account, while data dictionaries, inventories, and unpopulated headings remain plausible matches. Risk 7 SENSITIVE Financial is retained for a substantive account-ID record; PROTECTED would require active wallet credentials, a bulk account register, or significant payment-platform compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
