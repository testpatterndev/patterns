schema: testpattern/v1
name: Breach likelihood and impact assessments
slug: au-top500-468-breach-likelihood-and-impact-assessments
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to breach likelihood and impact assessments in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:breach\s+likelihood\s+and\s+impact\s+assessments|breach\s+assessment|notifiable\s+data\s+breach|serious\s+harm|impact\s+assessment|incident\s+severity|OAIC\s+notification)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - breach likelihood and impact assessments
    - breach
    - likelihood
    - impact
    - assessments
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: breach likelihood and impact assessments
      description: Primary topic phrase match
    - value: breach assessment
      description: Case-insensitive topic phrase match
    - value: notifiable data breach
      description: Alternative topic phrase match
    - value: serious harm
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to breach likelihood and impact assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_breach_assessment
      matches:
        - ref: Evidence_breach_assessment
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_breach_assessment
      matches:
        - ref: Evidence_breach_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_breach_assessment
      matches:
        - ref: Evidence_breach_assessment
  regexes:
    - id: Pattern_breach_assessment
      pattern: (?is)\b(?:breach\s+likelihood\s+and\s+impact\s+assessments|breach\s+assessment|notifiable\s+data\s+breach|serious\s+harm|impact\s+assessment|incident\s+severity|OAIC\s+notification)\b
  keywords:
    - id: Evidence_breach_assessment
      groups:
        - match_style: word
          terms:
            - breach likelihood and impact assessments
            - breach assessment
            - notifiable data breach
            - NDB
            - serious harm
            - likelihood
            - impact assessment
            - incident severity
            - remediation
            - OAIC notification
            - privacy
            - compliance
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/notifiable-data-breaches
  - https://www.oaic.gov.au/privacy/privacy-guidance-for-organisations-and-government-agencies/preventing-preparing-for-and-responding-to-data-breaches/data-breach-preparation-and-response
