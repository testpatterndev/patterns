schema: testpattern/v1
name: Government Financial Audit - Material Weakness
slug: government-financial-audit-material-weakness
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects internal or QAO (Queensland Audit Office) audit findings identifying material weaknesses in financial controls before public tabling. Disclosure enables exploitation of identified control gaps.
operation: 'Keyword proximity: audit/QAO terms within 300 characters of material weakness/deficiency terms and financial control context. Requires pre-tabling markers (draft, management letter, pre-tabling, PROTECTED).'
pattern: null
confidence: high
confidence_justification: 'High confidence: the co-occurrence of audit authority references with material weakness findings and pre-tabling markers is highly specific to restricted audit documents. Published audit reports are excluded.'
jurisdictions:
  - au
regulations:
- "Auditor-General Act 2009 (Qld)"
- "Financial Accountability Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - audit
    - QAO
    - Auditor-General
    - internal audit
    - material weakness
    - significant deficiency
    - control failure
    - material finding
    - qualification
    - adverse opinion
    - financial
    - payment
    - revenue
    - expenditure
    - fraud risk
    - management letter
    - draft
    - pre-tabling
  proximity: 300
  keyword_lists:
    - corporate-finance
    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED — Draft Management Letter. Queensland Audit Office. Material weakness finding: The department''s payment approval controls can be bypassed by users with system administrator access, creating a significant deficiency in expenditure controls. Fraud risk rating: High. Pre-tabling — not for distribution.'
      description: QAO draft management letter with material weakness finding
    - value: 'Internal Audit Report — CONFIDENTIAL. Material finding: Revenue recognition controls contain a significant deficiency allowing manual journal entries without secondary approval. Estimated exposure: $12M. Remediation required before Auditor-General review. Draft — pre-tabling.'
      description: Internal audit report with material control weakness
  should_not_match:
    - value: Report to Parliament No. 4 of 2025. Queensland Audit Office — Results of financial audits. Published. The Auditor-General notes improved financial controls across departments.
      description: Published QAO report to Parliament — public document
    - value: 'Audit methodology training: How to identify material weaknesses in financial controls. Template for internal audit teams.'
      description: Audit training materials with methodology descriptions
false_positives:
  - description: Published QAO reports tabled in Parliament
    mitigation: Exclude documents containing 'report to parliament', 'tabled', 'published' without pre-tabling markers
  - description: Audit training and methodology documents
    mitigation: Exclude documents containing 'training', 'methodology', 'how to identify', 'template'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_government_financial_audit_material_weakness_dollar_amounts_for_exposure_figures
      matches:
        - ref: Evidence_government_financial_audit_material_weakness_primary
        - ref: Evidence_government_financial_audit_material_weakness_findings
        - ref: Evidence_government_financial_audit_material_weakness_financial_context
        - ref: Evidence_government_financial_audit_material_weakness_markers
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_government_financial_audit_material_weakness_exclusion
    - confidence_level: 75
      id_match: Pattern_government_financial_audit_material_weakness_dollar_amounts_for_exposure_figures
      matches:
        - ref: Evidence_government_financial_audit_material_weakness_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_government_financial_audit_material_weakness_exclusion
    - confidence_level: 65
      id_match: Pattern_government_financial_audit_material_weakness_dollar_amounts_for_exposure_figures
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_government_financial_audit_material_weakness_exclusion
  regexes:
    - id: Pattern_government_financial_audit_material_weakness_dollar_amounts_for_exposure_figures
      pattern: \$[\d,.]+\s*[MBKmb]?
  keywords:
    - id: Evidence_government_financial_audit_material_weakness_primary
      groups:
        - match_style: word
          terms:
            - audit
            - QAO
            - Queensland Audit Office
            - Auditor-General
            - internal audit
    - id: Evidence_government_financial_audit_material_weakness_findings
      groups:
        - match_style: word
          terms:
            - material weakness
            - significant deficiency
            - control failure
            - material finding
            - qualification
            - adverse opinion
            - control weakness
    - id: Evidence_government_financial_audit_material_weakness_financial_context
      groups:
        - match_style: word
          terms:
            - financial
            - payment
            - revenue
            - expenditure
            - fraud risk
            - financial controls
            - payment approval
    - id: Evidence_government_financial_audit_material_weakness_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - draft
            - management letter
            - pre-tabling
            - confidential
            - not for distribution
    - id: Filter_government_financial_audit_material_weakness_exclusion
      groups:
        - match_style: word
          terms:
            - report to parliament
            - tabled
            - published
            - training
            - methodology
            - template
            - how to identify

risk_rating: 8
risk_description: Internal or QAO audit findings identifying material weaknesses in financial controls before public tabling; disclosure enables exploitation of control gaps. While sensitive, disclosure represents BIL:2 harm — reputational or moderate financial impact rather than catastrophic institutional damage. Does not meet PROTECTED threshold in a Queensland Government operational context.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Financial"
references: []
created: '2026-02-20'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
license: MIT
