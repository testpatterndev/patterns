schema: testpattern/v1
name: Disaster Recovery Plan
slug: au-disaster-recovery-plan
version: 1.3.0
type: keyword_list
pattern_class: concept
description: Detects disaster recovery plans containing RTO/RPO targets, recovery procedures, and infrastructure dependencies.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
  - technology
  - security
test_cases:
  should_match:
    - value: 'Disaster recovery plan: RTO 4 hours, RPO 1 hour with failover procedure'
      description: Test match 1
    - value: 'DR plan test results: recovery procedure and backup recovery verification'
      description: Test match 2
    - value: Disaster recovery with business continuity and recovery time objective targets
      description: Test match 3
  should_not_match:
    - value: Disaster relief fund
      description: Non-match 1
    - value: Recovery from illness
      description: Non-match 2
false_positives:
  - description: Natural disaster or health recovery references.
    mitigation: Require IT-specific terms like RTO, RPO, failover, or DR plan.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: DR plan exposure reveals recovery procedures, RTO/RPO targets, and infrastructure dependencies.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE InfoTech"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_disaster_recovery
      matches:
        - ref: Keyword_rto_rpo
        - ref: Keyword_failover
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_disaster_recovery
      matches:
        - ref: Keyword_it_operations
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_disaster_recovery
      pattern: >-
        (?i)\b(?:disaster\s+recovery\s+(?:plan|procedure|document)|dr\s+(?:plan|procedure|runbook)|(?:it\s+)?recovery\s+(?:plan|procedures?|strategy))\b
  keywords:
    - id: Keyword_rto_rpo
      groups:
        - match_style: word
          terms:
            - recovery time objective
            - text: RTO
              case_sensitive: true
            - recovery point objective
            - text: RPO
              case_sensitive: true
            - maximum tolerable downtime
            - text: MTD
              case_sensitive: true
            - recovery time actual
            - text: RTA
              case_sensitive: true
      strength: domain
    - id: Keyword_failover
      groups:
        - match_style: word
          terms:
            - failover
            - failback
            - switchover
            - hot site
            - warm site
            - cold site
            - backup site
            - recovery site
            - DR site
      strength: specific
    - id: Keyword_it_operations
      groups:
        - match_style: word
          terms:
            - IT operations
            - infrastructure
            - system administration
            - change management
            - incident management
            - problem management
            - ITIL
      strength: specific
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - disaster recovery
  - DR plan
  - disaster recovery plan
  - RTO
  - recovery time objective
  - RPO
  - recovery point objective
  - failover
  - business continuity
  - backup recovery
  - DR test
  - recovery procedure
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
