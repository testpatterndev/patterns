schema: testpattern/v1
name: Disaster Recovery Plan
slug: au-disaster-recovery-plan
version: 1.4.0
type: regex
pattern_class: concept
description: Detects disaster recovery plans containing RTO/RPO targets, recovery procedures, and infrastructure dependencies.
operation: >-
  A disaster-recovery plan, procedure, runbook, or strategy title is discovery-only at 65. Recovery
  objectives such as RTO, RPO, or maximum tolerable downtime raise it to 75. The 85 tier additionally
  requires failover, failback, switchover, or recovery-site implementation evidence. Enforcing tiers
  reject templates and examples.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
  - technology
  - security
test_cases:
  should_match:
    - value: 'Disaster recovery plan'
      description: Low-tier probe - plan title without recovery targets
    - value: 'Disaster recovery plan: RTO four hours and RPO one hour.'
      description: Medium-tier probe - quantified recovery objectives without failover implementation
    - value: 'DR plan: RTO four hours, RPO one hour, with failover to the warm site and tested failback.'
      description: High-tier probe - recovery objectives plus failover and recovery-site evidence
  should_not_match:
    - value: Disaster relief fund
      description: Humanitarian-disaster sibling
    - value: Recovery from illness
      description: Personal recovery prose
    - value: 'The public website describes why every agency needs a disaster recovery plan.'
      description: Public guidance mentions only the plan title
    - value: 'Template example: disaster recovery plan with RTO four hours, RPO one hour, and failover to a warm site.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Natural disaster or health recovery references.
    mitigation: Require IT-specific terms like RTO, RPO, failover, or DR plan.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This TestPattern finds a disaster recovery plan through recovery-plan wording plus recovery objectives, failover, or IT-operations evidence. Exposure could reveal recovery priorities, alternate environments, and tolerable outage windows that an attacker could exploit to prolong disruption. The normal composite affects the organisation and services addressed by the plan, without necessarily covering a protected or critical operation. Risk 8 and SENSITIVE InfoTech capture serious contained harm; PROTECTED requires critical-service or comparable significant-damage context.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_disaster_recovery
      matches:
        - ref: Keyword_rto_rpo
        - ref: Keyword_failover
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_disaster_recovery
      matches:
        - ref: Keyword_rto_rpo
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_disaster_recovery
  regexes:
    - id: Regex_disaster_recovery
      pattern: >-
        (?i)\b(?:disaster\s+recovery\s+(?:plan|procedure|document)|dr\s+(?:plan|procedure|runbook)|(?:it\s+)?recovery\s+(?:plan|procedures?|strategy))\b
  keywords:
    - id: Keyword_rto_rpo
      groups:
        - match_style: word
          terms:
            - recovery time objective
            - text: RTO
              case_sensitive: true
            - recovery point objective
            - text: RPO
              case_sensitive: true
            - maximum tolerable downtime
            - text: MTD
              case_sensitive: true
            - recovery time actual
            - text: RTA
              case_sensitive: true
      strength: domain
    - id: Keyword_failover
      groups:
        - match_style: word
          terms:
            - failover
            - failback
            - switchover
            - hot site
            - warm site
            - cold site
            - backup site
            - recovery site
            - DR site
      strength: specific
    - id: Keyword_it_operations
      groups:
        - match_style: word
          terms:
            - IT operations
            - infrastructure
            - system administration
            - change management
            - incident management
            - problem management
            - ITIL
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.0
    date: '2026-07-19'
    description: 'Profile quality: align the regex-backed detector type; add plan-title discovery, recovery-objective medium, and failover-corroborated high tiers; add public/template adversarial probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 538 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
