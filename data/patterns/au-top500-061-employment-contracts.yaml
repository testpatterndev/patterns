schema: testpattern/v1
name: Employment contracts
slug: au-top500-061-employment-contracts
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to employment contracts in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 5 keywords within 300 characters. Keyword lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:employment\s+contract|employment\s+agreement|terms\s+of\s+employment|offer\s+letter|position\s+description|probation\s+period|notice\s+period|employment\s+conditions|fair\s+work|workplace\s+agreement|enterprise\s+agreement)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - employment contracts
    - employment
    - contracts
    - workforce
    - records
  proximity: 300
  keyword_lists:

    - industry-hr
test_cases:
  should_match:
    - value: employment contract
      description: Primary topic phrase match
    - value: employment agreement
      description: Case-insensitive topic phrase match
    - value: terms of employment
      description: Alternative topic phrase match
    - value: offer letter
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to employment contracts appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_employment_contracts
      matches:
        - ref: Evidence_employment_contracts
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_061_employment_contracts_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_employment_contracts
      matches:
        - ref: Evidence_employment_contracts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_061_employment_contracts_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_employment_contracts
      matches:
        - ref: Evidence_employment_contracts
  regexes:
    - id: Pattern_employment_contracts
      pattern: (?is)\b(?:employment\s+contract|employment\s+agreement|terms\s+of\s+employment|offer\s+letter|position\s+description|probation\s+period|notice\s+period|employment\s+conditions|fair\s+work|workplace\s+agreement|enterprise\s+agreement)\b
    - id: Pattern_au_top500_061_employment_contracts_label_context
      pattern: (?i)\\b(?:employment\\s+contracts|employment|contracts|top500)\\b
  keywords:
    - id: Evidence_employment_contracts
      groups:
        - match_style: word
          terms:
            - employment contract
            - employment agreement
            - terms of employment
            - offer letter
            - position description
            - remuneration
            - probation period
            - notice period
            - employment conditions
            - fair work
            - workplace agreement
            - enterprise agreement
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_061_employment_contracts_domain_context
      groups:
        - match_style: word
          terms:
            - employment contracts
            - employment
            - contracts
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_061_employment_contracts_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/privacy-guidance-for-organisations-and-government-agencies/organisations/employee-records-exemption
  - https://www.fairwork.gov.au/tools-and-resources/fact-sheets/rights-and-obligations/record-keeping-pay-slips
