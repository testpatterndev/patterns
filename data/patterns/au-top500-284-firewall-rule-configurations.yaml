schema: testpattern/v1
name: Firewall rule configurations
slug: au-top500-284-firewall-rule-configurations
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies firewall rule configurations patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:firewall\s+rule\s+configurations|security\s+group|access\s+control\s+list|allow\s+rule|deny\s+rule|inbound\s+rule|outbound\s+rule|network\s+policy|port\s+filtering|ip\s+tables)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - firewall rule configurations
    - firewall
    - rule
    - configurations
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: firewall rule configurations
      description: Primary topic phrase match
    - value: security group
      description: Case-insensitive topic phrase match
    - value: access control list
      description: Alternative topic phrase match
    - value: allow rule
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: firewall deny
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_firewall_rules
      matches:
        - ref: Evidence_firewall_rules
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_firewall_rules
      matches:
        - ref: Evidence_firewall_rules
    - confidence_level: 65
      id_match: Pattern_firewall_rules
      matches:
        - ref: Evidence_firewall_rules
  regexes:
    - id: Pattern_firewall_rules
      pattern: (?is)\b(?:firewall\s+rule\s+configurations|security\s+group|access\s+control\s+list|allow\s+rule|deny\s+rule|inbound\s+rule|outbound\s+rule|network\s+policy|port\s+filtering|ip\s+tables)\b
  keywords:
    - id: Evidence_firewall_rules
      groups:
        - match_style: word
          terms:
            - firewall rule configurations
            - firewall
            - security group
            - access control list
            - allow rule
            - deny rule
            - inbound rule
            - outbound rule
            - network policy
            - port filtering
            - ip tables
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.legislation.gov.au/C2018A00029/latest/text
  - https://www.oaic.gov.au/privacy/privacy-guidance-for-organisations-and-government-agencies/preventing-preparing-for-and-responding-to-data-breaches/data-breach-preparation-and-response
  - https://handbook.apra.gov.au/standard/cps-234
