schema: testpattern/v1
name: Employee grievance reports
slug: global-top500-064-employee-grievance-reports
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to employee grievance reports in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:grievance\s+report|employee\s+complaint|formal\s+grievance|grievance\s+procedure|workplace\s+complaint|dispute\s+resolution|grievance\s+hearing|complaint\s+investigation|grievance\s+outcome|employee\s+relations|harassment\s+complaint)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - employee grievance reports
    - employee
    - grievance
    - reports
    - employment
    - workforce
    - records
  proximity: 300
  keyword_lists:

    - industry-hr
test_cases:
  should_match:
    - value: grievance report
      description: Primary topic phrase match
    - value: employee complaint
      description: Case-insensitive topic phrase match
    - value: formal grievance
      description: Alternative topic phrase match
    - value: grievance procedure
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to employee grievance reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_employee_grievance
      matches:
        - ref: Pattern_global_top500_064_employee_grievance_reports_label_context
        - ref: Keyword_global_top500_064_employee_grievance_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_064_employee_grievance_reports_noise_exclusion
    - confidence_level: 75
      id_match: Regex_employee_grievance
      matches:
        - ref: Keyword_employee_grievance
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_064_employee_grievance_reports_noise_exclusion
    - confidence_level: 65
      id_match: Regex_employee_grievance
      matches:
        - ref: Keyword_employee_grievance
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_064_employee_grievance_reports_noise_exclusion
  regexes:
    - id: Regex_employee_grievance
      pattern: (?is)\b(?:grievance\s+report|employee\s+complaint|formal\s+grievance|grievance\s+procedure|workplace\s+complaint|dispute\s+resolution|grievance\s+hearing|complaint\s+investigation|grievance\s+outcome|employee\s+relations|harassment\s+complaint)\b
    - id: Pattern_global_top500_064_employee_grievance_reports_label_context
      pattern: (?i)\\b(?:employee\\s+grievance\\s+reports|employee|grievance|reports|top500)\\b
  keywords:
    - id: Keyword_employee_grievance
      groups:
        - match_style: word
          terms:
            - grievance report
            - employee complaint
            - formal grievance
            - grievance procedure
            - workplace complaint
            - dispute resolution
            - grievance hearing
            - complaint investigation
            - grievance outcome
            - employee relations
            - harassment complaint
    - id: Keyword_global_top500_064_employee_grievance_reports_domain_context
      groups:
        - match_style: word
          terms:
            - employee grievance reports
            - employee
            - grievance
            - reports
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_064_employee_grievance_reports_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
