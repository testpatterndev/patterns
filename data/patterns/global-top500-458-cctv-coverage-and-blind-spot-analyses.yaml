schema: testpattern/v1
name: CCTV coverage and blind spot analyses
slug: global-top500-458-cctv-coverage-and-blind-spot-analyses
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to cctv coverage and blind spot analyses in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword lists: industry-critical-infrastructure. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:CCTV\s+coverage|camera\s+coverage|blind\s+spot\s+analysis|surveillance\s+map|camera\s+placement|coverage\s+gap|security\s+camera|video\s+surveillance|monitoring\s+zone|field\s+of\s+view|physical\s+security|critical\s+infrastructure)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - cctv coverage and blind spot analyses
    - cctv
    - coverage
    - blind
    - spot
    - analyses
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
test_cases:
  should_match:
    - value: CCTV coverage
      description: Primary topic phrase match
    - value: camera coverage
      description: Case-insensitive topic phrase match
    - value: blind spot analysis
      description: Alternative topic phrase match
    - value: surveillance map
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: cctv blind spot
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to cctv coverage and blind spot analyses appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_cctv_blind_spot
      matches:
        - ref: Pattern_global_top500_458_cctv_coverage_and_blind_spot_analyses_label_context
        - ref: Keyword_global_top500_458_cctv_coverage_and_blind_spot_analyses_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_458_cctv_coverage_and_blind_spot_analyses_noise_exclusion
    - confidence_level: 75
      id_match: Regex_cctv_blind_spot
      matches:
        - ref: Keyword_cctv_blind_spot
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_458_cctv_coverage_and_blind_spot_analyses_noise_exclusion
    - confidence_level: 65
      id_match: Regex_cctv_blind_spot
      matches:
        - ref: Keyword_cctv_blind_spot
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_458_cctv_coverage_and_blind_spot_analyses_noise_exclusion
  regexes:
    - id: Regex_cctv_blind_spot
      pattern: (?is)\b(?:CCTV\s+coverage|camera\s+coverage|blind\s+spot\s+analysis|surveillance\s+map|camera\s+placement|coverage\s+gap|security\s+camera|video\s+surveillance|monitoring\s+zone|field\s+of\s+view|physical\s+security|critical\s+infrastructure)\b
    - id: Pattern_global_top500_458_cctv_coverage_and_blind_spot_analyses_label_context
      pattern: (?i)\\b(?:cctv\\s+coverage\\s+and\\s+blind\\s+spot\\s+analyses|cctv|coverage|blind|spot|analyses|top500)\\b
  keywords:
    - id: Keyword_cctv_blind_spot
      groups:
        - match_style: word
          terms:
            - CCTV coverage
            - camera coverage
            - blind spot analysis
            - surveillance map
            - camera placement
            - coverage gap
            - security camera
            - video surveillance
            - monitoring zone
            - field of view
            - physical security
            - critical infrastructure
    - id: Keyword_global_top500_458_cctv_coverage_and_blind_spot_analyses_domain_context
      groups:
        - match_style: word
          terms:
            - cctv coverage and blind spot analyses
            - cctv
            - coverage
            - blind
            - spot
            - analyses
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_458_cctv_coverage_and_blind_spot_analyses_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
