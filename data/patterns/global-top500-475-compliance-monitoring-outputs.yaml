schema: testpattern/v1
name: Compliance monitoring outputs
slug: global-top500-475-compliance-monitoring-outputs
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to compliance monitoring outputs in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:compliance\s+monitoring|monitoring\s+output|compliance\s+dashboard|control\s+effectiveness|audit\s+finding|gap\s+analysis|remediation\s+tracking|compliance\s+score|risk\s+indicator|privacy\s+compliance|regulatory\s+obligation|control\s+testing)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - compliance monitoring outputs
    - compliance
    - monitoring
    - outputs
    - privacy
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: compliance monitoring
      description: Primary topic phrase match
    - value: monitoring output
      description: Case-insensitive topic phrase match
    - value: compliance dashboard
      description: Alternative topic phrase match
    - value: control effectiveness
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to compliance monitoring outputs appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_compliance_monitoring
      matches:
        - ref: Pattern_global_top500_475_compliance_monitoring_outputs_label_context
        - ref: Keyword_global_top500_475_compliance_monitoring_outputs_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_compliance_monitoring
      matches:
        - ref: Keyword_compliance_monitoring
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_compliance_monitoring
      matches:
        - ref: Keyword_compliance_monitoring
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_compliance_monitoring
      pattern: >-
        (?is)\b(?:compliance\s+monitoring|monitoring\s+output|compliance\s+dashboard|control\s+effectiveness|audit\s+finding|gap\s+analysis|remediation\s+tracking|compliance\s+score|risk\s+indicator|privacy\s+compliance|regulatory\s+obligation|control\s+testing)\b
    - id: Pattern_global_top500_475_compliance_monitoring_outputs_label_context
      pattern: (?i)\\b(?:compliance\\s+monitoring\\s+outputs|compliance|monitoring|outputs|top500)\\b
  keywords:
    - id: Keyword_compliance_monitoring
      groups:
        - match_style: word
          terms:
            - compliance monitoring
            - monitoring output
            - compliance dashboard
            - control effectiveness
            - audit finding
            - gap analysis
            - remediation tracking
            - compliance score
            - risk indicator
            - privacy compliance
            - regulatory obligation
            - control testing
    - id: Keyword_global_top500_475_compliance_monitoring_outputs_domain_context
      groups:
        - match_style: word
          terms:
            - compliance monitoring outputs
            - compliance
            - monitoring
            - outputs
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://handbook.apra.gov.au/standard/cps-220
  - https://handbook.apra.gov.au/standard/cps-230
  - https://asic.gov.au/regulatory-resources/find-a-document/regulatory-guides/
