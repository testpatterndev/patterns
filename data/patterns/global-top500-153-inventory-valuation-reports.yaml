schema: testpattern/v1
name: Inventory valuation reports
slug: global-top500-153-inventory-valuation-reports
version: 1.2.3
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to inventory valuation reports in international contexts.
  These are operational and financial inventory valuation records; they are not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:inventory\s+valuation|stock\s+valuation|FIFO\s+valuation|LIFO\s+valuation|weighted\s+average\s+cost|inventory\s+write[\s-]+down|net\s+realisable\s+value|stock\s+count|inventory\s+aging|carrying\s+value|obsolete\s+inventory|inventory\s+reserve)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
  - business
corroborative_evidence:
  keywords:
    - inventory valuation reports
    - inventory
    - valuation
    - reports
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: inventory valuation
      description: Primary topic phrase match
    - value: stock valuation
      description: Case-insensitive topic phrase match
    - value: FIFO valuation
      description: Alternative topic phrase match
    - value: LIFO valuation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to inventory valuation reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_inventory_valuation_reports
      matches:
        - ref: Pattern_global_top500_153_inventory_valuation_reports_label_context
        - ref: Keyword_global_top500_153_inventory_valuation_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_inventory_valuation_reports
      matches:
        - ref: Keyword_inventory_valuation_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_inventory_valuation_reports
      pattern: >-
        (?is)\b(?:inventory\s+valuation|stock\s+valuation|FIFO\s+valuation|LIFO\s+valuation|weighted\s+average\s+cost|inventory\s+write[\s-]+down|net\s+realisable\s+value|stock\s+count|inventory\s+aging|carrying\s+value|obsolete\s+inventory|inventory\s+reserve)\b
    - id: Pattern_global_top500_153_inventory_valuation_reports_label_context
      pattern: (?i)\b(?:inventory\s+valuation\s+reports)\b
  keywords:
    - id: Keyword_inventory_valuation_reports
      groups:
        - match_style: word
          terms:
            - inventory valuation
            - stock valuation
            - FIFO valuation
            - LIFO valuation
            - weighted average cost
            - inventory write-down
            - net realisable value
            - stock count
            - inventory aging
            - carrying value
            - obsolete inventory
            - inventory reserve
      strength: specific
    - id: Keyword_global_top500_153_inventory_valuation_reports_domain_context
      groups:
        - match_style: word
          terms:
            - inventory valuation reports
            - inventory
            - valuation
            - reports
      strength: domain
risk_description: >-
  The detector finds inventory or stock valuation, FIFO or LIFO, write-down, ageing, reserve, carrying-value, and obsolete-stock terminology rather than validating a financial statement. A genuine report may reveal stock levels, cost assumptions, impairment, and slow-moving goods that a supplier, buyer, or competitor could use in pricing or negotiation. The normal unit is one bounded valuation report, and meaningful harm generally requires knowledge of the company, products, reporting period, or broader accounts; accounting guidance and working examples are frequent alternatives. Risk 5 and OFFICIAL reflect limited standalone commercial harm, while a company-wide unreleased valuation materially affecting reported results would cross toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
