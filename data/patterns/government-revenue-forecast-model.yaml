schema: testpattern/v1
name: Government Revenue Forecast Model
slug: government-revenue-forecast-model
version: 1.3.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects internal government revenue projections including tax revenue, royalties, mining/gas receipts, and stamp duty forecasts before public release in budget papers or MYFER.
operation: 'Keyword proximity: revenue/forecast terms within 300 characters of Treasury/fiscal context and dollar amounts or growth rate indicators. Requires pre-release markers. Regex for fiscal year patterns.'
pattern: FY\d{2}(?:-\d{2})?|\d{4}-\d{2}
confidence: medium
confidence_justification: 'Medium confidence: pre-release revenue projections with Treasury context and fiscal year references are highly specific to restricted fiscal documents. Published MYFER and budget papers are excluded.'
jurisdictions:
  - au
regulations:
- "Financial Accountability Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - revenue
    - forecast
    - projection
    - estimate
    - Treasury
    - MYFER
    - mid-year
    - fiscal
    - royalty
    - stamp duty
    - payroll tax
    - GST distribution
    - growth rate
    - PROTECTED
    - draft
    - pre-release
  proximity: 300
  keyword_lists:

    - corporate-finance

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED — Queensland Treasury Revenue Forecast Update. Draft — not for publication. Total own-source revenue projection FY26-27: $32.4B (growth rate 2.8%). Royalties revised down $1.2B due to coal price decline. Stamp duty forecast: $4.1B. GST distribution estimate: $16.8B.'
      description: Pre-release Treasury revenue forecast with specific projections
    - value: 'Draft MYFER Revenue Analysis — Queensland Treasury. Pre-release. Payroll tax collections projected at $5.2B, up 4.1% on FY25-26. Mining royalties downgrade risk: $800M if commodity prices soften. This document is PROTECTED and must not be distributed.'
      description: Mid-year fiscal review revenue analysis with projections
    - value: 'PROTECTED — Draft. Queensland Treasury internal revenue forecast for FY27-28. Not for publication. Total own-source revenue projection: $34.9B. Land tax estimate revised up $300M. Transfer duty forecast: $4.6B.'
      description: Pre-release Treasury forecast with fiscal year reference and projected dollar amounts
  should_not_match:
    - value: 'Queensland Budget Paper No. 1: Revenue Measures. Total revenue figures published by Queensland Treasury for the financial year.'
      description: Published budget paper with revenue figures
    - value: 'Annual Report: Department of Natural Resources and Mines. Royalty revenue for the year was in line with the published forecast.'
      description: Annual report referencing published revenue figures
false_positives:
  - description: Published budget papers and MYFER documents with revenue data
    mitigation: Exclude documents containing 'published', 'budget paper no', 'annual report' without pre-release markers
  - description: Academic or media commentary on government revenue forecasts
    mitigation: Exclude documents containing 'commentary', 'analysis by', 'source:', 'according to published'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_government_revenue_forecast_model_fiscal_year_reference_e_g_fy26_27
      matches:
        - ref: Evidence_government_revenue_forecast_model_primary
        - ref: Evidence_government_revenue_forecast_model_context
        - ref: Evidence_government_revenue_forecast_model_revenue_types
        - ref: Evidence_government_revenue_forecast_model_markers
        - ref: Pattern_government_revenue_forecast_model_year_range_reference_e_g_2026_27
        - ref: Pattern_government_revenue_forecast_model_dollar_amounts
        - ref: Pattern_government_revenue_forecast_model_percentage_growth_rates
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_government_revenue_forecast_model_exclusion
    - confidence_level: 75
      id_match: Pattern_government_revenue_forecast_model_fiscal_year_reference_e_g_fy26_27
      matches:
        - ref: Evidence_government_revenue_forecast_model_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_government_revenue_forecast_model_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_government_revenue_forecast_model_fiscal_year_reference_e_g_fy26_27
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_government_revenue_forecast_model_exclusion
  regexes:
    - id: Pattern_government_revenue_forecast_model_fiscal_year_reference_e_g_fy26_27
      pattern: FY\d{2}(?:-\d{2})?
    - id: Pattern_government_revenue_forecast_model_year_range_reference_e_g_2026_27
      pattern: \d{4}-\d{2}
    - id: Pattern_government_revenue_forecast_model_dollar_amounts
      pattern: \$[\d,.]+\s*[MBKmb]?
    - id: Pattern_government_revenue_forecast_model_percentage_growth_rates
      pattern: \d{1,2}\.\d{1,2}%
  keywords:
    - id: Evidence_government_revenue_forecast_model_primary
      groups:
        - match_style: word
          terms:
            - revenue
            - forecast
            - projection
            - estimate
            - revenue forecast
            - revenue model
      strength: domain
    - id: Evidence_government_revenue_forecast_model_context
      groups:
        - match_style: word
          terms:
            - Treasury
            - Queensland Treasury
            - MYFER
            - mid-year
            - fiscal
            - fiscal outlook
      strength: domain
    - id: Evidence_government_revenue_forecast_model_revenue_types
      groups:
        - match_style: word
          terms:
            - royalty
            - royalties
            - stamp duty
            - payroll tax
            - GST distribution
            - land tax
            - transfer duty
            - mining revenue
      strength: specific
    - id: Evidence_government_revenue_forecast_model_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - draft
            - pre-release
            - not for publication
            - not for distribution
            - embargoed
      strength: domain
    - id: Filter_government_revenue_forecast_model_exclusion
      groups:
        - match_style: word
          terms:
            - published
            - budget paper no
            - annual report
            - media release
            - publicly available

      strength: noise
risk_rating: 8
risk_description: >-
  The recogniser identifies an unreleased government revenue forecast by combining tax, royalty, or receipts projections with Treasury context, fiscal periods, monetary values, and pre-release markers. Disclosure can influence commercial positioning, negotiations, policy advocacy, and market expectations by revealing the government's assumptions before budget or MYFER publication. The normal true positive is a composite forecast model affecting defined revenue streams, while published budget tables and external commentary can contain the same fiscal language. Risk 8 SENSITIVE reflects serious but bounded fiscal and market harm; PROTECTED would require a forecast of exceptional strategic consequence or evidence of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
references: []
