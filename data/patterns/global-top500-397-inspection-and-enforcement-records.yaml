schema: testpattern/v1
name: Inspection and enforcement records
slug: global-top500-397-inspection-and-enforcement-records
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive regulatory inspection reports, site or field inspection records, violation
  notices, enforcement orders, and inspector findings. Topic phrases are retained for discovery;
  enforcement requires inspection-date, site, party, inspector, breach, severity, provision,
  corrective-action, deadline, ownership, or status fields, and high confidence also requires a formal
  inspection/case/notice/order reference or consequential enforcement outcome.
operation: >-
  Regex_inspection_enforcement_record recognises inspection records and reports, violation notices,
  enforcement orders, and inspector findings. The topic alone is discovery-only at 65. Substantive
  inspection and corrective-action fields raise it to 75; a formal record reference or consequential
  enforcement outcome reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:inspection\s+and\s+enforcement\s+records?|(?:regulatory|site|field)\s+inspection\s+(?:record|report)|inspection\s+(?:record|report)|violation\s+notice|enforcement\s+order|inspector\s+findings)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive inspection or corrective-action fields rather than a title.
  High confidence adds a formal record reference or consequential enforcement outcome.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government
corroborative_evidence:
  keywords:
    - inspection and enforcement records
  proximity: 240
test_cases:
  should_match:
    - value: inspection record
      description: Low-tier probe - inspection-record topic without substantive fields
    - value: 'Inspection report: inspection date 18 July 2026, inspected site 10 Queen Street, regulated party Example Foods, inspector name K. Hall, observed breach, breached provision, corrective action required, remediation deadline, and compliance status'
      description: Medium-tier probe - substantive inspection record without formal reference or enforcement outcome
    - value: 'Inspection report, inspection number: INS-774: inspection date 18 July 2026, inspected site 10 Queen Street, regulated party Example Foods, inspector name K. Hall, observed breach, breached provision, corrective action required, remediation deadline, and prohibition notice'
      description: High-tier probe - substantive inspection record with formal identifier and consequential outcome
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: The project retrospective assigns a corrective action to shorten meetings.
      description: Routine process improvement outside an inspection record
    - value: 'The public guide explains how to prepare an inspection report.'
      description: Public process guidance without a live inspection record
    - value: 'Training example: inspection report INS-774 with observed breach, corrective action required, remediation deadline, and prohibition notice'
      description: Explicit training content must not enforce
false_positives:
  - description: Public inspection guidance and routine quality or project reviews discuss inspection reports, findings, and corrective actions without containing a regulator's live record.
    mitigation: Keep inspection topics discovery-only and require date, site, party, inspector, breach, severity, provision, corrective-action, deadline, ownership, or status fields.
  - description: Training inspection records can contain realistic identifiers, findings, deadlines, penalties, and closure states.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_inspection_enforcement_record
      matches:
        - ref: Evidence_inspection_record_content
        - ref: Evidence_inspection_formal_or_outcome
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_inspection_enforcement_record
      matches:
        - ref: Evidence_inspection_record_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_inspection_enforcement_record
  regexes:
    - id: Regex_inspection_enforcement_record
      pattern: >-
        (?is)\b(?:inspection\s+and\s+enforcement\s+records?|(?:regulatory|site|field)\s+inspection\s+(?:record|report)|inspection\s+(?:record|report)|violation\s+notice|enforcement\s+order|inspector\s+findings)\b
    - id: Evidence_inspection_formal_or_outcome
      pattern: >-
        (?i)\b(?:(?:inspection|case|notice|order)\s*(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|civil\s+penalty|infringement\s+notice\s+issued|prohibition\s+notice|licen[cs]e\s+suspended|referred\s+for\s+prosecution)\b
  keywords:
    - id: Evidence_inspection_record_content
      groups:
        - match_style: word
          terms:
            - inspection date
            - inspected site
            - regulated party
            - inspector name
            - observed breach
            - finding severity
            - breached provision
            - corrective action required
            - remediation deadline
            - responsible party
            - compliance status
      strength: domain
risk_description: >-
  The detector targets regulatory inspection records, compliance audits, and enforcement actions with surrounding government-service context. A genuine record can reveal alleged breaches, inspector findings, remediation deadlines, and planned regulatory action, allowing evidence concealment, reputational damage, or unfair advantage before a matter is resolved. Harm is serious but usually contained to the regulated party and an individual case rather than a protected operation. Risk 8 remains SENSITIVE, with the Government DLM reflecting the record's regulatory function; PROTECTED would require covert methods, active high-consequence enforcement tactics, or system-wide compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
