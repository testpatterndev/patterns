schema: testpattern/v1
name: Inspection and enforcement records
slug: global-top500-397-inspection-and-enforcement-records
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to inspection and enforcement records in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:inspection\s+record|enforcement\s+action|regulatory\s+inspection|compliance\s+audit|violation\s+notice|inspection\s+report|enforcement\s+order|site\s+inspection|field\s+inspection|code\s+enforcement|inspector\s+findings|corrective\s+action)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - inspection and enforcement records
  proximity: 240
test_cases:
  should_match:
    - value: inspection record
      description: Primary topic phrase match
    - value: enforcement action
      description: Case-insensitive topic phrase match
    - value: regulatory inspection
      description: Alternative topic phrase match
    - value: compliance audit
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to inspection and enforcement records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_inspection_enforcement
      matches:
        - ref: Pattern_global_top500_397_inspection_and_enforcement_records_label_context
        - ref: Keyword_global_top500_397_inspection_and_enforcement_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_397_inspection_and_enforcement_records_noise_exclusion
    - confidence_level: 75
      id_match: Regex_inspection_enforcement
      matches:
        - ref: Keyword_inspection_enforcement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_397_inspection_and_enforcement_records_noise_exclusion
    - confidence_level: 65
      id_match: Regex_inspection_enforcement
      matches:
        - ref: Keyword_inspection_enforcement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_397_inspection_and_enforcement_records_noise_exclusion
  regexes:
    - id: Regex_inspection_enforcement
      pattern: (?is)\b(?:inspection\s+record|enforcement\s+action|regulatory\s+inspection|compliance\s+audit|violation\s+notice|inspection\s+report|enforcement\s+order|site\s+inspection|field\s+inspection|code\s+enforcement|inspector\s+findings|corrective\s+action)\b
    - id: Pattern_global_top500_397_inspection_and_enforcement_records_label_context
      pattern: (?i)\\b(?:inspection\\s+and\\s+enforcement\\s+records|inspection|enforcement|top500)\\b
  keywords:
    - id: Keyword_inspection_enforcement
      groups:
        - match_style: word
          terms:
            - inspection record
            - enforcement action
            - regulatory inspection
            - compliance audit
            - violation notice
            - inspection report
            - enforcement order
            - site inspection
            - field inspection
            - code enforcement
            - inspector findings
            - corrective action
    - id: Keyword_global_top500_397_inspection_and_enforcement_records_domain_context
      groups:
        - match_style: word
          terms:
            - inspection and enforcement records
            - inspection
            - enforcement
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_397_inspection_and_enforcement_records_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
