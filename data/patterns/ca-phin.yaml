schema: testpattern/v1
name: Canada Personal Health Identification Number (PHIN)
slug: ca-phin
version: 1.2.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Canada Personal Health Identification Number (PHIN) patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Due to the generic numeric format,
  corroborative evidence keywords are essential for reliable detection.
operation: 'Corroborative evidence: 5 keywords within 300 characters. Keyword lists: ca-health. Adds label-context matching and exclusion logic for sample/template/test placeholders.'
pattern: \b\d{9}\b
confidence: medium
confidence_justification: >-
  Medium confidence: nine-digit numbers are extremely common. PHIN detection requires corroborative evidence such as 'personal health identification number' or 'Manitoba Health' nearby. Context label
  evidence plus explicit template/example exclusion improves precision for high-risk identifiers.
jurisdictions:
  - ca
regulations:
  - FIPPA
  - Law 25 (QC)
  - PHIPA
  - PIPEDA
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
  - government-id
corroborative_evidence:
  keywords:
    - PHIN
    - personal health
    - health identification
    - Manitoba Health
    - health number
  proximity: 300
  keyword_lists:
    - ca-health
test_cases:
  should_match:
    - value: '123456789'
      description: Nine-digit PHIN format
    - value: '987654321'
      description: Nine-digit personal health identification number
    - value: '112233445'
      description: Nine-digit health ID number
  should_not_match:
    - value: '12345678'
      description: Eight digits, too short for PHIN
    - value: '1234567890'
      description: Ten digits, exceeds PHIN format
    - value: sample template placeholder number 12345678
      description: >-
        Template/sample context negative — the embedded number is 8 digits, one short of the required 9,
        so the universal-engine top-level regex correctly does not match it (template gating is a
        Purview-tier NOT-group concern, not expressible in a bare regex)
false_positives:
  - description: Generic numeric sequences matching the digit pattern in non-health contexts
    mitigation: Require corroborative evidence keywords within the proximity window to distinguish health identifiers from general numeric data.
  - description: Reference numbers or account identifiers from other domains with similar digit counts
    mitigation: Layer with document classification to prioritise matches in health and medical documents.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ca_phin
      matches:
        - ref: Pattern_ca_phin_label_context
        - ref: Keyword_ca_phin_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ca_phin
      matches:
        - ref: Keyword_ca_phin_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ca_phin
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ca_phin
      pattern: \b\d{9}\b
    - id: Pattern_ca_phin_label_context
      pattern: (?i)\b(?:canada|personal|health|phin|health\s+number|insurance\s+number|patient\s+identifier|social\s+welfare|identity\s+number|national\s+id|personal\s+id|citizen\s+number)\b
  keywords:
    - id: Keyword_ca_phin_specific
      groups:
        - match_style: word
          terms:
            - PHIN
            - personal health identification number
            - personal health number
            - health identification number
            - Manitoba Health
            - Manitoba health number
            - health card number
            - numéro de santé
            - carte santé
      strength: specific
    - id: Keyword_ca_phin_broad
      groups:
        - match_style: word
          terms:
            - personal health
            - health identification
            - health number
            - health card
            - health insurance
            - provincial health
            - patient number
            - patient ID
            - health services
      strength: specific
  filters:
    - id: Filter_ca_phin_same_digits
      type: AllDigitsSameFilter
    - id: Filter_ca_phin_exclude_test
      type: TextMatchFilter
      direction: Full
      logic: Exclude
      terms:
        - '000000000'
        - '123456789'
risk_rating: 5
risk_description: >-
  The pattern identifies a nine-digit value near Canadian personal health identification context. A genuine PHIN may help locate or correlate a health record, but it contains no diagnosis, claim, person name, or authentication secret. The normal single match concerns one opaque identifier, and direct fraud or disclosure needs additional identity and system context. Risk 5 OFFICIAL reflects bounded correlation risk; SENSITIVE requires a linked clinical or account record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-canada-personal-health-identification-number
    title: Canada Personal Health Identification Number (PHIN) entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.2
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1148 without changing detector or package metadata.'
  - version: 1.2.1
    date: '2026-07-12'
    description: 'Baseline burn-down: template-context negative used a structurally valid number, so the universal-engine top-level regex correctly matched it (template gating is a Purview-tier concern via the template-exclusion NOT-group, not expressible in a bare regex); embedded number made structurally invalid (8 digits, one short of the required 9) to preserve the template-prose intent without asserting the impossible.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
