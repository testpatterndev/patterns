schema: testpattern/v1
name: Phishing simulation results
slug: au-top500-293-phishing-simulation-results
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies measured phishing-exercise outcomes in security and access control contexts:
  enforcement requires phishing-simulation or phish-test context followed by a quantified
  delivery/open/click/submission/report metric, while simulation-topic language alone remains
  discovery-only. Marketing campaign metrics are out of scope.
operation: >-
  Pattern type: regex (boost_regex engine). Topic phrases (phishing simulation, phish test,
  report phish) feed a 65 discovery-only tier; enforcement requires
  Evidence_phishing_result_metric — a phishing-simulation/phish-test anchor within 240
  characters of a numeric delivered/opened/clicked/submitted/reported or click/report-rate
  field — at 75, with additional phishing-awareness evidence raising it to 85. The shared
  template exclusion vetoes sample/training text at enforcement tiers.
pattern: (?i)\b(?:phishing\s+simulation|phish\s+test|report\s+phish)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - phishing simulation results
    - phishing
    - simulation
    - results
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: 'Phishing simulation'
      description: Topic phrase present
    - value: 'phishing simulation'
      description: Topic phrase, lowercase
    - value: 'this record references the phishing simulation held on file'
      description: Topic phrase within surrounding text
    - value: 'Phishing simulation delivered=500 opened=210 clicked=37 submitted=8 reported=92'
      description: A named simulation with quantified outcome fields reaches the enforcing tiers
    - value: 'Security awareness team scheduled a phishing simulation'
      description: Scheduling prose matches the topic branch only (discovery, no result metrics)
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: 'Campaign results show a click rate of 4 percent'
      description: Marketing metrics no longer satisfy the primary (campaign results / click rate removed from the ID)
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The detector identifies a phishing-simulation result through simulation, campaign-results, click-rate, and report-phish terminology rather than detecting a live phishing credential. A genuine report may identify employees or teams who clicked, submitted data, or failed to report, enabling targeted social engineering and causing employment or reputational harm. The affected scale is the measured cohort and organization, while an adversary must still mount a separate attack to exploit the insight. Risk 8 and SENSITIVE reflect serious but contained personal and operational harm, with higher impact requiring a broad privileged-user roster or protected exercise context.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Evidence_phishing_result_metric
      matches:
        - ref: Evidence_phishing_simulation
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Evidence_phishing_result_metric
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_phishing_simulation
  regexes:
    - id: Pattern_phishing_simulation
      pattern: (?i)\b(?:phishing\s+simulation|phish\s+test|report\s+phish)\b
    - id: Evidence_phishing_result_metric
      pattern: >-
        (?is)\b(?:phishing\s+simulation|phish\s+test)[\s\S]{0,240}\b(?:delivered|opened|clicked|submitted|reported|click\s+rate|report\s+rate)\s*[:=]?\s*\d+(?:\.\d+)?%?
  keywords:
    - id: Evidence_phishing_simulation
      groups:
        - match_style: word
          terms:
            - phishing simulation
            - click rate
            - report phish
            - campaign results
            - security awareness
            - user susceptibility
            - social engineering
            - phish test
            - email simulation
            - threat assessment
            - open rate
            - credential harvest
      strength: specific
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.5.0
    date: '2026-07-17'
    description: >-
      Reduced-scope harden (TP-00410): remove the generic "campaign results" and "click rate"
      alternatives from the primary (a marketing metrics sentence previously reached 85 via
      same-span evidence) and make the retained phishing-simulation/phish-test primary
      explicit. Enforcement now anchors on Evidence_phishing_result_metric (simulation anchor
      within 240 characters of a quantified outcome field): 75 with template exclusion, 85
      with two additional unique phishing-awareness evidence terms. Topic branch stays 65
      discovery_only. Added metric-bearing positive, scheduling discovery case, and marketing
      negative.
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 885 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
