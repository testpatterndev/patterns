schema: testpattern/v1
name: Management Action Plan
slug: au-management-action-plan
version: 1.3.1
type: keyword_list
pattern_class: concept
description: Detects management action plans documenting remediation timelines for audit findings and vulnerabilities.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- DISP
- ISO 27001
- NIST CSF
data_categories:
  - audit
  - governance
test_cases:
  should_match:
    - value: 'Management action plan: remediation plan with due date and responsible officer'
      description: Test match 1
    - value: 'MAP implementation status: corrective action and target completion dates'
      description: Test match 2
    - value: Management response to audit finding with risk treatment and finding closure
      description: Test match 3
  should_not_match:
    - value: Action plan for the marketing campaign
      description: Non-match 1
    - value: Management meeting agenda
      description: Non-match 2
false_positives:
  - description: Generic action plan in non-audit contexts.
    mitigation: Require audit-specific terms like remediation, finding closure, or management response.
exports:
  - yaml
scope: narrow
risk_rating: 4
risk_description: >-
  The keyword concept finds management action or remediation plans tied to findings, responsible officers, due dates, corrective actions, and closure status rather than any generic project action plan. Disclosure may expose delayed work, ownership, or known weaknesses, but a normal plan often records routine governance tasks and lacks exploit instructions or consequential case evidence. The usual impact is low and reversible for one organisation unless the underlying finding is severe. Risk 4 OFFICIAL fits routine remediation tracking; SENSITIVE is not met without actionable vulnerabilities, sensitive investigation facts, serious misconduct, or material non-compliance.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_management_action_plan
      matches:
        - ref: Keyword_audit_finding_classification
        - ref: Keyword_remediation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_management_action_plan
      matches:
        - ref: Keyword_audit_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_management_action_plan
      pattern: >-
        (?i)\b(?:management\s+action\s+plan|corrective\s+action\s+plan|remediation\s+(?:plan|tracking)|audit\s+action\s+(?:plan|items?)|cap\s+(?:tracking|status))\b
  keywords:
    - id: Keyword_audit_finding_classification
      groups:
        - match_style: word
          terms:
            - critical finding
            - high risk finding
            - medium risk finding
            - low risk finding
            - priority one
            - priority two
            - priority three
            - required action
            - audit observation
            - audit exception
            - non-compliance
            - deviation
      strength: specific
    - id: Keyword_remediation
      groups:
        - match_style: word
          terms:
            - remediation
            - remediate
            - corrective action
            - action plan
            - implementation plan
            - due date
            - target date
            - owner
            - responsible
            - follow-up
            - closure
      strength: domain
    - id: Keyword_audit_general
      groups:
        - match_style: word
          terms:
            - internal audit
            - audit report
            - audit findings
            - audit opinion
            - audit scope
            - audit objective
            - audit conclusion
            - audit recommendation
            - IIA standards
            - IPPF
      strength: specific
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 554 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.; Aligned recommended_confidence to 75.
author: testpattern-community
license: MIT
keywords:
  - management action plan
  - MAP
  - remediation plan
  - action item
  - due date
  - responsible officer
  - target completion
  - implementation status
  - risk treatment
  - corrective action
  - management response
  - finding closure
remediation:
  catalog_quality_2026_06_02:
