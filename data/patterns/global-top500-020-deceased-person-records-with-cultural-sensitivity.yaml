schema: testpattern/v1
name: Deceased-person records with cultural sensitivity
slug: global-top500-020-deceased-person-records-with-cultural-sensitivity
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to deceased-person records with cultural sensitivity in international contexts. This information type is classified as personally identifiable information
  under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword
  lists: pii-personal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:deceased\s+person|death\s+record|death\s+certificate|date\s+of\s+death|deceased\s+estate|next\s+of\s+kin|cultural\s+sensitivity|indigenous\s+deceased|deceased\s+notification|burial\s+record)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - deceased-person records with cultural sensitivity
    - deceased
    - person
    - records
    - cultural
    - sensitivity
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - pii-personal
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: deceased person
      description: Primary topic phrase match
    - value: death record
      description: Case-insensitive topic phrase match
    - value: death certificate
      description: Alternative topic phrase match
    - value: date of death
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: >-
      Common words and phrases related to deceased-person records with cultural sensitivity appearing in policy documents, training materials, HR templates, or compliance guidelines without actual
      personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_deceased_records
      matches:
        - ref: Pattern_global_top500_020_deceased_person_records_with_cultural_sensitivity_label_context
        - ref: Keyword_global_top500_020_deceased_person_records_with_cultural_sensitivity_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_deceased_records
      matches:
        - ref: Keyword_deceased_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_deceased_records
      pattern: >-
        (?is)\b(?:deceased\s+person|death\s+record|death\s+certificate|date\s+of\s+death|deceased\s+estate|next\s+of\s+kin|cultural\s+sensitivity|indigenous\s+deceased|deceased\s+notification|burial\s+record)\b
    - id: Pattern_global_top500_020_deceased_person_records_with_cultural_sensitivity_label_context
      pattern: (?i)\b(?:deceased\-person\s+records\s+with\s+cultural\s+sensitivity)\b
  keywords:
    - id: Keyword_deceased_records
      groups:
        - match_style: word
          terms:
            - deceased person
            - death record
            - death certificate
            - date of death
            - deceased estate
            - obituary
            - next of kin
            - cultural sensitivity
            - indigenous deceased
            - probate
            - deceased notification
            - burial record
      strength: specific
    - id: Keyword_global_top500_020_deceased_person_records_with_cultural_sensitivity_domain_context
      groups:
        - match_style: word
          terms:
            - deceased-person records with cultural sensitivity
            - deceased
            - person
            - cultural
            - sensitivity
      strength: domain
risk_description: >-
  The detector finds deceased-person, death-record or certificate, date-of-death, estate, next-of-kin, Indigenous-deceased, notification, burial-record, and cultural-sensitivity terminology with nine personal context terms. A genuine record can expose culturally restricted information, distress family or community members, enable estate fraud, or violate protocols concerning images and details of deceased people. The normal unit is one deceased person and related family or community context with serious but contained cultural, privacy, and financial consequences. Risk 8 and SENSITIVE are justified, while PROTECTED is not met without protected cultural knowledge, severe community harm, a large register, or comparable significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
