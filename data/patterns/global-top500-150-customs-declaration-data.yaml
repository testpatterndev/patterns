schema: testpattern/v1
name: Customs declaration data
slug: global-top500-150-customs-declaration-data
version: 1.2.3
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to customs declaration data in international contexts.
  This is regulated trade and logistics declaration data; it is not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:customs\s+declaration|import\s+declaration|export\s+declaration|HS\s+code|tariff\s+classification|customs\s+duty|country\s+of\s+origin|customs\s+broker|duty\s+rate|border\s+clearance|commercial\s+invoice|bill\s+of\s+entry)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - business
corroborative_evidence:
  keywords:
    - customs declaration data
    - customs
    - declaration
    - data
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: customs declaration
      description: Primary topic phrase match
    - value: import declaration
      description: Case-insensitive topic phrase match
    - value: export declaration
      description: Alternative topic phrase match
    - value: HS code
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to customs declaration data appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_customs_declaration_data
      matches:
        - ref: Pattern_global_top500_150_customs_declaration_data_label_context
        - ref: Keyword_global_top500_150_customs_declaration_data_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_customs_declaration_data
      matches:
        - ref: Keyword_customs_declaration_data
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_customs_declaration_data
      pattern: >-
        (?is)\b(?:customs\s+declaration|import\s+declaration|export\s+declaration|HS\s+code|tariff\s+classification|customs\s+duty|country\s+of\s+origin|customs\s+broker|duty\s+rate|border\s+clearance|commercial\s+invoice|bill\s+of\s+entry)\b
    - id: Pattern_global_top500_150_customs_declaration_data_label_context
      pattern: (?i)\b(?:customs\s+declaration\s+data)\b
  keywords:
    - id: Keyword_customs_declaration_data
      groups:
        - match_style: word
          terms:
            - customs declaration
            - import declaration
            - export declaration
            - HS code
            - tariff classification
            - customs duty
            - country of origin
            - customs broker
            - duty rate
            - border clearance
            - commercial invoice
            - bill of entry
      strength: specific
    - id: Keyword_global_top500_150_customs_declaration_data_domain_context
      groups:
        - match_style: word
          terms:
            - customs declaration data
            - customs
            - declaration
      strength: domain
risk_description: >-
  The detector flags customs or import-export declarations, tariff classifications, origin, duty, broker, clearance, and commercial-invoice language rather than validating a declaration number. A completed declaration can reveal shipper and consignee identities, goods, values, routes, origin, and clearance status that supports cargo targeting, trade fraud, or regulatory evasion. The ordinary unit is one consignment and its trading parties, while customs guidance and blank forms can produce topic hits without live shipment data. Risk 8 and SENSITIVE recognize serious contained commercial and supply-chain harm; PROTECTED would require strategic or hazardous cargo, a critical operation, or other circumstances capable of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
