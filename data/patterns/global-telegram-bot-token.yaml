schema: testpattern/v1
name: Telegram Bot Token
slug: global-telegram-bot-token
version: 1.1.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Telegram Bot API tokens: the numeric bot ID, a colon, and a 35-character
  [A-Za-z0-9_-] secret. A leaked bot token grants full control of the bot -- reading its message
  traffic, sending messages to every chat it belongs to, and hijacking any workflow automation
  built on it.
operation: >-
  Structured value: 7-12 digit bot ID, a colon, then exactly 35 characters of [A-Za-z0-9_-]. The
  35-character secret length is pinned identically by TruffleHog, gitleaks, and Kingfisher. No
  first-letter constraint is imposed: only gitleaks pins a leading A; TruffleHog and Kingfisher
  impose no letter constraint, and TruffleHog's own test fixture treats a B-starting secret as a
  valid token, so an A-pinned regex would miss real token shapes. The digit range spans the
  production detectors' attested 7-10 (Kingfisher 7-10, TruffleHog 8-10) with headroom to 12 for
  bot-ID growth, within gitleaks' looser 5-16 bound (considered too loose to adopt wholesale).
  Known limitation shared with all three production detectors: a token glued directly to the
  canonical URL form (api.telegram.org/bot<token>) is not matched, because the digits are
  letter-adjacent there; the same word-boundary behavior applies to TruffleHog, gitleaks, and
  Kingfisher. Corroborative evidence: keywords within 300 characters.
pattern: (?<![A-Za-z0-9_-])[0-9]{7,12}:[A-Za-z0-9_-]{35}(?![A-Za-z0-9_-])
confidence: medium
confidence_justification: >-
  Medium confidence: the shape is structurally pinned by three independent production detectors
  (35-character secret, numeric-ID:secret layout consistent with Telegram's own Bot API docs
  example) and Telegram Bot Token appears in GitHub's secret-scanning pattern set, which matches
  on the bare shape. The evidentiary split on the secret's first letter is disclosed honestly:
  gitleaks pins a case-sensitive leading A, but TruffleHog and Kingfisher impose no letter
  constraint and TruffleHog's test fixture contains a valid B-starting secret -- so this pattern
  follows the 2-of-3 no-pin majority. It is a digits:string layout rather than a literal vendor
  prefix -- log lines or ratio-like data (epoch:hash) can approximate it -- and both regex-first
  scanners (TruffleHog, gitleaks) choose to context-gate it in their rules, so the value-only
  tier is discovery-grade and the recommended confidence tier requires Telegram keywords in
  proximity.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - telegram
    - telegram.org
    - api.telegram.org
    - TELEGRAM_BOT_TOKEN
    - BotFather
    - bot token
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '1234567890:AABCDEFGHIJKLMNOPQRSTUVWXYZabcdefgh'
      description: Telegram bot token (10-digit bot ID + colon + A-leading 35-char secret)
    - value: 'TELEGRAM_BOT_TOKEN=98765432:AAzyxwvutsrqponmlkjihgfedcba9876543'
      description: Labelled bot token in the canonical env var (8-digit bot ID)
    - value: 'telegram bot token: 123456789:AAabcdefghijklmnopqrstuvwxyz0123456'
      description: Bot token with a preceding Telegram label (9-digit bot ID)
    - value: '987654321:BbcABCDEFGHIJK-abcdefghijklmnopq012'
      description: B-starting secret (mirrors the shape of TruffleHog's own valid test fixture; only gitleaks pins a leading A)
  should_not_match:
    - value: '123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11'
      description: Telegram's own documentation placeholder token (6-digit ID below the 7-digit floor; 34-char secret below the 35-char pin)
    - value: '1234567890:AABCDEFGHIJKLMNOPQRSTUVWXYZabc'
      description: Secret far too short (30 chars, not 35)
    - value: '1234567890:AABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghi'
      description: Secret too long (36 chars, not 35)
    - value: the telegram bot token is stored with BotFather
      description: Prose mention without a token value
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Log or data lines of the form <epoch>:<token> where a 10-digit timestamp is followed by a 35-character [A-Za-z0-9_-] string.
    mitigation: The exact 35-character length and boundary lookarounds make coincidental matches rare; the recommended confidence tier additionally requires Telegram keywords in proximity, and the value-only tier is discovery-grade.
  - description: A token embedded in the canonical URL form https://api.telegram.org/bot<token>/... is NOT detected because the digits are glued to the word "bot".
    mitigation: Documented as a known limitation shared by all three production detectors (identical word-boundary behavior); the surrounding api.telegram.org text still triggers keyword-level review.
  - description: Documentation or examples showing placeholder <digits>:<secret> tokens.
    mitigation: Telegram's own docs placeholder uses a 6-digit ID and does not match; require corroborative Telegram keywords and check for placeholder markers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The medium-confidence regex identifies a Telegram Bot API bearer token as a numeric bot ID, colon, and fixed 35-character secret. A live token gives control of the bot, allowing message access available to it, outbound impersonation, command handling, and abuse of connected automation. The affected scale is the bot and every chat or workflow it can reach, with bot permissions, privacy mode, token rotation, and administrator response containing harm. Risk 8 and SENSITIVE reflect serious contained messaging compromise, while a privileged bot embedded in protected operational workflows would raise the impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_telegram_bot_token
      matches:
        - ref: Keyword_telegram_bot_token
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_telegram_bot_token
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_telegram_bot_token
      pattern: (?<![A-Za-z0-9_-])[0-9]{7,12}:[A-Za-z0-9_-]{35}(?![A-Za-z0-9_-])
  keywords:
    - id: Keyword_telegram_bot_token
      groups:
        - match_style: word
          terms:
            - text: Telegram
              case_sensitive: true
            - telegram.org
            - api.telegram.org
            - TELEGRAM_BOT_TOKEN
            - text: BotFather
              case_sensitive: true
            - telegram bot
            - bot token
      strength: specific
