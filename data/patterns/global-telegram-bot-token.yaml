references:
  - url: https://core.telegram.org/bots/api
    title: 'Telegram Bot API docs (token example 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11 in Authorizing your bot)'
  - url: https://github.com/trufflesecurity/trufflehog/blob/main/pkg/detectors/telegrambottoken/telegrambottoken.go
    title: 'TruffleHog production Telegram detector (label-gated [0-9]{8,10}:[a-zA-Z0-9_-]{35}, no letter pin; its test fixture includes a valid B-starting secret)'
  - url: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
    title: 'gitleaks.toml telegram-bot-api-token rule ([0-9]{5,16}:(?-i:A)[a-z0-9_-]{34}; the only scanner that pins a leading A)'
  - url: https://github.com/mongodb/kingfisher/blob/main/crates/kingfisher-rules/data/rules/telegram.yml
    title: 'Kingfisher production Telegram rule (label-gated [0-9]{7,10}:[A-Z0-9_-]{35} case-insensitive)'
  - url: https://docs.github.com/en/code-security/secret-scanning/introduction/supported-secret-scanning-patterns
    title: Supported secret scanning patterns - GitHub Docs (Telegram Bot Token in the scanned pattern set)
