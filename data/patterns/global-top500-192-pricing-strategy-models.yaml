schema: testpattern/v1
name: Pricing strategy models
slug: global-top500-192-pricing-strategy-models
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to pricing strategy models in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:pricing\s+strategy|price\s+model|pricing\s+optimization|margin\s+analysis|discount\s+structure|price\s+elasticity|competitive\s+pricing|cost[\s-]+plus\s+pricing|price\s+sensitivity|revenue\s+optimization|pricing\s+tier)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - pricing strategy models
    - pricing
    - strategy
    - models
    - mergers
    - acquisitions
  proximity: 300
test_cases:
  should_match:
    - value: pricing strategy
      description: Primary topic phrase match
    - value: price model
      description: Case-insensitive topic phrase match
    - value: pricing optimization
      description: Alternative topic phrase match
    - value: margin analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to pricing strategy models appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_pricing_strategy
      matches:
        - ref: Pattern_global_top500_192_pricing_strategy_models_label_context
        - ref: Keyword_global_top500_192_pricing_strategy_models_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_pricing_strategy
      matches:
        - ref: Keyword_pricing_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_pricing_strategy
      pattern: >-
        (?is)\b(?:pricing\s+strategy|price\s+model|pricing\s+optimization|margin\s+analysis|discount\s+structure|price\s+elasticity|competitive\s+pricing|cost[\s-]+plus\s+pricing|price\s+sensitivity|revenue\s+optimization|pricing\s+tier)\b
    - id: Pattern_global_top500_192_pricing_strategy_models_label_context
      pattern: (?i)\b(?:pricing\s+strategy\s+models)\b
  keywords:
    - id: Keyword_pricing_strategy
      groups:
        - match_style: word
          terms:
            - pricing strategy
            - price model
            - pricing optimization
            - margin analysis
            - discount structure
            - price elasticity
            - competitive pricing
            - cost-plus pricing
            - price sensitivity
            - revenue optimization
            - pricing tier
      strength: specific
    - id: Keyword_global_top500_192_pricing_strategy_models_domain_context
      groups:
        - match_style: word
          terms:
            - pricing strategy models
            - pricing
            - strategy
            - models
      strength: domain
risk_description: >-
  This concept pattern recognizes pricing strategy, price models, optimization, margin analysis, elasticity, discount structures, and pricing tiers without extracting an operative model. A true match may reveal a commercial topic or analytical approach and give a competitor a lead, while practical undercutting requires current prices, cost assumptions, customer segments, coefficients, or approval rules. Standalone harm is therefore bounded and usually reversible because the matched wording does not establish live pricing control. Risk 5 and OFFICIAL are appropriate; a current parameterized model, confidential margin table, or customer-specific pricing strategy would cross toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
