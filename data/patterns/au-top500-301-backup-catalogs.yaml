schema: testpattern/v1
name: Backup catalogs
slug: au-top500-301-backup-catalogs
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies machine or operator backup-catalog records rather than backup governance
  generally: enforcement requires a structured catalog entry (job/set/media/object field with
  a completion time, location, or status), while schedule and retention-policy vocabulary
  remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Topic phrases (backup catalog, backup index,
  restore point, retention policy) feed a 65 discovery-only tier; enforcement requires
  Evidence_backup_catalog_entry — a backup job/set, media, object, or restore-index field
  within 200 characters of a completed/timestamp/location/status field — at 75, with
  additional backup-domain evidence raising it to 85. The shared template exclusion vetoes
  tutorial/demo text at enforcement tiers.
pattern: (?i)\b(?:backup\s+catalog|backup\s+index|restore\s+point|retention\s+policy)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - backup catalogs
    - backup
    - catalogs
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: 'Backup catalog'
      description: Topic phrase present
    - value: 'backup catalog'
      description: Topic phrase, lowercase
    - value: 'this record references the backup catalog held on file'
      description: Topic phrase within surrounding text
    - value: 'Backup catalog job ID=BK-771 object=fileserver01 set=FULL-44 completed=2026-07-15T23:00 location=tape-LTO9-18 status=verified'
      description: A structured catalog entry (job, object, completion, medium, status) reaches the enforcing tiers
    - value: 'Retention policy requires weekly restore points'
      description: Governance language matches the topic branch only (discovery, no indexed entry)
    - value: 'The library catalog retention policy changed'
      description: Cross-domain "retention policy" keeps a discovery-level topic hit only (relabeled from the first-pass no-match expectation)
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The detector identifies a composite backup catalog through backup-index, restore-point, and retention-policy language rather than detecting backup credentials or payload data. A genuine catalog can show what is protected, where recovery copies exist, which restore points matter, and how long they persist, helping a ransomware actor target recovery capability. The affected scale is the organization's cataloged services, although an attacker still needs access to delete, encrypt, or corrupt the backups. Risk 8 and SENSITIVE reflect serious contained resilience harm, while direct backup-control credentials or a critical-service master catalog would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Evidence_backup_catalog_entry
      matches:
        - ref: Evidence_backup_catalog
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Evidence_backup_catalog_entry
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_backup_catalog
  regexes:
    - id: Pattern_backup_catalog
      pattern: (?i)\b(?:backup\s+catalog|backup\s+index|restore\s+point|retention\s+policy)\b
    - id: Evidence_backup_catalog_entry
      pattern: >-
        (?is)\b(?:backup\s+(?:job|set)|media|object|restore\s+index)\s*(?:id)?\s*[:=]\s*\S+[\s\S]{0,200}\b(?:completed|timestamp|location|status)\s*[:=]
  keywords:
    - id: Evidence_backup_catalog
      groups:
        - match_style: word
          terms:
            - backup catalog
            - backup index
            - restore point
            - retention policy
            - backup schedule
            - recovery point
            - tape rotation
            - offsite backup
            - incremental backup
            - full backup
            - backup verification
            - data restoration
      strength: specific
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.5.0
    date: '2026-07-17'
    description: >-
      Reduced-scope harden (TP-00418): retention/schedule vocabulary no longer enforces (a
      retention-policy planning sentence previously reached 85 via same-span evidence).
      Enforcement now anchors on Evidence_backup_catalog_entry (backup job/set, media, object,
      or restore-index field within 200 characters of completed/timestamp/location/status): 75
      with template exclusion, 85 with two additional unique backup-domain evidence terms. The
      topic branch (including "retention policy") stays 65 discovery_only, so the library-
      catalog neutral case is expected as a discovery hit per the independent correction.
      Added catalog-entry positive and governance/cross-domain discovery cases.
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 893 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
