schema: testpattern/v1
name: Legal advice memoranda
slug: global-top500-163-legal-advice-memoranda
version: 1.2.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to legal advice memoranda in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:legal\s+advice\s+memoranda|legal\s+opinion|legal\s+memorandum|legal\s+counsel|solicitor\s+advice|legal\s+professional\s+privilege|privileged\s+communication|without\s+prejudice|legal\s+risk\s+assessment|general\s+counsel|in[\s-]+house\s+counsel|legal\s+briefing)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - legal advice memoranda
    - legal
    - advice
    - memoranda
    - corporate
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: legal advice memoranda
      description: Primary topic phrase match
    - value: legal opinion
      description: Case-insensitive topic phrase match
    - value: legal memorandum
      description: Alternative topic phrase match
    - value: legal counsel
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to legal advice memoranda appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_legal_advice_memoranda
      matches:
        - ref: Pattern_global_top500_163_legal_advice_memoranda_label_context
        - ref: Keyword_global_top500_163_legal_advice_memoranda_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_legal_advice_memoranda
      matches:
        - ref: Keyword_legal_advice_memoranda
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_legal_advice_memoranda
      pattern: >-
        (?is)\b(?:legal\s+advice\s+memoranda|legal\s+opinion|legal\s+memorandum|legal\s+counsel|solicitor\s+advice|legal\s+professional\s+privilege|privileged\s+communication|without\s+prejudice|legal\s+risk\s+assessment|general\s+counsel|in[\s-]+house\s+counsel|legal\s+briefing)\b
    - id: Pattern_global_top500_163_legal_advice_memoranda_label_context
      pattern: (?i)\b(?:legal\s+advice\s+memoranda)\b
  keywords:
    - id: Keyword_legal_advice_memoranda
      groups:
        - match_style: word
          terms:
            - legal advice memoranda
            - legal opinion
            - legal memorandum
            - legal counsel
            - solicitor advice
            - legal professional privilege
            - privileged communication
            - without prejudice
            - legal risk assessment
            - general counsel
            - in-house counsel
            - legal briefing
      strength: specific
    - id: Keyword_global_top500_163_legal_advice_memoranda_domain_context
      groups:
        - match_style: word
          terms:
            - legal advice memoranda
            - legal
            - advice
            - memoranda
      strength: domain
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Legal"
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
