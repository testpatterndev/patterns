schema: testpattern/v1
name: Supplier quality audit findings
slug: global-top500-229-supplier-quality-audit-findings
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to supplier quality audit findings in Australian contexts. Higher confidence identifies populated supplier quality audit findings (finding/observation/NC
  identifiers with supplier context and severity, clause, evidence, or corrective-action detail) rather than audit administration; supplier-audit vocabulary alone remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:supplier\s+quality\s+audit\s+findings|supplier\s+audit|vendor\s+assessment|supplier\s+evaluation|audit\s+findings|quality\s+inspection|supplier\s+scorecard|procurement\s+audit|supply\s+chain\s+quality|vendor\s+qualification)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - business
  - audit
corroborative_evidence:
  keywords:
    - supplier quality audit findings
    - supplier
    - quality
    - audit
    - findings
    - product
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: supplier quality audit findings
      description: Primary topic phrase match
    - value: supplier audit
      description: Case-insensitive topic phrase match
    - value: vendor assessment
      description: Alternative topic phrase match
    - value: supplier evaluation
      description: Additional topic phrase match
    - value: 'FINDING-27 Supplier: NorthFab; major deficiency against clause 8.4; evidence: expired calibration; corrective action due 30 Aug.'
      description: Supplier-linked finding with severity, clause, evidence, and remediation (enforces at 75/85)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: Supplier audit is scheduled for October using the vendor qualification checklist.
      description: Audit planning without a populated finding — discovery only, must not enforce
    - value: The school supplier delivered quality art paper.
      description: Supplier and quality in ordinary purchasing prose must not match
    - value: Sample supplier audit finding OBS-01 with placeholder evidence.
      description: Sample/placeholder indicates an unpopulated example — suppressed from enforcement
    - value: supplier audit
      description: Activity label alone cannot serve as finding evidence — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to supplier quality audit findings appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_supplier_audit_finding
      matches:
        - ref: Evidence_supplier_quality_audit
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_supplier_audit_finding
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_supplier_quality_audit
      matches:
        - ref: Evidence_supplier_quality_audit
  regexes:
    - id: Pattern_supplier_quality_audit
      pattern: >-
        (?is)\b(?:supplier\s+quality\s+audit\s+findings|supplier\s+audit|vendor\s+assessment|supplier\s+evaluation|audit\s+findings|quality\s+inspection|supplier\s+scorecard|procurement\s+audit|supply\s+chain\s+quality|vendor\s+qualification)\b
    - id: Pattern_au_top500_229_supplier_quality_audit_findings_label_context
      pattern: (?i)\b(?:supplier\s+quality\s+audit\s+findings)\b
    - id: Pattern_supplier_audit_finding
      pattern: >-
        (?is)\b(?:FINDING|OBS|NC)[-_ ]?\d{2,8}\b[\s\S]{0,220}\b(?:supplier|vendor)\b[\s\S]{0,220}\b(?:severity|clause|evidence|deficiency|corrective action|due date|closed)\b
  keywords:
    - id: Evidence_supplier_quality_audit
      groups:
        - match_style: word
          terms:
            - supplier quality audit findings
            - supplier audit
            - vendor assessment
            - supplier evaluation
            - audit findings
            - quality inspection
            - supplier scorecard
            - procurement audit
            - supply chain quality
            - vendor qualification
    - id: Keyword_au_top500_229_supplier_quality_audit_findings_domain_context
      groups:
        - match_style: word
          terms:
            - supplier quality audit findings
            - supplier
            - quality
            - audit
            - findings
risk_description: >-
  The regex targets supplier quality audits, findings, nonconformities, corrective actions, and vendor assessments, with the intended unit being audit evidence rather than a routine supplier score. A genuine finding can reveal defective processes, control failures, unclosed remediation, and product or safety exposure, allowing a supplier to conceal evidence, competitors to exploit weakness, or customers and regulators to lose confidence. The medium-confidence concept rule may also match audit templates, completed corrective-action reports, and generic quality guidance. Risk 8 and SENSITIVE Legal reflect serious contained control and liability harm; PROTECTED would require safety-critical systemic defects or operational compromise capable of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
