- url: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
  title: gitleaks.toml notion-api-token rule (ntn_[0-9]{11}[A-Za-z0-9]{32}[A-Za-z0-9]{3})
- url: https://github.com/mongodb/kingfisher/blob/main/crates/kingfisher-rules/data/rules/notion.yml
  title: Kingfisher production Notion rules (ntn_ value-only 11+35; legacy secret_ context-gated on a notion label)
- url: https://github.com/trufflesecurity/trufflehog/blob/main/pkg/detectors/notion/notion.go
  title: TruffleHog production Notion detector (legacy secret_[A-Za-z0-9]{43})
