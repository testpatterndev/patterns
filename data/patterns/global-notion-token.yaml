schema: testpattern/v1
name: Notion Token
slug: global-notion-token
version: 1.1.3
type: regex
pattern_class: identifier
engine: universal
description: 'Detects Notion integration tokens in both live formats: the current ntn_ prefix (issued to all new integrations since 25 September
  2024) and, when labelled with Notion context, the legacy secret_ prefix (existing tokens remain valid indefinitely). A leaked integration token
  grants API access to every page and database the integration has been connected to.'
operation: 'Two detection branches. Branch 1 (distinctive, value-only capable): ntn_ tokens with an 11-digit workspace segment followed by 35
  alphanumeric characters -- the exact structure pinned independently by gitleaks and Kingfisher. Branch 2 (context-gated only): legacy secret_
  tokens (secret_ + exactly 43 alphanumerics, per TruffleHog''s production detector) -- because "secret_" is also a generic identifier fragment
  in source code (client_secret_..., secret_key_...), this branch requires a preceding Notion label, following Kingfisher''s production precedent,
  and a non-identifier character immediately before secret_ so composites like client_secret_ cannot fire. Notion''s own changelog advises against
  regex-validating its tokens, so both branches lean on corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_-])ntn_[0-9]{11}[A-Za-z0-9]{35}(?![A-Za-z0-9_-])
confidence: high
confidence_justification: 'High confidence: the ntn_ format is multiply attested -- Notion''s own developer changelog announced the prefix change
  (25 September 2024, explicitly for secret-scanner compatibility), Notion is a GitHub secret-scanning partner with push protection enabled, and
  gitleaks and Kingfisher independently pin the identical body structure (11 digits + 35 alphanumerics). The legacy secret_ format is pinned at
  43 alphanumerics by TruffleHog and confirmed by GitGuardian''s v1/v2 detector split; it is deliberately context-gated because its prefix is
  a generic English word that appears inside longer identifiers. Notion itself warns that token formats may change and recommends treating tokens
  as opaque -- reflected in the bounded, evidence-pinned regexes and the corroborative keyword requirement at the recommended confidence tier.'
jurisdictions:
- global
regulations:
- Criminal Code Act 1995 (Cth)
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - notion
  - notion.so
  - NOTION_TOKEN
  - NOTION_API_KEY
  - integration token
  - api key
  proximity: 300
  keyword_lists:
  - credentials
  - data-record-context
  - generic-data-labels
test_cases:
  should_match:
  - value: ntn_12345678901ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghi
    description: Notion integration token, current ntn_ format (11-digit segment + 35 alphanumerics)
  - value: NOTION_TOKEN=ntn_98765432109abcdefghijklmnopqrstuvwxyzABCDEFGHI
    description: Labelled ntn_ token in an env assignment
  - value: 'notion integration token: secret_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopq'
    description: Legacy secret_ token (43 alphanumerics) with a preceding Notion label (context-gated branch)
  - value: NOTION_API_KEY=secret_zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJ
    description: Legacy secret_ token in the canonical env-var assignment (label supplied by the variable name)
  - value: Notion token "secret_0123456789012345678901234567890123456789012"
    description: Legacy secret_ token quoted in prose after a Notion label
  should_not_match:
  - value: ntn_1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijk
    description: Digit segment too short (10 digits, not 11)
  - value: secret_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopq
    description: Bare legacy-format value with no Notion label anywhere ("secret_" alone is too generic to fire value-only)
  - value: unrelated generic text without domain phrases
    description: Safe non-domain negative
  - value: unrelated generic text without domain phrases
    description: Safe non-domain negative
  - value: template example placeholder record identifier
    description: Template/sample context should be excluded even when anchor words are present
false_positives:
- description: Identifier fragments like client_secret_... or secret_key_... near the word "notion" in source code or documentation.
  mitigation: The legacy branch requires a non-identifier character immediately before secret_ (enforced by lookbehind) and exactly 43 alphanumerics
    followed by a boundary, which composite identifiers essentially never satisfy.
- description: The common English word "notion" appearing in unrelated prose near an unrelated token.
  mitigation: The brand-name keyword term is case-sensitive (Notion, capitalised) and unambiguous terms (notion.so, NOTION_TOKEN) disambiguate;
    the ntn_ branch does not depend on the word at all.
- description: Notion advises against regex-identifying its tokens because formats may change; future format revisions may not be matched.
  mitigation: Documented as a known scope limitation; both currently-issued formats are pinned to multiply-attested structures and the pattern
    will need a version bump if Notion changes formats again.
exports:
- purview_xml
- yaml
- regex_copy
scope: narrow
risk_rating: 8
risk_description: The high-confidence regex identifies current ntn_ Notion integration tokens and a Notion-labelled legacy secret_ token while
  excluding generic client_secret fragments. A live integration token can read or modify every page and database explicitly connected to that
  integration, exposing workspace content and automations. The affected scale is the integration's shared content rather than the entire Notion
  tenant by default, with granted pages, capabilities, and revocation limiting harm. Risk 8 and SENSITIVE reflect serious contained workspace
  compromise, while a broadly connected integration holding protected operational content would raise the impact.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: &id001
      type: any
      ids:
      - Regex_notion_token
      - Regex_notion_legacy_token
    min_count: 2
    matches:
    - ref: Keyword_vendor_secret_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: *id001
    matches:
    - ref: Keyword_vendor_secret_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: *id001
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_notion_token
    pattern: (?<![A-Za-z0-9_-])ntn_[0-9]{11}[A-Za-z0-9]{35}(?![A-Za-z0-9_-])
  - id: Regex_notion_legacy_token
    pattern: (?i)notion[\s\S]{0,40}?(?<![A-Za-z0-9_-])secret_[A-Za-z0-9]{43}(?![A-Za-z0-9_-])
  keywords:
  - id: Keyword_notion_token
    groups:
    - match_style: word
      terms:
      - text: Notion
        case_sensitive: true
      - notion.so
      - NOTION_TOKEN
      - NOTION_API_KEY
      - notion api
      - integration token
      - api key
    strength: specific
  - id: Keyword_vendor_secret_context
    strength: specific
    groups:
    - match_style: string
      terms:
      - notion
      - notion token
      - notion secret
      - NOTION_
      - API_KEY
      - ACCESS_TOKEN
      - AUTH_TOKEN
