schema: testpattern/v1
name: Sole-source justification memos
slug: global-top500-159-sole-source-justification-memos
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to sole-source justification memos in international contexts.
  These are procurement-governance and commercial justification records; they are not inherently personally identifiable information.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:sole[\s-]+source\s+justification\s+memos|sole\s+source|sole\s+supplier|single\s+source|limited\s+tender|direct\s+procurement|justification\s+memo|procurement\s+exemption|market\s+analysis|vendor\s+selection|proprietary\s+supplier)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - sole-source justification memos
    - sole
    - source
    - justification
    - memos
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: sole-source justification memos
      description: Primary topic phrase match
    - value: sole source
      description: Case-insensitive topic phrase match
    - value: sole supplier
      description: Alternative topic phrase match
    - value: single source
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to sole-source justification memos appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_sole_source_justification
      matches:
        - ref: Pattern_global_top500_159_sole_source_justification_memos_label_context
        - ref: Keyword_global_top500_159_sole_source_justification_memos_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_sole_source_justification
      matches:
        - ref: Keyword_sole_source_justification
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_sole_source_justification
      pattern: >-
        (?is)\b(?:sole[\s-]+source\s+justification\s+memos|sole\s+source|sole\s+supplier|single\s+source|limited\s+tender|direct\s+procurement|justification\s+memo|procurement\s+exemption|market\s+analysis|vendor\s+selection|proprietary\s+supplier)\b
    - id: Pattern_global_top500_159_sole_source_justification_memos_label_context
      pattern: (?i)\b(?:sole\-source\s+justification\s+memos)\b
  keywords:
    - id: Keyword_sole_source_justification
      groups:
        - match_style: word
          terms:
            - sole-source justification memos
            - sole source
            - sole supplier
            - single source
            - non-competitive
            - limited tender
            - direct procurement
            - justification memo
            - procurement exemption
            - market analysis
            - vendor selection
            - proprietary supplier
      strength: specific
    - id: Keyword_global_top500_159_sole_source_justification_memos_domain_context
      groups:
        - match_style: word
          terms:
            - sole-source justification memos
            - sole
            - source
            - justification
            - memos
      strength: domain
risk_description: >-
  This concept pattern looks for sole-source, sole-supplier, single-source, and justification-memo language indicating why competition was not used for a procurement. A genuine memo can reveal supplier selection, urgency, alternatives considered, pricing assumptions, and approval reasoning, enabling lobbying, criticism, or manipulation when a procurement is still active. Procurement rules and template justifications can match, and one ordinary memo does not expose system access or a full evaluation dossier. Risk 5 OFFICIAL reflects bounded commercial and process harm; SENSITIVE would require security-sensitive procurement, active high-value negotiations, protected operational requirements, corruption evidence, or a strategic procurement programme.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
