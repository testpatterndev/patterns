schema: testpattern/v1
name: Sole-source justification memos
slug: global-top500-159-sole-source-justification-memos
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to sole-source justification memos in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:sole[\s-]+source\s+justification\s+memos|sole\s+source|sole\s+supplier|single\s+source|limited\s+tender|direct\s+procurement|justification\s+memo|procurement\s+exemption|market\s+analysis|vendor\s+selection|proprietary\s+supplier)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - sole-source justification memos
    - sole
    - source
    - justification
    - memos
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: sole-source justification memos
      description: Primary topic phrase match
    - value: sole source
      description: Case-insensitive topic phrase match
    - value: sole supplier
      description: Alternative topic phrase match
    - value: single source
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to sole-source justification memos appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_sole_source_justification
      matches:
        - ref: Pattern_global_top500_159_sole_source_justification_memos_label_context
        - ref: Keyword_global_top500_159_sole_source_justification_memos_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_159_sole_source_justification_memos_noise_exclusion
    - confidence_level: 75
      id_match: Regex_sole_source_justification
      matches:
        - ref: Keyword_sole_source_justification
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_159_sole_source_justification_memos_noise_exclusion
    - confidence_level: 65
      id_match: Regex_sole_source_justification
      matches:
        - ref: Keyword_sole_source_justification
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_159_sole_source_justification_memos_noise_exclusion
  regexes:
    - id: Regex_sole_source_justification
      pattern: (?is)\b(?:sole[\s-]+source\s+justification\s+memos|sole\s+source|sole\s+supplier|single\s+source|limited\s+tender|direct\s+procurement|justification\s+memo|procurement\s+exemption|market\s+analysis|vendor\s+selection|proprietary\s+supplier)\b
    - id: Pattern_global_top500_159_sole_source_justification_memos_label_context
      pattern: (?i)\\b(?:sole\-source\\s+justification\\s+memos|sole|source|justification|memos|top500)\\b
  keywords:
    - id: Keyword_sole_source_justification
      groups:
        - match_style: word
          terms:
            - sole-source justification memos
            - sole source
            - sole supplier
            - single source
            - non-competitive
            - limited tender
            - direct procurement
            - justification memo
            - procurement exemption
            - market analysis
            - vendor selection
            - proprietary supplier
    - id: Keyword_global_top500_159_sole_source_justification_memos_domain_context
      groups:
        - match_style: word
          terms:
            - sole-source justification memos
            - sole
            - source
            - justification
            - memos
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_159_sole_source_justification_memos_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
