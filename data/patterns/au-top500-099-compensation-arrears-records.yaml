schema: testpattern/v1
name: Compensation arrears records
slug: au-top500-099-compensation-arrears-records
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to compensation arrears records in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: industry-hr.
pattern: >-
  (?is)\b(?:compensation\s+arrears|back\s+pay|arrears\s+payment|salary\s+arrears|wage\s+underpayment|retrospective\s+pay|pay\s+adjustment|enterprise\s+agreement|award\s+rate|Fair\s+Work|underpayment\s+remediation|arrears\s+calculation)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - compensation arrears records
    - compensation
    - arrears
    - records
    - payroll
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: compensation arrears
      description: Primary topic phrase match
    - value: back pay
      description: Case-insensitive topic phrase match
    - value: arrears payment
      description: Alternative topic phrase match
    - value: salary arrears
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_compensation_arrears_records
      matches:
        - ref: Evidence_compensation_arrears_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_compensation_arrears_records
      matches:
        - ref: Evidence_compensation_arrears_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_compensation_arrears_records
      matches:
        - ref: Evidence_compensation_arrears_records
  regexes:
    - id: Pattern_compensation_arrears_records
      pattern: >-
        (?is)\b(?:compensation\s+arrears|back\s+pay|arrears\s+payment|salary\s+arrears|wage\s+underpayment|retrospective\s+pay|pay\s+adjustment|enterprise\s+agreement|award\s+rate|Fair\s+Work|underpayment\s+remediation|arrears\s+calculation)\b
  keywords:
    - id: Evidence_compensation_arrears_records
      groups:
        - match_style: word
          terms:
            - compensation arrears
            - back pay
            - arrears payment
            - salary arrears
            - wage underpayment
            - retrospective pay
            - pay adjustment
            - enterprise agreement
            - award rate
            - Fair Work
            - underpayment remediation
            - arrears calculation
risk_description: >-
  The concept regex identifies compensation arrears, back pay, underpayment, retrospective pay, adjustments, award rates, enterprise agreements, and remediation terms. A populated arrears calculation may reveal an employee's salary and workplace dispute, but the detector does not require a worker, amount, period, or calculation record. The employee or employer faces meaningful financial or reputational harm only with those details, while Fair Work guidance and industrial-relations material are common matches. Risk 4 OFFICIAL reflects the broad topic signal; SENSITIVE would require an attributable compensation case or detailed arrears schedule.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
