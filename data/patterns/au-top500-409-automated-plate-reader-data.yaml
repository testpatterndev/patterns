  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 90
      id_match: Pattern_automated_plate_reader_data
      matches:
        - ref: Pattern_au_top500_409_automated_plate_reader_data_label_context
        - ref: Keyword_au_top500_409_automated_plate_reader_data_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_409_automated_plate_reader_data_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_automated_plate_reader_data
      matches:
        - ref: Evidence_automated_plate_reader_data
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_409_automated_plate_reader_data_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_automated_plate_reader_data
      matches:
        - ref: Evidence_automated_plate_reader_data
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
