schema: testpattern/v1
name: Police Use-of-Force Investigation (Internal)
slug: police-use-of-force-investigation-internal
version: 1.3.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects internal investigation documents of police use of lethal or serious force, including compelled officer statements under s.7.2 PPRA and Ethical Standards Command evidence before investigation completion.
operation: 'Keyword proximity: primary keywords (critical incident, police shooting investigation, use of force investigation, Ethical Standards Command, ESC investigation) within 300 characters of officer identifiers and compulsion markers. Document markers from QPS ESC templates. Negative keyword exclusion for published findings and media.'
pattern: (?i)\b(critical\s+incident\s+(?:investigation|report|review)|police\s+shooting\s+investigation|use\s+of\s+force\s+investigation|Ethical\s+Standards\s+Command|ESC\s+investigation|discharge\s+of\s+firearm\s+(?:investigation|report)|lethal\s+force\s+review)\b
confidence: medium
confidence_justification: 'Medium confidence: requires internal investigation terminology with officer identifiers and ESC markers. Compelled statement references are unique to genuine internal affairs files.'
jurisdictions:
  - au
regulations:
- "PPRA 2000 (Qld)"
- "Police Service Admin Act 1990 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - RESTRICTED
    - INTERNAL INVESTIGATION
    - Ethical Standards Command
    - ESC
    - self-incrimination notice
    - s.7.2 PPRA
    - compelled statement
    - body-worn camera
    - tactical assessment
    - discharge report
  proximity: 300
  keyword_lists:

    - law-enforcement

    - government-services
    - en-government-classification
test_cases:
  should_match:
    - value: 'PROTECTED — INTERNAL INVESTIGATION. QPS Ethical Standards Command — Critical Incident Investigation. Police shooting, Ipswich 14/01/2025. Subject officer: SC M. DAVIES, Reg 18742. Discharge of firearm report. Self-incrimination notice under s.7.2 PPRA. Compelled statement obtained. Body-worn camera under review.'
      description: ESC critical incident investigation with compelled statement
    - value: 'RESTRICTED — Internal Investigation. Use of force investigation — lethal force review. ESC-2025-0034. Taser and firearm use during pursuit. Tactical assessment: force may be disproportionate. Self-incrimination notice served. Compelled statements not admissible criminally.'
      description: ESC use-of-force investigation with tactical assessment
    - value: Critical incident report — preliminary. Police shooting investigation commenced. ESC team deployed. Self-incrimination notices issued. Body-worn camera secured. Parallel coronial and CCC oversight.
      description: Preliminary critical incident report
  should_not_match:
    - value: 'The CCC published its annual report: 23 critical incidents investigated. Recommended improved use of force training.'
      description: Published CCC annual report
    - value: Media reported a police shooting in Ipswich. ESC and CCC investigating. Officer on administrative duties.
      description: News report about police shooting
    - value: QPS Training Academy use of force scenarios. Recruits demonstrate force escalation. Simulated critical incidents.
      description: Police training curriculum
false_positives:
  - description: Published oversight body reports
    mitigation: 'Negative keyword exclusion: ''annual report'', ''published'', ''recommendations''. Require compelled statement references.'
  - description: Media reporting on use-of-force incidents
    mitigation: 'Negative keyword exclusion: ''media'', ''news'', ''reported'', ''administrative duties'''
  - description: Police training materials
    mitigation: 'Negative keyword exclusion: ''training'', ''Training Academy'', ''scenario'', ''recruit'', ''simulated'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_police_use_of_force_investigation_internal_use_of_force_terms
      matches:
        - ref: Evidence_police_use_of_force_investigation_internal_primary_keywords
        - ref: Evidence_police_use_of_force_investigation_internal_classification_markers
        - ref: Evidence_police_use_of_force_investigation_internal_corroborative_terms
        - ref: Pattern_police_use_of_force_investigation_internal_esc_file_reference
        - ref: Pattern_police_use_of_force_investigation_internal_ppra_compulsion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_police_use_of_force_investigation_internal_exclusion
    - confidence_level: 75
      id_match: Pattern_police_use_of_force_investigation_internal_use_of_force_terms
      matches:
        - ref: Evidence_police_use_of_force_investigation_internal_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_police_use_of_force_investigation_internal_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_police_use_of_force_investigation_internal_use_of_force_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_police_use_of_force_investigation_internal_exclusion
  regexes:
    - id: Pattern_police_use_of_force_investigation_internal_use_of_force_terms
      pattern: (?i)\b(critical\s+incident|police\s+shooting\s+investigation|use\s+of\s+force\s+investigation|Ethical\s+Standards\s+Command|ESC\s+investigation|discharge\s+of\s+firearm|lethal\s+force\s+review)\b
    - id: Pattern_police_use_of_force_investigation_internal_esc_file_reference
      pattern: \bESC-\d{4}-\d{3,5}\b
    - id: Pattern_police_use_of_force_investigation_internal_ppra_compulsion
      pattern: (?i)\bs\.?\s*7\.2\s+PPRA\b
  keywords:
    - id: Evidence_police_use_of_force_investigation_internal_primary_keywords
      groups:
        - match_style: word
          terms:
            - critical incident investigation
            - police shooting investigation
            - use of force investigation
            - Ethical Standards Command
            - ESC investigation
            - discharge of firearm
            - lethal force review
      strength: specific
    - id: Evidence_police_use_of_force_investigation_internal_classification_markers
      groups:
        - match_style: word
          terms:
            - INTERNAL INVESTIGATION
      strength: specific
    - id: Evidence_police_use_of_force_investigation_internal_corroborative_terms
      groups:
        - match_style: word
          terms:
            - self-incrimination notice
            - s.7.2 PPRA
            - compelled statement
            - body-worn camera
            - tactical assessment
            - discharge report
            - CCC oversight
      strength: specific
    - id: Filter_police_use_of_force_investigation_internal_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - annual report
            - recommendations
            - news
            - reported
            - training
            - Training Academy
            - scenario
            - recruit
            - simulated

      strength: noise
risk_rating: 7
risk_description: >-
  This detector identifies an incomplete internal investigation into police lethal or serious force, including subject officers, compelled statements, body-worn evidence, tactical assessments, and Ethical Standards Command findings. Disclosure can prejudice parallel criminal or coronial processes, expose witnesses and officers, undermine procedural fairness, and allow evidence or testimony to be coordinated before investigators finish. Published oversight findings, media reporting, and training are excluded, leaving one bounded internal matter rather than a force-wide integrity system. Risk 7 supports SENSITIVE Legal; PROTECTED would require protected witnesses, immediate retaliation risk, or compromise of multiple major investigations.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
