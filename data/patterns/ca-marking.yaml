    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: marking — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.0.0
    date: '2026-07-07'
    description: Initial release — verified Canada-distinctive Protected A/B/C designation (title-case and ALL-CAPS) at tier 85, and Canada-government-context-gated bare TOP SECRET (75) and CONFIDENTIAL/SECRET (65) classified tiers, per direct verification against the Treasury Board Standard on Security Categorization. French-language markings documented as a coverage gap.
