schema: testpattern/v1
name: Customer account credentials
slug: global-top500-362-customer-account-credentials
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to customer account credentials in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:account\s+credentials|login\s+credentials|password\s+hash|authentication\s+token|access\s+credentials|customer\s+account|account\s+security|password\s+reset|multi[\s-]+factor\s+authentication|credential\s+store|secret\s+key)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - customer account credentials
    - customer
    - account
    - credentials
    - commercial
    - data
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: account credentials
      description: Primary topic phrase match
    - value: login credentials
      description: Case-insensitive topic phrase match
    - value: password hash
      description: Alternative topic phrase match
    - value: authentication token
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to customer account credentials appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_customer_credentials
      matches:
        - ref: Pattern_global_top500_362_customer_account_credentials_label_context
        - ref: Keyword_global_top500_362_customer_account_credentials_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_customer_credentials
      matches:
        - ref: Keyword_customer_credentials
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_customer_credentials
      matches:
        - ref: Keyword_customer_credentials
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_customer_credentials
      pattern: >-
        (?is)\b(?:account\s+credentials|login\s+credentials|password\s+hash|authentication\s+token|access\s+credentials|customer\s+account|account\s+security|password\s+reset|multi[\s-]+factor\s+authentication|credential\s+store|secret\s+key)\b
    - id: Pattern_global_top500_362_customer_account_credentials_label_context
      pattern: (?i)\\b(?:customer\\s+account\\s+credentials|customer|account|credentials|top500)\\b
  keywords:
    - id: Keyword_customer_credentials
      groups:
        - match_style: word
          terms:
            - account credentials
            - login credentials
            - username
            - password hash
            - authentication token
            - access credentials
            - customer account
            - account security
            - password reset
            - multi-factor authentication
            - credential store
            - secret key
    - id: Keyword_global_top500_362_customer_account_credentials_domain_context
      groups:
        - match_style: word
          terms:
            - customer account credentials
            - customer
            - account
            - credentials
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
