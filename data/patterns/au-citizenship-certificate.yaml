schema: testpattern/v1
name: Australian Citizenship Certificate
slug: au-citizenship-certificate
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: Detects Australian Citizenship Certificate number patterns including prefixed formats (ACC, CDM, ACS, CAS followed by 4-8 digits) and numeric-only formats (0 + 10 digits).
operation: >-
  The Purview implementation covers prefixed ACC/CDM/ACS/CAS values and an 11-digit numeric candidate
  beginning with 0. Both shapes are discovery-only at 65. A prefixed value with citizenship-certificate
  context enforces at 75; citizenship plus Home Affairs context reaches 85. The numeric shape only
  enforces at 85 because it is otherwise too generic. Enforcing tiers reject explicit templates.
pattern: \b(?:ACC|CDM|ACS|CAS)\s?\d{4,8}\b
confidence: medium
confidence_justification: 'Medium confidence: the 3-letter prefix (ACC, CDM, ACS, CAS) provides good structural specificity. Corroborative keywords are recommended to distinguish from other prefixed reference codes.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - citizenship
    - citizenship certificate
    - Australian citizen
  proximity: 300
  keyword_lists:
    - au-government-citizenship-immigration
    - pii-civic-credentials
test_cases:
  should_match:
    - value: ACC12345678
      description: Low-tier probe - prefixed candidate without certificate context
    - value: 'Citizenship certificate number: ACS56789'
      description: Medium-tier probe - prefixed value with certificate context
    - value: 'Department of Home Affairs Australian citizenship certificate: CDM 1234'
      description: High-tier probe - certificate and issuing-department context
    - value: 'Home Affairs citizenship certificate evidence number 01234567891'
      description: High-tier numeric candidate with strong certificate and issuer context
  should_not_match:
    - value: XYZ12345
      description: Invalid prefix (XYZ instead of ACC/CDM/ACS/CAS)
    - value: ACC123
      description: Too few digits after prefix (3 instead of 4-8)
    - value: ACC123456789
      description: Too many digits after prefix (9 instead of 4-8)
    - value: 'Template: Department of Home Affairs citizenship certificate ACC12345678'
      description: Structurally complete but explicitly framed template content
false_positives:
  - description: Common words and phrases related to australian citizenship certificate appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 3
risk_description: >-
  The canonical certificate detector recognises one Australian citizenship certificate number through defined prefixes and numeric layouts. The identifier may help correlate a person with citizenship administration or lend detail to a fraudulent verification story when other identity facts are already known. It neither contains a portrait or biographical particulars nor proves that the presenter owns a valid certificate. Risk 3 and OFFICIAL reflect this limited standalone administrative value rather than the greater sensitivity of a complete certificate or citizenship case record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_au_citizenship_cert
          - Pattern_au_citizenship_cert_numeric
      matches:
        - ref: Evidence_citizenship_specific
        - ref: Evidence_home_affairs
      excludes:
        - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_au_citizenship_cert
      matches:
        - ref: Evidence_citizenship_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_au_citizenship_cert
          - Pattern_au_citizenship_cert_numeric
  regexes:
    - id: Pattern_au_citizenship_cert
      pattern: \b(?:ACC|CDM|ACS|CAS)\s?\d{4,8}\b
    - id: Pattern_au_citizenship_cert_numeric
      pattern: \b0\d{10}\b
  keywords:
    - id: Evidence_citizenship_specific
      groups:
        - match_style: word
          terms:
            - citizenship
            - citizenship certificate
            - certificate of citizenship
            - naturalisation
            - naturalization
            - Australian citizen
            - evidence number
            - stock number
    - id: Evidence_home_affairs
      groups:
        - match_style: word
          terms:
            - Home Affairs
            - Department of Home Affairs
            - immigration
            - DIAC
            - DIBP
            - IMMI
            - immi.homeaffairs
    - id: Evidence_immigration_context
      groups:
        - match_style: word
          terms:
            - immigration
            - migration
            - migrant
            - immigrant
            - visa
            - permanent resident
            - temporary resident
            - asylum
            - refugee
            - border
  filters:
    - id: Guard_au_citizenship_cert_same_digits
      type: AllDigitsSameFilter
created: '2026-02-08'
updated: '2026-07-18'
changelog:
  - version: 1.3.0
    date: '2026-07-18'
    description: 'Profile quality: make prefixed and numeric certificate candidates discovery-only, require certificate context at medium and Home Affairs context at high, with template rejection and exact-tier tests.'
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 529 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — numeric-format regex accepted all-zeros/same-digit certificate values (e.g. 00000000000); mirrors au-medicare-card-identifier protection.
