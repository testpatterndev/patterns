schema: testpattern/v1
name: Mission briefing packages
slug: global-top500-423-mission-briefing-packages
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to mission briefing packages in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:mission\s+briefing|briefing\s+package|mission\s+brief|operational\s+briefing|intelligence\s+briefing|situation\s+briefing|pre[\s-]+mission\s+brief|commander\s+briefing|tactical\s+briefing|mission\s+overview|briefing\s+document|mission\s+summary)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - mission briefing packages
  proximity: 240
test_cases:
  should_match:
    - value: mission briefing
      description: Primary topic phrase match
    - value: briefing package
      description: Case-insensitive topic phrase match
    - value: mission brief
      description: Alternative topic phrase match
    - value: operational briefing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to mission briefing packages appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_mission_briefing
      matches:
        - ref: Pattern_global_top500_423_mission_briefing_packages_label_context
        - ref: Keyword_global_top500_423_mission_briefing_packages_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_mission_briefing
      matches:
        - ref: Keyword_mission_briefing
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_mission_briefing
      matches:
        - ref: Keyword_mission_briefing
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_mission_briefing
      pattern: >-
        (?is)\b(?:mission\s+briefing|briefing\s+package|mission\s+brief|operational\s+briefing|intelligence\s+briefing|situation\s+briefing|pre[\s-]+mission\s+brief|commander\s+briefing|tactical\s+briefing|mission\s+overview|briefing\s+document|mission\s+summary)\b
    - id: Pattern_global_top500_423_mission_briefing_packages_label_context
      pattern: (?i)\\b(?:mission\\s+briefing\\s+packages|mission|briefing|packages|top500)\\b
  keywords:
    - id: Keyword_mission_briefing
      groups:
        - match_style: word
          terms:
            - mission briefing
            - briefing package
            - mission brief
            - operational briefing
            - intelligence briefing
            - situation briefing
            - pre-mission brief
            - commander briefing
            - tactical briefing
            - mission overview
            - briefing document
            - mission summary
    - id: Keyword_global_top500_423_mission_briefing_packages_domain_context
      groups:
        - match_style: word
          terms:
            - mission briefing packages
            - mission
            - briefing
            - packages
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
