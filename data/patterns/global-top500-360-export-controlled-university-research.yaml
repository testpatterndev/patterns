schema: testpattern/v1
name: Export-controlled university research
slug: global-top500-360-export-controlled-university-research
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to export-controlled university research in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations. Enforcement is aimed at controlled university research and its technical data; ordinary import/export licensing language is discovery-only unless independent
  university-research or controlled-technical-data evidence is present.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: au-government-defence-markers. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:export[\s-]+controlled|export\s+control|dual[\s-]+use\s+technology|controlled\s+technology|deemed\s+export|technology\s+control\s+plan|restricted\s+research|defence\s+strategic\s+goods|munitions\s+list|export\s+license)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - export-controlled university research
    - export
    - controlled
    - university
    - research
    - education
    - administration
  proximity: 300
  keyword_lists:
    - au-government-defence-markers
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: export controlled
      description: Primary topic phrase match
    - value: export control
      description: Case-insensitive topic phrase match
    - value: dual-use technology
      description: Alternative topic phrase match
    - value: controlled technology
      description: Additional topic phrase match
    - value: Export-controlled university research
      description: Hyphenated title now anchors (hyphen-tolerant export-controlled branch fixed a verified recall miss)
    - value: 'Project UQ-ITAR-17, PI N. Singh: foreign-national access to CAD technical data is restricted under the technology control plan, ECCN 9E003.'
      description: Control-plan anchor with project/technical-data context — enforceable controlled-research content
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
    - value: The university procurement office explains export license fees for shipping cafeteria equipment overseas.
      description: Ordinary goods-export administration — export license is discovery only, must not enforce
    - value: The economics class studies how tariffs influence agricultural exports.
      description: Academic trade discussion contains no control anchor — must not match
    - value: 'Training example: "deemed export" and "technology control plan" are terms learners must define.'
      description: Training/example exclusion suppresses quoted control phrases
    - value: export license
      description: Bare contextual phrase — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to export-controlled university research appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_export_controlled_research
      matches:
        - ref: Pattern_global_top500_360_export_controlled_university_research_label_context
        - ref: Keyword_global_top500_360_export_controlled_university_research_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_export_controlled_research
      matches:
        - ref: Keyword_export_controlled_research
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_export_controlled_research_ContextualBranch
      matches:
        - ref: Keyword_export_controlled_research_IndependentContext
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_export_controlled_research_ContextualBranch
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_export_controlled_research
      pattern: >-
        (?is)\b(?:export[\s-]+controlled|export\s+control|dual[\s-]+use\s+technology|controlled\s+technology|deemed\s+export|technology\s+control\s+plan|restricted\s+research|defence\s+strategic\s+goods|munitions\s+list)\b
    - id: Regex_export_controlled_research_ContextualBranch
      pattern: (?is)\b(?:export\s+license)\b
    - id: Pattern_global_top500_360_export_controlled_university_research_label_context
      pattern: (?i)\b(?:export\-controlled\s+university\s+research)\b
  keywords:
    - id: Keyword_export_controlled_research
      groups:
        - match_style: word
          terms:
            - export controlled
            - export control
            - ITAR
            - text: EAR
              case_sensitive: true
            - dual-use technology
            - controlled technology
            - deemed export
            - technology control plan
            - restricted research
            - defence strategic goods
            - munitions list
            - export license
      strength: specific
    - id: Keyword_export_controlled_research_IndependentContext
      groups:
        - match_style: word
          terms:
            - project ID
            - principal investigator
            - sponsor
            - laboratory
            - technical data
            - foreign national
            - technology control plan
            - ITAR
            - text: EAR
              case_sensitive: true
            - text: DSGL
              case_sensitive: true
            - licence number
            - license number
            - access restriction
      strength: specific
    - id: Keyword_global_top500_360_export_controlled_university_research_domain_context
      groups:
        - match_style: word
          terms:
            - export-controlled university research
            - controlled
            - university
            - research
      strength: domain
risk_description: >-
  The detector recognises export-controlled, export-control, dual-use technology, or controlled-technology language in defence or research context, signalling a regulated research topic rather than proving that controlled technical data is present. A genuine match attached to substantive research can expose restricted capabilities, collaborators, transfer pathways, or development details and create legal, institutional, or national-security harm. Policy references, compliance guidance, and high-level project labels can also satisfy the concept without revealing an actionable design or controlled dataset. Risk 8 and SENSITIVE fit material but context-dependent research exposure; PROTECTED requires the controlled technical data itself, a strategically consequential defence capability, or an unauthorised release capable of significant national-security damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
