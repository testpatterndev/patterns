    date: '2026-07-17'
    description: 'SIT alignment wave1 (TP-01268, reduced scope): export-controlled branch made hyphen-tolerant (export[\s-]+controlled — fixes the verified "Export-controlled university research" recall miss) in the primary and top-level pattern; "export license" moved out of the self-corroborating primary into the approved contextual branch (Regex_export_controlled_research_ContextualBranch) enforcing at 65 only with Keyword_export_controlled_research_IndependentContext university-research/controlled-data evidence (13 terms materialized from the approved definition) and otherwise 65 discovery_only, both with the template-exclusion NOT gate; adversarial tests added. Deliberately less than the first-pass candidate: generic "export control"/"controlled technology" left in the primary (no written-out branch definition covered them) and no 75 named-regime re-tiering.'
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1906 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
