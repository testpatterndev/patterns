schema: testpattern/v1
name: Remittance instructions
slug: global-top500-114-remittance-instructions
version: 1.1.1
type: regex
engine: boost_regex
description: Detects references to remittance instructions in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:payment\s+instruction|bank\s+transfer|wire\s+transfer|correspondent\s+bank|intermediary\s+bank|payment\s+reference|remit\s+to|funds\s+transfer)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - remittance instructions
    - remittance
    - instructions
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: payment instruction
      description: Primary topic phrase match
    - value: 'remit to beneficiary account'
      description: Topic phrase match (remit to)
    - value: wire transfer
      description: Alternative topic phrase match
    - value: correspondent bank
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: office supplies purchase order summary
      description: No remittance/payment topic phrases present
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_remittance
      matches:
        - ref: Pattern_global_top500_114_remittance_instructions_label_context
        - ref: Keyword_global_top500_114_remittance_instructions_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_remittance
      matches:
        - ref: Keyword_remittance
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_remittance
      pattern: (?is)\b(?:payment\s+instruction|bank\s+transfer|wire\s+transfer|correspondent\s+bank|intermediary\s+bank|payment\s+reference|remit\s+to|funds\s+transfer)\b
    - id: Pattern_global_top500_114_remittance_instructions_label_context
      pattern: (?i)\b(?:remittance\s+instructions)\b
  keywords:
    - id: Keyword_remittance
      groups:
        - match_style: word
          terms:
            - remittance
            - payment instruction
            - beneficiary
            - bank transfer
            - wire transfer
            - SWIFT
            - IBAN
            - correspondent bank
            - intermediary bank
            - payment reference
            - remit to
            - funds transfer
      strength: specific
    - id: Keyword_global_top500_114_remittance_instructions_domain_context
      groups:
        - match_style: word
          terms:
            - remittance instructions
            - remittance
            - instructions
      strength: domain
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
