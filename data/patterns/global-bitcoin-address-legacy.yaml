schema: testpattern/v1
name: Bitcoin Address (Legacy)
slug: global-bitcoin-address-legacy
version: 1.5.0
type: regex
pattern_class: identifier
engine: universal
description: Detects context-gated Base58-shaped legacy Bitcoin address (P2PKH/P2SH) candidates. The Base58Check checksum is NOT validated, so matches are candidates, not verified addresses.
operation: >-
  Candidate-shape prefilter: leading 1/3 with Base58 body and length bounds only — no Base58Check checksum validation is performed (Purview custom SITs provide no Base58Check function). Bech32 (bc1)
  addresses are out of scope for this SIT and belong to the dedicated Bech32 SIT. Corroborative evidence: 3 keywords within 300 characters. Keyword lists: financial-transaction. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b[13][a-km-zA-HJ-NP-Z1-9]{24,33}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - PCI-DSS
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:
    - financial-transaction
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa
      description: Bitcoin legacy address starting with 1
    - value: 3J98t1WpEZ73CNmQviecrnyiWrnqRhWNLy
      description: Bitcoin P2SH address starting with 3
    - value: 1BvBMSEYstWetqTFn5Au4m4GFg7xJaNVN2
      description: Standard Bitcoin address
  should_not_match:
    - value: 2A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa
      description: Invalid first character (2 instead of 1 or 3)
    - value: 1A1zP1eP5QGefi2DMPTf
      description: Too short (only 20 characters)
    - value: 1A1zP1eP5QGe-fi2DMPTfTL5SLmv7Divf
      description: Hyphen breaks the run so no 24-33 char base58 body is contiguous — rejected
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: Bitcoin address bc1qw508d6qejxtdg4y5r3zarvary0c5xw7kv8f3t4
      description: Bech32 addresses must not route through the legacy SIT — the misrouted bech32 tier was removed
    - value: Tutorial wallet 3J98t1WpEZ73CNmQviecrnyiWrnqRhWNLy
      description: Tutorial exclusion suppresses even the discovery-only candidate
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_btc_legacy
      matches:
        - ref: Pattern_global_bitcoin_address_legacy_label_context
        - ref: Keyword_global_bitcoin_address_legacy_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_btc_legacy
      pattern: \b[13][a-km-zA-HJ-NP-Z1-9]{24,33}\b
    - id: Pattern_global_bitcoin_address_legacy_label_context
      pattern: (?i)\b(?:bitcoin\s+address\s+\(legacy\)|bitcoin|address|legacy)\b
  keywords:
    - id: Keyword_cryptocurrency
      groups:
        - match_style: word
          terms:
            - bitcoin
            - text: BTC
              case_sensitive: true
            - cryptocurrency
            - crypto
            - wallet
            - wallet address
            - blockchain
            - digital currency
            - crypto wallet
      strength: domain
    - id: Keyword_global_bitcoin_address_legacy_domain_context
      groups:
        - match_style: word
          terms:
            - bitcoin address (legacy)
            - bitcoin
            - address
            - legacy
      strength: domain
risk_description: >-
  The detector recognises a legacy Bitcoin address, a pseudonymous destination published on the blockchain. Anyone can inspect transfers involving the address, but attributing those transactions to a person or organisation requires external identity evidence. The string provides no private key and cannot authorise spending from the associated wallet. Risk 4 OFFICIAL reflects low correlation and profiling harm; SENSITIVE requires reliable attribution or linked confidential transaction records.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.5.0
    date: '2026-07-17'
    description: 'SIT alignment wave1 (TP-00807, reduced scope): removed the misrouted Bech32 tier and Regex_btc_bech32 from this Legacy SIT (Bech32 belongs to the dedicated global-bitcoin-address-bech32 SIT); the remaining context-gated legacy tier demoted 85→65 discovery_only (shape+context cannot prove Base58Check; Purview offers no checksum function) and recommended_confidence 85→65; description/operation reworded to a context-gated Base58-shaped P2PKH/P2SH candidate with the Base58Check validation claim removed; adversarial tests added. Deliberately NOT implemented: any Base58Check validator (not approved and not available in the export path) and checksum-mutation negatives (undeliverable by a shape-only regex); Keyword_cryptocurrency retained as unreferenced inventory.'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1220 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.3.0
    date: '2026-07-04'
    description: Restore noise-exclusion NOT node on bech32 tier (FP hygiene parity with sibling tier)
  - version: 1.2.0
    date: '2026-07-04'
    description: Restore a pattern_tiers entry the bulk collapse dropped when confidence canonicalization put two distinct-evidence tiers in the same bucket and mergeDuplicateTiers kept only one; the dropped tier carried genuine domain-specific evidence, now reinstated alongside the surviving tier
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 3 duplicate 85-confidence tier(s) into the strictest canonical tier.
