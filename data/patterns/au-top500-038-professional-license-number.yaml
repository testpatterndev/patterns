updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: 'TP-00167 approved reduced scope: expand the primary phrase set (top-level and Pattern_professional_license) to bounded source-authored number phrases only — professional licence/license number(s), practitioner registration number(s), accreditation number(s), board registration number(s), trade licence number(s), occupational licence number(s). Generic registration number deliberately stays out of the primary (remains evidence-only in Evidence_professional_license, needing independent profession/regulator context); the universal cross-profession value parser is rejected (no per-profession syntax defined) and concept-level risk wording retained. Added AHPRA and AU-spelling positives plus vehicle-registration and board-minutes negatives.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 642 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
