schema: testpattern/v1
name: Professional license number
slug: au-top500-038-professional-license-number
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to professional license number in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: au-vehicle-permit-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:professional\s+licen[cs]e\s+numbers?|practitioner\s+registration\s+numbers?|accreditation\s+numbers?|board\s+registration\s+numbers?|trade\s+licen[cs]e\s+numbers?|occupational\s+licen[cs]e\s+numbers?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - professional license number
    - professional
    - license
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - au-vehicle-permit-terms
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Professional license number'
      description: Topic phrase present
    - value: 'professional license number'
      description: Topic phrase, lowercase
    - value: 'this record references the professional license number held on file'
      description: Topic phrase within surrounding text
    - value: AHPRA practitioner registration number is recorded.
      description: Specific regulator and practitioner label align (authored phrase variant)
    - value: Onboarding form asks for professional licence number.
      description: AU licence spelling — phrase references are valid concept hits
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: Vehicle registration number is 123ABC.
      description: Unrelated registration must not classify — generic registration number is not a primary
    - value: Medical board meeting minutes.
      description: Regulator topic without number language is insufficient
false_positives:
  - description: Common words and phrases related to professional license number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_professional_license
      matches:
        - ref: Evidence_professional_license
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_professional_license
      matches:
        - ref: Evidence_professional_license
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_professional_license
      matches:
        - ref: Evidence_professional_license
  regexes:
    - id: Pattern_professional_license
      pattern: (?i)\b(?:professional\s+licen[cs]e\s+numbers?|practitioner\s+registration\s+numbers?|accreditation\s+numbers?|board\s+registration\s+numbers?|trade\s+licen[cs]e\s+numbers?|occupational\s+licen[cs]e\s+numbers?)\b
    - id: Pattern_au_top500_038_professional_license_number_label_context
      pattern: (?i)\b(?:professional\s+license\s+number)\b
  keywords:
    - id: Evidence_professional_license
      groups:
        - match_style: word
          terms:
            - professional license number
            - professional licence
            - practitioner registration
            - registration number
            - AHPRA
            - accreditation number
            - licence holder
            - practitioner ID
            - professional registration
            - trade licence
            - occupational licence
            - certified practitioner
    - id: Keyword_au_top500_038_professional_license_number_domain_context
      groups:
        - match_style: word
          terms:
            - professional license number
            - professional
            - license
risk_description: >-
  This Professional license number pattern matches the field phrase or text saying that such a number is held on file. It does not validate a registration format, identify the licensed practitioner, or disclose discipline, status, or regulator details. A real number linked to a professional could support impersonation or unauthorised profile lookup, yet templates and licensing instructions can trigger this concept detector without any value. Risk 5 and OFFICIAL capture the regulated-credential cue, while a populated person-linked licence record marks the threshold for SENSITIVE handling.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
