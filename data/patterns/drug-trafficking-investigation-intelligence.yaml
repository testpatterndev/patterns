schema: testpattern/v1
name: Drug Trafficking Investigation Intelligence
slug: drug-trafficking-investigation-intelligence
version: 1.3.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects documents containing drug trafficking investigation intelligence including targets, supply chain mapping, precursor chemical tracking, clandestine laboratory intelligence, and cross-border interdiction plans. QPS Drug and Serious Crime Group is the primary unit. Disclosure enables traffickers to destroy evidence, alter supply routes, and eliminate informants.
operation: 'Keyword proximity: primary keywords (drug trafficking investigation, controlled delivery, precursor tracking, drug supply chain, clandestine laboratory) within 300 characters of operational terms (buy-bust, test purchase, controlled delivery authorisation) and QPS Drug and Serious Crime Group markers. Negative keyword exclusion for public health and media.'
pattern: (?i)\b(drug\s+trafficking\s+investigation|controlled\s+delivery\s+(?:operation|authorisation)|precursor\s+(?:tracking|chemical\s+monitoring)|drug\s+supply\s+chain\s+(?:intelligence|analysis)|clandestine\s+laboratory\s+(?:intelligence|investigation)|drug\s+importation\s+(?:investigation|intelligence)|border\s+interdiction\s+(?:plan|operation))\b
confidence: medium
confidence_justification: 'Medium confidence: requires co-occurrence of drug trafficking investigation terminology with operational planning language and classification markers. The specificity of controlled delivery, precursor tracking, and supply chain intelligence terms distinguishes genuine investigation documents from public health or media references.'
jurisdictions:
  - global
regulations:
- "Drugs Misuse Act 1986 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - RESTRICTED
    - Drug and Serious Crime Group
    - QPS
    - AFP
    - controlled delivery
    - buy-bust
    - test purchase
    - precursor
    - methylamphetamine
    - MDMA
    - cocaine
    - heroin
    - clandestine laboratory
    - border interdiction
  proximity: 300
  keyword_lists:

    - law-enforcement
    - en-government-classification
test_cases:
  should_match:
    - value: 'PROTECTED Law-Enforcement. Drug and Serious Crime Group — Drug Trafficking Investigation Intelligence Report. Operation NEXUS. Drug supply chain intelligence: Subject PHAM controls importation of methylamphetamine precursors through Vietnam. Clandestine laboratory intelligence indicates two active cook sites in Western Corridor. Controlled delivery authorisation sought for intercepted parcel.'
      description: QPS drug trafficking investigation with supply chain and clandestine laboratory intelligence
    - value: RESTRICTED. Drug trafficking investigation update — Operation IRONSIDE. Controlled delivery operation authorised for 50 kg cocaine shipment. Buy-bust operation planned for 22 March at Gold Coast location. Border interdiction plan coordinated with Australian Border Force. Test purchase completed confirming product purity.
      description: Drug investigation update with controlled delivery and buy-bust operation details
    - value: 'Drug importation investigation intelligence. Precursor chemical tracking: 500 litres pseudoephedrine-based product tracked from import to storage facility. Drug supply chain analysis indicates distribution network spanning Brisbane, Townsville, and Cairns. Clandestine laboratory investigation — suspect premises identified at rural property.'
      description: Multi-location drug importation investigation with precursor tracking
  should_not_match:
    - value: Queensland Health published its annual report on drug-related harm in the community. The report noted an increase in methylamphetamine-related hospital presentations and called for expanded treatment services.
      description: Public health report about drug-related harm statistics
    - value: The ABC Four Corners program investigated the methylamphetamine epidemic in regional Queensland, interviewing police, health workers, and recovering addicts about the impact of drug trafficking on communities.
      description: Television journalism about drug trafficking impact
    - value: A Griffith University research paper examined controlled delivery operations as a law enforcement strategy for combating drug importation. The study reviewed published case law and international best practice.
      description: Academic paper reviewing controlled delivery as a strategy
false_positives:
  - description: Public health reports and drug harm statistics
    mitigation: 'Negative keyword exclusion: ''public health'', ''hospital presentations'', ''treatment services'', ''harm reduction'', ''Queensland Health report'''
  - description: Media reporting on drug trafficking and its community impact
    mitigation: 'Negative keyword exclusion: ''news'', ''media'', ''Four Corners'', ''reported'', ''interview'', ''community impact'', ''television'''
  - description: Academic research reviewing drug law enforcement strategies
    mitigation: 'Negative keyword exclusion: ''academic'', ''university'', ''research'', ''case law'', ''best practice'', ''study reviewed'', ''journal'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_drug_trafficking_investigation_intelligence_drug_investigation_terms
      matches:
        - ref: Evidence_drug_trafficking_investigation_intelligence_primary_keywords
        - ref: Evidence_drug_trafficking_investigation_intelligence_classification_markers
        - ref: Evidence_drug_trafficking_investigation_intelligence_corroborative_terms
        - ref: Pattern_drug_trafficking_investigation_intelligence_operation_name
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_drug_trafficking_investigation_intelligence_exclusion
    - confidence_level: 75
      id_match: Pattern_drug_trafficking_investigation_intelligence_drug_investigation_terms
      matches:
        - ref: Evidence_drug_trafficking_investigation_intelligence_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_drug_trafficking_investigation_intelligence_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_drug_trafficking_investigation_intelligence_drug_investigation_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_drug_trafficking_investigation_intelligence_exclusion
  regexes:
    - id: Pattern_drug_trafficking_investigation_intelligence_drug_investigation_terms
      pattern: (?i)\b(drug\s+trafficking\s+investigation|controlled\s+delivery|precursor\s+tracking|drug\s+supply\s+chain|clandestine\s+laboratory|drug\s+importation|border\s+interdiction)\b
    - id: Pattern_drug_trafficking_investigation_intelligence_operation_name
      pattern: (?i)\bOperation\s+[A-Z]{3,15}\b
  keywords:
    - id: Evidence_drug_trafficking_investigation_intelligence_primary_keywords
      groups:
        - match_style: word
          terms:
            - drug trafficking investigation
            - controlled delivery
            - precursor tracking
            - drug supply chain
            - clandestine laboratory
            - drug importation
            - border interdiction
            - controlled substance seizure
            - buy-bust operation
            - test purchase
      strength: specific
    - id: Evidence_drug_trafficking_investigation_intelligence_classification_markers
      groups:
        - match_style: word
          terms:
            - OPERATIONAL
      strength: domain
    - id: Evidence_drug_trafficking_investigation_intelligence_corroborative_terms
      groups:
        - match_style: word
          terms:
            - Drug and Serious Crime Group
            - text: QPS
              case_sensitive: true
            - text: AFP
              case_sensitive: true
            - Australian Border Force
            - methylamphetamine
            - MDMA
            - cocaine
            - heroin
            - pseudoephedrine
            - precursor chemical
            - cook site
            - distribution network
      strength: domain
    - id: Filter_drug_trafficking_investigation_intelligence_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - annual report
            - public health
            - hospital presentations
            - treatment services
            - harm reduction
            - academic
            - university
            - research
            - news article
            - television
            - Four Corners
            - community impact

      strength: noise
risk_rating: 8
risk_description: >-
  The detector identifies drug-trafficking investigation intelligence covering targets, supply routes, precursor tracking, clandestine laboratories, controlled deliveries, test purchases, or planned interdiction. Disclosure can alert traffickers, prompt destruction or relocation of drugs and evidence, alter supply chains, and expose investigative timing or suspected associates in the bounded case. Public-health statistics, media coverage, and academic discussion of enforcement policy are excluded, while the detector does not require a confidential-source identity or operative legend. Risk 8 supports SENSITIVE Legal; PROTECTED would require identified sources, live controlled-operation identities, or multi-operation compromise causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
