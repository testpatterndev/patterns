schema: testpattern/v1
name: Non-disclosure agreement repositories
slug: global-top500-179-non-disclosure-agreement-repositories
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to non-disclosure agreement repositories in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:non[\s-]+disclosure\s+agreement\s+repositories|non[\s-]+disclosure\s+agreement|confidentiality\s+agreement|confidential\s+information|disclosing\s+party|receiving\s+party|mutual\s+NDA|unilateral\s+NDA|trade\s+secret|proprietary\s+information|confidentiality\s+obligation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - non-disclosure agreement repositories
    - non
    - disclosure
    - agreement
    - repositories
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: non-disclosure agreement repositories
      description: Primary topic phrase match
    - value: non-disclosure agreement
      description: Case-insensitive topic phrase match
    - value: confidentiality agreement
      description: Alternative topic phrase match
    - value: confidential information
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to non-disclosure agreement repositories appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_nda_repositories
      matches:
        - ref: Pattern_global_top500_179_non_disclosure_agreement_repositories_label_context
        - ref: Keyword_global_top500_179_non_disclosure_agreement_repositories_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_nda_repositories
      matches:
        - ref: Keyword_nda_repositories
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_nda_repositories
      pattern: >-
        (?is)\b(?:non[\s-]+disclosure\s+agreement\s+repositories|non[\s-]+disclosure\s+agreement|confidentiality\s+agreement|confidential\s+information|disclosing\s+party|receiving\s+party|mutual\s+NDA|unilateral\s+NDA|trade\s+secret|proprietary\s+information|confidentiality\s+obligation)\b
    - id: Pattern_global_top500_179_non_disclosure_agreement_repositories_label_context
      pattern: (?i)\b(?:non\-disclosure\s+agreement\s+repositories)\b
  keywords:
    - id: Keyword_nda_repositories
      groups:
        - match_style: word
          terms:
            - non-disclosure agreement repositories
            - non-disclosure agreement
            - confidentiality agreement
            - text: NDA
              case_sensitive: true
            - confidential information
            - disclosing party
            - receiving party
            - mutual NDA
            - unilateral NDA
            - trade secret
            - proprietary information
            - confidentiality obligation
      strength: specific
    - id: Keyword_global_top500_179_non_disclosure_agreement_repositories_domain_context
      groups:
        - match_style: word
          terms:
            - non-disclosure agreement repositories
            - non
            - disclosure
            - agreement
            - repositories
      strength: domain
risk_description: >-
  This repository classifier looks for non-disclosure-agreement, confidentiality-agreement, confidential-information, and repository language, so its intended unit is a collection of agreements rather than one party name. A substantive repository can expose counterparties, protected subject matter, obligations, expiry dates, signatures, and the existence of confidential projects, enabling legal prejudice, competitive intelligence, or targeted solicitation across many relationships. Single template agreements and general confidentiality guidance can match, but the normal classified object is the composite store named by the SIT. Risk 8 SENSITIVE reflects serious aggregated legal and commercial harm; PROTECTED would require protected operations, critical intellectual property, privileged national-security relationships, or repository compromise causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
