schema: testpattern/v1
name: Underwriting decision rationales
slug: au-top500-130-underwriting-decision-rationales
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to underwriting decision rationales in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:underwriting\s+decision|decision\s+rationale|risk\s+assessment|underwriting\s+criteria|approval\s+decision|decline\s+reason|risk\s+appetite|underwriting\s+guidelines|credit\s+decision|risk\s+rating)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - underwriting decision rationales
    - underwriting
    - decision
    - rationales
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: underwriting decision
      description: Primary topic phrase match
    - value: decision rationale
      description: Case-insensitive topic phrase match
    - value: risk assessment
      description: Alternative topic phrase match
    - value: underwriting criteria
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_underwriting_decision
      matches:
        - ref: Evidence_underwriting_decision
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_underwriting_decision
      matches:
        - ref: Evidence_underwriting_decision
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_underwriting_decision
      matches:
        - ref: Evidence_underwriting_decision
  regexes:
    - id: Pattern_underwriting_decision
      pattern: >-
        (?is)\b(?:underwriting\s+decision|decision\s+rationale|risk\s+assessment|underwriting\s+criteria|approval\s+decision|decline\s+reason|risk\s+appetite|underwriting\s+guidelines|credit\s+decision|risk\s+rating)\b
  keywords:
    - id: Evidence_underwriting_decision
      groups:
        - match_style: word
          terms:
            - underwriting decision
            - decision rationale
            - risk assessment
            - underwriting criteria
            - approval decision
            - decline reason
            - risk appetite
            - underwriting guidelines
            - credit decision
            - APRA
            - risk rating
            - actuarial
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
