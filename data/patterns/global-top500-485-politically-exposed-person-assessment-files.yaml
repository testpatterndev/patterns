schema: testpattern/v1
name: Politically exposed person assessment files
slug: global-top500-485-politically-exposed-person-assessment-files
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to politically exposed person assessment files in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:politically\s+exposed\s+person\s+assessment\s+files|politically\s+exposed\s+person|PEP\s+screening|PEP\s+assessment|enhanced\s+due\s+diligence|anti[\s-]+money\s+laundering|beneficial\s+ownership|sanctions\s+screening|risk\s+rating|high[\s-]+risk\s+individual)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - politically exposed person assessment files
  proximity: 240
test_cases:
  should_match:
    - value: politically exposed person assessment files
      description: Primary topic phrase match
    - value: politically exposed person
      description: Case-insensitive topic phrase match
    - value: PEP screening
      description: Alternative topic phrase match
    - value: PEP assessment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: >-
      Common words and phrases related to politically exposed person assessment files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal
      data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_pep_assessment
      matches:
        - ref: Pattern_global_top500_485_politically_exposed_person_assessment_files_label_context
        - ref: Keyword_global_top500_485_politically_exposed_person_assessment_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pep_assessment
      matches:
        - ref: Keyword_pep_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_pep_assessment
      pattern: >-
        (?is)\b(?:politically\s+exposed\s+person\s+assessment\s+files|politically\s+exposed\s+person|PEP\s+screening|PEP\s+assessment|enhanced\s+due\s+diligence|anti[\s-]+money\s+laundering|beneficial\s+ownership|sanctions\s+screening|risk\s+rating|high[\s-]+risk\s+individual)\b
    - id: Pattern_global_top500_485_politically_exposed_person_assessment_files_label_context
      pattern: (?i)\b(?:politically\s+exposed\s+person\s+assessment\s+files)\b
  keywords:
    - id: Keyword_pep_assessment
      groups:
        - match_style: word
          terms:
            - politically exposed person assessment files
            - politically exposed person
            - PEP screening
            - PEP assessment
            - enhanced due diligence
            - anti-money laundering
            - text: AML
              case_sensitive: true
            - beneficial ownership
            - sanctions screening
            - risk rating
            - text: KYC
              case_sensitive: true
            - high-risk individual
      strength: specific
    - id: Keyword_global_top500_485_politically_exposed_person_assessment_files_domain_context
      groups:
        - match_style: word
          terms:
            - politically exposed person assessment files
            - politically
            - exposed
            - person
            - assessment
            - files
      strength: domain
risk_description: >-
  The detector flags politically exposed persons, PEP screening or assessment, enhanced due diligence, beneficial ownership, sanctions checks, risk ratings, and high-risk individuals rather than confirming a completed client dossier. A genuine file can disclose a person's public connections, family or associate links, financial-crime suspicions, ownership interests, and institutional risk judgment, causing stigma, targeting, or unfair service denial. The normal unit is one customer or related-party assessment and the institution conducting it, while AML policy, training, and screening guidance can match. Risk 8 and SENSITIVE reflect serious contained privacy and financial harm; PROTECTED would require a highly consequential protected person, life-safety exposure, or a bulk intelligence holding whose loss could cause significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
