schema: testpattern/v1
name: Sole-source justification memos
slug: au-top500-159-sole-source-justification-memos
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to sole-source justification memos in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:sole[\s-]+source\s+justification\s+memos|sole\s+source|single\s+supplier|limited\s+tender|direct\s+sourcing|non[\s-]+competitive\s+procurement|justification\s+memo|procurement\s+exemption|value\s+for\s+money|market\s+analysis|supplier\s+capability)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - sole-source justification memos
    - sole
    - source
    - justification
    - memos
    - procurement
    - supplier
    - management
  proximity: 300
test_cases:
  should_match:
    - value: sole-source justification memos
      description: Primary topic phrase match
    - value: sole source
      description: Case-insensitive topic phrase match
    - value: single supplier
      description: Alternative topic phrase match
    - value: limited tender
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: procurement inventory
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to sole-source justification memos appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_sole_source_justification
      matches:
        - ref: Evidence_sole_source_justification
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_sole_source_justification
      matches:
        - ref: Evidence_sole_source_justification
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_sole_source_justification
      matches:
        - ref: Evidence_sole_source_justification
  regexes:
    - id: Pattern_sole_source_justification
      pattern: >-
        (?is)\b(?:sole[\s-]+source\s+justification\s+memos|sole\s+source|single\s+supplier|limited\s+tender|direct\s+sourcing|non[\s-]+competitive\s+procurement|justification\s+memo|procurement\s+exemption|value\s+for\s+money|market\s+analysis|supplier\s+capability)\b
    - id: Pattern_au_top500_159_sole_source_justification_memos_label_context
      pattern: (?i)\\b(?:sole\-source\\s+justification\\s+memos|sole|source|justification|memos|top500)\\b
  keywords:
    - id: Evidence_sole_source_justification
      groups:
        - match_style: word
          terms:
            - sole-source justification memos
            - sole source
            - single supplier
            - limited tender
            - direct sourcing
            - non-competitive procurement
            - justification memo
            - procurement exemption
            - value for money
            - market analysis
            - supplier capability
            - procurement
    - id: Keyword_au_top500_159_sole_source_justification_memos_domain_context
      groups:
        - match_style: word
          terms:
            - sole-source justification memos
            - sole
            - source
            - justification
            - memos
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
