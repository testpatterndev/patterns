schema: testpattern/v1
name: Plant shutdown and startup procedures
slug: au-top500-448-plant-shutdown-and-startup-procedures
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to plant shutdown and startup procedures in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:plant\s+shutdown|startup\s+procedure|shutdown\s+procedure|emergency\s+shutdown|startup\s+sequence|critical\s+infrastructure|process\s+safety|operational\s+procedure|plant\s+operations|safety\s+checklist)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - plant shutdown and startup procedures
    - plant
    - shutdown
    - startup
    - procedures
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: plant shutdown
      description: Primary topic phrase match
    - value: startup procedure
      description: Case-insensitive topic phrase match
    - value: shutdown procedure
      description: Alternative topic phrase match
    - value: emergency shutdown
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: shutdown checklist
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to plant shutdown and startup procedures appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_plant_shutdown_startup
      matches:
        - ref: Evidence_plant_shutdown_startup
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_plant_shutdown_startup
      matches:
        - ref: Evidence_plant_shutdown_startup
    - confidence_level: 65
      id_match: Pattern_plant_shutdown_startup
      matches:
        - ref: Evidence_plant_shutdown_startup
  regexes:
    - id: Pattern_plant_shutdown_startup
      pattern: (?is)\b(?:plant\s+shutdown|startup\s+procedure|shutdown\s+procedure|emergency\s+shutdown|startup\s+sequence|critical\s+infrastructure|process\s+safety|operational\s+procedure|plant\s+operations|safety\s+checklist)\b
  keywords:
    - id: Evidence_plant_shutdown_startup
      groups:
        - match_style: word
          terms:
            - plant shutdown
            - startup procedure
            - shutdown procedure
            - emergency shutdown
            - ESD
            - startup sequence
            - critical infrastructure
            - process safety
            - operational procedure
            - plant operations
            - safety checklist
            - turnaround
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.legislation.gov.au/C2018A00029/latest/text
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
