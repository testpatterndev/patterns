schema: testpattern/v1
name: Card dispute case records
slug: au-top500-115-card-dispute-case-records
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to card dispute case records in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:card\s+dispute\s+case\s+records?|chargeback|transaction\s+dispute|cardholder\s+dispute|representment|arbitration)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - card dispute case records
    - card
    - dispute
    - case
    - records
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Card dispute case records'
      description: Topic phrase present
    - value: 'card dispute case records'
      description: Topic phrase, lowercase
    - value: 'this record references the card dispute case records held on file'
      description: Topic phrase within surrounding text
    - value: 'chargeback'
      description: Source-authored dispute vocabulary surfaces at 65 discovery_only
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: Customers may dispute a card transaction within 30 days.
      description: Consumer-guidance prose contains no dispute-case anchor phrase — must not match
    - value: chargeback case record
      description: Artefact label reaches discovery only via the dispute-vocabulary branch — must not enforce
    - value: PCI DSS training covers chargeback terminology.
      description: Compliance-training topic reaches discovery only — must not enforce
    - value: Example chargeback case CB-00000, reason code 13.1
      description: Template/example exclusion suppresses even the discovery-only dispute vocabulary
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_card_dispute_records
      matches:
        - ref: Evidence_card_dispute_records
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_card_dispute_records
      matches:
        - ref: Evidence_card_dispute_records
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_card_dispute_records
      matches:
        - ref: Evidence_card_dispute_records
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_card_dispute_topic
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_card_dispute_records
      pattern: (?i)\b(?:card\s+dispute\s+case\s+records?)\b
    - id: Pattern_card_dispute_topic
      pattern: (?i)\b(?:chargeback|transaction\s+dispute|cardholder\s+dispute|representment|arbitration)\b
    - id: Pattern_au_top500_115_card_dispute_case_records_label_context
      pattern: (?i)\b(?:card\s+dispute\s+case\s+records)\b
  keywords:
    - id: Evidence_card_dispute_records
      groups:
        - match_style: word
          terms:
            - card dispute
            - chargeback
            - dispute case
            - case record
            - dispute reference
            - transaction dispute
            - cardholder dispute
            - representment
            - arbitration
            - reason code
            - dispute resolution
            - PCI DSS
    - id: Keyword_au_top500_115_card_dispute_case_records_domain_context
      groups:
        - match_style: word
          terms:
            - card dispute case records
            - card
            - dispute
            - case
risk_description: >-
  The regex matches the card-dispute-case-record phrase and uses dispute, chargeback, reason-code, arbitration, record-structure, and template-exclusion evidence to identify likely case material. A genuine case record can combine cardholder identity, disputed transactions, partial card data, fraud allegations, evidence, and resolution status, enabling targeted fraud or causing financial and reputational harm. The normal affected scale is one cardholder dispute, while data inventories, training cases, and phrase-only headings remain plausible matches and do not prove a populated file. Risk 7 SENSITIVE Financial is appropriate for the composite case record; PROTECTED would require a large dispute repository, privileged acquiring access, or significant systemic compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
