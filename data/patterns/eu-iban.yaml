schema: testpattern/v1
name: International Bank Account Number (IBAN)
slug: eu-iban
version: 1.2.3
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects International Bank Account Numbers (IBANs) used across European and global banking systems. IBANs consist of a
  two-letter country code, two check digits, and up to 30 alphanumeric characters representing the domestic bank account
  number. This pattern matches IBANs with or without space or hyphen delimiters between digit groups.
operation: >-
  Validation: Mod 97 (ISO 7064). Reference: https://en.wikipedia.org/wiki/International_Bank_Account_Number
  Corroborative evidence: 10 keywords within 300 characters. Keyword lists: financial-deposit-terms.
pattern: '\b[A-Z]{2}\d{2}[A-Z0-9 -]{11,40}\b'
confidence: high
confidence_justification: >-
  The two-letter country code prefix followed by exactly two check digits provides a strong structural anchor. Combined
  with corroborative evidence keywords and the fixed digit-group format, false positive rates are low in most document
  contexts.
jurisdictions:
  - eu
regulations:
- GDPR
- PSD2
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
  - pii
corroborative_evidence:
  keywords:
    - IBAN
    - bank account
    - international bank
    - account number
    - account no
    - BSB
    - routing number
    - sort code
    - SWIFT
    - BIC
  proximity: 300
  keyword_lists:

    - financial-deposit-terms
test_cases:
  should_match:
    - value: DE89 3704 0044 0532 0130 00
      description: German IBAN with space-separated digit groups
    - value: GB29NWBK60161331926819
      description: UK IBAN with no delimiters
    - value: FR76 3000 6000 0112 3456 7890 189
      description: French IBAN with space-separated digit groups
  should_not_match:
    - value: DE893704
      description: Too short to be a valid IBAN (only 4 BBAN characters)
    - value: 1234 5678 9012 3456
      description: Digit-only string missing the country code prefix
    - value: INVALID123456789
      description: Starts with more than two letters, not a valid IBAN structure
false_positives:
  - description: >-
      Strings that begin with a two-letter country code followed by two digits but are not actual IBANs (e.g. product
      codes, reference numbers)
    mitigation: >-
      Validate the check digits using the MOD-97 algorithm defined in ISO 13616. Require corroborative evidence keywords
      within proximity.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_eu_iban
      matches:
        - ref: Keyword_eu_iban
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_eu_iban
  regexes:
    - id: Regex_eu_iban
      pattern: '\b[A-Z]{2}\d{2}[A-Z0-9 -]{11,40}\b'
      validators:
        - ref: Func_iban
  keywords:
    - id: Keyword_eu_iban
      groups:
        - match_style: word
          terms:
            - IBAN
            - bank account
            - international bank
            - account number
            - account no
            - SWIFT
            - text: BIC
              case_sensitive: true
            - sort code
            - routing number
            - compte bancaire
            - Kontonummer
            - Bankverbindung
            - conto bancario
            - cuenta bancaria
            - bankrekening
            - bankkonto
      strength: domain
risk_rating: 5
risk_description: >-
  This high-confidence identifier detector finds a checksum-valid International Bank Account Number used to route payments to a bank account. IBANs are commonly placed on invoices and supplied to payers, and possession of one does not authenticate the account holder or authorise an outgoing transfer. Disclosure can still aid invoice redirection, phishing, or attempted direct-debit abuse against the account holder, but those paths require impersonation, a mandate, or another process failure. Risk 5 and OFFICIAL fit the standalone coordinate; a wire instruction, debit mandate, or banking credential paired with the IBAN would justify SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
created: '2026-02-08'
updated: '2026-07-14'
changelog:
  - version: 1.2.3
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1190 without changing detector or package metadata.'
  - version: 1.2.2
    date: '2026-07-09'
    description: >-
      Fix regression from the 1.2.1 Purview-safe rewrite: the flat [A-Z0-9]{11,30} body
      dropped support for space/hyphen-separated IBAN formatting (e.g. "DE89 3704 0044
      0532 0130 00"), failing should_match. Widen the body character class to
      [A-Z0-9 -]{11,40} (still a single bounded class, no groups) to accept both compact
      and formatted IBANs while remaining Purview-safe.
  - 'Purview-safe: IBAN without quantified multi-match groups'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-08'
    description: >-
      Removed the dead template-exclusion shared-keyword import (Keyword_noise_exclusion): no pattern tier
      references the alias, verified by scanning the compiled tier structure, so the import only injected
      an unused keyword group into the compiled output. No detection behavior change.
  - version: 1.1.0
    date: '2026-07-04'
    description: Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
license: MIT
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.'
