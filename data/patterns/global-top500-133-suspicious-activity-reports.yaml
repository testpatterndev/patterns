schema: testpattern/v1
name: Suspicious activity reports
slug: global-top500-133-suspicious-activity-reports
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to suspicious activity reports in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:suspicious\s+activity\s+report|SAR\s+filing|suspicious\s+transaction|anti[\s-]+money\s+laundering|financial\s+intelligence|unusual\s+transaction|currency\s+transaction\s+report|suspicious\s+matter\s+report|transaction\s+monitoring|red\s+flag\s+indicator)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - suspicious activity reports
    - suspicious
    - activity
    - reports
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: suspicious activity report
      description: Primary topic phrase match
    - value: sar filing
      description: Case-insensitive topic phrase match
    - value: suspicious transaction
      description: Alternative topic phrase match
    - value: anti-money laundering
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_suspicious_activity_reports
      matches:
        - ref: Pattern_global_top500_133_suspicious_activity_reports_label_context
        - ref: Keyword_global_top500_133_suspicious_activity_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_suspicious_activity_reports
      matches:
        - ref: Keyword_suspicious_activity_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_suspicious_activity_reports
      pattern: >-
        (?is)\b(?:suspicious\s+activity\s+report|SAR\s+filing|suspicious\s+transaction|anti[\s-]+money\s+laundering|financial\s+intelligence|unusual\s+transaction|currency\s+transaction\s+report|suspicious\s+matter\s+report|transaction\s+monitoring|red\s+flag\s+indicator)\b
    - id: Pattern_global_top500_133_suspicious_activity_reports_label_context
      pattern: (?i)\b(?:suspicious\s+activity\s+reports)\b
  keywords:
    - id: Keyword_suspicious_activity_reports
      groups:
        - match_style: word
          terms:
            - suspicious activity report
            - SAR filing
            - suspicious transaction
            - anti-money laundering
            - financial intelligence
            - unusual transaction
            - currency transaction report
            - FinCEN
            - AUSTRAC
            - suspicious matter report
            - transaction monitoring
            - red flag indicator
      strength: specific
    - id: Keyword_global_top500_133_suspicious_activity_reports_domain_context
      groups:
        - match_style: word
          terms:
            - suspicious activity reports
            - suspicious
            - activity
            - reports
      strength: domain
risk_description: >-
  The concept regex matches suspicious activity report, SAR filing, suspicious transaction, anti-money laundering, financial intelligence, transaction monitoring, and red flag indicator with seven nearby finance or record terms; even anti-money laundering alone is a positive test. A formal report is established only by filing structure such as a reporting entity, subject, transaction detail, narrative analysis, report reference, or submission context. A genuine filed or draft SAR can tip off the subject, cause asset flight or evidence destruction, expose reporting methods and frustrate financial-crime enforcement. The confirmed Suspicious activity reports record therefore warrants risk 9 and PROTECTED Financial; detector uncertainty is handled through confidence controls rather than a lower consequence rating.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Financial
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
