schema: testpattern/v1
name: Suspicious activity reports
slug: global-top500-133-suspicious-activity-reports
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to suspicious activity reports in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:suspicious\s+activity\s+report|SAR\s+filing|suspicious\s+transaction|anti[\s-]+money\s+laundering|financial\s+intelligence|unusual\s+transaction|currency\s+transaction\s+report|suspicious\s+matter\s+report|transaction\s+monitoring|red\s+flag\s+indicator)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - suspicious activity reports
    - suspicious
    - activity
    - reports
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: suspicious activity report
      description: Primary topic phrase match
    - value: sar filing
      description: Case-insensitive topic phrase match
    - value: suspicious transaction
      description: Alternative topic phrase match
    - value: anti-money laundering
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_suspicious_activity_reports
      matches:
        - ref: Pattern_global_top500_133_suspicious_activity_reports_label_context
        - ref: Keyword_global_top500_133_suspicious_activity_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_133_suspicious_activity_reports_noise_exclusion
    - confidence_level: 75
      id_match: Regex_suspicious_activity_reports
      matches:
        - ref: Keyword_suspicious_activity_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_133_suspicious_activity_reports_noise_exclusion
    - confidence_level: 65
      id_match: Regex_suspicious_activity_reports
      matches:
        - ref: Keyword_suspicious_activity_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_133_suspicious_activity_reports_noise_exclusion
  regexes:
    - id: Regex_suspicious_activity_reports
      pattern: (?is)\b(?:suspicious\s+activity\s+report|SAR\s+filing|suspicious\s+transaction|anti[\s-]+money\s+laundering|financial\s+intelligence|unusual\s+transaction|currency\s+transaction\s+report|suspicious\s+matter\s+report|transaction\s+monitoring|red\s+flag\s+indicator)\b
    - id: Pattern_global_top500_133_suspicious_activity_reports_label_context
      pattern: (?i)\\b(?:suspicious\\s+activity\\s+reports|suspicious|activity|reports|top500)\\b
  keywords:
    - id: Keyword_suspicious_activity_reports
      groups:
        - match_style: word
          terms:
            - suspicious activity report
            - SAR filing
            - suspicious transaction
            - anti-money laundering
            - financial intelligence
            - unusual transaction
            - currency transaction report
            - FinCEN
            - AUSTRAC
            - suspicious matter report
            - transaction monitoring
            - red flag indicator
    - id: Keyword_global_top500_133_suspicious_activity_reports_domain_context
      groups:
        - match_style: word
          terms:
            - suspicious activity reports
            - suspicious
            - activity
            - reports
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_133_suspicious_activity_reports_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
