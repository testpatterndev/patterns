schema: testpattern/v1
name: Personal email address
slug: global-top500-044-personal-email-address
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to personal email address in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: pii-personal, correspondence-address-labels, correspondence-action-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:personal\s+email\s+address|personal\s+email|email\s+address|private\s+email|personal\s+inbox|contact\s+email|home\s+email|email\s+contact)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - personal email address
    - personal
    - email
    - address
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - pii-personal
    - correspondence-address-labels
    - correspondence-action-terms
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: personal email address
      description: Primary topic phrase match
    - value: personal email
      description: Case-insensitive topic phrase match
    - value: email address
      description: Alternative topic phrase match
    - value: private email
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to personal email address appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_personal_email_address
      matches:
        - ref: Pattern_global_top500_044_personal_email_address_label_context
        - ref: Keyword_global_top500_044_personal_email_address_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_personal_email_address
      matches:
        - ref: Keyword_personal_email_address
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_personal_email_address
      pattern: (?is)\b(?:personal\s+email\s+address|personal\s+email|email\s+address|private\s+email|personal\s+inbox|contact\s+email|home\s+email|email\s+contact)\b
    - id: Pattern_global_top500_044_personal_email_address_label_context
      pattern: (?i)\b(?:personal\s+email\s+address)\b
  keywords:
    - id: Keyword_personal_email_address
      groups:
        - match_style: word
          terms:
            - personal email address
            - personal email
            - email address
            - private email
            - personal inbox
            - contact email
            - home email
            - email contact
            - gmail
            - yahoo
            - outlook
            - hotmail
      strength: specific
    - id: Keyword_global_top500_044_personal_email_address_domain_context
      groups:
        - match_style: word
          terms:
            - personal email address
            - personal
            - email
            - address
      strength: domain
risk_description: >-
  This medium-confidence concept pattern looks for personal-email, private-email, and email-address language rather than validating every matched value as an RFC mailbox. A genuine personal address can enable phishing, unwanted contact, account discovery, or correlation across services when the owner's identity is known. Empty forms, privacy policies, and instructions about personal email are common false positives, and one address contains no mailbox content or authentication secret. Risk 5 OFFICIAL reflects bounded contact and targeting harm; SENSITIVE would require credentials, confidential correspondence, a protected identity, or a substantial address collection linked to sensitive attributes.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
