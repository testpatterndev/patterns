schema: testpattern/v1
name: Campus incident reports
slug: global-top500-353-campus-incident-reports
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to campus incident reports in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:campus\s+incident|incident\s+report|campus\s+security|student\s+conduct|safety\s+report|security\s+breach|campus\s+police|emergency\s+response|threat\s+assessment|campus\s+safety|incident\s+log|witness\s+statement)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - campus incident reports
    - campus
    - incident
    - reports
    - education
    - research
    - administration
  proximity: 300
test_cases:
  should_match:
    - value: campus incident
      description: Primary topic phrase match
    - value: incident report
      description: Case-insensitive topic phrase match
    - value: campus security
      description: Alternative topic phrase match
    - value: student conduct
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: campus incident security incident
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to campus incident reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  This regex recognizes campus-incident, incident-report, campus-security, or student-conduct language with contextual gating, indicating a potentially composite incident case. A genuine report may identify complainants, witnesses, accused students, locations, allegations, injuries, and response actions, enabling retaliation, stigma, interference, or safety risks. Even one case can cause serious personal, disciplinary, and legal harm, though the detector does not establish a protected investigation or broad emergency operation. Risk 8 and SENSITIVE are proportionate; PROTECTED would require imminent life-safety exposure, protected operational tactics, or a large repository whose loss causes significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_campus_incident
      matches:
        - ref: Pattern_global_top500_353_campus_incident_reports_label_context
        - ref: Keyword_global_top500_353_campus_incident_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_campus_incident
      matches:
        - ref: Keyword_campus_incident
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_campus_incident
      pattern: >-
        (?is)\b(?:campus\s+incident|incident\s+report|campus\s+security|student\s+conduct|safety\s+report|security\s+breach|campus\s+police|emergency\s+response|threat\s+assessment|campus\s+safety|incident\s+log|witness\s+statement)\b
    - id: Pattern_global_top500_353_campus_incident_reports_label_context
      pattern: (?i)\b(?:campus\s+incident\s+reports)\b
  keywords:
    - id: Keyword_campus_incident
      groups:
        - match_style: word
          terms:
            - campus incident
            - incident report
            - campus security
            - student conduct
            - safety report
            - security breach
            - campus police
            - emergency response
            - threat assessment
            - campus safety
            - incident log
            - witness statement
      strength: specific
    - id: Keyword_global_top500_353_campus_incident_reports_domain_context
      groups:
        - match_style: word
          terms:
            - campus incident reports
            - campus
            - incident
            - reports
      strength: domain
created: '2026-02-08'
updated: '2026-07-14'
changelog:
  - version: 1.2.2
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1899 without changing detector or package metadata.'
  - version: 1.2.1
    date: '2026-07-12'
    description: 'Baseline burn-down: mark the no-evidence 65 tier discovery_only — it is a broad inventory tier by shape (id_match only, no required evidence), so bare topic fragments correctly surface in discovery rather than counting as classification; aligns with corpus convention and clears the should_not_match failure + check:quality discoveryMissing informational. No compiled detection change (discovery_only is harness/quality metadata).'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
