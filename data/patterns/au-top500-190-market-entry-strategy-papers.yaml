schema: testpattern/v1
name: Market entry strategy papers
slug: au-top500-190-market-entry-strategy-papers
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to market entry strategy papers in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:market\s+entry\s+strategy|market\s+entry|market\s+expansion|new\s+market|market\s+penetration|geographic\s+expansion|market\s+assessment|competitive\s+landscape|target\s+market|market\s+sizing|entry\s+barriers)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - market entry strategy papers
    - market
    - entry
    - strategy
    - papers
    - mergers
    - acquisitions
  proximity: 300
test_cases:
  should_match:
    - value: market entry strategy
      description: Primary topic phrase match
    - value: market entry
      description: Case-insensitive topic phrase match
    - value: market expansion
      description: Alternative topic phrase match
    - value: new market
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to market entry strategy papers appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_market_entry_strategy
      matches:
        - ref: Evidence_market_entry_strategy
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_market_entry_strategy
      matches:
        - ref: Evidence_market_entry_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_market_entry_strategy
      matches:
        - ref: Evidence_market_entry_strategy
  regexes:
    - id: Pattern_market_entry_strategy
      pattern: >-
        (?is)\b(?:market\s+entry\s+strategy|market\s+entry|market\s+expansion|new\s+market|market\s+penetration|geographic\s+expansion|market\s+assessment|competitive\s+landscape|target\s+market|market\s+sizing|entry\s+barriers)\b
  keywords:
    - id: Evidence_market_entry_strategy
      groups:
        - match_style: word
          terms:
            - market entry strategy
            - market entry
            - go-to-market
            - market expansion
            - new market
            - market penetration
            - geographic expansion
            - market assessment
            - competitive landscape
            - target market
            - market sizing
            - entry barriers
            - confidential
risk_description: >-
  This regex identifies market-entry strategy, expansion plans, new-market analysis, launch sequencing, and route-to-market language, aiming at an internal decision paper rather than public market research. A genuine strategy can reveal target geographies or segments, investment limits, channel choices, pricing assumptions, regulatory barriers, and planned timing, allowing competitors to pre-empt entry or counterparties to demand better terms. The medium-confidence detector may also match published consultancy reports and generic business-school material. Risk 8 and SENSITIVE Financial reflect serious contained competitive harm; PROTECTED would require a nationally strategic market action or compromise capable of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
