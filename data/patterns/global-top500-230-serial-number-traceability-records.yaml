        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_230_serial_number_traceability_records_noise_exclusion
    - confidence_level: 75
      id_match: Regex_serial_number_traceability
      matches:
        - ref: Keyword_serial_number_traceability
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_230_serial_number_traceability_records_noise_exclusion
    - confidence_level: 65
      id_match: Regex_serial_number_traceability
      matches:
        - ref: Keyword_serial_number_traceability
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_230_serial_number_traceability_records_noise_exclusion
  regexes:
    - id: Regex_serial_number_traceability
      pattern: (?is)\b(?:serial\s+number\s+traceability\s+records|serial\s+number|traceability\s+record|lot\s+number|product\s+quality|safety\s+traceability|batch\s+tracking|component\s+traceability|manufacturing\s+record|production\s+lot)\b
    - id: Pattern_global_top500_230_serial_number_traceability_records_label_context
      pattern: (?i)\\b(?:serial\\s+number\\s+traceability\\s+records|serial|traceability|top500)\\b
  keywords:
