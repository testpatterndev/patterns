schema: testpattern/v1
name: FOI Exemption Section References
slug: au-foi-exemption-references
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: Detects Freedom of Information Act exemption section references (sections 33-38 and 42-47) in Australian government documents. Requires FOI/freedom of information keyword context.
operation: >-
  Regex pattern using universal engine. The top-level regex (?i)\b(?:s(?:ection|ect)?\.?\s*(?:3[3-8]|4[2-7][A-Za-z]?))\b matches FOI Act section references in formats like s33, section 47F, sect.38,
  etc. for sections 33-38 and 42-47 (with optional letter suffix). The Purview engine uses Pattern_au_foi_section (same regex). Three confidence tiers: High (85) requires FOI terms + government
  context keywords with template exclusion logic; Medium (75) requires FOI terms with source code exclusion; Low (65) requires legal context keywords. Evidence uses 3 keyword groups (10 FOI terms, 8
  government context terms, 10 legal context terms) within 300-character proximity. Keyword lists: au-government-foi.
pattern: (?i)\b(?:s(?:ection|ect)?\.?\s*(?:3[3-8]|4[2-7][A-Za-z]?))\b
confidence: medium
confidence_justification: >-
  Medium confidence: section number references are somewhat specific to FOI contexts when combined with the s/section prefix and constrained number ranges. However, legislative section references
  appear in many legal contexts, so corroborative keywords improve accuracy.
jurisdictions:
  - au
regulations:
  - IPA 2009 (Qld)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - DISP
  - ISO 27001
  - NIST CSF
data_categories:
  - government
  - security
corroborative_evidence:
  keywords:
    - FOI
    - freedom of information
    - exemption
  proximity: 300
  keyword_lists:
    - au-government-foi
test_cases:
  should_match:
    - value: s33
      description: FOI Act section 33 exemption
    - value: s47F
      description: FOI Act section 47F personal privacy
    - value: s38
      description: FOI Act section 38 secrecy provisions
  should_not_match:
    - value: s32
      description: Section number below valid range (32 instead of 33-38)
    - value: s39
      description: Section number above valid range (39 instead of 33-38)
    - value: s41
      description: Section 41 not in valid range (42-47)
false_positives:
  - description: Legislative section references in non-FOI contexts such as other acts, regulations, or legal documents that use sections 33-38 or 42-47.
    mitigation: Require proximity to FOI-specific keywords such as FOI, freedom of information, exemption, or right to information to confirm FOI context.
  - description: Code snippets and configuration examples containing section-related keywords or numeric references in developer documentation.
    mitigation: Check for common source code patterns (function, import, class) and exclude technical contexts to reduce false positives.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 4
risk_description: >-
  This regex finds Australian FOI exemption citations in sections 33-38 and 42-47, such as s33 or section 47F, when FOI, government, or legal context is nearby. The detector returns a public statutory reference, not the information withheld under that provision, although a citation can modestly hint at privacy, security, or deliberative concerns. Harm to an agency or applicant is low and correlation-dependent unless surrounding text reveals exempt facts, legal tactics, or an unreleased decision. Risk 4 OFFICIAL is appropriate for the citation; SENSITIVE is not met without substantive exempt material, identifiable case content, legal strategy, or a protected operational record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_au_foi_section
      matches:
        - ref: Evidence_foi_terms
        - ref: Evidence_government_context
      excludes:
        - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_au_foi_section
      matches:
        - ref: Evidence_foi_terms
      excludes:
        - ref: Evidence_source_code_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_au_foi_section
      matches:
        - ref: Evidence_legal_context
  regexes:
    - id: Pattern_au_foi_section
      pattern: (?i)\b(?:s(?:ection|ect)?\.?\s*(?:3[3-8]|4[2-7][A-Za-z]?))\b
  keywords:
    - id: Evidence_foi_terms
      groups:
        - match_style: word
          terms:
            - text: FOI
              case_sensitive: true
            - freedom of information
            - FOI Act
            - FOI request
            - FOI exemption
            - right to information
            - text: RTI
              case_sensitive: true
            - information access
            - exemption
            - exempt
      strength: specific
    - id: Evidence_government_context
      groups:
        - match_style: word
          terms:
            - government
            - department
            - agency
            - minister
            - public servant
            - official
            - Commonwealth
            - state government
      strength: domain
    - id: Evidence_legal_context
      groups:
        - match_style: word
          terms:
            - legal
            - legislation
            - act
            - statute
            - section
            - provision
            - clause
            - exemption
            - disclosure
            - public interest
      strength: domain
    - id: Evidence_source_code_exclusion
      type: any
      min_matches: 0
      max_matches: 0
      groups:
        - match_style: word
          terms:
            - source code
            - function
            - method
            - variable
            - import
            - class
      strength: noise
