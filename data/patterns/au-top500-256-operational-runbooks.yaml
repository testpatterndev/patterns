schema: testpattern/v1
name: Operational runbooks
slug: au-top500-256-operational-runbooks
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies operational runbooks patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:operational\s+runbook|runbook\s+procedure|incident\s+response|escalation\s+procedure|on[\s-]+call\s+playbook|standard\s+operating\s+procedure|troubleshooting\s+guide|operational\s+procedure|recovery\s+steps|service\s+operations)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - operational runbooks
    - operational
    - runbooks
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: operational runbook
      description: Primary topic phrase match
    - value: runbook procedure
      description: Case-insensitive topic phrase match
    - value: incident response
      description: Alternative topic phrase match
    - value: escalation procedure
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_operational_runbooks
      matches:
        - ref: Evidence_operational_runbooks
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_operational_runbooks
      matches:
        - ref: Evidence_operational_runbooks
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_operational_runbooks
      matches:
        - ref: Evidence_operational_runbooks
  regexes:
    - id: Pattern_operational_runbooks
      pattern: (?is)\b(?:operational\s+runbook|runbook\s+procedure|incident\s+response|escalation\s+procedure|on[\s-]+call\s+playbook|standard\s+operating\s+procedure|troubleshooting\s+guide|operational\s+procedure|recovery\s+steps|service\s+operations)\b
  keywords:
    - id: Evidence_operational_runbooks
      groups:
        - match_style: word
          terms:
            - operational runbook
            - runbook procedure
            - incident response
            - escalation procedure
            - on-call playbook
            - standard operating procedure
            - troubleshooting guide
            - operational procedure
            - recovery steps
            - service operations
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
