schema: testpattern/v1
name: Operational runbooks
slug: au-top500-256-operational-runbooks
version: 1.5.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies operational runbooks patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:operational\s+runbook|on[\s-]call\s+(?:runbook|playbook)|incident\s+response\s+(?:runbook|playbook)|dr\s+runbook|disaster\s+recovery\s+runbook|sre\s+runbook|runbook\s+procedure|escalation\s+runbook|recovery\s+runbook)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - runbook
    - playbook
    - on-call
    - escalation path
    - SRE
    - pager duty
    - incident response runbook
    - disaster recovery runbook
    - on-call schedule
  proximity: 300
test_cases:
  should_match:
    - value: operational runbook
      description: 3-judge panel revised test case
    - value: on-call runbook
      description: 3-judge panel revised test case
    - value: on call playbook
      description: 3-judge panel revised test case
    - value: incident response runbook
      description: 3-judge panel revised test case
    - value: incident response playbook
      description: 3-judge panel revised test case
    - value: DR runbook
      description: 3-judge panel revised test case
    - value: disaster recovery runbook
      description: 3-judge panel revised test case
    - value: SRE runbook
      description: 3-judge panel revised test case
    - value: runbook procedure
      description: 3-judge panel revised test case
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_operational_runbooks
      matches:
        - ref: Evidence_operational_runbooks
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_operational_runbooks
      matches:
        - ref: Evidence_operational_runbooks
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_operational_runbooks
      matches:
        - ref: Evidence_operational_runbooks
  regexes:
    - id: Pattern_operational_runbooks
      pattern: >-
        (?is)\b(?:operational\s+runbook|on[\s-]call\s+(?:runbook|playbook)|incident\s+response\s+(?:runbook|playbook)|dr\s+runbook|disaster\s+recovery\s+runbook|sre\s+runbook|runbook\s+procedure|escalation\s+runbook|recovery\s+runbook)\b
  keywords:
    - id: Evidence_operational_runbooks
      groups:
        - match_style: word
          terms:
            - runbook
            - playbook
            - on-call
            - escalation path
            - text: SRE
              case_sensitive: true
            - pager duty
            - incident response runbook
            - disaster recovery runbook
            - on-call schedule
      strength: specific
risk_description: >-
  The classifier recognizes operational, on-call, incident-response, and playbook runbooks, identifying a procedural artifact rather than merely an operations topic. A disclosed runbook can reveal privileged commands, service endpoints, escalation contacts, failover steps, maintenance windows, and control dependencies that help an attacker evade response or cause disruption. The operating team and users of the covered service face serious availability and security risk, but misuse normally requires system access and the runbook is bounded to a defined procedure or service. Risk 8 and SENSITIVE fit an internal production runbook, while emergency credentials, destructive recovery steps, or critical-service control procedures would raise the context toward PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
