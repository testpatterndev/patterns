schema: testpattern/v1
name: Land registry ownership files
slug: au-top500-393-land-registry-ownership-files
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to land registry ownership files in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: corporate-ip. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:land\s+registry\s+ownership\s+files|land\s+registry|title\s+deed|Torrens\s+title|property\s+transfer|lot\s+on\s+plan|real\s+property)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - land registry ownership files
    - land
    - registry
    - ownership
    - files
    - government
    - citizen
    - services
  proximity: 300
  keyword_lists:
    - corporate-ip
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: land registry ownership files
      description: Primary topic phrase match
    - value: land registry
      description: Case-insensitive topic phrase match
    - value: title deed
      description: Alternative topic phrase match
    - value: Torrens title
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to land registry ownership files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_land_registry_ownership
      matches:
        - ref: Evidence_land_registry_ownership
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_land_registry_ownership
      matches:
        - ref: Evidence_land_registry_ownership
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_land_registry_ownership
      matches:
        - ref: Evidence_land_registry_ownership
  regexes:
    - id: Pattern_land_registry_ownership
      pattern: (?is)\b(?:land\s+registry\s+ownership\s+files|land\s+registry|title\s+deed|Torrens\s+title|property\s+transfer|lot\s+on\s+plan|real\s+property)\b
    - id: Pattern_au_top500_393_land_registry_ownership_files_label_context
      pattern: (?i)\b(?:land\s+registry\s+ownership\s+files)\b
  keywords:
    - id: Evidence_land_registry_ownership
      groups:
        - match_style: word
          terms:
            - land registry ownership files
            - land registry
            - ownership
            - title deed
            - Torrens title
            - property transfer
            - lot on plan
            - cadastral
            - conveyancing
            - real property
            - encumbrance
    - id: Keyword_au_top500_393_land_registry_ownership_files_domain_context
      groups:
        - match_style: word
          terms:
            - land registry ownership files
            - land
            - ownership
            - files
risk_description: >-
  The regex identifies land registry ownership file, land registry, title deed, and Torrens title language with eight related terms nearby. A normal true positive can connect an owner or entity to a parcel, dealing, mortgage interest, or transfer, but ownership and title information is often available through statutory searches and public registers. Targeted fraud or unwanted profiling usually requires verified identity, transaction, or financial data beyond the topic match, and guidance documents can collide. Risk 5 OFFICIAL reflects bounded correlation harm; SENSITIVE requires concealed beneficial ownership, protected-address details, or a non-public bulk ownership extract.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
