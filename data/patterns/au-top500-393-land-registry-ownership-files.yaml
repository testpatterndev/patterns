      pattern: (?is)\b(?:land\s+registry\s+ownership\s+files|land\s+registry|title\s+deed|Torrens\s+title|property\s+transfer|lot\s+on\s+plan|real\s+property)\b
    - id: Pattern_au_top500_393_land_registry_ownership_files_label_context
      pattern: (?i)\\b(?:land\\s+registry\\s+ownership\\s+files|land|registry|ownership|files|top500)\\b
  keywords:
