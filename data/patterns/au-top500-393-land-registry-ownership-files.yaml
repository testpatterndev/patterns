      matches:
        - ref: Evidence_land_registry_ownership
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_393_land_registry_ownership_files_noise_exclusion
    - confidence_level: 75
