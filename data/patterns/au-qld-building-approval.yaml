schema: testpattern/v1
name: QLD Building Approval
slug: au-qld-building-approval
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies Queensland building approvals, permits, certifications, development applications, and
  occupancy/compliance records. Topic phrases are retained for discovery; enforcement requires actual
  decision, condition, assessment, certification, or approved-work content, and high confidence also
  requires a formal application identifier and Queensland authority context.
operation: >-
  Pattern_building_approval recognises building-approval and development-application topics. The topic
  alone is discovery-only at 65. Decision, condition, assessment, certification, or approved-work
  content raises it to 75; substantive record content plus a formal application/reference identifier
  and QBCC or Queensland authority context reaches 85. Enforcing tiers reject explicit templates and
  training examples.
pattern: >-
  (?i)\b(?:Queensland\s+building\s+approval|building\s+(?:approval|permit|certification)|development\s+(?:permit|application)|planning\s+(?:permit|approval)|occupancy\s+certificate|compliance\s+certificate)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive approval-record content rather than general guidance. High
  confidence adds a formal identifier and Queensland authority reference.
jurisdictions:
  - au
regulations:
  - IPA 2009 (Qld)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - DISP
  - ISO 27001
  - NIST CSF
data_categories:
  - government
  - infrastructure
test_cases:
  should_match:
    - value: Queensland building approval
      description: Low-tier probe - approval topic without substantive record content
    - value: 'Building approval decision notice: conditions of approval, approved works, and assessment manager details'
      description: Medium-tier probe - substantive approval content without authority and identifier
    - value: 'QBCC building approval decision notice BA20261234: conditions of approval and approved works certified by the Queensland Building and Construction Commission'
      description: High-tier probe - substantive record with formal identifier and Queensland authority
  should_not_match:
    - value: Approval to proceed with the project
      description: Generic approval outside building regulation
    - value: Building rapport with the team
      description: Non-construction use of building
    - value: 'How to apply for a building permit in Queensland'
      description: Public guidance without an approval decision or record
    - value: 'Training example: QBCC building approval decision notice BA20261234 with conditions of approval'
      description: Explicit training content must not enforce
false_positives:
  - description: Public planning guidance and applicant checklists discuss building permits, development applications, certifiers, and approval conditions without containing an issued record.
    mitigation: Keep topic-only matches discovery-only and require decision, condition, assessment, certification, or approved-work content for enforcement.
  - description: Training and form examples can include realistic QBCC references, application numbers, and decision language.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - yaml
scope: narrow
risk_rating: 5
risk_description: >-
  The keyword pattern identifies Queensland building approvals, QBCC permits, development applications, certifier documents, and occupancy or compliance certificates. A genuine approval can reveal a site, proposed works, responsible parties, and regulatory status, which may modestly affect privacy, commercial timing, or property security when combined with an address. Much of the information is routine planning administration or ultimately public, and the detector does not establish a protected facility or exploitable building plan. Risk 5 OFFICIAL reflects bounded contextual harm; SENSITIVE is not met without confidential design, security features, protected-location data, or a contentious unreleased development decision.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_building_approval
      matches:
        - ref: Evidence_approval_record_detail
        - ref: Evidence_formal_application_id
        - ref: Evidence_qld_building_authority
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_building_approval
      matches:
        - ref: Evidence_approval_record_detail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_building_approval
  regexes:
    - id: Pattern_building_approval
      pattern: >-
        (?i)\b(?:Queensland\s+building\s+approval|building\s+(?:approval|permit|certification)|development\s+(?:permit|application)|planning\s+(?:permit|approval)|occupancy\s+certificate|compliance\s+certificate)\b
    - id: Evidence_formal_application_id
      pattern: '(?i)\b(?:BA\d{8}|DA/\d{4}/\d{4,5}|application\s+(?:number|reference)\s*[:#]?\s*[A-Z0-9/-]{5,})\b'
  keywords:
    - id: Evidence_approval_record_detail
      groups:
        - match_style: word
          terms:
            - decision notice
            - conditions of approval
            - approved works
            - assessment manager
            - occupancy permit
            - occupancy certificate
            - compliance certificate
            - building certifier
            - building classification
      strength: domain
    - id: Evidence_qld_building_authority
      groups:
        - match_style: word
          terms:
            - text: QBCC
              case_sensitive: true
            - Queensland Building and Construction Commission
            - Building Act 1975
            - Queensland Government
            - State of Queensland
      strength: specific
created: '2026-02-09'
updated: '2026-07-04'
changelog:
  - version: 1.4.0
    date: '2026-07-04'
    description: 'Profile quality hardening: preserve risk 5 OFFICIAL while converting the keyword-list detector to a regex-backed concept; require substantive approval-record content at 75 and a formal identifier plus Queensland authority context at 85.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 575 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
