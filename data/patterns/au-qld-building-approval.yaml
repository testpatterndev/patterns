schema: testpattern/v1
name: QLD Building Approval
slug: au-qld-building-approval
version: 1.3.1
type: keyword_list
pattern_class: concept
description: Detects QLD building approval documents including QBCC permits and development applications.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - IPA 2009 (Qld)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - DISP
  - ISO 27001
  - NIST CSF
data_categories:
  - government
  - infrastructure
test_cases:
  should_match:
    - value: 'QBCC building approval: development application and building permit'
      description: Test match 1
    - value: Building certifier compliance certificate and occupancy certificate
      description: Test match 2
    - value: QLD building approval for building work per building code requirements
      description: Test match 3
  should_not_match:
    - value: Approval to proceed with the project
      description: Non-match 1
    - value: Building rapport with the team
      description: Non-match 2
false_positives:
  - description: Generic approval or building in non-construction contexts.
    mitigation: Require QBCC or building permit keywords.
exports:
  - yaml
scope: narrow
risk_rating: 5
risk_description: >-
  The keyword pattern identifies Queensland building approvals, QBCC permits, development applications, certifier documents, and occupancy or compliance certificates. A genuine approval can reveal a site, proposed works, responsible parties, and regulatory status, which may modestly affect privacy, commercial timing, or property security when combined with an address. Much of the information is routine planning administration or ultimately public, and the detector does not establish a protected facility or exploitable building plan. Risk 5 OFFICIAL reflects bounded contextual harm; SENSITIVE is not met without confidential design, security features, protected-location data, or a contentious unreleased development decision.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_building_approval
      matches:
        - ref: Evidence_building_certification
        - ref: Evidence_qbcc
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_development_permit
      matches:
        - ref: Evidence_qld_government
  regexes:
    - id: Pattern_building_approval
      pattern: (?i)\b(?:building\s+(?:approval|permit|certification)|development\s+(?:permit|application)|ba\d{8})\b
    - id: Pattern_development_permit
      pattern: (?i)\b(?:da\/\d{4}\/\d{4,5}|development\s+application|planning\s+(?:permit|approval))\b
  keywords:
    - id: Evidence_building_certification
      groups:
        - match_style: word
          terms:
            - building approval
            - building permit
            - building certification
            - development permit
            - development application
            - occupancy permit
            - compliance certificate
            - building certifier
      strength: specific
    - id: Evidence_qbcc
      groups:
        - match_style: word
          terms:
            - QBCC
            - Queensland Building and Construction Commission
            - Building Act 1975
            - Building Code of Australia
            - text: BCA
              case_sensitive: true
            - certifier registration
            - pool safety certificate
      strength: specific
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
created: '2026-02-09'
updated: '2026-07-14'
changelog:
