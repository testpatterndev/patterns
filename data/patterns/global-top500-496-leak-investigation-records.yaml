      - investigation
    strength: domain
risk_description: The concept SIT detects leak investigations, unauthorised disclosure, source identification, forensic analysis,
  access audits, chain of custody, and insider-threat language; it does not prove that an active investigative file is present.
  A genuine record can reveal suspects, witnesses, evidence, hypotheses, access patterns, and forensic methods, warning the
  subject, enabling evidence destruction, or exposing innocent employees to retaliation. Harm is serious but normally contained
  to one investigation and its participants, while incident-response policies and public leak reporting can match the same
  concepts. Risk 8 and SENSITIVE are justified; PROTECTED would require classified sources, covert capabilities, or an active
  case whose compromise is likely to cause significant national or life-safety damage.
