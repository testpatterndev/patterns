    - ref: Keyword_global_top500_496_leak_investigation_records_domain_context
    - ref: Keyword_leak_investigation
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_leak_investigation
    matches:
    - ref: Pattern_global_top500_496_leak_investigation_records_label_context
    - ref: Keyword_global_top500_496_leak_investigation_records_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_leak_investigation
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
