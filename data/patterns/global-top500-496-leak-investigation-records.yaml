      terms:
      - leak investigation records
      - leak investigation
      - unauthorized disclosure
      - information leak
      - classified leak
      - source identification
      - forensic analysis
      - chain of custody
      - security breach
      - insider threat
      - access audit
      - disclosure investigation
    strength: specific
  - id: Keyword_global_top500_496_leak_investigation_records_domain_context
    groups:
