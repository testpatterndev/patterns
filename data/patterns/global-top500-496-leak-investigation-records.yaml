  regexes:
  - id: Regex_leak_investigation
    pattern: (?is)\b(?:leak\s+investigation\s+records|leak\s+investigation|unauthorized\s+disclosure|information\s+leak|classified\s+leak|source\s+identification|forensic\s+analysis|chain\s+of\s+custody|security\s+breach|insider\s+threat|access\s+audit|disclosure\s+investigation)\b
  - id: Pattern_global_top500_496_leak_investigation_records_label_context
    pattern: (?i)\b(?:leak\s+investigation\s+records)\b
  keywords:
