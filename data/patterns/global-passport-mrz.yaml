schema: testpattern/v1
name: Passport Machine-Readable Zone (MRZ, ICAO 9303)
slug: global-passport-mrz
version: 1.2.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects the Machine-Readable Zone (MRZ) of an ICAO 9303 travel document, the OCR-B text printed at the bottom of
  passport data pages and scanned at border control. This pattern focuses on the TD3 passport format (two lines of 44
  characters): line 1 begins 'P' + document subtype + 3-letter issuing state + the holder's names, and line 2 packs
  the document number, check digits, nationality, date of birth, sex and expiry. MRZ leakage via scans, photocopies
  and OCR exports is one of the highest-value passport data exposure vectors because it concentrates every identity
  field in a single fixed-width block.
operation: >-
  Reference: https://en.wikipedia.org/wiki/Machine-readable_passport
  Primary match is the TD3 second line (44 fixed-width [A-Z0-9<] characters: document number + check digit +
  nationality + DOB + check + sex + expiry + check + optional data + check + composite check). A secondary regex
  matches the TD3 first line ('P' + subtype + issuing state + name field). The MRZ alphabet is uppercase A-Z, digits
  0-9 and the filler '<' only. Checksum: ICAO 9303 weighted (7,3,1) check digits (NOT enforced in this regex-only
  pattern; the check-digit positions are matched structurally but their arithmetic is not validated).
pattern: (?<![A-Z0-9<])(?:[A-Z0-9<]{9}[0-9<][A-Z<]{3}[0-9<]{6}[0-9<][MFXmfx<][0-9<]{6}[0-9<][A-Z0-9<]{14}[0-9<][0-9<]|P[A-Z<][A-Z]{3}[A-Z]+<<[A-Z<]{2,})(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the TD3 second line is a 44-character fixed-width structure with field-typed positions (filler
  characters, sex marker, six-digit dates and trailing check digits) that essentially never occurs by chance in
  natural text or ordinary identifiers.
jurisdictions:
  - global
regulations:
  - GDPR
  - "CCPA/CPRA"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - MRZ
    - machine readable zone
    - machine-readable zone
    - travel document
    - ICAO
    - issuing country
    - date of expiry
  proximity: 300
test_cases:
  should_match:
    - value: L898902C36UTO7408122F1204159ZE184226B<<<<<10
      description: TD3 line 2 (document number, nationality UTO, DOB, sex F, expiry, check digits) - ICAO sample
    - value: AB21234567FRA8001019M3001012<<<<<<<<<<<<<<04
      description: TD3 line 2 with FRA nationality, sex M, optional field filler and check digits
    - value: P<UTOERIKSSON<<ANNA<MARIA<<<<<<<<<<<<<<<<<<<
      description: TD3 line 1, document type P, issuing state UTO, surname/given-name with filler
    - value: |-
        Passport MRZ
        P<UTOERIKSSON<<ANNA<MARIA<<<<<<<<<<<<<<<<<<<
        L898902C36UTO7408122F1204159ZE184226B<<<<<10
      description: Exact 85 probe - paired TD3 lines with explicit passport/MRZ context
  should_not_match:
    - value: P<
      description: Bare document-type marker without the full MRZ line structure
    - value: PASSPORT NUMBER L898902C3 ISSUED BY UTOPIA AUTHORITY
      description: Prose containing passport tokens but not the fixed-width MRZ structure
    - value: 1234567890123456789012345678901234567890ABCD
      description: 44 characters but not a valid MRZ field layout (no sex marker or date structure in position)
    - value: |-
        Documentation example: Passport MRZ
        P<UTOERIKSSON<<ANNA<MARIA<<<<<<<<<<<<<<<<<<<
        L898902C36UTO7408122F1204159ZE184226B<<<<<10
      description: Template/documentation block contains both lines but is vetoed by shared template evidence
    - value: |-
        Public specimen passport MRZ
        P<UTOERIKSSON<<ANNA<MARIA<<<<<<<<<<<<<<<<<<<
        L898902C36UTO7408122F1204159ZE184226B<<<<<10
      description: Public specimen block is vetoed from enforcement by specimen context
    - value: 'Visa number E12345678 issued by the border authority.'
      description: Sibling travel-document identifier does not satisfy either TD3 line structure
false_positives:
  - description: Long runs of uppercase letters, digits and '<' that coincidentally satisfy the fixed-width field layout.
    mitigation: Require corroborative passport/MRZ keywords within 300 characters; optionally validate the ICAO check digits.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 5
risk_description: >-
  A true TD3 passport MRZ match is a two-line fixed-width travel-document block containing holder names, passport number, nationality, date of birth, sex, expiry, and check-digit positions rather than one atomic identifier. Leakage of OCR text or a passport-page scan can support high-quality identity impersonation and document fraud for one traveller even without biometrics. The 44-character layout makes accidental matches uncommon, although this regex does not validate ICAO checksum arithmetic or prove that the text came from an authentic document. Risk 5 and OFFICIAL reflect a single structured OCR block without portrait or demonstrated account use; SENSITIVE requires a passport page, linked itinerary or immigration record, or evidence of consequential identity misuse.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_td3_second_line
      matches:
        - ref: Pattern_td3_first_line
        - ref: Evidence_mrz_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_public_specimen
      description: Fixed-width TD3 second line paired with the first line and explicit passport/MRZ context
    - confidence_level: 75
      id_match: Pattern_td3_second_line
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_public_specimen
      description: Fixed-width TD3 second line with field-typed positions
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_td3_first_line
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_public_specimen
      description: TD3 passport first-line candidate for discovery inventory only
  regexes:
    - id: Pattern_td3_first_line
      pattern: (?<![A-Z0-9<])P[A-Z<][A-Z]{3}[A-Z]+<<[A-Z<]{2,}(?![A-Za-z0-9])
    - id: Pattern_td3_second_line
      pattern: (?<![A-Z0-9<])[A-Z0-9<]{9}[0-9<][A-Z<]{3}[0-9<]{6}[0-9<][MFXmfx<][0-9<]{6}[0-9<][A-Z0-9<]{14}[0-9<][0-9<](?![A-Za-z0-9])
  keywords:
    - id: Evidence_mrz_context
      groups:
        - match_style: word
          terms:
            - passport MRZ
            - machine readable zone
            - machine-readable zone
            - travel document
            - passport data page
            - ICAO 9303
      strength: domain
    - id: Evidence_public_specimen
      groups:
        - match_style: word
          terms:
            - public specimen
            - sample passport
            - test vector
            - public standard example
            - specimen document
      strength: exclusion
