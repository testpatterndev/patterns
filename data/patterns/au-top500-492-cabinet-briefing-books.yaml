schema: testpattern/v1
name: Cabinet briefing books
slug: au-top500-492-cabinet-briefing-books
version: 1.4.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to cabinet briefing books in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:cabinet\s+briefing|briefing\s+book|cabinet\s+submission|ministerial\s+brief|cabinet\s+decision|cabinet\s+minute|Prime\s+Minister|cabinet\s+handbook|executive\s+council|cabinet\s+committee)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - IPA 2009 (Qld)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - DISP
  - ISO 27001
  - NIST CSF
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - cabinet briefing books
    - cabinet
    - briefing
    - books
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: cabinet briefing
      description: Primary topic phrase match
    - value: briefing book
      description: Case-insensitive topic phrase match
    - value: cabinet submission
      description: Alternative topic phrase match
    - value: ministerial brief
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to cabinet briefing books appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_cabinet_briefing_books
      matches:
        - ref: Evidence_cabinet_briefing_books
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_cabinet_briefing_books
      matches:
        - ref: Evidence_cabinet_briefing_books
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_cabinet_briefing_books
      matches:
        - ref: Evidence_cabinet_briefing_books
  regexes:
    - id: Pattern_cabinet_briefing_books
      pattern: >-
        (?is)\b(?:cabinet\s+briefing|briefing\s+book|cabinet\s+submission|ministerial\s+brief|cabinet\s+decision|cabinet\s+minute|Prime\s+Minister|cabinet\s+handbook|executive\s+council|cabinet\s+committee)\b
    - id: Pattern_au_top500_492_cabinet_briefing_books_label_context
      pattern: (?i)\b(?:cabinet\s+briefing\s+books)\b
  keywords:
    - id: Evidence_cabinet_briefing_books
      groups:
        - match_style: word
          terms:
            - cabinet briefing
            - briefing book
            - cabinet submission
            - cabinet-in-confidence
            - ministerial brief
            - cabinet decision
            - cabinet minute
            - Prime Minister
            - cabinet handbook
            - text: PMC
              case_sensitive: true
            - executive council
            - cabinet committee
      strength: specific
    - id: Keyword_au_top500_492_cabinet_briefing_books_domain_context
      groups:
        - match_style: word
          terms:
            - cabinet briefing books
            - cabinet
            - briefing
            - books
      strength: domain
risk_description: >-
  The medium-confidence concept regex looks for Cabinet briefing, briefing book, Cabinet submission, ministerial brief, and related government language, targeting a compiled briefing record without proving a formal Cabinet-in-Confidence marking. A genuine book can expose options, advice, stakeholder positions, decision timing, and unresolved deliberations, creating serious policy, legal, or political harm to government and affected parties. Routine ministerial material, public Cabinet-process guidance, and historical records can also match, so protected deliberation is not inherent in every hit. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. A genuine Cabinet briefing book compiles options, advice, unresolved positions and decision timing. Compromise can prejudice executive deliberation across multiple issues and cause significant government damage. Risk 9 and PROTECTED Government therefore apply to the confirmed record itself. Require Cabinet decision/submission context, agenda/options/recommendation structure or Cabinet-in-Confidence marking; generic ministerial briefs and process guidance remain audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
