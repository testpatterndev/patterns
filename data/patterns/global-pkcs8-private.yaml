schema: testpattern/v1
name: PKCS#8 Private Key Header
slug: global-pkcs8-private
version: 1.4.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects unencrypted PKCS#8 private-key armor. The generic BEGIN PRIVATE KEY
  marker is discovery-only; a DER algorithm prelude supports medium confidence,
  and near-header wrapped body data or an exact compact-key prelude reaches high.
operation: >-
  Regex_pkcs8_private matches the PKCS#8 BEGIN marker. The 75 tier requires an
  adjacent DER Base64 prelude used by PKCS#8. The 85 tier additionally requires
  two consecutive 64-character body lines, or the exact PKCS#8 AlgorithmIdentifier
  prelude used by compact Ed25519, X25519, Ed448, and X448 keys. All enforcing
  evidence is within 300 characters of the header; 65 inventories header-only
  candidates.
pattern: '-----BEGIN PRIVATE KEY-----'
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private key
    - secret key
    - key file
    - PEM
    - certificate
    - RSA
    - cryptographic
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '-----BEGIN PRIVATE KEY-----'
      description: Low-tier probe - generic PKCS#8 armor header only
    - value: |-
        -----BEGIN PRIVATE KEY-----
        MIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQCaPO2QBzKYKwDi
        QQ==
      description: Medium-tier probe - realistic first PKCS#8 DER armor line
    - value: |-
        -----BEGIN PRIVATE KEY-----
        MIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQCaPO2QBzKYKwDi
        k8qK+5bw7VyHxKzg8V+Pw3+QsewdCZi2ueNFTlIMOo0s2ZX/b1QLzu4lu08pMD1x
        ioxlDQbNb1tOxNoLnGBz1eLzKyraT6AMjuQhLCPHYJTq6Mv9e8GBQ0yljRZuUt04
        pXObu8jeQB7Hq+h3gqXsrlEFxc4CIxjzj+WNWhG1XsOLztFPW71Y8lI3EbWp1ERs
        ALFXSqS3Wp67KJUQqspdXP+tNkgyd3Ch48Xu64zI0zP/t7LB9Qmty1eU2S/iPC/l
        2bvvlwQwXDsjjTp5JzVjtxGNyYY6gWwud1A557OgC3bk++TtOdoBsdfYf9yZOLmi
        -----END PRIVATE KEY-----
      description: High-tier probe - realistically long PKCS#8 body with footer beyond proximity
    - value: |-
        -----BEGIN PRIVATE KEY-----
        MC4CAQAwBQYDK2VwBCIEIG85OP50XkCl35ewCA8uIVxShBRJnyyYxGgT51XmyVA=
        -----END PRIVATE KEY-----
      description: High-tier compact-key probe - one-line Ed25519 PKCS#8 body
  should_not_match:
    - value: '-----BEGIN PUBLIC KEY-----'
      description: Public key, not private
    - value: '-----BEGIN CERTIFICATE-----'
      description: Certificate, not private key
    - value: |-
        -----BEGIN PRIVATE KEY-----
        QQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQQ
        AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      description: Adversarial wrapped Base64 lacks a PKCS#8 DER prelude
    - value: |-
        -----BEGIN PRIVATE KEY-----
        PLACEHOLDER
        -----END PRIVATE KEY-----
      description: Placeholder body lacks DER structure
    - value: |-
        Documentation example:
        -----BEGIN PRIVATE KEY-----
        MIIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQCaPO2QBzKYKwDi
        k8qK+5bw7VyHxKzg8V+Pw3+QsewdCZi2ueNFTlIMOo0s2ZX/b1QLzu4lu08pMD1x
        -----END PRIVATE KEY-----
      description: Documentation quoting realistic wrapped PKCS#8 data must not enforce
    - value: '-----BEGIN ENCRYPTED PRIVATE KEY-----'
      description: Sibling encrypted PKCS#8 container has a different armor label
false_positives:
  - description: PEM-encoded certificates or public keys that use similar header formats
    mitigation: The pattern specifically matches the private key header text, but verify the full PEM block contains actual key material.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_description: >-
  This pattern finds the generic PKCS#8 BEGIN PRIVATE KEY header, which marks a private-key container but does not validate or capture the cryptographic body. When usable key bytes follow, disclosure may enable signing, decryption, or service impersonation according to the certificate or application that relies on the key. The expected scope is one key pair and its relying identity or system, while header-only documentation, incomplete blocks, encryption, and revocation reduce actual impact. Risk 8 SENSITIVE reflects a strong indication of serious secret material; PROTECTED requires confirmation that the key is usable and controls broad, critical, or protected operations.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_pkcs8_private
      matches:
        - ref: Evidence_pkcs8_der_prelude
        - type: any
          min_matches: 1
          refs:
            - Evidence_pkcs8_multiline_body
            - Evidence_pkcs8_compact_algorithm
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_pkcs8_private
      matches:
        - ref: Evidence_pkcs8_der_prelude
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pkcs8_private
  regexes:
    - id: Regex_pkcs8_private
      pattern: '-----BEGIN PRIVATE KEY-----'
    - id: Evidence_pkcs8_der_prelude
      pattern: '(?:\r?\n)(?:(?:MII|MIG)[A-Za-z0-9+/]{45,61}|M(?:C4|Ec|EY)CAQAwBQYDK2V[uvwx][A-Za-z0-9+/]{40,48})={0,2}(?:\r?\n)'
    - id: Evidence_pkcs8_multiline_body
      pattern: '(?:\r?\n)(?:[A-Za-z0-9+/]{64}\r?\n){2}'
    - id: Evidence_pkcs8_compact_algorithm
      pattern: '(?:\r?\n)M(?:C4|Ec|EY)CAQAwBQYDK2V[uvwx][A-Za-z0-9+/]{40,48}={0,2}(?:\r?\n)'
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 1.4.0
    date: '2026-07-19'
    description: 'Independent-review blocker remediation: keep generic-header discovery at 65, require a PKCS#8 DER prelude at 75, and require near-header wrapped body lines or an exact compact Ed/X algorithm prelude at 85. Long RSA and compact Ed25519 positives prove both normal forms enforce without a distant footer; adversarial wrapped-Base64, placeholder, documentation, and sibling-container negatives protect rejection.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1261 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
