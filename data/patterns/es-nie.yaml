schema: testpattern/v1
name: NIE
slug: es-nie
version: 1.3.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects NIE patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Validation: Mod 23 (X=0, Y=1, Z=2). Corroborative evidence: 3 keywords within 300 characters. Keyword lists:
  pii-civic-credentials.
pattern: \b[XYZ]\d{7}[A-Z]\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - eu
  - es
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: X1234567A
      description: NIE with X prefix
    - value: Y7654321B
      description: NIE with Y prefix
    - value: Z0000001C
      description: NIE with Z prefix
  should_not_match:
    - value: A1234567A
      description: Invalid prefix letter (A instead of X/Y/Z)
    - value: X123456A
      description: Only 6 digits instead of 7
    - value: X12345678A
      description: 8 digits instead of 7
false_positives:
  - description: >-
      Common words and phrases related to nie appearing in policy documents, training materials, HR templates, or
      compliance guidelines without actual personal data.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than
      general discussion.
  - description: >-
      In multiple EU languages, similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_es_nie
      matches:
        - ref: Keyword_es_nie_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_es_nie
      matches:
        - ref: Keyword_es_nie_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_es_nie
  regexes:
    - id: Regex_es_nie
      pattern: \b[XYZ]\d{7}[A-Z]\b
  keywords:
    - id: Keyword_es_nie_specific
      groups:
        - match_style: word
          terms:
            - "número de identidad de extranjero"
            - text: NIE
              case_sensitive: true
            - "número de identificación de extranjero"
            - foreigner identification number
            - foreigner identity number
            - tarjeta de identidad de extranjero
            - "identificación de extranjero"
            - "extranjería"
            - residence card
      strength: specific
    - id: Keyword_es_nie_general
      groups:
        - match_style: word
          terms:
            - identifier
            - identification
            - identity document
            - personal ID
            - "número de identificación"
            - identity number
            - "identificación"
            - documento de identidad
      strength: specific
risk_rating: 8
risk_description: >-
  The Spanish DNI is the primary national identity document required for all citizens over 14. Compromise enables
  identity theft, unauthorized financial transactions, and impersonation.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-spain-dni
    title: "Spain DNI entity definition - Microsoft Learn"
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary; remove dead shared_keywords import(s) generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
