schema: testpattern/v1
name: Canada OHIP Number
slug: ca-ohip-number
version: 1.0.3
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Ontario Health Insurance Plan (OHIP) numbers: 10 digits often grouped 4-3-3 with a two-letter version code.
operation: >-
  Structural OHIP with optional separators and version letters. Keyword lists: ca-health, healthcare-identifiers.
pattern: '\b\d{4}[-\s]?\d{3}[-\s]?\d{3}[-\s]?[A-Z]{2}\b'
confidence: medium
confidence_justification: >-
  High confidence with OHIP keywords; version letters improve precision.
jurisdictions:
  - ca
regulations:
  - PIPEDA
  - "PHIPA (Ontario)"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - phi
  - government-id
  - healthcare
corroborative_evidence:
  keywords:
    - text: OHIP
      case_sensitive: true
    - OHIP number
    - Ontario health card
  proximity: 300
  keyword_lists:
    - ca-health
    - healthcare-identifiers
test_cases:
  should_match:
    - value: '1234-567-890-AB'
      description: Dashed
    - value: '1234 567 890 XY'
      description: Spaced
    - value: '1234567890AB'
      description: Continuous
  should_not_match:
    - value: '1234-567-89-AB'
      description: 9 digits
    - value: '1234-567-890-A'
      description: One version letter
    - value: '1234-567-890-ABC'
      description: Three letters
false_positives:
  - description: >-
      Other health cards.
    mitigation: >-
      Require OHIP keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ca_ohip_number
      matches:
        - ref: Keyword_ca_ohip_number_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_ca_ohip_number
      matches:
        - ref: Keyword_ca_ohip_number_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ca_ohip_number
  regexes:
    - id: Regex_ca_ohip_number
      pattern: '\b\d{4}[-\s]?\d{3}[-\s]?\d{3}[-\s]?[A-Z]{2}\b'
  keywords:
    - id: Keyword_ca_ohip_number_specific
      groups:
        - match_style: word
          terms:
            - OHIP number
            - OHIP health card
            - Ontario health card number
      strength: specific
    - id: Keyword_ca_ohip_number_broad
      groups:
        - match_style: word
          terms:
            - text: OHIP
              case_sensitive: true
            - Ontario health
            - health card
      strength: specific
risk_rating: 5
risk_description: >-
  This high-confidence pattern detects a ten-digit Ontario health-insurance number, often with a two-letter version code, making the match a plan identifier rather than a medical record. Disclosure can aid member correlation, billing impersonation, or insurance-themed fraud, but it does not reveal diagnosis, treatment, eligibility history, or a claim without additional data. Other health cards can share similar shapes, and the number requires holder or provider context for consequential misuse. Risk 5 and OFFICIAL fit the standalone identifier; SENSITIVE would require an attributed clinical record, claim, benefit decision, authentication factor, or bulk health-plan register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI Specified"
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: "Protected B"
created: '2026-07-09'
updated: '2026-07-18'
changelog:
  - version: 1.0.3
    date: '2026-07-18'
    description: >-
      Quality bar: confidence high->medium for digit/identifier shapes where structural FP risk makes 'high' dishonest without checksum/strong label evidence.
  - version: 1.0.2
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2174 without changing detector or package metadata.'
  - version: 1.0.1
    date: '2026-07-09'
    description: 'Quality-gate fix: short acronyms converted to case-sensitive terms (catalog convention).'
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Phase-2 coverage backlog — mature Purview-safe identifier with pack metadata'
author: testpattern-community
license: MIT
