schema: testpattern/v1
name: Census microdata
slug: global-top500-500-census-microdata
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to census microdata in international contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:census\s+microdata|census\s+record|population\s+census|household\s+survey|demographic\s+data|census\s+tract|statistical\s+area|person\s+record|dwelling\s+record|census\s+questionnaire|microdata\s+file)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - census microdata
  proximity: 240
test_cases:
  should_match:
    - value: census microdata
      description: Primary topic phrase match
    - value: census record
      description: Case-insensitive topic phrase match
    - value: population census
      description: Alternative topic phrase match
    - value: household survey
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: immigration case
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to census microdata appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_census_microdata
      matches:
        - ref: Pattern_global_top500_500_census_microdata_label_context
        - ref: Keyword_global_top500_500_census_microdata_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_census_microdata
      matches:
        - ref: Keyword_census_microdata
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_census_microdata
      pattern: >-
        (?is)\b(?:census\s+microdata|census\s+record|population\s+census|household\s+survey|demographic\s+data|census\s+tract|statistical\s+area|person\s+record|dwelling\s+record|census\s+questionnaire|microdata\s+file)\b
    - id: Pattern_global_top500_500_census_microdata_label_context
      pattern: (?i)\b(?:census\s+microdata)\b
  keywords:
    - id: Keyword_census_microdata
      groups:
        - match_style: word
          terms:
            - census microdata
            - census record
            - population census
            - household survey
            - demographic data
            - enumeration
            - census tract
            - statistical area
            - person record
            - dwelling record
            - census questionnaire
            - microdata file
      strength: specific
    - id: Keyword_global_top500_500_census_microdata_domain_context
      groups:
        - match_style: word
          terms:
            - census microdata
            - census
            - microdata
      strength: domain
risk_description: >-
  The classifier recognises census microdata, person or dwelling records, household surveys, demographic data, census tracts, questionnaires, and microdata files; it does not require direct identifiers or prove that raw respondent-level data is present. Genuine microdata can combine household composition, location, demographic, social, and economic attributes, creating re-identification, discrimination, and community-stigmatisation risk even after obvious names are removed. Exposure may cover many respondents, but ordinary statistical tables, methodology, and public census discussion also trigger the concept. Risk 8 and SENSITIVE fit serious but contained microdata disclosure; PROTECTED would require identifiable national-scale raw data or rare attributes whose release is likely to cause significant, widespread, or irreversible harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
