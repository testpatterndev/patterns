schema: testpattern/v1
name: UK CHI Number (Scotland)
slug: uk-chi-number
version: 1.0.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Scottish Community Health Index (CHI) 10-digit patient identifiers used by NHS Scotland.
operation: >-
  Structural 10-digit CHI; require CHI/NHS Scotland keywords. Keyword lists: healthcare-identifiers, pii-civic-credentials.
pattern: '\b\d{10}\b'
confidence: medium
confidence_justification: >-
  Medium confidence: 10-digit sequences are common; CHI keywords mandatory.
jurisdictions:
  - uk
regulations:
  - "UK GDPR"
  - "Data Protection Act 2018"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - phi
  - government-id
  - healthcare
corroborative_evidence:
  keywords:
    - CHI number
    - text: CHI
      case_sensitive: true
    - Community Health Index
    - NHS Scotland
  proximity: 300
  keyword_lists:
    - healthcare-identifiers
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '1234567890'
      description: 10-digit CHI
    - value: '0987654321'
      description: Alt
    - value: '1122334455'
      description: Third
  should_not_match:
    - value: '123456789'
      description: 9 digits
    - value: '12345678901'
      description: 11 digits
    - value: '123456789A'
      description: Letter
false_positives:
  - description: >-
      Other 10-digit IDs.
    mitigation: >-
      Require CHI/NHS Scotland keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_uk_chi_number
      matches:
        - ref: Keyword_uk_chi_number_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_uk_chi_number
      matches:
        - ref: Keyword_uk_chi_number_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_uk_chi_number
  regexes:
    - id: Regex_uk_chi_number
      pattern: '\b\d{10}\b'
  keywords:
    - id: Keyword_uk_chi_number_specific
      groups:
        - match_style: word
          terms:
            - CHI number
            - Community Health Index
            - Scottish CHI
            - NHS Scotland CHI
      strength: specific
    - id: Keyword_uk_chi_number_broad
      groups:
        - match_style: word
          terms:
            - NHS Scotland
            - text: CHI
              case_sensitive: true
            - patient identifier Scotland
      strength: specific
risk_rating: 9
risk_description: >-
  CHI uniquely identifies patients in NHS Scotland.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: "CUI Specified"
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: "Protected B"
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.1
    date: '2026-07-09'
    description: 'Quality-gate fix: short acronyms converted to case-sensitive terms (catalog convention).'
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Phase-2 coverage backlog — mature Purview-safe identifier with pack metadata'
author: testpattern-community
license: MIT
