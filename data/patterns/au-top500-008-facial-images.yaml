schema: testpattern/v1
name: Facial images
slug: au-top500-008-facial-images
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to facial images in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: biometric-facial. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:facial\s+image|face\s+photo|facial\s+photograph|facial\s+recognition|face\s+scan|photo\s+ID|passport\s+photo|facial\s+template|face\s+capture)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - facial images
    - facial
    - images
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - biometric-facial
test_cases:
  should_match:
    - value: facial image
      description: Primary topic phrase match
    - value: face photo
      description: Case-insensitive topic phrase match
    - value: facial photograph
      description: Alternative topic phrase match
    - value: facial recognition
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to facial images appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_facial_images
      matches:
        - ref: Evidence_facial_images
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_008_facial_images_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_facial_images
      matches:
        - ref: Evidence_facial_images
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_008_facial_images_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_facial_images
      matches:
        - ref: Evidence_facial_images
  regexes:
    - id: Pattern_facial_images
      pattern: (?is)\b(?:facial\s+image|face\s+photo|facial\s+photograph|facial\s+recognition|face\s+scan|photo\s+ID|passport\s+photo|facial\s+template|face\s+capture)\b
    - id: Pattern_au_top500_008_facial_images_label_context
      pattern: (?i)\\b(?:facial\\s+images|facial|images|top500)\\b
  keywords:
    - id: Evidence_facial_images
      groups:
        - match_style: word
          terms:
            - facial image
            - face photo
            - facial photograph
            - facial recognition
            - face scan
            - photo ID
            - passport photo
            - headshot
            - facial template
            - face capture
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_008_facial_images_domain_context
      groups:
        - match_style: word
          terms:
            - facial images
            - facial
            - images
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_008_facial_images_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
