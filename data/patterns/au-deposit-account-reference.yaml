schema: testpattern/v1
name: Australian Deposit Account Reference
slug: au-deposit-account-reference
version: 2.5.0
type: regex
pattern_class: identifier
engine: boost_regex
description: Identifies references to Australian consumer deposit account numbers in financial and compliance documents. Uses structural anchors with proximity constraints.
operation: >-
  Structural-anchor regex matching account identifiers preceded by financial field labels. Corroborative evidence: 3 tiers with deposit-specific keywords and exclusion logic, broad financial keywords,
  and standalone anchor match within 300 characters. Adds label-context matching and exclusion logic for sample/template/test placeholders. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.
pattern: (?is)\b(?:deposit\s+account|account\s+(?:number|no\.?|#|ref(?:erence)?)|bank\s+account|savings\s+account|cheque\s+account|transaction\s+account)\b(?:\s{0,10}[:#=;])?\s{0,80}\b[A-Z0-9][A-Z0-9\-/]{4,24}\b
confidence: medium
confidence_justification: >-
  Medium confidence: structural anchors constrain context but broad field labels can match non-financial identifiers. Corroborative keywords improve precision. Context label evidence plus explicit
  template/example exclusion improves precision for high-risk identifiers. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - deposit account
    - bank account number
    - BSB
    - account number
    - savings account
    - cheque account
    - transaction account
    - direct debit
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: account number  A12345678
      description: Account number anchor with alphanumeric account
    - value: deposit account B062000ACC12
      description: Deposit account anchor followed by financial reference code
    - value: bank account  X1234-5678/90
      description: Bank account anchor with identifier containing hyphens and slashes
    - value: 'account number: 12345678'
      description: Colon delimiter between label and value now matches
    - value: deposit account = ACC-2244-77
      description: Equals delimiter between label and value now matches
    - value: bank account; X12345678
      description: Semicolon delimiter between label and value now matches
    - value: 'account ref # ACC998877'
      description: Hash delimiter between label and value now matches
    - value: "account number:\n12345678"
      description: Line break after a delimited label now matches
  should_not_match:
    - value: unrelated generic text
      description: No relevant context
    - value: number A12345678
      description: Bare 'number' anchor no longer matches without account context
    - value: the quick brown fox
      description: No structural anchor or identifier
    - value: reference B062000ACC12
      description: Bare 'reference' anchor no longer matches without account context
false_positives:
  - description: Financial terminology in published reports or textbooks without actual data.
    mitigation: Require corroborative keywords in proximity.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 5
risk_description: >-
  The pattern finds a labelled Australian deposit-account identifier after account-number, deposit-account, or bank-account anchors, but it does not require an account holder, BSB, balance, password, or transaction authority. Disclosure may assist social engineering, payment misdirection, or attempted direct-debit fraud when combined with routing, identity, and process information. The account owner faces bounded risk from the atomic reference, and successful financial harm requires several material companion facts and access to a payment workflow. Risk 5 and OFFICIAL therefore better fit what the detector establishes, while co-occurrence with an identifiable holder, BSB, mandate, or live payment instruction would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_deposit_account_ref
      matches:
        - ref: Pattern_au_deposit_account_reference_label_context
        - ref: Keyword_au_deposit_account_reference_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 85
      id_match: Pattern_deposit_account_ref
      matches:
        - ref: Evidence_deposit_account_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_deposit_account_ref
      matches:
        - ref: Evidence_deposit_account_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_deposit_account_ref
      matches:
        - ref: Pattern_au_deposit_account_reference_label_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_deposit_account_ref
      pattern: (?is)\b(?:deposit\s+account|account\s+(?:number|no\.?|#|ref(?:erence)?)|bank\s+account|savings\s+account|cheque\s+account|transaction\s+account)\b(?:\s{0,10}[:#=;])?\s{0,80}\b[A-Z0-9][A-Z0-9\-/]{4,24}\b
    - id: Pattern_au_deposit_account_reference_label_context
      pattern: (?i)\b(?:australian|deposit|account|bank\s+account|account\s+number|account\s+no|routing)\b
  keywords:
    - id: Evidence_deposit_account_specific
      groups:
        - match_style: word
          terms:
            - deposit account
            - bank account number
            - text: BSB
              case_sensitive: true
            - account number
            - savings account
            - cheque account
            - transaction account
            - direct debit
            - bank details
            - financial institution
            - account holder
            - customer account
      strength: specific
    - id: Evidence_deposit_account_broad
      groups:
        - match_style: word
          terms:
            - banking
            - funds transfer
            - remittance
            - payee
            - beneficiary
            - financial
            - payment
      strength: domain
    - id: Keyword_au_deposit_account_reference_domain_context
      groups:
        - match_style: word
          terms:
            - australian deposit account reference
            - deposit
      strength: domain
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 2.5.0
    date: '2026-07-17'
    description: 'Reduced-scope alignment fix (TP-00051): allow a bounded optional label delimiter (colon, hash, equals, semicolon) plus existing whitespace/line-break gap between the account label and the value, fixing missed recall on routine ''Account number: 12345678'' fields. The wider redesign (numeric vs structured branch split, prose-word rejection, sentinel filters, per-branch length caps) is deferred - no concrete definitions were approved.'
  - version: 2.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 536 without changing detector or package metadata.'
  - version: 2.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 2.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Evidence_template_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary; remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 2.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 2.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Mapped non-canonical confidence 90 to 85.
