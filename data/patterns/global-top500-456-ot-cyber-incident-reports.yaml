schema: testpattern/v1
name: OT cyber incident reports
slug: global-top500-456-ot-cyber-incident-reports
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive operational-technology, ICS, SCADA, and industrial-control cyber incident
  reports. Topic phrases are retained for discovery; enforcement requires case facts such as affected
  assets, timelines, initial access, containment, indicators, root cause, recovery, or operational
  impact, and high confidence also requires a concrete indicator, vulnerability, address, or control
  asset identifier.
operation: >-
  Regex_ot_cyber_incident recognises OT/ICS/SCADA/industrial-control cyber incident-report topics. The
  topic alone is discovery-only at 65. Affected-asset, timeline, access, containment, indicator,
  root-cause, recovery, or operational-impact facts raise it to 75; a concrete CVE, hash, IP, or control
  asset identifier reaches 85. Enforcing tiers reject explicit templates, training, and public-report
  framing.
pattern: >-
  (?is)\b(?:OT\s+cyber\s+incident\s+report|ICS\s+cyber\s+incident\s+report|SCADA\s+compromise\s+report|industrial\s+control\s+system\s+cyber\s+incident|operational\s+technology\s+security\s+incident\s+report)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires incident-specific case facts. High confidence adds a concrete technical
  indicator or affected control asset, reducing matches on policy and generic threat reporting.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - ot cyber incident reports
    - cyber
    - incident
    - reports
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
test_cases:
  should_match:
    - value: OT cyber incident report
      description: Low-tier probe - incident-report topic without case facts
    - value: 'OT cyber incident report: affected asset, attack timeline, initial access, containment action, root cause, and recovery status'
      description: Medium-tier probe - substantive case facts without a concrete technical indicator
    - value: 'OT cyber incident report: affected PLC asset PLC-07, source IP 10.24.8.15, CVE-2025-12345, attack timeline, containment action, and recovery status'
      description: High-tier probe - case facts with control-asset, address, and vulnerability indicators
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: ot cyber incident report
      description: Bare report title surfaces only in discovery
    - value: 'The public advisory describes industrial-control malware trends.'
      description: Public threat overview without an organisation-specific incident report
    - value: 'Training example: OT cyber incident report for PLC-07 at source IP 10.24.8.15, CVE-2025-12345'
      description: Explicit training content must not enforce
false_positives:
  - description: Public advisories, vendor threat reports, news, and exercises discuss OT incidents, indicators, containment, and affected technologies without exposing an organisation's case report.
    mitigation: Require incident-specific case facts and reject explicit public-advisory, vendor-report, news-report, and exercise framing from enforcing tiers.
  - description: Training scenarios can contain realistic CVEs, IP addresses, hashes, PLC IDs, timelines, and containment actions.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ot_cyber_incident
      matches:
        - ref: Evidence_ot_incident_case_fact
        - ref: Evidence_ot_incident_indicator
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_public_incident_exclusion
    - confidence_level: 75
      id_match: Regex_ot_cyber_incident
      matches:
        - ref: Evidence_ot_incident_case_fact
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_public_incident_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ot_cyber_incident
  regexes:
    - id: Regex_ot_cyber_incident
      pattern: >-
        (?is)\b(?:OT\s+cyber\s+incident\s+report|ICS\s+cyber\s+incident\s+report|SCADA\s+compromise\s+report|industrial\s+control\s+system\s+cyber\s+incident|operational\s+technology\s+security\s+incident\s+report)\b
    - id: Evidence_ot_incident_indicator
      pattern: >-
        (?i)\b(?:CVE-\d{4}-\d{4,7}|[a-f0-9]{64}|(?:PLC|RTU|HMI|SCADA)\s*(?:asset|node|station|ID)?\s*[:#-]\s*[A-Z0-9][A-Z0-9._-]{2,}|(?:source|destination)\s+IP\s*[:=]\s*(?:\d{1,3}\.){3}\d{1,3})\b
  keywords:
    - id: Evidence_ot_incident_case_fact
      groups:
        - match_style: word
          terms:
            - affected asset
            - attack timeline
            - initial access
            - containment action
            - containment measures
            - indicators of compromise
            - root cause
            - recovery status
            - operational impact
            - outage duration
            - observed activity
      strength: domain
    - id: Evidence_public_incident_exclusion
      groups:
        - match_style: word
          terms:
            - public advisory
            - vendor threat report
            - news report
            - published case study
            - tabletop exercise
      strength: exclusion
risk_description: >-
  The regex identifies OT or ICS cyber incidents, industrial compromise, SCADA, containment, attack timelines, operational technology, critical infrastructure, threat actors, and indicators of compromise rather than validating a case report. A genuine report can expose affected control systems, attacker behavior, unremediated weaknesses, response measures, and operational impact, helping an adversary evade containment or repeat the intrusion. The normal unit is one industrial incident and its facility, operators, and customers, while incident-response guidance, exercises, and threat reports may use identical terms. Risk 8 and SENSITIVE reflect serious contained security and operational harm; PROTECTED would require an active critical-infrastructure compromise with a credible path to significant service, safety, or national damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-07-04'
changelog:
  - version: 1.3.0
    date: '2026-07-04'
    description: 'CI profile hardening: restrict the primary to OT/ICS/SCADA incident reports; require case facts at 75 and concrete indicators or control-asset identifiers at 85; reject public-report and training framing.'
  - version: 1.2.2
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1996 without changing detector or package metadata.'
  - version: 1.2.1
    date: '2026-07-12'
    description: 'Baseline burn-down: mark the no-evidence 65 tier discovery_only — it is a broad inventory tier by shape (id_match only, no required evidence), so bare topic fragments correctly surface in discovery rather than counting as classification; aligns with corpus convention and clears the should_not_match failure + check:quality discoveryMissing informational. No compiled detection change (discovery_only is harness/quality metadata).'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
