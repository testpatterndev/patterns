schema: testpattern/v1
name: Payroll system access logs
slug: au-top500-100-payroll-system-access-logs
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to payroll system access logs in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Three-tier purview detection: high confidence (85) matches payroll system access logs phrase with access log evidence and template exclusion; medium
  confidence (75) matches with access log evidence; low confidence (65) matches phrase pattern alone. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: industry-hr.
pattern: \bpayroll\s+system\s+access\s+logs\b
confidence: low
confidence_justification: 'Low confidence marker: phrase-based artifact detection to bootstrap line-by-line coverage. Requires corroborative evidence and later hardening to high-confidence structural patterns.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payroll system access logs
    - payroll
    - system
    - access
    - logs
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: Payroll system access logs
      description: Exact phrase marker match
    - value: payroll system access logs
      description: Case-insensitive phrase match
    - value: Payroll system access logs
      description: Normalized whitespace phrase
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_payroll_system_access_logs
      matches:
        - ref: Evidence_payroll_system_access_logs
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_payroll_system_access_logs
      matches:
        - ref: Evidence_payroll_system_access_logs
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_payroll_system_access_logs
  regexes:
    - id: Pattern_payroll_system_access_logs
      pattern: \bpayroll\s+system\s+access\s+logs\b
  keywords:
    - id: Evidence_payroll_system_access_logs
      groups:
        - match_style: word
          terms:
            - payroll system access
            - access log
            - audit trail
            - user activity
            - login record
            - system access
            - payroll administrator
            - role-based access
            - privilege escalation
            - access control
            - payroll security
            - user session
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
