schema: testpattern/v1
name: Bulgaria Driver's License Number
slug: bg-drivers-license
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Bulgaria driver's license number patterns. This pattern is based on a Microsoft Purview built-in sensitive
  information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as
  a starting point for customisation.
operation: >-
  Matches a 9-digit number at word boundaries. Corroborative evidence: 5 keywords within 300 characters. Keyword lists:
  pii-civic-credentials.
pattern: \b\d{9}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - bg
  - eu
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - driver
    - licence
    - license
    - driving
    - DL
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: '123456789'
      description: Standard 9-digit Bulgarian driver's license number
    - value: '987654321'
      description: Another valid 9-digit format
    - value: '012345678'
      description: 9-digit number with leading zero
  should_not_match:
    - value: '12345678'
      description: Too few digits (8 instead of 9)
    - value: '1234567890'
      description: Too many digits (10 instead of 9)
false_positives:
  - description: >-
      Generic numeric sequences matching the driver's license format appearing in unrelated contexts.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm driver's license context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_bg_drivers_license
      matches:
        - ref: Keyword_bg_drivers_license_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_bg_drivers_license
      matches:
        - ref: Keyword_bg_drivers_license_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_bg_drivers_license
  regexes:
    - id: Regex_bg_drivers_license
      pattern: \b\d{9}\b
  keywords:
    - id: Keyword_bg_drivers_license_specific
      groups:
        - match_style: word
          terms:
            - свидетелство за управление
            - шофьорска книжка
            - номер на свидетелство
            - свидетелство за правоуправление
            - шофьорска
            - водачска книжка
            - МВР
            - КАТ
            - категория
      strength: domain
    - id: Keyword_bg_drivers_license_general
      groups:
        - match_style: word
          terms:
            - driver's license
            - driving licence
            - driver license
            - licence number
            - license number
            - text: DL
              case_sensitive: true
            - driving permit
            - permis de conduire
      strength: specific
  filters:
    - id: Filter_bg_drivers_license_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The Bulgarian driving-licence detector treats a nine-digit number as a candidate only when nearby licence or civic-credential language supports it. A genuine value could help an impostor make a vehicle-rental claim, target the driver with authority-themed fraud, or link records held by insurers and service providers. The number alone gives no name, address, photograph, licence classes, restrictions, or online access, while generic nine-digit references are common. Risk 5 and OFFICIAL capture that bounded correlation risk; a licence copy, traffic case, or populated driver file would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-bulgaria-drivers-license-number
    title: "Bulgaria driver's license number entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
