schema: testpattern/v1
name: UK VAT Number
slug: uk-vat-number
version: 1.1.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects United Kingdom (and Northern Ireland XI) Value Added Tax registration numbers.
  Standard trader numbers are GB followed by 9 digits; branch traders use GB plus 12 digits; government
  departments use GBGD### and health authorities GBHA###. Northern Ireland post-Brexit issues XI-prefixed numbers
  with the same body formats. Matching is uppercase letter prefixes as issued by HMRC.
operation: >-
  Structural detection of HMRC VAT formats (GB/XI + 9 digits, 12 digits, GD###, or HA###). Checksum
  (mod-97 weighted) is not enforced in the regex — require corroborative evidence. Corroborative evidence: VAT-specific
  keywords within 300 characters. Keyword lists: vat-numbers, tax-id.
pattern: '\b(?:GB|XI)(?:\d{9}|\d{12}|GD\d{3}|HA\d{3})\b'
confidence: high
confidence_justification: >-
  High confidence when keywords such as "VAT number" or "VAT registration" appear nearby.
  The GB/XI prefix plus fixed digit lengths sharply reduce incidental matches versus bare digit runs.
jurisdictions:
  - uk
regulations:
  - "UK GDPR"
  - "Data Protection Act 2018"
  - "VATA 1994"
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - financial
  - business-identifier
  - government-id
corroborative_evidence:
  keywords:
    - VAT number
    - VAT registration
    - VAT No
    - GB VAT
  proximity: 300
  keyword_lists:
    - vat-numbers
    - tax-id
    - business-identifier
test_cases:
  should_match:
    - value: GB123456789
      description: Standard 9-digit GB VAT
    - value: GB123456789001
      description: 12-digit branch trader VAT
    - value: GBGD001
      description: Government department GD format
    - value: XI123456789
      description: Northern Ireland XI VAT
  should_not_match:
    - value: GB12345678
      description: Only 8 digits after GB
    - value: FR12345678901
      description: French VAT prefix, not UK
    - value: GBABC123456
      description: Letters in numeric body
false_positives:
  - description: >-
      Product SKUs or ticket codes starting with GB plus digits in logistics systems.
    mitigation: >-
      Require VAT/registration keywords within proximity; layer with invoice/tax document context.
  - description: >-
      IBAN or other GB-prefixed financial strings with different lengths.
    mitigation: >-
      Fixed length classes (9/12/GD/HA) exclude most IBAN bodies; use IBAN SIT for accounts.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_uk_vat_number
      matches:
        - ref: Keyword_uk_vat_number_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_uk_vat_number
      matches:
        - ref: Keyword_uk_vat_number_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_uk_vat_number
  regexes:
    - id: Regex_uk_vat_number
      pattern: '\b(?:GB|XI)(?:\d{9}|\d{12}|GD\d{3}|HA\d{3})\b'
  keywords:
    - id: Keyword_uk_vat_number_specific
      groups:
        - match_style: word
          terms:
            - VAT number
            - VAT registration
            - VAT reg
            - VAT No
            - VAT registration number
            - HMRC VAT
            - value added tax number
            - VAT identification number
            - GB VAT
            - UK VAT
      strength: specific
    - id: Keyword_uk_vat_number_broad
      groups:
        - match_style: word
          terms:
            - text: VAT
              case_sensitive: true
            - value added tax
            - tax registration
            - HMRC
            - invoice VAT
            - output tax
            - input tax
      strength: specific
risk_rating: 5
risk_description: >-
  This regex identifies a UK or Northern Ireland VAT registration number in standard trader, branch, government-department, or health-authority format, making the match a business registration identifier rather than a tax return. The number commonly appears on invoices and registration certificates and can assist invoice impersonation or company profiling, but misuse requires counterparty, payment, or account context. Fixed prefixes and VAT keywords improve precision, although GB-prefixed logistics codes can collide. Risk 5 and OFFICIAL fit the bounded standalone harm; SENSITIVE would require confidential tax assessments, person-linked financial facts, payment instructions, or an attributable fraud file.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: "IN CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://www.gov.uk/vat-registration-number
    title: VAT registration numbers - GOV.UK
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-eu-debit-card-number
    title: Related financial SIT guidance - Microsoft Learn
