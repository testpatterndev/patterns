schema: testpattern/v1
name: Sensitive network topology diagrams
slug: global-top500-285-sensitive-network-topology-diagrams
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies sensitive network topology diagrams patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Keyword
  lists: pii-personal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:network\s+topology|network\s+diagram|network\s+architecture|ip\s+addressing|routing\s+table|network\s+segment|infrastructure\s+diagram|network\s+map|data\s+center\s+layout)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - sensitive network topology diagrams
    - sensitive
    - network
    - topology
    - diagrams
    - security
    - operations
    - threat
    - data
  proximity: 300
  keyword_lists:
    - pii-personal
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: network topology
      description: Primary topic phrase match
    - value: network diagram
      description: Case-insensitive topic phrase match
    - value: network architecture
      description: Alternative topic phrase match
    - value: ip addressing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: network diagram dmz
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_network_topology_diagrams
      matches:
        - ref: Pattern_global_top500_285_sensitive_network_topology_diagrams_label_context
        - ref: Keyword_global_top500_285_sensitive_network_topology_diagrams_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_network_topology_diagrams
      matches:
        - ref: Keyword_network_topology_diagrams
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_network_topology_diagrams
      pattern: (?is)\b(?:network\s+topology|network\s+diagram|network\s+architecture|ip\s+addressing|routing\s+table|network\s+segment|infrastructure\s+diagram|network\s+map|data\s+center\s+layout)\b
    - id: Pattern_global_top500_285_sensitive_network_topology_diagrams_label_context
      pattern: (?i)\b(?:sensitive\s+network\s+topology\s+diagrams)\b
  keywords:
    - id: Keyword_network_topology_diagrams
      groups:
        - match_style: word
          terms:
            - network topology
            - network diagram
            - subnet
            - vlan
            - dmz
            - network architecture
            - ip addressing
            - routing table
            - network segment
            - infrastructure diagram
            - network map
            - data center layout
      strength: specific
    - id: Keyword_global_top500_285_sensitive_network_topology_diagrams_domain_context
      groups:
        - match_style: word
          terms:
            - sensitive network topology diagrams
            - sensitive
            - network
            - topology
            - diagrams
      strength: domain
risk_description: >-
  The regex identifies network topology, architecture, addressing, routing, segmentation, data-centre layout, and infrastructure-diagram terminology, signalling a topology record rather than validating an image format. A genuine diagram can expose trust boundaries, internal routes, key systems, and concentration points that make reconnaissance and attack planning materially easier. The normal scope is one environment or data centre and its operators, while public reference architectures and training diagrams remain benign possibilities. Risk 8 SENSITIVE is appropriate for a detailed internal map; PROTECTED would require critical-infrastructure coverage, protected operations, or a scale capable of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
