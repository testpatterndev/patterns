schema: testpattern/v1
name: Corrective Services Intelligence Report
slug: corrective-services-intelligence-report
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects documents containing prison intelligence reports including gang assessments, inmate risk ratings, informant identities within correctional facilities, and security threat group (STG) analyses. Disclosure endangers correctional staff, informant inmates, and undermines facility security.
operation: 'Keyword proximity: primary keywords (corrective services intelligence, prison intelligence, security threat group, STG assessment, inmate intelligence) within 300 characters of corroborative keywords (QCS, Queensland Corrective Services, facility name, risk classification terms). Document markers from QCS intelligence report templates. Negative keyword exclusion for public reports and media.'
pattern: (?i)\b(corrective\s+services\s+intelligence|prison\s+intelligence|security\s+threat\s+group|STG\s+assessment|inmate\s+intelligence|custodial\s+intelligence|OMCG\s+intelligence\s+(?:report|assessment)|prison\s+gang\s+(?:intelligence|assessment))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of correctional intelligence terminology with inmate identifiers, facility references, and risk classification language. The specificity of STG assessment and custodial intelligence terms, combined with classification markers, strongly indicates genuine intelligence reports.'
jurisdictions:
  - au
regulations:
- "Corrective Services Act 2006 (Qld)"
- "PPRA 2000 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - RESTRICTED
    - QCS
    - Queensland Corrective Services
    - correctional centre
    - high risk
    - extreme risk
    - protection prisoner
    - segregation order
    - OMCG
    - outlaw motorcycle gang
    - placement recommendation
    - risk classification
    - intelligence holding
  proximity: 300
  keyword_lists:
    - law-enforcement
    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED Law-Enforcement. Queensland Corrective Services Intelligence Report. Facility: Arthur Gorrie Correctional Centre. STG Assessment: Subject inmate Kevin MARSHALL (QCS No. 847293) is assessed as a senior member of the Rebels OMCG prison chapter. Prison intelligence indicates he is directing drug distribution within the facility. Placement recommendation: maximum security segregation.'
      description: QCS intelligence report with STG assessment and placement recommendation
    - value: 'RESTRICTED. Corrective services intelligence briefing. Inmate intelligence regarding planned assault on protection prisoner in Unit 7. Source: custodial intelligence from confidential informant within general population. Security threat group assessment indicates escalating tension between OMCG-affiliated and ethnic-based prison gangs.'
      description: Intelligence briefing about planned assault with informant source reference
    - value: 'QCS Intelligence Unit — Monthly Assessment. Prison gang activity across southern region facilities. OMCG intelligence update: Rebels and Mongols chapters competing for drug supply routes. High risk inmates identified for inter-facility transfer. Extreme risk rating assigned to three subjects due to escape planning intelligence.'
      description: Monthly prison intelligence assessment covering gang activity and risk ratings
  should_not_match:
    - value: The Queensland Corrective Services annual report noted that 14,000 prisoners were managed across 11 correctional facilities during the year. The report discussed rehabilitation programs and recidivism rates.
      description: Published QCS annual report with aggregate statistics
    - value: A University of Queensland study examined the prevalence of security threat groups in Australian correctional facilities. The research used anonymised data provided by corrective services agencies across five states.
      description: Academic research using anonymised correctional data
    - value: The ABC documentary series explored prison gang dynamics in Australian correctional facilities. Former inmates discussed the influence of outlaw motorcycle gangs within the prison system.
      description: Television documentary about prison gangs using former inmates
false_positives:
  - description: Published QCS annual reports and public-facing statistics
    mitigation: 'Negative keyword exclusion: ''annual report'', ''published'', ''reporting period'', ''public release''. Require proximity to specific inmate identifiers or intelligence holdings.'
  - description: Academic research on prison populations using anonymised data
    mitigation: 'Negative keyword exclusion: ''academic'', ''university'', ''research'', ''anonymised'', ''study'', ''journal'''
  - description: Media documentaries and news reports about prison conditions
    mitigation: 'Negative keyword exclusion: ''documentary'', ''news'', ''media'', ''former inmate'', ''television'', ''reported'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_corrective_services_intelligence_report_corrective_intelligence_terms
      matches:
        - ref: Evidence_corrective_services_intelligence_report_primary_keywords
        - ref: Evidence_corrective_services_intelligence_report_classification_markers
        - ref: Evidence_corrective_services_intelligence_report_corroborative_terms
        - ref: Pattern_corrective_services_intelligence_report_qcs_inmate_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_corrective_services_intelligence_report_exclusion
    - confidence_level: 75
      id_match: Pattern_corrective_services_intelligence_report_corrective_intelligence_terms
      matches:
        - ref: Evidence_corrective_services_intelligence_report_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_corrective_services_intelligence_report_exclusion
    - confidence_level: 65
      id_match: Pattern_corrective_services_intelligence_report_corrective_intelligence_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_corrective_services_intelligence_report_exclusion
  regexes:
    - id: Pattern_corrective_services_intelligence_report_corrective_intelligence_terms
      pattern: (?i)\b(corrective\s+services\s+intelligence|prison\s+intelligence|security\s+threat\s+group|STG\s+assessment|inmate\s+intelligence|custodial\s+intelligence)\b
    - id: Pattern_corrective_services_intelligence_report_qcs_inmate_number
      pattern: \bQCS\s*(?:No\.?|Number)\s*:?\s*\d{5,7}\b
  keywords:
    - id: Evidence_corrective_services_intelligence_report_primary_keywords
      groups:
        - match_style: word
          terms:
            - corrective services intelligence
            - prison intelligence
            - security threat group
            - STG assessment
            - inmate intelligence
            - custodial intelligence
            - prison gang intelligence
            - OMCG intelligence
            - placement recommendation
            - prison gang assessment
    - id: Evidence_corrective_services_intelligence_report_classification_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - Law-Enforcement
            - RESTRICTED
            - QCS
            - Queensland Corrective Services
    - id: Evidence_corrective_services_intelligence_report_corroborative_terms
      groups:
        - match_style: word
          terms:
            - correctional centre
            - high risk
            - extreme risk
            - protection prisoner
            - segregation order
            - OMCG
            - outlaw motorcycle gang
            - drug distribution
            - risk classification
            - intelligence holding
            - inter-facility transfer
            - escape planning
    - id: Filter_corrective_services_intelligence_report_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - annual report
            - documentary
            - academic
            - university
            - research
            - anonymised
            - news article
            - former inmate
            - television
            - rehabilitation

risk_rating: 9
risk_description: "Prison gang intelligence, inmate risk ratings, and informant identities within correctional facilities; disclosure endangers staff and informant inmates."
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Law-Enforcement
references: []
