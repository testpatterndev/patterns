schema: testpattern/v1
name: Nonpublic investor presentations
slug: au-top500-195-nonpublic-investor-presentations
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to nonpublic investor presentations in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:nonpublic\s+investor\s+presentation|investor\s+presentation|investor\s+deck|pitch\s+deck|investor\s+roadshow|institutional\s+investor|private\s+placement|material\s+non[\s-]+public\s+information|inside\s+information)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - nonpublic investor presentations
    - nonpublic
    - investor
    - presentations
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: nonpublic investor presentation
      description: Primary topic phrase match
    - value: investor presentation
      description: Case-insensitive topic phrase match
    - value: investor deck
      description: Alternative topic phrase match
    - value: pitch deck
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to nonpublic investor presentations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_nonpublic_investor
      matches:
        - ref: Evidence_nonpublic_investor
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_nonpublic_investor
      matches:
        - ref: Evidence_nonpublic_investor
    - confidence_level: 65
      id_match: Pattern_nonpublic_investor
      matches:
        - ref: Evidence_nonpublic_investor
  regexes:
    - id: Pattern_nonpublic_investor
      pattern: (?is)\b(?:nonpublic\s+investor\s+presentation|investor\s+presentation|investor\s+deck|pitch\s+deck|investor\s+roadshow|institutional\s+investor|private\s+placement|material\s+non[\s-]+public\s+information|inside\s+information)\b
  keywords:
    - id: Evidence_nonpublic_investor
      groups:
        - match_style: word
          terms:
            - nonpublic investor presentation
            - investor presentation
            - investor deck
            - pitch deck
            - investor roadshow
            - institutional investor
            - private placement
            - non-public
            - material non-public information
            - MNPI
            - inside information
            - pre-release
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.asx.com.au/about/regulation/rules-guidance-notes-and-waivers/asx-listing-rules-guidance-notes-and-waivers
  - https://www.legislation.gov.au/C2004A00818/latest/text
