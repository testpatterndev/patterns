schema: testpattern/v1
name: Openai Key
slug: global-openai-key
version: 1.2.1
type: regex
engine: universal
description: Detects Openai Key patterns.
operation: >-
  Detects legacy OpenAI keys (sk- + 48 base62 chars) and modern project/service-account/admin keys
  (sk-proj-/sk-svcacct-/sk-admin- + long base64url body, usually containing the T3BlbkFJ marker).
  Corroborative evidence: keywords within 300 characters. Keyword lists: credentials.
pattern: (?<![A-Za-z0-9])sk-(?:proj|svcacct|admin)-[A-Za-z0-9_-]{20,}|(?<![A-Za-z0-9])sk-[A-Za-z0-9]{48}(?![A-Za-z0-9])
confidence: medium
confidence_justification: >-
  Medium confidence: the modern sk-proj-/sk-svcacct-/sk-admin- prefixes (often carrying the T3BlbkFJ
  marker) are distinctive, while the legacy sk- + 48-char form is more generic; corroborative
  OpenAI keywords and exclusion rules keep false positives low.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: sk-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuv
      description: Legacy OpenAI API key (sk- + 48 chars)
    - value: 'OPENAI_API_KEY=sk-proj-ABCDEFGHIJ1234567890T3BlbkFJABCDEFGHIJ1234567890_-abcdEFGH'
      description: Modern project key (sk-proj-) carrying the T3BlbkFJ marker
    - value: sk-svcacct-zZyYxXwWvVuUtTsSrRqQpP0123456789_-T3BlbkFJABCDEFGHIJKLMNOPqrstuvwx
      description: Service-account key (sk-svcacct-)
    - value: sk-admin-aB3dE6gH9jK2mN5pQ8sT1uV4wX7yZ0aB3dE6gH9jK2mN5p
      description: Admin key (sk-admin-)
  should_not_match:
    - value: sk-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstu
      description: Too few characters after legacy prefix (47 instead of 48)
    - value: sk-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvw
      description: Too many characters after legacy prefix (49 instead of 48)
    - value: pk-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuv
      description: Wrong prefix (pk instead of sk)
    - value: sk-proj-short
      description: Modern project prefix but body too short
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_openai_key
      matches:
        - ref: Pattern_global_openai_key_label_context
        - ref: Keyword_global_openai_key_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_openai_key
      matches:
        - ref: Keyword_openai
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_openai_key
      pattern: (?<![A-Za-z0-9])sk-(?:proj|svcacct|admin)-[A-Za-z0-9_-]{20,}|(?<![A-Za-z0-9])sk-[A-Za-z0-9]{48}(?![A-Za-z0-9])
    - id: Pattern_global_openai_key_label_context
      pattern: (?i)\b(?:openai\s+key|openai|key)\b
  keywords:
    - id: Keyword_openai
      groups:
        - match_style: word
          terms:
            - openai
            - api key
            - api_key
            - OPENAI_API_KEY
            - gpt
            - chatgpt
            - secret key
            - bearer token
            - authorization
            - completions
      strength: domain
    - id: Keyword_global_openai_key_domain_context
      groups:
        - match_style: word
          terms:
            - openai key
            - openai
            - key
      strength: domain
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
