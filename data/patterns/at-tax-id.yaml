schema: testpattern/v1
name: Austria Tax Identification Number
slug: at-tax-id
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Austria Tax Identification Number patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type. Due to the numeric format, corroborative evidence keywords
  are essential for reliable detection.
operation: >-
  Corroborative evidence: 5 keywords within 300 characters.
  Keyword lists: tax-id, at-financial.
pattern: '\b\d{2}-?\d{3}/?\d{4}\b'
confidence: medium
confidence_justification: >-
  Medium confidence: the digit grouping pattern is not unique. Corroborative evidence such as 'Steuernummer' or 'Finanzamt' is needed to confirm Austrian tax identification.
jurisdictions:
  - at
  - eu
regulations:
- GDPR
data_categories:
  - pii
  - financial
  - government-id
corroborative_evidence:
  keywords:
    - Steuernummer
    - tax identification
    - Abgabenkontonummer
    - Finanzamt
    - TIN
  proximity: 300
  keyword_lists:

    - tax-id

    - at-financial
test_cases:
  should_match:
    - value: '12-345/6789'
      description: Austrian tax ID with separators
    - value: '123456789'
      description: Austrian tax ID continuous digits
    - value: '98-765/4321'
      description: Austrian tax ID alternate format
  should_not_match:
    - value: '12-34/56789'
      description: Wrong grouping for Austrian tax ID
    - value: '1-234/5678'
      description: Too few leading digits for Austrian format
false_positives:
  - description: Generic numeric sequences in non-tax contexts such as reference numbers or account identifiers
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to distinguish
      tax identifiers from general numeric data.
  - description: Numbers from other identification schemes with similar digit patterns
    mitigation: >-
      Layer with jurisdiction-specific detection to prioritise matches in tax-related documents
      and cross-reference with other identifier types.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_at_tax_id
      matches:
        - ref: Keyword_at_tax_id_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_at_tax_id
      matches:
        - ref: Keyword_at_tax_id_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_at_tax_id
  regexes:
    - id: Regex_at_tax_id
      pattern: '\b\d{2}-?\d{3}/?\d{4}\b'
  keywords:
    - id: Keyword_at_tax_id_specific
      groups:
        - match_style: word
          terms:
            - Steuernummer
            - Abgabenkontonummer
            - Finanzamt
            - Steueridentifikationsnummer
            - St.Nr.
            - Steuernr
            - tax identification number
            - Austrian tax number
            - Finanzamtsnummer
            - Abgabennummer
      strength: domain
    - id: Keyword_at_tax_id_general
      groups:
        - match_style: word
          terms:
            - text: TIN
              case_sensitive: true
            - tax identification
            - tax number
            - tax id
            - Steuer
            - Abgaben
            - Finanz
            - tax return
            - Steuererklarung
      strength: domain
  filters:
    - id: Guard_at_tax_id_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The canonical at-tax-id pattern recognises a grouped Austrian Steuernummer or an ungrouped nine-digit value with tax-office wording. It could be inserted into a tax-themed impersonation request, but it does not disclose the taxpayer's declaration, liability, or credentials. A single person or business is the normal affected unit, and plain nine-digit references can match when corroborative context is weak. Risk 5 and OFFICIAL preserve bounded atomic harm; a confirmed identifier inside personal tax correspondence or financial records would raise the sensitivity.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-austria-tax-identification-number
    title: "Austria Tax Identification Number entity definition - Microsoft Learn"
