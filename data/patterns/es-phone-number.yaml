schema: testpattern/v1
name: Spanish Phone Number
slug: es-phone-number
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects Spanish national telephone numbers per Spain's closed 9-digit numbering plan (Plan Nacional de
  Numeración Telefónica, administered under CNMC oversight): mobile numbers (segment N=6 in full, plus
  N=7 partially opened for mobile use in the 71/72/73/74 sub-ranges per the 2010 CNMC/CMT mobile-expansion
  resolution) and geographic numbers (leading 8 or 9, with the second digit constrained to never be 0 — a
  constraint that incidentally excludes the 900/901/902/905 toll-free and premium-rate service ranges, whose
  second digit is 0). Spain has no domestic trunk prefix, so the +34 international form carries the same
  9 significant digits as the domestic form, just with the +34 prefix in place of nothing.
operation: >-
  Validation: none (Spanish numbers have no checksum). Reference: CNMC, Registro de Numeración de
  Telecomunicaciones, https://www.cnmc.es/en/sectores-que-regulamos/telecomunicaciones/registros-de-numeracion
  (9-digit closed plan); Resolución de 12 de marzo de 2010 (CMT) opening the 71/72/73/74 mobile sub-ranges,
  as reported in CNMC's 2012 sectoral report, https://www.cnmc.es/sites/default/files/1539217_7.pdf;
  leading-digit breakdown corroborated by the Spanish government's consumer information service,
  https://www.consumoresponde.es/. Corroborative evidence: keywords within 300 characters. Keyword lists:
  phone-context. Both the domestic and international (+34) sub-regexes are evidence-gated at every tier —
  no tier fires without positive corroborative evidence, per the phone-family convention — see
  confidence_justification.
pattern: '(?<!\d)(?:\+34[\s.-]?(?:6[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|7[1-4][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|[89][1-9][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d)|6[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|7[1-4][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|[89][1-9][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d)(?!\d)'
confidence: medium
confidence_justification: >-
  Medium confidence: the mobile (6, or 7 with second digit 1-4) and geographic (8/9 with non-zero second
  digit) leading-digit constraints narrow the format, but Spanish numbers carry no checksum and a 9-digit
  sequence with those leading digits is still a high digit-collision format. Per the phone-family convention
  (every tier requires positive corroborative evidence; a +CC prefix alone is insufficient gating; there is
  no 65 rung), both the domestic and +34 international sub-regexes are evidence-gated at every tier: 75
  requires generic phone-context evidence and 85 requires country-specific phone keywords with
  template/noise exclusion. The literal +34 prefix improves precision when present but is not by itself
  sufficient gating.
jurisdictions:
  - es
regulations:
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - pii
  - contact-information
corroborative_evidence:
  keywords:
    - phone
    - mobile
    - call
    - text
    - contact number
    - Spanish phone number
    - número de teléfono
    - call me at
  proximity: 300
  keyword_lists:
    - phone-context
test_cases:
  should_match:
    - value: 'Móvil: 612 345 678'
      description: Domestic mobile, N=6 segment, illustrative synthetic value (no official CNMC-reserved fictional range exists — verified absent during research)
    - value: 'Contacto: 711 234 567'
      description: Domestic mobile, N=7 segment opened for mobile use in 2011 (71-74 sub-range), illustrative synthetic value
    - value: 'Fijo: 912 345 678'
      description: Domestic geographic, leading 9 with non-zero second digit, illustrative synthetic value
    - value: 'International: +34 612 345 678'
      description: International +34 form of the mobile number, same 9 significant digits (no trunk 0 to drop)
  should_not_match:
    - value: '512 345 678'
      description: Leading digit 5 is not a valid mobile (6, 7) or geographic (8, 9) leading digit
    - value: '900 123 456'
      description: Leading 9 but second digit is 0 — a toll-free/premium-rate service number, excluded by the non-zero-second-digit geographic constraint
    - value: '61234567'
      description: Only 8 digits — one short of the required 9
    - value: '8612345678999'
      description: Valid-shaped digit run embedded inside a longer reference number, rejected by digit boundaries
false_positives:
  - description: >-
      A 9-digit sequence with a valid mobile or geographic leading-digit shape can still coincidentally
      match invoice numbers, order numbers, or other structured identifiers of the same length and
      leading-digit distribution.
    mitigation: >-
      Every tier — for both the domestic and +34 international sub-regexes — requires positive
      phone-context or country-specific evidence within 300 characters; no zero-evidence tier exists, so a
      bare digit run without corroborating context never fires at any confidence level.
  - description: >-
      No official CNMC-reserved fictional or test number range exists for Spain (confirmed by web research,
      unlike NANP's 555-01XX or Ofcom's drama numbers), so illustrative synthetic values were used instead of
      an authoritative reserved range.
    mitigation: >-
      Test values use clearly non-representative sequential digit patterns; deployers should substitute their
      own tenant's synthetic test data for live validation rather than relying on a non-existent official
      reserved range.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: phone-context
      as: Evidence_phone_context
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_es_phone_domestic
      matches:
        - ref: Keyword_es_phone_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_es_phone_domestic
      matches:
        - ref: Evidence_phone_context
    - confidence_level: 85
      id_match: Regex_es_phone_intl
      matches:
        - ref: Keyword_es_phone_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_es_phone_intl
      matches:
        - ref: Evidence_phone_context
  regexes:
    - id: Regex_es_phone_domestic
      pattern: '(?<!\d)(?:6[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|7[1-4][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|[89][1-9][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d)(?!\d)'
    - id: Regex_es_phone_intl
      pattern: '(?<!\d)\+34[\s.-]?(?:6[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|7[1-4][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d|[89][1-9][\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d[\s.-]?\d)(?!\d)'
  keywords:
    - id: Keyword_es_phone_specific
      groups:
        - match_style: word
          terms:
            - Spanish phone number
            - Spanish mobile number
            - número de teléfono
            - número de móvil
            - móvil
            - call me at
            - text me at
      strength: specific
risk_rating: 5
risk_description: >-
  Phone number exposure enables targeted vishing (voice phishing), smishing (SMS phishing), and social
  engineering, and can be combined with other PII for identity correlation. Lower direct financial risk than
  a payment or government-ID identifier on its own.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
references:
  - url: https://www.cnmc.es/en/sectores-que-regulamos/telecomunicaciones/registros-de-numeracion
    title: "CNMC: Registro de Numeración de Telecomunicaciones (9-digit closed numbering plan)"
  - url: https://www.cnmc.es/sites/default/files/1539217_7.pdf
    title: "CNMC: Informe Económico Sectorial 2012 — Numeración (Resolución 12 de marzo de 2010 opening the 71-74 mobile sub-ranges)"
  - url: https://www.consumoresponde.es/art%C3%ADculos/tipologia_de_los_numeros_de_telefono_existentes_en_espana
    title: "Consumo Responde (Spanish government consumer service): Tipología de los números de teléfono existentes en España"
