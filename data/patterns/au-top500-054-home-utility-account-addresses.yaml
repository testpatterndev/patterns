schema: testpattern/v1
name: Home utility account addresses
slug: au-top500-054-home-utility-account-addresses
version: 2.0.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects populated Australian residential utility service addresses. Enforcing tiers require utility
  service context, account or metering context, and Australian geography; the strict tier also requires
  a labelled account holder.
operation: >-
  Pattern_au_utility_street_address matches a populated street number, street name, and Australian road
  type. The 65 tier is discovery-only. The 75 tier requires utility service context, account/metering
  context, and at least one state, major-locality, or postcode signal. The 85 tier requires utility
  service and account evidence, a labelled account holder, an Australian state or territory, and a
  postcode. Template and example content is excluded from the enforcing tiers.
pattern: >-
  (?i)\b\d{1,5}[A-Z]?(?:\s*[-/]\s*\d{1,5}[A-Z]?)?\s+[A-Z][A-Z'-]{1,30}(?:\s+[A-Z][A-Z'-]{0,30}){0,5}\s+(?:Street|St|Road|Rd|Avenue|Ave|Drive|Dr|Place|Pl|Court|Ct|Crescent|Cres|Close|Cl|Lane|La|Way|Parade|Pde|Boulevard|Blvd|Terrace|Tce|Circuit|Cct|Highway|Hwy|Grove|Gv|Square|Sq|Esplanade|Esp|Rise|View|Gardens|Loop|Trail|Track|Pass|Heights)\b
confidence: medium
confidence_justification: >-
  Medium confidence: a populated Australian street structure corroborated by both utility-service and
  account/metering evidence is materially stronger than utility labels alone. The high tier additionally
  proves account-holder attribution and complete state/postcode geography.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - contact-information
  - financial
  - location
corroborative_evidence:
  keywords:
    - electricity account
    - gas account
    - water account
    - utility bill
    - supply address
    - service address
    - account number
    - meter number
    - account holder
    - NMI
    - MIRN
    - postcode
  proximity: 300
  keyword_lists:
    - au-road-classification-extended
    - au-major-cities
    - au-states-full
    - au-states-abbreviations
    - au-unit-types
test_cases:
  should_match:
    - value: 7B George Street
      description: Exact 65 probe - populated street structure without utility context
    - value: 'Electricity account number 884201; service address: 18 Banksia Road, Brisbane QLD 4000'
      description: Exact 75 probe - populated utility address with account and geography but no account holder
    - value: 'Account holder: Full Name; electricity account number 884201; service address: 18 Banksia Road, Brisbane QLD 4000'
      description: Exact 75 probe - blank-form account-holder placeholder must not elevate the address to 85
    - value: 'Account holder: Noah Williams; NMI 41020012345; electricity supply address: 12 Ocean Rise, Redcliffe QLD 4020'
      description: Exact 85 probe - populated utility address with holder, account evidence, state, and postcode
    - value: 'Water account number 771028; service premises: 91 King Street, Melbourne VIC 3000'
      description: Populated water-service account address
  should_not_match:
    - value: 'Supply address:'
      description: Blank label must not be treated as a populated address
    - value: The electricity account team updated the billing policy.
      description: Utility account prose without an address value
    - value: The electricity market seminar is at 200 George Street, Sydney NSW 2000.
      description: Utility topic near a venue but without account or metering context must not enforce
    - value: 'Documentation example: Account holder: Noah Williams; NMI 41020012345; supply address: 12 Ocean Rise, Redcliffe QLD 4020'
      description: Complete but explicitly documented example is excluded from enforcing tiers
    - value: Meter number 123456 was retired after the network upgrade.
      description: Meter context without a populated service address
false_positives:
  - description: Utility-industry documents can mention electricity, gas, water, or meters near business premises.
    mitigation: Require both utility-service and account/metering context for enforcing tiers, with account-holder attribution at high confidence.
  - description: Completed sample bills and account forms can contain realistic service addresses.
    mitigation: Apply the shared template-exclusion NOT-group to the 75 and 85 tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_au_utility_street_address
      matches:
        - ref: Evidence_au_utility_service_context
        - ref: Evidence_au_utility_account_context
        - ref: Pattern_au_utility_labelled_account_holder
        - ref: Evidence_au_utility_state_territory
        - ref: Evidence_au_utility_major_locality
        - ref: Pattern_au_utility_postcode
        - ref: Pattern_au_utility_address_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_au_utility_street_address
      matches:
        - ref: Evidence_au_utility_service_context
        - ref: Evidence_au_utility_account_context
        - type: any
          min_matches: 1
          refs:
            - Evidence_au_utility_state_territory
            - Evidence_au_utility_major_locality
            - Pattern_au_utility_postcode
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_au_utility_street_address
  regexes:
    - id: Pattern_au_utility_street_address
      pattern: >-
        (?i)\b\d{1,5}[A-Z]?(?:\s*[-/]\s*\d{1,5}[A-Z]?)?\s+[A-Z][A-Z'-]{1,30}(?:\s+[A-Z][A-Z'-]{0,30}){0,5}\s+(?:Street|St|Road|Rd|Avenue|Ave|Drive|Dr|Place|Pl|Court|Ct|Crescent|Cres|Close|Cl|Lane|La|Way|Parade|Pde|Boulevard|Blvd|Terrace|Tce|Circuit|Cct|Highway|Hwy|Grove|Gv|Square|Sq|Esplanade|Esp|Rise|View|Gardens|Loop|Trail|Track|Pass|Heights)\b
    - id: Pattern_au_utility_postcode
      pattern: \b(?:0[289]\d{2}|[1-9]\d{3})\b
    - id: Pattern_au_utility_address_label
      pattern: >-
        (?i)\b(?:supply|service|billing|connection)\s+(?:address|premises)\s*[:#-]
    - id: Pattern_au_utility_labelled_account_holder
      pattern: >-
        (?i)\b(?:account\s+holder|customer|resident|tenant|occupant|name)\s*(?:is\s*)?[:#-]\s*(?!(?:full|given|first|last|customer|resident|tenant|occupant|account\s+holder)\s+name\b)(?!firstname\s+lastname\b)(?!(?:john|jane)\s+doe\b)[A-Z][A-Za-z'-]{1,30}(?:\s+[A-Z][A-Za-z'-]{1,30}){1,3}\b
  keywords:
    - id: Evidence_au_utility_service_context
      groups:
        - match_style: word
          terms:
            - electricity account
            - gas account
            - water account
            - energy account
            - utility account
            - utility bill
            - electricity supply
            - gas supply
            - water service
            - supply address
            - service address
            - service premises
            - connection address
            - energy retailer
      strength: specific
    - id: Evidence_au_utility_account_context
      groups:
        - match_style: word
          terms:
            - account number
            - customer number
            - billing account
            - account holder
            - meter number
            - text: NMI
              case_sensitive: true
            - text: MIRN
              case_sensitive: true
            - national metering identifier
            - meter reading
            - connection point
      strength: specific
    - id: Evidence_au_utility_state_territory
      groups:
        - match_style: word
          terms:
            - text: NSW
              case_sensitive: true
            - text: VIC
              case_sensitive: true
            - text: QLD
              case_sensitive: true
            - text: SA
              case_sensitive: true
            - text: WA
              case_sensitive: true
            - text: TAS
              case_sensitive: true
            - text: NT
              case_sensitive: true
            - text: ACT
              case_sensitive: true
            - New South Wales
            - Victoria
            - Queensland
            - South Australia
            - Western Australia
            - Tasmania
            - Northern Territory
            - Australian Capital Territory
      strength: domain
    - id: Evidence_au_utility_major_locality
      groups:
        - match_style: word
          terms:
            - Sydney
            - Melbourne
            - Brisbane
            - Perth
            - Adelaide
            - Hobart
            - Darwin
            - Canberra
            - Gold Coast
            - Newcastle
            - Wollongong
            - Geelong
            - Townsville
            - Cairns
            - Toowoomba
            - Ballarat
            - Bendigo
            - Albury
            - Wodonga
            - Launceston
            - Mackay
            - Rockhampton
            - Redcliffe
            - Parramatta
      strength: domain
risk_rating: 3
risk_description: >-
  This detector now requires a populated Australian street address for every match and adds utility,
  account, geography, and account-holder evidence across the enforcing tiers. A confirmed record can
  reveal a household service relationship and support residence verification or social engineering,
  but a single match does not expose payment credentials, consumption history, or account access.
  Risk 3 and OFFICIAL remain appropriate for the ordinary bounded record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
