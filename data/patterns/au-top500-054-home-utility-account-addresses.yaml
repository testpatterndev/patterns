schema: testpattern/v1
name: Home utility account addresses
slug: au-top500-054-home-utility-account-addresses
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to home utility account addresses in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: pii-personal, au-road-classification-extended, au-major-cities, au-states-full, au-states-abbreviations, au-unit-types. Uses additional domain-context evidence and explicit exclusion logic
  for template/sample/test text.
pattern: >-
  (?is)\b(?:home\s+utility\s+account\s+addresses|utility\s+account|electricity\s+account|gas\s+account|water\s+account|utility\s+bill|supply\s+address|meter\s+number|account\s+holder|billing\s+address|service\s+address)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - home utility account addresses
    - home
    - utility
    - account
    - addresses
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - pii-personal
    - au-road-classification-extended
    - au-major-cities
    - au-states-full
    - au-states-abbreviations
    - au-unit-types
test_cases:
  should_match:
    - value: home utility account addresses
      description: Primary topic phrase match
    - value: utility account
      description: Case-insensitive topic phrase match
    - value: electricity account
      description: Alternative topic phrase match
    - value: gas account
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to home utility account addresses appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_utility_account
      matches:
        - ref: Evidence_utility_account
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_utility_account
      matches:
        - ref: Evidence_utility_account
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_utility_account
      matches:
        - ref: Evidence_utility_account
  regexes:
    - id: Pattern_utility_account
      pattern: >-
        (?is)\b(?:home\s+utility\s+account\s+addresses|utility\s+account|electricity\s+account|gas\s+account|water\s+account|utility\s+bill|supply\s+address|meter\s+number|account\s+holder|billing\s+address|service\s+address)\b
    - id: Pattern_au_top500_054_home_utility_account_addresses_label_context
      pattern: (?i)\\b(?:home\\s+utility\\s+account\\s+addresses|home|utility|account|addresses|top500)\\b
  keywords:
    - id: Evidence_utility_account
      groups:
        - match_style: word
          terms:
            - home utility account addresses
            - utility account
            - electricity account
            - gas account
            - water account
            - utility bill
            - supply address
            - meter number
            - account holder
            - billing address
            - service address
            - NMI
    - id: Keyword_au_top500_054_home_utility_account_addresses_domain_context
      groups:
        - match_style: word
          terms:
            - home utility account addresses
            - home
            - utility
            - account
            - addresses
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
