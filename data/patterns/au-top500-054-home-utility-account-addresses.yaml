      Add exact 65/75/85 probes, utility/account/geography gating, account-holder high-confidence logic,
      template exclusions, and adversarial blank-label, venue, meter-only, and documented-example cases.
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 657 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
