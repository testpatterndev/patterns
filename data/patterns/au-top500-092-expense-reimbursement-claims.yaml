schema: testpattern/v1
name: Expense reimbursement claims
slug: au-top500-092-expense-reimbursement-claims
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to expense reimbursement claims in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:expense\s+reimbursement|expense\s+claim|travel\s+allowance|per\s+diem|mileage\s+claim|out[\s-]+of[\s-]+pocket\s+expense|reimbursement\s+request|corporate\s+card|expense\s+report|fringe\s+benefit)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - expense reimbursement claims
    - expense
    - reimbursement
    - claims
    - payroll
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: expense reimbursement
      description: Primary topic phrase match
    - value: expense claim
      description: Case-insensitive topic phrase match
    - value: travel allowance
      description: Alternative topic phrase match
    - value: per diem
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_expense_reimbursement_claims
      matches:
        - ref: Evidence_expense_reimbursement_claims
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_expense_reimbursement_claims
      matches:
        - ref: Evidence_expense_reimbursement_claims
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_expense_reimbursement_claims
      matches:
        - ref: Evidence_expense_reimbursement_claims
  regexes:
    - id: Pattern_expense_reimbursement_claims
      pattern: >-
        (?is)\b(?:expense\s+reimbursement|expense\s+claim|travel\s+allowance|per\s+diem|mileage\s+claim|out[\s-]+of[\s-]+pocket\s+expense|reimbursement\s+request|corporate\s+card|expense\s+report|fringe\s+benefit)\b
  keywords:
    - id: Evidence_expense_reimbursement_claims
      groups:
        - match_style: word
          terms:
            - expense reimbursement
            - expense claim
            - travel allowance
            - per diem
            - mileage claim
            - out-of-pocket expense
            - receipt
            - reimbursement request
            - corporate card
            - expense report
            - text: FBT
              case_sensitive: true
            - fringe benefit
      strength: specific
risk_description: >-
  The regex identifies expense reimbursement, travel allowance, per diem, mileage, out-of-pocket costs, corporate-card, expense-report, and fringe-benefit topics. A populated claim may reveal an employee's travel, purchases, and business activity, but the detector does not require a claimant, receipt, amount, itinerary, or card number. Harm to the employee or employer therefore depends on those additional details, and policy documents or routine expense instructions are common benign matches. Risk 4 OFFICIAL fits the standalone business-process signal; SENSITIVE would require a detailed personal itinerary, private transaction data, or a material claim collection.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
