schema: testpattern/v1
name: Neural & Neurotechnology Data
slug: global-neural-data
version: 1.3.0
type: keyword_list
pattern_class: concept
engine: universal
description: >-
  Detects references to neural / neurotechnology data: brain-computer interface signals, EEG/EMG
  recordings, evoked potentials, neural decoding output and neurofeedback data. Colorado HB24-1058
  and California SB 1223 both classify neural data as sensitive personal information. Topic-grade
  vocabulary detector, not a fixed-format detector.
operation: >-
  Phrase regex matching indicative neurotechnology terminology (EEG, BCI, neural signal, evoked
  potential, neural decoding, etc.). Best paired with corroborative proximity keywords. Detects the
  presence of neural-data subject matter rather than a structured token.
pattern: '(?i)\b(?:EEG|electroencephalogram|electroencephalography|BCIs?|brain[\s-]+computer\s+interfaces?|neural\s+data|neural\s+signals?|neural\s+recordings?|electrode\s+montage|evoked\s+potentials?|neurofeedback|brain\s+activity\s+data|neural\s+interfaces?|EMG|electromyography|electromyograph|P300|fMRI\s+BOLD|BOLD\s+signal|neural\s+decoding|neural\s+spike\s+trains?|neurotechnolog(?:y|ies)|cortical\s+activity|neural\s+oscillations?|local\s+field\s+potentials?)\b'
confidence: low
confidence_justification: >-
  Low by design. Neural data is detected by topic vocabulary, not a fixed format, so single-term
  matches are necessary-not-sufficient. Acronyms like EEG/EMG/BCI/P300 can appear in unrelated
  engineering or gaming contexts; pair with corroborative keywords (patient, recording, subject,
  consent) to raise precision.
jurisdictions:
  - global
  - us
regulations:
  - CCPA/CPRA
  - GDPR
frameworks:
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
  - biometric
  - health
corroborative_evidence:
  keywords:
    - neurodata
    - neural recording
    - brain activity
    - electrode
    - subject
    - patient
    - consent
    - neurotechnology
  proximity: 300
test_cases:
  should_match:
    - value: 'EEG neurotechnology overview.'
      description: Exact 65 discovery probe - neural-data topic without signal structure
    - value: 'EEG recording channel Fp1, sampling rate 256 Hz, signal epoch 14.'
      description: Exact 75 probe - structured signal-record evidence without a linked subject
    - value: 'Subject ID N-204; EEG recording channel Fp1, sampling rate 256 Hz, signal epoch 14, consent ID C-88.'
      description: Exact 85 probe - structured signal record linked to a subject/consent record
    - value: 'Subject 12: raw EEG recording exported from the headset session.'
      description: EEG keyword present in a recording context
    - value: 'The BCI captured neural signal data during the calibration trial.'
      description: BCI and neural signal terms present
    - value: 'P300 evoked potential amplitudes were logged per participant.'
      description: Evoked potential / P300 neurotechnology terms
    - value: 'fMRI BOLD time series stored alongside the neural decoding output.'
      description: fMRI BOLD and neural decoding terms
  should_not_match:
    - value: 'The quarterly sales report shows revenue grew across all regions.'
      description: Unrelated business prose, no neural terms
    - value: 'Please update the egg supplier contract before the audit.'
      description: Near-miss prose ("egg" is not EEG), no neural vocabulary
    - value: 'The marketing team reviewed the new brand guidelines yesterday.'
      description: Unrelated prose with no neurotechnology terms
    - value: 'Published study: scalp sensor subject N-204, channel Fp1 sampled at 256 Hz.'
      description: Adjacent public-research language is not an authored neural-data primary
    - value: 'Sample template: scalp sensor subject N-204, channel Fp1 sampled at 256 Hz.'
      description: Adjacent template language is not a neural-data record
    - value: 'Patient ECG recording channel II sampled at 256 Hz.'
      description: Sibling cardiac signal record does not satisfy the neural-data primary
false_positives:
  - description: >-
      Acronyms EEG/EMG/BCI/P300/BOLD can appear in unrelated medical-device engineering,
      signal-processing, or gaming literature without referring to an identifiable person's data.
    mitigation: >-
      Require corroborative keywords (subject, patient, recording, consent, neurotechnology) within
      the proximity window and treat single bare-acronym hits as low confidence.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: broad
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_neural_data_topic
      matches:
        - ref: Evidence_neural_signal_structure
        - ref: Evidence_neural_subject_linkage
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_public_research_context
    - confidence_level: 75
      id_match: Pattern_neural_data_topic
      matches:
        - ref: Evidence_neural_signal_structure
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_public_research_context
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_neural_data_topic
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_public_research_context
  regexes:
    - id: Pattern_neural_data_topic
      pattern: '(?i)\b(?:EEG|electroencephalogram|electroencephalography|BCIs?|brain[\s-]+computer\s+interfaces?|neural\s+data|neural\s+signals?|neural\s+recordings?|electrode\s+montage|evoked\s+potentials?|neurofeedback|brain\s+activity\s+data|neural\s+interfaces?|EMG|electromyography|electromyograph|P300|fMRI\s+BOLD|BOLD\s+signal|neural\s+decoding|neural\s+spike\s+trains?|neurotechnolog(?:y|ies)|cortical\s+activity|neural\s+oscillations?|local\s+field\s+potentials?)\b'
  keywords:
    - id: Evidence_neural_signal_structure
      groups:
        - match_style: word
          terms:
            - channel Fp1
            - sampling rate
            - electrode montage
            - trial timestamp
            - signal amplitude
            - microvolt
            - time series
            - signal epoch
      strength: domain
    - id: Evidence_neural_subject_linkage
      groups:
        - match_style: word
          terms:
            - subject ID
            - participant ID
            - patient record
            - consent ID
            - enrolment ID
            - linked diagnosis
            - participant record
      strength: specific
    - id: Evidence_public_research_context
      groups:
        - match_style: word
          terms:
            - published study
            - journal article
            - public dataset
            - methods section
            - textbook
            - tutorial
      strength: exclusion
risk_rating: 7
risk_description: >-
  This low-confidence vocabulary detector flags neurotechnology subject matter such as EEG or EMG recordings, brain-computer interfaces, evoked potentials, neural signals, and decoding outputs; it does not by itself establish an identifiable person's neural dataset. A real subject-linked recording could expose health state, cognitive responses, disability, or behavioural inferences and could be reused for profiling without consent. Bare acronyms also occur in device engineering, signal-processing, gaming, and published research, so the normal alert may need patient, subject, recording, or consent evidence before it carries direct personal harm. Risk 7 and SENSITIVE reflect the credible sensitivity of actual neural data, while risk 8 or PROTECTED requires an identifiable recording, consequential inference, bulk research cohort, or safety-critical use.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
