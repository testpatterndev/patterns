schema: testpattern/v1
name: M&A target lists
slug: global-top500-181-m-a-target-lists
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to m&a target lists in international contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 500 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:m&a\s+target\s+lists|acquisition\s+target|merger\s+target|target\s+company|due\s+diligence|valuation\s+analysis|deal\s+pipeline|strategic\s+acquisition|takeover\s+candidate|market\s+screening|indicative\s+offer)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - m&a target lists
    - target
    - lists
    - mergers
    - acquisitions
    - strategy
  proximity: 500
test_cases:
  should_match:
    - value: m&a target lists
      description: Primary topic phrase match
    - value: acquisition target
      description: Case-insensitive topic phrase match
    - value: merger target
      description: Alternative topic phrase match
    - value: target company
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to m&a target lists appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 500
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_ma_target_lists
      matches:
        - ref: Pattern_global_top500_181_m_a_target_lists_label_context
        - ref: Keyword_global_top500_181_m_a_target_lists_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_ma_target_lists
      matches:
        - ref: Keyword_ma_target_lists
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ma_target_lists
      pattern: >-
        (?is)\b(?:m&a\s+target\s+lists|acquisition\s+target|merger\s+target|target\s+company|due\s+diligence|valuation\s+analysis|deal\s+pipeline|strategic\s+acquisition|takeover\s+candidate|market\s+screening|indicative\s+offer)\b
    - id: Pattern_global_top500_181_m_a_target_lists_label_context
      pattern: (?i)\b(?:m\&a\s+target\s+lists)\b
  keywords:
    - id: Keyword_ma_target_lists
      groups:
        - match_style: word
          terms:
            - m&a target lists
            - text: M&A
              case_sensitive: true
            - acquisition target
            - merger target
            - target company
            - due diligence
            - valuation analysis
            - deal pipeline
            - strategic acquisition
            - takeover candidate
            - market screening
            - shortlist
            - indicative offer
      strength: specific
    - id: Keyword_global_top500_181_m_a_target_lists_domain_context
      groups:
        - match_style: word
          terms:
            - m&a target lists
            - target
            - lists
      strength: domain
risk_description: >-
  The concept detector flags acquisition or merger targets, target companies, due diligence, valuation analysis, deal pipelines, strategic acquisitions, takeover candidates, market screening, and indicative offers rather than proving an active transaction. A genuine target list can reveal corporate intentions, valuation priorities, and counterparties before announcement, allowing price movement, defensive action, insider dealing, or loss of negotiating leverage. The ordinary exposure concerns one organization's bounded transaction pipeline and the candidate companies, while public market analysis and advisory templates may match. Risk 8 and SENSITIVE reflect serious contained strategic and market harm; PROTECTED would require systemic market consequences, protected government policy, or significant national damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
