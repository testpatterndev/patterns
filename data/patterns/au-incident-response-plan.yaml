schema: testpattern/v1
name: Incident Response Plan
slug: au-incident-response-plan
version: 1.2.1
type: keyword_list
pattern_class: concept
description: Detects incident response plans containing containment procedures and escalation matrices.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
  - security
  - technology
test_cases:
  should_match:
    - value: 'Incident response plan: containment and eradication procedures by incident commander'
      description: Test match 1
    - value: IRP with incident classification, severity level, and incident timeline
      description: Test match 2
    - value: 'Post-incident review: lessons learned and recovery procedure documentation'
      description: Test match 3
  should_not_match:
    - value: Incident report for workplace injury
      description: Non-match 1
    - value: Traffic incident on the highway
      description: Non-match 2
false_positives:
  - description: Generic incident references in non-cyber contexts.
    mitigation: Require cyber-specific terms like IRP, containment, or incident commander.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  This keyword-based concept identifies a cyber incident response plan using plan wording with containment, recovery, escalation, or IT-operations terms. An attacker could use the procedures to predict communications, delay containment, and avoid expected response stages. The record normally affects the organisation and the systems under the plan, causing serious but bounded harm unless it governs critical services or reveals active compromise. Risk 8 and SENSITIVE InfoTech are appropriate, while PROTECTED needs significant-damage evidence beyond the plan concept.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_incident_response_plan
      matches:
        - ref: Keyword_incident_response
        - ref: Keyword_escalation
    - confidence_level: 75
      id_match: Regex_incident_response_plan
      matches:
        - ref: Keyword_it_operations
  regexes:
    - id: Regex_incident_response_plan
      pattern: >-
        (?i)\b(?:incident\s+response\s+(?:plan|procedure|playbook)|irp\s+(?:document|plan)|cyber\s*(?:security)?\s+(?:incident\s+)?response\s+plan|security\s+incident\s+(?:response\s+)?plan)\b
  keywords:
    - id: Keyword_incident_response
      groups:
        - match_style: word
          terms:
            - incident response
            - incident handling
            - containment
            - eradication
            - recovery
            - lessons learned
            - forensic analysis
            - forensic investigation
            - timeline
            - indicators of compromise
            - text: IOC
              case_sensitive: true
      strength: domain
    - id: Keyword_escalation
      groups:
        - match_style: word
          terms:
            - escalation
            - escalation path
            - escalation matrix
            - on-call
            - pager duty
            - 24x7
            - severity level
            - priority level
      strength: specific
    - id: Keyword_it_operations
      groups:
        - match_style: word
          terms:
            - IT operations
            - infrastructure
            - system administration
            - change management
            - incident management
            - problem management
            - ITIL
      strength: specific
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 547 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - incident response
  - incident response plan
  - IRP
  - containment
  - eradication
  - recovery
  - lessons learned
  - incident commander
  - incident classification
  - severity level
  - incident timeline
  - post-incident review
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
