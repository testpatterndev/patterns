schema: testpattern/v1
name: IBAN values
slug: au-top500-103-iban-values
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to iban values in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: financial-deposit-terms.
pattern: >-
  (?is)\b(?:international\s+bank\s+account\s+number|bank\s+account|beneficiary\s+account|wire\s+transfer|international\s+payment|correspondent\s+bank|cross[\s-]+border\s+payment|bank\s+identifier|account\s+validation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - iban values
    - iban
    - values
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
test_cases:
  should_match:
    - value: international bank account number
      description: Primary topic phrase match
    - value: bank account
      description: Case-insensitive topic phrase match
    - value: beneficiary account
      description: Alternative topic phrase match
    - value: wire transfer
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_iban_values
      matches:
        - ref: Evidence_iban_values
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_iban_values
      matches:
        - ref: Evidence_iban_values
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_iban_values
      matches:
        - ref: Evidence_iban_values
  regexes:
    - id: Pattern_iban_values
      pattern: >-
        (?is)\b(?:international\s+bank\s+account\s+number|bank\s+account|beneficiary\s+account|wire\s+transfer|international\s+payment|correspondent\s+bank|cross[\s-]+border\s+payment|bank\s+identifier|account\s+validation)\b
  keywords:
    - id: Evidence_iban_values
      groups:
        - match_style: word
          terms:
            - IBAN
            - international bank account number
            - bank account
            - beneficiary account
            - wire transfer
            - international payment
            - SEPA
            - correspondent bank
            - remittance
            - cross-border payment
            - bank identifier
            - account validation
risk_description: >-
  Despite its name, the regex recognises international-bank-account, beneficiary-account, wire-transfer, correspondent-bank, cross-border-payment, and account-validation topics rather than an IBAN character structure. A match can locate payment discussion, but it does not provide the country code, checksum, bank component, or account component needed to route funds. Meaningful fraud against a beneficiary requires a populated instruction and authorisation context, while generic international-payment documents are expected matches. Risk 4 OFFICIAL reflects this topic-only rail signal; SENSITIVE would require a real IBAN linked to a person or transaction.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
