schema: testpattern/v1
name: Hazardous material storage maps
slug: global-top500-459-hazardous-material-storage-maps
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to hazardous material storage maps in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:hazardous\s+material|hazmat\s+storage|chemical\s+storage|dangerous\s+goods|material\s+safety\s+data\s+sheet|storage\s+location|containment\s+area|safety\s+zone|emergency\s+response|spill\s+containment|critical\s+infrastructure|storage\s+facility)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - hazardous material storage maps
    - hazardous
    - material
    - storage
    - maps
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: hazardous material
      description: Primary topic phrase match
    - value: hazmat storage
      description: Case-insensitive topic phrase match
    - value: chemical storage
      description: Alternative topic phrase match
    - value: dangerous goods
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: hazardous material storage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to hazardous material storage maps appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_hazmat_storage
      matches:
        - ref: Pattern_global_top500_459_hazardous_material_storage_maps_label_context
        - ref: Keyword_global_top500_459_hazardous_material_storage_maps_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_hazmat_storage
      matches:
        - ref: Keyword_hazmat_storage
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_hazmat_storage
      pattern: >-
        (?is)\b(?:hazardous\s+material|hazmat\s+storage|chemical\s+storage|dangerous\s+goods|material\s+safety\s+data\s+sheet|storage\s+location|containment\s+area|safety\s+zone|emergency\s+response|spill\s+containment|critical\s+infrastructure|storage\s+facility)\b
    - id: Pattern_global_top500_459_hazardous_material_storage_maps_label_context
      pattern: (?i)\b(?:hazardous\s+material\s+storage\s+maps)\b
  keywords:
    - id: Keyword_hazmat_storage
      groups:
        - match_style: word
          terms:
            - hazardous material
            - hazmat storage
            - chemical storage
            - dangerous goods
            - material safety data sheet
            - storage location
            - containment area
            - safety zone
            - emergency response
            - spill containment
            - critical infrastructure
            - storage facility
      strength: specific
    - id: Keyword_global_top500_459_hazardous_material_storage_maps_domain_context
      groups:
        - match_style: word
          terms:
            - hazardous material storage maps
            - hazardous
            - material
            - storage
            - maps
      strength: domain
risk_description: >-
  The pattern finds hazardous-material, chemical-storage, containment-area, safety-zone, and storage-location concepts with nearby infrastructure context; it does not require coordinates or an actual map. A genuine storage map can reveal chemical type locations, containment arrangements, and emergency zones that support theft, sabotage, unsafe access, or deliberate release. Harm is normally serious for workers, responders, nearby communities, and one facility, while safety procedures and material-handling guidance can match without exposing locations. Risk 8 and SENSITIVE are justified; PROTECTED would require precise inventories and access details at a site where compromise creates a credible mass-casualty or major critical-service scenario.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
