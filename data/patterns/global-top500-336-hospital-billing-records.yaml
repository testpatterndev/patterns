schema: testpattern/v1
name: Hospital billing records
slug: global-top500-336-hospital-billing-records
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies hospital billing records references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:hospital\s+billing|billing\s+record|patient\s+billing|hospital\s+invoice|medical\s+billing|claim\s+submission|billing\s+code|hospital\s+charges|inpatient\s+billing|DRG\s+code)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - hospital billing records
    - hospital
    - billing
    - records
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
test_cases:
  should_match:
    - value: hospital billing
      description: Primary topic phrase match
    - value: billing record
      description: Case-insensitive topic phrase match
    - value: patient billing
      description: Alternative topic phrase match
    - value: hospital invoice
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_hospital_billing_records
      matches:
        - ref: Evidence_hospital_billing_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_hospital_billing_records
      matches:
        - ref: Evidence_hospital_billing_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_hospital_billing_records
      matches:
        - ref: Evidence_hospital_billing_records
  regexes:
    - id: Pattern_hospital_billing_records
      pattern: (?is)\b(?:hospital\s+billing|billing\s+record|patient\s+billing|hospital\s+invoice|medical\s+billing|claim\s+submission|billing\s+code|hospital\s+charges|inpatient\s+billing|DRG\s+code)\b
  keywords:
    - id: Evidence_hospital_billing_records
      groups:
        - match_style: word
          terms:
            - hospital billing
            - billing record
            - patient billing
            - hospital invoice
            - medical billing
            - health
            - biomedical
            - claim submission
            - billing code
            - hospital charges
            - inpatient billing
            - DRG code
risk_description: >-
  The detector recognizes hospital and patient billing, medical invoices, claim submissions, charges, DRG codes, and inpatient billing in clinical context. A genuine bill can link identity, provider, dates, procedures, diagnosis-related groups, insurer, and financial liability, allowing condition inference, fraud, debt targeting, or dispute manipulation. The normal record is one account or episode rather than a hospital ledger, so the combined financial and health impact is serious but contained. Risk 8 and SENSITIVE are justified; PROTECTED would require a bulk revenue-cycle database, payment credentials, or compromise causing significant institutional and patient harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
