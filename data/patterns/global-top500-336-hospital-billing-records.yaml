schema: testpattern/v1
name: Hospital billing records
slug: global-top500-336-hospital-billing-records
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies hospital billing records references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:hospital\s+billing|billing\s+record|medical\s+billing|claim\s+submission|procedure\s+code|diagnosis\s+code|insurance\s+claim|patient\s+account|revenue\s+cycle|charge\s+master)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - hospital billing records
    - hospital
    - billing
    - records
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
test_cases:
  should_match:
    - value: hospital billing
      description: Primary topic phrase match
    - value: billing record
      description: Case-insensitive topic phrase match
    - value: medical billing
      description: Alternative topic phrase match
    - value: claim submission
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_hospital_billing_records
      matches:
        - ref: Pattern_global_top500_336_hospital_billing_records_label_context
        - ref: Keyword_global_top500_336_hospital_billing_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_hospital_billing_records
      matches:
        - ref: Keyword_hospital_billing_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_hospital_billing_records
      matches:
        - ref: Keyword_hospital_billing_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_hospital_billing_records
      pattern: (?is)\b(?:hospital\s+billing|billing\s+record|medical\s+billing|claim\s+submission|procedure\s+code|diagnosis\s+code|insurance\s+claim|patient\s+account|revenue\s+cycle|charge\s+master)\b
    - id: Pattern_global_top500_336_hospital_billing_records_label_context
      pattern: (?i)\\b(?:hospital\\s+billing\\s+records|hospital|billing|top500)\\b
  keywords:
    - id: Keyword_hospital_billing_records
      groups:
        - match_style: word
          terms:
            - hospital billing
            - billing record
            - medical billing
            - claim submission
            - procedure code
            - health
            - biomedical
            - diagnosis code
            - insurance claim
            - patient account
            - revenue cycle
            - charge master
    - id: Keyword_global_top500_336_hospital_billing_records_domain_context
      groups:
        - match_style: word
          terms:
            - hospital billing records
            - hospital
            - billing
            - top500
            - field
            - identifier
            - reference
