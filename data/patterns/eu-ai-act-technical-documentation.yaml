schema: testpattern/v1
name: EU AI Act Technical Documentation (High-Risk AI System)
slug: eu-ai-act-technical-documentation
version: 1.1.1
type: keyword_proximity
pattern_class: concept
engine: universal
description: >-
  Detects Article 11 / Annex IV technical documentation for high-risk AI systems under the EU AI Act
  (Regulation (EU) 2024/1689). This documentation must demonstrate compliance of the high-risk AI system
  before placing on the market and contains commercially sensitive material — system architecture, design
  specifications, training-data datasheets, risk management findings, and known limitations — whose
  uncontrolled disclosure exposes trade secrets and the provider's compliance posture.
operation: >-
  Concept (topic) classifier, not an identifier detector. Primary detection: keyword proximity on
  Annex IV's distinctive section vocabulary ('general description of the AI system', 'post-market
  monitoring plan', 'technical documentation of a/the high-risk AI system', 'technical documentation
  referred to in Article 11') corroborated within 300 characters by the AI Act's own terms (intended
  purpose, risk management system, human oversight, harmonised standards, Annex IV, Regulation (EU)
  2024/1689). Noise exclusion for news, marketing, academic, and legal-alert contexts.
pattern: (?i)\b(?:general\s+description\s+of\s+the\s+AI\s+system|post-market\s+monitoring\s+plan|technical\s+documentation\s+(?:referred\s+to\s+in\s+Article\s+11|of\s+(?:a|the)\s+high-risk\s+AI\s+system)|Annex\s+IV\s+technical\s+documentation)\b
confidence: medium
confidence_justification: >-
  Medium confidence: honest topic matcher. Annex IV's enumerated section headings are distinctive of the
  document class, but the same phrases appear verbatim in legal alerts, compliance guides, and training
  material discussing the AI Act; noise exclusions and corroborative evidence reduce but cannot eliminate
  that concept-class collision. No identifier-grade precision is promised.
jurisdictions:
  - eu
regulations:
- "Regulation (EU) 2024/1689 (AI Act)"
frameworks:
- ISO/IEC 42001
- ISO 27001
data_categories:
  - legal
  - emerging
corroborative_evidence:
  keywords:
    - intended purpose
    - risk management system
    - risk management measures
    - post-market monitoring
    - human oversight
    - harmonised standards
    - EU declaration of conformity
    - instructions for use
    - design specifications
    - system architecture
    - reasonably foreseeable misuse
    - high-risk AI system
    - conformity assessment
    - notified body
    - Annex IV
    - Article 11
    - Article 9
    - datasheets
    - Regulation (EU) 2024/1689
  proximity: 300
test_cases:
  should_match:
    - value: |-
        CONFIDENTIAL — TECHNICAL DOCUMENTATION (Regulation (EU) 2024/1689, Annex IV)
        AI system: SentinelHire v2.3 — CV screening and shortlisting (high-risk, Annex III point 4)
        Section 1 — General description of the AI system: intended purpose, provider identity, versions
        of relevant software, and the hardware on which the AI system is intended to run.
        Section 5 — Detailed description of the risk management system in accordance with Article 9.
      description: Annex IV technical documentation pack for a high-risk recruitment AI system
    - value: >-
        Section 9 of this dossier sets out the post-market monitoring plan referred to in Article 72(3),
        including the arrangements for collecting accuracy and performance data in the post-market phase.
        A copy of the EU declaration of conformity (Annex IV point 8) and the list of harmonised standards
        applied are annexed. Human oversight measures are described in Section 3.
      description: Post-market monitoring plan section with Annex IV cross-references
    - value: >-
        Internal review, do not distribute: the technical documentation of the high-risk AI system is still
        missing the datasheets describing the training methodologies and the data requirements. Design
        specifications and the description of human oversight measures were updated against Annex IV;
        the notified body has asked for the revised system architecture description before the conformity
        assessment resumes.
      description: Internal compliance review of an incomplete Annex IV technical file
  should_not_match:
    - value: >-
        The Commission today reminded providers that the obligations for high-risk AI systems apply from
        August 2026. Companies will have to prepare technical documentation, undergo conformity assessment
        and register their systems, the press release said. Industry groups have asked for a delay.
      description: News article about AI Act obligations (no Annex IV document vocabulary)
    - value: >-
        Achieve AI Act compliance in weeks, not months. Our platform automatically drafts your Annex IV
        evidence pack and keeps it audit-ready. Book a demo or join our webinar to see how leading
        providers automate compliance with Regulation (EU) 2024/1689.
      description: Vendor marketing claiming AI Act compliance tooling
    - value: >-
        Abstract — This peer-reviewed article analyses the documentation requirements of the EU AI Act and
        compares the technical file regime for medical devices with the new rules for AI providers. We argue
        that documentation duties function as a de facto licensing scheme.
      description: Academic paper analysing AI Act documentation requirements
    - value: >-
        Legal update for clients: Annex IV(1) of the AI Act requires 'a general description of the AI
        system' including its intended purpose, and Annex IV(5) a description of the risk management
        system established under Article 9. Contact our regulatory team for a readiness assessment.
      description: Law-firm client alert quoting Annex IV text (filter-dependent negative)
false_positives:
  - description: Law-firm client alerts, compliance guides, and training material quoting Annex IV section headings verbatim
    mitigation: Noise exclusion on 'legal update', 'client alert', 'newsletter', 'training course', 'training material'; corroborative evidence favours full documents over quoted fragments
  - description: Vendor marketing and webinar invitations claiming AI Act compliance capability
    mitigation: Noise exclusion on 'book a demo', 'webinar', 'free trial', 'press release'; marketing copy rarely reproduces the enumerated Annex IV section vocabulary
  - description: News and policy analysis about the AI Act's documentation obligations
    mitigation: Primary phrases are Annex IV document vocabulary rather than generic 'technical documentation'; noise exclusion on press/news terms
  - description: Technical files for other CE-marked products (machinery, medical devices) that also use 'technical documentation'
    mitigation: Primary phrases require AI-system-specific wording; corroborative evidence is AI Act vocabulary (Annex IV, Article 9, high-risk AI system)
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_eu_ai_act_technical_documentation_annex_iv_terms
      matches:
        - ref: Evidence_eu_ai_act_technical_documentation_primary
        - ref: Evidence_eu_ai_act_technical_documentation_corroborative
        - ref: Pattern_eu_ai_act_technical_documentation_regulation_citation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_eu_ai_act_technical_documentation_exclusion
    - confidence_level: 75
      id_match: Pattern_eu_ai_act_technical_documentation_annex_iv_terms
      matches:
        - ref: Evidence_eu_ai_act_technical_documentation_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_eu_ai_act_technical_documentation_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_eu_ai_act_technical_documentation_annex_iv_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_eu_ai_act_technical_documentation_exclusion
  regexes:
    - id: Pattern_eu_ai_act_technical_documentation_annex_iv_terms
      pattern: (?i)\b(?:general\s+description\s+of\s+the\s+AI\s+system|post-market\s+monitoring\s+plan|technical\s+documentation\s+(?:referred\s+to\s+in\s+Article\s+11|of\s+(?:a|the)\s+high-risk\s+AI\s+system)|Annex\s+IV\s+technical\s+documentation)\b
    - id: Pattern_eu_ai_act_technical_documentation_regulation_citation
      pattern: (?i)\bRegulation\s+\(EU\)\s+2024/1689\b
  keywords:
    - id: Evidence_eu_ai_act_technical_documentation_primary
      groups:
        - match_style: word
          terms:
            - general description of the AI system
            - post-market monitoring plan
            - technical documentation
            - Annex IV
      strength: specific
    - id: Evidence_eu_ai_act_technical_documentation_corroborative
      groups:
        - match_style: word
          terms:
            - intended purpose
            - risk management system
            - risk management measures
            - post-market monitoring
            - human oversight
            - harmonised standards
            - EU declaration of conformity
            - instructions for use
            - design specifications
            - system architecture
            - reasonably foreseeable misuse
            - high-risk AI system
            - conformity assessment
            - notified body
            - datasheets
      strength: domain
    - id: Filter_eu_ai_act_technical_documentation_exclusion
      groups:
        - match_style: word
          terms:
            - press release
            - media release
            - blog post
            - webinar
            - book a demo
            - free trial
            - client alert
            - legal update
            - newsletter
            - peer-reviewed
            - paper abstract
            - conference abstract
            - abstract submitted
            - training course
            - online course
            - course syllabus
            - training material
            - thought leadership
      strength: noise
risk_rating: 7
risk_description: >-
  The detector identifies Article 11 and Annex IV technical documentation for a high-risk AI system, including architecture, intended purpose, training-data requirements, risk management, known limitations, human oversight, and post-market monitoring. Disclosure can expose trade secrets, unresolved compliance gaps, failure modes, and attack-relevant system detail, harming the provider and potentially weakening safeguards for people affected by the system. Other CE technical files, law-firm alerts, marketing, news, policy analysis, and academic discussion use similar language, so high-risk AI and Annex IV context must corroborate the document. Risk 7 supports SENSITIVE Personal-Privacy; PROTECTED would require actionable compromise of a critical deployment, bulk sensitive training data, or systemic weaknesses capable of significant harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: "CUI Basic"
  uk_gov: "OFFICIAL-SENSITIVE"
references:
  - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32024R1689
  - https://artificialintelligenceact.eu/article/11/
  - https://artificialintelligenceact.eu/annex/4/
