schema: testpattern/v1
name: Public housing assistance files
slug: au-top500-384-public-housing-assistance-files
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to public housing assistance files in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: industry-education. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:public\s+housing\s+assistance\s+files|public\s+housing|housing\s+assistance|social\s+housing|rent\s+assistance|community\s+housing|housing\s+commission)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - public housing assistance files
    - public
    - housing
    - assistance
    - files
    - government
    - citizen
    - services
  proximity: 300
  keyword_lists:
    - industry-education
test_cases:
  should_match:
    - value: public housing assistance files
      description: Primary topic phrase match
    - value: public housing
      description: Case-insensitive topic phrase match
    - value: housing assistance
      description: Alternative topic phrase match
    - value: social housing
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to public housing assistance files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_public_housing_assistance
      matches:
        - ref: Evidence_public_housing_assistance
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_384_public_housing_assistance_files_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_public_housing_assistance
      matches:
        - ref: Evidence_public_housing_assistance
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_384_public_housing_assistance_files_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_public_housing_assistance
      matches:
        - ref: Evidence_public_housing_assistance
  regexes:
    - id: Pattern_public_housing_assistance
      pattern: (?is)\b(?:public\s+housing\s+assistance\s+files|public\s+housing|housing\s+assistance|social\s+housing|rent\s+assistance|community\s+housing|housing\s+commission)\b
    - id: Pattern_au_top500_384_public_housing_assistance_files_label_context
      pattern: (?i)\\b(?:public\\s+housing\\s+assistance\\s+files|public|housing|assistance|files|top500)\\b
  keywords:
    - id: Evidence_public_housing_assistance
      groups:
        - match_style: word
          terms:
            - public housing assistance files
            - public housing
            - housing assistance
            - social housing
            - tenant
            - rent assistance
            - waitlist
            - community housing
            - accommodation
            - housing commission
            - tenancy
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_384_public_housing_assistance_files_domain_context
      groups:
        - match_style: word
          terms:
            - public housing assistance files
            - public
            - housing
            - assistance
            - files
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_384_public_housing_assistance_files_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
