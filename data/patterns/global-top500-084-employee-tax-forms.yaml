schema: testpattern/v1
name: Employee tax forms
slug: global-top500-084-employee-tax-forms
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to employee tax forms in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:employee\s+tax\s+forms|tax\s+form|income\s+statement|payment\s+summary|tax\s+return|tax\s+declaration|PAYG\s+summary|annual\s+earnings|tax\s+certificate|employer\s+statement)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - employee tax forms
    - employee
    - tax
    - forms
    - payroll
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: employee tax forms
      description: Primary topic phrase match
    - value: tax form
      description: Case-insensitive topic phrase match
    - value: income statement
      description: Alternative topic phrase match
    - value: payment summary
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_employee_tax_forms
      matches:
        - ref: Pattern_global_top500_084_employee_tax_forms_label_context
        - ref: Keyword_global_top500_084_employee_tax_forms_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_084_employee_tax_forms_noise_exclusion
    - confidence_level: 75
      id_match: Regex_employee_tax_forms
      matches:
        - ref: Keyword_employee_tax_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_084_employee_tax_forms_noise_exclusion
    - confidence_level: 65
      id_match: Regex_employee_tax_forms
      matches:
        - ref: Keyword_employee_tax_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_084_employee_tax_forms_noise_exclusion
  regexes:
    - id: Regex_employee_tax_forms
      pattern: (?is)\b(?:employee\s+tax\s+forms|tax\s+form|income\s+statement|payment\s+summary|tax\s+return|tax\s+declaration|PAYG\s+summary|annual\s+earnings|tax\s+certificate|employer\s+statement)\b
    - id: Pattern_global_top500_084_employee_tax_forms_label_context
      pattern: (?i)\\b(?:employee\\s+tax\\s+forms|employee|tax|forms|top500)\\b
  keywords:
    - id: Keyword_employee_tax_forms
      groups:
        - match_style: word
          terms:
            - employee tax forms
            - tax form
            - W-2
            - income statement
            - payment summary
            - tax return
            - tax declaration
            - PAYG summary
            - annual earnings
            - tax certificate
            - employer statement
    - id: Keyword_global_top500_084_employee_tax_forms_domain_context
      groups:
        - match_style: word
          terms:
            - employee tax forms
            - employee
            - tax
            - forms
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_084_employee_tax_forms_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
