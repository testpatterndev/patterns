schema: testpattern/v1
name: Student enrollment records
slug: au-top500-341-student-enrollment-records
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to student enrollment records in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: emerging-ai-training, industry-education. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:student\s+enrollment|enrolment\s+record|student\s+registration|course\s+enrollment|student\s+number|student\s+ID|admission\s+record|enrollment\s+date|student\s+intake)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - student enrollment records
    - student
    - enrollment
    - records
    - education
    - research
    - administration
  proximity: 300
  keyword_lists:
    - emerging-ai-training
    - industry-education
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: student enrollment
      description: Primary topic phrase match
    - value: enrolment record
      description: Case-insensitive topic phrase match
    - value: student registration
      description: Alternative topic phrase match
    - value: course enrollment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to student enrollment records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_student_enrollment_records
      matches:
        - ref: Evidence_student_enrollment_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_student_enrollment_records
      matches:
        - ref: Evidence_student_enrollment_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_student_enrollment_records
      matches:
        - ref: Evidence_student_enrollment_records
  regexes:
    - id: Pattern_student_enrollment_records
      pattern: (?is)\b(?:student\s+enrollment|enrolment\s+record|student\s+registration|course\s+enrollment|student\s+number|student\s+ID|admission\s+record|enrollment\s+date|student\s+intake)\b
    - id: Pattern_au_top500_341_student_enrollment_records_label_context
      pattern: (?i)\b(?:student\s+enrollment\s+records)\b
  keywords:
    - id: Evidence_student_enrollment_records
      groups:
        - match_style: word
          terms:
            - student enrollment
            - enrolment record
            - student registration
            - course enrollment
            - student number
            - education
            - administration
            - student ID
            - matriculation
            - admission record
            - enrollment date
            - student intake
    - id: Keyword_au_top500_341_student_enrollment_records_domain_context
      groups:
        - match_style: word
          terms:
            - student enrollment records
            - student
            - enrollment
risk_description: >-
  This Australian concept detector recognises student enrollment, enrolment record, and student registration language supported by education context. A normal true positive is an individual enrollment record linking a learner to an institution, course, contact details, status, and possibly eligibility information, creating privacy and impersonation risks. Prospectuses, registration instructions, and blank forms can still collide because the pattern detects clustered terminology rather than verifying a populated student profile. Risk 8 SENSITIVE protects an identified education record, while PROTECTED would require a bulk student registry, safeguarded child location data, or significant-damage exposure.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
