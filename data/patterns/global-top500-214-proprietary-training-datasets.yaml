  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change); remove dead strength:noise keyword group(s) Keyword_global_top500_214_proprietary_training_datasets_domain_context — referenced by no tier, and the terms collide with the pattern''s own positive vocabulary so wiring them as a NOT-gate would suppress genuine matches'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
