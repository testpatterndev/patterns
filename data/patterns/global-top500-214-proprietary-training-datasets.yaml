schema: testpattern/v1
name: Proprietary training datasets
slug: global-top500-214-proprietary-training-datasets
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to proprietary training datasets in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: corporate-ip. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:proprietary\s+training\s+datasets|training\s+data|machine\s+learning\s+dataset|intellectual\s+property|trade\s+secrets|proprietary\s+data|model\s+training|labeled\s+data|confidential\s+dataset|data\s+pipeline)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - proprietary training datasets
    - proprietary
    - training
    - datasets
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
  keyword_lists:
    - corporate-ip
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: proprietary training datasets
      description: Primary topic phrase match
    - value: training data
      description: Case-insensitive topic phrase match
    - value: machine learning dataset
      description: Alternative topic phrase match
    - value: intellectual property
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to proprietary training datasets appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_proprietary_training_datasets
      matches:
        - ref: Keyword_proprietary_training_datasets
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_proprietary_training_datasets
      matches:
        - ref: Keyword_proprietary_training_datasets
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_proprietary_training_datasets
      pattern: >-
        (?is)\b(?:proprietary\s+training\s+datasets|training\s+data|machine\s+learning\s+dataset|intellectual\s+property|trade\s+secrets|proprietary\s+data|model\s+training|labeled\s+data|confidential\s+dataset|data\s+pipeline)\b
    - id: Pattern_global_top500_214_proprietary_training_datasets_label_context
      pattern: (?i)\b(?:proprietary\s+training\s+datasets)\b
  keywords:
    - id: Keyword_proprietary_training_datasets
      groups:
        - match_style: word
          terms:
            - proprietary training datasets
            - training data
            - machine learning dataset
            - intellectual property
            - trade secrets
            - proprietary data
            - model training
            - labeled data
            - confidential dataset
            - data pipeline
      strength: specific
risk_description: >-
  The detector recognizes proprietary training datasets, machine-learning data, labeled data, model-training pipelines, confidential datasets, and related IP context. A genuine corpus can expose costly labels, rare examples, customer-derived records, bias controls, and collection strategy, allowing model replication, poisoning research, privacy attacks, or competitive shortcutting. The normal unit is one training dataset or pipeline rather than an entire AI estate, so the likely damage is serious but contained. Risk 8 and SENSITIVE are justified; PROTECTED would require highly sensitive bulk personal records, a critical model dependency, or compromise causing significant widespread damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
