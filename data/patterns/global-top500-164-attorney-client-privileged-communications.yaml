schema: testpattern/v1
name: Attorney-client privileged communications
slug: global-top500-164-attorney-client-privileged-communications
version: 1.2.3
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to attorney-client privileged communications in international contexts.
  These are communications potentially subject to legal privilege; the category is not blanket personally identifiable information, and a match does not guarantee privilege applies.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: classification-legal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:attorney[\s-]+client\s+privileged\s+communications|attorney[\s-]+client\s+privilege|legal\s+professional\s+privilege|privileged\s+and\s+confidential|work\s+product\s+doctrine|solicitor[\s-]+client\s+privilege|litigation\s+privilege|without\s+prejudice|legal\s+hold|privilege\s+log|confidential\s+legal|protected\s+communication)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - legal
corroborative_evidence:
  keywords:
    - attorney-client privileged communications
    - attorney
    - client
    - privileged
    - communications
    - corporate
    - legal
    - governance
  proximity: 300
  keyword_lists:
    - classification-legal
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: attorney-client privileged communications
      description: Primary topic phrase match
    - value: attorney-client privilege
      description: Case-insensitive topic phrase match
    - value: legal professional privilege
      description: Alternative topic phrase match
    - value: privileged and confidential
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: >-
      Common words and phrases related to attorney-client privileged communications appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal
      data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_attorney_client_privileged
      matches:
        - ref: Pattern_global_top500_164_attorney_client_privileged_communications_label_context
        - ref: Keyword_global_top500_164_attorney_client_privileged_communications_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_attorney_client_privileged
      matches:
        - ref: Keyword_attorney_client_privileged
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_attorney_client_privileged
      pattern: >-
        (?is)\b(?:attorney[\s-]+client\s+privileged\s+communications|attorney[\s-]+client\s+privilege|legal\s+professional\s+privilege|privileged\s+and\s+confidential|work\s+product\s+doctrine|solicitor[\s-]+client\s+privilege|litigation\s+privilege|without\s+prejudice|legal\s+hold|privilege\s+log|confidential\s+legal|protected\s+communication)\b
    - id: Pattern_global_top500_164_attorney_client_privileged_communications_label_context
      pattern: (?i)\b(?:attorney\-client\s+privileged\s+communications)\b
  keywords:
    - id: Keyword_attorney_client_privileged
      groups:
        - match_style: word
          terms:
            - attorney-client privileged communications
            - attorney-client privilege
            - legal professional privilege
            - privileged and confidential
            - work product doctrine
            - solicitor-client privilege
            - litigation privilege
            - without prejudice
            - legal hold
            - privilege log
            - confidential legal
            - protected communication
      strength: specific
    - id: Keyword_global_top500_164_attorney_client_privileged_communications_domain_context
      groups:
        - match_style: word
          terms:
            - attorney-client privileged communications
            - attorney
            - client
            - privileged
            - communications
      strength: domain
risk_description: >-
  This concept regex targets attorney-client or solicitor-client privilege, work product, litigation privilege, privilege logs, legal holds, and confidential-legal wording; it does not adjudicate whether a communication is legally privileged. An authentic exchange can reveal client instructions, counsel's advice, admissions, evidence strategy, and settlement posture, and disclosure may waive privilege or advantage an opposing party. The ordinary unit is one client communication or matter involving the sender, recipient, and people discussed, while privilege notices, legal policies, and public commentary can match without protected substance. Risk 8 and SENSITIVE Legal reflect serious case-contained harm; PROTECTED would require a protected operation, exceptionally consequential proceeding, or significant broader damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
