schema: testpattern/v1
name: Provider identifier records
slug: au-top500-337-provider-identifier-records
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies provider identifier records references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:provider\s+identifier\s+records)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/ ]{4,24}\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - provider identifier records
    - provider
    - identifier
    - records
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - generic-data-labels
test_cases:
  should_match:
    - value: Provider identifier records
      description: Exact phrase marker match
    - value: provider identifier records
      description: Case-insensitive phrase match
    - value: Provider identifier records
      description: Normalized whitespace phrase
    - value: structured record with identifier and contextual anchors
      description: Structural anchor sample
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_provider_identifier_records
      matches:
        - ref: Evidence_provider_identifier_records
          min_count: 2
          unique_results: true
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_provider_identifier_records
      matches:
        - ref: Evidence_provider_identifier_records
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_provider_identifier_records
      matches:
        - ref: Evidence_provider_identifier_records
  regexes:
    - id: Pattern_provider_identifier_records
      pattern: (?is)\b(?:provider\s+identifier\s+records)\b\s{0,80}\b[A-Z0-9][A-Z0-9\-/ ]{4,24}\b
    - id: Pattern_au_top500_337_provider_identifier_records_label_context
      pattern: (?i)\\b(?:provider\\s+identifier\\s+records|provider|top500)\\b
  keywords:
    - id: Evidence_provider_identifier_records
      groups:
        - match_style: word
          terms:
            - provider identifier
            - provider number
            - practitioner number
            - AHPRA
            - provider registration
            - health
            - biomedical
            - Medicare provider
            - prescriber number
            - healthcare provider
            - provider ID
            - registration number
    - id: Keyword_au_top500_337_provider_identifier_records_domain_context
      groups:
        - match_style: word
          terms:
            - provider identifier records
            - provider
            - top500
            - field
            - identifier
            - reference
    - id: Evidence_generic_data_labels
      groups:
        - match_style: word
          terms:
            - ID
            - identifier
            - number
            - reference
            - code
            - index
            - serial
            - account
            - file number
            - case number
            - record number
            - ref
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
