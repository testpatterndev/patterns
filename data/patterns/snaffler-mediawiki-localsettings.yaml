schema: testpattern/v1
name: MediaWiki LocalSettings Credentials
slug: snaffler-mediawiki-localsettings
version: 1.1.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects MediaWiki LocalSettings.php files containing database passwords
  ($wgDBpassword), secret keys ($wgSecretKey), and upgrade keys ($wgUpgradeKey).
  These are high-value secrets that grant database and administrative access to a
  MediaWiki installation. Mirrors Snaffler rule KeepPhpByName.
operation: >-
  Three distinct secrets are detected: (1) $wgDBpassword assignment — database
  password for the MediaWiki DB user; (2) $wgSecretKey — 64-char hex HMAC secret
  used to sign cookies and tokens; (3) $wgUpgradeKey — short key protecting the
  database upgrade endpoint. All use PHP string assignment syntax (= 'value' or
  = "value"). Gated with MediaWiki-specific evidence keywords.
pattern: '\$wgDBpassword\s*=\s*[''"][^''"]{1,}'
confidence: high
confidence_justification: >-
  High confidence: $wgDBpassword, $wgSecretKey, and $wgUpgradeKey are specific
  MediaWiki PHP variables with no plausible false-positive context outside
  LocalSettings.php. The hex-constraint on $wgSecretKey (a-f0-9, 16+ chars)
  further pins the pattern to real secrets rather than documentation examples.
jurisdictions:
  - global
regulations:
  - GDPR
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
  - application-secrets
corroborative_evidence:
  keywords:
    - wgDBserver
    - wgDBname
    - wgDBuser
    - MediaWiki
    - wgSecretKey
    - LocalSettings
    - wgSiteName
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: "$wgDBpassword = 'P@ssw0rd_db_secret';"
      description: wgDBpassword with single-quoted value
    - value: '$wgDBpassword = "my_database_pass_2024";'
      description: wgDBpassword with double-quoted value
    - value: "$wgSecretKey = 'a3f1b2c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2';"
      description: wgSecretKey with 64-char hex value
    - value: "$wgUpgradeKey = 'a3f1b2c4d5e6f7';"
      description: wgUpgradeKey with short key value
    - value: "$wgDBserver = 'localhost';\n$wgDBname = 'my_wiki';\n$wgDBpassword = 'WikiP@ss99';"
      description: Full LocalSettings block with DB credentials
  should_not_match:
    - value: "echo 'Remember to set wgDBpassword in LocalSettings.php';"
      description: String referencing wgDBpassword as text with no PHP assignment operator
    - value: "$dbPassword = 'admin123';"
      description: Generic PHP variable named dbPassword — not a wg-prefixed MediaWiki var
    - value: "wgDBpassword is the configuration key for the database password"
      description: Documentation prose mentioning the variable name without any assignment
false_positives:
  - description: >-
      MediaWiki documentation and installer scripts that show example
      LocalSettings.php with placeholder values.
    mitigation: Require non-empty, non-placeholder values (min 1 char after quote
      is already enforced); gate at 75+ with wgDBserver/wgDBname evidence.
  - description: >-
      Commented-out or backup LocalSettings.php files left in web roots
      that contain credentials for decommissioned installations.
    mitigation: Still a true positive — decommissioned credentials may still be
      reused or indicate poor secret hygiene. Treat as finding.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Regex_snaffler_wgDBpassword
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_wgDBpassword
      matches:
        - ref: Keyword_snaffler_mediawiki_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_wgSecretKey
      matches:
        - ref: Keyword_snaffler_mediawiki_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_wgUpgradeKey
      matches:
        - ref: Keyword_snaffler_mediawiki_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_wgDBpassword
      matches:
        - ref: Keyword_snaffler_mediawiki_db_context
        - ref: Keyword_snaffler_mediawiki_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_wgDBpassword
      pattern: '\$wgDBpassword\s*=\s*[''"][^''"]{1,}'
    - id: Regex_snaffler_wgSecretKey
      pattern: '\$wgSecretKey\s*=\s*[''"][a-f0-9]{16,}'
    - id: Regex_snaffler_wgUpgradeKey
      pattern: '\$wgUpgradeKey\s*=\s*[''"][^''"]{6,}'
  keywords:
    - id: Keyword_snaffler_mediawiki_context
      groups:
        - match_style: word
          terms:
            - MediaWiki
            - LocalSettings
            - wgSiteName
            - wgSecretKey
            - wgUpgradeKey
    - id: Keyword_snaffler_mediawiki_db_context
      groups:
        - match_style: word
          terms:
            - wgDBserver
            - wgDBname
            - wgDBuser
            - wgDBtype
risk_rating: 8
risk_description: >-
  This high-confidence detector identifies MediaWiki LocalSettings.php assignments for the database password, HMAC secret key, or upgrade key. A live database password can expose wiki data, a secret key can support cookie or token forgery, and an upgrade key can permit unauthorized maintenance actions. Harm normally falls on one MediaWiki installation and its users, with database reachability, application privileges, and key rotation containing scale. Risk 8 and SENSITIVE capture serious site and data compromise, while shared master secrets spanning many high-value installations would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
