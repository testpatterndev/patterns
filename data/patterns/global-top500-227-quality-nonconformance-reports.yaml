schema: testpattern/v1
name: Quality nonconformance reports
slug: global-top500-227-quality-nonconformance-reports
version: 1.5.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to quality nonconformance reports in Australian contexts. Higher confidence identifies nonconformance records (NCR/NC/DEV identifiers with affected-item,
  observed-condition, disposition, owner, or closure detail) or the explicit nonconformance-report label; standalone corrective/preventive-action and quality-audit vocabulary remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:quality\s+nonconformance\s+reports|nonconformance\s+report|quality\s+deviation|corrective\s+action|preventive\s+action|quality\s+audit|quality\s+deficiency)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - quality nonconformance reports
    - quality
    - nonconformance
    - reports
    - product
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: quality nonconformance reports
      description: Primary topic phrase match
    - value: nonconformance report
      description: Case-insensitive topic phrase match
    - value: quality deviation
      description: Alternative topic phrase match
    - value: corrective action
      description: Additional topic phrase match
    - value: 'NCR-2048; affected item LOT-17; observed seal width 1.4 mm vs 2.0 mm; disposition: rework; owner: QA.'
      description: NCR identifier with populated finding/disposition fields (enforces at 75 via Pattern_ncr_record)
    - value: nonconformance report
      description: Explicit report label is a strong concept anchor and remains enforceable at 75 by design
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: Corrective action awareness is on the quality audit agenda.
      description: CAPA vocabulary without a nonconformance record — discovery only, must not enforce
    - value: The student corrected an action in the play after review.
      description: Ordinary prose with no quality-domain phrase must not match
    - value: 'Sample NCR-000 template; affected item: placeholder.'
      description: Sample/template/placeholder identifies an empty form — suppressed from enforcement
false_positives:
  - description: Common words and phrases related to quality nonconformance reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_ncr_record
      matches:
        - ref: Evidence_quality_nonconformance_reports
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_ncr_record
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      discovery_only: true
      id_match: Pattern_nonconformance_report_label
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_quality_nonconformance_reports
      matches:
        - ref: Evidence_quality_nonconformance_reports
  regexes:
    - id: Pattern_quality_nonconformance_reports
      pattern: (?is)\b(?:quality\s+nonconformance\s+reports|nonconformance\s+report|quality\s+deviation|corrective\s+action|preventive\s+action|quality\s+audit|quality\s+deficiency)\b
    - id: Pattern_au_top500_227_quality_nonconformance_reports_label_context
      pattern: (?i)\b(?:quality\s+nonconformance\s+reports)\b
    - id: Pattern_nonconformance_report_label
      pattern: (?i)\bnon[\s-]?conformance\s+reports?\b
    - id: Pattern_ncr_record
      pattern: >-
        (?is)\b(?:NCR|NC|DEV)[-_ ]?\d{3,10}\b[\s\S]{0,220}\b(?:affected\s+item|deviation|observed|requirement|disposition|owner|closure\s+status|corrective\s+action)\b
  keywords:
    - id: Evidence_quality_nonconformance_reports
      groups:
        - match_style: word
          terms:
            - quality nonconformance reports
            - nonconformance report
            - text: NCR
              case_sensitive: true
            - quality deviation
            - corrective action
            - preventive action
            - CAPA
            - quality audit
            - non-compliance
            - quality deficiency
      strength: specific
    - id: Keyword_au_top500_227_quality_nonconformance_reports_domain_context
      groups:
        - match_style: word
          terms:
            - quality nonconformance reports
            - quality
            - nonconformance
            - reports
      strength: domain
risk_description: >-
  The regex detects nonconformance reports, quality deviations, and corrective-action language with six quality-context indicators, targeting a defect record rather than general discussion of quality. A genuine report can disclose failed specifications, affected product, process weakness, disposition, supplier issues, and corrective work that competitors or customers could use. The impact is moderate for the manufacturer and a bounded batch or product, while templates, training, and policy material can also match these common terms. Risk 7 and SENSITIVE InfoTech fit the internal defect record; risk 8 or PROTECTED requires severe safety exposure, systemic nonconformance, fraud, or significant market and regulatory damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
