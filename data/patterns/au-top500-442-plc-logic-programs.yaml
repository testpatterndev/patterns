changelog:
  - version: 1.6.0
    date: '2026-07-04'
    description: 'CI profile hardening: require substantive rung, contact, coil, timer, function-block, variable, or I/O structure at 75 and deployable controller, rack, slot, production, or I/O context at 85; reject standards and training examples.'
  - version: 1.5.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1028 without changing detector or package metadata.'
  - version: 1.5.0
    date: '2026-07-12'
    description: 'Baseline burn-down A2: tier@75''s Evidence_plc_logic_programs ref is self-corroborating — its term list is the same phrase set as the id_match regex''s own alternation, so should_not_match: "plc function block" satisfied both the primary match and the tier''s evidence with the single phrase "function block" (the case-sensitive "PLC" term does not match the lowercase fragment). Added min_count: 2 + unique_results: true to tier@75 (mirroring tier@85) so one incidental phrase occurrence no longer meets the evidence bar. Also marked the bare tier@65 discovery_only (same no-evidence shape) so it surfaces in discovery inventory rather than gating should_not_match.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
