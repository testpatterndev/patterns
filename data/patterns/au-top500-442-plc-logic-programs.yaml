schema: testpattern/v1
name: PLC logic programs
slug: au-top500-442-plc-logic-programs
version: 1.6.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive programmable-logic-controller programs and logic records. Topic phrases are
  retained for discovery; enforcement requires program structure such as rungs, contacts, coils,
  timers, function blocks, variables, or I/O addresses, and high confidence also requires a controller,
  rack, slot, production asset, or deployable I/O reference.
operation: >-
  Pattern_plc_logic_programs recognises PLC-program, ladder-logic, IEC 61131, rung-logic, and
  controller-language topics. The topic alone is discovery-only at 65. Concrete program structure
  raises it to 75; program structure plus deployable controller, I/O, rack, slot, or production-asset
  context reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:programmable\s+logic\s+controller|PLC\s+logic\s+program|ladder\s+logic|IEC\s*61131|rung\s+logic|(?:PLC|controller)[^.\n]{0,30}(?:structured\s+text|function\s+block|control\s+program))\b
confidence: medium
confidence_justification: >-
  Medium confidence requires PLC program structure rather than a controller-product mention. High
  confidence adds deployable hardware, I/O, or production context, reducing matches on manuals and
  programming lessons.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - security
corroborative_evidence:
  keywords:
    - plc logic programs
    - plc
    - logic
    - programs
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - industry-critical-infrastructure
test_cases:
  should_match:
    - value: PLC logic program
      description: Low-tier probe - controller-program topic without code structure
    - value: 'PLC logic program in ladder logic: rung 12 uses a contact, output coil, and TON timer'
      description: Medium-tier probe - substantive program structure without deployment context
    - value: 'PLC logic program for S7-1500 controller rack 1 slot 2: rung 12 drives output coil Q0.0 for the production line safety interlock'
      description: High-tier probe - program structure with controller, rack, I/O, and production context
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: plc function block
      description: Generic word pair from old broad template should not match
    - value: 'The IEC 61131 standard defines several PLC programming languages.'
      description: Public standard discussion without controller program structure
    - value: 'Training example: PLC logic program rung 12 output coil Q0.0 for S7-1500 rack 1'
      description: Explicit training content must not enforce
false_positives:
  - description: PLC standards, vendor manuals, and programming courses discuss ladder logic, function blocks, contacts, coils, and timers without exposing a deployable program.
    mitigation: Keep topic-only matches discovery-only and require concrete program structure for enforcement.
  - description: Training labs can contain realistic rungs, I/O addresses, controller models, rack locations, and safety-interlock examples.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_plc_logic_programs
      matches:
        - ref: Evidence_plc_code_structure
        - ref: Evidence_plc_deployment_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_plc_logic_programs
      matches:
        - ref: Evidence_plc_code_structure
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_plc_logic_programs
  regexes:
    - id: Pattern_plc_logic_programs
      pattern: >-
        (?is)\b(?:programmable\s+logic\s+controller|PLC\s+logic\s+program|ladder\s+logic|IEC\s*61131|rung\s+logic|(?:PLC|controller)[^.\n]{0,30}(?:structured\s+text|function\s+block|control\s+program))\b
  keywords:
    - id: Evidence_plc_code_structure
      groups:
        - match_style: word
          terms:
            - rung
            - contact
            - output coil
            - timer
            - function block diagram
            - variable declaration
            - program organization unit
            - I/O address
      strength: domain
    - id: Evidence_plc_deployment_context
      groups:
        - match_style: word
          terms:
            - controller model
            - rack
            - slot
            - download to controller
            - production line
            - safety interlock
            - text: S7-1500
              case_sensitive: true
            - text: ControlLogix
              case_sensitive: true
            - text: Q0.0
              case_sensitive: true
            - text: I0.0
              case_sensitive: true
      strength: specific
risk_description: >-
  The concept regex recognises programmable logic controller, ladder logic, structured text, and function block language with seven nearby infrastructure terms. A genuine PLC program can encode process sequencing, interlocks, limits, and equipment control, allowing sabotage, unsafe operation, or production loss if altered or studied. Training examples, vendor manuals, and generic programming discussion can also match because the detector does not parse or confirm executable controller code. Risk 8 SENSITIVE fits restricted control logic; PROTECTED requires deployable logic for a critical service, bypassed safety functions, system-scale compromise, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
