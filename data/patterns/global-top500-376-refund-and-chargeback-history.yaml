schema: testpattern/v1
name: Refund and chargeback history
slug: global-top500-376-refund-and-chargeback-history
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to refund and chargeback history in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:refund\s+and\s+chargeback\s+history|chargeback\s+dispute|refund\s+request|dispute\s+resolution|reversal\s+transaction|credit\s+memo|chargeback\s+reason\s+code|refund\s+processing|payment\s+reversal|dispute\s+case|merchant\s+chargeback|refund\s+authorization)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - refund and chargeback history
    - refund
    - chargeback
    - history
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: refund and chargeback history
      description: Primary topic phrase match
    - value: chargeback dispute
      description: Case-insensitive topic phrase match
    - value: refund request
      description: Alternative topic phrase match
    - value: dispute resolution
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to refund and chargeback history appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_refund_chargeback
      matches:
        - ref: Pattern_global_top500_376_refund_and_chargeback_history_label_context
        - ref: Keyword_global_top500_376_refund_and_chargeback_history_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_376_refund_and_chargeback_history_noise_exclusion
    - confidence_level: 75
      id_match: Regex_refund_chargeback
      matches:
        - ref: Keyword_refund_chargeback
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_376_refund_and_chargeback_history_noise_exclusion
    - confidence_level: 65
      id_match: Regex_refund_chargeback
      matches:
        - ref: Keyword_refund_chargeback
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_376_refund_and_chargeback_history_noise_exclusion
  regexes:
    - id: Regex_refund_chargeback
      pattern: (?is)\b(?:refund\s+and\s+chargeback\s+history|chargeback\s+dispute|refund\s+request|dispute\s+resolution|reversal\s+transaction|credit\s+memo|chargeback\s+reason\s+code|refund\s+processing|payment\s+reversal|dispute\s+case|merchant\s+chargeback|refund\s+authorization)\b
    - id: Pattern_global_top500_376_refund_and_chargeback_history_label_context
      pattern: (?i)\\b(?:refund\\s+and\\s+chargeback\\s+history|refund|chargeback|history|top500)\\b
  keywords:
    - id: Keyword_refund_chargeback
      groups:
        - match_style: word
          terms:
            - refund and chargeback history
            - chargeback dispute
            - refund request
            - dispute resolution
            - reversal transaction
            - credit memo
            - chargeback reason code
            - refund processing
            - payment reversal
            - dispute case
            - merchant chargeback
            - refund authorization
    - id: Keyword_global_top500_376_refund_and_chargeback_history_domain_context
      groups:
        - match_style: word
          terms:
            - refund and chargeback history
            - refund
            - chargeback
            - history
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_376_refund_and_chargeback_history_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
