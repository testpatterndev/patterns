schema: testpattern/v1
name: QLD Health Clinical Handover
slug: au-qld-health-clinical-handover
version: 1.3.2
type: keyword_list
pattern_class: concept
description: Detects QLD Health clinical handover documents containing patient status, medications, and treatment plans.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
  - government
test_cases:
  should_match:
    - value: Clinical handover form
      description: Exact 65 discovery probe with a handover document phrase and no patient-care context
    - value: 'Clinical handover form: medications and observations'
      description: Exact 75 probe with patient-care evidence
    - value: 'Queensland Health clinical handover form: patient status and medications'
      description: Exact 85 probe with patient-care and QLD Health context
    - value: 'Clinical handover ISBAR: patient status and current medications'
      description: ISBAR clinical handover with current patient status
    - value: Nursing handover sheet with treatment plan and clinical notes
      description: Test match 2
    - value: QLD Health bedside handover with shift observations and patient handover
      description: Test match 3
  should_not_match:
    - value: Project handover to new team lead
      description: Non-match 1
    - value: Property handover documentation
      description: Non-match 2
    - value: Patient transfer form workshop agenda
      description: Educational transfer-form phrase must remain discovery-only
false_positives:
  - description: Generic handover in non-clinical contexts.
    mitigation: Require clinical or patient keywords alongside handover.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The keyword classifier identifies Queensland Health handovers containing ISBAR language, patient status, current medicines, observations, clinical notes, and treatment plans rather than a generic project handover. A genuine handover consolidates current condition, immediate risks, therapies, and care responsibilities, so disclosure can expose intimate health facts, enable impersonation, or disrupt safe continuity of care. The normal unit is one patient's shift or transfer record, creating serious privacy and operational harm without assuming a ward-wide census. Risk 8 and SENSITIVE are appropriate; PROTECTED would require a bulk handover repository, critical incident coordination, or compromise that creates significant patient-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_clinical_handover
          - Pattern_patient_transfer
      matches:
        - ref: Evidence_patient_care_context
        - ref: Evidence_qld_health_forms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_clinical_handover
          - Pattern_patient_transfer
      matches:
        - ref: Evidence_patient_care_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_clinical_handover
          - Pattern_patient_transfer
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_clinical_handover
      pattern: (?i)\b(?:(?:clinical|nursing|bedside|patient|shift)\s+handover(?:\s+(?:checklist|form|sheet|ISBAR))?|patient\s+transfer\s+(?:documentation|form))\b
    - id: Pattern_patient_transfer
      pattern: (?i)\b(?:inter[\s-]?hospital\s+transfer|patient\s+transfer\s+(?:request|application))\b
  keywords:
    - id: Evidence_clinical_handover
      groups:
        - match_style: word
          terms:
            - clinical handover
            - handover checklist
            - patient transfer
            - transfer of responsibility
            - shift handover
            - inter-hospital transfer
            - discharge
            - admission
      strength: specific
    - id: Evidence_qld_health_forms
      groups:
        - match_style: word
          terms:
            - Queensland Health
            - Hospital and Health Service
            - text: HHS
              case_sensitive: true
            - health.qld.gov.au
            - QH-IMP
            - Pathology Queensland
            - Clinical Excellence Queensland
      strength: specific
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
    - id: Evidence_patient_care_context
      groups:
        - match_style: word
          terms:
            - patient status
            - medications
            - allergies
            - observations
            - treatment plan
            - pending results
            - care plan
            - clinical notes
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.3.2
    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: broaden the primary to genuine clinical handover forms, keep phrase-only matches at 65 discovery, require patient-care details at 75 and QLD Health provenance at 85, with exact-tier and workshop probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 578 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - clinical handover
  - ISBAR
  - patient handover
  - nursing handover
  - shift handover
  - patient status
  - current medications
  - treatment plan
  - observations
  - clinical notes
  - handover sheet
  - bedside handover
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
