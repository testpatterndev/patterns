schema: testpattern/v1
name: Standard contractual clause addenda
slug: global-top500-467-standard-contractual-clause-addenda
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to standard contractual clause addenda in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:standard\s+contractual\s+clauses|SCC\s+addendum|contractual\s+clause|data\s+processing\s+agreement|transfer\s+safeguard|data\s+exporter|data\s+importer|supplementary\s+measures|privacy\s+compliance|cross[\s-]+border\s+transfer|binding\s+obligations)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - standard contractual clause addenda
    - standard
    - contractual
    - clause
    - addenda
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: standard contractual clauses
      description: Primary topic phrase match
    - value: scc addendum
      description: Case-insensitive topic phrase match
    - value: contractual clause
      description: Alternative topic phrase match
    - value: data processing agreement
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to standard contractual clause addenda appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_scc_addenda
      matches:
        - ref: Pattern_global_top500_467_standard_contractual_clause_addenda_label_context
        - ref: Keyword_global_top500_467_standard_contractual_clause_addenda_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_scc_addenda
      matches:
        - ref: Keyword_scc_addenda
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_scc_addenda
      matches:
        - ref: Keyword_scc_addenda
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_scc_addenda
      pattern: >-
        (?is)\b(?:standard\s+contractual\s+clauses|SCC\s+addendum|contractual\s+clause|data\s+processing\s+agreement|transfer\s+safeguard|data\s+exporter|data\s+importer|supplementary\s+measures|privacy\s+compliance|cross[\s-]+border\s+transfer|binding\s+obligations)\b
    - id: Pattern_global_top500_467_standard_contractual_clause_addenda_label_context
      pattern: (?i)\\b(?:standard\\s+contractual\\s+clause\\s+addenda|standard|contractual|clause|addenda|top500)\\b
  keywords:
    - id: Keyword_scc_addenda
      groups:
        - match_style: word
          terms:
            - standard contractual clauses
            - SCC addendum
            - contractual clause
            - data processing agreement
            - transfer safeguard
            - data exporter
            - data importer
            - sub-processor
            - supplementary measures
            - privacy compliance
            - cross-border transfer
            - binding obligations
    - id: Keyword_global_top500_467_standard_contractual_clause_addenda_domain_context
      groups:
        - match_style: word
          terms:
            - standard contractual clause addenda
            - standard
            - contractual
            - clause
            - addenda
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
