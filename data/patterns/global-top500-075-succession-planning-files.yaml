schema: testpattern/v1
name: Succession planning files
slug: global-top500-075-succession-planning-files
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to succession planning files in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:succession\s+planning|succession\s+candidate|talent\s+pipeline|leadership\s+pipeline|key\s+person\s+risk|successor\s+identified|high\s+potential|talent\s+review|bench\s+strength|readiness\s+assessment|critical\s+role)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - succession planning files
    - succession
    - planning
    - files
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: succession planning
      description: Primary topic phrase match
    - value: succession candidate
      description: Case-insensitive topic phrase match
    - value: talent pipeline
      description: Alternative topic phrase match
    - value: leadership pipeline
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to succession planning files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_succession_planning
      matches:
        - ref: Pattern_global_top500_075_succession_planning_files_label_context
        - ref: Keyword_global_top500_075_succession_planning_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_succession_planning
      matches:
        - ref: Keyword_succession_planning
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_succession_planning
      pattern: >-
        (?is)\b(?:succession\s+planning|succession\s+candidate|talent\s+pipeline|leadership\s+pipeline|key\s+person\s+risk|successor\s+identified|high\s+potential|talent\s+review|bench\s+strength|readiness\s+assessment|critical\s+role)\b
    - id: Pattern_global_top500_075_succession_planning_files_label_context
      pattern: (?i)\b(?:succession\s+planning\s+files)\b
  keywords:
    - id: Keyword_succession_planning
      groups:
        - match_style: word
          terms:
            - succession planning
            - succession candidate
            - talent pipeline
            - leadership pipeline
            - key person risk
            - successor identified
            - high potential
            - talent review
            - bench strength
            - readiness assessment
            - critical role
      strength: specific
    - id: Keyword_global_top500_075_succession_planning_files_domain_context
      groups:
        - match_style: word
          terms:
            - succession planning files
            - succession
            - planning
            - files
      strength: domain
risk_description: >-
  This concept detector looks for succession-planning, succession-candidate, talent-pipeline, and leadership-pipeline language intended to identify workforce planning files. A substantive file can reveal who is favoured or excluded for future roles, readiness judgements, retention risks, and leadership dependencies, harming employees and disrupting organisational planning. Generic talent-management guidance can match, but the normal unit is a confidential candidate comparison or pipeline record rather than a public organisation chart. Risk 8 SENSITIVE reflects serious contained employment and strategic harm; PROTECTED would require Cabinet or critical leadership succession, national-security roles, market-moving executive plans, or a bulk compromise causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
