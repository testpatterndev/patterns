schema: testpattern/v1
name: Strategic Plan/Roadmap
slug: global-strategic-plan-roadmap
version: 1.4.1
type: keyword_list
pattern_class: concept
description: Detects strategic plans, product roadmaps, and long-term business planning documents.
operation: >-
  Keyword-based detection matching strategic plan, roadmap, go-to-market, and business case patterns. Corroborative
  evidence: 13 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - intellectual-property
  - business
test_cases:
  should_match:
    - value: 'Strategic plan 2026-2029: go-to-market strategy and roadmap'
      description: Test match 1
    - value: Product roadmap with strategic initiative priorities for implementation plan
      description: Test match 2
    - value: Business case and project charter for five-year plan
      description: Test match 3
  should_not_match:
    - value: A strategic location near the highway
      description: Non-match 1
    - value: Plan your holiday itinerary
      description: Non-match 2
false_positives:
  - description: Generic use of strategic or plan in non-business contexts.
    mitigation: Require business planning keywords like roadmap, GTM, or implementation plan.
exports:
  - yaml
scope: narrow
risk_rating: 5
risk_description: >-
  This TestPattern keyword concept detects strategic plan, roadmap, go-to-market, business-case, project-charter, and long-term implementation language. Public corporate or agency plans, routine project documents, and generic product roadmaps can match without revealing a confidential decision or competitive commitment. A detailed unpublished roadmap may be valuable, but the detector alone does not establish material priorities, investment, dependencies, release dates, or negotiation positions. Risk 5 and OFFICIAL are proportionate; SENSITIVE would require those actionable non-public strategic details in a current plan.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_strategic_plan
      matches:
        - ref: Keyword_strategy
        - ref: Keyword_confidential
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_roadmap
      matches:
        - ref: Keyword_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_business_case
      matches:
        - ref: Keyword_planning
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_strategic_plan
      pattern: (?i)\b(?:strategic\s+(?:plan|planning|initiative)|(?:3|5|three|five)[\s\-]?year\s+plan)\b
    - id: Regex_roadmap
      pattern: (?i)\b(?:(?:product|technical|engineering)\s+roadmap|roadmap\s+document)\b
    - id: Regex_business_case
      pattern: (?i)\b(?:business\s+case|case\s+for\s+change|project\s+(?:initiation|charter))\b
  keywords:
    - id: Keyword_strategy
      groups:
        - match_style: word
          terms:
            - strategy
            - strategic direction
            - strategic priorities
            - strategic objectives
            - strategic plan
            - strategic initiative
            - roadmap
            - go-to-market
            - text: GTM
              case_sensitive: true
      strength: domain
    - id: Keyword_confidential
      groups:
        - match_style: word
          terms:
            - confidential
            - restricted
            - internal only
            - not for distribution
            - limited distribution
            - EMBARGOED
            - DRAFT - NOT FOR CIRCULATION
            - FOR AUTHORIZED RECIPIENTS ONLY
            - FOR AUTHORISED RECIPIENTS ONLY
            - DO NOT DISTRIBUTE
            - DO NOT FORWARD
      strength: specific
    - id: Keyword_planning
      groups:
        - match_style: word
          terms:
            - planning
            - business case
            - project initiation
            - project charter
            - risk register
            - implementation plan
      strength: specific
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 600 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
author: testpattern-community
license: MIT
keywords:
  - strategy
  - strategic direction
  - strategic priorities
  - strategic objectives
  - strategic plan
  - strategic initiative
  - roadmap
  - go-to-market
  - GTM
  - business case
  - project initiation
  - project charter
  - implementation plan
  - three-year plan
  - five-year plan
