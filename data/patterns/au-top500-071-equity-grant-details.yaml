schema: testpattern/v1
name: Equity grant details
slug: au-top500-071-equity-grant-details
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to equity grant details in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:equity\s+grant|share\s+options|stock\s+options|employee\s+shares|vesting\s+schedule|equity\s+plan|share\s+scheme|restricted\s+stock|option\s+grant|employee\s+share\s+scheme|equity\s+award)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - equity grant details
    - equity
    - grant
    - details
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: equity grant
      description: Primary topic phrase match
    - value: share options
      description: Case-insensitive topic phrase match
    - value: stock options
      description: Alternative topic phrase match
    - value: employee shares
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to equity grant details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 90
      id_match: Pattern_equity_grant
      matches:
        - ref: Pattern_au_top500_071_equity_grant_details_label_context
        - ref: Keyword_au_top500_071_equity_grant_details_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_071_equity_grant_details_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_equity_grant
      matches:
        - ref: Evidence_equity_grant
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_071_equity_grant_details_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_equity_grant
      matches:
        - ref: Evidence_equity_grant
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_071_equity_grant_details_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_equity_grant
      matches:
        - ref: Evidence_equity_grant
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_071_equity_grant_details_noise_exclusion
  regexes:
    - id: Pattern_equity_grant
      pattern: (?is)\b(?:equity\s+grant|share\s+options|stock\s+options|employee\s+shares|vesting\s+schedule|equity\s+plan|share\s+scheme|restricted\s+stock|option\s+grant|employee\s+share\s+scheme|equity\s+award)\b
    - id: Pattern_au_top500_071_equity_grant_details_label_context
      pattern: (?i)\\b(?:equity\\s+grant\\s+details|equity|grant|top500)\\b
  keywords:
    - id: Evidence_equity_grant
      groups:
        - match_style: word
          terms:
            - equity grant
            - share options
            - stock options
            - employee shares
            - vesting schedule
            - equity plan
            - share scheme
            - RSU
            - restricted stock
            - option grant
            - employee share scheme
            - equity award
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_071_equity_grant_details_domain_context
      groups:
        - match_style: word
          terms:
            - equity grant details
            - equity
            - grant
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_071_equity_grant_details_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
