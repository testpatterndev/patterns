keywords:
  - ignore previous instructions
  - ignore all previous instructions
  - disregard the system prompt
  - forget your instructions
  - you are now
  - new instructions
  - override your rules
  - override your guidelines
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Downgraded weak high-confidence tier to 65 because independent specific/domain evidence was insufficient.'
      - 'Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.'
      - 'Collapsed 3 duplicate 65-confidence tier(s) into the strictest canonical tier.'
      - 'Aligned recommended_confidence to 65.'
