schema: testpattern/v1
name: Voiceprints
slug: global-top500-011-voiceprints
version: 1.3.2
type: regex
pattern_class: concept
status: deprecated
deprecation_reason: 'needs-EDM/ML — biometric content (images, scans, audio) is not detectable by text regex; the phrase list only detected discussion of biometrics, a role covered by au-biometric-data-reference'
engine: boost_regex
description: >-
  Identifies documents containing references to voiceprints in international contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 4 keywords within 300 characters. Keyword
  lists: biometric-voice-iris. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:voice\s+recognition|voice\s+biometric|voice\s+template|speaker\s+recognition|voice\s+sample|voice\s+authentication|vocal\s+pattern|speech\s+recognition|voice\s+enrollment|voice\s+signature)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - voiceprints
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - biometric-voice-iris
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: voice recognition
      description: Primary topic phrase match
    - value: voice biometric
      description: Case-insensitive topic phrase match
    - value: voice template
      description: Alternative topic phrase match
    - value: speaker recognition
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to voiceprints appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_voiceprints
      matches:
        - ref: Pattern_global_top500_011_voiceprints_label_context
        - ref: Keyword_global_top500_011_voiceprints_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_voiceprints
      matches:
        - ref: Keyword_voiceprints
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_voiceprints
      pattern: >-
        (?is)\b(?:voice\s+recognition|voice\s+biometric|voice\s+template|speaker\s+recognition|voice\s+sample|voice\s+authentication|vocal\s+pattern|speech\s+recognition|voice\s+enrollment|voice\s+signature)\b
    - id: Pattern_global_top500_011_voiceprints_label_context
      pattern: (?i)\b(?:voiceprints)\b
  keywords:
    - id: Keyword_voiceprints
      groups:
        - match_style: word
          terms:
            - voiceprints
            - voice recognition
            - voice biometric
            - voice template
            - speaker recognition
            - voice sample
            - voice authentication
            - vocal pattern
            - speech recognition
            - voice enrollment
            - voice signature
      strength: specific
    - id: Keyword_global_top500_011_voiceprints_domain_context
      groups:
        - match_style: word
          terms:
            - voiceprints
      strength: domain
risk_description: >-
  The deprecated low-confidence concept regex finds voice recognition, biometric, template, sample, authentication, enrolment, speaker-recognition, and voice-signature terminology with four contextual terms. A genuine voiceprint or enrolment sample can support speaker tracking, synthesis-assisted impersonation, or attacks against voice-authentication controls. An enrolled voiceprint supports authentication and cross-record identity linkage; disclosure permits replay, model training or targeted synthesis against the subject. The significant-damage threshold is met for the substantive Voiceprints artifact, making risk 9 and PROTECTED Personal-Privacy appropriate after corroboration.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
