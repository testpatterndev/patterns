schema: testpattern/v1
name: Emergency contact details
slug: global-top500-046-emergency-contact-details
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to emergency contact details in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:emergency\s+contact\s+details|emergency\s+contact|next\s+of\s+kin|emergency\s+number|in\s+case\s+of\s+emergency|ICE\s+contact|emergency\s+phone|emergency\s+name|emergency\s+relationship|emergency\s+notification|contact\s+person|emergency\s+responder)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - emergency contact details
    - emergency
    - contact
    - details
    - location
    - data
  proximity: 300
test_cases:
  should_match:
    - value: emergency contact details
      description: Primary topic phrase match
    - value: emergency contact
      description: Case-insensitive topic phrase match
    - value: next of kin
      description: Alternative topic phrase match
    - value: emergency number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to emergency contact details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_emergency_contact_details
      matches:
        - ref: Pattern_global_top500_046_emergency_contact_details_label_context
        - ref: Keyword_global_top500_046_emergency_contact_details_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_046_emergency_contact_details_noise_exclusion
    - confidence_level: 75
      id_match: Regex_emergency_contact_details
      matches:
        - ref: Keyword_emergency_contact_details
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_046_emergency_contact_details_noise_exclusion
    - confidence_level: 65
      id_match: Regex_emergency_contact_details
      matches:
        - ref: Keyword_emergency_contact_details
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_046_emergency_contact_details_noise_exclusion
  regexes:
    - id: Regex_emergency_contact_details
      pattern: (?is)\b(?:emergency\s+contact\s+details|emergency\s+contact|next\s+of\s+kin|emergency\s+number|in\s+case\s+of\s+emergency|ICE\s+contact|emergency\s+phone|emergency\s+name|emergency\s+relationship|emergency\s+notification|contact\s+person|emergency\s+responder)\b
    - id: Pattern_global_top500_046_emergency_contact_details_label_context
      pattern: (?i)\\b(?:emergency\\s+contact\\s+details|emergency|contact|top500)\\b
  keywords:
    - id: Keyword_emergency_contact_details
      groups:
        - match_style: word
          terms:
            - emergency contact details
            - emergency contact
            - next of kin
            - emergency number
            - in case of emergency
            - ICE contact
            - emergency phone
            - emergency name
            - emergency relationship
            - emergency notification
            - contact person
            - emergency responder
    - id: Keyword_global_top500_046_emergency_contact_details_domain_context
      groups:
        - match_style: word
          terms:
            - emergency contact details
            - emergency
            - contact
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_046_emergency_contact_details_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
