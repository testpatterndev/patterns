schema: testpattern/v1
name: System architecture diagrams
slug: au-top500-243-system-architecture-diagrams
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies system architecture diagrams patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:system\s+architecture|architecture\s+diagram|network\s+topology|infrastructure\s+diagram|system\s+design|component\s+diagram|data\s+flow\s+diagram|deployment\s+architecture|technical\s+architecture|solution\s+architecture)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - system architecture diagrams
    - system
    - architecture
    - diagrams
    - software
    - engineering
  proximity: 300
test_cases:
  should_match:
    - value: system architecture
      description: Primary topic phrase match
    - value: architecture diagram
      description: Case-insensitive topic phrase match
    - value: network topology
      description: Alternative topic phrase match
    - value: infrastructure diagram
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_system_architecture_diagrams
      matches:
        - ref: Evidence_system_architecture_diagrams
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_system_architecture_diagrams
      matches:
        - ref: Evidence_system_architecture_diagrams
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_system_architecture_diagrams
      matches:
        - ref: Evidence_system_architecture_diagrams
  regexes:
    - id: Pattern_system_architecture_diagrams
      pattern: (?is)\b(?:system\s+architecture|architecture\s+diagram|network\s+topology|infrastructure\s+diagram|system\s+design|component\s+diagram|data\s+flow\s+diagram|deployment\s+architecture|technical\s+architecture|solution\s+architecture)\b
  keywords:
    - id: Evidence_system_architecture_diagrams
      groups:
        - match_style: word
          terms:
            - system architecture
            - architecture diagram
            - network topology
            - infrastructure diagram
            - system design
            - component diagram
            - data flow diagram
            - deployment architecture
            - technical architecture
            - solution architecture
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
