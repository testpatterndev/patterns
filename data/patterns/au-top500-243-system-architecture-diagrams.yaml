schema: testpattern/v1
name: System architecture diagrams
slug: au-top500-243-system-architecture-diagrams
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies system architecture diagrams patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:system\s+architecture|architecture\s+diagram|network\s+topology|infrastructure\s+diagram|component\s+diagram|data\s+flow\s+diagram|deployment\s+architecture|technical\s+architecture|solution\s+architecture)\b(?=[\s\S]{0,300}?(?:\b(?:\d{1,3}\.){3}\d{1,3}(?:\/\d{1,2})?\b|\bVLAN\s?\d+\b|\b[\w-]+\.(?:vsdx|drawio|lucid|visio)\b|\bsubnet\b|\bCIDR\b))|\b[\w-]+\.(?:vsdx|drawio|lucid)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
- au
regulations:
- NDB Scheme (Cth)
- SOCI Act 2018 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - network diagram
  - architecture diagram
  - VLAN
  - subnet
  - CIDR
  - .vsdx
  - .drawio
  - network topology
  proximity: 300
test_cases:
  should_match:
  - value: attached is the network topology diagram (datacenter-core.vsdx) showing VLAN 220 and subnet 10.20.0.0/24
  - value: architecture-diagram-v3.drawio
  - value: 'system architecture overview: web tier 10.0.1.0/24, app tier VLAN 30'
  should_not_match:
  - value: system architecture
  - value: component diagram
  - value: seeking candidates with experience in system architecture and component diagram design
  - value: data flow diagram
  - value: source code config
  - value: placeholder value 12345
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_system_architecture_diagrams
    matches:
    - ref: Evidence_system_architecture_diagrams
      min_count: 2
      unique_results: true
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 75
    id_match: Pattern_system_architecture_diagrams
    matches:
    - ref: Evidence_system_architecture_diagrams
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    id_match: Pattern_system_architecture_diagrams
    matches:
    - ref: Evidence_system_architecture_diagrams
  regexes:
  - id: Pattern_system_architecture_diagrams
    pattern: >-
      (?is)\b(?:system\s+architecture|architecture\s+diagram|network\s+topology|infrastructure\s+diagram|component\s+diagram|data\s+flow\s+diagram|deployment\s+architecture|technical\s+architecture|solution\s+architecture)\b(?=[\s\S]{0,300}?(?:\b(?:\d{1,3}\.){3}\d{1,3}(?:\/\d{1,2})?\b|\bVLAN\s?\d+\b|\b[\w-]+\.(?:vsdx|drawio|lucid|visio)\b|\bsubnet\b|\bCIDR\b))|\b[\w-]+\.(?:vsdx|drawio|lucid)\b
  keywords:
  - id: Evidence_system_architecture_diagrams
    groups:
    - match_style: word
      terms:
      - network diagram
      - architecture diagram
      - VLAN
      - subnet
      - CIDR
      - .vsdx
      - .drawio
      - network topology
risk_description: >-
  The rule identifies architecture-diagram artifacts using diagram names together with network or system details such as subnets, VLANs, tiers, or topology references. A disclosed diagram can let an attacker map trust boundaries, exposed services, dependency paths, and high-value components before attempting intrusion or disruption. The system owner and connected service users face serious operational risk, but the diagram supplies reconnaissance rather than access and its scale depends on how complete and current it is. Risk 8 and SENSITIVE fit a normal internal architecture diagram, while a full critical-infrastructure topology with controls, addresses, and failover paths would raise the context toward PROTECTED.
