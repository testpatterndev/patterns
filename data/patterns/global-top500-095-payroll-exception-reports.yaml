schema: testpattern/v1
name: Payroll exception reports
slug: global-top500-095-payroll-exception-reports
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to payroll exception reports in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:payroll\s+exception\s+reports|payroll\s+exception|exception\s+report|variance\s+report|payroll\s+discrepancy|error\s+report|reconciliation\s+exception|pay\s+variance|payroll\s+audit)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - payroll exception reports
    - payroll
    - exception
    - reports
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: payroll exception reports
      description: Primary topic phrase match
    - value: payroll exception
      description: Case-insensitive topic phrase match
    - value: exception report
      description: Alternative topic phrase match
    - value: variance report
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_payroll_exception
      matches:
        - ref: Pattern_global_top500_095_payroll_exception_reports_label_context
        - ref: Keyword_global_top500_095_payroll_exception_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_payroll_exception
      matches:
        - ref: Keyword_payroll_exception
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_payroll_exception
      matches:
        - ref: Keyword_payroll_exception
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_payroll_exception
      pattern: >-
        (?is)\b(?:payroll\s+exception\s+reports|payroll\s+exception|exception\s+report|variance\s+report|payroll\s+discrepancy|error\s+report|reconciliation\s+exception|pay\s+variance|payroll\s+audit)\b
    - id: Pattern_global_top500_095_payroll_exception_reports_label_context
      pattern: (?i)\\b(?:payroll\\s+exception\\s+reports|payroll|exception|reports|top500)\\b
  keywords:
    - id: Keyword_payroll_exception
      groups:
        - match_style: word
          terms:
            - payroll exception reports
            - payroll exception
            - exception report
            - variance report
            - payroll discrepancy
            - error report
            - reconciliation exception
            - pay variance
            - overpayment
            - underpayment
            - payroll audit
    - id: Keyword_global_top500_095_payroll_exception_reports_domain_context
      groups:
        - match_style: word
          terms:
            - payroll exception reports
            - payroll
            - exception
            - reports
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.ato.gov.au/businesses-and-organisations/hiring-and-paying-your-workers/single-touch-payroll/in-detail/single-touch-payroll-employer-reporting-guidelines/rules-of-reporting-through-stp
  - https://www.fairwork.gov.au/tools-and-resources/fact-sheets/rights-and-obligations/record-keeping-pay-slips
