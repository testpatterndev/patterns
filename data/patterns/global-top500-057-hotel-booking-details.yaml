schema: testpattern/v1
name: Hotel booking details
slug: global-top500-057-hotel-booking-details
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to hotel booking details in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:hotel\s+booking|reservation\s+confirmation|check[\s-]+in\s+date|check[\s-]+out\s+date|guest\s+name|room\s+number|booking\s+reference|hotel\s+folio|accommodation\s+details|travel\s+booking)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - hotel booking details
    - hotel
    - booking
    - details
    - contact
    - location
    - data
  proximity: 300
test_cases:
  should_match:
    - value: hotel booking
      description: Primary topic phrase match
    - value: reservation confirmation
      description: Case-insensitive topic phrase match
    - value: check-in date
      description: Alternative topic phrase match
    - value: check-out date
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to hotel booking details appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_hotel_booking
      matches:
        - ref: Pattern_global_top500_057_hotel_booking_details_label_context
        - ref: Keyword_global_top500_057_hotel_booking_details_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_hotel_booking
      matches:
        - ref: Keyword_hotel_booking
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_hotel_booking
      pattern: >-
        (?is)\b(?:hotel\s+booking|reservation\s+confirmation|check[\s-]+in\s+date|check[\s-]+out\s+date|guest\s+name|room\s+number|booking\s+reference|hotel\s+folio|accommodation\s+details|travel\s+booking)\b
    - id: Pattern_global_top500_057_hotel_booking_details_label_context
      pattern: (?i)\b(?:hotel\s+booking\s+details)\b
  keywords:
    - id: Keyword_hotel_booking
      groups:
        - match_style: word
          terms:
            - hotel booking
            - reservation confirmation
            - check-in date
            - check-out date
            - guest name
            - room number
            - booking reference
            - hotel folio
            - accommodation details
            - itinerary
            - travel booking
      strength: specific
    - id: Keyword_global_top500_057_hotel_booking_details_domain_context
      groups:
        - match_style: word
          terms:
            - hotel booking details
            - hotel
            - booking
      strength: domain
risk_description: >-
  The global concept detector looks for reservation-confirmation, check-in, check-out, guest, and hotel-booking language across international records. A true booking can disclose a traveller's destination and stay window, permitting convincing cancellation fraud, room-related social engineering, or physical targeting of that guest. General accommodation policy can match, but the normal substantive record links an identifiable traveller to a specific place and time. Risk 8 SENSITIVE reflects serious but contained travel and safety harm; PROTECTED would require protected-person movements, an operational government itinerary, bulk booking intelligence, or a direct life-safety threat.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
