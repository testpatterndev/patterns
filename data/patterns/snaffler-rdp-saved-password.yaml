schema: testpattern/v1
name: RDP Saved Password (.rdp file)
slug: snaffler-rdp-saved-password
version: 1.0.0
type: regex
engine: boost_regex
pattern: password\s+51:b:[A-Za-z0-9+/=]{16,}
description: >-
  Detects DPAPI-encrypted saved passwords stored in Windows Remote Desktop
  Protocol (.rdp) configuration files. The characteristic line
  "password 51:b:<base64-blob>" contains a DPAPI ciphertext blob representing
  a saved RDP credential. These files are frequently found on file shares,
  workstations, and in source-control repositories and represent a high-severity
  finding because the blob can be decrypted on the originating machine under the
  same user context. Mirrors Snaffler rule KeepRdpPasswords.
confidence: high
confidence_justification: >-
  High confidence: the literal token "51:b:" is unique to the RDP file format's
  password storage mechanism and does not appear in other file types. The
  trailing base64 blob of at least 16 characters confirms a real credential
  rather than a truncated or template placeholder. False positive rate is
  extremely low.
jurisdictions:
  - global
regulations:
  - Computer Fraud and Abuse Act (CFAA)
  - Criminal Code Act 1995 (Cth)
  - Cybersecurity Maturity Model Certification (CMMC)
  - Network and Information Systems (NIS) Directive
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
  - security
  - configuration
corroborative_evidence:
  keywords:
    - full address:s:
    - username:s:
    - prompt for credentials
    - rdp
    - remote desktop
    - .rdp
    - password 51:b:
  proximity: 300
test_cases:
  should_match:
    - value: "full address:s:10.0.0.5\nusername:s:admin\npassword 51:b:01000000D08C9DDF0115D1118C7A00C04FC297EB01000000"
      description: Realistic .rdp file with full address, username, and DPAPI password blob
    - value: "full address:s:rdpserver.corp.local\nusername:s:CORP\\jsmith\npassword 51:b:AQAAANCMnd8BFdERjHoAwE/Cl+sBAAAA"
      description: Domain-joined RDP file with corporate server and UPN-style username
    - value: "password 51:b:AQAAANCMnd8BFdERjHoAwE/Cl+sBAAAAHXy9kQlWzUGvP2nMlQ=="
      description: Standalone password line with valid base64 DPAPI blob including padding
    - value: "screen mode id:i:2\nfull address:s:192.168.1.100\nprompt for credentials:i:0\npassword 51:b:01000000D08C9DDF0115D111AABBCCDD"
      description: Full .rdp file snippet with screen mode, address, credential prompt disabled, and saved password
    - value: "username:s:localadmin\npassword 51:b:AQAAANC+MNd8BFdERjHoABCDEFGHIJKLMNOP"
      description: Local account credential blob without domain prefix
  should_not_match:
    - value: "password 51:b:"
      description: Password line with empty blob (no base64 content) should not match
    - value: "password 51:b:short"
      description: Blob shorter than 16 characters should not match
    - value: "password=51b01000000D08C9DDF0115D1118C7A00C04FC297EB"
      description: Malformed line using equals sign instead of space and colon notation
    - value: "password 52:b:01000000D08C9DDF0115D1118C7A00C04FC297EB"
      description: Type 52 (different encoding type) should not match — only type 51 is the DPAPI blob marker
false_positives:
  - description: >-
      Documentation or tutorial files that include example .rdp configuration
      snippets with fabricated credential blobs may trigger the pattern.
    mitigation: >-
      Review surrounding file context; documentation files typically lack valid
      DPAPI blob lengths and are co-located with explanatory prose rather than
      other .rdp property lines.
  - description: >-
      Backup or archived .rdp files where the DPAPI blob is no longer
      decryptable (e.g. machine has been re-imaged) still match the structural
      pattern even though the credential cannot be recovered.
    mitigation: >-
      Flag for review regardless — the presence of a saved-password blob
      indicates credential hygiene risk even if decryption is not currently
      possible.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_rdp_saved_password
      matches:
        - ref: Keyword_rdp_file_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_rdp_saved_password
      matches:
        - ref: Keyword_rdp_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_rdp_saved_password
      matches: []
  regexes:
    - id: Regex_rdp_saved_password
      pattern: password\s+51:b:[A-Za-z0-9+/=]{16,}
  keywords:
    - id: Keyword_rdp_file_context
      groups:
        - match_style: string
          terms:
            - full address:s:
            - username:s:
            - prompt for credentials
            - password 51:b:
    - id: Keyword_rdp_domain_context
      groups:
        - match_style: word
          terms:
            - rdp
            - remote desktop
            - .rdp
            - full address
            - username
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
