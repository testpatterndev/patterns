schema: testpattern/v1
name: Browsing behavior logs
slug: global-top500-364-browsing-behavior-logs
version: 1.2.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to browsing behavior logs in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:browsing\s+behavior|browsing\s+history|page\s+views|web\s+analytics|user\s+tracking|cookie\s+data|session\s+log|website\s+activity|digital\s+footprint|behavioral\s+data|tracking\s+pixel)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - browsing behavior logs
    - browsing
    - behavior
    - logs
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: browsing behavior
      description: Primary topic phrase match
    - value: browsing history
      description: Case-insensitive topic phrase match
    - value: page views
      description: Alternative topic phrase match
    - value: web analytics
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to browsing behavior logs appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_browsing_behavior
      matches:
        - ref: Pattern_global_top500_364_browsing_behavior_logs_label_context
        - ref: Keyword_global_top500_364_browsing_behavior_logs_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_browsing_behavior
      matches:
        - ref: Keyword_browsing_behavior
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_browsing_behavior
      pattern: >-
        (?is)\b(?:browsing\s+behavior|browsing\s+history|page\s+views|web\s+analytics|user\s+tracking|cookie\s+data|session\s+log|website\s+activity|digital\s+footprint|behavioral\s+data|tracking\s+pixel)\b
    - id: Pattern_global_top500_364_browsing_behavior_logs_label_context
      pattern: (?i)\b(?:browsing\s+behavior\s+logs)\b
  keywords:
    - id: Keyword_browsing_behavior
      groups:
        - match_style: word
          terms:
            - browsing behavior
            - browsing history
            - clickstream
            - page views
            - web analytics
            - user tracking
            - cookie data
            - session log
            - website activity
            - digital footprint
            - behavioral data
            - tracking pixel
      strength: specific
    - id: Keyword_global_top500_364_browsing_behavior_logs_domain_context
      groups:
        - match_style: word
          terms:
            - browsing behavior logs
            - browsing
            - behavior
            - logs
      strength: domain
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-07-09'
