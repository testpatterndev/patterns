schema: testpattern/v1
name: Replicate API Key
slug: global-replicate-api-key
version: 1.2.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Replicate API tokens, which use a distinctive r8_ prefix followed by a fixed-length
  body of alphanumerics, underscores, and hyphens. A leaked token grants unauthorized, billed
  access to Replicate's hosted model inference API and any prompts, images, or data routed
  through it.
operation: >-
  A broad r8_ candidate is retained at 65 for discovery. The 75 tier requires the documented
  37-character [0-9A-Za-z_-] body and rejects explicit template context. The 85 tier additionally
  requires a Replicate label or endpoint nearby. Replicate documents the 40-character total length,
  and TruffleHog corroborates the body charset.
pattern: (?<![0-9A-Za-z_-])r8_[0-9A-Za-z_-]{37}(?![0-9A-Za-z_-])
confidence: high
confidence_justification: >-
  High confidence: the r8_ prefix and exact 40-character total token length are explicitly
  documented on Replicate's own security/API-tokens page, the body charset ([0-9A-Za-z_-]) is
  confirmed by TruffleHog's production detector, and Replicate is a confirmed GitHub
  secret-scanning partner. The exact format enforces at medium confidence; an explicit Replicate
  label is required for the maximum-rejection high tier.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - replicate
    - replicate.com
    - api.replicate.com
    - REPLICATE_API_TOKEN
    - api key
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: r8_ABCDEFGHIJKLMNOPQRSTUVWX
      description: Low-tier probe - plausible prefixed candidate with a noncanonical body length
    - value: r8_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijk
      description: Medium-tier probe - exact Replicate token structure without nearby vendor context
    - value: 'REPLICATE_API_TOKEN=r8_zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIh'
      description: High-tier probe - exact token with an unambiguous Replicate label
    - value: Using replicate with token r8_0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZa
      description: Replicate brand mention followed by a token value
    - value: r8_ABCDEFGHIJ_KLMNOPQRST-UVWXYZ0123456_-
      description: Token body containing underscores and hyphens (full documented charset)
  should_not_match:
    - value: r9_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijk
      description: Wrong prefix (r9_ instead of r8_)
    - value: r8_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij
      description: Body too short (36 chars, below the fixed 37-char length)
    - value: remember to rotate the replicate api token before deploying
      description: Prose mention without a token value
    - value: 'Documentation example: REPLICATE_API_TOKEN=r8_zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIh'
      description: Exact but explicitly documented example must not enforce
false_positives:
  - description: Documentation or examples showing placeholder r8_ strings.
    mitigation: Suppress explicit template/example framing; treat an exact bare token as medium and require an unambiguous Replicate label for high confidence.
  - description: The common English verb "replicate" (e.g. "replicate this dataset") appearing in text near an unrelated token or hash of similar length.
    mitigation: The brand-name keyword term is case-sensitive (Replicate, capitalised) and additional unambiguous terms (replicate.com, REPLICATE_API_TOKEN) disambiguate from the generic verb.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The high-confidence pattern identifies a Replicate API token through the distinctive r8_ prefix and exact 37-character body. A live token can authorize billed model execution and expose prompts, images, outputs, or other data submitted through the associated Replicate account or project. The affected scale is one account or workflow, with quota, project access, monitoring, and revocation limiting harm. Risk 8 and SENSITIVE reflect serious contained AI-service exposure, while a shared production token carrying protected data across many systems would raise the impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_replicate_api_key
      matches:
        - ref: Keyword_replicate_api_key
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_replicate_api_key
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_replicate_candidate
  regexes:
    - id: Regex_replicate_candidate
      pattern: (?<![0-9A-Za-z_-])r8_[0-9A-Za-z_-]{20,50}(?![0-9A-Za-z_-])
    - id: Regex_replicate_api_key
      pattern: (?<![0-9A-Za-z_-])r8_[0-9A-Za-z_-]{37}(?![0-9A-Za-z_-])
  keywords:
    - id: Keyword_replicate_api_key
      groups:
        - match_style: word
          terms:
            - text: Replicate
              case_sensitive: true
            - replicate.com
            - api.replicate.com
            - REPLICATE_API_TOKEN
            - replicate api
      strength: specific
