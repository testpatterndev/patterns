schema: testpattern/v1
name: Failover architecture details
slug: global-top500-305-failover-architecture-details
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies failover architecture details patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:failover\s+architecture|high\s+availability|load\s+balancer|cluster\s+configuration|hot\s+standby|warm\s+standby|automatic\s+failover)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - failover architecture details
    - failover
    - architecture
    - details
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: failover architecture
      description: Primary topic phrase match
    - value: high availability
      description: Case-insensitive topic phrase match
    - value: load balancer
      description: Alternative topic phrase match
    - value: cluster configuration
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_failover_architecture
      matches:
        - ref: Pattern_global_top500_305_failover_architecture_details_label_context
        - ref: Keyword_global_top500_305_failover_architecture_details_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_failover_architecture
      matches:
        - ref: Keyword_failover_architecture
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_failover_architecture
      matches:
        - ref: Keyword_failover_architecture
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_failover_architecture
      pattern: (?is)\b(?:failover\s+architecture|high\s+availability|load\s+balancer|cluster\s+configuration|hot\s+standby|warm\s+standby|automatic\s+failover)\b
    - id: Pattern_global_top500_305_failover_architecture_details_label_context
      pattern: (?i)\\b(?:failover\\s+architecture\\s+details|failover|architecture|top500)\\b
  keywords:
    - id: Keyword_failover_architecture
      groups:
        - match_style: word
          terms:
            - failover architecture
            - high availability
            - active-passive
            - active-active
            - load balancer
            - redundancy
            - cluster configuration
            - replication
            - hot standby
            - warm standby
            - automatic failover
            - split-brain
    - id: Keyword_global_top500_305_failover_architecture_details_domain_context
      groups:
        - match_style: word
          terms:
            - failover architecture details
            - failover
            - architecture
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.homeaffairs.gov.au/about-us/our-portfolios/emergency-management
