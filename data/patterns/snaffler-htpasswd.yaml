    date: '2026-07-19'
    description: 'Targeted blocker remediation: separate hash-marker discovery, complete algorithm-specific hashes bound to htpasswd, and multi-entry Apache Basic-auth files; add exact-tier and malformed, placeholder, documentation, and Unix-shadow negatives.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2051 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.0.1
    date: '2026-06-26'
    note: >-
      Added MD5 ($1$), SHA-256 ($5$), and SHA-512 ($6$) crypt prefixes alongside
      existing apr1/bcrypt/SHA1 prefixes. Snaffler fidelity fix.
