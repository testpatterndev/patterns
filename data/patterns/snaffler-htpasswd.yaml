schema: testpattern/v1
name: Apache htpasswd Hashed Credential
slug: snaffler-htpasswd
version: 1.2.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Apache htpasswd file entries containing hashed passwords in MD5 ($apr1$),
  bcrypt ($2y$, $2b$, $2a$), or SHA ({SHA}) formats. Mirrors Snaffler rule
  KeepConfigByName.
operation: >-
  Regex_snaffler_htpasswd inventories username/hash-marker candidates at 65.
  The 75 tier requires an algorithm-complete apr1, bcrypt, SHA1, or crypt hash
  plus an .htpasswd/AuthUserFile binding. The 85 tier additionally requires at
  least two distinct credential entries and an Apache Basic-auth directive,
  proving a populated authentication file rather than a shadow entry or hash sample.
risk_description: >-
  Apache htpasswd Hashed Credential detects a username paired with a recognized apr1, bcrypt, SHA, or compatible password-hash marker. The hash does not directly authenticate, but disclosure enables offline cracking and reveals valid account names, after which recovered passwords may be reused against web services. Harm is serious for affected accounts but depends on password strength, hash algorithm, and the account's privileges. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED would require privileged hashes at scale or recovery leading to significant critical-system compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: '[A-Za-z0-9_.-]{1,64}:(?:\$apr1\$|\$1\$|\$5\$|\$6\$|\$2[aby]\$|\{SHA\})[^\s:]{1,255}'
confidence: high
confidence_justification: >-
  High confidence: the combination of a username and a well-known password hash
  format marker ($apr1$, $2y$, $2b$, $2a$, {SHA}) is highly specific to htpasswd
  files. These hash prefixes are not found in other common file formats.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - htpasswd
    - AuthUserFile
    - AuthType Basic
    - Require valid-user
  proximity: 300
test_cases:
  should_match:
    - value: 'legacy:$apr1$short'
      description: Low-tier probe - recognized marker with incomplete hash structure
    - value: |-
        # /srv/www/.htpasswd
        webuser:{SHA}qUqP5cyxm6YcTAhz05Hph5gvu9M=
      description: Medium-tier probe - complete SHA1 entry bound to an htpasswd file
    - value: |-
        AuthUserFile /etc/apache2/.htpasswd
        AuthType Basic
        Require valid-user
        admin:{SHA}qUqP5cyxm6YcTAhz05Hph5gvu9M=
        deploy:$2y$10$abcdefghijklmnopqrstuuWOOj3U5X5bF5lrfH2jk8VeQ0k.YIVUC
      description: High-tier probe - Apache directives and two complete credential entries
    - value: |-
        htpasswd /srv/www/.htpasswd deploy
        deploy:$6$rounds=5000$saltsalt$abcdefghijklmnopqrstuvwxyz0123456789ABCDEF
      description: Medium-tier probe - complete SHA-512 crypt entry with htpasswd binding
  should_not_match:
    - value: "admin:plaintextpassword"
      description: No hash marker prefix, plaintext password
    - value: "user:secret123"
      description: Plaintext password, no hash format
    - value: 'admin:$2y$10$short'
      description: Malformed bcrypt entry with truncated digest
    - value: |-
        # .htpasswd PLACEHOLDER
        admin:{SHA}AAAAAAAAAAAAAAAAAAAAAAAAAAA=
      description: Placeholder hash entry must not enforce
    - value: |-
        Documentation example: AuthUserFile /etc/apache2/.htpasswd
        AuthType Basic
        admin:{SHA}qUqP5cyxm6YcTAhz05Hph5gvu9M=
        deploy:$2y$10$abcdefghijklmnopqrstuuWOOj3U5X5bF5lrfH2jk8VeQ0k.YIVUC
      description: Documentation quoting a populated htpasswd file must not enforce
    - value: 'root:$6$rounds=5000$saltsalt$abcdefghijklmnopqrstuvwxyz0123456789ABCDEF:19800:0:99999:7:::'
      description: Sibling Unix shadow entry lacks Apache htpasswd binding
false_positives:
  - description: Documentation or code examples showing htpasswd format with placeholder hashes.
    mitigation: Require proximity to Apache configuration directives (AuthUserFile, AuthType Basic) to confirm htpasswd context.
  - description: Other systems that coincidentally use similar username:hash colon-separated format with the same hash prefixes.
    mitigation: The specific hash marker prefixes ($apr1$, $2y$, $2b$, $2a$, {SHA}) are sufficiently distinctive to minimise false positives from non-htpasswd sources.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_snaffler_htpasswd
      min_count: 2
      unique_results: true
      matches:
        - ref: Evidence_complete_htpasswd_hash
        - ref: Evidence_htpasswd_binding
        - ref: Evidence_apache_basic_auth
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_htpasswd_placeholder
    - confidence_level: 75
      id_match: Regex_snaffler_htpasswd
      matches:
        - ref: Evidence_complete_htpasswd_hash
        - ref: Evidence_htpasswd_binding
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_htpasswd_placeholder
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_htpasswd
  regexes:
    - id: Regex_snaffler_htpasswd
      pattern: '[A-Za-z0-9_.-]{1,64}:(?:\$apr1\$|\$1\$|\$5\$|\$6\$|\$2[aby]\$|\{SHA\})[^\s:]{1,255}'
    - id: Evidence_complete_htpasswd_hash
      pattern: '[A-Za-z0-9_.-]{1,64}:(?:\$apr1\$[./A-Za-z0-9]{1,8}\$[./A-Za-z0-9]{22}|\$2[aby]\$\d{2}\$[./A-Za-z0-9]{53}|\{SHA\}[A-Za-z0-9+/]{27}=|\$[156]\$(?:rounds=\d+\$)?[./A-Za-z0-9]{1,16}\$[./A-Za-z0-9]{20,86})'
  keywords:
    - id: Evidence_htpasswd_binding
      groups:
        - match_style: string
          terms:
            - htpasswd
            - AuthUserFile
            - .htpasswd
    - id: Evidence_apache_basic_auth
      groups:
        - match_style: string
          terms:
            - AuthType Basic
            - Require valid-user
    - id: Evidence_htpasswd_placeholder
      groups:
        - match_style: string
          terms:
            - PLACEHOLDER
            - REDACTED
            - CHANGEME
            - AAAAAAAAAAAAAAAAAAAA
created: '2026-06-26'
updated: '2026-07-19'
