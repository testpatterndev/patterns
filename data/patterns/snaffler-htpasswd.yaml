schema: testpattern/v1
name: Apache htpasswd Hashed Credential
slug: snaffler-htpasswd
version: 1.0.1
type: regex
engine: boost_regex
description: >-
  Detects Apache htpasswd file entries containing hashed passwords in MD5 ($apr1$),
  bcrypt ($2y$, $2b$, $2a$), or SHA ({SHA}) formats. Mirrors Snaffler rule
  KeepConfigByName.
operation: >-
  Matches username:hash pairs where the hash starts with a recognized Apache
  password hash marker. Supports apr1 MD5, bcrypt variants ($2y$, $2b$, $2a$),
  and SHA1 ({SHA}) formats. Plaintext passwords do not match.
pattern: '[A-Za-z0-9_.-]{1,64}:(?:\$apr1\$|\$1\$|\$5\$|\$6\$|\$2[aby]\$|\{SHA\})[^\s:]{1,255}'
confidence: high
confidence_justification: >-
  High confidence: the combination of a username and a well-known password hash
  format marker ($apr1$, $2y$, $2b$, $2a$, {SHA}) is highly specific to htpasswd
  files. These hash prefixes are not found in other common file formats.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - htpasswd
    - AuthUserFile
    - AuthType Basic
    - Require valid-user
  proximity: 300
test_cases:
  should_match:
    - value: "admin:$apr1$xyz123$dGhpc2lzYWhhc2g."
      description: MD5 apr1 htpasswd hash
    - value: "deploy:$2y$10$abcdefghijklmnopqrstuuWOOj3U5X5bF5lrfH2jk8VeQ0k.YIVUC"
      description: Bcrypt $2y$ htpasswd hash
    - value: "webuser:$2b$12$ABCDEFGHIJKLMNOPQRSTUUabcdefghijklmnopqrstuvwxyz01234"
      description: Bcrypt $2b$ variant htpasswd hash
    - value: "deploy:$6$rounds=5000$saltsalt$abcdefghijklmnopqrstuvwxyz0123456789ABCDEF"
      description: SHA-512 crypt ($6$) htpasswd hash (Snaffler parity)
  should_not_match:
    - value: "admin:plaintextpassword"
      description: No hash marker prefix, plaintext password
    - value: "user:secret123"
      description: Plaintext password, no hash format
false_positives:
  - description: Documentation or code examples showing htpasswd format with placeholder hashes.
    mitigation: Require proximity to Apache configuration directives (AuthUserFile, AuthType Basic) to confirm htpasswd context.
  - description: Other systems that coincidentally use similar username:hash colon-separated format with the same hash prefixes.
    mitigation: The specific hash marker prefixes ($apr1$, $2y$, $2b$, $2a$, {SHA}) are sufficiently distinctive to minimise false positives from non-htpasswd sources.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Regex_snaffler_htpasswd
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_htpasswd
      matches:
        - ref: Keyword_snaffler_htpasswd_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_htpasswd
      matches:
        - ref: Keyword_snaffler_htpasswd_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_htpasswd
      pattern: '[A-Za-z0-9_.-]{1,64}:(?:\$apr1\$|\$1\$|\$5\$|\$6\$|\$2[aby]\$|\{SHA\})[^\s:]{1,255}'
  keywords:
    - id: Keyword_snaffler_htpasswd_evidence
      groups:
        - match_style: string
          terms:
            - htpasswd
            - AuthUserFile
            - AuthType Basic
            - Require valid-user
created: '2026-06-26'
updated: '2026-06-26'
changelog:
  - version: 1.0.1
    date: '2026-06-26'
    note: >-
      Added MD5 ($1$), SHA-256 ($5$), and SHA-512 ($6$) crypt prefixes alongside
      existing apr1/bcrypt/SHA1 prefixes. Snaffler fidelity fix.
