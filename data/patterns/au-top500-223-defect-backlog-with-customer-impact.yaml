schema: testpattern/v1
name: Defect backlog with customer impact
slug: au-top500-223-defect-backlog-with-customer-impact
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to defect backlog with customer impact in Australian contexts. Higher confidence identifies backlog records that connect product defects to concrete
  customer impact (BUG/DEFECT/ISSUE identifiers with affected customers/accounts, customer impact, workaround, severity, or release-target detail); defect and customer-impact vocabulary alone
  remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:defect\s+backlog|customer\s+impact|bug\s+tracker|defect\s+report|severity\s+assessment|incident\s+report|product\s+defect|quality\s+issue|customer\s+complaint|root\s+cause\s+analysis)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - defect backlog with customer impact
    - defect
    - backlog
    - customer
    - impact
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: defect backlog
      description: Primary topic phrase match
    - value: customer impact
      description: Case-insensitive topic phrase match
    - value: bug tracker
      description: Alternative topic phrase match
    - value: defect report
      description: Additional topic phrase match
    - value: 'BUG-4821 Severity 1; customer impact: 318 accounts cannot export; workaround: CSV API; fix version 7.2.'
      description: Defect ID tied to affected customers, severity, workaround, and release (enforces at 75 via Pattern_defect_customer_link)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: Bug tracker lists internal cosmetic issue BUG-9 with no customer impact.
      description: Defect without the defining customer-impact condition — discovery only, must not enforce
    - value: 'BUG-42 triaged this sprint; no customer impact observed.'
      description: Negated customer impact next to a valid defect ID must not enforce (negation-safe evidence regex)
    - value: Customer impact of the office parking closure is limited to Friday.
      description: Impact not caused by a product defect — discovery only, must not enforce
    - value: 'Training example BUG-001: sample customer impact and placeholder workaround.'
      description: Training/sample/placeholder marks synthetic backlog content — suppressed from enforcement
    - value: customer impact
      description: Topic phrase cannot satisfy both defect and impact roles — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to defect backlog with customer impact appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_defect_customer_link
      matches:
        - ref: Evidence_defect_backlog_customer_impact
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_defect_customer_link
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_defect_backlog_customer_impact
      matches:
        - ref: Evidence_defect_backlog_customer_impact
  regexes:
    - id: Pattern_defect_backlog_customer_impact
      pattern: >-
        (?is)\b(?:defect\s+backlog|customer\s+impact|bug\s+tracker|defect\s+report|severity\s+assessment|incident\s+report|product\s+defect|quality\s+issue|customer\s+complaint|root\s+cause\s+analysis)\b
    - id: Pattern_defect_customer_link
      pattern: >-
        (?is)\b(?:BUG|DEFECT|ISSUE)[-_ ]?\d{2,8}\b[\s\S]{0,220}\b(?:affected\s+customers?|affected\s+accounts?|(?<!no\s)customer\s+impact|workaround|severity|fix\s+version|target\s+release)\b
    - id: Pattern_au_top500_223_defect_backlog_with_customer_impact_label_context
      pattern: (?i)\b(?:defect\s+backlog\s+with\s+customer\s+impact)\b
  keywords:
    - id: Evidence_defect_backlog_customer_impact
      groups:
        - match_style: word
          terms:
            - defect backlog
            - customer impact
            - bug tracker
            - defect report
            - severity assessment
            - incident report
            - product defect
            - quality issue
            - customer complaint
            - root cause analysis
    - id: Keyword_au_top500_223_defect_backlog_with_customer_impact_domain_context
      groups:
        - match_style: word
          terms:
            - defect backlog with customer impact
            - defect
            - backlog
            - customer
            - impact
risk_description: >-
  The regex finds defect backlog, customer impact, bug tracker, defect report, severity assessment, incident report, product defect, quality issue, customer complaint, or root-cause-analysis terminology. These phrases appear in templates, training, support processes, public incident reporting, and routine quality work, and they do not establish an exploitable defect or identify an affected customer. Serious misuse requires technical reproduction steps, unpatched vulnerability detail, named customers, impact scale, or a confidential remediation plan beyond the topic match. Risk 5 supports OFFICIAL; SENSITIVE would require that substantive non-public defect and customer-impact record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
