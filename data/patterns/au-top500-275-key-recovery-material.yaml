schema: testpattern/v1
name: Key recovery material
slug: au-top500-275-key-recovery-material
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies key recovery material patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 6 keywords within 240 characters.'
pattern: (?is)\b(?:key\s+recovery|recovery\s+key|escrow\s+key|break-glass)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - Criminal Code Act 1995 (Cth)
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - key recovery
    - recovery key
    - escrow key
    - break-glass
    - hsm
    - kms
  proximity: 240
test_cases:
  should_match:
    - value: Break-glass recovery key escrow procedure for HSM cluster
      description: Recovery material phrase with security context
    - value: Key recovery request approved for KMS tenant
      description: Key recovery anchor phrase
    - value: Escrow key custodian rotated the HSM break-glass credential
      description: Escrow key and break-glass anchors in custodian context
  should_not_match:
    - value: General key performance indicators for project recovery timeline
      description: Unrelated use of key/recovery words
    - value: Generic policy prose without key escrow context
      description: No structural security anchors
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_description: >-
  The regex finds key-recovery, escrow-key, and break-glass language, so a match may identify a recovery procedure as well as an actual recovery credential. If a live escrow or recovery key is present, an unauthorized holder could restore access, decrypt protected data, or bypass ordinary administrative controls. The usual impact is limited to the associated tenant, vault, or system, and service linkage plus a usable value may still be needed. Risk 8 and SENSITIVE reflect that serious contained compromise, with higher impact reserved for master recovery material spanning critical or multiple environments.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_key_recovery_material
      matches:
        - ref: Evidence_key_recovery_material
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_key_recovery_material
      matches:
        - ref: Evidence_key_recovery_material
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_key_recovery_material
      matches:
        - ref: Evidence_key_recovery_material
  regexes:
    - id: Pattern_key_recovery_material
      pattern: (?is)\b(?:key\s+recovery|recovery\s+key|escrow\s+key|break-glass)\b
  keywords:
    - id: Evidence_key_recovery_material
      groups:
        - match_style: word
          terms:
            - key recovery
            - recovery key
            - escrow key
            - break-glass
            - hsm
            - kms
            - key custodian
            - disaster recovery
            - emergency access
            - key backup
            - bitlocker recovery
