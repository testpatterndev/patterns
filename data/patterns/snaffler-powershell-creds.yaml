schema: testpattern/v1
name: PowerShell Credential Objects with Plaintext Password
slug: snaffler-powershell-creds
version: 1.2.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects PowerShell credential constructs that embed plaintext passwords, including
  ConvertTo-SecureString with -AsPlainText and [Net.NetworkCredential]::new() calls.
  Mirrors Snaffler rule KeepPsCredentials.
operation: >-
  Broad ConvertTo-SecureString -AsPlainText and NetworkCredential constructor use
  is discovery-only at 65. The 75 tier requires a quoted inline password literal.
  The 85 tier additionally requires that literal to be assembled into a
  PSCredential object or assigned as a NetworkCredential object, proving reusable
  credential construction. Enforcing tiers reject templates and placeholder values.
risk_description: >-
  The detector finds PowerShell constructs that turn plaintext into SecureString with -AsPlainText or instantiate NetworkCredential with an embedded password. A script containing a literal value can hand an attacker the account and reusable secret, enabling automation abuse, remote login, or password reuse against related services. The normal exposure affects one credential and the systems it can reach, while variable references, examples, current validity, and privilege constrain impact. Risk 8 and SENSITIVE reflect serious contained access compromise, with higher impact requiring a live broadly privileged automation credential.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: 'ConvertTo-SecureString[\s\S]{0,80}-AsPlainText'
confidence: high
confidence_justification: >-
  High confidence: ConvertTo-SecureString with -AsPlainText is the canonical PowerShell
  plaintext-password anti-pattern, explicitly warned against in Microsoft documentation.
  [Net.NetworkCredential]::new() with inline strings is equally specific.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - ConvertTo-SecureString
    - -Force
    - Get-Credential
    - password
    - AsPlainText
  proximity: 300
test_cases:
  should_match:
    - value: '$pw = ConvertTo-SecureString $env:SVC_PASSWORD -AsPlainText -Force'
      description: Low-tier probe - plaintext conversion API using a variable, not an inline literal
    - value: '$pw = ConvertTo-SecureString "N7v!q2Lm9" -AsPlainText -Force'
      description: Medium-tier probe - quoted inline password literal
    - value: '$cred = New-Object PSCredential("svcAdmin", (ConvertTo-SecureString "Hunter2" -AsPlainText -Force))'
      description: High-tier probe - inline secret assembled into a PSCredential object
    - value: '[Net.NetworkCredential]::new("admin", "S3cr3tPass")'
      description: Medium-tier probe - inline NetworkCredential literals without object assignment
    - value: '$netCred = [System.Net.NetworkCredential]::new("user@corp.com", "TopS3cr3t")'
      description: High-tier probe - inline NetworkCredential assigned for reuse
  should_not_match:
    - value: Get-Credential
      description: Get-Credential alone prompts interactively and contains no hardcoded password
    - value: '# Use Get-Credential for interactive prompts; avoid storing passwords in scripts'
      description: Security guidance comment with no actual password or SecureString conversion
    - value: 'ConvertTo-SecureString "secret" -Force'
      description: Malformed anti-pattern is missing -AsPlainText
    - value: '$pw = ConvertTo-SecureString "CHANGEME" -AsPlainText -Force'
      description: Placeholder password literal must not enforce
    - value: 'Documentation example: $cred = New-Object PSCredential("svcAdmin", (ConvertTo-SecureString "N7v!q2Lm9" -AsPlainText -Force))'
      description: Documentation quoting a complete credential object must not enforce
    - value: '$cipher = ConvertFrom-SecureString $securePassword'
      description: Sibling secure-string serialization command does not ingest plaintext
false_positives:
  - description: Security training or documentation examples showing the anti-pattern to avoid, containing sample command syntax without real passwords.
    mitigation: Check for placeholder password values (password123, example, PLACEHOLDER) and documentation file types.
  - description: Scripts that reference ConvertTo-SecureString with -AsPlainText to convert from an environment variable rather than a hardcoded literal.
    mitigation: The environment variable form ($env:PASSWORD) is still a risk but lower severity than literal strings; flag for review.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_cts_plaintext
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_net_credential_new
    - confidence_level: 75
      id_match: Regex_snaffler_cts_plaintext
      matches:
        - ref: Evidence_ps_inline_secret
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_ps_placeholder
    - confidence_level: 75
      id_match: Regex_snaffler_net_credential_new
      matches:
        - ref: Evidence_ps_inline_secret
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_ps_placeholder
    - confidence_level: 85
      id_match: Regex_snaffler_cts_plaintext
      matches:
        - ref: Evidence_ps_inline_secret
        - ref: Evidence_pscredential_object
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_ps_placeholder
    - confidence_level: 85
      id_match: Regex_snaffler_net_credential_new
      matches:
        - ref: Evidence_ps_inline_secret
        - ref: Evidence_networkcredential_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_ps_placeholder
  regexes:
    - id: Regex_snaffler_cts_plaintext
      pattern: 'ConvertTo-SecureString[\s\S]{0,80}-AsPlainText'
    - id: Regex_snaffler_net_credential_new
      pattern: '\[(?:System\.Net\.|Net\.)NetworkCredential\]::new\('
    - id: Evidence_ps_inline_secret
      pattern: 'ConvertTo-SecureString\s+["''][^"''\r\n]{8,}["''][\s\S]{0,80}-AsPlainText|\[(?:System\.Net\.|Net\.)NetworkCredential\]::new\(\s*["''][^"''\r\n]{2,}["'']\s*,\s*["''][^"''\r\n]{8,}["'']'
    - id: Evidence_pscredential_object
      pattern: '(?i)\b(?:New-Object\s+)?PSCredential\b|\[System\.Management\.Automation\.PSCredential\]'
    - id: Evidence_networkcredential_assignment
      pattern: '\$[A-Za-z_][A-Za-z0-9_]*\s*=\s*\[(?:System\.Net\.|Net\.)NetworkCredential\]::new\('
  keywords:
    - id: Evidence_ps_placeholder
      groups:
        - match_style: string
          terms:
            - CHANGEME
            - PLACEHOLDER
            - REDACTED
            - your-password
created: '2026-06-26'
updated: '2026-07-19'
changelog:
