    date: '2026-07-19'
    description: 'Targeted blocker remediation: separate API-use discovery, quoted inline secrets, and reusable PSCredential/NetworkCredential object construction; add exact-tier and malformed, placeholder, documentation, and sibling-command negatives.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2057 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
