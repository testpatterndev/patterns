schema: testpattern/v1
name: Mugshot image repositories
slug: global-top500-403-mugshot-image-repositories
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to mugshot image repositories in international contexts. This information
  type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 1 keywords within 240 characters. Keyword lists: industry-critical-infrastructure. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:booking\s+photo|arrest\s+photo|facial\s+image|image\s+repository|photo\s+lineup|identification\s+photo|inmate\s+photo|booking\s+image|custody\s+photograph|detainee\s+photo|biometric\s+image)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
- AML/CTF Act (Cth)
- IPA 2009 (Qld)
- NDB Scheme (Cth)
- Privacy Act 1988 (Cth)
data_categories:
- pii
corroborative_evidence:
  keywords:
  - mugshot image repositories
  proximity: 240
  keyword_lists:
  - industry-critical-infrastructure
  - data-record-context
  - generic-data-labels
test_cases:
  should_match:
  - value: booking photo
    description: Primary topic phrase match
  - value: arrest photo
    description: Case-insensitive topic phrase match
  - value: facial image
    description: Alternative topic phrase match
  - value: image repository
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: mugshot victim
    description: Generic word pair from old broad template should not match
false_positives:
- description: Common words and phrases related to mugshot image repositories appearing in policy documents, training materials,
    HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_mugshot
    matches:
    - ref: Pattern_global_top500_403_mugshot_image_repositories_label_context
    - ref: Keyword_global_top500_403_mugshot_image_repositories_domain_context
    - ref: Keyword_mugshot
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_mugshot
    matches:
    - ref: Pattern_global_top500_403_mugshot_image_repositories_label_context
    - ref: Keyword_global_top500_403_mugshot_image_repositories_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_mugshot
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_mugshot
    pattern: (?is)\b(?:booking\s+photo|arrest\s+photo|facial\s+image|image\s+repository|photo\s+lineup|identification\s+photo|inmate\s+photo|booking\s+image|custody\s+photograph|detainee\s+photo|biometric\s+image)\b
  - id: Pattern_global_top500_403_mugshot_image_repositories_label_context
    pattern: (?i)\b(?:mugshot\s+image\s+repositories)\b
  keywords:
  - id: Keyword_mugshot
    groups:
    - match_style: word
      terms:
      - mugshot
      - booking photo
      - arrest photo
      - facial image
      - image repository
      - photo lineup
      - identification photo
      - inmate photo
      - booking image
      - custody photograph
      - detainee photo
      - biometric image
    strength: specific
  - id: Keyword_global_top500_403_mugshot_image_repositories_domain_context
    groups:
    - match_style: word
      terms:
      - mugshot image repositories
      - mugshot
      - image
      - repositories
    strength: domain
risk_description: This concept classifier targets booking-photo, arrest-photo, facial-image, and image-repository material
  associated with law-enforcement records. A normal repository entry connects a person's face with custodial context, enabling
  misidentification, facial-search misuse, stigma, or harassment even where charges did not result in conviction. The composite
  repository framing raises impact above a single public photograph, but ordinary disclosure remains a contained law-enforcement
  and privacy breach. Risk 8 is SENSITIVE Law-Enforcement; PROTECTED would require covert identities, protected persons, or
  large-scale biometric compromise with severe consequences.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Law-Enforcement
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
