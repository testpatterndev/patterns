schema: testpattern/v1
name: Luxembourg Passport Number
slug: lu-passport-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Luxembourg passport number patterns. This pattern is based on a Microsoft Purview built-in sensitive
  information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as
  a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-luxemburg-passport-number Corroborative evidence: 3
  keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b[A-Z]{2}\d{6}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - lu
  - eu
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - travel document
    - passport number
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: JC123456
      description: Two-letter prefix with 6 digits
    - value: LX987654
      description: Two-letter prefix with 6 digits
    - value: AB234567
      description: Two-letter prefix with 6 digits
  should_not_match:
    - value: '123456'
      description: Missing letter prefix
    - value: A1234567
      description: Single-letter prefix is invalid for this format
false_positives:
  - description: >-
      Generic alphanumeric sequences matching passport format in unrelated contexts.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_lu_passport
      matches:
        - ref: Keyword_lu_passport_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_lu_passport
      matches:
        - ref: Keyword_lu_passport_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_lu_passport
  regexes:
    - id: Regex_lu_passport
      pattern: \b[A-Z]{2}\d{6}\b
  keywords:
    - id: Keyword_lu_passport_specific
      groups:
        - match_style: word
          terms:
            - passeport luxembourgeois
            - numéro de passeport
            - Reisepass
            - Reisepassnummer
            - Luxembourg passport
            - passport number
            - passeport
            - document de voyage
            - Passnummer
      strength: domain
    - id: Keyword_lu_passport_general
      groups:
        - match_style: word
          terms:
            - passport
            - travel document
            - passport no
            - passport #
            - document number
            - identity document
            - travel ID
      strength: specific
risk_rating: 5
risk_description: >-
  The Luxembourg passport detector recognises two uppercase letters followed by six digits with nearby passport and civic terminology. A genuine value can associate a traveller with a passport, visa, reservation, or border record and support document impersonation when joined to biographical data. The compact format also resembles permits, product codes, and administrative references, and no holder, expiry, nationality, validity, or travel movement is present. Risk 5 OFFICIAL reflects bounded travel-identity correlation; SENSITIVE would require a verified passport record, image, or itinerary.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-luxemburg-passport-number
    title: "Luxembourg passport number entity definition - Microsoft Learn"
