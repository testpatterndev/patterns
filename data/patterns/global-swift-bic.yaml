schema: testpattern/v1
name: Swift Bic
slug: global-swift-bic
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Swift Bic patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use
  this version as a starting point for customisation.
operation: >-
  Reference: https://en.wikipedia.org/wiki/ISO_9362 Corroborative evidence: 9 keywords within 300 characters. Keyword lists: financial-deposit-terms. Uses additional domain-context evidence and
  explicit exclusion logic for template/sample/test text.
pattern: \b[A-Z]{6}[A-Z0-9]{2}[A-Z0-9]{3}\b|\b[A-Z]{6}[A-Z0-9]{2}\b
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - PSD2
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - bank account
    - account number
    - account no
    - BSB
    - routing number
    - sort code
    - IBAN
    - SWIFT
    - BIC
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: DEUTDEFF
      description: Deutsche Bank 8-character SWIFT/BIC
    - value: BNPAFRPP
      description: BNP Paribas 8-character SWIFT/BIC
    - value: CHASUS33XXX
      description: JPMorgan Chase 11-character SWIFT/BIC
  should_not_match:
    - value: DEUT1EFF
      description: Contains a digit in the first 6 characters (must be all letters)
    - value: DEUTDE
      description: Only 6 characters instead of minimum 8
    - value: DEUTDEFFXXXX
      description: 12 characters instead of maximum 11
    - value: sample data row, a test value not a real bank code
      description: Template/sample context with no 8-character all-letter token to match the BIC structure
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_swift_bic
      matches:
        - ref: Pattern_global_swift_bic_label_context
        - ref: Keyword_global_swift_bic_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_swift_bic
      matches:
        - ref: Keyword_swift_bic
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_swift_bic
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_swift_bic
      pattern: \b[A-Z]{6}[A-Z0-9]{2}[A-Z0-9]{3}\b|\b[A-Z]{6}[A-Z0-9]{2}\b
    - id: Pattern_global_swift_bic_label_context
      pattern: (?i)\b(?:swift\s+bic|swift|bic)\b
  keywords:
    - id: Keyword_swift_bic
      groups:
        - match_style: word
          terms:
            - SWIFT
            - text: BIC
              case_sensitive: true
            - SWIFT code
            - BIC code
            - bank identifier
            - bank code
            - IBAN
            - wire transfer
            - correspondent bank
            - intermediary bank
            - international transfer
            - remittance
      strength: specific
    - id: Keyword_global_swift_bic_domain_context
      groups:
        - match_style: word
          terms:
            - swift bic
            - swift
            - bic
      strength: domain
risk_rating: 9
risk_description: >-
  Financial account identifiers can be exploited for unauthorized transactions, account takeover, and financial fraud. Exposure of banking details poses immediate monetary risk and may violate
  financial data protection regulations.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-swift-code
    title: SWIFT code entity definition - Microsoft Learn
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - 'Purview-safe: remove optional multi-match groups'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
source: microsoft
