schema: testpattern/v1
name: Central bank intervention plans
slug: global-top500-499-central-bank-intervention-plans
version: 1.2.1
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to central bank intervention plans in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:central\s+bank\s+intervention\s+plans?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - central bank intervention plans
  proximity: 240
  keyword_lists:
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Central bank intervention plans'
      description: Topic phrase present
    - value: 'central bank intervention plans'
      description: Topic phrase, lowercase
    - value: 'this record references the central bank intervention plans held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Common words and phrases related to central bank intervention plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_central_bank
      matches:
        - ref: Keyword_central_bank
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_central_bank
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_central_bank
      pattern: (?i)\b(?:central\s+bank\s+intervention\s+plans?)\b
    - id: Pattern_global_top500_499_central_bank_intervention_plans_label_context
      pattern: (?i)\b(?:central\s+bank\s+intervention\s+plans)\b
  keywords:
    - id: Keyword_central_bank
      groups:
        - match_style: word
          terms:
            - central bank intervention plans
            - central bank
            - monetary policy
            - interest rate decision
            - foreign exchange intervention
            - quantitative easing
            - reserve requirement
            - open market operations
            - currency stabilization
            - liquidity injection
            - policy rate
            - market intervention
      strength: specific
    - id: Keyword_global_top500_499_central_bank_intervention_plans_domain_context
      groups:
        - match_style: word
          terms:
            - central bank intervention plans
            - central
            - bank
            - intervention
            - plans
      strength: domain
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
