schema: testpattern/v1
name: xAI API Key
slug: global-xai-api-key
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects xAI (Grok) API keys, which use a distinctive xai- prefix followed by a long
  alphanumeric body. A leaked key grants unauthorized, billed access to xAI's Grok models
  and any prompts or data routed through the API.
operation: >-
  Prefixed token format xai- followed by a long alphanumeric body (exact length/charset not
  published by xAI; a generous 20-100 character bound is used). Corroborative evidence:
  keywords within 300 characters.
pattern: (?<![A-Za-z0-9])xai-[A-Za-z0-9]{20,100}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the xai- prefix is distinctive (confirmed by xAI's own security FAQ and its
  own GitHub secret-scanning partner entry with push protection enabled by default), so false
  positives on the prefix alone are extremely unlikely even though the exact body length is not
  formally documented.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - xai
    - grok
    - x.ai
    - console.x.ai
    - XAI_API_KEY
    - api key
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: xai-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCD
      description: xAI API key, xai- prefix + long alphanumeric body
    - value: 'XAI_API_KEY=xai-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCD'
      description: Labelled xAI key in an env assignment
    - value: xai-zZyYxXwWvVuUtTsSrRqQpPoOnNmMlLkKjJiIhHgGfFeEdDcCbBaA0123456789
      description: Mixed-case xAI key body
  should_not_match:
    - value: xa-ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCD
      description: Wrong prefix (xa- instead of xai-)
    - value: xai-ABCDEFGHIJKLMNO
      description: Body far too short (15 chars, below the 20-char floor)
    - value: rotate the xai grok api key before deployment
      description: Prose mention without a token value
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Documentation or examples showing placeholder xai- strings.
    mitigation: Require corroborative xAI/Grok keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 9
risk_description: >-
  A leaked xAI API key enables unauthorized, billed access to Grok models and can expose any
  prompts, documents, or data routed through the xAI API.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_xai_api_key
      matches:
        - ref: Keyword_xai_api_key
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_xai_api_key
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_xai_api_key
      pattern: (?<![A-Za-z0-9])xai-[A-Za-z0-9]{20,100}(?![A-Za-z0-9])
  keywords:
    - id: Keyword_xai_api_key
      groups:
        - match_style: word
          terms:
            - xAI
            - Grok
            - x.ai
            - console.x.ai
            - XAI_API_KEY
            - api key
            - grok api
      strength: specific
created: '2026-07-06'
updated: '2026-07-06'
