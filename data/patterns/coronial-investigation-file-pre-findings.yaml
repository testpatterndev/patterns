schema: testpattern/v1
name: Coronial Investigation File (Pre-Findings)
slug: coronial-investigation-file-pre-findings
version: 1.3.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects pre-publication coronial investigation files including evidence, witness statements, and draft findings. Published coronial findings are SENS_Law, not PROT_Law.
operation: 'Keyword proximity: primary keywords (coronial investigation, coronial inquest, autopsy report, coronial findings draft) within 300 characters of pre-publication markers (DRAFT, NOT FOR RELEASE). Negative keyword exclusion for published findings.'
pattern: (?i)\b(coronial\s+investigation\s+(?:file|brief|report)|coronial\s+inquest\s+(?:brief|file)|autopsy\s+report\s+(?:draft|preliminary)|post[\-\s]mortem\s+(?:report|examination)\s+(?:draft|preliminary)|coronial\s+(?:findings?\s+draft|brief\s+draft|draft\s+findings?))\b
confidence: medium
confidence_justification: 'Medium confidence: requires coronial terminology with pre-publication markers (DRAFT, NOT FOR RELEASE). Published findings excluded.'
jurisdictions:
  - au
regulations:
- "Coroners Act 2003 (Qld)"
- "PPRA 2000 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - DRAFT
    - NOT FOR RELEASE
    - RESTRICTED
    - Coroners Act 2003
    - Queensland Coroner
    - Coroners Court
    - cause of death
    - manner of death
    - death in custody
    - workplace death
    - autopsy
    - post-mortem
    - toxicology
  proximity: 300
  keyword_lists:

    - law-enforcement

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED — DRAFT — NOT FOR RELEASE. Coronial Investigation File. Coroners Court File COR-2025-0187. Deceased: Robert WHITFIELD. Cause of death pending — autopsy indicates blunt force trauma. Death in custody at Arthur Gorrie CC. Parallel criminal investigation active.'
      description: Pre-findings coronial file for death in custody
    - value: 'RESTRICTED — NOT FOR RELEASE before inquest. Coronial inquest brief — workplace death, Toowoomba. Post-mortem (preliminary): fall from height. 7 witness statements attached. Draft findings not yet circulated.'
      description: Pre-inquest coronial brief for workplace death
    - value: 'Draft Coronial Findings. Coroners Act 2003 s.45. Death of Emily CHANG. Autopsy report draft. Toxicology: elevated BAC. Manner of death under investigation. RESTRICTED — not for release prior to publication.'
      description: Draft coronial findings with toxicology
  should_not_match:
    - value: The Queensland Coroner published findings into the death of John Smith. Death due to natural causes. Available on the Coroners Court website.
      description: Published coronial findings
    - value: The Courier-Mail reported on the coronial inquest, noting expert witnesses gave evidence about safety failings.
      description: Media report on public inquest
    - value: A QUT thesis examined coronial recommendations under the Coroners Act 2003, analysing published findings from 2020-2024.
      description: Academic thesis on published findings
false_positives:
  - description: Published coronial findings
    mitigation: 'Negative keyword exclusion: ''published findings'', ''available on website''. Require DRAFT/NOT FOR RELEASE.'
  - description: Media reporting on public inquests
    mitigation: 'Negative keyword exclusion: ''media'', ''reported'', ''news'', ''Courier-Mail'''
  - description: Academic analysis of published findings
    mitigation: 'Negative keyword exclusion: ''academic'', ''university'', ''thesis'', ''published findings'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_coronial_investigation_file_pre_findings_coronial_terms
      matches:
        - ref: Evidence_coronial_investigation_file_pre_findings_primary_keywords
        - ref: Evidence_coronial_investigation_file_pre_findings_pre_publication_markers
        - ref: Evidence_coronial_investigation_file_pre_findings_corroborative_terms
        - ref: Pattern_coronial_investigation_file_pre_findings_coroners_court_file
        - ref: Pattern_coronial_investigation_file_pre_findings_pre_publication_markers
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_coronial_investigation_file_pre_findings_exclusion
    - confidence_level: 75
      id_match: Pattern_coronial_investigation_file_pre_findings_coronial_terms
      matches:
        - ref: Evidence_coronial_investigation_file_pre_findings_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_coronial_investigation_file_pre_findings_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_coronial_investigation_file_pre_findings_coronial_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_coronial_investigation_file_pre_findings_exclusion
  regexes:
    - id: Pattern_coronial_investigation_file_pre_findings_coronial_terms
      pattern: (?i)\b(coronial\s+investigation|coronial\s+inquest|autopsy\s+report|post[\-\s]mortem\s+report|coronial\s+findings\s+draft|coronial\s+brief)\b
    - id: Pattern_coronial_investigation_file_pre_findings_coroners_court_file
      pattern: \bCOR-\d{4}-\d{3,5}\b
    - id: Pattern_coronial_investigation_file_pre_findings_pre_publication_markers
      pattern: (?i)\b(DRAFT|NOT\s+FOR\s+RELEASE|PRE-PUBLICATION)\b
  keywords:
    - id: Evidence_coronial_investigation_file_pre_findings_primary_keywords
      groups:
        - match_style: word
          terms:
            - coronial investigation
            - coronial inquest
            - Coroners Act
            - autopsy report
            - post-mortem report
            - coronial findings draft
            - coronial brief
            - cause of death
      strength: specific
    - id: Evidence_coronial_investigation_file_pre_findings_pre_publication_markers
      groups:
        - match_style: word
          terms:
            - DRAFT
            - NOT FOR RELEASE
            - PRE-PUBLICATION
            - RESTRICTED
            - pending publication
      strength: specific
    - id: Evidence_coronial_investigation_file_pre_findings_corroborative_terms
      groups:
        - match_style: word
          terms:
            - Queensland Coroner
            - Coroners Court
            - death in custody
            - workplace death
            - toxicology
            - pathologist
            - Coronial Support Unit
      strength: specific
    - id: Filter_coronial_investigation_file_pre_findings_exclusion
      groups:
        - match_style: word
          terms:
            - published findings
            - findings are available
            - Coroners Court website
            - media
            - reported
            - news
            - academic
            - university
            - thesis

      strength: noise
risk_rating: 8
risk_description: "Coronial investigation evidence and draft findings before publication; disclosure prejudices proceedings and may compromise parallel criminal investigations."
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Law-Enforcement
references: []
