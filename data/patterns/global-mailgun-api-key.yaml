schema: testpattern/v1
name: Mailgun API Key
slug: global-mailgun-api-key
version: 1.1.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Mailgun private API keys (key- prefix followed by 32 hex characters). A
  leaked key allows sending email and accessing logs and account data via the Mailgun API.
operation: 'Prefixed token format key- followed by 32 hex characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9])key-[a-f0-9]{32}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence when corroborated: the key- prefix plus 32 hex chars is structured,
  though the generic prefix means Mailgun context keywords meaningfully reduce false positives.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - mailgun
    - mailgun.net
    - api key
    - MAILGUN_API_KEY
    - private api key
    - smtp
    - bearer token
  proximity: 300
test_cases:
  should_match:
    - value: key-abcdef0123456789abcdef0123456789
      description: Mailgun private API key, key- prefix + 32 hex
    - value: 'MAILGUN_API_KEY=key-0123456789abcdef0123456789abcdef'
      description: Labelled Mailgun key in an env assignment
    - value: key-fedcba9876543210fedcba9876543210
      description: Another Mailgun key body
  should_not_match:
    - value: key-abcdef0123456789
      description: Too short to be a valid Mailgun key
    - value: pubkey-abcdef0123456789abcdef0123456789
      description: Mailgun public key prefix, not the private api key
    - value: configure mailgun with your private api key before sending
      description: Prose mention without a token value
false_positives:
  - description: Other key- prefixed 32-hex values such as unrelated hashes or config keys.
    mitigation: Require corroborative Mailgun keywords within proximity before alerting.
  - description: Documentation or examples showing placeholder key- strings.
    mitigation: Check for placeholder markers (example, xxxx) and require Mailgun context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 8
risk_description: >-
  A leaked Mailgun key enables sending phishing or spam from the owner's domains and
  reading delivery logs, which may contain recipient PII.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-09'
changelog:
  - version: 1.1.0
    date: '2026-07-09'
