references:
  - url: https://github.com/trufflesecurity/trufflehog/blob/main/pkg/detectors/square/square.go
    title: 'TruffleHog production Square detector (EAAA + exactly 60-char body, requires "square" context)'
  - url: https://github.com/trufflesecurity/trufflehog/blob/main/pkg/detectors/squareapp/squareapp.go
    title: 'TruffleHog production Square app detector ((sandbox-)sq0c??- secret 40-50 chars; sq0i??- app id)'
  - url: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
    title: 'gitleaks rule square-access-token ((?:EAAA|sq0atp-)[\w-]{22,60})'
  - url: https://docs.gitguardian.com/secrets-detection/secrets-detection-engine/detectors/specifics/square_token
    title: 'Square Token - GitGuardian detector documentation (Prefixed: True)'
  - url: https://docs.github.com/en/code-security/secret-scanning/introduction/supported-secret-scanning-patterns
    title: Supported secret scanning patterns - GitHub Docs (square_access_token, square_production_application_secret, square_sandbox_application_secret)
