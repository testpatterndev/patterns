schema: testpattern/v1
name: Endpoint detection telemetry
slug: global-top500-282-endpoint-detection-telemetry
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies endpoint detection telemetry patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:endpoint\s+detection|carbon\s+black|defender\s+for\s+endpoint|sentinel\s+one|process\s+telemetry|threat\s+detection|endpoint\s+security|behavioral\s+analysis|agent\s+telemetry)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - endpoint detection telemetry
    - endpoint
    - detection
    - telemetry
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: endpoint detection
      description: Primary topic phrase match
    - value: carbon black
      description: Case-insensitive topic phrase match
    - value: defender for endpoint
      description: Alternative topic phrase match
    - value: sentinel one
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: edr process
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_endpoint_detection_telemetry
      matches:
        - ref: Pattern_global_top500_282_endpoint_detection_telemetry_label_context
        - ref: Keyword_global_top500_282_endpoint_detection_telemetry_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_endpoint_detection_telemetry
      matches:
        - ref: Keyword_endpoint_detection_telemetry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_endpoint_detection_telemetry
      matches:
        - ref: Keyword_endpoint_detection_telemetry
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_endpoint_detection_telemetry
      pattern: (?is)\b(?:endpoint\s+detection|carbon\s+black|defender\s+for\s+endpoint|sentinel\s+one|process\s+telemetry|threat\s+detection|endpoint\s+security|behavioral\s+analysis|agent\s+telemetry)\b
    - id: Pattern_global_top500_282_endpoint_detection_telemetry_label_context
      pattern: (?i)\\b(?:endpoint\\s+detection\\s+telemetry|endpoint|detection|telemetry|top500)\\b
  keywords:
    - id: Keyword_endpoint_detection_telemetry
      groups:
        - match_style: word
          terms:
            - endpoint detection
            - edr
            - xdr
            - crowdstrike
            - carbon black
            - defender for endpoint
            - sentinel one
            - process telemetry
            - threat detection
            - endpoint security
            - behavioral analysis
            - agent telemetry
    - id: Keyword_global_top500_282_endpoint_detection_telemetry_domain_context
      groups:
        - match_style: word
          terms:
            - endpoint detection telemetry
            - endpoint
            - detection
            - telemetry
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
