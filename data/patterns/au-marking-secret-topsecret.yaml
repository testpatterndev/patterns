schema: testpattern/v1
name: Australian Marking - SECRET / TOP SECRET
slug: au-marking-secret-topsecret
version: 1.3.0
type: regex
pattern_class: marking
engine: boost_regex
description: >-
  Detects the Australian Government SECRET and TOP SECRET security classifications in both email
  and document forms. Intended to surface content that should not be stored on the platform (these
  classifications roll up to the PROTECTED label in au-marking-protected for handling, while this
  SIT flags them for remediation). Matched case-sensitively.
operation: >-
  An uppercase SECRET or TOP SECRET candidate is discovery-only at 65, with common trade/API/client
  secret collocations excluded. A formal SEC, classification, security-classification, protective-marking,
  or marking field raises it to 75; an explicit Australian or Queensland protective-security context
  can also corroborate a standalone banner at 75. The 85 tier requires a complete
  X-Protective-Marking header with VER, NS=gov.au, and SEC=SECRET or SEC=TOP-SECRET. Public guides,
  training, templates, and examples do not enforce.
pattern: '\b(?:TOP[\s-]+)?SECRET\b'
confidence: high
confidence_justification: >-
  High confidence: case-sensitive uppercase SECRET / TOP SECRET plus the structured SEC= form. The
  lowercase English word "secret" is excluded by case.
jurisdictions:
  - au
regulations:
  - "Criminal Code Act 1995 (Cth)"
frameworks:
  - PSPF
data_categories:
  - government
  - security-classification
case_sensitive: true
corroborative_evidence:
  keywords:
    - PSPF
    - protective marking
    - Australian Government
  proximity: 300
test_cases:
  should_match:
    - value: "Document footer candidate TOP SECRET"
      description: Low-tier probe - uppercase candidate without a formal marking field
    - value: "Security Classification: SECRET"
      description: Medium-tier probe - formal security-classification field without a complete header
    - value: "Subject [SEC=TOP-SECRET]"
      description: Operational email subject marking reaches the balanced tier
    - value: "Australian Government PSPF briefing\nTOP SECRET"
      description: Medium-tier probe - standalone banner corroborated by explicit government marking context
    - value: "X-Protective-Marking: VER=2024.1, NS=gov.au, SEC=TOP-SECRET"
      description: High-tier probe - complete Australian protective-marking header
  should_not_match:
    - value: "the secret ingredient is a pinch of salt"
      description: lowercase English word (case-sensitive exclusion)
    - value: "this is top secret information, allegedly"
      description: lowercase phrase (case-sensitive exclusion)
    - value: "Briefing [SEC=PROTECTED]"
      description: PROTECTED belongs to au-marking-protected
    - value: "ROTATE THE API SECRET KEY QUARTERLY"
      description: API-secret collocation is not a government marking
    - value: "TOP SECRET RECIPE - PUBLIC COOKING EVENT"
      description: Incidental uppercase title must not enforce
    - value: "Public marking guide: Security Classification: SECRET"
      description: Public guidance quotes a formal secret marking
    - value: "Template example: X-Protective-Marking: VER=2024.1, NS=gov.au, SEC=TOP-SECRET"
      description: Template contains a complete formal header
false_positives:
  - description: Uppercase SECRET / TOP SECRET in titles or marketing (e.g. a film title).
    mitigation: Explicit PSPF/QGISCF government context or a structured marking field is required above discovery; the complete header remains the strict 85 path.
  - description: ALL-CAPS prose (legal boilerplate, headers, or documents rendered entirely in capitals) defeats the case-sensitivity signal the bare SECRET / TOP SECRET banner relies on — any all-caps rendering of the word can fire with no protective-marking intent.
    mitigation: Treat uncorroborated banner hits as discovery inventory; structured or explicitly government-corroborated markings enforce at 75.
exports:
  - purview_xml
  - yaml
scope: narrow
risk_rating: 10
risk_description: >-
  The regex identifies Australian SECRET and TOP SECRET security-classification banners or structured SEC headers, which are explicit national-security markings rather than general secrecy language. Such material is not expected to reside on the platform, and disclosure can compromise protected operations, intelligence, defence capability, international relationships, or human safety at strategic scale. Film titles and all-caps prose can collide, but a corroborated marking represents the highest-consequence unit in this packet. Risk 10 and PROTECTED handling are appropriate as the maximum accepted Australian crosswalk; there is no higher QGISCF tier, and operational response must route the asset to its native SECRET or TOP SECRET controls.
sensitivity_labels:
  qgiscf: PROTECTED
  qgiscf_dlm: Marking Protected
  pspf: PROTECTED
  us_gov: "SECRET"
  uk_gov: "TOP SECRET"
  nz_gov: "TOP SECRET"
  ca_gov: "Top Secret"
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_au_secret_complete_header
      matches:
        - ref: Keyword_complete_marking_header
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_secret_collocation_exclusion
            - Keyword_public_marking_context
    - confidence_level: 75
      id_match: Regex_au_secret_formal_label
      matches:
        - ref: Keyword_formal_marking_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_secret_collocation_exclusion
            - Keyword_public_marking_context
    - confidence_level: 75
      id_match: Regex_au_secret_candidate
      matches:
        - ref: Keyword_au_gov_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Keyword_secret_collocation_exclusion
            - Keyword_public_marking_context
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_au_secret_candidate
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_secret_collocation_exclusion
  regexes:
    - id: Regex_au_secret_complete_header
      pattern: '\bX-Protective-Marking:\s*VER=[0-9]{4}\.[0-9]+,\s*NS=gov\.au,\s*SEC=(?:TOP-SECRET|SECRET)\b'
    - id: Regex_au_secret_formal_label
      pattern: '\b(?:SEC(?:URITY CLASSIFICATION)?|Security Classification|CLASSIFICATION|Classification|PROTECTIVE MARKING|Protective Marking|MARKING|Marking)\s*[:=]\s*(?:TOP[\s-]+)?SECRET\b'
    - id: Regex_au_secret_candidate
      pattern: '\b(?:TOP[\s-]+)?SECRET\b'
  keywords:
    - id: Keyword_au_gov_context
      groups:
        - match_style: word
          terms:
            - Australian Government
            - Queensland Government
            - QGISCF
            - PSPF
            - Protective Security Policy Framework
      strength: specific
    - id: Keyword_complete_marking_header
      groups:
        - match_style: word
          terms:
            - X-Protective-Marking
            - NS=gov.au
            - VER=
      strength: specific
    - id: Keyword_formal_marking_label
      groups:
        - match_style: word
          terms:
            - Classification
            - Security Classification
            - Protective Marking
            - SEC=
      strength: specific
    - id: Keyword_secret_collocation_exclusion
      groups:
        - match_style: word
          terms:
            - text: TRADE SECRET
              case_sensitive: true
            - text: TRADE SECRETS
              case_sensitive: true
            - text: CLIENT SECRET
              case_sensitive: true
            - text: API SECRET
              case_sensitive: true
            - text: SECRET MANAGER
              case_sensitive: true
    - id: Keyword_public_marking_context
      groups:
        - match_style: word
          terms:
            - public marking guide
            - marking guide
            - style guide
            - training material
      strength: exclusion
created: '2026-06-29'
updated: '2026-07-19'
changelog:
  - version: 1.3.0
    date: '2026-07-19'
    description: 'Profile quality: retain bare banners as 65 discovery, enforce formal labels or explicitly government-corroborated banners at the recommended 75 tier, reserve 85 for complete headers, exclude secret collocations/public guides/templates, and add exact-tier probes.'
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2074 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: marking — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.0
    date: '2026-07-04'
    description: PDF-safe TOP[\s-]+SECRET separator (tolerates line-wrap between TOP and SECRET) and document all-caps-prose false-positive limitation.
