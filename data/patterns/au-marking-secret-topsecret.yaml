schema: testpattern/v1
name: Australian Marking - SECRET / TOP SECRET
slug: au-marking-secret-topsecret
version: 1.1.0
type: regex
engine: boost_regex
description: >-
  Detects the Australian Government SECRET and TOP SECRET security classifications in both email
  and document forms. Intended to surface content that should not be stored on the platform (these
  classifications roll up to the PROTECTED label in au-marking-protected for handling, while this
  SIT flags them for remediation). Matched case-sensitively.
operation: >-
  Tier 95 requires the structured SEC=SECRET / SEC=TOP-SECRET form. Tier 85 matches the SECRET or
  TOP SECRET banner.
pattern: '\b(?:TOP[\s-]+)?SECRET\b'
confidence: high
confidence_justification: >-
  High confidence: case-sensitive uppercase SECRET / TOP SECRET plus the structured SEC= form. The
  lowercase English word "secret" is excluded by case.
jurisdictions:
  - au
regulations:
  - "Criminal Code Act 1995 (Cth)"
frameworks:
  - PSPF
data_categories:
  - government
  - security-classification
case_sensitive: true
corroborative_evidence:
  keywords:
    - PSPF
    - protective marking
    - Australian Government
  proximity: 300
test_cases:
  should_match:
    - value: "Cover sheet [SEC=TOP-SECRET]"
      description: Email subject marking (TOP-SECRET)
    - value: "Annex [SEC=SECRET]"
      description: Email subject marking (SECRET)
    - value: "Document banner reads TOP SECRET"
      description: TOP SECRET banner
    - value: "This page is marked SECRET"
      description: SECRET banner
    - value: "Document banner reads TOP\nSECRET"
      description: PDF line-wrap between TOP and SECRET (single space/hyphen separator now tolerant of a wrap-inserted newline)
  should_not_match:
    - value: "the secret ingredient is a pinch of salt"
      description: lowercase English word (case-sensitive exclusion)
    - value: "this is top secret information, allegedly"
      description: lowercase phrase (case-sensitive exclusion)
    - value: "Briefing [SEC=PROTECTED]"
      description: PROTECTED belongs to au-marking-protected
false_positives:
  - description: Uppercase SECRET / TOP SECRET in titles or marketing (e.g. a film title).
    mitigation: Structured SEC= tier at 95; corroborative PSPF/government evidence raises banner confidence.
  - description: ALL-CAPS prose (legal boilerplate, headers, or documents rendered entirely in capitals) defeats the case-sensitivity signal the bare SECRET / TOP SECRET banner relies on — any all-caps rendering of the word can fire with no protective-marking intent.
    mitigation: Treat banner-tier-only hits as lower confidence when the surrounding text is itself all-caps; the structured SEC= tier (95) remains the reliable signal.
exports:
  - purview_xml
  - yaml
scope: narrow
risk_rating: 10
risk_description: SECRET / TOP SECRET indicates information that generally must not reside on this platform.
sensitivity_labels:
  pspf: "SECRET / TOP SECRET"
  us_gov: "SECRET"
  uk_gov: "TOP SECRET"
  nz_gov: "TOP SECRET"
  ca_gov: "Top Secret"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 95
      id_match: Regex_au_secret_struct
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_au_secret_banner
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_au_secret_struct
      pattern: '\bSEC=(?:TOP-SECRET|SECRET)\b'
    - id: Regex_au_secret_banner
      pattern: '\b(?:TOP[\s-]+)?SECRET\b'
created: '2026-06-29'
updated: '2026-07-04'
changelog:
  - version: 1.1.0
    date: '2026-07-04'
    description: PDF-safe TOP[\s-]+SECRET separator (tolerates line-wrap between TOP and SECRET) and document all-caps-prose false-positive limitation.
