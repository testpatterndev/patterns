schema: testpattern/v1
name: Bug bounty submissions
slug: au-top500-254-bug-bounty-submissions
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies bug bounty submissions patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:bug\s+bounty|bounty\s+submission|vulnerability\s+disclosure|responsible\s+disclosure|security\s+researcher|bounty\s+report|proof\s+of\s+concept|vulnerability\s+submission|security\s+bug|bounty\s+program)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - bug bounty submissions
    - bug
    - bounty
    - submissions
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: bug bounty
      description: Primary topic phrase match
    - value: bounty submission
      description: Case-insensitive topic phrase match
    - value: vulnerability disclosure
      description: Alternative topic phrase match
    - value: responsible disclosure
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_bug_bounty_submissions
      matches:
        - ref: Evidence_bug_bounty_submissions
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_bug_bounty_submissions
      matches:
        - ref: Evidence_bug_bounty_submissions
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_bug_bounty_submissions
      matches:
        - ref: Evidence_bug_bounty_submissions
  regexes:
    - id: Pattern_bug_bounty_submissions
      pattern: (?is)\b(?:bug\s+bounty|bounty\s+submission|vulnerability\s+disclosure|responsible\s+disclosure|security\s+researcher|bounty\s+report|proof\s+of\s+concept|vulnerability\s+submission|security\s+bug|bounty\s+program)\b
  keywords:
    - id: Evidence_bug_bounty_submissions
      groups:
        - match_style: word
          terms:
            - bug bounty
            - bounty submission
            - vulnerability disclosure
            - responsible disclosure
            - security researcher
            - bounty report
            - proof of concept
            - vulnerability submission
            - security bug
            - bounty program
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
