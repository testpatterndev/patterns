schema: testpattern/v1
name: Database connection strings with credentials
slug: au-top500-277-database-connection-strings-with-credentials
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies database connection strings with credentials patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: credentials.'
pattern: (?is)\b(?:database\s+connection\s+strings|connection\s+string|database\s+credentials|data\s+source|integrated\s+security|trusted\s+connection|connection\s+pool)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "Criminal Code Act 1995 (Cth)"
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - database connection strings with credentials
    - database
    - connection
    - strings
    - credentials
    - keys
    - secrets
  proximity: 300
  keyword_lists:

    - credentials
test_cases:
  should_match:
    - value: database connection strings
      description: Primary topic phrase match
    - value: connection string
      description: Case-insensitive topic phrase match
    - value: database credentials
      description: Alternative topic phrase match
    - value: data source
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: secret mfa
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_db_connection_strings
      matches:
        - ref: Evidence_db_connection_strings
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_db_connection_strings
      matches:
        - ref: Evidence_db_connection_strings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_db_connection_strings
      matches:
        - ref: Evidence_db_connection_strings
  regexes:
    - id: Pattern_db_connection_strings
      pattern: (?is)\b(?:database\s+connection\s+strings|connection\s+string|database\s+credentials|data\s+source|integrated\s+security|trusted\s+connection|connection\s+pool)\b
  keywords:
    - id: Evidence_db_connection_strings
      groups:
        - match_style: word
          terms:
            - database connection strings
            - connection string
            - database credentials
            - jdbc
            - odbc
            - data source
            - server=
            - password=
            - integrated security
            - trusted connection
            - connection pool
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
