schema: testpattern/v1
name: Settlement agreement drafts
slug: global-top500-166-settlement-agreement-drafts
version: 1.2.4
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to settlement agreement drafts in international contexts. These are
  confidential draft settlement instruments; the category is not personally identifiable information.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:settlement\s+agreement\s+drafts|settlement\s+agreement|deed\s+of\s+settlement|settlement\s+terms|release\s+and\s+discharge|confidential\s+settlement|without\s+admission|compromise\s+agreement|settlement\s+sum|mutual\s+release|dispute\s+resolution|mediation\s+outcome)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- legal
corroborative_evidence:
  keywords:
  - settlement agreement drafts
  - settlement
  - agreement
  - drafts
  - corporate
  - legal
  - governance
  proximity: 300
test_cases:
  should_match:
  - value: settlement agreement drafts
    description: Primary topic phrase match
  - value: settlement agreement
    description: Case-insensitive topic phrase match
  - value: deed of settlement
    description: Alternative topic phrase match
  - value: settlement terms
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: board policy
    description: Generic word pair from old broad template should not match
false_positives:
- description: Common words and phrases related to settlement agreement drafts appearing in policy documents, training materials,
    HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_settlement_agreement_drafts
    matches:
    - ref: Pattern_global_top500_166_settlement_agreement_drafts_label_context
    - ref: Keyword_global_top500_166_settlement_agreement_drafts_domain_context
    - ref: Keyword_settlement_agreement_drafts
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_settlement_agreement_drafts
    matches:
    - ref: Pattern_global_top500_166_settlement_agreement_drafts_label_context
    - ref: Keyword_global_top500_166_settlement_agreement_drafts_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_settlement_agreement_drafts
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_settlement_agreement_drafts
    pattern: (?is)\b(?:settlement\s+agreement\s+drafts|settlement\s+agreement|deed\s+of\s+settlement|settlement\s+terms|release\s+and\s+discharge|confidential\s+settlement|without\s+admission|compromise\s+agreement|settlement\s+sum|mutual\s+release|dispute\s+resolution|mediation\s+outcome)\b
  - id: Pattern_global_top500_166_settlement_agreement_drafts_label_context
    pattern: (?i)\b(?:settlement\s+agreement\s+drafts)\b
  keywords:
  - id: Keyword_settlement_agreement_drafts
    groups:
    - match_style: word
      terms:
      - settlement agreement drafts
      - settlement agreement
      - deed of settlement
      - settlement terms
      - release and discharge
      - confidential settlement
      - without admission
      - compromise agreement
      - settlement sum
      - mutual release
      - dispute resolution
      - mediation outcome
    strength: specific
  - id: Keyword_global_top500_166_settlement_agreement_drafts_domain_context
    groups:
    - match_style: word
      terms:
      - settlement agreement drafts
      - settlement
      - agreement
      - drafts
    strength: domain
risk_description: The concept detector looks for settlement-agreement, deed-of-settlement, settlement-terms, and draft-settlement
  language intended to identify an unresolved legal agreement. A substantive draft can reveal allegations, admissions, payment
  offers, release terms, negotiation limits, and personal or commercial disputes, prejudicing the parties and their legal
  strategy. Model clauses and completed public settlements can match, but the normal draft unit is confidential and still
  subject to negotiation. Risk 8 SENSITIVE reflects serious contained legal and financial harm; PROTECTED would require privileged
  high-stakes litigation strategy, protected operations, systemic public liability, Cabinet-level decisions, or exposure causing
  significant damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
