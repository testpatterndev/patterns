schema: testpattern/v1
name: Nuclear safeguards information
slug: au-top500-439-nuclear-safeguards-information
version: 1.3.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to nuclear safeguards information in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:nuclear\s+safeguards|safeguards\s+information|nuclear\s+material|nuclear\s+non[\s-]+proliferation|fissile\s+material|nuclear\s+facility|national\s+security|classified\s+nuclear|radioactive\s+material)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - nuclear safeguards information
    - nuclear
    - safeguards
    - information
    - defense
    - intelligence
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: nuclear safeguards
      description: Primary topic phrase match
    - value: safeguards information
      description: Case-insensitive topic phrase match
    - value: nuclear material
      description: Alternative topic phrase match
    - value: nuclear non-proliferation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to nuclear safeguards information appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_nuclear_safeguards_information
      matches:
        - ref: Evidence_nuclear_safeguards_information
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_nuclear_safeguards_information
      matches:
        - ref: Evidence_nuclear_safeguards_information
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_nuclear_safeguards_information
      matches:
        - ref: Evidence_nuclear_safeguards_information
  regexes:
    - id: Pattern_nuclear_safeguards_information
      pattern: >-
        (?is)\b(?:nuclear\s+safeguards|safeguards\s+information|nuclear\s+material|nuclear\s+non[\s-]+proliferation|fissile\s+material|nuclear\s+facility|national\s+security|classified\s+nuclear|radioactive\s+material)\b
  keywords:
    - id: Evidence_nuclear_safeguards_information
      groups:
        - match_style: word
          terms:
            - nuclear safeguards
            - safeguards information
            - nuclear material
            - ARPANSA
            - IAEA
            - nuclear non-proliferation
            - fissile material
            - enrichment
            - nuclear facility
            - national security
            - classified nuclear
            - radioactive material
risk_description: >-
  The concept detector finds nuclear safeguards, safeguards information, nuclear material, and nuclear non-proliferation language with six nearby terms. A genuine record could reveal material accountancy, facility arrangements, inspection findings, security dependencies, or compliance gaps, enabling diversion, evasion, or loss of international confidence. Public treaty material, policy, and training can also match because the regex does not require quantities, locations, security measures, or exploitable facility detail. For the Australian catalogue pattern, the confirmed substantive record is the consequence unit. Actual safeguards information can expose material accountancy, facility arrangements, inspection gaps or security dependencies, enabling diversion, evasion or catastrophic safety/security consequences. Risk 10 and PROTECTED Government therefore apply to the confirmed record itself. Require facility/material, quantity, location, security measure, inspection finding or safeguards-accounting structure. Public treaty material remains audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
