schema: testpattern/v1
name: Pre-release national budget drafts
slug: global-top500-491-pre-release-national-budget-drafts
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to pre-release national budget drafts in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:pre[\s-]+release\s+national\s+budget\s+drafts|national\s+budget|budget\s+draft|fiscal\s+policy|revenue\s+estimates|expenditure\s+forecast|budget\s+allocation|fiscal\s+year|budget\s+embargo)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - pre-release national budget drafts
  proximity: 240
test_cases:
  should_match:
    - value: pre-release national budget drafts
      description: Primary topic phrase match
    - value: national budget
      description: Case-insensitive topic phrase match
    - value: budget draft
      description: Alternative topic phrase match
    - value: fiscal policy
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to pre-release national budget drafts appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_budget_drafts
      matches:
        - ref: Pattern_global_top500_491_pre_release_national_budget_drafts_label_context
        - ref: Keyword_global_top500_491_pre_release_national_budget_drafts_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_budget_drafts
      matches:
        - ref: Keyword_budget_drafts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_budget_drafts
      pattern: >-
        (?is)\b(?:pre[\s-]+release\s+national\s+budget\s+drafts|national\s+budget|budget\s+draft|fiscal\s+policy|revenue\s+estimates|expenditure\s+forecast|budget\s+allocation|fiscal\s+year|budget\s+embargo)\b
    - id: Pattern_global_top500_491_pre_release_national_budget_drafts_label_context
      pattern: (?i)\b(?:pre\-release\s+national\s+budget\s+drafts)\b
  keywords:
    - id: Keyword_budget_drafts
      groups:
        - match_style: word
          terms:
            - pre-release national budget drafts
            - national budget
            - budget draft
            - fiscal policy
            - appropriations
            - revenue estimates
            - expenditure forecast
            - treasury
            - budget allocation
            - fiscal year
            - budget embargo
            - pre-budget
      strength: specific
    - id: Keyword_global_top500_491_pre_release_national_budget_drafts_domain_context
      groups:
        - match_style: word
          terms:
            - pre-release national budget drafts
            - pre
            - release
            - national
            - budget
            - drafts
      strength: domain
risk_description: >-
  The concept pattern recognizes pre-release national budgets, budget drafts, fiscal policy, revenue estimates, expenditure forecasts, allocations, fiscal years, and embargoes rather than proving that figures are current or unpublished. A genuine draft can reveal tax, spending, and borrowing decisions before announcement, enabling market positioning, lobbying advantage, contract repricing, or disruption of government communications. The normal true-positive unit is one national budget development package and the government, markets, agencies, and affected sectors, while published budget papers, commentary, and templates can match. Risk 8 and SENSITIVE reflect serious contained fiscal and market harm; PROTECTED would require Cabinet-level decisions or unreleased measures whose disclosure could cause significant sovereign or economy-wide damage.
