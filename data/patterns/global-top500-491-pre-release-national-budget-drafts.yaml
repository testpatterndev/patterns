schema: testpattern/v1
name: Pre-release national budget drafts
slug: global-top500-491-pre-release-national-budget-drafts
version: 1.3.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to pre-release national budget drafts in Australian contexts. This information type is classified as personally identifiable information under the Privacy
  Act 1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 9 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:pre[\s-]+release\s+budget|budget\s+draft|national\s+budget|budget\s+estimates|appropriation\s+bill|fiscal\s+outlook|budget\s+papers|expenditure\s+estimates|revenue\s+measures|budget\s+sensitive)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - GDPR
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - pre-release national budget drafts
    - pre
    - release
    - national
    - budget
    - drafts
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: pre-release budget
      description: Primary topic phrase match
    - value: budget draft
      description: Case-insensitive topic phrase match
    - value: national budget
      description: Alternative topic phrase match
    - value: budget estimates
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to pre-release national budget drafts appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pre_release_national_budget_drafts
      matches:
        - ref: Evidence_pre_release_national_budget_drafts
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_pre_release_national_budget_drafts
      matches:
        - ref: Evidence_pre_release_national_budget_drafts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_pre_release_national_budget_drafts
      matches:
        - ref: Evidence_pre_release_national_budget_drafts
  regexes:
    - id: Pattern_pre_release_national_budget_drafts
      pattern: >-
        (?is)\b(?:pre[\s-]+release\s+budget|budget\s+draft|national\s+budget|budget\s+estimates|appropriation\s+bill|fiscal\s+outlook|budget\s+papers|expenditure\s+estimates|revenue\s+measures|budget\s+sensitive)\b
    - id: Pattern_au_top500_491_pre_release_national_budget_drafts_label_context
      pattern: (?i)\b(?:pre\-release\s+national\s+budget\s+drafts)\b
  keywords:
    - id: Evidence_pre_release_national_budget_drafts
      groups:
        - match_style: word
          terms:
            - pre-release budget
            - budget draft
            - national budget
            - budget estimates
            - appropriation bill
            - fiscal outlook
            - budget papers
            - Treasury
            - expenditure estimates
            - revenue measures
            - cabinet-in-confidence
            - budget sensitive
    - id: Keyword_au_top500_491_pre_release_national_budget_drafts_domain_context
      groups:
        - match_style: word
          terms:
            - pre-release national budget drafts
            - pre
            - release
            - national
            - budget
            - drafts
risk_description: >-
  This regex targets pre-release budget, budget draft, estimates, fiscal measure, and related planning terms, intending to identify a working national budget document rather than a published budget. Disclosure can reveal unannounced taxes, spending, borrowing, savings, or sector measures, enabling market trading, lobbying advantage, avoidance behaviour, and loss of government policy control before release. Unannounced taxes, spending, forecasts and sector measures can be traded or lobbied against and can undermine fiscal decision-making and market confidence. The normal true-positive unit belongs at risk 9, PROTECTED Financial, while broad or contextual false positives remain a separate detection issue.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Financial
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
