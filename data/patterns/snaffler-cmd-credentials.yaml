schema: testpattern/v1
name: Command-Line Credential Strings
slug: snaffler-cmd-credentials
version: 1.2.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects credentials passed as command-line arguments in Windows batch scripts,
  PowerShell, and shell scripts. Covers net use /user:, schtasks /rp, psexec -p,
  cmdkey, and bare password= assignments. Mirrors Snaffler rule KeepCmdCredentials.
operation: >-
  Matches Windows command-line patterns that pass credentials explicitly: net use
  drive-mapping with /user:, scheduled task creation with /rp (run-password),
  PsExec remote execution with -p, cmdkey credential storage, and generic
  password= assignments in scripts. The 65-tier matches the command form alone;
  75/85 tiers require proximity to credential-context evidence keywords.
risk_description: >-
  The medium-confidence detector finds plaintext credentials embedded in command forms such as net use /user, schtasks /rp, PsExec -p, cmdkey /pass, and password assignments. A live command line can disclose the account, target, and secret together, allowing direct login, remote execution, scheduled-task abuse, or credential reuse. The normal exposure concerns one account and its reachable systems, while redaction, placeholder use, and current password validity constrain harm. Risk 8 and SENSITIVE reflect serious contained access compromise, with higher impact reserved for current domain-wide privileged credentials or a bulk command history.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: 'net\s+use\s+[\s\S]{0,300}/user:'
confidence: medium
confidence_justification: >-
  Medium confidence: these command forms are highly suggestive of hardcoded credentials
  but appear in legitimate automation scripts. Tiered gating with evidence at 75/85
  reduces false positives in documentation and approved deployment scripts.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - net use
    - /user:
    - runas
    - psexec
    - password
    - schtasks
    - cmdkey
  proximity: 300
test_cases:
  should_match:
    - value: 'net use //server/share /user:CORP/svc_account P@ssw0rd1'
      description: net use with slash-user flag and inline password credential
    - value: 'net use Z: //fileserver/data /user:domain/administrator S3cr3tPass'
      description: net use drive mapping with domain credentials
    - value: 'schtasks /create /tn Backup /tr backup.bat /sc daily /ru DOMAIN/svc /rp Secr3tPass'
      description: schtasks with /rp run-password for scheduled task
    - value: 'psexec //remotehost -u admin -p Pass123 cmd.exe'
      description: psexec with -p inline password
    - value: 'cmdkey /generic:targetserver /user:admin /pass:P@ssword1'
      description: cmdkey storing generic credential
    - value: "password='MyS3cretP4ss'"
      description: Bare password assignment in script variable
  should_not_match:
    - value: 'net use //server/share'
      description: net use without authentication flags - no credential exposure
    - value: 'See the documentation for details on how to configure schtasks and run-password parameters securely.'
      description: Prose documentation describing parameters without actual credential values
false_positives:
  - description: Deployment documentation or run-book examples that show net use / schtasks syntax with placeholder passwords.
    mitigation: Check for placeholder bracket patterns and documentation file extensions; use evidence gating at 75+ tier.
  - description: Audit log excerpts showing redacted command lines with masked credential fields.
    mitigation: Require the password= or /rp form to contain a non-trivially-short value; evidence proximity at 75 further filters.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      id_match: Regex_snaffler_netuse_user
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_schtasks_rp
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_psexec_p
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_cmdkey_add
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_snaffler_password_assign
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_netuse_user
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_schtasks_rp
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_psexec_p
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_cmdkey_add
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_password_assign
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_netuse_user
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - ref: Keyword_snaffler_cmd_password_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_schtasks_rp
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - ref: Keyword_snaffler_cmd_password_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_psexec_p
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - ref: Keyword_snaffler_cmd_password_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_cmdkey_add
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - ref: Keyword_snaffler_cmd_password_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_password_assign
      matches:
        - ref: Keyword_snaffler_cmd_creds_evidence
        - ref: Keyword_snaffler_cmd_password_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_netuse_user
      pattern: 'net\s+use\s+[\s\S]{0,300}/user:'
    - id: Regex_snaffler_schtasks_rp
      pattern: 'schtasks[\s\S]{1,300}(?:/rp\s|/p\s)'
    - id: Regex_snaffler_psexec_p
      pattern: 'psexec[\s\S]{0,100}\s-p\s'
    - id: Regex_snaffler_cmdkey_add
      pattern: 'cmdkey\s+/(?:generic|add)'
    - id: Regex_snaffler_password_assign
      pattern: "passw(?:o(?:r(?:d)?)?)?\\s*=\\s*['\"][^'\"]{4,}"
  keywords:
    - id: Keyword_snaffler_cmd_creds_evidence
      groups:
        - match_style: string
          terms:
            - net use
            - /user:
            - runas
            - psexec
            - schtasks
            - cmdkey
    - id: Keyword_snaffler_cmd_password_context
      groups:
        - match_style: word
          terms:
            - password
            - passwd
            - credential
            - /rp
            - -p
