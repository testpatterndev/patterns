schema: testpattern/v1
name: Sealed court filing records
slug: au-top500-416-sealed-court-filing-records
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to sealed court filing records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:sealed\s+court\s+filing\s+records|sealed\s+filing|suppression\s+order|non[\s-]+publication\s+order|restricted\s+court\s+record|closed\s+court|confidential\s+filing|court\s+seal|redacted\s+filing|judicial\s+order|protected\s+record|in\s+camera\s+hearing)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - IPA 2009 (Qld)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - sealed court filing records
    - sealed
    - court
    - filing
    - records
    - law
    - enforcement
    - justice
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: sealed court filing records
      description: Primary topic phrase match
    - value: sealed filing
      description: Case-insensitive topic phrase match
    - value: suppression order
      description: Alternative topic phrase match
    - value: non-publication order
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to sealed court filing records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_sealed_court_filing_records
      matches:
        - ref: Evidence_sealed_court_filing_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_sealed_court_filing_records
      matches:
        - ref: Evidence_sealed_court_filing_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_sealed_court_filing_records
      matches:
        - ref: Evidence_sealed_court_filing_records
  regexes:
    - id: Pattern_sealed_court_filing_records
      pattern: >-
        (?is)\b(?:sealed\s+court\s+filing\s+records|sealed\s+filing|suppression\s+order|non[\s-]+publication\s+order|restricted\s+court\s+record|closed\s+court|confidential\s+filing|court\s+seal|redacted\s+filing|judicial\s+order|protected\s+record|in\s+camera\s+hearing)\b
    - id: Pattern_au_top500_416_sealed_court_filing_records_label_context
      pattern: (?i)\\b(?:sealed\\s+court\\s+filing\\s+records|sealed|court|filing|top500)\\b
  keywords:
    - id: Evidence_sealed_court_filing_records
      groups:
        - match_style: word
          terms:
            - sealed court filing records
            - sealed filing
            - suppression order
            - non-publication order
            - restricted court record
            - closed court
            - confidential filing
            - court seal
            - redacted filing
            - judicial order
            - protected record
            - in camera hearing
    - id: Keyword_au_top500_416_sealed_court_filing_records_domain_context
      groups:
        - match_style: word
          terms:
            - sealed court filing records
            - sealed
            - court
            - filing
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
