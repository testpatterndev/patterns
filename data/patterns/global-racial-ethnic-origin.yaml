schema: testpattern/v1
name: Racial or Ethnic Origin
slug: global-racial-ethnic-origin
version: 1.2.0
type: keyword_list
pattern_class: concept
engine: universal
description: >-
  Detects racial or ethnic origin information in person-linked demographic, workforce,
  intake, census, application, and case records. The detector recognises explicit
  racial/ethnic-origin phrases and structured race or ethnicity fields, then raises confidence
  only when the same span contains a data-subject record and a populated attribution. Racial
  or ethnic origin is protected under GDPR Article 9 and Australian anti-discrimination and
  privacy law. Topic-grade detector, low confidence by design.
operation: >-
  The primary regex matches explicit racial/ethnic-origin terminology and structured race or
  ethnicity labels. The 65 tier is discovery-only. The 75 tier additionally requires a
  person-record context, and the 85 tier requires a populated attribution such as "recorded
  as" or "selected category". Public aggregate, methodology, policy, academic, and blank-form
  contexts are excluded from every tier. This is not a structured-token detector.
pattern: '(?i)\b(?:racial\s+(?:or\s+ethnic\s+)?origin|ethnic\s+origin|race\s+(?:and|or)\s+ethnicity|racial\/ethnic\s+(?:origin|background|group|category)|ethnic\s+background|(?:race|ethnicity)\s*(?::|(?:demographic\s+)?(?:field|category|code|response))|racial\s+identity|ethnic\s+identity)\b'
confidence: low
confidence_justification: >-
  Low by design. Racial or ethnic origin is a GDPR Article 9 special category with no fixed
  format, so it is detected purely by topic vocabulary. The bare word "origin" appears
  constantly in unrelated contexts (country of origin on customs/shipping forms, "original"
  documents); the regex is scoped to full disclosure phrases only, and hits should be paired
  with corroborative keywords (race, ethnicity, ancestry) to raise precision.
jurisdictions:
  - global
  - au
  - eu
regulations:
  - GDPR
  - Privacy Act 1988 (Cth)
  - Racial Discrimination Act 1975 (Cth)
frameworks:
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - race
    - ethnicity
    - ethnic
    - ancestry
    - heritage
    - diversity survey
  proximity: 300
test_cases:
  should_match:
    - value: 'Ethnic origin disclosure topic pending review.'
      description: Exact 65 discovery probe - protected-attribute topic without a data-subject record
    - value: 'Employee diversity survey includes an ethnic origin field.'
      description: Exact 75 probe - workforce record context without a populated value
    - value: 'Employee record: ethnic origin recorded as Torres Strait Islander; selected category confirmed.'
      description: Exact 85 probe - person record plus populated origin attribution
    - value: 'The diversity survey asks employees to record ethnic origin voluntarily.'
      description: Ethnic origin phrase present
    - value: 'Profile field captures racial identity alongside other equity data.'
      description: Racial identity phrase present
    - value: 'The intake form lists ethnic background under demographic information.'
      description: Ethnic background phrase present
    - value: 'Patient intake record records ethnicity: Maori.'
      description: Structured ethnicity label in a person record
  should_not_match:
    - value: 'Country of origin: Australia, per the customs declaration.'
      description: Near-miss ("origin" alone, "country of origin"), no racial/ethnic origin disclosure
    - value: 'The original document was notarized by a public official.'
      description: Unrelated root-word near-miss ("original" vs "origin")
    - value: 'The restaurant offers a variety of ethnic cuisines.'
      description: Topical mention ("ethnic" alone), no personal disclosure phrase
    - value: 'Public aggregate report on population ancestry statistics by region.'
      description: Public aggregate material is not a person-linked racial/ethnic disclosure
    - value: 'Sample template: employee diversity response, ancestry category recorded as Example Category.'
      description: Adjacent template language is not a populated protected-attribute record
    - value: 'Data subject profile records nationality as Canadian.'
      description: Sibling nationality attribute does not satisfy the racial/ethnic-origin primary
false_positives:
  - description: >-
      The bare word "origin" appears in unrelated contexts (country of origin on
      customs/shipping documents, "original" documents) that have nothing to do with racial
      or ethnic origin.
    mitigation: >-
      The regex targets full disclosure phrases and structured race/ethnicity labels rather
      than the bare word "origin"; enforcement requires a person-record context, and the high
      tier also requires an attribution signal.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: broad
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_global_racial_ethnic_origin
      matches:
        - ref: Evidence_origin_record_context
        - ref: Evidence_origin_value_assignment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_origin_public_context
    - confidence_level: 75
      id_match: Pattern_global_racial_ethnic_origin
      matches:
        - ref: Evidence_origin_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_origin_public_context
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_global_racial_ethnic_origin
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_origin_public_context
  regexes:
    - id: Pattern_global_racial_ethnic_origin
      pattern: '(?i)\b(?:racial\s+(?:or\s+ethnic\s+)?origin|ethnic\s+origin|race\s+(?:and|or)\s+ethnicity|racial\/ethnic\s+(?:origin|background|group|category)|ethnic\s+background|(?:race|ethnicity)\s*(?::|(?:demographic\s+)?(?:field|category|code|response))|racial\s+identity|ethnic\s+identity)\b'
  keywords:
    - id: Evidence_origin_record_context
      groups:
        - match_style: word
          terms:
            - data subject profile
            - patient intake
            - employee record
            - personnel record
            - diversity survey
            - client intake
            - census response
            - application record
            - demographic profile
            - case file
      strength: domain
    - id: Evidence_origin_value_assignment
      groups:
        - match_style: word
          terms:
            - value recorded
            - recorded as
            - selected option
            - selected category
            - self-identifies
            - self-described
            - 'ethnicity:'
            - 'race:'
            - response code
            - category assigned
            - stated ancestry
      strength: specific
    - id: Evidence_origin_public_context
      groups:
        - match_style: word
          terms:
            - public dataset
            - public aggregate
            - aggregate report
            - aggregate statistics
            - census methodology
            - academic paper
            - academic study
            - policy document
            - policy guidance
            - blank form
            - blank questionnaire
      strength: exclusion
risk_rating: 7
risk_description: >-
  A true positive attributes racial or ethnic origin to a person in a demographic, workforce,
  intake, or case record. Disclosure can enable discrimination, profiling, harassment, or
  exclusion, while the normal single-person record does not by itself establish the scale or
  severe consequence required for PROTECTED. Risk 7 and SENSITIVE Personal-Privacy are
  appropriate.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI Basic
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-07-12'
updated: '2026-07-19'
changelog:
  - version: 1.2.0
    date: '2026-07-19'
    description: 'Consolidate the retired Australian alias into the global detector: add Australian legal coverage and workforce/intake evidence, recognise structured race and ethnicity fields, retain 65 discovery, and require person-record plus populated attribution evidence at 75/85.'
  - version: 1.1.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: add a 65 topic-discovery tier, a 75 data-subject-record tier, and an 85 populated origin-attribution tier, with exact-tier and sibling/public/template probes.'
  - version: 1.0.0
    date: '2026-07-12'
    description: 'New pattern: replaces the deprecated au/global-top500-017-ethnicity-or-race attribute-value patterns (needs-EDM/ML) with an honest topic-classifier concept, modeled on global-political-opinion. Fills the D-wave coverage gap logged in c3-deprecation-report.md.'
author: testpattern-community
license: MIT
keywords:
  - racial or ethnic origin
  - racial origin
  - ethnic origin
  - race and ethnicity
  - race or ethnicity
  - racial/ethnic origin
  - ethnic background
  - ethnicity demographic field
  - ethnicity field
  - ethnicity category
  - 'ethnicity:'
  - 'race:'
  - racial identity
  - ethnic identity
references:
  - url: https://gdpr-info.eu/art-9-gdpr/
    title: GDPR Article 9 — processing of special categories of personal data (racial or ethnic origin)
  - url: https://humanrights.gov.au/our-work/race-discrimination
    title: Race discrimination — Australian Human Rights Commission
