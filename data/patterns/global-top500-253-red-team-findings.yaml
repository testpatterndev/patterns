schema: testpattern/v1
name: Red team findings
slug: global-top500-253-red-team-findings
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies red team findings patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:red\s+team|adversary\s+simulation|attack\s+simulation|red\s+team\s+exercise|security\s+assessment|offensive\s+security|blue\s+team|purple\s+team|threat\s+emulation|red\s+team\s+engagement)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - red team findings
    - red
    - team
    - findings
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: red team
      description: Primary topic phrase match
    - value: adversary simulation
      description: Case-insensitive topic phrase match
    - value: attack simulation
      description: Alternative topic phrase match
    - value: red team exercise
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_red_team_findings
      matches:
        - ref: Pattern_global_top500_253_red_team_findings_label_context
        - ref: Keyword_global_top500_253_red_team_findings_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_red_team_findings
      matches:
        - ref: Keyword_red_team_findings
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_red_team_findings
      pattern: >-
        (?is)\b(?:red\s+team|adversary\s+simulation|attack\s+simulation|red\s+team\s+exercise|security\s+assessment|offensive\s+security|blue\s+team|purple\s+team|threat\s+emulation|red\s+team\s+engagement)\b
    - id: Pattern_global_top500_253_red_team_findings_label_context
      pattern: (?i)\b(?:red\s+team\s+findings)\b
  keywords:
    - id: Keyword_red_team_findings
      groups:
        - match_style: word
          terms:
            - red team
            - adversary simulation
            - attack simulation
            - red team exercise
            - security assessment
            - offensive security
            - blue team
            - purple team
            - threat emulation
            - red team engagement
      strength: specific
    - id: Keyword_global_top500_253_red_team_findings_domain_context
      groups:
        - match_style: word
          terms:
            - red team findings
            - red
            - team
            - findings
      strength: domain
risk_description: >-
  The pattern matches red team, adversary simulation, attack simulation, or red team exercise language, signalling offensive-security material without confirming that findings are present. A genuine findings record can reveal successful intrusion paths, detection blind spots, persistence techniques, and remediation gaps that an attacker could reproduce. Exercise plans, marketing content, and general security discussion can match, and one engagement is limited by its tested scope and date. Risk 7 SENSITIVE reflects moderate harm from exposing substantive findings; PROTECTED would require validated critical access or significant consequences shown in the underlying report.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
