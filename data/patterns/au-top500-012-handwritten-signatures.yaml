schema: testpattern/v1
name: Handwritten signatures
slug: au-top500-012-handwritten-signatures
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to handwritten signatures in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: biometric-behavioral. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:handwritten\s+signature|signed\s+by|wet\s+signature|specimen\s+signature|signature\s+sample|signature\s+card|authorised\s+signature|signature\s+verification|manual\s+signature)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - handwritten signatures
    - handwritten
    - signatures
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:
    - biometric-behavioral
test_cases:
  should_match:
    - value: handwritten signature
      description: Primary topic phrase match
    - value: signed by
      description: Case-insensitive topic phrase match
    - value: wet signature
      description: Alternative topic phrase match
    - value: specimen signature
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to handwritten signatures appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_handwritten_signatures
      matches:
        - ref: Evidence_handwritten_signatures
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_012_handwritten_signatures_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_handwritten_signatures
      matches:
        - ref: Evidence_handwritten_signatures
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_012_handwritten_signatures_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_handwritten_signatures
      matches:
        - ref: Evidence_handwritten_signatures
  regexes:
    - id: Pattern_handwritten_signatures
      pattern: (?is)\b(?:handwritten\s+signature|signed\s+by|wet\s+signature|specimen\s+signature|signature\s+sample|signature\s+card|authorised\s+signature|signature\s+verification|manual\s+signature)\b
    - id: Pattern_au_top500_012_handwritten_signatures_label_context
      pattern: (?i)\\b(?:handwritten\\s+signatures|handwritten|signatures|top500)\\b
  keywords:
    - id: Evidence_handwritten_signatures
      groups:
        - match_style: word
          terms:
            - handwritten signature
            - signature
            - signed by
            - wet signature
            - specimen signature
            - signature sample
            - signature card
            - authorised signature
            - signature verification
            - manual signature
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_012_handwritten_signatures_domain_context
      groups:
        - match_style: word
          terms:
            - handwritten signatures
            - handwritten
            - signatures
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_012_handwritten_signatures_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
