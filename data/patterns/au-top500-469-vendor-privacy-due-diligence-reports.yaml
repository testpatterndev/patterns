schema: testpattern/v1
name: Vendor privacy due diligence reports
slug: au-top500-469-vendor-privacy-due-diligence-reports
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to vendor privacy due diligence reports in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: corporate-m-and-a.'
pattern: (?is)\b(?:vendor\s+privacy\s+due\s+diligence\s+reports|vendor\s+assessment|due\s+diligence|third[\s-]+party\s+risk|supplier\s+privacy|data\s+processing\s+agreement|privacy\s+maturity|security\s+posture|vendor\s+management)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - vendor privacy due diligence reports
    - vendor
    - privacy
    - due
    - diligence
    - reports
    - compliance
    - risk
  proximity: 300
  keyword_lists:

    - corporate-m-and-a
test_cases:
  should_match:
    - value: vendor privacy due diligence reports
      description: Primary topic phrase match
    - value: vendor assessment
      description: Case-insensitive topic phrase match
    - value: due diligence
      description: Alternative topic phrase match
    - value: third-party risk
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to vendor privacy due diligence reports appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_vendor_diligence
      matches:
        - ref: Evidence_vendor_diligence
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_vendor_diligence
      matches:
        - ref: Evidence_vendor_diligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_vendor_diligence
      matches:
        - ref: Evidence_vendor_diligence
  regexes:
    - id: Pattern_vendor_diligence
      pattern: (?is)\b(?:vendor\s+privacy\s+due\s+diligence\s+reports|vendor\s+assessment|due\s+diligence|third[\s-]+party\s+risk|supplier\s+privacy|data\s+processing\s+agreement|privacy\s+maturity|security\s+posture|vendor\s+management)\b
  keywords:
    - id: Evidence_vendor_diligence
      groups:
        - match_style: word
          terms:
            - vendor privacy due diligence reports
            - vendor assessment
            - due diligence
            - third-party risk
            - supplier privacy
            - data processing agreement
            - sub-processor
            - privacy maturity
            - security posture
            - privacy
            - compliance
            - vendor management
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
