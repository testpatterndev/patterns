schema: testpattern/v1
name: Sanctions screening matches
slug: global-top500-134-sanctions-screening-matches
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to sanctions screening matches in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:sanctions\s+screening|SDN\s+list|designated\s+persons|sanctions\s+match|prohibited\s+party|denied\s+persons\s+list|sanctions\s+compliance|watchlist\s+screening|politically\s+exposed\s+person|DFAT\s+sanctions)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - sanctions screening matches
    - sanctions
    - screening
    - matches
    - credit
    - lending
    - insurance
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: sanctions screening
      description: Primary topic phrase match
    - value: sdn list
      description: Case-insensitive topic phrase match
    - value: designated persons
      description: Alternative topic phrase match
    - value: sanctions match
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_sanctions_screening_matches
      matches:
        - ref: Pattern_global_top500_134_sanctions_screening_matches_label_context
        - ref: Keyword_global_top500_134_sanctions_screening_matches_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_134_sanctions_screening_matches_noise_exclusion
    - confidence_level: 75
      id_match: Regex_sanctions_screening_matches
      matches:
        - ref: Keyword_sanctions_screening_matches
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_134_sanctions_screening_matches_noise_exclusion
    - confidence_level: 65
      id_match: Regex_sanctions_screening_matches
      matches:
        - ref: Keyword_sanctions_screening_matches
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_134_sanctions_screening_matches_noise_exclusion
  regexes:
    - id: Regex_sanctions_screening_matches
      pattern: (?is)\b(?:sanctions\s+screening|SDN\s+list|designated\s+persons|sanctions\s+match|prohibited\s+party|denied\s+persons\s+list|sanctions\s+compliance|watchlist\s+screening|politically\s+exposed\s+person|DFAT\s+sanctions)\b
    - id: Pattern_global_top500_134_sanctions_screening_matches_label_context
      pattern: (?i)\\b(?:sanctions\\s+screening\\s+matches|sanctions|screening|matches|top500)\\b
  keywords:
    - id: Keyword_sanctions_screening_matches
      groups:
        - match_style: word
          terms:
            - sanctions screening
            - OFAC
            - SDN list
            - designated persons
            - sanctions match
            - prohibited party
            - denied persons list
            - embargo
            - sanctions compliance
            - watchlist screening
            - politically exposed person
            - DFAT sanctions
    - id: Keyword_global_top500_134_sanctions_screening_matches_domain_context
      groups:
        - match_style: word
          terms:
            - sanctions screening matches
            - sanctions
            - screening
            - matches
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_134_sanctions_screening_matches_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
