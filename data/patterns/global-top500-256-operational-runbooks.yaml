schema: testpattern/v1
name: Operational runbooks
slug: global-top500-256-operational-runbooks
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies operational runbooks patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:operational\s+runbook|runbook\s+procedure|incident\s+response|escalation\s+procedure|troubleshooting\s+guide|standard\s+operating\s+procedure|on[\s-]+call\s+playbook|recovery\s+procedure|maintenance\s+runbook|operations\s+manual)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - operational runbooks
    - operational
    - runbooks
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: operational runbook
      description: Primary topic phrase match
    - value: runbook procedure
      description: Case-insensitive topic phrase match
    - value: incident response
      description: Alternative topic phrase match
    - value: escalation procedure
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_operational_runbooks
      matches:
        - ref: Pattern_global_top500_256_operational_runbooks_label_context
        - ref: Keyword_global_top500_256_operational_runbooks_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_operational_runbooks
      matches:
        - ref: Keyword_operational_runbooks
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_operational_runbooks
      matches:
        - ref: Keyword_operational_runbooks
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_operational_runbooks
      pattern: >-
        (?is)\b(?:operational\s+runbook|runbook\s+procedure|incident\s+response|escalation\s+procedure|troubleshooting\s+guide|standard\s+operating\s+procedure|on[\s-]+call\s+playbook|recovery\s+procedure|maintenance\s+runbook|operations\s+manual)\b
    - id: Pattern_global_top500_256_operational_runbooks_label_context
      pattern: (?i)\\b(?:operational\\s+runbooks|operational|runbooks|top500)\\b
  keywords:
    - id: Keyword_operational_runbooks
      groups:
        - match_style: word
          terms:
            - operational runbook
            - runbook procedure
            - incident response
            - escalation procedure
            - troubleshooting guide
            - standard operating procedure
            - on-call playbook
            - recovery procedure
            - maintenance runbook
            - operations manual
    - id: Keyword_global_top500_256_operational_runbooks_domain_context
      groups:
        - match_style: word
          terms:
            - operational runbooks
            - operational
            - runbooks
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
