schema: testpattern/v1
name: Water treatment dosing formulas
slug: global-top500-446-water-treatment-dosing-formulas
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive water-treatment dosing formulas and control values. Topic phrases are retained
  for discovery; enforcement requires a populated dose, concentration, feed rate, or process value, and
  high confidence also requires a treatment-plant asset, process, or control-tag reference.
operation: >-
  Regex_water_treatment_dosing recognises water-treatment dosing, chlorine, coagulant, fluoride, and
  pH-control topics. The topic alone is discovery-only at 65. A numeric dose, concentration, or feed
  rate raises it to 75; that value plus a treatment-plant asset, process train, dosing pump, or control
  tag reaches 85. Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:water\s+treatment\s+dosing\s+formula|dosing\s+formula|chlorine\s+dosage|coagulant\s+dose|fluoride\s+dosing|pH\s+setpoint)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires a populated engineering value rather than a water-treatment topic alone.
  High confidence adds plant/process context, reducing matches on public guidance and chemistry lessons.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - water treatment dosing formulas
    - water
    - treatment
    - dosing
    - formulas
    - critical
    - infrastructure
    - systems
  proximity: 300
  keyword_lists:
    - infrastructure-water
test_cases:
  should_match:
    - value: water treatment dosing formula
      description: Low-tier probe - dosing topic without populated engineering values
    - value: 'Chlorine dosage formula: target residual 0.8 mg/L and dose 2.4 mg/L'
      description: Medium-tier probe - populated treatment values without a plant asset
    - value: 'North water treatment plant dosing formula: dosing pump DP-04, coagulant dose 18.5 mg/L, SCADA tag AIT-204'
      description: High-tier probe - populated dose with plant, pump, and control-tag detail
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: water treatment dosing
      description: Generic word pair from old broad template should not match
    - value: 'The public drinking-water guide explains why utilities disinfect water.'
      description: Public guidance without a dosing formula or populated plant value
    - value: 'Training example: water treatment dosing formula for pump DP-04 at 18.5 mg/L'
      description: Explicit training content must not enforce
false_positives:
  - description: Public health guidance and chemistry material discuss chlorine, pH, coagulants, and water treatment without revealing a utility's operating values.
    mitigation: Keep topic-only matches discovery-only and require a populated dose, concentration, or feed rate for enforcement.
  - description: Worked examples can contain plausible pump names, control tags, and dosing values.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_water_treatment_dosing
      matches:
        - ref: Evidence_dosing_value
        - ref: Evidence_water_plant_asset
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_water_treatment_dosing
      matches:
        - ref: Evidence_dosing_value
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_water_treatment_dosing
  regexes:
    - id: Regex_water_treatment_dosing
      pattern: >-
        (?is)\b(?:water\s+treatment\s+dosing\s+formula|dosing\s+formula|chlorine\s+dosage|coagulant\s+dose|fluoride\s+dosing|pH\s+setpoint)\b
    - id: Evidence_dosing_value
      pattern: '(?i)\b\d+(?:\.\d+)?\s*(?:mg/L|ppm|mL/min|L/h|kg/day|percent)\b'
  keywords:
    - id: Evidence_water_plant_asset
      groups:
        - match_style: word
          terms:
            - water treatment plant
            - treatment plant
            - dosing pump
            - chlorine contact tank
            - reservoir
            - process train
            - plant ID
            - potable water
            - coagulant
            - fluoridation
            - text: SCADA
              case_sensitive: true
            - control tag
      strength: specific
risk_description: >-
  The concept regex flags water-treatment, dosing-formula, chlorine-dosage, pH-setpoint, chemical-dosing, treatment-plant, potable-water, and residual-chlorine language rather than extracting numeric recipes or confirming a live control sheet. A genuine formula can expose chemical ratios and operating targets that support process interference, unsafe dosing, or copying of a utility's treatment method. The normal unit is one plant or treatment process and the operators and community it serves, while public water guidance, training, and vendor documentation can trigger the same terms. For the global catalogue analogue, the confirmed substantive record is the consequence unit. Authentic plant formulas and adjustment rules expose treatment tolerances and can support contamination or loss of safe water. Significant public-health and essential-service damage is inherent. Risk 10 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require plant/process identity, concentrations, dosing values, adjustment rules or control tags; public chemistry guidance remains excluded. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
