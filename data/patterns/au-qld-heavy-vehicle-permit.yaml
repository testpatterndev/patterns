schema: testpattern/v1
name: QLD Heavy Vehicle Permit
slug: au-qld-heavy-vehicle-permit
version: 1.3.1
type: keyword_list
pattern_class: concept
description: Detects QLD heavy vehicle permits and transport operator access permissions.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - IPA 2009 (Qld)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - DISP
  - ISO 27001
  - NIST CSF
data_categories:
  - government
  - transport
test_cases:
  should_match:
    - value: 'Heavy vehicle permit: NHVR access permit for B-double route assessment'
      description: Test match 1
    - value: QLD oversize over-dimensional transport permit application
      description: Test match 2
    - value: National Heavy Vehicle Regulator road train mass limit permit
      description: Test match 3
  should_not_match:
    - value: Heavy rain expected tomorrow
      description: Non-match 1
    - value: Vehicle service appointment
      description: Non-match 2
false_positives:
  - description: Generic vehicle or heavy references.
    mitigation: Require NHVR or heavy vehicle permit specific terms.
exports:
  - yaml
scope: narrow
risk_rating: 5
risk_description: >-
  This concept pattern detects Queensland heavy-vehicle and NHVR access permits, including oversize or over-dimensional movements, B-double routes, road-train permissions, mass limits, and route assessments. A completed permit may reveal an operator, vehicle, route, timing, and transport constraints that could support targeted theft or disruption when correlated with valuable cargo information. The normal document is routine transport administration and does not itself identify cargo, a protected movement, or critical logistics. Risk 5 OFFICIAL captures the bounded operational value; SENSITIVE is not met without sensitive cargo, precise live movement schedules, protected routes, or critical-supply consequences.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_heavy_vehicle
      matches:
        - ref: Evidence_heavy_vehicle
        - ref: Evidence_tmr_forms
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_osom_permit
      matches:
        - ref: Evidence_qld_government
  regexes:
    - id: Pattern_heavy_vehicle
      pattern: (?i)\b(?:heavy\s+vehicle\s+(?:permit|access)|(?:oversize|overmass)\s+(?:permit|vehicle)|osom|hvams)\b
    - id: Pattern_osom_permit
      pattern: (?i)\b(?:class\s+1\s+load|excess\s+(?:dimension|mass)|heavy\s+vehicle\s+guideline)\b
  keywords:
    - id: Evidence_heavy_vehicle
      groups:
        - match_style: word
          terms:
            - heavy vehicle
            - oversize
            - overmass
            - OSOM
            - HVAMS
            - Class 1 load
            - excess dimension
            - heavy vehicle permit
            - access permit
      strength: domain
    - id: Evidence_tmr_forms
      groups:
        - match_style: word
          terms:
            - Transport and Main Roads
            - text: TMR
              case_sensitive: true
            - Department of Transport
            - F3000
            - F3520
            - F3525
            - Customer Reference Number
            - text: CRN
              case_sensitive: true
      strength: domain
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
created: '2026-02-09'
