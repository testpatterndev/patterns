schema: testpattern/v1
name: QLD Heavy Vehicle Permit
slug: au-qld-heavy-vehicle-permit
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies Queensland heavy-vehicle access permit applications and issued permit records for
  oversize, overmass, Class 1, B-double, and road-train movements. Queensland topic context is
  discovery-only; enforcement requires operator, vehicle, route, or access-condition fields, while
  high confidence also requires a labelled permit/application reference and NHVR authority context.
operation: >-
  Pattern_heavy_vehicle_permit recognises heavy-vehicle access permit topics. A Queensland-context
  topic is discovery-only at 65. Queensland context plus at least two distinct permit-record fields
  reaches 75. Three record fields, a labelled permit/application reference, and National Heavy
  Vehicle Regulator context reach 85. The 75 and 85 tiers reject explicit template, sample, demo,
  tutorial, and training-example content.
pattern: >-
  (?i)\b(?:Queensland|QLD|TMR)\s+(?:NHVR\s+)?(?:heavy\s+vehicle|(?:oversize|overmass|over\s+mass|over[\s-]?dimensional|excess\s+(?:mass|dimension)|OSOM)(?:\s+(?:heavy\s+)?vehicle)?|Class\s+1\s+(?:heavy\s+vehicle|load(?:\s+carrying\s+vehicle)?)|B[\s-]?double|road\s+train)\s+(?:access\s+)?permit(?:\s+application)?\b
confidence: medium
confidence_justification: >-
  Medium confidence requires Queensland context and multiple independent permit-record fields. High
  confidence adds both a labelled reference value and NHVR authority evidence.
jurisdictions:
  - au
regulations:
  - IPA 2009 (Qld)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - DISP
  - ISO 27001
  - NIST CSF
data_categories:
  - government
  - transport
test_cases:
  should_match:
    - value: Queensland heavy vehicle access permit
      description: 65-confidence probe - Queensland permit topic without record fields
    - value: 'Queensland heavy vehicle access permit application: registered operator and route/area description'
      description: 75-confidence probe - Queensland permit topic with two independent application fields
    - value: 'Queensland NHVR heavy vehicle access permit application Permit Number: QLD-HV-2026-1842; registered operator, vehicle configuration, and approved route'
      description: 85-confidence probe - formal reference, NHVR authority, and three record fields
  should_not_match:
    - value: Heavy rain expected tomorrow
      description: Incidental use of heavy
    - value: Vehicle service appointment
      description: Generic vehicle administration
    - value: 'NSW heavy vehicle access permit application: registered operator and approved route'
      description: Foreign state permit record without Queensland context
    - value: 'New Zealand oversize vehicle permit application: operator details and route/area description'
      description: Foreign national permit terminology
    - value: Queensland guide to heavy vehicle access permit fees and eligibility
      description: Public guidance without permit-record fields
    - value: 'Training example: Queensland NHVR heavy vehicle access permit Permit Number: QLD-HV-2026-1842; registered operator, vehicle configuration, approved route'
      description: Explicit training content must not enforce
false_positives:
  - description: Heavy-vehicle guidance, fee pages, route notices, and industry material can discuss access permits without containing an application or issued permit.
    mitigation: Keep Queensland topic-only matches discovery-only and require multiple operator, vehicle, route, or condition fields for enforcement.
  - description: Other Australian states and countries use the same heavy-vehicle, oversize, overmass, and access-permit language.
    mitigation: Require explicit Queensland, QLD, TMR, or Queensland-government context at every tier.
  - description: Training and fixture documents can contain realistic NHVR references, permit numbers, and route details.
    mitigation: Reject explicit template, sample-data, demo, tutorial, and training-example framing at enforcing tiers.
exports:
  - yaml
scope: narrow
risk_rating: 5
risk_description: >-
  This concept pattern inventories Queensland heavy-vehicle access-permit topics but only enforces on
  application or permit-record fields; its strongest tier also requires a labelled reference and NHVR
  authority context. A completed permit may reveal an operator, vehicle, route, timing, and transport
  constraints that could support targeted theft or disruption when correlated with valuable cargo
  information. The normal document is routine transport administration and does not itself identify
  cargo, a protected movement, or critical logistics. Risk 5 OFFICIAL captures the bounded operational
  value; SENSITIVE is not met without sensitive cargo, precise live movement schedules, protected
  routes, or critical-supply consequences.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_heavy_vehicle_permit
      matches:
        - ref: Evidence_qld_context
        - ref: Evidence_permit_record_fields
          min_count: 3
          unique_results: true
        - ref: Pattern_labelled_permit_reference
        - ref: Evidence_nhvr_authority
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_heavy_vehicle_permit
      matches:
        - ref: Evidence_qld_context
        - ref: Evidence_permit_record_fields
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_heavy_vehicle_permit
      matches:
        - ref: Evidence_qld_context
  regexes:
    - id: Pattern_heavy_vehicle_permit
      pattern: >-
        (?i)\b(?:heavy\s+vehicle\s+(?:access\s+)?permit(?:\s+application)?|NHVR\s+(?:access\s+)?permit(?:\s+application)?|(?:oversize|overmass|over\s+mass|over[\s-]?dimensional|excess\s+(?:mass|dimension)|OSOM)(?:\s+(?:heavy\s+)?vehicle)?\s+(?:access\s+)?permit(?:\s+application)?|Class\s+1\s+(?:heavy\s+vehicle|load(?:\s+carrying\s+vehicle)?)\s+(?:access\s+)?permit|(?:B[\s-]?double|road\s+train)\s+(?:access\s+)?permit)\b
    - id: Pattern_labelled_permit_reference
      pattern: >-
        (?i)\b(?:permit|application|reference)\s*(?:number|no\.?|reference|ref\.?)?\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{4,}\b
  keywords:
    - id: Evidence_qld_context
      groups:
        - match_style: word
          terms:
            - Queensland
            - Queensland Government
            - State of Queensland
            - qld.gov.au
            - Transport and Main Roads
            - text: QLD
              case_sensitive: true
            - text: TMR
              case_sensitive: true
      strength: specific
    - id: Evidence_permit_record_fields
      groups:
        - match_style: word
          terms:
            - registered operator
            - vehicle description
            - vehicle configuration
            - axle configuration
            - gross vehicle mass
            - route/area description
            - approved route
            - origin
            - destination
            - requested travel date
            - pilot vehicle
            - escort vehicle
            - travel conditions
            - access conditions
            - permit conditions
      strength: domain
    - id: Evidence_nhvr_authority
      groups:
        - match_style: word
          terms:
            - National Heavy Vehicle Regulator
            - NHVR Portal
            - National Automated Access System
            - text: NHVR
              case_sensitive: true
            - text: NAAS
              case_sensitive: true
      strength: specific
created: '2026-02-09'
updated: '2026-07-18'
changelog:
  - version: 1.4.0
    date: '2026-07-18'
    description: >-
      Profile quality hardening: convert the keyword-list concept to a regex-backed detector with
      exact 65/75/85 tiers. Keep Queensland permit topics discovery-only at 65, require multiple
      permit-record fields at 75, and require a labelled reference plus NHVR authority at 85. Replace
      copied TMR form-number context with heavy-vehicle-specific evidence and add foreign-jurisdiction,
      guidance, and training negatives.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 581 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
