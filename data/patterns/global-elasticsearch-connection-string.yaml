schema: testpattern/v1
name: Elasticsearch URI with Credentials
slug: global-elasticsearch-connection-string
version: 1.3.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Elasticsearch URI with Credentials patterns.
operation: 'Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: https?://[^:]+:[^@]+@[^\s'"]*elastic[^\s'"]*
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: https://admin:secret@elasticsearch.internal:9200
      description: Exact 65 probe - complete credential URI without independent config labeling
    - value: 'ELASTICSEARCH_URL=http://user:p4ssw0rd@elastic-prod.internal'
      description: Exact 75 probe - credential URI in a provider-specific config field
    - value: 'Elastic Cloud cluster ELASTIC_CLOUD_URL=https://elastic:S3cretValue@deployment.es.australia-southeast1.gcp.elastic-cloud.com:9243'
      description: Exact 85 probe - provider config label plus managed-cluster topology
  should_not_match:
    - value: https://elastic.example.com/search
      description: Missing credentials (no user:pass@ section)
    - value: elastic://user:pass@localhost:9200
      description: Wrong scheme (elastic:// instead of http/https)
    - value: 'OPENSEARCH_URL=https://admin:secret@search.example.internal:9200'
      description: Sibling search provider connection does not match Elasticsearch host structure
    - value: 'https://admin@elasticsearch.internal:9200'
      description: Malformed URI is missing the password separator
    - value: 'Documentation example: Elastic Cloud cluster ELASTIC_CLOUD_URL=https://elastic:changeme@deployment.es.example.elastic-cloud.com:9243'
      description: Documentation placeholder with managed topology is excluded
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_description: >-
  This SIT finds an HTTP or HTTPS Elasticsearch URI containing username, password, and an elastic-labelled host, so the match supplies both target and login material. A person receiving a valid URI can attempt to query, alter, or delete indices within that account's cluster permissions. The normal affected unit is one Elasticsearch identity and reachable cluster, potentially impacting indexed records and service availability, while localhost, samples, and revoked credentials reduce real exposure. Risk 8 SENSITIVE captures serious but bounded database-service harm; PROTECTED needs evidence of privileged cluster administration, critical operations, or protected data at significant scale.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_elasticsearch_connection
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_elasticsearch_connection
      matches:
        - ref: Pattern_elasticsearch_config_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_elasticsearch_connection
      matches:
        - ref: Pattern_elasticsearch_config_label
        - ref: Pattern_elasticsearch_managed_topology
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_elasticsearch_connection
      pattern: https?://[^:]+:[^@]+@[^\s'"]*elastic[^\s'"]*
    - id: Pattern_elasticsearch_config_label
      pattern: (?i)\b(?:ELASTICSEARCH_URL|ELASTIC_CLOUD_URL)\s*[=:]
    - id: Pattern_elasticsearch_managed_topology
      pattern: (?i)(?:\.es\.[A-Za-z0-9.-]+|\.elastic-cloud\.com|:9243\b)
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 1.3.2
    date: '2026-07-19'
    description: 'Replace duplicated high tiers with an individual 65 URI discovery / 75 Elasticsearch-config / 85 managed-topology contract and exact-tier, sibling-provider, malformed, and documentation probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1226 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
