schema: testpattern/v1
name: Refinery process control setpoints
slug: global-top500-449-refinery-process-control-setpoints
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive refinery process-control setpoint and operating-envelope records. Topic
  phrases are retained for discovery; enforcement requires an actual process value, and high confidence
  also requires a control-loop tag or named refinery process asset.
operation: >-
  Regex_refinery_process_control recognises refinery, crude-unit, distillation-unit, reactor, and
  refinery-loop control topics. The topic alone is discovery-only at 65. A numeric temperature,
  pressure, flow, percentage, SP/PV/OP, or similar process value raises it to 75; a value plus a
  control tag or named process asset reaches 85. Enforcing tiers reject explicit templates and training.
pattern: (?is)\b(?:refinery\s+process\s+control|refinery\s+control\s+loop|crude\s+(?:distillation\s+)?unit|distillation\s+unit|reactor\s+temperature|refinery\s+operating\s+parameter|refinery\s+safety\s+limit)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires a populated process value rather than general control-engineering prose.
  High confidence adds a refinery asset or loop tag, reducing matches on standards and textbooks.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - refinery process control setpoints
    - refinery
    - process
    - control
    - setpoints
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: refinery process control setpoints
      description: Low-tier probe - topic without a populated process value
    - value: 'Crude distillation unit operating parameter: reactor temperature SP=365 C and pressure 18.5 bar'
      description: Medium-tier probe - populated refinery process values without a control tag
    - value: 'Refinery control loop TIC-204 on the crude unit: SP=365 C, high alarm 380 C, valve output 64%'
      description: High-tier probe - process values with a loop tag and named process asset
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: refinery setpoint
      description: Generic word pair from old broad template should not match
    - value: 'The chemical-engineering textbook introduces PID process control.'
      description: Generic educational control theory, not refinery setpoint data
    - value: 'Worked example: refinery control loop TIC-204 SP=365 C and pressure 18.5 bar'
      description: Explicit worked example must not enforce
false_positives:
  - description: Process-control standards, textbooks, and vendor manuals discuss loops, PID control, temperatures, and safety limits without exposing refinery operating data.
    mitigation: Require a refinery/crude/distillation/reactor topic and a populated process value before enforcement.
  - description: Worked examples can contain realistic loop tags and engineering values.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and worked-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_refinery_process_control
      matches:
        - ref: Evidence_process_value
        - ref: Evidence_refinery_asset_or_tag
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_refinery_process_control
      matches:
        - ref: Evidence_process_value
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_refinery_process_control
  regexes:
    - id: Regex_refinery_process_control
      pattern: (?is)\b(?:refinery\s+process\s+control|refinery\s+control\s+loop|crude\s+(?:distillation\s+)?unit|distillation\s+unit|reactor\s+temperature|refinery\s+operating\s+parameter|refinery\s+safety\s+limit)\b
    - id: Evidence_process_value
      pattern: '(?i)\b(?:(?:SP|PV|OP)\s*[:=]\s*-?\d+(?:\.\d+)?|-?\d+(?:\.\d+)?\s*(?:C|bar|kPa|MPa|psi|%|rpm|m3/h))\b'
  keywords:
    - id: Evidence_refinery_asset_or_tag
      groups:
        - match_style: word
          terms:
            - equipment tag
            - control tag
            - loop ID
            - unit ID
            - column ID
            - text: TIC
              case_sensitive: true
            - text: PIC
              case_sensitive: true
            - text: FIC
              case_sensitive: true
            - text: LIC
              case_sensitive: true
      strength: specific
risk_description: >-
  The detector flags process-control, loop, PID-controller, crude-unit, reactor-temperature, variable, valve, operating-parameter, and safety-limit language rather than extracting verified refinery setpoint values. A genuine control record can reveal temperatures, pressures, loop behavior, and safety boundaries that support process manipulation, equipment damage, production loss, or unsafe operation. The ordinary unit is one refinery unit or control loop and its operators, while control-engineering education, manuals, and generic diagrams can produce benign matches. For the global catalogue analogue, the confirmed substantive record is the consequence unit. Current operating envelopes and alarm behaviour can guide catastrophic process interference, fire, explosion or major environmental release. Significant organisational and life-safety damage is inherent. Risk 10 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require refinery/unit identity plus actual limits, control loops, tags or alarm values; engineering standards remain excluded. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
