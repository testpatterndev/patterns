        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_449_refinery_process_control_setpoints_noise_exclusion
    - confidence_level: 65
      id_match: Regex_refinery_process_control
      matches:
        - ref: Keyword_refinery_process_control
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_449_refinery_process_control_setpoints_noise_exclusion
  regexes:
