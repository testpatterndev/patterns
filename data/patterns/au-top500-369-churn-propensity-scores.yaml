schema: testpattern/v1
name: Churn propensity scores
slug: au-top500-369-churn-propensity-scores
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to churn propensity scores in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:churn\s+propensity\s+scores|propensity\s+score|retention\s+model|predictive\s+analytics|customer\s+lifetime\s+value|churn\s+prediction|risk\s+score|machine\s+learning\s+model|churn\s+rate|customer\s+retention)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - churn propensity scores
    - churn
    - propensity
    - scores
    - customer
    - commercial
    - data
  proximity: 300
test_cases:
  should_match:
    - value: churn propensity scores
      description: Primary topic phrase match
    - value: propensity score
      description: Case-insensitive topic phrase match
    - value: retention model
      description: Alternative topic phrase match
    - value: predictive analytics
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: customer invoice
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to churn propensity scores appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_churn_propensity_scores
      matches:
        - ref: Evidence_churn_propensity_scores
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_churn_propensity_scores
      matches:
        - ref: Evidence_churn_propensity_scores
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_churn_propensity_scores
      matches:
        - ref: Evidence_churn_propensity_scores
  regexes:
    - id: Pattern_churn_propensity_scores
      pattern: (?is)\b(?:churn\s+propensity\s+scores|propensity\s+score|retention\s+model|predictive\s+analytics|customer\s+lifetime\s+value|churn\s+prediction|risk\s+score|machine\s+learning\s+model|churn\s+rate|customer\s+retention)\b
  keywords:
    - id: Evidence_churn_propensity_scores
      groups:
        - match_style: word
          terms:
            - churn propensity scores
            - churn
            - propensity score
            - attrition
            - retention model
            - predictive analytics
            - customer lifetime value
            - churn prediction
            - risk score
            - machine learning model
            - churn rate
            - customer retention
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
