    description: 'TP-00159 approved reduced scope: remove the bare service number alternative from the primary regex (top-level and Pattern_military_service) — it satisfied its own identical evidence term from one phrase, letting customer/utility service numbers reach enforceable tiers against the SIT title; defence-qualified phrases (military service number, ADF number, regimental number, etc.) remain the primary and service number stays in Evidence_military_service as evidence-only corroboration. Identifier conversion (unsourced alphanumeric value grammar) deliberately rejected — concept semantics retained and stated in the description. Replaced the bare service number positive with regimental number and added customer, utility, and equipment service-number negatives.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 634 without changing detector or package metadata.'
  - version: 1.3.0
