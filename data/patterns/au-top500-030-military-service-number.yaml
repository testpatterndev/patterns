schema: testpattern/v1
name: Military service number
slug: au-top500-030-military-service-number
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to military service number in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988. Phrase-level concept detector: it matches defence-qualified service-number wording, not an issued numeric value; bare service number without defence context is out of the primary.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: au-government-defence-markers. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:military\s+service\s+number|military\s+identification|ADF\s+number|Australian\s+Defence\s+Force|defence\s+service|army\s+number|navy\s+number|air\s+force\s+number|regimental\s+number)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - military service number
    - military
    - service
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - au-government-defence-markers
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: military service number
      description: Primary topic phrase match
    - value: regimental number
      description: Defence-specific topic phrase match
    - value: military identification
      description: Alternative topic phrase match
    - value: ADF number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: Customer service number is 445566.
      description: Non-defence service number must not classify
    - value: Utility service number for the electricity account.
      description: Utility account decoy must not classify
    - value: Equipment service number recorded by maintenance.
      description: Equipment maintenance decoy must not classify
    - value: Army history exhibition opens Friday.
      description: Military topic without identifier language is insufficient
false_positives:
  - description: Common words and phrases related to military service number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_military_service
      matches:
        - ref: Evidence_military_service
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_military_service
      matches:
        - ref: Evidence_military_service
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_military_service
      matches:
        - ref: Evidence_military_service
  regexes:
    - id: Pattern_military_service
      pattern: >-
        (?is)\b(?:military\s+service\s+number|military\s+identification|ADF\s+number|Australian\s+Defence\s+Force|defence\s+service|army\s+number|navy\s+number|air\s+force\s+number|regimental\s+number)\b
    - id: Pattern_au_top500_030_military_service_number_label_context
      pattern: (?i)\b(?:military\s+service\s+number)\b
  keywords:
    - id: Evidence_military_service
      groups:
        - match_style: word
          terms:
            - military service number
            - service number
            - military identification
            - ADF number
            - Australian Defence Force
            - defence service
            - army number
            - navy number
            - air force number
            - PMKeyS
            - regimental number
            - veteran
    - id: Keyword_au_top500_030_military_service_number_domain_context
      groups:
        - match_style: word
          terms:
            - military service number
            - military
            - service
risk_description: >-
  The Australian concept regex finds military service number, service number, military identification, or ADF number terminology with defence context rather than validating an issued numeric format. A populated value can link a person to service history and assist correlation, impersonation, or targeted approaches, but the pattern can also match policies, forms, and administrative field labels without a member or number. The normal cue does not disclose rank, posting, operation, clearance, health, or benefits and needs additional identity data for consequential misuse. Risk 5 OFFICIAL is proportionate; SENSITIVE is not met without an attributable issued number and substantive service, operational, or personnel context.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
