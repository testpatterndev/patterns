schema: testpattern/v1
name: Military service number
slug: au-top500-030-military-service-number
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to military service number in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: au-government-defence-markers. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:military\s+service\s+number|service\s+number|military\s+identification|ADF\s+number|Australian\s+Defence\s+Force|defence\s+service|army\s+number|navy\s+number|air\s+force\s+number|regimental\s+number)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - military service number
    - military
    - service
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - au-government-defence-markers
test_cases:
  should_match:
    - value: military service number
      description: Primary topic phrase match
    - value: service number
      description: Case-insensitive topic phrase match
    - value: military identification
      description: Alternative topic phrase match
    - value: ADF number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to military service number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 95
      id_match: Pattern_military_service
      matches:
        - ref: Pattern_au_top500_030_military_service_number_label_context
        - ref: Keyword_au_top500_030_military_service_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_030_military_service_number_noise_exclusion
    - confidence_level: 95
      id_match: Pattern_military_service
      matches:
        - ref: Evidence_military_service
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_030_military_service_number_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_military_service
      matches:
        - ref: Evidence_military_service
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_030_military_service_number_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_military_service
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_030_military_service_number_noise_exclusion
  regexes:
    - id: Pattern_military_service
      pattern: (?is)\b(?:military\s+service\s+number|service\s+number|military\s+identification|ADF\s+number|Australian\s+Defence\s+Force|defence\s+service|army\s+number|navy\s+number|air\s+force\s+number|regimental\s+number)\b
    - id: Pattern_au_top500_030_military_service_number_label_context
      pattern: (?i)\\b(?:military\\s+service\\s+number|military|service|top500)\\b
  keywords:
    - id: Evidence_military_service
      groups:
        - match_style: word
          terms:
            - military service number
            - service number
            - military identification
            - ADF number
            - Australian Defence Force
            - defence service
            - army number
            - navy number
            - air force number
            - PMKeyS
            - regimental number
            - veteran
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_030_military_service_number_domain_context
      groups:
        - match_style: word
          terms:
            - military service number
            - military
            - service
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_030_military_service_number_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
