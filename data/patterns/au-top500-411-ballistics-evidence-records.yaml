schema: testpattern/v1
name: Ballistics evidence records
slug: au-top500-411-ballistics-evidence-records
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to ballistics evidence records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:ballistics\s+evidence\s+records|ballistics\s+analysis|firearm\s+examination|bullet\s+comparison|firearms\s+register|ballistics\s+report|cartridge\s+case|forensic\s+ballistics|weapons\s+evidence|law\s+enforcement|ammunition\s+analysis|shooting\s+incident)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - ballistics evidence records
    - ballistics
    - evidence
    - records
    - law
    - enforcement
    - justice
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: ballistics evidence records
      description: Primary topic phrase match
    - value: ballistics analysis
      description: Case-insensitive topic phrase match
    - value: firearm examination
      description: Alternative topic phrase match
    - value: bullet comparison
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to ballistics evidence records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_ballistics_evidence_records
      matches:
        - ref: Evidence_ballistics_evidence_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_ballistics_evidence_records
      matches:
        - ref: Evidence_ballistics_evidence_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_ballistics_evidence_records
      matches:
        - ref: Evidence_ballistics_evidence_records
  regexes:
    - id: Pattern_ballistics_evidence_records
      pattern: >-
        (?is)\b(?:ballistics\s+evidence\s+records|ballistics\s+analysis|firearm\s+examination|bullet\s+comparison|firearms\s+register|ballistics\s+report|cartridge\s+case|forensic\s+ballistics|weapons\s+evidence|law\s+enforcement|ammunition\s+analysis|shooting\s+incident)\b
    - id: Pattern_au_top500_411_ballistics_evidence_records_label_context
      pattern: (?i)\b(?:ballistics\s+evidence\s+records)\b
  keywords:
    - id: Evidence_ballistics_evidence_records
      groups:
        - match_style: word
          terms:
            - ballistics evidence records
            - ballistics analysis
            - firearm examination
            - bullet comparison
            - firearms register
            - ballistics report
            - cartridge case
            - forensic ballistics
            - weapons evidence
            - law enforcement
            - ammunition analysis
            - shooting incident
    - id: Keyword_au_top500_411_ballistics_evidence_records_domain_context
      groups:
        - match_style: word
          terms:
            - ballistics evidence records
            - ballistics
            - evidence
risk_description: >-
  The regex identifies ballistics analyses, firearm examinations, bullet comparisons, and associated evidence records rather than a general mention of firearms. A genuine report can disclose weapon characteristics, evidentiary links, laboratory conclusions, case theories, and gaps that a suspect could exploit or challenge prematurely. Training and policy material can share the vocabulary, so exhibit, case, examiner, or result context should establish the sensitive unit. Risk 8 supports SENSITIVE Personal-Privacy; PROTECTED would require exposure of a protected operation, critical forensic capability, source safety, or a broad evidence-system compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
