schema: testpattern/v1
name: Gender Reassignment Medical Record
slug: gender-reassignment-medical-record
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects medical records related to gender transition including hormone therapy prescriptions, surgical records, gender identity assessments, change of sex descriptor applications, and recognised sex certificates under Queensland law. These records reveal deeply personal information about gender identity that is subject to anti-discrimination protections — disclosure can cause severe harm including discrimination, harassment, and violence.
operation: 'Keyword proximity: primary keywords (gender reassignment, gender affirming care, hormone therapy, gender identity, change of sex descriptor, recognised sex certificate) within 300 characters of corroborative keywords (PROTECTED, Privacy, patient, Births Deaths and Marriages, Anti-Discrimination Act 1991). Negative keyword exclusion for awareness campaigns, published research, and policy submissions.'
pattern: (?i)\b(gender\s+(?:reassignment|affirming\s+care|affirming\s+(?:surgery|treatment|hormone))|change\s+of\s+sex\s+descriptor|recognised\s+sex\s+certificate|gender\s+identity\s+(?:assessment|clinic|report)|hormone\s+(?:replacement|therapy)\s+(?:for\s+)?(?:gender|transition))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of gender transition medical terminology with patient identifiers. General policy discussions about gender identity rights or published research on transgender health do not trigger detection.'
jurisdictions:
  - au
regulations:
  - qgiscf
  - births-deaths-marriages-act-2003-qld
  - anti-discrimination-act-1991-qld
  - information-privacy-act-2009
  - privacy-act-1988
data_categories:
  - health
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Privacy
    - gender reassignment
    - gender affirming care
    - hormone therapy
    - gender identity
    - change of sex descriptor
    - recognised sex certificate
    - patient
    - MRN
    - date of birth
    - endocrinologist
    - psychiatrist
    - Births Deaths and Marriages
    - Anti-Discrimination Act 1991
    - testosterone
    - oestrogen
    - gender dysphoria
    - referring practitioner
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED Privacy. Gender Identity Clinic — Royal Brisbane and Women''s Hospital. Patient: Alex Jordan MITCHELL, DOB 03/12/1997, MRN 5831274. Gender identity assessment report prepared by Dr Caroline West, Consultant Psychiatrist. The patient has a well-established gender identity inconsistent with their sex recorded at birth. Diagnosis: gender dysphoria (ICD-11 HA60). Hormone therapy commenced 14/01/2026 — testosterone cypionate 200mg fortnightly. Referring practitioner: Dr Samira Hassan, GP. Patient advised regarding application for change of sex descriptor under Births Deaths and Marriages Registration Act 2003 (Qld) s.22A.'
      description: Gender identity clinic assessment with patient identifiers and hormone therapy details
    - value: 'Application for Change of Sex Descriptor — Births Deaths and Marriages Registration Act 2003 (Qld). Applicant: Jamie Lee RICHARDSON, Registration No: 2000/045891. Current registered sex: Female. Requested sex descriptor: Male. Supporting documentation: statutory declaration from applicant, clinical letter from Dr Andrew Cheng (endocrinologist) confirming gender affirming hormone therapy for 24 months, recognised sex certificate application under s.22B. Previous name: Jessica Marie RICHARDSON.'
      description: Change of sex descriptor application with identity and medical documentation
    - value: 'Confidential Medical Record — Gender Affirming Surgery Pre-Operative Assessment. Patient MRN: 7294613. Gender affirming care pathway stage 3: surgical referral. Patient has been receiving hormone replacement therapy for gender transition for 30 months under the care of Dr Priya Sharma, Endocrinologist. Psychiatric clearance obtained from Dr Marcus Flynn. Surgical procedure: bilateral mastectomy (top surgery). Surgeon: Dr Helen O''Brien, Royal Brisbane Hospital. Scheduled date: 22/04/2026. Post-operative care plan includes wound management and continued testosterone therapy.'
      description: Gender affirming surgery pre-operative assessment with medical details
  should_not_match:
    - value: The Queensland Human Rights Commission published a report on the experiences of transgender and gender diverse Queenslanders. The report used anonymised survey data from 1,200 participants and makes recommendations for improving access to healthcare services.
      description: Published human rights report with anonymised transgender health data
    - value: Transgender Day of Visibility is observed annually on 31 March to celebrate transgender people and raise awareness of discrimination faced by transgender people worldwide. Queensland Health supports gender affirming care access for all Queenslanders.
      description: Awareness campaign material about transgender visibility and rights
    - value: A submission to the Queensland Parliament Health Committee examined international best practice in gender affirming care for adolescents. The submission reviewed published clinical guidelines from the UK, Netherlands, and Australia.
      description: Parliamentary policy submission reviewing published clinical guidelines
false_positives:
  - description: Transgender rights awareness campaigns and community education materials
    mitigation: 'Negative keyword exclusion: ''awareness campaign'', ''visibility day'', ''community education'', ''support services'', ''pride''. Require proximity to actual patient identifiers or medical record numbers.'
  - description: Published research on transgender health outcomes using de-identified data
    mitigation: 'Negative keyword exclusion: ''research'', ''study'', ''anonymised'', ''survey data'', ''participants'', ''published'', ''journal'''
  - description: Policy submissions and clinical guideline reviews
    mitigation: 'Negative keyword exclusion: ''policy submission'', ''clinical guideline'', ''best practice'', ''parliamentary committee'', ''public consultation'''
  - description: Gender identity support service directories and general information
    mitigation: 'Negative keyword exclusion: ''service directory'', ''information sheet'', ''how to access'', ''eligibility'', ''referral pathway'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - tier: high
      confidence: 85
      description: Gender transition medical terminology with patient identifiers (name, DOB, MRN) and specific treatment or legal application details
    - tier: medium
      confidence: 75
      description: 2+ gender affirming care keywords with classification markers within 300 characters
    - tier: low
      confidence: 65
      description: 1 gender transition keyword with 2+ corroborative terms within 300 characters
  regexes:
    - name: gender_transition_terms
      pattern: (?i)\b(gender\s+(?:reassignment|affirming\s+care|affirming\s+(?:surgery|treatment|hormone))|change\s+of\s+sex\s+descriptor|recognised\s+sex\s+certificate|gender\s+identity\s+(?:assessment|clinic)|gender\s+dysphoria)\b
    - name: bdm_registration_reference
      pattern: \b\d{4}/\d{5,6}\b
  keywords:
    - name: primary_keywords
      words:
        - gender reassignment
        - gender affirming care
        - hormone therapy
        - gender identity assessment
        - change of sex descriptor
        - recognised sex certificate
        - gender affirming surgery
        - gender affirming hormone
        - gender dysphoria
        - gender transition
    - name: classification_markers
      words:
        - PROTECTED
        - Privacy
        - CONFIDENTIAL
        - SENSITIVE
    - name: corroborative_terms
      words:
        - patient
        - MRN
        - date of birth
        - endocrinologist
        - psychiatrist
        - Births Deaths and Marriages
        - Anti-Discrimination Act 1991
        - testosterone
        - oestrogen
        - referring practitioner
        - statutory declaration
        - surgical referral
    - name: negative_keywords
      words:
        - awareness campaign
        - visibility day
        - community education
        - support services
        - pride
        - research
        - study
        - anonymised
        - survey data
        - participants
        - published
        - journal
        - policy submission
        - clinical guideline
        - best practice
        - parliamentary committee
        - service directory
        - information sheet
  filters:
    - type: exclude
      description: Exclude awareness campaigns, published research, policy submissions, and service directories
      keywords:
        - awareness campaign
        - visibility day
        - community education
        - pride
        - research
        - anonymised
        - survey data
        - published
        - policy submission
        - clinical guideline
        - parliamentary committee
        - service directory
        - information sheet
risk_rating: 8
risk_description: Disclosure reveals gender identity, transition medical records, previous names, and sex descriptor changes for identifiable individuals. Enables discrimination, harassment, and potential violence. Subject to specific anti-discrimination protections under Queensland and Commonwealth law.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
references: []
