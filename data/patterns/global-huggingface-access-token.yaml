schema: testpattern/v1
name: Hugging Face Access Token
slug: global-huggingface-access-token
version: 1.1.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Hugging Face user access tokens (hf_ prefix), used to authenticate to the
  Hugging Face Hub API. A leaked token grants access to private models, datasets and
  Spaces, and can incur inference billing.
operation: 'Prefixed token format hf_ followed by 34 alphanumeric characters. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9_])hf_[A-Za-z0-9]{34}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the distinctive hf_ prefix with a fixed 34-character body is highly
  specific to Hugging Face access tokens.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - hugging face
    - huggingface
    - HF_TOKEN
    - access token
    - api token
    - transformers
    - inference api
  proximity: 300
test_cases:
  should_match:
    - value: hf_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefgh
      description: Hugging Face access token, hf_ prefix + 34 chars
    - value: 'HF_TOKEN=hf_zyxwvutsrqponmlkjihgfedcba01234567'
      description: Labelled Hugging Face token in an env assignment
    - value: hf_aB3dE6gH9jK2mN5pQ8sT1uV4wX7yZ0pLkJ
      description: Mixed-case Hugging Face token
  should_not_match:
    - value: hf_ABCDEFGHIJKLMNOP
      description: Too short to be a valid Hugging Face token
    - value: hg_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefgh
      description: Wrong prefix (hg_ instead of hf_)
    - value: load the model with your hugging face access token set as HF_TOKEN
      description: Prose mention without a token value
false_positives:
  - description: Documentation or examples showing placeholder hf_ strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  A leaked Hugging Face token exposes private models and datasets, allows pushing
  malicious model revisions, and can run up inference billing on the owner's account.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-09'
changelog:
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
author: testpattern-community
license: MIT
references:
  - url: https://huggingface.co/docs/hub/security-tokens
    title: User access tokens - Hugging Face Hub
