schema: testpattern/v1
name: Hugging Face Access Token
slug: global-huggingface-access-token
version: 1.2.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Hugging Face user access tokens (hf_ prefix), used to authenticate to the
  Hugging Face Hub API. A leaked token grants access to private models, datasets and
  Spaces, and can incur inference billing.
operation: >-
  The complete hf_ token shape is discovery-only at 65. An explicit Hugging Face credential label
  raises it to 75, while 85 additionally requires production, deployment, environment-variable,
  private-repository, or live-inference context. Enforcing tiers reject documentation, samples,
  placeholders, and templates.
pattern: (?<![A-Za-z0-9_])hf_[A-Za-z0-9]{34}(?![A-Za-z0-9])
confidence: high
confidence_justification: >-
  High confidence: the distinctive hf_ prefix with a fixed 34-character body is highly
  specific to Hugging Face access tokens.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - hugging face
    - huggingface
    - HF_TOKEN
    - access token
    - api token
    - transformers
    - inference api
  proximity: 300
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_huggingface_token
      matches:
        - ref: Evidence_huggingface_label
        - ref: Evidence_live_hub_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_documentation_context
    - confidence_level: 75
      id_match: Regex_huggingface_token
      matches:
        - ref: Evidence_huggingface_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_documentation_context
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_huggingface_token
  regexes:
    - id: Regex_huggingface_token
      pattern: (?<![A-Za-z0-9_])hf_[A-Za-z0-9]{34}(?![A-Za-z0-9])
  keywords:
    - id: Evidence_huggingface_label
      groups:
        - match_style: word
          terms:
            - Hugging Face access token
            - Hugging Face API token
            - HuggingFace token
            - HF_TOKEN
            - HUGGING_FACE_HUB_TOKEN
      strength: specific
    - id: Evidence_live_hub_context
      groups:
        - match_style: word
          terms:
            - production deployment
            - production inference
            - live inference
            - environment variable
            - deployment secret
            - private model repository
            - private dataset
      strength: specific
    - id: Evidence_documentation_context
      groups:
        - match_style: word
          terms:
            - public documentation
            - documentation example
            - sample configuration
            - placeholder token
      strength: exclusion
test_cases:
  should_match:
    - value: hf_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefgh
      description: Low-tier probe - complete token without provider or deployment context
    - value: 'Hugging Face access token: hf_aB3dE6gH9jK2mN5pQ8sT1uV4wX7yZ0pLkJ'
      description: Medium-tier probe - provider-labelled token without live deployment context
    - value: 'Production inference deployment secret HF_TOKEN=hf_zyxwvutsrqponmlkjihgfedcba01234567'
      description: High-tier probe - provider label plus live inference context
  should_not_match:
    - value: hf_ABCDEFGHIJKLMNOP
      description: Too short to be a valid Hugging Face token
    - value: hg_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefgh
      description: Wrong prefix (hg_ instead of hf_)
    - value: load the model with your hugging face access token set as HF_TOKEN
      description: Prose mention without a token value
    - value: 'Public documentation example: production deployment HF_TOKEN=hf_zyxwvutsrqponmlkjihgfedcba01234567'
      description: Public example containing a structurally complete token
    - value: 'Template placeholder token: Hugging Face access token hf_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefgh for production inference'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Documentation or examples showing placeholder hf_ strings.
    mitigation: Require corroborative keywords and check for placeholder markers (example, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This detector matches a Hugging Face access token using the hf prefix and an exact 34-character alphanumeric body. A valid token can access private models, datasets, or Spaces, publish malicious revisions within granted scopes, and incur inference charges. The normal match seriously affects the issuing user's accessible Hub resources but does not prove organisation-wide write access or control of widely deployed models. Risk 8 and SENSITIVE InfoTech reflect bounded private-resource and publishing exposure; PROTECTED requires broad write authority capable of significant model supply-chain or critical-service compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-19'
changelog:
  - version: 1.2.0
    date: '2026-07-19'
    description: 'Profile quality: add bare-token discovery, provider-labelled medium, and live-Hub high tiers; reject documentation/templates and add exact-tier adversarial probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1544 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
author: testpattern-community
license: MIT
references:
  - url: https://huggingface.co/docs/hub/security-tokens
    title: User access tokens - Hugging Face Hub
