schema: testpattern/v1
name: Plant shutdown and startup procedures
slug: global-top500-448-plant-shutdown-and-startup-procedures
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to plant shutdown and startup procedures in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:plant\s+shutdown|startup\s+procedure|shutdown\s+sequence|emergency\s+shutdown|startup\s+checklist|process\s+safety|turnaround\s+procedure|trip\s+sequence|safety\s+instrumented\s+system)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - plant shutdown and startup procedures
    - plant
    - shutdown
    - startup
    - procedures
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: plant shutdown
      description: Primary topic phrase match
    - value: startup procedure
      description: Case-insensitive topic phrase match
    - value: shutdown sequence
      description: Alternative topic phrase match
    - value: emergency shutdown
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: shutdown checklist
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to plant shutdown and startup procedures appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_plant_shutdown_startup
      matches:
        - ref: Pattern_global_top500_448_plant_shutdown_and_startup_procedures_label_context
        - ref: Keyword_global_top500_448_plant_shutdown_and_startup_procedures_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_plant_shutdown_startup
      matches:
        - ref: Keyword_plant_shutdown_startup
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_plant_shutdown_startup
      matches:
        - ref: Keyword_plant_shutdown_startup
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_plant_shutdown_startup
      pattern: >-
        (?is)\b(?:plant\s+shutdown|startup\s+procedure|shutdown\s+sequence|emergency\s+shutdown|startup\s+checklist|process\s+safety|turnaround\s+procedure|trip\s+sequence|safety\s+instrumented\s+system)\b
    - id: Pattern_global_top500_448_plant_shutdown_and_startup_procedures_label_context
      pattern: (?i)\\b(?:plant\\s+shutdown\\s+and\\s+startup\\s+procedures|plant|shutdown|startup|procedures|top500)\\b
  keywords:
    - id: Keyword_plant_shutdown_startup
      groups:
        - match_style: word
          terms:
            - plant shutdown
            - startup procedure
            - shutdown sequence
            - emergency shutdown
            - ESD
            - startup checklist
            - process safety
            - turnaround procedure
            - commissioning
            - trip sequence
            - interlock
            - safety instrumented system
    - id: Keyword_global_top500_448_plant_shutdown_and_startup_procedures_domain_context
      groups:
        - match_style: word
          terms:
            - plant shutdown and startup procedures
            - plant
            - shutdown
            - startup
            - procedures
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
