schema: testpattern/v1
name: Plant shutdown and startup procedures
slug: global-top500-448-plant-shutdown-and-startup-procedures
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive industrial plant shutdown, startup, emergency-shutdown, and turnaround
  procedures. Topic phrases are retained for discovery; enforcement requires ordered isolation,
  depressurisation, purge, valve, pump, permissive, interlock, handback, or verification actions, and
  high confidence also requires a populated equipment identifier, operating value, or timing.
operation: >-
  Regex_plant_shutdown_startup recognises plant shutdown/startup, emergency-shutdown, sequence, and
  turnaround procedure topics. The topic alone is discovery-only at 65. Concrete ordered process
  actions raise it to 75; actions plus populated equipment, operating, or timing detail reach 85.
  Enforcing tiers reject explicit templates and training examples.
pattern: >-
  (?is)\b(?:plant\s+shutdown\s+and\s+startup\s+procedure|plant\s+shutdown\s+procedure|plant\s+startup\s+procedure|emergency\s+shutdown\s+procedure|shutdown\s+sequence\s+procedure|startup\s+sequence\s+procedure|turnaround\s+startup\s+procedure)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires executable process actions rather than a procedure title. High confidence
  adds live equipment, operating, or timing detail.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - plant shutdown and startup procedures
    - plant
    - shutdown
    - startup
    - procedures
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: plant shutdown and startup procedure
      description: Low-tier probe - procedure topic without executable actions
    - value: 'Plant shutdown procedure: isolate feed, close valve, depressurize, purge the line, verify zero energy, and complete the interlock check'
      description: Medium-tier probe - ordered process actions without populated equipment or values
    - value: 'Plant shutdown procedure for unit ID: U-04: isolate feed, close valve tag: XV-204, depressurize to 0.2 MPa within 15 minutes, and verify the ESD interlock'
      description: High-tier probe - ordered actions with equipment, pressure, timing, and interlock detail
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: shutdown checklist
      description: Generic word pair from old broad template should not match
    - value: 'The process-safety standard describes principles for safe plant shutdown.'
      description: General safety guidance without an executable procedure
    - value: 'Training example: plant shutdown procedure for unit U-04, valve XV-204, 0.2 MPa within 15 minutes'
      description: Explicit training content must not enforce
false_positives:
  - description: Process-safety standards and maintenance guidance discuss shutdown, startup, isolation, purge, and interlocks without exposing an executable plant procedure.
    mitigation: Keep procedure topics discovery-only and require concrete ordered process actions for enforcement.
  - description: Training simulations can include realistic equipment tags, pressures, timing, and emergency-shutdown steps.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_plant_shutdown_startup
      matches:
        - ref: Evidence_plant_procedure_action
        - ref: Evidence_plant_live_detail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_plant_shutdown_startup
      matches:
        - ref: Evidence_plant_procedure_action
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_plant_shutdown_startup
  regexes:
    - id: Regex_plant_shutdown_startup
      pattern: >-
        (?is)\b(?:plant\s+shutdown\s+and\s+startup\s+procedure|plant\s+shutdown\s+procedure|plant\s+startup\s+procedure|emergency\s+shutdown\s+procedure|shutdown\s+sequence\s+procedure|startup\s+sequence\s+procedure|turnaround\s+startup\s+procedure)\b
    - id: Evidence_plant_live_detail
      pattern: >-
        (?i)\b(?:(?:unit|train|pump|valve|compressor|vessel|interlock)\s*(?:ID|tag)?\s*[:#=-]\s*[A-Z0-9][A-Z0-9._-]{2,}|\d+(?:\.\d+)?\s*(?:minutes?|seconds?|MPa|bar|psi|C|percent|rpm))\b
  keywords:
    - id: Evidence_plant_procedure_action
      groups:
        - match_style: word
          terms:
            - isolate feed
            - close valve
            - open valve
            - depressurize
            - purge
            - verify zero energy
            - start pump
            - ramp rate
            - permissive
            - interlock check
            - handback
            - confirm stable
      strength: domain
risk_description: >-
  This regex recognizes plant shutdowns, startup procedures, sequence steps, emergency shutdowns, checklists, turnarounds, trips, process safety, and safety-instrumented systems rather than validating a complete operating procedure. A real procedure can reveal interlocks, dependencies, timing, and manual actions that an intruder or insider could exploit to delay recovery, damage equipment, or create unsafe states. The normal true-positive unit is one industrial plant or process area and its workforce, while standards, training, and generic checklists can match the same vocabulary. Risk 8 and SENSITIVE reflect serious contained operational and safety exposure; PROTECTED would require a critical plant and immediately actionable instructions likely to cause catastrophic, life-safety, or significant service damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
