schema: testpattern/v1
name: Pricing engine logic
slug: global-top500-215-pricing-engine-logic
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to pricing engine logic in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:pricing\s+engine\s+logic|pricing\s+algorithm|pricing\s+model|intellectual\s+property|trade\s+secrets|proprietary\s+pricing|dynamic\s+pricing|margin\s+calculation|discount\s+logic|rate\s+engine)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - pricing engine logic
    - pricing
    - engine
    - logic
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: pricing engine logic
      description: Primary topic phrase match
    - value: pricing algorithm
      description: Case-insensitive topic phrase match
    - value: pricing model
      description: Alternative topic phrase match
    - value: intellectual property
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to pricing engine logic appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_pricing_engine_logic
      matches:
        - ref: Pattern_global_top500_215_pricing_engine_logic_label_context
        - ref: Keyword_global_top500_215_pricing_engine_logic_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pricing_engine_logic
      matches:
        - ref: Keyword_pricing_engine_logic
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_pricing_engine_logic
      pattern: >-
        (?is)\b(?:pricing\s+engine\s+logic|pricing\s+algorithm|pricing\s+model|intellectual\s+property|trade\s+secrets|proprietary\s+pricing|dynamic\s+pricing|margin\s+calculation|discount\s+logic|rate\s+engine)\b
    - id: Pattern_global_top500_215_pricing_engine_logic_label_context
      pattern: (?i)\b(?:pricing\s+engine\s+logic)\b
  keywords:
    - id: Keyword_pricing_engine_logic
      groups:
        - match_style: word
          terms:
            - pricing engine logic
            - pricing algorithm
            - pricing model
            - intellectual property
            - trade secrets
            - proprietary pricing
            - dynamic pricing
            - margin calculation
            - discount logic
            - rate engine
      strength: specific
    - id: Keyword_global_top500_215_pricing_engine_logic_domain_context
      groups:
        - match_style: word
          terms:
            - pricing engine logic
            - pricing
            - engine
            - logic
      strength: domain
risk_description: >-
  The regex flags pricing-engine logic, algorithms, models, dynamic pricing, margin calculations, discount logic, rate engines, and broad intellectual-property terms rather than extracting executable rules. A match can expose the subject of an internal pricing system and offer limited competitive or fraud reconnaissance, but manipulation requires formulas, thresholds, customer attributes, current rates, or access to the engine. The ordinary topic reference therefore has bounded commercial impact and may appear in architecture, procurement, or policy documents. Risk 5 and OFFICIAL are proportionate; detailed production logic, exploitable discount rules, or current margin calculations would meet SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
