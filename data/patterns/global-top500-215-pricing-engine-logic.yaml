schema: testpattern/v1
name: Pricing engine logic
slug: global-top500-215-pricing-engine-logic
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies pricing-engine implementation logic in Australian contexts: executable pricing rules, formulas, thresholds, and named pricing variables used to calculate prices or discounts.
  Topic-only pricing references (dynamic pricing, pricing model) remain discovery-level context and do not enforce.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:pricing\s+engine\s+logic|pricing\s+algorithm|pricing\s+model|dynamic\s+pricing|price\s+calculation|margin\s+formula|discount\s+logic|trade\s+secret|proprietary\s+pricing|competitive\s+pricing)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - pricing engine logic
    - pricing
    - engine
    - logic
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: pricing engine logic
      description: Primary topic phrase match
    - value: pricing algorithm
      description: Case-insensitive topic phrase match
    - value: pricing model
      description: Alternative topic phrase match
    - value: dynamic pricing
      description: Additional topic phrase match
    - value: if inventory_days > 45 then discount_rate = 0.18; price_floor = cost * 1.12
      description: Named inputs, a threshold, and executable pricing assignments reveal implementation logic (enforcing branch)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
    - value: The conference panel covered dynamic pricing trends.
      description: Topic prose without a calculation must not reach the enforcing tiers
    - value: The engine price increased after the vehicle service.
      description: Physical-engine pricing prose is outside scope
    - value: 'Tutorial example: margin_pct = 20 and sample price_floor = 10.'
      description: Tutorial/example/sample markers block the enforcing branch via the template exclusion
    - value: discount applies once the threshold is reached
      description: Prose exercising the removed keyword-gap branch must not enforce (no operator-bound expression)
false_positives:
  - description: Common words and phrases related to pricing engine logic appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pricing_decision_logic
      matches:
        - ref: Evidence_pricing_engine_logic
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
      description: Executable pricing decision expression corroborated by pricing-topic vocabulary
    - confidence_level: 75
      id_match: Pattern_pricing_decision_logic
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
      description: Executable pricing decision expression (named pricing variable or operator-bound price/margin/discount expression)
    - confidence_level: 65
      id_match: Pattern_pricing_engine_logic
      matches:
        - ref: Evidence_pricing_engine_logic
      discovery_only: true
      description: Pricing-topic phrases — discovery inventory only
  regexes:
    - id: Pattern_pricing_engine_logic
      pattern: >-
        (?is)\b(?:pricing\s+engine\s+logic|pricing\s+algorithm|pricing\s+model|dynamic\s+pricing|price\s+calculation|margin\s+formula|discount\s+logic|trade\s+secret|proprietary\s+pricing|competitive\s+pricing)\b
    - id: Pattern_pricing_decision_logic
      pattern: >-
        (?i)(?:\b(?:price|margin|discount|markup|floor|ceiling)\b[^\r\n]{0,80}(?:>=|<=|=)|\b(?:base_price|margin_pct|discount_rate|price_floor)\b)
      description: Named pricing variables or a price/margin/discount term operator-bound on the same line; the looser keyword-gap alternatives from the first-pass candidate (threshold/coefficient/weight/multiplier prose) were removed per independent review
  keywords:
    - id: Evidence_pricing_engine_logic
      groups:
        - match_style: word
          terms:
            - pricing engine logic
            - pricing algorithm
            - pricing model
            - dynamic pricing
            - price calculation
            - margin formula
            - discount logic
            - trade secret
            - proprietary pricing
            - competitive pricing
risk_description: >-
  The detector identifies pricing-engine logic, pricing algorithms or models, dynamic pricing, price calculation, margin formulas, discount logic, proprietary pricing, or competitive-pricing terminology. A substantive internal model can reveal margin floors, segmentation, discount authority, elasticity assumptions, and optimisation rules, enabling competitors or customers to game pricing and erode revenue. Public pricing research and generic dynamic-pricing discussion can match, but a normal proprietary work product is bounded to one engine or product line. Risk 8 supports SENSITIVE InfoTech; PROTECTED would require market-wide systemic consequences, critical regulated pricing, or enterprise-scale compromise causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: 'TP-00341 approved reduced scope: add Pattern_pricing_decision_logic to the higher-confidence branches only, tightened per the independent override — the approved subset is the named-variable branch (base_price, margin_pct, discount_rate, price_floor) plus operator-bound price/margin/discount/markup/floor/ceiling expressions (>=, <=, =) within an 80-character same-line window; the first-pass keyword-gap alternatives (threshold/coefficient/weight/multiplier/if/then as bare words) were dropped because they match ordinary prose. 75 = decision expression with template NOT-gate; 85 additionally requires pricing-topic corroboration. The topic branch (Pattern_pricing_engine_logic) is retained at 65 as discovery-only, so public marketing/webinar text no longer enforces. Description now names implementation logic rather than the PII boilerplate. Added the executable-assignment positive plus webinar-topic, physical-engine, tutorial, and keyword-gap-prose negatives.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 816 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
