schema: testpattern/v1
name: Whistleblower protection case records
slug: au-top500-497-whistleblower-protection-case-records
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to whistleblower protection case records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:whistleblower\s+protection|public\s+interest\s+disclosure|PID\s+Act|whistleblower\s+case|protected\s+disclosure|discloser\s+protection|reprisal\s+protection|Commonwealth\s+Ombudsman|qualifying\s+disclosure|whistleblower\s+complaint|Corporations\s+Act)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - whistleblower protection case records
    - whistleblower
    - protection
    - case
    - records
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:

    - government-services
test_cases:
  should_match:
    - value: whistleblower protection
      description: Primary topic phrase match
    - value: public interest disclosure
      description: Case-insensitive topic phrase match
    - value: PID Act
      description: Alternative topic phrase match
    - value: whistleblower case
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to whistleblower protection case records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_whistleblower_protection_case_records
      matches:
        - ref: Evidence_whistleblower_protection_case_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_497_whistleblower_protection_case_records_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_whistleblower_protection_case_records
      matches:
        - ref: Evidence_whistleblower_protection_case_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_497_whistleblower_protection_case_records_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_whistleblower_protection_case_records
      matches:
        - ref: Evidence_whistleblower_protection_case_records
  regexes:
    - id: Pattern_whistleblower_protection_case_records
      pattern: (?is)\b(?:whistleblower\s+protection|public\s+interest\s+disclosure|PID\s+Act|whistleblower\s+case|protected\s+disclosure|discloser\s+protection|reprisal\s+protection|Commonwealth\s+Ombudsman|qualifying\s+disclosure|whistleblower\s+complaint|Corporations\s+Act)\b
    - id: Pattern_au_top500_497_whistleblower_protection_case_records_label_context
      pattern: (?i)\\b(?:whistleblower\\s+protection\\s+case\\s+records|whistleblower|protection|case|top500)\\b
  keywords:
    - id: Evidence_whistleblower_protection_case_records
      groups:
        - match_style: word
          terms:
            - whistleblower protection
            - public interest disclosure
            - PID Act
            - whistleblower case
            - protected disclosure
            - discloser protection
            - reprisal protection
            - IGIS
            - Commonwealth Ombudsman
            - qualifying disclosure
            - whistleblower complaint
            - Corporations Act
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_497_whistleblower_protection_case_records_domain_context
      groups:
        - match_style: word
          terms:
            - whistleblower protection case records
            - whistleblower
            - protection
            - case
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_497_whistleblower_protection_case_records_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
