schema: testpattern/v1
name: Release approval records
slug: global-top500-240-release-approval-records
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to release approval records in Australian contexts. Higher confidence identifies actual approval or authorisation records for a release (release/batch/
  build/version identifier with a decision and approver/date detail) or the explicit release-approval label; product-release and generic sign-off vocabulary alone remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:release\s+approval|approval\s+record|product\s+release|batch\s+release|release\s+authorization|quality\s+approval|release\s+decision|approval\s+signature|release\s+certificate)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - release approval records
    - release
    - approval
    - records
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: release approval
      description: Primary topic phrase match
    - value: approval record
      description: Case-insensitive topic phrase match
    - value: product release
      description: Alternative topic phrase match
    - value: batch release
      description: Additional topic phrase match
    - value: 'Build 8.4.17 release decision: APPROVED; approver: L. Grant; date: 16 Jul; acceptance suite 442/442 passed.'
      description: Identified build with decision, approver, and date (enforces at 75 via Pattern_release_approval_entry)
    - value: release approval
      description: Explicit approval phrase is a strong concept anchor and remains enforceable at 75 by design
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: Version 8 product release is available today.
      description: Availability announcement without an authorisation record — discovery only, must not enforce
    - value: The book release received approval from readers.
      description: Publishing opinion, not a controlled product record — must not match any anchor
    - value: 'Sample release approval form; build placeholder; approver example.'
      description: Sample/placeholder/example identify an empty form — suppressed from enforcement
false_positives:
  - description: Common words and phrases related to release approval records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_release_approval_entry
      matches:
        - ref: Evidence_release_approval_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_release_approval_entry
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      discovery_only: true
      id_match: Pattern_release_approval_label
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_release_approval_records
      matches:
        - ref: Evidence_release_approval_records
  regexes:
    - id: Pattern_release_approval_records
      pattern: (?is)\b(?:release\s+approval|approval\s+record|product\s+release|batch\s+release|release\s+authorization|quality\s+approval|release\s+decision|approval\s+signature|release\s+certificate)\b
    - id: Pattern_au_top500_240_release_approval_records_label_context
      pattern: (?i)\b(?:release\s+approval\s+records)\b
    - id: Pattern_release_approval_label
      pattern: (?i)\brelease\s+approvals?\b
    - id: Pattern_release_approval_entry
      pattern: >-
        (?is)\b(?:release|batch|build|version)\s*(?:id|no\.?|number)?\s*[:#]?\s*[A-Z0-9._-]{2,30}[\s\S]{0,200}\b(?:approved|rejected|authorised|authorized|release\s+decision|approval\s+status)\b[\s\S]{0,120}\b(?:approver|approved\s+by|date|signed)\b
  keywords:
    - id: Evidence_release_approval_records
      groups:
        - match_style: word
          terms:
            - release approval
            - approval record
            - product release
            - batch release
            - release authorization
            - quality approval
            - release decision
            - sign-off
            - approval signature
            - release certificate
    - id: Keyword_au_top500_240_release_approval_records_domain_context
      groups:
        - match_style: word
          terms:
            - release approval records
            - release
            - approval
risk_description: >-
  The pattern finds release-approval, approval-record, product-release, and batch-release language with seven corroborators, identifying authorization to release a product or batch rather than the underlying design or test dossier. A genuine record may reveal approvers, date, product, batch, checklist status, and disposition, creating modest fraud or timing value if altered or disclosed. The normal approval is routine quality administration and needs attached failures, proprietary criteria, or safety evidence for material confidentiality harm, while templates and policies can also match. Risk 5 and OFFICIAL are appropriate; SENSITIVE requires concealed test failures, strategic launch timing, controlled products, or consequential safety and regulator evidence.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
