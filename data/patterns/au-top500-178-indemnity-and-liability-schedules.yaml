schema: testpattern/v1
name: Indemnity and liability schedules
slug: au-top500-178-indemnity-and-liability-schedules
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to indemnity and liability schedules in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:indemnity\s+and\s+liability\s+schedules|indemnity\s+clause|liability\s+schedule|limitation\s+of\s+liability|hold\s+harmless|consequential\s+damages|liability\s+cap|insurance\s+requirement|risk\s+allocation|contractual\s+liability)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - indemnity and liability schedules
    - indemnity
    - liability
    - schedules
    - corporate
    - legal
    - governance
  proximity: 300
test_cases:
  should_match:
    - value: indemnity and liability schedules
      description: Primary topic phrase match
    - value: indemnity clause
      description: Case-insensitive topic phrase match
    - value: liability schedule
      description: Alternative topic phrase match
    - value: limitation of liability
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to indemnity and liability schedules appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_indemnity_liability
      matches:
        - ref: Evidence_indemnity_liability
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_indemnity_liability
      matches:
        - ref: Evidence_indemnity_liability
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_indemnity_liability
      matches:
        - ref: Evidence_indemnity_liability
  regexes:
    - id: Pattern_indemnity_liability
      pattern: >-
        (?is)\b(?:indemnity\s+and\s+liability\s+schedules|indemnity\s+clause|liability\s+schedule|limitation\s+of\s+liability|hold\s+harmless|consequential\s+damages|liability\s+cap|insurance\s+requirement|risk\s+allocation|contractual\s+liability)\b
  keywords:
    - id: Evidence_indemnity_liability
      groups:
        - match_style: word
          terms:
            - indemnity and liability schedules
            - indemnity clause
            - liability schedule
            - limitation of liability
            - indemnification
            - hold harmless
            - consequential damages
            - liability cap
            - insurance requirement
            - risk allocation
            - contractual liability
            - negligence
risk_description: >-
  This regex identifies language about indemnity clauses, liability schedules, limitations of liability, and related contractual allocation of risk; it does not establish that a confidential schedule or party-specific exposure is present. A match can help locate commercial terms and, when combined with counterparties and negotiated amounts, could reveal bargaining positions or likely liabilities. The normal phrase-level unit is common in contracts, templates, policies, and training material, so standalone disclosure causes low and reversible commercial harm. Risk 4 and OFFICIAL fit that unit, while SENSITIVE would require an executed non-public schedule, quantified exposure, dispute strategy, or a repository of live agreements.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
