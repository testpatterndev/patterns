schema: testpattern/v1
name: Mexico CLABE
slug: mx-clabe
version: 1.0.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Mexican CLABE (Clave Bancaria Estandarizada) numbers used for SPEI interbank transfers.
  CLABE is an 18-digit standardized bank account number including bank code, branch, account and check digit.
operation: >-
  Structural 18-digit detection only; weighted check-digit algorithm not enforced in the regex.
  Corroborative evidence: CLABE/SPEI keywords within 300 characters. Keyword lists: banking, financial-transaction.
pattern: '\b\d{18}\b'
confidence: medium
confidence_justification: >-
  Medium confidence: eighteen-digit runs occur in other systems; CLABE/SPEI/cuenta
  keywords are required for production use.
jurisdictions:
  - mx
regulations:
  - "LFPDPPP (Mexico)"
  - "Fintech Law (Mexico)"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - financial
  - pii
corroborative_evidence:
  keywords:
    - CLABE
    - SPEI
    - clave bancaria
    - cuenta CLABE
  proximity: 300
  keyword_lists:
    - banking
    - financial-transaction
test_cases:
  should_match:
    - value: '002010077777777771'
      description: Illustrative 18-digit CLABE
    - value: '012180001234567897'
      description: Alternate illustrative CLABE
    - value: '137010000100000018'
      description: Third illustrative CLABE
  should_not_match:
    - value: '00201007777777777'
      description: Only 17 digits
    - value: '0020100777777777712'
      description: 19 digits
    - value: '00201007777777777A'
      description: Contains a letter
false_positives:
  - description: >-
      Other 18-digit identifiers (parcel IDs, long order numbers).
    mitigation: >-
      Require CLABE/SPEI/clave bancaria keywords within proximity.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_mx_clabe
      matches:
        - ref: Keyword_mx_clabe_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_mx_clabe
      matches:
        - ref: Keyword_mx_clabe_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_mx_clabe
  regexes:
    - id: Regex_mx_clabe
      pattern: '\b\d{18}\b'
  keywords:
    - id: Keyword_mx_clabe_specific
      groups:
        - match_style: word
          terms:
            - CLABE
            - clave bancaria estandarizada
            - clave bancaria
            - cuenta CLABE
            - número CLABE
            - SPEI CLABE
      strength: specific
    - id: Keyword_mx_clabe_broad
      groups:
        - match_style: word
          terms:
            - SPEI
            - transferencia interbancaria
            - cuenta bancaria
            - banco receptor
            - STP
      strength: specific
risk_rating: 8
risk_description: >-
  CLABE fully specifies a Mexican bank account for push payments; exposure enables fraudulent SPEI transfers.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Financial"
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
references:
  - url: https://www.banxico.org.mx/servicios/sistema-pagos-electronicos-interb.html
    title: Banxico SPEI overview
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Initial mature identifier SIT — Phase-1 coverage backlog (Purview-safe regex, full label/risk metadata for pack workbooks)'
author: testpattern-community
