schema: testpattern/v1
name: GCP Api Key
slug: global-gcp-api-key
version: 1.4.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects GCP Api Key patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use
  this version as a starting point for customisation.
operation: 'Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: \bAIza[0-9A-Za-z_-]{35}\b
confidence: low
confidence_justification: >-
  Low confidence: generic pattern format that may match unrelated data. Corroborative evidence keywords are essential for reliable detection. Added context gating and exclusion rules improve precision
  and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: AIzaSyBCDEFGHIJKLMNOPQRSTUVWXYZ12345678
      description: GCP API key
    - value: AIzaSyCDEFGHIJKLMNOPQRSTUVWXYZ123456789
      description: Standard GCP API key format
    - value: AIzaSyA0BCDEFGHIJKLMNOPQRSTUVWXYZ123456
      description: GCP key with alphanumeric chars
  should_not_match:
    - value: AIzb0123456789012345678901234567890
      description: Wrong prefix (AIzb instead of AIza)
    - value: AIzaSyA-example-key-1234567890abcde
      description: Too few characters after prefix (34 instead of 35)
    - value: AIzaSyA-example-key-1234567890abcdefgh
      description: Too many characters after prefix (36 instead of 35)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_gcp_api_key
      matches:
        - ref: Pattern_global_gcp_api_key_label_context
        - ref: Keyword_global_gcp_api_key_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_gcp_api_key
      matches:
        - ref: Keyword_gcp_api_key
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_gcp_api_key
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_gcp_api_key
      pattern: \bAIza[0-9A-Za-z_-]{35}\b
    - id: Pattern_global_gcp_api_key_label_context
      pattern: (?i)\b(?:gcp\s+api\s+key|gcp|api|key)\b
  keywords:
    - id: Keyword_gcp_api_key
      groups:
        - match_style: word
          terms:
            - Google Cloud
            - text: GCP
              case_sensitive: true
            - api key
            - api_key
            - google api
            - firebase
            - google maps
            - cloud platform
            - service account
            - google project
            - AIza
            - gcloud
      strength: specific
    - id: Keyword_global_gcp_api_key_domain_context
      groups:
        - match_style: word
          terms:
            - gcp api key
            - text: gcp
              case_sensitive: true
            - text: api
              case_sensitive: true
            - key
      strength: domain
risk_rating: 8
risk_description: >-
  The pattern recognizes a Google API key beginning with AIza and the fixed 35-character suffix, making the match an API credential bound to a Google Cloud project or service configuration. An unrestricted live key can be used to consume enabled APIs, incur quota or billing, and in some configurations access project data exposed to key authentication. The direct scale is one key and its configured API restrictions, with application restrictions, disabled keys, examples, and unrelated test material limiting actual harm. Risk 8 SENSITIVE is retained for serious contained abuse of an active unrestricted key; PROTECTED would require demonstrated broad privileged access or significant protected-resource impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-google-api-key
    title: Google API key entity definition - Microsoft Learn
created: '2026-02-08'
updated: '2026-07-14'
