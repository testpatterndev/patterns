schema: testpattern/v1
name: Clinical trial participant data
slug: au-top500-338-clinical-trial-participant-data
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies clinical trial participant data references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: au-healthcare-records.
pattern: (?is)\b(?:clinical\s+trial|trial\s+participant|research\s+subject|participant\s+data|clinical\s+study|informed\s+consent|study\s+protocol|adverse\s+event|trial\s+enrollment)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - clinical trial participant data
    - clinical
    - trial
    - participant
    - data
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - au-healthcare-records
test_cases:
  should_match:
    - value: clinical trial
      description: Primary topic phrase match
    - value: trial participant
      description: Case-insensitive topic phrase match
    - value: research subject
      description: Alternative topic phrase match
    - value: participant data
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_clinical_trial_participant_data
      matches:
        - ref: Evidence_clinical_trial_participant_data
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_clinical_trial_participant_data
      matches:
        - ref: Evidence_clinical_trial_participant_data
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_clinical_trial_participant_data
      matches:
        - ref: Evidence_clinical_trial_participant_data
  regexes:
    - id: Pattern_clinical_trial_participant_data
      pattern: (?is)\b(?:clinical\s+trial|trial\s+participant|research\s+subject|participant\s+data|clinical\s+study|informed\s+consent|study\s+protocol|adverse\s+event|trial\s+enrollment)\b
  keywords:
    - id: Evidence_clinical_trial_participant_data
      groups:
        - match_style: word
          terms:
            - clinical trial
            - trial participant
            - research subject
            - participant data
            - clinical study
            - health
            - biomedical
            - informed consent
            - randomization
            - study protocol
            - adverse event
            - trial enrollment
            - investigator
risk_description: >-
  The pattern identifies clinical trials, research subjects, participant data, enrolment, protocols, informed consent, and adverse events with healthcare-record context. A genuine participant record can combine coded identity, eligibility, diagnosis, investigational treatment, outcomes, specimens, and adverse reactions, enabling re-identification, discrimination, trial interference, or invalidation of research. The normal unit concerns one participant or study record rather than an entire trial database, so consequences are serious but contained. Risk 8 and SENSITIVE are appropriate; PROTECTED would require a large unblinded trial repository, critical safety data, or compromise causing significant participant and scientific damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
