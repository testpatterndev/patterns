schema: testpattern/v1
name: Id Number
slug: za-id-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Id Number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Validation: Luhn algorithm (SA variant). Reference:
  https://learn.microsoft.com/en-us/purview/sit-defn-south-africa-identification-number Corroborative evidence: 3
  keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b\d{13}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - za
regulations:
- POPIA
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: 8501015800084
      description: Male born 1985-01-01 SA citizen
    - value: 9012310800088
      description: Female born 1990-12-31
    - value: "0001015800182"
      description: Person born 2000-01-01
  should_not_match:
    - value: 850101580008
      description: Only 12 digits instead of 13
    - value: 85010158000841
      description: 14 digits instead of 13
    - value: 8501015800A84
      description: Contains a letter instead of all digits
false_positives:
  - description: Long numeric sequences in unrelated contexts (tracking numbers, serial codes) matching the Id Number format
    mitigation: Use corroborative keywords and, where available, checksum validation to filter false matches.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_za_id
      matches:
        - ref: Keyword_za_id_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_za_id
      matches:
        - ref: Keyword_za_id_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_za_id
  regexes:
    - id: Regex_za_id
      pattern: \b\d{13}\b
      validators:
        - ref: Func_south_africa_identification_number
  keywords:
    - id: Keyword_za_id_specific
      groups:
        - match_style: word
          terms:
            - identity number
            - ID number
            - ID no
            - ID no.
            - identity document
            - South African ID
            - SA ID
            - identification number
            - ID book
            - smart card ID
      strength: specific
    - id: Keyword_za_id_broad
      groups:
        - match_style: word
          terms:
            - identifier
            - national identity
            - POPIA
            - Home Affairs
            - Department of Home Affairs
            - citizen
            - citizenship
            - permanent resident
            - birth registration
            - population register
      strength: specific
  filters:
    - id: Filter_za_id_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  A South African ID match is a thirteen-digit personal number validated with the local Luhn variant and found with civic terminology, not a Home Affairs record. It can help a fraudster tailor identity or account-opening impersonation when combined with the holder's name, but the number alone does not authenticate access. The normal exposure concerns one person, while unrelated long tracking or serial values remain possible collisions. Risk 5 and OFFICIAL reflect bounded atomic harm; a verified number linked to financial, health, or complete identity records would be more sensitive.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-south-africa-identification-number
    title: "South Africa identification number entity definition - Microsoft Learn"
