schema: testpattern/v1
name: Manufacturing process tolerances
slug: global-top500-203-manufacturing-process-tolerances
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to manufacturing process tolerances in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:manufacturing\s+tolerance|process\s+specification|quality\s+control|dimensional\s+tolerance|production\s+parameters|process\s+capability|yield\s+specification|material\s+specification|engineering\s+tolerance|process\s+control|manufacturing\s+process)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - intellectual-property
  - business
corroborative_evidence:
  keywords:
    - manufacturing process tolerances
    - manufacturing
    - process
    - tolerances
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: manufacturing tolerance
      description: Primary topic phrase match
    - value: process specification
      description: Case-insensitive topic phrase match
    - value: quality control
      description: Alternative topic phrase match
    - value: dimensional tolerance
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to manufacturing process tolerances appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_manufacturing_tolerances
      matches:
        - ref: Pattern_global_top500_203_manufacturing_process_tolerances_label_context
        - ref: Keyword_global_top500_203_manufacturing_process_tolerances_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_manufacturing_tolerances
      matches:
        - ref: Keyword_manufacturing_tolerances
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_manufacturing_tolerances
      pattern: >-
        (?is)\b(?:manufacturing\s+tolerance|process\s+specification|quality\s+control|dimensional\s+tolerance|production\s+parameters|process\s+capability|yield\s+specification|material\s+specification|engineering\s+tolerance|process\s+control|manufacturing\s+process)\b
    - id: Pattern_global_top500_203_manufacturing_process_tolerances_label_context
      pattern: (?i)\b(?:manufacturing\s+process\s+tolerances)\b
  keywords:
    - id: Keyword_manufacturing_tolerances
      groups:
        - match_style: word
          terms:
            - manufacturing tolerance
            - process specification
            - quality control
            - dimensional tolerance
            - production parameters
            - process capability
            - yield specification
            - material specification
            - engineering tolerance
            - process control
            - manufacturing process
      strength: specific
    - id: Keyword_global_top500_203_manufacturing_process_tolerances_domain_context
      groups:
        - match_style: word
          terms:
            - manufacturing process tolerances
            - manufacturing
            - process
            - tolerances
      strength: domain
risk_description: >-
  This concept pattern recognizes manufacturing or engineering tolerances, process specifications, quality control, dimensional limits, production parameters, capability, yield, material specifications, and process control rather than extracting numeric tolerance tables. A genuine specification can reveal the operating window, quality thresholds, material choices, and yield constraints needed to copy a product, exploit a defect, or disrupt production. The normal unit is one product or process and its manufacturer, workers, and customers, while standards, training, supplier literature, and generic quality manuals can match. Risk 8 and SENSITIVE reflect serious contained intellectual-property and operational harm; PROTECTED would require critical infrastructure, life-critical manufacture, or a weakness capable of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
