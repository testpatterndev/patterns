schema: testpattern/v1
name: Azure Shared Access Key / Web Hook Token
slug: azure-shared-access-key-web-hook-token
version: 1.4.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Azure shared access key and webhook token patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the
  built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Matches generic Azure shared access keys and webhook tokens which are Base64-encoded strings used across various Azure services. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)(?:SharedAccessKey|webhook[._-]?token|hook[._-]?token|access[._-]?key)\s*[:=]\s*"?[A-Za-z0-9+/]{30,60}={0,2}"?
confidence: medium
confidence_justification: >-
  Medium confidence: pattern matches common Azure key formats but may overlap with other Base64-encoded values. Corroborative keywords improve accuracy. Added context gating and exclusion rules
  improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - shared access key
    - webhook
    - web hook
    - token
    - Azure
    - access key
    - SharedAccessKey
    - notification
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: SharedAccessKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==
      description: Azure shared access key
    - value: webhook_token="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij=="
      description: Webhook token value
    - value: access_key="000000000000000000000000000000000000000000"
      description: Access key with placeholder value
  should_not_match:
    - value: SharedAccessKey=short
      description: Too short to be a valid key
    - value: SharedAccessKeyName=mypolicy
      description: Key name, not key value
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Azure documentation with placeholder shared access keys and webhook tokens.
    mitigation: Check for common placeholder patterns and documentation context.
  - description: Non-Azure webhook tokens from other platforms.
    mitigation: Require proximity to Azure-specific keywords for differentiation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_azure_shared_access_key_webhook
      matches:
        - ref: Pattern_azure_shared_access_key_web_hook_token_label_context
        - ref: Keyword_azure_shared_access_key_web_hook_token_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_azure_shared_access_key_webhook
      matches:
        - ref: Keyword_azure_shared_access_key_webhook
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_azure_shared_access_key_webhook
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_azure_shared_access_key_webhook
      pattern: (?i)(?:SharedAccessKey|webhook[._-]?token|hook[._-]?token|access[._-]?key)\s*[:=]\s*"?[A-Za-z0-9+/]{30,60}={0,2}"?
    - id: Pattern_azure_shared_access_key_web_hook_token_label_context
      pattern: (?i)\b(?:azure\s+shared\s+access\s+key\s+/\s+web\s+hook\s+token|azure|shared|access|key|web|hook|token)\b
  keywords:
    - id: Keyword_azure_shared_access_key_webhook
      groups:
        - match_style: word
          terms:
            - shared access key
            - webhook
            - web hook
            - token
            - Azure
            - access key
            - SharedAccessKey
            - notification
            - Event Grid
            - notification hub
            - endpoint
      strength: domain
    - id: Keyword_azure_shared_access_key_web_hook_token_domain_context
      groups:
        - match_style: word
          terms:
            - azure shared access key / web hook token
            - azure
            - shared
            - access
            - key
            - web
            - hook
            - token
      strength: domain
risk_rating: 8
risk_description: >-
  The medium-confidence detector finds a generic Azure-labelled Base64 SharedAccessKey, access-key, or webhook-token value without tying it to one specific Azure service. A live match may permit authenticated requests or unauthenticated webhook invocation for the associated resource, enabling forged events, workflow execution, or service misuse. The normal blast radius is the particular key or webhook endpoint, and service identity, permissions, endpoint, validity, and even Azure provenance must be established from surrounding content. Risk 8 SENSITIVE reflects serious but contained misuse of a confirmed token; the generic detector does not establish the broad privileged or critical-service compromise required for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-azure-shared-access-key-web-hook-token
    title: Azure shared access key / web hook token entity definition - Microsoft Learn
