schema: testpattern/v1
name: Unattend.xml Administrator/AutoLogon Password
slug: snaffler-unattend-password
version: 1.1.0
type: regex
pattern_class: identifier
engine: boost_regex
pattern: <AdministratorPassword>[\s\S]{0,30}<Value>[^<]{1,200}</Value>
description: >-
  Detects plaintext passwords stored in Windows unattend.xml answer files,
  specifically the AdministratorPassword and AutoLogon <Value> XML elements
  used during Windows automated setup. These files frequently contain
  Administrator or auto-logon credentials in cleartext and represent a high
  severity finding when discovered on file shares or in software repositories.
  Mirrors Snaffler rule KeepUnattendXmlRegexRed.
confidence: high
confidence_justification: >-
  High confidence: the XML element structure (<AdministratorPassword> or
  <AutoLogon> containing a <Value> child with non-empty content) is highly
  specific to Windows unattend answer files. False positives from XML fragments
  sharing this exact nesting are extremely rare.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act (CFAA)
  - Cybersecurity Maturity Model Certification (CMMC)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
  - security
  - configuration
corroborative_evidence:
  keywords:
    - urn:schemas-microsoft-com:unattend
    - UserAccounts
    - AutoLogon
    - cpassword
    - LocalAccounts
    - PlainText
    - unattend.xml
    - autounattend.xml
  proximity: 300
test_cases:
  should_match:
    - value: "<UserAccounts><AdministratorPassword><Value>P@ssw0rd123</Value><PlainText>true</PlainText></AdministratorPassword></UserAccounts>"
      description: AdministratorPassword with plaintext value and PlainText element
    - value: "<AdministratorPassword>\n  <Value>S3cur3P@ss!</Value>\n</AdministratorPassword>"
      description: AdministratorPassword with newline-separated Value element
    - value: "<AutoLogon><Value>WinSetup2024!</Value></AutoLogon>"
      description: AutoLogon block with Value element directly nested
    - value: "<AutoLogon><Enabled>1</Enabled><Value>MyLogonPass99</Value></AutoLogon>"
      description: AutoLogon with Enabled sibling before Value (within 30 char gap)
    - value: "<AdministratorPassword><Value>ComplexP@ss#1</Value></AdministratorPassword>"
      description: Minimal AdministratorPassword with non-empty value
  should_not_match:
    - value: "<AdministratorPassword><Value></Value></AdministratorPassword>"
      description: Empty Value element should not match
    - value: "<SomeOtherElement><Value>P@ssw0rd</Value></SomeOtherElement>"
      description: Value element under unrelated parent element should not match
    - value: "AdministratorPassword Value P@ssword plain text"
      description: Unstructured text with credential keywords but no XML structure
false_positives:
  - description: >-
      Sanitised or redacted unattend.xml files where the Value element has been
      replaced with a placeholder such as "REDACTED" or "*" may still match;
      review actual value content.
    mitigation: Examine the matched Value content — placeholder strings are typically short ASCII tokens rather than real passwords.
  - description: >-
      Schema documentation or XML examples referencing the AdministratorPassword
      element structure without real credential values.
    mitigation: Check surrounding file context; documentation files typically lack sibling elements such as <PlainText> or a full <UserAccounts> block.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_unattend_admin_password
      matches:
        - ref: Keyword_unattend_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_unattend_admin_password
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_unattend_admin_password
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_unattend_autologon_password
      matches:
        - ref: Keyword_unattend_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_unattend_autologon_password
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_unattend_autologon_password
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_unattend_admin_password
      pattern: <AdministratorPassword>[\s\S]{0,30}<Value>[^<]{1,200}</Value>
    - id: Regex_unattend_autologon_password
      pattern: <AutoLogon>[\s\S]{0,30}<Value>[^<]{1,200}</Value>
  keywords:
    - id: Keyword_unattend_context
      groups:
        - match_style: word
          terms:
            - unattend
            - autounattend
            - UserAccounts
            - LocalAccounts
            - AutoLogon
            - PlainText
            - cpassword
