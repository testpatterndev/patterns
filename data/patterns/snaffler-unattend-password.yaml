schema: testpattern/v1
name: Unattend.xml Administrator/AutoLogon Password
slug: snaffler-unattend-password
version: 1.2.0
type: regex
pattern_class: identifier
engine: boost_regex
pattern: <AdministratorPassword>[\s\S]{0,30}<Value>[^<]{1,200}</Value>
description: >-
  Detects plaintext passwords stored in Windows unattend.xml answer files,
  specifically the AdministratorPassword and AutoLogon <Value> XML elements
  used during Windows automated setup. These files frequently contain
  Administrator or auto-logon credentials in cleartext and represent a high
  severity finding when discovered on file shares or in software repositories.
  Mirrors Snaffler rule KeepUnattendXmlRegexRed.
operation: >-
  AdministratorPassword and AutoLogon Value fragments are discovery-only at 65.
  Administrator entries enforce at 75 only when PlainText is true; AutoLogon
  entries require both Enabled and Username. The 85 tiers additionally require
  Windows answer-file container evidence such as the unattend namespace,
  UserAccounts, or LocalAccounts. Enforcing tiers reject templates and redacted
  or default placeholder values.
confidence: high
confidence_justification: >-
  High confidence: the XML element structure (<AdministratorPassword> or
  <AutoLogon> containing a <Value> child with non-empty content) is highly
  specific to Windows unattend answer files. False positives from XML fragments
  sharing this exact nesting are extremely rare.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
  - Computer Fraud and Abuse Act (CFAA)
  - Cybersecurity Maturity Model Certification (CMMC)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
  - security
  - configuration
corroborative_evidence:
  keywords:
    - urn:schemas-microsoft-com:unattend
    - UserAccounts
    - AutoLogon
    - cpassword
    - LocalAccounts
    - PlainText
    - unattend.xml
    - autounattend.xml
  proximity: 300
test_cases:
  should_match:
    - value: "<AdministratorPassword>\n  <Value>S3cur3P@ss!</Value>\n</AdministratorPassword>"
      description: Low-tier probe - password Value fragment without PlainText or answer-file container
    - value: "<AdministratorPassword><Value>N7v!q2Lm9</Value><PlainText>true</PlainText></AdministratorPassword>"
      description: Medium-tier probe - explicit plaintext administrator password fragment
    - value: '<unattend xmlns="urn:schemas-microsoft-com:unattend"><UserAccounts><AdministratorPassword><Value>ComplexP@ss#1</Value><PlainText>true</PlainText></AdministratorPassword></UserAccounts></unattend>'
      description: High-tier probe - plaintext password inside a Windows unattend UserAccounts container
    - value: "<AutoLogon><Enabled>true</Enabled><Username>deploy</Username><Value>MyLogonPass99</Value></AutoLogon>"
      description: Medium-tier probe - enabled AutoLogon with username and password value
  should_not_match:
    - value: "<AdministratorPassword><Value></Value></AdministratorPassword>"
      description: Empty Value element should not match
    - value: "<SomeOtherElement><Value>P@ssw0rd</Value></SomeOtherElement>"
      description: Value element under unrelated parent element should not match
    - value: "AdministratorPassword Value P@ssword plain text"
      description: Unstructured text with credential keywords but no XML structure
    - value: "<AdministratorPassword><Value>N7v!q2Lm9</Value><PlainText>false</PlainText></AdministratorPassword>"
      description: PlainText false does not prove a plaintext answer-file credential
    - value: '<unattend xmlns="urn:schemas-microsoft-com:unattend"><UserAccounts><AdministratorPassword><Value>REDACTED</Value><PlainText>true</PlainText></AdministratorPassword></UserAccounts></unattend>'
      description: Redacted placeholder value must not enforce
    - value: 'Documentation example: <unattend xmlns="urn:schemas-microsoft-com:unattend"><UserAccounts><AdministratorPassword><Value>N7v!q2Lm9</Value><PlainText>true</PlainText></AdministratorPassword></UserAccounts></unattend>'
      description: Documentation quoting a complete answer-file fragment must not enforce
    - value: "<Identification><Credentials><Password>N7v!q2Lm9</Password></Credentials></Identification>"
      description: Sibling domain-join credentials use a different XML container
false_positives:
  - description: >-
      Sanitised or redacted unattend.xml files where the Value element has been
      replaced with a placeholder such as "REDACTED" or "*" may still match;
      review actual value content.
    mitigation: Examine the matched Value content — placeholder strings are typically short ASCII tokens rather than real passwords.
  - description: >-
      Schema documentation or XML examples referencing the AdministratorPassword
      element structure without real credential values.
    mitigation: Check surrounding file context; documentation files typically lack sibling elements such as <PlainText> or a full <UserAccounts> block.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_unattend_admin_password
      matches:
        - ref: Evidence_unattend_plaintext_true
        - ref: Evidence_unattend_container
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_unattend_placeholder
    - confidence_level: 75
      id_match: Regex_unattend_admin_password
      matches:
        - ref: Evidence_unattend_plaintext_true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_unattend_placeholder
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_unattend_admin_password
    - confidence_level: 85
      id_match: Regex_unattend_autologon_password
      matches:
        - ref: Evidence_autologon_enabled
        - ref: Evidence_autologon_username
        - ref: Evidence_unattend_container
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_unattend_placeholder
    - confidence_level: 75
      id_match: Regex_unattend_autologon_password
      matches:
        - ref: Evidence_autologon_enabled
        - ref: Evidence_autologon_username
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Evidence_unattend_placeholder
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_unattend_autologon_password
  regexes:
    - id: Regex_unattend_admin_password
      pattern: <AdministratorPassword>[\s\S]{0,30}<Value>[^<]{1,200}</Value>
    - id: Regex_unattend_autologon_password
      pattern: <AutoLogon>[\s\S]{0,160}<Value>[^<]{1,200}</Value>
    - id: Evidence_unattend_plaintext_true
      pattern: '(?i)<PlainText>\s*(?:true|1)\s*</PlainText>'
    - id: Evidence_autologon_enabled
      pattern: '(?i)<Enabled>\s*(?:true|1)\s*</Enabled>'
    - id: Evidence_autologon_username
      pattern: '(?i)<Username>[^<\r\n]{1,128}</Username>'
    - id: Evidence_unattend_container
      pattern: '(?i)urn:schemas-microsoft-com:unattend|<(?:UserAccounts|LocalAccounts)>'
  keywords:
    - id: Evidence_unattend_placeholder
      groups:
        - match_style: string
          terms:
            - REDACTED
            - PLACEHOLDER
            - CHANGEME
            - password123
            - '********'
risk_description: >-
  The high-confidence regex identifies a non-empty AdministratorPassword or AutoLogon Value element in a Windows unattend answer file. A live setup password can give an attacker local administrator or automatic-logon access to deployed machines and may be reusable across an image fleet. The affected scale ranges from one host to the systems built from the same answer file, while placeholders, completed deployment, rotation, and account controls limit current reach. Risk 8 and SENSITIVE reflect serious contained endpoint compromise, while a current shared administrator password across a critical fleet would raise the classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
