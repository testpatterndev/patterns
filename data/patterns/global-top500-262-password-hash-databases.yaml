schema: testpattern/v1
name: Password hash databases
slug: global-top500-262-password-hash-databases
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies password hash databases patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: credentials.
  Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\bpassword\s+hash\s+databases\b
confidence: low
confidence_justification: >-
  Low confidence marker: phrase-based artifact detection to bootstrap line-by-line coverage. Requires corroborative evidence and later hardening to high-confidence structural patterns. Added context
  gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - password hash databases
    - password
    - hash
    - databases
    - credentials
    - keys
    - secrets
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 'Password hash databases'
      description: Topic phrase present
    - value: 'password hash databases'
      description: Topic phrase, lowercase
    - value: 'this record references the password hash databases held on file'
      description: Topic phrase within surrounding text
    - value: 'root:$6$saltsalt$abcdefghijklmnopqrstuvwxyz0123456789ABCDEFhijk:19000:0:99999:7:::'
      description: Unix /etc/shadow SHA-512 hash line for root account (Snaffler KeepNixLocalHashesByName)
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
    - value: 'A password hash database stores one verifier.'
      description: Singular "database" near-miss stays outside the plural phrase primary even after the case-insensitivity fix
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_password_hash_databases
      matches:
        - ref: Pattern_global_top500_262_password_hash_databases_label_context
        - ref: Keyword_global_top500_262_password_hash_databases_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_password_hash_databases
      matches:
        - ref: Keyword_password_hash_databases
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_password_hash_databases
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_shadow_hash_line
      matches:
        - ref: Keyword_snaffler_shadow_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_shadow_hash_line
      matches:
        - ref: Keyword_snaffler_shadow_context
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_password_hash_databases
      pattern: (?i)\bpassword\s+hash\s+databases\b
    - id: Pattern_global_top500_262_password_hash_databases_label_context
      pattern: (?i)\b(?:password\s+hash\s+databases)\b
    - id: Regex_snaffler_shadow_hash_line
      pattern: '[A-Za-z0-9_.-]{1,32}:\$(?:1|2[aby]|5|6|y)\$[^\s:]{10,}:'
  keywords:
    - id: Keyword_password_hash_databases
      groups:
        - match_style: word
          terms:
            - password hash
            - hash database
            - bcrypt
            - scrypt
            - argon2
            - sha256
            - md5
            - ntlm
            - credential store
            - shadow file
            - password dump
            - rainbow table
    - id: Keyword_global_top500_262_password_hash_databases_domain_context
      groups:
        - match_style: word
          terms:
            - password hash databases
            - password
            - hash
            - databases
    - id: Keyword_snaffler_shadow_context
      groups:
        - match_style: word
          terms:
            - root
            - daemon
            - nologin
            - shadow
            - passwd
            - /etc/shadow
            - /etc/passwd
risk_description: >-
  The pattern recognises password hash database terminology and can also match a Unix shadow-style hash line, so detections range from topic references to an actual credential verifier record. A real hash entry can support offline password cracking, credential reuse attacks, and account compromise, with impact driven by hash strength, account privilege, and whether salts and modern work factors are used. Documentation about password storage can match, and the normal unit should be scored as one hash line or bounded record rather than an imagined enterprise database. Risk 8 SENSITIVE reflects serious but contained misuse potential from a usable hash; PROTECTED would require a broad privileged corpus or significant damage established by additional evidence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
