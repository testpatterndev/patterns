schema: testpattern/v1
name: Ballistics evidence records
slug: global-top500-411-ballistics-evidence-records
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to ballistics evidence records in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:ballistics\s+evidence|ballistics\s+report|firearms\s+analysis|bullet\s+comparison|shell\s+casing|firearms\s+examiner|trajectory\s+analysis|gunshot\s+residue|weapon\s+discharge|caliber\s+analysis|forensic\s+ballistics)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - ballistics evidence records
  proximity: 240
test_cases:
  should_match:
    - value: ballistics evidence
      description: Primary topic phrase match
    - value: ballistics report
      description: Case-insensitive topic phrase match
    - value: firearms analysis
      description: Alternative topic phrase match
    - value: bullet comparison
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to ballistics evidence records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_ballistics
      matches:
        - ref: Pattern_global_top500_411_ballistics_evidence_records_label_context
        - ref: Keyword_global_top500_411_ballistics_evidence_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_ballistics
      matches:
        - ref: Keyword_ballistics
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ballistics
      pattern: >-
        (?is)\b(?:ballistics\s+evidence|ballistics\s+report|firearms\s+analysis|bullet\s+comparison|shell\s+casing|firearms\s+examiner|trajectory\s+analysis|gunshot\s+residue|weapon\s+discharge|caliber\s+analysis|forensic\s+ballistics)\b
    - id: Pattern_global_top500_411_ballistics_evidence_records_label_context
      pattern: (?i)\b(?:ballistics\s+evidence\s+records)\b
  keywords:
    - id: Keyword_ballistics
      groups:
        - match_style: word
          terms:
            - ballistics evidence
            - ballistics report
            - firearms analysis
            - bullet comparison
            - shell casing
            - firearms examiner
            - NIBIN
            - trajectory analysis
            - gunshot residue
            - weapon discharge
            - caliber analysis
            - forensic ballistics
      strength: specific
    - id: Keyword_global_top500_411_ballistics_evidence_records_domain_context
      groups:
        - match_style: word
          terms:
            - ballistics evidence records
            - ballistics
            - evidence
      strength: domain
risk_description: >-
  This concept regex recognises ballistics evidence, firearms analysis, bullet comparisons, and ballistics reports in case context. A genuine record can reveal forensic conclusions, weapon links, laboratory observations, and evidentiary gaps, enabling evidence tampering, witness coaching, or prejudice to unresolved proceedings. The usual report affects a particular investigation and has serious legal consequences, but it does not inherently expose protected forensic capabilities or a broad operation. Risk 8 remains SENSITIVE Law-Enforcement; PROTECTED would require sensitive methods, an active major operation, or compromise causing significant public-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Law-Enforcement
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
