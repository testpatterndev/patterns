schema: testpattern/v1
name: US Passport Number
slug: us-passport-number
version: 1.4.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects US passport numbers in exactly two accepted formats: a nine-digit numeric value (older US passports), or a
  single uppercase letter followed by exactly eight digits (newer passport books and cards). Bare eight-digit values
  and letter-plus-nine-digit values are not valid US passport numbers. Due to the relatively simple format,
  corroborative keyword proximity is strongly recommended to reduce false positives.
operation: >-
  Reference: https://travel.state.gov/content/travel/en/passports/passport-help/next-generation-passport.html
  Corroborative evidence: 5 keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b(?:[A-Z]\d{8}|\d{9})\b
confidence: medium
confidence_justification: >-
  The US passport number format is short and loosely structured, consisting of an optional letter followed by 8-9
  digits. This simplicity means the pattern can match many unrelated numeric strings such as reference codes, invoice
  numbers, and account identifiers. Medium confidence is appropriate; strong corroborative keyword proximity is
  essential for reliable detection.
jurisdictions:
  - us
regulations:
- "CCPA/CPRA"
- HIPAA
- "State Breach Laws (US)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - passport number
    - passport no
    - travel document
    - australian passport
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: A12345678
      description: Letter-prefixed 8-digit US passport number (newer format)
    - value: '123456789'
      description: Nine-digit numeric US passport number (older format)
    - value: C03005988
      description: Letter-prefixed 8-digit US passport number (next-generation book)
  should_not_match:
    - value: AB12345678
      description: Two-letter prefix is not a valid US passport number format
    - value: '1234567'
      description: Only 7 digits, which is below the minimum length for a US passport number
    - value: '12345678'
      description: Bare eight-digit value is the unsupported short cross-product (only letter + 8 digits or 9 digits are valid)
    - value: A123456789
      description: Letter plus nine digits is the unsupported long cross-product
false_positives:
  - description: Other 8-9 digit numbers such as order IDs, reference codes, phone numbers, and account identifiers
    mitigation: >-
      Require strong corroborative keyword proximity (e.g., 'passport', 'travel document') within 300 characters to
      confirm the match as a genuine passport number
  - description: Reference codes and serial numbers with an optional single-letter prefix
    mitigation: >-
      Cross-reference with document context and additional entity detection to distinguish passport numbers from generic
      alphanumeric identifiers
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_us_passport
      matches:
        - ref: Keyword_us_passport_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_us_passport
      matches:
        - ref: Keyword_us_passport_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_us_passport
  regexes:
    - id: Regex_us_passport
      pattern: \b(?:[A-Z]\d{8}|\d{9})\b
  keywords:
    - id: Keyword_us_passport_specific
      groups:
        - match_style: word
          terms:
            - passport
            - passport number
            - passport no
            - passport no.
            - passport#
            - passport #
            - passportno
            - passportnumber
            - US passport
            - United States passport
      strength: domain
    - id: Keyword_us_passport_broad
      groups:
        - match_style: word
          terms:
            - travel document
            - travel ID
            - State Department
            - Department of State
            - immigration
            - citizenship
            - visa
            - border crossing
            - port of entry
            - consulate
            - embassy
      strength: domain
  filters:
    - id: Guard_us_passport_same_digits
      type: AllDigitsSameFilter
risk_description: >-
  The active US passport detector recognises older nine-digit numbers and newer values with an optional uppercase prefix followed by eight digits, together with passport context; it does not find the document image or travel file. Leakage could help fill a booking or identity-verification form and make a targeted pretext more convincing after the traveller's biographical details are known. A normal match exposes one reference value, while invoices, account identifiers, and serial codes frequently share the short numeric shape. Risk 5 and OFFICIAL are proportionate; SENSITIVE would require the passport data page, credentials, or a joined identity and itinerary record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
created: '2026-02-08'
updated: '2026-07-16'
changelog:
  - version: 1.4.0
    date: '2026-07-16'
    description: >-
      Replace the optional-letter/variable-length cross-product \b[A-Z]?\d{8,9}\b with the explicit alternation \b(?:[A-Z]\d{8}|\d{9})\b in both the top-level pattern and Regex_us_passport — the old
      shape admitted bare eight-digit values and letter-plus-nine-digit values that the description never declared. Context tiers, same-digit guard, and noise gate unchanged; added short/long
      cross-product negatives.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1433 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.1
    date: '2026-07-06'
    description: Add AllDigitsSameFilter guard — primary regex accepted all-zeros/same-digit passport values (e.g. 000000000); mirrors au-medicare-card-identifier protection.
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
