schema: testpattern/v1
name: Psychometric assessment results
slug: au-top500-073-psychometric-assessment-results
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to psychometric assessment results in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:psychometric\s+assessment|psychometric\s+test|personality\s+profile|cognitive\s+assessment|aptitude\s+test|behavioural\s+assessment|psychological\s+assessment|test\s+results|candidate\s+profile|assessment\s+score|psychometric\s+report|personality\s+assessment)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - psychometric assessment results
    - psychometric
    - assessment
    - results
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: psychometric assessment
      description: Primary topic phrase match
    - value: psychometric test
      description: Case-insensitive topic phrase match
    - value: personality profile
      description: Alternative topic phrase match
    - value: cognitive assessment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to psychometric assessment results appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_psychometric_assessment
      matches:
        - ref: Evidence_psychometric_assessment
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_psychometric_assessment
      matches:
        - ref: Evidence_psychometric_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_psychometric_assessment
      matches:
        - ref: Evidence_psychometric_assessment
  regexes:
    - id: Pattern_psychometric_assessment
      pattern: >-
        (?is)\b(?:psychometric\s+assessment|psychometric\s+test|personality\s+profile|cognitive\s+assessment|aptitude\s+test|behavioural\s+assessment|psychological\s+assessment|test\s+results|candidate\s+profile|assessment\s+score|psychometric\s+report|personality\s+assessment)\b
    - id: Pattern_au_top500_073_psychometric_assessment_results_label_context
      pattern: (?i)\\b(?:psychometric\\s+assessment\\s+results|psychometric|assessment|results|top500)\\b
  keywords:
    - id: Evidence_psychometric_assessment
      groups:
        - match_style: word
          terms:
            - psychometric assessment
            - psychometric test
            - personality profile
            - cognitive assessment
            - aptitude test
            - behavioural assessment
            - psychological assessment
            - test results
            - candidate profile
            - assessment score
            - psychometric report
            - personality assessment
    - id: Keyword_au_top500_073_psychometric_assessment_results_domain_context
      groups:
        - match_style: word
          terms:
            - psychometric assessment results
            - psychometric
            - assessment
            - results
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
