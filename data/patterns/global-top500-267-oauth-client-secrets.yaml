schema: testpattern/v1
name: OAuth client secrets
slug: global-top500-267-oauth-client-secrets
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies oauth client secrets patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: classification-australia-government, credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:client\s+secret|client\s+id|authorization\s+code|access\s+token|refresh\s+token|bearer\s+token|openid\s+connect|grant\s+type|redirect\s+uri|token\s+endpoint)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - oauth client secrets
    - oauth
    - client
    - secrets
    - credentials
    - keys
  proximity: 300
  keyword_lists:
    - classification-australia-government
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: client secret
      description: Primary topic phrase match
    - value: client id
      description: Case-insensitive topic phrase match
    - value: authorization code
      description: Alternative topic phrase match
    - value: access token
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: secret mfa
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 90
      id_match: Regex_oauth_client_secrets
      matches:
        - ref: Pattern_global_top500_267_oauth_client_secrets_label_context
        - ref: Keyword_global_top500_267_oauth_client_secrets_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_oauth_client_secrets
      matches:
        - ref: Keyword_oauth_client_secrets
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_oauth_client_secrets
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_oauth_client_secrets
      pattern: (?is)\b(?:client\s+secret|client\s+id|authorization\s+code|access\s+token|refresh\s+token|bearer\s+token|openid\s+connect|grant\s+type|redirect\s+uri|token\s+endpoint)\b
    - id: Pattern_global_top500_267_oauth_client_secrets_label_context
      pattern: (?i)\\b(?:oauth\\s+client\\s+secrets|oauth|client|secrets|top500)\\b
  keywords:
    - id: Keyword_oauth_client_secrets
      groups:
        - match_style: word
          terms:
            - oauth
            - client secret
            - client id
            - authorization code
            - access token
            - refresh token
            - bearer token
            - openid connect
            - grant type
            - redirect uri
            - scope
            - token endpoint
    - id: Keyword_global_top500_267_oauth_client_secrets_domain_context
      groups:
        - match_style: word
          terms:
            - oauth client secrets
            - oauth
            - client
            - secrets
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references: []
