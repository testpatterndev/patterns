schema: testpattern/v1
name: Recommendation letters
slug: global-top500-351-recommendation-letters
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to recommendation letters in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:recommendation\s+letters?|letter\s+of\s+reference|referee\s+report|academic\s+reference|character\s+reference|professional\s+reference|endorsement\s+letter|faculty\s+recommendation|supervisor\s+reference)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - recommendation letters
    - recommendation
    - letters
    - education
    - research
    - administration
  proximity: 300
test_cases:
  should_match:
    - value: recommendation letter
      description: Primary topic phrase match
    - value: recommendation letters
      description: Plural form as used in structured document labels and real-world usage; regressed to 0 detections before this fix because the base regex required a singular, non-continuing "letter"
    - value: letter of reference
      description: Case-insensitive topic phrase match
    - value: referee report
      description: Alternative topic phrase match
    - value: academic reference
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: student grant
      description: Generic word pair from old broad template should not match
    - value: reference check results
      description: Generic vendor/HR term removed from the regex (2026-07 FP fix) after proving overbroad — matched in unrelated vendor due-diligence decoy documents
    - value: personal statement
      description: Generic term removed from the regex (2026-07 FP fix) — not specific to the recommendation-letters domain
false_positives:
  - description: Common words and phrases related to recommendation letters appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_recommendation_letters
      matches:
        - ref: Pattern_global_top500_351_recommendation_letters_label_context
        - ref: Keyword_global_top500_351_recommendation_letters_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_recommendation_letters
      matches:
        - ref: Keyword_recommendation_letters
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_recommendation_letters
      pattern: >-
        (?is)\b(?:recommendation\s+letters?|letter\s+of\s+reference|referee\s+report|academic\s+reference|character\s+reference|professional\s+reference|endorsement\s+letter|faculty\s+recommendation|supervisor\s+reference)\b
    - id: Pattern_global_top500_351_recommendation_letters_label_context
      pattern: (?i)\b(?:recommendation\s+letters)\b
  keywords:
    - id: Keyword_recommendation_letters
      groups:
        - match_style: word
          terms:
            - recommendation letter
            - recommendation letters
            - letter of reference
            - referee report
            - academic reference
            - character reference
            - professional reference
            - endorsement letter
            - recommender
            - faculty recommendation
            - supervisor reference
      strength: specific
    - id: Keyword_global_top500_351_recommendation_letters_domain_context
      groups:
        - match_style: word
          terms:
            - recommendation letters
            - recommendation
            - letters
      strength: domain
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Narrow overbroad phrases (FALSE_POSITIVE verdict: ps=ph=0, decoy false-fire) and align regex with positive test values: add plural recommendation\s+letters? (docs use plural exclusively), remove overbroad reference\s+check (88 hits in unrelated vendor decoy) and personal\s+statement'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
