schema: testpattern/v1
name: DNS zone files
slug: global-top500-312-dns-zone-files
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies dns zone files patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 6 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: \$ORIGIN\b|\$TTL\b|\bIN\s+SOA\b|\bIN\s+A\s+\d{1,3}(?:\.\d{1,3}){3}\b|\bIN\s+(?:AAAA|CNAME|MX|NS|PTR|SRV|TXT)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - dns zone files
    - dns
    - zone
    - files
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: '$TTL 86400'
      description: Zone-file TTL directive
    - value: '$ORIGIN example.com.'
      description: Zone-file ORIGIN directive
    - value: www IN A 192.0.2.1
      description: A record line
    - value: example.com. IN SOA ns1.example.com. admin.example.com.
      description: SOA record line
  should_not_match:
    - value: we met in a meeting room
      description: Lowercase "in a" prose must not match (IN is case-sensitive)
    - value: the soa architecture team reviewed it
      description: Lowercase "soa" prose must not match
    - value: generic policy prose without anchors
      description: Should reject generic mentions without zone-file structure
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_dns_zone
      matches:
        - ref: Pattern_global_top500_312_dns_zone_files_label_context
        - ref: Keyword_global_top500_312_dns_zone_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_dns_zone
      matches:
        - ref: Keyword_dns_zone
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_dns_zone
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_dns_zone
      pattern: \$ORIGIN\b|\$TTL\b|\bIN\s+SOA\b|\bIN\s+A\s+\d{1,3}(?:\.\d{1,3}){3}\b|\bIN\s+(?:AAAA|CNAME|MX|NS|PTR|SRV|TXT)\b
    - id: Pattern_global_top500_312_dns_zone_files_label_context
      pattern: (?i)\b(?:dns\s+zone\s+files)\b
  keywords:
    - id: Keyword_dns_zone
      groups:
        - match_style: word
          terms:
            - DNS zone
            - zone file
            - name server
            - SOA record
            - MX record
            - CNAME record
            - A record
            - AAAA record
            - text: TTL
              case_sensitive: true
            - BIND
            - zone transfer
            - DNS configuration
      strength: specific
    - id: Keyword_global_top500_312_dns_zone_files_domain_context
      groups:
        - match_style: word
          terms:
            - dns zone files
            - dns
            - zone
            - files
      strength: domain
created: '2026-02-08'
updated: '2026-07-04'
changelog:
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
