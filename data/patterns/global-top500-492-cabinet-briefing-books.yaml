schema: testpattern/v1
name: Cabinet briefing books
slug: global-top500-492-cabinet-briefing-books
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to cabinet briefing books in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:cabinet\s+briefing\s+books|cabinet\s+briefing|ministerial\s+brief|cabinet\s+submission|cabinet\s+decision|executive\s+summary|policy\s+brief|talking\s+points|briefing\s+note|cabinet\s+agenda|ministerial\s+submission)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - cabinet briefing books
  proximity: 240
test_cases:
  should_match:
    - value: cabinet briefing books
      description: Primary topic phrase match
    - value: cabinet briefing
      description: Case-insensitive topic phrase match
    - value: ministerial brief
      description: Alternative topic phrase match
    - value: cabinet submission
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to cabinet briefing books appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_cabinet_briefing
      matches:
        - ref: Pattern_global_top500_492_cabinet_briefing_books_label_context
        - ref: Keyword_global_top500_492_cabinet_briefing_books_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_cabinet_briefing
      matches:
        - ref: Keyword_cabinet_briefing
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_cabinet_briefing
      pattern: >-
        (?is)\b(?:cabinet\s+briefing\s+books|cabinet\s+briefing|ministerial\s+brief|cabinet\s+submission|cabinet\s+decision|executive\s+summary|policy\s+brief|talking\s+points|briefing\s+note|cabinet\s+agenda|ministerial\s+submission)\b
    - id: Pattern_global_top500_492_cabinet_briefing_books_label_context
      pattern: (?i)\b(?:cabinet\s+briefing\s+books)\b
  keywords:
    - id: Keyword_cabinet_briefing
      groups:
        - match_style: word
          terms:
            - cabinet briefing books
            - cabinet briefing
            - ministerial brief
            - cabinet submission
            - cabinet decision
            - executive summary
            - policy brief
            - cabinet-in-confidence
            - talking points
            - briefing note
            - cabinet agenda
            - ministerial submission
      strength: specific
    - id: Keyword_global_top500_492_cabinet_briefing_books_domain_context
      groups:
        - match_style: word
          terms:
            - cabinet briefing books
            - cabinet
            - briefing
            - books
      strength: domain
risk_description: >-
  The concept pattern recognises Cabinet briefings, ministerial briefs, submissions, decisions, agendas, policy briefs, and talking points; it does not verify Cabinet status, currency, or an official security marking. An authentic briefing book can expose pre-decisional options, ministerial advice, disagreements, implementation timing, and stakeholder strategy, enabling lobbying, market advantage, or political manipulation. The harm is serious but may be contained to one policy matter, and the detector also catches routine briefing notes and public policy summaries. Risk 8 and SENSITIVE preserve that realistic midpoint; PROTECTED would require current confidential Cabinet deliberations on a high-consequence matter whose disclosure is likely to cause significant national damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
