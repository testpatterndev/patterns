schema: testpattern/v1
name: Cabinet briefing books
slug: global-top500-492-cabinet-briefing-books
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive Cabinet briefing books, packs, and agenda briefing books. Topic phrases are
  retained for discovery; enforcement requires agenda-item, issue-summary, policy-option,
  recommendation, speaking-point, stakeholder, financial, implementation, or decision content, and high
  confidence also requires Cabinet confidentiality, meeting, agenda-number, briefing-number, embargo,
  draft-decision, or restricted-circulation evidence.
operation: >-
  Regex_cabinet_briefing recognises Cabinet briefing-book, briefing-pack, agenda-book, and
  meeting-briefing topics. The topic alone is discovery-only at 65. Substantive agenda/options/advice
  content raises it to 75; pre-decisional Cabinet handling evidence reaches 85. Enforcing tiers reject
  explicit templates and training examples.
pattern: >-
  (?is)\b(?:cabinet\s+briefing\s+book|cabinet\s+briefing\s+pack|cabinet\s+agenda\s+briefing\s+book|cabinet\s+meeting\s+briefing\s+book)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires substantive Cabinet briefing content. High confidence adds pre-decisional
  Cabinet handling or formal meeting/agenda evidence.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government
corroborative_evidence:
  keywords:
    - cabinet briefing books
  proximity: 240
test_cases:
  should_match:
    - value: cabinet briefing book
      description: Low-tier probe - briefing-book topic without substantive content
    - value: 'Cabinet briefing book: agenda item, issue summary, policy options, recommendations, stakeholder positions, financial implications, implementation timeline, and decision required'
      description: Medium-tier probe - substantive briefing content without pre-decisional handling
    - value: 'Cabinet-in-Confidence Cabinet briefing book number: CBB-2026-04 for meeting date 18 July 2026, agenda item 7: policy options, recommendations, stakeholder positions, financial implications, and draft decision'
      description: High-tier probe - substantive briefing with Cabinet handling, meeting, agenda, and draft-decision evidence
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
    - value: 'The public policy brief summarises the announced Cabinet decision.'
      description: Public policy summary outside a Cabinet briefing book
    - value: 'Training example: Cabinet-in-Confidence Cabinet briefing book CBB-2026-04 with policy options and draft decision'
      description: Explicit training content must not enforce
false_positives:
  - description: Public policy briefs, announced Cabinet decisions, and writing guidance discuss options, recommendations, and Cabinet processes without containing a briefing book.
    mitigation: Keep briefing-book topics discovery-only and require agenda, issue, option, recommendation, speaking-point, stakeholder, financial, implementation, or decision content.
  - description: Training books can contain realistic Cabinet markings, meeting dates, agenda numbers, briefing references, draft decisions, and restricted-circulation instructions.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_cabinet_briefing
      matches:
        - ref: Evidence_cabinet_briefing_content
        - ref: Evidence_cabinet_prerelease
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_cabinet_briefing
      matches:
        - ref: Evidence_cabinet_briefing_content
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_cabinet_briefing
  regexes:
    - id: Regex_cabinet_briefing
      pattern: >-
        (?is)\b(?:cabinet\s+briefing\s+book|cabinet\s+briefing\s+pack|cabinet\s+agenda\s+briefing\s+book|cabinet\s+meeting\s+briefing\s+book)\b
  keywords:
    - id: Evidence_cabinet_briefing_content
      groups:
        - match_style: word
          terms:
            - agenda item
            - issue summary
            - policy options
            - recommendations
            - speaking points
            - stakeholder positions
            - financial implications
            - implementation timeline
            - decision required
      strength: domain
    - id: Evidence_cabinet_prerelease
      groups:
        - match_style: word
          terms:
            - Cabinet-in-Confidence
            - meeting date
            - agenda item number
            - briefing book number
            - embargoed
            - draft decision
            - not for release
            - restricted circulation
      strength: specific
risk_description: >-
  The concept pattern recognises Cabinet briefings, ministerial briefs, submissions, decisions, agendas, policy briefs, and talking points; it does not verify Cabinet status, currency, or an official security marking. An authentic briefing book can expose pre-decisional options, ministerial advice, disagreements, implementation timing, and stakeholder strategy, enabling lobbying, market advantage, or political manipulation. The harm is serious but may be contained to one policy matter, and the detector also catches routine briefing notes and public policy summaries. Risk 8 and SENSITIVE preserve that realistic midpoint; PROTECTED would require current confidential Cabinet deliberations on a high-consequence matter whose disclosure is likely to cause significant national damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
