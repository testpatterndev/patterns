schema: testpattern/v1
name: India UPI Virtual Payment Address
slug: in-upi-vpa
version: 1.1.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Unified Payments Interface (UPI) Virtual Payment Addresses (VPA / UPI ID) used in India.
  Format is a local part and a payment-service provider handle separated by @ (for example name@oksbi or
  business@ybl). Handles are alphabetic PSP codes; local parts allow letters, digits, dot, underscore and hyphen.
operation: >-
  Structural VPA detection with bounded classes (local 2-64 chars, handle 2-32 chars). Does not
  validate against the NPCI handle registry. Corroborative evidence: UPI/VPA keywords within 300 characters.
  Keyword lists: financial-transaction, banking.
pattern: '\b[A-Za-z0-9][A-Za-z0-9._-]{1,63}@[A-Za-z][A-Za-z0-9]{1,31}(?![A-Za-z0-9.])'
confidence: medium
confidence_justification: >-
  Medium confidence: email-like strings can look similar; UPI-specific keywords and
  common PSP handles in evidence terms reduce false positives.
jurisdictions:
  - in
regulations:
  - DPDPA
  - "IT Act 2000 (India)"
  - "Payment and Settlement Systems Act 2007"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - financial
  - pii
corroborative_evidence:
  keywords:
    - UPI
    - UPI ID
    - VPA
    - virtual payment address
    - payee address
  proximity: 300
  keyword_lists:
    - financial-transaction
    - banking
test_cases:
  should_match:
    - value: 'rahul.sharma@oksbi'
      description: SBI YONO-style handle
    - value: 'shop123@ybl'
      description: PhonePe ybl handle
    - value: 'merchant-01@apl'
      description: Amazon Pay handle
  should_not_match:
    - value: 'user@domain.com'
      description: Email with multi-part TLD-like handle containing dot — handle disallows dots
    - value: '@oksbi'
      description: Missing local part
    - value: 'user@'
      description: Missing handle
false_positives:
  - description: >-
      Some short email-like corporate aliases without dots in the domain label.
    mitigation: >-
      Require UPI/VPA/payee keywords; common PSP handles listed in broad evidence.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_in_upi_vpa
      matches:
        - ref: Keyword_in_upi_vpa_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_in_upi_vpa
      matches:
        - ref: Keyword_in_upi_vpa_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_in_upi_vpa
  regexes:
    - id: Regex_in_upi_vpa
      pattern: '\b[A-Za-z0-9][A-Za-z0-9._-]{1,63}@[A-Za-z][A-Za-z0-9]{1,31}(?![A-Za-z0-9.])'
  keywords:
    - id: Keyword_in_upi_vpa_specific
      groups:
        - match_style: word
          terms:
            - UPI ID
            - UPI address
            - virtual payment address
            - text: VPA
              case_sensitive: true
            - UPI VPA
            - payee VPA
            - collect request
      strength: specific
    - id: Keyword_in_upi_vpa_broad
      groups:
        - match_style: word
          terms:
            - text: UPI
              case_sensitive: true
            - BHIM
            - PhonePe
            - Google Pay
            - Paytm
            - NPCI
            - intent pay
            - scan and pay
            - oksbi
            - okhdfcbank
            - okicici
            - ybl
            - axl
      strength: specific
risk_rating: 4
risk_description: >-
  The detector finds an email-like UPI virtual payment address with nearby UPI, VPA, banking, or transaction terminology, but it does not validate the handle against the NPCI registry. A VPA identifies where payment requests or transfers can be directed and may enable nuisance collect requests, phishing, or correlation to a person or merchant, but it does not authorise payment or grant account access. The normal unit is a deliberately shareable payment alias with low, reversible harm that still needs identity or authentication context for material misuse. Risk 4 and OFFICIAL are appropriate, while a VPA linked to transaction history, a verified holder profile, or usable payment credentials would warrant SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
references:
  - url: https://www.npci.org.in/what-we-do/upi/product-overview
    title: NPCI UPI overview
created: '2026-07-09'
updated: '2026-07-14'
