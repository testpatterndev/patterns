schema: testpattern/v1
name: Geospatial intelligence products
slug: global-top500-427-geospatial-intelligence-products
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to geospatial intelligence products in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:geospatial\s+intelligence|imagery\s+intelligence|satellite\s+imagery|terrain\s+analysis|geospatial\s+data|mapping\s+product|overhead\s+imagery|image\s+exploitation|geodetic\s+survey|remote\s+sensing)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - geospatial intelligence products
  proximity: 240
test_cases:
  should_match:
    - value: geospatial intelligence
      description: Primary topic phrase match
    - value: imagery intelligence
      description: Case-insensitive topic phrase match
    - value: satellite imagery
      description: Alternative topic phrase match
    - value: terrain analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to geospatial intelligence products appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_geospatial_intelligence_products
      matches:
        - ref: Pattern_global_top500_427_geospatial_intelligence_products_label_context
        - ref: Keyword_global_top500_427_geospatial_intelligence_products_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_geospatial_intelligence_products
      matches:
        - ref: Keyword_geospatial_intelligence_products
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_geospatial_intelligence_products
      matches:
        - ref: Keyword_geospatial_intelligence_products
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_geospatial_intelligence_products
      pattern: >-
        (?is)\b(?:geospatial\s+intelligence|imagery\s+intelligence|satellite\s+imagery|terrain\s+analysis|geospatial\s+data|mapping\s+product|overhead\s+imagery|image\s+exploitation|geodetic\s+survey|remote\s+sensing)\b
    - id: Pattern_global_top500_427_geospatial_intelligence_products_label_context
      pattern: (?i)\\b(?:geospatial\\s+intelligence\\s+products|geospatial|intelligence|products|top500)\\b
  keywords:
    - id: Keyword_geospatial_intelligence_products
      groups:
        - match_style: word
          terms:
            - geospatial intelligence
            - GEOINT
            - imagery intelligence
            - IMINT
            - satellite imagery
            - terrain analysis
            - geospatial data
            - mapping product
            - overhead imagery
            - image exploitation
            - geodetic survey
            - remote sensing
    - id: Keyword_global_top500_427_geospatial_intelligence_products_domain_context
      groups:
        - match_style: word
          terms:
            - geospatial intelligence products
            - geospatial
            - intelligence
            - products
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Secret
