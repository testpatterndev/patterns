schema: testpattern/v1
name: Malta Physical Addresses
slug: mt-physical-addresses
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Malta Physical Addresses patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that uses machine learning and function-based detection for physical
  address identification. This keyword list provides address-related terms for supplementary matching.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  country-specific address terminology to identify physical address data.
keywords:
  - triq
  - street
  - road
  - avenue
  - misraħ
  - vjal
  - Valletta
  - Sliema
  - Birkirkara
  - postcode
  - sqaq
  - telgħa
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on address terms requires additional context and
  corroborative evidence for accurate physical address detection. Address keywords alone
  produce high false positive rates without structural validation.
jurisdictions:
  - mt
  - eu
regulations:
  - GDPR
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 triq name, unit 4"
      description: Contains address keyword 'triq'
    - value: "located at 45 street example"
      description: Contains address keyword 'street'
    - value: "deliver to 78 road test"
      description: Contains address keyword 'road'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_mt_address_primary
      matches:
        - ref: Keyword_mt_address_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_mt_address_primary
  keywords:
    - id: Keyword_mt_address_primary
      groups:
        - match_style: word
          terms:
            - triq
            - street
            - road
            - avenue
            - misraħ
            - vjal
            - sqaq
            - telgħa
      strength: domain
    - id: Keyword_mt_address_context
      groups:
        - match_style: word
          terms:
            - Valletta
            - Sliema
            - Birkirkara
            - postcode
            - address
            - Malta
            - residence
            - indirizz
            - lokalita
            - kodiċi postali
      strength: domain
risk_rating: 3
risk_description: >-
  The Malta address list combines the Maltese road word triq with generic English street and road terminology. That mixed vocabulary appears frequently in tourism listings, directions, business contact details, and public-place names, so a low-confidence match may not be residential or even complete. A single Maltese address has limited confidentiality impact unless linked to a resident, household circumstance, or sensitive destination. Risk 3 supports OFFICIAL; SENSITIVE would require a confidential home, vulnerable person's whereabouts, protected facility, repeated visits, or an attributed address register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-malta-physical-addresses
    title: "Malta Physical Addresses entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1345 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
author: testpattern-community
