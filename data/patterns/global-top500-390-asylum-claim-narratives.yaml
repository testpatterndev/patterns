schema: testpattern/v1
name: Asylum claim narratives
slug: global-top500-390-asylum-claim-narratives
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to asylum claim narratives in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:asylum\s+claim\s+narratives|asylum\s+seeker|refugee\s+claim|protection\s+visa|persecution\s+claim|country\s+of\s+origin|asylum\s+application|refugee\s+status|humanitarian\s+protection|credibility\s+assessment|asylum\s+tribunal|claim\s+statement)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - asylum claim narratives
  proximity: 240
test_cases:
  should_match:
    - value: asylum claim narratives
      description: Primary topic phrase match
    - value: asylum seeker
      description: Case-insensitive topic phrase match
    - value: refugee claim
      description: Alternative topic phrase match
    - value: protection visa
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: immigration case
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to asylum claim narratives appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_asylum_claim
      matches:
        - ref: Pattern_global_top500_390_asylum_claim_narratives_label_context
        - ref: Keyword_global_top500_390_asylum_claim_narratives_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_asylum_claim
      matches:
        - ref: Keyword_asylum_claim
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_asylum_claim
      matches:
        - ref: Keyword_asylum_claim
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_asylum_claim
      pattern: >-
        (?is)\b(?:asylum\s+claim\s+narratives|asylum\s+seeker|refugee\s+claim|protection\s+visa|persecution\s+claim|country\s+of\s+origin|asylum\s+application|refugee\s+status|humanitarian\s+protection|credibility\s+assessment|asylum\s+tribunal|claim\s+statement)\b
    - id: Pattern_global_top500_390_asylum_claim_narratives_label_context
      pattern: (?i)\\b(?:asylum\\s+claim\\s+narratives|asylum|claim|narratives|top500)\\b
  keywords:
    - id: Keyword_asylum_claim
      groups:
        - match_style: word
          terms:
            - asylum claim narratives
            - asylum seeker
            - refugee claim
            - protection visa
            - persecution claim
            - country of origin
            - asylum application
            - refugee status
            - humanitarian protection
            - credibility assessment
            - asylum tribunal
            - claim statement
    - id: Keyword_global_top500_390_asylum_claim_narratives_domain_context
      groups:
        - match_style: word
          terms:
            - asylum claim narratives
            - asylum
            - claim
            - narratives
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references: []
