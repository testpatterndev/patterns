schema: testpattern/v1
name: Merchant acquiring credentials
slug: global-top500-111-merchant-acquiring-credentials
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to merchant acquiring credentials in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: credentials-passwords. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:merchant\s+ID|acquiring\s+bank|merchant\s+account|payment\s+gateway|terminal\s+ID|merchant\s+credentials|API\s+key|settlement\s+account|payment\s+processor|merchant\s+number|POS\s+terminal)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - merchant acquiring credentials
    - merchant
    - acquiring
    - credentials
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: merchant ID
      description: Primary topic phrase match
    - value: acquiring bank
      description: Case-insensitive topic phrase match
    - value: merchant account
      description: Alternative topic phrase match
    - value: payment gateway
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_merchant_credentials
      matches:
        - ref: Pattern_global_top500_111_merchant_acquiring_credentials_label_context
        - ref: Keyword_global_top500_111_merchant_acquiring_credentials_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_111_merchant_acquiring_credentials_noise_exclusion
    - confidence_level: 75
      id_match: Regex_merchant_credentials
      matches:
        - ref: Keyword_merchant_credentials
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_111_merchant_acquiring_credentials_noise_exclusion
    - confidence_level: 65
      id_match: Regex_merchant_credentials
      matches:
        - ref: Keyword_merchant_credentials
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_111_merchant_acquiring_credentials_noise_exclusion
  regexes:
    - id: Regex_merchant_credentials
      pattern: (?is)\b(?:merchant\s+ID|acquiring\s+bank|merchant\s+account|payment\s+gateway|terminal\s+ID|merchant\s+credentials|API\s+key|settlement\s+account|payment\s+processor|merchant\s+number|POS\s+terminal)\b
    - id: Pattern_global_top500_111_merchant_acquiring_credentials_label_context
      pattern: (?i)\\b(?:merchant\\s+acquiring\\s+credentials|merchant|acquiring|credentials|top500)\\b
  keywords:
    - id: Keyword_merchant_credentials
      groups:
        - match_style: word
          terms:
            - merchant ID
            - acquiring bank
            - merchant account
            - payment gateway
            - terminal ID
            - acquirer
            - merchant credentials
            - API key
            - settlement account
            - payment processor
            - merchant number
            - POS terminal
    - id: Keyword_global_top500_111_merchant_acquiring_credentials_domain_context
      groups:
        - match_style: word
          terms:
            - merchant acquiring credentials
            - merchant
            - acquiring
            - credentials
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_111_merchant_acquiring_credentials_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
