schema: testpattern/v1
name: Henkilötunnus (HETU)
slug: fi-national-id
version: 1.3.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Henkilötunnus (HETU) patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly,
  or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-finland-national-id Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses additional
  domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{6}[-+A]\d{3}[A-Z0-9]\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has strong structural constraints (specific format, prefix, or character class restrictions) that significantly reduce false positive rates. Added context gating and
  exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - eu
  - fi
regulations:
  - BDSG
  - CNIL / LIL
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - henkilötunnus
    - HETU
    - personal identity code
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 010175-123A
      description: Finnish HETU born in 1900s
    - value: 120388+234B
      description: Finnish HETU born in 1800s
    - value: 150392A456C
      description: Finnish HETU born in 2000s
  should_not_match:
    - value: 010175X123A
      description: Invalid century character
    - value: 010175-12A
      description: Too few digits in individual number
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: The structured format with century marker significantly reduces false positives, though test data or documentation may contain example patterns.
    mitigation: The century marker (-, +, A) provides strong structural validation. Additional keyword context improves accuracy.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_fi_national_id
      matches:
        - ref: Pattern_fi_national_id_label_context
        - ref: Keyword_fi_national_id_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_fi_national_id
      matches:
        - ref: Keyword_fi_national_id
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_fi_national_id
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_fi_national_id
      pattern: \b\d{6}[-+A]\d{3}[A-Z0-9]\b
    - id: Pattern_fi_national_id_label_context
      pattern: (?i)\b(?:henkilötunnus\s+\(hetu\)|henkil|tunnus|hetu|national)\b
  keywords:
    - id: Keyword_fi_national_id
      groups:
        - match_style: word
          terms:
            - henkilötunnus
            - HETU
            - personal identity code
            - sosiaaliturvatunnus
            - tunnistenumero
            - henkilönumero
            - personbeteckning
            - personnummer
            - Finnish personal ID
            - national identification
      strength: domain
    - id: Keyword_fi_national_id_domain_context
      groups:
        - match_style: word
          terms:
            - henkilötunnus (hetu)
            - henkil
            - tunnus
            - hetu
            - national
      strength: domain
risk_rating: 5
risk_description: >-
  The Finnish HETU detector recognises six date digits, a century marker, three individual characters, and a final control character with civic context and template exclusions. A genuine HETU reveals date-of-birth information and can imply sex through the individual number while linking one person across public and private services. Its distinctive structure gives high confidence, but the value alone does not authenticate the holder or disclose a health, tax, or financial record. Risk 5 OFFICIAL reflects bounded encoded-attribute and correlation harm; SENSITIVE would require verified attribution or linked service information.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-finland-national-id
    title: Finland National ID entity definition - Microsoft Learn
