schema: testpattern/v1
name: Security clearance adjudication files
slug: global-top500-433-security-clearance-adjudication-files
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to security clearance adjudication files in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: au-government-security-clearances. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:security\s+clearance|background\s+investigation|personnel\s+security|clearance\s+level|top\s+secret|sensitive\s+compartmented|eligibility\s+determination|security\s+screening|need\s+to\s+know)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - security clearance adjudication files
  proximity: 240
  keyword_lists:
    - au-government-security-clearances
test_cases:
  should_match:
    - value: security clearance
      description: Primary topic phrase match
    - value: background investigation
      description: Case-insensitive topic phrase match
    - value: personnel security
      description: Alternative topic phrase match
    - value: clearance level
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to security clearance adjudication files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_security_clearance_adjudication
      matches:
        - ref: Pattern_global_top500_433_security_clearance_adjudication_files_label_context
        - ref: Keyword_global_top500_433_security_clearance_adjudication_files_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_security_clearance_adjudication
      matches:
        - ref: Keyword_security_clearance_adjudication
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_security_clearance_adjudication
      matches:
        - ref: Keyword_security_clearance_adjudication
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_security_clearance_adjudication
      pattern: >-
        (?is)\b(?:security\s+clearance|background\s+investigation|personnel\s+security|clearance\s+level|top\s+secret|sensitive\s+compartmented|eligibility\s+determination|security\s+screening|need\s+to\s+know)\b
    - id: Pattern_global_top500_433_security_clearance_adjudication_files_label_context
      pattern: (?i)\\b(?:security\\s+clearance\\s+adjudication\\s+files|security|clearance|adjudication|files|top500)\\b
  keywords:
    - id: Keyword_security_clearance_adjudication
      groups:
        - match_style: word
          terms:
            - security clearance
            - adjudication
            - vetting
            - background investigation
            - personnel security
            - clearance level
            - top secret
            - sensitive compartmented
            - polygraph
            - eligibility determination
            - security screening
            - need to know
    - id: Keyword_global_top500_433_security_clearance_adjudication_files_domain_context
      groups:
        - match_style: word
          terms:
            - security clearance adjudication files
            - security
            - clearance
            - adjudication
            - files
            - top500
            - field
            - identifier
            - reference
