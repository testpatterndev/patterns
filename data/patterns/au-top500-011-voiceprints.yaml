schema: testpattern/v1
name: Voiceprints
slug: au-top500-011-voiceprints
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to voiceprints in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 4 keywords within 300 characters. Keyword lists: biometric-voice-iris. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:voice\s+recognition|voice\s+biometric|voice\s+template|voice\s+authentication|speaker\s+recognition|voice\s+sample|voice\s+pattern|voice\s+ID|vocal\s+biometric)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - voiceprints
    - personal
    - identity
    - demographics
  proximity: 300
  keyword_lists:

    - biometric-voice-iris
test_cases:
  should_match:
    - value: voice recognition
      description: Primary topic phrase match
    - value: voice biometric
      description: Case-insensitive topic phrase match
    - value: voice template
      description: Alternative topic phrase match
    - value: voice authentication
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to voiceprints appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_voiceprints
      matches:
        - ref: Evidence_voiceprints
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_011_voiceprints_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_voiceprints
      matches:
        - ref: Evidence_voiceprints
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Keyword_au_top500_011_voiceprints_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_voiceprints
      matches:
        - ref: Evidence_voiceprints
  regexes:
    - id: Pattern_voiceprints
      pattern: (?is)\b(?:voice\s+recognition|voice\s+biometric|voice\s+template|voice\s+authentication|speaker\s+recognition|voice\s+sample|voice\s+pattern|voice\s+ID|vocal\s+biometric)\b
    - id: Pattern_au_top500_011_voiceprints_label_context
      pattern: (?i)\\b(?:voiceprints|top500)\\b
  keywords:
    - id: Evidence_voiceprints
      groups:
        - match_style: word
          terms:
            - voiceprint
            - voice recognition
            - voice biometric
            - voice template
            - voice authentication
            - speaker recognition
            - voice sample
            - voice pattern
            - voice ID
            - vocal biometric
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_011_voiceprints_domain_context
      groups:
        - match_style: word
          terms:
            - voiceprints
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_011_voiceprints_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
