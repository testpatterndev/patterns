schema: testpattern/v1
name: Saudi Iqama Number
slug: sa-iqama
version: 1.0.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Saudi Arabian Iqama (residence permit) numbers issued to expatriate residents. Iqama numbers
  are 10 digits and start with 2. Saudi national IDs start with 1 and are covered by sa-national-id.
operation: >-
  Structural 10-digit numbers with leading 2. Luhn-like checks used by some issuers are not enforced.
  Corroborative evidence: Iqama/residence keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: '\b2\d{9}\b'
confidence: medium
confidence_justification: >-
  Medium confidence: leading-2 ten-digit numbers can appear elsewhere; Arabic/English
  Iqama keywords improve precision and distinguish from national IDs.
jurisdictions:
  - sa
regulations:
  - "PDPL (Saudi Arabia)"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - Iqama
    - iqama number
    - residence permit
    - رقم الإقامة
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '2123456789'
      description: Iqama starting with 2
    - value: '2987654321'
      description: Alternate Iqama
    - value: '2001234567'
      description: Another leading-2 form
  should_not_match:
    - value: '1123456789'
      description: National ID style leading 1
    - value: '212345678'
      description: Only 9 digits
    - value: '21234567890'
      description: 11 digits
false_positives:
  - description: >-
      Phone numbers or customer IDs starting with 2 and ten digits.
    mitigation: >-
      Require Iqama/residence permit keywords in Arabic or English.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_sa_iqama
      matches:
        - ref: Keyword_sa_iqama_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_sa_iqama
      matches:
        - ref: Keyword_sa_iqama_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_sa_iqama
  regexes:
    - id: Regex_sa_iqama
      pattern: '\b2\d{9}\b'
  keywords:
    - id: Keyword_sa_iqama_specific
      groups:
        - match_style: word
          terms:
            - Iqama
            - Iqama number
            - iqama no
            - residence number
            - رقم الإقامة
            - رقم اقامة
            - Muqeem
            - resident identity
      strength: specific
    - id: Keyword_sa_iqama_broad
      groups:
        - match_style: word
          terms:
            - expatriate
            - residence permit
            - KSA resident
            - Absher
            - Muqeem portal
            - Saudi residence
      strength: specific
risk_rating: 5
risk_description: >-
  The detector finds a ten-digit Saudi residence-permit number beginning with 2 when Iqama or residence context is nearby, so it identifies an expatriate's administrative reference rather than the permit or immigration file. Disclosure can support identity correlation, targeted scams, or nuisance checks, but meaningful misuse requires the resident's name, sponsor, date of birth, permit details, or service access. Phone and customer numbers can share the same shape because no check algorithm is enforced. Risk 5 and OFFICIAL fit the standalone value; SENSITIVE would require an attributed permit, immigration status record, authentication use, or bulk resident register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
references:
  - url: https://www.my.gov.sa/
    title: Saudi National Government Portal
created: '2026-07-09'
updated: '2026-07-14'
changelog:
  - version: 1.0.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2168 without changing detector or package metadata.'
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Initial mature identifier SIT — Phase-1 coverage backlog (Purview-safe regex, full label/risk metadata for pack workbooks)'
author: testpattern-community
