schema: testpattern/v1
name: Victim impact statements
slug: global-top500-418-victim-impact-statements
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to victim impact statements in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:victim\s+impact|victim\s+statement|victim\s+testimony|victim\s+advocate|victim\s+services|victim\s+notification|victim\s+restitution|victim\s+rights|harm\s+statement|sentencing\s+statement|victim\s+compensation|victim\s+support)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - victim impact statements
  proximity: 240
test_cases:
  should_match:
    - value: victim impact
      description: Primary topic phrase match
    - value: victim statement
      description: Case-insensitive topic phrase match
    - value: victim testimony
      description: Alternative topic phrase match
    - value: victim advocate
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to victim impact statements appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_victim_impact
      matches:
        - ref: Pattern_global_top500_418_victim_impact_statements_label_context
        - ref: Keyword_global_top500_418_victim_impact_statements_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_418_victim_impact_statements_noise_exclusion
    - confidence_level: 75
      id_match: Regex_victim_impact
      matches:
        - ref: Keyword_victim_impact
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_418_victim_impact_statements_noise_exclusion
    - confidence_level: 65
      id_match: Regex_victim_impact
      matches:
        - ref: Keyword_victim_impact
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_418_victim_impact_statements_noise_exclusion
  regexes:
    - id: Regex_victim_impact
      pattern: (?is)\b(?:victim\s+impact|victim\s+statement|victim\s+testimony|victim\s+advocate|victim\s+services|victim\s+notification|victim\s+restitution|victim\s+rights|harm\s+statement|sentencing\s+statement|victim\s+compensation|victim\s+support)\b
    - id: Pattern_global_top500_418_victim_impact_statements_label_context
      pattern: (?i)\\b(?:victim\\s+impact\\s+statements|victim|impact|statements|top500)\\b
  keywords:
    - id: Keyword_victim_impact
      groups:
        - match_style: word
          terms:
            - victim impact
            - victim statement
            - victim testimony
            - victim advocate
            - victim services
            - victim notification
            - victim restitution
            - victim rights
            - harm statement
            - sentencing statement
            - victim compensation
            - victim support
    - id: Keyword_global_top500_418_victim_impact_statements_domain_context
      groups:
        - match_style: word
          terms:
            - victim impact statements
            - victim
            - impact
            - statements
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_418_victim_impact_statements_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
