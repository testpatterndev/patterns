schema: testpattern/v1
name: Physical badge access maps
slug: global-top500-457-physical-badge-access-maps
version: 1.2.2
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to physical badge access maps in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:badge\s+access|access\s+control\s+map|door\s+access|security\s+zone|card\s+reader|facility\s+access|restricted\s+area|physical\s+security|access\s+level|clearance\s+zone|perimeter\s+control|entry\s+point)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - physical badge access maps
    - physical
    - badge
    - access
    - maps
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: badge access
      description: Primary topic phrase match
    - value: access control map
      description: Case-insensitive topic phrase match
    - value: door access
      description: Alternative topic phrase match
    - value: security zone
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: badge access zone
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to physical badge access maps appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_badge_access_maps
      matches:
        - ref: Pattern_global_top500_457_physical_badge_access_maps_label_context
        - ref: Keyword_global_top500_457_physical_badge_access_maps_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_badge_access_maps
      matches:
        - ref: Keyword_badge_access_maps
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_badge_access_maps
      pattern: >-
        (?is)\b(?:badge\s+access|access\s+control\s+map|door\s+access|security\s+zone|card\s+reader|facility\s+access|restricted\s+area|physical\s+security|access\s+level|clearance\s+zone|perimeter\s+control|entry\s+point)\b
    - id: Pattern_global_top500_457_physical_badge_access_maps_label_context
      pattern: (?i)\b(?:physical\s+badge\s+access\s+maps)\b
  keywords:
    - id: Keyword_badge_access_maps
      groups:
        - match_style: word
          terms:
            - badge access
            - access control map
            - door access
            - security zone
            - card reader
            - facility access
            - restricted area
            - physical security
            - access level
            - clearance zone
            - perimeter control
            - entry point
      strength: specific
    - id: Keyword_global_top500_457_physical_badge_access_maps_domain_context
      groups:
        - match_style: word
          terms:
            - physical badge access maps
            - physical
            - badge
            - access
            - maps
      strength: domain
risk_description: >-
  This concept pattern flags badge access, access-control maps, door access, zones, card readers, facilities, restricted areas, clearance levels, perimeter controls, and entry points rather than verifying a graphical map or access matrix. A genuine map can show which credentials reach sensitive rooms and where readers, boundaries, and entrances are located, enabling unauthorized entry planning, tailgating, or targeted theft. The ordinary scope is one facility and its occupants and security team, while product guides, policies, and generic floor-planning material can match. Risk 8 and SENSITIVE reflect serious contained physical-security harm; PROTECTED would require a critical or protected facility map whose misuse could cause significant operational or life-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
