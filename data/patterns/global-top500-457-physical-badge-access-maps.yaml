schema: testpattern/v1
name: Physical badge access maps
slug: global-top500-457-physical-badge-access-maps
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive physical badge and door access-control maps. Topic phrases are retained for
  discovery; enforcement requires floor-plan, reader-to-door, security-zone, access-level,
  restricted-area, entry-point, zone-boundary, or credential-group relationships, and high confidence
  also requires populated door, reader, zone, entry, credential-group, or access-level identifiers.
operation: >-
  Regex_badge_access_maps recognises physical badge, facility badge, door-access, and physical
  access-zone map topics. The topic alone is discovery-only at 65. Actual reader/door/zone/access
  relationships raise it to 75; populated physical-access identifiers reach 85. Enforcing tiers reject
  explicit templates and training examples.
pattern: >-
  (?is)\b(?:physical\s+badge\s+access\s+map|badge\s+access\s+control\s+map|facility\s+badge\s+access\s+map|door\s+access\s+control\s+map|physical\s+access\s+zone\s+map)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires mapped reader, door, zone, access, or credential relationships. High
  confidence adds populated physical-access identifiers.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - location
  - security
corroborative_evidence:
  keywords:
    - physical badge access maps
    - physical
    - badge
    - access
    - maps
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: physical badge access map
      description: Low-tier probe - map topic without access relationships
    - value: 'Physical badge access map: floor plan maps card readers to doors, security zones, restricted areas, zone boundaries, access levels, and credential groups'
      description: Medium-tier probe - substantive access relationships without populated identifiers
    - value: 'Physical badge access map for North Facility: floor plan links door ID: D-104 to reader ID: CR-12 in zone ID: Z-3, access level: RESTRICTED-2, credential group: OPS'
      description: High-tier probe - mapped access relationships with populated door, reader, zone, level, and group identifiers
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: badge access zone
      description: Generic word pair from old broad template should not match
    - value: 'The physical-security policy explains how badge access levels are assigned.'
      description: Policy guidance without an access map
    - value: 'Training example: physical badge access map door D-104, reader CR-12, zone Z-3, access level RESTRICTED-2'
      description: Explicit training content must not enforce
false_positives:
  - description: Access-control policies, product documentation, and generic floor plans discuss readers, doors, zones, and badge levels without exposing a real access map.
    mitigation: Keep map topics discovery-only and require floor-plan, reader-to-door, zone, access-level, restricted-area, boundary, or credential-group relationships for enforcement.
  - description: Training maps can contain realistic reader, door, zone, credential-group, and access-level identifiers.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_badge_access_maps
      matches:
        - ref: Evidence_badge_map_relationship
        - ref: Evidence_badge_access_identifier
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_badge_access_maps
      matches:
        - ref: Evidence_badge_map_relationship
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_badge_access_maps
  regexes:
    - id: Regex_badge_access_maps
      pattern: >-
        (?is)\b(?:physical\s+badge\s+access\s+map|badge\s+access\s+control\s+map|facility\s+badge\s+access\s+map|door\s+access\s+control\s+map|physical\s+access\s+zone\s+map)\b
    - id: Evidence_badge_access_identifier
      pattern: >-
        (?i)\b(?:(?:door|reader|zone|entry|credential\s+group)\s*(?:ID|number|no\.?)?\s*[:#-]\s*[A-Z0-9][A-Z0-9._-]{2,}|access\s+level\s*[:#-]\s*[A-Z0-9][A-Z0-9._-]{2,})\b
  keywords:
    - id: Evidence_badge_map_relationship
      groups:
        - match_style: word
          terms:
            - floor plan
            - reader to door
            - card reader
            - security zone
            - restricted area
            - access level
            - entry point
            - zone boundary
            - credential group
            - door schedule
            - access relationship
      strength: domain
risk_description: >-
  This concept pattern flags badge access, access-control maps, door access, zones, card readers, facilities, restricted areas, clearance levels, perimeter controls, and entry points rather than verifying a graphical map or access matrix. A genuine map can show which credentials reach sensitive rooms and where readers, boundaries, and entrances are located, enabling unauthorized entry planning, tailgating, or targeted theft. The ordinary scope is one facility and its occupants and security team, while product guides, policies, and generic floor-planning material can match. Risk 8 and SENSITIVE reflect serious contained physical-security harm; PROTECTED would require a critical or protected facility map whose misuse could cause significant operational or life-safety damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
