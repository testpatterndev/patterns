schema: testpattern/v1
name: Residence permit number
slug: global-top500-033-residence-permit-number
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to residence permit number in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:residence\s+permit\s+number|residence\s+permit|permit\s+number|residency\s+permit|residency\s+card|permanent\s+residence|temporary\s+residence|residence\s+card|resident\s+permit|settlement\s+permit|stay\s+permit|residence\s+authorization)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - residence permit number
  proximity: 240
test_cases:
  should_match:
    - value: residence permit number
      description: Primary topic phrase match
    - value: residence permit
      description: Case-insensitive topic phrase match
    - value: permit number
      description: Alternative topic phrase match
    - value: residency permit
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to residence permit number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_residence_permit_number
      matches:
        - ref: Pattern_global_top500_033_residence_permit_number_label_context
        - ref: Keyword_global_top500_033_residence_permit_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_residence_permit_number
      matches:
        - ref: Keyword_residence_permit_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_residence_permit_number
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_residence_permit_number
      pattern: >-
        (?is)\b(?:residence\s+permit\s+number|residence\s+permit|permit\s+number|residency\s+permit|residency\s+card|permanent\s+residence|temporary\s+residence|residence\s+card|resident\s+permit|settlement\s+permit|stay\s+permit|residence\s+authorization)\b
    - id: Pattern_global_top500_033_residence_permit_number_label_context
      pattern: (?i)\b(?:residence\s+permit\s+number)\b
  keywords:
    - id: Keyword_residence_permit_number
      groups:
        - match_style: word
          terms:
            - residence permit number
            - residence permit
            - permit number
            - residency permit
            - residency card
            - permanent residence
            - temporary residence
            - residence card
            - resident permit
            - settlement permit
            - stay permit
            - residence authorization
      strength: specific
    - id: Keyword_global_top500_033_residence_permit_number_domain_context
      groups:
        - match_style: word
          terms:
            - residence permit number
            - residence
            - permit
      strength: domain
risk_description: >-
  The global Residence permit number concept regex detects phrases including residence permit, residency card, permanent residence, and stay permit. It does not require a permit number or identify a resident, country, or legal status, so forms and immigration guidance are common matching contexts. A populated permit linked to a person could support identity correlation or expose migration status, but that information is not inherent in the topic phrase. Risk 5 and OFFICIAL preserve a bounded administrative cue, with an issued person-linked permit or case record setting the SENSITIVE threshold.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
