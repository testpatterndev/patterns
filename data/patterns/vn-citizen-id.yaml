schema: testpattern/v1
name: Vietnam Citizen Identity Card Number
slug: vn-citizen-id
version: 1.0.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Vietnam Citizen Identity Card numbers (Căn cước công dân / CCCD). Modern chip-card numbers
  are 12 digits beginning with 0, embedding gender/century and place-of-birth codes.
operation: >-
  Structural 12-digit CCCD with leading 0. Check algorithm not enforced. Corroborative evidence:
  CCCD/CMND keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: '\b0\d{11}\b'
confidence: medium
confidence_justification: >-
  Medium confidence: twelve-digit zero-prefixed numbers appear in other systems;
  Vietnamese identity keywords are required.
jurisdictions:
  - vn
regulations:
  - "Cybersecurity Law (Vietnam)"
  - "Personal Data Protection Decree 13/2023"
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - CCCD
    - căn cước
    - CMND
    - citizen identity
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
test_cases:
  should_match:
    - value: '001234567890'
      description: 12-digit CCCD leading 0
    - value: '079123456789'
      description: Alternate province-coded CCCD
    - value: '031987654321'
      description: Third CCCD example
  should_not_match:
    - value: '101234567890'
      description: Leading 1 not used for CCCD
    - value: '00123456789'
      description: Only 11 digits
    - value: '0012345678901'
      description: 13 digits
false_positives:
  - description: >-
      Phone or customer IDs that are 12 digits starting with 0.
    mitigation: >-
      Require CCCD/căn cước/CMND keywords.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_vn_citizen_id
      matches:
        - ref: Keyword_vn_citizen_id_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_vn_citizen_id
      matches:
        - ref: Keyword_vn_citizen_id_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_vn_citizen_id
  regexes:
    - id: Regex_vn_citizen_id
      pattern: '\b0\d{11}\b'
  keywords:
    - id: Keyword_vn_citizen_id_specific
      groups:
        - match_style: word
          terms:
            - CCCD
            - căn cước công dân
            - căn cước
            - số CCCD
            - CMND
            - chứng minh nhân dân
            - citizen identity card
      strength: specific
    - id: Keyword_vn_citizen_id_broad
      groups:
        - match_style: word
          terms:
            - VNeID
            - căn cước gắn chip
            - giấy tờ tùy thân
            - identity card Vietnam
      strength: specific
risk_rating: 9
risk_description: >-
  CCCD is the primary national identity number in Vietnam; exposure enables identity fraud and SIM/bank account takeover.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: "Protected B"
references:
  - url: https://vneid.gov.vn/
    title: VNeID national identity portal
created: '2026-07-09'
updated: '2026-07-09'
changelog:
  - version: 1.0.0
    date: '2026-07-09'
    description: 'Initial mature identifier SIT — Phase-1 coverage backlog (Purview-safe regex, full label/risk metadata for pack workbooks)'
author: testpattern-community
