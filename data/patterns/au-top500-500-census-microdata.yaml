schema: testpattern/v1
name: Census microdata
slug: au-top500-500-census-microdata
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to census microdata in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:census\s+microdata|ABS\s+census|census\s+record|unit\s+record|microdata\s+file|statistical\s+area|census\s+collection|population\s+census|confidentialised\s+data|census\s+variable|demographic\s+data)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - census microdata
    - census
    - microdata
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:

    - government-services
test_cases:
  should_match:
    - value: census microdata
      description: Primary topic phrase match
    - value: abs census
      description: Case-insensitive topic phrase match
    - value: census record
      description: Alternative topic phrase match
    - value: unit record
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: immigration case
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to census microdata appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_census_microdata
      matches:
        - ref: Evidence_census_microdata
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_census_microdata
      matches:
        - ref: Evidence_census_microdata
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_census_microdata
      matches:
        - ref: Evidence_census_microdata
  regexes:
    - id: Pattern_census_microdata
      pattern: (?is)\b(?:census\s+microdata|ABS\s+census|census\s+record|unit\s+record|microdata\s+file|statistical\s+area|census\s+collection|population\s+census|confidentialised\s+data|census\s+variable|demographic\s+data)\b
  keywords:
    - id: Evidence_census_microdata
      groups:
        - match_style: word
          terms:
            - census microdata
            - ABS census
            - census record
            - unit record
            - microdata file
            - statistical area
            - census collection
            - population census
            - TableBuilder
            - confidentialised data
            - census variable
            - demographic data
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
author: testpattern-community
license: MIT
references:
  - https://www.abs.gov.au/statistics/microdata-tablebuilder
  - https://www.abs.gov.au/about/data-services/data-integration
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines
