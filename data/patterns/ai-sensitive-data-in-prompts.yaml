schema: testpattern/v1
name: AI Sensitive Data in Prompts
slug: ai-sensitive-data-in-prompts
version: 0.4.0
type: keyword_list
pattern_class: concept
description: >-
  Supplies the AI-prompt context signal (typed prompts, Copilot/Copilot Chat/Studio, uploaded files)
  so existing PII/regulated-data SITs can be re-scoped to AI prompts via the ai-threat-classifiers
  collection. Known coverage gap (from the library): native DLP scans typed prompt text, not uploaded
  file contents, in the Copilot location.
operation: >-
  One phrase regex (Pattern_ai_prompt_context) matching AI-prompt framings, corroborated by AI-context
  markers. Single low tier (65 phrase only). This is a context marker only: the regulated-data detection
  is delegated to existing PII/regulated-data SITs in the ai-threat-classifiers collection. Approved
  internal analysis and test data are the named FP traps.
pattern: '(?i)\b(?:in\s+(?:the\s+|my\s+)?(?:copilot|AI)\s+prompt|prompt\s+to\s+(?:copilot|the\s+assistant)|I\s+asked\s+(?:copilot|the\s+AI)|copilot\s+chat)\b'
confidence: low
confidence_justification: >-
  Low by design. This pattern only asserts an AI-prompt context, not the presence of sensitive data; the
  sensitive-data verdict is delegated to existing PII/regulated-data SITs re-scoped via the collection.
  AI-prompt phrasing also appears around approved internal analysis and test data (the named FP traps).
  Known coverage gap: native DLP scans typed prompt text, not uploaded file contents, in the Copilot
  location, so prompts that attach files may evade detection regardless of this context marker.
jurisdictions: [global]
regulations: ['OWASP LLM Top 10 2025', 'NIST AI RMF GenAI Profile']
frameworks: [ISO 27001]
data_categories: [emerging, security]
ai_threat:
  ai_sit_id: AI-SIT-004
  aic_alias: AIC-03
  threat_family: Traditional
  detection_approach: SIT
corroborative_evidence:
  keywords: [prompt, copilot, asked, uploaded]
  proximity: 300
  keyword_lists: [ai-context-markers]
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  regexes:
    - id: Pattern_ai_prompt_context
      pattern: '(?i)\b(?:in\s+(?:the\s+|my\s+)?(?:copilot|AI)\s+prompt|prompt\s+to\s+(?:copilot|the\s+assistant)|I\s+asked\s+(?:copilot|the\s+AI)|copilot\s+chat)\b'
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_ai_prompt_context
risk_rating: 6
risk_description: >-
  Sensitive or regulated data typed into an AI prompt can be transmitted to and retained by the model
  service; this marker scopes existing SITs to AI-prompt content.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: 'CUI Basic'
  uk_gov: 'OFFICIAL-SENSITIVE'
test_cases:
  should_match:
    - value: 'In my Copilot prompt I included the full customer record for analysis.'
      description: AI-prompt context marker (PII detection delegated to existing SITs)
    - value: 'I asked Copilot to summarise the patient diagnosis from the attached chart.'
      description: AI-prompt context marker via "I asked Copilot" framing
    - value: 'She pasted the account details into Copilot Chat during the session.'
      description: AI-prompt context marker via "Copilot Chat" framing
  should_not_match:
    - value: 'The analyst reviewed the customer record in the CRM.'
      description: Non-AI workflow, no prompt context
    - value: 'The team discussed the new AI governance policy in the weekly meeting.'
      description: Mentions AI but no prompt-context framing (FP trap)
false_positives:
  - description: >-
      Approved internal analysis and test data legitimately discuss AI-prompt workflows ("I asked Copilot
      to draft the template") without containing any regulated or sensitive data.
    mitigation: >-
      Treat this pattern as a context marker only; delegate the sensitive-data verdict to existing
      PII/regulated-data SITs re-scoped via the ai-threat-classifiers collection.
  - description: >-
      Documentation, training material and runbooks that reference Copilot Chat or AI prompts generically
      rather than capturing an actual prompt containing sensitive data.
    mitigation: >-
      Require corroborating regulated-data detection from a delegated SIT within the proximity window before
      raising a verdict.
created: '2026-06-08'
updated: '2026-07-09'
changelog:
  - version: 0.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 0.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) ai-context-markers as Evidence_ai_context — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 0.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 0.2.0
    date: '2026-07-04'
    description: 'PDF-safety: literal inter-word spaces in phrase regex replaced with \s+ so line-wrapped text still matches'
author: testpattern-community
