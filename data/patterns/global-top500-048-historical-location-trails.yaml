schema: testpattern/v1
name: Historical location trails
slug: global-top500-048-historical-location-trails
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to historical location trails in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:historical\s+location\s+trails|location\s+history|movement\s+history|travel\s+history|location\s+trail|past\s+locations|location\s+log|movement\s+trail|location\s+timeline|visited\s+locations|check[\s-]+in\s+history|geo\s+history)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - historical location trails
    - historical
    - location
    - trails
    - contact
    - data
  proximity: 300
test_cases:
  should_match:
    - value: historical location trails
      description: Primary topic phrase match
    - value: location history
      description: Case-insensitive topic phrase match
    - value: movement history
      description: Alternative topic phrase match
    - value: travel history
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to historical location trails appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_historical_location_trails
      matches:
        - ref: Pattern_global_top500_048_historical_location_trails_label_context
        - ref: Keyword_global_top500_048_historical_location_trails_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_historical_location_trails
      matches:
        - ref: Keyword_historical_location_trails
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_historical_location_trails
      matches:
        - ref: Keyword_historical_location_trails
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_historical_location_trails
      pattern: >-
        (?is)\b(?:historical\s+location\s+trails|location\s+history|movement\s+history|travel\s+history|location\s+trail|past\s+locations|location\s+log|movement\s+trail|location\s+timeline|visited\s+locations|check[\s-]+in\s+history|geo\s+history)\b
    - id: Pattern_global_top500_048_historical_location_trails_label_context
      pattern: (?i)\\b(?:historical\\s+location\\s+trails|historical|location|trails|top500)\\b
  keywords:
    - id: Keyword_historical_location_trails
      groups:
        - match_style: word
          terms:
            - historical location trails
            - location history
            - movement history
            - travel history
            - location trail
            - past locations
            - location log
            - movement trail
            - location timeline
            - visited locations
            - check-in history
            - geo history
    - id: Keyword_global_top500_048_historical_location_trails_domain_context
      groups:
        - match_style: word
          terms:
            - historical location trails
            - historical
            - location
            - trails
