schema: testpattern/v1
name: Infrastructure-as-code templates
slug: global-top500-247-infrastructure-as-code-templates
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies infrastructure-as-code templates patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:infrastructure\s+as\s+code|IaC\s+template|ARM\s+template|bicep\s+template|ansible\s+playbook|provisioning\s+template|infrastructure\s+template|cloud\s+resource)\b
confidence: low
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - infrastructure-as-code templates
    - infrastructure
    - code
    - templates
    - software
    - engineering
    - architecture
  proximity: 300
test_cases:
  should_match:
    - value: infrastructure as code
      description: Primary topic phrase match
    - value: iac template
      description: Case-insensitive topic phrase match
    - value: ARM template
      description: Alternative topic phrase match
    - value: bicep template
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: source code config
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_iac_templates
      matches:
        - ref: Pattern_global_top500_247_infrastructure_as_code_templates_label_context
        - ref: Keyword_global_top500_247_infrastructure_as_code_templates_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_iac_templates
      matches:
        - ref: Keyword_iac_templates
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_iac_templates
      pattern: (?is)\b(?:infrastructure\s+as\s+code|IaC\s+template|ARM\s+template|bicep\s+template|ansible\s+playbook|provisioning\s+template|infrastructure\s+template|cloud\s+resource)\b
    - id: Pattern_global_top500_247_infrastructure_as_code_templates_label_context
      pattern: (?i)\b(?:infrastructure\-as\-code\s+templates)\b
  keywords:
    - id: Keyword_iac_templates
      groups:
        - match_style: word
          terms:
            - infrastructure as code
            - IaC template
            - terraform
            - cloudformation
            - ARM template
            - bicep template
            - ansible playbook
            - provisioning template
            - infrastructure template
            - cloud resource
      strength: noise
    - id: Keyword_global_top500_247_infrastructure_as_code_templates_domain_context
      groups:
        - match_style: word
          terms:
            - infrastructure-as-code templates
            - infrastructure
            - templates
      strength: noise
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
