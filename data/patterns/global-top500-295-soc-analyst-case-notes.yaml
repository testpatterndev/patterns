schema: testpattern/v1
name: SOC analyst case notes
slug: global-top500-295-soc-analyst-case-notes
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies soc analyst case notes patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 9 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:soc\s+case|analyst\s+notes|case\s+id|triage)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - soc analyst case notes
    - soc
    - analyst
    - case
    - notes
    - security
    - operations
    - threat
    - data
  proximity: 300
test_cases:
  should_match:
    - value: 'Soc case'
      description: Topic phrase present
    - value: 'soc case'
      description: Topic phrase, lowercase
    - value: 'this record references the soc case held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_soc_case_notes
      matches:
        - ref: Pattern_global_top500_295_soc_analyst_case_notes_label_context
        - ref: Keyword_global_top500_295_soc_analyst_case_notes_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_soc_case_notes
      matches:
        - ref: Keyword_soc_case_notes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_soc_case_notes
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_soc_case_notes
      pattern: (?i)\b(?:soc\s+case|analyst\s+notes|case\s+id|triage)\b
    - id: Pattern_global_top500_295_soc_analyst_case_notes_label_context
      pattern: (?i)\b(?:soc\s+analyst\s+case\s+notes)\b
  keywords:
    - id: Keyword_soc_case_notes
      groups:
        - match_style: word
          terms:
            - SOC analyst
            - case notes
            - case id
            - triage
            - incident response
            - alert investigation
            - security operations center
            - escalation
            - severity level
            - false positive
            - true positive
            - threat detection
      strength: specific
    - id: Keyword_global_top500_295_soc_analyst_case_notes_domain_context
      groups:
        - match_style: word
          terms:
            - soc analyst case notes
            - soc
            - analyst
            - case
            - notes
      strength: domain
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-04'
changelog:
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.legislation.gov.au/C2018A00029/latest/text
  - https://www.oaic.gov.au/privacy/privacy-guidance-for-organisations-and-government-agencies/preventing-preparing-for-and-responding-to-data-breaches/data-breach-preparation-and-response
  - https://handbook.apra.gov.au/standard/cps-234
