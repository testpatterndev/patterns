schema: testpattern/v1
name: Direct debit mandate data
slug: au-top500-112-direct-debit-mandate-data
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to direct debit mandate data in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: (?is)\b(?:direct\s+debit|debit\s+authority|direct\s+entry|account\s+number|standing\s+authority|recurring\s+payment|debit\s+agreement|payer\s+authorisation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - direct debit mandate data
    - direct
    - debit
    - mandate
    - data
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: direct debit
      description: Primary topic phrase match
    - value: debit authority
      description: Case-insensitive topic phrase match
    - value: direct entry
      description: Alternative topic phrase match
    - value: account number
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_direct_debit_mandate
      matches:
        - ref: Evidence_direct_debit_mandate
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_direct_debit_mandate
      matches:
        - ref: Evidence_direct_debit_mandate
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_direct_debit_mandate
      matches:
        - ref: Evidence_direct_debit_mandate
  regexes:
    - id: Pattern_direct_debit_mandate
      pattern: (?is)\b(?:direct\s+debit|debit\s+authority|direct\s+entry|account\s+number|standing\s+authority|recurring\s+payment|debit\s+agreement|payer\s+authorisation)\b
  keywords:
    - id: Evidence_direct_debit_mandate
      groups:
        - match_style: word
          terms:
            - direct debit
            - mandate
            - debit authority
            - direct entry
            - BSB
            - account number
            - BECS
            - standing authority
            - recurring payment
            - debit agreement
            - AusPayNet
            - payer authorisation
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
