schema: testpattern/v1
name: Data retention and deletion schedules
slug: global-top500-464-data-retention-and-deletion-schedules
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to data retention and deletion schedules in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:data\s+retention\s+schedule|deletion\s+schedule|retention\s+period|disposal\s+authority|archival\s+requirement|data\s+lifecycle|record\s+keeping|storage\s+limitation|retention\s+policy|privacy\s+compliance|destruction\s+certificate|data\s+minimization)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - data retention and deletion schedules
    - data
    - retention
    - deletion
    - schedules
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: data retention schedule
      description: Primary topic phrase match
    - value: deletion schedule
      description: Case-insensitive topic phrase match
    - value: retention period
      description: Alternative topic phrase match
    - value: disposal authority
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to data retention and deletion schedules appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_data_retention_deletion
      matches:
        - ref: Pattern_global_top500_464_data_retention_and_deletion_schedules_label_context
        - ref: Keyword_global_top500_464_data_retention_and_deletion_schedules_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_data_retention_deletion
      matches:
        - ref: Keyword_data_retention_deletion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_data_retention_deletion
      matches:
        - ref: Keyword_data_retention_deletion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_data_retention_deletion
      pattern: >-
        (?is)\b(?:data\s+retention\s+schedule|deletion\s+schedule|retention\s+period|disposal\s+authority|archival\s+requirement|data\s+lifecycle|record\s+keeping|storage\s+limitation|retention\s+policy|privacy\s+compliance|destruction\s+certificate|data\s+minimization)\b
    - id: Pattern_global_top500_464_data_retention_and_deletion_schedules_label_context
      pattern: (?i)\\b(?:data\\s+retention\\s+and\\s+deletion\\s+schedules|retention|deletion|schedules|top500)\\b
  keywords:
    - id: Keyword_data_retention_deletion
      groups:
        - match_style: word
          terms:
            - data retention schedule
            - deletion schedule
            - retention period
            - disposal authority
            - archival requirement
            - data lifecycle
            - record keeping
            - storage limitation
            - retention policy
            - privacy compliance
            - destruction certificate
            - data minimization
    - id: Keyword_global_top500_464_data_retention_and_deletion_schedules_domain_context
      groups:
        - match_style: word
          terms:
            - data retention and deletion schedules
            - retention
            - deletion
            - schedules
