schema: testpattern/v1
name: Australian Medicare Number
slug: au-medicare-number
version: 1.4.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects Australian Medicare card numbers, which are issued to Australian citizens and permanent residents for access
  to subsidised healthcare under the Medicare system. The number consists of 10 digits: the first digit is between 2 and
  6, followed by 8 additional digits and a single check digit. Numbers are commonly formatted as groups of 4-5-1 digits
  separated by spaces or hyphens.
operation: >-
  Checksum: Mod 10 with weights [1,3,7,9,1,3,7,9] on digits 1-8 compared against digit 9 — now enforced
  in the exported SIT by the inline generic Checksum validator Validator_au_medicare_number_checksum
  (Weights 1,3,7,9,1,3,7,9,0,0 / Modulo 10 / CheckDigit 9; Func_australian_medical_account_number remains
  genuinely absent from Microsoft's validator-function list, so the generic Checksum validator is used
  instead — see docs/checksum-validator-semantics.md). Reference: https://clearwater.com.au/code/medicare/,
  https://learn.microsoft.com/en-us/purview/sit-defn-australia-medical-account-number Corroborative evidence: 6 keywords
  within 300 characters. Keyword lists: au-health-scheme-terms, au-healthcare-identifiers, pii-civic-credentials.
pattern: \b[2-6]\d{3}[\s-]?\d{5}[\s-]?\d{1}\b
confidence: medium
confidence_justification: >-
  High confidence when corroborative evidence keywords are present. The leading digit constraint (2-6) and fixed
  10-digit length reduce false positives compared to generic digit sequences. Combined with proximity keywords like
  "medicare" or "health insurance", this pattern reliably identifies Medicare numbers.
jurisdictions:
  - au
regulations:
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - pii
  - phi
  - government-id
corroborative_evidence:
  keywords:
    - medicare
    - health insurance
    - medicare card
    - medicare number
    - medicare no
    - health insurance number
  proximity: 300
  keyword_lists:

    - au-health-scheme-terms

    - au-healthcare-identifiers

    - pii-civic-credentials
test_cases:
  should_match:
    - value: 2123 45670 1
      description: Standard spaced format (4-5-1 grouping), passes mod-10 checksum
    - value: 2123-45670-1
      description: Hyphen-separated format (4-5-1 grouping), passes mod-10 checksum
    - value: '2270193248'
      description: Continuous digits without separators, passes mod-10 checksum
  should_not_match:
    - value: 1234 56789 0
      description: First digit is 1, which is outside the valid range of 2-6
    - value: 7890 12345 6
      description: First digit is 7, which is outside the valid range of 2-6
    - value: 2270 19325 8
      description: fails mod-10 checksum (single-digit perturbation of valid value 2270 19324 8)
    - value: '4851938980'
      description: fails mod-10 checksum (single-digit perturbation of valid value 4851 93897 0)
false_positives:
  - description: Phone numbers starting with digits 2-6
    mitigation: >-
      Require corroborative evidence keywords within proximity window to confirm context as a Medicare number rather
      than a phone number.
  - description: Australian Business Number (ABN) digit subsequences that overlap with the Medicare pattern
    mitigation: >-
      Use corroborative evidence to distinguish Medicare context from business-related contexts. Layer with ABN-specific
      detection to deprioritise overlapping matches.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_au_medicare
      matches:
        - ref: Keyword_au_medicare_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_au_medicare
      matches:
        - ref: Keyword_au_medicare_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_au_medicare
  regexes:
    - id: Regex_au_medicare
      pattern: \b[2-6]\d{3}[\s-]?\d{5}[\s-]?\d{1}\b
      validators:
        - ref: Validator_au_medicare_number_checksum
  validators:
    - id: Validator_au_medicare_number_checksum
      type: Checksum
      params:
        - name: Weights
          value: 1, 3, 7, 9, 1, 3, 7, 9, 0, 0
        - name: Modulo
          value: '10'
        - name: CheckDigit
          value: '9'
  keywords:
    - id: Keyword_au_medicare_specific
      groups:
        - match_style: word
          terms:
            - medicare
            - medicare card
            - medicare number
            - medicare no
            - medicare no.
            - health insurance number
            - medicare card number
            - individual reference number
            - text: IRN
              case_sensitive: true
      strength: specific
    - id: Keyword_au_medicare_broad
      groups:
        - match_style: word
          terms:
            - health insurance
            - health card
            - services australia
            - health cover
            - health care card
            - healthcare identifier
            - patient details
            - medical claims
            - bulk billing
      strength: specific
  filters:
    - id: Filter_au_medicare_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The exported detector structurally matches an Australian Medicare number with health context but does not enforce the cited checksum. A genuine number can support record correlation or attempted benefit fraud, yet it reveals no treatment and is not an account credential. The normal match affects one beneficiary and needs identity, card, or claim information for practical abuse. Risk 5 OFFICIAL reflects bounded identifier harm; SENSITIVE requires a linked person or Medicare record.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
created: '2026-02-08'
updated: '2026-07-20'
changelog:
  - version: 1.4.0
    date: '2026-07-20'
    description: 'Enforce the Medicare checksum: add inline Checksum validator Validator_au_medicare_number_checksum (Weights 1,3,7,9,1,3,7,9,0,0 / Modulo 10 / CheckDigit 9 — weighted sum of digits 1-8 mod 10 must equal digit 9; zero weights for the check-digit and issue-number positions per the Purview docs encoding, see docs/checksum-validator-semantics.md) wired to Regex_au_medicare. Func_australian_medical_account_number remains absent from Microsoft''s validator-function list, but the generic Checksum validator now enforces the algorithm. Test cases: checksum-valid should_match values retained/added plus invalid-twin should_not_match regression values.'
  - version: 1.3.2
    date: '2026-07-18'
    description: >-
      Quality bar: confidence high->medium for digit/identifier shapes where structural FP risk makes 'high' dishonest without checksum/strong label evidence.
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 556 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
