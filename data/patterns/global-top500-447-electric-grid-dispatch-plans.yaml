schema: testpattern/v1
name: Electric grid dispatch plans
slug: global-top500-447-electric-grid-dispatch-plans
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies substantive electric-grid generation dispatch, unit-commitment, and power-system dispatch
  plans. Topic phrases are retained for discovery; enforcement requires populated generation, reserve,
  energy, or reactive-power quantities, and high confidence also requires current interval, generating
  unit, constraint, interconnector, or grid-operator detail.
operation: >-
  Regex_electric_grid_dispatch recognises grid dispatch, generation schedule, unit commitment, and
  power-system dispatch topics. The topic alone is discovery-only at 65. Populated MW, MWh, MVAr, or
  percentage quantities raise it to 75; quantities plus current interval, unit, constraint,
  interconnector, or operator context reach 85. Enforcing tiers reject explicit templates and training.
pattern: >-
  (?is)\b(?:electric\s+grid\s+dispatch\s+plan|generation\s+dispatch\s+schedule|generation\s+dispatch|unit\s+commitment\s+schedule|power\s+system\s+dispatch\s+plan)\b
confidence: medium
confidence_justification: >-
  Medium confidence requires populated dispatch quantities rather than general market commentary. High
  confidence adds a current interval, named unit, constraint, interconnector, or operator reference.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - security
corroborative_evidence:
  keywords:
    - electric grid dispatch plans
    - electric
    - grid
    - dispatch
    - plans
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: electric grid dispatch plan
      description: Low-tier probe - dispatch topic without populated quantities
    - value: 'Generation dispatch schedule: unit commitment 420 MW and reserve requirement 35 MW'
      description: Medium-tier probe - populated quantities without current unit or interval detail
    - value: 'Current generation dispatch schedule for generating unit GT-04, dispatch interval 14:05, constraint ID QNI-17: target 420 MW and reserve 35 MW'
      description: High-tier probe - populated quantities with current unit, interval, and constraint detail
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: 'The annual report discusses electricity generation investment and market trends.'
      description: Public commentary without a dispatch plan or populated schedule
    - value: 'Training example: current generation dispatch schedule for unit GT-04 at 420 MW, interval 14:05'
      description: Explicit training content must not enforce
false_positives:
  - description: Public market reports and grid-planning material can discuss generation dispatch, unit commitment, reserves, and MW quantities.
    mitigation: Recommend the 85 tier, which additionally requires current interval, generating-unit, constraint, interconnector, or operator detail.
  - description: Training simulations can include realistic unit IDs, intervals, constraints, and dispatch quantities.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_electric_grid_dispatch
      matches:
        - ref: Evidence_dispatch_quantity
        - ref: Evidence_dispatch_live_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_electric_grid_dispatch
      matches:
        - ref: Evidence_dispatch_quantity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_electric_grid_dispatch
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_electric_grid_dispatch
      pattern: >-
        (?is)\b(?:electric\s+grid\s+dispatch\s+plan|generation\s+dispatch\s+schedule|generation\s+dispatch|unit\s+commitment\s+schedule|power\s+system\s+dispatch\s+plan)\b
    - id: Evidence_dispatch_quantity
      pattern: '(?i)\b\d+(?:\.\d+)?\s*(?:MW|MWh|MVAr|percent)\b'
  keywords:
    - id: Evidence_dispatch_live_context
      groups:
        - match_style: word
          terms:
            - current interval
            - dispatch interval
            - generating unit
            - unit ID
            - constraint ID
            - transmission constraint
            - interconnector
            - grid operator
            - system operator
            - text: SCADA
              case_sensitive: true
      strength: specific
risk_description: >-
  The classifier detects dispatch-schedule language supported by eight terms associated with electric-grid operations. A genuine dispatch plan can reveal generation commitments, timing, reserve posture, and operational dependencies, allowing market manipulation or targeted disruption of grid balancing. The normal schedule creates serious operational and commercial harm, but the phrase-level match does not prove real-time control access, critical vulnerabilities, or a plan whose loss would significantly interrupt electricity supply. For the global catalogue analogue, the confirmed substantive record is the consequence unit. Current generation/load schedules, constraints and reserve posture enable market manipulation or targeted disruption and can contribute to significant grid instability. Risk 9 and PROTECTED InfoTech therefore apply to the confirmed record itself. Require current interval, grid/asset identity, dispatch quantities and constraint/reserve fields; public market commentary stays audit-only. This is confidence and exception handling, not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED InfoTech
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
