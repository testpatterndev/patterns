schema: testpattern/v1
name: Electric grid dispatch plans
slug: global-top500-447-electric-grid-dispatch-plans
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to electric grid dispatch plans in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context
  evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:dispatch\s+schedule|generation\s+dispatch|unit\s+commitment)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - electric grid dispatch plans
    - electric
    - grid
    - dispatch
    - plans
    - critical
    - infrastructure
    - systems
  proximity: 300
test_cases:
  should_match:
    - value: 'Dispatch schedule'
      description: Topic phrase present
    - value: 'dispatch schedule'
      description: Topic phrase, lowercase
    - value: 'this record references the dispatch schedule held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Common words and phrases related to electric grid dispatch plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_electric_grid_dispatch
      matches:
        - ref: Pattern_global_top500_447_electric_grid_dispatch_plans_label_context
        - ref: Keyword_global_top500_447_electric_grid_dispatch_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_electric_grid_dispatch
      matches:
        - ref: Keyword_electric_grid_dispatch
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_electric_grid_dispatch
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_electric_grid_dispatch
      pattern: (?i)\b(?:dispatch\s+schedule|generation\s+dispatch|unit\s+commitment)\b
    - id: Pattern_global_top500_447_electric_grid_dispatch_plans_label_context
      pattern: (?i)\b(?:electric\s+grid\s+dispatch\s+plans)\b
  keywords:
    - id: Keyword_electric_grid_dispatch
      groups:
        - match_style: word
          terms:
            - electric grid
            - dispatch plan
            - generation dispatch
            - unit commitment
            - load forecast
            - grid operator
            - transmission schedule
            - power dispatch
            - energy management system
            - system operator
            - grid reliability
            - AEMO
      strength: specific
    - id: Keyword_global_top500_447_electric_grid_dispatch_plans_domain_context
      groups:
        - match_style: word
          terms:
            - electric grid dispatch plans
            - electric
            - grid
            - dispatch
            - plans
      strength: domain
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 80 to 75.; Collapsed 2 duplicate 75-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
