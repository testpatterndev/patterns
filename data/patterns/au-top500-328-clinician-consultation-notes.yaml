schema: testpattern/v1
name: Clinician consultation notes
slug: au-top500-328-clinician-consultation-notes
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies clinician consultation notes references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:consultation\s+notes|clinician\s+notes|clinical\s+notes|progress\s+notes|patient\s+encounter|medical\s+consultation|practitioner\s+notes|clinical\s+assessment|presenting\s+complaint|patient\s+history)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - clinician consultation notes
    - clinician
    - consultation
    - notes
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:

    - healthcare-clinical
test_cases:
  should_match:
    - value: consultation notes
      description: Primary topic phrase match
    - value: clinician notes
      description: Case-insensitive topic phrase match
    - value: clinical notes
      description: Alternative topic phrase match
    - value: progress notes
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_clinician_consultation_notes
      matches:
        - ref: Evidence_clinician_consultation_notes
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_clinician_consultation_notes
      matches:
        - ref: Evidence_clinician_consultation_notes
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_clinician_consultation_notes
      matches:
        - ref: Evidence_clinician_consultation_notes
  regexes:
    - id: Pattern_clinician_consultation_notes
      pattern: (?is)\b(?:consultation\s+notes|clinician\s+notes|clinical\s+notes|progress\s+notes|patient\s+encounter|medical\s+consultation|practitioner\s+notes|clinical\s+assessment|presenting\s+complaint|patient\s+history)\b
  keywords:
    - id: Evidence_clinician_consultation_notes
      groups:
        - match_style: word
          terms:
            - consultation notes
            - clinician notes
            - clinical notes
            - progress notes
            - patient encounter
            - health
            - biomedical
            - medical consultation
            - practitioner notes
            - clinical assessment
            - presenting complaint
            - patient history
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.legislation.gov.au/C2012A00063/latest/text
  - https://www.legislation.gov.au/C2004A03712/latest/text
