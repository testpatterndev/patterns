schema: testpattern/v1
name: Health Insurance Member / Subscriber ID (Labelled)
slug: global-insurance-member-id
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects a labelled health-insurance member, subscriber, policy or group identifier:
  a member/subscriber/policy/group ID label followed by a 6-15 character alphanumeric
  value that contains at least one digit. Insurance identifiers are protected health
  information under HIPAA and are frequently exposed in breach disclosures.
operation: >-
  A member / subscriber / policy / group label, an id/number/no qualifier, up to 8
  separator characters, then a 6-15 character value of letters, digits and hyphens
  that must include at least one digit (so it does not match an ordinary word).
  Bounded with non-alphanumeric lookarounds. Corroborative evidence: keywords within
  300 characters.
pattern: '(?<![A-Za-z])(?:member|subscriber|policy|group|enrollee|insured)\s+(?:id|identifier|number|no\.?)[\s:#=-]{0,8}(?=[A-Z0-9-]{6,15}(?![A-Z0-9-]))(?:[A-Z-]*\d[A-Z0-9-]*)(?![A-Z0-9-])'
confidence: medium
confidence_justification: >-
  Medium confidence: the value charset is generic, but requiring an explicit
  member/subscriber/policy/group ID label adjacent to a 6-15 character value
  containing a digit substantially reduces false positives. Not high because the
  label-plus-alphanumeric structure can appear in non-health contexts.
jurisdictions:
  - global
regulations:
  - HIPAA
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - phi
  - health
corroborative_evidence:
  keywords:
    - health insurance
    - insurance
    - member id
    - subscriber id
    - policy number
    - group number
    - health plan
    - explanation of benefits
  proximity: 300
test_cases:
  should_match:
    - value: 'Member ID: ABC123456789'
      description: Exact 65 discovery probe with a labelled value but no health-insurance context
    - value: 'subscriber number = XYZ7654321'
      description: Subscriber number label, value contains digits, lowercase label
    - value: 'Policy No. H12-3456-78'
      description: Policy number with hyphenated value containing digits
    - value: 'Health plan Member ID: ABC123456789'
      description: Exact 75 probe with health-insurance context
    - value: 'Patient claim for Health plan Member ID: ABC123456789'
      description: Exact 85 probe with health-insurance and person-linked care context
  should_not_match:
    - value: 'Member ID: ABCDEFGH'
      description: Value has no digit, likely a word not an identifier
    - value: 'group photo number twelve was the best'
      description: Prose using the words group/number with no identifier value
    - value: 'Policy No. 12'
      description: Value too short (under 6 characters)
    - value: 'Club Member ID: ABC123456789'
      description: Valid non-health membership identifier must remain discovery-only
false_positives:
  - description: Order numbers, membership IDs for non-health clubs, or group codes that share the member/policy/group labelling.
    mitigation: Require corroborative health-insurance keywords (health plan, EOB, payer) within proximity to confirm a health context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  The regex finds a 6-15 character alphanumeric value containing a digit after a member, subscriber, policy, or group identifier label in health-insurance context. A genuine identifier can link a person to coverage, support fraudulent claims or impersonation, and help retrieve further insurance information when combined with a name and provider. Order numbers, club memberships, and unrelated group codes can share the same labels, and the identifier alone does not disclose diagnosis or treatment. Risk 8 SENSITIVE reflects serious but person-bounded privacy and entitlement harm; PROTECTED would require linked clinical information, a bulk member register, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_insurance_member_id
      matches:
        - ref: Keyword_health_insurance_context
        - ref: Keyword_person_coverage_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_insurance_member_id
      matches:
        - ref: Keyword_health_insurance_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_insurance_member_id
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_insurance_member_id
      pattern: '(?<![A-Za-z])(?:member|subscriber|policy|group|enrollee|insured)\s+(?:id|identifier|number|no\.?)[\s:#=-]{0,8}(?=[A-Z0-9-]{6,15}(?![A-Z0-9-]))(?:[A-Z-]*\d[A-Z0-9-]*)(?![A-Z0-9-])'
  keywords:
    - id: Keyword_health_insurance_context
      groups:
        - match_style: word
          terms:
            - health insurance
            - health plan
            - medical insurance
            - payer
            - insurer
            - explanation of benefits
            - insurance claim
            - coverage
      strength: domain
    - id: Keyword_person_coverage_context
      groups:
        - match_style: word
          terms:
            - patient
            - beneficiary
            - dependent
            - member name
            - date of birth
            - treating provider
            - clinic
      strength: specific
created: '2026-06-13'
updated: '2026-07-19'
