    date: '2026-07-19'
    description: 'Targeted finance/health blocker remediation: add a 65 discovery tier for labelled member-like values, require health-insurance context at 75 and additional person linkage at 85, with exact-tier and club-membership adversarial probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1545 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
