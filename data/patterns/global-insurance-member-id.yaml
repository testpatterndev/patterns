schema: testpattern/v1
name: Health Insurance Member / Subscriber ID (Labelled)
slug: global-insurance-member-id
version: 1.1.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects a labelled health-insurance member, subscriber, policy or group identifier:
  a member/subscriber/policy/group ID label followed by a 6-15 character alphanumeric
  value that contains at least one digit. Insurance identifiers are protected health
  information under HIPAA and are frequently exposed in breach disclosures.
operation: >-
  A member / subscriber / policy / group label, an id/number/no qualifier, up to 8
  separator characters, then a 6-15 character value of letters, digits and hyphens
  that must include at least one digit (so it does not match an ordinary word).
  Bounded with non-alphanumeric lookarounds. Corroborative evidence: keywords within
  300 characters.
pattern: '(?<![A-Za-z])(?:member|subscriber|policy|group|enrollee|insured)\s+(?:id|identifier|number|no\.?)[\s:#=-]{0,8}(?=[A-Z0-9-]{6,15}(?![A-Z0-9-]))(?:[A-Z-]*\d[A-Z0-9-]*)(?![A-Z0-9-])'
confidence: medium
confidence_justification: >-
  Medium confidence: the value charset is generic, but requiring an explicit
  member/subscriber/policy/group ID label adjacent to a 6-15 character value
  containing a digit substantially reduces false positives. Not high because the
  label-plus-alphanumeric structure can appear in non-health contexts.
jurisdictions:
  - global
regulations:
  - HIPAA
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - phi
  - health
corroborative_evidence:
  keywords:
    - health insurance
    - insurance
    - member id
    - subscriber id
    - policy number
    - group number
    - health plan
    - explanation of benefits
  proximity: 300
test_cases:
  should_match:
    - value: 'Member ID: ABC123456789'
      description: Member ID label with alphanumeric value containing digits
    - value: 'subscriber number = XYZ7654321'
      description: Subscriber number label, value contains digits, lowercase label
    - value: 'Policy No. H12-3456-78'
      description: Policy number with hyphenated value containing digits
  should_not_match:
    - value: 'Member ID: ABCDEFGH'
      description: Value has no digit, likely a word not an identifier
    - value: 'group photo number twelve was the best'
      description: Prose using the words group/number with no identifier value
    - value: 'Policy No. 12'
      description: Value too short (under 6 characters)
false_positives:
  - description: Order numbers, membership IDs for non-health clubs, or group codes that share the member/policy/group labelling.
    mitigation: Require corroborative health-insurance keywords (health plan, EOB, payer) within proximity to confirm a health context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  Health-insurance identifiers are protected health information and a building block
  for medical identity theft and fraudulent claims. They are routinely among the data
  elements exposed in healthcare breach notifications.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-09'
