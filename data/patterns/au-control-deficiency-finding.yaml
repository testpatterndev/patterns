schema: testpattern/v1
name: Control Deficiency Finding
slug: au-control-deficiency-finding
version: 1.4.0
type: regex
pattern_class: concept
description: Detects control deficiency findings from internal audits and compliance assessments.
operation: >-
  A material weakness, significant deficiency, control deficiency, ICFR weakness, or internal-control
  issue is discovery-only at 65. Control-testing, key-control, ITGC, segregation-of-duties, access-control,
  or application-control evidence raises it to 75. The 85 tier additionally requires remediation,
  corrective action, an owner, target date, follow-up, or closure evidence. Enforcing tiers reject
  templates and examples.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
- NIST CSF
- PCI-DSS
data_categories:
  - security
  - audit
test_cases:
  should_match:
    - value: 'Control deficiency'
      description: Low-tier probe - deficiency phrase without control-testing detail
    - value: 'Control deficiency: test of controls found an access-control and segregation-of-duties failure.'
      description: Medium-tier probe - control-testing evidence without remediation tracking
    - value: 'Significant deficiency: control testing found an ITGC access-control failure; corrective action owner and target date assigned.'
      description: High-tier probe - tested control failure plus remediation tracking
  should_not_match:
    - value: Quality control procedures
      description: Quality-control sibling
    - value: Remote control battery replacement
      description: Consumer-device sibling
    - value: 'The public accounting guide defines a significant deficiency.'
      description: Public guidance contains only the deficiency phrase
    - value: 'Template example: significant deficiency from control testing with an ITGC failure, corrective action owner, and target date.'
      description: Template contains otherwise high-tier evidence
false_positives:
  - description: Generic control in non-audit contexts.
    mitigation: Require audit-specific terms like deficiency, material weakness, or finding severity.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: >-
  The medium-confidence TestPattern keyword detector identifies control-deficiency findings through material weakness, significant deficiency, severity, remediation, management response, and compensating-control terms. A normal match may reveal unresolved audit weaknesses that enable evasion, fraud, or targeted exploitation and can damage assurance and regulatory confidence. Generic control language remains a documented false positive, making enforcement dependent on finding and remediation context. Risk 8 SENSITIVE Government fits serious contained control evidence; PROTECTED requires a systemic exploitable failure, critical-service compromise, or credible significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_control_deficiency
      matches:
        - ref: Keyword_control_testing
        - ref: Keyword_remediation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_control_deficiency
      matches:
        - ref: Keyword_control_testing
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_control_deficiency
  regexes:
    - id: Regex_control_deficiency
      pattern: >-
        (?i)\b(?:material\s+weakness(?:es)?|significant\s+deficien(?:cy|cies)|control\s+deficien(?:cy|cies)|internal\s+control\s+(?:over\s+financial\s+reporting|issue|weakness)|icfr\s+(?:deficiency|weakness))\b
  keywords:
    - id: Keyword_control_testing
      groups:
        - match_style: word
          terms:
            - test of controls
            - control testing
            - key control
            - detective control
            - preventive control
            - IT general controls
            - ITGC
            - application controls
            - segregation of duties
            - access controls
      strength: specific
    - id: Keyword_remediation
      groups:
        - match_style: word
          terms:
            - remediation
            - remediate
            - corrective action
            - action plan
            - implementation plan
            - due date
            - target date
            - owner
            - responsible
            - follow-up
            - closure
      strength: domain
    - id: Keyword_audit_general
      groups:
        - match_style: word
          terms:
            - internal audit
            - audit report
            - audit findings
            - audit opinion
            - audit scope
            - audit objective
            - audit conclusion
            - audit recommendation
            - IIA standards
            - IPPF
      strength: specific
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.0
    date: '2026-07-19'
    description: 'Profile quality: align the regex-backed detector type; add deficiency discovery, control-testing medium, and remediation-tracking high tiers; add public/template adversarial probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 533 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - control deficiency
  - material weakness
  - significant deficiency
  - control gap
  - control failure
  - audit finding
  - remediation
  - control effectiveness
  - compensating control
  - management response
  - risk rating
  - finding severity
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
