      id_match: Pattern_unemployment_benefit
      matches:
        - ref: Pattern_au_top500_383_unemployment_benefit_records_label_context
        - ref: Keyword_au_top500_383_unemployment_benefit_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_383_unemployment_benefit_records_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_unemployment_benefit
      matches:
        - ref: Evidence_unemployment_benefit
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_383_unemployment_benefit_records_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_unemployment_benefit
      matches:
        - ref: Evidence_unemployment_benefit
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_383_unemployment_benefit_records_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_unemployment_benefit
      matches:
        - ref: Evidence_unemployment_benefit
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_383_unemployment_benefit_records_noise_exclusion
  regexes:
    - id: Pattern_unemployment_benefit
      pattern: (?is)\b(?:unemployment\s+benefit\s+records|Services\s+Australia|income\s+support|mutual\s+obligations|employment\s+services|social\s+security)\b
    - id: Pattern_au_top500_383_unemployment_benefit_records_label_context
      pattern: (?i)\\b(?:unemployment\\s+benefit\\s+records|unemployment|benefit|top500)\\b
  keywords:
    - id: Evidence_unemployment_benefit
      groups:
        - match_style: word
          terms:
