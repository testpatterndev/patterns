schema: testpattern/v1
name: Target package intelligence
slug: au-top500-424-target-package-intelligence
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to target package intelligence in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 5 keywords within 300 characters.'
pattern: (?is)\b(?:target\s+package\s+intelligence|target\s+acquisition|intelligence\s+package|target\s+analysis|targeting\s+data|intelligence\s+assessment|threat\s+intelligence|target\s+identification|target\s+dossier|defence\s+intelligence|signals\s+intelligence|intelligence\s+product)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - target package intelligence
    - target
    - package
    - intelligence
    - defense
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: target package intelligence
      description: Primary topic phrase match
    - value: target acquisition
      description: Case-insensitive topic phrase match
    - value: intelligence package
      description: Alternative topic phrase match
    - value: target analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to target package intelligence appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_target_package_intelligence
      matches:
        - ref: Evidence_target_package_intelligence
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_target_package_intelligence
      matches:
        - ref: Evidence_target_package_intelligence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_target_package_intelligence
      matches:
        - ref: Evidence_target_package_intelligence
  regexes:
    - id: Pattern_target_package_intelligence
      pattern: (?is)\b(?:target\s+package\s+intelligence|target\s+acquisition|intelligence\s+package|target\s+analysis|targeting\s+data|intelligence\s+assessment|threat\s+intelligence|target\s+identification|target\s+dossier|defence\s+intelligence|signals\s+intelligence|intelligence\s+product)\b
  keywords:
    - id: Evidence_target_package_intelligence
      groups:
        - match_style: word
          terms:
            - target package intelligence
            - target acquisition
            - intelligence package
            - target analysis
            - targeting data
            - intelligence assessment
            - threat intelligence
            - target identification
            - target dossier
            - defence intelligence
            - signals intelligence
            - intelligence product
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Secret
