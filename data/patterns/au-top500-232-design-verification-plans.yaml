schema: testpattern/v1
name: Design verification plans
slug: au-top500-232-design-verification-plans
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to design verification plans in Australian contexts. Higher confidence identifies plans for future design verification activities (planned verification
  items with test IDs, methods, requirement traces, acceptance criteria, owners, or schedules); design-review and compliance-testing vocabulary alone remains discovery-only.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:design\s+verification\s+plans|verification\s+plan|design\s+validation|test\s+protocol|verification\s+testing|design\s+review|qualification\s+testing|design\s+acceptance|safety\s+verification|compliance\s+testing)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - design verification plans
    - design
    - verification
    - plans
    - product
    - quality
    - safety
  proximity: 300
test_cases:
  should_match:
    - value: design verification plans
      description: Primary topic phrase match
    - value: verification plan
      description: Case-insensitive topic phrase match
    - value: design validation
      description: Alternative topic phrase match
    - value: test protocol
      description: Additional topic phrase match
    - value: 'VER-104 planned method: thermal cycle; requirement REQ-88; acceptance <=2% drift; owner: Lab A; due 15 Sep.'
      description: Planned verification item with method, requirement trace, criterion, owner, and date (enforces at 75/85)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: product failure
      description: Generic word pair from old broad template should not match
    - value: 'Completed design validation report: all tests passed.'
      description: Result/report language, not a plan — discovery only, must not enforce
    - value: The finance team plans to verify the invoice design.
      description: Verification and design outside product engineering must not match
    - value: Training template VP-001 planned test with placeholder owner.
      description: Training/template/placeholder marks an empty example — suppressed from enforcement
    - value: verification plan
      description: Heading alone has no planned item — discovery only, must not enforce
false_positives:
  - description: Common words and phrases related to design verification plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_verification_plan_item
      matches:
        - ref: Evidence_design_verification_plans
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_verification_plan_item
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_design_verification_plans
      matches:
        - ref: Evidence_design_verification_plans
  regexes:
    - id: Pattern_design_verification_plans
      pattern: >-
        (?is)\b(?:design\s+verification\s+plans|verification\s+plan|design\s+validation|test\s+protocol|verification\s+testing|design\s+review|qualification\s+testing|design\s+acceptance|safety\s+verification|compliance\s+testing)\b
    - id: Pattern_au_top500_232_design_verification_plans_label_context
      pattern: (?i)\b(?:design\s+verification\s+plans)\b
    - id: Pattern_verification_plan_item
      pattern: >-
        (?is)\b(?:VP|VER|TEST)[-_ ]?\d{2,8}\b[\s\S]{0,220}\b(?:planned|method|requirement|acceptance criteria|owner|scheduled|due date)\b
  keywords:
    - id: Evidence_design_verification_plans
      groups:
        - match_style: word
          terms:
            - design verification plans
            - verification plan
            - design validation
            - test protocol
            - verification testing
            - design review
            - qualification testing
            - design acceptance
            - safety verification
            - compliance testing
    - id: Keyword_au_top500_232_design_verification_plans_domain_context
      groups:
        - match_style: word
          terms:
            - design verification plans
            - design
            - verification
            - plans
risk_description: >-
  The regex finds design-verification plans, verification plans, design validation, and test-protocol references with seven engineering corroborators, identifying planned evidence that requirements will be met. A substantive plan can reveal product requirements, architecture assumptions, test methods, acceptance criteria, weak areas, and development timing to a competitor or hostile reviewer. The impact is moderate and bounded to one design program, while templates, quality procedures, and public standards may use the same phrases. Risk 7 and SENSITIVE InfoTech fit the proprietary plan; risk 8 or PROTECTED requires strategically decisive technology, exploit-ready security tests, critical safety systems, or significant competitive damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
