schema: testpattern/v1
name: Australian Loan Agreement
slug: au-loan-agreement
version: 1.3.0
type: keyword_list
pattern_class: concept
description: Detects loan agreement documents containing borrower details, interest rates, and repayment terms.
operation: >-
  Keyword-based detection matching loan agreement, borrower, interest rate, and repayment terms. Corroborative evidence:
  14 keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
  - legal
  - pii
test_cases:
  should_match:
    - value: 'Loan agreement between borrower and lender: principal amount $500,000'
      description: Test match 1
    - value: Secured loan facility with interest rate 5.5% and repayment schedule
      description: Test match 2
    - value: Financial covenants and default provisions in loan agreement
      description: Test match 3
  should_not_match:
    - value: Can I borrow your pen?
      description: Non-match 1
    - value: Student loan information session
      description: Non-match 2
false_positives:
  - description: Casual references to loan or borrowing in non-agreement contexts.
    mitigation: Require legal agreement keywords like borrower, lender, or repayment schedule.
exports:
  - yaml
scope: narrow
risk_rating: 8
risk_description: Loan agreement exposure reveals financial obligations, interest rates, and borrower details.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_loan_agreement
      matches:
        - ref: Keyword_nccp_credit
        - ref: Keyword_loan_terms
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_loan_agreement
      matches:
        - ref: Keyword_legal_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_loan_agreement
      pattern: >-
        (?i)\b(?:(?:personal|business|commercial|consumer)\s+loan\s+(?:agreement|contract|deed)|credit\s+contract|loan\s+(?:facility|deed)|line\s+of\s+credit\s+agreement)\b
  keywords:
    - id: Keyword_nccp_credit
      groups:
        - match_style: word
          terms:
            - National Consumer Credit Protection Act
            - NCCP
            - consumer credit
            - credit contract
            - credit provider
            - responsible lending
            - comparison rate
            - credit licence
      strength: specific
    - id: Keyword_loan_terms
      groups:
        - match_style: word
          terms:
            - loan amount
            - principal sum
            - interest rate
            - annual percentage rate
            - text: APR
              case_sensitive: true
            - repayment
            - monthly instalment
            - default interest
            - prepayment
            - drawdown
            - facility limit
      strength: specific
    - id: Keyword_legal_general
      groups:
        - match_style: word
          terms:
            - agreement
            - contract
            - deed
            - executed
            - witnessed
            - signature
            - cooling off
            - default
            - termination
            - entire agreement
      strength: domain
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - loan agreement
  - borrower
  - lender
  - principal amount
  - interest rate
  - repayment schedule
  - loan term
  - secured loan
  - unsecured loan
  - default
  - loan facility
  - drawdown
  - financial covenants
  - loan balance
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
