schema: testpattern/v1
name: BIP-39 Crypto Wallet Seed Phrase
slug: global-bip39-seed-phrase
version: 1.3.4
type: regex
pattern_class: identifier
engine: universal
description: 'Detects a BIP-39 mnemonic (crypto wallet recovery / seed phrase): a run of 11-24 space-separated lowercase words.
  Because the full 2048-word BIP-39 list cannot be embedded in a single regex, detection fires either when the word run is
  explicitly labelled as a seed/mnemonic/recovery phrase, or when the run contains one of a set of distinctive BIP-39 anchor
  words. A leaked seed phrase grants full, irreversible control of the wallet''s funds.'
operation: 'Two paths. (1) Labelled: a seed/mnemonic/recovery-phrase/wallet-backup label followed by a run of 11-24 lowercase
  words of 3-8 letters each. (2) Anchor: a run of 11-24 lowercase 3-8 letter words that includes a distinctive BIP-39 anchor
  word (abandon, ability, zoo, zone, etc.). LIMITATION: cannot fully validate that every word is in the BIP-39 list, so the
  labelled path is the precise one and the anchor path is a heuristic. Corroborative evidence: keywords within 300 characters.'
pattern: (?:seed\s+phrase|mnemonic\s+phrase|mnemonic|recovery\s+phrase|recovery\s+seed|wallet\s+backup|secret\s+recovery\s+phrase)[\s:#=-]{0,8}[a-z]{3,8}
