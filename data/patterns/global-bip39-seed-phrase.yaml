confidence: high
confidence_justification: High confidence when labelled, because the explicit seed/mnemonic/recovery-phrase label adjacent
  to a long lowercase word run is highly specific. The anchor path is more heuristic but still requires a long run of short
  lowercase words containing a distinctive BIP-39 word, which is uncommon in ordinary prose.
jurisdictions:
- global
regulations:
- GDPR
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
- credentials
- financial
corroborative_evidence:
  keywords:
  - seed phrase
  - mnemonic
  - recovery phrase
  - secret recovery phrase
  - wallet
  - private key
  - BIP39
  - cold storage
  proximity: 300
test_cases:
  should_match:
  - value: 'seed phrase: abandon ability able about above absent absorb abstract absurd abuse access account'
    description: Labelled 12-word seed phrase using real BIP-39 words
  - value: recovery phrase legal winner thank year wave sausage worth useful legal winner thank
    description: Labelled 12-word recovery phrase (classic BIP-39 test vector words)
  - value: gospel robust scheme ozone witness surround zone wisdom kitten garage soccer legal hover
    description: Unlabelled 13-word run containing several BIP-39 anchor words
  should_not_match:
  - value: 'seed phrase: this'
    description: Label present but only a single trailing word, not a full mnemonic
  - value: the quick brown fox jumps over the lazy dog again today
    description: Ordinary short-word prose with no label and no BIP-39 anchor word
  - value: Always store your recovery phrase offline and never share your mnemonic with anyone
    description: Prose advice about seed phrases with no actual word run
false_positives:
- description: Long runs of short lowercase words (e.g. word-game text or tokenized prose) that happen to contain a BIP-39
    anchor word.
  mitigation: Prefer the labelled path; require corroborative wallet/crypto keywords for the anchor path and optionally validate
    words against the full BIP-39 list downstream.
exports:
- purview_xml
- yaml
- regex_copy
scope: narrow
risk_rating: 8
risk_description: This regex detects an 11-to-24-word crypto-wallet recovery phrase when labelled as a seed, mnemonic, recovery
  phrase, or wallet backup, with a second heuristic path using distinctive BIP-39 anchor words. A valid complete phrase grants
  direct and normally irreversible control of the associated wallet, enabling immediate transfer and permanent loss of its
  assets. The normal true-positive is one credential, but the regex does not validate every word and establishes neither the
  wallet balance nor wider operational impact. Risk 8 SENSITIVE InfoTech captures the credential's exceptional exploitability;
  PROTECTED is not justified without evidence that the wallet value or connected function reaches significant-damage scale.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-14'
changelog:
- version: 1.3.3
  date: '2026-07-14'
  description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1527 without changing
    detector or package metadata.'
- version: 1.3.2
  date: '2026-07-09'
  description: 'Fix regression from the 1.3.1 Purview-safe rewrite: collapsing to fixed 12/24-word branches (a) dropped the
    unlabelled anchor-word detection path entirely and (b) only matched labelled runs of exactly 12 or 24 words, failing should_match
    for an 11-word labelled phrase and a 13-word unlabelled anchor phrase. Restore the documented 11-24 word range as flat,
    non-nested-quantifier alternation for both paths (14 labelled branches; 14 anchor branches with the anchor word required
    at the run''s first position, 10-23 trailing words). No group is itself quantified and no group nests a quantified sub-pattern,
    so this remains Purview-safe by the same construction already used for the 12/24-word branches; verified against scripts/ci-check.mjs''s
    purviewBanned() checks and all should_match/should_not_match cases. Narrows the old (?:...){0,13} pre-anchor flexibility
    to a fixed first position, a deliberate simplification to avoid a combinatorial branch explosion.'
- 'Purview-safe: replace quantified word-groups {10,23} with fixed 12/24 word sequences.'
- version: 1.3.0
  date: '2026-07-09'
  description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are
    scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived
    by scripts/derive-pattern-class.mjs + spot review'
- version: 1.2.0
  date: '2026-07-04'
  description: Widen inter-word gap \s{1,4}->\s{1,6} (both occurrences) to tolerate PDF wrap/indent whitespace between seed
    words
- version: 1.1.0
  date: '2026-07-04'
  description: Rewrite Purview-banned regex construct (nested/unbounded quantifier) as bounded equivalent
