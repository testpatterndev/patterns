schema: testpattern/v1
name: BIP-39 Crypto Wallet Seed Phrase
slug: global-bip39-seed-phrase
version: 1.2.0
type: regex
engine: universal
description: >-
  Detects a BIP-39 mnemonic (crypto wallet recovery / seed phrase): a run of 11-24
  space-separated lowercase words. Because the full 2048-word BIP-39 list cannot be
  embedded in a single regex, detection fires either when the word run is explicitly
  labelled as a seed/mnemonic/recovery phrase, or when the run contains one of a set
  of distinctive BIP-39 anchor words. A leaked seed phrase grants full, irreversible
  control of the wallet's funds.
operation: >-
  Two paths. (1) Labelled: a seed/mnemonic/recovery-phrase/wallet-backup label
  followed by a run of 11-24 lowercase words of 3-8 letters each. (2) Anchor: a run
  of 11-24 lowercase 3-8 letter words that includes a distinctive BIP-39 anchor word
  (abandon, ability, zoo, zone, etc.). LIMITATION: cannot fully validate that every
  word is in the BIP-39 list, so the labelled path is the precise one and the anchor
  path is a heuristic. Corroborative evidence: keywords within 300 characters.
pattern: '(?:seed\s+phrase|mnemonic(?:\s+phrase)?|recovery\s+phrase|recovery\s+seed|wallet\s+backup|secret\s+recovery\s+phrase)[\s:#=-]{0,8}(?:[a-z]{3,8}\s{1,6}){10,23}[a-z]{3,8}\b|(?<![a-z])(?:[a-z]{3,8}\s{1,6}){0,13}(?:abandon|ability|zoo|zone|robust|gospel|ozone|scheme|surround|witness)(?:\s+[a-z]{3,8}){10,23}(?![a-z])'
confidence: high
confidence_justification: >-
  High confidence when labelled, because the explicit seed/mnemonic/recovery-phrase
  label adjacent to a long lowercase word run is highly specific. The anchor path is
  more heuristic but still requires a long run of short lowercase words containing a
  distinctive BIP-39 word, which is uncommon in ordinary prose.
jurisdictions:
  - global
regulations:
  - GDPR
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - financial
corroborative_evidence:
  keywords:
    - seed phrase
    - mnemonic
    - recovery phrase
    - secret recovery phrase
    - wallet
    - private key
    - BIP39
    - cold storage
  proximity: 300
test_cases:
  should_match:
    - value: 'seed phrase: abandon ability able about above absent absorb abstract absurd abuse access account'
      description: Labelled 12-word seed phrase using real BIP-39 words
    - value: 'recovery phrase legal winner thank year wave sausage worth useful legal winner thank'
      description: Labelled 12-word recovery phrase (classic BIP-39 test vector words)
    - value: 'gospel robust scheme ozone witness surround zone wisdom kitten garage soccer legal hover'
      description: Unlabelled 13-word run containing several BIP-39 anchor words
  should_not_match:
    - value: 'seed phrase: this'
      description: Label present but only a single trailing word, not a full mnemonic
    - value: 'the quick brown fox jumps over the lazy dog again today'
      description: Ordinary short-word prose with no label and no BIP-39 anchor word
    - value: Always store your recovery phrase offline and never share your mnemonic with anyone
      description: Prose advice about seed phrases with no actual word run
false_positives:
  - description: Long runs of short lowercase words (e.g. word-game text or tokenized prose) that happen to contain a BIP-39 anchor word.
    mitigation: Prefer the labelled path; require corroborative wallet/crypto keywords for the anchor path and optionally validate words against the full BIP-39 list downstream.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 10
risk_description: >-
  A BIP-39 seed phrase deterministically regenerates every private key in a wallet.
  Exposure means immediate, irreversible theft of all associated crypto assets with
  no chargeback or recovery path.
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-04'
changelog:
  - version: 1.2.0
    date: '2026-07-04'
    description: Widen inter-word gap \s{1,4}->\s{1,6} (both occurrences) to tolerate PDF wrap/indent whitespace between seed words
  - version: 1.1.0
    date: '2026-07-04'
    description: Rewrite Purview-banned regex construct (nested/unbounded quantifier) as bounded equivalent
author: testpattern-community
license: MIT
references:
  - url: https://github.com/bitcoin/bips/blob/master/bip-0039/bip-0039-wordlists.md
    title: BIP-39 mnemonic wordlists
  - url: https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt
    title: BIP-39 English wordlist (2048 words)
