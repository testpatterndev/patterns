schema: testpattern/v1
name: Birth certificate number
slug: global-top500-027-birth-certificate-number
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to birth certificate number in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:birth\s+certificate\s+number|birth\s+certificate|birth\s+registration|certificate\s+of\s+birth|civil\s+registration|vital\s+records|certificate\s+number|registration\s+number|births\s+deaths\s+marriages|live\s+birth)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - birth certificate number
    - birth
    - certificate
    - number
    - government
    - ids
    - civil
    - status
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: birth certificate number
      description: Primary topic phrase match
    - value: birth certificate
      description: Case-insensitive topic phrase match
    - value: birth registration
      description: Alternative topic phrase match
    - value: certificate of birth
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to birth certificate number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 90
      id_match: Regex_birth_certificate
      matches:
        - ref: Pattern_global_top500_027_birth_certificate_number_label_context
        - ref: Keyword_global_top500_027_birth_certificate_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_027_birth_certificate_number_noise_exclusion
    - confidence_level: 85
      id_match: Regex_birth_certificate
      matches:
        - ref: Keyword_birth_certificate
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_027_birth_certificate_number_noise_exclusion
    - confidence_level: 75
      id_match: Regex_birth_certificate
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_027_birth_certificate_number_noise_exclusion
  regexes:
    - id: Regex_birth_certificate
      pattern: (?is)\b(?:birth\s+certificate\s+number|birth\s+certificate|birth\s+registration|certificate\s+of\s+birth|civil\s+registration|vital\s+records|certificate\s+number|registration\s+number|births\s+deaths\s+marriages|live\s+birth)\b
    - id: Pattern_global_top500_027_birth_certificate_number_label_context
      pattern: (?i)\\b(?:birth\\s+certificate\\s+number|birth|certificate|top500)\\b
  keywords:
    - id: Keyword_birth_certificate
      groups:
        - match_style: word
          terms:
            - birth certificate number
            - birth certificate
            - birth registration
            - certificate of birth
            - civil registration
            - vital records
            - registrar
            - certificate number
            - registration number
            - births deaths marriages
            - live birth
    - id: Keyword_global_top500_027_birth_certificate_number_domain_context
      groups:
        - match_style: word
          terms:
            - birth certificate number
            - birth
            - certificate
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_027_birth_certificate_number_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
