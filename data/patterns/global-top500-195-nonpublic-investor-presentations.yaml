schema: testpattern/v1
name: Nonpublic investor presentations
slug: global-top500-195-nonpublic-investor-presentations
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to nonpublic investor presentations in Australian contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:nonpublic\s+investor\s+presentation|investor\s+presentation|investor\s+deck|pitch\s+deck|investor\s+roadshow)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - nonpublic investor presentations
    - nonpublic
    - investor
    - presentations
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: nonpublic investor presentation
      description: Primary topic phrase match
    - value: investor presentation
      description: Case-insensitive topic phrase match
    - value: investor deck
      description: Alternative topic phrase match
    - value: pitch deck
      description: Additional topic phrase match
    - value: DRAFT investor deck - pre-release FY26 forecast; institutional holders only; embargoed until 20 Aug; do not distribute
      description: Document anchor plus nonpublic-state markers (reaches the enforcing tiers)
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
    - value: Investor presentation published on ASX.
      description: Publicly released presentation carries no nonpublic-state marker, so enforcement must not fire
    - value: Inside information handling policy
      description: MNPI topic without an investor-presentation document anchor must not start this SIT
    - value: Roadshow training deck with fictional numbers
      description: Training material without an investor document anchor phrase
false_positives:
  - description: Common words and phrases related to nonpublic investor presentations appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_nonpublic_investor
      matches:
        - ref: Evidence_nonpublic_state
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_nonpublic_investor
      matches:
        - ref: Evidence_nonpublic_state
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_nonpublic_investor
      discovery_only: true
      description: Investor-presentation document anchor without a nonpublic-state marker — discovery inventory only
  regexes:
    - id: Pattern_nonpublic_investor
      pattern: >-
        (?is)\b(?:nonpublic\s+investor\s+presentation|investor\s+presentation|investor\s+deck|pitch\s+deck|investor\s+roadshow)\b
  keywords:
    - id: Evidence_nonpublic_state
      groups:
        - match_style: word
          terms:
            - non-public
            - material non-public information
            - MNPI
            - inside information
            - pre-release
            - confidential
            - private placement
risk_description: >-
  This concept detector finds investor decks or presentations explicitly associated with nonpublic distribution. A genuine deck may contain unreleased performance, forecasts, strategy, fundraising terms, or transaction plans that enable insider trading or unfair negotiation. Disclosure can seriously harm the issuer and market participants, but the normal presentation is a bounded corporate record rather than a privileged trading system or economy-wide plan. Risk 8 and SENSITIVE are justified; market-wide consequences, protected government policy, or systemic compromise would be needed for PROTECTED.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: 'TP-00321 approved reduced scope: split the flat Evidence_nonpublic_investor pooling into the two concepts the SIT title requires — the primary (top-level and Pattern_nonpublic_investor) now anchors on investor document phrases only (presentation/deck/pitch deck/roadshow), and a new Evidence_nonpublic_state group (non-public, MNPI, material non-public information, inside information, pre-release, confidential, private placement — all pre-existing terms) is required on the 75/85 enforcing tiers, so MNPI-alone text no longer starts this SIT and a document anchor alone is discovery-only (65). institutional investor removed pending the deferred restricted-audience tier. Deferred per QA/independent review: the 85 audience/version/deal-content tier (undefined references) and public/restricted precedence rules. Added embargoed-draft positive plus ASX-published, MNPI-policy, and training-deck negatives.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 796 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
license: MIT
references:
  - https://www.asx.com.au/about/regulation/rules-guidance-notes-and-waivers/asx-listing-rules-guidance-notes-and-waivers
  - https://www.legislation.gov.au/C2004A00818/latest/text

risk_rating: 8