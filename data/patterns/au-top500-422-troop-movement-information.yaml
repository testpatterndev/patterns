schema: testpattern/v1
name: Troop movement information
slug: au-top500-422-troop-movement-information
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to troop movement information in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:troop\s+movement\s+information|troop\s+deployment|force\s+disposition|military\s+movement|unit\s+relocation|operational\s+deployment|force\s+posture|troop\s+strength|deployment\s+schedule|defence\s+intelligence|movement\s+order|theatre\s+of\s+operations)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - troop movement information
    - troop
    - movement
    - information
    - defense
    - intelligence
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: troop movement information
      description: Primary topic phrase match
    - value: troop deployment
      description: Case-insensitive topic phrase match
    - value: force disposition
      description: Alternative topic phrase match
    - value: military movement
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to troop movement information appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_troop_movement_information
      matches:
        - ref: Evidence_troop_movement_information
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_troop_movement_information
      matches:
        - ref: Evidence_troop_movement_information
    - confidence_level: 65
      id_match: Pattern_troop_movement_information
      matches:
        - ref: Evidence_troop_movement_information
  regexes:
    - id: Pattern_troop_movement_information
      pattern: (?is)\b(?:troop\s+movement\s+information|troop\s+deployment|force\s+disposition|military\s+movement|unit\s+relocation|operational\s+deployment|force\s+posture|troop\s+strength|deployment\s+schedule|defence\s+intelligence|movement\s+order|theatre\s+of\s+operations)\b
  keywords:
    - id: Evidence_troop_movement_information
      groups:
        - match_style: word
          terms:
            - troop movement information
            - troop deployment
            - force disposition
            - military movement
            - unit relocation
            - operational deployment
            - force posture
            - troop strength
            - deployment schedule
            - defence intelligence
            - movement order
            - theatre of operations
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Confidential
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.protectivesecurity.gov.au/
  - https://www.defence.gov.au/business-industry/export/controls
