schema: testpattern/v1
name: Remote administration tool settings
slug: au-top500-311-remote-administration-tool-settings
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies remote administration tool settings patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:remote\s+administration|remote\s+access|remote\s+desktop|jump\s+server|bastion\s+host|remote\s+management|session\s+recording|privileged\s+session)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "NDB Scheme (Cth)"
- "SOCI Act 2018 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - remote administration tool settings
    - remote
    - administration
    - tool
    - settings
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: remote administration
      description: Primary topic phrase match
    - value: remote access
      description: Case-insensitive topic phrase match
    - value: remote desktop
      description: Alternative topic phrase match
    - value: jump server
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_remote_admin
      matches:
        - ref: Evidence_remote_admin
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_remote_admin
      matches:
        - ref: Evidence_remote_admin
    - confidence_level: 65
      id_match: Pattern_remote_admin
      matches:
        - ref: Evidence_remote_admin
  regexes:
    - id: Pattern_remote_admin
      pattern: (?is)\b(?:remote\s+administration|remote\s+access|remote\s+desktop|jump\s+server|bastion\s+host|remote\s+management|session\s+recording|privileged\s+session)\b
  keywords:
    - id: Evidence_remote_admin
      groups:
        - match_style: word
          terms:
            - remote administration
            - remote access
            - RDP
            - SSH
            - VNC
            - TeamViewer
            - remote desktop
            - jump server
            - bastion host
            - remote management
            - session recording
            - privileged session
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.homeaffairs.gov.au/about-us/our-portfolios/emergency-management
  - https://www.disasterassist.gov.au/
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines/chapter-11-app-11-security-of-personal-information
