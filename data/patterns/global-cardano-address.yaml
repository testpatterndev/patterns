  - version: 1.0.0
    date: '2026-07-07'
    description: >-
      Initial release — Shelley "addr1" bech32 payment address (body 50-100 chars), domain-context
      -gated at 85 per verification against the CIP-19 test vectors. Byron base58 and stake1 reward
      addresses documented and skipped.
