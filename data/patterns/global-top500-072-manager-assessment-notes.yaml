schema: testpattern/v1
name: Manager assessment notes
slug: global-top500-072-manager-assessment-notes
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to manager assessment notes in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:manager\s+assessment|supervisor\s+notes|manager\s+feedback|leadership\s+review|direct\s+report\s+assessment|manager\s+evaluation|supervisor\s+review|team\s+assessment|manager\s+comments|performance\s+feedback|one[\s-]+on[\s-]+one\s+notes)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - manager assessment notes
    - manager
    - assessment
    - notes
    - employment
    - workforce
    - records
  proximity: 300
test_cases:
  should_match:
    - value: manager assessment
      description: Primary topic phrase match
    - value: supervisor notes
      description: Case-insensitive topic phrase match
    - value: manager feedback
      description: Alternative topic phrase match
    - value: leadership review
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to manager assessment notes appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_manager_assessment
      matches:
        - ref: Pattern_global_top500_072_manager_assessment_notes_label_context
        - ref: Keyword_global_top500_072_manager_assessment_notes_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_manager_assessment
      matches:
        - ref: Keyword_manager_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_manager_assessment
      pattern: >-
        (?is)\b(?:manager\s+assessment|supervisor\s+notes|manager\s+feedback|leadership\s+review|direct\s+report\s+assessment|manager\s+evaluation|supervisor\s+review|team\s+assessment|manager\s+comments|performance\s+feedback|one[\s-]+on[\s-]+one\s+notes)\b
    - id: Pattern_global_top500_072_manager_assessment_notes_label_context
      pattern: (?i)\b(?:manager\s+assessment\s+notes)\b
  keywords:
    - id: Keyword_manager_assessment
      groups:
        - match_style: word
          terms:
            - manager assessment
            - supervisor notes
            - manager feedback
            - leadership review
            - direct report assessment
            - manager evaluation
            - supervisor review
            - team assessment
            - manager comments
            - performance feedback
            - one-on-one notes
      strength: specific
    - id: Keyword_global_top500_072_manager_assessment_notes_domain_context
      groups:
        - match_style: word
          terms:
            - manager assessment notes
            - manager
            - assessment
            - notes
      strength: domain
risk_description: >-
  The concept detector recognises manager-assessment, supervisor-notes, manager-feedback, and leadership-review language intended to identify subjective evaluations about an employee. Genuine notes can disclose perceived weaknesses, behavioural concerns, promotion readiness, or confidential management judgements, causing reputational harm, retaliation, or career disadvantage. Leadership guidance and blank review templates can match, but the normal substantive unit is an identified manager's assessment rather than a generic performance process. Risk 8 SENSITIVE reflects serious contained employment harm; PROTECTED would require a protected-source investigation, security-clearance matter, whistleblower identities, senior strategic appointment, or bulk personnel assessments.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
