schema: testpattern/v1
name: QLD Student Enrolment Form
slug: au-qld-student-enrolment-form
version: 1.4.0
type: keyword_list
pattern_class: concept
description: Detects QLD student enrolment forms containing children's personal information and family details.
operation: 'Keyword-based detection. Corroborative evidence: 12 keywords within 300 characters.'
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - children
  - education
  - government
test_cases:
  should_match:
    - value: 'Student enrolment form available for collection.'
      description: Exact 65 discovery probe - form phrase without populated student fields
    - value: 'Student enrolment form - student name, date of birth, year level, and emergency contact recorded.'
      description: Exact 75 probe - populated enrolment fields without Queensland education-authority evidence
    - value: 'Education Queensland student enrolment form - student name, date of birth, year level, parent guardian, and emergency contact recorded.'
      description: Exact 85 probe - populated form plus Queensland education-authority evidence
    - value: 'Student enrolment form: parent details and emergency contact information'
      description: Test match 1
    - value: QLD school enrolment application with immunisation and medical conditions
      description: Test match 2
    - value: Prep enrolment student details and guardian details form
      description: Test match 3
  should_not_match:
    - value: Enrolment in the loyalty program
      description: Non-match 1
    - value: Student discount available
      description: Non-match 2
    - value: 'Sample template for a pupil admission record: legal name, birth date, grade, telephone.'
      description: Adjacent template language is not a populated student-enrolment record
    - value: 'The public website provides a school admission process guide.'
      description: Public guidance has no student-enrolment primary or populated student fields
    - value: 'Customer loyalty sign-up with reward preferences.'
      description: Sibling membership language does not satisfy the student-form primary
false_positives:
  - description: Generic enrolment in non-school contexts.
    mitigation: Require school enrolment specific terms like parent details or immunisation.
exports:
  - yaml
scope: narrow
risk_rating: 7
risk_description: >-
  This Queensland enrolment concept covers student enrolment forms and associated parent, guardian, emergency-contact, immunisation, and medical fields. A completed form can expose a child's identity, family relationships, contact routes, health needs, and school placement in one administrative record, enabling targeted privacy or safety harm. Generic enrolment instructions, school brochures, and blank forms may trigger without carrying any student's data. Risk 7 SENSITIVE Government reflects the populated form's combined personal content; PROTECTED would require a bulk enrolment register, acute safeguarding information, or significant life-safety consequence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_student_form
      matches:
        - ref: Evidence_enrolment_fields
        - ref: Evidence_qld_education_forms
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_student_form
      matches:
        - ref: Evidence_enrolment_fields
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_student_form
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
  regexes:
    - id: Pattern_qld_education
      pattern: (?i)\b(?:department\s+of\s+education|education\s+queensland|state\s+school|queensland\s+(?:state\s+)?school)\b
    - id: Pattern_student_form
      pattern: (?i)\b(?:student\s+enrolment\s+(?:form|application)|sef-1|application\s+for\s+(?:student\s+)?enrolment)\b
  keywords:
    - id: Evidence_student_enrolment
      groups:
        - match_style: word
          terms:
            - student enrolment
            - enrolment form
            - application for enrolment
            - student status
            - year level
            - language background
            - parent guardian
            - emergency contact
      strength: specific
    - id: Evidence_qld_education_forms
      groups:
        - match_style: word
          terms:
            - Department of Education
            - Education Queensland
            - State School
            - SEF-1
            - ppr.qed.qld.gov.au
            - education.qld.gov.au
            - eq.edu.au
      strength: specific
    - id: Evidence_qld_government
      groups:
        - match_style: word
          terms:
            - Queensland Government
            - State of Queensland
            - QLD Government
            - qld.gov.au
            - Information Privacy Act 2009
            - Queensland Privacy Principles
      strength: specific
    - id: Evidence_enrolment_fields
      groups:
        - match_style: word
          terms:
            - student name
            - date of birth
            - year level
            - residential address
            - parent guardian
            - emergency contact
            - medical condition
            - previous school
      strength: domain
created: '2026-02-09'
updated: '2026-07-19'
changelog:
  - version: 1.4.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: add a 65 discovery form tier, require populated student/guardian fields at 75 and Queensland education-authority evidence at 85, plus exact-tier and sibling/public/template probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 589 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 95 to 85.; Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.
author: testpattern-community
license: MIT
keywords:
  - student enrolment
  - enrolment form
  - school enrolment
  - student details
  - parent details
  - guardian details
  - emergency contact
  - medical conditions
  - immunisation
  - school age
  - prep enrolment
  - enrolment application
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 95 to 85.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
