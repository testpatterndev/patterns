schema: testpattern/v1
name: Crown Solicitor Legal Opinion
slug: crown-solicitor-legal-opinion
version: 1.4.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects privileged legal opinions issued by the Queensland Crown Solicitor or Office of the Crown Solicitor. These documents constitute the highest level of legal professional privilege in Queensland Government and their disclosure permanently waives privilege under Evidence Act 1977 (Qld) s.14.
operation: 'Primary detection: keyword proximity matching ''Crown Solicitor'' or ''Office of the Crown Solicitor'' within 200 characters of privilege indicators (''opinion'', ''advice'', ''privileged'', ''LPP''). Secondary detection: regex match for Crown Solicitor reference numbers (CS-YYYY-NNNN or OCS/NNNN/NN). Document marker detection: ''LEGAL PROFESSIONAL PRIVILEGE'' header near ''Crown Solicitor''. Corroborative evidence: 3 keywords within 300 characters. Exclusion: published court decisions with citation formats.'
pattern: (?i)\b(?:Crown\s+Solicitor|Office\s+of\s+the\s+Crown\s+Solicitor|OCS)\b
confidence: medium
confidence_justification: 'Medium confidence: Crown Solicitor is a specific institutional role unique to government legal practice. Combined with privilege indicators and reference number formats, false positive rate is very low. Document marker patterns provide additional confidence layer.'
jurisdictions:
  - au
regulations:
- "Evidence Act 1977 (Qld)"
- "RTI Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - opinion
    - advice
    - privileged
    - LPP
    - legal professional privilege
    - PROTECTED
    - confidential
    - instructing officer
    - s.14
    - privilege claim
    - Evidence Act
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        LEGAL PROFESSIONAL PRIVILEGE
        OFFICE OF THE CROWN SOLICITOR
        Ref: CS-2025-0847

        Privileged Legal Opinion
        Re: State liability — Maryborough Hospital incident

        This opinion is provided pursuant to instructions received from the Director-General, Queensland Health.
      description: Crown Solicitor opinion with reference number and privilege header
    - value: The Crown Solicitor has provided advice (ref OCS/2024/42) confirming that the State's position on this matter is protected by legal professional privilege. The advice should not be disclosed outside the instructing team.
      description: Internal reference to Crown Solicitor privileged advice with OCS reference
    - value: |-
        PROTECTED — Legal-Privilege
        Crown Solicitor Legal Opinion
        Prepared for: Department of Environment and Science
        Subject: LPP assessment — contaminated land liability at Pinkenba site
      description: Crown Solicitor opinion with PROTECTED marking and LPP reference
    - value: OFFICE OF THE CROWN SOLICITOR OCS/2024/42 - privileged legal opinion on State liability; LPP.
      description: One valid OCS reference with entity, opinion, and privilege is sufficient — the CS reference scheme is not also required
  should_not_match:
    - value: In Smith v State of Queensland [2024] QSC 142, the Crown Solicitor appeared as counsel for the respondent. The published reasons for judgment are available on the Supreme Court website.
      description: Published court decision mentioning Crown Solicitor as counsel
    - value: The Office of the Crown Solicitor annual report 2023-24 was tabled in Parliament on 15 October 2024. The report details the office's workload statistics and staffing levels.
      description: Published annual report from Crown Solicitor's office
    - value: A career as a Crown Solicitor requires admission as a legal practitioner under the Legal Profession Act 2007. The role involves acting for government departments.
      description: General description of Crown Solicitor role in educational context
    - value: The Office of the Crown Solicitor annual report was tabled.
      description: Annual report and tabled exclusions apply to all tiers
    - value: Example CS-2025-0001 Crown Solicitor opinion.
      description: Example context is suppressed by the exclusion group
    - value: CS-2025-0847 Crown Solicitor.
      description: Reference plus entity without opinion, advice, or privilege content must not enforce
    - value: Government lawyers attended a professional-development seminar.
      description: Routine legal training with no Crown Solicitor entity, reference, or privilege content
false_positives:
  - description: Published court decisions where Crown Solicitor appeared as counsel
    mitigation: Negative match on citation formats [YYYY] QSC, [YYYY] QCA, [YYYY] HCA and keywords 'published reasons', 'judgment', 'tabled'
  - description: Annual reports and public documents from the Office of the Crown Solicitor
    mitigation: Negative match on 'annual report', 'tabled in Parliament', 'media release', 'public version'
  - description: Academic or educational content discussing the Crown Solicitor role
    mitigation: Require co-occurrence with privilege indicators (LPP, privileged, PROTECTED) or reference number patterns
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 85
      id_match:
        type: any
        ids:
          - Pattern_crown_solicitor_legal_opinion_crown_solicitor_reference_number_format_
          - Pattern_crown_solicitor_legal_opinion_office_of_crown_solicitor_reference_ocs_
      matches:
        - ref: Pattern_crown_solicitor_legal_opinion_crown_solicitor_entity_name
        - ref: Evidence_crown_solicitor_legal_opinion_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_crown_solicitor_legal_opinion_exclusion
    - confidence_level: 75
      id_match:
        type: any
        ids:
          - Pattern_crown_solicitor_legal_opinion_crown_solicitor_reference_number_format_
          - Pattern_crown_solicitor_legal_opinion_office_of_crown_solicitor_reference_ocs_
          - Pattern_crown_solicitor_legal_opinion_crown_solicitor_entity_name
      matches:
        - ref: Evidence_crown_solicitor_legal_opinion_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_crown_solicitor_legal_opinion_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match:
        type: any
        ids:
          - Pattern_crown_solicitor_legal_opinion_crown_solicitor_reference_number_format_
          - Pattern_crown_solicitor_legal_opinion_office_of_crown_solicitor_reference_ocs_
          - Pattern_crown_solicitor_legal_opinion_crown_solicitor_entity_name
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_crown_solicitor_legal_opinion_exclusion
  regexes:
    - id: Pattern_crown_solicitor_legal_opinion_crown_solicitor_reference_number_format_
      pattern: (?i)\bCS-\d{4}-\d{4}\b
    - id: Pattern_crown_solicitor_legal_opinion_office_of_crown_solicitor_reference_ocs_
      pattern: (?i)\bOCS/\d{4}/\d{2,4}\b
    - id: Pattern_crown_solicitor_legal_opinion_crown_solicitor_entity_name
      pattern: (?i)\b(?:Crown\s+Solicitor|Office\s+of\s+the\s+Crown\s+Solicitor)\b
  keywords:
    - id: Evidence_crown_solicitor_legal_opinion_primary
      groups:
        - match_style: word
          terms:
            - Crown Solicitor
            - Office of the Crown Solicitor
            - text: OCS
              case_sensitive: true
      strength: specific
    - id: Evidence_crown_solicitor_legal_opinion_corroborative
      groups:
        - match_style: word
          terms:
            - opinion
            - advice
            - legal risk
            - privileged
            - text: LPP
              case_sensitive: true
            - legal professional privilege
            - PROTECTED
            - instructing officer
            - privilege claim
      strength: domain
    - id: Evidence_crown_solicitor_legal_opinion_exclusion
      groups:
        - match_style: word
          terms:
            - published reasons
            - tabled
            - annual report
            - media release
            - judgment
            - template
            - example

      strength: noise
risk_rating: 8
risk_description: >-
  This keyword-proximity detector targets an actual Crown Solicitor or Office of the Crown Solicitor opinion when privilege, advice, opinion, or LPP indicators occur nearby, not a public mention of the office. Disclosure can waive legal professional privilege and expose the State's candid liability analysis, vulnerabilities, recommended position, and instructions, allowing an opponent to reshape litigation or negotiations. The affected unit is one privileged government opinion with serious but contained legal and financial consequences. Risk 8 supports SENSITIVE Legal; PROTECTED would require statewide systemic exposure, Cabinet-level consequences, a protected operation, or broad compromise of privileged holdings.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
references: []
created: '2026-02-20'
updated: '2026-07-16'
changelog:
  - version: 1.4.0
    date: '2026-07-16'
    description: 'sit-alignment-validation-2026-07-16 wave1 (TP-00714): any-of primary across CS reference, OCS reference, and Crown Solicitor/Office entity patterns (previously all tiers keyed solely on CS-YYYY-NNNN, making the OCS-reference and unnumbered-opinion positives unreachable). Every enforcing path now requires the legal-opinion corroborative group (75 previously required only the primary keyword group with no opinion/privilege evidence); the new legal risk term added to the corroborative group per the approved evidence design. 85 keys on ONE reference scheme (CS or OCS, never both required) plus the entity pattern and corroborative evidence. The published/tabled/annual-report/template/example exclusion group is now NOT-gated on all tiers including 65/75 (previously only 85). Educational-context negative reworded (providing legal advice to -> acting for): under the approved design entity-plus-advice evidence intentionally enforces, so the old wording no longer describes a true negative. Adversarial test cases added.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1456 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Convert the Evidence_*_exclusion noise list on the 85 tier from a required positive ref (wiring bug: the tier could only fire when publication/template noise was PRESENT, and the exclusion never vetoed anything) to a max_matches:0 NOT-group per sibling convention (tier-harness triage class T2 sub-case "exclusion lists wired as required refs")'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it). Reclassified UNSAFE-REMOVE on review: the 85 tier positively requires Evidence_crown_solicitor_legal_opinion_exclusion, whose terms include the dictionary terms ''template'' and ''example'' (a strength: noise group referenced as positive tier evidence — see the miswired-NOT-gate follow-up, which may re-wire the gate once that group is corrected)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
