schema: testpattern/v1
name: Russian Passport Number (Domestic)
slug: ru-passport-number-domestic
version: 1.2.0
type: regex
engine: universal
description: >-
  Detects Russian domestic passport number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in
  SIT directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-russia-passport-number-domestic Corroborative evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{2}\s?\d{2}\s?\d{6}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - ru
regulations:
  - Federal Law No. 152-FZ (Russia)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - travel document
    - passport number
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 45 06 123456
      description: Spaced format with series and number
    - value: '4506123456'
      description: Continuous digit format
    - value: 12 34 567890
      description: Spaced format with series and number
  should_not_match:
    - value: '123456'
      description: Too few digits
    - value: 45 06 12345
      description: Only 9 digits total is too short
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic alphanumeric sequences matching passport format in unrelated contexts.
    mitigation: Require corroborative evidence keywords within the proximity window.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_ru_passport_domestic
      matches:
        - ref: Pattern_ru_passport_number_domestic_label_context
        - ref: Keyword_ru_passport_number_domestic_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_ru_passport_domestic
      matches:
        - ref: Keyword_ru_passport_domestic
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_ru_passport_domestic
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_ru_passport_domestic
      pattern: \b\d{2}\s?\d{2}\s?\d{6}\b
    - id: Pattern_ru_passport_number_domestic_label_context
      pattern: (?i)\b(?:russian\s+passport\s+number\s+\(domestic\)|russian|passport|domestic)\b
  keywords:
    - id: Keyword_ru_passport_domestic
      groups:
        - match_style: word
          terms:
            - паспорт
            - паспорт гражданина
            - внутренний паспорт
            - серия и номер паспорта
            - passport
            - passport number
            - удостоверение личности
            - паспортные данные
            - номер паспорта
      strength: domain
    - id: Keyword_ru_passport_number_domestic_domain_context
      groups:
        - match_style: word
          terms:
            - russian passport number (domestic)
            - russian
            - passport
            - domestic
      strength: domain
risk_rating: 8
risk_description: >-
  Passport numbers are high-value identity documents used for international travel and identity verification. Compromise enables identity fraud, unauthorized border crossings, and creation of
  fraudulent documents.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-russia-passport-number-domestic
    title: Russia passport number (domestic) entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-04'
changelog:
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
  - version: 1.1.0
    date: '2026-07-04'
    description: Mapped non-canonical confidence 90 to 85.; Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.
author: testpattern-community
source: microsoft
license: MIT
remediation:
  catalog_quality_2026_06_02:
    status: applied
    changes:
      - 'Mapped non-canonical confidence 90 to 85.'
      - 'Downgraded weak medium-confidence tier to low because evidence was generic, structural, or absent.'
      - 'Collapsed 2 duplicate 85-confidence tier(s) into the strictest canonical tier.'
