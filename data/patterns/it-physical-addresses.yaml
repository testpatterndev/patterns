schema: testpattern/v1
name: Italy Physical Addresses
slug: it-physical-addresses
version: 1.2.1
type: keyword_list
pattern_class: concept
description: >-
  Detects Italy Physical Addresses patterns. This pattern is based on a Microsoft Purview built-in
  sensitive information type that uses machine learning and function-based detection for physical
  address identification. This keyword list provides address-related terms for supplementary matching.
operation: >-
  Function-based detection in Microsoft Purview. This pattern uses keyword matching for
  country-specific address terminology to identify physical address data.
keywords:
  - via
  - viale
  - piazza
  - corso
  - largo
  - vicolo
  - strada
  - piazzale
  - lungomare
  - CAP
  - Roma
  - Milano
  - Napoli
confidence: low
confidence_justification: >-
  Low confidence: broad keyword matching on address terms requires additional context and
  corroborative evidence for accurate physical address detection. Address keywords alone
  produce high false positive rates without structural validation.
jurisdictions:
  - it
  - eu
regulations:
  - GDPR
data_categories:
  - pii
  - contact-information
test_cases:
  should_match:
    - value: "123 via name, unit 4"
      description: Contains address keyword 'via'
    - value: "located at 45 viale example"
      description: Contains address keyword 'viale'
    - value: "deliver to 78 piazza test"
      description: Contains address keyword 'piazza'
  should_not_match:
    - value: "quarterly financial report for fiscal year 2024"
      description: Business text with no address keywords
    - value: "the meeting is scheduled for next Tuesday morning"
      description: Scheduling text with no address terminology
false_positives:
  - description: References to street names in non-address contexts such as business names or landmarks
    mitigation: >-
      Require structural address patterns (number + street type + name) rather than isolated keyword matches.
  - description: Navigation or mapping references that mention road types without containing actual addresses
    mitigation: >-
      Use proximity-based corroborative evidence to ensure keywords appear alongside numeric components.
exports:
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_it_address_primary
      matches:
        - ref: Keyword_it_address_context
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_it_address_primary
  keywords:
    - id: Keyword_it_address_primary
      groups:
        - match_style: word
          terms:
            - via
            - viale
            - piazza
            - corso
            - largo
            - vicolo
            - strada
            - piazzale
            - lungomare
      strength: domain
    - id: Keyword_it_address_context
      groups:
        - match_style: word
          terms:
            - text: CAP
              case_sensitive: true
            - Roma
            - Milano
            - Napoli
            - indirizzo
            - domicilio
            - residenza
            - civico
            - comune
            - provincia
      strength: domain
risk_rating: 3
risk_description: >-
  This keyword classifier looks for Italian address terms such as via, viale, and piazza around numbers or delivery language. The same words are ubiquitous in public squares, hotel and restaurant listings, cultural references, directions, and business stationery, creating substantial low-confidence noise. Even a complete Italian address has little standalone confidentiality value unless linked to a person's residence, protected status, or sensitive visit. Risk 3 and OFFICIAL fit; SENSITIVE would require an attributed private dwelling, a threatened individual, a confidential care location, or a large residential register.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-italy-physical-addresses
    title: "Italy Physical Addresses entity definition - Microsoft Learn"
created: '2026-02-09'
updated: '2026-07-14'
changelog:
  - version: 1.2.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1313 without changing detector or package metadata.'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.1.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove the dead template-exclusion declaration (Keyword_noise_exclusion) instead of wiring it — dictionary terms appear in the pattern''s own should_match values or positive vocabulary, so a NOT-gate would suppress genuine matches (no behavior change: no tier referenced it)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
