schema: testpattern/v1
name: NHS Number
slug: uk-nhs-number
version: 1.3.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects NHS Number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Validation: Mod 11 with weights [10,9,8,7,6,5,4,3,2]. Reference:
  https://www.datadictionary.nhs.uk/attributes/nhs_number.html Corroborative evidence: 3 keywords within 300 characters.
  Keyword lists: healthcare-identifiers.
pattern: \b\d{3}\s?\d{3}\s?\d{4}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - uk
regulations:
  - UK GDPR
  - Data Protection Act 2018 (UK)
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - healthcare-identifiers
test_cases:
  should_match:
    - value: 900 000 0009
      description: Spaced NHS number (mod-11 valid)
    - value: '9123456795'
      description: Continuous NHS number (mod-11 valid)
    - value: 943 476 5919
      description: Real-format NHS number (mod-11 valid)
  should_not_match:
    - value: 123 456 789
      description: Only 9 digits instead of 10
    - value: 123 456 78901
      description: 11 digits instead of 10
    - value: 123 456 789A
      description: Contains a letter instead of all digits
false_positives:
  - description: >-
      Common words and phrases related to nhs number appearing in policy documents, training materials, HR templates, or
      compliance guidelines without actual personal data.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than
      general discussion.
  - description: >-
      In British English, similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_uk_nhs
      matches:
        - ref: Keyword_uk_nhs_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_uk_nhs
      matches:
        - ref: Keyword_uk_nhs_broad
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_uk_nhs
  regexes:
    - id: Regex_uk_nhs
      pattern: \b\d{3}\s?\d{3}\s?\d{4}\b
      validators:
        - ref: Func_uk_nhs_number
  keywords:
    - id: Keyword_uk_nhs_specific
      groups:
        - match_style: word
          terms:
            - NHS number
            - NHS no
            - NHS ID
            - national health service
            - health service number
            - patient number
            - text: NHS
              case_sensitive: true
            - health authority number
      strength: specific
    - id: Keyword_uk_nhs_broad
      groups:
        - match_style: word
          terms:
            - patient
            - hospital
            - text: GP
              case_sensitive: true
            - medical record
            - health record
            - clinical
            - prescription
            - surgery
      strength: domain
  filters:
    - id: Filter_uk_nhs_same_digits
      type: AllDigitsSameFilter
risk_rating: 8
risk_description: >-
  Health and medical information is among the most sensitive personal data under privacy laws globally. Unauthorized
  disclosure can result in discrimination, personal harm, and regulatory penalties under health privacy frameworks.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-uk-national-health-service-number
    title: "U.K. national health service number entity definition - Microsoft Learn"
created: '2026-02-08'
updated: '2026-07-09'
changelog:
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary; remove dead shared_keywords import(s) generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
