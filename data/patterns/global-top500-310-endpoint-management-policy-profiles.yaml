schema: testpattern/v1
name: Endpoint management policy profiles
slug: global-top500-310-endpoint-management-policy-profiles
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies endpoint management policy profiles patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:endpoint\s+management|policy\s+profile|device\s+compliance|configuration\s+profile|group\s+policy|endpoint\s+protection|device\s+enrollment|security\s+baseline|deployment\s+policy)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - endpoint management policy profiles
    - endpoint
    - management
    - policy
    - profiles
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: endpoint management
      description: Primary topic phrase match
    - value: policy profile
      description: Case-insensitive topic phrase match
    - value: device compliance
      description: Alternative topic phrase match
    - value: configuration profile
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_endpoint_management
      matches:
        - ref: Pattern_global_top500_310_endpoint_management_policy_profiles_label_context
        - ref: Keyword_global_top500_310_endpoint_management_policy_profiles_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_310_endpoint_management_policy_profiles_noise_exclusion
    - confidence_level: 75
      id_match: Regex_endpoint_management
      matches:
        - ref: Keyword_endpoint_management
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_310_endpoint_management_policy_profiles_noise_exclusion
    - confidence_level: 65
      id_match: Regex_endpoint_management
      matches:
        - ref: Keyword_endpoint_management
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_310_endpoint_management_policy_profiles_noise_exclusion
  regexes:
    - id: Regex_endpoint_management
      pattern: (?is)\b(?:endpoint\s+management|policy\s+profile|device\s+compliance|configuration\s+profile|group\s+policy|endpoint\s+protection|device\s+enrollment|security\s+baseline|deployment\s+policy)\b
    - id: Pattern_global_top500_310_endpoint_management_policy_profiles_label_context
      pattern: (?i)\\b(?:endpoint\\s+management\\s+policy\\s+profiles|endpoint|management|policy|profiles|top500)\\b
  keywords:
    - id: Keyword_endpoint_management
      groups:
        - match_style: word
          terms:
            - endpoint management
            - policy profile
            - MDM
            - Intune
            - device compliance
            - configuration profile
            - group policy
            - endpoint protection
            - device enrollment
            - security baseline
            - SCCM
            - deployment policy
    - id: Keyword_global_top500_310_endpoint_management_policy_profiles_domain_context
      groups:
        - match_style: word
          terms:
            - endpoint management policy profiles
            - endpoint
            - management
            - policy
            - profiles
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_310_endpoint_management_policy_profiles_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
created: '2026-02-08'
updated: '2026-03-06'
