schema: testpattern/v1
name: Off-cycle payroll approvals
slug: au-top500-098-off-cycle-payroll-approvals
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to off-cycle payroll approvals in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: industry-hr.'
pattern: (?is)\b(?:off[\s-]+cycle\s+payroll|off[\s-]+cycle\s+approval|ad\s+hoc\s+payment|manual\s+pay\s+run|emergency\s+payment|supplementary\s+pay|termination\s+payment|final\s+pay|bonus\s+payment|one[\s-]+off\s+payment|payroll\s+approval|special\s+pay\s+run)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - off-cycle payroll approvals
    - 'off'
    - cycle
    - payroll
    - approvals
    - tax
    - operations
  proximity: 300
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: off-cycle payroll
      description: Primary topic phrase match
    - value: off-cycle approval
      description: Case-insensitive topic phrase match
    - value: ad hoc payment
      description: Alternative topic phrase match
    - value: manual pay run
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_off_cycle_payroll_approvals
      matches:
        - ref: Evidence_off_cycle_payroll_approvals
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_off_cycle_payroll_approvals
      matches:
        - ref: Evidence_off_cycle_payroll_approvals
    - confidence_level: 65
      id_match: Pattern_off_cycle_payroll_approvals
      matches:
        - ref: Evidence_off_cycle_payroll_approvals
  regexes:
    - id: Pattern_off_cycle_payroll_approvals
      pattern: (?is)\b(?:off[\s-]+cycle\s+payroll|off[\s-]+cycle\s+approval|ad\s+hoc\s+payment|manual\s+pay\s+run|emergency\s+payment|supplementary\s+pay|termination\s+payment|final\s+pay|bonus\s+payment|one[\s-]+off\s+payment|payroll\s+approval|special\s+pay\s+run)\b
  keywords:
    - id: Evidence_off_cycle_payroll_approvals
      groups:
        - match_style: word
          terms:
            - off-cycle payroll
            - off-cycle approval
            - ad hoc payment
            - manual pay run
            - emergency payment
            - supplementary pay
            - termination payment
            - final pay
            - bonus payment
            - one-off payment
            - payroll approval
            - special pay run
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
