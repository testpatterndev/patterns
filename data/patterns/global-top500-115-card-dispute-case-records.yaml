schema: testpattern/v1
name: Card dispute case records
slug: global-top500-115-card-dispute-case-records
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to card dispute case records in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?i)\b(?:card\s+dispute\s+case\s+records?)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - card dispute case records
    - card
    - dispute
    - case
    - records
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: 'Card dispute case records'
      description: Topic phrase present
    - value: 'card dispute case records'
      description: Topic phrase, lowercase
    - value: 'this record references the card dispute case records held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic narrative without identifier/document anchors
      description: Should not match plain mention
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_card_dispute
      matches:
        - ref: Keyword_card_dispute
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_card_dispute
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_card_dispute
      pattern: (?i)\b(?:card\s+dispute\s+case\s+records?)\b
    - id: Pattern_global_top500_115_card_dispute_case_records_label_context
      pattern: (?i)\b(?:card\s+dispute\s+case\s+records)\b
  keywords:
    - id: Keyword_card_dispute
      groups:
        - match_style: word
          terms:
            - card dispute
            - chargeback
            - dispute case
            - case number
            - dispute resolution
            - transaction dispute
            - fraud claim
            - provisional credit
            - representment
            - reason code
            - dispute filing
            - cardholder dispute
      strength: specific
    - id: Keyword_global_top500_115_card_dispute_case_records_domain_context
      groups:
        - match_style: word
          terms:
            - card dispute case records
            - card
            - dispute
            - case
      strength: domain
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
