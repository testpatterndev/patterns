schema: testpattern/v1
name: Capital allocation strategy documents
slug: global-top500-197-capital-allocation-strategy-documents
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to capital allocation strategy documents in international contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:capital\s+allocation|capital\s+expenditure|capex\s+plan|investment\s+strategy|dividend\s+policy|share\s+buyback|capital\s+structure|debt\s+capacity|return\s+on\s+invested\s+capital|capital\s+budget|treasury\s+strategy)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - capital allocation strategy documents
    - capital
    - allocation
    - strategy
    - documents
    - mergers
    - acquisitions
  proximity: 300
test_cases:
  should_match:
    - value: capital allocation
      description: Primary topic phrase match
    - value: capital expenditure
      description: Case-insensitive topic phrase match
    - value: capex plan
      description: Alternative topic phrase match
    - value: investment strategy
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to capital allocation strategy documents appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_capital_allocation
      matches:
        - ref: Pattern_global_top500_197_capital_allocation_strategy_documents_label_context
        - ref: Keyword_global_top500_197_capital_allocation_strategy_documents_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_capital_allocation
      matches:
        - ref: Keyword_capital_allocation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_capital_allocation
      matches:
        - ref: Keyword_capital_allocation
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_capital_allocation
      pattern: >-
        (?is)\b(?:capital\s+allocation|capital\s+expenditure|capex\s+plan|investment\s+strategy|dividend\s+policy|share\s+buyback|capital\s+structure|debt\s+capacity|return\s+on\s+invested\s+capital|capital\s+budget|treasury\s+strategy)\b
    - id: Pattern_global_top500_197_capital_allocation_strategy_documents_label_context
      pattern: (?i)\\b(?:capital\\s+allocation\\s+strategy\\s+documents|capital|allocation|strategy|documents|top500)\\b
  keywords:
    - id: Keyword_capital_allocation
      groups:
        - match_style: word
          terms:
            - capital allocation
            - capital expenditure
            - capex plan
            - investment strategy
            - dividend policy
            - share buyback
            - capital structure
            - debt capacity
            - return on invested capital
            - capital budget
            - treasury strategy
    - id: Keyword_global_top500_197_capital_allocation_strategy_documents_domain_context
      groups:
        - match_style: word
          terms:
            - capital allocation strategy documents
            - capital
            - allocation
            - strategy
            - documents
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
