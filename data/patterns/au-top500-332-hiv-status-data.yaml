schema: testpattern/v1
name: HIV status data
slug: au-top500-332-hiv-status-data
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies hiv status data references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:hiv\s+status|hiv\s+test|hiv\s+positive|hiv\s+negative|hiv\s+result|viral\s+load|cd4\s+count)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - hiv status data
    - hiv
    - status
    - data
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
test_cases:
  should_match:
    - value: hiv status
      description: Primary topic phrase match
    - value: hiv test
      description: Case-insensitive topic phrase match
    - value: hiv positive
      description: Alternative topic phrase match
    - value: hiv negative
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_hiv_status_data
      matches:
        - ref: Evidence_hiv_status_data
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_hiv_status_data
      matches:
        - ref: Evidence_hiv_status_data
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_hiv_status_data
      matches:
        - ref: Evidence_hiv_status_data
  regexes:
    - id: Pattern_hiv_status_data
      pattern: (?is)\b(?:hiv\s+status|hiv\s+test|hiv\s+positive|hiv\s+negative|hiv\s+result|viral\s+load|cd4\s+count)\b
  keywords:
    - id: Evidence_hiv_status_data
      groups:
        - match_style: word
          terms:
            - hiv status
            - hiv test
            - hiv positive
            - hiv negative
            - hiv result
            - viral load
            - cd4 count
            - antiretroviral
            - health
            - biomedical
            - serology
            - immunodeficiency
risk_description: >-
  The detector recognizes HIV status, tests, positive or negative results, viral load, and CD4 counts within patient and clinical context. A genuine result can reveal a highly stigmatized diagnosis, treatment status, infectious-disease monitoring, and intimate personal circumstances, enabling discrimination, coercion, relationship harm, or avoidance of care. The normal unit is one person's status or result rather than an HIV registry, so the consequences are serious and deeply personal but contained. Risk 8 and SENSITIVE are justified; PROTECTED would require a bulk identifiable register, severe targeted persecution, or compromise causing significant irreversible harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
