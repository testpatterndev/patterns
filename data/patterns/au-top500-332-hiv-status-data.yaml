schema: testpattern/v1
name: HIV status data
slug: au-top500-332-hiv-status-data
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies hiv status data references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:hiv\s+status|hiv\s+test|hiv\s+positive|hiv\s+negative|hiv\s+result|viral\s+load|cd4\s+count)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - hiv status data
    - hiv
    - status
    - data
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
test_cases:
  should_match:
    - value: hiv status
      description: Primary topic phrase match
    - value: hiv test
      description: Case-insensitive topic phrase match
    - value: hiv positive
      description: Alternative topic phrase match
    - value: hiv negative
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_hiv_status_data
      matches:
        - ref: Evidence_hiv_status_data
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_hiv_status_data
      matches:
        - ref: Evidence_hiv_status_data
    - confidence_level: 65
      id_match: Pattern_hiv_status_data
      matches:
        - ref: Evidence_hiv_status_data
  regexes:
    - id: Pattern_hiv_status_data
      pattern: (?is)\b(?:hiv\s+status|hiv\s+test|hiv\s+positive|hiv\s+negative|hiv\s+result|viral\s+load|cd4\s+count)\b
  keywords:
    - id: Evidence_hiv_status_data
      groups:
        - match_style: word
          terms:
            - hiv status
            - hiv test
            - hiv positive
            - hiv negative
            - hiv result
            - viral load
            - cd4 count
            - antiretroviral
            - health
            - biomedical
            - serology
            - immunodeficiency
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.legislation.gov.au/C2004A03712/latest/text
  - https://www.oaic.gov.au/privacy/australian-privacy-principles-guidelines
  - https://www.legislation.gov.au/C2012A00063/latest/text
