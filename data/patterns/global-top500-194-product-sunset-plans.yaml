schema: testpattern/v1
name: Product sunset plans
slug: global-top500-194-product-sunset-plans
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to product sunset plans in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:product\s+sunset|end\s+of\s+life|product\s+discontinuation|deprecation\s+plan|product\s+retirement|sunset\s+timeline|migration\s+plan|customer\s+notification|legacy\s+product|product\s+lifecycle)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - product sunset plans
    - product
    - sunset
    - plans
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: product sunset
      description: Primary topic phrase match
    - value: end of life
      description: Case-insensitive topic phrase match
    - value: product discontinuation
      description: Alternative topic phrase match
    - value: deprecation plan
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to product sunset plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_product_sunset
      matches:
        - ref: Pattern_global_top500_194_product_sunset_plans_label_context
        - ref: Keyword_global_top500_194_product_sunset_plans_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_product_sunset
      matches:
        - ref: Keyword_product_sunset
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_product_sunset
      pattern: >-
        (?is)\b(?:product\s+sunset|end\s+of\s+life|product\s+discontinuation|deprecation\s+plan|product\s+retirement|sunset\s+timeline|migration\s+plan|customer\s+notification|legacy\s+product|product\s+lifecycle)\b
    - id: Pattern_global_top500_194_product_sunset_plans_label_context
      pattern: (?i)\b(?:product\s+sunset\s+plans)\b
  keywords:
    - id: Keyword_product_sunset
      groups:
        - match_style: word
          terms:
            - product sunset
            - end of life
            - product discontinuation
            - deprecation plan
            - product retirement
            - sunset timeline
            - migration plan
            - customer notification
            - legacy product
            - phase-out
            - product lifecycle
      strength: specific
    - id: Keyword_global_top500_194_product_sunset_plans_domain_context
      groups:
        - match_style: word
          terms:
            - product sunset plans
            - product
            - sunset
            - plans
      strength: domain
risk_description: >-
  The detector finds product-sunset, end-of-life, discontinuation, deprecation, migration, notification, and lifecycle terminology rather than requiring an approved retirement plan. Such a match can hint that support may end and could prompt customer or supplier speculation, but useful exploitation needs the named product, decision status, dates, contractual obligations, and migration path. The phrase-level signal is often present in public notices or routine lifecycle discussion, leaving low independent confidentiality harm. Risk 5 and OFFICIAL are proportionate; an unannounced approved sunset plan identifying affected customers, vulnerabilities, or binding transition commitments would be SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
