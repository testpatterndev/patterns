schema: testpattern/v1
name: Prisoner identification number
slug: global-top500-036-prisoner-identification-number
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to prisoner identification number in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:prisoner\s+identification\s+number|prisoner\s+ID|inmate\s+number|inmate\s+identification|prisoner\s+number|correctional\s+ID|custodial\s+number|detention\s+number|offender\s+ID|incarceration\s+number|prison\s+record|booking\s+number)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - prisoner identification number
  proximity: 240
test_cases:
  should_match:
    - value: prisoner identification number
      description: Primary topic phrase match
    - value: prisoner id
      description: Case-insensitive topic phrase match
    - value: inmate number
      description: Alternative topic phrase match
    - value: inmate identification
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to prisoner identification number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  pattern_tiers:
    - confidence_level: 90
      id_match: Regex_prisoner_identification_number
      matches:
        - ref: Pattern_global_top500_036_prisoner_identification_number_label_context
        - ref: Keyword_global_top500_036_prisoner_identification_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_036_prisoner_identification_number_noise_exclusion
    - confidence_level: 85
      id_match: Regex_prisoner_identification_number
      matches:
        - ref: Keyword_prisoner_identification_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_036_prisoner_identification_number_noise_exclusion
    - confidence_level: 75
      id_match: Regex_prisoner_identification_number
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_036_prisoner_identification_number_noise_exclusion
  regexes:
    - id: Regex_prisoner_identification_number
      pattern: (?is)\b(?:prisoner\s+identification\s+number|prisoner\s+ID|inmate\s+number|inmate\s+identification|prisoner\s+number|correctional\s+ID|custodial\s+number|detention\s+number|offender\s+ID|incarceration\s+number|prison\s+record|booking\s+number)\b
    - id: Pattern_global_top500_036_prisoner_identification_number_label_context
      pattern: (?i)\\b(?:prisoner\\s+identification\\s+number|prisoner|top500)\\b
  keywords:
    - id: Keyword_prisoner_identification_number
      groups:
        - match_style: word
          terms:
            - prisoner identification number
            - prisoner ID
            - inmate number
            - inmate identification
            - prisoner number
            - correctional ID
            - custodial number
            - detention number
            - offender ID
            - incarceration number
            - prison record
            - booking number
    - id: Keyword_global_top500_036_prisoner_identification_number_domain_context
      groups:
        - match_style: word
          terms:
            - prisoner identification number
            - prisoner
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_036_prisoner_identification_number_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
