schema: testpattern/v1
name: Product sunset plans
slug: au-top500-194-product-sunset-plans
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to product sunset plans in Australian contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:product\s+sunset|sunset\s+plan|end\s+of\s+life|EOL\s+plan|product\s+discontinuation|product\s+retirement|phase[\s-]+out\s+plan|deprecation\s+plan|migration\s+plan|legacy\s+product|product\s+lifecycle)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - product sunset plans
    - product
    - sunset
    - plans
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: product sunset
      description: Primary topic phrase match
    - value: sunset plan
      description: Case-insensitive topic phrase match
    - value: end of life
      description: Alternative topic phrase match
    - value: EOL plan
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to product sunset plans appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_product_sunset
      matches:
        - ref: Evidence_product_sunset
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_product_sunset
      matches:
        - ref: Evidence_product_sunset
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_product_sunset
      matches:
        - ref: Evidence_product_sunset
  regexes:
    - id: Pattern_product_sunset
      pattern: >-
        (?is)\b(?:product\s+sunset|sunset\s+plan|end\s+of\s+life|EOL\s+plan|product\s+discontinuation|product\s+retirement|phase[\s-]+out\s+plan|deprecation\s+plan|migration\s+plan|legacy\s+product|product\s+lifecycle)\b
  keywords:
    - id: Evidence_product_sunset
      groups:
        - match_style: word
          terms:
            - product sunset
            - sunset plan
            - end of life
            - EOL plan
            - product discontinuation
            - product retirement
            - phase-out plan
            - deprecation plan
            - migration plan
            - legacy product
            - product lifecycle
            - wind-down
            - confidential
risk_description: >-
  The detector recognises product sunset, end-of-life plans, retirement dates, migration, and support-withdrawal language, with the intended unit being a pre-release lifecycle plan rather than a published EOL notice. Early disclosure can reveal product weaknesses, replacement timing, unsupported dependencies, customer migration cohorts, and inventory decisions, allowing competitors to target customers or attackers to focus on systems approaching reduced support. The medium-confidence concept regex may also find public vendor notices and generic lifecycle guidance. Risk 8 and SENSITIVE InfoTech reflect serious contained product and operational harm; PROTECTED would require critical-service dependencies or exploitable system-scale weaknesses capable of significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
