schema: testpattern/v1
name: CPF
slug: br-cpf
version: 1.3.1
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects CPF patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Validation: Mod 11. Reference:
  https://www.gov.br/receitafederal/pt-br/centrais-de-conteudo/publicacoes/documentos-tecnicos/cnpj Corroborative
  evidence: 3 keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b\d{3}\.?\d{3}\.?\d{3}[-.]?\d{2}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - br
regulations:
- LGPD
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - identifier
    - number
    - ID
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: 123.456.789-01
      description: Standard CPF format with dots and dash
    - value: '12345678901'
      description: CPF without punctuation
    - value: 000.000.000-00
      description: Zero-filled CPF format
  should_not_match:
    - value: '123.456.789-0'
      description: Only 1 check digit instead of 2
    - value: '123.456.789-012'
      description: 3 check digits instead of 2
    - value: '123.456.78-01'
      description: Only 2 digits in third group instead of 3
false_positives:
  - description: >-
      Common words and phrases related to cpf appearing in policy documents, training materials, HR templates, or
      compliance guidelines without actual personal data.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than
      general discussion.
  - description: >-
      In Portuguese (Brazil), similar terminology used in formal or administrative contexts (education, professional
      documentation) that does not constitute sensitive data collection.
    mitigation: >-
      Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
      to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_br_cpf
      matches:
        - ref: Keyword_br_cpf
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_br_cpf
  regexes:
    - id: Regex_br_cpf
      pattern: \b\d{3}\.?\d{3}\.?\d{3}[-.]?\d{2}\b
      validators:
        - ref: Func_brazil_cpf
  keywords:
    - id: Keyword_br_cpf
      groups:
        - match_style: word
          terms:
            - text: CPF
              case_sensitive: true
            - cadastro de pessoas físicas
            - cadastro de pessoas fisicas
            - cadastro pessoa física
            - cadastro pessoa fisica
            - número do CPF
            - numero do CPF
            - tax identification
            - taxpayer ID
            - individual registration
            - Receita Federal
            - contribuinte
      strength: specific
  filters:
    - id: Filter_br_cpf_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The detector finds an 11-digit Brazilian CPF in formatted or compact form and applies Mod 11 validation with civic-identity context. A valid CPF persistently links one taxpayer across tax, financial, employment, and service records and can assist impersonation or fraudulent account onboarding when combined with a name, birth date, or document evidence. The atomic number does not authenticate the holder or disclose a complete profile, and policy material or test values can still appear in legitimate content. Risk 5 OFFICIAL recognises meaningful but bounded correlation risk; SENSITIVE would require a populated identity dossier, financial account, or usable authentication evidence.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-brazil-cpf-number
    title: "Brazil CPF number entity definition - Microsoft Learn"
created: '2026-02-08'
updated: '2026-07-14'
