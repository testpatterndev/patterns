schema: testpattern/v1
name: U.S. Medicaid Member / Recipient ID
slug: us-medicaid-member-id
version: 1.0.0
type: regex
engine: universal
description: >-
  Detects labelled U.S. Medicaid member or recipient identification numbers. Medicaid ID formats are not standardised
  nationally — they vary by state in length and composition (typically 8-12 alphanumeric characters) — so this pattern
  anchors on an explicit Medicaid/recipient context label immediately preceding the ID rather than on a fixed structure.
operation: >-
  Matches a "Medicaid"/"recipient" context token plus an "id"/"number" word followed by an 8-12 character alphanumeric
  ID. The context label is part of the primary regex; corroborative keywords within 300 characters further reduce false
  positives.
pattern: \b(?:medicaid|recipient)\s+(?:id|number|no\.?)[\s:#]{0,8}[A-Z0-9]{8,12}\b
confidence: high
confidence_justification: >-
  High confidence: the ID must be immediately preceded by an explicit Medicaid or recipient label, so a bare alphanumeric
  string will not match. The label requirement compensates for the unconstrained, state-varying ID structure.
jurisdictions:
  - us
regulations:
  - HIPAA
  - "State Breach Laws (US)"
  - "CCPA/CPRA"
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - health
corroborative_evidence:
  keywords:
    - medicaid
    - recipient
    - member ID
    - beneficiary
    - health plan
    - managed care
    - eligibility
    - state health
    - CIN
    - coverage
  proximity: 300
test_cases:
  should_match:
    - value: 'Medicaid ID: AB12345678'
      description: Labelled Medicaid ID, alphanumeric body
    - value: Recipient Number 9081726354
      description: Recipient number label with 10-digit body
    - value: 'medicaid no. 12345678ABCD'
      description: Lowercase label with abbreviated "no." and 12-char body
  should_not_match:
    - value: 'Member ID: AB12345678'
      description: '"Member" alone is not a Medicaid/recipient context label'
    - value: 'Medicaid number: 1234567'
      description: Body too short (7 chars, below the 8-char minimum)
    - value: The recipient confirmed receipt of the Medicaid enrollment letter
      description: Prose mentioning Medicaid and recipient but with no ID value
false_positives:
  - description: >-
      Order numbers, claim numbers, or internal reference codes that happen to follow a "recipient number" label in a
      non-healthcare shipping or correspondence context.
    mitigation: >-
      Require corroborative Medicaid/health-plan keywords within the proximity window to confirm a healthcare eligibility
      context rather than logistics or general correspondence.
  - description: Sample or template documents using placeholder Medicaid IDs in onboarding material.
    mitigation: Check for placeholder markers (example, xxxx, 00000000) and require co-occurring patient identifiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  Medicaid identifiers are protected health information linking a person to means-tested public health coverage.
  Exposure enables medical identity theft, fraudulent claims, and discrimination, and triggers HIPAA breach
  notification obligations.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: "SENSITIVE"
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: "CUI Specified"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "CONFIDENTIAL"
  ca_gov: "Protected B"
references:
  - url: https://www.medicaid.gov/medicaid/data-and-systems/macbis/tmsis/tmsis-blog/entry/47572
    title: "Reporting Shared MSIS Identification Numbers (Eligibility) - Medicaid.gov"
  - url: https://www.medicaid.gov/medicaid/data-and-systems/macbis/tmsis/tmsis-blog/99011
    title: "CMS Guidance: Reporting Eligible Identifiers in T-MSIS - Medicaid.gov"
created: '2026-06-13'
updated: '2026-06-13'
