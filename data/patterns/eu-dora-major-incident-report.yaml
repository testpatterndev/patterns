schema: testpattern/v1
name: EU DORA Major ICT-Related Incident Report
slug: eu-dora-major-incident-report
version: 1.2.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects DORA Article 19 major ICT-related incident reports — the initial notification, intermediate report, and final report submitted to the competent authority under Delegated Regulation (EU) 2025/301 and Implementing Regulation (EU) 2025/302 — and voluntary notifications of significant cyber threats. These reports detail live vulnerabilities, affected services, and root causes; premature disclosure aids attackers and can move markets.
operation: 'Keyword proximity: primary topic phrases (major ICT-related incident, significant cyber threat) within 300 characters of Article 19 reporting vocabulary (initial notification, intermediate report, final report, root cause analysis, incident reference code, competent authority, Regulation (EU) 2022/2554). Negative keyword exclusion for press releases, consultancy webinars, and training material. Concept classifier: matches the topic, not identifier-grade evidence.'
pattern: (?i)\b(?:major\s+ICT[\s-]related\s+incidents?|significant\s+cyber\s+threats?)\b
confidence: medium
confidence_justification: 'Medium confidence: honest topic matcher. ''Major ICT-related incident'' and ''significant cyber threat'' are DORA Article 19 terms of art rarely used outside the regulation''s orbit, and the 85 tier additionally requires reporting-stage vocabulary (initial notification, intermediate report, final report, incident reference code, root cause analysis). News coverage and consultancy explainers about DORA incident reporting share this vocabulary and are suppressed only by noise exclusions.'
jurisdictions:
  - eu
regulations:
- "Regulation (EU) 2022/2554 (DORA)"
- "Delegated Regulation (EU) 2025/301"
- "Implementing Regulation (EU) 2025/302"
frameworks:
- ISO 27001
data_categories:
  - financial
  - security
  - governance
corroborative_evidence:
  keywords:
    - major ICT-related incident
    - major ICT-related incidents
    - significant cyber threat
    - significant cyber threats
    - initial notification
    - intermediate report
    - final report
    - root cause analysis
    - incident reference code
    - competent authority
    - Regulation (EU) 2022/2554
    - DORA
    - classified as major
    - financial entity
    - services affected
  proximity: 300
  keyword_lists:
    - corporate-governance
test_cases:
  should_match:
    - value: |-
        MAJOR ICT-RELATED INCIDENT — INITIAL NOTIFICATION
        Submitted under Article 19(4) of Regulation (EU) 2022/2554 to the competent authority.
        Incident reference code: INC-2026-0042. Incident classified as major on 07/07/2026 at 14:20 CET.
        Services affected: retail payment processing and mobile banking authentication.
        Preliminary impact: 96,000 clients unable to authorise SEPA transfers.
      description: Initial notification header with incident reference code and impact
    - value: 'Intermediate report — major ICT-related incident INC-2026-0042, submission 2 of 3. Status: containment achieved 08/07/2026 03:10 CET; recovery of the payment gateway is in progress. Root cause analysis ongoing; preliminary indication points to a failed certificate rotation on the HSM cluster. Next update to the competent authority upon material change of status.'
      description: Intermediate report with status update and provisional root cause
    - value: 'Final report on major ICT-related incident INC-2026-0042, submitted in accordance with Delegated Regulation (EU) 2025/301. Root cause analysis completed: misconfigured failover between primary and secondary data centres. Actual impact figures replace the estimates in the initial notification: direct costs EUR 1.9m, 4h07m downtime of a critical or important function.'
      description: Final report with completed root cause analysis and actual impact figures
    - value: 'Voluntary notification of a significant cyber threat under Article 19(2) of Regulation (EU) 2022/2554: credential-stuffing infrastructure observed targeting our retail client portal. The financial entity deems the threat of relevance to the financial system; indicators shared with the competent authority.'
      description: Voluntary significant cyber threat notification
  should_not_match:
    - value: In a press release issued this morning, the bank confirmed it had reported a major ICT-related incident to its regulator last month and that services have been fully restored.
      description: Public press release about a past reported incident
    - value: 'Consultancy webinar: reporting a major ICT-related incident under DORA, demystified — 4 hours from classification to initial notification, 72 hours for the intermediate report, one month for the final report. Sign up for our newsletter for the slide pack.'
      description: Consultancy webinar marketing about reporting timelines (filter-dependent negative)
    - value: This tabletop tutorial walks the crisis team through a mock major ICT-related incident, using sample notification forms with placeholder impact figures.
      description: Training exercise with mock incident and sample forms
false_positives:
  - description: News coverage, press releases, and regulator statements about reported incidents
    mitigation: 'Negative keyword exclusion: ''press release'', ''media statement'', ''webinar'', ''newsletter'', ''blog post''. Public post-incident statements reuse the regulation''s vocabulary; residual matches are expected for a topic classifier.'
  - description: Compliance training, tabletop exercises, and consultancy explainers on DORA incident reporting
    mitigation: Shared template-exclusion dictionary (tutorial, mock, sample, training exercise) as NOT evidence on every tier
  - description: Collision with NIS2 and national incident-notification document classes that use similar report-stage vocabulary
    mitigation: Primary phrases are DORA-specific (major ICT-related incident, significant cyber threat); NIS2 documents anchor on 'significant incident' and CSIRT vocabulary instead
  - description: Internal incident-management tickets that reference DORA classification without being the regulatory report
    mitigation: 85 tier requires report-stage vocabulary (initial notification, final report, incident reference code) in proximity; tickets typically match only at discovery tier
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_eu_dora_major_incident_report_topic_terms
      matches:
        - ref: Evidence_eu_dora_major_incident_report_primary
        - ref: Evidence_eu_dora_major_incident_report_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_dora_major_incident_report_exclusion
    - confidence_level: 75
      id_match: Pattern_eu_dora_major_incident_report_topic_terms
      matches:
        - ref: Evidence_eu_dora_major_incident_report_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_dora_major_incident_report_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_eu_dora_major_incident_report_topic_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_eu_dora_major_incident_report_exclusion
  regexes:
    - id: Pattern_eu_dora_major_incident_report_topic_terms
      pattern: (?i)\b(?:major\s+ICT[\s-]related\s+incidents?|significant\s+cyber\s+threats?)\b
  keywords:
    - id: Evidence_eu_dora_major_incident_report_primary
      groups:
        - match_style: word
          terms:
            - major ICT-related incident
            - major ICT-related incidents
            - significant cyber threat
            - significant cyber threats
      strength: specific
    - id: Evidence_eu_dora_major_incident_report_corroborative
      groups:
        - match_style: word
          terms:
            - initial notification
            - intermediate report
            - final report
            - root cause analysis
            - incident reference code
            - competent authority
            - Regulation (EU) 2022/2554
            - text: DORA
              case_sensitive: true
            - classified as major
            - financial entity
            - services affected
      strength: domain
    - id: Filter_eu_dora_major_incident_report_exclusion
      groups:
        - match_style: word
          terms:
            - press release
            - media statement
            - consultation paper
            - explainer
            - webinar
            - newsletter
            - blog post
            - academic
            - training course
      strength: noise
risk_rating: 8
risk_description: Article 19 incident reports document live vulnerabilities, affected critical or important functions, client impact counts, and root causes while an incident may still be exploitable. Leakage before remediation gives attackers a roadmap, exposes the entity to market abuse and reputational harm, and can compromise the supervisory process.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Financial"
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
