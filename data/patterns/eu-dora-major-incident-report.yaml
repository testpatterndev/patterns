    title: "DORA Article 19 — reporting of major ICT-related incidents and voluntary notification of significant cyber threats"
  - url: https://www.springlex.eu/en/packages/dora/its-ir-regulation/article-1/
    title: "Implementing Regulation (EU) 2025/302 Article 1 — single Annex I template for initial notification, intermediate report and final report"
  - url: https://www.centralbank.ie/regulation/digital-operational-resilience-act-dora/reporting-major-ict-related-incidents-and-significant-cyber-threats
    title: "Central Bank of Ireland — reporting major ICT-related incidents under Delegated Regulation (EU) 2025/301 (4h/24h, 72h, 1 month stages)"
