schema: testpattern/v1
name: SIEM event data
slug: au-top500-281-siem-event-data
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies siem event data patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:siem\s+event\s+data|security\s+event|log\s+correlation|alert\s+rule|event\s+log|security\s+operations)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - general-data-protection
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - siem event data
    - siem
    - event
    - data
    - security
    - operations
    - threat
  proximity: 300
test_cases:
  should_match:
    - value: siem event data
      description: Primary topic phrase match
    - value: security event
      description: Case-insensitive topic phrase match
    - value: log correlation
      description: Alternative topic phrase match
    - value: alert rule
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: siem elastic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_siem_event_data
      matches:
        - ref: Evidence_siem_event_data
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_siem_event_data
      matches:
        - ref: Evidence_siem_event_data
    - confidence_level: 65
      id_match: Pattern_siem_event_data
      matches:
        - ref: Evidence_siem_event_data
  regexes:
    - id: Pattern_siem_event_data
      pattern: (?is)\b(?:siem\s+event\s+data|security\s+event|log\s+correlation|alert\s+rule|event\s+log|security\s+operations)\b
  keywords:
    - id: Evidence_siem_event_data
      groups:
        - match_style: word
          terms:
            - siem event data
            - siem
            - splunk
            - sentinel
            - qradar
            - elastic
            - security event
            - log correlation
            - alert rule
            - event log
            - security operations
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/ism
  - https://www.legislation.gov.au/C2018A00029/latest/text
  - https://www.oaic.gov.au/privacy/privacy-guidance-for-organisations-and-government-agencies/preventing-preparing-for-and-responding-to-data-breaches/data-breach-preparation-and-response
  - https://handbook.apra.gov.au/standard/cps-234
