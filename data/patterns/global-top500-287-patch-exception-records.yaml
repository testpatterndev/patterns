schema: testpattern/v1
name: Patch exception records
slug: global-top500-287-patch-exception-records
version: 1.2.3
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies patch exception records patterns in security and access control contexts. Detects potential exposure
  of sensitive security information in international systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 8 keywords within 300 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:patch\s+exception|risk\s+acceptance|compensating\s+control|exception\s+request|patch\s+deferral|vulnerability\s+exception|risk\s+register|exception\s+expiry|asset\s+owner|remediation\s+plan|change\s+advisory)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - patch exception records
  - patch
  - exception
  - records
  - security
  - operations
  - threat
  - data
  proximity: 300
test_cases:
  should_match:
  - value: patch exception
    description: Primary topic phrase match
  - value: risk acceptance
    description: Case-insensitive topic phrase match
  - value: compensating control
    description: Alternative topic phrase match
  - value: exception request
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: patch exception cve
    description: Generic word pair from old broad template should not match
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_patch_exception_records
    matches:
    - ref: Pattern_global_top500_287_patch_exception_records_label_context
    - ref: Keyword_global_top500_287_patch_exception_records_domain_context
    - ref: Keyword_patch_exception_records
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_patch_exception_records
    matches:
    - ref: Pattern_global_top500_287_patch_exception_records_label_context
    - ref: Keyword_global_top500_287_patch_exception_records_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_patch_exception_records
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_patch_exception_records
    pattern: (?is)\b(?:patch\s+exception|risk\s+acceptance|compensating\s+control|exception\s+request|patch\s+deferral|vulnerability\s+exception|risk\s+register|exception\s+expiry|asset\s+owner|remediation\s+plan|change\s+advisory)\b
  - id: Pattern_global_top500_287_patch_exception_records_label_context
    pattern: (?i)\b(?:patch\s+exception\s+records)\b
  keywords:
  - id: Keyword_patch_exception_records
    groups:
    - match_style: word
      terms:
      - patch exception
      - risk acceptance
      - waiver
      - compensating control
      - exception request
      - patch deferral
      - vulnerability exception
      - risk register
      - exception expiry
      - asset owner
      - remediation plan
      - change advisory
    strength: specific
  - id: Keyword_global_top500_287_patch_exception_records_domain_context
    groups:
    - match_style: word
      terms:
      - patch exception records
      - patch
      - exception
    strength: domain
risk_description: The detector identifies patch exceptions, risk acceptances, compensating controls, deferrals, expiry, owners,
  and remediation-plan terminology, indicating a governance record about known unpatched exposure. A genuine exception can
  tell an adversary which assets remain vulnerable, why patching was delayed, what controls substitute for remediation, and
  when the exception expires. The affected scope is the named systems and accountable teams, while policy templates and generic
  risk-register discussions can match without exposing a live weakness. Risk 8 SENSITIVE reflects serious contained targeting
  value; PROTECTED would require a broad critical-service exception set or significant demonstrated damage.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
