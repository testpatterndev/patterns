schema: testpattern/v1
name: Victim impact statements
slug: au-top500-418-victim-impact-statements
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to victim impact statements in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:victim\s+impact\s+statements|victim\s+impact|victim\s+statement|victim\s+support|victim\s+compensation|sentencing\s+submission|crime\s+victim|victim\s+services|impact\s+assessment|victim\s+advocate|restorative\s+justice|victims\s+of\s+crime)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - privacy-act-1988
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - victim impact statements
    - victim
    - impact
    - statements
    - law
    - enforcement
    - justice
  proximity: 300
  keyword_lists:
    - government-services
test_cases:
  should_match:
    - value: victim impact statements
      description: Primary topic phrase match
    - value: victim impact
      description: Case-insensitive topic phrase match
    - value: victim statement
      description: Alternative topic phrase match
    - value: victim support
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to victim impact statements appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 90
      id_match: Pattern_victim_impact_statements
      matches:
        - ref: Pattern_au_top500_418_victim_impact_statements_label_context
        - ref: Keyword_au_top500_418_victim_impact_statements_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_418_victim_impact_statements_noise_exclusion
    - confidence_level: 85
      id_match: Pattern_victim_impact_statements
      matches:
        - ref: Evidence_victim_impact_statements
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_418_victim_impact_statements_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_victim_impact_statements
      matches:
        - ref: Evidence_victim_impact_statements
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_418_victim_impact_statements_noise_exclusion
    - confidence_level: 65
      id_match: Pattern_victim_impact_statements
      matches:
        - ref: Evidence_victim_impact_statements
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_au_top500_418_victim_impact_statements_noise_exclusion
  regexes:
    - id: Pattern_victim_impact_statements
      pattern: (?is)\b(?:victim\s+impact\s+statements|victim\s+impact|victim\s+statement|victim\s+support|victim\s+compensation|sentencing\s+submission|crime\s+victim|victim\s+services|impact\s+assessment|victim\s+advocate|restorative\s+justice|victims\s+of\s+crime)\b
    - id: Pattern_au_top500_418_victim_impact_statements_label_context
      pattern: (?i)\\b(?:victim\\s+impact\\s+statements|victim|impact|statements|top500)\\b
  keywords:
    - id: Evidence_victim_impact_statements
      groups:
        - match_style: word
          terms:
            - victim impact statements
            - victim impact
            - victim statement
            - victim support
            - victim compensation
            - sentencing submission
            - crime victim
            - victim services
            - impact assessment
            - victim advocate
            - restorative justice
            - victims of crime
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
    - id: Keyword_au_top500_418_victim_impact_statements_domain_context
      groups:
        - match_style: word
          terms:
            - victim impact statements
            - victim
            - impact
            - statements
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_au_top500_418_victim_impact_statements_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
