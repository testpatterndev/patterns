schema: testpattern/v1
name: Criminal history records
slug: global-top500-401-criminal-history-records
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to criminal history records in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: industry-hr. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:criminal\s+history|criminal\s+record|prior\s+convictions|criminal\s+background|rap\s+sheet|offense\s+history|felony\s+record|misdemeanor\s+record|sentencing\s+history|criminal\s+check|background\s+check|criminal\s+database)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - criminal history records
  proximity: 240
  keyword_lists:
    - industry-hr
test_cases:
  should_match:
    - value: criminal history
      description: Primary topic phrase match
    - value: criminal record
      description: Case-insensitive topic phrase match
    - value: prior convictions
      description: Alternative topic phrase match
    - value: criminal background
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: mugshot victim
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to criminal history records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_criminal_history
      matches:
        - ref: Pattern_global_top500_401_criminal_history_records_label_context
        - ref: Keyword_global_top500_401_criminal_history_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_criminal_history
      matches:
        - ref: Keyword_criminal_history
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_criminal_history
      matches:
        - ref: Keyword_criminal_history
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_criminal_history
      pattern: >-
        (?is)\b(?:criminal\s+history|criminal\s+record|prior\s+convictions|criminal\s+background|rap\s+sheet|offense\s+history|felony\s+record|misdemeanor\s+record|sentencing\s+history|criminal\s+check|background\s+check|criminal\s+database)\b
    - id: Pattern_global_top500_401_criminal_history_records_label_context
      pattern: (?i)\\b(?:criminal\\s+history\\s+records|criminal|history|top500)\\b
  keywords:
    - id: Keyword_criminal_history
      groups:
        - match_style: word
          terms:
            - criminal history
            - criminal record
            - prior convictions
            - criminal background
            - rap sheet
            - offense history
            - felony record
            - misdemeanor record
            - sentencing history
            - criminal check
            - background check
            - criminal database
    - id: Keyword_global_top500_401_criminal_history_records_domain_context
      groups:
        - match_style: word
          terms:
            - criminal history records
            - criminal
            - history
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
