schema: testpattern/v1
name: HL7 Health Message
slug: global-hl7-message
version: 1.4.2
type: regex
pattern_class: identifier
engine: universal
description: Detects HL7 Health Message patterns. Detects HL7v2 message headers and ADT event types
operation: >-
  Corroborative evidence: 19 keywords within 300 characters. Keyword lists: healthcare-identifiers, healthcare-codes. Uses additional domain-context evidence and explicit exclusion logic for
  template/sample/test text.
pattern: \bMSH\|
confidence: low
confidence_justification: >-
  Low confidence: generic pattern format that may match unrelated data. Corroborative evidence keywords are essential for reliable detection. Added context gating and exclusion rules improve precision
  and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - HIPAA
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - phi
  - healthcare
corroborative_evidence:
  keywords:
    - MRN
    - medical record number
    - patient ID
    - NPI
    - DEA
    - medicare
    - medicaid
    - insurance ID
    - member ID
    - beneficiary
    - ICD-10
    - ICD-9
    - CPT
    - NDC
    - SNOMED
    - HCPCS
    - diagnosis code
    - procedure code
    - drug code
  proximity: 300
  keyword_lists:
    - healthcare-identifiers
    - healthcare-codes
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: MSH|^~\&|SendingApp
      description: Exact 65 discovery probe with an isolated HL7 message header
    - value: MSH|^~\&|HIS|Hospital|LAB|Lab
      description: HL7 header with sending and receiving applications
    - value: MSH|^~\&|ADT|MCM
      description: HL7 ADT message header
    - value: "MSH|^~\\&|HIS|Hospital\rPID|1||12345"
      description: Exact 75 probe with a header and one clinical message segment
    - value: "MSH|^~\\&|HIS|Hospital\rPID|1||12345\rOBX|1|TX|RESULT||Patient laboratory result"
      description: Exact 85 probe with HL7 segment structure and clinical content
  should_not_match:
    - value: MSA|AA|12345
      description: MSA segment header instead of MSH
    - value: PID|1||12345
      description: PID segment instead of MSH
    - value: MSG|^~\&|App
      description: MSG segment delimiter line, not the MSH header HL7 requires
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_rating: 8
risk_description: >-
  The regex recognizes an HL7 version 2 message header beginning with the MSH segment and relies on nearby healthcare identifiers or codes to corroborate the low-confidence structure. A genuine message commonly carries patient identity, encounter, diagnosis, order, result, or routing data in later segments, so disclosure can expose linked clinical workflow even though the matched header itself is structural. Template exclusions and domain context reduce false positives, but one detected message does not imply a bulk feed or safety-critical interface compromise. Risk 8 and SENSITIVE remain proportionate; PROTECTED would require large message volumes, complete longitudinal records, or operational access that could materially disrupt care.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_hl7_header
      matches:
        - ref: Regex_hl7_segment_context
          min_count: 2
          unique_results: true
        - ref: Keyword_hl7_clinical_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_hl7_header
      matches:
        - ref: Regex_hl7_segment_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_hl7_header
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_hl7_header
      pattern: \bMSH\|
    - id: Regex_hl7_adt
      pattern: \bADT\^A0[1-4]\b
    - id: Pattern_global_hl7_message_label_context
      pattern: (?i)\b(?:hl7\s+health\s+message|hl7|health|message)\b
    - id: Regex_hl7_segment_context
      pattern: (?:\r\n|\n|\r)(?:PID|PV1|ORC|OBR|OBX)\|
  keywords:
    - id: Keyword_hl7
      groups:
        - match_style: word
          terms:
            - text: HL7
              case_sensitive: true
            - health level 7
            - FHIR
            - text: ADT
              case_sensitive: true
            - admission
            - discharge
            - transfer
            - patient
            - clinical message
            - health message
      strength: domain
    - id: Keyword_global_hl7_message_domain_context
      groups:
        - match_style: word
          terms:
            - hl7 health message
            - hl7
            - health
            - message
      strength: domain
    - id: Keyword_hl7_clinical_context
      groups:
        - match_style: word
          terms:
            - patient
            - laboratory result
            - admission diagnosis
            - discharge
            - medication order
            - clinical observation
      strength: specific
created: '2026-02-08'
updated: '2026-07-19'
changelog:
