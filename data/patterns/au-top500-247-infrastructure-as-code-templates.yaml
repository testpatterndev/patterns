schema: testpattern/v1
name: Infrastructure-as-code templates
slug: au-top500-247-infrastructure-as-code-templates
version: 1.4.2
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies infrastructure-as-code templates patterns in security and access control contexts. Detects potential
  exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:infrastructure\s+as\s+code|IaC\s+template|ARM\s+template|bicep\s+template|ansible\s+playbook|infrastructure\s+template|provisioning\s+template|cloud\s+infrastructure)\b
confidence: low
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
- au
regulations:
- NDB Scheme (Cth)
- SOCI Act 2018 (Cth)
- TIA Act 1979 (Cth)
frameworks:
- CIS Controls
- DISP
- ISO 27001
- NIST CSF
- PCI-DSS
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - infrastructure-as-code templates
  - infrastructure
  - code
  - templates
  - software
  - engineering
  - architecture
  proximity: 300
test_cases:
  should_match:
  - value: infrastructure as code
    description: Primary topic phrase match
  - value: iac template
    description: Case-insensitive topic phrase match
  - value: ARM template
    description: Alternative topic phrase match
  - value: bicep template
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: source code config
    description: Generic word pair from old broad template should not match
false_positives:
- description: Authentication-related terminology in software documentation, security training materials, or system architecture
    descriptions without actual credentials.
  mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general
    security terminology.
- description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer
    documentation.
  mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce
    false positives from technical writing.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Evidence_template_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Pattern_iac_templates
    matches:
    - ref: Evidence_iac_templates
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
    min_count: 2
  - confidence_level: 75
    id_match: Pattern_iac_templates
    matches:
    - ref: Evidence_iac_templates
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Pattern_iac_templates
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Evidence_template_exclusion
  regexes:
  - id: Pattern_iac_templates
    pattern: (?is)\b(?:infrastructure\s+as\s+code|IaC\s+template|ARM\s+template|bicep\s+template|ansible\s+playbook|infrastructure\s+template|provisioning\s+template|cloud\s+infrastructure)\b
  keywords:
  - id: Evidence_iac_templates
    groups:
    - match_style: word
      terms:
      - infrastructure as code
      - IaC template
      - terraform
      - cloudformation
      - ARM template
      - bicep template
      - ansible playbook
      - infrastructure template
      - provisioning template
      - cloud infrastructure
    strength: noise
risk_description: The detector finds infrastructure-as-code, IaC, ARM, or Bicep template language, marking a provisioning
  artifact or discussion rather than a deployed environment. A disclosed template can expose cloud topology, resource names,
  network design, identity bindings, and insecure defaults that help an attacker reproduce or target the environment. The
  infrastructure owner and dependent services may face serious reconnaissance and intellectual-property harm, but separate
  access or an exploitable control is normally needed to affect live resources. Risk 8 and SENSITIVE are defensible for a
  substantive internal template, while embedded credentials or a critical whole-of-environment blueprint would raise the context
  toward PROTECTED.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
