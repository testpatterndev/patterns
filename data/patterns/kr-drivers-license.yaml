schema: testpattern/v1
name: South Korea Driver's License Number
slug: kr-drivers-license
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects South Korea driver's license number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may prefer to enable the
  built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Matches the Korean driver's license format: 2 digits, dash, 2 digits, dash, 6 digits, dash, 2 digits. Corroborative evidence: 5 keywords within 300 characters. Keyword lists: pii-civic-credentials.
  Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{2}-\d{2}-\d{6}-\d{2}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - kr
regulations:
  - PIPA
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - driver
    - licence
    - license
    - driving
    - DL
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: 12-34-567890-12
      description: Standard South Korean driver's license format
    - value: 98-76-543210-98
      description: Another valid formatted Korean license number
    - value: 01-02-034567-08
      description: Valid format with leading zeros
  should_not_match:
    - value: 12-34-56789-12
      description: Too few digits in third group (5 instead of 6)
    - value: 123-34-567890-12
      description: Too many digits in first group (3 instead of 2)
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic numeric sequences matching the driver's license format appearing in unrelated contexts.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm driver's license context.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_kr_drivers_license
      matches:
        - ref: Pattern_kr_drivers_license_label_context
        - ref: Keyword_kr_drivers_license_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_kr_drivers_license
      matches:
        - ref: Keyword_kr_drivers_license
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_kr_drivers_license
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_kr_drivers_license
      pattern: \b\d{2}-\d{2}-\d{6}-\d{2}\b
    - id: Pattern_kr_drivers_license_label_context
      pattern: (?i)\b(?:south\s+korea\s+driver's\s+license\s+number|south|korea|driver|license|drivers)\b
  keywords:
    - id: Keyword_kr_drivers_license
      groups:
        - match_style: word
          terms:
            - 운전면허증
            - 운전면허
            - 면허번호
            - driver's license
            - driving license
            - driver license
            - 운전면허번호
            - text: DL
              case_sensitive: true
            - 면허증
            - 도로교통공단
            - driving permit
      strength: specific
    - id: Keyword_kr_drivers_license_domain_context
      groups:
        - match_style: word
          terms:
            - south korea driver's license number
            - south
            - korea
            - driver
            - license
            - drivers
      strength: domain
risk_rating: 5
risk_description: >-
  The South Korean licence detector recognises a distinctive four-part numeric form of two digits, two digits, six digits, and two digits separated by hyphens. A real number can link a driver to licensing region, entitlement, insurance, or enforcement information and support targeted impersonation with a name and birth details. The structure reduces random collisions but does not establish the holder, class, status, address, or validity, and formatted administrative references can still match. Risk 5 OFFICIAL reflects bounded licensing correlation harm; SENSITIVE would require a confirmed licence record or linked driver history.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-south-korea-drivers-license-number
    title: South Korea driver's license number entity definition - Microsoft Learn
