schema: testpattern/v1
name: Support ticket transcripts
slug: global-top500-316-support-ticket-transcripts
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies support ticket transcripts patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Keyword
  lists: industry-education. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:support\s+ticket|ticket\s+transcript|case\s+number|service\s+desk|customer\s+interaction|resolution\s+notes|ticket\s+history|agent\s+response|customer\s+complaint|trouble\s+ticket)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - support ticket transcripts
    - support
    - ticket
    - transcripts
    - operations
    - resilience
  proximity: 300
  keyword_lists:
    - industry-education
test_cases:
  should_match:
    - value: support ticket
      description: Primary topic phrase match
    - value: ticket transcript
      description: Case-insensitive topic phrase match
    - value: case number
      description: Alternative topic phrase match
    - value: service desk
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_support_ticket
      matches:
        - ref: Pattern_global_top500_316_support_ticket_transcripts_label_context
        - ref: Keyword_global_top500_316_support_ticket_transcripts_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_support_ticket
      matches:
        - ref: Keyword_support_ticket
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_support_ticket
      matches:
        - ref: Keyword_support_ticket
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_support_ticket
      pattern: (?is)\b(?:support\s+ticket|ticket\s+transcript|case\s+number|service\s+desk|customer\s+interaction|resolution\s+notes|ticket\s+history|agent\s+response|customer\s+complaint|trouble\s+ticket)\b
    - id: Pattern_global_top500_316_support_ticket_transcripts_label_context
      pattern: (?i)\\b(?:support\\s+ticket\\s+transcripts|support|ticket|transcripts|top500)\\b
  keywords:
    - id: Keyword_support_ticket
      groups:
        - match_style: word
          terms:
            - support ticket
            - ticket transcript
            - case number
            - helpdesk
            - service desk
            - customer interaction
            - escalation
            - resolution notes
            - ticket history
            - agent response
            - customer complaint
            - trouble ticket
    - id: Keyword_global_top500_316_support_ticket_transcripts_domain_context
      groups:
        - match_style: word
          terms:
            - support ticket transcripts
            - support
            - ticket
            - transcripts
            - top500
            - field
            - identifier
            - reference
created: '2026-02-08'
updated: '2026-03-06'
