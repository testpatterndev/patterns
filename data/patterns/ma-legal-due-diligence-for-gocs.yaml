schema: testpattern/v1
name: M&A Legal Due Diligence for GOCs
slug: ma-legal-due-diligence-for-gocs
version: 1.4.2
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects legal opinions and due diligence reports for mergers, acquisitions, or privatisations involving Government Owned Corporations (GOCs) or government assets. Disclosure is market-sensitive and commercially prejudicial, potentially breaching continuous disclosure obligations.
operation: 'Primary detection: keyword proximity matching transaction terms (''due diligence'', ''legal opinion'', ''transaction advice'') within 200 characters of M&A terms (''merger'', ''acquisition'', ''privatisation'', ''divestment'', ''GOC'', ''Government Owned Corporation'', ''asset sale'', ''privilege'', ''PROTECTED''). Document marker detection with classification + transaction context. Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:due\s+diligence|legal\s+opinion|transaction\s+advice)\b
confidence: medium
confidence_justification: 'Medium confidence: Legal due diligence + GOC/government asset context + privilege markers precisely targets privileged transaction documents. The requirement for M&A transaction context eliminates routine legal opinions.'
jurisdictions:
  - au
regulations:
- "Evidence Act 1977 (Qld)"
- "GOC Act 1993 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - merger
    - acquisition
    - privatisation
    - divestment
    - GOC
    - Government Owned Corporation
    - asset sale
    - privilege
    - PROTECTED
    - market-sensitive
    - confidential
    - transaction
    - valuation
    - title defect
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        PROTECTED — MARKET SENSITIVE
        Legal Due Diligence Report

        Project Phoenix: Proposed Privatisation of Queensland Rail Freight
        Prepared by: External Advisers (King & Wood Mallesons)
        Classification: Privileged and Confidential

        This due diligence identifies material legal risks including title defects on three corridor leases.
      description: Legal due diligence for GOC privatisation with material risks
    - value: This privileged legal opinion addresses the regulatory approvals required for the proposed acquisition of CS Energy assets by the private consortium. The transaction advice identifies ACCC merger clearance as the key risk. PROTECTED — GOC transaction.
      description: Legal opinion on GOC acquisition regulatory risk
    - value: |-
        CONFIDENTIAL — LEGAL PROFESSIONAL PRIVILEGE
        Due Diligence — Legal Workstream
        Project: Divestment of Stanwell Corporation Generation Assets
        Government Owned Corporation: Stanwell Corporation Limited

        Material findings: 14 environmental liability exposures totalling $230M-$450M
      description: Legal due diligence for GOC divestment with liability findings
  should_not_match:
    - value: The privatisation of Queensland Rail was announced by the Treasurer at a media conference. The Government Owned Corporations Act 1993 sets out the framework for GOC transactions.
      description: Public announcement of GOC transaction
    - value: This textbook chapter covers legal due diligence methodology for mergers and acquisitions. Students should understand the key workstreams in a typical due diligence exercise.
      description: Academic textbook on M&A due diligence
    - value: The annual report of Energex (a GOC) was tabled in Parliament. The published financial statements include notes on material legal risks disclosed in accordance with accounting standards.
      description: Published GOC annual report
false_positives:
  - description: Public announcements of government transactions and privatisations
    mitigation: Negative match on 'announced', 'media conference', 'public disclosure'. Require privilege/PROTECTED markers
  - description: Academic materials on M&A due diligence
    mitigation: Require co-occurrence with GOC names or government entity context
  - description: Published GOC annual reports disclosing material legal risks
    mitigation: Negative match on 'annual report', 'tabled in Parliament', 'published financial statements'
  - description: Private sector M&A materials without government connection
    mitigation: Require GOC or government asset sale context
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_ma_legal_due_diligence_for_gocs_legal_transaction_terminology
      matches:
        - ref: Evidence_ma_legal_due_diligence_for_gocs_primary
        - ref: Evidence_ma_legal_due_diligence_for_gocs_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_ma_legal_due_diligence_for_gocs_exclusion
        - ref: Pattern_ma_legal_due_diligence_for_gocs_government_owned_corporation_abbreviatio
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_ma_legal_due_diligence_for_gocs_exclusion
    - confidence_level: 75
      id_match: Pattern_ma_legal_due_diligence_for_gocs_legal_transaction_terminology
      matches:
        - ref: Evidence_ma_legal_due_diligence_for_gocs_primary
        - ref: Evidence_ma_legal_due_diligence_for_gocs_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_ma_legal_due_diligence_for_gocs_exclusion
            - Evidence_ma_legal_due_diligence_for_gocs_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_ma_legal_due_diligence_for_gocs_legal_transaction_terminology
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_ma_legal_due_diligence_for_gocs_exclusion
  regexes:
    - id: Pattern_ma_legal_due_diligence_for_gocs_legal_transaction_terminology
      pattern: (?i)\b(?:due\s+diligence|legal\s+opinion|transaction\s+advice)\b
    - id: Pattern_ma_legal_due_diligence_for_gocs_government_owned_corporation_abbreviatio
      pattern: (?i)\bGOC\b
  keywords:
    - id: Evidence_ma_legal_due_diligence_for_gocs_primary
      groups:
        - match_style: word
          terms:
            - due diligence
            - legal opinion
            - transaction advice
            - legal due diligence
      strength: specific
    - id: Evidence_ma_legal_due_diligence_for_gocs_corroborative
      groups:
        - match_style: word
          terms:
            - merger
            - acquisition
            - privatisation
            - divestment
            - text: GOC
              case_sensitive: true
            - Government Owned Corporation
            - asset sale
            - privilege
            - PROTECTED
            - market-sensitive
            - title defect
            - valuation
      strength: domain
    - id: Evidence_ma_legal_due_diligence_for_gocs_exclusion
      groups:
        - match_style: word
          terms:
            - announced
            - media conference
            - annual report
            - tabled in Parliament
            - published
            - textbook
      strength: noise
    - id: Filter_ma_legal_due_diligence_for_gocs_exclusion
      groups:
        - match_style: word
          terms:
            - public announcement
            - ASX disclosure
            - published annual report

      strength: noise
risk_rating: 9
risk_description: >-
  The detector identifies privileged legal opinions and due-diligence reports tied to a merger, acquisition, privatisation, divestment, or asset sale involving a government-owned corporation. A genuine report can expose undisclosed liabilities, valuation-sensitive findings, regulatory obstacles, and the State's negotiating position, allowing a counterparty or market participant to exploit the transaction. The normal record concerns a government-owned corporation transaction and exposes liabilities, valuation issues, deal conditions and state negotiating posture. Leakage can derail a material public-asset transaction. These consequences place a confirmed M&A Legal Due Diligence for GOCs record at risk 9 and PROTECTED Legal without assuming that every low-confidence phrase hit contains the record.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Legal
