schema: testpattern/v1
name: Datadog API Key
slug: global-datadog-api-key
version: 1.1.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Datadog API keys, which are 32 hexadecimal characters with no fixed prefix.
  Because a bare 32-hex string is generic, this pattern requires a nearby Datadog label
  to confirm the match. A leaked key grants metric, log and event ingestion access.
operation: 'A Datadog label (datadog / dd-api-key / DD_API_KEY) followed within a short gap by a 32-hex value. Corroborative evidence: keywords within 300 characters.'
pattern: (?i)(?:datadog|dd[-_]?api[-_]?key|DD_API_KEY)[\s\S]{0,40}?(?<![a-f0-9])[a-f0-9]{32}(?![a-f0-9])
confidence: medium
confidence_justification: >-
  Medium confidence: Datadog keys are an undifferentiated 32-hex string, so detection
  relies on an adjacent Datadog label; without context the value is indistinguishable
  from an MD5 hash or other 32-hex token.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - datadog
    - datadoghq
    - DD_API_KEY
    - dd-api-key
    - api key
    - app key
    - agent
  proximity: 300
test_cases:
  should_match:
    - value: 'datadog api key: abcdef0123456789abcdef0123456789'
      description: Datadog-labelled 32-hex key
    - value: 'DD_API_KEY=0123456789abcdef0123456789abcdef'
      description: Datadog env var with 32-hex key
    - value: 'dd-api-key = fedcba9876543210fedcba9876543210'
      description: dd-api-key label followed by a 32-hex value
  should_not_match:
    - value: abcdef0123456789abcdef0123456789
      description: Bare 32-hex value with no Datadog context (could be an MD5 hash)
    - value: 'datadog api key: abcdef0123456789'
      description: Datadog label but value too short (16 hex not 32)
    - value: install the datadog agent and paste your api key into the config
      description: Prose mention without a token value
false_positives:
  - description: An MD5 hash or other 32-hex value appearing close to the word datadog in prose.
    mitigation: Tighten the proximity gap and require an assignment-style label (=, :) before alerting.
  - description: Documentation or examples showing placeholder hex values near Datadog text.
    mitigation: Check for placeholder markers (example, 0000, xxxx).
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
risk_rating: 8
risk_description: >-
  This medium-confidence detector identifies a 32-character hexadecimal Datadog API key only near a Datadog-specific label. A live key can inject or delete telemetry, and paired application credentials may expose dashboards, logs, events, and operational data. The normal unit is one ingestion credential whose readable scope and pairing are not established by the match, so the likely harm is serious but contained. Risk 8 and SENSITIVE InfoTech are appropriate; PROTECTED requires demonstrated broad read access, critical monitoring compromise, or significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
