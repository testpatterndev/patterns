schema: testpattern/v1
name: CMDB relationship mappings
slug: au-top500-308-cmdb-relationship-mappings
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies cmdb relationship mappings patterns in security and access control contexts. Detects potential exposure of sensitive security information in Australian systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses word-boundary phrase matching with flexible whitespace. Corroborative evidence: 6 keywords within 300 characters. Keyword lists: corporate-ip.'
pattern: (?i)\b(?:cmdb|configuration\s+item|service\s+map|dependency\s+map)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker.
jurisdictions:
  - au
regulations:
  - NDB Scheme (Cth)
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - cmdb relationship mappings
    - cmdb
    - relationship
    - mappings
    - operations
    - resilience
  proximity: 300
  keyword_lists:
    - corporate-ip
test_cases:
  should_match:
    - value: 'Cmdb'
      description: Topic phrase present
    - value: 'cmdb'
      description: Topic phrase, lowercase
    - value: 'this record references the cmdb held on file'
      description: Topic phrase within surrounding text
  should_not_match:
    - value: unrelated generic text
      description: No relevant phrase context
    - value: placeholder value 12345
      description: Random text should not match phrase marker
    - value: generic policy prose without anchors
      description: Should reject generic mentions without structural anchor terms
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_cmdb_mapping
      matches:
        - ref: Evidence_cmdb_mapping
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_cmdb_mapping
      matches:
        - ref: Evidence_cmdb_mapping
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_cmdb_mapping
  regexes:
    - id: Pattern_cmdb_mapping
      pattern: (?i)\b(?:cmdb|configuration\s+item|service\s+map|dependency\s+map)\b
  keywords:
    - id: Evidence_cmdb_mapping
      groups:
        - match_style: word
          terms:
            - CMDB
            - configuration item
            - service map
            - dependency map
            - configuration management database
            - CI relationship
            - service dependency
            - infrastructure topology
            - ServiceNow
            - impact analysis
            - upstream dependency
            - downstream dependency
      strength: specific
created: '2026-02-08'
