schema: testpattern/v1
name: Escrow account details
slug: au-top500-117-escrow-account-details
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to escrow account details in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:escrow\s+account|trust\s+account|escrow\s+funds|settlement\s+account|holding\s+account|escrow\s+agent|escrow\s+balance|trust\s+deposit|statutory\s+trust|escrow\s+arrangement)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - escrow account details
    - escrow
    - account
    - details
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: escrow account
      description: Primary topic phrase match
    - value: trust account
      description: Case-insensitive topic phrase match
    - value: escrow funds
      description: Alternative topic phrase match
    - value: settlement account
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_escrow_account
      matches:
        - ref: Evidence_escrow_account
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_escrow_account
      matches:
        - ref: Evidence_escrow_account
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_escrow_account
      matches:
        - ref: Evidence_escrow_account
  regexes:
    - id: Pattern_escrow_account
      pattern: (?is)\b(?:escrow\s+account|trust\s+account|escrow\s+funds|settlement\s+account|holding\s+account|escrow\s+agent|escrow\s+balance|trust\s+deposit|statutory\s+trust|escrow\s+arrangement)\b
  keywords:
    - id: Evidence_escrow_account
      groups:
        - match_style: word
          terms:
            - escrow account
            - trust account
            - escrow funds
            - settlement account
            - holding account
            - escrow agent
            - escrow balance
            - disbursement
            - trust deposit
            - statutory trust
            - conveyancing
            - escrow arrangement
risk_description: >-
  This detector identifies references to escrow or trust accounts, settlement accounts, and associated fund details. Disclosure can let a fraudster substitute settlement coordinates, target funds awaiting release, or craft convincing messages to transaction parties. A normal match concerns a particular escrow arrangement and may expose substantial funds, but it does not itself confer signing authority or release control. Risk 7 and SENSITIVE reflect the credible financial loss; escrow instructions paired with approvals, credentials, or a high-value deal file would increase the impact.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
