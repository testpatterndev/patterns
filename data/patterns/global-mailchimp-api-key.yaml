schema: testpattern/v1
name: Mailchimp API Key
slug: global-mailchimp-api-key
version: 1.1.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Mailchimp API keys, formatted as 32 hex characters followed by -us and a 1-2 digit datacenter code. A
  leaked key grants access to audience lists, campaigns and subscriber PII.
operation: 'Token format <32 hex>-us<1-2 digits>. Corroborative evidence: keywords within 300 characters.'
pattern: (?<![A-Za-z0-9])[a-f0-9]{32}-us[0-9]{1,2}(?![A-Za-z0-9])
confidence: high
confidence_justification: 'High confidence: the trailing -us<digits> datacenter suffix on a 32-hex body is a distinctive Mailchimp
  structure with low false-positive risk.'
jurisdictions:
- global
regulations:
- Criminal Code Act 1995 (Cth)
frameworks:
- CIS Controls
- ISO 27001
- NIST CSF
- SOC 2
data_categories:
- credentials
- security
corroborative_evidence:
  keywords:
  - mailchimp
  - mailchimp.com
  - api key
  - MAILCHIMP_API_KEY
  - audience
  - campaign
  - datacenter
  proximity: 300
test_cases:
  should_match:
  - value: abcdef0123456789abcdef0123456789-us6
    description: Mailchimp API key, 32 hex + -us + 1 digit
  - value: MAILCHIMP_API_KEY=0123456789abcdef0123456789abcdef-us21
    description: Labelled Mailchimp key with two-digit datacenter code
  - value: fedcba9876543210fedcba9876543210-us1
    description: Another Mailchimp key body
  should_not_match:
  - value: abcdef0123456789abcdef0123456789-eu6
    description: Wrong datacenter prefix (-eu instead of -us)
  - value: abcdef0123456789abcdef0123-us6
    description: Hex body too short (26 instead of 32)
  - value: rotate the mailchimp api key for the us datacenter
    description: Prose mention without a token value
false_positives:
- description: A 32-hex hash that coincidentally precedes the literal -us and a digit.
  mitigation: Require corroborative Mailchimp keywords within proximity before alerting.
- description: Documentation or examples showing placeholder keys.
  mitigation: Check for placeholder markers (example, xxxx) and require Mailchimp context.
exports:
- purview_xml
- yaml
- regex_copy
scope: narrow
risk_rating: 8
risk_description: This high-confidence detector recognises a Mailchimp API key as 32 hexadecimal characters followed by a
  specific us datacentre suffix. A usable key can read audience lists and subscriber data, create or alter campaigns, and
  send messages from the owner's account. The normal credential can seriously affect one Mailchimp account and its subscribers
  but does not inherently establish unrestricted access to every audience or a mass active phishing campaign. Risk 8 and SENSITIVE
  InfoTech are appropriate; PROTECTED requires demonstrated large-scale or severe downstream harm.
sensitivity_labels:
  pspf: 'OFFICIAL: Sensitive'
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-14'
changelog:
- version: 1.1.1
  date: '2026-07-14'
  description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1547 without changing
    detector or package metadata.'
- version: 1.1.0
  date: '2026-07-09'
  description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are
    scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived
    by scripts/derive-pattern-class.mjs + spot review'
author: testpattern-community
license: MIT
references:
- url: https://mailchimp.com/developer/marketing/guides/quick-start/
  title: Mailchimp Marketing API quick start
purview:
