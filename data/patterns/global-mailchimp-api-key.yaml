  keywords:
  - id: Keyword_domain_context
    strength: specific
    groups:
    - match_style: word
      terms:
      - Mailchimp API Key
      - Mailchimp
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_primary
    matches:
    - ref: Keyword_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
    min_count: 2
  - confidence_level: 75
    id_match: Regex_primary
    matches:
    - ref: Keyword_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_primary
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  recommended_confidence: 85
  patterns_proximity: 300
