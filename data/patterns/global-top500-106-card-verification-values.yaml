schema: testpattern/v1
name: Card verification values
slug: global-top500-106-card-verification-values
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to card verification values in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:card\s+verification\s+values|security\s+code|card\s+verification\s+code|card\s+security\s+code|three\s+digit\s+code|PCI\s+DSS|cardholder\s+verification)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - card verification values
    - card
    - verification
    - values
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: card verification values
      description: Primary topic phrase match
    - value: security code
      description: Case-insensitive topic phrase match
    - value: card verification code
      description: Alternative topic phrase match
    - value: card security code
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_card_verification
      matches:
        - ref: Pattern_global_top500_106_card_verification_values_label_context
        - ref: Keyword_global_top500_106_card_verification_values_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_106_card_verification_values_noise_exclusion
    - confidence_level: 75
      id_match: Regex_card_verification
      matches:
        - ref: Keyword_card_verification
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_106_card_verification_values_noise_exclusion
    - confidence_level: 65
      id_match: Regex_card_verification
      matches:
        - ref: Keyword_card_verification
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_106_card_verification_values_noise_exclusion
  regexes:
    - id: Regex_card_verification
      pattern: (?is)\b(?:card\s+verification\s+values|security\s+code|card\s+verification\s+code|card\s+security\s+code|three\s+digit\s+code|PCI\s+DSS|cardholder\s+verification)\b
    - id: Pattern_global_top500_106_card_verification_values_label_context
      pattern: (?i)\\b(?:card\\s+verification\\s+values|card|verification|values|top500)\\b
  keywords:
    - id: Keyword_card_verification
      groups:
        - match_style: word
          terms:
            - card verification values
            - CVV
            - CVC
            - CVV2
            - CVC2
            - security code
            - card verification code
            - card security code
            - three digit code
            - PCI DSS
            - cardholder verification
    - id: Keyword_global_top500_106_card_verification_values_domain_context
      groups:
        - match_style: word
          terms:
            - card verification values
            - card
            - verification
            - values
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_106_card_verification_values_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
