  - version: 1.4.0
    date: '2026-07-17'
    description: 'SIT alignment wave1 (TP-00290, reduced scope): removed the generic confidentiality phrases "confidential communication" and "in confidence" from the primary anchor regex (pattern and Pattern_attorney_client_privileged) so only genuine privilege markers anchor matches; both phrases remain in Evidence_attorney_client_privileged as supporting evidence only; adversarial tests added. Deliberately less than the first-pass candidate: "without prejudice" retained as an anchor (only the two named confidentiality phrases were approved for removal) and the proposed named-matter/substantive-advice 85 tier NOT implemented (undefined references, deferred per QA).'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 765 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
