schema: testpattern/v1
name: Attorney-client privileged communications
slug: au-top500-164-attorney-client-privileged-communications
version: 1.4.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to attorney-client privileged communications in Australian contexts. This information type is classified as personally identifiable information under
  applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Keyword
  lists: classification-legal.
pattern: >-
  (?is)\b(?:attorney[\s-]+client\s+privileged\s+communications|legal\s+professional\s+privilege|privileged\s+and\s+confidential|solicitor[\s-]+client\s+privilege|without\s+prejudice|litigation\s+privilege|dominant\s+purpose|legal\s+advice\s+privilege|attorney\s+work\s+product)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - legal
corroborative_evidence:
  keywords:
    - attorney-client privileged communications
    - attorney
    - client
    - privileged
    - communications
    - corporate
    - legal
    - governance
  proximity: 300
  keyword_lists:
    - classification-legal
    - data-record-context
test_cases:
  should_match:
    - value: attorney-client privileged communications
      description: Primary topic phrase match
    - value: legal professional privilege
      description: Case-insensitive topic phrase match
    - value: privileged and confidential
      description: Alternative topic phrase match
    - value: solicitor-client privilege
      description: Additional topic phrase match
    - value: 'Privileged and confidential - advice from external counsel to client regarding Matter 482; dominant purpose: legal advice'
      description: Genuine privilege markers anchor a counsel-to-client advice communication
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: board policy
      description: Generic word pair from old broad template should not match
    - value: Confidential communication - in confidence
      description: Generic confidentiality phrases no longer anchor — confidentiality alone is not legal professional privilege
    - value: Training example of a privileged email from counsel
      description: No privilege-marker anchor phrase present — must not match
false_positives:
  - description: >-
      Common words and phrases related to attorney-client privileged communications appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal
      data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_attorney_client_privileged
      matches:
        - ref: Evidence_attorney_client_privileged
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_attorney_client_privileged
      matches:
        - ref: Evidence_attorney_client_privileged
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_attorney_client_privileged
      matches:
        - ref: Evidence_attorney_client_privileged
  regexes:
    - id: Pattern_attorney_client_privileged
      pattern: >-
        (?is)\b(?:attorney[\s-]+client\s+privileged\s+communications|legal\s+professional\s+privilege|privileged\s+and\s+confidential|solicitor[\s-]+client\s+privilege|without\s+prejudice|litigation\s+privilege|dominant\s+purpose|legal\s+advice\s+privilege|attorney\s+work\s+product)\b
  keywords:
    - id: Evidence_attorney_client_privileged
      groups:
        - match_style: word
          terms:
            - attorney-client privileged communications
            - legal professional privilege
            - privileged and confidential
            - solicitor-client privilege
            - without prejudice
            - litigation privilege
            - dominant purpose
            - legal advice privilege
            - confidential communication
            - attorney work product
            - in confidence
            - privileged
risk_description: >-
  The detector recognises attorney-client and solicitor-client privilege, legal-professional-privilege, and privileged-and-confidential communications with eight legal signals. An actual communication can reveal client instructions, admissions, counsel advice, evidence assessments, and intended actions, exposing the client to waiver, opponent advantage, or regulatory prejudice. The normal thread concerns a bounded matter and causes serious legal harm, but it is not automatically a mass compromise of privileged holdings. Risk 8 warrants SENSITIVE Legal; PROTECTED would require bulk mailbox or matter-system exposure, protected government advice, or significant cross-case damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Legal
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
