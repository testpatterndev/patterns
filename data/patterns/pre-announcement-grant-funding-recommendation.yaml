schema: testpattern/v1
name: Pre-Announcement Grant Funding Recommendation
slug: pre-announcement-grant-funding-recommendation
version: 1.2.0
type: keyword_proximity
engine: universal
description: Detects ministerial briefing notes or departmental submissions recommending specific grant funding decisions before public announcement.
operation: 'Keyword proximity: recommendation/submission terms within 300 characters of grant/funding terms and ministerial/approval context. Requires pre-announcement markers (PROTECTED, not for release, decision pending).'
pattern: null
confidence: medium
confidence_justification: 'Medium confidence: the combination of recommendation language with grant funding context and pre-announcement markers is highly specific to pre-decisional funding documents. Published grant outcomes are excluded.'
jurisdictions:
  - au
regulations:
- "Financial Accountability Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - recommend
    - recommendation
    - submission
    - brief
    - briefing note
    - approval
    - grant
    - funding
    - program
    - initiative
    - Minister
    - Director-General
    - decision
    - PROTECTED
    - not for release
    - pre-announcement
    - decision pending
  proximity: 300
  keyword_lists:

    - corporate-finance

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED — Briefing Note for the Minister. Subject: Grant Funding Recommendations — Community Recovery Program Round 2. Recommendation: That the Minister approve funding of $8.4M across 23 applicants as listed in Attachment A. Decision pending — not for release until ministerial announcement.'
      description: Ministerial brief with grant funding recommendations
    - value: 'Submission to Director-General. Pre-announcement. Recommendation: Approve the attached grant funding allocations for the Regional Innovation Fund ($12.6M total). 15 successful applicants recommended from 89 applications. PROTECTED — decision pending.'
      description: DG submission with pre-announcement grant recommendations
    - value: 'PROTECTED — Briefing note for the Minister. Recommendation: endorse grant funding of $5.2M for the Digital Skills Initiative across 11 recommended applicants. Not for release until the ministerial announcement. Decision pending.'
      description: Ministerial brief recommending grant funding before announcement
  should_not_match:
    - value: 'Media Release: Minister announces Community Recovery grants. Twenty-three organisations across Queensland will receive funding under Round 2. Congratulations to all successful applicants.'
      description: Post-announcement media release — public document, no pre-announcement markers
    - value: Grant Application Form — Community Recovery Program. Applicants must demonstrate financial viability and community benefit to be recommended for funding.
      description: Public grant application form describing process
false_positives:
  - description: Post-announcement media releases and grant outcome notifications
    mitigation: Exclude documents containing 'media release', 'announces', 'congratulations', 'successful applicants' without pre-announcement markers
  - description: Grant program guidelines and application forms
    mitigation: Exclude documents containing 'application form', 'how to apply', 'eligibility criteria', 'guidelines'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pre_announcement_grant_funding_recommendation_dollar_amounts_for_funding_figures
      matches:
        - ref: Evidence_pre_announcement_grant_funding_recommendation_primary
        - ref: Evidence_pre_announcement_grant_funding_recommendation_context
        - ref: Evidence_pre_announcement_grant_funding_recommendation_authority
        - ref: Evidence_pre_announcement_grant_funding_recommendation_markers
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_pre_announcement_grant_funding_recommendation_exclusion
    - confidence_level: 75
      id_match: Pattern_pre_announcement_grant_funding_recommendation_dollar_amounts_for_funding_figures
      matches:
        - ref: Evidence_pre_announcement_grant_funding_recommendation_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_pre_announcement_grant_funding_recommendation_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_pre_announcement_grant_funding_recommendation_dollar_amounts_for_funding_figures
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_pre_announcement_grant_funding_recommendation_exclusion
  regexes:
    - id: Pattern_pre_announcement_grant_funding_recommendation_dollar_amounts_for_funding_figures
      pattern: \$[\d,.]+\s*[MBKmb]?
  keywords:
    - id: Evidence_pre_announcement_grant_funding_recommendation_primary
      groups:
        - match_style: word
          terms:
            - recommend
            - recommendation
            - submission
            - brief
            - briefing note
            - approval
      strength: domain
    - id: Evidence_pre_announcement_grant_funding_recommendation_context
      groups:
        - match_style: word
          terms:
            - grant
            - funding
            - program
            - initiative
            - round
            - applicant
            - application
      strength: domain
    - id: Evidence_pre_announcement_grant_funding_recommendation_authority
      groups:
        - match_style: word
          terms:
            - Minister
            - Director-General
            - text: DG
              case_sensitive: true
            - decision
            - approve
            - endorsed
      strength: domain
    - id: Evidence_pre_announcement_grant_funding_recommendation_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - not for release
            - pre-announcement
            - decision pending
            - not for distribution
            - embargoed
      strength: specific
    - id: Filter_pre_announcement_grant_funding_recommendation_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - announces
            - congratulations
            - successful applicants
            - application form
            - how to apply
            - guidelines
            - published

      strength: noise
risk_rating: 8
risk_description: Ministerial briefings recommending specific grant funding decisions before public announcement; disclosure corrupts the announcement process. Legislative review (Mar 2026) established BIL:2 — Financial Accountability Act 2009 (Qld) contains no secrecy provisions or criminal penalties. No specific statutory mandate for PROTECTED classification of this document type. Operational sensitivity managed through access controls and existing financial accountability frameworks.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Financial"
references: []
created: '2026-02-20'
updated: '2026-07-09'
changelog:
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
author: qld-gov-dlp
