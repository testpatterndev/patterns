schema: testpattern/v1
name: Pre-Announcement Grant Funding Recommendation
slug: pre-announcement-grant-funding-recommendation
version: 1.4.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects ministerial briefing notes or departmental submissions recommending specific grant funding decisions before public announcement.
operation: 'Keyword proximity: recommendation/submission terms within 300 characters of grant/funding terms and ministerial/approval context. Requires pre-announcement markers (PROTECTED, not for release, decision pending).'
pattern: null
confidence: medium
confidence_justification: 'Medium confidence: the combination of recommendation language with grant funding context and pre-announcement markers is highly specific to pre-decisional funding documents. Published grant outcomes are excluded.'
jurisdictions:
  - au
regulations:
- "Financial Accountability Act 2009 (Qld)"
frameworks:
- QGISCF
data_categories:
  - financial
  - government
corroborative_evidence:
  keywords:
    - recommend
    - recommendation
    - submission
    - brief
    - briefing note
    - approval
    - grant
    - funding
    - program
    - initiative
    - Minister
    - Director-General
    - decision
    - PROTECTED
    - not for release
    - pre-announcement
    - decision pending
  proximity: 300
  keyword_lists:

    - corporate-finance

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED — Briefing Note for the Minister. Subject: Grant Funding Recommendations — Community Recovery Program Round 2. Recommendation: That the Minister approve funding of $8.4M across 23 applicants as listed in Attachment A. Decision pending — not for release until ministerial announcement.'
      description: Ministerial brief with grant funding recommendations
    - value: 'Submission to Director-General. Pre-announcement. Recommendation: Approve the attached grant funding allocations for the Regional Innovation Fund ($12.6M total). 15 applicants recommended for approval from 89 applications received. PROTECTED — decision pending.'
      description: DG submission with pre-announcement grant recommendations
    - value: 'PROTECTED — Briefing note for the Minister. Recommendation: endorse grant funding of $5.2M for the Digital Skills Initiative across 11 recommended applicants. Not for release until the ministerial announcement. Decision pending.'
      description: Ministerial brief recommending grant funding before announcement
  should_not_match:
    - value: 'Media Release: Minister announces Community Recovery grants. Twenty-three organisations across Queensland will receive funding under Round 2. Congratulations to all successful applicants.'
      description: Post-announcement media release — public document, no pre-announcement markers
    - value: Grant Application Form — Community Recovery Program. Applicants must demonstrate financial viability and community benefit to be recommended for funding.
      description: Public grant application form describing process
    - value: 'PROTECTED — Draft submission for internal approval. Program funding of $2.4M allocated across three regional initiatives. Decision pending — not for release.'
      description: shared financial substrate without distinctive signature must not fire
false_positives:
  - description: Post-announcement media releases and grant outcome notifications
    mitigation: Exclude documents containing 'media release', 'announces', 'congratulations', 'successful applicants' without pre-announcement markers
  - description: Grant program guidelines and application forms
    mitigation: Exclude documents containing 'application form', 'how to apply', 'eligibility criteria', 'guidelines'
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_pre_announcement_grant_funding_recommendation_dollar_amounts_for_funding_figures
      matches:
        - ref: Evidence_pre_announcement_grant_funding_recommendation_primary
        - ref: Evidence_pre_announcement_grant_funding_recommendation_context
        - ref: Evidence_pre_announcement_grant_funding_recommendation_authority
        - ref: Evidence_pre_announcement_grant_funding_recommendation_markers
        - ref: Evidence_pre_announcement_grant_funding_recommendation_distinctive
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_pre_announcement_grant_funding_recommendation_exclusion
    - confidence_level: 75
      id_match: Pattern_pre_announcement_grant_funding_recommendation_dollar_amounts_for_funding_figures
      matches:
        - ref: Evidence_pre_announcement_grant_funding_recommendation_primary
        - ref: Evidence_pre_announcement_grant_funding_recommendation_distinctive
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_pre_announcement_grant_funding_recommendation_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_pre_announcement_grant_funding_recommendation_dollar_amounts_for_funding_figures
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
            - Filter_pre_announcement_grant_funding_recommendation_exclusion
  regexes:
    - id: Pattern_pre_announcement_grant_funding_recommendation_dollar_amounts_for_funding_figures
      pattern: \$[\d,.]+\s*[MBKmb]?
  keywords:
    - id: Evidence_pre_announcement_grant_funding_recommendation_primary
      groups:
        - match_style: word
          terms:
            - recommend
            - recommendation
            - submission
            - brief
            - approval
      strength: domain
    - id: Evidence_pre_announcement_grant_funding_recommendation_context
      groups:
        - match_style: word
          terms:
            - funding
            - program
            - initiative
            - round
            - application
      strength: domain
    - id: Evidence_pre_announcement_grant_funding_recommendation_authority
      groups:
        - match_style: word
          terms:
            - decision
            - approve
            - endorsed
      strength: domain
    - id: Evidence_pre_announcement_grant_funding_recommendation_distinctive
      groups:
        - match_style: word
          terms:
            - grant
            - applicant
            - briefing note
            - Minister
            - Director-General
            - text: DG
              case_sensitive: true
      strength: specific
    - id: Evidence_pre_announcement_grant_funding_recommendation_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - not for release
            - pre-announcement
            - decision pending
            - not for distribution
            - embargoed
      strength: specific
    - id: Filter_pre_announcement_grant_funding_recommendation_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - announces
            - congratulations
            - successful applicants
            - application form
            - how to apply
            - guidelines
            - published

      strength: noise
risk_rating: 8
risk_description: >-
  The detector targets a ministerial briefing or departmental submission recommending named grant funding before announcement by combining recommendation, grant, approval, and pending-release terms. Premature disclosure can confer unfair advantage on applicants, invite lobbying or interference, and undermine probity and confidence in the decision process. The normal true positive is a composite recommendation affecting a defined funding decision, whereas programme guidelines and post-announcement notices can contain overlapping language. Risk 8 SENSITIVE reflects serious but decision-bounded financial and governance harm; PROTECTED would require exceptional strategic importance or significant government damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
references: []
created: '2026-02-20'
updated: '2026-07-20'
changelog:
  - version: 1.4.0
    date: '2026-07-20'
    description: 'Differentiation fix: this SIT co-fired with four sibling finance-concept SITs at cross-tenant document-Jaccard 97.8-99.6% (ecq/qleave 2026-07 warehouse analysis) because all five tiers were satisfiable by the same shared substrate (generic dollar-amount anchor + corporate-finance/government-services list terms + PROTECTED/draft/embargoed markers). New distinctive evidence group (grant, applicant, briefing note, Minister, Director-General, DG) regrouped out of primary/context/authority; the 85 tier now requires >=2 unique distinctive terms (min_count 2, unique_results) and the 75 tier requires >=1 — shared substrate alone can no longer satisfy any tier >=75. New should_not_match: shared financial substrate without distinctive signature.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1446 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.1.1
    date: '2026-07-09'
    description: Reword second should_match value to drop the phrase "successful applicants", which is in the pattern's own exclusion NOT-group and permanently vetoed every tier for that value (tier-harness triage class T5)
  - version: 1.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
