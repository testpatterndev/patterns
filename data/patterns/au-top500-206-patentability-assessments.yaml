schema: testpattern/v1
name: Patentability assessments
slug: au-top500-206-patentability-assessments
version: 1.1.0
type: regex
engine: boost_regex
description: Identifies documents containing references to patentability assessments in Australian contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:patentability\s+assessment|patentability\s+opinion|freedom\s+to\s+operate|FTO\s+analysis|prior\s+art\s+search|novelty\s+assessment|inventive\s+step|patent\s+landscape|patent\s+validity|infringement\s+analysis|IP\s+assessment|patent\s+strategy)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "HRIPA (Cth)"
- "IPA 2009 (Qld)"
- "My Health Records Act 2012 (Cth)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "TIA Act 1979 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - patentability assessments
    - patentability
    - assessments
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: patentability assessment
      description: Primary topic phrase match
    - value: patentability opinion
      description: Case-insensitive topic phrase match
    - value: freedom to operate
      description: Alternative topic phrase match
    - value: FTO analysis
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to patentability assessments appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_patentability_assessments
      matches:
        - ref: Evidence_patentability_assessments
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_patentability_assessments
      matches:
        - ref: Evidence_patentability_assessments
    - confidence_level: 65
      id_match: Pattern_patentability_assessments
      matches:
        - ref: Evidence_patentability_assessments
  regexes:
    - id: Pattern_patentability_assessments
      pattern: (?is)\b(?:patentability\s+assessment|patentability\s+opinion|freedom\s+to\s+operate|FTO\s+analysis|prior\s+art\s+search|novelty\s+assessment|inventive\s+step|patent\s+landscape|patent\s+validity|infringement\s+analysis|IP\s+assessment|patent\s+strategy)\b
  keywords:
    - id: Evidence_patentability_assessments
      groups:
        - match_style: word
          terms:
            - patentability assessment
            - patentability opinion
            - freedom to operate
            - FTO analysis
            - prior art search
            - novelty assessment
            - inventive step
            - patent landscape
            - patent validity
            - infringement analysis
            - IP assessment
            - patent strategy
            - confidential
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.ipaustralia.gov.au/patents/how-to-apply-for-a-standard-patent/what-to-consider-before-applying-for-a-patent
  - https://www.ipaustralia.gov.au/patents/what-are-patents
