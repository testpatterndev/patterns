schema: testpattern/v1
name: Religious or Philosophical Beliefs (Australia)
slug: au-religious-beliefs
version: 1.2.0
type: keyword_list
pattern_class: concept
engine: universal
description: >-
  Detects references to religious or philosophical belief disclosure in Australian documents:
  religious affiliation, belief system, faith tradition, place of worship, and religious
  conversion records. Religion is a protected attribute under s.351 of the Fair Work Act 2009
  (Cth) — adverse action on this basis is unlawful, making its disclosure sensitive regardless
  of format. Topic-grade detector, low confidence by design.
operation: >-
  Phrase regex matching indicative religious/philosophical-belief disclosure terminology
  (religious beliefs, religious affiliation, philosophical beliefs, belief system, faith
  tradition, religious observance, place of worship, religious denomination, religious
  conversion record). Detects the presence of religious/belief subject matter in a
  disclosure/record context; not a structured-token detector. Pair with corroborative
  keywords to raise precision. Purview keeps the topic phrase at 65 discovery, requires a
  person-linked workplace, intake, census, or chaplaincy record at 75, and requires a populated
  belief, denomination, observance, or accommodation statement as well at 85.
pattern: '(?i)\b(?:religious\s+beliefs?|religious\s+affiliations?|philosophical\s+beliefs?|belief\s+systems?|faith\s+traditions?|religious\s+observance|place\s+of\s+worship|religious\s+denominations?|religious\s+conversion\s+record)\b'
confidence: low
confidence_justification: >-
  Low by design. Religious or philosophical belief has no fixed format, so it is detected
  purely by topic vocabulary. Generic words like "believe" or "religion" appear constantly in
  non-sensitive prose (corporate values statements, educational content); the regex is scoped
  to full disclosure phrases only, and hits should be paired with corroborative keywords
  (faith, congregation, worship) to raise precision.
jurisdictions:
  - au
regulations:
  - Fair Work Act 2009 (Cth)
  - Privacy Act 1988 (Cth)
  - NDB Scheme (Cth)
frameworks:
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - faith
    - congregation
    - worship
    - clergy
    - denomination
    - doctrine
    - spiritual
    - religion
  proximity: 300
test_cases:
  should_match:
    - value: 'Religious affiliation disclosure topic pending review.'
      description: Exact 65 discovery probe - belief topic without a person-record context
    - value: 'Patient intake record includes a religious affiliation field.'
      description: Exact 75 probe - person-record context without a populated belief response
    - value: 'Employee file: religious affiliation recorded; denomination: Sikh; religious accommodation approved.'
      description: Exact 85 probe - person record plus populated denomination/accommodation evidence
    - value: 'The intake form records religious affiliation under section 4.'
      description: Religious affiliation phrase present
    - value: 'Profile notes his faith tradition and place of worship.'
      description: Faith tradition / place of worship terms present
    - value: 'HR file documents a religious conversion record from the chaplaincy referral.'
      description: Religious conversion record term present
    - value: 'The census field asks respondents to state their religious beliefs voluntarily.'
      description: Religious beliefs phrase present
  should_not_match:
    - value: 'We believe in transparent pricing for all customers.'
      description: Generic corporate "believe", not a belief-system disclosure
    - value: 'The museum exhibit covered world religions through history.'
      description: Topical/educational mention, no personal disclosure phrase
    - value: 'Religious studies 101 is a required elective this semester.'
      description: Academic course listing, no disclosure phrase
    - value: 'Public policy guidance explains how to collect congregation demographics.'
      description: Public guidance is not a person-linked belief disclosure
    - value: 'Sample template: employee file, faith response recorded as Example Faith.'
      description: Adjacent template language is not a populated belief record
    - value: 'Employee file records a dietary preference for the staff lunch.'
      description: Sibling preference record does not satisfy the religious-belief primary
false_positives:
  - description: >-
      Generic corporate or educational use of "believe"/"religion"/"religious" (values
      statements, history/comparative-religion content) has nothing to do with a personal
      belief-disclosure record.
    mitigation: >-
      The regex targets full disclosure phrases ("religious affiliation", "faith tradition",
      "religious conversion record") rather than the bare words "believe"/"religion"; require
      corroborative keywords (faith, congregation, worship, clergy) for confidence.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: broad
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_religious_belief_topic
      matches:
        - ref: Evidence_au_belief_record_context
        - ref: Evidence_au_belief_attribution
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_au_belief_public_context
    - confidence_level: 75
      id_match: Pattern_religious_belief_topic
      matches:
        - ref: Evidence_au_belief_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_au_belief_public_context
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_religious_belief_topic
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
            - Evidence_au_belief_public_context
  regexes:
    - id: Pattern_religious_belief_topic
      pattern: '(?i)\b(?:religious\s+beliefs?|religious\s+affiliations?|philosophical\s+beliefs?|belief\s+systems?|faith\s+traditions?|religious\s+observance|place\s+of\s+worship|religious\s+denominations?|religious\s+conversion\s+record)\b'
  keywords:
    - id: Evidence_au_belief_record_context
      groups:
        - match_style: word
          terms:
            - HR adjustment request
            - employee file
            - patient intake
            - chaplaincy referral
            - census response
            - personnel record
      strength: domain
    - id: Evidence_au_belief_attribution
      groups:
        - match_style: word
          terms:
            - faith recorded as
            - 'denomination:'
            - declared belief
            - observance requested
            - religious accommodation approved
            - converted to
      strength: specific
    - id: Evidence_au_belief_public_context
      groups:
        - match_style: word
          terms:
            - public policy guidance
            - aggregate statistics
            - museum catalogue
            - academic course
            - blank questionnaire
            - comparative religion
      strength: exclusion
risk_rating: 7
risk_description: >-
  Religion is a protected attribute under s.351 of the Fair Work Act 2009 (Cth); disclosure
  can lead to workplace discrimination, adverse action, or social exclusion.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Personal-Privacy"
  us_gov: CUI Basic
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-07-12'
updated: '2026-07-19'
changelog:
  - version: 1.2.0
    date: '2026-07-19'
    description: 'Targeted blocker remediation: retain belief topics as 65 discovery, require a person-linked workplace/intake record at 75 and a populated belief or accommodation statement at 85; add exact-tier and sibling/public/template probes.'
  - version: 1.1.0
    date: '2026-07-17'
    description: >-
      Reduced-scope deployment wiring (TP-00115): add the missing purview block as a single 65
      discovery_only tier using the authored phrase regex verbatim (the first-pass candidate
      omitted the "belief systems" alternation — fidelity gap fixed by using the authored
      pattern, per the independent check). The candidate's 75/85 person-linked tiers rested on
      generic same-span record words (HR, profile, intake) with no concrete attribution
      evidence or academic/museum/values exclusions — rejected per QA. No enforcement.
  - version: 1.0.0
    date: '2026-07-12'
    description: 'New pattern: replaces the deprecated au/global-top500-016-religious-or-philosophical-beliefs attribute-value patterns (needs-EDM/ML) with an honest topic-classifier concept, modeled on global-political-opinion but reframed on AU anti-discrimination law (Fair Work Act s.351) rather than GDPR. Fills the D-wave coverage gap logged in c3-deprecation-report.md.'
author: testpattern-community
license: MIT
keywords:
  - religious beliefs
  - religious affiliation
  - philosophical beliefs
  - belief system
  - faith tradition
  - religious observance
  - place of worship
  - religious denomination
  - religious conversion record
references:
  - url: https://www.fairwork.gov.au/tools-and-resources/fact-sheets/rights-and-obligations/protection-from-discrimination-at-work
    title: Protection from discrimination at work — Fair Work Ombudsman
