schema: testpattern/v1
name: Adverse event reports
slug: global-top500-339-adverse-event-reports
version: 1.2.0
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies adverse event reports references in healthcare and patient records. Protected health information under applicable data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:adverse\s+event|adverse\s+reaction|side\s+effect|safety\s+report|serious\s+adverse\s+event|drug\s+reaction|incident\s+report|post[\s-]+market\s+surveillance|causality\s+assessment)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - healthcare
  - phi
corroborative_evidence:
  keywords:
    - adverse event reports
    - adverse
    - event
    - reports
    - health
    - biomedical
    - information
  proximity: 300
  keyword_lists:
    - healthcare-clinical
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: adverse event
      description: Primary topic phrase match
    - value: adverse reaction
      description: Case-insensitive topic phrase match
    - value: side effect
      description: Alternative topic phrase match
    - value: safety report
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: patient biometric
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Medical terminology in health education materials, research publications, clinical guidelines, or public health documents without patient-specific data.
    mitigation: Require corroborative evidence keywords confirming patient context. Look for co-occurrence with patient identifiers such as medical record numbers or dates of birth.
  - description: General wellness and fitness content using medical vocabulary without constituting protected health information.
    mitigation: Layer with patient identifier patterns or healthcare-specific document structure detection to distinguish clinical records from general health content.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_adverse_event_reports
      matches:
        - ref: Pattern_global_top500_339_adverse_event_reports_label_context
        - ref: Keyword_global_top500_339_adverse_event_reports_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_adverse_event_reports
      matches:
        - ref: Keyword_adverse_event_reports
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_adverse_event_reports
      pattern: (?is)\b(?:adverse\s+event|adverse\s+reaction|side\s+effect|safety\s+report|serious\s+adverse\s+event|drug\s+reaction|incident\s+report|post[\s-]+market\s+surveillance|causality\s+assessment)\b
    - id: Pattern_global_top500_339_adverse_event_reports_label_context
      pattern: (?i)\b(?:adverse\s+event\s+reports)\b
  keywords:
    - id: Keyword_adverse_event_reports
      groups:
        - match_style: word
          terms:
            - adverse event
            - adverse reaction
            - side effect
            - pharmacovigilance
            - safety report
            - health
            - biomedical
            - serious adverse event
            - drug reaction
            - incident report
            - post-market surveillance
            - causality assessment
      strength: specific
    - id: Keyword_global_top500_339_adverse_event_reports_domain_context
      groups:
        - match_style: word
          terms:
            - adverse event reports
            - adverse
            - event
            - reports
      strength: domain
created: '2026-02-08'
updated: '2026-07-09'
changelog:
