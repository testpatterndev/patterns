schema: testpattern/v1
name: Change management records
slug: global-top500-317-change-management-records
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies change management records patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:change\s+management|change\s+request|change\s+advisory\s+board|change\s+control|implementation\s+plan|rollback\s+plan|change\s+window|maintenance\s+window|approval\s+workflow|change\s+record)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - general-data-protection
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - change management records
    - change
    - management
    - records
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: change management
      description: Primary topic phrase match
    - value: change request
      description: Case-insensitive topic phrase match
    - value: change advisory board
      description: Alternative topic phrase match
    - value: change control
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_change_management
      matches:
        - ref: Pattern_global_top500_317_change_management_records_label_context
        - ref: Keyword_global_top500_317_change_management_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_317_change_management_records_noise_exclusion
    - confidence_level: 75
      id_match: Regex_change_management
      matches:
        - ref: Keyword_change_management
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_317_change_management_records_noise_exclusion
    - confidence_level: 65
      id_match: Regex_change_management
      matches:
        - ref: Keyword_change_management
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_317_change_management_records_noise_exclusion
  regexes:
    - id: Regex_change_management
      pattern: (?is)\b(?:change\s+management|change\s+request|change\s+advisory\s+board|change\s+control|implementation\s+plan|rollback\s+plan|change\s+window|maintenance\s+window|approval\s+workflow|change\s+record)\b
    - id: Pattern_global_top500_317_change_management_records_label_context
      pattern: (?i)\\b(?:change\\s+management\\s+records|change|management|top500)\\b
  keywords:
    - id: Keyword_change_management
      groups:
        - match_style: word
          terms:
            - change management
            - change request
            - change advisory board
            - CAB
            - change control
            - RFC
            - implementation plan
            - rollback plan
            - change window
            - maintenance window
            - approval workflow
            - change record
    - id: Keyword_global_top500_317_change_management_records_domain_context
      groups:
        - match_style: word
          terms:
            - change management records
            - change
            - management
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_317_change_management_records_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
created: '2026-02-08'
updated: '2026-03-06'
