schema: testpattern/v1
name: Wire transfer instructions
slug: au-top500-116-wire-transfer-instructions
version: 1.2.0
type: regex
engine: boost_regex
description: Detects references to wire transfer instructions in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:wire\s+transfer|telegraphic\s+transfer|beneficiary\s+account|correspondent\s+bank|international\s+transfer|funds\s+transfer|remitting\s+bank|wire\s+instruction|payment\s+order)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - wire transfer instructions
    - wire
    - transfer
    - instructions
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:

    - corporate-finance
test_cases:
  should_match:
    - value: wire transfer
      description: Primary topic phrase match
    - value: telegraphic transfer
      description: Case-insensitive topic phrase match
    - value: beneficiary account
      description: Alternative topic phrase match
    - value: correspondent bank
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_wire_transfer
      matches:
        - ref: Evidence_wire_transfer
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_wire_transfer
      matches:
        - ref: Evidence_wire_transfer
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_wire_transfer
      matches:
        - ref: Evidence_wire_transfer
  regexes:
    - id: Pattern_wire_transfer
      pattern: (?is)\b(?:wire\s+transfer|telegraphic\s+transfer|beneficiary\s+account|correspondent\s+bank|international\s+transfer|funds\s+transfer|remitting\s+bank|wire\s+instruction|payment\s+order)\b
  keywords:
    - id: Evidence_wire_transfer
      groups:
        - match_style: word
          terms:
            - wire transfer
            - telegraphic transfer
            - SWIFT
            - IFTI
            - beneficiary account
            - correspondent bank
            - AUSTRAC
            - international transfer
            - funds transfer
            - remitting bank
            - wire instruction
            - payment order
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
author: testpattern-community
license: MIT
references:
  - https://www.austrac.gov.au/business/core-guidance/reporting/money-transferred-and-overseas-international-funds-transfer-instruction-ifti-reports
  - https://www.austrac.gov.au/business/core-guidance/reporting
