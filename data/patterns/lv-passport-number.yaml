schema: testpattern/v1
name: Latvia Passport Number
slug: lv-passport-number
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Latvia passport number patterns. This pattern is based on a Microsoft Purview built-in sensitive information
  type. Users already running Purview may prefer to enable the built-in SIT directly, or use this version as a starting
  point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-latvia-passport-number Corroborative evidence: 3
  keywords within 300 characters. Keyword lists: pii-civic-credentials.
pattern: \b[A-Z]{2}\d{7}\b
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false
  positive rates.
jurisdictions:
  - lv
  - eu
regulations:
- BDSG
- "CNIL / LIL"
- GDPR
frameworks:
- ISO 27001
- ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - passport
    - travel document
    - passport number
  proximity: 300
  keyword_lists:

    - pii-civic-credentials
test_cases:
  should_match:
    - value: LV1234567
      description: Two-letter prefix with 7 digits
    - value: AB9876543
      description: Two-letter prefix with 7 digits
    - value: PK2345678
      description: Two-letter prefix with 7 digits
  should_not_match:
    - value: '1234567'
      description: Missing letter prefix
    - value: A12345678
      description: Single-letter prefix is invalid for this format
false_positives:
  - description: >-
      Generic alphanumeric sequences matching passport format in unrelated contexts.
    mitigation: >-
      Require corroborative evidence keywords within the proximity window.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_lv_passport
      matches:
        - ref: Keyword_lv_passport_specific
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_lv_passport
      matches:
        - ref: Keyword_lv_passport_general
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_lv_passport
  regexes:
    - id: Regex_lv_passport
      pattern: \b[A-Z]{2}\d{7}\b
  keywords:
    - id: Keyword_lv_passport_specific
      groups:
        - match_style: word
          terms:
            - pase
            - pases numurs
            - ceļošanas dokuments
            - Latvijas pase
            - Pilsonības un migrācijas lietu pārvalde
            - Latvian passport
            - passport number
            - pases nr
            - personu apliecinošs dokuments
      strength: specific
    - id: Keyword_lv_passport_general
      groups:
        - match_style: word
          terms:
            - passport
            - travel document
            - passport no
            - passport #
            - document number
            - identity document
            - travel ID
      strength: specific
risk_rating: 5
risk_description: >-
  The Latvian passport regex recognises two uppercase letters followed by seven digits with passport and civic context. A genuine value can connect a traveller to a document, visa, reservation, or border record and assist impersonation when combined with a name and birth details. The pattern does not establish holder, nationality, validity, expiry, photograph, or movement, and unrelated serial or administrative codes can share the form. Risk 5 OFFICIAL captures bounded travel-identity harm; SENSITIVE would require a verified passport record or attributable itinerary.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL-SENSITIVE"
  nz_gov: "RESTRICTED"
  ca_gov: "Protected B"
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-latvia-passport-number
    title: "Latvia passport number entity definition - Microsoft Learn"
