schema: testpattern/v1
name: Merchant acquiring credentials
slug: au-top500-111-merchant-acquiring-credentials
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: Detects references to merchant acquiring credentials in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: credentials.
pattern: (?is)\b(?:merchant\s+acquiring|acquiring\s+bank|terminal\s+ID|merchant\s+credentials)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - merchant acquiring credentials
    - merchant
    - acquiring
    - credentials
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - credentials
test_cases:
  should_match:
    - value: merchant acquiring
      description: Primary topic phrase match
    - value: merchant credentials
      description: Explicit credential-label phrase (discovery-only concept signal)
    - value: acquiring bank
      description: Alternative topic phrase match
    - value: terminal ID
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: bank transfer
      description: Generic word pair from old broad template should not match
    - value: PCI DSS card-acceptance policy for payment processing teams
      description: Compliance/processing topic terms were removed from the anchor — must not match
    - value: Merchant ID 482991; terminal ID 77881234
      description: Acquiring identifiers are not reusable authentication secrets — discovery only, must not enforce
    - value: merchant credentials
      description: Category label alone is a discovery-only concept signal — must not enforce
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 65
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_merchant_credentials
      matches:
        - ref: Evidence_merchant_credentials
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
  regexes:
    - id: Pattern_merchant_credentials
      pattern: (?is)\b(?:merchant\s+acquiring|acquiring\s+bank|terminal\s+ID|merchant\s+credentials)\b
  keywords:
    - id: Evidence_merchant_credentials
      groups:
        - match_style: word
          terms:
            - merchant acquiring
            - merchant ID
            - acquiring bank
            - terminal ID
            - merchant credentials
            - payment gateway
            - acquirer
            - PCI DSS
            - card acceptance
            - merchant account
            - settlement
            - payment processing
risk_description: >-
  The concept regex recognises merchant acquiring, merchant ID, acquiring bank, terminal ID, and credential-related context rather than a single validated password or secret. A genuine acquiring record can expose merchant and terminal identifiers or access material useful for transaction spoofing, settlement fraud, or targeted attacks on payment operations. The normal affected scale is one merchant or terminal, and public acquiring references or configuration documentation can match without usable credentials. Risk 7 SENSITIVE Financial reflects credible moderate harm from substantive acquiring data; PROTECTED would require privileged processor access, bulk merchant compromise, or significant payment-system damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Financial
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: 'SIT alignment wave1 (TP-00237, reduced scope): pure deletion/demotion — removed merchant ID, payment gateway, PCI DSS, card acceptance, merchant account, and payment processing from the anchor regex (pattern and Pattern_merchant_credentials); the remaining acquiring/credential-label anchors are demoted to a single 65 discovery_only tier (85/75/65 enforcement removed — this concept SIT cannot prove a live secret); merchant/terminal/gateway vocabulary retained in Evidence_merchant_credentials as context only; adversarial tests added. Deliberately less than the first-pass candidate: NO gateway-key/password/token secret-value branch (no defined token shapes or placeholder rules — deferred to a separately reviewed secret detector per QA).'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 712 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
