schema: testpattern/v1
name: Union membership status
slug: global-top500-068-union-membership-status
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to union membership status in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: corporate-ip. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:union\s+membership|trade\s+union|union\s+member|industrial\s+organisation|industrial\s+organization|union\s+delegate|union\s+dues|collective\s+bargaining|union\s+representative|industrial\s+action|union\s+affiliation|member\s+number|union\s+status)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - union membership status
    - union
    - membership
    - status
    - employment
    - workforce
    - records
  proximity: 300
  keyword_lists:
    - corporate-ip
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: union membership
      description: Primary topic phrase match
    - value: trade union
      description: Case-insensitive topic phrase match
    - value: union member
      description: Alternative topic phrase match
    - value: industrial organisation
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: employee interview
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to union membership status appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_union_membership
      matches:
        - ref: Evidence_union_membership
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_union_membership
      matches:
        - ref: Evidence_union_membership
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_union_membership
      matches:
        - ref: Evidence_union_membership
  regexes:
    - id: Pattern_union_membership
      pattern: >-
        (?is)\b(?:union\s+membership|trade\s+union|union\s+member|industrial\s+organisation|industrial\s+organization|union\s+delegate|union\s+dues|collective\s+bargaining|union\s+representative|industrial\s+action|union\s+affiliation|member\s+number|union\s+status)\b
    - id: Pattern_au_top500_068_union_membership_status_label_context
      pattern: (?i)\b(?:union\s+membership\s+status)\b
  keywords:
    - id: Evidence_union_membership
      groups:
        - match_style: word
          terms:
            - union membership
            - trade union
            - union member
            - industrial organisation
            - union delegate
            - union dues
            - collective bargaining
            - union representative
            - industrial action
            - union affiliation
            - member number
            - union status
    - id: Keyword_au_top500_068_union_membership_status_domain_context
      groups:
        - match_style: word
          terms:
            - union membership status
            - union
            - membership
            - status
risk_description: >-
  This concept pattern identifies union membership status, trade-union membership, union member, and closely related workforce language. When linked to a person, the result reveals an affiliation that may expose the employee to discrimination, workplace pressure, targeted persuasion, or retaliation. Collective bargaining commentary, union communications, and generic policy text can match without identifying any member, so the normal true positive must include attribution. Risk 8 SENSITIVE reflects the consequential personal status of an identified worker; PROTECTED would require a large membership register, acute safety threat, or significant industrial consequence.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
