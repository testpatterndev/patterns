schema: testpattern/v1
name: Credit scores
slug: global-top500-122-credit-scores
version: 1.0.0
type: regex
engine: boost_regex
description: Detects references to credit scores in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 5 keywords within 300 characters. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:credit\s+score|FICO\s+score|credit\s+rating|credit\s+assessment|risk\s+score|credit\s+bureau|score\s+range|credit\s+evaluation|credit\s+band|scoring\s+model)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - credit scores
    - credit
    - scores
    - lending
    - insurance
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: credit score
      description: Primary topic phrase match
    - value: fico score
      description: Case-insensitive topic phrase match
    - value: credit rating
      description: Alternative topic phrase match
    - value: credit assessment
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: credit premium
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_credit_scores
      matches:
        - ref: Pattern_global_top500_122_credit_scores_label_context
        - ref: Keyword_global_top500_122_credit_scores_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_122_credit_scores_noise_exclusion
    - confidence_level: 75
      id_match: Regex_credit_scores
      matches:
        - ref: Keyword_credit_scores
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_122_credit_scores_noise_exclusion
    - confidence_level: 65
      id_match: Regex_credit_scores
      matches:
        - ref: Keyword_credit_scores
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_122_credit_scores_noise_exclusion
  regexes:
    - id: Regex_credit_scores
      pattern: (?is)\b(?:credit\s+score|FICO\s+score|credit\s+rating|credit\s+assessment|risk\s+score|credit\s+bureau|score\s+range|credit\s+evaluation|credit\s+band|scoring\s+model)\b
    - id: Pattern_global_top500_122_credit_scores_label_context
      pattern: (?i)\\b(?:credit\\s+scores|credit|scores|top500)\\b
  keywords:
    - id: Keyword_credit_scores
      groups:
        - match_style: word
          terms:
            - credit score
            - FICO score
            - credit rating
            - creditworthiness
            - credit assessment
            - risk score
            - credit bureau
            - score range
            - credit evaluation
            - VantageScore
            - credit band
            - scoring model
    - id: Keyword_global_top500_122_credit_scores_domain_context
      groups:
        - match_style: word
          terms:
            - credit scores
            - credit
            - scores
            - top500
            - field
            - identifier
            - reference
    - id: Keyword_global_top500_122_credit_scores_noise_exclusion
      groups:
        - match_style: word
          terms:
            - sample
            - template
            - example
            - dummy
            - test data
            - training data
            - placeholder
            - mock
            - boilerplate
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
license: MIT
references:
  - https://www.oaic.gov.au/privacy/your-privacy-rights/credit-reporting/what-is-credit-reporting
  - https://www.oaic.gov.au/privacy/your-privacy-rights/credit-reporting/what-is-a-credit-report
