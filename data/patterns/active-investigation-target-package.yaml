schema: testpattern/v1
name: Active Investigation Target Package
slug: active-investigation-target-package
version: 1.0.0
type: keyword_proximity
engine: universal
description: Detects documents containing intelligence holdings, surveillance methods, evidence gaps, and investigative strategy against active criminal investigation targets. These target packages reveal the full picture of what police know and do not know about a suspect, enabling counter-surveillance and evidence destruction if disclosed.
operation: 'Keyword proximity: primary keywords (target package, target profile, person of interest, investigation target, intelligence assessment) within 300 characters of operational planning terms (surveillance plan, intercept, controlled operation, task force). Trainable classifier fallback recommended for QPS intelligence assessment templates. Negative keyword exclusion for media and academic contexts.'
pattern: (?i)\b(target\s+package|target\s+profile|investigation\s+target|intelligence\s+assessment|operational\s+intelligence|person\s+of\s+interest\s+(?:file|profile|package))\b
confidence: high
confidence_justification: 'High confidence: requires co-occurrence of intelligence assessment terminology with suspect identifiers and operational planning language. The density of co-occurring law enforcement intelligence terms within a document distinguishes genuine target packages from academic or media references to investigation concepts.'
jurisdictions:
  - au
regulations:
- "PPRA 2000 (Qld)"
- "Police Service Admin Act 1990 (Qld)"
frameworks:
- QGISCF
data_categories:
  - law-enforcement
  - government
corroborative_evidence:
  keywords:
    - PROTECTED
    - Law-Enforcement
    - QPS
    - Queensland Police
    - surveillance plan
    - intercept
    - controlled operation
    - task force
    - criminal history
    - associates
    - known addresses
    - vehicle details
    - phone numbers
    - evidence matrix
    - intelligence gap
    - operational planning
  proximity: 300
  keyword_lists:

    - law-enforcement

    - government-services
test_cases:
  should_match:
    - value: 'PROTECTED Law-Enforcement. Operation TRIDENT — Target Package. Subject: Anthony Paul MORRISON, DOB 15/03/1982. Intelligence assessment: Subject is assessed as the principal organiser of methamphetamine importation through Port of Brisbane. Surveillance plan attached. Known associates listed at Annexure B. Evidence matrix indicates gaps in financial trail.'
      description: QPS target package for active drug importation investigation
    - value: 'Investigation target profile update — Task Force SENTINEL. Person of interest: Craig HENDERSON. Operational intelligence summary: Subject has been observed meeting with known OMCG members at two locations. Intercept product confirms involvement in firearms trafficking. Controlled operation approval sought.'
      description: Task force target profile update with surveillance and intercept references
    - value: 'Operational intelligence briefing. Re: Target package compilation for Operation CERBERUS subjects. Intelligence assessment completed for all 14 persons of interest. Surveillance plan resources allocated. Evidence gaps identified in relation to subjects 3, 7, and 12. Task force meeting scheduled to review investigative strategy.'
      description: Multi-target operational intelligence briefing referencing evidence gaps and strategy
  should_not_match:
    - value: The Queensland Crime and Corruption Commission published its annual report detailing investigations into organised crime. The report noted an increase in persons of interest flagged across multiple task forces.
      description: Published CCC annual report with aggregate investigation statistics
    - value: In the crime novel 'Target Package' by author J. Black, Detective Morrison builds a case against a drug trafficking syndicate while navigating departmental politics.
      description: Crime fiction novel with investigation terminology
    - value: Criminology students at QUT completed a practical exercise compiling mock target packages for fictional persons of interest. The training exercise used fictional intelligence assessments.
      description: University training exercise using fictional scenarios
false_positives:
  - description: Published annual reports from law enforcement agencies using aggregate investigation terminology
    mitigation: 'Negative keyword exclusion: ''annual report'', ''published'', ''reporting period'', ''aggregate''. Require proximity to specific suspect identifiers.'
  - description: Academic criminology coursework and training exercises
    mitigation: 'Negative keyword exclusion: ''training exercise'', ''fictional'', ''mock'', ''university'', ''coursework'', ''academic'', ''simulated'''
  - description: Crime fiction depicting police investigations
    mitigation: 'Negative keyword exclusion: ''novel'', ''fiction'', ''author'', ''character'', ''chapter'''
  - description: Media reporting on concluded police operations
    mitigation: 'Negative keyword exclusion: ''media release'', ''news article'', ''reported'', ''convicted'', ''sentenced'', ''court heard'''
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_active_investigation_target_package_target_package_terms
      matches:
        - ref: Evidence_active_investigation_target_package_primary_keywords
        - ref: Evidence_active_investigation_target_package_classification_markers
        - ref: Evidence_active_investigation_target_package_corroborative_terms
        - ref: Pattern_active_investigation_target_package_operation_name
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_active_investigation_target_package_exclusion
    - confidence_level: 75
      id_match: Pattern_active_investigation_target_package_target_package_terms
      matches:
        - ref: Evidence_active_investigation_target_package_primary_keywords
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_active_investigation_target_package_exclusion
    - confidence_level: 65
      id_match: Pattern_active_investigation_target_package_target_package_terms
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Filter_active_investigation_target_package_exclusion
  regexes:
    - id: Pattern_active_investigation_target_package_target_package_terms
      pattern: (?i)\b(target\s+package|target\s+profile|investigation\s+target|intelligence\s+assessment|operational\s+intelligence|person\s+of\s+interest)\b
    - id: Pattern_active_investigation_target_package_operation_name
      pattern: (?i)\bOperation\s+[A-Z]{3,15}\b
  keywords:
    - id: Evidence_active_investigation_target_package_primary_keywords
      groups:
        - match_style: word
          terms:
            - target package
            - target profile
            - investigation target
            - intelligence assessment
            - operational intelligence
            - person of interest file
            - person of interest profile
            - intelligence holding
            - evidence matrix
    - id: Evidence_active_investigation_target_package_classification_markers
      groups:
        - match_style: word
          terms:
            - PROTECTED
            - Law-Enforcement
            - RESTRICTED
            - INTELLIGENCE
            - SENSITIVE
    - id: Evidence_active_investigation_target_package_corroborative_terms
      groups:
        - match_style: word
          terms:
            - QPS
            - Queensland Police
            - surveillance plan
            - intercept
            - controlled operation
            - task force
            - criminal history
            - known associates
            - evidence gap
            - operational planning
            - investigative strategy
    - id: Filter_active_investigation_target_package_exclusion
      groups:
        - match_style: word
          terms:
            - media release
            - published
            - annual report
            - training exercise
            - fictional
            - novel
            - academic
            - university
            - news article
            - convicted
            - sentenced
            - mock
            - simulated
            - coursework

risk_rating: 9
risk_description: "Intelligence holdings, surveillance methods, and investigative strategy against active criminal targets; disclosure enables counter-surveillance and evidence destruction."
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Law-Enforcement
references: []
created: '2026-02-20'
updated: '2026-03-06'
author: qld-gov-dlp
source: qld-custom
