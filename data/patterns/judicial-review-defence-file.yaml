schema: testpattern/v1
name: Judicial Review Defence File
slug: judicial-review-defence-file
version: 1.3.0
type: keyword_proximity
pattern_class: concept
engine: universal
description: Detects government defence materials for judicial review of administrative decisions. These files contain the State's candid assessment of decision-making deficiencies and legal vulnerabilities. Disclosure directly prejudices the State's defence and may establish precedent affecting thousands of similar decisions.
operation: 'Primary detection: keyword proximity matching judicial review terms (''judicial review'', ''JR proceedings'', ''administrative review'') within 200 characters of defence/privilege indicators (''defence'', ''defence strategy'', ''respondent'', ''grounds'', ''privilege'', ''PROTECTED''). Combined with government entity context (Queensland Government, State of Queensland, Director-General). Corroborative evidence: 3 keywords within 300 characters.'
pattern: (?i)\b(?:judicial\s+review|JR\s+proceedings|administrative\s+review)\b
confidence: medium
confidence_justification: 'Medium confidence: Judicial review + government respondent + privilege markers is a precise combination targeting government JR defence files. The requirement for government entity context eliminates private sector JR materials.'
jurisdictions:
  - au
regulations:
- "Evidence Act 1977 (Qld)"
- "Judicial Review Act 1991 (Qld)"
frameworks:
- QGISCF
data_categories:
  - legal
  - government
corroborative_evidence:
  keywords:
    - defence
    - defence strategy
    - respondent
    - grounds
    - privilege
    - PROTECTED
    - Director-General
    - State of Queensland
    - decision-maker
    - jurisdictional error
    - unreasonableness
    - natural justice
  proximity: 300
  keyword_lists:

    - corporate-legal

    - government-services
test_cases:
  should_match:
    - value: |-
        PROTECTED — LEGAL PROFESSIONAL PRIVILEGE
        Judicial Review Defence File

        Matter: ABC Pty Ltd v Director-General, Department of State Development
        Proceedings: Judicial Review Act 1991 (Qld)

        Defence Strategy:
        The respondent's position on the ground of jurisdictional error is vulnerable. The decision-maker failed to consider a mandatory relevant consideration.
      description: JR defence file with privilege marking and vulnerability assessment
    - value: 'This privileged memorandum addresses our defence strategy for the JR proceedings commenced by the mining company. The administrative review challenges the Director-General''s refusal to grant the environmental authority. Key weakness: natural justice breach.'
      description: Privileged JR defence strategy memo
    - value: |-
        CONFIDENTIAL
        Judicial Review — Respondent's Strategy
        State of Queensland (Department of Environment and Science)

        Grounds of review: unreasonableness, failure to consider relevant matters
        Assessment: Moderate risk of adverse finding on ground 2
      description: JR respondent strategy with risk assessment
  should_not_match:
    - value: The Supreme Court allowed the judicial review application in Smith v Director-General [2024] QSC 89. The published reasons found that the decision-maker had committed jurisdictional error.
      description: Published judicial review decision
    - value: This textbook chapter provides an overview of judicial review in Queensland under the Judicial Review Act 1991. Students should understand the available grounds of review.
      description: Academic textbook on judicial review
    - value: The Ombudsman's annual report noted an increase in administrative review complaints across government agencies. The public report recommends improvements to decision-making processes.
      description: Published Ombudsman report on administrative review
false_positives:
  - description: Published judicial review decisions from courts
    mitigation: Negative match on court citation formats [YYYY] QSC, [YYYY] QCA and 'published reasons'
  - description: Academic materials on judicial review
    mitigation: Require co-occurrence with government respondent entity names and privilege markers
  - description: Ombudsman or tribunal public reports
    mitigation: Negative match on 'annual report', 'public report', 'published', 'tabled'
  - description: Applicant-side judicial review materials
    mitigation: Require government respondent context (State of Queensland, Director-General, department names)
exports:
  - purview_xml
  - yaml
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_judicial_review_defence_file_judicial_review_terminology
      matches:
        - ref: Evidence_judicial_review_defence_file_primary
        - ref: Evidence_judicial_review_defence_file_corroborative
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_judicial_review_defence_file_exclusion
        - ref: Pattern_judicial_review_defence_file_government_entity_reference
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Pattern_judicial_review_defence_file_judicial_review_terminology
      matches:
        - ref: Evidence_judicial_review_defence_file_primary
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_judicial_review_defence_file_judicial_review_terminology
  regexes:
    - id: Pattern_judicial_review_defence_file_judicial_review_terminology
      pattern: (?i)\b(?:judicial\s+review|JR\s+proceedings|administrative\s+review)\b
    - id: Pattern_judicial_review_defence_file_government_entity_reference
      pattern: (?i)\b(?:Director-General|State\s+of\s+Queensland)\b
  keywords:
    - id: Evidence_judicial_review_defence_file_primary
      groups:
        - match_style: word
          terms:
            - judicial review
            - JR proceedings
            - administrative review
            - judicial review defence
      strength: specific
    - id: Evidence_judicial_review_defence_file_corroborative
      groups:
        - match_style: word
          terms:
            - defence
            - defence strategy
            - respondent
            - grounds
            - privilege
            - PROTECTED
            - Director-General
            - State of Queensland
            - decision-maker
            - jurisdictional error
            - unreasonableness
      strength: domain
    - id: Evidence_judicial_review_defence_file_exclusion
      groups:
        - match_style: word
          terms:
            - published reasons
            - tabled
            - annual report
            - textbook
            - public report

      strength: noise
risk_rating: 8
risk_description: Government defence materials for judicial review of administrative decisions. Disclosure reveals the State's assessment of decision-making vulnerabilities and defence strategy against JR challenges. Legislative review (Mar 2026) established BIL:2 — Evidence Act 1977 (Qld) defines legal professional privilege as an evidentiary rule without criminal penalties for disclosure. RTI Act 2009 Sch3 s7 exempts from compelled disclosure but does not mandate PROTECTED classification.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: "SENSITIVE Legal"
references: []
