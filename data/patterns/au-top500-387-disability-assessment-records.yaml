schema: testpattern/v1
name: Disability assessment records
slug: au-top500-387-disability-assessment-records
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to disability assessment records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: pii-personal. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:disability\s+assessment\s+records|functional\s+capacity|support\s+plan|access\s+request|disability\s+support\s+pension|allied\s+health)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - disability assessment records
    - disability
    - assessment
    - records
    - government
    - citizen
    - services
  proximity: 300
  keyword_lists:
    - pii-personal
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: disability assessment records
      description: Primary topic phrase match
    - value: functional capacity
      description: Case-insensitive topic phrase match
    - value: support plan
      description: Alternative topic phrase match
    - value: access request
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: welfare registry
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to disability assessment records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_disability_assessment
      matches:
        - ref: Evidence_disability_assessment
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_disability_assessment
      matches:
        - ref: Evidence_disability_assessment
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_disability_assessment
      matches:
        - ref: Evidence_disability_assessment
  regexes:
    - id: Pattern_disability_assessment
      pattern: (?is)\b(?:disability\s+assessment\s+records|functional\s+capacity|support\s+plan|access\s+request|disability\s+support\s+pension|allied\s+health)\b
    - id: Pattern_au_top500_387_disability_assessment_records_label_context
      pattern: (?i)\b(?:disability\s+assessment\s+records)\b
  keywords:
    - id: Evidence_disability_assessment
      groups:
        - match_style: word
          terms:
            - disability assessment records
            - disability
            - assessment
            - NDIS
            - functional capacity
            - support plan
            - impairment
            - access request
            - participant
            - disability support pension
            - allied health
    - id: Keyword_au_top500_387_disability_assessment_records_domain_context
      groups:
        - match_style: word
          terms:
            - disability assessment records
            - disability
            - assessment
risk_description: >-
  The detector identifies disability assessment records, functional-capacity evaluations, support plans, access requests, reasonable adjustments, and associated personal context. A genuine assessment can expose diagnoses or inferred conditions, daily limitations, clinician judgments, support eligibility, family circumstances, and requested accommodations, enabling stigma, benefit fraud, discrimination, or denial of opportunity. The normal record concerns one person rather than a disability-services register, so the impact is serious and individual but contained. Risk 8 and SENSITIVE are justified; PROTECTED would require bulk vulnerable-person assessments, coercive control, or compromise causing significant irreversible harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
