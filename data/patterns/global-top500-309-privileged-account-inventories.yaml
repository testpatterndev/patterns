schema: testpattern/v1
name: Privileged account inventories
slug: global-top500-309-privileged-account-inventories
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies privileged account inventories patterns in security and access control contexts. Detects potential exposure of sensitive security information in international systems.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:privileged\s+account|privileged\s+access|service\s+account|admin\s+account|privileged\s+identity|domain\s+admin|root\s+account|break\s+glass|credential\s+vault|access\s+review)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - privileged account inventories
    - privileged
    - account
    - inventories
    - operations
    - resilience
  proximity: 300
test_cases:
  should_match:
    - value: privileged account
      description: Primary topic phrase match
    - value: privileged access
      description: Case-insensitive topic phrase match
    - value: service account
      description: Alternative topic phrase match
    - value: admin account
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: backup outage
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_privileged_accounts
      matches:
        - ref: Pattern_global_top500_309_privileged_account_inventories_label_context
        - ref: Keyword_global_top500_309_privileged_account_inventories_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_privileged_accounts
      matches:
        - ref: Keyword_privileged_accounts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_privileged_accounts
      matches:
        - ref: Keyword_privileged_accounts
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_privileged_accounts
      pattern: (?is)\b(?:privileged\s+account|privileged\s+access|service\s+account|admin\s+account|privileged\s+identity|domain\s+admin|root\s+account|break\s+glass|credential\s+vault|access\s+review)\b
    - id: Pattern_global_top500_309_privileged_account_inventories_label_context
      pattern: (?i)\\b(?:privileged\\s+account\\s+inventories|privileged|account|inventories|top500)\\b
  keywords:
    - id: Keyword_privileged_accounts
      groups:
        - match_style: word
          terms:
            - privileged account
            - privileged access
            - service account
            - admin account
            - PAM
            - privileged identity
            - domain admin
            - root account
            - break glass
            - credential vault
            - access review
            - entitlement
    - id: Keyword_global_top500_309_privileged_account_inventories_domain_context
      groups:
        - match_style: word
          terms:
            - privileged account inventories
            - privileged
            - account
            - inventories
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
