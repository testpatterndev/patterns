schema: testpattern/v1
name: Signals intelligence reports
slug: global-top500-425-signals-intelligence-reports
version: 1.2.3
type: regex
pattern_class: concept
engine: boost_regex
description: Identifies documents containing references to signals intelligence reports in international contexts. This information
  type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific
  content. Corroborative evidence: 1 keywords within 240 characters. Uses additional domain-context evidence and explicit
  exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:signals\s+intelligence|intercept\s+report|signal\s+intercept|electronic\s+surveillance|communications\s+intelligence|technical\s+collection|frequency\s+analysis|traffic\s+analysis)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
  Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
- global
regulations:
- GDPR
data_categories:
- pii
corroborative_evidence:
  keywords:
  - signals intelligence reports
  proximity: 240
test_cases:
  should_match:
  - value: signals intelligence
    description: Primary topic phrase match
  - value: intercept report
    description: Case-insensitive topic phrase match
  - value: signal intercept
    description: Alternative topic phrase match
  - value: electronic surveillance
    description: Additional topic phrase match
  should_not_match:
  - value: unrelated generic text without domain phrases
    description: No relevant topic phrases present
  - value: placeholder value 12345
    description: Random text should not match topic-specific regex
  - value: classified contingency
    description: Generic word pair from old broad template should not match
false_positives:
- description: Common words and phrases related to signals intelligence reports appearing in policy documents, training materials,
    HR templates, or compliance guidelines without actual personal data.
  mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather
    than general discussion.
- description: In English (as the primary international business language), similar terminology used in formal or administrative
    contexts (education, professional documentation) that does not constitute sensitive data collection.
  mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers
    to distinguish sensitive records from general references.
- description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is
    significantly higher than specific identifier patterns.
  mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary
    validation.
exports:
- purview_xml
- yaml
- regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
  - dict: template-exclusion
    as: Keyword_noise_exclusion
    match_style: word
  pattern_tiers:
  - confidence_level: 85
    id_match: Regex_signals_intelligence_reports
    matches:
    - ref: Pattern_global_top500_425_signals_intelligence_reports_label_context
    - ref: Keyword_global_top500_425_signals_intelligence_reports_domain_context
    - ref: Keyword_signals_intelligence_reports
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 75
    id_match: Regex_signals_intelligence_reports
    matches:
    - ref: Pattern_global_top500_425_signals_intelligence_reports_label_context
    - ref: Keyword_global_top500_425_signals_intelligence_reports_domain_context
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  - confidence_level: 65
    discovery_only: true
    id_match: Regex_signals_intelligence_reports
    matches:
    - type: any
      min_matches: 0
      max_matches: 0
      refs:
      - Keyword_noise_exclusion
  regexes:
  - id: Regex_signals_intelligence_reports
    pattern: (?is)\b(?:signals\s+intelligence|intercept\s+report|signal\s+intercept|electronic\s+surveillance|communications\s+intelligence|technical\s+collection|frequency\s+analysis|traffic\s+analysis)\b
  - id: Pattern_global_top500_425_signals_intelligence_reports_label_context
    pattern: (?i)\b(?:signals\s+intelligence\s+reports)\b
  keywords:
  - id: Keyword_signals_intelligence_reports
    groups:
    - match_style: word
      terms:
      - signals intelligence
      - SIGINT
      - COMINT
      - ELINT
      - intercept report
      - signal intercept
      - electronic surveillance
      - communications intelligence
      - technical collection
      - frequency analysis
      - traffic analysis
      - cryptanalysis
    strength: specific
  - id: Keyword_global_top500_425_signals_intelligence_reports_domain_context
    groups:
    - match_style: word
      terms:
      - signals intelligence reports
      - signals
      - intelligence
      - reports
    strength: domain
risk_description: This concept classifier recognises signals intelligence, intercept reports, signal intercepts, and electronic-surveillance
  reports in government context. A real report can reveal monitored emitters, communications patterns, analytic judgments,
  target activity, and collection focus, helping an adversary change behaviour or infer surveillance coverage. The ordinary
  bounded report can cause serious intelligence harm but the phrase-level detector does not prove sensitive collection capabilities,
  cryptologic methods, or a current high-value target. For the global catalogue analogue, the confirmed substantive record
  is the consequence unit. A genuine SIGINT report exposes selectors, intercepted material, collection coverage, targets and
  analytic capability. Loss enables surveillance evasion and damages protected intelligence capabilities and partnerships.
  Risk 10 and PROTECTED Government therefore apply to the confirmed record itself. Require SIGINT/collection terminology plus
  selectors, intercept/report structure, caveats or classification markers at tier 85. This is confidence and exception handling,
  not a reason to reduce the consequence of a true positive.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Secret
