  - pregnancy
  - miscarriage
  - contraception
  - contraceptive
  - fertility
  - IVF
  - in vitro fertilization
  - menstrual cycle
  - mifepristone
  - misoprostol
  - Plan B pill
  - Plan B emergency contraceptive
  - emergency contraception
  - gender-affirming care
  - gender reassignment
  - hormone therapy
  - STI status
  - HIV status
  - reproductive health
  - sexual health
  - prenatal care
  - postpartum
