schema: testpattern/v1
name: Reproductive & Sexual Health Data
slug: global-reproductive-health-data
version: 1.3.1
type: keyword_list
pattern_class: concept
engine: universal
description: >-
  Detects references to reproductive and sexual-health data: pregnancy, abortion, contraception,
  fertility treatment, gender-affirming care and STI/HIV status. Washington's My Health My Data Act
  (and a wave of post-Dobbs state consumer-health-data laws) treat this as protected consumer health
  data. Topic-grade vocabulary detector.
operation: >-
  Phrase regex matching indicative reproductive / sexual-health terminology. Detects the presence of
  reproductive-health subject matter; pair with corroborative keywords (patient, clinic, diagnosis) to
  raise precision. Not a structured-token detector.
pattern: '(?i)\b(?:abortion|pregnan(?:cy|t)|miscarriage|contracepti(?:on|ve|ves)|fertility\s+treatments?|in\s+vitro\s+fertili[sz]ation|IVF|menstrual\s+cycle|mifepristone|misoprostol|Plan\s+B|emergency\s+contraception|gender[\s-]+affirming\s+care|gender\s+reassignment|hormone\s+(?:replacement\s+)?therapy|STI\s+status|STD\s+status|HIV\s+status|reproductive\s+health|sexual\s+health|prenatal\s+care|postpartum)\b'
confidence: low
confidence_justification: >-
  Low by design. Reproductive-health status is detected by topic vocabulary, not a fixed format. Terms
  like "Plan B" or "fertility" appear in unrelated everyday prose; pair with corroborative keywords
  (patient, clinic, diagnosis, record) within the proximity window to raise precision.
jurisdictions:
  - global
  - us
regulations:
  - HIPAA
  - GDPR
frameworks:
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - phi
  - health
corroborative_evidence:
  keywords:
    - patient
    - clinic
    - diagnosis
    - medical record
    - prescription
    - provider
    - appointment
    - lab result
  proximity: 300
test_cases:
  should_match:
    - value: 'Patient record notes the prescription of mifepristone for the procedure.'
      description: Mifepristone term present in a clinical context
    - value: 'The clinic confirmed the pregnancy and scheduled prenatal care follow-up.'
      description: Pregnancy / prenatal care terms present
    - value: 'Referral for gender-affirming care was added to the patient chart.'
      description: Gender-affirming care term present
    - value: 'Lab result shows HIV status pending confirmation from the provider.'
      description: HIV status term present
  should_not_match:
    - value: 'The quarterly sales report shows revenue grew across all regions.'
      description: Unrelated business prose, no health terms
    - value: 'We need a backup plan before the launch deadline next week.'
      description: Near-miss prose ("plan" but not "Plan B"), no reproductive terms
    - value: 'The engineering team merged the new feature branch this morning.'
      description: Unrelated prose with no reproductive-health vocabulary
false_positives:
  - description: >-
      Generic terms like "Plan B", "fertility" or "sexual health" appear in colloquial, agricultural,
      or marketing prose unrelated to an identifiable person's health record.
    mitigation: >-
      Require corroborative clinical keywords (patient, clinic, diagnosis, provider, record) within the
      proximity window; treat isolated colloquial hits as low confidence.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: broad
risk_rating: 7
risk_description: >-
  The low-confidence list finds reproductive and sexual-health terms including pregnancy, contraception, abortion medicines, fertility treatment, gender-affirming care, and STI or HIV references; it signals subject matter rather than a structured patient record. When linked to a person, such material can expose intimate care choices and create stigma, discrimination, family conflict, or legal targeting. Isolated terms also appear in legislation, public-health guidance, agricultural fertility discussion, marketing, and colloquial uses, so identity and clinical context are material to the harm. Risk 7 and SENSITIVE preserve protection for real consumer-health data, while risk 8 or PROTECTED requires a named patient, diagnosis or treatment record, reproductive case file, bulk holding, or severe safety context.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-06-13'
updated: '2026-07-14'
