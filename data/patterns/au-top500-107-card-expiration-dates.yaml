schema: testpattern/v1
name: Card expiration dates
slug: au-top500-107-card-expiration-dates
version: 1.4.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Detects references to card expiration dates in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation. Phrase-level
  concept detection anchored on card-specific expiry vocabulary; it does not parse MM/YY or month-year values.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters.'
pattern: (?is)\b(?:card\s+expiration\s+date|valid\s+thru|card\s+expires|card\s+validity)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - SOCI Act 2018 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
  - PCI-DSS
  - SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - card expiration dates
    - card
    - expiration
    - dates
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: card expiration date
      description: Primary topic phrase match
    - value: valid thru
      description: Alternative topic phrase match
    - value: card expires
      description: Additional topic phrase match
    - value: card validity
      description: Card-specific validity phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
    - value: Software licence expiry date.
      description: Generic expiry-date wording demoted out of the primary - non-card expiries must not anchor
    - value: PCI DSS cardholder data policy
      description: PCI and payment wording demoted out of the primary - corroborative evidence only
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_card_expiration_dates
      matches:
        - ref: Evidence_card_expiration_dates
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_card_expiration_dates
      matches:
        - ref: Evidence_card_expiration_dates
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_card_expiration_dates
      matches:
        - ref: Evidence_card_expiration_dates
  regexes:
    - id: Pattern_card_expiration_dates
      pattern: (?is)\b(?:card\s+expiration\s+date|valid\s+thru|card\s+expires|card\s+validity)\b
  keywords:
    - id: Evidence_card_expiration_dates
      groups:
        - match_style: word
          terms:
            - card expiration date
            - expiry date
            - valid thru
            - card expires
            - expiration month
            - expiration year
            - PCI DSS
            - cardholder data
            - payment card
            - card-not-present
            - card validity
            - MM/YY
risk_description: >-
  The detector recognises card-expiration-date, expiry-date, valid-thru, and card-expires phrases with surrounding financial terminology; it does not parse a month and year. An actual expiry date marginally improves card-fraud attempts when combined with a PAN and other details, but the topic phrase alone is not actionable. The cardholder faces low standalone exposure, and forms, payment guidance, or unrelated expiry references remain plausible without a linked value. Risk 4 OFFICIAL is proportionate; SENSITIVE would require a real expiration value connected to an identifiable card account.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-17'
changelog:
  - version: 1.4.0
    date: '2026-07-17'
    description: 'Reduced-scope alignment fix (TP-00234): narrow the primary IdMatch to card-specific expiry anchors (card expiration date, valid thru, card expires, card validity); generic expiry-date, expiration-month/year, PCI DSS, cardholder-data, and payment-card wording is demoted to corroborative evidence only, so software-licence and document expiries can no longer satisfy enforceable tiers. MM/YY value parsing rejected for this concept SIT (a card-linked expiry-value identifier would be a separate classifier).'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 709 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
