schema: testpattern/v1
name: EU National Identification Number
slug: eu-national-id
version: 1.3.1
type: regex
pattern_class: concept
engine: universal
description: >-
  Detects references to EU National Identification Number using keyword matching. This pattern is based on a Microsoft Purview built-in sensitive information type. Users already running Purview may
  prefer to enable the built-in SIT directly, or use this version as a starting point for customisation.
operation: >-
  Reference: https://learn.microsoft.com/en-us/purview/sit-defn-eu-national-identification-number Keyword-based detection for EU-wide keyword-based detection for national identification number
  references across member states. Keyword lists: pii-civic-credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
confidence: medium
confidence_justification: >-
  Medium confidence: pattern has structural constraints but corroborative keywords are recommended to reduce false positive rates. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - eu
regulations:
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - government-id
corroborative_evidence:
  keywords:
    - national identification
    - identity number
    - national ID
    - personalausweis
    - carte nationale
  proximity: 300
  keyword_lists:
    - pii-civic-credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: national identification number
      description: English keyword match
    - value: personalausweis
      description: German keyword match
    - value: carte nationale d'identité
      description: French keyword match
  should_not_match:
    - value: employee badge number
      description: Non-identity reference
    - value: serial number
      description: Generic number reference
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Broad keyword matching across EU languages may match general policy discussion, training materials, or compliance documentation.
    mitigation: Layer with additional contextual signals such as structured identifiers or form fields to distinguish actual data from policy references.
  - description: In multiple languages, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Keyword_eu_national_id_primary
      matches:
        - ref: Pattern_eu_national_id_label_context
        - ref: Keyword_eu_national_id_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Keyword_eu_national_id_primary
      matches:
        - ref: Keyword_eu_national_id_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Keyword_eu_national_id_primary
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  keywords:
    - id: Keyword_eu_national_id_primary
      groups:
        - match_style: word
          terms:
            - national identification
            - identity number
            - national ID
            - personalausweis
            - carte nationale
            - carta d'identità
            - documento nacional de identidad
            - text: DNI
              case_sensitive: true
            - identitetsbevis
            - henkilöllisyystodistus
            - identiteitsbewijs
            - bilhete de identidade
      strength: specific
    - id: Keyword_eu_national_id_context
      groups:
        - match_style: word
          terms:
            - identification number
            - identity card
            - identity document
            - ID card
            - Personalausweisnummer
            - numéro d'identité
            - numero di identità
            - número de identidad
            - Ausweisnummer
            - identitätsnummer
            - government ID
            - national register
      strength: specific
    - id: Keyword_eu_national_id_domain_context
      groups:
        - match_style: word
          terms:
            - eu national identification number
            - national
      strength: domain
  regexes:
    - id: Pattern_eu_national_id_label_context
      pattern: (?i)\b(?:national\s+identification\s+number|personalausweis|carte\s+nationale|documento\s+nacional\s+de\s+identidad|identity\s+card\s+number)\b
risk_rating: 5
risk_description: >-
  This concept regex recognises phrases such as national identification number, Personalausweis, carte nationale, documento nacional de identidad, and identity card number across EU languages. It does not extract or validate any member-state identifier value, so the match is primarily a document label or discussion topic that can help locate identity material. Harm to a person requires a populated number and attributable context, while policies, training, and compliance guidance are documented benign sources. Risk 5 OFFICIAL recognises the locator value of a genuine identity-record heading; SENSITIVE would require confirmation of an actual identifier or composite identity file.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-eu-national-identification-number
    title: EU National Identification Number entity definition - Microsoft Learn
created: '2026-02-09'
updated: '2026-07-14'
