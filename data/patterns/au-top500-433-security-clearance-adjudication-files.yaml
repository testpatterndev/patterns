schema: testpattern/v1
name: Security clearance adjudication files
slug: au-top500-433-security-clearance-adjudication-files
version: 1.2.0
type: regex
engine: boost_regex
description: Identifies documents containing references to security clearance adjudication files in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act 1988.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword lists: au-government-security-clearances.'
pattern: (?is)\b(?:security\s+clearance|clearance\s+level|top\s+secret|negative\s+vetting|positive\s+vetting|personnel\s+security|background\s+check|national\s+security|defense\s+clearance)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
frameworks:
- ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - security clearance adjudication files
    - security
    - clearance
    - adjudication
    - files
    - defense
    - intelligence
  proximity: 300
  keyword_lists:

    - au-government-security-clearances
test_cases:
  should_match:
    - value: security clearance
      description: Primary topic phrase match
    - value: clearance level
      description: Case-insensitive topic phrase match
    - value: top secret
      description: Alternative topic phrase match
    - value: negative vetting
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: classified contingency
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to security clearance adjudication files appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_security_clearance_adjudication
      matches:
        - ref: Evidence_security_clearance_adjudication
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_security_clearance_adjudication
      matches:
        - ref: Evidence_security_clearance_adjudication
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_security_clearance_adjudication
      matches:
        - ref: Evidence_security_clearance_adjudication
  regexes:
    - id: Pattern_security_clearance_adjudication
      pattern: (?is)\b(?:security\s+clearance|clearance\s+level|top\s+secret|negative\s+vetting|positive\s+vetting|personnel\s+security|background\s+check|national\s+security|defense\s+clearance)\b
  keywords:
    - id: Evidence_security_clearance_adjudication
      groups:
        - match_style: word
          terms:
            - security clearance
            - adjudication
            - vetting
            - clearance level
            - top secret
            - negative vetting
            - positive vetting
            - AGSVA
            - personnel security
            - background check
            - national security
            - defense clearance
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: Secret
  uk_gov: SECRET
  nz_gov: SECRET
  ca_gov: Secret
