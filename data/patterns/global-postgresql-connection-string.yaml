schema: testpattern/v1
name: Postgresql
slug: global-postgresql-connection-string
version: 1.3.2
type: regex
pattern_class: identifier
engine: universal
description: Detects Postgresql patterns.
operation: 'Corroborative evidence: 8 keywords within 300 characters. Keyword lists: credentials. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: postgres(ql)?://[^:]+:[^@]+@[^/]+/\S+
confidence: high
confidence_justification: >-
  High confidence: structurally constrained pattern with corroborative keyword support reduces false positive rates significantly. Added context gating and exclusion rules improve precision and reduce
  incidental matches.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - api key
    - api_key
    - apikey
    - access key
    - secret key
    - private key
    - auth token
    - authorization
  proximity: 300
  keyword_lists:
    - credentials
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: postgresql://user:pass@localhost/mydb
      description: Exact 65 probe - complete credential URI without independent config labeling
    - value: 'POSTGRES_URL=postgres://admin:S3cretValue@db.internal/prod'
      description: Exact 75 probe - credential URI in a PostgreSQL-specific config field
    - value: 'PostgreSQL production PGURI=postgresql://app:S3cretValue@10.0.0.1/data?sslmode=require'
      description: Exact 85 probe - provider config label plus required TLS option
  should_not_match:
    - value: postgresql://localhost/mydb
      description: Missing credentials (no user:pass@ section)
    - value: postgresql://user:pass@localhost
      description: Missing database name after host
    - value: psql://user:pass@localhost/mydb
      description: Wrong scheme (psql instead of postgres/postgresql)
    - value: 'MONGODB_URI=postgresql://user:pass@localhost/mydb'
      description: Sibling database config label does not corroborate a PostgreSQL URI
    - value: 'postgresql://user:@localhost/mydb'
      description: Malformed connection has an empty password
    - value: 'Documentation example: PostgreSQL PGURI=postgresql://user:changeme@db.example.com/example?sslmode=require'
      description: Documentation placeholder with TLS context is excluded
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Authentication-related terminology in software documentation, security training materials, or system architecture descriptions without actual credentials.
    mitigation: Require proximity to credential-specific patterns (API keys, connection strings, tokens) rather than general security terminology.
  - description: Code snippets and configuration examples containing credential-related keywords or placeholder values in developer documentation.
    mitigation: Check for common placeholder patterns (example.com, localhost, 0000) and documentation file types to reduce false positives from technical writing.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: specific
risk_description: >-
  The regex identifies a postgres or postgresql URI containing user, password, host, and database path, making the match a complete login route to a named database. If the endpoint is reachable and credentials remain active, an attacker can use the account's grants to read or alter schema content and disrupt dependent applications. The ordinary affected unit is one PostgreSQL identity and database, though its record volume may be substantial; local examples and revoked accounts can be harmless. Risk 8 SENSITIVE represents serious but contained data and service harm, while PROTECTED needs confirmed privileged access to significant protected or critical holdings.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_postgresql_connection
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_postgresql_connection
      matches:
        - ref: Pattern_postgresql_config_label
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_postgresql_connection
      matches:
        - ref: Pattern_postgresql_config_label
        - ref: Pattern_postgresql_tls_or_topology
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_postgresql_connection
      pattern: postgres(ql)?://[^:]+:[^@]+@[^/]+/\S+
    - id: Pattern_postgresql_config_label
      pattern: (?i)\b(?:POSTGRES_URL|POSTGRESQL_URL|PGURI)\s*[=:]
    - id: Pattern_postgresql_tls_or_topology
      pattern: (?i)[?&](?:sslmode=(?:require|verify-ca|verify-full)|target_session_attrs=)
created: '2026-02-08'
updated: '2026-07-19'
changelog:
  - version: 1.3.2
    date: '2026-07-19'
    description: 'Replace duplicated high tiers with an individual 65 URI discovery / 75 PostgreSQL-config / 85 TLS-or-topology contract and exact-tier, sibling-database, malformed, and documentation probes.'
  - version: 1.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1262 without changing detector or package metadata.'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.2.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.2.0
    date: '2026-07-04'
    description: 'Restore the pattern_tiers entry for the previously-orphaned domain-specific keyword group: a same-bucket tier collapse (Task 5) kept only the weak, self-referential label/domain-context evidence and discarded the substantive keyword evidence at the same confidence level'
