schema: testpattern/v1
name: Campaign donor identity records
slug: au-top500-484-campaign-donor-identity-records
version: 1.2.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to campaign donor identity records in Australian contexts. This information type is classified as personally identifiable information under the Privacy Act
  1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:campaign\s+donor|donor\s+identity|political\s+donation|donor\s+disclosure|campaign\s+finance|electoral\s+funding|donor\s+record|AEC\s+disclosure|political\s+party|donation\s+return|annual\s+return|donor\s+details)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - campaign donor identity records
    - campaign
    - donor
    - identity
    - records
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: campaign donor
      description: Primary topic phrase match
    - value: donor identity
      description: Case-insensitive topic phrase match
    - value: political donation
      description: Alternative topic phrase match
    - value: donor disclosure
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to campaign donor identity records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_campaign_donor_identity_records
      matches:
        - ref: Evidence_campaign_donor_identity_records
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_campaign_donor_identity_records
      matches:
        - ref: Evidence_campaign_donor_identity_records
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_campaign_donor_identity_records
      matches:
        - ref: Evidence_campaign_donor_identity_records
  regexes:
    - id: Pattern_campaign_donor_identity_records
      pattern: >-
        (?is)\b(?:campaign\s+donor|donor\s+identity|political\s+donation|donor\s+disclosure|campaign\s+finance|electoral\s+funding|donor\s+record|AEC\s+disclosure|political\s+party|donation\s+return|annual\s+return|donor\s+details)\b
    - id: Pattern_au_top500_484_campaign_donor_identity_records_label_context
      pattern: (?i)\\b(?:campaign\\s+donor\\s+identity\\s+records|campaign|donor|identity|top500)\\b
  keywords:
    - id: Evidence_campaign_donor_identity_records
      groups:
        - match_style: word
          terms:
            - campaign donor
            - donor identity
            - political donation
            - donor disclosure
            - campaign finance
            - electoral funding
            - donor record
            - AEC disclosure
            - political party
            - donation return
            - annual return
            - donor details
    - id: Keyword_au_top500_484_campaign_donor_identity_records_domain_context
      groups:
        - match_style: word
          terms:
            - campaign donor identity records
            - campaign
            - donor
            - identity
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
