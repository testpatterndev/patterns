schema: testpattern/v1
name: Valuation models
slug: global-top500-184-valuation-models
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to valuation models in international contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:valuation\s+model|discounted\s+cash\s+flow|DCF\s+analysis|enterprise\s+value|equity\s+value|comparable\s+transactions|precedent\s+transactions|terminal\s+value|fairness\s+opinion|implied\s+valuation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - valuation models
    - valuation
    - models
    - mergers
    - acquisitions
    - strategy
  proximity: 300
test_cases:
  should_match:
    - value: valuation model
      description: Primary topic phrase match
    - value: discounted cash flow
      description: Case-insensitive topic phrase match
    - value: DCF analysis
      description: Alternative topic phrase match
    - value: enterprise value
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to valuation models appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_valuation_models
      matches:
        - ref: Pattern_global_top500_184_valuation_models_label_context
        - ref: Keyword_global_top500_184_valuation_models_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_valuation_models
      matches:
        - ref: Keyword_valuation_models
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_valuation_models
      matches:
        - ref: Keyword_valuation_models
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_valuation_models
      pattern: >-
        (?is)\b(?:valuation\s+model|discounted\s+cash\s+flow|DCF\s+analysis|enterprise\s+value|equity\s+value|comparable\s+transactions|precedent\s+transactions|terminal\s+value|fairness\s+opinion|implied\s+valuation)\b
    - id: Pattern_global_top500_184_valuation_models_label_context
      pattern: (?i)\\b(?:valuation\\s+models|valuation|models|top500)\\b
  keywords:
    - id: Keyword_valuation_models
      groups:
        - match_style: word
          terms:
            - valuation model
            - discounted cash flow
            - DCF analysis
            - enterprise value
            - equity value
            - comparable transactions
            - precedent transactions
            - WACC
            - terminal value
            - fairness opinion
            - implied valuation
    - id: Keyword_global_top500_184_valuation_models_domain_context
      groups:
        - match_style: word
          terms:
            - valuation models
            - valuation
            - models
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
created: '2026-02-08'
updated: '2026-03-06'
author: testpattern-community
