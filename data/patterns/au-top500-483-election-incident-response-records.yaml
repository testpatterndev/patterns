schema: testpattern/v1
name: Election incident response records
slug: au-top500-483-election-incident-response-records
version: 1.5.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to election incident response records in Australian contexts. This information type is classified as personally identifiable information under the Privacy
  Act 1988.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:election\s+incident|polling\s+incident|ballot\s+incident|incident\s+response|election\s+integrity|electoral\s+fraud|polling\s+irregularity|electoral\s+commission|election\s+complaint|voting\s+disruption|incident\s+report)\b
confidence: medium
confidence_justification: structural regex with domain-specific anchors and constrained context replaces phrase-only marker. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - IPA 2009 (Qld)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
frameworks:
  - ISO 27001
data_categories:
  - government-id
  - pii
corroborative_evidence:
  keywords:
    - election incident response records
    - election
    - incident
    - response
    - records
    - elections
    - diplomacy
    - statecraft
  proximity: 300
  keyword_lists:
    - government-services
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: election incident
      description: Primary topic phrase match
    - value: polling incident
      description: Case-insensitive topic phrase match
    - value: ballot incident
      description: Alternative topic phrase match
    - value: incident response
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: election incident response
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to election incident response records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_election_incident_response_records
      matches:
        - ref: Evidence_election_incident_response_records
          min_count: 2
          unique_results: true
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_election_incident_response_records
      matches:
        - ref: Evidence_election_incident_response_records
        - ref: Evidence_data_record_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_election_incident_response_records
      matches:
        - ref: Evidence_election_incident_response_records
  regexes:
    - id: Pattern_election_incident_response_records
      pattern: >-
        (?is)\b(?:election\s+incident|polling\s+incident|ballot\s+incident|incident\s+response|election\s+integrity|electoral\s+fraud|polling\s+irregularity|electoral\s+commission|election\s+complaint|voting\s+disruption|incident\s+report)\b
    - id: Pattern_au_top500_483_election_incident_response_records_label_context
      pattern: (?i)\b(?:election\s+incident\s+response\s+records)\b
  keywords:
    - id: Evidence_election_incident_response_records
      groups:
        - match_style: word
          terms:
            - election incident
            - polling incident
            - ballot incident
            - incident response
            - election integrity
            - electoral fraud
            - polling irregularity
            - text: AEC
              case_sensitive: true
            - electoral commission
            - election complaint
            - voting disruption
            - incident report
      strength: specific
    - id: Keyword_au_top500_483_election_incident_response_records_domain_context
      groups:
        - match_style: word
          terms:
            - election incident response records
            - election
            - incident
            - response
      strength: domain
risk_description: >-
  The detector searches for election, polling, ballot, and incident-response language, intending to identify an incident case record rather than public reporting that an incident occurred. An active record can disclose affected systems or polling places, observed weaknesses, responder actions, evidence, and incomplete remediation, allowing an adversary to repeat or conceal interference and erode trust in a particular election operation. The medium-confidence concept rule can also match after-action summaries and training exercises, so currency and operational detail are important. Risk 8 and SENSITIVE Government reflect serious contained integrity and continuity harm; PROTECTED would require exploitable system-wide weaknesses or a credible prospect of significant jurisdiction-wide electoral compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Government
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-07-14'
changelog:
  - version: 1.5.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1069 without changing detector or package metadata.'
  - version: 1.5.0
    date: '2026-07-12'
    description: 'Baseline burn-down A2: tier@85''s Evidence_election_incident_response_records group is textually identical to the id_match regex''s own alternation (both list "election incident", "incident response"), so should_not_match: "election incident response" satisfied the existing min_count: 2 / unique_results gate by stuffing two id_match synonyms against each other. Re-added the data-record-context shared_keywords import (previously dropped as dead weight in 1.3.1) and wired it as a genuinely independent AND-evidence requirement on tier@85 and tier@75 so two on-topic phrase synonyms can no longer satisfy either tier alone. Also marked the bare tier@65 discovery_only (no-evidence shape) so it surfaces in discovery inventory rather than gating should_not_match.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.3.0
    date: '2026-07-04'
    description: case/evidence metadata update
  - version: 1.2.0
    date: '2026-03-14'
    description: Standardise to 3-tier 65/75/85 gating with progressive evidence
  - version: 1.1.0
    date: '2026-03-06'
    description: Embed topic-specific phrase regex, wire domain keyword lists
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
