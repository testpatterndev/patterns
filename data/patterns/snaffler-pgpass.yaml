schema: testpattern/v1
name: PostgreSQL Password File Entry
slug: snaffler-pgpass
version: 1.1.2
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects PostgreSQL .pgpass file entries containing hostname, port, database, username,
  and password in colon-separated format. Mirrors Snaffler rule KeepDbMgtConfigByName.
operation: >-
  Matches the five-field colon-separated pgpass format: host:port:database:user:password.
  Port must be numeric (1-5 digits). All other fields exclude whitespace and colon.
  High FP risk — 75/85 tiers require proximity evidence keywords.
risk_description: >-
  PostgreSQL Password File Entry detects the five-field pgpass structure containing host, port, database, user, and a plaintext password. A genuine entry can enable immediate database login, expose or alter application data, and provide a foothold for lateral movement under the named account's permissions. Harm is serious but bounded by network reachability, credential validity, and database privileges, and colon-delimited records create a material false-positive risk. Risk 8 and SENSITIVE InfoTech fit; PROTECTED would require privileged access to critical or broad data services causing significant damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
pattern: '[^\s:]{1,64}:(?:\d{1,5}|\*):[^\s:]{1,64}:[^\s:]{1,64}:[^\s:]{1,128}'
confidence: medium
confidence_justification: >-
  Medium confidence: the five-field colon-separated structure is specific but the character
  classes are broad enough to match non-credential data. Evidence keyword gating at 75/85
  tiers substantially reduces false positive risk by requiring pgpass-contextual terms.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - pgpass
    - 5432
    - localhost
    - postgres
  proximity: 300
test_cases:
  should_match:
    - value: "db.internal.corp:15432:billing:svc_billing:Pg$ecret2024"
      description: Exact 65 probe - five-field candidate without canonical port or PostgreSQL identity
    - value: "pg.prod.internal:5432:billing:postgres:SuperSecret!"
      description: Exact 75 probe - canonical PostgreSQL port and identity in a five-field entry
    - value: ".pgpass PostgreSQL password file\npg.prod.internal:5432:billing:postgres:SuperSecret!"
      description: Exact 85 probe - balanced structure independently corroborated by pgpass file context
    - value: "db.internal:*:*:postgres:S3cretPg"
      description: Wildcard pgpass form retained as a discovery candidate
  should_not_match:
    - value: "This is a plain text file with no colon-separated credential fields"
      description: Plain text, no colon structure
    - value: "server host database user password"
      description: Space-separated fields, not colon-separated
    - value: "event:5432:worker:ok:complete"
      description: Five-field application log with the PostgreSQL port but no database identity
    - value: "2001:0db8:85a3:0000:0000:8a2e:0370:7334"
      description: IPv6 address is not corroborated as a pgpass credential
    - value: "Documentation example: .pgpass PostgreSQL password file db.internal:5432:app:postgres:changeme"
      description: Documentation placeholder with complete pgpass context is excluded
false_positives:
  - description: Log entries or configuration files using colon-separated fields for non-credential data such as CSV records, IPv6 addresses, or structured logging.
    mitigation: Require proximity to pgpass-specific terms (pgpass, postgres, 5432) to limit matches to actual database credential files.
  - description: Time-formatted strings or other five-field colon-separated data that coincidentally matches the pattern structure.
    mitigation: Evidence keyword gating at 75/85 tiers ensures only matches near pgpass context are elevated.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_snaffler_pgpass
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_snaffler_pgpass
      matches:
        - ref: Pattern_snaffler_pgpass_port
        - ref: Keyword_snaffler_pgpass_postgres_identity
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_pgpass
      matches:
        - ref: Pattern_snaffler_pgpass_port
        - ref: Keyword_snaffler_pgpass_postgres_identity
        - ref: Keyword_snaffler_pgpass_file_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_pgpass
      pattern: '[^\s:]{1,64}:(?:\d{1,5}|\*):[^\s:]{1,64}:[^\s:]{1,64}:[^\s:]{1,128}'
    - id: Pattern_snaffler_pgpass_port
      pattern: ':5432:'
  keywords:
    - id: Keyword_snaffler_pgpass_postgres_identity
      groups:
        - match_style: string
          terms:
            - postgres
            - PostgreSQL
      strength: domain
    - id: Keyword_snaffler_pgpass_file_context
      groups:
        - match_style: string
          terms:
            - .pgpass
            - PGPASSFILE
            - PostgreSQL password file
      strength: specific
created: '2026-06-26'
updated: '2026-07-19'
changelog:
  - version: 1.1.2
    date: '2026-07-19'
    description: 'Add an individual 65 discovery / 75 PostgreSQL-port-and-identity / 85 pgpass-file contract with exact-tier, log-record, IPv6, malformed, and documentation probes.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 2056 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.0.2
    date: '2026-06-26'
    note: >-
      Removed pattern-only 65 tier; pgpass detection now requires proximity
      evidence (75+) to control FP.
  - version: 1.0.1
    date: '2026-06-26'
    note: >-
      Broadened port field to accept wildcard (*) in addition to numeric port.
      Snaffler fidelity fix.
