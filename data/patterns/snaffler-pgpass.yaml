schema: testpattern/v1
name: PostgreSQL Password File Entry
slug: snaffler-pgpass
version: 1.1.0
type: regex
pattern_class: identifier
engine: boost_regex
description: >-
  Detects PostgreSQL .pgpass file entries containing hostname, port, database, username,
  and password in colon-separated format. Mirrors Snaffler rule KeepDbMgtConfigByName.
operation: >-
  Matches the five-field colon-separated pgpass format: host:port:database:user:password.
  Port must be numeric (1-5 digits). All other fields exclude whitespace and colon.
  High FP risk — 75/85 tiers require proximity evidence keywords.
pattern: '[^\s:]{1,64}:(?:\d{1,5}|\*):[^\s:]{1,64}:[^\s:]{1,64}:[^\s:]{1,128}'
confidence: medium
confidence_justification: >-
  Medium confidence: the five-field colon-separated structure is specific but the character
  classes are broad enough to match non-credential data. Evidence keyword gating at 75/85
  tiers substantially reduces false positive risk by requiring pgpass-contextual terms.
jurisdictions:
  - global
regulations:
  - Criminal Code Act 1995 (Cth)
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
data_categories:
  - credentials
corroborative_evidence:
  keywords:
    - pgpass
    - 5432
    - localhost
    - postgres
  proximity: 300
test_cases:
  should_match:
    - value: "db.internal.corp:5432:billing:svc_billing:Pg$ecret2024"
      description: Real pgpass entry with production host
    - value: "localhost:5432:appdb:appuser:MyP@ssw0rd123"
      description: Local postgres connection string
    - value: "pg.prod.example.com:5432:*:postgres:SuperSecret!"
      description: Wildcard database name in pgpass
    - value: "db.example.com:*:*:postgres:S3cretPg"
      description: Wildcard port and database in pgpass entry (Snaffler parity)
  should_not_match:
    - value: "This is a plain text file with no colon-separated credential fields"
      description: Plain text, no colon structure
    - value: "server host database user password"
      description: Space-separated fields, not colon-separated
false_positives:
  - description: Log entries or configuration files using colon-separated fields for non-credential data such as CSV records, IPv6 addresses, or structured logging.
    mitigation: Require proximity to pgpass-specific terms (pgpass, postgres, 5432) to limit matches to actual database credential files.
  - description: Time-formatted strings or other five-field colon-separated data that coincidentally matches the pattern structure.
    mitigation: Evidence keyword gating at 75/85 tiers ensures only matches near pgpass context are elevated.
exports:
  - purview_xml
  - yaml
scope: specific
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_snaffler_pgpass
      matches:
        - ref: Keyword_snaffler_pgpass_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_snaffler_pgpass
      matches:
        - ref: Keyword_snaffler_pgpass_evidence
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_snaffler_pgpass
      pattern: '[^\s:]{1,64}:(?:\d{1,5}|\*):[^\s:]{1,64}:[^\s:]{1,64}:[^\s:]{1,128}'
  keywords:
    - id: Keyword_snaffler_pgpass_evidence
      groups:
        - match_style: string
          terms:
            - pgpass
            - 5432
            - localhost
            - postgres
created: '2026-06-26'
updated: '2026-07-09'
changelog:
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.0.2
    date: '2026-06-26'
    note: >-
      Removed pattern-only 65 tier; pgpass detection now requires proximity
      evidence (75+) to control FP.
  - version: 1.0.1
    date: '2026-06-26'
    note: >-
      Broadened port field to accept wildcard (*) in addition to numeric port.
      Snaffler fidelity fix.
