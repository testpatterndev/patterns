schema: testpattern/v1
name: Market entry strategy papers
slug: global-top500-190-market-entry-strategy-papers
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to market entry strategy papers in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:market\s+entry|market\s+expansion|geographic\s+expansion|new\s+market|market\s+penetration|market\s+sizing|addressable\s+market|entry\s+barriers|competitive\s+landscape|market\s+opportunity)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - market entry strategy papers
    - market
    - entry
    - strategy
    - papers
    - mergers
    - acquisitions
  proximity: 300
test_cases:
  should_match:
    - value: market entry
      description: Primary topic phrase match
    - value: market expansion
      description: Case-insensitive topic phrase match
    - value: geographic expansion
      description: Alternative topic phrase match
    - value: new market
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: merger fundraising
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to market entry strategy papers appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_market_entry_strategy
      matches:
        - ref: Pattern_global_top500_190_market_entry_strategy_papers_label_context
        - ref: Keyword_global_top500_190_market_entry_strategy_papers_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_market_entry_strategy
      matches:
        - ref: Keyword_market_entry_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_market_entry_strategy
      pattern: >-
        (?is)\b(?:market\s+entry|market\s+expansion|geographic\s+expansion|new\s+market|market\s+penetration|market\s+sizing|addressable\s+market|entry\s+barriers|competitive\s+landscape|market\s+opportunity)\b
    - id: Pattern_global_top500_190_market_entry_strategy_papers_label_context
      pattern: (?i)\b(?:market\s+entry\s+strategy\s+papers)\b
  keywords:
    - id: Keyword_market_entry_strategy
      groups:
        - match_style: word
          terms:
            - market entry
            - go-to-market
            - market expansion
            - geographic expansion
            - new market
            - market penetration
            - market sizing
            - addressable market
            - entry barriers
            - competitive landscape
            - market opportunity
      strength: specific
    - id: Keyword_global_top500_190_market_entry_strategy_papers_domain_context
      groups:
        - match_style: word
          terms:
            - market entry strategy papers
            - market
            - strategy
            - papers
      strength: domain
risk_description: >-
  The regex identifies market entry or expansion, market penetration, sizing, addressable markets, barriers, competitive landscapes, and opportunities rather than verifying a confidential strategic paper. A genuine strategy can reveal target geographies, launch timing, investment assumptions, pricing direction, partner choices, and perceived obstacles, letting competitors pre-empt the organization or frustrate negotiations. The normal unit is one planned market initiative and the teams or partners involved, while published analyst reports, academic work, and generic strategy templates can match. Risk 8 and SENSITIVE reflect serious contained competitive harm; PROTECTED would require a critical national capability, protected policy, or significant broader economic damage.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
