schema: testpattern/v1
name: Foster care placement records
slug: global-top500-386-foster-care-placement-records
version: 1.3.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies individual foster-care, out-of-home-care, and kinship-care placement records, decisions,
  and reviews. Topic phrases are retained for discovery; enforcement requires child, address, carer,
  placement-date, legal-status, contact, safety, caseworker, stability, or review fields, and high
  confidence also requires a formal child/placement/care-order reference.
operation: >-
  Regex_foster_care recognises foster, out-of-home, and kinship-care placement records and decisions.
  The topic alone is discovery-only at 65. Substantive placement and safeguarding fields raise it to
  75; a formal child, placement, or care-order reference reaches 85. Enforcing tiers reject explicit
  templates and training examples.
pattern: >-
  (?is)\b(?:foster\s+care\s+placement\s+(?:record|decision|review)|out[\s-]+of[\s-]+home\s+care\s+placement\s+(?:record|decision|review)|kinship\s+care\s+placement\s+(?:record|decision|review)|child\s+placement\s+decision)s?\b
confidence: medium
confidence_justification: Medium confidence requires substantive placement and safeguarding fields. High confidence adds a formal child, placement, or care-order reference.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - foster care placement records
  proximity: 240
test_cases:
  should_match:
    - value: foster care placement record
      description: Low-tier probe - placement-record topic without child or safeguarding fields
    - value: 'Foster care placement record: child identifier, placement address, carer name, placement start date, legal status, contact arrangements, safety plan, caseworker name, placement stability, and review date'
      description: Medium-tier probe - substantive placement without formal reference
    - value: 'Foster care placement record, placement reference: FCP-2026-104: child identifier, placement address, carer name, placement start date, legal status, contact arrangements, safety plan, caseworker name, placement stability, review date, and care order number: CO-204'
      description: High-tier probe - substantive placement with formal placement and care-order references
  should_not_match:
    - value: The policy describes foster carers and placement stability.
      description: Public policy discussion without an individual placement record
    - value: The hospital records a residential care arrangement.
      description: Non-foster residential care context
    - value: 'Training example: foster care placement record FCP-2026-104 with placement address, carer name, safety plan, and care order CO-204'
      description: Explicit training content must not enforce
false_positives:
  - description: Foster-care policy and unrelated residential-care records discuss carers, placements, stability, contacts, and reviews without containing a child placement record.
    mitigation: Require an explicit foster, out-of-home, kinship, or child-placement record or decision before considering placement and safeguarding fields.
  - description: Training placements can contain realistic child identifiers, addresses, carers, safety plans, references, and care orders.
    mitigation: Reject explicit template, demo, tutorial, sample-data, and training-example framing from enforcing tiers.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_foster_care
      matches:
        - ref: Evidence_foster_placement
        - ref: Evidence_foster_formal_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_foster_care
      matches:
        - ref: Evidence_foster_placement
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_foster_care
  regexes:
    - id: Regex_foster_care
      pattern: >-
        (?is)\b(?:foster\s+care\s+placement\s+(?:record|decision|review)|out[\s-]+of[\s-]+home\s+care\s+placement\s+(?:record|decision|review)|kinship\s+care\s+placement\s+(?:record|decision|review)|child\s+placement\s+decision)s?\b
    - id: Evidence_foster_formal_record
      pattern: >-
        (?i)\b(?:(?:child\s+case|placement|care\s+order)\s+(?:number|no\.?|reference|ref\.?|ID)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,}|court\s+order\s+(?:number|no\.?|reference|ref\.?)\s*[:#-]\s*[A-Z0-9][A-Z0-9/-]{3,})\b
  keywords:
    - id: Evidence_foster_placement
      groups:
        - match_style: word
          terms:
            - child identifier
            - placement address
            - carer name
            - placement start date
            - legal status
            - contact arrangements
            - safety plan
            - caseworker name
            - placement stability
            - review date
      strength: domain
risk_description: >-
  The pattern targets foster placement, foster carer, and out-of-home-care records rather than a standalone name or generic welfare reference. A normal placement file can reveal a child's living location, family circumstances, carers, and service history, creating risks of stigma, unwanted contact, or interference with a safe placement. The likely harm is serious for a vulnerable child and their carers, although a single bounded placement record does not automatically create system-wide or irreversible damage. Risk 8 and SENSITIVE fit; PROTECTED would require a current protected address, an active threat to safety, or disclosure across a large care cohort.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI Specified
  uk_gov: SECRET
  nz_gov: CONFIDENTIAL
  ca_gov: Protected B
