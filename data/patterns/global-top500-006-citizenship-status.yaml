schema: testpattern/v1
name: Citizenship status
slug: global-top500-006-citizenship-status
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to citizenship status in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: pii-personal, pii-civic-credentials, corporate-ip. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:citizenship\s+status|permanent\s+resident|visa\s+holder|residency\s+status|dual\s+citizen|citizen\s+application|nationality\s+status|right\s+of\s+abode)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - citizenship status
  proximity: 240
  keyword_lists:
    - pii-personal
    - pii-civic-credentials
    - corporate-ip
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: citizenship status
      description: Primary topic phrase match
    - value: permanent resident
      description: Case-insensitive topic phrase match
    - value: visa holder
      description: Alternative topic phrase match
    - value: residency status
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: name disability
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to citizenship status appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_citizenship_status
      matches:
        - ref: Pattern_global_top500_006_citizenship_status_label_context
        - ref: Keyword_global_top500_006_citizenship_status_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_citizenship_status
      matches:
        - ref: Keyword_citizenship_status
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_citizenship_status
      pattern: (?is)\b(?:citizenship\s+status|permanent\s+resident|visa\s+holder|residency\s+status|dual\s+citizen|citizen\s+application|nationality\s+status|right\s+of\s+abode)\b
    - id: Pattern_global_top500_006_citizenship_status_label_context
      pattern: (?i)\b(?:citizenship\s+status)\b
  keywords:
    - id: Keyword_citizenship_status
      groups:
        - match_style: word
          terms:
            - citizenship status
            - citizenship
            - naturalization
            - permanent resident
            - visa holder
            - immigration
            - residency status
            - dual citizen
            - citizen application
            - nationality status
            - right of abode
      strength: specific
    - id: Keyword_global_top500_006_citizenship_status_domain_context
      groups:
        - match_style: word
          terms:
            - citizenship status
            - citizenship
            - status
      strength: domain
risk_description: >-
  This broad concept pattern recognises citizenship, permanent-resident, visa-holder, and residency-status language rather than a citizenship certificate or complete immigration record. When tied to a named person, the status can expose eligibility or migration-related information and support discrimination or targeted questioning, but topic-only policy and HR text is common. An ordinary status statement does not reveal visa conditions, legal history, identity documents, or case outcomes, so standalone harm is generally low. Risk 3 OFFICIAL is justified; SENSITIVE would require an identified immigration case, adverse legal status, vulnerable-person circumstances, or a consequential eligibility decision.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
