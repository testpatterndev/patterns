    date: '2026-07-17'
    description: 'Reduced-scope alignment fix (TP-00179): demote generic ''device identifier'', ''mobile device'', ''serial number'', and ''device registration'' out of the primary IdMatch (they remain corroborative evidence only), keeping explicit IMEI/TAC/equipment-identity phrases as the concept core; add MDM-policy and asset-serial negatives. Value-level Luhn-validated IMEI detection stays out of scope for this concept SIT (separate identifier classifier if ever needed).'
  - version: 1.4.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 654 without changing detector or package metadata.'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: concept — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.1
    date: '2026-07-09'
    description: 'Noise-gate sweep: remove dead shared_keywords import(s) data-record-context as Evidence_data_record_context, generic-data-labels as Evidence_generic_data_labels — declared but referenced by no tier, so the import only added dead weight to compiled purview.keywords (no behavior change)'
  - version: 1.3.0
