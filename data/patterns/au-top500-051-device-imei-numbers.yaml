schema: testpattern/v1
name: Device IMEI numbers
slug: au-top500-051-device-imei-numbers
version: 1.5.0
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to device imei numbers in Australian contexts. This information type is classified as personally identifiable information under applicable data protection
  regulations. Detection is phrase-level concept matching anchored on explicit IMEI, TAC, and equipment-identity vocabulary; it does not parse or Luhn-validate 15-digit IMEI values.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: phone-international. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: (?is)\b(?:device\s+IMEI\s+numbers|IMEI\s+number|handset\s+identifier|type\s+allocation\s+code|equipment\s+identity)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - au
regulations:
  - SOCI Act 2018 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - CIS Controls
  - DISP
  - ISO 27001
  - NIST CSF
  - SOC 2
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - device imei numbers
    - device
    - imei
    - numbers
    - contact
    - location
    - data
  proximity: 300
  keyword_lists:
    - phone-international
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: device IMEI numbers
      description: Primary topic phrase match
    - value: imei number
      description: Case-insensitive topic phrase match
    - value: equipment identity
      description: Alternative topic phrase match
    - value: type allocation code
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: address mac
      description: Generic word pair from old broad template should not match
    - value: Mobile device management policy
      description: Generic mobile-device wording demoted out of the primary - MDM policy prose must not anchor the SIT
    - value: asset serial number register
      description: Generic serial-number wording demoted out of the primary - asset inventories must not anchor the SIT
false_positives:
  - description: Common words and phrases related to device imei numbers appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_device_imei
      matches:
        - ref: Evidence_device_imei
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_device_imei
      matches:
        - ref: Evidence_device_imei
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      id_match: Pattern_device_imei
      matches:
        - ref: Evidence_device_imei
  regexes:
    - id: Pattern_device_imei
      pattern: (?is)\b(?:device\s+IMEI\s+numbers|IMEI\s+number|handset\s+identifier|type\s+allocation\s+code|equipment\s+identity)\b
    - id: Pattern_au_top500_051_device_imei_numbers_label_context
      pattern: (?i)\b(?:device\s+imei\s+numbers)\b
  keywords:
    - id: Evidence_device_imei
      groups:
        - match_style: word
          terms:
            - device IMEI numbers
            - IMEI
            - IMEI number
            - device identifier
            - mobile device
            - handset identifier
            - serial number
            - MEID
            - text: TAC
              case_sensitive: true
            - type allocation code
            - equipment identity
            - device registration
      strength: specific
    - id: Keyword_au_top500_051_device_imei_numbers_domain_context
      groups:
        - match_style: word
          terms:
            - device imei numbers
            - device
            - imei
      strength: domain
risk_description: >-
  This concept pattern finds references to IMEI numbers and device-identity topics rather than validating a 15-digit IMEI value. A true record can support device tracking, blacklisting, or correlation with subscriber and account data, but those outcomes need an actual identifier and additional ownership information. The normal match affects one device or a small set and creates bounded harm because broad terms such as mobile device or serial number can also trigger. Risk 5 and OFFICIAL are defensible at this boundary; verified person-linked device registers would require higher contextual handling.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
