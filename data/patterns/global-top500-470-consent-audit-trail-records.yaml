schema: testpattern/v1
name: Consent audit trail records
slug: global-top500-470-consent-audit-trail-records
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to consent audit trail records in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:consent\s+audit\s+trail|consent\s+record|consent\s+management|opt[\s-]+in\s+record|opt[\s-]+out\s+record|consent\s+timestamp|lawful\s+basis|consent\s+withdrawal|data\s+subject\s+consent|privacy\s+compliance|consent\s+preference|consent\s+collection)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - consent audit trail records
    - consent
    - audit
    - trail
    - records
    - privacy
    - compliance
    - risk
  proximity: 300
test_cases:
  should_match:
    - value: consent audit trail
      description: Primary topic phrase match
    - value: consent record
      description: Case-insensitive topic phrase match
    - value: consent management
      description: Alternative topic phrase match
    - value: opt-in record
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: data inventory compliance
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to consent audit trail records appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_consent_audit_trail
      matches:
        - ref: Pattern_global_top500_470_consent_audit_trail_records_label_context
        - ref: Keyword_global_top500_470_consent_audit_trail_records_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_consent_audit_trail
      matches:
        - ref: Keyword_consent_audit_trail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_consent_audit_trail
      matches:
        - ref: Keyword_consent_audit_trail
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_consent_audit_trail
      pattern: >-
        (?is)\b(?:consent\s+audit\s+trail|consent\s+record|consent\s+management|opt[\s-]+in\s+record|opt[\s-]+out\s+record|consent\s+timestamp|lawful\s+basis|consent\s+withdrawal|data\s+subject\s+consent|privacy\s+compliance|consent\s+preference|consent\s+collection)\b
    - id: Pattern_global_top500_470_consent_audit_trail_records_label_context
      pattern: (?i)\\b(?:consent\\s+audit\\s+trail\\s+records|consent|audit|trail|top500)\\b
  keywords:
    - id: Keyword_consent_audit_trail
      groups:
        - match_style: word
          terms:
            - consent audit trail
            - consent record
            - consent management
            - opt-in record
            - opt-out record
            - consent timestamp
            - lawful basis
            - consent withdrawal
            - data subject consent
            - privacy compliance
            - consent preference
            - consent collection
    - id: Keyword_global_top500_470_consent_audit_trail_records_domain_context
      groups:
        - match_style: word
          terms:
            - consent audit trail records
            - consent
            - audit
            - trail
            - top500
            - field
            - identifier
            - reference
