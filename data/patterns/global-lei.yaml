    title: "ISO 17442: The LEI Code Structure - GLEIF"
  - url: https://www.leiroc.org/lei.htm
    title: "The Global LEI System - LEI Regulatory Oversight Committee"
  - url: https://en.wikipedia.org/wiki/Legal_Entity_Identifier
    title: "Legal Entity Identifier - Wikipedia (MOD 97-10 check digit description)"
