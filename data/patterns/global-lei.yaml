schema: testpattern/v1
name: Legal Entity Identifier (LEI) - Global
slug: global-lei
version: 1.1.1
type: regex
pattern_class: identifier
engine: boost_regex
case_sensitive: true
description: >-
  Detects ISO 17442 Legal Entity Identifiers (LEIs) — the 20-character uppercase alphanumeric codes
  issued under the Global LEI System (GLEIF) that uniquely identify legal entities in financial
  transactions. Structure: characters 1-4 are the LEI-issuer (LOU) prefix, characters 5-6 are
  reserved and set to "00", characters 7-18 are the entity-specific part, and characters 19-20 are
  numeric check digits (ISO 7064 MOD 97-10). Requiring the literal "00" at positions 5-6 and two
  digits at positions 19-20 makes the format far more distinctive than a generic 20-character
  alphanumeric run. Known recall cost: pre-2013 CICI-era legacy LEIs — interim identifiers issued
  before the "00" reservation, grandfathered into the GLEIF system and still live and checksum-valid
  — do not carry "00" at positions 5-6 and are NOT matched. This class includes major counterparties
  such as Microsoft (INR2EJN1ERAN0W5ZP974), Deutsche Bank (7LTWFZYICNSX8D621K86) and Apple
  (HWUPKR0MPOU8FGXBT394), so documents dealing with such entities' LEIs will be missed. This is a
  deliberate precision-over-recall trade-off: dropping the "00" anchor would widen the pattern to
  any 20-character uppercase alphanumeric run ending in two digits.
operation: >-
  Validation: the ISO 7064 MOD 97-10 check over base-36 character expansion is not expressible as a
  regex and no Purview validator function exists for LEI, so the check digits are enforced only as
  structural \d{2}. Reference: ISO 17442 via GLEIF "ISO 17442: The LEI Code Structure".
  AllDigitsSameFilter guards against repeated-digit sentinels (an all-zeros string satisfies both
  the structure and the mod-97 arithmetic). Corroborative evidence: keywords within 300 characters.
pattern: '(?<![A-Za-z0-9])[A-Z0-9]{4}00[A-Z0-9]{12}\d{2}(?![A-Za-z0-9])'
confidence: high
confidence_justification: >-
  High confidence: the fixed 20-character length, uppercase-only charset, reserved "00" at positions
  5-6 and numeric check-digit pair at positions 19-20 make coincidental collisions rare; the
  evidence-gated 85 tier is the recommended workhorse. The 65 tier is discovery-only because the
  MOD 97-10 checksum cannot be enforced in the exported SIT, so a bare structural match is not
  confirmed to be an issued LEI. Recall is knowingly reduced by the "00" requirement: live,
  checksum-valid pre-2013 CICI-era legacy LEIs without "00" at positions 5-6 — including major
  counterparties such as Microsoft, Deutsche Bank and Apple — are structurally excluded, a
  deliberate precision choice documented in the description.
jurisdictions:
  - global
regulations:
  - MiFID II
  - EMIR
  - Dodd-Frank Act
frameworks:
  - ISO 27001
  - ISO 27701
  - SOC 2
data_categories:
  - business-identifier
  - financial
corroborative_evidence:
  keywords:
    - LEI
    - Legal Entity Identifier
    - GLEIF
    - ISO 17442
    - counterparty
    - legal entity
  proximity: 300
  keyword_lists:
    - data-record-context
test_cases:
  should_match:
    - value: 5493001KJTIIGC8Y1R12
      description: GLEIF's own published LEI — 5493 LOU prefix, "00" at positions 5-6, valid MOD 97-10 check digits
    - value: 213800LBQA1Y9L22JB70
      description: Barclays PLC's published LEI (2138 LOU prefix), checksum-verified
    - value: 529900T8BM49AURSDO55
      description: Structurally valid LEI under the 5299 LOU prefix with computed MOD 97-10 check digits
  should_not_match:
    - value: HWUPKR0MPOU8FGXBT394
      description: Live checksum-valid pre-2013 CICI-era legacy LEI (Apple Inc.) without the reserved "00" at positions 5-6 — documented false-negative class, deliberately excluded
    - value: INR2EJN1ERAN0W5ZP974
      description: Live checksum-valid pre-2013 CICI-era legacy LEI (Microsoft Corporation), positions 5-6 are "EJ" — documented false-negative class, deliberately excluded
    - value: 7LTWFZYICNSX8D621K86
      description: Live checksum-valid pre-2013 CICI-era legacy LEI (Deutsche Bank AG), positions 5-6 are "FZ" — documented false-negative class, deliberately excluded
    - value: 5493001KJTIIGC8Y1R1
      description: Only 19 characters, one short of the fixed LEI length
    - value: 5493001KJTIIGC8Y1RAB
      description: Letters in positions 19-20, which must be the two numeric check digits
    - value: 5493001kjtiigc8y1r12
      description: Lowercase — LEIs are uppercase-only (pattern is case-sensitive)
    - value: X5493001KJTIIGC8Y1R12
      description: 21 characters — the boundary guards reject LEIs embedded in longer alphanumeric runs
false_positives:
  - description: >-
      A 20-character uppercase serial/reference number that happens to carry "00" at positions 5-6
      and two trailing digits can satisfy the structure; the MOD 97-10 checksum that would reject
      most such strings is not expressible as a regex and has no Purview validator function.
    mitigation: >-
      Require LEI/GLEIF keywords within the proximity window for the reporting tier; keep the bare
      structural tier discovery-only. Downstream consumers can verify candidates against the GLEIF
      API for authoritative validation. The "00" positions 5-6 anchor is what keeps this collision
      surface small; its cost is the known false-negative class of pre-2013 non-"00" legacy LEIs
      (CICI-era registrations, including major counterparties such as Microsoft, Deutsche Bank and
      Apple) described in the pattern description.
  - description: >-
      Repeated-digit sentinels such as an all-zeros 20-character string satisfy the structure, and
      all-same-digit values pass any weighted-mod checksum (0 mod N = 0).
    mitigation: AllDigitsSameFilter drops repeated-digit values before they can match.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_global_lei
      matches:
        - ref: Keyword_global_lei
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_global_lei
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_global_lei
      pattern: '(?<![A-Za-z0-9])[A-Z0-9]{4}00[A-Z0-9]{12}\d{2}(?![A-Za-z0-9])'
  keywords:
    - id: Keyword_global_lei
      groups:
        - match_style: word
          terms:
            - text: LEI
              case_sensitive: true
            - Legal Entity Identifier
            - LEI code
            - LEI number
            - text: GLEIF
              case_sensitive: true
            - ISO 17442
            - Global Legal Entity Identifier
            - text: LOU
              case_sensitive: true
            - counterparty identifier
            - entity identifier
            - MiFID
            - text: EMIR
              case_sensitive: true
      strength: specific
  filters:
    - id: Filter_global_lei_same_digits
      type: AllDigitsSameFilter
risk_rating: 4
risk_description: >-
  The LEI detector matches a twenty-character ISO 17442-style legal-entity code with the reserved 00 positions and trailing check digits, supported by LEI or GLEIF language. An LEI is a public counterparty identifier used in financial reporting and registry data, not an account number, trade credential, or secret about a natural person. Its presence can help link documents to an entity or make a fabricated counterparty record look plausible, but exploitation requires transaction, relationship, or payment information that the code does not contain. Risk 4 and OFFICIAL fit the low business impact; non-public trade positions, settlement instructions, or a counterparty dossier would raise the surrounding context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: "CUI"
  uk_gov: "OFFICIAL"
  nz_gov: "IN-CONFIDENCE"
  ca_gov: "Protected A"
references:
