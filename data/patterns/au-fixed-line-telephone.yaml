schema: testpattern/v1
name: Australian Landline Number
slug: au-fixed-line-telephone
version: 2.4.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Identifies Australian fixed-line telephone numbers across domestic bracketed, unbracketed, and international formats for area codes 02, 03, 07, and 08. Uses lookaround boundaries and supports hyphen
  separators within digit groups.
operation: >-
  Lookaround-bounded regex matching Australian fixed-line numbers in three notation styles. Area codes
  are restricted to 2, 3, 7, and 8. The bare format is discovery-only at 65, generic phone context
  enforces at 75, and a fixed-line-specific label plus independent contact-record context reaches 85.
pattern: (?<!\d)(?:\(0[2378]\)\s*\d{4}[\s\-]?\d{4}|0[2378][\s\-]?\d{4}[\s\-]?\d{4}|\+61\s?[2378]\s?\d{4}[\s\-]?\d{4})(?!\d)
confidence: medium
confidence_justification: 'Medium confidence: area code prefix narrows scope but 10-digit sequences are common. Hyphen-separated formatting and corroborative keywords improve precision.'
jurisdictions:
  - au
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
  - contact-information
corroborative_evidence:
  keywords:
    - fixed line
    - landline
    - desk phone
    - direct dial
    - DDI
    - PSTN
    - switchboard
    - reception
  proximity: 300
  keyword_lists:
    - au-telecom-terms
test_cases:
  should_match:
    - value: '(02) 9876 5432'
      description: Low-tier probe - Sydney landline structure without context
    - value: 'Phone: 07 3456-7890'
      description: Medium-tier probe - Brisbane landline with generic phone context
    - value: 'DDI: +61 3 9876 5432'
      description: Medium-tier fixed-line label without independent record context
    - value: 'Staff directory - landline contact details: 08 8234 5678'
      description: High-tier probe - fixed-line label in an independent contact-record context
  should_not_match:
    - value: '0912345678'
      description: Area code 09 is not valid
    - value: 02 1234 567
      description: Only 9 digits, too short
    - value: +61 6 1234 5678
      description: Area code 6 is mobile/special, not fixed-line
    - value: '1023456789'
      description: Embedded in longer number
    - value: 'Documentation example: staff directory landline contact details 02 9876 5432'
      description: Structurally complete but explicitly documented example must not enforce
false_positives:
  - description: 10-digit reference numbers or account codes with matching digit patterns.
    mitigation: Lookaround boundaries and telecom keywords required for detection.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 5
risk_description: >-
  The canonical Australian Landline Number detector captures one fixed-line endpoint using a valid geographic area code and supported punctuation. Disclosure can make a household or office reachable and may help an adversary build a convincing call-based pretext once the subscriber is known. The match does not name that subscriber, disclose their address, or expose call records, and many business numbers are intentionally public. Risk 5 and OFFICIAL balance the actionable contact route against the bounded impact of an unlinked standalone telephone number.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_fixedline_all
      matches:
        - ref: Evidence_fixedline_specific
        - ref: Evidence_contact_record
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_fixedline_all
      matches:
        - ref: Evidence_fixedline_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_fixedline_all
  regexes:
    - id: Pattern_fixedline_all
      pattern: (?<!\d)(?:\(0[2378]\)\s*\d{4}[\s\-]?\d{4}|0[2378][\s\-]?\d{4}[\s\-]?\d{4}|\+61\s?[2378]\s?\d{4}[\s\-]?\d{4})(?!\d)
  keywords:
    - id: Evidence_fixedline_context
      groups:
        - match_style: word
          terms:
            - phone
            - telephone
            - tel
            - contact number
            - phone number
            - fixed line
            - landline
            - desk phone
            - direct dial
            - text: DDI
              case_sensitive: true
            - text: PSTN
              case_sensitive: true
            - switchboard
            - office line
      strength: domain
    - id: Evidence_fixedline_specific
      groups:
        - match_style: word
          terms:
            - fixed line
            - landline
            - desk phone
            - direct dial
            - text: DDI
              case_sensitive: true
            - PSTN
            - switchboard
            - reception
            - office line
      strength: domain
    - id: Evidence_contact_record
      groups:
        - match_style: word
          terms:
            - contact details
            - contact record
            - subscriber details
            - telephone directory
            - staff directory
            - customer contact
            - emergency contact
      strength: specific
created: '2026-02-09'
updated: '2026-07-18'
changelog:
  - version: 2.4.0
    date: '2026-07-18'
    description: 'Profile quality: replace broad office evidence with bare-format discovery, generic phone-context medium, and fixed-line-plus-contact-record high tiers; add template rejection and exact-tier tests.'
  - version: 2.3.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 543 without changing detector or package metadata.'
  - version: 2.3.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 2.2.0
    date: '2026-07-08'
    description: >-
      Retrofitted the stale 65 tier onto the shared phone-context dictionary (generic phone vocabulary),
      replacing the local Evidence_personal_record list (record/file/form/register/directory/roster —
      generic document words with no phone signal, a leftover from before the shared dict existed); the
      unreferenced local keyword group is removed. Added the template/noise-exclusion NOT node to the 75
      tier, aligning with the phone-family and wider identifier convention (85 tier already carried it —
      its exclusion node also switches from the legacy children: to the refs: spelling, no semantic
      change).
  - version: 2.1.0
    date: '2026-07-04'
    description: case/evidence metadata update
