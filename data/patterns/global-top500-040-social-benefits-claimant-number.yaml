schema: testpattern/v1
name: Social benefits claimant number
slug: global-top500-040-social-benefits-claimant-number
version: 1.2.1
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to social benefits claimant number in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:social\s+benefits\s+claimant\s+number|claimant\s+number|benefits\s+number|social\s+benefits|welfare\s+number|benefit\s+reference|claimant\s+reference|social\s+security|welfare\s+claim|benefits\s+claim|entitlement\s+number|social\s+assistance)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - social benefits claimant number
  proximity: 240
test_cases:
  should_match:
    - value: social benefits claimant number
      description: Primary topic phrase match
    - value: claimant number
      description: Case-insensitive topic phrase match
    - value: benefits number
      description: Alternative topic phrase match
    - value: social benefits
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
false_positives:
  - description: Common words and phrases related to social benefits claimant number appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_social_benefits_claimant_number
      matches:
        - ref: Pattern_global_top500_040_social_benefits_claimant_number_label_context
        - ref: Keyword_global_top500_040_social_benefits_claimant_number_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_social_benefits_claimant_number
      matches:
        - ref: Keyword_social_benefits_claimant_number
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_social_benefits_claimant_number
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_social_benefits_claimant_number
      pattern: >-
        (?is)\b(?:social\s+benefits\s+claimant\s+number|claimant\s+number|benefits\s+number|social\s+benefits|welfare\s+number|benefit\s+reference|claimant\s+reference|social\s+security|welfare\s+claim|benefits\s+claim|entitlement\s+number|social\s+assistance)\b
    - id: Pattern_global_top500_040_social_benefits_claimant_number_label_context
      pattern: (?i)\b(?:social\s+benefits\s+claimant\s+number)\b
  keywords:
    - id: Keyword_social_benefits_claimant_number
      groups:
        - match_style: word
          terms:
            - social benefits claimant number
            - claimant number
            - benefits number
            - social benefits
            - welfare number
            - benefit reference
            - claimant reference
            - social security
            - welfare claim
            - benefits claim
            - entitlement number
            - social assistance
      strength: specific
    - id: Keyword_global_top500_040_social_benefits_claimant_number_domain_context
      groups:
        - match_style: word
          terms:
            - social benefits claimant number
            - social
            - benefits
            - claimant
      strength: domain
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
