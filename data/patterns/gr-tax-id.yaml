schema: testpattern/v1
name: Greek Tax identification Number
slug: gr-tax-id
version: 1.3.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects Greek Tax identification Number patterns. This pattern is based on a Microsoft Purview built-in sensitive information type. Due to the numeric format, corroborative evidence keywords are
  essential for reliable detection.
operation: 'Corroborative evidence: 5 keywords within 300 characters. Keyword lists: tax-id, gr-cy-financial. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: \b\d{9}\b
confidence: medium
confidence_justification: >-
  Medium confidence: nine-digit numbers are extremely common. Greek AFM keywords such as 'ΑΦΜ' or 'φορολογικού μητρώου' are essential for accurate detection. Added context gating and exclusion rules
  improve precision and reduce incidental matches.
jurisdictions:
  - gr
  - eu
regulations:
  - gdpr
data_categories:
  - pii
  - financial
  - government-id
corroborative_evidence:
  keywords:
    - ΑΦΜ
    - αριθμός φορολογικού μητρώου
    - tax identification
    - TIN
    - φορολογικός
  proximity: 300
  keyword_lists:
    - tax-id
    - gr-cy-financial
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: '123456789'
      description: Nine-digit Greek AFM number
    - value: '987654321'
      description: Greek tax identification number
    - value: '112233445'
      description: Greek AFM format
  should_not_match:
    - value: '12345678'
      description: Eight digits, too short for Greek AFM
    - value: '1234567890'
      description: Ten digits, exceeds Greek AFM format
    - value: template example placeholder record identifier
      description: Template/sample context should be excluded even when anchor words are present
false_positives:
  - description: Generic numeric sequences in non-tax contexts such as reference numbers or account identifiers
    mitigation: Require corroborative evidence keywords within the proximity window to distinguish tax identifiers from general numeric data.
  - description: Numbers from other identification schemes with similar digit patterns
    mitigation: Layer with jurisdiction-specific detection to prioritise matches in tax-related documents and cross-reference with other identifier types.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_gr_tax_id
      matches:
        - ref: Pattern_gr_tax_id_label_context
        - ref: Keyword_gr_tax_id_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_gr_tax_id
      matches:
        - ref: Keyword_gr_tax_id
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_gr_tax_id
      matches:
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_gr_tax_id
      pattern: \b\d{9}\b
    - id: Pattern_gr_tax_id_label_context
      pattern: (?i)\b(?:greek\s+tax\s+identification\s+number|greek|tax)\b
  keywords:
    - id: Keyword_gr_tax_id
      groups:
        - match_style: word
          terms:
            - ΑΦΜ
            - αριθμός φορολογικού μητρώου
            - φορολογικός αριθμός
            - φορολογικό μητρώο
            - tax identification number
            - tax ID
            - text: TIN
              case_sensitive: true
            - taxpayer identification
            - Αριθμός Φορολογικού Μητρώου
            - tax number
      strength: specific
    - id: Keyword_gr_tax_id_domain_context
      groups:
        - match_style: word
          terms:
            - greek tax identification number
            - greek
            - tax
      strength: domain
  filters:
    - id: Filter_gr_tax_id_same_digits
      type: AllDigitsSameFilter
risk_rating: 5
risk_description: >-
  The detector finds a nine-digit Greek AFM tax number only when Greek tax-office, taxpayer-register, or related financial language is nearby. An AFM may identify an individual or organization and can be reused in false invoices, entity lookups, or a targeted tax-authority impersonation. The value does not itself disclose a return, income, debt, bank account, or filing credential, and ungated nine-digit values would be highly ambiguous. Risk 5 and OFFICIAL reflect the limited correlation and spoofing value; private fiscal records or authenticated government-service access would raise the context toward SENSITIVE.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
references:
  - url: https://learn.microsoft.com/en-us/purview/sit-defn-greece-tax-identification-number
    title: Greek Tax identification Number entity definition - Microsoft Learn
