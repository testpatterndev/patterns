schema: testpattern/v1
name: Bank routing numbers
slug: global-top500-102-bank-routing-numbers
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to bank routing numbers in financial and compliance documents. Commonly found in international regulatory filings, transaction records, and audit documentation.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 7 keywords within 300 characters. Keyword
  lists: financial-deposit-terms. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: \b\d{3}-\d{3}\b|\b(?:routing\s+number|ABA|RTN)\b[\s:#-]{0,20}\d{9}\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
  - PCI-DSS
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - bank routing numbers
    - bank
    - routing
    - numbers
    - financial
    - accounts
    - payments
  proximity: 300
  keyword_lists:
    - financial-deposit-terms
    - generic-data-labels
    - data-record-context
test_cases:
  should_match:
    - value: '062-000'
      description: Australian BSB (3-3)
    - value: 'Routing number: 021000021'
      description: Labelled US ABA routing number
    - value: 'BSB 083-004'
      description: BSB with label
  should_not_match:
    - value: '12345'
      description: Too short
    - value: '1234567'
      description: Not a routing format
    - value: 'template example placeholder'
      description: Template/sample text
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In English (as the primary international business language), standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
    - dict: data-record-context
      as: Evidence_data_record_context
      match_style: word
    - dict: generic-data-labels
      as: Evidence_generic_data_labels
      match_style: word
  pattern_tiers:
    - confidence_level: 90
      id_match: Regex_bank_routing
      matches:
        - ref: Pattern_global_top500_102_bank_routing_numbers_label_context
        - ref: Keyword_global_top500_102_bank_routing_numbers_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_bank_routing
      matches:
        - ref: Keyword_bank_routing
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_bank_routing
      matches:
        - ref: Evidence_generic_data_labels
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_bank_routing
      pattern: \b\d{3}-\d{3}\b|\b(?:routing\s+number|ABA|RTN)\b[\s:#-]{0,20}\d{9}\b
    - id: Pattern_global_top500_102_bank_routing_numbers_label_context
      pattern: (?i)\b(?:bank\s+routing\s+numbers)\b
  keywords:
    - id: Keyword_bank_routing
      groups:
        - match_style: word
          terms:
            - bank routing numbers
            - routing number
            - ABA number
            - transit number
            - BSB number
            - sort code
            - bank code
            - branch code
            - clearing code
            - wire transfer
            - ACH routing
    - id: Keyword_global_top500_102_bank_routing_numbers_domain_context
      groups:
        - match_style: word
          terms:
            - bank routing numbers
            - bank
            - routing
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
created: '2026-02-08'
updated: '2026-03-14'
changelog:
  - version: 1.1.0
    date: '2026-03-14'
    description: Wire generic-data-labels evidence keywords at 75/85 tiers
  - version: 1.0.0
    date: '2026-02-08'
    description: Initial release
