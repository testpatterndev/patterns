schema: testpattern/v1
name: PGP Private Key Block
slug: global-pgp-private-key
version: 1.1.1
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects the ASCII-armored header of an OpenPGP (PGP/GnuPG) private key block, as defined in RFC 4880 / RFC 9580.
  A leaked PGP private key allows an attacker to decrypt the holder's encrypted mail and files and to forge
  signatures in their name. The registry already covers RSA, EC, OpenSSH and PKCS#8 private keys; this adds the
  OpenPGP armor format.
operation: >-
  Matches the BEGIN armor header line for a PGP private key block. Note: in Boost.RegEx the '.' metacharacter does
  not cross newlines, so the pattern matches the single BEGIN header line rather than the whole key body.
  Corroborative evidence: keywords within 300 characters.
pattern: -----BEGIN PGP PRIVATE KEY BLOCK-----
confidence: high
confidence_justification: >-
  High confidence: the armor header string is long, fixed and structurally distinctive, so false positives outside
  of documentation or training material are extremely unlikely.
jurisdictions:
  - global
regulations:
  - GDPR
  - "CCPA/CPRA"
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private key
    - PGP
    - GPG
    - GnuPG
    - OpenPGP
    - secret key
    - passphrase
  proximity: 300
test_cases:
  should_match:
    - value: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
      description: OpenPGP private key armor header
    - value: |-
        -----BEGIN PGP PRIVATE KEY BLOCK-----

        lQOYBGABCDEFAKEKEYMATERIALxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      description: PGP private key header with following armored body
    - value: 'Key file contents: -----BEGIN PGP PRIVATE KEY BLOCK----- Version: GnuPG v2'
      description: PGP private key header inline with GnuPG version line
  should_not_match:
    - value: '-----BEGIN PGP PUBLIC KEY BLOCK-----'
      description: Public key block, not a private key
    - value: '-----BEGIN PGP MESSAGE-----'
      description: Encrypted PGP message, not a private key
    - value: please export your PGP private key block before rotating the GPG keypair
      description: Prose mention of a PGP private key without the actual armor header
false_positives:
  - description: Documentation, RFCs or training material that quotes the armor header without real key material.
    mitigation: Require corroborative keywords and confirm armored base64 key material follows the header line.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This detector identifies the ASCII-armoured BEGIN header of a PGP private-key block rather than validating the entire key body. If real key material follows, an attacker may decrypt data addressed to the key and forge signatures attributable to its holder. The likely harm is serious for that key's communications and files, but documentation can quote the header and the match does not establish how much data, trust, or privilege the key protects. Risk 8 and SENSITIVE InfoTech fit a plausible private-key export with decryption and signature harm; PROTECTED requires confirmed complete key material protecting broad or critical holdings or causing severe trust compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
