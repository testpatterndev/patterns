schema: testpattern/v1
name: PGP Private Key Block
slug: global-pgp-private-key
version: 1.2.0
type: regex
pattern_class: identifier
engine: universal
description: >-
  Detects the ASCII-armored header of an OpenPGP (PGP/GnuPG) private key block, as defined in RFC 4880 / RFC 9580.
  A leaked PGP private key allows an attacker to decrypt the holder's encrypted mail and files and to forge
  signatures in their name. The registry already covers RSA, EC, OpenSSH and PKCS#8 private keys; this adds the
  OpenPGP armor format. Header-only hits are discovery-only; armored packet data
  near the header provides the enforcement tiers.
operation: >-
  Regex_pgp_private_header matches the BEGIN line. The 75 tier requires the armor
  separator, optional Version/Comment fields, and a 64-character Base64 line whose
  prefix encodes an old- or new-format secret-key packet. The 85 tier additionally
  requires three consecutive 64-character body lines near the header. The 65 tier
  is discovery-only; enforcing tiers reject templates and do not depend on a CRC
  or END marker at the far end of a normal export.
pattern: -----BEGIN PGP PRIVATE KEY BLOCK-----
confidence: high
confidence_justification: >-
  High confidence: the armor header string is long, fixed and structurally distinctive, so false positives outside
  of documentation or training material are extremely unlikely.
jurisdictions:
  - global
regulations:
  - GDPR
  - "CCPA/CPRA"
frameworks:
  - CIS Controls
  - ISO 27001
  - NIST CSF
  - PCI-DSS
  - SOC 2
data_categories:
  - credentials
  - security
corroborative_evidence:
  keywords:
    - private key
    - PGP
    - GPG
    - GnuPG
    - OpenPGP
    - secret key
    - passphrase
  proximity: 300
test_cases:
  should_match:
    - value: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
      description: Low-tier probe - OpenPGP private-key armor header only
    - value: |-
        -----BEGIN PGP PRIVATE KEY BLOCK-----

        lQIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQCaPO2QBzKYKwDi
        QQ==
      description: Medium-tier probe - realistic secret-key packet prelude without trailing armor
    - value: |-
        -----BEGIN PGP PRIVATE KEY BLOCK-----

        lQIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQCaPO2QBzKYKwDi
        k8qK+5bw7VyHxKzg8V+Pw3+QsewdCZi2ueNFTlIMOo0s2ZX/b1QLzu4lu08pMD1x
        ioxlDQbNb1tOxNoLnGBz1eLzKyraT6AMjuQhLCPHYJTq6Mv9e8GBQ0yljRZuUt04
        pXObu8jeQB7Hq+h3gqXsrlEFxc4CIxjzj+WNWhG1XsOLztFPW71Y8lI3EbWp1ERs
        ALFXSqS3Wp67KJUQqspdXP+tNkgyd3Ch48Xu64zI0zP/t7LB9Qmty1eU2S/iPC/l
        2bvvlwQwXDsjjTp5JzVjtxGNyYY6gWwud1A557OgC3bk++TtOdoBsdfYf9yZOLmi
        =Ab9X
        -----END PGP PRIVATE KEY BLOCK-----
      description: High-tier probe - long secret-key packet body with checksum/footer beyond proximity
  should_not_match:
    - value: '-----BEGIN PGP PUBLIC KEY BLOCK-----'
      description: Public key block, not a private key
    - value: '-----BEGIN PGP MESSAGE-----'
      description: Encrypted PGP message, not a private key
    - value: please export your PGP private key block before rotating the GPG keypair
      description: Prose mention of a PGP private key without the actual armor header
    - value: |-
        -----BEGIN PGP PRIVATE KEY BLOCK-----

        mQIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQCaPO2QBzKYKwDi
        k8qK+5bw7VyHxKzg8V+Pw3+QsewdCZi2ueNFTlIMOo0s2ZX/b1QLzu4lu08pMD1x
        ioxlDQbNb1tOxNoLnGBz1eLzKyraT6AMjuQhLCPHYJTq6Mv9e8GBQ0yljRZuUt04
      description: Adversarial public-key packet prelude inside private-key armor
    - value: |-
        -----BEGIN PGP PRIVATE KEY BLOCK-----

        PLACEHOLDER
        -----END PGP PRIVATE KEY BLOCK-----
      description: Placeholder packet body must not enforce
    - value: |-
        Documentation example:
        -----BEGIN PGP PRIVATE KEY BLOCK-----

        lQIEvAIBADANBgkqhkiG9w0BAQEFAASCBKYwggSiAgEAAoIBAQCaPO2QBzKYKwDi
        k8qK+5bw7VyHxKzg8V+Pw3+QsewdCZi2ueNFTlIMOo0s2ZX/b1QLzu4lu08pMD1x
        ioxlDQbNb1tOxNoLnGBz1eLzKyraT6AMjuQhLCPHYJTq6Mv9e8GBQ0yljRZuUt04
        -----END PGP PRIVATE KEY BLOCK-----
      description: Documentation quoting realistic wrapped OpenPGP data must not enforce
false_positives:
  - description: Documentation, RFCs or training material that quotes the armor header without real key material.
    mitigation: Require corroborative keywords and confirm armored base64 key material follows the header line.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: narrow
risk_rating: 8
risk_description: >-
  This detector identifies the ASCII-armoured BEGIN header of a PGP private-key block rather than validating the entire key body. If real key material follows, an attacker may decrypt data addressed to the key and forge signatures attributable to its holder. The likely harm is serious for that key's communications and files, but documentation can quote the header and the match does not establish how much data, trust, or privilege the key protects. Risk 8 and SENSITIVE InfoTech fit a plausible private-key export with decryption and signature harm; PROTECTED requires confirmed complete key material protecting broad or critical holdings or causing severe trust compromise.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE InfoTech
  us_gov: CUI Specified
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
purview:
  patterns_proximity: 300
  recommended_confidence: 85
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Regex_pgp_private_header
      matches:
        - ref: Evidence_pgp_secret_packet
        - ref: Evidence_pgp_multiline_body
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Regex_pgp_private_header
      matches:
        - ref: Evidence_pgp_secret_packet
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_pgp_private_header
  regexes:
    - id: Regex_pgp_private_header
      pattern: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
    - id: Evidence_pgp_secret_packet
      pattern: '(?:\r?\n)(?:(?:Version|Comment):[^\r\n]{1,80}\r?\n){0,3}\r?\n(?:lQ|xQ)[A-Za-z0-9+/]{62}(?:\r?\n)'
    - id: Evidence_pgp_multiline_body
      pattern: '(?:\r?\n)(?:[A-Za-z0-9+/]{64}\r?\n){3}'
created: '2026-06-13'
updated: '2026-07-19'
changelog:
  - version: 1.2.0
    date: '2026-07-19'
    description: 'Independent-review blocker remediation: keep armor-header discovery at 65, require an old/new-format OpenPGP secret-key packet prelude at 75, and require three near-header 64-character body lines at 85. A long export fixture proves enforcement while CRC/footer evidence is beyond Purview proximity; adversarial public-packet, placeholder, documentation, and sibling-armor negatives protect rejection.'
  - version: 1.1.1
    date: '2026-07-14'
    description: 'v23 reviewed risk assessment: apply the individually reviewed workbook outcome from row 1557 without changing detector or package metadata.'
  - version: 1.1.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: identifier — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
