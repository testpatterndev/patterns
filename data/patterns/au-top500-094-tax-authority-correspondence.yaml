schema: testpattern/v1
name: Tax authority correspondence
slug: au-top500-094-tax-authority-correspondence
version: 1.1.0
type: regex
engine: boost_regex
description: Detects references to tax authority correspondence in financial and compliance documents. Commonly found in Australian regulatory filings, transaction records, and audit documentation.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 6 keywords within 300 characters.'
pattern: (?is)\b(?:tax\s+authority\s+correspondence|Australian\s+Taxation\s+Office|notice\s+of\s+assessment|tax\s+ruling|private\s+ruling|compliance\s+notice|audit\s+notification|tax\s+determination|tax\s+agent)\b
confidence: medium
confidence_justification: identifier/document-structure anchored regex with constrained context replaces phrase-only detection.
jurisdictions:
  - au
regulations:
- "AML/CTF Act (Cth)"
- "IPA 2009 (Qld)"
- "NDB Scheme (Cth)"
- "Privacy Act 1988 (Cth)"
- "SOCI Act 2018 (Cth)"
frameworks:
- ISO 27001
- ISO 27701
- PCI-DSS
- SOC 2
data_categories:
  - financial
corroborative_evidence:
  keywords:
    - tax authority correspondence
    - tax
    - authority
    - correspondence
    - payroll
    - operations
  proximity: 300
  keyword_lists:
    - corporate-finance
test_cases:
  should_match:
    - value: tax authority correspondence
      description: Primary topic phrase match
    - value: australian taxation office
      description: Case-insensitive topic phrase match
    - value: notice of assessment
      description: Alternative topic phrase match
    - value: tax ruling
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: payroll reimbursement
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Financial terminology appearing in published reports, accounting textbooks, regulatory guidance, or template documents without actual transaction data.
    mitigation: Require corroborative evidence keywords within the proximity window. Cross-reference with structured financial identifiers to confirm actual sensitive data.
  - description: In Australian English, standard business terminology overlapping with financial detection keywords in routine correspondence and documentation.
    mitigation: Increase confidence threshold when scanning business correspondence. Layer with transaction-specific patterns for higher precision.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_tax_authority_correspondence
      matches:
        - ref: Evidence_tax_authority_correspondence
        - type: any
          min_matches: 0
          max_matches: 0
          children:
            - ref: Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_tax_authority_correspondence
      matches:
        - ref: Evidence_tax_authority_correspondence
    - confidence_level: 65
      id_match: Pattern_tax_authority_correspondence
      matches:
        - ref: Evidence_tax_authority_correspondence
  regexes:
    - id: Pattern_tax_authority_correspondence
      pattern: (?is)\b(?:tax\s+authority\s+correspondence|Australian\s+Taxation\s+Office|notice\s+of\s+assessment|tax\s+ruling|private\s+ruling|compliance\s+notice|audit\s+notification|tax\s+determination|tax\s+agent)\b
  keywords:
    - id: Evidence_tax_authority_correspondence
      groups:
        - match_style: word
          terms:
            - tax authority correspondence
            - ATO
            - Australian Taxation Office
            - notice of assessment
            - tax ruling
            - private ruling
            - compliance notice
            - audit notification
            - tax determination
            - commissioner
            - tax agent
            - lodgement
    - id: Evidence_template_exclusion
      groups:
        - match_style: word
          terms:
            - template
            - sample
            - example
            - placeholder
            - dummy
            - mock
            - tutorial
            - demo
            - training exercise
            - test data
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
