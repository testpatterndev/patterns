schema: testpattern/v1
name: PSPF Security Classification
slug: au-pspf-security-classification
version: 1.5.0
type: keyword_list
pattern_class: marking
status: deprecated
deprecation_reason: 'superseded by the au-marking-* per-category classifiers (2026-06-29); retained in place for broad discovery'
description: >-
  DEPRECATED for auto-labelling — superseded by the per-category classifiers au-marking-official,
  au-marking-sensitive, au-marking-protected, and au-marking-secret-topsecret. Retained as a broad
  "any PSPF marking present" discovery/inventory detector. Detects Protective Security Policy
  Framework (PSPF) security classification markers in Australian Government documents.
operation: >-
  Regex and keyword-based detection matching OFFICIAL: Sensitive, PROTECTED, SECRET, and TOP SECRET markers.
  Corroborative evidence: 14 PSPF keywords within 300 characters.
confidence: medium
confidence_justification: 'Medium confidence: keyword-based detection requires corroborative evidence for accurate identification.'
jurisdictions:
  - au
regulations:
- 2006 MOU National Security
- "Criminal Code Act 1995 (Cth)"
frameworks:
- PSPF
- QGISCF
data_categories:
  - government
  - security-classification
test_cases:
  should_match:
    - value: 'OFFICIAL: Sensitive - Protective Security Policy Framework'
      description: Test match 1
    - value: 'Security classification: PROTECTED per PSPF guidelines'
      description: Test match 2
    - value: Document marked SECRET with NATIONAL CABINET handling caveat
      description: Test match 3
  should_not_match:
    - value: The official opening ceremony
      description: Non-match 1
    - value: This is our official website
      description: Non-match 2
false_positives:
  - description: Generic use of official or protected in non-classification contexts.
    mitigation: Require PSPF-specific classification markers in proper format.
exports:
  - yaml
scope: narrow
risk_rating: 10
risk_description: PSPF markers indicate government-classified information requiring protective handling.
sensitivity_labels:
  pspf: PROTECTED
  qgiscf: PROTECTED
  qgiscf_dlm: PROTECTED Government
  us_gov: "CUI Specified"
  uk_gov: "SECRET"
  nz_gov: "SECRET"
  ca_gov: "Confidential"
purview:
  patterns_proximity: 300
  recommended_confidence: 95
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 95
      id_match: Regex_pspf_classification
      matches:
        - ref: Keyword_pspf
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 85
      id_match: Regex_pspf_classification
      matches:
        - ref: Keyword_dlm
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_security_classification
      matches:
        - ref: Keyword_government
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_pspf_classification
      pattern: (?i)\b(?:official\s*:\s*sensitive|protected|secret|top\s+secret)\b
    - id: Regex_security_classification
      pattern: (?i)\b(?:security\s+classification|classification\s*:\s*(?:official|protected|secret))\b
  keywords:
    - id: Keyword_pspf
      groups:
        - match_style: word
          terms:
            - PSPF
            - Protective Security Policy Framework
            - security classification
            - 'OFFICIAL: Sensitive'
            - marked OFFICIAL
            - OFFICIAL classification
            - SENSITIVE
            - PROTECTED
            - SECRET
            - NOFORN
            - ORCON
            - REL TO
            - NATIONAL CABINET
            - 'Sensitive: Legal'
            - 'Sensitive: Personal Privacy'
            - 'Sensitive: Legislative Secrecy'
    - id: Keyword_dlm
      groups:
        - match_style: word
          terms:
            - DLM
            - dissemination limiting marker
            - dissemination limited
            - restricted circulation
            - not for public release
            - for official use only
    - id: Keyword_government
      groups:
        - match_style: word
          terms:
            - government
            - Australian Government
            - Commonwealth
            - department
            - agency
            - public sector
created: '2026-02-09'
updated: '2026-07-09'
changelog:
  - version: 1.5.0
    date: '2026-07-09'
    description: 'C3 deprecate-in-place: add status: deprecated + deprecation_reason (superseded by the au-marking-* per-category classifiers (2026-06-29); retained in place for broad discovery). Detection logic unchanged, pattern retained for discovery — no silent removals per plan §C3. Full adjudication: .superpowers/sdd/c3-deprecation-report.md'
  - version: 1.4.0
    date: '2026-07-09'
    description: 'C1 verdict-model: add pattern_class: marking — classification-harness verdict class (concept patterns are scored as topic classifiers with decoy hits expected, not failed detectors; identifier/marking scoring unchanged); derived by scripts/derive-pattern-class.mjs + spot review'
  - version: 1.3.0
    date: '2026-07-09'
    description: 'Noise-gate sweep: wire the declared template-exclusion noise dictionary (Keyword_noise_exclusion) into the NOT-group of every evidence-bearing tier — the dictionary was declared in shared_keywords but no tier referenced it (dead noise gate); dictionary terms verified collision-free against this pattern''s should_match values and specific/domain vocabulary'
  - version: 1.2.0
    date: '2026-07-04'
    description: Replace bare generic keyword terms with domain-anchored phrases (FP reduction)
  - version: 1.1.0
    date: '2026-06-29'
    note: >-
      Marked deprecated for auto-labelling; superseded by the au-marking-* per-category
      classifiers. Retained for broad discovery. No detection-logic change.
author: testpattern-community
license: MIT
keywords:
  - PSPF
  - Protective Security Policy Framework
  - security classification
  - 'OFFICIAL: Sensitive'
  - marked OFFICIAL
  - OFFICIAL classification
  - SENSITIVE
  - PROTECTED
  - SECRET
  - NOFORN
  - ORCON
  - REL TO
  - NATIONAL CABINET
  - 'Sensitive: Legal'
  - 'Sensitive: Personal Privacy'
  - 'Sensitive: Legislative Secrecy'
