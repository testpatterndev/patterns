schema: testpattern/v1
name: Trademark strategy analyses
slug: global-top500-207-trademark-strategy-analyses
version: 1.0.0
type: regex
engine: boost_regex
description: >-
  Identifies documents containing references to trademark strategy analyses in international contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters. Uses
  additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:trademark\s+strategy|brand\s+protection|trademark\s+registration|trademark\s+portfolio|trademark\s+search|mark\s+clearance|trademark\s+opposition|brand\s+valuation|trademark\s+infringement|intellectual\s+property\s+strategy|trademark\s+filing)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - trademark strategy analyses
    - trademark
    - strategy
    - analyses
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: trademark strategy
      description: Primary topic phrase match
    - value: brand protection
      description: Case-insensitive topic phrase match
    - value: trademark registration
      description: Alternative topic phrase match
    - value: trademark portfolio
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to trademark strategy analyses appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: noise-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_trademark_strategy
      matches:
        - ref: Pattern_global_top500_207_trademark_strategy_analyses_label_context
        - ref: Keyword_global_top500_207_trademark_strategy_analyses_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 75
      id_match: Regex_trademark_strategy
      matches:
        - ref: Keyword_trademark_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      id_match: Regex_trademark_strategy
      matches:
        - ref: Keyword_trademark_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_trademark_strategy
      pattern: >-
        (?is)\b(?:trademark\s+strategy|brand\s+protection|trademark\s+registration|trademark\s+portfolio|trademark\s+search|mark\s+clearance|trademark\s+opposition|brand\s+valuation|trademark\s+infringement|intellectual\s+property\s+strategy|trademark\s+filing)\b
    - id: Pattern_global_top500_207_trademark_strategy_analyses_label_context
      pattern: (?i)\\b(?:trademark\\s+strategy\\s+analyses|trademark|strategy|analyses|top500)\\b
  keywords:
    - id: Keyword_trademark_strategy
      groups:
        - match_style: word
          terms:
            - trademark strategy
            - brand protection
            - trademark registration
            - trademark portfolio
            - trademark search
            - mark clearance
            - trademark opposition
            - brand valuation
            - trademark infringement
            - intellectual property strategy
            - trademark filing
    - id: Keyword_global_top500_207_trademark_strategy_analyses_domain_context
      groups:
        - match_style: word
          terms:
            - trademark strategy analyses
            - trademark
            - strategy
            - analyses
            - top500
            - field
            - identifier
            - reference
sensitivity_labels:
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
