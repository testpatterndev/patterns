schema: testpattern/v1
name: Trademark strategy analyses
slug: global-top500-207-trademark-strategy-analyses
version: 1.3.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to trademark strategy analyses in Australian contexts. This information type is classified as personally identifiable information under applicable data
  protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 8 keywords within 300 characters.'
pattern: >-
  (?is)\b(?:trademark\s+strategy|trademark\s+analysis|brand\s+protection|trademark\s+registration|trademark\s+portfolio|trade\s+mark|brand\s+strategy|trademark\s+search|trademark\s+opposition|trademark\s+infringement|IP\s+strategy|brand\s+valuation)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection.
jurisdictions:
  - global
regulations:
  - AML/CTF Act (Cth)
  - HRIPA (Cth)
  - IPA 2009 (Qld)
  - My Health Records Act 2012 (Cth)
  - NDB Scheme (Cth)
  - Privacy Act 1988 (Cth)
  - TIA Act 1979 (Cth)
  - GDPR
frameworks:
  - ISO 27001
  - ISO 27701
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - trademark strategy analyses
    - trademark
    - strategy
    - analyses
    - intellectual
    - property
    - trade
    - secrets
  proximity: 300
test_cases:
  should_match:
    - value: trademark strategy
      description: Primary topic phrase match
    - value: trademark analysis
      description: Case-insensitive topic phrase match
    - value: brand protection
      description: Alternative topic phrase match
    - value: trademark registration
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: algorithm schematic
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to trademark strategy analyses appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In Australian English, similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 300
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Evidence_template_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 85
      id_match: Pattern_trademark_strategy
      matches:
        - ref: Evidence_trademark_strategy
          min_count: 2
          unique_results: true
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 75
      id_match: Pattern_trademark_strategy
      matches:
        - ref: Evidence_trademark_strategy
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Evidence_template_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Pattern_trademark_strategy
      matches:
        - ref: Evidence_trademark_strategy
  regexes:
    - id: Pattern_trademark_strategy
      pattern: >-
        (?is)\b(?:trademark\s+strategy|trademark\s+analysis|brand\s+protection|trademark\s+registration|trademark\s+portfolio|trade\s+mark|brand\s+strategy|trademark\s+search|trademark\s+opposition|trademark\s+infringement|IP\s+strategy|brand\s+valuation)\b
  keywords:
    - id: Evidence_trademark_strategy
      groups:
        - match_style: word
          terms:
            - trademark strategy
            - trademark analysis
            - brand protection
            - trademark registration
            - trademark portfolio
            - trade mark
            - brand strategy
            - trademark search
            - trademark opposition
            - trademark infringement
            - IP strategy
            - brand valuation
            - confidential
risk_description: >-
  The regex identifies trademark strategy, trademark analysis, brand protection, registration, portfolio, search, opposition, infringement, IP strategy, or brand-valuation terminology. Registrations, searches, oppositions, and brand-protection discussion are often public or routine, and the match does not establish a confidential launch name, jurisdiction choice, dispute position, or valuation. A competitor needs concrete non-public portfolio decisions or unreleased branding before useful exploitation is plausible. Risk 5 and OFFICIAL are proportionate; SENSITIVE would require an actual confidential clearance opinion, unreleased brand plan, opposition strategy, or private valuation analysis.
sensitivity_labels:
  pspf: OFFICIAL
  qgiscf: OFFICIAL
  qgiscf_dlm: OFFICIAL
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: IN-CONFIDENCE
  ca_gov: Protected A
