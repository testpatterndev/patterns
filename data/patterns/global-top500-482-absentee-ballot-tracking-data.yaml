  recommended_confidence: 75
  pattern_tiers:
    - confidence_level: 80
      id_match: Regex_absentee_ballot
      matches:
        - ref: Pattern_global_top500_482_absentee_ballot_tracking_data_label_context
        - ref: Keyword_global_top500_482_absentee_ballot_tracking_data_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_482_absentee_ballot_tracking_data_noise_exclusion
    - confidence_level: 75
      id_match: Regex_absentee_ballot
      matches:
        - ref: Keyword_absentee_ballot
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_482_absentee_ballot_tracking_data_noise_exclusion
    - confidence_level: 65
      id_match: Regex_absentee_ballot
      matches:
        - ref: Keyword_absentee_ballot
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_global_top500_482_absentee_ballot_tracking_data_noise_exclusion
  regexes:
    - id: Regex_absentee_ballot
      pattern: (?is)\b(?:absentee\s+ballot\s+tracking\s+data|absentee\s+ballot|mail[\s-]+in\s+ballot|postal\s+vote|ballot\s+tracking|early\s+voting|provisional\s+ballot|ballot\s+status|vote\s+by\s+mail|election\s+commission|ballot\s+receipt|return\s+envelope)\b
    - id: Pattern_global_top500_482_absentee_ballot_tracking_data_label_context
      pattern: (?i)\\b(?:absentee\\s+ballot\\s+tracking\\s+data|absentee|ballot|tracking|top500)\\b
  keywords:
    - id: Keyword_absentee_ballot
      groups:
        - match_style: word
          terms:
