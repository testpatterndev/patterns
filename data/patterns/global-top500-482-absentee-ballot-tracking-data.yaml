schema: testpattern/v1
name: Absentee ballot tracking data
slug: global-top500-482-absentee-ballot-tracking-data
version: 1.2.1
type: regex
pattern_class: concept
engine: boost_regex
description: >-
  Identifies documents containing references to absentee ballot tracking data in international contexts. This information type is classified as personally identifiable information under applicable
  data protection regulations.
operation: >-
  Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword
  lists: industry-critical-infrastructure. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.
pattern: >-
  (?is)\b(?:absentee\s+ballot\s+tracking\s+data|absentee\s+ballot|mail[\s-]+in\s+ballot|postal\s+vote|ballot\s+tracking|early\s+voting|provisional\s+ballot|ballot\s+status|vote\s+by\s+mail|election\s+commission|ballot\s+receipt|return\s+envelope)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - absentee ballot tracking data
  proximity: 240
  keyword_lists:
    - industry-critical-infrastructure
    - data-record-context
    - generic-data-labels
test_cases:
  should_match:
    - value: absentee ballot tracking data
      description: Primary topic phrase match
    - value: absentee ballot
      description: Case-insensitive topic phrase match
    - value: mail-in ballot
      description: Alternative topic phrase match
    - value: postal vote
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to absentee ballot tracking data appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: >-
      In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute
      sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
  patterns_proximity: 240
  recommended_confidence: 75
  shared_keywords:
    - dict: template-exclusion
      as: Keyword_noise_exclusion
      match_style: word
  pattern_tiers:
    - confidence_level: 75
      id_match: Regex_absentee_ballot
      matches:
        - ref: Pattern_global_top500_482_absentee_ballot_tracking_data_label_context
        - ref: Keyword_global_top500_482_absentee_ballot_tracking_data_domain_context
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
    - confidence_level: 65
      discovery_only: true
      id_match: Regex_absentee_ballot
      matches:
        - ref: Keyword_absentee_ballot
        - type: any
          min_matches: 0
          max_matches: 0
          refs:
            - Keyword_noise_exclusion
  regexes:
    - id: Regex_absentee_ballot
      pattern: >-
        (?is)\b(?:absentee\s+ballot\s+tracking\s+data|absentee\s+ballot|mail[\s-]+in\s+ballot|postal\s+vote|ballot\s+tracking|early\s+voting|provisional\s+ballot|ballot\s+status|vote\s+by\s+mail|election\s+commission|ballot\s+receipt|return\s+envelope)\b
    - id: Pattern_global_top500_482_absentee_ballot_tracking_data_label_context
      pattern: (?i)\b(?:absentee\s+ballot\s+tracking\s+data)\b
  keywords:
    - id: Keyword_absentee_ballot
      groups:
        - match_style: word
          terms:
            - absentee ballot tracking data
            - absentee ballot
            - mail-in ballot
            - postal vote
            - ballot tracking
            - early voting
            - provisional ballot
            - ballot status
            - vote by mail
            - election commission
            - ballot receipt
            - return envelope
      strength: specific
    - id: Keyword_global_top500_482_absentee_ballot_tracking_data_domain_context
      groups:
        - match_style: word
          terms:
            - absentee ballot tracking data
            - absentee
            - ballot
            - tracking
      strength: domain
risk_description: >-
  The classifier responds to absentee or mail-in ballots, receipt, return envelopes, provisional status, tracking, and early-voting language; it does not require a voter-linked tracking table. Genuine tracking data can reveal whether and how an identified voter returned a ballot, enabling intimidation, targeted misinformation, interception attempts, or improper challenge activity during an election. The exposure may involve one voter or a bounded operational batch, while public election instructions and campaign discussion can trigger the same concepts. Risk 8 and SENSITIVE are justified; PROTECTED would require live bulk tracking data and operational access details capable of widespread disenfranchisement, election interference, or significant democratic harm.
sensitivity_labels:
  pspf: "OFFICIAL: Sensitive"
  qgiscf: SENSITIVE
  qgiscf_dlm: SENSITIVE Personal-Privacy
  us_gov: CUI
  uk_gov: OFFICIAL-SENSITIVE
  nz_gov: RESTRICTED
  ca_gov: Protected B
