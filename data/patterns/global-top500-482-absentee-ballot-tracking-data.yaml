schema: testpattern/v1
name: Absentee ballot tracking data
slug: global-top500-482-absentee-ballot-tracking-data
version: 1.0.0
type: regex
engine: boost_regex
description: Identifies documents containing references to absentee ballot tracking data in international contexts. This information type is classified as personally identifiable information under applicable data protection regulations.
operation: 'Pattern type: regex (boost_regex engine). Regex uses structural anchors with proximity constraints to match domain-specific content. Corroborative evidence: 1 keywords within 240 characters. Keyword lists: industry-critical-infrastructure, infrastructure-industrial-protocols. Uses additional domain-context evidence and explicit exclusion logic for template/sample/test text.'
pattern: (?is)\b(?:absentee\s+ballot\s+tracking\s+data|absentee\s+ballot|mail[\s-]+in\s+ballot|postal\s+vote|ballot\s+tracking|early\s+voting|provisional\s+ballot|ballot\s+status|vote\s+by\s+mail|election\s+commission|ballot\s+receipt|return\s+envelope)\b
confidence: medium
confidence_justification: category-aware structural regex with anchor and context constraints replaces phrase-only detection. Added context gating and exclusion rules improve precision and reduce incidental matches.
jurisdictions:
  - global
regulations:
  - GDPR
data_categories:
  - pii
corroborative_evidence:
  keywords:
    - absentee ballot tracking data
  proximity: 240
  keyword_lists:
    - industry-critical-infrastructure
test_cases:
  should_match:
    - value: absentee ballot tracking data
      description: Primary topic phrase match
    - value: absentee ballot
      description: Case-insensitive topic phrase match
    - value: mail-in ballot
      description: Alternative topic phrase match
    - value: postal vote
      description: Additional topic phrase match
  should_not_match:
    - value: unrelated generic text without domain phrases
      description: No relevant topic phrases present
    - value: placeholder value 12345
      description: Random text should not match topic-specific regex
    - value: voter sovereign debt
      description: Generic word pair from old broad template should not match
false_positives:
  - description: Common words and phrases related to absentee ballot tracking data appearing in policy documents, training materials, HR templates, or compliance guidelines without actual personal data.
    mitigation: Require corroborative evidence keywords within the proximity window to confirm sensitive data context rather than general discussion.
  - description: In English (as the primary international business language), similar terminology used in formal or administrative contexts (education, professional documentation) that does not constitute sensitive data collection.
    mitigation: Layer with additional contextual signals such as structured identifiers, form fields, or database column headers to distinguish sensitive records from general references.
  - description: High-frequency pattern matches in large document corpora due to broad regex anchors. Expected match rate is significantly higher than specific identifier patterns.
    mitigation: Tune confidence thresholds for bulk scanning. Consider using this pattern primarily as a pre-filter with secondary validation.
exports:
  - purview_xml
  - yaml
  - regex_copy
scope: wide
purview:
