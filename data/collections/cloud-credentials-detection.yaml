schema: testpattern/v1
name: Cloud Credentials & API Keys
slug: cloud-credentials-detection
description: >-
  Detects leaked credentials, API keys, access tokens, and private key material across major
  cloud providers (AWS, Azure, GCP), developer platforms (GitHub, GitLab, Docker Hub, package
  registries), SaaS and AI services (OpenAI, Anthropic, Slack, Stripe, Twilio, and more),
  crypto exchanges, and generic secret formats (private keys, JWTs, bearer tokens, session
  cookies, credential combolists).
jurisdictions:
  - global
regulations:
  - general-data-protection
patterns:
