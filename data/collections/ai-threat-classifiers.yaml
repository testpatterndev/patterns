schema: testpattern/v1
name: AI Threat Classifiers
slug: ai-threat-classifiers
description: >-
  The Aairii AI-attack classifier library (AI-SIT-001..014) as TestPattern definitions, mapped to
  OWASP LLM Top 10 / NIST AI RMF GenAI Profile / MITRE ATLAS. Besides the 14 AI-SIT patterns, the
  collection intentionally includes three global credential SITs - global-openai-key,
  global-aws-access-key, and global-gcp-api-key - as the delegated detectors that the SIT-re-scope
  classifiers (004/005/010/011) rely on. The 17-member export is therefore intentional, not an error.
jurisdictions: [global]
regulations: ['OWASP LLM Top 10 2025', 'NIST AI RMF GenAI Profile']
