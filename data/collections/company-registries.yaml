schema: testpattern/v1
name: Company & Business Registry Identifiers
slug: company-registries
description: >-
  Detects business and legal-entity registry identifiers: company registration numbers
  (UK Companies House, Australian ACN, Brazilian CNPJ, Japanese Corporate Number), business
  register numbers (Australian ABN, New Zealand NZBN, Polish REGON), entity tax/VAT
  registrations (EU VAT, India GSTIN, Turkish VKN), and the global Legal Entity Identifier
  (LEI). Useful for identifying documents about specific business entities in M&A, vendor
  onboarding, KYB, and procurement contexts.
jurisdictions:
  - global
  - uk
  - eu
  - au
  - nz
  - br
  - pl
  - in
  - jp
  - tr
regulations:
  - general-data-protection
patterns:
  # ── Global ──
  - global-lei
  # ── Company registration numbers ──
  - uk-companies-house-number
  - au-company-number
  - br-cnpj
  - jp-my-number-corporate
  # ── Business register numbers ──
  - au-business-number
  - nz-nzbn
  - pl-regon
  # ── Entity tax / VAT registrations ──
  - eu-vat-number
  - in-gst-number
  - tr-tax-number
