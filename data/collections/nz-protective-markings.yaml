schema: testpattern/v1
name: NZ Protective Markings
slug: nz-protective-markings
description: >-
  New Zealand Protective Security Requirements (PSR) classification detection. Covers both
  PSR families: policy-and-privacy markings (IN-CONFIDENCE, SENSITIVE) and national-security
  markings (RESTRICTED, CONFIDENTIAL, SECRET, TOP SECRET). UNCLASSIFIED is not a current PSR
  classification level and is intentionally excluded.
jurisdictions:
  - nz
regulations:
  - protective-security-requirements
patterns:
  - nz-marking-in-confidence
  - nz-marking-sensitive
  - nz-marking-restricted
  - nz-marking-confidential
  - nz-marking-secret-topsecret
