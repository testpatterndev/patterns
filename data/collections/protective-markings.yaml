schema: testpattern/v1
name: Government Protective Markings
slug: protective-markings
description: >-
  Detects government security classification markings and banners across allied jurisdictions:
  Australia (PSPF), New Zealand (PSR), the United Kingdom (GSCP), the United States (EO 13526
  classification banners and CUI banner markings), Canada (Directive on Security Management),
  the European Union (EUCI RESTREINT UE), and NATO. Intended for identifying classified or
  officially marked material moving outside approved government environments.
jurisdictions:
  - au
  - nz
  - uk
  - us
  - ca
  - eu
  - nato
regulations:
  - protective-security-requirements
patterns:
  # ── Australia (PSPF) ──
  - au-marking-official
  - au-marking-sensitive
  - au-marking-protected
  - au-marking-secret-topsecret
  # ── New Zealand (PSR) ──
  - nz-marking-in-confidence
  - nz-marking-sensitive
  - nz-marking-restricted
  - nz-marking-confidential
  - nz-marking-secret-topsecret
  # ── United Kingdom (GSCP) ──
  - uk-marking-official
  - uk-marking-secret-topsecret
  # ── United States ──
  - us-classification-banner
  - us-cui-banner-marking
  # ── Canada / EU / NATO ──
  - ca-marking
  - eu-marking-restreint
  - nato-marking
created: "2026-07-08"
updated: "2026-07-08"
